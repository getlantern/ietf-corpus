document: rfc-4592
kind: protocol-element
summary: The 'closest encloser' is the existing zone node with the maximum number of consecutive labels (from the root downward) matching QNAME. It is always an existing name and may be an empty non-terminal or even a wildcard domain name itself, but is never itself used for synthesis.
