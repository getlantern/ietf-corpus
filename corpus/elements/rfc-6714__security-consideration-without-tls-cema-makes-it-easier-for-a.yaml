document: rfc-6714
kind: security-consideration
summary: Without TLS, CEMA makes it easier for a man-in-the-middle to transparently insert itself between MSRP endpoints. It is therefore RECOMMENDED that TLS be used and that it be used end to end; CEMA enables end-to-end TLS even in the presence of anchoring middleboxes.
section: "7.2"
rfc2119_level: RECOMMENDED
topics:
    - security
    - tls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
