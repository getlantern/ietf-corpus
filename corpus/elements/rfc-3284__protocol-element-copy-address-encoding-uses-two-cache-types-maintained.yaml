document: rfc-3284
kind: protocol-element
summary: 'COPY address encoding uses two cache types maintained synchronously by encoder and decoder: a ''near'' cache (circular buffer of s_near most-recent addresses, default 4) for nearby addresses, and a ''same'' cache (hash table of s_same*256 slots, default s_same=3) for exact repeated addresses. Caches are initialized to zero at the start of each target window.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
