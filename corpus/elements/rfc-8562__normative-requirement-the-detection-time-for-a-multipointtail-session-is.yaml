document: rfc-8562
kind: normative-requirement
summary: The Detection Time for a MultipointTail session is calculated as the product of the last received values of Desired Min TX Interval and Detect Mult. MultipointTail cannot negotiate the head's transmit rate via Required Min RX Interval due to the one-to-many relationship.
section: "5.11"
rfc2119_level: MUST
topics:
    - routing
    - multicast
