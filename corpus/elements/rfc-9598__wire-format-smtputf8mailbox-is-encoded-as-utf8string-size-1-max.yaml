document: rfc-9598
kind: wire-format
summary: SmtpUTF8Mailbox is encoded as UTF8String (SIZE (1..MAX)). All domain labels are encoded as LDH labels (A-labels for internationalized labels, NR-LDH for ASCII-only labels), never as U-labels. The encoding MUST NOT contain a Byte Order Mark (BOM).
