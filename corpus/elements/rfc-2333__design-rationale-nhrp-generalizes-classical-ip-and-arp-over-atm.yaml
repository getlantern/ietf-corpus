document: rfc-2333
kind: design-rationale
summary: 'NHRP generalizes Classical IP and ARP over ATM (RFC 2225) and IP over SMDS (RFC 1209) in two directions: it avoids extra router hops when source and destination belong to different Logical Internet Subnets (LIS) on the same NBMA network, and it is not specific to any particular NBMA technology.'
