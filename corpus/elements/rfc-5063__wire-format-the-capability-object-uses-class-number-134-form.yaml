document: rfc-5063
kind: wire-format
summary: 'The Capability object uses Class-Number 134 (form 10bbbbbb) and C-Type 1. It is a 32-bit field carried in Hello messages, containing three defined bits: RecoveryPath Transmit Enabled (T, bit 2), RecoveryPath Desired (R, bit 1), and RecoveryPath Srefresh Capable (S, bit 0); remaining bits are Reserved and MUST be zero.'
section: "4.2"
topics:
    - routing
    - mpls
