document: rfc-8899
kind: protocol-element
summary: 'Three probe packet types are defined: (1) padding-only probes carrying only control information and padding; (2) application data plus padding probes; and (3) application data-only probes sized to match the probe target. Probe messages MUST contain enough information to uniquely identify the probe within the MSL.'
section: "4.1"
topics:
