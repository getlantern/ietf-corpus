document: rfc-9300
kind: wire-format
summary: 'The LISP header is 8 octets: the first 32 bits contain the N, L, E, V, I, R, KK flag bits (8 bits) and a 24-bit Nonce/Map-Version field; the second 32 bits carry either a 32-bit Locator-Status-Bits field (I=0) or a 24-bit Instance ID plus 8-bit LSBs (I=1).'
section: "5.3"
