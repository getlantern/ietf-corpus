document: rfc-7459
kind: interoperability-note
summary: The 'Precision' and 'Resolution' terms defined in RFC 3693 are deprecated by this document. Those terms have many conflicting uses in other fields and are unsuitable for quantitative discussion of uncertainty and confidence in location information.
section: "2.2"
