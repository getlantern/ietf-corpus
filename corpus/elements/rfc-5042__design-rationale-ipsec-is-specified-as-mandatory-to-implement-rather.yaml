document: rfc-5042
kind: design-rationale
summary: IPsec is specified as mandatory-to-implement rather than DTLS because the two initial RDDP adopters, iSCSI and NFSv4, are both compatible with IPsec, and RFC 3723 already mandates IPsec for iSCSI; a common IPsec profile simplifies joint deployments.
section: 5.4.3
topics:
    - security
    - ipsec
