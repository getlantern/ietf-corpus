document: rfc-8288
kind: protocol-element
summary: The serialisation-defined target attributes for the Link header field are 'hreflang' (language hint), 'media' (intended media), 'title' (human-readable label), 'title*' (RFC 8187-encoded title with language), and 'type' (media type hint). Each of 'media', 'title', 'title*', and 'type' MUST NOT appear more than once in a given link-value.
section: 3.4.1
topics:
    - http
