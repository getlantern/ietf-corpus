document: rfc-3845
kind: normative-requirement
summary: Bits representing Meta-TYPEs or QTYPEs (per RFC 2929 section 3.1), or within the range reserved for QTYPEs and Meta-TYPEs, MUST be set to 0 since they do not appear in zone data. If encountered, they must be ignored upon reading.
section: 2.1.2
rfc2119_level: MUST
topics:
    - dns
    - security
