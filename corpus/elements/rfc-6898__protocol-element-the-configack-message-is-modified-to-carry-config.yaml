document: rfc-6898
kind: protocol-element
summary: 'The ConfigAck message is modified to carry CONFIG objects: ''<ConfigAck Message> ::= <Common Header> <LOCAL_CCID> <LOCAL_NODE_ID> <REMOTE_CCID> <MESSAGE_ID_ACK> <REMOTE_NODE_ID> [ <CONFIG> ... ]''. RFC 4204 defined ConfigAck without any CONFIG objects; this extension enables explicit identification of negotiated parameters.'
section: "2.1"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
