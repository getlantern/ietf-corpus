kind: wire-format
summary: 'Transit IPv4 Shared Tree TLV: Type=11, Length=8. RP field is an IPv4 RP address (4 octets). Group field is an IPv4 multicast group address (4 octets). Encoding is identical to the IPv4 Source Tree TLV (RFC 6826) except the Source field is replaced by RP.'
