document: rfc-2032
kind: normative-requirement
summary: The RTP marker bit MUST be set to 1 in the last packet of a video frame and MUST be zero in all other packets. This allows a receiver to detect the end of a frame without waiting for the start code of the next frame.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
