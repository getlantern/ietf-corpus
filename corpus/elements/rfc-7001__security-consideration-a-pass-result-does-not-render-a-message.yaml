document: rfc-7001
kind: security-consideration
summary: 'A ''pass'' result does not render a message trustworthy: spam or phishing can legitimately pass authentication checks (e.g., a spammer signing with DKIM from their own domain). MUAs and filters must apply additional reputation or content analysis even after header field scrubbing.'
section: "7.2"
topics:
    - email
    - security
