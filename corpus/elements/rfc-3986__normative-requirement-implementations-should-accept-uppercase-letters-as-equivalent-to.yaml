document: rfc-3986
kind: normative-requirement
summary: Implementations should accept uppercase letters as equivalent to lowercase in scheme names for robustness but should produce only lowercase scheme names. URI scheme specifications must define their scheme names with lowercase letters.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
