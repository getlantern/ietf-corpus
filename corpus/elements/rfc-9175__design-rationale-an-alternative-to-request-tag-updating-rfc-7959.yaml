document: rfc-9175
kind: design-rationale
summary: An alternative to Request-Tag (updating RFC 7959 to require block assembly in sequence-number order) was rejected because many DTLS implementations do not expose sequence numbers and it would still not prevent block-swapping attacks identified in COAP-ATTACKS.
section: "3.7"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
