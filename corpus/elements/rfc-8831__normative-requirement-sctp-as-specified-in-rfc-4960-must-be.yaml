document: rfc-8831
kind: normative-requirement
summary: SCTP as specified in RFC 4960 MUST be used in combination with the partial reliability extension defined in RFC 3758. This provides multiple unidirectional streams, ordered and unordered delivery, and reliable and partially reliable transport.
