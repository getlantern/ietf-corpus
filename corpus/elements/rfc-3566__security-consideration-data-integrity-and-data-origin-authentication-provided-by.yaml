document: rfc-3566
kind: security-consideration
summary: Data integrity and data origin authentication provided by AES-XCBC-MAC-96 are dependent upon the scope of distribution of the secret key; if the key is known only by source and destination, the algorithm provides both properties. Only a party with the identical key can verify the MAC.
section: "1"
topics:
    - crypto
    - ipsec
    - security
