document: rfc-7947
kind: normative-requirement
summary: The MULTI_EXIT_DISC attribute applied to an NLRI UPDATE sent to a route server SHOULD be propagated to other route server clients, and the route server SHOULD NOT modify its value, contrary to RFC 4271 Section 5.1.4.
section: 2.2.3
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
