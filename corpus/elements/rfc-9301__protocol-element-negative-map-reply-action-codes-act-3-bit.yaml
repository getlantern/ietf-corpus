document: rfc-9301
kind: protocol-element
summary: 'Negative Map-Reply Action Codes (ACT, 3-bit field) tell an ITR why an empty Locator-Set was returned and how to handle the Map-Cache entry: (0) No-Action, (1) Natively-Forward, (2) Send-Map-Request, (3) Drop/No-Reason, (4) Drop/Policy-Denied, (5) Drop/Auth-Failure.'
