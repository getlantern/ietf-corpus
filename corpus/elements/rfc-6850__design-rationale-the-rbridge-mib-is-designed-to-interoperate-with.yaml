summary: The RBridge MIB is designed to interoperate with either the IETF Bridge MIBs (BRIDGE-MIB, Q-BRIDGE-MIB) or the IEEE 802.1 Bridge MIBs (IEEE8021-BRIDGE-MIB, IEEE8021-Q-BRIDGE-MIB), because both sets have been widely deployed. Per RFC 4663, IETF transferred Bridge MIBs to IEEE 802.1.
