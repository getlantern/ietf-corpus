document: rfc-6009
kind: protocol-element
summary: The 'notify' envelope-part matches the list of notification conditions (NEVER, SUCCESS, FAILURE, DELAY) associated with the SMTP RCPT TO NOTIFY parameter. Each condition is tested separately, and any match causes the test to succeed; 'NEVER' is never combined with other values.
