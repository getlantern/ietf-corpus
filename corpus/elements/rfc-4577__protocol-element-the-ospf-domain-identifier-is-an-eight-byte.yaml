document: rfc-4577
kind: protocol-element
summary: The OSPF Domain Identifier is an eight-byte BGP Extended Communities attribute (types 0005, 0105, 0205, or legacy 8005) that identifies the OSPF domain of a VPN-IPv4 route. It allows receiving PEs to determine whether a route should be redistributed as an inter-area or AS-external route.
section: 4.2.4
topics:
