document: rfc-3676
kind: protocol-element
summary: The canonical quote indicator is one or more '>' characters at the start of a line. The count of '>' characters defines the quote depth. Space-stuffing means '>>' and '>> ' are semantically equivalent (both depth-2), but '> >' is depth-1 with content '> ...'.
section: "4.5"
