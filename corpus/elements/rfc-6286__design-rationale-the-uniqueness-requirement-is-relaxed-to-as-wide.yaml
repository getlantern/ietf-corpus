document: rfc-6286
kind: design-rationale
summary: The uniqueness requirement is relaxed to AS-wide scope rather than global scope because BGP Identifiers are only operationally significant within an AS for route reflection, aggregation attribution, and collision resolution. The revisions are backward compatible with existing BGP Identifier allocations based on RFC 4271.
section: "3"
topics:
    - bgp
    - routing
