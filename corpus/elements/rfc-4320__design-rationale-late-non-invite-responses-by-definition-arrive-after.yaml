document: rfc-4320
kind: design-rationale
summary: Late non-INVITE responses by definition arrive after the client transaction's Timer F has fired and the transaction has entered the Terminated state, making them indistinguishable from strays; prohibiting proxies from forwarding such responses eliminates the late-response storm.
section: "2.2"
topics:
