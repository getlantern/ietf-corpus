document: rfc-6063
kind: interoperability-note
summary: DSKPP defines an HTTP/1.1 binding using MIME type 'application/dskpp+xml'. Messages are transported via HTTPS POST; the KeyProvTrigger is delivered in an HTTP response that a configured browser hands to the DSKPP Client. The binding requires TLS with server certificate validation per RFC 2818.
section: "7.2"
topics:
    - http
    - security
