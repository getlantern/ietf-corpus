document: rfc-5049
kind: normative-requirement
summary: Any SigComp implementation used for compression of SIP messages MUST conform to RFC 5049 and RFC 3320, and must support the SIP/SDP static dictionary (RFC 3485) and the mechanism for discovering SigComp support at the SIP layer (RFC 3486).
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - security
