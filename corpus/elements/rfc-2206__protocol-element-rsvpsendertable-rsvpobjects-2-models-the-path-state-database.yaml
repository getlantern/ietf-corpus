kind: protocol-element
summary: rsvpSenderTable (rsvpObjects 2) models the Path State Database, indexed by (rsvpSessionNumber, rsvpSenderNumber). Each entry represents a single PATH message and includes addresses, TSpec parameters (rate, peak rate, burst, min/max TU), ADSPEC fields, hop information, refresh interval, policy object, and RowStatus.
