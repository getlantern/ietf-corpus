document: rfc-8182
kind: normative-requirement
summary: Snapshot Files MUST only be used when Delta Files are unavailable or were rejected. When downloading a Snapshot File, the Relying Party MUST verify its hash against the Update Notification File and MUST verify the session_id and serial match.
section: 3.4.3
rfc2119_level: MUST
topics:
    - routing
