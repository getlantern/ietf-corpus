document: rfc-6936
kind: design-rationale
summary: UDP-Lite was evaluated as an alternative but rejected for general Internet tunnel use because it uses a distinct IPv6 Next Header value that nearly all deployed middleboxes (load balancers, NATs, firewalls) do not recognize, making it less deployable than zero-checksum UDP.
section: 2.2.1
topics:
    - udp
    - ip
