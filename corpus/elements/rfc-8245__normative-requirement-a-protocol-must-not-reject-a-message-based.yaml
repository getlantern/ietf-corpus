document: rfc-8245
kind: normative-requirement
summary: A protocol MUST NOT reject a message based on unrecognized TLV types or unrecognized TLV values; it MUST ignore such TLVs or values when processing, and MUST NOT remove or change them if the message is forwarded unchanged.
section: "4.6"
rfc2119_level: MUST NOT
topics:
    - routing
