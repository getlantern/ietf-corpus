document: rfc-2401
kind: normative-requirement
summary: IPsec mandates support for both manual and automated SA and cryptographic key management. The default automated key management protocol is IKE; other automated SA management protocols MAY be employed.
section: "4.6"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
