document: rfc-5865
kind: protocol-element
summary: The VOICE-ADMIT DSCP codepoint is 101100 (binary), assigned from Pool 1 of the dscp-registry. It implements the Admitted Telephony Service Class conforming to the EF PHB at lower speeds and is included in the Real-Time Treatment Aggregate at higher speeds.
