document: rfc-4206
kind: normative-requirement
summary: The IP header for Path messages tunneled over an FA-LSP MUST NOT have the Router Alert option, so the message is IP-routed to the tail-end of the FA-LSP without being intercepted by intermediate nodes as an RSVP message.
section: 6.1.1
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
