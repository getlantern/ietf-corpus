summary: Each targeted application is mapped to specific LDP FEC element types. For example, LDPv4 Remote LFA maps to IPv4 prefix FECs, LDP FEC 129 PW maps to Generalized PWid FEC elements, and mLDP Tunneling maps to P2MP, MP2MP-up, MP2MP-down, HSMP-downstream, and HSMP-upstream FECs.
