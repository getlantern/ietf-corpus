document: rfc-3339
kind: interoperability-note
summary: In time zones other than 'Z', the leap second point is shifted by the zone offset so the leap second occurs at the same instant globally. For example, 1990-12-31T23:59:60Z equals 1990-12-31T15:59:60-08:00.
