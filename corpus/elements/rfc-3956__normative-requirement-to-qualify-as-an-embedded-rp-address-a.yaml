document: rfc-3956
kind: normative-requirement
summary: To qualify as an embedded-RP address, a multicast address MUST have 'flgs' set to 0111 (prefix FF70::/12), 'plen' MUST NOT be 0 (excluding SSM), and 'plen' MUST NOT be greater than 64.
section: "4"
rfc2119_level: MUST
topics:
