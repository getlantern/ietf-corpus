document: rfc-6578
kind: normative-requirement
summary: When sync-level is 'infinite' and a child collection cannot support sync, the server MUST include a DAV:response for that collection with status 403 Forbidden, sent once when first reported. The DAV:error MUST contain either DAV:supported-report or DAV:sync-traversal-supported.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
