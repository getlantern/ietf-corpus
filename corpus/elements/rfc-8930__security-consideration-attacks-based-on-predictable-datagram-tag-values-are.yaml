document: rfc-8930
kind: security-consideration
summary: Attacks based on predictable Datagram_Tag values are possible because only a limited number of values exist and an authenticated network insider can guess valid tags. Pseudorandom Datagram_Tag assignment is RECOMMENDED, and larger tag sizes reduce both guessing probability and accidental reuse.
section: "7"
topics:
