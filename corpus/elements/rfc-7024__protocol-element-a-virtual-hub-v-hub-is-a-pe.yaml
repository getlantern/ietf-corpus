document: rfc-7024
kind: protocol-element
summary: A Virtual Hub (V-hub) is a PE that maintains all routes of a given VPN by importing routes from all other V-hubs, V-spokes, and vanilla PEs of that VPN. A Virtual Spoke (V-spoke) needs to maintain only routes originated by its own connected sites plus VPN-IP default routes from its associated V-hub(s), enabling a two-level hierarchy that reduces per-PE routing state.
section: "1"
topics:
