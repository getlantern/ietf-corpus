document: rfc-3798
kind: interoperability-note
summary: When gatewaying MDN requests into foreign mail systems that lack a separate notification address, if the Disposition-Notification-To address differs from SMTP MAIL FROM, the MDN request SHOULD NOT be gatewayed and SHOULD be silently dropped to avoid unintended behavior.
section: "8.3"
topics:
    - email
