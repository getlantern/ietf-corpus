document: rfc-3986
kind: interoperability-note
summary: The IPv6address grammar in this document does not support IPv6 scoped addressing zone identifiers. The IP-literal syntax includes an IPvFuture rule to accommodate future IP literal address formats, with a version flag distinct from IP version numbers.
section: 3.2.2
topics:
