summary: The Normal Vendor/Organization Specific Extension (NVSE) is a Mobile IP extension with Type=133, a 1-octet Length field, a 2-octet Reserved field, a 4-octet Vendor/Org-ID, a 2-octet Vendor-NVSE-Type, and variable-length Vendor-NVSE-Value.
