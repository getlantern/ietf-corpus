document: rfc-4119
kind: protocol-element
summary: 'The ''usage-rules'' element is a mandatory child of ''geopriv'' and carries policy fields governing how the enclosed location may be used: ''retransmission-allowed'', ''retention-expiry'', ''external-ruleset'' (a URI), and ''note-well'' (human-readable directives). All four subelements are optional within the element, but the element itself is mandatory.'
section: 2.2.2
topics:
    - privacy
    - security
