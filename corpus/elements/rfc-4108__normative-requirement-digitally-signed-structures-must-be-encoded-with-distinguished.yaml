document: rfc-4108
kind: normative-requirement
summary: Digitally signed structures MUST be encoded with Distinguished Encoding Rules (DER). Other structures do not require DER, but use of definite length encoding is strongly RECOMMENDED to minimize bootstrap loader implementation complexity.
section: "1.4"
rfc2119_level: MUST
topics:
    - crypto
    - security
