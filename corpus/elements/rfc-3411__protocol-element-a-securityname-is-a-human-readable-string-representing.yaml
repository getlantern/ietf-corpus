document: rfc-3411
kind: protocol-element
summary: A securityName is a human-readable string representing a principal (the 'who' on whose behalf services are provided). It has a model-independent format and can be used outside a specific Security Model. Model-dependent security IDs (e.g., community names, usernames) are transformed to/from securityNames by the relevant Security Model.
section: 3.2.2
topics:
    - snmp
    - security
