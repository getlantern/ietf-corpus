document: rfc-2531
kind: protocol-element
summary: image-interleave takes token values Stripe or Plane and is used with JBIG (image-coding=JBIG) to indicate color plane interleaving. Plane interleave requires buffering an entire page of image data, placing heavy memory demands on sender or receiver.
section: "3.7"
