document: rfc-9901
kind: wire-format
summary: 'The SD-JWT+KB compact serialization extends the SD-JWT format by appending a Key Binding JWT: `<Issuer-signed JWT>~<D.1>~...~<D.N>~<KB-JWT>`. The two formats are distinguished by whether the final tilde-separated component is empty (SD-JWT) or a valid KB-JWT (SD-JWT+KB).'
