document: rfc-8221
kind: normative-requirement
summary: 'Encryption without authentication MUST NOT be used. IPsec provides three valid combinations: ESP with AEAD cipher, ESP with non-AEAD cipher plus authentication, or ESP with non-AEAD cipher plus AH with authentication.'
