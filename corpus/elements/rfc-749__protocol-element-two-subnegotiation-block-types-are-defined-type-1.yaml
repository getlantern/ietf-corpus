document: rfc-749
kind: protocol-element
summary: 'Two subnegotiation block types are defined: type 1 (IAC SB SUPDUP-OUTPUT 1 <terminal-parameters> IAC SE), sent by the user TELNET process to describe terminal capabilities; and type 2 (IAC SB SUPDUP-OUTPUT 2 n TD1..TDn SCx SCy IAC SE), sent by the server to transmit explicit screen control commands.'
section: "2"
