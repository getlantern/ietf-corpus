document: rfc-9622
kind: protocol-element
summary: The Rendezvous action supports simultaneous peer-to-peer Connection establishment. It listens on Local Endpoint candidates while also trying to establish outward connections to Remote Endpoint candidates, using an ICE-like probing approach (RFC 8445) when multiple candidates exist. The Preconnection.Resolve() action discovers NAT bindings via STUN/TURN before Rendezvous.
section: "7.3"
topics:
    - nat
