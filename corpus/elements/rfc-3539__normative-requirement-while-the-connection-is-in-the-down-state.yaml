document: rfc-3539
kind: normative-requirement
summary: While the connection is in the DOWN state, the AAA client MUST NOT attempt to send further watchdog messages on the connection. However, after the connection is closed, the AAA client continues to periodically attempt to reopen the connection.
section: 3.4.1
rfc2119_level: MUST NOT
