document: rfc-9428
kind: protocol-element
summary: NFC-enabled devices have two types of 6-bit addresses — SSAP (Source Service Access Point) and DSAP (Destination Service Access Point) — to identify service access points. Address values between 0x2 and 0x3f are assignable and can be used for generating IPv6 IIDs.
section: "3.3"
