document: rfc-6551
kind: design-rationale
summary: 'The Node Energy object provides two levels of fidelity: a simple 2-bit node type (mains/battery/scavenger) for straightforward deployments, and a mid-complexity 8-bit E_E percentage field encoding energetic health for both battery-powered (current lifetime vs. desired lifetime) and scavenging nodes (power in vs. power out). This dual approach avoids mandating complex energy accounting across all LLN nodes.'
section: "3.2"
