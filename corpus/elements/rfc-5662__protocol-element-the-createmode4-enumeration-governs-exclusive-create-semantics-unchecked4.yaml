document: rfc-5662
kind: protocol-element
summary: 'The createmode4 enumeration governs exclusive-create semantics: UNCHECKED4=0 and GUARDED4=1 are shared with NFSv4.0; EXCLUSIVE4=2 is deprecated in NFSv4.1; EXCLUSIVE4_1=3 is new and combines a verifier with settable attributes (creatverfattr), replacing EXCLUSIVE4 for non-persistent sessions.'
