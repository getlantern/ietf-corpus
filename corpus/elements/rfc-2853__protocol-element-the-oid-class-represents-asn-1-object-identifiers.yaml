document: rfc-2853
kind: protocol-element
summary: The Oid class represents ASN.1 Object Identifiers used to identify security mechanisms and name types. Instances are immutable and can be constructed from dot-notation strings (e.g., '1.3.6.1.5.6.2') or from DER-encoded byte arrays. getDER() returns the DER encoding; containedIn() tests membership in an Oid array.
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
