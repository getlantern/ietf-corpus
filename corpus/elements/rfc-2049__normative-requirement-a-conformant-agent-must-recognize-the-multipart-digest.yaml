document: rfc-2049
kind: normative-requirement
summary: A conformant agent must recognize the 'multipart/digest' subtype and use 'message/rfc822' (not 'text/plain') as the default media type for body parts inside multipart/digest entities. Unrecognized multipart subtypes must be treated as 'multipart/mixed'.
section: "2"
rfc2119_level: MUST
topics:
    - email
