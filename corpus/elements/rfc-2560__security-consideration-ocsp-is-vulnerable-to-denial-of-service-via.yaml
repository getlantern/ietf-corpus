document: rfc-2560
kind: security-consideration
summary: OCSP is vulnerable to denial-of-service via query floods, exacerbated by the cost of cryptographic signing per response. Unsigned error responses open a secondary DoS vector where an attacker sends false error messages to prevent certificate validation.
