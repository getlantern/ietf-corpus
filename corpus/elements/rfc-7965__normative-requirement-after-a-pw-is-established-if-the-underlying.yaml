document: rfc-7965
kind: normative-requirement
summary: After a PW is established, if the underlying PSN tunnel breaks or operators move PWs to other tunnels, a new Label Mapping message MUST be sent to notify the remote PE. If the new message contains no PSN Tunnel Binding TLV, it declares removal of co-routed/strict constraints.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
