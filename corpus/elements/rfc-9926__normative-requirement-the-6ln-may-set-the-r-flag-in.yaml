document: rfc-9926
kind: normative-requirement
summary: The 6LN MAY set the R flag in the EARO to request prefix redistribution, but the 6LR MUST NOT reregister that prefix to yet another router unless loops are avoided, for example by following a tree structure.
section: "7.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - routing
