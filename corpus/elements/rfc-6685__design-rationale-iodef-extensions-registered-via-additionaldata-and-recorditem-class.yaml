document: rfc-6685
kind: design-rationale
summary: IODEF extensions registered via AdditionalData and RecordItem class extensions should be reviewed by IODEF experts — beyond standard IANA schema review — to ensure compatibility with IODEF and with other existing IODEF extensions. This prevents incompatible or redundant extensions from proliferating in the registry.
section: "1"
topics:
    - registry
    - security
    - process
