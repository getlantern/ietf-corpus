document: rfc-9352
kind: protocol-element
summary: The Maximum End Pop MSD Type (SRH Max End Pop, value 42) signals the maximum number of SIDs in the SRH for which the router can apply PSP or USP flavors. A zero or absent value means PSP/USP are not supported.
