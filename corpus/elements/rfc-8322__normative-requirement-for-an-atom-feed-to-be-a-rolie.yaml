document: rfc-8322
kind: normative-requirement
summary: For an atom:feed to be a ROLIE Feed, it MUST contain only one child atom:category element with scheme='urn:ietf:params:rolie:category:information-type', and this category MUST have an appropriate registered term attribute value.
section: "6.1"
rfc2119_level: MUST
