document: rfc-8941
kind: protocol-element
summary: A Dictionary is an ordered map of key/value pairs where keys are short lowercase strings and values are Items or Inner Lists (optionally parameterized). Implementations MUST provide access by both index and key. Parsers MUST support at least 1024 key/value pairs and keys with at least 64 characters.
section: "3.2"
topics:
    - http
