document: rfc-9866
kind: normative-requirement
summary: A node MUST reset its Trickle timer when LORS changes to GLOBALLY DOWN to expedite crash dissemination. A dedicated Trickle timer for RNFD is RECOMMENDED, with minimal and maximal intervals not smaller than RPL's original DIO Trickle timer intervals.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
