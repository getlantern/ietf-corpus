document: rfc-6865
kind: normative-requirement
summary: The SBN MUST start at 0 for the first source block and MUST be incremented by 1 for each new block. ESI values MUST start at 0 and be managed sequentially, with 0 <= ESI <= k-1 identifying source symbols and k <= ESI <= n-1 identifying repair symbols.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
