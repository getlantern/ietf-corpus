document: rfc-6532
kind: interoperability-note
summary: When embedding or returning internationalized content, senders may choose message/global (preserve content) or down-convert to message/rfc822. Systems unaware of internationalized headers will treat message/global as an unknown attachment, while systems that understand it provide superior functionality.
section: "3.7"
topics:
    - email
