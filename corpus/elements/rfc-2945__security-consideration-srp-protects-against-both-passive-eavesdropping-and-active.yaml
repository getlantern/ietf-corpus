document: rfc-2945
kind: security-consideration
summary: SRP protects against both passive eavesdropping and active dictionary attacks by never transmitting the password or any value that directly reveals it. The private values a and b have constraints similar to Diffie-Hellman private exponents; u should not be shorter than 32 bits.
