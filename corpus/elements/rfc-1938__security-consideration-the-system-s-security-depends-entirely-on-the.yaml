document: rfc-1938
kind: security-consideration
summary: The system's security depends entirely on the non-invertability of the secure hash functions used. MD4 is generally believed to be weaker than MD5. A server supporting multiple hash algorithms is only as secure as its weakest supported algorithm.
section: "10.0"
topics:
    - security
    - crypto
