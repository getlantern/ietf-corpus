document: rfc-3039
kind: security-consideration
summary: The associated private key for a Qualified Certificate must be unique to the subject and maintained under the subject's sole control. A CA should not issue a Qualified Certificate if the means to use the private key is not protected against unintended usage, implying the CA must have knowledge about the subject's cryptographic module.
section: "4"
topics:
    - pkix
    - security
    - crypto
