document: rfc-7795
kind: security-consideration
summary: Since PW redundancy is provided on S-PE nodes of MS-PWs, the security mechanisms defined in RFC 4447, RFC 6073, and RFC 6478 MUST be implemented to ensure S-PE nodes and the messages sent and received by them are not compromised.
