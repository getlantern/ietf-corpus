document: rfc-4303
kind: normative-requirement
summary: For unicast and single-sender multicast SAs, the sender MUST increment the Sequence Number field for every transmitted packet. If anti-replay is enabled, the sender MUST NOT transmit a packet that would cause the sequence number counter to cycle; a new SA (and new key) MUST be established before the 2^32nd packet is sent.
section: "2.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
