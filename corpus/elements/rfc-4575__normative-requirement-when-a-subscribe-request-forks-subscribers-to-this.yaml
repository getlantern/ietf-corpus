document: rfc-4575
kind: normative-requirement
summary: When a SUBSCRIBE request forks, subscribers to this package MUST NOT establish more than a single SIP dialog as a result. Detailed information from cascaded foci requires individual SUBSCRIBE dialogs with each focus.
section: "3.8"
rfc2119_level: MUST NOT
