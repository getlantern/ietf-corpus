document: rfc-3815
kind: interoperability-note
summary: The MPLS-LDP-STD-MIB imports IndexInteger and IndexIntegerNextFree from DIFFSERV-MIB (RFC 3289), and InetAddressPrefixLength, InetAddressType, InetAddress, and InetPortNumber from INET-ADDRESS-MIB (RFC 3291), making it dependent on these external MIB modules.
