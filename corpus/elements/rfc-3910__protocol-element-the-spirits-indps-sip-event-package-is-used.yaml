document: rfc-3910
kind: protocol-element
summary: The 'spirits-INDPs' SIP event package is used for events corresponding to IN detection points in the cellular or wireline PSTN. The Event request header MUST be set to 'spirits-INDPs' and Allow-Events MUST include this token for entities supporting IN detection points.
section: 5.3.2
topics:
    - sip
    - realtime
