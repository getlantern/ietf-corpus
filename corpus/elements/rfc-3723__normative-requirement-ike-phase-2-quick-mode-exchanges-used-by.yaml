document: rfc-3723
kind: normative-requirement
summary: IKE Phase 2 Quick Mode exchanges used by IP block storage implementations MUST explicitly carry the Identity Payload fields (IDci and IDcr). Each Phase 2 IDci and IDcr SHOULD carry a single IP address and SHOULD NOT use IP Subnet or IP Address Range formats.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
