document: rfc-8681
kind: wire-format
summary: The Explicit Source FEC Payload ID is a 32-bit unsigned integer (ESI) in network byte order, appended to each FEC Source Packet. The ESI identifies the first source symbol of the corresponding ADUI and wraps to 0 after reaching 2^32-1.
section: 4.1.2
