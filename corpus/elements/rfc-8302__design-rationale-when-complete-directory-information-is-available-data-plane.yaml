document: rfc-8302
kind: design-rationale
summary: When complete directory information is available, data-plane learning of end-station MAC addresses is not only unnecessary but could be harmful if frames with forged source addresses are learned. TRILL already provides an option to disable data-plane learning from source MAC of end-station frames.
section: "2"
topics:
