document: rfc-6452
kind: interoperability-note
summary: The three code point GeneralCategory changes between Unicode 5.2 and 6.0 are non-backward-compatible changes as described in Section 5.1 of RFC 5892. The derived property value differs depending on whether property definitions from Unicode 5.2 or 6.0 are used.
