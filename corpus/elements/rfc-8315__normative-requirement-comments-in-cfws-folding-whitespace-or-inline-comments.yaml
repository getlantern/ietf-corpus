document: rfc-8315
kind: normative-requirement
summary: Comments in CFWS (folding whitespace or inline comments) SHOULD NOT be generated in Cancel-Lock or Cancel-Key header fields because they can cause interoperability problems, but MUST be accepted by implementations.
