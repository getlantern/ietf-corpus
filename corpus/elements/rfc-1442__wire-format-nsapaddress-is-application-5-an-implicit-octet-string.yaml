kind: wire-format
summary: NsapAddress is APPLICATION 5, an IMPLICIT OCTET STRING of SIZE (1 | 4..21). The first octet contains the NSAP length (0..20); a single zero-valued octet encodes the 'default NSAP'. It is a tagged type for historical reasons.
