document: rfc-6481
kind: normative-requirement
summary: The publication repository MUST be available using rsync (RFC 5781). Support of additional retrieval mechanisms is the choice of the repository operator, but supported mechanisms MUST be consistent with the accessMethod element values in the SIA of the associated CA or EE certificate.
section: "3"
rfc2119_level: MUST
