document: rfc-7601
kind: security-consideration
summary: Authentication-Results header fields found within message/rfc822 MIME attachments SHOULD be ignored by MUAs, and SHOULD be removed when extracting encapsulated messages to separate mail stores, to prevent improper interpretation outside the original trust context.
