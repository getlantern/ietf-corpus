document: rfc-9491
kind: design-rationale
summary: The two integration scenarios (NSH-based SFC with SR transport, and SR-based SFC with NSH service plane) can be combined to support specific deployment requirements. This provides operators flexibility to use whichever transport technology makes sense in different parts of their network while maintaining an end-to-end NSH service plane.
