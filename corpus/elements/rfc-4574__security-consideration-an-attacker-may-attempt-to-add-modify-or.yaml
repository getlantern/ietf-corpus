document: rfc-4574
kind: security-consideration
summary: An attacker may attempt to add, modify, or remove 'label' attributes from a session description, causing the application to behave in a non-desirable way. Integrity protection (e.g., S/MIME for SIP-carried SDP) is strongly recommended to counter this threat.
