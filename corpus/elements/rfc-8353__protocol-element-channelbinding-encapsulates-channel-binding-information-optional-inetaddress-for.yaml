document: rfc-8353
kind: protocol-element
summary: ChannelBinding encapsulates channel-binding information (optional InetAddress for initiator/acceptor and application-specific byte array) to bind a GSS-API context to a specific communications channel. The mechanism computes a MIC over the concatenated binding data and includes it in the context-establishment token.
section: "7.6"
topics:
    - security
    - crypto
