document: rfc-7673
kind: normative-requirement
summary: If the TLSA response is 'secure' and usable, the client MUST use TLS when connecting to the target server. If the TLSA response is 'bogus' or 'indeterminate', the client MUST NOT connect to that target server.
section: "3.4"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
