document: rfc-8422
kind: security-consideration
summary: Elliptic curve selection is a critical security consideration. As a general principle, curves with less algebraic structure are more conservative (random curves over F_p with random p are preferred over special-form or Koblitz curves). Wide adoption of a single curve amplifies the impact of a potential cryptanalytic break of that curve.
