document: rfc-6051
kind: normative-requirement
summary: The RTP timestamp-to-NTP mapping in RTCP SR packets MUST be consistent with the mapping used in the RTP header extensions. Receivers are RECOMMENDED to sanity-check both sources and discard outliers, since broken RTP translators can corrupt either.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
