document: rfc-9010
kind: security-consideration
summary: When the ROVR field length in a Target option is unknown, the implementation must pass the option upward unchanged, creating a potential covert channel via DAO messages. Implementations SHOULD notify the network management system when an unknown ROVR size is received.
section: "11"
topics:
    - security
    - routing
