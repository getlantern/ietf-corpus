document: rfc-8641
kind: interoperability-note
summary: Before starting a subscription, the receiver is expected to know the publisher's YANG library information (schemas, modules, revisions, features, deviations) as defined in RFC 8525. If the YANG library changes at runtime, the yang-library-change notification informs the subscriber, and subscriptions may need to be updated accordingly.
section: 4.4.5
topics:
    - yang
    - netconf
