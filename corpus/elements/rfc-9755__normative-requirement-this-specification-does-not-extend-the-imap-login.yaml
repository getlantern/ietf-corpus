document: rfc-9755
kind: normative-requirement
summary: This specification does not extend the IMAP LOGIN command to support UTF-8 usernames or passwords. Whenever a client needs to use UTF-8 credentials, it MUST use the IMAP AUTHENTICATE command, which is already capable of passing UTF-8 usernames and credentials.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
