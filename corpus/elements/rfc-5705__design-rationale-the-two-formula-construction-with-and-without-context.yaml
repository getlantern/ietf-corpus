document: rfc-5705
kind: design-rationale
summary: The two-formula construction (with and without context) allows interoperability with older exporter-type constructions that do not use context values, such as EAP-TTLSv0 (RFC 5281). The context_value_length field in the PRF input is what distinguishes the two modes.
