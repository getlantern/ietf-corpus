document: rfc-5140
kind: wire-format
summary: The Carrier attribute (TRIP Type Code 20) is a variable-length sequence of carrier identifiers, each a 1-octet Length plus a Value field carrying 'global-cic' or 'local-cic' per RFC 4694. For 'local-cic', the phonedigit-hex and cic-context parts are separated by ';'. A Length of 0 means the gateway can terminate ALL carriers.
section: 4.6.1
topics:
    - realtime
    - voip
