document: rfc-3608
kind: normative-requirement
summary: If the UA refreshes the registration, the stored Service-Route is updated from the latest 200-class response; if there is no Service-Route in the response, the UA clears any previously stored service route for that address-of-record. If re-registration is refused or the registration expires and the UA chooses not to re-register, the UA SHOULD discard any stored service route.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
