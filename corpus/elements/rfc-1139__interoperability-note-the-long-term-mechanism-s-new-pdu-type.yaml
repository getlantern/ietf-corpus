document: rfc-1139
kind: interoperability-note
summary: The long term mechanism's new PDU type codes (ERQ=30, ERP=31) are not compatible with the existing ISO 8473 standard and will not be forwarded by routers that do not implement the new types. This is acceptable only if ISO adopts the mechanism as an addendum.
