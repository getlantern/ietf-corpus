document: rfc-2233
kind: state-machine
summary: 'When ifAdminStatus transitions to up, ifOperStatus MUST transition to: up if ready to send/receive; lowerLayerDown if blocked by a lower-layer interface; dormant if operable but awaiting external events; down if a fault is detected; unknown if state cannot be determined; testing if tests are in progress; or remain notPresent if hardware components are missing.'
