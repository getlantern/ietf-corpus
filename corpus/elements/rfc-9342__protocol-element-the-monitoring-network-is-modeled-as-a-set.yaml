document: rfc-9342
kind: protocol-element
summary: The monitoring network is modeled as a set of nodes (measurement points, MPs) and directed arcs (connections between MPs). Only measurement points and links where traffic has flowed need to be represented in the graph. Each monitoring point maintains a packet counter per marking period for the monitored flow.
