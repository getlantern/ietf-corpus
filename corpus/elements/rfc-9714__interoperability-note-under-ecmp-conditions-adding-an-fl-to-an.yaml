document: rfc-9714
kind: interoperability-note
summary: Under ECMP conditions, adding an FL to an existing flow may cause that flow to take a different path (the same problem seen with Synonymous Flow Labels per RFC 8957). Operators can resolve this by applying entropy labels (RFC 6790) or adding FL to all flows.
section: "7"
topics:
