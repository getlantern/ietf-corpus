document: rfc-3335
kind: design-rationale
summary: EDI envelope headers (ISA/IEA for X12; UNA/UNB/UNZ for EDIFACT) are encrypted and remain invisible in the MIME package. Routing optimization from VANs to the Internet would require future work to expose envelope information, but is outside this specification's scope.
section: 2.3.1
topics:
    - email
    - security
    - privacy
