document: rfc-5061
kind: registry
summary: This document registers two new SCTP chunk types (ASCONF 0xC1, ASCONF-ACK 0x80), six new parameter types (0x8008 Supported Extensions; 0xC001–0xC006), five new error cause codes (0x00A0–0x00A4), and a new IANA registry for 32-bit Adaptation Layer Indication code points, assigned via IETF Consensus.
