document: rfc-5990
kind: interoperability-note
summary: 'A recipient MAY identify an RSA public key using the rsaEncryption OID (same as PKCS #1 v1.5), in which case willingness to use RSA-KEM is not implied; it may be signaled separately via SMIMECapabilities. Only by using id-rsa-kem in the certificate does the recipient restrict the key to RSA-KEM use.'
section: "2.3"
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
