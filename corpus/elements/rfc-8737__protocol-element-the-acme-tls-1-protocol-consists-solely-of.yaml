document: rfc-8737
kind: protocol-element
summary: The acme-tls/1 protocol consists solely of a TLS handshake transmitting the required validation information; it does not carry application data. It does not require a valid certificate signature nor a fully completed TLS handshake, though servers MAY withhold authorization if these fail.
