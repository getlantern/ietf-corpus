document: rfc-3443
kind: normative-requirement
summary: When multiple sequential Pop operations are performed, the iTTL computed during the previous Pop is used as the TTL for subsequent labels being popped; the TTL contained in the subsequent label is ignored and replaced with the previously computed iTTL.
section: "3.4"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
