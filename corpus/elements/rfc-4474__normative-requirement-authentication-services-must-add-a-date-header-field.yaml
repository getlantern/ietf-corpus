document: rfc-4474
kind: normative-requirement
summary: Authentication services MUST add a Date header field to SIP requests if one is not already present, and MUST add a Content-Length header field if one is not already present, to assist verifiers in accurately reconstructing the signed content.
section: "5"
rfc2119_level: MUST
