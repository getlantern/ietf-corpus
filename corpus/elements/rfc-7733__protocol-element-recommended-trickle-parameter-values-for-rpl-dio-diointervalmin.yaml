summary: 'Recommended Trickle parameter values for RPL DIO: DIOIntervalMin=4 (16 ms), DIOIntervalDoublings=14, DIORedundancyConstant=1. At steady state, DIO sending interval increases to ~4.37 minutes; absence of DIOs for >10 minutes signals connectivity loss.'
