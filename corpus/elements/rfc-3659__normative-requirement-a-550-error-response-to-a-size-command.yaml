document: rfc-3659
kind: normative-requirement
summary: A 550 error response to a SIZE command MUST NOT be taken by the client as an indication that the file cannot be transferred in the current MODE and TYPE, as a server may generate this error for other reasons.
section: "4.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
