document: rfc-9203
kind: security-consideration
summary: Sharing a single OSCORE Input Material across multiple RSs allows those RSs to impersonate the client to one another and impersonate each other's RS to the client. Similarly, sharing a Master Secret across multiple clients enables client impersonation attacks.
section: "7"
topics:
    - security
    - crypto
