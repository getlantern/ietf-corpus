document: rfc-7172
kind: design-rationale
summary: The FGL label space is flat and separate from the VL (C-VLAN) space. C-VLAN IDs on native frames are stripped at ingress and mapped to FGL per-port, allowing the same FGL to correspond to different C-VLANs on different ports or links, enabling flexible multi-tenant isolation.
section: "3"
topics:
