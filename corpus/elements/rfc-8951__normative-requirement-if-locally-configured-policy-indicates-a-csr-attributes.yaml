document: rfc-8951
kind: normative-requirement
summary: If locally configured policy indicates a CSR Attributes Response is to be provided, the server response MUST include an HTTP 200 response code. An HTTP 204 or 404 indicates no CSR Attributes Response is available.
section: "4"
rfc2119_level: MUST
