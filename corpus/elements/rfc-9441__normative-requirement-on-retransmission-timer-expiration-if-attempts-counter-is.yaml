document: rfc-9441
kind: normative-requirement
summary: On Retransmission Timer expiration, if Attempts counter is strictly less than MAX_ACK_REQUESTS the sender MUST send either the All-1 SCHC Fragment or a SCHC ACK REQ with W corresponding to the last window; otherwise, the sender MUST send a SCHC Sender-Abort.
section: 3.2.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
