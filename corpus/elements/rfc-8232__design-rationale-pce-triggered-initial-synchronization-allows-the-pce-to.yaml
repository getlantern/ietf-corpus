document: rfc-8232
kind: design-rationale
summary: PCE-Triggered Initial Synchronization allows the PCE to control the timing of initial State Synchronization to avoid overloading limited-bandwidth control channels (e.g., in-band overhead in optical transport networks) when a large amount of state must be synchronized upon session restart.
