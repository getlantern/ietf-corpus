document: rfc-7653
kind: design-rationale
summary: OPTION_LQ_BASE_TIME uses absolute time anchored to January 1, 2000 UTC (not Unix epoch) so that requestors can pass server-context timestamps back in OPTION_LQ_START_TIME without needing to know or correct for clock skew between requestor and server.
section: "8.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
