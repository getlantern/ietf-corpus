document: rfc-5951
kind: protocol-element
summary: The Management Communication Channel (MCC) is a Communication Channel (CCh) dedicated for management plane communications between MPLS-TP NEs and between NEs and Operations Systems. The MCC is logically distinct from the Signaling Communication Channel (SCC) used for control plane communications.
section: "1.1"
topics:
