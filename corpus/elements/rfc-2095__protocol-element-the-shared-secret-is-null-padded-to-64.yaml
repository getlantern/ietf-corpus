document: rfc-2095
kind: protocol-element
summary: The shared secret is null-padded to 64 bytes for use as the HMAC key. If the shared secret exceeds 64 bytes, the MD5 digest of the secret is used as a 16-byte input to the keyed MD5 calculation.
