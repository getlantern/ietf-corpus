document: rfc-6816
kind: normative-requirement
summary: There MUST be exactly one source symbol per ADUI (and therefore per ADU), one repair symbol per FEC repair packet, one source block per ADU block, and G MUST be equal to 1 (one encoding symbol per group).
section: "4.1"
rfc2119_level: MUST
