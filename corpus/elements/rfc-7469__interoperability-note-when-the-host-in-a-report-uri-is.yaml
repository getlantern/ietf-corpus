document: rfc-7469
kind: interoperability-note
summary: When the host in a report-uri is itself a Known Pinned Host, UAs MUST perform Pin Validation for that report-uri connection; similarly, HSTS MUST be applied if the report-uri host is a Known HSTS Host. This prevents report delivery from bypassing security policies.
section: 2.1.4
topics:
    - http
    - security
    - tls
