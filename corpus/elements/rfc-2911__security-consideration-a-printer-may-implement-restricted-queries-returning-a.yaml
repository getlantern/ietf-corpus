document: rfc-2911
kind: security-consideration
summary: A Printer MAY implement Restricted Queries, returning a subset of attribute values to unauthorized requesters. The 'job-originating-user-name' attribute supports access control so operators can view all jobs while regular users are restricted to their own. Operations by operators and administrators require elevated privilege verification.
section: "8.4"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
