document: rfc-6396
kind: protocol-element
summary: 'TABLE_DUMP_V2 adds 4-byte ASN support, full BGP multiprotocol extension support, a PEER_INDEX_TABLE for space efficiency, and allows a single MRT record per NLRI entry. Subtypes are: PEER_INDEX_TABLE (1), RIB_IPV4_UNICAST (2), RIB_IPV4_MULTICAST (3), RIB_IPV6_UNICAST (4), RIB_IPV6_MULTICAST (5), RIB_GENERIC (6).'
section: "4.3"
topics:
