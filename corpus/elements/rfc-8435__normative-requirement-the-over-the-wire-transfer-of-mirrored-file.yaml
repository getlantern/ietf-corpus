document: rfc-8435
kind: normative-requirement
summary: The over-the-wire transfer of mirrored file contents MUST appear identical across all mirrors. Client-side mirroring requires the client to ensure modifications are made on all copies of layout segments it receives in the layout.
section: "8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
