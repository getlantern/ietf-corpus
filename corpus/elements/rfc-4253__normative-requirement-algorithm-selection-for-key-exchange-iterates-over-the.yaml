document: rfc-4253
kind: normative-requirement
summary: Algorithm selection for key exchange iterates over the client's kex_algorithms and picks the first that the server also supports (with compatible host key capabilities). If no matching algorithm is found, both sides MUST disconnect.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
