document: rfc-3202
kind: design-rationale
summary: Three data collection methods are supported — remote polling of free-running counters in frsldPvcDataTable, built-in sampling via frsldPvcSampleTable/frsldSmplCtrlTable, and user history (RFC 2021) — to accommodate devices that support only a subset. This avoids mandating a single collection architecture.
section: 3.6.6
topics:
