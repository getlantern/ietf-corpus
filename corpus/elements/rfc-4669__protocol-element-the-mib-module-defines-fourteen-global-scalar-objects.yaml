summary: The MIB module defines fourteen global scalar objects (radiusAuthServIdent, radiusAuthServUpTime, radiusAuthServResetTime, radiusAuthServConfigReset, and ten total-counter objects) plus a per-client table. The scalars track server identity, uptime, reset time, and aggregate packet counts across all clients.
