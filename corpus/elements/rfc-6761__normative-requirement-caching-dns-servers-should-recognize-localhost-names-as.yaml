document: rfc-6761
kind: normative-requirement
summary: Caching DNS servers SHOULD recognize 'localhost.' names as special and SHOULD NOT attempt to resolve them via authoritative servers; instead they SHOULD generate an immediate positive response with the IP loopback address for address queries, and immediate negative responses for all other query types.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
