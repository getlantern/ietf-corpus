document: rfc-3055
kind: design-rationale
summary: pintServerUserIdName is defined as the UserId and must be unique across multiple PINT servers and gateways. Uniqueness can be achieved by appending clientId to the UserId string; the SessionId can then be a combination of this new UserId and a timestamp.
section: "4"
