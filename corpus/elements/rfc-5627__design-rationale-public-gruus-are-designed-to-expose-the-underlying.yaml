document: rfc-5627
kind: design-rationale
summary: Public GRUUs are designed to expose the underlying AOR because it allows call logs and user interfaces to present meaningful identifiers to users, and because RFC 3261 URI equality rules (which ignore unknown parameters) make the public GRUU 'look like' the AOR to systems that don't understand GRUU, easing backward compatibility.
section: 3.1.1
topics:
    - sip
