document: rfc-5661
kind: protocol-element
summary: Sessions provide a per-request client context and robust reply protection for non-idempotent requests. Almost all NFSv4.1 server and callback requests are performed within a session; sessions are associated with a client ID at creation and all requests on a session renew the client's lease.
section: "2.10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
