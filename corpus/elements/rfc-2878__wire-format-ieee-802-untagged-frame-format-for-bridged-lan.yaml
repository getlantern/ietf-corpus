document: rfc-2878
kind: wire-format
summary: 'IEEE 802 Untagged Frame format for bridged LAN traffic over PPP: begins with HDLC FLAG, Address and Control, PPP Protocol (0x0031), a flags/pads/MAC-Type byte, Destination MAC Address (6 octets), Source MAC Address (6 octets), Length/Type (2 octets), LLC data, optional LAN FCS (4 octets), optional pad, and Frame FCS. The F flag indicates LAN FCS presence; the Z flag indicates IEEE 802.3 zero-fill padding is required.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
