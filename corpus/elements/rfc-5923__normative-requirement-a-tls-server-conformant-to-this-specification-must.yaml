document: rfc-5923
kind: normative-requirement
summary: A TLS server conformant to this specification MUST request a client certificate (mutual TLS). If the client does not present a certificate, the server MUST proceed as if the "alias" parameter was not present and MUST NOT update the alias table.
section: "9.2"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - pkix
    - security
