document: rfc-5860
kind: interoperability-note
summary: When MPLS-TP is run with IP routing and forwarding capabilities, it MUST be possible to operate existing IP/MPLS and PW OAM protocols such as LSP-Ping (RFC 4379), MPLS-BFD, VCCV (RFC 5085), and VCCV-BFD, ensuring backward compatibility with deployed OAM toolsets.
section: 2.1.5
topics:
