document: rfc-8299
kind: protocol-element
summary: QoS is configured at both site and site-network-access levels via a `qos` container. It includes a `qos-classification-policy` with rules matched by flow (DSCP, dot1p, IPv4/IPv6 prefixes, L4 ports, protocol field) or application (identityref), and a `qos-profile` that references either a provider-defined standard profile or a custom set of classes with rate-limit, latency, jitter, and bandwidth guarantees.
section: 6.12.3
topics:
