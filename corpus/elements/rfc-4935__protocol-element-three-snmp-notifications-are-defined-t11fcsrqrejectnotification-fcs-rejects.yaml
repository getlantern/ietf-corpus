document: rfc-4935
kind: protocol-element
summary: 'Three SNMP notifications are defined: t11FcsRqRejectNotification (FCS rejects a request; carries t11FamLocalSwitchWwn, reason code, reason explanation, vendor code), t11FcsDiscoveryCompleteNotify (discovery range completed; carries t11FcsFabricDiscoveryRangeLow), and t11FcsMgmtAddrChangeNotify (IE management address changed; carries t11FcsMgmtAddrChangeFabricIndex and t11FcsMgmtAddrChangeIeName).'
