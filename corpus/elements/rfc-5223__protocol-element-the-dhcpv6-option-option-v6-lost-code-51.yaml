kind: protocol-element
summary: The DHCPv6 option OPTION_V6_LOST (code 51) carries a DNS FQDN for LoST server discovery. The format is a 2-byte option code, 2-byte option-length, followed by the LoST Server Domain Name in RFC 1035 encoding.
