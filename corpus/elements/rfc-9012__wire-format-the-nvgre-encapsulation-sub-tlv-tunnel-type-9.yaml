document: rfc-9012
kind: wire-format
summary: 'The NVGRE Encapsulation sub-TLV (tunnel type 9) has the identical 12-octet structure as the VXLAN sub-TLV: Flags (V, M, R bits), 3-octet VN-ID (used as the VSID), 6-octet MAC Address, and 2 reserved octets.'
