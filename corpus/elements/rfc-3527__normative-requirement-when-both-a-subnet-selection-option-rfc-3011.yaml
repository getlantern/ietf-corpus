document: rfc-3527
kind: normative-requirement
summary: When both a subnet-selection option (RFC 3011) and a link-selection sub-option are present in a packet, the information in the link-selection sub-option MUST be used to control IP address allocation in preference to the subnet-selection option.
section: "3"
rfc2119_level: MUST
topics:
