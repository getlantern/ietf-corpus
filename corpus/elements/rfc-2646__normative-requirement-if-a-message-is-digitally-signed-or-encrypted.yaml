document: rfc-2646
kind: normative-requirement
summary: If a message is digitally signed or encrypted, the message SHOULD be prepared for transmission (including soft line breaks, space-stuffing, and QP encoding) before signing or encrypting. On receipt, signature verification or decryption SHOULD occur before QP decoding and removal of flowed formatting.
section: "4.6"
rfc2119_level: SHOULD
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
