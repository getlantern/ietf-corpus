document: rfc-9048
kind: normative-requirement
summary: When a privacy-friendly identifier used only once is employed in an EAP-AKA' exchange, the EAP-AKA' peer MUST NOT use a pseudonym provided in that exchange in subsequent exchanges more than once.
section: "5.2"
rfc2119_level: MUST NOT
topics:
