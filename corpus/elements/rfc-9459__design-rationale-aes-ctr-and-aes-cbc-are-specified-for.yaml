document: rfc-9459
kind: design-rationale
summary: AES-CTR and AES-CBC are specified for COSE because there are situations where a separate mechanism such as a digital signature provides integrity protection, making an AEAD algorithm unnecessary. The IETF SUIT WG software manifest is cited as a primary example where a digital signature is always present.
