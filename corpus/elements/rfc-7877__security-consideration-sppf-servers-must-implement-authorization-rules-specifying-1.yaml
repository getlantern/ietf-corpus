document: rfc-7877
kind: security-consideration
summary: SPPF servers must implement authorization rules specifying (1) which Registrars are authorized to create/modify/delete each SPPF object type for a given Registrant, and (2) which Registrars are authorized to view/get each type. These rules are mandatory for safe operation but are a matter of local policy.
section: "9.2"
topics:
    - security
