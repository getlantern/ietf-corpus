document: rfc-9692
kind: interoperability-note
summary: 'When local and remote neighbors run different address families, RIFT falls back to the intersection: a dual-stack local node adjacent to an IPv6-only remote will form a ThreeWay adjacency and exchange TIEs over IPv6 only. If IPv4 and IPv6 LIEs advertise conflicting _ipv4_forwarding_capable_ flags, protocol behavior is unspecified. Tables 1 and 2 in Section 6.2 enumerate all combinations.'
section: "6.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
