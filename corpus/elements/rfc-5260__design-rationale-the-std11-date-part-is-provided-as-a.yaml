document: rfc-5260
kind: design-rationale
summary: The 'std11' date-part is provided as a way to obtain date/time values in a format suitable for inclusion in email header fields, not for comparison. The wide range of possible syntaxes makes std11 a poor choice for comparisons, though i;ascii-casemap must be used if comparison is attempted.
section: "4.3"
topics:
    - email
