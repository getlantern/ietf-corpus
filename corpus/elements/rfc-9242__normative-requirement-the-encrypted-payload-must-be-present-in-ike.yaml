document: rfc-9242
kind: normative-requirement
summary: The Encrypted payload MUST be present in IKE_INTERMEDIATE messages, and payloads containing large amounts of data MUST be placed inside it to allow IKE fragmentation to take place.
section: "3.2"
rfc2119_level: MUST
