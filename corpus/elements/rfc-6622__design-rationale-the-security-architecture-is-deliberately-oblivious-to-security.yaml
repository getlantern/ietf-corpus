document: rfc-6622
kind: design-rationale
summary: The security architecture is deliberately 'oblivious to security' at the base protocol layer, allowing extensions to reject messages as 'badly formed' or 'insecure'. This reflects that MANET deployment domains have varying security requirements and a one-size-fits-all approach is inappropriate.
section: "4"
topics:
