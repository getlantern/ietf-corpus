document: rfc-2879
kind: protocol-element
summary: CIELAB color depth tags (CIELAB-L-depth, CIELAB-a-depth, CIELAB-b-depth; Integer >0) indicate the number of distinct representable values for each L*, a*, b* component. CIELAB gamut tags (CIELAB-{L,a,b}-{min,max}) indicate the supported range of color component values.
section: "3.6"
