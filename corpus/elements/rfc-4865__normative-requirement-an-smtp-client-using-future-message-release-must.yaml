document: rfc-4865
kind: normative-requirement
summary: An SMTP client using Future Message Release MUST include exactly one hold-param (either HOLDFOR or HOLDUNTIL) with the MAIL command; the absence of this parameter implies no default value.
section: "4.1"
rfc2119_level: MUST
topics:
