document: rfc-5003
kind: design-rationale
summary: AII Type 2 permits varying levels of AII summarization, reducing the scaling burden on AII distribution mechanisms (e.g., MP-BGP) and PE memory. Without aggregation, individual AII values could number in the tens of thousands or more and would need to be distributed or configured on all local PEs.
section: "3.2"
topics:
