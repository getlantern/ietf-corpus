summary: 'The ''ietf-tls-common'' module exposes two protocol-accessible nodes: the read-only ''supported-algorithms'' container (feature algorithm-discovery) listing cipher suites supported by the device, and the ''generate-asymmetric-key-pair'' RPC (feature asymmetric-key-pair-generation) for on-device key generation with cleartext, encrypted, or hidden output options.'
