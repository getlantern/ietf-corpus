summary: MPLS-over-UDP uses destination port 6635 for plain MPLS payloads and port 6636 for MPLS-over-UDP utilizing DTLS, per RFC 7510; IGP dynamic port negotiation mechanisms (ISIS-ENCAP, OSPF-ENCAP) may override these to a Dynamic Port.
