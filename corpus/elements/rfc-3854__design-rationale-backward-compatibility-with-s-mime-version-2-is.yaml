document: rfc-3854
kind: design-rationale
summary: Backward compatibility with S/MIME version 2 is not a requirement because no existing X.400 implementations are believed to support S/MIME v2, and signed interoperability between X.400 and MIME S/MIME v2 systems is not easily achievable.
