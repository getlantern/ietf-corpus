document: rfc-6591
kind: interoperability-note
summary: 'This extension overrides several base ARF field requirements: Authentication-Results (OPTIONAL in ARF) becomes MUST; the third MIME part (optional in the multipart/report base spec) becomes MUST; and Reported-Domain (OPTIONAL in ARF) becomes MUST when the value is available.'
