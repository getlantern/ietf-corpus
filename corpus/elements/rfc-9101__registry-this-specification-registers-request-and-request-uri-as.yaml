document: rfc-9101
kind: registry
summary: This specification registers 'request' and 'request_uri' as OAuth authorization request parameters, and also registers JWT claims 'iss', 'sub', 'aud', 'exp', 'nbf', 'iat', and 'jti' in the OAuth Parameters registry to prevent future OAuth extensions from reusing them with different meanings.
section: "9.1"
topics:
