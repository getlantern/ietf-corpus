document: rfc-3673
kind: protocol-element
summary: The attribute description "+" (ASCII 43) in the list of attributes in a Search Request signifies a request for the return of all operational attributes. This extends LDAPv3 to allow clients to discover which operational attributes are present in an entry.
section: "2"
