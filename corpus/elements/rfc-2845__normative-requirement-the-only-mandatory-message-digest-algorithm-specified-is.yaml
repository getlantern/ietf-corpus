document: rfc-2845
kind: normative-requirement
summary: The only mandatory message digest algorithm specified is HMAC-MD5 (per RFC1321 and RFC2104). Implementations MUST implement HMAC-MD5 for interoperability; other algorithms may be defined later but MUST be registered with IANA.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
    - crypto
    - security
