document: rfc-6015
kind: interoperability-note
summary: The P bit, X bit, and CC field in the repair packet RTP header carry XOR-derived values and may cause failures during RTP header validity checks as specified in RFC 3550. RFC 5109 fixed this behavior; this document retains it for legacy compatibility, and implementations must be aware of this potential issue.
section: 1.3.2
topics:
    - rtp
    - realtime
