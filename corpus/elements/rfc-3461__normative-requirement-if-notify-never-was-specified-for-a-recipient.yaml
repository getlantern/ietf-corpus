document: rfc-3461
kind: normative-requirement
summary: If NOTIFY=NEVER was specified for a recipient, a DSN MUST NOT be issued regardless of delivery outcome. When relaying to a non-conforming server with NOTIFY=NEVER, the client MAY use a separate SMTP transaction with an empty reverse-path to prevent DSN generation by the downstream MTA.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
