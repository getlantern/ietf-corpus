document: rfc-7050
kind: protocol-element
summary: Connectivity checks against an NSP-based Pref64::/n use ICMPv6 Echo Requests sent to an IPv6 address synthesized from the NAT64 FQDN's A record IPv4 address. The node SHALL retransmit up to three times (at t=0, t+1s, t+3s) before declaring the prefix non-functional.
section: "3.2"
topics:
    - ip
    - v6ops
    - nat
