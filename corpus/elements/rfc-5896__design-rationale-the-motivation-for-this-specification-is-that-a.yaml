document: rfc-5896
kind: design-rationale
summary: The motivation for this specification is that a central authority (such as a Kerberos KDC setting OK-AS-DELEGATE) is often in a better position than the client application to determine which services should receive delegated credentials, allowing the client to delegate if and only if policy recommends it.
section: "1"
topics:
    - security
