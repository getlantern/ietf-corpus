document: rfc-5865
kind: security-consideration
summary: The VOICE-ADMIT service requires a signaling protocol (e.g., RSVP) with capabilities to identify users as individuals or corporate entities and assert a policy level (normal, routine, priority). Without adequately strong proof of identity or with improperly written policies, this capability is subject to abuse by malicious actors.
