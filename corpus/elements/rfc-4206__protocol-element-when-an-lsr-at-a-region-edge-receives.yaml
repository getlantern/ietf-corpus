document: rfc-4206
kind: protocol-element
summary: When an LSR at a region edge receives a Path/Request message, it checks existing FA-LSPs for a match along the ERO subsequence spanning the region. If a matching FA-LSP with sufficient bandwidth and compatible L3PID is found, the LSP is tunneled through it; otherwise a new FA-LSP is established.
section: "6.2"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
