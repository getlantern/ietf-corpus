document: rfc-5818
kind: normative-requirement
summary: ConfirmDataChannelStatus SHOULD be sent using LMP reliable transmission mechanisms. If the retry limit is reached without receiving an Ack or Nack, the SENDER SHOULD terminate the confirmation procedure and SHOULD raise an alert to the management plane.
section: "6"
rfc2119_level: SHOULD
