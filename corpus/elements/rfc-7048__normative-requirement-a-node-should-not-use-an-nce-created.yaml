document: rfc-7048
kind: normative-requirement
summary: A node SHOULD NOT use an NCE created by a Redirect to send packets if that NCE is in the UNREACHABLE state; instead, packets should follow the next-hop selection algorithm in RFC 4861 Section 5.2, which disregards unreachable NCEs.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - routing
