document: rfc-9630
kind: protocol-element
summary: 'Multicast telemetry requirements addressed by this document include: reconstructing and visualizing the multicast tree via data-plane monitoring, gathering per-path packet delay and jitter, and finding packet-drop location and reason. Conventional OAM mechanisms (multicast ping, Mtrace2, RTCP) are insufficient to meet all three requirements.'
