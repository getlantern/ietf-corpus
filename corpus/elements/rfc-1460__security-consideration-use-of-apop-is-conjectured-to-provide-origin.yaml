document: rfc-1460
kind: security-consideration
summary: Use of APOP is conjectured to provide origin authentication and replay protection; the shared secret used in APOP must be carefully protected, as knowledge of it allows any entity to masquerade as the named user. The USER/PASS exchange sends the password in the clear on the network.
section: "7"
topics:
