kind: normative-requirement
summary: The ecdh-sha2-nistp256, ecdh-sha2-nistp384, and ecdh-sha2-nistp521 key exchange methods SHOULD be implemented. If implemented, the named curves SHOULD always be enabled unless specifically disabled by local security policy.
