document: rfc-2510
kind: wire-format
summary: PKIHeader contains pvno (fixed at 1), sender and recipient GeneralNames, optional messageTime, protectionAlg, senderKID, recipKID, transactionID, senderNonce, recipNonce, freeText, and generalInfo fields. The transactionID correlates request/response/confirmation triples; senderNonce and recipNonce provide replay protection.
