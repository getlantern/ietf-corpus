document: rfc-4543
kind: normative-requirement
summary: Implementations MUST use an automated key management system, such as IKE (either version), to ensure that the nonce uniqueness requirement is met, because statically configured keys make it difficult to use AES-GMAC securely.
section: "2"
rfc2119_level: MUST
topics:
