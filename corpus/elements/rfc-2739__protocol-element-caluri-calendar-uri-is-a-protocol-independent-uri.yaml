document: rfc-2739
kind: protocol-element
summary: CALURI (Calendar URI) is a protocol-independent URI from which a CUA can retrieve a snapshot of a user's entire calendar. HTTP URIs return 'text/calendar' MIME content; FTP URIs point to a file with '.ics' extension.
