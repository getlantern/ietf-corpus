document: rfc-5763
kind: security-consideration
summary: DTLS supports Diffie-Hellman and Elliptic Curve Diffie-Hellman cipher suites providing Perfect Forward Secrecy. Compromise of a long-term key cannot decrypt past communications when PFS cipher suites are used, though future active attacks remain possible.
