document: rfc-7200
kind: protocol-element
summary: 'The <accept> action element specifies the acceptable load via one of three sub-elements: <rate> (maximum requests/second), <percent> (fraction of requests to accept), or <win> (window size for window-based control). An optional "alt-action" attribute ("reject", "redirect", or "drop") governs what happens to excess requests.'
section: "5.4"
topics:
    - sip
    - realtime
