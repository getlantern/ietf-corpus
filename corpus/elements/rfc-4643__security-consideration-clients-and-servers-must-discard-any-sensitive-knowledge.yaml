document: rfc-4643
kind: security-consideration
summary: Clients and servers MUST discard any sensitive knowledge obtained prior to the start of SASL negotiation upon establishment of a security layer. The CAPABILITIES command SHOULD be re-issued and protocol state SHOULD be re-negotiated after a security layer is established.
section: "6"
topics:
    - security
