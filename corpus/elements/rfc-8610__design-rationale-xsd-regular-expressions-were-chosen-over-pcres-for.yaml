document: rfc-8610
kind: design-rationale
summary: XSD regular expressions were chosen over PCREs for '.regexp' because XSD has a normative reference usable in IETF documents; PCREs do not. The control operator registry allows a future '.pcre' or other regex flavors to be registered without revising the base specification.
section: 3.8.3.2
topics:
