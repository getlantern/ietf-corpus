document: rfc-5793
kind: wire-format
summary: 'The PB-Remediation-Parameters message value contains: Reserved (8 bits), Remediation Parameters Vendor ID (24 bits), Remediation Parameters Type (32 bits), and Remediation Parameters (variable). Minimum PB-TNC Message Length is 20. IETF standard types: Remediation-URI (type 1, RFC 3986 URI) and Remediation-String (type 2, UTF-8 string with length and RFC 4646 language tag).'
section: "4.8"
