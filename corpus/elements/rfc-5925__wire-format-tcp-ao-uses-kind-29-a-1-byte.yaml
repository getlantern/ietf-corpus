document: rfc-5925
kind: wire-format
summary: TCP-AO uses Kind=29, a 1-byte Length (minimum 4), a 1-byte KeyID identifying the MKT used to generate the MAC, a 1-byte RNextKeyID indicating the preferred incoming MKT, and a variable-length MAC field. Typical MACs are 96–128 bits (12–16 bytes).
section: "2.2"
topics:
