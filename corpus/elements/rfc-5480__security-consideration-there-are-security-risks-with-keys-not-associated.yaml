document: rfc-5480
kind: security-consideration
summary: 'There are security risks with keys not associated with well-known, widely-reviewed curves: the curve may not satisfy the MOV condition or may be vulnerable to the Anomalous attack. ECC public key validation must verify arithmetic properties to confirm the key is in the correct (sub)group per the associated domain parameters.'
