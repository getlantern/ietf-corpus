document: rfc-8124
kind: design-rationale
summary: A generic, application-protocol-independent SDP attribute ('websocket-uri') was defined rather than per-protocol attributes (e.g., BFCP-specific), because multiple protocols (SIP, MSRP, XMPP, BFCP) each needed a way to convey a WebSocket connection URI via SDP negotiation.
section: "1"
topics:
