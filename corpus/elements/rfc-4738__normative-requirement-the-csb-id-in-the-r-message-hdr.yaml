document: rfc-4738
kind: normative-requirement
summary: The CSB_ID in the R_MESSAGE HDR MUST be the same as the one in the I_MESSAGE HDR. For group communication, the Responder MUST include a General Extension Payload containing a new CSB_ID, and both parties MUST use that value for key material computation.
section: "3.6"
rfc2119_level: MUST
topics:
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
