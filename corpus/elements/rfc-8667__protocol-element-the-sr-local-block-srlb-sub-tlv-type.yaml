document: rfc-8667
kind: protocol-element
summary: The SR Local Block (SRLB) sub-TLV (Type 22 within TLV 242) advertises the range of MPLS labels a router has reserved for Local SIDs (e.g., Adj-SIDs). It enables controllers and applications to know the available Local SID space and avoid allocation collisions. A router MUST NOT advertise more than one SRLB sub-TLV.
section: "3.3"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
