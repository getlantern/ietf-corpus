document: rfc-8600
kind: security-consideration
summary: An authorized but compromised XMPP-Grid Platform can mount attacks including flooding the Controller with false alarms, advertising crafted payloads to exploit other Platforms, issuing subscriptions that cause resource exhaustion, and advertising false data that induces incorrect behavior.
