document: rfc-6081
kind: wire-format
summary: 'Neighbor Discovery Option Trailer (Type=0x04, Length=0x04): enables direct bubbles to solicit a response, replacing the need for indirect bubbles in the Server Load Reduction Extension. The DiscoveryType byte is 0x00 (solicitation) or 0x01 (advertisement); 3 bytes Reserved MUST be 0x000000.'
section: "4.4"
topics:
