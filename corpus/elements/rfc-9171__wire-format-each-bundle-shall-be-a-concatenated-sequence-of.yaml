document: rfc-9171
kind: wire-format
summary: Each bundle SHALL be a concatenated sequence of at least two blocks represented as a CBOR indefinite-length array. The first item MUST be the primary bundle block; the last canonical block MUST be the payload block (block number 1); the array is terminated by a CBOR 'break' stop code.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
