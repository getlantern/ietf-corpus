document: rfc-2228
kind: registry
summary: 'This document establishes an IANA registry for FTP security mechanism names used with the AUTH command. Names are case-insensitive strings; those beginning with ''X-'' are reserved for local use without registration. Appendices specify two initial values: GSSAPI and KERBEROS_V4.'
