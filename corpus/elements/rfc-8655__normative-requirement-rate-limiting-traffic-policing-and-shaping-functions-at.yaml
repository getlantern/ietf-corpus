document: rfc-8655
kind: normative-requirement
summary: Rate limiting (traffic policing) and shaping functions at the ingress of the DetNet domain must be applied. This is needed both for meeting DetNet flow QoS requirements and for protecting non-DetNet traffic from potentially misbehaving DetNet traffic sources.
section: 3.2.1.1
rfc2119_level: MUST
topics:
    - routing
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
