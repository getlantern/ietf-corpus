document: rfc-9760
kind: normative-requirement
summary: This PTP Profile MUST operate only in networks characterized by UDP over either IPv4 or IPv6, as described by Annexes C and D of IEEE 1588-2019. IPv4 and IPv6 instances in the same network node MUST operate in different PTP domains.
section: "5"
rfc2119_level: MUST
topics:
