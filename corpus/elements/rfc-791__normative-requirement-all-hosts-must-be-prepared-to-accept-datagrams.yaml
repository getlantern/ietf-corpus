document: rfc-791
kind: normative-requirement
summary: All hosts must be prepared to accept datagrams of up to 576 octets, whether arriving whole or in fragments. It is recommended that hosts send datagrams larger than 576 octets only if they have assurance the destination can accept them.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
