document: rfc-7900
kind: normative-requirement
summary: When Inclusive Tunnels use RSVP-TE P2MP or Ingress Replication, the RT(s) of Intra-AS I-PMSI A-D routes originated by a receiver VRF (VRF-R) MUST be such that those routes will be imported into the source VRF (VRF-S), so VRF-S can build the complete P-tunnel leaf set.
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
