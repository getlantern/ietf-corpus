document: rfc-4404
kind: interoperability-note
summary: Each FCIP Link must be represented as a row in the ifTable with ifType 'fcipLink' (224). The ifStackLowerLayer is always 0 because FCIP runs directly on TCP/IP with no intermediate ifTable interface. The ifStackHigherLayer is typically zero since FC interfaces typically have no protocol stacked above them.
section: "3.2"
topics:
    - snmp
    - tcp
