document: rfc-8804
kind: protocol-element
summary: The DnsTarget object specifies a 'host' property (mandatory) used as the CNAME alias in DNS redirect responses from the uCDN to the dCDN. The host SHOULD NOT include a port number; if a port is present the uCDN MUST ignore it.
section: "2.4"
topics:
    - dns
