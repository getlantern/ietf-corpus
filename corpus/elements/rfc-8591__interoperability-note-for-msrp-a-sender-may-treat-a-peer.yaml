document: rfc-8591
kind: interoperability-note
summary: For MSRP, a sender MAY treat a peer advertising '*' in accept-types as potentially supporting S/MIME; if the peer returns MSRP 415, the sender should treat it as not supporting S/MIME for the session duration.
section: "8.3"
topics:
