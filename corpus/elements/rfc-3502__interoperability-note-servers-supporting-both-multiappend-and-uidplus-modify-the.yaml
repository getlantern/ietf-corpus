document: rfc-3502
kind: interoperability-note
summary: 'Servers supporting both MULTIAPPEND and UIDPLUS modify the resp-code-apnd rule to: resp-code-apnd = "APPENDUID" SP nz-number SP set, where the set contains as many UIDs as messages appended, in append order, with no extraneous UIDs or the symbol "*".'
section: MULTIAPPEND Interaction with UIDPLUS Extension
