document: rfc-2959
kind: normative-requirement
summary: Monitor implementations must comply with rtpMonitorCompliance, which mandates rtpSystemGroup and rtpMonitorGroup; rtpHostGroup objects such as local address, payload type, and octet counts are optional for monitors that receive only RTCP.
