document: rfc-7533
kind: design-rationale
summary: Administrative paths used by FEDFS procedures (FEDFS_PATH_SYS) are implementation-dependent and need not appear in the federated namespace or be relative to the server pseudo-root. The global namespace and server-local namespace are intentionally decoupled, allowing flexible internal server organization.
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
