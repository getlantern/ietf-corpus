document: rfc-5922
kind: normative-requirement
summary: When comparing SIP domain identities, implementations MUST compare only the DNS name component, MUST perform a case-insensitive comparison per RFC 4343, and MUST handle Internationalized Domain Names in accordance with RFC 5280 Section 7.2.
section: "7.2"
rfc2119_level: MUST
