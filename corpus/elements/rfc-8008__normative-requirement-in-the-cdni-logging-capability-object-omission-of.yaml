document: rfc-8008
kind: normative-requirement
summary: In the CDNI Logging Capability Object, omission of the 'fields' property MUST be interpreted as 'all optional fields are supported'; an empty list MUST be interpreted as 'no optional fields are supported'; a non-empty list MUST be interpreted as 'only those fields are supported'.
section: "5.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
