document: rfc-7440
kind: normative-requirement
summary: In the case of a data block sequence error, the DRCV SHOULD notify the DSND by sending an ACK corresponding to the last data block correctly received, and the DSND SHOULD send a new window whose beginning MUST be set based on the out-of-sequence ACK received.
section: "4"
rfc2119_level: SHOULD
topics:
    - realtime
