document: rfc-7345
kind: normative-requirement
summary: During rekeying, receivers MUST maintain both the old and new sets of keys for some time after the DTLS handshake completes, in order to decrypt and verify older packets that may arrive out of order.
section: "5.3"
rfc2119_level: MUST
topics:
