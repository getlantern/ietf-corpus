document: rfc-5682
kind: protocol-element
summary: The 'recover' variable (inherited from NewReno) is used by the basic F-RTO algorithm to store the highest sequence number transmitted so far; it is reset to SND.UNA upon declaring a spurious timeout, re-enabling fast retransmit on subsequent duplicate ACKs.
section: "2.1"
topics:
