summary: 'Three types of abstract diversity identifiers are defined: Client-Initiated Identifier (based on tunnel sender/endpoint address, Tunnel ID, Extended Tunnel ID, and optionally LSP ID), PCE-Allocated Identifier (using Path Key from RFC 5520), and Network-Assigned Identifier (using a Path Affinity Set identifier).'
