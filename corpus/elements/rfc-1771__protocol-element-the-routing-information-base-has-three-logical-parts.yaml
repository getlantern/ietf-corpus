summary: 'The Routing Information Base has three logical parts: Adj-RIBs-In (unprocessed routes received from peers), Loc-RIB (routes selected by the local Decision Process), and Adj-RIBs-Out (routes selected for advertisement to specific peers). Implementations may use any equivalent internal representation.'
