document: rfc-8055
kind: security-consideration
summary: The 'received-realm' parameter MUST be discarded if received from another (non-operator-internal) network, and MUST only be inserted by SIP entities that can verify the adjacent upstream network. The parameter is intended to be inserted, signed, verified, and consumed entirely within a single operator's network.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
