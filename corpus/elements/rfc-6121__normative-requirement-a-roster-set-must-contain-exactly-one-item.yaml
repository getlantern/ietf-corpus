document: rfc-6121
kind: normative-requirement
summary: A roster set MUST contain exactly one <item/> element; the server MUST return <bad-request/> if more than one item is included or if duplicate group names appear, and MUST return <not-acceptable/> for oversized name or group fields.
section: 2.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
