document: rfc-2476
kind: design-rationale
summary: Header rewriting rules must be data-dependent (matching specific configured patterns), not data-independent. Applying rules like 'always delete the first element of a domain name' would be dangerous; only addresses matching specific MSA configuration settings should be altered.
section: "8.8"
topics:
    - email
