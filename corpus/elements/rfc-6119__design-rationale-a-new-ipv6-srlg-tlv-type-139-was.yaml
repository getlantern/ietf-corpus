kind: design-rationale
summary: A new IPv6 SRLG TLV (type 139) was defined rather than extending SRLG TLV (type 138) because there is no backward-compatible way to modify type 138 to identify a link by IPv6 addresses when IPv4 addresses and link-local identifiers are unavailable.
