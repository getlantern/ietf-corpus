document: rfc-4004
kind: design-rationale
summary: The Acct-Multi-Session-Id AVP is introduced to correlate accounting records across Mobile IPv4 handoffs, where a mobile node may visit many foreign agents. The HA generates this identifier once for a new session and returns it unchanged in every subsequent HAA, allowing billing systems to treat the full mobility session as a single unit.
section: 4.1.2
topics:
    - diameter
    - mobility
