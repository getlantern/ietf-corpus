document: rfc-8915
kind: privacy-consideration
summary: NTS achieves unlinkability by supplying fresh cookies on every exchange so that no persistent identifier leaks across network address changes. Clients SHOULD avoid reusing cookies; cookie reuse is permissible only to prioritize resilience over unlinkability.
section: "9.1"
topics:
