document: rfc-4379
kind: design-rationale
summary: The Generic IPv4/IPv6 Prefix FEC sub-types (14-15) exist for inter-AS LSPs where the signaling protocol may be LDP in one AS, RSVP-TE in another, and BGP between ASes — making it impractical to name a specific protocol. This decouples LSP ping from needing to know which control-plane protocol established a label binding.
section: 3.2.13
topics:
