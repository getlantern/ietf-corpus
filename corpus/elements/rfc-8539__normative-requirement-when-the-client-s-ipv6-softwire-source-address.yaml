document: rfc-8539
kind: normative-requirement
summary: When the client's IPv6 softwire source address changes (e.g., due to IPv6 renumbering), the client MUST inform the server by sending a DHCPREQUEST containing OPTION_DHCP4O6_S46_SADDR with the new address.
section: 7.2.1
rfc2119_level: MUST
