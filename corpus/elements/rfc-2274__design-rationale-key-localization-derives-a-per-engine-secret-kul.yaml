document: rfc-2274
kind: design-rationale
summary: Key localization derives a per-engine secret Kul by hashing Ku || snmpEngineID || Ku (enveloping the engine ID between two copies of the user key). This ensures that even if a user uses the same password everywhere, the actual shared secret differs per authoritative engine, preventing cross-engine replay attacks.
section: "2.6"
topics:
