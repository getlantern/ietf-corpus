document: rfc-6442
kind: protocol-element
summary: Location profile negotiation uses SIP option tags in a Supported header. "geolocation-sip" signals PIDF-LO retrieval via SIP SUBSCRIBE/NOTIFY (sip/sips/pres URIs); "geolocation-http" signals retrieval via HTTP GET (http/https URIs). If the receiver does not understand the URI scheme, it returns the option tag in Unsupported and its preferred scheme in Supported.
section: "4.6"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
