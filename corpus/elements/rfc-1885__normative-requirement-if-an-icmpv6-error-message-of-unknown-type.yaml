document: rfc-1885
kind: normative-requirement
summary: If an ICMPv6 error message of unknown type is received, it MUST be passed to the upper-layer protocol. If an ICMPv6 informational message of unknown type is received, it MUST be silently discarded.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
