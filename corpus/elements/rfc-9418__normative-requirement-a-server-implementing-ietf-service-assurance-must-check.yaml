document: rfc-9418
kind: normative-requirement
summary: A server implementing `ietf-service-assurance` MUST check for dependency loops whenever the assurance graph is modified, and MUST reject any modification that would create a circular dependency, since circular dependencies prevent health-score computation.
section: "3.4"
rfc2119_level: MUST
topics:
