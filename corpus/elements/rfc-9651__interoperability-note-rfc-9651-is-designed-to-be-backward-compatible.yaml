document: rfc-9651
kind: interoperability-note
summary: 'RFC 9651 is designed to be backward compatible with RFC 8941: a parser implementing RFC 9651 can also parse valid Structured Fields whose definitions reference RFC 8941. However, upgrading from RFC 8941 to RFC 9651 may cause previously-invalid field values (e.g., those containing Date or Display String syntax) to be accepted, potentially affecting field-specific logic.'
section: "2.4"
topics:
    - http
