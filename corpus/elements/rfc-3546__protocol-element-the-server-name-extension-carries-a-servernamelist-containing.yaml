document: rfc-3546
kind: protocol-element
summary: The server_name extension carries a ServerNameList containing one or more ServerName entries. Currently only host_name(0) NameType is defined; HostName is a UTF-8 encoded fully qualified DNS hostname (1..2^16-1 bytes), without a trailing dot. Literal IPv4 and IPv6 addresses are not permitted.
section: "3.1"
topics:
    - tls
    - dns
