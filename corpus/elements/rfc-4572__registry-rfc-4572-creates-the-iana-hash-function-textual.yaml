document: rfc-4572
kind: registry
summary: RFC 4572 creates the IANA 'Hash Function Textual Names' registry with initial entries for md2, md5, sha-1, sha-224, sha-256, sha-384, and sha-512, each mapped to their X.509 OID and defining RFC. New entries require a standards-track RFC updating or obsoleting RFC 3279.
