document: rfc-8945
kind: design-rationale
summary: TSIG uses shared-secret HMAC rather than DNSSEC public key signatures because stub resolvers lack caches and the computational cost of public key operations is impractical for them. TSIG also provides a lightweight alternative for authenticating dynamic updates where DNSSEC's public key infrastructure is equally expensive.
section: "10.2"
topics:
    - dns
    - security
    - crypto
