document: rfc-9867
kind: normative-requirement
summary: If using PPKs in CREATE_CHILD_SA is mandatory for the responder and the initiator includes no PPK_IDENTITY_KEY notifications, or if no matching/valid PPK is found, the responder MUST return the NO_PROPOSAL_CHOSEN notification.
section: "3.2"
rfc2119_level: MUST
topics:
