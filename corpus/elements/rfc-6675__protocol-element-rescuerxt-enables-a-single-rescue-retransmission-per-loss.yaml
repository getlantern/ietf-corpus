document: rfc-6675
kind: protocol-element
summary: RescueRxt enables a single 'rescue' retransmission per loss recovery entry when all other NextSeg() rules fail but outstanding unSACKed data exists. This retransmits the highest outstanding unSACKed sequence number to sustain the ACK clock when loss occurs at the end of the window. HighRxt MUST NOT be updated for this retransmission.
section: "4"
topics:
