document: rfc-8584
kind: normative-requirement
summary: 'Under AC-DF, the following events SHALL modify the candidate PE list and MUST trigger a transition from DF_DONE to DF_CALC: (1) local AC going DOWN/UP, (2) reception of a new Ethernet A-D per EVI route update/withdrawal for the <ES, Ethernet Tag>, and (3) reception of a new Ethernet A-D per ES route update/withdrawal.'
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
