document: rfc-4019
kind: design-rationale
summary: Separate ROHC profiles must be defined for UDP-Lite because it uses a different IP protocol identifier than UDP and its Checksum Coverage field does not share the semantics of the UDP Length field, making the field classification and compression strategies different.
