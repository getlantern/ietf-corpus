document: rfc-4997
kind: protocol-element
summary: The COMPRESSED section specifies the order and encoding of fields in the compressed format; field order need not match the UNCOMPRESSED section. Every field's CLENGTH must be defined across all sections so the total compressed length is unambiguously determined.
section: 4.12.1.2
