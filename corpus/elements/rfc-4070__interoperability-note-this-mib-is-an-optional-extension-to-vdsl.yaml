document: rfc-4070
kind: interoperability-note
summary: This MIB is an optional extension to VDSL-LINE-MIB (RFC 3728); an MCM-based VDSL agent does not have to implement this MIB to be compliant with RFC 3728. If implemented, the vdslMCMGroup is mandatory.
