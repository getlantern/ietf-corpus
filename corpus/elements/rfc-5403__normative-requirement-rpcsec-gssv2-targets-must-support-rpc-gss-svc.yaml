document: rfc-5403
kind: normative-requirement
summary: RPCSEC_GSSv2 targets MUST support rpc_gss_svc_channel_prot. This service is only valid when RPCSEC_GSSv2 is in use, an RPCSEC_GSS_BIND_CHANNEL has completed successfully, and the secure channel still exists.
