document: rfc-6554
kind: interoperability-note
summary: The SRH shares the same basic format as the Type 0 Routing header (RH0) from RFC 2460. When CmprI, CmprE, and Pad are all 0 (full IPv6 addresses), the only encoding difference between SRH and RH0 is the Routing Type field value (3 vs. 0).
section: "3"
