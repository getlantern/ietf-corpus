document: rfc-5905
kind: security-consideration
summary: KoD DENY/RSTR packets can be spoofed by off-path attackers to cause clients to demobilize legitimate server associations, constituting a denial-of-service attack on time synchronization. Implementations should authenticate KoD packets where possible before acting on them.
section: "15"
topics:
