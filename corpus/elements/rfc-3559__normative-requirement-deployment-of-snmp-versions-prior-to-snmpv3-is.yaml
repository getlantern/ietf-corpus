document: rfc-3559
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers SHOULD consider using SNMPv3 with full cryptographic mechanisms (authentication and privacy). It is RECOMMENDED to enable cryptographic security and restrict access to only principals with legitimate rights to GET or SET objects.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - multicast
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
