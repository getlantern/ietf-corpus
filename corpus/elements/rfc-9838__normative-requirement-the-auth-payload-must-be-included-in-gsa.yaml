document: rfc-9838
kind: normative-requirement
summary: The AUTH payload MUST be included in GSA_REKEY messages when the authentication method uses public key signatures, and MUST NOT be included when implicit authentication (ICV-based) is used. Using implicit authentication for GSA_REKEY is NOT RECOMMENDED because it does not provide source origin authentication.
section: 2.4.1
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
