document: rfc-3065
kind: normative-requirement
summary: All BGP speakers participating in a confederation MUST support BGP confederations (i.e., recognize AS_CONFED_SET and AS_CONFED_SEQUENCE segment types). BGP speakers outside the confederation need not support these extensions.
section: "8"
rfc2119_level: MUST
topics:
