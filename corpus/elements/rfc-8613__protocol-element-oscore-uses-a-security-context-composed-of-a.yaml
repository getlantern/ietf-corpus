document: rfc-8613
kind: protocol-element
summary: OSCORE uses a Security Context composed of a Common Context, a Sender Context, and a Recipient Context. The Common Context holds the AEAD algorithm, HKDF algorithm, Master Secret, Master Salt, ID Context, and Common IV. Sender and Recipient Contexts hold the respective ID, key, and (for senders) Sender Sequence Number or (for the server) Replay Window.
section: "3.1"
topics:
    - security
    - crypto
    - cbor
