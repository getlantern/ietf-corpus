summary: dot1dTrafficClassTable maps evaluated User Priority (0–7) to a Traffic Class (0..dot1dPortNumTrafficClasses-1) on a per-port basis. dot1dTrafficClassesEnabled (device-level TruthValue) controls whether the bridge operates with multiple priority queues or a single level.
