document: rfc-6019
kind: protocol-element
summary: BinaryTime is defined as an ASN.1 INTEGER (0..MAX) representing the number of seconds excluding leap seconds after midnight UTC, January 1, 1970 (UNIX epoch). It uses variable-length encoding and cannot represent dates prior to January 1, 1970.
