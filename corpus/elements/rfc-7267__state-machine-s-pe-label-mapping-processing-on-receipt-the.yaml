document: rfc-7267
kind: state-machine
summary: 'S-PE Label Mapping processing: on receipt, the S-PE determines forward vs reverse direction by checking whether the FEC is already installed and whether the message came from the same peer as the forward Label Mapping. Forward direction triggers next-hop lookup, PSN tunnel check, label allocation, and forwarding; reverse direction installs the FEC and relays a new Label Mapping toward the ST-PE.'
section: 4.2.3
topics:
