document: rfc-9084
kind: normative-requirement
summary: A received Prefix Source Router Address Sub-TLV with a length inconsistent with the prefix's address family MUST be considered invalid and ignored; reception of such sub-TLVs SHOULD be logged as an error subject to rate limiting.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
