document: rfc-5323
kind: protocol-element
summary: DAV:literal allows literal string values in expressions. White space in literal values is significant. When compared with DAV:getcontentlength, the literal SHOULD be treated as an unsigned integer; when compared with DAV:creationdate or DAV:getlastmodified, it SHOULD be treated as an ISO-8601 date value.
section: "5.10"
topics:
    - http
