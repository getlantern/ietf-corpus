document: rfc-8202
kind: protocol-element
summary: On multi-access (broadcast) circuits, MI-RTRs establish adjacencies and elect a Designated Intermediate System (DIS) per IS-IS instance independently. Different instances may elect different DIS routers, and each MI-RTR only forms adjacencies with routers advertising support for the same instances.
section: 3.4.2
topics:
    - routing
