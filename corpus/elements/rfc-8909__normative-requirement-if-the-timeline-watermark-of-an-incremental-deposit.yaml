document: rfc-8909
kind: normative-requirement
summary: If the Timeline Watermark of an Incremental Deposit covers the watermark of an earlier Incremental or Differential Deposit since the last Full Deposit, the more recent deposit MUST contain all transactions of the earlier deposit.
section: "2"
rfc2119_level: MUST
topics:
