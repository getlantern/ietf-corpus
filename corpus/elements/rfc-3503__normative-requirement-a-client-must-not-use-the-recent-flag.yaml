document: rfc-3503
kind: normative-requirement
summary: A client MUST NOT use the \Recent flag as an indicator to send MDN, because it is undefined which simultaneous connection sees \Recent set on newly-arrived messages, leading to unpredictable behavior.
section: "3"
rfc2119_level: MUST NOT
