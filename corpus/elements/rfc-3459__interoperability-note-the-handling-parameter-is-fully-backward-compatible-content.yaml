document: rfc-3459
kind: interoperability-note
summary: 'The Handling parameter is fully backward compatible: Content-Disposition-compliant user agents that do not recognize the parameter will ignore it, and the default REQUIRED value means that unknown-to-gateway body parts are treated as critical, preserving prior behavior.'
