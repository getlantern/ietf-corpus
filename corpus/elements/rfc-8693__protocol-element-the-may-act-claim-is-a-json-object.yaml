document: rfc-8693
kind: protocol-element
summary: The 'may_act' claim is a JSON object in a JWT asserting that a specific party is authorized to become the actor and act on behalf of the JWT subject. It can be used by an authorization server to determine if the client or actor_token party is authorized to engage in delegation or impersonation.
section: "4.4"
topics:
    - oauth
    - jose
