document: rfc-7273
kind: normative-requirement
summary: When the SDP description signals a direct-referenced media clock, reference clock signalling via `ts-refclk` is REQUIRED. Asynchronous and stream-referenced media clocks MAY be specified with or without reference clock signalling.
section: "6"
rfc2119_level: REQUIRED
