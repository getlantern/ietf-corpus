document: rfc-9429
kind: protocol-element
summary: JSEP supports simulcast using RFC 8853 (a=simulcast) and RFC 8851 (a=rid). When multiple encodings are configured on an RtpSender, the 'm=' section includes an 'a=simulcast' attribute with a 'send' description listing each desired encoding and an 'a=rid' attribute per encoding to disambiguate streams.
section: "3.7"
topics:
    - webrtc
    - realtime
    - rtp
