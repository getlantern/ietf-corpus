document: rfc-5901
kind: normative-requirement
summary: Attributes and elements identified as required in figures 6.1 and 6.2 SHALL be populated in conforming phishing activity reports; these include IODEF Incident mandatory fields plus PhraudReport's FraudType, Version, LureSource (with iodef:System), and OriginatingSensor (with DateFirstSeen and iodef:System/Node).
section: "6"
rfc2119_level: REQUIRED
