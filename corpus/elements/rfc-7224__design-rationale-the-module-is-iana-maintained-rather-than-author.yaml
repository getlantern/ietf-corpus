document: rfc-7224
kind: design-rationale
summary: The module is IANA-maintained rather than author-maintained. The latest revision can always be obtained from the IANA web site, and whenever a new interface type is added to the 'ifType definitions' registry, both the IANAifType-MIB and the iana-if-type YANG module are updated by IANA.
