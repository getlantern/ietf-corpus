document: rfc-5140
kind: wire-format
summary: 'The Prefix attribute (Type Codes 16/17/18 for E.164/Pentadecimal/Decimal) encodes a sequence of prefix values with no padding: each prefix is preceded by a 2-octet Length field indicating the size of the Address field in octets. A Length field of 0 for the entire attribute signifies the gateway can terminate ALL prefixes of that type.'
section: 4.4.1
topics:
