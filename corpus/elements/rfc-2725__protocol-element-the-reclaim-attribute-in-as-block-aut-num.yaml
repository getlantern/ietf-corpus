document: rfc-2725
kind: protocol-element
summary: The reclaim attribute in as-block, aut-num, inetnum, or route objects allows the maintainer of the less specific object to modify or delete any more specific object of the same type. The value specifies the range as defined in RPSL, with ALL covering all more specifics.
section: "10.1"
topics:
