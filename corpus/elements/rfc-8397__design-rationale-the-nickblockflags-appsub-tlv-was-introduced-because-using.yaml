document: rfc-8397
kind: design-rationale
summary: The NickBlockFlags APPsub-TLV was introduced because using the individual Nickname Sub-TLV (RFC 7176) to announce a mass of internal/external nicknames is uneconomic. The block-range format allows border RBridges to efficiently advertise large contiguous nickname ranges.
section: "4.3"
topics:
    - routing
    - registry
