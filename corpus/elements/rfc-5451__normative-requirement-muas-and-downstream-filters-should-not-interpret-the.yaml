document: rfc-5451
kind: normative-requirement
summary: MUAs and downstream filters SHOULD NOT interpret the Authentication-Results header field unless specifically instructed by the user or administrator, and SHOULD NOT interpret it unless the authserv-id appears to be one used within its own ADMD. This interpretation should not be 'on by default'.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
