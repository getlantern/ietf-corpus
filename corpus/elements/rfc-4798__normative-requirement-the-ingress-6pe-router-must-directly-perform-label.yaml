document: rfc-4798
kind: normative-requirement
summary: The ingress 6PE Router MUST directly perform label imposition of the IPv6 header without prepending any IPv4 header; the outer label imposed MUST correspond to the IPv4-signaled LSP from ingress to egress 6PE.
