document: rfc-7845
kind: normative-requirement
summary: A demuxer MUST NOT attempt to decode the data for the first packet on a page with the 'continued packet' flag set if the previous page does not end in a continued packet or the page sequence numbers are not consecutive.
section: "3"
rfc2119_level: MUST NOT
