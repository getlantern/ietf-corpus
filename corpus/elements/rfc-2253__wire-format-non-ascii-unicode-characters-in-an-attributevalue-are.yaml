document: rfc-2253
kind: wire-format
summary: Non-ASCII Unicode characters in an AttributeValue are first converted to a UTF-8 string according to the attribute's syntax specification, then any bytes requiring escaping are represented as a backslash followed by two uppercase or lowercase hex digits representing a single UTF-8 byte (e.g., U+010D 'č' becomes \C4\8D).
section: "2.4"
topics:
    - ldap
