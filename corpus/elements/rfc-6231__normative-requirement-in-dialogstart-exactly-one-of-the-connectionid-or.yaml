document: rfc-6231
kind: normative-requirement
summary: In <dialogstart>, exactly one of the connectionid or conferenceid attributes MUST be specified. If both or neither are specified, the MS sends a <response> with a 400 status code.
section: 4.2.2
rfc2119_level: MUST
