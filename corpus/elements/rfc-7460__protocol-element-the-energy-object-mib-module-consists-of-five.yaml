document: rfc-7460
kind: protocol-element
summary: 'The ENERGY-OBJECT-MIB module consists of five tables: eoMeterCapabilitiesTable (instrumentation available per Energy Object), eoPowerTable (power consumption and state), eoPowerStateTable (Power State statistics), eoEnergyParametersTable (energy collection configuration), and eoEnergyTable (energy/demand log). All tables are indexed by entPhysicalIndex.'
