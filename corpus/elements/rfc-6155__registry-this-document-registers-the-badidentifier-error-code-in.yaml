document: rfc-6155
kind: registry
summary: This document registers the 'badIdentifier' error code in the IANA 'HELD Error Codes' sub-registry of the 'Geopriv HTTP Enabled Location Delivery (HELD) Parameters' registry. The code indicates the identifier was unsupported, badly formatted, or not authorized for use by the requestor.
