document: rfc-7555
kind: protocol-element
summary: 'Four roles are defined: Initiator (sends MPLS Proxy Ping Request), Proxy LSR (destination of the Proxy Ping Request and originator of the actual MPLS Echo Request), Receiver(s) (LSRs that receive the Echo Request), and Responder (any LSR that answers an Echo Request or Proxy Ping Request). The initiator and responder may be the same LSR.'
section: "2"
topics:
    - mpls
    - routing
