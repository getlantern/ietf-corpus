document: rfc-1717
kind: normative-requirement
summary: If a system receives a Configure-Nak or Configure-Reject of the Endpoint Discriminator option it MUST remove the option from any subsequent Configure-Request. If the option is absent from a received Configure-Request, the system MUST NOT generate a Configure-Nak for it.
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
