document: rfc-5046
kind: protocol-element
summary: 'The Datamover Interface (DI) defines abstract Operational Primitives between the iSCSI and iSER layers: Send_Control, Put_Data, Get_Data, Allocate_Connection_Resources, Deallocate_Connection_Resources, Enable_Datamover, Connection_Terminate, Notice_Key_Values, and Deallocate_Task_Resources are offered by iSER; Control_Notify, Data_Completion_Notify, Data_ACK_Notify, and Connection_Terminate_Notify are used by iSER.'
section: "3"
