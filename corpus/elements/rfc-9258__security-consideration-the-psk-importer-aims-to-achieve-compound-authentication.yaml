document: rfc-9258
kind: security-consideration
summary: 'The PSK importer aims to achieve compound authentication: externally provisioned PSKs imported into a TLS connection should authenticate both the external provisioning process and the TLS connection. Context-free PSKs only achieve authentication within a single connection.'
