document: rfc-6724
kind: normative-requirement
summary: If an application specifies a source address not in the candidate set for the destination, the network layer MUST treat this as an error. If the application specifies a source address that is in the candidate set, the network layer MUST respect that choice.
section: "4"
rfc2119_level: MUST
topics:
