document: rfc-8249
kind: protocol-element
summary: The originatingSNPBufferSize parameter (per-RBridge-port configuration) is an integer in the range 1470–65535, defaulting to the minimum of the port's physical MTU and the maximum link-local IS-IS PDU size the TRILL implementation can handle. This value determines Lz for the port.
