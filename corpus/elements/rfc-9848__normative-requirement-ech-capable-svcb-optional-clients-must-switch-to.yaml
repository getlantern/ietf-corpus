document: rfc-9848
kind: normative-requirement
summary: ECH-capable, SVCB-optional clients MUST switch to SVCB-reliant connection establishment if SVCB resolution succeeded and all alternative endpoints have an "ech" SvcParam. SVCB fallback to a direct connection would negate ECH's privacy benefits.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - dns
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
