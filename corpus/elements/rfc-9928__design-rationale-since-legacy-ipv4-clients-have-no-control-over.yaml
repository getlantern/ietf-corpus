document: rfc-9928
kind: design-rationale
summary: Since legacy IPv4 clients have no control over the information provided by the Relay Agent even when DHCP 4o6 is in use, moving DHCP 4o6 functionality from the client to the relay agent does not raise additional security concerns beyond those in RFC 7341.
