document: rfc-5789
kind: protocol-element
summary: The Accept-Patch response header is introduced to specify the patch document formats accepted by the server. Its presence in response to any method is an implicit indication that PATCH is allowed on the resource identified by the Request-URI.
section: "3.1"
topics:
    - http
