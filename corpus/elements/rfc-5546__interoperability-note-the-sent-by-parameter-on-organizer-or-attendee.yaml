document: rfc-5546
kind: interoperability-note
summary: The SENT-BY parameter on ORGANIZER or ATTENDEE properties indicates that a CU is acting on behalf of another (e.g., an assistant managing a meeting for their manager). Attendee responses are still directed to the CU designated as Organizer, not the SENT-BY CU.
section: 2.1.3
topics:
    - email
