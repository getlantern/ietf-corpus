document: rfc-8866
kind: normative-requirement
summary: When multiple payload formats are listed in an 'm=' line for RTP/AVP, the first acceptable payload format from the beginning of the list SHOULD be used for the session. Dynamic payload type assignments SHOULD use 'a=rtpmap:'.
section: "5.14"
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
