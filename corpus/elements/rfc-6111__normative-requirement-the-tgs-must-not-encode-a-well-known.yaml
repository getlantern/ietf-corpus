document: rfc-6111
kind: normative-requirement
summary: The TGS MUST NOT encode a well-known Kerberos realm name into the transited field of a ticket. Parties checking the transited realm path MUST reject any path that includes a well-known realm.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
