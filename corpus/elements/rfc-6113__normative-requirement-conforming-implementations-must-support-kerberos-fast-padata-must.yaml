document: rfc-6113
kind: normative-requirement
summary: Conforming implementations MUST support Kerberos FAST padata, MUST implement the FX_FAST_ARMOR_AP_REQUEST armor type, and MUST support the encrypted challenge FAST factor. Clients conforming to this specification MUST support the PA-FX-COOKIE padata defined in Section 5.2.
section: "1.2"
rfc2119_level: MUST
topics:
