document: rfc-9660
kind: interoperability-note
summary: ZONEVERSION SHOULD be included in downward referral responses (even though the AA bit is not set), NXDOMAIN responses, NODATA responses, and SERVFAIL responses when the server is authoritative for the QNAME. For referrals, the ZONEVERSION data MUST correspond to the referring zone's version.
section: "3.2"
topics:
    - dns
