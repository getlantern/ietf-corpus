document: rfc-7513
kind: security-consideration
summary: Leasequery operations used by the Data Snooping Process should be secured. RFC 4388 and RFC 5007 mechanisms allow preconfigured keys to protect these exchanges; without security, a compromised DHCP server or man-in-the-middle could return false lease information and cause incorrect bindings.
section: "11.2"
topics:
    - security
    - ip
