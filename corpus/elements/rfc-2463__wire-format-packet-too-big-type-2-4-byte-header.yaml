document: rfc-2463
kind: wire-format
summary: 'Packet Too Big (Type=2): 4-byte header (Type, Code, Checksum) followed by a 4-byte MTU field carrying the Maximum Transmission Unit of the next-hop link, then as much of the invoking packet as fits within the minimum IPv6 MTU. Code is always 0.'
