document: rfc-9725
kind: normative-requirement
summary: All WHIP entities MUST support HTTP authentication per RFC 9110. Bearer token authentication as defined in RFC 6750 MUST be supported by all WHIP endpoints, sessions, and clients. WHIP clients MUST send the Authorization header in all HTTP requests (except CORS preflight OPTIONS).
section: "4.7"
rfc2119_level: MUST
topics:
    - http
    - security
    - webrtc
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
