document: rfc-7490
kind: protocol-element
summary: P-space of a router S with respect to a protected link S-E is the set of routers reachable from S using pre-convergence shortest paths without any of those paths transiting the protected link, including ECMP splits. In cost terms, {P} are nodes for which D_opt(S,P) < D_opt(S,E,P).
section: "2"
topics:
