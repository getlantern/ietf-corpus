document: rfc-1237
kind: design-rationale
summary: 'Multi-homed routing domains face a fundamental tradeoff: a single independent prefix (solution 1) allows one internal addressing scheme but forces all worldwide TRDs to maintain an explicit routing entry; per-connection prefixes (solution 2) scale better but require address changes when connectivity changes and do not automatically maintain backup routes.'
