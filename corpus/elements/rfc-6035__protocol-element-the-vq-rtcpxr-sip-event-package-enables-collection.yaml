document: rfc-6035
kind: protocol-element
summary: The vq-rtcpxr SIP event package enables collection and reporting of VoIP quality metrics. A REPORTER (SIP UA in the session) sends voice quality data derived from RTCP-XR and SIP to a COLLECTOR (third-party entity). The package supports both SUBSCRIBE/NOTIFY and PUBLISH methods.
section: "3"
topics:
