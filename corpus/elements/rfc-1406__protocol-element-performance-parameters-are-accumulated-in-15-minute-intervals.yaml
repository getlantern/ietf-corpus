document: rfc-1406
kind: protocol-element
summary: Performance parameters are accumulated in 15-minute intervals; up to 96 intervals (24 hours) are retained by an agent, plus a rolling 24-hour total. Fewer than 96 intervals are available if the agent has been restarted within the last 24 hours. There is no requirement to align intervals with wall-clock quarter-hours.
section: 3.3.3
topics:
    - snmp
