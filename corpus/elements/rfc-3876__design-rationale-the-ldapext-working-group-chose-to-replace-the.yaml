document: rfc-3876
kind: design-rationale
summary: The LDAPEXT Working Group chose to replace the X.500 DAP matchedValuesOnly (MVO) boolean with an explicit filter because the MVO boolean had ambiguities—it was unclear whether it governed only values contributing to overall filter truth or all attribute values even when their filter item evaluated false.
