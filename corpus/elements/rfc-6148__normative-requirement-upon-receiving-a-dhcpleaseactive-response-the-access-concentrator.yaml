document: rfc-6148
kind: normative-requirement
summary: Upon receiving a DHCPLEASEACTIVE response, the access concentrator SHOULD use the htype, hlen, and chaddr fields as well as the Relay Agent Information option in the packet to refresh its location information for the returned IP address.
section: "4.6"
rfc2119_level: SHOULD
