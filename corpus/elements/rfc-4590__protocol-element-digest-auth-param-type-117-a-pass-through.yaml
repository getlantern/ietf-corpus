document: rfc-4590
kind: protocol-element
summary: 'Digest-Auth-Param (type 117): a pass-through for unknown auth-param extension parameters from HTTP Digest headers. Unlike other Digest-* attributes, it includes both the parameter name and value (with the ''='' and quotes intact); each unknown parameter requires a separate instance. Used in Access-Request, Access-Challenge, or Access-Accept.'
section: "3.15"
topics:
