document: rfc-6511
kind: normative-requirement
summary: An ingress LSR sets the Non-PHP behavior flag to signal that egress LSRs SHOULD assign a non-NULL label for the LSP being signaled. This flag MUST NOT be modified by any other LSRs in the network.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - mpls
