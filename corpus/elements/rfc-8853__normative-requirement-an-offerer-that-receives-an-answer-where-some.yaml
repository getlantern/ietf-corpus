document: rfc-8853
kind: normative-requirement
summary: An offerer that receives an answer where some rid-ids are removed MUST NOT send any RTP packets corresponding to the removed rid-ids and MAY release the corresponding resources in its receive direction.
section: 5.3.3
rfc2119_level: MUST NOT
