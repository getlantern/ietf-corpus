document: rfc-2347
kind: normative-requirement
summary: Once a client acknowledges an OACK with an appropriate non-error response, that client has agreed to use only the options and values returned by the server; the server cannot request an option, it can only respond to them.
section: Negotiation Protocol
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
