document: rfc-826
kind: design-rationale
summary: Periodic broadcasting of address resolution information is explicitly rejected. On-demand resolution means mappings are distributed only when needed, typically once per machine boot, avoiding gratuitous traffic on large Ethernet segments where most stations communicate with only a small subset of peers.
section: Why is it done this way??
topics:
    - ip
