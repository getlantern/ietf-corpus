document: rfc-6093
kind: design-rationale
summary: RFC 793, RFC 1011, and RFC 1122 are updated to define the Urgent Pointer as pointing to the sequence number of the octet following the urgent data (last+1), reversing the RFC 1122 clarification. The rationale is that when both endpoints use the same semantics there is no functional difference, and virtually all existing implementations already use this interpretation.
section: "4"
topics:
