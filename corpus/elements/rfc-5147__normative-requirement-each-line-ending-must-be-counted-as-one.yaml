document: rfc-5147
kind: normative-requirement
summary: Each line ending MUST be counted as one single character, independent of the number of bytes or characters used to represent it. Implementations MUST take into account the line ending conventions of the protocols and contexts they work in.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
