document: rfc-8476
kind: normative-requirement
summary: If a Link MSD sub-TLV is advertised multiple times for the same link, the sub-TLV in the OSPFv2 Extended Link Opaque LSA with the smallest Opaque ID, or in the OSPFv3 E-Router-LSA with the smallest Link State ID, MUST be used by receiving routers. This situation SHOULD be logged as an error.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
