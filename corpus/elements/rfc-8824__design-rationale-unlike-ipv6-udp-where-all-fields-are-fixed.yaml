document: rfc-8824
kind: design-rationale
summary: Unlike IPv6/UDP where all fields are fixed-length, CoAP headers include variable-length fields such as Token (0–8 bytes) and options using TLV encoding. SCHC handles this by allowing Field Length to be specified as a variable in the Rule, with the compressed field's length then carried in the Compression Residue.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
