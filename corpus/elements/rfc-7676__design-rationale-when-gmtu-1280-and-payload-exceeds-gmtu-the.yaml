document: rfc-7676
kind: design-rationale
summary: When GMTU < 1280 and payload exceeds GMTU, the IPv6 payload is encapsulated whole (not fragmented) and the delivery packet is fragmented instead, because IPv6 sources cannot receive ICMPv6 PTB messages indicating MTUs below 1280.
