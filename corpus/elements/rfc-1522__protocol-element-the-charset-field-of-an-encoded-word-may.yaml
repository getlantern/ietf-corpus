document: rfc-1522
kind: protocol-element
summary: The charset field of an encoded-word may be any character set name permitted in an RFC 1521 'text/plain' charset parameter or any IANA-registered MIME text/plain charset. If a charset uses code-switching, the encoded-word must end with control codes that restore ASCII mode.
