document: rfc-7380
kind: protocol-element
summary: PID_error_count is a 16-bit unsigned count of PID errors, which occur when no data stream is present for a given PID. This may result from multiplexing, demultiplexing, or remultiplexing operations. Value 0xFFFF indicates measurement unavailable.
