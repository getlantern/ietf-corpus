document: rfc-9374
kind: protocol-element
summary: The HDA (HHIT Domain Authority) is a 14-bit field (16,384 HDAs per RAA) assigned by an RAA to entities such as ISPs or UAS Service Suppliers. HDAs must maintain public and private UAS registration information and should maintain RVS servers for HIP-enabled clients.
