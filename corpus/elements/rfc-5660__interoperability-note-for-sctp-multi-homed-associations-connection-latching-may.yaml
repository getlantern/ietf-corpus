document: rfc-5660
kind: interoperability-note
summary: For SCTP multi-homed associations, connection latching may be represented as N×M connection latches (one per 5-tuple of end-point address combinations) or as a single latch object with multiple addresses per end-point. Implementors may choose either approach.
