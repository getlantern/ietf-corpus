document: rfc-9615
kind: normative-requirement
summary: It is RECOMMENDED that queries into signaling domains be performed with an initially empty resolver cache, or that some other method for retrieving fresh data from authoritative servers be used, to avoid stalemate situations from stale cached records causing RRset mismatch in Step 4.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - security
