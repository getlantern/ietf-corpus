document: rfc-9466
kind: security-consideration
summary: A forged Assert message could cause the legitimate designated forwarder to stop forwarding traffic to the LAN; this effect may be amplified when using a PackedAssert message since a single forged PackedAssert impacts all flows packed into it.
section: "6"
topics:
    - security
    - multicast
