document: rfc-3284
kind: protocol-element
summary: 'Three delta instruction types encode target window reconstruction: ADD (size x plus x literal bytes), COPY (size x and address p in superstring U, data must lie entirely within S or T), and RUN (size x and byte b repeated x times). COPY supports overlap when the copy source starts before the destination, enabling efficient encoding of periodic sequences.'
section: "3"
