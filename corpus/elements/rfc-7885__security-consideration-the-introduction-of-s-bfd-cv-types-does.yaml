document: rfc-7885
kind: security-consideration
summary: The introduction of S-BFD CV Types does not present any new security risks for VCCV beyond those in RFC 5085 and RFC 7880. The IP/UDP encapsulation uses GTSM (RFC 5082) TTL/Hop Limit procedures as a security mechanism.
