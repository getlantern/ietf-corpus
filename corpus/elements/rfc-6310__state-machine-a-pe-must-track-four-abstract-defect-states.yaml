document: rfc-6310
kind: state-machine
summary: 'A PE must track four abstract defect states: AC receive defect, AC transmit defect, PW receive defect, and PW transmit defect, reflecting observed conditions from both directions of the PW service on both AC and PW sides. When a PE enters both receive and transmit defect states for the same PW service simultaneously, the receive defect takes precedence in terms of consequent actions.'
section: "4"
topics:
