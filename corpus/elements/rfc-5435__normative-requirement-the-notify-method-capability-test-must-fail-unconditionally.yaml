document: rfc-5435
kind: normative-requirement
summary: The notify_method_capability test MUST fail unconditionally if the notification-uri is syntactically invalid or specifies an unsupported method, but this MUST NOT cause a script error. It also MUST fail if the notification-capability item is not known to the interpreter.
section: "5"
rfc2119_level: MUST
