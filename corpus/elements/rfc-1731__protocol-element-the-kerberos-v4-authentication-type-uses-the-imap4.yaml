document: rfc-1731
kind: protocol-element
summary: The KERBEROS_V4 authentication type uses the IMAP4 AUTHENTICATE command. The server issues a challenge containing a random 32-bit number, and the client responds with a Kerberos ticket and authenticator for the principal 'imap.hostname@realm'.
