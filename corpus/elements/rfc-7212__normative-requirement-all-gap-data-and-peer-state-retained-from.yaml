document: rfc-7212
kind: normative-requirement
summary: All GAP data and peer state retained from prior advertisements MUST be discarded after a system restart to prevent incorrect operation on stale data. All GAP applications MUST be disabled by default and require explicit operator enablement.
section: "8"
rfc2119_level: MUST
