document: rfc-7048
kind: normative-requirement
summary: If no IPv6 packet is sent using an UNREACHABLE NCE, it is RECOMMENDED to stop the multicast NS retransmissions until either the NCE is garbage collected or IPv6 packets are again sent using the NCE.
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - ip
