document: rfc-6488
kind: protocol-element
summary: The Signing-Time attribute (OID 1.2.840.113549.1.9.5) MAY be present but its presence or absence MUST NOT affect the validity of the signed object. Its value is a Time CHOICE (UTCTime or GeneralizedTime) indicating when the signature was applied.
