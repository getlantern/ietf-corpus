kind: normative-requirement
summary: Agents MUST ignore all attributes that follow MESSAGE-INTEGRITY, except MESSAGE-INTEGRITY-SHA256 and FINGERPRINT. Agents MUST ignore all attributes that follow MESSAGE-INTEGRITY-SHA256 (when MESSAGE-INTEGRITY is absent), except FINGERPRINT.
