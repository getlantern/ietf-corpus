document: rfc-7240
kind: design-rationale
summary: The Expect header was rejected as a mechanism for optional preferences because intermediaries and servers are required to reject requests with unrecognized expectations, and every intermediary must process expectations hop-by-hop — semantics incompatible with optional, ignorable preferences.
section: "1"
topics:
