document: rfc-8229
kind: normative-requirement
summary: Multiple IKE SAs MUST NOT share a single TCP connection, unless one is a rekey of an existing IKE SA, in which case there will temporarily be two IKE SAs on the same TCP connection.
section: "6"
rfc2119_level: MUST NOT
