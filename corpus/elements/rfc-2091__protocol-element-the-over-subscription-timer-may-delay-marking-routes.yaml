document: rfc-2091
kind: protocol-element
summary: The Over-subscription Timer MAY delay marking routes unreachable upon receiving a circuit-down message, to allow calls to time-division multiplex over limited available channels (e.g., ISDN BRI with fewer B-channels than next-hop routers). A delay as long as the standard 180-second RIP timeout MAY be used.
section: "6.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
