document: rfc-1002
kind: protocol-element
summary: 'RCODE values for negative name registration responses: FMT_ERR=0x1 (format error), SRV_ERR=0x2 (server failure), IMP_ERR=0x4 (unsupported request), RFS_ERR=0x5 (refused by policy), ACT_ERR=0x6 (name owned by another node), CFT_ERR=0x7 (UNIQUE name owned by more than one node).'
section: 4.2.6
