document: rfc-4102
kind: design-rationale
summary: The ordering of primary and redundancy encodings is fixed for each redundancy payload type. If more than one combination of primary and redundancy encoding(s) is desired, multiple redundancy payload types must be defined rather than reordering within a single type.
