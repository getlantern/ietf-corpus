document: rfc-2675
kind: interoperability-note
summary: 'Nodes that do not understand the Jumbo Payload option respond differently to error conditions: for Payload Length=0 with Hop-by-Hop Next Header they send ICMPv6 Code 0, but for an unrecognized Jumbo Payload option with non-zero Payload Length they send Code 2 (unrecognized option) pointing to the Option Type field.'
