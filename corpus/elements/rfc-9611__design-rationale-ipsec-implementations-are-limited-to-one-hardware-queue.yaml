document: rfc-9611
kind: design-rationale
summary: IPsec implementations are limited to one hardware queue or CPU per Child SA because sharing cryptographic state, counters, and sequence numbers among multiple CPUs incurs significant performance penalties. By negotiating multiple Child SAs with identical Traffic Selectors, each resource gets its own Sequence Number Counter, eliminating synchronization overhead and enabling parallel packet encryption.
section: "1"
topics:
