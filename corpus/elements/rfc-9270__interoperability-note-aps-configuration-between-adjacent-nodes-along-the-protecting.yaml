document: rfc-9270
kind: interoperability-note
summary: APS configuration between adjacent nodes along the protecting LSP path must be done by means other than GMPLS signaling, before any protecting LSP is set up. The APS protocol may use different identifiers than GMPLS signaling to identify the protecting LSP, and these identifiers are expected to be technology-specific or vendor-specific.
section: "5.6"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
