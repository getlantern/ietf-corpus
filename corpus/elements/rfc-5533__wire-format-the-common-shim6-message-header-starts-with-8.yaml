document: rfc-5533
kind: wire-format
summary: The common Shim6 message header starts with 8-bit Next Header, 8-bit Hdr Ext Len (in 8-octet units, excluding first 8 octets), and a 1-bit P flag. P=1 identifies a Shim6 Payload Extension header; P=0 identifies a control message, allowing both types to share IP protocol number 140.
section: "5.1"
topics:
