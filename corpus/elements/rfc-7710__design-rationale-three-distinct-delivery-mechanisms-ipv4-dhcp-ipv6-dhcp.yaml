document: rfc-7710
kind: design-rationale
summary: Three distinct delivery mechanisms (IPv4 DHCP, IPv6 DHCP, IPv6 RA) are specified to support different classes of clients — IPv4-only, IPv6-only with DHCPv6, and IPv6-only with RA — ensuring captive-portal notification reaches all device types without requiring protocol-specific fallbacks.
