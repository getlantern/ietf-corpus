document: rfc-4019
kind: protocol-element
summary: 'The Coverage Field Inferred (CFI) context parameter, used when CFP=0, determines how the Checksum Coverage is reconstructed: if CFI is nonzero, the value is inferred from the packet length (like the UDP Length field); if zero, the stored context value is used.'
