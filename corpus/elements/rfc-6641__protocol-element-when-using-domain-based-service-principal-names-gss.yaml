document: rfc-6641
kind: protocol-element
summary: When using domain-based service principal names, GSS-API is invoked with name-type GSS_C_NT_DOMAINBASED_SERVICE and a symbolic name of the form "nfs@{domain}@{target-hostname}", e.g., "nfs@example.net@nfs2ex.example.net".
