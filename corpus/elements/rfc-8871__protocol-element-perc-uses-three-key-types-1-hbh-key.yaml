document: rfc-8871
kind: protocol-element
summary: 'PERC uses three key types: (1) HBH Key — SRTP master key for hop-by-hop encryption; (2) KEK (EKT Key) — shared by all endpoints, used to encrypt each endpoint''s E2E SRTP master key; (3) E2E Key — SRTP master key for end-to-end media encryption, distinct per endpoint. Only endpoints and the Key Distributor hold the KEK; Media Distributors never hold it.'
section: "6.1"
topics:
    - crypto
    - rtp
    - realtime
    - security
