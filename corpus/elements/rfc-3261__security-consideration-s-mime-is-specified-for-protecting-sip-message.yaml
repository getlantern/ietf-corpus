document: rfc-3261
kind: security-consideration
summary: S/MIME is specified for protecting SIP message bodies and for tunneling a signed copy of SIP headers inside an encrypted MIME body to prevent proxy modification. This provides end-to-end integrity and confidentiality even when the signaling path traverses untrusted proxies.
