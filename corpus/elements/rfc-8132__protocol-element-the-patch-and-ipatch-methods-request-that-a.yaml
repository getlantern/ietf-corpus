document: rfc-8132
kind: protocol-element
summary: The PATCH and iPATCH methods request that a set of changes described in the request payload be applied to the target resource. If the Request-URI does not point to an existing resource, the server MAY create a new resource, resulting in a 2.01 (Created) response.
