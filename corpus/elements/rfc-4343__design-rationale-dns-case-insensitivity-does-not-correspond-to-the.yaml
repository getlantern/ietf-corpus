document: rfc-4343
kind: design-rationale
summary: DNS case insensitivity does NOT correspond to the case folding specified in ISO-8859-1 or ISO-8859-2. For example, octets 0xDD and 0xFD do not match in DNS even though they represent upper- and lower-case 'Y' with acute accent in those encodings.
section: "3"
topics:
