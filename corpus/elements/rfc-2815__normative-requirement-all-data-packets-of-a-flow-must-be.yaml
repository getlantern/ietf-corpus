document: rfc-2815
kind: normative-requirement
summary: All data packets of a flow MUST be assigned to the same traffic class for the duration of the flow. This ensures packet ordering between adjacent Layer 3 routers and avoids reordering problems.
section: "2"
rfc2119_level: MUST
