document: rfc-3297
kind: protocol-element
summary: The Alternative-available MDN notification option, included in Disposition-Notification-Options, signals the sender's readiness to supply alternative message data. It carries a lifetime value of 'transient' or 'permanent' and must have importance 'optional' so unaware agents do not generate failures.
section: "6.1"
topics:
