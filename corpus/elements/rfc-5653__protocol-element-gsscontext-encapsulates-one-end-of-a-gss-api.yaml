document: rfc-5653
kind: protocol-element
summary: GSSContext encapsulates one end of a GSS-API security context including cryptographic state. It provides initSecContext/acceptSecContext for establishment, wrap/unwrap and getMIC/verifyMIC for per-message protection, export for inter-process transfer, and accessor methods for all context attributes.
section: "6.4"
topics:
