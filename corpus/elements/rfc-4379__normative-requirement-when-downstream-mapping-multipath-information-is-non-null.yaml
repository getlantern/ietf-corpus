document: rfc-4379
kind: normative-requirement
summary: When Downstream Mapping Multipath Information is non-null, subsequent probe labels and IP addresses MUST be picked from the set provided. If none map to a particular downstream interface, that interface's Multipath Type MUST be set to 0. If Multipath Information is null (length 0 or all-zero mask), the type MUST be set to 0.
section: 3.3.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
