document: rfc-9266
kind: interoperability-note
summary: This document updates RFCs 5801, 5802, and 7677 to use 'tls-exporter' as the default channel binding over TLS 1.3 and greater, replacing 'tls-unique'. The default channel binding for TLS 1.2 remains 'tls-unique'.
