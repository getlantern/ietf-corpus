document: rfc-9198
kind: normative-requirement
summary: Discoverable Nodes communicating with IP MUST send a Time Exceeded message (containing Node identity) to the source when discarding a packet due to TTL or Hop Limit Exceeded, per RFC 1122 Section 3.2.2.4. This also applies to routers per RFC 1812 Section 5.3.1.
section: "3.1"
rfc2119_level: MUST
topics:
    - measurement
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
