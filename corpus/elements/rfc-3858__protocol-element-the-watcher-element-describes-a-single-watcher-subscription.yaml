document: rfc-3858
kind: protocol-element
summary: 'The ''watcher'' element describes a single watcher subscription. Its text content is the watcher''s URI. Mandatory attributes: ''id'' (token), ''status'' (pending|active|waiting|terminated), ''event'' (subscribe|approved|deactivated|probation|rejected|timeout|giveup|noresource). Optional attributes: ''display-name'', ''expiration'' (seconds), ''duration-subscribed'' (seconds), ''xml:lang''.'
