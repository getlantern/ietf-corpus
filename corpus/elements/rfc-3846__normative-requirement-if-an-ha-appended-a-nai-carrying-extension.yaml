document: rfc-3846
kind: normative-requirement
summary: If an HA appended a NAI Carrying Extension to a Registration Reply but does not receive the NAI extension in subsequent Registration Requests from the MN, the HA SHOULD NOT append this NAI extension to further Registration Reply messages to that MN, as it can assume the MN does not understand the extension.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
