document: rfc-3291
kind: normative-requirement
summary: Implementations must ensure that InetAddressType objects and dependent InetAddress objects are consistent. An inconsistentValue error MUST be generated if a Set operation on InetAddressType would lead to an undefined InetAddress value. InetAddressType/InetAddress pairs must be changed together when the address type changes.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
