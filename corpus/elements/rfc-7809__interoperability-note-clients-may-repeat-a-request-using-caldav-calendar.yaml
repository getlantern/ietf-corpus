document: rfc-7809
kind: interoperability-note
summary: Clients MAY repeat a request using CALDAV:calendar-timezone (with full VTIMEZONE data) if the server rejects a CALDAV:calendar-timezone-id update with a CALDAV:valid-timezone error, providing a fallback for time zones unknown to the server.
section: 3.1.5
