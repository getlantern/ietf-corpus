kind: wire-format
summary: The Generalized PWid FEC Element (type 0x81) encodes AGI, SAII, and TAII as TLV triples (Type, Length, Value) following the C-bit and PW Type fields. Each sub-element uses its own type/length to support variable-length structured attachment identifiers.
