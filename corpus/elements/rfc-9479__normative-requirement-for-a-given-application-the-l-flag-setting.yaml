document: rfc-9479
kind: normative-requirement
summary: For a given application, the L-flag setting MUST be the same in all ASLA sub-TLVs for a given link. If this constraint is violated, the L-flag MUST be treated as set for that application.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
