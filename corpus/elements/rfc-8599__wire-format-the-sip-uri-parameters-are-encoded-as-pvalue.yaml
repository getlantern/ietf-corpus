document: rfc-8599
kind: wire-format
summary: 'The SIP URI parameters are encoded as pvalue tokens in the SIP URI parameter syntax (RFC 3261). ABNF: uri-parameter =/ pn-provider / pn-param / pn-prid / pn-purr; pn-provider = "pn-provider" [EQUAL pvalue]; pn-prid = "pn-prid" EQUAL pvalue; pn-param = "pn-param" EQUAL pvalue; pn-purr = "pn-purr" EQUAL pvalue. Characters outside pvalue must be percent-escaped.'
section: "8.7"
topics:
    - sip
