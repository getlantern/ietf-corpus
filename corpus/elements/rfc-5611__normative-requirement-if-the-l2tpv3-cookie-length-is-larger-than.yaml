document: rfc-5611
kind: normative-requirement
summary: If the L2TPv3 cookie length is larger than 0, the SSRC field in the RTP AVP SHOULD be set to 0, because L2TPv3 cookies provide an alternative security mechanism for detecting misconnections.
section: "2.2"
rfc2119_level: SHOULD
