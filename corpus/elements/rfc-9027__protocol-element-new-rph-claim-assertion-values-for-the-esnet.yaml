summary: New 'rph' claim assertion values for the 'esnet.x' namespace are defined, where x is the priority level (0–4 inclusive as of this specification) for local emergency communications per RFC 7135. The string must exactly match the SIP 'Resource-Priority' header field namespace invoked in the call.
