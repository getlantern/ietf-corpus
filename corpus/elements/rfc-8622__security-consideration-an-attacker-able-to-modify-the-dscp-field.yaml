document: rfc-8622
kind: security-consideration
summary: An attacker able to modify the DSCP field of a packet to LE may carry out a downgrade attack, causing QoS degradation of the re-marked traffic. There are no other specific security exposures for the LE PHB; general Diffserv security considerations from RFC 2474 and RFC 2475 apply.
section: "13"
topics:
    - diffserv
    - security
    - qos
