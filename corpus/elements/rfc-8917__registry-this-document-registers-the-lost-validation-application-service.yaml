document: rfc-8917
kind: registry
summary: This document registers the 'LoST-Validation' application service tag in the IANA 'S-NAPTR Application Service Tags' registry created by RFC 3958. It serves as a counterpart to the 'LoST' tag added by RFC 5222, enabling explicit discovery of servers designated for location validation.
section: "6.1"
