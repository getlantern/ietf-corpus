document: rfc-6580
kind: wire-format
summary: 'RDMAP error codes are 16-bit fields subdivided into three subfields: a 4-bit Layer (fixed at 0x0 for RDMAP), a 4-bit Error Type, and an 8-bit Error Code. The Error Code field is optional; when absent, any 8-bit value is valid and ''ALL'' is recorded in the registry.'
section: "3.1"
