document: rfc-9737
kind: normative-requirement
summary: The MDS MUST accept the anonymous stateid of all zeros for the lrf_stateid in LAYOUTRETURN, allowing clients to report I/O errors encountered during an MDS outage without needing a valid layout stateid.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
