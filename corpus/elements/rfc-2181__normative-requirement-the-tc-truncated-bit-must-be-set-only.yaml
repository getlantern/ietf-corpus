document: rfc-2181
kind: normative-requirement
summary: The TC (truncated) bit must be set only when an RRSet required as part of the response cannot be included in its entirety. It must not be set merely because optional additional information was omitted; such additional records should be dropped entirely and the reply sent with TC clear.
section: "9"
rfc2119_level: SHOULD
topics:
    - dns
