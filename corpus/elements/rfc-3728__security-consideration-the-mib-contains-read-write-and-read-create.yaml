document: rfc-3728
kind: security-consideration
summary: The MIB contains read-write and read-create objects (profile configuration, alarm thresholds) that can directly affect VDSL line operation, including forcing line restarts. Unauthorized write access could disrupt service; implementations should apply SNMPv3 authentication and access control (VACM) to protect these objects.
section: "5"
topics:
    - snmp
    - security
