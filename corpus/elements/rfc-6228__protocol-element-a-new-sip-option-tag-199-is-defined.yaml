document: rfc-6228
kind: protocol-element
summary: A new SIP option-tag '199' is defined for use in the Supported header of initial dialog initiation requests to indicate that the UAC supports and is willing to receive 199 responses. When present in Require or Proxy-Require it mandates that UAS or proxies support the 199 response code (but does not require them to actually send it).
section: "11.2"
topics:
    - sip
    - realtime
