document: rfc-9328
kind: protocol-element
summary: 'Three payload structure types are defined: Single NAL Unit Packets (exactly one NAL unit, Type 0-27), Aggregation Packets (AP, Type=28, multiple NAL units from one access unit), and Fragmentation Units (FU, Type=29, subsets of a single NAL unit). The receiver identifies the type via the Type field in the 2-byte payload header.'
section: "4.3"
topics:
