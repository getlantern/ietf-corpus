document: rfc-6001
kind: design-rationale
summary: Hybrid nodes in MRN environments have internal links between switching elements (e.g., PSC and TDM) with finite capacities that cannot be inferred from interface switching capabilities alone. A separate Interface Adjustment Capability Descriptor (IACD) is introduced to advertise these internal adjustment capacities so path computation can account for them when computing multi-region TE-LSPs.
section: "3.1"
topics:
    - mpls
    - routing
