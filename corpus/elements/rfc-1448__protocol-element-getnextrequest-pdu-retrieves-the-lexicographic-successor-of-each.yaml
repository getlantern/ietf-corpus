document: rfc-1448
kind: protocol-element
summary: GetNextRequest-PDU retrieves the lexicographic successor of each named variable in the accessible MIB. If no successor exists, the variable binding in the Response-PDU has its value set to 'endOfMibView' and its name set to the requested name, signaling the end of the MIB view.
section: 4.2.2
topics:
    - snmp
