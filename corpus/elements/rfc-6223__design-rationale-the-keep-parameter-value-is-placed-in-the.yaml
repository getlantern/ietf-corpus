document: rfc-6223
kind: design-rationale
summary: The "keep" parameter value is placed in the Via header of responses (not requests) by the receiving entity, because responses travel back hop-by-hop along the same path, ensuring the frequency recommendation reaches the correct sender without being seen by other nodes.
