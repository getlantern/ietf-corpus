summary: The IUA Message Header (integer Interface Identifier form) carries Tag 0x1 with a fixed length of 8 octets for the 32-bit Interface Identifier, followed by Tag 0x5 (length=8) for the DLCI field. The text-based variant uses Tag 0x3 with variable length.
