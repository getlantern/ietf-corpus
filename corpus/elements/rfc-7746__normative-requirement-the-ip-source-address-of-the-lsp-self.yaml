document: rfc-7746
kind: normative-requirement
summary: The IP Source Address of the LSP Self-ping message MAY be configurable, but by default it MUST be the address of the egress LSR. The IP Destination Address MUST be the address of the ingress LSR.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - ip
