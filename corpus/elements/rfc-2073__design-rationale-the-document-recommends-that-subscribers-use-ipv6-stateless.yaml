document: rfc-2073
kind: design-rationale
summary: The document recommends that subscribers use IPv6 stateless address autoconfiguration [AUTO] with 48-bit IEEE-802 MAC addresses as Interface IDs, leaving 16 bits for the Subnet ID. This is sufficient for all but the largest subscribers (up to 65,535 subnets).
section: "3.4"
