document: rfc-7182
kind: protocol-element
summary: 'ICV TLV carries a cryptographic Integrity Check Value in a <ICV-value> field whose length is <length> octets (or single-length octets in a multivalue Address Block TLV). Three type extensions are defined: 0 (opaque bit-field), 1 (hash+crypto function decomposition), and 2 (same as 1 but also covers the IP datagram source address).'
section: "6"
topics:
