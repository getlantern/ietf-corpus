document: rfc-3006
kind: protocol-element
summary: For guaranteed service reservations covering multiple senders, the receiver RSpec rate R is adjusted downward using a weighted average compression factor f_avg = (b1*f1 + b2*f2 + ... + bn*fn)/(b1 + b2 + ... + bn), where bk and fk are the burstsize and compression factor of sender k.
