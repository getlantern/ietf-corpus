document: rfc-6764
kind: security-consideration
summary: Clients that support TLS SHOULD try _caldavs/_carddavs services before _caldav/_carddav. If the user explicitly requested TLS, clients MUST NOT use non-TLS service records. Clients MUST follow the certificate-verification process in RFC 6125.
section: "8"
rfc2119_level: MUST
topics:
    - tls
    - security
