document: rfc-5837
kind: interoperability-note
summary: If a NAT device performs ICMPv4-to-ICMPv6 or ICMPv6-to-ICMPv4 translation, applications may receive ICMP messages with IP Address Sub-Objects whose address family conflicts with the outer ICMP version (e.g., an ICMPv6 message containing an IPv4 address sub-object).
section: "5"
topics:
    - nat
    - ip
    - v6ops
