document: rfc-4011
kind: protocol-element
summary: The createRow() and setRowStatus() functions automate row creation in read-create tables with arbitrary integer index components, encapsulating the createAndWait/createAndGo algorithm. The optional 'freeOnException' flag causes automatic row deletion (RowStatus=destroy) if the script dies with an RTE or fail() call during the same invocation.
section: 8.1.3.5
topics:
    - snmp
