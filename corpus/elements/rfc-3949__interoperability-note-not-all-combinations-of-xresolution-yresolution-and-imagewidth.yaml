document: rfc-3949
kind: interoperability-note
summary: Not all combinations of XResolution, YResolution, and ImageWidth are legal. Profile F specifies a table of valid combinations (e.g., 200x100 dpi only with width 1728/2048/2432); implementations must restrict to these combinations per T.30.
