document: rfc-1209
kind: normative-requirement
summary: SMDS hardware addresses in ARP packets (ar$sha, ar$tha) MUST be carried in SMDS native address format with the most significant bit of the Address Type sub-field as the high order bit of the first octet.
section: Address Resolution
rfc2119_level: MUST
