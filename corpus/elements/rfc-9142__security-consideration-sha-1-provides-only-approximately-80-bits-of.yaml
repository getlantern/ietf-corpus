document: rfc-9142
kind: security-consideration
summary: SHA-1 provides only approximately 80 bits of collision resistance security. Transcript collision attacks (Bhargavan & Leurent, NDSS 2016) show an on-path attacker could tamper with SSH handshake fields to downgrade the negotiated ciphersuite, making SHA-1 use in key exchanges undesirable.
