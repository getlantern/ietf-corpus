document: rfc-8010
kind: normative-requirement
summary: The end-of-attributes-tag (value 0x03) MUST occur exactly once in an operation and MUST be the last delimiter-tag. If the operation has a document-data group, that data follows the end-of-attributes-tag.
section: 3.5.1
rfc2119_level: MUST
topics:
    - http
