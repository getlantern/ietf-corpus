document: rfc-6147
kind: normative-requirement
summary: By default, DNS64 implementations MUST NOT synthesize AAAA RRs when real (non-excluded) AAAA RRs already exist for the queried name. DNS64 SHOULD NOT include synthetic AAAA RRs in responses when real AAAA data is available.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
    - dns
    - v6ops
