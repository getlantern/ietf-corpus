document: rfc-7953
kind: normative-requirement
summary: Support for the CALDAV:calendar-availability property is REQUIRED if the CalDAV calendar-auto-schedule feature is supported. The server MUST use the VAVAILABILITY component in this property when determining free-busy information for an iTIP free-busy request.
section: 7.2.4
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
