document: rfc-4039
kind: state-machine
summary: In the 2-message flow, the client broadcasts DHCPDISCOVER with Rapid Commit option; if it receives a DHCPACK with Rapid Commit, it may immediately advance to the configured state (step 5), skipping DHCPREQUEST and the normal DHCPOFFER selection steps. If no rapid-commit DHCPACK is received, the normal 4-message exchange proceeds.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
