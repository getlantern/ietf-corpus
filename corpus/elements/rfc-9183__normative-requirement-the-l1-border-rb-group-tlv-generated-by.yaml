document: rfc-9183
kind: normative-requirement
summary: The L1-BORDER-RB-GROUP TLV generated by an area border RBridge MUST include all L1 Border RBridge Nicknames of the area. It is RECOMMENDED that the k nicknames be ordered in ascending order as unsigned integers.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
