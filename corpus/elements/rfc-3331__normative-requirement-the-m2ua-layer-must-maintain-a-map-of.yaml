document: rfc-3331
kind: normative-requirement
summary: The M2UA layer MUST maintain a map of Interface Identifier to physical interface, and MUST also maintain a map of Interface Identifier to SCTP association and stream. The SGP MUST maintain AS/ASP states and reference them during routing of messages.
section: 1.5.1
rfc2119_level: MUST
topics:
