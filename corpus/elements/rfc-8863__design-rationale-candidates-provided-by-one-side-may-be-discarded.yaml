document: rfc-8863
kind: design-rationale
summary: Candidates provided by one side may be discarded by the peer if they use an unsupported address family (e.g., an IPv6 host candidate in a NAT64 scenario), leaving an empty checklist and triggering immediate ICE failure; the PAC timer provides time for peer-reflexive candidate discovery in this case.
