document: rfc-7324
kind: normative-requirement
summary: A remote No Request message (regardless of FPath and Path values) SHALL be ignored if the node is in local Protecting Administrative state. This generalizes the previous rule that only ignored NR(0,0), clarifying that all NR variants trigger the same behavior.
section: "5"
rfc2119_level: REQUIRED
topics:
    - mpls
