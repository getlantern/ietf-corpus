document: rfc-9893
kind: normative-requirement
summary: A Credit Control Response Message sent by a router MUST contain one or more Credit Window Status Data Items. Credit Control Response Messages sent by modems MUST contain one or more Credit Window Grant Data Items, with a Data Item for every Credit Window Request Data Item in the corresponding Credit Control Message.
section: 2.2.2
rfc2119_level: MUST
topics:
    - qos
    - congestion
