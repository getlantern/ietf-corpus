document: rfc-9368
kind: interoperability-note
summary: Future documents defining compatibility between versions that support 0-RTT MUST address 0-RTT packets in the client's first flight, for example by specifying which transformations are applied to them or by allowing compatible version negotiation to cause the server to reject 0-RTT data.
section: "7.3"
