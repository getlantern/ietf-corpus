document: rfc-3168
kind: normative-requirement
summary: Pure ACK packets MUST be sent with the not-ECT codepoint; window probe packets MUST NOT carry an ECT codepoint or the CWR bit, because losses of these packets are not detected by the receiver.
section: 6.1.4
rfc2119_level: MUST
topics:
