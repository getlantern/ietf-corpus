document: rfc-4236
kind: normative-requirement
summary: Unless specifically configured otherwise, an OPES processor MUST forward all HTTP messages for adaptation, including 1xx responses, POST/CONNECT/OPTIONS requests, and extension methods. Only OPES bypass instructions, configured rules, or OCP negotiation are acceptable exceptions.
section: "3.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
