document: rfc-9069
kind: wire-format
summary: The per-peer header flags for Loc-RIB Instance Peer Type use an 8-bit field where bit 0 is the F flag. The F flag MUST be set when a filter is applied to Loc-RIB routes sent to the BMP collector. Unused bits MUST be transmitted as 0 and ignored on receipt.
section: "4.2"
topics:
    - bgp
    - routing
