document: rfc-1194
kind: normative-requirement
summary: An RUIP MUST either provide or actively refuse the {Q2} forwarding service. If it provides forwarding, it must open a connection to the right-most @hostname in the query, pass along the remaining query, relay the full response, and close the connection only when the remote RUIP closes its side.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
