document: rfc-4575
kind: normative-requirement
summary: The 'version' attribute MUST be included in the root <conference-info> element. The server MUST increment the 32-bit monotonically increasing version number for each notification sent to a subscriber reporting a change in conference state.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
