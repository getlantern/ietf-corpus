document: rfc-2183
kind: normative-requirement
summary: Parameter values longer than 78 characters, or which contain non-ASCII characters, MUST be encoded as specified in RFC 2184. Short values with only non-tspecials characters SHOULD be a single token; short ASCII values with tspecials SHOULD be quoted-string.
section: "2"
rfc2119_level: MUST
topics:
    - email
