document: rfc-6107
kind: normative-requirement
summary: The ingress and egress of an LSP set up using the LSP_TUNNEL_INTERFACE_ID object MUST advertise the LSP as a link in accordance with the parameters agreed in the object. The TE link SHOULD inherit TE properties from the LSP as described in RFC 5212, subject to local policy.
section: "3.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
