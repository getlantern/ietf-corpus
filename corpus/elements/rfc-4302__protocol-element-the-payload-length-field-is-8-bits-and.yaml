document: rfc-4302
kind: protocol-element
summary: The Payload Length field is 8 bits and specifies the length of AH in 32-bit words minus 2. For IPv6, the total AH header length must be a multiple of 8-octet units, even though length is measured in 32-bit words (unlike other IPv6 extension headers).
section: "2.2"
topics:
