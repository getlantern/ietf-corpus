document: rfc-5147
kind: normative-requirement
summary: Implementations MUST take the character encoding of the MIME entity into account when interpreting character or line numbers, because character count and octet count may differ (e.g., UTF-16 uses two or four octets per character and may include a BOM).
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
