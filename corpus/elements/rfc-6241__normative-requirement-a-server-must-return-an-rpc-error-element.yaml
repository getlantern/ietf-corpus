document: rfc-6241
kind: normative-requirement
summary: A server MUST return an <rpc-error> element if any error conditions occur during processing. A server MUST NOT return application-level or data-model-specific error information to clients lacking sufficient access rights.
section: "4.3"
rfc2119_level: MUST
topics:
    - netconf
    - security
