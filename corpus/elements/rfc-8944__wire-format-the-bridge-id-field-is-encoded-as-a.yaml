document: rfc-8944
kind: wire-format
summary: The bridge-id field is encoded as a hexadecimal 8-octet string matching the pattern '[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){7}'. It contains 4 bits of priority, 12 bits of MSTI-ID, and the base bridge identifier, and may appear multiple times (one per spanning tree instance).
