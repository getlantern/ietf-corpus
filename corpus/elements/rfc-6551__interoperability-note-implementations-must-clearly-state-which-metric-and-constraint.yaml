document: rfc-6551
kind: interoperability-note
summary: Implementations must clearly state which metric and constraint options they include, which are default, and which are configurable. The ROLL working group will produce applicability statements clarifying which options apply to specific LLN deployment scenarios (industrial, home automation, urban, building automation).
