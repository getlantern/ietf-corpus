document: rfc-4619
kind: wire-format
summary: 'The Martini Legacy Mode Control Word differs from the standard control word only in that the B (BECN) and F (FECN) bits are reversed: bit 4 is BECN and bit 5 is FECN. This format is used for PW type 0x0001 ''Frame Relay DLCI (Martini Mode)''.'
section: "7.4"
