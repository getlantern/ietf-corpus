document: rfc-3825
kind: protocol-element
summary: The LaRes and LoRes resolution fields (6 bits each) indicate the number of high-order bits in Latitude and Longitude that are valid. Bits beyond the resolution limit SHOULD NOT be considered valid and may be deliberately falsified or zeroed. Values above decimal 34 are undefined and reserved.
section: "2.1"
topics:
