document: rfc-7119
kind: normative-requirement
summary: Intermediate Processes MUST NOT assume that received records appear in flowStartTime, flowEndTime, or observationTime order. A process MAY ignore significantly out-of-order records but SHOULD report that records were dropped.
section: "7"
rfc2119_level: MUST NOT
topics:
