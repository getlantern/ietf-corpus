document: rfc-3972
kind: protocol-element
summary: Hash1 (64-bit) is the leftmost 64 bits of the SHA-1 hash of the full CGA Parameters data structure. Hash2 (112-bit) is the leftmost 112 bits of the SHA-1 hash of CGA Parameters with subnet prefix and collision count zeroed out. Both hashes include any unrecognized extension fields.
