document: rfc-3620
kind: wire-format
summary: 'The only allowable attribute combinations on a ''tunnel'' element are: fqdn+port; fqdn+srv; fqdn+srv+port; ip4+port; ip6+port; ''profile'' alone (innermost only); ''endpoint'' alone (innermost only); or no attributes (innermost only). Any other combination is invalid.'
