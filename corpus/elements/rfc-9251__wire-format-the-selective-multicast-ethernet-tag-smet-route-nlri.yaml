document: rfc-9251
kind: wire-format
summary: 'The Selective Multicast Ethernet Tag (SMET) Route NLRI contains: RD (8 octets), Ethernet Tag ID (4 octets), Multicast Source Length (1 octet), Multicast Source Address (variable), Multicast Group Length (1 octet), Multicast Group Address (variable), Originator Router Length (1 octet), Originator Router Address (variable), and Flags (1 octet). All fields except the Flags octet are part of the BGP route key.'
section: "9.1"
topics:
    - multicast
    - routing
