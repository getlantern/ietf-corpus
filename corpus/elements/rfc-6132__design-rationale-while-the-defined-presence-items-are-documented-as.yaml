document: rfc-6132
kind: design-rationale
summary: While the defined presence items are documented as similar to items in XMPP (RFC 6121), the extension is intentionally not tied to XMPP or any particular presence source. Flexible implementations should be ready for future extensions derived from diverse sources including calendar information and geographic location.
