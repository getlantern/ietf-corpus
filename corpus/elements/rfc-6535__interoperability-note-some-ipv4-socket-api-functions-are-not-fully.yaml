document: rfc-6535
kind: interoperability-note
summary: Some IPv4 socket API functions are not fully compatible with IPv6 because IPv4 supports features absent in IPv6 (e.g., SO_BROADCAST). These API incompatibilities cannot be fully resolved by function mapping.
section: "4.1"
topics:
