summary: 'The audio/RED MIME type requires a ''pt'' parameter: a comma-separated quoted-string list of RTP payload types, where dynamic payload types are mapped as ''dynamic-type=content-type''. For SDP, commas in pt are replaced with slashes in a=fmtp.'
