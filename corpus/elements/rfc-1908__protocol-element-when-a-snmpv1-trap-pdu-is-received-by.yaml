document: rfc-1908
kind: protocol-element
summary: When a SNMPv1 Trap-PDU is received by a proxy agent, it is mapped to a SNMPv2-Trap-PDU by prepending sysUpTime.0 (from the timestamp field) and snmpTrapOID.0 (derived from the generic-trap and enterprise fields), and appending snmpTrapEnterprise.0 (from the enterprise field).
section: 3.1.2
topics:
