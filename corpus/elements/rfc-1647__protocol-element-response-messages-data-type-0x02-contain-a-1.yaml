document: rfc-1647
kind: protocol-element
summary: RESPONSE messages (DATA-TYPE=0x02) contain a 1-byte data payload. For POSITIVE-RESPONSE, 0x00 means successful completion ('Device End'). For NEGATIVE-RESPONSE, 0x00=Command Reject, 0x01=Intervention Required, 0x02=Operation Check, 0x03=Component Disconnected.
section: 10.4.1
