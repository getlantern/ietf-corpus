document: rfc-8513
kind: protocol-element
summary: The 'b4-address-change-limit-policy-violation' YANG notification (feature 'aftr') is emitted when a B4 attempts to change its IPv6 address faster than the configured limit. It carries the NAT instance ID, policy ID, and the offending B4 IPv6 address.
