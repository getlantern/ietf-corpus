document: rfc-8398
kind: interoperability-note
summary: SmtpUTF8Mailbox is restricted to non-ASCII local-parts specifically to maintain compatibility with legacy software that supports only rfc822Name; when the local-part is ASCII-only, rfc822Name MUST be used even if the domain contains non-ASCII characters (encoded as A-label).
