document: rfc-5814
kind: design-rationale
summary: Clock synchronization between ingress and egress nodes is not required for any of the LSP setup delay measurements because GMPLS LSP setup uses two-way signaling — both timestamps T1 and T2 are taken at the ingress node, making synchronization unnecessary.
section: "4.6"
topics:
