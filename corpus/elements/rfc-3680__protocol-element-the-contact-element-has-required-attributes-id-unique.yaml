document: rfc-3680
kind: protocol-element
summary: The "contact" element has required attributes "id" (unique contact identifier), "state" ("active" or "terminated"), and "event" (registered, created, refreshed, shortened, expired, deactivated, probation, unregistered, or rejected). Optional attributes include "expires", "retry-after", "duration-registered", "q", "callid", and "cseq".
section: "5.1"
