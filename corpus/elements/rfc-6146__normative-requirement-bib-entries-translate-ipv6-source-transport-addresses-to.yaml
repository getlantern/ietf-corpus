document: rfc-6146
kind: normative-requirement
summary: BIB entries translate IPv6 source transport addresses to IPv4 source transport addresses, and IPv4 destination transport addresses to IPv6 destination transport addresses. IPv6 destination addresses and IPv4 source addresses are translated algorithmically, NOT via BIB lookup — a distinction required for correct hairpinning.
section: 3.6.1
rfc2119_level: MUST
topics:
    - nat
    - v6ops
