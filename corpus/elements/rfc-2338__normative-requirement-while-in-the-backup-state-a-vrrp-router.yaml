document: rfc-2338
kind: normative-requirement
summary: While in the Backup state, a VRRP router MUST NOT respond to ARP requests for virtual router IP addresses, MUST discard packets destined to the virtual router MAC address, and MUST NOT accept packets addressed to virtual router IPs.
section: 6.4.2
rfc2119_level: MUST NOT
topics:
