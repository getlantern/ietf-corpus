document: rfc-8265
kind: normative-requirement
summary: An implementation SHOULD apply the PRECIS profile rules repeatedly until the output string is stable. If the output does not stabilize after three additional applications beyond the first, the implementation SHOULD terminate and reject the input string as invalid.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
