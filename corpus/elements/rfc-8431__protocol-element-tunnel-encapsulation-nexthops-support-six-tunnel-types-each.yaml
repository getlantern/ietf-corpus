document: rfc-8431
kind: protocol-element
summary: 'Tunnel encapsulation nexthops support six tunnel types, each gated by a YANG feature: IPv4 tunnel (src/dest address, protocol, TTL, DSCP), IPv6 tunnel (src/dest, next-header, traffic-class, flow-label, hop-limit), MPLS (label push/swap operations), GRE (RFC 2784), NVGRE (RFC 7637), and VXLAN (RFC 7348).'
section: "2.4"
topics:
    - yang
    - routing
    - mpls
    - ip
