document: rfc-4206
kind: interoperability-note
summary: FAs are not expected to be used for establishing ISIS/OSPF peering between routers at the ends of the adjacency. To restrict FAs to TE path computations only, IS-IS can set the default metric to maximum (2^24 - 1) or OSPF can advertise only a TE opaque LSA without a regular LSA.
section: "4"
topics:
