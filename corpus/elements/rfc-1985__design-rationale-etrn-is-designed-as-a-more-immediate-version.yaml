document: rfc-1985
kind: design-rationale
summary: 'ETRN is designed as ''a more immediate version of the retry queues'' in SMTP: the server starts a new outbound connection on demand rather than reversing the existing connection, preserving standard SMTP authentication and trust semantics while satisfying both transient-connection cost-saving and time-sensitive delivery use cases.'
