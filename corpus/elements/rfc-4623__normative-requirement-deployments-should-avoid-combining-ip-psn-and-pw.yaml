document: rfc-4623
kind: normative-requirement
summary: Deployments SHOULD avoid combining IP PSN and PW fragmentation and reassembly on the same node. When PW fragmentation is enabled, the DF bit MUST be set on all L2TP over IP packets for that PW.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - ip
