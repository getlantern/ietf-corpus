document: rfc-8279
kind: protocol-element
summary: The Bit Index Routing Table (BIRT) maps from a BFER's BFR-id (in a specific sub-domain) to that BFER's BFR-prefix and the BFR-NBR (next-hop BFR neighbor) on the path to that BFER. The BIRT is sub-domain-specific and is derived from advertised BFR-prefix/BFR-id information combined with the routing underlay.
section: "6.3"
topics:
    - routing
