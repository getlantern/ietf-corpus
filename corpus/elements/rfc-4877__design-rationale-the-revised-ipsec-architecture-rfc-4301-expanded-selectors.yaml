document: rfc-4877
kind: design-rationale
summary: The revised IPsec architecture (RFC 4301) expanded selectors to include Mobility Header message type and ICMPv6 message type and code, making it easier to differentiate between individual mobility header messages without requiring per-interface security policy configuration as RFC 3776 did.
section: "1"
topics:
