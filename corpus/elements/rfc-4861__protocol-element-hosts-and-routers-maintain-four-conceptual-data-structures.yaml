document: rfc-4861
kind: protocol-element
summary: 'Hosts and routers maintain four conceptual data structures per interface: Neighbor Cache (link-layer addresses and NUD state per neighbor), Destination Cache (next-hop IP per destination, updated by Redirects), Prefix List (on-link prefixes from RAs with lifetimes), and Default Router List (routers with lifetimes, favoring reachable ones).'
section: "5.1"
topics:
