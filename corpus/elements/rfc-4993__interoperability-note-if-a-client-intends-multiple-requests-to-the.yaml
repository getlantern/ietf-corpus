document: rfc-4993
kind: interoperability-note
summary: If a client intends multiple requests to the same server in a short period, IRIS-LWZ offers no real advantage over IRIS-XPC; IRIS-XPC is RECOMMENDED in that case as it is similarly or more efficient and supports greater response sizes and better security.
section: "4"
extracted_by: claude-sonnet-4-6
