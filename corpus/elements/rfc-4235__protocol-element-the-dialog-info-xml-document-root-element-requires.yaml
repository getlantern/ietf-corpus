summary: 'The dialog-info XML document root element requires three mandatory attributes: ''version'' (non-negative 32-bit integer, incremented per notification per subscription), ''state'' (full or partial), and ''entity'' (URI of the observed user). It contains zero or more dialog sub-elements.'
