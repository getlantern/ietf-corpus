document: rfc-2916
kind: design-rationale
summary: The '+' is retained through step 2 of the E.164-to-DNS conversion to flag that the number being processed is an E.164 number. Future work may be needed to handle other numbering plans (such as closed ones) which might use a similar mechanism.
