summary: IANA assigned DHCPv4 Option Code 158 (OPTION_V4_PCP_SERVER) in the BOOTP/DHCP parameters registry at iana.org/assignments/bootp-dhcp-parameters. The minimum data length is 5 octets; the option carries one or multiple lists of PCP server IPv4 addresses.
