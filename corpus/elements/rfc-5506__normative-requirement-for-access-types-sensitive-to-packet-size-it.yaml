document: rfc-5506
kind: normative-requirement
summary: For access types sensitive to packet size, it is strongly RECOMMENDED that Reduced-Size RTCP be limited to a single RTCP packet per lower-layer datagram. Large Reduced-Size RTCP packets are strongly RECOMMENDED to be transmitted as compound RTCP instead.
section: 4.2.2
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
