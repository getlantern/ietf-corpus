document: rfc-9514
kind: wire-format
summary: The SRv6 Locator TLV (Type 1162, variable length) carries a 1-octet Flags field, 1-octet Algorithm, 2-octet Reserved, and 4-octet Metric, followed by optional sub-TLVs. It is advertised in the BGP-LS Attribute of a Prefix NLRI whose prefix matches the SRv6 locator.
section: "5.1"
topics:
