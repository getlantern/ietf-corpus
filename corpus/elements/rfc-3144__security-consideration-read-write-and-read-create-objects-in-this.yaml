document: rfc-3144
kind: security-consideration
summary: Read-write and read-create objects in this MIB (including the control table entries) can negatively affect network operations if SET operations are allowed in a non-secure environment without proper protection. SNMPv1 provides no access control even on a network secured by IPsec.
section: "9"
topics:
    - snmp
    - security
