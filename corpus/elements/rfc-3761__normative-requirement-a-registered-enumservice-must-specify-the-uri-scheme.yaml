document: rfc-3761
kind: normative-requirement
summary: A registered Enumservice MUST specify the URI scheme(s) that may be used, and any other information needed for URI resolution. The type MUST be unique and MUST NOT start with 'X-' (reserved for experimental use).
section: 3.1.1
rfc2119_level: MUST
