document: rfc-5882
kind: normative-requirement
summary: BFD Control packets MUST be marked in the same way as the data packets they are protecting (e.g., for DiffServ), partly to ensure fate sharing with data traffic and partly to enable correct demultiplexing of initial packets before discriminator values have been exchanged.
section: "6"
rfc2119_level: MUST
topics:
    - routing
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
