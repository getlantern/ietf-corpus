document: rfc-9101
kind: normative-requirement
summary: The authorization server supporting JAR MUST only use the parameters included in the Request Object, even if the same parameter is duplicated in query parameters. The 'client_id' in the query parameter and in the Request Object claim MUST be identical.
section: "6.3"
rfc2119_level: MUST
topics:
    - oauth
    - security
