document: rfc-1508
kind: protocol-element
summary: Channel bindings (chan_binding) allow callers to bind security context establishment to characteristics of the underlying communications channel such as addresses or transformed encryption keys. Both peers must provide consistent channel binding values; the caller must determine chan_binding values before calling GSS_Init_sec_context().
section: 1.1.6
topics:
    - security
