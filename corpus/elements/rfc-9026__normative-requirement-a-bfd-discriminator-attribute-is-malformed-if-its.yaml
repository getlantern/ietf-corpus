document: rfc-9026
kind: normative-requirement
summary: A BFD Discriminator attribute is malformed if its length is smaller than 11 octets or if Optional TLVs are not well-formed; the UPDATE message SHALL then be handled via Attribute Discard per RFC 7606.
section: 3.1.6
rfc2119_level: MUST NOT
