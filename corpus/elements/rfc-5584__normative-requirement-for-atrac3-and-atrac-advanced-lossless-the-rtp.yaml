document: rfc-5584
kind: normative-requirement
summary: For ATRAC3 and ATRAC Advanced Lossless, the RTP timestamp rate MUST be 44100 Hz. For ATRAC-X, the timestamp rate is 44100 Hz or 48000 Hz selected by out-of-band signaling.
section: "5.2"
rfc2119_level: MUST
topics:
