document: rfc-5034
kind: design-rationale
summary: The original POP3 AUTH command predated SASL and was therefore missing key components such as a way to list available authentication mechanisms. RFC 2449 attempted to remedy this with CAPA and initial client response support, but problems remained in the specification's clarity.
