document: rfc-4239
kind: normative-requirement
summary: The receiving agent MUST be able to support multipart messages. If the message is identified as a voice message, it SHOULD be presented to the user as a voice message rather than as email with a voice attachment.
section: "3"
rfc2119_level: MUST
topics:
    - email
