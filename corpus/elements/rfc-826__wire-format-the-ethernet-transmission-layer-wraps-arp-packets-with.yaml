summary: The Ethernet transmission layer wraps ARP packets with a 48-bit destination address, 48-bit sender address, and 16-bit protocol type field set to ether_type$ADDRESS_RESOLUTION. The ARP payload follows immediately after this 14-byte Ethernet header.
