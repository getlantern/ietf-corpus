document: rfc-3301
kind: protocol-element
summary: The Rx Maximum BPS AVP (Attribute Type 41) encodes the highest acceptable line speed in the receive (user-to-LAC) direction for asymmetric calls. It is optional in OCRQ; absence implies symmetric transmission with Max BPS equal to the Tx Maximum BPS.
