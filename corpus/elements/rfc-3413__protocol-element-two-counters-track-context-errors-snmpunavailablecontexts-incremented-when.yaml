document: rfc-3413
kind: protocol-element
summary: 'Two counters track context errors: snmpUnavailableContexts (incremented when the named context is known but currently unavailable) and snmpUnknownContexts (incremented when the named context is completely unknown). Both trigger generation of a report message rather than a normal response.'
