document: rfc-4682
kind: security-consideration
summary: The MTA uses X.509 Public Key Infrastructure certificates (Manufacturer Certificate, Device Certificate, and Telephony Service Provider Root Certificate) stored in non-volatile memory for mutual authentication with the KDC and provisioning infrastructure. These can only be updated via secure code download.
