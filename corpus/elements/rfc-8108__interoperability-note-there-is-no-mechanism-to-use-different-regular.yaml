document: rfc-8108
kind: interoperability-note
summary: There is no mechanism to use different regular RTCP reporting intervals for different media types or individual RTP streams within a single RTP session; separate RTP sessions are required if per-stream RTCP intervals are needed.
section: 7.2.2
topics:
