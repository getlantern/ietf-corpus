document: rfc-4033
kind: design-rationale
summary: The DS RR at a delegation point contains a hash of the child zone's DNSKEY, simplifying cross-organizational signing by allowing the parent zone administrator to vouch for the child zone's key without needing to sign the child's data directly.
section: "3.1"
topics:
    - dns
    - security
    - crypto
