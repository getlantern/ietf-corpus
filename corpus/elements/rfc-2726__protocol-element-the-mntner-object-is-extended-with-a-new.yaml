document: rfc-2726
kind: protocol-element
summary: The mntner object is extended with a new auth attribute value of the form PGPKEY-<id>, where <id> is the hex ID of the PGP public key used for authentication. Multiple PGPKEY-<id> auth values are permitted; any one valid signature satisfies authentication.
section: "2.2"
topics:
    - security
    - crypto
