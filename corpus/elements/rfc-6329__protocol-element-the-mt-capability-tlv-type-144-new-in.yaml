summary: The MT-Capability TLV (type 144, new in this document) is the LSP container for all SPB node information. It carries an O (overload) bit with SPB adjacency semantics and an MT ID; a new IANA sub-registry starting at sub-TLV value 1 is managed by Expert Review.
