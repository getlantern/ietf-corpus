document: rfc-7483
kind: privacy-consideration
summary: RDAP responses can contain personal data such as postal addresses, email addresses, and phone numbers represented in jCard. Servers may withhold data based on policy and signal this via "removed", "obscured", or "private" status values or truncation notices.
