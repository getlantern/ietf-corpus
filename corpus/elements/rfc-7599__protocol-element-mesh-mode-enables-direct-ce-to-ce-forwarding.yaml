document: rfc-7599
kind: protocol-element
summary: Mesh mode enables direct CE-to-CE forwarding by activating Forwarding Mapping Rules covering the destination IPv4 prefix and port range. Hub-and-spoke mode, the default when only a BMR is configured, routes all CE traffic via a BR. The mode is governed by which FMRs are provisioned.
section: "12.2"
