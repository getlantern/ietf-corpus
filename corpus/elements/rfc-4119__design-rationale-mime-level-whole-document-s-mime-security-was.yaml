document: rfc-4119
kind: design-rationale
summary: MIME-level (whole-document) S/MIME security was chosen over XML element-level encryption/signatures because virtually any partial-protection configuration creates a risk of privacy leakage; protecting the PIDF document as a unit avoids these configuration pitfalls.
