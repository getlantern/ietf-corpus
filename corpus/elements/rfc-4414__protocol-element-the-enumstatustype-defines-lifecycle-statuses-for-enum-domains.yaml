document: rfc-4414
kind: protocol-element
summary: 'The enumStatusType defines lifecycle statuses for ENUM domains including: reserved, create, active, inactive, dispute, delete, transfer, renew, update, addPeriod, renewPeriod, autoRenewPeriod, transferPeriod, redemptionPeriod, restore, and other; each may carry actor (registry/registrar), disposition (prohibited/pending), and subStatus attributes.'
