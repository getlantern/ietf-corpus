summary: 'Three new STUN methods are defined: Connect (0x000a) — client requests outgoing TCP connection to a peer; ConnectionBind (0x000b) — client binds a new TCP connection to a peer data connection; ConnectionAttempt (0x000c) — server indication to client of an incoming peer TCP connection.'
