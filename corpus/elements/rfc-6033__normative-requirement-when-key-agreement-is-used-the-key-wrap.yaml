document: rfc-6033
kind: normative-requirement
summary: 'When key agreement is used, the key wrap algorithm MUST match the content-encryption algorithm: AES-128 Key Wrap with Padding for AES-128 content-encryption, and AES-256 Key Wrap with Padding for AES-256 content-encryption.'
