document: rfc-8261
kind: normative-requirement
summary: The DTLS implementation MUST support DTLS 1.0 (RFC 4347) and SHOULD support the most recently published version of DTLS (DTLS 1.2 at time of publication). This latter requirement applies to all future versions of DTLS when published as RFCs.
