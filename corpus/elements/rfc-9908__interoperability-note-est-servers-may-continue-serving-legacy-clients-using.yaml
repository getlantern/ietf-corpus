document: rfc-9908
kind: interoperability-note
summary: EST servers MAY continue serving legacy clients using the unstructured CsrAttrs approach from RFC 7030 and MAY simultaneously include the new CertificationRequestInfoTemplate for newer clients. Clients that understand both formats MUST use only the template and ignore all other CsrAttrs elements; older clients will ignore the new element.
section: "4"
topics:
