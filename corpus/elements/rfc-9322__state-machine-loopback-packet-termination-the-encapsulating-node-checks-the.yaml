document: rfc-9322
kind: state-machine
summary: 'Loopback packet termination: the encapsulating node checks the Node ID in the Hop_Lim/node_id field of the first hop. If the Node ID and IOAM-Namespace match the current node, the packet is identified as a looped-back packet and processed as such; otherwise it is treated as a conventional IOAM-encapsulated packet and decapsulated normally.'
section: "4.4"
topics:
