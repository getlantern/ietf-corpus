document: rfc-2837
kind: state-machine
summary: 'Module operational state (fcFeModuleOperStatus) has four values: online(1) — functioning properly; offline(2) — not available; testing(3) — under test; faulty(4) — defective. Transitions are driven by hardware events or management action; fcFeModuleLastChange records the sysUpTime of the most recent transition.'
section: "3"
