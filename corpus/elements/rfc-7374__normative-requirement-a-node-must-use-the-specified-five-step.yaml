document: rfc-7374
kind: normative-requirement
summary: 'A node MUST use the specified five-step procedure to register as a service provider: start at Lstart, fetch and store at I(level, n.id) with a wildcard fetch, then walk upward if n.id is the lowest or highest Node-ID in the interval, and also walk downward until it is the sole provider in its interval.'
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
