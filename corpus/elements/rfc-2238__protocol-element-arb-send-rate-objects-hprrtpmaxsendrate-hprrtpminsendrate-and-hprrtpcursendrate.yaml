summary: ARB send-rate objects hprRtpMaxSendRate, hprRtpMinSendRate, and hprRtpCurSendRate (hprRtpEntry 16–18) are Gauge32 values in bytes per second. Max and min are high/low-water marks for the entire connection lifetime, not just the current path.
