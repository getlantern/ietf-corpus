document: rfc-2662
kind: protocol-element
summary: 'Three ADSL interface layers exist per line: a mandatory physical interface (ifType=adsl(94)), an optional fast channel (ifType=adslFast(125)), and an optional interleaved channel (ifType=adslInterleave(124)). The ifStackTable relates channel entries to their parent physical-layer entry so that configuration profile parameters can be inherited.'
section: 4.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
