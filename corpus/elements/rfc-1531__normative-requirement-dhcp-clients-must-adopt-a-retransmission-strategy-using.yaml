document: rfc-1531
kind: normative-requirement
summary: 'DHCP clients MUST adopt a retransmission strategy using randomized exponential backoff: first retransmission after 4 seconds ±1, second after 8 seconds ±1, doubling each time to a maximum of 64 seconds.'
