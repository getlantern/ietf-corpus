document: rfc-3873
kind: protocol-element
summary: sctpAssocTable (OID sctpObjects 3) is the main per-association table, indexed by sctpAssocId (Unsigned32 1..4294967295). It stores remote hostname, local/remote ports, primary remote address, heartbeat interval, state, stream counts, max retransmissions, and per-association statistics.
