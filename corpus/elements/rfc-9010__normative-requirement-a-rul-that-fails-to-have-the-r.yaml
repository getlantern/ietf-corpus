document: rfc-9010
kind: normative-requirement
summary: A RUL that fails to have the R flag echoed in the NA MUST assume that routing service establishment via that 6LR failed and SHOULD attempt to use another 6LR. The RUL SHOULD ensure one registration succeeds before setting R=0.
section: 9.2.1
rfc2119_level: MUST
topics:
    - routing
