document: rfc-5007
kind: normative-requirement
summary: OPTION_LQ_RELAY_DATA MUST NOT be returned if the server lacks relay agent information (client communicated directly or server did not retain the information). If returned, the DHCP-relay-message MUST be a valid RELAY-FORW message with the innermost OPTION_RELAY_MSG removed.
section: 4.1.2.4
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
