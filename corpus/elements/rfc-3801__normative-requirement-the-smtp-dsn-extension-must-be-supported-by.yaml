document: rfc-3801
kind: normative-requirement
summary: The SMTP DSN extension MUST be supported by VPIM conforming implementations, including the NOTIFY parameter on the RCPT command. The SIZE extension MUST also be supported; ENHANCEDSTATUSCODES and PIPELINING SHOULD be supported.
section: 5.2.1
rfc2119_level: MUST
