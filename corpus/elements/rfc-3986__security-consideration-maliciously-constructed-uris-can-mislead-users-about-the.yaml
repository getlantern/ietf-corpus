document: rfc-3986
kind: security-consideration
summary: Maliciously constructed URIs can mislead users about the nature of the referenced resource, for example by embedding a trusted-looking string in a component that is ignored by the scheme-specific resolver. User agents should render the userinfo subcomponent visually distinct from the host to expose such deception.
section: "7.2"
topics:
    - security
