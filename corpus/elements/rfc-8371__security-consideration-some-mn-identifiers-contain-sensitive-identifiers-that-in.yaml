document: rfc-8371
kind: security-consideration
summary: Some MN identifiers contain sensitive identifiers that in other SDO protocols are only used for initial network entry signaling, with subsequent exchanges relying on a temporary identifier. Managing the association between long-lived and temporary identifiers is outside the scope of this document.
