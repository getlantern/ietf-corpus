document: rfc-3729
kind: normative-requirement
summary: When an agent uses the push model for APM Exceptions, the notification must include apmAppDirID, apmNameTable updates, the relevant apmTransactionEntry, and the apmExceptionEntry. This list supersedes the OBJECTS clauses of the apmTransactionResponsivenessAlarm and apmTransactionUnsuccessfulAlarm notifications.
section: 2.4.2
rfc2119_level: MUST
topics:
    - snmp
