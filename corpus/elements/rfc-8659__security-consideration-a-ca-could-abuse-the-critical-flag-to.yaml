document: rfc-8659
kind: security-consideration
summary: A CA could abuse the critical flag to trick customers into publishing records that prevent competing CAs from issuing certificates. In practice this attack is of minimal effect, since a blocked competitor would investigate and report the situation to the customer.
section: "5.6"
topics:
