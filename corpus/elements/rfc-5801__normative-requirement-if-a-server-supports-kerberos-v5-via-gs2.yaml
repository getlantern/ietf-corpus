document: rfc-5801
kind: normative-requirement
summary: If a server supports Kerberos V5 via GS2, it SHOULD also support Kerberos V5 through the 'GSSAPI' mechanism to avoid interoperability problems with older clients. If the application requires SASL security layers, it MUST use the 'GSSAPI' mechanism instead of GS2-KRB5.
section: "13.2"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
