document: rfc-3371
kind: normative-requirement
summary: The l2tpTunnelConfigSecret object MUST be accessible only via requests using both authentication and privacy. The agent MUST report an empty string in response to get, get-next, and get-bulk requests to prevent exposure of the shared secret.
section: "4.0"
rfc2119_level: MUST
topics:
