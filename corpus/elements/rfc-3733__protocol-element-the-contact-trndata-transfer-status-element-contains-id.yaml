document: rfc-3733
kind: protocol-element
summary: The <contact:trnData> transfer status element contains id, trStatus, requesting client ID (reID), request date (reDate), acting client ID (acID), and the deadline or completion date (acDate). It is used in both query and transform transfer responses.
