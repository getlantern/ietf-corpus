document: rfc-7563
kind: interoperability-note
summary: The MAG-Group-Identifier should be unique within an operator network but is not assumed globally unique. In multi-operator domains, it SHOULD be combined with the Operator-Identifier sub-option (RFC 6757) to ensure uniqueness.
section: "3.2"
topics:
