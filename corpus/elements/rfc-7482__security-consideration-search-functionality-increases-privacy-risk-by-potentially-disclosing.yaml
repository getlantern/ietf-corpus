document: rfc-7482
kind: security-consideration
summary: Search functionality increases privacy risk by potentially disclosing object relationships not otherwise obvious, such as returning IDN variants (RFC 6927) that do not explicitly match a client's search pattern. Implementers must consider policy and privacy implications of returning information not explicitly requested.
section: "7"
topics:
