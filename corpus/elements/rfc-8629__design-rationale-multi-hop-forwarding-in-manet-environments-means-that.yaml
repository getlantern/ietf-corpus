document: rfc-8629
kind: design-rationale
summary: Multi-hop forwarding in MANET environments means that DLEP Destination Messages alone are insufficient — they report reachable destinations but not the number or capacity of intermediate hops. This extension adds hop-count reporting and control to give routers the information needed for informed forwarding and routing decisions.
section: "1"
