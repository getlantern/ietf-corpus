document: rfc-7614
kind: protocol-element
summary: When a SUBSCRIBE arrives during the refer event state retention period after the referred action has completed, the subscription is accepted and immediately terminated with a NOTIFY containing the final event state and Subscription-State of 'terminated' with reason 'noresource'.
