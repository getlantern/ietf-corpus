document: rfc-8480
kind: normative-requirement
summary: When a 6P Timeout expires, the transaction MUST be canceled at the timing-out node. The SF MUST determine the timeout value, which should exceed the longest possible time to receive a 6P Response or Confirmation given link-layer retransmissions and cell scheduling.
section: 3.4.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
