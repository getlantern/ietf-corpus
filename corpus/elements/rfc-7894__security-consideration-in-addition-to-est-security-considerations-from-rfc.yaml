document: rfc-7894
kind: security-consideration
summary: In addition to EST security considerations from RFC 7030, security considerations associated with the OTP generation and verification mechanism apply to the otpChallenge attribute. The security considerations from RFC 4226 (HOTP) or RFC 6238 (TOTP) and from RFC 2985 for the challenge attribute are relevant.
section: "5"
topics:
