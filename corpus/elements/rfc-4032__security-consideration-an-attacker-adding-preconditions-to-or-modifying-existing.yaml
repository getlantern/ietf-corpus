document: rfc-4032
kind: security-consideration
summary: An attacker adding preconditions to, or modifying existing preconditions within, a session description could prevent session establishment. An attacker removing preconditions could force sessions to be established without mandatory preconditions being met. Integrity protection via S/MIME is strongly recommended to counter these threats.
section: "5"
topics:
    - sip
    - security
