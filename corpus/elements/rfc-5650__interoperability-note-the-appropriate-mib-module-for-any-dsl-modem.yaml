document: rfc-5650
kind: interoperability-note
summary: 'The appropriate MIB module for any DSL modem is determined by the ifType value the modem reports: adsl(94) selects RFC 2662, adsl2plus(238) selects RFC 4706, and vdsl2(251) selects this document. Older modems may not support the more sophisticated management model required by this MIB even if they support ADSL2.'
section: "2"
topics:
