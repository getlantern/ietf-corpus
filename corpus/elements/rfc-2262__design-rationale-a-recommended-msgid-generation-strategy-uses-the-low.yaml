document: rfc-2262
kind: design-rationale
summary: A recommended msgID generation strategy uses the low-order bits of snmpEngineBoots as the high-order portion and a monotonically increasing integer for the low-order portion. This avoids reuse of outstanding values and provides replay protection without requiring unpredictable values.
section: "6.2"
topics:
    - snmp
    - security
