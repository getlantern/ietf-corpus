document: rfc-6904
kind: normative-requirement
summary: Header extension encryption MUST be performed before the SRTP authentication tag is computed. Authentication tag validation MUST be performed on the encrypted (wire-form) header extension, not on decrypted data.
section: "3"
rfc2119_level: MUST
topics:
