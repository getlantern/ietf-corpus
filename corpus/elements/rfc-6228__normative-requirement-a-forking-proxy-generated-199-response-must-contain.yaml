document: rfc-6228
kind: normative-requirement
summary: A forking proxy-generated 199 response MUST contain a To header field tag identifying the terminated early dialog and MUST insert a Reason header field with the SIP response code that triggered the 199. The proxy MUST NOT insert a '199' option-tag in Supported, Require, or Proxy-Require of the 199 response.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
