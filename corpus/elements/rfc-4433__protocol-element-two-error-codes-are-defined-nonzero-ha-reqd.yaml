summary: 'Two error codes are defined: NONZERO-HA-REQD (value 90, rejection by FA) indicates that a non-zero HA address is required in the Registration Request; REDIRECT-HA-REQ (value 143, rejection by HA) instructs the MN to re-register with the redirected HA specified in the Redirected HA Extension.'
