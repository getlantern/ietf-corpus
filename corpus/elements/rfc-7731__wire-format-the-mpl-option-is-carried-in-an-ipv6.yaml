document: rfc-7731
kind: wire-format
summary: The MPL Option is carried in an IPv6 Hop-by-Hop Options header (Option Type 0x6D). It contains a 2-bit S field encoding seed-id length (0=IPv6 src, 1=16-bit, 2=64-bit, 3=128-bit), 1-bit M flag (largest known sequence), 1-bit V flag (version, must be 0), 4-bit reserved, an 8-bit sequence number, and an optional variable-length seed-id.
section: "6.1"
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
