document: rfc-5668
kind: normative-requirement
summary: Autonomous Systems that use 2-octet AS numbers SHOULD use 2-octet AS specific extended communities rather than 4-octet AS specific extended communities, to maintain backward compatibility and avoid inconsistencies where the same community values would be treated as different.
section: "3"
rfc2119_level: SHOULD
