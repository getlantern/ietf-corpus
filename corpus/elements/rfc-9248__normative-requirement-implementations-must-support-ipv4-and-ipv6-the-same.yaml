document: rfc-9248
kind: normative-requirement
summary: Implementations MUST support IPv4 and IPv6. The same IP version MUST be used for both signaling and media of a call unless ICE (RFC 8445) is used, in which case candidates may explicitly offer IPv4, IPv6, or both.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
