document: rfc-8139
kind: security-consideration
summary: Port-Shutdown messages SHOULD be secured using the RBridge Channel Header Extension security feature (RFC 7978). If inadequately secured, they present a potential denial-of-service vector, as a rogue actor could falsely signal port failures and disrupt Appointed Forwarder assignments.
section: "9"
topics:
    - security
