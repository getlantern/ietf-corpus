document: rfc-8139
kind: normative-requirement
summary: All TRILL switches MUST support the E-L1CS flooding scope (RFC 7356), E-L1FS (RFC 7780), and base LSPs. E-L1CS PDUs MUST NOT exceed 1,470 bytes in length when transmitted, though longer received PDUs are processed normally.
section: "8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
