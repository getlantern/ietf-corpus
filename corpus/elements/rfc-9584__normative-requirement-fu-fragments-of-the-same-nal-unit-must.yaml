document: rfc-9584
kind: normative-requirement
summary: FU fragments of the same NAL unit MUST be sent in consecutive order with ascending RTP sequence numbers, with no other packets from the same RTP stream interspersed. APs MUST NOT be fragmented. FUs MUST NOT be nested. FU payloads MUST NOT be empty.
section: 4.3.3
rfc2119_level: MUST
topics:
    - rtp
    - realtime
