document: rfc-3268
kind: design-rationale
summary: All new ciphersuites use AES in CBC mode with SHA-1 in an HMAC construction as described in TLS section 5. The ciphersuite naming convention inherits the 'SHA' label from TLS, which actually refers to the modified SHA-1.
section: Cipher Usage
topics:
    - tls
    - crypto
