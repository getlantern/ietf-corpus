document: rfc-3265
kind: normative-requirement
summary: 200-class responses to SUBSCRIBE requests MUST contain an 'Expires' header. The period in the response MAY be shorter but MUST NOT be longer than specified in the request; the response value defines the actual subscription duration.
section: 3.1.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
