document: rfc-9784
kind: protocol-element
summary: A Grouping Ethernet A-D per ES route represents all vESes associated with a physical port. It uses a Type 3 ESI (RFC 7432 Section 5) with the MAC field set to the port color (MAC address) and the 3-octet local discriminator set to 0xFFFFFF. It is advertised with Route Targets for all affected service instances; if Route Targets exceed capacity, multiple routes are advertised.
section: 4.2.1
topics:
    - mpls
    - routing
    - bgp
