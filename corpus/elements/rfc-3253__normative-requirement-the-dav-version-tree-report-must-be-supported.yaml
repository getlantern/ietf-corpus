document: rfc-3253
kind: normative-requirement
summary: The DAV:version-tree report MUST be supported by all version resources and all version-controlled resources. The response body MUST contain a DAV:response element for each version in the version history of the version identified by the request-URL.
section: "3.7"
rfc2119_level: MUST
topics:
    - http
