document: rfc-5363
kind: security-consideration
summary: Attackers may attempt to modify URI lists in transit, causing requests to be sent to unintended recipients. Clients should use S/MIME (end-to-end) or TLS (hop-by-hop) to provide integrity protection and optionally confidentiality.
