document: rfc-8360
kind: interoperability-note
summary: ROAs and BGPsec Router Certificates remain valid only if all of their resources are encompassed by the VRS of all certificates along the path to the trust anchor, regardless of whether old or new OIDs are used — the amended algorithm does not relax security for end-entity objects.
section: 4.2.5
topics:
