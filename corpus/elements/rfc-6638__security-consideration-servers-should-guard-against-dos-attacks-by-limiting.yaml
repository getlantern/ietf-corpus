document: rfc-6638
kind: security-consideration
summary: Servers should guard against DoS attacks by limiting the number of Attendees per scheduling message and the rate of scheduling messages. Large recurring events with many attendees can generate substantial server-side processing and message traffic on each modification.
section: "11.1"
topics:
    - security
