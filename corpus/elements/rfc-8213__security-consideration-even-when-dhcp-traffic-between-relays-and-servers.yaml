document: rfc-8213
kind: security-consideration
summary: Even when DHCP traffic between relays and servers is encrypted on the wire, unencrypted data may still be accessible through attacks on DHCP servers, relays, or related systems. Security of databases, logs, and network transfers of that data must also be considered.
section: "4"
topics:
