document: rfc-7471
kind: design-rationale
summary: Link loss encoding uses a basic unit of 0.000003% (rather than a coarser unit) because precision is considered more important on high-speed links than the ability to express loss rates above 50%; high-speed links with over 50% loss are deemed unusable.
section: 4.4.5
topics:
    - routing
    - measurement
