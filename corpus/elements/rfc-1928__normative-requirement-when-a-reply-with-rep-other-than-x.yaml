document: rfc-1928
kind: normative-requirement
summary: When a reply with REP other than X'00' indicates failure, the SOCKS server MUST terminate the TCP connection shortly after sending the reply, no more than 10 seconds after detecting the failure condition.
section: "6"
rfc2119_level: MUST
