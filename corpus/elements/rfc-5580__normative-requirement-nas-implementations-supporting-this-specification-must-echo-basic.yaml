document: rfc-5580
kind: normative-requirement
summary: NAS implementations supporting this specification MUST echo Basic-Location-Policy-Rules and Extended-Location-Policy-Rules Attributes unmodified in subsequent Access-Request packets. An Access-Request with Service-Type 'Authorize Only' MUST include these policy attributes if the FUTURE_REQUESTS flag was set.
section: 7.2.1
rfc2119_level: MUST
topics:
    - radius
    - privacy
