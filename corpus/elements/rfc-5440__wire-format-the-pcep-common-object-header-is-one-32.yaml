document: rfc-5440
kind: wire-format
summary: 'The PCEP common object header is one 32-bit word: Object-Class (8 bits), OT/Object-Type (4 bits), Res/reserved (2 bits, must be zero), P flag/Processing-Rule (1 bit), I flag/Ignore (1 bit), and Object-Length (16 bits, total object length in bytes, always a multiple of 4, minimum 4).'
section: "7.2"
