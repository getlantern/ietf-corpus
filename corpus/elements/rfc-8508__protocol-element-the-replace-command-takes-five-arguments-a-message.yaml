document: rfc-8508
kind: protocol-element
summary: 'The REPLACE command takes five arguments: a message sequence number, a named mailbox, an optional flag list, an optional date/time string, and a message literal. The new message is appended to the named mailbox and the identified message is removed from the selected mailbox, appearing to the client as a single action.'
section: "3.2"
topics:
    - email
