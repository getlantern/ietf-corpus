document: rfc-4570
kind: protocol-element
summary: 'The SDP ''source-filter'' attribute specifies one or more unicast source addresses as either legitimate (inclusive) or illegitimate (exclusive) sources for a session''s connection-address values. Its syntax is: a=source-filter: <filter-mode> <filter-spec>, where <filter-spec> consists of <nettype> <address-types> <dest-address> <src-list>.'
section: "3"
topics:
    - realtime
    - multicast
