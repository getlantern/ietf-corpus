document: rfc-7070
kind: design-rationale
summary: The query/response model is designed to be transport-agnostic and can be carried over HTTP, DNS, email, or a purpose-built protocol. DNS, while not typically considered a transport, can serve as a generic query/response mechanism as demonstrated by DNS blocklists.
section: "4"
