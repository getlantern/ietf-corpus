document: rfc-4334
kind: security-consideration
summary: When the same peer certificate is used to authenticate to multiple WLANs, the list of SSIDs is available from servers associated with each WLAN and is also exposed to eavesdroppers. When SSID disclosure is a concern, different peer certificates SHOULD be used for each WLAN.
section: "5"
topics:
    - pkix
    - security
    - privacy
