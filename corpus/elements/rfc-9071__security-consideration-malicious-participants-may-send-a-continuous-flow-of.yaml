document: rfc-9071
kind: security-consideration
summary: Malicious participants may send a continuous flow of text to disrupt the session or spoof text appearing to originate from other participants. Handling of text from different sources by receivers MUST be well separated so that malformed or malicious control codes from one source only affect that source's text stream.
section: "10"
topics:
    - security
    - realtime
    - rtp
