document: rfc-1471
kind: protocol-element
summary: The PPP Discard Test (pppDiscardTest, pppTests 2) causes a PPP Discard Packet to be transmitted; ifExtnsTestResult returns success(2) if the packet was successfully transmitted, or failed(7) if a transmission error was detected. These tests do not place ifOperStatus in the testing state and do not interrupt normal data transmission.
section: 4.4.2
topics:
