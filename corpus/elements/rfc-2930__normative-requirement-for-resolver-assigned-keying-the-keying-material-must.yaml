document: rfc-2930
kind: normative-requirement
summary: For resolver-assigned keying, the keying material MUST be encrypted under a server public key (KEY RR) for protection in transmission. The KEY RR used MUST be one for which the server has the corresponding private key.
section: "4.5"
rfc2119_level: MUST
topics:
