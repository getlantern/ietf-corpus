document: rfc-3056
kind: normative-requirement
summary: '6to4 prefixes more specific than 2002::/16 must not be propagated in native IPv6 routing. A 6to4 site with a native IPv6 connection MUST NOT advertise its 2002::/48 prefix on that connection, and all native IPv6 operators MUST filter out any 2002:: prefix advertisement longer than /16.'
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
