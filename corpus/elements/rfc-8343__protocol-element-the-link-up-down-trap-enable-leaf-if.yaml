document: rfc-8343
kind: protocol-element
summary: 'The ''link-up-down-trap-enable'' leaf (if-mib feature, enumeration: enabled=1/disabled=2) controls whether linkUp/linkDown SNMP notifications are generated. If unconfigured, ''enabled'' is operationally used for interfaces with no lower-layer-if entries, and ''disabled'' otherwise.'
section: "5"
topics:
