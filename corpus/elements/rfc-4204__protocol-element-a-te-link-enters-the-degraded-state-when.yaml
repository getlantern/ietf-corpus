document: rfc-4204
kind: protocol-element
summary: A TE link enters the Degraded state when all LMP control channels are down but the TE link still includes data links allocated to user traffic. In this state, routing and signaling SHOULD be notified so new connections are not accepted and the TE link is advertised with no unreserved resources.
section: 3.2.4
topics:
    - routing
