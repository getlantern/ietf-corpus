document: rfc-946
kind: security-consideration
summary: RFC 946 contains no explicit Security Considerations section. The protocol transmits a host address and terminal line number in cleartext as part of Telnet negotiation, potentially exposing user location information (physical location, office occupant names, telephone extensions) to any party that can observe the Telnet session.
section: "5"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
