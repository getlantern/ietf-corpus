document: rfc-9567
kind: interoperability-note
summary: If the monitoring agent responds with NXDOMAIN, RFC 8020 specifies that any name at or below that domain is considered unreachable; negative caching would then block all subsequent error-report queries for that subtree for the negative TTL duration. Implementations must avoid NXDOMAIN responses from monitoring agents for this reason.
section: "8.2"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
