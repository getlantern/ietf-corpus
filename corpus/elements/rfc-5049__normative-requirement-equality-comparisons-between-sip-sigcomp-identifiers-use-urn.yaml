document: rfc-5049
kind: normative-requirement
summary: Equality comparisons between SIP/SigComp identifiers use URN-scheme-specific equality rules. If the URN scheme is unknown, lexical equality per RFC 2141 is used. Applications SHOULD provide lexically equivalent URNs in each registration to avoid false inequality.
section: "9.2"
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
