document: rfc-5492
kind: normative-requirement
summary: The Capabilities Optional Parameter SHOULD only be included once in the OPEN message, with all capabilities listed as TLVs within that single parameter. However, a BGP speaker MUST be prepared to receive an OPEN containing multiple Capabilities Optional Parameters and process them identically to a single parameter.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
