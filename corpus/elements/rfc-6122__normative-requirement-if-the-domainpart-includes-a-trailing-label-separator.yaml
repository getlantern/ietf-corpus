document: rfc-6122
kind: normative-requirement
summary: If the domainpart includes a trailing label separator (dot), this character MUST be stripped before the JID is used for routing, comparison, or URI construction, and specifically before any Nameprep or ToASCII canonicalization is applied.
section: "2.2"
rfc2119_level: MUST
topics:
