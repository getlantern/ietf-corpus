document: rfc-9824
kind: normative-requirement
summary: If a DNS server receives an explicit query for the NXNAME RR type, it MUST return a Format Error (FORMERR). A resolver MUST NOT forward such queries upstream or attempt iterative resolution.
section: "3.5"
rfc2119_level: MUST
topics:
    - dns
