document: rfc-3281
kind: protocol-element
summary: 'The Role attribute (id-at-role, { id-at 72 }) uses RoleSyntax: a SEQUENCE with optional roleAuthority (GeneralNames) and required roleName (GeneralName). The roleName MUST use the uniformResourceIdentifier CHOICE to allow domain-scoped role disambiguation (e.g., ''urn:administrator'' under ''Baltimore'' vs ''SPYRUS'').'
section: 4.4.5
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
