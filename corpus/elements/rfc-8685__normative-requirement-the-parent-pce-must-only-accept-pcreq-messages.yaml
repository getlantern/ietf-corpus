document: rfc-8685
kind: normative-requirement
summary: The parent PCE MUST only accept PCReq messages from authorized child PCEs. Requests from unauthorized child PCEs SHOULD be dropped, and the parent PCE MUST be able to cryptographically authenticate requests from child PCEs.
section: 6.1.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - security
