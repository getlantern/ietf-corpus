document: rfc-3008
kind: protocol-element
summary: A SIG record's materiality determines whether it is relevant to DNSSEC validation. Material SIGs must satisfy all requirements in this document. Immaterial (extra-DNSSEC) SIGs may have application-defined roles and require no DNSSEC validation.
