document: rfc-9452
kind: design-rationale
summary: A single NSH Next Protocol code point (0x06) was chosen for all IOAM types, with a sub-type (IOAM-Type) field distinguishing option categories. This avoids the additional TLV nesting that NSH MD Type 2 would require and removes the 256-octet maximum size constraint that MD Type 2's 6-bit length field imposes.
