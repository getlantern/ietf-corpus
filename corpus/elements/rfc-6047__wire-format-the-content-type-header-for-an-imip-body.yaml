document: rfc-6047
kind: wire-format
summary: 'The Content-Type header for an iMIP body part takes the form: ''text/calendar; method=<METHOD>; charset=UTF-8; component=<component>''. The ''method'' parameter is mandatory for iMIP; a ''text/calendar'' part lacking it is not subject to iMIP requirements.'
section: "2.4"
topics:
