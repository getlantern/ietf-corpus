document: rfc-4878
kind: protocol-element
summary: An OAMPDU (Ethernet OAM Protocol Data Unit) is a valid Ethernet frame with a destination MAC address equal to the reserved Slow Protocols MAC address, a lengthOrType field set to the Slow Protocols reserved type, and a Slow Protocols subtype for Ethernet OAM. OAMPDUs are the sole mechanism by which two directly connected Ethernet interfaces exchange OAM information.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
