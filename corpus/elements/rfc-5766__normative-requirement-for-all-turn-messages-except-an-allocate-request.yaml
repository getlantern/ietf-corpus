document: rfc-5766
kind: normative-requirement
summary: For all TURN messages except an Allocate request, if the 5-tuple does not identify an existing allocation, the message MUST be rejected with a 437 (Allocation Mismatch) error if it is a request, or silently ignored if it is an indication or ChannelData message.
section: "4"
rfc2119_level: MUST
