document: rfc-7787
kind: normative-requirement
summary: A node MUST NOT reset its Trickle state merely because it receives a Network State TLV with a different hash; Trickle state is reset if and only if the locally calculated network state hash changes (due to local data change or receipt of more recent data).
section: "4.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
