document: rfc-5340
kind: design-rationale
summary: MOSPF (Multicast Extensions to OSPF) has been deprecated from OSPFv3 because it was only partially specified in RFC 2740, the specification was insufficient for implementation, and there are no known implementations. Associated protocol fields (MC-bit in Options, MT-bit in router-LSA link descriptions) have been deprecated.
section: "3.2"
topics:
    - routing
    - multicast
