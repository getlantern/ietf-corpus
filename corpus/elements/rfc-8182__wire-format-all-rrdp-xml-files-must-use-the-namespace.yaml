document: rfc-8182
kind: wire-format
summary: All RRDP XML files MUST use the namespace 'http://www.ripe.net/rpki/rrdp', encoding 'US-ASCII', and version attribute '1'. Hash attributes are lowercase hexadecimal SHA-256 digests; object content in publish elements is base64-encoded binary. The RELAX NG compact schema in Section 3.5.4 is normative.
