document: rfc-1577
kind: wire-format
summary: The 8-bit type/length fields (ar$shtl, ar$sstl, ar$thtl, ar$tstl) are encoded with bit 8 reserved (0), bit 7 indicating address type (0=ATM Forum NSAPA, 1=E.164), and bits 6-1 as a 6-bit unsigned octet length of the address.
