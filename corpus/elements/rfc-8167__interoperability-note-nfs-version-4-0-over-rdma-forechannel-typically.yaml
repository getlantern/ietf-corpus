document: rfc-8167
kind: interoperability-note
summary: NFS version 4.0 over RDMA forechannel typically uses a separate TCP-based backchannel for callbacks because the RDMA transport itself does not inherently support reverse-direction operation. The client advertises a 'tcp' or 'tcp6' netid for its callback service via SETCLIENTID.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
