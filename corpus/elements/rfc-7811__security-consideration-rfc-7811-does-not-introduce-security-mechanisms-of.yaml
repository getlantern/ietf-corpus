document: rfc-7811
kind: security-consideration
summary: RFC 7811 does not introduce security mechanisms of its own; the security considerations for MRT-FRR are addressed in the companion architecture document RFC 7812. The algorithm operates on IGP topology information whose integrity depends on the security of the underlying IGP (OSPF or IS-IS).
section: "10"
topics:
    - routing
    - security
