document: rfc-4124
kind: protocol-element
summary: The CLASSTYPE RSVP object (Class Number 66, C-Type 1) carries a 3-bit CT field in the least-significant bits of a 32-bit word, with the upper 29 bits reserved and set to zero. It is used in Path messages to signal the Class-Type of the LSP being established.
