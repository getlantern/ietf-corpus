document: rfc-2047
kind: interoperability-note
summary: Within a 'comment', the RFC 822 ABNF is amended so that 'encoded-word' is a valid alternative to 'ctext' or 'quoted-pair'. However, this rule does NOT apply to '*text' fields, where '(' and ')' are treated as ordinary characters rather than comment delimiters.
