document: rfc-5142
kind: protocol-element
summary: The Home Agent Switch message (MH Type 12) is a new Mobility Header message used by a home agent to signal to a mobile node that it should stop using the current home agent and acquire a new one. The message data includes a '# of Addresses' field (8-bit), a Reserved field (8-bit), a list of Home Agent Addresses (IPv6), and Mobility Options.
section: "4"
topics:
