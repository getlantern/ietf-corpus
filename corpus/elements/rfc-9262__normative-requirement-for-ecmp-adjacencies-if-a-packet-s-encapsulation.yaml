document: rfc-9262
kind: normative-requirement
summary: For ECMP() adjacencies, if a packet's encapsulation contains an entropy field, the entropy field SHOULD be respected; two packets with the same entropy field value SHOULD be sent on the same adjacency to preserve flow ordering.
section: 4.2.3
rfc2119_level: SHOULD
topics:
    - routing
    - multipath
