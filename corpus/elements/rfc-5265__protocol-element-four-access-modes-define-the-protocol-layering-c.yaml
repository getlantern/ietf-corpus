document: rfc-5265
kind: protocol-element
summary: 'Four access modes define the protocol layering: ''c'' (i-MIP with co-located CoA, inside only), ''f'' (i-MIP with FA-CoA, inside only), ''cvc'' (x-MIP co-CoA + VPN + i-MIP co-CoA using VPN-TIA, outside), ''fvc'' (x-MIP FA-CoA + VPN + i-MIP co-CoA using VPN-TIA, outside). The notation encodes x-MIP mode, VPN presence, and i-MIP mode.'
