document: rfc-7658
kind: protocol-element
summary: 'Default timeout objects (all deprecated) include: natBindDefIdleTimeout (default 0 s), natUdpDefIdleTimeout (300 s), natIcmpDefIdleTimeout (300 s), natOtherDefIdleTimeout (60 s), natTcpDefIdleTimeout (86400 s), natTcpDefNegTimeout (60 s). Agents with non-volatile storage must restore these values after reinitialization.'
