document: rfc-7582
kind: protocol-element
summary: 'Three PMSI instantiation methods are defined for bidirectional P-tunnels: Flat Partitioned (no upstream-assigned labels), Hierarchical Partitioned (uses PE Distinguisher Labels and upstream-assigned MPLS labels for LSP aggregation), and Unpartitioned (single or multiple bidir tunnels, no distinguished PE inference).'
