document: rfc-8420
kind: normative-requirement
summary: Implementations MUST have the "Identity" value in the SIGNATURE_HASH_ALGORITHMS notification when EdDSA is supported and configured. The "Identity" value MUST NOT be used if none of the supported and configured algorithms accept arbitrary-size inputs.
section: "3"
rfc2119_level: MUST
topics:
