kind: state-machine
summary: 'The reference resolution algorithm (Section 5.2.2) transforms reference R against base Base into target T: if R has a defined scheme, use R''s components; else if R has authority, use R''s authority and path; else merge R''s path with Base''s path; in all cases apply remove_dot_segments to the resolved path.'
