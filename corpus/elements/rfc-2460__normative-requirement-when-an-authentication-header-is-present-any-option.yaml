document: rfc-2460
kind: normative-requirement
summary: When an Authentication header is present, any option whose data may change en-route (indicated by the third-highest-order bit of Option Type being 1) must have its entire Option Data treated as zero-valued octets during authenticating value computation.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - security
