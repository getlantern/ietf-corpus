document: rfc-1091
kind: normative-requirement
summary: When the client receives a TERMINAL-TYPE SEND, it MUST respond with its next available terminal type name and simultaneously switch emulation mode to match, unless the new type is a synonym of the preceding type or has unmet prerequisites (e.g., BINARY option).
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
