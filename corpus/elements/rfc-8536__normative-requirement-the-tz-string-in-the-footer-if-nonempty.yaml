document: rfc-8536
kind: normative-requirement
summary: The TZ string in the footer, if nonempty and one or more transitions appear in the version 2+ data, MUST be consistent with the last version 2+ transition — evaluating the TZ string at the last transition time must yield the same time type as specified in that transition.
section: "3.3"
rfc2119_level: MUST
topics:
