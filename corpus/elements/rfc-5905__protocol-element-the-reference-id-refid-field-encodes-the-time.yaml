document: rfc-5905
kind: protocol-element
summary: 'The Reference ID (refid) field encodes the time source: for stratum 1, a left-justified zero-padded ASCII string (e.g., GPS, PPS, GOES); for stratum 2+ with IPv4, the upstream server''s 4-octet IPv4 address; for stratum 2+ with IPv6, the first four octets of the MD5 hash of the IPv6 address. IANA maintains the authoritative list of stratum-1 reference identifiers.'
section: "7.3"
topics:
