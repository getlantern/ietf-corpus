document: rfc-7755
kind: protocol-element
summary: The SIIT-DC Border Relay (BR) is a device or logical function that performs stateless IP/ICMP translation between IPv4 and IPv6. It sits at the boundary between the IPv4 Internet and the IPv6-only IDC network, translating packets in both directions using EAMs and the translation prefix.
