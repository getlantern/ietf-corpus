document: rfc-5396
kind: design-rationale
summary: A single textual notation (asplain) is proposed to avoid confusion across documentation, configuration systems, reports, and external tools. The decimal value representation requires no field delimiter, reflecting the lack of internal structure required by AS numbers in inter-domain routing.
