document: rfc-9145
kind: protocol-element
summary: MAC#2 Context Header (Type 0x03) provides integrity protection over the entire NSH data including the Base Header (second level of assurance). This requires sharing MAC_KEY with SFFs so they can verify and recompute the MAC when modifying the Base Header (e.g., TTL decrement).
section: "5.2"
topics:
    - security
    - crypto
