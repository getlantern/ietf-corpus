document: rfc-6240
kind: protocol-element
summary: 'Three performance tables are defined: pwCepPerfCurrentTable (current 15-minute interval, pwCepObjects 5), pwCepPerfIntervalTable (up to 96 historical 15-minute intervals, pwCepObjects 6), and pwCepPerf1DayIntervalTable (current and previous days, pwCepObjects 7). All track DBA packets, pointer adjustments, missing/malformed packets, jitter buffer events, ES, SES, UAS, and FC counters.'
