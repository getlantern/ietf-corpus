document: rfc-4976
kind: security-consideration
summary: If a relay receives several unsuccessful AUTH requests from a directly-connected client, it SHOULD terminate that connection. This measure applies only to client connections and SHOULD NOT be used as a reason to terminate relay-to-relay connections.
section: "6.3"
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
