document: rfc-4359
kind: security-consideration
summary: SHA-1 was scheduled for phase-out in 2010 due to advances in computing power. Use of this transform after that date SHOULD be preceded by an analysis of its continued suitability, given known cryptanalytic progress against SHA-1.
section: "6"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - security
