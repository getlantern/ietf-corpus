document: rfc-7513
kind: protocol-element
summary: 'The Binding State Table (BST) stores bindings between DHCP-assigned IP addresses and binding anchors. Each entry has six fields: Binding Anchor, IP Address, State, Lifetime (remaining seconds or expiry timestamp), Transaction ID (TID), and Timeouts (used only by the Data Snooping Process).'
