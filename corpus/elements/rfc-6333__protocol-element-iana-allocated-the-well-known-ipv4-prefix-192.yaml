document: rfc-6333
kind: protocol-element
summary: IANA allocated the well-known IPv4 prefix 192.0.0.0/29 for DS-Lite interfaces. Within that range, 192.0.0.0 is the reserved subnet address, 192.0.0.1 is reserved for the AFTR element, and 192.0.0.2 is reserved for the B4 element; the remaining addresses accommodate multi-homed nodes implementing multiple B4 elements.
section: "5.7"
topics:
