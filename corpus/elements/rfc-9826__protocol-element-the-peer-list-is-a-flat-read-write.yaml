document: rfc-9826
kind: protocol-element
summary: The peer list is a flat read-write list keyed by IP address that tracks both explicitly configured and dynamically learned peers (e.g., via IGP PCE discovery). Entries persist even when no session exists, and per-peer statistics are aggregated across all successive sessions to that peer.
