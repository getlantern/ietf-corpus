document: rfc-9801
kind: registry
summary: IANA assigned IP protocol number 147 (keyword BIT-EMU, 'Bit-stream Emulation') in the 'Assigned Internet Protocol Numbers' registry. This value is used in the IPv6 next header field or any extension header to indicate a bit-stream emulation payload; it is also valid as an IPv6 Extension Header indicator.
section: "10.1"
