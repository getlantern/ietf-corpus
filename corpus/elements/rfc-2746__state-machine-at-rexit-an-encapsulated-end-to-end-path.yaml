document: rfc-2746
kind: state-machine
summary: At Rexit, an encapsulated end-to-end PATH message is decapsulated; if it contains no SESSION_ASSOC object, the Non_RSVP flag is set and the global break bit may be raised in the ADSPEC; if SESSION_ASSOC is present, Rexit records the binding, performs ADSPEC composition using the tunnel session's composed parameters as the logical-link characterization, and forwards the PATH downstream.
section: 4.2.2
topics:
    - qos
