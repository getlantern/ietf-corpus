document: rfc-8577
kind: wire-format
summary: 'The ETLD Attributes TLV (Type 6) is a 32-bit field: bits 0-23 are Reserved (SHOULD be set to zero, MUST be ignored on receipt), and bits 24-31 carry the ETLD value (effective transport label-stack depth). It appears in HOP_ATTRIBUTES sub-objects of RRO in Path messages.'
section: "9.7"
topics:
