document: rfc-6720
kind: normative-requirement
summary: If a GTSM-capable LSR recognizes G=1 in a received LDP Link Hello, it MUST enforce GTSM for LDP in the subsequent TCP/LDP peering session with that neighbor.
section: "2.2"
rfc2119_level: MUST
