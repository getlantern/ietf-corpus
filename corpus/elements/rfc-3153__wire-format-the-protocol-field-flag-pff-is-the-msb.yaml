document: rfc-3153
kind: wire-format
summary: The Protocol Field Flag (PFF) is the MSB of the length field byte. PFF=1 indicates a PPP Protocol ID field follows the length field for this subframe; PFF=0 means the protocol is inherited from the most recent subframe with PFF=1, or from the PPPMuxCP-negotiated default PID.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
