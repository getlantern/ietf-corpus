document: rfc-3927
kind: privacy-consideration
summary: If IPv4 Link-Local addresses are derived from a hash of the MAC address, they could be indirectly associated with an individual and used to track that person's activities. However, as long as Link-Local addresses do not leave the local link, they reveal no more than direct observation of hardware addresses would.
section: "2.10"
topics:
    - privacy
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
