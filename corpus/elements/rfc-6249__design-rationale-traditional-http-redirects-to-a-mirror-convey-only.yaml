document: rfc-6249
kind: design-rationale
summary: Traditional HTTP redirects to a mirror convey only a single link with no failure handling. Metalink/HTTP instead transfers the full mirror database knowledge to the client, enabling automatic failover, multi-source parallel downloads, and hash verification without user intervention.
section: "1"
topics:
