document: rfc-8083
kind: normative-requirement
summary: When generating round-robin RTCP reports (when sources exceed MTU), priority SHOULD be given to reports on sources with high packet loss rates to ensure senders are aware of congestion they are causing; this updates RFC 3550.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
