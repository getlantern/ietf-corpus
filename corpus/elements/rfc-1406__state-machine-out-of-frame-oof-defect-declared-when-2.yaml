document: rfc-1406
kind: state-machine
summary: 'Out Of Frame (OOF) defect: declared when 2+ framing errors occur within 3 ms (ESF) or 0.75 ms (D4), or 2+ errors in 5 consecutive framing bits. For E1, declared on 3 consecutive frame alignment signals with error. Cleared for T1 when fewer than 2 frame bit errors in 3 ms (ESF) or 0.75 ms (D4); for E1 when a 3-frame in-frame sequence is complete.'
