document: rfc-4356
kind: normative-requirement
summary: 'The MAIL FROM value MUST be set to null ("<>") for all automatically-generated MMs such as those with ''X-Mms-Message-Class: Auto'', reports, and out-of-office replies. This is critical to prevent mail loops.'
section: 2.1.3.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
