document: rfc-6448
kind: security-consideration
summary: The KRB-CRED message contains highly sensitive data including secret session keys, client and server principal names, and validity periods; possession of this information with the ticket allows an attacker to impersonate the named client, and modification of the message enables credential substitution, so the message must be carefully safeguarded.
section: "5"
topics:
    - security
    - crypto
