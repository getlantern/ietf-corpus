document: rfc-2937
kind: interoperability-note
summary: A DHCP client may receive name services in this option that it does not support or has not been configured to access, and may receive entries for which no corresponding DHCP option was supplied. Clients interpret this option in a system-specific manner outside the scope of this document.
section: Definitions
