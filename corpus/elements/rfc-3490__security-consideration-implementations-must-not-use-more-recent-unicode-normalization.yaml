document: rfc-3490
kind: security-consideration
summary: Implementations must not use more recent Unicode normalization tables than those referenced by this specification. Using different normalization tables could cause two applications to produce different ASCII encodings for the same input name, with security and operational implications.
section: "10"
topics:
    - security
    - dns
