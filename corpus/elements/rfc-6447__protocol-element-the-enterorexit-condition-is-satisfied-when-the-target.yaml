document: rfc-6447
kind: protocol-element
summary: The <enterOrExit> condition is satisfied when the target enters or exits a 2-dimensional region described by a polygon or circle. A notification is sent when the target's location is within (or outside) the region with at least 50% confidence.
section: "3.4"
