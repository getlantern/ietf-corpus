document: rfc-4488
kind: normative-requirement
summary: If a REFER request to a given Request-URI might fork, the REFER-Issuer SHOULD NOT include the 'Refer-Sub' header field. The REFER-Issuer SHOULD use standardized mechanisms to ensure the REFER request does not fork.
section: "5"
rfc2119_level: SHOULD NOT
