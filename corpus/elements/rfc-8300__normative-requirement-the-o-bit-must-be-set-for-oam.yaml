document: rfc-8300
kind: normative-requirement
summary: The O bit MUST be set for OAM packets and MUST NOT be set for non-OAM packets. The O bit MUST NOT be modified along the SFP. Implementations not supporting SFC OAM SHOULD discard packets with O bit set; a configurable parameter to forward them unmodified MUST be disabled by default.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
