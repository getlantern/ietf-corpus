document: rfc-7795
kind: protocol-element
summary: In Scenario 2, T-PE1 operates in Master mode and advertises Active to S-PE1 and Standby to S-PE2 per configuration, causing S-PE1 to forward on PW1-Seg2 toward T-PE2 and S-PE2 to remain in standby. On S-PE1 failure, T-PE1 detects failure and switches to PW2 via S-PE2.
section: "4.2"
topics:
