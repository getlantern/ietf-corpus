document: rfc-8529
kind: normative-requirement
summary: When 'bind-ni-name' is set to a valid NI name, an implementation MUST take whatever steps are internally necessary to assign the interface to the NI or provide an error message indicating why the assignment failed; failure may occur synchronously or via the bind-ni-name-failed notification.
section: "3.4"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - routing
    - vpn
