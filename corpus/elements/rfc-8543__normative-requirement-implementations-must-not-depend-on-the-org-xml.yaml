document: rfc-8543
kind: normative-requirement
summary: Implementations MUST NOT depend on the 'org' XML namespace prefix; they should employ a proper namespace-aware XML parser and serializer, as the namespace URI 'urn:ietf:params:xml:ns:epp:org-1.0' is what matters.
section: "2"
rfc2119_level: MUST NOT
