document: rfc-5733
kind: protocol-element
summary: 'The <contact:disclose> element allows a client to specify exceptional disclosure handling for individual data elements. It MUST contain a boolean ''flag'' attribute (''true''/''1'' to allow disclosure, ''false''/''0'' to prohibit it) and at least one child element from: name(int), name(loc), org(int), org(loc), addr(int), addr(loc), voice, fax, email.'
section: "2.9"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
