document: rfc-8245
kind: security-consideration
summary: If messages are not modified (except hop count and hop limit) when forwarded — as strongly recommended — the RFC 7182 security framework can be used in full for both Packet TLVs and Message TLVs. If messages are modified during forwarding, Message TLVs from RFC 7182 cannot be used as intended.
section: "7"
topics:
    - routing
    - security
