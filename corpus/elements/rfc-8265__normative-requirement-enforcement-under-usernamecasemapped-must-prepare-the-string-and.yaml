document: rfc-8265
kind: normative-requirement
summary: Enforcement under UsernameCaseMapped MUST prepare the string and then apply Case Mapping, Normalization (NFC), and Directionality (Bidi Rule) in that order. The implementation MUST NOT treat a string as conforming until the enforcement operation has been completed.
section: 3.3.3
rfc2119_level: MUST
topics:
    - security
