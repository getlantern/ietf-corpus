document: rfc-6185
kind: normative-requirement
summary: sprop-deint-buf-req MUST NOT be present when packetization-mode is absent or 0 or 1, and MUST be present when packetization-mode equals 2. Its value MUST be greater than or equal to the maximum de-interleaving buffer occupancy in bytes.
section: "6.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
