document: rfc-5710
kind: design-rationale
summary: PathErr messages are used to signal reroute requests because they propagate upstream without changing path state in transit nodes (per RFC 2205), enabling non-disruptive rerouting where data traffic continues on the existing LSP until a new path is established.
section: "1"
topics:
