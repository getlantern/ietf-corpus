document: rfc-4040
kind: design-rationale
summary: Clearmode is introduced as a pseudo-codec for transparent relay of 64 kbit/s data streams (e.g., ISDN data, ISDN 7 kHz voice) that cannot tolerate non-linear encoding. No encoder/decoder is used; only packetization and depacketization occur.
