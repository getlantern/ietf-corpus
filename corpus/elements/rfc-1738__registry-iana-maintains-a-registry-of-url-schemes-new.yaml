document: rfc-1738
kind: registry
summary: 'IANA maintains a registry of URL schemes. New scheme submissions must include a resource-access algorithm, URL syntax definition, and demonstrable utility. Scheme names beginning with ''x-'' are reserved for experimental use. Reserved-but-undefined scheme names include: afs, mid, cid, nfs, tn3270, mailserver, z39.50.'
