document: rfc-7045
kind: normative-requirement
summary: Packets containing standardised and undeprecated Routing Headers SHOULD be forwarded by default. At the time of writing, these include Type 2 (RFC 6275), Type 3 (RFC 6554), and the experimental Routing Header Types 253 and 254 (RFC 4727).
section: "2.1"
rfc2119_level: SHOULD
topics:
    - ip
    - routing
