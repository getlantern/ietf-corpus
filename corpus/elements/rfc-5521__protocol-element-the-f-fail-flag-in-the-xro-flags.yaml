document: rfc-5521
kind: protocol-element
summary: The F (Fail) flag in the XRO Flags field, when set, indicates that the PCC requires computation of a new path for a failed TE LSP. When F is set, the path of the existing LSP MUST be provided in the PCReq via an RRO to avoid double bandwidth booking.
section: 2.1.1
topics:
    - routing
    - mpls
