document: rfc-5372
kind: normative-requirement
summary: The sender MUST transmit RTP packets with the same mh_id value if the encoder parameters (SIZ, COD, COC, RGN, QCD, QCC, POC marker segments) of the current frame are the same as the previous frame.
section: "4.1"
rfc2119_level: MUST
topics:
