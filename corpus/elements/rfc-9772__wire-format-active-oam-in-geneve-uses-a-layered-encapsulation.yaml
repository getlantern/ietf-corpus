summary: 'Active OAM in Geneve uses a layered encapsulation: Outer IPvX Header / Outer UDP Header / Geneve Header / Inner IPvX Header / Inner UDP Header / Active OAM Packet. The inner UDP destination port identifies the OAM protocol (e.g., BFD or STAMP).'
