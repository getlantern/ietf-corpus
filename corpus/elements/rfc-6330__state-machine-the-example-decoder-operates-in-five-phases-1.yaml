document: rfc-6330
kind: state-machine
summary: 'The example decoder operates in five phases: (1) Gaussian elimination on V using a graph-based row selection strategy to build a lower-triangular X; (2) elimination of U_lower to identity I_u; (3) multiplication of X with upper rows to sparsify U_upper; (4) zeroing U_upper using I_u rows; (5) back-substitution to form the L×L identity. Failure occurs if V becomes all-zero before i+u=L, or U_lower has rank less than u.'
