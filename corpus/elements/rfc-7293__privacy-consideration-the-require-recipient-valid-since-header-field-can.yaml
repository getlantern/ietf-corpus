document: rfc-7293
kind: privacy-consideration
summary: The Require-Recipient-Valid-Since header field can reveal the sender-recipient relationship and original intended recipient set to any party observing the message in transit or upon delivery, since it must contain an envelope-matching address to be actionable. This is one reason multi-recipient use is discouraged.
section: "14.3"
topics:
    - email
    - privacy
