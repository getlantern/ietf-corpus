document: rfc-6416
kind: normative-requirement
summary: A header (configuration info, GOV, VOP header, video packet header, etc.) SHALL NOT be split across a plurality of RTP packets. This is required to maintain error resiliency.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
