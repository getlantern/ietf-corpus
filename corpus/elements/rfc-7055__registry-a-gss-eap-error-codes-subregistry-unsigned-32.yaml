document: rfc-7055
kind: registry
summary: 'A ''GSS-EAP Error Codes'' subregistry (unsigned 32-bit values) was created: values ≤127 require Standards Action, 128–255 require Specification Required, >255 are reserved. Initial codes include 1–16 covering buffer errors, OID mismatches, token corruption, missing subtokens, EAP key derivation failures, and AAA failures.'
section: "7.6"
