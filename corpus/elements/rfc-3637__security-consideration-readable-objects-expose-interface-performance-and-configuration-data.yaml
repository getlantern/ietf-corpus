document: rfc-3637
kind: security-consideration
summary: Readable objects expose interface performance and configuration data that may be sensitive; even GET and NOTIFY access should be controlled, and values SHOULD be encrypted in transit. SET operations in non-secure environments without proper protection MUST be avoided.
