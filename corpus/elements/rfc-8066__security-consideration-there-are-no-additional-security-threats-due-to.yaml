document: rfc-8066
kind: security-consideration
summary: There are no additional security threats due to the assignments of ESC dispatch type usage described in this document. The document forbids defining any extended dispatch values or extension types that modify the behavior of existing dispatch types, which prevents potential security issues from behavioral redefinition.
