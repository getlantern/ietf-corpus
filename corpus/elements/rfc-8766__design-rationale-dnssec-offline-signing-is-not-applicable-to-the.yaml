document: rfc-8766
kind: design-rationale
summary: DNSSEC offline signing is not applicable to the Discovery Proxy because the content of delegated zones is dynamically generated from Multicast DNS responses at query time. The Discovery Proxy must possess zone signing keys and perform online signing.
section: "7.1"
topics:
    - dns
    - zeroconf
    - security
    - crypto
