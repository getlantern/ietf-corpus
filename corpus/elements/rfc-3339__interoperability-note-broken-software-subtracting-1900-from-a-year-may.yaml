document: rfc-3339
kind: interoperability-note
summary: Broken software subtracting 1900 from a year may produce three-digit years for post-1999 dates, or non-numeric decade characters. Robust implementations may add 1900 to three-digit years or detect and appropriately handle non-numeric decade fields.
