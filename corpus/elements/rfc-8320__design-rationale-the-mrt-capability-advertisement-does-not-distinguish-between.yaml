document: rfc-8320
kind: design-rationale
summary: The MRT Capability Advertisement does not distinguish between IPv4 and IPv6 address families; an LSR advertising MRT LDP Capability is expected to advertise MRT-related FEC-label bindings for the same address families as its shortest-path FEC-label bindings. Advertising MRT bindings for only one address family when both are supported is not supported.
section: 4.1.2
topics:
    - mpls
    - routing
