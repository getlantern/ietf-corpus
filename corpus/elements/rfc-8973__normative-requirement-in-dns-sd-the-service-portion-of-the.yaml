document: rfc-8973
kind: normative-requirement
summary: 'In DNS-SD, the <Service> portion of the DOTS service instance name MUST be one of: ''_dots-signal._udp'', ''_dots-signal._tcp'', ''_dots-data._tcp'', ''_dots-call-home._udp'', or ''_dots-call-home._tcp''. The TXT record is empty; no DNS-SD keys are defined.'
section: "7"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
