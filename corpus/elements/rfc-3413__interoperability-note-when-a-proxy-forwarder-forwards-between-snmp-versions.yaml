document: rfc-3413
kind: interoperability-note
summary: When a proxy forwarder forwards between SNMP versions that support different PDU versions, the PDU may need to be translated. RFC 2576 describes a method for performing such translation between SNMPv1 and SNMPv2 PDU types.
