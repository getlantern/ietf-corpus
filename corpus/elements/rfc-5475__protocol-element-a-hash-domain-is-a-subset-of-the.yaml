document: rfc-5475
kind: protocol-element
summary: A Hash Domain is a subset of the Packet Content viewed as an N-bit string; a Hash Range is the set of M-bit result strings; a Hash Function maps the Hash Domain deterministically onto the Hash Range; and a Hash Selection Range is the subset of the Hash Range that causes a packet to be selected.
