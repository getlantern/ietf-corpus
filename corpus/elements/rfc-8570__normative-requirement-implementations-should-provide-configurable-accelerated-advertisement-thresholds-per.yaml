document: rfc-8570
kind: normative-requirement
summary: Implementations SHOULD provide configurable accelerated advertisement thresholds per sub-TLV so that an update is issued immediately when a measured value crosses a configured bound or changes by more than a configured delta. Only the high threshold or the low threshold (not both) may trigger a given sub-TLV.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
