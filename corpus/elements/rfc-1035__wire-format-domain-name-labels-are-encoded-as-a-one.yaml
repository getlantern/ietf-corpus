document: rfc-1035
kind: wire-format
summary: Domain name labels are encoded as a one-octet length field followed by that many octets of label data; the high-order two bits of each length octet must be zero, limiting labels to 63 octets. The name is terminated by a zero-length octet (root label).
section: "3.1"
