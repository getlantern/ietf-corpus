document: rfc-7471
kind: design-rationale
summary: The A bit was intentionally omitted from the Unidirectional Delay Variation and bandwidth sub-TLVs to help mitigate oscillations. Including the A bit in sub-TLVs whose values fluctuate frequently could cause excessive re-advertisements and instability in the network.
section: "3"
topics:
