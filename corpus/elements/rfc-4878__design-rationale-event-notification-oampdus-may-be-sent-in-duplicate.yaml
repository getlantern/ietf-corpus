document: rfc-4878
kind: design-rationale
summary: Event Notification OAMPDUs may be sent in duplicate to increase the probability of successful delivery, given that Ethernet frames can be lost in transit. Unique and duplicate transmissions are tracked separately (dot3OamUniqueEventNotificationTx vs dot3OamDuplicateEventNotificationTx) and distinguished by the Sequence Number field.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
