document: rfc-950
kind: protocol-element
summary: Internet addresses in a subnetted network are interpreted as <network-number><subnet-number><host-number>, where the subnet-number field width is constant for a given network and specified by an address mask. A zero-width subnet field means the network is not subnetted.
section: "2.1"
topics:
