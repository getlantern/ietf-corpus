document: rfc-3376
kind: normative-requirement
summary: IGMPv3 MUST NOT include auxiliary data in any transmitted Group Record (Aux Data Len MUST be set to zero) and MUST ignore auxiliary data present in any received Group Record. Auxiliary data semantics are reserved for future IGMP versions.
section: 4.2.10
rfc2119_level: MUST NOT
topics:
    - multicast
