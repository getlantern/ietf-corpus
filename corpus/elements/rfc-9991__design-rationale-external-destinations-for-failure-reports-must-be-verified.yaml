document: rfc-9991
kind: design-rationale
summary: External destinations for failure reports must be verified to prevent a bad actor from publishing a DMARC Policy Record that abuses a third-party destination by deliberately sending messages that trigger failure reports, and to prevent Domain Owners from unilaterally directing unwanted reports to external parties.
section: "5"
topics:
