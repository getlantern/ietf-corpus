document: rfc-7283
kind: security-consideration
summary: Clients and servers that have not been updated to implement silent discard of unknown messages may become newly vulnerable to relay-agent-mediated attacks as a result of relay agents now forwarding unknown messages. Authors recommend updating all three agent types to the new specification.
section: "6"
topics:
