document: rfc-8205
kind: wire-format
summary: The BGPsec Capability has capability code 7 and a fixed length of 3 octets. The first octet contains a 4-bit Version field, a 1-bit Direction bit (0=receive, 1=send), and 3 unassigned bits. The second and third octets contain the 16-bit AFI.
section: "2.1"
