document: rfc-8666
kind: design-rationale
summary: SR with MPLS does not require any LDP or RSVP-TE signaling, reducing protocol complexity. Paths are encoded directly as segment sequences advertised by the IGP, eliminating the need for a separate label distribution protocol.
