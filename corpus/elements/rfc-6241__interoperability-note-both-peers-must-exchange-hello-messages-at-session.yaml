document: rfc-6241
kind: interoperability-note
summary: Both peers MUST exchange <hello> messages at session establishment to advertise their capabilities before any other NETCONF messages are sent. The client adjusts its behavior to take advantage of server-advertised capabilities; capabilities not advertised by the server MUST NOT be used.
section: "8.1"
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
