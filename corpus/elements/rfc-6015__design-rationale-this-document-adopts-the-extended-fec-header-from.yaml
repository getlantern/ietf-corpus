document: rfc-6015
kind: design-rationale
summary: This document adopts the extended FEC header from SMPTE 2022-1 (which built on RFC 2733) but corrects its RFC 3550 non-compliance issues — specifically SSRC, timestamp, and CSRC handling — except for the P/X/CC bit legacy behavior retained for backward compatibility with deployed SMPTE 2022-1 systems.
section: 1.3.2
topics:
