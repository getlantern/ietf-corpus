document: rfc-4567
kind: interoperability-note
summary: 'This framework differs from SDES (RFC 4568): SDES requires end-to-end SDP integrity protection (e.g., S/MIME) to protect keying material, while RFC 4567''s framework provides its own end-to-end security for key management parameters independent of signaling protection.'
