document: rfc-7033
kind: design-rationale
summary: The 'subject' value returned by a WebFinger resource MAY differ from the queried 'resource' URI to support identity migration (e.g., a user moves accounts) or canonical URI normalization, enabling persistent queries even when the underlying identity changes.
