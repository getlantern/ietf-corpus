summary: The FIDO Device Onboard extension (urn:ietf:params:scim:schemas:extension:fido-device-onboard:2.0:Device) has a single required attribute, fdoVoucher, which is a PEM-encoded ownership voucher formatted per the FDO 1.1 specification. The attribute is write-only and never returned.
