document: rfc-3986
kind: normative-requirement
summary: Only the dotted-decimal form of four decimal octets (0–255) is allowed for IPv4 addresses in URIs. URI producing applications MUST NOT use percent-encoding in host unless it is used to represent a UTF-8 character sequence. Non-ASCII registered names for DNS MUST be transformed to IDNA encoding prior to name lookup.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - http
    - dns
    - ip
