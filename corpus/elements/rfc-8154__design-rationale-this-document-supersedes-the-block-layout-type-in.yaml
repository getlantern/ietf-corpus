document: rfc-8154
kind: design-rationale
summary: This document supersedes the block layout type in RFC 5663 for SCSI-based storage by using SCSI persistent reservations for mandatory fencing (rather than the optional RFC 6688 disk protection mechanism) and SCSI device identifiers (VPD page 0x83) for reliable device discovery instead of probing all attached devices. These changes provide more reliable fencing and more efficient device identification.
section: "1"
topics:
    - security
