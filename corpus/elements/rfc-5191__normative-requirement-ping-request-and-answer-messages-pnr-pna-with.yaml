document: rfc-5191
kind: normative-requirement
summary: Ping request and answer messages (PNR/PNA with 'P' bit set) MUST be protected with an AUTH AVP when a PANA SA is available. A ping request MUST NOT be sent during the authentication, re-authentication, or termination phases.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
