document: rfc-9776
kind: normative-requirement
summary: An IGMPv3 implementation MUST NOT include any auxiliary data in transmitted Group Records (Aux Data Len MUST be set to zero) and MUST ignore any auxiliary data present in received Group Records, as IGMPv3 defines no auxiliary data semantics.
section: 4.2.11
rfc2119_level: MUST NOT
topics:
    - multicast
