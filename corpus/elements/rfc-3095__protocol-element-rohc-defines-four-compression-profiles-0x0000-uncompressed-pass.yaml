document: rfc-3095
kind: protocol-element
summary: 'ROHC defines four compression profiles: 0x0000 (UNCOMPRESSED, pass-through), 0x0001 (ROHC RTP, for RTP/UDP/IP), 0x0002 (ROHC UDP, for UDP/IP without RTP), and 0x0003 (ROHC ESP, for ESP/IP). The decompressor''s acceptable profile set is negotiated per channel; the active profile is part of per-context state.'
section: "4.2"
topics:
