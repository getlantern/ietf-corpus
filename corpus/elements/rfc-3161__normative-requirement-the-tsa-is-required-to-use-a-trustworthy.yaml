document: rfc-3161
kind: normative-requirement
summary: The TSA is REQUIRED to use a trustworthy source of time, include a trustworthy time value in each token, and include a unique integer in each newly generated time-stamp token. These are baseline operational requirements for any compliant TSA.
section: "2.1"
rfc2119_level: REQUIRED
topics:
