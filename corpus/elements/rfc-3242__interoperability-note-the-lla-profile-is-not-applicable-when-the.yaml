document: rfc-3242
kind: interoperability-note
summary: The LLA profile is not applicable when the UDP checksum (2 bytes) is enabled, which is always the case for IPv6/UDP. For IPv4/UDP, the sender may disable the UDP checksum to allow LLA use.
section: "3.4"
topics:
    - rtp
    - ip
    - udp
