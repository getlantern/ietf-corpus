document: rfc-1460
kind: wire-format
summary: All POP3 commands and responses are terminated by a CRLF pair. Responses begin with '+OK' or '-ERR'. Multi-line responses are terminated by a line containing only '.' followed by CRLF (five octets 'CRLF.CRLF'); any response line beginning with '.' is byte-stuffed by prepending an additional '.'.
section: "3"
topics:
