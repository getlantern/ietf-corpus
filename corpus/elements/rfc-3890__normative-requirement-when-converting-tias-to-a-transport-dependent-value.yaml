document: rfc-3890
kind: normative-requirement
summary: When converting TIAS to a transport-dependent value, the implementation MUST determine the sum of all lower-layer header sizes, retrieve maxprate, multiply header sizes by packet rate, round up to nearest integer, and add to TIAS value to get total bit-rate.
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
