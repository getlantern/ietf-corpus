document: rfc-4667
kind: protocol-element
summary: Pseudowire tie detection is required when both PEs initiate a pseudowire to each other simultaneously. The receiving PE compares the TAII and SAII from the received ICRQ against the SAII and TAII it previously sent; matching values indicate a tie. Once detected, the standard L2TP tie-breaking procedure from RFC 3931 Section 5.4.4 is used.
section: "5.2"
topics:
    - vpn
