document: rfc-959
kind: normative-requirement
summary: Both file-structure and record-structure MUST be accepted for text files (TYPE ASCII or EBCDIC) by all FTP implementations. File-structure is the default assumed if the STRU command has not been used.
section: 3.1.2
rfc2119_level: MUST
