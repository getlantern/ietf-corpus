document: rfc-4920
kind: protocol-element
summary: 'Four re-routing behavior flags are defined for the LSP_ATTRIBUTES object: No Re-routing (default), End-to-end Re-routing, Boundary Re-routing (ABRs/ASBRs only), and Segment-based Re-routing (any node). These values are mutually exclusive and control which nodes may attempt re-routing after failure.'
section: "5.1"
topics:
    - mpls
    - routing
