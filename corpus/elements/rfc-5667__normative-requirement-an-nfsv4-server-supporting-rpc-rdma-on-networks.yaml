document: rfc-5667
kind: normative-requirement
summary: An NFSv4 server supporting RPC/RDMA on networks sharing UDP/TCP port space with RDMA services MUST use the alternative well-known port number for its RPC/RDMA service. Clients SHOULD connect to this port without consulting the RPC portmapper.
section: "6"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
