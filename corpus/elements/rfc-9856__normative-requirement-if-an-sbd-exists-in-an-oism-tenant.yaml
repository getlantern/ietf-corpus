document: rfc-9856
kind: normative-requirement
summary: If an SBD exists in an OISM tenant, the EVPN A-D per EVI and A-D per ES routes MUST include the SBD-RT so that they are imported by all PEs in the tenant domain and can trigger mass withdrawal of RPF checks.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
