document: rfc-4590
kind: design-rationale
summary: Nonces are generated by the RADIUS server rather than the RADIUS client. Generating them at the client would save a round-trip but would introduce security and operational issues; additionally, some digest algorithms such as AKA would not work with client-generated nonces.
section: "1.3"
topics:
    - radius
    - security
    - crypto
