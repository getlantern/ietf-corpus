document: rfc-2058
kind: protocol-element
summary: The Response Authenticator in Access-Accept, Access-Reject, and Access-Challenge packets is computed as MD5(Code+ID+Length+RequestAuth+Attributes+Secret), where RequestAuth is taken from the corresponding Access-Request. This authenticates the server's reply to the NAS.
