document: rfc-9172
kind: security-consideration
summary: BCB confidentiality protects against eavesdropping, but long-lived bundles (potentially persisting for years in DTN) increase exposure time and allow offline decryption attempts. Cipher suites must be selected to provide protection over the expected data lifetime.
section: 8.2.1
topics:
