document: rfc-4875
kind: wire-format
summary: The Path message is extended with an S2L sub-LSP descriptor list appended after the sender descriptor. Each descriptor is an S2L_SUB_LSP object optionally followed by a P2MP SECONDARY_EXPLICIT_ROUTE object (SERO); the first S2L sub-LSP uses the main ERO rather than a SERO.
section: "5.1"
