document: rfc-7909
kind: interoperability-note
summary: While this mechanism mandates RPKI for certificate distribution, it is not dependent on RPKI for correct operation. Equivalent functionality can be achieved with a traditional CA using RFC 3779 extensions and appropriate trust anchor material.
