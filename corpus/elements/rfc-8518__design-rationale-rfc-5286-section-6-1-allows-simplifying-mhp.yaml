document: rfc-8518
kind: design-rationale
summary: RFC 5286 Section 6.1 allows simplifying MHP calculation by treating the MHP as solely attached to its pre-failure optimal point of attachment at the cost of lower coverage. This document improves coverage for ECMP MHPs without extra computational cost by comparing protection types across ECMP paths.
section: "3.1"
topics:
    - routing
