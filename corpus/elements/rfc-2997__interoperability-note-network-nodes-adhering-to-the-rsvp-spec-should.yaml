document: rfc-2997
kind: interoperability-note
summary: Network nodes adhering to the RSVP spec should transparently pass Null Service signaling messages, allowing a small number of Null Service-enabled PEPs to be introduced into a legacy network. Standard ADSPEC parsing rules ensure that legacy elements encountering an unknown per-service data header set the break-bit and skip over the fragment using the length field.
section: 2.1.2
topics:
    - qos
extracted_by: claude-sonnet-4-6
