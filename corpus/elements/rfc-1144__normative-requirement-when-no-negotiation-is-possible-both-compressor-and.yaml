document: rfc-1144
kind: normative-requirement
summary: When no negotiation is possible, both compressor and decompressor SHOULD provide exactly sixteen state slots (indexed 0–15). When negotiation is supported, any mutually agreed number from 1 to 256 MAY be used; until negotiated, both sides SHOULD assume sixteen slots.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - ip
