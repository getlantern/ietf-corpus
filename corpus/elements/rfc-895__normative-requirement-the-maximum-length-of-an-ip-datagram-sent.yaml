document: rfc-895
kind: normative-requirement
summary: The maximum length of an IP datagram sent over an Experimental Ethernet is 1536 octets. Gateway implementations MUST be prepared to accept full-length packets and fragment them if necessary.
section: Frame Format
rfc2119_level: MUST
topics:
    - ip
