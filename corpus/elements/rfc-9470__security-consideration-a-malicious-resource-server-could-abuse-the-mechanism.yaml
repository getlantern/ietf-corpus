document: rfc-9470
kind: security-consideration
summary: A malicious resource server could abuse the mechanism to trigger unwanted or repeated user interactions at the authorization server. Authorization servers and clients must consider that the step-up trigger can be exploited by an adversary controlling a resource server endpoint.
section: "9"
topics:
