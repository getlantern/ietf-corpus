document: rfc-9803
kind: normative-requirement
summary: In Policy Mode (policy attribute is '1' or 'true'), the EPP <info> response MUST contain <ttl:ttl> records for all supported DNS record types regardless of whether those types are in use, and these elements MUST have the 'min', 'default', and 'max' attributes.
section: 2.1.1.2
rfc2119_level: MUST
topics:
    - dns
