document: rfc-4253
kind: normative-requirement
summary: When the connection is established, both sides MUST send an identification string. The null character MUST NOT be sent. The identification MUST be terminated by a single CR and LF.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
