document: rfc-2210
kind: interoperability-note
summary: When an ADSPEC encounters a network element that does not recognize a per-service header, the element sets bit 23 (break bit) of that per-service header and skips the remainder of the fragment, enabling forward-compatible extension with future services without breaking existing routers.
section: "3.3"
topics:
    - qos
