document: rfc-5603
kind: protocol-element
summary: The pwEnetPortIfIndex object specifies the ifIndex of the CE-bound Ethernet port (for point-to-point service) or the VPLS virtual interface ifIndex. Two rows may reference the same ifIndex only if their pwEnetPortVlan values do not overlap. Zero indicates the association is not yet known.
