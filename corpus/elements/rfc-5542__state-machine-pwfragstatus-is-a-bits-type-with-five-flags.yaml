document: rfc-5542
kind: state-machine
summary: 'PwFragStatus is a BITS type with five flags reflecting fragmentation/reassembly negotiation state: noFrag(0), cfgFragGreaterThanPsnMtu(1), cfgFragButRemoteIncapable(2), remoteFragCapable(3), fragEnabled(4). fragEnabled requires local config, peer capability, and CW in use, per RFC 4623.'
