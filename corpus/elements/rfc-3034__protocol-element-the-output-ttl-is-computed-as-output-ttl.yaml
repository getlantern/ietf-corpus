document: rfc-3034
kind: protocol-element
summary: 'The output TTL is computed as: output TTL = input TTL − D(ie, fe, oe), where D equals 0 for all-Frame-Relay encapsulation, 1 when forwarding or output encapsulation is Generic MPLS with Generic MPLS output, and ''number of hops of the LSP segment'' when transitioning from a non-TTL segment to Frame Relay or IP output. A separate table applies for multicast.'
section: 5.4.2
