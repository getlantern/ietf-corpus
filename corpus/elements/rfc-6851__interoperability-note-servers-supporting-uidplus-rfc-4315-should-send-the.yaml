document: rfc-6851
kind: interoperability-note
summary: Servers supporting UIDPLUS (RFC 4315) SHOULD send the COPYUID response code in response to a UID MOVE command, and are advised to send it in an untagged OK before sending EXPUNGE or moved responses so that clients receive COPYUID before the corresponding EXPUNGE.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - email
