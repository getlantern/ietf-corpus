summary: The PACSI (Payload Content Scalability Information) NAL unit (type 30) is a new NAL unit type providing a summary of scalability information and CS-DON values for data in an RTP packet, enabling MANEs to make forwarding decisions without parsing codec-defined inner NAL units.
