summary: 'Three SNMP traps are defined: rptrHealth (sent on rptrOperStatus change or after self-test, carries rptrOperStatus), rptrGroupChange (sent when a group is added or removed, carries rptrGroupIndex), and rptrResetEvent (sent on completion of a management-triggered reset, carries rptrOperStatus).'
