document: rfc-9603
kind: interoperability-note
summary: The (MSD-Type,MSD-Value) pair in SRv6-PCE-CAPABILITY reflects only the sender PCC's SID imposition limit. The PCE must also consider MSD capabilities of intermediate SRv6 endpoint nodes and tail-end nodes, learnable via BGP-LS or PCEP sessions with those nodes.
section: 4.1.1
topics:
    - routing
