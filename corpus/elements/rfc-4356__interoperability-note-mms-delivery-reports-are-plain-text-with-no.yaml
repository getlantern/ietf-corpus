document: rfc-4356
kind: interoperability-note
summary: MMS delivery reports are plain text with no defined structure, making conversion to standard Internet multipart/report format difficult. The gateway must parse the MMS report to determine event type, time, status, and original message headers in order to synthesize a conforming DSN or MDN.
section: 2.1.4
topics:
    - email
