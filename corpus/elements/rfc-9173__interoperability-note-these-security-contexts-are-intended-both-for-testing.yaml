document: rfc-9173
kind: interoperability-note
summary: These security contexts are intended both for testing interoperability of BPSec implementations and for providing basic security operations when no other security contexts are defined. All context-generated information MUST be CBOR-encoded per RFC 8949.
section: "1"
rfc2119_level: MUST
topics:
