document: rfc-7523
kind: normative-requirement
summary: If client credentials are present in the request alongside a JWT authorization grant, the authorization server MUST validate those client credentials. Whether client authentication is required is a policy decision at the authorization server's discretion.
section: "3.1"
rfc2119_level: MUST
topics:
    - oauth
    - security
