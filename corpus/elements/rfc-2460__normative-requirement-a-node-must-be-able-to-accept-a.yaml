document: rfc-2460
kind: normative-requirement
summary: A node must be able to accept a fragmented packet that, after reassembly, is as large as 1500 octets. Upper-layer protocols should not send packets larger than 1500 octets unless assured the destination can reassemble that size.
section: "5"
rfc2119_level: MUST
topics:
    - ip
