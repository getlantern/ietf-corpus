document: rfc-7774
kind: normative-requirement
summary: DHCPv6 servers MUST ignore any incoming MPL Parameter Configuration Option and MUST support multiple MPL Parameter Configuration Options in their responses. Servers send the option only when specifically configured with values and when the client requests it.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
