document: rfc-9475
kind: interoperability-note
summary: In some CPIM environments, intermediaries may add or consume CPIM headers used for message metadata; such modification would break the MIME-layer integrity protection of "msgi". Deployments in those environments would need a profile reducing protection scope to only the CPIM payload.
section: "3.2"
topics:
    - sip
    - security
