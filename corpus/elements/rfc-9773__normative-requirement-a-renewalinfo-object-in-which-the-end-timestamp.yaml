document: rfc-9773
kind: normative-requirement
summary: A RenewalInfo object in which the end timestamp equals or precedes the start timestamp is invalid. Servers MUST NOT serve such a response, and clients MUST treat one as though they failed to receive any response from the server.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - acme
