document: rfc-3633
kind: normative-requirement
summary: Upon receipt of a valid Reply message, the requesting router MUST NOT assign any delegated prefixes or subnets from the delegated prefix(es) to the link through which it received the DHCP message from the delegating router (the upstream/ISP-facing link).
section: "12.1"
rfc2119_level: MUST NOT
topics:
