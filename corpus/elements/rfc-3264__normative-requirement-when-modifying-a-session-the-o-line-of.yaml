document: rfc-3264
kind: normative-requirement
summary: When modifying a session, the o= line of the new SDP MUST be identical to the previous SDP except that the version MUST increment by one. If the version does not increment, the SDP MUST be identical to the previous SDP with that version.
section: "8"
rfc2119_level: MUST
topics:
    - realtime
    - sip
