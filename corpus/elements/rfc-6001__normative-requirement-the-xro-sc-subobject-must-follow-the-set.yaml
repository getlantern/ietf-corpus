document: rfc-6001
kind: normative-requirement
summary: The XRO SC subobject MUST follow the set of one or more numbered or unnumbered interface subobjects to which it refers. In the case of a loose-hop ERO subobject, the XRO SC subobject MUST precede the loose-hop subobject identifying the tail-end node/interface of the traversed region(s).
section: 4.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
