document: rfc-9009
kind: normative-requirement
summary: A node receiving a unicast DCO with its own address in the RPL Target option MUST strip off that Target option. If that Target option is the only one in the DCO, the DCO message MUST be dropped.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
