document: rfc-2227
kind: normative-requirement
summary: A Meter header MUST NOT be sent in response to a request from a client whose version is less than HTTP/1.1, and MUST NOT be accepted from such a client, to protect against proxies that might not properly implement the Connection header.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - http
