document: rfc-8025
kind: normative-requirement
summary: If a 6LoWPAN packet requires a Mesh Header, the Mesh Header MUST always be placed in the packet before the first Page 1 Paging Dispatch, if any, because Mesh Headers represent Layer 2 information processed before Layer 3.
section: "4"
rfc2119_level: MUST
topics:
