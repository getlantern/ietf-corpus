document: rfc-5857
kind: normative-requirement
summary: Exactly one MAX_CID attribute MUST be sent in the ROHC_SUPPORTED Notify message. The recipient of the MAX_CID attribute MUST only use context identifiers up to MAX_CID for compression.
section: 3.1.2
