document: rfc-5587
kind: design-rationale
summary: Mechanism attributes may be added at any time, both to the known set and to existing mechanisms' attribute sets. The 'critical_mech_attrs' parameter in GSS_Indicate_mechs_by_attrs() and known_mech_attrs output in GSS_Inquire_attrs_for_mech() address the problem of applications not knowing whether implementations understand newly-added attributes.
section: 3.4.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
