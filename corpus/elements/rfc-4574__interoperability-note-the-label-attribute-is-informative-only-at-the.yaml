document: rfc-4574
kind: interoperability-note
summary: The 'label' attribute is informative only at the offer/answer model level. The presence or absence of 'label' in an offer does not constrain whether the answer must include or omit label attributes. No discovery mechanism is defined for whether a peer understands 'label'.
