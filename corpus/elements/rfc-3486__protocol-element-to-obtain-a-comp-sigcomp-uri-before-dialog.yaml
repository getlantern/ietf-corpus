document: rfc-3486
kind: protocol-element
summary: To obtain a comp=sigcomp URI before dialog establishment, a client SHOULD send an uncompressed OPTIONS request to its outbound proxy. The proxy MAY respond with a Contact header field in a 200 OK containing an alternative SIP URI with comp=sigcomp.
section: "4.1"
topics:
    - sip
