document: rfc-7515
kind: security-consideration
summary: 'MACs provide integrity but not non-repudiation: a MAC key must be shared among all verifying parties, so validation only proves the message originated from one of the key holders. Digital signatures (asymmetric keys) are required when third-party proof of origination is needed.'
section: "10.5"
