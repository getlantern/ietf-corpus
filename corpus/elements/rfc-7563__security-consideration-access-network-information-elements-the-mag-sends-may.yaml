document: rfc-7563
kind: security-consideration
summary: Access-network information elements the MAG sends may be dynamically learned over DHCP or other protocols. Without proper security (IPsec, TLS, or equivalent) on the MAG-to-access-point path, exchanged information can be compromised, leading to incorrect policy enforcement at the LMA.
section: "6"
topics:
    - security
    - mobility
