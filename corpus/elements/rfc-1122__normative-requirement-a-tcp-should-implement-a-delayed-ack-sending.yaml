document: rfc-1122
kind: normative-requirement
summary: A TCP SHOULD implement a delayed ACK, sending at most one ACK per two full-sized segments received; the delay MUST be less than 500 ms. An ACK MUST be sent immediately in response to an out-of-order segment or one that fills a gap in the receive buffer.
section: 4.2.3.2
rfc2119_level: SHOULD
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
