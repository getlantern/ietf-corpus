document: rfc-7195
kind: interoperability-note
summary: Correlation mechanisms relying on Caller ID, UUIE, or DTMF may fail even after successful negotiation because intermediate PSTN networks may strip or alter these values. A single positive correlation indication from any mechanism SHOULD be sufficient to treat the bearer as related to the session.
section: 5.3.3
topics:
    - realtime
    - voip
