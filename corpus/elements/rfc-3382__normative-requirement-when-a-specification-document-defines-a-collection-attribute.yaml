document: rfc-3382
kind: normative-requirement
summary: 'When a specification document defines a collection attribute, the definition MUST include: the name of the collection attribute, the collection attribute syntax (collection or 1setOf collection), the context of the attribute, an ''xxx-supported'' attribute, and the member attributes with their names, optionality, syntax types, semantics, supported values, and defaults.'
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
