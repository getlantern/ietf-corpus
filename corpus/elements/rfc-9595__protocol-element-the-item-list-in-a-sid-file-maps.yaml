document: rfc-9595
kind: protocol-element
summary: 'The ''item'' list in a ''.sid'' file maps YANG items to SIDs using three fields: namespace (enumeration: module=0, identity=1, feature=2, data=3), identifier (yang-identifier or schema-node-path), and sid (mandatory). The list key is namespace+identifier with a uniqueness constraint on sid.'
