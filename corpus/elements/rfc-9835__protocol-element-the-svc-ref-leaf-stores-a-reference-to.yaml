summary: The 'svc-ref' leaf stores a reference to the AC exposed at the service layer via 'ietf-ac-svc' (RFC 9834), enabling correlation between AC service requests and the actual AC provisioned in the network. Whether naming conventions are shared across service and network layers is deployment-specific.
