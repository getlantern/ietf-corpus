document: rfc-8861
kind: privacy-consideration
summary: The Reporting Group Identifier (RGRP SDES item value) could enable endpoint tracking if generated in a long-term stable or predictable manner. It is RECOMMENDED to generate it as a short-term persistent identifier following the rules for short-term persistent CNAMEs in RFC 7022.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
