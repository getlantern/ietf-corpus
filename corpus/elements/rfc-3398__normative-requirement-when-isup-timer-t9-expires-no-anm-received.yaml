document: rfc-3398
kind: normative-requirement
summary: When ISUP timer T9 expires (no ANM received after alerting began), the call MUST be released. A '480 Temporarily Unavailable' response SHOULD be sent to the SIP network and a REL with cause value 19 (no answer from user) SHOULD be sent to the ISUP network.
section: 7.2.8
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
