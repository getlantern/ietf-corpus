document: rfc-6030
kind: normative-requirement
summary: For the HOTP algorithm profile, the <Secret> element value MUST contain key material with a length of at least 16 octets (128 bits) if present. The <ResponseFormat> 'Format' attribute MUST be 'DECIMAL' and the 'Length' attribute MUST be between 6 and 9 inclusive.
section: "10.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
