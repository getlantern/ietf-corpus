document: rfc-1184
kind: protocol-element
summary: 'The MODE suboption carries a bitmask with five defined bits: EDIT (1) for client-side line processing, TRAPSIG (2) for signal-to-Telnet translation, MODE_ACK (4) for acknowledgment, SOFT_TAB (8) for tab expansion, and LIT_ECHO (16) for literal echo of non-printable characters. The server initiates mode changes; the client confirms them.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
