document: rfc-9437
kind: normative-requirement
summary: If an xTR-ID is successfully added to the subscriber list, the Map-Server MUST extract and store the nonce and ITR-RLOCs from the Map-Request, overwriting any previously stored ITR-RLOCs and/or nonce for the same xTR-ID, and MUST send a Map-Notify to confirm the subscription.
section: "5"
rfc2119_level: MUST
topics:
    - routing
