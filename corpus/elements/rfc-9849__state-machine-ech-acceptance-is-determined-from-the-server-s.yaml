document: rfc-9849
kind: state-machine
summary: 'ECH acceptance is determined from the server''s first response: if TLS < 1.3 is negotiated, ECH is rejected. If ServerHello, the client checks accept_confirmation against the last 8 bytes of ServerHello.random. If HelloRetryRequest, the client checks for an encrypted_client_hello extension; an 8-byte match against hrr_accept_confirmation indicates acceptance; absent extension means rejection.'
section: 6.1.4
topics:
    - tls
    - security
