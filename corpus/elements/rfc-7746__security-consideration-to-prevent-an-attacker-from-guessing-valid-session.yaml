document: rfc-7746
kind: security-consideration
summary: To prevent an attacker from guessing valid Session-IDs and forging returns, implementations SHOULD NOT assign Session-IDs in a predictable manner. A Cryptographically Secure Pseudorandom Number Generator (CSPRNG) per NIST SP 800-90A is recommended for Session-ID generation.
section: "7"
rfc2119_level: SHOULD NOT
topics:
    - mpls
    - security
    - crypto
