document: rfc-4538
kind: normative-requirement
summary: If the fourth UAC condition (UAS known to support Target-Dialog) is not met, the UAC SHOULD NOT use this specification. Instead, if it is currently within a dialog with the UAS, it SHOULD attempt to send the request within the existing target dialog.
section: "3"
rfc2119_level: SHOULD NOT
