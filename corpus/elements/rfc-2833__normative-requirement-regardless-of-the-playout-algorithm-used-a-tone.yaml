document: rfc-2833
kind: normative-requirement
summary: Regardless of the playout algorithm used, a tone SHOULD NOT be extended by more than three packet interarrival times to prevent a tone from getting stuck when retransmissions of the end packet are all lost.
section: "3.5"
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - voip
