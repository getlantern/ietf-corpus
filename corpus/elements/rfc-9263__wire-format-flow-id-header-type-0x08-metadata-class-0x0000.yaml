document: rfc-9263
kind: wire-format
summary: Flow ID header (Type=0x08, Metadata Class=0x0000, Length=4) uses a 4-bit CT to encode either a 20-bit IPv6 Flow Label (CT=0x0) or a 20-bit MPLS entropy label (CT=0x1). Absence or zero value denotes unlabeled packets.
section: "4.5"
