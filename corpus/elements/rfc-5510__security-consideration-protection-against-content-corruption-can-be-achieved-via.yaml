document: rfc-5510
kind: security-consideration
summary: 'Protection against content corruption can be achieved via: (a) object-level digital signatures (e.g., RSASSA-PKCS1-v1_5), (b) per-packet digital signatures, (c) Group MAC (e.g., HMAC-SHA-256 with shared key), or (d) TESLA. It is RECOMMENDED that at least one of these techniques be used when object corruption is a concern.'
section: 9.2.2
rfc2119_level: RECOMMENDED
topics:
    - security
    - multicast
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
