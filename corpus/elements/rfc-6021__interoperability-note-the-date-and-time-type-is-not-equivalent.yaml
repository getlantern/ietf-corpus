document: rfc-6021
kind: interoperability-note
summary: 'The date-and-time type is not equivalent to the SMIv2 DateAndTime textual convention: RFC 3339 uses ''T'' as the date/time separator (versus a space in SMIv2), provides higher-resolution fractional seconds, and assigns distinct semantics to -00:00 (unknown timezone).'
