document: rfc-9175
kind: normative-requirement
summary: Upon receiving a 4.01 (Unauthorized) response with the Echo option, the client SHOULD resend the original request with an Echo option containing the received value. Upon receiving any other response with the Echo option, the client SHOULD echo the value in the next request to the server.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
