document: rfc-4456
kind: design-rationale
summary: 'Route reflection was designed to satisfy three criteria: simplicity (easy to configure), easy transition (no topology or AS changes required), and compatibility (non-compliant IBGP peers can coexist without loss of routing information). These criteria were motivated by operational experience in large, topology-rich networks.'
