summary: End.BM is the SRv6 instantiation of an SR-MPLS Binding SID. After SRH processing, it pushes the MPLS label stack for the associated SR-MPLS Policy B and submits the packet to the MPLS engine, enabling inter-domain TE across MPLS and SRv6 domains.
