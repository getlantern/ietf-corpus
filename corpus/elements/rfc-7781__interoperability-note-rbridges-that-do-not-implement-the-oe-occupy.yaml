document: rfc-7781
kind: interoperability-note
summary: RBridges that do not implement the OE (Occupy Exclusively) feature ignore the OE-flag and treat it as zero. To avoid misconfiguration, RBridges in an AAE group SHOULD NOT assert the OE-flag if any member does not implement it; practical consistency is expected since AAE group members are typically from the same vendor.
section: "4.1"
topics:
    - routing
