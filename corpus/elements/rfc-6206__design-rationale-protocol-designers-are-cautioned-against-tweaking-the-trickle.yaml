document: rfc-6206
kind: design-rationale
summary: Protocol designers are cautioned against tweaking the Trickle algorithm without extensive experimental evidence, as its mechanisms are tightly integrated. Further reductions in transmissions or response time typically come at the cost of edge-case failures; simplicity and low state requirements are explicit design goals.
