document: rfc-9255
kind: normative-requirement
summary: RPKI-based credentials of INRs MUST NOT be used to authenticate real-world documents or transactions. The RPKI provides authorization to speak for INRs, not identity attestation of their holders.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
    - security
    - pkix
