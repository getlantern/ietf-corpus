document: rfc-7852
kind: protocol-element
summary: <UniqueDeviceID> with attribute <TypeOfDeviceID> identifies the specific device or SIM. Registered type tokens include MEID, ESN, MAC, WiMAX, IMEI, IMSI, UDI, RFID, and SN. Multiple instances may be present to supply more than one identifier.
