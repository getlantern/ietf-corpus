document: rfc-7170
kind: state-machine
summary: 'Version negotiation: server sends its highest supported version; if peer supports it, that version is used; if peer supports only a lower version, it proposes its highest; if the server cannot support the peer''s counter-proposal, it MUST terminate with EAP Failure or negotiate a different EAP type. The agreed version is later verified via the Crypto-Binding TLV.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
