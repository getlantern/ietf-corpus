document: rfc-6763
kind: normative-requirement
summary: The <Instance> portion of a Service Instance Name MUST NOT contain ASCII control characters (byte values 0x00–0x1F and 0x7F); otherwise it may contain any Net-Unicode characters including spaces, dots, and non-Roman text. It is stored as a single DNS label of canonical precomposed UTF-8 (NFC).
section: 4.1.1
rfc2119_level: MUST NOT
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
