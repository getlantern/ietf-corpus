document: rfc-6223
kind: normative-requirement
summary: When a subsequent registration refresh request is sent, if the SIP entity wishes to continue sending keep-alives, usage MUST be re-negotiated. If not successfully re-negotiated, the SIP entity MUST cease sending keep-alives associated with the registration.
section: 4.2.2
rfc2119_level: MUST
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
