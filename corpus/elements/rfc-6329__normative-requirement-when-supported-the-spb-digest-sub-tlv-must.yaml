document: rfc-6329
kind: normative-requirement
summary: When supported, the SPB-Digest sub-TLV MUST be carried on every IIH between SPB neighbors, not just when a Digest changes. When one peer supports this TLV and the other does not, loop prevention by Agreement Digest Must Not be done by either side.
section: "13.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
