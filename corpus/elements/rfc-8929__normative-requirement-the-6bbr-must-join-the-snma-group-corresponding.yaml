document: rfc-8929
kind: normative-requirement
summary: The 6BBR MUST join the SNMA group corresponding to each Registered Address as soon as it creates a Binding and maintain that membership for the life of the registration. The 6BBR MUST place an EARO unchanged from the registration in all IPv6 ND messages it generates on behalf of the Registered Node over the backbone, including NS(DAD).
section: "6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
