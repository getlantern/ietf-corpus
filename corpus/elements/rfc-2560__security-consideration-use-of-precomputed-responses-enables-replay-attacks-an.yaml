document: rfc-2560
kind: security-consideration
summary: 'Use of precomputed responses enables replay attacks: an old ''good'' response may be replayed after a certificate has been revoked but before the response expires. Deployments must weigh the performance benefit of precomputed responses against this replay risk.'
section: "5"
topics:
