document: rfc-8435
kind: design-rationale
summary: LAYOUTSTATS are defined as cumulative (not reset per operation). When two LAYOUTSTATS for the same file and layout stateid from the same client are processed simultaneously, the one with larger values contains the most recent time-series data.
