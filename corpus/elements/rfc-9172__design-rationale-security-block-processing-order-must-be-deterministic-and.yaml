document: rfc-9172
kind: design-rationale
summary: Security block processing order must be deterministic and identical across all nodes. This specification mandates a specific processing order (BCBs before BIBs when they share a security target) even at the cost of flexibility, to prevent ambiguity.
section: "2.5"
topics:
    - security
