document: rfc-6232
kind: protocol-element
summary: The Dynamic hostname TLV (type 137, RFC 5301) is extended for use in purges to aid rapid identification of the purge originator. Only the local hostname should be inserted; implementations SHOULD include one instance if the POI TLV is included.
section: "4"
topics:
