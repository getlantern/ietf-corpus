document: rfc-7829
kind: normative-requirement
summary: During dormant state (all destinations inactive), the sender MUST choose one destination and transmit data to it, and MUST NOT change its state or clear its error counter as a result. The sender SHOULD pick the inactive destination with the lowest error count.
section: "4.1"
rfc2119_level: MUST
topics:
    - sctp
    - multipath
