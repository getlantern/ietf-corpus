document: rfc-2138
kind: wire-format
summary: 'The User-Password attribute (Type 2) hides the password using a chained MD5 scheme: b1=MD5(S+RA), c(1)=p1 XOR b1; bi=MD5(S+c(i-1)), c(i)=pi XOR bi. The String field is 16–128 octets (attribute Length 18–130), supporting passwords up to 128 characters in 16-octet blocks.'
section: "5.2"
topics:
