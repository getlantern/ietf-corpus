summary: mplsLcAtmStdCtrlVpi and mplsLcAtmStdCtrlVci define the VPI and VCI values over which the LSR accepts LDP control traffic on an LC-ATM interface. These are read-create objects of type AtmVpIdentifier and MplsAtmVcIdentifier respectively.
