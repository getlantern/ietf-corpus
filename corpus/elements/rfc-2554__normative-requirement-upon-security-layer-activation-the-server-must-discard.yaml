document: rfc-2554
kind: normative-requirement
summary: Upon security layer activation, the server MUST discard knowledge obtained from the client (e.g., EHLO argument) not derived from SASL negotiation; the client MUST discard server knowledge (e.g., service extension list) not derived from SASL negotiation.
