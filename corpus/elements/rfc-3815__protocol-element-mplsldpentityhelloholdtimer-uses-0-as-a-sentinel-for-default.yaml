document: rfc-3815
kind: protocol-element
summary: 'mplsLdpEntityHelloHoldTimer uses 0 as a sentinel for default values: if 0 and mplsLdpEntityTargetPeer is false, the effective default is 15 seconds (link hello); if 0 and mplsLdpEntityTargetPeer is true, the effective default is 45 seconds (targeted hello). A value of 65535 means infinite.'
