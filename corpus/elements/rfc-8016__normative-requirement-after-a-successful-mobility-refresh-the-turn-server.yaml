document: rfc-8016
kind: normative-requirement
summary: After a successful mobility Refresh, the TURN server MUST continue receiving and processing data on the old 5-tuple and MUST continue transmitting data on the old 5-tuple until it receives a Send Indication, ChannelData message on the new 5-tuple, or a message closing the old connection.
section: 3.2.2
rfc2119_level: MUST
topics:
    - nat
