document: rfc-7234
kind: protocol-element
summary: The primary cache key consists of the request method and target URI. When a response is subject to content negotiation via the Vary header field, secondary keys are formed from the values of the selecting header fields nominated by Vary, potentially resulting in multiple stored responses per primary key.
section: "2"
