document: rfc-6086
kind: interoperability-note
summary: For backward compatibility, RFC 6086 does not deprecate legacy INFO usages defined in RFC 2976. A UA indicating support of the INFO method using the Allow header field does not implicitly indicate support of the Info Package mechanism; a UA MUST use the Recv-Info header field to signal Info Package mechanism support.
section: 5.2.2
topics:
    - sip
    - realtime
