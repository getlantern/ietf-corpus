document: rfc-3015
kind: normative-requirement
summary: No wildcard SHALL be used in a SignalID within a SignalsDescriptor. If a replacement SignalsDescriptor contains a signal with the KeepActive flag that is not currently playing, that signal SHALL be ignored.
