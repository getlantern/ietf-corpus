document: rfc-8879
kind: design-rationale
summary: This mechanism complements RFC 7924 (TLS Cached Information Extension), which avoids retransmitting known certificates but does not help on first connection. Certificate compression reduces data on all handshakes, including first connections where the client has no prior knowledge of the server's certificate chain.
section: "1"
topics:
