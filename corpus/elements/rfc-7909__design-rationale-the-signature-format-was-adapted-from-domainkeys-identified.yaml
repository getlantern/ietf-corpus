document: rfc-7909
kind: design-rationale
summary: The signature format was adapted from DomainKeys Identified Mail (DKIM, RFC 6376) because an RPSL object closely resembles an SMTP header in structure. This made DKIM's per-attribute signing approach a natural fit for RPSL.
