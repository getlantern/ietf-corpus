document: rfc-3306
kind: design-rationale
summary: The proposal reduces the number of protocols needed for dynamic multicast address allocation by eliminating the need for the Multicast Address Allocation Protocol (AAP) and the Multicast Address-Set Claim (MASC) Protocol, replacing them with unicast prefix delegation.
