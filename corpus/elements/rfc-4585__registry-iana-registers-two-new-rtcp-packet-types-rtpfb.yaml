document: rfc-4585
kind: registry
summary: 'IANA registers two new RTCP packet types: RTPFB (205) for transport-layer feedback and PSFB (206) for payload-specific feedback. Separate ''FMT'' value registries are created under each: Generic NACK is RTPFB FMT=1; PLI, SLI, and RPSI are PSFB FMT=1, 2, and 3 respectively; FMT=31 is reserved in both for future expansion.'
