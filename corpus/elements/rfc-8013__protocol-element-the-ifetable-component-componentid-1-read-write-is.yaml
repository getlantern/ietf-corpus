document: rfc-8013
kind: protocol-element
summary: 'The IFETable component (componentID 1, read-write) is a variable-size array of IFEInfo structs, each containing: optional IFETYPE (uint16 ethertype), optional StatId (uint32 index into IFEStats), mandatory DSTFE (6-byte destination MAC), mandatory SRCFE (6-byte source MAC), and optional MetaFilterList (variable-size array of uint32 metadata IDs acting as a whitelist).'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
