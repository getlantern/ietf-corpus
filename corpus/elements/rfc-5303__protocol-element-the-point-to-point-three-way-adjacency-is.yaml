summary: 'The ''Point-to-Point Three-Way Adjacency'' IS-IS option is defined with type 0xF0 (decimal 240) and a value field of 1 to 17 octets containing: Adjacency Three-Way State (1 octet), Extended Local Circuit ID (4 octets), Neighbor System ID (ID Length octets), and Neighbor Extended Local Circuit ID (4 octets).'
