document: rfc-9166
kind: security-consideration
summary: Unauthorized invocation of clear-igmp-snooping-groups or clear-mld-snooping-groups actions can unexpectedly clear the multicast forwarding tables. Using the wildcard source '*' with 'all-groups' will cause all multicast traffic to be flooded in the broadcast domain.
