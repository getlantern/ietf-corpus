document: rfc-2669
kind: protocol-element
summary: docsDevNmAccessTable provides row-based SNMP access control for SNMPv1 and SNMPv2c agents, keyed by IP address/mask and community string, with access levels of none, read, readWrite, roWithTraps, rwWithTraps, or trapsOnly. If the table is empty, access is unrestricted. This table does not exist on SNMPv3 agents.
section: 3.3.2.2
topics:
