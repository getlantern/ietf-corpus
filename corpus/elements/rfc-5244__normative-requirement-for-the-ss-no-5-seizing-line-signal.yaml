document: rfc-5244
kind: normative-requirement
summary: For the SS No. 5 'seizing' line signal, the initial event report SHOULD be generated as soon as the signal is recognized and in any case no later than the recognition time per ITU-T Q.141 Table 1 (40 ms for seizing/proceed-to-send, 125 ms for all others).
section: 2.1.1
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
