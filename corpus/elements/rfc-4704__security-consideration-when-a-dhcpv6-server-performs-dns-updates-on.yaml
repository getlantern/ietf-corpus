document: rfc-4704
kind: security-consideration
summary: When a DHCPv6 server performs DNS updates on behalf of a client, it SHOULD be sure of the DNS name to use and of the identity of the client. Depending on authentication options used, a server may have limited confidence in client identity, creating risk of incorrect DNS mappings.
section: "10"
rfc2119_level: SHOULD
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
