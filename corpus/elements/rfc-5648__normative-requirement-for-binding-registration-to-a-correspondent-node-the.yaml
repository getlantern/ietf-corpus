document: rfc-5648
kind: normative-requirement
summary: For binding registration to a correspondent node, the mobile node MUST have both active Home and Care-of Keygen tokens for each care-of address before sending the Binding Update. The Binding Authorization Data mobility option MUST be placed after the Binding Identifier mobility option.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - security
