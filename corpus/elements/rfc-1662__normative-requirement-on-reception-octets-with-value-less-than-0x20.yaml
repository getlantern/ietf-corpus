document: rfc-1662
kind: normative-requirement
summary: On reception, octets with value less than 0x20 that are flagged in the receiving ACCM are silently removed (they may have been inserted by intervening hardware). ACCM-escaped Control Escape octets are removed and the following octet is XOR'd with 0x20.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
