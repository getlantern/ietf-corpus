document: rfc-7794
kind: interoperability-note
summary: The X-Flag in the Prefix Attribute Flags sub-TLV conflicts with an existing X flag in the fixed format of TLVs 236 and 237 (IPv6 extended reachability TLVs). To avoid ambiguity, the sub-TLV X-Flag SHOULD always be sent as 0 and MUST be ignored in those TLVs.
section: "2.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
