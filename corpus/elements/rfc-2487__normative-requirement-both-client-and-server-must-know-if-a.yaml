document: rfc-2487
kind: normative-requirement
summary: Both client and server MUST know if a TLS session is active. A client MUST NOT attempt to start a TLS session if one is already active. A server MUST NOT return the TLS extension in an EHLO response after a TLS handshake has completed.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - email
    - tls
