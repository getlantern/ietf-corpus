document: rfc-5182
kind: normative-requirement
summary: Even if the "$" marker contains the empty list of messages, it MUST be treated by all commands accepting message sets as a valid but non-matching list. For example, "FETCH $" returns a tagged OK with no FETCH responses.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
