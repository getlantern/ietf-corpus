document: rfc-6823
kind: normative-requirement
summary: Where a receiving system has two copies of a GENINFO TLV with the same Application ID, non-conflicting attribute information MUST be considered additive. The procedure for resolving conflicting information is explicitly left undefined.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
