document: rfc-8147
kind: wire-format
summary: The MSD is encoded using ASN.1 Packed Encoding Rules (PER) as specified in Annex A of CEN EN 15722. This is a binary encoding; when transported in SIP it uses binary content transfer encoding. The XML encoding (Annex C of EN 15722) is explicitly not used, per 3GPP requirements.
