document: rfc-7171
kind: state-machine
summary: PT-EAP begins in the negotiation phase triggered by the NEA Server sending a Start message (S flag set). Upon receipt, the NEA Client responds with its chosen version, transitioning to the data transport phase. Abnormal termination can occur at any time by either party stopping the exchange.
section: "3.1"
topics:
