document: rfc-9615
kind: security-consideration
summary: The requirement that all RRsets retrieved from all nameservers and all signaling domains must agree ensures that in a multi-homed setup, an operator cannot enable DNSSEC unless all other operators agree. This prevents publication of an ill-conceived DS RRset authorized under only a subset of NS hostnames.
section: "6"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
