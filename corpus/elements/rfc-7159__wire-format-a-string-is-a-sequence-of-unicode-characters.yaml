document: rfc-7159
kind: wire-format
summary: A string is a sequence of Unicode characters enclosed in quotation marks (%x22). Characters that MUST be escaped are the quotation mark, reverse solidus, and control characters U+0000 through U+001F. Escape sequences use a leading reverse solidus; BMP characters use \uXXXX (6 chars); characters outside the BMP use a 12-character UTF-16 surrogate pair sequence.
