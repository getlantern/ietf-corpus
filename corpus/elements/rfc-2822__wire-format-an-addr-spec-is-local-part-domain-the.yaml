document: rfc-2822
kind: wire-format
summary: An addr-spec is `local-part "@" domain`. The local-part is either a dot-atom or a quoted-string; the domain is either a dot-atom or a domain-literal enclosed in square brackets. Comments and FWS SHOULD NOT appear around the '@'.
section: 3.4.1
topics:
    - email
