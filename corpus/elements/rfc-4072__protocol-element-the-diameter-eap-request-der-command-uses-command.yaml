document: rfc-4072
kind: protocol-element
summary: 'The Diameter-EAP-Request (DER) command uses Command-Code 268 with the ''R'' bit set. It carries an EAP-Response from the EAP client to the Diameter server and includes mandatory AVPs: Session-Id, Auth-Application-Id, Origin-Host, Origin-Realm, Destination-Realm, Auth-Request-Type, and EAP-Payload.'
section: "3.1"
topics:
