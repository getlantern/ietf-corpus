document: rfc-9432
kind: protocol-element
summary: The coo (Change of Ownership) property is a single PTR record at 'coo.<unique-N>.zones.$OLDCATZ' whose RDATA is the name of the new catalog zone. It signals a controlled migration of the member zone without immediately triggering that migration on the consumer.
section: 4.3.1
topics:
    - dns
