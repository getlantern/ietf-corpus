document: rfc-6528
kind: design-rationale
summary: RFC 793's global 32-bit counter incremented every 4 microseconds made ISN prediction trivial for off-path attackers, enabling trust-relationship exploitation attacks (Morris 1985, Shimomura 1995); the per-connection PRF approach was introduced in RFC 1948 to close this window.
section: "1"
topics:
