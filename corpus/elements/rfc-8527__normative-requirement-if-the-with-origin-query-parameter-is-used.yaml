document: rfc-8527
kind: normative-requirement
summary: If the 'with-origin' query parameter is used on a datastore other than operational or a datastore derived from the 'operational' identity, the server MUST return a '400 Bad Request' response with an error-tag value of 'invalid-value'.
section: 3.2.2
rfc2119_level: MUST
topics:
