document: rfc-9183
kind: normative-requirement
summary: For multi-destination packets, non-DBRB border RBridges MUST drop received copies. All border RBridges of an area MUST agree on the mechanism used to determine the DBRB.
section: "3.2"
rfc2119_level: MUST
topics:
