document: rfc-3559
kind: security-consideration
summary: If MADCAP servers are configured to allow renewal or release solely on the basis of the Lease Identifier, unauthorized read access to mallocRequestLeaseIdentifier (a readable object) can enable a denial-of-service attack by allowing an attacker to release or hijack active allocations.
section: "6"
topics:
