document: rfc-9588
kind: interoperability-note
summary: When SPAKE pre-authentication is used within a FAST channel, the key derivation in Section 7 MUST use the inner KDC-REQ-BODY encoding rather than the outer encoding, ensuring binding to the actual request content inside the FAST tunnel.
