document: rfc-8264
kind: design-rationale
summary: PRECIS uses an 'inclusion model' where a string class consists only of explicitly allowed code points, so any code point not explicitly allowed is forbidden. This prioritizes safety and predictability over expressiveness and avoids the ambiguity of exclusion-based models.
