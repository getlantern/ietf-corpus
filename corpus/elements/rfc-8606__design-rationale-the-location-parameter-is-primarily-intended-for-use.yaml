document: rfc-8606
kind: design-rationale
summary: The location parameter is primarily intended for use in IMS (IP Multimedia Subsystem) networks defined by 3GPP, but is open to any network that includes ISUP interworking gateways and uses Q.850 reason codes. It allows the ISUP location of call release to be transported from the originating PSTN entity to the SIP entity via a response or BYE message.
section: "3"
topics:
