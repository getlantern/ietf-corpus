document: rfc-3265
kind: security-consideration
summary: NOTIFY bodies may contain sensitive state information; implementations MAY encrypt SUBSCRIBE and NOTIFY to ensure confidentiality. All implementations SHOULD be able to handle encrypted SUBSCRIBE and NOTIFY messages to allow remote parties to protect sensitive information.
section: "5.6"
