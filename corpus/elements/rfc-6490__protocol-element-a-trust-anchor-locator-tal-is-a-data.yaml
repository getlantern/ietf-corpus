document: rfc-6490
kind: protocol-element
summary: A Trust Anchor Locator (TAL) is a data structure combining an rsync URI pointing to a self-signed RPKI CA certificate and the Base64-encoded subjectPublicKeyInfo of that certificate. It enables retrieval and authenticity verification of the trust anchor.
