document: rfc-6511
kind: normative-requirement
summary: To avoid unnecessary resource use and possible black-holing of traffic, an egress LSR MAY send a Path Error message with error code/sub-code 'Notify Error / no OOB mapping received' if OOB mapping information is not received within a reasonable time.
section: "2.4"
rfc2119_level: MAY
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
