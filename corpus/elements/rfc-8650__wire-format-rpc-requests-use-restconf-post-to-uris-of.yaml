document: rfc-8650
kind: wire-format
summary: RPC requests use RESTCONF POST to URIs of the form '/restconf/operations/ietf-subscribed-notifications:<rpc-name>'. The response body on success (HTTP 200) contains JSON with 'id' and 'uri' fields. Error responses use the 'ietf-restconf:errors' JSON structure.
