document: rfc-6376
kind: design-rationale
summary: DKIM uses DNS directly for public key distribution rather than a certificate authority infrastructure. This avoids dependency on trusted third parties, requires no new protocols, and allows anyone to validate a signature by querying the signing domain directly.
section: "1.4"
topics:
    - email
    - dns
    - crypto
