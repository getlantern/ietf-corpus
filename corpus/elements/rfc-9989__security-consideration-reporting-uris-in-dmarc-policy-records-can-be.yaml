document: rfc-9989
kind: security-consideration
summary: 'Reporting URIs in DMARC Policy Records can be abused: a Domain Owner could specify a URI belonging to a third party without consent, causing that party to receive unsolicited reports. Implementations should verify that external reporting addresses have opted in via the mechanism described in RFC 9990 before sending reports to them.'
section: "11.6"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
