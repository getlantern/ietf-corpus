document: rfc-5852
kind: normative-requirement
summary: The ingress MUST check that no corresponding Path state exists and that corresponding Data Plane state does exist before initiating MP-to-CP Handover. If there is an error, it MUST be reported to the operator and further protocol action MUST NOT be taken.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
