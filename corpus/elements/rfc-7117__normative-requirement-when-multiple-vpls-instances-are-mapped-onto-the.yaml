document: rfc-7117
kind: normative-requirement
summary: When multiple VPLS instances are mapped onto the same aggregate P-multicast tree, upstream-assigned labels [RFC5331] MUST be assigned and distributed by the root of the tree to enable egress PEs to demultiplex per-VPLS traffic.
section: "3.5"
rfc2119_level: MUST
topics:
