document: rfc-8627
kind: design-rationale
summary: 1-D non-interleaved (row) FEC performs better against random packet loss, while 1-D interleaved (column) FEC performs better against burst losses. 2-D parity FEC combines both at the cost of higher overhead (1/L + 1/D), providing superior protection against mixed loss patterns.
