document: rfc-7577
kind: normative-requirement
summary: The charging controller SHOULD change the operational charging state (batteryChargingOperState) to the state requested via batteryChargingAdminState as soon as operational conditions allow. However, it may override at any time — for example, entering discharging(5) if battery power is urgently needed.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - snmp
