document: rfc-7810
kind: protocol-element
summary: The Anomalous (A) bit is included in several sub-TLVs (delay, min/max delay, link loss). When set, it indicates that the measured value exceeds a configured maximum threshold; when cleared, it indicates steady-state performance or that the value has fallen below a configured reuse threshold.
