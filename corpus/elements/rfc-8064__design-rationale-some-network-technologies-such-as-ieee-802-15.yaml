document: rfc-8064
kind: design-rationale
summary: Some network technologies such as IEEE 802.15.4 (RFC 6282) allow compression of IPv6 datagrams when the IID is based on the underlying link-layer address, which is an acknowledged advantage of the older scheme. This document does not resolve that tension but notes that future revisions of those documents should address the privacy considerations.
section: "1"
topics:
