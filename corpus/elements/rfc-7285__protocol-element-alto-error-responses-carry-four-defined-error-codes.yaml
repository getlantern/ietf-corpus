document: rfc-7285
kind: protocol-element
summary: 'ALTO error responses carry four defined error codes in the ''meta.code'' field: E_SYNTAX (request parse failure), E_MISSING_FIELD (required field absent), E_INVALID_FIELD_TYPE (wrong JSON type for a field), and E_INVALID_FIELD_VALUE (semantically invalid value). Optional ''field'' and ''value'' fields provide debugging detail.'
