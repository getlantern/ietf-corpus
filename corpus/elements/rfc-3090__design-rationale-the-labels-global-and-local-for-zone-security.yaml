document: rfc-3090
kind: design-rationale
summary: The labels 'global' and 'local' for zone security status are chosen to assist zone administrators in understanding what actions to take, not to convey compliance with DNS security standards. Resolvers ultimately see only a binary secured/unsecured distinction.
section: "2.4"
topics:
    - dns
    - security
