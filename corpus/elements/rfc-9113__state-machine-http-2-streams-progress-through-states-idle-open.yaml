document: rfc-9113
kind: state-machine
summary: 'HTTP/2 streams progress through states: idle → open (on HEADERS), idle → reserved (local/remote) (on PUSH_PROMISE), open → half-closed (local) or half-closed (remote) (on END_STREAM flag), any non-closed → closed (on RST_STREAM or both sides sending END_STREAM). The terminal state is ''closed''.'
section: "5.1"
