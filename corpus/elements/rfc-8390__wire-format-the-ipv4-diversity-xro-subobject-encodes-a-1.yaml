document: rfc-8390
kind: wire-format
summary: The IPv4 Diversity XRO subobject encodes a 1-bit L flag, 7-bit XRO Type (value 38), 8-bit Length, 4-bit DI Type, 4-bit A-Flags, 4-bit E-Flags, 4-bit Reserved, a 32-bit IPv4 Diversity Identifier Source Address, and a variable-length Diversity Identifier Value. Total length is variable depending on the Diversity Identifier Value.
