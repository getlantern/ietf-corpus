document: rfc-6230
kind: normative-requirement
summary: The SDP 'm=' media line MUST use <media> value 'application', and <proto> MUST support both 'TCP' and 'TCP/TLS'. The <fmt> sub-field MUST contain the value 'cfw'. Implementations MUST support TLS as a transport-level security mechanism, though its use in specific deployments is optional.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
