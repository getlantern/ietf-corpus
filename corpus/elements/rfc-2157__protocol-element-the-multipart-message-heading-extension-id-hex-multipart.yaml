document: rfc-2157
kind: protocol-element
summary: The multipart-message HEADING-EXTENSION (id-hex-multipart-message-v2) carries a MultipartType with a subtype IA5String and an isAMessage BOOLEAN (DEFAULT TRUE). It is generated for every nested multipart and is needed to allow correct reconstruction of MIME multipart types on the X.400-to-MIME path.
section: "6.6"
