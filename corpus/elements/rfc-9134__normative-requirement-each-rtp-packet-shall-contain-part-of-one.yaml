document: rfc-9134
kind: normative-requirement
summary: Each RTP packet SHALL contain (part of) one and only one packetization unit. Packet payloads (excluding header) SHALL have the same size with the possible exception of the last packet of a packetization unit. Packetization unit boundaries SHALL coincide with RTP payload boundaries.
section: "4.1"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
