document: rfc-8149
kind: normative-requirement
summary: A midpoint LSR that expands loose next hop(s) and receives a Path message with the 'P2MP-TE Tree Re-evaluation Request' flag set MUST check for a preferable P2MP-TE LSP tree by re-evaluating all S2L sub-LSPs that are expanded paths of the loose next hops.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
