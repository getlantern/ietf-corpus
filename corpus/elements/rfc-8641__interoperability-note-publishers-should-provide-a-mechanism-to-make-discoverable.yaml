document: rfc-8641
kind: interoperability-note
summary: Publishers SHOULD provide a mechanism to make discoverable which datastore objects support on-change notifications, because clients of implementations that lack this have no way to know whether their on-change subscription covers the objects they care about. Until a standardized solution (Yang-Push-Notif-Cap) is available, implementations SHOULD provide their own solution.
section: "3.10"
topics:
    - yang
    - netconf
