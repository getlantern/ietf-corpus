document: rfc-6494
kind: normative-requirement
summary: SEND certificates MUST include the IP Address Delegation extension (RFC 3779), which MUST include at least one address block for the IPv6 Address Family (AFI=0002). SEND certificates MUST NOT have more than one IP Address Delegation extension.
section: "4"
rfc2119_level: MUST
topics:
