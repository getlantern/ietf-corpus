document: rfc-9198
kind: design-rationale
summary: The Route metric explicitly incorporates parallel paths because ECMP and UCMP technologies are common in the Internet and create multiple simultaneous subpaths between the same Src-Dst pair; a metric that ignores this would be incomplete for modern networks.
section: "1.1"
topics:
    - measurement
    - routing
