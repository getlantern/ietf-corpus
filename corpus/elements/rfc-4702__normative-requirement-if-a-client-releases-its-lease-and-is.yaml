document: rfc-4702
kind: normative-requirement
summary: If a client releases its lease and is responsible for updating its A RR, the client SHOULD delete the A RR before sending DHCPRELEASE. If unable to renew, the client SHOULD attempt to delete the A RR before lease expiry.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - dns
