document: rfc-7975
kind: design-rationale
summary: The RI is limited in scope to Recursive Request Redirection only; Iterative Request Redirection does not invoke any RI interaction between CDNs, so this document does not address it. Loop detection in the RI only covers control-plane loops; data-plane loops are explicitly out of scope.
