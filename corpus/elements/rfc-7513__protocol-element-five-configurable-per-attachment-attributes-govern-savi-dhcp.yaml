document: rfc-7513
kind: protocol-element
summary: 'Five configurable per-attachment attributes govern SAVI-DHCP behavior: Trust (bypass all validation), DHCP-Trust (permit Server-to-Client messages), DHCP-Snooping (trigger binding setup from DHCP messages), Data-Snooping (allow data-triggered binding), and Validating (enforce source address validation against the BST).'
section: "4.2"
topics:
