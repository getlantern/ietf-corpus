document: rfc-9836
kind: interoperability-note
summary: 'The ''ietf-ac-glue'' module augments four existing VPN modules: L2SM (RFC 8466), L3SM (RFC 8299), L2NM (RFC 9291), and L3NM (RFC 9182). It imports both ''ietf-ac-svc'' (RFC 9834) for service-layer AC references and ''ietf-ac-ntw'' (RFC 9835) for network-layer AC references.'
