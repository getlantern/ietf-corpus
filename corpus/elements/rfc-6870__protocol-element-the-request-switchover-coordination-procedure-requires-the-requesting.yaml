summary: The Request Switchover coordination procedure requires the requesting endpoint to send a Status TLV with the Request Switchover bit set, start a timer, and not activate forwarding until it receives an explicit acknowledgment (Preferential Forwarding bit cleared on requested PW) from the peer.
