document: rfc-5943
kind: protocol-element
summary: The 'pingable' attribute is an optional, multi-valued member of the RPSL route and route6 objects. Its value is an IPv4 or IPv6 address of a node that should be reachable from outside networks and can be used as a destination for diagnostic tests such as ICMP Echo Request.
