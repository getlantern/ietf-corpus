document: rfc-1762
kind: interoperability-note
summary: DNA Phase IV Routing packets transmitted over PPP use the same format as Ethernet, but without the Ethernet header, Pad, and FCS fields. This approach treats the serial link as an Ethernet rather than using DDCMP framing.
section: "4"
