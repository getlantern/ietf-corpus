document: rfc-4244
kind: wire-format
summary: Each History-Info entry (hi-entry) contains a mandatory hi-targeted-to-uri (name-addr format capturing the Request-URI) and mandatory hi-index (dot-delimited digits reflecting chronological order and forking depth). Optional parameters include a Reason header escaped in the URI, a Privacy header with priv-value 'history', and hi-extension for future use.
section: "4.1"
topics:
    - sip
    - realtime
