document: rfc-6145
kind: security-consideration
summary: SIIT introduces no new security issues beyond those in IPv4 and IPv6 themselves. The IPsec Authentication Header (RFC 4302) cannot be used across an IPv6-to-IPv4 translator. Tunnel mode ESP can be translated; transport mode ESP fails unless checksum-neutral addresses are used. IPsec ESP endpoints normally detect the translator and encapsulate ESP in UDP (RFC 3948).
section: "7"
topics:
    - ip
    - v6ops
    - security
    - ipsec
