document: rfc-8344
kind: security-consideration
summary: The 'ipv4/enabled' and 'ipv6/enabled' leaves can be exploited to create unsecured paths into or through a node (by enabling a protocol) or deny access via that protocol (by disabling it). Unauthorized write access could be used to route traffic through unintended interfaces.
section: "6"
topics:
    - security
    - yang
    - ip
