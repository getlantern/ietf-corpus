document: rfc-8503
kind: protocol-element
summary: 'Three configurable BGP-MVPN scalar timers are defined: mvpnBgpCmcastRouteWithdrawalTimer (milliseconds, controls delay of C-multicast route withdrawal per RFC 6514 §16.1.1), mvpnBgpSrcSharedTreeJoinTimer (milliseconds, controls delay of Source/Shared Tree Join advertisements per RFC 6514 §16.1.2), and mvpnBgpMsgRateLimit (messages/second, caps BGP C-multicast message exchange rate).'
section: "3.2"
topics:
    - multicast
    - mpls
    - bgp
    - snmp
