document: rfc-5944
kind: interoperability-note
summary: Mobile IP is designed for 'macro' mobility — movement between IP subnets — and is not well-suited for 'micro' mobility such as handoff among wireless transceivers covering small areas. For intra-subnet movement, link-layer mechanisms offer faster convergence and lower overhead.
section: "1.4"
topics:
    - mobility
    - ip
