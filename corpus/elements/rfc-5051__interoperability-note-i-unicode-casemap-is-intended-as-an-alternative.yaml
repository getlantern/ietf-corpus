document: rfc-5051
kind: interoperability-note
summary: i;unicode-casemap is intended as an alternative and preferred replacement for i;ascii-casemap but does not replace the i;basic collation. It is well suited for Internet protocols and computer languages but is often inappropriate for natural language sorting, including for some Scandinavian letters, Welsh names, and non-letter symbols.
section: "1"
