document: rfc-2037
kind: protocol-element
summary: The entAliasMappingTable maps (entPhysicalIndex, entAliasLogicalIndexOrZero) pairs to external MIB identifiers (RowPointer). Only physical ports (entPhysicalClass = port(10)) may appear. A zero value for entAliasLogicalIndexOrZero acts as a wildcard, applying to all logical entities without a specific entry; non-zero entries take precedence.
