document: rfc-6172
kind: interoperability-note
summary: The status of RFC 4172 remains Proposed Standard in order to retain the specification of iFCP address transparent mode, which has been implemented and is in current use. Only the address translation mode portion of RFC 4172 is treated as Historic per RFC 2026.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
