document: rfc-8967
kind: state-machine
summary: 'Packet reception on a MAC-protected interface proceeds through five sequential checks: (1) MAC test, (2) preparse for PC/Challenge TLVs, (3) drop if no PC TLV, (4) accept if successful Challenge Reply, (5) challenge if Index mismatch, otherwise compare PC monotonically and accept or drop.'
section: "4.3"
topics:
    - routing
    - security
