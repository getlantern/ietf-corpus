document: rfc-6075
kind: registry
summary: This document updates the IANA 'ACAP Vendor Subtrees' registry, originally created by RFC 2244. Registration is on a first come, first served basis, and reserved Vendor Names apply across all protocols that reuse this namespace (including IMAP ANNOTATE and IMAP METADATA).
