document: rfc-1812
kind: normative-requirement
summary: 'A router MUST NOT send ICMP error messages in response to: ICMP error messages, datagrams destined to IP broadcast or multicast addresses, datagrams sent as link-layer broadcasts, or datagrams with an invalid source address (0.0.0.0, broadcast, or multicast).'
section: 4.3.2.7
rfc2119_level: MUST NOT
topics:
    - ip
    - security
