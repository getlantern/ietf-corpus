document: rfc-6040
kind: protocol-element
summary: The new decapsulation table (Figure 4) sets the outgoing ECN field to the more severe of inner and outer ECN. Not-ECT inner with CE outer results in packet drop. Not-ECT inner with ECT(0) or ECT(1) outer is forwarded as Not-ECT. ECT(1) inner with ECT(0) outer forwards ECT(1). Previously unused combinations are annotated '(!!!)' or '(!)'.
section: "4.2"
