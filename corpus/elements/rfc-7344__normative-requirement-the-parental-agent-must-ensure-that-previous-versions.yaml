document: rfc-7344
kind: normative-requirement
summary: The Parental Agent MUST ensure that previous versions of the CDS/CDNSKEY RRset do not overwrite more recent versions. This MAY be accomplished by checking that the RRSIG signature inception is later and/or that the Child SOA serial is greater.
section: "6.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
