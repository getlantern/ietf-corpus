document: rfc-2476
kind: security-consideration
summary: Adding MSA-level signatures or encryption generally requires the MUA-to-MSA connection itself to be secured (e.g., via transport layer security or an SMTP-AUTH mechanism providing session integrity), otherwise the security benefit is undermined.
section: "8.6"
topics:
