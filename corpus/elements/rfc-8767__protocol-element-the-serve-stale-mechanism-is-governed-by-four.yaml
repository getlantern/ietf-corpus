document: rfc-8767
kind: protocol-element
summary: 'The serve-stale mechanism is governed by four timers: (1) client response timer (recommended 1.8 s) — caps time before sending a response; (2) query resolution timer (typically 10–30 s) — caps total iterative resolution effort; (3) failure recheck timer (recommended 30 s) — limits retry frequency against failed authorities; (4) maximum stale timer (suggested 1–3 days) — caps how long expired records are retained in cache.'
section: "5"
topics:
