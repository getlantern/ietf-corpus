document: rfc-2535
kind: protocol-element
summary: The SIG RR with type-covered field of zero is a transaction authentication signature. It is calculated over the concatenation of the full DNS response (excluding the transaction SIG itself) and the full DNS query that produced it, and is placed at the end of the additional information section.
section: 4.1.8.1
