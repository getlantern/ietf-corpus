document: rfc-6532
kind: protocol-element
summary: The message/global media type is defined for Internet messages containing 8-bit UTF-8 header values or 8-bit UTF-8 values in body-part header fields. Its content is otherwise identical to message/rfc822. Any content-transfer-encoding is permitted; file extension '.u8msg' is suggested.
section: "3.7"
topics:
