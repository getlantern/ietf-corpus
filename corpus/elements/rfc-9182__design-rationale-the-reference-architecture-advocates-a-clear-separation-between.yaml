document: rfc-9182
kind: design-rationale
summary: The reference architecture advocates a clear separation between service orchestration (L3SM at customer interface) and network orchestration (L3NM within the provider network), rather than a monolithic orchestrator, to keep network-centric information hidden from customers and to allow independent evolution of each layer.
