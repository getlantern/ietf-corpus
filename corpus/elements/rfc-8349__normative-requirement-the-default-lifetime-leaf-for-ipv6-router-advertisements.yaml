document: rfc-8349
kind: normative-requirement
summary: The 'default-lifetime' leaf for IPv6 Router Advertisements MUST be either zero or between max-rtr-adv-interval and 9000 seconds; a value of zero indicates the router is not to be used as a default router.
section: "9.1"
rfc2119_level: MUST
topics:
