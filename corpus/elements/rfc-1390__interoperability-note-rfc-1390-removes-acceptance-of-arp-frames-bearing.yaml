document: rfc-1390
kind: interoperability-note
summary: RFC 1390 removes acceptance of ARP frames bearing hardware type code 6 (IEEE 802) compared to its predecessor RFC 1188, and makes explicit the intent to support FDDI/Ethernet interoperability via translational bridges. These changes affect implementations upgrading from RFC 1188.
section: Differences between this document and RFC 1188
topics:
    - ip
