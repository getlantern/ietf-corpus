document: rfc-6780
kind: normative-requirement
summary: When a node receives a Path message, it MUST check each ASSOCIATION object to determine if the Association Type is supported, then MUST check for matching objects in Path state of all other sessions. Matching MUST continue after a match is found and MUST be performed against all local Path state.
section: 3.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
