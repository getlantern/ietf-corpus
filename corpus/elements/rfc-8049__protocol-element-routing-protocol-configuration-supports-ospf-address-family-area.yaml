document: rfc-8049
kind: protocol-element
summary: Routing protocol configuration supports OSPF (address-family, area-address, metric, optional sham-links keyed by target-site), BGP (autonomous-system, address-family), static (cascaded LAN prefixes with next-hops for IPv4 and IPv6), RIP (address-family), and VRRP (address-family). Multiple protocols can be active simultaneously at both site and access level.
section: "6.11"
