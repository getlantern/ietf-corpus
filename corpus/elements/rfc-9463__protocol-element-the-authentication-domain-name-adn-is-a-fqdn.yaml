document: rfc-9463
kind: protocol-element
summary: The Authentication Domain Name (ADN) is a FQDN encoded in the DNS wire format as specified in RFC 8415 Section 10, using length-prefixed labels terminated by a zero-length label. For example, 'doh1.example.com.' encodes to 18 octets. The ADN serves as the reference identifier for PKIX-based authentication of the encrypted DNS resolver.
section: "4.1"
topics:
    - dns
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
