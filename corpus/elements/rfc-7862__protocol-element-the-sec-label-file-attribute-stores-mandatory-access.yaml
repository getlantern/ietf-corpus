document: rfc-7862
kind: protocol-element
summary: The sec_label file attribute stores Mandatory Access Control (MAC) security labels on files. Its format accommodates any MAC security system. Labeled NFS clients retrieve it to enforce data access control locally or in cooperation with the server.
section: 12.2.4
topics:
    - security
