document: rfc-9356
kind: normative-requirement
summary: Advertisements of L2 bundle member links MUST NOT be done when the member link becomes operationally down or is no longer a member of the identified L2 bundle. The presence of the advertisement implies the member link is operationally up and part of the bundle.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
