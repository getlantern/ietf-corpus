document: rfc-5689
kind: normative-requirement
summary: If a server supports both extended MKCOL and another extension that defines a MKxxx method (e.g., CalDAV's MKCALENDAR), the server MUST support use of the extended MKCOL method to achieve the same result as the MKxxx method.
section: "4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
