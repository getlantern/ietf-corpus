document: rfc-2049
kind: normative-requirement
summary: Upon encountering any unrecognized Content-Type field, an implementation MUST treat it as 'application/octet-stream' with no parameter sub-arguments, offering the user options such as saving the decoded data to a file or passing it to a named program.
section: "2"
rfc2119_level: MUST
topics:
