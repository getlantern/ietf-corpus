document: rfc-3057
kind: normative-requirement
summary: Mandatory parameters MUST be placed before optional parameters in a message. The total length of a parameter (Tag + Length + Value) MUST be a multiple of 4 bytes; the sender SHOULD NEVER pad with more than 3 bytes, and the receiver MUST ignore padding bytes.
section: 3.1.5
rfc2119_level: MUST
topics:
    - sctp
