document: rfc-8159
kind: normative-requirement
summary: Support for retaining the FCS and for receiving packets with a retained FCS is OPTIONAL and, if present, MUST be configurable. In the absence of a control plane, FCS retention configuration MUST be consistent between the two tunnel endpoints. Any router configured to retain FCS MUST do so for all frames on that tunnel.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - vpn
