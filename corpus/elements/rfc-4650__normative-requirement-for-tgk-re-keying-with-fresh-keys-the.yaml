document: rfc-4650
kind: normative-requirement
summary: For TGK re-keying with fresh keys, the initiator SHALL provide a new, fresh DHi and the responder SHALL respond with a new, fresh DHr plus the received DHi. For non-key information updates, [DHi] and [DHr, DHi] SHALL be left out.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
