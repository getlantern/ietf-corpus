document: rfc-9107
kind: normative-requirement
summary: Paths where the BGP next hop is a recursive BGP route and the final IGP metric cannot be determined MUST still be considered valid for BGP Phase 2 route selection, even though they are treated as least preferred during next-hop metric comparisons.
section: 3.1.1
rfc2119_level: MUST
topics:
