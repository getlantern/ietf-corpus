document: rfc-1006
kind: normative-requirement
summary: To await an N-CONNECT.INDICATION, a server passively listens on TCP port 102. Upon successful client connection, an implicit N-CONNECT.RESPONSE is performed. Implementations typically have a single server perpetually listening and handing off connections.
section: "5"
rfc2119_level: REQUIRED
topics:
    - tcp
