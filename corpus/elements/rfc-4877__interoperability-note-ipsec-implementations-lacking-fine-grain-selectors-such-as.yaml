document: rfc-4877
kind: interoperability-note
summary: IPsec implementations lacking fine-grain selectors such as Mobility Header message type and ICMPv6 message type are compatible with this document but are not compliant with RFC 4301. Coarser implementations can use protocol-level or tunnel-all approaches as described in Section 5.
section: "5"
topics:
