document: rfc-7752
kind: design-rationale
summary: Opaque Node, Link, and Prefix Attribute TLVs (codes 1025, 1097, 1157) are provided to transparently carry protocol-specific or newly defined IGP attributes for which no protocol-neutral BGP-LS representation yet exists, bridging the publication lag between IGP extensions and BGP-LS updates.
