document: rfc-9640
kind: protocol-element
summary: 'The ''encrypted-value-grouping'' grouping contains three nodes: ''encrypted-by'' (an empty container that consuming modules MUST augment with key references), ''encrypted-value-format'' (identityref indicating the encoding format), and ''encrypted-value'' (binary containing the ciphertext). The ''encrypted-by'' container has NACM ''default-deny-write'' applied.'
section: 2.1.4.1
topics:
