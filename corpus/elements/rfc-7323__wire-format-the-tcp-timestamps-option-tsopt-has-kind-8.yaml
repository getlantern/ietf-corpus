summary: 'The TCP Timestamps option (TSopt) has Kind=8, Length=10 bytes, and carries two 4-byte fields: TSval (current timestamp clock of the sender) and TSecr (timestamp echo reply). Total option size is 10 bytes, or up to 12 bytes with NOP padding.'
