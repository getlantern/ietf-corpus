document: rfc-1532
kind: normative-requirement
summary: When a relay agent receives a BOOTREPLY whose 'giaddr' does not match any of its own directly-connected logical interfaces, the message MUST be silently discarded. All BOOTP fields MUST be preserved when relaying a BOOTREPLY; the relay MUST NOT modify any field.
section: 4.1.2
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
