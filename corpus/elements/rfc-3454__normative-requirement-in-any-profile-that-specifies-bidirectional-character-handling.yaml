document: rfc-3454
kind: normative-requirement
summary: 'In any profile that specifies bidirectional character handling, all three requirements MUST be met: (1) characters in section 5.8 MUST be prohibited; (2) if a string contains any RandALCat character, it MUST NOT contain any LCat character; (3) if a string contains any RandALCat character, a RandALCat character MUST be both the first and last character of the string.'
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
