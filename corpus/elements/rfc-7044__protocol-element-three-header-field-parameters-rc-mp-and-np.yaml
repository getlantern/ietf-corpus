document: rfc-7044
kind: protocol-element
summary: Three header field parameters — rc, mp, and np — tag how a target was determined. 'rc' means the Request-URI changed but the target user is the same (alias/contact binding); 'mp' means retargeting mapped to a different user (call forward); 'np' means the Request-URI was copied unchanged (loose routing). Each parameter value is the hi-index of the parent hi-entry.
section: "5"
topics:
