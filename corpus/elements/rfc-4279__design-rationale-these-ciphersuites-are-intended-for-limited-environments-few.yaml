document: rfc-4279
kind: design-rationale
summary: These ciphersuites are intended for limited environments (few clients/servers, constrained CPU, or existing shared-secret infrastructure) where PKI is impractical or unnecessary. The document notes that self-signed certificates with public key fingerprints or SRP may be more appropriate in many cases.
