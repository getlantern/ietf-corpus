document: rfc-9866
kind: protocol-element
summary: 'CFRC operations are implemented via linear counting: value(c) returns ceiling(-LT*ln(L0/LT)) where L0 is the zero-bit count and LT is the prime bit length; merge is bitwise OR; self() sets a single uniformly random bit; infinity() sets all bits; saturated(c) returns TRUE when more than RNFD_CFRC_SATURATION_THRESHOLD of bits are 1.'
section: "4.2"
topics:
