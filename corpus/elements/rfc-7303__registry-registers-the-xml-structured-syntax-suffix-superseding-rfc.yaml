document: rfc-7303
kind: registry
summary: Registers the '+xml' structured syntax suffix (superseding RFC 6839), with W3C as change controller. Registrations using '+xml' MUST reference Section 5 for fragment identifier syntax and MUST NOT disallow barenames or 'element' scheme pointers.
