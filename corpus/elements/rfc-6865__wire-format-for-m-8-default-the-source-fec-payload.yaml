kind: wire-format
summary: 'For m=8 (default), the Source FEC Payload ID is 6 bytes: 24-bit SBN | 8-bit ESI | 16-bit k (Figure 5). For m=16, it is also 6 bytes: 16-bit SBN | 16-bit ESI | 16-bit k (Figure 6). The format is parameterized by m.'
