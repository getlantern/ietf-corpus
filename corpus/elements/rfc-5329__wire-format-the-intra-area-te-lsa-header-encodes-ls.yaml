document: rfc-5329
kind: wire-format
summary: The Intra-Area-TE-LSA header encodes LS type as 0xA020 (U-bit=1, scope=01, function code=10) in a 16-bit field. The LSA body contains one or more nested TLV triplets with 16-bit Type, 16-bit Length, and variable-length Value fields padded to 4-octet alignment.
