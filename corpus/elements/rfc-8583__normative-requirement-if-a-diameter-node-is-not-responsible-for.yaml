document: rfc-8583
kind: normative-requirement
summary: If a Diameter node is not responsible for server selection, it SHOULD ignore HOST-type load reports. If it is responsible for server selection, it SHOULD save the Load-Value from HOST load reports in its routing information.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - diameter
