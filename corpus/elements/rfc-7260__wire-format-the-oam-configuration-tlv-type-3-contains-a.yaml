document: rfc-7260
kind: wire-format
summary: The OAM Configuration TLV (Type=3) contains a 16-bit Type, 16-bit Length, 8-bit OAM Type field, 24 reserved bits, and variable-length sub-TLVs. The TLV MUST be zero-padded to 4-octet alignment. Length indicates total padded size in octets.
section: "4.2"
