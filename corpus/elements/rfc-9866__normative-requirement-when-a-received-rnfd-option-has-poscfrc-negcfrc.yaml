document: rfc-9866
kind: normative-requirement
summary: When a received RNFD Option has PosCFRC/NegCFRC bit length smaller than the node's local CFRCs, the node MUST ignore the option (and MAY reset its Trickle timer). This prevents downgrade of CFRC resolution.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
