document: rfc-9754
kind: protocol-element
summary: The delegation timestamp attributes (fattr4_time_deleg_access and fattr4_time_deleg_modify) are invalid for use with GETATTR, VERIFY, and NVERIFY; they may only be used with CB_GETATTR and SETATTR by a client holding an appropriate delegation.
section: "5"
