document: rfc-7788
kind: protocol-element
summary: 'HNCP defines six interface categories: Internal (DNCP endpoint, forwards traffic), External (no DNCP endpoint, firewall perimeter), Leaf (Internal but no DNCP endpoint), Guest (Leaf with added isolation from homenet resources), Ad Hoc (Internal without transitivity assumption), and Hybrid (Internal while still running DHCP clients for external config).'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
