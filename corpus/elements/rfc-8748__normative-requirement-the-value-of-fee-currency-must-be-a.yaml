document: rfc-8748
kind: normative-requirement
summary: The value of <fee:currency> MUST be a three-character currency code from ISO 4217. Servers SHOULD NOT perform currency conversion if a client uses an incorrect currency code; instead, servers SHOULD return a 2004 'Parameter value range error'.
section: "3.2"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
