document: rfc-7471
kind: wire-format
summary: The Min/Max Unidirectional Link Delay sub-TLV (type 28, length 8) contains a 1-bit Anomalous (A) flag, 7 reserved bits, a 24-bit Min Delay field, 8 reserved bits, and a 24-bit Max Delay field, all in microseconds encoded as integers. Min and max may be equal; both fields saturate at 16,777,215.
section: "4.2"
topics:
