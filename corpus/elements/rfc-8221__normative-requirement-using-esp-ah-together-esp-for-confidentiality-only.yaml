document: rfc-8221
kind: normative-requirement
summary: Using ESP+AH together (ESP for confidentiality only, AH for authentication) is NOT RECOMMENDED. It is the slowest method, increases header overhead, reduces effective MTU, and some configurations have been shown to be insecure.
section: "4"
rfc2119_level: SHOULD NOT
