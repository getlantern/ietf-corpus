document: rfc-7876
kind: wire-format
summary: The UDP Return Object (URO) has a 1-byte Type field (value 131), a 1-byte Length field ({6,18}), a 2-byte UDP-Destination-Port, and a variable-length Address field that is either a 4-byte IPv4 or 16-byte IPv6 address. The Length field doubles as a TLV parsing parameter and address-family indicator.
section: "3.1"
topics:
