document: rfc-2163
kind: design-rationale
summary: DNS distribution of MCGAM is preferred over static tables because it avoids fetching and storing entire mapping tables, allows timely updates, supports full authority delegation, enables remote debugging of gateway mappings, and is accessible to a broad range of tools such as address converters and user agents.
section: "2"
