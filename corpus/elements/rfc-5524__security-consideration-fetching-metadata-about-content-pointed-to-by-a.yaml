document: rfc-5524
kind: security-consideration
summary: Fetching metadata about content pointed to by a URL (such as original filename and user-supplied description) allows an attacker to discover more about the content than was previously possible via the unextended URLFETCH. The additional value to an attacker is marginal and applies only to URLs for which the attacker lacks direct access, such as those produced by URLAUTH.
section: "7"
topics:
    - email
    - security
