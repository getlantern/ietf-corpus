document: rfc-5496
kind: normative-requirement
summary: A Vector Attribute MUST NOT be sent in a PIM Join to an upstream neighbor chosen as the result of Assert processing if that neighbor is different from the original upstream neighbor, because reachability of the Vector is only guaranteed by the router that advertises it in its IGP.
section: 3.3.3
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
