document: rfc-5712
kind: design-rationale
summary: A soft preempting LSR MAY check whether there exists soft preemptable TE LSP bandwidth already flagged by another node to reduce the under-provisioning exposure and the number of preempted TE LSPs, since coordinating preemption of the same LSP across multiple nodes avoids duplicating the penalty.
section: "6.1"
topics:
