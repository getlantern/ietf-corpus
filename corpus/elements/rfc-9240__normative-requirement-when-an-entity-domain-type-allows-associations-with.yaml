document: rfc-9240
kind: normative-requirement
summary: When an entity domain type allows associations with defining information resources, the media type of the potential defining information resource MUST be specified both in the document defining the entity domain type and in the IANA 'ALTO Entity Domain Types' registry. A Client MUST ignore entities from a resource-specific entity domain whose defining resource has a noncompliant media type.
section: 4.6.1
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
