document: rfc-5103
kind: normative-requirement
summary: An Exporting Process MUST NOT export a Template containing the reverse counterpart of a non-reversible Information Element. A Collecting Process receiving the reverse counterpart of a non-reversible IE MAY discard that element from the Flow Record.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - measurement
