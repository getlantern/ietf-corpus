document: rfc-3516
kind: normative-requirement
summary: The APPEND command is extended to allow appending data containing NULs via <literal8> syntax. The server MAY modify the CTE of appended data, but any such transformation MUST NOT result in a loss of data.
section: "4.4"
rfc2119_level: MUST NOT
