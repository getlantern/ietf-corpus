document: rfc-8365
kind: protocol-element
summary: Aliasing uses the Ethernet A-D per EVI route to signal reachability to a locally attached ES even when no MAC addresses have been learned from that segment, enabling remote NVEs to load-balance across all NVEs connected to the multihomed ES.
section: 8.1.4
topics:
    - routing
    - bgp
