document: rfc-2608
kind: protocol-element
summary: SLP Extensions use a 16-bit Extension ID, 24-bit Next Extension Offset, and variable Extension Data. IDs 0x0000-0x3FFF are optional-to-implement standardized; 0x4000-0x7FFF are mandatory-to-implement standardized; 0x8000-0x8FFF are for private use; 0x9000-0xFFFF are reserved.
section: "9.1"
