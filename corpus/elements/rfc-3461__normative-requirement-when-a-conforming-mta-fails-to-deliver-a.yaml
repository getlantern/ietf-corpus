document: rfc-3461
kind: normative-requirement
summary: When a conforming MTA fails to deliver a message, it MUST issue a 'failed' DSN if NOTIFY=FAILURE was specified. If NOTIFY was specified without FAILURE, a DSN MUST NOT be issued. If no NOTIFY was supplied, a 'failed' DSN MUST be issued.
section: 5.2.6
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
