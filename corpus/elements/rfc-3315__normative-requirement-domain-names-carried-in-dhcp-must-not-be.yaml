document: rfc-3315
kind: normative-requirement
summary: Domain names carried in DHCP MUST NOT be stored in compressed form as described in RFC 1035 section 4.1.4; they must use the uncompressed wire encoding from RFC 1035 section 3.1 to ensure uniform decoding.
section: "8"
rfc2119_level: MUST NOT
