document: rfc-6080
kind: normative-requirement
summary: For interoperability, PDSs and devices MUST support providing identities and credentials via profile data (the framework-internal bootstrapping option). This baseline is required even when other bootstrapping methods (pre-configuration, out-of-band, user interface) are also supported.
section: 5.3.1
rfc2119_level: MUST
topics:
    - sip
