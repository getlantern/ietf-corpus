document: rfc-6466
kind: interoperability-note
summary: The 'image' media type is an existing top-level MIME media type widely used in SDP implementations. Registering it as a top-level SDP media type ensures seamless continuity with documentation and previously registered MIME sub-types like 'image/t38' (RFC 3362) used as SDP media descriptors for T.38.
section: "1"
topics:
