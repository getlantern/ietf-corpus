document: rfc-3530
kind: security-consideration
summary: Security negotiation between client and server must occur over a secure channel to prevent a third party from intercepting and forcing a downgrade to a lower security level than required. The NFS v4 authentication model has moved from machine-based to principal-based, though TCP connection management remains per-machine for scalability.
section: "3.3"
topics:
    - security
