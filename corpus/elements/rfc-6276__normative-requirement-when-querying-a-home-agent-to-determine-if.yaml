document: rfc-6276
kind: normative-requirement
summary: When querying a home agent to determine if it provides DHCPv6PD service, it is RECOMMENDED that MRD and MRC be set to non-zero values so the mobile router discontinues sending Solicit messages after 6 attempts, concluding the home agent will not provide DHCPv6PD service.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
