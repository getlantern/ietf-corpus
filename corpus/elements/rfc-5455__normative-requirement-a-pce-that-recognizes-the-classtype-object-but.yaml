document: rfc-5455
kind: normative-requirement
summary: A PCE that recognizes the CLASSTYPE object but determines the Class-Type value is not valid (i.e., value 0) MUST send a PCE error with error type 'Diffserv-aware TE error' (Error-Type 12) and error value 'Invalid Class-Type' (Error-value 2).
section: "3.3"
rfc2119_level: MUST
topics:
