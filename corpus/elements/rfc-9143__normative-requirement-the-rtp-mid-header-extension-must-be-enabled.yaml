document: rfc-9143
kind: normative-requirement
summary: The RTP MID header extension MUST be enabled by including an SDP 'extmap' attribute with the URI 'urn:ietf:params:rtp-hdrext:sdes:mid' in each bundled RTP-based 'm=' section in every offer and answer. A given SSRC MUST NOT transmit RTP packets using payload types that originate from different bundled 'm=' sections.
section: "9.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
