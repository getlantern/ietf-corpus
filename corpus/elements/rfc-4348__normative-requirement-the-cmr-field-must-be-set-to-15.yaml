document: rfc-4348
kind: normative-requirement
summary: The CMR field MUST be set to 15 (no preference) for packets sent to a multicast group. The encoder SHOULD ignore mode requests when sending to a multicast session but MAY use RTCP feedback as a hint.
section: 6.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - multicast
