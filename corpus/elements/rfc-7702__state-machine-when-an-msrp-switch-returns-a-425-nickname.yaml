document: rfc-7702
kind: state-machine
summary: When an MSRP switch returns a 425 (Nickname usage failed) response to a NICKNAME request, the gateway translates this into an XMPP presence stanza of type 'error' with a <conflict/> error condition. Alternatively, the gateway may generate a new nickname request on behalf of the XMPP user to shield it from the conflict.
section: "5.6"
topics:
    - sip
    - realtime
