document: rfc-7783
kind: protocol-element
summary: The Affinity sub-TLV is a new IS-IS sub-TLV that allows an RBridge to specify its desired path of association to a given TRILL multi-destination distribution tree. It appears in Router Capability TLVs or MT Capability TLVs within Link State PDUs (LSPs). The code point and data structure are specified in RFC 7176.
section: "3"
topics:
