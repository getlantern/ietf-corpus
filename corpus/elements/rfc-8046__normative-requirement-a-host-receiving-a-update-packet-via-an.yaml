document: rfc-8046
kind: normative-requirement
summary: A host receiving a UPDATE packet via an RVS MUST be prepared to process the FROM and RVS_HMAC parameters and MUST include a VIA_RVS parameter in the UPDATE reply that contains the ACK of the UPDATE SEQ.
section: 3.2.3
rfc2119_level: MUST
topics:
    - ip
    - mobility
