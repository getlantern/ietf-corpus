document: rfc-8194
kind: protocol-element
summary: A Schedule specifies a start event-ref, an optional stop (end event-ref or duration in seconds), an execution-mode (sequential=1, parallel=2, pipelined=3; default pipelined), suppression-tag leaf-list, and a list of Actions. Each Action references a Task and may pass output to destination Schedules.
