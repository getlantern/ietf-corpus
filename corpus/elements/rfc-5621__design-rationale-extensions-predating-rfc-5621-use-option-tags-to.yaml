document: rfc-5621
kind: design-rationale
summary: Extensions predating RFC 5621 use option-tags to ensure recipients understand the extension and thus cannot miss references to body parts. The 'by-reference' disposition type provides a declarative, extension-agnostic mechanism for the same protection.
section: "9.4"
