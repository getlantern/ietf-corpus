document: rfc-3643
kind: interoperability-note
summary: FC-MI (ANSI INCITS/TR-30:2002) identifies certain SOF and EOF codes (e.g., SOFi1, SOFn1) as not interoperable to the degree required by the IETF. These codes are excluded from the SOF and EOF encoding tables in this specification and MUST NOT be used.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
