kind: protocol-element
summary: The HKDF variant uses HKDF-Extract(salt=ukm, K) to produce PRK, then HKDF-Expand(PRK, DER(ECC-CMS-SharedInfo), SizeInOctets(KEK)) to produce the KEK; if no ukm is provided, HKDF uses an all-zero salt.
