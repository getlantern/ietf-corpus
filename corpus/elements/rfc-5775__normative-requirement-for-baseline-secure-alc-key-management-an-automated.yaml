document: rfc-5775
kind: normative-requirement
summary: For baseline secure ALC key management, an automated key management scheme such as GDOI (RFC 3547), GSAKMP (RFC 4535), or MIKEY (RFC 3830) SHOULD be used. Short-lived ALC sessions MAY use Manual Keying if Extended Sequence Numbering (ESN) is available.
section: 5.1.2.3
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
