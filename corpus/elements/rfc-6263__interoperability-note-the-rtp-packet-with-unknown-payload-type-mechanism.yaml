document: rfc-6263
kind: interoperability-note
summary: The 'RTP packet with unknown payload type' mechanism may cause interoperability issues because the RFC 3550 requirement that receivers ignore unknown payload types is not always observed in practice, and some RTP payload formats do not handle gaps in RTP sequence numbers well.
section: "4.6"
topics:
    - rtp
    - nat
