document: rfc-8583
kind: design-rationale
summary: Load values are specified analogously to DNS SRV weight values (range 0-65535) to allow interoperability between Diameter Load values and DNS SRV weights in distribution algorithms. A higher Load value indicates lower node load (65535 = zero load, 0 = 100% loaded).
section: "5"
