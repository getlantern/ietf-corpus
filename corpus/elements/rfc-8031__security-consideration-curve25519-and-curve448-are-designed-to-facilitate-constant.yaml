document: rfc-8031
kind: security-consideration
summary: Curve25519 and Curve448 are designed to facilitate constant-time implementations, which is of crucial importance especially if ephemeral key pairs are reused across many key exchanges for performance reasons. Implementors are encouraged to use constant-time implementations to resist time-based side-channel attacks.
