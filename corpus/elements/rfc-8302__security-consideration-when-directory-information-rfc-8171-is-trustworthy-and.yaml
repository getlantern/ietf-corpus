document: rfc-8302
kind: security-consideration
summary: When directory information (RFC 8171) is trustworthy and complete, ARP/ND responses can be entirely directory-based, bounding the damage that forged ARP/ND messages can do. Incomplete or unreliable directory data can be combined with data-plane-learned data arbitrated by the confidence level in the IA APPsub-TLV.
section: "9.2"
topics:
    - security
    - routing
