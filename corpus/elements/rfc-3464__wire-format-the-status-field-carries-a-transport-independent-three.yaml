document: rfc-3464
kind: wire-format
summary: The Status field carries a transport-independent three-part status code with format DIGIT '.' 1*3DIGIT '.' 1*3DIGIT. The first sub-field is 2 (success), 4 (temporary failure), or 5 (permanent failure). No leading zeros are allowed; whitespace is prohibited within the code.
section: 2.3.4
