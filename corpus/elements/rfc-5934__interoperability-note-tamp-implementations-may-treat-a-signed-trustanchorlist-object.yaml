document: rfc-5934
kind: interoperability-note
summary: TAMP implementations MAY treat a signed TrustAnchorList object (RFC 5914, OID id-ct-trustAnchorList) as equivalent to a TAMPUpdate with terse=terse, msgRef=allModules, and all list entries as add operations. This provides a simple trust anchor transfer mechanism but does not support remove, change, or HTTP binding.
section: 4.3.1
topics:
    - security
    - pkix
