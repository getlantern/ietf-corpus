document: rfc-9842
kind: normative-requirement
summary: 'When multiple dictionaries match a given request URL, the client MUST select a single dictionary using the following precedence: (1) a dictionary that specifies and matches ''match-dest'' beats one that does not; (2) the longest ''match'' wins among ties; (3) the most recently fetched dictionary wins among remaining ties.'
section: 2.2.3
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
