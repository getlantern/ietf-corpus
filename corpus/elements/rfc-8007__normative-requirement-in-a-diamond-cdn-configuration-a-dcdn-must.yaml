document: rfc-8007
kind: normative-requirement
summary: In a diamond CDN configuration, a dCDN MUST allow each uCDN from which it may have acquired content to act upon that content using CI/T Commands. In all other cases, a dCDN MUST reject CI/T Commands from a uCDN attempting to act on another uCDN's content.
section: 2.2.1
rfc2119_level: MUST
topics:
    - http
