document: rfc-7188
kind: design-rationale
summary: RFC 7188 removes the latitude of RFC 6130 and RFC 7181 implementations to reject messages with unrecognized TLV values, enabling protocol extensions that interoperate with unextended implementations. The original specs could be read as allowing rejection on this basis, which would block forward-compatible extensions.
section: "1"
topics:
    - routing
