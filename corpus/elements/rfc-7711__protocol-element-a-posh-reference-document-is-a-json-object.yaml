document: rfc-7711
kind: protocol-element
summary: A POSH reference document is a JSON object containing a 'url' member (HTTPS URI where fingerprint information can be obtained) and an 'expires' member (seconds). It MUST NOT contain a 'fingerprints' member, and the resource at 'url' MUST be a fingerprints document.
section: "3.2"
topics:
    - pkix
    - json
    - http
