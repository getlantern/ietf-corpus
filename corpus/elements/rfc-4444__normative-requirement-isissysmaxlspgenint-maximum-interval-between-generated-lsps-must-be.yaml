document: rfc-4444
kind: normative-requirement
summary: isisSysMaxLSPGenInt (maximum interval between generated LSPs) must be greater than any configured isisSysLevelMinLSPGenInt value, and SHOULD be at least 300 seconds less than isisSysMaxAge. isisSysMaxAge SHOULD be at least 300 seconds greater than isisSysMaxLSPGenInt.
