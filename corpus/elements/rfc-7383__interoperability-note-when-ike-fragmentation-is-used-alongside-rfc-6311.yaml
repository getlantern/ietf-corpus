document: rfc-7383
kind: interoperability-note
summary: When IKE fragmentation is used alongside RFC 6311 High Availability, IKE Message ID Synchronization messages (which deliberately use Message ID zero) MUST NOT be sent fragmented, since standard replay detection based on Message ID is not applicable for them.
section: "3"
topics:
