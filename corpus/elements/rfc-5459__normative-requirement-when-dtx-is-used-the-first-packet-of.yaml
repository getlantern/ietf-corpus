document: rfc-5459
kind: normative-requirement
summary: When DTX is used, the first packet of a talkspurt (first packet after a silence period) MUST have the RTP Marker (M) bit set to 1. All other packets MUST have the M bit set to 0.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
