document: rfc-6290
kind: normative-requirement
summary: The token taker MUST support at least four QCD_TOKEN notifications in a single unprotected packet, verifying the token against each; this supports periodic rollover of the QCD_SECRET across up to four generations of keys.
section: "4.5"
rfc2119_level: MUST
