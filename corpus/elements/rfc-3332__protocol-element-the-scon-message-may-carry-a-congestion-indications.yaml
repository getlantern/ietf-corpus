document: rfc-3332
kind: protocol-element
summary: 'The SCON message may carry a Congestion Indications parameter (Tag 0x0205) with a Congestion Level field (8 bits): 0=No Congestion/Undefined, 1=Level 1, 2=Level 2, 3=Level 3. This supports national MTP networks with multiple congestion thresholds (e.g., ANSI MTP3); for ITU networks without multiple levels the parameter is omitted.'
section: 3.4.4
topics:
