document: rfc-3946
kind: protocol-element
summary: The Transparency (T) field (32 bits) is a flag vector specifying which SONET/SDH frame overhead fields must be delivered unmodified end-to-end. Flag 1 (bit 1) requests Section/Regenerator Section layer transparency (entire frames pass unmodified; pointer adjustment is prohibited). Flag 2 (bit 2) requests Line/Multiplex Section transparency (LOH/MSOH unmodified; pointer adjustment prohibited). Transparency applies only to signal types STS-1/STM-0 through STS-768/STM-256.
section: "2.1"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
