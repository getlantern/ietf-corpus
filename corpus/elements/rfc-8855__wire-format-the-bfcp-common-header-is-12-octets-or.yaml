document: rfc-8855
kind: wire-format
summary: 'The BFCP COMMON-HEADER is 12 octets (or 16 if fragmented) and contains: a 3-bit Version, R (Transaction Responder) flag, F (Fragmentation) flag, 3 reserved bits, an 8-bit Primitive, a 16-bit Payload Length, a 32-bit Conference ID, a 16-bit Transaction ID, and a 16-bit User ID. When F is set (unreliable transport only), 16-bit Fragment Offset and Fragment Length fields follow.'
section: "5.1"
topics:
    - realtime
