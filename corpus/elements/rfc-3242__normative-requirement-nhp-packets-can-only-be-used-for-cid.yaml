document: rfc-3242
kind: normative-requirement
summary: NHP packets can only be used for CID=0. If multiple packet streams are handled, the assisting layer MUST be able to indicate when packets with CID=0 have been lost on the physical link.
section: "4.7"
rfc2119_level: MUST
