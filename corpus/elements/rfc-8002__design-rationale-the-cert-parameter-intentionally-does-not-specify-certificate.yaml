document: rfc-8002
kind: design-rationale
summary: The CERT parameter intentionally does not specify certificate semantics or use cases; these are left to documents that use the CERT parameter. This allows the parameter to be reused across different HIP scenarios without coupling the transport mechanism to specific trust models.
