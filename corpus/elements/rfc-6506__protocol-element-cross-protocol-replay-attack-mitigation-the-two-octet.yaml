document: rfc-6506
kind: protocol-element
summary: 'Cross-protocol replay attack mitigation: the two-octet OSPFv3 Cryptographic Protocol ID (value 1 for OSPFv3) is appended to the Authentication Key K to form a Protocol-Specific Authentication Key Ks before HMAC computation. Other protocols using this mechanism MUST similarly append their respective Protocol IDs.'
section: "4.4"
topics:
    - routing
    - security
    - crypto
