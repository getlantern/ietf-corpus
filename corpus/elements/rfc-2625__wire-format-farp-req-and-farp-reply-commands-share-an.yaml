summary: 'FARP-REQ and FARP-REPLY commands share an identical 76-byte fixed format: command code (4 bytes), Match Address Code Points (1 byte), Port_ID of Requester (3 bytes), Responder Flags (1 byte), Port_ID of Responder (3 bytes), WW_PNs (8 bytes each), optional WW_NNs (8 bytes each), and optional IPv4 address fields (16 bytes each).'
