document: rfc-5576
kind: normative-requirement
summary: Endpoints MUST NOT reuse the same SSRC ID for identified sources with the same CNAME for at least the duration of the RTP session's participant timeout interval, and SHOULD NOT reuse any SSRC ID ever mentioned in SDP for the entire lifetime of the session.
section: "5"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
