document: rfc-4023
kind: wire-format
summary: MPLS-in-IP packets consist of an IPv4 or IPv6 header (source/destination set to encapsulating/decapsulating LSR addresses), followed by an MPLS Label Stack as defined in RFC 3032, followed by the message body. The IPv4 Protocol Number or IPv6 Next Header is set to 137.
