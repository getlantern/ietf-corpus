document: rfc-4004
kind: normative-requirement
summary: The AAAH MUST use a different Session-Id in the HAR/HAA exchange than the one used in the AMR/AMA exchange. If session-stateful, the AAAH MUST send the same session identifier for all HARs initiated on behalf of a given mobile node's session.
section: 4.1.1
rfc2119_level: MUST
topics:
    - diameter
    - mobility
