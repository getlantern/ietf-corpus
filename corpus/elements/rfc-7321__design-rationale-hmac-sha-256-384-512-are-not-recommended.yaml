document: rfc-7321
kind: design-rationale
summary: HMAC-SHA-256/384/512 are not recommended for new implementations despite good security margins because HMAC-SHA-1 has widespread support and adequate security, AES-GMAC offers better performance, and authenticated encryption algorithms remove the need for separate authentication.
section: "4.3"
topics:
    - ipsec
    - crypto
