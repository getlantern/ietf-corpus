document: rfc-1782
kind: normative-requirement
summary: An option not acknowledged by the server must be ignored by both client and server as if it were never requested. If multiple options were requested, the client must use only those acknowledged and must not use those not acknowledged.
section: Negotiation Protocol
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
