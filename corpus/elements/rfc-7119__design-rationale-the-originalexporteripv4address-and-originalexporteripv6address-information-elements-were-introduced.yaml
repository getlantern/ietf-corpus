document: rfc-7119
kind: design-rationale
summary: The originalExporterIPv4Address and originalExporterIPv6Address Information Elements were introduced because, without them, a downstream Collector in an Exporter/Mediator/Collector chain would wrongly conclude that the IPFIX Mediator directly observed the packets that generated the Flow Records.
