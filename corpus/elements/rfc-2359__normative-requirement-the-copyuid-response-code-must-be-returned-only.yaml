document: rfc-2359
kind: normative-requirement
summary: The COPYUID response code MUST be returned only when at least one message was copied. Neither the source nor destination UID sets in COPYUID may contain extraneous UIDs or the symbol '*'.
section: "4.3"
rfc2119_level: MUST NOT
