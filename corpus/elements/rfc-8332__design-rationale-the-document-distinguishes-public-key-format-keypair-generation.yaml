document: rfc-8332
kind: design-rationale
summary: The document distinguishes 'public key format' (keypair generation and key encoding) from 'public key algorithm' (format plus signature procedures). This separation allows the same 'ssh-rsa' key format to be reused with new hash algorithms without re-encoding keys or changing trusted key fingerprints.
section: "2"
