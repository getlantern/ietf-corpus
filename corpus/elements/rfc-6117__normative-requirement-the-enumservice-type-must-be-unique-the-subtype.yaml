document: rfc-6117
kind: normative-requirement
summary: The Enumservice Type MUST be unique; the Subtype MUST be unique within a given Type. Types and Subtypes MUST conform to the ABNF in Section 3.4.3 of RFC 6116 and SHOULD be specified in lowercase letters.
section: "3.2"
