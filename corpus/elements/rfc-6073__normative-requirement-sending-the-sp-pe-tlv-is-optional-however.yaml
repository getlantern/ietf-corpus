document: rfc-6073
kind: normative-requirement
summary: Sending the SP-PE TLV is OPTIONAL; however, the PE or S-PE MUST process the TLV upon reception. The 'U' bit MUST be set for backward compatibility. The order of SP-PE TLVs in the LDP message MUST be preserved.
section: "7.4"
rfc2119_level: MUST
topics:
    - mpls
