document: rfc-9644
kind: protocol-element
summary: 'The ''generate-asymmetric-key-pair'' RPC (feature-gated) requests the device to generate an asymmetric key pair for a specified SSH public key algorithm, with mandatory choice of private-key-encoding: cleartext, encrypted (via keystore reference), or hidden. Output is either the key pair or an instance-identifier pointing to the hidden key''s location.'
