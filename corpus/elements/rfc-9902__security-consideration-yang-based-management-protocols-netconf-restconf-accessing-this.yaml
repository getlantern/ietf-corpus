document: rfc-9902
kind: security-consideration
summary: YANG-based management protocols (NETCONF, RESTCONF) accessing this module must use a secure transport layer (SSH, TLS, QUIC) and must use mutual authentication. The NACM (RFC 8341) should be used to restrict access to authorized users.
