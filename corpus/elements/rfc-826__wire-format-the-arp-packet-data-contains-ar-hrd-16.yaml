kind: wire-format
summary: 'The ARP packet data contains: ar$hrd (16-bit hardware address space), ar$pro (16-bit protocol address space), ar$hln (8-bit hardware address byte length), ar$pln (8-bit protocol address byte length), ar$op (16-bit opcode), ar$sha (n-byte sender hardware address), ar$spa (m-byte sender protocol address), ar$tha (n-byte target hardware address), ar$tpa (m-byte target protocol address). No padding bytes exist between fields; only ar$hrd, ar$pro, and ar$op are defined as words, transmitted most-significant byte first.'
