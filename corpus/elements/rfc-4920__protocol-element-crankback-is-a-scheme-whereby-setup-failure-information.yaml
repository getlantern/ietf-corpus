document: rfc-4920
kind: protocol-element
summary: Crankback is a scheme whereby setup failure information is returned from the point of failure to allow new setup attempts avoiding blocked resources. It applies to both LSP setup failures and LSP recovery to indicate the location of failed links or nodes.
section: "1"
topics:
