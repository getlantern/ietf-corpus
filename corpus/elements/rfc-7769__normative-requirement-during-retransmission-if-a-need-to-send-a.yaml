document: rfc-7769
kind: normative-requirement
summary: During retransmission, if a need to send a new MAC withdraw message with an updated sequence number arises, retransmission of the older unacknowledged withdraw message MUST be suspended and the retransmit timer for the new sequence number MUST be initiated.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
