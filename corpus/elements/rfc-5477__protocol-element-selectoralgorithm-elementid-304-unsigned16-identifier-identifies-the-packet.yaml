document: rfc-5477
kind: protocol-element
summary: 'selectorAlgorithm (ElementId 304, unsigned16 identifier) identifies the packet selection method in use. Eight initial methods are defined: systematic count-based sampling (1), systematic time-based sampling (2), random n-out-of-N sampling (3), uniform probabilistic sampling (4), property match filtering (5), and hash-based filtering using BOB (6), IPSX (7), or CRC (8).'
section: 8.2.1
topics:
