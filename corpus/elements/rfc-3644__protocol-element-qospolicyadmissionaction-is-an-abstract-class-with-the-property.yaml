document: rfc-3644
kind: protocol-element
summary: QoSPolicyAdmissionAction is an abstract class with the property qpAdmissionScope (0 = per-flow, 1 = per-class) that determines whether metering and policing applies to individual microflows or to an aggregate traffic class. It is linked to a traffic profile via QoSPolicyTrfcProfInAdmissionAction.
section: "8.2"
topics:
    - qos
