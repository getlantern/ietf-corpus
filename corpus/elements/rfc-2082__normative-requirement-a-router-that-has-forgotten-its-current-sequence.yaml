document: rfc-2082
kind: normative-requirement
summary: A router that has forgotten its current sequence number but remembers its key and Key-ID MUST send its first packet with a sequence number of zero. This creates a small window for replay attacks, so vendors are encouraged to provide stable storage for sequence numbers.
section: 3.2.2
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
