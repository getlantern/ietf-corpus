document: rfc-1532
kind: protocol-element
summary: The 'secs' field SHOULD contain the elapsed time in seconds since the client sent its first BOOTREQUEST; the first BOOTREQUEST SHOULD set 'secs' to zero. Clients SHOULD NOT use a constant value, as this undermines its utility as a policy control mechanism for servers and relay agents.
section: "3.2"
topics:
    - ip
