document: rfc-5898
kind: design-rationale
summary: When using a connection-oriented transport in passive mode, the offerer cannot know which SIP dialog originated an incoming connection request, making dialog-to-stream correlation difficult. Having the offerer take the active role avoids this ambiguity.
section: "4.3"
topics:
    - sip
    - realtime
    - tcp
