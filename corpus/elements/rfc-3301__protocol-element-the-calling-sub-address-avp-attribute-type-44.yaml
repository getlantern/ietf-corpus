document: rfc-3301
kind: protocol-element
summary: The Calling Sub-Address AVP (Attribute Type 44) encodes additional Calling Party subaddress information as a 20-octet binary NSAP address; it MAY appear in ICRQ and SHOULD only be present if the Calling Party number is also in the message.
section: "5.2"
