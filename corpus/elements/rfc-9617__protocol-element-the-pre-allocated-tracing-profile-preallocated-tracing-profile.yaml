kind: protocol-element
summary: The pre-allocated tracing profile ('preallocated-tracing-profile') contains node-action, trace-types (use-namespace and trace-type list), and max-length. The 'max-length' field (uint32, in bytes) is conditional on 'action-encapsulate' and specifies the maximum length of the node data list.
