document: rfc-3928
kind: normative-requirement
summary: When transitioning from sync to persist phase in a syncAndPersist request, the server MUST send a Sync Update Informational Response (stateUpdate=TRUE, persistPhase=TRUE) immediately after the last sync-phase entry and before any persist-phase entry.
section: 4.2.1
rfc2119_level: MUST
