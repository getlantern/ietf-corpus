document: rfc-4396
kind: normative-requirement
summary: SDUR=0 is reserved to signal unknown duration. Text samples of unknown duration SHALL be displayed until the next text sample becomes active. Upon storing such a sample in a 3GP file, SDUR MUST be replaced with the effective duration, which MUST be greater than zero.
section: 4.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
