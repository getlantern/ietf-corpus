document: rfc-5866
kind: security-consideration
summary: The Diameter QoS application relies on the Diameter base protocol's security mechanisms; when the QoS authorization cannot be tied to a prior authentication exchange, the Authorizing Entity MUST authenticate the QoS reservation requesting entity directly as part of the Diameter QoS protocol interaction to prevent unauthorized QoS resource allocation.
section: "11"
topics:
