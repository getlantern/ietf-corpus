document: rfc-4518
kind: protocol-element
summary: In the Map step, for case ignore, numeric, and stored prefix string matching rules, characters are case folded per B.2 of RFC 3454. ZERO WIDTH SPACE (U+200B) is mapped to nothing; all other code points with Separator property (Zs, Zl, Zp) are mapped to SPACE (U+0020).
section: "2.2"
