document: rfc-9291
kind: protocol-element
summary: A 'vpn-network-access' represents a single entry point to an L2VPN. It binds to an interface ('interface-id'), references an active VPN node profile, carries per-access signaling options (CE ID, remote CE ID, EVPN VPWS instance, DF preference), grouping metadata for redundancy and ESI assignment, Ethernet OAM configuration, and access-level service parameters.
section: "7.6"
topics:
