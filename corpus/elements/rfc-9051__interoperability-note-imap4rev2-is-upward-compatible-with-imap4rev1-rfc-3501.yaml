document: rfc-9051
kind: interoperability-note
summary: IMAP4rev2 is upward-compatible with IMAP4rev1 (RFC 3501), but mailbox names using modified UTF-7 (the IMAP4rev1 international naming convention) are not valid Net-Unicode. Appendix A describes the modified UTF-7 convention for servers that must interoperate with IMAP4rev1 clients.
section: A.1
topics:
    - email
