document: rfc-5802
kind: design-rationale
summary: The Hi() function is essentially PBKDF2 with HMAC as the PRF and dkLen equal to the HMAC output length. The iteration count 'i' is deliberately configurable and recommended to increase over time to raise the cost of offline attacks as hardware improves.
section: "2.2"
topics:
    - crypto
    - security
