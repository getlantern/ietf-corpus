document: rfc-9085
kind: wire-format
summary: The Prefix-SID TLV (Type 1158, 7 or 8 octets) encodes a 1-octet Flags field, 1-octet Algorithm, 2-octet Reserved (MUST be 0), and a variable SID/Index/Label. The Protocol-ID of the BGP-LS Prefix NLRI determines whether IS-IS, OSPFv2, or OSPFv3 flag/SID semantics apply.
section: 2.3.1
topics:
