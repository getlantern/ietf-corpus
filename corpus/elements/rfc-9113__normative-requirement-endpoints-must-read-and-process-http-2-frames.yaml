document: rfc-9113
kind: normative-requirement
summary: Endpoints MUST read and process HTTP/2 frames from the TCP receive buffer as soon as data is available. Failure to read promptly could cause a deadlock when critical frames such as WINDOW_UPDATE are not processed.
section: 5.2.2
rfc2119_level: MUST
topics:
    - http
    - tcp
