document: rfc-8911
kind: protocol-element
summary: 'The Status field allows three values: ''Current'' (all newly defined metrics), ''Deprecated'' (replaced by a backward- or non-backward-compatible revision), and ''Obsolete'' (contains errors or has critical references designated obsolete, with no replacement). Deprecated entries are retained with all Administrative columns unmodified except Status.'
section: 7.5.1
topics:
