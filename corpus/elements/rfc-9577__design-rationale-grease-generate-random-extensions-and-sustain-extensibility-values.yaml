document: rfc-9577
kind: design-rationale
summary: GREASE (Generate Random Extensions And Sustain Extensibility) values are reserved in the token types registry, inspired by RFC 8701. Both Clients and Origins can send greased values to ensure implementations handle unknown token types gracefully and remain interoperable with future extensions.
section: "4.1"
topics:
