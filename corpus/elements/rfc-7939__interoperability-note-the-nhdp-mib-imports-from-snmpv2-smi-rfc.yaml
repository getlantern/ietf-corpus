document: rfc-7939
kind: interoperability-note
summary: The NHDP-MIB imports from SNMPv2-SMI (RFC 2578), SNMPv2-TC (RFC 2579), SNMPv2-CONF (RFC 2580), IF-MIB (RFC 2863), SNMP-FRAMEWORK-MIB (RFC 3411), INET-ADDRESS-MIB (RFC 4001), and FLOAT-TC-MIB (RFC 6340). Float32TC from RFC 6340 is used for link quality threshold objects because SMI range constraints cannot be applied to OCTET STRING-based types.
section: "6.4"
topics:
    - routing
