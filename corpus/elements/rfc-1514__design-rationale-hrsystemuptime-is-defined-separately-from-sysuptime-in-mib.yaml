document: rfc-1514
kind: design-rationale
summary: hrSystemUptime is defined separately from sysUpTime in MIB-II because sysUpTime reflects uptime of the network management portion of the system, whereas hrSystemUptime reflects the time since the host itself was last initialized — these can differ significantly.
