document: rfc-3140
kind: protocol-element
summary: A PHB Scheduling Class is a set of PHBs that may share a single PHBID (bit 14=1) because using any combination of them on the same microflow will not cause reordering. The AF1x PHBs (AF11, AF12, AF13) are the canonical example.
