document: rfc-5969
kind: security-consideration
summary: By restricting the 6rd domain to within a provider network, a CE only needs to accept packets from a known set of 6rd BR IPv4 addresses, avoiding many open-relay threats that apply to 6to4 (RFC 3964). The receiving rules in Section 9.2 provide anti-spoofing protection equivalent to native IPv4.
section: "12"
topics:
