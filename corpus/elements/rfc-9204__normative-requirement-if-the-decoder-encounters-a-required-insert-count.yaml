document: rfc-9204
kind: normative-requirement
summary: If the decoder encounters a Required Insert Count smaller than expected in an encoded field section, it MUST treat this as a connection error of type QPACK_DECOMPRESSION_FAILED. If it encounters one larger than expected, it MAY treat this as a connection error of type QPACK_DECOMPRESSION_FAILED.
section: 2.2.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
