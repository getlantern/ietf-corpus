document: rfc-9887
kind: normative-requirement
summary: Where PSK authentication is implemented, PSK lengths of at least 16 octets MUST be supported, and PSK identities of at least 16 octets MUST be supported. PSK identity MUST follow recommendations of RFC 9257 Section 6.1.
section: "3.5"
rfc2119_level: MUST
topics:
