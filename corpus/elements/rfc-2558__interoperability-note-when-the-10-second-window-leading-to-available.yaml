document: rfc-2558
kind: interoperability-note
summary: When the 10-second window leading to available or unavailable time crosses a 900-second statistics window boundary, the CV, ES, SES, SEFS, and UAS counts for the PREVIOUS interval must be adjusted. Successive GETs of interval objects (e.g., sonetPathIntervalSES) may return differing values if the first GET occurs during the first few seconds of the new window.
section: "3.5"
topics:
    - snmp
