document: rfc-3267
kind: normative-requirement
summary: Frame-blocks or speech frames lost in transmission MUST be stored as NO_DATA frames (FT=15) or SPEECH_LOST (FT=14, AMR-WB only) in complete frame-blocks in the storage format to maintain synchronization with the original media.
section: "5.3"
rfc2119_level: MUST
topics:
