document: rfc-4642
kind: registry
summary: This document registers the STARTTLS extension in the IANA NNTP extension registry. The capability label is 'STARTTLS' with no arguments, defining one new command (STARTTLS) that cannot be pipelined and that removes the STARTTLS and MODE-READER capabilities from the list after successful negotiation.
