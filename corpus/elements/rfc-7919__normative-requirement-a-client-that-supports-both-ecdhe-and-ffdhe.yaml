document: rfc-7919
kind: normative-requirement
summary: A client that supports both ECDHE and FFDHE MUST use a single Supported Groups extension in the ClientHello to advertise all supported groups. Separate extensions for ECDHE and FFDHE groups are not permitted.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - crypto
