document: rfc-8036
kind: protocol-element
summary: 'IEEE 802.15.4 defines eight security suites: Null, AES-CTR (encryption only), AES-CBC-MAC-128/64 (authentication only), and AES-CCM-128/64/32 (encryption and authentication). AES-CCM-32 is the most commonly used suite in AMI deployments.'
