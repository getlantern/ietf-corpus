document: rfc-3442
kind: interoperability-note
summary: DHCP server administrators should configure their servers to send both a Router option and a Classless Static Routes option (specifying the default router in both), because many clients may not implement option 121. This ensures backward compatibility with non-supporting clients.
section: DHCP Server Administrator Responsibilities
topics:
    - ip
