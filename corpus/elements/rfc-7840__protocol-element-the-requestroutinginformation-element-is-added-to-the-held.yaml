document: rfc-7840
kind: protocol-element
summary: The <requestRoutingInformation> element is added to the HELD <locationRequest> to signal that the requester wants the LIS to include emergency routing information in its response. It carries an optional 'service' attribute (a URN) defaulting to urn:service:sos.
