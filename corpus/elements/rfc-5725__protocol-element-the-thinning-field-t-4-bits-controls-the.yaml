document: rfc-5725
kind: protocol-element
summary: 'The thinning field (T, 4 bits) controls the sequence-number space coverage: only packets with sequence numbers 0 mod 2^T are reported. A value of 0 means no thinning and all packets are reported; maximum thinning is one packet in every 32,768.'
