document: rfc-6822
kind: protocol-element
summary: 'An Instance Identifier (IID) is a 16-bit number uniquely identifying an IS-IS instance within a routing domain. IID #0 is reserved for the standard legacy instance. Non-zero IIDs are only used by Multi-Instance-capable routers (MI-RTRs).'
