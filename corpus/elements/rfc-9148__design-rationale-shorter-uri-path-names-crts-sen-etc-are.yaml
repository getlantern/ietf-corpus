document: rfc-9148
kind: design-rationale
summary: Shorter URI path names (/crts, /sen, etc.) are specified instead of the longer EST paths (/cacerts, /simpleenroll, etc.) because EST-coaps targets low-resource networks with small packets where header space savings are important.
