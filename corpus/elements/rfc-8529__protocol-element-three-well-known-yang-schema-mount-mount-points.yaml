document: rfc-8529
kind: protocol-element
summary: 'Three well-known YANG Schema Mount mount points are defined: ''vrf-root'' for L3VPN-type NIs, ''vsi-root'' for L2VPN-type NIs, and ''vv-root'' for NI types that simultaneously support L2VPN bridging and L3VPN routing. These are declared as alternatives under the mandatory ''root-type'' choice.'
