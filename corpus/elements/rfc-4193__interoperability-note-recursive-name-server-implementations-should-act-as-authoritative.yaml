document: rfc-4193
kind: interoperability-note
summary: Recursive name server implementations should act as authoritative for an empty d.f.ip6.arpa zone and return RCODE 3 for reverse queries for Local IPv6 addresses, as the default behavior, to reduce global DNS query load.
