document: rfc-9847
kind: design-rationale
summary: Designated experts are instructed to decline codepoint registrations for documents already adopted or proposed for adoption by IETF WGs or IRTF RGs. The Specification Required policy is intended for protocols developed outside the IETF/IRTF; internal work should be coordinated with the TLS WG to ensure appropriate review.
