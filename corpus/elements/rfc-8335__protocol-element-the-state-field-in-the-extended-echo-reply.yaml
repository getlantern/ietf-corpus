document: rfc-8335
kind: protocol-element
summary: 'The State field in the Extended Echo Reply reflects the ARP table or IPv6 Neighbor Cache entry state when the probed interface is not on the proxy node. Values are: 0=Reserved, 1=Incomplete, 2=Reachable, 3=Stale, 4=Delay, 5=Probe, 6=Failed.'
