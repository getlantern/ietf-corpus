document: rfc-9068
kind: protocol-element
summary: Authentication information claims 'auth_time', 'acr', and 'amr' (all defined in OpenID Connect Core) MAY be included when a resource owner is involved. Their values are fixed across all access tokens derived from a given authorization response, even after token refresh or exchange.
section: 2.2.1
topics:
    - oauth
    - jose
