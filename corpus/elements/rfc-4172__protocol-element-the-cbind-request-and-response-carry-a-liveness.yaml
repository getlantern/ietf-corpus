document: rfc-4172
kind: protocol-element
summary: The CBIND request and response carry a LIVENESS TEST INTERVAL field. When set to a non-zero value, the receiving gateway SHALL transmit LTEST messages at the specified interval, beginning as soon as the session enters the OPEN state.
