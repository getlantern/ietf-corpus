summary: 'The MP-TLV Support for TLVs with Implicit Support sub-TLV is defined as a sub-TLV of the IS-IS Router CAPABILITY TLV (Type: 30, Length: 0). It signals that the advertising router supports MP-TLV for codepoints where existing specifications do not explicitly define such support.'
