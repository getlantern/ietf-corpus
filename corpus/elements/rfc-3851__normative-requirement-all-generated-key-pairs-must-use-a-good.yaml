document: rfc-3851
kind: normative-requirement
summary: All generated key pairs MUST use a good source of non-deterministic random input, and private keys MUST be protected securely. RSA key pairs MUST NOT be less than 512 bits; a minimum of 768 bits is RECOMMENDED.
section: "4.1"
rfc2119_level: MUST
topics:
