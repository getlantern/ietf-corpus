document: rfc-3265
kind: privacy-consideration
summary: Returning specific 4xx/6xx responses to SUBSCRIBE may reveal authorization policy. When privacy is required, notifiers SHOULD always return 202 and send a NOTIFY that appears to contain a plausible piece of state, indistinguishable from a valid response, without revealing actual authorization decisions.
section: "5.2"
topics:
    - sip
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
