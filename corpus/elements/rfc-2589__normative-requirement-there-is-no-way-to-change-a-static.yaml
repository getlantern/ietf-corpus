document: rfc-2589
kind: normative-requirement
summary: There is no way to change a static entry into a dynamic one or vice-versa. If a client uses Modify with objectClass dynamicObject on a static entry, the server must return objectClassModsProhibited or objectClassViolation.
section: "3.1"
rfc2119_level: MUST
topics:
    - ldap
