summary: 'Ten AEAD_* algorithm variants are defined for IKEv2: four AES GCM variants with 8- and 12-octet ICVs (AEAD_AES_128/256_GCM_8/12), and six AES CCM SHORT variants using an 11-octet nonce (instead of the 12-octet nonce in RFC 5116) with 8, 12, and 16-octet ICVs for both 128- and 256-bit key sizes.'
