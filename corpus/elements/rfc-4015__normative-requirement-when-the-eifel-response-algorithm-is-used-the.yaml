document: rfc-4015
kind: normative-requirement
summary: When the Eifel response algorithm is used, the specified steps MUST be taken by the TCP sender upon initiation of a timeout-based loss recovery (i.e., when the first timeout-based retransmit is sent). The algorithm MUST NOT be reinitiated after a timeout-based loss recovery has already been started but not completed.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
