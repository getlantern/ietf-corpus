document: rfc-8550
kind: normative-requirement
summary: 'Receiving agents MUST recognize and accept certificates that contain no email address. Receiving agents MUST recognize both ASCII and internationalized email addresses in the subjectAltName extension and MUST recognize email addresses in the distinguished name field in the PKCS #9 emailAddress attribute.'
section: "3"
rfc2119_level: MUST
topics:
