document: rfc-6572
kind: wire-format
summary: 'PMIP6-Home-Interface-ID (Type 153): fixed 10 octets — Type (1) + Length (1, = 10) + 64-bit Home Interface Identifier (8 octets). The 64-bit IID is exchanged between MAG/LMA and HAAA for use in link technologies that explicitly deliver an interface identifier (e.g., 3GPP, PPP).'
