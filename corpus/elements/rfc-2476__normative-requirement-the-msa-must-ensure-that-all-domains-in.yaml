document: rfc-2476
kind: normative-requirement
summary: The MSA MUST ensure that all domains in the envelope are fully-qualified. If the MSA examines or alters the message text (except to add trace header fields), it MUST also ensure all domains in address header fields are fully-qualified.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
    - dns
