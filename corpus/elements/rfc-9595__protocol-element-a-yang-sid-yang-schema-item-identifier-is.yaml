document: rfc-9595
kind: protocol-element
summary: A YANG SID (YANG Schema Item iDentifier) is a globally unique 63-bit unsigned integer used to identify YANG items including identities, data nodes, RPCs, actions, notifications, YANG modules, and features. The limitation to 63 bits (uint64 range 0..9223372036854775807) allows easier manipulation on platforms lacking 64-bit unsigned arithmetic.
section: "1"
topics:
