document: rfc-3404
kind: protocol-element
summary: 'Four flags are defined: ''S'' (output is a domain-name for SRV lookup), ''A'' (output is a domain-name for A/AAAA/A6 lookup), ''U'' (output is a URI), and ''P'' (remainder of DDDS algorithm is application-specific and outside DDDS scope). The S, A, U, and P flags are mutually exclusive.'
section: "4.3"
topics:
    - dns
