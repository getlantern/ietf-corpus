document: rfc-4535
kind: protocol-element
summary: The Key Download (KeyDL) message (exchange type 9) is sent by the GC/KS to an accepted GM. It contains the GM's identification, Nonce_R and combined Nonce_C values, key creation material, and the encrypted policy token and key material signed by the GC/KS.
