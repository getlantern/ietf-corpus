summary: 'RFC 4567 creates three IANA registries: (1) SDP attribute ''key-mgmt'' (att-field, session and media level); (2) RTSP header ''keymgmt'' with RTSP status code 463; (3) ''SDP/RTSP key management protocol identifier'' (KMPID) namespace, initially containing ''mikey''.'
