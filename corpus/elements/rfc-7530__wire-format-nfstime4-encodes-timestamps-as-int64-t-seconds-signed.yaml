document: rfc-7530
kind: wire-format
summary: nfstime4 encodes timestamps as int64_t seconds (signed, relative to Unix epoch midnight January 1, 1970 UTC) plus uint32_t nseconds (nanoseconds; values greater than 999,999,999 are invalid). Negative seconds values denote pre-epoch dates; nseconds is added to seconds in both cases.
section: 2.2.1
