document: rfc-1771
kind: design-rationale
summary: 'BGP enforces only hop-by-hop routing policies: a speaker advertises to neighboring ASes only routes it itself uses. Policies that require traffic to take a different path than what the neighboring AS would normally use (requiring source routing) cannot be supported by BGP.'
section: "2"
topics:
    - bgp
    - routing
