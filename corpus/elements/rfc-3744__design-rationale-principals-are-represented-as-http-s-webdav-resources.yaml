document: rfc-3744
kind: design-rationale
summary: Principals are represented as http(s) WebDAV resources rather than opaque identifiers so that clients can use PROPFIND to discover human-readable display names and alternate URIs without requiring a separate directory protocol. The DAV:principal-URL property provides a single canonical URL to avoid ambiguity across multiple aliases.
section: "1"
topics:
    - security
