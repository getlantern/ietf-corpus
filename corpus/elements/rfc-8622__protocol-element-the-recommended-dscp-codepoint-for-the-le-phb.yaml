kind: protocol-element
summary: The RECOMMENDED DSCP codepoint for the LE PHB is '000001' (binary), decimal value 1, assigned from DSCP Pool 3 (codepoint space xxxx01) via Standards Action. This replaces the earlier informal practice of using CS1 ('001000') for Lower-Effort traffic.
