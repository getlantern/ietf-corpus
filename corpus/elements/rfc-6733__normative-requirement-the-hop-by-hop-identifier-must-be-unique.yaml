document: rfc-6733
kind: normative-requirement
summary: The Hop-by-Hop Identifier MUST be unique on a given connection at any given time. The sender of an answer MUST copy the Hop-by-Hop Identifier from the corresponding request. An answer received with an unknown Hop-by-Hop Identifier MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
