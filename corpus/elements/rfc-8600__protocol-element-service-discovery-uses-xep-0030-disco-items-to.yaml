document: rfc-8600
kind: protocol-element
summary: Service discovery uses XEP-0030 'disco#items' to enumerate available Topics, and 'disco#info' per Topic to retrieve the pubsub#type field (payload namespace). This allows Platforms to dynamically identify Topics that carry specific data formats such as IODEF.
