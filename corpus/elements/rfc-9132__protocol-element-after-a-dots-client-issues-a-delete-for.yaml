document: rfc-9132
kind: protocol-element
summary: After a DOTS client issues a DELETE for a mitigation request, the DOTS server MAY continue active-but-terminating mitigation for an initial period (default 120 seconds, extendable exponentially up to 300 seconds) to dampen route or DNS flapping; after this period, the DOTS server MUST treat the mitigation as terminated.
section: 4.4.4
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
