document: rfc-3939
kind: design-rationale
summary: New Caller-ID and Caller-Name header fields are introduced rather than manipulating the 'From' field because existing approaches (e.g., storing the number as an RFC 2822 address) require forced translation that loses fidelity. The goal is to store the calling party's information exactly as presented by the telephone system.
section: "1"
