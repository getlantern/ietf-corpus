document: rfc-4570
kind: normative-requirement
summary: For SSM RTP sessions that use an 'incl' source-filter on a multicast address, the SDP description SHOULD also include an 'a=rtcp-unicast' attribute so that RTCP Reception Report packets are sent via unicast rather than multicast.
section: 3.2.1
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
    - multicast
