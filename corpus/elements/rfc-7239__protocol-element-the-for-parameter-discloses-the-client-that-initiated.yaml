document: rfc-7239
kind: protocol-element
summary: The "for" parameter discloses the client that initiated the request and any subsequent proxy identifiers in the chain. In a fully utilized chain, the first "for" value is the originating client, followed by intermediate proxies; the last proxy is not listed but is available as the transport-layer remote IP.
section: "5.2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
