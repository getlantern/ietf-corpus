document: rfc-3860
kind: design-rationale
summary: Source-route mapping (encoding the original address in the local-part and the gateway in the domain part, e.g., 'im:pepp=example.com/fred@relay-domain') is the easiest gateway technique but has a history of operational problems and poor human usability; the underlying software should hide it from end-users where possible.
section: B.2
topics:
    - realtime
