document: rfc-2047
kind: design-rationale
summary: '''Q'' encoding is recommended when most characters are ASCII (preserving readability without decoding), while ''B'' (BASE64) is recommended otherwise. Mandating that readers accept both encodings for any supported charset prevents sender-choice lock-in and interoperability failures.'
