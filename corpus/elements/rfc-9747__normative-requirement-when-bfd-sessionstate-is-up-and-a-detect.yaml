document: rfc-9747
kind: normative-requirement
summary: When bfd.SessionState is Up and a 'Detect Mult' number of Unaffiliated BFD Echo packets have not arrived, the local device MUST set bfd.SessionState to Down and bfd.LocalDiag to 2 (Echo Function Failed), per RFC 5880 Section 6.8.5.
section: "2"
rfc2119_level: MUST
topics:
    - routing
