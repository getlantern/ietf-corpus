document: rfc-9164
kind: security-consideration
summary: Applications using these tags MUST check tag validity (Section 4) before acting on any content and before transforming the tag into a platform-specific representation, since such transformation could conceal validity errors. Validity checking may be done in a generic CBOR library or in the application, but it must happen in one of them.
section: "6"
topics:
    - cbor
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
