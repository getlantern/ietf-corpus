document: rfc-6487
kind: normative-requirement
summary: The Issuer name MUST contain one instance of the CommonName attribute encoded as ASN.1 PrintableString, and MAY contain one instance of the serialNumber attribute. The RPKI does not rely on issuer names being globally unique.
section: "4.4"
rfc2119_level: MUST
topics:
    - pkix
