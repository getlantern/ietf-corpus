document: rfc-3301
kind: protocol-element
summary: The Rx Minimum BPS AVP (Attribute Type 40) encodes the lowest acceptable line speed for an outgoing call in the receive (user-to-LAC) direction, enabling asymmetric ATM bandwidth allocation. It is optional in OCRQ and SHOULD only be included when broadband bearer was indicated.
