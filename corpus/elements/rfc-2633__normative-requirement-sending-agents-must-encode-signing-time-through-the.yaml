document: rfc-2633
kind: normative-requirement
summary: Sending agents MUST encode signing time through the year 2049 as UTCTime; signing times in 2050 or later MUST be encoded as GeneralizedTime. UTCTime year field YY >= 50 is interpreted as 19YY; YY < 50 as 20YY.
section: 2.5.1
rfc2119_level: MUST
topics:
    - email
    - crypto
