document: rfc-6970
kind: security-consideration
summary: IGD:2 access control requirements and authorization levels SHOULD be applied by default; operation on behalf of a third party SHOULD be allowed only if authentication and authorization are used. When only IGD:1 is available, third-party operation SHOULD NOT be allowed.
section: "6"
rfc2119_level: SHOULD
