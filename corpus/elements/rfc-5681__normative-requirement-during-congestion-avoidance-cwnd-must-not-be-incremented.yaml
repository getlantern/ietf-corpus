document: rfc-5681
kind: normative-requirement
summary: During congestion avoidance, cwnd MUST NOT be incremented by more than SMSS bytes per RTT. The RECOMMENDED approach counts acknowledged bytes and increments cwnd by up to SMSS when the count reaches cwnd.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
