document: rfc-7597
kind: protocol-element
summary: Embedded Address (EA) bits in the IPv6 address encode CE-specific IPv4 address and port information. The EA bit field length (o) can be 0 to 48 bits; 0 means no IPv4/port info is embedded, 48 means the complete IPv4 address and a single port are embedded. The sum of the Rule IPv6 Prefix length and Rule EA-bit length MUST be less than or equal to the End-user IPv6 prefix length.
section: "5.2"
topics:
    - ip
    - v6ops
