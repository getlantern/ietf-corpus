document: rfc-8697
kind: security-consideration
summary: A malicious PCEP speaker could spoof associations to load a peer (excessive association creation triggers PCErr responses per Section 6.4), disrupt LSP operations via bogus associations, or exploit association groups to eavesdrop on relationships between LSPs. TLS is recommended to mitigate these threats.
section: "8"
topics:
    - security
    - routing
    - mpls
    - tls
