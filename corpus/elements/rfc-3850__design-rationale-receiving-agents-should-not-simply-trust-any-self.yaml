document: rfc-3850
kind: design-rationale
summary: Receiving agents SHOULD NOT simply trust any self-signed certificate as a valid CA but SHOULD use some other mechanism (e.g., pre-configured trust anchors) to determine CA trustworthiness, since self-signing alone provides no assurance of authority.
section: "2.3"
topics:
    - email
    - pkix
    - security
