document: rfc-3922
kind: normative-requirement
summary: The XMPP 'id' attribute SHOULD NOT be mapped to the MIME Content-ID header because the XMPP 'id' is not a globally-unique identifier; however, if the 'id' is known to be globally unique, it SHOULD be so mapped.
section: 4.1.3
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
