document: rfc-2982
kind: design-rationale
summary: Delta sampling intervals for nested expressions cannot be accurately synchronized. The design guidance is that a lower-level delta interval should be at least twice as fast as a higher-level sampling interval to prevent the higher level from reading the same sample twice.
section: "3"
