document: rfc-7968
kind: interoperability-note
summary: RBridges that understand TREE-VLAN-USE APPsub-TLVs from a peer RBn should use them for building the multicast forwarding table and ignore TREE-USE-IDs and INT-VLAN sub-TLVs from the same RBn for that purpose (though the latter are still used for RPF table construction). If no TREE-VLAN-USE APPsub-TLVs are received from RBn, the conventional RFC 6325 method is used.
section: "4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
