document: rfc-8662
kind: normative-requirement
summary: A node SHOULD advertise its MSD to an external controller so the controller knows the maximum supported label stack depth. Additionally, the node SHOULD advertise the type of the MSD (e.g., transport-only vs. full limit including service and entropy labels) to allow the controller to leave room for locally added labels.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
