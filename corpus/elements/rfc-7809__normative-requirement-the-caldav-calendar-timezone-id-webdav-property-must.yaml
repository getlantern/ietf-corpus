document: rfc-7809
kind: normative-requirement
summary: The CALDAV:calendar-timezone-id WebDAV property MUST be present on all resources that also support the CALDAV:calendar-timezone WebDAV property, and its value MUST match the TZID of the VTIMEZONE component in CALDAV:calendar-timezone. The server MUST accept clients setting either property and MUST adjust the alternate property to reflect changes.
section: 3.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
