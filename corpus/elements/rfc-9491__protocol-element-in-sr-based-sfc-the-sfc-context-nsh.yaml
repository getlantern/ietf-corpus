document: rfc-9491
kind: protocol-element
summary: In SR-based SFC, the SFC context (NSH SPI) is used by an SFF to determine the SR segment list for forwarding to the next-hop SFF. The SFF performs a lookup on the SID associated with the SF — a Prefix-SID for SR-MPLS or an End.NSH SID for SRv6 — to retrieve next-hop context such as the destination MAC address.
section: "4"
