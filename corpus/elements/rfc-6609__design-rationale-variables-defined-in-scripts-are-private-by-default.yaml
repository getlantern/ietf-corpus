document: rfc-6609
kind: design-rationale
summary: Variables defined in scripts are private by default to prevent unintended interactions between script authors who might choose the same variable name. The 'global' command is provided as an explicit opt-in mechanism for sharing state, avoiding implicit global scoping that would make large script collections fragile.
section: "3.4"
