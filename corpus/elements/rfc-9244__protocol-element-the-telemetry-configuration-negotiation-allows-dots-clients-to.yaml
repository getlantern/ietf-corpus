document: rfc-9244
kind: protocol-element
summary: The telemetry configuration negotiation allows DOTS clients to set measurement-interval, measurement-sample, low/mid/high percentile thresholds (defaulting to 10th/50th/90th), unit classes (packets-per-second, bits-per-second, bytes-per-second), telemetry-notify-interval, and whether server-originated telemetry is desired. Servers respond with min/max acceptable values and supported unit classes.
section: "7.1"
topics:
    - security
    - yang
