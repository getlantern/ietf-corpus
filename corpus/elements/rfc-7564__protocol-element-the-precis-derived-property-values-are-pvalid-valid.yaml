document: rfc-7564
kind: protocol-element
summary: 'The PRECIS derived property values are: PVALID (valid in any string class), FREE_PVAL / ID_PVAL (class-specific valid), CONTEXTJ / CONTEXTO (contextual rule required), DISALLOWED (not permitted in any class), and UNASSIGNED (not yet designated in Unicode). These values drive the per-class behavioral rules.'
section: "8"
extracted_by: claude-sonnet-4-6
