document: rfc-4695
kind: normative-requirement
summary: A sender SHOULD NOT create RTP MIDI UDP packets whose size exceeds the MTU of the underlying network. Management tools include the closed-loop sending policy (using RTCP feedback), SysEx segmentation controls, name-space splitting via session tools, and TCP transport.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
