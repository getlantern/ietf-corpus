document: rfc-5761
kind: protocol-element
summary: 'When RTP and RTCP are multiplexed on a single port, demultiplexing uses the second octet of the packet, which in RTP encodes the M bit and payload type (PT), and in RTCP encodes the packet type. Two constraints must hold: PT values used must not conflict with RTCP packet types, and PT+128 must also not conflict.'
section: "4"
topics:
