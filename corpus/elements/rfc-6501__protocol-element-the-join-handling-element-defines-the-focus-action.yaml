summary: 'The <join-handling> element defines the focus action on conference join requests: ''block'' (deny, default), ''confirm'' (place on pending/hold list), ''allow'' (grant access), ''authenticate'' (require username/password), or ''directed-operator'' (direct the user to an operator).'
