summary: 'RIP version 2 message format: 4-octet header (Command 1B, Version 1B, unused 2B) followed by 1–25 route entries of 20 octets each, containing AFI (2B), Route Tag (2B), IP Address (4B), Subnet Mask (4B), Next Hop (4B), and Metric (4B). All fields are big-endian.'
