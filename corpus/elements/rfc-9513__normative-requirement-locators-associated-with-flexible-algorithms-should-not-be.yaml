document: rfc-9513
kind: normative-requirement
summary: Locators associated with Flexible Algorithms SHOULD NOT be advertised in the base OSPFv3 prefix reachability advertisements, because doing so would make the locator available for non-Flexible Algorithm (algorithm 0) forwarding.
section: "5.1"
rfc2119_level: SHOULD NOT
