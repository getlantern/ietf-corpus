document: rfc-3744
kind: protocol-element
summary: DAV:acl is a protected property containing an ordered list of access control entries (ACEs). Each ACE specifies a principal and a set of privileges to be granted or denied. If the DAV:acl property is empty, no principal is granted any privilege.
section: "5.5"
topics:
    - security
