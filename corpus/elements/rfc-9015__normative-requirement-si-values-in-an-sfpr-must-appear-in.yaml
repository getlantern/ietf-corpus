document: rfc-9015
kind: normative-requirement
summary: SI values in an SFPR MUST appear in monotonically decreasing order and MUST NOT appear more than once. Malformed SFPRs MUST be discarded along with any previous instance of the SFPR sharing the same SFPR-RD and SPI.
section: "4.3"
rfc2119_level: MUST
topics:
