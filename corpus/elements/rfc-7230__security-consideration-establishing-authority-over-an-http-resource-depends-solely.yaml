document: rfc-7230
kind: security-consideration
summary: Establishing authority over an HTTP resource depends solely on DNS and TCP control; without TLS, there is no authentication of the origin server. The https scheme with TLS provides the authentication necessary to establish authority securely.
section: "9.1"
topics:
    - http
    - security
    - tls
