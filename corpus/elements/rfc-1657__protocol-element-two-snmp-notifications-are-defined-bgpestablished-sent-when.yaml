summary: 'Two SNMP notifications are defined: bgpEstablished (sent when the BGP FSM enters ESTABLISHED state) and bgpBackwardTransition (sent when the FSM moves from a higher-numbered to a lower-numbered state). Both carry bgpPeerLastError and bgpPeerState as varbinds.'
