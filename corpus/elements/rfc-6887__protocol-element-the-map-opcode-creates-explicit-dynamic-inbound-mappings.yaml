document: rfc-6887
kind: protocol-element
summary: 'The MAP Opcode creates explicit dynamic inbound mappings: external IP address + protocol + port mapped to an internal IP address + port. The MAP-specific payload includes a 96-bit Mapping Nonce (for security and correlation), Protocol (8 bits), Internal Port (16 bits), Suggested External Port (16 bits), and Suggested External IP Address (128 bits).'
