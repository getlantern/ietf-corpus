document: rfc-7540
kind: wire-format
summary: The PING frame (type=0x6) carries exactly 8 octets of opaque data; a sender echoes this data in a PING with the ACK flag set. A PING frame with a length other than 8 octets MUST be treated as a connection error of type FRAME_SIZE_ERROR.
section: "6.7"
topics:
