document: rfc-2373
kind: design-rationale
summary: The 'u' bit is inverted when forming the interface identifier from EUI-64 to make it easy for administrators to hand-configure local-scope identifiers. Without inversion, locally-scoped IDs would need forms like 0200:0:0:1 instead of the simpler ::1, ::2, etc.
section: 2.5.1
topics:
    - ip
    - v6ops
