document: rfc-8575
kind: design-rationale
summary: The concept of a 'PTP instance' (an OC or BC represented by a specific data set operating in exactly one domain) is introduced to clarify how multiple PTP domains are organized within a single device; IEEE Std 1588-2008 subclause 7.1 allows multiple domains but its data set organization was ambiguous. The instance number has no usage within PTP messages.
section: "2.1"
topics:
