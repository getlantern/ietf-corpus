document: rfc-9684
kind: wire-format
summary: BIOS event log entries include event-number (uint32, monotonically increasing), event-type (uint32), pcr-index (0-31), a digest-list with hash-algo and digest pairs, event-size (uint32), and event-data (binary). IMA and netequip_boot log entries use a 64-bit event-number and include ima-template, filename-hint, filedata-hash, hash algorithm fields, template-hash, pcr-index, and optional digital signature.
section: 2.1.1.4
topics:
