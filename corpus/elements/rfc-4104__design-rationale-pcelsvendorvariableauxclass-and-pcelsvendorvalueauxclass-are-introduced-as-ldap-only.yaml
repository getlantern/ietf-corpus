document: rfc-4104
kind: design-rationale
summary: pcelsVendorVariableAuxClass and pcelsVendorValueAuxClass are introduced as LDAP-only constructs not derived from PCIM_EXT, providing a standard extension mechanism for vendor-specific policy variables and values. This avoids the need to modify the information model for proprietary extensions.
section: "4.1"
topics:
    - ldap
