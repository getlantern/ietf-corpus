document: rfc-3591
kind: protocol-element
summary: 'The OTN layered model maps to ifTable entries using three ifType values: opticalChannel(195) for OCh, opticalTransport(196) for the combined OTS/OMS layer, and opticalChannelGroup(219) for the optional OChGroup banded-amplifier layer. Each OTN layer is represented as an IfEntry indexed by ifIndex, with layer relationships maintained in ifStackTable and ifInvStackTable.'
section: "2.1"
