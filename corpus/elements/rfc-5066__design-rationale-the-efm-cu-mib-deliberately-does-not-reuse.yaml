document: rfc-5066
kind: design-rationale
summary: The EFM-CU-MIB deliberately does not reuse HDSL2-SHDSL-LINE-MIB (RFC 4319) objects for 2BASE-TL PMEs, despite underlying SHDSL similarity. The rationale is simplicity, unification of attributes common to both 2BASE-TL and 10PASS-TS PMEs, and name consistency (prefixing with 'efmCuPme2B' instead of 'hdsl2shdsl'). HDSL2-SHDSL-LINE-MIB groups MAY be optionally included for functions not covered by EFM-CU-MIB.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
