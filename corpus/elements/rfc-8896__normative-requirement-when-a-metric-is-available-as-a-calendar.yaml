document: rfc-8896
kind: normative-requirement
summary: When a metric is available as a Calendar array, it also MUST be available as a single value as required by RFC 7285. The Server provides the current value to legacy or non-Calendar-interested Clients.
section: 3.3.2
rfc2119_level: MUST
topics:
