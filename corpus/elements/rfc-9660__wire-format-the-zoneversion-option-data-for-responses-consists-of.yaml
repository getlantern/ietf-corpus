document: rfc-9660
kind: wire-format
summary: 'The ZONEVERSION OPTION-DATA for responses consists of three fields: a 1-octet unsigned LABELCOUNT indicating how many trailing labels of the original QNAME form the zone name, a 1-octet unsigned TYPE distinguishing the version format, and a variable-length opaque VERSION octet string. The query OPTION-DATA is omitted entirely.'
section: "2.1"
topics:
