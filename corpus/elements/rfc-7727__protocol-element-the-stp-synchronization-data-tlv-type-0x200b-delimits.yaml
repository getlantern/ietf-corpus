document: rfc-7727
kind: protocol-element
summary: The STP Synchronization Data TLV (Type=0x200B) delimits the start (S=0) and end (S=1) of a synchronization data set in response to a Synchronization Request. It carries a 2-octet Request Number matching the request; Request Number 0 is used for unsolicited advertisements.
section: "3.6"
topics:
