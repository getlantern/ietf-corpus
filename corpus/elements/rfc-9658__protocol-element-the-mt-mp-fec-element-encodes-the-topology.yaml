summary: The MT MP FEC element encodes the topology scope by using the 'MT IP' or 'MT IPv6' address family in the MP FEC element, with the root node address field extended to include an 8-bit Reserved field, an 8-bit IPA field, and a 16-bit MT-ID field following the IP address.
