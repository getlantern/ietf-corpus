document: rfc-5121
kind: wire-format
summary: IPv6 packets carried over the IP CS are encapsulated by a 6-byte IEEE 802.16 Generic MAC header. An optional CRC covers the header and payload. The actual MAC address is not included in the MAC header; the Len field in the header is 11 bits, giving a total MAC PDU size of 2048 bytes.
section: "4.1"
topics:
    - ip
    - v6ops
