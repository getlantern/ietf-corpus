document: rfc-8622
kind: normative-requirement
summary: A packet forwarded with the LE PHB SHOULD have lower precedence than packets forwarded with the default PHB; in the case of congestion, LE-marked traffic SHOULD be dropped prior to dropping any default PHB traffic.
section: "4"
rfc2119_level: SHOULD
