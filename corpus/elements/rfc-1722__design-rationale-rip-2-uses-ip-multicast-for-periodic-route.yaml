document: rfc-1722
kind: design-rationale
summary: RIP-2 uses IP multicast for periodic route advertisements to reduce load on systems that do not support RIP-2. This also ensures that RIP-1 routers never receive RIP-2 routes, which is desirable when correct route use depends on knowing the precise subnet mask that RIP-1 would ignore.
section: "3.4"
topics:
    - routing
    - multicast
