document: rfc-3212
kind: normative-requirement
summary: The Label Request Message MUST carry the LSPID TLV and MAY carry one or more optional Constraint-based Routing TLVs (CR-TLVs). Optional TLVs MUST be implemented to be compliant with the protocol, though they are optionally carried in messages.
section: "4"
rfc2119_level: MUST
