document: rfc-3830
kind: wire-format
summary: 'The SRTP-ID map info (CS ID map type 0) encodes per-CS: Policy_no_i (8 bits), SSRC_i (32 bits, zero if not yet chosen by Initiator), ROC_i (32 bits rollover counter, 0 if session not started). The Crypto Session ID equals the CS sequence number, not the SSRC value.'
section: 6.1.1
topics:
