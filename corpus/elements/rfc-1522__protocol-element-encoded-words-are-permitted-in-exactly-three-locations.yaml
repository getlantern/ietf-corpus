document: rfc-1522
kind: protocol-element
summary: 'Encoded-words are permitted in exactly three locations: (1) replacing a ''text'' token in Subject, Comments, extension, or X- header fields; (2) within a ''comment'' (wherever ''ctext'' is allowed); (3) as a replacement for a ''word'' within a ''phrase'' (e.g., before an address in From/To/Cc).'
section: "5"
