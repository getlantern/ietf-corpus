document: rfc-8859
kind: interoperability-note
summary: Attributes from RFC 7195 for circuit-switched PSTN bearers (cs-correlation variants) are TBD because RFC 8843 requires the c= line nettype to be "IN", while RFC 7195 defines a "PSTN" nettype. A future specification defining PSTN multiplexing would be needed before assigning categories.
