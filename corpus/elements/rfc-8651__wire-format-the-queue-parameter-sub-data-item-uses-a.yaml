document: rfc-8651
kind: wire-format
summary: 'The Queue Parameter Sub-Data Item uses a 16-bit Sub-Data Item Type (MUST be 1), a variable Length, then a Value containing: Queue Index (8-bit), Queue Size Qn (24-bit unsigned), Num DSCPs Qn (8-bit), and a sequence of DS Fields (8-bit each, DSCP in upper 6 bits, CU bits MUST be zero).'
section: 3.1.1
topics:
