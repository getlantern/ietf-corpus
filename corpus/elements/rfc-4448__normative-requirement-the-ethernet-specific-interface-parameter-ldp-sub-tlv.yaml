document: rfc-4448
kind: normative-requirement
summary: The Ethernet-specific Interface Parameter LDP Sub-TLV MUST be used to validate that the PEs and ingress/egress ports have the necessary capabilities to interoperate. If the ingress PE receives a Requested VLAN ID request it cannot fulfill and the VLAN ID does not match, the PW MUST not be enabled.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
