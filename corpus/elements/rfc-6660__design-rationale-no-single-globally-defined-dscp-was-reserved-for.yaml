document: rfc-6660
kind: design-rationale
summary: No single globally defined DSCP was reserved for PCN because PCN applies to multiple traffic classes, Standards Track DSCPs are scarce, and PCN is a marking behaviour (like ECN) rather than a scheduling behaviour; operators select appropriate existing admission-controlled DSCPs such as EF, CS4, CS3, AF4, or VOICE-ADMIT.
section: Appendix A
topics:
