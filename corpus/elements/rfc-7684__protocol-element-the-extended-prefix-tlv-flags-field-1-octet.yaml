document: rfc-7684
kind: protocol-element
summary: 'The Extended Prefix TLV Flags field (1 octet) defines two flags: A-Flag (0x80, Attach Flag) set by ABRs for inter-area prefixes locally connected or attached in another area, and N-Flag (0x40, Node Flag) indicating the prefix identifies the advertising router (typically a loopback host prefix).'
section: "2.1"
topics:
