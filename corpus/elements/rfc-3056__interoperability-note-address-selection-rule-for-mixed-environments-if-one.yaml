document: rfc-3056
kind: interoperability-note
summary: 'Address selection rule for mixed environments: if one host has only a 6to4 address and the other has both 6to4 and native IPv6, the 6to4 address should be used for both. If both have both types, the default should be native IPv6, but the choice should be configurable.'
section: "2.1"
topics:
    - ip
    - v6ops
