document: rfc-2893
kind: normative-requirement
summary: For bidirectional configured tunnels, the node MUST accept and respond to NUD probe packets and SHOULD send NUD probes to detect tunnel failure. Neighbor Discovery packets on tunnel links SHOULD NOT include SLLA or TLLA options, and any received SLLA/TLLA options MUST be silently ignored.
section: "3.8"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
