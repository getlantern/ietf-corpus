document: rfc-5655
kind: protocol-element
summary: The sessionScope Information Element (ElementId referenced in Section 8.2.18) provides session-level scoping for Options Templates; its presence as scope signifies that options apply to the containing Transport Session. Its value MUST be written as 0 and MUST be ignored by readers.
section: 8.2.18
topics:
