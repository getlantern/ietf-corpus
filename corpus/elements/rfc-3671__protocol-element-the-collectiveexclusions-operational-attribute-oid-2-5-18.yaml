summary: The collectiveExclusions operational attribute (OID 2.5.18.7) uses objectIdentifierMatch equality and OID syntax. When the OID 2.5.18.0 (excludeAllCollectiveAttributes) is present as a value, all collective attributes are excluded from the entry.
