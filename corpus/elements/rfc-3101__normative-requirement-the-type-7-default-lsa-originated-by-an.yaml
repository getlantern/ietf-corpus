document: rfc-3101
kind: normative-requirement
summary: The Type-7 default LSA originated by an NSSA border router MUST have the P-bit clear; it is never translated into a Type-5 LSA. A Type-7 default LSA may only be installed by NSSA border routers if and only if its P-bit is set.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
