document: rfc-6603
kind: state-machine
summary: 'Delegating Router Solicitation flow: Requesting Router sends Solicit with OPTION_ORO containing OPTION_PD_EXCLUDE → Delegating Router includes OPTION_PD_EXCLUDE in Advertise → Requesting Router proceeds to Request/Reply exchange (Section 6.1). If Advertise omits OPTION_PD_EXCLUDE, Requesting Router falls back to RFC 3633 standard flow.'
