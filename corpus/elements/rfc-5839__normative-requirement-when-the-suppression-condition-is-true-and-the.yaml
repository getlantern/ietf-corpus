document: rfc-5839
kind: normative-requirement
summary: When the suppression condition is true and the SUBSCRIBE is sent within an established dialog, the notifier MUST suppress the resulting NOTIFY request and generate a 204 (No Notification) response. Notifiers MUST NOT suppress a NOTIFY unless the SUBSCRIBE was sent in an established dialog.
section: "6.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
