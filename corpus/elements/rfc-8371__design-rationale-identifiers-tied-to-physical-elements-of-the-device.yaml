document: rfc-8371
kind: design-rationale
summary: Identifiers tied to physical elements of the device (e.g., MAC address) help in deployment of Mobile IP because in many cases they are the most natural means for uniquely identifying the device and avoid additional lookup steps that might be needed if other identifiers were used.
