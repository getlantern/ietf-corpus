document: rfc-5810
kind: wire-format
summary: 'The 32-bit ForCES ID uses a 2-bit Type Switch (TS): 0b00 for FE IDs (0x00000000–0x3FFFFFFF), 0b01 for CE IDs (0x40000000–0x7FFFFFFF), 0b11 for multicast IDs, with reserved ranges and special broadcast addresses 0xFFFFFFFD (all CEs), 0xFFFFFFFE (all FEs), and 0xFFFFFFFF (entire NE).'
section: "6.1"
