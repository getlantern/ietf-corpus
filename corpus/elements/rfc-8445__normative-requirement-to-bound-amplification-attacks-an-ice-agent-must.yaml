document: rfc-8445
kind: normative-requirement
summary: To bound amplification attacks, an ICE agent MUST limit the total number of candidate pairs across all checklists. The default limit is 100 but MUST be configurable. Excess lower-priority pairs are discarded, distributed evenly across checklists.
section: 6.1.2.5
rfc2119_level: MUST
topics:
    - nat
    - security
    - webrtc
