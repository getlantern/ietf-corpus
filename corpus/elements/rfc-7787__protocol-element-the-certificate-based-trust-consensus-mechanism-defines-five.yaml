document: rfc-7787
kind: protocol-element
summary: 'The certificate-based trust consensus mechanism defines five verdicts in ascending priority: Neutral (0), Cached Trust (1), Cached Distrust (2), Configured Trust (3), Configured Distrust (4). The effective trust verdict for a certificate is the highest-priority verdict announced by any node in the DNCP network for that certificate.'
section: 8.3.1
topics:
    - security
    - pkix
