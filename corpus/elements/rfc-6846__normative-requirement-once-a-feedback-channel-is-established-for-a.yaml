document: rfc-6846
kind: normative-requirement
summary: Once a feedback channel is established for a context, the decompressor is REQUIRED to continue sending NACKs or STATIC-NACKs for as long as the context is associated with profile 0x0006, following the state-specific feedback logic defined in Section 5.3.1.
section: 5.3.2
rfc2119_level: REQUIRED
