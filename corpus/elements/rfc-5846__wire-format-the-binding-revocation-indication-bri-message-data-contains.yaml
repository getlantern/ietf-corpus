document: rfc-5846
kind: wire-format
summary: 'The Binding Revocation Indication (BRI) message data contains: Binding Revocation Type (8-bit, value 1), Revocation Trigger (8-bit), Sequence Number (16-bit unsigned), flags P (Proxy Binding), V (IPv4 HoA Binding Only), G (Global) each 1-bit, Reserved bits, and variable-length TLV-encoded Mobility Options. If no options are present, 4 octets of padding are required and Header Len is set to 1.'
section: "5.1"
topics:
