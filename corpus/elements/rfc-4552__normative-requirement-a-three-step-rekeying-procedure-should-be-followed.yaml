document: rfc-4552
kind: normative-requirement
summary: 'A three-step rekeying procedure SHOULD be followed: (1) create additional inbound SA with new SPI/key on all routers, (2) replace outbound SA atomically on all routers, (3) remove original inbound SA on all routers. All routers must complete each step before any begin the next.'
section: "10.1"
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
    - routing
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
