document: rfc-2575
kind: protocol-element
summary: A ViewTreeFamily pairs a family name (OBJECT IDENTIFIER) with a family mask (bit string). Each bit of the mask corresponds to an OID sub-identifier; a 0 bit is a wildcard matching any sub-identifier value, while a 1 bit requires an exact match. This allows a single entry to represent a family of subtrees such as all columns in a conceptual row.
section: 2.4.2
topics:
