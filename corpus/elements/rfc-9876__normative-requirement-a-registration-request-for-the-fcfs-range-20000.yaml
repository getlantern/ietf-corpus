document: rfc-9876
kind: normative-requirement
summary: A registration request for the FCFS range (20000-32999) must consist solely of a registered Media Type name in the Content Type field, without any parameter names or Content Coding, and the Media Type must not have been used in this registry yet.
section: "4.1"
rfc2119_level: MUST
topics:
    - registry
