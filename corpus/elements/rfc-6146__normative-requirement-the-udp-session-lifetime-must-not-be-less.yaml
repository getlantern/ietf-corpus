document: rfc-6146
kind: normative-requirement
summary: The UDP session lifetime MUST NOT be less than UDP_MIN. The default SHOULD be at least UDP_DEFAULT and MAY be configurable. These constraints apply to sessions created in both the IPv6→IPv4 and IPv4→IPv6 directions.
section: 3.5.1
rfc2119_level: MUST NOT
topics:
    - nat
    - udp
