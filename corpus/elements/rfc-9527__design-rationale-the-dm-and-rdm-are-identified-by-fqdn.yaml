document: rfc-9527
kind: design-rationale
summary: The DM and RDM are identified by FQDN rather than IP address because an FQDN is smaller (avoids listing both IPv4 and IPv6), is a more stable identifier, and can serve as a pointer to additional future metadata needed to establish the HNA-to-DM channel.
section: "4.2"
topics:
    - dns
