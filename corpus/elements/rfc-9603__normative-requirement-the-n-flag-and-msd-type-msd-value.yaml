document: rfc-9603
kind: normative-requirement
summary: The N flag and (MSD-Type,MSD-Value) pair in the SRv6-PCE-CAPABILITY sub-TLV MUST be set to zero and MUST NOT be present in an Open message sent to a PCC; a PCC MUST ignore flags and any (MSD-Type,MSD-Value) pair received in an Open message.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
