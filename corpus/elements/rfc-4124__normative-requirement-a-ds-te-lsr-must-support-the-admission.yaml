document: rfc-4124
kind: normative-requirement
summary: 'A DS-TE LSR MUST support the admission control rule: an LSP of bandwidth B, setup priority p, and Class-Type CTc is admissible on a link if and only if B <= Unreserved Bandwidth for TE-Class[i], where TE-Class[i] maps to <CTc, p>.'
section: "11.2"
rfc2119_level: MUST
topics:
    - mpls
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
