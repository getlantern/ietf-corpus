document: rfc-6960
kind: protocol-element
summary: The CRL References extension (id-pkix-ocsp-crl, OID { id-pkix-ocsp 3 }) allows a responder to indicate the CRL on which a revoked or onHold certificate appears, using CrlID containing optional crlUrl (IA5String), crlNum (INTEGER), and crlTime (GeneralizedTime) as singleExtensions.
