document: rfc-7481
kind: security-consideration
summary: RDAP is susceptible to code injection attacks (SQL injection, shell injection, HTML-script injection, etc.). Data confidentiality and integrity services provide a measure of defense against man-in-the-middle injection attacks, but vulnerabilities in client- and server-side software can still allow injection to succeed.
