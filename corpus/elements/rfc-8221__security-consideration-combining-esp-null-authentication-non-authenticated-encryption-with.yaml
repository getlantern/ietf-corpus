document: rfc-8221
kind: security-consideration
summary: Combining ESP NULL authentication (non-authenticated encryption) with AH is NOT RECOMMENDED; certain configurations have been shown to be insecure per Paterson and Degabriele (2010). AUTH_NONE cannot be combined with ESP NULL encryption.
