document: rfc-8320
kind: normative-requirement
summary: An LSR advertising MRT Capability MUST recognize the Rainbow MRT MT-ID and associate the advertised label for a specific prefix with the MRT-Red and MRT-Blue MT-IDs associated with all MRT Profiles that advertise LDP as the forwarding mechanism.
section: 5.1.1
rfc2119_level: MUST
topics:
