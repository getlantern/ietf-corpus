document: rfc-4292
kind: interoperability-note
summary: If the combined total of octets or sub-identifiers in inetCidrRouteDest, inetCidrRoutePolicy, and inetCidrRouteNextHop exceeds 111, column instance OIDs will have more than 128 sub-identifiers and cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
