document: rfc-9089
kind: normative-requirement
summary: For OSPFv3, the ELC Flag in the AS-External-LSA, NSSA-LSA, or External-Prefix TLV generated by an ASBR MUST be the same as the value of the ELC Flag associated with the prefix in the source domain.
section: "3.2"
rfc2119_level: MUST
