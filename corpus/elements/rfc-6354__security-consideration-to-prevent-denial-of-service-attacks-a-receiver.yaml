document: rfc-6354
kind: security-consideration
summary: To prevent denial-of-service attacks, a receiver SHOULD be prepared to ignore a 'forwardshift' parameter declaration if it considers the offset value excessive. In such a case, the receiver SHOULD also ignore the redundant stream in the resultant RTP session.
section: "8"
rfc2119_level: SHOULD
topics:
