document: rfc-9171
kind: protocol-element
summary: 'Bundle Processing Control Flags are conveyed in the primary block as a CBOR unsigned integer bit field. Key bits include: bit 0 (bundle is a fragment), bit 1 (ADU is administrative record), bit 2 (must not be fragmented), bit 5 (acknowledgement requested), bits 14/16/17/18 (request status reports for reception/forwarding/delivery/deletion).'
section: 4.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
