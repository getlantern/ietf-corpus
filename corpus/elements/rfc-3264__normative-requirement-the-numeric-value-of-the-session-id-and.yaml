document: rfc-3264
kind: normative-requirement
summary: The numeric value of the session ID and version in the o= line MUST be representable with a 64-bit signed integer. The initial value of the version MUST be less than (2**62)-1 to avoid rollovers.
section: "5"
rfc2119_level: MUST
topics:
    - realtime
    - sip
