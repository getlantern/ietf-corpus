document: rfc-7470
kind: security-consideration
summary: The security considerations of RFC 5440 apply unchanged, as the extensions defined in RFC 7470 do not substantially change the nature of PCEP. The Vendor Information object and TLV may provide a vector for message-bloat attacks; authentication and integrity procedures from RFC 5440 should be used to mitigate this risk.
section: "7"
topics:
    - routing
    - security
