document: rfc-4256
kind: security-consideration
summary: The number of client-server exchanges to complete authentication may be variable, and an observer could gain information by counting exchanges. For example, an observer may infer that a user's password has expired and potentially determine the site's password expiration policy.
section: "6"
topics:
    - security
    - privacy
