document: rfc-6066
kind: wire-format
summary: 'The server_name extension_data field contains a ServerNameList: a list of ServerName structs, each with a NameType (1 byte) and a variable-length HostName (opaque, 1..2^16-1 bytes). Currently only host_name(0) is defined; HostName is an ASCII-encoded DNS hostname without trailing dot.'
