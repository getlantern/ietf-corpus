document: rfc-1349
kind: wire-format
summary: 'The Type of Service octet in the IP header consists of three fields: a 3-bit PRECEDENCE field (bits 0-2), a 4-bit TOS field (bits 3-6), and a 1-bit MBZ (must be zero) field (bit 7). This memo redefines the TOS field as four bits wide, resolving a conflict between RFC-791 (3 bits) and RFC-1122 (5 bits).'
section: "3"
topics:
