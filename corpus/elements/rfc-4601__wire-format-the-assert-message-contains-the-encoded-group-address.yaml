document: rfc-4601
kind: wire-format
summary: The Assert message contains the encoded group address (variable), encoded source address (variable), an R (RPT-bit) flag in bit 31 of the next word, metric preference (31 bits), and metric (32 bits). The R bit distinguishes (*,G) Asserts (R=1) from (S,G) Asserts (R=0); lower preference and metric values win.
section: 4.9.6
topics:
    - multicast
    - routing
