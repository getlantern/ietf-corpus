document: rfc-7759
kind: wire-format
summary: The Source MEP-ID Sub-TLV (sub-type 400, Length 8) encodes a 32-bit Source Node ID (per RFC 6370), a 16-bit Tunnel ID, and a 16-bit LSP ID, identifying the ingress MEP originating the OAM configuration. ITU-T IDs are explicitly out of scope.
