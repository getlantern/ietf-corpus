document: rfc-4805
kind: normative-requirement
summary: dsx1LineIndex should be made equal to ifIndex to allow proper use of the ifStackTable and ds0/ds0bundle MIBs. A device directly associated with one DS1 interface should have dsx1LineIndex equal to ifIndex; otherwise unique identifiers greater than ifNumber are used.
section: "4"
rfc2119_level: SHOULD
topics:
    - snmp
