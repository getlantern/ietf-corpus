document: rfc-9173
kind: normative-requirement
summary: The pairing of a per-invocation IV and a security key in BCB-AES-GCM MUST be unique; a per-invocation IV MUST NOT be used with a security key more than once. Reuse makes the GCM implementation vulnerable to forgery attacks with catastrophic security consequences.
section: "4.6"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
