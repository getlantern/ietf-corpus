document: rfc-7002
kind: protocol-element
summary: SDP signaling uses the 'rtcp-xr' attribute with the parameter value 'pkt-discard-count' (ABNF token 'xr-pdc-block') to signal use of the Discard Count Metrics Block. XR blocks MAY also be used without prior SDP signaling.
