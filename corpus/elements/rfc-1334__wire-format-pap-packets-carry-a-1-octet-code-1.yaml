document: rfc-1334
kind: wire-format
summary: PAP packets carry a 1-octet Code (1=Authenticate-Request, 2=Authenticate-Ack, 3=Authenticate-Nak), 1-octet Identifier, 2-octet Length, and variable Data field. Octets beyond the Length field are treated as Data Link Layer padding.
