document: rfc-3635
kind: normative-requirement
summary: The IF-MIB octet counters ifInOctets, ifOutOctets, ifHCInOctets, and ifHCOutOctets MUST include all octets in valid frames including MAC header and FCS, but not the preamble, start of frame delimiter, or extension octets.
section: 3.2.5
rfc2119_level: MUST
