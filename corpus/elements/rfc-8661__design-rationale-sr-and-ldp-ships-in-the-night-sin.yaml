document: rfc-8661
kind: design-rationale
summary: SR and LDP Ships-in-the-Night (SIN) coexistence is possible because label uniqueness is guaranteed by the label manager's static allocation capability, which has existed across vendors for years and is not new—the same mechanism used by MPLS-TP. Each MCC's incoming labels are distinct, so multiple MPLS forwarding entries for the same prefix can coexist.
section: "2"
topics:
