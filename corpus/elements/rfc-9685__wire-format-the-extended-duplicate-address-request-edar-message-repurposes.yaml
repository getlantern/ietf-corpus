document: rfc-9685
kind: wire-format
summary: The Extended Duplicate Address Request (EDAR) message repurposes the previously reserved Status field as a Flags field, placing the 2-bit P-Field at bit positions 0–1 and 6-bit Reserved (MUST be 0) at positions 2–7. The remaining TID, Registration Lifetime, ROVR, and Registered Address fields are unchanged.
