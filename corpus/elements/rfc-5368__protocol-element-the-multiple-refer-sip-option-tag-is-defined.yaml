document: rfc-5368
kind: protocol-element
summary: The 'multiple-refer' SIP option-tag is defined for use in Require and Supported header fields. A UA including it in a Supported header indicates compliance with this specification; a UA generating a REFER with a URI-list pointer in Refer-To MUST include it in the Require header.
section: "4"
topics:
