document: rfc-9240
kind: wire-format
summary: 'Entity identifiers follow the format: EntityID ::= EntityDomainName '':'' DomainTypeSpecificEntityID. Examples include ''ipv4:192.0.2.14'', ''net1.ipv6:2001:db8::12'', ''net1.ipv4:192.0.2.0/26'', and ''netmap2.pid:mypid10''. Two textually different representations may refer to the same entity (e.g., IPv6 canonicalization per RFC 5952).'
section: 5.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
