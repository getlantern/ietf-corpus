document: rfc-5798
kind: security-consideration
summary: VRRP provides no confidentiality, which is acceptable since VRRP messages contain no information requiring secrecy. For IPv6 deployments, VRRP is compatible with SEND 'trust anchor' and 'trust anchor or cga' modes, requiring Master and Backup to share the same prefix delegation in certificates.
section: "9"
topics:
