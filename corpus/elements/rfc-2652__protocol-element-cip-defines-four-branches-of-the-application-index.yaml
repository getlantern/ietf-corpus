document: rfc-2652
kind: protocol-element
summary: 'CIP defines four branches of the application/index MIME type tree: application/index.cmd.<command> for commands, application/index.response for responses, application/index.obj.<type> for index objects, and application/index.vnd.<xxx> for vendor extensions. Type names are case-insensitive for comparison but limited to 1–20 characters from [a-zA-Z0-9-].'
section: 2.1.1
topics:
