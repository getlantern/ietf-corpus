document: rfc-9719
kind: interoperability-note
summary: 'The ietf-rift module imports seven external YANG modules: ietf-inet-types and ietf-yang-types (RFC 6991), ietf-routing (RFC 8349), ietf-interfaces (RFC 8343), ietf-routing-types and iana-routing-types (RFC 8294), and ietf-key-chain (RFC 8177). Conforming implementations must support all imported modules.'
section: "1.4"
topics:
    - yang
    - routing
