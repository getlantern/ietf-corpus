document: rfc-8798
kind: protocol-element
summary: Secondary units are converted to their corresponding SenML primary unit by multiplying the value by the Scale number and then adding the Offset, yielding the value in the given SenML unit. For example, 100 ms × (1/1000) + 0 = 0.1 s; 10 dBm × 1 + (−30) = −20 dBW.
section: "3"
