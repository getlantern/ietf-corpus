document: rfc-7442
kind: normative-requirement
summary: 'In Mechanism 2, an LSR that creates (S,G) state from receiving an mLDP Label Map with the Transit IPv4/IPv6 Source TLV MUST originate a Source Active auto-discovery route if: S is reachable via an IP-multicast-capable interface, G is in PIM-SM ASM mode range, and the LSR does not have (*,G) state with an IP-multicast-capable interface as the incoming interface.'
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
