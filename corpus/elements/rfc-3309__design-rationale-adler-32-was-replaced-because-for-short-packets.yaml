document: rfc-3309
kind: design-rationale
summary: Adler-32 was replaced because for short packets (e.g., 128 bytes) the s1 accumulator never wraps modulo 65521, causing the checksum distribution to cluster around a hot-spot rather than spreading uniformly across available bits. SCTP's primary use as a signaling transport with packets typically under 128 bytes made this weakness especially critical.
section: "1"
topics:
    - sctp
    - security
