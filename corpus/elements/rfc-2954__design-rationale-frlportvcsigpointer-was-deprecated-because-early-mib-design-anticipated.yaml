document: rfc-2954
kind: design-rationale
summary: frLportVCSigPointer was deprecated because early MIB design anticipated multiple signaling-protocol-specific tables, but the final design uses a single table (frMgtVCSigTable) covering all signaling protocols. The pointer object is retained as deprecated rather than removed to avoid breaking existing implementations.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
