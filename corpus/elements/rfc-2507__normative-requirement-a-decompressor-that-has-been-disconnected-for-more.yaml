document: rfc-2507
kind: normative-requirement
summary: A decompressor that has been disconnected for more than MIN_WRAP seconds MUST wait for the next full header before decompressing non-TCP compressed headers. A compressor MUST wait at least MIN_WRAP seconds after booting before compressing non-TCP headers.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
