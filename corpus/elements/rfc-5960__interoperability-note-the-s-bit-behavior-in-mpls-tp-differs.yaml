document: rfc-5960
kind: interoperability-note
summary: 'The S-bit behavior in MPLS-TP differs slightly from RFC 3032: RFC 3032 uses the S bit to signal the transition from MPLS to network-layer processing, but MPLS-TP requires exactly one S=1 entry even when the payload is itself an MPLS-labeled packet (e.g., a PW or nested LSP).'
section: 3.1.2
topics:
    - mpls
