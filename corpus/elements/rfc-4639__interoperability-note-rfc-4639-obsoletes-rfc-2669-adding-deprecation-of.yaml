document: rfc-4639
kind: interoperability-note
summary: RFC 4639 obsoletes RFC 2669, adding deprecation of docsDevFilter and docsDevCpeGroup in favor of DiffServ MIB and InetAddress-based groups, adding SNMPv3/RFC 3584 coexistence support, and updating software download to support both TFTP and HTTP.
