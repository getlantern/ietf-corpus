document: rfc-4861
kind: wire-format
summary: The Prefix Information option (Type 3, Length 4, 32 bytes total) carries Prefix Length (8-bit), L flag (on-link), A flag (autonomous address configuration), Valid Lifetime (32-bit, seconds), Preferred Lifetime (32-bit, seconds), Reserved2 (32-bit), and Prefix (128-bit). Preferred Lifetime MUST NOT exceed Valid Lifetime.
