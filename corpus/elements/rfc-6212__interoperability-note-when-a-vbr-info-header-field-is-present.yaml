document: rfc-6212
kind: interoperability-note
summary: When a VBR-Info header field is present, 'header.md' is typically taken from the 'md' tag and 'header.mv' from one of the 'mv' tag values; however, VBR permits alternative subject-domain and voucher-selection mechanisms that may override or ignore the VBR-Info field entirely.
