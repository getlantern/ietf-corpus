document: rfc-7788
kind: design-rationale
summary: IPv4 addresses and prefixes are encoded using IPv4-mapped IPv6 address format (RFC 4291) in all HNCP TLVs, with IPv4 prefix lengths increased by 96. This allows a single TLV format to handle both IPv4 and IPv6 without requiring duplicate field definitions for the dual-stack case.
section: "10"
