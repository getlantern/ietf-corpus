document: rfc-8377
kind: protocol-element
summary: TRILL switch nicknames are common across all topologies. Nickname allocation uses only Nickname sub-TLVs in Router Capabilities TLVs (#242), ignoring those in MT Router Capability TLVs (#144) for allocation purposes. However, Nickname sub-TLVs in non-zero topology MT Router Capability TLVs do affect distribution tree root selection.
section: "3.2"
topics:
    - routing
