document: rfc-2086
kind: security-consideration
summary: An implementation must ensure that ACL commands do not reveal information about mailboxes with appropriately restricted ACLs. For example, a GETACL command on a mailbox for which the user has insufficient rights should not admit the mailbox exists, much less return its ACL.
section: "8"
topics:
    - security
