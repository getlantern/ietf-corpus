document: rfc-5854
kind: normative-requirement
summary: Each unique file described in a Metalink Document MUST have its own metalink:file element. metalink:file elements MUST contain at least one metalink:url element or at least one metalink:metaurl element.
section: 4.1.2
rfc2119_level: MUST
