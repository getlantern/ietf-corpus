document: rfc-5891
kind: normative-requirement
summary: 'Labels MUST be compared using equivalent forms: either both A-label or both U-label. A-labels MUST be compared as case-insensitive ASCII; U-labels MUST be compared as-is, without case folding.'
section: "3.1"
rfc2119_level: MUST
