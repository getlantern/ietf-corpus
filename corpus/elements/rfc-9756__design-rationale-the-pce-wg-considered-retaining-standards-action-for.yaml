document: rfc-9756
kind: design-rationale
summary: The PCE WG considered retaining Standards Action for some registries such as flag fields with limited bit space, but decided against it. The Working Group Last Call and IETF Last Call processes are deemed sufficient to prevent frivolous experiments from consuming scarce codepoints, and a new registry can always be created if needed.
