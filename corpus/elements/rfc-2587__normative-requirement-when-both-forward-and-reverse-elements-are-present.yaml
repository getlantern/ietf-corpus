document: rfc-2587
kind: normative-requirement
summary: When both forward and reverse elements are present in a single crossCertificatePair value, the issuer name in one certificate shall match the subject name in the other and vice versa, and each certificate's public key shall be capable of verifying the other's digital signature.
section: "3.2"
rfc2119_level: REQUIRED
