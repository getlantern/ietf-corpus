document: rfc-3332
kind: protocol-element
summary: The Management (MGMT) message class contains Error (ERR, type 0) and Notify (NTFY, type 1) messages, used to report protocol errors and state change notifications respectively. ERR carries an Error Code parameter; NTFY carries a Status parameter. Both trigger M-ERROR and M-NOTIFY indications to Layer Management.
section: "3.8"
