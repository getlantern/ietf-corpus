document: rfc-1532
kind: normative-requirement
summary: A relay agent MUST use the same destination (or set of destinations) for all BOOTREQUEST messages it relays from a given client. Round-robin load-balancing across servers is prohibited because it breaks multi-exchange protocols like DHCP.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ip
