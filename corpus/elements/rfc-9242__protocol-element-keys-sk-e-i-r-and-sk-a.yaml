document: rfc-9242
kind: protocol-element
summary: Keys SK_e[i/r] and SK_a[i/r] protecting IKE_INTERMEDIATE messages are computed per RFC 7296 Section 2.14. Each exchange uses the most recently calculated keys; updated keys from a prior IKE_INTERMEDIATE exchange (e.g., after additional key exchange) carry forward to the next exchange.
section: 3.3.1
topics:
