document: rfc-7503
kind: interoperability-note
summary: An identical HelloInterval and RouterDeadInterval is still required to form an adjacency with an OSPFv3 router not supporting autoconfiguration per RFC 5340. The HelloInterval flexibility in Section 3 applies only when both sides support autoconfiguration.
section: "2"
topics:
    - routing
