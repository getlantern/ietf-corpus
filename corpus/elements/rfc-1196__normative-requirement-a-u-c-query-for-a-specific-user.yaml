document: rfc-1196
kind: normative-requirement
summary: A {U}{C} query for a specific user MUST return at least the user's full name. If the user is logged in, at least as much information as returned by {C} for that user MUST also be returned. Additional information such as home phone, login status, and a user information file SHOULD be configurable.
section: 2.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
