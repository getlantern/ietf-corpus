document: rfc-9844
kind: security-consideration
summary: Zone identifiers are of local significance only and MUST NOT be sent on the wire. Software that obtains a zone identifier through a UI should not transmit it further, as RFC 4007 indicates software should not trust packets containing textual non-global addresses as data.
section: "6"
topics:
    - ip
    - security
    - v6ops
