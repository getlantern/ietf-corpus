document: rfc-6361
kind: normative-requirement
summary: TNCP packets MUST NOT be exchanged until PPP has reached the Network-Layer Protocol phase. Any TNCP packets received when not in that phase MUST be silently ignored.
section: "2"
rfc2119_level: MUST NOT
