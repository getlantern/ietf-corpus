summary: RFC 8158 creates the 'NAT Quota Exceeded Event Type' registry for the natQuotaExceededEvent IE (ID 466), with initial values 0-5. It also creates the 'NAT Threshold Event Type' registry for natThresholdEvent IE (ID 467), with initial values 0-5. Both registries use Expert Review for new assignments.
