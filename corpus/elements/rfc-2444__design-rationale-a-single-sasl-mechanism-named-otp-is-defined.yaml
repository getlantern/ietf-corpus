document: rfc-2444
kind: design-rationale
summary: A single SASL mechanism named OTP is defined rather than separate per-algorithm mechanisms, with algorithm negotiated via the challenge. This simplifies integration while the restriction of one hash algorithm per user ensures client-server compatibility.
