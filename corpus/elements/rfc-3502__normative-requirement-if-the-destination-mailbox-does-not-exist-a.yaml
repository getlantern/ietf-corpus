document: rfc-3502
kind: normative-requirement
summary: If the destination mailbox does not exist, a server MUST return an error and MUST NOT automatically create the mailbox. Unless it is certain the mailbox cannot be created, the server MUST send the response code "[TRYCREATE]" as the prefix of the tagged NO response.
section: 6.3.11
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
