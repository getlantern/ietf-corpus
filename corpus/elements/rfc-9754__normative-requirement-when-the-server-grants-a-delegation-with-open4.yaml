document: rfc-9754
kind: normative-requirement
summary: When the server grants a delegation with OPEN4_SHARE_ACCESS_WANT_DELEG_TIMESTAMPS, it MUST query the client via CB_GETATTR for fattr4_time_deleg_access and fattr4_time_deleg_modify. The change time can be derived from the modify time.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
