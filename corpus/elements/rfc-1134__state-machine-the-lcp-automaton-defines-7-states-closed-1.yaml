document: rfc-1134
kind: state-machine
summary: 'The LCP automaton defines 7 states: Closed (1), Listen (2), Req-Sent (3), Ack-Rcvd (4), Ack-Sent (5), Open (6), Closing (7). Transitions are triggered by events including Active-Open, Passive-Open, Close, Timeout, Physical-Layer-Down, and receipt of Configure-Request/Ack/Nak, Terminate-Request/Ack, Code-Reject, Unknown-Code, and Echo-Request packets.'
section: 4.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
