document: rfc-7171
kind: interoperability-note
summary: PT-EAP is designed to work with the NEA reference model defined in RFC 5209. The Trusted Computing Group (TCG) stated its intent to replace existing posture transport protocols with new versions equivalent to and interoperable with the NEA specifications.
