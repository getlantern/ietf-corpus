document: rfc-4951
kind: normative-requirement
summary: An LCCE MUST follow L2TPv2 or L2TPv3 procedures to establish a recovery tunnel, and the recovery tunnel MUST use the same L2TP version and establishment procedures that were used for the old tunnel being recovered.
section: 3.2.1
rfc2119_level: MUST
