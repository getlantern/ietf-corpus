document: rfc-2402
kind: protocol-element
summary: In transport mode, AH is inserted after the IP header (and any options) and before the upper-layer protocol. In tunnel mode, AH follows the outer IP header and protects the entire inner IP packet including its header. When AH is implemented in a security gateway protecting transit traffic, tunnel mode MUST be used.
section: "3.1"
topics:
    - ipsec
    - security
    - ip
