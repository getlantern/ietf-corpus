document: rfc-2355
kind: normative-requirement
summary: The SEQ-NUMBER field must be sent in network byte order (big endian), and any byte containing 0xff must be doubled to 0xffff before sending and stripped back to 0xff upon receipt, following standard IAC escaping rules.
section: 8.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
