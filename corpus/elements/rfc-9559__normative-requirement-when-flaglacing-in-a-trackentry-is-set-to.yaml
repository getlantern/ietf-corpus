document: rfc-9559
kind: normative-requirement
summary: When FlagLacing in a TrackEntry is set to 0, all blocks in that track MUST have their lacing flags set to "no lacing". This allows readers to skip lacing parsing for tracks where it is never used.
section: 5.1.4.1.12
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
