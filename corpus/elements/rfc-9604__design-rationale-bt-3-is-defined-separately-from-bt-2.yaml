document: rfc-9604
kind: design-rationale
summary: BT=3 is defined separately from BT=2 to allow the sender to explicitly convey SRv6 Endpoint Behavior and SID Structure. With BT=2 the receiver interprets these per local policy, which reduces control; BT=3 gives the PCE or PCC full visibility and control over locator block/node/function/argument boundaries.
section: "5"
