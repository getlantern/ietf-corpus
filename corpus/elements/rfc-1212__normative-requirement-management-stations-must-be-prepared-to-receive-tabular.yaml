document: rfc-1212
kind: normative-requirement
summary: Management stations must be prepared to receive tabular information from agents that corresponds to entries not currently in use (invalidated rows). Proper interpretation requires examination of the relevant status columnar object, since agent removal of invalidated entries is implementation-specific.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
