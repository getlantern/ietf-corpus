document: rfc-4103
kind: design-rationale
summary: Text/t140 is specified as a separate RTP session dedicated to text, not shared with other media. This enables uniform media-level functions such as routing, device selection, transcoding invocation, and QoS parameter selection that depend on each medium being explicitly identified.
section: "3.1"
topics:
