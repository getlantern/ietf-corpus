document: rfc-8662
kind: interoperability-note
summary: Because ELI/EL insertion is performed solely by the ingress node, different ingress nodes using different placement criteria do not cause an interoperability issue. However, from a network design and operations perspective, it is preferable for all ingress routers to use the same criteria.
section: "7.2"
topics:
    - routing
