document: rfc-3911
kind: normative-requirement
summary: UAs which support the Join header MUST include the "join" option tag in a Supported header field. UAs that want explicit failure notification if Join is not supported MAY include the "join" option in a Require header field.
section: "7.2"
rfc2119_level: MUST
topics:
