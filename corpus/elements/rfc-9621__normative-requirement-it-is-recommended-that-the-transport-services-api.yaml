document: rfc-9621
kind: normative-requirement
summary: It is RECOMMENDED that the Transport Services API offer Properties common to multiple transport protocols, and that those Properties be applicable to a variety of network-layer interfaces and paths. Each Property is expected to have a default value.
section: "3.1"
rfc2119_level: RECOMMENDED
