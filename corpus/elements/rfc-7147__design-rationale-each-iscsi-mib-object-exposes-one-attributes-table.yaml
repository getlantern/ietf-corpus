document: rfc-7147
kind: design-rationale
summary: Each iSCSI MIB object exposes one attributes table and zero or more separate statistics tables that AUGMENT it. The separation allows attributes and statistics to be extended independently as the iSCSI standard evolves, without requiring restructuring of a single combined table.
section: "6.2"
topics:
    - snmp
