document: rfc-6116
kind: interoperability-note
summary: Some deployed ENUM clients confuse ORDER and PREFERENCE/PRIORITY fields (using the latter as major sort term) or pre-discard NAPTRs not at the lowest ORDER value. Provisioning systems SHOULD use ORDER value '100' as default and not rely on clients strictly following ordering rules.
section: "5.1"
topics:
    - dns
