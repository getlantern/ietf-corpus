document: rfc-1247
kind: design-rationale
summary: OSPF does not actively repair area partitions. When an area partitions, each component becomes a separate area and the backbone performs inter-area routing between them. This simplifies the protocol at the cost of some paths becoming inter-area instead of intra-area.
section: "3.7"
topics:
    - routing
