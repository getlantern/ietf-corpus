document: rfc-9408
kind: security-consideration
summary: 'The writable subtree ''/nw:networks/nw:network/nw:node/sap:service/sap:sap'' is sensitive: unauthorized write operations — for example, reassociating a SAP with a different parent termination point — can cause service disruption and network misbehavior by creating configurations inconsistent with operator intent.'
