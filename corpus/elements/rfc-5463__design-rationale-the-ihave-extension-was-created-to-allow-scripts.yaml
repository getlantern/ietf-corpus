document: rfc-5463
kind: design-rationale
summary: The 'ihave' extension was created to allow scripts to take advantage of optional Sieve features when available, while still running when those features are absent. This addresses portability across environments that provide different sets of extensions — something the existing static 'require' mechanism cannot handle.
