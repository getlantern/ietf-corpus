document: rfc-4383
kind: normative-requirement
summary: When TESLA is used within SRTP, the default choice of the PRF for both F(x) (key chain derivation) and F'(x) (MAC key derivation) SHALL be HMAC-SHA1. Alternative PRFs SHALL follow the common SRTP guidelines for adding new security parameters.
section: "4.7"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
    - crypto
