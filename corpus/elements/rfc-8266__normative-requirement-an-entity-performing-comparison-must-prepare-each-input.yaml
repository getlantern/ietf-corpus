document: rfc-8266
kind: normative-requirement
summary: An entity performing comparison MUST prepare each input string and MUST apply the Additional Mapping Rule, then Case Mapping Rule, then Normalization Rule in that order; strings are equivalent if and only if they match octet-for-octet.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
