document: rfc-8076
kind: privacy-consideration
summary: All data stored in a Shared Resource is readable by any node in the overlay; applications requiring privacy must encrypt their data. The ACL itself must be stored unencrypted, making group membership permanently publicly visible.
section: "8.4"
topics:
