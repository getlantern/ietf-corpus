document: rfc-9636
kind: protocol-element
summary: 'DST is considered in effect all year if its UT offset is less than (west of) standard time''s offset, and it starts January 1 at 00:00 and ends December 31 at 24:00 minus the DST-to-standard difference, leaving no room for standard time. Example: ''XXX3EDT4,0/0,J365/23'' represents perpetual UTC-4.'
section: 3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
