document: rfc-4145
kind: normative-requirement
summary: If the connection value resulting from an offer/answer exchange is 'new', endpoints SHOULD establish a new TCP connection and SHOULD close any previous TCP connection as soon as the exchange is completed.
section: "5.2"
rfc2119_level: SHOULD
