document: rfc-8628
kind: security-consideration
summary: Device trustworthiness is a concern because the device requesting authorization is not the same as the device from which the user grants access; signals from the approving session are not always relevant. A malicious authorization server could also perform a man-in-the-middle attack on the backchannel flow.
section: "5.3"
topics:
    - oauth
    - security
