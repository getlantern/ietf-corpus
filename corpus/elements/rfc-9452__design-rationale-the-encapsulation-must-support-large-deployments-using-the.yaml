document: rfc-9452
kind: design-rationale
summary: 'The encapsulation must support large deployments: using the IOAM Trace Option-Type capturing six data fields per hop over a 15-hop path can add up to 300 octets of IOAM data, exceeding the 256-octet limit of NSH MD Type 2 and motivating the use of a Next Protocol-based approach with no hard size cap.'
section: A
