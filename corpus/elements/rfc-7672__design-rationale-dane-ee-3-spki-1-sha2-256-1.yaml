kind: design-rationale
summary: DANE-EE(3) SPKI(1) SHA2-256(1) is the RECOMMENDED TLSA record type for SMTP because it does not fail when leaf or intermediate certificates expire, it survives incomplete server certificate chains, and it requires no changes across certificate renewals when the key is unchanged.
