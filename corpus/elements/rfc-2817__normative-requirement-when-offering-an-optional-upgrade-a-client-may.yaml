document: rfc-2817
kind: normative-requirement
summary: 'When offering an optional upgrade, a client MAY include ''Upgrade: TLS/1.0'' and ''Connection: Upgrade'' headers in any clear HTTP request. The server MAY respond normally to the clear request OR switch to secured operation by sending a 101 response.'
section: "3.1"
rfc2119_level: MAY
topics:
    - http
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
