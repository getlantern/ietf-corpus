document: rfc-7614
kind: normative-requirement
summary: 'An element that accepts a REFER request with ''explicitsub'' in its Require header field MUST return a 200 response containing a sip: or sips: URI in the Refer-Events-At header field, and that URI MUST uniquely identify the refer event state associated with this REFER request.'
section: "4.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
