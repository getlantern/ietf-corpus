document: rfc-3830
kind: wire-format
summary: 'The Envelope Data Payload (PKE) encodes: Next payload (8 bits), C cache indicator (2 bits: No cache=0, Cache=1, Cache for CSB=2), Data len (14 bits), Data (variable, RSA-encrypted envelope key). The C field controls whether the Responder caches the envelope key for reuse as a pre-shared key.'
section: "6.3"
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
