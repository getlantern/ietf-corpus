document: rfc-9068
kind: normative-requirement
summary: If the authorization request includes a 'resource' parameter (RFC 8707), the resulting JWT access token 'aud' claim SHOULD have the same value. If no 'resource' parameter is present, the authorization server MUST use a default resource indicator in 'aud', potentially inferred from the 'scope' parameter.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
