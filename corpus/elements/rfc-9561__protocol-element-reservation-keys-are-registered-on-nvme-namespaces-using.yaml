document: rfc-9561
kind: protocol-element
summary: Reservation keys are registered on NVMe namespaces using the Reservation Register command (NVME-BASE Section 7.3) with RREGA=000b and the key in NRKEY. Keys are unregistered with RREGA=001b and the key in CRKEY.
