document: rfc-4204
kind: security-consideration
summary: Section 15 identifies LMP security requirements including authentication of LMP messages to prevent spoofing that could disrupt control channels or corrupt TE link state. The document describes security mechanisms such as IPsec to protect LMP messages, noting that unauthenticated LMP is vulnerable to man-in-the-middle attacks.
section: "15"
topics:
