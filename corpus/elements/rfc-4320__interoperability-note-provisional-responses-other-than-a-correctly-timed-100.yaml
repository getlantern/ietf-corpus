document: rfc-4320
kind: interoperability-note
summary: Provisional responses (other than a correctly-timed 100 Trying) on non-INVITE transactions can delay recovery from lost final responses, creating a problematic interaction between provisional response handling and the NIT state machine defined in RFC 3261.
