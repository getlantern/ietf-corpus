document: rfc-3371
kind: protocol-element
summary: l2tpDomainConfigReassemblyTO (default 0 ms) defines how long local peers wait before processing out-of-sequence payload packets. Zero causes all delayed packets to be lost; high values may queue packets and degrade throughput if packets are truly lost.
section: "4.0"
topics:
