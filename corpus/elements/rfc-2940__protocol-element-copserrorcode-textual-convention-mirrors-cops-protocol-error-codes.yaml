summary: CopsErrorCode textual convention mirrors COPS protocol error codes (RFC 2748 section 2.2.8), ranging from errorOther(0) through errorAuthenticationMissing(15). The code is recorded in copsClientLastError and is not zeroed on Client-Open operations.
