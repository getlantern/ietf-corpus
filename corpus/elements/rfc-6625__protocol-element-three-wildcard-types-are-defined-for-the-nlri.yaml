document: rfc-6625
kind: protocol-element
summary: 'Three wildcard types are defined for the NLRI of an S-PMSI A-D route: (C-*,C-G) — source wildcard with group specified; (C-S,C-*) — source specified with group wildcard; and (C-*,C-*) — both source and group wildcarded. All other wildcard combinations are outside the scope of this document.'
section: "1.2"
