document: rfc-5946
kind: normative-requirement
summary: An RSVP Receiver Proxy that understands the Receiver Proxy Control policy element MUST attempt to insert itself as Receiver Proxy when Control-Value is 1 (Receiver-Proxy-Needed), and MUST NOT attempt to insert itself when Control-Value is 2 (Receiver-Proxy-Not-Needed).
section: "4.2"
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
