document: rfc-7577
kind: state-machine
summary: 'The batteryChargingOperState object defines five battery charging states: unknown(1), charging(2), maintainingCharge(3), noCharging(4), and discharging(5). Transitions are triggered either autonomously by the charging controller or by write operations to batteryChargingAdminState; the controller SHOULD honor the admin state as soon as operational conditions permit.'
section: "3.5"
