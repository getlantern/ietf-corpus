document: rfc-8002
kind: normative-requirement
summary: When the certificate is issued for a HIP host identified by a HIT and an HI, the respective HIT SHOULD be placed into the Subject Alternative Name (SAN) extension using the GeneralName form iPAddress, and the full HI is presented as the subject's public key info.
section: "3"
rfc2119_level: SHOULD
