summary: The ietf-dhcpv6-client module models client interfaces as a list keyed by if-name, with per-interface client-configured-options (ORO, rapid-commit, user-class, vendor-class, vendor-specific, reconfigure-accept) and separate ia-na, ia-ta, and ia-pd lists, each guarded by individual feature statements and containing read-only lease-state nodes.
