document: rfc-3928
kind: normative-requirement
summary: The scheme field in the Sync Update control MUST be set whenever the cookie is set and the cookie format has changed; otherwise it MAY be omitted. Within a given LCUP Context, the cookie scheme MUST remain the same.
section: 4.2.2
rfc2119_level: MUST
topics:
