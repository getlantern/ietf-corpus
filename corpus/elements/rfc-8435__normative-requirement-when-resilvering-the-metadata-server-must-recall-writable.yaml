document: rfc-8435
kind: normative-requirement
summary: When resilvering, the metadata server MUST recall writable layout segments being resilvered. If the client requests a writable layout for a segment being resilvered, the MDS may deny with NFS4ERR_LAYOUTUNAVAILABLE, forcing I/O through the metadata server.
section: "8.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
