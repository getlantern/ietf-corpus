document: rfc-5679
kind: protocol-element
summary: If no NAPTR records are found, the client constructs SRV queries for each transport protocol it supports using the appropriate service identifier (_MIHIS, _MIHES, or _MIHCS). The client MAY use any transport protocol supported by both sides.
