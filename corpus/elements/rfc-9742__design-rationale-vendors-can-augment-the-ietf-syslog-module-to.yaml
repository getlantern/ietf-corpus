document: rfc-9742
kind: design-rationale
summary: Vendors can augment the ietf-syslog module to add proprietary features, and can extend the syslog-facility identity to add vendor-specific facility types. However, additional facilities beyond the RFC 5424 set may not work with the standard syslog protocol and apply only to local syslog-like logging.
section: B.1
topics:
    - syslog
    - yang
