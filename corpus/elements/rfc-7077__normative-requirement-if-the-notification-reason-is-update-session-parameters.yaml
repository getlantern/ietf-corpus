document: rfc-7077
kind: normative-requirement
summary: If the Notification Reason is UPDATE-SESSION-PARAMETERS and the MAG cannot apply the session parameters, and the (A) flag is set, the MAG MUST send a UPA with status 128 (FAILED-TO-UPDATE-SESSION-PARAMETERS).
section: "6.1"
rfc2119_level: MUST
topics:
    - mobility
