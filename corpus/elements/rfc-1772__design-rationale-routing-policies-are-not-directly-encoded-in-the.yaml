document: rfc-1772
kind: design-rationale
summary: Routing policies are not directly encoded in the BGP protocol; they are provided via configuration information. This allows BGP to enforce arbitrarily complex political, security, or economic constraints without changing the protocol itself.
section: "5"
topics:
