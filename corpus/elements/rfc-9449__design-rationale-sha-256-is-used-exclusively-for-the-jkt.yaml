document: rfc-9449
kind: design-rationale
summary: SHA-256 is used exclusively for the jkt confirmation method, ath claim, and dpop_jkt parameter — a deliberate choice for simplicity and to avoid security and interoperability issues from parameterized algorithm agility schemes. A future update specification would define new parameters if SHA-256 became insufficient.
