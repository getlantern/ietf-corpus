document: rfc-4193
kind: design-rationale
summary: Local IPv6 addresses cannot be globally routed because their random /48 prefixes do not fit the hierarchical IPv6 unicast address model, cannot aggregate with normal IPv6 addresses or with each other, and would require flat routing over the wide-area Internet—creating unacceptable routing table growth.
section: "5.1"
topics:
