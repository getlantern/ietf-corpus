document: rfc-3124
kind: normative-requirement
summary: The CM MUST export the cmapp_update(u64 newrate, u32 srtt, u32 rttdev) callback for synchronous senders. In response, the stream MUST adapt its packet size or timer interval to not exceed the reported rate.
section: "3.2"
rfc2119_level: MUST
topics:
    - congestion
