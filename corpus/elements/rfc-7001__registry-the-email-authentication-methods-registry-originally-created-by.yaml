document: rfc-7001
kind: registry
summary: The 'Email Authentication Methods' registry (originally created by RFC 5451, updated by this document) lists recognized authentication method names. New entries require Expert Review. Each entry records the method name, specification, version number, applicable ptype values, the properties to report, and descriptions of the property values.
section: "6.2"
