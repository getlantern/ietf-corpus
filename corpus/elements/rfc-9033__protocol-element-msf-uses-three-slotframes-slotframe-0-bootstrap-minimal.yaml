document: rfc-9033
kind: protocol-element
summary: 'MSF uses three slotframes: Slotframe 0 (bootstrap/minimal cell per RFC 8180), Slotframe 1 (autonomous cells), and Slotframe 2 (6P negotiated cells). The same slotframe length for all three is RECOMMENDED to avoid scheduling collisions between autonomous and negotiated cells.'
section: "2"
