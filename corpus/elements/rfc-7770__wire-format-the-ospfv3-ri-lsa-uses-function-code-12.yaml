document: rfc-7770
kind: wire-format
summary: The OSPFv3 RI LSA uses function code 12 in the LSA type field; S1/S2 bits determine flooding scope and the U bit is set to 1 to ensure flooding even when unrecognized. The Link State ID field carries the Instance ID.
