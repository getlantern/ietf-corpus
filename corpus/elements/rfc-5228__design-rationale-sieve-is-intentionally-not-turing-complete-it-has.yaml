document: rfc-5228
kind: design-rationale
summary: 'Sieve is intentionally not Turing-complete: it has no loop control structure and no functions. This makes it impossible for users to do anything more complex than simple mail filters, enabling safe server-side execution where arbitrary program execution is not permitted.'
section: "1"
