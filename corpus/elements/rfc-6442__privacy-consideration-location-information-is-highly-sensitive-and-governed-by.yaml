document: rfc-6442
kind: privacy-consideration
summary: Location information is highly sensitive and governed by GEOPRIV rules (RFC 3693, RFC 6280). The Rule Maker controls which entity adds location and what access control rules apply. SIP implementations must honor PIDF-LO usage-rules including <retransmission-allowed> and <retention-expiry> per RFC 4119 Section 2.2.2.
section: "6"
topics:
    - realtime
    - privacy
