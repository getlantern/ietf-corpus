summary: The Discard RLE report block begins with an 8-bit Block Type (BT=25), a 3-bit reserved field, a 1-bit E flag, a T field, and a 16-bit block length, followed by the 32-bit SSRC of source, 16-bit begin_seq, 16-bit end_seq, and variable-length 16-bit chunks encoding run-length data.
