document: rfc-4681
kind: security-consideration
summary: The UserMappingDataList is unauthenticated; authentication must rely solely on the client certificate. One recommended approach is to use the hint to locate the claimed user's certificate in a trusted directory and match it against the validated TLS client certificate.
section: "5"
