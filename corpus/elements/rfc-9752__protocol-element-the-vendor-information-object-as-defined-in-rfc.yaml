document: rfc-9752
kind: protocol-element
summary: The Vendor Information object, as defined in RFC 7470, is extended for use in the PCRpt (Path Computation LSP State Report) message sent by a PCC to a PCE to report current LSP state. The object contents and format, including VENDOR-INFORMATION-TLV, remain as specified in Section 4 of RFC 7470. The PCE identifies how to interpret the object by examining its Enterprise Number.
section: "2"
topics:
    - routing
    - mpls
