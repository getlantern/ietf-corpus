document: rfc-856
kind: wire-format
summary: In binary transmission mode, a non-IAC-prefixed byte is interpreted as 8-bit binary data. IAC followed by IAC represents the single 8-bit value 255 (decimal). IAC followed by a valid Telnet command retains its command meaning even in binary mode.
section: "5"
