document: rfc-6772
kind: normative-requirement
summary: Implementations MUST specify the CRS using the 'srsName' attribute on the outermost geometry element. The CRS MUST NOT be changed for any sub-elements. The 'srsDimension' attribute MUST be omitted.
section: "4.1"
rfc2119_level: MUST
topics:
    - privacy
