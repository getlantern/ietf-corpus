document: rfc-4448
kind: wire-format
summary: 'The Ethernet PW control word is a 32-bit field: the first 4 bits MUST be set to 0 (indicating PW data), the next 12 bits are reserved (MUST be set to 0 on transmit, MUST be ignored on receipt), and the final 16 bits carry a sequence number for ordered frame delivery.'
section: "4.6"
topics:
