document: rfc-7117
kind: normative-requirement
summary: Penultimate Hop Popping (PHP) MUST be disabled on any P2MP LSP (RSVP-TE or mLDP) carrying VPLS traffic. Egress PEs rely on the label advertised to the upstream neighbor to identify the P2MP LSP on which a C-multicast data packet arrives.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
