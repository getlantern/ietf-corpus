document: rfc-4570
kind: security-consideration
summary: Using IP source addresses for authentication is weak because addresses are often dynamically assigned and senders can spoof their source address in datagrams. Border routers implementing ingress filtering (BCP 38) can reduce but not eliminate spoofed source addresses, particularly on LANs.
section: "5"
topics:
    - security
    - multicast
