document: rfc-3539
kind: normative-requirement
summary: Store and forward proxies SHOULD NOT be used, because they send a reply to the NAS before receiving confirmation from the accounting server, causing the NAS to prematurely delete accounting records from non-volatile storage.
section: B.3
rfc2119_level: SHOULD NOT
