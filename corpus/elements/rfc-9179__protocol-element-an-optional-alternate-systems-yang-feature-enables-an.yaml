document: rfc-9179
kind: protocol-element
summary: An optional 'alternate-systems' YANG feature enables an 'alternate-system' leaf in the reference frame, allowing location data to be defined relative to systems other than the natural universe (e.g., virtual realities or simulations). The definition of alternate systems is outside the scope of this document.
