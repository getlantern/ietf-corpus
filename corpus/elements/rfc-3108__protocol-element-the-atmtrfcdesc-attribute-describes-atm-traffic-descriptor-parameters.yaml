document: rfc-3108
kind: protocol-element
summary: 'The ''atmTrfcDesc'' attribute describes ATM traffic descriptor parameters: PCR, SCR, MBS, CDVT, MCR, MFS (all decimal integers), and frame-discard-allowed (<fd>) and CLP-tagging-enabled (<te>) flags. A <clpLvl> subfield (''0'', ''0+1'', or ''-'') scopes the descriptor to cells of that CLP value; separate attribute lines are needed if both CLP levels are described.'
section: 5.6.1.9
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
