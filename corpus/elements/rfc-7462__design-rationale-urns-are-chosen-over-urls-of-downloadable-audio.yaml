document: rfc-7462
kind: design-rationale
summary: URNs are chosen over URLs of downloadable audio files to avoid download latency, formatting/compatibility issues, security risks of rendering unexpected content, and to allow local storage in any format. The URN specifies a rendering 'by name' rather than 'by value', enabling local policy decisions and accessibility adaptations.
section: "1"
topics:
