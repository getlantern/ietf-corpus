document: rfc-7311
kind: normative-requirement
summary: When an AIGP attribute is created, it SHOULD contain no more than one AIGP TLV. If it contains more than one, only the first is used; any additional AIGP TLVs MUST be passed along unchanged.
section: "3"
rfc2119_level: SHOULD
topics:
