document: rfc-4648
kind: normative-requirement
summary: Pad bits in canonical base 64 and base 32 encoding MUST be set to zero by conforming encoders. Without this, multiple base-encoded strings can decode to the same binary data, and canonical encoding is not guaranteed.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
