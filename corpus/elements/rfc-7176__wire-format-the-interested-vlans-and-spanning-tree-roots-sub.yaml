document: rfc-7176
kind: wire-format
summary: 'The Interested VLANs and Spanning Tree Roots sub-TLV (INT-VLAN, sub-TLV type 10) encodes a 2-byte Nickname, 4-byte Interested VLANs field (M4/M6 flags, 12-bit VLAN.start, 12-bit VLAN.end), 4-byte Appointed Forwarder Status Lost Counter, and 6*n bytes of root bridge IDs. Length: 10 + 6*n.'
