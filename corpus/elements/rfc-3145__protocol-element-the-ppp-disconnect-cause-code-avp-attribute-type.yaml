document: rfc-3145
kind: protocol-element
summary: The PPP Disconnect Cause Code AVP (Attribute Type 46, Vendor ID 0) is an L2TP AVP extension that carries PPP-specific disconnect information. It is valid only in the Call-Disconnect-Notify (CDN) message and is for informational and logging purposes only.
