document: rfc-5089
kind: normative-requirement
summary: It is RECOMMENDED to use a PCE address (in PCE-ADDRESS sub-TLV) that is always reachable if there is any connectivity to the PCE, and the PCE address SHOULD be reachable via some prefixes advertised by IS-IS.
