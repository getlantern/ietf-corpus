document: rfc-1516
kind: normative-requirement
summary: Implementation of the Basic Group (rptrBasicPackage) is mandatory for all managed repeaters. The Monitor Group and Address Tracking Group are optional, but if any part of either optional group is implemented, the entire group must be implemented.
section: "2.3"
rfc2119_level: REQUIRED
