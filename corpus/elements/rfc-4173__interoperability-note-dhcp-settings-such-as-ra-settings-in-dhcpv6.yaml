document: rfc-4173
kind: interoperability-note
summary: DHCP settings such as RA settings in DHCPv6 may prohibit the use of DHCP in distributing iSCSI boot information, in which case the DHCP Stage cannot be used. BOOTP or DHCP fields such as client ID and gateway information are used identically to non-iSCSI applications unless otherwise specified.
section: "5"
topics:
