document: rfc-4314
kind: normative-requirement
summary: Before executing a command, an ACL-compliant server MUST check which rights are required to perform it. A summary table maps IMAP operations (LIST, SELECT, COPY, STORE, EXPUNGE, SETACL, etc.) to the required rights.
section: "4"
rfc2119_level: MUST
