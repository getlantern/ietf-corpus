document: rfc-7189
kind: protocol-element
summary: 'When both PEs advertise a common set of proactive CV types that includes both MPLS-TP CC-CV types and BFD CV types, MPLS-TP CC-CV takes precedence over any BFD CV type. Among multiple MPLS-TP CV types, the priority order (descending) is: 0x08, 0x04, 0x02, 0x01.'
section: "2.4"
topics:
    - mpls
