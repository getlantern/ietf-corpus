document: rfc-6609
kind: design-rationale
summary: The ':once' parameter is RECOMMENDED only for scripts that perform general duties such as declaring global variables and making sanity checks of the environment. This prevents redundant re-execution when a library-style script is included from multiple places in a script hierarchy.
section: "3.2"
