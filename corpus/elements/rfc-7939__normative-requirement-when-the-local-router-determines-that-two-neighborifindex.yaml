document: rfc-7939
kind: normative-requirement
summary: When the local router determines that two NeighborIfIndex values refer to the same physical neighbor interface, the agent MUST aggregate the two address sets to a single index chosen from the aggregated set and MUST update all MIB tables indexed by NeighborIfIndex accordingly. It MAY reuse freed index values after the next agent restart.
section: "7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
