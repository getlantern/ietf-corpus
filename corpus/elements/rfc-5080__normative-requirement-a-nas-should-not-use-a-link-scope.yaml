document: rfc-5080
kind: normative-requirement
summary: A NAS SHOULD NOT use a link-scope (IPv6 link-local or IPv4 link-local) address in a NAS-IPv6-Address or NAS-IP-Address attribute because link-local addresses are not unique beyond the local link. A RADIUS server receiving such an attribute SHOULD NOT count it toward satisfying the NAS identification requirements of RFC 3162 Section 2.1.
section: 2.7.1
rfc2119_level: SHOULD NOT
topics:
    - radius
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
