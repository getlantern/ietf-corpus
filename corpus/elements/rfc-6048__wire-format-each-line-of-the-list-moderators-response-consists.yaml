document: rfc-6048
kind: wire-format
summary: 'Each line of the LIST MODERATORS response consists of two colon-separated fields: a wildmat (or exact newsgroup name) and a submission address template. The template is an e-mail addr-spec where ''%s'' is replaced by the newsgroup name (with periods changed to dashes) and ''%%'' represents a literal percent sign.'
section: 2.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
