document: rfc-5670
kind: normative-requirement
summary: The excess-traffic-meter SHOULD use packet-size-independent marking; if not implemented, it MUST use the 'classic' token-bucket metering behaviour where a packet is marked when the token bucket is empty (F_etm = 0).
section: "2.4"
rfc2119_level: SHOULD
topics:
    - qos
    - congestion
