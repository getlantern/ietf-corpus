document: rfc-1044
kind: protocol-element
summary: Broadcast messages are only supported with the 32-bit message format. A TO adapter address of 0xFF indicates a local-network broadcast; 0xFF in the Network or Domain fields expands broadcast scope. A Broadcast Channel number (in the low byte of the TO port field) filters which protocol servers receive the broadcast, analogous to an Ethernet multicast address.
section: BROADCASTING
topics:
    - ip
    - multicast
