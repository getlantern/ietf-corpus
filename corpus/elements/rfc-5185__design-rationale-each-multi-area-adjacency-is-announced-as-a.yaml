document: rfc-5185
kind: design-rationale
summary: Each multi-area adjacency is announced as a point-to-point link (type 1 Router LSA) in the configured area, but no type 3 link is advertised for it. The primary adjacency continues to operate per RFC 2328, preserving backward compatibility.
