summary: The 'public' token is defined as an umbrella term encompassing more precise descriptors including 'street', 'public-transport', 'aircraft', 'bus', 'bus-station', 'train', 'train-station', 'airport', 'shopping-area', 'outdoors', and 'watercraft'. It may be used when finer-grained location detail is unavailable or privacy concerns favor less precise terms.
