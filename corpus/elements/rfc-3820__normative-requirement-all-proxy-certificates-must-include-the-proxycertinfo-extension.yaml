document: rfc-3820
kind: normative-requirement
summary: All Proxy Certificates MUST include the ProxyCertInfo extension, and that extension MUST be marked as critical. Conversely, if a certificate is not a Proxy Certificate, the proxyCertInfo extension MUST be absent.
section: "3.8"
rfc2119_level: MUST
topics:
    - pkix
    - security
