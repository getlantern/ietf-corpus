document: rfc-5189
kind: normative-requirement
summary: Within a policy rule the IP version parameter must be the same for address tuples A0 and A1, and separately for A2 and A3. The transport protocol parameter must be identical across all four address tuples A0, A1, A2, and A3.
section: 2.3.6
rfc2119_level: MUST
topics:
    - nat
