document: rfc-5102
kind: interoperability-note
summary: The ingressInterface (IE 10) and egressInterface (IE 14) IEs match ifIndex as defined in RFC 2863, but ifIndex values are not statically assigned and may be renumbered each time the device's management system is re-initialized.
