kind: wire-format
summary: 'The CUR message format is: Diameter Header with Command Code 328 and REQ flag; mandatory Origin-Host, Origin-Realm, one or more Host-IP-Address, Vendor-Id, Product-Name; optional Origin-State-Id, zero or more Supported-Vendor-Id, Auth-Application-Id, Acct-Application-Id, Vendor-Specific-Application-Id, Firmware-Revision, and additional AVPs.'
