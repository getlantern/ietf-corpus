document: rfc-6469
kind: normative-requirement
summary: All DIF blocks in one RTP packet MUST be from the same video frame. DIF blocks from the next video frame MUST NOT be packed into the same RTP packet even if more payload space remains.
section: "2.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
