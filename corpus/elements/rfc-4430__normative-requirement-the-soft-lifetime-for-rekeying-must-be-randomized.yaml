document: rfc-4430
kind: normative-requirement
summary: The soft lifetime for rekeying MUST be randomized to avoid synchronization with similar implementations. T-rekey SHOULD be at least twice as high as T-retrans (the full retransmission cycle time).
section: "3.6"
rfc2119_level: MUST
topics:
    - ipsec
    - security
