document: rfc-5256
kind: wire-format
summary: The THREAD response (thread-data) is 'THREAD' followed by zero or more thread-list items. A thread-list is a parenthesized list where space-delimited numbers indicate successive parent/child relationships. When a thread splits, sub-threads are represented as nested parenthesized lists; nesting is unlimited.
