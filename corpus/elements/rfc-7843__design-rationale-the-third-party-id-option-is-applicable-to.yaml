document: rfc-7843
kind: design-rationale
summary: The THIRD_PARTY_ID option is applicable to scenarios where a PCP Interworking Function (IWF) acts as a proxy for multiple subscribers, such as a carrier-hosted UPnP IGD-PCP IWF or a carrier web portal, where the IWF retrieves the subscriber's tunnel ID from an AAA server and includes it as the THIRD_PARTY_ID in PCP requests to the CGN.
section: "3"
topics:
