document: rfc-2748
kind: normative-requirement
summary: A PEP that caches state from a disconnected PDP MUST communicate this to any PDP it reconnects to by including the LastPDPAddr object (C-Num=14) in the Client-Open message. States deleted during the disconnection MUST be explicitly deleted after reconnection.
section: "2.5"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
