document: rfc-2210
kind: normative-requirement
summary: When an ADSPEC encountering a Guaranteed-service-capable node has only a header-only Guaranteed fragment, the node must expand it to the full data fragment with Ctot, Dtot, Csum, Dsum initialized to zero (preserving the break bit) before composing local values.
