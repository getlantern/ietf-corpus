document: rfc-5286
kind: security-consideration
summary: LFA does not modify any routing protocol messages, introducing no new threats from packet modification or replay attacks. Temporary rerouting via non-primary next-hops is not a new threat because those routers could be used under different topological conditions anyway. LDP's wider FEC label distribution remains within trusted LDP session boundaries and liberal label retention mode is believed to have no significant security impact.
section: "7"
topics:
