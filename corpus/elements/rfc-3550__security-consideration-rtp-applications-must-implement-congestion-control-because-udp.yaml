document: rfc-3550
kind: security-consideration
summary: RTP applications MUST implement congestion control because UDP has none. Since RTP data rates can be high and multicast can affect many paths simultaneously, unconstrained senders risk congestion collapse. The RTCP feedback loop is integral to detecting and adapting to congestion.
section: "10"
topics:
