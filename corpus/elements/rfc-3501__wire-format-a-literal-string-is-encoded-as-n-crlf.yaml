document: rfc-3501
kind: wire-format
summary: A literal string is encoded as '{N}CRLF' followed by N octets of data. Clients transmitting literals to the server MUST wait for a command continuation request ('+' token) before sending the octet data, even when the octet count is 0.
section: "4.3"
topics:
    - email
