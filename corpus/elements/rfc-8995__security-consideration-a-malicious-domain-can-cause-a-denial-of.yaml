document: rfc-8995
kind: security-consideration
summary: A malicious domain can cause a Denial of Service against the MASA by repeatedly requesting vouchers for devices it does not own, consuming MASA computational and logging resources. The MASA has limited ability to distinguish legitimate from malicious registrars without sales channel integration, making rate limiting and audit mechanisms important mitigations.
section: "11.1"
topics:
    - security
