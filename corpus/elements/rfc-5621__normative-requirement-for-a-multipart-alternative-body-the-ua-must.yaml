document: rfc-5621
kind: normative-requirement
summary: For a 'multipart/alternative' body, the UA MUST set 'handling' to 'required' or 'optional' based on whether processing is required, and SHOULD set the 'handling' of all top-level body parts within to 'optional'. The UA MUST use the same disposition type for the 'multipart/alternative' body and all its top-level body parts.
section: "8.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
