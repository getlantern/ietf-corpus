document: rfc-7317
kind: protocol-element
summary: The RADIUS client is configured under /system/radius (if-feature radius) with a user-ordered server list; each entry includes UDP transport with a mandatory address, authentication-port (default 1812), and a mandatory shared-secret leaf marked nacm:default-deny-all, plus authentication-type (pap or chap, default pap) and global timeout/attempts options.
section: "3.4"
