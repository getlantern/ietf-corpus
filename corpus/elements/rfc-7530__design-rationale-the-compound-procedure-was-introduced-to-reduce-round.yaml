document: rfc-7530
kind: design-rationale
summary: The COMPOUND procedure was introduced to reduce round trips by allowing logical file system operations (e.g., LOOKUP + OPEN + READ) to execute in a single RPC. There is no logical OR/AND of operations; evaluation is strictly sequential and stops at the first error.
section: 1.4.2
