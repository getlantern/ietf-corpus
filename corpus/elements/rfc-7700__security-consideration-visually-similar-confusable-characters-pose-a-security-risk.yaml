document: rfc-7700
kind: security-consideration
summary: 'Visually similar (''confusable'') characters pose a security risk in nicknames. While the mapping rules reduce some confusion (e.g., via case folding and NFKC), this document does not provide comprehensive recommendations for handling confusables; implementors should consult UTS #39 for more detailed guidance.'
