summary: 'All IGMPv2 messages share an 8-octet format: Type (1 octet), Max Response Time (1 octet), Checksum (2 octets), Group Address (4 octets). Messages are encapsulated in IP datagrams with protocol number 2, sent with TTL 1, and include the IP Router Alert option.'
