document: rfc-8390
kind: normative-requirement
summary: If a previously unknown or changed excluded path becomes known to the processing node after initial LSP setup, the node MUST re-evaluate exclusion and diversity constraints. If constraints with L-flag unset are no longer met, it MUST send a PathErr with error code 'Routing Problem' (24) and sub-code 'Route blocked by Exclude Route' (67), with PSR flag MUST NOT be set.
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
