document: rfc-6490
kind: interoperability-note
summary: The TAL format was adopted by RPKI implementors prior to the PKIX TrustAnchorInfo (RFC 5914) standard. Rather than defining an rsync URI extension for TrustAnchorInfo, the RPKI community elected to retain the simpler ASCII TAL format.
section: "2.1"
topics:
    - pkix
    - security
