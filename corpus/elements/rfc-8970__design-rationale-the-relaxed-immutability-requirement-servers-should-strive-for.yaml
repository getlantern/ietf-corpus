document: rfc-8970
kind: design-rationale
summary: The relaxed immutability requirement (servers SHOULD strive for consistent previews but clients MUST NOT assume immutability) permits servers to offer previews without burdensome storage or processing guarantees, since preview approximation does not require the strictness of canonical message content.
section: "3.2"
topics:
