document: rfc-4734
kind: design-rationale
summary: Named modem/fax events allow gateways to avoid pre-negotiating all potential payload types at call setup (which over-allocates resources) by using event reports to buy time while out-of-band signalling updates the active payload type when a data stream is recognized.
