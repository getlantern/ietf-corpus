document: rfc-6407
kind: security-consideration
summary: The GCKS SHOULD NOT use the same signing key for the GROUPKEY-PUSH SIG payload as was used for Phase 1 authentication in the GROUPKEY-PULL exchange. Reusing a key across multiple protocol contexts weakens security through cross-context signature ambiguity.
section: "4.1"
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
