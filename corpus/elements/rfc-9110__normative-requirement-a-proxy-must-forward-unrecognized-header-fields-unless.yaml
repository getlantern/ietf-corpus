document: rfc-9110
kind: normative-requirement
summary: A proxy MUST forward unrecognized header fields unless the field name is listed in the Connection header or the proxy is specifically configured to block them. Other recipients SHOULD ignore unrecognized header and trailer fields, enabling HTTP extensibility without updating deployed intermediaries.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
