document: rfc-5163
kind: interoperability-note
summary: GSE and ULE share the same IANA ULE Next-Header Registry and use the same Type field semantics per RFC 4326, but differ in SNDU length calculation, absence of per-SNDU CRC in GSE (CRC-32 is only in the final fragment), and different header flag fields (S, E, LT in GSE vs. D in ULE).
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
