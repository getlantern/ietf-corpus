document: rfc-8853
kind: normative-requirement
summary: When bitrate adaptation is necessary, what simulcast streams to prioritize SHOULD be taken from the simulcast stream order on the 'a=simulcast' line and ordering of alternative simulcast formats. Streams with pause/resume capability that would receive insufficient bitrate MAY be temporarily paused.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
