document: rfc-8832
kind: normative-requirement
summary: Each side MUST use streams with either even or odd stream identifiers when sending a DATA_CHANNEL_OPEN message. When using SCTP over DTLS, the DTLS client MUST use even stream identifiers and the DTLS server MUST use odd stream identifiers.
section: "4"
rfc2119_level: MUST
topics:
    - webrtc
