document: rfc-6223
kind: security-consideration
summary: Without hop-by-hop integrity protection (e.g., TLS or DTLS), a man-in-the-middle can modify Via header fields to suppress keep-alive negotiation or set an artificially low frequency value, causing excessive resource consumption from frequent keep-alives.
