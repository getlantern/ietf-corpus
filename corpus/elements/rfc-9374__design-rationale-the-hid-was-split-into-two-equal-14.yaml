document: rfc-9374
kind: design-rationale
summary: The HID was split into two equal 14-bit fields (RAA and HDA) rather than an asymmetric split. With 193 ICAO member states each potentially needing ~8 RAAs plus commercial allocations, 16,384 (2^14) RAAs was deemed adequate. Similarly, 16,384 HDAs per RAA provides sufficient space for large delivery service operators requiring millions of anti-tracking RIDs per year.
section: B
