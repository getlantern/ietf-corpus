document: rfc-7513
kind: normative-requirement
summary: The interval between two successive EVE_DATA_UNMATCH events triggered from the same attachment MUST be no smaller than DATA_SNOOPING_INTERVAL. This rate-limits data-triggered binding initiation to mitigate DoS attacks.
section: "7.4"
rfc2119_level: MUST
topics:
    - security
    - ip
