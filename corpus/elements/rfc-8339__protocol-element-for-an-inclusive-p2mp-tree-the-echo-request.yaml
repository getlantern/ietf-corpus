document: rfc-8339
kind: protocol-element
summary: For an Inclusive P2MP Tree, the echo request is sent with either {P2MP LSP label, GAL} and IPv4/IPv6 ACH, or {P2MP LSP label} and PW ACH. For an Aggregate Inclusive Tree, the echo request uses {P2MP LSP label, P2MP PW upstream assigned label, GAL} and IPv4/IPv6 ACH, or {P2MP LSP label, P2MP PW upstream assigned label} and PW ACH.
