document: rfc-3633
kind: normative-requirement
summary: A requesting router discards any prefixes for which the preferred lifetime is greater than the valid lifetime. A delegating router ignores lifetimes set by the requesting router if preferred lifetime exceeds valid lifetime, and ignores T1 and T2 values set by the requesting router if they are greater than the preferred lifetime.
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
