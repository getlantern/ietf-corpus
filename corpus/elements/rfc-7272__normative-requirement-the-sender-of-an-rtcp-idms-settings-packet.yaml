document: rfc-7272
kind: normative-requirement
summary: The sender of an RTCP IDMS Settings Packet MUST use recent NTP timestamp values for the Packet Received NTP timestamp field — values that reflect current time and not too far in the future or past — to avoid ambiguity from RTP timestamp wrap-around.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
