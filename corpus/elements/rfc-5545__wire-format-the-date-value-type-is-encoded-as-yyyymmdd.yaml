document: rfc-5545
kind: wire-format
summary: 'The DATE value type is encoded as ''YYYYMMdd'' (4-digit year, 2-digit month, 2-digit day) with no separator characters, based on ISO 8601 basic format. The DURATION type uses ''P'' prefix followed by designators: ''nW'' for weeks, ''nD'' for days, ''T'' separator, ''nH'' for hours, ''nM'' for minutes, ''nS'' for seconds. Year and month designators are not supported.'
section: 3.3.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
