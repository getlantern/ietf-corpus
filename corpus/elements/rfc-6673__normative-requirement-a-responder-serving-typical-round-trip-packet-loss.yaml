document: rfc-6673
kind: normative-requirement
summary: A responder serving typical round-trip packet loss testing SHOULD produce a response in 1 second or less; a responder unable to satisfy this requirement SHOULD log the fact so an operator can adjust load and priorities.
section: "4.4"
rfc2119_level: SHOULD
