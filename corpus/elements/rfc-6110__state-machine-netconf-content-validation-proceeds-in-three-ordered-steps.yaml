document: rfc-6110
kind: state-machine
summary: 'NETCONF content validation proceeds in three ordered steps: (1) the XML instance document is checked against the RELAX NG schema for grammatical and data type validity; (2) default values for leaf nodes are inserted and their ancestor containers added by the DSRL schema — this step modifies the information set and must precede XPath evaluation; (3) semantic constraints are checked using the Schematron schema against the augmented document.'
