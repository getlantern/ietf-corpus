document: rfc-8490
kind: protocol-element
summary: The Encryption Padding TLV carries opaque padding bytes to obscure DSO message lengths for traffic analysis resistance over TLS, replacing the EDNS(0) Padding Option which cannot appear in DSO messages. It is usable as a Primary TLV or an Additional TLV in both requests and responses.
section: "7.3"
topics:
    - dns
    - privacy
