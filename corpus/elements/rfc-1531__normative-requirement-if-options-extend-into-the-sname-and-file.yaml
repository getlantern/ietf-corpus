document: rfc-1531
kind: normative-requirement
summary: If options extend into the 'sname' and 'file' fields, the 'option overload' option MUST appear in the 'options' field; overloaded fields MUST begin at their first octet, MUST be terminated by an 'end' option, and MUST be padded with 'pad' options. The 'options' field MUST be interpreted first.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
