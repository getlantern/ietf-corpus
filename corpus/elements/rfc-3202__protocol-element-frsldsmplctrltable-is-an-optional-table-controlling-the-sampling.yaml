document: rfc-3202
kind: protocol-element
summary: frsldSmplCtrlTable is an optional table controlling the sampling of data, indexed additionally by frsldSmplCtrlIdx (1..256). Key objects are frsldSmplCtrlColPeriod (collection interval in seconds), frsldSmplCtrlBuckets (desired bucket count), and frsldSmplCtrlBucketsGranted (actual allocated buckets).
section: "5.2"
topics:
