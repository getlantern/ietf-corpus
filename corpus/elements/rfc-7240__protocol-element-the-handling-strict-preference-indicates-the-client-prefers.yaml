document: rfc-7240
kind: protocol-element
summary: 'The "handling=strict" preference indicates the client prefers the server to apply strict validation and reject requests with minor errors. The "handling=lenient" preference indicates the client wishes the server to attempt processing despite minor errors. ABNF: `handling = "handling" BWS "=" BWS ("strict" / "lenient")`.'
section: "4.4"
topics:
