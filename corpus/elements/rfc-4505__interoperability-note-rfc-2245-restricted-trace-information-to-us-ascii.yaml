document: rfc-4505
kind: interoperability-note
summary: RFC 2245 restricted trace information to US-ASCII. RFC 4505 extends this to UTF-8-encoded Unicode characters with a stringprep profile, while retaining the 255-character limit. Encoded length per character now ranges from 1 to 4 octets.
