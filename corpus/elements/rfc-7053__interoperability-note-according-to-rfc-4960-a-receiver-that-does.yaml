document: rfc-7053
kind: interoperability-note
summary: According to RFC 4960, a receiver that does not support this extension will ignore the I bit, since unknown flags in chunk headers are ignored. Because the sender can handle the case where the receiver ignores the bit, there is no requirement to negotiate support for this feature.
section: "6"
