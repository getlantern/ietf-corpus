document: rfc-9471
kind: protocol-element
summary: Cyclic sibling domain name servers occur when two sibling zones each reference the other's name servers. Cyclic dependencies can only be resolved when the delegating name server includes glue for the sibling domain in the referral response.
section: "2.3"
