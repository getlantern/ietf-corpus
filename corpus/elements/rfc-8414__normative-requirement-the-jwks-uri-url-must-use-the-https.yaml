document: rfc-8414
kind: normative-requirement
summary: The jwks_uri URL MUST use the 'https' scheme. When both signing and encryption keys are available in the JWK Set, a 'use' (public key use) parameter value is REQUIRED for all keys to indicate each key's intended usage.
