summary: 't11ZsServerDefaultZoneSetting controls the Default Zone behavior in Enhanced mode: ''permit'' allows communication among Default Zone members; ''deny'' (the default) prohibits it. This setting governs all ports not explicitly assigned to any active Zone.'
