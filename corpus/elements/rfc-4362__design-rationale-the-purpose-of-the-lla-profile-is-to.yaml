document: rfc-4362
kind: design-rationale
summary: The purpose of the LLA profile is to provide efficient matching of existing speech applications to existing link technologies (e.g., GSM/IS-95-based air interfaces with fixed payload sizes), not to achieve general compression efficiency. The last byte of the ROHC header is eliminated for most packets to avoid requiring the next higher fixed packet size.
section: "1"
