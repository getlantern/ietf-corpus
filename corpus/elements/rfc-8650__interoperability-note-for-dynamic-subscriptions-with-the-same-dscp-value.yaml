document: rfc-8650
kind: interoperability-note
summary: For dynamic subscriptions with the same DSCP value to a specific publisher, it is recommended that the subscriber sends all URI GET requests on a common HTTP/2 session; a subscriber cannot use a common HTTP/2 session for subscriptions with different DSCP values.
section: "4"
topics:
