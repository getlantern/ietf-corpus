document: rfc-1342
kind: design-rationale
summary: The 'Q' encoding is recommended for Latin character sets because it allows text containing mostly ASCII characters to remain decipherable on an ASCII terminal without decoding, while 'B' (BASE64) is recommended for non-Latin sets where this property is less valuable.
