document: rfc-5088
kind: normative-requirement
summary: A change in the state of a PCE (activate, deactivate, or parameter change) MUST result in a corresponding change in the PCED TLV information advertised. A change in PCED TLV information MUST NOT trigger any SPF computation at a receiving router.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
