document: rfc-3049
kind: protocol-element
summary: The security attribute in the TN3270E service template specifies the security technique supported, with defined values NONE and SSLV3. Supported ciphersuites include NULL_NULL, NULL_MD5, NULL_SHA, RC4_MD5_EXPORT, RC4_MD5_US, RC4_SHA_US, RC2_MD5_EXPORT, DES_SHA_EXPORT, and TRIPLE_DES_SHA_US.
section: "7.1"
topics:
