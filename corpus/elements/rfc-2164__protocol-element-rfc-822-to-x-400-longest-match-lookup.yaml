document: rfc-2164
kind: protocol-element
summary: 'RFC-822-to-X.400 longest-match lookup: (1) derive a directory name from the domain part of the RFC 822 address; (2) look it up in the RFC-822-to-X.400 subtree for associatedORAddress or associatedX400Gateway; if multiple associatedX400Gateway values are present the MTA may choose which to use. Mapping is always achievable in two lookups.'
section: "4"
