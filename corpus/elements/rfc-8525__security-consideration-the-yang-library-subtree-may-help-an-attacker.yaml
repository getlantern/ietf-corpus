document: rfc-8525
kind: security-consideration
summary: The '/yang-library' subtree may help an attacker identify server capabilities and implementations with known bugs, since the set of supported YANG modules can reveal device type and manufacturer. Server vulnerabilities may be specific to particular modules, revisions, features, or deviations.
section: "6"
topics:
    - security
    - yang
    - netconf
