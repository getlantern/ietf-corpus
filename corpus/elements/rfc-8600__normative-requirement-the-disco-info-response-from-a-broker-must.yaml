document: rfc-8600
kind: normative-requirement
summary: The disco#info response from a Broker MUST include an XMPP data form (XEP-0004) with a 'pubsub#type' field that specifies the supported namespace (e.g., the IODEF namespace) so Platforms can identify which Topics match their data format.
section: "5"
rfc2119_level: MUST
topics:
