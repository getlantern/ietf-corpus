document: rfc-9463
kind: wire-format
summary: The IPv6 RA Encrypted DNS option has an 8-bit Type (144), 8-bit Length (in units of 8 octets), 16-bit Service Priority, 32-bit Lifetime, 16-bit ADN Length, variable authentication-domain-name, optional 16-bit Addr Length with IPv6 addresses, 16-bit SvcParams Length, and variable SvcParams. The full option MUST be padded to a multiple of 8 octets.
section: "6.1"
topics:
    - dns
    - ip
