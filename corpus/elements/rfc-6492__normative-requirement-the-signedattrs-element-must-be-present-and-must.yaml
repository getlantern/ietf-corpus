document: rfc-6492
kind: normative-requirement
summary: The signedAttrs element MUST be present and MUST include the content-type and message-digest attributes. Either the signing-time attribute or the binary-signing-time attribute, or both, MUST be present. Other signed attributes MUST NOT be included, and unsignedAttrs MUST be omitted.
section: 3.1.1.6.4
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
