document: rfc-9746
kind: protocol-element
summary: The ESI Label-based split-horizon procedure uses an MPLS label corresponding to the source ESI appended by the ingress NVE. The egress NVE checks this label before forwarding a multi-destination frame to a local ES interface; if it matches the ESI of that interface, the frame is dropped to prevent BUM loops.
section: "1.2"
topics:
    - mpls
    - routing
