document: rfc-6440
kind: normative-requirement
summary: A DHCPv6 client that does not know the ERP LDN and requires the server to provide it MUST include an Option Request option requesting OPTION_ERP_LOCAL_DOMAIN_NAME, as described in RFC 3315 Section 22.7.
