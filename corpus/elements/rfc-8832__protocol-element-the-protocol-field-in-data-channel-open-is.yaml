document: rfc-8832
kind: protocol-element
summary: The Protocol field in DATA_CHANNEL_OPEN is a variable-length UTF-8 string identifying the application protocol; an empty string means unspecified, and a non-empty string MUST be a value registered in the WebSocket Subprotocol Name Registry (RFC 6455). No uniqueness is guaranteed.
section: "5.1"
topics:
