document: rfc-7813
kind: interoperability-note
summary: IS-IS PCR does not use the MRT Profile specified in RFC 7812; it only relies on the algorithm specification in RFC 7811 (MRT Lowpoint algorithm). Both the MRT ECT Algorithm and the MRTG ECT Algorithm use this algorithm.
