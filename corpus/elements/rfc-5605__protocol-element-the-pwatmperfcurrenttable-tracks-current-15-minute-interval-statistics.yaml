document: rfc-5605
kind: protocol-element
summary: The pwAtmPerfCurrentTable tracks current 15-minute interval statistics per ATM PW, including pwAtmPerfCurrentMissingPkts, pwAtmPerfCurrentPktsReOrder, pwAtmPerfCurrentPktsMisOrder, pwAtmPerfCurrentPktsTimeout, pwAtmPerfCurrentCellsXmit, pwAtmPerfCurrentCellsDropped, pwAtmPerfCurrentCellsReceived, and pwAtmPerfCurrentUnknownCells (N:1 mode only). After 15 minutes, counts are copied to the interval table and reset.
section: "9"
topics:
