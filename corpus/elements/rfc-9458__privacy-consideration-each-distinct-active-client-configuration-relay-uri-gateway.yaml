document: rfc-9458
kind: privacy-consideration
summary: Each distinct active Client configuration (relay URI, gateway key config, gateway URI) partitions the Client anonymity set. Using unique or small-group configurations could enable tracking of individual Clients. Preventing unique configurations and ensuring consistency across Clients is critical to privacy.
section: "7"
topics:
    - privacy
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
