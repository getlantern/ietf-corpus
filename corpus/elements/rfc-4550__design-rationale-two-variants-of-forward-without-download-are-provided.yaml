document: rfc-4550
kind: design-rationale
summary: 'Two variants of ''forward without download'' are provided: BURL/CATENATE (assembly on the IMAP server, reducing round-trips when the message is already staged there) and BURL/CHUNKING (assembly during submission, allowing interleaving of new data and referenced parts). The choice allows flexibility for different deployment scenarios.'
section: "2.4"
