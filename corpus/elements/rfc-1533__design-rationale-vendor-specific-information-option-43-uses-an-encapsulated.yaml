document: rfc-1533
kind: design-rationale
summary: Vendor-specific information (option 43) uses an encapsulated TLV sub-option format without a magic cookie, allowing vendors to redefine option codes within the encapsulated space while still following the standard tag-length-value syntax. This avoids code space conflicts between vendors while reusing the proven TLV framing.
section: "8.4"
topics:
