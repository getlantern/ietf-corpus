document: rfc-7394
kind: wire-format
summary: 'The TTL TLV has Type=32769, Length=8, and contains an 8-bit Value field (the TTL), an 8-bit Reserved field, and a 16-bit Flags field. The Flags field contains a single defined bit: the R (Reply TTL) flag at bit 15; all other bits are MBZ.'
