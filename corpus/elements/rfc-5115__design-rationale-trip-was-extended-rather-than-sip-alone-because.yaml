document: rfc-5115
kind: design-rationale
summary: TRIP was extended rather than SIP alone because TRIP is the protocol responsible for advertising gateway reachability and capabilities across ITADs; without a TRIP attribute, there was no mechanism to disseminate which gateways support a given Resource-Priority NameSpace.
section: "3.2"
topics:
