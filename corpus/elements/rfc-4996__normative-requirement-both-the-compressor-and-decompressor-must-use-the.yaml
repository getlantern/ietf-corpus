document: rfc-4996
kind: normative-requirement
summary: 'Both the compressor and decompressor MUST use the fixed item-table mappings for TCP options list compression: NOP=0, EOL=1, MSS=2, WSCALE=3, TIMESTAMP=4, SACK-PERMITTED=5, SACK=6, Generic options=7-15.'
section: 6.3.4
