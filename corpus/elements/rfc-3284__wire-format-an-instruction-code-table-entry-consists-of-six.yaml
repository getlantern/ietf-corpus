document: rfc-3284
kind: wire-format
summary: An instruction code table entry consists of six fields (inst1, size1, mode1, inst2, size2, mode2), each a single unsigned byte. The 256-entry table is referenced by a single-byte index in the instructions array; if a size field is zero, the actual size is encoded separately as an integer following the index.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
