document: rfc-2534
kind: protocol-element
summary: The 'dpi' feature tag indicates the resolution that the recipient can display or print without loss, measured in pixels per inch. Values are Rational to accommodate SI-based devices (e.g., dpi=19558/100 represents 77 dots per centimeter).
section: "2.2"
