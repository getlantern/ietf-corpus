document: rfc-6575
kind: normative-requirement
summary: All implementations MUST support manual configuration of the IPv4 address of the local CE. Manual configuration is the only REQUIRED mode for a PE to support; all other IPv4 address discovery mechanisms (traffic monitoring, ARP, Inverse ARP, PPP, Router Discovery) are optional.
section: 4.1.6
rfc2119_level: MUST
topics:
    - vpn
