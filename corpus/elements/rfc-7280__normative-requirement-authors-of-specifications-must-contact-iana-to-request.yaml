document: rfc-7280
kind: normative-requirement
summary: Authors of specifications MUST contact IANA to request a new value to be allocated in the ULE Next-Header registry. An IANA-allocated value uniquely identifies the method, and such an allocation is REQUIRED for any method that is to be standardised.
section: "3.3"
rfc2119_level: MUST
topics:
    - registry
