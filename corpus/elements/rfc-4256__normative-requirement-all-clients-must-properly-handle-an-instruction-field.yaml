document: rfc-4256
kind: normative-requirement
summary: All clients MUST properly handle an instruction field with embedded newlines, and SHOULD be able to display at least 30 characters for name and prompt fields. If truncation occurs, there MUST be an obvious indication.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
