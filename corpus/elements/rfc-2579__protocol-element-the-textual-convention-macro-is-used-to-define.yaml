document: rfc-2579
kind: protocol-element
summary: The TEXTUAL-CONVENTION macro is used to define new data types for SMIv2 MIB modules. Each definition includes a DISPLAY-HINT, STATUS, DESCRIPTION, optional REFERENCE, and SYNTAX clause. Objects using a textual convention are always encoded using the rules of their primitive type.
