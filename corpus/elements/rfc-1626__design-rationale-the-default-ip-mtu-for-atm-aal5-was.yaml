document: rfc-1626
kind: design-rationale
summary: The default IP MTU for ATM AAL5 was set to 9180 octets to match RFC 1209's MTU for IP over SMDS, since there is no good reason for them to differ given similar magnitudes; alignment reduces fragmentation and aids interoperability between the two technologies.
section: Default Value for IP MTU over ATM AAL5
topics:
    - ip
