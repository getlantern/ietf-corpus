document: rfc-2231
kind: design-rationale
summary: The asterisk character was chosen as the indicator for both the continuation count suffix and the character-set/language encoding suffix, reusing a symbol already excluded from parameter attribute syntax. Percent-sign encoding was reused from RFC 2047 to provide a lightweight mechanism for 8-bit octets in parameter values.
