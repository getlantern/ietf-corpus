document: rfc-5341
kind: design-rationale
summary: Rather than registering each predefined parameter value individually or creating a sub-registry per parameter, parameter values are registered by reference. The registry entry for a parameter contains references to the RFCs that define its accepted values, because parameters often take on a large number of values.
section: "3"
topics:
    - registry
