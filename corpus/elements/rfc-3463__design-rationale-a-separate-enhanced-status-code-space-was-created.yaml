document: rfc-3463
kind: design-rationale
summary: A separate enhanced status code space was created rather than extending SMTP reply codes to avoid consuming the remaining SMTP reply-code number space needed for new ESMTP extensions, and because any redistribution of SMTP codes would necessarily be incompatible with SMTP.
