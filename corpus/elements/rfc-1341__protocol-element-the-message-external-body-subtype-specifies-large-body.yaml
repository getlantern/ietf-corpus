document: rfc-1341
kind: protocol-element
summary: The 'message/External-body' subtype specifies large body content by reference to an external data source. The required 'access-type' parameter indicates the retrieval mechanism; defined access types include ftp, anon-ftp, tftp, local-file, afs, and mail-server.
section: 7.3.3
topics:
