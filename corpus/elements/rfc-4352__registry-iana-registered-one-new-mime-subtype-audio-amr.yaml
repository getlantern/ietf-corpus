kind: registry
summary: 'IANA registered one new MIME subtype: audio/AMR-WB+. Optional parameters include ''channels'' (1 or 2, default 2), ''interleaving'' (deinterleaving buffer size in transport frame slots), ''int-delay'' (minimum buffering delay in RTP timestamp ticks), ''ptime'', and ''maxptime''. This type is restricted to real-time RTP transport.'
