document: rfc-4064
kind: design-rationale
summary: Non-skippable extensions use a 16-bit Length field (long format) to permit data exceeding 256 bytes, while skippable extensions use an 8-bit Length field (short format) limiting data to less than 256 bytes, consistent with the existing Mobile IPv4 extension architecture.
section: "4"
topics:
