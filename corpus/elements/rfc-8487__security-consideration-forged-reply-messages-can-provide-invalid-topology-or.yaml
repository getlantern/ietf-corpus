document: rfc-8487
kind: security-consideration
summary: Forged Reply messages can provide invalid topology or traffic statistics. Mitigations include required source verification (Section 9.2), the need for an attacker to guess a 2-byte Query ID and dynamic source port, and recommended PIM neighbor authentication (Section 9.7.2) to block forged Replies from authorized but non-peer hosts.
section: 9.7.4
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
