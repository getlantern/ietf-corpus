document: rfc-7671
kind: normative-requirement
summary: DANE clients MUST send the SNI extension with a HostName value of the base domain of the TLSA RRset. Except for DANE-EE(3), DANE clients MUST verify the server name is listed in the server certificate's SAN or CN.
section: "10.2"
rfc2119_level: MUST
topics:
    - tls
    - dns
    - security
