document: rfc-5222
kind: registry
summary: This document registers the U-NAPTR application service tag 'LoST' and application protocol tags 'http' and 'https' for LoST server discovery via U-NAPTR/DDDS. LoST server names are DNS domain names resolved through U-NAPTR to obtain HTTP or HTTPS URLs.
