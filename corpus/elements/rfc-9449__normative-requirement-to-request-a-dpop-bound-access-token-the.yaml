document: rfc-9449
kind: normative-requirement
summary: To request a DPoP-bound access token, the client MUST provide a valid DPoP proof JWT in the DPoP header at the token endpoint. This applies to all grant types. Invalid proofs result in an invalid_dpop_proof error response.
section: "5"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
