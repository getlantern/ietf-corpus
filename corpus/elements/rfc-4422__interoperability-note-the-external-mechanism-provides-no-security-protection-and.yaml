document: rfc-4422
kind: interoperability-note
summary: The EXTERNAL mechanism provides no security protection and is vulnerable to spoofing, active attack, and eavesdropping. It SHOULD only be used when adequate security services (e.g., TLS) have already been established externally.
section: A.3
topics:
    - security
    - tls
