document: rfc-5420
kind: wire-format
summary: Each Attributes TLV is encoded with a 16-bit Type field, a 16-bit Length field (total TLV length in octets including Type and Length), and a variable-length Value field. The entire TLV MUST be padded with zero to three trailing zeros to achieve four-octet alignment; padding octets are not counted in the Length field.
section: "3"
topics:
