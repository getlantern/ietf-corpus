document: rfc-9685
kind: normative-requirement
summary: When RFC 8928 is used to protect anycast or multicast address subscriptions, a key pair MUST be associated with the address before deployment, a ROVR MUST be generated from that key pair, and the key pair MUST be provisioned in each subscribing node.
section: "9"
rfc2119_level: MUST
topics:
