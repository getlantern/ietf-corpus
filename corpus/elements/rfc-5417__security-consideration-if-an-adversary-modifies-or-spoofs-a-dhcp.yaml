document: rfc-5417
kind: security-consideration
summary: If an adversary modifies or spoofs a DHCP server response, a WTP could be directed to a rogue CAPWAP AC that intercepts call requests or denies service. DTLS peer authentication is mandatory to counter this threat, and DHCP-based discovery alone SHOULD NOT be relied upon in security-sensitive environments.
section: "5"
topics:
    - security
    - tls
