document: rfc-8166
kind: protocol-element
summary: Credit-based flow control is implemented via the rdma_credit field present in every RPC-over-RDMA message. Requesters send a requested credit value; Responders reply with a granted credit value indicating how many concurrent outstanding requests they can accept. The granted value must never be zero.
section: 3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
