document: rfc-3883
kind: normative-requirement
summary: Neighbor probing must be restricted to neighbors for which a circuit is actually established at the time probing is initiated, to avoid falsely declaring temporarily unreachable (oversubscribed) neighbors as down.
section: "2"
rfc2119_level: SHOULD
