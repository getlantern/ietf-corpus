summary: This document was motivated by analytic weaknesses found in SHA-1 (Wang et al., CRYPTO 2005), prompting the IETF to move away from SHA-1 toward stronger hash algorithms such as SHA-256 and SHA-384 for TLS ECC cipher suites.
