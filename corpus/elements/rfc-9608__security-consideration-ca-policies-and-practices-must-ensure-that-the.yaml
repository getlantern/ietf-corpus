document: rfc-9608
kind: security-consideration
summary: CA policies and practices MUST ensure that the noRevAvail extension is included only when appropriate; misuse or misconfiguration could result in a relying party continuing to trust a revoked certificate, and the only remediation for discovered misuse is revocation of the CA itself.
