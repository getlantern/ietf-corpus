document: rfc-5004
kind: normative-requirement
summary: The algorithm SHOULD NOT be applied when both paths are from peers with an identical BGP identifier, i.e., when parallel BGP sessions exist between two BGP speakers, to preserve peering address allocation as a route selection tool.
