document: rfc-9572
kind: wire-format
summary: The S-PMSI A-D route (Type 10) extends the RFC 7117 format by adding an Ethernet Tag ID (4 octets) and Originator's Address Length (1 octet) plus Originator's Address (4 or 16 octets). Multicast Source and Group fields are variable length, prefixed by length octets.
section: "3.2"
topics:
    - mpls
    - routing
    - multicast
