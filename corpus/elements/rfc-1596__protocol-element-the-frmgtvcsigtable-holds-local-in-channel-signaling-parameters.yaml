summary: 'The frMgtVCSigTable holds Local In-Channel Signaling parameters per UNI/NNI port: user-side N391 (default 6), N392 (default 3), N393 (default 4), T391 (default 10 s); network-side N392 (default 3), N393 (default 4), T392 (default 15 s), LMI-specific nN4 (fixed 5) and nT3 (default 20 s). Counters track link reliability errors, protocol errors, and channel-inactive events for both user and network sides.'
