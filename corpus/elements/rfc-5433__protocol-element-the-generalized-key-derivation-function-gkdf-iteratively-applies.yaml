document: rfc-5433
kind: protocol-element
summary: 'The Generalized Key Derivation Function (GKDF) iteratively applies the ciphersuite MAC function: for i=1 to ceiling(X/ML), result = result || MAC_Y(i || Z), then truncates to X octets. The counter i is a 2-octet network-byte-order integer.'
