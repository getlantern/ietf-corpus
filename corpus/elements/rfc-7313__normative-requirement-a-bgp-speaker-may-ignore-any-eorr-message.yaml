document: rfc-7313
kind: normative-requirement
summary: A BGP speaker MAY ignore any EoRR message received without a prior associated BoRR message; such messages MAY be logged. An implementation MAY impose a locally configurable upper bound on stale route retention, after which stale routes MAY be removed without waiting for EoRR.
section: "4"
rfc2119_level: MAY
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
