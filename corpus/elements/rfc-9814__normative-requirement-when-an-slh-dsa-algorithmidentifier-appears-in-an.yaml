document: rfc-9814
kind: normative-requirement
summary: When an SLH-DSA AlgorithmIdentifier appears in an X.509 SubjectPublicKeyInfo, the certificate key usage extension MAY contain digitalSignature, nonRepudiation, keyCertSign, and cRLSign, and MUST NOT contain any other key usage values.
section: "3"
rfc2119_level: MUST NOT
topics:
