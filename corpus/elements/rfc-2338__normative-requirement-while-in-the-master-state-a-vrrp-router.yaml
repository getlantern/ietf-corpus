document: rfc-2338
kind: normative-requirement
summary: While in the Master state, a VRRP router MUST respond to ARP requests for virtual router IPs with the virtual MAC address, MUST forward packets to the virtual router MAC address, and MUST NOT accept packets to virtual router IPs unless it is the IP address owner.
section: 6.4.3
rfc2119_level: MUST
topics:
    - routing
    - ip
