document: rfc-3986
kind: normative-requirement
summary: A base URI for relative reference resolution MUST conform to the absolute-URI syntax rule and MUST be stripped of any fragment component before use. When a retrieval was the result of a redirect, the last URI used (the URI that resulted in actual retrieval) SHALL be considered the base URI.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
