document: rfc-8489
kind: registry
summary: This document creates the STUN Password Algorithms Registry for use with the PASSWORD-ALGORITHM attribute. Initial entries are MD5 (0x0001, key length 16 bytes) and SHA-256 (0x0002, key length 32 bytes). New algorithms require Expert Review.
