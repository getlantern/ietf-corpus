document: rfc-8784
kind: design-rationale
summary: 'The optional mandatory_or_not flag and NO_PPK_AUTH fallback mechanism were designed to enable incremental deployment without network disruption: upgraded nodes interoperate with unupgraded nodes, and PPK can be made mandatory as a second step after all nodes are upgraded.'
