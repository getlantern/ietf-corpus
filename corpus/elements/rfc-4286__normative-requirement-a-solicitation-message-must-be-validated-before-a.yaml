document: rfc-4286
kind: normative-requirement
summary: 'A Solicitation message MUST be validated before a response is sent: checksum must be correct, destination MUST be All-Routers multicast address, and for IPv6 the source MUST be a link-local address. Invalid solicitations SHOULD be silently discarded.'
section: "4.4"
rfc2119_level: MUST
topics:
    - multicast
