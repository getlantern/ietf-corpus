summary: 'The external-prefix-tlv grouping is shared by E-AS-External-LSA and E-NSSA-LSA. It carries external prefix flags (E-bit for Type 1/2 metric), metric, prefix, prefix-options, and sub-TLVs: ipv6-fwd-addr-sub-tlv, ipv4-fwd-addr-sub-tlv, route-tag-sub-tlv, and unknown-sub-tlv.'
