document: rfc-7937
kind: security-consideration
summary: CDNI Logging File exchanges MUST be protected using authentication, authorization, confidentiality, and integrity mechanisms. TLS is the recommended transport-layer mechanism; the established-origin directive can record the authenticated identity of the transmitting entity.
section: "7.1"
