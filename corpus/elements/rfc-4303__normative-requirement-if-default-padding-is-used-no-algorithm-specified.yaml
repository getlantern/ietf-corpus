document: rfc-4303
kind: normative-requirement
summary: If default padding is used (no algorithm-specified content), Padding bytes MUST be the sequence 1, 2, 3, … and receivers SHOULD inspect and verify the Padding field before removing it. If an algorithm constrains padding values, those constraints MUST be specified in the algorithm's RFC.
section: "2.4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
