document: rfc-7756
kind: protocol-element
summary: A node-based Edge Relay is implemented as a logical software function running inside an IPv6 node's operating system. It assigns the IPv4 Service Address to a virtual network adapter and installs a default IPv4 route, providing AF_INET socket connectivity for applications. Native IPv6 connectivity is unaffected and coexists.
section: "3.1"
topics:
