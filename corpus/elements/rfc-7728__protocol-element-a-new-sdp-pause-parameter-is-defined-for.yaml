document: rfc-7728
kind: protocol-element
summary: 'A new SDP ''pause'' parameter is defined for the ''ccm'' rtcp-fb attribute, indicating capability for PAUSE/RESUME/PAUSED/REFUSED. It has two optional sub-attributes: ''nowait'' (permits hold-off period of 0 when only a single receiver exists) and ''config'' (values 1-8 describing partial implementation subsets for different deployment roles).'
section: "9"
