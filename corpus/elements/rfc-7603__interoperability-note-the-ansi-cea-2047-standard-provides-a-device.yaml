document: rfc-7603
kind: interoperability-note
summary: The ANSI/CEA-2047 standard provides a device-identification, current-power-level, and cumulative-energy-consumption information model for home appliances across Wi-Fi, Ethernet, ZigBee, Z-Wave, and Bluetooth. It is intended as a base model for other groups to build protocol-specific implementations, overlapping with EMAN's scope for residential devices.
section: 4.1.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
