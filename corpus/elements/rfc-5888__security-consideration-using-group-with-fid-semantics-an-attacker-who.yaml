document: rfc-5888
kind: security-consideration
summary: Using 'group' with FID semantics, an attacker who can modify exchanged session descriptions could force participants to send media copies to an arbitrary destination. Integrity mechanisms such as S/MIME (end-to-end) or TLS (hop-by-hop) in SIP MUST be used to prevent this attack.
section: "11"
topics:
