document: rfc-5547
kind: protocol-element
summary: The 'file-range' attribute specifies start and stop byte offsets (1-based, inclusive) for partial file transfer, enabling interrupted transfers to be resumed. A '*' stop offset indicates unknown total size. Absence implies the whole file (1-*).
