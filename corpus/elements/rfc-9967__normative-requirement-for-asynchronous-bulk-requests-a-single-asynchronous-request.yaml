document: rfc-9967
kind: normative-requirement
summary: For asynchronous bulk requests, a single Asynchronous Request Completion Event MUST be generated for each requested operation. The 'txn' claim MUST be set to the original value appended with ':' and the zero-based array index of the operation.
section: 2.5.1.2
rfc2119_level: MUST
topics:
