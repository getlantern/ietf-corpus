document: rfc-3801
kind: protocol-element
summary: 'The Sensitivity header field, borrowed from X.400, carries one of three values: Personal, Private, or Company-Confidential. Only ''Private'' has VPIM-defined enforcement semantics; ''Personal'' and ''Company-Confidential'' MAY be ignored by receiving systems.'
section: 4.2.13
