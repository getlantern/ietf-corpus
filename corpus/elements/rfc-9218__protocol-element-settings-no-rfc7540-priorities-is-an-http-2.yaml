document: rfc-9218
kind: protocol-element
summary: SETTINGS_NO_RFC7540_PRIORITIES is an HTTP/2 settings parameter (code 0x9, initial value 0) that allows endpoints to signal they will not use or will ignore RFC 7540 stream priority signals. A value of 1 means the sender will not use HTTP/2 priority signals.
section: "2.1"
topics:
    - http
