document: rfc-4178
kind: normative-requirement
summary: When the initiator's preferred mechanism is not accepted or is not the acceptor's most preferred (requiring MIC exchange), the acceptor MUST output a negotiation token containing a request-mic state and indicate GSS_S_CONTINUE_NEEDED.
