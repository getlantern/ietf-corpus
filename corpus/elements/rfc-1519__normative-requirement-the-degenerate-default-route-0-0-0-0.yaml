document: rfc-1519
kind: normative-requirement
summary: The degenerate default route 0.0.0.0 mask 0.0.0.0 MUST be accepted by all implementations. It should never be advertised via the inter-domain protocol unless specific configuration explicitly permits doing so.
section: "4.2"
rfc2119_level: MUST
