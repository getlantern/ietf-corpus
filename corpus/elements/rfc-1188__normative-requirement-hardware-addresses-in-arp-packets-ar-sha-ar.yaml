document: rfc-1188
kind: normative-requirement
summary: Hardware addresses in ARP packets (ar$sha, ar$tha) must be carried in canonical bit order, with the Group bit as the low order bit of the first octet. Because FDDI normally places the Group bit in the high order position, addresses must be bit-reversed within each octet.
section: Address Resolution
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
