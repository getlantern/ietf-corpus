document: rfc-9930
kind: security-consideration
summary: When a Phase 1 server and Phase 2 (Inner Method) server are separate entities, the Phase 1 server acts as an on-path attacker relative to the inner authentication. Deployments MUST ensure the Phase 2 server can trust the Phase 1 server, and implementations SHOULD be aware that separating these roles creates additional trust assumptions.
section: "8.3"
topics:
    - security
