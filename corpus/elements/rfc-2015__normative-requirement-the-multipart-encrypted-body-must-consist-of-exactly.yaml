document: rfc-2015
kind: normative-requirement
summary: 'The multipart/encrypted body MUST consist of exactly two parts: the first with content type application/pgp-encrypted containing a ''Version: 1'' field, and the second with content type application/octet-stream containing the actual encrypted data.'
