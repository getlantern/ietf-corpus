document: rfc-9644
kind: protocol-element
summary: 'The ''client-identity'' container supports five authentication methods, each enabled by a separate feature: public-key (inline or keystore reference), password, hostbased (inline or keystore reference), none, and certificate (X.509v3, requires ssh-x509-certs feature). Methods are unordered.'
