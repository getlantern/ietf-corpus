document: rfc-3321
kind: wire-format
summary: The 'remaining SigComp message' field format is an implementation decision by the compressor supplying the UDVM bytecode. RFC 3321 provides only a non-normative example (Figure 5) showing a flags byte with 's' (shared state present), 'a' (acked state present), and 'r' (shared state of this message saved) bits, followed by optional shared_state_id and acked_state_id fields.
section: "6.1"
