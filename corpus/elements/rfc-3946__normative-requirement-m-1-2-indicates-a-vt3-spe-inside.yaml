document: rfc-3946
kind: normative-requirement
summary: M=1..2 indicates a VT3 SPE inside a VT Group; these values MUST NOT be used for SDH since there is no SDH equivalent of VT3. M=3..5 indicates VT2_SPE/VC-12, and M=6..9 indicates VT1.5_SPE/VC-11 within the VT_Group/TUG-2.
section: "3"
rfc2119_level: MUST NOT
