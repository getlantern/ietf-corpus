document: rfc-6956
kind: protocol-element
summary: 'Four IP forwarding LFBs are defined: IPv4UcastLPM and IPv6UcastLPM perform longest-prefix-match lookups on destination addresses to produce a HopSelector metadata; IPv4NextHop and IPv6NextHop use the HopSelector to look up next-hop tables containing L3PortID, MTU, next-hop IP address, MediaEncapInfoIndex, and LFBOutputSelectIndex.'
section: "5.3"
topics:
