document: rfc-3224
kind: design-rationale
summary: Vendors who wish to extend SLPv2 privately sacrifice ubiquitous automatic configuration, which is the primary benefit of a standard service discovery framework. For this reason, registration of service templates with IANA is strongly encouraged as the preferred alternative.
section: "1.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
