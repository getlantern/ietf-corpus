document: rfc-3770
kind: normative-requirement
summary: In cases where a human user is unavailable, each potential certificate MAY be tried until one succeeds; however, sequentially trying each certificate is RECOMMENDED only when user selection is unavailable or impractical, because doing so discloses the list of SSIDs associated with each certificate.
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - pkix
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
