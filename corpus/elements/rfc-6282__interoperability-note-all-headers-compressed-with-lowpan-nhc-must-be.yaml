document: rfc-6282
kind: interoperability-note
summary: All headers compressed with LOWPAN_NHC must be contiguous — each encoded header must immediately follow a header encoded with LOWPAN_IPHC or LOWPAN_NHC. A plain uncompressed header in the chain breaks the encoding and prevents further LOWPAN_NHC use.
section: "4.2"
topics:
    - ip
