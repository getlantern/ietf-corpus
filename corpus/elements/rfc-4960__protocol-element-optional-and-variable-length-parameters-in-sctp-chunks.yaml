document: rfc-4960
kind: protocol-element
summary: 'Optional and variable-length parameters in SCTP chunks use a TLV format: Parameter Type (16 bits), Parameter Length (16 bits, inclusive of type and length), and variable Parameter Value padded to a 4-byte multiple. Parameter types MUST be unique across all chunk types.'
section: 3.2.1
topics:
    - sctp
