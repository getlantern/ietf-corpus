document: rfc-9809
kind: normative-requirement
summary: Per RFC 5280 Section 4.2.1.12, if the EKU extension is present, the certificate MUST only be used for one of the purposes indicated; if multiple purposes are indicated, the application need not recognize all of them as long as the intended purpose is present.
