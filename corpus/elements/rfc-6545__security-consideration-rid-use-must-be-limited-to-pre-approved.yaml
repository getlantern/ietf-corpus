document: rfc-6545
kind: security-consideration
summary: RID use must be limited to pre-approved, authorized purposes only. Requests must be legitimate incidents and MUST NOT be used for sabotage or censorship (e.g., rate-limiting legitimate traffic to suppress content or sabotage competitors). Abuse prevention policies must be established through peering or consortium agreements.
section: "3.1"
topics:
    - security
