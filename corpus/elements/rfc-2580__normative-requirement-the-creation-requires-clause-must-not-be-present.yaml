document: rfc-2580
kind: normative-requirement
summary: The CREATION-REQUIRES clause must not be present unless the object named in the VARIATION clause is a conceptual row (has a syntax resolving to a SEQUENCE). All objects named in CREATION-REQUIRES that are columnar objects of the row must have an access level of 'read-create'.
section: 6.5.2.4
rfc2119_level: MUST NOT
topics:
    - snmp
