document: rfc-9796
kind: design-rationale
summary: 'RCD insertion is intended to be singular: the receiving party should not be required to make call-specific decisions based on redundant, duplicate, or conflicting RCD. Information should be added by an authoritative party or translated from a verified STIR RCD PASSporT and left unmodified.'
