document: rfc-8205
kind: normative-requirement
summary: A BGPsec speaker MUST NOT announce the BGPsec capability unless it also supports the BGP multiprotocol extension (RFC 4760) and MUST NOT advertise BGPsec support for a particular AFI unless it has also advertised the multiprotocol extension capability for that AFI.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
