document: rfc-3648
kind: normative-requirement
summary: For ORDERPATCH, when multiple changes are requested and any problem is encountered, the server MUST return a 207 Multi-Status response containing DAV:response elements for either the request-URI (if DAV:ordering-type could not be modified) or URIs of members whose repositioning failed.
section: "7"
rfc2119_level: MUST
topics:
    - http
