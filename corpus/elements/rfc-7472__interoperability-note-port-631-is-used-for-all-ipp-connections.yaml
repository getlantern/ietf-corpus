document: rfc-7472
kind: interoperability-note
summary: Port 631 is used for all IPP connections (with or without TLS), per IESG direction. Therefore port 631 is used for both 'ipp' and 'ipps' URIs. CUPS source code is referenced as an example of incoming connection handling for this dual use.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
