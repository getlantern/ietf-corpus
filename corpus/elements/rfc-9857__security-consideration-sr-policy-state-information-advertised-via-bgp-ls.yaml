document: rfc-9857
kind: security-consideration
summary: SR Policy state information advertised via BGP-LS reveals detailed network topology, path computation constraints, and forwarding plane state; this information MUST be protected using the security mechanisms available for BGP-LS as specified in RFC 9552, including BGP session security measures such as those defined in RFC 5925.
section: "9"
topics:
    - security
    - routing
    - bgp
