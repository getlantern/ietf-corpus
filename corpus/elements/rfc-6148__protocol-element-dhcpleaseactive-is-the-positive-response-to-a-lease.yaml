document: rfc-6148
kind: protocol-element
summary: DHCPLEASEACTIVE is the positive response to a lease query by Remote ID, indicating an active lease exists for the queried Remote ID. It includes the most recently assigned IP in ciaddr and all associated IP addresses in the Associated-IP option.
section: "4.2"
