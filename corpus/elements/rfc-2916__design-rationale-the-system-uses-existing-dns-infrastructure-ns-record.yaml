document: rfc-2916
kind: design-rationale
summary: The system uses existing DNS infrastructure (NS record delegation and NAPTR records) to enable decentralized lookup with distributed management at different levels, rather than a centralized database. This allows E.164 number holders to manage their own DNS zones.
