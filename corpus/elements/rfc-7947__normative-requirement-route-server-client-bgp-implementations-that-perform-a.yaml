document: rfc-7947
kind: normative-requirement
summary: Route server client BGP implementations that perform a check that the leftmost AS in AS_PATH equals the sending peer's AS MUST allow this check to be disabled, and SHOULD allow it to be disabled on a per-peer basis.
section: 2.2.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
