document: rfc-1256
kind: design-rationale
summary: High packet-loss links are accommodated by increasing the router advertisement rate rather than increasing the number of solicitations hosts are permitted to send. This keeps host solicitation behavior bounded while allowing administrators to tune reliability via router configuration.
