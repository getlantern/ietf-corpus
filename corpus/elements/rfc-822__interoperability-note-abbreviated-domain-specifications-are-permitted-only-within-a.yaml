document: rfc-822
kind: interoperability-note
summary: Abbreviated domain specifications are permitted only within a sub-domain when sender and recipient share common right-hand sub-domain components. When messages cross domain boundaries, all addresses must be fully qualified. Mail relays are responsible for expansion but may not find abbreviations in message bodies.
section: 6.2.2
topics:
    - email
