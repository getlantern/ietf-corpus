document: rfc-4092
kind: design-rationale
summary: The sdp-anat option-tag was introduced because ANAT-unaware answerers exhibit unpredictable behavior (establishing too many streams, rejecting with non-informative errors) when receiving ANAT-grouped SDP offers, necessitating an explicit capability signal in SIP.
