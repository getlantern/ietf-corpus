document: rfc-4013
kind: normative-requirement
summary: SASLprep requires checking bidirectional strings as described in StringPrep Section 6. For example, a string containing an Arabic letter followed by a digit (U+0627 U+0031) is rejected as a bidirectional check error.
section: "2.4"
rfc2119_level: REQUIRED
