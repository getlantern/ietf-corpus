document: rfc-7268
kind: normative-requirement
summary: The Network-Id-Name Attribute MUST NOT be used to encode the IEEE 802.11 SSID; the Called-Station-Id Attribute is used for that purpose per RFC 3580. When used with IEEE 802.1X wired networks, the Called-Station-Id Attribute SHOULD contain only the MAC address, with the NID-Name carried in the Network-Id-Name Attribute.
section: "2.7"
rfc2119_level: MUST NOT
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
