document: rfc-9244
kind: protocol-element
summary: The Telemetry Setup Identifier ('tsid') is a DOTS-client-generated uint32 that uniquely identifies a telemetry setup configuration request. It MUST increase monotonically whenever new configuration parameters need to be conveyed, and a higher 'tsid' automatically supersedes and deletes lower-valued entries at the server.
section: 7.1.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
