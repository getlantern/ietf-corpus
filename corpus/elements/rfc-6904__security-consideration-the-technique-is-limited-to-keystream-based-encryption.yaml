document: rfc-6904
kind: security-consideration
summary: The technique is limited to keystream-based encryption transforms (e.g., CTR, f8) that generate a pseudorandom keystream for XOR with plaintext. It cannot be applied to block cipher modes such as ECB or CBC that do not produce a keystream.
