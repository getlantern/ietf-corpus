document: rfc-2851
kind: design-rationale
summary: A generic Internet address is represented as a pair of InetAddressType and InetAddress objects rather than a single object. This allows the display characteristics of each address type to be expressed independently and keeps the set of Internet address types extensible without breaking existing MIBs.
section: "1"
topics:
