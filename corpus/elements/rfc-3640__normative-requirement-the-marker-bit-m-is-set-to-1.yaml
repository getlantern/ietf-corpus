document: rfc-3640
kind: normative-requirement
summary: The marker bit (M) is set to 1 to indicate that the RTP packet payload contains either the final fragment of a fragmented Access Unit or one or more complete Access Units. Fragments of the same AU have the same timestamp but different RTP sequence numbers.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
