document: rfc-9739
kind: interoperability-note
summary: PIM Light supports the PORT reliable transport mechanism (RFC 6559) over TCP or SCTP (destination port 8471). Because Hello messages are absent, the Connection ID must be configured on each PLI endpoint; for TCP, each end must be explicitly configured as active or passive transport open to avoid call collision.
section: "3.5"
topics:
    - multicast
    - routing
    - tcp
    - sctp
