document: rfc-6674
kind: protocol-element
summary: When GRE with GRE Key (RFC 2890) is used as the softwire, the SWID is the GRE tunnel identifier and the CID is the GRE Key associated with the access device. This allows the network between the access gateway and AFTR to be IPv4-only, IPv6-only, or dual-stack.
section: "6"
topics:
