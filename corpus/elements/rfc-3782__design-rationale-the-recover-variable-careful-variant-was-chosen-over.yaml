document: rfc-3782
kind: design-rationale
summary: The 'recover' variable (Careful variant) was chosen over the simpler default (RFC 2582 base) because, without it, multiple Fast Retransmits can occur unnecessarily after a retransmit timeout when the sender retransmits packets already received, triggering three spurious duplicate ACKs.
