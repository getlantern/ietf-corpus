document: rfc-2213
kind: normative-requirement
summary: Most intSrvFlowEntry objects that are read-create in the base MIB may be reduced to read-only in a compliant implementation; the compliance statement grants MIN-ACCESS read-only for intSrvFlowType, intSrvFlowOwner, intSrvFlowDestAddr, intSrvFlowSenderAddr, intSrvFlowDestAddrLength, intSrvFlowSenderAddrLength, intSrvFlowProtocol, intSrvFlowDestPort, intSrvFlowPort, intSrvFlowInterface, intSrvFlowRate, intSrvFlowBurst, intSrvFlowWeight, intSrvFlowQueue, intSrvFlowMinTU, intSrvFlowMaxTU, and intSrvFlowStatus.
section: "3"
rfc2119_level: MAY
