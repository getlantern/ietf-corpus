document: rfc-5629
kind: design-rationale
summary: For presentation-capable UIs, HTTP POST is used as the interface between the UI and application because such UIs require an updated presentation every time user data is entered, which matches HTTP's request/response model. For presentation-free UIs, SIP NOTIFY is used instead because they merely transmit user input without needing a presentation update.
section: "6"
topics:
