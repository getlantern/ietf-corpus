document: rfc-1907
kind: normative-requirement
summary: The snmpBasicCompliance MODULE-COMPLIANCE requires that conforming SNMPv2 entities implement the mandatory groups snmpGroup, snmpSetGroup, systemGroup, and snmpBasicNotificationsGroup. The snmpCommunityGroup is additionally mandatory for entities supporting community-based authentication.
section: 2.6.1
rfc2119_level: REQUIRED
