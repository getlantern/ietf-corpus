document: rfc-6991
kind: protocol-element
summary: The dscp type is a uint8 restricted to range 0..63 representing a Differentiated Services Code Point for marking packets in a traffic stream, equivalent to SMIv2 Dscp from DIFFSERV-DSCP-TC. The ipv6-flow-label type is a uint32 restricted to 0..1048575 for IPv6 flow discrimination.
