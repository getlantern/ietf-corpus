document: rfc-5264
kind: normative-requirement
summary: For a modifying publication containing <pidf-diff>, the compositor MUST apply the included patch operations in sequence against its locally stored presence document. If the publication is an initial publication with <pidf-diff>, it MUST be rejected with an appropriate error response such as 400 (Invalid Partial Publication).
section: 4.3.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
