document: rfc-8025
kind: interoperability-note
summary: The NALP Dispatch Bit Pattern is only defined for the first octet in the packet (RFC 4944). Switching back to Page 0 for NALP inside a 6LoWPAN packet does not make sense, so the Page 0 Paging Dispatch (11 110000) may not actually occur in packets adhering to current 6LoWPAN specifications.
