document: rfc-8097
kind: normative-requirement
summary: If the router is configured to support this extension, it SHOULD attach the origin validation state extended community to BGP UPDATE messages sent to IBGP peers by mapping the computed validation state into the last octet of the extended community.
section: "2"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
