document: rfc-3075
kind: protocol-element
summary: The Signature element is the root element of an XML Signature, containing SignedInfo (required), SignatureValue (required), KeyInfo (optional), and zero or more Object elements. It may carry an optional Id attribute and MUST reside in the namespace http://www.w3.org/2000/09/xmldsig#.
