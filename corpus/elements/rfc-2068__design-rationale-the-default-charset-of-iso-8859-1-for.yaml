document: rfc-2068
kind: design-rationale
summary: The default charset of ISO-8859-1 for text types was made explicit in HTTP/1.1 because some HTTP/1.0 software incorrectly interpreted a missing charset parameter to mean 'recipient should guess.' HTTP/1.1 mandates a defined default to eliminate this ambiguity.
section: 3.7.1
topics:
    - http
