summary: 'Five SNMP NOTIFICATION-TYPEs are defined: adslAtucFailedFastRThreshTrap, adslAtucSesLThreshTrap, adslAtucUasLThreshTrap (ATU-C side), and adslAturSesLThreshTrap, adslAturUasLThreshTrap (ATU-R side), each fired the first time the corresponding 15-minute counter reaches or exceeds its configured threshold within a collection period.'
