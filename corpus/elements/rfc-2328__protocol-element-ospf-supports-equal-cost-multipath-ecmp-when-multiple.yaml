document: rfc-2328
kind: protocol-element
summary: 'OSPF supports equal-cost multipath (ECMP): when multiple equal-cost routes to a destination exist, all are discovered and traffic is distributed equally among them. No algorithmic changes are needed; the SPF tree naturally captures all equal-cost next hops.'
