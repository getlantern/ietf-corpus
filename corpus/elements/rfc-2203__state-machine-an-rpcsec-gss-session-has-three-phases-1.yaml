document: rfc-2203
kind: state-machine
summary: 'An RPCSEC_GSS session has three phases: (1) context creation, using RPCSEC_GSS_INIT then zero or more RPCSEC_GSS_CONTINUE_INIT exchanges until GSS_S_COMPLETE; (2) data exchange, with gss_proc=RPCSEC_GSS_DATA; (3) context destruction, using RPCSEC_GSS_DESTROY. Control messages use NULLPROC (procedure 0).'
section: "5"
