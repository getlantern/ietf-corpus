document: rfc-6184
kind: design-rationale
summary: H.264 parameter sets (SPS and PPS) are designed to be transmitted out-of-band (e.g., in SDP via sprop-parameter-sets) to create self-contained packets and allow parameter changes without synchronization with the slice packet stream. In-band transport is also supported for applications lacking a suitable out-of-band channel.
section: "1.2"
topics:
    - rtp
    - realtime
