document: rfc-5934
kind: interoperability-note
summary: 'TAMP recognizes three trust anchor formats: Certificate, TBSCertificate, and TrustAnchorInfo (RFC 5914). Implementations are not required to support all three; when an unsupported format is received, the unsupportedTrustAnchorFormat error MUST be returned. A trust anchor may not exist in multiple formats simultaneously.'
section: "3"
topics:
