document: rfc-4629
kind: protocol-element
summary: When a packet payload begins with a Picture, GOB, Slice, EOS, or EOSBS start code, the first two all-zero bytes of the start code shall be removed and replaced by setting the P bit to 1 in the payload header, improving compression ratio.
