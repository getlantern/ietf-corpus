document: rfc-5734
kind: state-machine
summary: 'An EPP session over TCP follows the sequence: TCP OPEN → TLS handshake → server sends <greeting> → client sends <login> and receives response → command/response exchanges → client sends <logout> → server closes TCP connection. A server MAY terminate idle or long-running sessions.'
