document: rfc-3939
kind: normative-requirement
summary: The date and time from the telephone system MAY be used in the existing Internet 'Date' header field. It is a local implementation decision whether the telephone-provided time or local system time is recorded.
section: "3.4"
rfc2119_level: MAY
