document: rfc-2462
kind: protocol-element
summary: Stateless address autoconfiguration combines a router-advertised prefix with an interface identifier to form a 128-bit IPv6 address. The interface identifier fills the right-most N bits, and the prefix fills the remaining 128-N bits.
