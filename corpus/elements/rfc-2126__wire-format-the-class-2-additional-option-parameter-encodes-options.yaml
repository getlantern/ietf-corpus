document: rfc-2126
kind: wire-format
summary: 'The Class 2 Additional Option parameter encodes options in individual bits: bit 1 = Transport Expedited Data Service, bit 4 = Reverse Connection procedure (vs. Forward Connection default), bit 6 = Expedited Data Acknowledgement, bit 7 = Non-blocking Expedited Data. Bits 2, 3, 5, and 8 are not applicable.'
