document: rfc-6376
kind: design-rationale
summary: The signing identity (SDID/AUID) is not required to match any particular header field such as From. This is intentional because of the broad methods of interpretation by recipient mail systems, and trust binding between the SDID and other identifiers is left to higher-level assessor policy.
section: "1.2"
topics:
    - email
    - security
