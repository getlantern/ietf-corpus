document: rfc-5065
kind: interoperability-note
summary: Confederations and route reflectors have been shown (RFC 3345) to cause permanent oscillation between candidate routes when using BGP tie-breaking rules. Care must be taken when selecting MED values and tie-breaking policy; one mitigation is configuring inter-Member-AS IGP metrics higher than intra-Member-AS IGP metrics.
section: "7"
topics:
    - bgp
    - routing
