document: rfc-6391
kind: interoperability-note
summary: The FAT-PW mechanism is described as complementary to, but distinct from, the MPLS Entropy Label proposal (RFC 6790 precursor). While both add a bottom-of-stack label for hash diversity, they differ in which network components impose the label and in their associated signalling mechanisms.
