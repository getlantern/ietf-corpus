document: rfc-4220
kind: protocol-element
summary: The teLinkDescriptorTable (teLinkObjects 2) holds interface switching capability descriptors for TE links, indexed by ifIndex and teLinkDescriptorId. Each descriptor specifies switching capability, encoding type, minimum LSP bandwidth, maximum LSP bandwidth at each of 8 priorities (0–7), MTU, and SONET/SDH indication.
