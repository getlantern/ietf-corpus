document: rfc-8431
kind: protocol-element
summary: 'The module defines seven RPC operations: rib-add and rib-delete (manage RIBs within a routing instance), route-add, route-delete, and route-update (manage routes with bulk operation support and optional failure detail), and nh-add and nh-delete (manage shared nexthops with server-allocated identifiers). All RPCs return success/failure result codes.'
