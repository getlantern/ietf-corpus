document: rfc-4331
kind: security-consideration
summary: Exposing DAV:quota-available-bytes could theoretically help an attacker identify collections with more available storage, but this does not actually make it easier to store files without authorization. Conversely, DAV:quota-used-bytes can help administrators detect storage tampering or misuse by revealing unexpected changes in usage.
section: "8"
topics:
