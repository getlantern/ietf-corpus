document: rfc-4092
kind: interoperability-note
summary: Many SIP servers do not include an SDP description in responses to OPTIONS requests, making it impossible to discover ANAT support via RFC 3388 grouping attributes alone; the sdp-anat option-tag in a Supported header field solves this discovery problem.
section: "4.3"
topics:
    - sip
