document: rfc-7239
kind: normative-requirement
summary: When proxies choose to use the "for" parameter, its default configuration SHOULD contain an obfuscated identifier. An IP address (and optionally port) MAY be used if the receiving server requires address-based functionality.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - http
    - privacy
