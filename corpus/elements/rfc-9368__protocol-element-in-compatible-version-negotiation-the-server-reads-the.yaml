document: rfc-9368
kind: protocol-element
summary: In compatible version negotiation, the server reads the client's Version Information to find a version it supports that is known to be compatible with the client's Chosen Version, converts the client's first flight to that version, and replies as if it received the converted first flight—no extra round trip is needed.
section: "2.3"
topics:
