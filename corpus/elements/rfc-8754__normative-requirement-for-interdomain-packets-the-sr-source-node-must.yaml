document: rfc-8754
kind: normative-requirement
summary: For interdomain packets, the SR source node MUST impose a flow label computed based on the inner packet per RFC 6438. At any transit node within an SR domain, the flow label MUST be used to calculate the ECMP hash toward the destination address.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
