document: rfc-8627
kind: security-consideration
summary: Confidentiality, integrity, and source authentication for FLEX FEC RTP packets should be provided by SRTP (RFC 3711), IPsec (RFC 4301), or DTLS (RFC 6347). A single mechanism is not sufficient for all deployments; the appropriate choice depends on application, transport, and signaling.
section: "9"
topics:
