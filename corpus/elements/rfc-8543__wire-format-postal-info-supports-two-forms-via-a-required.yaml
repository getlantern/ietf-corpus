document: rfc-8543
kind: wire-format
summary: 'Postal info supports two forms via a required ''type'' attribute: ''int'' (internationalized, content restricted to Unicode U+0020-U+007E) and ''loc'' (localized, unrestricted UTF-8). Up to two <org:postalInfo> elements may be present. The <org:name> field is a normalizedString of 1-255 characters; postal code (pc) is limited to 16 characters; country code (cc) is exactly 2 characters.'
section: "5"
