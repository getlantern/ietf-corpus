document: rfc-4719
kind: wire-format
summary: The L2TPv3 session header overhead N ranges from 4-16 octets for L2TPv3 over IP, and 16-28 octets for L2TPv3 over UDP, comprising Session ID (4 octets), Cookie (0/4/8 octets), and optional L2-Specific Sublayer (0/4 octets). The Flags/Ver/Res field (4 octets) applies only to the UDP case.
