document: rfc-4340
kind: wire-format
summary: DCCP-Request packets carry a 32-bit Service Code field after the generic header, identifying the application-level service. DCCP-Response packets MUST echo the same Service Code. Service Codes aid middleboxes and reduce reliance on globally well-known port numbers.
section: "5.2"
topics:
    - udp
    - congestion
