document: rfc-6146
kind: security-consideration
summary: A malicious IPv4 node can attempt to exhaust NAT64 IPv4 address pool, port, memory, and CPU resources by sending many packets. The NAT64 MUST limit resources for fragment storage and MAY apply filtering and rate-limiting to mitigate these attacks.
section: "5.3"
topics:
    - nat
    - security
