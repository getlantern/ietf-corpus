document: rfc-3189
kind: normative-requirement
summary: All RTP packets within the same video frame MUST carry the same timestamp. The timestamp SHOULD increment by the nominal interval for one frame time as given in the format-specific table.
section: "2.1"
rfc2119_level: MUST
topics:
