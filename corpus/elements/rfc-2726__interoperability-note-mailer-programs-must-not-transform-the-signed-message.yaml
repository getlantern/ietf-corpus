document: rfc-2726
kind: interoperability-note
summary: Mailer programs must not transform the signed message text (e.g., line-wrapping, tab-to-space conversion) as such transformations will invalidate the PGP signature. Only ASCII characters should be used in the update message.
section: "3"
topics:
