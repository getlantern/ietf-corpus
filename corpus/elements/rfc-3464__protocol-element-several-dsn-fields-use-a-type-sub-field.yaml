document: rfc-3464
kind: protocol-element
summary: 'Several DSN fields use a ''*-type'' sub-field mechanism: address-type specifies mailbox address format (e.g., ''rfc822''), diagnostic-type specifies status code format (e.g., ''smtp''), and mta-name-type specifies MTA name format (e.g., ''dns''). Type values are case-insensitive atoms registered with IANA.'
section: 2.1.2
topics:
    - email
    - registry
