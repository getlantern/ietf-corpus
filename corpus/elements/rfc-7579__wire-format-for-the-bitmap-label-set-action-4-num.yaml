document: rfc-7579
kind: wire-format
summary: For the Bitmap Label Set (Action=4), Num Labels indicates the count of labels represented; bits in the bitmap correspond to labels starting from Base Label. The bitmap is padded to a multiple of 32 bits; padding bits SHOULD be set to zero and MUST be ignored by receivers.
section: 2.6.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
