document: rfc-4184
kind: normative-requirement
summary: RTP packets containing fragments of the same AC-3 frame MUST carry the same timestamp. The timestamp of the first RTP packet sent SHOULD be selected at random; thereafter it increases by 1536 per frame.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
