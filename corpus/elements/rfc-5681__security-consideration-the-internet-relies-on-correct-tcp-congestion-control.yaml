document: rfc-5681
kind: security-consideration
summary: The Internet relies on correct TCP congestion control implementation to prevent congestion collapse. An attacker forging excessive duplicate ACKs or ACKs for new data could drive portions of the network into congestion collapse by inducing TCP endpoints to behave more aggressively.
section: "5"
topics:
    - tcp
    - security
    - congestion
