document: rfc-9739
kind: normative-requirement
summary: Because a PLI does not use PIM Hello messages and therefore cannot discover neighbor capabilities for Join Attributes (RFC 5384), PIM Light SHOULD NOT send a Join message containing a Join Attribute unless neighbors are known via configuration to be capable or an RFC/Internet-Draft explicitly permits it.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
