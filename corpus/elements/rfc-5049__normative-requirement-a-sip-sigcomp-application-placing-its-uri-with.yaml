document: rfc-5049
kind: normative-requirement
summary: A SIP/SigComp application placing its URI with 'comp=sigcomp' in a header field MUST add a 'sigcomp-id' parameter with its SIP/SigComp identifier to that URI. Similarly, when generating its own Via entry with 'comp=sigcomp', it MUST add a 'sigcomp-id' parameter to that Via entry.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
