document: rfc-7232
kind: protocol-element
summary: 'The ''If-Match'' header field makes a request conditional on the origin server having a current representation with an entity-tag matching a member of the listed tags, or any representation when the value is ''*''. Syntax: If-Match = ''*'' / 1#entity-tag.'
section: "3.1"
topics:
