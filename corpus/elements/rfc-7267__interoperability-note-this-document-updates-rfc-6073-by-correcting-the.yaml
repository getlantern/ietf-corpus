document: rfc-7267
kind: interoperability-note
summary: This document updates RFC 6073 by correcting the Length field of PW Switching Point PE Sub-TLV Type 0x06 from 12 to 14. Implementations following the original RFC 6073 value will interoperate incorrectly with implementations following RFC 7267.
