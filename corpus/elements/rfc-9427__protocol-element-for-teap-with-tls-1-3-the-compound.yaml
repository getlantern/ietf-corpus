summary: For TEAP with TLS 1.3, the Compound MAC is computed as MAC(CMK[n], BUFFER) using the HMAC algorithm negotiated for HKDF in the TLS key schedule (per RFC 8446 Section 7.1), replacing the earlier TLS-PRF-based computation.
