document: rfc-3362
kind: protocol-element
summary: The image/t38 media type is used as an SDP media descriptor in SIP call setup for T.38 real-time facsimile, as described in ITU-T Rec. T.38 Annex D. It indicates a T.38 media stream within SDP.
