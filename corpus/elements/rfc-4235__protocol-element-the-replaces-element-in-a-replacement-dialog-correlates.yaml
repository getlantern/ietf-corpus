document: rfc-4235
kind: protocol-element
summary: The 'replaces' element in a replacement dialog correlates it with the dialog it replaced; it carries call-id, local-tag, and remote-tag attributes of the replaced dialog. The 'referred-by' element correlates a dialog with the REFER request that triggered it.
