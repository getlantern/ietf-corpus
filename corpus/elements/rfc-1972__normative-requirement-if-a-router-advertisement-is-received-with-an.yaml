document: rfc-1972
kind: normative-requirement
summary: If a Router Advertisement is received with an MTU option specifying an MTU larger than 1500, or larger than a manually configured value less than 1500, that MTU option must be ignored.
section: Maximum Transmission Unit
rfc2119_level: MUST
topics:
    - ip
