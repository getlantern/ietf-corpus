document: rfc-8849
kind: privacy-consideration
summary: Long-term persistent RTCP CNAME identifiers can be used to track users across multiple calls. The spec mandates short-term persistent RTCP CNAMEs per RFC 7022 to prevent such tracking.
section: "9"
topics:
    - privacy
    - rtp
    - realtime
