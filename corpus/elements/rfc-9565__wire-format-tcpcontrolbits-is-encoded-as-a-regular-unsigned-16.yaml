document: rfc-9565
kind: wire-format
summary: tcpControlBits is encoded as a regular unsigned 16-bit integer. The most significant 4 bits of octets 12 and 13 of the TCP header carry the Data Offset field, so the corresponding bits (offsets 0–3) in this IE must be zero. The 'TCP Header Flags' registry indexes bits from MSB of octet 12 to LSB of octet 13, which differs from this unsigned 16-bit encoding.
section: "3"
