document: rfc-7802
kind: interoperability-note
summary: RFC 4402 is reclassified as Historic because its counter-starts-at-1 specification conflicts with existing implementations that start the counter at 0. Implementations conforming to RFC 4402 would not interoperate with those conforming to this document.
