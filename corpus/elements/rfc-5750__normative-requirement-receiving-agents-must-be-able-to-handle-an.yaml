document: rfc-5750
kind: normative-requirement
summary: Receiving agents MUST be able to handle an arbitrary number of certificates of arbitrary relationship to the message sender and to each other in arbitrary order. A receiving agent MUST be able to handle an arbitrarily large number of certificates and chains.
section: "2.3"
rfc2119_level: MUST
