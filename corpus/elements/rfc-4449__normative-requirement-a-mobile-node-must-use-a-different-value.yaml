document: rfc-4449
kind: normative-requirement
summary: A mobile node MUST use a different value for Kcn for each node in its Binding Update List, and a correspondent node MUST ensure that every mobile node uses a different value of Kcn, so that the sender of a Binding Update can always be uniquely determined.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
