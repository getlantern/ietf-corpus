document: rfc-6750
kind: normative-requirement
summary: Bearer tokens MUST NOT be stored in cookies that can be sent in the clear. Implementations that do store bearer tokens in cookies MUST take precautions against cross-site request forgery.
section: "5.2"
rfc2119_level: MUST NOT
topics:
