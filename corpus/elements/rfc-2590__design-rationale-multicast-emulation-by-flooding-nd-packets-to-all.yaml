document: rfc-2590
kind: design-rationale
summary: Multicast emulation by flooding ND packets to all VCs works well with PVCs. A dedicated mesh of PVCs or point-to-multipoint PVCs MAY be configured for multicast-only traffic as an optimization, since Frame Relay networks do not provide link-layer native multicasting.
section: "7"
topics:
