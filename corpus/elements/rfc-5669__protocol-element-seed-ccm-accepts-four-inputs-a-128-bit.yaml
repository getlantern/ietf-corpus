document: rfc-5669
kind: protocol-element
summary: 'SEED-CCM accepts four inputs: a 128-bit key (SEED supports only 128-bit keys), a 12-octet nonce (15-L octets, L=3), plaintext (RTP payload and padding for SRTP; Encrypted Portion for SRTCP when encryption flag=1), and AAD (RTP header including CSRC and extension for SRTP; first 8 octets, encryption flag, and SRTCP index for SRTCP when encryption flag=1).'
section: "2.2"
topics:
