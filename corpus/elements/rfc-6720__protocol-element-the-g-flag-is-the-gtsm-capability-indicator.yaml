document: rfc-6720
kind: protocol-element
summary: The G flag is the GTSM capability indicator in the Common Hello Parameter TLV. It is meaningful only when T=0 (Basic Discovery). When T=1 (Targeted/Extended Discovery), the G flag value is ignored on receipt.
