document: rfc-7252
kind: security-consideration
summary: CoAP is susceptible to amplification attacks because a small multicast or unicast request can elicit large responses from many nodes. Servers SHOULD implement rate limiting for response transmission. For multicast, clients MUST NOT use CON messages; this limits the amplification factor.
section: "11.3"
topics:
    - security
    - udp
    - multicast
