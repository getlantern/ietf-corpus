summary: 'AtmConnKind identifies the call-control type of an ATM virtual link: pvc(1), svcIncoming(2), svcOutgoing(3), spvcInitiator(4), or spvcTarget(5). PVC links cross-connect only to PVC links; SVC incoming always cross-connects to SVC outgoing.'
