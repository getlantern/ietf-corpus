kind: wire-format
summary: 'EAP-Finish/Re-auth extension adds the ''E'' flag (0x10) and TLVs including keyName-NAI (Type 1) and ERP/AAK-Key (Type 8). The ERP/AAK-Key TLV is a container with sub-TLVs: CAP-Identifier (Type 11), pMSK Lifetime (Type 10, unsigned 32-bit seconds), pRK Lifetime (Type 9, unsigned 32-bit seconds), and List of Cryptosuites (Type 5).'
