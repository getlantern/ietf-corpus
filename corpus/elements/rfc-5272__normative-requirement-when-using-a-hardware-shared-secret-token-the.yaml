document: rfc-5272
kind: normative-requirement
summary: When using a hardware shared-secret token, the entire certification request MUST be shrouded (encrypted) to prevent an active eavesdropper from extracting the time-critical token and submitting a different request with the same token value.
section: 6.2.4
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
