document: rfc-7232
kind: protocol-element
summary: The 304 (Not Modified) status code indicates that a conditional GET or HEAD request would have resulted in a 200 (OK) response but for the condition evaluating to false. A 304 response cannot contain a message-body; it is always terminated by the first empty line after the header fields.
section: "4.1"
topics:
    - http
