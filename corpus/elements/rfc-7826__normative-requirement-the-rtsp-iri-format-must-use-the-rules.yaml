document: rfc-7826
kind: normative-requirement
summary: The RTSP IRI format MUST use the rules and transformation for IRIs to URIs as defined in RFC 3987. An absolute RTSP URI requires the authority part; a host identity MUST be provided.
section: "4.2"
rfc2119_level: MUST
topics:
