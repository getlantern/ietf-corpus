document: rfc-7139
kind: normative-requirement
summary: The TPN field MUST be set to 0 when an LO ODUj maps into OTUk (j=k). For multiplexing into HO ODU1/ODU2/ODU3, only the lower 6 bits are significant; for HO ODU4, only the lower 7 bits are significant; other bits MUST be set to 0.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
