document: rfc-4120
kind: protocol-element
summary: The Ticket is the central Kerberos credential, containing tkt-vno (version 5), realm (server's realm), sname (server principal name), and enc-part encrypted under the server's secret key. The encrypted part includes the session key, client identity, auth-time, start/end times, ticket flags, and authorization data.
