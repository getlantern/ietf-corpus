document: rfc-1247
kind: protocol-element
summary: The Backup Designated Router (BDR) is also elected by Hello Protocol and remains adjacent to all routers on a multi-access network. When the DR fails, the BDR immediately assumes DR responsibilities without needing to form new adjacencies, reducing traffic disruption.
section: "7.4"
topics:
    - routing
