document: rfc-3428
kind: normative-requirement
summary: A UAC MUST NOT initiate a new out-of-dialog MESSAGE transaction to a given URI if there is a previous out-of-dialog transaction pending for the same URI. A UAC SHOULD NOT initiate overlapping MESSAGE transactions inside a dialog unless the route set uses congestion-controlled transport at every hop.
section: "8"
rfc2119_level: MUST NOT
topics:
    - sip
    - congestion
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
