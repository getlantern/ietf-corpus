document: rfc-4918
kind: normative-requirement
summary: A COPY method invocation MUST NOT duplicate any write locks active on the source. A successful MOVE on a write-locked resource MUST NOT move the write lock with the resource.
section: "7.6"
rfc2119_level: MUST NOT
