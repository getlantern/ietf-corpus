document: rfc-4124
kind: protocol-element
summary: Class-Type (CT) is the set of Traffic Trunks crossing a link governed by a specific set of bandwidth constraints, used for link bandwidth allocation, constraint-based routing, and admission control. A given Traffic Trunk belongs to the same CT on all links.
