summary: 'The MIB is divided into three tables reflecting different monitoring concerns: dsTable for summary/entry statistics, dsApplIfOpsTable for per-protocol-interface operation metrics, and dsIntTable for peer interaction history. The basic principle was to keep the MIB as simple as possible.'
