document: rfc-7307
kind: protocol-element
summary: 'Topology-Scoped FEC: To set up MT LSPs for IP prefixes under a given topology scope, the LDP prefix-related FEC element is extended to include topology information; the MT-ID becomes an attribute of the prefix-related FEC element and all FEC-Label binding operations are performed under the context of a given topology.'
section: "3.1"
topics:
