document: rfc-6320
kind: protocol-element
summary: The DSL Line Configuration capability (Type 0x02) allows the NAS to configure DSL line parameters on the AN via a Port Management message. The Service-Profile-Name TLV carries a UTF-8 string naming the service profile to apply to the specified access line.
