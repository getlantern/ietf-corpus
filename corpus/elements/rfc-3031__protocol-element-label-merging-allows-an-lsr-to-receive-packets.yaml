document: rfc-3031
kind: protocol-element
summary: Label merging allows an LSR to receive packets from multiple incoming interfaces or with different incoming labels for the same FEC and forward all of them with a single outgoing label. ATM-LSRs using SVC or SVP encoding cannot perform label merging due to cell-interleaving at the AAL5 reassembly layer.
section: "3.26"
topics:
    - routing
