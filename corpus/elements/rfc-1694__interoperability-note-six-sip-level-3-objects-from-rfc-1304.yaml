document: rfc-1694
kind: interoperability-note
summary: Six SIP Level 3 objects from RFC 1304 (sipL3ReceivedIndividualDAs, sipL3ReceivedGAs, sipL3SentIndividualDAs, sipL3SentGAs, sipL3Errors, sipL3InvalidSMDSAddressTypes) are deprecated in favor of their ifTable equivalents (ifInUcastPkts, ifInMulticastPkts, ifOutUcastPkts, ifOutMulticastPkts, ifInErrors, ifInUnknownProtos) with no semantic change.
section: "3"
topics:
