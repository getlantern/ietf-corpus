document: rfc-9728
kind: normative-requirement
summary: If protected resource metadata was retrieved from a URL returned via WWW-Authenticate resource_metadata, the resource value MUST be identical to the URL the client used to make the request to the resource server; if not identical, the data MUST NOT be used.
section: "3.3"
rfc2119_level: MUST
topics:
    - oauth
    - security
    - http
