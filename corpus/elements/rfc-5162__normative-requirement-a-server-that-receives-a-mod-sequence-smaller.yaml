document: rfc-5162
kind: normative-requirement
summary: A server that receives a mod-sequence smaller than the smallest expunged mod-sequence it remembers minus one MUST behave as if it was requested to report all expunged messages from the provided UID set parameter.
section: "3.2"
rfc2119_level: MUST
