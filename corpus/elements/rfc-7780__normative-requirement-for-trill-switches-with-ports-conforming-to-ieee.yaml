document: rfc-7780
kind: normative-requirement
summary: For TRILL switches with ports conforming to IEEE 802.1Q-2011 or later, the DEI bit in the Inner.VLAN MUST be set to the DEI value provided by the port interface on ingress, and MUST be provided to the port on transit or egress. Transit packets MUST take the DEI bit from the Inner.VLAN.
section: "7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
