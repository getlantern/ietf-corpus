document: rfc-9671
kind: security-consideration
summary: The 'processcalendar' extension MUST NOT process any calendar data enclosed in a message flagged as spam and/or malicious. The 'spamtest' and 'virustest' extensions or header tests can be used to make processing conditional on safe content.
section: "5"
rfc2119_level: MUST NOT
topics:
