document: rfc-8707
kind: design-rationale
summary: OAuth scope is sometimes overloaded to convey the location or identity of the protected resource, but doing so isn't always feasible or desirable — scope values typically convey only the type of access (e.g., 'email', 'channels:read'), not the location. This extension provides a dedicated parameter for resource identity to separate these concerns.
section: "1"
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
