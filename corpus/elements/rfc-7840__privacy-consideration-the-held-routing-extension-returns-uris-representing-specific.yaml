document: rfc-7840
kind: privacy-consideration
summary: The HELD routing extension returns URIs representing specific emergency services operating in the Target's vicinity, constituting additional information about the Target. It is therefore recommended that this option only be used when the LIS returns a location URI rather than a location value, consistent with the privacy constraints described in RFC 6155 Section 4.
section: "8"
topics:
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
