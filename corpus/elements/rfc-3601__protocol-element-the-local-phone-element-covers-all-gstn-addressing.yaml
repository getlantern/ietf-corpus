document: rfc-3601
kind: protocol-element
summary: The local-phone element covers all GSTN addressing that does not use E.164 global numbering. It is composed of an optional exit-code and/or a dial-number, each encoded as a phone-string, but MUST NOT be a null string.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
