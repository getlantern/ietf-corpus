kind: protocol-element
summary: Type-P-Segment-One-way-Delay-Stream is the sequence <dT1.ab,...,dTm.ab> where dTk.ab = dTk.b - dTk.a is the one-way delay between routers Ha and Hb extracted from the spatial delay matrix; it is undefined if the packet did not pass either router.
