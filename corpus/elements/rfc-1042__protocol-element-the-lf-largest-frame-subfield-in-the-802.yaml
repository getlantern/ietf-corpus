document: rfc-1042
kind: protocol-element
summary: 'The LF (Largest Frame) subfield in the 802.5 RC specifies the maximum MTU supported by all bridges on a route: 000=552 MAC/508 IP, 001=1064/1020, 010=2088/2044, 011=4136/4092, 100=8232/8188. Receivers must reject frames where LF is less than the MTU.'
section: Multi-Ring Extension Details
