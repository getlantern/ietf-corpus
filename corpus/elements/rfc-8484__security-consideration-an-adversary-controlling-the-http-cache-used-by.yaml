document: rfc-8484
kind: security-consideration
summary: An adversary controlling the HTTP cache used by the client can affect that client's view of the DNS. In the absence of DNSSEC, a DoH server can give a client invalid data; Section 3's prohibition on unconfigured URIs reduces but does not eliminate this risk.
section: "9"
topics:
    - dns
    - security
