document: rfc-6427
kind: normative-requirement
summary: The Refresh Timer value MUST NOT be changed on successive FM messages reporting the same incident. If optional clearing procedures are not used, the default is one second; otherwise the default is 20 seconds.
section: "5.1"
rfc2119_level: MUST NOT
