document: rfc-9886
kind: privacy-consideration
summary: AAA mechanisms for Private Information Registries storing Personally Identifiable Information (PII) are explicitly out of scope for this document. Only public information (cryptographic keys, endorsements, certificates) is stored in DNS; private operator data is managed separately by DIMEs.
section: "1.1"
topics:
