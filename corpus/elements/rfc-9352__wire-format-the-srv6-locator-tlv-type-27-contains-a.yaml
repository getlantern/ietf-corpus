document: rfc-9352
kind: wire-format
summary: The SRv6 Locator TLV (type 27) contains a 4-bit MTID field and carries one or more locator entries, each with a 4-octet Metric, 1-octet Flags (D-flag), 1-octet Algorithm, 1-octet Loc-Size (1–128 bits), variable-length Locator (1–16 octets), and optional sub-TLVs. The TLV MUST be ignored if Loc-Size is outside the range 1–128.
section: "7.1"
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
