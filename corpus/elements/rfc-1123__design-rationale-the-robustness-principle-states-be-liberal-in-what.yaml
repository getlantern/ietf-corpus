document: rfc-1123
kind: design-rationale
summary: 'The Robustness Principle states: ''Be liberal in what you accept, and conservative in what you send.'' Software must deal with every conceivable error and must not fail on undefined or unknown protocol values (e.g., an unknown error code); enumerations in specifications must be assumed incomplete.'
section: 1.2.2
topics:
    - security
