document: rfc-6584
kind: wire-format
summary: 'The Combined Digital Signature/Group-keyed MAC EXT_AUTH extension contains: HET=1, HEL, ASID (4 bits), rsvd (3 bits), AR flag (must be 1), a 40-bit SN, a variable-length Signature field (padded to 32-bit boundary), and a Group-keyed MAC field (variable size, default 32 bits). For 1024-bit RSA with 32-bit MAC the extension is 140 bytes.'
section: "6.1"
topics:
