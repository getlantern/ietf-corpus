document: rfc-3802
kind: interoperability-note
summary: The four-bit code word ordering within a byte may differ between existing implementations of G.726 codecs. Since audio/32KADPCM only permits little endian ordering, codecs that support the opposite (big endian) ordering must reorder the code words before storing to or retrieving from this content type.
section: "4"
topics:
