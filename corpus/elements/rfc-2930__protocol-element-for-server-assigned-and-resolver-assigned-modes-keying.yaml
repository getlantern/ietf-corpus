document: rfc-2930
kind: protocol-element
summary: For server-assigned and resolver-assigned modes, keying material is transmitted encrypted within the TKEY key data field using RSA (RSAES-PKCS1-v1_5 per PKCS#1 / RFC 2437). If keying material exceeds one RSA modulus, additional RSA encryption blocks are appended.
