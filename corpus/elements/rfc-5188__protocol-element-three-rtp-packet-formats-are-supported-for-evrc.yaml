document: rfc-5188
kind: protocol-element
summary: 'Three RTP packet formats are supported for EVRC-WB: interleaved/bundled (audio/EVRCWB), header-free (audio/EVRCWB0), and compact bundled (audio/EVRCWB1). The ToC mode change request field MUST be interpreted according to the RATE_REDUC parameter as defined in EVRC-WB.'
