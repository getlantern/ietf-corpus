document: rfc-7705
kind: normative-requirement
summary: The 'Internal BGP AS Migration' mechanism MUST be configurable on a per-neighbor or per-neighbor-group basis. A BGP speaker configured with it MUST accept BGP OPEN from iBGP peers whose 'My Autonomous System' field contains either the globally configured ASN or the locally configured legacy ASN.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
