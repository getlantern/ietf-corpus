document: rfc-6551
kind: normative-requirement
summary: When the LC object is used as a recorded metric and a node encounters a link color already present in an existing LC sub-object, the node MUST NOT add another identical LC sub-object but MUST increment the counter field of the existing one.
section: 4.4.2
rfc2119_level: MUST
topics:
    - routing
