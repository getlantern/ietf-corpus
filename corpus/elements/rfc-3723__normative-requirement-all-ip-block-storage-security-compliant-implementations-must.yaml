document: rfc-3723
kind: normative-requirement
summary: All IP block storage security compliant implementations MUST support IPsec ESP to provide security for both control and data packets, including replay protection mechanisms. When ESP is utilized, per-packet data origin authentication, integrity, and replay protection MUST be used.
section: 2.3.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
