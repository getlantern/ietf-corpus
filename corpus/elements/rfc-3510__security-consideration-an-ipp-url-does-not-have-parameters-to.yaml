document: rfc-3510
kind: security-consideration
summary: An IPP URL does not have parameters to specify the required client authentication mechanism or required security mechanism (e.g., 'tls'). Service discovery or directory protocols might be used to discover these mechanisms associated with given IPP URLs.
section: "8"
