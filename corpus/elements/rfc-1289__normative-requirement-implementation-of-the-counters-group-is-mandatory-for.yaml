document: rfc-1289
kind: normative-requirement
summary: Implementation of the Counters Group is mandatory for systems that only support DECnet-style latching counters. phivCountersCountTable provides Ethernet-level counters including multicast bytes/blocks, collision statistics (deferred, single collision, multiple collision), send failure, collision detect failure, receive failure, unrecognized frame destination, data overrun, and buffer unavailability.
section: "4"
rfc2119_level: REQUIRED
topics:
    - snmp
