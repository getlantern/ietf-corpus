document: rfc-9596
kind: protocol-element
summary: COSE implementations (libraries) ignore the "typ" header parameter other than passing it through to applications. Any processing of the "typ" parameter is performed by the COSE application using application-specific processing rules, such as verifying that the value matches an expected media type.
section: "2"
topics:
    - cbor
    - crypto
