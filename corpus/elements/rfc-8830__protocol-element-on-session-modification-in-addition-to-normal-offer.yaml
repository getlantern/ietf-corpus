document: rfc-8830
kind: protocol-element
summary: On session modification, in addition to normal offer/answer processing, each previously created MediaStreamTrack not in the 'ended' state is checked for a matching 'a=msid' appdata value. If none is found, the track is stopped and set to the 'ended' state.
section: 3.2.5
