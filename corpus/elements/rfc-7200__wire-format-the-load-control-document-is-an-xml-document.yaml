summary: The load-control document is an XML document conforming to the namespace "urn:ietf:params:xml:ns:load-control", extending RFC 4745 Common Policy. The <ruleset> element carries mandatory "version" (non-negative 32-bit integer) and "state" ("full" or "partial") attributes to support ordered delivery and delta updates.
