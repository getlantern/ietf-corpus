document: rfc-7885
kind: protocol-element
summary: 'Two S-BFD CV Types are defined: 0x40 for S-BFD IP/UDP-encapsulated fault detection only, and 0x80 for S-BFD PW-ACH/L2SS-encapsulated (without IP/UDP headers) fault detection only. Both are PW demultiplexer agnostic and applicable for MPLS and L2TPv3 PWs.'
