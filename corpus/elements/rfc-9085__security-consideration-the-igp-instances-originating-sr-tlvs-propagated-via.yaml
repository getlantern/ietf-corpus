document: rfc-9085
kind: security-consideration
summary: The IGP instances originating SR TLVs propagated via BGP-LS are assumed to support all required security and authentication mechanisms (per RFC 8665, RFC 8666, RFC 8667). BGP-LS SR extensions themselves do not alter the BGP-LS security model defined in RFC 7752.
