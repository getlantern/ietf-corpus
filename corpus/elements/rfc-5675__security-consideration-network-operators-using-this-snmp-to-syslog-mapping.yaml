document: rfc-5675
kind: security-consideration
summary: Network operators using this SNMP-to-SYSLOG mapping must enforce consistent access control policies to prevent unauthorized parties from accessing SNMP notification content via the SYSLOG path that they would not be permitted to receive directly via SNMP's access control mechanism.
