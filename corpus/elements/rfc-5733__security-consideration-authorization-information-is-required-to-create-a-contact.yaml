document: rfc-5733
kind: security-consideration
summary: Authorization information is REQUIRED to create a contact object and is used in query and transfer operations to verify client authorization. Both client and server MUST ensure that authorization information is stored and exchanged with high-grade encryption mechanisms to provide privacy services, as inadvertent disclosure can result in unauthorized transfers and unauthorized information release.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - crypto
