document: rfc-4510
kind: design-rationale
summary: LDAP is designed as an extensible protocol; extensions are expected to be truly optional. Considerations for LDAP extensions are governed by BCP 118 (RFC 4521), and those considerations fully apply to this revision of the technical specification.
