document: rfc-8658
kind: protocol-element
summary: Softwire46-MAP-E (TLV-Type 1) MUST contain Softwire46-Rule and Softwire46-BR sub-attributes, and MAY contain Softwire46-PORTPARAMS. One or more Softwire46-BR instances are required; one BMR plus zero or more FMRs must be included via Softwire46-Rule.
