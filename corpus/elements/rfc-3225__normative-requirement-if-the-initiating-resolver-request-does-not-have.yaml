document: rfc-3225
kind: normative-requirement
summary: If the initiating resolver request does not have the DO bit set, the recursive DNSSEC-aware server MUST remove DNSSEC security RRs before returning data to the client; however, cached data MUST NOT be modified.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - security
