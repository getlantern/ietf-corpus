document: rfc-7531
kind: protocol-element
summary: 'The fh_expire_type constants define filehandle volatility: FH4_PERSISTENT (0x0), FH4_NOEXPIRE_WITH_OPEN (0x1), FH4_VOLATILE_ANY (0x2), FH4_VOL_MIGRATION (0x4), FH4_VOL_RENAME (0x8). Clients use fattr4_fh_expire_type to determine caching behavior.'
section: "2"
