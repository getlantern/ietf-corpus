document: rfc-1471
kind: protocol-element
summary: 'pppLqrTable contains per-link LQR status: pppLqrQuality (good/bad/not-determined), pppLqrInGoodOctets, pppLqrLocalPeriod and pppLqrRemotePeriod (reporting periods in hundredths of a second), pppLqrOutLQRs, and pppLqrInLQRs. An entry exists if and only if LQR has been successfully negotiated.'
