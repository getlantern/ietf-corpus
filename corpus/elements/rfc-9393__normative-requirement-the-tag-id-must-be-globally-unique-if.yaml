document: rfc-9393
kind: normative-requirement
summary: The tag-id MUST be globally unique. If represented as a 16-byte binary string, it MUST be a valid UUID as defined by RFC 4122. A textual tag-id MUST NOT contain a sequence of two underscores ('__'), as that sequence is used as a separator in Software Identifiers.
section: "2.3"
rfc2119_level: MUST
topics:
    - cbor
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
