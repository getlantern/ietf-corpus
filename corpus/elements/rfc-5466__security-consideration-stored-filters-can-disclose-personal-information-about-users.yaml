document: rfc-5466
kind: security-consideration
summary: Stored filters can disclose personal information about users. When confidentiality matters, clients MUST use TLS and/or a SASL security layer as recommended in RFC 3501. Clients should prefer private filters over public ones to limit disclosure.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - security
    - privacy
    - tls
