document: rfc-5760
kind: design-rationale
summary: 'The Simple Feedback Model was designed for backwards compatibility: an existing RTP receiver requires minimal modification, simply targeting a unicast address for its RTCP reports rather than a multicast address, while still receiving all forwarded RTCP traffic on the multicast control channel. This allows incremental deployment.'
