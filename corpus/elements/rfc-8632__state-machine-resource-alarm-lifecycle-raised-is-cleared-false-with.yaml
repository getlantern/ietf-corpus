document: rfc-8632
kind: state-machine
summary: 'Resource alarm lifecycle: raised (is-cleared=false, with perceived-severity) → severity-changed (same key, new severity/text) → cleared (is-cleared=true) → re-raised. Only instrumentation drives transitions; each change appends an entry to the status-change list if alarm-history is supported.'
