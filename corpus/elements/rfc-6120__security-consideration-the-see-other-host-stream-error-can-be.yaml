document: rfc-6120
kind: security-consideration
summary: The 'see-other-host' stream error can be used to redirect an initiating entity to a different host; implementations MUST verify that the redirected hostname is authorized to serve the target domain to prevent an attacker from exploiting this feature to perform a man-in-the-middle attack.
section: "13.14"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
