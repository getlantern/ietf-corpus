document: rfc-5052
kind: protocol-element
summary: The Block Partitioning Algorithm partitions an object into source blocks as equal in length as possible. Given object transfer length (L), Maximum Source Block Length (B), and Symbol Length (E), it computes T = ceil[L/E] source symbols and N = ceil[T/B] source blocks, then distributes symbols into I larger blocks of A_large = ceil[T/N] symbols and N-I smaller blocks of A_small = floor[T/N] symbols.
section: "9.1"
topics:
    - multicast
