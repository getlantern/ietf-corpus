document: rfc-8784
kind: normative-requirement
summary: If the PPK_IDENTITY notification contains an unknown PPK_ID and PPKs are mandatory (or no NO_PPK_AUTH was provided), the responder MUST send back an AUTHENTICATION_FAILED notification and fail the negotiation.
