document: rfc-1332
kind: protocol-element
summary: Van Jacobson TCP/IP header compression reduces TCP/IP headers to as few as three bytes, providing significant improvement on slow serial lines, particularly for interactive traffic. Each end must separately request this option for bi-directional compression.
