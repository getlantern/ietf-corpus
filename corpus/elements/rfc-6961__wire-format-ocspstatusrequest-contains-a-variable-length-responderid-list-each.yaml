document: rfc-6961
kind: wire-format
summary: OCSPStatusRequest contains a variable-length ResponderID list (each entry 1..2^16-1 opaque bytes) and an Extensions field (0..2^16-1 opaque bytes). Both are DER-encoded ASN.1 types as defined in RFC 6960; a zero-length Extensions means no extensions are present.
section: "2.2"
topics:
