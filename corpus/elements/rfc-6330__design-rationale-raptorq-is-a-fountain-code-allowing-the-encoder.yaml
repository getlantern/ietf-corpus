document: rfc-6330
kind: design-rationale
summary: RaptorQ is a fountain code, allowing the encoder to generate as many repair symbols as needed on the fly without prior coordination with receivers. The decoder can recover the source block from almost any set of received encoding symbols of cardinality only slightly exceeding K, eliminating the need to pre-specify redundancy levels.
section: "1"
extracted_by: claude-sonnet-4-6
