document: rfc-7469
kind: protocol-element
summary: An SPKI Fingerprint is the output of SHA-256 applied to the DER-encoded ASN.1 SubjectPublicKeyInfo structure of an X.509 certificate, base64-encoded for use in the HTTP header. A Pin is the combination of the algorithm identifier and the computed SPKI Fingerprint.
section: "2.4"
topics:
