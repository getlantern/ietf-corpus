document: rfc-7522
kind: protocol-element
summary: The SAML Assertion used as an authorization grant must include an <Issuer>, <Subject> with bearer <SubjectConfirmation>, <Conditions> with <AudienceRestriction>, and a digital signature. An <AuthnStatement> SHOULD be included if the issuer directly authenticated the subject.
section: "3"
topics:
    - oauth
    - security
