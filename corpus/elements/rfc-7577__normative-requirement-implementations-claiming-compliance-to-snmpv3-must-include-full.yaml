document: rfc-7577
kind: normative-requirement
summary: Implementations claiming compliance to SNMPv3 MUST include full support for authentication and privacy via the User-based Security Model (USM) with the AES cipher algorithm (RFC 3826). Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED.
section: "5"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
