document: rfc-5574
kind: design-rationale
summary: Bit-rate changes are signaled in-band within the Speex bit stream at any 20 msec frame boundary. Each frame contains both sampling rate and mode (bit-rate) information, so no out-of-band notification is required for the decoder to process bit-rate changes.
