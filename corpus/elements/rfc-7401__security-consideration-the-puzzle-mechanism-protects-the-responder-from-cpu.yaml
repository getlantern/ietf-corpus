document: rfc-7401
kind: security-consideration
summary: 'The puzzle mechanism protects the Responder from CPU- and memory-targeted DoS attacks by requiring the Initiator to expend CPU cycles before any association-specific state is created. Puzzle difficulty #K is tunable, and the Responder SHOULD use heuristics to detect DoS attacks and adjust #K accordingly.'
section: "8"
topics:
