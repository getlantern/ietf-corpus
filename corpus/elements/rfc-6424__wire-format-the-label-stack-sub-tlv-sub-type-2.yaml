document: rfc-6424
kind: wire-format
summary: 'The Label Stack sub-TLV (sub-type 2) carries one or more 24-bit Downstream Label / 8-bit Protocol pairs. The Downstream Label uses MPLS label format minus TTL: label in bits 0–19, TC in bits 20–22, S-bit in bit 23. The number of entries is inferred from the sub-TLV data length.'
section: 3.3.1.2
