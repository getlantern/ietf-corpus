kind: protocol-element
summary: 'Group Record types are: MODE_IS_INCLUDE (1) and MODE_IS_EXCLUDE (2) for Current-State Records; CHANGE_TO_INCLUDE_MODE (3) and CHANGE_TO_EXCLUDE_MODE (4) for Filter-Mode-Change Records; ALLOW_NEW_SOURCES (5) and BLOCK_OLD_SOURCES (6) for Source-List-Change Records. Unrecognized Record Type values MUST be silently ignored.'
