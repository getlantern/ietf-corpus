document: rfc-3846
kind: design-rationale
summary: The NAI Carrying Extension uses type 136 (skippable) so that nodes not understanding the extension can safely ignore it. The content and format are intentionally not specific to AAA NAIs, allowing future NAI types to reuse the same sub-type numbering space.
