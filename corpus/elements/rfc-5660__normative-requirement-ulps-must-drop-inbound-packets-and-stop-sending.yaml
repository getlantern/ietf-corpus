document: rfc-5660
kind: normative-requirement
summary: ULPs MUST drop inbound packets and stop sending immediately upon receipt of a latch break message; failure to do so prevents distinguishing packets protected consistently with the latch from those that were not.
section: 2.3.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
