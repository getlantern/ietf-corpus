document: rfc-3748
kind: normative-requirement
summary: EAP packets with Code values other than 1–4 MUST be silently discarded by both authenticators and peers. Success and Failure packets MUST NOT contain additional data beyond the 4-octet header.
section: "4"
rfc2119_level: MUST
