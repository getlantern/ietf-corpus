document: rfc-3288
kind: state-machine
summary: 'The BEEP profile for SOAP has two states: ''boot'' and ''ready''. In ''boot'', the channel-requesting peer sends a ''bootmsg''; if the other peer responds with ''bootrpy'', the channel enters ''ready''. If an ''error'' is returned, no state change occurs. In ''ready'', either peer may initiate SOAP message patterns; no state change occurs on message exchange.'
section: "2"
