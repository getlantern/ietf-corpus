document: rfc-2046
kind: normative-requirement
summary: The default character set for 'text' content, which must be assumed in the absence of a charset parameter, is US-ASCII. The charset parameter values are NOT case sensitive. No character set name other than defined ones may be used without IANA registration or private agreement (prefixed 'X-').
section: 4.1.2
rfc2119_level: MUST
topics:
    - email
