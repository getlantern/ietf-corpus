summary: The DIAG_SELECT object (Class=33, C-Type=1) carries a list of [Class, C-Type] pairs packed two per 32-bit word; a C-Type value of zero is a wildcard matching any C-Type for the given class. If the pair count is odd, the final two octets must be zero.
