document: rfc-2529
kind: normative-requirement
summary: The IPv4 Time to Live field SHOULD be set to a low value to prevent 6over4 packets from accidentally leaking out of the IPv4 domain. This MUST be a configurable parameter with a recommended default of 8.
section: "3"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
