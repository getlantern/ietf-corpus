document: rfc-2734
kind: normative-requirement
summary: Recipients of a 1394 ARP request or response SHALL ignore it unless the most significant ten bits of the source_ID are equal to 0x3FF or to the most significant ten bits of the recipient's own NODE_IDS register, preventing cross-bus confusion.
section: "5"
rfc2119_level: MUST
topics:
    - ip
