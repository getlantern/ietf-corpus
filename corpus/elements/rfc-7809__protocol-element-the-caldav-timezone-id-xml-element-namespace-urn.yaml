document: rfc-7809
kind: protocol-element
summary: The CALDAV:timezone-id XML element (namespace urn:ietf:params:xml:ns:caldav) is an alternative to CALDAV:timezone in calendar query REPORT requests, allowing a client to specify a time zone by identifier rather than providing the full iCalendar VTIMEZONE data.
