document: rfc-6088
kind: design-rationale
summary: Binary traffic selector formats were chosen to allow efficient identification of flows based on well-known fields in IPv4, IPv6, TCP, and UDP headers. A flag-per-field scheme avoids transmitting absent fields, keeping the sub-option compact while supporting a wide range of matching criteria.
section: "1"
topics:
