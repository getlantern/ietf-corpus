document: rfc-5746
kind: protocol-element
summary: A Signaling Cipher Suite Value (SCSV) `TLS_EMPTY_RENEGOTIATION_INFO_SCSV` with code point {0x00, 0xFF} is defined as an alternative signaling mechanism. It is not a true cipher suite and cannot be negotiated; it has the same semantics as an empty `renegotiation_info` extension and can be safely sent to any server, including SSLv3 servers.
section: "3.3"
topics:
    - tls
    - security
