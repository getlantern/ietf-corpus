document: rfc-1725
kind: interoperability-note
summary: The octet count reported by the server for a message may differ from its actual on-disk size because local line-ending conventions (e.g., LF-only) differ from the CRLF convention used on the wire. Servers must account for this when computing message sizes.
section: "10"
topics:
