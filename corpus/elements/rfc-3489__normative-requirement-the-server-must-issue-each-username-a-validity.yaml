document: rfc-3489
kind: normative-requirement
summary: The server MUST issue each USERNAME a validity period of at least 10 minutes (meaning it can compute the corresponding password) and MUST invalidate the username after 30 minutes; additionally, it MUST hand out a different username for each distinct Shared Secret Request (distinguished by transaction ID).
section: "8.2"
rfc2119_level: MUST
topics:
    - nat
    - security
    - crypto
