document: rfc-5692
kind: design-rationale
summary: Current IEEE 802.16 does not support bidirectional native broadcast and multicast for IP packets. Uplink connections provide only unicast transmission, and multicast CIDs for downlink are not preferable for small groups due to reduced transmission efficiency and inability to prevent waking dormant-mode SSs.
section: "4.3"
topics:
    - multicast
    - ip
