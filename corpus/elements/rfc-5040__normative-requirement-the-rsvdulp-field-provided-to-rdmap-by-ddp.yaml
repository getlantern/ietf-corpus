document: rfc-5040
kind: normative-requirement
summary: The RsvdULP field provided to RDMAP by DDP MUST be 1 octet for DDP Tagged Messages and 5 octets for DDP Untagged Messages, accommodating the 1-octet RDMAP Control Field and the 4-octet Invalidate STag field present on Untagged Messages carrying Send with Invalidate operations.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
