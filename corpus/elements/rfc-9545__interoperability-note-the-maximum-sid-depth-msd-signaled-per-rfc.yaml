document: rfc-9545
kind: interoperability-note
summary: The Maximum SID Depth (MSD) signaled per RFC 8491 includes the PSID label in the total count of MPLS labels that can be imposed; path computation must account for this when determining if a computed path's SID stack fits within the ingress node's capability.
section: "2"
topics:
