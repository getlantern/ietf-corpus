document: rfc-7170
kind: security-consideration
summary: 'Server certificate validation is required: peers must validate the server certificate to a trust anchor and confirm that the entity named in the certificate is the intended server before trusting any peer services. Failure to validate the server certificate enables impersonation and PAC theft.'
section: "7.6"
topics:
    - security
    - pkix
    - tls
