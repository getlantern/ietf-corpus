document: rfc-7503
kind: normative-requirement
summary: When repeated flushing or reorigination of self-originated LSAs is detected (indicative of a duplicate Router ID in the domain), the OSPFv3 router SHOULD delay self-originated LSA processing. A 10-second window defines 'recent' and an exponential back-off of 1 to 8 seconds is recommended for the processing delay.
section: "7.4"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
