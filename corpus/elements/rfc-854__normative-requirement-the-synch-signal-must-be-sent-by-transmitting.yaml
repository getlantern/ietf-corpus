document: rfc-854
kind: normative-requirement
summary: The Synch signal MUST be sent by transmitting the DATA MARK (DM, code 242) as the last (or only) data octet in a TCP send operation with the Urgent flag set. DM marks the end of the urgent data region; the receiver scans for interesting signals and discards intervening data until DM is found.
section: THE NETWORK VIRTUAL TERMINAL
rfc2119_level: MUST
topics:
    - tcp
