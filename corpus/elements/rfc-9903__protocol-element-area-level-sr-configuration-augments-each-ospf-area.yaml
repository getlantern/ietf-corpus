document: rfc-9903
kind: protocol-element
summary: Area-level SR configuration augments each OSPF area with a presence container 'segment-routing'. Its presence enables SR-MPLS on all interfaces in that area and triggers advertisement of SR-MPLS LSAs and TLVs. The augmentation is conditional on SR being enabled at the OSPF instance level.
section: "3"
topics:
    - mpls
    - routing
    - yang
