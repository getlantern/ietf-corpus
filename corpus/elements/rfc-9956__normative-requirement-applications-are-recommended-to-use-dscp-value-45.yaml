document: rfc-9956
kind: normative-requirement
summary: Applications are RECOMMENDED to use DSCP value 45 (decimal) to mark microflows as NQB. This value was chosen partly to achieve separate queuing in existing Wi-Fi networks and to simplify range-based DSCP classification in network equipment.
