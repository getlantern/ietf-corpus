document: rfc-3703
kind: security-consideration
summary: The PCLS stores policy rules that control access to and management of network resources; unauthorized modification of policy entries could allow an attacker to grant excessive privileges, deny service, or otherwise subvert network administration. Implementations MUST apply appropriate LDAP access controls to all pcimPolicy subtree entries.
section: "7"
topics:
    - ldap
    - security
