document: rfc-5870
kind: protocol-element
summary: The optional 'u' parameter expresses location uncertainty in meters. A missing 'u' parameter means uncertainty is unknown or unspecified; a value of zero explicitly indicates a precise point. Zero uncertainty and absent uncertainty are never equivalent.
section: 3.4.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
