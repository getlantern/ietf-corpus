document: rfc-6515
kind: normative-requirement
summary: The address family of PE addresses in MCAST-VPN routes MUST NOT be inferred from the AFI field of the associated MP_REACH_NLRI/MP_UNREACH_NLRI attribute, because the SP's network address family is independent of the customer's address family.
section: "1.1"
rfc2119_level: MUST NOT
topics:
    - bgp
    - multicast
    - vpn
