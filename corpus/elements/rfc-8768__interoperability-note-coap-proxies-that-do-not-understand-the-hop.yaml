document: rfc-8768
kind: interoperability-note
summary: CoAP proxies that do not understand the Hop-Limit option will forward it safely (safe-to-forward property), but loops involving only such proxies will not be detected. Loop detection remains functional if at least one Hop-Limit-aware proxy is in the loop.
section: "3"
topics:
