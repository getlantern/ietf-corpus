document: rfc-9360
kind: protocol-element
summary: The 'x5bag' header parameter (label 32, value type COSE_X509) carries an unordered bag of X.509 certificates. The bag may contain self-signed certificates, duplicate certificates, or certificates extraneous to the message. The relying party must be capable of building the certificate path from this unordered set.
section: "2"
topics:
    - pkix
    - cbor
    - crypto
