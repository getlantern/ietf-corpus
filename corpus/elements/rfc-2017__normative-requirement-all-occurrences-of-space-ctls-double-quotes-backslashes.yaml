document: rfc-2017
kind: normative-requirement
summary: All occurrences of SPACE, CTLs, double quotes, backslashes, and 8-bit characters in the URL string must be encoded using the URL percent-encoding scheme specified in RFC 1738 before embedding the URL in a URL-parameter.
section: "3.1"
rfc2119_level: MUST
