document: rfc-3486
kind: normative-requirement
summary: A client that does not know if the server supports SigComp but wishes to receive compressed responses SHOULD add comp=sigcomp to the topmost Via header field, even though the request itself will not be compressed.
section: "4"
rfc2119_level: SHOULD
