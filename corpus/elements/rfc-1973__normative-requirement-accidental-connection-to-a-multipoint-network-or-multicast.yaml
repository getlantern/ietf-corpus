document: rfc-1973
kind: normative-requirement
summary: Accidental connection to a multipoint network or multicast group SHOULD result in a misconfiguration indication, detectable by multiple responses to an LCP Configure-Request with the same Identifier from different framing addresses.
section: "4"
rfc2119_level: SHOULD
