document: rfc-3779
kind: normative-requirement
summary: There MUST be only one IPAddressFamily SEQUENCE per unique combination of AFI and SAFI, and each SEQUENCE MUST be ordered by ascending addressFamily values (treating octets as unsigned). An addressFamily without a SAFI MUST precede one with a SAFI; IPv4 MUST precede IPv6.
section: 2.2.3.3
rfc2119_level: MUST
topics:
    - pkix
    - ip
