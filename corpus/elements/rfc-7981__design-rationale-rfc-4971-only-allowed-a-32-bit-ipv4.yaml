document: rfc-7981
kind: design-rationale
summary: RFC 4971 only allowed a 32-bit IPv4 Router ID in TLV 242's fixed header, which is unworkable in IPv6-only deployments. RFC 7981 resolves this by allowing 0.0.0.0 as a placeholder when IPv4 is unavailable, paired with a mandatory IPv6 TE Router ID sub-TLV.
section: Appendix A
topics:
    - routing
    - ip
