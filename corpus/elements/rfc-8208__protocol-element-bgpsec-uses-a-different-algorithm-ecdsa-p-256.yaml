document: rfc-8208
kind: protocol-element
summary: BGPsec uses a different algorithm (ECDSA P-256) compared to the rest of the RPKI (which uses RSA), specifically to minimize the size of the protocol exchanged between routers. BGPsec certificates are differentiated from other RPKI certificates by the BGPsec Extended Key Usage defined in RFC 8209.
section: "1"
topics:
