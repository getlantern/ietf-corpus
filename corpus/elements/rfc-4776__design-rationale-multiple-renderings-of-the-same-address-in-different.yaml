document: rfc-4776
kind: design-rationale
summary: Multiple renderings of the same address in different languages and scripts are supported by repeating sequences of address elements prefixed with language (CAtype 0) and/or script (CAtype 128) elements, because DHCPv4/v6 lack a mechanism for the client to request a specific language or script.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
