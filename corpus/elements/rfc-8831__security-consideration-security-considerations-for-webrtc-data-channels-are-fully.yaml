document: rfc-8831
kind: security-consideration
summary: Security considerations for WebRTC data channels are fully covered by RFC 8826 (Security Considerations for WebRTC) and RFC 8827 (WebRTC Security Architecture); this document adds no additional considerations. Implementations must be prepared for senders attempting to send arbitrarily large messages.
section: "7"
topics:
    - webrtc
    - security
