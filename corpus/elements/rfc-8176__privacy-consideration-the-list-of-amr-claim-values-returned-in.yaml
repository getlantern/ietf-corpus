document: rfc-8176
kind: privacy-consideration
summary: The list of 'amr' claim values returned in an ID Token reveals information about how the end user authenticated to the identity provider, which may have privacy implications. Storage and protection of referenced credentials (e.g., biometric data) is out of scope for this specification.
section: "4"
topics:
