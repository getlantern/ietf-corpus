document: rfc-2320
kind: protocol-element
summary: ipoaArpRemoteSrvrTable locally configures remote ATMARP Servers on a per-LIS and per-interface basis, indexed by ipoaLisSubnetAddr, ipoaArpRemoteSrvrAtmAddr, and ipoaArpRemoteSrvrIfIndex. An ifIndex of 0 allows a single shared VC.
section: 3.1.3
