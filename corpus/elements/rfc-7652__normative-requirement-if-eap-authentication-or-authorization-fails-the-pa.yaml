document: rfc-7652
kind: normative-requirement
summary: If EAP authentication or authorization fails, the PA session MUST be terminated immediately after the failure result code PA message is sent. If session lifetime expires without re-authentication, the session MUST also be terminated immediately.
section: 3.1.3
rfc2119_level: MUST
topics:
    - pcp
    - security
