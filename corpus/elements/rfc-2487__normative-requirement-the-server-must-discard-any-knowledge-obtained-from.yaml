document: rfc-2487
kind: normative-requirement
summary: The server MUST discard any knowledge obtained from the client (e.g., EHLO argument) not obtained from TLS negotiation itself; the client MUST discard any knowledge obtained from the server (e.g., service extension list) not obtained from TLS negotiation itself.
section: "5.2"
rfc2119_level: MUST
topics:
