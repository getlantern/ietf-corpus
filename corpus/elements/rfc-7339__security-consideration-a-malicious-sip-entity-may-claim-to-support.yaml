document: rfc-7339
kind: security-consideration
summary: A malicious SIP entity may claim to support overload control but never reduce traffic, gaining an unfair advantage while compliant neighbors throttle. Servers should monitor client compliance and treat non-conforming clients as non-supporting (applying 503 rejection per Section 5.10.2).
section: "11"
topics:
    - sip
    - security
    - realtime
