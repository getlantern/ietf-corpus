document: rfc-1970
kind: normative-requirement
summary: In a Redirect message, when the target is the actual endpoint (destination is a neighbor), the Target Address field MUST contain the same value as the ICMP Destination Address. Otherwise the Target Address MUST be the router's link-local address.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
