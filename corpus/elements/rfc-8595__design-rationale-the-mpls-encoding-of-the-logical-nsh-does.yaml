document: rfc-8595
kind: design-rationale
summary: The MPLS encoding of the logical NSH does not support per-packet metadata (where metadata differs packet-to-packet on the same flow or SFP); only per-SFP and per-flow metadata are supported. Per-packet metadata requires the NSH itself.
section: "12"
topics:
