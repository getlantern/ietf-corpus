document: rfc-9719
kind: protocol-element
summary: The security grouping supports PKI-based authentication with public or private key types and an optional shared-key flag. Authentication key material is supplied either via a key-chain reference (RFC 8177) or an explicit string key with a crypto-algorithm identityref derived from key-chain:crypto-algorithm.
