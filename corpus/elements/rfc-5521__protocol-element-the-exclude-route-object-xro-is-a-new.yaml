document: rfc-5521
kind: protocol-element
summary: The Exclude Route Object (XRO) is a new PCEP object with Object-Class 17 and Object-Type 1. It conveys the Exclude Route List — the set of abstract nodes, resources, and SRLGs that a PCE is requested to exclude from a computed path.
