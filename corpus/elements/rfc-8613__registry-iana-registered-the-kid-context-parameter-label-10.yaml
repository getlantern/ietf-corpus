document: rfc-8613
kind: registry
summary: IANA registered the 'kid context' parameter (label 10, value type bstr) in the COSE Header Parameters registry. This parameter carries the ID Context in OSCORE request COSE objects to help the server select the correct security context when multiple contexts share the same Sender ID.
