document: rfc-4944
kind: wire-format
summary: The Mesh Addressing header begins with bits '10', followed by V (1 bit, 1 if originator uses 16-bit address), F (1 bit, 1 if final destination uses 16-bit address), HopsLft (4 bits, decremented at each hop; 0xF signals an 8-bit Deep Hops Left field follows), then originator and final destination link-layer addresses.
