document: rfc-6185
kind: normative-requirement
summary: A receiver MUST NOT signal values of max-mbps, max-fs, max-cpb, max-dpb, and max-br that taken together meet the requirements of a higher level than the highest level specified in profile-level-id or max-recv-level.
section: "6.1"
rfc2119_level: MUST NOT
topics:
