document: rfc-7432
kind: wire-format
summary: The Ethernet Tag ID is a 32-bit field identifying a particular broadcast domain (e.g., a VLAN). The value 0xFFFFFFFF is reserved as MAX-ET. For VLAN-based and VLAN bundle service interfaces, the Ethernet Tag ID in all EVPN routes MUST be set to 0.
section: "6"
topics:
