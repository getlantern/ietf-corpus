document: rfc-4975
kind: normative-requirement
summary: An SDP media-line for MSRP over TCP MUST use the protocol field value 'TCP/MSRP' (or 'TCP/TLS/MSRP' for TLS), the media field MUST be 'message', and the format list MUST be '*'.
