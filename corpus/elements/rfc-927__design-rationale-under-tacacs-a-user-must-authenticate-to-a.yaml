document: rfc-927
kind: design-rationale
summary: Under TACACS, a user must authenticate to a TAC before connecting to a host. To avoid requiring a second authentication at the target host, the TAC passes the user's proven identity (UUID) to the target host using this option. Target hosts may accept or reject the TAC's authentication at their discretion.
section: "4"
extracted_by: claude-sonnet-4-6
