document: rfc-2355
kind: security-consideration
summary: TN3270E provides no security features beyond those of ordinary Telnet; a TN3270E session is no more secure than a standard Telnet session. Authentication mechanisms defined for Telnet could in principle be applied to TN3270E, including controlling which users may access specific terminal or printer device-names.
section: "14"
topics:
    - security
