document: rfc-4380
kind: design-rationale
summary: The mapped UDP port and mapped IPv4 address embedded in Teredo addresses and origin indications are obfuscated by XOR with 0xFFFF and 0xFFFFFFFF respectively to prevent NATs that perform 'probabilistic rewrite' from replacing embedded addresses and ports in the IPv6 payload.
