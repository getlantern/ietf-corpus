document: rfc-8166
kind: protocol-element
summary: 'The inline threshold is the largest message size (in octets) transferable in one direction via RDMA Send/Receive. Each connection has two independent values: call inline threshold (Requester-to-Responder) and reply inline threshold (Responder-to-Requester). These values are not advertised in the protocol and cannot change during the connection lifetime.'
section: 3.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
