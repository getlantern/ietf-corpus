document: rfc-4287
kind: normative-requirement
summary: Atom Processors MUST NOT reject an Atom Document solely because it contains an XML-Signature element they cannot verify; they MUST continue processing and MAY inform the user of the validation failure.
section: "5.1"
rfc2119_level: MUST NOT
topics:
