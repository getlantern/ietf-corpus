document: rfc-8754
kind: wire-format
summary: The Pad1 TLV (Type 0) is a single-byte padding element with no Length field. The PadN TLV (Type 4) carries a Length field (0–5) and variable padding bytes that MUST be set to 0 on transmission and ignored on receipt.
section: 2.1.1
