document: rfc-6378
kind: normative-requirement
summary: In Protecting failure state, to prevent flapping due to intermittent faults, the LER SHOULD employ a Wait-to-Restore timer to delay return to Normal state until the network has stabilized after an SF condition is cleared.
section: 4.3.3.4
rfc2119_level: SHOULD
topics:
