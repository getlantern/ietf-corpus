document: rfc-6607
kind: registry
summary: 'IANA created and maintains a new sub-registry entitled ''VSS Type Options'' covering the 1-octet Type byte shared by all VSS options and sub-options. Assigned values: 0 = NVT ASCII VPN identifier, 1 = RFC 2685 VPN-ID, 2–254 = Unassigned, 255 = Global/default VPN. New values require IETF Review.'
