document: rfc-4518
kind: protocol-element
summary: 'For substring assertion values in insignificant space handling: if no non-space characters, output is exactly one SPACE. Initial substrings are modified to start with exactly one SPACE; substrings ending in spaces are modified to end with exactly one SPACE; substrings starting in spaces are modified to start with exactly one SPACE; final substrings are modified to end with exactly one SPACE.'
section: 2.6.1
topics:
