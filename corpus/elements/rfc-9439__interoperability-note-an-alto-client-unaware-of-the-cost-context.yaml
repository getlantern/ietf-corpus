document: rfc-9439
kind: interoperability-note
summary: An ALTO client unaware of the 'cost-context' extension cannot distinguish between cost types with the same 'cost-mode' and 'cost-metric' but different 'cost-source' values (e.g., 'estimation' vs. 'sla'). Such clients will ignore the 'cost-context' field and treat all values as estimation.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
