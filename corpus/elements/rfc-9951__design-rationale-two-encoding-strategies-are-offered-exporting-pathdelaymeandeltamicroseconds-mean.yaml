summary: 'Two encoding strategies are offered: exporting pathDelayMeanDeltaMicroseconds (mean computed on the exporter) reduces Collector processing, while exporting pathDelaySumDeltaMicroseconds allows the Collector to compute mean as sum/packetDeltaCount, reducing Exporter computation and per-packet caching requirements.'
