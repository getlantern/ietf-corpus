document: rfc-3263
kind: design-rationale
summary: SRV-backed domain names are recommended for Contact and Record-Route headers (e.g., sip:server23.provider.com) instead of numeric IP addresses, so that backup SRV records with higher priority values can provide failover if the primary element fails.
section: "6"
topics:
