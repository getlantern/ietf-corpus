document: rfc-3826
kind: protocol-element
summary: The CFB128-AES-128 privacy protocol (usmAesCfb128Protocol) is defined as an alternative privacy protocol for SNMP's User-based Security Model, identified by OID snmpPrivProtocols 4. It uses AES in CFB mode with 128-bit keys and a 128-bit feedback parameter.
