document: rfc-9305
kind: wire-format
summary: 'Shim header protocols (Next Protocol 0x80-0xFD) MUST use a common first 32-bit structure: 8-bit Type, 8-bit Length (in 4-octet units, excluding first 4 octets), 8-bit Reserved, and 8-bit Next Protocol, followed by protocol-specific fields.'
