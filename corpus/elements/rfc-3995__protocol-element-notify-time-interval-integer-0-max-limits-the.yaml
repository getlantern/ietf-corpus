document: rfc-3995
kind: protocol-element
summary: '''notify-time-interval'' (integer(0:MAX)) limits the frequency of ''job-progress'' Event Notifications by specifying a minimum number of seconds between deliveries. The Printer MUST support this attribute if and only if it supports the ''job-progress'' Event. This attribute MUST NOT affect any Events other than ''job-progress''.'
section: 5.3.9
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
