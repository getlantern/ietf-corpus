document: rfc-5092
kind: normative-requirement
summary: When an authentication mechanism is indicated via ';AUTH=<enc-auth-type>', the client SHOULD request appropriate credentials from that mechanism and use AUTHENTICATE instead of LOGIN. If no user name is specified, one MUST be obtained from the mechanism or requested from the user.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
