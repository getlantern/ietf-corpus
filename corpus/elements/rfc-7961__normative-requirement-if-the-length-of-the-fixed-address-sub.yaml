document: rfc-7961
kind: normative-requirement
summary: If the Length of the Fixed Address sub-sub-TLV is 0 or 1, the sub-sub-TLV MUST be ignored. If the implied Fixed Address size differs from the known size for the given AFN, the sub-sub-TLV MUST be ignored as corrupt.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
