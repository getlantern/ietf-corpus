summary: 'TransportAddressIPv6 encodes an IPv6 transport address as an 18-octet string: octets 1-16 carry the IPv6 address in network-byte order, octets 17-18 carry the port number in network-byte order. DISPLAY-HINT is ''0a[2x:2x:2x:2x:2x:2x:2x:2x]0a:2d''.'
