document: rfc-1996
kind: normative-requirement
summary: If ANCOUNT>0, the answer section provides an unsecure hint at the new RRset. A slave may treat equivalence with local data as 'no further work needed.' The answer section MUST NOT be used to directly update a slave's local data or trigger zone transfer.
section: "3.7"
rfc2119_level: MUST NOT
topics:
    - dns
