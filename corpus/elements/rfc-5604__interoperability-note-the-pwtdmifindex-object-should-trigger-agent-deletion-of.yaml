document: rfc-5604
kind: interoperability-note
summary: The pwTDMIfIndex object SHOULD trigger agent deletion of associated pwTDMTable rows if the TDM interface index is removed. If the agent does not delete the rows, it MUST set pwTDMIfIndex to zero to indicate an undetermined interface.
section: "8"
rfc2119_level: MUST
topics:
    - snmp
    - mpls
