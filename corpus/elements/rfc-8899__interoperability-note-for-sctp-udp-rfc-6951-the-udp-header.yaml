document: rfc-8899
kind: interoperability-note
summary: For SCTP/UDP (RFC 6951), the UDP header (8 bytes) must be included in probe size calculations when filling the PAD chunk, and PTB message validation must account for the UDP header consuming part of the quoted packet header space.
section: 6.2.2.2
topics:
