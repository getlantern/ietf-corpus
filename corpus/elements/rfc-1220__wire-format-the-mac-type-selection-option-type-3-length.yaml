document: rfc-1220
kind: wire-format
summary: The MAC Type Selection Option (type=3, length=3 octets) carries a single MAC Type byte advertising one LAN type the system is prepared to receive. Multiple options in a single Configure-Request advertise support for multiple MAC Types; values are 1=802.3/Ethernet, 2=802.4, 3=802.5, 4=FDDI, others IANA-assigned.
section: "6.6"
