document: rfc-3253
kind: protocol-element
summary: DAV:auto-version controls automatic checkout/checkin behavior for modification requests on checked-in resources. Valid values are DAV:checkout-checkin, DAV:checkout-unlocked-checkin, DAV:checkout, and DAV:locked-checkout, each controlling when automatic checkout and checkin occur.
section: 3.2.2
