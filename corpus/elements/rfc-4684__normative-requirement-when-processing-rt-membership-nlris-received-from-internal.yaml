document: rfc-4684
kind: normative-requirement
summary: When processing RT membership NLRIs received from internal iBGP peers, a BGP speaker must consider all available iBGP paths for a given RT prefix when building its outbound route filter, not just the best path, to ensure every PE importing the route-target is reachable.
section: "3.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
