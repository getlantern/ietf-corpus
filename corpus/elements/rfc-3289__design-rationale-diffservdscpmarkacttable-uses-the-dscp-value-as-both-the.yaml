document: rfc-3289
kind: design-rationale
summary: diffServDscpMarkActTable uses the DSCP value as both the sole index and the sole data column; the OID of any instance fully conveys the action. This unusual design avoids a separate value column and allows the table to serve as an array of OBJECT-IDENTIFIER conventions.
section: 3.4.3
topics:
    - diffserv
    - snmp
