document: rfc-3588
kind: normative-requirement
summary: The Hop-by-Hop Identifier in a request MUST be unique on a given connection at any given time. An answer MUST echo the same Hop-by-Hop Identifier as the corresponding request. An answer received with an unknown Hop-by-Hop Identifier MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
