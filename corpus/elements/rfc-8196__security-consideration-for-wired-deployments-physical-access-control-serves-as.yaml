document: rfc-8196
kind: security-consideration
summary: For wired deployments, physical access control serves as an implicit authentication mechanism. For wireless deployments, authentication should be achieved at the lower wireless link layer, since IS-IS-level cryptographic authentication cannot be used in autoconfiguration mode.
section: "4"
topics:
