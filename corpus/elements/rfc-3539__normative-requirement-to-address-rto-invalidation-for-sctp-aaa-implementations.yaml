document: rfc-3539
kind: normative-requirement
summary: To address RTO invalidation for SCTP, AAA implementations SHOULD use SCTP heartbeats with the default 30-second interval; if needed, implementations MAY reduce the heartbeat interval. Where available, transport parameters SHOULD be used to improve upon default timer values.
section: "3.6"
rfc2119_level: SHOULD
