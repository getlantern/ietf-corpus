document: rfc-5577
kind: protocol-element
summary: The RTP payload for G.722.1 consists of the standard RTP header followed by one or more consecutive G.722.1 frames, with no additional payload-specific header fields. The payload type is assigned by the RTP profile or signaled out-of-band.
