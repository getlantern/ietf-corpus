document: rfc-4420
kind: normative-requirement
summary: A node MUST NOT push an Attributes subobject onto the RECORD_ROUTE object without also pushing an IPv4, IPv6, or Unnumbered Interface ID subobject. The Attributes subobject SHOULD be pushed after any Record Label subobjects so it is immediately prior to the node's address subobject.
section: 7.3.1
rfc2119_level: MUST NOT
topics:
    - mpls
    - realtime
