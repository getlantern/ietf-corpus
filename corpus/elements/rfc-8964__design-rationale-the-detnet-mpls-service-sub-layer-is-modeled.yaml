document: rfc-8964
kind: design-rationale
summary: The DetNet MPLS service sub-layer is modeled on existing pseudowire (PW) encapsulations and MPLS-TE mechanisms to maximize reuse and interoperability. The S-Label is analogous to a PW label and the d-CW conforms to the Generic PW MPLS Control Word, allowing existing MPLS infrastructure to forward DetNet traffic without modification at the forwarding sub-layer.
section: "3.1"
topics:
