document: rfc-4867
kind: wire-format
summary: The optional frame CRC in octet-aligned mode is 8 bits per speech frame, calculated only over the class A bits of that frame using cyclic generator polynomial C(x) = 1 + x^2 + x^3 + x^4 + x^8 (binary 101110001). One CRC octet is included for each ToC entry where FT is neither 14 nor 15.
section: 4.4.2
topics:
