document: rfc-5966
kind: interoperability-note
summary: This document updates RFC 1035 and RFC 1123. It supersedes the text in RFC 1123 Section 6.1.3.2 that allowed TCP to be treated as optional, making TCP support a REQUIRED part of a full DNS protocol implementation.
