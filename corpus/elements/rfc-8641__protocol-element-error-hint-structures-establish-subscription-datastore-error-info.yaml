document: rfc-8641
kind: protocol-element
summary: 'Error hint structures establish-subscription-datastore-error-info and modify-subscription-datastore-error-info are yang-data containers returned in RPC error responses. They carry: reason (identityref), period-hint (centiseconds), filter-failure-hint (string), object-count-estimate and object-count-limit (uint32), kilobytes-estimate and kilobytes-limit (uint32).'
