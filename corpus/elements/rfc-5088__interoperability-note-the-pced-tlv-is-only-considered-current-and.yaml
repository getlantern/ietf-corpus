document: rfc-5088
kind: interoperability-note
summary: The PCED TLV is only considered current and useable when the router advertising it is itself reachable via OSPF calculated paths in the same area of the LSA in which the PCED TLV appears. Stale information from unreachable routers must not be used.
section: "5"
topics:
    - routing
