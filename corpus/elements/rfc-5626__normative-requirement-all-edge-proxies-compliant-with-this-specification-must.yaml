document: rfc-5626
kind: normative-requirement
summary: All edge proxies compliant with this specification MUST implement support for STUN NAT keep-alives on their SIP UDP ports. When a server receives a double CRLF sequence between SIP messages on a connection-oriented transport, it MUST immediately respond with a single CRLF over the same connection.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
