document: rfc-5191
kind: normative-requirement
summary: A Nonce AVP MUST be included in the first PANA-Auth-Request and PANA-Auth-Answer messages following the initial (S-bit) exchange, and MUST NOT appear in any other message except during re-authentication. This nonce feeds into PANA_AUTH_KEY derivation.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
