document: rfc-6530
kind: normative-requirement
summary: A final delivery MTA that accepts SMTPUTF8 SHOULD NOT be configured with lower-preference MX hosts that do not support the extension, as this creates configuration errors that prevent delivery of messages with non-ASCII forward-pointing addresses.
section: "8"
rfc2119_level: SHOULD NOT
