kind: protocol-element
summary: dsaIntTable (dsaMIB 3) is indexed by {applIndex, dsaIntIndex} and tracks interaction history with peer DSAs. The table keeps the last N peer DSAs (N is locally defined) with which the monitored DSA has attempted interaction.
