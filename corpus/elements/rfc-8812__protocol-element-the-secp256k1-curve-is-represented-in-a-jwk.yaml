summary: 'The secp256k1 curve is represented in a JWK using ''kty'': ''EC'' and ''crv'': ''secp256k1''. The uncompressed point encoding MUST be used for JWK, and both ''x'' and ''y'' values MUST be exactly 256 bits with leading zeros preserved.'
