document: rfc-1232
kind: interoperability-note
summary: When a 10-or-more second Unavailable Signal State transition crosses a 900-second statistics window boundary, successive GETs of ds1IntervalSES and ds1IntervalUAS may return differing values; this is an acknowledged unavoidable side-effect of the AT&T object basis.
