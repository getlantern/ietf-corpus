document: rfc-3031
kind: protocol-element
summary: A label is a short, fixed-length, locally significant identifier used to identify a FEC. A label binding between label L and FEC F is local to the upstream/downstream LSR pair (Ru, Rd) and has no significance beyond that hop; the label is never an encoding of the network layer destination address.
section: "3.1"
topics:
    - routing
