document: rfc-3730
kind: design-rationale
summary: Globally unique ROIDs are constructed by concatenating a local identifier with an IANA-maintained repository class identifier to facilitate object information sharing between repositories and avoid inconsistencies (e.g., stale DNS delegations) when objects such as name servers and contacts have utility across multiple repositories.
