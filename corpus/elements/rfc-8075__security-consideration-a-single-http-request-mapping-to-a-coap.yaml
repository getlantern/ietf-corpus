document: rfc-8075
kind: security-consideration
summary: A single HTTP request mapping to a CoAP multicast resource can trigger an amplification attack against the constrained network, since no direct access to the constrained network is required. The feasibility is mitigated by access-controlling exposed multicast resources to known/authorized users.
section: "10.2"
topics:
    - security
    - multicast
    - http
