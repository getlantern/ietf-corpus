document: rfc-5496
kind: normative-requirement
summary: 'To make upstream router behavior predictable when downstream routers on a LAN may include different RPF Vectors, the RPF Vector address MUST be used as an additional condition in the Join suppression logic: suppression is applied only if the RPF Vector in the received PIM Join matches the RPF Vector in the multicast state.'
section: 3.3.4
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
