document: rfc-6942
kind: design-rationale
summary: The protocol reuses existing Diameter EAP commands (DER/DEA from RFC 4072) rather than defining new command codes, relying solely on a new Application Id to distinguish ERP traffic. This minimizes the protocol footprint while enabling correct Diameter routing.
