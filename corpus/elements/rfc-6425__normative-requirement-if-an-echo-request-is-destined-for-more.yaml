document: rfc-6425
kind: normative-requirement
summary: If an echo request is destined for more than one node, the Downstream IP Address field of the Downstream Detailed Mapping TLV MUST be set to the ALLROUTERS multicast address, and the Address Type field MUST be set to IPv4 or IPv6 Unnumbered.
section: 4.3.4
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - multicast
