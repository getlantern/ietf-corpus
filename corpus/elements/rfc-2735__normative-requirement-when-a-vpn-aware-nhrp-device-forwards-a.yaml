document: rfc-2735
kind: normative-requirement
summary: When a VPN-aware NHRP device forwards a packet pertaining to a particular VPN, that device MUST be able to indicate the VPN either explicitly through use of the VPN-specific LLC/SNAP header or implicitly through an indication via VPN signalling.
section: "3.1"
rfc2119_level: MUST
topics:
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
