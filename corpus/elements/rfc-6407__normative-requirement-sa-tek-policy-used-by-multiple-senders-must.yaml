document: rfc-6407
kind: normative-requirement
summary: SA TEK policy used by multiple senders MUST be installed in both sending and receiving directions (Symmetric); SA TEK for a single sender SHOULD be installed as Receiver-Only by receivers and Sender-Only by the sender.
section: 5.5.1.1.2
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
