document: rfc-3996
kind: protocol-element
summary: The 'notify-sequence-numbers' (1setOf integer(1:MAX)) operation attribute specifies the lowest Event Notification sequence number values for each identified Subscription object. The Printer MUST NOT return Event Notifications with lower sequence numbers for the corresponding Subscription object.
section: 5.1.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
