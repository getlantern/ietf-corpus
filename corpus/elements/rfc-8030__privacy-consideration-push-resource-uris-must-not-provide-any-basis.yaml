document: rfc-8030
kind: privacy-consideration
summary: Push resource URIs MUST NOT provide any basis to correlate communications for a given user agent, and it MUST NOT be possible to correlate any two push resource URIs based solely on their contents. User and device information MUST NOT be exposed through a push or push message URI.
section: "8.2"
topics:
    - privacy
    - security
    - http
