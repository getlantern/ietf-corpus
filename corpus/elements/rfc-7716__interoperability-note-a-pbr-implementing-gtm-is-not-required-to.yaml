document: rfc-7716
kind: interoperability-note
summary: A PBR implementing GTM is NOT required to originate an Intra-AS I-PMSI A-D route if it is not using Inclusive Tunnels for GTM AND the distribution of C-multicast Shared/Source Tree Join routes is done in such a manner that the Next Hop of those routes does not change.
section: 2.5.1
topics:
    - bgp
    - routing
    - multicast
