document: rfc-2598
kind: interoperability-note
summary: Simulation results show that weighted round-robin (WRR) implementations of EF PHB produce significantly more jitter than priority queue (PQ) implementations, especially for small packets. Increasing the WRR service-to-arrival ratio to at least 1.5 substantially reduces jitter, but WRR does not achieve PQ-level jitter performance.
section: A.3.1
topics:
