kind: protocol-element
summary: 'Four new OPTIONAL operations are defined: GETXATTR (OP=72), SETXATTR (OP=73), LISTXATTRS (OP=74), and REMOVEXATTR (OP=75). These allow clients to get, set, list, and remove xattrs on file system objects.'
