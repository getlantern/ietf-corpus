document: rfc-7724
kind: normative-requirement
summary: If the DHCPv4 server receives a DHCPv4 message with a dhcp-message-type that is not supported over a TCP connection (e.g., DHCPDISCOVER, DHCPLEASEQUERY), it MUST close the TCP connection. This updates RFC 6926.
section: 8.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
