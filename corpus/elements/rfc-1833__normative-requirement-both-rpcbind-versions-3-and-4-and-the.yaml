document: rfc-1833
kind: normative-requirement
summary: Both RPCBIND (versions 3 and 4) and the Port Mapper (version 2) are contacted on well-known port 111 over TCP and UDP. Each transport supported by RPCBIND has its own assigned well-known address.
section: "2.2"
rfc2119_level: MUST
topics:
