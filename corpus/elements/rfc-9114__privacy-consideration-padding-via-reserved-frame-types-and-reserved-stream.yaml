document: rfc-9114
kind: privacy-consideration
summary: Padding (via reserved frame types and reserved stream types) can be used to obscure the length of HTTP messages and mitigate traffic analysis. However, padding alone does not fully protect against traffic analysis; implementations SHOULD consider its limitations.
section: "10.7"
topics:
    - http
    - privacy
