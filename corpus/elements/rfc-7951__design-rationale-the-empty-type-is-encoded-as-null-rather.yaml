document: rfc-7951
kind: design-rationale
summary: The 'empty' type is encoded as '[null]' rather than bare JSON null to facilitate use in common programming languages where a null-valued object member is treated as absent. This preserves the ability to distinguish an 'empty' leaf's presence from its absence.
section: "6.9"
