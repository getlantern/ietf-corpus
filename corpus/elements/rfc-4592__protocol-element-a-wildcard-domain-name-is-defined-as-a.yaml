document: rfc-4592
kind: protocol-element
summary: 'A ''wildcard domain name'' is defined as a domain name whose initial (leftmost) label is an asterisk label: binary 0x01 0x2a, where 0x01 is the label length and 0x2a is ASCII ''*''. A resource record owned by such a name is a wildcard RR.'
section: 2.1.1
topics:
    - dns
