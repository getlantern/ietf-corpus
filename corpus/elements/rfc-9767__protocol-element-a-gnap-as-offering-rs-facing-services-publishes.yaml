document: rfc-9767
kind: protocol-element
summary: A GNAP AS offering RS-facing services publishes a discovery document at the well-known path /.well-known/gnap-as-rs (same scheme and authority as the grant request endpoint). The JSON document includes fields for grant_request_endpoint (REQUIRED), introspection_endpoint, token_formats_supported, resource_registration_endpoint, and key_proofs_supported.
