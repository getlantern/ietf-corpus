document: rfc-8669
kind: interoperability-note
summary: If a BGP speaker receives a node's SRGB via BGP-LS Node NLRI and also via a BGP Prefix-SID attribute, the values should be the same. If they differ, the BGP-LS NLRI values SHOULD be preferred and an error logged.
section: "3.2"
topics:
    - bgp
    - routing
