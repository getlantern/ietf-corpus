kind: security-consideration
summary: Manifests enable RPs to detect replay attacks (substitution of stale but valid signed objects), unauthorized removal or occlusion of objects, and suppression of newer object versions. They do not repair repository corruption but allow detection of discrepancies even over insecure channels.
