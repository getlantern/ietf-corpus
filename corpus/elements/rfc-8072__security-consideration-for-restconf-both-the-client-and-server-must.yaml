document: rfc-8072
kind: security-consideration
summary: For RESTCONF, both the client and server MUST be authenticated according to Section 2 of RFC 8040. If the entire YANG Patch request cannot be completed, no configuration changes are made. Message integrity is provided by the RESTCONF protocol.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - yang
    - netconf
