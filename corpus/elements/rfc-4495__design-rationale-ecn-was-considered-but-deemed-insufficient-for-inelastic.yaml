document: rfc-4495
kind: design-rationale
summary: 'ECN was considered but deemed insufficient for inelastic applications: it signals that an endpoint must reduce transmission but does not convey by how much, forcing multiple retry attempts. This extension provides an explicit bandwidth ceiling so the application can select an appropriate codec in a single step.'
section: "1"
topics:
    - qos
    - ecn
    - realtime
