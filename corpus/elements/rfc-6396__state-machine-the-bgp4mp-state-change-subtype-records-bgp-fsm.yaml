document: rfc-6396
kind: state-machine
summary: 'The BGP4MP_STATE_CHANGE subtype records BGP FSM state transitions. States are encoded as 2-octet numbers: Idle (1), Connect (2), Active (3), OpenSent (4), OpenConfirm (5), Established (6). Old State and New State fields capture the transition trigger.'
section: 4.4.1
