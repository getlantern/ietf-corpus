document: rfc-9174
kind: protocol-element
summary: SESS_TERM (message type 0x05) initiates clean session termination. The initiating entity sends SESS_TERM and enters the Ending substate; the responding entity replies with its own SESS_TERM. In-progress transfers may complete during the Ending state, but no new transfers may be started.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
