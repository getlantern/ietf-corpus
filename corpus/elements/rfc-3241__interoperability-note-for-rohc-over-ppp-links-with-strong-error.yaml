document: rfc-3241
kind: interoperability-note
summary: For ROHC over PPP links with strong error detection (RFC 1662), setting k_1=n_1=k_2=n_2=1 is recommended, but k/n must remain significantly less than 7/8 to account for the ~1/8 false-positive CRC success rate on damaged contexts.
