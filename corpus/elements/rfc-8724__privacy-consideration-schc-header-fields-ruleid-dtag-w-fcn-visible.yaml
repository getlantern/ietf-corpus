document: rfc-8724
kind: privacy-consideration
summary: 'SCHC header fields (RuleID, DTag, W, FCN) visible to observers reveal communication patterns: the RuleID exposes the compression/fragmentation profile in use, and DTag values identify concurrent packet streams. These fields can contribute to device fingerprinting and traffic analysis on LPWAN networks.'
section: 12.2.4
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
