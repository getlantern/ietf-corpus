document: rfc-9196
kind: normative-requirement
summary: For the implementation-time use case, capabilities SHOULD be provided by the implementer as YANG instance data files complying with RFC 9195. When provided, the file MUST already be available at implementation time and retrievable without a live network node.
section: "2"
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
