document: rfc-9772
kind: normative-requirement
summary: The TTL or Hop Limit in the inner IP header MUST be set to 255 per RFC 5082 (GTSM). The receiver of an active OAM Geneve packet with IP/UDP encapsulation MUST drop packets whose TTL/Hop Limit is not 255.
section: "2.3"
rfc2119_level: MUST
topics:
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
