document: rfc-2261
kind: design-rationale
summary: 'The architecture mandates self-contained documents: elements of procedure and MIB objects needed for a specific portion of the SNMP framework should be defined in the same document and not referenced across documents. This modularity allows Security Models, authentication/privacy mechanisms, and message formats to be upgraded independently and to progress on the standards track at different paces.'
section: "1.5"
topics:
    - snmp
    - process
