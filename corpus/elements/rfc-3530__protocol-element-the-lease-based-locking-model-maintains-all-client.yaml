document: rfc-3530
kind: protocol-element
summary: The lease-based locking model maintains all client file lock and open state at the server under a single lease period. If the client does not renew its lease within the defined interval, all state associated with the client may be released by the server. The client may renew its lease via the RENEW operation or implicitly through READ and other operations.
section: 1.4.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
