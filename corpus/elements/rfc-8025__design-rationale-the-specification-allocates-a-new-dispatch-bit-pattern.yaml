document: rfc-8025
kind: design-rationale
summary: The specification allocates a new Dispatch Bit Pattern (11 11xxxx) for Paging Dispatch rather than extending the existing Escape Dispatch, because multiple new headers may appear in a single frame and the one-octet overhead per Escape Dispatch occurrence would be prohibitive.
