document: rfc-6558
kind: security-consideration
summary: Security considerations from IMAP CONVERT (RFC 5259) and Sieve (RFC 5228) apply to this document. Computationally expensive conversions of many body parts can constitute an attack vector and servers may throttle or refuse such conversions.
