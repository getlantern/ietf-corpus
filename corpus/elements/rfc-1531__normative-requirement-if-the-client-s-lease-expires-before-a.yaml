document: rfc-1531
kind: normative-requirement
summary: If the client's lease expires before a DHCPACK is received, the client moves to INIT state and MUST immediately stop all other network processing, then restart initialization as if uninitialized.
section: 4.4.4
rfc2119_level: MUST
