document: rfc-7148
kind: security-consideration
summary: The DMNP option is carried as a standard mobility header option and inherits all security guidelines from PMIPv6 (RFC 5213), including the IPsec-based protection of Proxy Binding Update and Proxy Binding Acknowledgement messages. No additional security mechanisms are required for the option itself.
section: "6"
topics:
    - security
    - mobility
    - ipsec
