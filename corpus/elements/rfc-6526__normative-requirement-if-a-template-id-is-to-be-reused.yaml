document: rfc-6526
kind: normative-requirement
summary: If a Template ID is to be reused on a different SCTP stream, the new Template Record MUST NOT be sent before the Template Reuse Delay interval, as in-order delivery guarantees do not extend across streams.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - sctp
