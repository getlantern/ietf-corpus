document: rfc-5420
kind: design-rationale
summary: The SESSION_ATTRIBUTE Flags field has only eight bits, of which five were already assigned (three by RFC 3209, two by RFC 4090), leaving only three bits available. Multiple in-progress proposals were competing for those remaining bits, motivating a new, extensible object rather than further packing the existing field.
