document: rfc-6065
kind: security-consideration
summary: Inconsistent reuse of the same principal name for different entities in both pre-configured vacmSecurityToGroupTable entries and AAA-driven entries can result in incorrect access control policy being applied, potentially granting greater or lesser rights than intended, with no detection by the SNMP engine.
section: "9.1"
topics:
