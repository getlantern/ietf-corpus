document: rfc-5491
kind: normative-requirement
summary: Implementations MUST specify the CRS using the srsName attribute on the outermost geometry element; the CRS MUST NOT be respecified or changed for any sub-elements. The srsDimension attribute SHOULD be omitted.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
