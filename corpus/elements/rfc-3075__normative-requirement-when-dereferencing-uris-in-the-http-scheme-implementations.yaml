document: rfc-3075
kind: normative-requirement
summary: When dereferencing URIs in the HTTP scheme, implementations MUST comply with HTTP Status Code Definitions including following 302, 305, and 307 redirects to obtain a 200 response body. Applications MUST be able to parse URI syntax.
section: 4.3.3.1
rfc2119_level: MUST
topics:
    - security
    - http
