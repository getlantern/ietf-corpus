document: rfc-3558
kind: normative-requirement
summary: When the frame count is odd, the sender MUST add 4 bits of zero padding after the last ToC. When the frame count is even, the sender MUST NOT add padding bits.
section: "4.1"
rfc2119_level: MUST
topics:
