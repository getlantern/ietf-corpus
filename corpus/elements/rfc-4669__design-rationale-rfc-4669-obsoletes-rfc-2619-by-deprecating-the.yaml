document: rfc-4669
kind: design-rationale
summary: RFC 4669 obsoletes RFC 2619 by deprecating the radiusAuthClientTable (which used IPv4-only IpAddress format) and introducing a new radiusAuthClientExtTable using InetAddressType and InetAddress textual conventions from RFC 4001. This follows RFC 4001's recommendation to define new tables with version-neutral IP addressing rather than maintaining parallel tables for different IP versions.
section: "4"
topics:
