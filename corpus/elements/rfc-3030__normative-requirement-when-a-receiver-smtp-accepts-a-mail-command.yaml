document: rfc-3030
kind: normative-requirement
summary: When a receiver-SMTP accepts a MAIL command with BODY=BINARYMIME, it MUST deliver or relay the message in such a way as to preserve all bits in each octet passed using the BDAT command.
section: "3"
rfc2119_level: MUST
topics:
