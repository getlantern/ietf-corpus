document: rfc-7163
kind: design-rationale
summary: RFC 5031 restricted 'sos' sub-service URN registration to emergency services 'offered widely and in different countries,' which blocked registration of country-specific services such as South Korea's 'Reporting spies' and Colombia's 'GAULA (anti-kidnapping)' emergency services. This document relaxes that constraint to allow registration when a service is offered in at least one country at the time of registration.
section: "1"
topics:
    - registry
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
