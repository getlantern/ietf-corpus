document: rfc-2464
kind: protocol-element
summary: 'The Interface Identifier for an Ethernet interface is derived from the interface''s 48-bit IEEE 802 address by forming an EUI-64: the 3-octet OUI becomes the company_id, octets 4-5 are set to 0xFFFE, and the last 3 octets of the MAC address become the last 3 octets of the EUI-64.'
