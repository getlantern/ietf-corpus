document: rfc-3585
kind: protocol-element
summary: The DoPacketLogging property on SAAction, when set to true and propagated to an optional SADB field after SA creation, causes a log message to be generated each time that SA is used to process a packet. For SAStaticActions (bypass, discard, reject), the log is generated at action execution time rather than per-packet.
section: 6.1.2
topics:
    - ipsec
    - security
