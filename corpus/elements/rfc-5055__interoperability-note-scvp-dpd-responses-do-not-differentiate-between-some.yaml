document: rfc-5055
kind: interoperability-note
summary: SCVP DPD responses do not differentiate between 'some revocation information returned' and 'no revocation information returned' (states 2 and 3 of RFC 3379's required DPD status alternatives). This was discussed on the PKIX working group list and determined to be conformant with the intent of the requirements document.
section: "1.3"
topics:
    - pkix
