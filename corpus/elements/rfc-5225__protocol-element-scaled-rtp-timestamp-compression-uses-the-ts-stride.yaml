document: rfc-5225
kind: protocol-element
summary: 'Scaled RTP Timestamp Compression uses the ts_stride control field (default 160) as a scaling factor: timestamp = delta_msn * ts_stride + reference_timestamp. The compressor must re-establish the residue (ts_offset) before using scaled encoding whenever it changes. Use of scaling is OPTIONAL and indicated by the tsc_indicator control field.'
section: 6.6.8
topics:
    - realtime
    - rtp
