document: rfc-3996
kind: design-rationale
summary: 'The ''ippget'' Delivery Method is described as having aspects of both a pull and push method: the Notification Recipient initiates the connection, but in Event Wait Mode the Printer proactively sends Event Notifications over that connection as they occur, without the Printer needing to initiate a new connection.'
