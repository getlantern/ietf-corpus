document: rfc-7851
kind: normative-requirement
summary: Intermediate peers MUST return error code 0x15 on ICMP Destination Unreachable, 0x16 on ICMP Time Exceeded, 0x18 when the upstream peer disobeys routing rules (also conveying upstream peer info), 0x19 when a loop is detected via the Via List, and 0x1a when the TTL field is no more than 0.
section: "6.2"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
