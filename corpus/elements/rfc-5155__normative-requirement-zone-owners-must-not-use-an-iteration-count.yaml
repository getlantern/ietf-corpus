document: rfc-5155
kind: normative-requirement
summary: 'Zone owners MUST NOT use an iteration count higher than the table values: 150 for 1024-bit keys, 500 for 2048-bit keys, 2500 for 4096-bit keys. These limits balance dictionary-attack resistance against signing, serving, and validation cost.'
