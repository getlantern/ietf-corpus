document: rfc-3891
kind: design-rationale
summary: 'A new INVITE with an explicit Replaces header was chosen over implicit dialog association based on Call-ID or other fields because: an INVITE already has correct new-call semantics; the explicit header makes intent obvious; a unique Call-ID can be assigned to the replacement; and there are no adverse effects if the header is unsupported.'
section: "1"
topics:
