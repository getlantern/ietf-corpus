document: rfc-5860
kind: normative-requirement
summary: The OAM encapsulation/differentiation mechanism MUST support differentiating OAM messages that rely on IP capabilities from those that do not. Protocol solutions MUST support identification information as an IP addressing structure and MUST be extensible to support additional identification schemes.
section: 2.1.4
rfc2119_level: MUST
