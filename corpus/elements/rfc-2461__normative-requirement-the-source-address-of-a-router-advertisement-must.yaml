document: rfc-2461
kind: normative-requirement
summary: The source address of a Router Advertisement MUST be the link-local address assigned to the sending interface. Similarly, the source address of a Redirect MUST be the link-local address of the interface from which the Redirect is sent.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
