document: rfc-9410
kind: security-consideration
summary: The authentication service MUST remove the Reason header field containing the PASSporT to protect against replay attacks (a still-fresh PASSporT could be reused) and to prevent private call information from being exposed to the call initiator or other upstream entities.
section: "9"
topics:
    - sip
    - security
    - privacy
