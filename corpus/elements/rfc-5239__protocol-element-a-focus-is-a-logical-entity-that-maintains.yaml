document: rfc-5239
kind: protocol-element
summary: A focus is a logical entity that maintains a separate call signaling interface with each participating client and holds the conference object representing the active conference state. There is a one-to-one mapping between an active conference object and a focus; the focus handles primary membership operations (join, leave) and media negotiation. An active conference may have multiple conference identifiers, one per supported signaling protocol.
section: "6.2"
topics:
