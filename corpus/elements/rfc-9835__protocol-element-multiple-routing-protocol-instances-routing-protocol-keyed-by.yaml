document: rfc-9835
kind: protocol-element
summary: Multiple routing protocol instances ('routing-protocol', keyed by 'id') can be defined per AC to accommodate scenarios requiring multiple instances of the same protocol on the same AC. Supported types include static, BGP, OSPF, IS-IS, RIP, and VRRP, each controlled by a feature flag from 'ietf-vpn-common'.
section: "5.6"
topics:
