document: rfc-1759
kind: interoperability-note
summary: Localization applies only to MIB string objects explicitly marked as localized. All other character strings in the MIB are returned in ASCII. The prtGeneralCurrentLocalization index controls localized descriptions; prtConsoleLocalization separately controls console strings.
section: 2.2.1
topics:
