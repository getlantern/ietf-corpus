document: rfc-5285
kind: normative-requirement
summary: Header extensions using this specification MUST only be used for data that can safely be ignored by the recipient without affecting interoperability, and MUST NOT be used when the presence of the extension has changed the form or nature of the rest of the packet in a way incompatible with the signaled stream.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
