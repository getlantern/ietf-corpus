document: rfc-4102
kind: security-consideration
summary: Text data is susceptible to unwanted modification that may lead to undesired results, perhaps even more so than audio data. Payload integrity protection over at least the complete RTP packet is RECOMMENDED, for example using SRTP (RFC 3711), to prevent modification of primary, secondary, or header information.
section: "5"
rfc2119_level: RECOMMENDED
topics:
