document: rfc-5583
kind: normative-requirement
summary: The offerer decides the number of media streams and the dependency between them; the answerer cannot change the dependency relations. The answerer MUST use the dependency relations provided in the offer when sending media.
section: "6.1"
rfc2119_level: MUST
