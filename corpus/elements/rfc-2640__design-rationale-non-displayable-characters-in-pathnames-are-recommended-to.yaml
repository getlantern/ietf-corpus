document: rfc-2640
kind: design-rationale
summary: Non-displayable characters in pathnames are RECOMMENDED to be presented in URL %HH format (RFC 1738) rather than silently dropped, preserving information for the user while acknowledging that glyph rendering is outside the scope of this specification.
