document: rfc-4401
kind: normative-requirement
summary: Mechanisms MUST be able to output at least up to 2^14 octets. If the implementation cannot produce the desired output due to lack of resources, it MUST return GSS_S_FAILURE and MUST set a suitable minor status code.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - crypto
