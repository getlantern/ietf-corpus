document: rfc-8562
kind: normative-requirement
summary: BFD packets received on tails for an IP multicast group MUST be consumed by tails and MUST NOT be forwarded to receivers. MultipointTail nodes MUST identify packets as BFD Control packets when the destination UDP port equals 3784.
section: "5.8"
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - udp
