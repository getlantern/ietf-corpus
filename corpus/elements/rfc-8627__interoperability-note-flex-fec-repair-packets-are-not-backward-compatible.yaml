document: rfc-8627
kind: interoperability-note
summary: FLEX FEC repair packets are not backward compatible with RFC 2733, RFC 5109, or SMPTE 2022-1, but endpoints that do not implement this specification can ignore the FEC repair packets, since the unrecognized payload type causes RTP receivers to discard them per RFC 3550.
