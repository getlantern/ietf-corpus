document: rfc-3034
kind: wire-format
summary: 'The ''Frame Relay Label Range'' LDP TLV is a 64-bit object containing: a Reserved field, a 2-bit Len field (0=10-bit DLCI, 2=23-bit DLCI), a 23-bit Minimum DLCI, a Reserved field, and a 23-bit Maximum DLCI. It communicates the supported DLCI range and size from one FR-LSR to its LDP peer.'
section: "7.3"
