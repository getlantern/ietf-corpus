document: rfc-7440
kind: interoperability-note
summary: The windowsize option is negotiated using the TFTP Option Extension mechanism defined in RFC 2347. If the server does not support the option it will ignore it, and the transfer proceeds as standard lockstep TFTP per RFC 1350, ensuring backward compatibility with non-implementing servers.
