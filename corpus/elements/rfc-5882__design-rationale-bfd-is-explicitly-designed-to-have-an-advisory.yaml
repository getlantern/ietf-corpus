document: rfc-5882
kind: design-rationale
summary: BFD is explicitly designed to have an advisory role to client protocols rather than replacing their liveness mechanisms. BFD does not carry application-specific information partly for architectural reasons and partly because BFD may have unpredictable latency characteristics, making it a poor transport mechanism.
section: "2"
topics:
