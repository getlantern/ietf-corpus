document: rfc-7195
kind: protocol-element
summary: The Caller ID correlation mechanism exchanges the Calling Party Number as an international E.164 number in the 'callerid' subfield of 'cs-correlation'. Correlation succeeds if the value matches the Calling Party Number Information Element in the circuit-switched call setup signaling.
