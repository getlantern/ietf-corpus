document: rfc-9207
kind: normative-requirement
summary: If a client receives an authorization response that contains multiple issuer identifiers (e.g., both an `iss` parameter and an ID Token `iss` claim), the client MUST reject the response if these identifiers do not match.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
    - security
