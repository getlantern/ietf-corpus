document: rfc-6051
kind: normative-requirement
summary: An RTP sender MUST send periodic compound RTCP packets following Section 6 of RFC 3550. A compound RTCP packet containing an RTCP SR and RTCP SDES with a CNAME item MUST be sent to each RTP session in the multimedia session by each sender to enable receiver synchronisation.
section: "2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
