document: rfc-4088
kind: normative-requirement
summary: The userinfo component of the URI authority, when present, MUST be an SNMP securityName. Authentication credentials (passwords) MUST NOT be included in the URI; any required secret or key must be provided via out-of-band means.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
