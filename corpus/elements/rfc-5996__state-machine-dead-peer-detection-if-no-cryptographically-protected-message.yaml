document: rfc-5996
kind: state-machine
summary: 'Dead Peer Detection: if no cryptographically protected message has been received recently on an IKE SA or any Child SA, the endpoint sends an empty INFORMATIONAL request. If repeated retransmissions go unanswered for the timeout period, the IKE SA and all associated Child SAs are discarded. Receipt of any fresh protected message resets the liveness timer.'
section: "2.4"
topics:
    - ipsec
    - security
