document: rfc-8516
kind: protocol-element
summary: CoAP response code 4.29 'Too Many Requests' is defined for a server to signal that a client is sending requests more frequently than the server is capable or willing to handle. It uses the Max-Age option to indicate the back-off period after which the client may retry.
section: "1"
topics:
