document: rfc-9534
kind: normative-requirement
summary: When the micro STAMP Session-Reflector receives a test packet with a non-zero Reflector Micro-session ID, it MUST use that identifier to check association with the micro STAMP session; if validation fails, the test packet MUST be discarded.
section: "3.2"
rfc2119_level: MUST
topics:
