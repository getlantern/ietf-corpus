document: rfc-3878
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers SHOULD consider the security features of the SNMPv3 framework, including full support for SNMPv3 cryptographic mechanisms for authentication and privacy. It is RECOMMENDED to deploy SNMPv3 with cryptographic security enabled.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
