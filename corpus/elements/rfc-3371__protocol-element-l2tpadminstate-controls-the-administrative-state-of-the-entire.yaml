document: rfc-3371
kind: protocol-element
summary: l2tpAdminState controls the administrative state of the entire L2TP protocol stack. Setting it to disabled(2) immediately disconnects all tunnels and prevents new tunnels from being initiated or accepted. Its value must be maintained in non-volatile memory.
section: "4.0"
topics:
