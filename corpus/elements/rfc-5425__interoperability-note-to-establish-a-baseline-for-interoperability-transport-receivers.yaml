document: rfc-5425
kind: interoperability-note
summary: To establish a baseline for interoperability, transport receivers MUST be able to process syslog messages up to 2048 octets and SHOULD support up to 8192 octets; there is no per-specification upper bound on message length.
section: 4.3.1
topics:
