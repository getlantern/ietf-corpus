document: rfc-5322
kind: normative-requirement
summary: In the message body, CR and LF MUST only occur together as CRLF; they MUST NOT appear independently. Lines of the body MUST be limited to 998 characters and SHOULD be limited to 78 characters, excluding the CRLF.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
