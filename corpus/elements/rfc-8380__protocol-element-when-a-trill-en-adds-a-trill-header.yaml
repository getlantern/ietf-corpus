document: rfc-8380
kind: protocol-element
summary: When a TRILL-EN adds a TRILL header to a data packet, the ingress RBridge nickname field is set to the nickname of the Appointed Forwarder (AF) for the data packet's VLAN. The TRILL-EN determines the AF by snooping on IS-IS Hellos from edge RBridges.
section: "4"
topics:
    - mobility
