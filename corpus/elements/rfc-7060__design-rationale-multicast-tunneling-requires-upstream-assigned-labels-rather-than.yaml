document: rfc-7060
kind: design-rationale
summary: Multicast tunneling requires upstream-assigned labels (rather than downstream-assigned) because U sends a single packet copy into the tunnel; downstream-assigned labels would not allow U to label the packet before replication occurs in the tunnel.
