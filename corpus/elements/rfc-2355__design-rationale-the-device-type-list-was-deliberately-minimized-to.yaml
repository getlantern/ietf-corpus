document: rfc-2355
kind: design-rationale
summary: The device-type list was deliberately minimized to only a few well-known designations rather than enumerating every IBM model, and the '-E' suffix and DYNAMIC type rely on Read Partition Query/Query Reply to communicate actual capabilities to host applications—decoupling hardware model numbers from data stream feature support.
section: "7.1"
