document: rfc-5754
kind: design-rationale
summary: DSA with SHA-384 and SHA-512 are not defined because consistent cryptographic strength would require DSA with L=7680 for SHA-384 and L=15360 for SHA-512, both of which exceed DSA's maximum specified parameter size of L=3072.
section: "3.1"
topics:
