document: rfc-6397
kind: privacy-consideration
summary: 'Because the MRT geo-location format does not support GEOPRIV privacy rules, each location entry in an MRT object is assigned default privacy rules per RFC 4119: retransmission-allowed true, retention-expires 100 years from timestamp, with empty ruleset-reference and note-well.'
