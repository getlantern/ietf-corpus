document: rfc-3024
kind: normative-requirement
summary: If the home agent is unable to support the requested form of encapsulation for a reverse tunnel, it MUST return code 139 ('requested encapsulation unavailable'). If it cannot support a reverse tunnel with the same configuration as the forward tunnel, it MUST return code 137.
section: 4.3.1
rfc2119_level: MUST
topics:
    - mobility
