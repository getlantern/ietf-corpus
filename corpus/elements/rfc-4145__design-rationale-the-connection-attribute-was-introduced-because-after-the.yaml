document: rfc-4145
kind: design-rationale
summary: The 'connection' attribute was introduced because after the initial session is established, subsequent SDP exchanges could ambiguously represent either a request to continue the existing TCP connection or to create a new one; the attribute explicitly resolves this ambiguity.
