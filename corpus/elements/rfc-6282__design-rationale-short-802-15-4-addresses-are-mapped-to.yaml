document: rfc-6282
kind: design-rationale
summary: Short 802.15.4 addresses are mapped to the restricted EUI-64 space (0000:00ff:fe00:XXXX) rather than the unrestricted space used by real EUI-64 identifiers, ensuring no overlap with IIDs generated from extended addresses and avoiding collisions with other locally managed IIDs.
section: 3.2.2
topics:
