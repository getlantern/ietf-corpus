document: rfc-6577
kind: errata
summary: RFC 5451 registered 'hardfail' as the SPF failure result in the Email Authentication Result Names registry, but the SPF specification (RFC 4408) uses the string 'fail' for the same condition. This discrepancy was documented in RFC Errata ID 2617 and is corrected by this memo.
section: "1"
topics:
    - email
    - registry
