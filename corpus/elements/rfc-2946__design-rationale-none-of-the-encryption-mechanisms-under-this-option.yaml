document: rfc-2946
kind: design-rationale
summary: None of the encryption mechanisms under this option provide data integrity due to the complexity of specifying integrity services efficiently in a stream-oriented protocol. Future work should examine TELNET START_TLS, which provides confidentiality, integrity, and compression.
