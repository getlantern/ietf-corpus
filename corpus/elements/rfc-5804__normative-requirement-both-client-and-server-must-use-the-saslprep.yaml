document: rfc-5804
kind: normative-requirement
summary: Both client and server MUST use the SASLprep profile of StringPrep to prepare authorization identities for transmission or comparison; if preparation fails or results in an empty string (unless transmitted as empty), the server MUST fail the authentication.
section: "2.1"
rfc2119_level: MUST
topics:
