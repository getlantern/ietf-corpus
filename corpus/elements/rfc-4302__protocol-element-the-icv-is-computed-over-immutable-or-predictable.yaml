document: rfc-4302
kind: protocol-element
summary: The ICV is computed over immutable or predictable IP header fields preceding AH, the AH header itself (with ICV zeroed), all data following AH, and (if ESN) the high-order 32 bits of the ESN appended after the payload. Mutable fields are zeroed rather than omitted to preserve alignment.
section: 3.3.3
topics:
    - ipsec
    - crypto
    - security
