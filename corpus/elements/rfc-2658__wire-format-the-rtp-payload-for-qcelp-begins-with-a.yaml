document: rfc-2658
kind: wire-format
summary: 'The RTP payload for Qcelp begins with a 1-octet header containing three fields: Reserved (RR, 2 bits, must be zero), Interleave (LLL, 3 bits, values 0–5), and Interleave Index (NNN, 3 bits, must be ≤ LLL). These are followed by one or more codec data frames aligned on octet boundaries.'
