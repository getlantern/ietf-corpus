document: rfc-7230
kind: security-consideration
summary: Response splitting occurs when user-supplied data is embedded in response header fields without adequate sanitization, allowing an attacker to inject a fabricated response. Implementations must sanitize all data inserted into header field values.
section: "9.4"
topics:
