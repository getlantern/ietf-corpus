document: rfc-3670
kind: design-rationale
summary: The model imposes no fixed ordering on ConditioningService instances on an interface. Instead, NextService, NextServiceAfterMeter, and NextServiceAfterClassifierElement associations chain services explicitly, because different interfaces may require different subsets, multiplicities, and orderings of conditioning services.
