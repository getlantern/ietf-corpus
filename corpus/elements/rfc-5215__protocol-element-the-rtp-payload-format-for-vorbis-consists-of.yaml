document: rfc-5215
kind: protocol-element
summary: 'The RTP payload format for Vorbis consists of a standard RTP header followed by a 4-octet payload header (Ident: 24 bits, Fragment type F: 2 bits, Vorbis Data Type VDT: 2 bits, packet count: 4 bits), then payload data. There are 3 types of Vorbis data and an RTP payload MUST contain just one at a time.'
section: "2"
topics:
