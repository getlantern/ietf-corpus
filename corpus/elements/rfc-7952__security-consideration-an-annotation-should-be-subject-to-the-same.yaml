document: rfc-7952
kind: security-consideration
summary: An annotation SHOULD be subject to the same or stricter access control rules as the data node instance to which it is attached. Security-sensitive or privacy-sensitive data is RECOMMENDED to be modeled as regular YANG data nodes rather than annotations.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
    - yang
