document: rfc-4356
kind: wire-format
summary: 'Internet delivery and disposition reports use the multipart/report MIME type (RFC 3462): first subpart is text/plain (human-readable); second subpart is message/delivery-status or message/disposition-notification (structured); optional third subpart is message/rfc822 containing the original message headers. MMS reports are plain text with no defined structure.'
section: 2.1.4
topics:
