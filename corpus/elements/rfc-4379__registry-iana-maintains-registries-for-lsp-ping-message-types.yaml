kind: registry
summary: 'IANA maintains registries for LSP ping: Message Types (1=echo request, 2=echo reply; vendor-private range 3-127), Reply Modes (1-4 defined; vendor-private range 5-251), Return Codes (0-13 defined; vendor-private range 192-247), and TLV Types (Types 1-10 assigned; types 32768-65535 are optional). Vendor-private codepoints require a Vendor Enterprise Number TLV in the message.'
