document: rfc-2915
kind: normative-requirement
summary: The first matching NAPTR record MUST be the one used. Clients MUST process multiple NAPTR records in Order field sequence and MUST NOT simply use the first record that offers a known protocol/service combination.
section: "4"
rfc2119_level: MUST
