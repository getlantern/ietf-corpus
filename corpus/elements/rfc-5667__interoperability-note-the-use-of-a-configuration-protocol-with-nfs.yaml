document: rfc-5667
kind: interoperability-note
summary: The use of a configuration protocol with NFS v2 and v3 is OPTIONAL because practical data sizes (<=8 KB for v2, <=32 KB for v3) allow basic operation without configuration exchange; however, configuration may improve server resource management.
