summary: 'Unimpaired Seconds (32 bits) counts whole seconds with no frame loss or discard due to late arrival. Normal playout of comfort noise during talker silence with VAD counts as Unimpaired Seconds. Reserved values: 0xFFFFFFFE (out-of-range), 0xFFFFFFFF (unavailable).'
