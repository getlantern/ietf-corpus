document: rfc-5965
kind: security-consideration
summary: The authenticity and validity of ARF report content SHOULD be established through other means such as S/MIME, DKIM, SPF, or SenderID before undertaking automated actions. Unvetted reports could contain false, incomplete, or deliberately crafted content intended to trigger undesirable automated responses.
section: "8.2"
topics:
