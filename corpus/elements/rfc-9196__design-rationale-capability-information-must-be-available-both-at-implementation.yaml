document: rfc-9196
kind: design-rationale
summary: Capability information must be available both at implementation time (for NMS designers who cannot wait for a live network node) and at runtime (for purely model-driven applications or to verify implementation claims). An NMS that supports on-change notifications cannot be built unless capability data is available before the node is deployed.
section: "1"
topics:
