document: rfc-7469
kind: normative-requirement
summary: UAs MAY set an upper limit on the max-age value to allow recovery from erroneous or maliciously set pins. If the server's max-age exceeds the UA's cap, the UA MAY behave as if the server set max-age to the UA's upper limit.
section: 2.3.3
rfc2119_level: MAY
topics:
    - http
    - security
