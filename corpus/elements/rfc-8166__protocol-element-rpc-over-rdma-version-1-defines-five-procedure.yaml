document: rfc-8166
kind: protocol-element
summary: 'RPC-over-RDMA version 1 defines five procedure types via the rdma_proc enum: RDMA_MSG (0) carries a Payload stream inline; RDMA_NOMSG (1) carries no inline Payload stream; RDMA_MSGP (2) and RDMA_DONE (3) are reserved and must not be used; RDMA_ERROR (4) signals a header encoding error.'
section: 4.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
