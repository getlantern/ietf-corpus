document: rfc-9960
kind: normative-requirement
summary: It is RECOMMENDED that the Tree-SID be used as the Replication-SID for Replication segments at intermediate Replication nodes and Leaf nodes of the PTI to simplify operations and troubleshooting. However, these Replication-SIDs MAY differ from the Tree-SID.
