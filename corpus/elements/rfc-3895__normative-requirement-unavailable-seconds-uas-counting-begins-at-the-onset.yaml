document: rfc-3895
kind: normative-requirement
summary: Unavailable Seconds (UAS) counting begins at the onset of 10 contiguous Severely Errored Seconds (SESs). While unavailable, only the UAS counter increments; ES, BES, SES, SEFS, PCV, and DM counters are frozen. The interface returns to available at the onset of 10 contiguous non-SES seconds.
section: 2.4.3
rfc2119_level: MUST NOT
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
