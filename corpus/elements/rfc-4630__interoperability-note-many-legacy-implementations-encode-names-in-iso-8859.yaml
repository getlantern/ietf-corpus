document: rfc-4630
kind: interoperability-note
summary: Many legacy implementations encode names in ISO 8859-1 (Latin1String) but tag them as TeletexString. Since TeletexString encodes a larger character set and some characters differently, implementations SHOULD be prepared to handle both encodings.
section: "3"
rfc2119_level: SHOULD
topics:
