document: rfc-8139
kind: normative-requirement
summary: All TRILL switches on a link configured with an FGL-VLAN mapping SHOULD be configured with the same mapping, and SHOULD advertise their mapping using the FGL-VLAN-Bitmap and FGL-VLAN-Pairs APPsub-TLVs. A TRILL switch SHOULD alert the network operator if an inconsistency persists beyond its Holding Time (configurable from 0 to 65,534 seconds).
section: "7"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
