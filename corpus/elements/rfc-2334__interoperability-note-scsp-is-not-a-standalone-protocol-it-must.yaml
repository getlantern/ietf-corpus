document: rfc-2334
kind: interoperability-note
summary: SCSP is not a standalone protocol; it must be paired with a protocol-specific specification that defines how a given client/server protocol (e.g., NHRP, ATMARP) maps its cache entries to SCSP primitives. Protocol-specific fragmentation, purge mechanisms, and Family ID use are all delegated to those documents.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
