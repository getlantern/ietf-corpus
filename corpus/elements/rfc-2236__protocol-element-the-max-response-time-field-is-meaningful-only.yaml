document: rfc-2236
kind: protocol-element
summary: The Max Response Time field is meaningful only in Membership Query messages, specifying the maximum allowed time before sending a responding report in units of 1/10 second. In all other messages it is set to zero by the sender and ignored by receivers.
section: "2.2"
