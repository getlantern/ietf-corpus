document: rfc-8281
kind: normative-requirement
summary: If the PCC receives a PCInitiate for instantiation (R=0) with a non-zero PLSP-ID, it MUST send PCErr Error-type=19 Error-value=8. If the ERO is missing (R=0), it MUST send PCErr Error-type=6 Error-value=9. If SYMBOLIC-PATH-NAME TLV is absent, it MUST send PCErr Error-type=10 Error-value=8.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
