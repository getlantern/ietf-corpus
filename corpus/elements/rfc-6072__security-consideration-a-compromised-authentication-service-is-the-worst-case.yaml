document: rfc-6072
kind: security-consideration
summary: 'A compromised authentication service is the worst-case attack: the attacker can forge certificates and perform man-in-the-middle attacks on any user. UAs MAY try to detect this by subscribing to their own certificate under a different identity or by monitoring certificate fingerprints for unexpected changes before expiry.'
section: "10.8"
topics:
    - security
    - sip
