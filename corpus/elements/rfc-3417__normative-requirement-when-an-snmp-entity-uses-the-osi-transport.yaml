document: rfc-3417
kind: normative-requirement
summary: When an SNMP entity uses the OSI transport mapping, it must be capable of accepting messages that are at least 484 octets in size. Implementation of larger values is encouraged.
section: "4.2"
rfc2119_level: MUST
