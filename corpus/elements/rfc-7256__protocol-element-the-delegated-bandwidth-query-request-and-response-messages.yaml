document: rfc-7256
kind: protocol-element
summary: The Delegated Bandwidth Query Request and Response messages (both Message Type 148) allow either peer to query the other's view of the current delegated multicast bandwidth for an access line; the response MUST set Result=Success and include a Bandwidth-Allocation TLV with the responder's current view.
section: "4.7"
topics:
    - multicast
    - qos
