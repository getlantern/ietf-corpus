document: rfc-7766
kind: normative-requirement
summary: It is RECOMMENDED that the default server application-level idle period be on the order of seconds. Servers SHOULD reset the idle timeout on the receipt of a full DNS message rather than on receipt of any part of a DNS message to avoid slow-read attacks.
section: 6.2.3
rfc2119_level: RECOMMENDED
topics:
    - dns
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
