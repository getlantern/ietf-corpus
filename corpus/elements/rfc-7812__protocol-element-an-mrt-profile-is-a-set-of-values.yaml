document: rfc-7812
kind: protocol-element
summary: An MRT Profile is a set of values and options identified by an 8-bit Profile ID. It specifies the MRT algorithm, MRT-Red and MRT-Blue MPLS MT-IDs, GADAG Root Selection Policy, MRT Forwarding Mechanism, Recalculation process, and Area/Level Border Behavior. Profile ID 0 designates the Default MRT Profile.
