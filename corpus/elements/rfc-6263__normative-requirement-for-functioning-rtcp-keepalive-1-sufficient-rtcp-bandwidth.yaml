document: rfc-6263
kind: normative-requirement
summary: 'For functioning RTCP keepalive: (1) sufficient RTCP bandwidth must be provided such that Twc ≤ Tr; (2) if AVP or SAVP is used, Tmin must not exceed Tr / (1.5 / (e − 3/2)); (3) if AVPF or SAVPF is used, trr-min must not be set to a value greater than Tr / 3.'
section: "8"
rfc2119_level: MUST
topics:
