document: rfc-9233
kind: protocol-element
summary: U+08A1 ARABIC LETTER BEH WITH HAMZA ABOVE was introduced in Unicode 7.0.0 and assigned PVALID. It can be represented as the combining sequence U+0628 (ARABIC LETTER BEH) + U+0654 (ARABIC HAMZA ABOVE), analogous to U+00F8 which can be represented as U+006F + U+0337.
