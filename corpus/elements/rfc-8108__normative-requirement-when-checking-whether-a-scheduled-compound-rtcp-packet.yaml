document: rfc-8108
kind: normative-requirement
summary: When checking whether a scheduled compound RTCP packet already contains feedback messages (Step 2 of RFC 4585 Section 3.5.2), that check MUST be done considering all local SSRCs, not just the sending SSRC.
section: 5.4.2
rfc2119_level: MUST
topics:
