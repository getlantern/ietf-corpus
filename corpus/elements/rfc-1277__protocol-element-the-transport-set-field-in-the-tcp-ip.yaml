document: rfc-1277
kind: protocol-element
summary: The Transport Set field in the TCP/IP DSP format is a 16-bit flag word encoded as a 5-digit decimal number. Value 1 means TCP, value 2 means UDP; further values are assigned by IANA. Absence or all-zero bits means 'default' (TCP).
section: "4.5"
