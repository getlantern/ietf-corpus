kind: wire-format
summary: FGL TRILL Data packets use Ethertype 0x893B (2 bytes) followed by Inner.Label High Part (2 bytes), then a second 0x893B (2 bytes) followed by Inner.Label Low Part (2 bytes), all appearing after the inner MAC addresses inside the TRILL Header.
