document: rfc-5613
kind: normative-requirement
summary: When cryptographic authentication is enabled on the corresponding interface, the LLS data block MUST also be cryptographically authenticated using the CA-TLV; all LLS TLVs MUST be 32-bit aligned (padded if necessary), with padding bytes not counted in the TLV Length field.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
