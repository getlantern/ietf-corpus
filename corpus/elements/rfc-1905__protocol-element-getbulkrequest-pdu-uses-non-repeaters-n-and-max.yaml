document: rfc-1905
kind: protocol-element
summary: GetBulkRequest-PDU uses non-repeaters (N) and max-repetitions (M) to request N single lexicographic successors for the first N bindings, plus M successive lexicographic successors for each of the remaining R bindings. Total requested bindings = N + (M * R).
section: 4.2.3
