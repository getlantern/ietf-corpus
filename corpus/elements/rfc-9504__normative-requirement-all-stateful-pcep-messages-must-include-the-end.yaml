document: rfc-9504
kind: normative-requirement
summary: All stateful PCEP messages MUST include the END-POINTS object with Generalized Endpoint object type containing the LABEL-REQUEST TLV for GMPLS LSPs. If unnumbered endpoint addresses are used, the UNNUMBERED-ENDPOINT TLV MUST be used.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
