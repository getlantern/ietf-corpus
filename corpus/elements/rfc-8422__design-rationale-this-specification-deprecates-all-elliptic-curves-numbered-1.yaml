document: rfc-8422
kind: design-rationale
summary: This specification deprecates all elliptic curves numbered 1–22 in the NamedCurve registry (from RFC 4492) as well as explicit curve formats, because only secp256r1, secp384r1, and secp521r1 had seen significant use. X25519 and X448 are added from RFC 7748 as modern, well-analyzed alternatives.
section: 5.1.1
topics:
