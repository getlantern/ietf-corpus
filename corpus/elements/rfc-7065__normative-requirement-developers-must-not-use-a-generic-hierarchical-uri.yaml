document: rfc-7065
kind: normative-requirement
summary: Developers MUST NOT use a generic hierarchical URI parser to parse a "turn" or "turns" URI. Although <host> and <port> are defined in RFC 3986 as components of generic hierarchical URIs, the "turn" and "turns" schemes are opaque, not hierarchical.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
