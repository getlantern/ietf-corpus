document: rfc-7614
kind: wire-format
summary: 'The Refer-Events-At header field carries a sip: or sips: URI enclosed in angle brackets, with optional generic parameters. ABNF: Refer-Events-At = "Refer-Events-At" HCOLON LAQUOT ( SIP-URI / SIPS-URI ) RAQUOT *( SEMI generic-param ). A bare addr-spec without angle brackets is invalid.'
section: "4.8"
