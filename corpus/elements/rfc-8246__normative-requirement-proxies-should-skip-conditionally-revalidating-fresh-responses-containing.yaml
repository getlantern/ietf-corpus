document: rfc-8246
kind: normative-requirement
summary: Proxies SHOULD skip conditionally revalidating fresh responses containing the immutable extension unless there is a signal from the client that a validation is necessary (e.g., a no-cache Cache-Control request directive).
section: "2.1"
rfc2119_level: SHOULD
