document: rfc-2658
kind: security-consideration
summary: RTP packets using this format are subject to the security considerations of the RTP specification. Confidentiality is achieved via encryption, which may be applied after compression without conflict. A denial-of-service threat from pathological datagrams causing excessive decode load is noted, though Qcelp encoding does not exhibit significant non-uniform computational load.
section: "6"
topics:
