document: rfc-1573
kind: protocol-element
summary: The ifTestTable provides a generic mechanism for performing tests on interfaces. Media-specific MIBs must define its applicability. It replaces the RFC 1229 test table, substituting ifTestId, ifTestStatus, and ifTestOwner for the former community/context and requestId objects.
