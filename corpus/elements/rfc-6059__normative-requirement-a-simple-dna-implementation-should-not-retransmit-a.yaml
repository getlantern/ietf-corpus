document: rfc-6059
kind: normative-requirement
summary: A Simple DNA implementation SHOULD NOT retransmit a Neighbor Solicitation more than twice. To dampen spurious link-up indications, the host SHOULD NOT perform the Simple DNA procedure more than once per second. If any response is received to a unicast NS, pending retransmissions of the same NS MUST be canceled.
section: "5.11"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
