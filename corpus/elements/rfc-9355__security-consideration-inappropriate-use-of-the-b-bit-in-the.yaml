document: rfc-9355
kind: security-consideration
summary: Inappropriate use of the B-bit in the LLS block of an OSPF Hello message could prevent OSPF adjacency formation or cause failure to detect bidirectional forwarding failures. If authentication is used in the OSPF routing domain, the Cryptographic Authentication TLV MUST also be used to protect the LLS block contents.
section: "8"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
