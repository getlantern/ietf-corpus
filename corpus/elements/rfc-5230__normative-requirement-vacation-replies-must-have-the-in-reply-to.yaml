document: rfc-5230
kind: normative-requirement
summary: Vacation replies MUST have the In-Reply-To field set to the Message-ID of the original message; the References field SHOULD be updated accordingly. If the original message lacks a Message-ID, these fields need not be generated.
section: "5.8"
rfc2119_level: MUST
topics:
    - email
