document: rfc-4872
kind: state-machine
summary: 'Secondary LSP lifecycle: (1) Pre-provisioned state — S=1, P=1 in PROTECTION object; resources pre-reserved at control plane, no data plane cross-connection. (2) Activated/primary state — triggered by a modified Path message with S=0; link and node resources are allocated at the data plane and the LSP becomes capable of carrying normal traffic.'
