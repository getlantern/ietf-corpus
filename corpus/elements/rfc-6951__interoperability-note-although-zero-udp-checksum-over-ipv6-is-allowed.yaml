document: rfc-6951
kind: interoperability-note
summary: Although zero UDP checksum over IPv6 is allowed under RFC 6936, this document does not specify mechanisms for that mode. Deployed support may be limited, and at the time of writing, a zero UDP checksum would be counter to the goal of legacy NAT traversal.
section: "5.3"
topics:
    - sctp
    - udp
    - nat
