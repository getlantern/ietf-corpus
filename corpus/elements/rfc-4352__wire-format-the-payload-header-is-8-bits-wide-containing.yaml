summary: The payload header is 8 bits wide, containing ISF (5 bits) indicating the Internal Sampling Frequency, TFI (2 bits) indicating the Transport Frame Index (position in the AMR-WB+ super-frame), and L (1 bit) flag indicating whether 4-bit or 8-bit displacement fields are used in interleaved mode.
