document: rfc-6409
kind: normative-requirement
summary: The MSA MUST ensure that any address it places in a 'Sender' field is a valid mail address. The MSA MAY add or replace the 'Sender' field if the identity of the sender is known and not given in 'From'.
section: "8.1"
rfc2119_level: MUST
topics:
    - email
