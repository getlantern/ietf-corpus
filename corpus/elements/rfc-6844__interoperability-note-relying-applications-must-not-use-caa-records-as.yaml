document: rfc-6844
kind: interoperability-note
summary: Relying Applications MUST NOT use CAA records as part of certificate validation because a certificate that is not conformant with currently published CAA records may have been conformant when issued. CAA records MAY be used by Certificate Evaluators only as a possible indicator of a policy violation.
