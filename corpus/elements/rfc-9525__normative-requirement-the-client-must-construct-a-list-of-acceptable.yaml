document: rfc-9525
kind: normative-requirement
summary: The client MUST construct a list of acceptable reference identifiers and MUST do so independently of the identifiers presented by the server. Intermediate domain names produced during DNS resolution MUST NOT be treated as reference identifiers.
section: 6.1.1
rfc2119_level: MUST
topics:
