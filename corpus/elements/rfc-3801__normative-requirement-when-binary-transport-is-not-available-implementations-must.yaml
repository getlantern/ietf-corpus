document: rfc-3801
kind: normative-requirement
summary: When binary transport is not available, implementations MUST encode audio and/or facsimile data as Base64. Conforming implementations MUST recognize and decode Binary, 7bit, 8bit, Base64, and Quoted-Printable content-transfer encodings.
section: 4.2.12
rfc2119_level: MUST
