document: rfc-9221
kind: protocol-element
summary: Acknowledgement of a DATAGRAM frame only indicates that the transport-layer receiver processed the frame; it does not guarantee that the application successfully processed the data. Application-layer signals are needed for confirmed end-to-end delivery.
section: "5.2"
