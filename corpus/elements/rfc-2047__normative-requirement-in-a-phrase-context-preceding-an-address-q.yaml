document: rfc-2047
kind: normative-requirement
summary: In a 'phrase' context (preceding an address), Q-encoded text is restricted to upper/lower ASCII letters, decimal digits, and the characters '!', '*', '+', '-', '/', '=', and '_'. Other characters including RFC 822 specials are not permitted.
section: "5"
rfc2119_level: MUST NOT
