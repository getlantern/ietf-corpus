document: rfc-2091
kind: normative-requirement
summary: Routing entries learned from a triggered Update Response on the WAN MUST NOT time out in the normal course of events; they are considered permanent unless a circuit-down event or excessive retransmission failures mark them unreachable.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
