document: rfc-7879
kind: protocol-element
summary: 'There are two subtypes of media-aware relay (RFC 7092 Section 3.2.2): inspection-only (reads RTP headers and unencrypted RTCP) and modifying (alters them). Only inspection-only relays are compatible with end-to-end DTLS-SRTP; modifying relays require DTLS termination.'
section: 5.1.2
topics:
    - rtp
    - realtime
    - tls
