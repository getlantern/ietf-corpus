document: rfc-4556
kind: normative-requirement
summary: The client MUST be capable of sending certificates sufficient for the KDC to construct a certification path for the client's certificate. The KDC MUST be capable of sending certificates sufficient for the client to construct a certification path for the KDC's certificate. Neither MUST include 'root' CA certificates.
section: "3.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
