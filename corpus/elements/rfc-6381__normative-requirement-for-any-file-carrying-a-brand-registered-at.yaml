document: rfc-6381
kind: normative-requirement
summary: For any file carrying a brand registered at MP4RA (notably ISO Base Media File Format and QuickTime files), the 'profiles' parameter MUST list exactly the major-brand first, followed by the compatible-brands, as listed in the filetype box ('ftyp') or segment-type box ('styp'). The major-brand MAY be removed from the compatible-brands list for compactness.
section: "4.4"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
