document: rfc-9584
kind: normative-requirement
summary: When sprop-max-don-diff is greater than 0, the DONL field MUST be present in single NAL unit packets and in the first aggregation unit of an AP; in FUs it MUST be present only when the S bit equals 1. When sprop-max-don-diff equals 0, the DONL field MUST NOT be present in any of these structures.
section: 4.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
