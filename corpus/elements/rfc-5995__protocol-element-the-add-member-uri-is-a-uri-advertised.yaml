document: rfc-5995
kind: protocol-element
summary: The 'Add-Member' URI is a URI advertised by a WebDAV server that accepts HTTP POST requests and interprets them as requests to store the enclosed entity as a new internal member of the associated collection. The server assigns the new member's URI, which is returned in the HTTP Location response header.
section: "3.1"
topics:
    - http
