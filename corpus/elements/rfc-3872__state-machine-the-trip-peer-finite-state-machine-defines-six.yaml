document: rfc-3872
kind: state-machine
summary: 'The TRIP Peer Finite State Machine defines six states: idle (initial, no connections allowed), connect (waiting for transport connection), active (listening for inbound connection only), openSent (OPEN sent, awaiting remote OPEN), openConfirm (OPEN exchanged and KEEPALIVE sent, awaiting KEEPALIVE or NOTIFICATION), and established (full message exchange permitted).'
section: "6.2"
topics:
    - voip
    - realtime
