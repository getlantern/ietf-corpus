document: rfc-3388
kind: interoperability-note
summary: 'Backward compatibility relies on standard SDP fall-back: attributes not understood are ignored. If an answerer ignores ''group'', for LS it may or may not synchronize streams, and for FID it will treat the session as having multiple independent media streams, with behavior varying by implementation.'
