summary: 'The CSAS Record contains: Hop Count (2 bytes), Record Length (2 bytes), Cache Key Len (1 byte), Orig ID Len (1 byte), N bit plus unused (2 bytes), CSA Sequence Number (4 bytes, signed 32-bit, 0x80000000 reserved), followed by variable-length Cache Key and Originator ID.'
