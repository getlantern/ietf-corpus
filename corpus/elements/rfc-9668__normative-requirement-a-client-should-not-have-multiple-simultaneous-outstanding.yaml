document: rfc-9668
kind: normative-requirement
summary: A client SHOULD NOT have multiple simultaneous outstanding interactions with the same server such that they consist of EDHOC + OSCORE requests pertaining to the same EDHOC session (same C_R). This does not affect security but is recommended to avoid confusion.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - security
