document: rfc-1654
kind: protocol-element
summary: AS_PATH (Type Code 2) is a well-known mandatory attribute consisting of AS path segments, each a triple <segment type (1=AS_SET, 2=AS_SEQUENCE), segment length, segment value>. AS numbers are 2 octets each. It identifies all ASes a route has traversed.
