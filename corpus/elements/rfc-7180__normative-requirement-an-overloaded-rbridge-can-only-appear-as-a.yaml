document: rfc-7180
kind: normative-requirement
summary: An overloaded RBridge can only appear as a leaf node in a TRILL multi-destination distribution tree; it MUST NOT forward multi-destination TRILL Data frames (except as an egressed native frame where it is Appointed Forwarder). If all immediate neighbors of an RBridge are overloaded, it is omitted from all trees.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
