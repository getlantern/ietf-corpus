document: rfc-4037
kind: normative-requirement
summary: An OCP agent MUST send Transaction End (TE) immediately after deciding to send no more messages for that transaction, and MUST send Application Message End (AME) immediately after deciding to stop processing its application message. Delays cause unnecessary latency and timeouts at the peer.
section: "11.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
