document: rfc-2290
kind: normative-requirement
summary: A mobile node that receives a Configure-Reject containing a Mobile-IPv4 Configuration Option SHOULD fall back to IPCP negotiation using the IP-Address option alone, beginning with Request(IP=home) if on the home link or Request(IP=0) otherwise.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - mobility
    - ip
