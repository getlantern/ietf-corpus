document: rfc-5677
kind: normative-requirement
summary: To avoid NAT state expiry for UDP sessions, MIH messages using UDP as transport SHOULD be sent once every 2 minutes (matching the RFC 4787 minimum NAT state timeout of 2 minutes). Re-registration or event indication messages MAY be used as keepalives.
section: "6.4"
rfc2119_level: SHOULD
topics:
    - mobility
    - udp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
