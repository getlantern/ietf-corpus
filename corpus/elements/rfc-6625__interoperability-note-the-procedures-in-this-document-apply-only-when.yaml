document: rfc-6625
kind: interoperability-note
summary: The procedures in this document apply only when the PMSI Tunnel Attribute of an S-PMSI A-D route specifies a unidirectional (point-to-multipoint) P-tunnel. The use of bidirectional (multipoint-to-multipoint) P-tunnels such as BIDIR-PIM trees is outside the scope of this document.
section: "4.1"
topics:
    - multicast
    - routing
