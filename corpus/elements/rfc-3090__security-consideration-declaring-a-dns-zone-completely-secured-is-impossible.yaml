document: rfc-3090
kind: security-consideration
summary: Declaring a DNS zone 'completely secured' is impossible without enforcement mechanisms. A misbehaving resolver can be duped by bad data even if all zones are properly configured. A non-compliant or subverted parent can interrupt operations. The realistic goal is that all parties are prepared to be judged secure and that incidents can be traced quickly.
section: "5"
topics:
    - dns
    - security
