document: rfc-9902
kind: design-rationale
summary: The module is structured as an augmentation to the IS-IS YANG data model (RFC 9130) rather than a standalone model, allowing SR MPLS extensions to be activated independently while reusing the base IS-IS configuration and state structure. This follows the layered design of the SR YANG framework (RFC 9020 as base, RFC 9130 as IS-IS base).
