document: rfc-8831
kind: normative-requirement
summary: SCTP MUST support performing Path MTU discovery without relying on ICMP or ICMPv6 as specified in RFC 4821, using probing messages defined in RFC 4820, because incoming ICMP/ICMPv6 messages cannot be associated with an SCTP association in this stack.
section: "5"
rfc2119_level: MUST
topics:
