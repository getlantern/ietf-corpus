document: rfc-8445
kind: protocol-element
summary: Nomination is performed by the controlling agent sending a STUN Binding request with the USE-CANDIDATE attribute on a valid pair. Once both agents complete successful transactions for the nominated pair, the nominated flag is set and those pairs become the selected pairs for the data stream.
