document: rfc-6186
kind: interoperability-note
summary: RFC 6186 updates RFC 1939 (POP3) and RFC 3501 (IMAP) by defining SRV-based discovery for those protocols. It does not update RFC 5321 (SMTP) directly but defines a new `_submission` label for the RFC 4409 submission profile, which does not use MX records.
section: "1"
topics:
