document: rfc-6796
kind: protocol-element
summary: The <msrp-intermediary> element describes an MSRP relay (RFC 4976). It MUST contain one <msrp-uri> element (scheme MUST be 'msrps:') and MAY contain <shared-secret> and <user> elements. The UA authenticates with the relay and then uses the learned URI for MSRP media.
section: 4.4.3
topics:
    - sip
    - realtime
