document: rfc-4244
kind: normative-requirement
summary: A redirect server SHOULD NOT add any new History-Info, as that would be done by the entity receiving the 3xx response; however, it MAY include History-Info from the received request in subsequent responses.
section: 4.3.4
rfc2119_level: SHOULD NOT
