document: rfc-7218
kind: design-rationale
summary: People were repeatedly confused about the numeric values and field order in TLSA records during discussions about adding DANE to new protocols. Descriptive acronyms were added to the IANA registry to reduce this confusion without changing the DANE protocol itself.
