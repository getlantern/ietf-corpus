document: rfc-3573
kind: normative-requirement
summary: When the client modem requests the LAC to go on-hold, the LAC SHOULD send a MDMST control message to the LNS with the H (Hold) field set to 1 and the negotiated maximum on-hold time.
section: "2.3"
rfc2119_level: SHOULD
topics:
