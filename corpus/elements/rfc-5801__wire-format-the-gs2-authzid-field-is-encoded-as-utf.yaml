document: rfc-5801
kind: wire-format
summary: The gs2-authzid field is encoded as UTF-8 with NUL forbidden; commas MUST be escaped as '=2C' and equals signs MUST be escaped as '=3D'. NUL is forbidden per RFC 4422 Section 3.4.1.
section: "4"
rfc2119_level: MUST
