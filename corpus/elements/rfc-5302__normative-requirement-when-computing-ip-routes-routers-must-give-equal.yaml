document: rfc-5302
kind: normative-requirement
summary: When computing IP routes, routers MUST give equal preference to IP routes advertised in TLV 128 ('IP Internal Reachability Information') and TLV 130 ('IP External Reachability Information'), consistent with RFC 1195 paragraph 3.10.2 item 2c. This document does not alter this rule.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
