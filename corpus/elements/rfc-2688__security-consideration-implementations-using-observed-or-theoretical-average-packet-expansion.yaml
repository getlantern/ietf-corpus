document: rfc-2688
kind: security-consideration
summary: 'Implementations using observed or theoretical average packet expansion for bit- or byte-stuffing admission control are vulnerable to denial-of-service attacks: an adversary can intentionally send traffic causing worst-case stuffing expansion, causing QoS guarantees to be violated for other flows. This argues strongly for using worst-case expansion factors even for controlled load service.'
section: "5"
topics:
    - security
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
