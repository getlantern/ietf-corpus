document: rfc-2368
kind: security-consideration
summary: A mail client should never send anything without complete disclosure of all headers and the message destination. Headers such as "From:", "Bcc:", and routing headers should never be interpreted from a URL; MIME headers (MIME-Version, Content-*) are most likely inappropriate.
section: "7"
