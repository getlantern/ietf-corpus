document: rfc-7531
kind: design-rationale
summary: The XDR description is embedded in the RFC with a '///' sentinel prefix so that a simple shell script can extract it into a compilable .x file. The extraction script strips leading whitespace and the sentinel sequence, producing nfs4_prot.x directly from the RFC source.
