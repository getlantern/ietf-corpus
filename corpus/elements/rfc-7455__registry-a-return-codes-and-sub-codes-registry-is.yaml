document: rfc-7455
kind: registry
summary: A Return Codes and Sub-codes registry is established for TRILL OAM. Defined entries include Return Code 1 ('Reply') with Sub-code 0 ('Valid Response') and Sub-code 2 ('Intermediate RBridge'). Return Sub-code values MUST be interpreted within the context of their specific Return Code.
