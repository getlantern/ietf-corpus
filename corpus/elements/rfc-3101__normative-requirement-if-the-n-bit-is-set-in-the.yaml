document: rfc-3101
kind: normative-requirement
summary: If the N-bit is set in the options field of a Hello packet, the E-bit MUST be clear. A mismatch in the N-bit or E-bit options between neighbors causes the received Hello packet to be dropped.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
