document: rfc-9808
kind: normative-requirement
summary: It is NOT RECOMMENDED to specify the 'current' usage value inline within FCI.CapacityLimits advertisements because doing so reduces the ability to cache the response. The intended method is to reference a Telemetry Source Object for polling current usage.
section: 2.2.1
rfc2119_level: RECOMMENDED
topics:
