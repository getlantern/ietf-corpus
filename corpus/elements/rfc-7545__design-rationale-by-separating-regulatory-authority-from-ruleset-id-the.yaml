document: rfc-7545
kind: design-rationale
summary: By separating regulatory 'authority' from 'ruleset-id', the protocol supports multiple regulatory authorities sharing a common device-side ruleset, and allows a single authority to define multiple rulesets. Ruleset identifiers encode the regulatory body name and version (e.g., 'FccTvBandWhiteSpace-2010') so devices with out-of-band knowledge can satisfy domain-specific requirements without the protocol specifying them.
section: "3.1"
topics:
    - registry
