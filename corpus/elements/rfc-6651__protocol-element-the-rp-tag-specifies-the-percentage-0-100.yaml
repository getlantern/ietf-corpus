document: rfc-6651
kind: protocol-element
summary: The 'rp=' tag specifies the percentage (0–100, default 100) of failure incidents that should randomly generate reports. Generators SHOULD NOT exceed this percentage; they MAY use the ARF 'Incidents:' field to indicate unreported incidents.
section: "3.2"
