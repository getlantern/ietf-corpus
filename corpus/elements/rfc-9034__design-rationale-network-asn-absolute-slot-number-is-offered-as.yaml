document: rfc-9034
kind: design-rationale
summary: Network ASN (Absolute Slot Number) is offered as an alternative time unit (TU=10) to fractional seconds (TU=00) because in 6TiSCH networks global time is natively maintained in slot-length units. Using ASNs avoids conversion overhead and keeps the DT representation aligned with the network's inherent scheduling granularity.
