document: rfc-5512
kind: protocol-element
summary: 'The Tunnel Encapsulation Attribute is an optional transitive BGP path attribute (type code 23) composed of TLVs. Each TLV has a 2-octet Tunnel Type, 2-octet Length, and variable Value containing sub-TLVs. Defined tunnel types are: L2TPv3 over IP (1), GRE (2), and IP in IP (7).'
section: "4"
