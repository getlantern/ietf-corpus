document: rfc-2493
kind: protocol-element
summary: PerfCurrentCount is a Textual Convention (Gauge32) representing a counter for performance measurements in the current 15-minute interval. The counter starts at zero, increments as events occur, and is stored into the first history interval at interval end, then restarted at zero.
