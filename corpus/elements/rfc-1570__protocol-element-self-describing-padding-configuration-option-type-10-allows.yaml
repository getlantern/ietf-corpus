document: rfc-1570
kind: protocol-element
summary: Self-Describing-Padding (Configuration Option Type 10) allows an implementation to indicate it understands self-describing pads appended to the PPP Information field. Each pad octet contains its 1-based index; the final octet gives the total pad count to remove. The Maximum-Pad-Value (MPV) limits the maximum number of pad octets.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
