document: rfc-3203
kind: state-machine
summary: Upon receipt of DHCPFORCERENEW in the Bound state, the client transitions to the Renew state (labeled DHCPFORCE in the state diagram). If the server wishes to assign a new IP address, it replies to the subsequent DHCPREQUEST with DHCPNAK, driving the client back to Init, which then broadcasts DHCPDISCOVER.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
