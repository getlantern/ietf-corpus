document: rfc-7296
kind: normative-requirement
summary: The REKEY_SA notification MUST be included in a CREATE_CHILD_SA exchange whose purpose is to replace an existing ESP or AH SA. The SPI field in the Notify payload identifies the SA being rekeyed as seen in inbound packets.
section: 1.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
