document: rfc-7711
kind: normative-requirement
summary: The POSH client SHOULD NOT rely on HTTP caching mechanisms; instead it SHOULD use the expiration hints provided in the POSH reference or fingerprints document. HTTPS servers SHOULD specify a very short Cache-Control header (e.g., max-age=60 or no-cache).
section: "6"
rfc2119_level: SHOULD NOT
topics:
