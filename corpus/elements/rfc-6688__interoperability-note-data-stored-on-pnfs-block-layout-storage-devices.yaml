document: rfc-6688
kind: interoperability-note
summary: Data stored on pNFS block layout storage devices can be better protected by incorporating checks for this GUID into other hosts and systems that do not support pNFS block layouts. If pNFS block storage devices are presented to such hosts by mistake, the GUID check can prevent writes that would otherwise corrupt pNFS data.
section: "3"
topics:
    - security
