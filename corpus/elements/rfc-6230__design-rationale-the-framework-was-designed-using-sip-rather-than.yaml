document: rfc-6230
kind: design-rationale
summary: The framework was designed using SIP rather than Megaco because Megaco duplicates many SIP functions and forces application developers to translate between two separate mechanisms. The SIP-based model better matches the application programming model for media-rich applications in SIP networks.
