document: rfc-1304
kind: protocol-element
summary: sipL3PDUErrorTable logs the latest occurrence of 12 syntactic L3PDU error types, indexed by interface and error type. Each entry records the source address, destination address, and a sysUpTime timestamp. When sipL3PDUErrorTimeStamp equals zero, the entry contains no valid information.
