document: rfc-7780
kind: registry
summary: IANA allocated bit 4 in the 'TRILL-VER Sub-TLV Capability Flags' registry as the 'E' bit indicating E-L1FS FS-LSP support (RFC 7356 and RFC 7780). Bits 15 and 16 of that registry are re-designated as Unassigned (previously used for Extended Hop Count advertising per Section 10.2.1.1).
section: 12.2.2
topics:
