document: rfc-2461
kind: interoperability-note
summary: On NBMA links (X.25, ATM, Frame Relay), address resolution and the delivery mechanism for Router Solicitations/Advertisements are not specified by this document; only Redirect, Neighbor Unreachability Detection, and next-hop determination are required as described. Hosts on NBMA links may dynamically acquire neighbor link-layer addresses from Redirect messages if manual default router configuration is supported.
section: "3.2"
topics:
