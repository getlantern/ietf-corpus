document: rfc-3883
kind: design-rationale
summary: 'Hello suppression in OSPF demand circuits (RFC 1793) prevents detection of an OSPF-inactive neighbor: if the remote OSPF process dies or the link is oversubscribed, the local router and routers behind it may never learn of the problem and continue forwarding traffic to an incapable router.'
section: "1"
topics:
    - routing
    - sctp
