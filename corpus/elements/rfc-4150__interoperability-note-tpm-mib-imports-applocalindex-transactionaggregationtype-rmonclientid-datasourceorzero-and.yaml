document: rfc-4150
kind: interoperability-note
summary: TPM-MIB imports AppLocalIndex, TransactionAggregationType, RmonClientID, DataSourceOrZero, and apmExceptionIndex from APM-MIB (RFC3729). When tpmAggrReportCntrlApmCntrlIndex is non-zero, the TPM control entry mirrors all corresponding APM-MIB report-control values, creating a synchronized drill-down relationship between the two MIBs.
