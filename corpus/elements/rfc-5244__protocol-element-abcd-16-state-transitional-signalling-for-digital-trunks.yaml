document: rfc-5244
kind: protocol-element
summary: ABCD 16-state transitional signalling for digital trunks is represented by event codes 144–159, where the event code equals 144 plus the numeric value of the ABCD bits treated as a 4-bit binary number with A as the high-order bit. These are state-type events with no volume.
section: "2.4"
topics:
