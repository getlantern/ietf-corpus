document: rfc-3676
kind: wire-format
summary: A soft line break is encoded as SP CRLF. With the older technique (DelSp=no), the SP is an existing space in the text; with the newer technique (DelSp=yes), an SP is inserted before the CRLF. A hard line break is a bare CRLF with no preceding space.
section: "4.2"
topics:
