document: rfc-9607
kind: interoperability-note
summary: Some network devices may not recognize SCIP and may remove the SCIP codecs from the SDP media payload declaration before forwarding to the next node; SCIP endpoint devices cannot operate if the SCIP media subtype is removed from the SDP declaration.
