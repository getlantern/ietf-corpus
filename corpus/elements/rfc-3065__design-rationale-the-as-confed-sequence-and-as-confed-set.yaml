document: rfc-3065
kind: design-rationale
summary: The AS_CONFED_SEQUENCE and AS_CONFED_SET type values were reversed from RFC 1965 (swapping 3 and 4) because the initial widely-deployed implementations had them backwards from the original spec, and subsequent implementations followed suit; the values were changed to match deployed reality and foster interoperability.
section: Appendix A
