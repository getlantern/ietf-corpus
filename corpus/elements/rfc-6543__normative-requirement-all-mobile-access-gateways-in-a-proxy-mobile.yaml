document: rfc-6543
kind: normative-requirement
summary: All mobile access gateways in a Proxy Mobile IPv6 domain SHOULD use the reserved IPv6 interface identifier 0200:5EFF:FE00:5213 on all access links shared with mobile nodes. The protocol configuration variable FixedMAGLinkLocalAddressOnAllAccessLinks SHOULD be set to the link-local address generated using this reserved interface identifier.
section: "1"
rfc2119_level: SHOULD
topics:
    - mobility
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
