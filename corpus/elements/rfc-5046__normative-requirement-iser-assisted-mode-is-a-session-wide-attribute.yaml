document: rfc-5046
kind: normative-requirement
summary: iSER-assisted mode is a session-wide attribute. If RDMAExtensions=Yes is negotiated on the leading connection, all subsequent connections of that session MUST enable iSER-assisted mode without re-exchanging the RDMAExtensions key. Conversely, if it is not negotiated on the leading connection, the key MUST NOT be used on any additional connections.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
