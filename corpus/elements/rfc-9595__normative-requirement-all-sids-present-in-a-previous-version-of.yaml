document: rfc-9595
kind: normative-requirement
summary: All SIDs present in a previous version of a '.sid' file that was in active use MUST be present in the new version as well. When a new revision requires more SIDs than initially allocated, a new SID range MUST be added to the 'assignment-range' item.
section: "3"
rfc2119_level: MUST
topics:
    - yang
    - netconf
