document: rfc-5763
kind: design-rationale
summary: DTLS-SRTP (RFC 5764) is mandated over plain RTP-over-DTLS because DTLS's generic data transfer protocol is less optimized for RTP than SRTP, which was specifically tuned for real-time media. Reuse of existing SRTP hardware/software is an additional motivation.
section: "6.10"
topics:
    - tls
    - rtp
    - realtime
