document: rfc-1377
kind: normative-requirement
summary: The maximum length of an OSI NPDU transmitted over a PPP link equals the maximum length of the Information field of a PPP data link layer frame. Larger NPDUs must be segmented as necessary.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
