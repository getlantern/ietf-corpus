document: rfc-8929
kind: interoperability-note
summary: The registration mechanism may coexist with proprietary snooping or traditional AP bridging to support legacy LLN nodes that do not implement this specification. The 6BBR assumes that if a node registers at least one address, it registers all of its addresses, enabling the 6BBR to suppress multicast NS messages to that node.
