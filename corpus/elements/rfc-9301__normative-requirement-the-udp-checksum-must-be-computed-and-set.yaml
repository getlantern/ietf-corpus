document: rfc-9301
kind: normative-requirement
summary: The UDP checksum MUST be computed and set to non-zero for all LISP control messages sent to or from port 4342. On receipt it MUST be checked, and if it fails the control message MUST be dropped.
section: "5"
rfc2119_level: MUST
topics:
    - udp
    - routing
