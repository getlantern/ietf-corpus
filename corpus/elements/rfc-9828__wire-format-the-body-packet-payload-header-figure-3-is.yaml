kind: wire-format
summary: 'The Body Packet Payload Header (Figure 3) is exactly 8 octets (two 32-bit words). Word 1 contains: MH (2 bits), TP (3 bits), RES (3 bits), ORDB (1 bit), QUAL (3 bits), PTSTAMP (12 bits), ESEQ (8 bits). Word 2 contains: POS (12 bits) and PID (20 bits). All fields are unsigned binary integers in network order.'
