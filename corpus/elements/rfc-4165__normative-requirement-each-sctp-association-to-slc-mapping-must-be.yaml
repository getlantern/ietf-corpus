document: rfc-4165
kind: normative-requirement
summary: Each SCTP association-to-SLC mapping MUST be consistent at both endpoints so that each endpoint knows which link is being created when the association is established. It is RECOMMENDED that each endpoint know both IP addresses and port numbers to prevent duplicate associations.
section: 4.1.2
rfc2119_level: MUST
topics:
    - sctp
