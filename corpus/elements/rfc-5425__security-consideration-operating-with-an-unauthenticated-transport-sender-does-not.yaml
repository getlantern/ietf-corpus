document: rfc-5425
kind: security-consideration
summary: Operating with an unauthenticated transport sender does not protect against sender masquerade, and operating with an unauthenticated transport receiver exposes data to disclosure and modification. Both unauthenticated configurations are NOT RECOMMENDED; running without any authentication is especially NOT RECOMMENDED as it enables man-in-the-middle and masquerade attacks.
section: "5.3"
topics:
    - tls
    - syslog
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
