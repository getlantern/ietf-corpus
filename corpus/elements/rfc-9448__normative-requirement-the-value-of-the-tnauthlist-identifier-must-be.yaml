document: rfc-9448
kind: normative-requirement
summary: The value of the TNAuthList identifier MUST be set to the details of the TNAuthList requested. The string MUST be constructed using base64url encoding without padding characters, and the TNAuthList ASN.1 object MUST be encoded using DER encoding rules.
