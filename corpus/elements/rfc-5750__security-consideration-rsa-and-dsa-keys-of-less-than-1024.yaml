document: rfc-5750
kind: security-consideration
summary: RSA and DSA keys of less than 1024 bits are considered cryptographically insecure. If an implementation supports verification of certificates or CRLs signed with such keys, it MUST warn the user. Server implementations SHOULD reject messages with weak cryptography.
section: "5"
topics:
