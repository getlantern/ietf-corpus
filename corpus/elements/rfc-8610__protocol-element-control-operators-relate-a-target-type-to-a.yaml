kind: protocol-element
summary: 'Control operators relate a target type to a controller type via ''.ctrl-op'' syntax. The 14 operators defined in RFC 8610 are: .size, .bits, .regexp, .cbor, .cborseq, .within, .and, .lt, .le, .gt, .ge, .eq, .ne, and .default. Further operators may be registered per Section 6.1.'
