document: rfc-7965
kind: protocol-element
summary: 'Two binding modes are defined: strict binding (S-bit set), where the receiving PE MUST use the specified tunnel/LSP or the PW fails to establish; and co-routed binding (C-bit set), where the receiving PE SHOULD select a co-routed LSP but may choose an alternative.'
