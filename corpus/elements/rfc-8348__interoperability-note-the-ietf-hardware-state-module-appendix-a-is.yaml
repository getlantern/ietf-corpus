document: rfc-8348
kind: interoperability-note
summary: The 'ietf-hardware-state' module (Appendix A) is a temporary non-NMDA solution where all nodes are 'config false'. Implementations not yet supporting NMDA (RFC 8342) should use this module; if they also support hardware configuration, they SHOULD also implement 'ietf-hardware' in the configuration datastores.
