document: rfc-9758
kind: privacy-consideration
summary: Examination of ipn URIs, while revealing only numeric identities, could support traffic analysis. Where traffic analysis is a plausible threat, bundles should be conveyed by secure convergence-layer protocols that do not expose endpoint IDs, such as TCPCLv4 (RFC 9174).
section: "8.5"
topics:
    - security
    - privacy
