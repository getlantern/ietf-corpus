document: rfc-5374
kind: protocol-element
summary: Tunnel mode with address preservation copies the inner IP header source and/or destination addresses into the outer (tunnel) header. This preserves multicast routing semantics so PIM-SM and other multicast routing protocols can correctly route IPsec-protected multicast packets.
section: "3.1"
topics:
    - ipsec
    - multicast
