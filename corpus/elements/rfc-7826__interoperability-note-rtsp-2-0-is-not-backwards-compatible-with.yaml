document: rfc-7826
kind: interoperability-note
summary: RTSP 2.0 is not backwards compatible with RTSP 1.0 except in the basic version negotiation mechanism. Key incompatibilities include changed PLAY-in-Play-state behavior, a revised extensibility model, and syntax changes to several headers.
