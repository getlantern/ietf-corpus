document: rfc-5082
kind: normative-requirement
summary: The TTL field in all IP packets used for transmission of messages associated with GTSM-enabled protocol sessions MUST be set to 255. This also applies to the related ICMP error handling messages.
section: "3"
rfc2119_level: MUST
topics:
