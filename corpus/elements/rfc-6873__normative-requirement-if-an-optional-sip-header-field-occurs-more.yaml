document: rfc-6873
kind: normative-requirement
summary: If an optional SIP header field occurs more than once in a SIP message (e.g., Via, Contact, Route), each occurrence MUST be logged as a distinct optional field entry (each with Tag=00), preserving the ordinal position of repeated header fields.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
