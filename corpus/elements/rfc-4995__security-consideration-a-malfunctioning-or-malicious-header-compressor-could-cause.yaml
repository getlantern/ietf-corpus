document: rfc-4995
kind: security-consideration
summary: A malfunctioning or malicious header compressor could cause the decompressor to reconstitute packets with valid headers that do not match originals; end-to-end authentication and integrity mechanisms are unaffected by compression and can detect such corruption. ROHC's internal CRCs reduce the probability of undetected incorrect decompression.
section: "7"
topics:
    - security
