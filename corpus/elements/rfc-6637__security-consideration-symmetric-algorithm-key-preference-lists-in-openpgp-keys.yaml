document: rfc-6637
kind: security-consideration
summary: Symmetric algorithm key preference lists in OpenPGP keys must be set correctly from key generation to maintain balanced security; mismatched preferences can force use of weaker algorithms. When encrypting to multiple recipients with an unordered intersection of algorithm sets, a compliant application SHOULD choose the stronger algorithm.
section: "13"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
