document: rfc-6437
kind: security-consideration
summary: 'Flow label spoofing enables theft or denial of service: an adversary may obtain unintended QoS treatment by injecting packets with forged addresses and/or labels. Networks SHOULD NOT make resource allocation decisions based on flow labels without external means of assurance.'
section: "6.2"
topics:
    - ip
    - security
