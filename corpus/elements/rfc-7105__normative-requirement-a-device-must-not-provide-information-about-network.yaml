document: rfc-7105
kind: normative-requirement
summary: A Device MUST NOT provide information about network topology (e.g., LLDP, DHCP, DSL measurements) without a clear signal that the recipient LIS is authorized; a LIS discovered using DHCP per RFC 5986 can be considered authorized to receive access network information.
section: 7.1.3
rfc2119_level: MUST NOT
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
