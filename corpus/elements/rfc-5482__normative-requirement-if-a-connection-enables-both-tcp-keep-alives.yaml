document: rfc-5482
kind: normative-requirement
summary: If a connection enables both TCP keep-alives and the UTO option, the keep-alive timer MUST be set to a value larger than the adopted USER_TIMEOUT, otherwise keep-alives may abort connections that UTO intended to preserve.
section: "4.2"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
