document: rfc-7428
kind: privacy-consideration
summary: Link-layer-derived IIDs may enable device tracking across global prefix changes. However, the risk from G.9959 specifically is limited because the link-layer address is only 8 bits rather than the 48 or 64 bits common on other link layers.
section: "7"
