document: rfc-3311
kind: normative-requirement
summary: 'If a UAC receives a 491 response to an UPDATE, it SHOULD start a retransmit timer T: 2.1–4 seconds if the UAC owns the Call-ID, or 0–2 seconds if it does not. When the timer fires, the UAC SHOULD retry the UPDATE if the modification is still desired.'
section: "5.3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
