kind: protocol-element
summary: 'Global error identities (base vrrp-error-global) cover: checksum-error, ip-ttl-error, version-error, and vrid-error — errors occurring before a packet reaches a VRRP instance. Per-router error identities (base vrrp-error-virtual-router) cover: address-list-error, interval-error, and packet-length-error.'
