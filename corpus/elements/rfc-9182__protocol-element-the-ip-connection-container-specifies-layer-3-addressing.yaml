document: rfc-9182
kind: protocol-element
summary: The 'ip-connection' container specifies Layer 3 addressing per address family; for both IPv4 and IPv6 it supports 'provider-dhcp' (local server or relay), 'dhcp-relay' (customer DHCP servers), and 'static-addresses' (explicit address pools with start/end addresses). IPv6 additionally supports SLAAC using 'local-address' and 'prefix-length' to derive the advertised prefix.
section: 7.6.2
topics:
    - yang
    - netconf
    - ip
