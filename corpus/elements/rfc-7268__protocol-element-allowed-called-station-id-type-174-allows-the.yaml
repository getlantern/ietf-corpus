document: rfc-7268
kind: protocol-element
summary: Allowed-Called-Station-Id (Type 174) allows the RADIUS server to specify the authenticator MAC addresses and/or network names to which a user is permitted to connect. One or more instances MAY appear in Access-Accept, CoA-Request, or Accounting-Request packets. Format is Type/Length/String with Length >= 3.
section: "2.1"
topics:
    - radius
    - security
