document: rfc-2491
kind: protocol-element
summary: 'A Logical Link (LL) is the IPv6 analog to the IPv4 Logical IP Subnet (LIS): an administratively configured set of nodes that are ''on link'' with respect to each other. Members of an LL form an interface''s initial neighbor set, and link-local addresses need only be unique within the LL.'
