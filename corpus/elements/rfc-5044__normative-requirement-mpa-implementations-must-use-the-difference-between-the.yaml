document: rfc-5044
kind: normative-requirement
summary: MPA implementations MUST use the difference between the MPA Request Frame and MPA Reply Frame key values to detect incorrect Initiator/Initiator startups. Implementations SHOULD put a timeout on waiting for the MPA Request Frame when in Responder mode to detect Responder/Responder startups.
section: 7.1.2
rfc2119_level: MUST
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
