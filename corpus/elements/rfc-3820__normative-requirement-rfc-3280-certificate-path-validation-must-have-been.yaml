document: rfc-3820
kind: normative-requirement
summary: RFC 3280 certificate path validation MUST have been performed on the end entity certificate prior to executing the proxy certificate path validation algorithm. The proxy algorithm takes the EEC's working_public_key, working_public_key_algorithm, and subject name as inputs.
section: "4.1"
rfc2119_level: MUST
topics:
