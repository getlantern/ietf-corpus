document: rfc-6675
kind: design-rationale
summary: NextSeg() rule (3) was changed from MAY (in RFC 3517) to SHOULD, reflecting the authors' and working group's view that uncertain retransmissions to sustain the ACK clock should be performed by default unless an implementor has a compelling reason to omit them.
