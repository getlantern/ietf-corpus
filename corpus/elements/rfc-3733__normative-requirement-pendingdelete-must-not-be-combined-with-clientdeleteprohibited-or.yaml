document: rfc-3733
kind: normative-requirement
summary: pendingDelete MUST NOT be combined with clientDeleteProhibited or serverDeleteProhibited; pendingTransfer MUST NOT be combined with the corresponding transfer-prohibited values; pendingUpdate MUST NOT be combined with the corresponding update-prohibited values; and the four pending status values MUST NOT be combined with each other.
section: "2.2"
rfc2119_level: MUST NOT
