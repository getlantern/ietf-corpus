document: rfc-9014
kind: normative-requirement
summary: In EVPN-VXLAN interconnect with downstream-assigned VNIs, GWs and PEs MUST use proper RTs to import/export EVPN routes. GWs SHOULD support multiple VNI spaces per EVI, one per interconnect network to which they are connected.
