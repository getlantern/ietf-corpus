document: rfc-9034
kind: design-rationale
summary: When a packet crosses into a network with a different reference clock, the DT field is updated to re-express the same absolute deadline in the new network's time units, and the OTD is reset to reflect delay already accumulated. This approach preserves end-to-end semantics without requiring a common global epoch across heterogeneous networks.
section: "4"
topics:
