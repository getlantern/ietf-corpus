document: rfc-2390
kind: wire-format
summary: For IP over Frame Relay, ar$hrd is set to 0x000F (Frame Relay), ar$hln is 2, 3, or 4 bytes (Q.922 address length), ar$pln is 4 bytes for IP, ar$op is 8 (request) or 9 (response), and ar$tpa is zero-filled in the request since it is the unknown value being requested.
section: "7.2"
topics:
