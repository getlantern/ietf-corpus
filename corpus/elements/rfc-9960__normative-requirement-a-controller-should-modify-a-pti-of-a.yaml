document: rfc-9960
kind: normative-requirement
summary: A controller SHOULD modify a PTI of a CP on detecting a change in network topology if the change affects the tree instance or when a better path can be found. Alternatively, the controller MAY implement a Make-Before-Break approach to minimize traffic loss.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
