document: rfc-7582
kind: normative-requirement
summary: In Hierarchical Partitioned S-PMSI reception, if a multicast data packet is received over a matching P-tunnel but does not carry the PE Distinguisher Label value assigned to the upstream PE for its C-flow, the packet MUST be discarded.
section: 3.2.2.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
