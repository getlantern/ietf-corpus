document: rfc-5311
kind: protocol-element
summary: An 'Additional system-id' is a system-id other than the Normal system-id, assigned by the network administrator to allow generation of Extended LSPs. It must be unique within the Level-1 area or Level-2 domain, and Extended LSPs using it are treated by the Update Process identically to normal LSPs.
section: "3"
topics:
    - routing
