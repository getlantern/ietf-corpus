document: rfc-5066
kind: normative-requirement
summary: A PAF-enabled port with multiple PMEs assigned cannot be disabled; attempts to set efmCuPAFAdminState to 'disabled' when more than one PME is assigned SHALL be rejected until at most one PME remains. PAF-incapable ports SHALL return 'disabled' and SHALL reject attempts to enable.
section: "6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
