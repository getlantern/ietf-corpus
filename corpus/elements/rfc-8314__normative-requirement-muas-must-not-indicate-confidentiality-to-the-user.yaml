document: rfc-8314
kind: normative-requirement
summary: MUAs MUST NOT indicate confidentiality to the user for a connection relying on certificate pinning, as such connections do not meet the minimum confidentiality level due to susceptibility to man-in-the-middle at account setup time.
section: "5.4"
rfc2119_level: MUST NOT
topics:
    - tls
    - email
    - security
    - privacy
