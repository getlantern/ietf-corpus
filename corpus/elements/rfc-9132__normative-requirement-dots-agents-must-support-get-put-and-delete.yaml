document: rfc-9132
kind: normative-requirement
summary: DOTS agents MUST support GET, PUT, and DELETE CoAP methods. CoAP 2.xx responses MUST carry 'application/dots+cbor' payloads; 4.xx and 5.xx error responses MUST include a diagnostic payload to aid troubleshooting.
