document: rfc-3821
kind: normative-requirement
summary: An FCIP Link SHALL contain at least one TCP Connection and MAY contain more than one TCP Connection. The endpoints of a single TCP Connection are FCIP Data Engines.
section: "5.2"
rfc2119_level: REQUIRED
