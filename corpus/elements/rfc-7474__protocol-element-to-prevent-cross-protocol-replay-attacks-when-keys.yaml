document: rfc-7474
kind: protocol-element
summary: To prevent cross-protocol replay attacks when keys are shared between routing protocols, the two-octet OSPFv2 Cryptographic Protocol ID (value 3, registered with IANA under KARP Parameters) is appended to the authentication key K before key preparation, yielding a Protocol-Specific Authentication Key Ks.
