document: rfc-8026
kind: interoperability-note
summary: Operators deploying multiple softwire mechanisms are advised to use separate IPv4 address pools for each mechanism to avoid routing ambiguity on the return path. Sharing IPv4 pools can cause ingress traffic to be routed to the wrong BR/AFTR, resulting in dropped packets.
section: "2.1"
topics:
    - v6ops
    - ip
