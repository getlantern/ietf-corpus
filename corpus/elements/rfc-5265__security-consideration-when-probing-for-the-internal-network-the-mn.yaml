document: rfc-5265
kind: security-consideration
summary: When probing for the internal network, the MN sends a plaintext RRQ to the i-HA from an untrusted network (outside the IPsec tunnel), revealing the i-HA's address, the MN's NAI and home address, and the MIPv4 Authenticator value to the untrusted network; this information exposure may be a concern in some deployments.
section: "6.1"
topics:
    - security
    - privacy
    - vpn
    - mobility
