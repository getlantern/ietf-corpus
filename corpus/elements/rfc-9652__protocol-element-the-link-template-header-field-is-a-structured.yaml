document: rfc-9652
kind: protocol-element
summary: The Link-Template header field is a Structured Field whose value is a List of Strings, where each String contains a URI Template and can have Parameters carrying metadata. It is semantically equivalent to the Link header field except that the link target and link anchor can contain URI Templates.
