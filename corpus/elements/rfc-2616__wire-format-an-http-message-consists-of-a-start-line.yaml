document: rfc-2616
kind: wire-format
summary: 'An HTTP message consists of a start-line (Request-Line or Status-Line), zero or more ''field-name: field-value'' header lines each terminated by CRLF, an empty CRLF line ending the headers, and an optional message-body. CRLF is the end-of-line marker for all protocol elements except the entity-body.'
section: "4.1"
topics:
