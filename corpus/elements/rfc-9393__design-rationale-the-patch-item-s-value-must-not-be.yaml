document: rfc-9393
kind: design-rationale
summary: The patch item's value MUST NOT be set to 'true' if installation of the associated package changes the software component's version number; version-changing updates use a new primary tag instead. This distinction between patching and upgrading preserves accurate software inventory tracking.
section: "2.3"
topics:
    - cbor
