document: rfc-5049
kind: normative-requirement
summary: If a SIP application already has a compartment for a given remote application identifier (e.g., when registering towards a second registrar via the same proxy), it MUST use the existing compartment and MUST NOT open a new one.
section: "9.3"
rfc2119_level: MUST NOT
