document: rfc-3957
kind: design-rationale
summary: A single AAA Security Association is reused to create derivative Mobility Security Associations rather than pre-configuring MN-FA and MN-HA keys, enabling mobile nodes that lack any pre-existing Mobility Security Association (e.g., because they have no home address yet) to bootstrap securely via the AAA infrastructure.
