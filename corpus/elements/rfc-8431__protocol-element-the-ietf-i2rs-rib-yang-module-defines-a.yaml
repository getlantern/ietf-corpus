document: rfc-8431
kind: protocol-element
summary: The ietf-i2rs-rib YANG module defines a routing-instance container as the top-level node, containing a name, interface-list, optional router-id (dotted-quad), optional lookup-limit (uint8), and a rib-list keyed by name. Each routing instance provides a logical slice of the router with its own set of RIBs, interfaces, and routing protocol parameters.
section: "2.2"
topics:
    - yang
    - routing
    - netconf
