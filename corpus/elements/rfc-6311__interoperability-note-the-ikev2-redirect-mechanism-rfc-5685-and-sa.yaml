document: rfc-6311
kind: interoperability-note
summary: 'The IKEv2 Redirect mechanism (RFC 5685) and SA counter synchronization after failover are mutually exclusive in the failover scenario: Redirect requires the active member to detect shutdown ahead of time, which is not possible in an unplanned failover.'
section: "10"
topics:
