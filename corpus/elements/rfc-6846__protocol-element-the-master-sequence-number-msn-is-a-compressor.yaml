document: rfc-6846
kind: protocol-element
summary: 'The Master Sequence Number (MSN) is a compressor-created control field absent from the TCP header. It is incremented by one per packet sent, transmitted as a 16-bit value in IR/IR-DYN packets and LSB-encoded in CO packets. It serves two functions: differentiating packets when sending feedback, and inferring incrementing fields such as IP-ID.'
section: 6.1.1
topics:
    - tcp
    - ip
