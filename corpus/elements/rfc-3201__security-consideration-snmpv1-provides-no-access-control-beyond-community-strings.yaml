document: rfc-3201
kind: security-consideration
summary: SNMPv1 provides no access control beyond community strings and should not be used in environments where circuit interface management data requires protection. Even on a network secured with IPsec, SNMPv1 offers no per-user access restrictions to MIB objects.
section: "9"
topics:
    - snmp
    - security
    - ipsec
