document: rfc-9422
kind: normative-requirement
summary: Syntax errors in the overall LIMITS parameter value should cause the client to ignore the value entirely and SHOULD proceed as if the LIMITS extension had not been used. Syntax or other errors in an individual limit's value MUST cause the client to proceed as if that specific limit had not been specified.
section: "3.7"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
