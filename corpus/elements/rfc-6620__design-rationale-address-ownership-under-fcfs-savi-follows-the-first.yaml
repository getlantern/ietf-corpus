document: rfc-6620
kind: design-rationale
summary: 'Address ownership under FCFS SAVI follows the First-Come, First-Served principle: the first host to claim a source address (observed at a binding anchor) is treated as the owner. Proof of ownership is established by binding the IP address to the Layer 2 switch port through which it was first seen.'
section: "2.3"
topics:
