document: rfc-3282
kind: normative-requirement
summary: Conforming implementations MUST accept the obs-content-language syntax (which permits optional whitespace before the colon) but MUST NOT generate it; all generated Content-Language headers MUST conform to the strict Content-Language ABNF.
