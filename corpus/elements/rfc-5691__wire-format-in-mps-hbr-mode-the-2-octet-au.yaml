document: rfc-5691
kind: wire-format
summary: In MPS-hbr mode, the 2-octet AU-header encodes the size of each AAC frame as 13 bits and 3 bits of index information (AU-Index or AU-Index-delta). Each AU-Index field MUST be coded with value 0. The AU Header Section MUST be preceded by the 16-bit AU-headers-length field. The Auxiliary Section MUST be empty.
section: 4.2.2
topics:
    - rtp
    - realtime
