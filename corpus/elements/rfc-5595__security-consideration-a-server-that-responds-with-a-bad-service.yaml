document: rfc-5595
kind: security-consideration
summary: A server that responds with a 'Bad Service Code' reset immediately confirms or denies that a particular service is present, which may assist port scanning and reconnaissance. Care is needed when interpreting Service Code-to-service mappings, as a service may use multiple codes or a private code may shadow an IANA-assigned one.
section: "4.2"
topics:
    - security
    - congestion
