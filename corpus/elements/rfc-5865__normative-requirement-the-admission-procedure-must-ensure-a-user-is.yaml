document: rfc-5865
kind: normative-requirement
summary: The admission procedure MUST ensure a user is identified and the correct policy is applied if multiple policies are in use, and that under network stress, admission of new sessions does not disrupt existing sessions unless the service explicitly allows disruption.
section: "2.2"
rfc2119_level: MUST
