document: rfc-8973
kind: design-rationale
summary: 'Multiple discovery mechanisms are specified because no single method is suitable for all deployment scenarios: CPEs naturally use DHCP, S-NAPTR allows the DOTS server administrator to advertise the preferred transport protocol, and some deployments rely on manual configuration when the upstream provider is not the DDoS mitigation provider.'
