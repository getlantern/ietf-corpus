document: rfc-2665
kind: design-rationale
summary: All Ethernet interfaces are recommended to use a single ifType (ethernetCsmacd(6)) regardless of speed, because 'an Ethernet is an Ethernet.' Speed information is available from ifSpeed/ifHighSpeed and MAU type from ifMauType in the MAU-MIB, making separate ifType values for Fast/Gigabit Ethernet unnecessary.
section: 3.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
