document: rfc-9252
kind: protocol-element
summary: SRv6 Endpoint Behaviors are encoded in the SRv6 SID Information Sub-TLV as a 2-octet codepoint from the IANA 'SRv6 Endpoint Behaviors' subregistry (RFC 8986). The opaque behavior value 0xFFFF MAY be used by an advertising router to abstract its locally instantiated SRv6 SID behavior. Unrecognized behaviors MUST NOT be considered invalid (except those involving arguments with non-zero AL).
section: "3.1"
topics:
    - bgp
    - routing
    - ip
    - registry
