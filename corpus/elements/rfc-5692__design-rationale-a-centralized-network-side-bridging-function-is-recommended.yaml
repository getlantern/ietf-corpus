document: rfc-5692
kind: design-rationale
summary: A centralized network-side bridging function is recommended for the generic IP-over-Ethernet-over-IEEE-802.16 case because it enables best control of broadcasting and forwarding, and allows a centralized database of attached hosts to avoid flooding. Distributed bridging is more appropriate for public access mode.
section: Appendix B
topics:
