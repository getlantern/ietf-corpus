document: rfc-6536
kind: state-machine
summary: 'Outgoing notification authorization is an 11-step procedure: permit if NACM disabled or recovery session; permit replayComplete/notificationComplete events; collect user''s groups; match ordered rule-lists and notification rules on module-name, notification-name, and read access-operations bit; apply action (drop notification if denied); check default-deny-all; apply read-default fallback.'
section: 3.4.6
topics:
