document: rfc-9773
kind: normative-requirement
summary: Clients MUST NOT check a certificate's RenewalInfo after the certificate has expired, and MUST NOT check it after they consider the certificate to be replaced (e.g., after a new certificate for the same identifiers has been received and configured).
section: "4.3"
rfc2119_level: MUST NOT
