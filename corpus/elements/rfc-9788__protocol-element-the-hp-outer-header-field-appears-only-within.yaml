document: rfc-9788
kind: protocol-element
summary: The HP-Outer Header Field appears only within the Header Section of an encrypted message's Cryptographic Payload. It embeds a protected copy of every Non-Structural Header Field that the composer exposed outside the Cryptographic Envelope, enabling the renderer to determine which Header Fields were made confidential.
section: "2.2"
topics:
    - email
    - security
    - crypto
