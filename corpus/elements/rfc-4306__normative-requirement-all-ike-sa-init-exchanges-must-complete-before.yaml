document: rfc-4306
kind: normative-requirement
summary: All IKE_SA_INIT exchanges MUST complete before any other exchange type, then all IKE_AUTH exchanges MUST complete, after which CREATE_CHILD_SA and INFORMATIONAL exchanges may occur in any order. Recipients of IKE_AUTH messages MUST verify that all signatures and MACs are computed correctly.
section: "1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
