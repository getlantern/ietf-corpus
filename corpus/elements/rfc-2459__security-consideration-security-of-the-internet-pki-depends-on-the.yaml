document: rfc-2459
kind: security-consideration
summary: Security of the Internet PKI depends on the integrity of CA private keys and correct path validation. Marking extensions such as key usage, basic constraints, and name constraints as critical is essential; implementations that ignore unrecognized critical extensions are explicitly prohibited to prevent policy bypass.
section: "10"
topics:
