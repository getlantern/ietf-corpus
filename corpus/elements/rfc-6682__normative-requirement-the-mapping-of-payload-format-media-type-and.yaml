document: rfc-6682
kind: normative-requirement
summary: The mapping of payload format media type and parameters to SDP SHALL be done according to Section 3 of RFC 4855, mapping payload-format-specific parameters into the 'a=fmtp' field. Media type parameters MUST use the media types in this document and MUST NOT use those specified in RFC 6364.
section: "7"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
