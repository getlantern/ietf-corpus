document: rfc-7219
kind: design-rationale
summary: Switch ports rather than MAC addresses are used as binding anchors because MAC addresses are trivially spoofable. Using a spoofable anchor together with packet dropping would create new DoS vectors based on spoofed binding anchors.
section: "2.2"
topics:
    - ip
    - security
