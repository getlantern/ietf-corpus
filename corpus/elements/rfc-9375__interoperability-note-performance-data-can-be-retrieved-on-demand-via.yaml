document: rfc-9375
kind: interoperability-note
summary: Performance data can be retrieved on-demand via NETCONF (RFC 6241) or RESTCONF (RFC 8040) using filters such as 'link-id'. It can also be obtained via subscription using YANG-Push (RFC 8641) for periodic, on-change, or replay notifications, and via alarm notifications (RFC 8632) for threshold crossings.
section: "3.1"
topics:
