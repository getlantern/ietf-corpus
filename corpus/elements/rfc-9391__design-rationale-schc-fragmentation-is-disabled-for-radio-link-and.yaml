document: rfc-9391
kind: design-rationale
summary: SCHC fragmentation is disabled for Radio Link and DoNAS scenarios because the RLC layer already handles segmentation; the radio protocols' link adaptation (varying TB selection per TTI) would make SCHC tiling overhead equal to or greater than native RLC fragmentation.
section: 5.2.3
topics:
