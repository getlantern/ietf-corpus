document: rfc-3010
kind: protocol-element
summary: 'The COMPOUND procedure is the primary RPC operation in NFS version 4, allowing multiple operations to be combined in a single RPC call evaluated sequentially. The protocol has only two RPC procedures: NULL and COMPOUND.'
