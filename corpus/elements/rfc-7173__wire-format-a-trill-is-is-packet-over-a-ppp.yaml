summary: 'A TRILL IS-IS packet over a PPP pseudowire in MPLS consists of: Server MPLS Tunnel Label(s) (n*4 octets), PW Label (4 octets), Control Word (4 octets), PPP Header 0x405d (2 octets), Common IS-IS Header (8 octets), IS-IS PDU Type Specific Header (variable), and IS-IS TLVs (variable).'
