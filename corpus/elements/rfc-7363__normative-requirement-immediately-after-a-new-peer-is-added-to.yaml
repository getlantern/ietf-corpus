document: rfc-7363
kind: normative-requirement
summary: Immediately after a new peer is added to the finger table, a Probe request MUST be sent to the new peer to fetch its uptime; the 'requested_info' field MUST contain the ProbeInformationType 'uptime'.
section: "5.3"
rfc2119_level: MUST
topics:
