document: rfc-6147
kind: design-rationale
summary: The DNS64 implementation SHOULD support mapping separate IPv4 address ranges to separate IPv6 prefixes, allowing special-use IPv4 addresses (RFC 5735) to be handled with appropriate per-range Pref64::/n values, enabling correct translation for addresses like private RFC 1918 space.
