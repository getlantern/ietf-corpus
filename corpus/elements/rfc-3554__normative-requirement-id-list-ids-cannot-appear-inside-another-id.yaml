document: rfc-3554
kind: normative-requirement
summary: ID_LIST IDs cannot appear inside another ID_LIST ID payload (no recursive nesting). Any ID type defined in RFC 2407 may be included, and each must carry a complete Identification Payload header.
section: "3"
rfc2119_level: MUST
topics:
    - sctp
    - ipsec
    - crypto
