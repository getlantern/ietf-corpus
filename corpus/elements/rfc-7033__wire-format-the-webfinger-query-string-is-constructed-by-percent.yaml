document: rfc-7033
kind: wire-format
summary: The WebFinger query string is constructed by percent-encoding each parameter value (including '=' and '&' within values) and concatenating 'name=value' pairs with '&' separators. The 'resource' parameter carries the query target URI; 'rel' parameters carry link relation types. No spaces are permitted.
