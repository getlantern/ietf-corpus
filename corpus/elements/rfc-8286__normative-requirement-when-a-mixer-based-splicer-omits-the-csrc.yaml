document: rfc-8286
kind: normative-requirement
summary: When a mixer-based splicer omits the CSRC list (breaking RTP loop detection per RFC 3550 Section 8.2), non-RTP means MUST be used to detect and resolve forwarding loops, as these could form a serious denial-of-service threat.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - security
