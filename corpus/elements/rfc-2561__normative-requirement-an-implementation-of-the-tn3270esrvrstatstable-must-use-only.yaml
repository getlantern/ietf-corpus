document: rfc-2561
kind: normative-requirement
summary: An implementation of the tn3270eSrvrStatsTable MUST use only one of the three levels of refinement (server-wide, port, or port-and-local-address) for all entries associated with a single TN3270E server.
section: 3.1.3
rfc2119_level: MUST
