document: rfc-8156
kind: protocol-element
summary: 'Proportional allocation is used for delegable prefix leases: the primary owns all available delegable prefixes initially and distributes a configured proportion to the secondary via BNDUPD messages with state FREE-BACKUP. The secondary triggers rebalancing by sending POOLREQ; the primary responds with POOLRESP and then sends prefix leases via BNDUPD.'
section: 4.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
