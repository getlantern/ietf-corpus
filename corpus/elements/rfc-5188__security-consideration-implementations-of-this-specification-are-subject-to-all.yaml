document: rfc-5188
kind: security-consideration
summary: Implementations of this specification are subject to all security considerations specified in RFC 3558, RFC 3550, and any appropriate RTP profile (e.g., RFC 3551). Since compression is applied end-to-end and encodings do not exhibit significant non-uniformity, the primary security concerns are those of the underlying RTP transport.
section: "18"
topics:
    - security
    - rtp
    - realtime
