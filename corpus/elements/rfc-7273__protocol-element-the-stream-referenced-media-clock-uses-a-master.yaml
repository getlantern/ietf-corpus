document: rfc-7273
kind: protocol-element
summary: The stream-referenced media clock uses a master clock identifier (base64-encoded, SHOULD be generated per RFC 7022 short-term persistent CNAME algorithm) to associate slave RTP streams with a master clock stream. An RTP clock master is tagged with `src:<media-clktag>`; slaves reference `id=<media-clktag>`. IEEE 1722 AVB masters are referenced via `IEEE1722=<EUI64>`.
section: "5.3"
topics:
    - rtp
    - realtime
