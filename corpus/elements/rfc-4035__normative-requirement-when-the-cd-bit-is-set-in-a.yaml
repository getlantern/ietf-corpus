document: rfc-4035
kind: normative-requirement
summary: When the CD bit is set in a query, a recursive name server SHOULD return requested data to the originating resolver even if the server's local authentication policy would reject the records, because the originating resolver has taken responsibility for performing its own authentication.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
