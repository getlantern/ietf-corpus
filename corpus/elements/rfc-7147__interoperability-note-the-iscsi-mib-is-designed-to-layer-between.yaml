document: rfc-7147
kind: interoperability-note
summary: The iSCSI MIB is designed to layer between the SCSI MIB (RFC 4455) and TCP MIB (RFC 4022). Each iscsiNode links to a SCSI device via iscsiNodeTransportType (a RowPointer), and each iscsiConnection is correlated to a TCP MIB entry using the 5-tuple (protocol, src addr, src port, dst addr, dst port).
section: "3"
topics:
