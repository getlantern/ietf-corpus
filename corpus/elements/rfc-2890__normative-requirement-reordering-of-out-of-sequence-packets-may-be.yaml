document: rfc-2890
kind: normative-requirement
summary: Reordering of out-of-sequence packets MAY be performed by the decapsulator for improved performance and tolerance to network reordering. A small per-flow reorder buffer (MAX_PERFLOW_BUFFER) may improve performance when higher-layer stateful compression or encryption is in use.
section: "2.2"
rfc2119_level: MAY
topics:
