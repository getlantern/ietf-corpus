document: rfc-9935
kind: normative-requirement
summary: When receiving a private key containing both the seed and the expandedKey, the recipient SHOULD perform a seed consistency check by regenerating the expanded form via ML-KEM.KeyGen_internal(d,z) and comparing it bytewise. If inconsistent, the recipient MUST reject the private key as malformed.
section: "8"
rfc2119_level: SHOULD
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
