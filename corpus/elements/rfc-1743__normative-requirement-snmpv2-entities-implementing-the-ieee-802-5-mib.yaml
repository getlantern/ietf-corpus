document: rfc-1743
kind: normative-requirement
summary: SNMPv2 entities implementing the IEEE 802.5 MIB must implement the dot5StateGroup and dot5StatsGroup as mandatory groups. Write access to dot5ActMonParticipate and dot5Functional is not required (MIN-ACCESS read-only).
