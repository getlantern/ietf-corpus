document: rfc-4993
kind: protocol-element
summary: Version information ('vi') payloads MUST conform to RFC 4991 XML and use <versions> as the root element. The <transferProtocol> identifier for IRIS-LWZ is 'iris.lwz1'; it MUST only describe protocols on the same socket as the responding server.
section: 3.1.5
