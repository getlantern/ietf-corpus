document: rfc-5364
kind: normative-requirement
summary: 'When duplicate URI entries exist in a resource list with different ''copyControl'' values, the URI-list server MUST select the highest precedence value for that recipient. Precedence order is: ''to'' > ''cc'' > ''bcc''.'
section: "4"
rfc2119_level: MUST
topics:
