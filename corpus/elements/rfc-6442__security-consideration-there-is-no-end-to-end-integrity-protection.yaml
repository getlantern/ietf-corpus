document: rfc-6442
kind: security-consideration
summary: There is no end-to-end integrity protection on Geolocation or Geolocation-Error header fields; recipients must implicitly trust their contents. When unauthenticated access to location-by-reference is unavoidable, pseudorandom URIs combined with SIPS path encryption limits exposure to entities on the SIP signaling path only.
section: "7"
topics:
    - realtime
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
