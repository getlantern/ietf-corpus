document: rfc-3559
kind: interoperability-note
summary: Scope entries in mallocScopeTable may be dynamically discovered via MZAP (RFC 2776) or statically configured. The mallocScopeSource field (type IANAscopeSource) records how each entry was learned, enabling management systems to distinguish protocol-discovered scopes from operator-configured ones.
section: "3.1"
topics:
    - multicast
