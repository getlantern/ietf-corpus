document: rfc-8071
kind: security-consideration
summary: Internet-facing call home hosts are subject to fingerprinting via scanning tools (e.g., zmap). SSH/TLS clients may be less robust than servers to resulting attacks, so implementers MUST provide software update mechanisms to fix vulnerabilities in a timely fashion.
section: "5"
topics:
    - netconf
    - security
