document: rfc-5262
kind: normative-requirement
summary: Implementations MUST follow guidelines from PIDF (RFC 3863) and PIDF extension formats (DataModel RFC 4479, RPID RFC 4480, CIPID RFC 4482), and MUST support the XML schema data type ID from those RFCs. The XML document MUST be well-formed and SHOULD be valid.
section: "3"
rfc2119_level: MUST
