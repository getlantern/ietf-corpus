document: rfc-4684
kind: normative-requirement
summary: When advertising a locally sourced RT membership NLRI to a non-client iBGP peer, if the best path is received from a non-client peer but an alternative path from a client exists, the attributes of the client path shall be advertised. This allows a BGP speaker to signal its clients' interest in VPN routes for a given target.
section: "3.2"
rfc2119_level: REQUIRED
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
