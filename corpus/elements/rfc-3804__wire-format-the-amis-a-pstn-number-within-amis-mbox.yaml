summary: The AMIS-A PSTN number within amis-mbox uses the format 'int-country-code '+' area-code '+' local-number '+'', consistent with ITU E.164 with a maximum of 15 numeric digits; private numbers use '0++' prefix with a maximum of 14 digits.
