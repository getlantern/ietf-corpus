document: rfc-7117
kind: normative-requirement
summary: In inter-AS options (a) and (e), BGP VPLS A-D routes generated by PEs within an AS MUST NOT be propagated outside that AS; only routes originated by ASBRs are permitted to cross AS boundaries.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
    - routing
