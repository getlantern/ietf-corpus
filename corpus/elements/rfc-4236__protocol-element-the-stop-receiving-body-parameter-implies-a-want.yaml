document: rfc-4236
kind: protocol-element
summary: The Stop-Receiving-Body parameter implies a Want Stop Receiving Data (DWSR) message behavior before original dataflow starts. An OPES processor MUST behave as if it received a DWSR message with the corresponding offset.
section: 3.2.5
rfc2119_level: MUST
