document: rfc-3478
kind: protocol-element
summary: For a non-egress restarting LSR receiving a Label Mapping message with a non-Implicit-NULL label, the LSR searches for a forwarding state entry with matching outgoing label and next hop. If found, the entry is un-marked as stale and the incoming label is re-associated with the received FEC and re-advertised to neighbors.
section: 3.1.1
topics:
    - mpls
    - routing
