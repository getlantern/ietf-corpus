document: rfc-8371
kind: wire-format
summary: The IMSI identifier is encoded as a string of octets in network order (high to low), where each decimal digit occupies 4 bits. If needed for full octet size, the last digit MUST be padded with 0xf (e.g., IMSI 123456123456789 encodes as 0x12, 0x34, 0x56, 0x12, 0x34, 0x56, 0x78, 0x9f).
section: "4.2"
topics:
