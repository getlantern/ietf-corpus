document: rfc-5890
kind: security-consideration
summary: When local character sets other than ASCII and Unicode are used, inconsistent conversion rules between applications or versions may cause the same name to be interpreted differently and resolve to different servers. TLS and other security protocols that do not consider local character sets cannot mitigate this problem.
section: "4.3"
topics:
    - dns
    - security
