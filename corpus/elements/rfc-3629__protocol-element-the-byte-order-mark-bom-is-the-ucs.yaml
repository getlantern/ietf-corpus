document: rfc-3629
kind: protocol-element
summary: The Byte Order Mark (BOM) is the UCS character U+FEFF 'ZERO WIDTH NO-BREAK SPACE'. In UTF-8 it always appears as the 3-octet sequence EF BB BF. It may be prepended to a stream as a signature to indicate UTF-8 encoding, but its signature function is less useful in UTF-8 than in multi-byte encodings because byte order is not at issue.
section: "6"
