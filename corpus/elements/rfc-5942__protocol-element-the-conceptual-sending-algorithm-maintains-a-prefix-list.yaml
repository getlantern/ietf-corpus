document: rfc-5942
kind: protocol-element
summary: The conceptual sending algorithm maintains a Prefix List, Destination Cache, and Default Router List that together form the IP forwarding table for a host. The Neighbor Cache is a separate structure referenced by the Destination Cache; entries in the Neighbor Cache are not necessarily on-link.
