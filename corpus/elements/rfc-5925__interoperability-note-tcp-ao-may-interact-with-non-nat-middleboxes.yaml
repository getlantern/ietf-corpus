document: rfc-5925
kind: interoperability-note
summary: TCP-AO may interact with non-NAT middleboxes that modify TCP options. When such middleboxes are present, TCP-AO must be configured to exclude TCP options from the MAC calculation on affected connections, which reduces protection since option modifications would go undetected.
section: "9.1"
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
