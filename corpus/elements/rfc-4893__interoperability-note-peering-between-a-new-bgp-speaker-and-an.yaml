document: rfc-4893
kind: interoperability-note
summary: Peering between a NEW BGP speaker and an OLD one is possible only if the NEW BGP speaker has a 2-octet AS number or uses AS_TRANS. A non-mappable 4-octet AS number cannot be used as a BGP Confederation Member AS Number until all speakers in the confederation support 4-octet AS numbers.
section: 4.2.1
topics:
    - bgp
    - routing
