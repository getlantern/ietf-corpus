document: rfc-5040
kind: normative-requirement
summary: RDMA Read Request Messages MUST NOT start processing at the Remote Peer until they have been Delivered to RDMAP by DDP, ensuring that a Read following a Send or RDMA Write to the same buffer will return the data written by that prior operation rather than stale data.
section: "5.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
