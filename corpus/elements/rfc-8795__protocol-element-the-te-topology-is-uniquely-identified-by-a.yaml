document: rfc-8795
kind: protocol-element
summary: 'The TE topology is uniquely identified by a three-part key: ''topology-id'', ''provider-id'', and ''client-id''. The combination of ''provider-id'' and ''topology-id'' uniquely identifies a Native TE topology on a given provider; ''client-id'' value of ''0'' is used for Native TE topologies.'
section: "5.4"
topics:
