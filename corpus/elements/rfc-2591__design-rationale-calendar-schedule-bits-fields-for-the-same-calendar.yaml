document: rfc-2591
kind: design-rationale
summary: Calendar schedule BITS fields for the same calendar dimension (e.g., weekday) are combined with OR, while fields across different dimensions (e.g., weekday AND month) are combined with AND. Setting all bits in a field acts as a wildcard, causing the scheduler to ignore that dimension entirely.
section: "3.2"
topics:
