document: rfc-5652
kind: normative-requirement
summary: The recipient MUST NOT rely on any MAC values or message digest values computed by the originator. The recipient independently computes the MAC and digest; both must equal the received values for authentication to succeed.
section: "9.3"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
