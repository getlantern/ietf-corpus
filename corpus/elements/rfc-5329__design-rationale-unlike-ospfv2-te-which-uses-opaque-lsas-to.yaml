document: rfc-5329
kind: design-rationale
summary: Unlike OSPFv2 TE which uses Opaque LSAs to carry TE information, OSPFv3 defines a dedicated Intra-Area-TE-LSA type, exploiting OSPFv3's flexible U-bit flooding mechanism that ensures area-scoped flooding even by routers that do not recognize the new LSA type.
section: "2"
topics:
