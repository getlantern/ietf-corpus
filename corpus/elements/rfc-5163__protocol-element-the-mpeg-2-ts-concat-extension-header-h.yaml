document: rfc-5163
kind: protocol-element
summary: The MPEG-2 TS-Concat Extension Header (H-Type 0x0002) is a Mandatory Extension Header that transports one or more MPEG-2 TS Packets within a ULE or GSE SNDU. The number of TS Packets is determined from the remaining payload size after the extension header, computed as (Length-N-10+D*6) / 188 for ULE.
section: "3.1"
topics:
    - mpls
