document: rfc-1201
kind: normative-requirement
summary: All IP broadcast addresses MUST be mapped to the ARCNET broadcast address of 0. ARCNET does not guarantee delivery of broadcast packets, but this is acceptable since neither IP nor ARP require reliable broadcast delivery.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
