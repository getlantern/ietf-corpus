document: rfc-7941
kind: interoperability-note
summary: The RFC 5285 header extension specification does not allow mixing one-byte and two-byte headers for the same RTP stream (SSRC). RTP middleboxes must consider all potential header extensions and known SDES item sizes when selecting the header format for outgoing streams.
section: 4.2.1
topics:
    - rtp
    - realtime
