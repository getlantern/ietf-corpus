document: rfc-9015
kind: normative-requirement
summary: When multiple SFPRs share the same SPI but have different SFPR-RDs, the SFF MUST use the SFPR with the numerically lowest SFPR-RD (treating RDs as 8-octet integers in network byte order) and SHOULD log the occurrence to assist debugging.
section: 3.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
