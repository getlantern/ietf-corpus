document: rfc-3388
kind: normative-requirement
summary: A media agent handling an FID-grouped media flow MUST send a copy of the media to every 'm' line that is part of the flow, as long as the codecs and direction attribute of that 'm' line permit it. The application uses only one codec at a time; the codec MAY change dynamically.
section: "7.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
