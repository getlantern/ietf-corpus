document: rfc-4788
kind: normative-requirement
summary: The '\n' MUST be included in any comparison of the EVRC-B magic number '#!EVRC-B\n', since otherwise a prefix of the EVRC-B magic number could be mistaken for the EVRC magic number '#!EVRC\n'.
