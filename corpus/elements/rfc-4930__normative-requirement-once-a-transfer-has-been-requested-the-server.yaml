document: rfc-4930
kind: normative-requirement
summary: Once a transfer has been requested, the server MUST notify the current sponsoring client by queuing a service message for <poll> retrieval or by out-of-band means. Transfer service messages MUST include object-specific elements specified for <transfer> command responses.
section: 2.9.3.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
