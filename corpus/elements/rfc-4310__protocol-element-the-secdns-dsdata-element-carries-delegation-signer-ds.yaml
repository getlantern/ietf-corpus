document: rfc-4310
kind: protocol-element
summary: 'The <secDNS:dsData> element carries delegation signer (DS) information and contains four required fields: <secDNS:keyTag> (key tag value), <secDNS:alg> (algorithm number), <secDNS:digestType> (digest type), and <secDNS:digest> (digest value), plus optional <secDNS:maxSigLife> and <secDNS:keyData> child elements.'
