document: rfc-7671
kind: interoperability-note
summary: When a server is authenticated via DANE-EE(3), CT checks SHOULD NOT be performed, as the domain owner has directly specified the certificate association without reference to any public CA. With DANE-TA(2) for non-public TAs, CT also SHOULD NOT be applied.
