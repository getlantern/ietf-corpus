document: rfc-5190
kind: interoperability-note
summary: The MIDCOM-MIB requires MIDCOM clients to specify address tuples A0 (internal endpoint) and A3 (external endpoint). Applications such as FTP using the PORT command (rather than PASV) that only know one address realm when configuring the middlebox cannot comply with this requirement when the middlebox provides twice-NAT functionality.
section: "6.7"
topics:
    - nat
