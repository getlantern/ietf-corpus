document: rfc-9593
kind: protocol-element
summary: An empty SUPPORTED_AUTH_METHODS notification in the IKE_SA_INIT response signals to the initiator that the responder will send the actual list in a subsequent IKE_INTERMEDIATE exchange. The initiator MAY start an IKE_INTERMEDIATE exchange for this sole purpose.
section: "3.1"
topics:
    - ipsec
    - security
