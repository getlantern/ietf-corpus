document: rfc-5191
kind: normative-requirement
summary: The initial PANA-Auth-Request and PANA-Auth-Answer messages MUST have the 'S' (Start) bit set regardless of who initiated the session. All other messages MUST NOT have the 'S' bit set. Similarly, the final PAR and PAN in authentication/re-authentication MUST have the 'C' (Complete) bit set; all other messages MUST NOT.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
