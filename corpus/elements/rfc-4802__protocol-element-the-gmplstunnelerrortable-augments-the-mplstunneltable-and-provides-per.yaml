document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelErrorTable augments the mplsTunnelTable and provides per-tunnel error information including error type (noError, unknown, protocol, pathComputation, localConfiguration, localResources, localOther), timestamp, reporter address, error code, subcode, interface identifier TLVs, and a human-readable help string. Entries are not persistent across system resets.
section: "5.5"
