document: rfc-5545
kind: protocol-element
summary: The RRULE property defines a rule or repeating pattern for recurring events, to-dos, journal entries, or timezone definitions. The value is a RECUR type. Only one RRULE SHOULD be specified; the behavior when multiple RRULE properties are specified is undefined.
section: 3.8.5.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
