document: rfc-2453
kind: protocol-element
summary: RIP-2 uses the IP multicast address 224.0.0.9 for periodic routing updates to reduce load on non-RIP-2 hosts. IGMP is not required because these are inter-router messages that are not forwarded. On NBMA networks, unicast addressing may be used instead.
section: "4.5"
topics:
