document: rfc-3550
kind: security-consideration
summary: RTP provides no built-in authentication or message integrity; these are expected from profile-defined mechanisms or companion protocols (e.g., SRTP). Random initial sequence numbers and SSRCs offer weak protection against off-path injection but are insufficient against on-path attackers.
section: "9.2"
topics:
    - rtp
    - realtime
    - security
