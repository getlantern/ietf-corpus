document: rfc-894
kind: wire-format
summary: The minimum length of the Ethernet data field is 46 octets; if necessary, the data field should be padded with zero octets to meet the Ethernet minimum frame size. This padding is not part of the IP packet and is not included in the IP header total length field.
section: Frame Format
topics:
    - ip
