document: rfc-9754
kind: normative-requirement
summary: When granting a delegation stateid, the server MUST set OPEN_DELEGATE_READ_ATTRS_DELEG in the open_delegation_type4 response for a read attribute delegation, and MUST set OPEN_DELEGATE_WRITE_ATTRS_DELEG for a write attribute delegation.
section: "5"
rfc2119_level: MUST
