document: rfc-2508
kind: normative-requirement
summary: It is RECOMMENDED that the decompressor periodically verify the UDP checksum (perhaps one out of every 16 packets) to detect errors that go undetected by the 4-bit sequence number (e.g., exactly 16 consecutive losses). On detecting an error, the decompressor should invalidate the context and signal the compressor.
section: 3.3.5
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
