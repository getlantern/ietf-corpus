document: rfc-8279
kind: security-consideration
summary: BIER inherits the security properties of the multicast flow overlay and the routing underlay with which it is paired. It does not define any BIER-specific authentication, integrity, or confidentiality mechanisms; security must be provided at the overlay and underlay layers.
section: "9"
topics:
