document: rfc-7044
kind: normative-requirement
summary: If the UAC includes priv-values other than 'header' in the Privacy header, it MUST also include 'history'. If no Privacy header is included at all, the UAC MUST add one with 'history'. If 'header' is included, the UAC SHOULD NOT also include 'history'.
section: 10.1.1
rfc2119_level: MUST
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
