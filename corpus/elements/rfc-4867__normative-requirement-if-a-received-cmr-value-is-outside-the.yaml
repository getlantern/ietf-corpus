document: rfc-4867
kind: normative-requirement
summary: If a received CMR value is outside the signaled subset of modes, it MUST be ignored. If receiving a payload with a CMR value that is not a speech mode or NO_DATA, the CMR MUST be ignored by the receiver.
section: 4.3.1
rfc2119_level: MUST
