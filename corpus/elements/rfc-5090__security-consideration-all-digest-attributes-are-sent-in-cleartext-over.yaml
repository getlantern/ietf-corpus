document: rfc-5090
kind: security-consideration
summary: All Digest-* attributes are sent in cleartext over RADIUS; a man-in-the-middle can perform a bidding-down attack by modifying or removing Digest-Qop and Digest-Algorithm attributes in Access-Challenge messages, causing the client to use weaker authentication.
section: "8.2"
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
