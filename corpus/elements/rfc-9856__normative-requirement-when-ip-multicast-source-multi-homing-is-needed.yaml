document: rfc-9856
kind: normative-requirement
summary: When IP multicast source multi-homing is needed, EVPN multi-homed ESes MUST be used. EVPN multi-homing ensures that only one upstream PE forwards a given multicast flow at a time, preventing packet duplication at downstream PEs.
section: "1.3"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
