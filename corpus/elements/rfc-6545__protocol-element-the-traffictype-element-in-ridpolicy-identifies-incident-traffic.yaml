document: rfc-6545
kind: protocol-element
summary: 'The TrafficType element in RIDPolicy identifies incident traffic category: Attack (information security incident), Network (routing issues), Content (regional content restrictions), DataWithHandlingRequirements (regulatory/legal data), AudienceRestriction (restricted audience), or Other (requires description). Multiple values may be selected.'
