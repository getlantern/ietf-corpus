document: rfc-5283
kind: interoperability-note
summary: For successful end-to-end inter-area LSPs, this specification must be implemented on all LSRs in all areas where IP aggregation is used. Deployment can be incremental per-area; during upgrade, ABRs should continue advertising specific prefixes until all LSRs in the area are upgraded.
section: "7.1"
topics:
    - mpls
    - routing
