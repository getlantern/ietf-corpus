summary: The Ethernet Group exposes phivEthDesigRouterNodeAddr (current designated router address, read-only), phivEthMaxRouters (max peer routers on circuit, 0–255), phivEthRouterPri (designated-router election priority, 0–127, default 64), and phivEthHardwareAddr (6-octet hardware address as seen by DECnet software, distinct from ifPhysAddress).
