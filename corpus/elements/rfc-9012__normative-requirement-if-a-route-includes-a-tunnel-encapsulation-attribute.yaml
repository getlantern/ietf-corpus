document: rfc-9012
kind: normative-requirement
summary: If a route includes a Tunnel Encapsulation attribute with no feasible tunnel, that route MUST NOT be considered resolvable for the purposes of the route resolvability condition (RFC 4271, Section 9.1.2.1), affecting the BGP best-route selection.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
