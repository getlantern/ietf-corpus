document: rfc-6763
kind: normative-requirement
summary: TXT records larger than 1300 bytes are NOT RECOMMENDED; the intended typical size is 200 bytes or less. Records over 400 bytes risk not fitting in a single 512-byte DNS message, and records over 1300 bytes risk not fitting in a single Ethernet frame.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
