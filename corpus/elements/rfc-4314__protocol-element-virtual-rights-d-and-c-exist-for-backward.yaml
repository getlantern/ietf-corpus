document: rfc-4314
kind: protocol-element
summary: Virtual rights 'd' and 'c' exist for backward compatibility with RFC 2086. The 'd' right is a macro expanding to 'e', 't', and possibly 'x'; the 'c' right is a macro expanding to 'k' and possibly 'x'. Clients conforming to this document MUST ignore these virtual rights in MYRIGHTS, ACL, and LISTRIGHTS responses.
section: 2.1.1
topics:
    - email
