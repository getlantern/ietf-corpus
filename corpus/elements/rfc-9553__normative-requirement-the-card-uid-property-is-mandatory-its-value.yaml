document: rfc-9553
kind: normative-requirement
summary: The Card uid property is mandatory. Its value SHOULD be a URN; UUID version 4 in the 'uuid' namespace is RECOMMENDED. The Card @type MUST be 'Card' and version MUST be an IANA-registered JSContact version value.
section: 2.1.9
rfc2119_level: MUST
