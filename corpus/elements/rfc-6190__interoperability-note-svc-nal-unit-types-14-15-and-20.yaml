document: rfc-6190
kind: interoperability-note
summary: SVC NAL unit types 14, 15, and 20 are reserved in H.264/AVC Annex A profiles and are silently ignored by conforming H.264/AVC decoders, ensuring that the AVC base layer sub-stream is decodable by existing H.264/AVC equipment without changes.
