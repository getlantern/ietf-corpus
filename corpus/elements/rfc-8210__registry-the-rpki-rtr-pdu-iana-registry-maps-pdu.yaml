document: rfc-8210
kind: registry
summary: The 'rpki-rtr-pdu' IANA registry maps PDU Type numbers (0–255) to protocol versions and descriptions. Version 1 adds Router Key (Type 9); Type 9 is reserved and unused in version 0. Addition policy is RFC Required (Standards Track or Experimental). Types 0–4, 6–8, and 10 are valid for both versions 0 and 1.
section: "14"
