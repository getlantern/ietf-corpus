document: rfc-6241
kind: protocol-element
summary: The <rpc> element encloses a client-to-server NETCONF request and carries a mandatory 'message-id' attribute — a sender-chosen string (commonly a monotonically increasing integer) that the receiver echoes verbatim in the corresponding <rpc-reply>.
