document: rfc-9007
kind: protocol-element
summary: 'MDN/send takes arguments: accountId (Id), identityId (Id), send (Id[MDN] map of creation id to MDN objects), and onSuccessUpdateEmail (Id[PatchObject]|null). The server uses the identity to determine the sender and derive the finalRecipient; it generates originalRecipient and originalMessageId per RFC 8098.'
