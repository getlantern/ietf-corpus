document: rfc-2108
kind: security-consideration
summary: Section 7 addresses security considerations for the SNMP Repeater MIB. Read-write objects — particularly rptrPortAdminStatus, rptrInfoReset, and TopN control objects — can disrupt network operation if accessed by unauthorized parties. Implementors should use SNMP authentication and access control mechanisms to restrict write access to these objects.
section: "7"
topics:
    - snmp
    - security
