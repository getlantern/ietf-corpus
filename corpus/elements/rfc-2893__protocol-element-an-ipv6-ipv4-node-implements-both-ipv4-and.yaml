document: rfc-2893
kind: protocol-element
summary: 'An IPv6/IPv4 node implements both IPv4 and IPv6 stacks and may operate in three modes: IPv4-only (IPv6 stack disabled), IPv6-only (IPv4 stack disabled), or dual-stack (both enabled). Nodes MAY provide a configuration switch to disable either stack.'
