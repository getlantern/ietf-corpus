document: rfc-8832
kind: security-consideration
summary: DCEP itself provides no privacy, integrity, or authentication. It relies entirely on the enclosing protocol suite (SCTP over DTLS as specified in RFC 8261) for those properties. General WebRTC security considerations are addressed in RFC 8826 and RFC 8827.
section: "7"
topics:
