summary: A reliable provisional response transitions from 'unacknowledged' to 'acknowledged' upon receipt of a matching PRACK (same dialog, method, CSeq-num, and response-num). If unacknowledged for 64*T1 seconds, the UAS SHOULD reject the original request with 5xx.
