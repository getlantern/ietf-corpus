document: rfc-3670
kind: protocol-element
summary: FilterList (defined in PCIME) bridges ClassifierElement to filter criteria. The EntriesInFilterList aggregation's EntrySequence property accepts only the value '0', meaning all FilterEntries in the list are ANDed together to determine packet match; earlier CIM ordering semantics are explicitly not supported.
section: "3.9"
