document: rfc-3255
kind: normative-requirement
summary: For virtual concatenation based on SONET VT-1.5/2/6 and SDH VC-11/12/2 channels, bit 2 of the path overhead K4 byte must be set to the value indicated per ITU-T G.707 and ANSI T1.105.02.
section: "3"
rfc2119_level: MUST
