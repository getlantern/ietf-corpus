document: rfc-8344
kind: security-consideration
summary: The 'ipv4/forwarding' and 'ipv6/forwarding' leaves allow enabling or disabling IP forwarding. An attacker enabling forwarding could open a conduit bypassing security safeguards; disabling it could cause denial of service.
