document: rfc-9893
kind: normative-requirement
summary: A sender (either modem or router) MUST NOT send a subsequent Credit Control Message until a Credit Control Response Message has been received from its peer, ensuring only one outstanding message per sender at a time.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
