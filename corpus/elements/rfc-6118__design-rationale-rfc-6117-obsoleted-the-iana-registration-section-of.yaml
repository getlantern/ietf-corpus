document: rfc-6118
kind: design-rationale
summary: RFC 6117 obsoleted the IANA registration section of RFC 3761, leaving existing Enumservice registrations non-conformant. This document adds the missing XML elements (class, usage, registrationdocs, etc.) to bring legacy registrations into conformance without altering their functional specifications.
section: "1"
topics:
    - registry
    - dns
    - process
