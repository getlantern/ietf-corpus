document: rfc-1493
kind: protocol-element
summary: dot1dBaseBridgeAddress (dot1dBase 1) is a read-only MacAddress that uniquely identifies the bridge. It is recommended to be the numerically smallest MAC address of all ports, but is only required to be unique. Concatenated with dot1dStpPriority it forms the BridgeIdentifier used in STP.
section: "5.2"
topics:
