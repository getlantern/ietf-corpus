document: rfc-3369
kind: normative-requirement
summary: SignedAttributes MUST be DER encoded even if the rest of the CMS structure is BER encoded. When the signedAttrs field is present, it MUST contain at minimum a content-type attribute and a message-digest attribute.
section: "5.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
