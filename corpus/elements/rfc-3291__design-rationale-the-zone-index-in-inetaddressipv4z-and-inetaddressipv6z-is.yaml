document: rfc-3291
kind: design-rationale
summary: The zone index in InetAddressIPv4z and InetAddressIPv6z is 4 octets (Unsigned32) to be consistent with the numerical zone index architecture and the sin6_scope_id field of the sockaddr_in6 structure defined in RFC 2553. A zone index value of 0 refers to the default zone for each scope.
section: "4.2"
topics:
    - snmp
    - ip
