document: rfc-9111
kind: design-rationale
summary: HTTP cache requirements are deliberately focused on preventing a cache from storing a non-reusable response or reusing a stored response inappropriately, rather than mandating that caches always store and reuse particular responses, because reuse is the desired default and prohibition is the exception.
section: "2"
topics:
    - http
