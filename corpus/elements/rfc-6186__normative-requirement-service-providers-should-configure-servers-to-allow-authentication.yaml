document: rfc-6186
kind: normative-requirement
summary: Service providers SHOULD configure servers to allow authentication with either full email addresses or local-parts. Email addresses used as login names MUST NOT conflict with other permitted login names; local-parts MUST NOT conflict with any login name on the server.
section: "5"
rfc2119_level: SHOULD
topics:
    - email
