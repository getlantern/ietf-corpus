document: rfc-2728
kind: normative-requirement
summary: All datagrams belonging to a multi-fragment IP packet SHALL be sent with full (uncompressed) headers; only non-fragmented packets may use the compressed header format (MSB of compression key set to 1).
section: "3.5"
rfc2119_level: SHALL
