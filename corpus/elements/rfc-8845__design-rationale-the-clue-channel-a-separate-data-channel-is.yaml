document: rfc-8845
kind: design-rationale
summary: The CLUE channel (a separate data channel) is used in addition to SIP/SDP because aspects of telepresence control—such as switching active speaker, layout changes, or changing Capture source within an existing Encoding—change dynamically during a call and should not require heavyweight SIP re-invites.
