document: rfc-5161
kind: design-rationale
summary: The ENABLE extension was created because some extensions require the server to know whether a client supports them before sending unsolicited responses. Prior to ENABLE, extensions used indirect signals (like CONDSTORE using SELECT/FETCH parameters) to infer client support; ENABLE provides an explicit mechanism.
