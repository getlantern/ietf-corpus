document: rfc-3226
kind: interoperability-note
summary: DNSSEC signatures added per RR set range from approximately 80 to 800 octets (most 80–200 octets), significantly increasing DNS answer sizes from secure zones and making the 512-octet UDP limit problematic.
section: "2.1"
