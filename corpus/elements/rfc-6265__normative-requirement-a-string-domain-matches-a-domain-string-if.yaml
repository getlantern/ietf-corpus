document: rfc-6265
kind: normative-requirement
summary: A string domain-matches a domain string if they are identical, or if the domain string is a suffix of the string, the preceding character in the string is a dot, and the string is a hostname (not an IP address). Both values are canonicalized to lowercase before comparison.
section: 5.1.3
rfc2119_level: MUST
topics:
    - http
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
