document: rfc-8139
kind: normative-requirement
summary: It is RECOMMENDED that the E-L1CS FS-LSP method be used to distribute forwarder appointments and that all RBridges on a link advertise the appointments they would make if they were DRB. Hello-based appointments must be used only when legacy RBridges on the link do not support E-L1CS FS-LSPs.
section: "2.1"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
