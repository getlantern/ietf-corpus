document: rfc-9295
kind: design-rationale
summary: RFC 8410 defined permissible keyUsage combinations for these algorithms but did not define which values are impermissible, nor did it address keyEncipherment or dataEncipherment. This document fills those gaps by replacing Section 5 of RFC 8410 with explicit MUST NOT constraints.
section: "1"
topics:
    - pkix
    - crypto
