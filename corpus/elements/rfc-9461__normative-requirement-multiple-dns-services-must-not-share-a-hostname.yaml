document: rfc-9461
kind: normative-requirement
summary: Multiple DNS services MUST NOT share a hostname identifier (as defined in Section 3) unless they are sufficiently similar that allowing an attacker to choose between them is safe. Sharing a hostname enables a redirection adversary to substitute one service for another.
section: 8.1.2
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
