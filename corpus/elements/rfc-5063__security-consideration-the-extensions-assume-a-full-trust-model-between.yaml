document: rfc-5063
kind: security-consideration
summary: 'The extensions assume a full trust model between RSVP neighbors: while protocol exchanges can be secured via RFC 2747 cryptographic authentication, no mechanism verifies that restart information is correctly mapped from pre-restart exchanges. This is considered acceptable because the same trust model underlies normal protocol operation.'
section: "6"
topics:
    - security
    - routing
