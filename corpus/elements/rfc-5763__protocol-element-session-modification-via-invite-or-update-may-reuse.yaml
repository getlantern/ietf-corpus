document: rfc-5763
kind: protocol-element
summary: Session modification (via INVITE or UPDATE) may reuse existing DTLS associations if they have the same key fingerprints and transport parameters; otherwise a new association is established following the same rules as initial setup, and the old association is torn down after the offer/answer exchange completes.
section: "6.6"
topics:
    - sip
    - tls
    - realtime
