document: rfc-3591
kind: protocol-element
summary: For the OChGroup layer, ifPhysAddress encodes the wavelength range in the format 'w1-w2' (e.g., '1350-1650') where w1 and w2 are ASCII decimal nanometer values. For the OCh layer, ifPhysAddress contains the single wavelength as ASCII decimal digits in nanometers (e.g., '1550').
