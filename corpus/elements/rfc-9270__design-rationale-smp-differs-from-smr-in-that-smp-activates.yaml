document: rfc-9270
kind: design-rationale
summary: SMP differs from SMR in that SMP activates a protecting LSP via the Automatic Protection Switching (APS) protocol in the data plane when a working LSP fails, while SMR activates via control plane signaling. This distinction necessitates a new LSP Protection Type so nodes can behave appropriately during recovery.
