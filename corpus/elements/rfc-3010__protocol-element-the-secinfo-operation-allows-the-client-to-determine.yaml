document: rfc-3010
kind: protocol-element
summary: The SECINFO operation allows the client to determine on a per-filehandle basis what security triple is required for server access. The server signals a security mismatch via NFS4ERR_WRONGSEC, prompting the client to query available security mechanisms.
section: "3.3"
topics:
    - security
