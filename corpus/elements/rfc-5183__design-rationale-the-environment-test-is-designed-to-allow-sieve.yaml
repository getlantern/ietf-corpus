document: rfc-5183
kind: design-rationale
summary: The environment test is designed to allow Sieve scripts to behave differently when moved between systems or operated in different contexts, without requiring system-specific script variants. The test fails gracefully on unknown items rather than erroring, so scripts can be written portably.
