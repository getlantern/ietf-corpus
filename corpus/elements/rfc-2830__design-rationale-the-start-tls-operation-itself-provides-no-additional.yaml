document: rfc-2830
kind: design-rationale
summary: The Start TLS operation itself provides no additional security on its own; all security is derived from TLS. This is why implementors must not conflate the success of the Start TLS exchange with the security level of the resulting TLS connection.
section: "6"
topics:
    - tls
    - ldap
    - security
