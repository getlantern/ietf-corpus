document: rfc-5098
kind: protocol-element
summary: 'pktcSigDevMultiFreqToneTable defines multi-frequency tone characteristics: up to four frequency values (0–4000 Hz, 0 = absent), frequency mode (firstModulatedBySecond or summation), amplitude modulation percentage, dB level (TenthdBm), on/off durations (0–5000 ms), and repeat count. Modulation applies only to the first two frequencies; remaining frequencies are ignored in that mode.'
