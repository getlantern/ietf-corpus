document: rfc-8408
kind: design-rationale
summary: RSVP-TE (PST=0) is the assumed default path setup type when no PATH-SETUP-TYPE TLV is present, preserving backward compatibility with existing PCEP deployments that only use RSVP-TE. New PSTs must be explicitly signaled.
