document: rfc-5389
kind: registry
summary: IANA maintains a STUN Attribute Registry spanning 0x0000–0xFFFF, split into comprehension-required (0x0000–0x7FFF) and comprehension-optional (0x8000–0xFFFF) ranges. Initial entries include MAPPED-ADDRESS (0x0001), USERNAME (0x0006), MESSAGE-INTEGRITY (0x0008), ERROR-CODE (0x0009), XOR-MAPPED-ADDRESS (0x0020), FINGERPRINT (0x8028), and others.
