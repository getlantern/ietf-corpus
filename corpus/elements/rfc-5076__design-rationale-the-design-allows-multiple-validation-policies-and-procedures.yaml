document: rfc-5076
kind: design-rationale
summary: The design allows multiple validation policies and procedures simultaneously, and permits adding, modifying, removing, and retrieving validation information independently, reflecting that ENUM registries may use different validation methods and that validation data has its own lifecycle separate from the domain object.
