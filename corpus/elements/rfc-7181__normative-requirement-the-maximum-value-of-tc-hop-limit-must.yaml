document: rfc-7181
kind: normative-requirement
summary: The maximum value of TC_HOP_LIMIT MUST be >= the network diameter in hops (255 is RECOMMENDED), and all values of TC_HOP_LIMIT MUST be >= 2. When multiple values are used, the pattern MUST ensure each router at each hop distance sees a regular message interval.
section: 5.4.7
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
