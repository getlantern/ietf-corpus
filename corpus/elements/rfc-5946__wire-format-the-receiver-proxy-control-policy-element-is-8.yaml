summary: 'The Receiver Proxy Control policy element is 8 bytes total: Length (16 bits, always 8), P-Type (16 bits, REC_PROXY_CONTROL = 0x07), Reserved (24 bits, SHALL be zero on transmit and ignored on reception), and Control-Value (8 bits unsigned).'
