document: rfc-4255
kind: protocol-element
summary: The SSHFP resource record (RR) type code 44 stores a fingerprint of an SSH public host key associated with a DNS name. Its RDATA consists of an algorithm number (1 octet), fingerprint type (1 octet), and the fingerprint itself (variable length).
