document: rfc-5083
kind: interoperability-note
summary: This document updates RFC 3852 (CMS) by adding the authenticated-enveloped-data content type. All key management techniques supported by CMS enveloped-data are equally supported by authenticated-enveloped-data, enabling drop-in use of the new content type with existing recipient infrastructure.
section: "1"
topics:
    - crypto
    - security
