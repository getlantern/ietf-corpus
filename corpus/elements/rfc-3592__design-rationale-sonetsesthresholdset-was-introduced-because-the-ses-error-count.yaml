document: rfc-3592
kind: design-rationale
summary: sonetSESthresholdSet was introduced because the SES error-count thresholds in ANSI T1.231-1993, ITU-T G.826-1995, and ANSI T1.231-1997 are all different from each other and from RFC 1595 thresholds, making a single hard-coded threshold unworkable for multi-vendor interoperability.
section: "3.5"
topics:
    - snmp
