document: rfc-8379
kind: normative-requirement
summary: When a Graceful-Link-Shutdown sub-TLV is received for a point-to-point link, the remote node MUST identify the corresponding local link, set its metric to MaxLinkMetric (0xffff), and MUST reoriginate its Router-LSA with the changed metric.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
