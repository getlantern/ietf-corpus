document: rfc-2622
kind: protocol-element
summary: The route class represents each interAS route with a composite key of route (address-prefix) and origin (AS number), allowing the same prefix to be registered as originated by multiple ASes. Optional aggregation attributes (inject, components, aggr-bndry, aggr-mtd, export-comps, holes) support aggregate route specification.
