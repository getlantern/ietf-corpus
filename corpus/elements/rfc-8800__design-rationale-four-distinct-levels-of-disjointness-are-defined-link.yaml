kind: design-rationale
summary: Four distinct levels of disjointness are defined—link disjoint, node disjoint, SRLG disjoint, and node+SRLG disjoint—because different network scenarios and customer requirements demand different tradeoffs between the degree of disjointness and the likelihood of finding a feasible path. Centralized PCE computation is preferred for multi-head-end diverse paths because distributed computation of such paths is difficult.
