document: rfc-3801
kind: normative-requirement
summary: Conformant implementations MUST use Multipart/Voice-Message as the container for VPIM messages and MUST NOT create messages with prohibited contents (i.e., content types not profiled in section 4.4/4.5). In the spirit of liberal acceptance, a conforming system MAY accept and render prohibited content on receipt.
section: 4.4.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
