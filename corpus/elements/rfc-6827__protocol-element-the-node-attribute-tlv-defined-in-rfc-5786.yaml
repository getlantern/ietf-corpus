document: rfc-6827
kind: protocol-element
summary: The Node Attribute TLV (defined in RFC 5786) is reused for ASON reachability advertisement. For ASON, it MUST carry the Local TE Router ID sub-TLV to associate a block of IPv4/IPv6 address prefixes with a specific transport node identified by TE Router ID.
