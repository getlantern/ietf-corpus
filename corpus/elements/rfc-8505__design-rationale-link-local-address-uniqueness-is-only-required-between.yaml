document: rfc-8505
kind: design-rationale
summary: Link-Local Address uniqueness is only required between the two nodes that directly communicate (e.g., the 6LN and its 6LR), eliminating the EDAR/EDAC exchange for Link-Local Addresses in route-over topologies. This simplification is justified because a Link-Local Address is only meaningful for one-hop communication.
section: "5.6"
