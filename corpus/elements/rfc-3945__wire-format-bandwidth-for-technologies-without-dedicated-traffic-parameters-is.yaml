document: rfc-3945
kind: wire-format
summary: Bandwidth for technologies without dedicated traffic parameters is encoded as a 32-bit IEEE floating-point number in bytes per second. For RSVP-TE it is carried in the Peak Data Rate field of the SENDER_TSPEC and FLOWSPEC Int-Serv objects; for CR-LDP it is in the Peak and Committed Data Rate fields of the Traffic Parameters TLV.
section: "7.5"
topics:
    - routing
