document: rfc-7198
kind: security-consideration
summary: To prevent packet injection attacks, a de-duplication middlebox must authenticate both original and duplicate streams and ought not use non-authenticated packets. This requires the middlebox to be part of the security context and have access to appropriate signaling and keying material.
section: "8"
topics:
