document: rfc-1894
kind: security-consideration
summary: DSNs may be forged as easily as ordinary Internet email. Threats include falsified delivery/non-delivery notifications, falsified Final-Recipient addresses, falsified Remote-MTA identifications, falsified relay notifications, and unsolicited DSNs. Automated mail handlers should take precautions against denial-of-service from forged DSNs.
section: "4.1"
topics:
    - email
    - security
