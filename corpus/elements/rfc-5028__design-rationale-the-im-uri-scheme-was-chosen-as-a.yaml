document: rfc-5028
kind: design-rationale
summary: The 'im:' URI scheme was chosen as a protocol-agnostic identifier rather than registering enumservices for specific IM protocols (e.g., SIP or XMPP). This allows ENUM to return a single URI while RFC 3861's discovery mechanism handles protocol negotiation between querying party and target.
section: "2"
topics:
