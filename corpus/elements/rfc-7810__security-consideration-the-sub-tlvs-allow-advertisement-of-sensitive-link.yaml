document: rfc-7810
kind: security-consideration
summary: The sub-TLVs allow advertisement of sensitive link-state information (bandwidth, delay) that operators may not wish to disclose. Additionally, IS-IS TE sub-TLVs sent over insecure links expose the network to man-in-the-middle attacks that could manipulate path selection (e.g., delaying real-time financial data). IS-IS cryptographic authentication per RFC 5304 is recommended as a mitigation.
section: "11"
topics:
    - routing
    - security
