document: rfc-9927
kind: wire-format
summary: 'The EARO format for use in NA messages differs from the NS format in bits 16–23: the NS format carries F and Prefix Length in that field, while the NA format carries a 2-bit reserved ''r'' field and a 6-bit Status field. The second 32-bit word and ROVR field are identical across both formats.'
