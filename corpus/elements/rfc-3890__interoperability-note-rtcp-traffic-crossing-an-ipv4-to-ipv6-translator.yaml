document: rfc-3890
kind: interoperability-note
summary: RTCP traffic crossing an IPv4-to-IPv6 translator may experience up to a 25% increase in bit-rate and up to a 25% longer reporting interval for IPv6 nodes compared to IPv4 nodes, due to larger IPv6 headers. This results in at most 1.75% increase of total session bandwidth and is considered acceptable without complex solutions.
section: "3.4"
topics:
    - realtime
    - rtp
    - ip
