document: rfc-4667
kind: normative-requirement
summary: To ensure interoperability, the mandatory (M) bit settings of existing AVPs used in L2VPN applications should be the same as those specified in RFC 3931. Setting the M-bit of the new AVPs to 1 will impair interoperability.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
