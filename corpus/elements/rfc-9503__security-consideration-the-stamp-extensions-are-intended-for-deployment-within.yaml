document: rfc-9503
kind: security-consideration
summary: The STAMP extensions are intended for deployment within a single network administrative domain. The operator is assumed to have verified the integrity of the Return Path and identity of the far-end Session-Reflector, and authenticated mode with HMAC message integrity protection (per RFC 8762 Section 4.4) applies.
section: "6"
topics:
