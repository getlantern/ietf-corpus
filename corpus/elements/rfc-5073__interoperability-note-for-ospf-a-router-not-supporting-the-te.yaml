document: rfc-5073
kind: interoperability-note
summary: For OSPF, a router not supporting the TE Node Capability Descriptor TLV will silently ignore it as specified in RFC 4970. For IS-IS, a router not supporting the sub-TLV will silently ignore it as specified in RFC 4971. Absence of the TLV means TE capabilities of that LSR are unknown.
section: "6"
topics:
