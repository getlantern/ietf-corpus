document: rfc-9627
kind: interoperability-note
summary: For MRST and MRMT scalability transmission mechanisms, the 'media source' SSRC in the LRR FCI is set to the SSRC of the RTP stream containing the layer indicated by the Current Layer Index (if C=1) or the base encoded stream (if C=0); for MRMT the LRR is sent on the RTP session carrying that stream.
section: "5"
topics:
