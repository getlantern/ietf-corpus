document: rfc-8610
kind: normative-requirement
summary: Registration policy for CDDL Control Operators is 'Specification Required' (Expert Review) for names without an internal dot, and 'IETF Review' for names that include an internal dot. Experts are instructed to facilitate registrations from other SDOs needing field-specific operators.
