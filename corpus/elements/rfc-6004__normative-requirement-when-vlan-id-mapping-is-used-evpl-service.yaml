document: rfc-6004
kind: normative-requirement
summary: When VLAN ID mapping is used (EVPL service not configured for both bundling and VLAN ID preservation), such mapping MUST be requested and signaled based on the explicit label control mechanism defined in RFC 3473 and clarified in RFC 4003. When explicit label control is not used, VLAN IDs MUST be preserved across an LSP.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
