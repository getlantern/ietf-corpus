document: rfc-5893
kind: design-rationale
summary: The RFC 3454 (IDNA2003) Bidi rule required that a RandALCat character be both the first and last character of a string. This made entire languages invalid as IDN labels; for Dhivehi (Thaana script), every word ends with a Nonspacing Mark (NSM), which is not R or AL, so all Dhivehi words were forbidden.
section: "1.2"
topics:
    - dns
