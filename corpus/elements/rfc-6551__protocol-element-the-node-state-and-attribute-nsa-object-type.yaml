document: rfc-6551
kind: protocol-element
summary: The Node State and Attribute (NSA) object (type 1) carries an 8-bit Flags field with 'A' (aggregator capable) and 'O' (overloaded) bits. At most one NSA object may appear as a constraint and one as a metric per DAG Metric Container. Optional TLVs may convey additional node characteristics.
section: "3.1"
