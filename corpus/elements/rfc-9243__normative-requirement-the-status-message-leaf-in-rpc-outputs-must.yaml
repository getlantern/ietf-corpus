document: rfc-9243
kind: normative-requirement
summary: The status message leaf in RPC outputs MUST NOT be null-terminated, as it is a UTF-8-encoded text string for display to an end user. Per BCP 18, if available, a language identifier should be included in output messages.
section: "4.1"
rfc2119_level: MUST NOT
