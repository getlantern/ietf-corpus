document: rfc-5059
kind: normative-requirement
summary: A C-RP MUST NOT send a C-RP-Advertisement message with no group ranges. If the algorithm determines there are no group ranges to advertise for a particular scope zone, no C-RP-Adv message MUST be sent to that BSR.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
