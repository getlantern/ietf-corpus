document: rfc-8979
kind: normative-requirement
summary: NSH-aware SFs MUST ignore Context Headers carrying unknown subscriber identifiers. If validation checks fail on a Subscriber Identifier Context Header, an NSH-aware SF MUST ignore that Context Header.
section: "3"
rfc2119_level: MUST
