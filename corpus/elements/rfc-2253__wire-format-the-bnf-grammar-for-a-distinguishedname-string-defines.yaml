document: rfc-2253
kind: wire-format
summary: The BNF grammar for a distinguishedName string defines it as an optional name built from name-components joined by commas, where each name-component is one or more attributeTypeAndValue entries joined by '+', and attributeValue may be a plain string, a '#'-prefixed hexstring, or (for LDAPv2 compatibility) a QUOTATION-delimited string.
