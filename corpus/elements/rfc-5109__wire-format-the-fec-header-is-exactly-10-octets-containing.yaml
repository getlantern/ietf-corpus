document: rfc-5109
kind: wire-format
summary: 'The FEC header is exactly 10 octets containing: E bit (1), L bit (1), P/X/CC/M/PT recovery fields (14 bits total), SN base (16 bits), TS recovery (32 bits), and length recovery (16 bits). The E bit SHALL be set to 0; the L bit selects 16-bit vs. 48-bit masks.'
section: "7.3"
topics:
