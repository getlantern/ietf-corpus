document: rfc-2366
kind: normative-requirement
summary: A row in marsClientTable, marsTable, or marsMcsTable cannot be made 'active' until all corresponding columns are appropriately configured and the agent has created a corresponding row in the associated statistics table (marsClientStatTable, marsStatTable, or marsMcsStatTable respectively).
