document: rfc-9755
kind: normative-requirement
summary: All servers supporting UTF8=ACCEPT SHOULD accept UTF-8 in mailbox names. Those also supporting the Mailbox International Naming Convention (RFC 3501, Section 5.1.3) MUST accept UTF-8 mailbox names and convert them to the appropriate internal format. Mailbox names MUST comply with Net-Unicode (RFC 5198, Section 2) and MUST NOT contain control characters, delete, line separator (U+2028), or paragraph separator (U+2029).
section: "3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
