document: rfc-5966
kind: security-consideration
summary: Wider use of DNS over TCP exposes servers to higher risk of denial-of-service attacks via connection exhaustion. However, DoS mitigation techniques at the network level have improved substantially since DNS was first designed, and TCP-based DoS attacks against existing DNS infrastructure are not known to be commonplace.
section: "7"
topics:
    - dns
    - tcp
    - security
