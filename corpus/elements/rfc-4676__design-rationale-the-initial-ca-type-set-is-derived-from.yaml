document: rfc-4676
kind: design-rationale
summary: The initial CA type set is derived from NENA standards and designed to accommodate addressing conventions for multiple countries. An IANA registry is established so that additional country-specific or future civic address fields can be defined without revising the RFC.
section: "1"
topics:
