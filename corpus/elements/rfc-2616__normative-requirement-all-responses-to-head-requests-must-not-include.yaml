document: rfc-2616
kind: normative-requirement
summary: All responses to HEAD requests MUST NOT include a message-body. All 1xx (informational), 204 (No Content), and 304 (Not Modified) responses MUST NOT include a message-body, even if entity-header fields are present.
section: "4.3"
rfc2119_level: MUST NOT
topics:
