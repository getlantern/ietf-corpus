document: rfc-7272
kind: protocol-element
summary: The Media Synchronization Application Server (MSAS) collects RTCP XR IDMS reports from Synchronization Clients (SCs) in a group, determines a reference playout point (e.g., the most lagged client), and distributes synchronization settings via RTCP IDMS Settings Packets. The MSAS may be co-located with the RTP sender or implemented as an independent network function.
section: "5.1"
topics:
    - rtp
    - realtime
