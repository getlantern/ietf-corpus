document: rfc-4236
kind: normative-requirement
summary: An un-authoritative OPES processor MUST remove the Content-MD5 header unless it detects the HTTP message was not modified, in which case it MAY leave the header. HTTP intermediaries must not generate Content-MD5 headers per RFC 2616 section 14.15.
section: 3.8.2
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
