document: rfc-1356
kind: normative-requirement
summary: Each system MUST only accept calls for protocols it can process; every Internet system MUST accept the CC encapsulation for IP. A system MUST NOT accept a call and then immediately clear it, as accepted-then-cleared calls may be billed on some networks.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
