document: rfc-3437
kind: normative-requirement
summary: When LCP negotiation is completed by the LNS, a Set-Link-Info (SLI) control message MUST be sent containing the LNS Last Sent LCP Confreq and LNS Last Received LCP Confreq AVPs, carrying the last sent and received LCP packets with respect to the LNS.
section: "2.3"
rfc2119_level: MUST
topics:
    - realtime
    - vpn
