document: rfc-3891
kind: normative-requirement
summary: If the Replaces header field matches an active dialog, the UA MUST verify that the initiator of the new INVITE is authorized to replace the matched dialog, checking equivalence via Digest authentication or S/MIME credentials.
section: "3"
rfc2119_level: MUST
topics:
