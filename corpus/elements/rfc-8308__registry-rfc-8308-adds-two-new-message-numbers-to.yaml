summary: 'RFC 8308 adds two new message numbers to the ''Message Numbers'' registry under SSH Protocol Parameters: 7 (SSH_MSG_EXT_INFO) and 8 (SSH_MSG_NEWCOMPRESS). It also adds ''ext-info-s'' and ''ext-info-c'' to the ''Key Exchange Method Names'' registry.'
