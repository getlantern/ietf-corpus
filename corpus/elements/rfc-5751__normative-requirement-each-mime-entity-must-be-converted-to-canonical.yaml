document: rfc-5751
kind: normative-requirement
summary: Each MIME entity MUST be converted to canonical form before signing, enveloping, or compressing. MIME entities of major type 'text' MUST have line endings canonicalized to <CR><LF> and character sets canonicalized. Charsets like ISO-2022 with multiple representations MUST use their specified canonical form.
section: 3.1.1
rfc2119_level: MUST
topics:
    - email
