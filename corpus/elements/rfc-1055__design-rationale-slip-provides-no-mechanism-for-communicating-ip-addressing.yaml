document: rfc-1055
kind: design-rationale
summary: SLIP provides no mechanism for communicating IP addressing information across the link. Both endpoints must already know each other's IP addresses; in dial-up scenarios the router has no in-band way to inform the dialing host of its assigned address.
section: DEFICIENCIES
extracted_by: claude-sonnet-4-6
