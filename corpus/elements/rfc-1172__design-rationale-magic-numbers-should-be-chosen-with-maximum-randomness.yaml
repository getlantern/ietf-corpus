document: rfc-1172
kind: design-rationale
summary: Magic-Numbers should be chosen with maximum randomness (machine serial numbers, hardware addresses, time-of-day, inter-arrival times of physical events) to ensure uniqueness. If no good source of uniqueness is available, the option should not be enabled because loop-back detection will be unreliable.
section: "2.4"
extracted_by: claude-sonnet-4-6
