summary: STAP-A (type 24) payload consists of one or more single-time aggregation units, each prefixed with a 16-bit unsigned NAL unit size (network byte order) followed by the NAL unit including its type byte. STAP-B (type 25) additionally prepends a 16-bit DON field before the aggregation units.
