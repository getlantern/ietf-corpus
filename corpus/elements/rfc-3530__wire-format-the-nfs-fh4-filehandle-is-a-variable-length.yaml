document: rfc-3530
kind: wire-format
summary: The nfs_fh4 filehandle is a variable-length opaque byte string with a maximum of NFS4_FHSIZE (128) bytes, defined as 'typedef opaque nfs_fh4<NFS4_FHSIZE>'. The stateid4 structure encodes as a uint32_t seqid plus a 12-byte opaque other field (total 16 bytes). Stateids of all-zeros or all-ones are reserved.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
