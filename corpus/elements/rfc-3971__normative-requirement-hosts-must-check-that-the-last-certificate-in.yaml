document: rfc-3971
kind: normative-requirement
summary: Hosts MUST check that the last certificate in the certification path contains an RSA public key (subjectPublicKeyInfo); certificates without an RSA key MUST be disregarded for SEND. The certification path MUST start from the identity of a trust anchor shared by host and router.
section: 6.3.1
rfc2119_level: MUST
topics:
    - security
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
