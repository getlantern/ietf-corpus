document: rfc-3858
kind: design-rationale
summary: 'The document uses partial vs. full state to minimize bandwidth: NOTIFYs typically carry only changed watcher state, and the subscriber reconstructs the full view by merging updates into a local table keyed by watcher ID. A version number enables detection of missed notifications and triggers refresh.'
