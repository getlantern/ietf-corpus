document: rfc-1388
kind: protocol-element
summary: The Subnet Mask field is a 4-byte per-entry value that is ANDed with the IP Address to yield the non-host portion of the address. A value of 0.0.0.0 indicates no subnet mask is included for that entry.
section: "3.4"
