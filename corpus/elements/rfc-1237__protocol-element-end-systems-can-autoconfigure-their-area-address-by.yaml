document: rfc-1237
kind: protocol-element
summary: End systems can autoconfigure their area address by extracting it from a neighboring IS's ISO9542 IS-Hello packets. If the ID portion uses IEEE-style burned-in hardware identifiers, an ES can reconfigure its entire NSAP automatically on topology change; routers still require manual area address reconfiguration.
section: "5.7"
topics:
    - routing
