document: rfc-9487
kind: protocol-element
summary: srhSegmentIPv6ListSection (ElementID 497) is a variable-length octetArray IPFIX IE carrying the raw SRv6 Segment List bytes as defined in RFC 8754 Section 2, without additional IPFIX structuring. The collector must decode the IPv6 addresses according to SR specifications.
