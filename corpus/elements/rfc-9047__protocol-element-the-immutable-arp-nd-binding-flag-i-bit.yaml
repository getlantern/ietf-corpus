document: rfc-9047
kind: protocol-element
summary: The Immutable ARP/ND Binding flag (I, bit 4 of Flags) indicates that the IP->MAC pair is a statically configured ARP/ND entry. When set, the IP address can only be bound to the MAC address specified in the same route, not to any other MAC address received in a route without the I flag.
section: "2"
topics:
