document: rfc-6763
kind: protocol-element
summary: 'Selective Instance Enumeration (subtypes) allows browsing for a narrower set of services using a PTR query for ''<subtype>._sub.<service>.<domain>''. A service advertising with a subtype includes two PTR records: one for the base service type and one for the subtype; both point to the same SRV+TXT pair.'
section: "7.1"
topics:
    - dns
    - zeroconf
