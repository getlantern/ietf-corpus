document: rfc-3289
kind: normative-requirement
summary: For multi-rate token bucket meters, rates in chained diffServMeterTable entries MUST be specified in monotonically increasing order (most-committed to most-excess), passing through diffServMeterFailNext from lower to higher rates.
section: 3.3.2
rfc2119_level: MUST
