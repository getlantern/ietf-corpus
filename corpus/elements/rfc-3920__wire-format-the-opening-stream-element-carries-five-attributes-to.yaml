document: rfc-3920
kind: wire-format
summary: 'The opening <stream> element carries five attributes: ''to'' (receiver hostname, set by initiator), ''from'' (receiver hostname, set by receiver), ''id'' (unique session key, set by receiver), ''xml:lang'' (default natural language), and ''version'' (e.g., ''1.0'' signals XMPP 1.0 stream feature support).'
section: "4.4"
