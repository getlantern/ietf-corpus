document: rfc-8416
kind: protocol-element
summary: 'A Validated ROA Prefix Filter (''Prefix Filter'') is a JSON object that MUST contain either a ''prefix'' member (IPv4 or IPv6 prefix string) and/or an ''asn'' member (number), with an optional ''comment'' string. Three match cases are defined: prefix-only (covers VRP prefix), ASN-only, or both prefix and ASN.'
section: 3.3.1
topics:
    - json
    - bgp
    - routing
