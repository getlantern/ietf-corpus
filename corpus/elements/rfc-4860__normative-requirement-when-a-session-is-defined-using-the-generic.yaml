document: rfc-4860
kind: normative-requirement
summary: When a session is defined using the GENERIC-AGGREGATE SESSION object, only the RSVP-AGG RSVP-AGGREGATE SENDER_TEMPLATE may be used. A violation in a PATH message received by a router MUST be treated as a message formatting error.
