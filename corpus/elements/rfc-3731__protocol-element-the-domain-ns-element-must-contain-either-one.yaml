document: rfc-3731
kind: protocol-element
summary: The <domain:ns> element MUST contain either one or more <domain:hostObj> elements (fully qualified names of known host objects) or one or more <domain:hostAttr> elements (each with <domain:hostName> and optional <domain:hostAddr> children with optional 'ip' attribute defaulting to 'v4').
