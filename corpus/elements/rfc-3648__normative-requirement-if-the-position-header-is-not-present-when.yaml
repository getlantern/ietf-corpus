document: rfc-3648
kind: normative-requirement
summary: If the Position header is not present when adding a new member to an ordered collection, the server MUST append the new member to the end of the ordering. If the request replaces an existing resource without a Position header, the server MUST preserve the resource's present ordering position.
section: "6.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
