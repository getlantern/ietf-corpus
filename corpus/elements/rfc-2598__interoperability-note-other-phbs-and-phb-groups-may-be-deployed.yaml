document: rfc-2598
kind: interoperability-note
summary: Other PHBs and PHB groups may be deployed in the same DS node or domain with the EF PHB as long as the EF minimum departure rate requirement is met. A priority-queue EF implementation must not preempt other traffic for more than a packet time at the configured rate, achievable via per-queue rate policers.
section: "2.6"
topics:
    - diffserv
    - qos
