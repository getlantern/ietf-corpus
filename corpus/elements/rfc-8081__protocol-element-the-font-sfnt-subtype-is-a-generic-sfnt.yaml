document: rfc-8081
kind: protocol-element
summary: 'The font/sfnt subtype is a generic SFNT font type with optional parameters: ''outlines'' (comma-separated subset of TTF, CFF, SVG) indicating glyph outline format, and ''layout'' (comma-separated subset of OTL, AAT, SIL) indicating advanced text layout support. The existing ''application/font-sfnt'' registration is deprecated in its favor.'
section: 4.4.1
topics:
    - registry
