document: rfc-7469
kind: design-rationale
summary: A max-age value around 60 days (5,184,000 seconds) is suggested as a balance between providing a narrow window of protection for infrequent visitors (low max-age) and risking UA inability to validate if pinned keys diverge (high max-age). No single ideal value exists for all use cases.
section: "4.1"
topics:
    - security
    - http
