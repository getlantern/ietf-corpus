document: rfc-7377
kind: normative-requirement
summary: If source options include or default to 'selected', the IMAP session MUST be in 'selected' state. If source options specify other mailboxes and not 'selected', the session MUST be in 'selected' or 'authenticated' state; otherwise the ESEARCH command MUST return a BAD result.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
