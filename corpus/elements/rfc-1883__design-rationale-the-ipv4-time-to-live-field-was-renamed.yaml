document: rfc-1883
kind: design-rationale
summary: The IPv4 'Time to Live' field was renamed 'Hop Limit' in IPv6 because IPv6 nodes are not required to enforce maximum packet lifetime. In practice, very few IPv4 implementations conformed to the lifetime enforcement requirement anyway.
section: "8.2"
topics:
    - ip
