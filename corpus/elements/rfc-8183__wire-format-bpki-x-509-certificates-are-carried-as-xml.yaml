document: rfc-8183
kind: wire-format
summary: BPKI X.509 certificates are carried as XML text nodes containing the Base64 encoding (RFC 4648 Section 4, line breaks permitted but not required) of the DER representation of the certificate. The schema limits this to maxLength=512000 base64Binary characters.
