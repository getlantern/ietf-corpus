document: rfc-9291
kind: protocol-element
summary: For BGP-signaled L2VPNs, the L2VPN-BGP subtree provides CE range, pseudowire encapsulation type (drawn from 'iana-bgp-l2-encaps'), and VPLS Edge ID/range. The EVPN-BGP subtree adds service interface type (VLAN-based, VLAN-aware, VLAN bundle), MAC learning mode, ingress/P2MP replication, ARP/ND proxy with mobility threshold, BUM management, and PBB backbone source MAC.
section: 7.5.2.1
topics:
