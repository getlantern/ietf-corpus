document: rfc-1541
kind: normative-requirement
summary: Vendors defining 'vendor specific information' options MUST document those options in the DHCP Options document format, MUST use defined or well-defined data types, and MUST choose options that can be readily encoded in configuration files for interoperability across vendors.
