document: rfc-6333
kind: interoperability-note
summary: The AFTR performs NAT-44 and inherits NAT limitations regarding Application Level Gateways (ALGs). Some protocols (e.g., Active FTP) require ALGs to traverse NAT, but the AFTR is a shared device and cannot implement every current and future ALG.
section: "8.3"
topics:
    - nat
    - v6ops
