document: rfc-7788
kind: normative-requirement
summary: For IPv6 prefix assignment, whenever at least one available prefix of length 64 exists, a /64 MUST be selected unless configured otherwise. For IPv4 delegated prefixes, a prefix of length 24 SHOULD be preferred.
section: 6.3.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
