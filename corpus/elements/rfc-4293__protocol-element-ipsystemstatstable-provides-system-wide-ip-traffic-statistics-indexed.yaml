document: rfc-4293
kind: protocol-element
summary: ipSystemStatsTable provides system-wide IP traffic statistics indexed by InetVersion (IPv4 or IPv6). It contains Counter32/Counter64 pairs for received, forwarded, reassembled, fragmented, discarded, multicast, and broadcast datagrams and octets, plus discontinuity and refresh-rate metadata.
