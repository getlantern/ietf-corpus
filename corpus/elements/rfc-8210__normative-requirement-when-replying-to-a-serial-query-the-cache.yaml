document: rfc-8210
kind: normative-requirement
summary: When replying to a Serial Query, the cache MUST return the minimum set of changes needed to bring the router into sync, merging multiple changes for any prefix or router key into at most one withdrawal followed by at most one announcement; if all changes cancel out, the prefix or key is omitted entirely.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
