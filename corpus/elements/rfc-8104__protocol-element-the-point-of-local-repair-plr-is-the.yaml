document: rfc-8104
kind: protocol-element
summary: The Point of Local Repair (PLR) is the router upstream adjacent to a failure. In egress AC protection, the PLR is the primary PE itself; in egress PE node protection, the PLR is the penultimate hop router of the transport tunnel; in S-PE node protection, the PLR is the penultimate hop of the primary PW segment's transport tunnel.
section: "4.2"
topics:
    - mpls
    - routing
