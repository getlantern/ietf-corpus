document: rfc-1793
kind: normative-requirement
summary: A router MUST set the DC-bit in the Options field of all LSAs it originates if it implements Section 2 of this memo, regardless of LSA type and regardless of whether it implements demand circuit endpoint functionality.
section: "2.1"
rfc2119_level: MUST
topics:
