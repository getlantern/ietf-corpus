document: rfc-7232
kind: protocol-element
summary: 'The ''If-None-Match'' header field makes a request conditional on the recipient not having any current representation of the target resource (when ''*'') or having a selected representation with an entity-tag not matching any listed tag. Syntax: If-None-Match = ''*'' / 1#entity-tag.'
section: "3.2"
topics:
    - http
