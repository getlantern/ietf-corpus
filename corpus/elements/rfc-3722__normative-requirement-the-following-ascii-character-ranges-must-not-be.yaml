document: rfc-3722
kind: normative-requirement
summary: 'The following ASCII character ranges MUST NOT be used in iSCSI names: U+0000–U+002C, U+002F, U+003B–U+0040, U+005B–U+0060, U+007B–U+007F. The dash (U+002D), dot (U+002E), and colon (U+003A) are not prohibited.'
section: "6.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
