document: rfc-3646
kind: security-consideration
summary: An intruder DHCP server may use the Domain Search List option to cause clients to search through invalid domains for incompletely specified names, enabling DNS spoofing. DNSSEC does not avert this attack because records in the invalid domains may be legitimately signed.
section: "6"
topics:
    - dns
    - security
