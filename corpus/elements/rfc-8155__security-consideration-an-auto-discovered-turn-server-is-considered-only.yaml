document: rfc-8155
kind: security-consideration
summary: An auto-discovered TURN server is considered only as trusted as the path between client and server. For sessions with strict privacy requirements, clients must define acceptable trust criteria (trusted servers, networks, or domains); any TURN server outside those criteria MUST NOT be used for privacy-sensitive communication.
section: "9"
topics:
    - nat
    - security
    - privacy
