document: rfc-9347
kind: normative-requirement
summary: In congestion-controlled mode, congestion information MUST be sent from the receiver and from the sender at least once per RTT; not receiving this information over multiple consecutive RTT intervals MUST be treated as a congestion event causing the sender to lower its rate.
section: 2.4.2
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - congestion
