document: rfc-5019
kind: protocol-element
summary: It is RECOMMENDED that the OCSP responder's certificate contain the id-pkix-ocsp-nocheck extension, and that neither AIA nor cRLDistributionPoints extensions be included. Responders SHOULD use byKey ResponderID choice to reduce response size; the responder's signing certificate SHOULD be short-lived and renewed regularly.
section: 2.2.2
topics:
    - pkix
    - security
    - crypto
