document: rfc-6350
kind: protocol-element
summary: The ALTID parameter tags property instances as alternative representations of the same logical property (e.g., translations). Two instances are alternatives if and only if their property names and ALTID values are identical. Property instances sharing the same ALTID count as 1 toward cardinality.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
