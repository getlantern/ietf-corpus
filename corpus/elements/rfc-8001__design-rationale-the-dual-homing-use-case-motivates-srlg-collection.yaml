document: rfc-8001
kind: design-rationale
summary: 'The dual-homing use case motivates SRLG collection: when CE1 has an established LSP1 via PE1, CE1 can collect LSP1''s SRLGs and pass them as exclusion constraints (via XRO/EXRS per RFC 4874) to PE2 when requesting a diverse LSP2, solving the diversity problem across a provider network without exposing provider topology.'
section: "1.1"
topics:
