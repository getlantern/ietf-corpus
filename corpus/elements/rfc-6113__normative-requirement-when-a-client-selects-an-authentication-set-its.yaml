document: rfc-6113
kind: normative-requirement
summary: When a client selects an authentication set, its first AS-REQ MUST contain a PA-AUTH-SET-SELECTED (padata type 135) element carrying the exact octet encoding of the PA-AUTHENTICATION-SET received from the KDC to allow bitwise comparison. PA-AUTH-SET-SELECTED MUST appear before any padata from the authentication set in the padata sequence.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
