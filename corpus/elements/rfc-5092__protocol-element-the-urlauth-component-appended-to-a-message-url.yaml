document: rfc-5092
kind: protocol-element
summary: The URLAUTH component appended to a message URL conveys authorization to access the addressed data. It contains an authorized access identifier (<access>), an authorization mechanism name (<mech>), and an authorization token (<token>) of at least 128 bits, represented as at least 32 hex digits.
section: 6.1.1
topics:
    - email
    - security
