summary: 'Row addition via SNMP Set-PDU permits three fully conformant agent behaviors: (1) reject with noSuchName, (2) create new instances with supplied values returning badValue on type/value mismatch, or (3) create supplied instances and additionally create supplemental instances at agent discretion to complete a conceptual row.'
