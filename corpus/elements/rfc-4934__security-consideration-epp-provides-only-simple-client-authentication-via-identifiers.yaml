document: rfc-4934
kind: security-consideration
summary: EPP provides only simple client authentication via identifiers and plain text passwords; a passive attack is sufficient to recover credentials. Protection against most common attacks MUST be provided by TLS, which is mandatory for all EPP-over-TCP deployments.
section: "8"
topics:
    - security
    - tls
