document: rfc-5875
kind: normative-requirement
summary: Notifiers MUST be aware of XCAP Default Document Namespaces for Application Usages when they locate unprefixed qualified XCAP elements. Namespace prefixes of XCAP Node Selectors in SUBSCRIBE bodies MUST be properly resolved to namespace URIs per RFC 4825.
section: "4.6"
rfc2119_level: MUST
topics:
