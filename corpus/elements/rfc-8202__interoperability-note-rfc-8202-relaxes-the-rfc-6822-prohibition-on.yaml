document: rfc-8202
kind: interoperability-note
summary: 'RFC 8202 relaxes the RFC 6822 prohibition on using RFC 5120 MT within a non-zero instance: MT per RFC 5120 is now permitted when ITID #0 is the sole ITID of the instance. This change is not backwards compatible with strict RFC 6822 implementations, though all known implementations are compatible.'
section: A
topics:
