summary: 'IANA created the ''Layer2 Info Extended Community Control Flags Bit Vector'' registry under bgp-extended-communities. Initial entries: T (send flow label, this document), R (receive flow label, this document), C (Control Word presence, RFC 4761), S (sequenced delivery, RFC 4761). Remaining bits are unassigned and MUST be zero on send, ignored on receive.'
