document: rfc-3039
kind: design-rationale
summary: Biometric information is stored as a cryptographic hash rather than raw biometric data. The extension MAY include a URI pointing to the actual data, but the hash serves authentication of biometric information. Biometric types are limited to those suitable for human verification (picture, handwritten-signature).
section: 3.2.4
topics:
    - pkix
    - security
    - privacy
