document: rfc-8627
kind: design-rationale
summary: Two FEC header variants (flexible mask vs. fixed L/D) are provided because the mask approach is inefficient or impossible to signal for large numbers of source packets (beyond 110), while the fixed L/D approach supports up to 255 rows and columns but cannot represent arbitrary protection patterns.
