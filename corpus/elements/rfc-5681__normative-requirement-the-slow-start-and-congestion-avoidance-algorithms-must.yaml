document: rfc-5681
kind: normative-requirement
summary: The slow start and congestion avoidance algorithms MUST be used by a TCP sender to control the amount of outstanding data injected into the network. A TCP MUST NOT be more aggressive than these algorithms allow.
section: "3"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
