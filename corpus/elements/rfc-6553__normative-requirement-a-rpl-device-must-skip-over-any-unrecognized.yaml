document: rfc-6553
kind: normative-requirement
summary: A RPL device MUST skip over any unrecognized sub-TLVs and attempt to process any additional sub-TLVs that may appear after them. The action taken by any sub-TLV MUST be specified by the RFC of the protocol that defines it.
section: "3"
rfc2119_level: MUST
topics:
    - routing
