document: rfc-3945
kind: security-consideration
summary: 'GMPLS control plane security relies on the security mechanisms of the underlying protocols: RSVP-TE, CR-LDP, OSPF-TE, and IS-IS-TE. Because the GMPLS control plane is separated from the data plane and may use out-of-band control channels, unauthorized access to control channels could allow disruption of LSPs, unauthorized resource reservation, or network topology disclosure without affecting the data plane directly.'
section: "13"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
