document: rfc-4703
kind: normative-requirement
summary: Sites that wish to permit a single FQDN to contain both A and AAAA RRs MUST use DHCPv4 clients and servers that support DUID-based client identifiers so that the same DUID is used in computing the DHCID RR RDATA by both DHCPv4 and DHCPv6.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
