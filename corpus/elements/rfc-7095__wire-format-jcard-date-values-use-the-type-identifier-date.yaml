document: rfc-7095
kind: wire-format
summary: jCard date values use the type identifier "date" and represent dates in ISO 8601 extended format (e.g., "1985-04-12" instead of vCard's "19850412"). Reduced accuracy, truncated, and expanded representations follow RFC 6350 restrictions; the basic format MUST be used when the extended format is not applicable.
section: 3.5.3
