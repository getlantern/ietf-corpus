document: rfc-9244
kind: protocol-element
summary: The normal traffic baseline ('baseline') conveys percentile values of total traffic normal patterns per target, optionally broken down by transport protocol or port number. It also includes 'total-connection-capacity' with limits on simultaneous connections, embryonic connections, connection rates, request rates, and partial requests — all useful for detecting resource-exhaustion DDoS attacks.
section: "7.3"
topics:
