document: rfc-7956
kind: security-consideration
summary: Selecting tenant Labels and Tenant IDs in a pseudorandom fashion (per RFC 4086) makes it harder for an adversary to guess an in-use label or ID. Particularly sensitive data should be encrypted end-to-end between source and destination ES.
