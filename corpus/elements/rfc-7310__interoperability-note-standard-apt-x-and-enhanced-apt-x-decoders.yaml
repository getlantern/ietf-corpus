document: rfc-7310
kind: interoperability-note
summary: Standard apt-X and Enhanced apt-X decoders that have not been set up with the correct embedded autosync, auxiliary data, and stereo-pairing information will play out PCM samples with a loss of decoding quality. In the case of Standard apt-X, the quality loss can be significant.
