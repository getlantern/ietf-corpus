document: rfc-3033
kind: interoperability-note
summary: The Generic Identifier is designed for transfer of identifiers between c-planes, while User-to-user Signaling is designed for transfer of user data via c-planes. Unlike the Generic Identifier, User-to-user Signaling supports interworking with the user-user IE in Q.931 N-ISDN signaling. The ATM network may check the contents of Generic Identifier IEs but does not check User-user IE contents.
section: "3.2"
topics:
    - ip
