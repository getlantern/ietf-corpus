document: rfc-3339
kind: protocol-element
summary: 'The date-time format defines a timestamp as an ISO 8601 profile with mandatory fields: four-digit year, two-digit month, two-digit day, two-digit hour, two-digit minute, two-digit second, optional fractional seconds, and a mandatory UTC offset or ''Z''.'
section: "5.6"
