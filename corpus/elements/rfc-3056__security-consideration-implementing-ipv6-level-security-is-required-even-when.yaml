document: rfc-3056
kind: security-consideration
summary: Implementing IPv6-level security is required even when IPv4 security is available, because IPv4 security does not protect IPv6 traffic once it leaves the 6to4 domain; conversely, redundant dual-layer encryption should be avoided for efficiency.
