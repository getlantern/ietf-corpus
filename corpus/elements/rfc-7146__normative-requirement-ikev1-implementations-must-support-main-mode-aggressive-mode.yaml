document: rfc-7146
kind: normative-requirement
summary: IKEv1 implementations MUST support Main Mode; Aggressive Mode SHOULD be supported. Main Mode with pre-shared key authentication SHOULD NOT be used when either initiator or target uses dynamically assigned IP addresses, due to man-in-the-middle vulnerability from group pre-shared keys.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
