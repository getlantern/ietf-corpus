document: rfc-1377
kind: interoperability-note
summary: The OSI Connection-Oriented Network Protocol (ISO 8208, effectively X.25 Packet Layer) is intended to run over a reliable data link such as IEEE 802.2 type II or LAPB, and therefore the unreliable data link service provided by PPP is not appropriate for use with ISO 8208.
section: "1.1"
topics:
    - ip
    - routing
