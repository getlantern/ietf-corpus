document: rfc-2163
kind: design-rationale
summary: The X.400 name space is anchored under national ISO country top-level domains (via X42D.cc) rather than a new global root branch, because X.400 is inherently country-oriented and lacks an international root concept. This moves coordination to the national level where it is more tractable and aligns with the Internet regionalization process.
section: "3"
topics:
