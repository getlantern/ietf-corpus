document: rfc-5583
kind: protocol-element
summary: An Operation Point is, in layered coding, the subset of a layered Media Bitstream that includes all Media Partitions required for reconstruction at a certain quality level without any extraneous partitions. In MDC coding, it is a subset of an MDC Media Bitstream compliant with the MDC coding standard.
