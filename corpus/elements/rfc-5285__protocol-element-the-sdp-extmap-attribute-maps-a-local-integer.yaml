document: rfc-5285
kind: protocol-element
summary: 'The SDP extmap attribute maps a local integer ID to an extension URI with an optional direction qualifier: ''a=extmap:<value>["/"<direction>] <URI> <extensionattributes>''. Direction is one of sendonly, recvonly, sendrecv, or inactive, and inherits from the stream direction when omitted.'
