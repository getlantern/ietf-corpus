document: rfc-3008
kind: protocol-element
summary: A SIG record is either a 'data SIG' covering an RRset (demonstrating its authenticity and integrity) or a SIG(0) covering a message for transaction security. Multiple SIG records may cover the same RRset; each must be validated independently. SIGs not bound to any RRset are considered immaterial.
