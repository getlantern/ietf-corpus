document: rfc-5488
kind: interoperability-note
summary: The NEMO MIB depends on MOBILEIPV6-MIB (RFC 4295) via AUGMENTS on mip6MnBLEntry and mip6BindingCacheEntry, and requires the IF-MIB ifTable. Compliance statements mandate support for global IPv6 addresses (InetAddressType ipv6(2), InetAddress SIZE(16)) for all home address index objects.
section: "3"
topics:
