document: rfc-4566
kind: protocol-element
summary: The directional attributes `a=sendrecv`, `a=sendonly`, `a=recvonly`, and `a=inactive` control media stream direction. If none is present, `sendrecv` is the default for non-broadcast/H332 sessions. RTP-based systems in recvonly or inactive mode SHOULD still send RTCP.
