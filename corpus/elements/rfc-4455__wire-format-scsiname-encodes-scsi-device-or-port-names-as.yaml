document: rfc-4455
kind: wire-format
summary: ScsiName encodes SCSI device or port names as OCTET STRING of SIZE(0..262), with format transport-dependent per SAM-2 Tables A.4 and A.5. Each object using ScsiName must specify whether it refers to a port, a device, or conditionally either.
