document: rfc-5864
kind: normative-requirement
summary: The <proto> field in the SRV label MUST be 'udp' for the current AFS protocol, which uses Rx over UDP. Other values may be used for future revisions supporting other protocols such as Rx over TCP.
section: "4"
rfc2119_level: MUST
topics:
