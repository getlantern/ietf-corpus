document: rfc-7363
kind: normative-requirement
summary: When self-tuning mechanisms are used, each peer MUST NOT send periodic Update requests to peers other than its first predecessor and first successor on the Chord ring, to avoid excessive traffic in large-scale overlays.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - routing
