document: rfc-8984
kind: protocol-element
summary: 'The recurrenceOverrides property maps LocalDateTime keys to PatchObjects. If a key does not match the recurrence rule output it is treated as an additional occurrence (RDATE equivalent). Setting ''excluded: true'' in a patch omits the occurrence (EXDATE equivalent); such a patch MUST NOT modify any other property.'
section: 4.3.5
topics:
    - json
