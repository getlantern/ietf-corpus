document: rfc-2819
kind: protocol-element
summary: The alarmTable provides threshold monitoring with fields for alarmInterval (seconds), alarmVariable (OID to any INTEGER-typed object), alarmSampleType (absoluteValue or deltaValue), alarmRisingThreshold, alarmFallingThreshold, alarmStartupAlarm (risingAlarm, fallingAlarm, or risingOrFallingAlarm), and event index references for notifications.
