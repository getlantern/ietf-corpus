document: rfc-6581
kind: normative-requirement
summary: The responder MUST set its ORD at most to the initiator IRD. The responder MAY reject the connection if the initiator IRD is insufficient for the ULP-required ORD; in that case the TERM message MUST contain Layer 2, Error Type 0, Error Code 6.
section: "9.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
