document: rfc-6514
kind: normative-requirement
summary: An ASBR MUST be auto-configured with an ASBR Import RT whose Global Administrator field equals the IP address in the Next Hop of all Inter-AS I-PMSI A-D and S-PMSI A-D routes advertised by the ASBR, and whose Local Administrator field MUST be set to 0.
section: "9.2"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
