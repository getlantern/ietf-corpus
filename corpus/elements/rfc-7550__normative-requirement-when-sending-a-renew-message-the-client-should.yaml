document: rfc-7550
kind: normative-requirement
summary: When sending a Renew message, the client SHOULD include IA options for existing bindings as well as IA options for all desired bindings it has been unable to obtain. An IA option for a desired-but-unobtained binding MUST NOT contain any addresses but MAY contain an IA Address option with IPv6 address set to 0 as a lifetime hint.
section: 4.4.1
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
