document: rfc-822
kind: wire-format
summary: An addr-spec is encoded as 'local-part "@" domain', where local-part is one or more dot-separated words and domain is a sequence of dot-separated sub-domains. The local-part is case-preserved and treated as uninterpreted by intermediate mail systems.
section: "6.1"
topics:
    - email
