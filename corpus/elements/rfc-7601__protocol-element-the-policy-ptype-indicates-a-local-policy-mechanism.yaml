document: rfc-7601
kind: protocol-element
summary: The 'policy' ptype indicates a local policy mechanism was applied that augments or overrides the result from the authentication mechanism. The property and value identify the local policy applied and its result, using arbitrary names selected by the ADMD. For example, a DKIM 'pass' could be overridden to 'fail' with 'policy.dkim-rules=unsigned-subject'.
section: "2.4"
topics:
