document: rfc-5818
kind: protocol-element
summary: 'The ConfirmDataChannelStatusNack message is sent when a node receives ConfirmDataChannelStatus but cannot support or begin the procedure. It contains a Common Header, optional LOCAL_LINK_ID, MESSAGE_ID_ACK, and an ERROR_CODE. Two error codes are defined: 0x01 (procedure not supported) and 0x02 (unwilling to confirm).'
section: 5.1.3
topics:
    - routing
