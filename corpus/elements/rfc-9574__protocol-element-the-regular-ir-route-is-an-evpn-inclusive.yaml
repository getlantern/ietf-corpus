document: rfc-9574
kind: protocol-element
summary: The Regular-IR route is an EVPN Inclusive Multicast Ethernet Tag route using ingress replication tunnel type (0x06). When advertised by an AR-LEAF, the T field MUST be set to 10 (AR-LEAF). The Next Hop is the IR-IP address. An AR-REPLICATOR MUST NOT generate a Regular-IR route if it has no local ACs; if advertised, T MUST be set to 0.
section: "4"
topics:
    - mpls
    - routing
