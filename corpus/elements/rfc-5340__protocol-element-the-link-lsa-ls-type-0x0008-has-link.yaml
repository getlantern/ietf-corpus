document: rfc-5340
kind: protocol-element
summary: 'The Link-LSA (LS type 0x0008) has link-local flooding scope and serves three purposes: (1) provides the router''s link-local address to all routers on the link for next-hop calculation, (2) informs neighbors of IPv6 prefixes to associate with the link, and (3) advertises Options bits for inclusion in the link''s network-LSA. Link-LSAs SHOULD NOT be originated for virtual links.'
section: 4.4.3.8
topics:
    - routing
    - ip
