document: rfc-1323
kind: protocol-element
summary: 'Two per-connection state variables are shared by RTTM and PAWS: TS.Recent holds the timestamp to echo in TSecr, and Last.ACK.sent holds the ACK field from the last sent segment. TS.Recent is updated from an incoming segment when SEG.SEQ <= Last.ACK.sent.'
