document: rfc-7386
kind: design-rationale
summary: MergePatch operates at the level of data items, not textual representation. The operation is not required to preserve whitespace, member ordering, or number precision beyond the target implementation's capabilities. This simplifies implementation by decoupling patch semantics from serialization details.
