document: rfc-3418
kind: protocol-element
summary: sysORTable is a conceptual table listing the capabilities of the local SNMP command responder application with respect to MIB modules; each row (SysOREntry) contains sysORIndex, sysORID (an OID identifying a capabilities statement), sysORDescr, and sysORUpTime (the sysUpTime when the row was instantiated). Entities with dynamically configurable MIB support have a dynamically varying row count.
section: "2"
