document: rfc-6572
kind: privacy-consideration
summary: Per Section 8, privacy threats arise from sending MN-specific information (NAI, Interface ID, link-layer address) across the MAG-to-AAA and LMA-to-AAA interfaces; implementations SHOULD minimize inclusion of such attributes and give special attention when identity hiding is required.
section: "8"
topics:
