document: rfc-5734
kind: interoperability-note
summary: The wildcard character '*' (ASCII 42) is permitted in subjectAltName values of type dNSName only as the left-most DNS label, matching any single left-most label (e.g., *.example.com matches a.example.com but not a.b.example.com or example.com).
section: "9"
topics:
