document: rfc-7865
kind: protocol-element
summary: 'The Media Stream class (''stream'' element) has attributes: label (referencing SDP ''a=label'' identifying the m-line in the RS SDP), content-type (from SDP ''a=content'' attribute per RFC 4796), stream_id (base64 UUID), and session_id associating the stream to a CS. The metadata can include streams not delivered to the SRS.'
section: "6.7"
topics:
