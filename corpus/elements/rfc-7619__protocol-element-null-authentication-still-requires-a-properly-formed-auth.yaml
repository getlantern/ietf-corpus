document: rfc-7619
kind: protocol-element
summary: NULL authentication still requires a properly formed AUTH payload in the IKE_AUTH exchange. The AUTH payload content is computed using pre-shared secret authentication syntax (RFC 7296 Section 2.15), with SK_pi used as the shared secret for the initiator and SK_pr for the responder. This is identical to the non-key-generating EAP method.
section: "2.1"
topics:
    - ipsec
    - crypto
