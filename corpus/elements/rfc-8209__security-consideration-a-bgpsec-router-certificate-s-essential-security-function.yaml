document: rfc-8209
kind: security-consideration
summary: A BGPsec Router Certificate's essential security function is the secure binding of one or more ASNs to a public key, consistent with the RPKI allocation/assignment hierarchy. It validates signatures on BGPsec Signature Segment origination of signed path segments per RFC 8205.
