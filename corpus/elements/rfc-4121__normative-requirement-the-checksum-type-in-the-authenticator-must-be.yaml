document: rfc-4121
kind: normative-requirement
summary: The checksum type in the authenticator MUST be 0x8003. When delegation is used, the KRB_CRED message's EncryptedData field MUST be encrypted in the session key of the ticket used to authenticate the context, and the forwarded TGT SHOULD have its forwardable flag set.
section: 4.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
