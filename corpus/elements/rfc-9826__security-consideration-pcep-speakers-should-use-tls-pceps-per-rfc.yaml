document: rfc-9826
kind: security-consideration
summary: PCEP speakers should use TLS (PCEPS per RFC 8253) for transport security, configured via the auth-tls choice; the StartTLS procedure completes identity verification before the PCEP session is established. A single PCEP speaker may act as both TLS client (PCC role) and TLS server (PCE role) depending on session context.
section: "7.1"
topics:
    - tls
    - security
    - routing
