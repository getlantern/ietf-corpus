document: rfc-6146
kind: protocol-element
summary: NAT64 maintains three Session Tables — for TCP, UDP, and ICMP Queries. Each TCP/UDP Session Table Entry (STE) stores source and destination IPv6 transport addresses, source and destination IPv4 transport addresses, and a lifetime timer. The ICMP Query STE stores the full 3-tuple in both address families plus the ICMP Identifier mapping.
section: "3.2"
topics:
