document: rfc-4194
kind: interoperability-note
summary: The 'blocks' attribute in the Dump tag is optional to accommodate streaming scenarios where the total block count is not known in advance. If present, implementers should verify it; if incorrect, behavior is implementation-defined.
section: "4.1"
