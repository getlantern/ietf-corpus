document: rfc-977
kind: protocol-element
summary: 'The ARTICLE command has two forms: ARTICLE <message-id> retrieves by message-id (does not alter the current article pointer), and ARTICLE [nnn] retrieves by number within the current newsgroup (sets the current article pointer). Related commands HEAD, BODY, and STAT return only headers, only body, or no text respectively.'
section: "3.1"
topics:
