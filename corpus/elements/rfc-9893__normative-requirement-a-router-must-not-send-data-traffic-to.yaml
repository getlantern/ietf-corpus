document: rfc-9893
kind: normative-requirement
summary: A router MUST NOT send data traffic to a modem for forwarding if there is no matching classifier. If a matching classifier is found, a router MUST NOT send data traffic to a modem when there are no credits available in the associated credit window.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - qos
    - congestion
