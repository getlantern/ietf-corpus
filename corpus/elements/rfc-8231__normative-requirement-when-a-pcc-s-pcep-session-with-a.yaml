document: rfc-8231
kind: normative-requirement
summary: When a PCC's PCEP session with a PCE terminates unexpectedly, the PCC MUST wait the Redelegation Timeout Interval before revoking LSP delegations and attempting redelegation to an alternate PCE. If the session is re-established before the timer expires, delegations remain intact.
section: 5.7.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
