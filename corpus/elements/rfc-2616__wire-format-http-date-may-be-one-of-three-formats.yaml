document: rfc-2616
kind: wire-format
summary: 'HTTP-date may be one of three formats: RFC 1123 (''Sun, 06 Nov 1994 08:49:37 GMT''), RFC 850 (''Sunday, 06-Nov-94 08:49:37 GMT''), or ANSI C asctime (''Sun Nov  6 08:49:37 1994''). All three MUST be accepted; only RFC 1123 MUST be generated. All dates MUST be in GMT.'
section: 3.3.1
