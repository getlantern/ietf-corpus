document: rfc-2244
kind: normative-requirement
summary: If a server implements an inactivity auto-logout timer, that timer MUST be of at least 30 minutes duration, and receipt of ANY command from the client during that interval MUST suffice to reset it.
section: 2.4.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
