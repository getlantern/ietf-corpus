summary: 'The ''tunnel'' element is defined by a DTD with optional attributes: ''fqdn'' (FQDN string), ''ip4'' (dotted-quad), ''ip6'' (RFC 2373 text), ''port'' (1–65535 decimal), ''srv'' (underscore-prefixed pair), ''profile'' (URI), and ''endpoint'' (any string). It may contain a single optional nested ''tunnel'' child element.'
