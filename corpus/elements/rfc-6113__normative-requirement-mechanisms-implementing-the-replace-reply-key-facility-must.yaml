document: rfc-6113
kind: normative-requirement
summary: Mechanisms implementing the Replace Reply Key facility MUST mark the reply key as replaced in the pre-authentication state and MUST either provide a mechanism to verify the KDC reply or mark the reply as unverified. They SHOULD NOT be used if a previous mechanism has already used the reply key.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
