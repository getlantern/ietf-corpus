document: rfc-8466
kind: protocol-element
summary: 'The vpn-svc-type parameter supports six L2VPN service flavors: point-to-point LDP/L2TP VPWS, EVPN VPWS (RFC 8214), multipoint VPLS, rooted-multipoint VPLS, BGP MPLS-based EVPN (RFC 7432), and multipoint EVPN VPWS. Additional types can be added via YANG augmentation.'
section: 5.2.1
topics:
