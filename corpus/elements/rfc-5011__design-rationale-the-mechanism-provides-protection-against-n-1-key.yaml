document: rfc-5011
kind: design-rationale
summary: The mechanism provides protection against N-1 key compromises among N keys at a trust point. If all trust-anchor keys at a trust point are simultaneously compromised, a manual or out-of-band update of all resolvers is required; automated recovery is not possible in that scenario.
section: "8.2"
topics:
    - dns
    - security
