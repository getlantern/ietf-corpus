document: rfc-8250
kind: normative-requirement
summary: An implementation SHOULD require an explicit restart of PDM monitoring after a certain time period (e.g., after 1 hour) to ensure PDM is not accidentally left on after debugging. Additionally, user 'Consent to be Measured' SHOULD be a prerequisite for using PDM.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - ip
    - measurement
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
