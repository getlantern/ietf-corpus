document: rfc-2305
kind: normative-requirement
summary: Data transfer MAY be achieved using standard Internet mail transfer mechanisms. The format of addresses MUST conform to the RFC 821 addr-spec and RFC 822 mailbox standards.
section: 2.1.1
rfc2119_level: MUST
