document: rfc-5961
kind: normative-requirement
summary: An implementation SHOULD include an ACK throttling mechanism. The values for the time window and maximum challenge ACK count (e.g., no more than 10 challenge ACKs per 5-second window) SHOULD be tunable by the system administrator.
section: "7"
rfc2119_level: SHOULD
topics:
