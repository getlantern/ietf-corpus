kind: protocol-element
summary: A 'vpn-node' represents a set of policies applied on a PE (referenced by 'ne-id') within one L3VPN service; it references 'active-vpn-instance-profiles' (which override service-level values), supports optional MSDP configuration for multicast RP redundancy, redundancy 'groups', and admin/operational 'status' tracking.
