document: rfc-8770
kind: normative-requirement
summary: This document updates RFC 6987 so that self-originated AS-external-LSAs or NSSA-LSAs advertise the Type 2 metric as LSInfinity-1 in overload scenarios; if the H-bit is set, the Type 2 metric MUST be set to LSInfinity.
section: "6"
rfc2119_level: MUST
topics:
