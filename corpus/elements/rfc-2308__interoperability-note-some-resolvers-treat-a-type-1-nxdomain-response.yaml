document: rfc-2308
kind: interoperability-note
summary: Some resolvers treat a Type 1 NXDOMAIN response as a referral. To work around this, servers acting as forwarders to such resolvers must send only Type 2 NXDOMAIN responses.
section: 2.1.1
topics:
    - dns
