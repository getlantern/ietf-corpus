document: rfc-4035
kind: design-rationale
summary: NSEC records MUST NOT be created for owner name nodes that did not exist before the zone was signed. The reasons are to maintain namespace consistency between signed and unsigned versions of the same zone and to reduce the risk of response inconsistency in security-oblivious recursive name servers.
section: "2.3"
topics:
    - dns
    - security
