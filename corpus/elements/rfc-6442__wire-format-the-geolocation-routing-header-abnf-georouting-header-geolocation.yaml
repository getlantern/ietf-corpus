summary: 'The Geolocation-Routing header ABNF: ''Georouting-header = "Geolocation-Routing" HCOLON ( "yes" / "no" / generic-value )''. Only "yes" and "no" are defined values; a null/absent value is not permitted, and unknown values MUST be treated as "no".'
