kind: protocol-element
summary: dot12Commands is a write-only control object with values noOp(1), open(2), reset(3), close(4). Writing 'open' initiates training (only when closed); 'close' silences the MAC; 'reset' reinitializes MAC and restarts training without affecting MIB counters. Always returns 'noOp' when read.
