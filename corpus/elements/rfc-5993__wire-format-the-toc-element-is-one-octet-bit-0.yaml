document: rfc-5993
kind: wire-format
summary: 'The ToC element is one octet: bit 0 is the Follow flag (F; 1 = more ToC elements follow), bits 1–3 are the Frame Type (FT), and bits 4–7 are reserved (R). FT values: 000 = Good Speech, 010 = Good SID, 111 = No_Data; all other values are reserved.'
section: "5.2"
