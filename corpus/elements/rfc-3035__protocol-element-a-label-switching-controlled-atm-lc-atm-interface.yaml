document: rfc-3035
kind: protocol-element
summary: A label switching controlled ATM (LC-ATM) interface is an ATM interface controlled by the label switching control component. Packets received on such an interface are treated as labeled, with the top label inferred from the VCI field or the combined VPI/VCI fields, as negotiated via LDP.
