document: rfc-9833
kind: protocol-element
summary: The 'precedence-type' identity provides primary and secondary subtypes used to tag redundancy roles of ACs. The 'redundancy-group' grouping associates an AC with one or more group-ids and assigns a precedence (primary/secondary) for redundancy or protection constraint coordination per RFC 9181.
