document: rfc-2668
kind: protocol-element
summary: ifMauTypeListBits is a BITS object (31 named bits, b0–b30) that identifies all IEEE 802.3 MAU types the interface could operate as, covering AUI through 1000BASE-T full duplex. It replaces the deprecated integer-encoded ifMauTypeList object and maps to ifMauAutoNegCapabilityBits when auto-negotiation is present.
