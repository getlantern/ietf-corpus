document: rfc-3485
kind: design-rationale
summary: Dictionary strings are case-sensitive. Header field entries include the colon ':' and the expected whitespace that follows. Best compression is achieved for SIP messages that follow the recommended formatting guidelines; messages using non-standard whitespace (e.g., a tab before the colon) will benefit less.
section: "2"
