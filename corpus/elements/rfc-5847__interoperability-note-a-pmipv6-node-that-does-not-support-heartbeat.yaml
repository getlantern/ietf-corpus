document: rfc-5847
kind: interoperability-note
summary: A PMIPv6 node that does not support Heartbeat messages responds with a Binding Error (status 2, unrecognized MH type), per RFC 3775. The initiating node MUST cease sending Heartbeat messages to that peer upon receiving this error.
section: "3"
topics:
