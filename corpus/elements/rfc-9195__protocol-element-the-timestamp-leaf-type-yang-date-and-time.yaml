document: rfc-9195
kind: protocol-element
summary: The timestamp leaf (type yang:date-and-time) records when the instance data set was last modified, and SHOULD be present for server-produced or frequently updated instance data. If both revision and timestamp are present, they SHOULD agree on the latest date.
section: "3.2"
topics:
