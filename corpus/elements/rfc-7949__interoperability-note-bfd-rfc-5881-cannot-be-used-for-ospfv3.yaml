document: rfc-7949
kind: interoperability-note
summary: BFD (RFC 5881) cannot be used for OSPFv3 adjacency loss detection when adjacencies are formed across different IPv4 subnets, because BFD for single-hop IPv4/IPv6 is restricted to a single subnet.
section: "3.1"
