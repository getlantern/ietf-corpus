document: rfc-5436
kind: normative-requirement
summary: The 'From:' header field of the notification message SHOULD be set to the ':from' tag value if valid; otherwise SHOULD be set to the triggering message's envelope 'to' or a notification system address. A 'from' URI header MUST NOT override this and MUST be ignored.
section: "2.7"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
