document: rfc-8636
kind: design-rationale
summary: The KDF negotiation embeds the client principal name (partyUInfo) and TGS name (partyVInfo) plus the full AS-REQ and PA-PK-AS-REP in PkinitSuppPubInfo, providing cryptographic binding between pre-authentication data and ticket exchange that addresses the paChecksum weakness when Diffie-Hellman is used.
