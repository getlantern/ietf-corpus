document: rfc-3024
kind: protocol-element
summary: The 'T' bit is added to the Mobility Agent Advertisement Extension to indicate that the agent offers reverse tunneling service. A foreign agent setting 'T' MUST support Direct Delivery Style and SHOULD support Encapsulating Delivery Style.
