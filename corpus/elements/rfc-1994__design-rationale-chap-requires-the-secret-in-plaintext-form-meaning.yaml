document: rfc-1994
kind: design-rationale
summary: CHAP requires the secret in plaintext form, meaning irreversibly encrypted password databases cannot be used. This is an inherent disadvantage that makes CHAP less suitable for large installations where every secret must be maintained at both ends.
section: "2.2"
