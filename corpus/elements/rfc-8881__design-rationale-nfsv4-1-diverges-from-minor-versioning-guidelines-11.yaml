document: rfc-8881
kind: design-rationale
summary: NFSv4.1 diverges from minor versioning guidelines 11 and 12 by making sessions and RECLAIM_COMPLETE REQUIRED rather than RECOMMENDED or OPTIONAL. These are infrastructural features with broad effects; allowing them to be optional would add undue complexity to protocol definition and implementation.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
