document: rfc-1427
kind: design-rationale
summary: The declared message size may be a heuristic estimate rather than an exact count because exact computation may be infeasible. Such heuristics should be chosen so that the declared size is usually larger than the actual size, making whether SMTP DATA dots are counted largely academic.
section: "6"
