document: rfc-4667
kind: wire-format
summary: The Interface MTU AVP (Attribute Type 91) contains a 2-octet integer indicating the MTU in octets of packets that can be sent from the CE-facing interface. Total AVP length is 8 octets. The M bit SHOULD be set to 0; the H bit MAY be 0 or 1. MAY be present in ICRQ and ICRP.
section: "4.3"
topics:
