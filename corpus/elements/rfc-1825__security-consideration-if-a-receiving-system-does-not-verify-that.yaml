document: rfc-1825
kind: security-consideration
summary: If a receiving system does not verify that the Security Association used for a packet is valid for the claimed source address, an attacker sharing a different SA with the destination can forge the source address of another sender, causing the receiver to misattribute the packet's origin.
section: "6"
topics:
    - ipsec
    - security
    - ip
