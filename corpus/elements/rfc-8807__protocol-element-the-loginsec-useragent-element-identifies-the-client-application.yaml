document: rfc-8807
kind: protocol-element
summary: 'The <loginSec:userAgent> element identifies the client application software, technology, and OS. It MUST contain at least one of: <loginSec:app> (application name and version), <loginSec:tech> (vendor, technology name, version), or <loginSec:os> (architecture, OS name, version).'
section: "4.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
