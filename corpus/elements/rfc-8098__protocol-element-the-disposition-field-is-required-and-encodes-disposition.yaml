document: rfc-8098
kind: protocol-element
summary: The Disposition field is required and encodes `disposition-mode ";" disposition-type [ "/" disposition-modifier ]`. Action modes are `manual-action` or `automatic-action`; sending modes are `MDN-sent-manually` or `MDN-sent-automatically`; disposition types are `displayed`, `deleted`, `dispatched`, or `processed`.
section: 3.2.6
topics:
    - email
