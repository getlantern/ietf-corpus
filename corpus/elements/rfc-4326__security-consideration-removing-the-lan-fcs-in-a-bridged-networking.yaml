document: rfc-4326
kind: security-consideration
summary: 'Removing the LAN FCS in a bridged networking environment introduces a known integrity risk: corruption occurring within Encapsulator or Receiver processing will not be detected by the final recipient(s), as such corruption would not produce an invalid LAN FCS on the reconstructed frame.'
section: "10"
topics:
