document: rfc-7285
kind: design-rationale
summary: PIDs provide a network-agnostic, indirect abstraction layer so that ALTO information remains stable and compact even as fine-grained topology changes. This abstraction also allows an ISP to protect sensitive internal topology by exposing only policy-level groupings rather than raw routing state.
