document: rfc-4112
kind: wire-format
summary: Ecom_SchemaVersion carries the URI 'urn:ietf:params:ecml:v2.0' for this version; the XML Schema fixes the SchemaVersion attribute to this value. Country codes use ISO 3166-1 two-letter codes; currency codes use ISO 4217 three-letter codes; transaction amounts use ISO 4217 numeric format (two integers separated by a period, no currency symbol).
section: 2.1.2
extracted_by: claude-sonnet-4-6
