document: rfc-2110
kind: normative-requirement
summary: 'To determine the base URI for resolving relative URIs in a MIME body part, the first applicable method in priority order applies: (a) an in-document base specification such as HTML BASE element, (b) a Content-Base header, (c) a Content-Location header serving as base. When none yields an absolute URI, the procedure in section 8.2 MUST be followed.'
section: "5"
rfc2119_level: MUST
topics:
    - email
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
