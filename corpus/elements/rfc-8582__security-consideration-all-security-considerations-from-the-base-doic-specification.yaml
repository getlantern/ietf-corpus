document: rfc-8582
kind: security-consideration
summary: All security considerations from the base DOIC specification (RFC 7683) apply to the rate abatement mechanism. Additionally, the rate algorithm may handle denial-of-service attacks more effectively than the loss algorithm by imposing an absolute ceiling on incoming request rate rather than a relative percentage reduction.
