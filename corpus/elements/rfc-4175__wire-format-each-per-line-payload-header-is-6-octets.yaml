document: rfc-4175
kind: wire-format
summary: 'Each per-line payload header is 6 octets: a 16-bit Length (octets of data for this line, network byte order, MUST be multiple of pgroup), a 1-bit F (field ID), a 15-bit Line No (network byte order), a 1-bit C (continuation), and a 15-bit Offset (first pixel within scan line, network byte order).'
section: "4.2"
topics:
    - rtp
    - realtime
