document: rfc-7716
kind: protocol-element
summary: 'An OPTIONAL mechanism allows PBRs to constrain distribution of Source Active A-D routes to interested parties: a PBR originating a C-multicast Shared Tree Join for (*,G) dynamically creates an import RT with group address G in the Global Administrator field and zero Local Administrator, then uses RT Constraint (RFC 4684) to advertise interest in routes carrying this RT.'
section: 2.8.2
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
