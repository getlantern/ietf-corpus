document: rfc-3392
kind: normative-requirement
summary: BGP speakers SHOULD NOT include more than one instance of a capability with the same Capability Code, Capability Length, and Capability Value, though processing multiple identical instances requires no special handling since they do not change the announced capability's meaning.
