document: rfc-7844
kind: interoperability-note
summary: Requesting Prefix Delegation (DHCPv6 PD) via IA_PD is a form of fingerprinting until its use becomes widespread; the IAID could identify the client and a prefix hint could reveal previous location. Clients desiring anonymity that request only one prefix SHOULD set IAID to zero and SHOULD NOT include a previously assigned prefix hint.
section: 4.5.2
topics:
    - privacy
    - dns
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
