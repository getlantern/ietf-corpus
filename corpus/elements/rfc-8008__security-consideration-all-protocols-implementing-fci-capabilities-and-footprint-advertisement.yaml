document: rfc-8008
kind: security-consideration
summary: All protocols implementing FCI capabilities and footprint advertisement objects are REQUIRED to provide integrity and authentication services. Without these, an attacker could forge footprint advertisements to deny service by making a dCDN appear to have no footprint or capability.
section: "7"
topics:
    - security
    - tls
