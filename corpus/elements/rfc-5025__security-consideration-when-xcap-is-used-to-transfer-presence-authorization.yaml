document: rfc-5025
kind: security-consideration
summary: When XCAP is used to transfer presence authorization documents, both clients and servers MUST implement HTTP over TLS and HTTP Digest authentication. Sites SHOULD authenticate clients using digest over TLS and SHOULD define the root services URI as an https URI.
section: "10"
rfc2119_level: MUST
topics:
    - sip
    - security
    - tls
