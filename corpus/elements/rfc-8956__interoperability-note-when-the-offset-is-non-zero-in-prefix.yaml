document: rfc-8956
kind: interoperability-note
summary: When the offset is non-zero in prefix components, the ipv6address in prefix notation (ipv6address/offset-length) represents the textual IPv6 representation of the pattern shifted right by the number of offset bits. Bits in the offset region are not represented in the encoded pattern.
section: "3.1"
topics:
    - ip
    - routing
