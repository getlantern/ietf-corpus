document: rfc-8706
kind: normative-requirement
summary: A router operating at both Level 1 and Level 2 on an interface MUST perform restart operations for each level independently, including sending/receiving both Level 1 and Level 2 IIHs and performing CSNP synchronizations independently per level.
section: 3.3.3
rfc2119_level: MUST
topics:
    - routing
