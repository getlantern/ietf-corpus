document: rfc-9092
kind: normative-requirement
summary: 'The RPKI signature appendix MUST be hidden as a series of ''#'' comments at the end of the geofeed file; the bracketing ''# RPKI Signature:'' and ''# End Signature:'' MUST be present; their IP address range MUST match that of the inetnum: URL followed to the file.'
section: "4"
rfc2119_level: MUST
topics:
