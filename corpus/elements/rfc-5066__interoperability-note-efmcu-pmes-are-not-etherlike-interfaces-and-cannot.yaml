document: rfc-5066
kind: interoperability-note
summary: EFMCu PMEs are not EtherLike interfaces and cannot be instantiated as MAU interface objects; only the PCS port (ifType ethernetCsmacd(6)) gets an ifMauTable entry. PME interfaces use ifType shdsl(169) for 2BASE-TL and vdsl(97) for 10PASS-TS, as defined in IANAifType-MIB.
section: 3.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
