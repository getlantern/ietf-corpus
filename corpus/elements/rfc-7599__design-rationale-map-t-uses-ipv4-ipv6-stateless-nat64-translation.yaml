document: rfc-7599
kind: design-rationale
summary: MAP-T uses IPv4-IPv6 stateless NAT64 translation rather than encapsulation (as in MAP-E) to eliminate encapsulation overhead and allow IPv4 and IPv6 traffic to be treated as similarly as possible, and to enable IPv4-only nodes to correspond directly with IPv6 nodes bearing IPv4-embedded IPv6 addresses.
section: "1"
topics:
    - nat
    - v6ops
    - ip
