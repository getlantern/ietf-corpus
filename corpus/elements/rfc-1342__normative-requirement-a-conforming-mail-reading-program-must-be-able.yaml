document: rfc-1342
kind: normative-requirement
summary: A conforming mail reading program must be able to display unencoded text if the charset is 'US-ASCII'. For ISO-8859-* character sets, it must at least be able to display characters that are also in the ASCII set.
section: Conformance
rfc2119_level: MUST
topics:
    - email
