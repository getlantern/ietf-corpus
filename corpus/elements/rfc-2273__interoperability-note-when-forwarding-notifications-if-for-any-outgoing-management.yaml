document: rfc-2273
kind: interoperability-note
summary: When forwarding notifications, if for any outgoing management target the incoming SNMP version is SNMPv2 or SNMPv3 and the outgoing version is SNMPv1, that management target is NOT used when generating the forwarded notifications (SNMPv2/v3 Trap/Inform PDUs cannot be down-translated to SNMPv1 traps in this context).
section: 3.5.2
topics:
    - snmp
