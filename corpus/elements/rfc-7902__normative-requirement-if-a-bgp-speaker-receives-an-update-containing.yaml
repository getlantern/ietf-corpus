document: rfc-7902
kind: normative-requirement
summary: If a BGP speaker receives an UPDATE containing a 'PMSI Tunnel' attribute with the Extension flag set but no 'Additional PMSI Tunnel Attribute Flags' Extended Community, the UPDATE is considered malformed and the 'treat-as-withdraw' procedure of RFC 7606 MUST be applied.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
