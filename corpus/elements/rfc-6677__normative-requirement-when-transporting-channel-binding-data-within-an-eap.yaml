document: rfc-6677
kind: normative-requirement
summary: When transporting channel-binding data within an EAP method, the method MUST be able to carry integrity-protected data from the EAP peer to server and from EAP server to peer. EAP methods MUST exchange channel-binding data with the AAA subsystem hosting the EAP server and MUST be able to import channel-binding data from the lower layer on the EAP peer.
section: "6.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
