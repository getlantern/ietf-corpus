document: rfc-5875
kind: security-consideration
summary: The mechanism used for conveying xcap-diff event information MUST ensure integrity and SHOULD ensure confidentiality. End-to-end S/MIME SHOULD be used; if unavailable, TLS between elements is RECOMMENDED for hop-by-hop authentication and encryption. Denial-of-service risks include subscriptions to long URI lists, pending subscriptions to non-existent components, and extreme diff-generation optimization algorithms.
section: "7"
topics:
    - security
    - tls
    - sip
