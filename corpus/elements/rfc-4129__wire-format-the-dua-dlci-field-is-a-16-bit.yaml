document: rfc-4129
kind: wire-format
summary: 'The DUA DLCI field is a 16-bit field containing: 7 reserved bits (set to 0, ignored by receiver), 1 V-bit indicating single-DLC or all-DLC scope, a Channel Number field, and a trailing 1-bit. Valid channel numbers are 0–63 for DPNSS and 0–31 for DASS 2.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
