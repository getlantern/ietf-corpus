document: rfc-9174
kind: design-rationale
summary: Once established, TCPCL session parameters cannot change; a new TCP connection and session must be established to use different parameters. This simplifies convergence-layer logic and relies on the assumption that TCP connection establishment overhead is negligible compared to TCPCL data transfer sizes.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
