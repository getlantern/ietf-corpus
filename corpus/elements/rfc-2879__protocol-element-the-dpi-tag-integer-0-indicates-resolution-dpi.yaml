document: rfc-2879
kind: protocol-element
summary: The 'dpi' tag (Integer, >0) indicates resolution; 'dpi-xyratio' (Rational, >0) indicates the ratio of horizontal to vertical resolution. When 'dpi-xyratio' is present and not equal to 1, 'dpi' applies to the horizontal axis and vertical resolution equals dpi divided by dpi-xyratio.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
