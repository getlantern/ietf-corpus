document: rfc-6536
kind: design-rationale
summary: Machine-readable YANG extension statements (nacm:default-deny-write and nacm:default-deny-all) were introduced to eliminate a window of vulnerability between loading a new data model and manually configuring access control rules; tools can automatically deny access to sensitive data without administrator intervention.
section: "2.8"
topics:
    - netconf
    - yang
    - security
