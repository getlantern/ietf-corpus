document: rfc-1752
kind: privacy-consideration
summary: The Privacy Header (predecessor to ESP) provides confidentiality by encrypting data placed in its Protected Data field. The Security Association Identifier (SAID) combined with the originating address is used by the receiver to identify the correct one-way security association; an authenticated session between two hosts normally uses two SAIDs.
section: 12.2.6
topics:
    - ip
    - privacy
    - crypto
    - ipsec
