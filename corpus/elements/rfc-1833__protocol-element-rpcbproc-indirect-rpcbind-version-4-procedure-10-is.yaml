document: rfc-1833
kind: protocol-element
summary: RPCBPROC_INDIRECT (RPCBIND version 4, procedure 10) is similar to RPCBPROC_CALLIT but returns an error indication rather than being silent on failure. It is intended for indirect (unicast) RPC calls, not broadcast.
