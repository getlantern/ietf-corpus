document: rfc-7432
kind: wire-format
summary: 'The MAC Mobility Extended Community (Type 0x06, Sub-Type 0x00) is 8 octets: Flags (1 octet, low-order Sticky/static bit), Reserved (1 octet), Sequence Number (4 octets). A higher sequence number wins when multiple PEs advertise the same MAC, and the Sticky flag prevents MAC moves.'
section: "7.7"
topics:
