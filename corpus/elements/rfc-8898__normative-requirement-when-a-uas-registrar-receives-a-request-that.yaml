document: rfc-8898
kind: normative-requirement
summary: When a UAS/registrar receives a request that fails to contain acceptable authorization credentials, it SHOULD challenge the request by sending a 401 (Unauthorized) response. Similarly, a proxy SHOULD challenge by sending a 407 response.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - sip
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
