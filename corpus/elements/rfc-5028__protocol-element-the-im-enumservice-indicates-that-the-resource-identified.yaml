document: rfc-5028
kind: protocol-element
summary: The 'im' Enumservice indicates that the resource identified is an 'im:' URI. The 'im:' URI scheme does not identify any particular IM protocol; instead RFC 3861 is used to discover whether an IM protocol supported by the querying party is also supported by the target resource.
