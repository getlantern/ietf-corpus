document: rfc-4210
kind: state-machine
summary: The polling mechanism uses pollReq (tag 25) and pollRep (tag 26) messages. When the CA returns a 'waiting' status, the EE transitions to a polling state and sends periodic pollReq messages; the CA responds with pollRep containing a checkAfter time until the pending operation completes and the actual response (e.g., ip, cp) is returned.
section: 5.3.22
topics:
    - pkix
    - security
