document: rfc-8276
kind: normative-requirement
summary: 'GETXATTR: If the server does not support xattrs on the target file system, it MUST NOT return a value and MUST return NFS4ERR_NOTSUPP. The server MUST return NFS4ERR_NOXATTR if xattrs are supported but the requested data cannot be obtained. If the response would exceed the channel''s maximum size, the server MUST return NFS4ERR_REP_TOO_BIG.'
section: 8.4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
