document: rfc-8485
kind: normative-requirement
summary: The RP MUST understand and take into account the trust framework context in which a vector is expressed in order to process it correctly. A vector value without context is unprocessable, and vectors from different contexts are not directly comparable.
section: "2"
rfc2119_level: MUST
topics:
