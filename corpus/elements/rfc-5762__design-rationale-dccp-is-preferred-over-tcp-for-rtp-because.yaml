document: rfc-5762
kind: design-rationale
summary: DCCP is preferred over TCP for RTP because TCP's reliable delivery and its congestion control dynamics make it inappropriate for most interactive real-time applications. DCCP offers unreliable delivery with a choice of congestion control algorithms, allowing applications to tailor transport to their needs.
section: "2"
topics:
    - rtp
    - congestion
    - realtime
