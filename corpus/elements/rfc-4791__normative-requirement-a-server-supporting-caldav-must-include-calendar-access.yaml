document: rfc-4791
kind: normative-requirement
summary: A server supporting CalDAV MUST include "calendar-access" as a field in the DAV response header from an OPTIONS request on any resource that supports any calendar properties, reports, method, or privilege. This value MUST indicate that all MUST-level requirements are supported.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
