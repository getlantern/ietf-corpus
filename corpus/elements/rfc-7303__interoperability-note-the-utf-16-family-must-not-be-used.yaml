document: rfc-7303
kind: interoperability-note
summary: The UTF-16 family MUST NOT be used with media types under the top-level type 'text' except over HTTP or HTTPS, since HTTP is binary-clean and does not perform CR/LF transformations or disallow NUL octets.
section: "8.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
