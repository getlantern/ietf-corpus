document: rfc-5996
kind: protocol-element
summary: The Configuration (CP) payload exchanges internal network configuration attributes during IKEv2, including INTERNAL_IP4_ADDRESS, INTERNAL_IP6_ADDRESS, INTERNAL_IP4_DNS, and related attributes, enabling a remote endpoint to request an IP address owned by the security gateway for the duration of the SA.
section: "3.15"
topics:
