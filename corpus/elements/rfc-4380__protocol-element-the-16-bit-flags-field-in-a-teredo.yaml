document: rfc-4380
kind: protocol-element
summary: 'The 16-bit Flags field in a Teredo IPv6 address has two defined values: 0x0000 (not behind cone NAT) and 0x8000 (cone NAT, bit C set). Bits UG must be 00 (non-global unicast identifier); all remaining bits (z) must be set to zero and ignored on receipt.'
