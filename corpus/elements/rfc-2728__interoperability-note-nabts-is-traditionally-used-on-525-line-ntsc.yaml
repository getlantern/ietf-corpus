document: rfc-2728
kind: interoperability-note
summary: NABTS is traditionally used on 525-line NTSC systems, while WST (World System Teletext) is used on 625-line PAL/SECAM systems. These are generalizations with exceptions; countries should be treated on an individual basis when deploying IPVBI.
