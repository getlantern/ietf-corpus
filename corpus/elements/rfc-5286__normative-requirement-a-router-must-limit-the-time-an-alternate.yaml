document: rfc-5286
kind: normative-requirement
summary: 'A router MUST limit the time an alternate next-hop is used after primary failure, to ensure the network converges to new primary next-hops. Use of the alternate SHOULD terminate when: (a) the new primary was loop-free before the failure, (b) a configured hold-down expires, or (c) an unrelated topological change is received.'
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
