document: rfc-6842
kind: protocol-element
summary: The 'client identifier' option, when sent by the client, serves as a unique identifier for the client's lease in combination with the assigned network address. When 'chaddr' is all zeroes, this option is the sole means of uniquely identifying the client within a subnet.
