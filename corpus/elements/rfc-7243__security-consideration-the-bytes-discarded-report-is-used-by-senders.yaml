document: rfc-7243
kind: security-consideration
summary: The Bytes Discarded report is used by senders for congestion control and goodput calculation. An attacker MAY forge or suppress reports to drive the endpoint to lower its sending rate and under-utilize the link; media senders should choose appropriate security measures to mitigate such attacks.
section: "6"
topics:
