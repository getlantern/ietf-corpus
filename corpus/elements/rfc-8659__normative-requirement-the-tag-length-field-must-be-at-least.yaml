document: rfc-8659
kind: normative-requirement
summary: The Tag Length field MUST be at least 1. Tags MUST NOT contain any characters other than ASCII letters (a–z, A–Z) and digits (0–9); matching of tags is case insensitive. Tags submitted for IANA registration MUST use only lowercase ASCII letters and digits.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - registry
