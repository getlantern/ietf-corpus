document: rfc-8915
kind: normative-requirement
summary: If the server cannot validate the cookie or authenticate the request, it SHOULD send a KoD packet with kiss code 'NTSN' (NTS NAK) and MUST NOT include any NTS Cookie or NTS Authenticator extension fields in that response.
section: "5.7"
rfc2119_level: SHOULD
topics:
    - ntp
