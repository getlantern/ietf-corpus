document: rfc-5073
kind: design-rationale
summary: The flooding scope of the TE Node Capability Descriptor is deliberately area-local rather than domain-wide because the capabilities are used as constraints during path selection, and domain-wide flooding would be unnecessary for intra-area TE path computation and would increase overhead.
section: "5.1"
topics:
    - routing
    - mpls
