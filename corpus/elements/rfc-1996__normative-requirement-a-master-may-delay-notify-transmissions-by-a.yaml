document: rfc-1996
kind: normative-requirement
summary: A master may delay NOTIFY transmissions by a random interval to avoid triggering simultaneous outbound zone transfers from multiple slaves. The delay must not exceed the SOA REFRESH time.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
