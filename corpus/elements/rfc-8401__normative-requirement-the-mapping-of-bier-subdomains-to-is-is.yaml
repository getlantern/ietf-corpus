document: rfc-8401
kind: normative-requirement
summary: The mapping of BIER subdomains to IS-IS topologies MUST be consistent within the IS-IS flooding domain. All routers in the flooding scope MUST advertise the same subdomain within the same multi-topology.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
