document: rfc-3958
kind: design-rationale
summary: S-NAPTR restricts NAPTR usage to replacement-only rules (no regular expressions) and binds it strictly to domain names, making client resolution more predictable and efficient than full NAPTR. The 'straightforward' restriction also avoids the unintelligible rule-set complexity that makes protocol designers and administrators nervous about general NAPTR.
section: "5.2"
topics:
    - dns
