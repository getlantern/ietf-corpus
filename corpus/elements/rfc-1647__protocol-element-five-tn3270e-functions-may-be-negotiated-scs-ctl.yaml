document: rfc-1647
kind: protocol-element
summary: 'Five TN3270E functions may be negotiated: SCS-CTL-CODES (SCS/LU-type-1 printer data), DATA-STREAM-CTL (3270 data stream for printers), RESPONSES (positive/negative response handling), BIND-IMAGE (SNA Bind and Unbind notification), and SYSREQ (SYSREQ key emulation for SNA sessions).'
section: 7.2.2
