document: rfc-8534
kind: normative-requirement
summary: When an egress ABR/ASBR receives an installed S-PMSI A-D route whose PTA specifies 'no tunnel information present', it MUST pass the PTA along unchanged when forwarding the route, and the LIR and LIR-pF flags MUST be passed along unchanged.
section: "5.3"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
