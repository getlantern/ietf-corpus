document: rfc-2930
kind: protocol-element
summary: The Error field is an extended RCODE. Values 1-15 are non-extended RCODEs; 16=BADSIG, 17=BADKEY, 18=BADTIME (all TSIG), 19=BADMODE, 20=BADNAME, 21=BADALG. When non-zero in a TKEY response, the DNS header RCODE field indicates no error.
