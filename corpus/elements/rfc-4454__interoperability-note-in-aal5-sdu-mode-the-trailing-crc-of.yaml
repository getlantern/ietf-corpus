document: rfc-4454
kind: interoperability-note
summary: In AAL5-SDU Mode, the trailing CRC of the CPCS-PDU is stripped at the ingress LCCE and regenerated at egress; errors introduced in the ATMPW payload during transit may not be detected. Similarly, EFCI and CLP values of individual ATM cells within an AAL5 frame may be lost across the ATMPW.
section: "9.1"
topics:
    - routing
