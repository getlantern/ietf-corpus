document: rfc-6940
kind: protocol-element
summary: A Destination List is a strict-ordered list of Node-IDs, Resource-IDs, and Opaque IDs through which a message is routed, providing loose source routing. The minimal Destination List contains a single value; the list is reduced hop-by-hop and does not include the source.
section: 6.3.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
