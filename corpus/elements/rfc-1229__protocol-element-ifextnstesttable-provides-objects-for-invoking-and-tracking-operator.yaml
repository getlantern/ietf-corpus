document: rfc-1229
kind: protocol-element
summary: ifExtnsTestTable provides objects for invoking and tracking operator-initiated interface tests. The table is optional; if implemented, all six objects (ifExtnsTestIfIndex, ifExtnsTestCommunity, ifExtnsTestRequestId, ifExtnsTestType, ifExtnsTestResult, ifExtnsTestCode) must be implemented.
