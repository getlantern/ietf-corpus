document: rfc-1738
kind: security-consideration
summary: A URL constructed with a non-default port number can cause a client to inadvertently contact a server running a different protocol. Instructions encoded in the URL may then trigger unexpected or damaging operations on that server (e.g., a Gopher URL causing a message to be sent via SMTP). Clients should treat non-default port URLs with caution.
section: "6"
topics:
    - security
