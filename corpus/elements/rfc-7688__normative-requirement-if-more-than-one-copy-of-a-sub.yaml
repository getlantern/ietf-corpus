document: rfc-7688
kind: normative-requirement
summary: If more than one copy of a sub-TLV is received in the same LSA, the redundant sub-TLV SHOULD be ignored. If the same sub-TLV is advertised in a different TE LSA (packaging error), the sub-TLV with the largest LSA ID SHOULD be picked.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
