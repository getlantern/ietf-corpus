document: rfc-6002
kind: interoperability-note
summary: Transit and egress nodes that do not support the DCSC Switching Type will generate a PathErr message with 'Routing problem/Unsupported Encoding' per RFC 3473 when receiving a Path message with a DCSC Label Request. Ingress nodes receiving such PathErr messages must notify the requesting application user.
section: "2.1"
topics:
    - mpls
    - routing
