document: rfc-3758
kind: normative-requirement
summary: During processing of a FORWARD TSN, the receiver MUST use stream sequence information to examine all stream reordering queues and immediately make available for delivery any data with stream sequence numbers earlier than or equal to those listed in the FORWARD TSN.
section: "3.6"
rfc2119_level: MUST
topics:
    - sctp
