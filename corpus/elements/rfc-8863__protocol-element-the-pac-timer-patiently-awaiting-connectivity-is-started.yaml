document: rfc-8863
kind: protocol-element
summary: The PAC timer (Patiently Awaiting Connectivity) is started once the ICE agent has sent credentials (Username Fragment and Password) and received an indication that the remote side is ready to begin connectivity checks. The timer starts even if no ICE candidates have been sent or received.
