document: rfc-1531
kind: protocol-element
summary: 'When a server selects an address in response to DHCPDISCOVER, it applies a priority order: (1) the client''s previously recorded address if still available, (2) the address in the ''Requested IP Address'' option if valid and unallocated, (3) a new address from the server''s pool.'
section: 4.3.1
