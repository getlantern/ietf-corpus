document: rfc-7373
kind: security-consideration
summary: Because this encoding is not intended for storage but storage of exchanged data is common practice, the privacy considerations of RFC 7011 Section 11.8 are especially important; the ubiquity of text indexing tools increases the risk of privacy-sensitive network traffic data being accidentally indexed or searched.
