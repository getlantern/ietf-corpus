document: rfc-5215
kind: normative-requirement
summary: Upon loss of configuration headers, the baseline reaction SHOULD either reset or end the RTP session. Implementations MAY try to recover by re-requesting the missing Configuration or buffering payloads while waiting for the needed Configuration.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
