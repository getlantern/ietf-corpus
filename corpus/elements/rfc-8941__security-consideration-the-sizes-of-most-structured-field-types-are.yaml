document: rfc-8941
kind: security-consideration
summary: The sizes of most Structured Field types are not limited by this specification; extremely large field values could be used as an attack vector for resource consumption. Most HTTP implementations should impose limits on individual field sizes and total header/trailer section size to mitigate such attacks.
section: "6"
topics:
    - http
    - security
