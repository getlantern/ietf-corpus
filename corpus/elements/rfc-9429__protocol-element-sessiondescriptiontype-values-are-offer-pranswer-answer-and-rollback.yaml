document: rfc-9429
kind: protocol-element
summary: SessionDescriptionType values are 'offer', 'pranswer', 'answer', and 'rollback'. A 'pranswer' MUST NOT result in freeing allocated resources; an 'answer' completes the exchange and SHOULD release unused resources. A 'rollback' has empty contents and transitions the state machine back to stable.
section: 4.1.10
