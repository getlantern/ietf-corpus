document: rfc-3959
kind: protocol-element
summary: The 'early-session' disposition type for the Content-Disposition header field is defined to establish early media sessions within early dialogs, as opposed to regular 'session' bodies which establish sessions within regular dialogs. Early-session bodies follow the offer/answer model just as session bodies do.
