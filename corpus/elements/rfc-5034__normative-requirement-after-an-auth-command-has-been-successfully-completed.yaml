document: rfc-5034
kind: normative-requirement
summary: After an AUTH command has been successfully completed, no more AUTH commands may be issued in the same session. A server MUST reject any further AUTH commands with an -ERR reply.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
