document: rfc-9117
kind: interoperability-note
summary: Flow Specifications originated in a different Local Domain still require a congruent topology. In a non-congruent inter-domain scenario, condition b.2 evaluates to false and only the originator-match condition b.1 is evaluated, which will fail if the topology is non-congruent.
