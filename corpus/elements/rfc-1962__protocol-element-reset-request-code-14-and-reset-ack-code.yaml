document: rfc-1962
kind: protocol-element
summary: Reset-Request (Code 14) and Reset-Ack (Code 15) provide a mechanism for indicating a decompression failure in one direction without affecting traffic in the other direction. Once a Reset-Request is sent, compressed packets received are discarded and another Reset-Request with the same Identifier is sent until a valid Reset-Ack is received.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
