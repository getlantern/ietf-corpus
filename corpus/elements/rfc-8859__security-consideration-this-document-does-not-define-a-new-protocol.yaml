document: rfc-8859
kind: security-consideration
summary: This document does not define a new protocol and introduces no new security considerations beyond those applicable to SDP and its existing attributes. The framework itself is an analytical tool; security properties of multiplexed sessions depend on the security mechanisms (DTLS-SRTP, SDES, ZRTP) used, whose attributes are categorized TRANSPORT — meaning transport-security configuration is taken from the elected bundle m= line and applied to the entire multiplexed session.
