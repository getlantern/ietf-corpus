document: rfc-7551
kind: normative-requirement
summary: The egress node MUST use the subobjects in the REVERSE_LSP Object when initiating the reverse LSP. When a subobject is absent, the egress node SHOULD copy SESSION_ATTRIBUTE, CLASS_TYPE, LABEL_REQUEST, ASSOCIATION, ADMIN_STATUS, and PROTECTION from the forward LSP's Path message.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
