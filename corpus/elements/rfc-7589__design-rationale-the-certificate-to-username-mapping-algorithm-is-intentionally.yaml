summary: The certificate-to-username mapping algorithm is intentionally identical to the one in the SNMP-TLS-TM-MIB (RFC 6353) and the ietf-x509-cert-to-name YANG module (RFC 7407), promoting consistency across management protocols that use TLS with X.509 certificates.
