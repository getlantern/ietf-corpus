document: rfc-4106
kind: normative-requirement
summary: 'The KEYMAT for AES-GCM-ESP MUST be four octets longer than the AES key size: 20 octets for 128-bit keys, 28 octets for 192-bit keys, and 36 octets for 256-bit keys. The extra four octets are used as the nonce salt.'
section: "8.1"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
