document: rfc-3586
kind: protocol-element
summary: The Policy Discovery mechanism provides essential information that two IPsec endpoints can use to determine what kinds of SAs are possible between them. A host need not reveal its entire security policy, only enough to support SA resolution.
section: 3.2.5
