document: rfc-7155
kind: normative-requirement
summary: A NAS MUST treat unknown or unsupported Service-Type AVP values received in a response as a failure and end the session with DIAMETER_INVALID_AVP_VALUE. If the service type is supported but incompatible with current access mode, the NAS MUST fail to start the session.
section: 4.4.1
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
