document: rfc-5264
kind: protocol-element
summary: The compositor maintains a per-resource record for each publication indexed by entity-tag. The entity-tag is assigned by the compositor and returned in the response; the PUA uses the SIP-If-Match header with this entity-tag to identify which publication a modifying request targets.
