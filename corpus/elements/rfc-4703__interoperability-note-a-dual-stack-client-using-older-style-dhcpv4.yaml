document: rfc-4703
kind: interoperability-note
summary: A dual-stack client using older-style DHCPv4 client identifiers (not DUID-based) will only be able to have either its A or AAAA records in DNS under a single FQDN due to DHCID RR conflicts, unless both DHCPv4 and DHCPv6 use the same DUID.
section: "5.2"
topics:
    - dns
    - ip
    - v6ops
