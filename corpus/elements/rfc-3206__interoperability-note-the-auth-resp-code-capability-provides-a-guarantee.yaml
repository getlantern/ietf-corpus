document: rfc-3206
kind: interoperability-note
summary: 'The AUTH-RESP-CODE capability provides a guarantee to clients: if the server advertises AUTH-RESP-CODE, the client can be certain that any -ERR without the AUTH code is not a credential problem, enabling unambiguous determination of whether to prompt for new credentials.'
