document: rfc-3588
kind: security-consideration
summary: Accounting requests without corresponding authorization responses SHOULD be subjected to further scrutiny. A Diameter client receiving an authorization response for a service it cannot perform MUST NOT substitute an alternate service and then send accounting requests for that alternate service.
section: "2.10"
topics:
    - security
