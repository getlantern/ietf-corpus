document: rfc-3633
kind: normative-requirement
summary: If the requesting router assigns a delegated prefix to a link and sends router advertisements for it, the requesting router MUST set the valid lifetime in those advertisements to be no later than the valid lifetime specified in the IA_PD Prefix option. It MAY use the preferred lifetime specified in the option.
section: "12.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
