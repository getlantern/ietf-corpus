document: rfc-2263
kind: protocol-element
summary: The snmpTargetAddrTable stores transport addresses used for generating SNMP messages. Each entry (SnmpTargetAddrEntry) contains snmpTargetAddrName (index, 1–32 octets), snmpTargetAddrTDomain, snmpTargetAddrTAddress, snmpTargetAddrTimeout (default 1500), snmpTargetAddrRetryCount (default 3, range 0–255), snmpTargetAddrTagList, snmpTargetAddrParams (pointer to snmpTargetParamsTable), snmpTargetAddrStorageType, and snmpTargetAddrRowStatus.
section: 4.1.2
topics:
    - snmp
