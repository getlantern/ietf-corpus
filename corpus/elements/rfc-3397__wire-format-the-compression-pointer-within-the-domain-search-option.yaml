document: rfc-3397
kind: wire-format
summary: The compression pointer within the Domain Search Option refers to the offset within the data portion of the DHCP option, not including the preceding option code byte or option length byte. When multiple Domain Search Options are present, the pointer indicates an offset within the complete aggregated block of data.
section: "2"
