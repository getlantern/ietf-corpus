document: rfc-8828
kind: protocol-element
summary: WebRTC implementations MUST use ICE to establish peer-to-peer connections, discovering multiple IP addresses via STUN and TURN. The addresses collected typically include an endpoint's private physical or virtual addresses and its public Internet addresses, which are then provided to the web application.
section: "3"
topics:
    - webrtc
    - nat
    - realtime
