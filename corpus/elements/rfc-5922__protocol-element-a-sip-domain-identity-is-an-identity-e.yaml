document: rfc-5922
kind: protocol-element
summary: A SIP domain identity is an identity (e.g., 'sip:example.com') contained in an X.509 certificate bound to a subject that identifies the subject as an authoritative SIP server for a domain. It is encoded in the subjectAltName extension as a URI of scheme 'sip' without a userinfo component, or as a DNS name.
section: "2.1"
topics:
    - sip
    - pkix
    - tls
