document: rfc-4251
kind: wire-format
summary: name-list is a uint32 length followed by a comma-separated list of US-ASCII names. Each name MUST have non-zero length and MUST NOT contain a comma. Terminating null characters MUST NOT be used for individual names or the list as a whole.
section: "5"
rfc2119_level: MUST
topics:
    - security
