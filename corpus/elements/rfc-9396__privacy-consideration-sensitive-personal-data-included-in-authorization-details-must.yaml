document: rfc-9396
kind: privacy-consideration
summary: Sensitive personal data included in `authorization_details` must be prevented from leaking through referrer headers or other side channels. Mitigations include encrypted request objects (RFC 9101) or end-to-end encrypted transmission via PAR (RFC 9126) with `request_uri`.
section: "13"
topics:
