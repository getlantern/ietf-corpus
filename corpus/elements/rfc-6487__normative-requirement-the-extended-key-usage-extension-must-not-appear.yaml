document: rfc-6487
kind: normative-requirement
summary: The Extended Key Usage extension MUST NOT appear in any CA certificate in the RPKI, and MUST NOT appear in EE certificates used to verify RPKI objects such as ROAs or manifests. The extension MAY appear in EE certificates issued to routers or other devices.
section: 4.8.5
rfc2119_level: MUST NOT
topics:
    - pkix
