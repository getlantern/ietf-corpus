document: rfc-4974
kind: normative-requirement
summary: If a Notify teardown request (D bit set) is received for a Call that still has existing LSP Connections, the request MUST be rejected with Error Code 'Call Management' and Error Value 'Connections Still Exist'. The state of the Call MUST NOT be changed.
section: 6.6.4
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
