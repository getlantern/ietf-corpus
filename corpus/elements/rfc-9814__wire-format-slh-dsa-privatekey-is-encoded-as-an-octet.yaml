document: rfc-9814
kind: wire-format
summary: SLH-DSA-PrivateKey is encoded as an OCTET STRING of SIZE (64 | 96 | 128) bytes for the 128-bit, 192-bit, and 256-bit security levels respectively. No additional ASN.1 wrapping is applied when it appears in the PrivateKeyInfo field of an Asymmetric Key Package.
