document: rfc-6416
kind: security-consideration
summary: RTP packets using this payload format require confidentiality (via RTP payload encryption), integrity protection, and source authentication. SRTP (RFC 3711) is recommended where suitable; IPsec (RFC 4301) and TLS (RFC 5246) are also cited as alternatives.
