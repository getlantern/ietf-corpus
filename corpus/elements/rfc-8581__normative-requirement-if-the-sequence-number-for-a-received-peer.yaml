document: rfc-8581
kind: normative-requirement
summary: If the sequence number for a received peer report is greater than the sequence number stored in the matching OCS entry, the reacting node MUST update the matching OCS entry; if less than or equal, it MUST silently ignore the received peer report and MUST NOT update the OCS.
section: 6.2.3
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
