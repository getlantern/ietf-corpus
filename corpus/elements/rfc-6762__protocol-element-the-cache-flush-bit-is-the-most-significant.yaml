document: rfc-6762
kind: protocol-element
summary: The cache-flush bit is the most significant bit of the rrclass field in resource records within the Answer Section of a response. When set, it instructs neighboring caches to flush all records with the same name, rrtype, and rrclass that were received more than one second ago.
section: "10.2"
topics:
    - dns
    - zeroconf
