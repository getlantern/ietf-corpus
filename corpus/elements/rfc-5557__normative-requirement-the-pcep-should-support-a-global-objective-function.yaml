document: rfc-5557
kind: normative-requirement
summary: The PCEP SHOULD support a Global Objective Function (GOF) field, a Global Constraints (GC) field, and a Global Concurrent Vector (GCV) field. The list of available global objective functions SHOULD include at minimum MBC, MLL, and MCC, and SHOULD be expandable for future addition.
section: "4"
rfc2119_level: SHOULD
topics:
