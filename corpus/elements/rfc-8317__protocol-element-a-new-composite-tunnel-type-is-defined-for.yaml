document: rfc-8317
kind: protocol-element
summary: A new composite tunnel type is defined for the PMSI Tunnel attribute by setting the high-order (most significant) bit of the Tunnel Type field. When set, the Tunnel Identifier field begins with a three-octet Ingress Replication label followed by the actual transmit tunnel identifier, allowing a Root PE to simultaneously signal a P2MP transmit tunnel and an Ingress Replication receive tunnel.
section: "6.2"
topics:
    - routing
    - mpls
    - multicast
