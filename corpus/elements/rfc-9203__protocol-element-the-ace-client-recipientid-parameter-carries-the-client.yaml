summary: The ace_client_recipientid parameter carries the client's chosen OSCORE Recipient ID (ID1) in the POST to authz-info; ace_server_recipientid carries the RS's chosen Recipient ID (ID2) in the 2.01 Created response. These become the Sender/Recipient IDs in the derived OSCORE security context.
