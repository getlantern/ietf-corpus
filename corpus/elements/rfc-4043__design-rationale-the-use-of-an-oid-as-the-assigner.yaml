document: rfc-4043
kind: design-rationale
summary: The use of an OID as the assigner field allows any organization (government, corporation, etc.) to be an Assigner Authority by obtaining an OID through standard registration mechanisms (IANA Private Enterprise Numbers, ISO member bodies, or ICD from BSI), enabling global uniqueness without centralized CA coordination.
