document: rfc-9443
kind: protocol-element
summary: 'The document describes three primary use cases for port multiplexing: (1) WebRTC peer-to-peer with SRTP keyed via DTLS-SRTP, requiring SRTP/SRTCP + STUN + TURN + DTLS + QUIC on one port; (2) SRTP keyed via future QUIC-SRTP, requiring SRTP/SRTCP + STUN + TURN + QUIC; (3) RTP/RTCP carried over QUIC, requiring STUN + TURN + QUIC.'
section: "1"
topics:
