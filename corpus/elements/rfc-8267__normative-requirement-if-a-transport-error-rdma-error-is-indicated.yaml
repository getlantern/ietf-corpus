document: rfc-8267
kind: normative-requirement
summary: If a transport error (RDMA_ERROR) is indicated before or instead of a disconnect, the requester MUST respond to that error as prescribed by the RPC transport specification; then NFS version 4 retransmission rules apply.
section: 6.7.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
