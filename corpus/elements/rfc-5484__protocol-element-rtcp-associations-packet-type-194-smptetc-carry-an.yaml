document: rfc-5484
kind: protocol-element
summary: RTCP associations (packet type 194, SMPTETC) carry an RTP timestamp and an SMPTE time-code establishing the start of a calculable run. The mapping applies to all RTP times from the given timestamp onward until superseded by a later RTCP packet.
section: "6.3"
topics:
