document: rfc-9047
kind: security-consideration
summary: 'The I (Immutable ARP/ND Binding) flag serves as a security tool against ARP/ND spoofing: when an IP->MAC is marked immutable, gratuitous ARPs or unsolicited NAs with a different MAC for that IP will not update the ARP/ND or proxy-ARP/ND tables on remote PEs.'
section: "4"
topics:
    - security
    - routing
