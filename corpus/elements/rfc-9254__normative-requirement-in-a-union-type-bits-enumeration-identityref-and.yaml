document: rfc-9254
kind: normative-requirement
summary: In a union type, bits, enumeration, identityref, and instance-identifier MUST be enclosed by their respective CBOR tags (43, 44, 45, 46) to avoid ambiguity when different YANG datatypes share the same CBOR major type.
section: "6.12"
rfc2119_level: MUST
