document: rfc-7916
kind: security-consideration
summary: The policy mechanism introduced in this document does not introduce new security considerations relative to RFC 5286. All alternate candidates are already eligible per RFC 5286, and the policy is derived from the router's own trusted configuration and from the trusted IGP, so no new attack surface is created.
