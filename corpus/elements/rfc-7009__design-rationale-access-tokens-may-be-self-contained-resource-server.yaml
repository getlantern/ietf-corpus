document: rfc-7009
kind: design-rationale
summary: Access tokens may be self-contained (resource server needs no authorization server interaction) or handle-based (resource server must query authorization server). Immediate revocation of self-contained tokens requires non-standardized backend interaction, making short-lived access tokens a practical alternative.
section: "3"
topics:
    - oauth
    - security
