document: rfc-4439
kind: protocol-element
summary: T11FabricIndex is a textual convention (Unsigned32, range 0..4095) used to uniquely identify a Fabric within one or more physical infrastructures. In FC-SW-3 environments exactly one Fabric exists per infrastructure so the value is always 1; FC-SW-4 allows multiple Virtual Fabrics with distinct indices. The range 0..4095 matches FC-SW-4's 512-byte VF_ID Bitmap.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
