document: rfc-2564
kind: design-rationale
summary: 'A ''service'' is explicitly distinguished from a ''protocol'': a service is identified by an associated set of resources and a reasonably long-lived server or client process, so SMTP and HTTP providers are appropriate candidates while transient services like finger typically are not.'
section: "4.1"
