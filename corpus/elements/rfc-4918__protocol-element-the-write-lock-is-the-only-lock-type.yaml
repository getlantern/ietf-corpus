document: rfc-4918
kind: protocol-element
summary: The write lock is the only lock type defined in this specification. It protects changes to resource variants, dead properties, lockable live properties, collection internal member URIs, and the lock-root mapping. Methods affected include PUT, POST, PROPPATCH, LOCK, UNLOCK, MOVE, COPY (destination), DELETE, and MKCOL.
