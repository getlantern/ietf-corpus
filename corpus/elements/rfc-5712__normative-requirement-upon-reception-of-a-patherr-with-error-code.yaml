document: rfc-5712
kind: normative-requirement
summary: Upon reception of a PathErr with Error Code 'Reroute' and Error Value 'Reroute Request Soft Preemption', the head-end LSR MAY update the working copy of the TE-DB and MAY reduce or zero available bandwidth for the implied priority range before computing a new path.
