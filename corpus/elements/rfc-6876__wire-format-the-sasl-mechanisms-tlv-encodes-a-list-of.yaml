document: rfc-6876
kind: wire-format
summary: The SASL Mechanisms TLV encodes a list of mechanisms, each as a 5-bit Reserved field, 3-bit Mech Len, and a 1–20 byte Mechanism Name (no padding). The SASL Result TLV carries a 16-bit Result Code (0=Success, 1=Failure, 2=Abort, 3=Mechanism Failure) followed by optional variable-length result data.
section: 3.8.7
