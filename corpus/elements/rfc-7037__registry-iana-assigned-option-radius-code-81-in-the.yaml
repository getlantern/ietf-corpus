document: rfc-7037
kind: registry
summary: IANA assigned OPTION_RADIUS (code 81) in the 'DHCP Option Codes' registry. IANA also created a new registry 'RADIUS Attributes Permitted in DHCPv6 RADIUS Option' under the DHCPv6 registry, with an Expert Review allocation policy. Initial entries include Vendor-Specific (26), Delegated-IPv6-Prefix (123), DS-Lite-Tunnel-Name (144), Framed-IPv6-Address (168), DNS-Server-IPv6-Address (169), Delegated-IPv6-Prefix-Pool (171), and Stateful-IPv6-Address-Pool (172).
section: "9"
