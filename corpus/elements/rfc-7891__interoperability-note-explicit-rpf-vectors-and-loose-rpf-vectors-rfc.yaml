document: rfc-7891
kind: interoperability-note
summary: Explicit RPF Vectors and loose RPF Vectors (RFC 5496) can be mixed in the same PIM Join Attribute list, allowing part of a multicast tree to follow an explicit path while other parts are loosely routed. RPF Vectors are processed in the order they appear.
section: "6"
topics:
