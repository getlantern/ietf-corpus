document: rfc-8139
kind: normative-requirement
summary: Port-Shutdown messages SHOULD be sent with the highest priority (priority 7) and SHOULD NOT be marked drop-eligible. The default is two copies separated by 20 milliseconds, configurable to 1–3 copies and 0–1,000 ms delay.
section: "6.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
