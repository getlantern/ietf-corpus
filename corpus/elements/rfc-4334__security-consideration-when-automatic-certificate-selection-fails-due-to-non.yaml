document: rfc-4334
kind: security-consideration
summary: When automatic certificate selection fails due to non-unique SSIDs, sequentially trying each certificate discloses the list of SSIDs associated with each certificate. It is RECOMMENDED that sequential certificate trials only be employed when user selection is unavailable or impractical.
section: "5"
topics:
    - pkix
    - security
    - privacy
