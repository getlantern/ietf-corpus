document: rfc-5624
kind: registry
summary: IANA created a QoS profile registry for the 64-bit field (4-octet vendor + 4-octet specifier). When vendor is 0x00000000, specifier values 0-511 require Standards Action, 512-32767 require Specification Required, and 32768-4294967295 are Reserved. Value 0 is allocated for the QoS profile defined in this document.
section: "5.2"
topics:
    - registry
    - qos
    - diameter
