document: rfc-6570
kind: normative-requirement
summary: In all expression types except reserved ("+") and fragment ("#"), a value character of "%" MUST be pct-encoded as "%25" by variable expansion. Reserved and fragment expansions allow "%" as part of pct-encoded triplets to pass through unencoded.
section: 3.2.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
