document: rfc-6647
kind: interoperability-note
summary: When a domain has multiple inbound MTA servers that do not share a greylisting database, a client greylisted by one server may retry to another and be greylisted again, amplifying delivery delays rather than resolving them for otherwise legitimate senders.
section: "4.1"
topics:
    - email
