document: rfc-6681
kind: normative-requirement
summary: The source packet flow processed by the FEC encoder MUST have consecutive sequence numbers; if a gap exists, implementors SHOULD insert a compliant dummy ADU that the application ignores with high probability.
section: 8.2.2
rfc2119_level: MUST
