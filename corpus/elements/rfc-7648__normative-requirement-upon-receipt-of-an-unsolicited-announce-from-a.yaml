document: rfc-7648
kind: normative-requirement
summary: Upon receipt of an unsolicited ANNOUNCE from a PCP server indicating a change, the PCP proxy MUST generate unsolicited ANNOUNCE message(s) to appropriate PCP clients; if no change is detected, no unsolicited ANNOUNCE is generated downstream.
section: "3.5"
rfc2119_level: MUST
topics:
