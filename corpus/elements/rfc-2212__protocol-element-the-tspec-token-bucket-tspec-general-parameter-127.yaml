summary: 'The TSpec (TOKEN_BUCKET_TSPEC, general parameter 127) specifies a flow''s traffic using: token bucket rate r (bytes/sec), bucket depth b (bytes), peak rate p (bytes/sec), minimum policed unit m (bytes), and maximum datagram size M (bytes). Both r and b MUST be positive; m MUST be <= M.'
