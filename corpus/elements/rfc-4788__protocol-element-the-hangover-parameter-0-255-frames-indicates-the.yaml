document: rfc-4788
kind: protocol-element
summary: The hangover parameter (0–255 frames) indicates the number of consecutive silence frames transmitted at the end of an active speech interval before DTX begins; default is 1 frame. It is RECOMMENDED that hangover be set to 1 or greater to help the receiver identify the start of the DTX period.
section: "6.1"
topics:
    - realtime
    - rtp
    - voip
