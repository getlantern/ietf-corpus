document: rfc-7888
kind: normative-requirement
summary: The protocol receiver of an IMAP server MUST check the end of every received line for the pattern '{' octet-count '+' '}' immediately preceding the CRLF, and MUST treat the specified number of following octets and the following line as part of the same command.
section: "3"
rfc2119_level: MUST
topics:
    - email
