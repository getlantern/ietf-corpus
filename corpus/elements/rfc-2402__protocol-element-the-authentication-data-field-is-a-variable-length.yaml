document: rfc-2402
kind: protocol-element
summary: The Authentication Data field is a variable-length field containing the Integrity Check Value (ICV). It must be an integral multiple of 32 bits and may include explicit padding to ensure the AH header is a multiple of 32 bits (IPv4) or 64 bits (IPv6).
section: "2.6"
topics:
