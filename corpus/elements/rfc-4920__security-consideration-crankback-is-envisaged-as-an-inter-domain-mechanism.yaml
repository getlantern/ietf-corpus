document: rfc-4920
kind: security-consideration
summary: Crankback is envisaged as an inter-domain mechanism, and crankback information exchanged over trust domain borders is expected to be of little or no value and likely ignored. Reporting domains should apply information aggregation to preserve confidentiality of network topology. A malicious domain could report that neither it nor its downstream neighbor can provide a path, but this may be detected using indirect path computation via PCE (RFC 4655).
section: "9"
topics:
    - mpls
    - routing
    - security
