document: rfc-8861
kind: normative-requirement
summary: Each member of an RTCP Reporting Group SHOULD send RTP/AVPF feedback and codec control messages independently (using its own SSRC) to preserve the semantic meaning of the message sender. An endpoint MAY consolidate feedback through the reporting source when the sender identity is not semantically significant.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
