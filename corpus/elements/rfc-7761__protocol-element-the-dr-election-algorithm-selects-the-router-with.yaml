document: rfc-7761
kind: protocol-element
summary: The DR election algorithm selects the router with the numerically highest DR Priority (32-bit unsigned) as DR; highest IP address breaks ties. Priority-based election is only used when all neighbors on the interface advertise the DR Priority option; otherwise, highest IP address alone determines the DR.
section: 4.3.2
topics:
    - multicast
    - routing
