document: rfc-3820
kind: protocol-element
summary: id-ppl-anyLanguage (OID 1.3.6.1.5.5.7.21.0) is a special value that may appear in the acceptable-pc-policy-language-set input to the path validation algorithm, indicating that policy language checking is deferred to the authorization layer rather than enforced during path validation.
