document: rfc-7633
kind: design-rationale
summary: The constraint propagation from a Certificate Signing Certificate's TLS feature extension to its issued certificates (requiring the same or superset of features) provides a means of enforcing feature support across a CA's certificate hierarchy without requiring TLS clients to verify compliance in multiple certificates.
section: 4.2.2
topics:
