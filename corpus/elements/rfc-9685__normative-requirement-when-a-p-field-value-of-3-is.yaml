document: rfc-9685
kind: normative-requirement
summary: When a P-Field value of 3 is received in an EARO or EDAR, the message MUST be dropped; the receiving node MAY reply with a status of 12 'Invalid Registration' or remain silent. When received in an RTO, the value MUST be ignored and the message processed normally.
section: "6.5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
