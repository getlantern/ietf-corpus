document: rfc-6015
kind: wire-format
summary: 'The FEC header is 16 octets: SN base low (16 bits), Length recovery (16 bits), E bit (1 bit), PT recovery (7 bits), Mask (24 bits), TS recovery (32 bits), N bit (1 bit), D bit (1 bit), Type (3 bits), Index (4 bits), Offset (8 bits), NA (8 bits), SN base ext (8 bits). Offset carries L (columns) and NA carries D (rows).'
