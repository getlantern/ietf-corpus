document: rfc-7356
kind: normative-requirement
summary: Receipt of an FS-PSNP with U=1 MUST cause the SRM bit to be cleared for all FS-LSPs with the matching scope currently marked for flooding on that circuit, suppressing retransmissions to a neighbor that cannot process that scope.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
