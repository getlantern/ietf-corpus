document: rfc-9431
kind: interoperability-note
summary: MQTT v3.1.1 lacks PUBACK reason codes and server-side DISCONNECT packets, so authorization errors in that version result in silent disconnection at the network layer rather than application-layer error reporting; token management is therefore more demanding for v3.1.1 clients.
section: "6.2"
topics:
    - oauth
    - security
