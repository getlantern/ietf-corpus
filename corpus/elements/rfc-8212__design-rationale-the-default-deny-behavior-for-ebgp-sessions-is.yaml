document: rfc-8212
kind: design-rationale
summary: The default-deny behavior for EBGP sessions is introduced because many deployed BGP speakers historically send and accept any and all route announcements by default, a permissive practice dating to the early Internet that now poses significant risks as the Internet has become more densely interconnected.
section: "1"
topics:
