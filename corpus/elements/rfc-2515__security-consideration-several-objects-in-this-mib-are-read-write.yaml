document: rfc-2515
kind: security-consideration
summary: Several objects in this MIB are read-write or read-create (e.g., atmInterfaceMaxVpcs, atmVplAdminStatus, atmVclAdminStatus, traffic descriptor parameters), meaning unauthorized write access could allow modification or teardown of ATM virtual connections and disruption of network service. The SNMPv3 framework with authentication and privacy is recommended to protect access to these objects.
section: "12"
topics:
    - snmp
    - security
