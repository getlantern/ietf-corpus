document: rfc-9921
kind: protocol-element
summary: The 3161-ctt COSE unprotected header parameter carries a DER-encoded RFC 3161 TimeStampToken (TST) bstr-wrapped in CBOR (Major type 2). It is used in CTT mode, where the COSE message is signed first and then its signature field is submitted to the TSA.
