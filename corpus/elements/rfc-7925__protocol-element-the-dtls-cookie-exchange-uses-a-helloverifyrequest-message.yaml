document: rfc-7925
kind: protocol-element
summary: The DTLS cookie exchange uses a HelloVerifyRequest message containing a stateless cookie sent by the server, which must be returned in the client's subsequent ClientHello. While optional for the server to initiate, clients MUST be prepared to respond to it to resist flooding/DoS attacks.
section: "4.2"
topics:
    - tls
    - udp
    - security
