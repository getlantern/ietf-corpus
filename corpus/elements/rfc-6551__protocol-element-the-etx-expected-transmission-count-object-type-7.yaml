document: rfc-6551
kind: protocol-element
summary: The ETX (Expected Transmission Count) object (type 7) encodes the expected number of transmissions needed to successfully deliver a packet to a neighbor. ETX may be computed as 1/(Df*Dr), though no specific formula is mandated. It may be used as a constraint or an aggregated additive path metric.
section: 4.3.2
topics:
    - routing
