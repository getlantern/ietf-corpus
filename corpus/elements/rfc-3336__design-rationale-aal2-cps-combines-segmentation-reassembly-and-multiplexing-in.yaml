document: rfc-3336
kind: design-rationale
summary: AAL2 CPS combines segmentation, reassembly, and multiplexing in a single layer; a receiver extracts each CPS-PKT as soon as it arrives without waiting for a full multiplexed frame, reducing latency and limiting cell-loss damage to only the packets in the lost cell.
section: "5.2"
