document: rfc-3038
kind: protocol-element
summary: A transparent point-to-point link requires no VCID notification because the VPI/VCI label is the same at each end. For VP links, inband notification, VPID notification, or no notification may be used. PVCs always use inband notification. SVCs may use outband, outband with small-sized field, or inband notification.
section: "2.1"
topics:
    - mpls
