document: rfc-5621
kind: interoperability-note
summary: Because UACs receiving a response cannot report errors to the UAS (error responses can only be generated for requests), SIP extension authors must ensure requests clearly indicate UAC capabilities (e.g., via option-tags) so UASs can decide what to include in their responses.
