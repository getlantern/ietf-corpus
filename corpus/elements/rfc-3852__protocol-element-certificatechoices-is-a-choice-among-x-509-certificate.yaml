document: rfc-3852
kind: protocol-element
summary: CertificateChoices is a CHOICE among X.509 Certificate, obsolete ExtendedCertificate, deprecated v1AttrCert, v2AttrCert (X.509-2000), and OtherCertificateFormat (OID plus ANY value). The OtherCertificateFormat extension point allows CMS to carry non-X.509 certificate formats without further specification changes.
section: 10.2.2
