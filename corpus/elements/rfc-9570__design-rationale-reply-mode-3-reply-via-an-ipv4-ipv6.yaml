document: rfc-9570
kind: design-rationale
summary: Reply Mode 3 ('Reply via an IPv4/IPv6 UDP packet with Router Alert') was removed because the RAO does not clearly increase return-path reliability and may actually decrease it due to the additional processing burden it imposes. No implementations of Mode 3 were reported.
section: "2.2"
topics:
    - mpls
