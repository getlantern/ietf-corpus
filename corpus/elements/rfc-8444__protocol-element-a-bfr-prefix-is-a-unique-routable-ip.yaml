document: rfc-8444
kind: protocol-element
summary: A BFR-prefix is a unique routable IP address within a BIER domain assigned to each BFR. All BIER-specific information advertised to other BFRs is associated with this BFR-prefix, which is carried in the OSPFv2 Extended Prefix Opaque LSA.
