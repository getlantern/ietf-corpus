document: rfc-2630
kind: wire-format
summary: When signedAttributes are present, the message digest is computed over the DER encoding of SignedAttributes but with the IMPLICIT [0] tag replaced by an EXPLICIT SET OF tag; the tag and length octets of the eContent OCTET STRING are excluded from the digest.
