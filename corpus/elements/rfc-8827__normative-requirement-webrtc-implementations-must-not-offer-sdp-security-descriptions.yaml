document: rfc-8827
kind: normative-requirement
summary: WebRTC implementations MUST NOT offer SDP security descriptions (RFC 4568) or select it if offered. An SRTP Master Key Identifier (MKI) MUST NOT be used. DTLS-SRTP MUST be offered for every media channel.
section: "6.5"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
