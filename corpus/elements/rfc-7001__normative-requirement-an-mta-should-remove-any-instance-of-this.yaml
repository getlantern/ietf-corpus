document: rfc-7001
kind: normative-requirement
summary: An MTA SHOULD remove any instance of this header field bearing a version it does not support, but MUST remove such a header field if the SMTP connection relaying the message is not from a trusted internal MTA. This requires MTAs to understand all header field versions used by consumers within their ADMD.
section: "5"
rfc2119_level: MUST
topics:
    - email
