document: rfc-8935
kind: design-rationale
summary: Earlier versions made TLS optional and described unencrypted-transport considerations. The working group decided to mandate HTTP over TLS and moved the unencrypted considerations to a non-normative appendix, reflecting that SET confidentiality cannot be reliably ensured without TLS.
section: A
topics:
    - tls
    - security
    - privacy
