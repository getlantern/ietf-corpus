document: rfc-6363
kind: protocol-element
summary: An Application Data Unit (ADU) is the unit of source data provided as payload to the transport layer. An ADU flow is a sequence of ADUs associated with a transport-layer flow identified by the standard 5-tuple {source IP address, source port, destination IP address, destination port, transport protocol}.
