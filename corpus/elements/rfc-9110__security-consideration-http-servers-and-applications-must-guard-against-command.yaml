document: rfc-9110
kind: security-consideration
summary: HTTP servers and applications must guard against command injection, code injection, and query injection when request data (path, query, headers, field values) is used to construct system calls, database queries, or scripts. Client-side script injection (XSS) arises when user-supplied content is reflected in responses without sanitization.
section: "17.4"
topics:
    - http
    - security
