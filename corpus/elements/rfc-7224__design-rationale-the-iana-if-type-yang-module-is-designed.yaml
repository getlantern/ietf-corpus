document: rfc-7224
kind: design-rationale
summary: The iana-if-type YANG module is designed to mirror the IANA 'ifType definitions' registry in exactly the same way that the IANAifType-MIB reflects the same registry. This provides a YANG-native equivalent to the existing MIB for use with NETCONF-based management.
section: "1"
topics:
