document: rfc-7647
kind: interoperability-note
summary: Certain specialized environments (e.g., 3GPP) use out-of-signaling agreements and media feature tags to suppress implicit subscriptions for in-dialog REFER with RFC 4488, but this does not prevent additional dialog usages when interoperating with non-supporting implementations; RFC 7614 provides a standardized alternative.
