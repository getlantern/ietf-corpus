document: rfc-5951
kind: normative-requirement
summary: The MPLS-TP NE MUST support hardware-related supervision for interchangeable and non-interchangeable units, cable, and power problems, and MUST support software supervision for processing faults, storage capacity, version mismatch, corrupted data, and out-of-memory conditions.
