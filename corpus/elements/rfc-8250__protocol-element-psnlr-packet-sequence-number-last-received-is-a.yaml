document: rfc-8250
kind: protocol-element
summary: PSNLR (Packet Sequence Number Last Received) is a 16-bit unsigned integer initialized to 0. It carries the PSNTP value of the last packet received on the 5-tuple, enabling the receiver to correlate DELTATLR with the specific packet it received.
