document: rfc-8615
kind: design-rationale
summary: This specification does not define how to determine the hostname for a well-known URI or the scope of discovered metadata; both are intentionally left to individual applications. Leaving scope undefined at the base level avoids encoding assumptions about inter-host relationships.
section: "3"
topics:
    - http
