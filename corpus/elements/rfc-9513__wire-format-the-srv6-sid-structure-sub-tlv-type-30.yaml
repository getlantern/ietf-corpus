kind: wire-format
summary: 'The SRv6 SID Structure sub-TLV (Type=30, Length=4) encodes four 1-octet fields: LB Length (Locator Block bits), LN Length (Locator Node bits), Function Length (Function bits), and Argument Length (Argument bits). The sum of all four MUST be ≤ 128.'
