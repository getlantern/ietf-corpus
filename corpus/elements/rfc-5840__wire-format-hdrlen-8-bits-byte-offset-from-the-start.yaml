document: rfc-5840
kind: wire-format
summary: 'HdrLen (8 bits): Byte offset from the start of the WESP header to the Rest of Payload Data within the encapsulated ESP header. MUST be zero when using ESP with encryption. For integrity-only ESP, invalid values include any value less than 12, any non-multiple of 4, and any non-multiple of 8 when using IPv6.'
section: "2"
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
