document: rfc-9171
kind: wire-format
summary: The dtn-scheme EID encodes its SSP as a CBOR text string, except 'dtn:none' (the null endpoint) whose SSP SHALL be encoded as CBOR unsigned integer zero. The null endpoint identifies an endpoint that by definition never has any members.
section: 4.2.5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
