document: rfc-7781
kind: security-consideration
summary: Because deployed LAALPs are proprietary and may lack authentication, a rogue RBridge that joins an active-active edge group can disrupt traffic. It could control approximately 1/N of unicast traffic flowing into or out of the group, all multi-destination traffic in VLANs for which it becomes DF, and could manipulate DF election by changing its System ID.
section: "12"
topics:
    - security
    - routing
