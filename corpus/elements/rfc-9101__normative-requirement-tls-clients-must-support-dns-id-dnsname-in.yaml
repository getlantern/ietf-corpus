document: rfc-9101
kind: normative-requirement
summary: TLS clients MUST support DNS-ID (dNSName in subjectAltName) for server certificate verification. Clients MUST NOT use CN-ID identifiers for authentication. SRV-ID and URI-ID MUST NOT be used for comparison.
section: "8"
rfc2119_level: MUST
topics:
