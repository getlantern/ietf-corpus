document: rfc-6454
kind: security-consideration
summary: Many older technologies (e.g., cookies) predate the web origin concept and use different isolation units, leading to vulnerabilities. Using registry-controlled domains as the isolation unit is problematic due to inconsistent public suffix lists and incompatibility with non-DNS URI schemes.
section: "8.2"
topics:
    - security
    - dns
