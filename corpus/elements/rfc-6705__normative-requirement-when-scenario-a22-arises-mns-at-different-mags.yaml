document: rfc-6705
kind: normative-requirement
summary: When Scenario A22 arises (MNs at different MAGs with different LMAs), the initiator of LR MUST tear it down to prevent lasting packet loss. Use of localized routing is NOT RECOMMENDED for packet-loss-sensitive applications in deployments where A22 is possible.
section: "8"
rfc2119_level: MUST NOT
topics:
    - mobility
