document: rfc-2959
kind: normative-requirement
summary: A host RTP agent MUST create a read-only row in rtpSessionTable for each session on which packets are being sent or received, and rows MUST be created at the start of a session when one or more senders or receivers are observed.
section: "3"
rfc2119_level: MUST
topics:
