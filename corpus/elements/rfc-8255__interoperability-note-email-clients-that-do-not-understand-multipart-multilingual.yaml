document: rfc-8255
kind: interoperability-note
summary: Email clients that do not understand 'multipart/multilingual' will treat it as 'multipart/mixed' per RFC 2046 Sections 5.1.3 and 5.1.7, rendering all parts sequentially or as attachments. Systems that do not follow this fallback requirement are also non-compliant with MIME.
