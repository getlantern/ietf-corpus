document: rfc-7117
kind: design-rationale
summary: Ingress replication for VPLS multicast causes highly non-optimal bandwidth utilization when a large amount of multicast/broadcast traffic is transported, because the ingress PE must replicate each packet for every egress PE in the VPLS instance and send it via unicast tunnels. P2MP trees in the SP network overcome this limitation.
section: "1"
topics:
    - mpls
    - multicast
