document: rfc-4588
kind: interoperability-note
summary: For session-multiplexing, SDP MUST use FID (Flow Identification) semantics from RFC 3388 to group the original and retransmission session "m" lines. The exception is when there is exactly one original/retransmission pair, in which case FID grouping MAY be omitted.
section: "8.7"
topics:
    - rtp
    - realtime
