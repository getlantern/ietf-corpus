document: rfc-8417
kind: privacy-consideration
summary: SET issuers SHOULD attempt to specialize SETs so their content is targeted to the specific needs of intended recipients. When sharing personally identifiable information, SET issuers and recipients should have appropriate legal agreements and user consent in place. Where possible, subject identifiers should use salted hash values rather than direct identifiers.
section: "6"
topics:
    - privacy
    - security
    - oauth
