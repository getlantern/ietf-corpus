document: rfc-6096
kind: interoperability-note
summary: When defining a new chunk flag, it must be considered that implementations not supporting that flag will send '0' for it on transmit and simply ignore it on receipt. This backward-compatibility constraint is a required part of all chunk flag documentation.
section: "3.2"
topics:
    - sctp
