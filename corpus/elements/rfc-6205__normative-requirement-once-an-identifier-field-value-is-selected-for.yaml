document: rfc-6205
kind: normative-requirement
summary: Once an Identifier field value is selected for an LSP, it MUST NOT change until the LSP is torn down, and the value MUST be used in all LSP-related messages (e.g., Resv messages and label RRO subobjects).
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
