document: rfc-3042
kind: interoperability-note
summary: The Rate-Halving congestion control algorithm uses a related form of limited transmit, transmitting a data segment on every second duplicate ACK. Unlike Limited Transmit, Rate-Halving decouples the decision of what to send from when to send.
