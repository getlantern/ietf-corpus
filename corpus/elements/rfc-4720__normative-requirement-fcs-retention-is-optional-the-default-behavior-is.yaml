document: rfc-4720
kind: normative-requirement
summary: FCS retention is OPTIONAL. The default behavior is that the FCS is removed at the ingress PE and regenerated at the egress PE. This capability applies only to Ethernet pseudowires in raw mode, Frame Relay pseudowires in port mode, and HDLC and PPP pseudowires.
section: "1"
rfc2119_level: OPTIONAL
topics:
    - mpls
