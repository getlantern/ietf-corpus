document: rfc-5709
kind: security-consideration
summary: No automated key management has been standardized for OSPF as of publication. Common practice of using the same key for very long periods is undesirable; deploying automated key management is strongly recommended to prevent sequence number reuse and replay attacks.
section: "4"
topics:
