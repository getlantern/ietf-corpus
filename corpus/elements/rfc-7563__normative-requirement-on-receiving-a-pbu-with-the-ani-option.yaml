document: rfc-7563
kind: normative-requirement
summary: On receiving a PBU with the ANI option, the LMA MUST process the option and update the corresponding fields in the Binding Cache entry. If the option is not understood, the LMA skips it and processes the PBU without those options.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
