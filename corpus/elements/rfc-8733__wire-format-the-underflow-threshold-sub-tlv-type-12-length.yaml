document: rfc-8733
kind: wire-format
summary: The Underflow-Threshold Sub-TLV (Type=12, Length=8) encodes a 5-bit Count field and a 4-octet IEEE 754 absolute threshold. The Underflow-Threshold-Percentage Sub-TLV (Type=13, Length=8) encodes a 7-bit Percentage, Count, and Minimum-Threshold. When the underflow condition is met consecutively for Count samples, the LSP bandwidth is immediately downsized, bypassing the Down-Adjustment-Interval.
section: 5.2.5.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
