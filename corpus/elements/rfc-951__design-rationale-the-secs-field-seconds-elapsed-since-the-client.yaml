document: rfc-951
kind: design-rationale
summary: 'The ''secs'' field (seconds elapsed since the client started booting) serves as an implicit priority signal: as the value grows, servers that do not normally service a client ''may feel more sympathetic'', allowing fallback server behavior without explicit protocol negotiation.'
