document: rfc-5132
kind: security-consideration
summary: Read-only objects such as routing table entries, forwarding statistics, and local listener information could reveal sensitive network topology details to an attacker. SNMPv3 with authentication and privacy should be used to protect read access as well.
section: "7.3"
