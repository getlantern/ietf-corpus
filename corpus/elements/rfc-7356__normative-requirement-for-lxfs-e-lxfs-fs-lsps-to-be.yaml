document: rfc-7356
kind: normative-requirement
summary: 'For LxFS/E-LxFS FS-LSPs to be usable by the Decision Process, a valid standard LSP #0 from the same IS at the corresponding level MUST be present in the LSDB. Information supporting use of the originating IS as a transit node MUST NOT be used when the Overload bit is set in that standard LSP #0.'
section: "9"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
