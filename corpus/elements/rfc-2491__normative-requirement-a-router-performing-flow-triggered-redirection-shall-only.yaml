document: rfc-2491
kind: normative-requirement
summary: A router performing flow-triggered redirection SHALL only track flows originating from directly attached hosts, SHALL NOT use packets from other routers to trigger Redirects, and SHALL only consider IPv6 packets with FlowID of zero for flow detection purposes.
section: 3.2.1
rfc2119_level: SHALL
topics:
