document: rfc-6530
kind: normative-requirement
summary: Backspace MUST NOT appear in SMTPUTF8 mailbox names. Backspace was permitted by RFC 821 but prohibited by RFC 5321 for ASCII addresses; its prohibition is extended to non-ASCII strings because it is even more problematic for canonicalization and normalization.
section: "10.1"
rfc2119_level: MUST NOT
topics:
    - email
