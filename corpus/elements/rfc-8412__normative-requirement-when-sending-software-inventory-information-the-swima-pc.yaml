document: rfc-8412
kind: normative-requirement
summary: When sending software inventory information, the SWIMA-PC MUST include the complete set of relevant data from all supported sources and MUST NOT attempt to reduce or deduplicate records across sources, even if this results in multiple records for a single installed software instance.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
