document: rfc-6775
kind: design-rationale
summary: Standard RFC 4861 Neighbor Discovery is unsuitable for 6LoWPANs because the network is a Non-Broadcast Multiple Access (NBMA) structure with no LoWPAN-wide multicast, asymmetric and non-transitive radio links, and energy constraints that make periodic multicast RAs and multicast NS messages impractical.
section: "1.1"
topics:
