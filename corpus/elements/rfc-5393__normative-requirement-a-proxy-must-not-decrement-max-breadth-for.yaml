document: rfc-5393
kind: normative-requirement
summary: A proxy MUST NOT decrement Max-Breadth for each hop or otherwise use it to restrict the depth of a request's propagation; Max-Breadth limits concurrent breadth only, not depth (that is Max-Forwards' role).
section: 5.3.3
rfc2119_level: MUST NOT
topics:
    - sip
