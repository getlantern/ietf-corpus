document: rfc-8657
kind: protocol-element
summary: The "accounturi" CAA parameter for the "issue" and "issuewild" Properties identifies a specific CA account by URI. A CA MUST only consider a Property with this parameter to authorize issuance if it recognizes the URI as identifying the requesting account.
