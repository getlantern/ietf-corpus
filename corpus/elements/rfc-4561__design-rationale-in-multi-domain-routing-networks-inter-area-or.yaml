document: rfc-4561
kind: design-rationale
summary: In multi-domain routing networks (inter-area or inter-AS), existing RRO mechanisms cannot unambiguously identify the Merge Point (MP) address because interface addresses in RRO sub-objects differ across domains and the PLR lacks cross-domain IGP topology knowledge. This gap prevents MPLS Fast Reroute from protecting inter-domain TE LSPs against ABR/ASBR failures.
section: "1"
topics:
    - mpls
    - routing
