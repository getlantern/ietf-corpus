document: rfc-8013
kind: security-consideration
summary: The inter-FE LFB is scoped to FEs within the same Network Element, operating in a single administrative private Ethernet LAN. Security is therefore NE-wide; once MACsec is enabled for a chosen security level (Authentication or Confidentiality), it applies for the entire duration of the session.
section: "9"
topics:
    - security
