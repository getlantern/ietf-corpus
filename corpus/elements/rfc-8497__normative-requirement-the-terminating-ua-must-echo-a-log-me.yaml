document: rfc-8497
kind: normative-requirement
summary: The terminating UA MUST echo a 'log me' marker in responses to a SIP request that included a 'log me' marker. Additionally, if the terminating UA has detected that a dialog is being 'log me' marked, it MUST insert a 'log me' marker in any in-dialog SIP requests that it sends.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
