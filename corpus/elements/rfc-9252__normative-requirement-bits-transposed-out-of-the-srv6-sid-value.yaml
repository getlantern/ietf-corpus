document: rfc-9252
kind: normative-requirement
summary: Bits transposed out of the SRv6 SID value into an MPLS Label field MUST be set to 0 in the SID value field of the SRv6 SID Information Sub-TLV, so the receiver can reconstruct the full SID by OR-ing the transposed bits back at the correct offset.
section: 3.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
