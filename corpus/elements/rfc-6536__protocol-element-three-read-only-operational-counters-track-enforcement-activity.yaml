document: rfc-6536
kind: protocol-element
summary: 'Three read-only operational counters track enforcement activity since last restart: denied-operations (RPC authorization failures), denied-data-writes (datastore write denials), and denied-notifications (notifications dropped due to access denial). All are yang:zero-based-counter32 values.'
