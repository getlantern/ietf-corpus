document: rfc-5401
kind: normative-requirement
summary: NACK-based reliable multicast implementations SHOULD make use of Forward Error Correction (FEC) erasure coding techniques as described in RFC 5052. Packet-level erasure coding allows missing packets from a given FEC block to be recovered using parity packets instead of classical, individualized retransmission.
section: "1"
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
