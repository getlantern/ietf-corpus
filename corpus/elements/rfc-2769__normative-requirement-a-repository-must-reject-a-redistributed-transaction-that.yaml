document: rfc-2769
kind: normative-requirement
summary: A repository must reject a redistributed transaction that does not include any 'repository-signature' meta-object. The originating repository must append exactly one 'repository-signature' meta-object following submitted text and auth-dependency objects.
section: "7.3"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
