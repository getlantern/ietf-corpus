document: rfc-9374
kind: security-consideration
summary: Post-quantum cryptography is explicitly out of scope for DRIP due to the severe message size constraints of UAS Broadcast Remote ID. Because a UA may use a unique DET per operation, the attack window is bounded by operation duration. The HHIT Suite ID field allows a future post-quantum algorithm to be added.
section: "9.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
