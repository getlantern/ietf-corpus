document: rfc-3986
kind: interoperability-note
summary: IPv6 and future IP literal addresses in the host subcomponent must be enclosed in square brackets—the only place square brackets are permitted in URI syntax. An application encountering an IPvFuture literal with an unknown version flag should return an "address mechanism not supported" error rather than attempt resolution.
section: 3.2.2
topics:
    - ip
