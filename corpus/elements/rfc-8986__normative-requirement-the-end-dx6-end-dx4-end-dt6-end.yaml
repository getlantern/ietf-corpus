document: rfc-8986
kind: normative-requirement
summary: The End.DX6, End.DX4, End.DT6, End.DT4, End.DT46, End.DX2, End.DX2V, End.DT2U, and End.DT2M SIDs MUST be the last segment in an SR Policy; if Segments Left != 0 upon receipt, the node sends an ICMP Parameter Problem and discards the packet.
