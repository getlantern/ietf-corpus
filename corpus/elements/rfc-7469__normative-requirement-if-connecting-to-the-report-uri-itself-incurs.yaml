document: rfc-7469
kind: normative-requirement
summary: If connecting to the report-uri itself incurs a Pin Validation failure or other certificate validation failure, the UA MUST cancel the connection. The UA SHOULD detect and break reporting loops between mutually-pinned hosts that both fail Pin Validation.
section: 2.1.4
rfc2119_level: MUST
topics:
    - http
    - security
    - tls
