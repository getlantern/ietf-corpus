document: rfc-5571
kind: interoperability-note
summary: If a RADIUS Access-Accept returns a Framed-Interface-Id (RFC 3162), the SC must send it in the IPV6CP Interface-Identifier field. If Framed-IPv6-Prefix is present it must be used in RAs; if absent but Framed-IPv6-Pool is present, the SC must choose a prefix from that pool.
section: 8.1.1
topics:
    - vpn
    - v6ops
    - radius
