document: rfc-9705
kind: state-machine
summary: 'Once a router concludes it is the MP for a RI-RSVP-FRR-capable PLR, it MUST create a ''remote'' path state for the LSP. This remote state is considered automatically deleted upon: receiving a Path message with no matching B-SFRR-Ready object, the Node-ID adjacency going down, receiving backup LSP signaling, receiving a PathTear, or a local policy/exception event.'
section: 4.2.4
topics:
    - mpls
    - routing
