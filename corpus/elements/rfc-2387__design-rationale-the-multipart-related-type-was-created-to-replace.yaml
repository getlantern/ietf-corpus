document: rfc-2387
kind: design-rationale
summary: The Multipart/Related type was created to replace the ad-hoc approach of defining specific multipart subtypes for each new compound object (e.g., MIME-PEM, MIME-Macintosh), providing a single mechanism in keeping with MIME's philosophy of one mechanism for the same goal across different purposes.
