document: rfc-8339
kind: wire-format
summary: 'The P2MP Pseudowire sub-TLV contains: AGI Type (1 octet), AGI Length (1 octet), AGI Value (variable), IP Addr Len (1 octet), and Originating Router''s IP Addr (variable, IPv4 or IPv6 as determined by IP Addr Len). The AGI identifies the VPLS instance; the Originating Router''s IP is the address of the P2MP PW root.'
section: "3.1"
topics:
    - mpls
