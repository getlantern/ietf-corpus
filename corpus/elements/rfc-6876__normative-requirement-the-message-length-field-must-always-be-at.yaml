document: rfc-6876
kind: normative-requirement
summary: The Message Length field MUST always be at least 16 (size of the PT-TLS header). Recipients receiving a Message Length less than 16 SHOULD respond with an Invalid Parameter PT-TLS Error Code.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
