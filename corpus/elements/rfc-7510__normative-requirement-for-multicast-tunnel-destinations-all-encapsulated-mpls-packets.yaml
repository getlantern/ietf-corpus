document: rfc-7510
kind: normative-requirement
summary: For multicast tunnel destinations, all encapsulated MPLS packets within a given tunnel must consistently use either downstream-assigned or upstream-assigned top labels; in the absence of specific knowledge, the label SHOULD be presumed upstream-assigned.
section: "4"
rfc2119_level: SHOULD
topics:
