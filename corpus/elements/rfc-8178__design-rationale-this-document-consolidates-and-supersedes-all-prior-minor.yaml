document: rfc-8178
kind: design-rationale
summary: This document consolidates and supersedes all prior minor versioning rules, including those in RFC 5661 and RFC 7862. Any conflict between extension rules here and those in minor version specification RFCs is resolved in favor of this document, except that already-published minor version protocols take precedence over versioning rules.
