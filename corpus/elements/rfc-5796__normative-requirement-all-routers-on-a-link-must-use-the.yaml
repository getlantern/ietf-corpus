document: rfc-5796
kind: normative-requirement
summary: All routers on a link MUST use the same value for KeyRolloverInterval and MUST initiate the key rollover process within this time period. All routers MUST complete step 1 (add new inbound SA) before any begin step 2, and all MUST complete step 2 before any begin step 3.
section: "9.1"
rfc2119_level: MUST
topics:
    - ipsec
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
