document: rfc-7332
kind: interoperability-note
summary: The Max-Forwards copy-and-decrement requirement applies to dialog-forming and out-of-dialog SIP requests; applying it to in-dialog requests is optional (MAY) but may cause issues with devices that set Max-Forwards based on the number of received Via or Record-Route headers.
section: "5"
topics:
