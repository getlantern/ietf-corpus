document: rfc-8591
kind: security-consideration
summary: S/MIME does not normally protect SIP or MSRP headers, only the body. SIP/MSRP/CPIM headers attached by intermediaries (e.g., RCS application servers) may leak metadata. Implementors should assess whether inserted metadata creates privacy leaks.
section: "12"
topics:
    - sip
    - security
    - privacy
