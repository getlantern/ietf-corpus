document: rfc-4361
kind: interoperability-note
summary: The existing server workaround of treating a missing client identifier as equivalent to a MAC-based identifier does not apply to compliant clients, since compliant clients never use MAC-based identifiers; sites must adopt proper multi-stage DUID coordination instead.
