document: rfc-5316
kind: normative-requirement
summary: Routers or PCEs processing inter-AS TE link advertisements SHOULD NOT use such links to compute paths that exit an AS to a remote ASBR and then immediately re-enter the same AS, except as the result of specific policy configuration.
section: "4"
rfc2119_level: SHOULD NOT
topics:
