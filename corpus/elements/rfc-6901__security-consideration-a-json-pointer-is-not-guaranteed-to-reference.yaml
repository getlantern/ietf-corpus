document: rfc-6901
kind: security-consideration
summary: A JSON Pointer is not guaranteed to reference an actual value within a document. Applications using JSON Pointer should anticipate unresolved pointers and define how they ought to be handled rather than assuming resolution always succeeds.
section: "8"
topics:
