document: rfc-7532
kind: normative-requirement
summary: It MUST be possible for an unprivileged (unauthenticated) user to perform LDAP queries accessing NSDB data, since fileservers perform FSN resolution as an unauthenticated user. All implementations MUST use a schema that includes all named objects with all associated attributes.
section: "4.1"
rfc2119_level: MUST
topics:
    - ldap
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
