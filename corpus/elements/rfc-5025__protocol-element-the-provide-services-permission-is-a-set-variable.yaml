document: rfc-5025
kind: protocol-element
summary: The <provide-services> permission is a set variable controlling watcher visibility into <tuple> service elements. Set members identify services by <class>, <occurrence-id>, <service-uri> (URI equivalence), or <service-uri-scheme> (case-sensitive equality). The special value <all-services> grants access to all service occurrences.
section: 3.3.1.3
topics:
    - sip
    - privacy
