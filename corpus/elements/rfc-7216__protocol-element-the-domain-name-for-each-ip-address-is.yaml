document: rfc-7216
kind: protocol-element
summary: The domain name for each IP address is the name used for a reverse DNS lookup. IPv4 addresses produce names in the '.in-addr.arpa.' tree per RFC 1035 Section 3.5; IPv6 addresses produce names in the '.ip6.arpa.' tree per RFC 3596 Section 2.5.
section: "4.2"
topics:
