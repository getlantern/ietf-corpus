document: rfc-5360
kind: normative-requirement
summary: 'Relays MUST ensure that the SIP PUBLISH or HTTP GET request received was generated by the actual recipient of the translation and not by an attacker. Four authentication methods are available: SIP identity, P-Asserted-Identity, return routability test, or SIP digest.'
section: 5.6.1
rfc2119_level: MUST
topics:
    - sip
    - security
