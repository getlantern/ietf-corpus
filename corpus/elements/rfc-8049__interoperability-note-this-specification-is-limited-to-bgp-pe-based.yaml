document: rfc-8049
kind: interoperability-note
summary: This specification is limited to BGP PE-based VPNs as described in RFC 4026, RFC 4110, and RFC 4364. The service model is not intended for use directly on network elements; implementations must interact with element-level YANG models (BGP, VRF, BFD, etc.) via NETCONF/RESTCONF (RFC 6241, RFC 8040) or CLI. Section 8 discusses interaction with other YANG modules.
section: "8"
topics:
    - yang
    - vpn
    - netconf
    - bgp
