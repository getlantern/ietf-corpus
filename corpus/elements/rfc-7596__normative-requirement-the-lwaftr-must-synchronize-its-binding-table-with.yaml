document: rfc-7596
kind: normative-requirement
summary: The lwAFTR MUST synchronize its binding table with the port-restricted address provisioning process. The lifetime of binding table entries MUST be synchronized with the lifetime of address allocations. If not participating in provisioning, synchronization MUST occur via other methods such as out-of-band static update.
section: "6.1"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
