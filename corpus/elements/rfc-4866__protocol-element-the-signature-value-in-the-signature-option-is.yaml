document: rfc-4866
kind: protocol-element
summary: The signature value in the Signature option is computed over the concatenation of care-of address, correspondent node IP address, and MH data (mobility header plus all options up to and including the last CGA Parameters option), using the signer's private key per the CGA signature generation algorithm. The checksum field is treated as zero during signature calculation.
section: "4.5"
topics:
    - mobility
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
