document: rfc-5324
kind: protocol-element
summary: The T11-FC-SP-TC-MIB (mib-2 175) defines Textual Conventions and Object Identities used across all FC-SP MIB modules, including OIDs for cryptographic algorithms (ENCR_NULL, AES-CBC, AES-CTR, AES-GCM, 3DES, ENCR_NULL_AUTH_AES_GMAC; AUTH_HMAC_MD5_96/128, AUTH_HMAC_SHA1_96/160), and TCs for DH groups (1024–8192 bit), hash functions (MD5, SHA-1), and signature functions (RSA-SHA1).
section: "6.1"
topics:
