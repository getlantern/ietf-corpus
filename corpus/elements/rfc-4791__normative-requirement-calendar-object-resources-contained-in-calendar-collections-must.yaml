document: rfc-4791
kind: normative-requirement
summary: Calendar object resources contained in calendar collections MUST NOT contain more than one type of calendar component (e.g., VEVENT, VTODO), with the exception of VTIMEZONE components, which MUST be specified for each unique TZID parameter value.
section: "4.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
