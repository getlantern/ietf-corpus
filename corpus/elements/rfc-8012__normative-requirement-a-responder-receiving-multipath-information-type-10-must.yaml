document: rfc-8012
kind: normative-requirement
summary: A responder receiving Multipath Information Type {10} MUST validate that IP Multipath Information is included and that Associated Label Multipath Information is omitted (NULL). Any deviation MUST cause the responder to return error code 1 (Malformed echo request received).
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - routing
