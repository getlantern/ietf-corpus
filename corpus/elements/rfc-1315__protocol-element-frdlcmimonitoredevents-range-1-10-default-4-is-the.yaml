document: rfc-1315
kind: protocol-element
summary: frDlcmiMonitoredEvents (range 1..10, default 4) is the number of status polling intervals over which the error threshold is counted. If ErrorThreshold errors occur within MonitoredEvents intervals, the interface is marked down; corresponds to ANSI T1.617-1991 Counter N393.
section: "4.1"
topics:
