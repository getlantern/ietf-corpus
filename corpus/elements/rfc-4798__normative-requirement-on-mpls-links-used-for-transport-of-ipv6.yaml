document: rfc-4798
kind: normative-requirement
summary: On MPLS links used for transport of IPv6 via the 6PE approach that do not support link-specific fragmentation and reassembly, the MTU must be configured to at least 1280 octets plus the encapsulation overhead.
section: "3"
rfc2119_level: MUST
topics:
