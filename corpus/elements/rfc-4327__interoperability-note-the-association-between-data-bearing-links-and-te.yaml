document: rfc-4327
kind: interoperability-note
summary: The association between data-bearing links and TE links is stored in the ifStackTable of IF-MIB (RFC 2863), not in the LMP-MIB itself. The TE link protection role (primary/secondary) for component links is stored in the componentLinkTable of TE-LINK-STD-MIB (RFC 4220).
