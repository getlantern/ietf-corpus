document: rfc-9291
kind: normative-requirement
summary: The YANG data models in this document conform to the Network Management Datastore Architecture (NMDA) defined in RFC 8342. Implementations of the L2NM must support NMDA datastores (configuration and operational state are clearly separated per NMDA conventions).
section: "1"
rfc2119_level: MUST
topics:
    - yang
    - netconf
