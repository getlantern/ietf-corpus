document: rfc-3815
kind: protocol-element
summary: The optional mplsInSegmentLdpLspTable and mplsOutSegmentLdpLspTable map LDP LSPs to the MPLS-LSR-STD-MIB's mplsInSegmentTable and mplsOutSegmentTable respectively. They are indexed by the LDP session triple plus the LSR MIB segment index, and are only required if the LSR MIB segment tables are implemented.
section: 3.5.8
topics:
