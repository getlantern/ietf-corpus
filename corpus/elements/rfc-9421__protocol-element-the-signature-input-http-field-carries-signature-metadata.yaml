document: rfc-9421
kind: protocol-element
summary: The Signature-Input HTTP field carries signature metadata for all signatures on a message. Its value is a Structured Field Dictionary where each key is a signature label and each value is an Inner List of covered component identifier Strings with signature parameters (created, keyid, alg, etc.) as parameters on the Inner List.
section: "4.1"
