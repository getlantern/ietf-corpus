document: rfc-8654
kind: interoperability-note
summary: A BGP UPDATE carrying an extended message may propagate to BGP speakers that do not support Extended Messages; announcements where the attribute set plus NLRI exceeds 4,096 octets may cause lack of reachability on those paths.
