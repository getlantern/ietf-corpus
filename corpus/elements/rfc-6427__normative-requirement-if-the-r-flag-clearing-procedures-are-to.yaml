document: rfc-6427
kind: normative-requirement
summary: If the R-Flag clearing procedures are to be used, the IF_ID TLV MUST be included in the FM message. After initial transmission, the message MUST be retransmitted two more times at one-second intervals, then further retransmissions follow the Refresh Timer value.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
