summary: 'The YANG module ''ietf-schc-compound-ack'' augments the RFC 9363 SCHC YANG data model with two new leaves in the ack-on-error fragmentation mode: ''bitmap-format'' (with identities bitmap-RFC8724 and bitmap-compound-ack, defaulting to bitmap-RFC8724) and ''last-bitmap-compression'' (boolean, default true).'
