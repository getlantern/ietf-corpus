document: rfc-5555
kind: design-rationale
summary: The specification uses Mobile IPv6 exclusively for dual-stack mobility rather than running both Mobile IPv4 and Mobile IPv6 simultaneously, because IPv6's large address space enables globally unique care-of addresses (eliminating NAT for IPv6), and route optimization and dynamic home agent discovery are only available in Mobile IPv6.
