document: rfc-2616
kind: protocol-element
summary: 'HTTP/1.1 defaults to persistent connections, allowing multiple request/response exchanges on a single TCP connection. Either party may signal closure with ''Connection: close''. HTTP/1.0 compatibility requires treating the absence of Connection header as non-persistent.'
section: "8.1"
topics:
    - http
    - tcp
