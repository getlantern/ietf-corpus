document: rfc-4150
kind: normative-requirement
summary: Implementations must populate tpmTransMetricDirTable with all possible (application, protocol-transaction, metric) combinations at boot and must set the default tpmTransMetricDirConfig to supportedOff(2). The table does not support row creation by management applications.
section: "4"
rfc2119_level: MUST
topics:
