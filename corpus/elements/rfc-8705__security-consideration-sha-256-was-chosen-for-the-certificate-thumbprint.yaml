document: rfc-8705
kind: security-consideration
summary: SHA-256 was chosen for the certificate thumbprint binding because it provides sufficient second-preimage resistance to make it computationally infeasible to find a colliding certificate. If future hash algorithm changes are needed, new JWT Confirmation Method members should be defined and registered in the IANA 'JWT Confirmation Methods' registry.
section: "7.2"
topics:
    - oauth
    - crypto
    - security
