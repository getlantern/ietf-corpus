document: rfc-9830
kind: normative-requirement
summary: If one or more Route Targets are present, at least one MUST match the receiver's BGP Identifier (a 4-octet unsigned non-zero integer per RFC 6286) for the SR Policy NLRI to be considered usable locally.
section: 4.2.2
rfc2119_level: MUST
topics:
