kind: protocol-element
summary: The When-to-refresh field (1 octet) in the ROUTE-REFRESH message takes the value IMMEDIATE (0x01) or DEFER (0x02), controlling whether the peer re-advertises affected routes immediately after processing the ORF entries or waits for a subsequent trigger.
