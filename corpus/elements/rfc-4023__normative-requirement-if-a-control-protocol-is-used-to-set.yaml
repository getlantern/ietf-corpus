document: rfc-4023
kind: normative-requirement
summary: If a control protocol is used to set up tunnels, it MUST have an authentication mechanism that MUST be used when the tunnel is set up. If BGP is used for automatic setup, BGP's MD5-based authentication is satisfactory.
section: "8.1"
rfc2119_level: MUST
topics:
    - mpls
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
