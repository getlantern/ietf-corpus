document: rfc-5648
kind: interoperability-note
summary: When MCoA is used with DSMIPv6 (RFC 5555), the IPv4 Care-of Address mobility option MUST NOT be used when the BID mobility option is present. The receiver MUST treat the IPv4 address in the BID option as equivalent to the IPv4 Care-of Address mobility option.
section: "8.1"
topics:
    - mobility
    - ip
    - nat
