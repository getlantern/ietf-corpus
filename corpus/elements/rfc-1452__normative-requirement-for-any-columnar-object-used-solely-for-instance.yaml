document: rfc-1452
kind: normative-requirement
summary: For any columnar object used solely for instance identification in a conceptual row, the MAX-ACCESS clause must be set to 'not-accessible', unless all columnar objects are used for identification, in which case at least one must have a value other than 'not-accessible'.
section: "2.1"
rfc2119_level: MUST
topics:
