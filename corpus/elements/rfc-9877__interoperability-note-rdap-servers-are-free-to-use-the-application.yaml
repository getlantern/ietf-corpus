document: rfc-9877
kind: interoperability-note
summary: RDAP servers are free to use the 'application/geofeed+csv' media type and 'geofeed' link relation in standard responses without including the 'geofeed1' extension identifier, since servers may use any registered media type or link relation without implementing a particular extension.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
