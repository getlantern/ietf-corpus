document: rfc-5510
kind: wire-format
summary: 'For FEC Encoding ID 2 with m=8 (default), the FEC Payload ID is 32 bits: a 24-bit Source Block Number followed by an 8-bit Encoding Symbol ID. For m=16, it is a 16-bit Source Block Number followed by a 16-bit Encoding Symbol ID.'
