document: rfc-2058
kind: registry
summary: This document defines the RADIUS Attribute Type registry (values 1-63 assigned; 192-223 reserved for experimental use; 224-240 reserved for implementation-specific use; 241-255 reserved). Up-to-date assignments are maintained in the Assigned Numbers RFC. Unknown attribute types MAY be ignored by both clients and servers.
