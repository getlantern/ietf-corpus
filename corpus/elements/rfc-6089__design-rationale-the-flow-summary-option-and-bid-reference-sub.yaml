document: rfc-6089
kind: design-rationale
summary: The Flow Summary option and BID Reference sub-option exist specifically to reduce binding update message size. Implementations are encouraged to use them to reference already-registered CoAs and flow bindings rather than re-sending full traffic selector and BID options, minimizing fragmentation.
section: "6"
topics:
