document: rfc-9859
kind: security-consideration
summary: 'The generalized NOTIFY security model reuses that of RFC 1996: a notification only affects the timing of an action; all security and authentication requirements applied to the action itself (e.g., RFC 9615 for DNSSEC bootstrapping) remain unchanged. This makes it impossible for a notification alone to alter the behavior of the recipient beyond hastening when checks occur.'
section: "5"
topics:
    - dns
    - security
