document: rfc-4253
kind: normative-requirement
summary: All implementations MUST be able to process SSH_MSG_DISCONNECT. After sending or receiving this message, no further data may be sent or accepted. The sender MUST NOT send any data after this message.
section: "11.1"
rfc2119_level: MUST
topics:
    - security
