document: rfc-9651
kind: protocol-element
summary: Tokens are short textual words beginning with an alphabetic character or '*', followed by zero or more token characters (HTTP tchar plus ':' and '/'). Tokens exist largely for compatibility with existing HTTP field data models; new fields are encouraged to use Strings instead. Parsers MUST support at least 512 characters.
section: 3.3.4
