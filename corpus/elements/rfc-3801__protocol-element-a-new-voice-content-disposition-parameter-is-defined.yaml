document: rfc-3801
kind: protocol-element
summary: 'A new ''voice'' Content-Disposition parameter is defined with IANA-registered values: Voice-Message, Voice-Message-Notification, Originator-Spoken-Name, Recipient-Spoken-Name, and Spoken-Subject. Only one instance of each type SHOULD appear per message level; Recipient-Spoken-Name MUST NOT be used when multiple recipients are present.'
section: 4.3.2
