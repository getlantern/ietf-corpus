document: rfc-8852
kind: security-consideration
summary: An attacker or malicious RTP middlebox that removes or changes RtpStreamId/RepairedRtpStreamId values can severely impact the application, including failure to decode media or incorrect attribution of media to a source; integrity and source authentication are needed to prevent this.
