document: rfc-6655
kind: design-rationale
summary: AES-CCM uses only the AES encrypt operation (decryption is not needed), making it amenable to compact implementations and therefore suitable for constrained environments such as embedded servers and 802.15.4 wireless sensor nodes. Adoption in standard TLS is also needed to enable interoperability between web clients and embedded devices.
section: "1"
topics:
