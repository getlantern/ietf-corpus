document: rfc-8281
kind: normative-requirement
summary: A PCInitiate message used to instantiate an LSP MUST contain an LSP object with the reserved PLSP-ID 0 and MUST include the SYMBOLIC-PATH-NAME TLV. The message MUST also contain an ERO for the LSP.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
