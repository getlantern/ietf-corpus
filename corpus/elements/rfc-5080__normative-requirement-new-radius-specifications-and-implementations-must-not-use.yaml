document: rfc-5080
kind: normative-requirement
summary: New RADIUS specifications and implementations MUST NOT use Access-Reject where the semantics of Access-Challenge are intended. Access-Reject MUST mean denial of access to the requested service. In response to an Access-Reject, the NAS MUST NOT send any additional Access-Request packets for that user session.
section: 2.6.1
rfc2119_level: MUST NOT
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
