document: rfc-2596
kind: protocol-element
summary: 'A language option in an LDAP AttributeDescription is formed as ''lang-'' followed by a lang-code (a printable ASCII code as defined in RFC 1766). Multiple language options may be present on a single attribute value. Examples: ''givenName;lang-en-US'', ''CN;lang-ja''.'
section: "3.1"
topics:
    - ldap
