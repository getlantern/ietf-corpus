document: rfc-1390
kind: normative-requirement
summary: The MTU of FDDI networks shall be 4352 octets, providing 4096 octets of data plus 256 octets of headers at the network layer and above. Implementations must not send packets larger than the MTU.
section: MAC Layer Details
rfc2119_level: MUST
topics:
    - ip
