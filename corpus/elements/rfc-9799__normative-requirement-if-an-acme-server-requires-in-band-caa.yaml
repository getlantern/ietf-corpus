document: rfc-9799
kind: normative-requirement
summary: If an ACME server requires in-band CAA but the client does not provide an 'onionCAA' object in its finalize request, the server MUST respond with an 'onionCAARequired' error. The 'expiry' field in the onionCAA object SHOULD NOT be more than 8 hours in the future.
section: 6.4.1
rfc2119_level: MUST
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
