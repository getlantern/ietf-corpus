document: rfc-6958
kind: protocol-element
summary: The Burst/Gap Loss Metrics Block (BT=20) is an RTCP XR block that reports burst and gap loss metrics for an RTP stream, measured at the receiver. It carries Threshold, Sum of Burst Durations, Packets Lost in Bursts, Total Packets Expected in Bursts, Number of Bursts, and Sum of Squares of Burst Durations.
