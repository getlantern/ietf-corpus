document: rfc-9094
kind: interoperability-note
summary: The YANG data model is derived from the WSON information model (RFC 7446) and protocol-independent encodings (RFC 7581, RFC 7579). Implementations should understand these underlying information models to correctly interpret the grid-type, channel spacing, and label range semantics exposed by this module.
section: "1"
topics:
