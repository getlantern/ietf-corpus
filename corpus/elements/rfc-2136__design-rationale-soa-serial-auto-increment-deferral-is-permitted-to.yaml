document: rfc-2136
kind: design-rationale
summary: SOA SERIAL auto-increment deferral is permitted to conserve serial numbers and make 2**32 wraparound infrequent. Visible SOA SERIALs need only differ when zone content differs; the Authority Section SOA in a QUERY response counts as 'visible' for this purpose.
section: "7.10"
topics:
    - dns
