document: rfc-4335
kind: design-rationale
summary: The absence of a BREAK signal facility in SSH session channels forced users to continue using Telnet for 'Console Server' applications, where a BREAK signal is required to access privileged administrative functions on asynchronous serial console ports. This extension was created to fill that gap.
section: "1"
topics:
    - sip
    - realtime
    - security
