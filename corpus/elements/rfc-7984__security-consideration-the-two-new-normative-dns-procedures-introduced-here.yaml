document: rfc-7984
kind: security-consideration
summary: The two new normative DNS procedures introduced here—contacting additional target addresses and/or contacting them in a different order than RFC 3263 prescribes—introduce no new security considerations, since it has always been assumed a client may contact any DNS-listed target for a URI.
section: "5"
topics:
