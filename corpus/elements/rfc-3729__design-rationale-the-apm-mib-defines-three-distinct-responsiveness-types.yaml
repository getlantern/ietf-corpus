document: rfc-3729
kind: design-rationale
summary: 'The APM MIB defines three distinct responsiveness types because different application paradigms require incompatible metrics: transaction-oriented apps use millisecond response time, throughput-oriented apps use kilobits per second, and streaming-oriented apps use a parts-per-million signal quality ratio. Mixing these across applications would make statistical analysis meaningless.'
section: "2"
topics:
