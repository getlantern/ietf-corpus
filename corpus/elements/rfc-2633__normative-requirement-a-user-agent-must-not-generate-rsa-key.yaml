document: rfc-2633
kind: normative-requirement
summary: A user agent MUST NOT generate RSA key pairs less than 512 bits long. RSA key pairs SHOULD be at least 768 bits; receiving agents SHOULD be able to verify signatures with keys of any size over 512 bits.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
