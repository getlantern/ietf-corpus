document: rfc-7136
kind: interoperability-note
summary: RFC 2526 (Reserved IPv6 Subnet Anycast Addresses) requires that for EUI-64 format IIDs the 'u' bit MUST be 0 (local) and 'g' must be 1, but neither states nor implies any semantics for these bits within anycast addresses themselves, illustrating the inconsistent treatment across specifications.
