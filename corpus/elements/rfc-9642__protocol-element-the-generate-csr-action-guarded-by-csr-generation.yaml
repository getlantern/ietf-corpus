summary: The 'generate-csr' action (guarded by 'csr-generation' feature) on an asymmetric key accepts 'csr-format' (identityref) and 'csr-info' as input, and returns a 'p10-csr' (PKCS#10) as output, enabling server-side CSR generation without exposing the private key.
