document: rfc-8441
kind: normative-requirement
summary: Upon receipt of SETTINGS_ENABLE_CONNECT_PROTOCOL with a value of 1, a client MAY use the Extended CONNECT method when creating new streams. Receipt of this parameter by a server does not have any impact.
section: "3"
rfc2119_level: MAY
