document: rfc-3266
kind: design-rationale
summary: This document updates RFC 2327 solely to complete the ABNF for IPv6 addresses, which was previously left undefined in SDP. No new protocol mechanisms are introduced; the IP6 addrtype was already present in the ABNF but lacked a corresponding syntax definition.
