document: rfc-7415
kind: normative-requirement
summary: Support of rate-based control MUST be indicated by clients including the token 'rate' in the 'oc-algo' list. Selection of rate-based control MUST be indicated by servers by setting 'oc-algo' to the token 'rate'.
