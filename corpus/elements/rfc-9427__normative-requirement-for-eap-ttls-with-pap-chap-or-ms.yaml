document: rfc-9427
kind: normative-requirement
summary: For EAP-TTLS with PAP, CHAP, or MS-CHAPv1 as inner methods and TLS session tickets disabled, the EAP server MUST respond with either EAP-Success or EAP-Failure (which are unprotected and can be forged). EAP peers MUST continue running their EAP state machine until they receive one of these.
section: "2.4"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
