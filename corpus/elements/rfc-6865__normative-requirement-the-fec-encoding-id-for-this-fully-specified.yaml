document: rfc-6865
kind: normative-requirement
summary: The FEC Encoding ID for this Fully-Specified FEC Scheme MUST be 8, as assigned by IANA. When SDP is used to communicate the FFCI, this value MUST be carried in the 'encoding-id' parameter of the 'fec-repair-flow' attribute specified in RFC 6364.
section: 5.1.1.1
rfc2119_level: MUST
