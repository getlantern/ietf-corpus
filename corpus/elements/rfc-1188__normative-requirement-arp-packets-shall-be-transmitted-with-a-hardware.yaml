document: rfc-1188
kind: normative-requirement
summary: ARP packets shall be transmitted with a hardware type code of 1 (Ethernet), not 6 (IEEE 802), to preserve interoperability in bridged environments. ARP packets must be accepted if received with hardware type codes of either 1 or 6.
section: Address Resolution
rfc2119_level: MUST
topics:
    - ip
