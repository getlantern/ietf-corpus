document: rfc-5530
kind: protocol-element
summary: ALREADYEXISTS indicates the operation attempts to create something that already exists, such as CREATE or RENAME targeting a mailbox name already in use. NONEXISTENT indicates the operation attempts to delete or rename something that does not exist.
