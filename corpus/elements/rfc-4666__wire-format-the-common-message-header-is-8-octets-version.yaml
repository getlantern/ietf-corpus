document: rfc-4666
kind: wire-format
summary: 'The Common Message Header is 8 octets: Version (8-bit unsigned integer, value 1 for Release 1.0), Reserved (8-bit, set to 0 and ignored by receiver), Message Class (8-bit), Message Type (8-bit), and Message Length (32-bit unsigned integer inclusive of the header and any padding octets).'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
