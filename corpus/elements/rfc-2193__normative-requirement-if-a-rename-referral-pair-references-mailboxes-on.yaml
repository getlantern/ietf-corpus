document: rfc-2193
kind: normative-requirement
summary: If a RENAME referral pair references mailboxes on different servers, the remote servers cannot perform the RENAME. The client MAY achieve equivalent behavior by issuing constituent CREATE, FETCH, APPEND, and DELETE commands against both servers.
section: "4.3"
rfc2119_level: MAY
topics:
    - email
