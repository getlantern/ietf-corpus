document: rfc-5420
kind: protocol-element
summary: The RRO Attributes subobject (Type 0x05) may be included in the RECORD_ROUTE object to record per-hop LSP attribute compliance or per-hop attributes. It carries the same bit-flag array as the Attribute Flags TLV with a one-to-one bit correspondence, allowing a single registry to serve both uses.
section: "7.2"
topics:
