document: rfc-6871
kind: design-rationale
summary: 'A concatenation rule is defined for ''mfcap'' parameters referencing the same media capability number: their parameter strings are joined with '';''. This is motivated by codecs such as AMR-WB that have a large number of formatting options, making it impractical to enumerate every combination explicitly on a single line.'
