document: rfc-5059
kind: normative-requirement
summary: If the BSR learns of both BIDIR and PIM-SM Candidate-RPs for the same group range, it MUST only include RPs for one protocol in Bootstrap messages. The default behavior SHOULD be to prefer BIDIR.
section: "3.3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
