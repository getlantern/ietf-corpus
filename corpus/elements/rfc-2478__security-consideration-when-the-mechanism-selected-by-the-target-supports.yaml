document: rfc-2478
kind: security-consideration
summary: When the mechanism selected by the target supports integrity protection, the negotiation itself is protected against tampering. When any proposed mechanism does not support integrity, an active attacker can force selection of a weaker but mutually acceptable mechanism rather than the peers' common preferred one.
section: "5"
topics:
