document: rfc-9394
kind: design-rationale
summary: Negative indexing (prepending "-" to range values) was introduced to allow clients to request the most recent results first. The RFC notes this syntax explicitly helps server implementations optimize their SEARCHes by avoiding full-result materialization.
section: "3.1"
