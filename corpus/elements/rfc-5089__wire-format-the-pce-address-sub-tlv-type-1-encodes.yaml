document: rfc-5089
kind: wire-format
summary: The PCE-ADDRESS sub-TLV (Type 1) encodes one octet for address-type (1=IPv4, 2=IPv6) followed by 4 octets for IPv4 or 16 octets for IPv6, giving total LENGTH of 5 or 17. It MAY appear twice (once per address family) but MUST NOT appear more than once for the same address type.
section: "4.1"
topics:
    - routing
