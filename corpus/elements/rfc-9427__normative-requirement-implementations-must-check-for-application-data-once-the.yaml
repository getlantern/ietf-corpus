document: rfc-9427
kind: normative-requirement
summary: Implementations MUST check for application data once the TLS session is established, and this check MUST be performed before another round trip of TLS negotiation. Application data MUST NOT be sent or processed while the underlying TLS connection is still performing negotiation.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
