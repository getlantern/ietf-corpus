document: rfc-4261
kind: protocol-element
summary: Error Code 13 (Unknown COPS Object) is used when a PEP or PDP does not support TLS; sub-code octet 2 MUST be 16 (C-Num) and octet 3 MUST be 2 (C-Type). Error Code 15 (Authentication Required) is used when the PDP requires a different or any security mechanism; sub-code octet 2 carries the C-Num=16 and octet 3 carries the required/preferred C-Type, or zero for no security.
section: "4.2"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
