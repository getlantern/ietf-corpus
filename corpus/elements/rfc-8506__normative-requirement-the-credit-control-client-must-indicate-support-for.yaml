document: rfc-8506
kind: normative-requirement
summary: The credit-control client MUST indicate support for independent credit-control of multiple services by including the Multiple-Services-Indicator AVP in the first interrogation; a server not supporting this feature MUST treat the Multiple-Services-Indicator AVP and any received Multiple-Services-Credit-Control AVPs as invalid.
section: 5.1.2
rfc2119_level: MUST
topics:
    - diameter
