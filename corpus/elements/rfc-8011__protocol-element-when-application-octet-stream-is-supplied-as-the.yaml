document: rfc-8011
kind: protocol-element
summary: When 'application/octet-stream' is supplied as the document-format, the Printer auto-senses the actual document format from the data stream. If the Printer cannot determine the format, it SHOULD process it as the 'document-format-default'. Auto-sensing allows Clients that do not know the document format to still submit Print Jobs.
section: 5.1.10.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
