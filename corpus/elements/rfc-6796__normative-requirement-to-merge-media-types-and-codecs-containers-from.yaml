document: rfc-6796
kind: normative-requirement
summary: To merge media-types-* and codecs-* containers from multiple session policy documents, a UA MUST apply all containers it has received one after the other to the set of supported media types/codecs. Each application MUST keep the set the same or reduce it; media types/codecs cannot be added during this process.
section: 5.1.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
