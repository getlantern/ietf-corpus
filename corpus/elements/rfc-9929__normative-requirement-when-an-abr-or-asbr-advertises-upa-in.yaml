document: rfc-9929
kind: normative-requirement
summary: When an ABR or ASBR advertises UPA in OSPFv2 or OSPFv3, it MUST set the LSA age to a value lower than MaxAge and set the metric to LSInfinity (0xFFFFFF). Standard OSPFv2/OSPFv3 flooding procedures apply.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
