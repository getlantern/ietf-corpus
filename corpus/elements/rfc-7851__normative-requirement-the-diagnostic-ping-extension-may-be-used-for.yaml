document: rfc-7851
kind: normative-requirement
summary: The Diagnostic_Ping extension MAY be used for new Ping method requests and MUST NOT be included in requests using any other method. Senders MUST accept a response that lacks diagnostic information and SHOULD NOT resend the message expecting a reply.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
