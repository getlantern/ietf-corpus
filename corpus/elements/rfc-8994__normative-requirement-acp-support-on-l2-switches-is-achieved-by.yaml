document: rfc-8994
kind: normative-requirement
summary: ACP support on L2 switches is achieved by running per-L2-port DULL GRASP. L2 switches supporting ACP MUST run DULL GRASP on each L2 port to discover ACP-capable neighbors and establish ACP secure channels, enabling the ACP to operate hop-by-hop through L2 segments.
section: "7"
rfc2119_level: MUST
topics:
    - zeroconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
