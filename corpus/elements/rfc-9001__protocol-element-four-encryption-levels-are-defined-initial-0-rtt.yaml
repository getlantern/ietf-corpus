kind: protocol-element
summary: Four encryption levels are defined — Initial, 0-RTT (Early Data), Handshake, and 1-RTT (Application Data) — each corresponding to a packet type and packet number space. Each encryption level provides separate send/receive secrets. Table 1 maps packet types to their encryption keys and packet number spaces.
