document: rfc-2206
kind: protocol-element
summary: rsvpIfNbrs, rsvpIfIpNbrs, and rsvpIfUdpNbrs are read-only Gauge32 objects on each interface counting total neighbors, those using only IP encapsulation, and those using only UDP encapsulation respectively. rsvpIfNbrs may exceed the sum of the other two by the count of neighbors using both encapsulations.
section: "3.5"
