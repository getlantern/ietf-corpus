document: rfc-9033
kind: normative-requirement
summary: The AutoRxCell MUST always remain scheduled after synchronization, and 6P CLEAR MUST NOT erase any autonomous cells. In a conflict between autonomous and negotiated cells, autonomous cells take precedence per IEEE 802.15.4.
section: "3"
rfc2119_level: MUST
