document: rfc-6501
kind: protocol-element
summary: 'The <roles> element assigns one or more roles to a conference participant: ''administrator'', ''moderator'', ''user'', ''participant'', ''observer'', or ''none''. Roles govern the set of conference operations a participant may perform and are referenced by <mixing-start-offset> ''required-participant'' and floor control algorithms.'
section: 4.6.5.2
topics:
    - realtime
