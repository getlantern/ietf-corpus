document: rfc-4626
kind: protocol-element
summary: t11FspfAdminStatus and t11FspfIfAdminStatus allow enabling (up) or disabling (down) FSPF per-Fabric and per-interface respectively. When FSPF is disabled fabric-wide, it provides no routes to the T11-FC-ROUTE-MIB.
