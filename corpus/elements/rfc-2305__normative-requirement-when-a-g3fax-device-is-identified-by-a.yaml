document: rfc-2305
kind: normative-requirement
summary: When a G3Fax device is identified by a telephone number, the entire address including number and offramp host reference MUST be contained within standard Internet mail transport fields such as RCPT TO and MAIL FROM. The telephone number format SHOULD conform to RFC 2303/2304; other formats MUST be syntactically distinct from those.
section: "3.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
