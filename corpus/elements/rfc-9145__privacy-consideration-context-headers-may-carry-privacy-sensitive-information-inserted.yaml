document: rfc-9145
kind: privacy-consideration
summary: Context Headers may carry privacy-sensitive information inserted by Classifiers or intermediate SFs that is not visible to communication endpoints. Without encryption, SFFs or unauthorized SFs along the SFP would have access to this sensitive metadata even when hop-by-hop transport security (e.g., IPsec) is in use.
section: "1"
topics:
    - privacy
    - security
