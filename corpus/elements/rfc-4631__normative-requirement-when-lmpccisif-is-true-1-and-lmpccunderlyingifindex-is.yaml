document: rfc-4631
kind: normative-requirement
summary: When lmpCcIsIf is true(1) and lmpCcUnderlyingIfIndex is zero, the control channel is not associated with any underlying interface; the control channel's operational status MUST NOT be up(1) and it must not forward or receive traffic.
section: "9"
rfc2119_level: MUST NOT
