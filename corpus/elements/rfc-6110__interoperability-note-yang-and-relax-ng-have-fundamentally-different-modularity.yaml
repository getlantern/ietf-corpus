document: rfc-6110
kind: interoperability-note
summary: 'YANG and RELAX NG have fundamentally different modularity models: YANG ''import'' gives access only to definitions (groupings/typedefs) without importing the data tree, whereas RELAX NG <rng:include> imports both named pattern definitions and the entire schema tree. Also, RELAX NG named patterns share a single flat namespace within a grammar, requiring name mangling to map YANG''s lexically scoped symbols.'
section: "8.2"
topics:
    - yang
    - netconf
