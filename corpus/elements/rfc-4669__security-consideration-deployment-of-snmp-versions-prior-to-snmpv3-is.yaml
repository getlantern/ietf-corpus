document: rfc-4669
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. SNMPv3 with full cryptographic mechanisms for authentication and privacy is RECOMMENDED. Operators must ensure the SNMP entity is configured to grant access only to principals with legitimate rights.
section: "8"
rfc2119_level: RECOMMENDED
topics:
