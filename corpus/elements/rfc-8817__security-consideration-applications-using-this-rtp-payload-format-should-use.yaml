document: rfc-8817
kind: security-consideration
summary: Applications using this RTP payload format SHOULD use one or more appropriate strong security mechanisms such as SRTP (RFC 3711), VPNs, FIPS 140 link encryptors, or Type 1 Ethernet encryptors. Security responsibility lies with the application, not the payload format.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - rtp
