document: rfc-9196
kind: normative-requirement
summary: Every set of capabilities augmented into ietf-system-capabilities MUST be wrapped in a container under the augment statement to cleanly separate different groups of capabilities. These wrapper containers SHALL be augmented at /sysc:system-capabilities and /sysc:system-capabilities/sysc:datastore-capabilities/sysc:per-node-capabilities.
section: "4"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
