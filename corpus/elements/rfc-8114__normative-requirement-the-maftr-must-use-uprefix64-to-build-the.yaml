kind: normative-requirement
summary: The mAFTR MUST use uPrefix64 to build the IPv6 source addresses derived from mPrefix64 and MUST advertise the route towards uPrefix64 with the IPv6 IGP so that IPv6 multicast routers can perform RPF checks.
