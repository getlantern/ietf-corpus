document: rfc-3502
kind: security-consideration
summary: The MULTIAPPEND extension does not raise any security considerations beyond those present in the base IMAP protocol. However, IMAP4rev1 transactions including mail data are sent in the clear unless STARTTLS, AUTHENTICATE privacy protection, or another protection mechanism is negotiated.
section: Security Considerations
topics:
    - email
    - security
