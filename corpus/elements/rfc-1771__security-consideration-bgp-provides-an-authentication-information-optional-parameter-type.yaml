document: rfc-1771
kind: security-consideration
summary: BGP provides an Authentication Information optional parameter (Type 1) in the OPEN message, carrying a 1-octet Authentication Code and variable Authentication Data. The authentication specification must define the Authentication Code value, the form of Authentication Data, and the algorithm for computing Marker field values. Transport-level authentication may be used independently.
section: "4.2"
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
