document: rfc-1304
kind: protocol-element
summary: sipL3VersionSupport is an INTEGER bitmask indicating which SIP versions an interface supports. For each supported version V, 2^(V-1) is added to the sum; version 1 is the least significant bit. A port supporting versions 1 and 2 returns value 3.
section: "4.1"
