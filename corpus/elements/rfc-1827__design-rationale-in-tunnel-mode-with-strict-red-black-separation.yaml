document: rfc-1827
kind: design-rationale
summary: In Tunnel-mode with strict red/black separation, the addressing and other information in cleartext IP headers MAY differ from the values in the encrypted original datagram. This permits concealment of true source and destination addressing from passive observers.
section: "4.1"
topics:
