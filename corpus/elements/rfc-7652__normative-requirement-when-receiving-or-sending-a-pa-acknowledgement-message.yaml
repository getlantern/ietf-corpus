document: rfc-7652
kind: normative-requirement
summary: When receiving or sending a PA-Acknowledgement message (a PA message containing a RECEIVED_PAK option), the device MUST NOT increment the corresponding sequence number stored in the SA, to prevent sequence number mismatch on acknowledgement loss.
section: "6.4"
rfc2119_level: MUST NOT
topics:
