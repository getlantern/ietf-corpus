document: rfc-6119
kind: protocol-element
summary: IPv6 SRLG TLV (type 139) carries Shared Risk Link Group information for an IPv6-addressed link, identified by System ID (6 octets), pseudonode number (1 octet), flags (1 octet), IPv6 interface address (16 octets), optional IPv6 neighbor address (16 octets), and a variable list of 4-octet SRLG values.
section: "4.4"
topics:
