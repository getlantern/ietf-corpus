document: rfc-7313
kind: wire-format
summary: 'The previously Reserved 1-byte field in the ROUTE-REFRESH message (RFC 2918) is redefined as Message Subtype: 0 = normal route refresh, 1 = Beginning of Route Refresh (BoRR), 2 = End of Route Refresh (EoRR), 255 = Reserved. Values 3–254 are reserved for future use.'
section: "3.2"
topics:
