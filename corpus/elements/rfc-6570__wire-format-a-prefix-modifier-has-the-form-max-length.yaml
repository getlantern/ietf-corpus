document: rfc-6570
kind: wire-format
summary: A prefix modifier has the form ":" max-length where max-length = %x31-39 0*3DIGIT (a positive integer less than 10000). The max-length counts Unicode code points from the beginning of the variable's decoded value string, not octets.
section: 2.4.1
