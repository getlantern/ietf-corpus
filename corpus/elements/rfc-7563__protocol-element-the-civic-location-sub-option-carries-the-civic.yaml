document: rfc-7563
kind: protocol-element
summary: The Civic-Location sub-option carries the civic address (street address or building location) of the mobile node as known to the MAG. Binary Encoding (Format=0) follows RFC 4776 Section 3.1 encoding with the first 3 DHCP-specific octets omitted, starting with a two-letter ISO 3166 country code.
section: "3.1"
topics:
