document: rfc-8331
kind: protocol-element
summary: The optional DID_SDID media type parameter signals that all ANC data packets of the stream are of specific type(s) identified by DID and SDID values; absence of DID_SDID means packet type can only be determined by direct inspection of the packet fields.
