document: rfc-4271
kind: protocol-element
summary: 'The BGP Routing Information Base (RIB) consists of three logical parts: Adj-RIBs-In (unprocessed inbound routes from peers), Loc-RIB (routes selected by the local Decision Process), and Adj-RIBs-Out (routes selected for advertisement to specific peers). Implementations are not required to maintain three physical copies.'
section: "3.2"
topics:
