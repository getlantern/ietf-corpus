document: rfc-3090
kind: protocol-element
summary: A locally secured zone complies with globally secured rules except that signing keys may use non-mandatory algorithms and/or verification may rely on off-tree validation. Only resolvers pre-configured for the zone will see it as secured.
section: "2.2"
topics:
