document: rfc-4740
kind: protocol-element
summary: The Push-Profile-Request (PPR) and Push-Profile-Answer (PPA) commands use Command-Code 288. PPR is sent asynchronously by the Diameter server to push updated user-profile data (one or more SIP-User-Data AVPs, a User-Name AVP, and zero or more SIP-AOR AVPs) to the SIP server when the profile changes outside a normal registration flow.
section: "8.11"
