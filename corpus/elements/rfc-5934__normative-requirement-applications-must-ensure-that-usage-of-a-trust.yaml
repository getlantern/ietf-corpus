document: rfc-5934
kind: normative-requirement
summary: Applications MUST ensure that usage of a trust anchor is consistent with any constraints associated with it. Non-management applications SHOULD only use identity trust anchors. If name constraints are present, certification paths violating them MUST be rejected.
section: 1.3.4
rfc2119_level: MUST
topics:
    - security
    - pkix
