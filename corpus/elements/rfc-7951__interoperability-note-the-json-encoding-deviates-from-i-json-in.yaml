document: rfc-7951
kind: interoperability-note
summary: 'The JSON encoding deviates from I-JSON in one way: the ''binary'' type uses standard base64 (not base64url) for XML compatibility. All other I-JSON properties — UTF-8, unique member names, order-independence, reliable number exchange — are satisfied.'
