document: rfc-9616
kind: normative-requirement
summary: Smoothing SHOULD be applied to RTT samples to avoid instabilities due to occasional outliers. An exponential moving average with constant α is RECOMMENDED, with α SHOULD be between 0.8 and 0.9 and the RECOMMENDED default being 0.836.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
