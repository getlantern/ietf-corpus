document: rfc-4422
kind: wire-format
summary: The EXTERNAL mechanism's initial response is a UTF-8 encoded authorization identity string (authz-id-string = *UTF8-char-no-nul, where UTF8-1-no-nul = %x01-7F). An empty response means the client requests the identity associated with its external credentials; a non-empty response names the desired authorization identity.
section: A.1
topics:
    - security
