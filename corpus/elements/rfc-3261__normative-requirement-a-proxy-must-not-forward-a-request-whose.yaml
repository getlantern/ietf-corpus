document: rfc-3261
kind: normative-requirement
summary: A proxy MUST NOT forward a request whose Max-Forwards value is zero; it MUST return 483 (Too Many Hops). Every proxy forwarding a request MUST decrement Max-Forwards by exactly one.
section: "16.6"
rfc2119_level: MUST
topics:
    - sip
