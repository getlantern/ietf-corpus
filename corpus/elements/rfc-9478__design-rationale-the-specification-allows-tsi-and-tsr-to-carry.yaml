document: rfc-9478
kind: design-rationale
summary: The specification allows TSi and TSr to carry different Security Labels, even though this would be uncommon. Initiators that do not support different labels per direction should negotiate Child SAs serially with one label at a time rather than combining them.
section: "3.2"
topics:
    - ipsec
    - security
