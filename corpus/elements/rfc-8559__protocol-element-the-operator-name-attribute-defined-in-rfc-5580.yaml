document: rfc-8559
kind: protocol-element
summary: The Operator-Name attribute (defined in RFC 5580 Section 4.1) is reused to enable CoA proxying. It carries an ASCII '1' followed by the realm name of the visited network (e.g., '1example.com'), providing the reverse-path routing key for CoA packets analogous to User-Name on the forward path.
section: "3"
topics:
