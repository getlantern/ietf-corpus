document: rfc-3057
kind: normative-requirement
summary: The IUA layer MUST maintain a map of the Interface Identifier to a physical interface on the SG (e.g., T1/E1 line and TDM timeslot). The SG MUST also maintain the states of AS/ASP and reference them when routing messages.
section: 1.5.1
rfc2119_level: MUST
topics:
