document: rfc-1194
kind: security-consideration
summary: Allowing an RUIP to return information from user-modifiable plan files is equivalent to allowing any information about the system to be freely distributed; it may bypass the administrator's disclosure controls in subtle and clever ways.
section: 3.2.4
