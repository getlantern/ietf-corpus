document: rfc-3484
kind: protocol-element
summary: 'IPv4 addresses are mapped to scopes as follows: 169.254/16 auto-configuration addresses get link-local scope; 10/8, 172.16/12, and 192.168/16 private addresses get site-local scope; 127/8 loopback addresses get link-local scope; all other IPv4 addresses get global scope.'
