document: rfc-8282
kind: wire-format
summary: The INTER-LAYER object body is a single 32-bit word with Reserved bits in bits 0-28, T flag at bit 29, M flag at bit 30, and I flag at bit 31. All reserved bits MUST be transmitted as zero and SHOULD be ignored on receipt.
