document: rfc-1195
kind: design-rationale
summary: IP-only routers must carry OSI-style NSAP addresses solely for use in IS-IS packet formats, because IS-IS packet formats mandate OSI addresses for area membership determination. An algorithmic derivation from AS number and IP address is provided to avoid a separate OSI address allocation process.
section: "3.3"
topics:
    - routing
    - ip
