document: rfc-2131
kind: protocol-element
summary: A lease binding is the collection of configuration parameters, including at least an IP address, associated with a DHCP client. The combination of 'client identifier' (or 'chaddr') and assigned network address constitutes the unique identifier for a lease, used by both client and server.
