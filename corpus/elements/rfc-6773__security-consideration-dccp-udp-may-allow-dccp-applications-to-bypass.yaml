document: rfc-6773
kind: security-consideration
summary: DCCP-UDP may allow DCCP applications to bypass firewall rules by appearing as UDP traffic. A firewall implementing this specification could inspect the encapsulated DCCP header to filter on inner DCCP header fields, but full control requires firewall enhancements per RFC 4340 and RFC 5595.
section: "6"
topics:
    - security
    - nat
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
