document: rfc-4837
kind: design-rationale
summary: FEC (RS(255,239,8)) is placed as a separate layer between PCS and PMA — not within the MAC — to enhance optical link budget without changing the MAC. This enables greater split ratios and longer reach. The standard notes this code is similar to ITU-T G.975. The FEC layer is optional.
section: 2.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
