document: rfc-5426
kind: normative-requirement
summary: Syslog senders MUST NOT disable UDP checksums. IPv4 syslog senders SHOULD use UDP checksums. Syslog receivers MUST NOT disable UDP checksum checks; IPv4 receivers SHOULD check UDP checksums and SHOULD accept a syslog message with a zero checksum.
section: "3.6"
rfc2119_level: MUST NOT
topics:
    - syslog
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
