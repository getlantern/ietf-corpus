document: rfc-9352
kind: wire-format
summary: The SRv6 LAN End.X SID sub-TLV (type 44) extends End.X for LAN adjacencies by prepending a variable-length Neighbor System-ID field (IS-IS ID Length octets) before the Flags/Algorithm/Weight/Endpoint Behavior/SID fields, enabling identification of the physical neighbor on the LAN.
