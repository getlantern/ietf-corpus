document: rfc-8665
kind: normative-requirement
summary: When multiple SR-Algorithm TLVs are received from a router, the receiver MUST use the first occurrence. If TLVs appear in LSAs with different flooding scopes, the area-scoped one MUST be used. For same scope, the TLV in the LSA with the numerically smallest Instance ID MUST be used.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
