document: rfc-1237
kind: normative-requirement
summary: The ID field must be unique within an area for ESs and level 1 ISs, and unique within the routing domain for level 2 ISs. The ID field is treated as flat (non-hierarchical) by the routing protocol.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
