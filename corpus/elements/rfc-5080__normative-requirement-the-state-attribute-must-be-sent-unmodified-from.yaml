document: rfc-5080
kind: normative-requirement
summary: The State attribute MUST be sent unmodified from the client to the server in any new Access-Request reply to an Access-Challenge. An Access-Request sent as a result of a new or restarted authentication run MUST NOT include the State attribute, even if a State attribute was previously received for the same user and port.
section: 2.1.1
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
