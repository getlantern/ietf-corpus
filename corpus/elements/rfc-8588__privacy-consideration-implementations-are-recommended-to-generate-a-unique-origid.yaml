document: rfc-8588
kind: privacy-consideration
summary: Implementations are RECOMMENDED to generate a unique 'origid' value per call so that only the generator can correlate two values to the same or different network elements. Reusing a common 'origid' across calls risks exposing correlation patterns, potentially revealing geographic location or device-level information to recipients or analytics systems.
section: "10"
rfc2119_level: RECOMMENDED
topics:
    - privacy
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
