summary: This document defines the TCP-MIB module (OID { mib-2 49 }) under the SNMP MIB-2 subtree, replacing and obsoleting RFC 2012 and RFC 2452. The module includes object groups tcpBaseGroup, tcpConnectionGroup, tcpListenerGroup, tcpHCGroup, and the deprecated tcpGroup.
