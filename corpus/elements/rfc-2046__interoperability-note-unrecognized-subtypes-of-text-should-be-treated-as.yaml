document: rfc-2046
kind: interoperability-note
summary: Unrecognized subtypes of 'text' should be treated as subtype 'plain' as long as the charset is known. Unrecognized subtypes that also specify an unrecognized charset should be treated as 'application/octet-stream'.
section: 4.1.4
