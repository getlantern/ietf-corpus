document: rfc-3807
kind: protocol-element
summary: 'The Envelope Function Address (EFA) is a 13-bit number (0-8191) that uniquely identifies one of the five V5.2 protocols or an ISDN agent: ISDN_PROTOCOL (0-8175), PSTN_PROTOCOL (8176), CONTROL_PROTOCOL (8177), BCC_PROTOCOL (8178), PROT_PROTOCOL (8179), LINK_CONTROL_PROTOCOL (8180), RESERVED (8181-8191).'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
