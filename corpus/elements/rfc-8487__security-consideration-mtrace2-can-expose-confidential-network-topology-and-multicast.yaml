document: rfc-8487
kind: security-consideration
summary: Mtrace2 can expose confidential network topology and multicast channel characteristics (sources, groups, rates). Operators can restrict this at domain borders using the ADMIN_PROHIB Forwarding Code or the INFO_HIDDEN mechanism.
section: "9.3"
topics:
