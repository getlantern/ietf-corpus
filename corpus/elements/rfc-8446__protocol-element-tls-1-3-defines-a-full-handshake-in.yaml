document: rfc-8446
kind: protocol-element
summary: 'TLS 1.3 defines a full handshake in three phases: Key Exchange (ClientHello/ServerHello establishing shared keys via (EC)DHE or PSK), Server Parameters (EncryptedExtensions, optional CertificateRequest), and Authentication (Certificate, CertificateVerify, Finished). All messages after ServerHello are encrypted using handshake traffic keys.'
