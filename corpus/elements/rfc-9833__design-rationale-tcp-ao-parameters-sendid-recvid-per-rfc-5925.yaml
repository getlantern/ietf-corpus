document: rfc-9833
kind: design-rationale
summary: TCP-AO parameters (SendID, RecvID per RFC 5925 Section 3.1) are assumed to be preconfigured within the key chain referenced by the model rather than modeled explicitly, consistent with RFC 9182's approach. No assumption is made about how such a key chain is preconfigured outside this model.
section: "4.3"
