document: rfc-1723
kind: wire-format
summary: 'Authentication entry: when the AFI of the first route entry is 0xFFFF, the entry holds authentication data — AFI (2B, 0xFFFF), Authentication Type (2B), and Authentication (16B). This consumes one entry slot, reducing maximum route entries to 24.'
