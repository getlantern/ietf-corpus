document: rfc-4998
kind: wire-format
summary: Hash tree nodes are computed by binary-sorting children hash values in ascending order, concatenating them (leading zeros preserved, most-significant bit first), and hashing the concatenation. Hash values are full-length octet strings. The root hash value is submitted to the TSA for timestamping.
section: "4.2"
topics:
