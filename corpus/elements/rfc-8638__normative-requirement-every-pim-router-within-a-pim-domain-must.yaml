document: rfc-8638
kind: normative-requirement
summary: Every PIM router within a PIM domain MUST be able to map a particular multicast group address to the same RP when the source address is the wildcard value, enabling upstream AFBRs to recognize and reconstruct (*,G) messages from translated (S',G') messages.
section: "5.4"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
