document: rfc-8824
kind: normative-requirement
summary: SCHC MUST NOT send the Token Value as variable-length data in the Compression Residue, to avoid ambiguity with the Token Length field. Instead, SCHC MUST use the Token Length value to define the size of the Compression Residue for the Token Value.
section: "4.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
