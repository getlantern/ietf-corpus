document: rfc-2086
kind: protocol-element
summary: An access control list (ACL) is a set of <identifier, rights> pairs. The identifier 'anyone' is reserved for the universal identity (all authentications including anonymous); identifiers matching LOGIN/AUTHENTICATE usernames are reserved for those users; identifiers starting with '-' denote negative rights.
