document: rfc-5651
kind: protocol-element
summary: The Expected Residual Time (ERT) is a 32-bit unsigned integer in seconds representing the sender's expected remaining transmission time for the current object (or session object if no TOI is present). The Session Last Changed (SLC) field records when the last Transport Object addition, modification, or removal occurred.
section: 5.2.2
