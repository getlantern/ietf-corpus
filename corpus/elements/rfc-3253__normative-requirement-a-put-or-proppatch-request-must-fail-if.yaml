document: rfc-3253
kind: normative-requirement
summary: A PUT or PROPPATCH request MUST fail if the request-URL identifies a version (DAV:cannot-modify-version), and MUST fail if the resource has a DAV:checked-in property unless DAV:auto-version semantics will automatically check out the resource.
section: "3.10"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
