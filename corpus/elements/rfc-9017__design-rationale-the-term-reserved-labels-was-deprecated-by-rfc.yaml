document: rfc-9017
kind: design-rationale
summary: The term 'Reserved Labels' was deprecated by RFC 7274 because 'Reserved' means 'set aside, not to be used', but those labels were actually available for allocation. 'Special-Purpose Labels' (SPLs) was introduced as a replacement term.
section: "1"
topics:
