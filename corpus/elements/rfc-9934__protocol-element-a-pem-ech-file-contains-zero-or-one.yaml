document: rfc-9934
kind: protocol-element
summary: A PEM ECH file contains zero or one private key and one encoded ECHConfigList. The file is the concatenation of the PEM-encoded private key (if present) followed by the PEM-encoded public key(s) as an ECHConfigList.
