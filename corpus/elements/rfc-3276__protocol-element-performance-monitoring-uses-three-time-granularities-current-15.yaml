document: rfc-3276
kind: protocol-element
summary: 'Performance monitoring uses three time granularities: current 15-minute intervals (up to 96 historical buckets covering 24 hours), current 1-day intervals (up to 30 historical buckets covering 30 days), and cumulative counters since last xU restart. Metrics tracked include ES, SES, CRC anomalies, LOSW seconds, and UAS.'
