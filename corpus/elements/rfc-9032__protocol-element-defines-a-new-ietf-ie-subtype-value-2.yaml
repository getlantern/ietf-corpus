document: rfc-9032
kind: protocol-element
summary: 'Defines a new IETF IE subtype (value 2, ''6tisch-Join-Info'') to be placed in IEEE 802.15.4 Enhanced Beacon (EB) frames, carrying join and enrollment information for pledges and long-sleeping nodes. The subtype includes fields: R flag, P flag, reserved bits, proxy priority, rank priority, PAN priority, optional Join Proxy Interface ID, and variable-length network ID.'
