document: rfc-5112
kind: design-rationale
summary: The '<' and '>' delimiters were intentionally omitted from XML element strings so that the same string entry can be reused for start-tags (e.g., <foo>), start-tags with attributes (e.g., <foo attr="x">), empty-element tags (e.g., <foo/>), and end-tags (e.g., </foo>).
section: "3"
