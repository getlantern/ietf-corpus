kind: registry
summary: 'IANA maintains the ''DOTS Signal Channel Protocol'' registry with five subregistries: CBOR Key Values, Status Codes (Table 3), Conflict Status Codes, Conflict Cause Codes, and Attack Status Codes (Table 4). The CBOR Key Values subregistry uses a ''comprehension-required'' (0–127) and ''comprehension-optional'' (128–255) key space split.'
