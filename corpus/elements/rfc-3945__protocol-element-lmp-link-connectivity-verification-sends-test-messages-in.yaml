document: rfc-3945
kind: protocol-element
summary: LMP link connectivity verification sends Test messages in-band over data-bearing links. The Test message is the only LMP message transmitted over the data-bearing link; all other LMP messages, including Hello, continue over the control channel during verification.
section: "6.3"
topics:
    - routing
