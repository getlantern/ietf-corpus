document: rfc-6117
kind: normative-requirement
summary: A '-' (dash) MUST NOT be used as the first, second, or last character of a Type or Subtype. Type and Subtype MUST NOT start with the string 'e2u' to avoid confusion with deprecated syntax.
section: "3.2"
rfc2119_level: MUST NOT
