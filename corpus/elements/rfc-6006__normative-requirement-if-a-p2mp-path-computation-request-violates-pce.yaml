document: rfc-6006
kind: normative-requirement
summary: If a P2MP path computation request violates PCE policy, the PCE MUST send a PCErr with Error-Type=5, Error-Value=7 ('P2MP Path computation not allowed'), and the corresponding request MUST be cancelled.
