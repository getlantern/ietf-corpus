document: rfc-6353
kind: wire-format
summary: SnmpTLSFingerprint is an OCTET STRING (SIZE 0..255) composed of a 1-octet hashing algorithm identifier taken from the IANA TLS HashAlgorithm Registry (RFC 5246) followed by the fingerprint value. A zero-length value is permitted for optional use in tables.
