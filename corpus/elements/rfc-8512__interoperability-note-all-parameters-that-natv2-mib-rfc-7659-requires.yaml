document: rfc-8512
kind: interoperability-note
summary: All parameters that NATV2-MIB (RFC 7659) requires to be configured 'by some means not specified' — address realms, subscriber info, NAT instance identification, port/filtering/pooling/fragment behaviors, address pools, and static mappings — are configurable via this YANG module. Unlike NATV2-MIB, the YANG module additionally supports multiple policies per NAT instance.
section: "2.11"
topics:
    - nat
    - yang
    - snmp
