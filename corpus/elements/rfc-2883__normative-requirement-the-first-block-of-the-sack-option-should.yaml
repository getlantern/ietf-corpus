document: rfc-2883
kind: normative-requirement
summary: The first block of the SACK option should be a D-SACK block specifying the sequence numbers for the duplicate segment that triggered the acknowledgement. If the duplicate is part of a larger non-contiguous block above the cumulative ACK, the second SACK block should specify that larger block.
section: "4"
rfc2119_level: SHOULD
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
