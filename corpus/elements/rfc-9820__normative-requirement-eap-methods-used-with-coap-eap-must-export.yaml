document: rfc-9820
kind: normative-requirement
summary: EAP methods used with CoAP-EAP MUST export cryptographic material, specifically an MSK of at least 64 octets and an EMSK of at least 64 octets, as specified in RFC 5247. Methods that do not export keying material cannot be used.
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - security
