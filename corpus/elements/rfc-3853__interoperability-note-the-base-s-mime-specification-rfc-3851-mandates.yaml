document: rfc-3853
kind: interoperability-note
summary: The base S/MIME specification (RFC 3851) mandates support for 3DES encryption, DH key encryption, and DSS signature; however, the SIP profile of S/MIME overrides these to RECOMMENDED, making AES, RSA key transport, and RSA signature the mandatory-to-implement suite for SIP.
section: "3"
topics:
    - sip
    - security
    - crypto
