document: rfc-6019
kind: protocol-element
summary: The binary-signing-time attribute specifies the time at which the signer purportedly performed the signing process, for use with CMS SignedData and AuthenticatedData content types. Its ASN.1 type BinarySigningTime is a direct alias for BinaryTime.
