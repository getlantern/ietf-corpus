document: rfc-5553
kind: normative-requirement
summary: When PKS expansion fails because the PCE-ID cannot be matched to a PCE, the LSR MUST send a PathErr with error code 'Routing Problem' and new error value 'Unknown PCE-ID for PKS expansion' (value 31).
