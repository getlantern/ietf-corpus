document: rfc-7623
kind: security-consideration
summary: 'All security considerations from RFC 7432 apply directly to PBB-EVPN because PBB-EVPN reuses the RFC 7432 control plane. No new security considerations are introduced: B-MAC addresses follow RFC 7432 advertisement and processing, and C-MAC addresses follow RFC 4761 data-plane learning.'
