document: rfc-1740
kind: protocol-element
summary: MULTIPART/APPLEDOUBLE is a MIME multipart type for sending AppleDouble files, which separate the Macintosh resource fork (sent as application/applefile) from the data fork (sent as an appropriate content type such as image/gif or application/octet-stream). May have only two sub-parts.
