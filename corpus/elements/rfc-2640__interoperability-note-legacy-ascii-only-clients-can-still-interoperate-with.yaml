document: rfc-2640
kind: interoperability-note
summary: Legacy ASCII-only clients can still interoperate with new UTF-8 servers because UTF-8 single-byte sequences are identical to ASCII. Servers supporting this specification can detect whether a presented pathname is valid UTF-8 (see Annex B.1) to distinguish old from new clients.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
