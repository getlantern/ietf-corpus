document: rfc-8599
kind: normative-requirement
summary: If a UA has created multiple bindings, it MUST send a binding-refresh REGISTER request for each binding when it receives a push notification. This ensures all bindings remain active after the UA is awakened.
section: 4.1.3
rfc2119_level: MUST
topics:
    - sip
