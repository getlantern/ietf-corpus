document: rfc-6408
kind: security-consideration
summary: The security considerations of RFC 3588 apply to this document; no additional security mechanisms are required. However, a malicious host performing S-NAPTR queries can learn the Diameter applications supported by agents in a realm more efficiently than via capability exchange, potentially enabling faster scanning of targets with known application vulnerabilities.
section: "8"
topics:
    - security
    - diameter
