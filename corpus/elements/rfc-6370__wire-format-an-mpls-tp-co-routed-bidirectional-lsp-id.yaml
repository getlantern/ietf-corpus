summary: An MPLS-TP co-routed bidirectional LSP_ID is formed as A1-{Node_ID::Tunnel_Num}::Z9-{Node_ID::Tunnel_Num}::LSP_Num, where LSP_Num is a 16-bit unsigned integer unique within the Tunnel_ID. A single LSP_Num covers both unidirectional LSPs.
