document: rfc-9354
kind: normative-requirement
summary: When the PLC MAC MTU cannot support the 1280-octet IPv6 packet, headers MUST be compressed according to the encoding formats specified in RFC 6282, including the Dispatch Header, LOWPAN_IPHC, and the compression residue carried inline.
section: "4.5"
rfc2119_level: MUST
