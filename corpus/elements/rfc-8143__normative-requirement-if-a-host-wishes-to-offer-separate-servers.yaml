document: rfc-8143
kind: normative-requirement
summary: If a host wishes to offer separate servers for transit and reading clients, TCP port 563 SHOULD be used for implicit TLS with the reading server, and a different unused port (not 433) SHOULD be used for implicit TLS with the transit server.
section: A.2
rfc2119_level: SHOULD
topics:
