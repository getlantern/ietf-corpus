document: rfc-1638
kind: design-rationale
summary: Tinygram compression is optional and sender-controlled rather than mandatory because not all systems can modify frames in transit, and on high-speed lines the overhead is not worthwhile; systems that do not negotiate it should never receive a compressed packet.
section: "3.3"
topics:
    - routing
