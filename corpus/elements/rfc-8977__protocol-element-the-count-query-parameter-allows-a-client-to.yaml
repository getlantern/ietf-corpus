document: rfc-8977
kind: protocol-element
summary: 'The ''count'' query parameter allows a client to request the total number of objects matching a search pattern. It accepts trueValue (''true'', ''yes'', ''1'') or falseValue (''false'', ''no'', ''0''). ABNF: count = "count=" ( trueValue / falseValue ).'
section: "2.2"
