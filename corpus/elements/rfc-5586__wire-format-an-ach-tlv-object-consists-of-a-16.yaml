document: rfc-5586
kind: wire-format
summary: An ACH TLV Object consists of a 16-bit Type field, a 16-bit Length field (number of octets in Value), and a variable-length Value field. The Value MAY contain sub-TLVs. No padding is required for individual TLVs or sub-TLVs.
section: "3.3"
topics:
