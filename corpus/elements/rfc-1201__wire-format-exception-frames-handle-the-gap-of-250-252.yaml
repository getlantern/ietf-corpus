document: rfc-1201
kind: wire-format
summary: Exception frames handle the gap of 250–252 octets of client data that cannot fit in short or long frames. They are structured like long frames but include a flag byte of 0xFF and two 0xFF padding bytes before repeating the protocol ID, split flag, and sequence number fields.
section: "2.1"
