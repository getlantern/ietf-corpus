document: rfc-4303
kind: protocol-element
summary: The Next Header field is a mandatory 8-byte field identifying the type of data in the Payload. Protocol value 59 ('no next header') MUST designate a dummy TFC packet; a transmitter MUST be able to generate such packets and a receiver MUST silently discard them without indicating an error.
section: "2.6"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
