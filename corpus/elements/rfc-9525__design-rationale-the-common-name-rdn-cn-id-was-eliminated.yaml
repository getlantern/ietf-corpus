document: rfc-9525
kind: design-rationale
summary: The Common Name RDN (CN-ID) was eliminated as a valid identifier for service identity because it is not strongly typed — it is essentially free-form text and suffers from ambiguities in interpretation. Only the subjectAltName extension, which provides formally defined identifier types, is now valid for expressing service identity.
section: "1.3"
topics:
    - tls
    - pkix
