document: rfc-4895
kind: protocol-element
summary: The CHUNKS parameter (type 0x8003) specifies which chunk types the peer is required to send only in authenticated form. It must be included once in INIT or INIT-ACK if the sender wants to receive authenticated chunks, and has a maximum length of 260 bytes.
section: "3.2"
topics:
    - sctp
    - security
