document: rfc-8650
kind: design-rationale
summary: Subscribers cannot predetermine the subscription URI before issuing 'establish-subscription' because the URI only exists after the RPC is accepted. Therefore, the POST for 'establish-subscription' replaces the GET for the 'location' leaf used in RFC 8040, and the URI is returned in the RPC response.
section: "3"
topics:
