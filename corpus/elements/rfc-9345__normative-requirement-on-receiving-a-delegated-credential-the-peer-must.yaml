document: rfc-9345
kind: normative-requirement
summary: 'On receiving a delegated credential, the peer must: (1) verify current time is within the validity interval; (2) verify remaining validity is no more than 7 days and less than the certificate expiry; (3) verify dc_cert_verify_algorithm matches CertificateVerify; (4) verify end-entity certificate conditions; (5) verify the DC signature using the end-entity certificate''s public key. Failure on any check MUST result in ''illegal_parameter'' alert.'
section: 4.1.3
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
