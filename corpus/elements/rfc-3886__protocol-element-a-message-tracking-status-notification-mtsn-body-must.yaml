document: rfc-3886
kind: protocol-element
summary: A Message Tracking Status Notification (MTSN) body MUST be a multipart/related with type parameter of 'message/tracking-status'; each subpart MUST be of type 'message/tracking-status'. Multiple parts may be included when an MTQP server chains requests to the next server.
