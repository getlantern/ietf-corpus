document: rfc-3519
kind: normative-requirement
summary: If the HA assents to UDP tunnelling, it MUST use the source address of the registration request as the effective care-of address (the NAT's public address) rather than the care-of address given in the Registration Request body, except when the 'R' flag is set.
section: "4.6"
rfc2119_level: MUST
topics:
    - nat
    - mobility
