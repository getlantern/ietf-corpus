document: rfc-7371
kind: normative-requirement
summary: An Embedded-RP multicast address MUST have the R-bit set to 1 (replacing the old requirement that it be in the FF70::/12 prefix). It MUST also have the P-bit and T-bit both set to 1 when using the embedding defined in RFC 3956.
section: 4.2.3
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
