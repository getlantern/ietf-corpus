document: rfc-9754
kind: protocol-element
summary: The fattr4_offline attribute (FATTR4_OFFLINE = 83, type bool) lets a client predetermine whether a file is offline before attempting to open it, avoiding inadvertent retrieval of expensive archived data. Offline files have immediately accessible attributes but expensive-to-retrieve content.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
