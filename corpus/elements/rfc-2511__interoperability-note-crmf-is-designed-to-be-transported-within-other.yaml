document: rfc-2511
kind: interoperability-note
summary: CRMF is designed to be transported within other PKI management protocols (e.g., CMP). The specification explicitly leaves secure transport mechanisms out of scope, requiring the enclosing protocol to ensure integrity, data origin authenticity, and privacy.
section: "2"
topics:
    - pkix
    - security
