document: rfc-2252
kind: wire-format
summary: DN (OID 1.3.6.1.4.1.1466.115.121.1.12) values are encoded using the UTF-8 string representation defined in RFC 2253. This representation is not reversible to the ASN.1/X.500 encoding, as the CHOICE of DirectoryString element in an RDN is lost in the string form.
