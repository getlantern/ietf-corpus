document: rfc-5580
kind: normative-requirement
summary: Confidentiality protection MUST be used (e.g., via RADIUS over IPsec) to prevent eavesdroppers from accessing location information. Mutual authentication MUST be provided between neighboring RADIUS entities to prevent man-in-the-middle attacks.
section: "7.1"
rfc2119_level: MUST
topics:
    - radius
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
