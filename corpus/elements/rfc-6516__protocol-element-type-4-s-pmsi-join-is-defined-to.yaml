document: rfc-6516
kind: protocol-element
summary: Type 4 S-PMSI Join is defined to assign a customer IPv6 (C-S,C-G) flow to a P-tunnel created by PIM/IPv4. Data and control packets on the P-tunnel are sent using GRE/IPv4 encapsulation. This complements the existing Type 1 S-PMSI Join, which handles IPv4 customer flows.
section: "3"
topics:
