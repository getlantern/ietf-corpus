document: rfc-7542
kind: normative-requirement
summary: Realm characters in an NAI MUST match the ABNF in Section 2.2 as well as RFC 5891 requirements; specifically, realms MUST be of the form registerable as a Fully Qualified Domain Name (FQDN) in the DNS. Matching the ABNF is necessary but not sufficient — some ABNF-matching realms are still invalid due to DNS restrictions on code points.
section: "2.5"
rfc2119_level: MUST
topics:
    - radius
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
