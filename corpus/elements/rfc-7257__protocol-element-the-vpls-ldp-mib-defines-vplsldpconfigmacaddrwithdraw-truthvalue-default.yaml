summary: The VPLS-LDP-MIB defines vplsLdpConfigMacAddrWithdraw (TruthValue, default true) to enable/disable MAC address withdrawal per RFC 4762, and vplsLdpPwBindMacAddressLimit (Unsigned32, default 0 meaning unlimited) to cap learned and static MAC entries per PW binding.
