document: rfc-8622
kind: normative-requirement
summary: Non-LE traffic (e.g., BE traffic) SHOULD NOT be re-marked to LE. Re-marking traffic from another PHB results in that traffic being downgraded, which may violate the operational objectives of the original PHB.
