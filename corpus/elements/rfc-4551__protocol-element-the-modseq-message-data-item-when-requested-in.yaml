document: rfc-4551
kind: protocol-element
summary: 'The MODSEQ message data item, when requested in a FETCH command, causes the server to return per-message mod-sequence values in the fetch response: `MODSEQ (<permsg-modsequence>)`. Once requested, the server MUST include MODSEQ in all subsequent unsolicited FETCH responses for that session.'
section: 3.3.2
topics:
    - email
