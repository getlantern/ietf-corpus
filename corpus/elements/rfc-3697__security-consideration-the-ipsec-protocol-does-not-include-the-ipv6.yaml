document: rfc-3697
kind: security-consideration
summary: The IPsec protocol does not include the IPv6 header's Flow Label in any cryptographic calculations (in tunnel mode, the outer header's Flow Label is excluded). Therefore IPsec provides no defense against modification of the Flow Label by a network node.
section: "5.2"
topics:
    - ip
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
