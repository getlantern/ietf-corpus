document: rfc-8229
kind: normative-requirement
summary: If TCP encapsulation is being used for a specific IKE SA, all messages for that IKE SA and its Child SAs MUST be sent over a TCP connection until the SA is deleted or MOBIKE is used to change the SA endpoints and/or encapsulation protocol.
section: "5"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
