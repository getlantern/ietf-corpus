document: rfc-2077
kind: security-consideration
summary: Model data files are treated as read-only and do not contain file system modifiers or batch/macro commands. The transported data is not self-modifying, though files may contain a 'default view' set by the author that can manipulate viewer variables, lighting, and visualization options, including hardware position changes for motorized equipment.
section: "5"
