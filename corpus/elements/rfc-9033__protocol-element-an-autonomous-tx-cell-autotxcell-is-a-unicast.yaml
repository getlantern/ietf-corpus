document: rfc-9033
kind: protocol-element
summary: An Autonomous Tx Cell (AutoTxCell) is a unicast transmit cell at [slotOffset, channelOffset] computed as a SAX hash of the Layer 2 EUI-64 destination address, with cell option bits TX=1, RX=0, SHARED=1. It is added on demand when no 6P negotiated Tx cell exists for the destination and removed when no frame is pending or a negotiated Tx cell is available.
section: "3"
