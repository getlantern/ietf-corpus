document: rfc-9249
kind: design-rationale
summary: 'The association list uses a three-part key {address, local-mode, isconfigured} because all three are needed to uniquely identify an association: a broadcast client (isconfigured=false) and a configured unicast client (isconfigured=true) to the same address are distinct associations.'
