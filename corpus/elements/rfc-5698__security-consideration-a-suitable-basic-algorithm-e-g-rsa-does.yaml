document: rfc-5698
kind: security-consideration
summary: A suitable basic algorithm (e.g., RSA) does not guarantee that all cryptographic schemes based on it are also secure. Complete signature verification requires checking all involved algorithms (signature schemes, public key algorithms of certificates, revocation information, etc.) against the policy.
section: "7"
topics:
