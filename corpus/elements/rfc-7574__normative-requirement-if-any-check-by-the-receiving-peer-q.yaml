document: rfc-7574
kind: normative-requirement
summary: If any check by the receiving Peer Q fails, or if the peers are not in the same swarm, Peer Q MUST NOT send a HANDSHAKE or any other message back, as the message from Peer P may have been spoofed.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
