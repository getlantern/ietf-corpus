document: rfc-7641
kind: protocol-element
summary: The 'obs' target attribute in a web link (RFC 5988 / RFC 6690) is a hint that the linked resource supports observation. It MUST NOT carry a value; any value present MUST be ignored by parsers. It MUST NOT appear more than once in a link-value.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
