document: rfc-9060
kind: design-rationale
summary: Delegation is needed because enterprises and other non-carrier entities place outbound calls through service providers that do not control the numbering resources being attested. Without delegation, outbound carriers would sign calls with credentials not covering the originating number, which is indistinguishable from malicious spoofing and erodes STIR trust.
section: "3"
topics:
