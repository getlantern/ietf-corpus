document: rfc-7527
kind: design-rationale
summary: Enhanced DAD is intentionally limited to DAD operations only. Extending it to all ND solicitations and advertisements is theoretically possible but would increase implementation complexity and memory usage on the sender node, which must store nonce state for all tracked ND messages.
section: "4"
topics:
