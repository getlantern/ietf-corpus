summary: 'The L2TPv3 VCCV Capability AVP (Attribute Type 96) has a 16-bit value field: 8-bit CC Types bitmask followed by 8-bit CV Types bitmask. The AVP Vendor ID MUST be 0, M bit SHOULD be 0, and length (before hiding) is 8.'
