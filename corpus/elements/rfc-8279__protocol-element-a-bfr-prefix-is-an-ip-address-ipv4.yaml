document: rfc-8279
kind: protocol-element
summary: A BFR-prefix is an IP address (IPv4 or IPv6) assigned to a BFR for a given sub-domain; it is recommended to be a loopback address and must be routable within the sub-domain. All BFR-prefixes within a given sub-domain must belong to the same address family.
section: "2"
topics:
    - routing
