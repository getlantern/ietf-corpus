document: rfc-9464
kind: normative-requirement
summary: If the CFG_REQUEST includes multiple bitwise identical attributes, the responder SHOULD ignore all but the first occurrence. The responder MAY discard the full request if the count of repeated attributes exceeds an implementation-specific threshold.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
    - vpn
    - ipsec
