document: rfc-9809
kind: wire-format
summary: The KeyPurposeIds are encoded as OBJECT IDENTIFIERs under the id-kp arc { iso(1) identified-organization(3) dod(6) internet(1) security(5) mechanisms(5) pkix(7) 3 }, with id-kp-configSigning at arc 41, id-kp-trustAnchorConfigSigning at arc 42, id-kp-updatePackageSigning at arc 43, and id-kp-safetyCommunication at arc 44. The EKU extension syntax is ExtKeyUsageSyntax ::= SEQUENCE SIZE (1..MAX) OF KeyPurposeId.
