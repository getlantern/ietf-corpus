document: rfc-2068
kind: security-consideration
summary: Sensitive information such as authentication credentials and personal data SHOULD only be transferred over secure channels. HTTP by default provides no encryption or authentication of the transport, and proxies on the path can observe all data.
section: "15.4"
topics:
    - http
    - security
