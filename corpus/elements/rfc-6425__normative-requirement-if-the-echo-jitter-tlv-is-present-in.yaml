document: rfc-6425
kind: normative-requirement
summary: If the Echo Jitter TLV is present in an echo request, the responding LSR MUST delay sending its reply for a random amount of time between zero milliseconds and the value specified in the TLV.
section: "3.3"
rfc2119_level: MUST
topics:
