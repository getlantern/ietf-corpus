document: rfc-9135
kind: normative-requirement
summary: If a receiving PE only supports asymmetric IRB mode but receives a MAC/IP Advertisement route with the MPLS Label2 field, it MUST ignore the MPLS Label2 field and install the MAC address and (IP, MAC) association using asymmetric procedures.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
