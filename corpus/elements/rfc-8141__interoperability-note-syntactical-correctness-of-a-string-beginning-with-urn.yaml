document: rfc-8141
kind: interoperability-note
summary: Syntactical correctness of a string beginning with 'urn:' is not sufficient to make it a valid URN; the NID must be registered in accordance with the rules in this document and the NSS must conform to the registered namespace's rules. Generic URI processors must treat URNs as opaque unless the scheme is recognized.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
