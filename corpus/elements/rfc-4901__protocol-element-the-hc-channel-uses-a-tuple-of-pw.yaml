document: rfc-4901
kind: protocol-element
summary: The HC channel uses a tuple of <PW label, CID> to uniquely identify decompression contexts at the HD. This allows multiple compressors that independently assign the same CID to different flows to coexist at a single decompressor, since the PW label scopes the CID namespace.
