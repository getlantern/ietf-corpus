document: rfc-7591
kind: interoperability-note
summary: 'The ''grant_types'' and ''response_types'' values are correlated: ''authorization_code'' implies ''code'', ''implicit'' implies ''token'', while ''password'', ''client_credentials'', ''refresh_token'', and JWT/SAML bearer grant types imply no response type. Servers SHOULD prevent clients from registering inconsistent combinations.'
section: "2.1"
topics:
    - oauth
