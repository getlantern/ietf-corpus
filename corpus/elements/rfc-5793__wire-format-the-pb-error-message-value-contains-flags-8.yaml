document: rfc-5793
kind: wire-format
summary: 'The PB-Error message value contains: Flags (8 bits, bit 0 = FATAL), Error Code Vendor ID (24 bits), Error Code (16 bits), Reserved (16 bits), and Error Parameters (variable). Minimum PB-TNC Message Length is 20. The NOSKIP flag MUST be set. A fatal PB-Error MUST always be sent in a CLOSE batch.'
section: "4.9"
topics:
    - security
