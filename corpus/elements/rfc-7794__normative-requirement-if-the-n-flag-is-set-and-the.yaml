document: rfc-7794
kind: normative-requirement
summary: If the N-flag is set and the prefix length is NOT a host prefix (/32 for IPv4, /128 for IPv6), then the N-flag MUST be ignored. The N-flag MUST be preserved when leaked between levels.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
