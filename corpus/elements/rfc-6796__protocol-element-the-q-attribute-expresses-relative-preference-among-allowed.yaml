document: rfc-6796
kind: protocol-element
summary: The 'q' attribute expresses relative preference among allowed values in a set. Its value is a decimal in [0,1] with up to two decimal places; higher values indicate greater preference. It is only allowed on elements specifying allowed (not excluded) values.
