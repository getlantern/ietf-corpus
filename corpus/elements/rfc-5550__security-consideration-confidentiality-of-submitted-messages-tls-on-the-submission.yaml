document: rfc-5550
kind: security-consideration
summary: 'Confidentiality of submitted messages: TLS on the submission path guards against eavesdropping. If TLS is absent, using BURL is no worse than submitting the message text directly; in some BURL forms the eavesdropper may gain less access than with direct text submission.'
section: "10.1"
