document: rfc-8529
kind: security-consideration
summary: NETCONF access to this module requires SSH as the mandatory-to-implement secure transport (RFC 6242); RESTCONF access requires HTTPS with TLS (RFC 8446). The Network Configuration Access Control Model (NACM, RFC 8341) provides per-user access control over protocol operations and content.
