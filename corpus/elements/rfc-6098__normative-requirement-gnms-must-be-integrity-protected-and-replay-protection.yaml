document: rfc-6098
kind: normative-requirement
summary: GNMs MUST be integrity protected, and replay protection MUST be guaranteed. The 64-bit Identification field provides replay protection for notifications initiated by the FA or HA, filling a gap in RFC 5944 which only provided replay protection for MN-initiated Registration Requests.
section: "7"
rfc2119_level: MUST
topics:
    - mobility
    - security
