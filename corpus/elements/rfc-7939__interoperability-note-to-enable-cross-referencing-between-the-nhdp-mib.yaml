document: rfc-7939
kind: interoperability-note
summary: To enable cross-referencing between the NHDP-MIB and routing protocol MIB modules that rely on NHDP neighbor information, NeighborIfIndex and NeighborRouterIndex are defined as shared index types. Routing protocol MIBs on the same router SHOULD use the same locally significant index values for cross-table correlation.
section: "6.2"
topics:
    - routing
