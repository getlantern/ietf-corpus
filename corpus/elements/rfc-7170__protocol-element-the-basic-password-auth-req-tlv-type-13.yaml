document: rfc-7170
kind: protocol-element
summary: The Basic-Password-Auth-Req TLV (type 13) and Basic-Password-Auth-Resp TLV (type 14) enable password-based authentication within the TEAP tunnel as an alternative to inner EAP methods. The peer may reject the request with a NAK TLV; the server uses an Intermediate-Result TLV to signal success or failure.
section: 4.2.14
topics:
    - security
