document: rfc-2225
kind: interoperability-note
summary: For backward compatibility with RFC 1577, when a null IPv4 protocol address is received with length=4 and value 0.0.0.0, receiving stations MUST accept this format. However, on transmitting, a null IPv4 address MUST be indicated by length=0 with no storage allocated.
section: 8.7.5
topics:
    - ip
