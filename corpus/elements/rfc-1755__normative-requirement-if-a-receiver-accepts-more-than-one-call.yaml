document: rfc-1755
kind: normative-requirement
summary: If a receiver accepts more than one call from a single source, it MUST accept incoming PDUs on all additional connections, and MAY transmit on them. Receivers SHOULD NOT accept an incoming call only to close it or ignore PDUs from that connection.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
