document: rfc-1407
kind: design-rationale
summary: All Counters from RFC 1233 were changed to Gauges. Performance parameters that accumulate over a fixed interval and are then reset require Gauge semantics under SNMPv1 SMI rather than the monotonically-increasing Counter type.
