document: rfc-8611
kind: normative-requirement
summary: When a responder LSR receives an MPLS echo request carrying the LSR Capability TLV and knows how to process it, it MUST include the LSR Capability TLV in the MPLS echo reply message describing the features and extensions supported by the local LSR.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
