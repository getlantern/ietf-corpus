document: rfc-7065
kind: security-consideration
summary: A TURN client MUST ensure that the username, password, "turns" URI, and any other security-relevant parameters are received with equivalent security before using the "turns" URI. Receiving those parameters over a TLS session with commensurate ciphersuites can provide appropriate security.
section: "4"
rfc2119_level: MUST
topics:
    - nat
    - tls
    - security
