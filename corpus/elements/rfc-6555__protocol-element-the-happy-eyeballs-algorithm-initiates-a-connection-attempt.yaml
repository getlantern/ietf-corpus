document: rfc-6555
kind: protocol-element
summary: The Happy Eyeballs algorithm initiates a connection attempt with the preferred address family (typically IPv6), and if that connection does not complete within a short period (Firefox and Chrome use 300 ms), initiates a second attempt with the first address of the other address family (IPv4). The first connection established is used and the other is discarded.
section: "6"
topics:
    - ip
    - v6ops
