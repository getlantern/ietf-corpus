document: rfc-5793
kind: wire-format
summary: 'The PB-Assessment-Result message value contains a single 32-bit Assessment Result field: 0=compliant, 1=minor non-compliance, 2=significant non-compliance, 3=error determining compliance, 4=unable to determine. The PB-TNC Message Length MUST be exactly 16.'
