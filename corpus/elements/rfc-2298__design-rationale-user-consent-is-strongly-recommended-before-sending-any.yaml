document: rfc-2298
kind: design-rationale
summary: User consent is strongly recommended before sending any MDN, reflecting the privacy concerns historically associated with read-receipt functionality. The 'denied' disposition type is provided so a UA can explicitly inform the sender that disposition information will not be shared.
section: "2.1"
topics:
    - email
    - privacy
