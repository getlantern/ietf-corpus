document: rfc-7940
kind: normative-requirement
summary: Any duplicate variant labels encountered MUST be treated as an error. Conditional variants where more than one context condition is simultaneously met for the same mapping also produce duplicate variant labels and MUST be treated as errors.
section: 5.3.1
rfc2119_level: MUST
