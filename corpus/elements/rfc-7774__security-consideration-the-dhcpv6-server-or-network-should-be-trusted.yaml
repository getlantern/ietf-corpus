document: rfc-7774
kind: security-consideration
summary: The DHCPv6 server or network SHOULD be trusted via DHCPv6 authentication (RFC 3315 Section 21). In ROLL environments where authentication may be unavailable due to resource constraints, alternative integrity protection mechanisms or node authentication at join time (e.g., ZigBee IP, RFC 5191/PANA) should be applied.
section: "4"
topics:
    - security
    - routing
