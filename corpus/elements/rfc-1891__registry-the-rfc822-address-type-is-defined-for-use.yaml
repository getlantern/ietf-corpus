document: rfc-1891
kind: registry
summary: The 'rfc822' address-type is defined for use in Original-Recipient and Final-Recipient DSN fields, representing Internet email addresses of the form [route] addr-spec with fully-qualified DNS domain names. MTAs MUST NOT modify envelope addresses to force syntax conformance.
