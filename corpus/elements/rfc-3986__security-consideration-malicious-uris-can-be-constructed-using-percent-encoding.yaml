document: rfc-3986
kind: security-consideration
summary: Malicious URIs can be constructed using percent-encoding to obscure the true target, or by using relative paths that escape expected boundaries. Applications should display decoded URIs to users but must process encoded forms for access control decisions.
section: "7.2"
topics:
    - security
