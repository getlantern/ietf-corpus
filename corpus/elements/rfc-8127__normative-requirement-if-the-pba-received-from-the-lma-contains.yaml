document: rfc-8127
kind: normative-requirement
summary: If the PBA received from the LMA contains the LCMP option with the Binding Re-registration Control Sub-Option, the MAG MUST overwrite its locally configured re-registration timer parameters with the received values. If any parameter in the sub-option is ZERO, the MAG MUST ignore the PBA and SHOULD log an error.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
