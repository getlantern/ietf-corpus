document: rfc-9639
kind: design-rationale
summary: FLAC has no format version field; instead, reserved space is included in multiple locations. Future format versions MAY use reserved space safely. Forbidden patterns are listed explicitly so decoders can detect invalid data. This approach was chosen to allow forward-compatible extension without breaking older decoders.
section: "5"
