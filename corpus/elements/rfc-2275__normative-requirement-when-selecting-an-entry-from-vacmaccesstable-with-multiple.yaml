document: rfc-2275
kind: normative-requirement
summary: When selecting an entry from vacmAccessTable with multiple candidates, the algorithm first prefers entries with an identical securityModel over 'any', then prefers entries with an identical contextPrefix, then prefers longer contextPrefixes, then selects the entry with the highest securityLevel.
section: "4"
rfc2119_level: MUST
topics:
