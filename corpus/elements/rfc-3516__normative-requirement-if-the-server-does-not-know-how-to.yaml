document: rfc-3516
kind: normative-requirement
summary: If the server does not know how to decode a section's CTE, it MUST fail the request and issue a "NO" response containing the "UNKNOWN-CTE" extended response code. This applies to both FETCH BINARY and BINARY.SIZE requests.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
