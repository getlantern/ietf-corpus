document: rfc-7033
kind: security-consideration
summary: HTTPS is required for all WebFinger exchanges to prevent modification in transit. A compromised network could substitute an HTTP endpoint for an HTTPS one; clients must never fall back to HTTP under any circumstances.
section: "9.1"
topics:
