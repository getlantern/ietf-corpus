document: rfc-6719
kind: normative-requirement
summary: Path cost SHOULD be recomputed each time the selected link metric is updated, the selected node metric is updated, or a new metric advertisement is received from a candidate neighbor. This computation SHOULD also be performed periodically.
section: "3.1"
rfc2119_level: SHOULD
