document: rfc-1122
kind: security-consideration
summary: A host MUST silently discard an incoming datagram with an IP source address that is invalid per Section 3.2.1.3 (broadcast, loopback, or otherwise reserved). This prevents source-address spoofing and forged broadcast responses.
section: 3.2.1.3
topics:
    - ip
    - security
