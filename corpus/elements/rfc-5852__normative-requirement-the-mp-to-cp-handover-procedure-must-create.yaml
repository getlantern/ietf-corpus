document: rfc-5852
kind: normative-requirement
summary: The MP-to-CP Handover procedure MUST create an RSVP-TE session along the path of the LSP to be moved, associating it with existing cross-connected resources owned by the MP and transferring their ownership to the CP without affecting Data Plane traffic.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
