document: rfc-5663
kind: wire-format
summary: The pnfs_block_layouthint4 structure is the block-layout-specific loh_body for LAYOUT4_BLOCK_VOLUME layout hints set via SETATTR. It contains blh_maximum_io_time (uint64_t, maximum I/O time in seconds; all-1s indicates an unbounded I/O time). Clients using block layouts MUST set this hint attribute before issuing the first LAYOUTGET operation.
section: 2.3.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
