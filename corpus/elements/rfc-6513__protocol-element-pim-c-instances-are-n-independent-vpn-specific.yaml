document: rfc-6513
kind: protocol-element
summary: PIM C-instances are n independent VPN-specific multicast routing instances running on a PE attached to n MVPNs. Each C-instance is associated with a VRF (extended from RFC 4364 to include multicast routing entries). CE routers become multicast routing adjacencies of their local PE but not of CE routers at other sites.
section: "3.1"
topics:
    - mpls
    - multicast
    - routing
