document: rfc-6083
kind: normative-requirement
summary: Before sending a ChangeCipherSpec message, all outstanding SCTP user messages MUST have been acknowledged and MUST NOT be revocable by the SCTP peer. Prior to processing a received ChangeCipherSpec, all buffered SCTP user messages MUST be read and processed by DTLS.
section: "4.7"
rfc2119_level: MUST
topics:
    - tls
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
