document: rfc-2308
kind: normative-requirement
summary: Name servers authoritative for a zone MUST include the SOA record of the zone in the authority section when reporting an NXDOMAIN or indicating that no data of the requested type exists, so that the response may be cached.
section: "3"
rfc2119_level: MUST
topics:
