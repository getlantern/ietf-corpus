document: rfc-2616
kind: normative-requirement
summary: An HTTP/1.1 client MUST send a Host header field in all HTTP/1.1 request messages. If the requested URI does not include an Internet host name, the Host header field value MUST be sent as an empty string.
section: "14.23"
rfc2119_level: MUST
topics:
    - http
