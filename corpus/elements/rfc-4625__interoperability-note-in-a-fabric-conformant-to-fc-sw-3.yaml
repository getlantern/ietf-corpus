document: rfc-4625
kind: interoperability-note
summary: In a fabric conformant to FC-SW-3 only one Fabric can exist in a physical infrastructure, so t11FcRouteFabricIndex is always 1. In FC-SW-4 environments, the index distinguishes multiple Virtual Fabrics operating within the same physical infrastructure.
