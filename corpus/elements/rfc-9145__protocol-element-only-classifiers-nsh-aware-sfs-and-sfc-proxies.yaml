document: rfc-9145
kind: protocol-element
summary: Only Classifiers, NSH-aware SFs, and SFC proxies may encrypt or decrypt Context Headers; SFFs never participate in encryption. Both encrypted and unencrypted Context Headers may coexist in the same NSH packet. The Service Path Header is never encrypted because SFFs require SPI and SI for forwarding decisions.
section: 4.1.1
topics:
    - security
    - crypto
