document: rfc-5801
kind: normative-requirement
summary: GSS-API mechanisms that negotiate other mechanisms (such as SPNEGO, RFC 4178) MUST NOT be used with GS2. SASL client implementations MUST NOT choose the SPNEGO mechanism under any circumstances, due to both interoperability and security problems with double negotiation.
section: "14.3"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
