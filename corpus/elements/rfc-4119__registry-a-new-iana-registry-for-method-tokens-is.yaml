document: rfc-4119
kind: registry
summary: 'A new IANA registry for ''method'' tokens is created, designating the manner in which location information was derived. Registration is open to any party on a first-come-first-serve basis. Seven initial tokens are registered: GPS, A-GPS, Manual, DHCP, Triangulation, Cell, 802.11.'
