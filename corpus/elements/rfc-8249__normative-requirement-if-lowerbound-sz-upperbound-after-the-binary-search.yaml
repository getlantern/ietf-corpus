document: rfc-8249
kind: normative-requirement
summary: If lowerBound < Sz < upperBound after the binary search, RBridges SHOULD test whether the link can support Sz by probing at Sz. Without this test, the safe assumption is that the link cannot support Sz, which could cause unnecessary network partition.
section: "3"
rfc2119_level: SHOULD
topics:
