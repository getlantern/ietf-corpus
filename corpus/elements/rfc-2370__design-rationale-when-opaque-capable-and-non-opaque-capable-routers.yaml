document: rfc-2370
kind: design-rationale
summary: When opaque-capable and non-opaque-capable routers coexist, Opaque LSAs are not flooded to non-opaque-capable routers. This follows the general OSPF design principle that optional advertisements are only flooded to routers that understand them, enabling backward compatibility.
section: "3.1"
topics:
    - routing
