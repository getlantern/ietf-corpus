document: rfc-6580
kind: normative-requirement
summary: For RDMAP and DDP registries, if an Error Type is registered without an Error Code, no entry with an Error Code for the same Error Type must be added. This preserves the 'ALL' semantics—when Layer+Error Type alone identify the error, Error Code is unconstrained.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
