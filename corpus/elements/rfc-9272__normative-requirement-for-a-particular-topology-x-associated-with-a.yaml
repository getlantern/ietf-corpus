document: rfc-9272
kind: normative-requirement
summary: 'For a particular topology X associated with a sub-domain, a router MUST calculate underlay paths by: (1) applying BIER constraints to get BC(X), (2) applying routing constraints to get RC(BC(X)), (3) selecting algorithm AG (BA if non-NULL, else RA), and (4) running AG on RC(BC(X)).'
section: "3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
