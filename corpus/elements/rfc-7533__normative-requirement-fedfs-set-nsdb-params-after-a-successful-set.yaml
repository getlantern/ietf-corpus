document: rfc-7533
kind: normative-requirement
summary: 'FEDFS_SET_NSDB_PARAMS: after a successful set, the new connection parameters SHOULD be used for all subsequent LDAP connections to the given NSDB. The connection parameters SHOULD be durable across fileserver reboots. If the caller lacks sufficient permissions, FEDFS_ERR_ACCESS MUST be returned.'
section: 5.8.2
rfc2119_level: SHOULD
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
