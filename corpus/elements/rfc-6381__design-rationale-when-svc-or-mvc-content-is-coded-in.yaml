document: rfc-6381
kind: design-rationale
summary: When SVC or MVC content is coded in an AVC-compatible fashion and the sample description includes both an AVC configuration record and an SVC/MVC configuration record, it is recommended that both records be reported in the codecs string, as they may contain different AVC profile, level, and compatibility indicator values.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
