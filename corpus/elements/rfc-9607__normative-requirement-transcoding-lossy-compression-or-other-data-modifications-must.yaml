document: rfc-9607
kind: normative-requirement
summary: Transcoding, lossy compression, or other data modifications MUST NOT be performed by the network on the SCIP RTP payload. The 'audio/scip' and 'video/scip' data streams MUST be a transparent relay treated as 'clear-channel data'.
section: "4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - security
