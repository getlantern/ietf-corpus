document: rfc-9704
kind: normative-requirement
summary: In DHCPv4, the mechanism for splitting long options (RFC 3396) MUST be used if the Authentication option exceeds the maximum DHCPv4 option size of 255 octets, and the Replay Detection Method value MUST be 0x00.
section: 5.2.1
rfc2119_level: MUST
