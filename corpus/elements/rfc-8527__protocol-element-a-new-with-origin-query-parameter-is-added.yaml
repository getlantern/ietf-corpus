document: rfc-8527
kind: protocol-element
summary: A new 'with-origin' query parameter is added to the GET operation for {+restconf}/ds/ietf-datastores:operational. When present, it requests that the server include 'origin' metadata annotations in its response. Support is OPTIONAL, identified by capability URI urn:ietf:params:restconf:capability:with-origin:1.0.
section: 3.2.2
topics:
    - netconf
    - yang
