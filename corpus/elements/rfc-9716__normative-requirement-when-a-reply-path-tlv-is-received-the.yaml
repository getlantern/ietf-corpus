document: rfc-9716
kind: normative-requirement
summary: When a Reply Path TLV is received, the responder that supports processing it MUST use the segments in the Reply Path TLV to build the echo reply. The responder MUST follow normal FEC validation procedures as described in RFC 8029 and RFC 8287.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
