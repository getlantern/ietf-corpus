document: rfc-9811
kind: normative-requirement
summary: A DER-encoded PKIMessage MUST be sent as the content of an HTTP POST request. The HTTP response status code for a successful request MUST be 200 (OK); other 2xx status codes MUST NOT be used for this purpose.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
    - pkix
    - crypto
