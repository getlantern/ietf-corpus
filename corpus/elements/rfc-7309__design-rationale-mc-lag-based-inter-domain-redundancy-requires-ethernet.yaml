document: rfc-7309
kind: design-rationale
summary: MC-LAG-based inter-domain redundancy requires Ethernet links of homogeneous speed, making it inapplicable when domains interconnect over packet-over-SONET/SDH. PW-based redundancy with ICCP avoids these constraints and works over heterogeneous links.
