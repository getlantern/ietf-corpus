document: rfc-9094
kind: security-consideration
summary: The 'ietf-wson-topology' module defines numerous writable (rw) data nodes including the wson-topology network type, the is-reconfigurable-node flag, grid-type, priority, and label range/hop parameters. Unauthorized write access to these nodes via NETCONF or RESTCONF could misconfigure the WSON topology and disrupt optical channel assignments across the network.
section: "4"
topics:
    - security
    - routing
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
