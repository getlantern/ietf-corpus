document: rfc-7843
kind: normative-requirement
summary: Upon receiving a valid request with a legal THIRD_PARTY_ID option, the PCP server uses the combination of values from both THIRD_PARTY and THIRD_PARTY_ID options to access the internal Internet address and internal realm of a NAT map entry, instead of the THIRD_PARTY IP address alone.
section: "5.2"
rfc2119_level: MUST
topics:
    - pcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
