document: rfc-4401
kind: protocol-element
summary: 'Return major status codes for GSS_Pseudo_random() include: GSS_S_COMPLETE (success), GSS_S_NO_CONTEXT (null context), GSS_S_CONTEXT_EXPIRED (expired context), GSS_S_UNAVAILABLE (mechanism lacks support or key unavailable), and GSS_S_FAILURE (general failure including zero-length input or desired_output_len of zero).'
