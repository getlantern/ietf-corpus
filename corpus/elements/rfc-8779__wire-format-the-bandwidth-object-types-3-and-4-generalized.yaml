document: rfc-8779
kind: wire-format
summary: The BANDWIDTH object types 3 and 4 (Generalized bandwidth) have a variable-length body with a 16-bit Bandwidth Spec Length, a 16-bit Reverse Bandwidth Spec Length, an 8-bit Bw Spec Type (corresponding to RSVP-TE SENDER_TSPEC C-Types), followed by Generalized Bandwidth and optional Reverse Generalized Bandwidth fields, and optional TLVs.
