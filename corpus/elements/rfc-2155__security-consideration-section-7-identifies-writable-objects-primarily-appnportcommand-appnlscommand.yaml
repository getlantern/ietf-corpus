summary: Section 7 identifies writable objects—primarily appnPortCommand, appnLsCommand (port and link activation/deactivation), and appnNodeNnSafeStoreFreq—as potential targets for misuse that could disrupt network operations. The document recommends applying SNMPv2 security mechanisms to restrict SET access to authorized management stations.
