document: rfc-8490
kind: wire-format
summary: Each DSO TLV encodes a 16-bit unsigned DSO-TYPE (network byte order) identifying the operation type, a 16-bit unsigned DSO-LENGTH giving the byte length of DSO-DATA, and variable-length DSO-DATA treated as opaque by the generic DSO machinery and interpreted only by code implementing that DSO-TYPE.
