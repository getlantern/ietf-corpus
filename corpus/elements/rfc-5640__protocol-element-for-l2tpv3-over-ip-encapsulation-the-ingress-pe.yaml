document: rfc-5640
kind: protocol-element
summary: For L2TPv3-over-IP encapsulation, the ingress PE selects per-flow values by taking the block prefix (first N bits) from the Session ID advertised by the egress and filling the remaining lower-order bits with a per-flow identifier derived from, e.g., inner source/destination addresses and TCP/UDP ports.
