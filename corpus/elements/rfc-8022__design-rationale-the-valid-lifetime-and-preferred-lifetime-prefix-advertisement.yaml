document: rfc-8022
kind: design-rationale
summary: The 'valid-lifetime' and 'preferred-lifetime' prefix advertisement parameters are specified with constant (non-decrementing) values rather than real-time countdown, because no implementation is known to use decrementing behavior and values could be unexpectedly reset to higher configured values after configuration reload.
section: "5.4"
