document: rfc-8038
kind: protocol-element
summary: 'Four IPFIX Sets are used together to export a Flow containing mibObjectValue IEs: (1) a Template Set including the mibObjectValue IE, (2) a MIB Field Options Template Set, (3) a MIB Field Options Data Set containing metadata per MIB object, and (4) a Data Set with the actual MIB-sourced values.'
