document: rfc-8487
kind: normative-requirement
summary: 'Mtrace2 must not mix IPv4 and IPv6: if a Query or Request arrives as an IPv4 packet, all addresses in the message MUST be IPv4; the same rule applies to IPv6 Mtrace2 messages.'
section: "3"
rfc2119_level: MUST
topics:
