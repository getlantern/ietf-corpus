document: rfc-3982
kind: protocol-element
summary: 'The <contact> result element carries: contactHandle, commonName, language, type (person/organization/role/other), organization, eMail, IDNeMail, sip, postalAddress (with address/city/region/postalCode/country sub-elements), phone, fax, datetime lifecycle fields, and translatedContact references. Many fields use privacy label types and are nillable.'
