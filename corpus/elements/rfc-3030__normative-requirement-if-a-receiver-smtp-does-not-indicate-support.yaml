document: rfc-3030
kind: normative-requirement
summary: If a receiver-SMTP does not indicate support for BINARYMIME, the sender-SMTP MUST NOT under any circumstances send binary data. A sender-SMTP MUST use canonical encoding for a given MIME content-type; text/* MUST be sent with <CR><LF> terminated lines.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
