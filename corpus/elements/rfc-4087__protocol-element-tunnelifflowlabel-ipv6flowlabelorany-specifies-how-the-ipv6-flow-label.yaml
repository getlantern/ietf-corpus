document: rfc-4087
kind: protocol-element
summary: tunnelIfFlowLabel (IPv6FlowLabelOrAny) specifies how the IPv6 Flow Label is set in the outer header; a value of -1 invokes a traffic conditioner. This object need not be present when the tunnel is not over IPv6.
