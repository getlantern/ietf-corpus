kind: protocol-element
summary: 'The DNSSL option carries one or more DNS suffix domain names. Fields: Type (8-bit, value 31), Length (8-bit, in units of 8 octets, minimum 2), Reserved (16-bit), Lifetime (32-bit, in seconds), and domain names encoded per RFC 1035 Section 3.1 (uncompressed), padded to a multiple of 8 octets with zeros.'
