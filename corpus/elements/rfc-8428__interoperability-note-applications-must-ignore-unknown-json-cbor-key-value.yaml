document: rfc-8428
kind: interoperability-note
summary: Applications MUST ignore unknown JSON/CBOR key-value pairs unless the key ends with '_', which signals a mandatory-to-understand extension and MUST trigger an error. This convention enables backwards-compatible extension while preserving the ability to mark breaking changes.
section: "4.4"
topics:
    - json
    - cbor
