document: rfc-5287
kind: normative-requirement
summary: 'For CESoPSN PW pairs carrying TDM data and CE application signaling: if the PWId FEC is used, the data PW ID MUST be even and the signaling PW ID MUST be the next (odd) value. The two PWs MUST have the same PW type, setup method, and all interface parameters except the SP field.'
section: "4"
rfc2119_level: MUST
topics:
    - mpls
