document: rfc-8319
kind: security-consideration
summary: On links where Router Advertisements are infrequent, a rogue router sending an unsolicited RA has greatly increased detrimental effect, since hosts may rely on a single RA for a very long router lifetime. RA-Guard (RFC 6105) and SEcure Neighbor Discovery (SEND, RFC 3971) are recommended mitigations.
section: "6"
topics:
