document: rfc-3810
kind: protocol-element
summary: The S Flag (Suppress Router-Side Processing) in a Query instructs receiving multicast routers to suppress normal timer updates upon receiving the Query, without suppressing querier election or host-side processing. It is set in subsequent query retransmissions to avoid re-lowering timers that were already updated by a valid host response.
section: 5.1.7
topics:
    - multicast
    - ip
