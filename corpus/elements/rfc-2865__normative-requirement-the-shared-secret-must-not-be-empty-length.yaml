document: rfc-2865
kind: normative-requirement
summary: The shared secret MUST NOT be empty (length 0), as this would allow trivial packet forgery. The secret SHOULD be at least 16 octets and as unguessable as a well-chosen password to resist exhaustive search attacks.
section: "3"
rfc2119_level: MUST NOT
topics:
