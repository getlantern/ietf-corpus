document: rfc-9711
kind: privacy-consideration
summary: The 'bootseed' claim is public and allows correlation of multiple EATs from the same boot session, creating a temporary but linkable pseudonym. It MUST NOT be used as a secret seed, and profiles should specify its lifetime and disclosure constraints.
section: "8.3"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
