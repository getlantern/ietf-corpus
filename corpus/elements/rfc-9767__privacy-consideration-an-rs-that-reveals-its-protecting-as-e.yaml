document: rfc-9767
kind: privacy-consideration
summary: An RS that reveals its protecting AS (e.g., via discovery) allows an unauthorized client to infer facts about the protected resource—such as associating a medical record with a personal AS—without accessing the resource itself.
section: "7.3"
topics:
