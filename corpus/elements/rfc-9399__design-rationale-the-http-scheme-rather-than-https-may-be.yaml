document: rfc-9399
kind: design-rationale
summary: The HTTP scheme (rather than HTTPS) may be easier for clients when fetching logotype data because HTTPS requires validating additional certificates to establish a secure connection. The hash of the logotype data already provides data integrity regardless of transport scheme.
section: "4.1"
topics:
