document: rfc-4149
kind: protocol-element
summary: sspmSourceProfileTable defines reusable measurement templates. Each entry (indexed by sspmSourceProfileInstance, Unsigned32 1..65535) specifies packet parameters including size, fill type, TOS/FlowLabel, TTL, fragmentation bit, 802.1Q tagging, loose source route, and optional application-level credentials.
