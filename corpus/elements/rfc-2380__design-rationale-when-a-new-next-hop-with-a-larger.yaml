document: rfc-2380
kind: design-rationale
summary: When a new next-hop with a larger reservation arrives in a heterogeneous multicast session, the dynamic QoS process SHOULD be initiated before adding the new next-hop, and the new next-hop should be the first end-point of the new VC, to minimize signaling when setup to the new next-hop fails.
section: "3.1"
topics:
    - ip
    - multicast
    - qos
