document: rfc-8138
kind: normative-requirement
summary: It is REQUIRED that in the compressed form, source route addresses be encoded in path order and that compressed SRH headers be placed before the compressed RPI. This ordering enables routers to consume SRH entries as the packet progresses down the LLN without ambiguity.
section: 3.2.2
rfc2119_level: REQUIRED
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
