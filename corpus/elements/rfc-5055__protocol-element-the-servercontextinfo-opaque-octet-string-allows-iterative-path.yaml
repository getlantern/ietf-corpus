document: rfc-5055
kind: protocol-element
summary: 'The serverContextInfo opaque OCTET STRING allows iterative path discovery: a client can resubmit the same query including the serverContextInfo from a prior response, prompting the server to return an alternative certification path. The subsequent query must be identical except for requestNonce, serverContextInfo, and the client''s signature or MAC.'
section: 3.2.6
topics:
    - pkix
