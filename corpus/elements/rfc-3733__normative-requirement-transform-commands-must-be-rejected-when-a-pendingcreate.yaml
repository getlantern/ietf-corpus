document: rfc-3733
kind: normative-requirement
summary: Transform commands MUST be rejected when a pendingCreate, pendingDelete, pendingTransfer, or pendingUpdate status is set, with the sole exception that a <transfer> command to approve, reject, or cancel MAY be processed while in pendingTransfer status.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
