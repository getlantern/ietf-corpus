document: rfc-8759
kind: security-consideration
summary: This payload format places no restrictions on document size or frequency, so malicious implementations could mount denial-of-service attacks. Senders should avoid DoS-like stream behavior and receivers should avoid false-positive identification of legitimate streams as malicious.
