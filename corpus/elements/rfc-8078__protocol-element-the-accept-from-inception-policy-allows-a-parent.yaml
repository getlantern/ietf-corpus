document: rfc-8078
kind: protocol-element
summary: The 'Accept from Inception' policy allows a parent adding a new child domain to immediately publish a DS RRset alongside the new NS RRset using the child's CDS/CDNSKEY, ensuring the domain is never active in an insecure state.
