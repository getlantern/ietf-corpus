document: rfc-7380
kind: protocol-element
summary: PAT_error_2_count is a 16-bit unsigned count of PAT2 errors. A PAT2 error occurs when a packet with PID 0x0000 containing table_id 0x00 does not appear at least every 0.5 seconds, contains a table with table_id other than 0x00, or has a non-zero Scrambling_control_field. This field supersedes PAT_error_count per ETSI TR 101 290.
section: "3"
topics:
