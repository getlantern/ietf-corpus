document: rfc-8560
kind: protocol-element
summary: The BUM replication list for a PBB-EVPN PE is maintained per I-SID and is the union of sub-list A (MP2P service tunnels to PBB-EVPN PEs from EVPN IMET routes) and sub-list B (PWs to PBB-VPLS PEs), or sub-list A and sub-list C (MMRP-pruned subset of sub-list B per I-SID) when MMRP is used.
section: 4.4.1
topics:
    - mpls
    - multicast
