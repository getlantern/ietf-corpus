document: rfc-9835
kind: protocol-element
summary: BGP support includes peer groups and per-neighbor configuration. Key parameters are 'peer-as', 'local-as', 'address-family', 'role' (RFC 9234 values), 'site-of-origin' (Route Origin Extended Community for loop prevention per RFC 4364 Section 7), 'bgp-max-prefix', 'bgp-timers' (hold-time and keepalive), BFD per-neighbor, and authentication via TCP-AO or MD5 key chains.
section: 5.6.2
topics:
    - yang
    - netconf
    - bgp
    - routing
