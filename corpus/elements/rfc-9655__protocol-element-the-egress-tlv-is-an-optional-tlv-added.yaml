document: rfc-9655
kind: protocol-element
summary: The Egress TLV is an optional TLV added to MPLS echo request messages to carry the destination address of the SR Policy path. It enables egress validation when the entire label stack is represented using Nil FECs. The Address field carries the IPv4 or IPv6 address corresponding to the path egress or SR Policy Endpoint.
section: "3"
topics:
