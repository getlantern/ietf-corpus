document: rfc-2476
kind: normative-requirement
summary: The MSA MAY issue a 550/5.7.1 error to MAIL FROM if the address has insufficient submission rights or is not authorized with the authentication used. The MSA MAY require authentication (530) before accepting submissions.
section: "6.1"
rfc2119_level: MAY
topics:
