document: rfc-4867
kind: protocol-element
summary: 'The robust sorting order interleaves octets of all speech frames at the octet level in a compound payload: the first octet of each frame in turn, then the second octet of each frame, and so on. This concentrates the perceptually most sensitive bits (which appear first within each frame) near the beginning of the packet, enabling UEP/UED coverage with a partial checksum.'
section: 4.4.3
topics:
    - rtp
    - realtime
