document: rfc-5810
kind: wire-format
summary: TLV encoding uses a 16-bit Type field, a 16-bit Length field (covering T+L+Value octets before alignment padding), and a variable-length Value field. Padding to a 32-bit boundary is required; minimum TLV size is 4 octets (empty value).
section: "6.2"
topics:
