document: rfc-9352
kind: protocol-element
summary: The SRv6 Capabilities sub-TLV (type 25) of the Router Capability TLV signals that a node supports SR Segment Endpoint Node functionality per RFC 8754. It carries a 2-octet Flags field; the O-flag (bit 1) indicates support for the O-bit in the SRH as defined in RFC 9259.
section: "2"
