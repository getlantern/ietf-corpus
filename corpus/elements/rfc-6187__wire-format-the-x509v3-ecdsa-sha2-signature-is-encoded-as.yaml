document: rfc-6187
kind: wire-format
summary: The x509v3-ecdsa-sha2-* signature is encoded as a string 'ecdsa-sha2-[identifier]' followed by an ecdsa_signature_blob containing mpint r and mpint s, which are the raw ECDSA algorithm outputs. Hash function is chosen based on key size per RFC 5656 Section 6.2.1.
section: "3.4"
topics:
    - crypto
    - security
