document: rfc-1532
kind: normative-requirement
summary: 'A relay agent relaying a BOOTREPLY SHOULD examine the BROADCAST flag: if set, the reply SHOULD be sent to IP 255.255.255.255 with link-layer broadcast; if cleared, the reply SHOULD be unicast to ''yiaddr'' at the ''chaddr'' link-layer address. The UDP destination port MUST be BOOTPC (68).'
section: 4.1.2
rfc2119_level: SHOULD
topics:
    - ip
