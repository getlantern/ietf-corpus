document: rfc-4750
kind: design-rationale
summary: SNMPv3 Contexts are recommended for managing multiple OSPF instances on the same system, providing MIB views per instance without requiring separate MIB structures. This leverages existing SNMPv3 infrastructure rather than embedding instance indexes throughout the MIB.
