document: rfc-7503
kind: protocol-element
summary: The OSPFv3 Autoconfiguration (AC) LSA has function code 15, S2/S1 bits set to 01 (Area Flooding Scope), and the U bit set indicating it should be flooded even if not understood. The Link State ID is an integer index to discriminate between multiple AC LSAs from the same router; LSID 0 is defined by this specification.
section: 7.2.1
topics:
    - routing
