document: rfc-4738
kind: normative-requirement
summary: The I_MESSAGE MUST be signed by the Initiator using the procedure specified in RFC 3830, providing integrity and replay protection via the SIGNi payload. If CERTi is included, it MUST correspond to the private key used to sign the I_MESSAGE.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
