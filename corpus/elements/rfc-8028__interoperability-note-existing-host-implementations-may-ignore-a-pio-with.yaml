document: rfc-8028
kind: interoperability-note
summary: Existing host implementations may ignore a PIO with both L and A flags cleared, and existing router implementations may be incapable of sending such a PIO. Newer implementations supporting this mechanism should be updated to handle A=L=0 PIOs correctly.
section: "2.1"
topics:
    - ip
    - v6ops
