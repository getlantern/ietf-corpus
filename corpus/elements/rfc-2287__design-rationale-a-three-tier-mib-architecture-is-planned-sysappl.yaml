document: rfc-2287
kind: design-rationale
summary: 'A three-tier MIB architecture is planned: sysAppl (generic, system-derived), a future applmib (requires some application instrumentation), and application-specific MIBs (e.g., WWW MIB). More specific MIBs are designed to reference back to the more generic sysAppl MIB, not the reverse, to avoid coupling.'
section: "4"
