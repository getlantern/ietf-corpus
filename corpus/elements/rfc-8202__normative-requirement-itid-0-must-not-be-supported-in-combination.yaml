document: rfc-8202
kind: normative-requirement
summary: 'ITID #0 MUST NOT be supported in combination with any non-zero ITID. If multiple ITIDs are advertised in an IIH and one is #0, the PDU MUST be ignored. When multiple ITIDs are supported by an instance, ITID #0 MUST NOT be supported.'
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
