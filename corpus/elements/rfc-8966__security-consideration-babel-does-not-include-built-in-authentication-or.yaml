document: rfc-8966
kind: security-consideration
summary: Babel does not include built-in authentication or integrity protection. An on-link attacker can announce false routes, manipulate metrics, or trigger seqno changes. Security is provided by separate protocol extensions such as MAC-based authentication (RFC 8967). Babel's robustness against packet loss does not protect against active manipulation by a malicious on-link node.
section: "6"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
