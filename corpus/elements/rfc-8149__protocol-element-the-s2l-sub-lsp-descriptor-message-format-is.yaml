document: rfc-8149
kind: protocol-element
summary: 'The S2L sub-LSP descriptor message format is defined as: [ <S2L_SUB_LSP_FRAG> ] <S2L_SUB_LSP> [ <P2MP SECONDARY_EXPLICIT_ROUTE> ]. The S2L_SUB_LSP_FRAG object is placed before the S2L_SUB_LSP object in semantically fragmented RSVP messages.'
section: "5.3"
