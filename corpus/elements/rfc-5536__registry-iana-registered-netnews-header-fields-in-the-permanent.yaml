summary: 'IANA registered Netnews header fields in the Permanent Message Header Field Repository per RFC 3864. Active standard fields include: Approved, Archive, Control, Date, Distribution, Expires, Followup-To, From, Injection-Date, Injection-Info, Keywords, Message-ID, Newsgroups, Organization, Path, References, Reply-To, Sender, Subject, Summary, Supersedes, User-Agent, Xref. Deprecated/obsoleted: Lines, NNTP-Posting-Date, NNTP-Posting-Host, Date-Received, Posting-Version, Relay-Version, Also-Control, Article-Names, Article-Updates, See-Also.'
