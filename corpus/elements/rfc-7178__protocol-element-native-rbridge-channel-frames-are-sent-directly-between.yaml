document: rfc-7178
kind: protocol-element
summary: Native RBridge Channel frames are sent directly between end stations and RBridges on the same link without TRILL encapsulation. They use the RBridge-Channel Ethertype, have the NA flag set to one, and may use the All-Edge-RBridges (01-80-C2-00-00-46) or TRILL-End-Stations (01-80-C2-00-00-45) multicast addresses.
section: "4"
