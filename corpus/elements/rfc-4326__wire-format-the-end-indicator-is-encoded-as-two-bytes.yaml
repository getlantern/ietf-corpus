document: rfc-4326
kind: wire-format
summary: The End Indicator is encoded as two bytes with value 0xFFFF (D-bit=1 combined with an all-ones 15-bit Length field). It signals that no further SNDUs are present in the current TS Packet payload; remaining bytes MUST be padded with 0xFF.
