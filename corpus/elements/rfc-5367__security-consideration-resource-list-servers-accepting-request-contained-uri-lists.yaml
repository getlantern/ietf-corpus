document: rfc-5367
kind: security-consideration
summary: Resource list servers accepting request-contained URI lists must follow RFC 4662 security guidelines and RFC 5363 security rules, which include requiring opt-in lists and mandatory authentication and authorization of clients to prevent unauthorized subscription amplification.
