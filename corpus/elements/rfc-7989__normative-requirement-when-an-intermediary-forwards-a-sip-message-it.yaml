document: rfc-7989
kind: normative-requirement
summary: When an intermediary forwards a SIP message, it MUST include the Session-ID header field with the same UUID values found in the received message, except as outlined for specific cases such as aggregated responses, call joins, 3PCC, and CANCEL requests.
section: "7"
rfc2119_level: MUST
topics:
