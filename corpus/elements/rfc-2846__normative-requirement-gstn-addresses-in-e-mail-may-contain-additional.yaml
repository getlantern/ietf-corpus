document: rfc-2846
kind: normative-requirement
summary: GSTN addresses in e-mail MAY contain additional elements defined elsewhere, but MUST use definitions from this memo for elements specified herein. In particular, service-selector names and qualif-type1 elements MUST be registered with IANA and published in the Assigned Numbers document.
section: "1"
rfc2119_level: MUST
