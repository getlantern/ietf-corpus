document: rfc-7180
kind: normative-requirement
summary: An RBridge MUST continue monitoring for nickname conflicts even after acquiring a nickname with no apparent conflicting claimant, by checking received LSPs for any of its nicknames held with higher priority by an IS-IS reachable TRILL Switch. If found, it MUST select a new nickname, even when in overloaded state.
section: "4"
rfc2119_level: MUST
topics:
    - routing
