document: rfc-5891
kind: normative-requirement
summary: Whenever a domain name is placed into a non-IDNA-aware domain name slot, it MUST contain only ASCII characters (i.e., its labels must be either A-labels or NR-LDH labels).
section: "3.1"
rfc2119_level: MUST
topics:
