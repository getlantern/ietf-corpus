summary: 'IANA created the ''MPLS RTM TLV Registry'' under G-ACh Parameters with initial types: 0=Reserved, 1=No payload, 2=PTPv2/Ethernet, 3=PTPv2/IPv4, 4=PTPv2/IPv6, 5=NTP, 192-254=Private Use; and the nested ''MPLS RTM Sub-TLV Registry'' with types: 0=Reserved, 1=PTP. Range 0-127 uses IETF Review; 128-191 uses First Come First Served.'
