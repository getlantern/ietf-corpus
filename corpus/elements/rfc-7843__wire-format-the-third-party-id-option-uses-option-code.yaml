document: rfc-7843
kind: wire-format
summary: The THIRD_PARTY_ID option uses Option Code 13, a Reserved byte, a variable Option Length field, and a variable-length THIRD_PARTY_ID field of up to 1016 octets. It follows the standard PCP option format from RFC 6887, with a 1-octet option code, 1-octet reserved, 2-octet length, and variable payload.
