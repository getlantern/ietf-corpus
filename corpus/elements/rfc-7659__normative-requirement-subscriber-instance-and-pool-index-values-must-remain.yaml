document: rfc-7659
kind: normative-requirement
summary: Subscriber, instance, and pool index values MUST remain constant at least from one update of the entity's discontinuity time object until the next. If an entity is deleted, its assigned index MUST NOT be reassigned to another entity of the same type until reinitialization of the management system.
section: "4"
rfc2119_level: MUST
topics:
    - nat
    - snmp
