document: rfc-8431
kind: protocol-element
summary: 'The route-change notification carries: rib-name, address-family, route-index, the full match condition, route-installed-state, route-state, and a list of route-change-reasons. Defined reasons include lower-route-preference, higher-route-preference, resolved-nexthop, and unresolved-nexthop.'
