document: rfc-4251
kind: normative-requirement
summary: The policy MUST specify which is the preferred algorithm (e.g., first listed) for encryption, integrity, and compression per direction. The server policy MUST NOT allow connections to the authentication agent unless forwarding has been explicitly requested.
section: "4.3"
rfc2119_level: MUST
