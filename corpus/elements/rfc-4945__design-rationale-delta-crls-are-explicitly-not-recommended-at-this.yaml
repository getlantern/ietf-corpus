document: rfc-4945
kind: design-rationale
summary: Delta CRLs are explicitly NOT RECOMMENDED at this time because several IKE implementations behave incorrectly or insecurely when presented with them, despite the trade-off that infrequent full CRLs leave a larger revocation vulnerability window.
