document: rfc-9926
kind: normative-requirement
summary: If the R flag is set in the EARO registration of one or more 6LNs for the same prefix, the 6LR MUST redistribute the prefix in the routing protocols it participates in (e.g., RPL), for the duration equal to the longest non-expired registration lifetime received for that prefix.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
