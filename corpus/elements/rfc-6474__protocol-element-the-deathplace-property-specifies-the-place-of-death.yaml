document: rfc-6474
kind: protocol-element
summary: The DEATHPLACE property specifies the place of death of the object the vCard represents. It accepts a single text value (default) or a single URI value, with cardinality *1. Supported parameters include VALUE, LANGUAGE, altid-param, and any-param.
section: "2.2"
