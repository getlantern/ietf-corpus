document: rfc-7895
kind: security-consideration
summary: The YANG library module is designed to be accessed via NETCONF over SSH (RFC 6242) as the mandatory secure transport. The NETCONF access control model (RFC 6536) MUST be used to restrict access to sensitive data nodes in this module.
