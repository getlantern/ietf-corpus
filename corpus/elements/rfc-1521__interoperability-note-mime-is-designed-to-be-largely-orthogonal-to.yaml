document: rfc-1521
kind: interoperability-note
summary: MIME is designed to be largely orthogonal to RFC 822 rather than a revision of it. RFC 822 messages without MIME-Version or Content-Type headers must be treated as 'text/plain; charset=us-ascii', but such messages may in practice contain almost anything, including uuencoded binary data.
