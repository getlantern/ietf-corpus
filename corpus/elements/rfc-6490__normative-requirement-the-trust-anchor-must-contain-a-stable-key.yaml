document: rfc-6490
kind: normative-requirement
summary: The trust anchor MUST contain a stable key. This key MUST NOT change when the certificate is reissued due to changes in the INR extension(s), when renewed prior to expiration, or for any reason other than a key change.
section: "2.2"
rfc2119_level: MUST
