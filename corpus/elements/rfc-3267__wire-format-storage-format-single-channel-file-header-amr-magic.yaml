summary: 'Storage format single-channel file header: AMR magic number ''#!AMR\n'' (0x2321414d520a) or AMR-WB magic number ''#!AMR-WB\n'' (0x2321414d522d57420a). The trailing ''\n'' is a required part of the magic number and must be included in comparisons.'
