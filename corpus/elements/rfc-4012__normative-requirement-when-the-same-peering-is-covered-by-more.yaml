document: rfc-4012
kind: normative-requirement
summary: When the same peering is covered by more than one multi-protocol policy attribute, implementations should follow the specification-order rule from RFC 2622 Section 6.4, using the action corresponding to the first matching peering specification.
section: "2.1"
rfc2119_level: SHOULD
