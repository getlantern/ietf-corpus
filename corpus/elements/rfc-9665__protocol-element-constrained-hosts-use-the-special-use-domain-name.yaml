document: rfc-9665
kind: protocol-element
summary: Constrained hosts use the special-use domain name 'default.service.arpa.' for registration and rely on out-of-band network configuration (e.g., from the CNN join process) to discover registrar addresses and ports. The SRP registrar may rewrite 'default.service.arpa.' names to a domain with broader visibility.
section: 3.1.2
topics:
    - dns
    - zeroconf
