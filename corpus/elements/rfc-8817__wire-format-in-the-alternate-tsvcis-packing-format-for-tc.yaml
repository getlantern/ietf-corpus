document: rfc-8817
kind: wire-format
summary: 'In the alternate TSVCIS packing format (for TC > 77 or any NRL VDR configuration), two trailing bytes are appended: the penultimate byte contains the full octet count TC (1–255; zero is reserved), and the final byte contains CODA=1, CODB=1, and six bits all set to one.'
