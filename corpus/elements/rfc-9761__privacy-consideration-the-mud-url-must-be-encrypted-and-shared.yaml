document: rfc-9761
kind: privacy-consideration
summary: The MUD URL MUST be encrypted and shared only with authorized network components so that an on-path attacker cannot read it and identify the IoT device model, which would reveal applicable vulnerabilities. The MUD URL can be stored in a Trusted Execution Environment (TEE).
section: "10"
rfc2119_level: MUST
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
