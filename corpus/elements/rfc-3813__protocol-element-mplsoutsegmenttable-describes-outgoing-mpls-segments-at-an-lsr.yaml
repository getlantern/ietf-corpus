document: rfc-3813
kind: protocol-element
summary: mplsOutSegmentTable describes outgoing MPLS segments at an LSR. Each entry specifies the outgoing interface, whether to push a top label (mplsOutSegmentPushTopLabel), the outgoing label value or pointer, the next-hop address (IPv4, IPv6, or unknown for point-to-point), and a traffic parameter pointer. A separate arbitrary index is used to uniquely identify out-segments to support equal-cost multi-path scenarios.
section: "5.5"
topics:
    - mpls
    - snmp
