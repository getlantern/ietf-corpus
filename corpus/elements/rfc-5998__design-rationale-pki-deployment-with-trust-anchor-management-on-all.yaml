document: rfc-5998
kind: design-rationale
summary: PKI deployment (with trust anchor management on all supplicants) is often unrealistic in practice, making public key signature authentication no more secure than a self-signed certificate. Mutually authenticating EAP methods alone can provide sufficient security, as demonstrated by IEEE 802.11i deployments using EAP without any PKI.
section: "1"
topics:
