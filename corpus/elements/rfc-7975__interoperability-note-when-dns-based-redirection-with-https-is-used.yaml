document: rfc-7975
kind: interoperability-note
summary: When DNS-based redirection with HTTPS is used, any Redirection Target returned must be capable of completing a TLS handshake with the UA; the new target domain may not match the original URL domain, potentially triggering UA security warnings without operational precautions such as private key distribution to dCDN surrogates.
section: "3"
topics:
    - tls
    - dns
    - security
