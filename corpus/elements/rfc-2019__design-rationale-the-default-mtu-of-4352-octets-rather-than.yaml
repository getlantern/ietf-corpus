document: rfc-2019
kind: design-rationale
summary: The default MTU of 4352 octets (rather than the theoretical maximum of 4470) was chosen to allow for variable sizes and possible future extensions to the MAC header and frame status fields, providing headroom without specifying exact future overhead.
section: Maximum Transmission Unit
