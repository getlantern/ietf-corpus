document: rfc-7761
kind: normative-requirement
summary: DR election MUST be performed on ALL active PIM-SM interfaces. Some implementations do not send Hello messages on point-to-point interfaces and thus cannot perform DR election on them; this is explicitly non-compliant.
section: 4.3.2
rfc2119_level: MUST
topics:
