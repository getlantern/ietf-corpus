document: rfc-8345
kind: security-consideration
summary: Network topology and inventory data exposed by these modules reveals the structure of networks, which is highly useful to an attacker. Implementations MUST apply the NETCONF access control model (RFC 8341) to restrict which users can read or modify topology data.
section: "8"
topics:
