document: rfc-4930
kind: normative-requirement
summary: All EPP XML instances MUST begin with an <epp> element that identifies the start of a protocol element and its namespace. The <epp> start and </epp> end elements MUST be applied to all structures sent by both clients and servers.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
