document: rfc-1812
kind: design-rationale
summary: 'The Robustness Principle (from Jon Postel) guides all protocol layers: ''Be conservative in what you do, be liberal in what you accept from others.'' Router software must be written to handle every conceivable error and assume the network may contain malicious or misbehaving entities.'
section: 1.3.2
