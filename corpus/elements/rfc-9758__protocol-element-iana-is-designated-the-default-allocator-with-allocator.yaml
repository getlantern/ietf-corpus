document: rfc-9758
kind: protocol-element
summary: IANA is designated the Default Allocator with Allocator Identifier zero (0). Any encoded ipn URI that does not explicitly include an Allocator Identifier MUST be assumed to have its Node Number allocated by the Default Allocator, preserving backwards compatibility with pre-existing ipn URI assignments.
section: 3.2.2
rfc2119_level: MUST
topics:
    - registry
