document: rfc-9869
kind: design-rationale
summary: Probes used only for connectivity confirmation or path validation (black-hole detection) MAY carry application data because these probe sizes are more likely to succeed, reducing the need for additional datagrams. Searches for a larger PLPMTU always use padding-only probes.
section: "4.5"
topics:
    - udp
