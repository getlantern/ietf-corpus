document: rfc-1493
kind: protocol-element
summary: Configurable STP root timer objects — dot1dStpBridgeMaxAge (range 600..4000), dot1dStpBridgeHelloTime (100..1000), dot1dStpBridgeForwardDelay (400..3000), all in hundredths of a second — specify values this bridge would advertise if elected root. Agents may return badValue for non-whole-second values.
section: "5.3"
