document: rfc-5603
kind: interoperability-note
summary: pwEnetPwIfIndex represents the ifIndex of the Ethernet PW in the Etherlike-MIB on the PSN side, and may differ from pwIfIndex (the ifIndex for the PW itself with ifType 'pw'). Implementations that model the PW in both the generic ifTable and Etherlike-MIB must manage these two distinct ifIndex values.
section: "10"
topics:
