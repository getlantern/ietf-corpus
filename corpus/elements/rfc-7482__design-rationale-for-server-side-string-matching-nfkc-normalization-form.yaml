document: rfc-7482
kind: design-rationale
summary: For server-side string matching, NFKC (Normalization Form KC) with case folding is used rather than NFC to maximize predictability and the number of matches. This differs from the NFC used by clients when submitting queries, a deliberate choice to broaden server-side matching.
