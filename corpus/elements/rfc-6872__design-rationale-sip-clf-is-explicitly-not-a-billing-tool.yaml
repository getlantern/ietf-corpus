document: rfc-6872
kind: design-rationale
summary: SIP CLF is explicitly not a billing tool, QoS measurement tool, or lawful-intercept tool; it operates at the signaling layer only and cannot verify media-layer events, making it unsuitable for customer billing or MOS scoring.
