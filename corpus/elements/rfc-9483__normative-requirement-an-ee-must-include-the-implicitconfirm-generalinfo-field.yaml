document: rfc-9483
kind: normative-requirement
summary: An EE MUST include the implicitConfirm generalInfo field in ir/cr/kur/p10cr unless it requires explicit confirmation. If the PKI management entity needs explicit confirmation, it MUST NOT include implicitConfirm in the response; otherwise it MUST include it.
section: 4.1.1
rfc2119_level: MUST
topics:
    - pkix
