document: rfc-3578
kind: protocol-element
summary: When generating multiple INVITEs for overlap signalling, each subsequent INVITE carries the same Call-ID and From header field (including tag) as the first INVITE, but has an updated Request-URI and To header field containing all digits received so far; the To header field must have no tag, and no Route header field from prior responses should be included.
section: "3.2"
topics:
    - sip
    - voip
    - realtime
