document: rfc-4710
kind: security-consideration
summary: 'RAQMON requires cryptographically strong security providing: (1) authentication so the RRC can verify PDU origin; (2) privacy via payload encryption (DES, 3-DES, AES) to prevent eavesdropping on session participants; and (3) DoS protection by having RDSs delay the first report until a session has been active for five seconds, preventing flooding the RRC with spurious short-lived sessions.'
section: "8.2"
topics:
    - security
    - qos
    - realtime
    - crypto
