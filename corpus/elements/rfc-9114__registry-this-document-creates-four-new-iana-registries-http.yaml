document: rfc-9114
kind: registry
summary: 'This document creates four new IANA registries: HTTP/3 Frame Types (initial entries: DATA=0x00, HEADERS=0x01, CANCEL_PUSH=0x03, SETTINGS=0x04, PUSH_PROMISE=0x05, GOAWAY=0x07, MAX_PUSH_ID=0x0d), Settings Parameters (initial entry: SETTINGS_MAX_FIELD_SECTION_SIZE=0x06), Error Codes (H3_NO_ERROR through H3_MESSAGE_ERROR), and Stream Types (Control Stream=0x00, Push Stream=0x01).'
