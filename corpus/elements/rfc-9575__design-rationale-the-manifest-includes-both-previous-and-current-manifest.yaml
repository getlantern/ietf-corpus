document: rfc-9575
kind: design-rationale
summary: The Manifest includes both Previous and Current Manifest Hash fields to create an auditable ledger of provenance. The DRIP Link (BE:HDA,UA) hash is included so there is a direct signature by the UA over the Broadcast Endorsement, preventing trivial replay attacks by tying every Manifest to the endorsed UA keypair.
section: 4.4.2
topics:
    - security
    - crypto
