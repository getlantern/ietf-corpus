document: rfc-5491
kind: protocol-element
summary: The Ellipse shape represents a 2D uncertainty area defined by a center point (gml:pos), gs:semiMajorAxis, gs:semiMinorAxis (both in meters), and gs:orientation (degrees from Northing to Easting). It MUST use a 2D CRS.
