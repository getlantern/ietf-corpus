document: rfc-9346
kind: normative-requirement
summary: The IPv4 Remote ASBR Identifier sub-TLV MUST be included if the neighboring ASBR has an IPv4 address; if not, the IPv6 Remote ASBR Identifier sub-TLV MUST be included instead.
section: 3.4.2
