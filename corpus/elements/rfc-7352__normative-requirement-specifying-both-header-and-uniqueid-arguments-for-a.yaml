document: rfc-7352
kind: normative-requirement
summary: Specifying both ':header' and ':uniqueid' arguments for a single 'duplicate' test MUST trigger an error. Implementations MUST NOT trigger an error for an invalid header name; instead, the 'duplicate' test MUST yield 'false' unconditionally in that case.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
