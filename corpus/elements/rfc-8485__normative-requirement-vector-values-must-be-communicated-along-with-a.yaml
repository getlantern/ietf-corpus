document: rfc-8485
kind: normative-requirement
summary: Vector values MUST be communicated along with a trustmark URL to provide context. The trustmark MUST be cryptographically bound to the vector value (e.g., both carried in a signed assertion). A vector value without an associated trustmark is unprocessable.
section: "3.1"
rfc2119_level: MUST
topics:
    - oauth
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
