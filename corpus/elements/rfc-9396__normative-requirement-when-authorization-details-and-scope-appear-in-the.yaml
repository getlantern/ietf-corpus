document: rfc-9396
kind: normative-requirement
summary: When `authorization_details` and `scope` appear in the same authorization request, the AS MUST process both sets of requirements in combination. When gathering user consent, the AS MUST present the merged set of requirements.
section: "3.1"
rfc2119_level: MUST
topics:
