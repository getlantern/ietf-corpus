document: rfc-4954
kind: interoperability-note
summary: Many existing implementations support CRAM-MD5. New implementations MAY implement it for interoperability with deployed software, but should be aware that CRAM-MD5 provides no server authentication. The SASL Working Group was developing replacement mechanisms at time of writing.
