document: rfc-2252
kind: protocol-element
summary: 'AttributeTypeDescription is encoded as a BNF string containing: a numeric OID, optional NAME, DESC, OBSOLETE, SUP, EQUALITY, ORDERING, SUBSTR, SYNTAX (with optional length bound), SINGLE-VALUE, COLLECTIVE, NO-USER-MODIFICATION, and USAGE fields. Terms beginning with ''X-'' are reserved for private experiments and MUST be followed by a qdstrings value.'
