document: rfc-5088
kind: design-rationale
summary: The PrefL/PrefR/PrefS/PrefY 3-bit preference fields allow operators to configure weighted load balancing across PCEs with different computation scopes, enabling a PCE capable of both inter-area and inter-AS computation to be preferred for one scope over another without binary exclusion.
