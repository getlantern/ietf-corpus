document: rfc-5520
kind: protocol-element
summary: The Path-Key bit (bit 23 of the PCEP RP object) indicates that a PCReq is requesting retrieval of a CPS corresponding to a PKS carried in a PATH-KEY object. It MUST be cleared when the request is not related to CPS retrieval.
