document: rfc-1902
kind: normative-requirement
summary: All descriptors within an information module must be unique, must not exceed 64 characters, must begin with a lower-case letter, and must consist only of letters or digits — hyphens are explicitly prohibited to avoid ambiguity with the minus sign in programming languages. The set of descriptors across all standard information modules must also be globally unique.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
