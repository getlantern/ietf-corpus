document: rfc-4837
kind: design-rationale
summary: MPCP timestamps are OLT-set and network-synchronized to enable TDM scheduling of uplink transmissions. RTT is measured per ONU and subtracted from GATE grant timing to compensate for propagation delay, which can reach 200 usec (25 Kbytes at gigabit rate) for a 20 km fiber run.
section: 2.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
