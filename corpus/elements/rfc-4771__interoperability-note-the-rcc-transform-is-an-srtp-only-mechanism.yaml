document: rfc-4771
kind: interoperability-note
summary: The RCC transform is an SRTP-only mechanism. SRTCP already carries the full packet index in every packet under integrity protection and therefore does not benefit from and MUST NOT use the RCC transform.
section: "2"
topics:
