document: rfc-4034
kind: normative-requirement
summary: The Signer's Name field MUST contain the name of the zone of the covered RRset. A sender MUST NOT use DNS name compression on the Signer's Name field when transmitting a RRSIG RR.
section: 3.1.7
rfc2119_level: MUST
topics:
    - dns
