kind: protocol-element
summary: The RSpec (parameter 130) specifies desired service as rate R (bytes/sec, >= r) and slack term S (microseconds, 0 to 2^32-1). Higher R reduces queueing delay; S represents excess headroom that network elements may use to reduce their resource reservation.
