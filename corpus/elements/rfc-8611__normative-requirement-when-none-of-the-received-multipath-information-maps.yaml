document: rfc-8611
kind: normative-requirement
summary: When none of the received multipath information maps to a particular LAG member link, the responder MUST still include the Local Interface Index Sub-TLV and Multipath Data Sub-TLV for that member link in the DDMAP, with the Multipath Length field set to zero.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
