document: rfc-8560
kind: normative-requirement
summary: A PBB-EVPN PE MUST establish a PW to each remote PBB-VPLS PE from which it has received only a VPLS A-D route. The PW is established between the B-components of PBB-EVPN and PBB-VPLS PEs per Section 4 of RFC 7041.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
