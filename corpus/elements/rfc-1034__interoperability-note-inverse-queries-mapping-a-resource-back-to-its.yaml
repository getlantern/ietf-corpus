document: rfc-1034
kind: interoperability-note
summary: Inverse queries (mapping a resource back to its domain name) are optional in a name server, but all name servers must be able to understand an inverse query message and return a not-implemented error. Inverse queries must not be used for address-to-name mapping; IN-ADDR.ARPA must be used instead.
section: 3.7.2
topics:
    - dns
