document: rfc-3292
kind: normative-requirement
summary: 'The Connection Replace R flag MUST be pre-configured via the Port Management message before use; if the R flag is set without pre-configuration the switch MUST return failure ''36: Replace of connection is not activated on switch''. The R flag MUST NOT be set together with either the M or B flags.'
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
