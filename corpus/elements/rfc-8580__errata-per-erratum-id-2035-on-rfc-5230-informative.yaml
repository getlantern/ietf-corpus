document: rfc-8580
kind: errata
summary: 'Per Erratum ID 2035 on RFC 5230, informative advice is provided: if the Sieve processor recognizes an address belonging to the script owner in the To or Cc fields of the input message, it should prefer that address for the From field of the generated message rather than an arbitrary owner address.'
