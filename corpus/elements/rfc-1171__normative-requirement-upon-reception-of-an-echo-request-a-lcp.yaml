document: rfc-1171
kind: normative-requirement
summary: Upon reception of an Echo-Request, a LCP packet MUST be transmitted with Code=10 (Echo-Reply), the Identifier copied from the request, and the Data field copied from the request. Echo-Request and Echo-Reply packets may only be sent in the LCP Open state.
section: 4.4.8
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
