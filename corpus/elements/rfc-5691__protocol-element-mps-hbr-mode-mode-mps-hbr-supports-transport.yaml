document: rfc-5691
kind: protocol-element
summary: MPS-hbr mode (mode=MPS-hbr) supports transport of one fragment of an AU, one complete AU, or several complete AUs, each consisting of a single MPEG Surround SpatialFrame(). Maximum SpatialFrame() size is 8191 bytes. Receivers MUST support de-interleaving.
section: 4.2.2
topics:
    - rtp
    - realtime
