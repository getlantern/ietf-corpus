document: rfc-9399
kind: normative-requirement
summary: When a certificate image logotype (id-logo-certImage) is present, it MUST be a complete visual representation of the certificate showing certificate context, issuer, and subject. The visual representation of subject and issuer information MUST have the same meaning as the textual representation in the certificate.
section: 4.4.3
rfc2119_level: MUST
topics:
    - pkix
