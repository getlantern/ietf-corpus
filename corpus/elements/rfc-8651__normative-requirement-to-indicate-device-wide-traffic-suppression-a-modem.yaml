document: rfc-8651
kind: normative-requirement
summary: To indicate device-wide traffic suppression, a modem MUST send the Pause Data Item in a Session Update Message. To suppress traffic to a particular destination, a modem MUST send it in a Destination Update Message.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
