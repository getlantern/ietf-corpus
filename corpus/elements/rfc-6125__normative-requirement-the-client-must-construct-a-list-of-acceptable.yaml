document: rfc-6125
kind: normative-requirement
summary: The client MUST construct a list of acceptable reference identifiers independently of the identifiers presented by the service. Extracted data MUST include only information that can be securely parsed from inputs or derived in a manner not subject to subversion by network attackers.
section: 6.2.1
rfc2119_level: MUST
