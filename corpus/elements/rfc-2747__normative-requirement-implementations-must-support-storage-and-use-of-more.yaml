document: rfc-2747
kind: normative-requirement
summary: Implementations MUST support storage and use of more than one active key simultaneously (for both sending and receiving), MUST associate KeyStartValid and KeyEndValid lifetimes with each key, and MUST support manual key distribution including infinite-lifetime keys.
section: "5.2"
rfc2119_level: MUST
topics:
