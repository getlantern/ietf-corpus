document: rfc-5251
kind: protocol-element
summary: Each CE-PE link is associated with a Customer Port Identifier (CPI), unique within a given L1VPN, and a Provider Port Identifier (PPI), unique within the service provider network. A third identifier, the VPN-PPI, is assigned to each PE port and is unique within the L1VPN customer addressing realm, bridging the two realms.
section: "3.2"
topics:
