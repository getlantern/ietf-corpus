document: rfc-3332
kind: normative-requirement
summary: Routing Keys SHOULD be unique such that each received SS7 signalling message has a full or partial match to exactly one routing result. Parameter range values within a Routing Key need not be contiguous (e.g., non-contiguous CIC ranges for an AS).
section: 1.4.2.2
rfc2119_level: SHOULD
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
