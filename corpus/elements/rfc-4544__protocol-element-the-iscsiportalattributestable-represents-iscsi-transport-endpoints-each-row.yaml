document: rfc-4544
kind: protocol-element
summary: The iscsiPortalAttributesTable represents iSCSI transport endpoints. Each row has an InetAddressType/InetAddress pair, a transport protocol (default TCP=6), iscsiPortalRoles bits (targetTypePortal, initiatorTypePortal), MaxRecvDataSegmentLength (512–16777215 bytes, default 8192), primary and secondary header/data digest preferences, and a marker request flag.
