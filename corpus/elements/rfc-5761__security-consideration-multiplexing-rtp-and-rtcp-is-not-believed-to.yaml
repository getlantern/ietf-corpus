document: rfc-5761
kind: security-consideration
summary: Multiplexing RTP and RTCP is not believed to introduce new security considerations. The primary concerns remain integrity and authentication of the multiplexing signalling, and integrity, authentication, and confidentiality of RTP/RTCP traffic, which are addressed by the base RTP spec and applicable profiles.
