document: rfc-6796
kind: protocol-element
summary: The <context> element provides context information about a policy or session document and MAY contain <policy-server-URI>, <contact>, <info>, <token>, and (in session-info only) <request-URI> elements. The <request-URI> element MUST NOT be included in session policy documents.
section: "6.7"
