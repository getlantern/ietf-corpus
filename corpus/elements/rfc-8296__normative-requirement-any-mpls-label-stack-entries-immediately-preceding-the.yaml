document: rfc-8296
kind: normative-requirement
summary: Any MPLS label stack entries immediately preceding the BIER encapsulation MUST have the S bit set to 0; the BIER encapsulation's initial four octets MUST have the S bit set to 1, indicating the bottom of the MPLS label stack.
section: 2.1.1.2
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
