document: rfc-2126
kind: protocol-element
summary: 'TCP is mapped to the ISO 8348 Connection Oriented Network Service (CONS): TCP-OPEN_PORT maps to N-CONNECT.REQUEST, TCP-LISTEN_PORT to N-CONNECT.INDICATION, TCP-SEND_DATA (with TPKT encapsulation) to N-DATA.REQUEST, and TCP-CLOSE or TCP-ERRORED to N-DISCONNECT.INDICATION.'
section: 3.2.3
topics:
