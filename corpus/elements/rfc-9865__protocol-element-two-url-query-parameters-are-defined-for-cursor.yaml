document: rfc-9865
kind: protocol-element
summary: 'Two URL query parameters are defined for cursor-based pagination: `cursor` (string, the nextCursor value from a previous response, empty or omitted for the first request, restricted to RFC 3986 unreserved characters) and `count` (desired maximum results per page; negative values treated as 0).'
