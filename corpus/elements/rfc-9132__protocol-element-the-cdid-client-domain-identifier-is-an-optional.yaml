document: rfc-9132
kind: protocol-element
summary: The 'cdid' (Client Domain Identifier) is an optional Uri-Path parameter added by server-domain DOTS gateways to propagate client-domain identity toward the DOTS server. It MUST be derived using the same SPKI hash procedure as 'cuid', positioned before 'cuid', and MUST NOT be generated or forwarded by DOTS clients or client-domain gateways.
section: 4.4.1.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
