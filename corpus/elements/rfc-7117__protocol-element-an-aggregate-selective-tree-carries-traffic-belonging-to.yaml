document: rfc-7117
kind: protocol-element
summary: An Aggregate Selective tree carries traffic belonging to a specified set of IP multicast streams from more than one VPLS instance on a given PE. Aggregation binds multiple VPLS instances to the same P-multicast tree and requires upstream-assigned labels for demultiplexing.
section: "3.1"
topics:
    - mpls
    - multicast
