document: rfc-5109
kind: interoperability-note
summary: 'The scheme is fully compatible with non-FEC-capable hosts: media packets are transmitted unmodified as if no FEC is present. FEC packets use a dynamically assigned payload type that non-FEC receivers will discard per RFC 3550, making the scheme safe for multicast groups with mixed FEC and non-FEC receivers.'
section: "6"
topics:
