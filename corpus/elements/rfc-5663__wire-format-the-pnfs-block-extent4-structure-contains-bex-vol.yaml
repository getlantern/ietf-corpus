document: rfc-5663
kind: wire-format
summary: 'The pnfs_block_extent4 structure contains: bex_vol_id (deviceid4, logical volume identifier), bex_file_offset (offset4, starting byte offset in file), bex_length (length4, size in bytes), bex_storage_offset (offset4, starting byte offset in volume, validity depends on bex_state), and bex_state (pnfs_block_extent_state4). The pnfs_block_layout4 wraps an array of these extents as the block-layout-specific loc_body.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
