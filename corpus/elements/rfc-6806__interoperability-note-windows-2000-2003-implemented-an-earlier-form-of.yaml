document: rfc-6806
kind: interoperability-note
summary: Windows 2000/2003 implemented an earlier form of referrals using PA-SVR-REFERRAL-INFO (type 20) with a PA-SVR-REFERRAL-DATA structure containing referred-realm and optional referred-name. The referred-realm is redundant with the realm in the returned TGT's second component.
