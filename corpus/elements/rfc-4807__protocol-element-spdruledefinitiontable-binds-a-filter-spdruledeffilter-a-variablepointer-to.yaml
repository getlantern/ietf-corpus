document: rfc-4807
kind: protocol-element
summary: spdRuleDefinitionTable binds a filter (spdRuleDefFilter, a VariablePointer) to an action (spdRuleDefAction, a VariablePointer) by name. The filter result may be negated via spdRuleDefFilterNegated (TruthValue) and the rule enabled or disabled via spdRuleDefAdminStatus (SpdAdminStatus).
