document: rfc-5696
kind: normative-requirement
summary: If a packet arrives at the PCN-ingress-node with its ECN field already set to a value other than not-ECT, appropriate action MUST be taken to meet the requirements of RFC 3168. The simplest action is to drop such packets.
section: "4"
rfc2119_level: MUST
topics:
    - ecn
    - ip
    - qos
