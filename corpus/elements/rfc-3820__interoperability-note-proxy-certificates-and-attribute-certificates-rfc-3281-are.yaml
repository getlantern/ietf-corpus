document: rfc-3820
kind: interoperability-note
summary: Proxy Certificates and Attribute Certificates (RFC 3281) are complementary. Third-party Attribute Authorities work equally well with EECs or PCs as the holder identity; however, an AA issuing an AC bound to a specific PC must also trust the PC's issuer, because the PI could re-issue a PC with the same name to a different entity, effectively stealing the AC.
section: "5.1"
topics:
    - pkix
    - security
