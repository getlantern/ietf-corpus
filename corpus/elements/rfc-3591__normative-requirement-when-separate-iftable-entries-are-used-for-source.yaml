document: rfc-3591
kind: normative-requirement
summary: When separate ifTable entries are used for source and sink functions, the agent MUST maintain consistent directionality values across ifStackTable layers (a sink must not be stacked 1:1 on top of a source). All protocol layers represented by a given ifTable entry must have the same directionality.
section: "2.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
