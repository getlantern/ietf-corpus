document: rfc-4585
kind: registry
summary: IANA registers the 'rtcp-fb' SDP attribute and a registry of RTCP feedback type names. Initial entries include 'ack' (positive acknowledgement), 'nack' (negative acknowledgement, with sub-parameters pli/sli/rpsi/app), and 'trr-int' (minimum Regular RTCP interval in ms). New feedback type names MUST be unique and registered with IANA along with their semantics and packet formats.
section: "9"
