document: rfc-9470
kind: security-consideration
summary: The `acr_values` parameter in a challenge may unintentionally disclose information about the authenticated user, the resource, or the authorization server. For example, requiring a high assurance ACR only for certain users could identify high-privilege targets for spearphishing. Implementers should carefully consider what to disclose in challenges.
section: "9"
topics:
    - oauth
    - security
    - privacy
