document: rfc-7564
kind: normative-requirement
summary: Width mapping is RECOMMENDED when NFC normalization is used (as opposed to NFKD/NFKC), because allowing fullwidth and halfwidth characters to remain unmapped to their compatibility variants would violate the Principle of Least Astonishment.
section: 5.2.1
rfc2119_level: RECOMMENDED
