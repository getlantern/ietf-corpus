document: rfc-9901
kind: normative-requirement
summary: The Holder MUST reject an SD-JWT+KB when it receives an SD-JWT from the Issuer (the Issuer sends only SD-JWTs, not SD-JWT+KBs). For presentation requiring Key Binding, the Holder MUST create a KB-JWT and assemble an SD-JWT+KB.
section: "7.2"
rfc2119_level: MUST
topics:
    - jose
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
