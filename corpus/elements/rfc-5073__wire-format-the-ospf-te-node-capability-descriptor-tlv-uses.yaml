document: rfc-5073
kind: wire-format
summary: 'The OSPF TE Node Capability Descriptor TLV uses type 5, variable length (multiple of 4), with a value field consisting of an array of 32-bit words of flags numbered from the most significant bit as bit zero. Format follows RFC 3630: 2-octet type, 2-octet length, value field.'
section: "4.1"
topics:
