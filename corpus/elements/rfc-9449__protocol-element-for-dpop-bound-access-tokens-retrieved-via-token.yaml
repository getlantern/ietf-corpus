document: rfc-9449
kind: protocol-element
summary: For DPoP-bound access tokens retrieved via token introspection (RFC 7662), the cnf/jkt structure is conveyed as a top-level member of the introspection response JSON. If token_type is included in the introspection response, it MUST contain the value DPoP.
section: "6.2"
topics:
