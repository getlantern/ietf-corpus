document: rfc-2725
kind: design-rationale
summary: Route object addition requires dual authentication against both the origin AS (aut-num) and the address prefix (route or inetnum) because routes involve both the holder of the AS number and the holder of the address space. Either party acting alone is insufficient to authorize route announcements.
section: "6"
topics:
    - routing
    - registry
    - security
