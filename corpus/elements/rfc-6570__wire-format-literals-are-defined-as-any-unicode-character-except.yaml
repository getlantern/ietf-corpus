summary: Literals are defined as any Unicode character except CTL, SP, DQUOTE, "'", unencoded "%", "<", ">", "\\", "^", "`", "{", "|", "}". Characters not allowed in URI syntax are copied as their UTF-8 pct-encoded sequences.
