document: rfc-7352
kind: privacy-consideration
summary: The duplicate-tracking list can include privacy-sensitive information such as message ID values, subject lines, and content extracted from message bodies. Implementations SHOULD protect this information by obscuring it through hashing and/or storing it with access control equivalent to that of the messages themselves.
section: "6"
rfc2119_level: SHOULD
topics:
    - email
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
