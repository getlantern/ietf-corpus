document: rfc-4486
kind: design-rationale
summary: The backoff/damping recommendation for specific Cease subcodes (Administrative Shutdown, Peer De-configured, Connection Rejected, Out of Resources) is intended to prevent rapid BGP connection retry storms when the remote side has signaled it is administratively or resource-constrained, aiding network stability.
