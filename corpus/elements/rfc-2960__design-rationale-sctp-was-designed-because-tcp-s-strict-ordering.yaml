document: rfc-2960
kind: design-rationale
summary: SCTP was designed because TCP's strict ordering causes head-of-line blocking, its byte-stream model requires application record framing, its single-path model limits high availability, and it is vulnerable to SYN attacks. SCTP addresses all four limitations via multi-streaming, message orientation, multi-homing, and the cookie handshake.
section: "1.1"
topics:
    - sctp
    - tcp
