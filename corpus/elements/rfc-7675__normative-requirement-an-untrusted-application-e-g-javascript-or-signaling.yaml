document: rfc-7675
kind: normative-requirement
summary: An untrusted application (e.g., JavaScript or signaling servers) MUST NOT be able to obtain or control the STUN transaction identifier, because that enables spoofing of STUN responses, falsifying consent.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
