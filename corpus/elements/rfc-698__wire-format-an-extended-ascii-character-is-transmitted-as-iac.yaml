summary: 'An extended ASCII character is transmitted as: IAC SB EXTASC <high order bits (bits 15-8)> <low order bits (bits 7-0)> IAC SE. Each of the two 8-bit bytes carries 8 data bits, yielding a 16-bit extended character.'
