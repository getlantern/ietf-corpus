document: rfc-3920
kind: normative-requirement
summary: If an initiating entity chooses to use TLS, TLS negotiation MUST be completed before proceeding to SASL negotiation. This ordering protects authentication credentials and enables the SASL EXTERNAL mechanism to be based on a certificate presented during TLS.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
