document: rfc-6463
kind: security-consideration
summary: An incorrectly configured LMA may trigger runtime assignment attempts to non-existing or incompatible LMAs, causing failed binding updates, unsuccessful mobility session creation, and biased load distribution. All participating LMAs must have adequate prior agreements and trust relationships.
section: "8"
topics:
    - mobility
    - security
