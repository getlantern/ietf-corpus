document: rfc-5788
kind: design-rationale
summary: The Expert Reviewer MAY upgrade a 'limited use' registration to 'common use', or downgrade a 'common use' registration to 'limited use'. This flexibility allows the reviewer to match the registration level to the actual deployment reality of a keyword.
