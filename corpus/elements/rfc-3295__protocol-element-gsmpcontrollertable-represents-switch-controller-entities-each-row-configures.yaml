document: rfc-3295
kind: protocol-element
summary: gsmpControllerTable represents Switch Controller Entities; each row configures a potential GSMP session. Indexed by gsmpControllerEntityId (a 48-bit GsmpNameType), the table holds adjacency parameters including max GSMP version, timer, port, instance number, partition type/ID, resync flag, notification map, session state, storage type, and row status.
