document: rfc-2205
kind: normative-requirement
summary: Once initiated, a teardown request must be forwarded hop-by-hop without delay. A teardown message deletes the specified state in the node where it is received and the resulting change is propagated immediately to the next node only if there is a net change after merging.
section: "2.4"
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
