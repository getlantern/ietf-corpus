document: rfc-7843
kind: security-consideration
summary: All security considerations from RFC 6887 Section 18.1.1 apply. The network carrying PCP messages must be sufficiently protected, and it is RECOMMENDED to use PCP authentication (RFC 7652) unless the network already has appropriate authentication means in place.
