document: rfc-4702
kind: normative-requirement
summary: DNS RR TTLs for DHCP-assigned addresses SHOULD NOT exceed 1/3 of the lease time but SHOULD NOT be less than 10 minutes. Administrators SHOULD be allowed to configure TTL values.
