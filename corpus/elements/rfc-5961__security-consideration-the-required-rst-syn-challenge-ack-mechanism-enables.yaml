document: rfc-5961
kind: security-consideration
summary: 'The required RST/SYN challenge-ACK mechanism enables a reflector attack: an off-path attacker can cause a victim to emit one challenge ACK for each spoofed in-window RST/SYN. This is not an amplification attack (1:1 ratio) but can be used to cause traffic toward a victim''s peer.'
section: "10"
topics:
    - tcp
    - security
