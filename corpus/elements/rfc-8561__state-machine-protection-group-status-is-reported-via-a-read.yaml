document: rfc-8561
kind: state-machine
summary: 'Protection group status is reported via a read-only identityref leaf with states: unprotected, protected, or unable-to-protect. Protection switching is triggered by operator actions: manual-switch-working, manual-switch-protection, forced-switch, lockout-of-protection, freeze, exercise, and clear (all modeled as YANG actions per ITU-T G.808.1).'
