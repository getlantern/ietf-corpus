document: rfc-7915
kind: protocol-element
summary: 'ICMPv6 messages are translated to ICMPv4 as follows: Echo Request/Reply (Types 128/129) map to ICMPv4 Types 8/0. MLD messages (Types 130-132) and Neighbor Discovery messages (Types 133-137) are single-hop messages and are silently dropped. ICMPv6 Destination Unreachable (Type 1) maps to ICMPv4 Type 3 with code translation.'
section: "5.2"
