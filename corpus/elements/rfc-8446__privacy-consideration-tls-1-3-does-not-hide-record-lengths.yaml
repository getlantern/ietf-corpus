document: rfc-8446
kind: privacy-consideration
summary: TLS 1.3 does not hide record lengths, leaving endpoints exposed to traffic-analysis attacks. Endpoints MAY use record padding (Section 5.4) to obscure true lengths. PSK identity labels in ClientHello are sent in plaintext, potentially enabling passive client tracking across connections (Section E.6).
section: E.3
topics:
    - tls
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
