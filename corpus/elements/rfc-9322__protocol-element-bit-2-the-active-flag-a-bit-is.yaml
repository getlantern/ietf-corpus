document: rfc-9322
kind: protocol-element
summary: Bit 2, the Active flag (A-bit), is defined in the IOAM Pre-allocated and Incremental Trace option headers. When set, it indicates the packet is an active measurement packet (probe or replicated data) rather than a live data packet, and the decapsulating node must terminate it.
section: "3"
topics:
