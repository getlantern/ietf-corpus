document: rfc-2686
kind: normative-requirement
summary: When the Prefix Elision option is negotiated, the accepting implementation MUST transmit all subsequent multilink packets of each named class with the specified prefix removed from the start of the packet, or Configure-Nak or Configure-Reject the option.
section: "6.2"
rfc2119_level: MUST
