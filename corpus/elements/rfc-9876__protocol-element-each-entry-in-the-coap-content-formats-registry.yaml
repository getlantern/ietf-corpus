document: rfc-9876
kind: protocol-element
summary: 'Each entry in the CoAP Content-Formats registry must include: the Content Type, the Content Coding (if any), the Media Type registered with IANA, a numeric identifier in the range 0-65535, and a reference to a document describing the semantic meaning of a payload with that Media Type.'
