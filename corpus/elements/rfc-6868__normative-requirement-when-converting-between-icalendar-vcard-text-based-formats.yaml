document: rfc-6868
kind: normative-requirement
summary: When converting between iCalendar/vCard text-based formats and XML alternative representations (xCal RFC 6321, xCard RFC 6351), implementations MUST ensure that parameter value escape sequences are correctly generated in the text format and decoded in the alternate formats.
section: "3"
rfc2119_level: MUST
