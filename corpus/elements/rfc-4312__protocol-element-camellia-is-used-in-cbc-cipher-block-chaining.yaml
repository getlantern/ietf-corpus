document: rfc-4312
kind: protocol-element
summary: Camellia is used in CBC (Cipher Block Chaining) mode within ESP. The CBC IV is XOR'd with the first plaintext block before encryption; successive blocks XOR the previous ciphertext block with the current plaintext before encryption.
