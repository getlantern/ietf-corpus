document: rfc-5109
kind: normative-requirement
summary: Different encryption keys MUST be used for each stream (media and FEC) when they are sent as separate streams. Applications utilizing encryption SHOULD encrypt both the media and FEC streams; encrypting only one stream creates a layering violation and may enable known-plaintext attacks.
section: "11"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
