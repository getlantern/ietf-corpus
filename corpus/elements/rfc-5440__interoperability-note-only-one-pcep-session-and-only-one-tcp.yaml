document: rfc-5440
kind: interoperability-note
summary: Only one PCEP session and only one TCP connection on the PCEP port may exist between a pair of PCEP peers at any time. Each PCEP message is a single transmission unit and parts of messages MUST NOT be interleaved; a peer must finish sending one message before beginning the next.
section: 4.2.1
topics:
    - routing
    - mpls
    - tcp
