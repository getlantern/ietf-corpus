document: rfc-8928
kind: normative-requirement
summary: An ND message that carries an NDPSO MUST have one and only one EARO, and the EARO MUST contain a Crypto-ID in the ROVR field associated with the key pair used for the digital signature.
section: "4.4"
rfc2119_level: MUST
