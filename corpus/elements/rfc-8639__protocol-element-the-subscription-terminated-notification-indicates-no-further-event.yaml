document: rfc-8639
kind: protocol-element
summary: 'The ''subscription-terminated'' notification indicates no further event records should be expected. It carries a ''reason'' identityref encoding the cause: ''no-such-subscription'', ''filter-unavailable'', ''stream-unavailable'', or ''suspension-timeout''. This MUST be sent to a dynamic subscription''s receiver when the subscription ends unexpectedly.'
section: 2.7.3
topics:
