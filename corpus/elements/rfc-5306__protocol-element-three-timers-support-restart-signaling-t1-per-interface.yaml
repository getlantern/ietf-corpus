document: rfc-5306
kind: protocol-element
summary: 'Three timers support restart signaling: T1 (per-interface retransmission timer, typical 3 s) controls retransmission of unacknowledged (re)start IIHs; T2 (per-LSPDB, typical 60 s) bounds the wait for LSPDB synchronization; T3 (system-wide, initialized to 65535 s) bounds the overall restart process and is updated from received RA IIHs.'
section: "3.1"
topics:
    - routing
