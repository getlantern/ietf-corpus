document: rfc-3966
kind: protocol-element
summary: 'The ''tel'' URI scheme identifies resources by telephone number. Its syntax is: telephone-uri = "tel:" telephone-subscriber, where telephone-subscriber is either a global-number (prefixed with ''+'') or a local-number (requiring a ''phone-context'' parameter).'
section: "3"
topics:
