document: rfc-5750
kind: interoperability-note
summary: S/MIME version 3.2 agents ought to attempt to have the greatest interoperability possible with agents for prior versions of S/MIME (v2, v3, v3.1). S/MIME v3, v3.1, and v3.2 are backwards compatible with v2 certificate handling except for dropped RC2/40 and added DSA and RSASSA-PSS requirements.
section: "1.3"
topics:
