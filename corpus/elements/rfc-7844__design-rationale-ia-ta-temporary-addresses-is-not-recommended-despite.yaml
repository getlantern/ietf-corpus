document: rfc-7844
kind: design-rationale
summary: IA_TA (temporary addresses) is not recommended despite being designed for privacy, because it is not widely supported, lacks defined renewal semantics, and signals a desire for privacy that could invite countermeasures. IA_NA addresses under the anonymity profile are discarded on link-layer address change, fulfilling the same purpose.
section: 4.5.1
topics:
    - privacy
    - dns
    - v6ops
