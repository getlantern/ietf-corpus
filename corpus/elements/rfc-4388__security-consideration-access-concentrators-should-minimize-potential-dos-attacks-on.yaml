document: rfc-4388
kind: security-consideration
summary: Access concentrators SHOULD minimize potential DoS attacks on DHCP servers by employing negative caching of DHCPLEASEUNASSIGNED, DHCPLEASEACTIVE, and DHCPLEASEUNKNOWN responses, and by restricting ciaddr values to the range of attached broadband networks, limiting traffic to at most one DHCPLEASEQUERY per legitimate IP address after a reboot.
section: "7"
topics:
    - security
    - ip
