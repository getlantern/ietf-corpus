document: rfc-7490
kind: design-rationale
summary: The repair path computation is confined to a single area or level-2 routing domain. Cross-area PQ nodes should be treated as tunnel adjacencies per RFC 5286 Section 6. This simplification avoids the complexity of inter-area loop-freedom analysis.
section: "3"
topics:
    - routing
