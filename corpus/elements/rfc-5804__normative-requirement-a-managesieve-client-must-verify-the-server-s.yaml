document: rfc-5804
kind: normative-requirement
summary: A ManageSieve client MUST verify the server's TLS certificate identity against the reference identity (hostname or IP) to prevent man-in-the-middle attacks; if using SASL PLAIN over TLS and server identity cannot be verified, the client MUST NOT attempt PLAIN authentication.
section: 2.1.1
rfc2119_level: MUST
topics:
    - email
    - tls
    - security
