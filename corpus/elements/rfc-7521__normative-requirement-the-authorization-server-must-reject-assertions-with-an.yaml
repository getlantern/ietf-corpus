document: rfc-7521
kind: normative-requirement
summary: The authorization server MUST reject assertions with an invalid signature or MAC. The algorithm for validating the signature and the mechanism for designating the secret are beyond the scope of this specification and must be defined by profile documents.
section: "5.2"
rfc2119_level: MUST
