document: rfc-8873
kind: normative-requirement
summary: 'An offerer and answerer SHALL include a ''dcsa'' attribute for each of the following MSRP-specific attributes: ''path'' (RFC 4975), ''msrp-cema'' (RFC 6714), and ''setup'' (RFC 6135). Absence of any of these is a protocol error.'
section: "4.4"
rfc2119_level: SHALL
topics:
