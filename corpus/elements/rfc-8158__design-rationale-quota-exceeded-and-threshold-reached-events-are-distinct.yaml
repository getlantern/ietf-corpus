document: rfc-8158
kind: design-rationale
summary: 'Quota Exceeded and Threshold Reached events are distinct: Quota Exceeded events result in packet drops or mapping failures, whereas Threshold Reached events give the operator a chance to act before traffic disruptions occur. A NAT device can choose to implement one, the other, or both.'
section: "4.5"
topics:
    - nat
