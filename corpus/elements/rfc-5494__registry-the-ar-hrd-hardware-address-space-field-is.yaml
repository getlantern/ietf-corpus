document: rfc-5494
kind: registry
summary: The ar$hrd (hardware address space) field is a 16-bit IANA registry. Values below 256 or batch requests require Expert Review; individual values not specifying a value or greater than 255 are First Come First Served, always resulting in a 2-octet assignment.
