document: rfc-5661
kind: protocol-element
summary: The COMPOUND procedure (and callback counterpart CB_COMPOUND) is the sole RPC procedure used for all NFSv4.1 operations; there are exactly two procedures, NULL and COMPOUND. Operations in a COMPOUND are evaluated in order without atomicity guarantees; evaluation stops on the first failing result.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
