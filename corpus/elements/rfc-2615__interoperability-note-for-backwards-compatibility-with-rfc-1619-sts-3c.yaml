document: rfc-2615
kind: interoperability-note
summary: For backwards compatibility with RFC 1619 (STS-3c-SPE/VC-4 only), a scrambler MAY have an on/off capability where the scrambler is bypassed entirely when off. If provided, the default MUST be scrambling enabled. When scrambling is off, Path Signal Label C2 is set to 207 (0xCF) instead of 22 (0x16).
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
