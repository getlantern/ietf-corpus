document: rfc-4951
kind: state-machine
summary: 'The failover protocol operates in three sequential phases: (1) Failover Capability Negotiation during normal tunnel setup, (2) Failover Recovery triggered by control channel failure (recovery tunnel establishment, control channel reset, data channel reset), and (3) Session State Synchronization using FSQ/FSR messages to reconcile inconsistent session states.'
