document: rfc-4011
kind: design-rationale
summary: PolicyScript is formally defined as a subset of ISO C++ rather than a new language, allowing programmers familiar with C, Perl, TCL, Python, or JavaScript to quickly write scripts. A subset was chosen to enable easy development of low-cost interpreters and to remove constructs peculiar to C/C++ (pointers, structs, enums, floating point, preprocessor).
