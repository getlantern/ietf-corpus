document: rfc-8563
kind: design-rationale
summary: Scaling is a primary concern in multipoint BFD active tails, so the head must be in control of all timing aspects and BFD packets from tails to the head must not be synchronized. This prevents state explosion toward the head.
section: "1"
topics:
    - routing
    - multicast
