document: rfc-9323
kind: security-consideration
summary: While a one-time-use EE certificate must only be used to sign a single RSC, CAs are not technically restricted from signing multiple RSC objects with a single key pair. Any RSC objects sharing the same EE certificate cannot be revoked individually.
