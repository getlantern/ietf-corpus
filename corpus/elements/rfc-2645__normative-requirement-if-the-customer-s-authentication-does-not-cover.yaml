document: rfc-2645
kind: normative-requirement
summary: If the customer's authentication does not cover all domains specified in ATRN, the provider MUST NOT send mail for any domains and MUST reject the ATRN command with a 450 code.
section: 5.2.1
rfc2119_level: MUST NOT
topics:
