document: rfc-4194
kind: security-consideration
summary: The SHF format does not guarantee that the represented binary data is benign, correctly represented, or non-malicious. The format itself provides per-Block SHA-1 integrity but makes no authenticity guarantee about the source or intent of the data.
section: "8"
