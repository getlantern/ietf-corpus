document: rfc-2459
kind: state-machine
summary: 'The certificate path validation algorithm (Section 6.1) processes certificates from trust anchor to end entity, maintaining state variables: valid_policy_tree, permitted_subtrees, excluded_subtrees, explicit_policy, and path_length. For each certificate it checks signature, validity period, revocation status, name chaining, and extension constraints, yielding an accept/reject decision and the set of valid policies.'
