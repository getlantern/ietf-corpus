document: rfc-7870
kind: normative-requirement
summary: Implementations claiming SNMPv3 compliance MUST include full support for authentication and privacy via the User-based Security Model (USM) with the AES cipher algorithm. Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - snmp
    - crypto
