document: rfc-3767
kind: interoperability-note
summary: SACRED may be implemented over non-BEEP transports provided the transport meets the security mandates in Section 2.3.1 (TLS and/or DIGEST-MD5 with appropriate authentication) before any SACRED PDUs are exchanged.
