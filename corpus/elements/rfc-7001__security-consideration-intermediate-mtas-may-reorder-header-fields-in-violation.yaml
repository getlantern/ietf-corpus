document: rfc-7001
kind: security-consideration
summary: Intermediate MTAs may reorder header fields in violation of RFC 5322; the requirement to prepend Authentication-Results is best-effort. Consumers should tolerate headers that were not prepended, particularly from known-limited producers.
section: "7.3"
topics:
    - email
    - security
