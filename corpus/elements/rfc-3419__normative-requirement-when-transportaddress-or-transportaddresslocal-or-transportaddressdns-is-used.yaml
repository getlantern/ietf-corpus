document: rfc-3419
kind: normative-requirement
summary: When TransportAddress (or TransportAddressLocal or TransportAddressDns) is used as the syntax of an index object, the OBJECT-TYPE declaration MUST include a 'SIZE' clause to limit the number of potential instance sub-identifiers, due to the SMIv2 limit of 128 sub-identifiers.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
