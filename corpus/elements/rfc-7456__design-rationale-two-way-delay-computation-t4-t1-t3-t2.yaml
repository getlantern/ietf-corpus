document: rfc-7456
kind: design-rationale
summary: Two-way delay computation (T4-T1)-(T3-T2) does not require the two MEPs to be time-synchronized, unlike one-way delay which requires synchronized clocks. When synchronized MEPs run two-way DM, they can additionally derive one-way delays.
