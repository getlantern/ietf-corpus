document: rfc-6904
kind: security-consideration
summary: The mechanism provides confidentiality only for the content of selected header extension elements, not for which extension types are present. An observer can still determine which extension IDs are in use, consistent with SRTP's approach of not encrypting the RTP fixed header.
section: "5"
