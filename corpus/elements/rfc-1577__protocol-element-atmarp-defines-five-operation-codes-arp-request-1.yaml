document: rfc-1577
kind: protocol-element
summary: 'ATMARP defines five operation codes: ARP_REQUEST=1, ARP_REPLY=2, InARP_REQUEST=8, InARP_REPLY=9, and ARP_NAK=10. The ARP_NAK is an extension to the protocol; its packet format is the same as the received ARP_REQUEST with the operation code field changed to ARP_NAK.'
section: "6.3"
