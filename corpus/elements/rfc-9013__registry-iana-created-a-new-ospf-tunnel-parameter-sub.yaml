document: rfc-9013
kind: registry
summary: 'IANA created a new ''OSPF Tunnel Parameter Sub-TLVs'' registry under the OSPF Parameters registry. Values 1-34999 use Standards Action; 35000-65499 use First Come First Served. Initial assignments: 0 (Reserved), 1 (Encapsulation), 2 (Protocol Type), 3 (Endpoint), 4 (Color), 5 (Load-Balancing Block), 6 (DS Field), 7 (UDP Destination Port), 65500-65534 (Experimental), 65535 (Reserved).'
