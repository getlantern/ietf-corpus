document: rfc-2634
kind: normative-requirement
summary: A recipient MUST verify the signature covering mlExpansionHistory before processing it. If multiple verified SignerInfos contain mlExpansionHistory attributes that are not all identical, the receiving agent MUST stop processing the message and SHOULD notify the user or MLA administrator.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
    - security
