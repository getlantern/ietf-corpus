document: rfc-1493
kind: design-rationale
summary: 'Several IEEE 802.1d objects were excluded as redundant with MIB-II: BridgeName ≡ sysDescr, BridgeUpTime ≡ sysUpTime, PortAddresses ≡ ifPhysAddress, PortName ≡ ifDescr, PortType ≡ ifType. The BridgeIdentifier is derivable by combining dot1dStpPriority and dot1dBaseBridgeAddress. Transitory state flags (TopologyChange, TopologyChangeAcknowledged) were also excluded as not useful.'
section: "3.1"
