document: rfc-9012
kind: design-rationale
summary: RFC 5512 required the Encapsulation SAFI (value 7) for carrying tunnel information, but this SAFI was never deployed in production because it required reconfiguration of every BGP session. RFC 9012 deprecates the Encapsulation SAFI and allows the Tunnel Encapsulation attribute on existing AFI/SAFIs.
section: "1.2"
topics:
    - bgp
    - routing
