document: rfc-2467
kind: wire-format
summary: IPv6 packets are transmitted in LLC/SNAP frames using long-format (48-bit) FDDI addresses. The frame contains FC, Destination Address (48-bit), Source Address (48-bit), DSAP, SSAP, CTL, OUI (3 octets), Ethertype, and IPv6 header and payload.
