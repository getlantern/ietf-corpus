document: rfc-9928
kind: design-rationale
summary: Introducing 4o6RA at the edge of the IPv6 network hides the Layer 2 network from the DHCPv6 relay, breaking topology propagation because the 4o6RA alone provides no interface information in the encapsulated message. This is illustrated as 'Broken Topology Information' in Figure 2.
