document: rfc-7055
kind: normative-requirement
summary: The EAP server MUST assure that appropriate acceptor name validation has been performed before including acceptor name attributes in a successful channel binding response; delegation to proxies is allowed only if the EAP server configuration guarantees the combination of proxies meets verification requirements.
section: "3.5"
rfc2119_level: MUST
topics:
    - security
