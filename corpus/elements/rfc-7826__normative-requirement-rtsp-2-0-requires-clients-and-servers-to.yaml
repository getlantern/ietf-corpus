document: rfc-7826
kind: normative-requirement
summary: RTSP 2.0 requires clients and servers to implement TCP and TLS over TCP as mandatory transports for RTSP messages. The 'rtsp' URI scheme requires a reliable protocol (TCP), while 'rtsps' identifies a reliable transport using TLS.
section: "2"
rfc2119_level: REQUIRED
topics:
    - realtime
    - tls
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
