document: rfc-7199
kind: normative-requirement
summary: Each location URI and policy URI issued to a different Target MUST be different from others; two clients MUST NOT receive the same location URI or the same policy URI, to prevent correlation and cross-target policy manipulation.
section: "7.3"
rfc2119_level: MUST
topics:
    - privacy
    - security
