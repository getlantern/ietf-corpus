document: rfc-9929
kind: security-consideration
summary: UPA introduces the possibility that an attacker could inject a false but apparently valid UPA to incorrectly signal prefix unreachability. This risk is no greater than existing risks of injecting other false IGP advertisements and can be mitigated by existing IS-IS authentication (RFC 5304, RFC 5310, RFC 7794), OSPFv2 security extensions (RFC 7474, RFC 7684), and OSPFv3 authentication/confidentiality (RFC 4552).
section: "8"
topics:
