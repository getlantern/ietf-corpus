document: rfc-4338
kind: normative-requirement
summary: The default MTU for IPv6 and IPv4 packets over Fibre Channel is 65280 octets. The MTU MUST NOT be lower than 1280 octets. Router Advertisement MTU options specifying values larger than 65280 or a manually configured value MUST be ignored.
section: "4.8"
rfc2119_level: MUST NOT
topics:
    - ip
