document: rfc-5332
kind: protocol-element
summary: A 'multicast label' is an MPLS label whose NHLFE specifies a set of next hops with semantics that the packet is to be replicated and sent to each next hop. The intent to replicate distinguishes it from a unicast label, even when the set has only one member.
section: "1"
topics:
