document: rfc-5664
kind: protocol-element
summary: pnfs_osd_object_cred4 is the per-component security credential containing the object ID, OSD protocol version, capability key security method (PNFS_OSD_CAP_KEY_SEC_NONE or PNFS_OSD_CAP_KEY_SEC_SSV), an opaque capability key, and an opaque capability. Together with oda_systemid from pnfs_osd_deviceaddr4, these provide OSD access credentials.
section: "3.3"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
