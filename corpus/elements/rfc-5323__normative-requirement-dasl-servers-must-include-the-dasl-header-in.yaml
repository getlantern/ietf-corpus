document: rfc-5323
kind: normative-requirement
summary: DASL servers MUST include the DASL header in the OPTIONS response. If a resource supports the SEARCH method, the server MUST list SEARCH in the Allow header. Servers supporting RFC 3253 and/or RFC 3744 MUST also report SEARCH in DAV:supported-method-set and support the DAV:supported-query-grammar-set live property.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
