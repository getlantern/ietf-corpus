document: rfc-1191
kind: interoperability-note
summary: Transport protocols that cannot repacketize on retransmission (e.g., ISO TP4) should retransmit oversized datagrams without the DF bit to allow fragmentation, while transmitting new datagrams within the discovered PMTU with DF set.
