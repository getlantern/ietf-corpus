document: rfc-3643
kind: normative-requirement
summary: When in the Unsynchronized state and permitted to process frames, an entity SHALL ignore Time Stamp words on de-encapsulation and SHALL set both Time Stamp words to zero on encapsulation.
section: "4"
rfc2119_level: SHALL
