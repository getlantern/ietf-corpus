document: rfc-9197
kind: interoperability-note
summary: 'When multiple encapsulation protocols are stacked (tunneling), IOAM-Data-Fields may be present at multiple layers and follow a ''ships-in-the-night'' model: fields at one layer are entirely independent of fields at another layer. Operators can instrument whichever protocol layer they choose.'
section: "3"
topics:
