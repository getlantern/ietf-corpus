document: rfc-4738
kind: interoperability-note
summary: RSA-R mode may not easily support 3-way calling when the Initiator lacks certificates for both other parties. If the bridge entity knows neither party's certificate, an extra message exchange beyond what RSA mode requires may be needed. Bridged 3-way calling avoids this issue.
section: "4.1"
topics:
    - realtime
