document: rfc-5258
kind: normative-requirement
summary: The RECURSIVEMATCH option MUST NOT occur as the only selection option (or only with REMOTE), as it only makes sense when other selection options are also present. The server MUST return a BAD tagged response in such cases.
section: "3.1"
rfc2119_level: MUST NOT
