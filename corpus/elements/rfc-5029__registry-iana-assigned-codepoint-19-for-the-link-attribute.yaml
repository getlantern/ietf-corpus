document: rfc-5029
kind: registry
summary: IANA assigned codepoint 19 for the link-attribute sub-TLV within TLV 22, and created a registry for bit values inside the link-attributes sub-TLV. Initial values are 0x1 (Local Protection Available) and 0x2 (Link Excluded from Local Protection). Further values require Standards Action with Early Allocation permitted.
