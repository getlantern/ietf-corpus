document: rfc-9248
kind: design-rationale
summary: This specification adopts WebRTC media specifications (RFC 8825 suite) as its media foundation, treating the RUE as equivalent to a browser-based WebRTC client with SIP signaling substituted for the WebRTC browser signaling. A gateway bridging WebRTC browser clients to the RUE interface is assumed but not specified, enabling browser-based VRS clients.
section: "6"
topics:
    - realtime
    - sip
