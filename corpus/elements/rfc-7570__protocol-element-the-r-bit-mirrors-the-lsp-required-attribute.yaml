document: rfc-7570
kind: protocol-element
summary: The R bit mirrors the LSP_REQUIRED_ATTRIBUTE/LSP_ATTRIBUTE semantic from RFC 5420. When set, it indicates hop attributes that the addressed node must process; when cleared, attributes are optional as per RFC 5420 Section 4.2.
section: "2.1"
