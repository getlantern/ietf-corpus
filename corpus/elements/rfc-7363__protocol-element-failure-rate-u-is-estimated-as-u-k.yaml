document: rfc-7363
kind: protocol-element
summary: Failure rate U is estimated as U = k / (M * Tk), where M is the number of unique peer identifiers in the routing table, Tk is the time between first and last failure in the history of K failures, and k is the number of failures. Accurate within 17% of the real value.
section: "6.3"
topics:
    - routing
