document: rfc-7601
kind: security-consideration
summary: A malicious sender can forge an Authentication-Results header field using a target ADMD's authserv-id, claiming valid authentication. A non-conformant MTA that fails to strip this forged field allows an MUA to inappropriately trust it. Mitigation requires border MTA compliance with Section 5 stripping and disabling interpretation by default.
section: "7.1"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
