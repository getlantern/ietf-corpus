document: rfc-2025
kind: security-consideration
summary: Checksums are computed over user data logically prepended by the plaintext token header (mic-header or wrap-header), binding data to the entire header to minimize the possibility of malicious splicing of checksums across messages.
section: 3.2.1.1
topics:
