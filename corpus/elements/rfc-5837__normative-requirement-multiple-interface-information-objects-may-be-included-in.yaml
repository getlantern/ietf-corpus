document: rfc-5837
kind: normative-requirement
summary: Multiple Interface Information Objects MAY be included in a single ICMP message, but each MUST specify a unique role. A single ICMP message MUST NOT contain two Interface Information Objects with the same role.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - ip
