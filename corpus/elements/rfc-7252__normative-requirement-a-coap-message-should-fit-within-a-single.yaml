document: rfc-7252
kind: normative-requirement
summary: A CoAP message SHOULD fit within a single IP packet to avoid IP fragmentation. If the Path MTU is unknown, an IP MTU of 1280 bytes SHOULD be assumed; good upper bounds are 1152 bytes for message size and 1024 bytes for payload size.
section: "4.6"
rfc2119_level: SHOULD
topics:
    - http
    - udp
    - ip
