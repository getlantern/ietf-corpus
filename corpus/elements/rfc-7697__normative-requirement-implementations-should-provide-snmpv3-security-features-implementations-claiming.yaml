document: rfc-7697
kind: normative-requirement
summary: Implementations SHOULD provide SNMPv3 security features; implementations claiming SNMPv3 compliance MUST include full support for authentication and privacy via the User-based Security Model (USM) with the AES cipher algorithm (RFC 3826). Implementations MAY also support the Transport Security Model (TSM) with SSH or TLS/DTLS.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
