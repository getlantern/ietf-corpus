document: rfc-3608
kind: protocol-element
summary: The Service-Route header field generally contains references to elements strictly within the administrative domain of the registrar and home service proxy. When a UA roams into a visited network, the registrar's Service-Route contains only home network elements, as the registrar cannot be assumed to have knowledge of the visited network topology.
section: "6.3"
topics:
    - sip
    - realtime
    - mobility
