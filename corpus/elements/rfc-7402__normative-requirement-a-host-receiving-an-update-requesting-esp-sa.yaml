document: rfc-7402
kind: normative-requirement
summary: A host receiving an UPDATE requesting ESP SA update MUST reply with an UPDATE containing ESP_INFO. If the incoming UPDATE contained a DIFFIE_HELLMAN parameter, the reply MUST also contain a DIFFIE_HELLMAN parameter.
section: 4.1.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
