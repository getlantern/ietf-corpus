document: rfc-4861
kind: state-machine
summary: 'The Neighbor Cache entry for each neighbor cycles through five reachability states: INCOMPLETE (address resolution in progress), REACHABLE (recently confirmed reachable), STALE (no longer known reachable, not yet probed), DELAY (traffic sent, waiting for upper-layer confirmation before probing), and PROBE (unicast NS probes being sent). Transitions are driven by packet sends, received NAs, upper-layer hints, and probe timeouts.'
section: "5.1"
