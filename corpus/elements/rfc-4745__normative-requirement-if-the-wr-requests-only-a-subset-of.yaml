document: rfc-4745
kind: normative-requirement
summary: If the WR requests only a subset of data, the information delivered MUST be the intersection of the permissions granted to the WR and the data actually requested by the WR. This prevents over-disclosure when the WR requests less than what is permitted.
section: "6"
rfc2119_level: MUST
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
