document: rfc-7177
kind: interoperability-note
summary: When the Designated VLAN on an Ethernet link changes, an RBridge must preserve connectivity by setting the non-Designated VLAN Hello holding timer to the maximum of its remaining time and the Designated VLAN timer's remaining time, then expiring the Designated VLAN timer and triggering an A5 event for each affected adjacency.
section: 4.2.3
topics:
    - routing
