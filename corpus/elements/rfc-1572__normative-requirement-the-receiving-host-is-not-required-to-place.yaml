document: rfc-1572
kind: normative-requirement
summary: The receiving host is not required to place all received variables into the environment. If the server has determined a variable's value by more accurate means, or does not understand a variable name, it may ignore the value. The suggested implementation is to put all unknown information into the user's environment for maximum flexibility.
section: "6"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
