document: rfc-9082
kind: protocol-element
summary: The 'domain' path segment queries domain information. Syntax is /domain/<fully qualified domain name> and supports both DNS reverse-zone names (in-addr.arpa, ip6.arpa) for RIRs and forward names for DNRs; IDNs in A-label or U-label format are valid.
section: 3.1.3
