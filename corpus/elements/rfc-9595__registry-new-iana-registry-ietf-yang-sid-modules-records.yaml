document: rfc-9595
kind: registry
summary: New IANA registry 'IETF YANG-SID Modules' records individual SID allocations per YANG module. Each entry contains the module name, URI for the .yang file, URI for the .sid file (stored by IANA), and count of allocated SIDs. Allocation policy is Expert Review; all SIDs in the .sid file MUST be within ranges allocated in 'IETF YANG-SID Ranges'.
section: "6.5"
topics:
    - registry
    - yang
    - netconf
