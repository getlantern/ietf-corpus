document: rfc-2253
kind: interoperability-note
summary: Server implementations parsing a DN string generated by an LDAPv2 client MUST accept the syntax of RFC 1779, including quoted values and additional whitespace. However, implementations MUST NOT generate any RFC 1779 encodings that are not described in section 2 of this specification.
section: "4"
rfc2119_level: MUST
topics:
    - ldap
