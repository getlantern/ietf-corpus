document: rfc-8295
kind: design-rationale
summary: The PAL uses a special package type 0001 ('Additional PAL value present') rather than a fixed maximum size to accommodate clients with small memory constraints. Servers can split large PALs across multiple linked PAL objects without imposing a single universal size limit.
