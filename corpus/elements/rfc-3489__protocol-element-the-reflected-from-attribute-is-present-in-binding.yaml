document: rfc-3489
kind: protocol-element
summary: The REFLECTED-FROM attribute is present in Binding Responses only when the request contained RESPONSE-ADDRESS; it contains the source IP address and port of the requester (or the origin of the shared-secret request) to provide traceability and prevent STUN being used as a DoS reflector.
section: 11.2.11
topics:
    - nat
    - security
