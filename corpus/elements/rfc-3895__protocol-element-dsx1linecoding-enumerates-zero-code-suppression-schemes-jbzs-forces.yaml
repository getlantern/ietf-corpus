document: rfc-3895
kind: protocol-element
summary: 'dsx1LineCoding enumerates zero-code suppression schemes: JBZS (forces pulse in bit 8, leaving 1.344Mbps for data), B8ZS (replaces 8 zeros with bipolar violations pattern), HDB3 (for E1), ZBTSI (ANSI clear channel), AMI (no suppression, higher layer responsible), and B6ZS (for DS2, replaces 6-zero sequences).'
