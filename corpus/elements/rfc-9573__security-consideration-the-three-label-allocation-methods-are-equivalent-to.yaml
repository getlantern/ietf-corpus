document: rfc-9573
kind: security-consideration
summary: The three label allocation methods are equivalent to using common SRGBs from the regular per-platform label space (Option 1), from a third-party label space [RFC5331] (Option 2), or from disjoint blocks in a third-party label space (Option 3). RFC 6514, 7432, 8402, and 5331 identify no security concerns related to label allocation methods, and this document introduces no new security concerns.
section: "5"
topics:
