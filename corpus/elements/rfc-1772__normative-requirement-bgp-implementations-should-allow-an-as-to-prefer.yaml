document: rfc-1772
kind: normative-requirement
summary: BGP implementations should allow an AS to prefer a particular path to a destination. At minimum, an implementation shall support administratively assigning a degree of preference to a route based on the neighbor IP address, in the range 0 to 2^31 - 1.
section: "7"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
