document: rfc-8169
kind: design-rationale
summary: Residence time is accumulated in the Scratch Pad rather than relying on end-to-end delay measurement (RFC 6374) because PTP requires per-packet transit correction to update the correctionField — aggregate delay statistics are insufficient for making MPLS transit nodes transparent to clock synchronization.
