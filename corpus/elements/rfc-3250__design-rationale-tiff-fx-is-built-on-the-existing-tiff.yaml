document: rfc-3250
kind: design-rationale
summary: TIFF-FX is built on the existing TIFF structure to enable standardized messaging-based fax over the Internet while maintaining compatibility with ITU-T Group 3 facsimile recommendations, leveraging TIFF's historical use in store-and-forward fax messaging applications.
