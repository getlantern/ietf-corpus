document: rfc-2630
kind: security-consideration
summary: The recipient must not rely on any MAC or message digest values computed by the originator in authenticated-data; the recipient must independently compute and compare both to verify integrity. Authentication fails if they do not match.
section: "9.3"
topics:
    - crypto
    - security
