document: rfc-3676
kind: protocol-element
summary: The Format parameter for Text/Plain takes values 'Fixed' or 'Flowed' (case-insensitive). If absent or unrecognized, Fixed is assumed. Format=Flowed indicates the flowed-text encoding defined by this specification was used on generation.
