document: rfc-1981
kind: normative-requirement
summary: A node MUST NOT increase its estimate of the Path MTU in response to the contents of a Packet Too Big message, because such a message may be stale, injected as part of a denial-of-service attack, or the result of multiple paths with different PMTUs.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
