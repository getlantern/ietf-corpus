document: rfc-7216
kind: normative-requirement
summary: For IPv4, the full reverse DNS name SHOULD be successively shortened by one and then two labels (corresponding to /24 and /16 prefixes) and the DDDS query repeated. For IPv6, the name SHOULD be shortened successively by 16, 18, 20, and 24 labels (corresponding to /64, /56, /48, and /32 prefixes).
section: "4.3"
rfc2119_level: SHOULD
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
