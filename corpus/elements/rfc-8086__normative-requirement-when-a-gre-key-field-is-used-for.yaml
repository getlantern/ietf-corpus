document: rfc-8086
kind: normative-requirement
summary: When a GRE Key field is used for traffic separation (e.g., NVGRE), at least one of the UDP or GRE checksums MUST be used for both IPv4 and IPv6 GRE-in-UDP tunnels to guard against GRE header corruption.
section: "11"
rfc2119_level: MUST
topics:
    - security
    - udp
