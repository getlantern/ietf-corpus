document: rfc-5132
kind: protocol-element
summary: ipMcastInterfaceTable manages per-interface multicast protocol state, indexed by IP version (InetVersion) and interface index. Key columns include ipMcastInterfaceTtl (TTL threshold, 0..256) and ipMcastInterfaceRateLimit (kilobits per second, 0 means no limit).
