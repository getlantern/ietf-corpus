document: rfc-4087
kind: protocol-element
summary: tunnelIfEncapsLimit (Integer32, -1|0..255) limits the maximum number of additional encapsulations permitted at this node, per RFC 2473 section 4.1.1. A value of -1 means no limit beyond packet-size constraints.
