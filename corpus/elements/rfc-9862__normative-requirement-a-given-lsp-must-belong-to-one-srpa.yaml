document: rfc-9862
kind: normative-requirement
summary: A given LSP MUST belong to one SRPA at most, since an SR Policy Candidate Path cannot belong to multiple SR Policies. If a PCEP speaker receives a message requesting an LSP join more than one SRPA, it MUST send PCErr with Error-Type=26, Error-value=7 'Cannot join the association group'.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
