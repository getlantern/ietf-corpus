document: rfc-5026
kind: design-rationale
summary: DNS-based HA address discovery is chosen over DHAAD because DHAAD requires the Mobile Node to be pre-configured with the home network prefix and does not allow load balancing across Home Agents in different subnets. The only pre-configured information needed is the MSP domain name.
section: "4"
topics:
