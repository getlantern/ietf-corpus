document: rfc-7751
kind: interoperability-note
summary: AD-CAMMAC supersedes AD-KDC-ISSUED (RFC 4120) but must be wrapped in AD-IF-RELEVANT for backward compatibility with Kerberos implementations that do not recognize ad-type 96, unless the KDC has out-of-band knowledge that the application server supports CAMMAC.
