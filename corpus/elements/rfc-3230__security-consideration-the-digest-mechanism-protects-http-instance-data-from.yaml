document: rfc-3230
kind: security-consideration
summary: The Digest mechanism protects HTTP instance data from accidental corruption and can detect at least one spoofing attack described in the delta-encoding specification, but it does not protect HTTP entity headers and is not intended as general defense against malicious message tampering.
