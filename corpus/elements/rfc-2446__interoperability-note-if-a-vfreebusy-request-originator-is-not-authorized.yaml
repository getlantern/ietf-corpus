document: rfc-2446
kind: interoperability-note
summary: If a VFREEBUSY REQUEST originator is not authorized to make a busy time request, an exception SHOULD be returned in a REPLY method but no busy time data need be returned. If the transport binding supports exception messages, an 'unsupported capability' message may also be returned to the requester.
section: 3.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
