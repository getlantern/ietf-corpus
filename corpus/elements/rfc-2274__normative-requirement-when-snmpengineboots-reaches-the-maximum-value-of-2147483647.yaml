document: rfc-2274
kind: normative-requirement
summary: When snmpEngineBoots reaches the maximum value of 2147483647, it latches at that value and every authenticated message causes a notInTimeWindow error; manual physical intervention is required to reset the engine.
section: 2.2.2
rfc2119_level: MUST
topics:
    - snmp
    - security
