document: rfc-8176
kind: registry
summary: Establishes the IANA 'Authentication Method Reference Values' registry for 'amr' claim array element values. Registration requires Expert Review after a three-week review period on the jwt-reg-review@ietf.org mailing list. The registry records the Authentication Method Reference value and a reference to the specification that defines it.
