document: rfc-9209
kind: interoperability-note
summary: Because trailer fields may be silently discarded along the path to the user agent (per HTTP semantics), Proxy-Status in a trailer is only reliable in environments where trailer support is guaranteed end-to-end. Clients that wish to use trailer-conveyed Proxy-Status data may promote it into the header field by matching trailer members to existing header members and replacing in place.
section: "2"
topics:
    - http
