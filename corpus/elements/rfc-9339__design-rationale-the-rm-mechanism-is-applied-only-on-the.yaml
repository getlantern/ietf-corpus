document: rfc-9339
kind: design-rationale
summary: The RM mechanism is applied only on the signaling router's side (e.g., hub/aggregation router) rather than requiring configuration changes on potentially many spoke/leaf routers. This is particularly valuable for hub-and-spoke or Clos topologies with large numbers of edge devices.
section: "2.2"
topics:
