document: rfc-9002
kind: security-consideration
summary: Packets carrying only ACK frames can be heuristically identified by their size, potentially revealing link characteristics or application behavior patterns. Endpoints can mitigate this by bundling acknowledgments with other frames or by using PADDING frames at a potential performance cost.
section: "8.2"
topics:
