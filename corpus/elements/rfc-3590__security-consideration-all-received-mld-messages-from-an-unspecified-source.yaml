document: rfc-3590
kind: security-consideration
summary: All received MLD messages from an unspecified source address are silently discarded by hosts and routers, consistent with RFC 2710; this document introduces no new security impacts for those devices. For snooping switches that do maintain forwarding state from unspecified-source messages, the security vulnerabilities are analogous to those from forged MLD messages as described in RFC 2710.
section: "6"
topics:
    - security
    - multicast
