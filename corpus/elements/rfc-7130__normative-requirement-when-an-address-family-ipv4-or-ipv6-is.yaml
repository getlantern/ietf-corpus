document: rfc-7130
kind: normative-requirement
summary: 'When an address family (IPv4 or IPv6) is used for micro-BFD sessions on one member link of a LAG, it MUST be used on all member links of that particular LAG. Two micro-BFD sessions MAY exist per member link: one IPv4 and one IPv6.'
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
