document: rfc-2331
kind: normative-requirement
summary: When the network does not enforce PCR and traffic shaping is not a concern, the user SHOULD specify 'no tagging' (UBR.1) in the SETUP message so that cells are dropped during congestion rather than randomly marked as low priority.
section: 5.3.1.1
rfc2119_level: SHOULD
topics:
    - ip
    - qos
    - congestion
