document: rfc-7601
kind: normative-requirement
summary: Each 'method' MUST refer to an authentication method declared in the IANA registry or an extension method, and each 'result' MUST refer to a result code declared in the IANA registry or an extension result code. An MTA MUST NOT add a result to an existing Authentication-Results header field; each MTA adds its own.
section: "4"
rfc2119_level: MUST NOT
topics:
    - email
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
