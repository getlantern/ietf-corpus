document: rfc-3596
kind: design-rationale
summary: The extensions are designed to be compatible with existing DNS software; existing support for IPv4 addresses is retained unchanged. The IP protocol version used for querying is independent of the protocol version of the resource records (IPv4 transport may query IPv6 records and vice versa).
section: "1"
topics:
    - dns
    - ip
