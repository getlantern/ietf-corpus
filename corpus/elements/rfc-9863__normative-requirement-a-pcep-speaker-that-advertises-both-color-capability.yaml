document: rfc-9863
kind: normative-requirement
summary: A PCEP speaker that advertises both color capability and SR Policy Association (RFC 9862) capability MUST NOT send the COLOR TLV in the LSP object for SR Paths; for such paths the color is encoded in the SR Policy Association object.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
