document: rfc-1490
kind: design-rationale
summary: To eliminate conflicts among multiple valid encapsulation paths, SNAP encapsulation is used only when no NLPID value is defined for a given protocol. Protocols with an assigned NLPID (e.g., IP = 0xCC, CLNP = 0x81) use the NLPID directly.
