document: rfc-3892
kind: design-rationale
summary: S/MIME protection of the Referred-By token is optional because some systems either do not need trust validation of this information or can establish trust through other means. Implementations not using S/MIME must provide their own defenses against falsification, eavesdropping, and replay attacks.
section: "6"
topics:
