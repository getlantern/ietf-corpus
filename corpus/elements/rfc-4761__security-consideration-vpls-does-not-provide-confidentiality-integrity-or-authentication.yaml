document: rfc-4761
kind: security-consideration
summary: VPLS does not provide confidentiality, integrity, or authentication; packets are sent in the clear and are vulnerable to man-in-the-middle eavesdropping and injection. PE-to-PE IPsec tunnels or end-system encryption are recommended if security is required.
section: "6"
topics:
    - security
    - vpn
    - mpls
    - ipsec
