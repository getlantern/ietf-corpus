document: rfc-6107
kind: state-machine
summary: 'LSP setup for H-LSPs: ingress sends Path with LSP_TUNNEL_INTERFACE_ID (Forward Interface ID) containing Actions and optional TLVs; egress accepts and responds with Resv containing LSP_TUNNEL_INTERFACE_ID (Reverse Interface ID) mirroring the Actions field. Both endpoints then advertise the resulting TE link as specified. On teardown (PathTear/PathErr), advertisements are withdrawn.'
section: 3.1–3.4
topics:
