document: rfc-9399
kind: interoperability-note
summary: This document obsoletes RFC 3709 (logotype extension) and RFC 6170 (certificate image). The ASN.1 module from RFC 3709 is updated only in comments and IMPORTS; the OIDs and structure are unchanged. A new 2002-syntax ASN.1 module (id-mod-logotype-2022, arc 107) is also provided.
