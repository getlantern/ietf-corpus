document: rfc-5476
kind: protocol-element
summary: A Selection Sequence is a unique value per Observation Domain identifying the combination of an Observation Point and one or more Selector IDs through which packets are selected. It is represented by the selectionSequenceId Information Element defined in [RFC5477].
