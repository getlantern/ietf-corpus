document: rfc-1647
kind: state-machine
summary: 'TN3270E connection setup proceeds in strict sequence: (1) WILL/DO TN3270E option negotiation; (2) DEVICE-TYPE sub-negotiation (server sends SEND DEVICE-TYPE, client responds with REQUEST, server replies with IS or REJECT); (3) FUNCTIONS sub-negotiation (client initiates with REQUEST, resolved with IS); (4) 3270 data stream exchange. No phase may be skipped or reordered.'
