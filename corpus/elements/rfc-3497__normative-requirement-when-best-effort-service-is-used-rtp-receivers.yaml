document: rfc-3497
kind: normative-requirement
summary: When best-effort service is used, RTP receivers MUST monitor packet loss to ensure the loss rate is within acceptable parameters and MUST leave the session if the loss rate is too high. The acceptable threshold is defined in terms of equivalent TCP throughput across the same path.
section: "9"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
    - security
