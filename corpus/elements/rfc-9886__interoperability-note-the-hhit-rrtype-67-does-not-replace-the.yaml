document: rfc-9886
kind: interoperability-note
summary: The HHIT RRType (67) does not replace the existing HIP RRType (RFC 8005). Both may coexist; HHIT provides mandatory certificate inclusion not available in HIP. DNS lookups for DETs query HHIT and/or BRID RRTypes rather than the PTR RRType conventionally used for reverse IP lookups.
section: "5.1"
topics:
    - dns
