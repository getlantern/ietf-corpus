document: rfc-3479
kind: protocol-element
summary: 'FT Operation ACKs are cumulative: an FT ACK TLV with sequence number N acknowledges all FT messages from 1 to N. ACKs may be piggybacked on any LDP message. If the 32-bit FT sequence number space is exhausted (peer not ACKing), the LSR SHOULD send a Notification with status ''FT Seq Numbers Exhausted''.'
section: "5.2"
topics:
    - mpls
    - routing
