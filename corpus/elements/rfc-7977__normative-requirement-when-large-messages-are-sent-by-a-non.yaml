document: rfc-7977
kind: normative-requirement
summary: When large messages are sent by a non-WebSocket peer, MSRP chunking (per RFC 4975 Section 5.1) MUST be used by the WebSocket MSRP Server to split the message into several smaller MSRP chunks.
section: "5.1"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
