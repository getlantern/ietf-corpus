document: rfc-3863
kind: protocol-element
summary: The <timestamp> element contains a date-time string following the IMPP datetime format (RFC 3339). Timestamps containing 'T' or 'Z' MUST use capitalized forms, and a presentity MUST NOT generate successive <presence> elements with the same timestamp.
section: 4.1.7
