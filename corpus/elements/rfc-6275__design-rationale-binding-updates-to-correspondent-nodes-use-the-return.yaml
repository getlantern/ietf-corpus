document: rfc-6275
kind: design-rationale
summary: Binding Updates to correspondent nodes use the return routability procedure rather than pre-arranged security associations because no authentication infrastructure between arbitrary mobile nodes and correspondent nodes can be assumed. The procedure operates on a global scale without prior configuration.
