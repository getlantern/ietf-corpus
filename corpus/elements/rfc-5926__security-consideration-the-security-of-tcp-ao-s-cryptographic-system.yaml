document: rfc-5926
kind: security-consideration
summary: The security of TCP-AO's cryptographic system depends on algorithm strength, key unpredictability, and correct protocol engineering. Administrators should use randomly generated keys per RFC 4086; the variable-length key support in KDF_AES_128_CMAC does not make weak keys acceptable.
section: "4"
topics:
