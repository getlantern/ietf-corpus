document: rfc-5547
kind: design-rationale
summary: The 'file-transfer-id' attribute was introduced because SDP may be retransmitted unchanged for reasons unrelated to file transfer (e.g., SIP Session Timer re-INVITEs, addition of other media streams), and without it endpoints cannot determine whether a new file transfer is being requested or SDP is merely being repeated.
section: "8.1"
topics:
    - realtime
