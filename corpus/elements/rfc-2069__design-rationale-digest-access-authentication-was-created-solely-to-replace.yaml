document: rfc-2069
kind: design-rationale
summary: Digest Access Authentication was created solely to replace Basic Authentication, which transmits passwords in cleartext. It is intentionally a weak mechanism — not a complete security solution — providing no content encryption and being weaker than Kerberos or client-side private-key schemes. An important design constraint was that the scheme be free of patent and export restrictions.
section: "1.1"
topics:
    - http
    - security
