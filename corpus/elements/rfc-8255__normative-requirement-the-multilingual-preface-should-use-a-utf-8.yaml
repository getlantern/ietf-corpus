document: rfc-8255
kind: normative-requirement
summary: The multilingual preface SHOULD use a UTF-8 charset because it is likely to contain scripts requiring non-US-ASCII characters. Conforming email clients SHOULD only show the single language part matching the user's preference and thus will normally suppress the preface.
section: "3.1"
rfc2119_level: RECOMMENDED
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
