document: rfc-1743
kind: protocol-element
summary: 'dot5RingSpeed is a read-write INTEGER specifying the ring speed at the next insertion: unknown(1), oneMegabit(2), fourMegabit(3), or sixteenMegabit(4). It reflects the speed for the next insertion, which may differ from the current operational speed given by ifSpeed. Interfaces that do not support changing ring speed can only be set to their current value.'
