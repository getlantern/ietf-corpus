document: rfc-5476
kind: normative-requirement
summary: The Accuracy Report Interpretation MUST be exported using an Options Template with a scope containing the Information Element for which accuracy is required; if accuracy is template-specific a second scope containing templateId MUST be added. The accuracy SHOULD be reported using absoluteError or relativeError Information Elements [RFC5477].
section: 6.5.4
rfc2119_level: MUST
topics:
    - measurement
