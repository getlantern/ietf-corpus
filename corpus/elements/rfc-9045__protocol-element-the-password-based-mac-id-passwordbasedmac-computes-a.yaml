document: rfc-9045
kind: protocol-element
summary: The Password-Based MAC (id-PasswordBasedMAC) computes a symmetric key from a shared password using a one-way function iterated multiple times, then applies a MAC algorithm over the data. It is designed to resist dictionary attacks against the password.
