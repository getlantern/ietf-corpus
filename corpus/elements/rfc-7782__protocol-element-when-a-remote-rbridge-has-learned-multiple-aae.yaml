document: rfc-7782
kind: protocol-element
summary: When a remote RBridge has learned multiple AAE attachments for a MAC address and there are multiple equal least-cost member RBridges, the ingress RBridge MUST select one using a pseudorandom method (as specified in RFC 7357 Section 5.3) to achieve load balancing toward the AAE.
section: 4.1.3
topics:
    - routing
