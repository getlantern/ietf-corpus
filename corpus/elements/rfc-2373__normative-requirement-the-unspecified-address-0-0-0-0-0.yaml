document: rfc-2373
kind: normative-requirement
summary: The unspecified address (0:0:0:0:0:0:0:0, written as '::') must never be assigned to any node and must not be used as the destination address of IPv6 packets or in IPv6 Routing Headers. It is used as a source address by initializing hosts before address assignment.
section: 2.5.2
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
