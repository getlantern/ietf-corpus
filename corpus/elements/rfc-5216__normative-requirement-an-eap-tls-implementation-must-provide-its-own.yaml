document: rfc-5216
kind: normative-requirement
summary: An EAP-TLS implementation MUST provide its own support for fragmentation and reassembly because TLS messages (up to 16 MB) can exceed the MTU or the RADIUS maximum packet size of 4096 octets.
section: 2.1.5
rfc2119_level: MUST
topics:
    - tls
