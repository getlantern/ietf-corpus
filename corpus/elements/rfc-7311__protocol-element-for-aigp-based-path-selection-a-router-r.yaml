document: rfc-7311
kind: protocol-element
summary: 'For AIGP-based path selection, a router R computes value A for each candidate route T as: A = T''s AIGP TLV value + IGP distance from R to T''s next hop. The route with the lowest A wins; routes not tied for lowest A are removed from consideration.'
section: "4.1"
topics:
    - bgp
    - routing
