document: rfc-8469
kind: design-rationale
summary: Early Ethernet PW deployments of commercial significance could not process the Ethernet CW, which motivated making CW optional in RFC 4448. Proprietary heuristic methods to discriminate Ethernet PW from IP packets were later developed but proved unreliable.
