document: rfc-7792
kind: design-rationale
summary: The SSON traffic parameters (using m * 12.5 GHz slot width encoding) are also applicable to fixed-grid networks, because fixed-grid channel spacings (12.5, 25, 50, 100 GHz and multiples of 100 GHz) are all multiples of 12.5 GHz. This enables common signaling for both flexi-grid and legacy DWDM networks.
section: 4.1.1
topics:
