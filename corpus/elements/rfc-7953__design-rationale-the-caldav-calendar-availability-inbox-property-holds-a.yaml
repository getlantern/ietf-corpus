document: rfc-7953
kind: design-rationale
summary: The CALDAV:calendar-availability Inbox property holds a single VAVAILABILITY component for simple cases, while more complex scenarios (multiple overlapping rules) are handled by storing multiple VAVAILABILITY components directly in the user's calendar collections. This two-tier approach avoids a single-property schema that would be too restrictive for complex availability patterns.
section: 7.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
