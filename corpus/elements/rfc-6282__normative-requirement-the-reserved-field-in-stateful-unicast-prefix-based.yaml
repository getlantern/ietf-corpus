document: rfc-6282
kind: normative-requirement
summary: The Reserved field in stateful unicast-prefix-based multicast address compression (M=1, DAC=1, DAM=00) MUST carry the reserved bits from RFC 3306; when a Rendezvous Point is encoded per RFC 3956, it MUST carry the RIID bits in-line.
section: 3.2.4
rfc2119_level: MUST
topics:
