document: rfc-5509
kind: normative-requirement
summary: When a user agent is presented with an IM URI (e.g., "im:fred@example.com") as the address for an instant message, it SHOULD resolve it to a SIP URI and place the resulting URI in the Request-URI of the MESSAGE request before sending.
section: "3"
rfc2119_level: SHOULD
topics:
    - sip
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
