document: rfc-6106
kind: design-rationale
summary: RA-based DNS configuration was designed specifically for networks using IPv6 stateless address autoconfiguration (SLAAC) without DHCPv6 infrastructure or without DHCPv6 clients on all hosts. It allows complete basic network configuration — address, default router, and DNS — from a single RA message exchange.
section: "1.1"
