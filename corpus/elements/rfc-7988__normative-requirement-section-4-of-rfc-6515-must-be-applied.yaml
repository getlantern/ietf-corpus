document: rfc-7988
kind: normative-requirement
summary: Section 4 of RFC 6515 MUST be applied when a PTA is carried in a Leaf A-D route, to determine whether the Tunnel Identifier field carries an IPv4 or IPv6 address. When neither of the applicable conditions hold, the Tunnel Identifier field MUST be ignored upon reception.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - multicast
