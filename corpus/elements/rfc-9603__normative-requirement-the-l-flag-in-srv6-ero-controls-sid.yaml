document: rfc-9603
kind: normative-requirement
summary: 'The L flag in SRv6-ERO controls SID mutability: if set to zero, a PCC MUST NOT overwrite the SID value. If set to one, a PCC MAY expand or replace one or more SIDs based on local policy.'
section: 4.3.1
rfc2119_level: MUST NOT
topics:
    - routing
