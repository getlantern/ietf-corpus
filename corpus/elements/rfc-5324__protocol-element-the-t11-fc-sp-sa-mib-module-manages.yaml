document: rfc-5324
kind: protocol-element
summary: The T11-FC-SP-SA-MIB module manages Security Associations established via FC-SP. It provides tables for SA proposals (t11FcSpSaPropTable, t11FcSpSaTSelPropTable, t11FcSpSaTransTable), drop/bypass Traffic Selectors (t11FcSpSaTSelDrByTable), active bidirectional SA pairs (t11FcSpSaPairTable), negotiated Traffic Selectors for ingress and egress (t11FcSpSaTSelNegInTable, t11FcSpSaTSelNegOutTable), and SPI-based reverse lookup (t11FcSpSaTSelSpiTable).
section: 4.8.5
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
