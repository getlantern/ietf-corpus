document: rfc-1697
kind: normative-requirement
summary: rdbmsDbInfoTable entries must be present only when the database is actively opened, defined as at least one rdbmsRelState entry for that database being active(2). If not actively opened, access returns noSuchName (SNMPv1) or noSuchInstance (SNMPv2).
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
