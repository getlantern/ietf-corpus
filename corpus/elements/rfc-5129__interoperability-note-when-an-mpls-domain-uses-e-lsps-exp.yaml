document: rfc-5129
kind: interoperability-note
summary: When an MPLS domain uses E-LSPs (EXP-Inferred-PSC LSPs), EXP codepoint space is scarce since all 8 values are partitioned among PHBs and ECN states. With L-LSPs (Label-Only-Inferred-PSC LSPs), the EXP field is largely free for ECN, enabling more sophisticated marking schemes with more codepoints.
section: "2"
topics:
