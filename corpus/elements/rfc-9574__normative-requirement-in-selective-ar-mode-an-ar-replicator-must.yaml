document: rfc-9574
kind: normative-requirement
summary: In selective AR mode, an AR-REPLICATOR MUST NOT behave as a selective AR-REPLICATOR if at least one AR-REPLICATOR in the BD advertises the Replicator-AR route with L=0; in that case all AR-REPLICATORs MUST fall back to non-selective AR mode.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
