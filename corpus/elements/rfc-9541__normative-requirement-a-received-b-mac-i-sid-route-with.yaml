document: rfc-9541
kind: normative-requirement
summary: A received B-MAC/I-SID route (with a non-zero I-SID) MUST NOT add or remove any B-MAC to or from the MAC-VRF; its sole function is to trigger C-MAC flush.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - routing
