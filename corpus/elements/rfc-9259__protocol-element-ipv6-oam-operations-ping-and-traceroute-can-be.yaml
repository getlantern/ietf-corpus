document: rfc-9259
kind: protocol-element
summary: IPv6 OAM operations (ping and traceroute) can be performed for any SRv6 SID whose behavior allows Upper-Layer header processing for applicable OAM payloads (e.g., ICMP, UDP). The target SID may be placed in the IPv6 destination address without an SRH or as the last segment in an SRH.
section: "2.2"
topics:
    - routing
    - ip
