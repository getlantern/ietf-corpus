document: rfc-1582
kind: normative-requirement
summary: 'The reassembly timer SHOULD be set to four times the retransmission timer value (suggested: 20 seconds with a 5-second retransmission timer). Implementations MAY make both configurable in the 1:4 ratio, but interoperability requires all routers on a subnetwork use the same values.'
section: "7.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
