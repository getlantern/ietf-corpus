document: rfc-5011
kind: security-consideration
summary: While the zone owner creates and distributes keys, it is wholly the resolver owner's decision whether to accept those keys. Resolver owners and implementers MAY choose to permit or prevent automated key status updates for specific trust points; if they prevent automated updates, they must establish manual or out-of-band mechanisms.
section: "8.1"
topics:
    - dns
    - security
