document: rfc-3630
kind: normative-requirement
summary: The origination of Traffic Engineering LSAs SHOULD be rate-limited to at most one per MinLSInterval. Implementations MAY set thresholds (e.g., bandwidth change threshold) that trigger immediate flooding while batching smaller changes.
section: "3"
rfc2119_level: SHOULD
