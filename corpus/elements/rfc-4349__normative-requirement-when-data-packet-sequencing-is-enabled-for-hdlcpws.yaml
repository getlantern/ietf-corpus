document: rfc-4349
kind: normative-requirement
summary: When data packet sequencing is enabled for HDLCPWs, the sequencing mechanisms in Section 4.6.1 of RFC 3931 MUST be used for signaling. HDLCPWs MUST request the L2TPv3 Default L2-Specific Sublayer when sequencing is enabled, and MAY request it at all times.
section: "4.2"
rfc2119_level: MUST
topics:
    - vpn
