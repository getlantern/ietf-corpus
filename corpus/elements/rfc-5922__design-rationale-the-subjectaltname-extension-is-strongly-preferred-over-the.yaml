document: rfc-5922
kind: design-rationale
summary: 'The subjectAltName extension is strongly preferred over the Subject CN field because: (1) it can hold multiple values enabling one certificate to cover multiple SIP domains, and (2) the Subject field has no fixed syntax, forcing heuristic extraction that increases misinterpretation.'
