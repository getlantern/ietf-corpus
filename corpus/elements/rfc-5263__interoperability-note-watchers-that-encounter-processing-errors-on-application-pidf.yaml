document: rfc-5263
kind: interoperability-note
summary: Watchers that encounter processing errors on 'application/pidf-diff+xml' bodies MAY fall back to normal presence operations by omitting 'application/pidf-diff+xml' from the Accept header in a new SUBSCRIBE request, reverting to full PIDF notifications.
section: "4.5"
topics:
