document: rfc-9246
kind: normative-requirement
summary: Both cdnistt and cdniets claims MUST be present for Signed Token Renewal. cdnistt MAY be set to 0 to mean no renewal, but a corresponding numeric cdniets MUST still be present in that case. If Signed Token Renewal is not desired, it is RECOMMENDED to simply omit both.
section: 3.2.1
rfc2119_level: MUST
topics:
    - jose
    - http
