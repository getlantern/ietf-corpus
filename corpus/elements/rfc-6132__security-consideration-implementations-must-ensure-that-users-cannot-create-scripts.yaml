document: rfc-6132
kind: security-consideration
summary: Implementations MUST ensure that users cannot create scripts that access the presence information of others without the proper access controls. Scripts may act on presence information that the sender of the triggering message is not allowed to see, which could enable a sender to probe the recipient's presence by observing whether auto-replies are generated.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - privacy
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
