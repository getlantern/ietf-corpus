document: rfc-4326
kind: normative-requirement
summary: For bridged frame encapsulation, the Encapsulator MUST check the LAN FCS of all received Ethernet frames before processing; frames with an invalid LAN FCS MUST be discarded. The LAN FCS is then removed and is not forwarded in the SNDU.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
