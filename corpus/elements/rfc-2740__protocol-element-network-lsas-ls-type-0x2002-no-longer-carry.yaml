document: rfc-2740
kind: protocol-element
summary: Network-LSAs (LS type 0x2002) no longer carry a Network Mask; all prefix information has moved to Intra-Area-Prefix-LSAs. The Link State ID is set to the Designated Router's Interface ID on the link. The Options field is the logical OR of Options from all Link-LSAs on the link, so a capability is asserted if any router on the link requests it.
section: 3.4.3.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
