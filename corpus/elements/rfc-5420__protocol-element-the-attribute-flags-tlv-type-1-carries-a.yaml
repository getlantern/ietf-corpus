document: rfc-5420
kind: protocol-element
summary: The Attribute Flags TLV (Type = 1) carries a variable-length array of 32-bit units of flag bits numbered from the most significant bit as bit zero. Its Length is always a multiple of four bytes and requires no padding. Unassigned bits MUST be set to zero; bits absent from a foreshortened or omitted TLV MUST be treated as present and zero.
section: "3.1"
topics:
    - mpls
    - routing
