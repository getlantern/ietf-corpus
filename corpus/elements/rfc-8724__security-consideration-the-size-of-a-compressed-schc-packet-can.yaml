document: rfc-8724
kind: security-consideration
summary: 'The size of a compressed SCHC Packet can act as a side channel: if a secret token (e.g., a one-time password or cookie) appears in a header field compressed with an MSB/LSB CDA, an observer can count the residue bits to narrow down or recover the token value.'
section: 12.1.2
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
