summary: 'Multicast Scope List option (code 9): variable-length list of scope tuples each containing Scope ID (first multicast address), Last Address, TTL, Name Count, and encoded names. Each encoded name includes a Name Flags octet, RFC 1766 Language Tag, and a UTF-8 zone name string.'
