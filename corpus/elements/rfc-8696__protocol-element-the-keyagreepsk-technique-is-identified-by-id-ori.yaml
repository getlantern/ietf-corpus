kind: protocol-element
summary: The keyAgreePSK technique is identified by id-ori-keyAgreePSK (1.2.840.113549.1.9.16.13.2). The sender establishes a pairwise KEK1 via key agreement, then runs the KDF over the PSK and KEK1 to produce KEK2, which wraps the CEK for each recipient.
