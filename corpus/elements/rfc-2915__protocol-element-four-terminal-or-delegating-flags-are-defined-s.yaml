document: rfc-2915
kind: protocol-element
summary: 'Four terminal or delegating flags are defined: ''S'' (next lookup is SRV), ''A'' (next lookup is A/AAAA/A6 address record), ''U'' (Regexp output is a URI, no further DNS lookup), and ''P'' (protocol-specific algorithm takes over). S, A, U, and P are mutually exclusive.'
