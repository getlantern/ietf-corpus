document: rfc-6777
kind: design-rationale
summary: Vendors may program cross-connections in a pipelined manner to reduce overall LSP provisioning delay, causing the data path to not be ready instantly after signaling completes. This gap between signaling completion and data path readiness motivates the metrics defined in this document.
section: "1"
topics:
