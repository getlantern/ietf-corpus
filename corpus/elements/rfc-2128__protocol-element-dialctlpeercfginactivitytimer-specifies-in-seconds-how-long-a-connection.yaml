document: rfc-2128
kind: protocol-element
summary: dialCtlPeerCfgInactivityTimer specifies in seconds how long a connection with no useful data (forwarding packets including routing info, excluding encapsulator maintenance frames) will remain before automatic disconnection. Zero means the circuit is dedicated and will not be torn down.
section: "3.1"
