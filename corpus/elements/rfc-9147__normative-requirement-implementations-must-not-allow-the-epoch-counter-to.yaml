document: rfc-9147
kind: normative-requirement
summary: Implementations MUST NOT allow the epoch counter to wrap; a new association MUST be established and the old one terminated. Implementations MUST also either abandon the association or rekey before the per-epoch sequence number wraps.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
