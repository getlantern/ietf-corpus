document: rfc-8371
kind: normative-requirement
summary: The IPv6 address used as a mobile node identifier MUST be a unicast routable IPv6 address. Multicast addresses, link-local addresses, and the unspecified IPv6 address MUST NOT be used.
section: "4.1"
rfc2119_level: MUST
topics:
