document: rfc-7726
kind: design-rationale
summary: The ambiguity in RFC 5884 regarding multiple concurrent BFD sessions arose partly from Section 7 of RFC 5884 forbidding either end from changing local discriminator values after a session reaches UP state, which created unclear interaction with bootstrapping additional sessions.
