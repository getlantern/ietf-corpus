document: rfc-8781
kind: normative-requirement
summary: The host SHOULD treat the PREF64 as specific to the network interface on which it was received. PvD-aware hosts MUST treat the PREF64 as scoped to the implicit or explicit Provisioning Domain (PvD).
section: "5.1"
rfc2119_level: MUST
topics:
