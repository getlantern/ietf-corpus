document: rfc-9113
kind: normative-requirement
summary: For 'https' URIs, HTTP/2 MUST use TLS with the ALPN extension and the 'h2' protocol identifier (0x68, 0x32). The 'h2c' protocol identifier MUST NOT be sent by a client or selected by a server. The h2c upgrade token and HTTP2-Settings header field are deprecated.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
