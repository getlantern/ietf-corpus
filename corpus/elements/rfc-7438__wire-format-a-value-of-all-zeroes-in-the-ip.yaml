document: rfc-7438
kind: wire-format
summary: A value of all zeroes in the IP source address subfield represents a wildcard source address; a value of all zeroes in the IP group address subfield represents a wildcard group address. The lengths of these subfields are unchanged from their definitions in RFC 6826 and RFC 7246.
section: "3.1"
topics:
    - mpls
    - multicast
