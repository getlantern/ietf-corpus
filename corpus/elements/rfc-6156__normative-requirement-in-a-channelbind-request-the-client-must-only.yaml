document: rfc-6156
kind: normative-requirement
summary: In a ChannelBind request, the client MUST only include an XOR-PEER-ADDRESS attribute with an address of the same address family as the allocation's relayed transport address; if mismatched, the server MUST return a 443 error.
section: "7.1"
rfc2119_level: MUST
topics:
    - nat
    - ip
