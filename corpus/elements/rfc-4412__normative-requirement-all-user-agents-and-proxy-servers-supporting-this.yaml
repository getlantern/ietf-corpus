document: rfc-4412
kind: normative-requirement
summary: All user agents and proxy servers supporting this extension MUST implement SIP over TLS (RFC 3546), the 'sips' URI scheme, and Digest Authentication (RFC 2617). UAs SHOULD also implement S/MIME (RFC 3851) to allow signing and verification of requests.
section: "11.1"
rfc2119_level: MUST
topics:
