document: rfc-8638
kind: protocol-element
summary: The Address Family Border Router (AFBR) interconnects networks using different IP address families. In softwire mesh multicast, AFBRs run both E-IP and I-IP control planes, maintain E-IP and I-IP multicast states, and perform encapsulation/decapsulation of E-IP multicast packets for transport across the I-IP core.
