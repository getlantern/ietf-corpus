document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelHopTable sparsely extends the mplsTunnelHopTable to provide explicit forward and reverse label specifications for each hop of a signaled GMPLS tunnel. It does not add new hops, only augments existing hop entries with GMPLS-specific label information via gmplsTunnelHopExplicitForwardLabel/Ptr and gmplsTunnelHopExplicitReverseLabel/Ptr.
section: "5.2"
topics:
