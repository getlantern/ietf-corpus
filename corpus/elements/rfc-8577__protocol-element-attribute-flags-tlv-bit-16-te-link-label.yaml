document: rfc-8577
kind: protocol-element
summary: Attribute Flags TLV Bit 16 (TE Link Label) in LSP_ATTRIBUTES or LSP_REQUIRED_ATTRIBUTES of a Path message requests or mandates use and recording of TE link labels at all hops. Bit 17 (LSI-D) requests automatic or signals explicit delegation. Bit 18 (LSI-D-S2E) selects the 'Stack to reach egress' stacking approach.
section: "9.2"
topics:
    - mpls
    - routing
