document: rfc-7310
kind: security-consideration
summary: A potential denial-of-service threat exists for codecs with non-uniform receiver-end computational load, where an attacker injects pathological datagrams to overload the decoder. Standard apt-X and Enhanced apt-X do not exhibit significant non-uniformity, mitigating this risk.
