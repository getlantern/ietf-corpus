document: rfc-1065
kind: security-consideration
summary: RFC 1065 contains no dedicated security considerations section, which was common for 1988 standards. Security for access to managed objects and authentication of management operations is deferred entirely to the companion protocol specification (SNMP, RFC 1067), not addressed by the SMI itself.
section: "2"
topics:
