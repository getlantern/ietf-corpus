document: rfc-8011
kind: wire-format
summary: The 'charset' syntax is a case-insensitive string of up to 40 octets identifying an IANA-registered charset (e.g., 'utf-8', 'us-ascii'). The 'uri' syntax carries a URI of up to 1023 octets. The 'mimeMediaType' syntax is a MIME media type string of up to 255 octets (e.g., 'application/postscript', 'application/octet-stream').
section: 5.1.8
extracted_by: claude-sonnet-4-6
