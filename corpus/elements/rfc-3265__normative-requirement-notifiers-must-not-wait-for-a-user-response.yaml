document: rfc-3265
kind: normative-requirement
summary: Notifiers MUST NOT wait for a user response before returning a final response to a SUBSCRIBE request; the transaction must complete in the time necessary for automated processing only, to prevent timer F from firing.
section: 3.1.6.1
rfc2119_level: MUST NOT
topics:
