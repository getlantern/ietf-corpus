document: rfc-8590
kind: normative-requirement
summary: If the 'delete' operation results in an immediate purge of the object, then the 'op' attribute MUST be set to 'purge'. The same requirement applies to the 'autoDelete' operation.
section: "2.1"
rfc2119_level: MUST
