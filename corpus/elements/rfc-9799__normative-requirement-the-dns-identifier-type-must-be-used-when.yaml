document: rfc-9799
kind: normative-requirement
summary: The 'dns' identifier type MUST be used when requesting a certificate for a '.onion' Special-Use Domain Name. The identifier value MUST be the textual representation as defined in the Tor spec, and MAY include subdomain labels. Version 2 addresses MUST NOT be used as they are considered insecure.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
