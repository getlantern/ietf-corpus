document: rfc-9167
kind: design-rationale
summary: DNS namespace expansion has led to many additional registries that registrars must interact with, each communicating maintenance events in non-standardized formats. This extension provides a single EPP-based mechanism to notify registrars of upcoming maintenance events across all registries.
section: "1"
topics:
    - dns
    - registry
