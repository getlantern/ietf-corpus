document: rfc-7199
kind: protocol-element
summary: A policy URI is an HTTP or HTTPS URI that identifies a policy resource containing the authorization policy for a linked location resource. It allows a Rule Maker (target host) to inspect and install policy documents that tell a Location Server how to protect the associated location resource.
section: "3"
topics:
    - privacy
    - security
    - realtime
