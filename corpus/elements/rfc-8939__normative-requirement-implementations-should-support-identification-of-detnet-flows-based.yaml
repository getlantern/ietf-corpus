document: rfc-8939
kind: normative-requirement
summary: Implementations SHOULD support identification of DetNet flows based on the IPv6 Flow Label field. Implementations that support this field MUST allow it to be ignored, and MAY exclude the IPv6 Next Header field when the Flow Label is used for flow identification.
section: 5.1.1.5
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
