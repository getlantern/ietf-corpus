document: rfc-7488
kind: protocol-element
summary: Once a PCP client successfully receives a response from a PCP server IP address, all subsequent requests to that server are sent to that same IP address until it becomes unresponsive, at which point the sorted address cache is cleared and the selection procedure restarts.
