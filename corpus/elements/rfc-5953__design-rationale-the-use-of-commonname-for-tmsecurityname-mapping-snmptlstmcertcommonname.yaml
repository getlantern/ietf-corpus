document: rfc-5953
kind: design-rationale
summary: The use of CommonName for tmSecurityName mapping (snmpTlstmCertCommonName) is deprecated in favor of subjectAltName mappings. This follows RFC 5280's preference for subjectAltName and avoids ambiguity inherent in CommonName fields.
