document: rfc-4352
kind: protocol-element
summary: AMR-WB+-specific redundancy coding aggregates previously transmitted transport frames together with new ones using a sliding window, allowing a sender to retransmit frames in subsequent packets without session-setup signaling. The receiver identifies duplicates via RTP timestamp matching.
section: 3.6.1
topics:
