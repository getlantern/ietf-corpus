document: rfc-7909
kind: security-consideration
summary: 'This digital signature mechanism does not preclude monkey-in-the-middle attacks: an adversary can intercept RPSL object transfers, delete the signature attribute, modify contents, or drop objects destined for the requester. Channel security must be provided separately.'
