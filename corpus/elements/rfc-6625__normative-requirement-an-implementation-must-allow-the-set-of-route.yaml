document: rfc-6625
kind: normative-requirement
summary: An implementation MUST allow the set of Route Targets carried by a (C-*,C-*) S-PMSI A-D route to be specified by configuration. In the absence of a configured set, the route MUST carry the default set (same as VPN-IP unicast routes from that VRF).
section: "4.4"
rfc2119_level: MUST
topics:
    - multicast
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
