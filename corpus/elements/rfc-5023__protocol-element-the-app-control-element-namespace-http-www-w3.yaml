document: rfc-5023
kind: protocol-element
summary: The app:control element (namespace http://www.w3.org/2007/app) is a structured extension that MAY appear as a child of atom:entry to carry publishing control metadata. It MUST appear at most once per Entry and contains an optional app:draft child element with value 'yes' or 'no'.
section: "13.1"
topics:
