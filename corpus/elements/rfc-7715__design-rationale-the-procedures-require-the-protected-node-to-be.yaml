document: rfc-7715
kind: design-rationale
summary: The procedures require the protected node to be directly connected to both PLR and MPT nodes because mLDP depends on unicast routing for upstream LSR determination, which by default only provides next-hop information. Support for non-directly-connected PLR and MPT nodes is explicitly out of scope.
