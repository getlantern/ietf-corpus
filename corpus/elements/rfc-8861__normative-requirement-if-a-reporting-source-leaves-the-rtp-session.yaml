document: rfc-8861
kind: normative-requirement
summary: If a reporting source leaves the RTP session (via RTCP BYE or timeout), the remaining group members MUST either have another existing reporting source take over, choose a new reporting source, or disband the Reporting Group and resume per-RFC-3550 reporting.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
