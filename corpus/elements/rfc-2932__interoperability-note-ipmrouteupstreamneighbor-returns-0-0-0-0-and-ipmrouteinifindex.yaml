document: rfc-2932
kind: interoperability-note
summary: ipMRouteUpstreamNeighbor returns 0.0.0.0 and ipMRouteInIfIndex returns 0 when the upstream neighbor is unknown or when datagrams are not subject to an incoming-interface check (e.g., in CBT), allowing the MIB to represent protocol semantics that lack a single upstream neighbor or incoming interface.
section: "4"
topics:
    - multicast
    - snmp
