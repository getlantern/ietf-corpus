document: rfc-3834
kind: normative-requirement
summary: Personal and Group responses intended to notify the sender of a recipient's temporary absence SHOULD NOT issue the same response to the same sender more than once within a period of several days; a 7-day period is RECOMMENDED as a default.
section: "2"
rfc2119_level: SHOULD NOT
