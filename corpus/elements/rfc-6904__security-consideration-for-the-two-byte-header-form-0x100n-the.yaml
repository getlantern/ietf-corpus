document: rfc-6904
kind: security-consideration
summary: For the two-byte-header form (0x100N), the mechanism provides no protection for zero-length extension elements (whose presence or absence is the sole information) nor for the four appbits of the 'defined by profile' field. These limitations do not apply to one-byte-header form (0xBEDE).
