document: rfc-8344
kind: state-machine
summary: 'IPv6 neighbor state defines five Neighbor Unreachability Detection (NUD) states per RFC 4861 Section 7.3.2: ''incomplete'' (address resolution in progress), ''reachable'' (recently confirmed reachable), ''stale'' (reachability unknown, no probe yet), ''delay'' (traffic sent, waiting for upper-layer confirmation before probing), and ''probe'' (unicast Neighbor Solicitation probes being sent).'
section: "4"
