document: rfc-3810
kind: protocol-element
summary: 'MLDv2 extends MLDv1 by adding source filtering: nodes can express interest in a multicast address only from specific sources (INCLUDE mode) or from all sources except specific ones (EXCLUDE mode). This enables Source-Specific Multicast (SSM) as required by RFC 3569.'
section: "1"
topics:
    - multicast
    - ip
