document: rfc-3145
kind: protocol-element
summary: Global error Disconnect Codes (0–4) do not relate to a specific PPP Control Protocol; the Control Protocol Number for these errors MUST be set to 0. These cover administrative disconnect, LCP renegotiation disabled, normal LCP termination, and compulsory encryption refusal.
section: "3.1"
