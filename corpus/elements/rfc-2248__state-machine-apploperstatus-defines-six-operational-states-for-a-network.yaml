document: rfc-2248
kind: state-machine
summary: 'applOperStatus defines six operational states for a network service application: up, down, halted, congested, restarting, and quiescing. Transitions are not explicitly specified, but ''quiescing'' is the graceful shutdown state leading toward ''down'', and ''restarting'' is a transient unavailable state leading toward ''up''.'
section: "6"
