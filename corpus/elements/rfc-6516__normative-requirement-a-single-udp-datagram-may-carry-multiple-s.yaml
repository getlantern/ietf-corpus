document: rfc-6516
kind: normative-requirement
summary: A single UDP datagram MAY carry multiple S-PMSI Join messages. If multiple S-PMSI Joins are present in one datagram, they MUST all be of the same S-PMSI Join type.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
    - vpn
    - udp
