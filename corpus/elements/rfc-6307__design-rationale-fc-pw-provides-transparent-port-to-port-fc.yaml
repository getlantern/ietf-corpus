document: rfc-6307
kind: design-rationale
summary: FC PW provides transparent port-to-port FC link emulation unlike FCIP, which introduces B_Ports at each end. This transparency means the FC fabric and network operator see an apparent direct FC link, enabling simpler FC control processing and eliminating the special timing mechanisms FCIP requires for TCP interaction.
section: "1.1"
topics:
