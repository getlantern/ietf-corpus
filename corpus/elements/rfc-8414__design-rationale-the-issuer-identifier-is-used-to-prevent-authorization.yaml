document: rfc-8414
kind: design-rationale
summary: The issuer identifier is used to prevent authorization server mix-up attacks. By requiring that the 'issuer' value in the metadata response exactly match the URL used to retrieve it, clients can verify they are talking to the intended authorization server and not a confused or malicious substitute.
section: "2"
topics:
    - oauth
    - security
