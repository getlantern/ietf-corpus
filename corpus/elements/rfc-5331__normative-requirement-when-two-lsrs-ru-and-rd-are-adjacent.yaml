document: rfc-5331
kind: normative-requirement
summary: When two LSRs Ru and Rd are adjacent on an LSP for FEC F, either Ru distributes an upstream-assigned label binding for F to Rd, or Rd distributes a downstream-assigned label binding to Ru, but NOT both. Any application requiring upstream-assigned labels MUST specify that explicitly.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
