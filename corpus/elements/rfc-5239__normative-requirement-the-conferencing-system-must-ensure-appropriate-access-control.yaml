document: rfc-5239
kind: normative-requirement
summary: The conferencing system MUST ensure appropriate access control around any internal data structure that maintains the persistent mapping between conference user identifiers and signaling-specific user identifiers; this information is typically available only to a conferencing system administrator.
section: "6.3"
rfc2119_level: MUST
