document: rfc-7177
kind: protocol-element
summary: 'Each adjacency table entry (for adjacencies in Detect, 2-Way, or Report state) records: neighbor MAC/SNPA address, Port ID, and System ID; one Hello holding timer for P2P or two (Designated VLAN and non-Designated VLAN, each a 16-bit unsigned integer of seconds) for LAN; 7-bit DRB priority (LAN only); 5 bytes of PORT-TRILL-VER sub-TLV data; Desired Designated VLAN; and (if BFD is supported) a flag indicating whether the last received Hello included a BFD-Enabled TLV.'
section: "3.2"
topics:
    - routing
