kind: state-machine
summary: A mobile node transitions between 'at home' (no mobility services, deregister on return), 'away from home via foreign agent' (register foreign agent care-of address through FA), and 'away from home co-located' (register directly with home agent). Move detection triggers re-registration; loss of agent advertisement Lifetime or prefix change are the two primary triggers.
