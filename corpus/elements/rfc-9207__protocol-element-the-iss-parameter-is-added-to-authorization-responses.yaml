document: rfc-9207
kind: protocol-element
summary: The `iss` parameter is added to authorization responses (including error responses). Its value is the issuer identifier of the authorization server that created the response, as defined in RFC 8414. It MUST be a URL using the "https" scheme without any query or fragment components.
section: "2"
topics:
    - oauth
    - security
