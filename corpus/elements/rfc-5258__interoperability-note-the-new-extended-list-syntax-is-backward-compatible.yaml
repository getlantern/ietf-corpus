document: rfc-5258
kind: interoperability-note
summary: 'The new extended LIST syntax is backward compatible with the original LIST command. The extended syntax is in use only when: (1) the first word after the command begins with ''(''; (2) the second word after the command begins with ''(''; or (3) the LIST command has more than 2 parameters.'
