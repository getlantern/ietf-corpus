document: rfc-5553
kind: normative-requirement
summary: If an LSR receives a Path message where the first subobject of the ERO is a PKS, it MUST respond with a PathErr message carrying error code/value 'Routing Problem' / 'Bad initial subobject'. A PKS must always be preceded by a subobject identifying the head end of the CPS.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
