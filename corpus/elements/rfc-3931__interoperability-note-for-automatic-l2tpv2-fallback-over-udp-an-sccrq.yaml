document: rfc-3931
kind: interoperability-note
summary: For automatic L2TPv2 fallback over UDP, an SCCRQ may be sent with Ver=2 and L2TPv3-specific AVPs having M bit=0, so that an L2TPv2-only peer ignores the new AVPs. An L2TPv3-only implementation MUST ignore all L2TPv2 AVPs in such an SCCRQ even if the M bit is set.
section: 4.7.3
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
