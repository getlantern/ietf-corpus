document: rfc-9486
kind: design-rationale
summary: RFC 8200 prohibits direct insertion of extension headers into in-flight packets by transit nodes, which is why IOAM deployment on transit nodes requires adding an outer IPv6 header. This constraint shapes the two bounded-domain deployment models (host-bounded vs. network-device-bounded).
section: "4.1"
topics:
