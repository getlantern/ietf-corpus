document: rfc-4873
kind: protocol-element
summary: A segment recovery LSP is an independent LSP whose Sender_Template uses the branch node's IP address and whose Session object uses the merge node's IP address as the tunnel endpoint. The branch node (equivalent to RFC 4090's PLR) initiates the recovery LSP; the merge node terminates it.
section: "2"
topics:
