document: rfc-5365
kind: normative-requirement
summary: A MESSAGE URI-list service MUST NOT copy any security body (e.g., S/MIME encrypted body) addressed to the MESSAGE URI-list service to the outgoing MESSAGE request, as such bodies are intended to be read by the URI-list service itself.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
    - security
