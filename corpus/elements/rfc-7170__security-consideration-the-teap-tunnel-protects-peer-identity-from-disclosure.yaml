document: rfc-7170
kind: security-consideration
summary: The TEAP tunnel protects peer identity from disclosure during Phase 2. Implementations wishing to provide identity privacy must carefully consider what is disclosed outside the tunnel prior to Phase 2, and SHOULD support TLS renegotiation to shield the peer's identity when TLS client authentication is used.
section: 7.4.1
topics:
    - security
    - privacy
    - tls
