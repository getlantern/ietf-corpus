document: rfc-3498
kind: normative-requirement
summary: A row in apsChanConfigTable MAY NOT be created, deleted, set to notInService, or otherwise modified if the associated APS group (matching apsConfigName) has apsConfigRowStatus equal to active. Modifications are permitted when the group status is notInService.
section: "4"
rfc2119_level: MUST NOT
