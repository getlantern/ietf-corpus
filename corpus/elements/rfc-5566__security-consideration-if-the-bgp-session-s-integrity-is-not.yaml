document: rfc-5566
kind: security-consideration
summary: If the BGP session's integrity is not protected, an imposter could mount a DoS attack by establishing numerous BGP sessions and forcing IPsec SA creation for each. However, since such an imposter would also threaten the entire routing system, this attack is not considered uniquely critical to the IPsec tunnel mechanism.
section: "5"
topics:
    - bgp
    - ipsec
    - security
