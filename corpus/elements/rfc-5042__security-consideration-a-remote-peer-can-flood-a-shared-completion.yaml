document: rfc-5042
kind: security-consideration
summary: A Remote Peer can flood a shared Completion Queue with minimum-length DDP/RDMAP messages, causing CQ overflow or starvation for other Streams. A Privileged Resource Manager must control CQ entry allocation and the CQ must be sized relative to all queues it serves.
section: 6.4.3.2
topics:
    - security
