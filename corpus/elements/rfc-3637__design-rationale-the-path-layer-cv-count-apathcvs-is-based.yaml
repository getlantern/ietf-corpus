document: rfc-3637
kind: design-rationale
summary: 'The path-layer CV count (aPathCVs) is based on block errors rather than BIP-8 errors as in SONET-MIB: it is incremented once per B3 byte with incorrect parity. ANSI T1.231 permits either convention, so this difference is tolerated.'
