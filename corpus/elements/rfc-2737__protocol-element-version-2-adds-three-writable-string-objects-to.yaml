summary: 'Version 2 adds three writable string objects to entPhysicalTable: entPhysicalSerialNum (max 32 octets, vendor serial number), entPhysicalAlias (max 32 octets, NMS-assigned non-volatile handle), and entPhysicalAssetID (max 32 octets, asset tracking identifier). All must be retained across agent reboots once written.'
