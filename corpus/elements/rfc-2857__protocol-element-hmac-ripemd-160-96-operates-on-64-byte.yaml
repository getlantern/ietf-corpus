document: rfc-2857
kind: protocol-element
summary: HMAC-RIPEMD-160-96 operates on 64-byte blocks of data. It produces a 160-bit authenticator value which is truncated to 96 bits for use in ESP or AH. The truncated value is stored in the authenticator field; upon receipt the full 160-bit value is computed and the first 96 bits are compared.
section: "2"
topics:
    - ipsec
    - crypto
