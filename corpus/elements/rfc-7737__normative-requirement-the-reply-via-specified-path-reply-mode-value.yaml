document: rfc-7737
kind: normative-requirement
summary: The 'Reply via Specified Path' Reply Mode (value=5) MAY be used without including a Reply Path TLV. This usage implies the reverse LSP as the return path, equivalent to including a Reply Path TLV with the B bit set.
section: "3.1"
rfc2119_level: MAY
topics:
