document: rfc-9562
kind: wire-format
summary: 'UUIDv8 layout: custom_a (48-bit, bits 0-47), ver=0b1000 (4-bit, bits 48-51), custom_b (12-bit, bits 52-63), var=0b10 (2-bit, bits 64-65), custom_c (62-bit, bits 66-127). The 122 non-ver/var bits are fully implementation-defined; UUIDv8 uniqueness MUST NOT be assumed.'
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
