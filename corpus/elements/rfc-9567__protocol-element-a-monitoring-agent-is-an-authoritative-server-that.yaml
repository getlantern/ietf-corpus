document: rfc-9567
kind: protocol-element
summary: A monitoring agent is an authoritative server that receives and responds to report queries; it is identified by the agent domain returned in the EDNS0 Report-Channel option. Responses from the monitoring agent can be cached by the reporting resolver to dampen repeated queries for the same problem.
section: "3"
topics:
    - dns
