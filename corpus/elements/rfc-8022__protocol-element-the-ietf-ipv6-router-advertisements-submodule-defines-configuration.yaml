document: rfc-8022
kind: protocol-element
summary: The 'ietf-ipv6-router-advertisements' submodule defines configuration and state for IPv6 Router Advertisement parameters including send-advertisements, max/min-rtr-adv-interval (4–1800s / 3–1350s), managed-flag, other-config-flag, link-mtu, reachable-time (0–3600000ms), retrans-timer, cur-hop-limit, default-lifetime (0–9000s), and a prefix-list with valid-lifetime, on-link-flag, preferred-lifetime, and autonomous-flag per prefix.
section: "9.1"
topics:
