document: rfc-1812
kind: security-consideration
summary: Routers MUST provide access control mechanisms to prevent unauthorized access to management functions. Routers SHOULD maintain audit trails of management operations, configuration changes, and security-relevant events. Out-of-band management access SHOULD be provided.
section: "10.4"
topics:
    - security
