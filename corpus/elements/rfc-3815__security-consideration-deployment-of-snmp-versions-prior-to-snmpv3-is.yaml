document: rfc-3815
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is not recommended for managing LDP MIB objects. SNMPv1 and SNMPv2c are community-string-based and not considered secure, exposing LDP configuration to unauthorized read or modification.
section: "7.5"
topics:
    - mpls
    - snmp
    - security
