document: rfc-1933
kind: protocol-element
summary: IPv6/IPv4 nodes performing automatic tunneling may acquire IPv4-compatible IPv6 addresses by obtaining an IPv4 address via DHCP, BOOTP, RARP, or manual configuration, then prepending the 96-bit all-zeros prefix to construct the IPv4-compatible IPv6 address.
section: "3.1"
