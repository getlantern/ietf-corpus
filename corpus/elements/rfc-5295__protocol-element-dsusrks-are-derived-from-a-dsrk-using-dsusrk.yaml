document: rfc-5295
kind: protocol-element
summary: 'DSUSRKs are derived from a DSRK using: DSUSRK = KDF(DSRK, key label | "\0" | optional data | length). The key hierarchy is EMSK → DSRK → DSUSRK, where DSUSRKs are scoped to the same key management domain as the parent DSRK.'
