document: rfc-6794
kind: normative-requirement
summary: A UAC compliant to this specification MUST include a Supported header field with the option tag 'policy' in all requests that can initiate an offer/answer exchange (e.g., INVITE, UPDATE, PRACK), even if that particular request does not contain an offer or answer.
section: 4.4.1
rfc2119_level: MUST
topics:
    - sip
