document: rfc-5018
kind: normative-requirement
summary: When an existing TCP connection is closed following RFC 4582 rules, the client SHOULD reestablish the connection towards the floor control server. If a TCP connection times out, the client SHOULD reestablish the TCP connection.
section: "3"
rfc2119_level: SHOULD
topics:
    - tcp
    - realtime
