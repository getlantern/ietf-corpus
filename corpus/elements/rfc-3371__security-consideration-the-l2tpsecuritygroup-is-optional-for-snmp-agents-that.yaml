document: rfc-3371
kind: security-consideration
summary: The l2tpSecurityGroup is optional for SNMP agents that support both authentication and privacy of SNMP messages for management of L2TP keys. SNMPv3 with auth+priv is the intended mechanism for securing access to sensitive L2TP keying material.
section: "3.0"
topics:
    - snmp
    - vpn
    - security
    - crypto
