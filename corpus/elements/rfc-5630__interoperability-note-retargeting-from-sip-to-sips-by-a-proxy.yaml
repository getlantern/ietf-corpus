document: rfc-5630
kind: interoperability-note
summary: Retargeting from SIP to SIPS by a proxy is problematic because it creates a misleading impression that the entire path was secure when it was not; retargeting from SIPS to SIP constitutes a forbidden downgrade. Both cases can be detected by inspecting the History-Info header field.
section: "3.2"
topics:
    - sip
    - security
