document: rfc-6080
kind: design-rationale
summary: The framework recommends that the device profile, rather than the local-network or user profile, carry bootstrapping identities and credentials because the local-network profile may not always be available and users may not be configured at initial device setup, making both alternatives unreliable for first-time bootstrapping.
section: 5.3.3
topics:
    - sip
