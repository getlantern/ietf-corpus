document: rfc-9182
kind: protocol-element
summary: The 'connection' container defines Layer 2 connectivity including 'encapsulation' (dot1q with cvlan-id, QinQ with svlan-id/cvlan-id, priority-tagged), 'l2-tunnel-service' (pseudowire with vcid, VPLS, VXLAN with vni-id and peer-mode), 'bearer-reference' for L3SM correlation, and optional LAG interface ('lag-interface-id' with member links).
