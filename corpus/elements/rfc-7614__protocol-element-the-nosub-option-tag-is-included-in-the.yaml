document: rfc-7614
kind: protocol-element
summary: The 'nosub' option tag is included in the Require header field of a REFER request to suppress implicit subscription creation and signal that no explicit subscription will be forthcoming, allowing the recipient to avoid maintaining refer event subscription state.
section: "5.1"
