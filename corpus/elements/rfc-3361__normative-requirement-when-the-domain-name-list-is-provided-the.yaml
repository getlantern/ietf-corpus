document: rfc-3361
kind: normative-requirement
summary: When the domain name list is provided, the client MUST try the domain names in the order listed, applying the RFC 3263 Section 4.1 mechanism for each, and only resolves subsequent names if the first fails, yields no common transport protocols, or is administratively prohibited.
section: "3.1"
rfc2119_level: MUST
topics:
    - sip
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
