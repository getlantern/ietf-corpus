document: rfc-3887
kind: normative-requirement
summary: If a TLS session is already in progress, STARTTLS is a protocol error and -BAD MUST be returned with '/tls-in-progress'. If the supplied FQDN mismatches the server certificate's dNSName, -BAD MUST be returned with '/bad-fqdn'.
section: "6"
rfc2119_level: MUST
topics:
    - email
    - tls
