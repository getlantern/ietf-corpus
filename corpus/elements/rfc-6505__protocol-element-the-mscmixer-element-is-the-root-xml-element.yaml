summary: The <mscmixer> element is the root XML element for all package messages, carrying a mandatory 'version' attribute (fixed at "1.0") and an optional 'desclang' attribute for the language of descriptive text in subordinate elements. Exactly one child element (request, response, or notification) may appear.
