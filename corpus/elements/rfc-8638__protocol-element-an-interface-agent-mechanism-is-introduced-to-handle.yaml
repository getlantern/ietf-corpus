document: rfc-8638
kind: protocol-element
summary: An 'interface agent' mechanism is introduced to handle encapsulated (S,G,rpt) messages at upstream AFBRs. The interface agent maintains per-downstream-AFBR (S,G,rpt) state machines and submits Prune(S,G,rpt) to PIM-SM only when all downstream AFBRs are in the Prune (P) or PruneTmp (P') state, preventing missed multicast data.
section: "6.4"
topics:
    - multicast
    - ip
