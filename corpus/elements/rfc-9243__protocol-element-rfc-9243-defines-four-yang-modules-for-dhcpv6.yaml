document: rfc-9243
kind: protocol-element
summary: 'RFC 9243 defines four YANG modules for DHCPv6 management: ietf-dhcpv6-common (shared typedefs and groupings), ietf-dhcpv6-server, ietf-dhcpv6-relay, and ietf-dhcpv6-client. All modules adopt NMDA (RFC 8342) and are intended for use via NETCONF (RFC 6241) or RESTCONF (RFC 8040).'
section: "1"
