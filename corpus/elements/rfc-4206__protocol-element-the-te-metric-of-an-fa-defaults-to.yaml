document: rfc-4206
kind: protocol-element
summary: The TE metric of an FA defaults to max(1, (TE metric of the FA-LSP path) - 1), so the FA attracts traffic in preference to setting up a new LSP. This may be overridden by configuration at the head-end.
section: 3.1.5
topics:
