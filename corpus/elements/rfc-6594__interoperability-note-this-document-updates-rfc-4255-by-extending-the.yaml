document: rfc-6594
kind: interoperability-note
summary: This document updates RFC 4255 by extending the IANA registries to include ECDSA (algorithm 3) and SHA-256 (fingerprint type 2). Implementations must remain compatible with the existing RSA (1), DSA (2), and SHA-1 (1) values defined in RFC 4255.
