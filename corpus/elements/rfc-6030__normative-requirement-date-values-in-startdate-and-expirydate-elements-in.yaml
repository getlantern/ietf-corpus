document: rfc-6030
kind: normative-requirement
summary: Date values in <StartDate> and <ExpiryDate> elements (in both <DeviceInfo> and <Policy>) MUST be expressed as xs:dateTime in canonical representation; implementations SHOULD NOT rely on time resolution finer than milliseconds and MUST NOT generate time instants specifying leap seconds.
section: 4.3.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
