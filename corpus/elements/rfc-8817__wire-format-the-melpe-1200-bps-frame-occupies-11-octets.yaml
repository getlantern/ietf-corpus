document: rfc-8817
kind: wire-format
summary: The MELPe 1200 bps frame occupies 11 octets (81 speech bits plus three rate code bits CODA=1, CODB=0, CODC=0 and four RSV0 bits set to zero in the final octet). CODA, CODB, CODC, and RSV0 MUST be filled with 1, 0, 0, and 0 respectively.
