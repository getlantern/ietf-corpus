document: rfc-7470
kind: design-rationale
summary: The existing PCEP METRIC Object had no facility for vendor-specific metrics, and no PCEP mechanism existed for carrying complex vendor-specific information. The Vendor Information object and TLV were introduced to fill this gap while encouraging vendors to eventually bring widely-adopted extensions to the IETF for standardization.
section: "1"
topics:
