document: rfc-3986
kind: security-consideration
summary: Maliciously constructed URIs may use percent-encoding, non-canonical host representations, or misleading userinfo to disguise the intended target. Applications should flag URIs that violate scheme-specific restrictions rather than silently ignoring unused parts.
section: "7.2"
