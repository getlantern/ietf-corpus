document: rfc-3986
kind: security-consideration
summary: Maliciously constructed URIs may use percent-encoding, non-standard IP address formats, or unusual syntax to confuse back-end processing or bypass access controls. When a scheme-specific resolution process encounters a URI violating scheme restrictions, it should flag an error rather than silently ignore unused components.
section: "7.2"
topics:
    - security
