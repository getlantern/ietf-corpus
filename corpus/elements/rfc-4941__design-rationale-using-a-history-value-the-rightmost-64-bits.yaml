document: rfc-4941
kind: design-rationale
summary: Using a history value (the rightmost 64 bits of a previous MD5 computation) rather than purely random generation avoids the scenario where two nodes with a flawed RNG generate the same randomized identifier repeatedly; the globally unique IEEE identifier in the input ensures divergent sequences after a collision.
section: 3.2.1
topics:
