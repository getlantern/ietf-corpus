document: rfc-2470
kind: wire-format
summary: The Routing Information Field (RIF), when present (indicated by the most significant bit of the source address being set to 1), begins with a 2-octet Routing Control header containing Bcast (3 bits), Length (5 bits), D (1 bit), LF (4 bits), and rsvd (3 bits), followed by zero to seven 2-octet Route Designator fields each containing a 12-bit segment number and 4-bit bridge number.
