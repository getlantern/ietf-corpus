document: rfc-6767
kind: protocol-element
summary: 'Performance monitoring tables provide current and historical interval data at two granularities: g9982PortPmCurTable (current 15-min and 1-day intervals), g9982PortPm15MinTable (up to 96 historical 15-minute intervals), and g9982PortPm1DayTable (up to 7 historical 1-day intervals). All PM counters are inhibited during Unavailable Seconds (UAS).'
section: "6"
