document: rfc-2349
kind: security-consideration
summary: The basic TFTP protocol has no security mechanism, which is why it lacks rename, delete, or file overwrite capabilities. This document does not add any security to TFTP, but the specified extensions also do not introduce any additional security risks.
section: Security Considerations
topics:
