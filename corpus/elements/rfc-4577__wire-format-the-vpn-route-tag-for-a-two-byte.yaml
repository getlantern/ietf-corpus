document: rfc-4577
kind: wire-format
summary: The VPN Route Tag for a two-byte AS is a 32-bit field with bits 31-30 set to 1 (Automatic=1, Complete=1), bit 29 clear (PathLength=01), an arbitrary 13-bit tag, and the 16-bit Autonomous System number in the low-order bytes. For four-byte AS numbers, the value MUST be manually configured.
section: 4.2.5.2
topics:
    - routing
    - mpls
