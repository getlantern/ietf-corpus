document: rfc-7271
kind: normative-requirement
summary: Defect local inputs (SF-P, SF-W, SD-P, SD-W) SHALL be accepted and retained persistently in the Local Request Logic as long as the defect exists; they cannot be removed by higher-priority inputs but remain and become the highest request again once the higher-priority input clears. Commands LO, FS, MS, and EXER SHALL be rejected if any higher-priority local input exists.
section: "10.3"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
