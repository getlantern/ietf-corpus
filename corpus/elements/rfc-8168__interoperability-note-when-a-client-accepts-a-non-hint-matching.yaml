document: rfc-8168
kind: interoperability-note
summary: When a client accepts a non-hint-matching prefix from an Advertise and continues to request its preferred prefix length in Renew/Rebind, it is operating within spec. The server's willingness to honor the hint versus preserving address stability is an explicit matter of server policy per Section 3.6.
section: "3.6"
topics:
    - ip
    - v6ops
