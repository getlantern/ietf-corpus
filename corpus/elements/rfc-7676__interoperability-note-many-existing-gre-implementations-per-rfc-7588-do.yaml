document: rfc-7676
kind: interoperability-note
summary: Many existing GRE implementations (per RFC 7588) do not support the tunnel capability verification procedures required by this specification. Such implementations must be configured to allow fragmentation and reassembly of GRE delivery packets unless the GMTU is guaranteed to exceed 1280 octets.
section: "3.2"
topics:
