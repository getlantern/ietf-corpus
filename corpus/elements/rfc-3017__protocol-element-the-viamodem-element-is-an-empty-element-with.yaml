document: rfc-3017
kind: protocol-element
summary: 'The viaMODEM element is an empty element with an optional ''type'' attribute specifying modem protocol: V21 (300 bps), V22 (1200), V29 (9600 half-duplex), V32 (9600), V32B (14.4k), V34 (28.8k), V34B (33.6k), or V90 (56k). Multiple instances may appear to advertise multiple protocols.'
section: 6.1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
