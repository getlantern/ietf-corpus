document: rfc-9674
kind: security-consideration
summary: Cross-origin requests in RRDP are detrimental because they allow one repository operator to increase resource consumption for other repository operators and RRDP clients. An adversary could also employ cross-origin HTTP Redirects towards other Repository Servers to cause similar undesirable behavior.
section: "5"
topics:
    - security
    - routing
