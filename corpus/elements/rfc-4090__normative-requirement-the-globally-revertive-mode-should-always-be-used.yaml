document: rfc-4090
kind: normative-requirement
summary: The globally revertive mode SHOULD always be used. When local revertive mode is not used, head-end LSRs SHOULD react to RSVP error messages and/or IGP indications in order to make a timely response to failures.
section: 6.5.2
rfc2119_level: SHOULD
