summary: The compliance statement (rdbmsCompliance) requires implementation of HOST-RESOURCES-MIB hrSystem group, APPLICATION-MIB applGroup, and RDBMS-MIB rdbmsGroup. No write access to any object is required for compliance; eleven objects are listed with MIN-ACCESS read-only.
