document: rfc-3382
kind: wire-format
summary: 'Three encoding tags are defined for the ''collection'' attribute syntax: begCollection (0x34) marks the beginning of a collection value; endCollection (0x37) marks the end; memberAttrName (0x4A) carries the name of a collection member attribute as its value.'
