document: rfc-2045
kind: wire-format
summary: Base64 encodes 24-bit groups of input as 4 printable characters using a 65-character US-ASCII alphabet (A–Z, a–z, 0–9, '+', '/', '=' for padding). Output lines must be no more than 76 characters; padding uses '=' to complete the final quantum to a multiple of 4 characters.
