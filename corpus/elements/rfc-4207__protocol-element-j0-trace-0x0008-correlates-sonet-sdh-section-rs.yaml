document: rfc-4207
kind: protocol-element
summary: J0-trace (0x0008) correlates SONET/SDH Section/RS trace via the J0 overhead byte. The Test Message is not transmitted over the data link but is sent over the control channel and correlated to the received J0 pattern. The TRACE object provides the mapping between the Interface_Id and the J0 pattern.
section: "3.1"
topics:
    - routing
