document: rfc-8632
kind: interoperability-note
summary: 'The ietf-alarms model maps to RFC 8348 (ietf-hardware): al:resource corresponds to hardware component list entries, al:is-cleared maps to no bits set in hw:alarm-state, al:perceived-severity maps to corresponding severity bits, and al:operator-state ''ack'' maps to hw:under-repair.'
