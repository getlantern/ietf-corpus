document: rfc-826
kind: interoperability-note
summary: Numbers in ARP packets follow Ethernet byte order (high byte first), which is the opposite of PDP-11 and VAX byte addressing. Implementors on little-endian machines must take special care with the ar$op field.
section: Notes
