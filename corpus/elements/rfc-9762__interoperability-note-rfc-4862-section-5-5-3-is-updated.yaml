document: rfc-9762
kind: interoperability-note
summary: 'RFC 4862 Section 5.5.3 is updated: when processing a PIO, link-local check comes first (moved to step a), then if the P flag is set and the node implements RFC 9762 it SHOULD treat the Autonomous flag as unset and use prefix delegation. The original Autonomous-flag-not-set early exit is now step c instead of step a.'
section: "9.2"
topics:
