document: rfc-8193
kind: normative-requirement
summary: For Event objects specifying a series of Events, it is generally a good idea to configure an end time and refresh it as needed, so that MAs that lose connectivity to their Controller do not continue executing Schedules forever.
section: "4"
rfc2119_level: SHOULD
topics:
    - measurement
