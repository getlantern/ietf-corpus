document: rfc-8348
kind: interoperability-note
summary: Each entry in '/hardware/component' in the operational state maps to one EntPhysicalEntry in ENTITY-MIB (RFC 6933). Writable MIB objects map to 'config true' YANG nodes, except entPhysicalSerialNum which is writable in the MIB but 'config false' in the YANG module.
