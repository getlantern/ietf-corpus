document: rfc-9622
kind: normative-requirement
summary: At least one Local Endpoint MUST be specified if the Preconnection is used to Listen. At least one Remote Endpoint MUST be specified if the Preconnection is used to Initiate. Both Local and Remote Endpoints MUST be specified for peer-to-peer Rendezvous.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
