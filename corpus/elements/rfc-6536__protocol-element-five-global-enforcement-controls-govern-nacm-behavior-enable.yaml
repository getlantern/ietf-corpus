document: rfc-6536
kind: protocol-element
summary: 'Five global enforcement controls govern NACM behavior: enable-nacm (master on/off, default true), read-default (permit/deny for reads with no matching rule, default permit), write-default (default deny), exec-default (default permit), and enable-external-groups (whether transport-layer group names are used, default true).'
section: 3.3.4
topics:
