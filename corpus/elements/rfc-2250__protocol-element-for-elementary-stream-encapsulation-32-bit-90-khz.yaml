document: rfc-2250
kind: protocol-element
summary: For Elementary Stream encapsulation, 32-bit 90 KHz Presentation Time Stamps (PTS) are carried in the fixed RTP header. All RTP packets making up a single audio or video frame carry the same timestamp. For video streams with B pictures, the timestamp may not be monotonically increasing.
