document: rfc-4244
kind: normative-requirement
summary: Applications using History-Info MUST clearly define the impact of the information not being available and specify the processing of such a request, because the History-Info header is optional and neither UAs nor Proxies are required to support it.
section: "3.1"
rfc2119_level: MUST
