document: rfc-9910
kind: protocol-element
summary: Relation search URLs use the form '<resource type search path segment>/rirSearch1/<relation>/<object value>[?status=<status>]'. The 'rirSearch1' path segment provides a single namespace for relation searches, allowing other searches to be defined under the top-level path segments.
section: "3.2"
topics:
    - routing
    - registry
