document: rfc-1752
kind: wire-format
summary: 'The Fragment Header (Next Header value 44) contains: Next Header (8-bit), Reserved, Fragment Offset (13-bit, in 8-octet units), M flag (1=more fragments, 0=last), and Identification (32-bit). Unlike IPv4, fragmentation in IPv6 is performed only by source nodes, not by routers along the delivery path.'
section: 12.2.4
topics:
    - ip
