document: rfc-6350
kind: normative-requirement
summary: The charset for vCard is UTF-8 as defined in RFC 3629. There is no way to override this; it is invalid to specify a value other than "UTF-8" in the "charset" MIME parameter.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
