document: rfc-4019
kind: protocol-element
summary: 'The profiles support a Cancel Mode Transition mechanism: mode=0 in UOR-2, IR, and IR-DYN packets signals that the compressor declines the decompressor''s requested mode transition. Upon receiving mode=0, the decompressor MUST stay in its current mode.'
section: "5.6"
