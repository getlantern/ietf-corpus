document: rfc-5041
kind: security-consideration
summary: 'STag access control requires two mandatory association mechanisms: Protection Domain (PD) association, which restricts STag use to DDP Streams with the same PD ID, and DDP Stream association, which binds an STag to a specific locally-identified DDP Stream. DDP MUST support both mechanisms.'
section: "8.2"
rfc2119_level: MUST
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
