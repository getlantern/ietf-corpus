document: rfc-9135
kind: normative-requirement
summary: In symmetric IRB, PEs MUST advertise local subnet routes as EVPN RT-5 to enable inter-subnet routing across PEs where not all subnets are provisioned at all PEs. These subnet routes bootstrap host (IP, MAC) learning via gleaning procedures.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
