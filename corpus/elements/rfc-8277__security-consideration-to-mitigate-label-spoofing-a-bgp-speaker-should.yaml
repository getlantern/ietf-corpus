document: rfc-8277
kind: security-consideration
summary: To mitigate label spoofing, a BGP speaker SHOULD distinguish internal from external interfaces and avoid advertising the same labels to both. An incoming data packet whose top label was not advertised over the interface type from which the packet was received can then be discarded.
section: "7"
topics:
