document: rfc-4951
kind: wire-format
summary: The Failover Session State AVP (Attribute Type 79) carries a Session ID and Remote Session ID, each 32 bits for L2TPv3 or 16 bits with Reserved prefix for L2TPv2. The M-bit is 1 (mandatory) and it MAY be hidden. It MUST only appear in FSQ and FSR messages.
section: "5.4"
