document: rfc-8287
kind: design-rationale
summary: Unlike LDP or RSVP where segment assignment is hop-by-hop, SR Segment IDs may be unique to a node or domain-wide, raising the need for new FEC sub-TLVs and additional operational considerations beyond those in RFC 8029.
