document: rfc-3645
kind: interoperability-note
summary: Although clients and servers MAY use various underlying security mechanisms, DNS clients and servers supporting GSS-TSIG MUST ensure that the mechanism used enables Kerberos v5. Servers must specify SPNEGO mech_type; client GSS APIs must support Kerberos v5; server GSS APIs must support both SPNEGO and Kerberos v5.
section: "9"
topics:
    - dns
    - security
    - crypto
