document: rfc-7273
kind: protocol-element
summary: The `local` clock source token signals that the sender uses an unsynchronised local wallclock (or supplies no timestamps). Clocks from the same device may be assumed equivalent; no cross-device synchronisation is implied.
section: "4.6"
