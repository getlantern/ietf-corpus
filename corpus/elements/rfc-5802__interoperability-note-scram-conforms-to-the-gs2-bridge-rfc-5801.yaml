document: rfc-5802
kind: interoperability-note
summary: SCRAM conforms to the GS2 bridge (RFC 5801) between SASL and GSS-API, defining both a SASL mechanism and a GSS-API mechanism. When used as a GSS-API mechanism, the GS2 header and channel binding data are excluded from the first message, and the RFC 2743 Section 3.1 initial context token header is prepended instead.
