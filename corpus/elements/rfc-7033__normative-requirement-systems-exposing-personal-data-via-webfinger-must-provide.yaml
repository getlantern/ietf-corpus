document: rfc-7033
kind: normative-requirement
summary: Systems exposing personal data via WebFinger MUST provide a user interface through which users can select which data elements are exposed. WebFinger MUST NOT be used to publish personal data without explicit authorization from the person whose data is shared.
section: "9.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
