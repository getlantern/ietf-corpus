document: rfc-6939
kind: design-rationale
summary: RFC 4361 described a mechanism for using the same DUID in DHCPv4 and DHCPv6 to correlate clients, but it requires modification of existing DHCPv4 clients and has not seen broad industry adoption. A relay-agent-carried option was chosen as a simpler, server/relay-only solution requiring no client changes.
section: "3"
topics:
    - ip
