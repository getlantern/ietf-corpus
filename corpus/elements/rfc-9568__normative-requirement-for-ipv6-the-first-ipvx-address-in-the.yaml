document: rfc-9568
kind: normative-requirement
summary: For IPv6, the first IPvX address in the VRRP advertisement MUST be the IPv6 link-local address associated with the Virtual Router. The address family of all addresses MUST match the packet's IP header address family.
section: 5.2.9
rfc2119_level: MUST
topics:
    - ip
    - routing
