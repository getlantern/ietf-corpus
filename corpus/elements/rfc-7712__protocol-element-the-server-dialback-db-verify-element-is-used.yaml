document: rfc-7712
kind: protocol-element
summary: The Server Dialback <db:verify> element is used to verify a previously asserted dialback key. It carries 'from', 'to', and 'id' attributes along with the dialback key; the authoritative server responds with type='valid' or type='invalid' to allow or deny the domain name association.
section: "4.3"
topics:
