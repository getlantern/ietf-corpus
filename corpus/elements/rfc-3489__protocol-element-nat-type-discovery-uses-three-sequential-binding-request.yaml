document: rfc-3489
kind: protocol-element
summary: 'NAT type discovery uses three sequential Binding Request tests: Test I (plain request) reveals whether a NAT exists and the public mapping; Test II (change-IP + change-port flags) distinguishes full-cone from other types; Test III (change-port only) distinguishes restricted cone from port-restricted cone. Symmetric NAT is identified when Test I repeated to the CHANGED-ADDRESS server yields a different MAPPED-ADDRESS.'
section: "10.1"
topics:
    - nat
    - udp
