document: rfc-4349
kind: wire-format
summary: 'The L2TPv3 encapsulation overhead N is 4–16 octets over IP and 16–28 octets over UDP. Fields are: Flags/Ver/Res (4 octets, UDP only), Session ID (4 octets), Cookie (0/4/8 octets), L2-Specific Sublayer (0 or 4 octets). The IP header is not included in N.'
section: "4.3"
