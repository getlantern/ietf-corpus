document: rfc-3118
kind: normative-requirement
summary: When RDM field is 0x00, the Replay Detection field MUST be set to the value of a monotonically increasing counter. Using a current time-of-day value such as an NTP-format timestamp can reduce the danger of replay attacks.
section: "2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
