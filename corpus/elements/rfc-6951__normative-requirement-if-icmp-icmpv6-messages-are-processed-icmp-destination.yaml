document: rfc-6951
kind: normative-requirement
summary: If ICMP/ICMPv6 messages are processed, ICMP 'Destination Unreachable / Port Unreachable' SHOULD be treated as 'Destination Unreachable / Protocol Unreachable' (IPv4), and ICMPv6 'Destination Unreachable / Port Unreachable' SHOULD be treated as 'Parameter Problem / unrecognized Next Header type encountered' (IPv6).
section: "5.5"
rfc2119_level: SHOULD
topics:
    - sctp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
