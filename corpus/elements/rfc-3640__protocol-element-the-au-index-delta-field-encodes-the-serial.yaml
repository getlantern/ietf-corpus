document: rfc-3640
kind: protocol-element
summary: 'The AU-Index-delta field encodes the serial number of the associated AU as an unsigned integer difference from the previous AU''s serial number: AU-Index(n) = AU-Index(n-1) + AU-Index-delta(n) + 1. A value of 0 indicates consecutive decoding order; a value greater than 0 signals interleaving.'
section: 3.2.1.1
topics:
