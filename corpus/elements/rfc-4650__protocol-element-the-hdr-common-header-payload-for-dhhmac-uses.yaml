document: rfc-4650
kind: protocol-element
summary: 'The HDR (Common Header Payload) for DHHMAC uses data type 7 for initiator messages (DHHMAC init) and data type 8 for responder messages (DHHMAC resp). A responder identifies MIKEY-DHHMAC by evaluating the data type field as 7 or 8. Allowed next payload values are: Last (0), KEMAC (1), DH (3), T (5), ID (6), SP (10), RAND (11), ERR (12), General Ext. (21).'
section: "4.1"
topics:
