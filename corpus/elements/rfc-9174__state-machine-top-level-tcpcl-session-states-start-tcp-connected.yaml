document: rfc-9174
kind: state-machine
summary: 'Top-level TCPCL session states: START → TCP Connected → Contact/Session Negotiation → Established (with Idle, Live, and Ending substates) → TCP Terminating → END. The Ending substate is entered when a SESS_TERM is sent; no new transfers may be initiated in this state, though in-progress transfers may complete.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
