document: rfc-7195
kind: security-consideration
summary: An attacker who replicates a correlation identifier (e.g., Caller ID spoofing) and establishes a call within the expected time window may hijack the circuit-switched bearer. Users are advised to apply the same caution as with any phone call, and to note that IP-domain security mechanisms like SRTP are unavailable on the CS bearer.
section: "7"
topics:
    - security
    - voip
