document: rfc-2670
kind: interoperability-note
summary: 'At the CMTS, the downstream interface is output-only: all ifIn* counters MUST return zero. At the CM, the downstream interface is input-only: all ifOut* counters MUST return zero. The reverse applies for upstream interfaces. Implementations that conflate these roles will report incorrect interface statistics.'
section: 3.2.5.1
topics:
    - snmp
