document: rfc-9780
kind: protocol-element
summary: MultipointHead and MultipointTail are the two BFD session types defined in RFC 8562 and used in this document. The head transmits all BFD Control packets with Your Discriminator set to zero; tails demultiplex using source IP, My Discriminator, and the multipoint tree identity.
