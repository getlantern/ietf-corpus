document: rfc-5789
kind: normative-requirement
summary: Accept-Patch SHOULD appear in the OPTIONS response for any resource that supports the use of the PATCH method. The PATCH method MAY appear in the Allow header even if the Accept-Patch header is absent.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - http
