document: rfc-1907
kind: protocol-element
summary: snmpTrapEnterprise (snmpTrap 3) is an accessible-for-notify OBJECT IDENTIFIER carrying the enterprise OID associated with the trap. When a SNMPv2 proxy agent maps an RFC 1157 Trap-PDU into a SNMPv2-Trap-PDU, this variable appears as the last varbind.
