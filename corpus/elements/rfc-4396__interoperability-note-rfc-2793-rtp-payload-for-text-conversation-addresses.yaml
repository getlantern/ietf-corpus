document: rfc-4396
kind: interoperability-note
summary: RFC 2793 (RTP Payload for Text Conversation) addresses a different use case (real-time text conversation) and is not a replacement for this format. Both formats may coexist in a session; this document notes the distinction to prevent confusion.
