document: rfc-6642
kind: normative-requirement
summary: Intermediaries that receive an RTCP TPLR MUST NOT send their own additional Third-Party Loss Report messages for the same packet sequence numbers; they SHOULD simply forward the received RTCP TPLR message to downstream receivers.
section: "4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
