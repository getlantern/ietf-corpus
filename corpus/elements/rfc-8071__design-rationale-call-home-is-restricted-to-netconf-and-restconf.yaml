document: rfc-8071
kind: design-rationale
summary: Call home is restricted to NETCONF and RESTCONF because those protocols require mutual identity verification, unlike base SSH and TLS which do not mandate programmatic verification of the other party. Allowing SSH/TLS server-initiated connections without application-layer identity checks would open new vulnerabilities.
section: "1.3"
topics:
    - netconf
    - security
