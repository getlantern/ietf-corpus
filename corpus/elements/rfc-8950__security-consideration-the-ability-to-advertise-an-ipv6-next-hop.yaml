document: rfc-8950
kind: security-consideration
summary: The ability to advertise an IPv6 next hop adds a new means by which an attacker could cause traffic to be diverted. Traffic could be forwarded across an intervening IPv6 core to a distant target, potentially making a traffic-hijacking or denial-of-service attack easier to mount than with preexisting BGP vulnerabilities.
section: "8"
topics:
    - bgp
    - security
    - ip
    - v6ops
