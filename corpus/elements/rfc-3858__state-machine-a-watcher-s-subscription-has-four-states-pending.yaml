document: rfc-3858
kind: state-machine
summary: 'A watcher''s subscription has four states: ''pending'' (authorization not yet granted), ''active'' (subscription approved and active), ''waiting'' (subscription terminated but resource is willing to send notification if authorization granted later), and ''terminated'' (subscription ended). Transitions are triggered by events: subscribe, approved, deactivated, probation, rejected, timeout, giveup, noresource.'
