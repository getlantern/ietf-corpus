document: rfc-2634
kind: normative-requirement
summary: The security-classification value MUST be accompanied by a security-policy-identifier to define the rules for its use, since classifications like 'secret' have organization-specific meanings. A security policy SHOULD NOT use integers 0–5 for other than their X.411 meanings.
section: 3.3.2
rfc2119_level: MUST
topics:
    - email
    - security
