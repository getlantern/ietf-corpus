document: rfc-3490
kind: protocol-element
summary: The ToASCII operation takes a sequence of Unicode code points making up one label and transforms it into a sequence of ASCII code points (0..7F). It applies Nameprep, validates LDH and hyphen rules if UseSTD3ASCIIRules is set, verifies the label does not already begin with the ACE prefix, encodes with Punycode, prepends the ACE prefix, and verifies the result is 1–63 code points.
section: "4.1"
topics:
    - dns
