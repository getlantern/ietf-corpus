document: rfc-9011
kind: protocol-element
summary: 'Downlink fragmentation parameters: ACK-Always mode for unicast, No-ACK for multicast (OPTIONAL for gateway, REQUIRED for device). RuleID 8 bits in FPort, DTag 0 bits, FCN N=1 bit (WINDOW_SIZE=1 tile), Window index M=1 bit, MAX_ACK_REQUESTS=8. Tile size equals current available MTU.'
section: 5.6.3
extracted_by: claude-sonnet-4-6
