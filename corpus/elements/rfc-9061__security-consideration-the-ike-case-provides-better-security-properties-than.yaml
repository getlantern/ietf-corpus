document: rfc-9061
kind: security-consideration
summary: The IKE case provides better security properties than the IKE-less case because NSFs generate their own session keys. In the IKE-less case, the I2NSF Controller generates and distributes cryptographic keys, making the controller a high-value target whose compromise affects all IPsec SAs it manages.
section: "7"
topics:
    - ipsec
    - security
