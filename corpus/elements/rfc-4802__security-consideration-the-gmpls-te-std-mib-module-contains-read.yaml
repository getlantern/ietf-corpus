document: rfc-4802
kind: security-consideration
summary: The GMPLS-TE-STD-MIB module contains read-write and read-create objects that can be used to configure tunnels, and their misuse could have a network-disruptive effect. SNMPv3 with authentication and privacy (authPriv security level) is RECOMMENDED for all SNMP access to these MIB modules to prevent unauthorized configuration changes.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
