document: rfc-1196
kind: interoperability-note
summary: Following the IP protocol suite principle, RUIPs should 'be liberal in what you accept.' The distinction between what a user types at an OS prompt (e.g., 'finger user@host') and what the RUIP actually receives ('user<CRLF>') means implementations must handle query parsing accordingly.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
