document: rfc-8412
kind: normative-requirement
summary: SWIMA-PVs MUST discard, without error, any SWIMA Response attributes they receive for which they do not know the corresponding SWIMA Request parameters, because the Request parameters control interpretation of the Response.
section: "3.3"
rfc2119_level: MUST
