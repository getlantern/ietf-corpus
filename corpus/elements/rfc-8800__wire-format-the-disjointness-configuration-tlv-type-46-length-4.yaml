document: rfc-8800
kind: wire-format
summary: 'The DISJOINTNESS-CONFIGURATION TLV (Type=46, Length=4 bytes fixed) contains a 32-bit Flags field with five defined bits: L (Link Diverse, bit 31), N (Node Diverse, bit 30), S (SRLG Diverse, bit 29), P (Shortest Path, bit 28), and T (Strict Disjointness, bit 27). Unassigned bits MUST be set to 0 on transmission and MUST be ignored on receipt.'
section: "5.2"
topics:
    - routing
    - mpls
