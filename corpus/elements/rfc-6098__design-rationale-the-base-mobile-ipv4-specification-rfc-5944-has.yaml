document: rfc-6098
kind: design-rationale
summary: The base Mobile IPv4 specification (RFC 5944) has no provision for asynchronous notification messages between HA, FA, and MN outside the Registration Request/Reply exchange. This document fills that gap by defining a generic envelope with well-defined extensibility, rather than requiring separate ad-hoc messages for each notification use case.
section: "1"
topics:
