document: rfc-1908
kind: normative-requirement
summary: 'When converting trap definitions, the TRAP-TYPE macro must be replaced with NOTIFICATION-TYPE: the ENTERPRISES clause removed, VARIABLES renamed to OBJECTS, STATUS clause added, and the OID value recalculated by appending sub-identifiers ''0'' and the specific-trap value to the enterprise OID.'
section: "2.2"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
