summary: When authenticatedAttributes are present, MAC input is the DER encoding of AuthAttributes with the IMPLICIT [2] tag replaced by an EXPLICIT SET OF tag. If authenticatedAttributes are absent, MAC input is directly the value octets of eContent OCTET STRING.
