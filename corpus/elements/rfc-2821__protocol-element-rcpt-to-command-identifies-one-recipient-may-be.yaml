document: rfc-2821
kind: protocol-element
summary: RCPT TO command identifies one recipient; may be repeated for multiple recipients. The server returns 250 OK if accepted, 550 if the address is not deliverable. The forward-path is enclosed in angle brackets and may include extension parameters.
