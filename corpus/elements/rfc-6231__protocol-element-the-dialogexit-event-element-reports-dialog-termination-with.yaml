document: rfc-6231
kind: protocol-element
summary: The <dialogexit> event element reports dialog termination with a mandatory 'status' attribute (0=terminated by request, 1=successful, 2=connection terminated, 3=max duration exceeded, 4=execution error). The AS MUST treat unrecognized status codes as equivalent to 4.
section: 4.2.5.1
topics:
