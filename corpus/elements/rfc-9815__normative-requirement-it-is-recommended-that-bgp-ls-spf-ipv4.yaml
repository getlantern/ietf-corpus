document: rfc-9815
kind: normative-requirement
summary: It is RECOMMENDED that BGP-LS-SPF IPv4/IPv6 route computation and installation be given scheduling priority over other BGP address families by default, since BGP-LS-SPF serves as an underlay SAFI. BGP-LS-SPF and BGP unicast address families operate in ships-in-the-night mode with no implicit route redistribution.
section: "6.4"
rfc2119_level: RECOMMENDED
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
