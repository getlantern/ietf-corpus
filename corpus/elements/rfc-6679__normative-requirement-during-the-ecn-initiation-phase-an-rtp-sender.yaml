document: rfc-6679
kind: normative-requirement
summary: During the ECN initiation phase, an RTP sender SHALL mark a small fraction of its RTP traffic as ECT while leaving the remainder unmarked, and is RECOMMENDED to send a minimum of two packets with ECT markings per RTCP reporting interval.
section: 7.2.1
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
