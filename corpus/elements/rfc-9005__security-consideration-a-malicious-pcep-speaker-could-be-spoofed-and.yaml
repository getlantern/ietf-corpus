document: rfc-9005
kind: security-consideration
summary: A malicious PCEP speaker could be spoofed and used as an attack vector by creating spurious Policy Associations. A spurious LSP can have policies inconsistent with legitimate LSPs, causing problems in policy handling. Securing the PCEP session using TLS as per BCP 195 is RECOMMENDED.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - mpls
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
