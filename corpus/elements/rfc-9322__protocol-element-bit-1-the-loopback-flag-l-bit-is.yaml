kind: protocol-element
summary: Bit 1, the Loopback flag (L-bit), is defined in the IOAM Pre-allocated and Incremental Trace option headers. When set, it triggers each transit device along the path to send a truncated copy of the packet back towards the IOAM encapsulating node.
