document: rfc-1406
kind: normative-requirement
summary: Implementation of the DS1 Far End Group is optional. It may only be implemented by DS1 systems that use the facilities data link to exchange far-end statistics; both T1.403 and PUB 54016 define ways to exchange this information over the FDL.
