document: rfc-9990
kind: privacy-consideration
summary: For multi-organization PSDs not requiring DMARC (e.g., '.com'), all DMARC feedback for non-DMARC Organizational Domains will be redirected to the PSO if the PSO publishes a DMARC record with a 'rua' tag, creating significant risk of traffic metadata leakage to the PSO.
section: "7.3"
topics:
    - email
    - privacy
