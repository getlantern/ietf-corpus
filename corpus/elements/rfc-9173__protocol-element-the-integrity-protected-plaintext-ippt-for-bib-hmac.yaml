document: rfc-9173
kind: protocol-element
summary: 'The Integrity-Protected Plaintext (IPPT) for BIB-HMAC-SHA2 is constructed by concatenating: (1) CBOR encoding of the integrity scope flags, (2) optionally the canonical primary block, (3) optionally the canonical target block header fields, (4) optionally the canonical BIB header fields, and (5) the canonical block-type-specific data of the security target.'
section: "3.7"
