document: rfc-8010
kind: normative-requirement
summary: For binary signed integer attribute values the sender MUST encode in exactly four octets; for binary signed byte values (e.g., boolean) exactly one octet; for character strings without padding; and for out-of-band value-tags the value-length MUST be 0.
section: "3.8"
rfc2119_level: MUST
topics:
    - http
