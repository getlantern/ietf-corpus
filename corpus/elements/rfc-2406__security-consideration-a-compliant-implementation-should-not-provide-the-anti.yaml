document: rfc-2406
kind: security-consideration
summary: A compliant implementation SHOULD NOT provide the anti-replay service in conjunction with SAs that are manually keyed, because correct provision of anti-replay with manual keys would require correct maintenance of counter state at the sender until key replacement, with no automated recovery if counter overflow were imminent.
section: "5"
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
