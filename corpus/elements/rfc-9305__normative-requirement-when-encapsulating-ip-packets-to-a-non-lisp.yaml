document: rfc-9305
kind: normative-requirement
summary: When encapsulating IP packets to a non-LISP-GPE-capable router, the P-bit MUST be set to 0; the LISP-GPE encapsulation format MUST NOT be sent to a router that has not indicated support, as it would misinterpret the header fields.
section: "5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
