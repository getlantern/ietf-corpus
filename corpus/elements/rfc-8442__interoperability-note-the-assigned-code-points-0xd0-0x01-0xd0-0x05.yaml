document: rfc-8442
kind: interoperability-note
summary: The assigned code points {0xD0,0x01}–{0xD0,0x05} can only be used for TLS 1.2 and DTLS 1.2. Equivalent functionality for TLS 1.3 is provided by TLS_AES_128_GCM_SHA256, TLS_AES_256_GCM_SHA384, TLS_AES_128_CCM_8_SHA256, and TLS_AES_128_CCM_SHA256.
