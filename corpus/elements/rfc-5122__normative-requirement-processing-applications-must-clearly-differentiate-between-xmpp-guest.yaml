document: rfc-5122
kind: normative-requirement
summary: Processing applications MUST clearly differentiate between xmpp://guest@example.com (authenticate as guest@example.com via authority component) and xmpp:guest@example.com (identify the node guest@example.com without authentication signal). User agents SHOULD discourage use of the "//" authority form in general usage.
section: "5.5"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
