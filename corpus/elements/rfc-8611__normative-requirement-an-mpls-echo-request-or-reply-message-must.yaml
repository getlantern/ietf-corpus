document: rfc-8611
kind: normative-requirement
summary: An MPLS echo request or reply message MUST NOT include more than one LSR Capability TLV. The U and D flags in the LSR Capability TLV MUST be cleared when sending the TLV in an echo request and ignored on receipt.
section: "6"
rfc2119_level: MUST NOT
topics:
    - mpls
