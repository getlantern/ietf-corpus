document: rfc-4835
kind: security-consideration
summary: The security of cryptography-based systems depends on both the strength of chosen algorithms and the keys used with them, as well as proper engineering and administration to prevent non-cryptographic bypass. Algorithms identified as MUST or SHOULD implement are not known to be broken but may be broken in the future, necessitating periodic revision of this document.
section: "4"
topics:
