document: rfc-7153
kind: normative-requirement
summary: When a codepoint is needed for a new Extended Community, the requester SHOULD first determine whether an existing Type can be used. If a new Type is needed with Sub-Types, the requester must specify whether an existing Sub-Type registry can be reused or a new one is needed.
section: "4"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
    - registry
