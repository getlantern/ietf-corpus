document: rfc-6733
kind: state-machine
summary: The Accounting Session State Machine manages accounting lifecycle on both client and server with states Idle, Pending S (awaiting Start ACK), Open, Pending E (awaiting End ACK), and Pending B (buffered records). Transitions are driven by Accounting-Request/Answer exchanges, interim record timers (Acct-Interim-Interval), and session termination events.
