document: rfc-5464
kind: security-consideration
summary: Annotations whose values are intended to remain private MUST be stored only in entries with the '/private' prefix. Servers MAY choose to only support METADATA extensions after a privacy layer (e.g., TLS) has been negotiated by the client, to protect annotations from snooping.
section: "7"
topics:
    - email
    - security
    - privacy
