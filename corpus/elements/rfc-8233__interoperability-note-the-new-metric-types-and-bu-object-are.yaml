document: rfc-8233
kind: interoperability-note
summary: The new metric types and BU object are compatible with stateful PCE extensions (RFC 8231) and PCE-initiated LSPs. The updated PCReq/PCRep attribute-list (Section 5.2) is used to include service-aware parameters in stateful operations; passive stateful PCEs MAY use these extensions.
