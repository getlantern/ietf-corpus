document: rfc-7055
kind: protocol-element
summary: The GSS-EAP mechanism name has an ABNF string form of 'user-or-service [ "/" host [ "/" service-specifics ] ] [ "@" realm ]', where special characters '/', '@', and '\' may be backslash-escaped. This form is compatible with RFC 1964 Kerberos name strings.
section: "3.1"
topics:
    - security
