document: rfc-7780
kind: wire-format
summary: The Nickname Flags (NickFlags) APPsub-TLV has a 2-byte Type=6, 2-byte Length=4*K, followed by K NICKFLAG RECORDs of 4 bytes each. Each record contains a 16-bit Nickname and a 16-bit flags field with the IN (Ingress) flag in bit 0; RESV bits MUST be sent as zero.
section: "8.4"
topics:
    - routing
    - registry
