document: rfc-8984
kind: protocol-element
summary: 'JSCalendar defines three top-level object types: Event (media type application/jscalendar+json;type=event), Task (application/jscalendar+json;type=task), and Group (application/jscalendar+json;type=group). Each MUST carry a matching @type property value (''Event'', ''Task'', or ''Group'').'
section: "2"
topics:
