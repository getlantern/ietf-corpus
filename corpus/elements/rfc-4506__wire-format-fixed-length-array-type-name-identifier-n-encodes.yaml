document: rfc-4506
kind: wire-format
summary: Fixed-length array (type-name identifier[n]) encodes each of the n elements in order; each element's encoding is itself a multiple of four bytes. Elements of the same declared type may vary in encoded size (e.g., variable-length strings).
section: "4.12"
