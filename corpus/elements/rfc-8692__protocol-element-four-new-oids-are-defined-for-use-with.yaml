document: rfc-8692
kind: protocol-element
summary: 'Four new OIDs are defined for use with SHAKE functions: id-RSASSA-PSS-SHAKE128 (1.3.6.1.5.5.7.6.30), id-RSASSA-PSS-SHAKE256 (1.3.6.1.5.5.7.6.31), id-ecdsa-with-shake128 (1.3.6.1.5.5.7.6.32), and id-ecdsa-with-shake256 (1.3.6.1.5.5.7.6.33). These identifiers can be used for both signature algorithms and subject public key identification in RSASSA-PSS contexts.'
