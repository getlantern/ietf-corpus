document: rfc-6525
kind: normative-requirement
summary: An SCTP endpoint supporting this extension MUST include the RE-CONFIG chunk type (130) in the Supported Extensions Parameter (per RFC 5061) in the INIT or INIT-ACK. A sender MUST NOT send any RE-CONFIG chunk unless the peer has advertised support.
section: 5.1.1
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
