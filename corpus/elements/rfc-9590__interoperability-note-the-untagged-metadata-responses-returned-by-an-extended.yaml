document: rfc-9590
kind: interoperability-note
summary: The untagged METADATA responses returned by an extended LIST command with the METADATA return option have the same syntax and semantics as those returned by GETMETADATA commands on the same set of listable mailboxes, as defined in Section 4.4.1 of RFC 5464.
