kind: protocol-element
summary: 'InetAddressType is a textual convention enumerating address types: unknown(0), ipv4(1), ipv6(2), ipv4z(3), ipv6z(4), and dns(16). It serves as a discriminator that determines the encoding of an accompanying InetAddress object.'
