document: rfc-5812
kind: protocol-element
summary: LFB metadata is per-packet state passed between LFBs as <label, value> pairs; labels carry unique numeric identifiers. Metadata is not transmitted over the network but is conveyed on redirect packets exchanged between FE and CE.
