document: rfc-8050
kind: security-consideration
summary: A BGP peer that enables the Additional Paths capability on a session with a public BGP collector exports not only its best paths but potentially all other paths within its network. Operators should carefully consider the implications of exposing this additional routing data to collectors.
section: "6"
topics:
    - security
    - bgp
    - routing
    - privacy
