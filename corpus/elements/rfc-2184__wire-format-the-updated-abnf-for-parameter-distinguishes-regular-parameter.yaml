kind: wire-format
summary: The updated ABNF for `parameter` distinguishes `regular-parameter` (name with optional section index, equals, value) from `extended-parameter` (name ending in `*`, equals, charset'language'encoded-value). The `attribute-char` production excludes SPACE, CTLs, `*`, `'`, `%`, and tspecials.
