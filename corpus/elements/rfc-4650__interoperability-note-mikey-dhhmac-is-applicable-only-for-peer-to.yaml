document: rfc-4650
kind: interoperability-note
summary: MIKEY-DHHMAC is applicable only for peer-to-peer configurations (maximum two entities). Like MIKEY-DHSIGN, it cannot scale to group key management for groups larger than two due to the pairwise nature of DH and the one-roundtrip constraint. In GKMARCH it can function only as a registration protocol.
section: "2.2"
topics:
    - realtime
    - security
