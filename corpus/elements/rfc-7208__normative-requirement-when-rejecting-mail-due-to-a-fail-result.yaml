document: rfc-7208
kind: normative-requirement
summary: When rejecting mail due to a 'fail' result during the SMTP transaction, checking software SHOULD use SMTP reply code 550 and enhanced status code 5.7.1. The explanation string returned by check_host() MUST be limited to US-ASCII.
section: "8.4"
rfc2119_level: SHOULD
topics:
    - email
