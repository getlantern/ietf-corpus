document: rfc-5296
kind: security-consideration
summary: The rIKname (EMSKname) in the keyName-NAI is not changed across ERP exchanges, making it possible to correlate multiple ERP runs for the same peer, which has privacy implications. There was no consensus at the time of publication to require per-exchange rIKname rotation.
section: "8"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
