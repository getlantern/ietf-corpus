document: rfc-4474
kind: normative-requirement
summary: Verifiers MUST NOT deem valid a request with a Date header more than 3600 seconds old. Verifiers MUST record Call-IDs from valid Identity-signed requests and remember them for at least the duration of one Date interval (commonly 3600 seconds) to detect replay attacks.
section: "13.1"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
