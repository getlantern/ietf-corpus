document: rfc-8277
kind: normative-requirement
summary: Two SAFI-4 or SAFI-128 UPDATEs for the same prefix received on different BGP sessions (or on the same session with different RFC 7911 path identifiers) MUST be considered comparable by the BGP best-path selection procedure, even if they carry different labels.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
