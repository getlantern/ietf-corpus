document: rfc-9200
kind: normative-requirement
summary: The AS MUST reject a token request with error 'unsupported_pop_key' (CoAP 4.00) if the client submits an asymmetric key the RS cannot process. If the client and RS share no common profile, the AS MUST reject with error 'incompatible_ace_profiles' (CoAP 4.00).
section: 5.8.3
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
