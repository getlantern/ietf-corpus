document: rfc-2797
kind: protocol-element
summary: QueryPending (id-cmc 21) allows a client to poll a server about a pending certificate request using a token originally returned by the server in CMCStatusInfo's pendToken field. If the server returns a pending state, the same pendToken MUST NOT change during the request lifecycle.
section: "5.13"
topics:
    - pkix
