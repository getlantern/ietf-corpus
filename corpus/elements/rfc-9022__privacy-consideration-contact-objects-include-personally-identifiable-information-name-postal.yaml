document: rfc-9022
kind: privacy-consideration
summary: Contact objects include personally identifiable information (name, postal address, telephone numbers, email address); the <disclose> element carried in contact objects conveys registrant preferences for restricting third-party access to specific fields, which escrow agents and successor operators must respect.
