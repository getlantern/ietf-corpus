document: rfc-2082
kind: design-rationale
summary: The mechanism transmits the output of an authentication algorithm (Keyed MD5) rather than the secret key itself. This one-way function ensures the RIP-2 Authentication Key is never sent over the network in the clear, protecting against the passive eavesdropping attacks widespread in the Internet.
section: "2"
topics:
