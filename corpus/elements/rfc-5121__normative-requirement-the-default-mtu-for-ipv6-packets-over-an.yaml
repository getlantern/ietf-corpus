document: rfc-5121
kind: normative-requirement
summary: The default MTU for IPv6 packets over an 802.16 link SHOULD be 1500 octets. If a value different from 1500 is used, the AR MUST advertise the MTU value via the MTU option in router advertisements as defined in RFC 4861.
section: "6.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
