document: rfc-8681
kind: security-consideration
summary: For content confidentiality, it is RECOMMENDED to use solutions from RFC 6363, with attention to whether encryption is applied before or after FEC protection, operational constraints on decoding in protected environments, and the applicable threat model. IPsec/ESP is the mandatory-to-implement (but not mandatory-to-use) baseline security scheme.
section: 7.1.1
topics:
    - security
    - ipsec
