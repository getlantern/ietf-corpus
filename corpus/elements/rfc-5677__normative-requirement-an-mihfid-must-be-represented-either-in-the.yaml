document: rfc-5677
kind: normative-requirement
summary: An MIHFID MUST be represented either in the form of an FQDN (per RFC 2181) or NAI (per RFC 4282), ensuring it is unique within the domain and independent of configured IP addresses.
section: "4.2"
rfc2119_level: MUST
