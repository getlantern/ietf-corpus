document: rfc-7401
kind: protocol-element
summary: 'The HIP Base Exchange (BEX) is a four-packet SIGMA-compliant exchange: I1 (trigger with DH group list), R1 (puzzle + DH public value + signed HI), I2 (puzzle solution + DH public value + optionally encrypted HI + signature), R2 (HMAC + signature). The Responder remains stateless until receiving a valid I2.'
section: "4.1"
topics:
