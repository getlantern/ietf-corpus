summary: The ClientKeyExchange message carries a ClientECDiffieHellmanPublic struct containing ecdh_Yc, the client's ephemeral ECDH public key as an ECPoint in uncompressed format. The implicit encoding (key in certificate) is deprecated and retained only for backward compatibility.
