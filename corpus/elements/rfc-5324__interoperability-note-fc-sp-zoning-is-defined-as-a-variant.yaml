document: rfc-5324
kind: interoperability-note
summary: FC-SP Zoning is defined as a variant of the Enhanced Zoning model from FC-SW-4 and FC-GS-5 specifically to preserve backward compatibility. The T11-FC-SP-ZONING-MIB augments existing T11-FC-ZONE-SERVER-MIB tables (RFC 4936) rather than replacing them, keeping Zoning management and enforcement completely independent from other FC-SP policy management.
section: 3.4.8
topics:
    - security
