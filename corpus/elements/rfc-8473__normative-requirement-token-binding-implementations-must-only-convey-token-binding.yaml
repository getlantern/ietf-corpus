document: rfc-8473
kind: normative-requirement
summary: Token Binding implementations MUST only convey Token Binding IDs to servers if signaled to do so by the application associated with the Token Binding ID. Signaling mechanisms other than Include-Referred-Token-Binding-ID are possible but outside the scope of this specification.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - privacy
