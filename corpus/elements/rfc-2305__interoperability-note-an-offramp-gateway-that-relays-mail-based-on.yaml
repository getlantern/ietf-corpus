document: rfc-2305
kind: interoperability-note
summary: 'An offramp gateway that relays mail based on addressing information must use addresses supplied in the MTA envelope (RCPT TO / MAIL FROM), rather than from message content headers such as To: or CC:, to avoid misdirected delivery.'
section: 2.1.3
topics:
    - email
