document: rfc-9115
kind: normative-requirement
summary: If the CSR fails validation against the template for any identifier, the IdO MUST return HTTP 403 with an appropriate error type (e.g., 'rejectedIdentifier' or 'badCSR'); the error response SHOULD contain subproblems for each failed identifier.
section: 2.3.2
rfc2119_level: MUST
