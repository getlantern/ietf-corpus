document: rfc-3637
kind: design-rationale
summary: Rather than defining new objects exactly matching 802.3ae oWIS counters and thresholds, the MIB reuses SONET-MIB objects. This avoided a separate management scheme for 10 Gb/s WAN Ethernet from ATM-over-SONET and PPP-over-SONET deployments already using those objects.
section: "3.1"
topics:
    - snmp
