document: rfc-8178
kind: protocol-element
summary: 'Responders handle received protocol elements in one of three ways: (1) the element is unknown, triggering NFS4ERR_OP_ILLEGAL, NFS4ERR_BADXDR, or NFS4ERR_INVAL; (2) the element is known but unsupported, triggering NFS4ERR_NOTSUPP, NFS4ERR_UNION_NOTSUPP, or NFS4ERR_ATTRNOTSUPP; or (3) the element is known and supported, returning success or a non-special error.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
