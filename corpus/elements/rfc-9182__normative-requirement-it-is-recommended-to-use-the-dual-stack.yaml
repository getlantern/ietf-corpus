document: rfc-9182
kind: normative-requirement
summary: It is RECOMMENDED to use the dual-stack address family for data nodes whose value is identical for both IPv4 and IPv6; if dual-stack and single-family entries coexist for the same data node, the dual-stack value takes precedence over the IPv4 or IPv6 value.
section: "7.1"
rfc2119_level: RECOMMENDED
topics:
    - yang
    - ip
