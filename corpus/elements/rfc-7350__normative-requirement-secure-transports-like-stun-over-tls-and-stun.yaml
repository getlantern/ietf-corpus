document: rfc-7350
kind: normative-requirement
summary: Secure transports like STUN over TLS and STUN over DTLS MUST use the 'stuns' URI scheme. A STUN URI containing an IP address MUST be rejected unless the domain name is provided by the same mechanism that provided the STUN URI.
section: 4.1.1
rfc2119_level: MUST
topics:
    - tls
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
