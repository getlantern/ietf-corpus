document: rfc-8853
kind: interoperability-note
summary: In cases where RTP payload type uniquely maps to a corresponding RtpStreamId, an RTP receiver MAY use RTP PT to relate simulcast streams even before receiving RtpStreamId in RTCP SDES or RTP header extensions, enabling decoding to begin earlier.
section: "5.5"
topics:
    - realtime
    - rtp
