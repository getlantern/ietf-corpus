document: rfc-9864
kind: normative-requirement
summary: To perform fully-specified encryption in COSE, the outer 'alg' value MUST specify all parameters for key establishment, and the inner 'alg' value MUST specify all parameters for symmetric encryption. In COSE_Encrypt the outer 'alg' is in the COSE_Encrypt headers and the inner 'alg' is in the COSE_recipient headers.
section: "3"
rfc2119_level: MUST
topics:
    - jose
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
