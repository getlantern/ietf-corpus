document: rfc-2192
kind: interoperability-note
summary: When resolving relative URLs for a message or message part, the program MUST check the MIME entity headers (Content-Base and Content-Location) of the referenced section and enclosing entities in order to determine the base URL, following the rules in RFC 2068 (HTTP/1.1).
