document: rfc-1002
kind: security-consideration
summary: 'B-node name registration relies entirely on IP broadcast and the honesty of other nodes: any node can respond to a registration request with a NEGATIVE response to deny a name, and there is no cryptographic authentication of ownership claims. Name conflict is detected heuristically via CONFLICT_TIMER on query responses.'
section: 5.1.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
