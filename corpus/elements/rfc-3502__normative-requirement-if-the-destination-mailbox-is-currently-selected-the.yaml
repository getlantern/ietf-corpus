document: rfc-3502
kind: normative-requirement
summary: If the destination mailbox is currently selected, the server SHOULD notify the client immediately via an untagged EXISTS response. If it does not, the client MAY issue a NOOP or CHECK command after one or more APPEND commands.
section: 6.3.11
rfc2119_level: SHOULD
topics:
    - email
