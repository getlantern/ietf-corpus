document: rfc-6284
kind: normative-requirement
summary: RTP traffic direction MUST be only from the server to the client in the unicast session. If the client wants to send RTP traffic back to the server, regular session establishment methods such as RFC 3264 must be used instead.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
