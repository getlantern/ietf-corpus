document: rfc-6570
kind: design-rationale
summary: The operator characters "=", ",", "!", "@", and "|" are reserved for future extensions and not currently defined. The "$" and "()" characters are explicitly excluded from operator use so that macro languages can apply macro substitution to a string before it is processed as a URI Template.
section: "2.2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
