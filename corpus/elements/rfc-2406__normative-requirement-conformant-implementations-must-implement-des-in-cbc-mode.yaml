document: rfc-2406
kind: normative-requirement
summary: Conformant implementations MUST implement DES in CBC mode, HMAC with MD5, HMAC with SHA-1, NULL Authentication algorithm, and NULL Encryption algorithm as mandatory-to-implement algorithms. Support for the two NULL algorithms is required to maintain consistency with service negotiation.
section: "5"
rfc2119_level: MUST
topics:
