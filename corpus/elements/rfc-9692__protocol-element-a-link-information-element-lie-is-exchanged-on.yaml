document: rfc-9692
kind: protocol-element
summary: A Link Information Element (LIE) is exchanged on all links running RIFT to auto-discover neighbors, negotiate Zero Touch Provisioning parameters, and detect miscabling. LIEs are sent over well-known IPv4 multicast (RFC2365) or IPv6 link-local multicast (RFC4291) to a destination UDP port defined in the schema.
section: "6.2"
topics:
    - routing
