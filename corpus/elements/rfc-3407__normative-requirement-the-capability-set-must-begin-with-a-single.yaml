document: rfc-3407
kind: normative-requirement
summary: The capability set MUST begin with a single sequence number followed by one or more capability descriptions. If a media format is included in an 'm=' line, it MUST be included in either a session capability or a media stream capability for that media line.
section: "3"
rfc2119_level: MUST
topics:
