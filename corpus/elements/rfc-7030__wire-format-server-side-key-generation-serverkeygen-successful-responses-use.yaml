summary: 'Server-side key generation (/serverkeygen) successful responses use Content-Type multipart/mixed with two parts: the private key as application/pkcs8 (base64 DER PrivateKeyInfo) if unencrypted, or application/pkcs7-mime with smime-type server-generated-key if CMS EnvelopedData-encrypted; plus the certificate as application/pkcs7-mime matching the /simpleenroll response format.'
