document: rfc-3872
kind: normative-requirement
summary: The tripPeerConnectRetryInterval SHOULD double after each connection retry attempt up to the value of tripPeerMaxRetryInterval. The retry interval MUST always be less than or equal to tripPeerMaxRetryInterval.
section: "6.2"
rfc2119_level: MUST
topics:
