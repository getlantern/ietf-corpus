document: rfc-8267
kind: protocol-element
summary: 'For NFS versions 2 and 3, the DDP-eligible XDR data items are: the opaque file data argument in WRITE, the pathname argument in SYMLINK, the opaque file data result in READ, and the pathname result in READLINK. All other argument or result data items are not DDP-eligible.'
section: "4"
