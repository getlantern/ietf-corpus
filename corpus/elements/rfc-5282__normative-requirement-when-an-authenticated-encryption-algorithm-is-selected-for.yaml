document: rfc-5282
kind: normative-requirement
summary: When an authenticated encryption algorithm is selected for any SA (IKE or ESP), an integrity algorithm MUST NOT be selected for that SA. If all encryption algorithms in a proposal are authenticated encryption algorithms, the proposal MUST NOT propose any integrity transforms.
section: "8"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - crypto
    - security
