document: rfc-6004
kind: design-rationale
summary: Multiple LSPs may be associated with a single EVPL Call primarily to handle the case where carrying multiple VLAN IDs causes a Path message to grow larger than a single unfragmented IP packet. This avoids IP fragmentation while preserving GMPLS signaling integrity.
section: "4.4"
topics:
