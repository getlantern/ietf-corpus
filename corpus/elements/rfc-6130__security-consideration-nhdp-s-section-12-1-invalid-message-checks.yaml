document: rfc-6130
kind: security-consideration
summary: NHDP's Section 12.1 invalid-message checks provide a first line of defense against malformed messages. Authentication, integrity protection, and confidentiality SHOULD be provided by an external security mechanism (e.g., a MANET cryptographic protocol); NHDP provides an extension point allowing security protocols to reject unverifiable HELLO messages before NHDP processing.
section: "17.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
