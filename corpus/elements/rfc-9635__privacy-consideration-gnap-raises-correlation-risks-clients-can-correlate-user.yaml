document: rfc-9635
kind: privacy-consideration
summary: 'GNAP raises correlation risks: clients can correlate user activity across RS interactions using access tokens; RS can correlate across requests using the same token; AS can correlate all activity since it issues all tokens. The AS SHOULD issue distinct tokens for different RS contexts and SHOULD minimize information shared with each party.'
section: "12.4"
topics:
    - privacy
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
