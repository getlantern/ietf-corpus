document: rfc-4535
kind: normative-requirement
summary: The identity of each party in the Group Secure Association establishment process MUST be unambiguously asserted and authenticated. It MUST also be verified that each party is authorized, as defined by the policy token, to function in its role in the protocol (e.g., GM or GC/KS).
section: "1.1"
rfc2119_level: MUST
topics:
    - security
    - pkix
