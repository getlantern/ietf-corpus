document: rfc-2913
kind: design-rationale
summary: The 'type' feature tag is also useful when media features describe inner parts of a MIME composite (e.g., component parts of a 'multipart', files in a compressed archive, or encrypted message data), allowing the content type of inner parts to appear in the outer expression.
