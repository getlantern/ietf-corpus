document: rfc-8224
kind: normative-requirement
summary: Authentication and verification services MUST follow defined procedures to determine whether the user portion of a SIP URI constitutes a telephone number (e.g., via 'user=phone' parameter, tel URI, or '+' prefix), directing further processing to either telephone canonicalization (Section 8.3) or URI normalization (Section 8.5).
section: "8.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
