document: rfc-7181
kind: wire-format
summary: Link metrics are encoded in a 12-bit compressed form consisting of an 8-bit mantissa (a) and a 4-bit exponent (b); the represented value is (257+a)×2^b − 256, spanning MINIMUM_METRIC=1 to MAXIMUM_METRIC=16776960 (2^24 − 256).
section: "6.2"
