document: rfc-8560
kind: normative-requirement
summary: An EVPN PE MUST establish a pseudowire (PW) to each remote PE from which it has received only a VPLS A-D route, and MUST set up the corresponding PW FEC label stack. The PW is set up between the VSI of the VPLS PE and the MAC-VRF of the EVPN PE.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
