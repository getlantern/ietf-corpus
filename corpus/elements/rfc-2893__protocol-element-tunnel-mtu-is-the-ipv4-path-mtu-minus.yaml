document: rfc-2893
kind: protocol-element
summary: Tunnel MTU is the IPv4 path MTU minus 20 bytes. If this yields an IPv6 MTU below 1280 bytes, the tunnel presents a 1280-byte MTU and IPv4 fragmentation is used as necessary. The encapsulating node uses an algorithm to decide between sending an IPv6 ICMP 'packet too big' error and fragmenting at the IPv4 layer.
section: "3.2"
topics:
    - ip
    - v6ops
