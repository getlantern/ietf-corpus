document: rfc-3404
kind: design-rationale
summary: A client may modify the DDDS algorithm for this application to look beyond the first matching rule to find a more optimal protocol/service. This is safe as long as the input to step 3 and the output of step 4 remain identical to the basic algorithm, and optimization MUST NOT cross delegation paths.
section: 4.4.3
