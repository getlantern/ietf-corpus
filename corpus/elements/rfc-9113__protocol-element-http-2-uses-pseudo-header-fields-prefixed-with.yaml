document: rfc-9113
kind: protocol-element
summary: HTTP/2 uses pseudo-header fields prefixed with ':' to carry HTTP control data. Request pseudo-headers are :method, :scheme, :path, and :authority. The response pseudo-header is :status. Pseudo-header fields MUST appear before regular header fields and MUST NOT appear in trailers.
section: "8.3"
topics:
    - http
