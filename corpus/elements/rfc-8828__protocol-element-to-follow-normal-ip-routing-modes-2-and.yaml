summary: 'To follow normal IP routing (Modes 2 and 3), implementations should bind() peer-to-peer sockets to wildcard addresses (0.0.0.0 for IPv4, :: for IPv6), allowing the OS to route WebRTC traffic identically to HTTP traffic.'
