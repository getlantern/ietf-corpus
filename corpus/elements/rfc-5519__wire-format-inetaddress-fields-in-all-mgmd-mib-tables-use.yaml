document: rfc-5519
kind: wire-format
summary: 'InetAddress fields in all MGMD MIB tables use SIZE(4|16): 4 octets for IPv4 addresses and 16 octets for IPv6 addresses. The corresponding InetAddressType index (ipv4(1) or ipv6(2)) disambiguates the encoding, following RFC 4001.'
section: "5"
topics:
