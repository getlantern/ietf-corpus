document: rfc-6121
kind: normative-requirement
summary: When an interactive client receives a subscription request it MUST present the request to the controlling natural person for approval; an 'id' attribute in approval or denial responses MUST NOT mirror the 'id' of the original request.
section: 3.1.4
rfc2119_level: MUST
topics:
    - privacy
