summary: These blocks extend the packet loss concealment mechanism defined in Section 4.7.6 of RFC 3611. The plc=3 (enhancement) value is explicitly equivalent to 'enhanced' in RFC 3611 Section 4.7.6. These blocks MUST be used as defined in RFC 3550 and RFC 3611.
