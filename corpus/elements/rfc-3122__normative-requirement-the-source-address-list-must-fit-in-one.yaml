document: rfc-3122
kind: normative-requirement
summary: The Source Address List MUST fit in one IND Solicitation message; if all IPv6 addresses of an interface do not fit, the option contains an incomplete list. A complete list should be obtained from the IND Advertisement.
section: "3.1"
rfc2119_level: MUST
