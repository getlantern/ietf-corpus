document: rfc-8485
kind: design-rationale
summary: Vectors of Trust was designed to occupy the middle ground between single-scalar Level of Assurance (LoA) values and full attribute metadata systems. LoA collapses too much context into one number (an anonymous user with a strong credential still gets a low LoA), while ABAC attribute metadata is prohibitively complex for simple RP decisions. VoT provides multiple orthogonal components without requiring full attribute descriptions.
section: "1"
topics:
