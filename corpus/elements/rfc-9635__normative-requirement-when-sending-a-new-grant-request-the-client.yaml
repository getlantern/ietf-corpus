document: rfc-9635
kind: normative-requirement
summary: When sending a new grant request, the client instance MUST identify itself by including its client information in the client field and MUST sign the request with its unique key as described in Section 7.3. The client field is not sent or accepted for continuation requests.
section: "2.3"
rfc2119_level: MUST
topics:
    - oauth
    - security
    - crypto
