document: rfc-5951
kind: normative-requirement
summary: An MPLS-TP NE MUST support secure management protocols and SHOULD do so in a manner that reduces potential impact of a DoS attack. The NE SHOULD support additional mechanisms that mitigate DoS/DDoS attacks against the management component while allowing the NE to continue its primary functions.
section: "8.3"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
