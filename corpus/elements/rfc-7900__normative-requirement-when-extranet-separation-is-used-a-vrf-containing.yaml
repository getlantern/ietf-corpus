document: rfc-7900
kind: normative-requirement
summary: 'When extranet separation is used, a VRF containing both extranet and non-extranet C-sources MUST be configured with two RDs: a ''default RD'' and an ''extranet RD''. The distinction MUST be known by configuration.'
section: "1.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
