document: rfc-3032
kind: design-rationale
summary: 'The Implicit NULL Label (value 3) never appears in the encapsulation but is signaled via the Label Distribution Protocol to implement penultimate-hop popping: instead of replacing the top label with a new label, the LSR pops the stack. This eliminates a label lookup at the egress LSR.'
