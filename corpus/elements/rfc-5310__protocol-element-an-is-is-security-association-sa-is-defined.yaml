document: rfc-5310
kind: protocol-element
summary: 'An IS-IS Security Association (SA) is defined by three parameters: a 2-octet Key ID (uniquely identifying the SA), an Authentication Algorithm (one of HMAC-SHA-1, HMAC-SHA-224, HMAC-SHA-256, HMAC-SHA-384, HMAC-SHA-512), and an Authentication Key of variable length. The algorithm and key are never sent in cleartext on the wire.'
section: "2"
topics:
