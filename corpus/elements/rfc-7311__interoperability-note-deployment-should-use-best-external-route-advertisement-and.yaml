document: rfc-7311
kind: interoperability-note
summary: Deployment should use best-external route advertisement and ADD-PATH procedures alongside AIGP to allow BGP speakers to choose from multiple routes. Without these, Route Reflectors may pass only paths optimal for themselves, leading to non-optimal choices by clients.
section: "5"
topics:
    - bgp
    - routing
