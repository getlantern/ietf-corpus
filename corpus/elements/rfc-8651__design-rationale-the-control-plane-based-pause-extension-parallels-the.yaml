document: rfc-8651
kind: design-rationale
summary: The Control-Plane-Based Pause extension parallels the flow-control mechanism in PPPoE (RFC 5578) and Ethernet priority-based flow control (IEEE 802.1Q). DSCP-aware flow control is included to support Diffserv-aware modems, allowing per-traffic-class pause/resume rather than only all-or-nothing suppression.
section: "1"
topics:
