document: rfc-5132
kind: normative-requirement
summary: For ipMcastRouteSourceAddressType, if the value is not unknown(0), it MUST be the same as the value of ipMcastRouteGroupType, ensuring address family consistency between source and group addresses in a routing entry.
section: "6"
rfc2119_level: MUST
topics:
