document: rfc-8169
kind: security-consideration
summary: A compromised node could intercept and modify G-ACh content including the Scratch Pad and timing data, corrupting residence time accumulation. This risk is inherent to all LSP-carried data and is governed by the same trust model assumed for MPLS networks per RFC 4385 and RFC 5085.
section: "8"
topics:
    - security
