summary: 'The ABNF defines vbr-info-header as one or more FWS-delimited semicolon-terminated elements (md-element, mc-element, mv-element). The type-string is constrained to exactly three values: "all", "list", or "transaction". The certifier-list is domain-name *('':'' domain-name).'
