document: rfc-8221
kind: normative-requirement
summary: AUTH_AES_XCBC_96 is SHOULD for IoT deployments and MAY for general VPN use (downgraded from SHOULD in RFC 7321). AUTH_AES_128_GMAC and AUTH_AES_256_GMAC are MAY and should only be used for AH, not ESP.
