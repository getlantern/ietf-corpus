document: rfc-1618
kind: interoperability-note
summary: LLC-IE values pertaining to PPP have not been assigned; any LLC-IE values received are not valid for PPP links and can be ignored for PPP service. The LLC-IE is not reliably transmitted end-to-end due to limited compatible switch deployment and diverse provider subscription policies.
