document: rfc-6501
kind: protocol-element
summary: The <to-mixer> and <from-mixer> elements control per-participant media streams to and from the mixer. The 'name' attribute identifies stream direction ('VideoIn', 'VideoOut', 'AudioOut', 'AudioIn'), and each element can have <floor> (boolean floor assignment) and <controls> (mute, gain, pause-video) child elements.
section: 4.6.5.6
topics:
