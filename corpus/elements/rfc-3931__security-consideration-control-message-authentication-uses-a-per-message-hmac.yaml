document: rfc-3931
kind: security-consideration
summary: Control Message Authentication uses a per-message HMAC-MD5 over the entire control message combined with a pre-shared secret and exchanged nonces, providing mutual authentication, integrity checking, and protection against spoofing and replay attacks. Authentication is always bidirectional and may be disabled if IPsec already provides equivalent protection.
section: "4.3"
topics:
    - vpn
    - security
    - crypto
