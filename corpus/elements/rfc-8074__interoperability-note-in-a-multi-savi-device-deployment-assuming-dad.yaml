document: rfc-8074
kind: interoperability-note
summary: In a multi-SAVI-device deployment, assuming DAD is performed throughout the security perimeter for all addresses regardless of assignment method, DAD responses propagate collision information to all SAVI devices, allowing First-Come, First-Served to work consistently across the perimeter.
