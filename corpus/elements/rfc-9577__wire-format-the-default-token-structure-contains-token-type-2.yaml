document: rfc-9577
kind: wire-format
summary: 'The default Token structure contains: token_type (2-octet uint16), nonce (32-octet Client-generated random), challenge_digest (32-octet SHA-256 hash of the original TokenChallenge), token_key_id (Nid-octet key identifier), and authenticator (Nk-octet value cryptographically bound to preceding fields). Nk and Nid are determined by token_type.'
section: 2.2.1
