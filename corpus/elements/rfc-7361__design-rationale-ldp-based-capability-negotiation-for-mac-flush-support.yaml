document: rfc-7361
kind: design-rationale
summary: 'LDP-based capability negotiation for MAC flush support was considered but deemed outside scope. Instead, the document relies on operator configuration responsibility: operators must ensure all VPLS devices support the optimization before enabling it, and implementations should provide per-PE administrative control over which flushing mode is used.'
