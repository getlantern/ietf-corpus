document: rfc-4398
kind: protocol-element
summary: The OID private type certificate section begins with a one-octet unsigned OID length followed by a BER-encoded OID indicating the nature of the remainder of the certificate section. Recognition of private types may use OID prefix matching rather than exact equality.
section: "2.1"
