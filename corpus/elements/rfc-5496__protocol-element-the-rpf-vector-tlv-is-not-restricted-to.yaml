document: rfc-5496
kind: protocol-element
summary: The RPF Vector TLV is not restricted to source trees; it may also be used to construct shared trees, in which case the Vector contains the IP address of the Rendezvous Point (RP). Procedures for (S,G) Joins apply equally to (*,G) and (*,*,RP) Joins.
section: "3.1"
topics:
    - multicast
    - routing
