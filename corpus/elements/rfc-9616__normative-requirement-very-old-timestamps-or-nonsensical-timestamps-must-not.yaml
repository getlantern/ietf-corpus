document: rfc-9616
kind: normative-requirement
summary: Very old timestamps or nonsensical timestamps MUST NOT be used to yield RTT samples. Timestamps appearing to be in the future or more than T=3 minutes in the past should be recorded but not used for RTT computation.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
