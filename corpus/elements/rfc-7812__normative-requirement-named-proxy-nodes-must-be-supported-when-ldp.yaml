document: rfc-7812
kind: normative-requirement
summary: Named proxy-nodes MUST be supported when LDP forwarding is supported and a label-binding for the destination is sent to an IBR. All routers in the MRT Island MUST attach the named proxy-node consistently, selecting no more than two proxy-node attachment routers.
section: "11.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
