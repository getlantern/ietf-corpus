document: rfc-8706
kind: interoperability-note
summary: A router that does not support restart capability will ignore the Restart TLV and reinitialize the adjacency normally, returning an IIH without the Restart TLV. On a P2P circuit, receipt of such an IIH is treated as an implicit acknowledgement. On a LAN, synchronization can still succeed if at least one neighbor is restart-capable.
section: 3.3.1
topics:
    - routing
