document: rfc-7469
kind: normative-requirement
summary: UAs MUST ignore any PKP header fields that do not conform to the specified grammar, and MUST NOT attempt to fix malformed header fields. If a directive is unrecognized, it MUST be ignored; recognized directives MUST be processed if the header otherwise conforms.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - security
