document: rfc-7877
kind: protocol-element
summary: 'The SPPF data model defines six first-class object types: Organization, Destination Group, Public Identifier, SED Group, SED Record, SED Group Offer, and Egress Route. All first-class objects extend the abstract BasicObjType containing Registrant ID (rant), Registrar ID (rar), and creation/modification timestamps.'
