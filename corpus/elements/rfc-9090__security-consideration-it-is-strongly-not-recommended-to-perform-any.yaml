document: rfc-9090
kind: security-consideration
summary: It is strongly NOT RECOMMENDED to perform any structural processing of OIDs (such as converting to dotted notation and back) unless absolutely necessary. OIDs and relative OIDs can always be treated as opaque byte strings; integer values are unlimited in range and conversion errors can introduce vulnerabilities.
section: "8"
topics:
    - cbor
    - security
