document: rfc-9291
kind: design-rationale
summary: The L2NM provides a network-centric (service-provider-internal) view deliberately distinct from the customer-facing L2SM (RFC 8466). Customer site information is not required in the L2NM; only PE-side VPN network access points are modeled. Mapping from L2SM to L2NM is implementation-specific and using the L2NM does not assume nor preclude exposure of the L2SM to customers.
section: "5"
topics:
