document: rfc-3821
kind: protocol-element
summary: The Connection Nonce is a 64-bit random number in the FSF that uniquely identifies a single TCP connect request. It SHALL differ from any recently used nonce value; implementors SHOULD follow RFC 4086 (Randomness Recommendations for Security) when generating it.
section: "7.1"
topics:
    - tcp
    - security
