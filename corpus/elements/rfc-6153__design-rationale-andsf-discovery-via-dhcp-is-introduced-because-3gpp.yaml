document: rfc-6153
kind: design-rationale
summary: ANDSF discovery via DHCP is introduced because 3GPP access-network level solutions are insufficient for mobile nodes to discover and select non-3GPP networks; DHCP provides a lightweight, existing infrastructure mechanism for distributing ANDSF server addresses alongside DNS-based discovery.
