document: rfc-9082
kind: security-consideration
summary: Search functionality requires significantly more server resources (memory, CPU, bandwidth) than basic lookup, increasing the risk of resource exhaustion and denial-of-service abuse. Mitigation includes restricting search to authenticated/authorized clients and rate limiting as described in RFC 7480.
section: "8"
topics:
    - security
    - http
