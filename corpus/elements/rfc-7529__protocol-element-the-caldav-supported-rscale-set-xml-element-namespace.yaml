summary: The CALDAV:supported-rscale-set XML element (namespace urn:ietf:params:xml:ns:caldav) contains zero or more CALDAV:supported-rscale child elements whose PCDATA content names a supported calendar system. Values are case insensitive but uppercase is preferred.
