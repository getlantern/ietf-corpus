document: rfc-8086
kind: normative-requirement
summary: A default GRE-in-UDP tunnel MUST NOT be deployed or configured to carry traffic that is not congestion controlled. IP unicast traffic is generally assumed to be congestion controlled; most IP multicast traffic is not appropriate for a default tunnel.
section: 2.1.1
rfc2119_level: MUST NOT
topics:
    - udp
    - congestion
