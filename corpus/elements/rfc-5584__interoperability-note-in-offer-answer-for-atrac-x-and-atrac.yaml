document: rfc-5584
kind: interoperability-note
summary: In offer/answer for ATRAC-X and ATRAC Advanced Lossless, an answer MUST NOT require capabilities beyond what was offered, but SHOULD provide values as close as possible to the offer. Each parameter combination (baseLayer, blockLength, sampleRate, channelID) is unique and not compatible with any other combination.
section: 7.6.1
topics:
    - rtp
    - realtime
