document: rfc-7217
kind: privacy-consideration
summary: MAC-address-based IIDs allow correlation of host activities within the same network and tracking across multiple networks. This method generates IIDs that are stable within a subnet but change across networks, mitigating cross-network tracking while retaining the operational benefits of stable addresses.
section: "1"
topics:
