document: rfc-9074
kind: protocol-element
summary: The ACKNOWLEDGED property specifies the UTC date-time at which a VALARM was last sent or acknowledged. Its value type is DATE-TIME and it is optional but must not occur more than once within a VALARM component.
section: "6.1"
