document: rfc-7988
kind: normative-requirement
summary: A Leaf A-D route joining an IR P-tunnel MUST identify the UMH by attaching an IP-address-specific (or IPv6-address-specific) Route Target, with the UMH's IP address in the Global Administrator field. The MPLS Label field of the PTA MUST be set to a non-zero value.
section: 4.1.1
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
