document: rfc-7830
kind: design-rationale
summary: The Padding option was designed as an EDNS(0) option (DNS-layer padding) rather than padding at the TLS layer, following a discussion at IETF 93. This approach keeps the padding mechanism within the DNS protocol itself, allowing DNS-aware entities to control padding independently of the transport.
section: "1"
topics:
