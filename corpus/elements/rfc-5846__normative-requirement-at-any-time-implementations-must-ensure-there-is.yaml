document: rfc-5846
kind: normative-requirement
summary: At any time, implementations MUST ensure there is no collision between the sequence numbers of all outstanding Binding Revocation Indication messages. The 16-bit Sequence Number enables the initiator to match a BRA to its corresponding BRI.
section: "5.1"
rfc2119_level: MUST
topics:
    - mobility
