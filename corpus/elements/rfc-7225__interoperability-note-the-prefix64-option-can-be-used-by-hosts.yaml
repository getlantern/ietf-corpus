document: rfc-7225
kind: interoperability-note
summary: The PREFIX64 option can be used by hosts implementing DNS64 in the stub resolver to synthesize AAAA records and to enable DNSSEC validation, since knowing the Pref64::/n allows the host to perform DNS64 locally rather than relying on a network-based DNS64 resolver.
section: 3.2.1
topics:
