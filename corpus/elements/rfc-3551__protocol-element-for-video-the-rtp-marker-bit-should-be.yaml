document: rfc-3551
kind: protocol-element
summary: For video, the RTP marker bit SHOULD be set to one in the last packet of a video frame and zero otherwise, allowing receivers to detect frame boundaries without waiting for a timestamp change. If a video image spans multiple packets, all share the same timestamp.
section: "5"
topics:
