document: rfc-7045
kind: interoperability-note
summary: Because IPv6 extension headers do not all follow a uniform TLV format, middleboxes that need to traverse the header chain require knowledge of each extension header's format. The header chain may also be fragmented, making stateless processing of the full chain unreliable.
section: "1"
topics:
