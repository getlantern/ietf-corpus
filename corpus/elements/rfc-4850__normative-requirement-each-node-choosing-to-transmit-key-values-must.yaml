kind: normative-requirement
summary: Each node choosing to transmit key values MUST be prepared to handle the response of RFC 3720 compliant nodes that do not understand the key; RFC 3720 states that compliant nodes MUST respond with X#NodeArchitecture=NotUnderstood.
