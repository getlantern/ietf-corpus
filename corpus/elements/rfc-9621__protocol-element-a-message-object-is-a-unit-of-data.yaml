document: rfc-9621
kind: protocol-element
summary: A Message object is a unit of data whose bytes are assumed to be ordered. If an application does not care about order between two spans of bytes, those spans are considered independent Messages. Messages are sent as payload of IP packets; one packet can carry one or more Messages or parts of a Message.
section: 4.1.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
