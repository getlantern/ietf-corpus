document: rfc-2782
kind: normative-requirement
summary: A SRV-cognizant client SHOULD query QNAME=_service._protocol.target, QCLASS=IN, QTYPE=SRV, then follow the priority/weight ordering process to build a connection attempt list. If no SRV reply is found, fall back to an A record lookup for the bare target.
section: Usage rules
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
