document: rfc-5839
kind: normative-requirement
summary: The subscriber MUST NOT infer any meaning from the value of an entity-tag; specifically, it MUST NOT assume identical entities for NOTIFYs with identical entity-tag values when those NOTIFYs result from subscriptions to different resources.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
