document: rfc-5815
kind: normative-requirement
summary: Extensions to the IPFIX SELECTOR MIB are governed by Expert Review; the group of experts MUST check requested MIB objects for completeness and accuracy. Requests duplicating existing functionality SHOULD be declined, the smallest available OID SHOULD be assigned, and new objects MUST be published via a well-established and persistent publication medium.
section: "6"
rfc2119_level: MUST
