document: rfc-2910
kind: normative-requirement
summary: A client MUST supply the target URI of an operation both as an HTTP Request-URI and as an operation attribute within the application/ipp body. The operation attribute target URI MUST be an absolute URI; the HTTP layer URI may be relative or absolute.
section: "4.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
