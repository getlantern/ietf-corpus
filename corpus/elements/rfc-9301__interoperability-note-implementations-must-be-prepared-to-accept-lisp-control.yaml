document: rfc-9301
kind: interoperability-note
summary: Implementations MUST be prepared to accept LISP control packets when either the source port or destination UDP port is set to 4342, because NATs may alter port number values in transit, so strict port matching would cause interoperability failures in NAT-traversal scenarios.
section: "5"
topics:
    - nat
    - routing
    - udp
