document: rfc-9553
kind: normative-requirement
summary: Implementations that set bidirectional text in free-form text properties MUST ensure each property value complies with the Unicode Bidirectional Algorithm. Implementations MUST NOT assume text values of adjacent properties are processed as a combined string.
section: 1.6.1
rfc2119_level: MUST
topics:
