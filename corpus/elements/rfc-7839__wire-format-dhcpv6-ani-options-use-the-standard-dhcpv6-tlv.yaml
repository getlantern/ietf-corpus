document: rfc-7839
kind: wire-format
summary: DHCPv6 ANI options use the standard DHCPv6 TLV format (2-octet Option-Code, 2-octet Option-Len, variable-length data). Option codes 105–110 (OPTION_ANI_ATT through OPTION_ANI_OPERATOR_REALM) are allocated from the DHCPv6 'Option Codes' registry.
