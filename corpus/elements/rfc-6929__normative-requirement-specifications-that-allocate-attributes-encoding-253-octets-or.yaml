document: rfc-6929
kind: normative-requirement
summary: Specifications that allocate attributes encoding 253 octets or more of data MUST request allocation from the long extended space; those always encoding fewer than 253 octets MUST NOT use the long extended space. Specifications allocating 20% or more of the standard space MUST NOT request from the standard space.
section: "6.6"
rfc2119_level: MUST
topics:
    - radius
    - registry
