document: rfc-2003
kind: normative-requirement
summary: To prevent routing loops, if the IP Source Address of a datagram to be tunneled matches the router's own IP address on any interface, the router MUST NOT tunnel the datagram and SHOULD discard it instead.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - mobility
