document: rfc-6165
kind: protocol-element
summary: The Multi-Topology-aware Port Capability (MT-PORT-CAP) TLV is IS-IS TLV type 143. It carries a 12-bit Topology Identifier (MT ID) and a set of sub-TLVs formatted per RFC 5305, and is carried within IS-IS Hello (IIH) PDUs.
