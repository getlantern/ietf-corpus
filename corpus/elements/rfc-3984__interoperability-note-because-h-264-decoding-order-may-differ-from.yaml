document: rfc-3984
kind: interoperability-note
summary: Because H.264 decoding order may differ from display order, RTP timestamps for H.264 streams may not be monotonically non-decreasing as a function of RTP sequence numbers. As a result, the RTCP interarrival jitter calculation defined in RFC 3550 section 6.4.1 may not reliably reflect actual network performance.
section: "5.1"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
