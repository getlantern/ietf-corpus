document: rfc-1566
kind: design-rationale
summary: Volume counters measure data logically above the mail transport protocol level. For SMTP-based MTAs this means kilo-octets of message header and body; for X.400-based MTAs it means kilo-octets of P2 data. This ensures protocol-neutral comparability.
