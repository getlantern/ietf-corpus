document: rfc-3851
kind: interoperability-note
summary: Messages using subjectKeyIdentifier in SignerIdentifier cannot be read by S/MIME v2 clients. S/MIME v2 clients can only decrypt with rsaEncryption and only verify signatures using rsaEncryption with SHA-1 or MD5; they do not implement id-dsa-with-sha1.
section: "2.6"
topics:
    - email
    - crypto
