document: rfc-7516
kind: normative-requirement
summary: In multi-recipient JWE JSON Serialization, all Header Parameters that specify the treatment of the plaintext MUST be the same for all recipients. Specifically, the 'enc' Header Parameter value and any algorithm parameters MUST be identical across all per-recipient JOSE Headers.
section: 7.2.1
rfc2119_level: MUST
topics:
    - jose
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
