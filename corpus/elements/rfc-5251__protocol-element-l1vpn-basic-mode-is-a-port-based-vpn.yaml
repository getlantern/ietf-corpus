document: rfc-5251
kind: protocol-element
summary: L1VPN Basic Mode is a port-based VPN where the basic unit of service is a GMPLS-based LSP established between a pair of CE ports within a given VPN port topology. The service provider network consists of P and PE devices; CE devices connect to PEs and initiate LSP establishment. Only point-to-point links are supported.
section: "1"
topics:
