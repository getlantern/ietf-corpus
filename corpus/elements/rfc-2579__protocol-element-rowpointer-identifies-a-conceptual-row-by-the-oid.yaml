summary: RowPointer identifies a conceptual row by the OID of the first accessible columnar object instance in that row (e.g., ifIndex.3). VariablePointer identifies a specific scalar or columnar object instance (e.g., sysContact.0). Both replaced the obsolete InstancePointer.
