document: rfc-2085
kind: normative-requirement
summary: When the destination is a multicast address with more than one sender sharing the same IPsec SA, Replay Protection SHOULD NOT be enabled. For multicast replay protection with multiple senders, each sender SHOULD have its own IPsec Security Association.
section: "2.1"
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
