document: rfc-4997
kind: design-rationale
summary: The lsb offset_param allows the interpretation interval to be positioned asymmetrically around the context reference value. Setting offset_param=0 allows only same-or-increasing values; offset_param=-1 allows only increasing values; offset_param=2^num_lsbs_param allows only decreasing values, enabling efficient encoding for fields with predictable monotonic behavior.
section: 4.11.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
