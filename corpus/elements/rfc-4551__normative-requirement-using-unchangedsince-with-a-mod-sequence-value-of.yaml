document: rfc-4551
kind: normative-requirement
summary: Using UNCHANGEDSINCE with a mod-sequence value of 0 always fails if the metadata item exists. System flags MUST always be considered existent, whether currently set or not, meaning UNCHANGEDSINCE 0 will always fail for system flags.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
