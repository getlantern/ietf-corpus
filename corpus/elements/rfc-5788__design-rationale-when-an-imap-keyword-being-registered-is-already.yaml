document: rfc-5788
kind: design-rationale
summary: When an IMAP keyword being registered is already deployed, Expert Reviewers should favor registering it over requiring perfect documentation or requesting a name change. This pragmatic policy recognizes the value of capturing de-facto standards even if imperfectly documented.
