document: rfc-4355
kind: interoperability-note
summary: MMS over the 'mailto:' URI scheme uses the MM3 interface, where the MMS Relay Server appears as a standard SMTP server to Internet mail servers but acts as a gateway adding internal MMSE state data as specialised headers, as specified in RFC 4356.
