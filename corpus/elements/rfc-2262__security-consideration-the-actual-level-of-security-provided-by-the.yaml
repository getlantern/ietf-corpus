document: rfc-2262
kind: security-consideration
summary: The actual level of security provided by the framework is primarily determined by the specific Security Model and SNMP application implementations incorporated. The Dispatcher and v3MP interact with Security Models via abstract service interface primitives but do not themselves implement security algorithms.
