document: rfc-6284
kind: security-consideration
summary: The 'portmapping-req' SDP attribute can be tampered with to redirect Token requests or prevent unicast session establishment. The SDP description MUST be integrity-protected and source-authenticated, e.g., via S/MIME, HTTPS, or SAP authentication.
section: "9.2"
topics:
    - security
    - rtp
