document: rfc-2821
kind: interoperability-note
summary: Accepting lines ending only in bare <LF> (without <CR>) has historically caused more interoperability problems than it solves. SMTP server systems MUST NOT accept bare <LF> as a line terminator, even as a robustness concession to non-conforming UNIX systems.
section: 4.1.1.4
topics:
    - email
