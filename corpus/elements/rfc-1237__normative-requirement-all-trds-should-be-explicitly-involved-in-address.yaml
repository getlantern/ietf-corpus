document: rfc-1237
kind: normative-requirement
summary: All TRDs should be explicitly involved in address administration for single-homed leaf routing domains attached to them. This reduces inter-domain routing overhead and is recommended as a valuable service offered by the TRD to its customers.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - routing
