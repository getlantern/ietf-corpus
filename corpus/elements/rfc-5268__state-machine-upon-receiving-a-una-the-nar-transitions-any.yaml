document: rfc-5268
kind: state-machine
summary: Upon receiving a UNA, the NAR transitions any proxy or INCOMPLETE neighbor cache entry to STALE state per RFC 4861 and immediately forwards arriving and buffered packets to the MN. If the NAR prefers to assign a different address, it sends a Router Advertisement with the NAACK option.
section: "4"
topics:
