document: rfc-922
kind: protocol-element
summary: The 'all zeros' convention is used notionally to refer to networks rather than hosts (e.g., 36.0.0.0 means network 36), while 'all ones' means broadcast to all hosts on that network (e.g., 36.255.255.255). All-zeros source addresses may appear in ICMP Information Request datagrams from hosts that do not yet know their network number.
