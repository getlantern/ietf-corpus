document: rfc-6696
kind: wire-format
summary: 'The EAP-Initiate/Re-auth packet (Type=2) contains: standard EAP header (Code=5, Identifier, Length), a flags byte with bits R (reserved, set 0), B (bootstrap), L (request lifetimes), a 16-bit unsigned SEQ in network byte order, one or more TV/TLV attributes, an 8-bit Cryptosuite field, and a variable-length Authentication Tag covering the entire packet excluding the tag itself.'
