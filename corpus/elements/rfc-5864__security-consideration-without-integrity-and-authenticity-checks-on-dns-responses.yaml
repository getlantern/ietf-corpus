document: rfc-5864
kind: security-consideration
summary: Without integrity and authenticity checks on DNS responses, an attacker may forge DNS replies to direct clients to a VLDB or PTS server under attacker control, potentially deceiving clients about volumes, file servers, and file contents, and enabling further compromise if the client executes programs or uses data from the AFS cell in a trusted manner.
section: "7"
topics:
    - dns
    - security
