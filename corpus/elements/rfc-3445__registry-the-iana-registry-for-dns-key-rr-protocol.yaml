summary: The IANA registry for DNS KEY RR Protocol Octet values is closed for new assignments. Values 1 (Email), 2 (IPSEC), 4 (TLS), and 255 (ANY) are re-assigned to RESERVED; value 3 (DNSSEC) remains unchanged; values 5-254 remain reserved. Future assignments require a standards action.
