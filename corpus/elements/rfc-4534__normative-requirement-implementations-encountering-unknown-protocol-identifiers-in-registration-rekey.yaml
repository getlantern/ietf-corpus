document: rfc-4534
kind: normative-requirement
summary: Implementations encountering unknown protocol identifiers in registration, rekey, or data fields MUST handle this gracefully by providing indicators that an unknown protocol is present; if the unknown protocol is the only allowable protocol, the member cannot join the group.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - multicast
