document: rfc-4607
kind: security-consideration
summary: Administrative scoping should not be relied upon as a security measure for SSM. No administratively scoped address range is defined for IPv4 SSM, and for IPv6, scope boundaries are not consistently enforced by all deployed routers.
section: "7.5"
topics:
    - multicast
    - security
