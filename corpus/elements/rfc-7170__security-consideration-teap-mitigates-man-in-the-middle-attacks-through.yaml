document: rfc-7170
kind: security-consideration
summary: TEAP mitigates man-in-the-middle attacks through the Crypto-Binding TLV, which cryptographically binds the inner EAP authentication to the outer TLS tunnel. An attacker who hijacks the outer tunnel cannot produce a valid Crypto-Binding TLV without access to the inner method keying material.
section: 7.4.3
topics:
    - security
    - crypto
