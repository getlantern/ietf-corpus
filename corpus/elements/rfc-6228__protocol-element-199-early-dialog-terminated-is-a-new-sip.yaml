document: rfc-6228
kind: protocol-element
summary: 199 Early Dialog Terminated is a new SIP provisional response code (1xx class) that a forking proxy or UAS sends to indicate to upstream SIP entities that a specific early dialog has been terminated before any final response is forwarded. It carries a To header tag identifying the terminated dialog and a Reason header describing why it was terminated.
