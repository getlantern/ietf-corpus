document: rfc-8960
kind: protocol-element
summary: 'The ''nhlfe-role'' enumeration defines three roles for a Next Hop Label Forwarding Entry: ''primary'' (carries traffic), ''backup'' (standby), and ''primary-and-backup'' (simultaneously serves both roles). This supports Fast Reroute and IP FRR scenarios as referenced in RFC 4090 and RFC 5714.'
section: "2.5"
topics:
    - mpls
    - yang
