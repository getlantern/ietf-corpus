document: rfc-6591
kind: normative-requirement
summary: If DKIM-Canonicalized-Header or DKIM-Canonicalized-Body would encode redacted data, they MUST NOT be included; otherwise they SHOULD be included, and the data presented MUST be exactly the canonicalized header and body as computed at the verifier.
section: 3.2.4
rfc2119_level: MUST NOT
