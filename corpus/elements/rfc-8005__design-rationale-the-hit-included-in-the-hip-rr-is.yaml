document: rfc-8005
kind: design-rationale
summary: The HIT included in the HIP RR is intended only as an optimization (e.g., table lookup), while the HIT used in the actual HIP exchange must always be freshly computed from the HI. This prevents reliance on potentially stale or colliding HIT values stored in DNS.
section: "4.1"
topics:
    - dns
    - security
    - crypto
