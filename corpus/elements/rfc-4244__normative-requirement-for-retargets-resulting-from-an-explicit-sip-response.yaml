document: rfc-4244
kind: normative-requirement
summary: For retargets resulting from an explicit SIP response, a Reason MUST be associated with the retargeted hi-targeted-to-uri. If the SIP response lacks a Reason header, the SIP response code MUST be included; non-SIP Reason headers (e.g., Q.850) MUST be captured as additional Reasons along with the SIP response code.
section: 4.3.3.1.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
