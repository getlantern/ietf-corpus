document: rfc-9432
kind: normative-requirement
summary: A catalog producer MUST NOT use catalog zone names that are not under the control of the catalog producer, with the exception of reserved names. Using a domain owned by the producer or a name under 'invalid.' (RFC 6761) is RECOMMENDED.
section: "6"
rfc2119_level: MUST NOT
topics:
    - dns
