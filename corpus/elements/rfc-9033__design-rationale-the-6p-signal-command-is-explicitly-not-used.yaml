document: rfc-9033
kind: design-rationale
summary: The 6P SIGNAL command is explicitly not used by MSF (Section 6), and the Metadata field is not used by MSF (Section 11). These are defined in 6P (RFC 8480) but MSF has no need for them, keeping the scheduling function simple.
section: "6"
