document: rfc-8753
kind: interoperability-note
summary: IDNA applications need not use the same Unicode version for all purposes; the normative requirement is only that the derived properties used for IDNA label processing be consistent with whichever Unicode version the application uses elsewhere. The IANA tables are advisory aids, not authoritative references.
