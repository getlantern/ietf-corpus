document: rfc-6148
kind: design-rationale
summary: Query by Remote ID greatly reduces the impact of negative caching compared to the data-driven approach. Because the response provides definitive information about all nodes behind a connection, there is no need to re-query for the same Remote ID, eliminating periodic lease queries triggered by DHCPLEASEUNKNOWN.
section: "4.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
