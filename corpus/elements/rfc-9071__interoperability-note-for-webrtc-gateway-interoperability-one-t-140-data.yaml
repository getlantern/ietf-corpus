document: rfc-9071
kind: interoperability-note
summary: For WebRTC gateway interoperability, one T.140 data channel per RTP source is established from gateway to each WebRTC participant; the data channel label parameter maps to the NAME RTCP field on the RTP side, and channels SHOULD be opened/closed as participants join or leave.
