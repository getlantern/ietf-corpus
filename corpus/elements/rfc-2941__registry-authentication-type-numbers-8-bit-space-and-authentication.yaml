document: rfc-2941
kind: registry
summary: Authentication type numbers (8-bit space) and authentication modifier values are assigned by IANA under a First Come First Served policy per RFC 2434. If more than 50% of the 8-bit number space becomes allocated, IANA must refer new requests to the IESG or a designated expert. IANA must not issue values without documentation of their use.
section: "1"
topics:
