document: rfc-5417
kind: protocol-element
summary: A CAPWAP WTP MAY use the IP address(es) provided in the CAPWAP AC DHCPv4 or DHCPv6 option to locate an AC prior to the CAPWAP Discovery process. RFC 5415 provides further guidance on the WTP's discovery process.
section: "2"
