document: rfc-7474
kind: security-consideration
summary: If the non-volatile storage holding the boot count is lost (e.g., due to hardware repair or router replacement), the authentication keys MUST be changed to prevent replay attacks, since an adversary could replay packets with sequence numbers from before the loss.
section: "8"
rfc2119_level: MUST
topics:
    - routing
    - security
