document: rfc-1587
kind: normative-requirement
summary: Only type-7 LSAs with the P-bit set and a non-zero forwarding address are eligible for translation to type-5. Translation is skipped if the route falls within a DoNotAdvertise address range. If no configured range matches, a direct type-7-to-type-5 translation occurs by default.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
