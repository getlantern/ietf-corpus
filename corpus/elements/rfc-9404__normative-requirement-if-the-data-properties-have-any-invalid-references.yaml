document: rfc-9404
kind: normative-requirement
summary: If the data properties have any invalid references or invalid data (including invalid base64 in data:asBase64 or invalid UTF-8 in data:asText), the server MUST NOT guess the user's intent and MUST reject the creation, returning a notCreated response for that creation id.
section: "4.1"
rfc2119_level: MUST NOT
