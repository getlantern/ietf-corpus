document: rfc-8012
kind: normative-requirement
summary: When the initiating LSR receives an echo reply with {L=0, E=1} DS Flags and valid contents, it MUST set EL_LSP=True, enabling the use of Multipath Information Type {10} for subsequent echo requests to discover entropy-label-based paths downstream.
section: "7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
