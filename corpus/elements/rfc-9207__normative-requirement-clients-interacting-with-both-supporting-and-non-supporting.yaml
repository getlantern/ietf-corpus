document: rfc-9207
kind: normative-requirement
summary: Clients interacting with both supporting and non-supporting authorization servers MUST retain state about whether each authorization server supports the `iss` parameter. Clients MUST reject authorization responses without `iss` from servers that, per client configuration, do support it.
section: "2.4"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
