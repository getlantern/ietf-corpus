document: rfc-7503
kind: normative-requirement
summary: It is RECOMMENDED that OSPFv3 routers supporting autoconfiguration minimally offer an option to explicitly configure a single password for HMAC-SHA authentication. The password should be entered as ASCII hexadecimal digits with 32 or more digits accepted; when configured, it applies to all autoconfigured interfaces with SA ID 1 and HMAC-SHA-256.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
