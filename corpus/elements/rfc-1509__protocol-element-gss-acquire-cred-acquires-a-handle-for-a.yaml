document: rfc-1509
kind: protocol-element
summary: gss_acquire_cred acquires a handle for a pre-existing credential by desired_name, requested lifetime, desired mechanisms, and usage (GSS_C_BOTH, GSS_C_INITIATE, or GSS_C_ACCEPT). It returns an output_cred_handle, actual_mechs, and the actual validity period time_rec. The routine is not a network-login function; it acquires handles to existing credentials only.
section: "3"
topics:
