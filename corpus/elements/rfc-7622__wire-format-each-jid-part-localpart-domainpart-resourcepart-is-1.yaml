document: rfc-7622
kind: wire-format
summary: Each JID part (localpart, domainpart, resourcepart) is 1 to 1023 octets in length, yielding a maximum total JID size of 3071 octets including the '@' and '/' separators. Length limits are based on octets (bytes), not characters, since UTF-8 may encode a single character as multiple octets.
