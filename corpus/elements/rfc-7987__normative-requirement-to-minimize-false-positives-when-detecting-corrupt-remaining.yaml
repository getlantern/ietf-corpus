document: rfc-7987
kind: normative-requirement
summary: 'To minimize false positives when detecting corrupt Remaining Lifetime fields, the following algorithm SHOULD be used: the LSP passed all Section 7.3.15.1 acceptance tests; the LSP is newer than the local LSPDB copy; the received Remaining Lifetime is less than ZeroAgeLifetime; and the adjacency to the neighbor has been up for at least ZeroAgeLifetime.'
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
