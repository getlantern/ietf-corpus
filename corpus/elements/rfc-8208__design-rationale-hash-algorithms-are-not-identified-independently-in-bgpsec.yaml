document: rfc-8208
kind: design-rationale
summary: Hash algorithms are not identified independently in BGPsec certificates or UPDATE messages; they are represented by a combined OID (ecdsa-with-SHA256) or a single algorithm suite identifier byte, reducing overhead and simplifying negotiation.
