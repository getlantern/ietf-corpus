document: rfc-9240
kind: normative-requirement
summary: The filtered property map response MUST include all inherited property values for requested entities and all entities from which requested entities can inherit. If a property for a requested entity is inherited from an entity not in the request, the response MUST include that property. If a hierarchical identifier covers sub-entities with different property values, the response MUST include all those sub-entities.
section: "8.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
