document: rfc-8530
kind: interoperability-note
summary: The logical-network-element module currently defines only a single augmentation for interface assignment (bind-lne-name). Future modules defining other host device resources (hardware, QoS, etc.) are expected to provide parallel augmentations for assigning those resources to LNEs.
section: "1"
topics:
    - yang
    - netconf
    - routing
