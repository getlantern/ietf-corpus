document: rfc-6960
kind: protocol-element
summary: 'OCSP defines three definitive certificate status values: ''good'' (no revocation known for the serial number within its validity interval), ''revoked'' (revoked permanently or on certificateHold, or optionally for non-issued certificates), and ''unknown'' (responder does not recognize the issuer or certificate).'
