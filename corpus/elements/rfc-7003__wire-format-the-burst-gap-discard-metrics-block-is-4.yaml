summary: 'The Burst/Gap Discard Metrics Block is 4 32-bit words (Block Length = 3). Fields are: BT (8 bits, value 20), I (2 bits), resv (6 bits), Block Length (16 bits), SSRC of Source (32 bits), Threshold (8 bits), Packets Discarded in Bursts (24 bits), Total Packets Expected in Bursts (24 bits), Reserved (8 bits).'
