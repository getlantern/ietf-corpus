document: rfc-9588
kind: design-rationale
summary: SPAKE was selected over other PAKE algorithms because its encryption method keeps public keys within the underlying group (enabling elliptic curve use at smaller key sizes), it requires only one message from each party (minimizing round trips), and it uses a small number of group operations (simplicity and efficiency).
