document: rfc-7469
kind: normative-requirement
summary: The max-age directive is REQUIRED in a Public-Key-Pins header and specifies the number of seconds the UA SHOULD treat the host as a Known Pinned Host. The max-age directive is meaningless in a PKP-RO header and UAs MUST ignore it there and not cache the header.
section: 2.1.2
rfc2119_level: REQUIRED
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
