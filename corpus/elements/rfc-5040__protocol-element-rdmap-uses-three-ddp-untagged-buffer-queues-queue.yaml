document: rfc-5040
kind: protocol-element
summary: 'RDMAP uses three DDP Untagged Buffer queues: Queue Number 0 for Send operations, Queue Number 1 for RDMA Read Request operations, and Queue Number 2 for Terminate operations. Tagged operations (RDMA Write, RDMA Read Response) use the DDP Tagged Buffer Model.'
section: "3.1"
