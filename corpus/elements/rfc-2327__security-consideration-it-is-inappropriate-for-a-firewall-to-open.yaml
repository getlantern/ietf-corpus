document: rfc-2327
kind: security-consideration
summary: It is INAPPROPRIATE for a firewall to open holes for unicast data streams based on SDP descriptions unless the description comes from inside the firewall. For multicast, restricting 'local' or 'site-local' scope within the firewall and refusing to pass such scopes provides separation between global and local multicast sessions.
section: "7"
topics:
    - realtime
    - security
