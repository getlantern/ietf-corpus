document: rfc-5792
kind: normative-requirement
summary: PA-TNC message senders MUST NOT reuse the same Message Identifier during a single assessment. Identifiers may be random or sequential but MUST remain unique per sender per assessment session.
section: "3.6"
rfc2119_level: MUST NOT
