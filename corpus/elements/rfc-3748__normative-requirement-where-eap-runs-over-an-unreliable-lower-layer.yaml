document: rfc-3748
kind: normative-requirement
summary: Where EAP runs over an unreliable lower layer, the retransmission timer SHOULD be dynamically estimated using RFC 2988 algorithms (SRTT, RTTVAR, RTO) with Karn's algorithm and jitter. A maximum of 3–5 retransmissions is suggested. Over a reliable lower layer, the retransmission timer SHOULD be set to infinite.
section: "4.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
