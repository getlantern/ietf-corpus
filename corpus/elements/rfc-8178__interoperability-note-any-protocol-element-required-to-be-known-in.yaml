document: rfc-8178
kind: interoperability-note
summary: Any protocol element required to be known in a given minor version must also be known in all subsequent minor versions, unless a later minor version marks it as mandatory to not implement. Protocol elements defined in an extension to a minor version are not required to be known in that minor version but must be known in the next minor version.
section: 4.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
