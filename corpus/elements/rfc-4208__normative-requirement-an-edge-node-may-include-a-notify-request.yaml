document: rfc-4208
kind: normative-requirement
summary: An edge-node MAY include a NOTIFY_REQUEST object in Path and Resv messages. A core-node MAY remove a NOTIFY_REQUEST object received from an edge-node before forwarding it. If the core-node updates the Notify Node Address with its own address, Notify messages MAY be selectively forwarded to the edge-node based on local policy.
section: "5"
rfc2119_level: MAY
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
