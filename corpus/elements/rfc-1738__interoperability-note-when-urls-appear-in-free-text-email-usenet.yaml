document: rfc-1738
kind: interoperability-note
summary: 'When URLs appear in free text (email, Usenet, print), the recommended convention is to delimit them with angle brackets and a ''URL:'' prefix: `<URL:...>`. Extra whitespace added for line-breaking should be ignored; whitespace must not be introduced after a hyphen because typesetters may add spurious hyphens at line ends.'
section: Appendix
