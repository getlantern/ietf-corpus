document: rfc-3996
kind: wire-format
summary: In a Get-Notifications response, each Event Notification Attributes Group MUST start with an 'event-notification-attributes-tag' (tag value 0x07) and end with an 'end-of-attributes-tag'. For Event Wait Mode, multipart/related MIME is used to separate multiple responses over time for a single request.
section: "11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
