document: rfc-2022
kind: wire-format
summary: 'MARS_MULTI (mar$op=2) carries: mar$tnum (16-bit count of returned ATM address pairs), mar$seqxy (16-bit: leading bit x is end-of-reply flag, remaining 15 bits y are sequence number starting at 1), and mar$msn (32-bit MARS Sequence Number). Multiple target ATM address pairs {mar$tha.i, mar$tsa.i} follow the fixed fields.'
section: 5.1.2
topics:
    - multicast
