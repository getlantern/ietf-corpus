document: rfc-1596
kind: normative-requirement
summary: 'SNMPv2 entities with Frame Relay Network Service interfaces MUST implement four groups: frnetservLportGroup, frnetservMgtVCSigGroup, frnetservPVCEndptGroup, and frnetservPVCConnectGroup. The frnetservAccountPVCGroup is mandatory only if PVC-basis accounting is performed; frnetservAccountLportGroup is mandatory only if logical-port-basis accounting is performed.'
section: "6"
rfc2119_level: MUST
topics:
    - routing
