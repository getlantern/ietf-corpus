document: rfc-4954
kind: protocol-element
summary: The AUTH command takes a mandatory SASL mechanism name and an optional initial-response encoded in BASE64 or the single character '='. A server challenge is sent as a 334 reply whose text part contains only the BASE64-encoded challenge string; the complete response line when no data is present is '334 ' (with a trailing space).
