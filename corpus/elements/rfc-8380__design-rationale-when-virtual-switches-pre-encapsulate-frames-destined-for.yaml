document: rfc-8380
kind: design-rationale
summary: When virtual switches pre-encapsulate frames destined for remote edge RBridges, the outer MAC destination becomes the local ingress RBridge MAC address, preventing local bridged LAN switches from needing to store MAC entries for remote hosts and dramatically reducing MAC table sizes.
