document: rfc-2740
kind: interoperability-note
summary: 'OSPFv3 requires an IPv6 protocol stack but all fundamental OSPF mechanisms remain unchanged from OSPFv2: flooding, DR election, area support, SPF calculations, interface and neighbor state machines, adjacency formation, and on-demand circuit, NSSA, and MOSPF optional capabilities are all preserved with identical semantics.'
