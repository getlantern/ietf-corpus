document: rfc-2305
kind: normative-requirement
summary: IFax devices MUST be compliant with RFC 822 and RFC 1123 for mail header format. The message header SHOULD include Message-ID and MUST include all fields required by those standards, such as DATE and FROM.
section: 2.2.1
rfc2119_level: MUST
topics:
    - email
