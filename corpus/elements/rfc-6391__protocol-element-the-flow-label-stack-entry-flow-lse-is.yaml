document: rfc-6391
kind: protocol-element
summary: The flow Label Stack Entry (flow LSE) is an additional MPLS label stack entry interposed between the PW LSE and the control word, or between the PW LSE and the PW payload when no control word is present. The label carried by the flow LSE is called the flow label and is chosen by the ingress PE to stimulate ECMP load-balancing in the PSN.
section: "1.3"
topics:
