document: rfc-9774
kind: security-consideration
summary: RPKI-ROV never allows a route with AS_SET to be considered Valid; BGPsec does not support AS_SETs; and ASPA-based AS_PATH verification always considers a route with AS_SET as Invalid and ineligible for route selection.
