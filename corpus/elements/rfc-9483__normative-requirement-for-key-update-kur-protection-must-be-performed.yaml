document: rfc-9483
kind: normative-requirement
summary: For key update (kur), protection MUST be performed using the certificate to be updated, the subject field/subjectAltName MUST contain the EE subject name of the existing certificate without modification, and the caPubs field in the kup response MUST be absent.
