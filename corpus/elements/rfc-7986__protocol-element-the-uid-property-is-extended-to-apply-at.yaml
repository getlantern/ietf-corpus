document: rfc-7986
kind: protocol-element
summary: The UID property is extended to apply at the VCALENDAR object level, providing a persistent, globally unique identifier for the iCalendar object. It can be used to detect duplicate calendar streams and, combined with LAST-MODIFIED, identify the most recent version.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
