document: rfc-9801
kind: interoperability-note
summary: Energy Efficient Ethernet (EEE) deep sleep mode is incompatible with PLE because it causes the CE to cease transmission entirely. Consequently, LPI is not supported for 10GBASE-R services across PLE. For 25GBASE-R and higher services, only fast wake mode is applicable and LPI is supported because the CE transmits /LI/ code blocks instead of stopping.
section: 4.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
