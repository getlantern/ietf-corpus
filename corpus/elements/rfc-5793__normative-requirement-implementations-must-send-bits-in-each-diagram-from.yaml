document: rfc-5793
kind: normative-requirement
summary: Implementations MUST send bits in each diagram from top to bottom and left to right within each 32-bit line. Multi-byte numeric fields MUST be transmitted in network (big endian) byte order.
section: "1.2"
rfc2119_level: MUST
