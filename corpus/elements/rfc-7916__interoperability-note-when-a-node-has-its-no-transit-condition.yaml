document: rfc-7916
kind: interoperability-note
summary: When a node has its no-transit condition permanently set (IS-IS overload bit or OSPF MaxLinkMetric), the standard Loop-Free Criterion may incorrectly exclude valid alternates. In such cases the no-transit property of the computing node ensures no neighbor will loop traffic back, allowing otherwise-excluded alternates to be used.
section: "3.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
