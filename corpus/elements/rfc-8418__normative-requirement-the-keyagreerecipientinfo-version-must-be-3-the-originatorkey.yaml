document: rfc-8418
kind: normative-requirement
summary: The KeyAgreeRecipientInfo version MUST be 3, the originatorKey alternative MUST be used, the originatorKey algorithm field MUST contain id-X25519 or id-X448, and the originator's ephemeral public key MUST be encoded as an OCTET STRING.
