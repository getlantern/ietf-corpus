document: rfc-5238
kind: normative-requirement
summary: DTLS over DCCP MUST wait until the completion of the DCCP handshake before restarting its DTLS handshake retransmission timer, to avoid multiple DTLS retransmissions queuing up before the first can be sent.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - congestion
