document: rfc-3887
kind: security-consideration
summary: 'Message tracking is not end-to-end: TLS between one client/server pair does not protect queries with prior or successive MTQP servers. Both parties must check TLS negotiation results; ignoring this step completely invalidates the security provided by TLS.'
section: "11"
