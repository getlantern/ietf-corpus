document: rfc-7159
kind: interoperability-note
summary: RFC 7159 removes the RFC 4627 constraint that a JSON text must be an object or array; any JSON value is now a valid top-level JSON text. Implementations generating only objects or arrays remain interoperable since all implementations accept them.
section: "2"
topics:
    - json
