summary: New ICMPv6 type codes from IETF RFC publication require permanent IANA registration. Working groups may request reclaimable type code assignments with WG consensus and AD approval; at 85% assignment saturation, reclaimable values are reviewed. External requests require an IETF document; RFC Editor contributions do not qualify.
