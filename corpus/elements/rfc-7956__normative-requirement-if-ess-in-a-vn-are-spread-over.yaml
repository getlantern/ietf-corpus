document: rfc-7956
kind: normative-requirement
summary: If ESs in a VN are spread over multiple RBridges, those RBridges MUST advertise each locally connected ES's IP address in the VN to other RBridges. If all ESs in a VN connect to a single RBridge, advertising the subnet prefix is sufficient.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
