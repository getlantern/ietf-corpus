document: rfc-9059
kind: normative-requirement
summary: An LSP (forward or reverse) MUST NOT be part of more than one Bidirectional LSP Association. Violation results in a PCErr with Error-Type=26 (Association Error), Error-value=14 (Association group mismatch).
section: "4.1"
rfc2119_level: MUST NOT
topics:
