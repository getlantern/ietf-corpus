document: rfc-3461
kind: normative-requirement
summary: When relaying to a non-conforming SMTP server, ENVID, NOTIFY, RET, and ORCPT parameters MUST NOT be issued. The relaying MTA must itself generate 'relayed' or 'failed' DSNs as appropriate based on the NOTIFY value and the SMTP reply code received.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - email
