summary: 'Two new bit flags are defined in the NO-PATH-VECTOR TLV of the NO-PATH object: Bit 6 (no migration path found) and Bit 7 (no feasible solution found meeting all GCO constraints). These allow the PCE to communicate specific GCO failure reasons in the PCRep message.'
