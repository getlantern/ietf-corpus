document: rfc-9541
kind: normative-requirement
summary: An update of a previously received B-MAC/I-SID route with an incremented Sequence Number MUST flush all C-MACs associated with that I-SID and B-MAC. C-MACs associated with the same I-SID but a different B-MAC MUST NOT be flushed.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
