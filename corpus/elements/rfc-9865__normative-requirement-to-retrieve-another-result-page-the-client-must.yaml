document: rfc-9865
kind: normative-requirement
summary: To retrieve another result page, the client MUST query the same service provider endpoint with all query parameters and values identical to the initial query, with the exception of the cursor value, which SHOULD be set to a nextCursor or previousCursor value returned by the service provider.
section: "2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
