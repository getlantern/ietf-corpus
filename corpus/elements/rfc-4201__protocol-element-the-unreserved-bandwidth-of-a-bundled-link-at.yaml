document: rfc-4201
kind: protocol-element
summary: The unreserved bandwidth of a bundled link at priority p is the sum of the unreserved bandwidths at priority p of all component links. The Maximum Reservable Bandwidth of a bundled link is the sum of Maximum Reservable Bandwidths of all component links (when configured per component link).
section: "3.7"
topics:
    - mpls
    - routing
