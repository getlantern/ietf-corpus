document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeadersFull (IE 515, type unsigned256, semantics flags) encodes a 256-bit field where each bit represents one IPv6 extension header type. Bit 0 (LSB) corresponds to Destination Options (protocol 60) and bit 255 (MSB) corresponds to the highest-numbered EH. A bit is set to 1 if any packet of the Flow contains that extension header.
section: "3.3"
topics:
