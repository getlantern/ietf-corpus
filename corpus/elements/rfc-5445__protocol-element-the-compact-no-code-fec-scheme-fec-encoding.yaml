document: rfc-5445
kind: protocol-element
summary: The Compact No-Code FEC Scheme (FEC Encoding ID 0) is a Fully-Specified FEC Scheme requiring no FEC encoding or decoding. Each encoding symbol consists of consecutive bytes of a source block, and the scheme is specified primarily to enable interoperability testing between implementations using the FEC building block.
