document: rfc-4790
kind: protocol-element
summary: The i;ascii-numeric collation operates on arbitrarily-sized unsigned decimal integers stored as octet strings. Input is truncated at the first non-digit; strings not starting with a digit represent positive infinity. It supports equality and ordering only, not substring.
section: "9.1"
topics:
