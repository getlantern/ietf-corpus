document: rfc-907
kind: protocol-element
summary: The acceptance/refusal (A/R) mechanism uses 8-bit message numbers (modulo 256) in each direction; up to 127 messages may be outstanding at any time. Explicit acceptance or refusal of message number N implicitly applies to all outstanding lower-numbered messages, enabling cumulative acknowledgment.
section: "5"
topics:
