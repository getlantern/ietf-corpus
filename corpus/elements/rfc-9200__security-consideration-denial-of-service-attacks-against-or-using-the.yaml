document: rfc-9200
kind: security-consideration
summary: 'Denial-of-service attacks against or using the introspection endpoint are a concern: an attacker may flood the RS to trigger excessive introspection calls to the AS, or flood the AS''s introspection endpoint directly. Profiles should consider rate limiting and authentication of introspecting entities.'
