document: rfc-2796
kind: interoperability-note
summary: Conventional BGP speakers that do not understand Route Reflectors can co-exist in the same AS as either members of a Non-Client group or a Client group, enabling easy and gradual migration from full mesh IBGP to the Route Reflection model.
