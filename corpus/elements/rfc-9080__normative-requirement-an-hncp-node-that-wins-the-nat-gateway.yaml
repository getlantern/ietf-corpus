document: rfc-9080
kind: normative-requirement
summary: An HNCP node that wins the NAT gateway election SHOULD NOT announce a source-specific IPv4 default route; Homenet does not require IPv4 source-specific routing, and doing so may cause packets from different parts of the network to follow different paths.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
    - ip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
