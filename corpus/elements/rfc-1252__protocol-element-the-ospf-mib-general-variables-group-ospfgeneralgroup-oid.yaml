document: rfc-1252
kind: protocol-element
summary: The OSPF MIB General Variables group (ospfGeneralGroup, OID ospf 1) contains router-wide parameters including ospfRouterId (32-bit router identifier), ospfAdminStat (enabled/disabled), ospfVersionNumber (read-only, value 2), ospfAreaBdrRtrStatus, ospfASBdrRtrStatus, ospfExternLSACount, ospfExternLSACksumSum, ospfTOSSupport, ospfOriginateNewLSAs, and ospfRxNewLSAs.
