summary: After initial GADAG construction, all remaining UNDIRECTED links are assigned directions based on a topological sort (Section 5.6). This augmentation provides shorter alternate paths and additional bandwidth for traffic on MRT alternates, reducing potential congestion compared to using only the links added during ear construction.
