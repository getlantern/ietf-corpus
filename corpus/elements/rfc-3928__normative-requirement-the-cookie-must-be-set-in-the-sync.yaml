document: rfc-3928
kind: normative-requirement
summary: The cookie MUST be set in the Sync Done control when the SearchResultDone resultCode is success or canceled. The server SHOULD also set the cookie when resultCode is lcupResourcesExhausted, timeLimitExceeded, sizeLimitExceeded, or adminLimitExceeded.
