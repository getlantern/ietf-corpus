document: rfc-6602
kind: normative-requirement
summary: If the Mobile Node Group Identifier option in a bulk PBU carries an unknown group identifier, the LMA MUST reject the PBU and send a PBA with Status INVALID_MOBILE_NODE_GROUP_IDENTIFIER (175).
section: 5.2.3
rfc2119_level: MUST
topics:
