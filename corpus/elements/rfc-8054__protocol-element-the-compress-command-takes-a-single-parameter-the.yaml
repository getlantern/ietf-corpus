document: rfc-8054
kind: protocol-element
summary: The COMPRESS command takes a single parameter (the algorithm name, e.g., 'DEFLATE') and returns 206 (compression active), 403 (unable to activate), or 502 (command unavailable if a compression layer is already active). Response 501 is used for syntactically invalid algorithm names and 503 for unsupported algorithms.
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
