document: rfc-2122
kind: design-rationale
summary: Service, username, and password are exchanged via a telnet/videotex-compatible text dialog (prompted by the server) rather than embedded in the URL, because the VEMMI terminal is in 'standard' (telnet/videotex) mode before the VEMMI session starts and the URL credential prohibition prevents embedding credentials.
section: "4"
topics:
    - security
