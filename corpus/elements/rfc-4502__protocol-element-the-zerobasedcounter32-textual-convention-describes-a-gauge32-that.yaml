document: rfc-4502
kind: protocol-element
summary: The ZeroBasedCounter32 textual convention describes a Gauge32 that resets to zero on creation and wraps at 2^32. It is used in tables where the INDEX space changes frequently or the TimeFilter mechanism is in use, enabling delta calculations from the initial value.
