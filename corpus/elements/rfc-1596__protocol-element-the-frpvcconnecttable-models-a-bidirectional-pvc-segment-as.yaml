document: rfc-1596
kind: protocol-element
summary: The frPVCConnectTable models a bidirectional PVC segment as a single entry indexed by frPVCConnectIndex, low-side ifIndex/DLCI, and high-side ifIndex/DLCI. The 'low' and 'high' designations are based on numerical ifIndex ordering. Each entry carries AdminStatus, separate L2H and H2L OperStatus, and corresponding LastChange timestamps.
section: "4.4"
topics:
