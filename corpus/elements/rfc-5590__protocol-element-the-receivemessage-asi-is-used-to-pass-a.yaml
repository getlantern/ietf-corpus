summary: 'The receiveMessage ASI is used to pass a message from the Transport Subsystem to the Dispatcher. Parameters: IN transportDomain, transportAddress, incomingMessage, incomingMessageLength, tmStateReference; OUT statusInformation. It replaces the informal ''Receive SNMP Message from Network'' arrows in RFC 3411 scenario diagrams.'
