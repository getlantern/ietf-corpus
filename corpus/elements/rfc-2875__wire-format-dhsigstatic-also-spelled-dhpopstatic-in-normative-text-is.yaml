document: rfc-2875
kind: wire-format
summary: DhSigStatic (also spelled DhPopStatic in normative text) is a SEQUENCE containing an OPTIONAL IssuerAndSerialNumber (identifying the certificate from which the recipient public key was taken) and a mandatory hashValue (MessageDigest) holding the HMAC-SHA1 output. It is encoded as a BIT STRING in the signature field.
