document: rfc-2228
kind: security-consideration
summary: 'Block-level authentication of data channel transfers enables insertion attacks: an adversary can replay individually valid blocks into the data stream producing a corrupted but undetected result. The security mechanism must include sequencing or anti-replay protections; many GSS-API mechanisms and the Kerberos mechanism in the appendices do so.'
section: "6"
topics:
    - security
    - crypto
