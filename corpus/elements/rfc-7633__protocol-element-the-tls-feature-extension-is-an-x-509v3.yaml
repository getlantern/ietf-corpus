document: rfc-7633
kind: protocol-element
summary: The TLS feature extension is an X.509v3 certificate extension identified by OID id-pe-tlsfeature (1.3.6.1.5.5.7.1.24). It allows a certificate to advertise which TLS features a server is required to support, enabling clients to enforce those features during the TLS handshake.
