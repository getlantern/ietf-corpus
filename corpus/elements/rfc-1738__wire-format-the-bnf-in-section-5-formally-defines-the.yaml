document: rfc-1738
kind: wire-format
summary: 'The BNF in Section 5 formally defines the URL grammar. The `escape` production is `''%'' hex hex`; `unreserved` characters are alphanumerics plus `$-_.+!*''(),`; `reserved` characters are `; / ? : @ & =`; `uchar` is unreserved or escape; `xchar` adds reserved to that set.'
section: "5"
