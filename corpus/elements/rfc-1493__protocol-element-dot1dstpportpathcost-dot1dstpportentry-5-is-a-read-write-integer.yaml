document: rfc-1493
kind: protocol-element
summary: dot1dStpPortPathCost (dot1dStpPortEntry 5) is a read-write INTEGER (1..65535) representing this port's contribution to the path cost toward the STP root. IEEE 802.1D-1990 recommends the default be inversely proportional to the attached LAN speed.
