document: rfc-9890
kind: interoperability-note
summary: Modules and their revisions are now explicitly maintained together in the registry. The updated policy distinguishes between initial version entries (subject to uniqueness) and revision entries (which reuse the initial name and namespace), aligning registry semantics with how YANG module versioning works in practice.
section: "3.2"
topics:
    - yang
    - registry
    - netconf
