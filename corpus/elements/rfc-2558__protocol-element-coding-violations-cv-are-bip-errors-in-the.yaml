document: rfc-2558
kind: protocol-element
summary: 'Coding Violations (CV) are BIP errors in the incoming signal: Section CVs use BIP-8 in byte B1; Line CVs use BIP-8s in B2 bytes (up to 8×N per STS-N frame); Path CVs use BIP-8 in byte B3; VT CVs use BIP-2 in the V5 overhead byte. Each BIP error increments the CV counter independently.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
