document: rfc-9059
kind: normative-requirement
summary: For PCC-initiated Single-Sided Bidirectional LSP Association, the PCC MUST send a PCRpt message to the PCE with both forward and reverse LSPs. For Double-Sided, both PCCs MUST send PCRpt with their forward LSPs.
section: "5.2"
rfc2119_level: MUST
topics:
