document: rfc-8666
kind: security-consideration
summary: Implementations MUST ensure malformed TLVs and sub-TLVs do not cause router crashes. Reception of malformed TLVs SHOULD be counted and/or logged, and logging SHOULD be rate limited to prevent DoS attacks from overloading the OSPFv3 control plane.
section: "11"
topics:
    - security
    - mpls
    - routing
