document: rfc-4444
kind: interoperability-note
summary: isisCircMeshGroupEnabled and isisCircMeshGroup implement mesh group flooding reduction from RFC 2973. Circuits in the same mesh group form a virtual multiaccess network; an LSP received on one member circuit is not flooded to other member circuits in the same group.
section: "4"
topics:
