document: rfc-6989
kind: protocol-element
summary: For MODP groups with small subgroups, the subgroup membership test requires computing r^q mod p = 1, where q is the subgroup size listed in the group's defining RFC. This test is approximately as expensive as the savings from DH key reuse.
section: "2.2"
topics:
