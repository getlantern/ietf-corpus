document: rfc-3124
kind: security-consideration
summary: A stream on the same host can arbitrarily slow down other streams in the same macroflow by reporting artificially high congestion estimates, a form of intra-host denial of service. The CM does not enforce correct behavior; a separate host-level policer or router machinery is required for enforcement.
section: "6"
topics:
    - congestion
    - security
