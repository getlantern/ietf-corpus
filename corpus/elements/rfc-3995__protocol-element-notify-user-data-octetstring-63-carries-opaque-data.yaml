document: rfc-3995
kind: protocol-element
summary: '''notify-user-data'' (octetString(63)) carries opaque data up to 63 octets that the Printer delivers to the Notification Recipient in each Machine Consumable Event Notification. If the length exceeds 63 octets, the Printer MUST treat it as an unsupported value. There is no supported or default Printer attribute for this field.'
section: 5.3.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
