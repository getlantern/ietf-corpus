document: rfc-8175
kind: protocol-element
summary: The Session Update Message (type 3) may be sent by either participant to communicate session-wide metric changes or Layer 3 address changes. When metric Data Items are included, they MUST be applied to all destinations in the information base for that session, overwriting any per-destination metrics previously stored.
section: "12.7"
topics:
    - routing
