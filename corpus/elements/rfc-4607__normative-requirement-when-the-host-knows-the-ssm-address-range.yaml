document: rfc-4607
kind: normative-requirement
summary: When the host knows the SSM address range, the host's operating system SHOULD return an error to an application that makes a non-source-specific request to receive multicast sent to an SSM destination address.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - multicast
