document: rfc-2388
kind: interoperability-note
summary: Many web applications use 'application/x-www-form-urlencoded' for form data, which is more compact but provides no opportunity to label data with content type, apply a charset, or use other encoding mechanisms. Applications may need to support both formats.
section: "5.6"
