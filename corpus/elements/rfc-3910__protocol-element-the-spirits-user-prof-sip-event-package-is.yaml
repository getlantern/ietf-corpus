document: rfc-3910
kind: protocol-element
summary: The 'spirits-user-prof' SIP event package is used for non-call-related cellular events (location updates, IMSI attach/detach). The Event header MUST be set to 'spirits-user-prof' and Allow-Events MUST include this token for supporting entities.
section: "6.3"
topics:
    - sip
    - realtime
    - mobility
