document: rfc-1232
kind: protocol-element
summary: ds1FracTable (OID ds1 5) maps DS1 channel numbers (1..32) to ifIndex values for fractional DS1 implementations. When ds1Index in the config table is 0, fractional DS1 is in use and this table provides the per-channel interface bindings.
