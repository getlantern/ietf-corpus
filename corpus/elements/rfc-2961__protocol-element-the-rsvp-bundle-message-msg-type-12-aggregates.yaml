document: rfc-2961
kind: protocol-element
summary: The RSVP Bundle message (Msg Type 12) aggregates multiple standard RSVP messages into a single IP datagram to reduce per-message processing overhead. Sub-messages may be any type except another Bundle message; each sub-message is processed independently using the Send_TTL from the bundle header.
