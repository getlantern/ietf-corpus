document: rfc-9254
kind: normative-requirement
summary: Unless specified otherwise by the implementing protocol, indefinite length encoding (per RFC 8949 Section 3.2) SHALL be supported by CBOR decoders used with YANG-CBOR, enabling implementations to emit arrays or maps before the number of entries is known.
section: "3"
rfc2119_level: REQUIRED
topics:
