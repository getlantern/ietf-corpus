document: rfc-6874
kind: design-rationale
summary: A proposed alternative to restrict ZoneID syntax to link-local addresses only was rejected by the 6man WG. The adopted solution allows a ZoneID on any IPv6 address to offer more flexibility for unknown future uses and to be more straightforward to implement.
section: A
topics:
