document: rfc-5005
kind: interoperability-note
summary: Although the feed extensions (fh:complete, fh:archive, link relations) are described in terms of Atom, they can also be used with RSS 2.0 by importing the fh namespace and using Atom link elements. In RSS 2.0, duplicate detection uses the guid element instead of atom:id.
section: B
