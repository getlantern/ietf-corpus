document: rfc-2122
kind: state-machine
summary: Before a VEMMI session begins, a terminal is in 'standard' mode (videotex or telnet window). The server may prompt for 'service:', 'username:', and 'password:'; the client answers each. The VEMMI session starts when the client receives the VEMMI_Open command from the server.
section: "4"
