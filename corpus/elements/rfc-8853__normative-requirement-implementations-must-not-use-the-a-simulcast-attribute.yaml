document: rfc-8853
kind: normative-requirement
summary: Implementations MUST NOT use the 'a=simulcast' attribute at the session level and MUST ignore it if received at the session level. Each SDP media description MUST contain at most one 'a=simulcast' line.
section: "5.2"
rfc2119_level: MUST NOT
topics:
