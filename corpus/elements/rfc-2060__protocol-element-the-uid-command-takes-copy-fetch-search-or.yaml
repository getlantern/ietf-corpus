document: rfc-2060
kind: protocol-element
summary: The UID command takes COPY, FETCH, SEARCH, or STORE as an argument and performs the equivalent operation using UIDs instead of message sequence numbers. UID SEARCH and UID FETCH always return a UID data item regardless of the data items requested.
section: 6.4.8
topics:
