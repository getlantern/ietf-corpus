document: rfc-5316
kind: registry
summary: 'This document registers three new sub-TLV types for TLV 141 in the ISIS sub-TLV registry: type 24 (remote AS number, 4 octets), type 25 (IPv4 remote ASBR identifier, 4 octets), and type 26 (IPv6 remote ASBR identifier, 16 octets). The registry for TLV 22 sub-TLVs is renamed to cover TLVs 22, 141, and 222.'
section: "6.2"
topics:
