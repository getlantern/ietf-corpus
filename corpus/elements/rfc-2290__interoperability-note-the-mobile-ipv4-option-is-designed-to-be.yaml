document: rfc-2290
kind: interoperability-note
summary: The Mobile-IPv4 option is designed to be backwards compatible with conventional nodes that do not implement it. When a peer sends Configure-Reject for the Mobile-IPv4 option, the mobile node falls back to standard IP-Address negotiation as if the option were never proposed.
section: "1.4"
topics:
    - mobility
    - ip
