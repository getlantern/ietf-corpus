document: rfc-9359
kind: normative-requirement
summary: If a receiving node has no IOAM capability to report, it MUST ignore the IOAM Capabilities Query Container. The node MUST then send an echo reply without IOAM capabilities or no echo reply, depending on whether the echo request includes other containers.
section: "3.1"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
