summary: The PM Loss Measurement Sub-TLV (sub-type 201, Length 16) contains a 3-bit OTF (Origin Timestamp Format, default IEEE 1588v1), T flag (traffic-class-specific, default 1), B flag (octet count, default 0), a 32-bit Measurement Interval (ms, default 100), a 32-bit Test Interval (ms, default 10), and a 32-bit Loss Threshold.
