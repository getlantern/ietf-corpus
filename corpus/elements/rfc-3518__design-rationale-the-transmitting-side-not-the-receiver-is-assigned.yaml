document: rfc-3518
kind: design-rationale
summary: The transmitting side (not the receiver) is assigned responsibility for updating the RIF in the split-bridge Source Routing model so that the receiving system can forward frames without inspecting or modifying the RIF, preserving algorithmic simplicity and ensuring interoperability.
