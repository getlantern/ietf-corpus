document: rfc-7606
kind: normative-requirement
summary: A BGP speaker advertising support for a typed address family (e.g., MCAST-VPN, EVPN) MUST handle routes with unrecognized NLRI types within that AFI/SAFI by discarding them, unless the relevant address family specification states otherwise.
section: "5.4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
