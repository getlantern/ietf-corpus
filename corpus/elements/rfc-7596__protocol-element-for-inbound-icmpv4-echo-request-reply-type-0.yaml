document: rfc-7596
kind: protocol-element
summary: For inbound ICMPv4 echo request/reply (Type 0 or 8), the lwAFTR uses the ICMP Identifier field as the source port for binding table lookup and forwards to the matched lwB4 IPv6 address. For all other ICMPv4 types, the embedded transport-layer header in the ICMP data field is used to extract the source port per RFC 5508 REQ-3.
section: "8.1"
topics:
    - nat
    - v6ops
