document: rfc-4676
kind: design-rationale
summary: The DHCP mechanism is classified as a GEOPRIV 'sighting' function — it conveys initial location information and is not required to have security capabilities, but is only intended for trusted and controlled environments. It does not support client-to-server location updates due to security concerns.
section: "1"
