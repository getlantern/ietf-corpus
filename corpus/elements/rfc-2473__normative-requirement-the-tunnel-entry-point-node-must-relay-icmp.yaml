document: rfc-2473
kind: normative-requirement
summary: The tunnel entry-point node must relay ICMP error messages received from inside the tunnel to the source of the original packet, translating tunnel ICMP codes (hop limit exceeded, unreachable, parameter problem) into appropriate ICMP messages for the original packet's protocol.
section: "8"
rfc2119_level: MUST
