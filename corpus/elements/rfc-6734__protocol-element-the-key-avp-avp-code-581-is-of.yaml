document: rfc-6734
kind: protocol-element
summary: The Key AVP (AVP Code 581) is of type Grouped and contains the type and keying material and, optionally, an indication of the usable lifetime of the key, the name of the key, and a Security Parameter Index (SPI). It allows transport of multiple cryptographic keys in a single Diameter message.
section: "3.1"
topics:
    - diameter
    - crypto
    - security
