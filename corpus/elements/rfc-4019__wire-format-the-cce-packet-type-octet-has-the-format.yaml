document: rfc-4019
kind: wire-format
summary: 'The CCE packet type octet has the format: bits 0–5 are ''1 1 1 1 1 0'', bit 6 is F, bit 7 is K. F,K=00 is reserved (IR-DYN collision), F,K=01 is CCE(), F,K=10 is CCE(ON), F,K=11 is CCE(OFF). The inner base header follows with its own type identifier.'
section: 5.3.2
topics:
