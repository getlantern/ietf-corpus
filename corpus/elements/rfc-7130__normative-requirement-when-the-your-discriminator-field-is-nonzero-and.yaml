document: rfc-7130
kind: normative-requirement
summary: When the Your Discriminator field is nonzero and a micro-BFD over a LAG session is found, the interface on which the micro-BFD control packet arrived MUST correspond to the interface associated with that session. This amends the reception procedure in RFC 5880 Section 6.8.6.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
