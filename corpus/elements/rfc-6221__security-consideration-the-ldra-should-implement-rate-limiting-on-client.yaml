document: rfc-6221
kind: security-consideration
summary: The LDRA SHOULD implement rate-limiting on client-originated traffic to prevent excessive process utilization. Traffic is easily identified since the LDRA only listens for DHCPv6 traffic to All_DHCPv6_Servers_and_Relay_Agents on UDP port 547; excess messages may be silently discarded.
section: "9"
