document: rfc-8584
kind: protocol-element
summary: The DF Election Extended Community is attached to ES routes (Route Type 4) to signal the desired DF election algorithm (DF Alg field, 5 bits) and capabilities (Bitmap field, 2 octets). Only one such Extended Community may be sent per ES route, and it signals the preferred—not the full supported—set.
section: "2.2"
topics:
    - routing
