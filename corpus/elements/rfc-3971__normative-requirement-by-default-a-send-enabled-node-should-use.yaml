document: rfc-3971
kind: normative-requirement
summary: By default, a SEND-enabled node SHOULD use only CGAs for its own addresses. Upon receiving a Redirect, the receiver MUST verify that the Target Address falls within the range defined by the router's certificate; failing Redirect messages MUST be treated as unsecured.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - security
    - ip
