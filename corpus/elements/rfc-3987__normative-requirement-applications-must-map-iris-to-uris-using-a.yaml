document: rfc-3987
kind: normative-requirement
summary: 'Applications MUST map IRIs to URIs using a two-step procedure: (1) generate a NFC-normalized UCS character sequence from the input IRI (with variant handling for paper/non-Unicode/Unicode-encoded inputs), then (2) convert each ucschar or iprivate character to its UTF-8 octet sequence and percent-encode each octet as %HH.'
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
