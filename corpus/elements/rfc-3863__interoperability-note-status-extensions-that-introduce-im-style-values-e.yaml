document: rfc-3863
kind: interoperability-note
summary: Status extensions that introduce IM-style values (e.g., 'away', 'busy') MUST also include a <basic> status value to maintain interoperability with user agents that do not recognize the extension namespace.
section: 4.2.4
topics:
