document: rfc-8638
kind: security-consideration
summary: To defend against state exhaustion attacks, BGP policies SHOULD be carefully configured so that AFBRs only accept Well-Known prefix advertisements from trusted peers. Cryptographic methods for authenticating BGP sessions (RFC 7454) SHOULD be used.
section: "10"
rfc2119_level: SHOULD
