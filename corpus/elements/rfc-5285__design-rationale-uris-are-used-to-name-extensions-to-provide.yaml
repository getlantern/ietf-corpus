document: rfc-5285
kind: design-rationale
summary: URIs are used to name extensions to provide a large, unallocated namespace and to give documentation on the extension. URIs are not required to be de-referencable, to permit confidential or experimental use and to handle the case where the defining organization ceases to exist.
