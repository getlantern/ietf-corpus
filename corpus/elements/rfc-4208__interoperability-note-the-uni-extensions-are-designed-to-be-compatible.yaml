document: rfc-4208
kind: interoperability-note
summary: The UNI extensions are designed to be compatible with the ASON architecture (ITU-T G.8080). When both UNI and NNI are GMPLS RSVP-based, the methodology allows for a single RSVP session to instantiate both UNI and NNI signaling if desired and permitted by Service Provider policy.
section: "1.1"
topics:
    - mpls
    - routing
