document: rfc-6931
kind: security-consideration
summary: Cryptographic algorithms become weaker over time as cryptanalysis techniques improve and computing performance increases. Implementations SHOULD be modular to allow new algorithms to be readily inserted, as the set of mandatory-to-implement algorithms will change over time.
section: "6"
topics:
