document: rfc-7455
kind: protocol-element
summary: The Multi-destination Tree Verification Message (MTVM, OpCode 67) is copied to the CPU of every intermediate RBridge on the distribution tree being verified. Only RBridges listed in the RBridge Scope TLV (Type 68) send replies; absent scope means all RBridges respond. Each Scope TLV holds up to 255 nicknames; multiple instances MAY be chained.
section: "11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
