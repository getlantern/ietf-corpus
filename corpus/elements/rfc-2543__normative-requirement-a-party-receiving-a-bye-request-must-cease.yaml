document: rfc-2543
kind: normative-requirement
summary: A party receiving a BYE request MUST cease transmitting media streams specifically directed at the party issuing the BYE. A party SHOULD issue a BYE before releasing a call.
section: 4.2.4
rfc2119_level: MUST
