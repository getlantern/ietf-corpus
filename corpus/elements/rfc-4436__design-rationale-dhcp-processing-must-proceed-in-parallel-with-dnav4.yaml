document: rfc-4436
kind: design-rationale
summary: DHCP processing MUST proceed in parallel with DNAv4 reachability tests, not after, because waiting for DNAv4 to fail before beginning DHCP can greatly increase total processing time—the opposite of the desired effect.
section: "1.1"
topics:
