document: rfc-7471
kind: normative-requirement
summary: Link delay, delay variation, and link loss MUST be encoded as integers; residual, available, and utilized bandwidth MUST be encoded in IEEE single-precision floating point. Delay and delay variation MUST be in microseconds, link loss MUST be a percentage, and bandwidth MUST be in bytes per second.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - measurement
