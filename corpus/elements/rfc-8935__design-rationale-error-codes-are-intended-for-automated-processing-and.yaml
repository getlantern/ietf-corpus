document: rfc-8935
kind: design-rationale
summary: Error codes are intended for automated processing and SHOULD identify distinct error classes to which an automated system can respond in a meaningfully different way (e.g., refreshing credentials and retrying for authentication_failed, vs. not retrying for invalid_request which represents a structural error unlikely to be resolved by retransmission).
section: "7.1"
topics:
    - http
    - registry
