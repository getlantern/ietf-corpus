document: rfc-3107
kind: normative-requirement
summary: A BGP speaker that uses Multiprotocol Extensions to carry label mapping information should use the Capabilities Optional Parameter (RFC 2842) to advertise the (AFI, SAFI) pairs available; the MP_EXT Capability Code (RFC 2858) is used for this purpose.
