document: rfc-6724
kind: interoperability-note
summary: The longest-matching-prefix heuristic is inadequate in multi-homed sites with multiple ISPs. Policy table configuration using distinct labels for each ISP's prefix achieves the desired traffic engineering; the default rules alone cannot solve this case.
