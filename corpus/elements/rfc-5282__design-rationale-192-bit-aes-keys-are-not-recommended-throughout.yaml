document: rfc-5282
kind: design-rationale
summary: 192-bit AES keys are NOT RECOMMENDED throughout this document (both for key length and for AEAD_* algorithm specification) in order to reduce the number of options and simplify interoperability. No AEAD_* algorithms for 192-bit AES keys are specified.
