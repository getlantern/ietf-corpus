document: rfc-3398
kind: protocol-element
summary: 'Number portability handling in INVITE-to-IAM translation: if ''npdi=yes'' is absent in the Request-URI, the primary tel URL number populates CPN; if ''npdi=yes'' is present, the FCI ''number translated'' bit must be set; if ''rn='' is also present, in ANSI ISUP the ''rn='' value populates CPN and the main number goes to Generic Digits Parameter (GAP).'
section: 7.2.1.1
