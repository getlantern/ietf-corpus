document: rfc-4788
kind: protocol-element
summary: The silencesupp parameter (values 0 or 1) indicates DTX capability and willingness. A value of 1 means the sender can both send and receive silence-suppressed speech; a value of 0 means DTX will not be used. Default is 1 if the parameter is absent.
section: "6.1"
topics:
    - realtime
    - rtp
    - voip
