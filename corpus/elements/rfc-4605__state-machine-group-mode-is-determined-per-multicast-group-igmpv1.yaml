document: rfc-4605
kind: state-machine
summary: 'Group mode is determined per multicast group: IGMPv1 mode if an IGMPv1 report is heard; IGMPv2 mode if an IGMPv2 report is heard but no IGMPv1; IGMPv3 mode if an IGMPv3 report is heard but no IGMPv1 or IGMPv2. The equivalent applies for MLD (MLDv1/MLDv2).'
section: "2.3"
topics:
    - multicast
