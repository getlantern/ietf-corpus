document: rfc-8040
kind: normative-requirement
summary: RESTCONF requires transport-layer integrity and confidentiality. A RESTCONF server MUST support TLS and SHOULD adhere to RFC 7525. The RESTCONF protocol MUST NOT be used over HTTP without TLS.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - tls
    - security
    - netconf
    - yang
