document: rfc-8556
kind: protocol-element
summary: At a BFER that is an egress PE, the upstream-assigned label is looked up in the context of the packet's BFIR-prefix to determine the egress VRF; the egress PE then uses the payload IP header, VRF multicast state, the label, and BFR-prefix to decide if the packet must be forwarded out one or more VRF interfaces.
section: 4.2.1
topics:
    - multicast
    - mpls
    - routing
