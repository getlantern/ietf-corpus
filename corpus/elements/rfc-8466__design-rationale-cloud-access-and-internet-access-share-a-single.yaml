document: rfc-8466
kind: design-rationale
summary: Cloud access and Internet access share a single cloud-access container because they share sufficient commonality at the service request level. Distinguishing Internet access from cloud access, or supporting private cloud access differently, is handled via augmentation or by using the site container with NNI flavor.
section: 5.2.3
topics:
