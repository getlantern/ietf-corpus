document: rfc-8152
kind: wire-format
summary: 'All COSE message structures are CBOR arrays whose first two elements are: (1) the protected header bucket encoded as a CBOR map serialized into a bstr, and (2) the unprotected header bucket as a plain CBOR map. Senders SHOULD encode an empty protected header as a zero-length bstr rather than a zero-length map (h''a0'').'
section: "3"
topics:
