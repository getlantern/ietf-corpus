document: rfc-8176
kind: protocol-element
summary: The 'amr' (Authentication Methods References) claim is a JSON array of case-sensitive strings identifying authentication methods used during authentication. It is defined in OpenID Connect Core 1.0 and registered in the IANA 'JSON Web Token Claims' registry. This specification defines the standard values for that array.
section: "1"
topics:
