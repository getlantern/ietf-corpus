document: rfc-5913
kind: design-rationale
summary: Placement of the Clearance attribute in PKCs is preferred when clearance information is relatively static, can be verified during PKC issuance (e.g., using local databases), or when revocation of the PKC itself is acceptable when clearance changes. Placement in ACs is preferred when clearance information is dynamic and changes should not trigger PKC revocation, or when clearance cannot be verified at PKC issuance time.
section: "1"
topics:
    - pkix
    - security
