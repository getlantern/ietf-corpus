document: rfc-3982
kind: normative-requirement
summary: The bottom-up URI resolution method MUST be identified as 'bottom' in IRIS URIs. Resolution proceeds by trying direct resolution on the full domain name, then progressively removing leftmost labels, and finally falling back to DNS address records with the IRIS well-known port.
section: "6.2"
rfc2119_level: MUST
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
