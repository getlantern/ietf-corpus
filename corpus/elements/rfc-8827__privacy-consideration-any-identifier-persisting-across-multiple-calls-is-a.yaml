document: rfc-8827
kind: privacy-consideration
summary: Any identifier persisting across multiple calls is a privacy risk for anonymous calling services. Such services SHOULD instruct the browser to use separate DTLS keys for each call and use TURN throughout. Browsers SHOULD implement the privacy-preserving CNAME generation mode of RFC 7022 to prevent cross-call correlation.
section: "9.2"
topics:
    - webrtc
    - privacy
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
