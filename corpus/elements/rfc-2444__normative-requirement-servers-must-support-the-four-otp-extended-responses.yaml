document: rfc-2444
kind: normative-requirement
summary: 'Servers MUST support the four OTP extended responses: ''hex'', ''word'', ''init-hex'', and ''init-word''. Servers MUST support ''word'' and ''init-word'' for the standard dictionary and SHOULD support alternate dictionaries. Servers MUST NOT require use of any additional OTP extensions or options.'
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
