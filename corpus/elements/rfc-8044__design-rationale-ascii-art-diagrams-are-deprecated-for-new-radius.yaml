document: rfc-8044
kind: design-rationale
summary: ASCII art diagrams are deprecated for new RADIUS attribute specifications because allocation from different extended spaces changes the attribute header format and Length field value in ways that cannot be determined prior to final IANA allocation, making pre-publication ASCII art inherently incorrect.
section: 2.1.2
topics:
