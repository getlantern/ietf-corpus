document: rfc-8381
kind: design-rationale
summary: The Sub-Protocol and Sub-Version fields after VERR are strongly RECOMMENDED but not mandated, because vendors may use those bits however they wish. The recommendation exists to allow multiple and evolving uses to be specified from a single OUI without requiring a new OUI allocation.
section: "2"
topics:
