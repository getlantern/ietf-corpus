document: rfc-8486
kind: interoperability-note
summary: The identification header in the Ogg format cannot exceed one page (65,025 octets), which limits the maximum Ambisonic order for family 3 full-order representations to below 12 when the stream count equals the Ambisonic order plus two non-diegetic channels.
section: "3.2"
