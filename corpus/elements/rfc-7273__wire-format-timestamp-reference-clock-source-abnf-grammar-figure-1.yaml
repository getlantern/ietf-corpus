summary: 'Timestamp reference clock source ABNF grammar (Figure 1): `clksrc` selects among `ntp`, `ptp`, `gps`, `gal`, `glonass`, `local`, `private`, or extension tokens. NTP is identified by `hostport` or `/traceable/`; PTP by version string, EUI-64 ClockIdentity (7 hyphen-separated octet pairs plus one), and optional domain name or domain number (0–127).'
