document: rfc-6750
kind: protocol-element
summary: The form-encoded body parameter method transmits the access token as the "access_token" parameter in the request entity-body, with Content-Type application/x-www-form-urlencoded. Multiple parameters MUST be separated using "&" (ASCII 38).
