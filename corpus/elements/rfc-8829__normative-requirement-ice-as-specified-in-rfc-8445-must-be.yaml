document: rfc-8829
kind: normative-requirement
summary: ICE as specified in RFC 8445 MUST be used in all session descriptions handled by JSEP implementations. Implementations MUST properly handle remote endpoints using ICE-lite or the older RFC 5245 version of ICE.
section: 5.1.1
rfc2119_level: MUST
