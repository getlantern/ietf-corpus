document: rfc-5966
kind: design-rationale
summary: RFC 1035's two-minute idle timeout recommendation for TCP connections is replaced with a default on the order of seconds because experience with HTTP and other protocols has shown that long timeouts cause resource exhaustion under heavy load and can trivially enable denial-of-service attacks.
section: "5"
topics:
    - dns
    - tcp
