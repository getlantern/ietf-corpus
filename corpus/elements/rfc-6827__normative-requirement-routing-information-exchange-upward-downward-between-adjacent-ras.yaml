document: rfc-6827
kind: normative-requirement
summary: Routing information exchange upward/downward between adjacent RAs MUST, by default, be limited to reachability information. Prefix aggregation and similar transformations are RECOMMENDED to reduce the volume of imported/exported data when consistency is maintained.
section: "8"
rfc2119_level: MUST
topics:
    - routing
