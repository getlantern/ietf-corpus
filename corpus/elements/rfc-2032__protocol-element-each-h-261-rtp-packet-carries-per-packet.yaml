document: rfc-2032
kind: protocol-element
summary: Each H.261 RTP packet carries per-packet state information — GOB number (GOBN), macroblock address predictor (MBAP), quantizer value (QUANT), and reference motion vector data (HMVD/VMVD) — so that the MBs in each packet can be decoded independently without requiring the preceding GOB or frame header.
section: "3.2"
