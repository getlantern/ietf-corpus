document: rfc-6245
kind: normative-requirement
summary: When the HA accepts a Registration Request with the GRE Key Extension, it MUST assign a GRE key and include the GRE Key Extension in the RRP. It MUST include the GRE Key Extension in all RRPs in response to any RRQ that included the extension, when a GRE key is available.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
