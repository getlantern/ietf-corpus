document: rfc-4306
kind: interoperability-note
summary: An active attacker can force two IKEv2-capable nodes to speak IKEv1 because IKEv1 has no mechanism for signaling ability to speak a higher version number. When a v2-capable node negotiates down to v1 due to an active attacker sending error messages, it SHOULD log that fact.
section: "2.5"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
