document: rfc-7737
kind: interoperability-note
summary: The Reply Mode Order TLV type 32770 is assigned from the range 32768-49161 in the MPLS LSP Ping Parameters registry. Values in this range designate optional TLVs that MUST be silently dropped if not recognized by the responder.
section: "7.1"
topics:
