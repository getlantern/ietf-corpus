document: rfc-5229
kind: protocol-element
summary: Backslash quoting is resolved before variable substitution; encoded character processing (per RFC 5228 Section 2.4.2.4) is performed before variable substitution but after quoting. This ordering ensures that "${fo\o}" yields the expansion of variable "foo".
section: "3.1"
topics:
