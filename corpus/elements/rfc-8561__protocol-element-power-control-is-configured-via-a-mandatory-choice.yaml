document: rfc-8561
kind: protocol-element
summary: Power control is configured via a mandatory choice between RTPC (Remote Transmit Power Control) and ATPC (Automatic Transmitter Power Control) containers. ATPC requires maximum-nominal-power, atpc-lower-threshold, and atpc-upper-threshold (all in dBm), with a YANG must constraint enforcing lower-threshold <= upper-threshold.
section: "3"
topics:
