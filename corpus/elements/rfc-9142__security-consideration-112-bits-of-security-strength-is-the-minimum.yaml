document: rfc-9142
kind: security-consideration
summary: 112 bits of security strength is the minimum required for SSH key exchange methods in this document. Both SHA-1 (80 bits) and RSA 1024-bit (80 bits) fall below this minimum and should be deprecated and disallowed as quickly as possible.
