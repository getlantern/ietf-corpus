document: rfc-9532
kind: normative-requirement
summary: A period character ('.') that appears within a DNS label rather than as a label separator MUST first be escaped as '\.' before percent-encoding. The resulting encoded sequence (e.g., '%5C.') MUST be treated as a single label upon parsing.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
