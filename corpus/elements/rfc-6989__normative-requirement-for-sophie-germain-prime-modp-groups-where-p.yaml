document: rfc-6989
kind: normative-requirement
summary: For Sophie Germain Prime MODP groups (where (p-1)/2 is also prime), each recipient MUST verify that the peer's public value r is in the legal range (1 < r < p-1). This applies to groups 1, 2, 5, 14, 15, 16, 17, and 18.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
