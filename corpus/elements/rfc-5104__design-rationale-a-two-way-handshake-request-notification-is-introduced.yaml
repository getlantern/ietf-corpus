document: rfc-5104
kind: design-rationale
summary: A two-way handshake (request + notification) is introduced only for messages where acknowledgement is required by nature and cannot be derived from the media bit stream. FIR instead uses command repetition with sequence numbers because decoder refresh points are directly identifiable in the stream.
