document: rfc-8335
kind: wire-format
summary: The Interface Identification Object (Class-Num 3) identifies a probed interface by name (C-Type 1), index (C-Type 2), or address (C-Type 3). For C-Type 3, the payload contains a 16-bit AFI field, an 8-bit Address Length, an 8-bit Reserved field, and a variable-length Address field padded to a 32-bit boundary.
section: "2.1"
