document: rfc-6006
kind: protocol-element
summary: 'The Branch Node Capability (BNC) Object (Object-Class 31) has the same format as the IRO (RFC 5440), supports only IPv4/IPv6 prefix sub-objects, and has two types: branch node list (type 1) and non-branch node list (type 2). At most one BNC object per PCReq.'
