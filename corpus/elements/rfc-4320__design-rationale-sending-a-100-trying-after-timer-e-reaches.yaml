document: rfc-4320
kind: design-rationale
summary: Sending a 100 Trying after Timer E reaches T2 (but not before) prevents blacklisting of a late-responding element without damaging recovery from unreliable transport failure; over reliable transports, sending it well in advance of timeout is sufficient.
section: "2.1"
topics:
    - sip
    - realtime
