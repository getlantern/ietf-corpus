document: rfc-4730
kind: wire-format
summary: 'The DRegex ABNF defines: DRegex = 1*(DRegexPosition [RepeatCount]); DRegexPosition is a DRegexSymbol or DRegexSet; DRegexSymbol is an optional ''L'' (long) modifier followed by a DRegexCharacter (digits 0-9, A-D, R, *, #, case-insensitive); RepeatCount is ''.'' (zero or more) or a curly-brace range quantifier.'
section: "5.1"
topics:
