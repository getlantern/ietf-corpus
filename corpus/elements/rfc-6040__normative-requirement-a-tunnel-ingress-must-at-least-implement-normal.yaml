document: rfc-6040
kind: normative-requirement
summary: A tunnel ingress MUST at least implement normal mode. Unless it will never be paired with legacy egress nodes (RFC 2003, RFC 2401, RFC 2481, or RFC 3168 limited functionality), an ingress MUST also implement compatibility mode.
section: "4.3"
rfc2119_level: MUST
topics:
    - ecn
    - ip
