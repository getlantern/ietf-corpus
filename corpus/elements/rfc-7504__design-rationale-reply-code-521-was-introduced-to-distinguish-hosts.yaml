document: rfc-7504
kind: design-rationale
summary: Reply code 521 was introduced to distinguish hosts that never accept mail from the broader use of 554, which covers rejection of mail from particular sources, destinations, or addresses. A dedicated code allows clients to distinguish permanent, host-wide non-acceptance from policy-based rejection.
section: "1"
topics:
    - email
