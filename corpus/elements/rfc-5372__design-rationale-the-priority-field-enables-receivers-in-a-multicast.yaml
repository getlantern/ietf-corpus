document: rfc-5372
kind: design-rationale
summary: The priority field enables receivers in a multicast environment with heterogeneous capabilities (e.g., TV vs. mobile) to independently select which packets are vital for their display quality, allowing a single sender to serve all clients without per-client streams or additional signaling.
