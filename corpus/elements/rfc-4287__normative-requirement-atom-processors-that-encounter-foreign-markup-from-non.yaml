document: rfc-4287
kind: normative-requirement
summary: Atom Processors that encounter foreign markup (from non-Atom vocabularies or future Atom extensions) in a legal location MUST NOT stop processing or signal an error. When unknown foreign markup appears as a child of atom:entry, atom:feed, or a Person construct, processors MUST NOT change their behavior as a result.
section: "6.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
