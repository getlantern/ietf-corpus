document: rfc-9685
kind: normative-requirement
summary: When forwarding anycast packets Down the RPL DODAG, a RPL router MUST copy and forward to one and only one of the children that advertised the anycast address in their DAO messages.
section: "6.4"
rfc2119_level: MUST
