document: rfc-1565
kind: registry
summary: applTCPProtoID (mib-2.27.4) and applUDPProtoID (mib-2.27.5) are OID subtrees used to construct protocol identifiers for TCP-based and UDP-based applications respectively that have not been assigned OIDs by other means. The form {applTCPProtoID port} identifies a TCP protocol by its primary port number (e.g., SMTP would be {applTCPProtoID 25}).
