document: rfc-4893
kind: design-rationale
summary: AS4_PATH and AS4_AGGREGATOR are defined as optional transitive attributes so they pass through OLD BGP speakers unmodified, preserving 4-octet AS path information end-to-end across legacy infrastructure without requiring OLD speaker upgrades.
