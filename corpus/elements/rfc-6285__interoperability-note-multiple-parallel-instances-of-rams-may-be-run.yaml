document: rfc-6285
kind: interoperability-note
summary: Multiple parallel instances of RAMS MAY be run simultaneously to rapidly acquire multiple RTP sessions. Each instance creates its own unicast RTP session, so n simultaneous session acquisitions produce n unicast burst sessions. Within a single instance, all streams of one session share one unicast session.
section: "1.1"
topics:
    - rtp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
