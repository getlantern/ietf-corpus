document: rfc-4340
kind: registry
summary: This document creates the DCCP Congestion Control Identifiers (CCIDs) registry; CCIDs 2 and 3 are defined, 0–1 and 4–255 are reserved. New CCIDs require an approved CCID Profile document. It also creates the Service Codes registry with First Come First Served assignment policy.
