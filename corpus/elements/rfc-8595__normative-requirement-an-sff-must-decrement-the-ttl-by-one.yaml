document: rfc-8595
kind: normative-requirement
summary: An SFF MUST decrement the TTL by one each time it performs a lookup to forward a packet to the next SFF. If the TTL decrements to zero, the SFF MUST NOT send the packet and MUST discard it.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
