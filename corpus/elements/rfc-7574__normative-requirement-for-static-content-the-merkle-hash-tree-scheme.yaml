document: rfc-7574
kind: normative-requirement
summary: For static content, the Merkle Hash Tree scheme MUST be used when PPSPP operates over the Internet, to satisfy the IETF requirement for strong security (RFC 3365). It MAY be used in benign environments. The scheme is therefore mandatory to implement.
section: "5"
rfc2119_level: MUST
topics:
    - realtime
    - security
    - crypto
