document: rfc-8223
kind: interoperability-note
summary: This document updates RFC 7473 to enable advertisement of LDP FEC label bindings over tLDP sessions based on TAC-negotiated applications, with TAC taking precedence over SAC for enabling applications and SAC taking precedence over TAC for disabling advertisements.
