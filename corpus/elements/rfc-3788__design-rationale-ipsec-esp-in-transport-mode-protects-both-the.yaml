document: rfc-3788
kind: design-rationale
summary: IPsec ESP in transport mode protects both the SCTP payload and SCTP control information, while TLS only protects the payload leaving SCTP control chunks exposed. This difference motivated making IPsec mandatory and TLS optional.
section: "7"
topics:
