document: rfc-4293
kind: protocol-element
summary: 'IpAddressStatusTC is a textual convention defining eight address states: preferred(1), deprecated(2), invalid(3), inaccessible(4), unknown(5), tentative(6), duplicate(7), and optimistic(8). Most states correspond to IPv6 stateless address autoconfiguration; IPv4 addresses default to preferred(1).'
