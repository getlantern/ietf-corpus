document: rfc-2943
kind: state-machine
summary: 'Mutual DSA authentication adds a fifth step beyond unilateral: after the client sends DSS_CERTA_TOKENAB, the server replies with DSS_CERTB_TOKENBA2 containing Sequence(TokenID, CertB, TokenBA2). Authentication type pair uses AUTH_HOW_MUTUAL instead of AUTH_HOW_ONE_WAY.'
