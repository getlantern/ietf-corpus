summary: Micro STAMP-Test reuses all procedures from STAMP RFC 8762 Section 4, adding only the Micro-session ID TLV handling. The mapping between micro STAMP sessions and member link identifiers can be configured by augmenting the STAMP YANG data model, though the augmentation details are out of scope.
