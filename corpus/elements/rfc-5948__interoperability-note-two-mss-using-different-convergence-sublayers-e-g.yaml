document: rfc-5948
kind: interoperability-note
summary: Two MSs using different Convergence Sublayers (e.g., one using Ethernet CS and another using IPv4 CS) cannot communicate at the data link layer and require interworking at the IP layer; they must be configured on different subnets (see RFC 4840).
section: Appendix A
topics:
