document: rfc-7844
kind: privacy-consideration
summary: The DHCPv6 Confirm message includes previously assigned addresses, allowing an observer to trivially identify a client's previous points of attachment. Clients interested in privacy SHOULD NOT send Confirm messages.
section: "4.2"
topics:
    - privacy
    - dns
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
