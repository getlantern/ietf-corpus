document: rfc-9989
kind: security-consideration
summary: Relaxed alignment mode, while more practical, allows subdomains and sibling domains under the same Organizational Domain to pass DMARC. Strict alignment should be considered when the Domain Owner needs to prevent any subdomain from being able to authenticate as the parent domain.
section: "11.8"
topics:
