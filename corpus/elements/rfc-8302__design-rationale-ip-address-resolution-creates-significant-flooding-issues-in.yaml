document: rfc-8302
kind: design-rationale
summary: IP address resolution creates significant flooding issues in data centers. Proxy ARP/ND on edge RBridges avoids this flooding. When all IP/MAC mappings are known via management, control plane, or data-plane snooping, flooding of ARP/ND can be completely suppressed.
section: "2"
topics:
    - routing
