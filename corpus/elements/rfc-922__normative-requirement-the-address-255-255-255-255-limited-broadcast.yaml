document: rfc-922
kind: normative-requirement
summary: The address 255.255.255.255 (limited broadcast) must not be forwarded by gateways. It is intended for use on the local hardware network only, such as by hosts that do not yet know their network number.
section: "7"
rfc2119_level: MUST NOT
