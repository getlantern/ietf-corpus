document: rfc-9524
kind: design-rationale
summary: The Replication-ID is defined as a variable-length field (not fixed at 32 bits) to allow future extensions or use-case-specific modifications. The length is specified in the signaling mechanism (e.g., SR P2MP policy) rather than hardcoded in the forwarding plane specification.
section: "2"
topics:
