document: rfc-8010
kind: normative-requirement
summary: Security MUST NOT be compromised when a Client supplies a lower version-number parameter. For example, an IPP/2.0 Printer enforcing Digest Authentication MUST enforce it equally for version 1.1 requests.
section: "9.1"
rfc2119_level: MUST
topics:
    - http
    - security
