document: rfc-6757
kind: normative-requirement
summary: When encoding a PLMN Identifier in the Network Name field, both MNC and MCC MUST be 3 digits; if MNC is only 2 digits, it MUST be preceded with a '0'. Encoding MUST be UTF-8.
section: 3.1.1
rfc2119_level: MUST
