document: rfc-7195
kind: security-consideration
summary: Phone numbers in the SDP 'c=' line are sensitive; implementations should respect Calling Line Identification Restriction (CLIR) preferences and, if unable to suppress the number, inform the user that their phone number may be transmitted to the other party.
