document: rfc-2848
kind: normative-requirement
summary: 'A PINT server MUST support the SIP ''Warning:'' header so that it can signal lack of support for individual PINT features. SIP servers that do not understand PINT extensions at all are strongly encouraged to implement Warning: headers to indicate this.'
section: 3.5.2
rfc2119_level: MUST
topics:
    - realtime
    - sip
