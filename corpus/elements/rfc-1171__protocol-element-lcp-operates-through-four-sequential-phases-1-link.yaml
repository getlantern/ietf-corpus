document: rfc-1171
kind: protocol-element
summary: 'LCP operates through four sequential phases: (1) Link Establishment and Configuration Negotiation, (2) Link Quality Determination (optional), (3) Network-Layer Protocol Configuration Negotiation, and (4) Link Termination. Network-layer datagrams may only be exchanged after LCP reaches the Open state.'
section: "4"
