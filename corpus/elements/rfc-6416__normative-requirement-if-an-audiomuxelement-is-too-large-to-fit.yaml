document: rfc-6416
kind: normative-requirement
summary: If an audioMuxElement is too large to fit within the Path MTU, the audioMuxElement SHALL be fragmented and spread across multiple RTP packets. It is RECOMMENDED to put one audioMuxElement in each RTP packet when size permits.
section: "6.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
