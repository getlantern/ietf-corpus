document: rfc-8909
kind: design-rationale
summary: Specifications for objects to be escrowed MUST NOT include transient objects that can be recreated by a new registry, particularly those of delicate confidentiality such as DNSSEC KSK/ZSK private keys, to minimize unnecessary exposure of sensitive material.
section: "3"
topics:
    - registry
    - security
