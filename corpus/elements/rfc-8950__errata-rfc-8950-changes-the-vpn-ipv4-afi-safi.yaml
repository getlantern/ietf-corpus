document: rfc-8950
kind: errata
summary: RFC 8950 changes the VPN-IPv4 (AFI/SAFI <1/128>) next-hop encoding from a plain IPv6 address of 16 or 32 bytes (as in RFC 5549) to a VPN-IPv6 address of 24 or 48 bytes with an 8-octet zero RD prefix, addressing Erratum ID 5253 on RFC 5549 and aligning with existing deployed implementations.
section: "2"
topics:
    - bgp
    - ip
    - v6ops
    - mpls
