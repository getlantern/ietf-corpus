document: rfc-2205
kind: normative-requirement
summary: The IP source address of a Path message must be an address of the sender it describes, and the destination address must be the session DestAddress. This ensures correct routing through non-RSVP clouds where standard IP forwarding is used.
section: 3.1.3
rfc2119_level: MUST
topics:
    - qos
    - realtime
    - ip
