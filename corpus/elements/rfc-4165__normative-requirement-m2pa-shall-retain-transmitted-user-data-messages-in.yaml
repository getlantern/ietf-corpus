document: rfc-4165
kind: normative-requirement
summary: M2PA SHALL retain transmitted User Data messages in a retransmit queue until they are acknowledged, to support MTP3 data retrieval during changeover. Link Status messages and empty User Data messages SHALL NOT be placed in the retransmit buffer and SHALL NOT be retrieved during changeover.
section: 4.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
