document: rfc-9917
kind: normative-requirement
summary: The Length field of the IS-IS FAERAG Sub-TLV MUST be a multiple of 4 octets. If the length is not a multiple of 4 octets, the entire sub-TLV MUST be ignored by the receiver.
section: "5"
rfc2119_level: MUST
topics:
