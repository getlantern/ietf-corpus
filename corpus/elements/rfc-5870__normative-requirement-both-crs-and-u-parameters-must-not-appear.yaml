document: rfc-5870
kind: normative-requirement
summary: Both 'crs' and 'u' parameters MUST NOT appear more than once each. The 'crs' and 'u' parameters MUST appear before any other parameters, and 'crs' MUST be listed before 'u' when both are present.
section: "3.3"
rfc2119_level: MUST NOT
