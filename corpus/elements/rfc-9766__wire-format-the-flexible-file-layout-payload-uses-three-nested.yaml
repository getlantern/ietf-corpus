document: rfc-9766
kind: wire-format
summary: 'The flexible file layout payload uses three nested XDR structures: ff_data_server_wcc4 (ffdsw_deviceid, ffdsw_stateid, ffdsw_fh_vers, ffdsw_attributes), ff_mirror_wcc4 (array of ff_data_server_wcc4), and ff_layout_wcc4 (array of ff_mirror_wcc4), mirroring the hierarchy of ff_layout4.'
section: "3.7"
