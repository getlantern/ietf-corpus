document: rfc-4055
kind: normative-requirement
summary: Entities that validate RSASSA-PSS signatures MUST support SHA-1; support for SHA-224, SHA-256, SHA-384, and SHA-512 is optional. CAs that use RSASSA-PSS for signing certificates or CRLs MUST include RSASSA-PSS-params in the signatureAlgorithm parameters in TBSCertificate or TBSCertList.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
