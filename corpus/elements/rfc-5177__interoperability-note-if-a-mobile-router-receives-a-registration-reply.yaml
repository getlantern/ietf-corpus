document: rfc-5177
kind: interoperability-note
summary: If a Mobile Router receives a Registration Reply with no Mobile Network extensions, it must interpret this as the Home Agent not supporting Mobile Networks (i.e., the Home Agent is a legacy Mobile IPv4 Home Agent that does not implement this specification).
section: "5.1"
topics:
