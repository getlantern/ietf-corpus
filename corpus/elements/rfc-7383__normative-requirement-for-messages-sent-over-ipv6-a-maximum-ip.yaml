document: rfc-7383
kind: normative-requirement
summary: For messages sent over IPv6, a maximum IP datagram size of 1280 bytes is RECOMMENDED as the fragmentation threshold; for IPv4, 576 bytes is RECOMMENDED. Implementations may use other values if appropriate.
