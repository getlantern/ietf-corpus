document: rfc-5752
kind: protocol-element
summary: The multiple-signatures attribute (OID id-aa-multipleSignatures, pkcs9.id-aa.51) is a signed CMS attribute that each SignerInfo uses to cross-reference all other SignerInfo objects produced by the same signer. For N signatures by one signer, each SignerInfo contains N-1 attribute values.
