document: rfc-6330
kind: security-consideration
summary: The RaptorQ FEC scheme does not include any inherent source authentication or integrity protection. A receiver that processes packets from an unauthenticated source is vulnerable to injection of malicious encoding symbols that can prevent recovery of the source block; higher-layer protocols or authentication mechanisms MUST be used to mitigate this threat.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
