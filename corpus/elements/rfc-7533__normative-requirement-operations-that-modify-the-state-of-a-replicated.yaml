document: rfc-7533
kind: normative-requirement
summary: Operations that modify the state of a replicated fileset MUST result in the update of all replicas in a consistent manner. If replicas are unavailable, the operation MAY succeed, but changes MUST be applied before the unavailable replicas are brought back online.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
