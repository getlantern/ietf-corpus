document: rfc-8505
kind: state-machine
summary: When an address is scheduled for removal, the 6LBR SHOULD keep its NCE in a DELAY state for a configurable period before silently removing it. This prevents premature removal when a mobile node has de-registered from one 6LR but has not yet completed registration to a new one.
section: "5.7"
topics:
