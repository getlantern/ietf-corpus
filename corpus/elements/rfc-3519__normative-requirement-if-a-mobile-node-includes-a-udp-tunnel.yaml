document: rfc-3519
kind: normative-requirement
summary: If a mobile node includes a UDP Tunnel Request extension but receives a Registration Reply without a UDP Tunnel Reply extension, the mobile node MUST NOT use UDP tunnelling; the HA is assumed not to understand the extension.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
    - nat
    - mobility
