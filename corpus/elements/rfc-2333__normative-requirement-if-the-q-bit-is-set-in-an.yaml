document: rfc-2333
kind: normative-requirement
summary: If the Q bit is set in an NHRP Request and the destination is not directly adjacent to the egress router, the safe mode of operation for the egress router is to issue a negative NHRP Reply (NAK), thereby forcing data packets to follow the routed path and avoiding potential persistent loops.
section: "3"
rfc2119_level: SHOULD
topics:
    - ip
    - routing
    - security
