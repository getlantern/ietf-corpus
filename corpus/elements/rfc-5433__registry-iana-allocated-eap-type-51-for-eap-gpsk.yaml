summary: 'IANA allocated EAP Type 51 for EAP-GPSK and created four new registries: ''EAP-GPSK Ciphersuites'' (CSuite/Specifier, 16-bit), ''EAP-GPSK Protected Data Payloads'' (PData/Specifier, 16-bit), ''EAP-GPSK Failure Codes'' (32-bit), and ''EAP-GPSK OP Codes'' (8-bit). New values require IETF Review.'
