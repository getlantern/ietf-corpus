document: rfc-5190
kind: protocol-element
summary: 'Four address tuples A0–A3 are defined in each midcomRuleEntry: A0 is the internal endpoint, A1 is the middlebox inside address (virtual endpoint on the internal side), A2 is the middlebox outside address (virtual endpoint on the external side), and A3 is the external endpoint. Each tuple carries an IP version, IP address, prefix length, and port.'
