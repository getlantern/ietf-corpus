document: rfc-4095
kind: normative-requirement
summary: When multiple NAPTR records are returned, the one(s) with the lowest ORDER value that have a matching SERVICE field MUST be used. Of those with the lowest ORDER value, those with the lowest PREFERENCE SHOULD be used.
section: "2"
rfc2119_level: MUST
topics:
    - dns
    - email
