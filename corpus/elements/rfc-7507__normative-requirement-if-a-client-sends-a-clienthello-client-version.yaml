document: rfc-7507
kind: normative-requirement
summary: If a client sends a ClientHello.client_version lower than its highest supported version (i.e., a fallback retry), it SHOULD include TLS_FALLBACK_SCSV in ClientHello.cipher_suites, placed after all cipher suites it actually intends to negotiate.
section: "4"
rfc2119_level: SHOULD
topics:
    - tls
    - security
