summary: 'SLP Directory Agent Option uses DHCP option code 78. The format is: 1-byte Code (78), 1-byte Length, 1-byte Mandatory flag, followed by one or more 4-byte IPv4 Directory Agent addresses in network byte order. Minimum Length is 5.'
