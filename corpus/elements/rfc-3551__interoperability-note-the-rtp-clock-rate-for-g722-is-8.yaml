document: rfc-3551
kind: interoperability-note
summary: The RTP clock rate for G722 is 8,000 Hz even though G.722 audio is actually sampled at 16,000 Hz, because the value was erroneously assigned in RFC 1890 and must remain unchanged for backward compatibility.
section: 4.5.2
