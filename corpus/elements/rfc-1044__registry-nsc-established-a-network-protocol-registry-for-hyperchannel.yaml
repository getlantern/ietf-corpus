document: rfc-1044
kind: registry
summary: NSC established a network protocol registry for HYPERchannel message type values (bytes 8 and 9). Interested parties may obtain unique protocol type numbers by application to NSC; assigned values and their owners are periodically published. IP on 16-bit HYPERchannel is assigned type 5; IP on 32-bit HYPERchannel is assigned type 6; ARP is assigned 0x0700.
section: MESSAGE TYPE / GOALS OF THIS DOCUMENT
