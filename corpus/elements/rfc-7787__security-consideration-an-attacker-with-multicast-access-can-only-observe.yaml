document: rfc-7787
kind: security-consideration
summary: An attacker with multicast access can only observe network state hashes and may trigger spurious unicast synchronization between nodes; no published data TLVs traverse the multicast channel. A DNCP node MUST therefore rate limit its reactions to multicast packets.
section: "10"
rfc2119_level: MUST
topics:
    - security
    - multicast
