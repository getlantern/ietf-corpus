document: rfc-7517
kind: normative-requirement
summary: The "use" and "key_ops" JWK members SHOULD NOT be used together; if both are present, the information they convey MUST be consistent. Applications should specify which of these members they use.
section: "4.3"
rfc2119_level: MUST
