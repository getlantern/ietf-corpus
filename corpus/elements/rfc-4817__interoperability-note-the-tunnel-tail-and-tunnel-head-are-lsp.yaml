document: rfc-4817
kind: interoperability-note
summary: The tunnel tail and tunnel head are LSP adjacencies; the topmost label of any packet sent through the tunnel must be one distributed by the tunnel tail to the tunnel head, per RFC 3031 label distribution adjacency rules.
section: "6.3"
