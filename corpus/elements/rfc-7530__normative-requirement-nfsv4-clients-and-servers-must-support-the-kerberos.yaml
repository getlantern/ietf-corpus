document: rfc-7530
kind: normative-requirement
summary: 'NFSv4 clients and servers MUST support the Kerberos V5 security mechanism via RPCSEC_GSS, including all three pseudo-flavors: krb5 (rpc_gss_svc_none, number 390003), krb5i (rpc_gss_svc_integrity, 390004), and krb5p (rpc_gss_svc_privacy, 390005).'
