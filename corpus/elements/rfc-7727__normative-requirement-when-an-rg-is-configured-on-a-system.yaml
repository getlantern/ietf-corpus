document: rfc-7727
kind: normative-requirement
summary: When an RG is configured on a system supporting ICCP STP, such systems MUST send an RG Connect Message with an STP Connect TLV to each RG member PE. After the application connection is established, every PE device MUST communicate its system-level configuration to peers via STP System Config TLV.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
