document: rfc-3798
kind: interoperability-note
summary: When gatewaying MDNs from foreign systems (e.g., X.400), the MDN-Gateway field MUST identify the gateway. The gateway must attempt to translate Reporting-UA, Final-Recipient, and Disposition fields; additional information may be carried in extension fields with names identifying the foreign protocol (e.g., "X400-*").
section: "8.1"
topics:
    - email
