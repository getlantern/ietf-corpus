document: rfc-2661
kind: normative-requirement
summary: Use of the M-bit with new AVPs MUST provide the ability to configure the associated feature off, so that the AVP is either not sent or sent with the M-bit not set. This prevents non-interoperability in deployments where the feature is not supported.
section: "4.2"
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
