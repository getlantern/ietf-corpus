document: rfc-3592
kind: normative-requirement
summary: A linkDown trap SHALL be sent only after the agent has determined the unavailable state has been entered, but the timestamp on the trap SHALL reflect the time of the first UAS (i.e., 10 seconds earlier). linkUp traps are handled similarly.
section: "3.5"
rfc2119_level: MUST
topics:
    - snmp
