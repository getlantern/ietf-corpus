kind: protocol-element
summary: For IPv4 original packets, tunnel ICMP errors (hop limit exceeded, unreachable, parameter problem) are mapped to ICMP Type 3 Code 1 (host unreachable); Packet Too Big is mapped to ICMP Type 3 Code 4 with the MTU field adjusted by subtracting tunnel header length.
