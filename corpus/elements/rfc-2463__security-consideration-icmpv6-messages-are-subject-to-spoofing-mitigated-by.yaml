document: rfc-2463
kind: security-consideration
summary: ICMPv6 messages are subject to spoofing (mitigated by AH), redirection attacks (mitigated by checksum plus AH/ESP), payload modification (mitigated by AH/ESP), and denial-of-service via back-to-back error-inducing packets (mitigated by the rate-limiting requirement in section 2.4).
section: "5.2"
topics:
    - security
    - ip
