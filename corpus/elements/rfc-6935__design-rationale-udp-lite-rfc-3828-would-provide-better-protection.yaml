document: rfc-6935
kind: design-rationale
summary: UDP-Lite (RFC 3828) would provide better protection than zero UDP checksums but lacks middlebox support. If middleboxes were updated to support UDP-Lite, it would be preferred over the zero-checksum method for many tunnel protocols.
