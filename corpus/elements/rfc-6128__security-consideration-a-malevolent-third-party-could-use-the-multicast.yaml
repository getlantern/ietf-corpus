document: rfc-6128
kind: security-consideration
summary: A malevolent third party could use the 'multicast-rtcp' attribute to redirect RTCP traffic by intercepting and rewriting SDP packets. To mitigate this, the SDP description should be integrity protected and source authenticated, using mechanisms such as S/MIME, HTTPS, or SAP authentication.
section: "4"
topics:
    - security
    - rtp
    - multicast
