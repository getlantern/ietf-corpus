document: rfc-6275
kind: design-rationale
summary: Mobile IPv6 eliminates the need for 'foreign agents' required by Mobile IPv4, operating in any location without special support from the local router. Route optimization is a fundamental, standardized part of the protocol rather than a nonstandard extension, enabling global deployment.
