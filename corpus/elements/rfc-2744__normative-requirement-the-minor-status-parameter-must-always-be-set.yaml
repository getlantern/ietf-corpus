document: rfc-2744
kind: normative-requirement
summary: The minor_status parameter must always be set by a GSS-API routine, even when a calling error or generic fatal error is returned. Output parameters expected to return pointers to allocated storage must always be set (to NULL if no storage was allocated); associated length fields must be set to zero on error.
section: 3.9.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
