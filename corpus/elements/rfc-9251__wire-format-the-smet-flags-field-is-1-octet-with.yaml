document: rfc-9251
kind: wire-format
summary: 'The SMET Flags field is 1 octet with bits: v1 (bit 7, IGMPv1/MLDv1), v2 (bit 6, IGMPv2/MLDv2), v3 (bit 5, IGMPv3 only), IE (bit 4, Include=0/Exclude=1), and reserved (bits 0-3). For IPv6 (MLD) routes, bit 5 (v3) MUST be 0 and bit 4 MUST be ignored if bit 6 is not set.'
section: "9.1"
topics:
    - multicast
    - routing
