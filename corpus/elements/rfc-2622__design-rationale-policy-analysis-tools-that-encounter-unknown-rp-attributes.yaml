summary: 'Policy analysis tools that encounter unknown rp-attributes from an updated dictionary may approximate: filter methods may be treated as always matching and action methods as no-operations. Tools may also download code via mechanisms outside RPSL''s scope, enabling forward compatibility as new protocols and attributes are introduced.'
