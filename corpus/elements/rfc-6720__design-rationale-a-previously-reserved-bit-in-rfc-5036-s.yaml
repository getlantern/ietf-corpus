document: rfc-6720
kind: design-rationale
summary: A previously reserved bit in RFC 5036's Common Hello Parameter TLV is repurposed as the G flag, so that existing LSRs unaware of GTSM will continue to ignore it per RFC 5036 Section 3.5.2, preserving interoperability without requiring a new TLV type.
section: "2.1"
topics:
