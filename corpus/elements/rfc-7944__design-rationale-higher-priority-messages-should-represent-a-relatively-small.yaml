document: rfc-7944
kind: design-rationale
summary: Higher-priority messages should represent a relatively small portion of normal traffic to prevent starvation of lower-priority messages, which would otherwise be retried and generate more total traffic than without DRMP; however, blocking of lower-priority messages is explicitly required in scenarios like first responder signaling.
