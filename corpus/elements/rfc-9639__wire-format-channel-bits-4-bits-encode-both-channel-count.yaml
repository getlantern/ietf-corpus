document: rfc-9639
kind: wire-format
summary: 'Channel bits (4 bits) encode both channel count (0b0000–0b0111 for 1–8 independent channels with defined speaker assignments) and stereo decorrelation mode: 0b1000=left-side, 0b1001=side-right, 0b1010=mid-side. Values 0b1011–0b1111 are reserved.'
section: 9.1.3
extracted_by: claude-sonnet-4-6
