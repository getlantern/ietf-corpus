document: rfc-1426
kind: normative-requirement
summary: When a client converts 8-bit MIME to 7-bit MIME for a non-supporting server, the conversion must cause no loss of information (using MIME transport encodings as needed), and the resulting message must be valid 7-bit MIME.
section: "4"
rfc2119_level: MUST
topics:
