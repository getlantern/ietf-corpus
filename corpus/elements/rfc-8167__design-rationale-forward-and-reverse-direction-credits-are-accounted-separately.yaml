document: rfc-8167
kind: design-rationale
summary: 'Forward- and reverse-direction credits are accounted separately to prevent head-of-line blocking: if one direction stalls, the other can continue unimpeded. This is a deliberate choice over a unified credit pool.'
section: "4.1"
