document: rfc-6445
kind: design-rationale
summary: mplsFrrFacilityDBProtectingTunnelResvBw is explicitly included in the facility DB table even though MPLS-TE-STD-MIB also has bandwidth fields, because backup tunnels are typically signaled with 0 bandwidth to avoid overbooking; the actual internal PLR reservation is different and must be exposed here.
