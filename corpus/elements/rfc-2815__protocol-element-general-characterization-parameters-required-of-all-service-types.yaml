summary: 'General characterization parameters required of all service types include: ingress link, egress link MTUs/framing overhead/minimum packet sizes, available path bandwidth (updated hop-by-hop), and minimum latency. MTU and minimum packet size must be reported accurately; bandwidth may be loosely estimated.'
