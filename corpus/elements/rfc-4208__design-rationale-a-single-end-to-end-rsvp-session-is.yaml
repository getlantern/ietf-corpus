document: rfc-4208
kind: design-rationale
summary: A single end-to-end RSVP session is used for the UNI user connection, with the first and last hops constituting the UNI. This carries user parameters end-to-end and obviates any mapping between UNI parameters and the NNI format used within the Service Provider network, satisfying the ASON requirement that UNI and NNI be independent.
section: "1.1"
topics:
    - mpls
    - routing
