document: rfc-3592
kind: state-machine
summary: Unavailable time begins at the onset of 10 contiguous SESs (those 10 seconds are included in unavailable time). Interface returns to available at the onset of 10 contiguous seconds with no SESs (those 10 seconds are excluded from unavailable time). While unavailable, all counters except UAS are frozen.
section: "3.5"
