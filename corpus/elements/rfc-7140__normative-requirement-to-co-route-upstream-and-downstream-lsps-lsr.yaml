document: rfc-7140
kind: normative-requirement
summary: To co-route upstream and downstream LSPs, LSR U MUST look up the unicast routing table to find the best interface and next hop to reach LSR D for determining the downstream interface; if the next hop and interface are also advertised by LSR D via LDP, that interface SHOULD be used. This procedure is applicable when symmetric IGP cost is configured.
section: "3.7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
