document: rfc-4124
kind: security-consideration
summary: DS-TE does not introduce additional security threats beyond those of Diffserv (RFC 2475) and MPLS Traffic Engineering. Defense against theft- and denial-of-service attacks relies on traffic conditioning at DS boundary nodes combined with security and integrity of the network infrastructure. Manipulation of administratively configurable DS-TE parameters (e.g., TE-Class mapping, BCs) must be performed in a secure manner by authorized entities.
section: "12"
topics:
    - mpls
    - diffserv
    - security
    - qos
