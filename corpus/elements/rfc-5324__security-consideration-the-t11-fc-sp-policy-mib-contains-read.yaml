document: rfc-5324
kind: security-consideration
summary: The T11-FC-SP-POLICY-MIB contains read-create objects for non-active Policy Objects that define which Switches, Nodes, and IP management hosts are permitted in the Fabric. Unauthorized modification could allow unauthorized entities to join the Fabric or gain management access; this is among the most sensitive data in the MIB suite and MUST be protected via SNMPv3 with authentication and privacy.
section: "8.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
