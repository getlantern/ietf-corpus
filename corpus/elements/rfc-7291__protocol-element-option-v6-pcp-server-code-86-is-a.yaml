document: rfc-7291
kind: protocol-element
summary: OPTION_V6_PCP_SERVER (code 86) is a DHCPv6 option that conveys one or more IPv6 addresses of a PCP server to a DHCPv6 client. Multiple instances of the option are used to signal distinct PCP servers, while multiple addresses within one instance represent a single PCP server. IPv4-mapped IPv6 addresses are permitted.
section: "3.1"
topics:
    - pcp
    - ip
