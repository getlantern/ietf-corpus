document: rfc-2363
kind: wire-format
summary: The FUNI PDU format consists of a Flag, a FUNI Header (with 10-bit or 24-bit Frame Address, Congestion Notification bit, Congestion Loss Priority bit, and four Reserved bits), a User SDU field (up to 4096, optionally 64K, octets), a FUNI FCS field (2 or 4 octets), and a closing Flag.
