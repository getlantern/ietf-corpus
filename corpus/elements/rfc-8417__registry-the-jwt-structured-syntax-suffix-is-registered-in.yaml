document: rfc-8417
kind: registry
summary: The '+jwt' structured syntax suffix is registered in the IANA 'Structured Syntax Suffix' registry, indicating that the media type is encoded as a JWT (a series of base64url-encoded values separated by period characters). Fragment identifier semantics for '+jwt' SHOULD follow those of 'application/jwt'.
section: "7.2"
