document: rfc-1450
kind: protocol-element
summary: snmpTrapOID (OBJECT IDENTIFIER) identifies the trap currently being sent and occurs as the second varbind of a SNMPv2-Trap-PDU. snmpTrapEnterprise identifies the enterprise for traps originating from RFC1157 Trap-PDU proxy mapping and occurs as the last varbind.
