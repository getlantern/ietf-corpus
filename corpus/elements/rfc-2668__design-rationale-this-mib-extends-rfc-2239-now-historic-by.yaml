document: rfc-2668
kind: design-rationale
summary: This MIB extends RFC 2239 (now historic) by adding management for 1000 Mb/s MAU types, PAUSE flow-control negotiation capability bits, and remote fault status signaling for 1000BASE-X auto-negotiation, reflecting the evolution of IEEE 802.3 from the 1998 edition.
