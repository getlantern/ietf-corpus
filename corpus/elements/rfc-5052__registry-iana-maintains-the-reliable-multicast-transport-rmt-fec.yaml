document: rfc-5052
kind: registry
summary: IANA maintains the 'Reliable Multicast Transport (RMT) FEC Encoding IDs and FEC Instance IDs' registry. FEC Encoding IDs (0-255) are assigned on an IETF Consensus basis; FEC Instance IDs (0-65535) scoped to Under-Specified FEC scheme Encoding IDs (128-255) are assigned on a First Come First Served basis. Requestors for FEC Instance IDs must provide contact information and a pointer to publicly accessible documentation.
section: "12"
topics:
