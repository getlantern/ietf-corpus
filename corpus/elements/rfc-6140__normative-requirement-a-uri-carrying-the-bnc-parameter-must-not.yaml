document: rfc-6140
kind: normative-requirement
summary: A URI carrying the 'bnc' parameter MUST NOT contain a user portion. A registrar that receives a REGISTER request with a Contact URI containing both 'bnc' and a user portion MUST NOT send a 200-class response; a 400 (Bad Request) is appropriate.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
