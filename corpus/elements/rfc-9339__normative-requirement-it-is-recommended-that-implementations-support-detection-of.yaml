document: rfc-9339
kind: normative-requirement
summary: It is RECOMMENDED that implementations support detection of frequent changes in RM signaling and ignore RM (reverting to provisioned metric) during such conditions, to prevent network churn caused by a misbehaving or misconfigured router.
