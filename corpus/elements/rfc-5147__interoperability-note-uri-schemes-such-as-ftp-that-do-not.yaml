document: rfc-5147
kind: interoperability-note
summary: URI schemes such as FTP that do not provide explicit media type information make text/plain fragment identifier processing inherently unreliable; clients must infer the media type heuristically, and should apply this processing only when the inferred type is text/plain.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
