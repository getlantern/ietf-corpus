document: rfc-7867
kind: design-rationale
summary: Frame-freeze is differentiated from other concealment methods (interframe extrapolation, interpolation, error-resilient encoding) because frame-freeze repairs video based on whole frames whereas the others repair at finer granularity (macroblocks or bitstreams), causing measurement metrics to differ. This difference necessitates separate report blocks and a distinct V flag value.
