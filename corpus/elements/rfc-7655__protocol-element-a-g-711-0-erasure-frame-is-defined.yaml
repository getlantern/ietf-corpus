document: rfc-7655
kind: protocol-element
summary: A G.711.0 Erasure Frame is defined as any G.711.0 frame whose corresponding G.711 sample values are entirely the level 0++ or 0-- (one step above or below analog zero); it is used in storage mode to represent time spans that were not received or not transmitted.
section: "6.2"
