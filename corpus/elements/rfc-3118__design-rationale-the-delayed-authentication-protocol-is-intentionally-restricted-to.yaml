document: rfc-3118
kind: design-rationale
summary: The delayed authentication protocol is intentionally restricted to intradomain use because it requires each client to have a pre-shared key on every DHCP server it may contact. This does not scale well across administrative domains, and interdomain roaming was explicitly out of scope.
section: "5.1"
topics:
    - security
