document: rfc-3301
kind: normative-requirement
summary: The LAC MUST strip AAL5-specific fields (VC-multiplexed or LLC-encapsulated per RFC 2364) and encapsulate the PPP PDU with address and control fields per HDLC procedures on the L2TP tunnel in the user-to-LNS direction; the reverse applies LNS-to-user.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
