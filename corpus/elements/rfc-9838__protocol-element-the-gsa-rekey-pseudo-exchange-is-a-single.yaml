document: rfc-9838
kind: protocol-element
summary: The GSA_REKEY pseudo-exchange is a single one-way IKEv2 message sent by the GCKS to GMs, typically via IP multicast. The 'IKE SA Initiator's SPI' and 'IKE SA Responder's SPI' fields in the IKE header are treated as a single 16-octet field containing the Rekey SA SPI. The message contains GSA, KD, optional Delete, and optional AUTH payloads.
section: 2.4.1
topics:
    - ipsec
    - security
    - multicast
    - crypto
