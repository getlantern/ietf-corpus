document: rfc-2712
kind: protocol-element
summary: When a Kerberos cipher suite is selected, the server's Certificate, CertificateRequest, and ServerKeyExchange messages are omitted from the TLS handshake, as is the client Certificate message. These are all optional in TLS, so omitting them is permissible.
