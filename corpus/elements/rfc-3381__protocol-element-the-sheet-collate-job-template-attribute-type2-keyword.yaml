document: rfc-3381
kind: protocol-element
summary: The 'sheet-collate' Job Template attribute (type2 keyword) specifies whether media sheets of each copy of each printed document are to be in sequence when multiple copies are requested. Keyword values are 'uncollated' (each sheet replicated before the next sheet is processed) and 'collated' (each copy printed with sheets in sequence).
section: "3.1"
topics:
    - registry
