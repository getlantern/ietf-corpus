document: rfc-2425
kind: security-consideration
summary: Once directory information leaves its native service, access controls can no longer be guaranteed. This specification defines no access control mechanism. Integrity and privacy of a text/directory body part can be protected by enclosing it within an appropriate MIME-based security mechanism. Applications should display directory data in a safe environment (e.g., PostScript-valued types require care).
section: "16"
topics:
    - security
    - privacy
    - email
