document: rfc-6478
kind: normative-requirement
summary: When the Pseudowire Status protocol for Static Pseudowires is used, the BFD VCCV status-signaling mechanisms (CV Types 0x08 and 0x20) from RFC 5885 MUST NOT be used to avoid duplicate or conflicting notifications. BFD VCCV for fault detection (CV types 0x04 and 0x10) MAY still be used.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
