document: rfc-3814
kind: protocol-element
summary: mplsFTNTable stores FEC-to-NHLFE rules supporting 6-tuple matching based on source address range, destination address range, source port range, destination port range, IPv4 Protocol/IPv6 next-header field, and DSCP. The action pointer redirects matching packets to either a non-TE LSP (mplsXCEntry in RFC 3813) or a TE tunnel (mplsTunnelEntry in RFC 3812).
section: "5.1"
topics:
    - mpls
    - snmp
