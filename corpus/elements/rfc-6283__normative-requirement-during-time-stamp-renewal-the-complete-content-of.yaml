document: rfc-6283
kind: normative-requirement
summary: During Time-Stamp renewal, the complete content of the last <TimeStamp> element MUST be Time-Stamped. The new ATS and its hash tree MUST use the same digest algorithm as the preceding one specified in the <DigestMethod> element.
section: 4.2.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
