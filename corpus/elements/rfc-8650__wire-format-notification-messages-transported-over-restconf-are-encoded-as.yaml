document: rfc-8650
kind: wire-format
summary: Notification messages transported over RESTCONF are encoded as Server-Sent Events (SSE) per W3C-20150203, following RFC 8040 Section 6.4. RESTCONF servers SHOULD NOT send the 'event' or 'id' fields in SSE event notifications.
