document: rfc-5939
kind: interoperability-note
summary: After a successful capability negotiation, the offerer SHOULD generate a new offer using the negotiated configuration as the actual configuration and without the capability negotiation extensions. This assists intermediaries that do not support the framework and that may have observed but not understood the negotiation.
section: "3.2"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
