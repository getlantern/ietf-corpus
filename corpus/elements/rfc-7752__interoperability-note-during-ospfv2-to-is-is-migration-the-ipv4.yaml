document: rfc-7752
kind: interoperability-note
summary: During OSPFv2-to-IS-IS migration, the IPv4 Router-ID present in both the OSPF Node Descriptor and as an IS-IS link attribute TLV (types 1028/1030) serves as the 'glue' that allows a single physical link to be correlated across two simultaneously active IGP protocols.
