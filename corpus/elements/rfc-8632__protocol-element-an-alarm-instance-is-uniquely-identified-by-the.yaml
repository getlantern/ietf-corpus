document: rfc-8632
kind: protocol-element
summary: An alarm instance is uniquely identified by the three-leaf key (resource, alarm-type-id, alarm-type-qualifier). All notifications sharing these three values are considered updates to the same alarm instance, removing ambiguity in alarm/clear correlation.
