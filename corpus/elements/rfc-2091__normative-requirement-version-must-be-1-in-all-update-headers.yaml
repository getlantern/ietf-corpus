document: rfc-2091
kind: normative-requirement
summary: Version MUST be 1 in all Update Headers. Any packet received with a different Version value MUST be silently discarded. Flush values other than 0 or 1 MUST also be silently discarded.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
