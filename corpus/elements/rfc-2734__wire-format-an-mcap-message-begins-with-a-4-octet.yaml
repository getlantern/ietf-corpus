document: rfc-2734
kind: wire-format
summary: An MCAP message begins with a 4-octet header (length, reserved, opcode) followed by zero or more 20-octet group address descriptors, each containing length, type (SHALL be 1), expiration (seconds timestamp), channel (0–63), speed, bandwidth (SHALL be zero), and group_address.
