document: rfc-2531
kind: protocol-element
summary: color-subsampling takes string values "1:1:1" (full color samples per luminance sample) or "4:1:1" (reduced color samples). It is used with continuous color images (color=Full), color spaces with separate luminance and chrominance (e.g. CIELAB), and file structures that support subsampling.
section: "3.7"
