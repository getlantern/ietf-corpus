document: rfc-8814
kind: design-rationale
summary: The extensions allow advertisement of different MSD-Types defined elsewhere (in RFC 8491), enabling future MSD-Types defined by IGPs to be shared via BGP-LS without requiring updates to this document. MSD advertisements may be useful even if SR is not enabled, e.g., in non-SR MPLS networks where MSD defines the maximum label depth.
section: "2"
topics:
    - routing
    - bgp
    - mpls
