document: rfc-6454
kind: normative-requirement
summary: For 'file' URIs, the implementation MAY return an implementation-defined value as the origin. Historically, user agents have granted file scheme content wide privileges, but granting all local files such privileges can lead to privilege escalation attacks.
section: "4"
rfc2119_level: MAY
topics:
    - security
