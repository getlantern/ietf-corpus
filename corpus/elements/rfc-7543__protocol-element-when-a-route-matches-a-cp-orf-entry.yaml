document: rfc-7543
kind: protocol-element
summary: When a route matches a CP-ORF entry and passes remaining Outbound Filter rules, the BGP speaker places it in Adj-RIB-Out, adds the CP-ORF Import Route Target to the route's RT list, and adds a Transitive Opaque Extended Community with sub-type CP-ORF (0x03) before advertising to the peer.
section: "3"
