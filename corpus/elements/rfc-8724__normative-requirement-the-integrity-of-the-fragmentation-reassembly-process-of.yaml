document: rfc-8724
kind: normative-requirement
summary: The integrity of the fragmentation/reassembly process of a SCHC Packet MUST be checked at the receiver. A Profile MUST specify the method. CRC32 polynomial 0xEDB88320 (reversed polynomial, Ethernet standard) is RECOMMENDED as the default RCS algorithm.
section: 8.2.3
rfc2119_level: MUST
topics:
    - ip
    - security
