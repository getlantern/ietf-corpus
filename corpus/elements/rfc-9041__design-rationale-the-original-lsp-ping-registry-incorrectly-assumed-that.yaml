document: rfc-9041
kind: design-rationale
summary: The original LSP Ping registry incorrectly assumed that code points allocated by Experimental RFCs would be limited to experimental use; however, a code point in a public IANA registry is available for any document type. This, combined with an oversized experimental range, motivated the restructuring of registration procedures.
section: "1"
topics:
