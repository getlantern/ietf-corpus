document: rfc-8265
kind: design-rationale
summary: The OpaqueString profile for passwords omits the Bidi Rule because directionality rules reduce the character repertoire and thus reduce password entropy. Passwords are typically not displayed and are not meant to be interoperable across different layout systems the way usernames are.
section: 4.2.2
topics:
    - security
