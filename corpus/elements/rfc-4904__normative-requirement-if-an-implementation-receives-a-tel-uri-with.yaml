document: rfc-4904
kind: normative-requirement
summary: If an implementation receives a tel URI with only one of 'tgrp' or 'trunk-context', it MUST act as if no trunk group parameters are present at all. If it chooses to process such a URI, it MUST disregard the values in both parameters.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - voip
