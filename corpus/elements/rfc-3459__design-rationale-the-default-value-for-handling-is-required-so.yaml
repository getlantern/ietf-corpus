document: rfc-3459
kind: design-rationale
summary: The default value for Handling is REQUIRED so that existing notification mechanisms work correctly for sending agents that are unaware of critical content processing. All body parts default to critical, ensuring messages are not silently degraded by ignorant agents.
section: "3.3"
