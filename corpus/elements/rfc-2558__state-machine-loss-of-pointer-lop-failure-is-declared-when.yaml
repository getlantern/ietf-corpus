document: rfc-2558
kind: state-machine
summary: Loss of Pointer (LOP) failure is declared when LOP defect (no valid pointer in 8 consecutive frames, or NDF='1001' without concatenation indicator for 8 frames) persists for 2.5 ±0.5 s. LOP defect is terminated when a valid pointer with normal NDF='0110' or valid concatenation indicator is detected for 3 contiguous frames.
section: "3.5"
