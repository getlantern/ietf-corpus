document: rfc-9027
kind: normative-requirement
summary: The authority MUST use its credentials associated with the specific service supported by the resource priority namespace in the claim. If r-values are added or dropped by intermediaries, they must generate a new 'rph' identity header and sign the claim with their own authority.
section: "3"
rfc2119_level: MUST
