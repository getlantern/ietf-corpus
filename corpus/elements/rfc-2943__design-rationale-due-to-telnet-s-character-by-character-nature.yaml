document: rfc-2943
kind: design-rationale
summary: Due to TELNET's character-by-character nature, it is not well-suited to integrity-only services; therefore the DSA profile provides authentication but does not provide session integrity. This explains why no message authentication code or integrity mechanism is defined.
section: "3"
topics:
