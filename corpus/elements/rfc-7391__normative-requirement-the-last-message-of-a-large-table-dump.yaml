document: rfc-7391
kind: normative-requirement
summary: The last message of a large table dump, carrying the EOT flag, MUST NOT carry any data; it carries only a RESULT-TLV with a success code, mirroring the ForCES two-phase commit pattern.
section: "3.3"
rfc2119_level: MUST
