document: rfc-4303
kind: protocol-element
summary: Payload Data is a mandatory, variable-length field containing the encapsulated data described by the Next Header field. If the encryption algorithm requires an explicit IV, it is carried at the start of the Payload field; the IV length and structure MUST be defined in the algorithm's RFC.
section: "2.3"
topics:
    - ipsec
    - security
    - crypto
