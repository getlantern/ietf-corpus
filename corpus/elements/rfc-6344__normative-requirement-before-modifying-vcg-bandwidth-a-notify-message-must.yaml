document: rfc-6344
kind: normative-requirement
summary: Before modifying VCG bandwidth, a Notify message MUST be sent for each existing VCAT call with Action=2 and Number of Members set to the anticipated post-change count. If an error occurs, the number of members MUST be reverted and the reverted value MUST be re-signaled.
section: 5.3.5
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
