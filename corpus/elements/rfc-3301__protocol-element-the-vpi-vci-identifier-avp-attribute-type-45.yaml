document: rfc-3301
kind: protocol-element
summary: The VPI/VCI Identifier AVP (Attribute Type 45) encodes the ATM VPI (12 bits) and VCI (16 bits) at the LAC interface in a 32-bit field (4 bits reserved); it MAY appear in ICRQ and OCRP for management purposes alongside or instead of Physical Channel ID AVP.
section: "5.2"
