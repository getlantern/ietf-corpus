document: rfc-3015
kind: protocol-element
summary: A Context is an association between a collection of Terminations that describes the topology (who hears/sees whom) and media mixing/switching parameters. A special null Context contains all Terminations not associated with any other Termination; idle lines in a decomposed access gateway are represented there.
