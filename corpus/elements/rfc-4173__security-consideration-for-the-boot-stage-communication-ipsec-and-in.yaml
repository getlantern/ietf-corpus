document: rfc-4173
kind: security-consideration
summary: For the Boot Stage communication, IPsec and in-band authentication SHOULD be implemented per RFC 3720 and RFC 3723 guidelines. iSCSI boot clients are expected to support only pre-shared key authentication in IKE due to memory constraints.
section: "8"
rfc2119_level: SHOULD
topics:
