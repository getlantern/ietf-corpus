document: rfc-8520
kind: privacy-consideration
summary: Release of a MUD URL by a Thing reveals the device type and may aid in identifying individuals when combined with other information; implementors should apply data minimization techniques and consider using TEAP to share MUD URLs only with authorized network components.
section: "16"
topics:
