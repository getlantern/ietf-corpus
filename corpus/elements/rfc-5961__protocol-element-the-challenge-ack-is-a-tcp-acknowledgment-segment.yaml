document: rfc-5961
kind: protocol-element
summary: The 'challenge ACK' is a TCP acknowledgment segment of the form <SEQ=SND.NXT><ACK=RCV.NXT><CTL=ACK> sent in response to an in-window but non-exact RST or any synchronized-state SYN, prompting the remote peer to confirm or deny the connection state.
section: "3.2"
