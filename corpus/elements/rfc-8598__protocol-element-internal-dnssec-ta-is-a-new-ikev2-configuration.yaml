document: rfc-8598
kind: protocol-element
summary: INTERNAL_DNSSEC_TA is a new IKEv2 Configuration Payload Attribute Type (value 26) that conveys a DNSSEC trust anchor (DS record format) for a Split DNS domain, required when the external DNS view uses DNSSEC that would conflict with the internal view.
