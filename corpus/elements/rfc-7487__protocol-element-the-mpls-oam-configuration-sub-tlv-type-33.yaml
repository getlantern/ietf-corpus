document: rfc-7487
kind: protocol-element
summary: 'The MPLS OAM Configuration Sub-TLV (Type 33) is carried inside the OAM Configuration TLV and may contain up to three sub-TLVs: BFD Configuration Sub-TLV, Performance Monitoring Sub-TLV, and MPLS OAM FMS Sub-TLV. When empty (no value), its Length MUST be 8.'
section: "3.2"
