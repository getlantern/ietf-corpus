document: rfc-1989
kind: protocol-element
summary: OutLQRs is a 32-bit unsigned monotonically increasing counter incremented by one for each transmitted LQR packet. It MUST be set to zero when LCP enters Establishment phase and MUST NOT be reset until LCP leaves Termination phase; it is incremented before being inserted into the LQR.
section: "2.2"
rfc2119_level: MUST
topics:
    - snmp
