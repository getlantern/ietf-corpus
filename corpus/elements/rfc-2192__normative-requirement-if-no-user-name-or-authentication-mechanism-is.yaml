document: rfc-2192
kind: normative-requirement
summary: If no user name or authentication mechanism is supplied, the client MUST use the user name 'anonymous' with the LOGIN command and supply the end user's Internet e-mail address as the password. If the URL omits a user name, the program SHOULD request one from the user if necessary.
section: "3"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
