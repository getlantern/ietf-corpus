document: rfc-3477
kind: wire-format
summary: The Unnumbered Interface ID subobject for the RRO has Type 4, Length 12, and contains an 8-bit Flags field, a Reserved byte (MBZ), a 32-bit Router ID, and a 32-bit Interface ID. Defined flags are 0x01 (Local protection available) and 0x02 (Local protection in use).
