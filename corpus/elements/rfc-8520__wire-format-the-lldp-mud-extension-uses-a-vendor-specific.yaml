summary: The LLDP MUD extension uses a vendor-specific TLV (type 127) with OUI 00 00 5E (IANA), subtype 1 (IANA-assigned for MUD), and a MUDstring of 1–255 octets; the 7-bit TLV Type, 9-bit length, 3-octet OUI, 1-octet subtype, and variable MUDstring are encoded in sequence.
