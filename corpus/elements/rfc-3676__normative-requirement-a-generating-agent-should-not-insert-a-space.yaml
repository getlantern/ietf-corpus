document: rfc-3676
kind: normative-requirement
summary: A generating agent SHOULD NOT insert a space in an unnatural location (such as into a word). If a word by itself exceeds 78 characters (but is under 998, the SMTP line length limit), the agent SHOULD send the word as-is.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
