document: rfc-4918
kind: privacy-consideration
summary: Lock tokens MAY be made publicly readable in DAV:lockdiscovery, revealing who locked a resource. Similarly, properties can expose sensitive metadata; servers should allow access control on property visibility.
section: "20.4"
topics:
