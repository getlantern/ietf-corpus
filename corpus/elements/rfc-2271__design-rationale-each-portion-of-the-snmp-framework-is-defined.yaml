document: rfc-2271
kind: design-rationale
summary: Each portion of the SNMP framework is defined in a self-contained document together with the MIB objects needed for its processing, without cross-document normative references to that content. This allows Security Models, authentication/privacy mechanisms, and message formats to be upgraded independently and progress on different standards-track timelines.
