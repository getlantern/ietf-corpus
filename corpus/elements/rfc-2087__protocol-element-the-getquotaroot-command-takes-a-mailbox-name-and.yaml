document: rfc-2087
kind: protocol-element
summary: The GETQUOTAROOT command takes a mailbox name and returns the list of quota roots for the mailbox in an untagged QUOTAROOT response, plus a QUOTA response for each listed quota root. Returns NO if the mailbox does not exist or permission is denied.
section: "4.3"
