document: rfc-4622
kind: protocol-element
summary: The authority component of an XMPP IRI/URI, preceded by "//", signals the processing application to authenticate as the specified node@domain rather than as a configured default account. Its absence means the application authenticates using configured credentials.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
