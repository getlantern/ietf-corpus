document: rfc-7766
kind: normative-requirement
summary: DNS clients SHOULD pipeline their queries and SHOULD NOT wait for an outstanding reply before sending the next query. DNS servers MUST expect to receive pipelined queries and SHOULD process TCP queries concurrently.
section: 6.2.1.1
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
