document: rfc-1990
kind: normative-requirement
summary: Non-terminal multilink fragments MUST NOT be padded with trailing material by any method other than Self-Describing-Padding. A system MUST NOT add padding to any packet that cannot be recognized as padded by the peer.
section: "3.1"
rfc2119_level: MUST NOT
