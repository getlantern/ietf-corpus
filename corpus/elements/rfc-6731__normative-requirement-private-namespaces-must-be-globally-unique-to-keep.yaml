document: rfc-6731
kind: normative-requirement
summary: Private namespaces MUST be globally unique to keep DNS unambiguous and avoid caching and destination-selection problems. Private namespaces MUST only consist of subdomains of domains for which the relevant operator provides authoritative name service.
section: "6"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
