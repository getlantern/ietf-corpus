document: rfc-7812
kind: protocol-element
summary: The Rainbow MRT MT-ID is an MPLS MT-ID referring to all MRT forwarding topologies and the default forwarding topology. It is used by LDP to allow the same label to be advertised to all peers for the same (MT-ID, Prefix), and is used primarily by ABRs/LBRs to avoid per-neighbor label-spoofing.
section: "9"
topics:
