document: rfc-2670
kind: normative-requirement
summary: A translated SMIv1 MIB MUST be semantically equivalent to the SMIv2 original, except where objects are omitted because no translation is possible (e.g., Counter64). Loss of machine-readable information during translation is not considered a semantic change.
section: "1"
rfc2119_level: MUST
topics:
    - snmp
