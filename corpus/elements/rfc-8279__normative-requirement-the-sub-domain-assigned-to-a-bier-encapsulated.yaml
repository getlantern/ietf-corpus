document: rfc-8279
kind: normative-requirement
summary: The sub-domain assigned to a BIER-encapsulated packet MUST NOT be changed while the packet is in transit through the BIER domain. The BFIR assigns the sub-domain when it applies the BIER header, and that assignment is fixed for the packet's lifetime in the domain.
section: "1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
