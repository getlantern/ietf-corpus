document: rfc-3748
kind: normative-requirement
summary: The authenticator MUST retransmit Request packets until a valid Response is received, a retry counter expires, or a lower layer failure indication is received. Retransmitted Requests MUST carry the same Identifier value; any new Request MUST use a different Identifier value.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
