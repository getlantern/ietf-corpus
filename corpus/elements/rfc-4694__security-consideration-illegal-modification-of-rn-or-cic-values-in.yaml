document: rfc-4694
kind: security-consideration
summary: Illegal modification of "rn" or "cic" values in transit can cause calls to be routed to wrong networks. Illegal insertion of "npdi" can suppress a needed NP database query and misroute the call. Illegal modification of caller "rn" can cause incorrect call charging.
