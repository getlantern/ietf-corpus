summary: 'The ACMEDelegationMethod object is a CDNI Metadata interface object that enables delegation of X.509 certificates between a uCDN and dCDN. It contains properties: acme-delegation (URL), time-window (TimeWindow), lifetime (Integer, STAR only), and lifetime-adjust (Integer, optional).'
