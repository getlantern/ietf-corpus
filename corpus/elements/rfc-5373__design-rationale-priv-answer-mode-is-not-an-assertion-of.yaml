document: rfc-5373
kind: design-rationale
summary: Priv-Answer-Mode is not an assertion of privilege but a request for privileged treatment, modeled after the UNIX 'sudo' pattern. This design allows the same caller to make both ordinary (Answer-Mode) and urgent/privileged (Priv-Answer-Mode) requests, receiving different handling based on which header is used rather than solely on identity.
section: "1"
topics:
