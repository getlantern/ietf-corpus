document: rfc-7450
kind: security-consideration
summary: Relays are accessible via a well-known anycast address and are vulnerable to DoS attacks. AMT service providers must deploy relays near network borders and limit relay address advertisements to those edges, preventing distant gateways from generating flows that exhaust intervening link capacity.
section: 4.1.4.2
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
