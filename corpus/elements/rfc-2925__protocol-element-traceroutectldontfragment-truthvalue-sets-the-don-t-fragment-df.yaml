document: rfc-2925
kind: protocol-element
summary: traceRouteCtlDontFragment (TruthValue) sets the Don't Fragment (DF) bit in probe IP headers, enabling manual PATH MTU testing via traceroute. traceRouteCtlInitialTtl allows skipping well-known initial hops by starting the TTL walk above 1.
