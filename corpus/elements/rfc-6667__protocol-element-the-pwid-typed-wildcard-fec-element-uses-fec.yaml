document: rfc-6667
kind: protocol-element
summary: The PWid Typed Wildcard FEC Element uses FEC type 0x80 and the Generalized PWid Typed Wildcard FEC Element uses type 0x81, as originally defined in RFC 4447. The 15-bit PW type field scopes the wildcard to a specific PW type or to all types via the 0x7FFF wildcard value.
