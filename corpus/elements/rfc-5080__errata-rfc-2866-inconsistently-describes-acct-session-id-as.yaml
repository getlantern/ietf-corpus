document: rfc-5080
kind: errata
summary: RFC 2866 inconsistently describes Acct-Session-Id as type 'String' in the attribute format figure but as UTF-8 encoded text in the prose, while RFC 2865 defines Text as UTF-8 encoded. This is a typographical error; Acct-Session-Id is of type Text, not String. Similarly, Acct-Multi-Session-Id SHOULD be treated as Text.
section: 2.3.2
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
