document: rfc-7635
kind: protocol-element
summary: The THIRD-PARTY-AUTHORIZATION STUN attribute is a comprehension-optional attribute sent by the STUN server in a 401 error response. Its value contains the STUN server name, which the client must supply to the authorization server to select the appropriate keying material for token generation.
section: "6.1"
topics:
