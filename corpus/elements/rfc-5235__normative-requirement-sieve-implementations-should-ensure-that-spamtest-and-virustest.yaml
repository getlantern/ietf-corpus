document: rfc-5235
kind: normative-requirement
summary: Sieve implementations SHOULD ensure that 'spamtest' and 'virustest' tests only report spam and virus test results for messages that have actually gone through a legitimate spam or virus check process, and MUST prevent header spoofing from tricking the implementation.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
    - security
