document: rfc-3801
kind: normative-requirement
summary: 'If a message carries Sensitivity: Private, a conforming receiving system MUST prohibit the recipient from forwarding it. If the receiving system does not support privacy and sensitivity is Private, a negative DSN with status code 5.6.0 MUST be sent to the originator.'
section: 4.2.13
rfc2119_level: MUST
topics:
    - email
    - privacy
    - security
