document: rfc-2456
kind: protocol-element
summary: appnLocalTgOperStateChangeTrap notifies management stations of local transmission group (TG) operational state changes by carrying appnLocalTgTableChanges (a cumulative change counter) and appnLocalTgOperational. It is sent on transitions to 'true' or 'false', on row creation only if initial state is 'true', and on deletion only if the last state was 'true' (with the notification value set to 'false').
section: "4"
