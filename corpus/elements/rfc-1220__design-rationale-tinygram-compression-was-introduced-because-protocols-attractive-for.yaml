document: rfc-1220
kind: design-rationale
summary: Tinygram Compression was introduced because protocols attractive for remote Ethernet bridging (often interactive-session protocols) frequently zero-pad PDUs to minimum Ethernet size, making zero-stripping an effective lossless compression technique specifically for low-speed (64 Kbps and below) links.
section: "5.3"
