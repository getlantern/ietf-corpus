document: rfc-2661
kind: normative-requirement
summary: The Message Type AVP MUST be the first AVP in every control message, immediately following the control message header. If the M-bit is set within the Message Type AVP and the message type is unknown, the tunnel MUST be cleared.
section: 4.4.1
rfc2119_level: MUST
topics:
