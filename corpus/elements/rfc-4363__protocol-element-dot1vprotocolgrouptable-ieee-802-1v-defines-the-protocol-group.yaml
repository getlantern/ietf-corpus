summary: dot1vProtocolGroupTable (IEEE 802.1v) defines the Protocol Group Database, mapping FrameType and ProtocolValue to a ProtocolGroupId. dot1vProtocolPortTable then maps each protocol group to a VLAN ID per port, enabling protocol-based VLAN classification.
