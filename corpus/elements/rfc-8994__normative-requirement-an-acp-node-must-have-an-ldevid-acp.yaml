document: rfc-8994
kind: normative-requirement
summary: An ACP node MUST have an LDevID (ACP) certificate containing an AcpNodeName and information about one or more Trust Anchors. Manual keying via shared secrets is prohibited; asymmetric keying material without certificates also does not meet requirements for autonomous peer-to-peer ACP domain authentication.
section: "6.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
