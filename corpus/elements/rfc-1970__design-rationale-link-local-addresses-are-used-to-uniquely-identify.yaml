document: rfc-1970
kind: design-rationale
summary: Link-local addresses are used to uniquely identify routers in RA and Redirect messages so that hosts can maintain router associations even after a site renumbers to new global prefixes, unlike IPv4 where router identity was tied to global addresses.
section: "3.1"
