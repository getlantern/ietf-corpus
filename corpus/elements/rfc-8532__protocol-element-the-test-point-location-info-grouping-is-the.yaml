summary: The 'test-point-location-info' grouping is the common sub-structure for every test-point-locations list entry, composed of 'tp-technology' (technology choice, default technology-null), 'tp-tools' (CC and path-discovery flags), an 'anydata root' YANG schema mount point (RFC 8528), and 'connectionless-oam-tps' (neighboring TPs).
