document: rfc-2236
kind: normative-requirement
summary: If a multicast router hears a Query message from a router with a lower IP address, it MUST become a Non-Querier on that network. This querier election mechanism is standardized in IGMPv2 (unlike IGMPv1 which left it to routing protocols).
section: "3"
rfc2119_level: MUST
topics:
    - multicast
