document: rfc-6354
kind: wire-format
summary: 'In SDP, ''fwdred'' maps as: media type in ''m='', encoding name in ''a=rtpmap'', and ''forwardshift=value'' in the ''a=fmtp'' attribute. Example: ''a=fmtp:121 0/5 forwardshift=40800'' indicates 5.1 seconds of forward-shifting at 8000 Hz.'
