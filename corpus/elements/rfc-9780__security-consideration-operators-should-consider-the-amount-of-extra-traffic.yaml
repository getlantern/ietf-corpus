document: rfc-9780
kind: security-consideration
summary: Operators SHOULD consider the amount of extra traffic generated by P2MP BFD when selecting the MultipointHead transmission interval. IP/UDP encapsulation adds up to 28 octets per BFD Control packet compared to G-ACh encapsulation, representing more than 50% overhead.
section: "6"
topics:
