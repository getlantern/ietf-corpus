document: rfc-4915
kind: normative-requirement
summary: When DefaultExclusionCapability is enabled, the MT-bit MUST be set in Hello packets and the router will only accept a Hello packet if the MT-bit is set, ensuring all routers in the area have this capability before default topology exclusion is used.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
