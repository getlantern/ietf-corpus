document: rfc-4920
kind: normative-requirement
summary: All LSRs MUST be prepared to receive and forward any TLV as per RFC 3473, including obsoleted TLV types 4 and 5. An LSR that proposes to perform crankback re-routing SHOULD support receipt and processing of all fundamental crankback TLVs.
section: 6.3.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
