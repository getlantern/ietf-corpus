document: rfc-8295
kind: protocol-element
summary: The /firmware path component (HTTP GET) distributes RFC 4108 firmware packages, which may be unprotected, compressed, encrypted, or signed CMS content using application/cms. The /firmware/return path (HTTP POST) allows clients to return firmware load receipts and errors; server acknowledges with HTTP 204.
