document: rfc-7684
kind: interoperability-note
summary: The OSPFv2 Extended Prefix and Extended Link Opaque LSAs are fully backward compatible because Opaque LSAs themselves are optional (RFC 5250). Routers that do not support these extensions will simply ignore the Opaque LSAs, requiring no protocol changes to existing deployments.
