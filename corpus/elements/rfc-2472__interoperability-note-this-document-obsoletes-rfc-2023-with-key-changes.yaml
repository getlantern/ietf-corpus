document: rfc-2472
kind: interoperability-note
summary: This document obsoletes RFC 2023, with key changes including renaming 'Interface Token' to 'Interface Identifier', expanding it from 32 to 64 bits, and changing the response to a zero Interface-Identifier in a Configure-Request from Configure-Ack to Configure-Nak.
