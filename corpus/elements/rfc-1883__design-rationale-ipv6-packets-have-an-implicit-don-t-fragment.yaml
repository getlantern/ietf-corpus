document: rfc-1883
kind: design-rationale
summary: IPv6 packets have an implicit 'Don't Fragment' attribute; there is no explicit DF flag as in IPv4. The ICMPv6 Packet Too Big message always identifies the exact MTU to be used, eliminating the need for the MTU plateau table from RFC-1191.
section: "5"
topics:
    - ip
