document: rfc-8794
kind: design-rationale
summary: A VINT may be encoded at an octet length larger than strictly required in order to reserve space for overwriting at a later date — e.g., when the final size of an Element is unknown at write time. All encodings of the same integer value are semantically identical regardless of VINT length.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
