document: rfc-6545
kind: normative-requirement
summary: RID documents MUST begin with an XML declaration and MUST specify the XML version used; UTF-8 encoding is REQUIRED. The special XML characters '&', '<', '>', '"', and ''' MUST be escaped with their entity reference equivalents.
