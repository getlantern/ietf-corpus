document: rfc-3559
kind: protocol-element
summary: The mallocScopeNameTable extends the scope table with per-language scope names, indexed by (mallocScopeAddressType, mallocScopeFirstAddress, IMPLIED mallocScopeNameLangName). The language tag uses RFC 3066 syntax; mallocScopeNameDefault indicates a preferred fallback name when the desired language is unavailable.
