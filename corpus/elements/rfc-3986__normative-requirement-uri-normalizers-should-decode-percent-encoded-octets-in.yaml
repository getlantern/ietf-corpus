document: rfc-3986
kind: normative-requirement
summary: URI normalizers should decode percent-encoded octets in the ranges of ALPHA, DIGIT, hyphen (%2D), period (%2E), underscore (%5F), or tilde (%7E) to their corresponding unreserved characters, since such encodings are equivalent to their literal form.
section: "2.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
