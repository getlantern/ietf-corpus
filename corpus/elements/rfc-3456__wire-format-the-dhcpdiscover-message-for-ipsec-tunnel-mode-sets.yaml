document: rfc-3456
kind: wire-format
summary: The DHCPDISCOVER message for IPsec tunnel mode sets htype (1 octet) to value 31 to signify a virtual IPsec tunnel mode interface, enabling the DHCP server to differentiate VPN from non-VPN requests. The flags field (2 octets) must have the broadcast bit set to zero. The giaddr (4 octets) holds the security gateway interface IPv4 address.
section: "4.1"
topics:
    - ipsec
    - vpn
