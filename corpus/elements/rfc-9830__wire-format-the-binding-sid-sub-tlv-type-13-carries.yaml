kind: wire-format
summary: 'The Binding SID sub-TLV (Type 13) carries BSID information: 1-octet Flags (S-Flag for Specified-BSID-Only, I-Flag for Drop-Upon-Invalid), 1-octet Reserved, and a variable Binding SID field (absent when length=2, 4-octet MPLS label when length=6, 16-octet SRv6 SID when length=18).'
