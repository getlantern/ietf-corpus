document: rfc-6310
kind: normative-requirement
summary: In coupled OAM loops mode, the upstream PE MUST terminate and translate a received NS defect notification message into a PW defect notification message, and MUST signal local AC and PW failures using PW defect notification messages. The downstream PE MUST insert NS defect notification messages into the AC when it detects or is notified of PW or remote AC defects.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
