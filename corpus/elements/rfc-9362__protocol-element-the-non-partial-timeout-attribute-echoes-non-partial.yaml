document: rfc-9362
kind: protocol-element
summary: The 'non-partial-timeout' attribute echoes NON_PARTIAL_TIMEOUT from RFC 9177, used for expiring partially received bodies. It is optional, expressed in seconds as decimal64 with default 247.00 s, and maps to CBOR key 32781.
