document: rfc-5269
kind: normative-requirement
summary: The MN MUST generate a handover key encryption public/private key pair using exactly the same public key algorithm with exactly the same parameters as for SEND. The MN MUST NOT use the key pair for any other encryption or signature operation.
section: "3.1"
rfc2119_level: MUST
topics:
