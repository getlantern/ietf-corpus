document: rfc-8155
kind: protocol-element
summary: 'RFC 8155 defines three TURN server auto-discovery mechanisms: (1) Service Resolution via S-NAPTR DNS lookups using the host''s DNS domain, (2) DNS Service Discovery (DNS-SD/mDNS), and (3) Anycast using an IANA-assigned anycast address. Clients may use any or all mechanisms in any order.'
section: "3"
topics:
