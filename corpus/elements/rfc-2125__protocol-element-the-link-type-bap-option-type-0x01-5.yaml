document: rfc-2125
kind: protocol-element
summary: 'The Link-Type BAP option (type 0x01, 5 octets) contains a 2-octet Link Speed field in kbps and a 1-octet bitmask for link type: bit 0=ISDN, bit 1=X.25, bit 2=analog, bit 3=switched digital (non-ISDN), bit 4=ISDN data over voice. It MUST appear in Call-Request and Callback-Request packets.'
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
