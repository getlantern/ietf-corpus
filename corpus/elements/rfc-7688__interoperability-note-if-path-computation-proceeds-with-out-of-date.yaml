document: rfc-7688
kind: interoperability-note
summary: If path computation proceeds with out-of-date or missing WSON sub-TLV information, it may either yield a path that does not exist in the network or fail to find a path that actually exists. Both situations are already encountered with GMPLS out-of-date constraint information.
