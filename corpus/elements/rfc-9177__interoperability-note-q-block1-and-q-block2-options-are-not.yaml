document: rfc-9177
kind: interoperability-note
summary: Q-Block1 and Q-Block2 options are not a replacement for Block1 and Block2. If a peer does not support Q-Block options, transmissions fall back to using Block1 and Block2. Mixing Q-Block and Block options (CON vs NON, stateless access, multicast) is not supported.
section: "3"
extracted_by: claude-sonnet-4-6
