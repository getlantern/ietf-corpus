document: rfc-8639
kind: interoperability-note
summary: This document supersedes RFC 5277 subscriptions. The new RPCs (establish-subscription, modify-subscription, delete-subscription, kill-subscription) replace RFC 5277's <create-subscription>. The RFC 5277 <notification> message format is reused. A publisher MAY implement both RFC 5277 and this document's mechanisms concurrently, and a single transport session may now intermix RPCs and notification messages for different subscriptions.
section: "1.4"
topics:
    - yang
    - netconf
