document: rfc-7734
kind: security-consideration
summary: The ESI must be unique and common to all SPBM-PEs connected to a common SPBM network or PBBN. An incorrect ESI causes portions of the network not to share reachability, and the EVPN will incorrectly assume separate networks are interconnected by SPBM.
section: "6"
topics:
    - security
    - routing
