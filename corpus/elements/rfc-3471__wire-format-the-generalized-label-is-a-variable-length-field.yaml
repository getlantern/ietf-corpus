document: rfc-3471
kind: wire-format
summary: The Generalized Label is a variable-length field whose interpretation depends on the link type. For FSC and LSC port/wavelength labels, a 32-bit Label field identifies the port/fiber or lambda from the sender's perspective. Generic MPLS and Frame Relay labels are right-justified in 32 bits; ATM labels encode VPI in bits 0-15 and VCI in bits 16-31.
section: 3.2.1
topics:
