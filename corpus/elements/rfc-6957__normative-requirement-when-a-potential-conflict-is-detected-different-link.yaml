document: rfc-6957
kind: normative-requirement
summary: When a potential conflict is detected (different link-layer source) and IPv6-CPE1 is not in the Neighbor Cache, the BNG MUST create a STALE Neighbor Cache entry for IPv6-CPE1 using Link-layer-CPE1 from the Binding Table, then immediately confirm reachability via NUD.
section: 4.2.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
