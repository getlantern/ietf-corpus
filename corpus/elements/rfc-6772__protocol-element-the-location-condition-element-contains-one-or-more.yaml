document: rfc-6772
kind: protocol-element
summary: The <location-condition> element contains one or more <location> child elements. Multiple <location> elements are combined with logical OR (the condition is TRUE if any child matches the Target's location). Multiple <location-condition> elements within <conditions> are combined with logical AND.
