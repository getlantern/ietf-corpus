document: rfc-7878
kind: normative-requirement
summary: When conforming SPPP SOAP servers use language tagging, the XML 'lang' attribute (per W3C XML specification Section 2.12) MUST be used. Clients MAY use the HTTP Accept-Language header to indicate language preference.
