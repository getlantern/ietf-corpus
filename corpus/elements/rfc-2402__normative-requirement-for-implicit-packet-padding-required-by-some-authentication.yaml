document: rfc-2402
kind: normative-requirement
summary: For implicit packet padding required by some authentication algorithms, padding octets MUST have a value of zero. This padding is appended before ICV computation but is NOT transmitted with the packet.
section: 3.3.3.2.2
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
