document: rfc-1549
kind: normative-requirement
summary: For asynchronous links, inter-octet and inter-frame time fill MUST be accomplished by transmitting continuous '1' bits (mark-hold state). Transmitters SHOULD send an opening Flag Sequence whenever 'appreciable time' (suggested maximum ~1 second) has elapsed after the prior closing Flag Sequence.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
