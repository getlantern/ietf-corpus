document: rfc-3948
kind: protocol-element
summary: Transport mode ESP encapsulation inserts a UDP header between the original IP header and the ESP header. After encapsulation the IP header fields Total Length, Protocol, and Header Checksum are updated to reflect the new packet structure.
section: "3.2"
topics:
