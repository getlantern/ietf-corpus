document: rfc-3477
kind: normative-requirement
summary: If the Path message contains the LSP_TUNNEL_INTERFACE_ID object, the tail-end LSR MUST allocate an identifier to the Forwarding Adjacency, and the Resv message MUST contain an LSP_TUNNEL_INTERFACE_ID object with the tail-end's Router ID and the tail-end's allocated Interface ID.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
