document: rfc-1734
kind: protocol-element
summary: 'The AUTH command allows a POP3 client to indicate an authentication mechanism to the server, perform an authentication protocol exchange, and optionally negotiate a protection mechanism for subsequent protocol interactions. It takes a single argument: a string identifying an IMAP4 authentication mechanism.'
