document: rfc-9616
kind: interoperability-note
summary: This extension stores data in sub-TLVs of Hello and IHU TLVs. Unextended Babel implementations silently ignore unknown sub-TLVs per RFC 8966 Appendix D, so hybrid networks of extended and unextended routers are possible; they may have sub-optimal routing but will not have routing loops.
section: "5"
topics:
    - routing
