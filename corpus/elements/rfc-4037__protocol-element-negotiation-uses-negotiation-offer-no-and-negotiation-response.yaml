document: rfc-4037
kind: protocol-element
summary: Negotiation uses Negotiation Offer (NO) and Negotiation Response (NR) messages. A NO presents a preference-ordered list of feature URIs; the responder selects at most one via NR. If the NR is positive, the feature takes effect immediately on both sides. Offers containing a true 'Offer-Pending' parameter keep the Negotiation Phase open.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
