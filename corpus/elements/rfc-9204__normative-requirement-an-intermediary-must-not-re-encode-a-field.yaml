document: rfc-9204
kind: normative-requirement
summary: An intermediary MUST NOT re-encode a field line value that uses a literal representation with the 'N' (never-indexed) bit set using any representation that would index it. If QPACK is used for re-encoding, a literal with the 'N' bit set MUST be used; if HPACK is used, the never-indexed literal representation MUST be used.
section: 7.1.3
rfc2119_level: MUST NOT
topics:
    - http
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
