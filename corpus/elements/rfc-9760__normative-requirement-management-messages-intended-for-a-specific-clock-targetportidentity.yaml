document: rfc-9760
kind: normative-requirement
summary: Management messages intended for a specific clock (targetPortIdentity.clockIdentity not all-1s) MUST be sent as unicast. Signaling messages intended solely for a specific PTP Node MUST also be sent as unicast.
section: "12"
rfc2119_level: MUST
