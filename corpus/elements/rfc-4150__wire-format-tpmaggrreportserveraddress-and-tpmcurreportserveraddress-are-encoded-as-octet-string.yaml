document: rfc-4150
kind: wire-format
summary: 'tpmAggrReportServerAddress and tpmCurReportServerAddress are encoded as OCTET STRING (SIZE 0..108): a leading length octet identifies the address family size, followed by the address bytes in network byte order. For IPv4, the length octet is 4 followed by four address octets. A length octet of 0 encodes a null address used when aggregation type is application(4) or client(2).'
