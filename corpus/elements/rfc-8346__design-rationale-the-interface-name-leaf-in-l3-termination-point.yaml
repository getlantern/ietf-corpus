document: rfc-8346
kind: design-rationale
summary: The interface-name leaf in l3-termination-point-attributes cannot use the interface-ref data type from RFC 8343 directly because that type references interfaces in a single node's datastore, whereas this model needs to uniquely reference interfaces across an entire network.
