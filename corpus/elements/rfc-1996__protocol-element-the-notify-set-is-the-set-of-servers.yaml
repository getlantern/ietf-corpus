document: rfc-1996
kind: protocol-element
summary: The Notify Set is the set of servers to be notified of zone changes. The default is all servers named in the NS RRset, excluding any server also named in the SOA MNAME field. Administrators may override or extend this set, e.g., to include stealth servers.
section: "2.1"
topics:
    - dns
