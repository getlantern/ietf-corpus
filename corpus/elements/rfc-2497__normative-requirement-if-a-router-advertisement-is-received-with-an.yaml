document: rfc-2497
kind: normative-requirement
summary: If a Router Advertisement is received with an MTU option specifying an MTU larger than 60480, or larger than a manually configured value less than 60480, the MTU option MUST be ignored (though it may be logged).
section: "3"
rfc2119_level: MUST
