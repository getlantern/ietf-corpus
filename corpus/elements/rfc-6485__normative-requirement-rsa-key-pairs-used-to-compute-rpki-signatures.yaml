document: rfc-6485
kind: normative-requirement
summary: RSA key pairs used to compute RPKI signatures MUST have a 2048-bit modulus and a public exponent (e) of 65,537. No other key sizes or exponent values are permitted under this profile.
section: "3"
rfc2119_level: MUST
topics:
