document: rfc-5044
kind: normative-requirement
summary: CRCs MUST be enabled unless it is clear that the end-to-end connection has data integrity at least as good as MPA with CRC enabled (for example, when IPsec is implemented end to end). An administrative decision to request CRC suppression SHOULD NOT be made without such assurance.
section: "4.4"
rfc2119_level: MUST
topics:
    - tcp
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
