document: rfc-5420
kind: interoperability-note
summary: The LSP_ATTRIBUTES and LSP_REQUIRED_ATTRIBUTES object mechanisms are equally applicable to MPLS Packet Switch Capable (PSC) LSPs and to GMPLS non-PSC LSPs, since GMPLS signaling is built on RSVP-TE (RFC 3471, RFC 3473).
section: "1.1"
topics:
