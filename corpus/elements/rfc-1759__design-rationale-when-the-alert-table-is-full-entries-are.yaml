document: rfc-1759
kind: design-rationale
summary: 'When the Alert Table is full, entries are deleted in this priority order: (1) oldest non-critical simple alert, (2) oldest non-critical binary alert, (3) oldest critical binary alert. Implementors are encouraged to pre-allocate sufficient storage for the maximum possible simultaneous critical alerts to avoid deleting them.'
section: 2.2.13.4
topics:
