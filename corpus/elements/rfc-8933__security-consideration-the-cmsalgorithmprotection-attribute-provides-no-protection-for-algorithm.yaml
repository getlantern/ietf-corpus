document: rfc-8933
kind: security-consideration
summary: The CMSAlgorithmProtection attribute provides no protection for algorithm identifiers in the enveloped-data, digested-data, encrypted-data, or authenticated-enveloped-data content types. Protection for those types is identified as future work.
