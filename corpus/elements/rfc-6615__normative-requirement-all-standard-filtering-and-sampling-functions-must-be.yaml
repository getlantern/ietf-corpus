document: rfc-6615
kind: normative-requirement
summary: All standard filtering and sampling functions MUST be registered in the subtree under ipfixSelectorFunctions. New Selector Functions MUST be registered with IANA and are subject to Expert Review; their specifications MUST be published in a well-established, persistent publication medium.
