document: rfc-3852
kind: design-rationale
summary: Specific cryptographic algorithms were moved from the CMS specification into a separate document (CMSALG). This separation allows the IETF to update protocol and algorithm specifications independently; CMS itself does not require implementation of any particular algorithms, leaving the choice to protocols that use CMS.
section: 1.1.2
topics:
    - crypto
    - security
