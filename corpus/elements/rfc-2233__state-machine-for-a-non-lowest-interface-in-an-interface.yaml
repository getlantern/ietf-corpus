document: rfc-2233
kind: state-machine
summary: 'For a non-lowest interface in an interface stack: ifOperStatus is ''up'' if any lower interface is up; may be ''up'' or ''dormant'' if one or more lower interfaces are dormant and all others are non-up; and is ''lowerLayerDown'' only when all lower interfaces are down, notPresent, lowerLayerDown, or testing.'
section: 3.1.14
