document: rfc-8365
kind: normative-requirement
summary: For VLAN-Based Service (single VNI per MAC-VRF), the Ethernet Tag field in MAC/IP Advertisement, Ethernet A-D per EVI, and IMET routes MUST be set to zero, consistent with VLAN-Based Service in RFC 7432.
section: 5.1.3
rfc2119_level: MUST
