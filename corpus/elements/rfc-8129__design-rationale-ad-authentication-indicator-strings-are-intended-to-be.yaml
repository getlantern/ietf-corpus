document: rfc-8129
kind: design-rationale
summary: AD-AUTHENTICATION-INDICATOR strings are intended to be used as positive indications that certain requirements were met, not as negative indicators, to avoid ambiguity. For example, a 'without-password' indicator could misleadingly apply to anonymous PKINIT where no authentication occurred at all.
section: "5"
topics:
    - security
