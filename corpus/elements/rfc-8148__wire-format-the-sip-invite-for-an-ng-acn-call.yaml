document: rfc-8148
kind: wire-format
summary: The SIP INVITE for an NG-ACN call uses 'urn:service:sos.ecall.automatic' or 'urn:service:sos.ecall.manual' in the Request-URI, includes Call-Info header fields referencing the VEDS and metadata/control blocks, and carries PIDF-LO, VEDS, and capabilities data as multipart body parts with Content-Disposition 'by-reference;handling=optional'.
