document: rfc-7118
kind: design-rationale
summary: The SIP Outbound extension (RFC 5626) and GRUU (RFC 5627) are recommended for WebSocket SIP deployments because WebSocket clients behind NAT are only reachable through the proxy to which they are connected, making them analogous to SIP UAs that must reuse a TCP connection for incoming requests.
section: B
topics:
