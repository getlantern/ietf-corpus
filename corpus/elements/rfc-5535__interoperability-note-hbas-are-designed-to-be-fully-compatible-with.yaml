document: rfc-5535
kind: interoperability-note
summary: HBAs are designed to be fully compatible with CGAs as defined in RFC 3972. It is possible to generate addresses that are simultaneously valid CGAs and HBAs by including the Multi-Prefix extension in the CGA Parameter Data Structure, enabling use with Secure Neighbor Discovery (SeND) and other CGA-based protocols.
