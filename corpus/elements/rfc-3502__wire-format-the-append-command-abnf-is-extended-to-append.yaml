document: rfc-3502
kind: wire-format
summary: 'The APPEND command ABNF is extended to: append = "APPEND" SP mailbox 1*append-message, and append-message = [SP flag-list] [SP date-time] SP literal. The "1*" quantifier (one or more) is the key change from the base IMAP4rev1 syntax which allowed only a single message.'
section: Modification to IMAP4rev1 Base Protocol Formal Syntax
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
