document: rfc-7377
kind: interoperability-note
summary: The Fuzzy Search extension (RFC 6203) is compatible with MULTISEARCH. This document explicitly permits flexible (fuzzy) text matching for TEXT and BODY searches in multimailbox searches; servers MAY use fuzzy matching even without the Fuzzy Search extension.
section: "2.3"
topics:
    - email
