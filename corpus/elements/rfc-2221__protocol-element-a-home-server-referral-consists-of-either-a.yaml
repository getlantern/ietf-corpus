document: rfc-2221
kind: protocol-element
summary: 'A home server referral consists of either a tagged NO or OK, or an untagged BYE response that contains a LOGIN-REFERRALS response code with a valid IMAP URL argument. Example: `A001 NO [REFERRAL IMAP://user;AUTH=*@SERVER2/] Remote Server`.'
