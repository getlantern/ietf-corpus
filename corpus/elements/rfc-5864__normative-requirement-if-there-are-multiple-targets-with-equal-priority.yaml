document: rfc-5864
kind: normative-requirement
summary: If there are multiple targets with equal priority, the weight value of the DNS SRV RR SHOULD be used as input to a weighted algorithm for selecting servers. Larger weights SHOULD be given a proportionately higher probability of being selected, and a weight of 0 SHOULD be used if all targets with that priority are weighted equally.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
