document: rfc-8663
kind: normative-requirement
summary: When Router E advertises the Prefix-SID SID(E) of prefix P(E), it MUST also advertise the egress endpoint address and the encapsulation type of any tunnel used to reach E, and this information is flooded domain wide.
section: "3.1"
rfc2119_level: MUST
topics:
