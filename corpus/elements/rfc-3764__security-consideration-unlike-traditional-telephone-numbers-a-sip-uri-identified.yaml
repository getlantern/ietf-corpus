document: rfc-3764
kind: security-consideration
summary: Unlike traditional telephone numbers, a SIP URI identified in ENUM may require callers to provide cryptographic credentials for authentication and authorization before alerting the user, potentially providing greater protection from unwanted callers than the PSTN despite the public availability of ENUM records.
section: "6"
topics:
