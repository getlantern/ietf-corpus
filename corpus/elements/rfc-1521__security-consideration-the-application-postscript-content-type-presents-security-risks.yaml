document: rfc-1521
kind: security-consideration
summary: The application/PostScript content type presents security risks because PostScript is a full Turing-complete programming language capable of causing arbitrary actions on the recipient's system, including file writes and command execution. User agents must protect recipients by restricting PostScript interpreter capabilities, running PostScript in a sandbox, or warning users before execution.
section: "9"
topics:
    - email
    - security
