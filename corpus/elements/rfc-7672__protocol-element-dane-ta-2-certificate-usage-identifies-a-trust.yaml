document: rfc-7672
kind: protocol-element
summary: DANE-TA(2) certificate usage identifies a trust anchor; the server certificate chain is validated against this TA with name checks required. Servers must include the TA certificate in the TLS handshake. TLSA records SHOULD use selector Cert(0) rather than SPKI(1) to enforce full TA certificate constraints.
section: 3.1.2
topics:
