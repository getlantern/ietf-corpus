document: rfc-7574
kind: wire-format
summary: The Chunk Ranges scheme encodes a chunk specification as a (start chunk, end chunk) pair of 32-bit or 64-bit unsigned integers (end inclusive). Support is mandatory for all PPSPP peers. The optional Byte Ranges scheme uses two 64-bit byte offsets instead.
