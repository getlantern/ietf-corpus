document: rfc-8159
kind: normative-requirement
summary: Routers MAY implement L2TPv3 fragmentation (RFC 4623 Section 5). In the absence of a control plane, fragmentation (if implemented) SHOULD be configured locally on a per-tunnel basis, and fragmentation configuration MUST be consistent between the two tunnel endpoints.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
