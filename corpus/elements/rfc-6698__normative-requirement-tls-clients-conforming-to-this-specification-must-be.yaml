document: rfc-6698
kind: normative-requirement
summary: TLS clients conforming to this specification MUST be able to correctly interpret TLSA records with certificate usages 0, 1, 2, and 3; MUST support selectors 0 and 1; MUST support matching types 0 (exact) and 1 (SHA-256); and SHOULD support matching type 2 (SHA-512).
section: "6"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
