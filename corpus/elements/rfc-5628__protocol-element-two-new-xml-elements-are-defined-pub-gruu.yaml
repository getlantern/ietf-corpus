summary: 'Two new XML elements are defined: <pub-gruu> containing the public GRUU URI, and <temp-gruu> containing the most recently assigned temporary GRUU URI plus a ''first-cseq'' attribute identifying the oldest currently valid temporary GRUU. Both are optional children of the <contact> element in reginfo documents.'
