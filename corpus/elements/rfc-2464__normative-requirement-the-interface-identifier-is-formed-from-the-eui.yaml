document: rfc-2464
kind: normative-requirement
summary: The Interface Identifier is formed from the EUI-64 by complementing the Universal/Local (U/L) bit (next-to-lowest-order bit of the first octet), changing it from 0 to 1 for universally administered addresses to signal global uniqueness in the IPv6 context.
section: "4"
rfc2119_level: SHOULD
topics:
