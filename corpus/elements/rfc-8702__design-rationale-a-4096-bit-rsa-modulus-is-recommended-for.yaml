document: rfc-8702
kind: design-rationale
summary: A 4096-bit RSA modulus is recommended for SHAKE256 rather than the theoretically required 15360-bit modulus for 256-bit security because the latter is impractical with current technology; this is a deliberate trade-off between security levels and real-world deployability.
