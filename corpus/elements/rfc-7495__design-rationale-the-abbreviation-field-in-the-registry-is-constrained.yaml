document: rfc-7495
kind: design-rationale
summary: The Abbreviation field in the registry is constrained to uppercase ASCII (at least two characters) to avoid mismatches caused by case differences. The Designated Expert is also instructed to prefer short Abbreviations over long ones for usability.
