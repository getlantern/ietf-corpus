document: rfc-9828
kind: normative-requirement
summary: When R=1, all Main Packets in the RTP stream MUST have identical Main Packet Payload Headers (except TP, MH, ESEQ, and PTSTAMP), MUST contain the same codestream main header information (except SOT, COM, and pointer marker segments), and MUST NOT contain non-Extended-Header bytes.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
