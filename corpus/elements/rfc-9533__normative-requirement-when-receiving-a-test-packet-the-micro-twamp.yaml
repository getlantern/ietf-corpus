document: rfc-9533
kind: normative-requirement
summary: When receiving a test packet, the micro TWAMP Session-Reflector MUST use the receiving member link to correlate the packet to a micro TWAMP session and MUST discard it if no session is found. If Reflector Micro-session ID is non-zero, the Reflector MUST validate it against the receiving member link and MUST discard the packet if validation fails.
section: 4.2.4
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
