document: rfc-5386
kind: design-rationale
summary: The non-overlap requirement for the wildcard BTNS PAD entry is enforced by searching the PAD a second time when BTNS peers negotiate child SAs, ensuring BTNS peers cannot assert traffic selectors that conflict with non-BTNS PAD entries and thereby impersonate authenticated peers.
section: "2"
topics:
