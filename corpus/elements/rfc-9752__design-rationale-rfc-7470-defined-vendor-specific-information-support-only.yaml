document: rfc-9752
kind: design-rationale
summary: RFC 7470 defined vendor-specific information support only for stateless PCEP. This document extends that capability to stateful PCEP messages (PCRpt, PCUpd, PCInitiate) because the Vendor Information object and VENDOR-INFORMATION-TLV are equally useful in the stateful PCE model.
section: "1"
topics:
    - routing
    - mpls
