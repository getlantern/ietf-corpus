document: rfc-2247
kind: security-consideration
summary: Servers should ensure that an appropriate security policy is maintained when attributes of objects are discovered and retrieved. A client contacting an untrusted server may receive incorrect or misleading information, such as an organization's server falsely claiming to hold naming contexts for domain names not delegated to that organization.
section: "7"
topics:
    - ldap
    - dns
    - security
