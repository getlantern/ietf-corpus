document: rfc-4656
kind: protocol-element
summary: 'Send schedules are composed of typed slots: type 0 (exponentially distributed pseudo-random delay with specified mean) and type 1 (fixed delay). The schedule is circular; both sender and receiver independently execute the same schedule to reconstruct send times for lost packets. Seeds for type-0 slots use a specified reproducible algorithm.'
section: "3.6"
