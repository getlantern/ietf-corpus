document: rfc-7798
kind: wire-format
summary: An Aggregation Packet (AP, Type=48) begins with a 2-byte PayloadHdr, followed by two or more aggregation units. The first aggregation unit contains an optional 16-bit DONL, a 16-bit NALU size, and the full NAL unit. Each subsequent unit contains an optional 8-bit DOND, a 16-bit NALU size, and the full NAL unit.
section: 4.4.2
