document: rfc-3212
kind: design-rationale
summary: The default setup and holding priority is set to 4 (the middle of the 0-7 range) so that preemption can be enabled gradually in an operational network by incrementally increasing or decreasing priorities from the midpoint, avoiding disruption during rollout.
