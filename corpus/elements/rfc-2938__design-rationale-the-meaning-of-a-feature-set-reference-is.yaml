document: rfc-2938
kind: design-rationale
summary: The meaning of a feature set reference is defined by substitution of the referenced feature expression into the referencing expression, and is independent of any particular dereferencing mechanism. This ensures that failure of a resolution service to return the correct expression is detectable by a calling application.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
