document: rfc-5654
kind: normative-requirement
summary: MPLS-TP MUST support both the logical and physical separation of the control and management planes from the data plane. When planes run out-of-band, no assumptions SHOULD be made about data-plane channel state from control/management-plane channel state.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
