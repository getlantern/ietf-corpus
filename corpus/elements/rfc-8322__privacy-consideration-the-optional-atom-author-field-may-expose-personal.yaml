document: rfc-8322
kind: privacy-consideration
summary: The optional atom:author field may expose personal identifying information without consent if an Entry is published to a public Feed. When aggregating or programmatically generating ROLIE Entries, special care should be taken to ensure author personal information is not shared without consent.
section: "10"
topics:
