document: rfc-4535
kind: protocol-element
summary: The Cookie Download message (exchange type 10) is sent in Cookie Mode by the GC/KS in response to an RTJ without cookie information. It includes a cookie in a Notification payload of type Cookie_Required; the GM MUST retry the RTJ with this supplied cookie to prove IP address reachability.
section: 5.2.2
topics:
    - security
