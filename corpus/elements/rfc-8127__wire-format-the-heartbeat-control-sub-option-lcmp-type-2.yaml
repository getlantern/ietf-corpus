document: rfc-8127
kind: wire-format
summary: 'The Heartbeat Control Sub-Option (LCMP Type=2, LCMP Length=6) contains three 16-bit unsigned integer fields: HB-Interval (seconds after a successful heartbeat exchange), HB-Retransmission-Delay (minimum seconds before retransmission), and HB-Max-Retransmissions (maximum retransmission count).'
