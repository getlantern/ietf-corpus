document: rfc-7471
kind: security-consideration
summary: RFC 7471 does not introduce security issues beyond those in RFC 3630. For OSPFv2, additional protection is provided by HMAC-SHA (RFC 5709) and security extensions. For OSPFv3, IPsec (RFC 4552) and Authentication Trailer (RFC 7166) provide protection. OSPF KARP (RFC 6863) analyzes OSPFv2/v3 routing security gaps.
section: "11"
topics:
    - security
    - routing
