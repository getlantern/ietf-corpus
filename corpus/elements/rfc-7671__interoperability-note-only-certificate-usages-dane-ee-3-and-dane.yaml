document: rfc-7671
kind: interoperability-note
summary: Only certificate usages DANE-EE(3) and DANE-TA(2) work well with TLSA CNAMEs across organizational boundaries. With PKIX-TA(0) or PKIX-EE(1), the Service Provider would need to obtain certificates in the name of the Customer Domain or the customer would need to provision private keys at the provider.
section: "6"
topics:
