summary: 'The Smart Endnode solution supports FGL-aware endnodes: because Smart Endnodes perform their own encapsulation, they can set the Inner.Label to a Fine-Grained Label (RFC 7172). When and how to choose FGL versus VLAN is explicitly left out of scope.'
