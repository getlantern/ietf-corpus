summary: 'The ietf-yang-types YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-yang-types, prefix ''yang'') defines generally useful derived data types: counters, gauges, object identifiers, date/time types, address types, and XPath expressions. It is the core reusable type library for YANG-based management data models.'
