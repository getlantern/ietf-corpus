document: rfc-4582
kind: wire-format
summary: BFCP attributes use TLV (Type-Length-Value) encoding and are 32-bit aligned. Each attribute begins with a 7-bit Type field, a 1-bit Mandatory (M) flag, and an 8-bit Length field in octets (including Type, M, and Length fields); padding of 1–3 octets is added as needed.
section: "5.2"
