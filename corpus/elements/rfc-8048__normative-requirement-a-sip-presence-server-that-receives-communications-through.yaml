document: rfc-8048
kind: normative-requirement
summary: A SIP Presence Server that receives communications through an XMPP-to-SIP gateway from users not associated with a domain related to the gateway's hostname SHOULD (based on local service provisioning) refuse to service such users or refuse to receive traffic from that gateway.
section: "8.1"
rfc2119_level: SHOULD
topics:
    - security
    - sip
    - realtime
