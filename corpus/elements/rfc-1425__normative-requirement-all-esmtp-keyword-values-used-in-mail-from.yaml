document: rfc-1425
kind: normative-requirement
summary: All esmtp-keyword values used in MAIL FROM and RCPT TO parameters MUST be registered as part of the IANA registration process. RFC 1425 defines only the framework; no extended MAIL FROM or RCPT TO parameters are defined here.
section: "6"
rfc2119_level: MUST
