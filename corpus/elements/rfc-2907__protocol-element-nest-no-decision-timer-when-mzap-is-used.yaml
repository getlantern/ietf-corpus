document: rfc-2907
kind: protocol-element
summary: 'NEST_NO_DECISION_TIMER: when MZAP is used, this value should be greater than NIM-INTERVAL + 30%, corresponding to 1800 + 30% = 2340 seconds (39 minutes). ZONES_EXIST_TIMER: when MZAP is used, this value should be no less than NIM-HOLDTIME, which defaults to 5460 seconds (91 minutes).'
