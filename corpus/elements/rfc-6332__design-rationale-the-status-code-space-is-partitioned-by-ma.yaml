document: rfc-6332
kind: design-rationale
summary: The status code space is partitioned by MA method (1-1000 for simple join, 1001-2000 for RAMS) to allow easier classification and to support newly defined MA methods, while acknowledging that due to the limited 16-bit space, not every MA method can have 1000 reserved values.
