document: rfc-9767
kind: protocol-element
summary: Token introspection allows an RS to validate that an access token was issued by the AS, is currently valid, has not been revoked, and is appropriate for the calling RS. The RS signs the introspection request with its own key (not the client or token key) and sends the token value in the access_token field.
section: "3.3"
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
