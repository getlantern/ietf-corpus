document: rfc-6546
kind: protocol-element
summary: Table 1 defines the allowable RID response message types for each request type. InvestigationRequest and TraceRequest may receive Acknowledgement, Result, or Report (200) or empty 202; Query may receive Acknowledgement or Report (200) or empty 202; Acknowledgement/Result callbacks receive empty 200; Report may receive Acknowledgement or empty 200.
