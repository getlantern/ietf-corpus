document: rfc-5275
kind: wire-format
summary: GLUseKEK is a SEQUENCE containing glInfo (GLInfo with glName and glAddress GeneralNames), glOwnerInfo (SEQUENCE SIZE(1..MAX) OF GLOwnerInfo), glAdministration (GLAdministration DEFAULT 1), and optional glKeyAttributes. GLOwnerInfo carries glOwnerName, glOwnerAddress, and an optional Certificates structure with pKC, aC, and certPath fields.
