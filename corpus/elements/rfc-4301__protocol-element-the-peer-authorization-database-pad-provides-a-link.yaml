document: rfc-4301
kind: protocol-element
summary: The Peer Authorization Database (PAD) provides a link between an SA management protocol (IKE) and the SPD. Each PAD entry identifies a peer, specifies the authentication method and data, and authorizes the set of child SAs the peer may create. It is consulted to authenticate peers and verify SA proposals.
section: 4.4.3
topics:
    - ipsec
    - security
