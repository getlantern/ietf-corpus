document: rfc-9167
kind: interoperability-note
summary: During version migration, the version of the maintenance <info> response MUST match the version of the maintenance <info> command executed. Servers SHOULD support older extension versions in parallel during a temporary migration period per server policy.
section: "2"
rfc2119_level: MUST
