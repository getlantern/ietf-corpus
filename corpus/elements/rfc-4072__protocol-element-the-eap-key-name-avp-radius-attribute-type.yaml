document: rfc-4072
kind: protocol-element
summary: The EAP-Key-Name AVP (RADIUS Attribute Type 102, type OctetString) carries an opaque key identifier generated by the EAP method. It is included in the DEA only if an empty EAP-Key-Name AVP was present in the DER, and the NAS cannot populate it because it operates in pass-through mode.
section: 4.1.4
topics:
