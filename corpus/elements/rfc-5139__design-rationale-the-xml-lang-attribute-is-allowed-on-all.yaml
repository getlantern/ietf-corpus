document: rfc-5139
kind: design-rationale
summary: 'The ''xml:lang'' attribute is allowed on all elements except ''country'' and ''PLC'', which contain language-neutral values: ''country'' values are from ISO 3166-1, and ''PLC'' values are from the IANA location types registry defined by RFC 4589.'
