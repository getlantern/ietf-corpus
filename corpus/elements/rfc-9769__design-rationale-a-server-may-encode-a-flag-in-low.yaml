document: rfc-9769
kind: design-rationale
summary: A server may encode a flag in low-order sub-precision bits of receive and transmit timestamps to distinguish receive timestamps, allowing it to quickly skip the saved-timestamp search for requests in basic mode and avoid wasting resources.
