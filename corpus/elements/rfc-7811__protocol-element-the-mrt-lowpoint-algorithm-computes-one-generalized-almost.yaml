document: rfc-7811
kind: protocol-element
summary: The MRT Lowpoint algorithm computes one Generalized Almost Directed Acyclic Graph (GADAG) from which a router derives its MRT-Blue and MRT-Red next hops to all destinations, and then selects alternates for each primary next hop. The GADAG encodes a partial order over network nodes relative to the GADAG root.
