document: rfc-4511
kind: protocol-element
summary: Controls extend existing LDAP operation semantics. Each Control is a SEQUENCE of controlType (LDAPOID), criticality BOOLEAN (default FALSE), and optional controlValue OCTET STRING. Request controls are sent by clients; response controls are sent by servers.
section: 4.1.11
topics:
