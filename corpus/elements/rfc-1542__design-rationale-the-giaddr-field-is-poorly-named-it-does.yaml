document: rfc-1542
kind: design-rationale
summary: The 'giaddr' field is poorly named; it does not represent a general IP router for the client to use post-boot. RFC 951 Section 7.5 implied it could be used as a first-hop for TFTP, which is incorrect because relay agents may not be IP routers and may hold broadcast addresses.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
