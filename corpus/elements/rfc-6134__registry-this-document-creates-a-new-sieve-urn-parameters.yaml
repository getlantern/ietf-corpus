summary: This document creates a new "Sieve URN Parameters" registry under "Sieve Extensions", governed by the "Specification Required" policy (RFC 5226). Each entry must include the URN parameter name, a reference to the defining document and section, and documentation covering syntax, intended usage, interoperability considerations, and security considerations.
