document: rfc-9727
kind: interoperability-note
summary: When a Publisher's API catalog links to APIs hosted on a domain for which the Publisher is not the authority, the catalog MAY include a link to the third-party domain's own api-catalog using the 'api-catalog' link relation rather than listing those APIs directly.
section: "5.1"
topics:
    - http
