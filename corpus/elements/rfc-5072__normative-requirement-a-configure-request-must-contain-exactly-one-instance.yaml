document: rfc-5072
kind: normative-requirement
summary: A Configure-Request MUST contain exactly one instance of the Interface-Identifier option. The interface identifier MUST be unique within the PPP link, i.e., the two ends of the link MUST negotiate different values.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
