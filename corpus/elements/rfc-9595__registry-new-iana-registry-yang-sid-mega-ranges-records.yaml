document: rfc-9595
kind: registry
summary: 'New IANA registry ''YANG-SID Mega-Ranges'' records delegation of SID block management to third parties (SDOs or registrars). Each entry contains entry-point, block size (SHOULD be 1,000,000 SIDs), allocation policy (Public/Private/both), and organization contact. Allocation policy is Expert Review. Initial entry: IANA, entry-point 0, size 1,000,000, Public.'
section: "6.3"
