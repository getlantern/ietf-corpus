document: rfc-8982
kind: interoperability-note
summary: Servers can define basic field sets that, if known to clients, increase the probability of obtaining a valid response and facilitate RDAP interoperability. Field sets are described in out-of-band documents such as RDAP profiles, supplemented by the in-band "subsetting_metadata" mechanism.
