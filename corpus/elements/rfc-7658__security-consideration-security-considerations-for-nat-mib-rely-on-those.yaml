document: rfc-7658
kind: security-consideration
summary: Security considerations for NAT-MIB rely on those specified in RFC 4008 and RFC 7659 (NATV2-MIB). The writable objects in NAT-MIB (now deprecated) represented the primary security exposure; migrating to the read-mostly NATV2-MIB reduces the attack surface.
section: "5"
topics:
    - nat
    - snmp
    - security
