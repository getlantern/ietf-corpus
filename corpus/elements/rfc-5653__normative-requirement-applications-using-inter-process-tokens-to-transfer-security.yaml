document: rfc-5653
kind: normative-requirement
summary: Applications using inter-process tokens to transfer security contexts must take appropriate steps to protect these tokens in transit and transfer them only to trustworthy processes, as they may contain cryptographic keys and other sensitive data.
section: "5.11"
rfc2119_level: MUST
topics:
    - security
    - crypto
