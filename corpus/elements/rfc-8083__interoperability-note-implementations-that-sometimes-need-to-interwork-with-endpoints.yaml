document: rfc-8083
kind: interoperability-note
summary: Implementations that sometimes need to interwork with endpoints that do not support RTCP need to disable the RTP circuit breakers if they don't receive signaling confirmation that the remote endpoint implements RTCP (e.g., an SDP 'a=rtcp:' attribute in an answer).
section: "4"
topics:
