document: rfc-5764
kind: normative-requirement
summary: If the client receives a nonzero-length MKI in the server's use_srtp response that differs from the one the client offered, the client MUST abort the handshake and SHOULD send an invalid_parameter alert.
section: 4.1.3
rfc2119_level: MUST
