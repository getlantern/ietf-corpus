document: rfc-9314
kind: design-rationale
summary: The 'client-cfg-parms' grouping is defined to let BFD clients such as IGPs configure BFD session parameters (multiplier and intervals) without knowing peer addresses in advance. When an IGP auto-discovers a peer, it can create or remove the BFD session; authentication parameters are still specified centrally under BFD.
section: "2.1"
topics:
    - yang
    - routing
