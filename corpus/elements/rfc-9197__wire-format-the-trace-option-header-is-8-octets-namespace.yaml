document: rfc-9197
kind: wire-format
summary: 'The Trace Option header is 8 octets: Namespace-ID (16 bits), NodeLen (5-bit unsigned integer in multiples of 4 octets), Flags (4 bits), RemainingLen (7-bit unsigned integer), IOAM Trace-Type (24-bit bitmask), and Reserved (8 bits). Trace option data MUST be 4-octet aligned.'
