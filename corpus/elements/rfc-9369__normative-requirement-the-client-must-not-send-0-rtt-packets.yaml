document: rfc-9369
kind: normative-requirement
summary: The client MUST NOT send 0-RTT packets using the negotiated version, even after processing a packet of that version from the server. Servers can accept 0-RTT and process 0-RTT packets from the original version.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - quic
    - tls
