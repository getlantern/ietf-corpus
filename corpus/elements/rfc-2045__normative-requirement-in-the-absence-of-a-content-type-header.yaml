document: rfc-2045
kind: normative-requirement
summary: In the absence of a Content-Type header field, or when a syntactically invalid Content-Type is encountered, the default media type is 'text/plain; charset=us-ascii'. This default SHOULD also be assumed for syntactically invalid Content-Type fields.
section: "5.2"
rfc2119_level: SHOULD
