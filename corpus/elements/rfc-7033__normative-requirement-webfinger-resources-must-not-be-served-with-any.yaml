document: rfc-7033
kind: normative-requirement
summary: WebFinger resources MUST NOT be served with any URI scheme other than HTTPS. The path component of a WebFinger URI MUST be '/.well-known/webfinger', and the query component MUST include the 'resource' parameter.
section: "4"
rfc2119_level: MUST
topics:
    - http
    - security
