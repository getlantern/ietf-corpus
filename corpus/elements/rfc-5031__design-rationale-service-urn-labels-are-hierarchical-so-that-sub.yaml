document: rfc-5031
kind: design-rationale
summary: Service URN labels are hierarchical so that sub-service identifiers can be removed right-to-left and the resulting URN remains valid, referring to a more generic service. This allows implementations to fall back gracefully when a specific sub-service is not recognized.
section: "3"
topics:
