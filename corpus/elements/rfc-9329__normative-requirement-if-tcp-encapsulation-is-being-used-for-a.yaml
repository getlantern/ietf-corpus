document: rfc-9329
kind: normative-requirement
summary: If TCP encapsulation is being used for a specific IKE SA, all IKE messages for that SA and ESP packets for its Child SAs MUST be sent over the TCP connection until the SA is deleted or MOBIKE is used to change the SA endpoints and/or encapsulation protocol.
section: "5"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
