document: rfc-7573
kind: interoperability-note
summary: XEP-0085 defines five chat states (active, inactive, gone, composing, paused) while RFC 3994 defines only two (idle, active). Gateways may either map only composing-related states or map all five XEP-0085 states; the document provides suggested mappings for both directions.
