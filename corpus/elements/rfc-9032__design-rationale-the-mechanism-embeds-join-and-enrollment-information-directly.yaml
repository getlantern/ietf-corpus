document: rfc-9032
kind: design-rationale
summary: The mechanism embeds join and enrollment information directly in the Enhanced Beacon rather than requiring separate broadcast messages, because broadcast slots in TSCH are extremely scarce (potentially only 1 per second) and additional multicasts for RA/RS would consume valuable Aloha slots with unencrypted traffic, severely slowing the pledge join process.
section: "1.3"
topics:
