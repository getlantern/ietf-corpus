document: rfc-7518
kind: normative-requirement
summary: The comparison of the computed HMAC value to the JWS Signature value MUST be done in a constant-time manner to thwart timing attacks. Alternatively, both values may be base64url encoded before comparison, also in constant-time.
section: "3.2"
rfc2119_level: MUST
topics:
    - jose
    - crypto
    - security
