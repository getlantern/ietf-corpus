document: rfc-1738
kind: protocol-element
summary: 'The file URL scheme (`file://<host>/<path>`) designates files on a specific host. The host may be ''localhost'' or empty to mean the local machine. Unlike other schemes, file: does not specify an Internet protocol and has limited utility in network protocols.'
section: "3.10"
