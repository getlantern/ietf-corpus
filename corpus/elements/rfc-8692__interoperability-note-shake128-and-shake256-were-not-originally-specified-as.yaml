document: rfc-8692
kind: interoperability-note
summary: SHAKE128 and SHAKE256 were not originally specified as hash algorithm options in the X9.62 or SEC1 ECDSA standards. However, SHAKE128 and SHAKE256 with output lengths of 32 and 64 octets respectively can be used in place of SHA256 and SHA512 for ECDSA, as they provide equivalent output sizes.
section: 4.1.2
topics:
    - crypto
    - pkix
