document: rfc-7724
kind: normative-requirement
summary: A successful Active Leasequery reply carrying binding data MUST include a non-zero ciaddr. The requestor MUST be prepared to receive multiple replies per transaction and multiple copies of binding information for a single IPv4 address.
section: "7.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
