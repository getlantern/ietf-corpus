document: rfc-2241
kind: security-consideration
summary: DHCP provides no authentication or security mechanisms. An unauthorized DHCP server could use these options to misdirect an NDS client to a nonexistent or spoofed NDS server. These threats are similar to those NDS faces in its native IPX environment.
section: "6"
topics:
