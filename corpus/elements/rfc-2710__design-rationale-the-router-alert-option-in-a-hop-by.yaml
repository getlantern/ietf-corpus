document: rfc-2710
kind: design-rationale
summary: The Router Alert option in a Hop-by-Hop Options header is required on all MLD messages so that routers will examine MLD messages sent to multicast addresses in which the routers themselves have no interest; without it, routers might not process those packets.
section: "3"
topics:
    - multicast
    - ip
