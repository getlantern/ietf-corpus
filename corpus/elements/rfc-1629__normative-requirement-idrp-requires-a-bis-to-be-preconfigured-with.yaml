document: rfc-1629
kind: normative-requirement
summary: IDRP requires a BIS to be preconfigured with the RDI of its domain. If the domain belongs to one or more RDCs, the BIS must also be preconfigured with the RDCIs of all those RDCs and with information about their relationships (nested or overlapped).
section: "3.3"
rfc2119_level: REQUIRED
topics:
    - routing
