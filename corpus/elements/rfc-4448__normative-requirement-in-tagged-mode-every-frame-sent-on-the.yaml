document: rfc-4448
kind: normative-requirement
summary: In tagged mode, every frame sent on the PW MUST have a service-delimiting VLAN tag. If the frame received from the attachment circuit does not have such a tag, the PE must prepend the frame with a dummy VLAN tag before sending it on the PW. This is the default and only REQUIRED mode.
section: 4.4.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
