document: rfc-2431
kind: normative-requirement
summary: If a receiver is generating a BT.656-3 data stream directly from the RTP packet, the F and V bits MUST be copied from the payload header rather than being generated implicitly from the scan line number; in the event of conflict, F and V bits have precedence.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
