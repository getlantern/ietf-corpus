summary: 'Appendix A proves that Group Best Paths are adequate when the IGP metric constraint is followed: if no path in a cluster survives global comparisons, the Group Best Path comes from another cluster and its advertisement does not depend on paths received from that peer, breaking the oscillation cycle.'
