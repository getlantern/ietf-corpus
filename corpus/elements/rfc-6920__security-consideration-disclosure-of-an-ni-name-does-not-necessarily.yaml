document: rfc-6920
kind: security-consideration
summary: Disclosure of an ni name does not necessarily disclose the referenced object, but may enable an attacker to determine its contents via search engines or by guessing, especially for highly formatted objects with little variation. Hash-based names do not protect confidentiality of the hashed content.
section: "10"
topics:
