document: rfc-9834
kind: protocol-element
summary: The BGP routing structure supports peer groups and individual neighbors with per-entry configuration of local-AS, peer-AS, address-family (ipv4/ipv6/dual-stack), role (per RFC 9234), local-address, max-prefix, authentication (TCP-AO or MD5 via key chain), BFD failure-detection-profile, and per-neighbor timing constraints.
