document: rfc-1771
kind: normative-requirement
summary: An UPDATE message may advertise at most one feasible route (described by one set of path attributes and one NLRI field) but may simultaneously withdraw multiple unfeasible routes. The same attribute type code must not appear more than once in a single UPDATE.
section: "4.3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
