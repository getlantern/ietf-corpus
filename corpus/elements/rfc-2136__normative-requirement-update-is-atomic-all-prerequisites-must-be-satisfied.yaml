document: rfc-2136
kind: normative-requirement
summary: 'UPDATE is atomic: all prerequisites must be satisfied or no update operations take place. If any system failure occurs during Update Section processing, the server MUST signal SERVFAIL and undo all updates applied during the transaction.'
section: 3.4.2.1
rfc2119_level: MUST
