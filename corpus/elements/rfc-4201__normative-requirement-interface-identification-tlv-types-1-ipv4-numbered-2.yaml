document: rfc-4201
kind: normative-requirement
summary: Interface Identification TLV types 1 (IPv4 numbered), 2 (IPv6 numbered), and 3 (unnumbered) SHOULD be used to indicate component links in IF_ID RSVP_HOP objects and IF_ID TLVs. The Component Interface TLVs (types 4 and 5) SHOULD NOT be used.
section: "2.3"
rfc2119_level: SHOULD
topics:
