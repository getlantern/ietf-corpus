document: rfc-5665
kind: normative-requirement
summary: Only the IESG, on the advice of a Designated Expert, can update a netid or uaddr format registration made on a Standards Action basis. First Come First Served registrations may be updated by the registrant, the IESG, or a Designated Expert.
section: 5.1.2
rfc2119_level: MUST
topics:
