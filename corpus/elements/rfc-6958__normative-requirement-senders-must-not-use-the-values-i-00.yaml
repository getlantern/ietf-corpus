document: rfc-6958
kind: normative-requirement
summary: Senders MUST NOT use the values I=00 or I=01 in the Interval Metric flag. If a block is received with I=00 or I=01, the receiver MUST discard the block.
section: "3.2"
rfc2119_level: MUST NOT
