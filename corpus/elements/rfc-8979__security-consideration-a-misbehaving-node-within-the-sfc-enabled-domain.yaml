document: rfc-8979
kind: security-consideration
summary: A misbehaving node within the SFC-enabled domain may alter the content of Subscriber Identifier and Performance Policy Identifier Context Headers, potentially causing service disruption. NSH integrity mechanisms (referenced as NSH-INTEGRITY draft) should be used when enhanced protection is required.
