document: rfc-7616
kind: registry
summary: 'RFC 7616 creates the "Hash Algorithms for HTTP Digest Authentication" IANA registry under the "Hypertext Transfer Protocol (HTTP) Digest Algorithm Values" category. Initial entries are MD5 (128-bit), SHA-256 (256-bit), and SHA-512-256 (256-bit); each may have a "-sess" variant. Update policy: Specification Required.'
