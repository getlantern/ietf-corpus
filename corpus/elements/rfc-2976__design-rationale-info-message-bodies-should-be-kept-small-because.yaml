document: rfc-2976
kind: design-rationale
summary: INFO message bodies should be kept small because the message may be carried over UDP and larger messages risk fragmentation. Extensions using INFO should account for the potential that INFO messages could be forked by a SIP Proxy Server.
section: "4"
topics:
    - sip
    - realtime
    - udp
