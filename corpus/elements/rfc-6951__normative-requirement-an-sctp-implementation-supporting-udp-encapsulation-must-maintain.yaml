document: rfc-6951
kind: normative-requirement
summary: An SCTP implementation supporting UDP encapsulation MUST maintain a remote UDP encapsulation port number per destination address for each SCTP association, because remapping by NATs may cause different remote IP addresses of the same stack to appear on different ports.
section: "5.1"
rfc2119_level: MUST
topics:
    - sctp
    - udp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
