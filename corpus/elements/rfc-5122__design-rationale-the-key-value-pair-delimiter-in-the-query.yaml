document: rfc-5122
kind: design-rationale
summary: The key-value pair delimiter in the query component is ";" instead of "&" (used by most other URI schemes) to avoid the need to escape "&" in HTML and XML contexts where XMPP IRIs/URIs are most commonly embedded.
