document: rfc-4951
kind: normative-requirement
summary: To authenticate a peer during recovery tunnel establishment, an endpoint MUST use the same shared secret that authenticated the old tunnel, following L2TPv2 Section 5.1.1 or L2TPv3 Section 4.3 procedures. If recovery tunnel establishment fails for any reason, the endpoint MUST silently clear the old tunnel and all sessions within it.
section: 3.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
