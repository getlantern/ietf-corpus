document: rfc-2617
kind: normative-requirement
summary: The digest-uri value in the Authorization header MUST agree with the Request-URI; in particular it MUST be an absoluteURL if the Request-URI is an absoluteURL. If they differ, the server SHOULD return a 400 Bad Request error.
section: 3.2.2.5
rfc2119_level: MUST
topics:
    - http
    - security
