document: rfc-2913
kind: design-rationale
summary: The 'type' feature tag was motivated by the need to include MIME content type information within media feature expressions, since HTTP 1.1 with TCN indicates acceptable content types and media features in different request headers with no way to indicate acceptable combinations.
