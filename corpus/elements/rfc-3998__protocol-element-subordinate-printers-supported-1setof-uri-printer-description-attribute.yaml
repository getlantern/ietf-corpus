document: rfc-3998
kind: protocol-element
summary: '''subordinate-printers-supported'' (1setOf uri) Printer Description attribute is REQUIRED if an implementation supports Subordinate Printers and contains the URIs of immediate Subordinate Printer objects. Each Non-Leaf Printer MUST support this attribute; Leaf Printers either omit it or use the ''no-value'' out-of-band value.'
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
