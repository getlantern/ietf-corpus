document: rfc-8849
kind: protocol-element
summary: The Multiple Content Capture (MCC) is a special CLUE Media Capture composed of multiple Media Captures. An RTP stream conveying an MCC may switch between different constituent Media Captures over time, requiring the CaptureID mechanism to identify the current constituent MC.
