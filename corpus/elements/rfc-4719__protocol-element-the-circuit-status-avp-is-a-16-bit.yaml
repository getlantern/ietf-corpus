document: rfc-4719
kind: protocol-element
summary: The Circuit Status AVP is a 16-bit mask with the A (Active) bit indicating whether the Ethernet interface is ACTIVE (1) or INACTIVE (0), and the N (New) bit indicating whether the circuit is new (1) or existing (0). Reserved bits MUST be set to 0 when sending and ignored on receipt.
section: 2.3.3
topics:
    - mpls
    - vpn
