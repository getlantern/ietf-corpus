document: rfc-3807
kind: interoperability-note
summary: V5UA builds on IUA (RFC 3057) and everything defined in RFC 3057 is also valid for V5UA unless otherwise specified. V5UA updates RFC 3057 by introducing new message class 14 (V5PTM) and extending the IUA message header with the EFA field.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
