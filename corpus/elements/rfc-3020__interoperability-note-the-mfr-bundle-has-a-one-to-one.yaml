document: rfc-3020
kind: interoperability-note
summary: The MFR bundle has a one-to-one correspondence with a DLCMI/UNI in the Frame Relay DTE MIB (RFC 2115) and a one-to-one relationship with the frame relay service logical port defined in RFC 1604. These relationships must be maintained for consistent cross-MIB management.
