document: rfc-3821
kind: normative-requirement
summary: The FC Entity SHALL use internal clocks and either Fibre Channel services or an SNTP Version 4 server to establish and maintain the required synchronized time value, and SHALL verify both sides of an FCIP Link use the same synchronized time source.
section: "6"
rfc2119_level: REQUIRED
