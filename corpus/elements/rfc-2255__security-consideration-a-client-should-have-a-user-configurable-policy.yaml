document: rfc-2255
kind: security-consideration
summary: A client SHOULD have a user-configurable policy about which servers to connect to using which security mechanisms, and SHOULD NOT make connections inconsistent with this policy. This is critical because URLs are often processed automatically without user intervention.
section: "7"
