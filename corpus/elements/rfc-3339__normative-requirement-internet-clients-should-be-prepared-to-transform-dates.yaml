document: rfc-3339
kind: normative-requirement
summary: Internet clients SHOULD be prepared to transform dates into a display format suitable for the locality, including translating UTC to local time, since no single date/time format is readable according to conventions of all countries.
section: "5.2"
rfc2119_level: SHOULD
