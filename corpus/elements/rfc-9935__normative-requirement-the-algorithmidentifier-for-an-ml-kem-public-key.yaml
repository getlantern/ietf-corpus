document: rfc-9935
kind: normative-requirement
summary: The AlgorithmIdentifier for an ML-KEM public key MUST use one of the id-alg-ml-kem OIDs (id-alg-ml-kem-512, id-alg-ml-kem-768, or id-alg-ml-kem-1024) assigned by NIST based on the security level. The parameters field of the AlgorithmIdentifier MUST be absent.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
