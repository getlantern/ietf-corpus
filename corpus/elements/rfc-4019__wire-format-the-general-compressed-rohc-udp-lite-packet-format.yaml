document: rfc-4019
kind: wire-format
summary: 'The general compressed ROHC UDP-Lite packet format includes: optional dynamic chains for additional IP headers, a 2-octet UDP-Lite Checksum Coverage field (present if CFP=1 or packet type is CCE), and a 2-octet UDP-Lite Checksum. The Checksum Coverage field is CRC-DYNAMIC when computing the CRC.'
section: 5.3.1
topics:
    - udp
