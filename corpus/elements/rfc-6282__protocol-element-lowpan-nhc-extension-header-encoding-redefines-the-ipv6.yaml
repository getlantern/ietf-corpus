document: rfc-6282
kind: protocol-element
summary: LOWPAN_NHC Extension Header encoding redefines the IPv6 Extension Header Length field to be in units of octets (not 8-octet units), eliminating internal fragmentation waste that the RFC 2460 definition creates for small compressed headers.
