document: rfc-6551
kind: security-consideration
summary: A malicious node could falsely advertise favorable routing metrics to attract and intercept traffic. It is RECOMMENDED that RPL implementations put in place mechanisms to stop advertising routing metrics for highly unstable links that may be subject to attacks.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - security
