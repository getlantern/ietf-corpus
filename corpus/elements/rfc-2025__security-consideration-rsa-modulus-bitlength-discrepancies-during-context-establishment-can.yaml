document: rfc-2025
kind: security-consideration
summary: 'RSA modulus bitlength discrepancies during context establishment can be resolved using SPKM-ERROR: the initiator signs with its strongest supported RSA; if the target cannot verify it, the target sends SPKM-ERROR signed with its strongest RSA, allowing iterative negotiation.'
