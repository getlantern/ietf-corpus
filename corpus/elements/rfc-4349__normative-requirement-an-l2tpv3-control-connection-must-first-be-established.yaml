document: rfc-4349
kind: normative-requirement
summary: An L2TPv3 Control Connection MUST first be established before tunneling HDLC over IP. The SCCRQ and SCCRP Control Messages MUST include the HDLC Pseudowire Type of 0x0006 in the Pseudowire Capabilities List.
