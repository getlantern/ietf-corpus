document: rfc-7513
kind: design-rationale
summary: The Data Snooping Process triggers probabilistically, not deterministically, on unmatched data packets. This design limits exposure to DoS attacks in which an attacker sends large numbers of packets with forged source addresses to exhaust the BST.
section: 7.6.1
