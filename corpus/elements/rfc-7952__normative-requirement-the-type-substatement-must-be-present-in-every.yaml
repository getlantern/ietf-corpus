document: rfc-7952
kind: normative-requirement
summary: The 'type' substatement MUST be present in every 'md:annotation' statement, and the value of the annotation MUST match that type. Any YANG built-in or derived type usable for leaf or leaf-list nodes is permitted.
section: "3"
rfc2119_level: MUST
