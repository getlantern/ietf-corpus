document: rfc-4209
kind: normative-requirement
summary: If a peer node configured to run LMP-WDM receives a Config message with the OLS bit clear in the LMP-WDM_CONFIG object, it MUST reply with a ConfigNack message, detecting misconfiguration.
section: "2.1"
rfc2119_level: MUST
