document: rfc-7740
kind: normative-requirement
summary: 'PEy MUST withdraw the corresponding Leaf A-D route if: (a) the S-PMSI A-D route is withdrawn, (b) PEy no longer chooses PEx as its Upstream PE and only advertises Leaf A-D routes in response to its Upstream PE''s S-PMSI, or (c) relevant local join state is pruned.'
section: "2.1"
rfc2119_level: MUST
topics:
