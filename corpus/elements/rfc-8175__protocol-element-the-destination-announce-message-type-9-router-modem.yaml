document: rfc-8175
kind: protocol-element
summary: The Destination Announce Message (type 9, router→modem) lets a router express interest in a destination not yet announced by the modem—typically a logical multicast destination. The modem responds with a Destination Announce Response (type 10), which MAY include link metrics; if the destination is unreachable, the status MUST be 2 'Request Denied'.
section: "12.13"
topics:
    - routing
