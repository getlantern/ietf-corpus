document: rfc-9828
kind: protocol-element
summary: When C=1 (code-block caching enabled), the sender improves bandwidth efficiency by transmitting empty code-blocks for static image regions; the receiver maintains a cache of previously received code-blocks to substitute for empty ones. Two code-blocks match if their spatial coordinates, resolution level, component, sub-band, and parent packet TP field are all identical.
section: "7.9"
topics:
    - rtp
    - realtime
