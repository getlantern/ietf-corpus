document: rfc-8048
kind: design-rationale
summary: 'RFC 8048 corrects an architectural error in RFC 7248 where diagrams showed gateways on both sides of the protocol exchange. The correct model has a single gateway on the originating side: XMPP-originated traffic is translated by an X2S gateway and received by a normal SIP system, while SIP-originated traffic is translated by an S2X gateway and received by a normal XMPP system.'
section: Appendix A
topics:
