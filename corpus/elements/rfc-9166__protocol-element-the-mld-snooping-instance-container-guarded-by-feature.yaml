document: rfc-9166
kind: protocol-element
summary: The mld-snooping-instance container (guarded by feature mld-snooping) mirrors the igmp-snooping-instance structure for IPv6. It uses inet:ipv6-address for querier-source, rt-types:ipv6-multicast-group-address for group, and tracks MLDv1/MLDv2 statistics separately.
section: "3.2"
