document: rfc-2513
kind: normative-requirement
summary: Every completed collection file must contain an integral number of connection records. When a file reaches its maximum size, collection is terminated either immediately before or immediately after storing the whole current connection record.
section: "3.1"
rfc2119_level: MUST
topics:
