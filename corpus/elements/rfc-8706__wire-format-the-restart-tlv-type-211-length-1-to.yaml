document: rfc-8706
kind: wire-format
summary: 'The Restart TLV (Type 211, length 1 to 3+ID Length octets) carries a 1-octet Flags field (bits: RR, RA, SA, PR, PA, Reserved), a 2-octet Remaining Time field (in seconds), and an optional Restarting Neighbor System ID field (ID Length octets). It is carried in IIH PDUs only.'
