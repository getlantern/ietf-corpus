document: rfc-7518
kind: protocol-element
summary: RSA JWK public keys require 'n' (modulus) and 'e' (exponent) as Base64urlUInt-encoded values. Private keys require 'd' and SHOULD include 'p', 'q', 'dp', 'dq', 'qi' for CRT optimization; if any optional CRT parameter is present, all MUST be present. The 'oth' parameter MUST only be present for keys with more than two prime factors.
section: "6.3"
topics:
    - jose
    - crypto
    - pkix
