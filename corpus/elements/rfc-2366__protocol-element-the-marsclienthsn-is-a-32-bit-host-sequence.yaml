document: rfc-2366
kind: protocol-element
summary: The marsClientHsn is a 32-bit Host Sequence Number (Unsigned32) initialized to zero at cluster member startup; it is updated to the current Cluster Sequence Number (CSN) when the client receives the echo of its own MARS_JOIN from the MARS, and is used to track MARS sequence numbering.
