document: rfc-8570
kind: wire-format
summary: 'Unidirectional Link Loss sub-TLV (Type 36, Length 4): a 1-bit A flag, 7-bit RESERVED, and a 24-bit Link Loss field representing packet loss as a percentage of total traffic sent. The basic unit is 0.000003%; the maximum expressible value (2^24 − 2) equals 50.331642%.'
section: "4.4"
topics:
