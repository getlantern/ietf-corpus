document: rfc-2080
kind: security-consideration
summary: Since RIPng runs over IPv6, it relies on the IP Authentication Header and IP Encapsulating Security Payload to ensure integrity, authentication, and confidentiality of routing exchanges. No RIPng-internal authentication mechanism is defined.
