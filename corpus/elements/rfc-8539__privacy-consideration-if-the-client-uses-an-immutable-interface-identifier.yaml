document: rfc-8539
kind: privacy-consideration
summary: If the client uses an immutable interface identifier for its IPv6 softwire source address, it becomes trackable across networks and sessions. This can be mitigated by constructing the softwire source address per RFC 7597 Section 6, where the IID encodes only the allocated IPv4 address and Port Set ID, causing the IID to change as the lease changes.
section: "9.1"
topics:
    - privacy
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
