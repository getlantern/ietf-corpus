document: rfc-5815
kind: interoperability-note
summary: The Observation Point table references the ENTITY MIB (RFC 4133) and IF MIB (RFC 2863) to identify physical observation points. Implementors who want to specify physical entities SHOULD also implement those MIB modules; if they do not, the respective reference columns MUST be zero.
section: "7.1"
topics:
    - snmp
    - measurement
