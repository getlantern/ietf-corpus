document: rfc-3862
kind: protocol-element
summary: Headers are associated with namespaces identified by globally-unique URIs, using a prefix declaration mechanism modeled on XML namespaces. An NS header without a prefix name sets the default namespace; namespace prefixes are strictly local to the message instance.
