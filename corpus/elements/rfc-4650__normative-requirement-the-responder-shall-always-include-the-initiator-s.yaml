document: rfc-4650
kind: normative-requirement
summary: The responder SHALL always include the initiator's identity IDi in R_message regardless of whether IDi was present in I_message. IDr SHOULD be included but MAY be omitted if the initiator can identify the responder by other means.
section: "3"
rfc2119_level: MUST
topics:
