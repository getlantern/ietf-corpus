document: rfc-3986
kind: interoperability-note
summary: Some older, erroneous implementations fail to separate the query and/or fragment components from the path before merging with a base path and removing dot-segments. This causes incorrect resolution when a query component contains "/../" or "/./", though such errors are rarely noticed in practice.
section: 5.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
