document: rfc-9012
kind: design-rationale
summary: The MPLS-in-GRE tunnel type (11) is functionally equivalent to a GRE tunnel type (2) with a Protocol Type sub-TLV specifying MPLS. It is retained solely for backwards compatibility with implementations of RFC 8365 and similar deployed code.
