document: rfc-7599
kind: normative-requirement
summary: A MAP CE SHOULD rewrite the IPv4 fragmentation identifier to a value equivalent to a port from its allocated port set, because two CEs sharing the same IPv4 address could otherwise generate the same fragmentation ID and cause incorrect reassembly at the destination.
section: "10.3"
rfc2119_level: SHOULD
topics:
    - nat
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
