document: rfc-6951
kind: design-rationale
summary: SCTP sends periodic HEARTBEAT chunks on all idle paths. When using UDP encapsulation for legacy NAT traversal, these HEARTBEATs serve the additional function of keeping NAT state alive for each path.
section: "3.2"
topics:
