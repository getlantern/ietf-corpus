document: rfc-3996
kind: state-machine
summary: Event Wait Mode is entered when the client sends 'notify-wait' = true and the Printer honors it; the Printer remains in Event Wait Mode (returning events as they occur) until it sends 'notify-get-interval' (leaving mode) or closes the connection. The Notification Recipient terminates Event Wait Mode by closing the connection or sending a subsequent Get-Notifications with 'notify-wait' = false.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
