document: rfc-4650
kind: security-consideration
summary: 'DHHMAC provides perfect forward secrecy (PFS) via Diffie-Hellman key agreement: even if the long-term pre-shared key s is compromised at some point, past and future TGKs are not exposed. Neither MIKEY-PS nor MIKEY-PK can provide PFS.'
section: "5.3"
