document: rfc-8338
kind: normative-requirement
summary: If an R-PE signals a PW with a PW Type, Control Word mode, or interface parameters that an L-PE cannot accept, the L-PE MUST NOT enable the PW and MUST send a PW status message with status code 0x00000001 (Pseudowire Not Forwarding) to the R-PE.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
