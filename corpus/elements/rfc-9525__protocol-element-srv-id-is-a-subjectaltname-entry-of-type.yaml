document: rfc-9525
kind: protocol-element
summary: SRV-ID is a subjectAltName entry of type otherName whose name form is SRVName as defined in RFC 4985. It is typically indirect and restricted to a single application service type. The DNS domain name portion is the Name and the application service type is the Service (e.g., _imaps.isp.example gives domain isp.example and service imaps).
section: "1.5"
topics:
    - tls
    - pkix
    - dns
