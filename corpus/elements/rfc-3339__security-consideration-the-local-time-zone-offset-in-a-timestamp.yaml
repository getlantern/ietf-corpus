document: rfc-3339
kind: security-consideration
summary: The local time zone offset in a timestamp may reveal information about the geographic location of a site, which could be used to infer periods when systems are less monitored and more susceptible to probing. Sites may choose to emit UTC-only timestamps to mitigate this.
section: "7"
topics:
    - security
    - privacy
