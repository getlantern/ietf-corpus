document: rfc-3339
kind: security-consideration
summary: The local time zone offset in a timestamp may reveal information about when systems are less likely to be monitored and more susceptible to security probes. Sites with this concern may choose to emit only UTC times (offset 'Z' or '+00:00').
section: "7"
topics:
    - security
    - privacy
