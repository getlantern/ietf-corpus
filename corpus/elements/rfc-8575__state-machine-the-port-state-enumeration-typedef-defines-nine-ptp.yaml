summary: 'The ''port-state-enumeration'' typedef defines nine PTP port states: initializing (1), faulty (2), disabled (3), listening (4), pre-master (5), master (6), passive (7), uncalibrated (8), and slave (9), per IEEE Std 1588-2008 clauses 8.2.5.3.1 and 9.2.5.'
