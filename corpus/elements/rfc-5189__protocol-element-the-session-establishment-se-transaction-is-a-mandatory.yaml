document: rfc-5189
kind: protocol-element
summary: The Session Establishment (SE) transaction is a mandatory configuration transaction that uses two sequential request/reply iterations to provide mutual authentication between agent and middlebox. The first iteration carries a middlebox challenge (mc); the second carries the agent authentication (aa) responding to the agent challenge (ac) returned by the middlebox.
section: 2.2.1
topics:
    - nat
    - security
