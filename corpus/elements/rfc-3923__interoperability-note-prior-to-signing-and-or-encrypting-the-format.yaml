document: rfc-3923
kind: interoperability-note
summary: Prior to signing and/or encrypting, the format of an instant message MUST conform to the CPIM Message Format [MSGFMT] and presence information MUST conform to the CPP Presence Information Data Format [PIDF], to enable interoperability with non-XMPP CPIM-compliant systems.
section: "2"
topics:
