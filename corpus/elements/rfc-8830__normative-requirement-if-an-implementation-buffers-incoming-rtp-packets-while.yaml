document: rfc-8830
kind: normative-requirement
summary: If an implementation buffers incoming RTP packets while waiting for the RTCSignalingState to reach 'stable' (as described in Section 3.1), it MUST signal to the user that media has been discarded if buffering limits are applied.
section: "3.1"
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
    - rtp
