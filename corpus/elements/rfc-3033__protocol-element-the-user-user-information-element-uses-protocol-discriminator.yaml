document: rfc-3033
kind: protocol-element
summary: 'The User-user information element uses Protocol discriminator value 0x06 to indicate Internet protocol/application content. The first octet of the User information field is the Internet protocol/application identifier. Assigned values: 0x00=Reserved, 0x01=Reserved for ST2+, 0x02=RSVP message, 0x03-0xFD=Reserved for IANA assignment, 0xFE=Experiment/Organization specific, 0xFF=Reserved.'
section: 4.2.1
topics:
    - ip
    - registry
