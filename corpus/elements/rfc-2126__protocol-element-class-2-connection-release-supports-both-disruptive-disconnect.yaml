document: rfc-2126
kind: protocol-element
summary: Class 2 connection release supports both Disruptive Disconnect (DR Reason code 0x80, pending data need not be delivered) and Non-Disruptive Disconnect (DR Reason code 0x80 with Additional Information parameter 0x80, requiring all queued TPDUs to be delivered before disconnection). Both exchange DR and DC TPDUs.
section: 4.2.3
topics:
