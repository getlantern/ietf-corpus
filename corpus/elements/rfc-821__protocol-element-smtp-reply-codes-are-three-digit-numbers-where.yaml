document: rfc-821
kind: protocol-element
summary: 'SMTP reply codes are three-digit numbers where the first digit indicates outcome class: 2xx = success, 3xx = intermediate/positive, 4xx = transient failure, 5xx = permanent failure. Every command must generate exactly one reply. Key codes include 250 (OK), 354 (start mail input), 421 (service unavailable), 550 (mailbox unavailable).'
section: "4.2"
