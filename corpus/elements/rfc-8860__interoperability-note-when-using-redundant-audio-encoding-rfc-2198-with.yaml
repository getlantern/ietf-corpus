document: rfc-8860
kind: interoperability-note
summary: When using redundant audio encoding (RFC 2198) with generic FEC in a multi-media-type session, each media type requires a distinct payload type for its FEC stream (e.g., audio/ulpfec and text/ulpfec separately), which can rapidly exhaust the 7-bit RTP payload type space.
section: "6.3"
topics:
    - rtp
    - realtime
