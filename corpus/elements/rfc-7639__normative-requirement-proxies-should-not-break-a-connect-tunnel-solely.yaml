document: rfc-7639
kind: normative-requirement
summary: Proxies SHOULD NOT break a CONNECT tunnel solely on the basis of a failure to recognize the protocol indicated in the ALPN header field, since protocols like TLS can hide negotiated protocols and negotiation details may change over time.
section: "2.3"
rfc2119_level: SHOULD NOT
topics:
    - http
    - tls
