summary: The 96-bit ChaCha20 nonce is constructed by concatenating a 32-bit Salt (fixed per SA, derived from KEYMAT, not transmitted) with the 64-bit IV (transmitted in the ESP packet). The Salt occupies the high-order 32 bits.
