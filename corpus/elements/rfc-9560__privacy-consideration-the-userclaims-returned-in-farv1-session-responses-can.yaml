document: rfc-9560
kind: privacy-consideration
summary: The userClaims returned in farv1_session responses can include personally identifiable information (name, email, picture, etc.). The 'rdap_dnt_allowed' do-not-track claim relies on the good will of the RDAP server and associated proxies; misuse or acceptance of the claim risks information loss that could seriously impair audit capabilities.
section: "10"
topics:
    - privacy
    - security
