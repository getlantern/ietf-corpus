document: rfc-4237
kind: protocol-element
summary: The vPIMSubMailboxes attribute lists sub-mailbox numbers (numeric range 1-9999) associated with the queried telephone number, enabling a post-dial sub-addressing menu. Spoken names for each sub-mailbox may be retrieved by subsequent queries to the VPIMDIR service.
section: "2.10"
topics:
