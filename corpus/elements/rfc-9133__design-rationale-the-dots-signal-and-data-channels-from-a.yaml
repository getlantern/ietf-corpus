document: rfc-9133
kind: design-rationale
summary: The DOTS signal and data channels from a DOTS client may use different DOTS servers, yet the scope of mitigation and filtering rules is not restricted to one server but to the entire DOTS server domain. DOTS servers within a domain are assumed to have an unspecified coordination mechanism to align their decisions.
section: "3.1"
topics:
    - security
