document: rfc-4352
kind: normative-requirement
summary: The RTP timestamp clock frequency SHALL be 72000 Hz. This value was chosen so that each ISF's transport frame duration maps to an integer number of timestamp ticks (960 to 2880 ticks depending on ISF).
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
