document: rfc-9887
kind: normative-requirement
summary: TLS TACACS+ servers MUST listen on a TCP/IP port distinct from that used by non-TLS TACACS+ servers. The well-known TCP port number 300 is assigned for TACACS+ over TLS; deployments with specific requirements MAY use alternative port numbers.
section: "3.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
