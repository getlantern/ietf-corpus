document: rfc-8263
kind: interoperability-note
summary: The GROUPKEY-PUSH ACK is an ISAKMP message as defined in RFC 2408. Although RFC 2408 has been obsoleted by RFC 7296, only RFC 2408 applies in the GDOI context. Implementations must use RFC 2408 message authentication constructs, not RFC 7296.
section: "7.1"
topics:
    - security
    - vpn
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
