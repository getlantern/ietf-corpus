document: rfc-9692
kind: normative-requirement
summary: A node MUST NOT originate LIEs on an address family if it does not process received LIEs on that family. LIEs on the same link are considered part of the same LIE FSM regardless of the address family they arrive on.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - routing
