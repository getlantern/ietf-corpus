document: rfc-5088
kind: security-consideration
summary: PCE discovery security relies on the security of OSPF. Authenticity and integrity of OSPF LSAs and their TLVs can be secured using mechanisms defined in RFC 2154. However, OSPF provides no encryption mechanism for protecting the privacy of LSAs, including PCE discovery information.
section: "8"
topics:
    - security
    - routing
