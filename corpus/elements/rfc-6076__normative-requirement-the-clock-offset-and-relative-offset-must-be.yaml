document: rfc-6076
kind: normative-requirement
summary: The clock offset and relative offset MUST be reported with each measurement. The time interval error SHOULD be constrained to less than +/- 1 ms, implying 1-part-per-1000 frequency accuracy for a 1-second interval.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
    - measurement
