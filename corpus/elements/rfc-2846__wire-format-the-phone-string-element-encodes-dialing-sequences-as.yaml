document: rfc-2846
kind: wire-format
summary: The phone-string element encodes dialing sequences as 1*( DTMF / pause / tonewait / written-sep ), where DTMF covers DIGIT / "#" / "*" / "A" / "B" / "C" / "D", pause is "p", tonewait is "w", and written-sep is "-" or ".".
