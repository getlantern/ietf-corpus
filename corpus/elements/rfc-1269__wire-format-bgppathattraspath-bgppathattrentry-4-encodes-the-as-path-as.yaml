document: rfc-1269
kind: wire-format
summary: 'bgpPathAttrASPath (bgpPathAttrEntry 4) encodes the AS path as an OCTET STRING where each AS number occupies two octets: first-byte = ASNumber / 256, second-byte = ASNumber & 255. This pairwise encoding is chosen for SMI compatibility rather than a native SEQUENCE OF INTEGER.'
