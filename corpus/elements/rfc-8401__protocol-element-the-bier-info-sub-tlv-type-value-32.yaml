document: rfc-8401
kind: protocol-element
summary: The BIER Info sub-TLV (type value 32) is advertised within IS-IS extended reachability TLVs 135, 235, 236, and 237. It carries BIER subdomain information for routers participating as BFRs and may appear multiple times per prefix-reachability TLV, once per supported subdomain.
section: "6.1"
topics:
