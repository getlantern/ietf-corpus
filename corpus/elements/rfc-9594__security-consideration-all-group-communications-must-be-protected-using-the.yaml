document: rfc-9594
kind: security-consideration
summary: All group communications must be protected using the keying material obtained from the KDC. The KDC is trusted to provide authentic, fresh keying material; the ACE transport profile's secure channel ensures only authorized members receive it. Loss of group keying material confidentiality undermines the security of all group messages protected with that material.
section: "10.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
