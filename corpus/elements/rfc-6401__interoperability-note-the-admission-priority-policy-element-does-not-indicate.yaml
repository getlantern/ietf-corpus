document: rfc-6401
kind: interoperability-note
summary: The Admission Priority Policy Element does NOT indicate preemption of existing RSVP reservations. If a priority session requires both admission priority and preemption priority, it MUST carry both an Admission Priority Policy Element (this document) and a Preemption Priority Policy Element (RFC 3181) as separate, independent mechanisms.
section: "5.1"
topics:
    - qos
    - routing
