document: rfc-4825
kind: normative-requirement
summary: All XCAP servers MUST implement HTTP Digest authentication and HTTP over TLS (RFC 2818). It is RECOMMENDED that administrators configure an HTTPS URI as the XCAP root URI so that digest client authentication occurs over TLS.
section: "8"
rfc2119_level: MUST
topics:
    - http
    - security
