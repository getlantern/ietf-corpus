document: rfc-6788
kind: security-consideration
summary: The Line ID inserted by the AN or Edge Router is not integrity-protected; it may be modified, inserted, or deleted without detection. The network segment between the AN and the Edge Router must be trusted to ensure validity of the Line ID field.
section: "11"
