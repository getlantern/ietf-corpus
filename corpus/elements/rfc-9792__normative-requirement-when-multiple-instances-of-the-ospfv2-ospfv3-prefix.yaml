document: rfc-9792
kind: normative-requirement
summary: When multiple instances of the OSPFv2/OSPFv3 Prefix Extended Flags sub-TLV are received within the same TLV, an implementation MUST use only the first occurrence and MUST ignore all subsequent instances. Errors SHOULD be logged subject to rate limiting.
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
