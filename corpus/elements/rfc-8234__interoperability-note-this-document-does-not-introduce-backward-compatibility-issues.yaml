document: rfc-8234
kind: interoperability-note
summary: This document does not introduce backward compatibility issues with RFC 7271 implementations. If a node implementing RFC 8234 restarts, the new state changes will not cause problems at a remote node implementing RFC 7271, and both ends will converge to the same local and remote states.
