document: rfc-9181
kind: privacy-consideration
summary: Reusing the 'vpn-description' grouping from this module exposes privacy-related information, specifically the 'customer-name' leaf. Disclosing customer identity in network management data may constitute a violation of the customer-provider trust relationship and should be protected via NACM access controls in consuming modules.
