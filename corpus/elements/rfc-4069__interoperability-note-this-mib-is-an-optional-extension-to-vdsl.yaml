document: rfc-4069
kind: interoperability-note
summary: This MIB is an optional extension to VDSL-LINE-MIB (RFC 3728). An SCM-based VDSL agent does not have to implement this MIB to be compliant with RFC 3728. The table relationship requires that when vdslLineCoding is set to SCM, vdslLineConfProfileName is used as the index to vdslLineSCMConfProfileBandTable.
section: "2.1"
topics:
