document: rfc-4360
kind: design-rationale
summary: Regular types use a 1-octet Type Field; Extended types use a 2-octet Type Field. The class (Regular or Extended) is not encoded in the type structure itself but is specified in the defining document and IANA registry. This allows policy filtering by type without exhaustive enumeration of community values.
