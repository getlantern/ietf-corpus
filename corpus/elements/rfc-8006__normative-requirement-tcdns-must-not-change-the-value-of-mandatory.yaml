document: rfc-8006
kind: normative-requirement
summary: tCDNs MUST NOT change the value of mandatory-to-enforce or safe-to-redistribute when propagating metadata to a dCDN. Although a tCDN can set 'incomprehensible' to true, it MUST NOT change it from true to false.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
    - http
