summary: 'Four deployment options exist — one flag, two flags, one flag with hashing — governed by: (1) number of flag bits available in the packet header, (2) required temporal sampling frequency constrained by timing requirements, (3) whether per-path or per-packet granularity is needed, and (4) available computational resources (mean delay requires more processing).'
