document: rfc-4680
kind: security-consideration
summary: 'Sensitive SupplementalData can be protected using the double handshake technique: an initial TLS handshake (no extensions) establishes an encrypted channel, then a second TLS handshake (with extensions and SupplementalData) runs over that protected channel, ensuring mutual authentication before supplemental data is exchanged.'
