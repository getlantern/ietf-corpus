document: rfc-2305
kind: design-rationale
summary: The specification defines an Internet mail profile for facsimile rather than creating a distinct 'facsimile over the Internet' service. This approach ensures interoperability with existing email users and software without requiring modification, so facsimile recipients can be included in ordinary email address lists and existing email clients need not process new data structures.
section: "1"
topics:
