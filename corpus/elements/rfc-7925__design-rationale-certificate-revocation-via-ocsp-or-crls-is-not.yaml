document: rfc-7925
kind: design-rationale
summary: Certificate revocation via OCSP or CRLs is not used in this profile; instead, revocation relies on a software update mechanism. This avoids the overhead of additional protocol handshakes on constrained devices, though it limits granularity of revocation.
section: 4.4.3
topics:
    - tls
    - pkix
    - security
