document: rfc-8353
kind: design-rationale
summary: RFC 8353 obsoletes RFC 5653 by adding a new output token field to the GSSException class, so that when initSecContext or acceptSecContext fail, the mechanism has a chance to emit an error token that can be sent to the peer for debugging or informational purposes.
section: "1"
topics:
    - security
    - crypto
