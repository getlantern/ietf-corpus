document: rfc-8104
kind: protocol-element
summary: The protector is a router that receives rerouted PW traffic from the PLR during local repair and forwards it to the target CE via a backup path. It may be a backup PE (co-located model) or a dedicated router that forwards to a backup PE (centralized model). The protector MUST maintain a separate label space per primary PE it protects.
section: "4.2"
topics:
    - mpls
    - routing
