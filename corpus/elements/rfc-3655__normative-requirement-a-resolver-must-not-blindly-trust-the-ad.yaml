document: rfc-3655
kind: normative-requirement
summary: A resolver MUST NOT blindly trust the AD bit unless it communicates with a recursive nameserver over a secure transport mechanism or using message authentication such as TSIG or SIG(0) and is explicitly configured to trust that server.
section: "3"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
