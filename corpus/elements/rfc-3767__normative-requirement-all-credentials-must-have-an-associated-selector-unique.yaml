document: rfc-3767
kind: normative-requirement
summary: All credentials MUST have an associated selector unique for that account. The selector is REQUIRED for upload requests and OPTIONAL for download requests; an omitted or empty selector in a download request MUST be interpreted as a request for all stored credentials.
section: 2.3.2
rfc2119_level: MUST
topics:
    - security
    - crypto
