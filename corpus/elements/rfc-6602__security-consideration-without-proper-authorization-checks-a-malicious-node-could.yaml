document: rfc-6602
kind: security-consideration
summary: Without proper authorization checks, a malicious node could hijack mobility sessions or conduct denial-of-service attacks by sending bulk binding update or revocation requests for groups of sessions. The LMA MUST allow only authorized MAGs to perform bulk operations to prevent such attacks.
section: "8"
topics:
    - security
    - mobility
