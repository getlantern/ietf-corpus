document: rfc-2575
kind: security-consideration
summary: The grouping of <securityModel, securityName> tuples in vacmSecurityToGroupTable does not account for securityLevel. Security administrators must therefore use the securityLevel index in vacmAccessTable to enforce separation between noAuthNoPriv, authNoPriv, and authPriv access rights.
section: "7.2"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
