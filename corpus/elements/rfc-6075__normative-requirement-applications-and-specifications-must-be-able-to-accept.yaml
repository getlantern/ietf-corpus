document: rfc-6075
kind: normative-requirement
summary: Applications and specifications MUST be able to accept Vendor Tokens conforming to the broader 'possible-vendor-tag' production, which includes non-ASCII Unicode codepoints encoded as UTF-8, even though registrations are currently restricted to ASCII.
section: "3.1"
rfc2119_level: MUST
topics:
    - registry
