document: rfc-9695
kind: security-consideration
summary: Signal data in haptic encodings is typically not executed by processors and presents minimal security risk. Descriptive text is parsed into XML data structures and used to construct signals sent to hardware. OS and device driver implementors should ensure synthesis/rendering paths do not provide attack surfaces.
section: "3"
