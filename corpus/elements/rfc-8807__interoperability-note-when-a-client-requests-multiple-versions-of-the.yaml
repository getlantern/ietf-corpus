document: rfc-8807
kind: interoperability-note
summary: When a client requests multiple versions of the loginSec extension at login, the server SHOULD respond using only the namespace of the newest requested version for commands that do not include extension elements, and use the version present in the command for commands that do include extension elements.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
