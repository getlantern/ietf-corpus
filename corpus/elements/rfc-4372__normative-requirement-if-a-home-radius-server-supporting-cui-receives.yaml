document: rfc-4372
kind: normative-requirement
summary: If a home RADIUS server supporting CUI receives an Access-Request containing a CUI attribute (nul or non-nul), it MUST include the CUI attribute in the Access-Accept packet. Conversely, if the Access-Request does not contain a CUI, the home server SHOULD NOT include CUI in the Access-Accept.
section: "2.1"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
