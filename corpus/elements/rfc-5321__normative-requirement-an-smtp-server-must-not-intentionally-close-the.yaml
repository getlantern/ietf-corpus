document: rfc-5321
kind: normative-requirement
summary: An SMTP server MUST NOT intentionally close the connection except after receiving QUIT (with 221 reply), after detecting a need to shut down (421 response), or after a timeout. A server that closes connections in response to unknown commands is in violation of this specification.
section: "3.8"
rfc2119_level: MUST NOT
topics:
    - email
