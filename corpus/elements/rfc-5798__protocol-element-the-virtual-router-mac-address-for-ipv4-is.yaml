document: rfc-5798
kind: protocol-element
summary: The virtual router MAC address for IPv4 is 00-00-5E-00-01-{VRID} and for IPv6 is 00-00-5E-00-02-{VRID} in Internet-standard bit-order. This mapping provides for up to 255 VRRP routers per address family on a network.
section: "7.3"
topics:
