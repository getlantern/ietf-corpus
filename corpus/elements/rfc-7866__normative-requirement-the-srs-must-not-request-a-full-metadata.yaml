document: rfc-7866
kind: normative-requirement
summary: The SRS MUST NOT request a full metadata snapshot in an UPDATE response or in any SIP transaction other than an UPDATE request. The snapshot request MUST contain a body with Content-Disposition 'recording-session' and MUST NOT contain an SDP body.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
