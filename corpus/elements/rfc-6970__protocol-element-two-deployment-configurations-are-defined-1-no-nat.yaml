summary: 'Two deployment configurations are defined: (1) no NAT in the IGD (e.g., DS-Lite or NAT64 deployments), where message contents are passed through unchanged; and (2) NAT embedded in the IGD, creating a cascaded NAT scenario with NAT1 at the IGD and NAT2 at the Provider/Carrier Grade NAT.'
