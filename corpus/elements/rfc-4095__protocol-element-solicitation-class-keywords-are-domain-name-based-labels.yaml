document: rfc-4095
kind: protocol-element
summary: Solicitation class keywords are domain-name-based labels in reversed format (e.g., 'com.example.adv'), case-insensitive, with ':' treated equivalently to '.'. The resulting DNS lookup string must respect DNS label length limits (63 chars per label, 253 chars total) and IDN encoding for non-ASCII characters.
