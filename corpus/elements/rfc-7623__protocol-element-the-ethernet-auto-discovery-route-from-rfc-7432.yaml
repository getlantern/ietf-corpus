document: rfc-7623
kind: protocol-element
summary: The Ethernet Auto-Discovery route from RFC 7432 is not used in PBB-EVPN. PBB encapsulation provides the required indirection for C-MAC addresses via B-MAC, and ESI values 0 and MAX-ESI in the MAC Advertisement route signal that no A-D route is needed for resolution.
section: "5.1"
topics:
