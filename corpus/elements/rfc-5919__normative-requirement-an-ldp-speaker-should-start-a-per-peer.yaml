document: rfc-5919
kind: normative-requirement
summary: An LDP speaker SHOULD start a per-peer EOL Notification timer immediately following LDP session establishment. The default value of 60 seconds is RECOMMENDED, and the value SHOULD be configurable.
section: "4.1"
rfc2119_level: SHOULD
