document: rfc-9147
kind: protocol-element
summary: 'Epoch values are fixed per protocol phase: 0 for unencrypted messages (ClientHello, ServerHello, HelloRetryRequest), 1 for early data (client_early_traffic_secret), 2 for handshake traffic, 3 for initial application traffic (application_traffic_secret_0), and 4+ for subsequent rekeyed application traffic after KeyUpdate.'
