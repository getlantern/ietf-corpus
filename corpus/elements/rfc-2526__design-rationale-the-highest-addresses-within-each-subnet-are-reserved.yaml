document: rfc-2526
kind: design-rationale
summary: The highest addresses within each subnet are reserved (rather than the lowest) to avoid conflicts with existing official and unofficial uses of low-numbered addresses, such as point-to-point link endpoints, tunnel endpoints, and manually configured static router addresses.
