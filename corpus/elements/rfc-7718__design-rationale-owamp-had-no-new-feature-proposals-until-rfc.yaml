document: rfc-7718
kind: design-rationale
summary: OWAMP had no new feature proposals until RFC 7717, whereas TWAMP accumulated feature requests during its final review and established registries earlier. This document retroactively establishes equivalent registries for OWAMP to support future extensions in the same manner.
