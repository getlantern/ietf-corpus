document: rfc-8223
kind: normative-requirement
summary: The TAC mechanism MUST take precedence over the SAC mechanism with respect to enabling applications. LDP peers MUST NOT advertise state information for a non-negotiated application even if a peer sends a SAC TLV expressing interest in it.
section: "4"
rfc2119_level: MUST
topics:
