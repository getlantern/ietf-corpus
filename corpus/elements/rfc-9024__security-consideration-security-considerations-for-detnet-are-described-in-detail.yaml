document: rfc-9024
kind: security-consideration
summary: Security considerations for DetNet are described in detail in the DetNet Security Considerations document and in RFC 8655. Considerations specific to the DetNet MPLS data plane, including TSN Stream application flows, are covered by the DetNet MPLS data plane security considerations in RFC 8964; this document introduces no additional security considerations beyond that scope.
