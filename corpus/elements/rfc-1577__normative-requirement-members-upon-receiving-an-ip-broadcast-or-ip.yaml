document: rfc-1577
kind: normative-requirement
summary: Members, upon receiving an IP broadcast or IP subnet broadcast for their LIS, MUST process the packet as if addressed to that station. ATM does not support broadcast addressing, so there are no mappings from IP broadcast addresses to ATM broadcast services.
section: "7"
rfc2119_level: MUST
topics:
    - ip
