document: rfc-5015
kind: normative-requirement
summary: When authentication is available, spoofed DF-election messages MUST be discarded and a rate-limited warning message SHOULD be logged. BIDIR-PIM routers SHOULD also check the destination MAC address of received DF-election messages to prevent unicast-MAC partitioning attacks.
section: 5.1.1
rfc2119_level: MUST
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
