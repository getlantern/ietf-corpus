document: rfc-951
kind: wire-format
summary: 'Address fields in the BOOTP packet: ciaddr (4 bytes, client IP if known, else zero), yiaddr (4 bytes, ''your'' IP assigned by server), siaddr (4 bytes, server IP), giaddr (4 bytes, gateway IP for cross-gateway booting). All numeric fields are in network byte order (high order bits first).'
