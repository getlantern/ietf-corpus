document: rfc-8936
kind: normative-requirement
summary: When sharing personally identifiable information or information that is otherwise considered confidential to affected users, SET Transmitters and Recipients MUST have the appropriate legal agreements and user consent in place. Data that needs confidentiality protection MUST be encrypted, at least with TLS and sometimes also using JWE.
section: "5"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - tls
