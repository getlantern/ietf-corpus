document: rfc-5213
kind: normative-requirement
summary: When sending the PBA, the LMA MUST NOT include the Type 2 Routing header in the IPv6 header, unlike in standard Mobile IPv6. The source address MUST be the LMAA and the destination MUST be the Proxy-CoA of the requesting MAG.
section: 5.3.6
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
