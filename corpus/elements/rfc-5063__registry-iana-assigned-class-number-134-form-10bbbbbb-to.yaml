document: rfc-5063
kind: registry
summary: 'IANA assigned Class-Number 134 (form 10bbbbbb) to the new Capability Object and message type 30 to the RecoveryPath message. A new 32-bit name space within the Capability Object was created; new bit assignments require IETF Consensus per RFC 2434. Three bits are initially defined: T (RecoveryPath Transmit Enabled), R (RecoveryPath Desired), S (RecoveryPath Srefresh Capable).'
section: "8"
