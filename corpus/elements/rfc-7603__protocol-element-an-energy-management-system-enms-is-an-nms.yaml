document: rfc-7603
kind: protocol-element
summary: An Energy Management System (EnMS) is an NMS that collects energy information for devices in the network; it may be limited to monitoring or may also implement control functions. It differs from a general NMS in that it deals exclusively with energy.
section: "1.5"
