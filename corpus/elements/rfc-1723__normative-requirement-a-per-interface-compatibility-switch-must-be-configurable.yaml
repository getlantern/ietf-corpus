document: rfc-1723
kind: normative-requirement
summary: 'A per-interface compatibility switch MUST be configurable with four settings: RIP-1 (broadcast RIP-1 only), RIP-1 compatibility (broadcast RIP-2), RIP-2 (multicast RIP-2), and ''none'' (disable sending). The recommended default is RIP-1 compatibility.'
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
