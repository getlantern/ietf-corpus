document: rfc-7339
kind: normative-requirement
summary: A SIP client MUST honor overload control values received from downstream neighbors and MUST NOT forward more requests to a SIP server than permitted by the current "oc" and "oc-algo" parameter values for that server.
section: "5.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - congestion
