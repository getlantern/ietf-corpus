document: rfc-9430
kind: design-rationale
summary: RFC 9202 was originally specified only for DTLS, but the profile works equally well for TLS. This extension is motivated by network environments where UDP may be blocked, requiring clients to fall back from CoAP over UDP to CoAP over TCP for NAT or firewall traversal.
section: "1"
topics:
    - tls
    - security
    - nat
