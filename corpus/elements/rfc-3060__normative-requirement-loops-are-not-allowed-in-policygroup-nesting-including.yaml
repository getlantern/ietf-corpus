document: rfc-3060
kind: normative-requirement
summary: Loops are not allowed in PolicyGroup nesting, including the degenerate case of a PolicyGroup that directly contains itself. This constraint applies to all implementations of the PolicyGroupInPolicyGroup aggregation.
section: "6.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
