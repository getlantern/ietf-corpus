document: rfc-7795
kind: normative-requirement
summary: The S-PE MUST advertise Standby Preferential Forwarding status to the single-homed side if it receives Standby status from ALL PW segments on the multi-homed side, and MUST advertise Active status to the single-homed side if it receives Active status from ANY PW segment on the multi-homed side.
section: "3"
rfc2119_level: MUST
topics:
