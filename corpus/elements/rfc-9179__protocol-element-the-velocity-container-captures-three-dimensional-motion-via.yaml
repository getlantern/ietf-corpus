document: rfc-9179
kind: protocol-element
summary: The 'velocity' container captures three-dimensional motion via 'v-north', 'v-east', and 'v-up' leaves, all typed as decimal64 with 12 fraction-digits in meters per second. Two-dimensional heading and speed are derived using arctan(v_east/v_north) and sqrt(v_north^2 + v_east^2).
section: "2.3"
topics:
