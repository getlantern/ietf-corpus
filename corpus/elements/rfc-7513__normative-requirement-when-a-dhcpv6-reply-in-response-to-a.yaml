document: rfc-7513
kind: normative-requirement
summary: When a DHCPv6 Reply in response to a Confirm message contains no lease time, the SAVI device SHOULD send a LEASEQUERY message to retrieve it. If LEASEQUERY is not sent, a preconfigured DHCP_DEFAULT_LEASE MUST be set on the corresponding binding entry; using T1 from DHCP servers is RECOMMENDED.
section: 6.4.2.1
rfc2119_level: SHOULD
topics:
    - ip
    - security
