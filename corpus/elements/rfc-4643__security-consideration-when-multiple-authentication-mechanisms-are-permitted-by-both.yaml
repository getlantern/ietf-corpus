document: rfc-4643
kind: security-consideration
summary: When multiple authentication mechanisms are permitted by both parties, an active attacker can cause down-negotiation to the weakest mechanism. Both clients and servers SHOULD be configurable to forbid use of weak mechanisms.
section: "6"
