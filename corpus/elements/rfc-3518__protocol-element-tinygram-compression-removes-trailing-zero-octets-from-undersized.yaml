document: rfc-3518
kind: protocol-element
summary: Tinygram Compression removes trailing zero octets from undersized IEEE 802.3 PDUs (below minimum PDU size) before transmission over low-speed lines, tagging compressed frames with the Z flag bit. The receiver pads the frame back to minimum 802.3 length (60 octets) with zeroes.
section: "3.3"
