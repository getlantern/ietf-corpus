document: rfc-4683
kind: design-rationale
summary: The third use case—where a subject proves knowledge of an SII without disclosing it—uses the intermediate PEPSI value H(P || R || SIItype || SII) rather than P or SII directly. This allows a relying party to verify the subject's knowledge without learning the actual SII, preserving privacy while still providing identity assurance.
