document: rfc-7737
kind: security-consideration
summary: The Reply Mode Order TLV provides a new vector for unauthorized sources to discover return-path topology. Implementations SHOULD check source addresses of MPLS echo request messages against an access list before accepting them, as also specified in RFC 4379.
section: "5"
topics:
