document: rfc-7675
kind: design-rationale
summary: The 30-second consent expiry was chosen to balance minimizing response time to loss of consent against reducing spurious failures. The randomized check interval (0.8–1.2× base period) prevents synchronization of consent checks across multiple endpoints.
