document: rfc-8542
kind: security-consideration
summary: 'The writable ''fabric-attributes'' data nodes are sensitive: a malicious client could attempt to sabotage fabric configuration such as device nodes or type. Write operations without proper protection can have a negative effect on network operations. NACM (RFC 8341) provides access control for NETCONF/RESTCONF users.'
section: "6"
topics:
