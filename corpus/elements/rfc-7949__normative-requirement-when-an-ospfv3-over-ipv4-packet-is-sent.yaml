document: rfc-7949
kind: normative-requirement
summary: When an OSPFv3-over-IPv4 packet is sent to AllSPFRouters, the IPv4 destination address field MUST be 224.0.0.5. When sent to AllDRouters, the IPv4 destination address MUST be 224.0.0.6.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
    - multicast
