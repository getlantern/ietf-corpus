document: rfc-5668
kind: security-consideration
summary: This document does not introduce new security issues beyond those applicable to BGP extended communities generally. A potential serious issue exists if a malformed optional transitive attribute is received; implementations should follow the error-handling procedures discussed in the referenced work-in-progress on optional transitive BGP attributes.
