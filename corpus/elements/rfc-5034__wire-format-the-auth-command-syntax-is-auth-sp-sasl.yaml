kind: wire-format
summary: 'The AUTH command syntax is: ''AUTH SP sasl-mech [SP initial-response] *(CRLF [base64]) [CRLF cancel-response] CRLF''. The initial-response is either a base64 string or ''=''. A cancel-response is a single ''*'' character.'
