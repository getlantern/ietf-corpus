document: rfc-4252
kind: normative-requirement
summary: The server SHOULD have a timeout for authentication and disconnect if authentication has not been accepted within the timeout period. The RECOMMENDED timeout is 10 minutes. The implementation SHOULD limit failed authentication attempts to a RECOMMENDED maximum of 20 per session, and SHOULD disconnect if exceeded.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
