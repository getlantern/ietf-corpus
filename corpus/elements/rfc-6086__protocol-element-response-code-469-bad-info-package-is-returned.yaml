document: rfc-6086
kind: protocol-element
summary: Response code 469 (Bad Info Package) is returned when a UA receives an INFO request for an Info Package it has not indicated willingness to receive. The response MUST contain a Recv-Info header field with the current set of accepted Info Packages and represents a Transaction Only failure that does not terminate the dialog.
section: "11.6"
topics:
    - sip
    - realtime
