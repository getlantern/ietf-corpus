document: rfc-3369
kind: wire-format
summary: Message digest is computed only over the value octets of the encapContentInfo eContent OCTET STRING, not the tag or length octets. When signedAttrs is present, the digest is computed over the DER encoding of SignedAttrs using an EXPLICIT SET OF tag (not the IMPLICIT [0] tag).
section: "5.4"
topics:
    - crypto
    - security
