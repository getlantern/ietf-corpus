summary: vacmSecurityToGroupTable maps (vacmSecurityModel, vacmSecurityName) index pairs to a vacmGroupName (SnmpAdminString, SIZE 1..32). A newly created row remains notReady until vacmGroupName is set. The vacmSecurityModel index MUST NOT take the 'any' (0) value.
