summary: The primary purpose of this revision over RFC 4583 was to add signaling support for BFCP over unreliable (UDP) transport, adding proto values 'TCP/DTLS/BFCP', 'UDP/BFCP', and 'UDP/TLS/BFCP', and the new 'bfcpver' attribute for version negotiation.
