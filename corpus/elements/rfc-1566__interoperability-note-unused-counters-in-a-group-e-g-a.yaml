document: rfc-1566
kind: interoperability-note
summary: Unused counters in a group (e.g., a group monitoring only inbound activity) are inaccessible and return noSuchName (SNMPv1) or noSuchInstance (SNMPv2) rather than zero, allowing partial group implementations without misleading zero values.
