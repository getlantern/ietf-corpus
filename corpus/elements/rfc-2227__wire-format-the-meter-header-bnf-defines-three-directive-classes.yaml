document: rfc-2227
kind: wire-format
summary: 'The Meter header BNF defines three directive classes: meter-request-directive (will-report-and-limit | wont-report | wont-limit), meter-report-directive (count=1*DIGIT/1*DIGIT), and meter-response-directive (max-uses=N | max-reuses=N | do-report | dont-report | timeout=N | wont-ask). Request and report directives may only appear in requests; response directives only in responses.'
section: "5.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
