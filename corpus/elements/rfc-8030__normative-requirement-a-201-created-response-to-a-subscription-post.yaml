document: rfc-8030
kind: normative-requirement
summary: A 201 (Created) response to a subscription POST request MUST return a URI for the push message subscription resource in the Location header field. The push service MUST also provide a URI for the push resource in a link relation of type 'urn:ietf:params:push'.
section: "4"
rfc2119_level: MUST
topics:
    - http
    - websocket
