document: rfc-6401
kind: normative-requirement
summary: When merging Application-Level Resource Priority Elements in the multicast case (where POLICY_DATA is not integrity-protected), the outgoing ALRP List MUST be the union of all incoming ALRP Lists, and a given ALRP MUST NOT appear more than once.
section: 5.2.1
rfc2119_level: MUST
topics:
    - qos
    - routing
    - multicast
