document: rfc-7865
kind: design-rationale
summary: Zero CS and CS-Group instances are allowed in a 'recording' element to support persistent recording scenarios where the RS SIP dialog is established before any CS exists (e.g., a phone sets up an RS with the SRS before joining a call). Once a CS is established, the same RS carries the CS metadata.
section: 6.1.2
topics:
    - sip
    - realtime
