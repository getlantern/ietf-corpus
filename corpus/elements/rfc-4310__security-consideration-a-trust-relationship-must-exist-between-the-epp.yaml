document: rfc-4310
kind: security-consideration
summary: A trust relationship MUST exist between the EPP client and server, and provisioning of public key information MUST only be done after the identities of both parties have been confirmed using a strong authentication mechanism, because exchanged data can have operational impact on the DNS.
section: "7"
rfc2119_level: MUST
