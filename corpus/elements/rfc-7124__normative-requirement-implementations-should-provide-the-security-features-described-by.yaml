document: rfc-7124
kind: normative-requirement
summary: Implementations SHOULD provide the security features described by the SNMPv3 framework, and implementations claiming compliance to SNMPv3 MUST include full support for authentication and privacy via the User-based Security Model (USM) with the AES cipher algorithm.
section: "5"
rfc2119_level: MUST
topics:
