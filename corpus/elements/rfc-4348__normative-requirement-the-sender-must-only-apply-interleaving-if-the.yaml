document: rfc-4348
kind: normative-requirement
summary: The sender MUST only apply interleaving if the receiver has signaled its support through out-of-band means. The number of frame-blocks per payload (N) and ILL MUST NOT change inside an interleave group; all payloads in a group MUST contain the same number of speech frame-blocks.
section: 6.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
