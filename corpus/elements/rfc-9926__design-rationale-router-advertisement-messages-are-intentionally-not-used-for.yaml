document: rfc-9926
kind: design-rationale
summary: Router Advertisement messages are intentionally not used for prefix advertisement by energy-constrained nodes, because RA would make the node appear as a router to peers and requires support for asynchronous multicast, violating the energy conservation principle of avoiding broadcasts to or from the node.
