document: rfc-3182
kind: security-consideration
summary: The RSVP INTEGRITY object is used to protect AUTH_DATA policy objects from replay attacks. Combining AUTH_DATA with the INTEGRITY object enforces authentication based on both user identity and originating node identity. Simple (plaintext) authentication is inherently less secure; public key certificates provide the strongest assurance.
section: "9"
topics:
