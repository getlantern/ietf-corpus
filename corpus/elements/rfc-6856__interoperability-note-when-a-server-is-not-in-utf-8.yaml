document: rfc-6856
kind: interoperability-note
summary: When a server is not in UTF-8 mode and receives a request for a message requiring UTF-8, it MAY reject the command with an -ERR response (using the UTF8 response code) or may attempt to create and deliver a surrogate form of the message as described in Section 7 of RFC 6855 (IMAP Support for UTF-8).
section: "4"
topics:
    - email
