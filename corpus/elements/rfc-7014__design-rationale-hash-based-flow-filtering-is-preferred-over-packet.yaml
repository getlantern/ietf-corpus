document: rfc-7014
kind: design-rationale
summary: Hash-based Flow Filtering is preferred over packet-level hash selection when the sampling probability must be dynamically adjusted based on the number of observed Flows (e.g., in the Metering Process), while still enabling coordinated subset selection across multiple Observation Points using a shared Hash Domain of invariant Flow Key fields.
section: 6.1.2
