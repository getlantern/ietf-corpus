document: rfc-3862
kind: protocol-element
summary: 'The ''DateTime'' header (namespace: urn:ietf:params:cpim-headers:) carries the date and time the sender sent the message using ISO 8601 format as profiled in RFC 3339. One purpose is replay-attack protection by allowing the recipient to know the intended send time.'
section: "4.4"
topics:
    - realtime
    - security
