document: rfc-6860
kind: normative-requirement
summary: If prefix-hiding is configured on an interface, the virtual link endpoint MUST NOT use that interface's IP address as the virtual interface's IP address, as the matching routing table entry must exist to ensure the virtual link's operation.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - routing
