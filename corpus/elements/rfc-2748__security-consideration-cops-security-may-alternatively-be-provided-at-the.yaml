document: rfc-2748
kind: security-consideration
summary: COPS security MAY alternatively be provided at the network layer via IPsec (AH SHOULD be used for validation; ESP MAY add secrecy) or at the transport layer via TLS for connection-level validation and privacy. These mechanisms are complements to or replacements for the COPS Integrity object.
section: "5"
topics:
    - security
    - ipsec
    - tls
