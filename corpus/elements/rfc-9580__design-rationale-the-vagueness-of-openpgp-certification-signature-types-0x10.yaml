document: rfc-9580
kind: design-rationale
summary: 'The vagueness of OpenPGP certification signature types (0x10–0x13) is intentional: because the system places final authority for validity upon the receiver, a signer''s casual Generic Certification may be treated as more rigorous than another authority''s Positive Certification.'
section: 5.2.1
topics:
