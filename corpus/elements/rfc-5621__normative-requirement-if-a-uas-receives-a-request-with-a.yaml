document: rfc-5621
kind: normative-requirement
summary: If a UAS receives a request with a body part whose disposition type is incompatible with how it is supposed to be handled according to other parts of the SIP message (e.g., a Refer-To Content-ID URL pointing to a body with disposition type 'session'), the UAS SHOULD return a 415 response.
section: "8.4"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
