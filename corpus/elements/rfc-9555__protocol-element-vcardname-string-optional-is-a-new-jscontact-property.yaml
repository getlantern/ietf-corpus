document: rfc-9555
kind: protocol-element
summary: vCardName (String, optional) is a new JSContact property on any JSContact object that records the name of the originating vCard element. It allows round-trip preservation of the vCard property name when multiple vCard properties (e.g., IMPP and SOCIALPROFILE) map to the same JSContact type.
section: 2.15.3
topics:
