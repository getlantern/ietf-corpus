document: rfc-7838
kind: normative-requirement
summary: When using HTTP/2, servers SHOULD instead send an ALTSVC frame rather than an Alt-Svc header field. A single ALTSVC frame can be sent for a connection; a new frame is not needed for every request.
section: "3"
rfc2119_level: SHOULD
topics:
    - http
