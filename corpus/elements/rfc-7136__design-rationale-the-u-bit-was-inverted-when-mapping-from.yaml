document: rfc-7136
kind: design-rationale
summary: The 'u' bit was inverted when mapping from MAC to IID to make it easier for network operators to manually configure local-scope IIDs (per RFC 4291 and RFC 7042). The original rationale for preserving it was to allow future technology to take advantage of universally scoped IIDs, but this use case never materialized.
section: "1"
topics:
