document: rfc-9010
kind: security-consideration
summary: Using 6LoWPAN ND as the RUL-to-router interface isolates edge nodes from RPL insider attacks. Compared to RFC 6550 where every node can inject RPL-based attacks, RULs can only interact with 6LRs via 6LoWPAN ND, significantly reducing the attack surface.
section: "11"
topics:
    - security
    - routing
