document: rfc-2595
kind: design-rationale
summary: The PLAIN SASL mechanism is defined because many sites have high investment in clear-text password authentication infrastructure, and a TLS privacy layer not tightly bound to authentication can protect against network eavesdropping without requiring new authentication infrastructure or forcing password changes.
