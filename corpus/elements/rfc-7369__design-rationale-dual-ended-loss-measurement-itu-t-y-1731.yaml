summary: Dual-ended Loss Measurement (ITU-T Y.1731) requires no additional OAM configuration Sub-TLV beyond the standard CC Sub-TLV because the measurement piggbacks frame counters on CCMs; it is activated simply by setting the PM/Loss OAM Function Flag alongside the CC flag.
