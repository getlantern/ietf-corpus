document: rfc-8681
kind: normative-requirement
summary: The linear system maximum size ls_max_size at a receiver SHOULD NOT be smaller than dw_max_size, as a smaller value could prevent recovery of lost ADUs even when sufficient repair packets are received.
section: "3.1"
rfc2119_level: SHOULD NOT
