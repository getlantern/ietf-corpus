document: rfc-5857
kind: protocol-element
summary: ROHC_PROFILE (AF=1) is a mandatory 4-octet attribute (2-octet Profile Identifier value) identifying a ROHC profile to use. There MUST be at least one in the Notify message; the recipient MUST only compress using the proposed profile(s).
section: 3.1.2
topics:
    - ipsec
    - vpn
