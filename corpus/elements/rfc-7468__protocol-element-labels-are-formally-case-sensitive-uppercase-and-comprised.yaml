document: rfc-7468
kind: protocol-element
summary: Labels are formally case-sensitive, uppercase, and comprised of zero or more printable characters (excluding hyphen-minus). Labels must not contain consecutive spaces or hyphen-minuses, nor spaces or hyphen-minuses at either end. The label type implies the encoded data follows the specified ASN.1 syntax.
