document: rfc-8829
kind: normative-requirement
summary: When a=imageattr recv attributes are present in a remote description and the encoder resolution exceeds the maximum size, the encoder SHOULD apply downscaling without changing the picture aspect ratio. If no supplied attributes can be processed successfully, the encoding MUST NOT be transmitted.
section: 3.6.2
rfc2119_level: MUST NOT
topics:
    - webrtc
    - realtime
