document: rfc-7711
kind: interoperability-note
summary: If POSH fingerprint verification fails (no match found), the POSH client MAY still accept the connection if another verification method succeeds, such as DANE (RFC 6698). POSH and DANE are complementary, not mutually exclusive.
section: "3.3"
