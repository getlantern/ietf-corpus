document: rfc-5663
kind: wire-format
summary: 'The pnfs_block_sig_component4 structure identifies a storage volume by content: bsc_sig_offset (int64_t, byte offset from volume start; negative means offset from end) and bsc_contents (opaque, MUST NOT be interpreted as zero-terminated). A signature is an array of up to PNFS_BLOCK_MAX_SIG_COMP (16) components; components need not be co-located in a single sector.'
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
