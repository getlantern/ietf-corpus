document: rfc-7198
kind: normative-requirement
summary: 'One of two conditions is REQUIRED: the original and duplicate RTP streams are carried with their own SSRCs in the same ''m'' line, or they are in separate ''m'' lines with no other RTP stream listed in either. When streams are in separate ''m'' lines alongside other streams, further signaling beyond this specification is needed.'
section: "3.4"
rfc2119_level: REQUIRED
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
