document: rfc-6141
kind: normative-requirement
summary: If a UA receives a reliable provisional or 2xx response to a target-refresh request, it MUST replace the dialog's remote target URI with the URI from the Contact header field, if present. If the UA receives an unreliable provisional response, it MUST NOT refresh the dialog's remote target.
section: "4.7"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
