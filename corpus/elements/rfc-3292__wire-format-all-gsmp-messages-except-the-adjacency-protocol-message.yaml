document: rfc-3292
kind: wire-format
summary: 'All GSMP messages except the adjacency protocol message share a common 12-byte fixed header: Version (8 bits), Message Type (8 bits), Result (8 bits), Code (8 bits), Partition ID (8 bits), Transaction Identifier (24 bits), I flag (1 bit), SubMessage Number (15 bits), and Length (16 bits), followed by a variable-length Message Body. Fields are big-endian.'
