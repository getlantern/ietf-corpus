document: rfc-7844
kind: normative-requirement
summary: Clients interested in protecting their privacy SHOULD NOT send Confirm messages and SHOULD instead directly try to acquire addresses on the new link, to avoid revealing previous attachment points via addresses in the Confirm message.
section: "4.2"
rfc2119_level: SHOULD NOT
