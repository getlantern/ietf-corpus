document: rfc-1883
kind: normative-requirement
summary: Every link in the internet must have an MTU of 576 octets or greater. Links with a configurable MTU must be configured to have an MTU of at least 576 octets; a larger MTU is recommended to accommodate encapsulations without incurring fragmentation.
section: "5"
rfc2119_level: MUST
topics:
    - ip
