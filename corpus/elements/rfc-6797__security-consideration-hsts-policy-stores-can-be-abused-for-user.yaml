document: rfc-6797
kind: security-consideration
summary: 'HSTS policy stores can be abused for user tracking: because Known HSTS Host domain names are cached, an attacker controlling multiple HSTS hosts can encode information in subdomains, cache it in UAs, and later retrieve it via crafted resource loads to determine prior site visits.'
section: "14.9"
topics:
    - security
    - privacy
