document: rfc-6514
kind: wire-format
summary: The Source Active A-D Route NLRI carries an 8-octet RD, 1-octet Multicast Source Length, variable Multicast Source, 1-octet Multicast Group Length, and variable Multicast Group. Routes with a Multicast Source Length of 0 are outside scope; routes with an SSM-range Multicast Group MUST NOT be advertised and MUST be discarded if received.
section: "4.5"
topics:
    - bgp
    - multicast
    - vpn
    - routing
