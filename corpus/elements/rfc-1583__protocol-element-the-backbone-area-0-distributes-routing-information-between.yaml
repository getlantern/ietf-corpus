document: rfc-1583
kind: protocol-element
summary: 'The backbone (Area 0) distributes routing information between all other areas. All inter-area traffic follows a three-segment path: intra-area to an ABR, backbone path, then intra-area to the destination. Virtual links can restore or augment backbone connectivity.'
section: "3.1"
