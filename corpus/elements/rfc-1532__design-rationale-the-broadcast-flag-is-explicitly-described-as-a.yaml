document: rfc-1532
kind: design-rationale
summary: The BROADCAST flag is explicitly described as a workaround for client implementations that cannot receive unicast IP datagrams before learning their IP address. Its use is discouraged; such client implementations SHOULD be modified to accept unicast replies instead.
section: 3.1.1
topics:
    - ip
