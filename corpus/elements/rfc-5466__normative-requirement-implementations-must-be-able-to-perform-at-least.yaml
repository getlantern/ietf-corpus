document: rfc-5466
kind: normative-requirement
summary: Implementations MUST be able to perform at least 3 substitution passes when a filter references another filter via the FILTER search-key. If more passes are allowed, the implementation MUST implement loop detection.
section: "3.1"
rfc2119_level: MUST
