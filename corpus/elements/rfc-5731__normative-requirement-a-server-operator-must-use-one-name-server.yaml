document: rfc-5731
kind: normative-requirement
summary: 'A server operator MUST use one name server specification form consistently: a server announcing support for host objects in an EPP greeting MUST NOT allow domain attributes to describe name server hosts; a server not announcing host object support MUST allow domain attributes.'
section: "1.1"
rfc2119_level: MUST
topics:
    - dns
