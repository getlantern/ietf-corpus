summary: The IPv6 RA Captive-Portal option uses Type 37 (one octet), an 8-bit unsigned Length field in units of 8 bytes (including Type and Length), and a variable-length URI field padded with NULL (0x0) to make the total option length a multiple of 8 bytes.
