document: rfc-3057
kind: design-rationale
summary: SCTP is chosen as the underlying transport because it provides explicit packet-oriented delivery, multi-stream sequenced delivery, multi-homing for network-level fault tolerance, resistance to flooding and masquerade attacks, and data segmentation to path MTU. These properties are essential for carrier-grade ISDN signaling backhaul.
section: 1.3.1
topics:
