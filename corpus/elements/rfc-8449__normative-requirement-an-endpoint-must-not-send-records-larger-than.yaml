document: rfc-8449
kind: normative-requirement
summary: An endpoint MUST NOT send records larger than the protocol-defined limit (2^14 for TLS 1.2, 2^14+1 for TLS 1.3) regardless of what the peer advertises, unless explicitly permitted by a future TLS version or extension.
