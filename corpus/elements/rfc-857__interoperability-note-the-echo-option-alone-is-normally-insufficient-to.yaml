document: rfc-857
kind: interoperability-note
summary: The Echo option alone is normally insufficient to achieve character-at-a-time remote echoing as commonly understood; the SUPPRESS-GO-AHEAD option must also be negotiated in conjunction with the ECHO option to achieve that behavior.
section: "5"
