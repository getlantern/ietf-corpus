document: rfc-3370
kind: security-consideration
summary: The key management technique used to distribute message-authentication keys must itself provide authentication. Neither RSA (PKCS#1) nor Ephemeral-Static D-H provide data origin authentication; Static-Static D-H does, when both parties' public keys are bound to identities in X.509 certificates.
section: "9"
topics:
    - security
    - crypto
