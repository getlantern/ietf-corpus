document: rfc-9483
kind: normative-requirement
summary: The transactionID MUST be 128 bits of random data in the first message of a PKI management operation to minimize collision probability; all subsequent messages in the same operation MUST reuse that value.
section: "3.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
