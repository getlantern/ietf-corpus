document: rfc-4804
kind: interoperability-note
summary: 'This specification differs from RFC 2746 (RSVP over IP Tunnels) in four key ways: it targets MPLS tunnels (requiring PHP handling), the tunnels inherently reserve resources, exactly one aggregate reservation exists per tunnel, and tunnels carry only reserved traffic.'
