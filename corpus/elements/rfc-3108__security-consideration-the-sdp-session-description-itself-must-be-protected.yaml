document: rfc-3108
kind: security-consideration
summary: The SDP session description itself must be protected against unauthorized modification and interception, since it carries ATM addressing, QoS, and bearer correlation information (eecid) that could be exploited to hijack or redirect ATM bearer connections. The document defers to the security mechanisms of the overlying protocol (Megaco, SIP, MGCP) for SDP protection.
section: "8.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
