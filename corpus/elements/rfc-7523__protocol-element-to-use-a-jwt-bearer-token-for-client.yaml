document: rfc-7523
kind: protocol-element
summary: To use a JWT Bearer Token for client authentication, the client sets 'client_assertion_type' to 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer' and places the JWT in 'client_assertion'. The 'client_assertion' parameter MUST NOT contain more than one JWT.
section: "2.2"
topics:
