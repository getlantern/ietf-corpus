document: rfc-4998
kind: normative-requirement
summary: During Archive Timestamp verification, the computed intermediate hash h' MUST appear as a member of the next higher PartialHashtree list. The root hash value must correspond to hashedMessage (and digestAlgorithm to hashAlgorithm) in the messageImprint of the RFC 3161 TSTInfo.
section: "4.3"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
