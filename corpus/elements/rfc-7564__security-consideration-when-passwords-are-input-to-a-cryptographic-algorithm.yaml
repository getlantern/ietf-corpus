document: rfc-7564
kind: security-consideration
summary: When passwords are input to a cryptographic algorithm (e.g., a hash), the client must perform proper PRECIS preparation before applying the algorithm, since the server does not receive the password in plaintext and cannot re-enforce the profile.
section: "12.6"
