document: rfc-6361
kind: normative-requirement
summary: If an implementation includes BCP (RFC 3518), it MUST ensure that only one of BCP or TNCP is negotiated on a link, and not both. If the peer is an RBridge, there is no need to pass unencapsulated frames.
section: "3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
