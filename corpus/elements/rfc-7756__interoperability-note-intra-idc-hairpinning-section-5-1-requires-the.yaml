document: rfc-7756
kind: interoperability-note
summary: Intra-IDC hairpinning (Section 5.1) requires the BR to support the hairpinning behavior defined in Section 4.2 of RFC 7757. If the BR does not support hairpinning, operators must use the direct EAM approach described in Section 5.2 instead.
section: "5.1"
topics:
