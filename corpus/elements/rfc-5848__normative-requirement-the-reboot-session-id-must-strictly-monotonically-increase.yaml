document: rfc-5848
kind: normative-requirement
summary: The Reboot Session ID MUST strictly monotonically increase after each reboot to allow collectors to distinguish messages across reboots. If the signer cannot guarantee monotonic increase, RSID MUST be set to 0.
section: 4.2.2
rfc2119_level: MUST
topics:
    - syslog
    - security
