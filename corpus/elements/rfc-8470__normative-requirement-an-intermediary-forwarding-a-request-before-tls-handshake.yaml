document: rfc-8470
kind: normative-requirement
summary: An intermediary forwarding a request before TLS handshake completion with its client MUST add the Early-Data header field set to "1" if not already present, and MUST NOT remove the field if it is present.
section: "5.1"
rfc2119_level: MUST
topics:
