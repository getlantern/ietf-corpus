document: rfc-2748
kind: protocol-element
summary: The PEPID Object (C-Num=11, C-Type=1) is a NULL-terminated ASCII string zero-padded to a 32-bit boundary that uniquely identifies the PEP within the policy domain in a manner persistent across reboots (e.g., static IP address or DNS name). It is required in Client-Open messages.
section: 2.2.11
