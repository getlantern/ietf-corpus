document: rfc-4362
kind: normative-requirement
summary: If a CSP carries two non-equal CID values, the packet MUST be discarded. After a CSP is received and processed, the packet (including any data following the encapsulated compressed header) MUST be discarded.
section: 4.1.2
rfc2119_level: MUST
