document: rfc-8807
kind: design-rationale
summary: The "[LOGIN-SECURITY]" sentinel value in the RFC 5730 <pw>/<newPW> elements was chosen as the indirection mechanism so that the extension can override the password without breaking backward compatibility with the base EPP XML schema, which still requires a conforming <pw> value.
section: "3.2"
topics:
    - security
