document: rfc-7950
kind: normative-requirement
summary: All identifiers defined in a namespace MUST be unique. Implementations MUST support identifiers up to 64 characters in length and MAY support longer identifiers. Identifiers are case sensitive.
section: "6.2"
rfc2119_level: MUST
