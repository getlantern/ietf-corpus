document: rfc-7180
kind: interoperability-note
summary: TRILL campuses with a mixture of IEEE 802.1Q-2011-compliant ports and pre-802.1Q-2011 ports, especially with actual Token Ring links, may operate incorrectly and corrupt data due to different interpretations of the CFI/DEI bit — just as a bridged LAN with such mixed ports would.
