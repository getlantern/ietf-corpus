document: rfc-2579
kind: state-machine
summary: 'RowStatus defines six values for managing conceptual row lifecycle: active, notInService, notReady (readable states) and createAndGo, createAndWait, destroy (write-only actions). Only three values—active, notInService, notReady—are returned on retrieval. Transitions among states A (row absent), B (notReady), C (notInService), and D (active) are governed by a formal state table.'
