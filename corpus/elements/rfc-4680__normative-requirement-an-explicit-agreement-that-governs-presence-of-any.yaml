document: rfc-4680
kind: normative-requirement
summary: An explicit agreement that governs presence of any supplemental data MUST be concluded between client and server for each SupplementalDataType using TLS extensions in the hello messages. Receiving an unexpected SupplementalData handshake message results in a fatal error and the receiver MUST close the connection with a fatal unexpected_message alert.
section: "2"
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
