document: rfc-8268
kind: design-rationale
summary: '''diffie-hellman-group14-sha256'' was added as a pragmatic transition aid: group14 is already present in most SSH implementations and SHA256 is widely available, making this an easy first step away from SHA-1-based key exchange before moving to larger groups.'
