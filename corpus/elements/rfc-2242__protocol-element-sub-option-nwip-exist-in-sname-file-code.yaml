document: rfc-2242
kind: protocol-element
summary: Sub-option NWIP_EXIST_IN_SNAME_FILE (code 3) indicates all NetWare/IP information is present in the 'sname' and, if necessary, 'file' fields of the DHCP response. Within the 'options' area, option 63 appears with length 2, first byte set to NWIP_EXIST_IN_SNAME_FILE and second byte zero.
section: "3"
