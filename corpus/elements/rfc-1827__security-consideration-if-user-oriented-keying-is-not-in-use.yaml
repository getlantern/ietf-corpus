document: rfc-1827
kind: security-consideration
summary: If user-oriented keying is not in use, the algorithm must not be vulnerable to any kind of Chosen Plaintext attack. DES is known to be susceptible to differential and linear cryptanalysis; user-oriented keying is recommended to preclude such attacks and complicate cryptanalysis.
