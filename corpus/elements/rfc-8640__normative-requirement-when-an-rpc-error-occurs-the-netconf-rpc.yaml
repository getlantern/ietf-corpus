document: rfc-8640
kind: normative-requirement
summary: When an RPC error occurs, the NETCONF RPC reply MUST include an <rpc-error> element per RFC 6241 with 'error-type' of 'application', an 'error-tag' corresponding to the error identity, and an 'error-app-tag' in the form <modulename>:<identityname>.
section: "7"
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
