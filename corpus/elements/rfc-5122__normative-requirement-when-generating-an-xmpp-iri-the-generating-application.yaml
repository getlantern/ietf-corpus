document: rfc-5122
kind: normative-requirement
summary: When generating an XMPP IRI, the generating application MUST first ensure the XMPP address conforms to XMPP-CORE rules (UTF-8 encoding and stringprep profiles), then MUST decode the UTF-8 characters to their original Unicode form since IRI syntax specifies characters are the original Unicode characters themselves.
section: 2.7.1
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
