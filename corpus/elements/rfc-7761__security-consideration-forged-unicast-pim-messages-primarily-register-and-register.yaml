document: rfc-7761
kind: security-consideration
summary: Forged unicast PIM messages, primarily Register and Register-Stop, can be injected by off-link attackers if source address spoofing is possible. A forged Register-Stop suppresses legitimate traffic registration at the DR; a forged Register can inject traffic or exhaust RP resources.
section: 6.1.2
topics:
    - security
    - multicast
