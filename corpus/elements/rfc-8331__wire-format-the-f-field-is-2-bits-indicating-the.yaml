document: rfc-8331
kind: wire-format
summary: 'The F field is 2 bits indicating the interlaced field: 0b00 = progressive or no field specified, 0b10 = first field, 0b11 = second field; 0b01 is not valid. A 22-bit reserved field of zeros follows F to ensure the first ANC data packet header starts 32-bit word-aligned.'
