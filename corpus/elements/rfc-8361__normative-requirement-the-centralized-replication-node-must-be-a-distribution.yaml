document: rfc-8361
kind: normative-requirement
summary: The centralized replication node MUST be a distribution tree root. An R-nickname advertised by an RBridge that is not a distribution tree root MUST NOT be treated as an R-nickname but rather as an ordinary nickname.
section: "3"
rfc2119_level: MUST
