document: rfc-5511
kind: normative-requirement
summary: In new documents, any construct combining multiple concatenated elements as alternatives (e.g., <A> <B> | <C> <D>) MUST use explicit grouping or intermediary constructs. Existing ambiguous uses in legacy RFCs are not deprecated, and automated parsers must still handle them.
section: 2.2.4
rfc2119_level: MUST
