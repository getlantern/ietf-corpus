document: rfc-2210
kind: wire-format
summary: 'The ADSPEC Default General Parameters fragment (service 1) is 9 32-bit words carrying four parameters: IS hop count (param 4, 32-bit unsigned), path bandwidth estimate (param 6, IEEE float), minimum path latency (param 8, 32-bit int), and composed MTU (param 10, 32-bit unsigned). Bit 23 of word 1 is the global NON_IS_HOP break bit.'
