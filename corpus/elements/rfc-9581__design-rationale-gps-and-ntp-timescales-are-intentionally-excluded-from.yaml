document: rfc-9581
kind: design-rationale
summary: GPS and NTP timescales are intentionally excluded from the registry; implementations should instead convert GPS or NTP times to TAI or UTC using a single addition or subtraction (t_utc = t_ntp - 2208988800; t_tai = t_gps + 315964819). This keeps the timescale set minimal while allowing trivial conversion from common offset timescales.
section: "3.4"
topics:
    - cbor
    - ntp
