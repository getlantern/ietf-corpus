document: rfc-8742
kind: protocol-element
summary: A CBOR Sequence is a sequence of bytes defined as either an empty (zero-length) sequence of bytes, or the concatenation of one or more encoded CBOR data items. Concatenating zero or more CBOR Sequences also results in a valid CBOR Sequence.
