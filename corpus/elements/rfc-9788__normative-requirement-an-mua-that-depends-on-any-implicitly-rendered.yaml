document: rfc-9788
kind: normative-requirement
summary: An MUA that depends on any implicitly rendered Header Field (e.g., Message-Id, References, In-Reply-To, Reply-To) in a message with Header Protection MUST use the value from the protected Header Field and SHOULD NOT use any value found outside the cryptographic protection.
section: "4.6"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
