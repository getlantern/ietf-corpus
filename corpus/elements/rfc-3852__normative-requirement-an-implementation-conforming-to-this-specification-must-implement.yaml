document: rfc-3852
kind: normative-requirement
summary: An implementation conforming to this specification MUST implement the ContentInfo protection content and MUST implement the data, signed-data, and enveloped-data content types. The digested-data, encrypted-data, and authenticated-data content types MAY be implemented.
section: "2"
rfc2119_level: MUST
