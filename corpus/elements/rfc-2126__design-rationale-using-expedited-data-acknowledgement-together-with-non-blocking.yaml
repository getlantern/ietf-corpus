document: rfc-2126
kind: design-rationale
summary: 'Using Expedited Data Acknowledgement together with Non-blocking Expedited Data service is considered a wasted effort: since Non-blocking ED duplicates ED TPDUs on both TCP connections, acknowledgement adds overhead without benefit.'
