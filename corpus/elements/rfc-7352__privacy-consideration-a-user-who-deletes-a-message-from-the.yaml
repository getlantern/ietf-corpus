document: rfc-7352
kind: privacy-consideration
summary: A user who deletes a message from the server may expect no record remains, but the message ID persists in the duplicate-tracking list for the duration of the expiry interval. Users of services that intentionally limit traceability should be informed of this, and a shorter default expiry may be appropriate in those situations.
section: "6"
topics:
    - email
    - privacy
