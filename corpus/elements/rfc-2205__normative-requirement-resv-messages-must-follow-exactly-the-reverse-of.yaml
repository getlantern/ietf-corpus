document: rfc-2205
kind: normative-requirement
summary: Resv messages must follow exactly the reverse of the path(s) used by data packets, upstream to all sender hosts included in the sender selection, and must finally be delivered to the sender hosts themselves so they can set traffic control parameters for the first hop.
section: "2.1"
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
