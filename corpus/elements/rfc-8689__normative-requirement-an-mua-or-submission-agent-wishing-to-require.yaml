document: rfc-8689
kind: normative-requirement
summary: An MUA or submission agent wishing to require TLS MUST negotiate STARTTLS and REQUIRETLS and include the REQUIRETLS option on MAIL FROM. When TLS is not to be required, the sender MUST include the TLS-Required header field in the message.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
