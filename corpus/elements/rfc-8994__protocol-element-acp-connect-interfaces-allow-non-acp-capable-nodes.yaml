document: rfc-8994
kind: protocol-element
summary: ACP connect interfaces allow non-ACP-capable nodes (NMS, SDN controllers) to access the ACP without establishing ACP secure channels. An ACP node exposes a connect interface directly into its ACP VRF; the non-ACP node is explicitly configured to use it. A VRF-select variant allows combined ACP and data-plane access on one physical interface.
section: "8.1"
topics:
    - security
    - ip
