document: rfc-3175
kind: normative-requirement
summary: The deaggregating router SHOULD update the ADSPEC of the E2E Path to reflect the aggregation region's QoS impact before forwarding the E2E Path toward the receiver. It should use ADSPEC information from Aggregate Path messages for this update, and may delay forwarding the E2E Path until an Aggregate Path ADSPEC is available.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
