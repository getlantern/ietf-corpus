document: rfc-8155
kind: security-consideration
summary: When DHCP is used for domain name discovery, clients are encouraged to use unicast DHCP INFORM queries instead of broadcast queries to reduce spoofing risk. DHCP authentication (RFC 3188) can provide additional protection against modification.
section: "9.1"
topics:
    - dns
    - nat
    - security
