document: rfc-7783
kind: interoperability-note
summary: The Affinity sub-TLV is applicable specifically where a virtual RBridge represents multiple RBridges connected to an edge CE device via an LAALP (e.g., MC-LAG) where the RBridges cannot see each other's Hellos. The document does not cover other required active-active operational elements such as MC-LAG methods.
