document: rfc-7283
kind: interoperability-note
summary: This document updates RFC 3315 by explicitly defining relay agent, client, and server behavior when receiving unknown DHCPv6 message types. Implementations not updated to conform to this specification may behave incorrectly when encountering unknown messages.
