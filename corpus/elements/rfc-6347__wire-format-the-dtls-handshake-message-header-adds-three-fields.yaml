document: rfc-6347
kind: wire-format
summary: 'The DTLS handshake message header adds three fields to the TLS 1.2 handshake header: uint16 message_seq (for reordering), uint24 fragment_offset (bytes in prior fragments), and uint24 fragment_length (length of this fragment). These support fragmentation, reassembly, and loss recovery.'
