document: rfc-7208
kind: protocol-element
summary: 'The check_host() function takes three arguments — <ip> (SMTP client IP, IPv4 or IPv6), <domain> (the authorizing domain), and <sender> (the MAIL FROM or HELO identity) — and returns one of: none, neutral, pass, fail, softfail, temperror, or permerror.'
