document: rfc-2226
kind: design-rationale
summary: The all ones broadcast group (255.255.255.255) is chosen as the single broadcast group for all LIS members rather than subnet-directed broadcast, because diskless boot clients do not know their subnet and therefore cannot register with a subnet-specific group.
