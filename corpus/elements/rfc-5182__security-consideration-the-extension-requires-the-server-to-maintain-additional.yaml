document: rfc-5182
kind: security-consideration
summary: The extension requires the server to maintain additional per-connection state, which may be exploited to amplify Denial of Service attacks. Server implementations MAY limit the number of saved searches across all connections and return NOTSAVED when the limit is exceeded.
section: "4"
