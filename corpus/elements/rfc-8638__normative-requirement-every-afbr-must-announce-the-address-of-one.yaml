document: rfc-8638
kind: normative-requirement
summary: Every AFBR MUST announce the address of one of its E-IPv4 interfaces in the 'v4' field alongside the corresponding uPrefix64, and this announcement MUST be sent to other AFBRs through Multiprotocol BGP (MBGP). Every uPrefix64 announced by an AFBR MUST be unique.
section: "5.4"
rfc2119_level: MUST
topics:
    - multicast
    - bgp
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
