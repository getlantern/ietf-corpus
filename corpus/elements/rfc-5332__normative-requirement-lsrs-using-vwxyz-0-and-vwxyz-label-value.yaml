document: rfc-5332
kind: normative-requirement
summary: 'LSRs using vwxyz=0 and vwxyz=label-value procedures MUST interoperate: an LSR MUST NOT filter packets for which vwxyz has been set to zero, and MUST NOT indiscriminately filter all packets for which vwxyz is non-zero.'
