document: rfc-8835
kind: normative-requirement
summary: When a WebRTC endpoint sends data over multiple streams congestion-controlled under the same regime, it SHOULD emit data so that each stream at each priority level receives approximately twice the transmission capacity of the level below.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - webrtc
    - congestion
    - qos
