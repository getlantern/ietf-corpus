document: rfc-5425
kind: normative-requirement
summary: Both client and server implementations MUST make certificate fingerprints available through a management interface. Implementations MUST support SHA-1 as the hash algorithm with the ASCII label 'sha-1'; a SHA-1 fingerprint string is 65 characters long.
section: 4.2.2
rfc2119_level: MUST
