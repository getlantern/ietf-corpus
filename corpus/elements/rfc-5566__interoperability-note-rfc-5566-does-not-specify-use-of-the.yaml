document: rfc-5566
kind: interoperability-note
summary: RFC 5566 does not specify use of the sub-TLV types defined in RFC 5512 (such as the Encapsulation sub-TLV or Color sub-TLV) with the IPsec tunnel types it introduces; only the new IPsec Tunnel Authenticator sub-TLV (type 3) is defined for use with these tunnel types.
section: "2"
topics:
    - bgp
    - ipsec
