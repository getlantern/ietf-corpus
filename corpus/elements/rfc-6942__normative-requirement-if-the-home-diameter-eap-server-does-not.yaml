document: rfc-6942
kind: normative-requirement
summary: If the home Diameter EAP server does not support ERP extensions and receives an EAP-Initiate message, it MUST send an EAP/DEA with a Result-Code indicating Permanent Failure, and the Failed-AVP AVP MUST be included containing a copy of the EAP-Payload AVP.
section: "5.2"
rfc2119_level: MUST
topics:
    - diameter
