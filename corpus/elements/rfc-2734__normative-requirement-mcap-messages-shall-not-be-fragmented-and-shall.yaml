document: rfc-2734
kind: normative-requirement
summary: MCAP messages SHALL NOT be fragmented and SHALL be encapsulated as ether_type 0x8861 within a GASP stream packet on the broadcast channel. Individual MCAP messages are always transported unfragmented.
section: "9.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - multicast
