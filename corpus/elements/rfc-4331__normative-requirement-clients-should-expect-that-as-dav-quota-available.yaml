document: rfc-4331
kind: normative-requirement
summary: Clients SHOULD expect that as DAV:quota-available-bytes approaches 0, further allocations may be refused. A value of 0 indicates that write operations adding new data will probably fail, though overwriting an existing resource of equal size may still succeed.
section: "3"
rfc2119_level: SHOULD
topics:
    - http
