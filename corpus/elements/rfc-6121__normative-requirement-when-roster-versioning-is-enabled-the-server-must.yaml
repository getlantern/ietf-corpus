document: rfc-6121
kind: normative-requirement
summary: When roster versioning is enabled, the server MUST include the updated 'ver' attribute with each roster push; roster pushes MUST occur in modification order and each version value MUST be unique.
section: 2.6.3
rfc2119_level: MUST
