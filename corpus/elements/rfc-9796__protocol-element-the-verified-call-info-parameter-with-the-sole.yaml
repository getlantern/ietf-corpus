document: rfc-9796
kind: protocol-element
summary: The 'verified' Call-Info parameter, with the sole valid value of "true", indicates to the recipient that the party inserting the Call-Info header field has successfully performed verification procedures as defined in RFC 9795 Section 8. Its scope is limited to the specific Call-Info header field on which it appears.
