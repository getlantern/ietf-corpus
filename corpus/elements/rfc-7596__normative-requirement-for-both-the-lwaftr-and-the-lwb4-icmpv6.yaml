document: rfc-7596
kind: normative-requirement
summary: For both the lwAFTR and the lwB4, ICMPv6 MUST be handled as described in RFC 2473. The DNS considerations in Sections 5.5 and 6.4 of RFC 6333 apply to lw4o6, and lw4o6 implementations MUST comply with all requirements stated there.
section: "8"
rfc2119_level: MUST
topics:
