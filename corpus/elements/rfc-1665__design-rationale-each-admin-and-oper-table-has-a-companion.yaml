document: rfc-1665
kind: design-rationale
summary: Each Admin and Oper table has a companion LastChange TimeStamp object (e.g., snaNodeAdminTableLastChange). A Management Station polls only this scalar; a changed value signals that a full table retrieval is warranted, avoiding unnecessary bulk retrievals of large tables.
