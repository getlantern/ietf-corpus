document: rfc-6275
kind: protocol-element
summary: The return routability procedure consists of four messages (HoTI, CoTI, HoT, CoT) exchanged between the mobile node and correspondent node. It verifies reachability at both the home address and care-of address, producing keygen tokens that the mobile node combines via SHA-1 into the binding management key Kbm = SHA-1(home keygen token | care-of keygen token).
section: 5.2.5
