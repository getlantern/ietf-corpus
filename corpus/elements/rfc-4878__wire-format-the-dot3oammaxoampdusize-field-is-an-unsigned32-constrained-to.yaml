document: rfc-4878
kind: wire-format
summary: The dot3OamMaxOamPduSize field is an Unsigned32 constrained to 64..1518 octets, representing the largest OAMPDU the local OAM entity supports. The effective maximum negotiated between peers is the minimum of the two peers' values.
