document: rfc-8999
kind: normative-requirement
summary: When sending a Version Negotiation packet, an endpoint MUST place the Source Connection ID from the received packet into the Destination Connection ID field, and MUST copy the Destination Connection ID from the received packet (originally randomly chosen by the client) into the Source Connection ID field.
section: "6"
rfc2119_level: MUST
topics:
    - quic
