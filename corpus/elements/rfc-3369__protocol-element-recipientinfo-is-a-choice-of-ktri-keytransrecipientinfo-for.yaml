kind: protocol-element
summary: 'RecipientInfo is a CHOICE of: ktri (KeyTransRecipientInfo) for public-key transport, kari [1] (KeyAgreeRecipientInfo) for Diffie-Hellman style key agreement, kekri [2] (KEKRecipientInfo) for pre-distributed symmetric KEK, pwri [3] (PasswordRecipientInfo) for password-based, and ori [4] (OtherRecipientInfo) for extensibility.'
