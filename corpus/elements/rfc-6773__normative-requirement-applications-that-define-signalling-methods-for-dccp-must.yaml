document: rfc-6773
kind: normative-requirement
summary: Applications that define signalling methods for DCCP MUST define how the encapsulation is chosen and MUST allow either encapsulation to be signalled. Where both DCCP-STD and DCCP-UDP are supported, DCCP-STD SHOULD be preferred.
section: "5"
rfc2119_level: MUST
topics:
