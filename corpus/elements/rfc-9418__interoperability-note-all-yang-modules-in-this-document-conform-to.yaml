document: rfc-9418
kind: interoperability-note
summary: All YANG modules in this document conform to the Network Management Datastore Architecture (NMDA) defined in RFC 8342. The module uses `config false` for read-only operational state nodes and `config true` (default) for configurable nodes, consistent with NMDA datastore separation.
