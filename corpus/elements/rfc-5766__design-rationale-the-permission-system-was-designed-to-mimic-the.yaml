document: rfc-5766
kind: design-rationale
summary: The permission system was designed to mimic the address-restricted filtering of RFC 4787-compliant NATs, easing enterprise concerns that TURN could bypass firewall policy. Permissions expire after 5 minutes to match typical NAT UDP binding lifetimes.
