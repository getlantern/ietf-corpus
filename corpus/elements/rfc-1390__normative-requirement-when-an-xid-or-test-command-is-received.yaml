document: rfc-1390
kind: normative-requirement
summary: When an XID or TEST command is received with DSAP equal to the SNAP SAP (170), Null SAP (0), or Global SAP (255), an appropriate response must be returned. XID responses must include an 802.2 XID Information field of 129.1.0 indicating Class I service; TEST responses must echo the received information field.
section: IEEE 802.2 Details
rfc2119_level: MUST
topics:
    - ip
