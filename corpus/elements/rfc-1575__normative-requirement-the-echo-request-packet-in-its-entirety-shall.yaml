document: rfc-1575
kind: normative-requirement
summary: The echo-request packet, in its entirety, SHALL be placed into the data part of the echo-response packet, and the data part of the echo-response packet shall contain only the corresponding echo-request packet.
section: "5.5"
rfc2119_level: REQUIRED
