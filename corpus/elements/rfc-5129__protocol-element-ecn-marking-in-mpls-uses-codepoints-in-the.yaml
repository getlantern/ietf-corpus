document: rfc-5129
kind: protocol-element
summary: ECN marking in MPLS uses codepoints in the 3-bit EXP field of the MPLS shim header. For each PHB that uses ECN, one codepoint is defined as Not Congestion Marked (Not-CM) and at least one as Congestion Marked (CM), consuming at least two EXP codepoints per ECN-capable PHB.
section: "2"
topics:
    - mpls
    - ecn
    - diffserv
    - congestion
