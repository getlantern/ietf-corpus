document: rfc-8844
kind: interoperability-note
summary: Where RTP and RTCP are not multiplexed, the two separate DTLS connections carrying RTP and RTCP can be switched without harm since SRTP provides key separation. Using RTP/RTCP multiplexing (RFC 5761) avoids even this benign ambiguity.
