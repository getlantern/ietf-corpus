document: rfc-7343
kind: security-consideration
summary: The security of ORCHIDs depends on the second-preimage resistance of the underlying hash function. Using the shortest possible prefix maximizes hash output bits, directly supporting collision resistance. If the hash function is weakened, ORCHID bindings can be forged.
section: "5"
topics:
