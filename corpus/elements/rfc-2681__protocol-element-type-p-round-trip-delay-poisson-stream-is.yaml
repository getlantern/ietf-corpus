summary: Type-P-Round-trip-Delay-Poisson-Stream is a sample metric defined by parameters Src, Dst, T0, Tf, and lambda (rate in reciprocal seconds). It produces a sequence of <time, delay> pairs where measurement times are drawn from a pseudo-random Poisson process of rate lambda between T0 and Tf.
