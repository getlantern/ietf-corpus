document: rfc-6728
kind: protocol-element
summary: The CollectingProcess class configures a Collecting Process accepting IPFIX messages via SctpCollector, UdpCollector, TcpCollector, or FileReader subclasses. A CollectingProcess object may reference one or more ExportingProcess objects, enabling re-export or file-writing of received IPFIX Messages.
section: "4.5"
