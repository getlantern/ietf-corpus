document: rfc-7388
kind: interoperability-note
summary: While the LOWPAN-MIB provides direct SNMP binding, SNMP may not be affordable on constrained devices. Proposals exist to provide bindings to CoAP (RFC 7252) for accessing MIB-modeled data on constrained nodes.
