kind: state-machine
summary: 'The sctpAssocState object represents the SCTP association finite state machine with states: closed(1), cookieWait(2), cookieEchoed(3), established(4), shutdownPending(5), shutdownSent(6), shutdownReceived(7), shutdownAckSent(8), and the management-only deleteTCB(9). Transitions follow RFC 2960 Section 4.'
