document: rfc-8945
kind: interoperability-note
summary: Although hmac-sha1 support is mandatory for backward compatibility, existing deployments SHOULD be migrated to hmac-sha256 or other SHA-2 algorithms because SHA-1 collisions have been demonstrated. HMAC-MD5 MUST NOT be used.
section: "6"
topics:
