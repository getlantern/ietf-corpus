document: rfc-2491
kind: normative-requirement
summary: On PVC links, both unicast and multicast IPv6 packets SHALL be transmitted using the LLC/SNAP encapsulation defined in section 4.4.1. Interface tokens for PVC links SHALL be constructed as described in section 5 and need only be unique between the two nodes on the PVC link.
section: 1.3.1
rfc2119_level: SHALL
