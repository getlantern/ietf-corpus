document: rfc-5875
kind: protocol-element
summary: The 'diff-processing' Event header field parameter allows subscribers to indicate a preference for how the notifier signals document change notifications. Possible values are 'no-patching', 'xcap-patching', and 'aggregate', with formal ABNF grammar defined. This parameter is a subscriber hint; the notifier may respond using a simpler mode but MUST NOT use a more complex one.
section: "4.3"
topics:
    - sip
    - http
