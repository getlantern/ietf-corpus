document: rfc-3480
kind: normative-requirement
summary: If an LSR originates an LSP advertised as an unnumbered Forwarding Adjacency or uses it as an unnumbered component link, the LSR MUST allocate an identifier to that Forwarding Adjacency and the REQUEST message MUST contain an LSP_TUNNEL_INTERFACE_ID TLV with the head-end's Router ID and allocated Interface ID.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
