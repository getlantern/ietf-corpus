document: rfc-3369
kind: normative-requirement
summary: The recipient MUST NOT rely on any message digest values computed by the originator. The recipient must independently calculate the message digest and verify it matches the messageDigest attribute value in signedAttributes.
section: "5.6"
rfc2119_level: MUST NOT
topics:
