document: rfc-8512
kind: protocol-element
summary: 'The timers container (feature: napt44 or nat64) provides configurable timeout values for UDP (udp-timeout), TCP (tcp-idle-timeout, tcp-trans-open-timeout, tcp-trans-close-timeout, tcp-in-syn-timeout), ICMP (icmp-timeout), fragments (fragment-min-timeout), and a per-port-timeout list. Additional hold-down-timeout and hold-down-max leaves support hairpinning or port reuse scenarios.'
section: "2.12"
topics:
    - nat
    - yang
extracted_by: claude-sonnet-4-6
