document: rfc-2396
kind: protocol-element
summary: A URI-reference is defined as an optional absolute or relative URI followed by an optional fragment identifier separated by '#'. The four main components of an absolute hierarchical URI are scheme, authority, path, and query, written as <scheme>://<authority><path>?<query>.
section: "3"
