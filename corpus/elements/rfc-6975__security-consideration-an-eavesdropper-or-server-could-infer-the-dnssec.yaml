document: rfc-6975
kind: security-consideration
summary: An eavesdropper or server could infer the DNSSEC validator implementation in use by a client from the presence and content of the DAU/DHU/N3U options. This fingerprinting could narrow down the validator software and potentially expose known vulnerabilities to an attacker.
section: "9"
topics:
    - dns
    - security
    - privacy
