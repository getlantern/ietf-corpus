document: rfc-5269
kind: normative-requirement
summary: The MN MUST use the matching private key to decrypt the handover key and store it indexed by the AR's IPv6 address and the MN's CGA. Prior to HK-LIFETIME expiring, the MN MUST request a new key from the AR if FMIPv6 service is still required.
section: "3.3"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
