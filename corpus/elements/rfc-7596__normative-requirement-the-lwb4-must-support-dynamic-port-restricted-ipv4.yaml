document: rfc-7596
kind: normative-requirement
summary: The lwB4 MUST support dynamic port-restricted IPv4 address provisioning using the port-set algorithm from RFC 7597 Section 5.1. The number of a-bits SHOULD be 0, allocating a single contiguous port set to each lwB4.
section: "5.1"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
