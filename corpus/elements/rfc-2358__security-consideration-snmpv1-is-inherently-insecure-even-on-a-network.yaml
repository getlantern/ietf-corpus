document: rfc-2358
kind: security-consideration
summary: 'SNMPv1 is inherently insecure: even on a network secured with IPsec, there is no access control over who may GET objects in this MIB. Implementors are recommended to use SNMPv3 with the User-based Security Model and View-based Access Control Model.'
section: "8"
topics:
