kind: protocol-element
summary: A new Subject Information Access OID id-ad-cmc (id-ad 12) identifies locations where CMC services are available. For HTTP/FTP access, accessLocation MUST be a uniformResourceIdentifier; for email, an rfc822Name; for TCP/IP, a dNSName or iPAddress.
