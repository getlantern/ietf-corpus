document: rfc-3262
kind: normative-requirement
summary: If a PRACK request is received that does not match any unacknowledged reliable provisional response, the UAS MUST respond with a 481. If it does match, it MUST be responded to with a 2xx response and the provisional response MUST be removed from the unacknowledged list.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
