document: rfc-5792
kind: security-consideration
summary: 'PA-TNC identifies six threat classes: attribute theft (unauthorized interception of posture data), message fabrication (spoofed messages from unauthenticated parties), attribute modification (in-transit tampering), attribute replay, attribute insertion, and denial of service. Mitigations require the underlying PT transport to provide confidentiality, authentication, and integrity protection.'
section: "5.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
