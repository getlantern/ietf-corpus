document: rfc-4306
kind: normative-requirement
summary: Retransmission times MUST increase exponentially to avoid flooding the network and worsening congestion. Implementations MUST limit the rate at which they take actions based on unprotected messages. An implementation MUST NOT continue sending on any SA if some failure prevents it from receiving on all associated SAs.
section: "2.4"
rfc2119_level: MUST
topics:
    - ipsec
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
