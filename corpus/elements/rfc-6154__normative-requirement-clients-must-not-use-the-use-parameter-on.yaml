document: rfc-6154
kind: normative-requirement
summary: Clients MUST NOT use the 'USE' parameter on the CREATE command unless the server advertises the 'CREATE-SPECIAL-USE' capability. The 'CREATE-SPECIAL-USE' and 'SPECIAL-USE' capability strings are distinct; a server supporting both functions MUST advertise both.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
