document: rfc-1831
kind: security-consideration
summary: AUTH_SYS authentication does not guarantee security by itself. It is only legitimate when the network and applications are secured externally and privileged transport addresses (e.g., privileged TCP/UDP ports) are used for communicating endpoints.
section: A
