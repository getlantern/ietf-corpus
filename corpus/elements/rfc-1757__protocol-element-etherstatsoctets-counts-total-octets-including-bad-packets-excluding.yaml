document: rfc-1757
kind: protocol-element
summary: 'etherStatsOctets counts total octets including bad packets, excluding framing bits but including FCS octets. Ethernet utilization can be derived as: (Pkts*(9.6+6.4) + Octets*0.8) / (Interval*10000), yielding percent utilization on a 0-100 scale.'
