document: rfc-7688
kind: normative-requirement
summary: When using the extensions defined in this document, at least one Optical Node Property TLV MUST be advertised in each LSA. More than one MAY be advertised in a single LSA for fine-grained topology changes, and implementations MUST support receiving multiple Optical Node Property TLVs in an LSA.
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
