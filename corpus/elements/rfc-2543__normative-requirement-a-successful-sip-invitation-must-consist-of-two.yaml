document: rfc-2543
kind: normative-requirement
summary: 'A successful SIP invitation MUST consist of two requests: INVITE followed by ACK. The INVITE asks the callee to join a session; the ACK confirms receipt of the final response. If the caller no longer wants the call, it sends BYE instead of ACK.'
section: 1.4.4
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
