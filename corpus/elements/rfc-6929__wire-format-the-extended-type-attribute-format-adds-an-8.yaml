document: rfc-6929
kind: wire-format
summary: 'The Extended Type attribute format adds an 8-bit Extended-Type field by stealing one octet from the Value field of the standard RADIUS attribute. Fields: Type (1 octet), Length (1 octet, 4–255), Extended-Type (1 octet), Value (1+ octets). Attributes with Length 2 or 3 MUST be treated as invalid.'
section: "2.1"
topics:
    - radius
    - security
