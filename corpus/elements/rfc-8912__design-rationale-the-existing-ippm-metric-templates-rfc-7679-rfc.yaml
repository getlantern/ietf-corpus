document: rfc-8912
kind: design-rationale
summary: The existing IPPM metric templates (RFC 7679, RFC 6390, RFC 1242) were not designed to serve as the basis for registry columns; while examining what needs to be registered, it became clear none fully satisfied registry needs. RFC 8911 therefore defines a new registry format specifically optimized for the IANA Performance Metrics Registry.
section: "1"
topics:
