document: rfc-7247
kind: protocol-element
summary: The XMPP-to-SIP address mapping algorithm splits the JID, optionally applies Nodeprep, translates '\26' to '&', '\27' to "'", '\2f' to '/', determines via DNS whether the target supports im/pres or sip/sips URIs, percent-encodes appropriate characters, prepends the chosen scheme, and optionally maps a resourcepart to a 'gr' URI parameter.
section: "6.5"
topics:
