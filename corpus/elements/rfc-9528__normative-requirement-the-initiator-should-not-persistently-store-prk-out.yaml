document: rfc-9528
kind: normative-requirement
summary: The Initiator SHOULD NOT persistently store PRK_out or application keys until it has verified message_4 or a message protected with a derived application key from the Responder. The Initiator SHOULD NOT send protected application data until the application has authenticated the Responder.
section: 5.4.2
rfc2119_level: SHOULD NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
