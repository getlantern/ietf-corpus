document: rfc-4338
kind: design-rationale
summary: RFC 2625 restricted ARP to Nx_Ports with format 0x1 N_Port_Names by reusing the Ethernet ARP format. RFC 4338 defines a Fibre Channel-specific ARP format carrying both N_Port_Name and N_Port_ID as the hardware address, enabling support for all commonly used N_Port_Name formats (0x1, 0x2, 0x5, 0xC–0xF) in widespread use.
section: "7"
