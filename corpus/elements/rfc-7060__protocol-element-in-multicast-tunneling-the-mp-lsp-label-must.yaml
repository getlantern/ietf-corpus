document: rfc-7060
kind: protocol-element
summary: In multicast tunneling, the MP-LSP label must be an upstream-assigned label assigned by U. D1 and D2 send Label Request messages to U (per RFC 6389 Section 4), and U responds with a Label Mapping containing upstream-assigned label L plus an Interface TLV identifying the multicast tunnel.
section: "6"
topics:
