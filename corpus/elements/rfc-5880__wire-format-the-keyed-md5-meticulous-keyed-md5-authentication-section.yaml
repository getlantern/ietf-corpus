document: rfc-5880
kind: wire-format
summary: 'The Keyed MD5 / Meticulous Keyed MD5 Authentication Section is fixed at 24 bytes: Auth Type (2 or 3), Auth Len (24), Auth Key ID, Reserved (zero), 32-bit Sequence Number, and a 16-byte Auth Key/Digest field holding the MD5 digest computed over the entire packet.'
