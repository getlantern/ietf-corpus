document: rfc-2982
kind: normative-requirement
summary: Final error checking for an expression must occur at evaluation time (when expValueTable is read or a delta interval expires). An implementation may not impose any ordering on the creation of expExpressionTable and expObjectTable entries; earlier checking need not be done.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
