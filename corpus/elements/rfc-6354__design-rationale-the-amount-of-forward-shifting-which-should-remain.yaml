document: rfc-6354
kind: design-rationale
summary: The amount of forward-shifting, which should remain constant for the duration of the session, determines the maximum length of shadows that can be completely concealed at the receiver. A shadow longer than the forward-shift amount will exhaust the buffer and cause service interruption.
section: A.1
topics:
    - rtp
    - realtime
