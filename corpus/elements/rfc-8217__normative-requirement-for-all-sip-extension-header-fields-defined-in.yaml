document: rfc-8217
kind: normative-requirement
summary: For all SIP extension header fields defined in RFCs 3325, 3515, 3892, 4508, 5002, 5318, 5360, and 5502 that allow the addr-spec / name-addr choice, the addr-spec form MUST NOT be used if the value would contain a comma, semicolon, or question mark.
