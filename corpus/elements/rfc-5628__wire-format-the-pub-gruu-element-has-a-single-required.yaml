kind: wire-format
summary: The <pub-gruu> element has a single required 'uri' attribute of type xs:anyURI. The <temp-gruu> element extends pubGruu with a required 'first-cseq' attribute of type xs:unsignedLong, holding the CSeq of the REGISTER that created the oldest currently active temporary GRUU.
