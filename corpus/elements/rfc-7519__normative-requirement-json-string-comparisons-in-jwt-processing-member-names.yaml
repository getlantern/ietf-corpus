document: rfc-7519
kind: normative-requirement
summary: JSON string comparisons in JWT processing (member names and values) MUST use the RFC 7159 Section 8.3 rules (Unicode code-point-by-code-point equality), except for "typ" and "cty" member values which use case-insensitive comparison.
section: "7.3"
rfc2119_level: MUST
topics:
    - jose
    - json
