document: rfc-2668
kind: security-consideration
summary: Several objects in this MIB (rpMauStatus, ifMauStatus, ifMauDefaultType, ifMauAutoNegAdminStatus, ifMauAutoNegCapAdvertisedBits, ifMauAutoNegRestart) are read-write and can affect network operation; unauthorized access could disrupt Ethernet links. Implementors should use SNMPv3 with authentication and privacy to protect these objects.
section: "8"
topics:
    - security
    - snmp
