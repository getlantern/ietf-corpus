document: rfc-4836
kind: design-rationale
summary: The broadMauBasicTable for 10BROAD36 broadband MAUs is deprecated in this revision. There have been no reported implementations of this table, and it is unlikely there ever will be; IEEE recommends that broadband MAU types should not be used for new installations.
