document: rfc-7752
kind: protocol-element
summary: 'Node Descriptor Sub-TLVs identify a node uniquely within a BGP-LS domain. Defined sub-TLVs are: Autonomous System (code 512, 4 octets), BGP-LS Identifier (code 513, 4 octets), OSPF Area-ID (code 514, 4 octets), and IGP Router-ID (code 515, variable). IGP Router-ID is mandatory.'
section: 3.2.1.4
topics:
    - bgp
    - routing
