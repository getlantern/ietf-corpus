document: rfc-9665
kind: normative-requirement
summary: 'SRP registrars MUST treat updates for a service type and all its subtypes as atomic: if a subtype appeared in a previous update but is absent from the current update, the registrar MUST remove that subtype. There is no mechanism to delete a single subtype individually.'
section: 3.3.4
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
