document: rfc-4995
kind: wire-format
summary: The Padding octet is encoded as 11100000 (0xE0) and MUST NOT be interpreted as an Add-CID octet for CID 0; zero or more padding octets may precede Feedback or Header in any ROHC packet.
section: 5.2.1.1
