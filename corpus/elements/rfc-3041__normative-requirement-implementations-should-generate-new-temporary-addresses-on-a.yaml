document: rfc-3041
kind: normative-requirement
summary: Implementations should generate new temporary addresses on a periodic basis by generating a new randomized interface identifier at least once every (TEMP_PREFERRED_LIFETIME - REGEN_ADVANCE - DESYNC_FACTOR) time units. Implementations should provide end users with the ability to change this regeneration frequency.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
