document: rfc-6811
kind: design-rationale
summary: Like the DNS, the global RPKI presents only a loosely consistent view depending on timing, updating, and fetching. There is no fix for this; it is the nature of distributed data with distributed caches. Thus, one cache or router may have different validation data about a prefix than another.
section: "1"
