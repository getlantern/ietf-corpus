document: rfc-2206
kind: protocol-element
summary: rsvpNbrTable (rsvpObjects 7) records currently active RSVP neighbors indexed by (ifIndex, rsvpNbrAddress). Each entry carries the neighbor's IP4/IP6 address (4–16 octets), rsvpNbrProtocol (RsvpEncapsulation), and RowStatus. When configured neighbors are present, implementations may (but need not) restrict valid neighbors to those configured.
section: "3.6"
topics:
