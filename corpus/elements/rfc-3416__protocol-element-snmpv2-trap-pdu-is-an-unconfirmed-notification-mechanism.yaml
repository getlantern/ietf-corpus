document: rfc-3416
kind: protocol-element
summary: 'SNMPv2-Trap-PDU is an unconfirmed notification mechanism: there is no Response-PDU generated upon receipt. InformRequest-PDU is a confirmed notification mechanism that requires a Response-PDU reply with the same request-id, error-status noError, and same variable-bindings.'
section: 4.2.6
topics:
    - snmp
