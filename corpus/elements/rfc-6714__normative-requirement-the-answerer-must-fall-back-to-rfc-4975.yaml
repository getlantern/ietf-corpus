document: rfc-6714
kind: normative-requirement
summary: The answerer MUST fall back to RFC 4975 behavior (without inserting 'msrp-cema') when both endpoints use relays, when the offerer uses a relay and will be 'active', or when the answerer uses a relay and cannot become 'passive'.
section: "4.3"
rfc2119_level: MUST
topics:
