document: rfc-9420
kind: security-consideration
summary: KeyPackage reuse allows an adversary to add the same client to multiple groups without that client's knowledge. Each KeyPackage MUST be used only once; implementations should ensure that a KeyPackage is deleted from the distribution point after it has been consumed.
section: "16.8"
topics:
    - security
    - crypto
