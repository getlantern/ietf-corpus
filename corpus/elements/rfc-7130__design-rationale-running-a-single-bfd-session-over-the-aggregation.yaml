document: rfc-7130
kind: design-rationale
summary: Running a single BFD session over the aggregation without internal knowledge of the member links would make it impossible for BFD to guarantee detection of physical member link failures. Per-member-link micro-BFD sessions are required to ensure link continuity verification for every member link.
section: "1"
topics:
    - ip
