document: rfc-5662
kind: protocol-element
summary: The nfsacl41 structure, new to NFSv4.1, pairs an aclflag4 bitmask (na41_flag) with a variable-length array of nfsace4 entries (na41_aces). ACL flags include ACL4_AUTO_INHERIT=0x01, ACL4_PROTECTED=0x02, and ACL4_DEFAULTED=0x04.
