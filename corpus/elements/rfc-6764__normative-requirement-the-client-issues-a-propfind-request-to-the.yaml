document: rfc-6764
kind: normative-requirement
summary: The client issues a PROPFIND request to the initial context path; the request body SHOULD include the DAV:current-user-principal property. If the server returns 404, clients MAY retry on the root URI '/' or prompt the user.
section: "6"
rfc2119_level: SHOULD
topics:
