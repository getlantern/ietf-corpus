document: rfc-5098
kind: protocol-element
summary: 'pktcSigDevCidSigProtocol (PktcSubscriberSideSigProtocol, read-write) configures the subscriber-line protocol for on-hook caller ID: fsk(1) for Frequency Shift Keying or dtmf(2) for Dual-Tone Multi-Frequency. Its value MUST NOT persist across MTA reboots; default is fsk.'
