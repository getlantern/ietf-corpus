document: rfc-9171
kind: wire-format
summary: A CRC SHALL be represented as a CBOR byte string of 2 bytes for CRC-16/X-25 (type 1) or 4 bytes for CRC32C/Castagnoli (type 2), each constituting an unsigned integer in network byte order. The CRC field SHALL be omitted if and only if the CRC type code is zero.
section: 4.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
