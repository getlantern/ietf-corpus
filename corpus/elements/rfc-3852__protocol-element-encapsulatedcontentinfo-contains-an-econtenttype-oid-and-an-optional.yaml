document: rfc-3852
kind: protocol-element
summary: EncapsulatedContentInfo contains an eContentType OID and an optional eContent OCTET STRING. Omitting eContent enables 'external signatures' where the signed content is not transmitted within the SignedData structure; the signatureValue is still calculated as though eContent were present.
section: "5.2"
topics:
    - crypto
    - security
