document: rfc-9690
kind: normative-requirement
summary: A CMS implementation supporting RSA-KEM MUST support KDF3 (ANS X9.44) with SHA-256 as the key derivation function, and MUST support AES-Wrap-128 (RFC 3394) as the key-encryption algorithm. Other KDFs and key-encryption algorithms MAY be supported.
section: "2.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
