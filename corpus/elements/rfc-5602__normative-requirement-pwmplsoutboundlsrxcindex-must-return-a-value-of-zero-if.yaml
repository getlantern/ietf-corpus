summary: pwMplsOutboundLsrXcIndex MUST return a value of zero if pwMplsMplsType mplsNonTe(1) bit is not set. Similarly, pwMplsOutboundTunnelIndex, pwMplsOutboundTunnelInstance, pwMplsOutboundTunnelLclLSR, and pwMplsOutboundTunnelPeerLSR MUST return zero if the mplsTe(0) bit is not set.
