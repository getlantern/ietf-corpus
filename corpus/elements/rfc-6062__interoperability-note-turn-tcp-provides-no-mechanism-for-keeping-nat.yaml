document: rfc-6062
kind: interoperability-note
summary: TURN-TCP provides no mechanism for keeping NAT bindings alive on client or peer data connections. Applications that require this must implement it themselves at a higher layer in the application protocol tunneled inside TURN-TCP. TCP keep-alives MAY be used to keep NAT bindings on the client data connection alive.
section: "4.6"
topics:
    - nat
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
