document: rfc-2594
kind: security-consideration
summary: The document statistics group exposes the names of documents accessed, which constitutes sensitive traffic analysis data. Sites should configure SNMP MIB views so that each user can only access statistics belonging to WWW services they manage.
section: "8"
topics:
    - snmp
    - security
    - privacy
