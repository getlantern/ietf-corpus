document: rfc-8641
kind: wire-format
summary: 'On-change update records are encoded using YANG Patch operations (RFC 8072): ''create'' for new objects, ''delete'' for removed objects, ''replace'' for changed values, ''insert'' for new user-ordered list entries, and ''move'' for reordering. Unlike RFC 8072, a ''create'' on an already-existing node or a ''delete'' of a missing node is valid in YANG-Push to signal churn.'
section: 3.5.2
topics:
    - yang
    - netconf
