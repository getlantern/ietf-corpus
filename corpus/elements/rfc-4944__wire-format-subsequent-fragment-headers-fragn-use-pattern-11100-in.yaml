document: rfc-4944
kind: wire-format
summary: Subsequent fragment headers (FRAGN) use pattern '11100' in bits 0-4, the same 11-bit datagram_size and 16-bit datagram_tag as FRAG1, plus an 8-bit datagram_offset expressing the fragment offset in units of 8 octets from the start of the payload datagram.
