document: rfc-4607
kind: normative-requirement
summary: Routers MUST ignore non-source-specific host reports (e.g., IGMPv1, IGMPv2, or MLDv1) for SSM destination addresses. Failure to do so would violate the SSM service model promised to the sender.
section: "8"
rfc2119_level: MUST
topics:
    - multicast
