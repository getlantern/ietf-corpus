document: rfc-6427
kind: normative-requirement
summary: A node MUST NOT set the L-Flag until the fault has been determined to be a server-failure. A node MUST set the L-Flag if the fault has been determined to be a server-failure. During a server layer protection switching event, the L-Flag MUST NOT be set.
section: 2.1.1
rfc2119_level: MUST
topics:
    - mpls
