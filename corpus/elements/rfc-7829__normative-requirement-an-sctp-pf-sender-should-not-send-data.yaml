document: rfc-7829
kind: normative-requirement
summary: An SCTP-PF sender SHOULD NOT send data to PF-state destinations when active-state alternatives exist. This applies to new transmissions, retransmissions, and user-requested sends to a PF address.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
