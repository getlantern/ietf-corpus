document: rfc-7582
kind: normative-requirement
summary: In the Unpartitioned Method for S-PMSI reception, a PE MUST join the P-tunnel in the matching S-PMSI A-D route and MUST also join all P-tunnels advertised in other installed S-PMSI A-D routes containing the same (C-S,C-G) as the matching route.
section: 3.2.3.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
