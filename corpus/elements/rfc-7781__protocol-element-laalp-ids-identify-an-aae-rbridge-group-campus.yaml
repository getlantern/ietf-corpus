document: rfc-7781
kind: protocol-element
summary: LAALP IDs identify an AAE RBridge group campus-wide and must be unique across the campus. An 8-byte LAALP ID is an MC-LAG or DRNI identifier per IEEE 802.1AX Section 6.3.2. The meaning of LAALP IDs of other lengths is reserved for future documents.
section: "9.4"
