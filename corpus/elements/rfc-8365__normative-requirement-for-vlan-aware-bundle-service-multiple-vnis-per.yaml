document: rfc-8365
kind: normative-requirement
summary: For VLAN-Aware Bundle Service (multiple VNIs per MAC-VRF), the Ethernet Tag field in MAC Advertisement, Ethernet A-D per EVI, and IMET routes MUST identify a bridge table within a MAC-VRF, and the set of Ethernet Tags for that EVI must be configured consistently on all PEs within that EVI.
section: 5.1.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
