document: rfc-6915
kind: design-rationale
summary: The extension is designed to provide a more generally applicable means of identifying a Device based on the parameters of a network flow of which it is an endpoint, rather than being limited to the specific port-only approach of RFC 6155, in order to accommodate a broader range of NAT configurations.
section: "1"
topics:
    - nat
