document: rfc-2511
kind: protocol-element
summary: PKIPublicationInfo carries an action INTEGER (dontPublish=0 or pleasePublish=1) and an optional SEQUENCE of SinglePubInfo entries. Each SinglePubInfo specifies a publication method (dontCare=0, x500=1, web=2, ldap=3) and an optional pubLocation GeneralName.
