document: rfc-5953
kind: protocol-element
summary: tmSecurityName is a per-session cached value derived from the peer's X.509 certificate using the snmpTlstmCertToTSNTable. On the server side it is derived from the client certificate; on the client side it is provided by the security model via tmStateReference.
