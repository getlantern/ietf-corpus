document: rfc-5804
kind: wire-format
summary: Literal strings from client to server use the format `{N+}CRLF` followed by N octets (the '+' indicates non-synchronizing literal). Literals from server to client use `{N}CRLF` followed by N octets (no '+' character). Quoted strings are limited to 1024 octets between the double-quote characters.
