document: rfc-6155
kind: privacy-consideration
summary: When a LIS permits third-party requests, it becomes a Location Server and MUST explicitly authorize each request per policies provided by Rule Makers. The default authorization policy MUST be 'deny all'; no third-party request may be served until an explicit authorization policy has been established by the relevant Rule Maker.
section: "4.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
