document: rfc-5530
kind: interoperability-note
summary: If a server sends OVERQUOTA but does not support the IMAP QUOTA extension defined by RFC 2087, the client knows a quota exists but cannot determine what it is. Implementors should be aware of this informational asymmetry.
section: "3"
