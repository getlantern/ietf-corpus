document: rfc-8489
kind: registry
summary: This document creates the STUN Security Features Registry, a 24-bit field embedded in the long-term credential nonce cookie. Bit 0 (most significant of byte 0) = Password algorithms; Bit 1 = Username anonymity. New features require IETF Review or IESG Approval.
