document: rfc-8489
kind: normative-requirement
summary: The transaction ID MUST be uniformly and cryptographically randomly chosen from the interval 0..2^96-1. The client MUST choose a new transaction ID for each new transaction; resends of the same request reuse the same ID.
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - security
