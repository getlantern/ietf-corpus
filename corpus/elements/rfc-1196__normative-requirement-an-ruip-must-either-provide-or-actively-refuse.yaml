document: rfc-1196
kind: normative-requirement
summary: An RUIP MUST either provide or actively refuse the {Q2} query forwarding service. If it provides this service, it must open a connection to the rightmost host in the chain, forward the remaining query, relay the response back, and close only when the downstream RUIP closes its connection.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
