document: rfc-4582
kind: normative-requirement
summary: A client starting a client-initiated transaction MUST set a non-zero Transaction ID that MUST NOT be reused until a response is received; the server MUST copy the Conference ID, Transaction ID, and User ID from the request into the response.
section: "8.1"
rfc2119_level: MUST
topics:
    - realtime
