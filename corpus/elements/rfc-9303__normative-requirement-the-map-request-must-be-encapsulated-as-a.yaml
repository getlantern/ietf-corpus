document: rfc-9303
kind: normative-requirement
summary: The Map-Request MUST be encapsulated as a LISP ECM with the S-bit set to 1 to indicate the presence of Authentication Data (a 'Protected Map-Request'). The ITR MUST discard any Map-Reply received without the S-bit set in response to a Protected Map-Request.
section: "6.4"
rfc2119_level: MUST
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
