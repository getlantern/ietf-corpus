document: rfc-7072
kind: normative-requirement
summary: If the server includes an HTTP Expires header in its response, that timestamp MUST align with the 'expires' field within the reputon payload. Misalignment can cause a state where the payload has expired but the HTTP reply has not, preventing the client from fetching a fresh answer.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
