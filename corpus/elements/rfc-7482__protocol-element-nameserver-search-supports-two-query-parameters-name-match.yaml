document: rfc-7482
kind: protocol-element
summary: 'Nameserver search supports two query parameters: ''name'' (match by nameserver host name in LDH or U-label format) and ''ip'' (match by IPv4 or IPv6 address). Search syntax follows ''nameservers?name=XXXX'' or ''nameservers?ip=YYYY''.'
