document: rfc-8765
kind: interoperability-note
summary: A client MUST be prepared to receive (and silently ignore) Push Notifications for subscriptions it has previously removed, due to the unavoidable race condition between an in-flight PUSH from the server and an in-flight UNSUBSCRIBE from the client.
section: "6"
