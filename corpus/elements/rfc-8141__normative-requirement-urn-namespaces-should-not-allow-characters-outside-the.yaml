document: rfc-8141
kind: normative-requirement
summary: URN namespaces SHOULD NOT allow characters outside the ASCII range unless the nature of the particular URN namespace makes such characters necessary, in order to keep URNs stable and persistent as protocols evolve.
section: "2.2"
rfc2119_level: SHOULD NOT
