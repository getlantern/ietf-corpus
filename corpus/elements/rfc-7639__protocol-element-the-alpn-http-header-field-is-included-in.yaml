document: rfc-7639
kind: protocol-element
summary: The ALPN HTTP header field is included in an HTTP CONNECT request to indicate the application-layer protocol(s) a client intends to use within the established tunnel. It uses ALPN protocol identifiers as defined in RFC 7301.
