document: rfc-6332
kind: security-consideration
summary: Forged or modified MA reports could cause invalid data to be used in later rapid acquisition attempts—e.g., incorrectly small SFGMP join times could make unicast bursts too short, creating sequence number gaps. The document RECOMMENDS use of SRTCP (RFC 3711) for integrity protection.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - rtp
    - multicast
