document: rfc-2653
kind: security-consideration
summary: 'Index information can be protected at two levels: by securing the MIME objects using MIME Security Multiparts [RFC 1847], and by securing the transport layer (TLS for TCP streams, HTTP Basic/Digest Authentication or SSL/TLS for HTTP, Secure SMTP over TLS for mail).'
