document: rfc-3779
kind: security-consideration
summary: Since X.509 certificates are digitally signed, no additional integrity service is required for these extensions. Certificates need not be kept secret, and unrestricted anonymous access has no security implications. However, the assurance provided depends critically on security factors outside this specification's scope.
