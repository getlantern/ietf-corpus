document: rfc-7455
kind: normative-requirement
summary: Frames with the 'A' flag set that do not contain a CFM Ethertype (0x8902) MUST be silently discarded. OAM-capable RBridges MUST NOT generate OAM frames to an RBridge that is not OAM capable.
section: 3.2.1
rfc2119_level: MUST
