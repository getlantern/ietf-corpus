document: rfc-9582
kind: normative-requirement
summary: When present, the maxLength element MUST be an integer greater than or equal to the accompanying prefix length and less than or equal to the maximum address length for the applicable address family (32 for IPv4, 128 for IPv6).
section: 4.3.2.2
rfc2119_level: MUST
