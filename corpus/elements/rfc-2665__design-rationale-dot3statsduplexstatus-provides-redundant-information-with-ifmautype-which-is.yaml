document: rfc-2665
kind: design-rationale
summary: dot3StatsDuplexStatus provides redundant information with ifMauType, which is normally discouraged. The redundancy was judged worthwhile because it allows a management application to determine duplex status without knowing every possible value of ifMauType.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
