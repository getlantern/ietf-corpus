document: rfc-5626
kind: normative-requirement
summary: The sequence of reg-id values MUST be exactly the same each time the UA instance power cycles or reboots, so that the reg-id values will collide with previously used values, enabling the registrar to replace older registrations.
section: 4.2.1
rfc2119_level: MUST
topics:
    - sip
