document: rfc-3376
kind: wire-format
summary: 'The Version 3 Membership Report (Type=0x22) contains: 8-bit Type, 8-bit Reserved, 16-bit Checksum, 16-bit Reserved, 16-bit Number of Group Records (M), followed by M Group Records. Each Group Record encodes: 8-bit Record Type, 8-bit Aux Data Len (in 32-bit words), 16-bit Number of Sources (N), 32-bit Multicast Address, N×32-bit Source Addresses, and optional Auxiliary Data.'
section: "4.2"
topics:
    - multicast
