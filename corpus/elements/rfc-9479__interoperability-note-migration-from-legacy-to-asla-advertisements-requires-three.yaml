document: rfc-9479
kind: interoperability-note
summary: 'Migration from legacy to ASLA advertisements requires three steps: (1) advertise both ASLA and legacy advertisements simultaneously, (2) enable use of ASLA advertisements on all routers, then (3) remove legacy advertisements. The L-flag provides no value in this migration sequence.'
section: 6.3.3
topics:
    - routing
