document: rfc-7023
kind: protocol-element
summary: 'VCCV BFD CV types determine defect signaling scope: CV types 0x04 or 0x10 indicate BFD for PW fault detection only (other defects via LDP or equivalent); CV types 0x08 or 0x20 indicate BFD for both PW fault detection and AC/PW fault notification, so all defects are signaled via BFD.'
section: "4.3"
topics:
    - mpls
