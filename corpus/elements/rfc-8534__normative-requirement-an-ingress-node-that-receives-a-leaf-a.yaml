document: rfc-8534
kind: normative-requirement
summary: An ingress node that receives a Leaf A-D route with LIR-pF set in response to an S-PMSI A-D route with LIR-pF clear MUST log this by default; implementations SHOULD provide a knob to disable this logging to avoid noise from false positives.
section: "8"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - security
