document: rfc-7015
kind: design-rationale
summary: External interval distribution—configuring Original Exporters to synchronize their Flow intervals with the desired aggregation interval—avoids most IAP interval distribution complexity and allows simpler Start Interval or End Interval accounting, at the cost of reducing the usefulness of Original Flows for non-aggregation purposes.
section: 5.1.3
topics:
