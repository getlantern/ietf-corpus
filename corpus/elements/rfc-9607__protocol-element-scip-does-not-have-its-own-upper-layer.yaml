document: rfc-9607
kind: protocol-element
summary: SCIP does not have its own upper layer syntax (no NAL units). Instead it encrypts the output of the audio and video codecs it uses (e.g., G.729D, H.264) after those have been formatted per their relevant RTP payload specification.
