document: rfc-2181
kind: protocol-element
summary: A Resource Record Set (RRSet) is defined as the group of DNS Resource Records sharing the same label, class, and type but potentially differing in data. Servers should suppress exact duplicates (same label, class, type, and data). An RRSet is the atomic unit for DNS responses.
