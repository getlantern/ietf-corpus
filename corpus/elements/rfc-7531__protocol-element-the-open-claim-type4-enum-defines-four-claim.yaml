document: rfc-7531
kind: protocol-element
summary: 'The open_claim_type4 enum defines four claim types: CLAIM_NULL (0, normal open by name), CLAIM_PREVIOUS (1, reclaim after server reboot by filehandle), CLAIM_DELEGATE_CUR (2, open with current delegation), and CLAIM_DELEGATE_PREV (3, reclaim previous delegation).'
