document: rfc-3327
kind: normative-requirement
summary: If a Path header field exists in a successful REGISTER request, the registrar constructs an ordered path vector from the Path header field values (preserving order), stores it with the contact and address-of-record binding, and copies the Path header field values into the successful 200-class REGISTER response.
section: "5.3"
rfc2119_level: REQUIRED
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
