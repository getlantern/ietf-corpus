document: rfc-1134
kind: design-rationale
summary: The Protocol field encoding rules (odd value, LSB of MSB = 0) are chosen to be consistent with the ISO 3309 extension mechanism for Address fields, allowing the Protocol field to coexist with HDLC framing without ambiguity and enabling transparent multiplexing of multiple network-layer protocols.
