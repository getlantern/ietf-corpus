document: rfc-7826
kind: protocol-element
summary: The Pipelined-Requests header (Section 18.33) allows a client to bind multiple requests together with a client-selected identifier, enabling the server to treat them as if they included the session identifier; this avoids extra round trips during aggregated session establishment.
section: "18.33"
topics:
    - realtime
