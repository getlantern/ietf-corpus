document: rfc-9617
kind: design-rationale
summary: The POT profile intentionally only defines type 0 and requires augmentation for additional POT variants, aligning with RFC 9197 which defines only POT type 0. This avoids specifying configuration for unspecified cryptographic variants and allows extensibility.
