document: rfc-1284
kind: normative-requirement
summary: Implementation of the Ethernet-like Statistics group (dot3StatsTable) is mandatory. Where counters are difficult or impossible to implement due to chipset or driver restrictions, implementors should apply best effort; the value must always equal the number actually detected, which is less than or equal to actual occurrences.
section: "5.2"
rfc2119_level: REQUIRED
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
