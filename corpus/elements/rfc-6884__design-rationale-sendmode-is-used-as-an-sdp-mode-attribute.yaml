document: rfc-6884
kind: design-rationale
summary: '''sendmode'' is used as an SDP mode attribute in EVRC, EVRC-B, and EVRC-WB, but it is deprecated in EVRC-NW. The encoding capability C-bit in the RTP payload header and the ''mode-set-recv'' parameter serve the equivalent dynamic and session-level signaling roles.'
