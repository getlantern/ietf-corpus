document: rfc-2080
kind: normative-requirement
summary: Periodic advertisement and triggered update packets sent to the all-rip-routers multicast group MUST have their IPv6 hop count set to 255, and inbound multicast packets from the RIPng port must be checked to ensure the hop count is 255, guaranteeing the sender is a directly-attached neighbor.
section: 2.4.2
rfc2119_level: MUST
topics:
    - routing
    - security
    - ip
