document: rfc-2848
kind: design-rationale
summary: The SUBSCRIBE/NOTIFY/UNSUBSCRIBE mechanism was added because a PINT client is not necessarily a party to the resulting telephone call and therefore has no out-of-band way to learn whether the service succeeded. The design mirrors INVITE/BYE semantics to keep the model consistent with existing SIP.
section: 3.5.3
topics:
    - realtime
    - sip
