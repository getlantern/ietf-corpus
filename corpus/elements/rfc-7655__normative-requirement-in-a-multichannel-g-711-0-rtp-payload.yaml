document: rfc-7655
kind: normative-requirement
summary: In a multichannel G.711.0 RTP payload, the underlying G.711 data for all channels MUST span the same time interval. If the total decoded G.711 symbols (M) is not an integer multiple of the number of channels (N), the packet SHOULD be discarded.
section: 4.2.4
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
