document: rfc-9003
kind: interoperability-note
summary: If a Shutdown Communication longer than 128 octets is sent to a BGP speaker implementing RFC 8203, that speaker will treat it as an error and log a message. If sent to a speaker implementing neither RFC 8203 nor RFC 9003, it will likewise be treated as an error.
section: "3"
topics:
    - bgp
    - routing
