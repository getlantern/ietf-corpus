document: rfc-9625
kind: normative-requirement
summary: When a received IMET, SMET, S-PMSI, or Leaf route contains conflicting or ambiguous Route Targets (e.g., SBD-RTs from multiple Tenant Domains, or RTs from two different ordinary BDs), the route MUST be treated as malformed and the treat-as-withdraw procedure of RFC 7606 MUST be applied.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
