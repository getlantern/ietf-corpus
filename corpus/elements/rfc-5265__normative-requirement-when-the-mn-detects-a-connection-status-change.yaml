document: rfc-5265
kind: normative-requirement
summary: When the MN detects a connection status change on an interface it MUST immediately stop relaying user data packets, re-detect whether the interface is internal or external, and resume data traffic only after detection and any required registrations/VPN establishment are complete.
section: 3.2.2
rfc2119_level: MUST
topics:
    - mobility
    - security
    - vpn
