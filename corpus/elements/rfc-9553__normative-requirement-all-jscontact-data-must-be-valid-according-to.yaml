document: rfc-9553
kind: normative-requirement
summary: All JSContact data MUST be valid according to the constraints given in I-JSON (RFC 7493), a strict subset of JSON. All member names in JSON objects and all string values are case-sensitive unless explicitly stated otherwise.
section: "1.3"
rfc2119_level: MUST
