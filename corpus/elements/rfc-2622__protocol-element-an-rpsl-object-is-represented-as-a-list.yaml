document: rfc-2622
kind: protocol-element
summary: An RPSL object is represented as a list of attribute-value pairs, one per line, with the attribute name at column 0 followed by ':' and the value. The class-name attribute must appear first, the object ends at a blank line, and continuation lines begin with a space, tab, or '+' character; '+' allows blank lines within a value.
