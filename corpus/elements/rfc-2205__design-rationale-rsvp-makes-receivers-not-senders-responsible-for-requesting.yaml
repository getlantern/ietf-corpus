document: rfc-2205
kind: design-rationale
summary: RSVP makes receivers, not senders, responsible for requesting QoS. This design allows RSVP's reservation overhead to scale logarithmically rather than linearly in the number of receivers and efficiently accommodates heterogeneous receiver requirements in large multicast groups.
section: "1"
topics:
