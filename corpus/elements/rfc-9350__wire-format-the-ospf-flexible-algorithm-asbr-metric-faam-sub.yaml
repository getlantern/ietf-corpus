document: rfc-9350
kind: wire-format
summary: The OSPF Flexible Algorithm ASBR Metric (FAAM) sub-TLV (Type 1 for OSPFv2, 33 for OSPFv3, Length 8) encodes Flex-Algorithm (1 octet), Reserved (3 octets, MUST be zero), and Metric (4 octets). It advertises the Flex-Algorithm-specific metric for ASBR reachability between areas.
section: "10.2"
