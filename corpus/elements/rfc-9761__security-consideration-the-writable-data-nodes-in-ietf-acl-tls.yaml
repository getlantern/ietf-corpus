document: rfc-9761
kind: security-consideration
summary: 'The writable data nodes in ''ietf-acl-tls'' (trust anchors, (D)TLS versions, cipher suites, etc.) are sensitive: unauthorized write or delete operations can dramatically alter the implemented security policy. The NACM extension ''default-deny-write'' is set for all data nodes in this module.'
section: "9.3"
topics:
    - tls
    - security
    - yang
    - netconf
