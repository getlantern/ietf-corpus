document: rfc-7318
kind: interoperability-note
summary: A relying party that performs strict validation based on RFC 6487 without implementing the updates described in RFC 7318 would incorrectly invalidate RPKI objects that include a CPS policy qualifier. Validators must be updated to accept the broadened profile.
section: "3"
topics:
