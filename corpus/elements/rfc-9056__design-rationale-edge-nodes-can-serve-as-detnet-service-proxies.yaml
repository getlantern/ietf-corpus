document: rfc-9056
kind: design-rationale
summary: Edge nodes can serve as DetNet service proxies for non-DetNet-aware end systems by initiating and terminating DetNet service for the application's IP flows. There is essentially no difference in data plane processing between relay nodes and edge nodes, though Controller Plane operation may differ.
