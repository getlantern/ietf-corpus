document: rfc-2646
kind: protocol-element
summary: A 'flowed' line ends in one or more space characters; a 'fixed' line does not. Trailing spaces are part of the line's content, but the CRLF of a soft line break is not. A series of one or more flowed lines followed by one fixed line constitutes a paragraph.
section: "4.2"
topics:
    - email
