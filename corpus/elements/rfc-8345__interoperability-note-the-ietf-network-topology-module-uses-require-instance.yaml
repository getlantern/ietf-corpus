document: rfc-8345
kind: interoperability-note
summary: The `ietf-network-topology` module uses `require-instance false` on all leafrefs within `supporting-link`, `supporting-termination-point`, and related constructs to accommodate the possibility that underlay objects may transiently not exist (network churn), rather than mandating strict referential integrity at the YANG layer.
section: 4.4.3
topics:
    - yang
    - netconf
