document: rfc-8330
kind: protocol-element
summary: The Availability SCSI-TLV is a new type of Generalized Switching Capability-Specific Information TLV that carries <availability, bandwidth> pairs for links with variable discrete bandwidth (e.g., microwave, copper). It is carried in OSPF-TE LSA messages and can appear one or more times per ISCD.
section: "4.1"
topics:
