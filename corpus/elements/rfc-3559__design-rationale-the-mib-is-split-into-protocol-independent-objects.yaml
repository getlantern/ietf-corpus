document: rfc-3559
kind: design-rationale
summary: The MIB is split into protocol-independent objects (applicable to all multicast address allocation servers and clients, including those allocating source-specific multicast addresses) and protocol-specific objects (MADCAP). This separation allows the protocol-independent tables to be reused if additional allocation protocols are defined in the future.
section: "3"
topics:
    - multicast
