document: rfc-4462
kind: wire-format
summary: 'SSH_MSG_KEXGSS_INIT (byte 30) carries: a string output_token from GSS_Init_sec_context() and an mpint e (the client''s DH public value). The client MUST include e with the first message; receiving more than one e or none causes key exchange failure.'
section: "2.1"
topics:
