document: rfc-5874
kind: wire-format
summary: 'The <document> element state table encodes five distinct resource-change semantics via presence/absence of ''previous-etag'', ''new-etag'', and patch children: (a) patch included, (b) patch omitted/external retrieval, (c) ETag-only change via <body-not-changed>, (d) resource created, (e) resource removed (only ''previous-etag'' present).'
