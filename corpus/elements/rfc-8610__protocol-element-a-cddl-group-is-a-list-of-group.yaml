document: rfc-8610
kind: protocol-element
summary: A CDDL _group_ is a list of group entries (name/value pairs or nested group expressions). In an array context only the value is represented; the name is annotation only. In a map context the names become map keys. A map matches a group when all group name/value pairs are present in the map and the map has no extra entries.
section: "2.1"
