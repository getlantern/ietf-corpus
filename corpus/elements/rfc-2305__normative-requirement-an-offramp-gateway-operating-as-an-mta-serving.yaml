document: rfc-2305
kind: normative-requirement
summary: An offramp gateway operating as an MTA serving multiple users SHOULD use SMTP; a gateway operating as a UA serving a single mail recipient MAY use a mailbox access protocol such as POP or IMAP.
section: 2.1.3
rfc2119_level: SHOULD
