document: rfc-3032
kind: normative-requirement
summary: When an IP packet is first labeled, the TTL field of the label stack entry MUST BE set to the value of the IP TTL field (IPv4 TTL or IPv6 Hop Limit). When the last label is popped, the IP TTL field SHOULD BE replaced with the outgoing TTL value.
section: 2.4.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
