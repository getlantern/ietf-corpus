document: rfc-2078
kind: design-rationale
summary: Per-message replay detection and sequencing are selectable by the context initiator via flags (replay_det_req_flag, sequence_req_flag) rather than always enabled, because these features may interfere with certain applications' communications paradigms and are resource-intensive; not all mechanism types support them.
