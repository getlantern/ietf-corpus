document: rfc-7403
kind: design-rationale
summary: B2BUAs in SIP deployments frequently insert themselves into the media plane for transcoding, NAT traversal, SRTP termination, etc., making it difficult to diagnose media failures because no AOR exists to target individual B2BUAs and targeting them directly would not guarantee the same media path as a real call.
section: "1"
topics:
    - sip
    - realtime
