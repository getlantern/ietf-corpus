document: rfc-3530
kind: wire-format
summary: The verifier4 type is a fixed 8-byte opaque value (NFS4_VERIFIER_SIZE = 8), used in COMMIT, CREATE, OPEN, READDIR, SETCLIENTID, SETCLIENTID_CONFIRM, and WRITE. The nfs_client_id4 structure contains a verifier4 plus an opaque id field capped at NFS4_OPAQUE_LIMIT (1024) bytes.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
