document: rfc-7468
kind: interoperability-note
summary: The file extension '.crt' SHOULD be used for the textual encoding of a certificate to promote interoperability and separate DER encodings from textual encodings, but many tools still default to '.cer' for this textual encoding despite the official RFC 2585 registration of '.cer' for DER-format certificates.
section: "5.3"
topics:
    - pkix
    - crypto
