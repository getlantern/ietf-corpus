document: rfc-9562
kind: protocol-element
summary: Name-based UUIDs (UUIDv3/UUIDv5) require that the same name in the same namespace always produces the same UUID, and that different names or different namespaces produce different UUIDs with high probability. Names and namespace IDs must be converted to canonical octet sequences in network byte order before hashing.
section: "6.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
