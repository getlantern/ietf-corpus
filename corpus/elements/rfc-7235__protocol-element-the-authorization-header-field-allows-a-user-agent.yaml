document: rfc-7235
kind: protocol-element
summary: 'The Authorization header field allows a user agent to authenticate itself with an origin server. ABNF: Authorization = credentials. If a request is authenticated and a realm specified, the same credentials are presumed valid for all other requests within that realm.'
section: "4.2"
topics:
