document: rfc-9368
kind: security-consideration
summary: The security of the version negotiation mechanism relies entirely on the authenticity of the Version Information exchanged during the handshake. In QUIC version 1, transport parameters are authenticated, providing this guarantee. Negotiation between compatible versions yields the security of the weakest common version.
section: "9"
topics:
    - quic
    - security
