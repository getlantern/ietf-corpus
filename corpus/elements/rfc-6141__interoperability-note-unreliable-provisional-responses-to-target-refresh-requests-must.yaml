document: rfc-6141
kind: interoperability-note
summary: Unreliable provisional responses to target-refresh requests must not be used to refresh the dialog's remote target. Consequently, a UAC on an established early dialog will not perform a target refresh upon receiving an unreliable provisional response with an updated Contact header.
section: "4.9"
topics:
    - sip
    - realtime
