document: rfc-8987
kind: normative-requirement
summary: To prevent routing loops, the relay SHOULD implement a configurable policy (per-client or per-destination) to drop packets received on a DHCP-PD client-facing interface whose destination address falls within a prefix delegated to a client on that same interface.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
