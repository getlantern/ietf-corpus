document: rfc-959
kind: wire-format
summary: 'Block mode data blocks are preceded by a 3-byte header: the 8 high-order bits are a descriptor byte (bit flags: 128=EOR, 64=EOF, 32=suspected errors, 16=restart marker) and the 16 low-order bits are the byte count of the following data block. Multiple descriptor bits may be set simultaneously.'
section: 3.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
