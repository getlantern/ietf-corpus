document: rfc-6923
kind: wire-format
summary: The MEG_ID is a string of up to 15 characters structured as CC::ICC::UMC (Country Code, ITU Carrier Code, Unique MEG ID Code). It applies uniformly to MPLS-TP Sections, LSPs, and Pseudowires, unlike RFC 6370 which defines separate maintenance identifiers per entity type.
section: "7.1"
topics:
    - mpls
