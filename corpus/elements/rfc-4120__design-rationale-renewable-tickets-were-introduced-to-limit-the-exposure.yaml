document: rfc-4120
kind: design-rationale
summary: Renewable tickets were introduced to limit the exposure window from stolen credentials. Long-lived tickets risk extended theft; requiring frequent password re-entry increases long-term key exposure. Renewable tickets expire frequently but can be re-issued by the KDC, which MAY consult a hot-list to refuse stolen tickets at each renewal.
section: "2.3"
topics:
    - security
    - crypto
