document: rfc-7826
kind: normative-requirement
summary: The RTSP major and minor version numbers MUST be treated as separate integers and each MAY be incremented higher than a single digit. Leading zeros SHALL NOT be sent and MUST be ignored by recipients.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
