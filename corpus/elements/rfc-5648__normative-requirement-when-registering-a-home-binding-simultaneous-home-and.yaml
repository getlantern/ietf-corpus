document: rfc-5648
kind: normative-requirement
summary: When registering a home binding (simultaneous home and foreign link operation), the Binding Update MUST include the Binding Identifier mobility option with the H flag set, the lifetime MUST be non-zero, and the Care-of Address field MUST be set to the home address.
section: 5.6.3
rfc2119_level: MUST
topics:
    - mobility
    - ip
