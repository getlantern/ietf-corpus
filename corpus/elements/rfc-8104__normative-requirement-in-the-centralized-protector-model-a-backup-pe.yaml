document: rfc-8104
kind: normative-requirement
summary: In the centralized protector model, a backup PE MUST advertise a backup PW's label to the protector using a Label Mapping message whose Protection FEC Element MUST be identical to the one advertised by the primary PE. The context identifier MUST NOT be encoded in an Interface_ID TLV in this backup PE message.
section: "6.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
