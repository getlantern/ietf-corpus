document: rfc-5730
kind: normative-requirement
summary: The <logout> command MUST be rejected if it has not been preceded by a successful <login>. After successful logout, the server MUST end the current session. The <logout> element MUST be an empty element with no child elements.
section: 2.9.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
