document: rfc-9039
kind: security-consideration
summary: DEV URNs represent long-term stable unique identifiers that may enable correlation of device information over time, location tracking, and device-specific vulnerability exploitation. Special care should be taken to avoid leaking identifiers outside of the system intended to use them.
section: "6.1"
topics:
    - security
    - privacy
