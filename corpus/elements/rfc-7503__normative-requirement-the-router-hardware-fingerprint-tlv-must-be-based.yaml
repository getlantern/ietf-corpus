document: rfc-7503
kind: normative-requirement
summary: The Router-Hardware-Fingerprint TLV MUST be based on hardware attributes that will not change across hard and soft restarts. It is RECOMMENDED that one or more universal tokens (e.g., IEEE 802 48-bit MAC addresses or IEEE EUI-64 Identifiers) be included.
section: 7.2.2
rfc2119_level: MUST
topics:
    - routing
