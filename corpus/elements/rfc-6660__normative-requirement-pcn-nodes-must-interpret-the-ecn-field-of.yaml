document: rfc-6660
kind: normative-requirement
summary: PCN-nodes MUST interpret the ECN field of a PCN-packet using the 3-in-1 PCN encoding rather than RFC 3168. Nodes outside a PCN-domain and packets with non-PCN-compatible DSCPs continue to use RFC 3168 semantics.
section: "3"
rfc2119_level: MUST
topics:
    - ecn
    - diffserv
    - qos
