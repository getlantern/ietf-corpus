document: rfc-5845
kind: interoperability-note
summary: Any Proxy Binding Update triggered by a handoff may renegotiate the tunneling format; the TLV-header UDP tunneling format SHOULD NOT change during a Binding Lifetime Extension PBU from the same MAG, but is open for renegotiation at handoff.
