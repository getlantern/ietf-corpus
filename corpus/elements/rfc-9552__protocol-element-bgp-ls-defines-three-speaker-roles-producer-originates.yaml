summary: 'BGP-LS defines three speaker roles: Producer (originates link-state into BGP), Consumer (application that receives topology data; never sends back), and Propagator (performs BGP Decision Process and forwards BGP-LS UPDATE messages). Roles are not mutually exclusive.'
