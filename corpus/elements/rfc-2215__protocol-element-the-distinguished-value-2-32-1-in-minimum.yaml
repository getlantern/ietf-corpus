document: rfc-2215
kind: protocol-element
summary: The distinguished value (2^32)-1 in MINIMUM_PATH_LATENCY means 'indeterminate latency'. A network element unable to accurately predict its packet latency sets its local parameter to this value; the summation clamp propagates this indeterminate indication end-to-end.
section: "3.4"
topics:
    - qos
