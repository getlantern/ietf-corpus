summary: Substring matching rules in section 8.3 include caseIgnoreSubstringsMatch (2.5.13.4), telephoneNumberSubstringsMatch (2.5.13.21), and numericStringSubstringsMatch (2.5.13.10), all using the Substring Assertion syntax (OID .58). The Substring Assertion syntax is used only as an assertion value syntax in extensible match, not as an attribute value syntax.
