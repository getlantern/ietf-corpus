document: rfc-1995
kind: design-rationale
summary: A server may optionally condense multiple difference sequences into one, dropping intermediate version history. This is useful when many transient updates (e.g., round-robin IP cycling) would otherwise inflate stored history without value.
section: "6"
topics:
