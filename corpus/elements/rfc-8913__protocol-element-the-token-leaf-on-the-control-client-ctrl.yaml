document: rfc-8913
kind: protocol-element
summary: 'The token leaf on the Control-Client ctrl-connection holds 64 octets: a 16-octet Challenge concatenated with a 16-octet AES Session-key (encryption) and a 32-octet HMAC-SHA1 Session-key (authentication). When IKEv2-derived mode is selected, token is limited to 16 octets.'
section: "5.2"
topics:
