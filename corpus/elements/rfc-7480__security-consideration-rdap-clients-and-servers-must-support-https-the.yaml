document: rfc-7480
kind: security-consideration
summary: RDAP clients and servers MUST support HTTPS. The 429 rate-limiting response is not a defense against DoS attacks since a malicious client can ignore it. Additional security considerations are covered in RFC 7481.
section: "7"
topics:
