document: rfc-8210
kind: normative-requirement
summary: When holding data from multiple caches, implementations MUST NOT distinguish between data sources when performing BGP announcement validation. Data MUST be kept marked by source so that later updates affect the correct cache's data set.
section: "10"
rfc2119_level: MUST
topics:
    - routing
    - bgp
