summary: The inter-FE LFB is implemented as a standard LFB class definition rather than modifying the core ForCES architecture (FE Object capabilities such as SupportedLFBs or LFBTopology). This avoids any changes to the ForCES specification while enabling cross-FE LFB topology extension.
