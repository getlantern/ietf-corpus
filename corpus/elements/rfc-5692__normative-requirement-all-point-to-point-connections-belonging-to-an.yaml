document: rfc-5692
kind: normative-requirement
summary: All point-to-point connections belonging to an SS MUST be connected to a network-side bridging function. The BS MUST forward all service flows belonging to one SS to one port of the network-side bridging function, and no more than one SS MUST be connected to one port.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
