document: rfc-6970
kind: normative-requirement
summary: When the IGD-PCP IWF is co-located with the DHCP server, the IWF state MUST be updated using DHCP server state; if an IP address expires or is released, the IGD-PCP IWF MUST delete all mappings bound to that internal IP address.
section: "5.10"
rfc2119_level: MUST
topics:
    - nat
