summary: 'The Downstream Neighbor Address TLV mirrors the Upstream structure: Dnst Addr Type (1 octet), Local Addr Type (1 octet), MBZ (2 octets), Downstream Address (0/4/16 octets), Local Address (0/4/16 octets). Multiple instances may appear in a Proxy Ping Reply, one per downstream neighbor.'
