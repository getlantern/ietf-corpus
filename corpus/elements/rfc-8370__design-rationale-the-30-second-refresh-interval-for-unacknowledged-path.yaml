document: rfc-8370
kind: design-rationale
summary: The 30-second refresh interval for unacknowledged Path/Resv messages (uR) deliberately reuses the traditional RFC 2205 default refresh interval, because the large 20-minute RI-RSVP refresh interval is unsuitable for timely recovery of unacknowledged state.
section: A
topics:
