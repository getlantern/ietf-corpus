document: rfc-6513
kind: normative-requirement
summary: For a given MVPN, a PE MUST use a single consistent IP address as the source address in all BSR packets it transmits to other PEs, and this same address MUST be used as the Global Administrator field of the VRF Route Import Extended Community in its distributed VPN-IP routes.
section: 5.3.4
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
