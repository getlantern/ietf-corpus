document: rfc-3986
kind: normative-requirement
summary: 'Syntax-based normalization requires: percent-encoded unreserved characters should be decoded; percent-encoding should use uppercase hex digits; empty port and default port should be omitted; scheme and host should be lowercased. These normalizations preserve URI equivalence.'
section: 6.2.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
