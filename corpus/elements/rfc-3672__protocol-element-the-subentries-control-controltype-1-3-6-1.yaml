document: rfc-3672
kind: protocol-element
summary: The subentries control (controlType 1.3.6.1.4.1.4203.1.10.1) MAY be included in a SearchRequest to toggle visibility between subentries and normal entries. A TRUE controlValue makes only subentries visible; FALSE makes only normal entries visible. The control has no corresponding response control and is not appropriate for non-Search operations.
section: "3"
topics:
