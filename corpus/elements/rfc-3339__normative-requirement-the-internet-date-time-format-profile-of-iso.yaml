document: rfc-3339
kind: normative-requirement
summary: The Internet Date/Time Format profile of ISO 8601 SHOULD be used in new protocols on the Internet. Applications that generate this format SHOULD use upper case letters for 'T' and 'Z'.
section: "5.6"
rfc2119_level: SHOULD
