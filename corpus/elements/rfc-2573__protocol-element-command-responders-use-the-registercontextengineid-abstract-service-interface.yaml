document: rfc-2573
kind: protocol-element
summary: Command responders use the registerContextEngineID abstract service interface to associate with an SNMP engine before processing messages; the contextEngineID must equal the local snmpEngineID. Only one command responder may be registered per contextEngineID/pduType pair — further registration attempts are denied.
section: "3.2"
topics:
    - snmp
