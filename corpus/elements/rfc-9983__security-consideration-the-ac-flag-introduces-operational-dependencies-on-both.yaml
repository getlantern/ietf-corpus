document: rfc-9983
kind: security-consideration
summary: The AC-Flag introduces operational dependencies on both router implementation support and accurate operator configuration. Receivers MUST consider the possibility of misconfiguration or inconsistent implementation when relying on the AC-Flag for forwarding or security decisions.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - routing
