document: rfc-2305
kind: normative-requirement
summary: In the event of relay failure, the sending relay MUST generate a failure message, which SHOULD be in the format of a Delivery Status Notification (DSN) per RFC 1894/1891. Internet mail transported via SMTP MUST contain a MAIL FROM address appropriate for delivery of return notices.
section: 2.3.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
