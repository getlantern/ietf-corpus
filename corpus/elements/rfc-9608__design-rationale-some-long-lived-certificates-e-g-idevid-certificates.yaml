document: rfc-9608
kind: design-rationale
summary: Some long-lived certificates (e.g., IDevID certificates binding factory-assigned device identity) never expire and are never revoked because the bound information (manufacturer, model, serial number) never changes; noRevAvail allows CAs to signal this explicitly.
