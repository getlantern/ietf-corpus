document: rfc-5668
kind: protocol-element
summary: The 4-octet AS specific extended community is an extended type with a 2-octet Type field and a 6-octet Value field. The high-order octet of the Type is 0x02 for transitive communities or 0x42 for non-transitive; the low-order octet indicates the sub-type.
