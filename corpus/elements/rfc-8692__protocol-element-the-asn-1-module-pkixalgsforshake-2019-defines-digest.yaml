summary: The ASN.1 module PKIXAlgsForSHAKE-2019 defines digest algorithms (mda-shake128 with id-shake128 OID 2.16.840.1.101.3.4.2.11, and mda-shake256 with id-shake256 OID 2.16.840.1.101.3.4.2.12), public key types (pk-rsaSSA-PSS-SHAKE128 and pk-rsaSSA-PSS-SHAKE256), and four signature algorithm objects expanding the RFC 5912 framework.
