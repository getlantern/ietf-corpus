document: rfc-9270
kind: normative-requirement
summary: When shared resources become available, a Notify message with error code 25 and error sub-code 18 ('Shared resources available') MUST be generated by the intermediate node and sent to the end nodes of lower-priority preempted protecting LSPs.
section: "5.5"
rfc2119_level: MUST
topics:
