document: rfc-3945
kind: design-rationale
summary: GMPLS does not define a separate UNI protocol distinct from the NNI. Instead, it built a single consistent model covering both interfaces from the outset, treating the UNI as a subset of the general GMPLS interface with a few additional particularities handled by extension.
