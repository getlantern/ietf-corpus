document: rfc-9790
kind: registry
summary: IANA has created a 'Post-Stack First Nibble' registry group containing a single registry covering all 16 possible 4-bit PFN values (0x0–0xF) immediately following an MPLS label stack. The assignment policy is Standards Action. Initial entries include 0x0 (PW/DetNet/NSH control words), 0x1 (associated channel headers), 0x2 (NSH OAM header), 0x4 and 0x6 (reserved for IPv4/IPv6 backward compatibility), and 0x5 (BIER header); 0x3 and 0x7–0xF are unassigned.
section: "3"
topics:
