document: rfc-5891
kind: normative-requirement
summary: If an A-label is converted to U-label form during lookup using the Punycode decoding algorithm, the processing in Sections 5.4 and 5.5 MUST be performed, and the label MUST be rejected if the re-encoded result is not identical to the original A-label.
section: "5.3"
rfc2119_level: MUST
