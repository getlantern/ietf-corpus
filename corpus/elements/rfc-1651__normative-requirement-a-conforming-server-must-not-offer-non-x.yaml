document: rfc-1651
kind: normative-requirement
summary: A conforming server MUST NOT offer non-"X"-prefixed EHLO keyword values that are not described in a registered and standardized SMTP service extension. Keywords beginning with "X" are reserved for local, bilateral extensions.
section: "4.3"
rfc2119_level: MUST NOT
