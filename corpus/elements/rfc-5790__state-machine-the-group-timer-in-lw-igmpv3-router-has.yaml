document: rfc-5790
kind: state-machine
summary: 'The group timer in LW-IGMPv3 router has two states: G_Timer > 0 means all sources for the group are forwarded (non-source-specific reception); G_Timer == 0 means only sources with running source timers (S_Timer > 0) are forwarded, and the group record is deleted when all source timers also expire.'
section: "5.1"
topics:
    - multicast
    - routing
