document: rfc-5092
kind: wire-format
summary: The URLAUTH wire component has the form ';URLAUTH=<access>:<mech>:<token>' where enc-urlauth is encoded as 32*HEXDIG (minimum 128 bits). The iurlauth-rump consists of an optional ';EXPIRE=<date-time>' followed by ';URLAUTH=<access>'.
