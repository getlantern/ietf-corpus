document: rfc-7265
kind: security-consideration
summary: Using JavaScript's eval() to process jCal JSON data is an unacceptable security risk as noted in RFC 7159 Section 12. A native JSON parser with full awareness of the JSON format should be preferred. JSON parsing flaws can introduce threats not present with conventional iCalendar data.
section: "6"
topics:
    - json
    - security
