document: rfc-7622
kind: security-consideration
summary: Address forging occurs when an entity generates an XML stanza whose 'from' address does not correspond to its authenticated account credentials. While XMPP's server-stamping and server-to-server authentication requirements make this difficult, a poorly implemented or malicious server can still forge addresses, and entities outside that server's security perimeter can only authenticate the domainpart with assurance.
section: 7.3.1
topics:
    - security
    - realtime
