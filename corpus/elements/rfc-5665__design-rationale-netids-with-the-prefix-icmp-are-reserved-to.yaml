document: rfc-5665
kind: design-rationale
summary: Netids with the prefix 'ICMP' are Reserved to prevent confusion with the ICMP control protocol (RFC 792). The netids 'icmp' and 'icmp6' are listed in the registry solely to block their allocation for unrelated purposes, since ICMP is not a true transport and has no valid uaddr format.
section: 5.2.3.5
topics:
    - ip
    - registry
