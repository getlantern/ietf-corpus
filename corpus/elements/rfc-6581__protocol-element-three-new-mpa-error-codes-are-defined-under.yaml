summary: 'Three new MPA error codes are defined under Layer 0x2, Error Type 0x0: Error Code 0x05 (local catastrophic), Error Code 0x06 (insufficient IRD resources), and Error Code 0x07 (no matching RTR option). These extend the four codes already defined by RFC 5044.'
