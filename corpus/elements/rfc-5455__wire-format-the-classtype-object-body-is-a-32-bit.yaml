document: rfc-5455
kind: wire-format
summary: The CLASSTYPE object body is a 32-bit word following the PCEP common object header. It contains a 3-bit CT field (Class-Type, values 1–7) in the least-significant bits and a 29-bit Reserved field that MUST be set to zero on transmission and MUST be ignored on receipt.
