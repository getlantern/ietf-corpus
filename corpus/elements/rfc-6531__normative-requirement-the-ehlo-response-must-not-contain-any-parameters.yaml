document: rfc-6531
kind: normative-requirement
summary: The EHLO response MUST NOT contain any parameters for the SMTPUTF8 keyword. An SMTPUTF8-aware SMTP client MUST ignore any parameters that appear for this keyword and MUST behave as if they do not appear.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
