document: rfc-1191
kind: interoperability-note
summary: NFS over UDP frequently sends datagrams requiring fragmentation even on the first hop. NFS implementations should use PMTU Discovery but must not reduce datagram size below the minimum needed for a single RPC operation; in that case DF must not be set, allowing fragmentation.
section: "6.5"
topics:
    - ip
    - udp
