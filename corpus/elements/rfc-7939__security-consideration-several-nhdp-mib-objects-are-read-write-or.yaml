document: rfc-7939
kind: security-consideration
summary: Several NHDP-MIB objects are read-write or read-create (e.g., nhdpHelloInterval, nhdpHHoldTime, nhdpIfStatus, nhdpIfRowStatus). Unauthorized modification of these objects could disrupt NHDP neighbor discovery, destabilize MANET routing, or cause denial of service by altering timing parameters or disabling interfaces.
section: "8"
topics:
    - security
    - routing
