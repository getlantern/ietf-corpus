document: rfc-9605
kind: normative-requirement
summary: Applications MUST ensure that each (KID, CTR) combination is used for exactly one SFrame encryption operation. This prevents nonce reuse, which would harm the security properties of many AEAD algorithms.
section: "4.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - realtime
