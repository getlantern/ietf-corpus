document: rfc-3788
kind: normative-requirement
summary: All SIGTRAN nodes MUST support IKE for peer authentication, negotiation of security associations, and key management using the IPsec DOI. Implementations MUST support pre-shared key peer authentication, and MAY support certificate-based authentication using digital signatures. Peer authentication using IKE public key encryption methods (sections 5.2 and 5.3 of RFC 2409) SHOULD NOT be used.
section: "5"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
