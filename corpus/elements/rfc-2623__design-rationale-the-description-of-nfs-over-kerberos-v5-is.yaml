document: rfc-2623
kind: design-rationale
summary: The description of NFS over Kerberos V5 is limited to the DES MAC MD5 integrity algorithm because MD2.5 is significantly weaker and DES-MAC may not be present in all implementations, as stated in RFC 1964. This simplification ensures interoperability across all compliant implementations.
section: "4.1"
topics:
    - security
    - crypto
