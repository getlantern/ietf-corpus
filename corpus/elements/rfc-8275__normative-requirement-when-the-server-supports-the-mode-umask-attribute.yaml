document: rfc-8275
kind: normative-requirement
summary: When the server supports the mode_umask attribute, a client creating a file should use mode_umask in place of mode, setting mu_mode to the unmodified user-provided mode and mu_umask to the umask of the requesting process.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
