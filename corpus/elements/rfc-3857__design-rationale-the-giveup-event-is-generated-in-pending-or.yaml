document: rfc-3857
kind: design-rationale
summary: The giveup event is generated in pending or waiting states to reclaim server resources held for unauthorized subscriptions. The giveup timer value must balance user experience (long enough for a user to log in days later) against DoS risk from resource exhaustion by attackers creating many pending subscriptions.
section: 4.7.1
topics:
    - sip
    - realtime
    - security
