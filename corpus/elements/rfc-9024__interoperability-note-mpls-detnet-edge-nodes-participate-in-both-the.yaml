document: rfc-9024
kind: interoperability-note
summary: MPLS DetNet edge nodes participate in both the DetNet domain and the connected TSN network. Management plane techniques share similarities, but control plane protocols differ substantially — for example, RSVP-TE (DetNet) and MSRP (TSN) behave differently, making control plane design a critical aspect of TSN-DetNet interworking.
