document: rfc-4535
kind: security-consideration
summary: GSAKMP security is critically dependent on the unpredictability of nonce values (per RFC 4086) and the accuracy of the system clock. The maximum allowable clock skew across group membership is policy-configurable with a default of 5 minutes; if a network time service is used it MUST be secured against attackers.
section: "3.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
