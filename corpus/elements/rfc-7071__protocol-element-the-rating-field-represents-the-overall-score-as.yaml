document: rfc-7071
kind: protocol-element
summary: The "rating" field represents the overall score as a floating-point number between 0.0 and 1.0. By convention, 1.0 implies full agreement with the assertion while 0.0 indicates no support. Each registered application must define what the anchor values mean and specify the scale type to which all providers for that application must adhere.
