document: rfc-8232
kind: design-rationale
summary: Incremental (delta) LSP-DB State Synchronization is introduced to reduce overhead when only a small number of LSPs changed during a PCEP session outage. Full synchronization wastes bandwidth and time when the majority of LSPs are unchanged, particularly over low-bandwidth in-band control channels.
section: "4.1"
topics:
    - routing
    - mpls
