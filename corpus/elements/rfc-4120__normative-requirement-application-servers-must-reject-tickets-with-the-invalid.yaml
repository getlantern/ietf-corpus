document: rfc-4120
kind: normative-requirement
summary: Application servers MUST reject tickets with the INVALID flag set. Invalid (postdated) tickets MUST be validated by the KDC via a TGS request with VALIDATE option after the ticket's starttime has passed.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
