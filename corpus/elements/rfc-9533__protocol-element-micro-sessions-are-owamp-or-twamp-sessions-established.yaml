document: rfc-9533
kind: protocol-element
summary: Micro sessions are OWAMP or TWAMP sessions established one per member link of a LAG, allowing measurement of performance metrics on every physical member link. All micro sessions of a LAG share the same Sender IP Address and Receiver IP Address.
section: "2"
topics:
    - measurement
