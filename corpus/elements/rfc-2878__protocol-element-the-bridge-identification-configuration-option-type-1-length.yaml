document: rfc-2878
kind: protocol-element
summary: The Bridge-Identification Configuration Option (Type 1, Length 4) carries a 12-bit LAN Segment Number and 4-bit Bridge Number for split-bridge (half-bridge) source routing models. Both peers MUST agree on the bridge number; if not agreed upon, BCP MUST NOT enter the Opened state. This option MUST NOT appear in the same Configure-Request as Line-Identification.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
