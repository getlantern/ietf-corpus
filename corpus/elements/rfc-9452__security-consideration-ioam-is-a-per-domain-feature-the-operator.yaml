document: rfc-9452
kind: security-consideration
summary: IOAM is a per-domain feature; the operator must properly secure the IOAM domain to avoid malicious configuration and use, including injection of malicious IOAM packets. Additional IOAM security considerations are in RFC 9197 Section 9; additional OAM- and NSH-related security considerations are in RFC 9451 Section 5.
section: "5"
topics:
