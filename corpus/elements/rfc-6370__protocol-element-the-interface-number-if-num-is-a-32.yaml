document: rfc-6370
kind: protocol-element
summary: The Interface Number (IF_Num) is a 32-bit unsigned integer assigned by the operator, unique within the scope of a Node_ID. IF_Num value 0 is reserved for MIP identification and MUST NOT be used to identify an MPLS-TP interface.
