document: rfc-7919
kind: protocol-element
summary: 'Five named finite field Diffie-Hellman groups are defined using codepoints 256–260 in the Supported Groups Registry: ffdhe2048 (256), ffdhe3072 (257), ffdhe4096 (258), ffdhe6144 (259), and ffdhe8192 (260). All codepoints in the range 256–511 (high byte 0x01) are reserved for FFDHE groups; no FFDHE group will receive a codepoint outside this range.'
