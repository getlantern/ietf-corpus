document: rfc-7263
kind: security-consideration
summary: The normative security requirements of RFC 6940 Section 13 apply in full. DRR routing options carry information about the route back to the source, so the entire DRR routing message must be digitally signed and transmitted over a protected channel to prevent tampering with routing information.
section: "7"
topics:
    - security
    - routing
