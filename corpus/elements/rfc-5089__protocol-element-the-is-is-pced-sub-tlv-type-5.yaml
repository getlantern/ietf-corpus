document: rfc-5089
kind: protocol-element
summary: 'The IS-IS PCED sub-TLV (Type 5, variable length) is the top-level container for PCE discovery information, carried within the IS-IS Router Capability TLV defined in RFC 4971. It contains a non-ordered set of five defined sub-TLVs: PCE-ADDRESS (1), PATH-SCOPE (2), PCE-DOMAIN (3), NEIG-PCE-DOMAIN (4), and PCE-CAP-FLAGS (5).'
section: "4"
