kind: state-machine
summary: 'Failure detection: a PMIPv6 node sends Heartbeat Requests every HEARTBEAT_INTERVAL seconds, increments MISSING_HEARTBEAT on each unanswered request, resets it on a valid response, and transitions to ''peer unreachable'' state when MISSING_HEARTBEAT exceeds MISSING_HEARTBEATS_ALLOWED.'
