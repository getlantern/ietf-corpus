document: rfc-6284
kind: protocol-element
summary: The 'portmapping-req' SDP media-level attribute declares the port (and optionally address) from which a client must request a Token before establishing the unicast session. Its presence requires Token authentication for RTCP messages triggering or controlling the unicast session and mandates that unicast RTP/RTCP be received on the port from which the triggering RTCP was sent.
section: "7.1"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
