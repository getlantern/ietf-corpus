document: rfc-6765
kind: interoperability-note
summary: 'The GBOND-MIB module must always be combined with technology-specific MIBs at two levels: a scheme-specific MIB (G9981/G9982/G9983-MIB) for GBS-level bonding attributes, and an xDSL line MIB (e.g., HDSL2-SHDSL-LINE-MIB, VDSL2-LINE-MIB) for individual BCE configuration, status, and notifications.'
section: "4.2"
topics:
