document: rfc-4490
kind: security-consideration
summary: Use of the same key for both signature and key derivation is NOT RECOMMENDED. Under Russian Federal Electronic Digital Signature Law, signer certificates MUST contain a critical keyUsage extension, and keyUsage MUST NOT include keyEncipherment or keyAgreement.
