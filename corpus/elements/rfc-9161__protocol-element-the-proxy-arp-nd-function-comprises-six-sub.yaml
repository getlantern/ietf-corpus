document: rfc-9161
kind: protocol-element
summary: 'The Proxy ARP/ND function comprises six sub-functions: Learning, Reply, Unicast-Forward, Maintenance, Flood handling, and Duplicate IP detection. Implementations must support at minimum the Learning, Reply, Maintenance, and duplicate IP detection sub-functions.'
