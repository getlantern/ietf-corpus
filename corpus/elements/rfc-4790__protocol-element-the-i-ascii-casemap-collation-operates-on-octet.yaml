document: rfc-4790
kind: protocol-element
summary: The i;ascii-casemap collation operates on octet strings and treats US-ASCII letters (octets 97-122 mapped to 65-90) case-insensitively. It provides equality, substring, and ordering. All input is valid; letters outside ASCII are not treated case-insensitively.
section: "9.2"
topics:
