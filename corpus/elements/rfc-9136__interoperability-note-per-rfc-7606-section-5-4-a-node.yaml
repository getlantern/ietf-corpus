document: rfc-9136
kind: interoperability-note
summary: Per RFC 7606 Section 5.4, a node that does not recognize RT-5 will ignore it. An NVE following RFC 9136 can therefore coexist in a BD with an RT-5-unaware NVE; regular RFC 7432 procedures apply between those NVEs.
section: "3"
