document: rfc-5348
kind: normative-requirement
summary: 'The throughput equation from Reno TCP (simplified with t_RTO=4*R and b=1) is REQUIRED for TFRC: X_Bps = s / (R * (sqrt(2*p/3) + 12*sqrt(3*p/8)*p*(1+32*p^2))). This equation must reflect TCP''s retransmit timeout behavior.'
section: "3.1"
rfc2119_level: REQUIRED
topics:
    - congestion
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
