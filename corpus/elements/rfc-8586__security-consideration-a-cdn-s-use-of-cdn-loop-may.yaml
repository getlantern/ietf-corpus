document: rfc-8586
kind: security-consideration
summary: A CDN's use of CDN-Loop may reveal the presence of that CDN or details about CDN chaining arrangements. For example, if CDN A forwards to CDN B, CDN B's presence can be inferred by observers who see CDN B react differently based on the CDN-Loop header.
section: "3"
topics:
