document: rfc-4815
kind: normative-requirement
summary: All feedback sent by the decompressor during a mode transition MUST be protected by the CRC option. The compressor MUST ignore feedback related to mode transitions if the feedback is not CRC-protected.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - ip
