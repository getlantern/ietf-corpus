document: rfc-2203
kind: wire-format
summary: Privacy-protected request data is `struct rpc_gss_priv_data { opaque databody_priv<>; }`. The databody_priv field is the output of GSS_Wrap() on the XDR-encoded rpc_gss_data_t structure with conf_req_flag=TRUE and the same QOP as the header checksum.
section: 5.3.2.3
topics:
    - security
