summary: 'The ''cc'' header (namespace: urn:ietf:params:cpim-headers:) specifies a non-primary courtesy-copy recipient. Multiple ''cc'' headers indicate multiple courtesy-copy recipients. The header name ''cc'' is case-sensitive.'
