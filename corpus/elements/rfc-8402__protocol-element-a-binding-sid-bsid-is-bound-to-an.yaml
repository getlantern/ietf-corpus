document: rfc-8402
kind: protocol-element
summary: A Binding SID (BSID) is bound to an SR Policy; packets arriving with an active segment equal to the BSID are steered onto the bound SR Policy. A local BSID SHOULD be allocated from the SRLB; a global BSID MUST be allocated from the SRGB.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
