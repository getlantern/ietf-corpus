document: rfc-5837
kind: interoperability-note
summary: This extension uses the RFC 4884 multi-part ICMP message framework; the same backward compatibility constraints apply. The extension cannot be appended to ICMP message types other than Time Exceeded, Destination Unreachable, and (for ICMPv4) Parameter Problem.
