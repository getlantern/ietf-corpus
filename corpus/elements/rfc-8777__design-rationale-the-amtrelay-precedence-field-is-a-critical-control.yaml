document: rfc-8777
kind: design-rationale
summary: The AMTRELAY precedence field is a critical control mechanism for senders to guide load and failover across relays in sender-controlled vs. provider-controlled networks. It is intentionally prioritized over RFC 6724 address selection to preserve multicast topology efficiency over address family preferences.
section: 3.1.2
topics:
    - multicast
