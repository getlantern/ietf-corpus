document: rfc-9741
kind: protocol-element
summary: 'Ten control operators for byte-string-to-text conversion are defined: .b64u (Base64url, no padding), .b64u-sloppy, .b64c (Base64 classic, padding), .b64c-sloppy, .b32 (Base32, no padding), .h32 (Base32 Extended Hex, no padding), .hex (Base16, either case), .hexlc (lower case), .hexuc (upper case), and .b45 (Base45). Each takes a text target and a bytes controller.'
section: "2.1"
