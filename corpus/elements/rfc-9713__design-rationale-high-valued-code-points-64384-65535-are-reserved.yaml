document: rfc-9713
kind: design-rationale
summary: High-valued code points (64384-65535) are reserved for Private and Experimental Use in accordance with RFC 8126 to avoid collisions with assigned code points. This prevents implementations using private or experimental record types from inadvertently conflicting with future IANA-assigned types.
section: "1"
topics:
