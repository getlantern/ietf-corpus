document: rfc-2743
kind: normative-requirement
summary: 'Support for the default credential resolution algorithm for initiator credentials (GSS_Init_sec_context with GSS_C_NO_CREDENTIAL) is mandated. The algorithm proceeds through four ordered steps: (i) single authorized principal, (ii) platform default network identity, (iii) mapped local identity, (iv) user-configurable default. Failure returns GSS_S_NO_CRED.'
section: 1.1.1.3
rfc2119_level: REQUIRED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
