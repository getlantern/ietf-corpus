document: rfc-4448
kind: protocol-element
summary: The PWE3 Ethernet PDU consists of the Destination Address, Source Address, Length/Type, MAC Client Data, and padding extracted from a MAC frame as a concatenated octet sequence in their original order. The preamble and FCS are stripped at ingress and regenerated at egress.
