document: rfc-5761
kind: design-rationale
summary: With increased NAT deployment, the original two-port design became a liability requiring complex signalling to open multiple NAT pinholes. RTP/RTCP multiplexing onto a single UDP port trades some implementation simplicity for easier NAT traversal.
