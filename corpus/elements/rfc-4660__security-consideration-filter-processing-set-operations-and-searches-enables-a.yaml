document: rfc-4660
kind: security-consideration
summary: Filter processing (set operations and searches) enables a DoS attack via large numbers of messages with substantial filter content. Servers SHOULD limit the number of <what>, <changed>, <added>, and <removed> elements; a default limit of 40 is RECOMMENDED.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - security
    - realtime
