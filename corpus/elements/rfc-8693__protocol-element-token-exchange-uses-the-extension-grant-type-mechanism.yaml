document: rfc-8693
kind: protocol-element
summary: Token exchange uses the extension grant type mechanism defined in Section 4.5 of RFC 6749. The client sends an HTTP POST to the token endpoint with 'application/x-www-form-urlencoded' encoding, using the grant type 'urn:ietf:params:oauth:grant-type:token-exchange'.
section: "2.1"
