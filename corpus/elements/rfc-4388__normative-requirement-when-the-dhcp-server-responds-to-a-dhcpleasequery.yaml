document: rfc-4388
kind: normative-requirement
summary: When the DHCP server responds to a DHCPLEASEQUERY, it MUST use the saved Relay Agent Information option in the same manner it did when originally responding to the DHCP client, in order to return consistent option values.
section: 6.4.2
rfc2119_level: MUST
