document: rfc-3581
kind: security-consideration
summary: An attacker acting as a man-in-the-middle could modify or remove the 'rport' parameter in a Via header, preventing clients behind NATs from receiving responses. However, this attack is not considered significant because an attacker capable of a MITM attack has many other denial-of-service options.
section: "7"
topics:
