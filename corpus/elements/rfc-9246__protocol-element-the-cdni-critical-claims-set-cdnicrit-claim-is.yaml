document: rfc-9246
kind: protocol-element
summary: The CDNI Critical Claims Set (cdnicrit) claim is a comma-separated list of extension claims that MUST be understood and processed by the recipient. If any listed claim is not understood, the Signed JWT MUST be rejected. Producers MUST NOT include standard claim names or an empty list.
section: 2.1.9
