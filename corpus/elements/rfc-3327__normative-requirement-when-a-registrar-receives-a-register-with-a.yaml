document: rfc-3327
kind: normative-requirement
summary: When a registrar receives a REGISTER with a Path header field but no indication of UA support, the recommended policy is to reject with 420 'Bad Extension', allowing the UA to detect that an intermediate proxy has inappropriately added Path. However, some registrars MAY choose to accept the extension anyway.
section: "5.3"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
