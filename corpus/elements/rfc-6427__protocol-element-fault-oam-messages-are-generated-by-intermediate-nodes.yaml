document: rfc-6427
kind: protocol-element
summary: Fault OAM messages are generated by intermediate nodes where a client LSP is switched. When a server sub-layer fails, the intermediate node sends Fault Management messages downstream towards the LSP end point and retransmits them periodically until the condition is cleared.
