document: rfc-9293
kind: wire-format
summary: The Maximum Segment Size Option has Kind=2, Length=4, and a 2-byte MSS field encoding the maximum receive segment size at the sending endpoint. It MUST NOT be sent in segments without the SYN control bit set.
