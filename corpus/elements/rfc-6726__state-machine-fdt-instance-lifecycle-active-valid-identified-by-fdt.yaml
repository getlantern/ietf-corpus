document: rfc-6726
kind: state-machine
summary: 'FDT Instance lifecycle: ACTIVE (valid, identified by FDT Instance ID within EXT_FDT) transitions to EXPIRED when current time exceeds the ''Expires'' NTP timestamp. Once expired, the ID may be reclaimed by starting from the smallest expired ID. Receivers MUST NOT apply an expired FDT Instance to newly received packets.'
section: "3.3"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
