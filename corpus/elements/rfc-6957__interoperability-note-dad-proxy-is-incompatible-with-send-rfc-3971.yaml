document: rfc-6957
kind: interoperability-note
summary: DAD-Proxy is incompatible with SEND (RFC 3971) because the proxy cannot sign ND messages with the CGA private key. RFC 6496 provides a standards-track solution and SHOULD be deployed alongside DAD-Proxy to restore SEND compatibility.
section: "6.1"
topics:
