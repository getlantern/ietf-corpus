document: rfc-7407
kind: protocol-element
summary: 'The ietf-snmp-vacm submodule maps vacmSecurityToGroupTable and vacmAccessTable to nested lists: /snmp/vacm/group contains a ''member'' sublist (security-name, security-model) and an ''access'' sublist (context, context-match, security-model, security-level, read-view, write-view, notify-view). MIB views are defined in /snmp/vacm/view with include/exclude wildcard-OID leaf-lists.'
section: "2.9"
