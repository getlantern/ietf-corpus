document: rfc-3393
kind: design-rationale
summary: The ipdv metric is defined as a difference of one-way-delays rather than an absolute delay measure, making it robust to clock synchronization errors. Constant clock offsets cancel out in the subtraction; only relative skew and drift during the measurement interval introduce residual error.
section: "1.3"
topics:
