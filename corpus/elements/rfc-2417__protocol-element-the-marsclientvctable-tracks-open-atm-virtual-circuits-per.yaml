document: rfc-2417
kind: protocol-element
summary: The marsClientVcTable tracks open ATM virtual circuits per client, indexed by (ipAdEntAddr, marsClientIndex, VPI, VCI, MinGrpAddr, MaxGrpAddr, PartyAddr). Each entry records VC signalling type (PVC/SVC), control type, idle timer, revalidate flag, encapsulation type (LLC/SNAP or other), and negotiated MTU.
