document: rfc-4572
kind: security-consideration
summary: Offering a TCP/TLS connection in SDP does not obligate an endpoint to accept any TLS connection with that fingerprint; standard TLS cipher negotiation must proceed. An offered TLS_NULL_WITH_NULL_NULL stream cipher SHOULD be rejected in almost every application scenario.
section: "7"
rfc2119_level: SHOULD
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
