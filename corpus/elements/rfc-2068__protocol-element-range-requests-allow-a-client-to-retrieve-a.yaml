document: rfc-2068
kind: protocol-element
summary: Range requests allow a client to retrieve a sub-range of a response entity using the Range header with byte-range specifiers (e.g., bytes=0-499). A 206 Partial Content response includes a Content-Range header; multiple ranges produce a multipart/byteranges body.
section: "14.36"
topics:
