document: rfc-8191
kind: design-rationale
summary: RFC 7077 (Update Notifications for Proxy Mobile IPv6) was adopted to support the LMA-initiated asynchronous notification to the MAG during renumbering, because base PMIPv6 (RFC 5213) binding is MAG-triggered and has no mechanism for the LMA to initiate binding state refreshment.
section: "3"
topics:
