document: rfc-9578
kind: normative-requirement
summary: If any of the following conditions fail—supported token_type, recognized truncated_token_key_id, correctly sized blinded_msg, or successful deserialization of blinded_msg—the Issuer MUST return HTTP 422 (Unprocessable Content). This applies to both VOPRF and Blind RSA protocols.
section: "5.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
