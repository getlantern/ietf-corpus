document: rfc-4916
kind: interoperability-note
summary: After a UA sends a revised From URI in a mid-dialog request, it MUST continue to be prepared to receive the old remote URI in the To header field of incoming requests at least until a request containing the revised URI in To has been received, accommodating in-flight messages.
section: 4.4.1
topics:
    - sip
