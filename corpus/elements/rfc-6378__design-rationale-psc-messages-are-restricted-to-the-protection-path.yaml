document: rfc-6378
kind: design-rationale
summary: PSC messages are restricted to the protection path to avoid interfering with normal data traffic and to eliminate race conditions from dual-path transmission. Three rapid messages are sent on state change to allow fast switching even if one or two packets are lost.
section: "4.1"
topics:
    - mpls
    - routing
