document: rfc-8627
kind: normative-requirement
summary: In bandwidth-limited networks, applications MUST NOT arbitrarily increase the amount of FEC protection, as doing so may lead to congestion collapse. Stronger FEC protection MAY be applied only after reducing the source rate.
section: "8"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - congestion
