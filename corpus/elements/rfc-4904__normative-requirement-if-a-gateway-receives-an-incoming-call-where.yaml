document: rfc-4904
kind: normative-requirement
summary: If a gateway receives an incoming call where the calling party number is not available, it MUST create a tel URI containing a locally generated token (e.g., gateway line or port number) with local significance, then convert it to a sip URI for the Contact header.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
