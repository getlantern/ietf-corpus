document: rfc-2142
kind: normative-requirement
summary: If a host is not configured to accept mail directly but implements a service for which this specification defines a mailbox name, that host MUST have an MX RR set, and the mail exchangers specified by this RR set must recognize the referenced host's domain name as 'local' for the purpose of accepting mail bound for the defined mailbox name.
section: "1"
rfc2119_level: MUST
topics:
    - email
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
