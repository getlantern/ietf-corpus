document: rfc-8383
kind: normative-requirement
summary: The TLV Length field MUST NOT imply that the value extends beyond the end of the RBridge Channel-Protocol-Specific Payload area. If it does, the Address Flush message is corrupt and MUST be ignored.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - routing
