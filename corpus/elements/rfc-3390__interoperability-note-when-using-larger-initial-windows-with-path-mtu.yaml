document: rfc-3390
kind: interoperability-note
summary: 'When using larger initial windows with Path MTU Discovery, there are two options for the Don''t Fragment (DF) bit: set it in all segments or only in one. Setting DF in the last segment of the initial window minimizes needless retransmits and duplicate ACKs triggering Fast Retransmit when the initial segment size is too large.'
section: "2"
topics:
