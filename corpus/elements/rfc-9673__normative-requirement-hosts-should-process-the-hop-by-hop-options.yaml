document: rfc-9673
kind: normative-requirement
summary: Hosts SHOULD process the Hop-by-Hop Options header in received packets. If a destination does not process the Hop-by-Hop Options header, it MUST process the remainder of the packet normally.
section: "5.1"
rfc2119_level: SHOULD
