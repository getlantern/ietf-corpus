document: rfc-5946
kind: protocol-element
summary: The RSVP Receiver Proxy is an RSVP-capable router that performs RSVP signaling on behalf of a non-RSVP-capable receiver. Upon receiving a Path message it establishes Path state, identifies the downstream interface, sinks the Path, and acts as if a corresponding Resv was received from the receiver.
section: "2"
topics:
