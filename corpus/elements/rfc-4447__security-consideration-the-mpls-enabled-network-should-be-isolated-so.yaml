document: rfc-4447
kind: security-consideration
summary: The MPLS-enabled network SHOULD be isolated so it is not possible to insert MPLS packets from outside, preventing spoofing, alteration, and inspection of PW PDUs. The specified encapsulations do not by themselves authenticate the encapsulator, assure packet integrity, or ensure privacy.
section: "8.1"
topics:
    - mpls
    - security
