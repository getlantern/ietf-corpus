document: rfc-6884
kind: protocol-element
summary: The 'mode-set-recv' SDP parameter is a unidirectional receive-only attribute that allows a decoder to express a preference for a subset of EVRC-NW modes (0–7). Absence of this parameter for audio/EVRCNW and audio/EVRCNW0 signals mode set {1,2,3,4,5,6,7}; absence for audio/EVRCNW1 signals mode 1.
