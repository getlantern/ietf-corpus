document: rfc-7545
kind: normative-requirement
summary: Within each AVAIL_SPECTRUM_RESP spectrum schedule list, event-time intervals MUST be disjoint and MUST be sorted in increasing time. A gap in the time schedule means no spectrum is available for that interval.
section: 4.5.2
rfc2119_level: MUST
