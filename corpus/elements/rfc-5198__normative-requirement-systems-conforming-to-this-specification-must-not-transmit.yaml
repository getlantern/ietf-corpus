document: rfc-5198
kind: normative-requirement
summary: Systems conforming to this specification MUST NOT transmit any string containing any code point that is unassigned in the version of Unicode on which they are dependent. The version of NFC and the version of Unicode used MUST be consistent.
section: "2"
rfc2119_level: MUST NOT
topics:
    - security
