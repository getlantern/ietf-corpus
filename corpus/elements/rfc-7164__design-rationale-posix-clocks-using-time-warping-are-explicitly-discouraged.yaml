document: rfc-7164
kind: design-rationale
summary: POSIX clocks using time warping are explicitly discouraged for RTP timestamping because warping alters the length of a second, making the relationship between RTP timestamps and wall-clock time non-uniform and therefore non-interoperable across implementations.
section: "5"
topics:
