document: rfc-9168
kind: normative-requirement
summary: The SPEAKER-ENTITY-ID TLV (per RFC 8232) MUST be included in every FLOWSPEC object to uniquely identify the FlowSpec originator. If missing, the receiver MUST respond with PCErr Error-Type 30, Error-value 2 (Malformed FlowSpec). If multiple instances are present, only the first is processed.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
