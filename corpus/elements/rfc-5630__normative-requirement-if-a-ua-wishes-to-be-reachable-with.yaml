document: rfc-5630
kind: normative-requirement
summary: If a UA wishes to be reachable with a SIPS URI, it MUST register with a SIPS Contact header field. If it does not wish to be reached with SIPS, it MUST register with a SIP Contact header field.
section: 5.1.1.1
rfc2119_level: MUST
