document: rfc-3031
kind: security-consideration
summary: RFC 3031 Section 6 contains the security considerations for the MPLS architecture. The architecture document notes that MPLS forwarding based on labels rather than IP headers creates risks if label bindings are spoofed or if invalid labels are forwarded rather than discarded; the requirement to discard packets with invalid incoming labels (section 3.18) and loop-control mechanisms (section 3.24) are the primary defenses defined in the architecture.
section: "6"
topics:
    - security
    - routing
