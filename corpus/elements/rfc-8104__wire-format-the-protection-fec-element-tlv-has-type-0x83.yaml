document: rfc-8104
kind: wire-format
summary: The Protection FEC Element TLV has type 0x83, with an Encoding Type field (1=PWid/IPv4, 2=Generalized PWid/IPv4, 3=PWid/IPv6, 4=Generalized PWid/IPv6), a Length field (octets of PW Information), and a variable-length PW Information field. This TLV is carried in LDP Label Mapping messages to identify the primary PW being protected.
