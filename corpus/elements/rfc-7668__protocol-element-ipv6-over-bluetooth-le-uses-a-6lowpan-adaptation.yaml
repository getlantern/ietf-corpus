document: rfc-7668
kind: protocol-element
summary: IPv6 over Bluetooth LE uses a 6LoWPAN adaptation layer running on top of Bluetooth LE L2CAP, with the GATT stack running in parallel for IPSS discovery. The stack requires Bluetooth 4.1 or newer and IPSP 1.0 or newer.
section: "3.1"
