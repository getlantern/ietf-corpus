document: rfc-5492
kind: design-rationale
summary: Base BGP-4 requires that a speaker receiving an OPEN message with unrecognized Optional Parameters must terminate the BGP peering, which complicates introduction of new capabilities. This specification defines an Optional Parameter and processing rules so peers can establish sessions even when unrecognized capabilities are present.
section: "1"
topics:
    - bgp
    - routing
