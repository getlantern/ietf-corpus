document: rfc-2752
kind: security-consideration
summary: The RSVP INTEGRITY object is used to protect the POLICY_DATA object containing AUTH_DATA from replay attacks. Combining AUTH_DATA with INTEGRITY enforces authentication based on both user identity and originating node identity. Simple authentication (plain ASCII/UNICODE ID) is inherently less secure; Kerberos is reasonably secure; public key certificate authentication provides the strongest security.
section: "9"
topics:
