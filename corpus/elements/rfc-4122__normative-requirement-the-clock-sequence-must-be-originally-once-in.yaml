document: rfc-4122
kind: normative-requirement
summary: The clock sequence MUST be originally (once in the lifetime of a system) initialized to a random number to minimize correlation across systems and provide maximum protection against rapidly moving or switching node identifiers.
section: 4.1.5
rfc2119_level: MUST
topics:
    - security
