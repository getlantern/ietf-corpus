document: rfc-5437
kind: design-rationale
summary: The XMPP 'from' attribute MUST NOT be generated from the Sieve ':from' tag to preserve the identity of the notification service; the ':from' value is instead conveyed via a SHIM 'Resent-From' header to avoid spoofing the XMPP sender identity.
section: "2.7"
topics:
    - email
    - security
