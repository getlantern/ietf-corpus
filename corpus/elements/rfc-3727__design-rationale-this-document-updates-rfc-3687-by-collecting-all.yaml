document: rfc-3727
kind: design-rationale
summary: This document updates RFC 3687 by collecting all ASN.1 definitions of the component matching rules into a single, appropriately identified ASN.1 module. The motivation is to allow other specifications to reference the component matching rule definitions from within their own ASN.1 modules, which was not possible before this consolidation.
section: "1"
topics:
