document: rfc-8876
kind: normative-requirement
summary: AlertMsg-Error values sent in provisional responses MUST be sent using the RFC 3262 reliability mechanism, or if not negotiated, MUST be repeated in the final response. There MUST NOT be more than one AlertMsg-Error code in a SIP response.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
