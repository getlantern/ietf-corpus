document: rfc-2622
kind: design-rationale
summary: Hierarchical set names (e.g., AS1:AS-CUSTOMERS) partition the namespace so that the maintainer of the parent object controls all sub-names. This prevents unauthorized parties from creating set names that appear to be sub-delegations of another organization's namespace, providing administrative integrity without a central naming authority.
section: "5"
topics:
    - routing
    - security
