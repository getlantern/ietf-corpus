document: rfc-9731
kind: protocol-element
summary: The 'vn-compute' RPC provides pre-instantiation VN computation. Its input accepts a TE topology identifier, optional abstract-node, VN-level and per-member path constraints (te-bandwidth, link-protection, priority, metric-bounds, affinities, SRLGs, disjointness), optimization criteria, class-of-service, and a vn-member-list. The output mirrors the member list with 'compute-status', 'if-selected', and 'error-info' (error-description, error-timestamp, error-reason identityref).
section: 4.3.1
topics:
    - yang
    - netconf
    - routing
    - vpn
