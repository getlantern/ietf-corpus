document: rfc-7740
kind: normative-requirement
summary: PEy MUST advertise a Leaf A-D route in response to receiving and importing a (C-*,C-*-BIDIR) S-PMSI A-D route with IR PTA from PEx when PEy chooses PEx as its Upstream PE for the C-RPA and has relevant local BIDIR-PIM join states received from its CEs.
