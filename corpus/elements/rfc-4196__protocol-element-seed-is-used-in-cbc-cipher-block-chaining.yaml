document: rfc-4196
kind: protocol-element
summary: SEED is used in CBC (Cipher Block Chaining) mode within ESP. This mode requires an IV the same size as the block size (16 octets). The IV is XOR'd with the first plaintext block before encryption; for successive blocks, the previous ciphertext block is XOR'd with the current plaintext.
section: "2.1"
topics:
    - crypto
    - ipsec
