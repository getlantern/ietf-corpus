document: rfc-8804
kind: interoperability-note
summary: In DNS redirection, the DnsTarget 'host' SHOULD NOT include a port number; if present, the uCDN MUST ignore it. Similarly for the FallbackTarget 'host' in DNS delegation, the dCDN MUST ignore any port number present.
section: "2.4"
topics:
    - dns
