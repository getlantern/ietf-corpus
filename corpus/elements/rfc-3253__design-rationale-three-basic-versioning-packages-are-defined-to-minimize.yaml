document: rfc-3253
kind: design-rationale
summary: 'Three basic versioning packages are defined to minimize client complexity: Core-Versioning (version-control only), Basic-Server-Workspace (version-control, workspace, version-history, checkout), and Basic-Client-Workspace (version-control, working-resource, update, label). A server supporting both workspace packages interoperates with all basic versioning clients.'
section: "2.1"
topics:
    - http
