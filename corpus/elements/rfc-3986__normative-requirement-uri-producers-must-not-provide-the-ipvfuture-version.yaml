document: rfc-3986
kind: normative-requirement
summary: URI producers MUST NOT provide the IPvFuture version flag ("v" prefix) for existing IPv4 and IPv6 literal address forms. Applications encountering an IP-literal with an unknown version flag SHOULD return an error for "address mechanism not supported".
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
