document: rfc-7751
kind: design-rationale
summary: AD-KDC-ISSUED is insufficient for S4U2Proxy (Constrained Delegation) because the service knows the symmetric key used for the checksum, so the KDC cannot detect whether the service tampered with the authorization data in an evidence ticket presented during a TGS-REQ.
section: "3"
topics:
