document: rfc-7044
kind: normative-requirement
summary: A SIP entity MUST include an 'rc', 'mp', or 'np' header field parameter in an hi-entry, if applicable, based on whether the Request-URI changed with same target user (rc), mapped to a different user (mp), or was forwarded unchanged (np). The parameter value is the hi-index of the retargeted parent entry.
section: "10.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
