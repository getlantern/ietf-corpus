document: rfc-1256
kind: security-consideration
summary: To mitigate router impersonation, hosts can be configured with PerformRouterDiscovery=FALSE to disable dynamic router discovery. The message format reserves room for future backward-compatible addition of digital signatures or other authentication information; this mechanism is FOR FURTHER STUDY.
