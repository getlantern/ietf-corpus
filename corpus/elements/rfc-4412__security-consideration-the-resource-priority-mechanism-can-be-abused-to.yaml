document: rfc-4412
kind: security-consideration
summary: The resource priority mechanism can be abused to obtain scarce resources and deny service to legitimate users, including taking over PSTN gateways or terminating existing sessions at IP phones. Because unauthorized priority access can impact overall system stability rather than just individual calls, authentication and authorization requirements are significantly more stringent than for standard SIP requests.
section: "11.1"
topics:
    - sip
    - security
    - realtime
