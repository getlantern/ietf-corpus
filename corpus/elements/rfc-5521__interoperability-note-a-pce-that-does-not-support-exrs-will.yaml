document: rfc-5521
kind: interoperability-note
summary: A PCE that does not support EXRS will treat an IRO containing an EXRS as a malformed object per RFC 5440 rules. The PCE MAY include the IRO in the PCErr, in which case the IRO SHOULD be terminated immediately after the unrecognized EXRS.
section: 2.2.2
topics:
    - routing
    - mpls
