document: rfc-7324
kind: design-rationale
summary: A strict FSM reading of RFC 6378 would require a node to transition through Normal (N) state when the highest-priority of two simultaneous inputs is removed, even though a lower-priority request remains. This is deemed unreasonable because no sensible justification exists for a node behaving as if conditions are normal when a known remote request is still active.
section: "6"
topics:
