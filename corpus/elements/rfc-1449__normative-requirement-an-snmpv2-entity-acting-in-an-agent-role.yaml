document: rfc-1449
kind: normative-requirement
summary: An SNMPv2 entity acting in an agent role must never prime its NBP cache; it should perform NBP lookups only when sending a trap, not when generating responses.
section: 5.3.2
rfc2119_level: MUST NOT
topics:
