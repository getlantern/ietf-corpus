document: rfc-6374
kind: normative-requirement
summary: The implementation MUST make clear which timestamp formats it supports and the extent of its support for computation with and reconciliation of different formats. An implementation MUST NOT generate an error response based on the value of the X (counter-size) flag.
section: "3.4"
rfc2119_level: MUST
topics:
