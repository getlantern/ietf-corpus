document: rfc-9600
kind: wire-format
summary: 'ECN marking uses two fields in the 32-bit TRILL header extension flags word: a 2-bit TRILL-ECN field at bits 12–13 (in the NCHbH range) and a 1-bit CCE (Critical Congestion Experienced) field at bit 26 (in the CItE range). The F flag in the main TRILL header must be set whenever the flags word is present.'
section: "2"
