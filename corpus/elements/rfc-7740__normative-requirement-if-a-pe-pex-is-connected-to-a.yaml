document: rfc-7740
kind: normative-requirement
summary: If a PE (PEx) is connected to a VPN site and its next-hop interface to a C-RPA is a VRF interface, PEx MUST advertise a (C-*,C-*-BIDIR) S-PMSI A-D route regardless of whether it has any local BIDIR-PIM join states corresponding to the C-RPA learned from its CEs.
section: "2.1"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
