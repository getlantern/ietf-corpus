document: rfc-5996
kind: normative-requirement
summary: All IKE_SA_INIT exchanges MUST complete before any other exchange type, then all IKE_AUTH exchanges MUST complete; after that, CREATE_CHILD_SA and INFORMATIONAL exchanges may occur in any order.
section: "1"
rfc2119_level: MUST
