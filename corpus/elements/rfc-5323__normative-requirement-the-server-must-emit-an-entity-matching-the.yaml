document: rfc-5323
kind: normative-requirement
summary: The server MUST emit an entity matching the WebDAV multistatus format (RFC 4918, Section 13) in response to a SEARCH request. If the server returns 207 (Multistatus), the response MUST include one DAV:response for each resource matching the search criteria.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
