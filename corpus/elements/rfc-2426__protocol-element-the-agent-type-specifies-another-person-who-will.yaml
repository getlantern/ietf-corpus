document: rfc-2426
kind: protocol-element
summary: The AGENT type specifies another person who will act on behalf of the vCard subject. Its value can be an inline vcard value, a URI reference, or plain text, and typically represents an administrator or assistant who is separately addressable.
section: 3.5.4
