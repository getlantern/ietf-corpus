document: rfc-8150
kind: protocol-element
summary: mplsLpsStatusFopNoResponses counts protocol failure occurrences where no PSC message with the matching Path value is received within 50 ms of a traffic switchover request. mplsLpsStatusFopTimeouts counts occurrences where no PSC message is received during at least 3.5 times the long PSC message interval with no defect on the protection path.
