document: rfc-4618
kind: protocol-element
summary: HDLC mode transports the HDLC PDU in its entirety including HDLC address and control fields, but excluding HDLC flags and FCS. Bit/byte stuffing is undone before encapsulation. PW type 0x0006 is used for HDLC.
