document: rfc-2401
kind: protocol-element
summary: The anti-replay window is a 32-bit counter and bitmap used to determine whether an inbound AH or ESP packet is a replay. It is required for all implementations but used only for inbound traffic; if anti-replay is disabled (e.g., for manually keyed SAs), the window is not used.
section: 4.4.3
topics:
    - ipsec
    - security
