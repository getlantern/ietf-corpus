document: rfc-3920
kind: normative-requirement
summary: If TLS negotiation is successful, both the receiving entity and the initiating entity MUST discard any knowledge obtained insecurely from the other entity before TLS took effect, ensuring the post-TLS session state is derived only from secured exchanges.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - security
