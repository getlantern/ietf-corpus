document: rfc-4791
kind: design-rationale
summary: A recurring calendar component and all its recurrence exceptions are stored as a single calendar object resource rather than as separate resources per instance. This avoids problems of instance limits, sync consistency, and linkage between exceptions and the master component, and reduces data transfer.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
