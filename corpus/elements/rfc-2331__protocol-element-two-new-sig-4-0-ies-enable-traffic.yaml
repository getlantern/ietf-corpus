document: rfc-2331
kind: protocol-element
summary: 'Two new SIG 4.0 IEs enable traffic parameter negotiation during call establishment: the Minimum Acceptable ATM Traffic Descriptor IE (for PCR negotiation) and the Alternative ATM Traffic Descriptor IE (for other parameters). A SETUP or CONNECT message MUST include at most one of these two IEs.'
section: 5.3.2
topics:
