document: rfc-9254
kind: wire-format
summary: The decimal64 type MUST be encoded using a CBOR decimal fraction as defined in RFC 8949 Section 3.4.4 (CBOR tag 4 wrapping a two-element array of exponent and mantissa). For example, 2.57 with fraction-digits 2 encodes as 4([-2, 257]).
section: "6.3"
