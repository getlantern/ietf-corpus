document: rfc-2981
kind: interoperability-note
summary: The Event MIB is complemented by the Distributed Management Expression MIB (RFC 2982), which is the expected source of boolean objects to monitor. There is considerable overlap in wildcard and delta sample capabilities between the two MIBs, and implementations may share common code.
