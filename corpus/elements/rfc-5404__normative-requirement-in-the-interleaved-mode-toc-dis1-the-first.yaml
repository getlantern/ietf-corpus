document: rfc-5404
kind: normative-requirement
summary: In the interleaved mode ToC, DIS1 (the first displacement field) SHALL be set to zero by a sender and SHALL be ignored by a receiver, since the first frame-block's position is uniquely defined by the RTP timestamp.
section: "5.4"
rfc2119_level: SHALL
