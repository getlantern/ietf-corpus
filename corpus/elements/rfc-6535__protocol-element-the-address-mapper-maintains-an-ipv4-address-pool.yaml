document: rfc-6535
kind: protocol-element
summary: The Address Mapper maintains an IPv4 address pool drawn from RFC 1918 private addresses and a table of (synthetic IPv4 address, real IPv6 address) pairs. New mappings are registered when the ENR resolves only IPv6 addresses, when all real IPv4 addresses are excluded, or when the function mapper receives an IPv6 packet with no existing mapping entry.
section: "2.4"
topics:
