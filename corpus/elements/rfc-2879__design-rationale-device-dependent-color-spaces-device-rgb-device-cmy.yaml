document: rfc-2879
kind: design-rationale
summary: Device-dependent color spaces (Device-RGB, Device-CMY, Device-CMYK) are distinguished from calibrated color spaces (CIELAB) to reflect the practical reality that exact color rendering is often left to the receiving device, while precise color matching requires a calibrated reference.
section: "3.6"
