document: rfc-9772
kind: design-rationale
summary: IP encapsulation is chosen for active OAM in Geneve because it meets all the stated requirements and is a well-known approach already used in MPLS networks (RFC 8029). The destination UDP port number in the inner UDP header identifies the specific OAM protocol, leveraging existing demultiplexing conventions.
