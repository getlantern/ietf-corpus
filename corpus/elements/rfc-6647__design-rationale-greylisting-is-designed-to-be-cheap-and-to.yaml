document: rfc-6647
kind: design-rationale
summary: Greylisting is designed to be cheap and to apply early in the SMTP session sequence, before expensive content analysis. Though some spamware routes around it, it remains useful for removing a large volume of simplistic-but-significant abusive traffic.
