document: rfc-5703
kind: normative-requirement
summary: When 'replace' uses ':from', implementations SHOULD check syntax and generate an error for syntactically invalid values. Implementations MUST preserve the previous From header as Original-From if the From header is changed.
section: "5"
rfc2119_level: MUST
