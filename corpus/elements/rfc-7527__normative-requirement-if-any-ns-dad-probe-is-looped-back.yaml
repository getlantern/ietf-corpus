document: rfc-7527
kind: normative-requirement
summary: If any NS(DAD) probe is looped back within RetransTimer milliseconds after sending DupAddrDetectTransmits NS(DAD) messages, the interface MUST continue with another MAX_MULTICAST_SOLICIT number of NS(DAD) messages transmitted RetransTimer milliseconds apart, each using a different nonce.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
