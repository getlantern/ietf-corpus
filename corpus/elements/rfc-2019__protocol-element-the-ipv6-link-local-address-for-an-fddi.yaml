summary: The IPv6 link-local address for an FDDI interface is formed by appending the 48-bit IEEE 802 address to the 80-bit prefix FE80::, yielding a 128-bit address of the form FE80:0000:0000:0000:0000:XXXX:XXXX:XXXX.
