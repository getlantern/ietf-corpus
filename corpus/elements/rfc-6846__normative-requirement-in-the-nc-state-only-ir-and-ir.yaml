document: rfc-6846
kind: normative-requirement
summary: In the NC state, only IR and IR-CR packets may be decompressed; any other packet type MUST NOT be decompressed or delivered to upper layers. Successful decompression in NC MUST cause an immediate transition to the FC state.
section: 5.3.1.3
rfc2119_level: MUST NOT
topics:
