document: rfc-3608
kind: protocol-element
summary: The Service-Route header field is a SIP extension header returned by a registrar in responses to REGISTER requests. It carries a route vector (preloaded route) that a UA may use to direct future outbound requests through a specific sequence of service proxies associated with the registrar's domain.
section: "3"
