document: rfc-7197
kind: normative-requirement
summary: When 'duplication-delay' is used as a media-level attribute, the specified relative delay values SHALL apply to every SSRC-based duplication grouping in the same media description; one cannot specify different delay values for different duplication groups in the same media description.
section: "3"
rfc2119_level: SHOULD
topics:
