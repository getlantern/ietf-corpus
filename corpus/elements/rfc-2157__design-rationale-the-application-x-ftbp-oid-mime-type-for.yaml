document: rfc-2157
kind: design-rationale
summary: The 'application/x-ftbp.oid' MIME type for FTBP encapsulation uses an unregistered x- prefix because registering a namespace (rather than individual names) is not currently permitted by MIME type registration rules; a specific OID-based name lets MIME readers be configured for each concrete usage without formal registration.
section: "3.3"
topics:
