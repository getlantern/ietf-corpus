document: rfc-6533
kind: interoperability-note
summary: The three new media types (message/global-delivery-status, message/global, message/global-headers) must be treated as functionally equivalent to the legacy types (message/delivery-status, message/rfc822, text/rfc822-headers) by multipart/report processors, enabling gradual deployment without breaking existing infrastructure.
