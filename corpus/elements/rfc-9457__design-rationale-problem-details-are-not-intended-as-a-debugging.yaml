document: rfc-9457
kind: design-rationale
summary: Problem details are not intended as a debugging tool for underlying implementations; rather, they expose greater detail about the HTTP interface itself. Truly generic problems are better expressed as plain status codes, and APIs with existing error formats should use those rather than problem details.
section: "4"
