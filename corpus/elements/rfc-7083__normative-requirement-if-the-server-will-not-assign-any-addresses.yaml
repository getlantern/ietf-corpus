document: rfc-7083
kind: normative-requirement
summary: If the server will not assign any addresses, it MUST send an Advertise with NoAddrsAvail and MAY also include SOL_MAX_RT and/or INF_MAX_RT options. This updates RFC 3315 Section 17.2.2.
section: "6"
rfc2119_level: MUST
