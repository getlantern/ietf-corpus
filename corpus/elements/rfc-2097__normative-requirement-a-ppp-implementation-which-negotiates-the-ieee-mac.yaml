document: rfc-2097
kind: normative-requirement
summary: A PPP implementation which negotiates the IEEE-MAC-Address-Required option MUST allow reception of PPP NBF packets 12 octets larger than the negotiated MRU size, since NBF packets MAY exceed the negotiated MRU when this option is in effect.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
