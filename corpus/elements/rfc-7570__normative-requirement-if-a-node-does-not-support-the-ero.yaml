document: rfc-7570
kind: normative-requirement
summary: 'If a node does not support the ERO Hop Attributes subobject, it MUST behave as described in RFC 3209 for unrecognized ERO subobjects: return a PathErr with Error Code ''Routing Error'' and Error Value ''Bad EXPLICIT_ROUTE object'', with the EXPLICIT_ROUTE object truncated to the offending subobject.'
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
