document: rfc-9601
kind: wire-format
summary: Bit 14 (counting from 0) of the AMT Request Message is defined as the AMT Gateway ECN Capability flag (E). When set to 1 it indicates the sender supports RFC 6040 ECN propagation; when cleared to 0 it indicates no support. All other bits of the Reserved field remain cleared to zero.
section: 6.1.4.2
topics:
    - ecn
    - ip
    - multicast
