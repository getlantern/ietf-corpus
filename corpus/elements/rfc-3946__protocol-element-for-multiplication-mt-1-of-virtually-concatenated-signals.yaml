document: rfc-3946
kind: protocol-element
summary: 'For multiplication (MT > 1) of virtually concatenated signals, the Generalized Label contains ordered sets of labels: the first set describes the time-slots of the first virtually concatenated signal, the second set describes the second, and so on. All labels for both multiplication and virtual concatenation must reside within a single component link.'
