summary: The Burst/Gap Loss and Discard Summary Statistics blocks depend on and are intended to be used in conjunction with the Burst/Gap Loss Metrics Block [RFC6958] and Burst/Gap Discard Metrics Block [RFC7003], which provide the underlying raw burst/gap counters from which the summary statistics are derived.
