document: rfc-6542
kind: protocol-element
summary: The Channel Binding Extension (data-type 0x00000000) carries the output of applying the Kerberos V get_mic operation (RFC 3961) with key usage number 43 to the channel binding data. The key used is the sub-session key from the authenticator if present; otherwise the session key from the ticket. The get_mic algorithm is the 'required checksum mechanism' for the encryption type of the key used.
section: "3.2"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
