document: rfc-8871
kind: design-rationale
summary: The term 'untrusted' for Media Distributors and Call Processing does not mean those entities are expected to malfunction; it means only that they do not have access to E2E media encryption keys. This distinction is intentional so that conferencing infrastructure can be hosted in cloud environments without compromising media privacy.
section: "3.1"
topics:
    - realtime
    - security
    - privacy
