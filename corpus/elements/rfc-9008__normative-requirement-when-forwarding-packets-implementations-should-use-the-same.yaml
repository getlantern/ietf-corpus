document: rfc-9008
kind: normative-requirement
summary: When forwarding packets, implementations SHOULD use the same value of RPI Type as was received, because the Option Type does not change en route. This allows incremental network upgrades and lets the DODAG root detect which nodes have been upgraded.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
