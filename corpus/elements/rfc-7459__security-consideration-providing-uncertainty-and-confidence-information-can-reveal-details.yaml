document: rfc-7459
kind: security-consideration
summary: Providing uncertainty and confidence information can reveal details about the location generation process — for example, inferring use of GPS or a specific network-based service. Rule Makers may choose to strip uncertainty fields, but location obfuscation is imperfect; increasing uncertainty does not reliably reduce information conveyed.
section: "9"
topics:
    - security
    - privacy
