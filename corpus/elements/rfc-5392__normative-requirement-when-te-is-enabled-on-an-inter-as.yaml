document: rfc-5392
kind: normative-requirement
summary: When TE is enabled on an inter-AS link and the link is up, the ASBR SHOULD advertise the link. When the link is down or TE is disabled, the ASBR SHOULD withdraw the advertisement. The ASBR MUST take precautions against excessive re-advertisements when TE parameters change.
section: "4"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
