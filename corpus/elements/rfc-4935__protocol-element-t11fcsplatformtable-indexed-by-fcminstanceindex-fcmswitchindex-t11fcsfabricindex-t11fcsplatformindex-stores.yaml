summary: t11FcsPlatformTable (indexed by fcmInstanceIndex, fcmSwitchIndex, t11FcsFabricIndex, t11FcsPlatformIndex) stores 16 attributes per platform including name, type (4 bytes), node name list pointer, management address list pointer, vendor ID (12 bytes), product ID (20 bytes), product revision, description, label, location, system ID, cluster ID, cluster management addresses, and FC-4 types (32-byte bitmask).
