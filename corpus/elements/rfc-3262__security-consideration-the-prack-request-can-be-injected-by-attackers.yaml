document: rfc-3262
kind: security-consideration
summary: The PRACK request can be injected by attackers to force retransmissions of reliable provisional responses to cease. Since provisional responses can convey important information, PRACK messages SHOULD be authenticated using the authentication procedures specified in RFC 3261.
section: "9"
rfc2119_level: SHOULD
topics:
    - sip
    - security
