document: rfc-6609
kind: normative-requirement
summary: Sieve implementations MUST NOT allow recursive script inclusion (both direct and indirect). An error MUST be generated at execution time for recursive inclusions; implementations MUST NOT generate errors for recursive includes at upload time, as this would impose an upload ordering requirement.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - email
