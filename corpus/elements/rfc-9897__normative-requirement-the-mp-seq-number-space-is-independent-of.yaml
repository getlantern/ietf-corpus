document: rfc-9897
kind: normative-requirement
summary: The MP_SEQ number space is independent of the path-individual sequence number space and MUST be sent with all DCCP-Data and DCCP-DataACK packets. When the sequence number space is exhausted, the sequence number MUST be wrapped.
section: 3.2.5
rfc2119_level: MUST
topics:
    - multipath
    - congestion
