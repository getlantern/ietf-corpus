document: rfc-3437
kind: design-rationale
summary: New AVP Attribute types (51, 52) are defined for LNS-to-LAC LCP reporting rather than reusing the existing LAC-to-LNS Proxy LCP Attribute types (27, 28), because some existing L2TP implementations might flag those known AVP types as misplaced and generate false error conditions.
