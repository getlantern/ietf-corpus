document: rfc-1933
kind: interoperability-note
summary: Many older IPv4 routers return only 8 bytes beyond the IPv4 header in ICMP error messages, which is insufficient to include the IPv6 header address fields. More modern routers may return enough data to allow the encapsulating node to generate a corresponding IPv6 ICMP error back to the originating IPv6 node.
section: 4.1.3
topics:
    - ip
    - v6ops
