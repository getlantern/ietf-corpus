document: rfc-7177
kind: normative-requirement
summary: TRILL Neighbor TLVs sent in a LAN Hello on an Ethernet link MUST show neighbor information as sensed by the transmitting RBridge for the VLAN on which the Hello is sent; conformant implementations maintain this information only for the Designated VLAN, so they send TRILL Neighbor TLVs only in Hellos sent on the Designated VLAN.
section: 8.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
