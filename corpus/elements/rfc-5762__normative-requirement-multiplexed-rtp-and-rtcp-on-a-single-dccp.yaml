document: rfc-5762
kind: normative-requirement
summary: Multiplexed RTP and RTCP on a single DCCP connection MUST be signalled using 'a=rtcp-mux'. If not multiplexing, 'a=rtcp-mux' MUST NOT be present in the SDP offer and a separate DCCP connection MUST be opened for RTCP.
section: "5.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
