document: rfc-5225
kind: normative-requirement
summary: The compressor MUST NOT use ROHC segmentation (i.e., the MRRU MUST be set to 0) if the ROHC channel configuration includes at least one ROHCv2 profile and the channel cannot guarantee in-order delivery of packets between compression endpoints.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
