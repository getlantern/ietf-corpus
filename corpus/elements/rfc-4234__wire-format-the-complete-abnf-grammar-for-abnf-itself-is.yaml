summary: The complete ABNF grammar for ABNF itself is provided in Section 4. A rulelist consists of one or more rules or blank/comment lines; a rule is 'rulename defined-as elements c-nl'. The defined-as operator is '=' for new rules or '=/' for incremental alternatives.
