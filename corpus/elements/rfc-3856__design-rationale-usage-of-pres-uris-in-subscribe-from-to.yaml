document: rfc-3856
kind: design-rationale
summary: Usage of pres URIs in SUBSCRIBE From/To fields instead of SIP URIs is a SHOULD (not MUST) to support interoperability with CPP-compliant systems via gateways. The pres URI provides a protocol-independent identity form; the exception allows cases where pres URI would cause interoperability problems with SIP components that do not support it.
section: "5"
topics:
    - sip
    - realtime
