summary: 'The CALDAV:calendar-timezone-id property contains PCDATA representing a time zone identifier string: <!ELEMENT calendar-timezone-id (#PCDATA)>. Similarly, CALDAV:timezone-id XML element is <!ELEMENT timezone-id (#PCDATA)>.'
