document: rfc-3192
kind: normative-requirement
summary: For 'domain' strings used in SMTP transmissions, the string MUST conform to the requirements of SMTP domain specifications (RFC 821, RFC 1123). For strings used in message content headers, the string MUST conform to RFC 822 and RFC 1123.
