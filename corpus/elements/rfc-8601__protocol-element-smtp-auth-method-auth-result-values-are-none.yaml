document: rfc-8601
kind: protocol-element
summary: SMTP AUTH (method 'auth') result values are none, pass, fail, temperror, permerror. Results use ptype 'smtp' with property 'auth' (authorization identity) and/or 'mailfrom' (AUTH= parameter). All non-pass cases indicate an unauthenticated client.
section: 2.7.4
