document: rfc-7844
kind: normative-requirement
summary: When using the anonymity profile, DHCP clients SHOULD NOT include the Client FQDN option (code 81) in their DHCP requests, as it uniquely identifies the client and may expose location via DNS updates.
section: "3.8"
rfc2119_level: SHOULD NOT
topics:
    - privacy
    - dns
