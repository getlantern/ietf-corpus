document: rfc-5970
kind: protocol-element
summary: OPT_BOOTFILE_URL (option code 59) carries a variable-length URL string (STD 66 / RFC 3986 compliant, not NUL-terminated) that the DHCPv6 server sends to inform the client of the location of the network boot file. This is the only mandatory option for network booting.
section: "3.1"
topics:
    - realtime
    - registry
