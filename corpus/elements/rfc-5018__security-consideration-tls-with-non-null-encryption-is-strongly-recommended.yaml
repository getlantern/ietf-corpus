document: rfc-5018
kind: security-consideration
summary: TLS with non-null encryption is strongly RECOMMENDED for all BFCP connections. TLS PSK with password-derived keys is subject to offline dictionary attacks; it is RECOMMENDED that clients use certificate-based server authentication ciphersuites with password-derived PSKs to defend against such attacks.
section: "6"
topics:
    - tls
    - crypto
    - security
