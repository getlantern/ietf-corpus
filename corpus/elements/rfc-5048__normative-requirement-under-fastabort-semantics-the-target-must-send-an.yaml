document: rfc-5048
kind: normative-requirement
summary: Under FastAbort semantics, the target MUST send an Asynchronous Message PDU with AsyncEvent=5 on each connection of each third-party session with allegiant affected tasks (where TaskReporting=FastAbort is operational) and on each non-issuing connection of the issuing session with allegiant affected tasks.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
