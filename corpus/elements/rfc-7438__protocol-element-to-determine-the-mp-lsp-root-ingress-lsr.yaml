document: rfc-7438
kind: protocol-element
summary: To determine the MP-LSP root (Ingress LSR) for a (*,G) set of multicast streams, the RP address or proxy device address is substituted for the source address 'S' in the root discovery procedures of RFC 6826 and RFC 7246. Policy-based alternatives for root node determination are also permitted.
section: "7"
topics:
