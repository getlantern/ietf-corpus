document: rfc-3230
kind: protocol-element
summary: An 'instance manipulation' is an operation on one or more instances that may result in an instance being conveyed in parts or in more than one response message; examples include range selection and delta encoding. Instance manipulations are end-to-end and often involve a client-side cache.
section: "3"
