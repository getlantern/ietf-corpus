document: rfc-6275
kind: design-rationale
summary: Nonce indices are included in the protocol to allow correspondent nodes to efficiently find the nonce used in creating a keygen token without storing per-mobile-node state. The correspondent node creates no mobile-node-specific state until it receives a Binding Update, keeping the RR procedure stateless at the CN side.
section: 5.2.2
topics:
    - ip
    - security
