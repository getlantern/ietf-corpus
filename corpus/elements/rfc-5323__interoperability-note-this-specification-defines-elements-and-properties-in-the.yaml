document: rfc-5323
kind: interoperability-note
summary: This specification defines elements and properties in the 'DAV:' XML namespace, which is normally reserved for IETF working group specifications. An exception was made because WebDAV SEARCH originated in the IETF DASL working group and had significant deployment before the working group closed.
