document: rfc-6378
kind: interoperability-note
summary: When a LER in a remote state receives a contradictory PSC message from the far-end (e.g., in remote Unavailable state receiving a remote FS(1,1) message), the PSC Control logic SHALL reevaluate all inputs as if the LER is in Normal state to resolve the inconsistency.
section: 4.3.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
