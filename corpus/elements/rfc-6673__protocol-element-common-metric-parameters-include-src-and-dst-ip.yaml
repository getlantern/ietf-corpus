summary: Common metric parameters include Src and Dst (IP addresses), T and Tf (test interval bounds), Tmax (maximum waiting time to distinguish loss from extreme delay), M (packets sent), N (packets received), TstampSrc and TstampDst (wire-times at each measurement point), and Type-P (packet type affecting network treatment).
