document: rfc-5557
kind: wire-format
summary: 'The Order TLV (Type=5) is carried in the RP object of the PCRep message. It contains two 32-bit integer fields: Delete Order (the sequence number for removing the old TE LSP) and Setup Order (the sequence number for establishing the new TE LSP). A Delete Order value of 0 indicates a new TE LSP with no prior path to remove.'
section: "5.4"
topics:
    - routing
    - mpls
