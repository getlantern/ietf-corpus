document: rfc-9684
kind: normative-requirement
summary: RPCs should be protected by NACM with a default setting of deny-all to limit the extraction of attestation data by only authorized Verifiers. Information collected through RPCs could reveal software versions and configurations that identify vulnerabilities.
section: "4"
rfc2119_level: SHOULD
topics:
