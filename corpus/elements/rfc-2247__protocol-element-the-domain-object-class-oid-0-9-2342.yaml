document: rfc-2247
kind: protocol-element
summary: The domain object class (OID 0.9.2342.19200300.100.4.13) is a STRUCTURAL class that SUPs top, requires dc (MUST dc), and permits a broad set of optional attributes including userPassword, searchGuide, description, o, and many postal/telecom attributes. It is used for entries that are placeholders or whose domains do not correspond to real-world entities.
