summary: The optional RPKI authenticator appended to a geofeed file is a CMS detached DER-encoded signature over the canonicalized (UTF-8, CRLF) geofeed body, then Base64-encoded with padding and line-wrapped to 72 or fewer characters, embedded as '#'-prefixed comment lines.
