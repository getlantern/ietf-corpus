document: rfc-2222
kind: protocol-element
summary: The authorization identity transmitted from client to server may differ from the identity in the client's authentication credentials, enabling proxy servers to authenticate with their own credentials while requesting access privileges for another identity. Transmitting an empty string directs the server to derive the authorization identity from authentication credentials.
section: "3"
topics:
    - security
