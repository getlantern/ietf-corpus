document: rfc-7621
kind: design-rationale
summary: GRUUs are required in the SIP event notification context to allow subscribers to send SUBSCRIBE or REFER requests to a specific user agent instance, targeting something like an INVITE dialog on a specific device. The original RFC 6665 text was ambiguous about whether this applied only to SUBSCRIBE-created dialogs or to all dialogs.
section: "2"
topics:
    - sip
    - realtime
