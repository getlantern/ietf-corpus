document: rfc-6536
kind: design-rationale
summary: NACM provides three separate access control points — protocol operation invocation, datastore data node access, and notification delivery — because NETCONF allows new protocol operations to be added at any time via YANG, making a static operation-only ACM insufficient for comprehensive protection.
section: "2.1"
topics:
    - netconf
    - security
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
