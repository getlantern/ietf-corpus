document: rfc-2445
kind: wire-format
summary: The RECUR value type requires the FREQ rule part (SECONDLY, MINUTELY, HOURLY, DAILY, WEEKLY, MONTHLY, or YEARLY). UNTIL and COUNT MUST NOT both appear in the same recurrence rule. All other rule parts (INTERVAL, BYDAY, BYMONTH, BYSETPOS, WKST, etc.) are optional but MUST NOT appear more than once.
section: 4.3.10
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
