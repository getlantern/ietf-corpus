document: rfc-4660
kind: normative-requirement
summary: If the NOTIFY is the one sent immediately after a 2xx response to the original SUBSCRIBE, its contents MUST be populated according to the filter <what> element; if applying the filter results in no content, the NOTIFY MUST be sent with empty contents.
section: 5.3.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
