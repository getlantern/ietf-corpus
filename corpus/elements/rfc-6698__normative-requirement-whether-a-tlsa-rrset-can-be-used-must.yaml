document: rfc-6698
kind: normative-requirement
summary: Whether a TLSA RRSet can be used MUST be based on the DNSSEC validation state. A TLSA RRSet whose DNSSEC validation state is secure MUST be used as a certificate association unless prohibited by local policy.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
