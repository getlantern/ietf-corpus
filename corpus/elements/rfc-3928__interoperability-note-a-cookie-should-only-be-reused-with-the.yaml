document: rfc-3928
kind: interoperability-note
summary: A cookie SHOULD only be reused with the same search specification that generated it. Some servers MAY accept a cookie with a more restrictive search specification. If the server does not accept the cookie, it MUST return lcupInvalidData.
section: "5.1"
topics:
    - ldap
