document: rfc-8040
kind: protocol-element
summary: 'RESTCONF defines nine query parameters: ''content'' (config/nonconfig/all), ''depth'' (subtree depth), ''fields'' (field selection), ''filter'' (notification filter), ''insert'' (ordered-by insertion point), ''point'' (reference point for insert), ''start-time''/''stop-time'' (notification replay window), and ''with-defaults'' (default value handling). Each optional parameter has a corresponding capability URI.'
section: "4.8"
