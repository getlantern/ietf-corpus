document: rfc-5679
kind: security-consideration
summary: Known DNS threats are documented in RFC 3833; DNSSEC (RFC 4033) provides protection against most of them. Deployments of IEEE 802.21 Mobility Services SHOULD consider DNSSEC and DNSSEC Operational Practices (RFC 4641).
