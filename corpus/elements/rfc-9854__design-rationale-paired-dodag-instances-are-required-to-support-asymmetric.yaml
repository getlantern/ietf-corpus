document: rfc-9854
kind: design-rationale
summary: 'Paired DODAG Instances are required to support asymmetric links: on a bidirectional asymmetric link only one direction may satisfy the Objective Function, so a single DODAG cannot establish both directions simultaneously. The RREQ-Instance and RREP-Instance are built independently, allowing each direction to be routed optimally.'
