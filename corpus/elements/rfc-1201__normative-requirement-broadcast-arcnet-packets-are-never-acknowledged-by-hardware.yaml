document: rfc-1201
kind: normative-requirement
summary: Broadcast ARCNET packets are never acknowledged by hardware and therefore MUST NOT be retransmitted by datalink implementations. Unicast packets and fragments that go unacknowledged are encouraged to be retransmitted.
section: "2.4"
rfc2119_level: SHOULD NOT
topics:
    - ip
