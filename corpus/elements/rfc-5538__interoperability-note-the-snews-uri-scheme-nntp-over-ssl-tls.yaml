document: rfc-5538
kind: interoperability-note
summary: The 'snews' URI scheme (NNTP over SSL/TLS on port 563) is registered as historical; its further use is deprecated in favor of ordinary 'news' URLs combined with NNTP servers supporting RFC 4642 (STARTTLS).
