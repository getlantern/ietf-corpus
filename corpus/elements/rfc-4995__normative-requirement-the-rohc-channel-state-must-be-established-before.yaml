document: rfc-4995
kind: normative-requirement
summary: The ROHC channel state MUST be established before the first ROHC packet may be sent; the decompressor MUST maintain established contexts within the MAX_CID space until the CID gets re-used or the channel is taken down.
section: 5.1.2
rfc2119_level: MUST
