document: rfc-1629
kind: design-rationale
summary: Private point-to-point links between routing domains can be ignored for NSAP allocation purposes because their routing information is not propagated throughout the internet. A subscriber with a single public provider connection plus multiple private links may be treated as single-homed for NSAP allocation, simplifying address administration.
section: "5.5"
topics:
    - routing
