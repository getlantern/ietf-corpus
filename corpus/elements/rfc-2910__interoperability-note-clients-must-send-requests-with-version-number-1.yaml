document: rfc-2910
kind: interoperability-note
summary: Clients MUST send requests with version-number '1.1' and SHOULD try alternate version numbers on receiving 'server-error-version-not-supported'. IPP objects MUST accept requests with version-number '1.1', and it is recommended they accept any request with major version '1'.
section: "9.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
