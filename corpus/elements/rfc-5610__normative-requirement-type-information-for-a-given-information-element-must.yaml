document: rfc-5610
kind: normative-requirement
summary: Type information for a given Information Element MUST NOT be redefined by IE type records, and a Collecting Process MUST NOT allow an IE type record to replace its own internal definition of an Information Element. Information Elements for which a Collecting Process receives conflicting semantic or type information MUST be ignored.
section: "3.9"
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
