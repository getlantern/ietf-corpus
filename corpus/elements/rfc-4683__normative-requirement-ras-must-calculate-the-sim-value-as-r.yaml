document: rfc-4683
kind: normative-requirement
summary: RAs MUST calculate the SIM value as R || PEPSI where PEPSI = H(H(P || R || SIItype || SII)). Both SHA-1 and SHA-256 MUST be supported for generation and verification of PEPSI values.
section: "4.4"
rfc2119_level: MUST
topics:
