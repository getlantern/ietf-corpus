document: rfc-9956
kind: normative-requirement
summary: In nodes supporting both the NQB PHB and L4S, L4S network functions SHOULD treat packets marked with the NQB DSCP and ECT(1) or CE the same as packets marked with the Default DSCP and the same ECN value, enabling NQB and L4S traffic to share the low-latency queue in a DualQ node.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
