document: rfc-9243
kind: design-rationale
summary: The DHCPv6 client module is explicitly not a replacement for DHCPv6-assigned address and parameter configuration; it is intended only for configuration and monitoring of the DHCPv6 client function itself. Stateless DHCP (RFC 8415 Section 6.1) is effectively configured when all address and prefix features (non-temp-addr, temp-addr, prefix-delegation) are disabled.
section: "1"
topics:
