document: rfc-7916
kind: interoperability-note
summary: For remote LFA PQ nodes, the number of remote alternates to evaluate must be limited to a finite number before collecting path attributes, because real-world topologies can yield hundreds of PQ candidates and the computational overhead of collecting alternate-to-destination attributes for all of them is prohibitive.
section: 6.2.5.4
topics:
    - routing
    - mpls
