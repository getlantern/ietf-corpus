document: rfc-5643
kind: design-rationale
summary: Since addressing semantics were removed from router-LSAs in OSPFv3, virtual links require an administratively assigned Interface ID for advertisement in Hello packets and router-LSAs. A read-only object was added to the Virtual Interface Table to expose this assigned Interface ID.
section: "2.6"
topics:
