document: rfc-7730
kind: normative-requirement
summary: The object referenced by each rsync URI in the TAL MUST be a self-signed CA certificate that conforms to the RPKI certificate profile (RFC 6487). This certificate serves as the trust anchor in certification path discovery and validation.
section: "2.2"
rfc2119_level: MUST
topics:
