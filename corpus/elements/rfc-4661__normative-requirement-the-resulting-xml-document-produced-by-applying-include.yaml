document: rfc-4661
kind: normative-requirement
summary: The resulting XML document produced by applying <include> and <exclude> filters MUST be valid. If applying an <exclude> element value results in an invalid document, that step MUST be reversed, re-introducing the excluded elements with their previous values.
section: 3.5.1
rfc2119_level: MUST
topics:
