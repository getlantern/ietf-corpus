document: rfc-2446
kind: normative-requirement
summary: Applications desiring free time information MUST infer it from available busy time information; iTIP only transfers busy time data. Duplicate busy time periods SHOULD NOT be specified, though two different periods MAY overlap. FREEBUSY properties SHOULD be sorted in ascending order by start time.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
