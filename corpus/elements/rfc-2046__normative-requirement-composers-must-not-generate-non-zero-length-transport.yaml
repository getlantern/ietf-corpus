document: rfc-2046
kind: normative-requirement
summary: Composers MUST NOT generate non-zero length transport padding after boundary delimiter lines, but receivers MUST be able to handle padding added by message transports. Trailing whitespace on a boundary line must be presumed gateway-added and deleted.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
