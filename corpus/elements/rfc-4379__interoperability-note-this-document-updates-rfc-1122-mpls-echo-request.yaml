document: rfc-4379
kind: interoperability-note
summary: 'This document updates RFC 1122: MPLS echo request packets use destination addresses from the 127/8 range outside a host, which RFC 1122 prohibits. The exception is explicitly required to enable LSP ping to exercise ECMP paths and to prevent diagnostic packets from being IP-forwarded if an LSP is broken.'
section: "1"
topics:
    - mpls
    - ip
