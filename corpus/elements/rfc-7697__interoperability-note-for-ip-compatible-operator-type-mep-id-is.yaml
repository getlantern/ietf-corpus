document: rfc-7697
kind: interoperability-note
summary: For IP-compatible operator type, MEP_ID is automatically derived from service identifiers (LSP or PW identifiers per RFC 6370) and mplsOamIdMeSourceMepIndex/mplsOamIdMeSinkMepIndex should be set to zero. For ICC-based operator type, source and sink MEP indices must be explicitly configured.
