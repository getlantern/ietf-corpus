document: rfc-3323
kind: normative-requirement
summary: User agents SHOULD substitute the IP address or hostname frequently appended to Call-ID values with a suitably long random value, as the Call-ID header is frequently constructed in a manner that reveals the originating client's IP address or hostname.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
