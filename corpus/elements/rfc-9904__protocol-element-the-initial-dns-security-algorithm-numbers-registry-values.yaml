document: rfc-9904
kind: protocol-element
summary: The initial 'DNS Security Algorithm Numbers' registry values (Table 2) set RSASHA256 (8) and ECDSAP256SHA256 (13) as RECOMMENDED/MUST for both signing and validation. RSAMD5 (1), DSA (3), and DSA-NSEC3-SHA1 (6) are MUST NOT across all columns. ED25519 (15) is RECOMMENDED for all four columns.
