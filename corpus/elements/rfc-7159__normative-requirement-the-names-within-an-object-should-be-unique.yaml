document: rfc-7159
kind: normative-requirement
summary: The names within an object SHOULD be unique. When names are not unique, the behavior of software receiving such an object is unpredictable, with implementations variously reporting the last pair, an error, or all pairs including duplicates.
section: "4"
rfc2119_level: SHOULD
topics:
