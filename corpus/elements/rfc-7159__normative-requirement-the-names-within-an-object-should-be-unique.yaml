document: rfc-7159
kind: normative-requirement
summary: The names within an object SHOULD be unique. When names are not unique, behavior of receiving software is unpredictable — implementations vary between reporting last pair only, reporting an error, or reporting all pairs including duplicates.
section: "4"
rfc2119_level: SHOULD
