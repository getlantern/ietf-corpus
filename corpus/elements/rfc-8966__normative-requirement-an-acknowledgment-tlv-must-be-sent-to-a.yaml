document: rfc-8966
kind: normative-requirement
summary: An Acknowledgment TLV MUST be sent to a unicast destination because Opaque values are not globally unique. Sending all packets with Acknowledgment Requests is NOT RECOMMENDED, as the acknowledgments cause additional traffic and may force extra ARP or Neighbour Discovery exchanges.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
