document: rfc-5286
kind: design-rationale
summary: The mechanism applies only to intra-domain routing (OSPF or IS-IS); Fast Reroute for BGP inter-domain routing is explicitly out of scope. Both the primary path and the alternate path must reside in the same routing area, as the SPF computations are area-scoped and cross-area topology is not fully visible.
section: "2"
topics:
