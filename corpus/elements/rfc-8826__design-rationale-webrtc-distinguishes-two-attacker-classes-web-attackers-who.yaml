document: rfc-8826
kind: design-rationale
summary: 'WebRTC distinguishes two attacker classes: Web attackers who can induce users to visit their sites but do not control the network, and network attackers who can control network traffic. TLS/HTTPS prevent network injection attacks, but HTTP connections must be analyzed assuming traffic goes to the attacker.'
section: "3"
topics:
