document: rfc-1725
kind: design-rationale
summary: The protocol philosophy places intelligence in the POP3 client, not the server. Optional commands (TOP, UIDL) are strongly encouraged over augmenting drop/scan listings with extra fields, so that servers remain simple and clients handle parsing.
