document: rfc-5986
kind: interoperability-note
summary: Residential gateways may interfere with LIS discovery if they do not pass the access network domain name option to served Devices. Gateways can assist by relaying the option, performing their own LIS discovery, or acting as a LIS directly.
section: "2.1"
topics:
