document: rfc-4590
kind: design-rationale
summary: Digest-HA1 was introduced because when qop='auth-int', computing rspauth requires hashing the HTTP response body, which the RADIUS server does not see. By returning H(A1) to the RADIUS client, the client can compute rspauth locally after constructing the response body.
section: "3.19"
topics:
    - radius
    - crypto
