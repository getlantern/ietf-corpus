document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeadersLimit (IE 517, type boolean) indicates whether the exported extension header information reflects all enclosed extension headers (true) or only up to a hardware/software limit (false). This addresses observability constraints in hardware parsers.
