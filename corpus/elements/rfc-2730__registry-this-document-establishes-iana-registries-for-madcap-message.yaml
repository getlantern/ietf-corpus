document: rfc-2730
kind: registry
summary: This document establishes IANA registries for MADCAP message type codes (values 1–8 defined; new values require IETF Consensus), option codes (values 0–16 defined; new values require IETF Consensus), feature codes (values 0–2 defined; new values require IETF Consensus), and Lease Identifier types (values 0–1 defined; new values require IETF Consensus). UDP port 2535 is assigned to MADCAP.
