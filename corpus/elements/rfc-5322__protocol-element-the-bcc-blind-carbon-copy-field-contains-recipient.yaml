document: rfc-5322
kind: protocol-element
summary: 'The ''Bcc:'' (Blind Carbon Copy) field contains recipient addresses not to be revealed to other recipients. Three implementation strategies are defined: strip the Bcc: line entirely; send each visible-copy recipient a message without Bcc: while sending Bcc: recipients a separate copy; or send each Bcc: recipient an individual copy.'
section: 3.6.3
topics:
    - email
    - privacy
