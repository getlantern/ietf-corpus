document: rfc-8925
kind: interoperability-note
summary: Clients can support both the IPv6-Only Preferred option and the Auto-Configure option simultaneously. When both are sent, the server can prevent IPv4 link-local address configuration by responding with yiaddr=0.0.0.0 and Auto-Configure set to DoNotAutoConfigure.
section: 3.3.1
topics:
    - ip
    - v6ops
