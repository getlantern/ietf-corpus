document: rfc-1575
kind: interoperability-note
summary: RFC 1575 obsoletes RFC 1139, which offered two implementation alternatives for the CLNP echo function. This memo mandates a single mechanism (consistent with one of the previous drafts) to ensure that echo implementations on the Internet interoperate, prioritizing interoperability over backward compatibility.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
