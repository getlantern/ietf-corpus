document: rfc-6989
kind: security-consideration
summary: Even-characteristic elliptic curve groups (cofactor > 1) are not addressed by this RFC. Documents defining such groups MUST describe appropriate tests, which may include a subgroup membership test analogous to Section 2.2 or use of ECC CDH to avoid leakage.
section: "4.3"
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
