document: rfc-9967
kind: normative-requirement
summary: Event Receivers MUST verify the originator of a SET using JSON Web Signature (JWS) signatures when the Event Publisher is not communicating directly with the Event Receiver, to prevent insertion of forged events by intermediaries.
