document: rfc-1195
kind: interoperability-note
summary: Manually configured summary addresses at Level 2 supersede more-specific Level 1 entries based solely on [IP address, subnet mask] match; metric values are not considered for suppression. If a packet matches a summary address but no Level 1 route exists, the packet must be discarded.
section: "3.2"
topics:
