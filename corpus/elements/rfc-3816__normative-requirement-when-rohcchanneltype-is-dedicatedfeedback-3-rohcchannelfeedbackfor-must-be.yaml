document: rfc-3816
kind: normative-requirement
summary: When rohcChannelType is dedicatedFeedback(3), rohcChannelFeedbackFor MUST be different from 0 and MUST identify an existing ROHC channel. When rohcChannelType is notInUse(1), rohcChannelFeedbackFor MUST be 0.
