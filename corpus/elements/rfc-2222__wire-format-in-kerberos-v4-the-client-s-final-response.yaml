kind: wire-format
summary: 'In KERBEROS_V4, the client''s final response is DES-PCBC-encrypted data: octets 1-4 are the original server checksum, octet 5 is the selected security layer bitmask, octets 6-8 are the client''s maximum receive buffer size, followed by the authorization identity and zero-padding to a multiple of 8 octets.'
