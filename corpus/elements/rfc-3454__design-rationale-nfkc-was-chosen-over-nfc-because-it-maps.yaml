document: rfc-3454
kind: design-rationale
summary: NFKC was chosen over NFC because it maps 'compatibility characters' to their base equivalents, causing more strings that users expect to match to actually match. Some input mechanisms allow entering compatibility characters that look identical to base characters but have different code points.
section: "4"
