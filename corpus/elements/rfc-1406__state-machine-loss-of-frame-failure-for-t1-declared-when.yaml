document: rfc-1406
kind: state-machine
summary: 'Loss Of Frame failure: for T1, declared when OOF or LOS defect persists for T seconds (2 <= T <= 10), cleared when no OOF or LOS defects for period T (0 <= T <= 20). For E1, declared immediately when OOF defect is detected. AIS failure is declared after LOF failure is declared (unframed all-ones nature causes LOF first); cleared when LOF clears.'
section: 3.3.4
