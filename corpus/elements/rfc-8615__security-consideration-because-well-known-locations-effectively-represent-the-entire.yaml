document: rfc-8615
kind: security-consideration
summary: Because well-known locations effectively represent the entire origin, server operators should appropriately control write access to them. This is especially critical when more than one entity is co-located on the same origin, and care should be taken against both external configuration and local filesystem permissions granting unwanted write access.
section: "4.1"
topics:
    - security
    - http
