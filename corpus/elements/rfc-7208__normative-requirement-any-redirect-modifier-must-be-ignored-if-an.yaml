document: rfc-7208
kind: normative-requirement
summary: Any 'redirect' modifier MUST be ignored if an 'all' mechanism appears anywhere in the record. The 'redirect' and 'exp' modifiers MUST NOT each appear more than once; duplicate occurrences cause a 'permerror' result.
section: "5.1"
rfc2119_level: MUST
