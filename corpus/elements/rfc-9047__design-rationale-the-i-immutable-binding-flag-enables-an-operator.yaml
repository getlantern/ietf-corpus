document: rfc-9047
kind: design-rationale
summary: 'The I (Immutable Binding) flag enables an operator-controlled security mechanism: a configured IP->MAC binding is distributed to all PEs in the BD, preventing ARP/ND spoofing attacks where a malicious host injects Gratuitous ARPs or unsolicited NAs with a different MAC for the same IP.'
section: "4"
topics:
