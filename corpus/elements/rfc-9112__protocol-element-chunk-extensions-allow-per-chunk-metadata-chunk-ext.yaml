document: rfc-9112
kind: protocol-element
summary: Chunk extensions allow per-chunk metadata (chunk-ext = *( BWS ";" BWS chunk-ext-name [ BWS "=" BWS chunk-ext-val ])). They are connection-specific and likely removed by intermediaries; a recipient MUST ignore unrecognized chunk extensions.
section: 7.1.1
topics:
    - http
