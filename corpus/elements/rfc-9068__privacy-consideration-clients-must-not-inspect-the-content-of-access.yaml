document: rfc-9068
kind: privacy-consideration
summary: Clients MUST NOT inspect the content of access tokens; OAuth 2.0 treats them as opaque to clients. Authorization servers may switch from JWT to opaque tokens at any time, and logic depending on readable token content would break without recourse.
section: "6"
topics:
    - oauth
    - jose
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
