document: rfc-5286
kind: normative-requirement
summary: 'A router SHOULD attempt to select at least one loop-free alternate next-hop for each primary next-hop. Selection rules prioritize: (1) node-protecting over link-protecting; (2) link-and-node-protecting over node-protecting-only; (3) other primary (ECMP) next-hops over non-primary alternates when they provide adequate protection.'
section: "3.6"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
