document: rfc-7104
kind: interoperability-note
summary: When a node receiving a DUP grouping offer does not support line grouping or DUP semantics, it responds either by omitting the grouping attribute in the answer or by refusing the request (e.g., '488 Not Acceptable Here' or '606 Not Acceptable' in SIP). The original sender must then send a new offer without duplication grouping.
section: "3.3"
topics:
    - realtime
    - rtp
    - sip
