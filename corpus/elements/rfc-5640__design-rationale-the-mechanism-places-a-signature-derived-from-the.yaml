document: rfc-5640
kind: design-rationale
summary: The mechanism places a signature (derived from the inner header) into the encapsulation header's load-balancing field to enhance per-flow entropy seen by core routers. Core routers thus make better ECMP decisions without needing to inspect the tunneled payload.
