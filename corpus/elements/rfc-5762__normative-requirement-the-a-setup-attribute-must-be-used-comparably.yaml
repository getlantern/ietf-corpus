document: rfc-5762
kind: normative-requirement
summary: The 'a=setup:' attribute MUST be used comparably with RFC 4145 to indicate which endpoint initiates the DCCP connection. The 'a=connection:' attribute MUST be used compatibly with RFC 4145 to manage connection reuse on re-negotiation.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
