document: rfc-5436
kind: normative-requirement
summary: URI headers with hname 'received' are considered unsafe and MUST be ignored. The 'Auto-Submitted' header field MUST be placed above any 'Received:' fields retained from the triggering message.
section: "2.7"
rfc2119_level: MUST
