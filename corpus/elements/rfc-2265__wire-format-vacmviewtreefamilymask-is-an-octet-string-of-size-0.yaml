document: rfc-2265
kind: wire-format
summary: vacmViewTreeFamilyMask is an OCTET STRING of SIZE 0..16. The most significant bit of the i-th octet corresponds to the (8i−7)-th sub-identifier of vacmViewTreeFamilySubtree; '1' requires exact match, '0' is wildcard. If the mask is shorter than the subtree OID, it is implicitly extended with 1s.
