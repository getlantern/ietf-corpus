document: rfc-5324
kind: security-consideration
summary: The T11-FC-SP-ZONING-MIB contains read-write objects that extend zone server configuration. Unauthorized changes to FC-SP Zoning could allow unauthorized connectivity between Nodes that should be isolated. The Zoning Check Protocol that replaces the Zone Merge Protocol includes hash-based integrity protection of Zoning information.
section: "8.4"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
