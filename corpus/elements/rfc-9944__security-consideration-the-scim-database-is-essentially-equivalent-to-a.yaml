document: rfc-9944
kind: security-consideration
summary: The SCIM database is essentially equivalent to a network's AAA database because provisioning operations permit device access to a network. It must be carefully managed as such, and each SCIM client MUST be appropriately authenticated.
section: "8"
rfc2119_level: MUST
topics:
