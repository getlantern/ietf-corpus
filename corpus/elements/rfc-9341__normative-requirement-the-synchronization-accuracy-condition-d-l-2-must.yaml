document: rfc-9341
kind: normative-requirement
summary: The synchronization accuracy condition d < L/2 MUST be satisfied, where d is the guard band and L is the block duration. Packet counters and double-marked packets MUST respectively be read and selected within the resulting available counting interval to avoid error from out-of-order effects and clock skew.
section: "5"
rfc2119_level: MUST
topics:
    - measurement
