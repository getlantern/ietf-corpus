document: rfc-7851
kind: protocol-element
summary: The Ping diagnostic extension uses a new MessageExtensionType (0x2, named 'Diagnostic_Ping') carrying a DiagnosticsRequest structure in the extension_contents field. This extension is non-critical; peers that do not support it treat the message as a normal Ping.
