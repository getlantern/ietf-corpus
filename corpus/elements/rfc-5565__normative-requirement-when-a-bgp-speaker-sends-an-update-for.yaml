document: rfc-5565
kind: normative-requirement
summary: When a BGP speaker sends an update for an E-IP NLRI over an I-IP BGP session and advertises itself as the next hop, it MUST specify the next hop address in the I-IP family, unless explicitly overridden by policy.
section: "5"
rfc2119_level: MUST
