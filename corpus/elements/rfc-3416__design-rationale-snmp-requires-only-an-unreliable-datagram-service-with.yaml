document: rfc-3416
kind: design-rationale
summary: SNMP requires only an unreliable datagram service, with each message entirely and independently contained in a single transport datagram. The preferred transport is UDP. Retransmission policy is intentionally left to the application, which must act responsibly per BCP 41 congestion control principles.
section: "2.2"
topics:
    - snmp
    - udp
