document: rfc-3080
kind: security-consideration
summary: A man-in-the-middle may remove security-related profiles from the BEEP greeting or generate a negative reply to the TLS 'ready' element, preventing security negotiation. A BEEP peer SHOULD be configurable to refuse to proceed without an acceptable level of privacy.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - tls
