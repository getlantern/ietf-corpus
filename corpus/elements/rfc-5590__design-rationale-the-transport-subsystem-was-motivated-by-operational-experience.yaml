document: rfc-5590
kind: design-rationale
summary: The Transport Subsystem was motivated by operational experience showing that USM's separate principal and key management infrastructure was a deterrent to SNMPv3 deployment. Operators wanted to leverage existing unified security infrastructures (SSH, TLS) already used for CLI and other management protocols like syslog and NETCONF, rather than maintaining a separate SNMP-specific key management system.
section: "2"
topics:
