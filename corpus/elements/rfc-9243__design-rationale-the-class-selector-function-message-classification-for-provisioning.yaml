document: rfc-9243
kind: design-rationale
summary: The class-selector function (message classification for provisioning decisions) is intentionally omitted from the server module because research found that while the function is common to all DHCPv6 server implementations, the method for configuring it differs greatly between them. An empty vendor-config container and a class-selector container are provided as augmentation points instead.
section: "1.2"
topics:
    - yang
    - v6ops
