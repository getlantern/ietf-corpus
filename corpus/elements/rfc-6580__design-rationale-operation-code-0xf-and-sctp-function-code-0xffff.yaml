document: rfc-6580
kind: design-rationale
summary: Operation code 0xF and SCTP function code 0xFFFF are reserved for experimental use per RFC 3692, allowing experimentation without consuming the Standards Action code point space. These reservations are explicitly allocated by RFC 6580 rather than left unassigned.
