document: rfc-9412
kind: protocol-element
summary: The ORIGIN HTTP/3 frame allows a server to indicate what origin or origins the server would like the client to consider as members of the Origin Set for the connection. Semantics are identical to the HTTP/2 ORIGIN frame defined in RFC 8336.
section: "2"
topics:
