document: rfc-8703
kind: normative-requirement
summary: If a router receives a Destination Up Message specifying a Link Identifier that has already been used, the router MUST respond with a Destination Up Response Message containing a Status Data Item with status code 130 ('Invalid Data') and transition to the Session Termination state.
section: "2"
rfc2119_level: MUST
topics:
    - routing
