document: rfc-5321
kind: interoperability-note
summary: 'Receiving systems MUST NOT reject mail based on the format of a Received: trace header field, and SHOULD be extremely robust in the face of unexpected information or formats in those fields, as messages may originate from non-SMTP environments.'
