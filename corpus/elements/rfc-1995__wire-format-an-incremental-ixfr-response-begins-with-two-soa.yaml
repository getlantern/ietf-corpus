document: rfc-1995
kind: wire-format
summary: 'An incremental IXFR response begins with two SOA RRs: the server''s current SOA followed by the SOA of the client''s version being replaced. Each difference sequence then consists of deleted RRs (starting with the older SOA) followed by added RRs (starting with the newer SOA), ordered oldest-first.'
