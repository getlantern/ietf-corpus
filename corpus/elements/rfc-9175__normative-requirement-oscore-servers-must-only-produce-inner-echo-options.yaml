document: rfc-9175
kind: normative-requirement
summary: OSCORE servers MUST only produce Inner Echo options unless they are merely testing for reachability of the client. The Inner option is encrypted and integrity protected end-to-end; the Outer option is visible to proxies and unprotected by OSCORE.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
