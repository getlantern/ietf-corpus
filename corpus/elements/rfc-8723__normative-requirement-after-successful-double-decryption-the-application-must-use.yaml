document: rfc-8723
kind: normative-requirement
summary: After successful double-decryption, the application MUST use only information from the synthetic (inner) SRTP packet, with the specific exceptions that PT from the outer packet is used for SDP/codec selection and SEQ from the outer packet is used for RTP ordering.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
