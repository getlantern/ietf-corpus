document: rfc-9478
kind: protocol-element
summary: A TS payload is a set of one or more Traffic Selectors of the same or different TS Types. The TSi/TSr payloads MUST contain at least one TS Type per RFC 7296 Section 2.9; this document adds TS_SECLABEL as a valid additional TS Type requiring a companion IP address TS Type.
section: "1.2"
topics:
    - ipsec
    - security
