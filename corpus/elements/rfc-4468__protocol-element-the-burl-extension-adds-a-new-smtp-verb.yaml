document: rfc-4468
kind: protocol-element
summary: The BURL extension adds a new SMTP verb 'BURL' used as a replacement for the DATA command. It is only permitted during a mail transaction after at least one successful RCPT TO, and accepts an absolute URI with an optional 'LAST' end-marker.
section: "3.1"
topics:
    - email
