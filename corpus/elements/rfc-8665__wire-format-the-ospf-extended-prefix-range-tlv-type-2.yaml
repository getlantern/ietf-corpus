document: rfc-8665
kind: wire-format
summary: The OSPF Extended Prefix Range TLV (Type 2) carries Prefix Length (1 octet), AF (1 octet, 0 = IPv4 unicast), Range Size (2 octets), Flags (1 octet including IA-Flag), Reserved (3 octets), Address Prefix (variable), and sub-TLVs, enabling a single advertisement to assign SIDs for a contiguous prefix range.
