document: rfc-9061
kind: normative-requirement
summary: The pre-shared key secret leaf and the private-key leaf carry 'nacm:default-deny-all' to prevent read access. The YANG module states that the NSF MUST prevent read access to the PSK value for security reasons, and the secret MUST be set if EAP uses PSK or PSK authentication is chosen.
section: 5.2.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
