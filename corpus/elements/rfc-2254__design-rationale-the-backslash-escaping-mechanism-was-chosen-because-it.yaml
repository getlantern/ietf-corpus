document: rfc-2254
kind: design-rationale
summary: The backslash escaping mechanism was chosen because it eliminates filter-parsing ambiguities and allows any LDAP filter to be represented as a NUL-terminated string. Other non-printing characters may also be escaped using the same mechanism.
