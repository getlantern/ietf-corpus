document: rfc-5555
kind: wire-format
summary: 'The complete binding update packet format when encapsulated through NAT is: IPv4 header (src=V4ADDR, dst=HA_V4ADDR), UDP header, IPv6 header (src=V6HOA, dst=HAADDR), ESP header in transport mode, Mobility header, BU with IPv4 HAO and IPv4 CoA option. The binding acknowledgement reverses source and destination accordingly.'
section: "4.2"
topics:
    - mobility
    - nat
    - ipsec
    - udp
