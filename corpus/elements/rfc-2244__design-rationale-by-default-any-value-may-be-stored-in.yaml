document: rfc-2244
kind: design-rationale
summary: By default, any value may be stored in any attribute for which the user has permission and quota, without server-side validation. This is required to allow new simple dataset classes to be added without reconfiguring or upgrading servers. Enforced validation is only permitted when the dataset class specification explicitly identifies it.
section: "1.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
