document: rfc-1730
kind: protocol-element
summary: The AUTHENTICATE command performs a server-challenge/client-answer exchange using BASE64-encoded data. Optionally it negotiates a protection mechanism applied to all subsequent protocol data; once active, data is framed as ciphertext buffers each preceded by a 4-octet network-byte-order length field.
