document: rfc-3060
kind: normative-requirement
summary: Documents that define subclasses of the Policy Core Information Model classes SHOULD define additional keywords to characterize instances of those subclasses. By convention, keywords defined alongside class definitions are uppercase; installation-defined keywords may be any case.
section: 6.1.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
