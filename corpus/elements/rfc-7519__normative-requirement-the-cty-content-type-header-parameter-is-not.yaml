document: rfc-7519
kind: normative-requirement
summary: The "cty" (content type) Header Parameter is NOT RECOMMENDED when nested signing or encryption is not employed. When nested signing or encryption IS employed, "cty" MUST be present and its value MUST be "JWT" to signal that a Nested JWT is carried.
section: "5.2"
rfc2119_level: MUST
topics:
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
