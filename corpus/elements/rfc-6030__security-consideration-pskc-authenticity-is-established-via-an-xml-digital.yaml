document: rfc-6030
kind: security-consideration
summary: PSKC authenticity is established via an XML digital signature (<Signature> child element of <KeyContainer>) using XML Signature [XMLDSIG]. This enables receivers to verify the origin of a PSKC document and that it has not been tampered with in transit.
