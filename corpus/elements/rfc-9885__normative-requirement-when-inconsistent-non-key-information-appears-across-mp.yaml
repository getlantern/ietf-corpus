document: rfc-9885
kind: normative-requirement
summary: When inconsistent non-key information appears across MP-TLV parts and the defining document is silent, the first occurrence in the lowest-numbered LSP is used and subsequent occurrences are ignored. In IIHs, the first occurrence in the IIH is used and subsequent ones are ignored.
