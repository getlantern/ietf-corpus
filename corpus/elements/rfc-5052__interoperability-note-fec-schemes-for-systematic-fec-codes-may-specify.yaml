document: rfc-5052
kind: interoperability-note
summary: 'FEC schemes for systematic FEC codes MAY specify two FEC Payload ID formats: one for packets carrying only source symbols and another for packets carrying at least one repair symbol. CDPs must include an indication of which format is used in each packet if they wish to support such FEC schemes.'
section: "6.3"
topics:
    - multicast
