document: rfc-8487
kind: normative-requirement
summary: If an implementation receives an unknown TLV Type, it SHOULD ignore and silently discard the entire packet. If a TLV's length exceeds the available packet space, the implementation MUST ignore and silently discard the TLV and any remaining packet portion.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
