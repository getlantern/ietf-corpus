document: rfc-2596
kind: design-rationale
summary: Language codes are case insensitive (e.g., 'en-us' equals 'EN-US') and must not be structurally parsed beyond pattern matching. This avoids complex normalization logic and treats codes as opaque identifiers, which simplifies implementation.
