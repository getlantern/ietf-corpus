document: rfc-2163
kind: normative-requirement
summary: If a DNS query for a PX record results in a timeout, the gateway operation MUST be delayed and retried later. If a DNS error code is returned, an error message should be logged and the gateway operation delayed as for timeout.
section: "5"
rfc2119_level: SHOULD
topics:
    - dns
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
