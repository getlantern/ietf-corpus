document: rfc-4271
kind: state-machine
summary: 'The BGP FSM defines six states: Idle, Connect, Active, OpenSent, OpenConfirm, and Established. Mandatory session attributes include State, ConnectRetryCounter, ConnectRetryTimer/Time, HoldTimer/Time, and KeepaliveTimer/Time. Transitions are driven by administrative events, timer events, TCP connection events, and BGP message events.'
section: "8.2"
topics:
