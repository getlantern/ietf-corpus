document: rfc-1783
kind: interoperability-note
summary: The rules for determining the final packet are unchanged from RFC 1350. A data packet with a data length less than the negotiated blocksize signals the final packet; if the total data is an integral multiple of the blocksize, an extra zero-data packet ends the transfer.
section: Blocksize Option Specification
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
