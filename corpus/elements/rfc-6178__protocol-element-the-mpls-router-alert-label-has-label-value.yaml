document: rfc-6178
kind: protocol-element
summary: The MPLS Router Alert Label has label value 1 and is analogous to the IPv4 Router Alert header option (option value 148). When exposed and processed, it signals downstream LSRs to examine MPLS packets more closely. At the time of writing, its only legitimate use is LSP ping/trace (RFC 4379).
section: "5.2"
topics:
    - mpls
    - ip
