document: rfc-7904
kind: normative-requirement
summary: If the <domain-restrictions> element is included in the overlay configuration and 'enable' is not set or false, the overlay MUST only accept AORs matching the overlay's own domain name. If 'enable' is true, it MUST only accept AORs matching the specified patterns.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
