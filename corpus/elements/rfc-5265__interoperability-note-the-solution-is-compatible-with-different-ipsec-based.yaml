document: rfc-5265
kind: interoperability-note
summary: The solution is compatible with different IPsec-based VPN types (plain IPsec tunnel mode, L2TP/IPsec); L2TP/IPsec VPNs in particular do not restrict source addresses to VPN-TIA and thus support triangular routing for the inner MIPv4 layer, unlike plain IPsec VPNs.
section: "2.3"
topics:
    - vpn
    - ipsec
    - mobility
