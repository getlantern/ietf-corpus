document: rfc-8830
kind: design-rationale
summary: A new SDP attribute was needed because the existing SDP Grouping Framework (RFC 5888) does not allow specifying application-level information about the association between media descriptions and groups, which is required to map SDP media descriptions to WebRTC MediaStreams and MediaStreamTracks.
