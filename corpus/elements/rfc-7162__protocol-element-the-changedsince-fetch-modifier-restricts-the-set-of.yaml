document: rfc-7162
kind: protocol-element
summary: The CHANGEDSINCE FETCH modifier restricts the set of returned messages to those with a mod-sequence greater than the specified value, and implicitly adds the MODSEQ message data item to the response. It is defined for use with FETCH and UID FETCH commands.
