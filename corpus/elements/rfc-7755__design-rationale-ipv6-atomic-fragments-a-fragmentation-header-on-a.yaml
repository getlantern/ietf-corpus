document: rfc-7755
kind: design-rationale
summary: IPv6 Atomic Fragments (a Fragmentation header on a non-fragmented packet, added when translating IPv4 DF=0 packets) are not useful in an IDC environment and it is recommended that BRs disable their generation. RFC 6145 permits this via an optional configuration function; RFC 6145bis is noted as deprecating this behavior entirely.
section: 4.9.2
topics:
    - ip
    - v6ops
