document: rfc-1850
kind: protocol-element
summary: ospfIfTable describes OSPF interfaces indexed by ospfIfIpAddress and ospfAddressLessIf (0 for addressed interfaces, ifIndex for addressless). Key fields include ospfIfType (broadcast/nbma/pointToPoint/pointToMultipoint), ospfIfAdminStat, ospfIfRtrPriority (0 = ineligible for DR), ospfIfHelloInterval, ospfIfRtrDeadInterval, ospfIfState, ospfIfDesignatedRouter, ospfIfBackupDesignatedRouter, ospfIfAuthType, ospfIfAuthKey, ospfIfDemand, and ospfIfMulticastForwarding.
section: "3.7"
topics:
    - routing
    - snmp
