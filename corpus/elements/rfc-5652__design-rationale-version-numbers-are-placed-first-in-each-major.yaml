document: rfc-5652
kind: design-rationale
summary: Version numbers are placed first in each major data structure to avoid ASN.1 decode errors; some implementations check the version only as part of error handling after a failed decode, which is acceptable. The lowest version number that supports the generated syntax MUST be used to maximize interoperability with older implementations.
section: "1.3"
topics:
    - crypto
    - security
