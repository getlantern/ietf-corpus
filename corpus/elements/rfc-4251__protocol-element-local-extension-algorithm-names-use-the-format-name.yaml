document: rfc-4251
kind: protocol-element
summary: Local extension algorithm names use the format 'name@domainname' (e.g., 'ourcipher-cbc@example.com'). The domain part MUST be a valid, fully qualified domain name controlled by the defining organization. Only a single '@' is allowed, and the total name MUST NOT exceed 64 characters.
section: "6"
topics:
