document: rfc-7159
kind: interoperability-note
summary: Numbers interoperate best within the IEEE 754-2008 binary64 (double precision) range. Integers in the range [-(2**53)+1, (2**53)-1] are exactly interoperable; numbers outside this range or with excess precision (e.g., 1E400) may cause interoperability problems.
