document: rfc-6864
kind: normative-requirement
summary: Sources of non-atomic IPv4 datagrams using strong integrity checks MAY reuse the ID within intervals smaller than typical MDL values. Such reuse can still result in corrupted reassembly but will not propagate errors to higher-layer protocols.
section: "5.2"
rfc2119_level: MAY
topics:
    - ip
