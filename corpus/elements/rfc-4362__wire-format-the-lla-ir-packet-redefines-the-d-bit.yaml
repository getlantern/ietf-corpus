document: rfc-4362
kind: wire-format
summary: 'The LLA IR packet redefines the D-bit from ROHC RTP: D=0 means no dynamic chain is present AND the payload has been discarded. D=1 retains the original ROHC RTP meaning (dynamic chain and payload present). All other IR fields remain as defined in RFC 3095.'
section: "4.4"
topics:
