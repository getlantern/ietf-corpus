document: rfc-7591
kind: normative-requirement
summary: For clients using redirect-based grant types such as 'authorization_code' and 'implicit', authorization servers MUST require clients to register their redirection URI values. Registered redirection URI values MUST be a TLS-protected remote site, a localhost HTTP URI, or a non-HTTP application-specific URL.
section: "5"
rfc2119_level: MUST
topics:
    - oauth
    - security
