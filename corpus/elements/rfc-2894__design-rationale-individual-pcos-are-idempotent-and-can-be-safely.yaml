document: rfc-2894
kind: design-rationale
summary: Individual PCOs are idempotent and can be safely retransmitted. However, multi-PCO messages can be non-idempotent (e.g., ADD followed by DELETE), so all routers are required to guard against reprocessing an RR message with the same SequenceNumber and SegmentNumber rather than relying on idempotency.
section: "1"
topics:
    - ip
    - v6ops
