document: rfc-9792
kind: normative-requirement
summary: The Length field of the Prefix Extended Flags sub-TLV MUST be a multiple of 4 octets. If the length is not a multiple of 4 octets, the LSA is considered malformed and MUST be ignored.
section: "2"
rfc2119_level: MUST
topics:
    - routing
