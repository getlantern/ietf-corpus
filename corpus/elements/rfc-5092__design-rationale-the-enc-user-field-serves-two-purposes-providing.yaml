document: rfc-5092
kind: design-rationale
summary: 'The enc-user field serves two purposes: providing context for user-specific mailbox paths like INBOX, and restricting URL resolution to the named user. An obvious limitation is that the URL can only be resolved by the mailbox owner. The URLAUTH component overrides the second purpose and permits any user allowed by the <access> identifier to resolve the URL.'
section: "3.3"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
