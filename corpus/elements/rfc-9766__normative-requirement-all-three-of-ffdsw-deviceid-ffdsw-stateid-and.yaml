document: rfc-9766
kind: normative-requirement
summary: All three of ffdsw_deviceid, ffdsw_stateid, and ffdsw_fh_vers are required and together uniquely identify which data server attributes to update; positional correspondence alone is insufficient because a layout may have multiple data files on the same storage device.
section: "3.7"
rfc2119_level: REQUIRED
