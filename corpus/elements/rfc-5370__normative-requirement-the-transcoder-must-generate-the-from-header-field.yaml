document: rfc-5370
kind: normative-requirement
summary: The transcoder MUST generate the From header field of the outgoing INVITE using the same value as the From header field in the incoming INVITE, subject to privacy requirements expressed in that incoming INVITE (RFC 3323, RFC 3325). This does not apply to the 'tag' parameter.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
