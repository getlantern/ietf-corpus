document: rfc-4233
kind: protocol-element
summary: The ASP Active (ASPAC) message carries a mandatory Traffic Mode Type parameter (Over-ride=0x1 or Load-share=0x2) and optional Interface Identifiers. Integer (0x1) and Integer Range (0x8) types may be mixed; text (0x3) cannot be mixed with integer types.
