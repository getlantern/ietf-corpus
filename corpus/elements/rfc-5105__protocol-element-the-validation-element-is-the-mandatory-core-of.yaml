document: rfc-5105
kind: protocol-element
summary: 'The <validation> element is the mandatory core of a Validation Token, containing: a unique serial attribute, E164Number, optional lastE164Number (for number block validation), validationEntityID, registrarID, methodID, executionDate, and optional expirationDate. All dates are RFC 3339 full-date strings; a missing expirationDate indicates infinite validity.'
section: "4.1"
