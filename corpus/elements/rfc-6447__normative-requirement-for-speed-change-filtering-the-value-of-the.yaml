document: rfc-6447
kind: normative-requirement
summary: For speed change filtering, the value of the <speed> element from RFC 5962 MUST be defined in meters per second. An implementation MUST support <ns-bindings> to replace the namespace prefix, and the XPath expression MUST start with '//' followed by a single element.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
