summary: After CFB64_IV_OK is received, the WILL ENCRYPT side performs keyid negotiation via ENC_KEYID. Once a common keyid is identified, START and END commands may be sent by the WILL ENCRYPT side to begin or stop DES3 CFB64 encryption.
