document: rfc-6638
kind: interoperability-note
summary: This specification defines scheduling only within a single CalDAV server's user base. Cross-server scheduling is out of scope, but the protocol is designed to be compatible with servers that use iMIP (RFC 6047) for exchanging scheduling messages with external users via email.
section: "1"
