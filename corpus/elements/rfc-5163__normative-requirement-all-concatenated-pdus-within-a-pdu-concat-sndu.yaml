document: rfc-5163
kind: normative-requirement
summary: All concatenated PDUs within a PDU-Concat SNDU MUST share a common ULE Type (PDU-Concat-Type). Recursive use of PDU-Concat type is not permitted. Unsupported Types MUST be discarded and the receiver SHOULD record a PDU-Type error.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
