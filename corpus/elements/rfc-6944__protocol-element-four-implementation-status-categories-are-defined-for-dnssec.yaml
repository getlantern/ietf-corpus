document: rfc-6944
kind: protocol-element
summary: 'Four implementation status categories are defined for DNSSEC algorithms: ''Must Implement'' (required for interoperability), ''Must Not Implement'' (known weaknesses), ''Recommended to Implement'' (SHOULD implement), and ''Optional'' (MAY implement). Any algorithm not explicitly listed in the status table defaults to Optional.'
