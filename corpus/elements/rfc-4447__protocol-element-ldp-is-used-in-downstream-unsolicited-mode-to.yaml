document: rfc-4447
kind: protocol-element
summary: 'LDP is used in downstream unsolicited mode to distribute PW label bindings. Two new FEC element types are defined: 0x80 (PWid FEC Element) and 0x81 (Generalized PWid FEC Element). Each FEC TLV must contain exactly one FEC element, and the Generic Label TLV must be used.'
