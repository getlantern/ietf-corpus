document: rfc-9136
kind: protocol-element
summary: In the Floating IP use case (Section 4.2), multiple NVEs advertise RT-5 routes for the same prefix using a shared floating IP (vIP23) as the GW IP Overlay Index. Ownership change requires only a single RT-2 update for the floating IP; the 1,000+ RT-5 prefix routes remain unchanged.
section: "4.2"
topics:
