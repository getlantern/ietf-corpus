document: rfc-6396
kind: protocol-element
summary: The ISIS Type (32) and ISIS_ET (33) support the IS-IS routing protocol (RFC 1195). There is no Type-specific header; the ISIS PDU directly follows the MRT Common Header. The Subtype code is undefined for this type.
