document: rfc-2445
kind: protocol-element
summary: The VEVENT component specifies a calendared event. It requires UID and DTSTAMP; supports DTSTART, DTEND or DURATION, SUMMARY, DESCRIPTION, LOCATION, ATTENDEE, ORGANIZER, RRULE, EXRULE, RDATE, EXDATE, SEQUENCE, STATUS, TRANSP, RECURRENCE-ID, and VALARM sub-components.
section: 4.6.1
