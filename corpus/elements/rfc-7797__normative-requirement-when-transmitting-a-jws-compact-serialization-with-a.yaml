document: rfc-7797
kind: normative-requirement
summary: When transmitting a JWS Compact Serialization with a non-detached unencoded payload in a context that requires URL-safe characters, the application MUST ensure the payload contains only URL-safe characters ('a'-'z', 'A'-'Z', '0'-'9', '-', '_', '~').
section: "5.2"
rfc2119_level: MUST
topics:
    - jose
    - json
