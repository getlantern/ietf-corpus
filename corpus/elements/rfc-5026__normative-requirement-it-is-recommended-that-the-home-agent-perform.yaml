document: rfc-5026
kind: normative-requirement
summary: It is RECOMMENDED that the Home Agent perform DNS entry updates for the Mobile Node. The Mobile Node MAY include a DNS Update mobility option in the Binding Update; after receiving it, the Home Agent MUST update the DNS entry and MUST send a Binding Acknowledgement with the DNS Update option.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - mobility
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
