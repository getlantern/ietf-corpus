document: rfc-9960
kind: protocol-element
summary: A P2MP Tree Instance (PTI) consists of a Replication segment at the Root node, zero or more Replication segments at intermediate Replication nodes, and Replication segments at the Leaf nodes. Packet forwarding replicates at each node, forwarding copies toward downstream nodes until all Leaf nodes are reached.
