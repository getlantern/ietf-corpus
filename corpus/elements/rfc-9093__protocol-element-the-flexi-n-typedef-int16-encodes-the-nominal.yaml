document: rfc-9093
kind: protocol-element
summary: The 'flexi-n' typedef (int16) encodes the nominal central frequency for a flexi-grid channel using the same formula as dwdm-n (f = 193100.000 GHz + N × channel-spacing), where 'channel-spacing' corresponds to the nominal central frequency granularity per ITU-T G.694.1 clause 8.
