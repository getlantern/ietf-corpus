document: rfc-3854
kind: interoperability-note
summary: X.400 addresses in end-entity certificates SHOULD be in the subjectAltName extension and SHOULD NOT be in the subject distinguished name. Sending agents SHOULD match the originator address in X.400 content with an X.400 address in the signer's certificate.
section: "4.3"
topics:
    - email
    - pkix
    - security
