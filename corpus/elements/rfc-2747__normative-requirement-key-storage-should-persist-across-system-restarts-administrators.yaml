document: rfc-2747
kind: normative-requirement
summary: Key storage SHOULD persist across system restarts. Administrators should configure an overlap between the old key's expiration (KeyEndValid) and the new key's validity (KeyStartValid) of at least twice the clock synchrony uncertainty interval to allow safe key rollover.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
