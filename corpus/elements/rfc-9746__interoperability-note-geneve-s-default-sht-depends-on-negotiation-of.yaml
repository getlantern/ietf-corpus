document: rfc-9746
kind: interoperability-note
summary: 'Geneve''s default SHT depends on negotiation of the Ethernet Option TLV with a Source-ID: local bias is used if no ESI Label TLV is present, and ESI Label filtering is used if an Ethernet option TLV with a non-zero Source-ID is present. An explicit SHT=01 overrides this to force local bias regardless.'
section: "2.2"
topics:
    - routing
    - bgp
