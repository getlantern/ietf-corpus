document: rfc-1532
kind: normative-requirement
summary: A client that cannot receive unicast IP datagrams before knowing its IP address SHOULD set the BROADCAST flag to 1; a client capable of receiving unicast BOOTREPLY messages SHOULD NOT set it. This use of broadcast is explicitly discouraged as a workaround for old implementations.
section: 3.1.1
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
