document: rfc-4370
kind: interoperability-note
summary: During evaluation of a search request, entries that would be returned for the proxy authorization identity directly may not be returned if the requester lacks the right to assume the requested identity for searching that entry, even if the entry is within the search scope. This may result in fewer or no results compared to a direct request.
section: "4"
topics:
    - ldap
