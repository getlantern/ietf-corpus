document: rfc-9636
kind: privacy-consideration
summary: Transmission of time zone data over an insecure channel could leak the past, current, or future location of a device or user. TZif data transmitted over a public communications channel MUST be protected with a confidentiality layer such as TLS.
section: "8"
rfc2119_level: MUST
topics:
    - privacy
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
