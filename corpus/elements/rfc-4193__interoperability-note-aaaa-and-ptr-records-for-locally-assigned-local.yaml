document: rfc-4193
kind: interoperability-note
summary: AAAA and PTR records for locally assigned Local IPv6 addresses are not recommended for installation in the global DNS. The small possibility of duplicate prefixes across organizations could result in connection timeouts, ICMP Destination Unreachable messages, or connections to the wrong host.
section: "4.4"
topics:
    - ip
    - v6ops
    - dns
