document: rfc-7130
kind: interoperability-note
summary: If one device is not operating a micro-BFD session on a link while the other device is and perceives the session as Down, the two devices will have different views of link status, likely leading to traffic loss across the LAG. Bootstrapping protocols can detect such mismatched configurations.
section: A
topics:
