document: rfc-2147
kind: design-rationale
summary: A new TCP Urgent Pointer Option was considered to fix the 16-bit Urgent Pointer limitation, but was rejected as too intrusive because applications using jumbograms are unlikely to also use Urgent Pointers. The simpler sentinel-value approach (65535 = beyond segment end) was chosen instead.
section: "3.2"
topics:
