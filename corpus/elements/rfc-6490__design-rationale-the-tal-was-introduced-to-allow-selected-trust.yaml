document: rfc-6490
kind: design-rationale
summary: The TAL was introduced to allow selected trust anchor data (specifically Internet Number Resources) to change without requiring redistribution of the trust anchor certificate itself. The TAL remains constant as long as the trust anchor's public key and location do not change.
