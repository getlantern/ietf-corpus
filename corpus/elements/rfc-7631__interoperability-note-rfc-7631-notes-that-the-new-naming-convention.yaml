document: rfc-7631
kind: interoperability-note
summary: RFC 7631 notes that the new naming convention (attaching names to full types rather than TLV types) is already effectively in use in RFC 6130 and RFC 7181, the main users of allocated TLVs. For example, RFC 6130 already indicates that all usage of LINK_STATUS refers to that TLV with type extension 0. No protocol behavior changes.
section: "1"
topics:
