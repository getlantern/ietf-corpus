document: rfc-1548
kind: protocol-element
summary: The Magic-Number option (Type=5, Length=6) provides a 32-bit random value used to detect looped-back links. If a received Configure-Request contains a Magic-Number equal to the local one, a loop is suspected and a Configure-Nak with a different Magic-Number is sent. A Magic-Number of zero disables loop detection.
section: "6.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
