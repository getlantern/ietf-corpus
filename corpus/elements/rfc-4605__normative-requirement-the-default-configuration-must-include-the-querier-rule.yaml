document: rfc-4605
kind: normative-requirement
summary: The default configuration MUST include the querier rule, requiring the proxy to be the IGMP/MLD Querier before forwarding packets to a downstream interface. This prevents local loops and redundant traffic.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
