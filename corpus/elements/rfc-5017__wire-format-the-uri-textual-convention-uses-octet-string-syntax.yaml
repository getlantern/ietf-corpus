document: rfc-5017
kind: wire-format
summary: The Uri textual convention uses OCTET STRING syntax with DISPLAY-HINT '1a', representing an ASCII URI of unrestricted length. Uri255 is OCTET STRING SIZE(0..255) with DISPLAY-HINT '255a', and Uri1024 is OCTET STRING SIZE(0..1024) with DISPLAY-HINT '1024a'.
