document: rfc-5655
kind: protocol-element
summary: The File Time Window Options Template uses sessionScope (scope), minFlowStart* (earliest flow start time), and maxFlowEnd* (latest flow end time), where the precision of min and max timestamps SHOULD match. At most one time window record MAY appear per File.
