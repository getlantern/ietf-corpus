document: rfc-6513
kind: protocol-element
summary: The MCAST-VPN address family is a new BGP address family used for MVPN auto-discovery and C-multicast routing. Its NLRI encodes a route-type field distinguishing Intra-AS I-PMSI A-D, S-PMSI A-D, Leaf A-D, Source Active A-D, and C-multicast routing routes (source tree join and shared tree join).
