document: rfc-1826
kind: interoperability-note
summary: The IPv6 Routing Header Type 0 rearranges address fields during transit, but its final state at the receiver is known to the sender and all intermediate hops; therefore it is included in the Authentication Data calculation using the normal procedure rather than being zeroed.
