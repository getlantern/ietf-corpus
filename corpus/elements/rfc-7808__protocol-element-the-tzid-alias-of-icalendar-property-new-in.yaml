document: rfc-7808
kind: protocol-element
summary: The TZID-ALIAS-OF iCalendar property (new in this specification) appears in a VTIMEZONE component to identify another time zone identifier for which the current TZID is an alias, allowing servers to convey alias relationships in returned data.
