document: rfc-3887
kind: security-consideration
summary: A man-in-the-middle attack can suppress the STARTTLS option response, preventing TLS negotiation. Clients can protect against this by caching the fact that a server offered TLS and generating an alarm if it does not appear in a later session.
section: "11"
topics:
