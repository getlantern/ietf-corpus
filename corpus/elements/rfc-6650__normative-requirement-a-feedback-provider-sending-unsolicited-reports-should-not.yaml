document: rfc-6650
kind: normative-requirement
summary: A Feedback Provider sending unsolicited reports SHOULD NOT generate reports for which a reply cannot be received, as no-reply addresses preclude requests for additional information and increase the likelihood that further reports will be discarded.
section: "5.5"
rfc2119_level: SHOULD NOT
