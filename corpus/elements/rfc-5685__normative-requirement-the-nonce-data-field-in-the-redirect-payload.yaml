document: rfc-5685
kind: normative-requirement
summary: The Nonce Data field in the REDIRECT payload MUST be between 16 and 256 bytes (as per IKEv2 nonce size constraints from RFC 4306 Section 3.9), and MUST NOT be included in REDIRECT payloads sent in IKE_AUTH responses or in gateway-initiated redirects.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - vpn
