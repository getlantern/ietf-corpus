document: rfc-3527
kind: design-rationale
summary: 'The link-selection sub-option was created because the giaddr field in DHCP serves a dual purpose: specifying both the subnet/link on which the client resides and the IP address for communicating with the relay agent. When these two functions need to be separated (e.g., when IP Y is not reachable from the DHCP server due to firewalls or point-to-point links), a new mechanism is required.'
