document: rfc-9502
kind: normative-requirement
summary: In the IS-IS IPv4 Algorithm Prefix Reachability TLV, the D-flag (up/down bit) MUST be set when a prefix is leaked from level 2 to level 1. Prefixes with the D bit set MUST NOT be leaked from level 1 to level 2, preventing routing loops.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
