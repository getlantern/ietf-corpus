document: rfc-4004
kind: normative-requirement
summary: If exposing session keys to Diameter agents along the route represents an unacceptable security risk, the keys MUST be protected by IPSec or TLS security associations established directly between the HA and AAAH, or between the FA and AAAF.
section: "3.4"
rfc2119_level: MUST
topics:
