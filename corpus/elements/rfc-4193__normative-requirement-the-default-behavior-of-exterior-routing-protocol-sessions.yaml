document: rfc-4193
kind: normative-requirement
summary: The default behavior of exterior routing protocol sessions between administrative routing regions MUST be to ignore receipt of and not advertise prefixes in the FC00::/7 block, unless specifically configured for inter-site communication.
section: "4.1"
rfc2119_level: MUST
