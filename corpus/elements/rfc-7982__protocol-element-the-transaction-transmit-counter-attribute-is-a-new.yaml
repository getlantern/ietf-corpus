document: rfc-7982
kind: protocol-element
summary: The TRANSACTION_TRANSMIT_COUNTER attribute is a new comprehension-optional STUN attribute with type 0x8025. It carries a 32-bit value with Req and Resp 8-bit counters (and 16 bits of reserved padding) to track transmission counts for the same transaction ID.
section: "3.1"
topics:
