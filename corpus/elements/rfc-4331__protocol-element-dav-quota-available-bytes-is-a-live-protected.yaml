document: rfc-4331
kind: protocol-element
summary: 'DAV:quota-available-bytes is a live, protected property on collections (DAV: namespace) indicating the maximum additional storage in octets that can be allocated to a resource before further allocations are refused. A value of 0 means writes will likely be refused, though overwriting an existing resource of equal size may still succeed.'
section: "3"
topics:
