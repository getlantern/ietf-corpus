document: rfc-3433
kind: design-rationale
summary: No specialized sensor thresholding mechanisms are defined in this MIB; instead, it is recommended that a generalized thresholding MIB such as the Alarm and Events groups of the RMON MIB (RFC 2819) be used, to avoid duplicating threshold functionality.
