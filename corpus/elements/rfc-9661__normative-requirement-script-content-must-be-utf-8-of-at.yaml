document: rfc-9661
kind: normative-requirement
summary: Script content MUST be UTF-8 of at least 1 character and conform to Sieve syntax. A script MUST NOT contain 'require' statements mentioning Sieve capability strings absent from the server's capability object.
section: "2.2"
rfc2119_level: MUST NOT
