document: rfc-9370
kind: normative-requirement
summary: If the initiator includes any ADDKE Transform Types in the SA payload in the IKE_SA_INIT exchange request, it MUST also negotiate the use of the IKE_INTERMEDIATE exchange by including an INTERMEDIATE_EXCHANGE_SUPPORTED notification in the same message.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
