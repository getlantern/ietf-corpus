document: rfc-7678
kind: protocol-element
summary: The 64-Multicast-Attributes AVP (code 634) is a Grouped AVP carrying IPv6 multicast prefixes for IPv4-over-IPv6 multicast delivery (DS-Lite, MAP-E, lw4o6). It contains optional ASM-mPrefix64, SSM-mPrefix64, and Delegated-IPv6-Prefix (as uPrefix64) sub-AVPs.
