document: rfc-3873
kind: design-rationale
summary: sctpRtoAlgorithm only defines 'other(1)' and 'vanj(2)' as valid values because SCTP (RFC 2960) mandates Van Jacobson's algorithm for RTO calculation; 'other' is reserved for future use. This differs from the TCP MIB which has additional algorithm options.
section: 3.1.2
topics:
    - sctp
    - snmp
