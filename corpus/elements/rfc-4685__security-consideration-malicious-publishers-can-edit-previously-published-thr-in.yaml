document: rfc-4685
kind: security-consideration
summary: Malicious publishers can edit previously published thr:in-reply-to entries after the fact, creating attribution and repudiation concerns that are harder to detect in distributed comment systems than in centralized ones. XML Digital Signatures (RFC 4287 Section 5.1) partially mitigate this but are not a complete defense.
