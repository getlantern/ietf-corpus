document: rfc-8762
kind: design-rationale
summary: STAMP was designed with an inherent separation of control (vendor-specific configuration or orchestration) and test functions to provide deterministic behavior and simplify deployment. Interoperability problems with TWAMP Light—caused by underspecification in RFC 5357—motivated a clean standalone specification.
