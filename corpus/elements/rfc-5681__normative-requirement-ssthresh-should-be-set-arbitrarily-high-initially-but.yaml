document: rfc-5681
kind: normative-requirement
summary: ssthresh SHOULD be set arbitrarily high initially but MUST be reduced in response to congestion. Setting it high allows network conditions rather than arbitrary host limits to dictate the sending rate.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
