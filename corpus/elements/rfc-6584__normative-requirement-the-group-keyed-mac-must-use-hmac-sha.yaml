document: rfc-6584
kind: normative-requirement
summary: The Group-keyed MAC MUST use HMAC-SHA-256 (RECOMMENDED) or another communicated Cryptographic MAC Function. The shared group key MUST be communicated to all group members confidentially before the session starts.
