document: rfc-6595
kind: protocol-element
summary: For GSS-API principal name types, SAML supports GSS_C_NT_HOSTBASED_SERVICE for acceptors and only GSS_C_NT_USER_NAME for initiators. GSS_C_NT_USER_NAME is the default name type; there are no SAML-specific name syntaxes.
