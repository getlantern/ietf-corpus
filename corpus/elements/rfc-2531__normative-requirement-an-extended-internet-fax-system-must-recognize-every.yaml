document: rfc-2531
kind: normative-requirement
summary: An extended Internet fax system must recognize every feature tag in the enumerated list and handle it according to its actual capabilities. Presence of a tag in the list does not require the capability itself; unrecognized or unused feature tags received are effectively ignored per RFC 2533 matching rules.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
