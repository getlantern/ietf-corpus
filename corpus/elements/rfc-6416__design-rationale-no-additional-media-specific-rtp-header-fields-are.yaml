document: rfc-6416
kind: design-rationale
summary: No additional media-specific RTP header fields are defined for MPEG-4 Visual because MPEG-4 Visual already has built-in error resiliency tools for recovering corrupt headers (usable across RTP/IP, H.223/mobile, MPEG-2 TS), unlike H.261 or MPEG-1/2 which required extra RTP headers.
section: "1.1"
topics:
