document: rfc-8914
kind: interoperability-note
summary: Some EDE code and RCODE combinations may appear nonsensical (e.g., resolver-specific EDE codes received from authoritative servers); systems MUST NOT assume any particular combination is meaningful and MUST be able to accept EDE in all messages including NOERROR.
section: "3"
