document: rfc-1752
kind: protocol-element
summary: The End-to-End Options header carries optional information examined only by the packet's destination node(s). It uses the same format as the Hop-by-Hop Options header except it lacks the bit controlling exclusion of option data from the authentication integrity assurance computation.
section: 12.2.7
