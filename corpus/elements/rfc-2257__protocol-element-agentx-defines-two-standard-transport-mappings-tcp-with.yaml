summary: 'AgentX defines two standard transport mappings: TCP with a well-known port (Section 8.1) and UNIX-domain sockets with a well-known socket path (Section 8.2). UNIX-domain sockets are the preferred transport when master and subagents reside on the same host, providing lower overhead than TCP.'
