document: rfc-2601
kind: design-rationale
summary: ILMI-based server discovery was introduced because static configuration of ATMARP is cumbersome, error-prone, and prevents diskless hosts from using ATMARP at all. Dynamic discovery via the Service Registry MIB eliminates the requirement for at least one statically configured ATM address per host or router.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
