document: rfc-9195
kind: design-rationale
summary: Two standard formats (XML and JSON) were defined to reuse existing YANG encoding rules (RFC 7950 and RFC 7951) rather than inventing a new encoding, satisfying principles P1 and P2. Future encodings (e.g., CBOR) may be added as they are standardized.
section: "1.2"
