document: rfc-3550
kind: protocol-element
summary: The RTCP CNAME (Canonical End-Point Identifier) is a persistent, globally unique identifier for each RTP participant carried in SDES packets. It allows receivers to track participants across SSRC changes, associate multiple streams from the same endpoint, and perform inter-media (lip-sync) synchronization using NTP/RTP timestamp pairs from SR packets.
section: 6.5.1
topics:
    - rtp
    - realtime
