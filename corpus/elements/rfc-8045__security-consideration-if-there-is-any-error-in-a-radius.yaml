document: rfc-8045
kind: security-consideration
summary: If there is any error in a RADIUS Accounting-Request packet (e.g., erroneous port range in IP-Port-Range, inconsistent port mapping in IP-Port-Forwarding-Map), the RADIUS server MUST NOT send a response to the client, per RFC 2866.
section: "6"
rfc2119_level: MUST NOT
topics:
