document: rfc-6637
kind: wire-format
summary: Curve OIDs are DER-encoded ASN.1 OID bytes with the leading tag and length octets stripped. P-256 is 8 bytes (2A 86 48 CE 3D 03 01 07), P-384 is 5 bytes (2B 81 04 00 22), P-521 is 5 bytes (2B 81 04 00 23).
