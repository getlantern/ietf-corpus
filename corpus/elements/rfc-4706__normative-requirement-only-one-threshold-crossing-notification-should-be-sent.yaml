document: rfc-4706
kind: normative-requirement
summary: Only one threshold crossing notification SHOULD be sent per 15-minute interval per interface; since counters reset every 15 minutes, notifications may recur no more than once per interval.
section: "2.9"
rfc2119_level: SHOULD
