document: rfc-5910
kind: protocol-element
summary: 'The Key Data Interface uses the <secDNS:keyData> element for creates, adds, removes, and <domain:info> responses. It contains four required child elements: <secDNS:flags> (unsignedShort), <secDNS:protocol> (unsignedByte), <secDNS:alg> (unsignedByte), and <secDNS:pubKey> (base64Binary, minimum length 1). The server generates DS data from this key data based on server policy.'
section: "4.2"
topics:
