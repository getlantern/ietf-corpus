kind: protocol-element
summary: 'Configurable STP bridge timer ranges: dot1dStpBridgeMaxAge (600..4000 centi-seconds), dot1dStpBridgeHelloTime (100..1000 centi-seconds), dot1dStpBridgeForwardDelay (400..3000 centi-seconds). All have 1-second granularity per 802.1D-1998; agents MAY return badValue for non-whole-second sets.'
