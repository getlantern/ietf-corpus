document: rfc-7158
kind: normative-requirement
summary: The names within a JSON object SHOULD be unique. When names are not unique, behavior of receiving software is unpredictable — implementations variously report only the last pair, an error, or all pairs including duplicates.
section: "4"
rfc2119_level: SHOULD
topics:
    - json
