document: rfc-8227
kind: protocol-element
summary: 'The RPS Request Code is an 8-bit field encoding the protection condition or external request by priority (highest to lowest): Lockout of Protection (LP=0x0F), Forced Switch (FS=0x0D), Signal Fail (SF=0x0B), Manual Switch (MS=0x06), Wait-to-Restore (WTR=0x05), Exercise (EXER=0x03), Reverse Request (RR=0x01), No Request (NR=0x00).'
section: 5.2.2
topics:
