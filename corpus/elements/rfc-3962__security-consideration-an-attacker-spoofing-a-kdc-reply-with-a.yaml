document: rfc-3962
kind: security-consideration
summary: An attacker spoofing a KDC reply with a low iteration count can reduce the work required for brute-force attacks. Implementations should enforce both lower and upper bounds on accepted iteration counts; site-specific configuration of these bounds is recommended.
section: "8"
topics:
    - crypto
    - security
