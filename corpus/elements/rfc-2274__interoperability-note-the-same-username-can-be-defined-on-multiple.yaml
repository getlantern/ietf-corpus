document: rfc-2274
kind: interoperability-note
summary: The same userName can be defined on multiple SNMP engines. Because key localization produces different authKey and privKey values at each authoritative engine, users must manage separate localized secrets per engine even when a single password is used as the source material.
section: "2.1"
topics:
    - snmp
    - security
    - crypto
