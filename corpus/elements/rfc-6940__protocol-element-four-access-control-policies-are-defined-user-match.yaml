document: rfc-6940
kind: protocol-element
summary: 'Four access control policies are defined: USER-MATCH (only the certificate owner matching the stored user name may write), NODE-MATCH (only the node whose Node-ID matches may write), USER-NODE-MATCH (both user name and Node-ID must match), and NODE-MULTIPLE (each node may store one value under its own Node-ID key).'
section: "7.3"
topics:
    - security
