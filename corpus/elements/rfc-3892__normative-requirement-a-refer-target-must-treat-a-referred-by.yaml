document: rfc-3892
kind: normative-requirement
summary: A refer target MUST treat a Referred-By token with an invalid signature as an invalid token and MUST reject an otherwise well-formed request with an invalid Referred-By token with a 429 error response.
section: "4.1"
rfc2119_level: MUST
topics:
