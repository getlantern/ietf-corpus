summary: 'When the VAP encapsulates IP packets, the BFD Control packet is carried inside an inner IP packet within the Geneve packet, structured as: Ethernet Header / Outer IPvX Header / Outer UDP Header / Geneve Header / Inner IPvX Header / Inner UDP Header / BFD Control Packet / FCS.'
