document: rfc-3920
kind: interoperability-note
summary: For server-to-server communications, DNS hostnames asserted by both servers MUST be resolved before TLS or SASL negotiations proceed. Certificates during server-to-server TLS MUST also be checked against the asserted hostname rather than the resolved address.
section: "5.1"
topics:
    - tls
    - security
    - dns
