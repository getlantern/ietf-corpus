document: rfc-6487
kind: protocol-element
summary: The Subject Key Identifier extension MUST appear in all resource certificates and is non-critical. The Key Identifier is the 160-bit SHA-1 hash of the DER-encoded ASN.1 bit string of the Subject Public Key.
section: 4.8.2
