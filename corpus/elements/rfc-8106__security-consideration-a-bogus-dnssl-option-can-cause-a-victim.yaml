document: rfc-8106
kind: security-consideration
summary: A bogus DNSSL option can cause a victim to send DNS queries to a specific server for non-FQDN queries. DNS resolvers can mitigate this via recommendations in RFC 1535, RFC 1536, and RFC 3646.
section: "7.2"
topics:
    - dns
    - ip
    - security
