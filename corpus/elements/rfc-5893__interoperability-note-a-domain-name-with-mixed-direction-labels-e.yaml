document: rfc-5893
kind: interoperability-note
summary: A domain name with mixed-direction labels (e.g., R1.R2.ltr in network order) will display as '2R.1R.ltr' in an LTR context due to the Unicode Bidi algorithm, which may surprise users expecting hierarchical order. This document does not propose a solution.
