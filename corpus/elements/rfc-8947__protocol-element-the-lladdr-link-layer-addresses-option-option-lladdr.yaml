document: rfc-8947
kind: protocol-element
summary: The LLADDR (Link-Layer Addresses) option (OPTION_LLADDR, code 139) represents an address block within an IA_LL. It encodes the link-layer type, address length, starting address, and the number of additional consecutive addresses (extra-addresses) in the block.
