document: rfc-1382
kind: interoperability-note
summary: X.25 interfaces of type ddn-x25(4) translate between X.121 and IP addresses algorithmically; interfaces of type rfc877-x25(5) use a configuration table for that translation. The ifSpecific variable for both types is set to the x25 OID { transmission 5 }.
