document: rfc-5452
kind: security-consideration
summary: Even with all measures implemented, resolvers are not protected against third parties with the ability to observe, modify, or inject packets in the resolver's traffic; cryptographic DNS extensions (DNSSEC, RFC 4033) are needed to address that class of attack.
section: "1"
