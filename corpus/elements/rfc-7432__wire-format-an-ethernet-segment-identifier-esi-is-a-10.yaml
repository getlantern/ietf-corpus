document: rfc-7432
kind: wire-format
summary: An Ethernet Segment Identifier (ESI) is a 10-octet integer in network byte order. The first octet is the ESI Type (T); the remaining 9 octets form the ESI Value. ESI 0 denotes a single-homed site; ESI {0xFF repeated 10 times} is reserved as MAX-ESI.
section: "5"
