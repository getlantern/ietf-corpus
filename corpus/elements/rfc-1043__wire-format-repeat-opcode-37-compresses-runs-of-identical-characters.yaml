document: rfc-1043
kind: wire-format
summary: REPEAT (opcode 37) compresses runs of identical characters as a 1-byte <count> followed by the repeated <char>. DATA-TRANSMIT (opcode 28) and CURSOR-POSITION (opcode 18) each carry two 8-bit unsigned integers <x><y> identifying a screen position.
