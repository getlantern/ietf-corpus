document: rfc-4548
kind: wire-format
summary: IPv6 address encoding in a 20-octet NSAPA uses AFI=0x35, ICP=0000 (BCD) in the first 3 octets, followed by the 16-octet IPv6 address in DSP octets 0-15, and a 1-octet selector in the final (20th) octet of the DSP.
