document: rfc-6864
kind: interoperability-note
summary: Header compression algorithms (ROHC, ECRTP, cRTP) already accommodate non-changing IPv4 IDs. When compression assumes a changing ID by default, a non-changing ID reduces efficiency; algorithms that allow non-changing IDs explicitly (ROHC, ECRTP) can increase efficiency when sources use constant IDs.
section: "5.4"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
