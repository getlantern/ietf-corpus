document: rfc-9646
kind: protocol-element
summary: 'The ''ietf-sztp-csr'' module augments the ''get-bootstrapping-data'' RPC input with two mutually exclusive choices: ''csr-support'' (indicating CSR generation capability and supported algorithms/formats) and ''csr'' (conveying the generated CSR). It also defines a ''csr-request'' YANG structure returned in RESTCONF error-info.'
section: "2.1"
