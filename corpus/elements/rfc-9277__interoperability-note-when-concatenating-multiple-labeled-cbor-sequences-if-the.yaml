document: rfc-9277
kind: interoperability-note
summary: When concatenating multiple Labeled CBOR Sequences, if the CBOR-Sequence-based protocol does not define semantics for or at least tolerate embedded labels, care must be taken to remove the label from all but the first part to avoid parse errors.
