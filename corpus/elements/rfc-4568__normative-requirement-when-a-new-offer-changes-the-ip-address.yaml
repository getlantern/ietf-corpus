document: rfc-4568
kind: normative-requirement
summary: When a new offer changes the IP address and/or port for a media or FEC stream, the offerer MUST include a new master key (creating a new crypto context with ROC=0). The answerer faces the same requirement when it changes the IP address and/or port in an answer.
section: 7.1.4
rfc2119_level: MUST
topics:
    - realtime
    - security
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
