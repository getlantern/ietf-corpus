document: rfc-6724
kind: normative-requirement
summary: Implementations supporting home addresses MUST provide a mechanism allowing an application to reverse the preference for home addresses over care-of addresses. Use of this mechanism MUST only affect selection rules for the invoking application.
section: "5"
rfc2119_level: MUST
