document: rfc-2045
kind: design-rationale
summary: Encoding of composite (multipart/message) body types is forbidden to prevent nested encodings, which add complexity, obscure message structure, and require multiple decode passes just to determine body types. Compatibility and robustness over elegance was the guiding principle of the working group.
section: "6.4"
topics:
    - email
