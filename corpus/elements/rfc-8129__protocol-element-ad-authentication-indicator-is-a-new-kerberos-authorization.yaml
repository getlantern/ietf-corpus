document: rfc-8129
kind: protocol-element
summary: AD-AUTHENTICATION-INDICATOR is a new Kerberos authorization data type (ad-type 97) that conveys authentication strength information to application services. Its ad-data field contains the DER encoding of a SEQUENCE OF UTF8String, where each string indicates that a particular set of requirements was met during initial authentication.
section: "3"
topics:
