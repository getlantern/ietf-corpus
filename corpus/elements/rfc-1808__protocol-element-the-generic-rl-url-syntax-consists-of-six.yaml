document: rfc-1808
kind: protocol-element
summary: 'The generic-RL URL syntax consists of six components: <scheme>://<net_loc>/<path>;<params>?<query>#<fragment>. Each component except <scheme> may be absent. The fragment identifier is not considered part of the URL but must be recognized and set aside by parsers.'
section: "2.1"
topics:
    - http
