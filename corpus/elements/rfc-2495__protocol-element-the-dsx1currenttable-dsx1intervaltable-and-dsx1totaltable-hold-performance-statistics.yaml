document: rfc-2495
kind: protocol-element
summary: The dsx1CurrentTable, dsx1IntervalTable, and dsx1TotalTable hold performance statistics (ES, SES, SEFS, UAS, CSS, PCV, LES, BES, DM, LCV). Current covers the active 15-minute window; Interval covers the 96 prior 15-minute windows; Total covers the rolling 24-hour sum.
