document: rfc-6780
kind: design-rationale
summary: The ASSOCIATION object was originally defined for GMPLS recovery contexts, but this document generalizes it for broader use across GMPLS LSPs, MPLS LSPs, and non-LSP RSVP sessions to associate RSVP state for resource sharing, voice call-waiting, shared lines, and symmetric NAT scenarios.
