document: rfc-9462
kind: normative-requirement
summary: For Verified Discovery, the client MUST verify that the Designated Resolver's TLS certificate contains the IP address of the designating Unencrypted DNS Resolver in an iPAddress entry of the subjectAltName extension (RFC 5280 Section 4.2.1.6).
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - pkix
    - security
