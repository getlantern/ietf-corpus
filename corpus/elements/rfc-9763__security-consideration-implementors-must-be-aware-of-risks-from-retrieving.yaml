document: rfc-9763
kind: security-consideration
summary: Implementors must be aware of risks from retrieving a related certificate via the UniformResourceIdentifier in relatedCertRequest, as a URL can point to malicious content. Implementations must ensure the retrieved data is properly formed and fully validated before use.
