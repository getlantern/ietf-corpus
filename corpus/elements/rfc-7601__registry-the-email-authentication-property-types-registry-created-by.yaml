document: rfc-7601
kind: registry
summary: The 'Email Authentication Property Types' registry (created by RFC 7410) records ptype names with their definitions and descriptions. Entries require Expert Review. RFC 7601 updates it to reference Section 2.3 of this document as the current definition for the 'body', 'header', 'policy', and 'smtp' entries.
