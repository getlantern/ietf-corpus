document: rfc-4862
kind: state-machine
summary: 'IPv6 addresses transition through four states on an interface: tentative (undergoing DAD, not yet assigned), preferred (unrestricted use), deprecated (discouraged for new communications but still valid), and invalid (lifetime expired, must not be used). Transitions are triggered by DAD completion, preferred lifetime expiry, and valid lifetime expiry.'
section: "2"
topics:
