document: rfc-3253
kind: interoperability-note
summary: All method marshalling and postconditions defined by RFC 2518 and RFC 2616 continue to hold so that versioning-unaware clients can interoperate with versioning servers. The DAV:auto-version property is specifically designed to support versioning-unaware clients that use PUT/PROPPATCH directly.
section: "1.1"
topics:
    - http
