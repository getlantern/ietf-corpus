document: rfc-6130
kind: wire-format
summary: The LOCAL_IF Address Block TLV (Value length = 1 octet) marks each local interface address as THIS_IF (the transmitting MANET interface) or OTHER_IF (another interface of the same router). It MUST be associated with every local address object in HELLO messages.
section: 10.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
