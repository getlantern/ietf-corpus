document: rfc-6052
kind: wire-format
summary: IPv4-embedded IPv6 addresses consist of a variable-length prefix (32, 40, 48, 56, 64, or 96 bits), the 32-bit embedded IPv4 address, a reserved 'u' octet (bits 64–71, MUST be zero) inserted when prefix length is less than 96, and a variable-length suffix. The IPv4 address spans bits split around the 'u' octet for prefix lengths 40, 48, and 56.
section: "2.2"
topics:
