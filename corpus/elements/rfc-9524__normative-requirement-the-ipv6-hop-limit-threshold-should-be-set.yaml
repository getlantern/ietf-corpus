document: rfc-9524
kind: normative-requirement
summary: The IPv6 Hop Limit Threshold SHOULD be set so that an incoming packet can be replicated to the furthest leaf node. A root node encapsulating a payload SHOULD set the IPv6 Hop Limit via local policy to allow packets to reach the furthest leaf.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
