summary: OCP feature and service identifiers are URIs, with IANA managing assignments under http://www.iana.org/assignments/opes/ocp/. Examples from the document include paths for TLS, HTTP response profiles, and encryption schemes. Section 14 (IANA Considerations) governs registration procedures for new OCP features and services.
