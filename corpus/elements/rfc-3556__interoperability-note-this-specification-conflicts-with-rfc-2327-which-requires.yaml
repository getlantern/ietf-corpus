document: rfc-3556
kind: interoperability-note
summary: This specification conflicts with RFC 2327, which requires bandwidth-value for all modifiers to be an integer number of kilobits per second. The RS and RR modifiers use bits per second instead; the SDP specification was being updated to accommodate this semantic change.
section: "2"
topics:
