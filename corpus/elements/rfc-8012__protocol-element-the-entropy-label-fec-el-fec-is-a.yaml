document: rfc-8012
kind: protocol-element
summary: The Entropy Label FEC (EL-FEC) is a new Target FEC Stack sub-TLV (type 33) that identifies an Entropy Label within a label stack. It is needed because the EL is a discretionary-value label (not from the reserved range) and may appear in label stacks without an ELI (e.g., flow-aware pseudowires).
section: "4"
topics:
