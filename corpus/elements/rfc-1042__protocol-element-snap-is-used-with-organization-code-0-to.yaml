document: rfc-1042
kind: protocol-element
summary: SNAP is used with Organization Code 0 to indicate that the following 16 bits are an EtherType code as listed in Assigned Numbers. This allows 802 networks to reuse existing EtherType assignments without new LSAP allocations.
