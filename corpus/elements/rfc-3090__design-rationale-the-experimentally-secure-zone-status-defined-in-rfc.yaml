document: rfc-3090
kind: design-rationale
summary: The 'experimentally secure' zone status defined in RFC 2535 is deprecated. Its purpose—facilitating migration from unsecured to secured—can be achieved via locally secured zones by publishing signatures and pre-configuring test resolvers, without needing a separate designation.
section: "3"
topics:
    - dns
    - security
