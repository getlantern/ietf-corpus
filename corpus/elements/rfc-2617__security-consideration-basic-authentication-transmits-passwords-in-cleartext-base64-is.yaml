document: rfc-2617
kind: security-consideration
summary: Basic authentication transmits passwords in cleartext (base64 is encoding, not encryption) and is vulnerable to eavesdropping, server spoofing, and password reuse attacks across sites. Administrators who allow user-chosen passwords expose all users to unauthorized access wherever those passwords are reused.
section: "4.1"
topics:
    - http
    - security
