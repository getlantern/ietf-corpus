document: rfc-9262
kind: normative-requirement
summary: Every BP in a BIER-TE BIFT MUST support having zero or one adjacency. BIER-TE forwarding MUST support forward_connected() (with DNC not set), forward_routed(), and local_decap() adjacency types.
