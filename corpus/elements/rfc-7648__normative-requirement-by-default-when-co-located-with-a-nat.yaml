document: rfc-7648
kind: normative-requirement
summary: By default, when co-located with a NAT, the proxy MUST relay unknown Opcodes and mandatory-to-process unknown options upstream. Rejecting them would prevent clients from using new PCP server capabilities not yet supported by the proxy.
section: 3.4.2
rfc2119_level: MUST
topics:
    - pcp
    - nat
