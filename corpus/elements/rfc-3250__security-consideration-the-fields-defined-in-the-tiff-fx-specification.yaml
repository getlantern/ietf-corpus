document: rfc-3250
kind: security-consideration
summary: The fields defined in the TIFF-FX specification are descriptive and do not induce particular behavior by the recipient application, so they do not in themselves create additional security risks. However, TIFF-FX's extensible structure theoretically allows future fields that could induce recipient actions, though this is inconsistent with the goals of the specification.
section: "5"
topics:
    - security
