document: rfc-4605
kind: design-rationale
summary: IGMP/MLD-based forwarding is restricted to a simple manually-configured tree topology because no spanning tree protocol is specified. More complex topologies, desired failover, or multi-domain scenarios require a full multicast routing protocol.
section: "1.2"
topics:
