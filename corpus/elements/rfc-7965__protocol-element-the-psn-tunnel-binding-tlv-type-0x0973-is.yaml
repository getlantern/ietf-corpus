document: rfc-7965
kind: protocol-element
summary: The PSN Tunnel Binding TLV (type 0x0973) is a new optional TLV carried in LDP Label Mapping messages to communicate tunnel/LSP selection and binding requests between PEs. It contains a Flags field (C, S, T bits) and a PSN Tunnel Sub-TLV specifying the tunnel/LSP to bind.
section: "3.1"
topics:
