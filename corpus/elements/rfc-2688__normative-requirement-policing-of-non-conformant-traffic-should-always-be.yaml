document: rfc-2688
kind: normative-requirement
summary: Policing of non-conformant traffic SHOULD always be done at the granularity of individual packets. When dropping non-conformant traffic, a network element SHOULD drop entire packets rather than individual fragments.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - qos
    - realtime
