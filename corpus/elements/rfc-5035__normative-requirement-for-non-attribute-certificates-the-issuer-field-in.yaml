document: rfc-5035
kind: normative-requirement
summary: For non-attribute certificates, the issuer field in IssuerSerial MUST contain only the issuer name from the certificate encoded in the directoryName choice of GeneralNames. For attribute certificates, it MUST contain the issuer name field from the attribute certificate.
section: "4"
rfc2119_level: MUST
topics:
