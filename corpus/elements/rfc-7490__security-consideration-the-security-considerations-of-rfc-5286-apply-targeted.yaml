document: rfc-7490
kind: security-consideration
summary: The security considerations of RFC 5286 apply. Targeted LDP sessions and MPLS tunnels are normal MPLS features and raise no additional security concerns in this application. IP repair tunnel endpoints SHOULD be assigned from addresses not reachable from outside the routing domain to prevent use as attack vectors, and the repair tunnel MUST NOT be advertised for normal traffic.
section: "12"
topics:
    - security
    - routing
