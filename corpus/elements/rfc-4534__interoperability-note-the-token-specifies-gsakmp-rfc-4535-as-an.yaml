summary: The token specifies GSAKMP (RFC 4535) as an example GroupMngmtProtocol for registration and rekey; the ASN.1 modules for registration (OID 1.3.6.1.5.5.12.0.2), de-registration (.0.3), and rekey (.0.4) are defined as separate importable modules to support interoperability with GSAKMP implementations.
