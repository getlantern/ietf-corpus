document: rfc-5357
kind: normative-requirement
summary: The Session-Reflector MUST transmit a test packet to the Session-Sender in response to each packet it receives, generating the response as immediately as possible. The Reflector MUST enter the best possible approximation of actual sending time as its Timestamp before transmission.
section: "4.2"
rfc2119_level: MUST
topics:
    - measurement
