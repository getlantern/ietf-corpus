document: rfc-5464
kind: wire-format
summary: Entry names are encoded as IMAP astrings (slash-separated paths). Values are encoded as nstring or literal8, allowing NIL, quoted strings, or binary literals. Multi-line string values MUST use CRLF (0x0D 0x0A) to represent line endings. The ABNF is defined in Section 5.
section: "5"
