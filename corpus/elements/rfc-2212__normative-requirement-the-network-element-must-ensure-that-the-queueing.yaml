document: rfc-2212
kind: normative-requirement
summary: The network element MUST ensure that the queueing delay of any datagram is less than b/R + C/R + D, where C and D are the maximum local deviations from the fluid model. C and D are worst-case maximums; implementations with occasional service gaps must set D large enough to cover those gaps.
section: Network Element Data Handling Requirements
rfc2119_level: MUST
topics:
    - qos
    - realtime
