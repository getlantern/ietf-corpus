document: rfc-3629
kind: protocol-element
summary: The valid UTF-8 code point range is U+0000 to U+10FFFF (the UTF-16 accessible range). Code points U+D800 through U+DFFF (UTF-16 surrogate pairs) are explicitly prohibited in UTF-8 and must not be directly encoded.
section: "3"
