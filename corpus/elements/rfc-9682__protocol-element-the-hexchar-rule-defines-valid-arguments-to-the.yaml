document: rfc-9682
kind: protocol-element
summary: 'The hexchar rule defines valid arguments to the \u escape: a braced form ''{'' (1*''0'' [hexscalar] / hexscalar) ''}'', a non-surrogate four-hex-digit form, or a high-surrogate / ''\u'' / low-surrogate surrogate pair sequence. The hexscalar rule covers all valid Unicode scalar values up to U+10FFFF.'
