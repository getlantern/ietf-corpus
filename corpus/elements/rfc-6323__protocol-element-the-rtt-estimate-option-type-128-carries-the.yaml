document: rfc-6323
kind: protocol-element
summary: The RTT Estimate Option (type 128) carries the sender's current RTT estimate to the receiver. It has a variable length of 3, 4, or 5 bytes, with 1, 2, or 3 value bytes encoding the RTT in microseconds. The option may be placed in any DCCP packet and is flagged as usable in DCCP Data packets.
section: 3.2.1
topics:
    - congestion
