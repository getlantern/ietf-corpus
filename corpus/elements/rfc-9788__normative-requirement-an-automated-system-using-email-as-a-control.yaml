document: rfc-9788
kind: normative-requirement
summary: An automated system using email as a control channel that depends on a message's cryptographic signature MUST rely on Header Fields from within the Cryptographic Payload and MUST NOT rely on any Header Field found outside it.
section: 4.8.1
rfc2119_level: MUST
topics:
    - email
    - security
