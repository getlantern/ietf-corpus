document: rfc-4944
kind: protocol-element
summary: For an interface using a 16-bit short address, the Interface Identifier is derived by constructing a pseudo 48-bit address as PAN_ID:16_zero_bits:16_bit_short_address and processing it per RFC 2464 (IPv6 over Ethernet). The U/L bit SHALL be set to zero because this is not a globally unique value.
section: "6"
rfc2119_level: SHALL
