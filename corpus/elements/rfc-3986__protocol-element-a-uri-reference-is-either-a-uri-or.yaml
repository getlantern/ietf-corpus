document: rfc-3986
kind: protocol-element
summary: A URI-reference is either a URI or a relative-ref. If the prefix does not match a scheme followed by ":", it is a relative reference. Relative references are further classified as network-path ("//"-prefixed), absolute-path ("/"-prefixed), or relative-path.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
