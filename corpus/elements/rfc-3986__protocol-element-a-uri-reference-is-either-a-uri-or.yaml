document: rfc-3986
kind: protocol-element
summary: A URI-reference is either a URI or a relative-ref. A relative reference is identified when its prefix does not match a scheme followed by ":". Relative references may be network-path ("//"-prefixed), absolute-path ("/"-prefixed), or relative-path (no slash prefix).
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
