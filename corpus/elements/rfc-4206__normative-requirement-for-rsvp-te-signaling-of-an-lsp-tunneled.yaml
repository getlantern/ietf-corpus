document: rfc-4206
kind: normative-requirement
summary: For RSVP-TE signaling of an LSP tunneled over an FA-LSP, the Path message MUST contain an IF_ID RSVP_HOP object instead of an RSVP_HOP object, and the data interface identification MUST identify the FA-LSP.
