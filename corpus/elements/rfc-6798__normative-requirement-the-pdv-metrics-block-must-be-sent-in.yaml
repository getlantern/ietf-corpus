document: rfc-6798
kind: normative-requirement
summary: The PDV Metrics Block MUST be sent in the same compound RTCP packet as the Measurement Information Block, which provides the measurement interval. If the measurement interval is not received for this metric block, the block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
