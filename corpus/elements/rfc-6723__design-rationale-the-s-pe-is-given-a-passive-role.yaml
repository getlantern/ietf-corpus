document: rfc-6723
kind: design-rationale
summary: The S-PE is given a passive role for processing Label Request messages (mirroring its passive role for Label Mapping messages defined in RFC 6073) because S-PEs lack complete interface-parameter information for the FEC, so they must relay rather than originate Label Request messages.
