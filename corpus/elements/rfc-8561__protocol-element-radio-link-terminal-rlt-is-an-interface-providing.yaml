document: rfc-8561
kind: protocol-element
summary: Radio Link Terminal (RLT) is an interface providing packet and/or TDM capacity to associated Ethernet and/or TDM interfaces in a node, used for setting up a transport service over a microwave/millimeter wave link. It is represented in YANG as an interface of type 'microwaveRadioLinkTerminal' (ifType decimal 296).
section: "1.1"
topics:
