document: rfc-5444
kind: protocol-element
summary: A packet contains a mandatory Packet Header followed by zero or more messages. Packet length is determined by the encapsulating datagram; no explicit packet-length field is carried. A packet with zero messages is permitted when the only information is in the Packet Header TLVs.
section: "5.1"
topics:
    - routing
