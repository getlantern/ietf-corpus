document: rfc-2782
kind: design-rationale
summary: The Weight field is intentionally limited to static server selection (e.g., 'this machine is three times as fast'). Using SRV weight for dynamic load balancing would require unreasonably short TTLs, undermining DNS caching and increasing network load.
section: The "Weight" field
topics:
    - dns
