document: rfc-5098
kind: normative-requirement
summary: The MTA MUST NOT update pktcSigDefMediaStreamDscp with the value supplied by the CMS in NCS messages. When the value is updated via SNMP, the new value MUST be used only for new connections, and currently active connections are not affected.
section: "5"
rfc2119_level: MUST NOT
topics:
    - snmp
    - voip
    - diffserv
