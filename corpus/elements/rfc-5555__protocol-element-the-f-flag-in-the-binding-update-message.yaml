document: rfc-5555
kind: protocol-element
summary: The F flag in the Binding Update message, when set, requests forced UDP encapsulation regardless of NAT presence on the path between the mobile node and the home agent. It SHOULD NOT be set when the mobile node has an IPv6 care-of address except in specific fallback scenarios.
section: 3.1.3
topics:
    - mobility
    - nat
    - udp
