document: rfc-8512
kind: normative-requirement
summary: A CGN must implement a protocol giving subscribers explicit control over NAT mappings (REQ-9 of RFC 6888); that protocol should be PCP (RFC 6887). Dynamic explicit mappings via PCP are out of scope of this module but must be supported at the device level.
section: "2.1"
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
