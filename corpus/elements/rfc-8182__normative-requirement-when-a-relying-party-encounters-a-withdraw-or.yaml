document: rfc-8182
kind: normative-requirement
summary: When a Relying Party encounters a 'withdraw' or replacement 'publish' element in a Delta File, it MUST verify the object to be withdrawn or replaced was retrieved from the same Repository Server before acting; failing to do so leaves the Relying Party vulnerable to malicious servers deleting or changing arbitrary objects.
section: 3.4.2
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
