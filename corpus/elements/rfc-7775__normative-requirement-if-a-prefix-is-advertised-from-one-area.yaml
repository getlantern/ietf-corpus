document: rfc-7775
kind: normative-requirement
summary: If a prefix is advertised from one area to another at the same level (e.g., L1-to-L1 or L2-to-L2 via multiple IS-IS instances), the up/down bit SHALL be set to 1, as specified in RFC 5305 Section 4.1.
