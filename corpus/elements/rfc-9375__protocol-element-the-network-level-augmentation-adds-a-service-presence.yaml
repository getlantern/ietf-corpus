document: rfc-9375
kind: protocol-element
summary: The network-level augmentation adds a 'service' presence container to '/nw:networks/nw:network/nw:network-types'. When present, it carries 'service-type' (mandatory, e.g., L3VPN or VPLS), 'vpn-id', and 'vpn-service-topology' (any-to-any, hub-spoke, hub-spoke-disjoint).
