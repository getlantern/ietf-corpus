document: rfc-2401
kind: design-rationale
summary: IPsec is designed to be algorithm-independent so that different user communities can select different algorithm sets (creating cliques if required). A standard set of default algorithms is specified to facilitate interoperability in the global Internet while retaining modularity.
section: "2.1"
topics:
