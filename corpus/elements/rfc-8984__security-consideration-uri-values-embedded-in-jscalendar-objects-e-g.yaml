document: rfc-8984
kind: security-consideration
summary: URI values embedded in JSCalendar objects (e.g., in Link.href, VirtualLocation.uri, Location.coordinates) may reference dangerous resources. Implementations should validate and sanitize URIs before use, particularly 'data:' URLs which can embed arbitrarily large content.
section: "7.3"
topics:
    - security
    - json
