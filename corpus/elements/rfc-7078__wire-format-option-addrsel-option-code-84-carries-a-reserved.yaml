document: rfc-7078
kind: wire-format
summary: OPTION_ADDRSEL (option-code 84) carries a Reserved field, a 1-bit Automatic Row Addition flag (A), a 1-bit Privacy Preference flag (P), and zero or more POLICY TABLE OPTIONS of variable length. The option-len covers the Reserved byte, the flags, and all nested policy table options.
