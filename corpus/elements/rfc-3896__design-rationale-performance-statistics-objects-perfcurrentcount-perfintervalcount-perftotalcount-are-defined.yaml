document: rfc-3896
kind: design-rationale
summary: Performance statistics objects (PerfCurrentCount, PerfIntervalCount, PerfTotalCount) are defined as Gauge32 rather than Counter32 because these objects can decrease. Specifically, UAS and related counts may be retroactively adjusted when the 10-second UAS determination window crosses a 15-minute interval boundary.
section: 2.4.2
