document: rfc-7843
kind: normative-requirement
summary: The THIRD_PARTY_ID option should not be included unless the PCP client is certain that a mapping without the THIRD_PARTY_ID is impossible, since it is in the mandatory-to-process range and a server not supporting it will reject the entire request.
section: "4"
rfc2119_level: SHOULD NOT
topics:
