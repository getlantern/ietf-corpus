document: rfc-5537
kind: normative-requirement
summary: An injecting agent MUST reject any proto-article that lacks required mandatory header fields, contains Injection-Info or Xref header fields, has a Path header field containing the 'POSTED' diag-keyword, or is syntactically invalid per RFC 5536.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
