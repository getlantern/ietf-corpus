document: rfc-4429
kind: normative-requirement
summary: A node MUST NOT send a Router Solicitation with a Source Link-Layer Address Option (SLLAO) from an Optimistic Address. Router Solicitations SHOULD be sent from a non-Optimistic or the Unspecified Address; they MAY be sent from an Optimistic Address only if the SLLAO is omitted.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
