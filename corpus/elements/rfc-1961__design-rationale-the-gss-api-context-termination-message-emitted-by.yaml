document: rfc-1961
kind: design-rationale
summary: The GSS-API context termination message emitted by gss_delete_sec_context is not used by this protocol; instead, each peer calls gss_delete_sec_context with GSS_C_NO_BUFFER when the connection is closed. This avoids an additional protocol round-trip for teardown.
section: "6"
topics:
    - security
