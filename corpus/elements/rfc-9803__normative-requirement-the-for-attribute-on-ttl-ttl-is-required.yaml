document: rfc-9803
kind: normative-requirement
summary: 'The ''for'' attribute on <ttl:ttl> is REQUIRED in both commands and responses, and MUST have one of the values: NS, DS, DNAME, A, AAAA, or custom. If ''for'' is ''custom'', the element MUST also have a ''custom'' attribute containing a DNS record type conforming to the regex in RFC 6895 Section 3.1 and registered in IANA-RRTYPES.'
section: 1.2.1
rfc2119_level: REQUIRED
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
