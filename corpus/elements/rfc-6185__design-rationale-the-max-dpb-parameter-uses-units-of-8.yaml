document: rfc-6185
kind: design-rationale
summary: The max-dpb parameter uses units of 8/3 macroblocks (changed from 1024 bytes in RFC 3984) to maintain backward compatibility with RFC 3984 while also supporting all profiles defined in the 2010 H.264 specification, which added color formats and bit depths not supported earlier.
