document: rfc-3995
kind: protocol-element
summary: '''notify-events'' (1setOf type2 keyword) contains the set of Subscribed Events. A Printer MUST support this attribute and MUST support at least 2 values per Subscription Object. If the client supplies too many values (exceeding ''notify-max-events-supported''), the Printer treats extra values as unsupported and returns ''successful-ok-too-many-events''.'
section: 5.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
