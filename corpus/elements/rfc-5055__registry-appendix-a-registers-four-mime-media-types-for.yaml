document: rfc-5055
kind: registry
summary: 'Appendix A registers four MIME media types for SCVP: application/scvp-cv-request (certificate validation request), application/scvp-cv-response (certificate validation response), application/scvp-vp-request (validation policy request), and application/scvp-vp-response (validation policy response). When CVRequest is encapsulated in a MIME body part, application/scvp-cv-request MUST be used.'
section: A
