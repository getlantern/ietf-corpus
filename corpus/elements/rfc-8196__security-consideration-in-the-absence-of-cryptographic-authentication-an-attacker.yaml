document: rfc-8196
kind: security-consideration
summary: In the absence of cryptographic authentication, an attacker can inject a PDU falsely indicating a duplicate System ID, triggering an automatic protocol restart via the duplicate-ID resolution procedures. Authentication is fundamentally incompatible with autoconfiguration because it requires manual configuration.
section: "4"
topics:
    - security
    - routing
