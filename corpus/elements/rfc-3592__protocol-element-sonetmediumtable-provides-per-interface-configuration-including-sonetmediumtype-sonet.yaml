document: rfc-3592
kind: protocol-element
summary: sonetMediumTable provides per-interface configuration including sonetMediumType (sonet/sdh), sonetMediumLineCoding (B3ZS, CMI, NRZ, RZ), sonetMediumLineType (short/long single-mode, multi-mode, coax, UTP), sonetMediumCircuitIdentifier (DisplayString, 0-255 octets), sonetMediumLoopbackConfig (BITS), and sonetSESthresholdSet. Objects are MAX-ACCESS read-write to support circuit provisioning.
section: "4.1"
topics:
    - snmp
