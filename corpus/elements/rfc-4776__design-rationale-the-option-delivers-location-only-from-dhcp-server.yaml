document: rfc-4776
kind: design-rationale
summary: The option delivers location only from DHCP server to client (not the reverse) because of security concerns related to using DHCP to update a location database. The GEOPRIV architecture classifies this as a 'sighting function', which requires no security capabilities and is only for trusted environments.
section: "1"
topics:
    - security
