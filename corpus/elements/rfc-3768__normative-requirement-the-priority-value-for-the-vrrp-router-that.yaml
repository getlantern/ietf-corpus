document: rfc-3768
kind: normative-requirement
summary: The priority value for the VRRP router that owns the IP address(es) associated with the virtual router MUST be 255 (decimal). This router always preempts regardless of the Preempt_Mode setting.
section: 5.3.4
rfc2119_level: MUST
