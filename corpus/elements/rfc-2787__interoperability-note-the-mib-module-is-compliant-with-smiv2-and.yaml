document: rfc-2787
kind: interoperability-note
summary: The MIB module is compliant with SMIv2 and semantically identical to SMIv1 definitions. Translation to SMIv1 is possible except where Counter64 objects are used (which have no SMIv1 equivalent) and some machine-readable SMIv2 information becomes textual descriptions.
