document: rfc-8082
kind: protocol-element
summary: Picture Loss Indication (PLI, RFC 4585 Section 6.3.1) requires no specification update for layered codecs. Upon receipt for an enhancement layer, the encoder should repair that layer and all dependent enhancement layers; reference layers do not need repair and the encoder can determine dependent layers autonomously.
section: "6.1"
topics:
    - rtp
    - realtime
