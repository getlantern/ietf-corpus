document: rfc-7578
kind: wire-format
summary: The multipart/form-data body is encoded as BINARY in common use. The 'boundary' parameter is required in the Content-Type header. Each part is delimited by CRLF + '--' + boundary value, with a closing delimiter of CRLF + '--' + boundary + '--'.
