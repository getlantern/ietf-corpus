document: rfc-9520
kind: protocol-element
summary: A delegation loop occurs when two or more domains circularly reference each other's name servers in their NS RRsets, making all names under the involved zones unresolvable. Undetected loops can generate DDoS-level traffic (TsuNAME vulnerability).
section: "2.4"
topics:
    - dns
    - security
