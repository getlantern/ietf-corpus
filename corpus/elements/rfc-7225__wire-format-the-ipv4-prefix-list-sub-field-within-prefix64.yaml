document: rfc-7225
kind: wire-format
summary: The IPv4 Prefix List sub-field within PREFIX64 contains an IPv4 Prefix Count (2 octets) followed by one or more entries each comprising IPv4 Prefix Length (2 octets) and IPv4 Address (32 bits). An empty list (count=0) MUST appear in requests.
