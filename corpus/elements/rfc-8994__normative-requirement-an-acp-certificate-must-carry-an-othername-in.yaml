document: rfc-8994
kind: normative-requirement
summary: An ACP certificate MUST carry an otherName in the X.509 SubjectAlternativeName extension containing a syntactically valid AcpNodeName. Nodes MUST be able to receive their ACP address via the 32HEXDIG acp-address field and MUST also be able to authenticate peers whose acp-address is '0' (address determined by other means) or whose acp-address is omitted (non-secure-channel domain members).
section: 6.2.2
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
