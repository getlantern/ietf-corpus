document: rfc-9209
kind: protocol-element
summary: The 'next-hop' parameter is a String or Token identifying the intermediary or origin server selected (and used, if contacted) to obtain the response. Its value may be a hostname, IP address, or alias; e.g., 'next-hop=backend.example.org:8001'.
section: 2.1.2
