document: rfc-2494
kind: protocol-element
summary: The DS0 MIB defines managed objects for individual DS0 channels within a DS1 or E1 interface, using ifType ds0(81). Each DS0 is represented as an entry in the ifTable, with ifSpeed set to 64000 regardless of robbed bit signalling settings.
