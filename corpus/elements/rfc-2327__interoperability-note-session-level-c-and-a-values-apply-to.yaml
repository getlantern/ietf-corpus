document: rfc-2327
kind: interoperability-note
summary: Session-level 'c=' and 'a=' values apply to all media streams unless overridden by per-media 'c=' fields or same-named attributes in the media description. Attribute values are NOT normally affected by the 'charset' attribute unless the attribute definition explicitly states it is charset-dependent.
section: "6"
topics:
