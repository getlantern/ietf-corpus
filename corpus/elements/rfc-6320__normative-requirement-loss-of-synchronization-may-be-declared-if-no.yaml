document: rfc-6320
kind: normative-requirement
summary: Loss of synchronization MAY be declared if no valid ANCP messages are received within three times the negotiated Timer value, or if a mismatch in adjacency state is detected. In either case, the detecting peer MUST send an RSTACK to initiate resynchronization.
section: 3.5.2.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
