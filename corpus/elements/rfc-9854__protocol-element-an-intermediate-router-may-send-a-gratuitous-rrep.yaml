document: rfc-9854
kind: protocol-element
summary: An intermediate router MAY send a Gratuitous RREP-DIO (G bit=1) back to OrigNode when it already holds valid upward and downward routes to TargNode satisfying the OF and with a sufficiently fresh Destination Sequence Number, allowing OrigNode to begin sending data before the RREQ reaches TargNode. Upstream routers receiving a G-RREP MUST also generate and forward a G-RREP upstream.
section: "7"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
