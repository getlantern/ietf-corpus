document: rfc-9569
kind: protocol-element
summary: The TIPSReq object (media type 'application/alto-tipsparams+json') is sent via HTTP POST to open a TIPS view. It contains a mandatory 'resource-id' field, an optional 'tag' field (the client's current version tag for incremental starting point selection), and an optional 'input' field required for POST-mode filtered services.
section: "6.1"
