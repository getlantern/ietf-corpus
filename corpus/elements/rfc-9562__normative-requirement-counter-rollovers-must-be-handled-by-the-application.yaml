document: rfc-9562
kind: normative-requirement
summary: Counter rollovers MUST be handled by the application to avoid sorting issues. Applications concerned with absolute monotonicity SHOULD freeze the counter and wait for the timestamp to advance; alternatively implementations MAY increment the timestamp ahead of actual time and reinitialize the counter.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
