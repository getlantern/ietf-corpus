document: rfc-6106
kind: protocol-element
summary: The Resolver Repository (e.g., Unix /etc/resolv.conf or Windows registry) is the user-space configuration consumed by the DNS resolver. New RDNSS addresses and DNSSL domain names are inserted at the front of the Resolver Repository in the order they appear within an option, establishing query preference.
