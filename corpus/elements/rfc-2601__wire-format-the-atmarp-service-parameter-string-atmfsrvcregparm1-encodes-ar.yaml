document: rfc-2601
kind: wire-format
summary: 'The ATMARP service parameter string (atmfSrvcRegParm1) encodes: ar$pro (16 bits, protocol type), ar$plen (8 bits, length of protocol address), ar$addr (plen octets, network address in network byte order), and ar$mask (plen octets, network mask in network byte order). For IPv4, ar$pro=0x0800 and ar$plen=4; for IPv6, ar$pro=0x86DD and ar$plen=16.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
