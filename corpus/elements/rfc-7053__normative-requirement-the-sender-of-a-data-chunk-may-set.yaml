document: rfc-7053
kind: normative-requirement
summary: The sender of a DATA chunk MAY set the I bit whenever it can benefit from the corresponding SACK being returned without delay. The reason the sender has set the I bit is irrelevant to the receiver.
section: "5.1"
rfc2119_level: MAY
