document: rfc-8435
kind: normative-requirement
summary: Synthetic uids and gids of 0 SHOULD be avoided under AUTH_SYS, as uid 0 typically grants super access or maps to an anonymous id, either of which could allow a fenced client to continue accessing the data file.
section: 2.2.1
rfc2119_level: SHOULD
topics:
    - security
