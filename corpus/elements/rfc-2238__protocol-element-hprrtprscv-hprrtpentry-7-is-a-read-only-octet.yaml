document: rfc-2238
kind: protocol-element
summary: hprRtpRscv (hprRtpEntry 7) is a read-only OCTET STRING of SIZE 0..255 carrying the forward Route Selection Control Vector for the RTP connection. The value returned during an active path switch is implementation-dependent and may be the old path, the new path, or a zero-length string.
