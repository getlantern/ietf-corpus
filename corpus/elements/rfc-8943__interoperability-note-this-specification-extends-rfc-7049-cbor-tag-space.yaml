document: rfc-8943
kind: interoperability-note
summary: This specification extends RFC 7049 CBOR tag space, which already defines tag 0 (RFC 3339 date/time string) and tag 1 (POSIX seconds since epoch). Tags 1004 and 100 address the distinct need for date-only (no time) representations not covered by those existing tags.
