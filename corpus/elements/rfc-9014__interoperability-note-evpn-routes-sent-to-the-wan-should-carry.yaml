document: rfc-9014
kind: interoperability-note
summary: EVPN routes sent to the WAN SHOULD carry a different RD than those sent to the DC, and separate route targets are expected for the same EVI in WAN versus DC, to facilitate independent BGP processes and distinct RFC 9012 BGP encapsulation extended community values.
section: 4.4.1
topics:
    - routing
    - bgp
