document: rfc-9867
kind: security-consideration
summary: Symmetric key cryptographic primitives used for PPK-derived keys are believed to be unaffected by a CRQC, per the analysis in RFC 9370 Section 4. The PPK mechanism's security therefore does not depend on the classical DH or signature algorithms also used in IKEv2.
section: "4"
topics:
    - ipsec
    - vpn
    - security
    - crypto
