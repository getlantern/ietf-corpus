document: rfc-2630
kind: normative-requirement
summary: Signed attributes and authenticated attributes must be transmitted in DER form; they are the only CMS types requiring DER. All other CMS data may use indefinite-length BER to support single-pass processing.
section: "2"
rfc2119_level: MUST
topics:
