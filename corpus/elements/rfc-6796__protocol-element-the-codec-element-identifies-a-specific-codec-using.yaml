document: rfc-6796
kind: protocol-element
summary: The <codec> element identifies a specific codec using a <media-type-subtype> child (e.g., 'audio/PCMA') and optional <mime-parameter> children for encoding or profile specifics. For audio/video it MUST be a registered RTP Payload Type; for other media types it MUST contain the media type and format (e.g., 'message/msrp').
section: "6.2"
topics:
    - sip
    - realtime
