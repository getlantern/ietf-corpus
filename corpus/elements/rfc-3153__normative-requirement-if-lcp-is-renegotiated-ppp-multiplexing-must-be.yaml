document: rfc-3153
kind: normative-requirement
summary: If LCP is renegotiated, PPP Multiplexing MUST be disabled until PPPMuxCP is renegotiated. LCP Configure Request, ACK, NAK, and Reject frames and PPP Multiplexed frames themselves MUST NOT appear as subframes in the Information Field.
section: "1.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
