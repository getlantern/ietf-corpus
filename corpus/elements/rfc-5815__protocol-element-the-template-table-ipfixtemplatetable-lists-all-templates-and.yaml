document: rfc-5815
kind: protocol-element
summary: The Template Table (ipfixTemplateTable) lists all Templates and Options Templates transmitted or received, indexed by Transport Session, Observation Domain Id, and Template Id. It records the Set Id (2 for Templates, 3 for Options Templates) and the last access time used to manage UDP template refresh and expiry.
