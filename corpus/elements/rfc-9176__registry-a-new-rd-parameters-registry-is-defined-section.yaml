document: rfc-9176
kind: registry
summary: A new 'RD Parameters' registry is defined (Section 9.3) for parameters used in registration and lookup queries. Each entry has a name, validity (for registration/lookup), use as endpoint attribute, and description. Initial entries include ep, d, lt, base, extra-attrs, and et.
