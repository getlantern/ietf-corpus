document: rfc-2997
kind: normative-requirement
summary: If only the Null Service is offered in the ADSPEC, the Null Service Tspec is the only Tspec included in the SENDER_TSPEC object. If Guaranteed or Controlled Load services are also offered, the Null Service Tspec is appended following the standard Intserv token-bucket Tspec.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - qos
