document: rfc-9786
kind: protocol-element
summary: For Port-Active mode, the modulo-based DF election algorithm operates at ES granularity only. The PE with ordinal i is the DF for an ES when (Es mod N) = i, where Es represents bytes 3-6 of the ESI and N is the redundancy group size. Bytes 3-6 are chosen because operators typically differentiate ESIs within these bytes.
section: "3.2"
topics:
    - routing
    - bgp
