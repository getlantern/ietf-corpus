document: rfc-1420
kind: interoperability-note
summary: Although SNMP does not require implementations to accept messages exceeding 484 bytes, 546 bytes is the IPX maximum and is guaranteed to traverse IPX routers that do not provide fragmentation. Longer packets may be used if the actual maximum along the path is known.
section: "2.3"
topics:
    - snmp
