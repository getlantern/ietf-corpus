document: rfc-7307
kind: normative-requirement
summary: The S-bit in the MT Capability TLV MUST be 1 if used in an LDP Initialization message. MAY be set to 0 or 1 in a dynamic Capability message to advertise or withdraw the capability, respectively.
section: 3.5.1
