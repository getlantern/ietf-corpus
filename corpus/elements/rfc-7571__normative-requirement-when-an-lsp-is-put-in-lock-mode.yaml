document: rfc-7571
kind: normative-requirement
summary: When an LSP is put in lock mode, subsequent Path and Resv messages MUST keep the A bit in the ADMIN_STATUS Object set. When taken out of lock mode, subsequent messages MUST keep the A bit cleared.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
