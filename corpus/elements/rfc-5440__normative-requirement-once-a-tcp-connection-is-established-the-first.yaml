document: rfc-5440
kind: normative-requirement
summary: Once a TCP connection is established, the first message sent by either peer MUST be an Open message. Any message received prior to an Open message MUST trigger a PCErr with Error-Type 'PCEP session establishment failure' and the TCP connection MUST be immediately closed.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
