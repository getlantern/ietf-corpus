document: rfc-3559
kind: protocol-element
summary: 'The mallocCapabilities object is a BITS scalar with three flags: startTime(0) indicates support for future-start-time allocations, serverMobility(1) indicates allocations can be renewed or released from a server other than the one granting the original allocation, and retryAfter(2) indicates support for a waiting state where the client may check back later.'
section: "4"
topics:
    - multicast
