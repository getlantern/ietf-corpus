document: rfc-4348
kind: interoperability-note
summary: To maintain interoperability with AMR-WB, a VMR-WB-enabled terminal SHOULD also declare itself capable of AMR-WB with a limited mode set (AMR-WB codec modes 0, 1, and 2 only) and octet-aligned operation in SDP offer-answer exchanges.
section: "9.3"
rfc2119_level: SHOULD
