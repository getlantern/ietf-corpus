document: rfc-1398
kind: protocol-element
summary: The full-duplex loopback test (testFullDuplexLoopBack, defined in RFC 1229) configures the MAC chip and executes an internal loopback test of memory and MAC logic. It can only run while the interface is offline, and the interface should remain offline after test completion.
