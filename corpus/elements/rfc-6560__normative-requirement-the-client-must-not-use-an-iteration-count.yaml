document: rfc-6560
kind: normative-requirement
summary: The client MUST NOT use an iteration count lower than that specified by the KDC in the PA-OTP-CHALLENGE; it MAY use a larger value. The chosen value MUST be returned in the iterationCount field of the PA-OTP-REQUEST.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
