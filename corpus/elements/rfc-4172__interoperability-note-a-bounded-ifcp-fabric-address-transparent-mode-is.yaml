document: rfc-4172
kind: interoperability-note
summary: A bounded iFCP fabric (address transparent mode) is limited to a combined total of 239 gateways and Fibre Channel switch elements due to the FC Domain ID allocation range of 1–239. This constraint does not apply to unbounded iFCP fabrics in address translation mode, where inter-region addressing is not subject to FC limits.
section: 4.3.2
topics:
