document: rfc-4848
kind: normative-requirement
summary: When the 'U' flag is present in a NAPTR record under U-NAPTR, the REGEXP field MUST be populated and the REPLACEMENT field must be empty. The regular expression must match the limited form defined in Section 2.2.
section: "2.1"
rfc2119_level: MUST
