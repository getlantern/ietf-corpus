document: rfc-5027
kind: normative-requirement
summary: During the delay imposed by a mandatory security precondition, alerting of the called party MUST NOT occur and media for which security is being negotiated MUST NOT be exchanged until the precondition is satisfied. Non-media data (e.g., ICE connectivity checks) is allowed prior to satisfaction.
section: "3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
