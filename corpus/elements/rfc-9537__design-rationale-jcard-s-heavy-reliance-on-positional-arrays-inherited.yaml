document: rfc-9537
kind: design-rationale
summary: jCard's heavy reliance on positional arrays (inherited from vCard) necessitates the Redaction by Empty Value Method for required properties like "fn", since removing array elements would produce non-conformant jCard and jCard extensions like JSContact avoid this issue entirely.
