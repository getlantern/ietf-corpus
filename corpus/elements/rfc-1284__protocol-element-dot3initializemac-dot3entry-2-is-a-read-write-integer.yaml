document: rfc-1284
kind: protocol-element
summary: 'dot3InitializeMac (dot3Entry 2) is a read-write INTEGER with values initialized(1) or uninitialized(2). Any write to either value invokes the initializeMAC action: all MAC/PLS counters reset to zero, receive and transmit are enabled, promiscuous receive is disabled, and multicast reception is disabled.'
section: "5.1"
topics:
