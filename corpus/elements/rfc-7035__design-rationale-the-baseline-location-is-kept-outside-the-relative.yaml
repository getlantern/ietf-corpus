document: rfc-7035
kind: design-rationale
summary: The baseline location is kept outside the <relative-location> element so that clients not understanding relative location still receive a usable (if less precise) location. The baseline is intended to encompass both the reference and offset regions, not to pinpoint the reference point itself.
section: "3"
extracted_by: claude-sonnet-4-6
