document: rfc-9711
kind: security-consideration
summary: The trustworthiness of EAT claims depends entirely on the security level of the attesting environment. Claims from a TEE or Secure Element with hardware defenses carry significantly more weight than claims from a software-only attester with no special protections.
section: "9.1"
topics:
    - security
