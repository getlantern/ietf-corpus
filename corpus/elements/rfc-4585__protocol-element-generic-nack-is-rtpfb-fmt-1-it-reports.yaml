document: rfc-4585
kind: protocol-element
summary: Generic NACK is RTPFB FMT=1. It reports loss of one or more RTP packets by sequence number and bitmask, and SHOULD NOT be used when the underlying transport (e.g., DCCP) already provides equivalent loss feedback to the sender.
section: 6.2.1
topics:
