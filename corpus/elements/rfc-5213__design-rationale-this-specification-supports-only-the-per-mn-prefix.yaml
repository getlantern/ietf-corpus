document: rfc-5213
kind: design-rationale
summary: This specification supports only the Per-MN-Prefix model and explicitly does not support the Shared-Prefix model. Home network prefixes assigned to a mobile node are for that node's exclusive use, ensuring unambiguous routing and binding cache lookups across the PMIPv6 domain.
section: "5.2"
topics:
    - mobility
    - ip
