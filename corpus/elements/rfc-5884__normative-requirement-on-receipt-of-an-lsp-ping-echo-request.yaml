document: rfc-5884
kind: normative-requirement
summary: On receipt of an LSP Ping Echo request, the egress LSR MUST send a BFD Control packet to the ingress LSR if FEC validation succeeds; this packet MUST set the Your Discriminator field to the discriminator received from the ingress LSR.
