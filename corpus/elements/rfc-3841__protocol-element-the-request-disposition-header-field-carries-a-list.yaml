document: rfc-3841
kind: protocol-element
summary: 'The Request-Disposition header field carries a list of directive tokens grouped by type: proxy-directive (proxy/redirect), cancel-directive (cancel/no-cancel), fork-directive (fork/no-fork), recurse-directive (recurse/no-recurse), parallel-directive (parallel/sequential), and queue-directive (queue/no-queue). Only one directive of each type is permitted per request.'
section: "9.1"
topics:
