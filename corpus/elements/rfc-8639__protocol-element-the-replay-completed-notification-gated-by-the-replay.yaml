document: rfc-8639
kind: protocol-element
summary: The 'replay-completed' notification (gated by the 'replay' feature) signals that all historical event records have been delivered to a receiver. It is sent before any notification message with a timestamp later than the stop-time or the subscription's start time. After this, live event records follow in sequence.
section: 2.7.7
topics:
