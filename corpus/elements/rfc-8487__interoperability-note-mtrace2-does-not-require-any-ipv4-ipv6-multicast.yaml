document: rfc-8487
kind: interoperability-note
summary: Mtrace2 does not require any IPv4/IPv6 multicast addresses for Replies (unlike Mtrace v1, which used 224.0.1.32 for IPv4 responses). Every Mtrace2 Reply is unicasted to the address in the Mtrace2 Client Address field.
section: "5.5"
topics:
    - multicast
