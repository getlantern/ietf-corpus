document: rfc-7356
kind: protocol-element
summary: 'Four level-flooding scopes extend LSP set capacity without alias system IDs: L1FS (scope 3), L2FS (scope 4), E-L1FS (scope 66), E-L2FS (scope 67). All use the FS LSP ID Extended format, providing 64K additional LSPs per IS per level. LxFS LSPs are used by the level-specific Decision Process as additional information from the same IS.'
section: "9"
