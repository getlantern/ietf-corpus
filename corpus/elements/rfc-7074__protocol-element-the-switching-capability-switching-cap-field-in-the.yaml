document: rfc-7074
kind: protocol-element
summary: The Switching Capability (Switching Cap) field in the Interface Switching Capability Descriptor is an 8-bit field carried in OSPF and IS-IS routing protocols to indicate the type of switching being advertised. Its value determines the format of the variable-length Switching Capability-specific information (SCSI) field that follows.
section: "1.1"
topics:
    - routing
    - mpls
