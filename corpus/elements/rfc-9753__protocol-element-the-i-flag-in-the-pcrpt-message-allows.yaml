document: rfc-9753
kind: protocol-element
summary: The I flag in the PCRpt message allows a PCC to indicate to a PCE whether an optional object was processed in response to a PCUpd or PCInitiate message. The I flag has no meaning in a PCRpt message that is not in response to a PCUpd or PCInitiate (i.e., without an SRP object).
section: 3.3.2
topics:
    - routing
    - mpls
