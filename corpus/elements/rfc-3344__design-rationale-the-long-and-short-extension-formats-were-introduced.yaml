document: rfc-3344
kind: design-rationale
summary: The Long and Short Extension formats were introduced because the simple TLV format's 8-bit Type field (supporting only 255 extensions) risked exhaustion as Mobile IP evolved. Aggregating related extensions under a common Type with Sub-Types reduces allocation pressure on the type space.
section: "1.8"
topics:
    - mobility
