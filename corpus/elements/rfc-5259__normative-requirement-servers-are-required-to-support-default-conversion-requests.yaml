document: rfc-5259
kind: normative-requirement
summary: Servers are REQUIRED to support "default conversion" requests (where client specifies NIL as the target MIME type and server picks a suitable target). Server implementations supporting multiple target MIME types SHOULD make the default conversion configurable.
section: "6"
rfc2119_level: REQUIRED
