document: rfc-9843
kind: protocol-element
summary: The Flex-Algorithm Exclude Maximum Delay (FAEMD) constraint is advertised in an FAD sub-TLV. A link is pruned from the Flex-Algorithm topology if its Min Unidirectional Link Delay exceeds the maximum delay value in the FAEMD sub-TLV. Links without any Min Unidirectional Link Delay advertisement are not excluded.
section: "3"
topics:
