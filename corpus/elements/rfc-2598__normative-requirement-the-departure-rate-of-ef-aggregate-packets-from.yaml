document: rfc-2598
kind: normative-requirement
summary: The departure rate of EF aggregate packets from any diffserv node MUST equal or exceed a configurable rate. The EF traffic SHOULD receive this rate independent of the intensity of any other traffic attempting to transit the node.
section: "2"
rfc2119_level: MUST
topics:
