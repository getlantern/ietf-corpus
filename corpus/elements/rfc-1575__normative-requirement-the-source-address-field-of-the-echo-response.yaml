document: rfc-1575
kind: normative-requirement
summary: The source address field of the echo-response packet SHALL contain the value of the destination address field of the corresponding echo-request packet, and the destination address field of the echo-response packet SHALL contain the value of the source address field of the corresponding echo-request packet.
section: "5.5"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
