document: rfc-4585
kind: protocol-element
summary: Picture Loss Indication (PLI) is PSFB FMT=1 with no FCI (length MUST be 2). It notifies the encoder that an unspecified amount of coded video data has been lost, potentially breaking inter-picture prediction; the encoder MAY respond with an intra-frame subject to congestion control.
section: 6.3.1
topics:
    - rtp
    - realtime
