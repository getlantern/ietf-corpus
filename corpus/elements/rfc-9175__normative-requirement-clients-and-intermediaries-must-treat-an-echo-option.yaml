document: rfc-9175
kind: normative-requirement
summary: Clients and intermediaries MUST treat an Echo option value as opaque and make no assumptions about its content or structure. Similarly, a server receiving a Request-Tag MUST treat it as opaque.
section: 2.2.1
rfc2119_level: MUST
topics:
