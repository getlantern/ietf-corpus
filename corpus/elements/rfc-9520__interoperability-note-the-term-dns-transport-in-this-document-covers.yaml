document: rfc-9520
kind: interoperability-note
summary: The term 'DNS transport' in this document covers classic DNS-over-UDP and DNS-over-TCP (RFC 1034, RFC 7766) as well as encrypted transports including DNS-over-TLS (RFC 7858), DNS-over-HTTPS (RFC 8484), and DNS-over-QUIC (RFC 9250). Retry-count limits apply per transport type to the same server address.
section: "1.3"
topics:
    - dns
    - tls
    - quic
    - http
