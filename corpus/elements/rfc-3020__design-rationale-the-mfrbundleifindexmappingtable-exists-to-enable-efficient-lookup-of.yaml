summary: The mfrBundleIfIndexMappingTable exists to enable efficient lookup of mfrBundleIndex given an ifIndex, since the mfrBundleTable is indexed by mfrBundleIndex (not ifIndex) and a reverse mapping cannot otherwise be performed without a full table scan.
