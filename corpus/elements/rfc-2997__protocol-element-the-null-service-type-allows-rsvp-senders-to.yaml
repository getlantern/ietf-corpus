document: rfc-2997
kind: protocol-element
summary: The Null Service Type allows RSVP senders to signal application identity and classification information without specifying quantitative resource requirements. The sender includes a Null Service ADSPEC fragment in the PATH message along with policy objects identifying the user, application, and sub-application ID.
