document: rfc-6416
kind: design-rationale
summary: 'The ''rate'' parameter for MP4A-LATM is defined unambiguously for the SBR case: when SBR presence is not explicitly signaled it SHALL equal the core codec sampling rate; when SBR is explicitly signaled it SHALL equal the SBR (output) sampling rate. This resolves an ambiguity in RFC 3016 and supports legacy AAC decoders.'
section: "7.3"
topics:
    - rtp
    - realtime
