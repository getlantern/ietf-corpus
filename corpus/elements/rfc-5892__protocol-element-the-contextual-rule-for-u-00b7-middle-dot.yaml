document: rfc-5892
kind: protocol-element
summary: The contextual rule for U+00B7 (MIDDLE DOT) permits its use only when both the immediately preceding and immediately following characters are U+006C (LATIN SMALL LETTER L), allowing expression of the Catalan character ela geminada. This rule is not applied at lookup time.
section: A.3
topics:
    - dns
