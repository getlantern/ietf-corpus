document: rfc-7405
kind: protocol-element
summary: 'Two type prefixes are introduced for ABNF quoted string literals: ''%s'' denotes case-sensitive matching and ''%i'' denotes case-insensitive matching. These prefixes parallel the type prefix convention already used with numeric values in ABNF.'
section: "2.1"
