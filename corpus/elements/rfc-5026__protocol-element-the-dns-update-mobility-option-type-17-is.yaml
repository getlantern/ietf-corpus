document: rfc-5026
kind: protocol-element
summary: The DNS Update Mobility Option (type 17) is a new Mobility Option included in Binding Update and Binding Acknowledgement messages. It carries a Status field, an R flag (set to remove, clear to add/update), and the Mobile Node's FQDN identity.
