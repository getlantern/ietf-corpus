document: rfc-9399
kind: security-consideration
summary: When fetching remote logotype data, a mismatch between the mediaType field in LogotypeDetails and the Content-Type HTTP header MUST be treated as a failure and the fetched data MUST NOT be presented to the user. The relying party MAY try an alternate URI location.
section: "9"
topics:
