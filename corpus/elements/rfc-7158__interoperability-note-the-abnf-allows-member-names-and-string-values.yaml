document: rfc-7158
kind: interoperability-note
summary: The ABNF allows member names and string values to contain bit sequences that cannot encode Unicode characters (e.g., unpaired UTF-16 surrogates like \uDEAD). Behavior of software receiving such values is unpredictable and may include fatal runtime exceptions.
section: "8.2"
topics:
