document: rfc-4585
kind: normative-requirement
summary: 'Compound RTCP feedback packets MUST follow RFC 3550 ordering: optional encryption prefix, mandatory SR or RR, mandatory SDES containing at least the CNAME item, then one or more FB messages. FB messages MUST be placed after the RR/SR and SDES packets.'
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
