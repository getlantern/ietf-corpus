document: rfc-1043
kind: interoperability-note
summary: 'The RFC provides a recommended support-level table distinguishing User Host (terminal) from Server Host (application) roles: cursor movement, transmit, erase, and format commands are send-only for the server and receive-only for the terminal; cursor position, data transmit, field separator, function key, and selected field are send-only for the terminal. Deviating from these roles limits interoperability.'
section: "3"
