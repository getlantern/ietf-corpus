document: rfc-4491
kind: interoperability-note
summary: Some erroneous applications discard zero bits at the end of the BIT STRING containing the GOST R 34.10-2001 public key. It is RECOMMENDED to pad the bit string with zeroes up to 528 bits (66 octets) on decoding to handle such applications.
section: 2.3.2
topics:
    - pkix
    - crypto
