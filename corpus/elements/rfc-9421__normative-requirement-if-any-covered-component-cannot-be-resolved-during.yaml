document: rfc-9421
kind: normative-requirement
summary: If any covered component cannot be resolved during signature base creation—due to unknown derived component name, missing field, unknown or incompatible parameters, missing Dictionary key, or non-ASCII output—the implementation MUST produce an error immediately and not output a signature base.
section: "2.5"
rfc2119_level: MUST
topics:
    - http
