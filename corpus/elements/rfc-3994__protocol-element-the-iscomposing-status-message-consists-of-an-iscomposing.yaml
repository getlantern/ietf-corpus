document: rfc-3994
kind: protocol-element
summary: 'The isComposing status message consists of an <isComposing> root element with a mandatory <state> child (''idle'' or ''active''), plus optional elements: <lastactive> (dateTime of last activity), <contenttype> (MIME type of message being composed), and <refresh> (positive integer seconds until next expected update).'
