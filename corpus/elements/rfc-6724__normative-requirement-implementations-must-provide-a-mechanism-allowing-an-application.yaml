document: rfc-6724
kind: normative-requirement
summary: Implementations MUST provide a mechanism allowing an application to reverse the preference for temporary addresses over public addresses (Rule 7). There SHOULD be an administrative Privacy Preference flag; if absent, there MUST be an administrative option to disable temporary addresses entirely.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
