document: rfc-7734
kind: protocol-element
summary: The ISIS-SPB information received by the DF is used to maintain a local table indexed by I-SID indicating the associated B-VID for processing EVPN-received frames. When an I-SID maps to more than one B-VID, only one entry is allowed; rules for preventing this are out of scope.
section: "4.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
