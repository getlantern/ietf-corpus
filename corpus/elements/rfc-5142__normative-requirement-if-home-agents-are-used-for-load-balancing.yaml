document: rfc-5142
kind: normative-requirement
summary: If home agents are used for load-balancing, they should all be configured with the same set of prefixes so a home agent switch does not require a change of the home address. Switching home agents requiring a home address change is NOT RECOMMENDED.
section: "7"
rfc2119_level: SHOULD NOT
topics:
    - mobility
