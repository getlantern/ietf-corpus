document: rfc-5085
kind: normative-requirement
summary: When CC Type 2 (Router Alert Label) or CC Type 3 (TTL==1) is used and the Control Word is in use on the PW, the CW MUST also be included before the VCCV message to avoid different ECMP hashing behavior.
