document: rfc-1225
kind: state-machine
summary: 'A POP3 session progresses through three sequential states: AUTHORIZATION (client must authenticate), TRANSACTION (client issues mail commands), and UPDATE (server deletes marked messages and releases the maildrop lock before closing the TCP connection). QUIT from AUTHORIZATION skips the UPDATE state entirely.'
