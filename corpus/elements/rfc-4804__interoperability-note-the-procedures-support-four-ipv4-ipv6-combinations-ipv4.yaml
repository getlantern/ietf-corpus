document: rfc-4804
kind: interoperability-note
summary: 'The procedures support four IPv4/IPv6 combinations: IPv4 E2E over IPv4 TE, IPv6 E2E over IPv6 TE, IPv6 E2E over IPv4 TE (requires a mechanism such as 6PE), and IPv4 E2E over IPv6 TE (requires an equivalent IPv4-over-IPv6 MPLS mechanism).'
