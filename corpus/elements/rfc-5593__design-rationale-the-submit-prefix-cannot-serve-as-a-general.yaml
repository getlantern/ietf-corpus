document: rfc-5593
kind: design-rationale
summary: 'The ''submit+'' prefix cannot serve as a general mechanism for external entities acting on behalf of users for three reasons: (1) extending its authorized entity list increases the attack surface; (2) server logs cannot distinguish intended application use; and (3) the IMAP server cannot prioritize resources per application without distinct identifiers.'
section: "3.2"
topics:
    - email
    - security
