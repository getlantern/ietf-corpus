document: rfc-6311
kind: normative-requirement
summary: The peer MUST silently drop any received IKE Message ID synchronization message if M1 is lower than or equal to the highest send counter value it has previously seen from the cluster, including prior synchronization messages.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
