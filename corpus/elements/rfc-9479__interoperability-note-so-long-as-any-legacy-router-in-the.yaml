document: rfc-9479
kind: interoperability-note
summary: So long as any legacy router in the network has any standard application enabled, all routers MUST continue to advertise link attributes for those applications using only legacy advertisements, and ASLA advertisements for those applications MUST NOT be sent.
section: 6.3.3
topics:
