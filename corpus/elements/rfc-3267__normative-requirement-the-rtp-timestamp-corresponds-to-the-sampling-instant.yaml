document: rfc-3267
kind: normative-requirement
summary: The RTP timestamp corresponds to the sampling instant of the first sample of the first frame-block in the packet. The timestamp is increased by 160 for AMR (8 kHz sampling) and by 320 for AMR-WB (16 kHz sampling) for each consecutive 20 ms frame-block.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
