document: rfc-2576
kind: wire-format
summary: snmpTargetAddrTMask is an OCTET STRING (SIZE 0..255) whose length must be zero or equal to the corresponding snmpTargetAddrTAddress length. Bits set to 1 in the mask indicate address bits that must match; zero-length mask means exact address match required.
