document: rfc-9870
kind: interoperability-note
summary: udpSafeOptions uses the unsigned256 abstract data type introduced in RFC 9740 (New IPFIX IEs for TCP Options and IPv6 Extension Headers). Implementations must support this new data type to export or collect udpSafeOptions records.
