document: rfc-4430
kind: normative-requirement
summary: KINK peers MUST record the current epoch for which they have valid SA information and reflect it in each AP-REQ and AP-REP message. If a peer discovers that a principal's epoch has changed on a subsequent message, it MUST consider all SAs created by that principal as invalid.
section: "3.7"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
