document: rfc-3745
kind: design-rationale
summary: A file format is optional in ISO/IEC 15444-1 for the codec itself, but is mandatory for the image/jp2 MIME sub-type registration. This ensures that content identified by the MIME type always has a well-defined container structure.
section: "1"
