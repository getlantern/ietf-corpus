document: rfc-6374
kind: normative-requirement
summary: The truncated IEEE 1588v2 PTP timestamp format (format code 3) MUST be supported by all implementations. Implementations SHOULD also support reading NTPv4 64-bit format timestamps and reconciling them with PTP timestamps for measurement purposes.
section: "3.4"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
