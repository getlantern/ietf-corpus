document: rfc-9154
kind: design-rationale
summary: The registry validates the randomness of authorization information (e.g., checking for combinations of uppercase, lowercase, and non-alphanumeric characters) as a heuristic because it cannot directly measure entropy. Such checks are imperfect; registrars must be prepared for error 2202 and retry with a new value.
section: "5.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
