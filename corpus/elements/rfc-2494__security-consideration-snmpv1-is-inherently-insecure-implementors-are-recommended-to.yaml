document: rfc-2494
kind: security-consideration
summary: SNMPv1 is inherently insecure; implementors are recommended to use SNMPv3 with the User-based Security Model (RFC 2274) and View-based Access Control Model (RFC 2275). Setting objects dsx0RobbedBitSignalling, dsx0IdleCode, dsx0SeizedCode, dsx0TransmitCodesEnable, dsx0BundleRowStatus, dsx0BondMode, or dsx0BondRowStatus to inappropriate values can cause loss of traffic.
section: "9"
topics:
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
