document: rfc-3515
kind: protocol-element
summary: The subscription duration for an implicit subscription created by REFER is initially determined by the agent accepting the REFER and communicated in the Subscription-State header field's expire parameter in the first NOTIFY. The duration SHOULD be chosen to be longer than the time the referenced request will be given to complete.
section: "3.4"
topics:
    - sip
    - realtime
