document: rfc-9677
kind: state-machine
summary: 'The delegated credentials lifecycle proceeds through: (1) uCDN acquires certificate out-of-band; (2) uCDN generates delegated credentials; (3) dCDN advertises MI.DelegatedCredentials capability and max count via FCI; (4) dCDN retrieves MI.DelegatedCredentials from uCDN; (5) TLS handshake with end user using delegated credentials; (6) uCDN refreshes credentials before expiry.'
section: "5"
topics:
