document: rfc-3887
kind: security-consideration
summary: If a client/server pair successfully performs a TLS handshake and the server does chaining referrals, the server SHOULD attempt to negotiate TLS at the same or better security level at the next hop. STARTTLS in a hop-by-hop scenario is 'best effort' security.
section: "11"
topics:
    - email
    - tls
    - security
