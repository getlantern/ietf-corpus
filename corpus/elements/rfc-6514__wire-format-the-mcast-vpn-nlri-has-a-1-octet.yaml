document: rfc-6514
kind: wire-format
summary: The MCAST-VPN NLRI has a 1-octet Route Type field, a 1-octet Length field, and a variable-length Route Type specific field. It is carried in BGP using Multiprotocol Extensions with AFI 1 (IPv4) or 2 (IPv6) and SAFI MCAST-VPN; the AFI determines whether multicast source and group addresses are IPv4 or IPv6.
section: "4"
topics:
