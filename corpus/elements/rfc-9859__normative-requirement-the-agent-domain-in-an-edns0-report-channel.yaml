document: rfc-9859
kind: normative-requirement
summary: The agent domain in an EDNS0 Report-Channel option carried in a NOTIFY message MUST be subordinate or equal to one of the NS hostnames listed in the child's delegation in the parent zone.
section: 4.2.1
rfc2119_level: MUST
