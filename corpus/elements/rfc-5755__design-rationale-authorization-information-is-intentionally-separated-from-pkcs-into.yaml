document: rfc-5755
kind: design-rationale
summary: Authorization information is intentionally separated from PKCs into attribute certificates because authorization data typically has a shorter lifetime than the identity-key binding, and the PKC issuer is not usually authoritative for authorization information. Placing authorization in PKC extensions shortens PKC useful lifetimes.
section: "1"
topics:
    - pkix
    - security
