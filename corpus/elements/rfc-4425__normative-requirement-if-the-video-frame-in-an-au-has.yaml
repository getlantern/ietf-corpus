document: rfc-4425
kind: normative-requirement
summary: If the video frame in an AU has a presentation time that differs from the RTP timestamp field, then the presentation time MUST be specified using the PTS Delta field in the AU header. If the decode time of a video frame differs from its presentation time, the decode time MUST be specified using the DTS Delta field.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
