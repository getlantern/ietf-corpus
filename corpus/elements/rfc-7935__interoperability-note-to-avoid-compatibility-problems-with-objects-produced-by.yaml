document: rfc-7935
kind: interoperability-note
summary: To avoid compatibility problems with objects produced by implementations conforming to RFC 6485 (which used sha256WithRSAEncryption), relying parties are still required to accept sha256WithRSAEncryption in the SignerInfo signatureAlgorithm field when verifying CMS SignedData objects.
