document: rfc-6584
kind: normative-requirement
summary: In the Combined scheme the n_m parameter SHOULD be kept small; the default and minimum meaningful value is 32 bits. The Group-keyed MAC n_m MUST be a multiple of 32 bits.
section: 6.3.1
rfc2119_level: SHOULD
