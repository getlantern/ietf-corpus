document: rfc-6350
kind: wire-format
summary: A vCard object is encoded as BEGIN:VCARD CRLF, VERSION:4.0 CRLF, one or more content lines, END:VCARD CRLF. Each content line follows the pattern [group "."] name *(";"; param) ":" value CRLF. Folded lines are indicated by a CRLF immediately followed by a single whitespace character (SP or HTAB).
section: "3.3"
