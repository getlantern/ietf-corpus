summary: C=0.4 was chosen based on the observation that at RTT=0.01s CUBIC with C≤0.4 achieves exactly the same average window as Reno (Reno-friendly), while C=4 becomes more aggressive. Tables 1–2 show CUBIC with C=0.4 is substantially more Reno-friendly than HSTCP across all tested loss rates.
