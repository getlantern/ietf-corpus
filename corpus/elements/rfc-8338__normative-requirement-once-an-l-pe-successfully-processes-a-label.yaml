document: rfc-8338
kind: normative-requirement
summary: Once an L-PE successfully processes a Label Mapping Message for a P2MP PW, it MUST send appropriate PW status per RFC 8077; a PW status message from an L-PE to an R-PE MUST contain the P2P PW Downstream FEC Element to identify the PW.
section: "5"
rfc2119_level: MUST
