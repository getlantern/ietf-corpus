document: rfc-9125
kind: protocol-element
summary: If a site is configured to allow native encapsulation, each gateway to the site includes multiple instances of a Tunnel TLV for the native encapsulation in externally advertised routes — one per gateway — each containing a Tunnel Egress Endpoint sub-TLV with the gateway's address.
