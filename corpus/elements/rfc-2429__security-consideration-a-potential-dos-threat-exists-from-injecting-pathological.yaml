document: rfc-2429
kind: security-consideration
summary: A potential DoS threat exists from injecting pathological datagrams that are complex to decode; however, H.263+ encoding does not exhibit significant non-uniformity in receiver-end computational load. Receivers may also be overloaded by receipt of too many packets in multicast environments.
