document: rfc-4805
kind: interoperability-note
summary: The object dsx1IfIndex has been deprecated; the ifStackTable should now be used to represent the proxy relationship between paired DS1 interfaces (e.g., router-side and CSU network-side). ifStackTable entries show HigherLayer/LowerLayer ifIndex pairs for all interface associations, consistent with its general use for sub-layer relationships.
section: 3.2.1
topics:
    - snmp
