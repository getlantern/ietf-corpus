document: rfc-8336
kind: normative-requirement
summary: Clients SHOULD NOT emit new requests on any connection whose Origin Set is a proper subset of another connection's Origin Set, and SHOULD close such connections once all outstanding requests are satisfied.
section: "2.4"
rfc2119_level: SHOULD NOT
