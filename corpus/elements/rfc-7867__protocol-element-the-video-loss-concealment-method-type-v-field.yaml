document: rfc-7867
kind: protocol-element
summary: The Video Loss Concealment Method Type (V) field (2 bits) distinguishes frame-freeze (V=10) from other loss concealment methods (V=11). Values V=01 and V=00 are reserved. This differentiation is needed because frame-freeze operates at the frame level while other methods operate at finer granularity (macroblocks, bitstreams).
section: "4"
topics:
