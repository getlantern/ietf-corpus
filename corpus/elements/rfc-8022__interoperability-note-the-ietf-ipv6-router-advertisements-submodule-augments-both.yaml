document: rfc-8022
kind: interoperability-note
summary: The 'ietf-ipv6-router-advertisements' submodule augments both 'ietf-interfaces' (RFC 7223) and 'ietf-ip' (RFC 7277) modules. The 'IsRouter' flag required by RFC 4861 is implemented via the 'ip:forwarding' leaf in ietf-ip rather than in this module.
section: "5.4"
