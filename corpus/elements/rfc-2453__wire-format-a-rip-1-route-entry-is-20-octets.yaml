document: rfc-2453
kind: wire-format
summary: 'A RIP-1 Route Entry is 20 octets: a 2-octet Address Family Identifier (AFI), a 2-octet must-be-zero field, a 4-octet IPv4 address, two 4-octet must-be-zero fields, and a 4-octet metric (1–16). AF_INET is AFI value 2.'
section: "3.6"
topics:
