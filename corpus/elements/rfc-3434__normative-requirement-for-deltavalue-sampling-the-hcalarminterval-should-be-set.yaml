document: rfc-3434
kind: normative-requirement
summary: For deltaValue sampling, the hcAlarmInterval SHOULD be set short enough that the sampled variable is very unlikely to increase or decrease by more than 2^63 - 1 during a single sampling interval, to avoid counter delta overflow.
