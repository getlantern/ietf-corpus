document: rfc-2464
kind: interoperability-note
summary: 'This document obsoletes RFC 1972. Key changes: the 48-bit MAC-based Address Token is replaced by the 64-bit EUI-64-based Interface Identifier, and the prefix length for stateless autoconfiguration is shortened from 80 bits to 64 bits; the link-local prefix is likewise shortened to 64 bits.'
section: "8"
