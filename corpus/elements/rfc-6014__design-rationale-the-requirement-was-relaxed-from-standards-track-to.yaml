document: rfc-6014
kind: design-rationale
summary: 'The requirement was relaxed from Standards Track to RFC Required for two reasons: some useful algorithms may not qualify for Standards Track due to insufficient evaluation or unclear intellectual property rights; and with infrequent new algorithm proposals and ~250 available entries, restricting the registry is unnecessary for decades.'
