document: rfc-5545
kind: design-rationale
summary: Floating time (DATE-TIME without TZID or UTC designator) is defined to represent the same clock time regardless of which timezone an attendee is in — useful for events like 'busy 11 AM–1 PM every day everywhere'. The spec notes that two attendees in different timezones receiving the same floating event may attend at different actual UTC instants, so floating time SHOULD only be used where that behavior is intentional.
section: 3.3.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
