document: rfc-1730
kind: protocol-element
summary: The SELECT command opens a mailbox and transitions to selected state. Before returning OK, the server MUST send FLAGS, EXISTS, RECENT, and UIDVALIDITY untagged responses; it SHOULD also send UNSEEN and PERMANENTFLAGS. Only one mailbox may be selected per session at a time.
section: 6.3.1
topics:
    - email
