document: rfc-8864
kind: normative-requirement
summary: To close a data channel, the endpoint SHALL send an SCTP SSN Reset message and subsequently send an offer either removing the dcmap/dcsa attributes or reusing the stream for a new channel with a different dcmap attribute value.
section: 6.6.1
rfc2119_level: REQUIRED
