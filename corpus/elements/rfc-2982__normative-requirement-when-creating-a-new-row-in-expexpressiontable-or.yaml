document: rfc-2982
kind: normative-requirement
summary: When creating a new row in expExpressionTable or expValueTable, the managed system must record the security credentials (inputs to isAccessAllowed per RFC 2571) of the requester. Expression evaluation must take place under those recorded credentials for all implied Gets of objects in the expression.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
