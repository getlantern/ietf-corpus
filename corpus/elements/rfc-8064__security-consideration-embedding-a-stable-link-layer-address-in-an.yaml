document: rfc-8064
kind: security-consideration
summary: Embedding a stable link-layer address in an IPv6 IID enables network-activity correlation, location tracking, address scanning, and device-specific vulnerability exploitation. RFC 8064 recommends RFC 7217 as the default stable IID generation scheme to mitigate these risks.
section: "5"
topics:
    - ip
    - privacy
    - security
