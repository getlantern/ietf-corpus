document: rfc-6750
kind: normative-requirement
summary: The URI query parameter method SHOULD NOT be used unless it is impossible to transport the token in the Authorization header or request body, due to security deficiencies including likely URL logging. Resource servers MAY support this method.
section: "2.3"
rfc2119_level: SHOULD NOT
