document: rfc-3946
kind: protocol-element
summary: For contiguous concatenation, only one label appears in the Generalized Label field, identifying the lowest time-slot (lowest integer value) occupied by the concatenated signal — the time-slot of the first component encountered descending the multiplexing tree. For virtual concatenation, an explicit ordered list of all labels is given, where order reflects payload order, not physical time-slot order.
section: "3"
