document: rfc-7265
kind: security-consideration
summary: jCal does not change the semantic meaning of underlying iCalendar data, so all security considerations from RFC 5545 Section 7 and any iCalendar extensions remain applicable. Wider dissemination of calendar data through web applications may increase exposure to these risks.
section: "6"
