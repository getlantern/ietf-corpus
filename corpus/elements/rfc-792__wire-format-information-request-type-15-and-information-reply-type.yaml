kind: wire-format
summary: 'Information Request (Type=15) and Information Reply (Type=16) messages: 16-bit Checksum, 16-bit Identifier, 16-bit Sequence Number. A host may send with source and destination IP address fields set to zero (''this'' network); the reply must return fully specified addresses.'
