document: rfc-8175
kind: normative-requirement
summary: All supported metric Data Items MUST be declared with default values in the Session Initialization Response Message. Receipt of any subsequent DLEP Message containing a metric Data Item not included in the Session Initialization Response MUST be treated as an error resulting in session termination.
section: "12.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
