document: rfc-7462
kind: design-rationale
summary: A private extension mechanism using @provider syntax is provided specifically to facilitate PBX-to-SIP migrations without requiring IANA coordination. Because existing PBX products use diverse proprietary conventions, the scheme must accommodate uncoordinated national and vendor variations while still enabling interoperation through the truncation fallback rules.
section: "10.2"
topics:
    - sip
    - realtime
