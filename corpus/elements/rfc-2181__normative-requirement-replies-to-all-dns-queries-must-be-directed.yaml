document: rfc-2181
kind: normative-requirement
summary: Replies to all DNS queries must be directed to the port from which they were sent. For UDP queries, the server must record the source port and use it as the destination port in the response.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - udp
