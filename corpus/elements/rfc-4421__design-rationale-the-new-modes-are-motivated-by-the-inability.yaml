document: rfc-4421
kind: design-rationale
summary: The new modes are motivated by the inability of RFC 4175's signalling to express formats where colour components have differing bit depths. The primary use case is efficient packing of pixels into small pgroups, most commonly 'depth=5' where an RGB565 pixel fits exactly into two octets without padding.
