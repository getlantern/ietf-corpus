document: rfc-3593
kind: interoperability-note
summary: If the system's time-of-day clock is adjusted, the current interval may exceed the xyzTimeElapsed maximum of 899 seconds; the agent should return the maximum value in this case. Following ANSI T1.231 boundaries with small, frequent clock adjustments avoids marking intervals invalid.
section: "3"
topics:
