document: rfc-8668
kind: protocol-element
summary: The L2 Bundle Member LAN Adjacency SID Sub-TLV (Type 42) advertises Adj-SIDs for L2 Bundle Members on a LAN adjacency. It extends the Type 41 format with an additional 6-octet Neighbor System ID field to identify the specific LAN neighbor, followed by the same flags, weight, and per-member SID/Index/Label descriptors.
section: "4.2"
topics:
    - routing
    - mpls
