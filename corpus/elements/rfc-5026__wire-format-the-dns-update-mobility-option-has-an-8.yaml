document: rfc-5026
kind: wire-format
summary: 'The DNS Update Mobility Option has an 8-bit Option Type (17), 8-bit Option Length, 8-bit Status field, 1-bit R flag, 7-bit Reserved, and a variable-length MN identity (FQDN) field. Status values: 0=success, 128=reason unspecified, 129=administratively prohibited, 130=DNS update failed.'
section: "8.1"
topics:
