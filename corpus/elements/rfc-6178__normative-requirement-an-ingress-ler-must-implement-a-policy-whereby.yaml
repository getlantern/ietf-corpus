document: rfc-6178
kind: normative-requirement
summary: An ingress LER MUST implement a policy whereby, when determining whether to push an MPLS label stack onto an IPv4 packet, the determination is made without considering any IPv4 options carried in the packet header. The label values in the stack are also determined without considering any IPv4 options.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
