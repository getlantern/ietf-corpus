document: rfc-9183
kind: normative-requirement
summary: For an unknown-unicast multi-destination packet, if the DBRB has learned the destination MAC address, it SHOULD convert the packet to unicast (setting M bit to 0) before forwarding into the next level.
section: "3.2"
rfc2119_level: SHOULD
topics:
