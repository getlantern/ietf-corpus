document: rfc-9140
kind: normative-requirement
summary: Once the association enters Registered (4) state, the server MUST NOT delete the association or return to ephemeral states 0–2 without explicit user approval, and MUST NOT repeat the OOB Step with the same peer except after a user-initiated reset or persistent storage failure.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
