document: rfc-7343
kind: security-consideration
summary: 'Allowing multiple hash functions to produce ORCHIDs valid for the same Context ID without explicit encoding would enable bidding-down attacks: an attacker could exploit a weaker function to attack identifiers generated with a stronger one. The per-Context-ID OGA ID registry prevents this.'
section: "5"
topics:
