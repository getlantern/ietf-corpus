document: rfc-4626
kind: protocol-element
summary: The t11FspfLsrTable holds the topology database of all current LSRs, indexed by domain ID and LSR type. Key fields include t11FspfLsrAge (seconds since insertion), t11FspfLsrIncarnationNumber (monotonically increasing; highest value is most recent), and t11FspfLsrCheckSum.
