document: rfc-6012
kind: design-rationale
summary: Where privacy is not a requirement, using a NULL encryption algorithm is advantageous because, as RFC 5424 notes, 'passing clear-text messages is a benefit to the operations staff if they are sniffing the packets from the wire'. This justifies allowing NULL encryption as an option.
section: "5.3"
topics:
    - syslog
    - tls
    - security
