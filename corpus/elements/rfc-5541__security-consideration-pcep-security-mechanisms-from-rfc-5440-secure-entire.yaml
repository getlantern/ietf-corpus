document: rfc-5541
kind: security-consideration
summary: PCEP security mechanisms from RFC 5440 secure entire PCEP messages and continue to apply without change. The OF object is automatically secured by those mechanisms; if those mechanisms are not used, the OF object could participate in attacks against a PCE or PCC, though other objects present more significant attack vectors.
section: "7"
