document: rfc-922
kind: protocol-element
summary: IP broadcast addressing uses all-ones in the host-number field to denote 'all hosts'. The address 255.255.255.255 denotes a local hardware network broadcast, while a network-prefixed address like 36.255.255.255 denotes a directed broadcast to all hosts on that IP network.
