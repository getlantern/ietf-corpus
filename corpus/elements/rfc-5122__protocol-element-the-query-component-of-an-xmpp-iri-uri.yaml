document: rfc-5122
kind: protocol-element
summary: The query component of an XMPP IRI/URI encodes a query type optionally followed by key-value pairs delimited by ";", e.g., xmpp:example-node@example.com?message;subject=Hello%20World. The ";"-delimiter is used instead of "&" to avoid escaping issues in HTML and XML applications.
section: "2.5"
topics:
