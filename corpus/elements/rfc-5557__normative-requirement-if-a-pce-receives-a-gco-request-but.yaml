document: rfc-5557
kind: normative-requirement
summary: If a PCE receives a GCO request but is not capable of global concurrent optimization, the PCE MUST send a PCErr message with Error-Type=15, Error-value=2, stop processing the request, and the PCC MUST cancel the corresponding GCO request.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
