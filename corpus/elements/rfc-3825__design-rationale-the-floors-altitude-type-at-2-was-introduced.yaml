document: rfc-3825
kind: design-rationale
summary: The 'floors' Altitude Type (AT=2) was introduced because altitude in meters may not be known or meaningful within a building, making a floor number more operationally useful. Floor values are locally significant and agreed upon between building operators and data users; standardizing floor-to-meter mapping is explicitly out of scope.
section: "2.1"
