document: rfc-2609
kind: normative-requirement
summary: If an optional attribute's definition includes an allowed values list, a default value or list is required (not optional), ensuring the default is always a member of the allowed set. Translations of default and allowed value lists MUST maintain their original order.
section: 3.2.6.4
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
