document: rfc-9580
kind: security-consideration
summary: 'Surreptitious forwarding: a recipient of an encrypted-and-signed message can strip the signature and re-encrypt to a different recipient, who may incorrectly believe the original signer intended them as the recipient. The Intended Recipient Fingerprint subpacket (when verified) mitigates this attack.'
section: "13.12"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
