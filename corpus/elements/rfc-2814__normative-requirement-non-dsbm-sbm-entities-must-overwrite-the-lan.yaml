document: rfc-2814
kind: normative-requirement
summary: Non-DSBM SBM entities MUST overwrite the LAN_LOOPBACK object with their own address when forwarding PATH messages to prevent indefinite multicast looping, even though they are not required to store path state or overwrite the PHOP.
section: "5.10"
rfc2119_level: MUST
topics:
