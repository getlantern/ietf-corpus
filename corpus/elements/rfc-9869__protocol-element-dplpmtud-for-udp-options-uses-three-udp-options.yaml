document: rfc-9869
kind: protocol-element
summary: 'DPLPMTUD for UDP Options uses three UDP Options: the Request (REQ) Option carrying a four-byte token to solicit a response, the Response (RES) Option echoing the received token to confirm delivery, and the End of Options List (EOL) Option used to pad probe packets to the required size.'
