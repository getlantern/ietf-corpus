document: rfc-6146
kind: normative-requirement
summary: Each NAT64 device MUST have at least one unicast Pref64::/n IPv6 prefix assigned to it and MUST have one or more unicast IPv4 addresses assigned to it. Implementations MUST store all required binding and session information; externally visible behavior MUST match this specification.
section: "3"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - ip
