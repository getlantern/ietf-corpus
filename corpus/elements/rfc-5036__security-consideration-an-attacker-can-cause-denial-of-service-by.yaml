document: rfc-5036
kind: security-consideration
summary: An attacker can cause denial-of-service by disrupting LDP TCP connections (causing session teardown, loss of all learned label mappings, and traffic black-holing) or by exhausting label resources via excessive label requests. The MD5 Signature Option mitigates TCP-based attacks.
section: "5.3"
topics:
    - mpls
    - routing
    - security
