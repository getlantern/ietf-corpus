document: rfc-4720
kind: normative-requirement
summary: If PWE3 signaling is not in use for a pseudowire, then whether the FCS is to be retained MUST be identically provisioned in both PEs at the pseudowire endpoints. If there is no provisioning support, the default is to remove the FCS.
section: "3"
rfc2119_level: MUST
topics:
