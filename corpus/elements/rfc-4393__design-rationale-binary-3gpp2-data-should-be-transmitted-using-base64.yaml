document: rfc-4393
kind: design-rationale
summary: Binary 3GPP2 data should be transmitted using base64 or another encoding that avoids CR/LF conversion or 7-bit stripping, because the format is inherently binary and such transformations would corrupt the content.
section: "3.1"
