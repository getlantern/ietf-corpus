document: rfc-2068
kind: security-consideration
summary: HTTP clients using DNS to resolve server names are vulnerable to DNS spoofing, where a falsified DNS response redirects requests to a malicious server. Once connected, a client may send sensitive data (including credentials) to the attacker.
section: "15.8"
topics:
    - http
    - security
    - dns
