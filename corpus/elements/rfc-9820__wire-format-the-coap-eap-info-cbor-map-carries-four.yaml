document: rfc-9820
kind: wire-format
summary: 'The CoAP-EAP_Info CBOR map carries four optional fields: label 1 = Cipher Suite (CBOR Array of ints, proposed or selected COSE algorithms); label 2 = RID-C (bstr, Recipient ID of EAP authenticator); label 3 = RID-I (bstr, Recipient ID of EAP peer); label 4 = Session-Lifetime (uint, seconds). Labels 65001–65535 are reserved for experimentation.'
