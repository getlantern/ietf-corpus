document: rfc-2232
kind: protocol-element
summary: 'dlurAnsSupport (dlurNodeCapabilities 3) indicates Automatic Network Shutdown capability: ''continueOrStop(1)'' means DLUR supports either ANS value as specified by the DLUS per ACTPU; ''stopOnly(2)'' means only ANS=stop is supported. ANS=continue keeps LU-LU sessions active if SSCP control sessions are interrupted.'
section: "5"
