document: rfc-2787
kind: protocol-element
summary: vrrpAssoIpAddrTable is indexed by { ifIndex, vrrpOperVrId, vrrpAssoIpAddr } and holds the set of IP addresses that a virtual router is responsible for backing up. Row count equals vrrpOperIpAddrCount. Rows cannot be modified when the virtual router is active.
