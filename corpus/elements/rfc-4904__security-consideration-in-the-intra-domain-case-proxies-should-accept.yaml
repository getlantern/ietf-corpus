document: rfc-4904
kind: security-consideration
summary: In the intra-domain case, proxies should accept trunk group parameters only via the SIPS URI scheme and use HTTP Digest to authenticate senders. In the inter-domain case, a receiving proxy should use the sender proxy's X.509 certificate to authorize insertion of trunk group parameters.
section: "8"
topics:
