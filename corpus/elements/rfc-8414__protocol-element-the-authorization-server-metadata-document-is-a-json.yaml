summary: The authorization server metadata document is a JSON object served at a well-known HTTPS endpoint. Required fields include 'issuer' and 'response_types_supported'; optional fields include 'authorization_endpoint', 'token_endpoint', 'jwks_uri', 'scopes_supported', 'grant_types_supported', and many others defining server capabilities.
