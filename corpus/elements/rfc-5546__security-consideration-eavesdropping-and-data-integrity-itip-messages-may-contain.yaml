document: rfc-5546
kind: security-consideration
summary: 'Eavesdropping and data integrity: iTIP messages may contain sensitive scheduling information. The RFC recommends securing iTIP transactions using S/MIME or similar to provide confidentiality and data integrity, especially over untrusted transports.'
section: 6.1.4, 6.2.1
topics:
