document: rfc-9224
kind: interoperability-note
summary: The bootstrap method covers only domain names, IPv4/IPv6 address space, and AS numbers. It does not provide discovery for entities, search queries lacking a terminating string, nameservers, or help queries; implementers relying on this method must use alternative means for those object types.
section: "9"
topics:
