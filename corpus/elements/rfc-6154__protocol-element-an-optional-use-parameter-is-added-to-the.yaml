document: rfc-6154
kind: protocol-element
summary: An optional 'USE' parameter is added to the IMAP CREATE command, allowing clients to designate a mailbox at creation time as having one or more special uses. It is followed by a parenthesized list of zero or more special-use attributes. Servers advertise support via the 'CREATE-SPECIAL-USE' capability string.
section: "3"
topics:
    - email
