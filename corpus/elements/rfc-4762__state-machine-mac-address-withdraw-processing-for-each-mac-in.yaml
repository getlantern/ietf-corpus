summary: 'MAC Address Withdraw processing: for each MAC in the TLV, remove the association between that MAC and the AC or PW over which the message arrived. For an empty MAC list, remove all MAC addresses associated with the VPLS instance except those learned over the signaling PW that carried the withdrawal.'
