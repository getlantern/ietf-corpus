document: rfc-9068
kind: interoperability-note
summary: Any additional identity attribute whose semantics are described in the IANA JWT registry SHOULD be encoded using the corresponding registered claim name. Arbitrary non-registered attributes may be included only if claim names are collision-resistant or tokens are used in private subsystems.
section: 2.2.2
topics:
