document: rfc-5607
kind: normative-requirement
summary: When a NAS receives a Management-Transport-Protection (134) Attribute in an Access-Accept packet, it MUST deliver the management access over a transport with equal or better protection, or disconnect. If the NAS cannot meet the specified protection level, it MUST treat the Access-Accept as an Access-Reject.
section: "6.2"
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
