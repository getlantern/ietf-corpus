document: rfc-6420
kind: normative-requirement
summary: A router SHOULD NOT include the PIM MT-ID attribute in Join/Assert packets if PIM MT-ID is 0, if the upstream router does not advertise the PIM Join Attribute or PIM MT-ID Hello option, or if the source is pruned (the attribute MUST be ignored for a pruned source).
section: 4.2.1
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
