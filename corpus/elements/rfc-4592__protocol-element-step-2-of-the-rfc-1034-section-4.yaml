document: rfc-4592
kind: protocol-element
summary: Step 2 of the RFC 1034 section 4.3.2 algorithm selects the nearest ancestor zone for QNAME, ensuring all of step 3 executes within a single zone. This means an SOA RR at a wildcard domain name can never serve as a source of synthesis.
section: "3.1"
topics:
    - dns
