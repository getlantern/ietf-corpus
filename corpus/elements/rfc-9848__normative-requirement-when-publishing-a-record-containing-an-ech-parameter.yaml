document: rfc-9848
kind: normative-requirement
summary: When publishing a record containing an "ech" parameter, the publisher MUST ensure that all IP addresses of TargetName correspond to servers that have access to the corresponding private key or are authoritative for the public name. Otherwise, connections will fail entirely.
