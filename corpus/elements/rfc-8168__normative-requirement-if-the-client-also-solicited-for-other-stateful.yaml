document: rfc-8168
kind: normative-requirement
summary: If the client also solicited for other stateful configuration options (e.g., IA_NAs) and cannot use the offered IA_PD prefixes, the client SHOULD accept the other stateful configuration options and continue to request the desired IA_PD prefix in subsequent DHCPv6 messages as specified in RFC 7550.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
