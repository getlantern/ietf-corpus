document: rfc-5393
kind: security-consideration
summary: Protocol gateways (e.g., SIP-to-PSTN-to-SIP, B2BUAs) that strip loop-detection, Max-Forwards, or Max-Breadth data can create loops that none of these mechanisms protect against. If two such implementations are both involved in an attack, neither will detect it.
section: "7"
topics:
    - sip
    - security
