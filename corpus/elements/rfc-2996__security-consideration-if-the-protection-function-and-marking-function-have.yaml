document: rfc-2996
kind: security-consideration
summary: If the protection function and marking function have been pushed upstream to a trusted intermediate node, correct transmission of the DCLASS object must be ensured to prevent theft-of-service attacks via DSCP elevation. The existing DS network boundary protection against arbitrary DSCP marking also covers modified DCLASS objects when protection is at the boundary.
section: "4"
topics:
    - security
    - qos
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
