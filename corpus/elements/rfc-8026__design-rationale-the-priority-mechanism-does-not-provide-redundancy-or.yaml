document: rfc-8026
kind: design-rationale
summary: The priority mechanism does not provide redundancy or failover between S46 mechanisms; if the highest-priority mechanism is unavailable, fallback to the next mechanism is explicitly out of scope. This simplifies the CPE implementation at the cost of resilience.
