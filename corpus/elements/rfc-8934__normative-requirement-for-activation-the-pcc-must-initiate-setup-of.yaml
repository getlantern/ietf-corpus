document: rfc-8934
kind: normative-requirement
summary: For activation, the PCC MUST initiate setup of the scheduled LSP at the start time. On scheduled usage expiry, the PCC MUST initiate LSP removal based on the C flag in the SCHED-LSP-ATTRIBUTE TLV.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
