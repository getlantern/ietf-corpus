document: rfc-7596
kind: normative-requirement
summary: For TCP and UDP traffic, the NAPT44 in the lwB4 MUST conform to the behavior and best current practices documented in RFC 4787, RFC 5508, and RFC 5382. If the lwB4 supports DCCP, the requirements in RFC 5597 MUST also be implemented.
section: 5.2.1
rfc2119_level: MUST
topics:
