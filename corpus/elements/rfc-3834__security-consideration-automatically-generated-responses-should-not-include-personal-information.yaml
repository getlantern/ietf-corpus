document: rfc-3834
kind: security-consideration
summary: Automatically-generated responses SHOULD NOT include personal information about the recipient that is not already known to the sender, such as personal telephone numbers. User interfaces for configuring response text SHOULD warn that the text will be exposed to the entire Internet.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
    - privacy
