document: rfc-9722
kind: design-rationale
summary: The NTP Era value is not exchanged; participating PEs assume timestamps are in the same Era as their local clock. An Era rollover event would not occur until February 7, 2036, and is addressed by the upper-bound SCT validation described in Section 2.2.
section: "2.2"
topics:
