document: rfc-6002
kind: design-rationale
summary: The new switching type was named 'Data Channel Switching Capable' rather than 'port switching' because 'port switching' would collide with the PSC (Packet Switch Capable) acronym. DCSC fills a gap between FSC (fiber) and LSC (wavelength) for port-to-port switching not limited to optical technology.
