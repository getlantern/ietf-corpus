document: rfc-7180
kind: errata
summary: RFC 6325 Section 4.5.1 incorrectly states that distribution tree cost paths are calculated 'from N to R'; this should read 'from R to N'. All RBridges must use cost in the direction from the root toward each node to ensure consistent tree calculation (Errata ID 3508).
section: "3.5"
topics:
    - routing
