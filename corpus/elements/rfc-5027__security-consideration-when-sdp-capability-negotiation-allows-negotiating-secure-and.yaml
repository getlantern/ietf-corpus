document: rfc-5027
kind: security-consideration
summary: When SDP Capability Negotiation allows negotiating secure and non-secure media alternatives, use of security preconditions (even mandatory) does not prevent an active attacker from injecting malicious media if the offerer may receive media before knowing which alternative was selected by the answerer.
section: "5"
topics:
