document: rfc-4805
kind: normative-requirement
summary: Agents supporting read/write access to dsx1LoopbackConfig should return inconsistentValue in response to a requested loopback state that the interface does not support. A device incapable of performing a loopback shall always return dsx1NoLoop.
section: "4"
rfc2119_level: SHOULD
topics:
    - snmp
