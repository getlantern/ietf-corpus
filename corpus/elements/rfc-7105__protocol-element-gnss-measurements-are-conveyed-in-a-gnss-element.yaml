document: rfc-7105
kind: protocol-element
summary: GNSS measurements are conveyed in a 'gnss' element with 'system' and 'signal' attributes, containing per-satellite 'sat' elements with 'num', 'doppler' (m/s), 'codephase' (ms), 'cn0' (dB-Hz), and optional 'mp', 'cq', 'adr' fields. All values are normalized to system-independent units. The receiver SHOULD indicate an estimated time error for any provided time.
section: "5.5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
