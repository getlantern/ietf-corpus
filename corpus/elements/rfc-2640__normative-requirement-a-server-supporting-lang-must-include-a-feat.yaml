document: rfc-2640
kind: normative-requirement
summary: A server supporting LANG MUST include a FEAT response line in the format "SP LANG SP lang-fact CRLF" listing all supported language tags. At least one lang-tag MUST be included; the current language is indicated by an asterisk after the tag.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
