kind: wire-format
summary: The <device> element (namespace urn:ietf:params:xml:ns:pidf:data-model) is a child of <presence> with a required 'id' attribute. It contains zero or more extensible status/characteristic elements, a required <deviceID> element holding the device URN, optional <note> elements, and an optional <timestamp>.
