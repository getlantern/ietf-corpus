document: rfc-5549
kind: normative-requirement
summary: The BGP speaker receiving an advertisement MUST use the Length of Next Hop Address field to determine which network-layer protocol the next hop address belongs to. When the length is 16 or 32, the next hop is of type IPv6.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - v6ops
