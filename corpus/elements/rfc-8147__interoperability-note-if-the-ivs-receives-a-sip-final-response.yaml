document: rfc-8147
kind: interoperability-note
summary: If the IVS receives a SIP final response to the INVITE without a metadata/control block, this indicates the dialog is not being handled as NG-eCall (e.g., a legacy gateway has intervened). The 'handling=optional' Content-Disposition value is the mechanism enabling legacy elements to process or forward the INVITE without failing on unknown body parts.
section: "9"
topics:
    - sip
