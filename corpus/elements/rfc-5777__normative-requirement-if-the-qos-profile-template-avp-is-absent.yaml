document: rfc-5777
kind: normative-requirement
summary: 'If the QoS-Profile-Template AVP is absent from a Filter-Rule and Treatment-Action is ''shape'' or ''mark'', the default profile is assumed: Vendor-Id=0 (IETF) and QoS-Profile-Id=0, referring to the profile defined in RFC 5624.'
