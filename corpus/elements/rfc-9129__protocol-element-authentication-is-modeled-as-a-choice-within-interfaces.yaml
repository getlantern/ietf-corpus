document: rfc-9129
kind: protocol-element
summary: 'Authentication is modeled as a choice within interfaces, virtual links, and sham links: OSPFv2 options include an authentication trailer (RFC 5709 or RFC 7474) with either a key-chain reference or explicit key-id/key/algorithm; OSPFv3 options include IPsec SA reference (RFC 4552) or an authentication trailer (RFC 7166) with key-chain or explicit SA-id/key/algorithm.'
section: "2.6"
