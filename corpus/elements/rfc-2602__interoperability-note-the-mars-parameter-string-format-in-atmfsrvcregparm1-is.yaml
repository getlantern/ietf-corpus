document: rfc-2602
kind: interoperability-note
summary: The MARS parameter string format in atmfSrvcRegParm1 is defined to be consistent with RFC 2022 (MARS). IPv4 uses pro.type=0x0800, pro.snap=0, plen=4; IPv6 uses pro.type=0x86DD, pro.snap=0, plen=16.
section: "3.1"
