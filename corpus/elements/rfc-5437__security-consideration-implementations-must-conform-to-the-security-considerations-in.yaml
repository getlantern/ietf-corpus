document: rfc-5437
kind: security-consideration
summary: Implementations MUST conform to the security considerations in the NOTIFY, SIEVE, and XMPP specifications. Sending a notification can be comparable to forwarding mail, so care must be taken to avoid sending confidential information into an insecure environment.
section: "6"
topics:
