document: rfc-2492
kind: wire-format
summary: The ND link-layer address option STL field has the same format as NTL and defines the subaddress length. If no subaddress exists, the STL octet MUST be zero. If the subaddress exists it will be in AESA format, so flag x SHALL be zero.
section: 4.1.7
topics:
