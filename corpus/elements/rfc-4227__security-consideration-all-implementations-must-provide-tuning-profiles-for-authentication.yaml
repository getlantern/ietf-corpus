document: rfc-4227
kind: security-consideration
summary: All implementations MUST provide tuning profiles for authentication (SASL/DIGEST-MD5), confidentiality (TLS with TLS_RSA_WITH_AES_EDE_CBC_SHA), and both combined (TLS with client-side certificates). Implementations may additionally offer MIME-based security such as OpenPGP or S/MIME.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
