document: rfc-6265
kind: normative-requirement
summary: User agents MUST parse Set-Cookie headers using a liberal algorithm that strips leading/trailing whitespace from name and value, ignores set-cookie-strings lacking an '=' character or with an empty name, and silently ignores unrecognized attribute names.
section: "5.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
