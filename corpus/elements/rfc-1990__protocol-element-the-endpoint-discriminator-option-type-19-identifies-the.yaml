document: rfc-1990
kind: protocol-element
summary: The Endpoint Discriminator Option (Type=19) identifies the transmitting system and drives bundle assignment. It contains a one-octet Class field (0=Null, 1=Local, 2=IP Address, 3=IEEE 802.1 MAC, 4=PPP Magic-Number Block, 5=PSTN Directory Number) and a variable-length Address field whose maximum length and content depend on the class.
section: 5.1.3
