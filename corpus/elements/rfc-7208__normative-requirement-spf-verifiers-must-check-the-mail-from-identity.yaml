document: rfc-7208
kind: normative-requirement
summary: SPF verifiers MUST check the 'MAIL FROM' identity if a 'HELO' check has not been performed or has not reached a definitive result. When the reverse-path is null, the MAIL FROM identity is defined as 'postmaster@<HELO domain>'.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
