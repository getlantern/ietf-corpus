document: rfc-7346
kind: normative-requirement
summary: According to RFC 4007, the zone of a Realm-Local scope must fall within zones of larger scope. Because Realm-Local zones are configured automatically while larger-scope zones are configured manually, care must be taken in defining larger scopes to ensure the inclusion constraint is met.
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
