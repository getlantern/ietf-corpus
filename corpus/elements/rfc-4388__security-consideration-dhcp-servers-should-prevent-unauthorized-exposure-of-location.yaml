document: rfc-4388
kind: security-consideration
summary: DHCP servers SHOULD prevent unauthorized exposure of location information (hardware address to IP address mappings, which can invade subscriber privacy) by employing RFC 3118 authentication for DHCP messages; DHCPLEASEQUERY senders are treated as DHCP clients for this purpose.
section: "7"
topics:
    - security
    - privacy
    - ip
