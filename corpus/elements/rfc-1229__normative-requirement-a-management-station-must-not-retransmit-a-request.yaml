document: rfc-1229
kind: normative-requirement
summary: A management station must not retransmit a request to invoke a test for which it receives no response; instead it must inspect the agent's MIB to determine if the invocation succeeded, retransmitting only if the invocation was unsuccessful.
section: "4.2"
rfc2119_level: MUST NOT
topics:
