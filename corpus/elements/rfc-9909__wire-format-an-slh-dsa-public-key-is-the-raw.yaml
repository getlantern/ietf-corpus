document: rfc-9909
kind: wire-format
summary: An SLH-DSA public key is the raw concatenation of two n-byte elements PK.seed || PK.root, yielding 2*n bytes total where n is 16, 24, or 32 depending on the parameter set. In SubjectPublicKeyInfo the subjectPublicKey BIT STRING contains this raw octet string with no additional ASN.1 wrapping.
