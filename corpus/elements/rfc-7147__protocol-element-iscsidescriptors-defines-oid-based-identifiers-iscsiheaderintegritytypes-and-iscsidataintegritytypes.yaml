summary: iscsiDescriptors defines OID-based identifiers (iscsiHeaderIntegrityTypes and iscsiDataIntegrityTypes subtrees) for digest methods. Attributes using these types store an OID rather than an enumerated integer, allowing vendor extension without modifying the base MIB.
