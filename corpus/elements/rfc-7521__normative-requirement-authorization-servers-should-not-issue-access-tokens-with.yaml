document: rfc-7521
kind: normative-requirement
summary: Authorization servers SHOULD NOT issue access tokens with a lifetime that exceeds the validity period of the assertion by a significant period. In practice, refresh tokens are typically not issued in response to assertion grant requests.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - oauth
    - security
