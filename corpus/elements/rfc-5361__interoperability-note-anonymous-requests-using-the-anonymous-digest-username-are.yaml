document: rfc-5361
kind: interoperability-note
summary: Anonymous requests using the 'anonymous' digest username are considered unauthenticated and will not match the <identity> condition. However, if a request has a Privacy header field but still contains a P-Asserted-ID, the P-Asserted-ID identity is still used in authorization computations.
section: 3.1.2.2
topics:
    - sip
    - privacy
    - security
