document: rfc-9142
kind: protocol-element
summary: 'SSH key exchange produces two values: a shared secret K and an exchange hash H. The hash H from the first key exchange becomes the session identifier — a unique connection identifier used in authentication — and is not changed even if keys are later re-exchanged.'
