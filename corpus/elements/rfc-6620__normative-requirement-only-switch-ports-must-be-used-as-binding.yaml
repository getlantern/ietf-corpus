document: rfc-6620
kind: normative-requirement
summary: Only switch ports MUST be used as binding anchors. Other forms of binding anchors (e.g., MAC addresses) are out of scope; their spoofability could open new DoS vectors if used with packet dropping.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
    - security
