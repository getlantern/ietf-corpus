document: rfc-8857
kind: security-consideration
summary: When using BFCP over WebSocket, the security mechanisms defined in RFC 8855 (such as TLS/DTLS mutual authentication) are not used; instead the application must rely on WebSocket security mechanisms from RFC 6455. WSS with server certificate validation replaces the RFC 8855 security model.
section: "9"
topics:
    - security
    - websocket
    - tls
