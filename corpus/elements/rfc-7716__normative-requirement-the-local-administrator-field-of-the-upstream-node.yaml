document: rfc-7716
kind: normative-requirement
summary: The Local Administrator field of the upstream-node-identifying RT MUST always be set to zero for GTM, thereby implicitly identifying the global table rather than a VRF. This applies in exactly the same situations where the upstream-node-identifying RT is used in the MVPN specification.
section: "2.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
