document: rfc-4113
kind: design-rationale
summary: IPV6-UDP-MIB (RFC 2454) was moved to Historic because the approach of having separate IP-version-specific tables is no longer followed. Scoped addresses are now represented using IPv4z and IPv6z types, eliminating the need for an explicit ifIndex in the table index.
section: 2.1.2
topics:
    - udp
    - snmp
