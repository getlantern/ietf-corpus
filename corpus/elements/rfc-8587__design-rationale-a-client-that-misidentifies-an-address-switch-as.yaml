document: rfc-8587
kind: design-rationale
summary: 'A client that misidentifies an address switch as a migration event causes no significant harm: using the same server via a new address will appear as a successful transparent state migration. Deferring the migration determination until all known server addresses are confirmed unusable is therefore recommended but not absolute.'
section: 5.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
