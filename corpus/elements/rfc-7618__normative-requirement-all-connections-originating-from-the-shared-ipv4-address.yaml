document: rfc-7618
kind: normative-requirement
summary: All connections originating from the shared IPv4 address MUST use a source port taken from the allocated restricted port set, and the client MUST use only port-aware protocols (TCP, UDP, DCCP) and be ICMP-compliant with RFC 5508.
section: "7.1"
rfc2119_level: MUST
topics:
