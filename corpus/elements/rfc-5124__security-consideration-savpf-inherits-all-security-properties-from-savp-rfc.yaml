document: rfc-5124
kind: security-consideration
summary: SAVPF inherits all security properties from SAVP (RFC 3711) and does not add or remove any security services. Offering secure and insecure profiles simultaneously may enable bidding-down attacks and SHOULD NOT be done. If confidentiality or integrity is required, only SAVP/SAVPF alternatives should be offered unless other security mechanisms are in place.
section: "5"
topics:
    - rtp
    - realtime
    - security
