document: rfc-3963
kind: design-rationale
summary: Support for running an intra-domain routing protocol (RIPng or OSPFv3) through the bi-directional tunnel is optional and is particularly useful for large Mobile Networks with multiple subnets and multiple IPv6 prefixes, since routing changes propagate quickly without requiring prefix options in every Binding Update.
