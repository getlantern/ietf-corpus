document: rfc-9574
kind: normative-requirement
summary: When an AR-REPLICATOR receives a BM packet on an overlay tunnel and the outer IP DA matches its IR-IP, the AR-REPLICATOR MUST skip all overlay tunnels from the flooding list and replicate only to local ACs, preserving standard ingress replication behavior per RFC 7432.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
