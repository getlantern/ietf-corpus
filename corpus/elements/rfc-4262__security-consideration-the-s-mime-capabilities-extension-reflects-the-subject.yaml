document: rfc-4262
kind: security-consideration
summary: The S/MIME Capabilities extension reflects the subject's capabilities at certificate issuance time. Changes in capabilities during the certificate's lifetime may require revocation, but revocation is only warranted if a listed algorithm is considered broken or too weak for the governing security policy.
