document: rfc-9565
kind: interoperability-note
summary: The 'TCP Header Flags' registry indexes bit offset from the most significant bit of octet 12 to the least significant bit of octet 13 in the TCP header, whereas tcpControlBits is encoded as a regular unsigned 16-bit integer. Implementers must account for this difference when mapping between the two representations.
section: "3"
topics:
