document: rfc-9250
kind: security-consideration
summary: The security considerations of DoQ are comparable to those of DoT (RFC 7858), including protection against person-in-the-middle attacks and middleboxes. DoQ relies on QUIC, which uses TLS 1.3 and inherits protections against downgrade attacks per BCP 195. QUIC-specific security issues and mitigations are described in RFC 9000 Section 21.
section: "6"
topics:
    - dns
    - quic
    - security
    - tls
