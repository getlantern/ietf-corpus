document: rfc-6665
kind: normative-requirement
summary: Subscribers MUST include exactly one Event header field in SUBSCRIBE requests indicating the event package being subscribed to. The corresponding NOTIFY's Event header field MUST match the SUBSCRIBE's Event header field.
section: 3.1.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
