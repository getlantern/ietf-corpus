document: rfc-2078
kind: wire-format
summary: The mechanism-independent token format (Section 3.1) wraps the first context-level token with an ASN.1/BER-encoded header containing a tag (0x60), length, and an OID identifying the mechanism type, followed by mechanism-specific token content. This ensures global interpretability of the first token.
section: "3.1"
topics:
    - security
