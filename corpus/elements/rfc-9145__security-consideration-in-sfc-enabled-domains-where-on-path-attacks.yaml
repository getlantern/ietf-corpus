document: rfc-9145
kind: security-consideration
summary: 'In SFC-enabled domains where on-path attacks, spoofing, replay, and packet replacement are possible: NSH data MUST be integrity protected and replay protected, and privacy-sensitive NSH metadata MUST be encrypted. The solution does not provide data origin authentication.'
