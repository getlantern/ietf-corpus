document: rfc-4265
kind: protocol-element
summary: The VPNId Textual Convention defines a 7-octet OCTET STRING to uniquely identify a VPN. It consists of a 3-octet Organizationally Unique Identifier (OUI) identifying the VPN Authority, followed by a 4-octet value assigned by the VPN Authority that uniquely identifies the VPN within the context of that OUI.
section: "3.2"
topics:
    - vpn
    - snmp
    - registry
