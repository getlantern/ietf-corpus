document: rfc-9835
kind: protocol-element
summary: Static routing uses 'cascaded-lan-prefixes' with separate IPv4 and IPv6 prefix lists. Each entry includes 'next-hop' (IP address or predefined type), optional 'lan-tag' for local policy enforcement, 'metric' for IGP export, 'preference' for route selection among equal destinations, BFD enable/profile reference, and per-entry admin/oper status.
section: 5.6.1
topics:
    - yang
    - netconf
    - routing
    - ip
