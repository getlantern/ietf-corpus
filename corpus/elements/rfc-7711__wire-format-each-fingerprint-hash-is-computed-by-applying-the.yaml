summary: Each fingerprint hash is computed by applying the named hash function over the DER encoding of the PKIX X.509 certificate, then base64-encoding the result per RFC 4648 Section 4 with padding bits set to zero. Member names are textual hash function names (e.g., 'sha-256', 'sha-512').
