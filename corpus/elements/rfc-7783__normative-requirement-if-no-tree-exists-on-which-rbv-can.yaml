document: rfc-7783
kind: normative-requirement
summary: If no tree exists on which RBv can claim affinity via RBk (e.g., n < k), then RBk MUST fall back to either disabling its CE-facing ports or tunneling multi-destination frames to an RBridge that has an assigned tree.
section: 5.4.1
rfc2119_level: MUST
topics:
    - routing
    - multicast
