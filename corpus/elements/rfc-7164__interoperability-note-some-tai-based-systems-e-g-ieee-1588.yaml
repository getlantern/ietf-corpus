document: rfc-7164
kind: interoperability-note
summary: Some TAI-based systems (e.g., IEEE 1588, GPS) can deliver TAI-to-UTC mapping information, allowing receivers to synthesize a leap-second-bearing UTC clock. It is the timescale used, not the delivery mechanism, that determines whether a reference clock is leap-second-bearing.
