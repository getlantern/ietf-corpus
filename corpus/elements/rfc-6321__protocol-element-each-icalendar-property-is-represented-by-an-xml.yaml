document: rfc-6321
kind: protocol-element
summary: Each iCalendar property is represented by an XML element with the same name in lowercase, enclosed within IC:properties. Each property may contain an IC:parameters element and one or more value XML elements. All standard iCalendar properties (CALSCALE, DTSTART, RRULE, etc.) are mapped this way.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
