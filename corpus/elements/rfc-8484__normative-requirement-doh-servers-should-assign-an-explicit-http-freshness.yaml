document: rfc-8484
kind: normative-requirement
summary: DoH servers SHOULD assign an explicit HTTP freshness lifetime so that the DoH client is more likely to use fresh DNS data, preventing HTTP caches from assigning their own heuristic freshness.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - dns
    - http
