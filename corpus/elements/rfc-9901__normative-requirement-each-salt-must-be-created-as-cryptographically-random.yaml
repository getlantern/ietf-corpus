document: rfc-9901
kind: normative-requirement
summary: Each salt MUST be created as cryptographically random, sufficiently long, and with high enough entropy that guessing is infeasible; the RECOMMENDED minimum is 128 bits. A new salt MUST be chosen independently for each claim, even when the same claim name appears multiple times in the structure.
section: "9.3"
rfc2119_level: MUST
topics:
