document: rfc-6225
kind: normative-requirement
summary: Longitude values outside −180 to 180 degrees or latitude values outside −90 to 90 degrees MUST be considered invalid. Location consumers MUST ignore invalid location coordinates and SHOULD log errors related to invalid location.
section: "2.3"
rfc2119_level: MUST
topics:
