document: rfc-9301
kind: normative-requirement
summary: If a Map-Reply Record TTL is 0, the receiving ITR MUST immediately remove the entry from its Map-Cache. A value of 0xffffffff allows the recipient to decide locally how long to store the mapping.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
