document: rfc-7643
kind: normative-requirement
summary: Schema extensions SHOULD avoid redefining attributes already defined in the core specification. The schema extension URI SHALL be used as a JSON container namespace to distinguish extension attributes from base schema attributes, avoiding name conflicts.
section: "3.3"
rfc2119_level: SHOULD
