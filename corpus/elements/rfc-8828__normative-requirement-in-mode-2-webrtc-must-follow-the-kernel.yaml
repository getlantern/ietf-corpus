document: rfc-8828
kind: normative-requirement
summary: In Mode 2, WebRTC MUST follow the kernel routing table rules so media packets take the same route as HTTP traffic. If an enterprise TURN server is present, the preferred route MUST be through that TURN server.
section: "5.2"
rfc2119_level: MUST
topics:
    - webrtc
    - nat
