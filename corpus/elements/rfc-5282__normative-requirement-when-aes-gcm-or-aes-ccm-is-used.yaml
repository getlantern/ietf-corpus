document: rfc-5282
kind: normative-requirement
summary: When AES GCM or AES CCM is used with the IKEv2 Encrypted Payload, the SK_ai and SK_ar integrity protection keys are not used; each key MUST be treated as having a size of zero (0) octets.
section: "7.1"
rfc2119_level: MUST
