document: rfc-5464
kind: normative-requirement
summary: The server MUST accept an annotation data size of at least 1024 bytes and an annotation count per server or mailbox of at least 10. Servers may impose further limits beyond these minimums.
section: "4.1"
rfc2119_level: MUST
