summary: 'The ''OSPFv2 Extended Prefix TLV Flags'' registry defines the 8-bit Flags field in the Extended Prefix TLV. Initial allocations: 0x80=A-Flag (Attach Flag), 0x40=N-Flag (Node Flag). Allocation policy: IETF Review or IESG Approval.'
