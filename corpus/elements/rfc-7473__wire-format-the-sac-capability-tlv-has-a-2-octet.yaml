document: rfc-7473
kind: wire-format
summary: The SAC Capability TLV has a 2-octet type field (0x050D) with U-bit and F-bit, a 2-octet Length field, a 1-octet flags field (S-bit + 7 reserved bits), followed by one or more 1-octet SAC Elements. Length in octets equals 1 plus the number of SAC elements.
section: "4.1"
topics:
