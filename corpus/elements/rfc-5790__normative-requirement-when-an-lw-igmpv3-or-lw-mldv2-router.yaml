document: rfc-5790
kind: normative-requirement
summary: When an LW-IGMPv3 or LW-MLDv2 router receives IS_EX(x) or TO_EX(x) Report messages (with non-null source lists) from full-version hosts, it MUST translate them internally to IS_EX({}) and TO_EX({}) respectively and behave accordingly.
section: 6.1.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
