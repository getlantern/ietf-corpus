document: rfc-8308
kind: normative-requirement
summary: A client that sent 'ext-info-c' MUST accept a server's SSH_MSG_EXT_INFO at both opportunities (after SSH_MSG_NEWKEYS and immediately preceding SSH_MSG_USERAUTH_SUCCESS) but MUST NOT require it at either.
section: "2.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
