document: rfc-7493
kind: design-rationale
summary: The Must-Ignore policy (ignoring unrecognized protocol elements rather than treating them as errors) has proven advantageous in practice because it allows protocol evolution without disrupting existing software; the contrasting Must-Understand policy has been found overly restrictive and brittle.
