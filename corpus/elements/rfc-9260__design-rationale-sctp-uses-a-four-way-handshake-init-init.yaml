document: rfc-9260
kind: design-rationale
summary: SCTP uses a four-way handshake (INIT / INIT ACK with State Cookie / COOKIE ECHO / COOKIE ACK) rather than a three-way handshake, making the responder effectively stateless until the COOKIE ECHO is validated. This was chosen to provide protection against SYN-flood-style resource exhaustion attacks, similar to the mechanism described by Karn and Simpson in RFC 2522.
section: 1.5.1
topics:
    - sctp
    - security
