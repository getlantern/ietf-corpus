document: rfc-9833
kind: security-consideration
summary: Modules that reuse groupings such as 'ipv4-lan-prefixes' or 'ipv6-lan-prefixes' may expose privacy-related customer topology information. Disclosing such data may violate the customer-provider trust relationship and must be addressed in the security considerations of the consuming module.
section: "6"
topics:
