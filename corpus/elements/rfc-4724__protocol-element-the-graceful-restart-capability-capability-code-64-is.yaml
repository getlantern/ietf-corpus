document: rfc-4724
kind: protocol-element
summary: The Graceful Restart Capability (capability code 64) is a BGP capability allowing a speaker to express its ability to preserve forwarding state during restart. Its value contains a 4-bit Restart Flags field, a 12-bit Restart Time field, and zero to 63 tuples of <AFI (16 bits), SAFI (8 bits), Flags for Address Family (8 bits)>.
section: "3"
