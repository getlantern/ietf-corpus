summary: 'The TerminationState Descriptor''s ServiceStates property defines three states: ''in service'' (default; available for normal traffic), ''out of service'' (cannot carry traffic), and ''test'' (under testing). Transitions are driven by MGC commands or MG-initiated ServiceChange.'
