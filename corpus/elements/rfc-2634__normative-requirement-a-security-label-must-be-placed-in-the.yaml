document: rfc-2634
kind: normative-requirement
summary: A security label MUST be placed in the signedAttributes field of a SignerInfo block and MUST NOT be in unsigned attributes, ensuring integrity and authentication are applied. A SignerInfo MUST NOT have more than one security label signed attribute.
section: 3.1.1
rfc2119_level: MUST
topics:
    - email
    - security
