document: rfc-3339
kind: design-rationale
summary: Numeric UTC offsets are mandatory rather than alphabetic timezone strings because attempts to label offsets alphabetically resulted in poor interoperability in email (RFC 822 and predecessor protocols). Numeric offsets are calculated as local time minus UTC.
section: "4.2"
extracted_by: claude-sonnet-4-6
