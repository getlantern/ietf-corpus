document: rfc-3339
kind: design-rationale
summary: Numeric UTC offsets are mandatory rather than alphabetic timezone strings (e.g., "EST") because attempts to use alphabetic strings resulted in poor interoperability in Internet Mail [IMAIL] and [HOST-REQ]. RFC 2822 made numeric offsets mandatory for the same reason.
section: "4.2"
topics:
