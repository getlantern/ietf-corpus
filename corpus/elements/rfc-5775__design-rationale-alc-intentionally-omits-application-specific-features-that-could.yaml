document: rfc-5775
kind: design-rationale
summary: ALC intentionally omits application-specific features that could limit scalability, providing a minimal protocol that applications can build upon. The sender's transmission can be independent of the number and individual reception experiences of receivers because FEC-based reliability eliminates the need for individual retransmission requests.
section: "1.2"
topics:
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
