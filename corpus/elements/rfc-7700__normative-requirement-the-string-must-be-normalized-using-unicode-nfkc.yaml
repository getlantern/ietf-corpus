document: rfc-7700
kind: normative-requirement
summary: The string MUST be normalized using Unicode NFKC. NFKC performs both canonical and compatibility decomposition before recomposing, so that characters such as U+2163 ROMAN NUMERAL FOUR match the combination of U+0049 and U+0056.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
