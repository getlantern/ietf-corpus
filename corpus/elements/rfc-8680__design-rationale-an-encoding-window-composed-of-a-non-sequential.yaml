document: rfc-8680
kind: design-rationale
summary: An encoding window composed of a non-sequential set of source symbols requires complex signaling to inform receivers of window composition; a sequential encoding window simplifies signaling to just the identity of the first source symbol plus count, creating fixed, small transmission overhead. This tradeoff between flexibility and overhead is a key consideration for FEC scheme designers.
section: A
topics:
    - realtime
    - multicast
