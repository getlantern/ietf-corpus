document: rfc-4112
kind: normative-requirement
summary: Ecom_SchemaVersion SHOULD appear on every web page that has any Ecom fields; it is RECOMMENDED that it be the last Ecom field on each web page so automated processing can detect when field reception is complete.
section: "3.2"
rfc2119_level: SHOULD
