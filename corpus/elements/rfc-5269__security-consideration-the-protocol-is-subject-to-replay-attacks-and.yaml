document: rfc-5269
kind: security-consideration
summary: The protocol is subject to replay attacks and DoS attacks using RtSolPr in the same manner as SEND for RS messages. The measures in RFC 3971 for mitigating replay and DoS attacks apply here, including use of SEND nonces for anti-replay.
section: "5"
topics:
    - mobility
    - security
