document: rfc-3369
kind: normative-requirement
summary: Signing-time dates between 1 January 1950 and 31 December 2049 MUST be encoded as UTCTime expressed as YYMMDDHHMMSSZ in Zulu. Dates outside this range MUST use GeneralizedTime (YYYYMMDDHHMMSSZ); GeneralizedTime values MUST NOT include fractional seconds.
section: "11.3"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
