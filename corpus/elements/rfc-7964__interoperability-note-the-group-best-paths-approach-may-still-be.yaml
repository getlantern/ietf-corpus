document: rfc-7964
kind: interoperability-note
summary: The Group Best Paths approach may still be inadequate for certain networks where other routing inconsistencies such as forwarding loops exist, or where the required topological constraints are operationally challenging. In such cases, advertising Available Paths may be used as a fallback.
