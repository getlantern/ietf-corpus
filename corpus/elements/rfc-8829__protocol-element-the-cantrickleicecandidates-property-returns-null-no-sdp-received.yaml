document: rfc-8829
kind: protocol-element
summary: The canTrickleIceCandidates property returns null (no SDP received), true (remote supports trickle), or false (remote does not support trickle). Applications comparing against 'true' will default to Half Trickle on initial offers and Full Trickle on subsequent interactions with a Trickle ICE-compatible agent.
section: 4.1.17
topics:
