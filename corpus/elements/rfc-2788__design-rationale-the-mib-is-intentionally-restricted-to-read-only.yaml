document: rfc-2788
kind: design-rationale
summary: The MIB is intentionally restricted to read-only, simple monitoring. Capabilities such as configuration control, queue inspection, request probing, and forcing actions were deliberately excluded because they would require strict security checking and complex, implementation-specific designs.
