summary: Cloud subpaths—segments containing Hosts that do not decrement Hop Limit—are acknowledged as an irreducible gap in path assessment. Tunnels and nested tunnels further hide Hops, meaning the assessment discovers only Hosts that decrement Hop Limit or cooperate with interrogation.
