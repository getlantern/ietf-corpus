document: rfc-7521
kind: protocol-element
summary: Bearer assertions allow any entity in possession of the assertion to use it without demonstrating possession of a cryptographic key, and therefore require confidentiality protection in storage and transport. Holder-of-Key assertions require the presenter to additionally demonstrate possession of cryptographic material bound to the assertion.
section: "3"
topics:
