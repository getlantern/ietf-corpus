document: rfc-8250
kind: security-consideration
summary: 'PDM can enable timing attacks against cryptographic protocols: an attacker observing PDM-separated processing times may be able to extract keying material by correlating fine-grained server latency with cryptographic operations. PDM should be restricted to specific addresses or ports to limit this exposure.'
section: "4.4"
topics:
    - ip
    - security
    - crypto
    - measurement
