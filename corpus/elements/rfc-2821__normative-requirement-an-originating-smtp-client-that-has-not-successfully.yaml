document: rfc-2821
kind: normative-requirement
summary: An originating SMTP client that has not successfully negotiated an appropriate extension (such as 8BITMIME) with the server MUST NOT transmit messages with information in the high-order bit of octets. Envelope commands MUST be in US-ASCII only.
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - email
