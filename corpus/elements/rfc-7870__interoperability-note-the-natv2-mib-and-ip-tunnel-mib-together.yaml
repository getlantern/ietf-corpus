document: rfc-7870
kind: interoperability-note
summary: The NATV2-MIB and IP Tunnel MIB together are not sufficient for DS-Lite management because the AFTR's NAT binding table must be extended with the B4's IPv6 tunnel source address, requiring a combined DS-Lite MIB.
