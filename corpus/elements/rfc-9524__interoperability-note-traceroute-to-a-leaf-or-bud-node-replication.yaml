document: rfc-9524
kind: interoperability-note
summary: Traceroute to a leaf or bud node Replication-SID is not possible because ICMPv6 Time Exceeded messages are prohibited for Replication-SIDs (mirroring the multicast restriction of RFC 4443). This is an inherent limitation of the End.Replicate behavior.
section: 2.2.2
topics:
    - routing
    - ip
