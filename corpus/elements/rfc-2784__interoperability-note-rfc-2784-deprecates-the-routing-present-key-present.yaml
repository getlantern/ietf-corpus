document: rfc-2784
kind: interoperability-note
summary: RFC 2784 deprecates the Routing Present, Key Present, Sequence Number Present, Strict Source Route bits, and the Recursion Control field that were present in RFC 1701. As a result, the GRE header under this specification will never contain Key, Sequence Number, or Routing fields from RFC 1701.
section: "5"
