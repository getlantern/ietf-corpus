document: rfc-8871
kind: security-consideration
summary: 'The Key Distributor is the highest-value attack target: compromise yields access to KEK and master salt, enabling decryption of all conference media. Physical and network access must be severely restricted, and keying material should be destroyed once the conference concludes or after rekeying unless retention is required.'
section: "8.3"
topics:
    - security
    - crypto
    - realtime
