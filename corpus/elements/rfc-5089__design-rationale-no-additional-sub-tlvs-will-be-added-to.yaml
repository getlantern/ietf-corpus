document: rfc-5089
kind: design-rationale
summary: No additional sub-TLVs will be added to the PCED TLV in the future. If a future application requires advertisement of additional PCE information in IS-IS, it will not be carried in the CAPABILITY TLV, ensuring the PCED TLV remains stable and bounded.
