summary: 'CoAP transmission is governed by configurable parameters: ACK_TIMEOUT (2 s), ACK_RANDOM_FACTOR (1.5), MAX_RETRANSMIT (4), NSTART (1), DEFAULT_LEISURE (5 s), PROBING_RATE (1 byte/s). Derived values include EXCHANGE_LIFETIME (247 s), NON_LIFETIME (145 s), MAX_TRANSMIT_SPAN (45 s), and MAX_TRANSMIT_WAIT (93 s) with default settings.'
