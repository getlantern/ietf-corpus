document: rfc-8948
kind: normative-requirement
summary: If the client or relay agent provides OPTION_SLAP_QUAD, the server MUST use the quadrant-n/pref-n values to order the selection of quadrants. If the server cannot provide an assignment from any specified quadrant, it MUST return the IA_LL option with a status of NoAddrsAvail.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
