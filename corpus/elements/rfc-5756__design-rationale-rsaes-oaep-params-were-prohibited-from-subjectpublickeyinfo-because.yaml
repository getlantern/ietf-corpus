document: rfc-5756
kind: design-rationale
summary: RSAES-OAEP-params were prohibited from subjectPublicKeyInfo because (a) their absence does not affect interoperability and (b) it aligns with PKIX practice of not encoding usage limitations on public keys within subjectPublicKeyInfo. An implementer poll confirmed no objections.
section: "3"
topics:
