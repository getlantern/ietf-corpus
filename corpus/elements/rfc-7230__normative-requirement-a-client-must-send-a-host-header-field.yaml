document: rfc-7230
kind: normative-requirement
summary: A client MUST send a Host header field in all HTTP/1.1 request messages. If the target URI includes an authority component, the Host field-value must be identical to that authority component.
section: "5.4"
rfc2119_level: MUST
topics:
    - http
