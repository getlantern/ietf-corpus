document: rfc-4033
kind: interoperability-note
summary: Any security-oblivious DNS software between a security-aware resolver and the authoritative name servers—including NAT proxies with built-in DNS proxies—will interfere with DNSSEC, potentially preventing the resolver from obtaining or validating signed data or DS RRs.
section: "6"
topics:
    - dns
    - security
    - nat
