document: rfc-4837
kind: security-consideration
summary: The downstream EPON link is a physical broadcast medium; all ONUs receive all OLT transmissions. The LLID-based P2PE filtering provides logical separation but not cryptographic confidentiality — a compromised ONU could observe traffic intended for other ONUs.
section: 2.2.5
topics:
    - security
    - privacy
