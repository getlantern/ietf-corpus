document: rfc-6098
kind: normative-requirement
summary: The Identification field in a new GNM MUST NOT be the same as in an immediately preceding GNM, and SHOULD NOT repeat while the same security context is in use, to prevent replay attacks.
section: "7.1"
rfc2119_level: MUST NOT
topics:
