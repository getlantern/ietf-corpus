document: rfc-6530
kind: design-rationale
summary: Supporting Unicode NFC normalization (and preferably NFKC) is recommended for mailbox names, and servers should support aliases or normalization for variant forms rather than depending on senders to supply normalized strings, because client-side processes outside MUA control may cause normalization regardless of user intent.
section: "10.1"
topics:
    - email
