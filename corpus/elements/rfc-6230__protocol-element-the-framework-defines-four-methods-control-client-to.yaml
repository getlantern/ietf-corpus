document: rfc-6230
kind: protocol-element
summary: 'The framework defines four methods: CONTROL (client-to-server commands and event reporting), REPORT (server status updates for extended transactions), K-ALIVE (keep-alive probes), and SYNC (initial correlation, keep-alive negotiation, and package negotiation). Implementations MUST support sending and receiving all four.'
section: "6.3"
