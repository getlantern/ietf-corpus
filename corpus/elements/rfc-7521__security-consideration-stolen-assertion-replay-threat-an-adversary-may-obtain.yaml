document: rfc-7521
kind: security-consideration
summary: 'Stolen assertion / replay threat: an adversary may obtain an assertion by eavesdropping and replay it later. Countermeasures include TLS for all exchanges, short assertion lifetimes, and using a combination of Assertion ID and Issued At/Expires At attributes to detect and reject replays without maintaining an infinite state table.'
section: "8.2"
topics:
    - oauth
    - security
    - tls
