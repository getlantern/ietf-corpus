document: rfc-6309
kind: interoperability-note
summary: RFC 5410 obsoleted RFC 4909 but did not itself define IANA rules for the OMA BCAST Data Subtype namespace. RFC 6309 now authoritatively defines those IANA requirements, replacing both RFC 4909 and RFC 5410 for that namespace.
