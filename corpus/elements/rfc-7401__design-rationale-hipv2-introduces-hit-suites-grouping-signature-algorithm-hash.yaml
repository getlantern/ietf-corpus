document: rfc-7401
kind: design-rationale
summary: HIPv2 introduces HIT Suites grouping signature algorithm, hash function, and truncation to achieve crypto agility — the primary concern raised by the IESG against RFC 5201. DH group negotiation begins in I1 (unsigned) but the Responder's signed DH_GROUP_LIST in R1 enables the Initiator to detect downgrade manipulation of the unsigned I1 list.
section: "1"
topics:
