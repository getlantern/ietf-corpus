document: rfc-9081
kind: normative-requirement
summary: If a received MVPN SA route lacks the RP-address EC (e.g., from a legacy PE), the local RP address for the C-G is used; in this case, the MSDP peer that would receive the generated SA SHOULD use local policy to accept it to avoid RPF failure.
section: "3"
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
