document: rfc-8476
kind: protocol-element
summary: The Node MSD TLV (type 12) is carried within the OSPF Router Information (RI) Opaque LSA body and advertises the provisioned SID depth of the originating router. Node MSD is the smallest MSD supported across all interfaces configured for use by the advertising IGP instance.
