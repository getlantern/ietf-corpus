document: rfc-3472
kind: normative-requirement
summary: Nodes MUST verify that the Switching Type parameter is supported on the corresponding incoming interface. If not supported, the node MUST generate a NOTIFICATION message with a 'Routing problem/Switching Type' indication.
section: 2.1.1
rfc2119_level: MUST
topics:
