document: rfc-9541
kind: normative-requirement
summary: An AC going operationally down MUST generate a B-MAC/I-SID route with a higher Sequence Number. If the failure causes the entire local I-SID to go operationally down, the PE MUST withdraw the B-MAC/I-SID route for that I-SID.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
