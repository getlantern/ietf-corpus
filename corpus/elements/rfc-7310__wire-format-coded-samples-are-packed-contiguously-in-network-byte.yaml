document: rfc-7310
kind: wire-format
summary: 'Coded samples are packed contiguously in network byte order (big-endian), most significant bit first, in time sequence (oldest first). For multi-channel streams, coded samples from all channels at a single sampling instant are interleaved into a coded sample block using standard audio channel ordering (e.g., for stereo: left, right, left, right...).'
section: "5.2"
