document: rfc-7580
kind: design-rationale
summary: To handle LSAs that might exceed the IP MTU, large connectivity matrices can be decomposed into sub-matrices, each with a unique matrix identifier per RFC 7579. This decomposition is straightforward because a connectivity matrix consists only of pairs of input and output ports.
