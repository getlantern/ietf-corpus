document: rfc-3156
kind: protocol-element
summary: The combined method allows signing and encrypting data in a single OpenPGP message (as defined in the OpenPGP packet format), formatted as a multipart/encrypted object. An agent MAY decrypt a combined message and rewrite it as a multipart/signed object.
