summary: 'Network maps and cost maps are separated so they can be updated at different timescales: PID groupings are stable over longer periods while cost maps may change frequently to reflect dynamic conditions. This separation also allows cost information to be compactly represented without re-transmitting endpoint-to-PID mappings.'
