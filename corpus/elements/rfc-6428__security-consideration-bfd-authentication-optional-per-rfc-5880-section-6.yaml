document: rfc-6428
kind: security-consideration
summary: BFD authentication (optional, per RFC 5880 Section 6.7) can be applied. Although the Source MEP-ID TLV is excluded from the authentication digest, the discriminator covered by the digest is associated with the expected MEP-ID, preventing impersonation of CV messages.
