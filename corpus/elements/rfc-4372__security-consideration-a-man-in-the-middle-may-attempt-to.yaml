document: rfc-4372
kind: security-consideration
summary: A man-in-the-middle may attempt to insert, modify, or remove the CUI in Access-Accept and Accounting packets to commit theft-of-service. RADIUS Access-Accept and Accounting packets already provide integrity protection, which mitigates but does not fully prevent this attack since there is no way to detect or prevent CUI modification by a proxy.
section: "6"
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
