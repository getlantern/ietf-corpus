document: rfc-3903
kind: interoperability-note
summary: A PUBLISH request MAY be sent within an existing dialog, but unless the other endpoint is also an ESC it will likely reject the request. Sending PUBLISH in-dialog is not prohibited but will typically not produce the expected behavior.
