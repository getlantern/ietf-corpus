document: rfc-5888
kind: normative-requirement
summary: Grouping of 'm' lines MUST always be requested by the offerer, never by the answerer, because an answerer that requested grouping would not know whether the 'group' attribute was accepted.
section: "9.2"
rfc2119_level: MUST
