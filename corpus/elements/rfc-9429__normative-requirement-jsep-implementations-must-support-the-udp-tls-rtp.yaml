document: rfc-9429
kind: normative-requirement
summary: JSEP implementations MUST support the 'UDP/TLS/RTP/SAVPF' and 'TCP/DTLS/RTP/SAVPF' profiles for media 'm=' sections and MUST indicate one of these profiles in each media 'm=' line they produce in an offer. The profile in any generated answer MUST exactly match the profile in the offer.
section: 5.1.2
rfc2119_level: MUST
topics:
