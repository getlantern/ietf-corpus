document: rfc-1413
kind: protocol-element
summary: The Identification Protocol runs over TCP on port 113. A server listens for connections, reads a query specifying a connection of interest by port pair, and returns the system-dependent user identifier of that connection's owner. The server may handle multiple queries per connection.
section: "2"
topics:
