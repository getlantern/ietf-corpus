document: rfc-4037
kind: interoperability-note
summary: OCP Core requires a reliable and message-order-preserving transport. TCP/IP is the assumed default, but other transports (e.g., BEEP [RFC3080]) are permitted. No default TCP port is assigned to OCP. The mapping of OCP message structures onto transport data units is outside OCP Core scope.
section: "2.8"
topics:
    - tcp
