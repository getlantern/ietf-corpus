document: rfc-5595
kind: registry
summary: IANA maintains the DCCP Service Codes registry, originally defined in RFC 4340. RFC 5595 does not change the allocation procedures but clarifies that a published RFC is not required to apply for a Service Code; a specification is required only for codes using the restricted ASCII character subset.
