document: rfc-9218
kind: registry
summary: 'This document creates the ''Hypertext Transfer Protocol (HTTP) Priority'' registry at IANA, initially populated with urgency (u) and incremental (i). Single-character keys require Specification Required; longer keys use Expert Review. It also registers: Priority in the HTTP Field Name Registry, SETTINGS_NO_RFC7540_PRIORITIES (0x9) in HTTP/2 Settings, PRIORITY_UPDATE (0x10) in HTTP/2 Frame Types, and PRIORITY_UPDATE (0xF0700-0xF0701) in HTTP/3 Frame Types.'
section: "16"
