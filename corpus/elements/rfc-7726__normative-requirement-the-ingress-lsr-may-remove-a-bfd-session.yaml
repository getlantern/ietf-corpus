document: rfc-7726
kind: normative-requirement
summary: The ingress LSR MAY remove a BFD session at the egress by sending BFD packets with State Down(1) and diagnostic code AdminDown(7) for detectMultiplier iterations; upon receiving these, the egress MAY remove the session without triggering a state change.
section: "2.3"
rfc2119_level: MAY
topics:
    - mpls
    - routing
