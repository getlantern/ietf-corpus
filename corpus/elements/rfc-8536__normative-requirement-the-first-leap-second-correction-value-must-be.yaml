document: rfc-8536
kind: normative-requirement
summary: The first leap-second correction value MUST be either 1 or -1, and correction values in adjacent leap-second records MUST differ by exactly 1. The first occurrence value, if present, MUST be nonnegative, and each subsequent occurrence MUST be at least 2419199 greater than the prior value.
section: "3.2"
rfc2119_level: MUST
topics:
    - measurement
    - ntp
