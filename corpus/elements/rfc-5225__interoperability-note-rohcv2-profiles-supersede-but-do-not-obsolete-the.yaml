document: rfc-5225
kind: interoperability-note
summary: ROHCv2 profiles supersede but do not obsolete the RFC 3095 (RTP/UDP/IP, UDP/IP, IP, ESP/IP), RFC 3843 (IP), and RFC 4019 (UDP-Lite) profiles. The two sets of profiles can coexist on the same ROHC channel; the profile identifier in the IR header selects which set of rules applies for a given context.
section: "1"
topics:
