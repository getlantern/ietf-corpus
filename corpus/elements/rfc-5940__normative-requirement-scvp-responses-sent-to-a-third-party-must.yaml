document: rfc-5940
kind: normative-requirement
summary: SCVP responses sent to a third party MUST be signed by the SCVP server so that the third party can validate them, since unprotected or MAC-protected responses cannot be verified without the originating connection context or private key.
section: "4"
rfc2119_level: MUST
topics:
