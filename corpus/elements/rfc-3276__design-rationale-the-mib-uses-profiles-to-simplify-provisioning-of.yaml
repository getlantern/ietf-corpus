document: rfc-3276
kind: design-rationale
summary: The MIB uses profiles to simplify provisioning of large numbers of lines. A profile is a set of parameters shared by multiple lines, so changing one profile reconfigures all referencing lines simultaneously rather than requiring per-line management.
section: "4.5"
topics:
