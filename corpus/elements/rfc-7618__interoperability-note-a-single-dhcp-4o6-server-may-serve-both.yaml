document: rfc-7618
kind: interoperability-note
summary: A single DHCP 4o6 server MAY serve both clients that support OPTION_V4_PORTPARAMS and those that do not. It MUST implement a mechanism (e.g., separate address pools) to ensure clients not supporting the option do not receive shared addresses.
section: "8.1"
topics:
    - ip
    - nat
