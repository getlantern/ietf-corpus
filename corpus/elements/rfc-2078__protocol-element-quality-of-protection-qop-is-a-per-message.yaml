document: rfc-2078
kind: protocol-element
summary: Quality of Protection (QOP) is a per-message parameter allowing callers to select among protection options offered by a multi-QOP mechanism. Most callers should request default QOP; non-default QOP values are mechanism-specific, non-portable, and unsupported values yield GSS_S_BAD_QOP.
section: 1.2.4
topics:
    - security
