document: rfc-6680
kind: protocol-element
summary: GSS_Display_name_ext() displays a given GSS name using a caller-specified name type OID. The function may fail (GSS_S_UNAVAILABLE) if the name cannot be displayed using that syntax, since mappings between name syntaxes may be inexact or lossy.
section: "7.3"
topics:
    - security
