document: rfc-7714
kind: protocol-element
summary: In an SRTP packet, the RTP fixed header fields (V, P, X, CC, M, PT, sequence number, timestamp, SSRC, optional CSRC, optional RTP extension) are Associated Data (authenticated only); the RTP payload and any padding are Plaintext (encrypted and authenticated); the optional MKI and SRTP authentication tag are Raw Data appended after encryption.
section: "8.2"
topics:
    - rtp
    - realtime
    - crypto
