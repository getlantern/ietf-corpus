document: rfc-8888
kind: wire-format
summary: 'Each per-SSRC report block contains a 32-bit SSRC field, a 16-bit begin_seq, a 16-bit num_reports, and one 16-bit packet metric block per reported RTP packet. The packet metric block encodes: R (1 bit received flag), ECN (2 bits echoed ECN mark), and ATO (13 bits arrival time offset).'
section: "3.1"
topics:
    - rtp
    - congestion
    - ecn
    - realtime
