kind: protocol-element
summary: The first authentication attribute in the AUTH_APP element is of A-type POLICY_LOCATOR with sub-type ASCII_DN or UNICODE_DN. Its data is an X.500 Distinguished Name encoding the application vendor, name, version, and sub-application in a hierarchical structure.
