document: rfc-5691
kind: interoperability-note
summary: If HE AAC is used as the coding scheme for the downmix, the RTP clock-rate of the downmix MAY be the sampling rate of the AAC core, meaning the clock-rate of the MPEG Surround elementary stream is an integer multiple of the downmix stream's clock-rate.
section: "4.2"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
