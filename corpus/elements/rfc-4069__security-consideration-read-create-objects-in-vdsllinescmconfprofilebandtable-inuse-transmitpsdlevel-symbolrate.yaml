document: rfc-4069
kind: security-consideration
summary: 'Read-create objects in vdslLineSCMConfProfileBandTable (InUse, TransmitPSDLevel, SymbolRate, ConstellationSize, CenterFrequency, RowStatus) are sensitive: SET operations without proper protection can negatively affect network operations. An end-user with write access could increase service levels or affect other users. Subscriber-initiated fluctuations could also generate sufficient SNMP notifications to overwhelm management interfaces.'
section: "6"
topics:
    - security
    - snmp
