document: rfc-6705
kind: protocol-element
summary: The Localized Routing Initiation (LRI) message uses Mobility Header type 17. It carries a Sequence Number, a Reserved field (MUST be zero), a Lifetime in seconds (0xffff = infinite, 0 = stop), and Mobility Options containing MN-ID and HNP tuples for each communicating MN.
