document: rfc-9607
kind: wire-format
summary: The SCIP RTP payload format is a standard RTP header (as defined in RFC 3550) followed by the SCIP Payload field of variable length. No additional framing, NAL units, or payload headers are defined between the RTP header and SCIP payload.
