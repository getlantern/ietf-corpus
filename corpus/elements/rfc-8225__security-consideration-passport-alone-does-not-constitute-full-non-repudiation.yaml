document: rfc-8225
kind: security-consideration
summary: PASSporT alone does not constitute full non-repudiation of the asserted identity. When a service provider signs on behalf of a user, the provider MUST have an authenticated and secure relationship with the end user or device. Verifiers must check that the signer is authoritative via application-specific trust anchors.
section: "10.2"
rfc2119_level: MUST
topics:
    - security
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
