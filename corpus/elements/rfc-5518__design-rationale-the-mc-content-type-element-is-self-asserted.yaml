document: rfc-5518
kind: design-rationale
summary: The mc= content-type element is self-asserted by the sender to create an audit trail. This allows certifiers to catch senders who mislabel mail types (e.g., labeling advertising as transactional) and revoke certification, even though the value cannot be independently verified at query time.
section: "6"
topics:
    - email
