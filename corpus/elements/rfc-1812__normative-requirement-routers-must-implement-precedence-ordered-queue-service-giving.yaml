document: rfc-1812
kind: normative-requirement
summary: Routers MUST implement precedence-ordered queue service, giving priority to higher-precedence datagrams when the output queue is full. Routers MUST also support configurable lower-layer precedence mappings and MUST NOT discard higher-precedence traffic in favor of lower-precedence traffic.
section: 5.3.3
rfc2119_level: MUST
topics:
    - ip
    - qos
    - diffserv
