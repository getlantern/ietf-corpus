document: rfc-2222
kind: security-consideration
summary: The client's SASL mechanism selection is transmitted in the clear and may be modified by an active attacker. New SASL mechanisms must be designed so that an attacker cannot obtain authentication with weaker security properties by modifying the mechanism name or the challenges and responses.
section: "9"
topics:
    - security
