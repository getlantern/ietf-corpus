document: rfc-8224
kind: interoperability-note
summary: This specification contains no backwards-compatibility provisions with RFC 4474. RFC 4474 deployments are believed to be nonexistent. A hypothetical RFC 4474-compliant verifier receiving an RFC 8224 Identity header would likely respond with 436, since there is no separate Identity-Info header field.
