document: rfc-7590
kind: design-rationale
summary: Encrypted but unauthenticated connections (e.g., anonymous Diffie-Hellman, self-signed certificates, or Server Dialback with XEP-0220) are considered better than plaintext connections in scenarios where PKIX certificate deployment is infeasible, analogous to 'better-than-nothing security' for IPsec (RFC 5386).
section: "3.4"
topics:
