document: rfc-6910
kind: normative-requirement
summary: A NOTIFY sent with non-zero expiration MUST contain the 'cc-state' parameter set to 'queued' or 'ready'. When the callee's monitor withdraws a selection (e.g., recall timer expires), it MUST send a NOTIFY with cc-state set to 'queued'.
section: "9.8"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
