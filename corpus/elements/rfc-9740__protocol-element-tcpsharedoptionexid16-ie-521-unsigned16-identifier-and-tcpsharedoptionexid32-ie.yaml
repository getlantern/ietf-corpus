document: rfc-9740
kind: protocol-element
summary: tcpSharedOptionExID16 (IE 521, unsigned16, identifier) and tcpSharedOptionExID32 (IE 522, unsigned32, identifier) report the 2-byte or 4-byte Experiment Identifier observed in a shared experimental TCP option (Kind=253 or 254) per RFC 6994. Lists of these IEs are exported as tcpSharedOptionExID16List (IE 523) and tcpSharedOptionExID32List (IE 524), both of type basicList.
section: "4.2"
