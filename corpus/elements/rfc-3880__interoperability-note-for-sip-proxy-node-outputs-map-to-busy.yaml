document: rfc-3880
kind: interoperability-note
summary: 'For SIP, proxy node outputs map to: ''busy'' (486/600 response), ''redirection'' (3xx response), ''failure'' (any other 4xx/5xx/6xx response), and ''noanswer'' (no final response before timeout). SIP servers SHOULD honor the ''q'' parameter of registrations for location priority.'
section: 6.1.1
topics:
    - sip
    - voip
