document: rfc-3659
kind: normative-requirement
summary: Implementations MUST NOT vary the MLSx output format by inserting extra spaces, replacing spaces with tabs, including header or title lines, inserting blank lines, or altering it in any other way. The format is intended for machine processing.
section: "7.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
