document: rfc-4436
kind: normative-requirement
summary: Sending an ICMP Echo Request SHOULD NOT be used as a substitute for the ARP reachability test because it does not verify MAC address correspondence and can yield false positives when a host moves between private networks using overlapping prefixes or when TTL > 1 allows off-link routers to respond.
section: 2.1.1
rfc2119_level: SHOULD NOT
topics:
    - ip
