document: rfc-5015
kind: state-machine
summary: 'The DF election state machine has four states: Offer (initial, sending periodic Offer messages), Lose (another router is DF or no path exists), Win (acting DF without contest), and Backoff (acting DF but another router is challenging). A router is considered acting DF only in Win or Backoff states.'
section: 3.5.3.1
topics:
    - multicast
    - routing
