document: rfc-8948
kind: design-rationale
summary: The relay is given the ability to add a QUAD option independently of the client to support large infrastructures split into different network regions, where each region may have different MAC address quadrant requirements unknown to the client (e.g., IoT-only segments requiring ELI/SAI).
