kind: design-rationale
summary: iscsiTgtPortalNodeIndexOrZero uses zero to handle the common implementation case where the same Target Portal Group Tag and port apply to all nodes on a portal; non-zero values index per-(portal, node) tuples for implementations that vary the tag or port by node.
