document: rfc-4227
kind: protocol-element
summary: The 'bootmsg' element carries a mandatory 'resource' attribute (analogous to HTTP's abs_path Request-URI) and an optional 'features' attribute listing requested optional features. The 'bootrpy' element carries an optional 'features' attribute listing the accepted subset of features.
