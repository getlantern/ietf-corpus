document: rfc-4644
kind: normative-requirement
summary: A server supporting streaming MUST continue to advertise the STREAMING capability after a client has issued the MODE STREAM command, and this capability MAY be advertised both before and after any use of MODE READER.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
