document: rfc-1247
kind: normative-requirement
summary: All OSPF implementations must be capable of calculating separate routes based on IP Type of Service. Routers can optionally be configured to route all packets on the TOS 0 path only, eliminating non-zero TOS path calculations to conserve resources.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
