document: rfc-9530
kind: interoperability-note
summary: 'Migrating from RFC 3230: the Digest field used representation data as input (what RFC 9530 calls Repr-Digest), while Content-Digest provides the capability RFC 3230 never had — a digest of HTTP message content. The syntax differs (RFC 3230 allowed per-algorithm encoding formats; RFC 9530 uses uniform Byte Sequence encoding), but the semantic considerations for Repr-Digest apply equally to the legacy Digest field.'
section: E
topics:
