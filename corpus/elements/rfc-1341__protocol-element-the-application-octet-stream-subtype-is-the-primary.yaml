document: rfc-1341
kind: protocol-element
summary: The 'application/octet-stream' subtype is the primary type for uninterpreted binary data. The recommended default action on receipt is to offer to write the data to a file. Optional parameters include 'type', 'padding', 'name', and 'conversions'.
