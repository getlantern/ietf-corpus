document: rfc-9581
kind: protocol-element
summary: Keys -1, -13, and 13 indicate a timescale; key 13 is critical (must be understood), while -1 and -13 are elective with identical semantics. Value 0 indicates UTC with the POSIX epoch; value 1 indicates TAI with the PTP epoch (1 January 1970 00:00:00 TAI). Default timescale is UTC (value 0) when none of these keys is present.
section: "3.4"
