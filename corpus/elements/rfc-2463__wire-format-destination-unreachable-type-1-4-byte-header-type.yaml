document: rfc-2463
kind: wire-format
summary: 'Destination Unreachable (Type=1): 4-byte header (Type, Code, Checksum) followed by a 4-byte Unused field (initialized to zero), then as much of the invoking packet as fits within the minimum IPv6 MTU. Code values: 0=no route, 1=admin prohibited, 3=address unreachable, 4=port unreachable.'
section: "3.1"
