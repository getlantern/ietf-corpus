document: rfc-6276
kind: normative-requirement
summary: The relay agent MUST be configured with the address of the DHCPv6 server. The mobile router MUST configure the DHCPv6 relay agent to forward DHCPv6 messages to the home agent, which is assumed to host the DHCPv6 server.
section: 3.1.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
