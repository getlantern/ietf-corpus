document: rfc-8579
kind: protocol-element
summary: The ':specialuse' argument extends the 'fileinto' command to deliver messages to a mailbox identified by a special-use attribute rather than by name. If no matching special-use mailbox exists or the attribute is unknown, 'fileinto' falls back to the positional mailbox name argument.
section: "4"
topics:
    - email
