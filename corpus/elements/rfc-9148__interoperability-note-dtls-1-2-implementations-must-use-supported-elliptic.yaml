document: rfc-9148
kind: interoperability-note
summary: DTLS 1.2 implementations must use Supported Elliptic Curves and Point Formats Extensions (RFC 8422) including uncompressed point format. DTLS 1.3 does not support point format negotiation and renames the extension to 'Supported Groups'; point format extensions are not mandated.
section: "3"
topics:
