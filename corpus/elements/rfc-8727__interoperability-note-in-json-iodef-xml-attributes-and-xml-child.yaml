document: rfc-8727
kind: interoperability-note
summary: In JSON IODEF, XML attributes and XML child elements of a class are both represented as JSON object attributes, and order of appearance is ignored. This differs from XML IODEF where element ordering and attribute syntax are distinct.
section: "3.2"
topics:
