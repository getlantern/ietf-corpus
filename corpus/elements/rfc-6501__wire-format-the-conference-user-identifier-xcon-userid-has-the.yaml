document: rfc-6501
kind: wire-format
summary: 'The conference user identifier (XCON-USERID) has the format: XCON-USERID = ''xcon-userid'' '':'' conf-user-id, where conf-user-id = 1*unreserved. All components MUST be converted to lowercase and compared codepoint-by-codepoint per RFC 3986 Section 6.2.1.'
section: 4.6.5
topics:
    - realtime
