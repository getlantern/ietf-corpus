document: rfc-2251
kind: normative-requirement
summary: A client MUST NOT send a second request with the same messageID as an outstanding request on the same connection. Additionally, a client MUST NOT reuse the message ID of an abandonRequest or the abandoned operation until a response to a subsequent request has been received.
section: 4.1.1.1
rfc2119_level: MUST NOT
topics:
    - ldap
