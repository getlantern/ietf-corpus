document: rfc-7427
kind: design-rationale
summary: The SIGNATURE_HASH_ALGORITHMS Notify is sent in IKE_SA_INIT (not IKE_AUTH) so that the hash algorithm list is exchanged before authentication occurs, enabling both peers to know which hash algorithms are acceptable before generating or verifying any signature.
