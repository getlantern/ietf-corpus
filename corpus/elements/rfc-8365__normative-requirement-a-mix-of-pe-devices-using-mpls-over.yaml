document: rfc-8365
kind: normative-requirement
summary: A mix of PE devices using MPLS over GRE (running RFC 7432 split-horizon filtering) and PE devices using VXLAN/NVGRE (running local-bias procedures) on the same Ethernet segment MUST NOT be configured.
section: 8.3.1
rfc2119_level: MUST NOT
topics:
    - routing
