document: rfc-3355
kind: wire-format
summary: 'AAL5 CPCS-PDU format: payload field (up to 2^16-1 octets), PAD field (0-47 octets), CPCS-UU (1 octet), CPI (1 octet), Length (2 octets), and CRC (4 octets). The CRC is computed over the entire CPCS-PDU except the CRC field itself.'
