document: rfc-9708
kind: protocol-element
summary: When signed attributes are absent, HSS_LMS_Sign is computed over the content directly. When signed attributes are present, Hash(content) forms the message-digest attribute and HSS_LMS_Sign is computed over DER(SignedAttributes), which MUST include content-type and message-digest attributes.
section: "5"
topics:
    - crypto
