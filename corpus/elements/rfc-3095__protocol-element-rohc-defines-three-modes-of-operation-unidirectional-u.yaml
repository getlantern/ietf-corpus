summary: 'ROHC defines three modes of operation: Unidirectional (U-mode, no feedback), Bidirectional Optimistic (O-mode, sparse feedback for error recovery), and Bidirectional Reliable (R-mode, intensive feedback acknowledging all context updates). States and modes are orthogonal abstractions.'
