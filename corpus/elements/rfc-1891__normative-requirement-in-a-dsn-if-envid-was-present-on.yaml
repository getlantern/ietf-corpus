document: rfc-1891
kind: normative-requirement
summary: In a DSN, if ENVID was present on the MAIL command, the Original-Envelope-ID field MUST be supplied with the xtext-decoded value; if absent it MUST NOT appear. The Reporting-MTA field MUST be supplied; if the FQDN is known, MTA-name-type MUST be 'dns'. The Final-Recipient field MUST be supplied with the envelope recipient address.
section: "7.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
