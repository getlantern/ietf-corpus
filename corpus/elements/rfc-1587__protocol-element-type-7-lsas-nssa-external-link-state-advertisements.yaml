document: rfc-1587
kind: protocol-element
summary: Type-7 LSAs (NSSA External Link-State Advertisements) carry external route information within an NSSA. They are structurally identical to type-5 LSAs except the LSA header type field is 7, they are area-scoped (flooded only within the NSSA), and they include a P-bit in the options field to flag translation to type-5.
section: "3.3"
topics:
    - routing
