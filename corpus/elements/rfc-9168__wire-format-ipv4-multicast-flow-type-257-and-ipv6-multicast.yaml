summary: 'IPv4 Multicast Flow (Type=257) and IPv6 Multicast Flow (Type=258) TLVs encode: Reserved field, S and G wildcard bits, Src Mask Length, Group Mask Length, Source Address (32 or 128 bits), and Group multicast Address (32 or 128 bits). If G=1 and S=0, receiver MUST respond with PCErr Error-Type 30/Error-value 2.'
