document: rfc-3986
kind: protocol-element
summary: 'A scheme name must begin with a letter and may be followed by any combination of letters, digits, plus ("+"), period ("."), or hyphen ("-"): scheme = ALPHA *( ALPHA / DIGIT / "+" / "-" / "." ). Scheme names are case-insensitive; canonical form is lowercase.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
