document: rfc-793
kind: wire-format
summary: The TCP checksum is a 16-bit one's complement of the one's complement sum of all 16-bit words in the header and data, computed over a 96-bit pseudo-header prepended to the TCP segment containing Source Address, Destination Address, Protocol, and TCP Length. This protects against misrouted segments.
section: "3.1"
topics:
    - tcp
    - security
