document: rfc-7909
kind: normative-requirement
summary: The signer of an RPSL object MUST possess a relevant resource certificate demonstrating them as the legitimate holder of the Internet number resource. The certificate's RFC 3779 extensions MUST cover the resources in the primary key of the signed object.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
    - pkix
    - security
