document: rfc-9033
kind: normative-requirement
summary: Nodes MUST use the SAX hash function (as defined in SAX-DASFAA Section 2) with consistent input parameters to compute [slotOffset, channelOffset] for autonomous cells from an EUI-64 address, distributing cells across all channel offsets and all but the first slot offset of Slotframe 1.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
