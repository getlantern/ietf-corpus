document: rfc-4007
kind: protocol-element
summary: A zone index is a node-local identifier assigned to each zone of the same scope to which a node is attached, allowing internal uses of an address to be qualified by a zone index. Zone indices are strictly local to the node — the node on the other end of a link may use entirely different index values for the same zone.
section: "6"
