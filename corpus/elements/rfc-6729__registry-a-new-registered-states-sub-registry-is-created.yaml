document: rfc-6729
kind: registry
summary: 'A new ''Registered-states'' sub-registry is created under the MAIL Parameters registry at IANA. Governed by First Come First Served rules; entries require Name, Description, Specification, and Use (current/deprecated/historic). Only queue state keywords may be registered; not secondary ''value'' tokens. Initial registrations: auth, content, convert, moderation, normal, other, outbound, quarantine, timed — all ''current''.'
section: "6.2"
topics:
