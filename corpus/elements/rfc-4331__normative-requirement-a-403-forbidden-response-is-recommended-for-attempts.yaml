document: rfc-4331
kind: normative-requirement
summary: A 403 Forbidden response is RECOMMENDED for attempts to write either the protected DAV:quota-available-bytes or the computed DAV:quota-used-bytes property; the server SHOULD include an XML error body with the <DAV:cannot-modify-protected-property/> precondition tag as defined by DeltaV (RFC 3253).
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - http
