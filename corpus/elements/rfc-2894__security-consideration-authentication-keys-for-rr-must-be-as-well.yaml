document: rfc-2894
kind: security-consideration
summary: Authentication keys for RR must be as well protected as any other router reconfiguration access method. Key distribution must not expose or permit alteration of keys, and key validity must be limited in time and number of messages. Replay of old messages must be prevented by the sequence number mechanism.
section: "7"
topics:
