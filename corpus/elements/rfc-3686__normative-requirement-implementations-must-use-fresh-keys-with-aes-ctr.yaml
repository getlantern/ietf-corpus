document: rfc-3686
kind: normative-requirement
summary: Implementations MUST use fresh keys with AES-CTR. It is inappropriate to use AES-CTR with static keys, as extraordinary measures would be needed to prevent IV reuse across power cycles.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
