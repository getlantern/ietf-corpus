document: rfc-9761
kind: design-rationale
summary: A network-designated DoH/DoT server is required for MUD policy enforcement because IoT devices that use a pre-configured DNS resolver bypass the network's ability to monitor and filter DNS queries, which is a common malware technique to evade MUD-based filtering.
section: "4.2"
topics:
    - dns
    - tls
    - security
