document: rfc-7173
kind: normative-requirement
summary: TRILL IS-IS Hello and MTU PDUs (critical for adjacency) SHOULD be sent with the MPLS Traffic Class calling for maximum priority handling. Other IS-IS PDUs SHOULD use the highest priority below maximum, and TRILL Data packets SHOULD use lower Traffic Classes than IS-IS PDUs.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - qos
    - routing
