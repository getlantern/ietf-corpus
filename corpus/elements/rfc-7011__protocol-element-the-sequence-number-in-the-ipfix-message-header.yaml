document: rfc-7011
kind: protocol-element
summary: The Sequence Number in the IPFIX Message Header is an incremental counter modulo 2^32 of all IPFIX Data Records sent in the current stream from the current Observation Domain. Each SCTP stream counts separately; TCP and UDP sessions are treated as a single stream. Template and Options Template Records do not increment the Sequence Number.
section: "3.1"
topics:
    - measurement
