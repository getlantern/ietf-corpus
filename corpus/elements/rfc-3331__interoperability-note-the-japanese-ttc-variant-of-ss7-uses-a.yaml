document: rfc-3331
kind: interoperability-note
summary: The Japanese TTC variant of SS7 uses a distinct Protocol Data 2 parameter (Tag 0x301) instead of the standard Protocol Data 1 (Tag 0x300); TTC PDUs begin at the Length Indicator (LI) octet rather than the Signalling Information Octet (SIO), and the spare bits of the LI are used for priority.
section: 3.3.1.1
topics:
    - realtime
