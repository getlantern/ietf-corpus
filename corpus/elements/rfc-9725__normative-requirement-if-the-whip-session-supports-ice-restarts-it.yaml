document: rfc-9725
kind: normative-requirement
summary: If the WHIP session supports ICE restarts, it MUST generate a unique strong entity-tag identifying the ICE session and return it in an ETag header in the '201 Created' response. Missing ETags in PATCH requests MUST elicit '428 Precondition Required'; mismatched ETags MUST elicit '412 Precondition Failed'.
section: 4.3.1
rfc2119_level: MUST
topics:
    - webrtc
    - http
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
