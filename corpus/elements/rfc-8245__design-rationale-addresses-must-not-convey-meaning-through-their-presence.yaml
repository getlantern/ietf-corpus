document: rfc-8245
kind: design-rationale
summary: Addresses MUST NOT convey meaning through their presence, absence, or ordering because doing so would reduce extensibility, prevent generic information representation, and reduce message optimization options. Assigning meaning to address presence would, for example, make it impossible to add a 'blacklist' extension to NHDP that an unmodified implementation could safely ignore.
section: "4.6"
topics:
    - routing
extracted_by: claude-sonnet-4-6
