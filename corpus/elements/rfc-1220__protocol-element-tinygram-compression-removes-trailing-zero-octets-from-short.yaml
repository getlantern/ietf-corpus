document: rfc-1220
kind: protocol-element
summary: Tinygram Compression removes trailing zero octets from short IEEE 802.3 PDUs (those at or below the minimum PDU size) before transmission on low-speed links, tagging the frame with the Zero-Compression flag so the receiver can re-pad to minimum 802.3 length. Compression is at the transmitter's option and is advisory.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
