document: rfc-4695
kind: security-consideration
summary: Implementors must read the Security Considerations of RFC 3550 (RTP), RFC 3551 (AVP), and other applicable RTP profile documents, as those issues directly apply to RTP MIDI streams. The Secure Real-time Transport Protocol (SRTP) should also be reviewed for protecting MIDI streams in hostile network environments.
section: "9"
topics:
    - security
    - rtp
    - realtime
