document: rfc-4271
kind: normative-requirement
summary: Unrecognized transitive optional attributes SHOULD be accepted; when passed to other peers they MUST be forwarded with the Partial bit set to 1. Once the Partial bit is set to 1 by a previous AS, it MUST NOT be reset to 0. Unrecognized non-transitive optional attributes MUST be quietly ignored.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
