document: rfc-9767
kind: security-consideration
summary: Since the RS sees the raw token value, a compromised RS can leak it to an attacker. Bearer tokens and symmetric-key-bound tokens are especially at risk because the RS holds all information needed to replay the token. RSs should exchange incoming tokens for derived, RS-specific tokens as described in Section 4.
section: "6.5"
topics:
    - security
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
