document: rfc-5910
kind: protocol-element
summary: 'The <secDNS:rem> element supports removing DS or key data via three exclusive sub-choices: <secDNS:all> (boolean true removes all DS and key data), one or more <secDNS:dsData> elements (DS Data Interface), or one or more <secDNS:keyData> elements (Key Data Interface). The <secDNS:dsData> removal requires all four fields to uniquely identify the record.'
section: 5.2.5
topics:
    - dns
    - security
