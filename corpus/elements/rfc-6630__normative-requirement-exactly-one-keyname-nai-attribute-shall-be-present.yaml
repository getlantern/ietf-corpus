document: rfc-6630
kind: normative-requirement
summary: Exactly one keyName-NAI attribute SHALL be present in both EAP-Initiate/Re-auth and EAP-Finish/Re-auth packets. The NAI MUST NOT exceed 253 octets, and the realm part SHOULD follow internationalized domain name conventions per RFC 5890.
section: "5.2"
rfc2119_level: REQUIRED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
