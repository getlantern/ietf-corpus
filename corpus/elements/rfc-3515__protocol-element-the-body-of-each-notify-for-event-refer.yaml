document: rfc-3515
kind: protocol-element
summary: The body of each NOTIFY for event refer MUST be of type 'message/sipfrag' and MUST begin with a SIP Response Status-Line. The response class indicates the status of the referred action. The refer event package does not support state deltas.
section: 2.4.5
topics:
