document: rfc-4675
kind: security-consideration
summary: VLAN attributes sent by a RADIUS/Diameter server or proxy may enable access to unauthorized VLANs. These vulnerabilities can be limited by performing authorization checks at the NAS, such as configuring the NAS to accept only certain VLANIDs from a given server or proxy.
section: "6"
topics:
    - radius
    - diameter
    - security
