document: rfc-3801
kind: normative-requirement
summary: A globally unique Message-Id MUST be generated for each message sent from a VPIM-conforming implementation. When provided in the original message, the Message-Id MUST be used when sending an MDN.
section: 4.2.7
rfc2119_level: MUST
