document: rfc-7178
kind: design-rationale
summary: RBridge Channel messages are designed to look like TRILL Data frames so that transit RBridges can normally handle them without special processing. The optional RBridge Channel Alert extended header flag is used only when transit RBridge examination is required, minimizing unnecessary burden on transit RBridges.
section: "1.1"
topics:
    - routing
