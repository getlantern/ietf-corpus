document: rfc-5760
kind: protocol-element
summary: The SSM unicast feedback architecture defines a Distribution Source that relays RTP to receivers via source-specific multicast, while receivers send RTCP feedback unicast to a Feedback Target. The Feedback Target forwards original or summarized RTCP to the Distribution Source, which relays reports back to all receivers on the multicast RTCP channel.
section: "4"
topics:
