document: rfc-1891
kind: normative-requirement
summary: If ORCPT was provided for a recipient, the Original-Recipient DSN field MUST be supplied from the ORCPT value; if absent it MUST NOT appear. The Action field and Status field MUST be supplied; when no specific status code applies, 4.0.0 or 5.0.0 MUST be used.
section: "7.3"
rfc2119_level: MUST
topics:
    - email
