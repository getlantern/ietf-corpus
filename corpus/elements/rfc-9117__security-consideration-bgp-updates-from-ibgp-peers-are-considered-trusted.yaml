document: rfc-9117
kind: security-consideration
summary: 'BGP updates from iBGP peers are considered trusted, so intra-domain Flow Specification originators need not match the best-match unicast route originator. However, this trustworthiness is not absolute: the relaxation introduces the new possibility that a rogue iBGP speaker could originate undesired Flow Specifications.'
section: "7"
topics:
    - bgp
    - security
