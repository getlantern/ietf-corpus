document: rfc-5151
kind: security-consideration
summary: To preserve confidentiality of network topology, an operator may disallow recording of internal hops in the RRO, may filter out certain recorded RRO addresses at the domain border node, and may require the border node to modify the addresses in PathErr or Notify messages originating from within the domain.
section: "8"
