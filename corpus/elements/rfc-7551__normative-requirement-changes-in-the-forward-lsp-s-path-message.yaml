document: rfc-7551
kind: normative-requirement
summary: Changes in the forward LSP's Path message, including its REVERSE_LSP Object, MUST result in corresponding changes in the reverse LSP. Objects copied during initial reverse LSP creation MUST be updated when modified in the forward LSP, and the resulting trigger Path message MUST be processed.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
