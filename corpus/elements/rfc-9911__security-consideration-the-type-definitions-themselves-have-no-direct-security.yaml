document: rfc-9911
kind: security-consideration
summary: The type definitions themselves have no direct security impact on the Internet. However, the security considerations of RFC 7950 (YANG 1.1) apply, since the usage of these types in concrete YANG modules accessed via NETCONF or RESTCONF may expose sensitive network configuration data.
section: "6"
topics:
    - yang
    - netconf
    - security
