document: rfc-6705
kind: normative-requirement
summary: The MAG MUST verify the attachment status of both MNs locally via the binding cache and MUST verify that the EnableMAGLocalRouting flag is set to 1; if not, it MUST reject the LRI and send an LRA with Status code 'Localized Routing Not Allowed'.
section: "5"
rfc2119_level: MUST
topics:
