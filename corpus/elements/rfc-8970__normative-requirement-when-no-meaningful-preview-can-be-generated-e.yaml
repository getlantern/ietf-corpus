document: rfc-8970
kind: normative-requirement
summary: When no meaningful preview can be generated (e.g., for encrypted messages or unsupported content types), the server MUST return a zero-length string. Clients SHOULD NOT send another FETCH for a preview for such messages.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
