document: rfc-9167
kind: protocol-element
summary: The <maint:description> element is an optional free-form description with optional 'lang' (RFC 5646 language tag, default 'en') and 'type' attributes. The 'type' MUST be 'plain' for plain text or 'html' for HTML text (as defined in HTML5, XML-escaped), defaulting to 'plain'.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
