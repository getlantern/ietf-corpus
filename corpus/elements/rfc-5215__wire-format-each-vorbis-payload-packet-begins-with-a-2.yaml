document: rfc-5215
kind: wire-format
summary: Each Vorbis payload packet begins with a 2-octet length header (network byte order) indicating the size in bytes of the following Vorbis data, followed by the raw Vorbis data padded to the nearest byte boundary. The length value excludes the length field itself.
