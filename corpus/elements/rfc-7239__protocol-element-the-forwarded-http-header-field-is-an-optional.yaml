document: rfc-7239
kind: protocol-element
summary: The "Forwarded" HTTP header field is an optional request-only header that allows proxy components to disclose information altered or lost during proxying, such as the originating client IP address, incoming interface IP, or protocol used. Each proxy in the chain may append a semicolon-separated set of parameter-identifier pairs. It is not to be used in HTTP responses.
section: "4"
topics:
