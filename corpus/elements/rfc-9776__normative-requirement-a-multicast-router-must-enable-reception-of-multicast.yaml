document: rfc-9776
kind: normative-requirement
summary: A multicast router MUST enable reception of multicast address 224.0.0.22 from all sources on each interface over which IGMPv3 is run, and MUST perform the group member part of IGMPv3 for that address. IGMPv3 Membership Reports are sent to 224.0.0.22.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
    - ip
