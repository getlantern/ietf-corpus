document: rfc-1349
kind: protocol-element
summary: A router associates a TOS value with each route in its forwarding table. Routes learned via TOS-aware routing protocols get the appropriate TOS; routes from non-TOS protocols get the default TOS (0000); static routes have their TOS assigned by the network manager.
section: "7.2"
topics:
    - ip
    - qos
    - routing
