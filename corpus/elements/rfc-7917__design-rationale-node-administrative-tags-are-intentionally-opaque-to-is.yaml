document: rfc-7917
kind: design-rationale
summary: Node administrative tags are intentionally opaque to IS-IS and have no well-known values requiring IANA registration. This avoids overloading the extension with protocol-specific semantics; new IS-IS extensions needing well-known values should define their own signaling.
section: "4.2"
topics:
