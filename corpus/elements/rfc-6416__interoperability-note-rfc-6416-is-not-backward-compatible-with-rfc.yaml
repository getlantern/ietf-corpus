document: rfc-6416
kind: interoperability-note
summary: RFC 6416 is NOT backward compatible with RFC 3016 because a binary-incompatible newer version of LATM is mandated. Existing RFC 3016 implementations using the old LATM version MUST be updated; implementations already using the newer LATM (e.g., 3GPP PSS) may already comply with RFC 6416.
section: "1.3"
topics:
