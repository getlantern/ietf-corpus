document: rfc-5170
kind: security-consideration
summary: Access to confidential objects should be protected via encryption at the object level or per-packet (e.g., IPsec/ESP). If confidentiality is a concern, it is RECOMMENDED that one of these solutions be used; these threats are not specific to or facilitated by FEC.
section: 8.2.1
rfc2119_level: RECOMMENDED
topics:
    - security
    - privacy
