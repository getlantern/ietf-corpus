document: rfc-8006
kind: security-consideration
summary: CDNI Metadata may contain sensitive content policy information (geo-blocking rules, ACLs, origin server addresses, authorization keys) and SHOULD be protected for confidentiality. The CDNI Metadata interface SHOULD be secured using TLS.
section: "8.2"
topics:
    - security
    - privacy
    - tls
