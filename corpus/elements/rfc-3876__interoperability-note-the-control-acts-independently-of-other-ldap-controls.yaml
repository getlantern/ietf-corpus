document: rfc-3876
kind: interoperability-note
summary: 'The control acts independently of other LDAP controls such as server-side sorting and duplicate entries, but sequencing matters: if sorting is done before value filtering, the result set may appear in the wrong order since filtering may remove the sort-key attribute values.'
section: "4"
