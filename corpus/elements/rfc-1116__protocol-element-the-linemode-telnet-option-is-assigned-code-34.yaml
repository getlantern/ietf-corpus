document: rfc-1116
kind: protocol-element
summary: 'The LINEMODE Telnet option is assigned code 34. It uses three suboptions: MODE (1), FORWARDMASK (2), and SLC (3). LINEMODE enables client-side line editing, reducing network traffic to one packet per command line rather than one per character.'
