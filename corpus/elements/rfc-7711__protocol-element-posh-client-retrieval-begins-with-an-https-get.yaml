document: rfc-7711
kind: protocol-element
summary: POSH client retrieval begins with an HTTPS GET to '/.well-known/posh/{servicedesc}.json' at the source domain. The source domain responds with either a fingerprints document (200), a reference document (200 with 'url'), or HTTP 404 if no POSH information exists.
