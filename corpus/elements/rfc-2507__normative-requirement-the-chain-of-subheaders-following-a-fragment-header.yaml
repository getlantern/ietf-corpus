document: rfc-2507
kind: normative-requirement
summary: The chain of subheaders following a Fragment Header MUST NOT be compressed, because fragments can arrive out of order and the compressor cannot reliably examine inner subheaders for stream identification.
section: "7.6"
rfc2119_level: MUST NOT
