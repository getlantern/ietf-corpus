document: rfc-9516
kind: wire-format
summary: 'The Errored TLVs TLV (Type=2) encapsulates unrecognized or malformed TLVs as sub-TLVs. Each sub-TLV contains: Sub-TLV Type (copy of the errored TLV''s first octet), Reserved (1-octet, MUST be zeroed), Sub-TLV Length (copy of the errored TLV''s Length field), and Sub-TLV Value (data following the Length field in the errored TLV).'
section: 6.4.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
