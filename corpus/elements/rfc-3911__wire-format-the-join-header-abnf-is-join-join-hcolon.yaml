document: rfc-3911
kind: wire-format
summary: 'The Join header ABNF is: Join = "Join" HCOLON callid *(SEMI join-param); join-param = to-tag / from-tag / generic-param; to-tag = "to-tag" EQUAL token; from-tag = "from-tag" EQUAL token. It must contain exactly one to-tag and one from-tag for unique dialog matching.'
