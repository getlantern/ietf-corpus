document: rfc-8929
kind: design-rationale
summary: 'Explicit address registration via NS/EARO is preferred over snooping because snooping is unreliable: a silent node may not be discovered immediately due to packet loss, and state changes due to mobility may be missed or misordered, leading to unreliable connectivity and incomplete knowledge of network state.'
