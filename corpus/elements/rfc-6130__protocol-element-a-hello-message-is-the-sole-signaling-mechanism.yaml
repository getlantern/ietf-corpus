document: rfc-6130
kind: protocol-element
summary: A HELLO message is the sole signaling mechanism in NHDP. Each router generates HELLO messages independently on each MANET interface to advertise its own addresses, report 1-hop link status, and enable discovery of symmetric 2-hop neighbors.
