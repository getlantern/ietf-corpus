document: rfc-5533
kind: protocol-element
summary: Context Tags are 47-bit numbers allocated by each end of a context, used to demultiplex both Shim6 Payload Extension headers and control messages. Because Payload Extension headers are demultiplexed without examining locators, a receiver's Context Tags must be unique across all of its contexts.
section: "4.1"
topics:
    - ip
    - v6ops
