document: rfc-8999
kind: design-rationale
summary: The invariants defined in this document exist specifically to ensure that new versions of QUIC can be deployed. By documenting only the properties that cannot change, the document preserves the ability for endpoints to negotiate changes to any other aspect of the protocol. As a consequence, it also defines the minimal information made available to entities other than endpoints.
section: "2"
topics:
