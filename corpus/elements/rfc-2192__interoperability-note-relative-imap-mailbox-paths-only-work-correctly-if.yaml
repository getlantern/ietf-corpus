document: rfc-2192
kind: interoperability-note
summary: Relative IMAP mailbox paths only work correctly if the mailbox uses '/' as the hierarchy delimiter, since URLs always use '/' for path resolution. For mailboxes using other delimiters, the entire mailbox name MUST be specified in the relative URL or inherited as a whole from the base URL.
section: "8"
rfc2119_level: MUST
topics:
    - email
