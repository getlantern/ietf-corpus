document: rfc-8800
kind: normative-requirement
summary: When both SVEC and ASSOCIATION objects are present in a PCReq, the PCE MUST try to find a path that meets both sets of constraints simultaneously. If no such path is possible, the PCE MUST send a PCRep with a NO-PATH object indicating failure.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
