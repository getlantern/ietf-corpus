document: rfc-7986
kind: protocol-element
summary: The COLOR property (new) specifies a display color for a calendar or calendar component (VEVENT, VTODO, VJOURNAL). Its value is a case-insensitive CSS3 color name from W3C CSS Color Module Level 3. It may appear at most once per context.
section: "5.9"
