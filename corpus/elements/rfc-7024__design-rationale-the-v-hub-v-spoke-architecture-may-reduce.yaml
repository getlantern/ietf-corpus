document: rfc-7024
kind: design-rationale
summary: The V-hub/V-spoke architecture may reduce ingress replication bandwidth by having V-spokes replicate only to their V-hub(s), and having each V-hub replicate only to its associated V-spokes, rather than every PE replicating to all others. This is especially beneficial when V-spoke PEs have limited replication capability or bandwidth.
section: "1"
topics:
