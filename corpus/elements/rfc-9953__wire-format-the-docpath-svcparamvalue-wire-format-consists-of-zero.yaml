document: rfc-9953
kind: wire-format
summary: The "docpath" SvcParamValue wire format consists of zero or more length-value pairs, each prefixed by a single-octet length field, concatenated to fill the SvcParamValue exactly. The root path "/" is encoded as zero length-value pairs (SvcParamValue length 0). This encoding matches that of the "alpn" SvcParam.
section: "3.2"
topics:
