document: rfc-2580
kind: design-rationale
summary: The AGENT-CAPABILITIES value is bound to a sysORID instance, enabling management stations to retrieve sysORID values from an agent and consult a database of capabilities statements to optimize their management application behavior. This allows concise, machine-readable description of agent capabilities.
