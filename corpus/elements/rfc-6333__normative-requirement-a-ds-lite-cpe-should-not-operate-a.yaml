document: rfc-6333
kind: normative-requirement
summary: A DS-Lite CPE SHOULD NOT operate a NAT function between its internal LAN interface and the B4 interface, to avoid creating an unintended double-NAT environment; NAT is performed exclusively by the AFTR in the service provider network.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
