document: rfc-8817
kind: protocol-element
summary: 'Packet Loss Concealment (PLC) uses MELPe 2400 bps pitch/voicing parameter: the erasure indication is any errored encoding of a non-voiced frame; preferred code is value 3 (P0=P1=1, P2–P6=0). For 1200 or 600 bps mode, the MELPe 2400 bps decoder is called 3 or 4 times respectively to cover the lost frame.'
section: "6"
