document: rfc-5015
kind: normative-requirement
summary: A BIDIR-PIM router SHOULD provide an option to limit the set of neighbors from which it will accept Join/Prune, Assert, and DF-election messages. A PIM router SHOULD NOT accept protocol messages from a router from which it has not yet received a valid Hello message.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
