document: rfc-7266
kind: normative-requirement
summary: MOS values for narrowband, wideband, and super-wideband codecs occupy the same numerical range but SHOULD be reported separately using the 'mosref' attribute (l/m/h resolution). Similarly, SD and HD video MOS scores SHOULD be reported in different values.
section: "4.1"
rfc2119_level: SHOULD
