document: rfc-9682
kind: protocol-element
summary: The type2 rule is extended with a head-number production (uint / '<' type '>') for tag numbers (#6) and simple values (#7), replacing the prior literal-only uint. This allows tag number ranges and type-parameterized tag/simple-value specifications in CDDL.
section: "3.2"
topics:
