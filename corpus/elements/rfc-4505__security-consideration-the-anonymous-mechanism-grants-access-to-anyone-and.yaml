document: rfc-4505
kind: security-consideration
summary: The ANONYMOUS mechanism grants access to anyone and should be disabled by default so administrators can make an explicit decision to enable it. If anonymous users have write privileges, denial-of-service attacks are possible by exhausting storage.
section: "5"
topics:
    - security
