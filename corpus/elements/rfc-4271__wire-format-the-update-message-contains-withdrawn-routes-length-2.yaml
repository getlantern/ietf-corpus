document: rfc-4271
kind: wire-format
summary: 'The UPDATE message contains: Withdrawn Routes Length (2 octets), Withdrawn Routes (variable, <length,prefix> tuples), Total Path Attribute Length (2 octets), Path Attributes (variable), and NLRI (variable). NLRI length is derived as: message length − 23 − path attr length − withdrawn routes length. Minimum size is 23 octets.'
