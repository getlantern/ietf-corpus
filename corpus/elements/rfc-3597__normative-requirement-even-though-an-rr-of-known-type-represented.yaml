document: rfc-3597
kind: normative-requirement
summary: Even though an RR of known type represented in the '\#' generic format is parsed as an unknown type, all further processing by the server MUST treat it as a known type and apply applicable type-specific rules regarding compression, canonicalization, etc.
section: "5"
rfc2119_level: MUST
