document: rfc-5660
kind: normative-requirement
summary: The key manager MUST prevent conflicts amongst latches and between any latch and existing or proposed child SAs. Non-listener connection latches MUST NOT be created if conflicting SAs exist in the SAD at the time of creation.
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
