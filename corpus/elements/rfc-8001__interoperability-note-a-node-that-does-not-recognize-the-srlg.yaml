document: rfc-8001
kind: interoperability-note
summary: A node that does not recognize the SRLG Collection Flag in the Attribute Flags TLV will pass it unaltered if in an LSP_ATTRIBUTES object, or reject the Path message with the appropriate error if in an LSP_REQUIRED_ATTRIBUTES object, per RFC 5420.
section: "5.4"
topics:
