document: rfc-4213
kind: protocol-element
summary: Configured tunneling encapsulates IPv6 packets within IPv4 headers to carry them over IPv4 routing infrastructure. Tunnel endpoints are determined by explicit configuration; all tunnels are assumed bidirectional and provide a virtual point-to-point link to the IPv6 layer.
