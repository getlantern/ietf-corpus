document: rfc-6712
kind: design-rationale
summary: HTTP was chosen as the sole transfer protocol because it is generally easy to implement, able to traverse network borders using ubiquitous proxies, and already commonly used in existing CMP implementations. The earlier TCP-based management protocol was found needless and cumbersome.
