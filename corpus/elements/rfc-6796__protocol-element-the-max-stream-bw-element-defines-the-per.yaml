document: rfc-6796
kind: protocol-element
summary: 'The <max-stream-bw> element defines the per-stream maximum bandwidth in kbps including RTP, UDP, and IP overhead. It supports ''direction'', ''media-type'', and ''label'' attributes; a ''label'' scoped element applies only to the <stream> element with the matching label. Merging: the lowest value MUST be used.'
section: "6.5"
topics:
    - sip
    - realtime
    - qos
