document: rfc-2402
kind: protocol-element
summary: The Sequence Number is a mandatory, monotonically increasing unsigned 32-bit counter initialized to 0 when an SA is established; the first packet on a given SA has Sequence Number 1. The field is always present even if the receiver does not enable anti-replay.
section: "2.5"
topics:
