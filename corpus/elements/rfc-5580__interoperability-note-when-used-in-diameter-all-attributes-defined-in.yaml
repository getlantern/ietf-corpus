document: rfc-5580
kind: interoperability-note
summary: When used in Diameter, all attributes defined in this specification are used as AVPs from the RADIUS compatibility code space (1–255) with no additional Diameter code values allocated. Attributes are copied as-is across RADIUS/Diameter gateways, except for header, alignment, and padding adjustments.
