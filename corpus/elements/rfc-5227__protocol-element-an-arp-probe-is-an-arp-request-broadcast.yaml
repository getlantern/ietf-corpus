document: rfc-5227
kind: protocol-element
summary: An 'ARP Probe' is an ARP Request broadcast on the local link with the 'sender IP address' (ar$spa) set to all zeroes and the 'target IP address' (ar$tpa) set to the address being probed. The all-zero sender IP prevents polluting ARP caches if the address is already in use.
section: "1.1"
topics:
    - ip
