document: rfc-3463
kind: normative-requirement
summary: The subject sub-code, if recognized, must be reported even if the additional detail provided by the detail sub-code is not recognized; clients should preserve extensibility by reporting the general error described in the subject sub-code when the specific detail is unrecognized.
