document: rfc-2049
kind: interoperability-note
summary: CRLF sequence persistence across gateways and user agents cannot be relied on, as conversion between base64 and quoted-printable may conflate CRLFs with line breaks. Implementations must not depend on CRLF sequences being preserved as something other than line breaks.
section: "3"
topics:
    - email
