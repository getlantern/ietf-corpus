document: rfc-8353
kind: protocol-element
summary: GSSContext is the central interface encapsulating security context state for one peer, including cryptographic keys and sequence numbers. It provides initSecContext and acceptSecContext for establishment, wrap/unwrap and getMIC/verifyMIC for per-message protection, and export for inter-process transfer.
