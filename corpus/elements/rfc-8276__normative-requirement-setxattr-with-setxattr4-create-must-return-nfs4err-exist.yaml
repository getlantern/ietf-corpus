document: rfc-8276
kind: normative-requirement
summary: SETXATTR with SETXATTR4_CREATE MUST return NFS4ERR_EXIST if the attribute key already exists; SETXATTR4_REPLACE MUST return NFS4ERR_NOXATTR if the attribute key does not exist. A successful SETXATTR MUST change the file time_metadata and change attributes if the xattr is created or its value changes.
section: 8.4.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
