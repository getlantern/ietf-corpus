document: rfc-8144
kind: design-rationale
summary: 'The ''return=representation'' preference on state-changing requests provides atomicity: by returning the server''s current representation in the response, the client can know any changes were produced by the server rather than a concurrent client, eliminating the need for a subsequent GET request.'
section: "3.1"
topics:
    - http
