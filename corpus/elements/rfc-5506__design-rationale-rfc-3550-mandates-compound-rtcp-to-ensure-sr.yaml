document: rfc-5506
kind: design-rationale
summary: RFC 3550 mandates compound RTCP to ensure SR/RR packets reach all participants for session-size estimation and RTCP bandwidth bounding, and to deliver CNAME SDES items needed for media synchronization and SSRC collision detection. These functions require regular transmission and are the primary reason Reduced-Size RTCP cannot replace compound RTCP entirely.
section: "3.1"
topics:
    - rtp
    - realtime
