document: rfc-7434
kind: normative-requirement
summary: ISDN interworking gateways encode octet-structured ISDN data using 'hex' encoding for the SIP User-to-User header field, and decode in the reverse direction. All content is treated as octet-structured binary regardless of the protocol discriminator value; no additional checking of the discriminator is performed.
section: "10"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
