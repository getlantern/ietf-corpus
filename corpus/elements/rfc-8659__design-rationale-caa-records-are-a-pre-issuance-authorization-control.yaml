document: rfc-8659
kind: design-rationale
summary: CAA records are a pre-issuance authorization control performed by the CA, whereas TLSA (DANE) records are a post-issuance verification control performed by Relying Parties. Conformance with CAA is necessary but not sufficient for certificate issuance.
