document: rfc-6570
kind: protocol-element
summary: Reserved expansion ("+" operator) and fragment expansion ("#" operator) allow the union of (unreserved / reserved / pct-encoded) characters to pass through without pct-encoding. All other operators allow only unreserved characters through without pct-encoding.
