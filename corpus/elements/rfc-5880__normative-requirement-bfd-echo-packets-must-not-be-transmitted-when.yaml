document: rfc-5880
kind: normative-requirement
summary: BFD Echo packets MUST NOT be transmitted when bfd.SessionState is not Up, and MUST NOT be transmitted unless the last received BFD Control packet contains a nonzero Required Min Echo RX Interval. The Echo packet payload is a local matter but SHOULD include some form of authentication since Echo packets may be spoofed.
section: 6.8.9
rfc2119_level: MUST
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
