document: rfc-6347
kind: normative-requirement
summary: Implementations MUST either abandon an association or rehandshake prior to allowing the record sequence number to wrap. Additionally, implementations MUST NOT allow the epoch to wrap; instead they MUST establish a new association.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
