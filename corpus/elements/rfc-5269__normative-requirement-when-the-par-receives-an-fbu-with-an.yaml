document: rfc-5269
kind: normative-requirement
summary: When the PAR receives an FBU with an authenticator, it MUST find the handover key using the MN's care-of CGA as index and verify the authenticator. If no handover key is found, the PAR MUST NOT change forwarding for the care-of CGA.
section: "3.5"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
