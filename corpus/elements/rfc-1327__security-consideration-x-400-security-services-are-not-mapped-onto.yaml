document: rfc-1327
kind: security-consideration
summary: 'X.400 security services are not mapped onto RFC 822: Content Confidentiality, Content Integrity, Message Security Labelling, Message Sequence Integrity, Non-Repudiation of Delivery, Non-Repudiation of Origin, Message Flow Confidentiality, and Message Origin Authentication are all listed as ''Not Supported''. Gateways generate non-delivery notifications for service elements marked critical that cannot be mapped.'
section: 2.3.1
topics:
