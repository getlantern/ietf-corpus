document: rfc-9335
kind: design-rationale
summary: The first two bytes of the RTP packet and the SSRC/sequence number fields are intentionally left unencrypted to preserve backward compatibility with systems that expect a standard RTPv2 structure for demultiplexing, and because SRTP key scheduling depends on sequence number and SSRC.
