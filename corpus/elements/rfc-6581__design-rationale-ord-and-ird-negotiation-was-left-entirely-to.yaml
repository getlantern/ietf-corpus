document: rfc-6581
kind: design-rationale
summary: ORD and IRD negotiation was left entirely to the ULP by the existing RDDP suite, requiring every application to re-implement encoding of these parameters in Private Data. Standardizing this exchange enables common connection establishment code to configure RDMA endpoints uniformly across InfiniBand and RDDP transports without per-ULP duplication.
section: "4.1"
topics:
    - realtime
