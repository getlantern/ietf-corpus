document: rfc-1442
kind: design-rationale
summary: Conceptual rows should contain no more than approximately 20 columnar objects, and should be organized along functional or usage lines (e.g., one row for statistics, another for parameters). This reflects the constraint that a single PDU must be able to carry a full row fetch, and avoids over-fragmentation that mimics OSI-style optional attributes.
section: "11"
