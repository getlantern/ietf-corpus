document: rfc-8343
kind: protocol-element
summary: The 'statistics' container under each interface entry is read-only (config false) and contains a mandatory 'discontinuity-time' leaf (yang:date-and-time), 64-bit counters for in-octets, in-unicast-pkts, in-broadcast-pkts, in-multicast-pkts, out-octets, out-unicast-pkts, out-broadcast-pkts, out-multicast-pkts, and 32-bit counters for in-discards, in-errors, in-unknown-protos, out-discards, out-errors.
section: "5"
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
