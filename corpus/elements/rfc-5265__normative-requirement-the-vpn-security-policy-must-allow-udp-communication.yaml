document: rfc-5265
kind: normative-requirement
summary: The VPN security policy MUST allow UDP communication to internal home agent(s) on port 434 (any remote port), and SHOULD also allow IP-IP to internal home agent addresses, to permit MIPv4 registration traffic through the IPsec tunnel.
section: "4.2"
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
    - mobility
