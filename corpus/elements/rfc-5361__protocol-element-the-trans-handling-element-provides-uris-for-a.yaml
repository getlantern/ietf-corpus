document: rfc-5361
kind: protocol-element
summary: 'The <trans-handling> element provides URIs for a recipient to grant or deny relay permission to perform a translation. Each policy rule must contain at least two <trans-handling> elements: one with a URI to grant and one with a URI to deny permission.'
