document: rfc-3448
kind: normative-requirement
summary: If the sender has been idle since the nofeedback timer was set and X_recv is less than four packets per RTT, X_recv MUST NOT be halved on timer expiration. This ensures the allowed rate never drops below two packets per RTT due to idleness.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
