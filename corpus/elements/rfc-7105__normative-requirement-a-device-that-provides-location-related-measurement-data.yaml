document: rfc-7105
kind: normative-requirement
summary: A Device that provides location-related measurement data MUST only do so as explicitly authorized by a Rule Maker, requiring an interface that allows Rule Makers (e.g., users or administrators) to control where and how measurement data is provided.
section: "6.1"
rfc2119_level: MUST
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
