document: rfc-9172
kind: wire-format
summary: Security Results is a CBOR array of per-target result arrays, ordered identically to the Security Targets field. Each individual result is a CBOR 2-tuple of Result Id (CBOR unsigned integer) and Result Value (context-defined CBOR encoding). There MUST be exactly one target results entry per security target.
section: "3.6"
topics:
    - security
    - cbor
