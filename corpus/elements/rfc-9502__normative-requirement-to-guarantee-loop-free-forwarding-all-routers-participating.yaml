document: rfc-9502
kind: normative-requirement
summary: To guarantee loop-free forwarding, all routers participating in a Flex-Algorithm MUST agree on the Flexible Algorithm Definition (FAD). Selected nodes within the IGP domain MUST advertise FADs as described in RFC 9350.
section: "4"
rfc2119_level: MUST
topics:
