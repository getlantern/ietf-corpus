document: rfc-7876
kind: normative-requirement
summary: This protocol MUST be run in accordance with RFC 5405 (Unicast UDP Usage Guidelines). Operators running at rates above one packet per three seconds MUST ensure the MPLS and IP paths are provisioned to prevent congestion.
section: "5"
rfc2119_level: MUST
topics:
