document: rfc-8122
kind: normative-requirement
summary: 'If the SDP is not integrity-protected, the certificate provided for a TLS connection MUST certify an appropriate identity: either the SDP connection address (IP or FQDN) or the identity of the creator of the SDP message. Wildcard patterns MUST NOT be used in certificate matching.'
section: "6.1"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
