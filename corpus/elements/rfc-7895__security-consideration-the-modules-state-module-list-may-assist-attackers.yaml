document: rfc-7895
kind: security-consideration
summary: The '/modules-state/module' list may assist attackers in identifying server capabilities, module revisions, features, and deviations. Knowledge of specific module versions with known bugs can be used to target denial-of-service or other attacks against the server. Read access to this data should be restricted via NETCONF access control (RFC 6536).
section: "4"
topics:
    - security
    - yang
    - netconf
