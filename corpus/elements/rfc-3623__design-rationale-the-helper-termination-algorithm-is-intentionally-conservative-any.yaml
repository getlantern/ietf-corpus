document: rfc-3623
kind: design-rationale
summary: 'The helper termination algorithm is intentionally conservative: any topology-changing LSA that would be flooded to the restarting router immediately ends helper mode. A configuration option to disable LSA-change-triggered termination is allowed but increases the risk of transient routing loops and black holes.'
section: "3.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
