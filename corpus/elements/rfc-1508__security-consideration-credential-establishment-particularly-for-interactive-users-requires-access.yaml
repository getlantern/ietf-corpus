document: rfc-1508
kind: security-consideration
summary: Credential establishment, particularly for interactive users, requires access to passwords or other sensitive material that should be exposed for the shortest time possible. Preliminary credential establishment should be performed through local means at login time with results cached for subsequent GSS_Acquire_cred() access, minimizing exposure of sensitive authentication material.
section: 1.1.1
topics:
    - security
    - privacy
