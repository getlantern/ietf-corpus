document: rfc-8104
kind: normative-requirement
summary: The transport tunnel MUST have the primary PE as the path endpoint. The bypass tunnel MUST have the protector as the path endpoint, and in egress PE and S-PE node protection, the bypass tunnel path MUST avoid the primary PE.
section: 4.3.3
rfc2119_level: MUST
