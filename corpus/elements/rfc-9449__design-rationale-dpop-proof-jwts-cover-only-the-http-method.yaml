document: rfc-9449
kind: design-rationale
summary: DPoP proof JWTs cover only the HTTP method and URI, not the full message body or headers. This intentional minimalism avoids the substantial difficulties of normalizing HTTP messages, while signing just enough data to provide reasonable proof of possession.
section: "4.2"
topics:
    - oauth
    - http
    - security
