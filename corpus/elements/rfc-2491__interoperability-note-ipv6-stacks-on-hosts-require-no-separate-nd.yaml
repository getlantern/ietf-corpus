document: rfc-2491
kind: interoperability-note
summary: IPv6 stacks on hosts require no separate ND protocol implementations per link-layer technology when using this architecture. The NBMA-specific details are confined to companion documents (e.g., RFC 2492 for ATM), keeping the host IPv6 stack uniform.
