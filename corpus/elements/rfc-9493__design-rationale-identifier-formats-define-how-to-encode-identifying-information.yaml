document: rfc-9493
kind: design-rationale
summary: 'Identifier Formats define how to encode identifying information but do not define the type or nature of the subject itself. This separation is intentional: expanding scope for some formats but not others would harm interoperability for applications that depend on subject-type disambiguation.'
section: "3.1"
topics:
    - security
