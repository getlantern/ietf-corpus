document: rfc-2765
kind: protocol-element
summary: 'ICMPv4-to-ICMPv6 type translation: Echo/Echo Reply (8/0) maps to 128/129; Destination Unreachable (3) maps to Type 1 with code translation; ''fragmentation needed'' (3/4) maps to Packet Too Big (Type 2); Time Exceeded (11) maps to Type 3; Parameter Problem (12) maps to Type 4. Obsolete or single-hop ICMPv4 messages (Types 9, 10, 13–18, Source Quench, Redirect) are silently dropped.'
section: "3.3"
topics:
