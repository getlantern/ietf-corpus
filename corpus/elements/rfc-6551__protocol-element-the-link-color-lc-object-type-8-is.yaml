document: rfc-6551
kind: protocol-element
summary: The Link Color (LC) object (type 8) is an administrative 10-bit link characteristic used to attract or avoid specific links. LC Type 1 sub-objects (recorded metric) encode a 10-bit Link Color and 6-bit Counter; LC Type 2 sub-objects (constraint) encode a 10-bit Link Color, 5 reserved bits, and an 'I' bit for inclusion or exclusion.
