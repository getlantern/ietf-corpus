document: rfc-6409
kind: protocol-element
summary: Port 587 is reserved for email message submission as specified in this document. Messages received on this port are defined to be submissions using ESMTP with the additional restrictions specified herein. A site MAY alternatively designate port 25 hosts as MSAs.
