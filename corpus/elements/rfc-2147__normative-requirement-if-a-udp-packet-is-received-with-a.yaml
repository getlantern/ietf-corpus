document: rfc-2147
kind: normative-requirement
summary: If a UDP packet is received with a length field of zero, the length of the UDP packet is computed from the length field in the Jumbo Payload option minus the length of all extension headers present between the IPv6 header and the UDP header.
section: "2"
rfc2119_level: MUST
topics:
    - udp
    - ip
