document: rfc-6469
kind: wire-format
summary: 'The 90 kHz RTP timestamp increments per DV frame: 3003 for 525-60 and 1080-60i modes (29.97 Hz), 3600 for 625-50, 1250-50, and 1080-50i modes (25 Hz), 3000 for 1125-60 (30 Hz). For 720-line systems, the timestamp increment covers two video frames.'
