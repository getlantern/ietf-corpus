document: rfc-5275
kind: protocol-element
summary: Fourteen control attributes are defined under the id-skd OID arc (glUseKEK through glKey, id-skd 1–15 with gap at 10). They are carried in CMC PKIData (requests) or PKIResponse (responses), except glUpdateCert which may appear in either. Three entity types—GLO, GLA, and GL member—have distinct originate/receive/forward requirements for each attribute.
section: "3.1"
