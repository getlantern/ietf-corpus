document: rfc-2910
kind: wire-format
summary: 'An additional-value (for multi-valued attributes) is encoded as: value-tag (1 byte), name-length (2 bytes, value is 0x0000), value-length (2 bytes), and value. The zero name-length is the only mechanism for encoding multi-valued attributes and distinguishes additional-value from attribute-with-one-value.'
section: 3.1.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
