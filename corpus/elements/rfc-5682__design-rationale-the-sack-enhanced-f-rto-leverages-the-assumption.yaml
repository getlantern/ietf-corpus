document: rfc-5682
kind: design-rationale
summary: The SACK-enhanced F-RTO leverages the assumption that when a genuine RTO occurs in steady state there are no segments left in the pipe; if ACKs for pre-timeout segments arrive in response to the two new segments sent at step 2, normal TCP operation was merely delayed and the timeout is spurious.
section: "3.2"
topics:
