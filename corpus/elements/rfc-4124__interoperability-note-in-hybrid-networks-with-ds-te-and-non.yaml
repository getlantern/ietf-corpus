document: rfc-4124
kind: interoperability-note
summary: In hybrid networks with DS-TE and non-DS-TE LSRs, the TE-Class mapping MUST include a TE-Class for CT0 at each preemption priority used in the TE domain, with the TE-Class index equal to the preemption priority. Non-DS-TE LSRs ignore the Bandwidth Constraints sub-TLV and must be able to accept Unreserved Bw sub-TLVs containing non-decreasing bandwidth values.
section: Appendix C
topics:
    - mpls
    - diffserv
    - qos
