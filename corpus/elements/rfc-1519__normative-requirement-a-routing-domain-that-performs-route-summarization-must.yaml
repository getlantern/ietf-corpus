document: rfc-1519
kind: normative-requirement
summary: A routing domain that performs route summarization MUST discard packets that match the aggregate but do not match any of the explicit constituent routes. This prevents routing loops in the presence of less-specific routes such as a default route.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
