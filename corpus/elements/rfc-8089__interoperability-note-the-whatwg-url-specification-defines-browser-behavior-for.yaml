document: rfc-8089
kind: interoperability-note
summary: The WHATWG URL specification defines browser behavior for file URIs as a living document, and its algorithms and syntax definitions may or may not be consistent with RFC 8089. Implementors sharing file URIs with browsers following WHATWG should be aware of possible discrepancies.
