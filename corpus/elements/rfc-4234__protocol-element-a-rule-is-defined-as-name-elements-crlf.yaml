document: rfc-4234
kind: protocol-element
summary: A rule is defined as 'name = elements crlf', where name is the rule name, elements is one or more rule names or terminal specifications, and crlf is the end-of-line indicator (CR LF). Rule definitions are left-aligned; continuation lines are indented.
section: "2.2"
