document: rfc-5923
kind: normative-requirement
summary: Clients SHOULD keep connections up as long as they are needed and SHOULD NOT automatically drop connections on completion of a transaction or termination of a dialog, because connection reuse works best when long-lived connections are maintained.
section: "8.1"
rfc2119_level: SHOULD
topics:
    - sip
    - tls
