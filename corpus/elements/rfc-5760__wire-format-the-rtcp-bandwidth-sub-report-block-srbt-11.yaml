document: rfc-5760
kind: wire-format
summary: The RTCP Bandwidth sub-report block (SRBT=11) carries a 1-bit Sender (S) flag, 1-bit Receiver (R) flag, 14-bit reserved field, and a 32-bit RTCP Bandwidth as a fixed-point value (binary point between bytes 2 and 3) representing kilobits/second per sender or per receiver.
section: 7.1.11
topics:
