document: rfc-4364
kind: protocol-element
summary: The Route Target (RT) attribute, encoded as a BGP Extended Community, controls which PE routers receive and install VPN-IPv4 routes. Each VRF has distinct Export Targets (attached to outgoing routes) and Import Targets (matched against incoming routes); a route is eligible for installation in a VRF only if it carries at least one RT that matches an Import Target.
section: 4.3.1
topics:
    - bgp
    - vpn
    - mpls
