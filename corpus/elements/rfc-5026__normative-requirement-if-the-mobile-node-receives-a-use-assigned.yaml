document: rfc-5026
kind: normative-requirement
summary: If the Mobile Node receives a USE_ASSIGNED_HoA Notify Payload in response to a CFG_REQUEST containing MIP6_HOME_PREFIX, it MUST use the address contained in the INTERNAL_IP6_ADDRESS attribute in the subsequent CREATE_CHILD_SA exchange.
section: 5.3.2
rfc2119_level: MUST
topics:
