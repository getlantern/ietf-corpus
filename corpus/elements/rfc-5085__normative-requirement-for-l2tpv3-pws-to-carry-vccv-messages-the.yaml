document: rfc-5085
kind: normative-requirement
summary: For L2TPv3 PWs, to carry VCCV messages the PW MUST be established with an L2-Specific Sublayer (L2SS) that defines the V-bit. If CC Type 0x01 is requested without requesting an L2SS AVP with an L2SS type that defines the V-bit, the session MUST be disconnected with a CDN message.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
