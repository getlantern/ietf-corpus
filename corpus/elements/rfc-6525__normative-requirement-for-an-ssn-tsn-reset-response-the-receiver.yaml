document: rfc-6525
kind: normative-requirement
summary: For an SSN/TSN reset response, the Receiver's Next TSN SHOULD be the smallest TSN not acknowledged by the receiver of the request plus 2^31, and the Sender's Next TSN SHOULD be the highest TSN sent by the receiver plus 1.
section: 5.2.4
rfc2119_level: SHOULD
topics:
    - sctp
