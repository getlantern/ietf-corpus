document: rfc-9071
kind: normative-requirement
summary: The RECOMMENDED 'cps' value is 90 characters per second, sufficient for large unmanaged conferences and speech-to-text use cases. The default of 30 cps from RFC 4103 is evaluated across all sources contributing to a receiver in the multiparty case.
