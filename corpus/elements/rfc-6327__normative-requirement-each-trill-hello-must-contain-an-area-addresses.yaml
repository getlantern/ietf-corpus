document: rfc-6327
kind: normative-requirement
summary: Each TRILL Hello MUST contain an Area Addresses TLV listing only the single Area zero and an MT Port Capabilities TLV containing a VLAN-FLAGS sub-TLV. If a Protocols Supported TLV is present, it MUST list the TRILL NLPID (0xC0).
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
