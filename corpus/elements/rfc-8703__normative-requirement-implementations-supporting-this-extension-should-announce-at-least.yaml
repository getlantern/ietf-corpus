document: rfc-8703
kind: normative-requirement
summary: Implementations supporting this extension SHOULD announce at least one valid IPv4 or IPv6 address of the Gateway Node to avoid requiring the router to use an additional IP address resolution protocol before populating its Routing Information Base.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
