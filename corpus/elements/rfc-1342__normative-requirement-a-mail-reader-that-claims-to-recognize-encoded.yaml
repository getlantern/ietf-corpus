document: rfc-1342
kind: normative-requirement
summary: A mail reader that claims to recognize encoded-words MUST be able to accept either the 'B' or 'Q' encoding for any character set it supports, regardless of which encoding is recommended for that character set.
section: Encodings
rfc2119_level: MUST
topics:
