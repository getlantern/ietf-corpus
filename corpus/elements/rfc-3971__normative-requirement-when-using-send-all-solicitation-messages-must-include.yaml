document: rfc-3971
kind: normative-requirement
summary: When using SEND, all solicitation messages MUST include a Nonce (stored by the sender for reply matching); all reply advertisements MUST copy the Nonce from the solicitation; and all solicitation, advertisement, and redirect messages MUST include a Timestamp.
section: 5.3.3
rfc2119_level: MUST
topics:
    - security
    - ip
