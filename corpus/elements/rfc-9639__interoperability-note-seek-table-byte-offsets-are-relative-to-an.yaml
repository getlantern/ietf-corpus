document: rfc-9639
kind: interoperability-note
summary: Seek table byte offsets are relative to an unmuxed FLAC stream and MUST NOT be updated when muxing into a container. The seek table is generally unusable for seeking in containerized FLAC because containers interleave other data; containers typically provide their own seeking mechanisms.
section: "8.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
