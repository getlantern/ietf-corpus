document: rfc-8395
kind: interoperability-note
summary: For inter-AS scenarios per RFC 4761 Section 3.4, the flow label must never be handled by ASBRs; only the terminating PEs on each AS are responsible for popping or pushing the flow label. This applies to Method B (ASBR label swap) as well.
