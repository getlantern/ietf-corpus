document: rfc-5222
kind: normative-requirement
summary: If a service boundary changes, a new identifier MUST be chosen for the <serviceBoundaryReference> key. Clients holding a boundary for a known key can therefore skip re-fetching it without consulting the server.
section: "5.6"
rfc2119_level: MUST
