summary: Appendix B provides formal feature-set expressions for TIFF-FX profiles TIFF-S through TIFF-M using the feature schema from this document. These expressions represent minimum mandatory requirements; additional codings and color modes may be combined with OR/AND operators to describe extended capabilities.
