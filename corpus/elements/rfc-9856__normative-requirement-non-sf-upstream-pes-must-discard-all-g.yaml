document: rfc-9856
kind: normative-requirement
summary: Non-SF upstream PEs MUST discard all (*,G) or (S,G) packets received on local ACs. The Single Forwarder MUST forward (*,G) or (S,G) packets received on one and only one local AC.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
