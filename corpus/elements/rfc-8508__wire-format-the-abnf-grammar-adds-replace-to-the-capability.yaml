document: rfc-8508
kind: wire-format
summary: The ABNF grammar adds 'REPLACE' to the capability production, defines 'replace' as 'REPLACE SP seq-number SP mailbox append-message', and extends 'uid' with 'UID SP replace'. The 'append-message' non-terminal is inherited from RFC 4466.
