document: rfc-9886
kind: protocol-element
summary: 'A DRIP Entity Tag (DET) is a 128-bit IPv6 address (prefix 2001:30::/28) structured as: 28-bit IPv6 prefix, 28-bit Hierarchy ID (split into 14-bit RAA and 14-bit HDA), 8-bit HHIT Suite ID, and 64-bit ORCHID hash. DETs serve primarily as identifiers rather than locators.'
