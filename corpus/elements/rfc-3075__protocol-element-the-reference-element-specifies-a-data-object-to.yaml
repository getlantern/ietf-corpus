document: rfc-3075
kind: protocol-element
summary: The Reference element specifies a data object to be signed via an optional URI attribute, an optional ordered list of Transforms, a required DigestMethod, and a required DigestValue. The URI attribute may be omitted from at most one Reference per SignedInfo or Manifest.
