document: rfc-8797
kind: security-consideration
summary: Improperly set fields in version 1 Private Data can cause disconnection (self-imposed DoS). Similarly, non-RPC-over-RDMA CM Private Data that inadvertently contains the Format Identifier 0xf6ab0e18 could be misinterpreted; additional validation per Section 5.2 mitigates this risk.
