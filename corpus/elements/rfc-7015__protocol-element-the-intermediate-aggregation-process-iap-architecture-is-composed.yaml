document: rfc-7015
kind: protocol-element
summary: 'The Intermediate Aggregation Process (IAP) architecture is composed of four operations on Partially Aggregated Flows: interval distribution (temporal), key aggregation (spatial), value aggregation (spatial), and aggregate combination. The first three may be applied in any order and any number of times; at least one interval distribution step is required.'
