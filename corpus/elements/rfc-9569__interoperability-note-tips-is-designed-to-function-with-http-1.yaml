document: rfc-9569
kind: interoperability-note
summary: TIPS is designed to function with HTTP/1.1, HTTP/2, and HTTP/3. On HTTP/1.1, concurrent update fetching requires multiple connections; on HTTP/2 or HTTP/3, it leverages multiplexed streams within a single connection. The URI naming convention is independent of HTTP version.
section: "2.1"
topics:
    - http
