document: rfc-5130
kind: normative-requirement
summary: A compliant IS-IS implementation MUST be able to assign one tag to any IP prefix in TLV 135, TLV 235, TLV 236, or TLV 237, and MUST be able to interpret a single tag or the first tag where multiple are present.
