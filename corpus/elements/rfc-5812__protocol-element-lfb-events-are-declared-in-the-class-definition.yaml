document: rfc-5812
kind: protocol-element
summary: LFB events are declared in the class definition with a 32-bit ID, an event target (LFB component to monitor), a trigger condition (e.g., creation, deletion, config change), and a report payload. CE subscribes at runtime via per-event subscription properties; runtime filters (threshold, hysteresis, time interval) can further suppress events.
section: 3.2.5
topics:
    - routing
