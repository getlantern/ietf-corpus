document: rfc-3376
kind: security-consideration
summary: A malicious host can spoof the IP source address of IGMP reports to impersonate another host, potentially causing routers to make incorrect forwarding decisions. Routers cannot verify that the source address of a report belongs to the sending system, and no IGMP-layer defense exists for this attack.
section: "9"
topics:
    - multicast
    - security
