document: rfc-7011
kind: protocol-element
summary: The IPFIX Template Record defines the structure of Data Records via an ordered sequence of Field Specifiers, each identifying an Information Element by ID and length. Templates enable the Collecting Process to interpret Data Records without prior knowledge of all IE types. Template IDs (256–65535) are allocated per Transport Session and Observation Domain, and Templates and Options Templates cannot share IDs within a session.
section: 3.4.1
topics:
    - measurement
