document: rfc-3873
kind: normative-requirement
summary: The sctpAssocRemHostName object MUST contain a zero-length string when no DNS domain name was received from the peer at init time. Otherwise it contains the remote hostname received in the INIT or INIT-ACK chunk.
section: "4"
rfc2119_level: MUST
topics:
    - sctp
    - snmp
