document: rfc-3445
kind: interoperability-note
summary: No backwards compatibility is provided for application keys (Email, IPSEC, TLS). Any such keys stored in KEY RRs are now deprecated, and the problems they caused (keys at the zone apex, large RR sets) motivated this change regardless.
section: "5"
