document: rfc-2932
kind: protocol-element
summary: ipMRouteBoundaryTable is indexed by (ipMRouteBoundaryIfIndex, ipMRouteBoundaryAddress, ipMRouteBoundaryAddressMask) and lists administratively scoped multicast address boundaries per interface; scoped addresses must come from the range 239.x.x.x per RFC 2365. Entries are managed via RowStatus (ipMRouteBoundaryStatus).
section: "4"
topics:
    - multicast
    - snmp
