document: rfc-7176
kind: wire-format
summary: 'The TRILL Version sub-TLV (TRILL-VER, Router Capability/MT-Capability sub-TLV type 13) is 5 bytes: 1-byte Max-version and a 32-bit Capabilities and Header Flags Supported vector. Bits 14–31 indicate support for TRILL Header extended flags (RFC 7179); bits 0–13 are reserved for IS-wide optional capabilities.'
section: 2.3.1
topics:
    - routing
