document: rfc-5389
kind: normative-requirement
summary: Unknown comprehension-optional attributes MUST be ignored. Unknown comprehension-required attributes in a request cause the server to reply with error 420 (Unknown Attribute) including an UNKNOWN-ATTRIBUTES attribute. Unknown comprehension-required attributes in a success or indication response cause the response or indication to be discarded.
section: "7.3"
rfc2119_level: MUST
topics:
    - nat
