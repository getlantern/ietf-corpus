document: rfc-3398
kind: security-consideration
summary: In SIP networks, not just switches but also arbitrary user agents can generate 18x provisional responses and initiate early backwards media. Gateways may therefore wish to enforce policies restricting the acceptance of backwards early media from untrusted user agents to prevent abuse of media resources.
section: "5.5"
topics:
    - sip
    - voip
    - security
