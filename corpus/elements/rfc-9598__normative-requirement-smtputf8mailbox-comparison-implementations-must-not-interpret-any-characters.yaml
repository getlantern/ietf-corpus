document: rfc-9598
kind: normative-requirement
summary: SmtpUTF8Mailbox comparison implementations MUST NOT interpret any characters as wildcards. To specify multiple email addresses, the certificate MUST use multiple subjectAltNames or issuerAltNames to explicitly carry each additional email address.
section: "5"
rfc2119_level: MUST NOT
