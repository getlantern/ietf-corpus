document: rfc-2741
kind: wire-format
summary: An Object Identifier is encoded as a 4-byte header (n_subid, prefix, include, reserved) followed by n_subid 4-byte unsigned sub-identifiers. A non-zero prefix value x implies an implicit 1.3.6.1.x prefix, compressing common internet OID encodings.
