document: rfc-4668
kind: security-consideration
summary: SNMP versions prior to SNMPv3 lack adequate security controls even on otherwise secure networks (e.g., IPsec-protected), because they provide no mechanism to restrict which principals on the secure network are permitted to access MIB objects.
section: "8"
topics:
