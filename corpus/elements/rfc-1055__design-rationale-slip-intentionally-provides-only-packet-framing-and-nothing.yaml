document: rfc-1055
kind: design-rationale
summary: SLIP intentionally provides only packet framing and nothing more—no addressing, packet type identification, error detection/correction, or compression. This extreme simplicity was a deliberate design choice from the early 1980s that made the protocol very easy to implement and widely portable.
