document: rfc-7510
kind: security-consideration
summary: Corruption of the VPN label in the MPLS label stack can cause traffic to leak across VPN boundaries. When inter-VPN isolation is used for privacy or security, UDP checksums SHOULD be used for both IPv4 and IPv6 MPLS-in-UDP, and UDP zero-checksum mode SHOULD NOT be used with IPv6.
section: "6"
topics:
    - mpls
    - udp
    - security
    - privacy
