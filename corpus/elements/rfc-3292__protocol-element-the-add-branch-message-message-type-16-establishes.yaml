document: rfc-3292
kind: protocol-element
summary: The Add Branch message (Message Type=16) establishes a new connection or adds an output branch to an existing connection identified by Input Port and Input Label, with an optional Traffic Parameters Block appended when IQS or OQS=0b10 (Service Model). Flags include M (Multicast hint), B (Bi-directional), and R (Connection Replace).
section: "4.2"
topics:
