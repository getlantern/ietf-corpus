document: rfc-7956
kind: design-rationale
summary: 'A centralized L3 gateway in a TRILL campus creates three problems: sub-optimal inter-subnet forwarding paths, an unscalable number of gateway interfaces (one per tenant per Data Label), and a traffic bottleneck. The distributed gateway solution moves L3 routing to edge RBridges, eliminating detours and spreading inter-subnet load optimally.'
