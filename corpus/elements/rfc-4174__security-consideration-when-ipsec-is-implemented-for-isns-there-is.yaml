document: rfc-4174
kind: security-consideration
summary: When IPsec is implemented for iSNS, there is a risk of a DoS attack based on repeated false discovery information triggering IKE negotiation. Countermeasures — IP address range limits, DNS domain limits, and a negative authentication cache — MUST be implemented for iSNS entities when this DHCP option is used.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
