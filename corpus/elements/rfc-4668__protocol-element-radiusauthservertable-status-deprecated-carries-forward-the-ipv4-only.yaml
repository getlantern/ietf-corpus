summary: radiusAuthServerTable (STATUS deprecated) carries forward the IPv4-only table from RFC 2618, using radiusAuthServerAddress (IpAddress) and radiusAuthClientServerPortNumber (Integer32 0..65535). It contains 15 counter/gauge objects covering Access-Requests, retransmissions, Accepts, Rejects, Challenges, malformed responses, bad authenticators, pending requests, timeouts, unknown types, and dropped packets.
