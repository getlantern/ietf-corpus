document: rfc-7223
kind: security-consideration
summary: The YANG module is designed to be accessed via NETCONF; the mandatory-to-implement secure transport is SSH (RFC 6242). The NETCONF access control model (RFC 6536) provides means to restrict access to NETCONF operations and content.
