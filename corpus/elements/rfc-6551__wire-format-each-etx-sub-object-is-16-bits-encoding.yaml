document: rfc-6551
kind: wire-format
summary: Each ETX sub-object is 16 bits encoding ETX*128 as an unsigned integer rounded to the nearest whole number (e.g., ETX=3.569 → 457). If ETX exceeds 511.9921875, the value is capped at 65535.
