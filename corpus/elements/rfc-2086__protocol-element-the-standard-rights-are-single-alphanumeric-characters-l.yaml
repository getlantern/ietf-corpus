document: rfc-2086
kind: protocol-element
summary: 'The standard rights are single alphanumeric characters: l (lookup/LIST), r (read/SELECT), s (keep seen/unseen across sessions), w (write flags), i (insert/APPEND/COPY into), p (post mail), c (create sub-mailboxes), d (delete/EXPUNGE), a (administer/SETACL). Letters are reserved for standard rights; digits are reserved for implementation- or site-defined rights.'
