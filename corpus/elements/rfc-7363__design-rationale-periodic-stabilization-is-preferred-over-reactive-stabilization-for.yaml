document: rfc-7363
kind: design-rationale
summary: Periodic stabilization is preferred over reactive stabilization for large-scale or high-churn overlays because reactive stabilization can create a positive feedback cycle leading to congestion collapse. Research showed that a 1000-peer overlay under churn uses significantly less bandwidth and has lower latencies with periodic stabilization.
section: "3.1"
