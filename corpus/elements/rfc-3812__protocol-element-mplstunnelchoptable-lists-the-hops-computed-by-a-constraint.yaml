document: rfc-3812
kind: protocol-element
summary: mplsTunnelCHopTable lists the hops computed by a constraint-based routing (CSPF) engine based on mplsTunnelHopTable. Support is optional and all entries are read-only; at transit LSRs it contains computed hops for the downstream portion of the tunnel.
