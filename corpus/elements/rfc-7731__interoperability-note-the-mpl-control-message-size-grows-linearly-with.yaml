document: rfc-7731
kind: interoperability-note
summary: The MPL Control Message size grows linearly with the number of simultaneous MPL Seeds in the domain — approximately 4 octets per MPL Seed. When reactive forwarding is disabled (CONTROL_MESSAGE_TIMER_EXPIRATIONS=0), no MPL Control Messages are transmitted and this overhead is not incurred.
