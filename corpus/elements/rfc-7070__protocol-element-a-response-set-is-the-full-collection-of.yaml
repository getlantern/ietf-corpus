document: rfc-7070
kind: protocol-element
summary: 'A ''Response Set'' is the full collection of data returned in response to a reputation query within a given Application. It MUST always contain at least: the name of the entity being rated, the Assertion, and the Rating. Additional fields are Application-specific.'
section: "5.2"
