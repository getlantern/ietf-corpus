document: rfc-3140
kind: security-consideration
summary: Merely signalling a PHBID SHOULD NOT be sufficient to grant the sender access to a PHB it could not otherwise use. Receivers SHOULD treat received PHBIDs as requests for service and apply local policy to grant or deny them.
section: "5"
rfc2119_level: SHOULD NOT
