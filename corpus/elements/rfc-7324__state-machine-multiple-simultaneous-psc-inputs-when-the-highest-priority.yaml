document: rfc-7324
kind: state-machine
summary: 'Multiple simultaneous PSC inputs: when the highest-priority input (local or remote) is removed or replaced, the PSC Control logic SHALL immediately reevaluate all inputs (both local and remote), transitioning into a new state only upon completion of that reevaluation. This prevents a transient and incorrect passage through Normal state.'
