document: rfc-7385
kind: registry
summary: RFC 7385 creates a new IANA registry called 'P-Multicast Service Interface Tunnel (PMSI Tunnel) Tunnel Types' within the 'Border Gateway Protocol (BGP) Parameters' registry, initially populated with values 0x00–0x07 from RFC 6514, unassigned range 0x08–0xFA, experimental range 0xFB–0xFE, and reserved value 0xFF.
