document: rfc-1253
kind: protocol-element
summary: ospfIfAuthKey is an OCTET STRING holding the authentication key for simplePassword authentication; if the key is shorter than 8 octets, the agent left-adjusts and zero-fills to 8 octets. When read, ospfIfAuthKey always returns an OCTET STRING of length zero to prevent key disclosure.
section: "5.7"
topics:
    - snmp
    - routing
    - security
