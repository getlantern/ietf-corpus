document: rfc-4217
kind: normative-requirement
summary: Even though TLS negotiation may provide authentication information, the USER command MUST still be issued by the client. It is a server implementation decision which credentials to accept and what consistency checks to make between the client certificate and the USER parameter.
section: "4.2"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
