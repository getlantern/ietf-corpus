document: rfc-1757
kind: interoperability-note
summary: RMON defines jabbers as packets longer than 1518 octets with a bad FCS, which differs from IEEE 802.3 sections 8.2.1.5 and 10.3.1.4, where jabber is any packet transmission exceeding 20 ms (detection range 20-150 ms). Implementations must be aware of this definitional divergence.
section: "5"
topics:
    - snmp
    - measurement
