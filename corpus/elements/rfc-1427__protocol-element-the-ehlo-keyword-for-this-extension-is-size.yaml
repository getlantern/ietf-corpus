document: rfc-1427
kind: protocol-element
summary: The EHLO keyword for this extension is 'SIZE'. An optional decimal parameter indicates the server's fixed maximum message size in bytes; a value of 0 means no fixed maximum is in force; omission conveys no information about the server's limit.
