document: rfc-8054
kind: normative-requirement
summary: When a client wants to authenticate, compress data, and negotiate a TLS security layer (without TLS-level compression) in the same NNTP connection, it MUST use the STARTTLS, AUTHINFO, and COMPRESS commands in that order.
section: "7"
rfc2119_level: MUST
topics:
