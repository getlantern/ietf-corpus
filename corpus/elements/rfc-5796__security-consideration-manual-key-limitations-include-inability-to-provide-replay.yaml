document: rfc-5796
kind: security-consideration
summary: 'Manual key limitations include: inability to provide replay protection (leaving routers vulnerable to packet replay attacks); long key lifetimes that give attackers time to discover keys; and the risk of administrators configuring weak keys (known weak keys exist for DES/3DES).'
