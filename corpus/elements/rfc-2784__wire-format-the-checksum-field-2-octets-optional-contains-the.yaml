document: rfc-2784
kind: wire-format
summary: The Checksum field (2 octets, optional) contains the IP one's-complement checksum of all 16-bit words in the GRE header and the payload packet; the checksum field itself is treated as zero during computation. Present only when the Checksum Present bit is set.
