summary: 'The verb layer is a 4-octet field within the protocolDirID INDEX: the first octet is reserved and MUST be set to zero; the remaining three octets encode the <verbEnum> as a 24-bit unsigned integer in network byte order, ranging from 0x000000 (connect(0)) to 0xFFFFFF.'
