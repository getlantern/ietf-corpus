document: rfc-5255
kind: normative-requirement
summary: When performing collation, MIME encoding MUST be removed from texts being collated (step a), and the decoded text MUST be converted to the charset expected by the active comparator (step b). Failures at step b fall back to i;octet comparator.
section: "4.6"
rfc2119_level: MUST
topics:
    - email
