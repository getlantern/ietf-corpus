document: rfc-8357
kind: normative-requirement
summary: An IPv6 relay agent MUST include the 'Relay Source Port Option' when it uses a non-DHCP UDP port (not 547) to communicate to a DHCPv6 server or upstream relay, and also when it detects that a downstream relay agent uses a non-DHCP UDP port.
section: "5.2"
rfc2119_level: MUST
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
