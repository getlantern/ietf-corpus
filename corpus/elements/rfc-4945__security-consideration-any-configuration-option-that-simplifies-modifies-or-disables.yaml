document: rfc-4945
kind: security-consideration
summary: Any configuration option that simplifies, modifies, or disables a verification step carries security consequences. All such options MUST default to 'enabled', and it is appropriate to provide warnings to users when disabling features such as certificate chain validation or identity verification.
section: "7.3"
topics:
    - ipsec
    - security
