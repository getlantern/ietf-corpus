document: rfc-6155
kind: design-rationale
summary: HELD with identity extensions is explicitly not a Location Configuration Protocol (LCP). In an LCP, the source IP address provides implicit return-routability-based identity; by allowing the requestor to supply identity in the request body, that implicit guarantee is lost and explicit authorization checks become mandatory.
section: "1"
topics:
    - realtime
    - security
