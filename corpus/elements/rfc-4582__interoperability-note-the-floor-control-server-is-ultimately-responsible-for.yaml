document: rfc-4582
kind: interoperability-note
summary: The floor control server is ultimately responsible for maintaining a coherent floor state; ChairAction messages from floor chairs are advisory inputs that the server considers but need not follow exactly (e.g., a grant on one floor of an atomic multi-floor request does not take effect until all chairs agree).
section: "4.2"
topics:
    - realtime
