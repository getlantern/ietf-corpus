document: rfc-8417
kind: normative-requirement
summary: The 'iss' (Issuer) claim MUST be present in every SET, identifying the service provider publishing the SET. Implementers cannot assume the SET issuer is the same as the security subject's issuer unless the profiling specification says so.
section: "2.2"
rfc2119_level: REQUIRED
topics:
