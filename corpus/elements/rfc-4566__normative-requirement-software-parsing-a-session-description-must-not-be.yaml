document: rfc-4566
kind: normative-requirement
summary: Software parsing a session description MUST NOT be able to start software other than that specifically configured as appropriate for participating in multimedia sessions. A session arriving by announcement or invitation MUST NOT deliver the user into an interactive session without explicit prior consent.
section: "7"
rfc2119_level: MUST NOT
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
