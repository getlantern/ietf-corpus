document: rfc-9560
kind: interoperability-note
summary: The OpenID Connect Discovery protocol [OIDCD] is OPTIONAL and not widely implemented, so RDAP servers acting as RPs may use out-of-band methods or maintain internal OP associations instead. Servers SHOULD support explicit OP specification via the farv1_iss query parameter as a fallback when discovery is unavailable.
section: 3.1.4.1
topics:
    - oauth
