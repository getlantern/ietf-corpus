document: rfc-7515
kind: normative-requirement
summary: The 'alg' Header Parameter MUST be present in the JOSE Header and MUST accurately represent the algorithm used to construct the JWS Signature. Implementations MUST ensure algorithm information encoded inside the signature (e.g., RSASSA-PKCS1-v1_5 hash OID) corresponds to the 'alg' value.
section: "5.1"
rfc2119_level: MUST
topics:
    - jose
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
