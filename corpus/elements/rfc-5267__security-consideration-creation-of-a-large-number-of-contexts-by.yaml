document: rfc-5267
kind: security-consideration
summary: Creation of a large number of contexts by authorized users may enable denial-of-service attacks; implementors should mitigate this by limiting context count via the NOUPDATE mechanism, applying the strategies in Appendix B, and logging context creation for administrative review.
