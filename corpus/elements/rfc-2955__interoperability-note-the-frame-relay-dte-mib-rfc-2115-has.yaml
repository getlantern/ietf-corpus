summary: The Frame Relay DTE MIB (RFC 2115) has no relevance to the FR/ATM PVC Service IWF MIB; only the Frame Relay Service MIB (RFC 2954) and the ATM MIB (RFC 2515) serve as technology-specific endpoint MIBs for this IWF.
