document: rfc-8001
kind: normative-requirement
summary: 'At border nodes of inter-domain or inter-layer networks, the following SRLG processing policies MUST be capable of being configured: (1) participation in SRLG collection and change notification, and (2) whether SRLG IDs can be exposed, summarized, mapped, or removed at domain boundaries.'
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - security
