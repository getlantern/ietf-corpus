document: rfc-4643
kind: normative-requirement
summary: A server MUST NOT under any circumstances reply to an AUTHINFO command with a 480 response. A client MUST NOT continue authentication beyond the first step unless the server responds with a 38x response code.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - security
