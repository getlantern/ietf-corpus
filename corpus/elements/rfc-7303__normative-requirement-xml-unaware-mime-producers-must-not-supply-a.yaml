document: rfc-7303
kind: normative-requirement
summary: XML-unaware MIME producers MUST NOT supply a charset parameter with an XML MIME entity unless the entity's character encoding is reliably known. This is particularly relevant for web server default charset configurations.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
