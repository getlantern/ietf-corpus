document: rfc-7250
kind: security-consideration
summary: The primary security challenge is binding a raw public key to a specific entity. Without a secure out-of-band binding between identifier and key, the protocol is vulnerable to man-in-the-middle attacks. Specifications using this extension MUST specify how identifier-to-key binding is established and verified.
section: "6"
topics:
    - tls
    - security
