document: rfc-7263
kind: protocol-element
summary: A new overlay configuration element 'route-mode' is defined inside each 'configuration' element, using namespace urn:ietf:params:xml:ns:p2p:route-mode. The mode value can be DRR or RPR and specifies the preferred routing mode for the application. This namespace is added to the <mandatory-extension> element in the overlay configuration file.
section: "6"
topics:
