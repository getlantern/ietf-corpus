document: rfc-8624
kind: normative-requirement
summary: ECDSAP384SHA384 (algorithm 14) MAY be used for DNSSEC signing and is RECOMMENDED for validation. It offers 192-bit security strength versus 128-bit for ECDSAP256SHA256.
