document: rfc-1495
kind: normative-requirement
summary: MIME message/partial content maps to an MHS message using the PartialMessage heading extension derived from the message/partial parameters (number, total, id). When mapping MHS to MIME, if this heading is present, a message/partial should be generated.
section: 3.2.1.2
rfc2119_level: SHOULD
