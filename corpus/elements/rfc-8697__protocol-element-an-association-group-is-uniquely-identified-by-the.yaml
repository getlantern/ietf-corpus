document: rfc-8697
kind: protocol-element
summary: An association group is uniquely identified by the combination of Association Type, Association ID, and Association Source (the 'association parameters'). If optional TLVs (Global Association Source and Extended Association ID) are present, they MUST be included in this combination to uniquely identify the group.
section: 6.1.4
topics:
