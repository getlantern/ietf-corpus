document: rfc-6505
kind: security-consideration
summary: Implementations MUST address the security considerations in Section 7, which inherit the RFC 6230 framework security model. The control channel carries privileged conference management commands, so unauthorized access could allow an attacker to create, modify, or destroy conferences and manipulate media streams.
section: "7"
topics:
    - security
    - realtime
    - sip
