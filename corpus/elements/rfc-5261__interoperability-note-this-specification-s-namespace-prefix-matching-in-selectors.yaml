document: rfc-5261
kind: interoperability-note
summary: This specification's namespace prefix matching in selectors differs from XPath 1.0 and 2.0. In XPath 1.0, 'bar' always locates an unqualified element; here, a prefixless selector matches only if the element's namespace (or lack thereof) is an exact match. The namespace-uri() and local-name() functions are not allowed.
section: 4.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
