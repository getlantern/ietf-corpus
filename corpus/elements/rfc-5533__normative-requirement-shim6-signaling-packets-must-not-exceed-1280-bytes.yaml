document: rfc-5533
kind: normative-requirement
summary: Shim6 signaling packets MUST NOT exceed 1280 bytes, including the IPv6 header and any intermediate headers. Implementations may omit part of the locator address information or split information across multiple messages to meet this limit.
section: "5.1"
rfc2119_level: MUST NOT
topics:
