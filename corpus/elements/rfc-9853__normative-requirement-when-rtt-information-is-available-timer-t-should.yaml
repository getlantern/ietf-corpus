document: rfc-9853
kind: normative-requirement
summary: When RTT information is available, timer T SHOULD be set to 3×RTT. If no RTT information is available, T SHOULD be set to 1 second. IoT deployment profiles MAY specify different values.
section: "5.5"
rfc2119_level: SHOULD
