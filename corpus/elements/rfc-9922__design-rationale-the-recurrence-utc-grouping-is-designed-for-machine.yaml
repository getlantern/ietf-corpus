document: rfc-9922
kind: design-rationale
summary: The 'recurrence-utc' grouping is designed for machine readability (using uint32 seconds for duration), while 'recurrence-with-time-zone' promotes human readability (using the ISO 8601-style duration string type). Both are provided to accommodate different deployment requirements.
