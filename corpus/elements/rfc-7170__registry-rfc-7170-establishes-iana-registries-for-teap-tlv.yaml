summary: 'RFC 7170 establishes IANA registries for: TEAP TLV types (values 1–17 defined, expert review for new assignments), PAC attribute types, PAC-Type TLV values, and TEAP error codes (ranges 1–999 informative, 1000–1999 warning, 2000–2999 fatal). EAP Type 55 is assigned to TEAP.'
