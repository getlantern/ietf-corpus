document: rfc-5075
kind: registry
summary: 'IANA created a new registry for IPv6 ND Router Advertisement flags covering bits 0–55: bits 0–5 assigned to existing flags (M, O, H, Prf, Prf, P from RFC 4861/3775/4191/4389), bits 6–53 reserved and available for assignment, bits 54–55 reserved for private experimentation. New assignments require standards action or IESG approval per RFC 2434.'
