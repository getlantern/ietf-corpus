document: rfc-2961
kind: normative-requirement
summary: Bundle messages MUST NOT be sent to neighbors that do not support bundling. Path and PathTear messages for multicast sessions MUST NOT be included in Bundle messages when the outgoing link is not point-to-point or when the next hop does not support the refresh overhead reduction extensions.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - qos
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
