document: rfc-2688
kind: design-rationale
summary: Suspend/resume optimizes bandwidth by minimizing MLPPP pre-fragmentation header overhead and can provide better delay, but requires byte-by-byte scanning of all outgoing and incoming data. Fragmentation can be implemented without additional data stream scanning and suits systems with only frame-oriented transmission control.
