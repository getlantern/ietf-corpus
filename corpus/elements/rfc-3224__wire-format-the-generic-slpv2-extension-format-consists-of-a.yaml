document: rfc-3224
kind: wire-format
summary: The generic SLPv2 extension format consists of a 2-byte Extension ID, a 3-byte Next Extension Offset (split across two words), and variable-length Extension Data. Extensions are appended at the end of SLPv2 messages.
section: "5.0"
