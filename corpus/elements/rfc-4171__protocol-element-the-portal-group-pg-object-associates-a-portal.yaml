document: rfc-4171
kind: protocol-element
summary: The Portal Group (PG) object associates a Portal with an iSCSI Storage Node using a Portal Group Tag (PGT); Portals sharing the same PGT value for a given iSCSI node provide coordinated multi-connection iSCSI session access as defined by the iSCSI specification.
section: "3.4"
