document: rfc-6455
kind: security-consideration
summary: 'The strict handshake (Sec-WebSocket-Key/Accept exchange with a fixed GUID) is designed to prevent cross-protocol attacks: pre-existing protocols like SMTP and HTTP cannot accidentally complete a WebSocket handshake, and XMLHttpRequest cannot forge Sec-* headers from a browser context.'
section: "10.3"
topics:
    - websocket
    - security
