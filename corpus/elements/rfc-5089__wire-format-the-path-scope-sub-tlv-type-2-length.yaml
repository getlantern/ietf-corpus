document: rfc-5089
kind: wire-format
summary: The PATH-SCOPE sub-TLV (Type 2, LENGTH 3) contains a 1-octet flags field with bits L (intra-area), R (inter-area PCE), Rd (default inter-area PCE), S (inter-AS PCE), Sd (default inter-AS PCE), Y (inter-layer PCE), and 2 reserved bits; followed by a 2-octet preferences field with four 3-bit fields (PrefL, PrefR, PrefS, PrefY) and reserved padding.
