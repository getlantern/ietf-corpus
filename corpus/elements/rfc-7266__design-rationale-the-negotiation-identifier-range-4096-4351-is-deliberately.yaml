document: rfc-7266
kind: design-rationale
summary: The negotiation identifier range 4096-4351 is deliberately restricted to allow future expansion of the valid identifier range (1-255). Identifiers in this range are only usable for SDP offer/answer negotiation of mutually exclusive alternatives and must be remapped to the valid range before use.
section: "4.2"
topics:
