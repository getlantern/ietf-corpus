document: rfc-5665
kind: normative-requirement
summary: When a netid is mapped to upper case, its prefix MUST NOT equal any Reserved prefix (STDS, FCFS, PRIV, EXPE, ICMP). Constant names with prefixes NC_STDS, NC_FCFS, NC_PRIV, NC_EXPE, and NC_ICMP are also Reserved, and MUST NOT conflict with any other registered constant name.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - registry
