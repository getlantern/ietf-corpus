document: rfc-3230
kind: normative-requirement
summary: A Digest header field MAY contain multiple instance-digest values (e.g., for caches shared by users with different browsers). A recipient MAY ignore any or all instance-digests. A sender MAY send a digest without knowing whether the recipient supports or will use the algorithm.
section: 4.3.2
rfc2119_level: MAY
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
