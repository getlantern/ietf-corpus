document: rfc-8658
kind: normative-requirement
summary: U-Prefix64 (TLV-Type 21) unicast prefix length MUST be set to 32, 40, 48, 56, 64, or 96 as specified in RFC 6052. It identifies the IPv6 unicast prefix used to construct IPv4-embedded IPv6 addresses for IPv4 multicast sources in SSM mode.
section: 3.3.3
rfc2119_level: MUST
topics:
    - radius
    - multicast
    - v6ops
