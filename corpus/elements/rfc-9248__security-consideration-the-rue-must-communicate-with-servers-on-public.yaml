document: rfc-9248
kind: security-consideration
summary: The RUE must communicate with servers on public IP addresses and specific ports; VRS providers may use different ports for different services. Users on networks with default-deny firewalls must arrange with their network manager for appropriate traffic passage based on the protocols and SRV records exposed by their provider.
section: "11"
