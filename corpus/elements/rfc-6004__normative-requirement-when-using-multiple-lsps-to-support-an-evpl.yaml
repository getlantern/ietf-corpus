document: rfc-6004
kind: normative-requirement
summary: When using multiple LSPs to support an EVPL service connection, all LSPs MUST be established within the same Call per Section 2.2, and all LSPs associated with the same Call/EVPL connection MUST be signaled with the same LSP objects except for SENDER_TEMPLATE, SESSION, and label-related objects.
section: "4.4"
rfc2119_level: MUST
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
