document: rfc-3820
kind: interoperability-note
summary: Unlike Kerberos 5 Ticket Granting Tickets, which require a third-party Key Distribution Center for both creation and delegation, Proxy Certificates can be created and delegated unilaterally without any third-party involvement. PC delegation is performed by creating a new PC signed by the delegating party's existing PC or EEC.
section: "5.2"
topics:
    - pkix
    - security
