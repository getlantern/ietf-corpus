document: rfc-2875
kind: design-rationale
summary: Using a single set of DH parameters across a PKI allows all keys in the group to be attacked together. The Discrete Logarithm Signature method was introduced so that proof-of-possession does not require common group parameters, eliminating this group-wide attack surface.
section: "4"
topics:
