document: rfc-3436
kind: protocol-element
summary: A bi-directional stream is defined as a pair of SCTP streams sharing the same stream identifier (one in each direction). An SCTP association provides min(n,m) bi-directional streams and (max(n,m)-min(n,m)) uni-directional streams.
