document: rfc-9639
kind: wire-format
summary: The coded number (frame or sample number) is encoded using a UTF-8-like variable-length scheme extended to a maximum of 36 bits unencoded / 7 bytes encoded (per Table 18). Frame numbers are limited to 31 bits / 6 bytes encoded. Standard UTF-8 encoders and decoders cannot handle these extended codes.
section: 9.1.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
