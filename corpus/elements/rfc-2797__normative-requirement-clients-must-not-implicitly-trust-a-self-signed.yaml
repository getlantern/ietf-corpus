document: rfc-2797
kind: normative-requirement
summary: Clients MUST NOT implicitly trust a self-signed certificate received in an enrollment response merely due to its presence in the certificate bag. If clients receive a new self-signed certificate, clients SHOULD provide a mechanism to enable the user to explicitly trust it.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
