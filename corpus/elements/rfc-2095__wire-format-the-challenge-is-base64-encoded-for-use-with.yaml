summary: 'The challenge is base64-encoded for use with IMAP4 AUTHENTICATE or POP3 AUTH commands. The unencoded challenge must conform to RFC 822 msg-id syntax. The client response is also base64-encoded: username + space + 32 hex characters (16-octet MD5 digest in lowercase hex).'
