document: rfc-8036
kind: design-rationale
summary: RPL non-storing mode (rather than storing mode) is specified for AMI because AMI electric meters are the primary target, are AC-powered (not battery-constrained), and require the centralized path computation that non-storing mode enables through source routing from the DODAG root.
