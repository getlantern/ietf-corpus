document: rfc-8650
kind: protocol-element
summary: Dynamic subscriptions are established via RESTCONF POST to the 'establish-subscription' RPC. The response includes a subscription identifier and a URI uniquely identifying the subscription location on the publisher. A subsequent GET to this URI starts the flow of notification messages.
