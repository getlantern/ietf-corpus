document: rfc-8232
kind: normative-requirement
summary: If the PCC attempts to skip State Synchronization when a version mismatch exists, the PCE MUST send back a PCErr with Error-type=20 and Error-value=2 'LSP-DB version mismatch', and close the PCEP session.
section: "3.2"
rfc2119_level: MUST
topics:
