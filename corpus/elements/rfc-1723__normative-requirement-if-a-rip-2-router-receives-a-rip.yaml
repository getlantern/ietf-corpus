document: rfc-1723
kind: normative-requirement
summary: If a RIP-2 router receives a RIP-1 Request, it SHOULD respond with a RIP-1 Response. If configured to send only RIP-2 messages, it should not respond to a RIP-1 Request.
section: "3.6"
rfc2119_level: SHOULD
topics:
    - routing
