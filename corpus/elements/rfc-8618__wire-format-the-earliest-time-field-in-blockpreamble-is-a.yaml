document: rfc-8618
kind: wire-format
summary: 'The ''earliest-time'' field in BlockPreamble is a two-element CBOR array (Timestamp): the first unsigned integer is seconds since the POSIX epoch (excluding leap seconds), the second is sub-second ticks since the start of the second, where tick resolution is given by ''ticks-per-second'' in StorageParameters.'
section: 7.3.2.1
topics:
