document: rfc-9293
kind: wire-format
summary: 'The TCP checksum covers a pseudo-header prepended to the segment: for IPv4, 96 bits comprising Source Address, Destination Address, zero byte, protocol number, and TCP length; for IPv6, 320 bits as defined in RFC 8200 Section 8.1, including the IPv6 source and destination addresses and upper-layer packet length.'
section: "3.1"
