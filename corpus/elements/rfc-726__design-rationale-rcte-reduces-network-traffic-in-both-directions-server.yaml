document: rfc-726
kind: design-rationale
summary: 'RCTE reduces network traffic in both directions: server-to-user echoing is nearly eliminated, and user-to-server messages are reduced by buffering input into units delimited by break or transmission characters rather than sending each character individually, reducing host wake-ups.'
