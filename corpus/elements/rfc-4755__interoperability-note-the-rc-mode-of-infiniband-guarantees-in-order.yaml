document: rfc-4755
kind: interoperability-note
summary: 'The RC mode of InfiniBand guarantees in-order delivery but may cause TCP to enter slow-start: an upper transport layer can time out while the RC layer is still retransmitting a complete message, making the RC layer''s retransmission invisible to TCP''s congestion control.'
section: "7.1"
topics:
    - ip
    - tcp
    - congestion
