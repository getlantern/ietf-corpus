document: rfc-3554
kind: interoperability-note
summary: If an ID type included in an ID_LIST payload is invalid in the context it is used (e.g., an ID_FQDN during Quick Mode), the entire ID_LIST must be considered faulty and the Responder should signal a fault and stop processing, mirroring behavior for a plain invalid ID.
section: "3"
topics:
    - sctp
    - ipsec
    - crypto
