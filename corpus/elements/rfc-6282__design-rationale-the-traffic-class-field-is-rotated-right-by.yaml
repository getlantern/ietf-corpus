document: rfc-6282
kind: design-rationale
summary: The Traffic Class field is rotated right by 2 bits in compressed form so that the ECN bits always appear at a fixed position (bits 0–1) across all TF encoding variants, allowing ECN processing without requiring the full Traffic Class to be in-line.
