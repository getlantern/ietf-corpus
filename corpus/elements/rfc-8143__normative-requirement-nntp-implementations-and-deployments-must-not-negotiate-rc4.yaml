document: rfc-8143
kind: normative-requirement
summary: NNTP implementations and deployments MUST NOT negotiate RC4 cipher suites (RFC 7465), removing the former RFC 4642 requirement to implement TLS_RSA_WITH_RC4_128_MD5 for interoperability.
