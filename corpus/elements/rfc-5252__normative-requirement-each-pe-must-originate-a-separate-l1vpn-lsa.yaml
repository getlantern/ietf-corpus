document: rfc-5252
kind: normative-requirement
summary: Each PE MUST originate a separate L1VPN LSA with AS flooding scope for each local CE-to-PE link. The LSA MUST be originated each time a PE restarts and every time there is a change in the PIT entry associated with a local CE-to-PE link.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
