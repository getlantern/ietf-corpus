document: rfc-2015
kind: design-rationale
summary: Previous work integrating PGP with MIME suffered from the inability to recover signed message bodies without parsing PGP-specific data structures. RFC 2015 addresses this by using the RFC 1847 security multipart formats, which cleanly separate the signed body from the signature.
section: "1"
topics:
