document: rfc-2668
kind: design-rationale
summary: Internal MAUs (whose functionality is implemented entirely within a device, such as a repeater's internal management MAU) are optionally managed; if managed, their objects appear in dot3RpMauBasicGroup or dot3IfMauBasicGroup respectively, using the same MIB structure as external MAUs.
