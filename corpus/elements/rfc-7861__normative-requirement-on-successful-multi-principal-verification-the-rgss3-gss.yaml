document: rfc-7861
kind: normative-requirement
summary: On successful multi-principal verification, the rgss3_gss_mp_auth field in the rgss3_create_res reply MUST be filled in with the inner RPCSEC_GSSv3 context handle and a MIC computed over the RPC reply header using the GSS-API security context of the inner handle.
section: 2.7.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
