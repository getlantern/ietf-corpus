document: rfc-4877
kind: normative-requirement
summary: If the home agent is unable to allocate a home address during IKE_AUTH, it MUST send a Notify Payload with INTERNAL_ADDRESS_FAILURE; on receipt, the mobile node SHOULD terminate the IKE_AUTH exchange.
section: "9"
rfc2119_level: MUST
topics:
