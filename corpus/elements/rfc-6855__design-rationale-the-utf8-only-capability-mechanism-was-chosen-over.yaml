document: rfc-6855
kind: design-rationale
summary: The "UTF8=ONLY" capability mechanism was chosen over a "just-send-UTF-8 IMAP" approach because diagnosing interoperability problems caused by an implicit UTF-8 mode is difficult. Explicit capability announcement makes problems visible and easier to diagnose, even though a "just-send-UTF-8" approach might work with some legacy clients.
section: A
topics:
