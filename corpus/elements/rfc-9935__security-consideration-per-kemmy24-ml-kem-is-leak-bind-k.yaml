document: rfc-9935
kind: security-consideration
summary: Per [KEMMY24], ML-KEM is LEAK-BIND-K-PK-secure and LEAK-BIND-K-CT-secure when using the expanded private key format, but is neither MAL-BIND-K-CT nor MAL-BIND-K-PK secure. Using the 64-byte seed format provides a step up and additionally provides MAL-BIND-K-CT security, though MAL-BIND-K-PK security is still not achieved.
section: "9"
topics:
    - pkix
    - crypto
    - security
