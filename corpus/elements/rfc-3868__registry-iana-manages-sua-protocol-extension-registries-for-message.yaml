document: rfc-3868
kind: registry
summary: IANA manages SUA protocol extension registries for Message Classes, Message Types (per class), Parameter Tags, and Error Codes. Within each namespace, values 0–127 are reserved by IETF and 128–255 are reserved for IETF-defined extensions; requests for new values require IETF Review.
