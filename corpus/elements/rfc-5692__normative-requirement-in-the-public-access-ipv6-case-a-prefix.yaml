document: rfc-5692
kind: normative-requirement
summary: In the public access IPv6 case, a Prefix Information Option carrying common IPv6 prefixes SHOULD be advertised with the On-link flag (L-Flag) reset so that SSs do not assume addresses matching the prefixes are available on-link.
section: "8"
rfc2119_level: SHOULD
