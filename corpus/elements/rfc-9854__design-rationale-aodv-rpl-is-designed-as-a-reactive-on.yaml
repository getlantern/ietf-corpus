document: rfc-9854
kind: design-rationale
summary: AODV-RPL is designed as a reactive (on-demand) P2P routing protocol to discover shorter routes that avoid traversing the RPL root or common ancestor nodes, reducing hop count and congestion near the root. RPL in non-storing mode forces all P2P traffic through the root; AODV-RPL discovers direct paths instead.
section: "1"
topics:
