document: rfc-6141
kind: normative-requirement
summary: A UAC that accepts a target refresh within a re-INVITE MUST ignore transport and timeout errors when generating an ACK for a non-2xx final response. Additionally, the UAC SHOULD generate a new re-INVITE to ensure both UAs share a common view of the session state.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
