document: rfc-1893
kind: registry
summary: This document defines the Enhanced Mail System Status Codes registry, comprising a three-part numeric code space (class.subject.detail). The codes enumerate address, mailbox, mail system, network/routing, protocol, media, and security/policy statuses for use in delivery status notifications. The space is extensible only via standards track documents.
