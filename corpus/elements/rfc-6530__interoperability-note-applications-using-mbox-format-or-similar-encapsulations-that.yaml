document: rfc-6530
kind: interoperability-note
summary: Applications using mbox-format or similar encapsulations that assume all stored messages have ASCII message headers (message/rfc822 with ASCII) are not ready for SMTPUTF8 extensions and may require special measures to detect and process internationalized messages.
section: "11.5"
topics:
