document: rfc-8202
kind: interoperability-note
summary: There is no relationship between the 12-bit MTIDs defined in RFC 5120 (M-ISIS) and the 16-bit ITIDs defined in this document. When an MI-RTR uses ITIDs and also supports the BFD-Enabled TLV (RFC 6213), the ITID MUST be used in place of the MTID.
section: "5"
topics:
    - routing
