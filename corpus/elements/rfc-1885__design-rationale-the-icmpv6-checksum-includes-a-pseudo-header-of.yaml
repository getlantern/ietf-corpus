document: rfc-1885
kind: design-rationale
summary: The ICMPv6 checksum includes a pseudo-header of IPv6 fields, unlike IPv4 ICMP. The rationale for this change is given in the IPv6 specification (RFC 1883, section 8.1), providing stronger integrity coverage across the IP and ICMP headers together.
section: "2.3"
topics:
