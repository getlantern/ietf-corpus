document: rfc-7162
kind: protocol-element
summary: The UNCHANGEDSINCE STORE modifier causes the server to perform the flag operation only if the mod-sequence of every affected metadata item is at most the specified value. Messages whose mod-sequence exceeds the threshold are skipped and their identifiers are collected into a MODIFIED response code returned at the end.
section: 3.1.3
topics:
