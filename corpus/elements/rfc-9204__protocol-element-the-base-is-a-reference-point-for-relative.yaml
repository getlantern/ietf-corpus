document: rfc-9204
kind: protocol-element
summary: 'The Base is a reference point for relative and post-Base dynamic table indices in field line representations. It is encoded as a Sign bit and Delta Base relative to the Required Insert Count: if Sign=0, Base = RIC + DeltaBase; if Sign=1, Base = RIC - DeltaBase - 1. The Base value MUST NOT be negative.'
section: 4.5.1.2
topics:
    - http
