document: rfc-8767
kind: protocol-element
summary: The maximum stale timer governs cache management independently of the query resolution process. It defines how long after expiry a record is retained in the cache; the suggested value is 1 to 3 days, distinct from the 7-day maximum cache TTL clamp applied to authoritative answers.
section: "5"
topics:
