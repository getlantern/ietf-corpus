document: rfc-8630
kind: interoperability-note
summary: The RSYNC protocol provides neither transport security nor any means for the RP to validate it is connected to the proper host. Therefore, HTTPS is RECOMMENDED as the preferred scheme. A MITM cannot produce a valid CA certificate but can prevent the RP from learning about an updated certificate.
section: "4"
topics:
