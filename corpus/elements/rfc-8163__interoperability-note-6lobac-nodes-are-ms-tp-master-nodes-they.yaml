document: rfc-8163
kind: interoperability-note
summary: 6LoBAC nodes are MS/TP master nodes; they must implement the Master Node state machine and handle Token, Poll For Master, and Reply To Poll For Master control frames as mandated by BACnet Clause 9. They additionally implement a Receive Frame state machine capable of handling COBS-encoded frames.
section: "2.1"
topics:
