document: rfc-6063
kind: normative-requirement
summary: For DSKPP-PRF, the secret key k MUST be at least 16 octets long. The function MUST take arbitrary-length input, produce one-way collision-free output, and its output MUST be unpredictable even if other outputs for the same key are known.
section: 3.4.2
rfc2119_level: MUST
topics:
    - crypto
