document: rfc-4684
kind: normative-requirement
summary: When advertising an RT membership NLRI sourced by the local AS to a route-reflector client, the Originator attribute shall be set to the router-id of the advertiser, and the Next-hop attribute shall be set to the local address for that session.
section: "3.2"
rfc2119_level: REQUIRED
topics:
    - bgp
    - routing
