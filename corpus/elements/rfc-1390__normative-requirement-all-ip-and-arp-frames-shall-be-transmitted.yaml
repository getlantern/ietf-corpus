document: rfc-1390
kind: normative-requirement
summary: All IP and ARP frames shall be transmitted as Asynchronous LLC frames using Unrestricted tokens. The priority value is a local convention; implementations should make priority a tunable parameter.
section: MAC Layer Details
rfc2119_level: MUST
topics:
    - ip
