document: rfc-1521
kind: normative-requirement
summary: Messages composed in accordance with MIME MUST include a MIME-Version header field with the verbatim value '1.0'. The presence of this field asserts that the message complies with the MIME specification; its absence means MIME conformance cannot be assumed.
section: "3"
rfc2119_level: MUST
topics:
    - email
