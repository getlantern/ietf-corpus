document: rfc-3224
kind: design-rationale
summary: A vendor's internal Extension Data within a Vendor Opaque Extension should include its own sub-ID field (e.g., a 1-byte ACME Ext ID) so that a single Enterprise Number can support up to 256 distinct vendor extensions, rather than being limited to one.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
