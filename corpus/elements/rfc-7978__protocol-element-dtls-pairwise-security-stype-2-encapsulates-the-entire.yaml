document: rfc-7978
kind: protocol-element
summary: DTLS Pairwise Security (SType = 2) encapsulates the entire Extended RBridge Channel payload—from just after the null Security Information to just before the link trailer—as one or more DTLS records (RFC 6347). The DTLS session is established pairwise between two RBridges, independent of Data Label, at configurable priority (default 6).
section: "4.4"
topics:
    - routing
    - security
    - tls
