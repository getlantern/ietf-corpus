document: rfc-8450
kind: security-consideration
summary: RTP packets using this payload format are subject to standard RTP security considerations (RFC 3550, RFC 3551, RFC 3711, etc.). Applications SHOULD use one or more appropriate strong security mechanisms. The payload format itself does not exhibit significant non-uniformity in receiver-side computational complexity, so pathological data is unlikely to cause denial-of-service.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - rtp
    - realtime
