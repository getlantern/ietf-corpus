document: rfc-9569
kind: wire-format
summary: Update items are addressed using the URI template `<tips-view-uri>/ug/<i>/<j>`, where i is the source version sequence number and j is the target. For long polling a future update, a client constructs `<tips-view-uri>/ug/<end-seq>/<end-seq+1>`. Incremental updates are fetched using HTTP GET.
section: "4.2"
topics:
    - http
