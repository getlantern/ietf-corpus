document: rfc-8505
kind: privacy-consideration
summary: The protocol does not limit the number of IPv6 Addresses a device may form and register; hosts SHOULD conform to RFC 7934 host address availability recommendations. Implementations and deployments must consider privacy addresses (RFC 4941) in their environments.
