document: rfc-1995
kind: interoperability-note
summary: Optional condensation can break clients that have received an intermediate version from one server but query a second server that has condensed that version away. The second server cannot provide incremental data from the unknown version and must fall back to a full zone transfer.
section: "6"
topics:
