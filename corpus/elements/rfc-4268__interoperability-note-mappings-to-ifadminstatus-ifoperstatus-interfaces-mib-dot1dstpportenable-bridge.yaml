document: rfc-4268
kind: interoperability-note
summary: Mappings to ifAdminStatus/ifOperStatus (Interfaces MIB), dot1dStpPortEnable (Bridge MIB), and hrDeviceStatus (Host Resources MIB) are defined. For example, ifAdminStatus 'up' equals entStateAdmin 'unlocked'; ifOperStatus 'up' equals entStateOper 'enabled'; ifOperStatus 'notPresent' and 'lowerLayerDown' are computed states not supported in this MIB.
