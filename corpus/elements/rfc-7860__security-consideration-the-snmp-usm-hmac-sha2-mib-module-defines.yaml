document: rfc-7860
kind: security-consideration
summary: The SNMP-USM-HMAC-SHA2-MIB module defines only OBJECT IDENTIFIER values and no accessible objects, so it does not by itself affect Internet security; however it is used in conjunction with usmUserTable from SNMP-USER-BASED-SM-MIB.
section: "9.4"
topics:
    - snmp
    - security
