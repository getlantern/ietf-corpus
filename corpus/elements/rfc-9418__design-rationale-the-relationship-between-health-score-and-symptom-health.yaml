document: rfc-9418
kind: design-rationale
summary: The relationship between `health-score` and symptom `health-score-weight` values is intentionally left to the implementor. The only normative constraint is that a sub-100 score must be accompanied by at least one symptom; how weights are aggregated into a score is implementation-specific.
section: "3.2"
