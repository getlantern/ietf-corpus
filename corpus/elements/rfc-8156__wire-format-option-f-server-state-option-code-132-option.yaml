document: rfc-8156
kind: wire-format
summary: OPTION_F_SERVER_STATE (option code 132, option-len 1) encodes the sender's failover endpoint state as a 1-octet value (1=STARTUP through 10=CONFLICT-DONE). OPTION_F_SERVER_FLAGS (code 131, option-len 1) carries flag bits including STARTUP (bit 6), ACK_STARTUP (bit 5), and COMMUNICATED (bit 7).
section: 5.5.16
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
