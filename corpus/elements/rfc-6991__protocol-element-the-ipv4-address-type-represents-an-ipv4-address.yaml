document: rfc-6991
kind: protocol-element
summary: The ipv4-address type represents an IPv4 address in dotted-quad notation optionally followed by a zone index (e.g., 192.0.2.1%eth0). The ipv6-address type supports full, mixed, shortened, and shortened-mixed notation with optional zone index; canonical format follows RFC 5952 Section 4.
