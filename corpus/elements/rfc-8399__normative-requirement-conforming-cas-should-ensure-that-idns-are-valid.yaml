document: rfc-8399
kind: normative-requirement
summary: Conforming CAs SHOULD ensure that IDNs are valid by validating all code points according to IDNA2008 (RFC 5892). Failure to use valid A-labels and valid U-labels may yield a domain name that cannot be correctly represented in the DNS.
section: "3"
rfc2119_level: SHOULD
topics:
    - pkix
    - dns
    - security
