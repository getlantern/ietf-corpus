document: rfc-2192
kind: protocol-element
summary: A program interpreting a bare server URL (`imap://<iserver>/`) SHOULD use the LSUB form if it supports mailbox subscriptions, otherwise it may use LIST. This is semantically equivalent to `imap://<iserver>/;TYPE=LIST` or `imap://<iserver>/;TYPE=LSUB`.
section: "4"
topics:
    - email
