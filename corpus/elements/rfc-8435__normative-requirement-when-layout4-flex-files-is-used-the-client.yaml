document: rfc-8435
kind: normative-requirement
summary: When LAYOUT4_FLEX_FILES is used, the client MUST report I/O errors to the server at LAYOUTRETURN time using the ff_ioerr4 structure. The metadata server MUST recall any outstanding layouts before recovering from errors and MUST complete recovery before issuing new layouts for affected byte ranges.
section: "7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
