document: rfc-3566
kind: interoperability-note
summary: AES-XCBC-MAC-96 is used as an authentication mechanism within IPsec ESP and AH. The key and derived subkeys should be used for no purposes other than those specified in the algorithm; using them as keys in another cryptographic context will invalidate the security of the authentication algorithm.
section: "4.1"
topics:
    - crypto
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
