document: rfc-9758
kind: design-rationale
summary: Allocator Identifier ranges enable hierarchical delegation of Node Number assignment to sub-organizations, inspired by CIDR. Ranges must be power-of-2 sized (2^N) with the least-significant N bits of the first identifier all zero, allowing bitwise prefix matching to associate identifiers with an organization.
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
