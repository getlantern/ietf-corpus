summary: 'The SIZE parameter on MAIL FROM carries a decimal integer (1–20 digits) representing the declared message size in octets. Syntax: `size-value ::= 1*20DIGIT`. The MAIL FROM line length limit is increased by 26 characters to accommodate this parameter.'
