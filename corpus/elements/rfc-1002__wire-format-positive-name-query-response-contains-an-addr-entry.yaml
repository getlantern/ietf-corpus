document: rfc-1002
kind: wire-format
summary: 'Positive Name Query Response contains an ADDR_ENTRY array; each ADDR_ENTRY is 6 bytes: NB_FLAGS (2 bytes) and NB_ADDRESS (4 bytes). For group names, multiple entries may be present. The TC bit is set if the list is truncated due to packet size limits.'
