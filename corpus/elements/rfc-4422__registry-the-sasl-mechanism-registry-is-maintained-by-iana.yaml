document: rfc-4422
kind: registry
summary: 'The SASL Mechanism Registry is maintained by IANA. Individual mechanism names are registered First Come First Served; family name prefixes require Expert Review. Registrations include: mechanism name, security considerations, published specification, intended usage (COMMON/LIMITED USE/OBSOLETE), and owner/change controller. Registrations may not be deleted but may be marked OBSOLETE.'
section: "7.1"
topics:
    - registry
    - security
