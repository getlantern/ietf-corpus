document: rfc-6660
kind: normative-requirement
summary: When only excess-traffic-marking is used (e.g., Single Marking edge behaviour), the threshold-traffic-meter function SHOULD be disabled and MUST NOT trigger any packet marking. Unexpected ThM packets MUST be re-marked to ETM.
section: 5.2.3.1
rfc2119_level: MUST
topics:
