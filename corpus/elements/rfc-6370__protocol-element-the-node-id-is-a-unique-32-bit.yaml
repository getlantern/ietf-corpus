document: rfc-6370
kind: protocol-element
summary: The Node_ID is a unique 32-bit value assigned by the operator within the scope of a Global_ID. The value zero is reserved and MUST NOT be used. IPv4 loopback addresses may be used conveniently as Node_IDs but are not required.
section: "4"
topics:
