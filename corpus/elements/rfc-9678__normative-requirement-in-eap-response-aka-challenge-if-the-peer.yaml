document: rfc-9678
kind: normative-requirement
summary: In EAP-Response/AKA'-Challenge, if the Peer is participating in the FS extension, AT_PUB_ECDHE MUST be included carrying the Peer's ephemeral public key. AT_MAC MUST be included and checked as specified in RFC 9048.
section: 6.5.4
rfc2119_level: MUST
topics:
