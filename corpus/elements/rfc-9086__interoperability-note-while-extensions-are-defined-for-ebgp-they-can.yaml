document: rfc-9086
kind: interoperability-note
summary: While extensions are defined for EBGP, they can also be used for IBGP sessions; however, applicability for IBGP is limited to deployments where the IBGP peer is also along the forwarding data path, as IBGP sessions to route reflectors typically are not in the forwarding path.
section: "3"
topics:
