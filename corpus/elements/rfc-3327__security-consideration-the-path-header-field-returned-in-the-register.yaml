document: rfc-3327
kind: security-consideration
summary: The Path header field returned in the REGISTER response provides transparency to the UA about which proxies will be included in future requests. S/MIME end-to-end protection of the REGISTER response prevents intermediate proxies from tampering with the returned Path and enables the UA to detect node insertion attacks.
section: "6.2"
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
