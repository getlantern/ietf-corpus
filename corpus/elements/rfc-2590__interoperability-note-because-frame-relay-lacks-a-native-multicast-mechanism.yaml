document: rfc-2590
kind: interoperability-note
summary: Because Frame Relay lacks a native multicast mechanism, IPv6 multicast must be emulated. A node MUST send frames carrying ND multicast packets (to all-node and solicited-node multicast addresses) to all VCs on the Frame Relay interface.
section: "7"
topics:
