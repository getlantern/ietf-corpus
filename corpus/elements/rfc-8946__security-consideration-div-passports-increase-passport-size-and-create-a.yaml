document: rfc-8946
kind: security-consideration
summary: '"div" PASSporTs increase PASSporT size and create a potential amplification vector for SIP-based DDoS attacks. Using 3xx redirections instead of in-path retargeting mitigates this risk, and domains under unusual traffic loads can switch to redirection.'
