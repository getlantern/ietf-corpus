document: rfc-1184
kind: protocol-element
summary: The FORWARDMASK suboption carries a bit mask of up to 32 octets representing all 256 ASCII character codes; the high-order bit of mask0 corresponds to ASCII 0. When the server is in DONT TRANSMIT-BINARY mode, only the first 16 octets are used. Only the server side (the DO LINEMODE side) may send DO FORWARDMASK.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
