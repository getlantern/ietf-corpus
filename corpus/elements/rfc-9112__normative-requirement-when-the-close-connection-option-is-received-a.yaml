document: rfc-9112
kind: normative-requirement
summary: When the "close" connection option is received, a server MUST initiate closure after sending the final response and MUST NOT process further requests. A client MUST cease sending requests and close the connection after reading the response containing "close".
section: "9.6"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
