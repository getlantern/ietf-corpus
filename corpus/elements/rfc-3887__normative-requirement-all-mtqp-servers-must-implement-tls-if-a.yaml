document: rfc-3887
kind: normative-requirement
summary: All MTQP servers MUST implement TLS. If a server supports TLS and has certificates available, it MUST include 'STARTTLS' in the option list at startup. TLS SHOULD be enabled whenever possible.
section: "6"
rfc2119_level: MUST
