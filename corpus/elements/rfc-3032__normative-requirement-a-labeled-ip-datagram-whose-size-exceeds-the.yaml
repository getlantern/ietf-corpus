document: rfc-3032
kind: normative-requirement
summary: A labeled IP datagram whose size exceeds the True Maximum Frame Payload Size of the output data link MUST be considered 'too big'. A labeled IP datagram that is not too big MUST be transmitted without fragmentation.
section: "3.3"
rfc2119_level: MUST
topics:
    - mpls
