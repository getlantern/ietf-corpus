document: rfc-9354
kind: normative-requirement
summary: In scenarios where physical attacks are considered relatively highly possible, per-device credentials SHOULD be used. When group-shared symmetric keys are used, a compromised device puts the whole network or large parts of it at risk.
section: "8"
rfc2119_level: SHOULD
