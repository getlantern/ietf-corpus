document: rfc-7564
kind: design-rationale
summary: Spaces are excluded from the IdentifierClass because many Unicode characters are visually confusable with ASCII space, space characters are often not rendered in UIs, and some devices emit non-ASCII space equivalents (e.g., U+200D) on a spacebar press. The working group considered this a feature rather than a limitation.
section: "5.3"
topics:
    - security
