document: rfc-5323
kind: protocol-element
summary: DAV:contains is an optional operator for content-based full-text search against a resource's content (not properties). It evaluates to TRUE if the content satisfies the search phrase. Servers MAY apply stemming, phonetics, thesaurus expansion, case-insensitive matching, or other NLP techniques at their discretion.
section: "5.16"
topics:
    - http
