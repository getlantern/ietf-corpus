document: rfc-9041
kind: design-rationale
summary: The 'Vendor Private Use' and 'Private Use' registration procedures were replaced with 'First Come First Served' because private-use code points are permitted in production networks, creating a risk that two vendors assign the same value with different meanings. If such code points were deployed in the same network, the resulting protocol conflicts would be difficult to debug.
section: "1"
topics:
