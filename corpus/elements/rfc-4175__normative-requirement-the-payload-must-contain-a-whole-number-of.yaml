document: rfc-4175
kind: normative-requirement
summary: The payload MUST contain a whole number of pgroups; the sender MUST fill remaining bits of the final pgroup with zero and the receiver MUST ignore fill data, effectively black-filling the trailing edge of the image to a pgroup boundary.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
