summary: 'SEND counters Neighbor Solicitation/Advertisement spoofing by requiring senders to prove ownership of their IPv6 address via CGAs: since the interface identifier is derived from the node''s public key, only the holder of the private key can produce a valid RSA signature for that CGA.'
