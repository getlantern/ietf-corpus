document: rfc-5801
kind: normative-requirement
summary: Servers that support channel binding SHOULD advertise both the non-PLUS and PLUS variants of each GS2 mechanism name. If a server would never succeed with the non-PLUS variant due to policy, it MUST advertise only the PLUS variant.
section: "5"
rfc2119_level: SHOULD
topics:
