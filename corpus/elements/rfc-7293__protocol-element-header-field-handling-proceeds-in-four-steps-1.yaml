document: rfc-7293
kind: protocol-element
summary: 'Header field handling proceeds in four steps: (1) extract Require-Recipient-Valid-Since fields for recipients where no RRVS SMTP extension was used; (2) discard syntactically invalid, role-account, mismatched, or non-local fields; (3) reject the message if any remaining named address fails continuous ownership; (4) RECOMMENDED: remove the header field before local delivery.'
section: "5.2"
topics:
