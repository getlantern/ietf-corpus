document: rfc-7271
kind: normative-requirement
summary: For 1+1 unidirectional protection switching, the state transition table from Section 11.1 SHALL be reused with the received remote Request field always assumed to be no request. The OC input in WTR state stops the WTR timer and immediately transitions to Normal (replacing footnote 4), and WTR timer expiry in WTR state also transitions to Normal (replacing footnote 6). EXER is not relevant.
section: "11.3"
rfc2119_level: SHALL
topics:
    - mpls
    - routing
