document: rfc-9432
kind: design-rationale
summary: Member zone names are placed in the RDATA of PTR records rather than as owner name labels so that all valid domain names may be represented regardless of their length, since DNS label length constraints would otherwise prevent some names from being encoded as owner names.
section: "4.1"
topics:
    - dns
