document: rfc-3015
kind: security-consideration
summary: Protocol connections between MG and MGC SHOULD be protected using IPsec AH or ESP to provide authentication, integrity, and optionally confidentiality. AH alone is sufficient when encryption is not required; ESP provides both integrity and encryption.
section: "10.1"
topics:
    - security
    - ipsec
    - realtime
