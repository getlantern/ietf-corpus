document: rfc-7680
kind: design-rationale
summary: Type-P-One-way-Packet-Loss is exactly 0 when Type-P-One-way-Delay has a finite value, and exactly 1 when Type-P-One-way-Delay is undefined. This links loss measurement to the delay metric and means the Tmax threshold defines the boundary between 'very large delay' and 'loss'.
section: "2.5"
