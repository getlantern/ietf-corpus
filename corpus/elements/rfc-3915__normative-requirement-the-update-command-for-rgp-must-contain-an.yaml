document: rfc-3915
kind: normative-requirement
summary: The <update> command for RGP MUST contain an <extension> element with a child <rgp:update> element, which in turn contains a single <rgp:restore> element with a REQUIRED 'op' attribute of either 'request' or 'report'.
section: 4.2.5
rfc2119_level: MUST
topics:
