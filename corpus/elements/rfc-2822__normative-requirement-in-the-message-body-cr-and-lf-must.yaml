document: rfc-2822
kind: normative-requirement
summary: In the message body, CR and LF MUST only occur together as CRLF; they MUST NOT appear independently. Body lines MUST be limited to 998 characters (SHOULD be 78) excluding the CRLF.
section: "2.3"
rfc2119_level: MUST
topics:
