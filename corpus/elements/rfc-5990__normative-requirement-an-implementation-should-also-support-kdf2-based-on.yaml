document: rfc-5990
kind: normative-requirement
summary: An implementation SHOULD also support KDF2 based on SHA-1. The Camellia key wrap SHOULD be supported if Camellia is supported as a content-encryption cipher. Triple-DES Key Wrap SHOULD be supported if Triple-DES is supported as a content-encryption cipher.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - crypto
