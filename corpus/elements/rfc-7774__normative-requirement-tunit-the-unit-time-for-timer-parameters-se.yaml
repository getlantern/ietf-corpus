document: rfc-7774
kind: normative-requirement
summary: TUNIT (the unit time for timer parameters SE_LIFETIME and *_IMIN, in milliseconds) MUST NOT be set to 0 or 0xff, which are reserved values. Similarly, SE_LIFETIME, DM_IMIN, DM_T_EXP, C_IMIN, and C_T_EXP MUST NOT be set to 0 or 0xffff; DM_IMAX and C_IMAX MUST NOT be set to 0 or 0xff.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - routing
