document: rfc-8130
kind: protocol-element
summary: 'Packet loss concealment (PLC) for MELPe uses the pitch/voicing parameter encoding: a code value of 3 (bits P0 and P1 set to 1, bits P2-P6 set to 0) signals an erasure. For 1200 or 600 bps frames, the 2400 bps decoder is called three or four times respectively to cover the loss.'
section: "6"
topics:
