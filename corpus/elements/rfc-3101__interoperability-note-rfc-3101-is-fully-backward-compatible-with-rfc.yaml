document: rfc-3101
kind: interoperability-note
summary: 'RFC 3101 is fully backward-compatible with RFC 1587. All differences expand capability without breaking existing behavior, so implementations of RFC 3101 and RFC 1587 will interoperate. The key changes are: optional summary import, refined forwarding address rules, updated translator election to fix a bug when the highest-router-ID translator loses transit connectivity, and defined P-bit default of clear.'
section: Appendix F
topics:
    - routing
