document: rfc-6470
kind: normative-requirement
summary: The lowest NETCONF layer is the secure transport layer and the mandatory-to-implement secure transport is SSH, as defined in RFC 6242. Access to the notifications in this module MUST be controlled via the secure transport.
section: "4"
rfc2119_level: REQUIRED
topics:
