document: rfc-8345
kind: design-rationale
summary: The data model uses groupings instead of inline data node definitions to simplify inclusion of topology data in YANG notifications, which otherwise would need to re-specify each included data node. The trade-off is increased complexity in XPath constraints, which must navigate into the grouping.
section: 4.4.4
topics:
    - yang
