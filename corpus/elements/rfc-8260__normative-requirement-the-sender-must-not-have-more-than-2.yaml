document: rfc-8260
kind: normative-requirement
summary: The sender MUST NOT have more than 2**31 - 1 ordered messages or more than 2**31 - 1 unordered messages for each outgoing stream in flight, and MUST NOT have more than 2**31 - 1 fragments of a single user message in flight, per serial number arithmetic constraints.
