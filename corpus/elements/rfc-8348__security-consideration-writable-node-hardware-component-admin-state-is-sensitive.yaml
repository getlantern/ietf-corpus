document: rfc-8348
kind: security-consideration
summary: 'Writable node ''/hardware/component/admin-state'' is sensitive: setting it to ''locked'' or ''shutting-down'' can cause service disruption ranging from a single port to an entire device. Write operations via NETCONF/RESTCONF must be protected using NACM (RFC 8341).'
section: "9"
topics:
    - yang
    - netconf
    - security
