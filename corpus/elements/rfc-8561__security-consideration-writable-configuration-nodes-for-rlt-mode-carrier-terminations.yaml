document: rfc-8561
kind: security-consideration
summary: Writable configuration nodes for RLT (mode, carrier-terminations, rlp-groups, xpic-pairs, mimo-groups, tdm-connections) and CT (tx-frequency, rx-frequency, power settings, coding-modulation, loop controls) must be protected because they need to match the far-end configuration; unauthorized write access could interrupt traffic forwarding.
section: "6"
topics:
    - security
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
