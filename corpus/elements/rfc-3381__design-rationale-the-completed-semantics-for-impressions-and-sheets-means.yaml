document: rfc-3381
kind: design-rationale
summary: The 'completed' semantics for impressions and sheets means 'stacked'; if the implementation cannot detect when each sheet is stacked, stacking is approximated as when processing of each sheet is completed. This accommodates printers that lack output-bin sensors.
section: "4"
