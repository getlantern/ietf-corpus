document: rfc-2943
kind: design-rationale
summary: A single-octet sub-option identifier is carried immediately after the two-octet authentication type pair to uniquely identify each portion of the exchange. This simplifies implementation within the unbounded authentication exchange by making each message self-identifying.
section: "3.1"
