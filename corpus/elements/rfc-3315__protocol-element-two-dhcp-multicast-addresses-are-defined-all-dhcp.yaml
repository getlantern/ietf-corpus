summary: 'Two DHCP multicast addresses are defined: All_DHCP_Relay_Agents_and_Servers (FF02::1:2) is link-scoped for client-to-relay/server communication; All_DHCP_Servers (FF05::1:3) is site-scoped for relay-to-server communication when the relay does not know server unicast addresses.'
