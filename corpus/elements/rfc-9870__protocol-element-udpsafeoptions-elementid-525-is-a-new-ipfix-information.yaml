document: rfc-9870
kind: protocol-element
summary: udpSafeOptions (ElementID 525) is a new IPFIX Information Element that exports observed SAFE UDP Options in a Flow. Options with Kind 0-191 are mapped to bits in an unsigned256 bitmap, with Kind 0 at the least significant bit and Kind 191 at the 65th most significant bit; the 64 most significant bits MUST be set to 0.
section: "4.1"
topics:
    - udp
    - measurement
