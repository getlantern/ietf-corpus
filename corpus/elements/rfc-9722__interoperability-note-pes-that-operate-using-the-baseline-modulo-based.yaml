document: rfc-9722
kind: interoperability-note
summary: PEs that operate using the baseline modulo-based DF election from RFC 7432 will simply discard the new SCT BGP Extended Community as unrecognized, ensuring backwards compatibility. A PE signals SCT support by setting T=1 in the DF Election Capability bitmap alongside the SCT extended community.
section: "4"
topics:
