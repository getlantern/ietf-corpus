document: rfc-4936
kind: design-rationale
summary: Application_ID value 0xFF is reserved by T11 (documented in INCITS T11/06-679v0) solely for locks established via ACA, which have no native Application_ID. This assignment allows the same Application_ID field to uniquely identify any active lock whether established by ACA or EACA.
section: "5.4"
topics:
    - routing
