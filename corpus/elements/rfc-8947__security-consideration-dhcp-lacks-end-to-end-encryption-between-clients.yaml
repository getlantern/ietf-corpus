document: rfc-8947
kind: security-consideration
summary: DHCP lacks end-to-end encryption between clients and servers, making hijacking, tampering, and eavesdropping attacks possible. If not all devices on a link use this mechanism, address collisions may occur—this risk exists regardless of DHCP.
