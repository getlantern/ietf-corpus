document: rfc-6361
kind: design-rationale
summary: PPP nodes do not have MAC addresses, so no outer MAC is present in the TNP format. HDLC addresses MAY be present in some situations, but such usage is outside the scope of this document. This differs from the TRILL Ethernet encapsulation which includes an Outer MAC header.
section: "2.2"
topics:
    - routing
