document: rfc-8974
kind: normative-requirement
summary: To reliably discover extended token support via trial and error in CoAP over UDP, clients are REQUIRED to use a Confirmable message, because only Confirmable messages with format errors are guaranteed to elicit a Reset reply.
section: 2.2.2
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
