document: rfc-9101
kind: normative-requirement
summary: The Request Object MUST contain all parameters used to process the OAuth 2.0 authorization request except 'request' and 'request_uri'. Parameter names and string values MUST be included as JSON strings encoded using UTF-8; numerical values MUST be included as JSON numbers.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - json
