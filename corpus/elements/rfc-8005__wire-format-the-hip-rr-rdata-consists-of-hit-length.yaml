document: rfc-8005
kind: wire-format
summary: 'The HIP RR RDATA consists of: HIT length (8-bit), PK algorithm (8-bit), PK length (16-bit, network byte order), HIT (variable, binary), Public Key (variable), and optionally one or more Rendezvous Server domain names (wire-encoded, variable). The HIT length, PK algorithm, PK length, HIT, and Public Key fields are REQUIRED; the Rendezvous Server field is OPTIONAL.'
