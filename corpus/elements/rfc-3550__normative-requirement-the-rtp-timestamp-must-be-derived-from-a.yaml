document: rfc-3550
kind: normative-requirement
summary: The RTP timestamp MUST be derived from a clock that increments monotonically and linearly in time. The clock resolution MUST be sufficient for synchronization accuracy and jitter measurement. The initial timestamp SHOULD be random.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
