document: rfc-4251
kind: protocol-element
summary: 'SSH consists of three major components layered in order: the Transport Layer Protocol (server authentication, confidentiality, integrity, optional compression), the User Authentication Protocol (client-to-server authentication), and the Connection Protocol (multiplexes the encrypted tunnel into logical channels). Each layer runs over the one below it.'
