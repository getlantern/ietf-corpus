document: rfc-3460
kind: protocol-element
summary: CompoundPolicyAction is a new subclass of PolicyAction representing a sequence of sub-actions to be applied as a single logical action. It carries a SequencedActions property and an ExecutionStrategy property, and may be nested within another CompoundPolicyAction.
