summary: Mechanism 2 defines two new mLDP TLVs — Transit IPv4 Shared Tree TLV and Transit IPv6 Shared Tree TLV — to carry (*,G) shared tree state in-band within mLDP signaling. These enable shared trees to transit the MPLS domain.
