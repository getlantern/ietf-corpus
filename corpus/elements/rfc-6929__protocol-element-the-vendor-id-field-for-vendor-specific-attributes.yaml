document: rfc-6929
kind: protocol-element
summary: The Vendor-Id field for Vendor-Specific Attributes is redefined to encompass the full 4 octets of the Vendor field. RFC 2865 Section 5.26 had defined it as 3 octets with the fourth forced to zero; implementations are RECOMMENDED to support the full 4-octet form.
section: "2.6"
topics:
