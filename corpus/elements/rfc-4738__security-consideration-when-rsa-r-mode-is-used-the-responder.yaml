document: rfc-4738
kind: security-consideration
summary: When RSA-R mode is used, the Responder may be a different party than the intended recipient (e.g., due to call forwarding). The Initiator is responsible for verifying that the Responder's identity is acceptable per local policy; blacklists, whitelists, or strong authentication may be appropriate.
section: "5"
topics:
