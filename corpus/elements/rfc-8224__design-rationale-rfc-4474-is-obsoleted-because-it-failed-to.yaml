document: rfc-8224
kind: design-rationale
summary: RFC 4474 is obsoleted because it failed to handle telephone numbers as identifiers despite their dominance in SIP deployments, and because it signed over SIP header fields that intermediaries in existing deployments commonly alter. This specification realigns the signature format with PASSporT (RFC 8225) and addresses the STIR threat model (RFC 7375).
section: "1"
topics:
    - sip
    - security
