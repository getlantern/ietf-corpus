document: rfc-8936
kind: normative-requirement
summary: If no SETs are available at the time of the request, the SET Transmitter SHALL delay responding until a SET is available or the timeout interval has elapsed unless the poll request parameter 'returnImmediately' is present with the value 'true'.
section: "2.5"
rfc2119_level: SHALL
topics:
