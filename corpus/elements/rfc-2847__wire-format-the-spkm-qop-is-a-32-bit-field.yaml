document: rfc-2847
kind: wire-format
summary: The SPKM QOP is a 32-bit field split into Confidentiality (bits 31-16) and Integrity (bits 15-0), each with subfields TS(5), U(3), IA(4), MA(4). SPKM-3 adds cast5CBC (MA=0010) for confidentiality and id-dsa-with-sha1 (MA=0011), HMAC-MD5 (MA=0100), sha1WithRSAEncryption (MA=0101) for integrity.
section: "2.5"
