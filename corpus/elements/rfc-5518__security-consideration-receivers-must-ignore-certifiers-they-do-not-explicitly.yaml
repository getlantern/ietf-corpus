document: rfc-5518
kind: security-consideration
summary: Receivers MUST ignore certifiers they do not explicitly trust; a bad actor could otherwise add a self-controlled authority to the mv= list and vouch for its own mail. Only certifiers from a locally trusted set should be acted upon.
section: "8"
rfc2119_level: MUST
topics:
    - email
    - security
