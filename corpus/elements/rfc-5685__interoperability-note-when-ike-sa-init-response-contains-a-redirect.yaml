document: rfc-5685
kind: interoperability-note
summary: When IKE_SA_INIT response contains a REDIRECT notification, the exchange does not result in the creation of an IKE_SA and the responder SPI will be zero. Implementations must not treat this as a completed IKE_SA_INIT.
section: "3"
topics:
