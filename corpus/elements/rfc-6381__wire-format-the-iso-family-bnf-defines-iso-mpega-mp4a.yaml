document: rfc-6381
kind: wire-format
summary: 'The ISO-family BNF defines: iso-mpega := mp4a ''.'' oti [''.'' aud-oti]; iso-mpegv := mp4v ''.'' oti [''.'' vid-pli]; iso-avc := (avc1|avc2|svc1|mvc1|mvc2) [''.'' avcoti], where oti is 2 hex digits, avcoti is 6 hex digits, aud-oti and vid-pli are decimal strings. The leading ''0x'' from MP4RA OTI notation is omitted.'
