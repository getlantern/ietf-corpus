document: rfc-3471
kind: protocol-element
summary: 'The Generalized Label Request carries three fields in 32 bits: LSP Encoding Type (8 bits) indicating the encoding (e.g., Packet, Ethernet, SDH, Lambda, Fiber), Switching Type (8 bits) indicating the switching capability required on each link, and Generalized PID (G-PID, 16 bits) identifying the payload/client layer of the LSP.'
section: 3.1.1
topics:
