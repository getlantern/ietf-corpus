document: rfc-4173
kind: normative-requirement
summary: A BOOTP or DHCP server (v4 or v6) MAY instruct an iSCSI client how to reach its boot device using the Root Path option, prefaced with 'iscsi:'. The Root Path option is not currently defined for DHCPv6; if defined in the future, iSCSI boot use will apply.
section: "5"
rfc2119_level: MAY
topics:
    - tcp
