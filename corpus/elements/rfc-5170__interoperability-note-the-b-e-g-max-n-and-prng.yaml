document: rfc-5170
kind: interoperability-note
summary: The B, E, G, max_n, and PRNG seed parameters are communicated via the FEC OTI, so alternative algorithms for determining B, E, G, and max_n may be used without compromising interoperability. However, both sender and receiver MUST use the same n-algorithm and the same PRNG.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
