document: rfc-2630
kind: normative-requirement
summary: For X9.42 ESDH, the originator field must be the originatorKey alternative carrying the sender's ephemeral public key with the dh-public-number OID, and keyEncryptionAlgorithm must be id-alg-ESDH with a mandatory KeyWrapAlgorithm parameter.
section: 12.3.1.1
rfc2119_level: MUST
topics:
