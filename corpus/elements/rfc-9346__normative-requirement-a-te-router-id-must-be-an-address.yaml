document: rfc-9346
kind: normative-requirement
summary: A TE Router ID MUST be an address that is unique within the IS-IS domain and stable, i.e., it can always be referenced in a path reachable from multiple hops away regardless of the state of the node's interfaces.
section: "3.1"
rfc2119_level: MUST
topics:
