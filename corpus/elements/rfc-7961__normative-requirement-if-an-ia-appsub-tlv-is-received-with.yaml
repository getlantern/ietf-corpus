document: rfc-7961
kind: normative-requirement
summary: If an IA APPsub-TLV is received with one or more AFNs in its Template for which the receiving TRILL switch does not know the length and no AFN Size sub-sub-TLV is present, that IA APPsub-TLV MUST be ignored.
section: "2"
rfc2119_level: MUST
topics:
    - routing
