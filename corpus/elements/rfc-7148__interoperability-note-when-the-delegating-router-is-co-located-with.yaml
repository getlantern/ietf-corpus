document: rfc-7148
kind: interoperability-note
summary: When the delegating router is co-located with the LMA, the MAG's DHCPv6 relay agent function MUST queue the DHCPv6 Reply message during the PMIPv6 PBU/PBA signaling exchange before forwarding it to the requesting router. Implementations must account for interactions between PMIPv6 timing and DHCPv6 timeout/retry logic.
section: 3.2.2
topics:
    - mobility
