document: rfc-5552
kind: interoperability-note
summary: The fixed user part 'dialog' in the Request-URI ensures compatibility with RFC 4240 ('Basic Network Media Services with SIP'), which first defined this convention and is widely adopted by existing media servers. This document extends the RFC 4240 dialog interface.
