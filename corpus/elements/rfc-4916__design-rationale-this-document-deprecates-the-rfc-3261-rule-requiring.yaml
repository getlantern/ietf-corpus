document: rfc-4916
kind: design-rationale
summary: This document deprecates the RFC 3261 rule requiring mandatory reflection of the original To and From URIs in mid-dialog requests. RFC 3261 Section 12.2.1.1 anticipated this deprecation, noting that only tags (not URIs) are used for dialog identification and that mandatory URI reflection was kept only for backwards compatibility with RFC 2543.
section: "3"
topics:
    - sip
