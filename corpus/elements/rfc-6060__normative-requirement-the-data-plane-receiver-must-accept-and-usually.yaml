document: rfc-6060
kind: normative-requirement
summary: The data plane receiver MUST accept, and usually assigns, labels from its available label pool. Each PBB-TE Ethernet Label must be domain-wide unique, with a unique ESP-VID + ESP-MAC DA, for each direction.
