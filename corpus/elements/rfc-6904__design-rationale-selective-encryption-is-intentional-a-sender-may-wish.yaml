document: rfc-6904
kind: design-rationale
summary: 'Selective encryption is intentional: a sender may wish some extension information (e.g., RTP transmission time offsets) to remain in the clear for network monitoring devices, while encrypting other sensitive extensions (e.g., audio levels). The encryption mask mechanism accommodates this per-element selectivity.'
section: "1"
topics:
