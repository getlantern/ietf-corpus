document: rfc-3886
kind: privacy-consideration
summary: Message recipients who autoforward messages may not wish to divulge the forwarding address. MTA authors are encouraged to provide confidentiality mechanisms, such as responding with 'relayed' status or declaring delivery and re-sending to a confidential address without revealing it.
section: "4.2"
topics:
    - privacy
    - email
