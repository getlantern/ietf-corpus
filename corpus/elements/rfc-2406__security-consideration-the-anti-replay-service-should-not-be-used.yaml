document: rfc-2406
kind: security-consideration
summary: The anti-replay service SHOULD NOT be used in a multi-sender environment that employs a single SA, since there are no provisions for managing transmitted Sequence Number values among multiple senders directing traffic to a single SA, regardless of whether the destination address is unicast, broadcast, or multicast.
section: 3.4.3
topics:
    - ipsec
    - security
    - multicast
