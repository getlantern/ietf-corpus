document: rfc-7463
kind: protocol-element
summary: The <appearance> element is a child of <dialog> in the shared appearance dialog package extension. When sent by a UA in a PUBLISH with state 'trying', it requests a specific appearance number; when sent by the Appearance Agent in a NOTIFY, it confirms the assigned number.
section: 5.2.1
topics:
    - sip
    - realtime
