summary: 'The /ntp/clock-state/system-status container (config false) exposes mandatory operational leaves: clock-state (synchronized/unsynchronized), clock-stratum, clock-refid, nominal-freq and actual-freq (decimal64 in Hz), clock-precision (log2seconds), and sync-state (granular states including clock-never-set, freq-set-by-cfg, spike, freq, clock-synchronized).'
