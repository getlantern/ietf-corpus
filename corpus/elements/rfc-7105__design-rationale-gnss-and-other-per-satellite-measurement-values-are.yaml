document: rfc-7105
kind: design-rationale
summary: GNSS and other per-satellite measurement values are converted from system-native units (chips, wavelengths, Hz) to system-independent units (milliseconds, meters per second) in the schema, so that a LIS can use the measurements without needing knowledge of carrier frequencies or chip rates specific to each GNSS.
section: 5.5.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
