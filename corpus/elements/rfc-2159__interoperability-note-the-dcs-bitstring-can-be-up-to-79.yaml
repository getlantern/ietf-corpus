document: rfc-2159
kind: interoperability-note
summary: The DCS bitstring can be up to 79 bits long (as of 1995 extensions). Messages with unusual DCS bits set (e.g., bit 68 for JPEG coding, bit 27 for error correcting mode) may arrive through X.400 without negotiation, so implementations must handle or ignore unknown DCS bits gracefully.
section: "4"
topics:
