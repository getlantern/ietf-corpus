document: rfc-9488
kind: protocol-element
summary: 'The Protection Enforcement (E) flag is defined as bit 6 in the Flags field of the LSPA object, adjacent to the existing Local Protection Desired (L) flag at bit 7. Together, the two bits encode four protection constraint modes: PROTECTION MANDATORY, PROTECTION PREFERRED, UNPROTECTED PREFERRED, and UNPROTECTED MANDATORY.'
section: "5"
