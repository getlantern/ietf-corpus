document: rfc-8895
kind: normative-requirement
summary: The 'uses' attribute of an update stream service MUST list every resource for which the stream can provide updates, and each listed resource MUST support full replacement. It is RECOMMENDED that this set be closed under resource dependency relationships.
section: "6.4"
rfc2119_level: MUST
topics:
    - http
