document: rfc-4210
kind: design-rationale
summary: The indirect POP method for encryption keys (returning an encrypted certificate so the EE proves possession by computing CertHash) is explicitly encouraged because it fits within the standard {request, response, confirmation} triple without extra round trips, unlike the challenge-response protocol which adds multiple messages.
