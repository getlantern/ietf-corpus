document: rfc-8237
kind: protocol-element
summary: The Session ID is a non-zero locally selected 16-bit value not preserved across PE restarts. The recommended generation method is a CRC-16 of the current timestamp (YY|MM|DD|HHMMSSLLL); if the result collides, increment by 1 until unique.
