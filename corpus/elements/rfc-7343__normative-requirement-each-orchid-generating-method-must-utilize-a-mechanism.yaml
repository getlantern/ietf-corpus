document: rfc-7343
kind: normative-requirement
summary: Each ORCHID-generating method MUST utilize a mechanism ensuring that input bitstrings are either unique or statistically unique within their context, for example by including a counter, a pseudorandom number of at least 96 bits of entropy, or a randomly generated public key.
section: "5"
rfc2119_level: MUST
topics:
