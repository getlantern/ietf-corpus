document: rfc-4398
kind: design-rationale
summary: The IPKIX, ISPKI, IPGP, and IACPKIX indirect types were introduced because the DNS RDATA field is limited to 65535 octets, making it impossible to store large certificates or CRLs inline. Indirect types carry a URL reference instead of the certificate data itself.
section: "2.1"
topics:
    - dns
    - pkix
