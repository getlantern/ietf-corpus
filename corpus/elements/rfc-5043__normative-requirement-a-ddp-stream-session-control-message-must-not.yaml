document: rfc-5043
kind: normative-requirement
summary: A DDP Stream Session Control message MUST NOT be sent if it may be received before a prior DDP Stream Session Control message within the same session. An active side MUST NOT send a DDP Segment that might be received before the Session Initiate message.
section: "6.6"
rfc2119_level: MUST
topics:
    - sctp
