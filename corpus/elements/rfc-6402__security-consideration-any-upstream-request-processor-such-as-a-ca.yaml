document: rfc-6402
kind: security-consideration
summary: Any upstream request processor such as a CA MUST verify that the RA is fully identified and authorized before accepting assertions or modifications made via controls like the RA Identity Proof Witness control. If not identified or authorized, any such request MUST be rejected.
section: "2.12"
rfc2119_level: MUST
topics:
    - pkix
    - security
