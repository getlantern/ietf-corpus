document: rfc-6864
kind: normative-requirement
summary: Sources of non-atomic IPv4 datagrams MUST rate-limit their output to comply with the ID uniqueness requirements. This applies especially to DNS over UDP, which generates non-atomic datagrams.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - dns
