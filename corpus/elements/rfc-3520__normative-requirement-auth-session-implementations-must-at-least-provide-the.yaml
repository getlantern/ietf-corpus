document: rfc-3520
kind: normative-requirement
summary: AUTH_SESSION implementations MUST at least provide the ability to manually configure shared symmetric keys and their parameters locally. Keys MUST be configurable with overlapping lifetimes to allow smooth key transitions.
section: 4.1.1
rfc2119_level: MUST
topics:
