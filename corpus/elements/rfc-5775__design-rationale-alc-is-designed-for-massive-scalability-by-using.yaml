document: rfc-5775
kind: design-rationale
summary: ALC is designed for massive scalability by using IP multicast as the underlying network service, supporting millions of concurrent receivers with a single sender. The sender's load is independent of the number of receivers, and no feedback packets are required from receivers to the sender.
section: "1.2"
topics:
    - multicast
    - congestion
    - realtime
