document: rfc-4282
kind: protocol-element
summary: The realm portion of an NAI is an 'IDN-unaware domain name slot' (per RFC 3490) and therefore carries only ASCII characters. An implementation MAY support Internationalized Domain Names by applying the ToASCII operation before transmission.
section: "2.4"
topics:
