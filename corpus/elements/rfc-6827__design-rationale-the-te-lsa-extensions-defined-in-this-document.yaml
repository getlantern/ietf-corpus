document: rfc-6827
kind: design-rationale
summary: The TE LSA extensions defined in this document are not used for Shortest Path First (SPF) computation and have no direct effect on IP routing. ASON routing domains are further bounded by normal administrative domain boundaries, limiting the scope of any misconfiguration or attack.
