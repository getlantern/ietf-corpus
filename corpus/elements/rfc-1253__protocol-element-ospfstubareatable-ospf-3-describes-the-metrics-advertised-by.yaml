document: rfc-1253
kind: protocol-element
summary: ospfStubAreaTable (ospf 3) describes the metrics advertised by a default Area Border Router into stub areas, indexed by ospfStubAreaID and ospfStubTOS (TOSType 0..31). ospfStubMetric uses BigMetric (1..0xFFFFFF). Rows are deleted by setting ospfStubStatus to 'invalid'.
section: "5.3"
topics:
