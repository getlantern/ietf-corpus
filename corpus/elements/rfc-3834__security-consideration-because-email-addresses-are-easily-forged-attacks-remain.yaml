document: rfc-3834
kind: security-consideration
summary: Because email addresses are easily forged, attacks remain possible for any responder that does not limit access and require authentication. The recommended mitigations (rate limiting, brief plain-text responses, Auto-Submitted marking) limit damage but cannot entirely prevent attacks.
