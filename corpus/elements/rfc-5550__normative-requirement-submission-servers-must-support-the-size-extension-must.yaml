document: rfc-5550
kind: normative-requirement
summary: Submission Servers MUST support the SIZE extension, MUST expand all BURL parts before evaluating message size acceptability, and clients MUST NOT send a message if they know it exceeds the advertised maximum size. The declared size MUST be at least as large as the assembled message after BURL resolution.
section: "4.4"
rfc2119_level: MUST
topics:
    - email
