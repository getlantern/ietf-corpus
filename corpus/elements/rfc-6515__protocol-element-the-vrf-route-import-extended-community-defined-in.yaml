document: rfc-6515
kind: protocol-element
summary: The 'VRF Route Import Extended Community' defined in RFC 6514 is an 'IPv4 Address Specific Extended Community' and can carry only an IPv4 PE address. To carry an IPv6 PE address, an 'IPv6 Address Specific Extended Community' of type 'VRF Route Import' (code point 0x000b) must be used instead, independent of whether the hosting route is VPN-IPv4 or VPN-IPv6.
section: "3"
topics:
    - bgp
    - multicast
    - vpn
    - registry
