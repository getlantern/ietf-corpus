document: rfc-2835
kind: normative-requirement
summary: On non-broadcast hardware, a HARP client MUST refresh its HARP server table entry at least once every 15 minutes, via HARP request/reply exchange or by restarting registration. The timeout SHOULD be reset after each HARP_REQUEST/HARP_REPLY exchange to reduce redundant traffic.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
