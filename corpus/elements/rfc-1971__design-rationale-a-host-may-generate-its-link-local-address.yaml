document: rfc-1971
kind: design-rationale
summary: A host may generate its link-local address (and verify uniqueness) in parallel with waiting for a Router Advertisement, because a router may delay responding to a Router Solicitation for a few seconds. Performing the two steps serially would significantly increase total autoconfiguration time.
section: "4"
topics:
