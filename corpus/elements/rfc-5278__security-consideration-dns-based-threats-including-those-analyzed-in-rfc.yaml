document: rfc-5278
kind: security-consideration
summary: DNS-based threats (including those analyzed in RFC 3833) and DNSSEC applicability (RFC 4035) are relevant to the security of ENUM deployments using these Enumservices. Implementers are referred to RFC 3761 for a full analysis of threats specific to ENUM's dependence on DNS.
