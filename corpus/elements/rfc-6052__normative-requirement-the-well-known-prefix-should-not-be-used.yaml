document: rfc-6052
kind: normative-requirement
summary: The Well-Known Prefix SHOULD NOT be used to construct IPv4-translatable IPv6 addresses, because more-specific prefixes derived from it cannot be advertised in inter-domain routing. Network-Specific Prefixes SHOULD be used in stateless translation scenarios instead.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
    - nat
    - routing
