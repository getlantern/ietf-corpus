document: rfc-7011
kind: normative-requirement
summary: Padding octets inserted by the Exporting Process to align Set boundaries MUST be composed of zero-value octets, and the padding length MUST be shorter than any allowable record in the Set. Record types MUST NOT be mixed within a Set.
section: 3.3.1
rfc2119_level: MUST
