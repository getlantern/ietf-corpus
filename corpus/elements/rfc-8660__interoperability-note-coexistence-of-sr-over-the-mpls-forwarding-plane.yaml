document: rfc-8660
kind: interoperability-note
summary: Coexistence of SR over the MPLS forwarding plane with LDP (RFC 5036) is specified in RFC 8661. When a neighbor does not support SR, a router may fall back to using a downstream label determined by another MCC such as LDP to forward the packet.
section: "1"
topics:
