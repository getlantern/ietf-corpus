document: rfc-1442
kind: normative-requirement
summary: 'If any columnar object in a conceptual row has ''read-create'' as its maximal access level, then no other columnar object in the same conceptual row may have ''read-write'' as its maximal access. The ordering is: not-accessible < read-only < read-write < read-create.'
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - snmp
