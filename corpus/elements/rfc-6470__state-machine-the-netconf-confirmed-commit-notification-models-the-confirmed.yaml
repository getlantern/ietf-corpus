document: rfc-6470
kind: state-machine
summary: 'The ''netconf-confirmed-commit'' notification models the confirmed-commit procedure with five states via the mandatory ''confirm-event'' enumeration: ''start'' (procedure initiated), ''cancel'' (canceled by session termination or <cancel-commit>), ''timeout'' (confirm-timeout expired; no session params present), ''extend'' (timeout extended by new <confirmed-commit>), ''complete'' (procedure finished).'
section: "2.2"
topics:
    - netconf
