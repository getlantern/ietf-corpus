document: rfc-2769
kind: protocol-element
summary: The 'integrity' attribute may appear in any RPSL object and takes values 'legacy', 'no-auth', 'auth-failed', or 'authorized' (default when absent). Objects with non-'authorized' integrity may be overwritten by any properly authorized addition.
