document: rfc-2472
kind: state-machine
summary: 'Interface-Identifier negotiation has four outcomes based on comparing received vs. sent identifiers: (1) different and non-zero received → Configure-Ack; (2) received is zero → Configure-Nak with non-zero suggestion; (3) equal and non-zero → Configure-Nak with different value; (4) both zero → Configure-Reject terminating negotiation.'
section: "4.1"
