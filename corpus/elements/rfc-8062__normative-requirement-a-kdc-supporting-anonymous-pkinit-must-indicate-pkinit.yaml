document: rfc-8062
kind: normative-requirement
summary: A KDC supporting anonymous PKINIT MUST indicate PKINIT support per Section 3.4 of RFC 4556 and MUST include a padata element of padata-type PA_PKINIT_KX with empty padata-value in any PA-PK-AS-REQ error reply to signal anonymous PKINIT support.
section: 4.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
