document: rfc-5323
kind: protocol-element
summary: DAV:limit contains DAV:nresults (an unsigned integer) requesting a maximum number of DAV:response elements returned. The server MAY disregard this limit. If both DAV:limit and DAV:orderby are used, results SHOULD be those that order highest.
section: "5.17"
topics:
    - http
