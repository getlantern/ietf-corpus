document: rfc-9399
kind: protocol-element
summary: 'The LogotypeExtn ASN.1 SEQUENCE contains four OPTIONAL fields: communityLogos [0], issuerLogo [1], subjectLogo [2], and otherLogos [3]. At least one of the optional elements MUST be present. LogotypeInfo is a CHOICE between direct (LogotypeData) and indirect (LogotypeReference) addressing.'
section: "4.1"
topics:
