document: rfc-5845
kind: normative-requirement
summary: If the MAG includes the GRE Key option in a PBU but receives a successful PBA without the GRE Key option (and status is not GRE_KEY_OPTION_NOT_REQUIRED), the MAG MUST consider that the LMA does not support the GRE Key option and SHOULD NOT include it in subsequent PBUs to that LMA.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
