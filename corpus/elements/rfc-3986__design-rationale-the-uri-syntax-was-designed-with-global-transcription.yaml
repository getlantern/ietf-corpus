document: rfc-3986
kind: design-rationale
summary: The URI syntax was designed with global transcription as a primary consideration, limiting characters to the basic Latin alphabet, digits, and a few special characters. The ability to transcribe a URI from one medium to another (e.g., napkin to keyboard) was considered more important than having the most meaningful component names.
section: 1.2.1
topics:
    - http
