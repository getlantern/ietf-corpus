document: rfc-6117
kind: interoperability-note
summary: The legacy IANA Enumservice registry contains Type and Subtype strings with uppercase letters. Implementors who refuse to handle uppercase Type or Subtype strings could negatively affect interoperability with existing deployments; Types and Subtypes are case insensitive.
section: "3.2"
topics:
    - registry
    - dns
