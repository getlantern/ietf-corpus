document: rfc-5259
kind: interoperability-note
summary: Conversion parameter names are case-insensitive per the registry established by RFC 2506 (MEDIAFEAT-REG). The CONVERT extension reuses RFC 3516 (IMAP Binary) section-binary syntax for section references, but unlike RFC 3516, conversion of top-level multipart/* parts is allowed.
