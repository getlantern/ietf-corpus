document: rfc-8525
kind: interoperability-note
summary: For a NETCONF server implementing RFC 8526 NMDA extensions, a change in the YANG library content identifier results in a new value for the ':yang-library:1.1' capability, which in turn triggers a 'netconf-capability-change' notification (RFC 6470) if NETCONF notifications (RFC 5277) are implemented.
section: "3"
topics:
