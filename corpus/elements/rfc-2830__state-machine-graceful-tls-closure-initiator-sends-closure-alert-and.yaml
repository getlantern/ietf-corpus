document: rfc-2830
kind: state-machine
summary: 'Graceful TLS closure: initiator sends closure alert and MUST discard incoming TLS messages until it receives a closure alert, then ceases TLS PDUs and MAY resume LDAP. The other party MUST immediately transmit a closure alert upon receipt and then ceases TLS PDUs.'
section: "4.1"
topics:
    - tls
    - ldap
