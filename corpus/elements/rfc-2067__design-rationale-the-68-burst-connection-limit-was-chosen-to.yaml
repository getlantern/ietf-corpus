document: rfc-2067
kind: design-rationale
summary: The 68-burst connection limit was chosen to allow transmission of one maximum-sized packet or a reasonable number of smaller packets per connection, ensuring each Source gets a fair share of a common Destination's bandwidth and preventing high-volume Sources from monopolizing it.
