document: rfc-1663
kind: normative-requirement
summary: A Configure-Nak may reduce the window value but MUST NOT increase it, because both peers must agree on the same modulo (8 or 128); one peer using modulo-8 and the other modulo-128 is not permitted.
section: "4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
