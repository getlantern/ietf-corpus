document: rfc-8780
kind: normative-requirement
summary: If the M bit in the WA object is set to 0 (distributed wavelength assignment), the PCE MUST return a Label Set Field as described in Section 2.6 of RFC 7579 in the response. Unused flags in the WA object SHOULD be zeroed.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
