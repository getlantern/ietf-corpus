document: rfc-5092
kind: normative-requirement
summary: If <uidvalidity> is present in a mailbox or message URL, it MUST be the same as the IMAP4 UIDVALIDITY response code at the time the URL was created, and MUST be used by the interpreting program to detect stale URLs. A stale URL should be treated as if the mailbox does not exist.
section: "5"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
