document: rfc-6936
kind: normative-requirement
summary: An integrity mechanism is always RECOMMENDED at the transported protocol layer to ensure that corruption rates of the delivered payload are not increased; a mechanism that isolates causes of corruption (misdelivery, IPv6 header corruption, tunnel header corruption) is also expected.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - udp
    - ip
    - security
