document: rfc-5246
kind: interoperability-note
summary: TLS 1.2 peers interoperating with TLS 1.0/1.1 or SSL 3.0 negotiate version via the ClientHello/ServerHello version fields. Support for the SSLv2 backward-compatible ClientHello format is now MAY (not SHOULD), with sending it explicitly SHOULD NOT, anticipating eventual removal.
section: E.1
topics:
    - tls
