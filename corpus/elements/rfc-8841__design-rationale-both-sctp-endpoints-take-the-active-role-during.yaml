document: rfc-8841
kind: design-rationale
summary: Both SCTP endpoints take the 'active' role during association establishment (unlike TCP where one endpoint is 'active' and one is 'passive'). This means the SDP 'setup' attribute does not apply to SCTP association establishment, though it does apply to the underlying DTLS association and TCP connection.
section: "9.3"
topics:
    - sctp
    - realtime
