document: rfc-9348
kind: protocol-element
summary: The iptfs-stats feature gates two per-SA counter containers. iptfs-inner-pkt-stats tracks inner (user) packet tx-pkts, tx-octets, rx-pkts, rx-octets, and rx-incomplete-pkts. iptfs-outer-pkt-stats tracks outer tunnel packet padding efficiency via tx-all-pad-pkts/octets, tx-extra-pad-pkts/octets, rx-all-pad-pkts/octets, rx-extra-pad-pkts/octets, rx-errored-pkts, and rx-missed-pkts.
section: "3.2"
topics:
    - ipsec
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
