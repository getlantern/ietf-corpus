document: rfc-2222
kind: normative-requirement
summary: Unless the protocol profile explicitly permits multiple successful SASL negotiations, only one may occur per session and further attempts to initiate an exchange must fail after one succeeds. Multiple security layers must never be simultaneously in effect; a new security layer selection replaces the previous one.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
