document: rfc-3811
kind: normative-requirement
summary: TeHopAddressType SHOULD NOT be sub-typed in object type definitions to support future extensions; it MAY be sub-typed in compliance statements. Implementations MUST ensure TeHopAddressType and dependent TeHopAddress objects remain consistent, generating an inconsistentValue error on violations.
