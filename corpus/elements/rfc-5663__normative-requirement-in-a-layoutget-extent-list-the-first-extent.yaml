document: rfc-5663
kind: normative-requirement
summary: 'In a LAYOUTGET extent list: the first extent MUST contain the requested starting offset; the total size MUST cover at least loga_minlength (except at EOF for read-only requests); extents MUST be logically contiguous for read-only layouts; for read-write layouts writable extents MUST be logically contiguous; extents MUST be ordered by bex_file_offset with READ_DATA preceding INVALID_DATA on ties.'
section: 2.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
