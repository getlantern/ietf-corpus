document: rfc-8417
kind: design-rationale
summary: SETs are explicitly designed as statements of fact (describing events that have already occurred), not commands or requests. Recipients independently decide what action, if any, to take upon receiving a SET. This design separates the event description from the business logic of the recipient.
section: "1"
topics:
