document: rfc-4568
kind: security-consideration
summary: SSRC collisions can cause keystream reuse in SRTP when senders and receivers share a master key, drastically weakening encryption. This specification mitigates the risk by requiring unique master keys for each direction of each unicast media stream.
section: "8.2"
topics:
    - security
    - realtime
    - rtp
    - crypto
