document: rfc-9182
kind: interoperability-note
summary: 'Both the L3SM and the L3NM can operate within the ACTN framework (RFC 8453): the L3SM is used at the CNC-to-MDSC interface, while the L3NM is used at the MDSC-to-PNC interface and between parent and child MDSC in hierarchical multi-domain deployments.'
