document: rfc-3980
kind: wire-format
summary: A 64-bit NAA iSCSI name consists of the prefix "naa." followed by 16 ASCII hexadecimal characters, e.g., "naa.52004567BA64678D". A 128-bit NAA iSCSI name uses 32 ASCII hexadecimal characters, e.g., "naa.62004567BA64678D0123456789ABCDEF". Maximum name length is 32 hex characters (128-bit NAA), well within the iSCSI node name size limit.
section: "4.1"
topics:
