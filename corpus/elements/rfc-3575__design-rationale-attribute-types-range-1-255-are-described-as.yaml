document: rfc-3575
kind: design-rationale
summary: Attribute Types (range 1-255) are described as the scarcest resource in RADIUS and must be allocated with care. Vendor-Specific extensions (Attribute 26) should be used for vendor-specific functions rather than consuming global attribute type space.
