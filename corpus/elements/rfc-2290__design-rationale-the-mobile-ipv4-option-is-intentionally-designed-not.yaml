document: rfc-2290
kind: design-rationale
summary: The Mobile-IPv4 option is intentionally designed not to duplicate any functionality of the IP-Address option; the two options work in conjunction, with Mobile-IPv4 carrying the permanent home address and IP-Address carrying any dynamically assigned care-of address.
section: "1.4"
