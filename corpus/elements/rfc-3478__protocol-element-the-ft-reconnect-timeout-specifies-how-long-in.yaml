document: rfc-3478
kind: protocol-element
summary: The FT Reconnect Timeout specifies how long (in ms) the receiver of the TLV should wait after detecting LDP communication failure before discarding preserved MPLS forwarding state for LSPs traversing the link. A value of 0 means the sender will not preserve forwarding state but still supports Section 3.3 procedures.
section: "2"
topics:
    - mpls
    - routing
