document: rfc-9989
kind: normative-requirement
summary: When delivering messages that fail DMARC validation, Mail Receivers SHOULD add the Authentication-Results header field (RFC 8601). When deviating from a published Domain Owner Assessment Policy, Mail Receivers SHOULD report the fact and reason via the 'PolicyOverride' feature of the aggregate report.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - email
