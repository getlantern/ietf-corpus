document: rfc-7846
kind: normative-requirement
summary: The version of PPSTP being used MUST be indicated by the 'version' attribute in both requests and responses. The only defined value is 1 (PPSTP version 1); value 0 is reserved.
section: 3.2.1
rfc2119_level: MUST
