document: rfc-6353
kind: protocol-element
summary: The tmStateReference cache holds per-session state including tmTransportDomain, tmTransportAddress, tmSecurityLevel, tmSecurityName, and tmSessionID. It is used to translate between (D)TLS-specific security parameters and SNMP model-independent parameters passed between the Transport Subsystem and security models.
section: 4.4.1
topics:
