document: rfc-9640
kind: normative-requirement
summary: The 'generate-csr' action SHOULD only be executed by authorized users; NACM 'default-deny-all' is applied to it. It is RECOMMENDED that implementations assert channel binding (RFC 5056) to ensure the requesting application layer matches the device authenticated at the secure transport layer.
section: "3.8"
rfc2119_level: SHOULD
topics:
    - yang
    - crypto
    - security
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
