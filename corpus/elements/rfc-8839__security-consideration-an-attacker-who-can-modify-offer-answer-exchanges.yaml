document: rfc-8839
kind: security-consideration
summary: An attacker who can modify offer/answer exchanges can direct media to a DoS target or insert themselves into a data stream. TLS transport for SIP signaling is RECOMMENDED to protect offer/answer integrity and confidentiality.
section: "9.2"
rfc2119_level: RECOMMENDED
