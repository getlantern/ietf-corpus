document: rfc-5531
kind: wire-format
summary: 'The Record Marking (RM) header for stream transports is a 4-byte big-endian value: the high-order bit is a boolean indicating the last fragment, and the remaining 31 bits encode the fragment data length in bytes (0 to 2^31-1). This encoding is NOT XDR standard form.'
