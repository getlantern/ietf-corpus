document: rfc-3332
kind: security-consideration
summary: M3UA operating over IP is exposed to threats not present in traditional SS7 physical networks, including masquerade of legitimate signalling nodes, replay of signalling messages, and interception of SS7 user data. Unauthorized access to M3UA signalling can enable fraud, eavesdropping, and denial of service to PSTN services.
section: "6.2"
topics:
    - security
    - realtime
