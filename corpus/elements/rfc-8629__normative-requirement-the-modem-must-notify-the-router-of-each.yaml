document: rfc-8629
kind: normative-requirement
summary: The modem MUST notify the router of each destination that is not identified in the Link Characteristics Response Message and is no longer reachable via a Destination Down Message, and MUST notify via Destination Update Message for each impacted destination.
section: "3.2"
rfc2119_level: MUST
