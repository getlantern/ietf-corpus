kind: protocol-element
summary: 'Six algorithm variants are defined: three authentication/integrity algorithms (HMAC-SHA-256-128, HMAC-SHA-384-192, HMAC-SHA-512-256) with fixed keys equal to output length and truncated output, and three PRF variants (PRF-HMAC-SHA-256, PRF-HMAC-SHA-384, PRF-HMAC-SHA-512) with variable-length keys and no truncation.'
