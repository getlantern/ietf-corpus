document: rfc-5120
kind: security-consideration
summary: IS-IS authentication (e.g., RFC 3567 cryptographic authentication) SHOULD be applied if there is high risk from modification of multi-topology information. The authentication procedure for IS-IS PDUs is the same regardless of MT information.
