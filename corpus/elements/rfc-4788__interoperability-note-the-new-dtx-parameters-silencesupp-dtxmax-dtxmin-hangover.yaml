document: rfc-4788
kind: interoperability-note
summary: The new DTX parameters (silencesupp, dtxmax, dtxmin, hangover) are receiver options added to the existing EVRC and EVRC0 subtypes. Existing RFC 3558 implementations will not send these parameters and will ignore them on receipt; the adaptive DTX behavior of DTX-capable EVRC codecs ensures backward interoperability with non-DTX implementations.
section: "7"
topics:
