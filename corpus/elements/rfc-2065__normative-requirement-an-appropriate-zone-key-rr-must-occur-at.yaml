document: rfc-2065
kind: normative-requirement
summary: An appropriate zone KEY RR MUST occur at the apex node of a secure zone and at every delegation point within a secure zone. Security aware DNS implementations MUST be designed to handle at least two simultaneously valid keys of the same type associated with a name.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
