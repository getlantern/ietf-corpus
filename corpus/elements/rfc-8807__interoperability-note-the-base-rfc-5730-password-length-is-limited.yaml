document: rfc-8807
kind: interoperability-note
summary: The base RFC 5730 password length is limited to 16 characters. This extension overrides it by using the "[LOGIN-SECURITY]" sentinel in the base <pw>/<newPW> fields, enabling passwords of arbitrary length (minimum 6 characters, maximum per server policy) via <loginSec:pw> and <loginSec:newPW>.
section: "3.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
