document: rfc-8147
kind: protocol-element
summary: The <capabilities> element is sent by the IVS to the PSAP (e.g., in the initial INVITE) to advertise supported actions. It contains one <request> child per supported action. If absent, the PSAP assumes the IVS supports only 'send-data' with 'datatype=eCall.MSD'.
section: 9.1.2
topics:
    - sip
