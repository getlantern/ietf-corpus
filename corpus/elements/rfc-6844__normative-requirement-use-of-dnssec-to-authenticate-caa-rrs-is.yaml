document: rfc-6844
kind: normative-requirement
summary: Use of DNSSEC to authenticate CAA RRs is strongly RECOMMENDED but not required. An issuer MUST NOT issue certificates if doing so would conflict with the relevant CAA RRset, irrespective of whether the DNS records are signed.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
