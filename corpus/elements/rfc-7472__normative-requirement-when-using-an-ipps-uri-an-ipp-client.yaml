document: rfc-7472
kind: normative-requirement
summary: 'When using an ''ipps'' URI, an IPP Client MUST establish a connection by: selecting the URI, converting it to an ''https'' URI (replacing ''ipps'' with ''https'' and inserting port 631 if not specified), establishing an HTTPS secure session, and sending requests using the POST method.'
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - http
