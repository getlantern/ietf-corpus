document: rfc-7733
kind: design-rationale
summary: P2P-RPL is required instead of plain RPL for peer-to-peer traffic because RPL's DAG tree structure routes cross-branch P2P traffic up to the root and back down, causing traffic concentration, excessive battery drain, and route repair delays incompatible with the 250 ms response requirement.
section: Appendix A
topics:
    - routing
