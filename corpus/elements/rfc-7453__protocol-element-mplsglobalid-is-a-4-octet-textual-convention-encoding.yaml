document: rfc-7453
kind: protocol-element
summary: MplsGlobalId is a 4-octet TEXTUAL-CONVENTION encoding the operator's Autonomous System Number (2-octet or 4-octet ASN). When derived from a 2-octet ASN, the two high-order octets MUST be zero. ASN 0 is reserved. A zero-length string indicates an invalid Global_ID.
section: "10"
topics:
