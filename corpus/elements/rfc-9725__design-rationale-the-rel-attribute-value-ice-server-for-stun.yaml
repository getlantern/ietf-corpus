document: rfc-9725
kind: design-rationale
summary: The 'rel' attribute value 'ice-server' for STUN/TURN Link headers is intentionally not prefixed with 'urn:ietf:params:whip:' so it can be reused by other specifications that need to configure STUN/TURN servers, making the mechanism more broadly applicable.
section: "4.6"
topics:
