document: rfc-4271
kind: security-consideration
summary: BGP speakers should apply input filtering (policy) to routes received from peers to prevent acceptance of bogus routes such as prefixes not owned by the peer's AS. Absence of such filtering enables route hijacking and mis-origination attacks.
section: Security Considerations
topics:
    - bgp
    - routing
    - security
