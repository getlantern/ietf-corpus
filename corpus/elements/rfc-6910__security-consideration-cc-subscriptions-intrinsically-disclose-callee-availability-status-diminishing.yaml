document: rfc-6910
kind: security-consideration
summary: CC subscriptions intrinsically disclose callee availability status, diminishing callee privacy. Callee's monitors should limit per-caller and total disclosure, enforce that subscriptions are initiated only shortly after failed calls, and detect patterns (long suspension, frequent subscription) as possible privacy attacks.
section: "11"
topics:
    - sip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
