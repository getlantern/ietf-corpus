document: rfc-7230
kind: interoperability-note
summary: The Set-Cookie header field violates the prohibition on multiple header fields with the same field name because it appears multiple times without using list syntax; recipients should handle Set-Cookie as a special case that cannot be combined into a single field-value.
section: 3.2.2
topics:
    - http
