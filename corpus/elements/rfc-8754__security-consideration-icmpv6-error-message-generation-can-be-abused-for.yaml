document: rfc-8754
kind: security-consideration
summary: ICMPv6 error message generation can be abused for denial-of-service attacks via back-to-back error-causing packets. Implementations must follow RFC 4443 Section 2.4 ICMPv6 rate-limiting to mitigate this.
section: "7.4"
topics:
    - ip
    - routing
    - security
