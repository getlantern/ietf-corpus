document: rfc-9820
kind: normative-requirement
summary: The link between EAP peer and EAP authenticator MUST only authorize unprotected IP traffic during CoAP-EAP authentication. Once authentication succeeds, traffic MUST be protected using the derived MSK before it is authorized.
section: "8.3"
rfc2119_level: MUST
topics:
    - security
