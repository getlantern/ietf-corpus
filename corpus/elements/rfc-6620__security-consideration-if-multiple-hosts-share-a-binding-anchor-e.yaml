document: rfc-6620
kind: security-consideration
summary: If multiple hosts share a binding anchor (e.g., all are behind a legacy non-SAVI switch on a single Validating Port), they can spoof each other's IP addresses without detection. This residual threat is inherent when binding anchors are shared; it can be avoided by not sharing anchors.
section: "4.2"
topics:
    - ip
    - security
