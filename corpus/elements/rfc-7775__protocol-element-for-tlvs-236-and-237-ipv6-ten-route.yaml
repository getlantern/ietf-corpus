document: rfc-7775
kind: protocol-element
summary: For TLVs 236 and 237 (IPv6), ten route types are defined, adding an 'external bit' field not present in IPv4 TLVs. L1->L2 external routes (up/down=0, external=1, R-Flag=1) and L2->L1 external routes (up/down=1, external=1, R-Flag=1) are additional types specific to IPv6.
section: "3.2"
topics:
    - routing
    - ip
    - v6ops
