document: rfc-6015
kind: normative-requirement
summary: In congestion-prone networks, applications MUST NOT arbitrarily increase the amount of FEC protection, as doing so may lead to congestion collapse. Stronger FEC protection MAY be applied only after the source rate has been reduced.
section: "8"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - congestion
