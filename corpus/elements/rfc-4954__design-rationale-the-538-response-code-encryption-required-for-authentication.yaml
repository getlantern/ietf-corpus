document: rfc-4954
kind: design-rationale
summary: The 538 response code (encryption required for authentication mechanism) is deprecated. Modern implementations SHOULD NOT advertise mechanisms that are not permitted due to lack of encryption; instead, they should only advertise mechanisms when a sufficient encryption layer is already in place.
