document: rfc-6946
kind: normative-requirement
summary: If fragments with the same {IPv6 Source Address, IPv6 Destination Address, Fragment Identification} are present in the reassembly queue when an atomic fragment arrives, those fragments MUST NOT be discarded. IPv6 atomic fragments MUST NOT interfere with normal fragmented traffic.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
