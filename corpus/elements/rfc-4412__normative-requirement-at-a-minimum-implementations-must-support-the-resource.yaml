document: rfc-4412
kind: normative-requirement
summary: At a minimum, implementations MUST support the Resource-Priority header in INVITE, ACK, PRACK, UPDATE, and REFER requests to be compliant with this specification. Support for MESSAGE, SUBSCRIBE, and NOTIFY is SHOULD.
