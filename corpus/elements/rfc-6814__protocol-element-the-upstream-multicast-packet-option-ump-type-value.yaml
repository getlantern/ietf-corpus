document: rfc-6814
kind: protocol-element
summary: The Upstream Multicast Packet option (UMP, type value 152, copy=1, class=0, number=24) is deprecated. Its use was deprecated by RFC 5015, which employs a control-plane mechanism for upstream forwarding of multicast packets on multi-access LANs.
