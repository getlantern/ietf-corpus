document: rfc-7796
kind: normative-requirement
summary: 'If a PE is in VLAN Mapping Mode for a PW, it MUST map the VLAN in each frame: upon transmit, map local VLAN to the remote VLAN; upon receive, map the remote VLAN to the local VLAN before forwarding or dropping in the egress bridge module.'
section: 5.3.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
