document: rfc-7490
kind: normative-requirement
summary: The repair tunnel MUST NOT be used for normal traffic; it is only activated upon detection of a link failure. OAM traffic used to verify the viability of the repair MAY traverse the tunnel prior to a failure.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
