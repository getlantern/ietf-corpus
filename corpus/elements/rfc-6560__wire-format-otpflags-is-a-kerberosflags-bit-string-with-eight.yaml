document: rfc-6560
kind: wire-format
summary: 'OTPFlags is a KerberosFlags bit string with eight defined bits: reserved(0), nextOTP(1), combine(2), collect-pin(3), do-not-collect-pin(4), must-encrypt-nonce(5), separate-pin-required(6), check-digit(7). These flags appear in both PA-OTP-CHALLENGE/OTP-TOKENINFO and PA-OTP-REQUEST.'
