document: rfc-7055
kind: wire-format
summary: The GSS Channel Bindings subtoken (type 0x80000006, always critical when present) carries an RFC 3961 get_mic token over the application data from the GSS channel bindings structure, using the CRK with key usage 60 (KEY_USAGE_GSSEAP_CHBIND_MIC). Only application data is sent; initiator/acceptor addresses are ignored.
section: 5.6.2
topics:
    - security
    - crypto
