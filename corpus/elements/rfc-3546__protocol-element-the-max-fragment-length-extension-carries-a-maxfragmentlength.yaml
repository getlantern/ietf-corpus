document: rfc-3546
kind: protocol-element
summary: The max_fragment_length extension carries a MaxFragmentLength enum with allowed values 2^9(1), 2^10(2), 2^11(3), 2^12(4). The server must echo the same value to confirm. The negotiated limit applies to TLSPlaintext.length for the full session including resumptions.
