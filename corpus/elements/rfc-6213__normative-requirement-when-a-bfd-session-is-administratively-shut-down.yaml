document: rfc-6213
kind: normative-requirement
summary: When a BFD session is administratively shut down and the state change impacts ISIS_NEIGHBOR_USEABLE, IS-IS SHOULD allow time for the MTID/NLPID to be removed from the neighbor's BFD TLV by not updating the adjacency hold time until ISIS_BFD_REQUIRED becomes FALSE.
section: "4"
rfc2119_level: SHOULD
topics:
    - routing
