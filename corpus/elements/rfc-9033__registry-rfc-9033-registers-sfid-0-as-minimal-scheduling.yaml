summary: RFC 9033 registers SFID=0 as 'Minimal Scheduling Function (MSF)' in the '6P Scheduling Function Identifiers' subregistry of the 'IPv6 Over the TSCH Mode of IEEE 802.15.4 (6TiSCH)' registry. The value was chosen from the 0–127 range requiring IETF Review or IESG Approval.
