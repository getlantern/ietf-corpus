summary: The IR-DYN packet carries only the dynamic chain. Its type octet is 0xF8 (11111000 binary), followed by 0-2 CID octets, a 1-octet Profile=0x06, a 1-octet 8-bit CRC covering the entire IR-DYN header, a variable-length dynamic chain, and optional payload.
