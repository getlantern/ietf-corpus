document: rfc-9747
kind: interoperability-note
summary: Standard procedures for BFD Asynchronous sessions, including packet validation and authentication per RFC 5880, are applied to the looped BFD Control packets in Unaffiliated BFD Echo. However, AdminDown state is not utilized because there is no remote BFD peer to coordinate with.
section: "2"
topics:
