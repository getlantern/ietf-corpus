document: rfc-6857
kind: normative-requirement
summary: For address header fields (From, Sender, To, Cc, Bcc, Reply-To, Return-Path, Disposition-Notification-To, and Resent-* variants), downgrading must first apply Comment and Display-Name downgrading, then Group downgrading for non-ASCII group addresses, then Mailbox downgrading for non-ASCII mailbox addresses.
section: 3.2.1
rfc2119_level: REQUIRED
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
