document: rfc-6145
kind: design-rationale
summary: The IPv6 Flow Label is set to zero during IPv4-to-IPv6 translation because there is no corresponding field in IPv4 from which to derive a meaningful value; the stateless algorithmic nature of SIIT does not maintain per-flow state needed to generate consistent flow labels.
