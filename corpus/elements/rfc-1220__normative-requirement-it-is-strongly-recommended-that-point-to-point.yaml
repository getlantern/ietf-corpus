document: rfc-1220
kind: normative-requirement
summary: It is strongly recommended that Point-to-Point Bridge Protocol implementations utilize Magic Number Loopback Detection and Link-Quality-Monitoring, because the 802.1 Spanning Tree protocol is unidirectional during normal operation and reverse traffic only occurs in response to network events.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
