document: rfc-3843
kind: wire-format
summary: 'The IPv4 dynamic header part adds a SID (Static IP Identifier) flag in a flag byte alongside the existing DF, RND, and NBO flags. The dynamic part contains: Type of Service (1 octet), Time to Live (1 octet), Identification (2 octets), a flags byte with DF/RND/NBO/SID fields, and a variable-length generic extension header list.'
section: "3.3"
topics:
