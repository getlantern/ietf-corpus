document: rfc-8214
kind: normative-requirement
summary: Unlike RFC 7432, EVPN-VPWS uses Ethernet A-D route advertisements for single-homed Ethernet Segments; upon a link/port failure of a single-homed ES, the PE MUST withdraw the associated per-EVI Ethernet A-D routes.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - bgp
