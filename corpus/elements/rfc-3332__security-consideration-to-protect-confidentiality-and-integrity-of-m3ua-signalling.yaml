document: rfc-3332
kind: security-consideration
summary: To protect confidentiality and integrity of M3UA signalling, use of network-layer (IPsec) or transport-layer security is recommended. SCTP provides inherent resistance to flooding and masquerade attacks but does not itself provide confidentiality of user data.
section: "6.3"
topics:
