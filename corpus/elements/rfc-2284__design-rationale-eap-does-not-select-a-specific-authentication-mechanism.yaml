document: rfc-2284
kind: design-rationale
summary: EAP does not select a specific authentication mechanism at Link Control Phase but postpones this until the Authentication Phase. This allows the authenticator to request more information before determining the specific mechanism, and permits a back-end server to implement various mechanisms while the PPP authenticator acts as a passthrough.
section: "2"
topics:
    - security
