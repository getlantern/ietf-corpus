document: rfc-3977
kind: normative-requirement
summary: Following a 400 connection-termination response, clients SHOULD NOT reconnect and retry immediately. Instead they SHOULD use an exponentially increasing delay between retries or present the associated text to the user to decide whether and when to retry.
section: 3.2.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
