document: rfc-9127
kind: protocol-element
summary: 'Four YANG features gate optional BFD capabilities: ''single-minimum-interval'' (one interval value for both tx and rx), ''authentication'' (BFD authentication per RFC 5880 Section 6.7), ''demand-mode'' (BFD Demand mode per RFC 5880 Section 6.6), and ''echo-mode'' (BFD Echo mode per RFC 5880 Section 6.4).'
section: "2.12"
