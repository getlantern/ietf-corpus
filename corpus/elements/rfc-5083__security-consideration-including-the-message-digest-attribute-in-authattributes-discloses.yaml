document: rfc-5083
kind: security-consideration
summary: Including the message-digest attribute in AuthAttributes discloses the unencrypted hash of the plaintext, enabling content tracking and allowing an attacker to check if the plaintext matches candidate contents. It SHOULD NOT be included for this reason.
section: "3"
topics:
    - crypto
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
