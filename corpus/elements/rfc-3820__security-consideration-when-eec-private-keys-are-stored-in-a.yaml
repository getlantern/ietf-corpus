document: rfc-3820
kind: security-consideration
summary: When EEC private keys are stored in a central repository, compromise of the repository exposes all long-term private keys, potentially allowing an attacker to sign arbitrary Proxy Certificates. Use of hardware security modules is strongly recommended to store long-term private keys in such deployments.
section: "6.5"
topics:
    - pkix
    - security
