document: rfc-7264
kind: design-rationale
summary: RPR was introduced because it provides a shorter response route than SRR in many scenarios, reducing CPU and link bandwidth load on intermediate peers. It is most effective in managed or closed networks where relay peers are provisioned in advance and are publicly reachable.
