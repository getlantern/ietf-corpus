document: rfc-4236
kind: normative-requirement
summary: An OPES processor MUST NOT send parts not listed as 'original' in the negotiated profile, and a callout server MUST NOT send parts not listed as 'adapted'. An OCP agent receiving an unlisted part MUST terminate the transaction with an error.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
    - http
