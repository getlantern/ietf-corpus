document: rfc-7678
kind: normative-requirement
summary: Within the 64-Multicast-Attributes AVP, the Delegated-IPv6-Prefix AVP used as uPrefix64 MUST have a Prefix-Length value of one of 32, 48, 56, 64, or 96, per RFC 6052 address mapping guidelines.
