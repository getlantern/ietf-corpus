document: rfc-2110
kind: protocol-element
summary: Content-Location is a MIME content header specifying the URI corresponding to the body part content in whose heading it appears. Its value can be an absolute or relative URI. It may indicate that the body part data is also retrievable at that URI, making the message content a cached version of the original.
section: "4.3"
topics:
    - email
    - http
