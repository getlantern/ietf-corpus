document: rfc-3820
kind: interoperability-note
summary: Proxy Certificates require no protocol changes to SSL/TLS for authentication; only minor changes to path validation are needed (PC-aware validation and EEC subject name retrieval for authorization). Existing identity-based authorization systems that use X.509 subject names can use PCs without modification, since a PC inherits its name from the issuing EEC.
section: "2.7"
topics:
    - pkix
    - tls
    - security
