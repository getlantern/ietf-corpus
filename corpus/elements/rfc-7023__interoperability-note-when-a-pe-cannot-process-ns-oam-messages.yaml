document: rfc-7023
kind: interoperability-note
summary: When a PE cannot process NS OAM messages received on the PW (even when such messages are defined for Ethernet), fault notification mapping between the PW domain and the NS domain is required. This justifies maintaining both PW OAM and NS OAM notification paths in parallel.
section: "2"
topics:
