document: rfc-3124
kind: protocol-element
summary: cm_getmacroflow(i32 cm_streamid) returns the macroflow identifier for a stream. cm_setmacroflow(i32 cm_macroflowid, i32 cm_streamid) assigns a stream to a macroflow; passing -1 as cm_macroflowid creates a new macroflow. Each call overrides any prior macroflow association.
section: "3.5"
topics:
    - congestion
