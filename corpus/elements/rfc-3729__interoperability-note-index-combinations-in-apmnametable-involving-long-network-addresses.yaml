document: rfc-3729
kind: interoperability-note
summary: Index combinations in apmNameTable involving long network addresses can exceed SNMP's maximum index length of 128 sub-identifiers. Implementations must take care to avoid such combinations when constructing the compound index of ClientID, protocolDirLocalIndex, ClientAddress, and MappingStartTime.
section: "3"
topics:
    - snmp
