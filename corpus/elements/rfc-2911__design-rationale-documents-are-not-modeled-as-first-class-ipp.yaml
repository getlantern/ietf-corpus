document: rfc-2911
kind: design-rationale
summary: 'Documents are not modeled as first-class IPP objects in IPP/1.1: they have no object identifier or associated attributes. All job processing instructions are modeled as Job Template attributes that apply equally to all documents in a Job, intentionally simplifying the model at the cost of per-document control.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
