document: rfc-6121
kind: normative-requirement
summary: A client MUST ignore a roster push unless it arrives with no 'from' attribute (implicitly from the user's bare JID) or a 'from' matching the user's bare JID; if received from an unauthorized entity, the client MUST NOT process the pushed data.
section: 2.1.6
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
