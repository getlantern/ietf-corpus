document: rfc-5654
kind: protocol-element
summary: An MPLS-TP ring topology is a set of LSRs where each is connected to exactly two others via single point-to-point bidirectional MPLS-TP links. Physical rings use physical links; logical rings use logical data links such as MPLS-TP LSP tunnels or pseudowires.
section: 1.2.2
topics:
