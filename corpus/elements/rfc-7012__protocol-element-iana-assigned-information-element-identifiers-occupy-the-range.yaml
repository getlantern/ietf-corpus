document: rfc-7012
kind: protocol-element
summary: IANA-assigned Information Element identifiers occupy the range 1–32767. Identifiers 1–127 are reserved for NetFlow version 9 compatibility. IANA assigns newly registered IEs the lowest available identifier in the range 128–32767.
