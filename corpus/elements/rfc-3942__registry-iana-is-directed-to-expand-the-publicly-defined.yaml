document: rfc-3942
kind: registry
summary: IANA is directed to expand the publicly defined DHCPv4 options space from 1-127 to 1-223. Options 128-223 are reclassified from site-specific to publicly defined and managed under the RFC 2939 assignment process. The remaining site-specific range is reduced to options 224-254 (31 options).
