document: rfc-5651
kind: normative-requirement
summary: Before joining an LCT session, a receiver MUST obtain a session description that includes the sender IP address, number and addresses of LCT channels, TSI, and enough information to determine the congestion control and packet authentication schemes in use.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
