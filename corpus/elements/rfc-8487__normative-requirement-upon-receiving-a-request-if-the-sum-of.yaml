document: rfc-8487
kind: normative-requirement
summary: 'Upon receiving a Request, if the sum of Standard Response Blocks already in the packet plus any Augmented Response Type 0x01 value is equal to or exceeds the # Hops field, the router MUST silently ignore the message.'
