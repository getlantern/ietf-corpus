document: rfc-3591
kind: wire-format
summary: 'OptIfBitRateK is encoded as an Integer32 with allowed values 1 (≈2.5 Gbit/s), 2 (≈10 Gbit/s), and 3 (≈40 Gbit/s) per ITU-T G.709. In optIfOTMnBitRates, supported rates are encoded as a BITS map: bitRateK1(0), bitRateK2(1), bitRateK3(2).'
