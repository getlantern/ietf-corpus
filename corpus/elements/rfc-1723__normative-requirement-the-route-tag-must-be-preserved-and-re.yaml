document: rfc-1723
kind: normative-requirement
summary: The Route Tag must be preserved and re-advertised with a route. Routers supporting protocols other than RIP should be configurable to set the Route Tag for routes imported from different sources (e.g., to the Autonomous System number from BGP/EGP).
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
