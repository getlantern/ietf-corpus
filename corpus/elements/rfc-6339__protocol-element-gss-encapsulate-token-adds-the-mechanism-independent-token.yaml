document: rfc-6339
kind: protocol-element
summary: GSS_Encapsulate_token() adds the mechanism-independent token header (ASN.1 tags, length, and mechanism OID) to GSS-API context token data, returning the encapsulated token or GSS_S_FAILURE on error. The caller must release the output buffer with GSS_Release_buffer().
section: "3"
topics:
