document: rfc-8655
kind: protocol-element
summary: 'DetNet defines four flow types based on end-system awareness: App-flow (no DetNet attributes, for unaware end systems), DetNet-f-flow (requires forwarding sub-layer only), DetNet-s-flow (requires service sub-layer only), and DetNet-sf-flow (requires both sub-layers). These types have different requirements on DetNet nodes.'
section: 4.3.1
topics:
