document: rfc-6211
kind: normative-requirement
summary: When comparing algorithm identifiers during verification, a field with a default value MUST compare as identical regardless of whether the value is defaulted or explicitly provided; a binary byte comparison of encodings is insufficient for this purpose.
section: "3"
rfc2119_level: MUST
