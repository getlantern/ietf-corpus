document: rfc-8750
kind: normative-requirement
summary: The sender's and receiver's counters MUST be reset (by establishing a new SA and thus a new key) prior to transmission of the 2^32nd packet for an SA without Extended Sequence Numbers, and prior to the 2^64th packet for an SA using Extended Sequence Numbers.
section: "7"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
