document: rfc-6364
kind: registry
summary: 'This document registers three new SDP media-level attributes: ''fec-source-flow'' (parameters for a FEC source flow), ''fec-repair-flow'' (parameters for a FEC repair flow), and ''repair-window'' (size of the FEC repair window). All are not subject to charset and reference RFC 6364.'
