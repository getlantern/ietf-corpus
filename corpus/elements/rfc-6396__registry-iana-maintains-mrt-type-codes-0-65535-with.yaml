summary: 'IANA maintains MRT Type Codes (0-65535) with the following allocation policy: 0-64 reserved; 65-511 assigned by IETF Review; 512-2047 by Specification Required; 2048-64511 by First Come First Served; 64512-65534 for Experimental Use; 65535 reserved. New Type Codes MUST be allocated starting at 65.'
