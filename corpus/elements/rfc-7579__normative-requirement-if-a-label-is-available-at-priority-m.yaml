document: rfc-7579
kind: normative-requirement
summary: If a label is available at priority M, it MUST be advertised as available at each priority N < M (higher-priority levels). Once used by an LSP at priority N, the label is re-advertised as available only for priorities 0 through N-1.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
