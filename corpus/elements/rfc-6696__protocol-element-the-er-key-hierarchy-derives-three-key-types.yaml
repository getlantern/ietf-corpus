document: rfc-6696
kind: protocol-element
summary: 'The ER key hierarchy derives three key types from the EMSK or DSRK: the re-authentication Root Key (rRK) serves as the root; the re-authentication Integrity Key (rIK) is derived from the rRK for per-exchange message integrity; and per-authenticator re-authentication MSKs (rMSKs) are derived from the rRK using the sequence number, ensuring a fresh key per exchange.'
section: "4"
