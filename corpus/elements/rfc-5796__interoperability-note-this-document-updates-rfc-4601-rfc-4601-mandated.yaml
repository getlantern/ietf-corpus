document: rfc-5796
kind: interoperability-note
summary: This document updates RFC 4601. RFC 4601 mandated IPsec authentication based primarily on AH; this document redefines the security requirements to make ESP mandatory and AH optional, and introduces the structured manual rekeying procedure not present in RFC 4601.
section: "1"
topics:
    - routing
    - multicast
    - ipsec
