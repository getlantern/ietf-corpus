document: rfc-3868
kind: wire-format
summary: 'SUA parameters use a Tag-Length-Value (TLV) format: Parameter Tag (16-bit unsigned integer, 0–65535), Parameter Length (16-bit unsigned integer, includes Tag+Length+Value but excludes padding), and variable-length Parameter Value. Total parameter length MUST be a multiple of 4 bytes; padding bytes are zero-filled and NOT counted in the Length field.'
section: 3.1.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
