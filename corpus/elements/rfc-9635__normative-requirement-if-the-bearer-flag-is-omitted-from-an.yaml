document: rfc-9635
kind: normative-requirement
summary: If the bearer flag is omitted from an access token request, the resulting access token is bound to the key used by the client instance in the request (or that key's most recent rotation), and the token MUST be presented using the same key and proofing method.
section: 2.1.1
rfc2119_level: MUST
topics:
    - oauth
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
