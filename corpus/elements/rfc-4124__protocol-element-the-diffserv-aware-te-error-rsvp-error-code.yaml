document: rfc-4124
kind: protocol-element
summary: 'The ''Diffserv-aware TE Error'' RSVP error code (value 28) is defined with 8 error values: 1=Unexpected CLASSTYPE object, 2=Unsupported Class-Type, 3=Invalid Class-Type value, 4=CT and setup priority do not form a configured TE-Class, 5=CT and holding priority do not form a configured TE-Class, 6=both setup and holding priority mismatch, 7=Inconsistent PSC and CT, 8=Inconsistent PHBs and CT.'
section: "6.5"
