document: rfc-3865
kind: normative-requirement
summary: Implementations SHOULD NOT enable specific solicitation class keywords as a default, nor should system administrators enable per-recipient filtering by default. Individual users should explicitly request any filtering. This guards against the extension being characterized as a prior restraint on commercial speech.
section: "2.8"
rfc2119_level: SHOULD NOT
topics:
    - email
