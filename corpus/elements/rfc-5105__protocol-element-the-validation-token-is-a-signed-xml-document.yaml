document: rfc-5105
kind: protocol-element
summary: The Validation Token is a signed XML document conveying that a Validation Entity (VE) has verified the Registrant of an ENUM domain name is identical to the Assignee of the corresponding E.164 number. It is the sole artifact passed from the VE to the Registry to authorize ENUM domain delegation.
section: "1"
topics:
