document: rfc-5027
kind: security-consideration
summary: Where SIP intermediaries on the signaling path are not fully trusted, end-to-end integrity protection of signaling (e.g., S/MIME) MUST be used and MUST cover both the message body (containing security preconditions) and the SIP "Supported" and "Require" headers (containing the "precondition" option tag).
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
    - crypto
