document: rfc-8817
kind: normative-requirement
summary: 'In the Offer/Answer model, ''bitrate'' is bidirectional: both sides MUST use a common value. The initial bitrate SHALL be the first bitrate specified in the answerer''s response; any other common bitrate from the offer/answer exchange MAY be used at any future time.'
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
