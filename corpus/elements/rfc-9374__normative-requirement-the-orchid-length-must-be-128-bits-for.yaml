document: rfc-9374
kind: normative-requirement
summary: The ORCHID length MUST be 128 bits. For HHITs with a 28-bit prefix, 8-bit OGA ID, and 28-bit HID, this leaves 64 bits for the hash; 64 bits is considered the minimum acceptable hash size given pre-image attack risks.
section: 3.5.1
rfc2119_level: MUST
topics:
    - crypto
    - security
