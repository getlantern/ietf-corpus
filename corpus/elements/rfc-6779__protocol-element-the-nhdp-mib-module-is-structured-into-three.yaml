summary: 'The NHDP-MIB module is structured into three object groups: nhdpConfigurationObjGrp (per-interface and router-wide parameters mirroring RFC 6130 configuration), nhdpStateObjGrp (information bases corresponding to RFC 6130 Sections 6–8), and performance group tables tracking counters per interface, discovered interface, neighbor router, and 2-hop neighbor.'
