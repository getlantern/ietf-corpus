document: rfc-7178
kind: registry
summary: IANA created the RBridge Channel Error Codes sub-registry with values 0 (no error) through 5 (Channel Protocol reserved/unimplemented), 6-14 unassigned, 15 reserved. Allocation requires Standards Action. IANA also allocated TRILL Nickname Any-RBridge = 0xFFC0 and multicast addresses TRILL-End-Stations (01-80-C2-00-00-45) and All-Edge-RBridges (01-80-C2-00-00-46).
section: "7.1"
