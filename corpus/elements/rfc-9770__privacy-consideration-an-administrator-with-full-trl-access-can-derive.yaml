document: rfc-9770
kind: privacy-consideration
summary: An administrator with full TRL access can derive additional information by correlating token hashes with other AS data, such as determining that accesses have been revoked for specific registered devices. Operator policies should limit administrator access to the minimum necessary.
section: "1.1"
topics:
    - privacy
    - security
