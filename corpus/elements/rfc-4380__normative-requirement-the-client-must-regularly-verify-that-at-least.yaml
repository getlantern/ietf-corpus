document: rfc-4380
kind: normative-requirement
summary: The client MUST regularly verify that at least one packet has been received from the Teredo server within the Randomized Teredo Refresh Interval (75%–100% of the refresh interval, default 30 seconds); if not, it SHOULD send a Router Solicitation to refresh the NAT mapping.
section: 5.2.5
rfc2119_level: MUST
topics:
