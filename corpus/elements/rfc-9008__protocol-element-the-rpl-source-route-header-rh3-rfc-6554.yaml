document: rfc-9008
kind: protocol-element
summary: The RPL Source Route Header (RH3, RFC 6554) is an IPv6 Routing Header used exclusively in Non-Storing mode to carry the full downward path from root to destination. Intermediate 6LRs decrement Segments Left; the header is consumed (Segments Left = 0) at the last hop but left in place for the destination.
section: "1"
topics:
