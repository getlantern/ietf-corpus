document: rfc-8703
kind: normative-requirement
summary: Link Identifier Data Items referring to a new link MUST first appear in a DLEP Destination Up Message from the modem to the router. A router MUST NOT send a Destination Announce Message with a Link Identifier referring to a link not previously announced by the modem.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
