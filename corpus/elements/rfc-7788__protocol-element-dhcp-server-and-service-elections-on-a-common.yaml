document: rfc-7788
kind: protocol-element
summary: 'DHCP server and service elections on a Common Link are capability-based: the router with the greatest H-capability wins for stateful DHCPv6, greatest P-capability for DHCPv6-PD, greatest L-capability for DHCPv4, and greatest M-capability for mDNS proxy. Ties are broken by Capability Value, then by greatest node identifier.'
section: "7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
