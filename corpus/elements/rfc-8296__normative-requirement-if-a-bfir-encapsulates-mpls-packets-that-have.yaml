document: rfc-8296
kind: normative-requirement
summary: If a BFIR encapsulates MPLS packets that have entropy labels, it MUST ensure that two packets with the same MPLS entropy label also have the same value in the BIER entropy field.
section: 2.1.2
rfc2119_level: MUST
topics:
