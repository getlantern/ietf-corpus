document: rfc-2879
kind: normative-requirement
summary: A color-handling receiver SHOULD indicate any appropriate device color space capability in addition to any calibrated color spaces it supports. A calibrated color space SHOULD be used when precise color matching is required and the receiving system is not specifically known.
section: "3.6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
