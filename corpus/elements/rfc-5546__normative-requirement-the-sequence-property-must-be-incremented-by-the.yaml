document: rfc-5546
kind: normative-requirement
summary: 'The SEQUENCE property MUST be incremented by the Organizer whenever any of the following properties change: DTSTART, DTEND, DURATION, DUE, RRULE, RDATE, EXDATE, or STATUS. Changes to other properties MAY also require incrementing if they would jeopardize the validity of Attendee participation status.'
section: 2.1.4
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
