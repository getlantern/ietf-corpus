document: rfc-6917
kind: protocol-element
summary: The <mrbnotification> element is sent by a Media Server to an MRB to report current status. It carries mandatory 'id' (matching the subscription session) and 'seqnumber' (independently increasing per-notification counter). Key child elements include <media-server-id>, <media-server-status>, <active-rtp-sessions>, <non-active-rtp-sessions>, <supported-codecs>, and <supported-packages>.
section: 5.1.5
topics:
