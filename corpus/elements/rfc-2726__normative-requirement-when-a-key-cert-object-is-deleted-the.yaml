document: rfc-2726
kind: normative-requirement
summary: When a key-cert object is deleted, the corresponding public key is also deleted from the local keyring. When modified, the old key is removed and the new certificate's key is added, but only after the update is authorized.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
