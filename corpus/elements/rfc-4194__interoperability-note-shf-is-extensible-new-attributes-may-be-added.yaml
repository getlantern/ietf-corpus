document: rfc-4194
kind: interoperability-note
summary: 'SHF is extensible: new attributes may be added to Dump or Block elements without invalidating the Dump. Parsers unaware of extended attributes SHALL silently ignore them or pass them through unchanged. Removing or redefining existing attributes is not permitted under this extension model.'
section: "10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
