document: rfc-6505
kind: protocol-element
summary: 'The <volume> element configures audio stream volume: ''controltype'' selects "automatic" (auto-level to target), "setgain" (fixed dB offset), or "setstate" (mute/unmute). Setting gain or automatic control on a muted stream implicitly unmutes it.'
section: 4.2.2.5.1
topics:
