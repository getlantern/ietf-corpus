document: rfc-3986
kind: security-consideration
summary: Maliciously constructed URIs may contain misleading components such as userinfo crafted to appear like a trusted authority (e.g., "http://trusted.example.com@attacker.example.com/"). Applications rendering URIs for user feedback should distinguish userinfo visually from the host to counter such semantic attacks.
section: "7.6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
