document: rfc-7024
kind: interoperability-note
summary: The multicast procedures assume all PEs can discard packets from a 'wrong' PE per RFC 6513 Section 9.1.1. Existing S-PMSI/I-PMSI procedures suffice for all P-tunnel types except Ingress Replication on I-PMSI, for which Section 7.9 adds new label-based demultiplexing procedures.
section: "7"
topics:
