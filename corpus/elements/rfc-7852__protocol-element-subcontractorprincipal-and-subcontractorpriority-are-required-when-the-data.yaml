document: rfc-7852
kind: protocol-element
summary: <SubcontractorPrincipal> and <SubcontractorPriority> are required when the data provider is a subcontractor. <SubcontractorPriority> MUST be 'sub' if the subcontractor is to be contacted first, or 'main' if the principal should be contacted first.
section: 4.1.8
