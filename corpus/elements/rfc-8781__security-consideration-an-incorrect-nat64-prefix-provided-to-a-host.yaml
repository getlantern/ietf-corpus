document: rfc-8781
kind: security-consideration
summary: An incorrect NAT64 prefix provided to a host can prevent communication with IPv4-only destinations. If attackers can send rogue RAs, they can perform denial-of-service or man-in-the-middle attacks as described in RFC 6104; RA-Guard (RFC 6105) MUST already be deployed to secure all RA-delivered configuration.
section: "7"
topics:
    - security
    - ip
    - nat
    - v6ops
