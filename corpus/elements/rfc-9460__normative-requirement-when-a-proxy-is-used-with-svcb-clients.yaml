document: rfc-9460
kind: normative-requirement
summary: When a proxy is used with SVCB, clients MUST provide the final TargetName and port to the proxy; the proxy performs any required A/AAAA lookups. Clients SHOULD follow standard SVCB resolution to select the smallest-SvcPriority compatible option.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
