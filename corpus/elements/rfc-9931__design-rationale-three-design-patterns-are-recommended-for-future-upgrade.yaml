document: rfc-9931
kind: design-rationale
summary: 'Three design patterns are recommended for future upgrade tokens to reduce or eliminate optimistic-transition security issues: (1) forbid optimistic use of HTTP Upgrade entirely, (2) embed a fixed preamble that deliberately terminates HTTP/1.1 processing, or (3) apply high-entropy masking to client-to-server data. Existing tokens (WebSocket, connect-ip, HTTP/2) each exemplify one of these approaches.'
section: "7"
topics:
    - http
    - security
