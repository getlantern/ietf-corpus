document: rfc-7268
kind: security-consideration
summary: When RADIUS traffic is transmitted in the clear, all attributes defined in this document—including cipher suites, AKM suites, EAP identifiers, and venue metadata—are exposed to an attacker snooping the exchange between RADIUS client and server. RADIUS confidentiality is therefore desirable; RFC 6421 covers RADIUS security and crypto-agility requirements.
section: "5"
topics:
    - radius
    - security
    - crypto
