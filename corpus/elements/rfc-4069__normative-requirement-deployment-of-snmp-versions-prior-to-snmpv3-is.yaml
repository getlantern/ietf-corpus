document: rfc-4069
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. It is RECOMMENDED to deploy SNMPv3 with cryptographic security enabled, including full support for SNMPv3 authentication and privacy mechanisms.
section: "6"
rfc2119_level: RECOMMENDED
