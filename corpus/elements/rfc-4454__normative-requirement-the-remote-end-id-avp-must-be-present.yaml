document: rfc-4454
kind: normative-requirement
summary: The Remote End ID AVP MUST be present in the ICRQ in order for the remote LCCE to associate the session to the ATM circuit. If LCCE B cannot find the circuit, a CDN is returned and LCCE A SHOULD exhibit a periodic retry mechanism with configurable period and maximum retries.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
