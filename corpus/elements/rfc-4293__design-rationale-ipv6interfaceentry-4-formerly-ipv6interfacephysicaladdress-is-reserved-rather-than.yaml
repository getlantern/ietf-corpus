document: rfc-4293
kind: design-rationale
summary: '{ ipv6InterfaceEntry 4 } (formerly ipv6InterfacePhysicalAddress) is reserved rather than reused. Although OIDs should not be assigned before an RFC is published, some vendors shipped code based on earlier drafts, so the OID is held to avoid collisions with deployed implementations.'
