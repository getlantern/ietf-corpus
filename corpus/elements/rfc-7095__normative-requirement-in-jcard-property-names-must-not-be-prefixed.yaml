document: rfc-7095
kind: normative-requirement
summary: In jCard, property names MUST NOT be prefixed by a group name. Instead, grouping is achieved through a "group" parameter holding the group name. When converting vCard to jCard, the group name's case SHOULD be converted to lowercase.
section: 3.3.1.2
rfc2119_level: MUST NOT
