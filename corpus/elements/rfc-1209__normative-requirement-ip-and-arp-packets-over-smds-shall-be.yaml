document: rfc-1209
kind: normative-requirement
summary: IP and ARP packets over SMDS SHALL be encapsulated within IEEE 802.2 LLC and IEEE 802.1A SNAP. The SNAP MUST be used with an OUI of zero, indicating the SNAP header contains an EtherType code from Assigned Numbers.
section: Packet Format
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
