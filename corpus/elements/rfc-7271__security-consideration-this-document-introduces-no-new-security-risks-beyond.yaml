document: rfc-7271
kind: security-consideration
summary: This document introduces no new security risks beyond those in RFC 6378. MPLS relies on assumptions about the difficulty of traffic injection and does not assume end-to-end security in the control plane; RFC 5920 describes MPLS security issues and generic methods for securing traffic privacy and integrity, which apply here.
section: "13"
topics:
    - security
    - mpls
