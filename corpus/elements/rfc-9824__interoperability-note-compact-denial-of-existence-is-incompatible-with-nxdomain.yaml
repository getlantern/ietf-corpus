document: rfc-9824
kind: interoperability-note
summary: Compact Denial of Existence is incompatible with NXDOMAIN synthesis (RFC 8020) and aggressive use of DNSSEC-validated cache (RFC 8198) for DNSSEC-enabled responses. No online signing scheme employing minimally covering NSEC or NSEC3 records permits such synthesis.
section: "6"
topics:
