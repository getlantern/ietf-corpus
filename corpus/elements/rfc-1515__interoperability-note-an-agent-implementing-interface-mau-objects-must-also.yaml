document: rfc-1515
kind: interoperability-note
summary: An agent implementing interface MAU objects must also implement the 'interfaces' group of MIB-II; the ifMauIfIndex value must equal the ifIndex value for the connected interface. The agent is also expected to implement the Ethernet-like Interfaces MIB (RFC 1398).
section: 3.3.2
topics:
