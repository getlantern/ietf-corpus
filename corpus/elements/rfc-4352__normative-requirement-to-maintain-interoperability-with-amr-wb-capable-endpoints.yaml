document: rfc-4352
kind: normative-requirement
summary: To maintain interoperability with AMR-WB-capable endpoints, an AMR-WB+ endpoint that also implements RFC 3267 SHOULD declare itself capable of AMR-WB (i.e., also advertising 'audio/AMR-WB'). It is also RECOMMENDED to implement RFC 3267 when implementing this specification.
section: "4.5"
rfc2119_level: SHOULD
topics:
