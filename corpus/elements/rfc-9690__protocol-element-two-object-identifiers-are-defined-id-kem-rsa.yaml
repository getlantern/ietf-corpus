summary: 'Two object identifiers are defined: id-kem-rsa (OID 1.0.18033.2.2.4, from ISO/IEC 18033-2) identifies the RSA-KEM algorithm in KEMRecipientInfo; id-rsa-kem-spki (alias for id-rsa-kem, OID 1.2.840.113549.1.9.16.3.14) identifies the algorithm in SubjectPublicKeyInfo and SMIMECapabilities for backward compatibility with RFC 5990.'
