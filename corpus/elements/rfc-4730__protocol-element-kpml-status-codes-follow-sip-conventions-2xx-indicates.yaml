document: rfc-4730
kind: protocol-element
summary: 'KPML status codes follow SIP conventions: 2xx indicates success (200 = OK); 4xx indicates User Input collection failures (402 = User Terminated without Match, 423 = Timer Expired, 481 = Dialog Not Found, 487 = Subscription Expired); 5xx indicates server/document failures (501 = Bad Document, 502 = Namespace Not Supported, 531 = Persistent Subscriptions Not Supported, 532 = Multiple Regular Expressions Not Supported, 533 = Multiple Subscriptions on a Dialog Not Supported, 534 = Too Many Regular Expressions).'
