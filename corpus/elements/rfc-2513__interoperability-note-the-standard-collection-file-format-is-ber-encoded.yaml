document: rfc-2513
kind: interoperability-note
summary: The standard collection file format is BER-encoded ASN.1 (acctngFileFormat = ber(2)), but the MIB permits enterprise-specific formats (other(1)). A new format value takes effect only after the next swap to a new file.
