document: rfc-7856
kind: protocol-element
summary: swmEncapsIIPDst (InetAddress, read-only) is the I-IP destination address used as the outer-header encapsulation destination for packets matching the corresponding E-IP prefix. Since tunnelIfRemoteInetAddress is set to 0.0.0.0 or ::, this object carries the actual per-tunnel destination.
