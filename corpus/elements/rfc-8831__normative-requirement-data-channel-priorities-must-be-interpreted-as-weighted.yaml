document: rfc-8831
kind: normative-requirement
summary: Data channel priorities MUST be interpreted as weighted-fair-queuing scheduling priorities per RFC 8260. Recommended values are 128 (below normal), 256 (normal), 512 (high), or 1024 (extra high).
