document: rfc-3486
kind: security-consideration
summary: A SIP entity receiving a compressed message must decompress and parse it, requiring slightly more processing than uncompressed messages. This makes denial-of-service attacks using compressed messages marginally worse than those using uncompressed messages.
section: "10"
topics:
