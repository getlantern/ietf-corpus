document: rfc-3456
kind: normative-requirement
summary: The DHCP SA MUST only be used for DHCP traffic. It is a temporary IPsec tunnel mode SA established solely to protect initial DHCPv4 traffic between the security gateway and the remote host.
section: "3.1"
rfc2119_level: MUST
