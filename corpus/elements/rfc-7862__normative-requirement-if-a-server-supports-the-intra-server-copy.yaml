document: rfc-7862
kind: normative-requirement
summary: If a server supports the intra-server COPY feature and its COPY operation returns a stateid, the server MUST also support CB_OFFLOAD, OFFLOAD_CANCEL, and OFFLOAD_STATUS. A destination server supporting inter-server COPY with a stateid-returning COPY MUST also support COPY_NOTIFY.
section: 4.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
