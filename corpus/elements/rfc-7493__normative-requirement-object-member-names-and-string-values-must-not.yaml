document: rfc-7493
kind: normative-requirement
summary: Object member names and string values MUST NOT include code points that identify Surrogates or Noncharacters as defined by Unicode. This applies to both directly encoded characters and escaped sequences; e.g., '\uDEAD' is invalid as an unpaired surrogate.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
