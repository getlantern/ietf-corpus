document: rfc-2238
kind: protocol-element
summary: hprNceTable (hprTransportUser 1) identifies all Network Connection Endpoints at the node, indexed by hprNceId (OCTET STRING SIZE 1..8). Each entry carries the NCE's function types (HprNceTypes), default NCE function types, and a 4-octet NCE Instance Identifier (NCEII).
