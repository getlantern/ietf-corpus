document: rfc-3049
kind: security-consideration
summary: If service type templates are modified or false templates distributed, services may not correctly register themselves, or clients may not be able to interpret service information. SLP provides an authentication mechanism allowing service URLs to be signed and signatures verified by clients.
section: "7.4"
