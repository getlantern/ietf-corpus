summary: SDP signaling uses encoding name 'DV' with a 90000 Hz clock rate (a=rtpmap). The required a=fmtp 'encode' parameter specifies the DV variant, accepting 12 values such as SD-VCR/525-60, HD-VCR/1125-60, 306M/625-50, and 314M-50/525-60.
