document: rfc-3996
kind: protocol-element
summary: The 'notify-get-interval' (integer(0:MAX)) response operation attribute specifies the number of seconds the Notification Recipient SHOULD wait before reissuing Get-Notifications. Its value MUST be at least as large as the Printer's 'ippget-event-life' attribute value.
section: 5.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
