document: rfc-1904
kind: normative-requirement
summary: Objects named in an OBJECT-GROUP's OBJECTS clause must be defined in the same information module as the OBJECT-GROUP macro and must have a MAX-ACCESS of 'accessible-for-notify', 'read-only', 'read-write', or 'read-create'.
section: "3.1"
rfc2119_level: MUST
