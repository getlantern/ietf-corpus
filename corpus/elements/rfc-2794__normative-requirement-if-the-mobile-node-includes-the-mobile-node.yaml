document: rfc-2794
kind: normative-requirement
summary: If the mobile node includes the Mobile Node NAI extension in its Registration Request, the Registration Reply from the home agent MUST include the Mobile Node NAI extension. If not, the foreign agent SHOULD send the Reply to the mobile node with Code changed to MISSING_NAI (97).
section: "3"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
