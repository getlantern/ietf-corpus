document: rfc-8013
kind: interoperability-note
summary: All TLVs within the inter-FE Ethernet frame MUST be 32-bit aligned; padding of zeroes must be appended at the end of each TLV as needed. The TLV type field carries the ForCES metadata ID registered with IANA.
