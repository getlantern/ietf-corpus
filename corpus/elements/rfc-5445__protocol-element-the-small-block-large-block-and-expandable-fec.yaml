document: rfc-5445
kind: protocol-element
summary: The Small Block, Large Block, and Expandable FEC Scheme (FEC Encoding ID 128) is an Under-Specified FEC Scheme supporting three categories of FEC codes as described in RFC 3453. The specific FEC code is identified by the FEC Instance ID and its correspondence between Encoding Symbol IDs and encoding symbols may be proprietary.
