document: rfc-4941
kind: normative-requirement
summary: When a temporary address becomes deprecated, a new one MUST be generated, except when the deprecation results from a Prefix Information Option with a zero Preferred Lifetime, in which case a new temporary address MUST NOT be generated.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
    - privacy
