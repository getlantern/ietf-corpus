document: rfc-8233
kind: protocol-element
summary: 'Six new METRIC object types are defined: T=12 (Path Delay), T=13 (Path Delay Variation), T=14 (Path Loss), T=15 (P2MP Path Delay), T=16 (P2MP Path Delay Variation), T=17 (P2MP Path Loss). These extend the METRIC object defined in RFC 5440 Section 7.8.'
