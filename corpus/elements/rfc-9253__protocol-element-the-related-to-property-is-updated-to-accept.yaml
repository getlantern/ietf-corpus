document: rfc-9253
kind: protocol-element
summary: The RELATED-TO property is updated to accept URI or UID values in addition to TEXT, and gains a GAP parameter. The relparam now includes optional VALUE (UID/URI/TEXT), RELTYPE, GAP, and other parameters in any order.
section: "9.1"
