document: rfc-9685
kind: design-rationale
summary: The Consistent Uptime Option (CUO) is introduced instead of relying solely on the 'Registration Refresh Request' NA because routers need a way to detect whether their own state may have been lost (reboot) and to communicate this proactively to dependent nodes, particularly since node reboots are otherwise silent in RFC 8505.
section: "10"
topics:
