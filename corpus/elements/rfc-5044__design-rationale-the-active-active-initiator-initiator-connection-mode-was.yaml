document: rfc-5044
kind: design-rationale
summary: The active/active (Initiator/Initiator) connection mode was explicitly rejected by the working group because applications requiring it were theoretical, it complicated dual-stack implementations, and handling rejected simultaneous connections would have required additional frame types and recovery logic with no practical motivation.
section: "7.1"
