document: rfc-6501
kind: interoperability-note
summary: 'The RELAX NG schema is backwards compatible with RFC 5239: valid RFC 5239 instance documents are also valid according to this schema. The ''state'' and ''version'' attributes defined in RFC 4575 are not used in the XCON conference information model context, as they apply only to notification mechanisms.'
