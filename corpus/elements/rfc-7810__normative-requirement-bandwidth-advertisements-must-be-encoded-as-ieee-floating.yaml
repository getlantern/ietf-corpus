document: rfc-7810
kind: normative-requirement
summary: Bandwidth advertisements MUST be encoded as IEEE floating-point values; delay and delay-variation advertisements MUST be encoded as integer values. Delay values MUST be in microseconds, packet loss MUST be a percentage of packets sent, and bandwidth MUST be in bytes per second.
section: "2"
rfc2119_level: MUST
topics:
    - routing
