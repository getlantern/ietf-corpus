document: rfc-7373
kind: protocol-element
summary: 'The four dateTime ADTs are encoded as RFC 3339 UTC timestamps with precision-appropriate fractional seconds: dateTimeSeconds (no fraction), dateTimeMilliseconds (''.NNN''), dateTimeMicroseconds (''.NNNNNN''), dateTimeNanoseconds (''.NNNNNNNNN''). Time zone offsets are not supported; all timestamps are UTC.'
