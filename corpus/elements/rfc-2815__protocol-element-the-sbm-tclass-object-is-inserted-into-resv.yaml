document: rfc-2815
kind: protocol-element
summary: The SBM TCLASS object is inserted into RESV messages to carry the chosen user_priority value. When a second RESV for the same flow reaches a switch with an existing reservation, the TCLASS values are compared; if they differ, a ResvErr is returned to the originating L3 device.
