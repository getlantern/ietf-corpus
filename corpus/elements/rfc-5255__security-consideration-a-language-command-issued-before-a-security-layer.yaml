document: rfc-5255
kind: security-consideration
summary: A LANGUAGE command issued before a security layer is active is subject to active attack that suppresses or modifies the negotiation, making STARTTLS or authentication error messages harder to interpret. Clients MUST re-issue LANGUAGE after a security layer is activated.
section: "7"
topics:
