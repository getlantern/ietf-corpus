document: rfc-2919
kind: interoperability-note
summary: For many MUAs, parsing the List-Id header will simply consist of extracting the list identifier from between the delimiting angle brackets. MUAs that use the optional description phrase must be prepared to properly parse and decode encoded strings or other legal phrase components.
