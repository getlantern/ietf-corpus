document: rfc-4675
kind: design-rationale
summary: These attributes provide RADIUS/Diameter support for IEEE 802.1Q VLAN management variables and IEEE 802.1D priority regeneration not covered by RFC 3580's tunnel-attribute-based VLAN assignment, enabling a more complete set of 802.1Q functionality and a wider range of 802.1X configurations.
