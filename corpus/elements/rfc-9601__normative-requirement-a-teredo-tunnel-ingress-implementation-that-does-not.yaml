document: rfc-9601
kind: normative-requirement
summary: A Teredo tunnel ingress implementation that does not support ECN propagation as defined in RFC 6040 or its compatible predecessors MUST zero the ECN field in the outer IPv6 header. This is added as a new section 5.1.3 to the Teredo specification (RFC 4380).
section: 6.1.3
rfc2119_level: MUST
topics:
    - ecn
    - ip
    - v6ops
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
