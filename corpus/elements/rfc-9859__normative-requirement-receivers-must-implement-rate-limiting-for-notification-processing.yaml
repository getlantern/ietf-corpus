document: rfc-9859
kind: normative-requirement
summary: Receivers MUST implement rate limiting for notification processing. It is RECOMMENDED to configure rate limiting independently for both the notification's source IP address and the name of the zone conveyed in the NOTIFY message.
section: "5"
rfc2119_level: MUST
topics:
