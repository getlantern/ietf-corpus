document: rfc-7886
kind: interoperability-note
summary: When one S-BFD Discriminator is advertised, it is associated with the L2TPv3 session. When multiple S-BFD Discriminators are advertised, the mapping of a given discriminator to a specific use case is explicitly out of scope for this document.
section: "2.1"
