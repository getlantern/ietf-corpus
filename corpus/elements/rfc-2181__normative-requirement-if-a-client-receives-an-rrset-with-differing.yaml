document: rfc-2181
kind: normative-requirement
summary: If a client receives an RRSet with differing TTLs from a non-authoritative source, it should ignore the RRSet. If from an authoritative source, it should treat all TTLs as if set to the lowest TTL in the RRSet.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
