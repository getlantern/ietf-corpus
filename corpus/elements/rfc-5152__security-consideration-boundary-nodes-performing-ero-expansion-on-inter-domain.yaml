document: rfc-5152
kind: security-consideration
summary: Boundary nodes performing ERO expansion on inter-domain TE LSPs may be exposed to various attacks. It is RECOMMENDED to support policy decisions to reject ERO expansion if not allowed by policy, and operators SHOULD be provided mechanisms to enforce policies and filters at domain borders, rate-limit LSP setup requests, and perform policy-based outbound RSVP message processing.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
    - realtime
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
