document: rfc-3747
kind: interoperability-note
summary: Use of the DIFFSERV-CONFIG-MIB does not require the Policy-based Management MIB (PMMIBDR). Without it, a management application must emulate the policy activation behavior using equivalent low-level SNMP SET/GET operations directly.
section: "2"
topics:
    - diffserv
    - snmp
