document: rfc-5510
kind: protocol-element
summary: 'The maximum source block length B is determined by the finite field size: max1_B = floor((2^^m - 1) * CR), where CR is the code rate. A codec MAY impose additional max2_B limits, and B = min(max1_B, max2_B). This is only computed at the sender; B is communicated to receivers via FEC OTI.'
section: "6.1"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
