document: rfc-1971
kind: design-rationale
summary: The initial Neighbor Solicitation during DAD SHOULD be delayed by a random interval between 0 and MAX_RTR_SOLICITATION_DELAY to alleviate congestion when many nodes start simultaneously (e.g., after a power failure) and to avoid race conditions when multiple nodes solicit for the same address.
section: 5.4.2
topics:
