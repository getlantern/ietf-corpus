document: rfc-3016
kind: security-consideration
summary: RTP packets using this payload format inherit the security considerations of the RTP specification; confidentiality is achieved by encrypting the compressed bitstream end-to-end, with no conflict between compression and encryption. RTP sequence numbers and timestamps MUST start at random values for security.
section: "6"
topics:
