document: rfc-4302
kind: protocol-element
summary: In transport mode, AH is inserted after the IP header and before the next-layer protocol header. In IPv6, AH appears after hop-by-hop, routing, and fragmentation extension headers but before destination options (optionally). The authenticated coverage includes immutable IP header fields and everything after AH.
section: 3.1.1
topics:
    - ipsec
    - ip
    - security
