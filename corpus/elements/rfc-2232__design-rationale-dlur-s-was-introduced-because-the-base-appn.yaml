document: rfc-2232
kind: design-rationale
summary: DLUR/S was introduced because the base APPN architecture only transported data between independent LUs, yet customers had large investments in dependent LU type applications. DLUR encapsulates SSCP-PU and SSCP-LU session flows on LU 6.2 sessions (CPSVRMGR pipes) between DLUS and DLUR nodes, enabling dependent LU support in APPN networks without changing the base architecture.
