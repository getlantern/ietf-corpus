document: rfc-8160
kind: design-rationale
summary: SSH lacked any encoding for the widely-used IUTF8 terminal mode bit despite its broad implementation in terminal drivers; this document adds the missing opcode rather than leaving implementations to use out-of-band or vendor-specific signaling. The opcode value 42 was chosen to fit within the existing RFC 4254 uint32-argument range (1–159).
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
