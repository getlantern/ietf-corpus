document: rfc-7023
kind: design-rationale
summary: For Multi-Segment PWs (MS-PWs), Switching PEs (S-PEs) are not aware of the native service. Therefore, failure detection and notification at S-PEs is based solely on PW OAM mechanisms, and NS OAM to PW OAM mapping is performed only at Terminating PEs (T-PEs) to propagate failure notifications to EVC end points.
section: "2"
topics:
