document: rfc-7947
kind: interoperability-note
summary: Route server clients must be able to accept UPDATE messages where the leftmost AS in the AS_PATH attribute is not equal to the AS number of the route server that sent the message, as route servers typically do not prepend their own AS number.
section: 2.2.2.2
topics:
    - bgp
    - routing
