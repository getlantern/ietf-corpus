document: rfc-7231
kind: design-rationale
summary: 'The fundamental difference between POST and PUT is intent: POST asks the target resource to process the enclosed representation according to its own semantics, whereas PUT defines the enclosed representation as replacing the entire state of the target resource. PUT is therefore idempotent; POST is not.'
section: 4.3.4
topics:
    - http
