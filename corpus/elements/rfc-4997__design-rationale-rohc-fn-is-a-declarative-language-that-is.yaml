document: rfc-4997
kind: design-rationale
summary: ROHC-FN is a declarative language that is referentially transparent with no side effects, meaning any expression is guaranteed to have the same value wherever it appears in the notation and can always be interchanged with its value. This design choice ensures that both compression and decompression are fully described by a single field definition via two-way matching rather than procedural assignment.
section: "4"
