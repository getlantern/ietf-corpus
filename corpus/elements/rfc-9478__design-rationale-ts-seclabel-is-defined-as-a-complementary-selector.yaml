document: rfc-9478
kind: design-rationale
summary: TS_SECLABEL is defined as a complementary selector that must accompany an IP address TS Type, rather than being standalone, because a security label alone is insufficient to define an IPsec traffic selector — it must narrow traffic already selected by IP address range.
section: "1.3"
topics:
    - ipsec
    - security
