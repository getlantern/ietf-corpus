document: rfc-5510
kind: protocol-element
summary: Under FEC Encoding ID 129 (Under-Specified Small Block Systematic FEC Scheme), this document assigns FEC Instance ID 0 to Reed-Solomon codes over GF(2^^8) with no encoding symbol group. The FEC Instance ID 0 MAY use the RFC 5052 block partitioning algorithm or another algorithm.
