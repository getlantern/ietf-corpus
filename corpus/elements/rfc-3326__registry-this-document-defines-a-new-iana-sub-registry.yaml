document: rfc-3326
kind: registry
summary: 'This document defines a new IANA sub-registry under the SIP parameters registry labeled ''Reason Protocols''. Initial entries are: SIP (cause=status code, ref RFC 3261) and Q.850 (cause=ITU-T Q.850 cause value in decimal). New protocol values MUST refer to an ITU-T Recommendation, IETF protocol name, or recognized protocol identifier.'
