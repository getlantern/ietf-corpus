document: rfc-1662
kind: wire-format
summary: 'The PPP HDLC-like frame consists of: Flag (1 octet, 0x7e), Address (1 octet, 0xff), Control (1 octet, 0x03), Protocol (8 or 16 bits), Information (*), Padding (*), FCS (16 or 32 bits), Flag (1 octet, 0x7e). Fields are transmitted left to right.'
section: "3.1"
