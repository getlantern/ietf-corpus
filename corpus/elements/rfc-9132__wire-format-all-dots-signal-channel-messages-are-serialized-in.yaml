document: rfc-9132
kind: wire-format
summary: All DOTS signal channel messages are serialized in CBOR (RFC 8949); YANG-modeled parameters are mapped to CBOR integer keys defined in Table 5 (Section 6). The content type is 'application/dots+cbor'. Numeric CBOR keys are used in place of string names to minimize message size and reduce fragmentation risk.
section: "6"
topics:
