document: rfc-4253
kind: interoperability-note
summary: For backward compatibility with SSH 1.x, a server MAY use protoversion '1.99' to signal dual support; SSH 2.0 clients MUST treat '1.99' as identical to '2.0'. In compatibility mode, the server MUST NOT send additional data before the identification string.
section: "5.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
