document: rfc-5303
kind: normative-requirement
summary: On receipt of ISH PDUs, the three-way state SHALL be set to Down (new clause e added to ISO 10589 section 8.2.2). The ISO 10589 ISH processing does not affect three-way state except to set it Down.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
