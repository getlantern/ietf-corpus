document: rfc-5621
kind: design-rationale
summary: In SIP, unlike in the original context for 'multipart/related', the disposition types of individual body parts within a 'multipart/related' play an important role and cannot be ignored. Different SIP extensions using the same top-level disposition type are distinguished by inner body part disposition types.
section: "7.3"
