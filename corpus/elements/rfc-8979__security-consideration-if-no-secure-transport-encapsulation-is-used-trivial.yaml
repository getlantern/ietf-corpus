document: rfc-8979
kind: security-consideration
summary: If no secure transport encapsulation is used, trivial subscriber identifier structures combined with specific SFs in a chain may reveal sensitive user information to every on-path device and operational staff. SFs SHOULD NOT log the content of these Context Headers unless they actually use that content for their operation.
section: "7"
topics:
    - security
    - privacy
