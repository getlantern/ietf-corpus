document: rfc-3398
kind: normative-requirement
summary: SIP messages MUST be capable of transporting ISUP payloads from gateway to gateway (using the encapsulation format defined in RFC 3204) to allow gateways to take advantage of the full range of PSTN services when placing calls across a SIP network.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
