document: rfc-3945
kind: protocol-element
summary: A Forwarding Adjacency (FA) is an LSP advertised as a point-to-point TE link in OSPF or IS-IS, allowing LSPs to be reused as logical links for routing. FAs improve bandwidth utilization when bandwidth allocation is only possible in discrete units and reduce the number of required labels via forwarding-state aggregation.
section: "8"
topics:
    - routing
