document: rfc-1724
kind: protocol-element
summary: rip2IfConfDefaultMetric is a read-create INTEGER (0..15) specifying the metric for the default route entry in RIP updates on the interface. A value of zero means no default route is originated; another router's default may still be propagated.
section: "4.2"
topics:
    - routing
    - snmp
