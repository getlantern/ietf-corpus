document: rfc-8947
kind: normative-requirement
summary: In messages from client to server, the valid-lifetime field in the LLADDR option MUST be set to 0; the server MUST ignore any received value. The client MUST use the valid-lifetime returned by the server in a Reply.
section: "11.2"
rfc2119_level: MUST
topics:
    - ip
