document: rfc-5424
kind: normative-requirement
summary: Once SD-IDs and PARAM-NAMEs are defined, their syntax and semantics MUST NOT be altered. If a change is desired, a new SD-ID or PARAM-NAME MUST be created and the old one remain unchanged; OPTIONAL PARAM-NAMEs MAY be added to an existing SD-ID.
section: 6.3.4
rfc2119_level: MUST NOT
topics:
    - registry
