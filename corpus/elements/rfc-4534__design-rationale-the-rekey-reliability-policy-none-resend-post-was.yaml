document: rfc-4534
kind: design-rationale
summary: The rekey reliability policy (None, Resend, Post) was introduced because GSAKMP rekey messages are single push messages with no acknowledgment, creating reliability concerns; the policy lets the Group Owner select the appropriate mechanism for the network's reliability characteristics.
section: B.5.6
topics:
