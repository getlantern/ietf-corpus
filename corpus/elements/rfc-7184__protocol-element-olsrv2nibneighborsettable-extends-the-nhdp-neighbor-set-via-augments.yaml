document: rfc-7184
kind: protocol-element
summary: 'olsrv2NibNeighborSetTable extends the NHDP Neighbor Set (via AUGMENTS) with nine OLSRv2 fields per neighbor tuple: N_orig_addr, N_in_metric, N_out_metric, N_will_flooding, N_will_routing, N_flooding_mpr, N_routing_mpr, N_mpr_selector (routing MPR selector), and N_advertised (whether this router advertises a link to this neighbor in TC messages).'
