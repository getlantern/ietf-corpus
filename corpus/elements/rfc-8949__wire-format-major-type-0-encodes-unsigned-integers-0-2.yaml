document: rfc-8949
kind: wire-format
summary: Major type 0 encodes unsigned integers 0..2^64-1 with the argument as the value. Major type 1 encodes negative integers -2^64..-1; the decoded value is -1 minus the argument (e.g., -500 encodes argument 499).
