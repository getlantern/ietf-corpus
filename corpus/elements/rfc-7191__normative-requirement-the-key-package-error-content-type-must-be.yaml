document: rfc-7191
kind: normative-requirement
summary: The key package error content type MUST be signed if the entity generating it is capable of signing. When signed it MUST be encapsulated in CMS SignedData; when encrypted in CMS EnvelopedData, EncryptedData, or AuthEnvelopedData. When both signed and encrypted, it MUST be signed prior to encryption.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - security
