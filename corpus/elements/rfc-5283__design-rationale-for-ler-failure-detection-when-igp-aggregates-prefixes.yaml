document: rfc-5283
kind: design-rationale
summary: For LER failure detection when IGP aggregates prefixes (so specific LER addresses are no longer advertised), implementations can rely on LDP ordered distribution to propagate unreachability, or advertise LER reachability in IGP control-plane-only (without creating FIB entries).
