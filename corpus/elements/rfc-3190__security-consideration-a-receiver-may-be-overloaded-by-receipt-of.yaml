document: rfc-3190
kind: security-consideration
summary: A receiver may be overloaded by receipt of too many packets from undesired sources. Network-layer authentication may discard such packets, though the authentication processing cost itself may be prohibitive. In multicast environments, source pruning via IGMP or multicast routing protocols may be applied.
section: "9"
topics:
