document: rfc-8261
kind: normative-requirement
summary: Using ECN in SCTP requires the DTLS layer and its lower layer to pass ECN bits through and expose access to them for sent and received packets. If this is not possible due to implementation restrictions, ECN cannot be used by SCTP.
section: "5"
rfc2119_level: SHOULD
topics:
    - sctp
    - tls
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
