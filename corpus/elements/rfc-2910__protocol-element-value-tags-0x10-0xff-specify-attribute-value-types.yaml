document: rfc-2910
kind: protocol-element
summary: 'Value tags (0x10–0xFF) specify attribute value types. Out-of-band: 0x10 unsupported, 0x12 unknown, 0x13 no-value. Integer types: 0x21 integer, 0x22 boolean, 0x23 enum. OctetString types: 0x31 dateTime, 0x32 resolution, 0x33 rangeOfInteger, 0x35 textWithLanguage, 0x36 nameWithLanguage. Character-string types: 0x41 textWithoutLanguage, 0x42 nameWithoutLanguage, 0x44 keyword, 0x45 uri, 0x46 uriScheme, 0x47 charset, 0x48 naturalLanguage, 0x49 mimeMediaType.'
section: 3.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
