document: rfc-9060
kind: security-consideration
summary: By-reference TNAuthLists allow the authority scope of a certificate to change over time. If the HTTPS service hosting the by-reference list is improperly secured, it introduces vulnerabilities. Relying parties may accept a number at one point and reject it later as the dynamic list changes.
section: "12"
topics:
    - security
    - pkix
