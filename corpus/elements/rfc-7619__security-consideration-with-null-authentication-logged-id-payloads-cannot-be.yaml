document: rfc-7619
kind: security-consideration
summary: With NULL authentication, logged ID payloads cannot be verified; any logging of such IDs should be clearly marked as 'untrusted' and accompanied by the remote IP address. Rate limiting of logging may be required to prevent resource exhaustion.
section: "3.1"
topics:
    - ipsec
    - security
