document: rfc-3461
kind: protocol-element
summary: The NOTIFY parameter on RCPT specifies when DSNs should be generated. Values are NEVER (no DSN under any conditions), SUCCESS (on successful delivery), FAILURE (on delivery failure), and DELAY (if delivery is delayed for an unusual time). Multiple keywords may be combined with commas; NEVER must appear alone.
section: "4.1"
