document: rfc-5665
kind: normative-requirement
summary: A registered netid MUST NOT conflict with any other registered netid. Furthermore, when any registered netid is mapped to upper case, it MUST NOT conflict with the upper-case mapping of any other registered netid.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - registry
