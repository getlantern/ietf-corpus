document: rfc-6724
kind: design-rationale
summary: The default for Source Address Selection Rule 7 was changed to prefer temporary addresses over public addresses, reflecting increasing privacy importance and the fact that widely deployed implementations have used this default for years without major application compatibility issues. Implementations where compatibility outweighs privacy MAY reverse the default.
section: Appendix B
