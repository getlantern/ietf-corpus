document: rfc-8299
kind: normative-requirement
summary: The management system MUST take into account constraints on Hub-and-Spoke connections. For example, if a Hub site and a Spoke site are meshed on the same PE, they must be placed in different VRFs to enforce the Hub-and-Spoke policy.
