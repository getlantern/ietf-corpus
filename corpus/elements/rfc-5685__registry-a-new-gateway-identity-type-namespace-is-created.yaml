document: rfc-5685
kind: registry
summary: 'A new ''Gateway Identity Type'' namespace is created for use in REDIRECT and REDIRECTED_FROM payloads. Assigned values: 1=IPv4 address, 2=IPv6 address, 3=FQDN (FQDN only valid in REDIRECT, not REDIRECTED_FROM). Value 0 is reserved; 4–240 are unassigned (allocation by Expert Review); 241–255 are for private use.'
section: "12"
