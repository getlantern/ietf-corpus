document: rfc-6622
kind: normative-requirement
summary: If a message contains a TIMESTAMP TLV and an ICV TLV, the TIMESTAMP TLV SHOULD be added to the message before the ICV TLV so that it is included in the ICV calculation.
section: "9.2"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
