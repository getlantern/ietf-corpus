document: rfc-2494
kind: protocol-element
summary: 'The dsx0BondMode object defines BONDing modes for a ds0Bundle: none(1), other(2), mode0(3) through mode3(6). Mode0 provides parameter/number exchange only; Mode1 adds initialization synchronization; Mode2 adds inband monitoring at 1/64th bandwidth overhead; Mode3 provides full N×56/64 kbit/s support.'
section: 5.2.1
