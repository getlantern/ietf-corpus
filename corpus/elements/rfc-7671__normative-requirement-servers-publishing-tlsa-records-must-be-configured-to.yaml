document: rfc-7671
kind: normative-requirement
summary: Servers publishing TLSA records MUST be configured to allow correctly configured clients to successfully authenticate their TLS certificate chains. When all TLSA records are unusable and authenticated TLS is mandatory, the client MUST NOT connect to the server.
section: "10.3"
rfc2119_level: MUST
topics:
    - tls
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
