document: rfc-4896
kind: design-rationale
summary: The RFC 3485 SIP/SDP Static Dictionary offset table bugs are documented rather than corrected because any correction would be non-backwards-compatible, requiring all implementations to maintain two dictionary copies. The cost is judged too high relative to a bug that is trivial to work around and has negligible effect on compression ratios.
