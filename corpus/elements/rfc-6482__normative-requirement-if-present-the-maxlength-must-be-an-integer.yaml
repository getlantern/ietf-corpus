document: rfc-6482
kind: normative-requirement
summary: If present, the maxLength MUST be an integer greater than or equal to the length of the accompanying prefix and less than or equal to the maximum prefix length for the address family (32 for IPv4, 128 for IPv6).
section: "3.3"
rfc2119_level: MUST
