document: rfc-5460
kind: security-consideration
summary: TCP connection exhaustion attacks — including SYN flooding and connections from malicious clients that send invalid, partial, or no queries — can exhaust server connection resources. Servers should limit connection sources, cap accepted connections and in-process queries, and enforce idle connection timeouts.
section: "8"
topics:
