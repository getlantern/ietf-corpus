document: rfc-6141
kind: design-rationale
summary: Piggybacking a target refresh with complex session changes in a single request is discouraged because it forces the remote UA into an all-or-nothing situation, making it unnecessarily hard to accept the target refresh while rejecting only the session modifications.
section: "4.4"
topics:
