document: rfc-4217
kind: interoperability-note
summary: The '334' response defined in RFC 2228 implies an ADAT exchange will follow, which does not occur with TLS. The correct server response to an accepted 'AUTH TLS' command is '234', not '334'.
section: "4.2"
topics:
    - tls
