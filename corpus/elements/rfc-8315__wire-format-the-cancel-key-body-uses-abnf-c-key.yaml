document: rfc-8315
kind: wire-format
summary: 'The Cancel-Key body uses ABNF: c-key-list = [CFWS] c-key *(CFWS c-key) [CFWS]; c-key = scheme ":" c-key-string; c-key-string = c-lock-string / obs-c-key-string. The c-key-string field encodes Base64(K), the plaintext preimage. Scheme names are case-insensitive.'
section: "2.2"
topics:
    - security
