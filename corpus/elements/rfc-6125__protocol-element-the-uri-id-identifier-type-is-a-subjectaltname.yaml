document: rfc-6125
kind: protocol-element
summary: The URI-ID identifier type is a subjectAltName entry of type uniformResourceIdentifier whose value must include both a URI scheme component and a host component matching the reg-name rule (thus limited to DNS domain names, not IP addresses or bare hostnames). It is both direct and restricted to the application service type associated with its scheme.
section: "2.1"
topics:
    - tls
    - pkix
    - security
