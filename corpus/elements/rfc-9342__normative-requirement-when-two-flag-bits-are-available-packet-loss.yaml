document: rfc-9342
kind: normative-requirement
summary: 'When two flag bits are available: packet-loss measurement MUST be done using network clustering; delay measurement SHOULD be done on a single-packet basis using the Double-Marking Method. The mean delay calculation MAY also be used as a representative value of a multipoint path.'
section: "9"
rfc2119_level: SHOULD
topics:
    - measurement
