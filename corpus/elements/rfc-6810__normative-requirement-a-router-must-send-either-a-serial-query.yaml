document: rfc-6810
kind: normative-requirement
summary: A router MUST send either a Serial Query or a Reset Query no less frequently than once an hour, to limit cache storage requirements for incremental updates and to serve as an application-layer keep-alive.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
