document: rfc-2003
kind: normative-requirement
summary: If, after decapsulation, the inner datagram has TTL = 0, the decapsulator MUST discard the datagram. The inner IP header TTL is not changed during decapsulation.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
