document: rfc-7012
kind: protocol-element
summary: Enterprise-specific Information Elements use identifiers in range 1–32767 combined with an enterprise identifier (SMI PEN). Enterprise IE identifier 0 is reserved; enterprises may freely assign 1–32767 within their enterprise scope, and the same numeric ID used by different enterprises identifies distinct IEs.
