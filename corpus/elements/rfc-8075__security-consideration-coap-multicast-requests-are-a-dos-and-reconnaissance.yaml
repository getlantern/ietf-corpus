document: rfc-8075
kind: security-consideration
summary: 'CoAP multicast requests are a DoS and reconnaissance attack vector: they impose cost on constrained networks and can expose a full inventory of home appliances via ''/.well-known/core''. It is RECOMMENDED that multicast resources be access-controlled with a default-deny policy and that requestors be strongly authenticated; transport SHOULD use mutually authenticated TLS when traversing the public Internet.'
section: "10.1"
topics:
    - security
    - privacy
    - multicast
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
