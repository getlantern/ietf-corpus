document: rfc-5685
kind: security-consideration
summary: The REDIRECTED_FROM payload is intended to discourage rogue VPN gateways from redirecting large numbers of clients to a victim gateway by making the source of the redirect traceable, but it does not cryptographically prevent such a DoS attack.
