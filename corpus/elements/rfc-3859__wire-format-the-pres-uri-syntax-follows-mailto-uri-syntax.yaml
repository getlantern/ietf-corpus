document: rfc-3859
kind: wire-format
summary: 'The PRES URI syntax follows mailto: URI syntax (RFC 2368). ABNF: PRES-URI = ''pres:'' [ to ] [ headers ]; to = mailbox (RFC 2822 encoded mailbox); headers = ''?'' header *(''&'' header); header = hname ''='' hvalue where hname and hvalue are *uric (any URL-valid character per RFC 2396).'
section: A.2
topics:
