document: rfc-9640
kind: normative-requirement
summary: To securely encrypt a password or key with a symmetric key, a proper block cipher mode such as AEAD or CBC MUST be used to ensure a random IV is included. The Electronic Codebook (ECB) block cipher mode MUST NOT be used, as it leaks whether identical keys/passwords share the same ciphertext.
section: "3.6"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
