document: rfc-9895
kind: protocol-element
summary: Credit window classification is based on DLEP destinations, IEEE 802.1Q VLANs (12-bit VID field), and Priority Code Points (3-bit PCP field). Credit windows may be shared across multiple destinations, VLANs, and PCPs, or dedicated to a specific combination.
