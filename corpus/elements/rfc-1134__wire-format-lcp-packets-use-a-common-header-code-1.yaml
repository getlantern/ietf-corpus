document: rfc-1134
kind: wire-format
summary: 'LCP packets use a common header: Code (1 octet, identifies packet type 1-11), Identifier (1 octet, matches requests and replies), Length (2 octets, total packet length including header), and variable-length Data. Octets outside the Length range are treated as Data Link Layer padding and ignored.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
