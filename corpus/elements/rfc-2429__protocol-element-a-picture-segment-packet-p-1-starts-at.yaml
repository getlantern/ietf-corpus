document: rfc-2429
kind: protocol-element
summary: A Picture Segment Packet (P=1) starts at the location of a Picture, GOB, or Slice start code in the H.263+ stream. The two leading zero bytes of the start code are omitted and their presence is indicated by P=1. An extra picture header may optionally be attached when PLEN>0.
section: "5.1"
topics:
