document: rfc-1548
kind: protocol-element
summary: The Maximum-Receive-Unit (MRU) option (Type=1, Length=4) specifies the maximum octets in the Information and Padding fields, defaulting to 1500 octets. Implementations MUST still be able to receive 1500-octet frames even when smaller packets are requested, in case link synchronization is lost.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
