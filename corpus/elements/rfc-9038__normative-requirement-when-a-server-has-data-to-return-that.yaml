document: rfc-9038
kind: normative-requirement
summary: When a server has data to return that the client does not support based on login services, the server MAY return a successful response with the data for each unsupported namespace moved into an <extValue> element, along with a <reason> element explaining why the data could not be returned in the normal location.
section: "3"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
