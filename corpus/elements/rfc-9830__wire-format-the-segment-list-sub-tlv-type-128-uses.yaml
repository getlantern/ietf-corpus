document: rfc-9830
kind: wire-format
summary: The Segment List sub-TLV (Type 128) uses a 2-octet Length field (code point ≥128 per RFC 9012 convention) followed by 1-octet Reserved and sub-TLVs for an optional Weight and zero or more Segments. Multiple Segment List sub-TLVs may appear per SR Policy encoding.
section: 2.4.4
