document: rfc-2821
kind: normative-requirement
summary: 'When forwarding a message into or out of the Internet environment, a gateway MUST prepend a Received: line but MUST NOT alter any existing Received: line. Receiving systems MUST NOT reject mail based on the format of a trace field.'
section: 3.8.2
rfc2119_level: MUST
topics:
    - email
