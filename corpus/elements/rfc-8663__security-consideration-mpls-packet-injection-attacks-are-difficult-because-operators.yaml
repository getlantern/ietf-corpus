document: rfc-8663
kind: security-consideration
summary: MPLS packet injection attacks are difficult because operators have experience excluding MPLS-carrying IP tunnel payloads at network boundaries; ingress filtering of UDP packets with the MPLS destination port SHOULD be applied and is straightforward to detect.
