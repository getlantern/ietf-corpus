document: rfc-7675
kind: protocol-element
summary: Receipt of an unauthenticated message closing a connection (e.g., TCP FIN) does NOT indicate revocation of consent. An authenticated SRTCP BYE also does not terminate consent; it only indicates the associated SRTP source has quit.
section: "5.2"
topics:
