document: rfc-5190
kind: protocol-element
summary: The midcomRuleTable is the core transaction table, indexed by midcomRuleOwner, midcomGroupIndex, and midcomRuleIndex. It holds request and result parameters for policy rules including address tuples A0–A3, transport protocol, port range, lifetime, idle time, and administrative/operational status. Entries are created by writing to midcomRuleRowStatus and expire when both midcomRuleLifetime and midcomRuleStorageTime reach 0.
section: 5.1.1
