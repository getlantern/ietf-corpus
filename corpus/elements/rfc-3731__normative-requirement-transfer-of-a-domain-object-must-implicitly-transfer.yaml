document: rfc-3731
kind: normative-requirement
summary: Transfer of a domain object MUST implicitly transfer all host objects that are subordinate to the domain object. For example, transferring 'example.com' must also transfer host object 'ns1.example.com'.
section: 3.2.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
