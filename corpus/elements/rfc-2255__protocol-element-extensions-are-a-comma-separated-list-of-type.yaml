summary: Extensions are a comma-separated list of type=value pairs; the =value portion MAY be omitted. An extension prefixed with '!' (ASCII 33) is critical; without '!' it is non-critical. Extension types prefixed by "X-" or "x-" are reserved for bilateral agreements.
