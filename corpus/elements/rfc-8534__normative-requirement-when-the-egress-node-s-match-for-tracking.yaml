document: rfc-8534
kind: normative-requirement
summary: When the egress node's match for tracking differs from its match for reception (the tracking route has 'no tunnel information present' with LIR or LIR-pF set), the egress node MUST respond separately to both the match for tracking and the match for reception.
section: "5.1"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
