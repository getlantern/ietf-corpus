document: rfc-6809
kind: security-consideration
summary: If feature-capability indicators require data integrity or origin authentication, such mechanisms MUST be provided. If confidentiality is required, the specification MUST call for TLS at all hops. Specifications SHOULD NOT define indicators needing confidentiality beyond what hop-by-hop TLS provides, as no satisfactory middle-to-end SIP confidentiality mechanism exists.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
