document: rfc-7112
kind: protocol-element
summary: The Upper-Layer Header is the first member of the header chain that is neither an IPv6 header nor an IPv6 Extension Header. An ESP header or a second IPv6 header (e.g., in IPv6-over-IPv6 tunneling) are also treated as Upper-Layer Headers, terminating the chain. The upper-layer payload is not part of the IPv6 Header Chain.
section: "3"
topics:
