document: rfc-9853
kind: protocol-element
summary: The anti-amplification limit is defined as three times the amount of data received from an unvalidated address, including all DTLS records from that source (excluding discarded ones). This mirrors the QUIC definition from RFC 9000 applied to the DTLS context.
section: "2"
topics:
