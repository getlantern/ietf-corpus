document: rfc-7434
kind: protocol-element
summary: Only the UUS1 implicit variant of the ISDN User-to-User supplementary service is covered. In UUS1 implicit, the presence of the user signalling data itself constitutes the request for the service, without additional supplementary service control information.
section: "3.1"
