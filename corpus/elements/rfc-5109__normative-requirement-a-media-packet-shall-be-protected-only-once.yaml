document: rfc-5109
kind: normative-requirement
summary: A media packet SHALL be protected only once at each protection level higher than level 0. At level 0, a media packet MAY be protected by more than one FEC packet provided the protection lengths of level 0 are equal across those packets.
section: "7.4"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
