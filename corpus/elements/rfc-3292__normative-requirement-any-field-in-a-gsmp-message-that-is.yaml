document: rfc-3292
kind: normative-requirement
summary: Any field in a GSMP message that is unused or defined as 'reserved' MUST be set to zero by the sender and ignored by the receiver. A success response message MUST NOT be sent until the requested operation has been successfully completed.
section: 3.1.2.1
rfc2119_level: MUST
topics:
    - mpls
