document: rfc-8013
kind: normative-requirement
summary: On egress, if the additional Ethernet header and encapsulated metadata overhead would exceed the MTU, the packet MUST be sent to EXCEPTIONOUT with exceptionID FragRequired rather than fragmented or silently dropped.
section: 6.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
