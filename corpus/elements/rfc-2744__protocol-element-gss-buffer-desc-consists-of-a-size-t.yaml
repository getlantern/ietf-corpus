document: rfc-2744
kind: protocol-element
summary: gss_buffer_desc consists of a size_t length field (total bytes, excluding any trailing NUL) and a void* value pointer. Storage returned to the application by GSS-API is allocated by the API and must be freed by the application with gss_release_buffer(); allocation of the gss_buffer_desc object itself is always the application's responsibility.
section: "3.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
