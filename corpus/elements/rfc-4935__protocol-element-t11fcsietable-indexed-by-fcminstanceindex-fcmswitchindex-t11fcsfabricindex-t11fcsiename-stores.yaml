document: rfc-4935
kind: protocol-element
summary: 't11FcsIeTable (indexed by fcmInstanceIndex, fcmSwitchIndex, t11FcsFabricIndex, t11FcsIeName) stores discovered Interconnect Element data including WWN (t11FcsIeName, 8 or 16 bytes), type (T11FcIeType: unknown/other/switch/hub/bridge), Domain ID, Management ID, Fabric_Name, logical name, management address list pointer, and info list. By default only local IE name, type, and Domain ID are maintained; full data requires a triggered discovery cycle.'
section: "6"
topics:
    - snmp
