document: rfc-8444
kind: protocol-element
summary: The label range for BIER MPLS forwarding is the set of labels beginning with the Label field value and ending with (Label + Max SI). A unique label range is allocated for each BitString length and sub-domain-id; each Set Identifier maps to a single label in this range.
