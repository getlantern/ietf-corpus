document: rfc-7377
kind: protocol-element
summary: The ESEARCH command extends IMAP searching by accepting optional source options (IN clause specifying mailboxes), optional result options, an optional charset, and one or more search criteria. A server supporting this extension advertises 'MULTISEARCH' in its IMAP capability string.
