document: rfc-9621
kind: protocol-element
summary: Cached State is the state and history the Transport Services Implementation keeps for each set of associated Endpoints previously used. It can include DNS results, TLS session state, previous success and quality of transport protocols over certain paths, and other information used to inform candidate selection.
