document: rfc-5196
kind: protocol-element
summary: The <servcaps> element is the root element for service capabilities and SHOULD appear as a child of the PIDF <tuple> element in the urn:ietf:params:xml:ns:pidf namespace. It can contain child elements for audio, application, data, control, video, text, message, type, automata, class, duplex, description, event-packages, priority, methods, extensions, schemes, actor, isfocus, and languages, plus extension elements from other namespaces.
section: 3.2.1
topics:
    - sip
    - realtime
