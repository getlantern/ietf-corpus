document: rfc-5928
kind: protocol-element
summary: The TURN resolution mechanism takes four inputs — a boolean <secure>, an IP address or domain name <host>, an optional port <port>, and an optional transport name <transport> ('udp', 'tcp', or empty) — plus an application-provided ordered list of supported TURN transports (UDP, TCP, TLS). It outputs an ordered list of {IP address, transport, port} tuples for the client to try when creating a TURN allocation.
section: "3"
topics:
