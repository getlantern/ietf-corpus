document: rfc-2492
kind: design-rationale
summary: Since IPv6/ATM nodes negotiate an appropriate MTU for each VC, Path MTU Discovery should never be triggered in direct node-to-node communication because neither node should receive a Packet Too Big message. Path MTU Discovery is only used when communicating via one or more routers.
section: "4.2"
topics:
