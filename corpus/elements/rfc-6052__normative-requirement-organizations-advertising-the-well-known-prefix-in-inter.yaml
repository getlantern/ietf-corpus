document: rfc-6052
kind: normative-requirement
summary: Organizations advertising the Well-Known Prefix in inter-domain routing MUST be able to provide IPv4/IPv6 translation service. When using Network-Specific Prefixes in stateless translation, those prefixes MUST be advertised with proper aggregation to the IPv6 Internet.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
