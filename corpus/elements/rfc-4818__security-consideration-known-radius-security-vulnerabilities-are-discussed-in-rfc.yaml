summary: Known RADIUS security vulnerabilities are discussed in RFC 2607, RFC 2865, and RFC 2869. Use of IPsec for securing RADIUS carried over IPv6 is discussed in RFC 3162. Security considerations for Diameter are discussed in RFC 3588.
