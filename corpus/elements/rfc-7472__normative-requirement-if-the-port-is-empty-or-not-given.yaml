document: rfc-7472
kind: normative-requirement
summary: If the port is empty or not given in an 'ipps' URI, port 631 MUST be used. All 'ipps' URIs without an explicit port MUST be resolved to IANA-assigned well-known port 631.
section: "4.2"
rfc2119_level: MUST
