document: rfc-7858
kind: normative-requirement
summary: DNS clients and servers MUST NOT use port 853 to transport cleartext DNS messages. DNS clients MUST NOT send and DNS servers MUST NOT respond to cleartext DNS messages on any port designated for DNS over TLS, including after a failed TLS handshake.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
