document: rfc-8528
kind: protocol-element
summary: The 'shared-schema' case supports a 'parent-reference' leaf-list containing XPath 1.0 expressions evaluated with the mount-point node as context. The union of all resulting node-sets (plus ancestor nodes) is added to the accessible data tree for XPath evaluation within the mounted schema, allowing references to parent schema nodes like interface lists.
section: "4"
topics:
