document: rfc-1717
kind: normative-requirement
summary: If an Endpoint Discriminator option is received but neither the Multilink MRRU nor Short Sequence Number option is received, the implementation MUST NOT assume multilink operation is being requested on the discriminator alone.
section: 5.1.3
rfc2119_level: MUST NOT
