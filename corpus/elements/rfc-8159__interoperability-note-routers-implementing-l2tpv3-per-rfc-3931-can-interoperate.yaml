document: rfc-8159
kind: interoperability-note
summary: Routers implementing L2TPv3 per RFC 3931 can interoperate with keyed IPv6 tunnel routers by being configured with multiple L2TPv3 tunnels with one session per tunnel. Interoperability is constrained to RFC 3931 implementations that support a 64-bit cookie. For two-stage resolution platforms (IPv6 Address + Session ID), explicit configuration of Session ID to any non-zero value is supported.
section: "2"
