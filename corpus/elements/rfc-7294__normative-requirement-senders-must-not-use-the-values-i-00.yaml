document: rfc-7294
kind: normative-requirement
summary: Senders MUST NOT use the values I=00 or I=01 for the Concealed Seconds Metrics Block. If a block is received with I=00 or I=01, the receiver MUST discard the block.
section: "4.2"
rfc2119_level: MUST NOT
