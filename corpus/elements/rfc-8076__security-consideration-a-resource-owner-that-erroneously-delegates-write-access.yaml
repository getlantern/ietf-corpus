document: rfc-8076
kind: security-consideration
summary: A Resource Owner that erroneously delegates write access to a misbehaving peer enables that peer to exhaust shared storage or misuse the shared application; the Resource Owner retains the ability to revoke an entire delegation subtree in a single overwrite operation.
section: "8.3"
topics:
    - security
