document: rfc-3758
kind: normative-requirement
summary: When a receiver of an INIT that does not contain the Forward-TSN-Supported parameter supports FORWARD TSN itself, it MUST NOT send a FORWARD TSN chunk at any time during the association's life and SHOULD record that the peer does not support it.
section: 3.3.2
rfc2119_level: MUST NOT
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
