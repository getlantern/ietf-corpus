document: rfc-9052
kind: normative-requirement
summary: The 'alg' header parameter MUST be authenticated where possible, either by placing it in the protected-header-parameters bucket or as part of externally supplied data. This applies to AEAD algorithms and constructions such as COSE_Sign and COSE_Mac0.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
