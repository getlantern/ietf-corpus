kind: protocol-element
summary: The mdsthreshold4 attribute (FATTR4_MDSTHRESHOLD=68) advises clients on I/O size thresholds below which MDS I/O is preferred over direct pNFS I/O, encoded as an array of threshold_item4 records each containing a layout type, hint bitmap, and hint list.
