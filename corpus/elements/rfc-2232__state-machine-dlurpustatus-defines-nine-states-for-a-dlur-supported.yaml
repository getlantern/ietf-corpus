document: rfc-2232
kind: state-machine
summary: 'dlurPuStatus defines nine states for a DLUR-supported PU: reset(1), pendReqActpuRsp(2), pendActpu(3), pendActpuRsp(4), active(5), pendLinkact(6), pendDactpuRsp(7), pendInop(8), pendInopActpu(9). The pendInop state captures the CPSVRMGR pipe becoming inoperative while awaiting a PU ACTPU response; pendInopActpu captures receipt of a new ACTPU on a newly active pipe before the prior ACTPU response arrives.'
section: "5"
