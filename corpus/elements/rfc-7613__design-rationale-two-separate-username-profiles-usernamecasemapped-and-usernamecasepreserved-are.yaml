document: rfc-7613
kind: design-rationale
summary: Two separate username profiles (UsernameCaseMapped and UsernameCasePreserved) are defined to accommodate different application needs. Case mapping is generally preferable to avoid false positives in authentication, but case preservation may be needed for backward compatibility with deployed infrastructure.
section: "3.4"
topics:
    - security
