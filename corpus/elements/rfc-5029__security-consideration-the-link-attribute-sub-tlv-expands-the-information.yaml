document: rfc-5029
kind: security-consideration
summary: The link-attribute sub-TLV expands the information available in LSPs, making additional router capability data visible to potential attackers who can snoop LSPs. Specifications using this mechanism must address security around disclosure and modification of this information, and an integrity mechanism such as IS-IS Cryptographic Authentication (RFC 3567) should be applied when there is high risk from modification of capability information.
section: "5"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
