summary: 'The PK Algorithm field is an 8-bit unsigned integer indicating the cryptographic algorithm and implied Public Key format. It reuses the Algorithm Type values defined for the IPSECKEY RR (RFC 4025): 1=DSA, 2=RSA, 3=ECDSA.'
