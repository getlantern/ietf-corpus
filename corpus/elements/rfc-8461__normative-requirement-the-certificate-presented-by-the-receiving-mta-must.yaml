document: rfc-8461
kind: normative-requirement
summary: The certificate presented by the receiving MTA MUST not be expired, MUST chain to a root CA trusted by the Sending MTA, and MUST have a subject alternative name (SAN) with a DNS-ID matching the MX hostname per RFC 6125 rules.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
    - tls
    - pkix
