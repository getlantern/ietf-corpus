document: rfc-6086
kind: normative-requirement
summary: For a specific dialog usage, a UA MUST NOT send an INFO request associated with an Info Package until it has received an indication that the remote UA is willing to receive that Info Package, or after receiving indication that the remote UA is no longer willing.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
