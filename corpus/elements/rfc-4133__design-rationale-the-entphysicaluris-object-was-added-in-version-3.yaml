document: rfc-4133
kind: design-rationale
summary: The entPhysicalUris object was added in version 3 to support Common Language Equipment Identifier (CLEI) URNs and other persistent resource identifiers. URNs (RFC 3406) are preferred because they provide location-independent, long-lived identification; the URI format must conform to RFC 3986 section 2.
section: 2.12.1
