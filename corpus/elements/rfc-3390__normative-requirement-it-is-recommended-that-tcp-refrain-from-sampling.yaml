document: rfc-3390
kind: normative-requirement
summary: It is RECOMMENDED that TCP refrain from sampling the RTT during the three-way handshake, keeping the default RTO in place until an RTT sample involving a data packet is taken, to avoid spurious retransmit timeouts on low-bandwidth paths.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - tcp
    - congestion
