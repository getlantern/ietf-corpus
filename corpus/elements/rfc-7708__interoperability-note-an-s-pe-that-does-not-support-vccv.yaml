document: rfc-7708
kind: interoperability-note
summary: An S-PE that does not support VCCV CC Type 4 will reject a Type 4 packet as malformed because it expects either the PW LSE to be the bottom of stack (non-FAT) or the bottom-of-stack LSE not to be a reserved label. This behavior makes the update backwards compatible with non-supporting S-PEs.
section: "5"
topics:
