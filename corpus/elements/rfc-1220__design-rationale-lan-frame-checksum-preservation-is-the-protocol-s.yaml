document: rfc-1220
kind: design-rationale
summary: LAN Frame Checksum Preservation is the protocol's primary optimized path because IEEE 802.1 requires an extended LAN to have the same probability of undetected error as a single LAN, and no algorithm other than end-to-end FCS preservation has been proposed to achieve this.
