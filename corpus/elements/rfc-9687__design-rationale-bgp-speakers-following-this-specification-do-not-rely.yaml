document: rfc-9687
kind: design-rationale
summary: BGP speakers following this specification do not rely exclusively on remote systems closing blocked connections; they also locally close blocked connections. This addresses the asymmetry where a local system can detect the blockage but the remote system (if overwhelmed) may never initiate closure.
section: "1"
topics:
    - bgp
    - routing
