document: rfc-1782
kind: protocol-element
summary: A new TFTP packet type, Option Acknowledgment (OACK), is defined with opcode 6. It is sent by the server to acknowledge one or more options from the client's RRQ or WRQ, and only includes options the server both recognizes and accepts.
section: Packet Formats
