document: rfc-7822
kind: normative-requirement
summary: A MAC is not mandatory after an NTP extension field. One or more extension fields can appear in an NTPv4 packet without a MAC being present, correcting the original RFC 5905 text which stated a MAC was always present when an extension field was present.
section: "3"
rfc2119_level: MAY
topics:
    - ntp
    - security
