document: rfc-2304
kind: normative-requirement
summary: For domain strings used in SMTP transmissions, the string MUST conform to RFC 821 and RFC 1123 domain specifications. For domain strings in message content headers, the string MUST conform to RFC 822 and RFC 1123.
