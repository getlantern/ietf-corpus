document: rfc-8147
kind: registry
summary: INFO package 'EmergencyCallData.eCall.MSD' registered in the Info Packages Registry per RFC 6086. Both IVS and PSAP include it in Recv-Info headers to indicate ability to receive eCall-related INFO requests. Body must be multipart containing zero or one MSD part and zero or more Control+xml parts.
