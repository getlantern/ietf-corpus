document: rfc-9727
kind: normative-requirement
summary: If a Publisher already lists APIs in a format other than Linkset but wishes to use /.well-known/api-catalog, they MUST also implement a Linkset with at minimum hyperlinks to API endpoints, and MAY support content negotiation to also return their existing format.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
