summary: 'The HIP payload header is 40 bytes, containing: Next Header (1 byte), Header Length (1 byte, in 8-byte units excluding first 8 bytes), Packet Type (1 byte), Version (4 bits) and Reserved (4 bits), HIP Controls (2 bytes), Checksum (2 bytes), Sender''s HIT (16 bytes), Receiver''s HIT (16 bytes), followed by variable-length TLV parameters.'
