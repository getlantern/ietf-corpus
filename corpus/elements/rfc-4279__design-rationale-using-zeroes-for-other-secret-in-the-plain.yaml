document: rfc-4279
kind: design-rationale
summary: Using zeroes for 'other_secret' in the plain PSK premaster secret means only the HMAC-SHA1 part of the TLS PRF is used when constructing the master secret. This was chosen over using the same key for both HMAC-MD5 and HMAC-SHA1 parts because it was considered more analytically elegant; see Krawczyk's analysis.
section: "2"
topics:
