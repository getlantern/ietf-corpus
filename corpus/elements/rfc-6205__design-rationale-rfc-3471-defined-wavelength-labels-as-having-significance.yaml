document: rfc-6205
kind: design-rationale
summary: RFC 3471 defined wavelength labels as having significance only between two neighbors, without global wavelength semantics. As networks composed of multi-vendor LSC equipment (ROADMs, WXCs, PXCs) require wavelength continuity across domains, a standardized label format is necessary to avoid per-vendor representations and misconfiguration during manual provisioning.
section: "2"
topics:
