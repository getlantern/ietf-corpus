document: rfc-1172
kind: protocol-element
summary: 'LQM uses five logical processes per link direction: Link-Manager (sends/receives LQRs, implements policy), Mux (prioritizes outbound packets), Tx (maintains Out-Tx-Packets-Ctr and Out-Tx-Octets-Ctr), Rx (maintains In-Rx-Packets-Ctr and In-Rx-Octets-Ctr), and Demux. LQR packets MUST be given the highest possible priority in the Mux.'
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
