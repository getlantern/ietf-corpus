document: rfc-3440
kind: interoperability-note
summary: There is no requirement for an agent to align 15-minute interval boundaries with wall-clock quarter hours, though implementations may do so. Similarly, 1-day intervals may optionally align with midnight. Implementations must not assume fixed-boundary alignment when correlating counters across devices.
section: 4.2.5
topics:
    - snmp
