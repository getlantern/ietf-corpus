document: rfc-9154
kind: normative-requirement
summary: All communication that includes the authorization information MUST be over an encrypted channel (e.g., RFC 5734 for EPP over TCP). The registrar's interface for communicating authorization information to the registrant MUST be over an authenticated and encrypted channel.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
