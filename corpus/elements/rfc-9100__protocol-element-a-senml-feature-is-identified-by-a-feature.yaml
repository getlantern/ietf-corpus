document: rfc-9100
kind: protocol-element
summary: A SenML Feature is identified by a feature name (text string) and a feature code (unsigned integer less than 53). The 'bver' field (version number) of a SenML pack is the sum of 2^fc for each present feature code fc, forming a feature bitmap.
