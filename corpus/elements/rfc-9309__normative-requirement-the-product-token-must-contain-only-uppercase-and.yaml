document: rfc-9309
kind: normative-requirement
summary: The product token MUST contain only uppercase and lowercase letters ('a-z' and 'A-Z'), underscores ('_'), and hyphens ('-'). It SHOULD be a substring of the identification string the crawler sends to the service.
section: 2.2.1
rfc2119_level: MUST
