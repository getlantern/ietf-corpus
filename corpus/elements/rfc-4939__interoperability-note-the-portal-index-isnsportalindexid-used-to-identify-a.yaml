document: rfc-4939
kind: interoperability-note
summary: The Portal Index (IsnsPortalIndexId) used to identify a specific IP-address and port number pair is only persistent across server reinitializations for portals that have been explicitly added to a Discovery Domain. Portals not explicitly in any DD may receive a different index after a server restart.
section: "5"
topics:
