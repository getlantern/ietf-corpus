document: rfc-9352
kind: wire-format
summary: The SRv6 End SID sub-TLV (type 5, advertised in the SRv6 Locator TLV) carries a 1-octet Flags field (all reserved), a 2-octet Endpoint Behavior codepoint, a 16-octet SID, and optional sub-sub-TLVs. The SID MUST be allocated from its associated locator; End SIDs not allocated from the associated locator MUST be ignored.
section: "7.2"
topics:
    - routing
    - ip
