document: rfc-7032
kind: security-consideration
summary: LDP DoD deployments in access networks face the same threats as any MPLS LDP deployment. Baseline security per RFC 5920 and RFC 5036 is recommended, including message authenticity, integrity, and protection against spoofing and DoS attacks. Access nodes in physically insecure locations (e.g., VDSL street cabinets) require additional physical and monitoring controls.
section: "7"
topics:
    - security
    - mpls
