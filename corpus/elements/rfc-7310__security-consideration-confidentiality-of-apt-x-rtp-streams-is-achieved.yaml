document: rfc-7310
kind: security-consideration
summary: Confidentiality of apt-X RTP streams is achieved by encryption. Because coding is applied end to end, encryption may be performed after audio coding with no conflict. Standard and Enhanced apt-X are CBR codecs, so the VBR timing-attack vulnerability described in RFC 6562 for Secure RTP does not apply.
section: "8"
topics:
    - security
    - realtime
    - rtp
