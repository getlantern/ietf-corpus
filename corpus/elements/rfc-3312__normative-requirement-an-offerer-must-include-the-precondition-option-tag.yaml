document: rfc-3312
kind: normative-requirement
summary: An offerer MUST include the 'precondition' option tag in the Require header if the offer contains any 'mandatory' strength-tags. If all tags are 'optional' or 'none', the tag MUST appear in either Supported or Require, with Supported RECOMMENDED.
section: "11"
rfc2119_level: MUST
topics:
    - sip
    - qos
