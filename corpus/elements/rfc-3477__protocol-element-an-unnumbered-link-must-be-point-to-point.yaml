document: rfc-3477
kind: protocol-element
summary: An unnumbered link must be point-to-point. Each LSR at an end of the link assigns a non-zero 32-bit link identifier unique within that LSR's scope. The two endpoints exchange these identifiers (called local and remote identifiers from each side's perspective) via configuration, LMP, RSVP, or IGP extensions.
section: "2"
topics:
    - mpls
    - routing
