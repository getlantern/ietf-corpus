document: rfc-3289
kind: protocol-element
summary: diffServQTable models simple FIFO queues. Multiple upstream elements (e.g., diffServAlgDropNext pointers for AF11, AF12, AF13) may direct traffic to the same queue entry. Minimum and maximum service rates are associated with the queue via diffServMinRateTable and diffServMaxRateTable.
section: 3.5.1
topics:
