document: rfc-2358
kind: normative-requirement
summary: It is RECOMMENDED that all Ethernet-like interfaces use ifType ethernetCsmacd(6) regardless of speed or link-layer encapsulation. An Ethernet-like interface SHOULD NOT use fastEther(62) or fastEtherFX(69) ifTypes.
