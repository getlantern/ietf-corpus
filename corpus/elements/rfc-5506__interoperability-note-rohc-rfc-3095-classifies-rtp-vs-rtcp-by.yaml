document: rfc-5506
kind: interoperability-note
summary: RoHC (RFC 3095) classifies RTP vs RTCP by payload type when multiplexed on the same port. The classification algorithm must be updated to acknowledge that the first RTCP packet in a Reduced-Size RTCP may have a payload type other than 200 or 201.
section: 3.4.5
topics:
    - rtp
    - realtime
