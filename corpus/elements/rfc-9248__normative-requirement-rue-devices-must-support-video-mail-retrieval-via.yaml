document: rfc-9248
kind: normative-requirement
summary: RUE devices MUST support video mail retrieval via SIP call to a specified URI using DTMF and via a browser-based HTTPS interface. Implementations MUST support subscriptions to 'message-summary' events (RFC 3842); providers MUST support MWI if they support video mail, and RUE devices MUST support MWI.
section: "8"
rfc2119_level: MUST
topics:
    - sip
    - voip
