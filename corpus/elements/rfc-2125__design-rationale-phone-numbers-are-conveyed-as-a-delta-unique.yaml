document: rfc-2125
kind: design-rationale
summary: Phone numbers are conveyed as a delta (unique rightmost digits) from a previously known base number rather than as a full number to avoid the complexity of determining which dialing prefixes are required for a given number/country-code combination.
section: "6.2"
