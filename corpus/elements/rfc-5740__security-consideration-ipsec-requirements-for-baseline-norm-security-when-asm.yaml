document: rfc-5740
kind: security-consideration
summary: 'IPsec requirements for baseline NORM security: when ASM multicast is used, a Group Security Association using a shared key is needed. For SSM or unicast return path configurations, individual ESP Security Associations between each sender-receiver pair may be used instead. ESP with non-NULL encryption is RECOMMENDED to provide confidentiality in addition to integrity.'
section: 7.1.2
topics:
    - security
    - ipsec
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
