document: rfc-3006
kind: wire-format
summary: 'The hint value is a 32-bit field: high-order 16 bits are the IP-compression-protocol number as defined in RFC 1332 and RFC 2509; low-order 16 bits are a sub-option for cases where the protocol number alone is insufficient. Defined values include 0x002d0000 (IP/TCP, RFC 1144), 0x00610000 (IP, RFC 2507), and 0x00610100 (IP/UDP/RTP, RFC 2508).'
section: "4.1"
topics:
