document: rfc-5985
kind: normative-requirement
summary: Implementations of HELD that implement HTTP transport MUST implement transport over TLS. The Device MUST implement the server authentication method described in Section 3.1 of RFC 2818; the leftmost label MAY contain the wildcard string '*' matching any single domain name label.
section: "8"
rfc2119_level: MUST
topics:
