document: rfc-3946
kind: interoperability-note
summary: 'A SONET/SDH label is context-sensitive: it does not by itself identify which signal class is being used. The signal class is implicitly determined by the link on which the label is used, in combination with the traffic parameters. Implementations must interpret labels only in conjunction with the associated SONET/SDH traffic parameters.'
section: "3"
topics:
    - mpls
    - routing
