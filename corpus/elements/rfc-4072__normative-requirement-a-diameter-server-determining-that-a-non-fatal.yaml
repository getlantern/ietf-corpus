document: rfc-4072
kind: normative-requirement
summary: A Diameter server determining that a non-fatal EAP error has occurred MUST send a Diameter-EAP-Answer with DIAMETER_MULTI_ROUND_AUTH Result-Code and no EAP-Payload AVP, but MUST include an EAP-Reissued-Payload AVP encapsulating the previous EAP Request to simplify RADIUS translation.
section: "2.4"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
