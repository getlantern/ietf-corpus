kind: wire-format
summary: 'The extended LIST command syntax is: LIST [SP list-select-opts] SP mailbox SP mbox-or-pat [SP list-return-opts], where list-select-opts is a parenthesized list of selection options and list-return-opts uses the keyword RETURN followed by a parenthesized list of return options.'
