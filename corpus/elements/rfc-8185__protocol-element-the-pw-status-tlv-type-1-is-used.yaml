document: rfc-8185
kind: protocol-element
summary: The PW Status TLV (Type=1) is used by a dual-homing PE to report its service PW status to the peer dual-homing PE. The F bit signals Signal Fail (SF) and the D bit signals Signal Degrade (SD), which may originate locally or from the remote PE.
section: "4.1"
topics:
