document: rfc-1939
kind: protocol-element
summary: The LIST [msg] command (TRANSACTION state) returns scan listings in the format 'message-number<SP>exact-size-in-octets'. With no argument it returns a multi-line listing of all non-deleted messages; with a message-number it returns a single scan listing for that message.
section: "5"
