document: rfc-9856
kind: protocol-element
summary: 'The Hot Standby (HS) solution is downstream-PE-based: upstream PEs forward SFG traffic from all redundant G-sources simultaneously, each appending a unique ESI label (S-ESI label). Downstream PEs perform RPF checks keyed on the ESI label of the selected primary G-source and discard packets from other ESIs.'
section: "2.2"
topics:
    - routing
    - multicast
    - mpls
