document: rfc-4588
kind: design-rationale
summary: 'The retransmission stream is sent separately from the original stream and includes the original sequence number (OSN) in a 2-octet payload header. This design satisfies all six requirements: compatibility with RTCP, support for unicast and small multicast, interoperability with mixers/translators, support for all payload types, multiple payload types per session, and sequence number preservation.'
section: "3"
