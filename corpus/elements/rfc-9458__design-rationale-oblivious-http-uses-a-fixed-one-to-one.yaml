document: rfc-9458
kind: design-rationale
summary: Oblivious HTTP uses a fixed one-to-one mapping between Oblivious Relay Resource and Oblivious Gateway Resource. This simplifies relay configuration and prevents the relay from being repurposed as a generic relay for arbitrary or unknown gateway resources. Multiple Relay Resources can be configured to support multiple gateways.
section: "8.2"
topics:
    - http
    - privacy
    - security
