document: rfc-6442
kind: normative-requirement
summary: When multiple locationValues are present in a SIP request and at least one is determined valid by the Location Recipient, the location MUST be considered good and no Geolocation-Error is to be sent. Dereference attempts SHOULD be limited to 10 within a few minutes before returning error code 300.
section: "4.4"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
