document: rfc-9805
kind: security-consideration
summary: ACLs designed to protect the control plane from DoS (per RFC 6192) become less effective and computationally expensive when they must parse the Hop-by-Hop Options header to search for the Router Alert option, since the option is not at a fixed position.
