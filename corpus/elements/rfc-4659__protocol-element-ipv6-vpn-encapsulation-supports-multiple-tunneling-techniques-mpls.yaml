document: rfc-4659
kind: protocol-element
summary: 'IPv6 VPN encapsulation supports multiple tunneling techniques: MPLS-in-IP, MPLS-in-GRE, MPLS-in-L2TPv3, and IPsec-secured variants, reusing the same encapsulation methods as IPv4 BGP/MPLS VPNs. IPsec Transport Mode is used to secure IPv4 or GRE tunnels between PE routers.'
section: "4"
topics:
