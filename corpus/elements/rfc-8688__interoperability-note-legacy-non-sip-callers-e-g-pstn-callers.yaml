document: rfc-8688
kind: interoperability-note
summary: Legacy non-SIP callers (e.g., PSTN callers via a media gateway) cannot process 608 response codes or Call-Info headers. The first SIP network element that conforms with this specification (e.g., an SBC) takes responsibility for inserting sip.608 and playing an audio or text announcement conveying the remediation contact information to the legacy caller.
section: "3.4"
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
