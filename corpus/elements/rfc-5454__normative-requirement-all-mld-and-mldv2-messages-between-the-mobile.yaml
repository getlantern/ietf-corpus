document: rfc-5454
kind: normative-requirement
summary: All MLD and MLDv2 messages between the mobile node and home agent MUST be tunneled over an IPv4 tunnel between the mobile node's IPv4 home address and the home agent's IPv4 address, bypassing the foreign agent.
