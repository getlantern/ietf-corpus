document: rfc-8655
kind: protocol-element
summary: 'PREOF is the collective name for three DetNet service sub-layer functions: the Packet Replication Function (PRF), which replicates DetNet flow packets to multiple next hops; the Packet Elimination Function (PEF), which removes duplicate packets based on sequencing information; and the Packet Ordering Function (POF), which reorders out-of-order packets. These can be implemented at DetNet edge nodes, relay nodes, or end systems.'
section: "2.1"
