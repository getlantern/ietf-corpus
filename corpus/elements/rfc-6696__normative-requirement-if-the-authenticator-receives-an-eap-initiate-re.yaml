document: rfc-6696
kind: normative-requirement
summary: If the authenticator receives an EAP-Initiate/Re-auth message after sending EAP-Request/Identity and supports ERP, it MUST proceed with the ERP exchange. If no response follows the required retransmissions of EAP-Initiate/Re-auth-Start, the authenticator MUST initiate EAP by sending EAP-Request/Identity.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
