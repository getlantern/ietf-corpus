document: rfc-7271
kind: normative-requirement
summary: 'MS-P and MS-W are distinguished by the FPath field: FPath=1 indicates MS-P (traffic diverted from working path to protection), FPath=0 indicates MS-W (traffic diverted from protection path to working). The Path field indicates the current data path (0=working, 1=protection).'
section: "6.3"
rfc2119_level: SHALL
topics:
