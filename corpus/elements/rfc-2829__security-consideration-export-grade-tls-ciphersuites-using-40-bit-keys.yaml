document: rfc-2829
kind: security-consideration
summary: Export-grade TLS ciphersuites using 40-bit keys (RC4-40, RC2-CBC-40, DES40) can be cracked in less than a week of CPU time. Clients and servers SHOULD carefully consider the sensitivity of data before using these ciphersuites.
