document: rfc-2205
kind: protocol-element
summary: A Path message is sent downstream by each sender along the data path, carrying SENDER_TEMPLATE (sender IP address and optional port), SENDER_TSPEC (traffic characteristics), and optionally an ADSPEC (OPWA advertising data). Each intermediate node stores path state including the previous-hop address used to reverse-route Resv messages.
section: 3.1.3
