document: rfc-1661
kind: state-machine
summary: 'The LCP Option Negotiation Automaton has ten states: Initial, Starting, Closed, Stopped, Closing, Stopping, Request-Sent, Ack-Received, Ack-Sent, and Opened. Events include Up/Down/Open/Close, Timeout (TO+/TO-), and received packet types (RCR+/RCR-/RCA/RCN/RTR/RTA/RUC/RXJ+/RXJ-/RXR); actions include sending configure/terminate/reject packets and notifying upper/lower layers.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
