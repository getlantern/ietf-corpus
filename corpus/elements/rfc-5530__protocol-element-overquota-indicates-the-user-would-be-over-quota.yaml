document: rfc-5530
kind: protocol-element
summary: OVERQUOTA indicates the user would be over quota after the requested operation. It may accompany OK (soft quota exceeded) or NO (hard quota exceeded). If the server sends OVERQUOTA but does not support the QUOTA extension (RFC 2087), the client cannot determine the quota limit.
section: "3"
