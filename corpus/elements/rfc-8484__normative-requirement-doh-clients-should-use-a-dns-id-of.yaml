document: rfc-8484
kind: normative-requirement
summary: DoH clients SHOULD use a DNS ID of 0 in every DNS request when using media formats that include the ID field, to maximize HTTP cache friendliness and avoid separate caching of semantically equivalent queries.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - dns
    - http
