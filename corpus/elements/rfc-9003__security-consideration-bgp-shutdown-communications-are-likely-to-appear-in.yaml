document: rfc-9003
kind: security-consideration
summary: BGP Shutdown Communications are likely to appear in syslog output, creating a risk that a carefully constructed message could be formatted to appear as additional syslog messages (log injection). The 255-octet length limit helps constrain such attacks.
section: "6"
topics:
    - bgp
