document: rfc-5101
kind: normative-requirement
summary: The Scope Field Count in an Options Template Record MUST NOT be zero. The Observation Domain ID in the IPFIX Message Header MUST be zero when the message contains Data Records with different Observation Domain ID values defined as scopes.
section: 3.4.2.1
rfc2119_level: MUST NOT
topics:
