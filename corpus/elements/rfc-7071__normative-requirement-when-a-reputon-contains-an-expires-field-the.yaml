document: rfc-7071
kind: normative-requirement
summary: When a reputon contains an "expires" field, the client SHOULD NOT use the rating after that timestamp and SHOULD issue a new query. Expiration timestamps SHOULD be lower for subjects about which little data has been collected, since reputation data is most volatile for young subjects.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - json
