document: rfc-3585
kind: normative-requirement
summary: The ActionOrder property in PolicyActionInSARule MUST be unique within an SARule to guarantee deterministic execution order. Lower values have higher precedence (1 is highest); behavior when two actions share the same order value is undefined.
section: 4.7.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
