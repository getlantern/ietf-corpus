document: rfc-7310
kind: normative-requirement
summary: The default packetization interval MUST have a duration of 4 milliseconds. When an integer number of coded samples per channel cannot be contained within this interval, the default packet interval MUST be rounded down to the nearest packet interval that can contain a complete integer set of coded samples.
section: "5.3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
