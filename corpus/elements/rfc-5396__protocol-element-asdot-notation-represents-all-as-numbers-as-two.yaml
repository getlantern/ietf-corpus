document: rfc-5396
kind: protocol-element
summary: asdot+ notation represents all AS numbers as two decimal integers joined by a period, where the left value is the high-order 16 bits and the right is the low-order 16 bits. For example, AS 65526 is '0.65526' and AS 65546 is '1.10'.
