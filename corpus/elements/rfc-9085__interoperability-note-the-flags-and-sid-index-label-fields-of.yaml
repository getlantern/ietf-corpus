document: rfc-9085
kind: interoperability-note
summary: The Flags and SID/Index/Label fields of the Adjacency SID, LAN Adjacency SID, and Prefix-SID TLVs carry protocol-specific bit definitions. Implementors MUST use the BGP-LS NLRI Protocol-ID to select the correct IS-IS, OSPFv2, or OSPFv3 specification for parsing these fields.
section: 2.2.1
topics:
    - routing
    - bgp
