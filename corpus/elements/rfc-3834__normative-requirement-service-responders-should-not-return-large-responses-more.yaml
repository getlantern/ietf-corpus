document: rfc-3834
kind: normative-requirement
summary: Service Responders SHOULD NOT return large responses (more than a few kilobytes) without specific knowledge that the request was actually authorized by the party associated with the response destination address, to avoid being used for denial-of-service attacks.
section: "2"
rfc2119_level: SHOULD NOT
