document: rfc-5568
kind: security-consideration
summary: 'The protocol relies on a trust relationship between PAR and NAR: the NAR may create a forwarding entry for NCoA based on the PAR''s approval. Without this trust, an attacker controlling PAR could redirect traffic for any NCoA. Operators must ensure the PAR-NAR security association is properly managed.'
section: "10"
topics:
    - security
    - mobility
