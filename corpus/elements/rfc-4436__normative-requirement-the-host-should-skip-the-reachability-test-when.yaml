document: rfc-4436
kind: normative-requirement
summary: 'The host SHOULD skip the reachability test when: (a) no operable routable IPv4 address exists for that network, (b) no test node addresses are known, (c) DHCP authentication (RFC3118) is configured, or (d) the DHCP Client Identifier the client used differs from what it intends to present now.'
section: "2.1"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
