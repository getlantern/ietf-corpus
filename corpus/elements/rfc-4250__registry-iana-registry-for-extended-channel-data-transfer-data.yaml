kind: registry
summary: 'IANA registry for Extended Channel Data Transfer ''data_type_code'' (uint32) used in SSH_MSG_CHANNEL_EXTENDED_DATA. Only one initial assignment: SSH_EXTENDED_DATA_STDERR (1). New codes in 0x00000002–0xFDFFFFFF require IETF CONSENSUS; 0xFE000000–0xFFFFFFFF is PRIVATE USE.'
