document: rfc-9171
kind: wire-format
summary: DTN Time is an unsigned integer representing milliseconds elapsed since the DTN Epoch (2000-01-01 00:00:00 UTC), not affected by leap seconds. Each DTN time SHALL be represented as a CBOR unsigned integer; the value zero indicates unknown time.
section: 4.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
