summary: 'Type-P-Instantaneous-Unidirectional-Connectivity is defined as a Boolean metric: Src has this connectivity to Dst at time T if a type-P packet transmitted from Src to Dst at time T will arrive at Dst. Parameters are Src IP, Dst IP, and time T.'
