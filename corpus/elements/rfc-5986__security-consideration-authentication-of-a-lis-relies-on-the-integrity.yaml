document: rfc-5986
kind: security-consideration
summary: Authentication of a LIS relies on the integrity of the domain name acquired from DHCP. Preventing DHCP message modification or spoofing is necessary; physical/link-layer security and DHCP authentication (RFC 3118) can help.
