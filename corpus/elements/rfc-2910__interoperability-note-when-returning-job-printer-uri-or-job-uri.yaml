document: rfc-2910
kind: interoperability-note
summary: When returning job-printer-uri or job-uri attributes, the server SHOULD return the same URL scheme the client supplied in the query request. If a server registers a non-secure ipp-URL with a directory service, it is recommended to also register an http-URL for interoperability with IPP/1.0 clients.
section: "9.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
