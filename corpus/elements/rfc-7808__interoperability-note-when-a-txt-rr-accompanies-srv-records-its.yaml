document: rfc-7808
kind: interoperability-note
summary: When a TXT RR accompanies SRV records, its "path" key value MUST be used as the context path for HTTP requests. When no TXT RR is present, clients fall back to the well-known URI mechanism.
section: 4.2.1.2
topics:
    - dns
    - http
