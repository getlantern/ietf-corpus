document: rfc-8200
kind: design-rationale
summary: ICMPv6 includes the IPv6 pseudo-header in its checksum computation (unlike IPv4 ICMP) to protect ICMP from misdelivery or corruption of IPv6 header fields it depends on, which are not covered by an internet-layer checksum as in IPv4.
section: "8.1"
topics:
    - ip
