document: rfc-9252
kind: normative-requirement
summary: The sum of Locator Block Length (LBL), Locator Node Length (LNL), Function Length (FL), and Argument Length (AL) MUST be less than or equal to 128 and greater than the sum of Transposition Offset and Transposition Length. When Transposition Length is 0 (nothing transposed), the Transposition Offset MUST also be set to 0.
section: 3.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
