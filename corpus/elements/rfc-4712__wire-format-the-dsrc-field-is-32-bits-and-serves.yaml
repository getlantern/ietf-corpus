document: rfc-4712
kind: wire-format
summary: The DSRC field is 32 bits and serves as a unique session descriptor. Values should be randomly generated; implementers are directed to the algorithm in RFC 3550 Appendix A.6. Zero is valid. The RRC should use DA, DN, and MAC Address in conjunction with DSRC to reduce collision probability.
section: 2.1.2
topics:
    - realtime
