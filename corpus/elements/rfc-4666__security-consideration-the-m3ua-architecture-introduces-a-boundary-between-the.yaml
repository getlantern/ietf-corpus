document: rfc-4666
kind: security-consideration
summary: The M3UA architecture introduces a boundary between the SS7 and IP domains at the Signalling Gateway. Unauthorized access to ASPs or SGPs through the IP network could allow an attacker to inject, modify, or suppress SS7 signalling messages, potentially causing call disruption, fraudulent call routing, or disclosure of network topology information.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
