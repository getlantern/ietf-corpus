document: rfc-1407
kind: interoperability-note
summary: When an SNMP agent represents both a host and a DS3/E3 device (external+internal scenario), dsx3LineIndex values greater than ifNumber are assigned, with even numbers for inside (equipment-side) interfaces and odd numbers for outside (network-side) interfaces.
