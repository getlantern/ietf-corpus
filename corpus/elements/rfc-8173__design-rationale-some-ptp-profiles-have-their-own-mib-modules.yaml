document: rfc-8173
kind: design-rationale
summary: Some PTP profiles have their own MIB modules defined as part of the profile; this MIB module is not intended to replace those. It is intended to complement profile-specific MIBs with base monitoring of the default IEEE-1588-2008 profile over IP.
