document: rfc-9442
kind: normative-requirement
summary: The integrity of the fragmentation-reassembly process of a SCHC Packet MUST be checked at the receiver end. The use of a Reassembly Check Sequence (RCS) MUST be used to provide this integrity check over Sigfox.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
