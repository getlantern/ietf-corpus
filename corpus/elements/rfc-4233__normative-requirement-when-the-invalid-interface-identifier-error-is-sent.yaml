document: rfc-4233
kind: normative-requirement
summary: When the 'Invalid Interface Identifier' error is sent, the Diagnostic Information MUST contain enough of the offending message to identify the invalid Interface Identifier (at minimum, the Common and IUA message headers for QPTM and TEI Status messages).
