document: rfc-3635
kind: design-rationale
summary: dot3StatsEtherChipSet has been deprecated because implementation feedback showed it is of limited use for debugging network problems in the field (identifies only the MAC chip, not PHY/PMD/driver), and the administrative overhead of maintaining a central chipset OID registry is not justified for an object of questionable utility.
section: "3.4"
topics:
