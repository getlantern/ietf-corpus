document: rfc-5065
kind: normative-requirement
summary: A BGP speaker receiving an AS_PATH attribute containing its own AS Confederation Identifier or an AS_CONFED_SEQUENCE/AS_CONFED_SET containing its own Member-AS Number SHALL treat the path as if it contained its own AS number (loop detection).
