document: rfc-6698
kind: normative-requirement
summary: If implementations cache TLSA-related domain name lookups for performance, they MUST observe the TTL information reported by DNS. Failure to do so could result in spoofing or denial of access during certificate rollover.
section: "8.2"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
