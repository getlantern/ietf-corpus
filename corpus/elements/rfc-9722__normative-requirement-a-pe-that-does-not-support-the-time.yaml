document: rfc-9722
kind: normative-requirement
summary: A PE that does not support the Time Synchronization procedures or that receives a route from another PE in which the T-bit capability is not set MUST NOT delay DF election, as doing so could lead to duplicate traffic from overlapping DFs.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
