document: rfc-2211
kind: normative-requirement
summary: The token bucket rate r must be in the range 1 byte/s to 40 terabytes/s. Network elements MUST return an error for requests with values outside this range and MUST return an error for any in-range value the element cannot support.
section: "5"
rfc2119_level: MUST
