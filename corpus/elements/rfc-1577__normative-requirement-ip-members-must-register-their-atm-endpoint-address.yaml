document: rfc-1577
kind: normative-requirement
summary: IP members MUST register their ATM endpoint address with their ATMARP server using the ATM address structure appropriate for their network connection. Implementations MUST support all three ATM address structures (NSAPA-only, E.164-only, and E.164 with NSAPA subaddress).
section: "6.6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
