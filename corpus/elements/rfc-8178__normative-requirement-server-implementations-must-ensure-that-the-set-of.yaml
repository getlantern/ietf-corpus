document: rfc-8178
kind: normative-requirement
summary: Server implementations MUST ensure that the set of supported features and protocol elements does not change within the context of a single clientid. This gives clients the assurance that the set of REQUIRED and OPTIONAL features remains stable for the duration of a clientid.
section: "8.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
