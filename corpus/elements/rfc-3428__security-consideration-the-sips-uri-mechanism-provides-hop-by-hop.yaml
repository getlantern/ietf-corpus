document: rfc-3428
kind: security-consideration
summary: The SIPS URI mechanism provides hop-by-hop integrity and privacy but requires trusting all proxies to not fork to unauthorized destinations. A forking proxy can deliver a MESSAGE to additional endpoints without UAC knowledge.
section: "11.2"
