document: rfc-3585
kind: design-rationale
summary: IPsec policy traverses multiple representations—LDAP schemas, COPS on-the-wire format, XML documents, and text-based configuration languages. A single task-independent canonical information model is needed so that each task-specific representation can be derived from a common, precisely specified source.
section: "1"
topics:
