document: rfc-6544
kind: design-rationale
summary: TURN over TCP is an especially important use case for ICE TCP because it only requires agents to make outbound TCP connections to a public server, which is broadly permitted through NATs and firewalls. This provides a high-reliability fallback when direct UDP and TCP paths both fail.
section: "1"
topics:
