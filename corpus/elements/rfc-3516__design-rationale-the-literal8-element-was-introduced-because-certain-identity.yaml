document: rfc-3516
kind: design-rationale
summary: The <literal8> element was introduced because certain identity-encoding CTEs (e.g., MIME "binary") produce decoded data whose domain includes NUL octets, which cannot be expressed in normal IMAP4 string protocol elements; a fully eight-bit-transparent literal type was required.
