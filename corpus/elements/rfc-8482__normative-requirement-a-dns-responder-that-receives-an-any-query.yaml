document: rfc-8482
kind: normative-requirement
summary: A DNS responder that receives an ANY query MAY decline to provide a conventional ANY response or MAY instead send a response with a single RRset (or a larger subset of available RRsets) in the answer section.
section: "4.1"
rfc2119_level: MAY
