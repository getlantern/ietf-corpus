document: rfc-8037
kind: protocol-element
summary: For ECDH-ES, the "x" parameter of the "epk" field is set by applying the ECDH function to the ephemeral private key (as scalar input) and the standard base point (as u-coordinate input), then base64url-encoding the output. The Z value is computed by applying ECDH to the ephemeral private key and the receiver public key.
section: 3.2.1
topics:
