document: rfc-4295
kind: protocol-element
summary: mip6MnBLLifeTimeGranted enables calculation of remaining binding lifetime as lR = lG - (cT - aT), where lG is the granted lifetime, cT is current time, and aT is mip6MnBLAcceptedTime; when lR reaches zero the entry is deleted from the Binding Update List.
