document: rfc-8234
kind: normative-requirement
summary: If the local node receives an EXER message as the first protocol message after initialization and the remote EXER becomes the top-priority global request, the local node MUST set the bridge/selector position per the Path value in the EXER message and transit to the E::R state.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
