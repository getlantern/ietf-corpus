document: rfc-5723
kind: design-rationale
summary: The ticket format is intentionally left unspecified because format interoperability is not required — the same gateway that issues the ticket is always the one that interprets it. Appendix A provides example 'ticket by value' and 'ticket by reference' formats as non-normative guidance.
