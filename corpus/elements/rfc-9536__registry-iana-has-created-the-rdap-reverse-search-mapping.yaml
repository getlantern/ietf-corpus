document: rfc-9536
kind: registry
summary: IANA has created the "RDAP Reverse Search Mapping" registry using the Specification Required policy. Entries are keyed by the 4-tuple (Searchable Resource Type, Related Resource Type, Property, Property Path), which MUST be unique. Initial entries map fn, handle, email, and role to their JSONPath expressions.
