document: rfc-4694
kind: security-consideration
summary: To prevent man-in-the-middle attacks that insert or modify NP parameters, call signaling protocols carrying these parameters SHOULD provide hop-by-hop message integrity. For SIP, this is accomplished with the SIPS URI mechanism.
