document: rfc-891
kind: protocol-element
summary: The Net Table contains one entry per reachable or neighbor net, including fields for Net Name (RAD50), Net number (class A/B/C), Gateway ID (host ID of first gateway), Hops, Index (GGP/EGP routing matrix), and Gateway Leader. The table is terminated by an entry with all Net fields zero; if its Hops field is less than 255, its Gateway ID serves as the default gateway for all unlisted nets.
section: "2.1"
topics:
    - routing
    - ip
