document: rfc-5677
kind: normative-requirement
summary: TCP SHOULD be used as the default transport for all MIH messages. However, UDP with MIH acknowledgement SHOULD be used for ES and CS messages shorter than or equal to the path MTU.
section: "6.5"
rfc2119_level: SHOULD
