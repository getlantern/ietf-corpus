document: rfc-5222
kind: state-machine
summary: LoST operates in recursive or iterative mode per request, controlled by the 'recursive' attribute. In recursive mode the contacted server queries other servers on the client's behalf; in iterative mode it returns a redirect to the next server. A server MUST NOT recurse if 'recursive' is 'false', but MAY always return a redirect (indirection).
section: 8.3.3
topics:
    - realtime
