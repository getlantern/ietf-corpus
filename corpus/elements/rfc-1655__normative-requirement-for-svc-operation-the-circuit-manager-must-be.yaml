document: rfc-1655
kind: normative-requirement
summary: For SVC operation, the circuit manager must be able to determine link-layer unreachability within a predictable finite period, start a configurable dead timer on detecting unreachability, attempt to re-establish the link layer, and send a DEAD indication to TCP if the dead timer expires.
section: "9.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
