document: rfc-2131
kind: design-rationale
summary: A separate 'client identifier' option was introduced to decouple the client's logical identity from 'chaddr' (the hardware address), which was previously overloaded in BOOTP both as a transmission address and a client identifier. This allows identifiers such as DNS names or serial numbers that persist across hardware changes.
section: "2"
topics:
