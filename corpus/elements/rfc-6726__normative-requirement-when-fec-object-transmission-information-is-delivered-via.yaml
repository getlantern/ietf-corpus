document: rfc-6726
kind: normative-requirement
summary: When FEC Object Transmission Information is delivered via the FDT, the 'FEC-OTI-FEC-Encoding-ID' attribute and the Codepoint field of all packets for the same TOI MUST be identical. The receiver MUST support FEC OTI delivery via both EXT_FTI and the FDT.
section: "5"
rfc2119_level: MUST
topics:
    - multicast
