document: rfc-6307
kind: normative-requirement
summary: The PW Type field in the PWid FEC element and PW generalized ID FEC elements MUST be set to the 'FC Port Mode' value (0x001F). The C-Bit MUST be set; if it is not set, the pseudowire MUST NOT be established and a Label Release MUST be sent with an 'Illegal C-Bit' status code.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
