document: rfc-7552
kind: protocol-element
summary: To handle duplicate link-local IPv6 next-hop addresses used by multiple peers, the LDP peer mapping logic is extended to use both the IP routing next-hop address (via the LDP peer address database from Address messages) and the IP routing next-hop interface (via the Hello adjacency/interface database from Hello messages) to uniquely identify LDP peers.
