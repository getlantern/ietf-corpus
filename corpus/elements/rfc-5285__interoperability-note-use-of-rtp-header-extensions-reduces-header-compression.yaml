document: rfc-5285
kind: interoperability-note
summary: Use of RTP header extensions reduces header compression efficiency because the extension is sent uncompressed unless the compression module is updated. Intermittent use of extensions (present in some packets but not others) further degrades compression by requiring updates to the fixed header portion.
section: "4.1"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
