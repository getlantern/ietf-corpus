document: rfc-5104
kind: design-rationale
summary: FMT=2 in the RTPFB space is reserved rather than reused because early AVPF implementations may have already deployed this value per an expired draft. Sufficient numbering space exists to avoid reassignment and the potential interoperability problems it would cause.
