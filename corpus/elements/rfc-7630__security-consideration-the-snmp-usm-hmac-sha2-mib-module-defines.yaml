document: rfc-7630
kind: security-consideration
summary: The SNMP-USM-HMAC-SHA2-MIB module defines only OBJECT IDENTIFIER values and no accessible objects, so it has no direct security impact; however, its OID values are used with the usmUserTable in SNMP-USER-BASED-SM-MIB, and the security considerations of RFC 3414 Section 11.5 apply.
section: "9.4"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
