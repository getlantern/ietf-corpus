document: rfc-7655
kind: protocol-element
summary: The G.711.0 Prefix Code octet is the first octet of every G.711.0 frame. It conveys how many G.711 symbols (0, 40, 80, 160, 240, or 320) the decoder must produce; the value 0x00 denotes zero symbols and also serves as the RTP payload padding sentinel.
section: "3.3"
