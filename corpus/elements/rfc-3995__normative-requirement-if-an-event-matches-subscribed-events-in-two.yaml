document: rfc-3995
kind: normative-requirement
summary: If an Event matches Subscribed Events in two different Subscription Objects and would deliver identical notifications to the same Notification Recipient via the same Delivery Method, the Printer MUST deliver both Event Notifications and MUST NOT consolidate them. The Printer MUST NOT reject Subscription Creation Operations that create this scenario.
section: 5.3.3.5.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
