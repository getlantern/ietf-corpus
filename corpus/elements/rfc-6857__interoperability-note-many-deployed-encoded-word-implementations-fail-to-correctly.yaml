document: rfc-6857
kind: interoperability-note
summary: Many deployed encoded-word implementations fail to correctly handle whitespace between adjacent encoded words per RFC 2047. Implementations MAY use overly long encoded words to work around these faulty implementations, but SHOULD provide an optional mechanism to limit line length to 78 characters.
section: "6"
rfc2119_level: SHOULD
topics:
    - email
