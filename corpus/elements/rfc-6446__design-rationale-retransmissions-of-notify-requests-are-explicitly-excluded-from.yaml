document: rfc-6446
kind: design-rationale
summary: Retransmissions of NOTIFY requests are explicitly excluded from all three rate control mechanisms; the mechanisms only apply to the generation of new transactions. This preserves the normal RFC 3261 retransmission behavior without modification.
section: "5.2"
topics:
