document: rfc-5797
kind: normative-requirement
summary: Command names MUST be entered in all uppercase in the registry. For extensions amending a specific command, a plus sign ('+') is appended to the command name. For extensions affecting overall parameter handling not bound to a specific command, '-N/A-' is used.
section: "2.2"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
