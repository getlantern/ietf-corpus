document: rfc-7280
kind: normative-requirement
summary: The range 144-159 decimal (0x80-0x8F hexadecimal) is reserved for Private Use and is not available for IANA allocation. These values may be used for experimental or proprietary purposes without coordination, so uniqueness cannot be guaranteed.
