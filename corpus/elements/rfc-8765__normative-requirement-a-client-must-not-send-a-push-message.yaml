document: rfc-8765
kind: normative-requirement
summary: A client MUST NOT send a PUSH message. If a client does send a PUSH message, or a PUSH message is sent with the QR bit set, this is a fatal error and the receiver MUST forcibly abort the connection immediately.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - dns
