summary: The Extended IS Reachability TLV (type 22) replaces the existing IS Neighbor TLV (type 2) and encodes each neighbor entry as 7 octets of system ID and pseudonode number, 3 octets of default metric (24-bit unsigned integer), 1 octet sub-TLV length, and 0-244 octets of sub-TLVs.
