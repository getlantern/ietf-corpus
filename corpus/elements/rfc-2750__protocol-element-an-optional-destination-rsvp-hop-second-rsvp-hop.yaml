document: rfc-2750
kind: protocol-element
summary: An optional Destination RSVP_HOP (second RSVP_HOP object in the option list) targets POLICY_DATA at a specific policy node. It can emulate unicast delivery in multicast Path messages and guards against replay by scoping the object to the intended recipient.
