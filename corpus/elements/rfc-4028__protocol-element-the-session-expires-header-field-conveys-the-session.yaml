document: rfc-4028
kind: protocol-element
summary: The Session-Expires header field conveys the session interval (delta-seconds) for a SIP session. It is placed only in INVITE or UPDATE requests and 2xx responses to those requests. A compact form 'x' is defined. It includes an optional 'refresher' parameter with value 'uac' or 'uas'.
