document: rfc-2910
kind: normative-requirement
summary: 'When converting an ipp-URL for HTTP transport, a client MUST: (1) change the ''ipp'' scheme to ''http'', and (2) add explicit port 631 if no explicit port is present. The client MUST use the http-URL in the HTTP Request-Line and headers but MUST retain the ipp-URL in the application/ipp operation attribute.'
section: "5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
