document: rfc-3949
kind: protocol-element
summary: An IFD consists of a 2-byte field count, a sequence of 12-byte field entries sorted in ascending tag order, and a 4-byte next-IFD offset (0 if last). All fax profiles represent multi-page documents as a linked list of IFDs with NewSubfileType bit 1 set.
