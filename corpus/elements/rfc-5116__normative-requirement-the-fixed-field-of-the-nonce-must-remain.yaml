document: rfc-5116
kind: normative-requirement
summary: The Fixed field of the nonce MUST remain constant for all nonces generated for a given encryption device. If different devices share a single key, each distinct device MUST use a distinct Fixed field to ensure nonce uniqueness.
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
