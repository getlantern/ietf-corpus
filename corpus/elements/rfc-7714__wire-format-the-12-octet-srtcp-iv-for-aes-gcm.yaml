document: rfc-7714
kind: wire-format
summary: The 12-octet SRTCP IV for AES-GCM is formed by concatenating 2 zero octets, the 4-octet SSRC, 2 zero octets, a single '0' bit, and the 31-bit SRTCP index, then XORing the 12-octet result with the 12-octet encryption salt.
section: "9.1"
