document: rfc-2557
kind: protocol-element
summary: 'Base URI resolution for relative URIs in MIME body parts follows a strict priority order: (a) an in-body base specification such as HTML BASE, (b) an absolute Content-Location in the immediately surrounding heading, (c) recursive search up enclosing multipart headings, (d) the HTTP request URI if applicable, and (e) ''thismessage:/'' as the mandatory fallback.'
section: "5"
topics:
