document: rfc-3641
kind: wire-format
summary: 'Variant encodings override normal structural encodings for specific named types: RDNSequence (distinguished name) is encoded as a quoted LDAPDN string per RFC 2253, RelativeDistinguishedName (standalone) is encoded as a quoted name-component string per RFC 2253, and ORAddress is encoded as a quoted IA5String per RFC 2156.'
