document: rfc-2381
kind: protocol-element
summary: 'In TM/UNI 4.0 three ATM QoS parameters may be individually signalled: Cell Loss Ratio (CLR), Cell Transfer Delay (CTD), and Cell Delay Variation (CDV). QoS Class is set to 0 for UBR/ABR (REQUIRED), 1 for CBR/rtVBR, and 3 for nrtVBR.'
