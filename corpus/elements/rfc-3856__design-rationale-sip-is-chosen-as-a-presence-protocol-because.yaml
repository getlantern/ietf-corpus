document: rfc-3856
kind: design-rationale
summary: SIP is chosen as a presence protocol because SIP location services already contain presence information in the form of registrations, and SIP networks can route SUBSCRIBE requests to the server holding registration state. This allows SIP infrastructure to be reused for global presence subscription connectivity without additional routing infrastructure.
