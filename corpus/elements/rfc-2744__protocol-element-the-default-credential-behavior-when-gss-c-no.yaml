document: rfc-2744
kind: protocol-element
summary: 'The default credential behavior when GSS_C_NO_CREDENTIAL is passed follows a four-step fallback: (1) sole authorized principal, (2) platform default network identity, (3) mapped default local identity, (4) user-configurable default. The same four-step logic applies separately for gss_init_sec_context and gss_accept_sec_context.'
section: "3.5"
topics:
    - security
