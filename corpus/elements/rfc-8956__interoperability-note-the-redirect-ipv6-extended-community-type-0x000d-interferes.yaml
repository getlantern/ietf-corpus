document: rfc-8956
kind: interoperability-note
summary: The Redirect IPv6 Extended Community (Type 0x000d) interferes with all BGP Flow Specification redirect Traffic Filtering Actions, including itself and those specified in RFC 8955 Section 7.4. Multiple conflicting redirect actions cannot be applied simultaneously.
section: "6.1"
topics:
    - bgp
    - routing
    - ip
