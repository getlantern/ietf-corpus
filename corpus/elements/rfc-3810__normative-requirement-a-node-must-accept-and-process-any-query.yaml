document: rfc-3810
kind: normative-requirement
summary: A node MUST accept and process any Query whose IP Destination Address contains any address (unicast or multicast) assigned to the receiving interface, even if the address differs from the standard query destination. Similarly for version 1 Reports.
section: 5.1.15
rfc2119_level: MUST
topics:
    - multicast
    - ip
