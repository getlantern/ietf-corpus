document: rfc-3927
kind: normative-requirement
summary: A host MUST test whether a selected IPv4 Link-Local address is already in use before using it. Specifically, before using the address as a source address in any IPv4 or ARP packet, the host MUST perform ARP probing as described in Section 2.2.1.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
