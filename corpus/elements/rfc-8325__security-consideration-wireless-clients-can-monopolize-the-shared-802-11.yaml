document: rfc-8325
kind: security-consideration
summary: Wireless clients can monopolize the shared 802.11 medium by flooding traffic marked to preferred UP values (4–7), causing WLAN DoS for voice and video classes. CS6 or CS7 floods are especially dangerous as they also starve wired-network routing-protocol queues, causing IP network instability.
section: "8.2"
topics:
