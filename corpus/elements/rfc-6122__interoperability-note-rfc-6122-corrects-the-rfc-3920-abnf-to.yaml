document: rfc-6122
kind: interoperability-note
summary: RFC 6122 corrects the RFC 3920 ABNF to require IPv6 addresses in domainparts to be enclosed in square brackets (consistent with RFC 3986), which was not the case in RFC 3920. It also fixes zero-length localpart/domainpart/resourcepart prevention and requires the UseSTD3ASCIIRules flag in Nameprep.
section: C
