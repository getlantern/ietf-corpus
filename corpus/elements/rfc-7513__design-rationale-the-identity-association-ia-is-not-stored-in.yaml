document: rfc-7513
kind: design-rationale
summary: 'The Identity Association (IA) is not stored in the BST for three reasons: each address within an IA has its lease assigned separately; when a binding is set up via data snooping the IA cannot be recovered from leasequery; and DHCPv4 does not define an IA concept.'
