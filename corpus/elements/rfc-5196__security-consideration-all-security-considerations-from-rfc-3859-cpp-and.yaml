document: rfc-5196
kind: security-consideration
summary: All security considerations from RFC 3859 (CPP) and RFC 3863 (PIDF) apply. Compared to baseline PIDF, this extension may reveal additional sensitive information about a user's service and device capabilities, so the PUA SHOULD always obtain permission from the presentity before publishing such information.
