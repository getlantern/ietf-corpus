document: rfc-5970
kind: security-consideration
summary: In untrusted networks, a rogue DHCPv6 server can send fraudulent boot options causing clients to boot an incorrect or malicious operating system. Clients SHOULD use DHCPv6 message authentication (RFC 3315 Section 21) to mitigate this threat.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - realtime
