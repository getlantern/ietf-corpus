document: rfc-1655
kind: design-rationale
summary: When all routers in an AS are BGP speakers (pervasive BGP), no BGP-IGP interaction is needed. The IGP is used only for intra-AS routing, and because all routers already have full BGP route information, routes may be advertised without waiting for IGP convergence.
section: A.2.4
topics:
    - bgp
    - routing
