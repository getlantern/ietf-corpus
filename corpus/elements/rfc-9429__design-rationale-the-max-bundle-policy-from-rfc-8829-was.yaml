document: rfc-9429
kind: design-rationale
summary: The 'max-bundle' policy from RFC 8829 was deprecated and replaced by the identically defined 'must-bundle' because some implementations had applied an earlier pre-standard definition (not marking 'm=' sections as bundle-only), causing unexpected breakage for applications relying on that behavior.
section: "1.3"
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
