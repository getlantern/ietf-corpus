document: rfc-7263
kind: normative-requirement
summary: If a responding peer receives a request with SRR as the preferred routing mode, or it fails to establish a direct connection to the sending peer, the responding peer SHOULD NOT use DRR but instead switch to SRR.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - routing
