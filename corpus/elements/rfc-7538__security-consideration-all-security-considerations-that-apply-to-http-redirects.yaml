document: rfc-7538
kind: security-consideration
summary: All security considerations that apply to HTTP redirects (RFC 7231 Section 9) apply to the 308 status code. Unsecured communication is subject to man-in-the-middle modification, including changing status codes or redirect targets; use of TLS is recommended to mitigate such attacks.
section: "5"
topics:
