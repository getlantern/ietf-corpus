document: rfc-5475
kind: security-consideration
summary: A user can determine the start and stop triggers of time-based systematic Sampling by sending test packets, enabling them to modify their send schedule so their packets are disproportionately selected or avoided. A cryptographically strong PRNG should be used for random Sampling to prevent prediction of selection decisions.
section: "9"
topics:
