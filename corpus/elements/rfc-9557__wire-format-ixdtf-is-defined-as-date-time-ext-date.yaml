document: rfc-9557
kind: wire-format
summary: IXDTF is defined as date-time-ext = date-time suffix, where suffix = [time-zone] *suffix-tag. A time-zone is '[' [critical-flag] (time-zone-name / time-numoffset) ']'; a suffix-tag is '[' [critical-flag] suffix-key '=' suffix-values ']'; critical-flag is the optional '!' character immediately after the opening bracket.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
