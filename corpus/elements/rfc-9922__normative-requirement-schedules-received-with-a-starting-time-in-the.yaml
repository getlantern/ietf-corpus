document: rfc-9922
kind: normative-requirement
summary: Schedules received with a starting time in the past SHOULD be ignored. An implementation MAY omit past occurrences and start immediately (for period-based schedules) or start from when the recurrence pattern is first satisfied from the current time (for recurrence-based schedules).
section: "4"
rfc2119_level: SHOULD
topics:
