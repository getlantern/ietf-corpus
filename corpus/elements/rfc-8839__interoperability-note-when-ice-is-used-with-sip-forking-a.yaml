document: rfc-8839
kind: interoperability-note
summary: When ICE is used with SIP forking, a single offer may produce multiple answers. ICE proceeds independently for each offer/answer pair with its own candidates, checklists, and state. The connectivity checks' username fragments correlate media streams to the specific callee.
