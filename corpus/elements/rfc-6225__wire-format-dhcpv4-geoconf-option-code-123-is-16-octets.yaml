kind: wire-format
summary: 'DHCPv4 GeoConf Option (code 123) is 16 octets: 8-bit code, 8-bit length, 6-bit LaRes (latitude resolution), 34-bit Latitude, 6-bit LoRes (longitude resolution), 34-bit Longitude, 4-bit AType, 6-bit AltRes (altitude resolution), 30-bit Altitude, 5-bit Res, 3-bit Datum. Uses resolution rather than uncertainty fields.'
