document: rfc-4293
kind: protocol-element
summary: ipSystemStatsDiscontinuityTime records the sysUpTime of the most recent counter discontinuity event (e.g., system re-initialization or interface cycling). ipSystemStatsRefreshRate provides the minimum recommended polling interval in milliseconds for the counters in that row.
