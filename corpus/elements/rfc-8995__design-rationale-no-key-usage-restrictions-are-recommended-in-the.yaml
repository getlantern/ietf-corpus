document: rfc-8995
kind: design-rationale
summary: No key usage restrictions are RECOMMENDED in the IDevID certificate because these long-lived certificates (intended to last the device's lifetime) would be permanently limited by any restrictions added at manufacture time. RFC 5280 Section 4.2.1.3 does not require key usage restrictions for end-entity certificates, and 802.1AR acknowledges that restrictions limit applicability.
section: "2.3"
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
