document: rfc-8629
kind: normative-requirement
summary: When the Reset Action is received in a Session Update Message, a modem MUST clear all control actions previously processed on a device-wide basis; when received in a Link Characteristics Request Message, it MUST clear all control actions for the indicated destination.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
