document: rfc-6736
kind: security-consideration
summary: DNCA Diameter peers SHOULD verify their identity during the Capabilities Exchange Request procedure. A NAT device SHOULD verify that an NCR-issuing peer is authorized based on the peer's identity, the NCR command type, and the NCR content, to prevent unauthorized NAT binding creation or manipulation.
section: "5.1"
topics:
    - security
    - nat
    - diameter
