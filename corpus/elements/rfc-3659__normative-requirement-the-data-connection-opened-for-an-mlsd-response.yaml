document: rfc-3659
kind: normative-requirement
summary: The data connection opened for an MLSD response SHALL use TYPE L 8, MODE S, and STRU F, regardless of the FTP transfer settings actually in effect, and without altering those settings for future commands.
section: "7.2"
rfc2119_level: MUST
