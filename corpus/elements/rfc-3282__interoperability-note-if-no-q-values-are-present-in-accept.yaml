document: rfc-3282
kind: interoperability-note
summary: If no Q values are present in Accept-Language, language-ranges are treated as ordered by priority with the leftmost being most preferred. This is an extension to HTTP/1.1 rules but matches existing practice. When Q values are present, HTTP/1.1 (RFC 2616) evaluation rules apply.
section: "3"
