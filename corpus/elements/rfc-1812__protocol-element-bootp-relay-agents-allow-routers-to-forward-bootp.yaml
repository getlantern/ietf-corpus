document: rfc-1812
kind: protocol-element
summary: BOOTP Relay Agents allow routers to forward BOOTP/DHCP requests from clients on one subnet to a BOOTP server on another subnet. The relay agent fills in the 'giaddr' field with the interface address and forwards the request; servers use this field to assign appropriate addresses.
section: 9.1.2
topics:
