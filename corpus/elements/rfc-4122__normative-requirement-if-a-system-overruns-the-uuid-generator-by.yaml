document: rfc-4122
kind: normative-requirement
summary: If a system overruns the UUID generator by requesting too many UUIDs within a single system time interval, the UUID service MUST either return an error or stall the UUID generator until the system clock catches up.
section: 4.2.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
