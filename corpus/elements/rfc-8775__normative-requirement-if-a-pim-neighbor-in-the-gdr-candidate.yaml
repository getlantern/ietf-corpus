document: rfc-8775
kind: normative-requirement
summary: If a PIM neighbor in the GDR Candidate list expires, stops announcing DRLB-Cap, changes DR priority or hash algorithm, the DR SHOULD immediately send a triggered hello with an updated DRLB-List excluding that neighbor.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - multicast
    - realtime
