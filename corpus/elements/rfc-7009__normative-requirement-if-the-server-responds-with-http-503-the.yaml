document: rfc-7009
kind: normative-requirement
summary: If the server responds with HTTP 503, the client must assume the token still exists and may retry after a reasonable delay. The server may include a 'Retry-After' header to indicate unavailability duration.
section: 2.2.1
rfc2119_level: MUST
topics:
    - oauth
    - http
