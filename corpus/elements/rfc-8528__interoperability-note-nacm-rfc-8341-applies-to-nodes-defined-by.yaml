document: rfc-8528
kind: interoperability-note
summary: NACM (RFC 8341) applies to nodes defined by the mounted schema in the same way as for top-level schema nodes. NACM path expressions can traverse into mounted schema subtrees using standard XPath notation that includes the mount point container.
