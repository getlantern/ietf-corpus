document: rfc-8587
kind: normative-requirement
summary: Fetching file system location information SHOULD be performed using RPCSEC_GSS with integrity protection. Without integrity protection, returned location data may be corrupted in transit, potentially directing the client to an unverified or hostile server.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
