document: rfc-2056
kind: security-consideration
summary: The two Z39.50 URL schemes are subject to the same security implications as the general URL scheme (RFC 1738). A locator might no longer point to the originally intended object, and it may be possible to construct a URL such that an attempt to perform a harmless idempotent retrieval in fact causes a possibly damaging remote operation to occur.
section: "6"
topics:
    - security
