document: rfc-8513
kind: design-rationale
summary: The DS-Lite YANG module is designed as augmentations of the existing Interfaces (RFC 8343) and NAT (RFC 8512) YANG modules rather than a standalone module, because AFTR is a combination of an IPv4-in-IPv6 tunnel and NAPT function. This avoids duplicating existing data models and reuses standard YANG building blocks.
