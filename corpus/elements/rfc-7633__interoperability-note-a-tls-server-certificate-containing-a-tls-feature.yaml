document: rfc-7633
kind: interoperability-note
summary: A TLS server certificate containing a TLS feature extension MAY be used with any TLS server that supports the specified features; the server itself need not provide support for processing the TLS feature extension, though such support reduces administrative error risk.
section: 4.3.2
topics:
