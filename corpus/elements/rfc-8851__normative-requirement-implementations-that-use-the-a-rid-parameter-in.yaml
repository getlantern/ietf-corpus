document: rfc-8851
kind: normative-requirement
summary: Implementations that use the 'a=rid' parameter in SDP MUST support the RtpStreamId SDES item described in RFC 8852, and MUST send that SDES item for all streams in an SDP media description that have 'a=rid' lines remaining after applying the offer/answer rules.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - webrtc
    - realtime
