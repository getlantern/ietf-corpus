document: rfc-8861
kind: protocol-element
summary: The 'a=rtcp-rgrp' SDP attribute is a property attribute (no value) used at session or media level to indicate that the participant supports and is willing to receive RTCP Reporting Group extensions. Its multiplexing category is IDENTICAL, meaning it applies at the RTP session level.
section: "3.6"
topics:
    - rtp
    - realtime
