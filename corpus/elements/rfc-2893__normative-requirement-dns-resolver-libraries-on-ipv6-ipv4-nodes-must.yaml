document: rfc-2893
kind: normative-requirement
summary: DNS resolver libraries on IPv6/IPv4 nodes MUST be capable of handling both A6/AAAA and A records. An implementation MUST allow the application to control whether DNS result filtering (returning only IPv4, only IPv6, or both addresses) takes place.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
