document: rfc-5686
kind: design-rationale
summary: The G.711 u-law bitstream (Layer a) is always embedded as the UEMCLIP core layer, reducing transcoding from UEMCLIP to G.711 to a simple bitstream extraction rather than full decode/re-encode. This is intended to minimize transcoding cost in RTCP-terminating MCUs where narrowband and wideband terminals coexist.
