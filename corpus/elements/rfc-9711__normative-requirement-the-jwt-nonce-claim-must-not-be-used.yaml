document: rfc-9711
kind: normative-requirement
summary: The JWT 'nonce' claim MUST NOT be used in EAT because it does not support multiple nonces. EAT defines 'eat_nonce' instead, which supports arrays for multistage verification.
section: "4.1"
rfc2119_level: MUST NOT
