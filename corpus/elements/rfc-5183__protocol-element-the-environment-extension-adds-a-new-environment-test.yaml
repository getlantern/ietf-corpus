document: rfc-5183
kind: protocol-element
summary: The 'environment' extension adds a new 'environment' test to Sieve that retrieves a named item of environment information and matches it against a key-list. The test succeeds if a match occurs; the default match type is ':is' and the default comparator is 'i;ascii-casemap'.
section: "4"
