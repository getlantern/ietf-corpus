document: rfc-6544
kind: wire-format
summary: 'TCP candidates are encoded in a=candidate lines with the transport set to ''TCP'' and a mandatory tcptype extension attribute: ''tcptype'' SP tcp-type where tcp-type is ''active'', ''passive'', or ''so''. The connection-address for active candidates MUST be a valid IP but the port(s) MUST be set to 9 (Discard) because the port is meaningless for active candidates.'
section: "4.5"
topics:
    - tcp
    - nat
