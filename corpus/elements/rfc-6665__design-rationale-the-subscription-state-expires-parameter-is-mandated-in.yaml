document: rfc-6665
kind: design-rationale
summary: The Subscription-State 'expires' parameter is mandated in active/pending NOTIFY requests (a change from RFC 3265's discretionary inclusion) because without it, forked SUBSCRIBE responses may not reach the subscriber, leaving it without authoritative subscription duration information.
section: 4.2.2
topics:
    - sip
    - realtime
