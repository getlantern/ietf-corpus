document: rfc-7718
kind: design-rationale
summary: No attempt is made to keep the OWAMP and TWAMP Modes registries synchronized, because one-way and two-way measurement configurations have inherent differences and may need different features. The sole exception is bit position 3, which is reserved in OWAMP to allow future alignment with a potential mixed-security mode analogous to RFC 5618 for TWAMP.
section: 3.2.4
topics:
    - measurement
    - registry
