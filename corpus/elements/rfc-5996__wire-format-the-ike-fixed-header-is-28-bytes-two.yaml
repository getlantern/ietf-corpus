document: rfc-5996
kind: wire-format
summary: 'The IKE fixed header is 28 bytes: two 8-octet SPIs (Initiator SPI first, Responder SPI second), 1-octet Next Payload type, 1-octet major/minor version, 1-octet Exchange Type, 1-octet Flags (bits: Initiator, Version, Response), 4-octet Message ID, 4-octet total message Length.'
