kind: protocol-element
summary: The 'timeQuality' SD-ID allows an originator to describe the trustworthiness of its TIMESTAMP, using the optional parameters 'tzKnown' (1=known, 0=unknown), 'isSynced' (1=synchronized to external source), and 'syncAccuracy' (maximum microseconds offset; only valid when isSynced=1).
