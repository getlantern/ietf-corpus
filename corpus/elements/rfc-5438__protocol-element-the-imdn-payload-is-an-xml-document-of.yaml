document: rfc-5438
kind: protocol-element
summary: The IMDN payload is an XML document of MIME type 'message/imdn+xml' with root element <imdn>, containing mandatory sub-elements <message-id> and <datetime>, optional <recipient-uri>, <original-recipient-uri>, <subject>, and exactly one of <delivery-notification>, <processing-notification>, or <display-notification>, each with a mandatory <status> child.
