document: rfc-8863
kind: normative-requirement
summary: ICE agents MAY use the PAC timer to serve as an end-of-candidates fallback when using Trickle ICE, since sending an end-of-candidates indication is only a SHOULD-strength requirement and agents need a backup mechanism.
