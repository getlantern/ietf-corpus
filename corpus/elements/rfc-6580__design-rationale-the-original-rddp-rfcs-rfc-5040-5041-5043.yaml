document: rfc-6580
kind: design-rationale
summary: The original RDDP RFCs (RFC 5040, 5041, 5043, 5044) did not create IANA registries. Protocol extensions (RFC 6581 and RMP-EXT) require registry-based code point allocation, motivating the retroactive creation of these five registries.
