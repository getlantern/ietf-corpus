document: rfc-4380
kind: wire-format
summary: 'Authentication encapsulation is a variable-length header: 0x00 0x01 (type indicator), ID-len (1 octet), AU-len (1 octet), client identifier (ID-len bytes), authentication value (AU-len bytes), 8-octet nonce, and 1-octet confirmation byte. Both ID-len and AU-len may be zero if no explicit authentication is required.'
section: 5.1.1
topics:
