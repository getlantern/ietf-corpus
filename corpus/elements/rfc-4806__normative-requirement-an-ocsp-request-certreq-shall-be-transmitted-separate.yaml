document: rfc-4806
kind: normative-requirement
summary: An OCSP request CERTREQ SHALL be transmitted separate from any other CERTREQ payloads in an IKEv2 exchange, because there is no means to indicate which trust anchor hash (if any) relates to a trusted OCSP responder.
section: "4.1"
rfc2119_level: SHALL
topics:
