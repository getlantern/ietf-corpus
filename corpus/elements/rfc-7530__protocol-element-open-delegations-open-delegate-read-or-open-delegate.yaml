document: rfc-7530
kind: protocol-element
summary: Open delegations (OPEN_DELEGATE_READ or OPEN_DELEGATE_WRITE) allow the server to grant a client guaranteed semantics for file sharing. A read delegation assures no other client can write; a write delegation assures no other client has read or write access. Delegations are recalled via the CB_RECALL callback when conflicts arise.
section: "10.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
