document: rfc-5258
kind: protocol-element
summary: The \NonExistent attribute indicates that a mailbox name does not refer to an existing mailbox. It implies \NoSelect, MUST be supported, and MUST be accurately computed. It is only returned when the mailbox also satisfies selection criteria or has qualifying descendants under RECURSIVEMATCH.
section: "3"
topics:
    - email
