document: rfc-7563
kind: interoperability-note
summary: If the MAG included ANI sub-options in its PBU but receives a successful PBA without an ANI option, the MAG may log the event and, based on local policy, terminate the mobility session, indicating the LMA does not understand the ANI option.
section: "4.1"
topics:
    - mobility
    - ip
