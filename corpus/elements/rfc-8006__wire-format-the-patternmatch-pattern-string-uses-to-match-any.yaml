document: rfc-8006
kind: wire-format
summary: The PatternMatch pattern string uses '*' to match any sequence of pchar or '/' characters and '?' to match exactly one pchar; literals '$', '*', and '?' MUST be escaped as '$$', '$*', and '$?'. Default matching is case-insensitive.
