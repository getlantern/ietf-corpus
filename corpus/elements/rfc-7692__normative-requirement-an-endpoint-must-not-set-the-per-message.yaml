document: rfc-7692
kind: normative-requirement
summary: An endpoint MUST NOT set the 'Per-Message Compressed' bit on control frames or on non-first fragments of a data message. An endpoint receiving such a frame MUST Fail the WebSocket Connection.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - websocket
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
