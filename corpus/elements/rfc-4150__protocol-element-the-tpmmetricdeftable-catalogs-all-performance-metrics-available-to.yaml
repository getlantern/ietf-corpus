document: rfc-4150
kind: protocol-element
summary: The tpmMetricDefTable catalogs all performance metrics available to the agent. Each entry carries a type (other, connectMetric, delayMetric, lossMetric), directional classification (oneWay, twoWay, multiWay), a textual name, a de-referencable URL to the defining document, and an OBJECT IDENTIFIER cross-referencing the IPPM-REGISTRY-MIB.
