document: rfc-6911
kind: normative-requirement
summary: The Delegated-IPv6-Prefix-Pool Attribute name SHOULD be used to select an IPv6 delegated prefix for the user. If a NAS does not support prefix pools, the NAS MUST ignore this Attribute.
section: "3.4"
rfc2119_level: MUST
