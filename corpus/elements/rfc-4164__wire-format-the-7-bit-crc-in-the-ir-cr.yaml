document: rfc-4164
kind: wire-format
summary: The 7-bit CRC in the IR-CR packet is calculated over all octets of the entire original header before replication, using CRC polynomial C(x) = 1 + x + x^2 + x^3 + x^6 + x^7, with the CRC register preset to all 1's.
section: 3.5.1.1
extracted_by: claude-sonnet-4-6
