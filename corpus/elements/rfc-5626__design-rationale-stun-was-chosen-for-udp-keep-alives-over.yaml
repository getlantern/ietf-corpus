document: rfc-5626
kind: design-rationale
summary: STUN was chosen for UDP keep-alives over SIP-request-based approaches because the SIP Working Group concluded that achieving both good performance and full backwards compatibility with SIP-based keep-alives were mutually exclusive goals. STUN is robust and can detect changed IP address and port mappings.
