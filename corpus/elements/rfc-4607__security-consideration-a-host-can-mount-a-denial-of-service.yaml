document: rfc-4607
kind: security-consideration
summary: A host can mount a denial-of-service attack by requesting a large number of SSM subscriptions, creating router state, generating control traffic, and potentially attracting unwanted data traffic. Routers MAY limit subscription rates or total subscriptions per interface.
section: "7.3"
topics:
    - multicast
    - security
