document: rfc-9347
kind: normative-requirement
summary: If the responder accepts the USE_AGGFRAG request, the IKEv2 response MUST also include a USE_AGGFRAG notification. If AGGFRAG is unacceptable to the initiator and the SA is established without it, the initiator MUST delete the Child SA.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
