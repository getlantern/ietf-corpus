document: rfc-9801
kind: protocol-element
summary: 'Three new SRv6 ''Endpoint with decapsulation and bit-stream cross-connect'' behaviors are defined: End.DX1, End.DX1 with NEXT-CSID, and End.DX1 with REPLACE-CSID. They are variants of End.DX2: when the upper-layer header type is 147 (bit-stream), the outer IPv6 header and extensions are removed and the frame is forwarded to the associated CE-bound IWF.'
section: 5.1.1
topics:
    - ip
    - routing
