document: rfc-7015
kind: design-rationale
summary: No new aggregation-specific timestamp Information Elements are introduced because Aggregated Flows are simply IPFIX Flows and existing timestamp IEs (e.g., flowStartMilliseconds, flowEndNanoseconds) are fully sufficient for expressing aggregation intervals.
