document: rfc-1827
kind: design-rationale
summary: Key management is intentionally decoupled from the ESP security protocol. The only coupling between key management and ESP is through the SPI, permitting multiple key management mechanisms and allowing key management protocols to be changed or corrected without impacting ESP implementations.
section: "2"
