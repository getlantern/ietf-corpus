document: rfc-3471
kind: security-consideration
summary: RFC 3471 introduces no new security considerations beyond those already present in RFC 3209 (RSVP-TE) and RFC 3212 (CR-LDP). Security considerations for the GMPLS-specific protocol forms are addressed in RFC 3473 (RSVP-TE extensions) and RFC 3472 (CR-LDP extensions) respectively.
