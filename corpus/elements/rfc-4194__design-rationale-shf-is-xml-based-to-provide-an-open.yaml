document: rfc-4194
kind: design-rationale
summary: SHF is XML-based to provide an open, modern, transport- and vendor-neutral format, in contrast to existing formats such as Motorola S-records which are not truly open or well-defined. XML was chosen to make the format accessible to simple tools while supporting complex data structures.
section: "1"
