document: rfc-9864
kind: design-rationale
summary: RSA signing algorithms (RS256/RS384/RS512 and PS*) are not updated because there is disagreement about whether they are already fully specified—they operate on keys of varying sizes (e.g., 2048-bit vs 4096-bit). FIPS-compliant HSMs restrict RSA key parameters, suggesting a possible future approach, but no registration is made here.
section: "6.1"
topics:
