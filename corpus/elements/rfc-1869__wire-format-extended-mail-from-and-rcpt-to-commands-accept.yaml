document: rfc-1869
kind: wire-format
summary: Extended MAIL FROM and RCPT TO commands accept esmtp-parameters of the form 'esmtp-keyword ["=" esmtp-value]', where esmtp-keyword is alphanumeric-plus-hyphen and esmtp-value excludes '=', SP, and control characters.
