document: rfc-1225
kind: security-consideration
summary: The RPOP command relies on trusted-host authentication (privileged source port + .rhosts-style checks), which the document notes has 'allowed much wider penetration into numerous hosts on local networks (and sometimes remote networks) by those who gain illegal access to computers by guessing passwords or otherwise breaking into the system.'
section: Optional POP3 Commands
