document: rfc-9644
kind: protocol-element
summary: 'The ''transport-params-grouping'' grouping configures four ordered (ordered-by user) leaf-lists of acceptable SSH algorithms: host-key-alg, key-exchange-alg, encryption-alg, and mac-alg, each in decreasing order of preference. If a leaf-list has zero elements, acceptable algorithms are implementation-defined.'
section: 2.1.2.1
topics:
    - yang
    - netconf
    - crypto
