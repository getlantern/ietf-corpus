document: rfc-6610
kind: protocol-element
summary: OPTION_MIP6_HNIDF (code 49) is a new DHCPv6 option used by mobile nodes to communicate an FQDN identifying the target home network for which configuration is requested. When a server responds with an Identified Home Network Information option, this option MUST be encapsulated within it to identify the home network.
section: "3.1"
topics:
    - dns
    - mobility
    - ip
