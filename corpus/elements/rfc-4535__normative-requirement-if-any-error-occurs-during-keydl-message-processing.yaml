document: rfc-4535
kind: normative-requirement
summary: If any error occurs during KeyDL message processing, regardless of Terse or Verbose Mode, the registration session MUST be terminated, the GM MUST send a Key Download Ack/Failure message, and all saved state information MUST be cleared.
section: 5.2.1.2
rfc2119_level: MUST
topics:
    - security
