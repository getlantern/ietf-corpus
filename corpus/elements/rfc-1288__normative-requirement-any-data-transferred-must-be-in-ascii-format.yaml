document: rfc-1288
kind: normative-requirement
summary: Any data transferred MUST be in ASCII format, with no parity, and with lines ending in CRLF (ASCII 13 followed by ASCII 10). Characters between ASCII 128 and 255 should truly be international data, not 7-bit ASCII with the parity bit set.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
