document: rfc-4340
kind: wire-format
summary: The Acknowledgement Number Subheader follows the generic header on all packet types except DCCP-Request and DCCP-Data. When X=1 it is 8 bytes (16-bit Reserved + 48-bit Ack Number); when X=0 it is 4 bytes (8-bit Reserved + 24-bit Ack Number).
section: "5.1"
