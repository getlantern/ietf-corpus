document: rfc-3910
kind: interoperability-note
summary: Implementations MUST support the base XML schema (Section 9) to ensure interoperability. Richer event sets MAY be supported via additional XML namespaces; if an unknown extension is received, a SPIRITS subscriber MUST search for mandatory elements which MUST be present in all notification schemas.
section: "3"
topics:
