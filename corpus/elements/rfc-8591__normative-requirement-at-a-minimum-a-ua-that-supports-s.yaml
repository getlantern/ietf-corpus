document: rfc-8591
kind: normative-requirement
summary: At a minimum, a UA that supports S/MIME MUST be able to validate a signed message. UAs that wish to indicate support for validating clear-signed message signatures MUST also indicate support for application/pkcs7-signature.
section: "6"
rfc2119_level: MUST
topics:
