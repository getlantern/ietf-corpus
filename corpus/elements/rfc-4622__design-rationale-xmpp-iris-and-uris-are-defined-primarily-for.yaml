document: rfc-4622
kind: design-rationale
summary: XMPP IRIs and URIs are defined primarily for non-native interfaces (web browsers, databases, calendaring applications) for identification rather than interaction, since native XMPP addresses must not be prepended with a URI scheme on the XMPP network itself.
section: "2.1"
