document: rfc-8092
kind: wire-format
summary: 'Each BGP Large Community value is encoded as a 12-octet quantity comprising three 32-bit fields: Global Administrator (4 octets, a namespace identifier), Local Data Part 1 (4 octets, operator-defined), and Local Data Part 2 (4 octets, operator-defined). The attribute as a whole is an unordered set of one or more such 12-octet values.'
