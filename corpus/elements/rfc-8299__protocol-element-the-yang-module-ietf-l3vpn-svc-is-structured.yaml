document: rfc-8299
kind: protocol-element
summary: 'The YANG module `ietf-l3vpn-svc` is structured around two top-level containers: `vpn-services` (holding global VPN parameters per customer) and `sites` (holding customer site definitions including network accesses, routing, security, and service parameters). A supplementary `vpn-profiles` container holds valid provider-supplied identifiers such as cloud, encryption, QoS, and BFD profile references.'
