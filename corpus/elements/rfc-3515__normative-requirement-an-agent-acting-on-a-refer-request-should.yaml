document: rfc-3515
kind: normative-requirement
summary: An agent acting on a REFER request SHOULD NOT issue a CANCEL to any referenced SIP requests because the agent sending the REFER terminated its subscription to the refer event before the referenced request completes.
section: 2.4.4
rfc2119_level: SHOULD NOT
topics:
