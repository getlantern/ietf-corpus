document: rfc-4171
kind: state-machine
summary: A backup iSNS server transitions to the active role when it loses connectivity to the active server and all higher-precedence backups; it reverts to backup when a higher-precedence server returns and confirms the database is synchronized before demotion.
section: "2.8"
