document: rfc-2348
kind: protocol-element
summary: The 'blksize' option value ('#octets') specifies the number of data octets per block in ASCII decimal. Valid values range from 8 to 65464 octets inclusive. This count excludes the 4-octet TFTP header.
section: Blocksize Option Specification
