document: rfc-7946
kind: normative-requirement
summary: 'A linear ring (closed LineString boundary of a Polygon) MUST follow the right-hand rule with respect to the area it bounds: exterior rings are counterclockwise and holes are clockwise. For backwards compatibility, parsers SHOULD NOT reject Polygons that do not follow this rule.'
section: 3.1.6
rfc2119_level: MUST
topics:
