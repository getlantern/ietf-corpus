document: rfc-7648
kind: interoperability-note
summary: Recursion termination can be achieved by detecting that the external address is a public routable address (not RFC 1918 or RFC 6598 private space), by absence of configured PCP servers, by an unresponsive default router, or by the upstream device not embedding a PCP proxy.
section: "3.2"
topics:
