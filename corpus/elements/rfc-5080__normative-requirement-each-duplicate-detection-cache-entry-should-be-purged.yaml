document: rfc-5080
kind: normative-requirement
summary: Each duplicate-detection cache entry SHOULD be purged after no less than 5 seconds and no more than 30 seconds. Cache entries MUST also be purged when a valid Access-Request arrives matching source address, source port, Identifier, and socket but with a different Request Authenticator.
section: 2.2.2
rfc2119_level: MUST
topics:
    - radius
