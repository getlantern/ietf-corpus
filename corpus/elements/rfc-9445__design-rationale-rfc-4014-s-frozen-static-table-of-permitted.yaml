document: rfc-9445
kind: design-rationale
summary: RFC 4014's frozen static table of permitted RADIUS attributes was replaced with a registry-based approach because the static list is suboptimal when new services (e.g., encrypted DNS) require passing new RADIUS attributes through the DHCP relay-server path.
section: "4.1"
topics:
    - radius
