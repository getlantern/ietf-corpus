document: rfc-5870
kind: normative-requirement
summary: When altitude is unknown, the <altitude> component (and the preceding comma) MUST NOT be present in the URI. Unknown altitude MUST NOT be represented by setting <altitude> to '0' or any other arbitrary value.
section: 3.4.2
rfc2119_level: MUST NOT
