document: rfc-4006
kind: protocol-element
summary: The G-S-U-Pool-Reference AVP (Code 457) is a grouped AVP that associates a granted quota with a credit pool. It contains G-S-U-Pool-Identifier and a unit multiplier that translates service-specific units to abstract pool units, enabling multiple services to draw from a shared reservation.
