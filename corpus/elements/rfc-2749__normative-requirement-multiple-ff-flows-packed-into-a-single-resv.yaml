document: rfc-2749
kind: normative-requirement
summary: Multiple FF flows packed into a single Resv message must be unpacked, with a separate COPS request issued for each packed flow as if it were an individual RSVP message. Each request should include all POLICY_DATA objects from the packed message by default.
section: "3.1"
rfc2119_level: MUST
topics:
    - qos
