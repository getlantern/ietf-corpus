document: rfc-4711
kind: security-consideration
summary: Misconfiguration of raqmonConfigRDSTimeout (too low causes premature session termination; too high wastes memory), the exception threshold objects (flooding or suppressing notifications), and raqmonConfigPort (blocking PDU reception) can degrade collector operation. SET access should be restricted in non-secure environments.
section: "6"
topics:
