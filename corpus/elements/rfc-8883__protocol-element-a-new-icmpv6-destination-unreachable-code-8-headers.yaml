document: rfc-8883
kind: protocol-element
summary: A new ICMPv6 Destination Unreachable code 8 ('Headers too long') is defined for aggregate header limit errors. A multi-part ICMPv6 message format (per RFC 4884) is used, with a new 'Extended Information' extension object containing a Pointer sub-type to identify the exceeding octet offset.
