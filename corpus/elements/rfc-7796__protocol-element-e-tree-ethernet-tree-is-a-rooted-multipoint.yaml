document: rfc-7796
kind: protocol-element
summary: E-Tree (Ethernet Tree) is a Rooted-Multipoint EVC service where frames from a root may be received by any other root or leaf, but frames from a leaf may be received by any root and must not be received by another leaf. The service may include multiple roots and multiple leaves.
section: "1"
topics:
