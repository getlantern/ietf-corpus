document: rfc-4422
kind: normative-requirement
summary: Unless explicitly permitted by the protocol specification, only one successful SASL authentication exchange may occur in a protocol session; further attempts to initiate an authentication exchange MUST fail after a successful exchange.
section: "3.8"
rfc2119_level: MUST
