document: rfc-6002
kind: interoperability-note
summary: Transit and egress nodes not supporting the Generalized Channel_Set Label formats will return a PathErr with error code 'Unknown object C_Type' per RFC 3209 upon receiving a Path message with the Generalized Channel_Set LABEL_REQUEST object. Ingress nodes receiving such PathErr must notify the requesting application user.
section: "3.4"
topics:
    - mpls
    - routing
