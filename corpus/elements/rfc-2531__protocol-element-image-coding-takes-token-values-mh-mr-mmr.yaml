document: rfc-2531
kind: protocol-element
summary: image-coding takes token values MH, MR, MMR, JBIG, or JPEG and describes the raw image compression technique. image-coding-constraint further qualifies the coding method with profile-specific values JBIG-T85 (bi-level per ITU T.85), JBIG-T43 (multi-level per ITU T.43), or JPEG-T4E (per ITU T.4 Annex E).
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
