document: rfc-5961
kind: normative-requirement
summary: When a RST segment is received in a synchronized state and its sequence number exactly matches the next expected sequence number (RCV.NXT), TCP MUST reset the connection. RSTs outside the receive window MUST be silently discarded.
section: "3.2"
rfc2119_level: MUST
topics:
    - tcp
    - security
