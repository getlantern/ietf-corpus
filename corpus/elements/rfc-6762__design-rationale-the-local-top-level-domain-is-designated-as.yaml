document: rfc-6762
kind: design-rationale
summary: The '.local.' top-level domain is designated as link-local, analogous to IPv4 169.254/16 and IPv6 FE80::/10 addresses. This allows any user to self-assign link-local host names without DNS infrastructure, registration fees, or delegation.
section: "3"
topics:
