document: rfc-5541
kind: normative-requirement
summary: The OF-List TLV MUST NOT appear more than once in an OPEN object. If it appears more than once, the PCEP session MUST be rejected with error type 1, error value 1 (PCEP session establishment failure / Reception of an invalid Open message).
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
