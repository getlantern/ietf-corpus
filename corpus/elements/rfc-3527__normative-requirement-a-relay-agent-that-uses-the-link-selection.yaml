document: rfc-3527
kind: normative-requirement
summary: A relay agent that uses the link-selection sub-option MUST assume the server supports the sub-option and MUST NOT take different actions based on whether this sub-option appears or does not appear in the response packet from the server.
section: "3"
rfc2119_level: MUST NOT
