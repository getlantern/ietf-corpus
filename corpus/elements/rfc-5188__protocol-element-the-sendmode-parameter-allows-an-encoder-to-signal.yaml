document: rfc-5188
kind: protocol-element
summary: The 'sendmode' parameter allows an encoder to signal its current mode of operation (values 0, 4, or 7 for EVRC-WB; 0-7 for EVRC-B). Mode change does not cause decoding problems at the receiver, and the decoder does not need to know the encoder's current mode.
