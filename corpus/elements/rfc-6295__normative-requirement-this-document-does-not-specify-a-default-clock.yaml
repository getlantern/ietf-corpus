document: rfc-6295
kind: normative-requirement
summary: This document does not specify a default clock rate for RTP MIDI. When RTP MIDI is used with SDP, parties MUST use the rtpmap attribute line to communicate the clock rate; no default value may be assumed.
section: "6.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
