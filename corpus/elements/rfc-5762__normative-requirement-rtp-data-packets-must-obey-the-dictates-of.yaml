document: rfc-5762
kind: normative-requirement
summary: RTP data packets MUST obey the dictates of DCCP congestion control. Applications may use rate-adaptive payload formats or switch to lower-rate formats when the congestion control requires sending below the payload format's natural rate.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
