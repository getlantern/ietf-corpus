document: rfc-3843
kind: protocol-element
summary: For compressed headers in profile 0x0004, information for the initial two IP headers is carried as in ROHC UDP, and a variable-length chain of dynamic header information is appended for each additional IP header beyond the first two. The length of this chain is inferred from the static chain in context.
