document: rfc-8668
kind: interoperability-note
summary: The L2 Bundle Member Adj-SID sub-TLVs (Types 41 and 42) are explicitly NOT in the category of shared attribute sub-TLVs; each describes per-member SID values. All other existing sub-TLVs in the registry for TLVs 22, 23, 141, 222, and 223 default to the shared attribute category unless otherwise specified.
