document: rfc-4302
kind: normative-requirement
summary: If implicit padding is required by an integrity algorithm (to match blocksize), padding octets MUST have a value of zero and MUST be appended after the ESN high-order bits (if present). This padding is not transmitted with the packet.
section: 3.3.3.2.2
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
