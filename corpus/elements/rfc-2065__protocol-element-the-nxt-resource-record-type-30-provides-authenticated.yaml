document: rfc-2065
kind: protocol-element
summary: The NXT resource record (type 30) provides authenticated denial of existence. Its RDATA contains the next existing domain name in canonical order and a bit map indicating which RR types exist for the owner name. NXT records cover a name interval, asserting no names exist between the owner and the next name.
section: "5.1"
topics:
    - dns
    - security
