document: rfc-8956
kind: design-rationale
summary: IPv6 Flow Specification reuses the same SAFIs (133 and 134) as IPv4 Flow Specification from RFC 8955, differentiated only by AFI=2 for IPv6 versus AFI=1 for IPv4. This avoids defining new SAFIs and leverages existing BGP multiprotocol machinery.
