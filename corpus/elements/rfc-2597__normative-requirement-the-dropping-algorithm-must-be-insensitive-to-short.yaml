document: rfc-2597
kind: normative-requirement
summary: 'The dropping algorithm MUST be insensitive to short-term traffic characteristics of microflows: flows with different burst shapes but identical longer-term rates should have packets discarded with essentially equal probability, achievable via randomness in the dropping function.'
section: "4"
rfc2119_level: MUST
topics:
