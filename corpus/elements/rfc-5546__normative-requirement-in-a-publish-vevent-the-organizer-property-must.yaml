document: rfc-5546
kind: normative-requirement
summary: In a PUBLISH VEVENT, the ORGANIZER property MUST be present and ATTENDEE properties MUST NOT be present. This distinguishes unsolicited broadcasting of event information from interactive scheduling requests.
section: 3.2.1
rfc2119_level: MUST
