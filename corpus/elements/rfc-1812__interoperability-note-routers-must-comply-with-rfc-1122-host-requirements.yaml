document: rfc-1812
kind: interoperability-note
summary: Routers MUST comply with RFC 1122 host requirements except where explicitly superseded by this document. Any Internet host acting as a router must adhere to both host and router requirements; the router requirements take precedence in case of conflict.
section: "1.2"
topics:
