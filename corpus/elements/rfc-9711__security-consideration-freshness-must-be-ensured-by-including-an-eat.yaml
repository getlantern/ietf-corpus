document: rfc-9711
kind: security-consideration
summary: Freshness must be ensured by including an EAT nonce (at least 64 bits of entropy) or an alternative freshness mechanism defined in the profile. Without freshness, an attacker can replay a previously valid EAT from a compromised device.
section: "9.3"
topics:
    - security
