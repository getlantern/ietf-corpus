document: rfc-2131
kind: normative-requirement
summary: The client MUST adopt a retransmission strategy using a randomized exponential backoff algorithm. The initial retransmission delay SHOULD be 4 seconds randomized ±1; subsequent delays SHOULD double up to a maximum of 64 seconds.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
