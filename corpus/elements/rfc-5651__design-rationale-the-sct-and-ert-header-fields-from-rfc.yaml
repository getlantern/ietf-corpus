document: rfc-5651
kind: design-rationale
summary: The SCT and ERT header fields from RFC 3451 were removed from the fixed LCT header and replaced by the EXT_TIME Header Extension. This change provides a more flexible and extensible mechanism for timing information while keeping the base header compact.
