document: rfc-9111
kind: protocol-element
summary: 'A response''s freshness is determined by response_is_fresh = (freshness_lifetime > current_age). Freshness lifetime is resolved in priority order: s-maxage (shared caches), max-age, Expires minus Date, or heuristic calculation. A stale response may still be served if the cache is disconnected or explicitly permitted.'
section: "4.2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
