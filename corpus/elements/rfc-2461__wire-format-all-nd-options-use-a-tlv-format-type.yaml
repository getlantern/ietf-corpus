document: rfc-2461
kind: wire-format
summary: 'All ND options use a TLV format: Type (8-bit) and Length (8-bit, in units of 8 octets including Type and Length fields). Length=0 is invalid and MUST cause silent discard of the enclosing packet. Five option types are defined: Source Link-Layer Address (1), Target Link-Layer Address (2), Prefix Information (3), Redirected Header (4), MTU (5).'
section: "4.6"
