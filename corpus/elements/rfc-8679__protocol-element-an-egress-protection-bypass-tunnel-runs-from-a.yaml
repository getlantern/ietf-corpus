document: rfc-8679
kind: protocol-element
summary: An egress-protection bypass tunnel runs from a PLR to protector P and logically targets protected egress {E, P}. It may be established via RSVP (with context ID as destination), LDP (context label advertised as IP prefix FEC), hierarchical tunneling (context label as one-hop LSP over a regular bypass tunnel), or Segment Routing (SID stack with context label as innermost SID).
section: "5.6"
topics:
    - mpls
    - routing
