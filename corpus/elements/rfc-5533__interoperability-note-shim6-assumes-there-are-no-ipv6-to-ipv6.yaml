document: rfc-5533
kind: interoperability-note
summary: 'Shim6 assumes there are no IPv6-to-IPv6 NATs on any path: both ends must be able to exchange their own IPv6 addresses and have those addresses be meaningful to the peer. NAT would break both the locator-exchange mechanism and the HBA/CGA verification of the locator set.'
section: "3"
topics:
    - ip
    - v6ops
    - nat
