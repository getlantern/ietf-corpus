document: rfc-4721
kind: design-rationale
summary: The Generalized Mobile IP Authentication Extension uses a subtype field to allow future authentication algorithms to be added without defining new extension types. Currently only subtype 1 (HMAC-MD5) is defined, but new subtypes can introduce different algorithms if HMAC-MD5 needs to be replaced.
section: "12"
topics:
