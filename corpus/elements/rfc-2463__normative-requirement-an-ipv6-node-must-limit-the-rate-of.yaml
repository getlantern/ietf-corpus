document: rfc-2463
kind: normative-requirement
summary: An IPv6 node MUST limit the rate of ICMPv6 error messages it sends, using either timer-based (e.g., at most once per T milliseconds) or bandwidth-based (e.g., fraction F of link bandwidth) mechanisms. Rate-limit parameters MUST be configurable with conservative defaults (e.g., T=1s, F=2%).
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
