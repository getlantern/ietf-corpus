document: rfc-4251
kind: normative-requirement
summary: Implementations SHOULD NOT normally allow connections without host key verification by default, as they are vulnerable to active man-in-the-middle attacks. Implementations SHOULD try to make the best effort to check host keys, and SHOULD provide an option to reject unverifiable host keys.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
