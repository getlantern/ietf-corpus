document: rfc-9326
kind: wire-format
summary: IOAM-Trace-Type is a 24-bit identifier specifying which IOAM-Data-Fields should be exported, using the same format as RFC 9197. The bit corresponding to the Checksum Complement IOAM-Data-Field SHOULD be set to zero by the encapsulating node and ignored by transit and decapsulating nodes.
section: "3.2"
topics:
