document: rfc-3035
kind: security-consideration
summary: The procedures described in this document do not protect against the alteration (accidental or malicious) of MPLS labels, which could cause misforwarding. Additionally, a receiving LSR has no mechanism to authenticate the transmitting LSR.
section: "12"
topics:
    - mpls
    - security
