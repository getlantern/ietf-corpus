document: rfc-8254
kind: design-rationale
summary: URN registration practices within the ISBN and ISSN namespaces are expected to evolve with their respective ISO standards without requiring resubmission of templates or formal IETF/IANA approval. This avoids the overhead of formal re-registration each time the underlying ISO standard is revised.
