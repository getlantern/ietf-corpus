document: rfc-5464
kind: normative-requirement
summary: Entry names MUST be specified in a Standards Track or IESG-approved Experimental RFC, or fall under the vendor namespace (using /shared/vendor/<vendor-token> or /private/vendor/<vendor-token>). Vendor tokens MUST be registered with IANA using the ACAP vendor subtree registry.
section: 3.2.1
rfc2119_level: MUST
topics:
