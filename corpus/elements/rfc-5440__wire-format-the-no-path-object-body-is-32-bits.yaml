document: rfc-5440
kind: wire-format
summary: 'The NO-PATH object body is 32 bits plus optional TLVs: NI/Nature of Issue (8 bits, 0=no satisfying path, 1=PCE chain broken), C flag (1 bit, unsatisfied constraints included in reply), Flags (15 bits reserved), and Reserved (8 bits). An optional NO-PATH-VECTOR TLV (type=1, length=4, 32-bit flags) provides additional failure detail.'
section: "7.5"
