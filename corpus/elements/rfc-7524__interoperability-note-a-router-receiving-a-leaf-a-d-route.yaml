document: rfc-7524
kind: interoperability-note
summary: 'A router receiving a Leaf A-D route distinguishes between global table multicast routes and those originated in response to S-PMSI or I-PMSI A-D routes by examining the third octet of the MCAST-VPN NLRI: values 0x01, 0x02, or 0x03 indicate response to S-PMSI/I-PMSI A-D routes; values 0x00 or 0xff with octets 3-10 all zeros or all ones indicate global table multicast.'
section: 6.2.2
topics:
    - bgp
    - mpls
