document: rfc-3539
kind: state-machine
summary: 'The watchdog Peer Control Block (PCB) defines five states: INITIAL (never opened), OKAY (connection up), SUSPECT (failover initiated), DOWN (connection closed), and REOPEN (attempting to reopen). Transitions are triggered by events: receiving a message, timer expiration (Tw reaches zero), connection up, and connection down.'
