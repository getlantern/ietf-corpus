document: rfc-8491
kind: protocol-element
summary: The Node MSD sub-TLV (Type 23) is defined within the IS-IS Router CAPABILITY TLV (TLV 242) to carry the provisioned SID depth of the originating router. Node MSD is the smallest MSD supported by the node across all interfaces configured for use by the advertising IGP instance. MSD values may be learned via a hardware API or may be provisioned.
section: "2"
topics:
    - routing
    - mpls
