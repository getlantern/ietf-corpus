document: rfc-9868
kind: normative-requirement
summary: Endpoints supporting UDP Options MUST be capable of fragmenting and reassembling at least two fragments each fitting within the Ethernet MTU of 1,500 bytes. MRDS size MUST be at least 2,926 bytes for IPv4 and 2,886 bytes for IPv6; MRDS segs MUST be at least 2. If no MRDS has been received, a sender MUST assume these minimum values.
section: "11.6"
rfc2119_level: MUST
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
