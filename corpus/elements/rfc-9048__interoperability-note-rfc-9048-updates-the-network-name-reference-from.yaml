document: rfc-9048
kind: interoperability-note
summary: RFC 9048 updates the network name reference from 3GPP TS 24.302 Release 8 (used in RFC 5448) to Release 16, ensuring EAP-AKA' key derivation is compatible with 5G deployments. This reference change does not alter the TS number, only the version, but is critical for correct key computation.
section: "1"
topics:
