document: rfc-3289
kind: design-rationale
summary: RowPointer is used as the universal connector between functional data path elements rather than typed foreign keys, so that new element types defined in other MIB modules (proprietary or standards-track) can be integrated into a DiffServ data path without modifying this MIB. This provides open-ended extensibility analogous to class inheritance.
section: "4.1"
topics:
    - diffserv
    - snmp
