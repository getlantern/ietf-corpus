document: rfc-8232
kind: normative-requirement
summary: If either reserved LSP-DB Version Number value (0 or 0xFFFFFFFFFFFFFFFF) is used during LSP State (re)Synchronization, the PCE speaker receiving this value MUST send back a PCErr with Error-type=20 and Error-value=6 'Received an invalid LSP-DB Version Number', and close the PCEP session.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
