document: rfc-5103
kind: design-rationale
summary: The single Flow Record method was chosen over exporting Biflows as two adjacent Uniflows because adjacent Uniflows are merely an informal arrangement the Collecting Process cannot rely upon, and they duplicate Flow Key data inefficiently. Methods using commonPropertiesId were also rejected due to additional overhead and state management requirements at both Collecting and Exporting Processes.
section: "3"
topics:
