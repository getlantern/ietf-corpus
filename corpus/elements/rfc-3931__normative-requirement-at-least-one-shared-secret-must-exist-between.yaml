document: rfc-3931
kind: normative-requirement
summary: At least one shared secret MUST exist between communicating L2TP nodes to enable Control Message Authentication. If an SCCRQ or SCCRP contains a Control Message Authentication Nonce AVP, the receiver MUST respond with a Message Digest AVP in all subsequent messages.
section: "4.3"
rfc2119_level: MUST
topics:
    - vpn
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
