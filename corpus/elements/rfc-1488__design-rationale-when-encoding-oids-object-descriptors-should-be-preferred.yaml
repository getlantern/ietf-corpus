document: rfc-1488
kind: design-rationale
summary: When encoding OIDs, object descriptors should be preferred over numeric dotted notation to the greatest extent possible. For example, 'organizationName' is preferable to 'ds.4.10', which is preferable to '2.5.4.10'. This improves human readability of encoded directory values.
section: "2.15"
topics:
