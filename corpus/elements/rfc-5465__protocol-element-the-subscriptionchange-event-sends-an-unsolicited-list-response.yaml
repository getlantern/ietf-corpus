document: rfc-5465
kind: protocol-element
summary: The SubscriptionChange event sends an unsolicited LIST response for each affected mailbox name. The \Subscribed attribute is included if and only if the mailbox is subscribed after the event. All mailbox attributes MUST be accurately computed.
section: "5.5"
