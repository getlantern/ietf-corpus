document: rfc-9175
kind: normative-requirement
summary: When the Echo option is used to serve freshness requirements (including client aliveness and state synchronization), the Echo option value MUST be integrity protected between the intended endpoints, e.g., using DTLS, TLS, or an OSCORE Inner option.
section: "2.3"
rfc2119_level: MUST
topics:
    - security
    - tls
