document: rfc-8262
kind: protocol-element
summary: The Content-ID header field for SIP identifies the complete message-body of a SIP message and the metadata provided by MIME-Version and any 'Content-' prefixed header fields included in the SIP message. It can be included in any SIP message allowed to contain a message-body.
