document: rfc-8926
kind: protocol-element
summary: The O bit in the Geneve header marks a control packet sent between tunnel endpoints. Tunnel endpoints MUST NOT forward the payload when O is set, transit devices MUST NOT interpret it, and transit devices MUST NOT alter forwarding (e.g., ECMP selection) based on this bit.
section: "3.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
