document: rfc-6926
kind: wire-format
summary: Each DHCPv4 message sent over a Bulk Leasequery TCP connection is prefixed with a 2-octet message-size field in network byte order, yielding a maximum message size of 65535 octets. All other fields follow the standard RFC 2131 DHCPv4 layout.
section: "6.1"
topics:
    - tcp
