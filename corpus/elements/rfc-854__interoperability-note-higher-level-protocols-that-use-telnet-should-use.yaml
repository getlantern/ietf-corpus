document: rfc-854
kind: interoperability-note
summary: Higher-level protocols that use TELNET SHOULD use the sequence [IP, Synch] as their out-of-band signal. The Urgent notification wakes the TELNET process; the embedded IP wakes the next higher-level process. A separate protocol-level DM analog may follow if defined by that protocol.
section: THE NETWORK VIRTUAL TERMINAL
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
