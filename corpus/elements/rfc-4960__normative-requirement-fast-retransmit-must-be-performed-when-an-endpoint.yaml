document: rfc-4960
kind: normative-requirement
summary: Fast retransmit MUST be performed when an endpoint receives four SACKs indicating the same missing TSN (three gap reports). The missing DATA chunk SHOULD be retransmitted immediately, and the congestion window adjusted accordingly.
section: 7.2.4
rfc2119_level: MUST
topics:
    - sctp
    - congestion
