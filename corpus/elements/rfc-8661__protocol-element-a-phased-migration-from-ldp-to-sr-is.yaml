document: rfc-8661
kind: protocol-element
summary: 'A phased migration from LDP to SR is described: at T0 all routers run LDP; at T1 all are upgraded to SR but LDP remains preferred for IP2MPLS; at T2–T3 the operator enables SR IP2MPLS preference progressively at edge routers; at T4 LDP is unconfigured. At each phase the network remains operational and changes are reversible.'
section: A
topics:
