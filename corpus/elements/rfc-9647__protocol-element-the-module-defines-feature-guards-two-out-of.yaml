summary: 'The module defines feature guards: two-out-of-three-supported, etx-supported, mac-supported, dtls-supported, hmac-sha256-supported, blake2s-supported, x-509-supported, and raw-public-key-supported. Identities metric-comp-algorithms (base for two-out-of-three and etx), mac-algorithms (base for hmac-sha256 and blake2s), and dtls-cert-types (base for x-509 and raw-public-key) are defined.'
