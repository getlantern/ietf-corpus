document: rfc-6068
kind: normative-requirement
summary: Characters that cannot appear in a URI per STD66, as well as "%", and gen-delims except "@" and ":" (i.e., "/", "?", "#", "[", "]") MUST be percent-encoded in addr-spec. Among sub-delims, "&", ";", and "=" also MUST be percent-encoded.
section: "2"
rfc2119_level: MUST
topics:
    - email
