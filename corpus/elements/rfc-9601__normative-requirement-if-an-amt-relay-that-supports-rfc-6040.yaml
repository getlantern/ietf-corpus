document: rfc-9601
kind: normative-requirement
summary: If an AMT relay that supports RFC 6040 ECN propagation receives a Request message with E=1, it MUST use the normal mode of RFC 6040 (copying the IP ECN field from inner to outer header) when tunneling datagrams toward that gateway.
section: 6.1.4.2
rfc2119_level: MUST
topics:
    - ecn
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
