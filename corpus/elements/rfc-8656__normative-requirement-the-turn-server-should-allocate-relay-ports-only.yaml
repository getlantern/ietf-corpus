document: rfc-8656
kind: normative-requirement
summary: The TURN server SHOULD allocate relay ports only from the dynamic/private port range 49152–65535 and SHOULD NOT allocate from the well-known port range 0–1023, to prevent clients from using TURN to expose standard services and to avoid conflicts with the OS and other applications.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
