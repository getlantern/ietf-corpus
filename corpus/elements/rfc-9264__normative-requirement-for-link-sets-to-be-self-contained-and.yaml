document: rfc-9264
kind: normative-requirement
summary: For link sets to be self-contained and usable outside an HTTP interaction, it is RECOMMENDED to provide explicit 'anchor' attributes for every link and to use non-relative URI references for both 'anchor' and 'href'. The 'title*' attribute is RECOMMENDED over 'title' to allow language tagging.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - http
    - json
