document: rfc-2893
kind: normative-requirement
summary: The decapsulating node MUST verify that the tunnel source address is acceptable before forwarding decapsulated packets. For unidirectional configured tunnels, a list of acceptable source IPv4 address prefixes MUST be configured and MUST default to empty, requiring explicit configuration before any forwarding occurs.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
