document: rfc-1515
kind: protocol-element
summary: rpMauJabberTrap (TRAP-TYPE ::= 1) is sent whenever a managed repeater MAU enters the jabbering state, carrying the variable rpMauJabberState. ifMauJabberTrap (TRAP-TYPE ::= 2) is the equivalent for interface MAUs, carrying ifMauJabberState.
