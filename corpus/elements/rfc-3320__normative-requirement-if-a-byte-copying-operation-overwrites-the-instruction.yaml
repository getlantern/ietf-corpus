document: rfc-3320
kind: normative-requirement
summary: If a byte-copying operation overwrites the instruction that invoked it (or overwrites byte_copy_left/byte_copy_right), the copy MUST be completed as if the original instruction were still in place.
section: "8.4"
rfc2119_level: MUST
