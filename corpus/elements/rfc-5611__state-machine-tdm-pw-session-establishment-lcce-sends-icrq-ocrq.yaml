document: rfc-5611
kind: state-machine
summary: 'TDM PW session establishment: LCCE sends ICRQ/OCRQ with TDM PW AVP (and RTP AVP if needed); peer validates and responds with ICRP/OCRP including matching RTP AVP; initiator validates received RTP AVP. Rejection states are triggered by Bit Rate mismatch (EC 1), trunk type mismatch (EC 2), unsupported payload size (EC 3), inability to generate RTP header (EC 4), or unsupported timestamp frequency (EC 5), all using Result Code 30.'
