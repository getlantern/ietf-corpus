document: rfc-2051
kind: protocol-element
summary: 'The appcCnosControl group supports three CNOS commands via appcCnosCommand: initSesslimit (INITIALIZE_SESSION_LIMIT), changeSesslimit (CHANGE_SESSION_LIMIT), and resetSesslimit (RESET_SESSION_LIMIT). Each command requires specific parameter objects (appcCnosMaxSessLimit, appcCnosMinCwinLimit, appcCnosMinClosLimit, appcCnosResponsible, appcCnosDrainPart, appcCnosForce) to be set before writing appcCnosCommand, along with target LU and mode name objects.'
section: 3.1.1
topics:
    - snmp
