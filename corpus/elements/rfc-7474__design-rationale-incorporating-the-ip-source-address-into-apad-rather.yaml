document: rfc-7474
kind: design-rationale
summary: 'Incorporating the IP source address into Apad rather than into the OSPF packet itself is the minimal change needed to bind the IP header to the authentication: it reuses the RFC 5709 hash framework and requires only that the Apad initialization change, leaving the overall cryptographic process unchanged.'
