document: rfc-1869
kind: normative-requirement
summary: If the server is unable to accommodate one or more MAIL FROM or RCPT TO parameters, it must return code 555 (unrecognized/unimplemented parameter) or 455 (temporarily unable to accommodate), depending on the nature of the failure.
section: "6.1"
rfc2119_level: MUST
topics:
