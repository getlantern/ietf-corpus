document: rfc-9856
kind: interoperability-note
summary: In the Hot Standby solution with IR or AR P-tunnels, upstream PEs push S-ESI labels on packets destined for all PEs in the tenant domain (not just PEs sharing the ES as in RFC 7432), extending baseline split-horizon ESI label usage to ingress filtering.
section: "5.1"
topics:
