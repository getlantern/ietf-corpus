document: rfc-7953
kind: normative-requirement
summary: When two or more VAVAILABILITY components with the same PRIORITY overlap, the effective busy type follows the precedence order BUSY > BUSY-UNAVAILABLE > BUSY-TENTATIVE. An absent PRIORITY property or a value of 0 implies the lowest priority.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
