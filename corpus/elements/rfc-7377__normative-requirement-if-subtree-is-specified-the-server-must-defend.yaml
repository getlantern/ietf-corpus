document: rfc-7377
kind: normative-requirement
summary: If 'subtree' is specified, the server MUST defend against loops in the mailbox hierarchy (e.g., from recursive filesystem links). It SHOULD track visited mailboxes and stop traversal on a repeat; if it cannot, it MAY limit hierarchy depth.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
