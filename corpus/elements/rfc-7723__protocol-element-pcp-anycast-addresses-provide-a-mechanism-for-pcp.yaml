document: rfc-7723
kind: protocol-element
summary: 'PCP anycast addresses provide a mechanism for PCP clients to reach their closest PCP-aware on-path NAT, firewall, or other middlebox without requiring external configuration of the middlebox''s IP address. Two well-known addresses are established: one IPv4 (192.0.0.9/32) and one IPv6 (2001:1::1/128).'
section: "1"
