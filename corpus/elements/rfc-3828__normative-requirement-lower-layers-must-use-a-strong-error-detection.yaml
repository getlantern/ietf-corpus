document: rfc-3828
kind: normative-requirement
summary: Lower layers MUST use a strong error detection mechanism to detect errors in the sensitive part of a UDP-Lite packet (from the first IP header octet through the last octet identified by Checksum Coverage) and MUST discard damaged packets.
section: "4"
rfc2119_level: MUST
topics:
