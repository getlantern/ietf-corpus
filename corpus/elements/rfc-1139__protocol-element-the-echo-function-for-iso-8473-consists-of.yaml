document: rfc-1139
kind: protocol-element
summary: The echo function for ISO 8473 consists of an echo-request entity that accepts an incoming echo-request PDU, performs processing, and generates an echo-reply PDU. The entity may be viewed as existing above the network layer or co-existing with it. The act of transmitting an echo-request PDU to a remote system is termed 'ping'.
section: "2"
