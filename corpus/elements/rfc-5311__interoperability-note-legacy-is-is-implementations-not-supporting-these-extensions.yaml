document: rfc-5311
kind: interoperability-note
summary: Legacy IS-IS implementations not supporting these extensions see Extended LSPs as belonging to a virtual system reachable only via the Originating System, so their SPF results remain consistent with extension-capable ISs. No special interoperability mode is needed, unlike RFC 3786.
section: "5"
topics:
    - routing
