document: rfc-9396
kind: normative-requirement
summary: When the AS includes `authorization_details` in a token introspection response, the information MUST be conveyed as a top-level `authorization_details` member of the introspection response JSON object, containing the same structure defined in Section 2, potentially filtered and extended for the requesting RS.
section: "9.2"
rfc2119_level: MUST
topics:
