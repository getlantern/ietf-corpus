document: rfc-2446
kind: normative-requirement
summary: In VEVENT PUBLISH, ATTENDEE MUST NOT be present (value = 0). In VEVENT REQUEST, at least one ATTENDEE (1+) MUST be present. The VERSION property MUST equal '2.0' and PRODID MUST appear exactly once in every iTIP message.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
