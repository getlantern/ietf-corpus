document: rfc-4129
kind: interoperability-note
summary: As an option, the IUA SCTP Payload Protocol ID (value 1) MAY also be used for DUA to allow backhauling both ISDN and DPNSS over the same SCTP association. However, using separate IDs (10 for DUA, 1 for IUA) is the recommended primary option even in mixed scenarios.
section: "4"
topics:
