document: rfc-3059
kind: protocol-element
summary: When a UA sends a Service Request with the Attribute List Extension, the Service URL Length and Attribute List Length fields are set to 0 and the corresponding fields are omitted, forming an 'empty' extension that signals the UA's request for attributes.
