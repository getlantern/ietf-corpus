document: rfc-8910
kind: normative-requirement
summary: URIs longer than 255 bytes SHOULD NOT be provisioned via IPv6 DHCP options or IPv6 RA options, because the maximum length of the URI that can be carried in IPv4 DHCP is 255 bytes. In IPv6-only environments, this restriction can be relaxed.
section: "2"
rfc2119_level: SHOULD NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
