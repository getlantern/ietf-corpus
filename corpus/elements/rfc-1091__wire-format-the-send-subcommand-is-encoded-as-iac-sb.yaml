document: rfc-1091
kind: wire-format
summary: The SEND subcommand is encoded as IAC SB TERMINAL-TYPE SEND IAC SE where SEND=1. The IS subcommand is encoded as IAC SB TERMINAL-TYPE IS <name> IAC SE where IS=0 and <name> is an NVT ASCII string.
