document: rfc-4447
kind: normative-requirement
summary: For PW types requiring a control word, Label Mapping messages MUST have C=1. When a Label Mapping for such a PW type is received with C=0, a Label Release MUST be sent with an 'Illegal C-bit' status code and the PW will not be enabled.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
