document: rfc-3214
kind: state-machine
summary: During reroute modification, at diverging LSR Rj the new route is forwarded as a new LSP setup until paths converge at Rk; the _modify_ action flag is ignored on the diverged segment. On convergence, behavior reverts to the modification procedure, and on Label Mapping return two label sets coexist where routes coincide.
section: "3.2"
topics:
    - mpls
    - routing
