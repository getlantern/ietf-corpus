document: rfc-9177
kind: protocol-element
summary: For Q-Block1 and Q-Block2, the Observe option value MUST be the same for all payloads of the same body (including retransmitted missing payloads). This differs from Block2 where Observe appears only in the first block. Missing-block requests and responses MUST NOT include the Observe option.
section: "4.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
