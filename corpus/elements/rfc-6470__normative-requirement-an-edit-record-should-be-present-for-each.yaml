document: rfc-6470
kind: normative-requirement
summary: An edit record SHOULD be present for each distinct edit operation that the server has detected on the target datastore. This list MAY be omitted if the detailed edit operations are not known.
section: "2.2"
rfc2119_level: SHOULD
