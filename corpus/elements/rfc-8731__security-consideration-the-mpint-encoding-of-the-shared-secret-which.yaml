document: rfc-8731
kind: security-consideration
summary: The mpint encoding of the shared secret (which may add or remove zero bytes) raises the potential for a side-channel attack that could determine the length of what is hashed, leaking the most significant bit of the derived secret. For backwards-compatibility reasons, this potential problem was not addressed.
section: "4"
topics:
    - crypto
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
