document: rfc-4515
kind: wire-format
summary: 'The filter string grammar is defined in ABNF: filter = LPAREN filtercomp RPAREN, with filtercomp being and/or/not/item. Special characters ''*'' (0x2A), ''('' (0x28), '')'' (0x29), ''\'' (0x5C), and NUL (0x00) must be encoded as backslash followed by two hexadecimal digits (e.g., \2a for ''*'').'
section: "3"
