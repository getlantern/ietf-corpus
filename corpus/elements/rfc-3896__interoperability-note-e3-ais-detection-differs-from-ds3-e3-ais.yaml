document: rfc-3896
kind: interoperability-note
summary: 'E3 AIS detection differs from DS3: E3 AIS is a continuous stream of ones and consequent actions must be completed within 1 ms, whereas DS3 AIS uses stuck-stuffing with specific bit patterns and has a declaration time T where 0.2 ms <= T <= 100 ms.'
