document: rfc-7672
kind: normative-requirement
summary: The SMTP client MUST NOT perform certificate name checks with certificate usage DANE-EE(3). The server MUST be considered authenticated even if none of the names in the certificate match the client's reference identity for the server.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
