document: rfc-8724
kind: interoperability-note
summary: Both ends of a SCHC communication MUST be provisioned with the same Profile information and the same set of Rules before communication starts. Rules for compression/decompression and for fragmentation/reassembly share the same RuleID space within the scope of a given Dev-to-infrastructure link.
section: "5.2"
topics:
