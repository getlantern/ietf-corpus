document: rfc-6638
kind: security-consideration
summary: Servers MUST verify that the ORGANIZER property value in any scheduling message or freebusy request matches an authenticated calendar user address of the submitting principal, to prevent spoofing. For freebusy POSTs, the ORGANIZER must match the owner of the targeted Outbox collection.
section: "11.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
