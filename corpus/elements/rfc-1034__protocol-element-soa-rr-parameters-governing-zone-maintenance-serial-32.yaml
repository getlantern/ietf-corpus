document: rfc-1034
kind: protocol-element
summary: 'SOA RR parameters governing zone maintenance: SERIAL (32-bit sequence number advanced on every change), REFRESH (seconds before secondary checks for new serial), RETRY (seconds between retries after a failed check), EXPIRE (seconds after which a secondary must discard its zone copy if no serial check succeeds), and MINIMUM (minimum TTL for zone data, also used for negative caching).'
section: 4.3.5
