document: rfc-1196
kind: wire-format
summary: All data transferred MUST be in 7-bit ASCII format with no parity, and lines MUST end in CRLF (ASCII 13 followed by ASCII 10). Characters between ASCII 128 and 255 are reserved for genuine international data, not 7-bit ASCII with the parity bit set.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
