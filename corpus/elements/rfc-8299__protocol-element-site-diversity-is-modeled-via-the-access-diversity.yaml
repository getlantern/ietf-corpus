document: rfc-8299
kind: protocol-element
summary: Site diversity is modeled via the `access-diversity` container within each `site-network-access`. Diversity groups are assigned to accesses, and constraints of types such as `siteLevel`, `peLevel`, `popLevel`, or `lineLevel` are applied between access groups, supporting single-CE, dual-CE, and multi-POP multihoming scenarios.
section: 6.6.4
