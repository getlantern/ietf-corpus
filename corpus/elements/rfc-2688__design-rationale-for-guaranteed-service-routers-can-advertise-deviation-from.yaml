document: rfc-2688
kind: design-rationale
summary: For Guaranteed Service, routers can advertise deviation from the ideal fluid flow model using error terms C (rate-dependent) and D (rate-independent). A network operator can configure low-speed link parameters so that D is set to a desired value, giving explicit control over delay performance.
