document: rfc-3206
kind: protocol-element
summary: 'The SYS response code indicates that a POP3 failure is due to a system error rather than user credentials or an external condition. It is hierarchical with two sub-codes: SYS/TEMP for likely transient problems and SYS/PERM for problems requiring intervention. Case is not significant at any level.'
