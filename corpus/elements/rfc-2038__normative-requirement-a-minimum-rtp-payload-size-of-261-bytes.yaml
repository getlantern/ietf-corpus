document: rfc-2038
kind: normative-requirement
summary: A minimum RTP payload size of 261 bytes MUST be supported to contain the largest single MPEG ES header (the extension_data() header containing quant_matrix_extension()). Each ES header must be completely contained within a single packet.
section: "3.1"
rfc2119_level: MUST
topics:
