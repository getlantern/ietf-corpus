document: rfc-1356
kind: normative-requirement
summary: Multiple virtual circuits for the same encapsulation between two systems are explicitly allowed. Receivers SHOULD accept such additional calls and MUST accept PDUs on them. Algorithms to prevent virtual circuit call collision (e.g., ISO/IEC 8473 section 8.4.3.5) MUST NOT be implemented.
section: "3.7"
rfc2119_level: MUST NOT
topics:
    - ip
