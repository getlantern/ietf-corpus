kind: protocol-element
summary: appnLsTable (indexed by link station name) captures per-link configuration (port name, DLC type, dynamic flag, adjacent CP name, TG number, limited-resource and act-on-demand flags), byte/frame traffic counters for XID and data, round-trip delay measurements (current, min, max with timestamp), XID exchange counts, and HPR-specific fields (ANR labels, NCE IDs for CP-CP, Route Setup, and boundary function).
