document: rfc-8551
kind: normative-requirement
summary: Sending agents MUST use the id-data OID in SignedData encapContentInfo eContentType and in EnvelopedData encryptedContentInfo contentType when the inner content is a MIME entity. The encrypted or signed MIME content MUST be stored in the corresponding OCTET STRING.
section: 2.4.1
rfc2119_level: MUST
topics:
