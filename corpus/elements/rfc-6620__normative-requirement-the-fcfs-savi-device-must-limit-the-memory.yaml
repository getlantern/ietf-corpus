document: rfc-6620
kind: normative-requirement
summary: The FCFS SAVI device MUST limit the memory used to store buffered data packets (during DAD verification) so other device functions retain available memory even under attack. It MUST also perform per-port rate limiting of DAD_NS messages it generates to prevent amplification attacks.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
