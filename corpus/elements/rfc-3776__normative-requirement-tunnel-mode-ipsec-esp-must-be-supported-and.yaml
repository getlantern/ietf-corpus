document: rfc-3776
kind: normative-requirement
summary: Tunnel mode IPsec ESP MUST be supported and SHOULD be used for protection of return routability packets; both a non-null encryption transform and a non-null authentication algorithm MUST be applied to prevent on-link attackers from observing tokens.
section: "4.3"
rfc2119_level: MUST
