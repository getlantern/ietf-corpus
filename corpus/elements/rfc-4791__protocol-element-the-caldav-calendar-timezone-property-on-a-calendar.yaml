document: rfc-4791
kind: protocol-element
summary: The CALDAV:calendar-timezone property on a calendar collection specifies the time zone the server uses to resolve floating date and date-with-local-time values to UTC for REPORT processing and free-busy computation. It SHOULD be defined on all calendar collections.
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
