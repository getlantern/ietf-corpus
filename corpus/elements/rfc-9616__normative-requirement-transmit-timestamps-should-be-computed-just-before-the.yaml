document: rfc-9616
kind: normative-requirement
summary: Transmit timestamps SHOULD be computed just before the packet is passed to the network stack (before queueing delays); receive timestamps SHOULD be computed just after the packet is received from the network stack.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
