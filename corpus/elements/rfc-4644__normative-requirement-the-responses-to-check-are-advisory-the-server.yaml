document: rfc-4644
kind: normative-requirement
summary: The responses to CHECK are advisory; the server MUST NOT rely on the client to behave as requested by these responses (i.e., the client may send articles via TAKETHIS regardless of CHECK advice).
section: 2.4.2
rfc2119_level: MUST NOT
