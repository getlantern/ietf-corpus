document: rfc-3206
kind: protocol-element
summary: The AUTH response code informs the client that the failure is due to a problem with user credentials, covering incorrect passwords, unknown usernames, expired accounts, policy violations, and similar authentication issues. It is valid with -ERR responses to AUTH, USER, PASS, or APOP commands.
