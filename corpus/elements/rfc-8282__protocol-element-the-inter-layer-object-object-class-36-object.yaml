document: rfc-8282
kind: protocol-element
summary: The INTER-LAYER object (Object-Class 36, Object-Type 1) is a 32-bit object containing three flags (I, M, T) used in PCReq and PCRep messages to indicate whether inter-layer path computation is allowed, whether a mono-layer or multi-layer path is requested/returned, and whether triggered signaling is allowed/required.
