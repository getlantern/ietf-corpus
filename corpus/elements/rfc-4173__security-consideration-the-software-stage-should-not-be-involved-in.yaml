document: rfc-4173
kind: security-consideration
summary: The Software Stage SHOULD NOT be involved in a secure iSCSI boot process, as securing the loading of software required for later boot stages is difficult and complex due to administrative issues and BIOS environment limitations. All necessary software is assumed to be resident on the boot client.
section: "8"
rfc2119_level: SHOULD NOT
topics:
    - security
