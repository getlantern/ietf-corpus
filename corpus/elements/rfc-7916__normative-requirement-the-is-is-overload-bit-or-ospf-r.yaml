document: rfc-7916
kind: normative-requirement
summary: The IS-IS overload bit or OSPF R-bit of the LFA-computing node (S) itself SHOULD be taken into account during LFA computation, in addition to the standard Loop-Free Criterion. An OSPF stub router (RFC 6987) SHOULD behave as if the R-bit were clear for LFA computation.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
