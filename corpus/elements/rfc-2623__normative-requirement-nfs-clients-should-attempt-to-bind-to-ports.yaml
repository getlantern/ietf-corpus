document: rfc-2623
kind: normative-requirement
summary: NFS clients SHOULD attempt to bind to ports < 1024; if they fail, the client MAY attempt the NFS operation over a port >= 1024. NFS servers implementing port monitoring SHOULD provide a method to turn it off.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
