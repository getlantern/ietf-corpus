document: rfc-2368
kind: security-consideration
summary: Mail messages can be logged at originating, recipient, and intermediary sites along the delivery path; if not encrypted, they can be read at any of those sites. The mailto URL template may be opaque or difficult for users to read before specifying the URL.
section: "7"
topics:
