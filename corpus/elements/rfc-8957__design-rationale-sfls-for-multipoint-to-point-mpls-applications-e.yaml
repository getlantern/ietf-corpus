document: rfc-8957
kind: design-rationale
summary: SFLs for multipoint-to-point MPLS applications (e.g., VPNs) must be source-specific so that packet batches from different ingress LERs are marked differently, allowing each ingress LER to independently and asynchronously coordinate with the destination for per-flow performance monitoring.
section: "3"
topics:
