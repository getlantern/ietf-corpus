document: rfc-4682
kind: protocol-element
summary: pktcMtaDevErrorOidsTable records configuration file errors and warnings encountered during provisioning, up to a maximum of 1024 entries. Each row contains the erroneous OID (pktcMtaDevErrorOid), its value (pktcMtaDevErrorValue), and a human-readable reason (pktcMtaDevErrorReason). The table MUST be cleared on each reboot.
section: "4"
