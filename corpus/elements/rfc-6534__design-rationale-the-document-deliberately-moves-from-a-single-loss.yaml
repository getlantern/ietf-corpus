document: rfc-6534
kind: design-rationale
summary: The document deliberately moves from a single loss metric (average packet loss ratio per RFC 2680) to a pair of metrics — loss episode frequency and average loss episode duration — as the minimal generalization that captures bursty loss structure in a model-independent, empirical manner directly comparable to application tolerance for loss patterns.
