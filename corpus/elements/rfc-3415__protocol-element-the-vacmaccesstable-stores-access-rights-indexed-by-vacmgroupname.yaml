document: rfc-3415
kind: protocol-element
summary: The vacmAccessTable stores access rights indexed by (vacmGroupName, vacmAccessContextPrefix, vacmAccessSecurityModel, vacmAccessSecurityLevel). Each entry specifies vacmAccessReadViewName, vacmAccessWriteViewName, and vacmAccessNotifyViewName; an empty string for any view means no access is granted for that operation.
