document: rfc-8929
kind: security-consideration
summary: Any node on the backbone can take over any address (including LLN addresses) by sending an NA with Override set, forge traffic from addresses it does not own, or present itself as a preferred router. Therefore rogue access to the backbone must be prevented at all times and backbone nodes must be fully trusted.
section: "11"
topics:
