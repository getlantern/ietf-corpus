document: rfc-6321
kind: normative-requirement
summary: XML extensions in the iCalendar namespace MUST have element names beginning with 'x-' and convert back to equivalent X- extension properties in iCalendar. Extensions in foreign namespaces SHOULD be preserved using the new XML iCalendar property; only immediate child elements of IC:properties are converted, others are ignored.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
