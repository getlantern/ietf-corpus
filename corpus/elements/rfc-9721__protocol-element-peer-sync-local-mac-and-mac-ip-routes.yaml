document: rfc-9721
kind: protocol-element
summary: Peer-Sync-Local MAC and MAC-IP routes are BGP EVPN-learned MAC and MAC-IP routes for a host attached to a local ES, synchronized from a multi-homing peer PE to enable local switching. These are distinct from locally learned routes and their sequence numbers are used to synchronize the local MAC route sequence number across all multi-homing PEs sharing the ES.
section: "5.3"
topics:
    - routing
