document: rfc-9353
kind: security-consideration
summary: There are no mechanisms in OSPF or IS-IS to protect the confidentiality of the PCED TLV. Operators must ensure no private data is carried, for example ensuring KeyIDs or key chain names do not reveal sensitive information about the network.
section: "7"
topics:
