document: rfc-6904
kind: protocol-element
summary: The one- or two-byte element headers defined by RFC 5285, header extension padding, and the 'defined by profile' and 'length' fields are never encrypted. Encryption covers only the payload octets of the selected header extension elements, starting from the first RFC 5285 ID and length field.
