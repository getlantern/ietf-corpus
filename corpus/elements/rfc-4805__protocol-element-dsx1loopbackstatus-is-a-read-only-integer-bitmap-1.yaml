document: rfc-4805
kind: protocol-element
summary: 'dsx1LoopbackStatus is a read-only INTEGER bitmap (1..127) indicating currently active loopbacks and their source: NoLoopback (1), NearEndPayloadLoopback (2), NearEndLineLoopback (4), NearEndOtherLoopback (8), NearEndInwardLoopback (16), FarEndPayloadLoopback (32), FarEndLineLoopback (64). It distinguishes manager-established loopbacks from far-end-requested ones.'
