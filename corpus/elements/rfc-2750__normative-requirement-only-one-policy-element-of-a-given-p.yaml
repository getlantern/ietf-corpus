document: rfc-2750
kind: normative-requirement
summary: Only one policy element of a given P-Type may be active at any time. A new element of the same P-Type from the same PDP instantaneously replaces the previous one; an empty element of a P-Type deletes all policy state of that type.
section: "3.4"
rfc2119_level: MUST
topics:
    - qos
