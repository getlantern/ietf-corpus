document: rfc-7940
kind: design-rationale
summary: Code points are encoded as hexadecimal strings rather than native Unicode characters in XML. The rationale (per UAX42) is that hexadecimal notation is unambiguous across implementations and avoids encoding-related issues with XML character data.
section: "5"
