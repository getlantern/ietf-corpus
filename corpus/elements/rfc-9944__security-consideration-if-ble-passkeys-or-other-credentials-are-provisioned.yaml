document: rfc-9944
kind: security-consideration
summary: If BLE passkeys or other credentials are provisioned via SCIM, the SCIM server administrator may gain full device access. If the SCIM client administrator does not wish the network to have complete device access, the device itself MUST support finer-grained access control and additional authentication mechanisms at higher application layers.
section: "8.5"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
