document: rfc-7516
kind: protocol-element
summary: JWE AAD (Additional Authenticated Data) is an extra value integrity-protected by the AEAD operation but not encrypted. It can only be present in the JWE JSON Serialization. The AAD encryption parameter is formed as ASCII(Encoded Protected Header) or, if JWE AAD is present, ASCII(Encoded Protected Header || '.' || BASE64URL(JWE AAD)).
section: "2"
