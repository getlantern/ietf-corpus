document: rfc-7366
kind: design-rationale
summary: 'The use of TLS extensions precludes use with SSL 3.0, which is intentional: SSL 3.0 is nearly two decades old and likely vulnerable to many other attacks, making backward compatibility with it not worth the effort.'
section: "2.1"
topics:
