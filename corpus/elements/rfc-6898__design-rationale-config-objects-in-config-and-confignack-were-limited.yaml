document: rfc-6898
kind: design-rationale
summary: CONFIG objects in Config and ConfigNack were limited to one object each in RFC 4204, and ConfigAck carried none. This document extends all three messages to support multiple CONFIG objects so that behavior negotiation (BehaviorConfig) can proceed concurrently with existing HelloConfig and LMP-WDM_CONFIG usage without requiring separate message exchanges.
section: "1"
topics:
    - mpls
