document: rfc-9607
kind: security-consideration
summary: SCIP only encrypts the contents transported in the RTP payload; it does not protect the RTP header or RTCP packets. Applications requiring additional RTP header and/or RTCP security might consider SRTP, though these mechanisms are OPTIONAL in this document.
section: "6"
topics:
