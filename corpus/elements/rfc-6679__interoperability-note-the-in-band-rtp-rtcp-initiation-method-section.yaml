document: rfc-6679
kind: interoperability-note
summary: The in-band RTP/RTCP initiation method (Section 7.2.1) is selected as the mandatory-to-implement method because it works in all deployment scenarios regardless of topology, even though it is not optimal for all uses (it may cause media clipping if ECN-marked packets are dropped by middleboxes).
section: "3.3"
topics:
