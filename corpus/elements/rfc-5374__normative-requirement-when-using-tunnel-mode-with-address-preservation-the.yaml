document: rfc-5374
kind: normative-requirement
summary: When using tunnel mode with address preservation, the security gateway SHOULD populate the outer IP source address from the original packet's inner IP source address to pass Reverse Path Forwarding (RPF) checks performed by intermediate routers.
section: "3.1"
rfc2119_level: SHOULD
topics:
