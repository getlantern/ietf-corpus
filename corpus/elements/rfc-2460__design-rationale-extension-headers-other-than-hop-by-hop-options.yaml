document: rfc-2460
kind: design-rationale
summary: Extension headers (other than Hop-by-Hop Options) are not examined by routers along the path; only the destination processes them. This design reduces per-hop processing overhead and allows more efficient forwarding compared to IPv4 options.
section: "4"
topics:
