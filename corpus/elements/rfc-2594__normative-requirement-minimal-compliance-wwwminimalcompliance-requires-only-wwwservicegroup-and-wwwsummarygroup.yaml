document: rfc-2594
kind: normative-requirement
summary: Minimal compliance (wwwMinimalCompliance) requires only wwwServiceGroup and wwwSummaryGroup. Full compliance (wwwFullCompliance) additionally makes wwwRequestInGroup and wwwResponseOutGroup mandatory for servers/proxies, and wwwRequestOutGroup and wwwResponseInGroup mandatory for clients/proxies.
