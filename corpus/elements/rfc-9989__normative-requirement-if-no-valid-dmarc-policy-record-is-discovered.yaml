document: rfc-9989
kind: normative-requirement
summary: If no valid DMARC Policy Record is discovered via the DNS Tree Walk (i.e., an explicit negative result rather than a transient DNS error), Mail Receivers MUST NOT apply the DMARC mechanism to the message.
section: 4.10.1
rfc2119_level: MUST NOT
topics:
