document: rfc-2590
kind: interoperability-note
summary: DLCIs have strictly local significance at each Frame Relay interface. The DLCI used by the sender to identify a VC may differ from the DLCI the receiver uses to identify the same VC, so received DLCI values in ND messages cannot be used directly without receiver-side rewriting.
section: "8"
topics:
