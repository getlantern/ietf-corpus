document: rfc-2988
kind: normative-requirement
summary: When the retransmission timer expires, the host MUST set RTO <- RTO * 2 (exponential backoff); the optional maximum value from section 2.5 may bound this doubling.
section: "5.5"
rfc2119_level: MUST
topics:
