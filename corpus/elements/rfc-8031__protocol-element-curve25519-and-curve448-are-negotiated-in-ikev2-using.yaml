document: rfc-8031
kind: protocol-element
summary: Curve25519 and Curve448 are negotiated in IKEv2 using Transform Type 4 (Diffie-Hellman group) in the SA payload of IKE_SA_INIT or CREATE_CHILD_SA exchanges. The value 31 is assigned to Curve25519 and 32 to Curve448.
