document: rfc-9800
kind: normative-requirement
summary: The compressed SID list pushed onto the packet by the SR source node MUST comply with the rules in Sections 6.3 and 6.4 and MUST express the same list of segments as the original SID list. Failure to do so may result in the packet being dropped or misrouted.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
