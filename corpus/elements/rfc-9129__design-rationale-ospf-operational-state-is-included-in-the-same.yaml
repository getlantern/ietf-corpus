document: rfc-9129
kind: design-rationale
summary: OSPF operational state is included in the same YANG tree as OSPF configuration, consistent with the Network Management Datastore Architecture (NMDA, RFC 8342). Consequently, only the 'routing' container in the 'ietf-routing' model is augmented; the deprecated 'routing-state' container is not augmented.
section: "2.1"
topics:
