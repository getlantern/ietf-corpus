document: rfc-9756
kind: normative-requirement
summary: If a PCEP experiment is declared successful and moved to Standards Track work, each experimental Error-Type/Error-value pair will need to be assigned by IANA from the standard registry range. Code changes required are as simple as updating the numeric values of Error-Types and Error-values.
