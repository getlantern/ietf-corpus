summary: Simulations showed that applying the presence-specific static dictionary on top of other mitigation mechanisms (SigComp, partial notification, partial publication) achieves a further compression factor of approximately 10%, motivating the creation of this separate presence-specific dictionary distinct from the SIP/SDP dictionary in RFC 3485.
