document: rfc-9241
kind: normative-requirement
summary: When a filtered CDNI Advertisement request is invalid (null capability-type or capability-value, or inconsistent values), the ALTO server MUST return an 'E_INVALID_FIELD_VALUE' error per Section 8.5.2 of RFC 7285, and the 'value' field SHOULD indicate the offending CDNI capability.
section: "5.6"
rfc2119_level: MUST
topics:
    - http
    - json
