document: rfc-9786
kind: protocol-element
summary: The Highest Random Weight (HRW) algorithm for Port-Active mode omits the Ethernet Tag from the CRC computation; all references to (V, Es) are replaced by (Es) alone. DF and BDF are selected based on highest and second-highest Weight(Es, Si) values respectively, with ties broken by numerically lowest PE IP address.
section: "3.3"
topics:
    - routing
    - bgp
