document: rfc-3890
kind: protocol-element
summary: The maximum packet rate attribute is defined as 'a=maxprate:<packet-rate>' where packet-rate is a floating-point value representing maximum packets per second. For live streams, it is the estimated maximum the codec can produce; for stored streams, it is the measured maximum using a sliding 1-second window.
section: "6.3"
topics:
    - realtime
    - rtp
