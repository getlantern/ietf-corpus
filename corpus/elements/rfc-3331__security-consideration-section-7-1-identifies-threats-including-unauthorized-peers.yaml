document: rfc-3331
kind: security-consideration
summary: Section 7.1 identifies threats including unauthorized peers injecting or modifying SS7 signaling messages over the IP backhaul path between SG and MGC. An attacker gaining access to the M2UA/SCTP channel could disrupt or manipulate SS7 call processing.
