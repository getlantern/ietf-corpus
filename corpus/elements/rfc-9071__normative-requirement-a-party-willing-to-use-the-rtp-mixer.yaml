document: rfc-9071
kind: normative-requirement
summary: A party willing to use the RTP-mixer-based method SHALL include the 'rtt-mixer' SDP attribute in the 'text' media section of the initial offer, and after sending that offer MUST be prepared to receive both multiparty-formatted and two-party formatted real-time text.
section: 2.3.1
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
