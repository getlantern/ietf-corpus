document: rfc-5104
kind: protocol-element
summary: Temporary Maximum Media Stream Bit Rate Notification (TMMBN) is sent by a media sender to report the current bounding set of TMMBR-defined limits and identify the owners of each tuple. Non-owning receivers use this to suppress redundant TMMBR messages.
section: 3.5.4
topics:
