document: rfc-8562
kind: normative-requirement
summary: When a BFD Control packet is received with the M bit set, if the Your Discriminator field is nonzero the packet MUST be discarded. A MultipointTail session may be created dynamically on receipt of a multipoint BFD Control packet, subject to local policy.
section: 5.13.2
rfc2119_level: MUST
topics:
    - routing
    - multicast
