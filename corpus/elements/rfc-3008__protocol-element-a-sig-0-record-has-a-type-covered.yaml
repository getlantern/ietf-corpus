document: rfc-3008
kind: protocol-element
summary: A SIG(0) record has a type covered field of 0 and is attached to a DNS message to protect message integrity, as opposed to data SIGs which cover RRsets. SIG(0) is defined in RFC 2535 and RFC 2931.
