document: rfc-9198
kind: protocol-element
summary: A Discoverable Node is one that conveys its Node identity when error conditions are detected; for IP, compliance with RFC 1122 Section 3.2.2.4 when discarding a packet due to TTL or Hop Limit Exceeded MUST result in sending the corresponding Time Exceeded message containing Node identity to the source.
section: "3.1"
topics:
    - measurement
    - ip
