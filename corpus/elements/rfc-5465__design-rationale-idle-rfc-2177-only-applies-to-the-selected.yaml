document: rfc-5465
kind: design-rationale
summary: IDLE (RFC 2177) only applies to the selected mailbox and provides no way to restrict which events are sent, requiring an additional TCP connection per monitored mailbox. NOTIFY was designed to let clients express preferences about events across multiple mailboxes on a single connection, reducing unnecessary server processing and network traffic.
section: "1"
topics:
    - email
