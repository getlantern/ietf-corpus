document: rfc-7905
kind: security-consideration
summary: AEAD constructions such as ChaCha20-Poly1305 are not intended to hide plaintext lengths. Traffic analysis is outside the scope of the AEAD and is addressed elsewhere; the side-channel protections in scope are timing and cache side-channels only.
