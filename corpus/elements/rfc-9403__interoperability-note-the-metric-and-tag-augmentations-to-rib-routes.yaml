document: rfc-9403
kind: interoperability-note
summary: The 'metric' and 'tag' augmentations to RIB routes are excluded via a YANG 'when' constraint for routes whose source-protocol is derived from 'ospf:ospf' or 'isis:isis', ensuring compatibility with the existing OSPF (RFC 9129) and IS-IS (RFC 9130) YANG modules that already augment these fields.
section: "5"
topics:
