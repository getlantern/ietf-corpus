document: rfc-5942
kind: normative-requirement
summary: When the Default Router List is empty and no on-link information exists, since address resolution cannot be performed for off-link destinations, the host should send an ICMPv6 Destination Unreachable indication rather than attempting on-link delivery.
section: "4"
rfc2119_level: SHOULD
topics:
