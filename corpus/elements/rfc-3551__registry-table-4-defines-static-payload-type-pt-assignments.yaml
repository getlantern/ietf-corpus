summary: Table 4 defines static payload type (PT) assignments for audio encodings 0-23 (e.g., PT 0=PCMU, PT 3=GSM, PT 8=PCMA, PT 9=G722, PT 18=G729) plus dynamic-only entries. Table 5 assigns video and combined PTs 25-34 (e.g., PT 26=JPEG, PT 31=H261, PT 32=MPV, PT 33=MP2T). PT range 96-127 is reserved for dynamic use.
