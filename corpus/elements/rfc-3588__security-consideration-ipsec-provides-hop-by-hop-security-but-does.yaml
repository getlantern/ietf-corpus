document: rfc-3588
kind: security-consideration
summary: IPsec provides hop-by-hop security but does not protect the full end-to-end Diameter path when agents are involved. End-to-end security (data-object integrity and confidentiality for sensitive AVPs such as keys, passwords, and accounting data) is provided by the CMS-based extension [AAACMS]. All Diameter implementations are strongly RECOMMENDED to support end-to-end security.
section: "2.9"
topics:
    - security
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
