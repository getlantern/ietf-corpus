document: rfc-5804
kind: normative-requirement
summary: If a server has an inactivity timeout resulting in client autologout, it MUST be no less than 30 minutes after successful authentication. The timeout MAY be less before authentication.
section: "1.2"
rfc2119_level: MUST
topics:
    - email
