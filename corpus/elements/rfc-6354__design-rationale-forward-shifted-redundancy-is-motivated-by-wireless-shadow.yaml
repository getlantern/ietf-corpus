document: rfc-6354
kind: design-rationale
summary: Forward-shifted redundancy is motivated by wireless 'shadow' scenarios where a mobile receiver can be blocked for seconds or tens of seconds. Traditional backward-shifted redundancy (RFC 2198) and most FEC schemes are ineffective against such consecutive frame losses.
