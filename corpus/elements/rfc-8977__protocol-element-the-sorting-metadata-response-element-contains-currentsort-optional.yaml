document: rfc-8977
kind: protocol-element
summary: The 'sorting_metadata' response element contains 'currentSort' (optional string) and 'availableSorts' (optional array of AvailableSort objects). At least one of 'currentSort' or 'availableSorts' MUST be present. Each AvailableSort includes 'property' (required), 'default' (required boolean), 'jsonPath' (optional), and 'links' (optional).
section: "2.1"
