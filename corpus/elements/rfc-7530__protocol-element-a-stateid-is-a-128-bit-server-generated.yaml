document: rfc-7530
kind: protocol-element
summary: A stateid is a 128-bit server-generated quantity that uniquely identifies open and locking states for a specific open-owner or lock-owner/open-owner pair for a specific file. The server increments the seqid component monotonically at each state transition so clients can determine OPEN processing order.
section: 2.2.16
extracted_by: claude-sonnet-4-6
