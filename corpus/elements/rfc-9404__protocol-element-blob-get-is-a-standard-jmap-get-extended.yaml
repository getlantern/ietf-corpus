kind: protocol-element
summary: 'Blob/get is a standard JMAP get extended with two optional parameters: offset (UnsignedInt|null, default 0) to start reading into the blob, and length (UnsignedInt|null) to limit how many octets are returned. Request properties include data:asText, data:asBase64, data, digest:<algorithm>, and size.'
