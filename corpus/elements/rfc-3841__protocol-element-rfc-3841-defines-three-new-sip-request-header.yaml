summary: 'RFC 3841 defines three new SIP request header fields: Accept-Contact (compact form ''a''), Reject-Contact (compact form ''j''), and Request-Disposition (compact form ''d''). Accept-Contact and Reject-Contact carry feature set preferences; Request-Disposition carries request handling directives.'
