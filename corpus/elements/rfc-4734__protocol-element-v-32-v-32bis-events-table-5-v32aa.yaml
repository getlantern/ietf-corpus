document: rfc-4734
kind: protocol-element
summary: 'V.32/V.32bis events (Table 5): V32AA (code 63, repeating ''0000'' bit pattern at 4800 bits/s) and V32AC (code 27, repeating ''0011'' bit pattern at 4800 bits/s). Both SHOULD be reported as soon as the pattern is detected to minimize transition time to V.150.1 modem relay.'
section: "2.5"
