summary: An upstream LSR that assigns upstream-assigned labels creates a Next Hop Label Forwarding Entry (NHLFE) for each assigned label rather than an Incoming Label Map (ILM) entry, since upstream-assigned labels are outgoing labels from the perspective of the assigning LSR.
