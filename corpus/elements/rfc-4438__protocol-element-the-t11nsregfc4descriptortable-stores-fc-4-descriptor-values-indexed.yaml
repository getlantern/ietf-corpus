kind: protocol-element
summary: The t11NsRegFc4DescriptorTable stores FC-4 Descriptor values indexed by port and FC-4 Type value (0..255). Each descriptor is an OCTET STRING up to 255 bytes whose format depends on the FC-4 Type, stored in network-byte order per FC-GS-4 section 5.2.5.42.
