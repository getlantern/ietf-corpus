summary: 'SnmpNBPAddress is a variable-length OCTET STRING (SIZE 3..99) encoding an NBP name with three length-prefixed fields: object (up to 32 octets), type (up to 32 octets), and zone (up to 32 octets); strings are case-insensitive and may contain any octet except 0xFF.'
