document: rfc-5724
kind: wire-format
summary: 'The formal ABNF syntax defines sms-uri as: scheme ":" sms-hier-part [ "?" sms-fields ], with sms-fields composed of sms-field-name "=" escaped-value pairs delimited by "&". The ''body'' field name MUST appear only once; sms-field-ext allows extension field names composed of unreserved characters.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
