document: rfc-5591
kind: protocol-element
summary: The snmpTsmConfigurationUsePrefix MIB object (TruthValue, read-write, default false) controls whether transport-domain prefixes are prepended to securityNames. This allows applications such as access control and notification generation to factor in the transport model used.
section: 6.1.2
topics:
    - security
