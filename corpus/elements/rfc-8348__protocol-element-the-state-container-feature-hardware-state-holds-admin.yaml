document: rfc-8348
kind: protocol-element
summary: The 'state' container (feature 'hardware-state') holds admin-state (writable), oper-state, usage-state, alarm-state, and standby-state leaves, all mapped to corresponding ENTITY-STATE-MIB objects. The 'state-last-changed' leaf records when any of these state values last changed.
