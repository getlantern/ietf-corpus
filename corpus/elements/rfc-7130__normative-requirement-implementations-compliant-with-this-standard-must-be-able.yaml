document: rfc-7130
kind: normative-requirement
summary: Implementations compliant with this standard MUST be able to receive both untagged and 802.1p priority tagged (VLAN tag of zero) micro-BFD packets when the LAG operates in the context of IEEE 802.1q or IEEE 802.qinq.
