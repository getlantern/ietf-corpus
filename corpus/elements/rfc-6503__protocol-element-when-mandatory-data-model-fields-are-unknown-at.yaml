document: rfc-6503
kind: protocol-element
summary: When mandatory data model fields are unknown at request construction time (e.g., the XCON-URI of a not-yet-created conference), clients fill those fields with AUTO_GENERATE_X wildcard strings (uppercase, with a unique numeric index X). The server replaces each occurrence with a proper generated identifier and echoes the replacements in the response.
section: "4.3"
topics:
    - realtime
