document: rfc-8208
kind: security-consideration
summary: The security considerations of RFC 3279, RFC 5480, RFC 6090, RFC 7935, and RFC 8209 apply to BGPsec certificates and certification requests. The security considerations of RFC 3279, RFC 6090, and RFC 8205 apply to BGPsec UPDATE messages. No new security considerations are introduced by this specification.
