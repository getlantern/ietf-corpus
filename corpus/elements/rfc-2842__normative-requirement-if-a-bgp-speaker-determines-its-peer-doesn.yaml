document: rfc-2842
kind: normative-requirement
summary: If a BGP speaker determines its peer doesn't support a required capability, the speaker may send a NOTIFICATION with Error Subcode 'Unsupported Capability' and terminate peering; such peering should not be re-established automatically.
section: "1"
rfc2119_level: MAY
topics:
    - bgp
    - routing
