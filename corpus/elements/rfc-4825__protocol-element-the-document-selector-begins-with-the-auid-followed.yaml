document: rfc-4825
kind: protocol-element
summary: The document selector begins with the AUID, followed by either 'global' or 'users'. Under 'users', the next path segment MUST be the XUI (percent-encoded if necessary). The final path segment identifies the document. Subdirectories are permitted but NOT RECOMMENDED; there MUST NOT be a document with the same name as a sub-directory.
section: "6.2"
topics:
    - http
