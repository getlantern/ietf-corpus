document: rfc-3621
kind: protocol-element
summary: The pethPsePortTable defines objects for configuring and monitoring power characteristics of each PSE port, indexed by pethPsePortGroupIndex and pethPsePortIndex. It includes port admin enable, power pairs, detection status, power priority, and fault counters. All read-write object values are persistent across restart/reboot.
