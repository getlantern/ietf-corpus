document: rfc-2234
kind: interoperability-note
summary: Literal text strings in ABNF are case-insensitive and must use US-ASCII. To specify a case-sensitive match, each character must be specified individually using numeric notation (e.g., %d97.98.99 for lowercase 'abc').
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
