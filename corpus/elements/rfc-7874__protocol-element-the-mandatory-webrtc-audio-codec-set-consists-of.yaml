document: rfc-7874
kind: protocol-element
summary: 'The mandatory WebRTC audio codec set consists of: Opus (RFC 6716/RFC 7587), G.711 PCMA and PCMU (ITU-T G.711/RFC 3551), RFC 3389 comfort noise, and RFC 4733 telephone-event DTMF. Additional codecs SHOULD be offered when available to maximize session establishment without transcoding.'
