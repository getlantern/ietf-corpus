document: rfc-1572
kind: wire-format
summary: 'Within IS and INFO payloads, special bytes must be escaped: IAC must be sent as IAC IAC; VAR as ESC VAR; USERVAR as ESC USERVAR; VALUE as ESC VALUE; ESC as ESC ESC. A variable with no following VALUE is undefined; a VALUE immediately followed by type or IAC is defined but empty.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
