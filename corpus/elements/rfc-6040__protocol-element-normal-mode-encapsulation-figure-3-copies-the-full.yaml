document: rfc-6040
kind: protocol-element
summary: Normal mode encapsulation (Figure 3) copies the full 2-bit ECN field from the incoming IP header into the new outer header, including CE. Compatibility mode clears the outer ECN field to Not-ECT (00). The inner header ECN field is always forwarded unchanged regardless of mode.
section: "4.1"
topics:
