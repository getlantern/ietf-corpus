document: rfc-8311
kind: registry
summary: IANA updated the 'Transmission Control Protocol (TCP) Header Flags' registry to remove the registration of TCP header bit 7 as the NS (Nonce Sum) bit and added an annotation stating that bit 7 was used by Historic RFC 3540 as the NS bit but is now Reserved.
