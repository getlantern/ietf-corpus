document: rfc-4933
kind: normative-requirement
summary: The <contact:upID> and <contact:upDate> elements MUST NOT be present in an <info> response if the contact has never been modified. The <contact:trDate> element MUST NOT be provided if the contact has never been transferred.
section: 3.1.2
rfc2119_level: MUST NOT
