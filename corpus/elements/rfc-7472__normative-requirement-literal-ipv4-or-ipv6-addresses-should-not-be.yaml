document: rfc-7472
kind: normative-requirement
summary: Literal IPv4 or IPv6 addresses SHOULD NOT be used in 'ipps' URIs, because IP addresses are often changed after installation, don't map simply to security domains, are difficult to validate with X.509 certificates, and link-local addresses are not portable.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
