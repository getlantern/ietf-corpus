document: rfc-6911
kind: protocol-element
summary: The Route-IPv6-Information Attribute (Type 170, Length 4–20) specifies an IPv6 prefix and corresponding route to be announced via the Route Information Option (RFC 4191). It contains a Reserved octet, an 8-bit Prefix-Length (0–128), and a variable-length Prefix field (0, 8, or 16 octets).
