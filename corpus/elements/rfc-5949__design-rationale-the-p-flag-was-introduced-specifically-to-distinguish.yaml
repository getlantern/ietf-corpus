document: rfc-5949
kind: design-rationale
summary: The 'P' flag was introduced specifically to distinguish the proxy-mode HI/HAck messages from their RFC 5568 counterparts. Without this flag, a receiving router could not determine whether it is interacting with a standard FMIPv6 node or a PMIPv6-aware MAG.
