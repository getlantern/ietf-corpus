document: rfc-3501
kind: normative-requirement
summary: If a server has an inactivity autologout timer, its duration MUST be at least 30 minutes. Receipt of ANY command from the client during that interval SHOULD suffice to reset the timer.
section: "5.4"
rfc2119_level: MUST
topics:
    - email
