document: rfc-2726
kind: protocol-element
summary: The key-cert attribute has the form PGPKEY-hhhhhhhh, where hhhhhhhh is the hex representation of the four-byte PGP key ID. The PGPKEY- prefix reserves namespace for future non-PGP certificate types and distinguishes key-cert queries from person queries.
section: "2.1"
topics:
