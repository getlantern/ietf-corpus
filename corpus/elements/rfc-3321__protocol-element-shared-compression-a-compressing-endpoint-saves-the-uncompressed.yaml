document: rfc-3321
kind: protocol-element
summary: 'Shared compression: a compressing endpoint saves the uncompressed version of the message it is about to send as a shared state, then indicates this state''s availability to the remote compressor. The remote uses the SHA-1 instruction to calculate the shared_state_id and matches it against the decompressed message to enable compression using the shared state.'
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
