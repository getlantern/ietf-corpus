document: rfc-8580
kind: normative-requirement
summary: Copies of messages filed into a mailbox via the FCC extension are REQUIRED to be in the Internet Message Format (RFC 5322). Messages generated in other formats MUST be encapsulated using constructs from RFC 5322 and MIME (RFC 2045, 2046, 2047, 2231).
section: "4"
rfc2119_level: REQUIRED
topics:
    - email
