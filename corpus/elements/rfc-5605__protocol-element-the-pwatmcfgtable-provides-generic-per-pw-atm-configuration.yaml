document: rfc-5605
kind: protocol-element
summary: The pwAtmCfgTable provides generic per-PW ATM configuration applicable to all ATM PW types. Key objects are pwAtmCfgMaxCellConcatenation (Unsigned32, range 1..29, maximum cells concatenated per PSN packet), pwAtmCfgFarEndMaxCellConcatenation (far-end advertised limit), pwAtmCfgTimeoutMode (notApplicable/disabled/enabled), and pwAtmClpQosMapping (TruthValue for CLP-to-QoS field mapping).
section: "9"
topics:
