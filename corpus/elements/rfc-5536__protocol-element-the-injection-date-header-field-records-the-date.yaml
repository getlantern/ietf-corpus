document: rfc-5536
kind: protocol-element
summary: The Injection-Date header field records the date and time the article was injected into the network by a news server, enabling stale-article detection using a server-supplied timestamp rather than the user agent's composition-time Date. It replaces the deprecated NNTP-Posting-Date header.
section: 3.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
