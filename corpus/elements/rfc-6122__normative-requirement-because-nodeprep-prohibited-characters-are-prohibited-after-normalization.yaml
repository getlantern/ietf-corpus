document: rfc-6122
kind: normative-requirement
summary: Because Nodeprep-prohibited characters are prohibited after normalization, an implementation MUST NOT enable a human user to input any Unicode code point whose decomposition includes those characters (e.g., U+FE6B SMALL COMMERCIAL AT decomposes to '@', U+FF1A FULLWIDTH COLON decomposes to ':').
section: A.7
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
