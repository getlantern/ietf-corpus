document: rfc-5545
kind: normative-requirement
summary: Binary content information in an iCalendar object SHOULD be referenced using a URI. When included inline, it MUST be BASE64-encoded and the property MUST specify the 'ENCODING=BASE64' parameter. Inline binary SHOULD only be used when the object must be expressed as a single entity.
section: 3.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
