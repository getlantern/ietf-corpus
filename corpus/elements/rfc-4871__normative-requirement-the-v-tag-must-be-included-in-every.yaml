document: rfc-4871
kind: normative-requirement
summary: The v= tag MUST be included in every DKIM-Signature and MUST have the value '1'. Verifiers must do a string comparison; '1' is not the same as '1.0'.
section: "3.5"
rfc2119_level: MUST
