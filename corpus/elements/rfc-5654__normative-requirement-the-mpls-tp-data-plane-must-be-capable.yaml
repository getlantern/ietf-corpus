document: rfc-5654
kind: normative-requirement
summary: The MPLS-TP data plane MUST be capable of forwarding data and taking recovery actions independent of the control or management plane, and forwarding, OAM, and protection MUST continue to operate if the management or control plane that configured the transport paths fails.
section: "2.1"
rfc2119_level: MUST
topics:
