document: rfc-4803
kind: protocol-element
summary: 'The gmplsLabelTable (in GMPLS-LABEL-STD-MIB) stores GMPLS label values of variable length that cannot be encoded in the 32-bit MplsLabel textual convention. It is indexed by (gmplsLabelInterface, gmplsLabelIndex, gmplsLabelSubindex) and supports six label types: MPLS packet label, port/wavelength, freeform, SONET, SDH, and waveband.'
