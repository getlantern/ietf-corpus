document: rfc-9763
kind: normative-requirement
summary: The CA MUST verify the signature field of the relatedCertRequest attribute using the public key from the certificate identified by the attribute. This confirms that the CSR requester also controls the private key of the related certificate.
section: "3.2"
rfc2119_level: MUST
