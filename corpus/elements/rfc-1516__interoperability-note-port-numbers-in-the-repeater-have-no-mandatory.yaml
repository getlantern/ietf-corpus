document: rfc-1516
kind: interoperability-note
summary: Port numbers in the repeater have no mandatory relationship to ifIndex values in the MIB-II interfaces table. The rptrPortGroupIndex and rptrPortIndex pair uniquely identifies a port; the interfaces group does not map to repeater ports.
