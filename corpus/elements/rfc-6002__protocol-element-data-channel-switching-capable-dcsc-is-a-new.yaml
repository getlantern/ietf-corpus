document: rfc-6002
kind: protocol-element
summary: Data Channel Switching Capable (DCSC) is a new GMPLS switching type (value 125) for interfaces that switch the whole digital channel on single-channel interfaces. It excludes interfaces that inherently support multiple channels such as WDM or channelized TDM. Examples include concatenated TDM, line-encoded interfaces, and Ethernet switched at the physical port level.
section: "2"
topics:
