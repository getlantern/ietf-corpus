document: rfc-8147
kind: protocol-element
summary: The <ack> element references a specific Content-ID ('ref' attribute, type anyURI) and carries a 'received' boolean. It is used by the PSAP to confirm successful or unsuccessful receipt of an IVS-sent data object. An <actionResult> child element reports the outcome of non-'send-data' actions.
section: 9.1.1
topics:
    - sip
