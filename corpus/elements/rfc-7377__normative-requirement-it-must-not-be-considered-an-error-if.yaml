document: rfc-7377
kind: normative-requirement
summary: It MUST NOT be considered an error if search terms include a range of message numbers that extends beyond the end of the mailbox. This allows clients to implement a rolling search window efficiently.
section: "2"
rfc2119_level: MUST NOT
topics:
