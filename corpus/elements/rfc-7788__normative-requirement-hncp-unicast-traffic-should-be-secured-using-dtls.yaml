document: rfc-7788
kind: normative-requirement
summary: HNCP unicast traffic SHOULD be secured using DTLS over UDP port 8232. A node implementing HNCP security MUST support the DNCP Pre-Shared Key (PSK) method, SHOULD support the PKI-based trust method, and MAY support the certificate-based trust consensus method.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
