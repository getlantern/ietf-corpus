document: rfc-4701
kind: normative-requirement
summary: Both DHCP clients and servers SHOULD use some form of update authentication (e.g., TSIG per RFC 2845) when performing DNS updates. Administrators should be wary of permitting unsecured DNS updates to zones.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - dns
