document: rfc-5689
kind: design-rationale
summary: Extended MKCOL was introduced to eliminate the proliferation of new MKxxx methods (e.g., MKCALENDAR) for each new 'special' collection type. Each new method adds server complexity and requires intermediaries to be aware of it, making the overall system less reliable.
section: "1"
topics:
