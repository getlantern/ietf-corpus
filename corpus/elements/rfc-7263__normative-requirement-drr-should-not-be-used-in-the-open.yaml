document: rfc-7263
kind: normative-requirement
summary: DRR SHOULD NOT be used in the open Internet or if the administrator does not have sufficient information about the overlay network topology. Peers in a managed system trying DRR MUST also support SRR in case DRR fails.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
