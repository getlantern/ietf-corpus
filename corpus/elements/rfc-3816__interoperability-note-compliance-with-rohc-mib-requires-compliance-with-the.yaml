document: rfc-3816
kind: interoperability-note
summary: Compliance with ROHC-MIB requires compliance with the ifCompliance3 MODULE-COMPLIANCE statement of IF-MIB (RFC 2863). Compliance with ROHC-UNCOMPRESSED-MIB additionally requires compliance with rohcCompliance of ROHC-MIB. The same chain applies to ROHC-RTP-MIB.
