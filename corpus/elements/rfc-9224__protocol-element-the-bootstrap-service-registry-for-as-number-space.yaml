document: rfc-9224
kind: protocol-element
summary: The Bootstrap Service Registry for AS Number Space contains entries as hyphen-separated AS number ranges in decimal (asplain per RFC 5396), e.g., '64512-65534'. A single AS is represented as a range of two identical numbers. AS number ranges MUST NOT overlap.
section: "5.3"
topics:
    - registry
