document: rfc-7216
kind: protocol-element
summary: A Device identifies a set of potential IP addresses that currently route packets to it, ordered by proximity. Local interface addresses are listed first; STUN 'Binding Request' with 'XOR-MAPPED-ADDRESS' response is used to determine the public reflexive transport address.
