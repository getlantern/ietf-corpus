document: rfc-3539
kind: protocol-element
summary: The watchdog timer Tw is initialized to Twinit (default 30 seconds) plus a jitter drawn randomly from [-2, +2] seconds. Tw is reset whenever any AAA message is received. On expiry with no pending watchdog, a Device-Watchdog-Request (DWR) is sent and Pending is set TRUE.
section: 3.4.1
