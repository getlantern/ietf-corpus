document: rfc-4448
kind: normative-requirement
summary: In raw mode, service-delimiting tags are NEVER sent over the PW. If a service-delimiting tag is present when the frame is received from the attachment circuit, it MUST be stripped by the NSP before the frame is sent to the PW.
section: 4.4.1
rfc2119_level: MUST
topics:
    - mpls
