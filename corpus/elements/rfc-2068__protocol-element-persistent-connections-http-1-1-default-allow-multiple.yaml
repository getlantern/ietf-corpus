document: rfc-2068
kind: protocol-element
summary: 'Persistent connections (HTTP/1.1 default) allow multiple request/response exchanges over a single TCP connection. The Connection header controls per-connection options; ''Connection: close'' signals that the connection will be closed after the response.'
