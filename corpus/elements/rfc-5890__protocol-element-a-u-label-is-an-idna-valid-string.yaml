document: rfc-5890
kind: protocol-element
summary: A U-label is an IDNA-valid string of Unicode characters in Normalization Form C (NFC) that includes at least one non-ASCII character, expressed in a standard Unicode Encoding Form (e.g., UTF-8). It must satisfy permitted-character constraints from the Tables document, Bidi constraints if it contains right-to-left script characters, and must exhibit a symmetry with its corresponding A-label.
section: 2.3.2.1
topics:
    - dns
