document: rfc-7183
kind: interoperability-note
summary: Routers whose implementation of NHDP and/or OLSRv2 does not include this integrity protection will be ignored by routers using it, and the two sets of routers will form disjoint MANETs by design. The unsecured MANET retains some information about the secured MANET but cannot use it due to lack of recognized symmetric links.
section: "4"
topics:
