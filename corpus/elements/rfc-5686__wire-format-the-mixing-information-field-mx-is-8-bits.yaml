kind: wire-format
summary: 'The Mixing Information field (MX) is 8 bits: C1 (1 bit validity flag), R1 (1 bit reserved), V1 (1 bit VAD flag), and PW1 (5 bits signal power code computed as PW1 = ((~R)>>2) & 0x1F where R is the G.711 u-law encoded RMS).'
