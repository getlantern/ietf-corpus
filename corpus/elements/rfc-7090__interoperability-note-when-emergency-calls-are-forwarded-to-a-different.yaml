document: rfc-7090
kind: interoperability-note
summary: When emergency calls are forwarded to a different emergency services network (e.g., from state.example to example.net/org/com), the callback originates from the forwarded domain while the UA has stored state for the original domain, breaking domain-comparison callback detection.
section: "3.3"
topics:
    - sip
    - realtime
