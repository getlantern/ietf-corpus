document: rfc-9951
kind: design-rationale
summary: For long-running Flows, the IPFIX Metering Process may miss the temporal distribution of delay (e.g., elevated delay only at the start). Operators experiencing this as a problem should configure a smaller Flow expiration timeout per RFC 5470 Section 5.1.1.
section: "7.4"
topics:
    - measurement
extracted_by: claude-sonnet-4-6
