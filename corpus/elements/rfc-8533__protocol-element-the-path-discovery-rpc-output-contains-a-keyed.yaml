summary: 'The `path-discovery` RPC output contains a keyed `response-list` (key: `response-index` uint32) where each entry carries mandatory `protocol-id`, `status-code`, and `status-sub-code` leaves. The output also reuses `path-discovery-data` from RFC 8532, which includes `path-trace-info` and path verification statistics.'
