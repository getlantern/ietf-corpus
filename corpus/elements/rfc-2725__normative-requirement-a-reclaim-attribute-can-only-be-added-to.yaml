document: rfc-2725
kind: normative-requirement
summary: A reclaim attribute can only be added to an existing object if there are no existing exact matches or more specific objects overlapped by the new reclaim attribute, or if the submitter is listed in the mnt-by of overlapped objects, or if any overlapped object is listed in a no-reclaim attribute.
section: "9.5"
rfc2119_level: MUST
topics:
    - routing
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
