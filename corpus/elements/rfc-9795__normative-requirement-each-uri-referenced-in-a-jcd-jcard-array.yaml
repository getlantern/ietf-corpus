document: rfc-9795
kind: normative-requirement
summary: Each URI referenced in a "jcd" jCard array MUST have a corresponding JSON pointer string key and digest value in the "rcdi" claim. Use of the digest for the entire "/jcd" array is RECOMMENDED as a redundant protection against substitution or insertion attacks.
section: 6.1.3
rfc2119_level: MUST
topics:
    - crypto
    - json
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
