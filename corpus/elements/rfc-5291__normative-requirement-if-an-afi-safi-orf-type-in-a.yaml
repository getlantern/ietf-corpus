document: rfc-5291
kind: normative-requirement
summary: If an <AFI/SAFI, ORF-type> in a received ROUTE-REFRESH message does not match what the speaker advertised willingness to receive, those ORF entries are ignored. If any field of an ORF entry contains an unrecognized value, the entire previously-received ORF for that type is removed.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
