document: rfc-8561
kind: protocol-element
summary: The ietf-interface-protection module defines a generic protection-groups grouping with protection-architecture-type (default one-plus-one-type, from ITU-T G.808.1), operation-type (revertive or non-revertive, default non-revertive), hold-off-timer (uint16 milliseconds), and revertive-wait-to-restore (uint16 seconds).
