document: rfc-4470
kind: design-rationale
summary: 'NSEC records in a signed DNSSEC zone reveal zone contents via zone walking: repeated NSEC queries retrieve all instantiated names. Minimally covering NSEC records narrow the span between owner name and next name to make zone walking require approximately as many queries as brute-force enumeration, rendering it impractical.'
section: "1"
topics:
    - dns
    - security
    - privacy
