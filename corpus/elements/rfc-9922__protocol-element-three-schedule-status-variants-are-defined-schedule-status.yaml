document: rfc-9922
kind: protocol-element
summary: 'Three schedule-status variants are defined: ''schedule-status'' (base), ''schedule-status-with-time-zone'' (adds read-only time-zone-identifier and schedule-name), and ''schedule-status-with-name'' (adds schedule-name). These variants support better modularity across different scheduling contexts.'
section: 3.3.9
topics:
