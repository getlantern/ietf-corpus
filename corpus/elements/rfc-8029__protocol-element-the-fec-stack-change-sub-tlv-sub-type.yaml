document: rfc-8029
kind: protocol-element
summary: The FEC Stack Change sub-TLV (sub-type 3 within DDMAP) signals that the downstream FEC Stack differs from the echo request. It carries Operation Type (1=Push, 2=Pop), Address Type (0=Unspecified, 1=IPv4, 2=IPv6), FEC-TLV length, Remote Peer Address (0/4/16 octets), and an optional FEC TLV. The FEC TLV MUST be present for PUSH operations.
section: 3.4.1.3
topics:
    - mpls
