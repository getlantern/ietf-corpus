document: rfc-5901
kind: protocol-element
summary: 'The FraudType attribute is a required enumeration classifying the fraud: phishing, recruiting, malware distribution, fraudulent site, dnsspoof, archive, other, unknown, and ext-value. The optional FraudParameter sub-element content depends on the chosen type (e.g., email subject line for phishing, website identifier for fraudulent site).'
