document: rfc-7466
kind: normative-requirement
summary: For OLSRv2 (RFC 7181), implementations MUST behave as if a 2-Hop Tuple only exists when N2_lost=false, and as if a change of N2_lost (in either direction) corresponds to a 2-Hop Tuple appearing or being removed for all MPR Set and Routing Set calculations.
section: "5"
rfc2119_level: MUST
topics:
