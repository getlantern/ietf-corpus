document: rfc-3367
kind: design-rationale
summary: Query properties are treated as 'hints' rather than strict SQL-style WHERE clauses. The server makes a best-effort to return results closest to the selection criteria; there is no guarantee that all results match all hints. This is intentional to support relevance-ranking services and internationalization.
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
