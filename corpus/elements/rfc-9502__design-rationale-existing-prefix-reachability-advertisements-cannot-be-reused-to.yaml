document: rfc-9502
kind: design-rationale
summary: Existing prefix reachability advertisements cannot be reused to associate a prefix with a Flex-Algorithm because they advertise reachability only under default algorithm 0. New IP Flexible Algorithm reachability TLVs/sub-TLVs are therefore defined for both IS-IS and OSPF.
