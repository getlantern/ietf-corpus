document: rfc-6147
kind: interoperability-note
summary: An existing DNSSEC validator that is unaware of DNS64 will reject synthesized AAAA records as tampered data. For DNSSEC validation behind DNS64, the validator must either implement DNS64 itself or establish a trusted relationship with a vDNS64 resolver that validates on its behalf.
section: "6.2"
topics:
    - dns
    - security
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
