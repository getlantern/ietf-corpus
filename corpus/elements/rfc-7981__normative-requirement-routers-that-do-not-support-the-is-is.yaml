document: rfc-7981
kind: normative-requirement
summary: Routers that do not support the IS-IS Router CAPABILITY TLV MUST silently ignore the TLV(s) and continue processing other TLVs in the same LSP. Routers that do not support specific sub-TLVs MUST silently ignore the unsupported sub-TLVs.
section: "4"
rfc2119_level: MUST
topics:
    - routing
