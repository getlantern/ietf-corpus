document: rfc-3779
kind: normative-requirement
summary: During certification path validation of a certificate containing the AS identifier delegation extension, the AS identifiers MUST be subsumed by those in the issuer's certificate. Validation MUST fail otherwise, and every certificate in the path and the trust anchor MUST each contain the AS identifier delegation extension.
section: "3.3"
rfc2119_level: MUST
topics:
    - pkix
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
