document: rfc-9464
kind: security-consideration
summary: Hosting encrypted DNS resolvers in a split-VPN configuration minimizes the attack vector from compromised network devices, which would otherwise be able to monitor or modify DNS traffic. This specification restricts access to DNS messages to only the parties that need to know.
section: "6"
topics:
