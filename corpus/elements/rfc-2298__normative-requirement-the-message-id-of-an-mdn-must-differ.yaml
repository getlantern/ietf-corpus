document: rfc-2298
kind: normative-requirement
summary: The Message-ID of an MDN MUST differ from the Message-ID of the original message. At most one MDN may be issued per recipient; once issued, no further MDNs may be issued for that recipient even if another disposition occurs.
section: "3"
rfc2119_level: MUST
topics:
    - email
