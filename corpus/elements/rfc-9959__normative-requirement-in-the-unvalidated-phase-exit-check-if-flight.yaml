document: rfc-9959
kind: normative-requirement
summary: In the Unvalidated Phase exit check, if flight_size is less than IW or less than or equal to PipeSize, CWND is reset to PipeSize and normal CC resumes; otherwise CWND MUST be set to flight_size before entering the Validating Phase.
section: "3.3"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
