document: rfc-6536
kind: interoperability-note
summary: NACM access control is applied only after session establishment is completed and the NETCONF <hello> exchange has been successfully completed. Access control for descendant nodes within a notification event type is not separately controllable; if the event type is authorized, all contained data is also authorized.
section: 3.4.2
topics:
    - netconf
    - security
