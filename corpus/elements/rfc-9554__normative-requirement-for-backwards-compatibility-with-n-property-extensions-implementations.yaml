document: rfc-9554
kind: normative-requirement
summary: For backwards compatibility with N property extensions, implementations SHOULD add secondary surname and generation values to both the newly defined components and their backwards-compatible counterparts (family name / honorific suffixes). When reading, implementations SHOULD ignore the backwards-compatible component value if an equal value is set in the new component.
section: "2.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
