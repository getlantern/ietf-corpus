document: rfc-1629
kind: protocol-element
summary: IDRP allows grouping connected routing domains into Routing Domain Confederations (RDCs) for routing information aggregation. A domain may belong to multiple RDCs simultaneously with no restrictions on nesting, overlap, or disjointness. Each domain is assigned a unique Routing Domain Identifier (RDI) and each RDC a unique RDCI, both syntactically represented as OSI network layer addresses drawn from the same address space.
section: "3.3"
topics:
    - routing
