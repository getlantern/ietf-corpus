document: rfc-1596
kind: normative-requirement
summary: To create a PVC endpoint row, frPVCEndptRowStatus MUST initially be set to createAndWait. The row MUST NOT be set to active unless frPVCEndptInMaxFrameSize, frPVCEndptInBc, frPVCEndptInBe, frPVCEndptInCIR, frPVCEndptOutMaxFrameSize, frPVCEndptOutBc, frPVCEndptOutBe, and frPVCEndptOutCIR all exist in the row.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
