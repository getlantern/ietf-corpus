document: rfc-6870
kind: security-consideration
summary: LDP extensions and options that protect PWs must be implemented because the Preferential Forwarding and Request Switchover status bits have the same security considerations as the PW setup and maintenance protocol in RFC 4447. The security of a redundant PW set is only as good as the weakest security on any of its member PWs.
section: "9"
topics:
    - security
    - mpls
