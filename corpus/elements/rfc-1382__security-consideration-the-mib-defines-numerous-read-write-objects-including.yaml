document: rfc-1382
kind: security-consideration
summary: The MIB defines numerous read-write objects (including x25AdmnTable, x25ChannelTable, and x25CircuitStatus) whose unauthorized modification could alter or disrupt X.25 communications. Access control relies on the community-based authentication mechanisms of SNMP.
