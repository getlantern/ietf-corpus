document: rfc-1209
kind: normative-requirement
summary: Routers providing LIS interconnection MUST support multiple sets of LIS parameters (one per connected LIS) and associate each set with a specific IP network/subnet number. A single physical SMDS interface with one or more individual addresses is RECOMMENDED.
section: Logical IP Subnetwork Configuration
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
