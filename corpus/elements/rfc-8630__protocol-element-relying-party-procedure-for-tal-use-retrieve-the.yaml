document: rfc-8630
kind: protocol-element
summary: 'Relying Party procedure for TAL use: retrieve the TA certificate from a TAL URI, confirm it is a current self-signed RPKI CA certificate conforming to RFC 6487, confirm the public key matches the TAL, and perform any additional local trust checks. This process SHOULD be repeated at every resynchronization and before local cache expiry.'
section: "3"
topics:
