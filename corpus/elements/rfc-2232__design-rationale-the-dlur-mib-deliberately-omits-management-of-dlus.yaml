document: rfc-2232
kind: design-rationale
summary: The DLUR MIB deliberately omits management of DLUS nodes, DLUR configuration, changing control session state, displaying dependent LUs, and traps. Traps for DLUR resources are handled via the existing APPN MIB alertTrap mechanism using a VariablePointer into the DLUR MIB.
