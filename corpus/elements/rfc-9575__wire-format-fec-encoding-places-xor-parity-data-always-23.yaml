document: rfc-9575
kind: wire-format
summary: FEC encoding places XOR parity data (always 23 octets) in the Additional Data field, aligned to start on a new Authentication Page via null padding. The ADL field is set to the number of padding octets plus 23 parity octets. The Last Page Index is incremented by the number of additional pages required.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
