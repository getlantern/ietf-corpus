document: rfc-1443
kind: protocol-element
summary: 'For OCTET STRING, the DISPLAY-HINT consists of one or more octet-format specifications, each with five parts: optional repeat indicator (''*''), octet length, display format (x/d/o/a), optional separator character, and optional repeat terminator. Multi-octet numeric fields use big-endian (network byte order) encoding.'
section: "3.1"
