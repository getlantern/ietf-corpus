document: rfc-2668
kind: normative-requirement
summary: The rpMauFalseCarriers counter increments only for dot3MauType100BaseT4, dot3MauType100BaseTX, dot3MauType100BaseFX, and all 1000 Mbps types; for all other MAU types it MUST always indicate zero. It can increment at most once per 100 ms (100BASE-X) or once per 10 µs (1000BASE-X) after a valid carrier completion.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
