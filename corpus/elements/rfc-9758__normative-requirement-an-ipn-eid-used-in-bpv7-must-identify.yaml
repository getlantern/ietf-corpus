document: rfc-9758
kind: normative-requirement
summary: An ipn EID used in BPv7 MUST identify a singleton endpoint whose sole member is the node identified by the FQNN. All ipn EIDs sharing any single FQNN MUST refer to the same bundle processing node.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
