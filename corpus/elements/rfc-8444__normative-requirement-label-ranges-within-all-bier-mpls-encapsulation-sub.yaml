document: rfc-8444
kind: normative-requirement
summary: Label ranges within all BIER MPLS Encapsulation Sub-TLVs advertised by the same BFR MUST NOT overlap. If an overlap is detected, all BIER Sub-TLVs advertised by such a router MUST be ignored.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
    - mpls
