document: rfc-2228
kind: design-rationale
summary: New security mechanisms are encouraged to be implemented as GSSAPI mechanisms rather than native FTP security mechanisms so that existing FTP implementations can support them with minimal code changes, and so the mechanism is reusable by other GSSAPI-based protocols such as IMAP with no additional specification work.
section: Appendix I
topics:
