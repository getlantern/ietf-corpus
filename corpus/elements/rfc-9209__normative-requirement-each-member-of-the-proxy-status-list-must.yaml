document: rfc-9209
kind: normative-requirement
summary: Each member of the Proxy-Status List MUST have a type of either String or Token. Deployment-appropriate identifiers include service names, hostnames, IP addresses, or generated strings; product names (e.g., 'ExampleProxy') are not appropriate because they do not identify the specific deployment.
section: "2"
rfc2119_level: MUST
topics:
    - http
