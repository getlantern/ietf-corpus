document: rfc-5796
kind: design-rationale
summary: ESP is made mandatory and AH is specified as optional, in accordance with RFC 4301. This aligns the PIM-SM specification with the newer AH (RFC 4302) and ESP (RFC 4303) specifications. The original RFC 4601 security considerations were based primarily on AH.
section: "1"
topics:
    - ipsec
    - multicast
    - routing
