document: rfc-7858
kind: protocol-element
summary: Clients and servers SHOULD NOT immediately close a connection after each response; instead, they SHOULD reuse existing connections for subsequent queries. Successful TLS negotiation indicates willingness of both parties to maintain idle, persistent connections.
section: "3.4"
