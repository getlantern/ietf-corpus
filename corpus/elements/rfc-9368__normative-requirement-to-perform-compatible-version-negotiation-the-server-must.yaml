document: rfc-9368
kind: normative-requirement
summary: To perform compatible version negotiation, the server MUST select a version it (1) supports and (2) knows the client's Chosen Version is compatible with. If it cannot convert the client's first flight, it MUST abort the handshake.
section: "2.3"
rfc2119_level: MUST
topics:
