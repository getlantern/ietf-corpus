document: rfc-5519
kind: protocol-element
summary: mgmdRouterCacheExcludeModeExpiryTimer (TimeTicks) is applicable only to MGMDv3-compatible nodes and represents the time remaining before the EXCLUDE state expires and the interface transitions to INCLUDE mode. This value can never be greater than mgmdRouterCacheExpiryTime.
section: "5"
topics:
