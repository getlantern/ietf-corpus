document: rfc-4356
kind: normative-requirement
summary: Blind copy (Bcc) recipients appearing in the SMTP envelope but not in headers MUST NOT be added to message headers (including address and trace headers) unless there is only one recipient total.
section: 2.1.3.3
rfc2119_level: MUST NOT
