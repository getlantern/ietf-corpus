document: rfc-4866
kind: normative-requirement
summary: The Lifetime field of a Binding Update authenticated via CGA or permanent home keygen token MUST NOT exceed MAX_CGA_BINDING_LIFETIME. For reachability-based authentication, the lifetime MUST NOT exceed MAX_RR_BINDING_LIFETIME. It is RECOMMENDED that the mobile node always request the maximum permitted lifetime to minimize signaling overhead.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
