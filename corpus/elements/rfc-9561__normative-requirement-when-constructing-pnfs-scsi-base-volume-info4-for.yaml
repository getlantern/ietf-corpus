document: rfc-9561
kind: normative-requirement
summary: When constructing pnfs_scsi_base_volume_info4 for an NVMe namespace, the 'sbv_code_set' field SHALL be set to PS_CODE_SET_BINARY and 'pnfs_scsi_designator_type' SHALL be set to PS_DESIGNATOR_EUI64. If both NGUID and EUI64 are available, NGUID SHOULD be used.
section: "2.1"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
