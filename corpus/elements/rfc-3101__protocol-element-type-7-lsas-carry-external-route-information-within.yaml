document: rfc-3101
kind: protocol-element
summary: Type-7 LSAs carry external route information within an NSSA. They are structurally identical to Type-5 LSAs except the link-state type field is 7, they are flooded only within the originating NSSA, and they include a propagate (P) bit that signals an NSSA border router to translate the LSA into a Type-5 LSA.
section: "2.3"
topics:
    - routing
