document: rfc-8046
kind: protocol-element
summary: The preferred locator is indicated by the P bit in the LOCATOR_SET Locator sub-parameter. By default, the IP addresses used in the HIP base exchange are the preferred locators for both signaling and user data. Multiple preferred locators of different Traffic Types may coexist; the more specific Traffic Type takes precedence.
section: 3.3.3
topics:
    - ip
    - mobility
