document: rfc-3016
kind: protocol-element
summary: The RTP timestamp for MPEG-4 Visual indicates the sampling instance of the VOP; when multiple VOPs are in one packet the timestamp reflects the earliest VOP time, and timestamps of subsequent VOPs are derived from VOP header fields (modulo_time_base, vop_time_increment).
section: "3.1"
topics:
