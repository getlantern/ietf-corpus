document: rfc-4866
kind: wire-format
summary: The CGA Parameters Request option may be included in a Binding Update to request that the correspondent node prove ownership of its IP address by returning its CGA parameters and signature in the Binding Acknowledgment. This allows the mobile node to verify that the permanent home keygen token was issued by the correct correspondent node.
section: "5.6"
topics:
    - mobility
    - crypto
