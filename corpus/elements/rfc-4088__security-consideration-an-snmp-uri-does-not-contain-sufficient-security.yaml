document: rfc-4088
kind: security-consideration
summary: An SNMP URI does not contain sufficient security information for all access scenarios; it cannot encode SNMP securityModels, securityLevels, or credential/keying material. The SNMP manager SHOULD match the securityName in the URI to pre-configured security information and SHOULD NOT generate SNMP operations for unrecognized securityNames.
section: "6"
topics:
    - snmp
    - security
