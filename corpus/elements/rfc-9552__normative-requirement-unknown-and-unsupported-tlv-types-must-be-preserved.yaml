document: rfc-9552
kind: normative-requirement
summary: Unknown and unsupported TLV types MUST be preserved and propagated within both NLRI and the BGP-LS Attribute. The presence of unknown or unexpected TLVs MUST NOT result in the NLRI or BGP-LS Attribute being considered malformed.
section: "5.1"
rfc2119_level: MUST NOT
