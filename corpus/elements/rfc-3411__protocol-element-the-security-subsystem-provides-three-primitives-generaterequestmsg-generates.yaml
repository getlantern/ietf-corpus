summary: 'The Security Subsystem provides three primitives: generateRequestMsg (generates a secured outgoing request/notification), processIncomingMsg (authenticates and decrypts an incoming message, returning the plaintext scopedPDU), and generateResponseMsg (generates a secured response using cached security state from the original request).'
