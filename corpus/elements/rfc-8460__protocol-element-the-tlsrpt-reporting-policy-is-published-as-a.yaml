document: rfc-8460
kind: protocol-element
summary: The TLSRPT reporting policy is published as a DNS TXT record under '_smtp._tls.<policy-domain>'. It contains a version field ('v=TLSRPTv1') and one or more aggregate report URIs ('rua=') supporting 'mailto' and 'https' schemes.
