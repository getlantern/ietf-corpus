document: rfc-3723
kind: protocol-element
summary: An iSCSI session is identified by the 2-tuple <ISID, TSIH>; each connection within a session is assigned a unique Connection ID (CID) and identified by a TCP 5-tuple. An IPsec Phase 2 SA is identified by the 3-tuple <Protocol (ESP), destination address, SPI>. Each TCP connection is protected by exactly one IKE Phase 2 SA, though one SA may cover multiple TCP connections.
section: "3.2"
topics:
    - ipsec
    - tcp
    - security
