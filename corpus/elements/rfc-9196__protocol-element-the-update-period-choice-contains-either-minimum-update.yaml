kind: protocol-element
summary: The update-period choice contains either minimum-update-period (uint32, centiseconds) indicating the smallest acceptable period for a periodic subscription, or supported-update-period (leaf-list of uint32, centiseconds) listing the exact allowed values. A request outside these values results in a 'period-unsupported' error.
