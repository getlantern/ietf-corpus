document: rfc-8529
kind: design-rationale
summary: Network Instances (NIs) differ from Logical Network Elements (LNEs) in that NIs are always configured and operated through a single network device via the NI module, whereas each LNE appears as an independent network element accessed separately; NIs model VRFs/VSIs, not fully independent routers.
