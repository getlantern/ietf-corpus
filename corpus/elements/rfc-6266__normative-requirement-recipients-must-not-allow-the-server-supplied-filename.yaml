document: rfc-6266
kind: normative-requirement
summary: Recipients MUST NOT allow the server-supplied filename to cause writes to any location other than one to which the recipient is specifically entitled; path segments (delimited by '\' and '/') MUST be stripped to prevent directory traversal attacks.
section: "4.3"
rfc2119_level: MUST NOT
topics:
