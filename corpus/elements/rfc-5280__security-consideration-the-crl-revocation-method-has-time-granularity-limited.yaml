document: rfc-5280
kind: security-consideration
summary: The CRL revocation method has time-granularity limited to the CRL issuance period; a revoked certificate may remain apparently valid until the next scheduled CRL update (up to hours or days). On-line status protocols such as OCSP reduce this latency but impose trust requirements on the validation service.
section: "3.3"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
