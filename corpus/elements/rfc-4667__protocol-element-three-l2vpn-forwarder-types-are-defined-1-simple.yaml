summary: 'Three L2VPN forwarder types are defined: (1) simple cross-connect — one-to-one mapping between attachment circuit and pseudowire; (2) VPLS with Virtual Switching Instance (VSI) connected to multiple circuits and pseudowires; (3) VPWS with attachment circuits grouped into colored pools connected via point-to-point cross-connects.'
