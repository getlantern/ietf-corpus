document: rfc-4439
kind: protocol-element
summary: 't11FamRestart (read-write INTEGER: nonDisruptive(1), disruptive(2), noOp(3)) allows an outside administrative function to request Fabric reconfiguration: ''disruptive'' causes an RCF to be sent; ''nonDisruptive'' causes a BF to be sent. The object always reads back as ''noOp''.'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
