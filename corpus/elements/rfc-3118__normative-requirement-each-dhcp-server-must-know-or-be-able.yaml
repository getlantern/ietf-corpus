document: rfc-3118
kind: normative-requirement
summary: Each DHCP server MUST know, or be able to obtain in a secure manner, the keys for all authorized clients. Each client MUST be configured with a unique key to authenticate individual client identities; sharing keys is strongly discouraged.
section: "5.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
