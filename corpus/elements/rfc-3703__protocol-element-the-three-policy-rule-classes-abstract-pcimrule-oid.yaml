document: rfc-3703
kind: protocol-element
summary: The three policy rule classes — abstract pcimRule (OID 1.3.6.1.1.6.1.5), auxiliary pcimRuleAuxClass (1.3.6.1.1.6.1.6), and structural pcimRuleInstance (1.3.6.1.1.6.1.7) — map PCIM's PolicyRule. pcimRule defines 11 MAY attributes covering name, enabled state, condition/action/validity DN lists, usage, priority, mandatory flag, sequenced-action ordering, and role-combinations.
