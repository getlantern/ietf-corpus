document: rfc-8011
kind: registry
summary: 'RFC 8011 specifies IANA registration procedures for IPP extensions via separate registries covering: object types (Section 7.1), attribute names and syntaxes (Section 7.2), type2 keyword values (Section 7.3), type2 enum values (Section 7.4), attribute group names (Section 7.5), out-of-band attribute values (Section 7.6), attribute syntax types (Section 7.7), operation IDs (Section 7.8), and status-code values (Section 7.9). Registration templates are in Appendix A.'
section: "7"
