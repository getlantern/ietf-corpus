document: rfc-7552
kind: normative-requirement
summary: An LSR MUST NOT send a Hello message containing both IPv4 and IPv6 Transport Address optional objects; there MUST be at most one Transport Address optional object in a Hello, and it MUST match the address family of the IP packet carrying the Hello.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
