document: rfc-7697
kind: protocol-element
summary: 'MEG_ID formation for IP-compatible operator type follows RFC 6370: for a co-routed bidirectional LSP, MEG_ID is A1-{Global_ID::Node_ID::Tunnel_Num}::Z9-{Global_ID::Node_ID::Tunnel_Num}::LSP_Num; for an associated bidirectional LSP, both endpoints include LSP_Num. For a PW, MEG_ID uses AGI::A1-{Global_ID::Node_ID::AC_ID}::Z9-{Global_ID::Node_ID::AC_ID}.'
section: "7"
