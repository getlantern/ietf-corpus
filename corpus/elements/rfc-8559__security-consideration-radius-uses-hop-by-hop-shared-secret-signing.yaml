document: rfc-8559
kind: security-consideration
summary: RADIUS uses hop-by-hop shared-secret signing, so any intermediate proxy can forge, replay, or modify packet contents. Systems receiving correctly signed packets cannot detect forgery. The security of CoA proxying therefore depends on trust relationships rather than technical enforcement, mirroring the same limitation on Access-Request and Accounting-Request proxying.
section: "6.1"
topics:
    - radius
    - security
