document: rfc-4918
kind: protocol-element
summary: The If request header is used for conditional operations and lock token submission. It supports tagged-list and no-tag-list forms, evaluating lists of state tokens and ETags. A lock token must appear in an If header to be considered 'submitted'.
section: "10.4"
topics:
