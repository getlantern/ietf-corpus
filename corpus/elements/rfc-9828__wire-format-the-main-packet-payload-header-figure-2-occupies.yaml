document: rfc-9828
kind: wire-format
summary: 'The Main Packet Payload Header (Figure 2) occupies a minimum of 8 octets (two 32-bit words) plus an optional variable-length XTRAB extension. Word 1 contains: MH (2 bits), TP (3 bits), ORDH (3 bits), P (1 bit), XTRAC (3 bits), PTSTAMP (12 bits), ESEQ (8 bits). Word 2 contains: R (1 bit), S (1 bit), C (1 bit), RSVD (4 bits), RANGE (1 bit), PRIMS (8 bits), TRANS (8 bits), MAT (8 bits).'
