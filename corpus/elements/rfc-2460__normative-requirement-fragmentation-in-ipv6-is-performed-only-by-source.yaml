document: rfc-2460
kind: normative-requirement
summary: Fragmentation in IPv6 is performed only by source nodes, not by routers along the delivery path. A source node generates a unique Identification value per fragmented packet (same Source Address, Destination Address) maintained as a 32-bit wrap-around counter.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
