document: rfc-5090
kind: security-consideration
summary: The Digest-HA1 attribute contains no random components when the algorithm is 'MD5' or 'AKAv1-MD5', making it vulnerable to offline dictionary attacks and replay attacks; IPsec or equally strong transport protection is required when this attribute is used.
section: "8.2"
