document: rfc-8842
kind: normative-requirement
summary: When generating the initial SDP offer, the offerer MUST insert an SDP 'setup' attribute with 'actpass', one or more 'fingerprint' attributes per RFC 8122, and a 'tls-id' attribute with a unique value.
