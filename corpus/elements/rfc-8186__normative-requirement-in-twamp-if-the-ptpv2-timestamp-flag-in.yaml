document: rfc-8186
kind: normative-requirement
summary: In TWAMP, if the PTPv2 Timestamp flag in the Set-Up-Response is 0, the Session-Reflector MUST use the NTP timestamp format. If the Session-Reflector does not support NTP format, the Server MUST close the TCP connection associated with the TWAMP-Control session.
section: "2.2"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
