document: rfc-4360
kind: design-rationale
summary: 'The Extended Communities Attribute was designed to overcome two limitations of RFC 1997 BGP Communities: it provides an extended range to avoid overlap across many uses, and the addition of a structured Type Field enables policy based on community application type and explicit transitive/non-transitive designation.'
