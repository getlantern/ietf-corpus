document: rfc-4470
kind: protocol-element
summary: For instantiated names, the 'next name' field of the NSEC record is set to any name that falls lexically after the NSEC owner name and before the next instantiated name, rather than the next instantiated name itself. This relaxes the RFC 4034 Section 4.1.1 requirement and is expected to be fully compatible with existing DNSSEC validators.
section: "3"
topics:
    - dns
    - security
