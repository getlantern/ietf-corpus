document: rfc-4575
kind: normative-requirement
summary: Element key values MUST be unique among siblings of the same type. Two keys of type xs:anyURI are equal if their UTF-8 representations are identical; using relative URIs or lexical white space in keys is NOT RECOMMENDED.
section: "4.5"
rfc2119_level: MUST
topics:
