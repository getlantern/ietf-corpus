document: rfc-5089
kind: design-rationale
summary: PCE discovery information is by nature fairly static and does not change with PCE activity; changes occur only due to configuration updates, deployment/activation, deactivation, or failure. This justifies using IS-IS flooding rather than a more dynamic signaling mechanism.
section: "3.1"
topics:
    - routing
