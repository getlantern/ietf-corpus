document: rfc-7177
kind: normative-requirement
summary: RB1's TRILL Neighbor TLV(s) MUST eventually cover every possible range of SNPA addresses so that any RBridge RB2 can definitively determine whether RB1 can hear RB2; there must be no gap in covered address ranges across all neighbor list fragments sent by RB1.
section: 8.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
