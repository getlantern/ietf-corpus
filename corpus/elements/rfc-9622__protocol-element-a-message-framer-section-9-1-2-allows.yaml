document: rfc-9622
kind: protocol-element
summary: A Message Framer (Section 9.1.2) allows applications to define how Message boundaries are found in a byte-stream transport. Framers transform sequences of Messages into byte-streams and vice versa and must be registered on the Preconnection before establishment.
section: 9.1.2
extracted_by: claude-sonnet-4-6
