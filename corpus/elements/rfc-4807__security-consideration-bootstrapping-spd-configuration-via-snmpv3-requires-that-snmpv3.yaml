document: rfc-4807
kind: security-consideration
summary: Bootstrapping SPD configuration via SNMPv3 requires that SNMPv3 credentials be pre-provisioned before this MIB is usable. Operating with a default-drop SPD until SNMPv3 credentials are in place prevents policy exposure during initial provisioning.
section: "7.4"
topics:
    - ipsec
    - security
    - snmp
