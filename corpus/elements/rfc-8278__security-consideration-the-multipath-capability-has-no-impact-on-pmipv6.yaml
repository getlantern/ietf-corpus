document: rfc-8278
kind: security-consideration
summary: The multipath capability has no impact on PMIPv6 protocol security. The new mobility header options (MAG Multipath Binding and MAG Identifier) are carried like any other mobility header option per RFC 5213, inheriting its security guidelines. This specification does not weaken PMIPv6 security or introduce new vulnerabilities.
section: "6"
topics:
    - security
    - multipath
    - mobility
