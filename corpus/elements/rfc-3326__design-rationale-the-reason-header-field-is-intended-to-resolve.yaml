document: rfc-3326
kind: design-rationale
summary: 'The Reason header field is intended to resolve the Heterogeneous Error Response Forking Problem (HERFP): when an INVITE forks and one branch rejects, the error response may never reach the client unless all branches reject. Encapsulating the final error in a provisional response via Reason solves this.'
