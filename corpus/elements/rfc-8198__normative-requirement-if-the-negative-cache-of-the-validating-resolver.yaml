document: rfc-8198
kind: normative-requirement
summary: If the negative cache of the validating resolver has sufficient information to validate the query, the resolver SHOULD use NSEC, NSEC3, and wildcard records to synthesize answers. Otherwise, it MUST fall back to send the query to the authoritative DNS servers.
section: "5"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
