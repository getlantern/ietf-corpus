document: rfc-9131
kind: normative-requirement
summary: If Optimistic DAD is used, a gratuitous NA SHOULD be sent as soon as a new Optimistic Address is assigned to the node interface. If not using Optimistic DAD, the NA SHOULD be sent when an address transitions from tentative to preferred.
section: 6.1.2
rfc2119_level: SHOULD
topics:
    - ip
