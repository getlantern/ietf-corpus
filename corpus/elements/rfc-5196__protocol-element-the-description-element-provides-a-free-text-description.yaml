document: rfc-5196
kind: protocol-element
summary: The <description> element provides a free-text description of the service or device. It SHOULD carry an 'xml:lang' attribute; if absent, the default language is 'i-default' per RFC 2277. Multiple occurrences are allowed to convey descriptions in different languages.
section: 3.2.13
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
