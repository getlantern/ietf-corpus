document: rfc-7666
kind: protocol-element
summary: 'Two IANA-defined notification control objects exist: vmPerVMNotificationsEnabled (TruthValue, read-write) enables per-VM notifications (vmRunning, vmShutdown, vmPaused, vmSuspended, vmCrashed, vmDeleted, etc.), and vmBulkNotificationsEnabled enables bulk notifications (vmBulkRunning, etc.) that carry only a vmAffectedVMs bitmask rather than individual VM details.'
section: "6.1"
topics:
    - snmp
