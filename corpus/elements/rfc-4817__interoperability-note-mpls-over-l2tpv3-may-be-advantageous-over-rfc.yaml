summary: MPLS over L2TPv3 may be advantageous over RFC 4023 when two routers are already adjacent over an L2TPv3 tunnel established for another reason, or when hardware is optimized for L2TPv3 classification (e.g., already handling HDLC or Frame Relay over L2TPv3).
