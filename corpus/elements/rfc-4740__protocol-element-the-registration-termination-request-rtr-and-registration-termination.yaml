document: rfc-4740
kind: protocol-element
summary: The Registration-Termination-Request (RTR) and Registration-Termination-Answer (RTA) commands use Command-Code 287. RTR is sent server-to-client to force deregistration of one or more SIP AORs, carrying SIP-Deregistration-Reason; RTA is the acknowledgment.
