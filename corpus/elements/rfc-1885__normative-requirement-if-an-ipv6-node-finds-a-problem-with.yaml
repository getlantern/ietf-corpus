document: rfc-1885
kind: normative-requirement
summary: If an IPv6 node finds a problem with a field in the IPv6 header or extension headers such that it cannot complete processing, it MUST discard the packet and SHOULD send a Parameter Problem message indicating the type and location of the problem via the Pointer field.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
