document: rfc-8947
kind: normative-requirement
summary: If a client receives an IA_LL with T1 greater than T2 and both values are greater than 0, the client MUST discard the IA_LL option and process the rest of the message as though the server had not included it.
section: "11.1"
rfc2119_level: MUST
topics:
    - ip
