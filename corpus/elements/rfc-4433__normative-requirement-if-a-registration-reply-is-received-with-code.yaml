document: rfc-4433
kind: normative-requirement
summary: If a Registration Reply is received with code REDIRECT-HA-REQ, the MN MUST authenticate the Reply based on the HA address in the HA field and attempt Registration with the HA address specified in the Redirected HA Extension. The MN MUST put the Redirected HA address as the Requested HA Extension of the new Registration Request.
section: 5.1.1
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
