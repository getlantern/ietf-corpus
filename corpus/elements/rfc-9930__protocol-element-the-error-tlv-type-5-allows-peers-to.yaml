document: rfc-9930
kind: protocol-element
summary: The Error TLV (type 5) allows peers to indicate errors. Error codes 1–999 are informative, 1000–1999 are warnings, and 2000–2999 are fatal. A fatal Error TLV MUST be accompanied by a Result TLV indicating failure, and the conversation is terminated per Section 3.9.3.
section: 4.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
