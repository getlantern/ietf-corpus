document: rfc-1629
kind: normative-requirement
summary: An NSAP prefix carried in the NLRI field for a route originated by a BIS in a given routing domain should be associated with only that routing domain. Ambiguous routing may result if multiple routing domains originate routes with identical NSAP address prefixes, implying the same system is simultaneously in several routing domains.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
