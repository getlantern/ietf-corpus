document: rfc-8505
kind: normative-requirement
summary: A 6LN acting only as a host MUST set the R flag in the EARO to indicate it is not a router and will not handle its own reachability. A 6LR that manages its own reachability SHOULD NOT set the R flag, as doing so may cause conflicting routes to be installed.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
