document: rfc-6887
kind: normative-requirement
summary: If an error is encountered while processing a PCP request or its options, any tentative state changes MUST be rolled back — the PCP server and PCP-controlled device must remain unchanged. The error response MUST be a complete copy of the request packet with the error code and appropriate fields set.
section: "7.3"
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
