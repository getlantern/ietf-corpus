document: rfc-8019
kind: normative-requirement
summary: Implementations MUST use countermeasures (e.g., frequently rotating cookie secrets, timestamped cookies, or global counters in cookie generation) to completely eliminate or make insignificant any benefit an attacker gains from reusing puzzle solutions.
