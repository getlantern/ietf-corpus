document: rfc-4730
kind: wire-format
summary: 'The kpml-request XML schema defines a <kpml-request> root element containing an optional <stream> element and a mandatory <pattern> element. The <pattern> holds an optional <flush> element and one or more <regex> elements, and carries attributes: persist, interdigittimer, criticaldigittimer, extradigittimer, long, longrepeat, nopartial, and enterkey. The root element requires a ''version'' attribute.'
section: "5.2"
topics:
