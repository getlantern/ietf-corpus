document: rfc-2835
kind: normative-requirement
summary: All IP Datagrams SHALL be carried on HIPPI-6400-PH Virtual Channel 1 (VC1) and MUST be padded to a 32-byte granularity prior to sending. Added padding is transparent to IP and is not reflected in the IP header length field.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
