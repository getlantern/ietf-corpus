document: rfc-2078
kind: design-rationale
summary: 'prot_ready_state was introduced in GSS-V2 to achieve full, transparent backward compatibility with GSS-V1 callers: V1 callers ignore prot_ready_state and still get correct behavior at GSS_S_COMPLETE, while V2 callers can optionally begin per-message protection earlier when the session key is already available.'
section: 1.2.7
topics:
    - security
