document: rfc-3344
kind: design-rationale
summary: The foreign agent care-of address mode is preferred over co-located because it allows many mobile nodes to share a single care-of address, reducing pressure on the already-limited IPv4 address space. Co-located care-of addresses require a pool of IPv4 addresses per foreign subnet.
section: "1.7"
topics:
    - mobility
    - ip
