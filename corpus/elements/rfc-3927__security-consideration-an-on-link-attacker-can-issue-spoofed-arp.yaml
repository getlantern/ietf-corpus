document: rfc-3927
kind: security-consideration
summary: An on-link attacker can issue spoofed ARP packets to force a victim host to break all TCP connections by triggering address reconfiguration. The attacker can also prevent the victim from ever completing address selection. When a host abandons an address, another node can hijack existing TCP connections by claiming that address.
section: "5"
topics:
