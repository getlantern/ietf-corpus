document: rfc-5273
kind: security-consideration
summary: Establishing a secure channel between an end-entity and a CA or RA requires an out-of-band trust initiation mechanism (e.g., via IPsec or TLS). In cases where no prior out-of-band trust has been established, the Enveloped Data content type MUST be used to provide shrouding equivalent to what TLS would provide.
section: "6"
topics:
    - pkix
    - security
    - crypto
    - tls
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
