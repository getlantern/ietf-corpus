document: rfc-5640
kind: normative-requirement
summary: Future tunnel types that wish to use the Load-Balancing Block sub-TLV MUST define a load-balancing field that is part of the encapsulating header. IP-in-IP (tunnel type 7) is explicitly excluded from the current definition.
section: "2.1"
rfc2119_level: MUST
