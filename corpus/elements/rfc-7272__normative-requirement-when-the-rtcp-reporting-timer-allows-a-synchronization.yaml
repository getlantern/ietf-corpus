document: rfc-7272
kind: normative-requirement
summary: When the RTCP reporting timer allows, a Synchronization Client SHOULD report on an RTP packet received during the period since the last RTCP XR IDMS Report Block was sent, in order to manage ambiguity arising from RTP timestamp rollover.
section: "6"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
