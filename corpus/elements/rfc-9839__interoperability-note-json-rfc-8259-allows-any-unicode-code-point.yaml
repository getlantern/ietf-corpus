document: rfc-9839
kind: interoperability-note
summary: JSON (RFC 8259) allows any Unicode code point — including all problematic types — in object member names and string values. A JSON-based protocol can restrict field values to one of the three named subsets to improve robustness; equivalent restrictions apply to I-JSON, YAML, CBOR, and XML.
section: "5"
topics:
