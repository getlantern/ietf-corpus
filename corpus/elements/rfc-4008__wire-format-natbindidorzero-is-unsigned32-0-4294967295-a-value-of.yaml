kind: wire-format
summary: NatBindIdOrZero is Unsigned32 (0..4294967295); a value of zero specifically indicates Symmetric NAT where no stable port bind exists. NatBindId is Unsigned32 (1..4294967295) and is unique across both natAddrBindTable and natAddrPortBindTable.
