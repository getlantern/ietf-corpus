document: rfc-6619
kind: design-rationale
summary: Tunneling-based approaches (e.g., DS-Lite) can achieve similar address-conservation benefits, but where point-to-point links already exist, adding another tunneling layer is unnecessary and harmful due to MTU effects. The per-interface approach requires no tunnel endpoint discovery, security mechanisms, or host changes.
