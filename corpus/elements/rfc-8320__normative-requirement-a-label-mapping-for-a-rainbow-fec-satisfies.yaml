summary: 'A label mapping for a Rainbow FEC satisfies the label mapping existence requirement for the corresponding red and blue FECs. The modified condition is: ''Has LSR previously received and retained a label mapping for the red(blue) FEC (or the corresponding Rainbow FEC) from the red(blue) next hop?'''
