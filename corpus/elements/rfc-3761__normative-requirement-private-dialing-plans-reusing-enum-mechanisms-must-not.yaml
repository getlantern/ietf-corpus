document: rfc-3761
kind: normative-requirement
summary: Private dialing plans reusing ENUM mechanisms MUST NOT use the suffix 'e164.arpa' to avoid conflict, MUST NOT be called 'ENUM', and the AUS SHOULD be the full number without the leading '+'.
