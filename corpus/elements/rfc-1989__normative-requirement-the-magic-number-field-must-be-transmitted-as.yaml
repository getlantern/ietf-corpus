document: rfc-1989
kind: normative-requirement
summary: The Magic-Number field MUST be transmitted as zero and MUST be ignored on reception unless modified by a Configuration Option. If Magic-Numbers are negotiated, incoming LQRs SHOULD be checked to detect a looped-back link.
section: "2.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
