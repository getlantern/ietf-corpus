document: rfc-4298
kind: security-consideration
summary: BV16 and BV32 RTP streams are subject to the general RTP security considerations, including achieving confidentiality via encryption. The document notes that the BroadVoice encodings do not exhibit significant non-uniform computational load, so the pathological-datagram denial-of-service attack (common for some compression codecs) is not a significant concern here.
