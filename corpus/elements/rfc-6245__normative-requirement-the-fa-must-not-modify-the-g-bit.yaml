document: rfc-6245
kind: normative-requirement
summary: The FA MUST NOT modify the 'G' bit in the Registration Request because it is protected by the Mobile-Home Authentication extension. The GRE Key Extension is the mechanism to request GRE encapsulation without altering the authenticated field.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - mobility
    - security
