document: rfc-7896
kind: protocol-element
summary: The Include Route Object (IRO) is an optional PCEP object used to specify a set of network elements to be traversed in a computed path. This document clarifies that the IRO's subobject list is ordered and that the L bit encodes loose/strict hop semantics.
