document: rfc-3730
kind: wire-format
summary: 'EPP result codes are four-digit decimal numbers: digit 1 indicates success (1xxx) or failure (2xxx); digit 2 indicates category (x0zz=syntax, x1zz=implementation, x2zz=security, x3zz=data management, x4zz=server system, x5zz=connection management); digits 3-4 provide detail. Every response MUST include a result code and human-readable <msg>.'
section: "3"
