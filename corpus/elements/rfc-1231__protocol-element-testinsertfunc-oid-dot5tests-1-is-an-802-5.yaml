document: rfc-1231
kind: protocol-element
summary: testInsertFunc (OID dot5Tests 1) is an 802.5-specific interface test identifier for use with ifExtnsTestTable from RFC 1229. Invoking it tests the insert-ring logic of the hardware when connected to a wiring concentrator; it actually inserts the station into the network and could disrupt operational rings.
section: "5"
