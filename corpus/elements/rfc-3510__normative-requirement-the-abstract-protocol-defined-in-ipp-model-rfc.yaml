document: rfc-3510
kind: normative-requirement
summary: The abstract protocol defined in IPP Model (RFC 2911) places a limit of 1023 octets (NOT characters) on the length of a URI. IPP Printers ought to be cautious about depending on URI lengths above 255 bytes for older client compatibility.
section: "4.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
