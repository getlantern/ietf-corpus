summary: The 'discriminator' typedef is uint32 representing the BFD discriminator as per RFC 5880. The 'multiplier' typedef is uint8 with range 1–255. The 'hops' typedef is uint8 with range 1–255, representing TTL for IPv4 or hop limit for IPv6.
