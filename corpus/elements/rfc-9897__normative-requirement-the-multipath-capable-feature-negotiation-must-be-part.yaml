document: rfc-9897
kind: normative-requirement
summary: The Multipath Capable Feature negotiation MUST be part of the initial handshake procedure, and no subsequent renegotiation of the Multipath Capable Feature is allowed for the same MP-DCCP connection. Any subflow added to an existing MP-DCCP connection MUST use the version negotiated for the first subflow.
section: "3.1"
rfc2119_level: MUST
topics:
    - multipath
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
