document: rfc-3301
kind: normative-requirement
summary: The LNS MUST indicate to the LAC in the OCRQ the called number in NSAP format. When the Called Number carries an all-zero payload, the LAC SHOULD use the Service Name AVP to bind the tunnel call to an ATM VC connection.
section: 3.3.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
