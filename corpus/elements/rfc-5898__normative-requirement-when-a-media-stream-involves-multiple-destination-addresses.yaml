document: rfc-5898
kind: normative-requirement
summary: When a media stream involves multiple destination addresses (e.g., FEC streams), connectivity to all of them MUST be verified. For RTP streams that use RTCP, connectivity MUST be verified for both RTP and RTCP, and RTCP transmission interval rules MUST still be adhered to.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
