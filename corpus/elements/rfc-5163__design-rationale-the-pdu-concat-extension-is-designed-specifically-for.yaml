document: rfc-5163
kind: design-rationale
summary: The PDU-Concat extension is designed specifically for cases where many small PDUs share the same NPA destination address, improving efficiency by eliminating duplicated MAC/encapsulation overhead and allowing non-addressed receivers to skip multiple PDUs in a single operation.
