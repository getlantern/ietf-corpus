document: rfc-3986
kind: normative-requirement
summary: A base URI must conform to the absolute-URI syntax rule and must be established by the parser before parsing URI references that might be relative. A base URI obtained from a reference must be converted to absolute form and stripped of any fragment component.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
