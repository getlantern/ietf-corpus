document: rfc-3986
kind: normative-requirement
summary: A base URI MUST conform to the absolute-URI syntax rule. If the base URI is obtained from a URI reference, that reference MUST be converted to absolute form and stripped of any fragment component prior to use as a base URI.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
