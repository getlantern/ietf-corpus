document: rfc-3986
kind: normative-requirement
summary: A base URI MUST conform to the absolute-URI syntax rule and carry no fragment component. If a base URI is obtained from a URI reference, the reference must be converted to absolute form and stripped of any fragment prior to use.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
