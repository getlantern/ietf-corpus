document: rfc-8007
kind: interoperability-note
summary: Unrecognized name/value pairs in JSON objects SHOULD NOT be treated as errors by either uCDN or dCDN; they SHOULD be ignored during processing and passed on by the dCDN to further dCDNs in a cascade. This enables forward-compatible extensibility.
section: "5"
topics:
    - http
    - json
