summary: The ITU-T anchor frequency of 193100.000 GHz (193.100 THz) is used as the fixed reference point for computing both DWDM and flexi-grid nominal central frequencies via the formula f = 193100.000 GHz + N × channel-spacing, ensuring alignment with ITU-T G.694.1.
