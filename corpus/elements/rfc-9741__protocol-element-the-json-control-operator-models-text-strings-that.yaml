document: rfc-9741
kind: protocol-element
summary: The .json control operator models text strings that embed a complete JSON value. It uses the JSON-to-CBOR conversion rules from Section 6.2 of RFC 8949 (STD94), analogous to the .cbor operator in RFC 8610.
