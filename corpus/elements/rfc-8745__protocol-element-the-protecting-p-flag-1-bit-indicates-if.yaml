document: rfc-8745
kind: protocol-element
summary: The Protecting (P) flag (1 bit) indicates if the LSP is a working (0) or protection (1) LSP. The Secondary (S) flag (1 bit) indicates primary (0) or secondary (1) LSP, and is ignored if P is not set. The Protection Type (PT) field (6 bits) indicates the LSP protection type per RFC 4872.
section: "3.2"
topics:
    - mpls
    - routing
