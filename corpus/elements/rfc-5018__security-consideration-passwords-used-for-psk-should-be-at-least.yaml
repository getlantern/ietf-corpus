document: rfc-5018
kind: security-consideration
summary: Passwords used for PSK SHOULD be at least 8 characters from a pool including upper/lower case, numbers, and special characters. Implementations MUST support at minimum 16-character passwords or passphrases. Randomly generated keys SHOULD be at least 80 bits and generated using a strong random number generator (RFC 4086).
section: "6"
topics:
    - security
    - crypto
