document: rfc-6236
kind: design-rationale
summary: The sar parameter allows a range of values to be offered (e.g., sar=[0.91,1.0,1.09,1.45]) so that the receiver can select the preferred sample aspect ratio rather than requiring rescaling on the receiver side when the sender's sar does not match the receiver's display.
section: 3.2.5
topics:
    - realtime
