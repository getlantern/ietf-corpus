document: rfc-2091
kind: security-consideration
summary: The routing task MUST be provided with a list of logical addresses to which triggered updates are to be sent on the WAN; this list MAY be a subset of the next-hop routers maintained by the circuit manager. RIP Version 2 authentication MAY also be applied to Triggered RIP packets.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - security
