document: rfc-3550
kind: normative-requirement
summary: 'When a participant with more than 50 current members decides to leave, it MUST apply the BYE back-off algorithm: reinitialize state, compute a BYE transmission interval based on observed BYE traffic, and schedule BYE transmission accordingly, to prevent bandwidth floods when many participants depart simultaneously.'
section: 6.3.7
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
