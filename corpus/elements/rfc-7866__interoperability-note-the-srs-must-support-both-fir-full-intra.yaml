document: rfc-7866
kind: interoperability-note
summary: The SRS MUST support both FIR (Full Intra Request) and SIP INFO (RFC 5168 XML video fast update) for requesting video decoder refresh points, using FIR when successfully negotiated and SIP INFO for backward compatibility with implementations that predate FIR adoption.
section: 8.1.7.1
topics:
