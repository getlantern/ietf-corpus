document: rfc-4037
kind: wire-format
summary: 'OCP message format is defined by ABNF: message name, optional space-separated anonymous parameters, optional CRLF-separated named parameters, optional payload, and a terminating semicolon+CRLF. Names use ALPHA followed by safe-OCTETs (alphanumeric, hyphen, underscore); all elements are case-sensitive with no implied linear whitespace.'
section: "3.1"
