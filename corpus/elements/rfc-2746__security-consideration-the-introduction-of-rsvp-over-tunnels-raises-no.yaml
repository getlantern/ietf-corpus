document: rfc-2746
kind: security-consideration
summary: The introduction of RSVP over tunnels raises no new security issues beyond those of RSVP itself (controlled access to QoS, addressed by RFC 2205) and IP-in-IP tunnels (addressed by RFC 2003 and RFC 2473). Integrity of RSVP messages carrying SESSION_ASSOC and NODE_CHAR objects is protected by the mechanism in RFC 2747.
section: "10"
topics:
