document: rfc-3485
kind: design-rationale
summary: 'A priority system (1–5) is assigned to each dictionary string: lower numbers indicate higher expected frequency. Strings with low priority numbers are placed at the bottom (end) of the dictionary, increasing efficiency for algorithms such as DEFLATE that benefit from frequently-used strings being located near the end.'
