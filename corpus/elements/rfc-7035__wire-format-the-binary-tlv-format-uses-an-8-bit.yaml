document: rfc-7035
kind: wire-format
summary: The binary TLV format uses an 8-bit unsigned integer Type field (T) and an 8-bit unsigned integer Length field (N, encoding 0–255 bytes of value). Type codes in the Relative Location Parameters registry must not conflict with Civic Address Types (CAtypes) registry values.
section: "4.3"
topics:
