document: rfc-3834
kind: design-rationale
summary: The Auto-Submitted field concept originates from X.400/MHS (X.420); RFC 2156 defined an 'Autosubmitted' field for X.400-to-Internet gatewaying. The RFC 3834 definition is a simplification of a prior Internet-draft by Jacob Palme that passed Last Call but stalled on non-substantial objections.
