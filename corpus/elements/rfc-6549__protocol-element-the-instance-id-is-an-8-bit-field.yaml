document: rfc-6549
kind: protocol-element
summary: The Instance ID is an 8-bit field in the OSPFv2 packet header that enables multiple OSPFv2 protocol instances to share a single interface. It has local subnet significance only; each protocol instance is assigned a distinct Instance ID. Unlike OSPFv3, the OSPFv2 Instance ID is strictly reserved for identifying protocol instances and cannot be used to put the same interface in multiple areas.
section: "2"
topics:
