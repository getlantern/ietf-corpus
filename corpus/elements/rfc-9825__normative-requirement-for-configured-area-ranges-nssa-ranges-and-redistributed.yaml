document: rfc-9825
kind: normative-requirement
summary: For configured area ranges, NSSA ranges, and redistributed route aggregations, tags from component routes SHOULD NOT be propagated to the summary. Implementations SHOULD provide a mechanism to configure multiple tags for such summaries.
