document: rfc-2290
kind: normative-requirement
summary: If a mobile node and a foreign or home agent agree in IPCP to use Van Jacobson Header Compression, the mobile node MUST NOT set the 'V' bit in its Mobile IP Registration Request, since enabling VJ compression at both PPP and Mobile IP layers is redundant and likely to cause confusion.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
