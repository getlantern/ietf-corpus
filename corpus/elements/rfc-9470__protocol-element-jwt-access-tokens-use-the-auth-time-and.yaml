document: rfc-9470
kind: protocol-element
summary: JWT access tokens use the `auth_time` and `acr` claims (per RFC 9068 Section 2.2.1) to convey the time and context of the user-authentication event. These values are established at authentication time and do not change upon token renewal.
section: "6.1"
topics:
