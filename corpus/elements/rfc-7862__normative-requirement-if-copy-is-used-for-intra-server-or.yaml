document: rfc-7862
kind: normative-requirement
summary: If COPY is used for intra-server or inter-server copy, the client MUST support the CB_OFFLOAD operation. If COPY is used for inter-server copy, the client also needs COPY_NOTIFY.
section: 4.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
