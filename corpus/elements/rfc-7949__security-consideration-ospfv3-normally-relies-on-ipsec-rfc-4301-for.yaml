document: rfc-7949
kind: security-consideration
summary: OSPFv3 normally relies on IPsec (RFC 4301) for authentication and confidentiality, but RFC 4552 specifies IPsec use only for OSPFv3 over IPv6. Running OSPFv3 over IPv4 transport requires additional work analogous to the OSPFv2 IPsec specification; no equivalent standard currently exists.
section: "5"
topics:
    - routing
    - security
    - ipsec
    - ip
