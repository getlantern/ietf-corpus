document: rfc-6452
kind: security-consideration
summary: Applying the RFC 5892 algorithm with Unicode 6.0 property definitions yields different results than with Unicode 5.2 for the three affected code points. The three code points are unlikely to occur in internationalized domain names, so the security implications of the changes are minor.
