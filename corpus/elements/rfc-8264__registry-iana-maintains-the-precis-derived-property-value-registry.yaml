document: rfc-8264
kind: registry
summary: IANA maintains the 'PRECIS Derived Property Value' registry recording derived properties for each Unicode version starting from 6.3. Values are calculated per Sections 8 and 9 with a designated expert. Changes to calculation rules require IETF Review; backward-incompatible changes must be reported to the IESG.
