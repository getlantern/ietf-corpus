document: rfc-1293
kind: normative-requirement
summary: Upon receiving an InARP request, a station MAY place the requester's protocol address/hardware address mapping into its ARP cache. The receiving station MAY assume any InARP request it receives is destined for it and MAY reply using the request's source addresses as the reply's target addresses.
section: "7"
rfc2119_level: MAY
topics:
    - ip
