document: rfc-3501
kind: normative-requirement
summary: After issuing STARTTLS, the client MUST discard cached server capabilities and SHOULD re-issue the CAPABILITY command. This is necessary to protect against man-in-the-middle attacks that alter the capabilities list prior to STARTTLS negotiation.
section: 6.2.1
rfc2119_level: MUST
topics:
    - email
    - tls
    - security
