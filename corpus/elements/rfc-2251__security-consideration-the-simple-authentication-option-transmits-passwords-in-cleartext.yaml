document: rfc-2251
kind: security-consideration
summary: The simple authentication option transmits passwords in cleartext. The use of cleartext passwords is not recommended over open networks when no authentication or encryption is being performed by a lower layer. SASL mechanisms or lower-layer security (e.g., TLS) should be used instead.
section: 4.2.2
topics:
    - ldap
    - security
    - crypto
