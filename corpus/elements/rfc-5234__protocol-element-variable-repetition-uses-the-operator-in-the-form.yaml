document: rfc-5234
kind: protocol-element
summary: Variable repetition uses the '*' operator in the form '<a>*<b>element', meaning at least <a> and at most <b> occurrences. Defaults are 0 and infinity; '*element' allows any number including zero; '1*element' requires at least one.
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
