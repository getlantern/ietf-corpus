document: rfc-8638
kind: design-rationale
summary: The 'switch on first packet' policy is recommended for every AFBR's SwitchToSptDesired(S,G) function to minimize SPT switchover delay. Once all AFBRs have switched to the SPT for all sources of a group, no data flows on the RPT and duplication is eliminated.
section: "6.5"
topics:
