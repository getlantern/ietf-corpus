document: rfc-9568
kind: protocol-element
summary: Active_Down_Interval = (3 × Active_Adver_Interval) + Skew_Time, where Skew_Time = ((256 - Priority) × Active_Adver_Interval) / 256 (in centiseconds). This formula ensures higher-priority Backup Routers wait less time before promoting themselves to Active, enabling priority-based ordered failover.
section: "6.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
