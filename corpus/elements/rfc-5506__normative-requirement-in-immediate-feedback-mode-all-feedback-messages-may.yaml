document: rfc-5506
kind: normative-requirement
summary: In Immediate Feedback mode, all feedback messages MAY be sent as Reduced-Size RTCP. In Early RTCP mode, a feedback message scheduled as an Early RTCP MAY be sent as Reduced-Size RTCP. All RTCP scheduled as Regular RTCP SHALL be sent as compound RTCP.
section: "4"
rfc2119_level: MAY
topics:
    - rtp
    - realtime
