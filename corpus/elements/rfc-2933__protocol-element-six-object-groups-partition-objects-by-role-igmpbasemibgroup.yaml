document: rfc-2933
kind: protocol-element
summary: 'Six OBJECT-GROUPs partition objects by role: igmpBaseMIBGroup (all hosts/routers, IGMPv1+v2), igmpRouterMIBGroup (router-only v1/v2), igmpV2HostMIBGroup (host v2 additions), igmpHostOptMIBGroup (optional host objects), igmpV2RouterMIBGroup (router v2 additions), igmpV2ProxyMIBGroup (proxy devices). The base group requires only igmpCacheSelf, igmpCacheStatus, and igmpInterfaceStatus.'
section: "4"
topics:
