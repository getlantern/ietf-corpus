document: rfc-4933
kind: protocol-element
summary: The EPP <check> command for contacts uses a <contact:check> element containing one or more <contact:id> elements. The response <contact:chkData> contains <contact:cd> elements each with an 'avail' boolean attribute and an optional <contact:reason> element.
section: 3.1.1
