document: rfc-2002
kind: normative-requirement
summary: A foreign agent and home agent MUST NOT increase the Lifetime selected by the mobile node in the Registration Request. If the Reply Lifetime is greater than the Request Lifetime, the Request Lifetime MUST be used; if less, the Reply Lifetime MUST be used.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - ip
