document: rfc-4842
kind: protocol-element
summary: RTP header usage is OPTIONAL in CEP, providing timing information via the Timestamp field. When used, CEP employs RTP purely as a formal header reuse — RTP mechanisms such as RTCP, header compression, SRTP, extensions, CSRC lists, and padding are not applicable to pseudowires. The RTP timestamp clock frequency MUST be 19.44 MHz.
section: "5.3"
topics:
    - rtp
    - realtime
