document: rfc-5555
kind: normative-requirement
summary: The binding update message MUST be protected using ESP transport mode. When the mobile node and home agent both support port 4500, the mobile node MUST establish the IPsec security association over port 4500 regardless of NAT presence, to avoid disruptive port switching between 500 and 4500.
section: "5"
rfc2119_level: MUST
topics:
    - mobility
    - ipsec
    - security
    - nat
