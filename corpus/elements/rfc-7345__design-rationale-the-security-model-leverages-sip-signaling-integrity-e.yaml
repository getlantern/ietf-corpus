kind: design-rationale
summary: The security model leverages SIP signaling integrity (e.g., SIP Identity) rather than requiring confidentiality of signaling, because verifying the integrity of exchanged SDP is sufficient to prevent hijacking of the DTLS handshake via man-in-the-middle attack.
