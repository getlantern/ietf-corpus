document: rfc-4666
kind: security-consideration
summary: M3UA peers SHOULD use IPsec to provide integrity, confidentiality, and mutual authentication of M3UA signalling traffic. Without transport-level security, M3UA signalling between SGs and ASPs is vulnerable to eavesdropping, spoofing, and denial-of-service attacks that could compromise SS7 signalling infrastructure accessible through the IP domain.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
