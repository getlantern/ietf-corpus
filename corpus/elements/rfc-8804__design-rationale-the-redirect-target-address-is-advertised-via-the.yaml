document: rfc-8804
kind: design-rationale
summary: The Redirect Target address is advertised via the FCI rather than during bootstrap because RT addresses can vary between footprints and change over time (e.g., due to network problems). A dynamic, footprint-oriented interface is more suitable than static bootstrap advertisement.
