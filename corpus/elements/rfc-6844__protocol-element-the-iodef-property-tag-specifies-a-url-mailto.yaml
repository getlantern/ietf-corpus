document: rfc-6844
kind: protocol-element
summary: The 'iodef' property tag specifies a URL (mailto:, http:, or https:) to which an issuer MAY report certificate issue requests inconsistent with the issuer's CP/CPS. Reports use the IODEF format (RFC 5070).
section: "5.4"
