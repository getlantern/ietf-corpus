document: rfc-4234
kind: normative-requirement
summary: ABNF literal text strings (quoted strings) are case-insensitive and the character set is US-ASCII. To specify a case-sensitive match, characters must be specified individually using numeric terminal notation.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
