document: rfc-5534
kind: normative-requirement
summary: The Probe Nonce field is RECOMMENDED to be at least moderately hard to guess so that even on-path attackers cannot deduce the next nonce value, and SHOULD be generated using a random number generator with good randomness properties as outlined in RFC 4086.
section: "5.2"
rfc2119_level: RECOMMENDED
