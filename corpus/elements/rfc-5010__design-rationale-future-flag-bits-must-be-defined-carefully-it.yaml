document: rfc-5010
kind: design-rationale
summary: 'Future flag bits must be defined carefully: it will not be possible to distinguish relay agents that understand a new flag and set it to zero from those that simply leave unassigned bits as zero. Therefore, significant behavior changes MUST NOT be based on zero values of future flags.'
section: "5"
