document: rfc-8509
kind: state-machine
summary: 'Given a valid sentinel query, the resolver checks whether <key-tag> matches an active (non-AddPend, non-Revoked per RFC 5011) root KSK in its trust store, then applies a 2×2 rule: is-ta + trusted → return original answer; is-ta + not-trusted → SERVFAIL; not-ta + trusted → SERVFAIL; not-ta + not-trusted → return original answer.'
section: "2.2"
topics:
    - dns
    - security
