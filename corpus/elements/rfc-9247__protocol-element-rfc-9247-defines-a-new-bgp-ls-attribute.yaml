document: rfc-9247
kind: protocol-element
summary: RFC 9247 defines a new BGP-LS Attribute TLV called 'S-BFD Discriminators TLV' (Type 1032) for advertising S-BFD Discriminator values as a node-level attribute within the BGP-LS Node NLRI. This enables distribution of S-BFD Discriminators across IGP domains and ASes.
section: "3"
topics:
