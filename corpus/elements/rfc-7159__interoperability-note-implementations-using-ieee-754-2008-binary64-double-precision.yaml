document: rfc-7159
kind: interoperability-note
summary: Implementations using IEEE 754-2008 binary64 (double precision) achieve good interoperability for numbers within that range and precision. Integers in the range [-(2**53)+1, (2**53)-1] are exactly interoperable; numbers such as 1E400 or high-precision decimals may cause interoperability problems.
