document: rfc-7712
kind: interoperability-note
summary: When the Authoritative Server in Server Dialback presents the same certificate as the Originating Server, some XMPP implementations skip the <db:verify> exchange (steps 8 and 9 of Section 4.3). These optimization cases are governed by XEP-0344 'Impact of TLS and DNSSEC on Dialback'.
