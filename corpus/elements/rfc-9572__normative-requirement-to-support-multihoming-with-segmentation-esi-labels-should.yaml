document: rfc-9572
kind: normative-requirement
summary: To support multihoming with segmentation, ESI labels SHOULD be allocated from a Domain-wide Common Block (DCB) per RFC 9573 for all tunnel types including Ingress Replication tunnels, so existing multihoming procedures work as-is across segmentation regions.
