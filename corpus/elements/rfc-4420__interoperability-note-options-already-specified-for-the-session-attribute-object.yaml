document: rfc-4420
kind: interoperability-note
summary: Options already specified for the SESSION_ATTRIBUTE object in preexisting RFCs are not migrated to the new LSP_ATTRIBUTES or LSP_REQUIRED_ATTRIBUTES objects. Implementations must continue to support the original SESSION_ATTRIBUTE flags and may need to inspect both the SESSION_ATTRIBUTE and the new objects.
section: "1"
topics:
