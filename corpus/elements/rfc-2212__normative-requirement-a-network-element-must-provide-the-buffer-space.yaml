document: rfc-2212
kind: normative-requirement
summary: A network element MUST provide the buffer space b+Csum+(Dsum*r) at each reshaping point to ensure that conforming traffic is not lost. The reshaping token bucket MUST start with a full bucket of tokens.
section: Policing
rfc2119_level: MUST
