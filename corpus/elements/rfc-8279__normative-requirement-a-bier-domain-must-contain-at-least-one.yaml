document: rfc-8279
kind: normative-requirement
summary: A BIER domain MUST contain at least one sub-domain (the default sub-domain, sub-domain 0). If a BIER domain contains more than one sub-domain, each BFR MUST be provisioned to know the set of sub-domains to which it belongs.
section: "1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
