document: rfc-5923
kind: normative-requirement
summary: Virtual servers MUST only perform connection reuse for TLS connections; they MUST NOT perform connection reuse for other connection-oriented transports such as plain TCP or SCTP, because only TLS ties an authenticated identity to a specific connection.
section: "9.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - tls
    - security
