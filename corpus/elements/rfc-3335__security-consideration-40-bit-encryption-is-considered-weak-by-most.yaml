document: rfc-3335
kind: security-consideration
summary: 40-bit encryption is considered weak by most cryptographers and offers little security over plaintext. S/MIME supports stronger algorithms such as tripleDES or AES, and these should be used when feasible; weak cryptography is never recommended unless the only alternative is no cryptography.
section: "7.0"
topics:
