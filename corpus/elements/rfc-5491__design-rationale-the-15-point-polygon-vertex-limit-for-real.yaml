document: rfc-5491
kind: design-rationale
summary: The 15-point polygon vertex limit for real-time routing applications was chosen to align with limits already imposed by 3GPP (TS 23.032) and OMA MLP, enabling interoperability with cellular and mobile location protocols while still allowing moderately complex shapes.
