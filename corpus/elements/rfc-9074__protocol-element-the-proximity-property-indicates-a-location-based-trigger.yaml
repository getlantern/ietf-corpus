document: rfc-9074
kind: protocol-element
summary: The PROXIMITY property indicates a location-based trigger for a VALARM. Its value is TEXT with defined values ARRIVE, DEPART, CONNECT, and DISCONNECT; it is optional but must not occur more than once in a VALARM component.
section: "8.1"
