document: rfc-6935
kind: normative-requirement
summary: Receivers SHOULD attempt to detect corruption of the address information in an encapsulating packet by checking against the established tunnel context 5-tuple. They SHOULD also attempt to detect corruption of source-fragmented encapsulating packets.
section: "4.1"
rfc2119_level: SHOULD
