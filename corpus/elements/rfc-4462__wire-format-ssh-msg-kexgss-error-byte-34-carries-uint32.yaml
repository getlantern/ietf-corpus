kind: wire-format
summary: 'SSH_MSG_KEXGSS_ERROR (byte 34) carries: uint32 major_status, uint32 minor_status, string message (UTF-8 encoded, may contain CRLF-separated lines), string language tag. An analogous SSH_MSG_USERAUTH_GSSAPI_ERROR (byte 64) carries the same fields for user authentication errors.'
