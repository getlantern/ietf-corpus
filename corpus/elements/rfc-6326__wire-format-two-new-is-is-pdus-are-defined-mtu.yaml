document: rfc-6326
kind: wire-format
summary: 'Two new IS-IS PDUs are defined: MTU-PROBE-PDU (type 23) and MTU-ACK-PDU (type 28). Each carries a 20-byte fixed header comprising 2-byte PDU Length, 6-byte Probe ID, 6-byte Probe Source ID, and 6-byte Ack Source ID; the Ack Source ID is zero in probes and set to the responder''s System ID in acks.'
