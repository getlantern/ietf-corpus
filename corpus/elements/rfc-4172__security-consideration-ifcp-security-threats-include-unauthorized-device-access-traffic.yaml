document: rfc-4172
kind: security-consideration
summary: iFCP security threats include unauthorized device access, traffic interception, and replay attacks across the IP network. The recommended architecture uses IPsec with IKE for authentication, confidentiality, and key management between iFCP gateways. Certificate-based authentication using X.509 certificates is supported, with iSNS used to distribute security policies.
section: 10.3.2
topics:
    - security
    - ipsec
    - pkix
    - ip
