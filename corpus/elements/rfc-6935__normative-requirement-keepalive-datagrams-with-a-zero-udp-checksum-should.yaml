document: rfc-6935
kind: normative-requirement
summary: Keepalive datagrams with a zero UDP checksum SHOULD be sent to validate the network path, and keepalive traffic should include both zero-checksum and non-zero-checksum datagrams so that endpoints can discover middleboxes that drop zero-checksum packets.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
