document: rfc-4661
kind: normative-requirement
summary: A <filter> element MUST contain either the <what> element or the <trigger> element when the filter is being enabled for the first time. When a filter is disabled or re-enabled, the <what> and <trigger> elements MAY be omitted.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
