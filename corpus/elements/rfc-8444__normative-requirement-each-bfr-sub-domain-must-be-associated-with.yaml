document: rfc-8444
kind: normative-requirement
summary: Each BFR sub-domain MUST be associated with one and only one OSPF topology identified by the MT-ID. If the association advertised by other BFRs conflicts with the locally configured association, the BIER Sub-TLV for such conflicting sub-domains MUST be ignored.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
