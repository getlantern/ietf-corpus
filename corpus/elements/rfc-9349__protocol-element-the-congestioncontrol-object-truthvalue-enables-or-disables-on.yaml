document: rfc-9349
kind: protocol-element
summary: The congestionControl object (TruthValue) enables or disables on-the-wire congestion control data exchange as required by RFC 5348. When false, IP-TFS sends fixed-sized packets at a constant rate with no congestion adaptation.
section: "4.2"
topics:
    - ipsec
    - congestion
