document: rfc-5535
kind: security-consideration
summary: HBAs provide security against time-shifting (premeditated) redirection attacks. An off-path attacker who wants to redirect communications to an address outside the HBA set must find a Modifier producing an HBA set containing both the original address and the attacker's address, costing O(2^(59+16*Sec)) hash operations.
section: "11"
topics:
