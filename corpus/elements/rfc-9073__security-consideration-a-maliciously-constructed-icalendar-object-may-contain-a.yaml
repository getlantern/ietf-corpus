document: rfc-9073
kind: security-consideration
summary: A maliciously constructed iCalendar object may contain a very large number of URIs; in published calendars with many subscribers, this could become a denial-of-service amplification vector. Implementations should limit automatic fetching of linked resources.
section: "9.1"
topics:
    - security
