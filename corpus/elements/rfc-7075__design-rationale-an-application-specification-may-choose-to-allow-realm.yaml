document: rfc-7075
kind: design-rationale
summary: An application specification may choose to allow realm-based redirection only on complete sessions beginning with the initial message, or on every message. The former avoids disruption of established stateful sessions; the latter allows redirection mid-session but will disrupt stateful existing sessions.
section: "2"
topics:
