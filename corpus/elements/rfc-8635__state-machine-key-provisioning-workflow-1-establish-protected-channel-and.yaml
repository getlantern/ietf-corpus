document: rfc-8635
kind: state-machine
summary: 'Key provisioning workflow: (1) establish protected channel and install TA certificate, (2) generate key pair via router-driven or operator-driven method producing a PKCS#10 CSR, (3) operator sends CSR with AS number and BGP Identifier to CA, (4) CA certifies and publishes to RPKI and returns PKCS#7, (5) operator installs PKCS#7 into router over protected channel.'
section: 5–8
topics:
