document: rfc-9627
kind: normative-requirement
summary: New RTP packetization specifications for scalable codecs SHOULD define how the temporal and layer ID fields of LRR are to be used, and if the payload also uses the Video Frame Marking header extension (RFC 9626), the syntax MUST be defined in the same manner as the TID and LID fields in that header.
section: "4"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
