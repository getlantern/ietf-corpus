document: rfc-6762
kind: normative-requirement
summary: A Multicast DNS responder MUST NOT place records from its cache (learned from other responders) in the Resource Record Sections of outgoing response messages. Only an authoritative source for a given record is allowed to issue responses containing that record.
section: "6"
rfc2119_level: MUST NOT
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
