document: rfc-9967
kind: normative-requirement
summary: For provisioning events, exactly one of the payload attributes 'data' or 'attributes' MUST be present; both MUST NOT be present simultaneously. When 'data' is included the event URI MUST end with 'full'; otherwise it ends with 'notice'.
section: "2.4"
rfc2119_level: MUST
topics:
