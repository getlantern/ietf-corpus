document: rfc-6122
kind: normative-requirement
summary: The domainpart of every XMPP service MUST be a fully qualified domain name (FQDN), IPv4 address, IPv6 address, or unqualified hostname. Domainparts that are IP addresses might not be accepted for server-to-server communication; unqualified hostnames cannot be used on public networks.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
