document: rfc-7555
kind: normative-requirement
summary: If the MPLS Echo Request source address is not set to the Proxy Request source address, the initiator MUST include a Reply-to Address TLV containing the source address to use. The Reply-to Address MUST be IP reachable via the Proxy LSR.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
