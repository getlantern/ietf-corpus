document: rfc-8011
kind: normative-requirement
summary: The 'attributes-charset' and 'attributes-natural-language' attributes MUST be the first two attributes in every IPP request and response as part of the initial Operation Attributes group; 'attributes-charset' MUST be first and 'attributes-natural-language' MUST be second.
section: 4.1.4
rfc2119_level: MUST
