document: rfc-8485
kind: interoperability-note
summary: Different trust frameworks MAY reuse component definitions and values, but processing of cross-context vector values is explicitly outside the scope of this specification. Trust frameworks SHOULD reuse existing component categories (e.g., 'P' for identity proofing) to encourage consistency across deployments.
