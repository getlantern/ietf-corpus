document: rfc-9359
kind: protocol-element
summary: The IOAM Capabilities Query Container is carried in echo requests sent by the IOAM encapsulating node. It contains a container header (type and optional length) and a list of one or more IOAM Namespace-IDs, zero-padded to a 4-octet boundary, requesting that the receiving node reply with its enabled IOAM capabilities matching those Namespace-IDs.
section: "3.1"
topics:
    - measurement
