document: rfc-9060
kind: normative-requirement
summary: Authentication services SHOULD NOT use a delegate certificate without validating that its scope of authority is encompassed by that of its parent certificate, and if that certificate has its own parent, the entire certification path SHOULD be validated.
section: "5"
rfc2119_level: SHOULD NOT
