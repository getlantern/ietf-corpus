document: rfc-7964
kind: normative-requirement
summary: When the ADD-PATH Capability is received from an IBGP or confederation-external peer with 'Send/Receive' set to 1 or 3, if the peer is internal, the confederation ASBR MUST advertise to it the Group Best Paths (or Available Paths) received from its confederation-external peers.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
