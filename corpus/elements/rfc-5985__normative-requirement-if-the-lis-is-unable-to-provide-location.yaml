document: rfc-5985
kind: normative-requirement
summary: If the LIS is unable to provide location information based on the received locationRequest message, it MUST return an error message. All error responses MUST contain a response code, and HELD error messages MUST be carried by a 200 OK HTTP/HTTPS response.
section: "5.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
