document: rfc-8945
kind: normative-requirement
summary: A server MUST NOT generate a signed response to an unsigned request (except for TKEY responses explicitly specified by the key establishment algorithm), and MUST NOT sign a response when the key is invalid or MAC validation fails.
section: "5.3"
rfc2119_level: MUST NOT
