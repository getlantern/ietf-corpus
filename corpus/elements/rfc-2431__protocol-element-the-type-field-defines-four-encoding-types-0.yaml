document: rfc-2431
kind: protocol-element
summary: 'The Type field defines four encoding types: 0=NTSC (13.5MHz, 720 samples/line, 60 fields/s, 525 lines/frame), 1=PAL (13.5MHz, 720 samples/line, 50 fields/s, 625 lines/frame), 2=HD NTSC (18MHz, 1144 samples/line), 3=HD PAL (18MHz, 1152 samples/line). Further encodings require IANA assignment.'
