document: rfc-5553
kind: protocol-element
summary: The Path Key Subobject (PKS) is a fixed-length ERO subobject containing a 2-byte Path Key (an opaque identifier/token for the Confidential Path Segment) and a PCE-ID (IPv4 or IPv6 address identifying the PCE that can decode it). It is carried in RSVP-TE EROs and RROs to hide topology within an AS during inter-domain LSP signaling.
section: "3"
