document: rfc-2835
kind: design-rationale
summary: The MTU of 65280 bytes was chosen to be backward compatible with HIPPI-800 and to allow the IP packet to fit in one 64K byte buffer with up to 256 bytes of overhead. HIPPI-6400 VC1 imposes a ~128KB limit, making 65280 the practical maximum that preserves HIPPI-800 interoperability.
section: "4.3"
topics:
