document: rfc-3644
kind: interoperability-note
summary: 'QPIM interoperability among PDPs and management applications is defined at the information model level: different implementations sharing a common QPIM-derived schema can interpret each other''s policies. However, different PDPs may translate the same abstract policy into different PEP configurations, producing equivalent network behavior rather than identical device configurations.'
