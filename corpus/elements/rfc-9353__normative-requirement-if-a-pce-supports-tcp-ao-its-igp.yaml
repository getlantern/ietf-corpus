document: rfc-9353
kind: normative-requirement
summary: If a PCE supports TCP-AO, its IGP advertisement SHOULD include a TCP-AO support flag bit; if it supports TLS, the IGP advertisement SHOULD include a PCEP over TLS support flag bit. If multiple security mechanisms are supported, all corresponding flag bits SHOULD be included.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ipsec
    - tls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
