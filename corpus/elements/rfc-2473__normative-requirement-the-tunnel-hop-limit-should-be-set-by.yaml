document: rfc-2473
kind: normative-requirement
summary: The tunnel hop limit should be set by the entry-point node independently of the original packet hop limit, using a pre-configured value; the recommended default for hosts is the Neighbor Discovery advertised hop limit, and for routers the IPv6 default (64).
