document: rfc-5763
kind: normative-requirement
summary: The certificate presented during the DTLS handshake MUST match the fingerprint exchanged via the signaling path in the SDP. If the fingerprint does not match the hashed certificate, the endpoint MUST tear down the media session immediately.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - security
    - realtime
