document: rfc-8227
kind: normative-requirement
summary: When no protection switching is active, each node MUST send RPS requests with No Request (NR) to its two adjacent nodes periodically. When a node detects a failure, it MUST send the appropriate RPS request in both directions to the destination node (the other node adjacent to the failure).
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
