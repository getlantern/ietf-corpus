document: rfc-9842
kind: wire-format
summary: 'Dictionary-Compressed Brotli (''dcb'') uses a 36-byte fixed header: Magic_Number is 4 bytes (0xff, 0x44, 0x43, 0x42) followed by SHA_256_Hash of 32 bytes. The header precedes a Shared Brotli stream that uses the dictionary as a prefix dictionary with a compression window of at most 16 MB.'
