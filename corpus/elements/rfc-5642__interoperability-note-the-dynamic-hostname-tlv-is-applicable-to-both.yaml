document: rfc-5642
kind: interoperability-note
summary: The Dynamic Hostname TLV is applicable to both OSPFv2 and OSPFv3, leveraging the OSPF Router Information (RI) Opaque LSA defined in RFC 4970. Routers that do not recognize TLV type 7 ignore it per RFC 4970 rules.
section: "3.1"
