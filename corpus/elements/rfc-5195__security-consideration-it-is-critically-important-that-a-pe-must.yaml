document: rfc-5195
kind: security-consideration
summary: It is critically important that a PE MUST NOT be discovered as attached to an L1VPN unless it is truly authorized to be attached. If arbitrary Internet nodes could inject BGP advertisements accepted by PE nodes, any site could be fraudulently added to any L1VPN. The mechanism presupposes that PEs trust their BGP peers to be correctly identified and properly authorized.
section: "6"
rfc2119_level: MUST NOT
topics:
    - security
    - bgp
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
