document: rfc-8556
kind: protocol-element
summary: 'The PMSI Tunnel Attribute (PTA) for BIER contains: Flags (1 octet), Tunnel Type 0x0B (1 octet), MPLS Label (3 octets), and a Tunnel Identifier comprising Sub-domain-id (1 octet), BFR-id (2 octets), and BFR-prefix (4 or 16 octets for IPv4 or IPv6 respectively).'
