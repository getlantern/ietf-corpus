document: rfc-4430
kind: normative-requirement
summary: The Cksum field MUST always be present whenever a key is available via an AP-REQ or AP-REP payload. The key used MUST be the session key in the Kerberos ticket. If the checksum type is not a keyed algorithm, the message MUST be rejected.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
