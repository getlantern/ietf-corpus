kind: wire-format
summary: 'The label attribute syntax is: label-attribute = "a=label:" pointer; pointer = token; token = 1*(token-char); token-char = %x21 / %x23-27 / %x2A-2B / %x2D-2E / %x30-39 / %x41-5A / %x5E-7E. The token is application-defined and case-sensitive.'
