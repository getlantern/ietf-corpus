document: rfc-5858
kind: normative-requirement
summary: If ROHC segmentation is used (MRRU non-zero), it MUST occur before AH or ESP processing. The segmentation process MUST account for IPsec overhead so that final IPsec-processed segments remain within the tunnel MTU.
section: "4.3"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
