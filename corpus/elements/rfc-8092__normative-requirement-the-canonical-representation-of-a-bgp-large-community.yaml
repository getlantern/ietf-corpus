document: rfc-8092
kind: normative-requirement
summary: The canonical representation of a BGP Large Community is three separate unsigned integers in decimal, ordered Global Administrator:Local Data 1:Local Data 2, separated by colons. Numbers MUST NOT contain leading zeros; a zero value MUST be represented as a single zero (e.g., 64496:4294967295:2).
section: "5"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
