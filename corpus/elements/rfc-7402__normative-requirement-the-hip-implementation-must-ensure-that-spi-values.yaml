document: rfc-7402
kind: normative-requirement
summary: The HIP implementation MUST ensure that SPI values used for HIP SAs are not used for IPsec or other SAs, and vice versa, to avoid collisions when co-existing with a standards-compliant IPsec implementation.
section: "3.4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
