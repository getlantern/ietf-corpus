document: rfc-6225
kind: security-consideration
summary: DHCP messages have no privacy protection; an eavesdropper monitoring the link between a DHCP server and client can discover Location Configuration Information (LCI). Link-layer confidentiality and integrity protection may reduce the risk of location disclosure and tampering.
section: "3"
topics:
    - security
    - privacy
    - ip
