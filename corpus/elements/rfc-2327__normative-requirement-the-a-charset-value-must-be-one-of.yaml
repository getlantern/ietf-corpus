document: rfc-2327
kind: normative-requirement
summary: The 'a=charset' value MUST be one of those registered with IANA and MUST be compared against IANA identifiers using case-insensitive comparison. Any character set used MUST still prohibit bytes 0x00, 0x0A, and 0x0D; character sets requiring these MUST define a quoting mechanism. If the identifier is unrecognised, affected strings SHOULD be treated as byte strings.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
