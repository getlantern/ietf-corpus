document: rfc-6135
kind: normative-requirement
summary: Once the active UA has established the MSRP transport connection, the UA must immediately send an MSRP SEND request as defined in RFC 4975, allowing the passive party to bind the inbound TCP connection to the session.
section: 4.2.2
rfc2119_level: MUST
topics:
    - realtime
