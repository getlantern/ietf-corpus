document: rfc-1460
kind: state-machine
summary: 'A POP3 session progresses through three states: AUTHORIZATION (client must identify itself), TRANSACTION (client requests actions on the maildrop), and UPDATE (server deletes marked messages and releases the lock). QUIT from AUTHORIZATION terminates the session without entering UPDATE; QUIT from TRANSACTION enters UPDATE.'
