document: rfc-1994
kind: protocol-element
summary: 'CHAP uses a 3-way handshake: the authenticator sends a Challenge, the peer responds with a one-way hash computed over the Identifier, secret, and Challenge Value, and the authenticator verifies the hash and sends Success or Failure. After initial link establishment, CHAP MAY be repeated at any time to re-verify peer identity.'
section: "2"
topics:
    - security
    - crypto
