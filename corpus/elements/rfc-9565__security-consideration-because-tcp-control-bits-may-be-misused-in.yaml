document: rfc-9565
kind: security-consideration
summary: Because TCP control bits may be misused in flows such as DDoS attacks, an Exporter must report all observed control bits even if no assigned meaning is associated with a given flag. This document uses stronger normative language than RFC 7125 to ensure full observability of potentially malicious flag patterns.
section: "6"
topics:
    - security
    - tcp
