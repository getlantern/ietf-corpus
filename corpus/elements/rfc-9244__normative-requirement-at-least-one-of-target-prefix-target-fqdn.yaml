document: rfc-9244
kind: normative-requirement
summary: At least one of 'target-prefix', 'target-fqdn', 'target-uri', 'alias-name', or 'mid-list' MUST be present in the target definition. Additionally, at least the 'target' attribute and one other pre-or-ongoing-mitigation attribute MUST be present in a DOTS telemetry message.
section: 8.1.1
rfc2119_level: MUST
