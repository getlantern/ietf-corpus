document: rfc-5653
kind: design-rationale
summary: Java's automatic garbage collection eliminates the need for explicit release and duplication routines present in the C bindings. gss_release_name, gss_release_oid_set, gss_add_oid_set_member, gss_create_empty_oid_set, and gss_duplicate_name are all absent from the Java API.
section: "5.7"
topics:
