document: rfc-4033
kind: normative-requirement
summary: A security-aware name server should include appropriate DNSSEC records (RRSIG, DNSKEY, DS, NSEC) in all responses to resolvers that have signaled willingness via the DO bit in the EDNS header, subject to message size limitations.
section: "9"
rfc2119_level: SHOULD
topics:
