document: rfc-7009
kind: security-consideration
summary: A malicious client attempting to guess valid tokens via revocation requests is constrained because the request must include valid client credentials and the token must belong to the requesting client. Successful guessing would allow worse abuse than revocation, limiting the incremental risk.
section: "5"
topics:
    - oauth
    - security
