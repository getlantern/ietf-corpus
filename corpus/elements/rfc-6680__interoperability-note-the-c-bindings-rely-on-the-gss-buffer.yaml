document: rfc-6680
kind: interoperability-note
summary: The C-bindings rely on the gss_buffer_set_t type and associated functions (gss_create_empty_buffer_set, gss_add_buffer_set_member, gss_release_buffer_set) from GFD.024, and on const types from RFC 5587. Only the specific sections cited (GFD.024 §2.5/§6 and RFC 5587 §3.4.6 Figure 1) are normatively required; other changes those documents specify to existing GSS-API behavior are not required.
section: "7.1"
topics:
    - security
