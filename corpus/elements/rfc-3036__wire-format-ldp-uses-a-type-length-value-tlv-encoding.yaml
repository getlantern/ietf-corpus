document: rfc-3036
kind: wire-format
summary: 'LDP uses a Type-Length-Value (TLV) encoding: a 2-octet field containing a 1-bit U (unknown) flag, 1-bit F (forward) flag, and 14-bit Type, followed by a 2-octet Length field, followed by a variable-length Value field. TLVs may be nested.'
