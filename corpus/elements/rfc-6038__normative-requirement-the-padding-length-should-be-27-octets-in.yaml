document: rfc-6038
kind: normative-requirement
summary: The Padding Length SHOULD be >= 27 octets in Unauthenticated mode and >= 56 octets in Authenticated/Encrypted modes to allow for TWAMP-recommended truncation. The Padding Length SHALL be greater than the Length of padding to reflect field when using Reflect Octets mode.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - measurement
