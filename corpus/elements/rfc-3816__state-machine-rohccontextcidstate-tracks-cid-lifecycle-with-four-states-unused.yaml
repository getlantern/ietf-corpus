document: rfc-3816
kind: state-machine
summary: 'rohcContextCIDState tracks CID lifecycle with four states: unused(1) → active(2) when a CID is assigned; active → terminated(4) on explicit signaling or active → expired(3) after inactivity timeout; expired or terminated → active when the CID is re-used for a new context.'
