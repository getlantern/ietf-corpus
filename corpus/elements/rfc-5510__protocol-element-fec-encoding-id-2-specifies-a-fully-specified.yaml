document: rfc-5510
kind: protocol-element
summary: FEC Encoding ID 2 specifies a Fully-Specified FEC Scheme for Reed-Solomon codes over GF(2^^m), where m is in {2..16}. The FEC Payload ID consists of a Source Block Number field of (32-m) bits and an Encoding Symbol ID field of m bits, totaling 32 bits.
