document: rfc-6849
kind: protocol-element
summary: The 'a=loopback:<loopback-type>' SDP media-level attribute indicates the agent wishes to perform loopback and specifies the type. Valid loopback-type values are 'rtp-pkt-loopback' (packet-level) and 'rtp-media-loopback' (codec-level). Multiple types may be listed in one attribute.
section: "4.1"
topics:
