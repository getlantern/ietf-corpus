document: rfc-9826
kind: protocol-element
summary: The LSP-DB container (read-only, gated by the 'stateful' feature) maintains operational state for all LSPs at a stateful PCE, keyed by PLSP-ID, PCC IP address, and LSP-ID. Each entry includes delegation state, initiation state, operational-state (down/up/active/going-down/going-up), symbolic path name, last error, path setup type, and association membership.
section: "6.1"
topics:
