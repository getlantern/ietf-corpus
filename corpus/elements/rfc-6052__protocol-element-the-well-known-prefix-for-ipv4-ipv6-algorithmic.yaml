document: rfc-6052
kind: protocol-element
summary: The Well-Known Prefix for IPv4/IPv6 algorithmic address translation is 64:ff9b::/96. It is 96 bits long and may only be used in the form where the IPv4 address occupies the last 32 bits of the IPv6 address.
section: "2.1"
topics:
