document: rfc-6710
kind: normative-requirement
summary: Irrespective of how many distinct priority levels an SMTP server supports internally, when relaying or delivering via LMTP it MUST communicate the original priority value as determined in Section 4.1, not the internally rounded value.
section: "5"
rfc2119_level: MUST
