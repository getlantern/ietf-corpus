document: rfc-9959
kind: normative-requirement
summary: All packets sent in the Unvalidated Phase MUST use pacing based on the current RTT. The recommended inter-packet transmission time is ITT = (current_RTT × MPS) / jump_cwnd.
section: "3.3"
rfc2119_level: MUST
topics:
