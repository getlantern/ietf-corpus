document: rfc-4006
kind: normative-requirement
summary: During intermediate interrogation, when granted service units are exhausted or Validity-Time expires, the credit-control client MUST send a new CCR with CC-Request-Type = UPDATE_REQUEST. If several unit types were included in the previous answer, used units for each type MUST be reported.
section: "5.3"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
