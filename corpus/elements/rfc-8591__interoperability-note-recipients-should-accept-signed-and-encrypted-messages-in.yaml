document: rfc-8591
kind: interoperability-note
summary: Recipients SHOULD accept signed-and-encrypted messages in either order (SignedData inside AuthEnvelopedData, or AuthEnvelopedData inside SignedData) for backwards compatibility, even though the MUST order is sign-first.
