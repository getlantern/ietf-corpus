document: rfc-5287
kind: protocol-element
summary: 'Seven interface parameters are defined for TDM PWs: CEP/TDM Payload Bytes (0x04, 4 bytes), CEP/TDM Bit-Rate (0x07, 6 bytes), Number of TDMoIP AAL1 Cells per Packet (0x0E, 4 bytes), TDMoIP AAL1 Mode (0x10, 4 bytes), TDMoIP AAL2 Options (0x11, 8+ bytes), Fragmentation Indicator (0x09, 4 bytes), and TDM Options (0x0B, 4/8/12 bytes).'
section: "3.1"
