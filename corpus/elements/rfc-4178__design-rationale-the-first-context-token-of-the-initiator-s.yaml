document: rfc-4178
kind: design-rationale
summary: The first context token of the initiator's preferred mechanism SHOULD be embedded in the initial negotiation message (optimistic mechanism token) to avoid an extra round trip. In cases where generating the first token is costly and the mechanism is unlikely to be selected by the acceptor, implementations MAY omit it.
section: "3.1"
topics:
    - security
