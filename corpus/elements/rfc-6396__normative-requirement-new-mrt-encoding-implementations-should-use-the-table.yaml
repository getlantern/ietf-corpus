document: rfc-6396
kind: normative-requirement
summary: New MRT encoding implementations SHOULD use the TABLE_DUMP_V2 Type instead of the TABLE_DUMP Type due to limitations in TABLE_DUMP (no 4-byte AS numbers, no mixed AFI for peer and prefix). MRT decoding applications MAY support the older TABLE_DUMP Type.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
