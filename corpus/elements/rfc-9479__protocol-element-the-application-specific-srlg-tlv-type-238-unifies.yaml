document: rfc-9479
kind: protocol-element
summary: The Application-Specific SRLG TLV (Type 238) unifies SRLG advertisement for IPv4, IPv6, and unnumbered links in a single TLV. Its value contains Neighbor System-ID+pseudonode (7 octets), Application Identifier Bit Mask, length of sub-TLVs (1 octet), Link Identifier sub-TLVs, and zero or more 4-octet SRLG values.
section: "4.3"
topics:
    - routing
