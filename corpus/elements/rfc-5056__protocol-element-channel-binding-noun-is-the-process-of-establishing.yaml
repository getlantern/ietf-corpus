document: rfc-5056
kind: protocol-element
summary: '''Channel binding'' (noun) is the process of establishing that no man-in-the-middle exists between two end-points that have been authenticated at one network layer but are using a secure channel at a lower network layer. ''Channel bindings'' (noun) is data that names a channel or its end-points such that showing it to be the same at both ends proves no MITM exists.'
section: "2"
topics:
