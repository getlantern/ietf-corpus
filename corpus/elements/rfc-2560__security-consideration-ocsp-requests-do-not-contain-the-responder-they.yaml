document: rfc-2560
kind: security-consideration
summary: OCSP requests do not contain the responder they are directed to, allowing an attacker to replay a captured request to any number of OCSP responders. Reliance on HTTP caching may yield unexpected results if intermediate servers are misconfigured.
section: "5"
topics:
    - pkix
    - security
    - http
