document: rfc-4174
kind: security-consideration
summary: The DHCP Authentication security option (RFC 3118) may present a problem for protecting the iSNS DHCP option due to limited implementation and deployment of DHCP authentication. IPsec security mechanisms for iSNS itself are specified in RFC 4171.
section: "3"
topics:
    - security
    - ipsec
