document: rfc-8562
kind: normative-requirement
summary: For multipoint LSPs using IP/UDP encapsulation, MultipointTail MUST expect destination UDP port 3784 and the destination IP address MUST be in 127.0.0.0/8 (IPv4) or 0:0:0:0:0:FFFF:7F00:0/104 (IPv6), consistent with RFC 8029.
section: "5.8"
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - mpls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
