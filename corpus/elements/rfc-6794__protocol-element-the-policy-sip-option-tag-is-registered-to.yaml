document: rfc-6794
kind: protocol-element
summary: The 'policy' SIP option tag is registered to indicate that a UA supports the Policy-Contact and Policy-ID header fields and can subscribe to session-specific policies. It is included in the Supported header of requests initiating offer/answer exchanges.
