document: rfc-2535
kind: protocol-element
summary: For DNS security, the canonical form of an RR is its wire format with domain names fully expanded (no compression pointers), all domain name letters lowercased, wildcard owner names left as '*' without substitution, and the original TTL substituted for the current TTL. Canonical DNS name ordering sorts labels as unsigned left-justified octet strings with absence before zero.
section: "8.1"
topics:
    - dns
    - security
