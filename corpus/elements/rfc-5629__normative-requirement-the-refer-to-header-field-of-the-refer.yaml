document: rfc-5629
kind: normative-requirement
summary: The Refer-To header field of the REFER request MUST contain an HTTP URI that references the markup document to be fetched. The SUBSCRIBE for presentation-free UI MUST be sent to the GRUU and MUST use the KPML event package.
section: 8.1.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
