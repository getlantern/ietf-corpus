document: rfc-4217
kind: security-consideration
summary: Port stealing remains a problem when client certificates are not used; strong client authentication on the data connection is required to prevent unauthorized connections from retrieving or submitting files. Without any strong authentication (e.g., anonymous DH), port stealing is unmitigated.
section: 15.2.6
topics:
    - tls
    - security
