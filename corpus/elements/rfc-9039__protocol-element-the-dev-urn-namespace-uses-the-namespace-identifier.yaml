document: rfc-9039
kind: protocol-element
summary: 'The DEV URN namespace uses the namespace identifier ''dev'' and defines a hierarchical syntax: ''urn:dev:'' followed by a body (macbody, owbody, orgbody, osbody, opsbody, or otherbody) and optional underscore-separated component parts. The syntax is expressed in ABNF per RFC 5234 and RFC 7405.'
