document: rfc-6793
kind: design-rationale
summary: 'The extensions are designed to allow a gradual, piecemeal transition: an AS using a two-octet AS number can upgrade its BGP speakers incrementally without coordination. However, an AS wishing to adopt a four-octet AS number as its own must first upgrade all BGP speakers within the AS.'
section: "7"
topics:
