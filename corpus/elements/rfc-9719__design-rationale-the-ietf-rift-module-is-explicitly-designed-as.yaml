document: rfc-9719
kind: design-rationale
summary: 'The ietf-rift module is explicitly designed as a vendor-extensible baseline: the module description states it is ''intended that the module will be extended by vendors to define vendor-specific RIFT configuration parameters and policies—for example, route maps or route policies.'' Vendors augment the standard module rather than forking it.'
