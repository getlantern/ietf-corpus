document: rfc-7474
kind: protocol-element
summary: Authentication Type 3, 'Cryptographic Authentication with Extended Sequence Numbers', is defined for the OSPFv2 header AuType field. It replaces the in-header sequence number of earlier types with an extended 64-bit sequence number appended after the OSPF packet, included in the IP header length but not the OSPF header length.
section: "3"
topics:
