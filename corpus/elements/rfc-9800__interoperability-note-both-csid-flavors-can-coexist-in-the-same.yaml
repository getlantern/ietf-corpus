document: rfc-9800
kind: interoperability-note
summary: Both CSID flavors can coexist in the same SR domain, on the same SR segment endpoint node, and within the same segment list. However, operators should generally avoid mixing flavors within the same routing domain or Locator-Block because they have different length and allocation recommendations that may reduce compression efficiency.
section: "9.1"
topics:
