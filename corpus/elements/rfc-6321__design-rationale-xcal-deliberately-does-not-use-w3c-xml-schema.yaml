document: rfc-6321
kind: design-rationale
summary: xCal deliberately does not use W3C XML Schema UTC offset syntax within date-time values, even though that syntax supports it. Instead it follows iCalendar's model of using time zone definitions via the TZID property parameter, preserving semantic equivalence with iCalendar's timezone handling model.
section: 3.6.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
