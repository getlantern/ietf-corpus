document: rfc-1388
kind: protocol-element
summary: The Routing Domain (RD) field is a 2-byte value in the packet header that identifies the routing process to which the update belongs, allowing multiple independent RIP instances to coexist on the same physical wire. RD 0 is the default routing domain.
section: "3.2"
