document: rfc-4798
kind: design-rationale
summary: The 6PE approach requires only edge routers to be upgraded to Dual Stack, leaving the IPv4 MPLS core untouched. This makes it suitable for ISPs that want to offer IPv6 services without upgrading core infrastructure.
