document: rfc-9554
kind: normative-requirement
summary: When the DERIVED parameter is present with value 'true', clients MUST NOT update the property. This signals that the property value is derived from other properties in the same vCard (e.g., FN derived from N components).
section: "4.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
