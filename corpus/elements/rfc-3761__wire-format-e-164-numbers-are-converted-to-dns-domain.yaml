document: rfc-3761
kind: wire-format
summary: 'E.164 numbers are converted to DNS domain-name keys by: (1) removing non-digits, (2) inserting dots between each digit, (3) reversing digit order, (4) appending ''.e164.arpa''. Example: +442079460148 becomes 8.4.1.0.6.4.9.7.0.2.4.4.e164.arpa.'
section: "2.4"
topics:
    - dns
