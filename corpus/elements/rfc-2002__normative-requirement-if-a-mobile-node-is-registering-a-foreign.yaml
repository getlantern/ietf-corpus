document: rfc-2002
kind: normative-requirement
summary: If a mobile node is registering a foreign agent care-of address, the mobile node MUST register via that foreign agent. If registering a co-located care-of address without a foreign agent on the link, the mobile node MUST register directly with its home agent.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
