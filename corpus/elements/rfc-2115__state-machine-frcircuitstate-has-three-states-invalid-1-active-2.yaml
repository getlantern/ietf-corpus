document: rfc-2115
kind: state-machine
summary: 'frCircuitState has three states: invalid(1), active(2), and inactive(3). In the absence of a DLCMI, rows may be created by setting state to active or deleted by setting it to invalid; inactive temporarily disables a circuit. Use of ''invalid'' is deprecated in favor of frCircuitRowStatus.'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
