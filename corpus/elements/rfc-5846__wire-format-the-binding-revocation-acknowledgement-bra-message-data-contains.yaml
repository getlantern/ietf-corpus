document: rfc-5846
kind: wire-format
summary: 'The Binding Revocation Acknowledgement (BRA) message data contains: Binding Revocation Type (8-bit, value 2), Status (8-bit), Sequence Number (16-bit unsigned, copied from the BRI), flags P/V/G (1-bit each mirroring the BRI), Reserved bits, and variable-length Mobility Options. No options are required when Status is success.'
section: "5.2"
