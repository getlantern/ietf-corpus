document: rfc-5948
kind: design-rationale
summary: The default MTU is set to 1500 octets rather than the WiMAX Forum's 1400 octets because this document represents the IETF working group's consensus on the best value for IEEE 802.16 from the IETF perspective, despite the WiMAX Forum's deployment practice. The WiMAX MTU mismatch is a known interoperability concern acknowledged but accepted.
section: Appendix C
