document: rfc-5530
kind: security-consideration
summary: Machine-readable response codes are easier to parse than human-readable text and can amplify information leaks. For example, returning different responses when a mailbox does not exist versus when the user lacks the 'l' right (right to know the mailbox exists) could inadvertently expose ACL information to well-behaved clients that forward the codes to users.
section: "5"
topics:
    - email
    - security
    - privacy
