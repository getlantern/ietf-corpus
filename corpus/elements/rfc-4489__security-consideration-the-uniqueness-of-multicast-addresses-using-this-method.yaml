document: rfc-4489
kind: security-consideration
summary: The uniqueness of multicast addresses using this method is guaranteed by the DAD process, so a secure DAD process is needed for stability. RFC 3041 (Privacy Extensions for Stateless Address Autoconfiguration) is proposed to secure the DAD process, though it cannot be used to make a link-local unicast address directly.
section: "6"
topics:
    - ip
    - multicast
    - security
    - privacy
