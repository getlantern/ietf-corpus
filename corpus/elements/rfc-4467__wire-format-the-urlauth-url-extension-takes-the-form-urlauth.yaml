document: rfc-4467
kind: wire-format
summary: The URLAUTH URL extension takes the form ';URLAUTH=<access>:<mech>:<token>' where the authorization token is an ASCII-encoded hexadecimal string of at least 32 hex digits (128 bits). The optional expiry component takes the form ';EXPIRE=<datetime>' per RFC 3339.
section: "3"
