document: rfc-1452
kind: normative-requirement
summary: For all objects, the ACCESS clause must be replaced by a MAX-ACCESS clause. Objects whose instances can be explicitly created by a protocol set operation must have MAX-ACCESS of 'read-create'. Write-only ACCESS becomes 'read-write' with a note in the DESCRIPTION clause.
section: "2.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
