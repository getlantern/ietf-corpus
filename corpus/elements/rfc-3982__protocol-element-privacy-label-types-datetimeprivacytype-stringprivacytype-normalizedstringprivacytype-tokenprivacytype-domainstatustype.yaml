document: rfc-3982
kind: protocol-element
summary: 'Privacy label types (dateTimePrivacyType, stringPrivacyType, normalizedStringPrivacyType, tokenPrivacyType, domainStatusType, contactTypeType) allow result fields to be marked with boolean attributes: ''private'' (never publishable), ''denied'' (policy-restricted), ''doNotRedistribute'', and ''specialAccess''. Elements present without content MUST carry one or more of these attributes.'
section: 3.2.1
topics:
    - dns
    - privacy
    - registry
