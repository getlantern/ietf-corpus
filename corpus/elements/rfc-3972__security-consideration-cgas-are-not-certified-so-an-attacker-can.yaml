document: rfc-3972
kind: security-consideration
summary: CGAs are not certified, so an attacker can create a new CGA from an arbitrary subnet prefix and any public key. However, an attacker cannot impersonate an existing CGA without finding a second pre-image of Hash1, which is computationally infeasible.
section: "7.1"
topics:
    - ip
    - crypto
    - security
