document: rfc-6534
kind: normative-requirement
summary: Measurement methodologies SHOULD include appropriate techniques to reduce the probability that measurement traffic can be distinguished from normal traffic, to prevent routers from treating probes differently and to prevent attackers from artificially lowering the observed loss rate by injecting fake probe traffic.
section: "8"
rfc2119_level: SHOULD
