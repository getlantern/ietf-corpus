document: rfc-2675
kind: design-rationale
summary: The TCP Urgent Pointer problem could have been fixed by adding a new TCP Urgent Pointer Option, but since applications using jumbograms are unlikely to also use Urgent Pointers, a less intrusive change analogous to the MSS sentinel value (65,535 = infinity) was chosen instead.
section: "5.2"
topics:
    - tcp
