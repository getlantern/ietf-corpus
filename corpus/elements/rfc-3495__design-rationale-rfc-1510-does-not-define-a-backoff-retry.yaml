document: rfc-3495
kind: design-rationale
summary: RFC 1510 does not define a backoff/retry mechanism for AS-REQ/AS-REP or AP-REQ/AP-REP exchanges. Sub-options 4 and 5 fill this gap by providing configurable nominal timeout, maximum timeout, and maximum retry parameters to support the PacketCable-defined backoff/retry mechanism.
section: "5.3"
topics:
    - crypto
