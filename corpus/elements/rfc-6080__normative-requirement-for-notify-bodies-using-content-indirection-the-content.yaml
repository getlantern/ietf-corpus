document: rfc-6080
kind: normative-requirement
summary: For NOTIFY bodies using content indirection, the Content-ID MIME header per RFC 4483 MUST be used for each profile document URI. A non-empty NOTIFY body MUST include a MIME type listed in the Accept header of the corresponding SUBSCRIBE.
section: "6.5"
rfc2119_level: MUST
topics:
    - sip
