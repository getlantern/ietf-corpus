document: rfc-2652
kind: registry
summary: 'RFC 2652 registers five MIME media types with IANA: application/index (top-level tree), application/index.cmd (command subtree), application/index.response (responses, required parameter: code), application/index.obj (index objects, required parameters: type, dsi, base-uri), and application/index.vnd (vendor extensions). All are designated LIMITED USE.'
section: Appendix A
