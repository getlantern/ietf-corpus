document: rfc-1697
kind: protocol-element
summary: rdbmsSrvLimitedResourceTable (rdbmsObjects 8) tracks limited server-level resources (e.g., threads, semaphores, buffer pages) with the same limit/current/highwater/failures structure as rdbmsDbLimitedResourceTable. Resources shared across servers should be duplicated across all relevant server entries.
section: "4"
