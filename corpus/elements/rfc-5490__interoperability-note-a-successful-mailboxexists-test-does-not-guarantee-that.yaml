document: rfc-5490
kind: interoperability-note
summary: A successful "mailboxexists" test does not guarantee that a subsequent "fileinto" action on that mailbox will succeed. For example, the action might put the user over quota; "mailboxexists" only verifies existence and delivery permission.
section: "3.1"
topics:
    - email
