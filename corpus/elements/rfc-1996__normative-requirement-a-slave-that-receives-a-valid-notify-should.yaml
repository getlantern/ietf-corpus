document: rfc-1996
kind: normative-requirement
summary: A slave that receives a valid NOTIFY should defer action on any subsequent NOTIFY with the same <QNAME,QCLASS,QTYPE> until it has completed the transaction started by the first NOTIFY, to avoid pummeling the master with concurrent requests.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
