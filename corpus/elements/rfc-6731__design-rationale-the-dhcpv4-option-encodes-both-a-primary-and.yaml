document: rfc-6731
kind: design-rationale
summary: The DHCPv4 option encodes both a primary and secondary RDNSS address in a single option instance (unlike DHCPv6 which uses one option per RDNSS) to accommodate DHCPv4's single-option-per-type expectation; long domain lists MAY span multiple concatenated option instances per RFC 3396.
section: "4.3"
topics:
    - dns
