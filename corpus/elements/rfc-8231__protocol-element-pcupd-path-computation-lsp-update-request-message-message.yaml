document: rfc-8231
kind: protocol-element
summary: 'PCUpd (Path Computation LSP Update Request) message: Message-Type=11, sent by PCE to PCC. Each update-request MUST include SRP, LSP, and ERO objects. A single PCUpd may contain multiple update requests; the ERO may be empty when the PCE cannot find a valid path.'
section: "6.2"
topics:
