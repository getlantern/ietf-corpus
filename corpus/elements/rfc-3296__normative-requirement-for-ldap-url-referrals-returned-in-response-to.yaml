document: rfc-3296
kind: normative-requirement
summary: For LDAP URL referrals returned in response to a search base object request, the server MUST provide an explicit scope specifier in the LDAP URL before returning it, and the DN part MUST be modified to refer to the appropriate target.
section: "5.3"
rfc2119_level: MUST
topics:
