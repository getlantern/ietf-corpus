document: rfc-7662
kind: design-rationale
summary: Token introspection was designed because OAuth 2.0 tokens are opaque to clients and resource servers, yet protected resources need token metadata (validity, scopes, authorization context) to make access decisions. Prior approaches required structured tokens (JWT) or proprietary inter-service mechanisms; this specification provides a standard protocol.
section: "1"
topics:
    - oauth
