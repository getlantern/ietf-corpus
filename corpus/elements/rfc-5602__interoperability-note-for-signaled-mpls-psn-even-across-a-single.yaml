document: rfc-5602
kind: interoperability-note
summary: For signaled MPLS PSN, even across a single hop, there is an MPLS tunnel entry in the relevant MPLS MIB modules. The pwOnly(2) mode (PW label only, no outer tunnel) applies only for manual configuration of PW over a single hop between adjacent PEs.
