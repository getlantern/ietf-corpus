document: rfc-5384
kind: interoperability-note
summary: Any PIM router that does not understand the type 1 Encoded-Source Address encoding cannot process a PIM Join message containing it. If Join Attributes affect tree construction, the tree may not form correctly unless all PIM routers receiving the message understand both type 1 encoding and the specific attributes used.
section: "3.1"
topics:
    - multicast
