document: rfc-5590
kind: normative-requirement
summary: A Transport Model MUST NOT downgrade the security level requested by a transport-aware Security Model, and SHOULD discard any message where this would occur. A Transport Model MAY upgrade the security level (e.g., sending noAuthNoPriv over an authenticated and encrypted session).
section: 3.3.4
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
