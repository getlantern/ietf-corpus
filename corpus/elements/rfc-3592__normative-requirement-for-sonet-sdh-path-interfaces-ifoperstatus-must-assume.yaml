document: rfc-3592
kind: normative-requirement
summary: For SONET/SDH Path interfaces, ifOperStatus MUST assume down(2) if sonetPathCurrentStatus has any value other than sonetPathNoDefect(1). For VT/VC interfaces, ifOperStatus MUST assume down(2) if sonetVTCurrentStatus has any value other than sonetVTNoDefect(1). ifLinkUpDownTrapEnable default is disabled(2) for paths and VTs.
section: "3.3"
rfc2119_level: MUST
topics:
    - snmp
