document: rfc-5305
kind: normative-requirement
summary: If a prefix is advertised with a metric larger than MAX_PATH_METRIC (0xFE000000), this prefix MUST NOT be considered during the normal SPF computation, allowing advertisement for purposes other than normal IP routing.
section: "4"
rfc2119_level: MUST NOT
