document: rfc-6850
kind: interoperability-note
summary: For TRILL (RFC 6325), IS-IS is constrained to a single Level 1 area with fixed area address zero, used for TRILL only with no IP address advertisement. ISIS-MIB tables for IP reachability, multiple areas, multiple levels, or multiple protocols will be empty for TRILL instances.
section: "6.7"
