document: rfc-6178
kind: security-consideration
summary: Crafted IPv4 packets with the Router Alert header option (option value 148) that belong to a prefix-based FEC can force MPLS imposition of the Router Alert Label (label value 1) at ingress LERs, triggering DoS conditions on downstream LSRs that process Router Alert Label packets as exceptions.
section: "5.2"
topics:
    - mpls
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
