document: rfc-3030
kind: interoperability-note
summary: 'When the receiver does not support BINARYMIME, a sender has three options: (1) transcode to 8bit-MIME if the receiver supports 8BITMIME, (2) transcode to 7bit-MIME, or (3) treat it as a permanent delivery failure. Transcoding must not lose information.'
section: "3"
topics:
