document: rfc-6021
kind: normative-requirement
summary: Objects using the uri type MUST be in US-ASCII encoding and MUST be normalized as described by RFC 3986 sections 6.2.1, 6.2.2.1, and 6.2.2.2, removing unnecessary percent-encoding and lowercasing case-insensitive characters (except hex digits, which are uppercased).
section: "4"
rfc2119_level: MUST
