document: rfc-6121
kind: normative-requirement
summary: The contact's server MUST NOT deliver more than one subscription request from a given user when the contact next becomes available, storing only one (first or last) to prevent subscription request spam.
section: 3.1.3
rfc2119_level: MUST NOT
topics:
    - security
