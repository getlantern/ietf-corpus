document: rfc-1043
kind: normative-requirement
summary: DODIIS implementors must declare non-support of erase facilities by sending the ERASE-FACILITIES subcommand with a zeroed facility map, since no erase facilities are defined for DODIIS implementations but the subcommand is part of the minimal implementation.
section: "2"
rfc2119_level: MUST
topics:
