document: rfc-2910
kind: normative-requirement
summary: The end-of-attributes-tag (0x03) MUST occur exactly once in an operation and MUST be the last delimiter-tag. If the operation has a document-content group, the document data MUST follow the end-of-attributes-tag.
section: 3.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
