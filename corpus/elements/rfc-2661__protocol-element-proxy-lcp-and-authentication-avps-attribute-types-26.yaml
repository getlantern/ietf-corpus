document: rfc-2661
kind: protocol-element
summary: Proxy LCP and Authentication AVPs (Attribute Types 26–33) allow the LAC to forward the PPP LCP CONFREQ exchange and authentication credentials to the LNS, enabling PPP to continue without re-negotiation. The LNS policy may still require renegotiation if the LAC is not trusted.
section: 4.4.5
topics:
