document: rfc-9633
kind: interoperability-note
summary: The forwarding sub-layer supports both IP and MPLS data planes. For MPLS static tunnels, configuration is required at every transit node along the path; for IP, static next-hop and address configuration is used. The module provides data-plane programming only, not control-plane signaling or resource reservation signaling.
section: "4.3"
