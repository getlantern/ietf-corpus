document: rfc-3302
kind: normative-requirement
summary: The application parameter MUST NOT be used as a blind request to execute some arbitrary program; it should be treated as a hint indicating what sort of application would handle the content most appropriately.
section: "5.2"
rfc2119_level: MUST NOT
