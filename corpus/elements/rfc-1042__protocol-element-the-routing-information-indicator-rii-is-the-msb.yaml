document: rfc-1042
kind: protocol-element
summary: The Routing Information Indicator (RII) is the MSB of the 802.5 source address. RII=1 signals a RIF is present; RII=0 means no RIF. Implementations must reset RII to zero before passing source addresses to higher protocol layers to avoid confusion with the individual/group indicator in destination addresses.
section: Multi-Ring Extension Details
