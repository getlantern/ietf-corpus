document: rfc-5595
kind: security-consideration
summary: Because Service Codes allow multiple applications to safely share a single server port, port number reuse in DCCP may be more common than in TCP/UDP. Security policies and middlebox rules that rely solely on port numbers may therefore be less effective.
section: "4.1"
topics:
    - security
    - congestion
    - nat
