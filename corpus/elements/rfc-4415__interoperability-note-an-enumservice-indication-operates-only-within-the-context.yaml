document: rfc-4415
kind: interoperability-note
summary: An Enumservice indication operates only within the context of the 'E2U' DDDS application (ENUM). Although other DDDS applications exist (e.g., RFC 3404, RFC 3405), voice:tel NAPTRs are not intended for use in those contexts.
