summary: 'RFC 7275 establishes four IANA registries: Message Type Name Space (LDP message types 0x0700–0x070F allocated for ICCP), TLV Type Name Space (ICC parameter types), ICC RG Parameter Type Space (RG-level parameter types including RG ID type 0x0005), and Status Code Name Space (ICCP status codes including the 0x0001xxxx range defined herein).'
