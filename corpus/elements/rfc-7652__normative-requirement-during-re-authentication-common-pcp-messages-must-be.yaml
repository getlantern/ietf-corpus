document: rfc-7652
kind: normative-requirement
summary: During re-authentication, common PCP messages MUST be protected with the current SA until the new SA has been generated; PA and common PCP sequence numbers are reset to zero after successful re-authentication.
section: "3.4"
rfc2119_level: MUST
