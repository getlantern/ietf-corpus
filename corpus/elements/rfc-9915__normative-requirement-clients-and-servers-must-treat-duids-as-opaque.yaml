document: rfc-9915
kind: normative-requirement
summary: Clients and servers MUST treat DUIDs as opaque values and MUST only compare them for equality. Implementations MUST NOT restrict DUIDs to the types defined in this document, as additional DUID types may be defined in the future.
section: "11"
rfc2119_level: MUST
topics:
