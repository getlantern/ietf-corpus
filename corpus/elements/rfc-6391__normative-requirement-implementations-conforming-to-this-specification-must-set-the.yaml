document: rfc-6391
kind: normative-requirement
summary: Implementations conforming to this specification MUST set the Traffic Class (TC) field of the flow LSE to zero at the ingress and MUST ignore the TC field at the egress, as no use for TC is defined by this document.
section: "1.3"
rfc2119_level: MUST
topics:
