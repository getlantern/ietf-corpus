document: rfc-5303
kind: design-rationale
summary: The extension also addresses IS-IS's implicit 256-interface limit caused by the 8-bit Circuit ID field. Existing workarounds (sharing circuit IDs across point-to-point interfaces) reduced robustness of identity-change detection. A new 32-bit Extended Local Circuit ID field provides a backward-compatible expansion of the circuit ID number space.
section: "2.2"
topics:
