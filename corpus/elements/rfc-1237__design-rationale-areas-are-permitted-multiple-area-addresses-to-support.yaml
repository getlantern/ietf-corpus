document: rfc-1237
kind: design-rationale
summary: 'Areas are permitted multiple area addresses to support graceful transition operations: renaming (assign B, then remove A), merging two areas (add each other''s address then unify), and partitioning one area into two (introduce new addresses before removing the old one). This avoids hard cutover disruptions.'
section: "3.2"
topics:
    - routing
