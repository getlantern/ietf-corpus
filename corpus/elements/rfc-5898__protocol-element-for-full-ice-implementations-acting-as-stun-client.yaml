document: rfc-5898
kind: protocol-element
summary: 'For full ICE implementations acting as STUN client: "send" and "recv" connectivity are ascertained when a STUN Binding Request produces a successful check for all media stream components. For any ICE implementation acting as STUN server: "recv" connectivity is ascertained upon receiving a STUN Binding Request that results in a successful response.'
section: "4.2"
