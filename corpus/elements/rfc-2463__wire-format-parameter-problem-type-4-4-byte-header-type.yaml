summary: 'Parameter Problem (Type=4): 4-byte header (Type, Code, Checksum) followed by a 4-byte Pointer field identifying the octet offset within the invoking packet where the error was detected, then as much of the invoking packet as fits. Code 0 = erroneous header field; Code 1 = unrecognized Next Header; Code 2 = unrecognized IPv6 option.'
