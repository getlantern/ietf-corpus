document: rfc-3842
kind: interoperability-note
summary: 'Although the application/simple-message-summary format is similar to RFC 2822, it is not identical: line folding rules are SIP-specific and included URIs can contain non-ASCII characters. Protocols with line length or character-set restrictions MUST use a reversible transfer encoding such as base64.'
section: "7.2"
topics:
    - sip
    - realtime
