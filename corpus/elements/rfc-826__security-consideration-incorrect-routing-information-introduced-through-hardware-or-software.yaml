document: rfc-826
kind: security-consideration
summary: Incorrect routing information introduced through hardware or software error can persist indefinitely in ARP tables. Table aging, timeouts, or manual clearing are recommended mitigations, though their implementation is explicitly outside the scope of this protocol. Failure to initiate a connection or absence of received packets from a host are suggested triggers for entry invalidation.
section: Related issue
topics:
