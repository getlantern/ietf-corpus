document: rfc-3559
kind: security-consideration
summary: Unauthorized write access to mallocScopeTable and mallocAllocRangeTable can cause denial of service (inability to allocate addresses, exhausting address space, overlapping with other organizations' allocations) or cause applications to use a hop limit that wastes bandwidth.
