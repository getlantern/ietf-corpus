document: rfc-4323
kind: design-rationale
summary: Modifying a Service Class's QoS Parameter Set does not retroactively affect Service Flows previously expanded from that class. Each SF retains the QPS values assigned at creation time, preventing unintended disruption to active flows when a service class template is updated.
section: 2.2.2
topics:
