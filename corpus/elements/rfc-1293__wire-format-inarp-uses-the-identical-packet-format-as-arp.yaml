document: rfc-1293
kind: wire-format
summary: 'InARP uses the identical packet format as ARP: ar$hrd (16 bits, hardware type), ar$pro (16 bits, protocol type), ar$hln (8 bits, hardware address byte length n), ar$pln (8 bits, protocol address byte length m), ar$op (16 bits, operation code), ar$sha (n bytes, source hardware address), ar$spa (m bytes, source protocol address), ar$tha (n bytes, target hardware address), ar$tpa (m bytes, target protocol address).'
