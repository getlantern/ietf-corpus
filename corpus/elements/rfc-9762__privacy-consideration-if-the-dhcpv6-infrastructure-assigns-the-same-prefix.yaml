document: rfc-9762
kind: privacy-consideration
summary: If the DHCPv6 infrastructure assigns the same prefix to the same client across reconnections, an observer can identify clients based on the upper 64 bits of their address. Privacy implications are similar to DHCPv6 IA_NA assignment; countermeasures are discussed in RFC 9663 Section 13.
section: "11"
topics:
    - privacy
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
