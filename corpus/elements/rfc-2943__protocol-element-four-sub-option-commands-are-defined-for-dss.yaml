summary: 'Four sub-option commands are defined for DSS authentication: DSS_INITIALIZE (1), DSS_TOKENBA (2), DSS_CERTA_TOKENAB (3), and DSS_CERTB_TOKENBA2 (4). These identifiers are carried as a single octet immediately after the two-octet authentication type pair to uniquely identify each exchange step.'
