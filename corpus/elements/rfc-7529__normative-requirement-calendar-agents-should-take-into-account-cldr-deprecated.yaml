document: rfc-7529
kind: normative-requirement
summary: Calendar agents SHOULD take into account CLDR 'deprecated' calendar system values and use the alternative 'preferred' calendar system instead. In particular, 'islamicc' is deprecated in favor of 'islamic-civil'.
section: "5"
rfc2119_level: SHOULD
