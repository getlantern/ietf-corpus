document: rfc-3594
kind: design-rationale
summary: CCDs are permitted to retain security tickets in local persistent storage so that a power-cycled device can reuse non-expired tickets, avoiding expensive Kerberos ticket acquisition and greatly reducing security overhead. The STC sub-option gives service providers control over this persistence to support re-establishment of security associations and remote diagnostics.
section: "3"
topics:
    - security
