document: rfc-4355
kind: design-rationale
summary: Enumservice registrations use a 'type' (the service) and 'subtype' (the URI scheme) convention because the same URI scheme may serve different services and the same service may use multiple URI schemes; the subtype is needed even when only one URI scheme is currently associated with a service, as additional schemes may be added later.
section: "1"
topics:
