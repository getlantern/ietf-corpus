document: rfc-5162
kind: design-rationale
summary: QRESYNC extends SELECT to perform resynchronization in a single round-trip, avoiding the need for clients to issue separate UID FETCH and UID SEARCH commands that CONDSTORE-only clients require. This is particularly useful for mobile clients experiencing frequent disconnects due to battery life or signal strength.
section: "1"
