document: rfc-6786
kind: wire-format
summary: 'The AES128_CTR nonce is 12 octets composed of: a 4-octet Key-Id, a 4-octet Session ID, and a 4-octet Sequence Number, each encoded in network byte order. These are used as input to the formatting and counter generation functions from NIST SP800-38C with parameters n=12, q=3.'
section: "4.1"
topics:
