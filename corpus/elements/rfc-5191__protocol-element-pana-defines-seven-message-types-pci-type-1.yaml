summary: 'PANA defines seven message types: PCI (type 1, PaC→PAA only), PAR/PAN (type 2, bidirectional), PTR/PTA (type 3, bidirectional), and PNR/PNA (type 4, bidirectional). The R-bit in the Flags field distinguishes requests from answers for the same message type number.'
