document: rfc-2597
kind: protocol-element
summary: The AF PHB group defines N independent AF classes each with M drop precedence levels. A packet in AF class i with drop precedence j is marked AFij. Currently four classes (N=4) with three drop precedence levels (M=3) are defined for general use; additional classes or precedence levels MAY be defined for local use.
