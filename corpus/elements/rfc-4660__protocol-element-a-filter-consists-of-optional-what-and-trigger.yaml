document: rfc-4660
kind: protocol-element
summary: A filter consists of optional <what> and <trigger> elements within a <filter> element. A <what>-only filter limits notification content; a <trigger>-only filter controls when notifications are sent; both together restrict both content and send conditions.
section: "5.3"
