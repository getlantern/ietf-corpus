document: rfc-5428
kind: design-rationale
summary: Event throttling (pktcEventThrottleAdminStatus) is intentionally scoped to transmitted messages only and does not affect local logging. This ensures that even under high event rates, a local audit trail is preserved regardless of network transmission constraints.
section: "4.3"
topics:
    - snmp
    - syslog
