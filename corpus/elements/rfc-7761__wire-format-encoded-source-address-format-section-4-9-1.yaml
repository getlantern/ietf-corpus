document: rfc-7761
kind: wire-format
summary: Encoded Source Address format (Section 4.9.1) includes an address family field, encoding type, flag bits (S bit for SPT, W bit for WC, R bit for RPT), mask length, and source address. Encoded Group Address includes B (Bidir) and Z (Zone) flag bits plus group mask length and address.
section: 4.9.1
topics:
