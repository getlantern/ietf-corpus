document: rfc-9042
kind: design-rationale
summary: The note to developers of Sieve generation tools advises using :specialuse rather than :mailboxid when creating rules based on a special-use purpose (e.g., delivering to the Junk folder), because special-use flags better capture intent and are more portable across server configurations.
section: "4.2"
topics:
    - email
