kind: protocol-element
summary: The media type parameter 'mt=' specifies the media type (audio, video, application, etc.) for a latent configuration; it is currently defined only for the 'lcfg' attribute and MUST be present in every 'lcfg' attribute since latent configurations exist independently of any 'm=' line.
