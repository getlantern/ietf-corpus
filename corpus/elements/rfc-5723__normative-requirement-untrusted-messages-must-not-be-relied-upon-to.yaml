document: rfc-5723
kind: normative-requirement
summary: Untrusted messages MUST NOT be relied upon to detect the need for session resumption; clients should not use a more liberal detection policy than the standard IKE SA liveness test (Section 2.4 of RFC 4306).
section: "9.4"
rfc2119_level: MUST NOT
topics:
