document: rfc-8925
kind: design-rationale
summary: Delaying the IPv4 request until IPv6 reachability is confirmed was rejected because it would penalize IPv4-only and dual-stack networks. Releasing IPv4 after IPv6 is confirmed was also rejected because it disrupts applications already using the assigned address. The option-based approach adds no delay to IP stack configuration on non-supporting networks.
section: "1"
