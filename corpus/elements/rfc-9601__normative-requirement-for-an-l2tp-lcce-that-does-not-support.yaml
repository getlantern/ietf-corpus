document: rfc-9601
kind: normative-requirement
summary: For an L2TP LCCE that does not support the ECN extension, configuration of how it propagates the ECN field between inner and outer IP headers MUST be independent of any configuration of the Diffserv extension of L2TP (RFC 3308).
section: 6.1.1.1
rfc2119_level: MUST
topics:
    - ecn
    - ip
    - diffserv
