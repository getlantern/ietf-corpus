document: rfc-7516
kind: security-consideration
summary: Implementations performing encryption must protect the key encryption key and the Content Encryption Key. Compromise of the key encryption key may result in disclosure of all content protected with that key; compromise of the CEK may expose the associated encrypted content.
section: "11.2"
topics:
    - jose
    - crypto
    - security
