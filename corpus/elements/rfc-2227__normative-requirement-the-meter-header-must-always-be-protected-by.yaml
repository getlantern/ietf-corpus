document: rfc-2227
kind: normative-requirement
summary: The Meter header MUST always be protected by a Connection header. A proxy that does not implement Meter MUST NOT pass it through to another system. If a Meter header is received in a message whose version is less than HTTP/1.1, it MUST be ignored.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
