document: rfc-7599
kind: normative-requirement
summary: In MAP address-sharing mode, the NAT44 operation MUST be restricted to port numbers derived via the Basic Mapping Rule. The NAT44 SHOULD conform to behavioral best practices documented in RFC 4787, RFC 5508, and RFC 5382.
section: "11"
rfc2119_level: MUST
