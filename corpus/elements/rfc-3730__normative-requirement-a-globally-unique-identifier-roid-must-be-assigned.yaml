document: rfc-3730
kind: normative-requirement
summary: A globally unique identifier (ROID) MUST be assigned to every object upon creation and MUST be returned in any <info> response. The ROID is formed by concatenating the local identifier, a hyphen (ASCII 0x002D), and the IANA-assigned repository identifier.
section: "2.8"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
