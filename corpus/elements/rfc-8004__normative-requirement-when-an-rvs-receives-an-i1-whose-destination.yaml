document: rfc-8004
kind: normative-requirement
summary: When an RVS receives an I1 whose destination HIT is not its own, it consults its registration database; if a matching registration is found it relays the packet, otherwise it drops the packet.
section: 4.3.2
rfc2119_level: MUST
