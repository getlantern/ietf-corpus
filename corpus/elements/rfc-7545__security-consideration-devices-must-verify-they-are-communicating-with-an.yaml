document: rfc-7545
kind: security-consideration
summary: Devices must verify they are communicating with an authorized Database to prevent rogue databases from providing false spectrum availability data that could cause interference with primary users. TLS server certificate validation against a trusted CA is the primary assurance mechanism.
section: "10.1"
topics:
