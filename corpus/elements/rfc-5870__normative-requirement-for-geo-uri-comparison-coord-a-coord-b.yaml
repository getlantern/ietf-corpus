document: rfc-5870
kind: normative-requirement
summary: For 'geo' URI comparison, <coord-a>, <coord-b>, <coord-c>, and 'u' values MUST be compared as normalized numbers (mathematically identical) rather than as raw strings, so that '43.10' and '43.1' are treated as equal.
section: 3.4.4
rfc2119_level: MUST
