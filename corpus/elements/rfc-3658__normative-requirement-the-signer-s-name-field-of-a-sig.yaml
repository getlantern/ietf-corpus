document: rfc-3658
kind: normative-requirement
summary: The signer's name field of a SIG RR MUST contain the name of the zone to which the data and signature belong. The combination of signer's name, key tag, and algorithm MUST identify a zone key for the SIG to be considered material.
section: 2.2.2
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
