document: rfc-8449
kind: normative-requirement
summary: A server that supports `record_size_limit` MUST ignore a `max_fragment_length` extension that appears in a ClientHello when both extensions are present. A client MUST treat receipt of both extensions as a fatal error and SHOULD generate an `illegal_parameter` alert.
section: "5"
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
