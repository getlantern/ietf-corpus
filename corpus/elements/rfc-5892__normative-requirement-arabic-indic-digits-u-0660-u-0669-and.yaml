document: rfc-5892
kind: normative-requirement
summary: Arabic-Indic digits (U+0660–U+0669) and Extended Arabic-Indic digits (U+06F0–U+06F9) MUST NOT be mixed within the same label. Each set has a CONTEXTO rule that returns False if any character in the label belongs to the other digit set.
section: A.8
rfc2119_level: MUST NOT
