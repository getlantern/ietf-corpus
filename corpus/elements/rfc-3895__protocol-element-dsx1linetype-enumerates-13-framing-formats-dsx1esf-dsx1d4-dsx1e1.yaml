document: rfc-3895
kind: protocol-element
summary: 'dsx1LineType enumerates 13 framing formats: dsx1ESF, dsx1D4, dsx1E1, dsx1E1CRC, dsx1E1MF, dsx1E1CRCMF, dsx1Unframed, dsx1E1Unframed, dsx1DS2M12, dsx1E2, dsx1E1Q50, dsx1E1Q50CRC, and other. The selected type determines capacity (e.g., E1MF yields 30x64k=1920k due to signaling overhead) and error statistic interpretation.'
