document: rfc-3464
kind: normative-requirement
summary: The Final-Recipient field MUST report exactly the address received in the envelope, preserving case. The Reporting MTA is not expected to validate that the address conforms to address-type syntax, except that CR and LF characters are prohibited in DSN fields.
section: 2.3.2
rfc2119_level: MUST
topics:
    - email
