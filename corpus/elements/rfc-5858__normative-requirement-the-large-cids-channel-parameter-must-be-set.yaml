document: rfc-5858
kind: normative-requirement
summary: The LARGE_CIDS channel parameter MUST be set based on MAX_CID (if MAX_CID <= 15, LARGE_CIDS is 0). The FEEDBACK_FOR parameter MUST be set to the ROHC channel on the reverse SA; if no reverse SA exists, ROHC MUST NOT operate in bi-directional mode.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
