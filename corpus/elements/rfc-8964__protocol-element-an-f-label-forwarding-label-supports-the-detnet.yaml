document: rfc-8964
kind: protocol-element
summary: An F-Label (forwarding label) supports the DetNet forwarding sub-layer by providing LSP-based connectivity between DetNet service sub-layer processing nodes. Zero or more F-Labels are pushed above the S-Label; they may be absent on the final hop when PHP is in use.
