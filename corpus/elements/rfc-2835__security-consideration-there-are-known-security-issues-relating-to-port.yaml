document: rfc-2835
kind: security-consideration
summary: There are known security issues relating to port impersonation via ARP-based address resolution protocols. No special security mechanisms have been added to HARP. The full scope of ARP-over-HIPPI-6400 security issues was not fully understood at time of publication due to the fluid state of HIPPI-6400 specifications.
section: "9"
topics:
