document: rfc-3605
kind: security-consideration
summary: To protect against attacks that modify the 'a=rtcp' attribute in SDP carried as application/sdp, end-to-end integrity using S/MIME (RFC 3369) is the recommended technical method. This approach is compatible with SIP (RFC 3261).
