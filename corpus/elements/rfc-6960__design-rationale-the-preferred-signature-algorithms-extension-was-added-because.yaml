document: rfc-6960
kind: design-rationale
summary: The Preferred Signature Algorithms extension was added because RFC 2560 provided no mechanism for clients to indicate algorithm preferences, creating a risk that a responder choosing a non-mandatory algorithm would produce a response the client cannot verify. The extension also enables responders to use a lighter-weight algorithm than the one used to sign certificates.
section: 4.4.7
topics:
    - pkix
    - crypto
