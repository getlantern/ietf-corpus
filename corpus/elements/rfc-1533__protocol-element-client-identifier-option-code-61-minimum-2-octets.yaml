document: rfc-1533
kind: protocol-element
summary: Client-identifier option (code 61, minimum 2 octets) is used by DHCP clients to specify a unique identifier used by servers to index address bindings. It consists of a hardware type octet followed by the identifier value; typically a hardware type and hardware address.
section: "9.12"
