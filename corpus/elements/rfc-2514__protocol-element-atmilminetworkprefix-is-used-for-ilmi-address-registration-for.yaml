document: rfc-2514
kind: protocol-element
summary: AtmIlmiNetworkPrefix is used for ILMI address registration. For ATM endsystem addresses (AESAs), the prefix is the first 13 octets (AFI+IDI+HO-DSP). For native E.164 addresses, the prefix is the full 8-octet E.164 address encoded as if it were an E.164 IDP.
