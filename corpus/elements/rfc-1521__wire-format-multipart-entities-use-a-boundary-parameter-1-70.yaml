document: rfc-1521
kind: wire-format
summary: Multipart entities use a 'boundary' parameter (1–70 characters from a robust character set, not ending with whitespace) as the encapsulation delimiter. Each body part is preceded by '--' + boundary on its own CRLF-terminated line; the final closing delimiter appends '--' after the boundary value. Preamble and epilogue text outside the boundaries must be ignored.
section: 7.2.1
topics:
    - email
