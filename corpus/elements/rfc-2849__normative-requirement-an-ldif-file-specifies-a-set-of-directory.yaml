document: rfc-2849
kind: normative-requirement
summary: An LDIF file specifies a set of directory entries or a set of changes to be applied to directory entries, but not both. The top-level grammar is either ldif-content or ldif-changes.
section: Definition of the LDAP Data Interchange Format
rfc2119_level: MUST
topics:
    - ldap
