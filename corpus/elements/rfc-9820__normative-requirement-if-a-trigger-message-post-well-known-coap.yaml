document: rfc-9820
kind: normative-requirement
summary: If a trigger message (POST /.well-known/coap-eap) arrives at the EAP authenticator during an ongoing authentication with the same EAP peer, the EAP authenticator MUST silently discard it to prevent duplicate session initiation.
section: 3.5.3
rfc2119_level: MUST
topics:
    - security
