document: rfc-8299
kind: protocol-element
summary: 'The model defines three VPN service topology types: `any-to-any` (all sites communicate freely, single RT sufficient), `hub-and-spoke` (Spokes reach only Hubs; Hubs can reach each other, requiring two RTs), and `hub-and-spoke-disjoint` (Spokes reach only Hubs; Hubs cannot reach each other, also requiring two RTs). The default topology is any-to-any. New topologies may be added via YANG augmentation.'
section: 6.2.1
