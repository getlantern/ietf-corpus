document: rfc-5536
kind: protocol-element
summary: The Path header field records the route taken by an article since injection. Each agent that processes an article is required to prepend at least one path-identity. The diag-match '!!' indicates the left agent verified the identity of the right agent; path-diagnostic items may record IP addresses or keyword data.
section: 3.1.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
