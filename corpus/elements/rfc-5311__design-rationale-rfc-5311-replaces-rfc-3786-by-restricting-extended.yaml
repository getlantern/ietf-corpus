document: rfc-5311
kind: design-rationale
summary: RFC 5311 replaces RFC 3786 by restricting Extended LSP content to information that does NOT impact Shortest Path Tree (SPT) computation. This allows legacy IS-IS systems to treat Extended LSPs as belonging to a virtual IS reachable only via the Originating System, making SPF results consistent between legacy and extension-capable systems without requiring two operating modes.
section: "5"
topics:
    - routing
