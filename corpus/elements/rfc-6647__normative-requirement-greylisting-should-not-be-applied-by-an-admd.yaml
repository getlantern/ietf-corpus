document: rfc-6647
kind: normative-requirement
summary: Greylisting SHOULD NOT be applied by an ADMD's submission service for authenticated client hosts, and SHOULD NOT be applied against any authenticated ADMD session. Authentication may include known internal IP addresses, protocol-level client authentication, or similar mechanisms.
section: "5"
rfc2119_level: SHOULD NOT
