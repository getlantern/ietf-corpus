document: rfc-7678
kind: protocol-element
summary: 'The MAP-E-Attributes AVP (code 642) is a Grouped AVP carrying all MAP-E configuration for a single MAP domain: one or more Border-Router-Name AVPs, one or more MAP-Mapping-Rule AVPs, an optional MAP-Mesh-Mode AVP, and an optional Delegated-IPv6-Prefix for the end-user IPv6 prefix.'
