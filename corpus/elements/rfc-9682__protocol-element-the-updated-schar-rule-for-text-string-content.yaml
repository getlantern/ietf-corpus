document: rfc-9682
kind: protocol-element
summary: The updated SCHAR rule (for text string content) is defined as %x20-21 / %x23-5B / %x5D-7E / NONASCII / SESC, where NONASCII = %xA0-D7FF / %xE000-10FFFD. This excludes C0, DEL (U+007F), C1 controls (U+0080–U+009F), and surrogate code points from unescaped string content.
section: 2.1.2
topics:
    - cbor
    - json
