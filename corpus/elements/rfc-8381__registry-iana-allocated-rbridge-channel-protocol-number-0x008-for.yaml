document: rfc-8381
kind: registry
summary: IANA allocated RBridge Channel Protocol number 0x008 for the Vendor-Specific RBridge Channel Protocol (allocated by Standards Action). A new subregistry 'Vendor RBridge Channel Error Codes' was established under TRILL Parameters / RBridge Channel Error Codes, with registration procedure Standards Action, defining codes 0x00–0x04 (specified), 0x05–0x0F (unassigned), 0x10–0xFE (reserved for vendor use), and 0xFF (reserved).
