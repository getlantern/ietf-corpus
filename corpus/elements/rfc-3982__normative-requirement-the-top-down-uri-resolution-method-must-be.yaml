document: rfc-3982
kind: normative-requirement
summary: The top-down URI resolution method MUST be identified as 'top' in IRIS URIs. Resolution starts from the root label ('.'), then prepends labels leftward until the full domain name is assembled, falling back to DNS address records if no server connection succeeds.
section: "6.3"
rfc2119_level: MUST
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
