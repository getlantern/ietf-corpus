document: rfc-5838
kind: normative-requirement
summary: If the M6-bit is set in a received Database Description packet for a non-IPv6 address family, the receiving router MUST NOT check the Interface MTU in the packet against the receiving interface's IPv6 MTU.
section: "2.7"
rfc2119_level: MUST NOT
topics:
    - routing
