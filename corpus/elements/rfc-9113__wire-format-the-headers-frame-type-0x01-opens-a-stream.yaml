document: rfc-9113
kind: wire-format
summary: 'The HEADERS frame (type=0x01) opens a stream and carries a field block fragment. Optional fields: Pad Length (8-bit), Exclusive (1-bit, deprecated priority), Stream Dependency (31-bit, deprecated), Weight (8-bit, deprecated), Field Block Fragment (variable), Padding. Flags: END_STREAM (0x01), END_HEADERS (0x04), PADDED (0x08), PRIORITY (0x20).'
section: "6.2"
topics:
