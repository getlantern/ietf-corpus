document: rfc-2024
kind: state-machine
summary: 'Transport connection operational states are: connecting (connection request sent to transport), initCapExchange (initial Capabilities Exchange sent), connected (ready for CanUReach messages), quiescing (no new circuits, disconnect when last circuit leaves), disconnecting (force-disconnect all circuits), and disconnected. Manager may SET only quiescing or disconnecting.'
section: "3.0"
topics:
