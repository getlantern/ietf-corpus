document: rfc-4420
kind: normative-requirement
summary: Unassigned bits in the Attributes Flags TLV MUST be set to zero on transmission. Bits not contained in the TLV MUST be assumed to be set to zero. If the TLV or its containing objects are absent, all processing MUST be performed as though the bits were present and set to zero.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - realtime
