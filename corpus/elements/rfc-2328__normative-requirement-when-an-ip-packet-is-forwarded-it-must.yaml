document: rfc-2328
kind: normative-requirement
summary: When an IP packet is forwarded, it must always be forwarded to the network that is the best (longest/most specific) match for the packet's destination. Subnet masks must be assigned so the best match is unambiguous.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
