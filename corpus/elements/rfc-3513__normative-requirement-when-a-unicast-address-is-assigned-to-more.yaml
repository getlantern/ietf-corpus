document: rfc-3513
kind: normative-requirement
summary: When a unicast address is assigned to more than one interface (making it anycast), the nodes to which it is assigned must be explicitly configured to know it is an anycast address. An anycast address must not be used as a source address of an IPv6 packet, and must not be assigned to an IPv6 host—only to routers.
section: "2.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
