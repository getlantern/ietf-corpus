document: rfc-3986
kind: normative-requirement
summary: A base URI used for relative reference resolution must conform to the absolute-URI syntax rule and must not include a fragment component. If derived from a URI reference, it must first be converted to absolute form and stripped of any fragment.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
