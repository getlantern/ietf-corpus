document: rfc-7346
kind: protocol-element
summary: 'IPv6 multicast addresses include a 4-bit ''scop'' field that limits the scope of the multicast group. RFC 7346 updates the scope value table: 0=Reserved, 1=Interface-Local, 2=Link-Local, 3=Realm-Local, 4=Admin-Local, 5=Site-Local, 6-7=Unassigned, 8=Organization-Local, 9-D=Unassigned, E=Global, F=Reserved.'
section: "2"
topics:
    - ip
    - multicast
