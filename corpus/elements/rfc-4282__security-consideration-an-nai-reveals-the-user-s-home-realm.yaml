document: rfc-4282
kind: security-consideration
summary: An NAI reveals the user's home realm affiliation, enabling an attacker to narrow the username space to probe. This risk is highest in protocols that transmit the NAI in clear-text, such as RADIUS over an unprotected link.
section: "3"
topics:
