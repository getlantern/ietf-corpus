document: rfc-5036
kind: protocol-element
summary: 'LDP Discovery has two variants: Basic Discovery sends Link Hellos periodically via UDP multicast to the ''all routers on this subnet'' group at the well-known LDP port; Extended Discovery sends Targeted Hellos via UDP unicast to a specific address for non-directly-connected LSRs. Extended Discovery is asymmetric: the targeted LSR chooses whether to respond.'
section: "2.4"
topics:
    - mpls
    - routing
