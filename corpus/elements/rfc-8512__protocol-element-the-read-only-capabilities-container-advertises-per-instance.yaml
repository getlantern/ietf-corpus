document: rfc-8512
kind: protocol-element
summary: 'The read-only capabilities container advertises per-instance NAT behavior: supported nat-flavor identityrefs, transport-protocols, mapping behavior (endpoint-independent, address-dependent, address-and-port-dependent), filtering behavior (three analogous options), port features (randomization, range-allocation, preservation, parity-preservation, round-robin, paired-address-pooling), and fragment-behavior (unsupported/in-order/out-of-order).'
section: "2.12"
topics:
