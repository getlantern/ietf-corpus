document: rfc-2674
kind: interoperability-note
summary: The ifStackTable cannot represent the full capability of IEEE 802.1Q VLAN bridging because it assumes a symmetrical transmit/receive binding, whereas 802.1Q distinguishes VLAN membership on ingress versus egress from a port. This asymmetry makes ifStackTable an imperfect representation for VLAN connectivity.
section: 3.4.2.2
topics:
    - snmp
