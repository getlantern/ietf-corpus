document: rfc-7522
kind: normative-requirement
summary: For client authentication, the 'client_assertion' parameter MUST contain a single SAML 2.0 Assertion encoded using base64url. The encoded data SHOULD NOT be line wrapped and pad characters SHOULD NOT be included.
section: "2.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
