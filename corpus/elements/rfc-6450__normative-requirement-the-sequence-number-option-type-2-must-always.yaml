document: rfc-6450
kind: normative-requirement
summary: The Sequence Number option (type 2) MUST always be included in Echo Request messages and MUST NOT be included in Init messages. Its length MUST be 4 (32-bit integer). A server MUST copy it into the Echo Reply.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
