document: rfc-4582
kind: design-rationale
summary: 'When a FloorRequest contains multiple FLOOR-ID attributes, the server treats the entire request as an atomic package: all floors are either granted together or denied together. This supports use cases where a participant needs simultaneous access to multiple resources (e.g., audio and whiteboard).'
section: "4.1"
