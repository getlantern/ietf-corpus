document: rfc-3214
kind: normative-requirement
summary: Upon receiving a Label Release Message, LSR Ri examines the LSPID and, if another set of labels still exists under it, releases only the old label without releasing the bandwidth resource in use (or releases only the delta bandwidth if decreased).
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
