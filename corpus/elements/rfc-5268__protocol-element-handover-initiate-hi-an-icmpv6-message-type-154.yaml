document: rfc-5268
kind: protocol-element
summary: 'Handover Initiate (HI): an ICMPv6 message (Type 154, Subtype 4) sent from PAR to NAR to initiate an MN''s handover. The ''S'' flag requests assigned address configuration; the ''U'' flag requests buffering. Code 0 is used for FBU sent from PAR''s link; Code 1 for FBU sent from NAR''s link.'
section: 6.2.1
