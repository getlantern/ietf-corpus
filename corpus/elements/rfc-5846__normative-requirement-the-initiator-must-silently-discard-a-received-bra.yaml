document: rfc-5846
kind: normative-requirement
summary: The initiator MUST silently discard a received BRA whose Sequence Number does not match any outstanding BRI (MAY log the event). If the BRA Status indicates success, the initiator MUST delete the retransmission timer and the mobile node binding(s) and all associated resources.
section: 6.2.2
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
