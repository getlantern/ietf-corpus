document: rfc-5178
kind: security-consideration
summary: Use of GSS-API domain-based names may not be negotiable by some GSS-API mechanisms, and some acceptors may not support domain-based names; in such cases, initiators must fall back to host-based names and additionally verify the acceptor's authorization for the domain.
section: "7"
