document: rfc-3958
kind: normative-requirement
summary: A client MAY choose which protocol to try first based on its own preference or on the PREF ranking in the first NAPTR record set. It MAY run simultaneous DDDS resolutions for more than one protocol, but must not switch protocols mid-resolution for any single resolution chain.
section: 2.2.5
rfc2119_level: MAY
topics:
    - dns
