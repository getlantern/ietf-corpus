document: rfc-2743
kind: protocol-element
summary: 'Optional context services are requested via req_flags to GSS_Init_sec_context: delegation, mutual authentication, replay detection, out-of-sequence detection, anonymous authentication, per-message confidentiality availability, and per-message integrity availability. ret_flags from both GSS_Init_sec_context and GSS_Accept_sec_context indicate which services will actually be available on the established context.'
section: 1.2.1.2
topics:
