document: rfc-1891
kind: normative-requirement
summary: When relaying to a conforming SMTP server, ENVID, RET, NOTIFY, and ORCPT parameters MUST be preserved exactly as received, including case of ORCPT values. Parameters absent on receipt MUST NOT be added (except ORCPT, which MAY be added if not originally present, set to the received RCPT address).
section: 6.2.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
