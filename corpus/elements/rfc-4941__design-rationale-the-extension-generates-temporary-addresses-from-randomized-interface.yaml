document: rfc-4941
kind: design-rationale
summary: The extension generates temporary addresses from randomized interface identifiers that change over time, rather than modifying the stable public address, so that nodes can maintain a stable public address for server use while using temporary addresses for outgoing client connections — analogous to having a listed phone number but suppressing caller ID.
section: "2.4"
topics:
