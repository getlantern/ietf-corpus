document: rfc-4780
kind: interoperability-note
summary: 'For a combined Proxy+Registrar+Redirect server managed as a single aggregate entity, a recommended naming order for applName is: Proxy listed first, Redirect second if present, Registrar always last (e.g., ''sip_proxy_redirect_registrar2''). This facilitates consistent agent behavior and management application expectations.'
section: "5.2"
topics:
    - sip
    - snmp
