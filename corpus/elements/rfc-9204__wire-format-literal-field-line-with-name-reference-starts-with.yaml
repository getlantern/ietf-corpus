summary: 'Literal Field Line with Name Reference: starts with ''01'' 2-bit pattern, N bit (never-index), T bit (static/dynamic), 4-bit prefix name index, then 8-bit prefix string value. The N bit signals intermediaries that this field MUST always be transmitted as a literal and never indexed.'
