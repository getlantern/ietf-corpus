document: rfc-9604
kind: normative-requirement
summary: If a PCE recognizes the TE-PATH-BINDING TLV but does not support it, it MUST send a PCErr with Error-Type=2 ('Capability not supported'). If the PCE does not recognize it at all, it ignores the TLV per RFC 5440.
section: "5"
rfc2119_level: MUST
topics:
    - routing
