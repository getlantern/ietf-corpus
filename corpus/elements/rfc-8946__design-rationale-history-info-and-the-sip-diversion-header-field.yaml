document: rfc-8946
kind: design-rationale
summary: History-Info and the SIP Diversion header field were found insufficient because neither provides cryptographic assurance of secure redirection and both record entries for minor syntactic URI changes that do not reflect actual target changes. This motivated the new "div" PASSporT extension with cryptographic signing.
section: "1"
topics:
