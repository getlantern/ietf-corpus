document: rfc-4306
kind: wire-format
summary: The Encrypted Payload (payload type E) wraps all subsequent exchange payloads after IKE_SA_INIT with confidentiality and integrity protection using SK_e and SK_a. All messages following the initial exchange MUST include an Encrypted Payload, even if they are described as 'empty' (the encrypted portion may contain no payloads).
section: "3.14"
topics:
    - ipsec
    - crypto
