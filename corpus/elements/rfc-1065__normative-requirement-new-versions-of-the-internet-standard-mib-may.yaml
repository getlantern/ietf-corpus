document: rfc-1065
kind: normative-requirement
summary: New versions of the Internet-standard MIB may not change the semantics of any previously defined object without also changing the object's name. Object names (the tail following { mgmt version-number }) must remain stable across versions.
section: "5"
rfc2119_level: MUST NOT
