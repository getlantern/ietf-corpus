document: rfc-7252
kind: protocol-element
summary: CoAP Response Codes follow a c.dd notation where the 3-bit class encodes success (2), client error (4), or server error (5). Unrecognized 4.xx and 5.xx codes are treated as 4.00 and 5.00 respectively; unrecognized 2.xx codes indicate success without further detail. The full set of codes is maintained in the CoAP Response Code Registry.
section: "5.2"
topics:
