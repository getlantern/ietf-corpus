document: rfc-7731
kind: normative-requirement
summary: When an MPL Forwarder determines it has not received an MPL Data Message buffered by a neighbor (from an MPL Control Message), it MUST reset its MPL Control Message Trickle timer; and for each such buffered entry, MUST reset the corresponding Data Message Trickle timer and reset e to 0.
section: "10.3"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
