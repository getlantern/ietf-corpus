document: rfc-7049
kind: wire-format
summary: Every CBOR data item begins with an initial byte encoding the major type in the high-order 3 bits and additional information in the low-order 5 bits. Additional information 0–23 is a direct small unsigned integer; 24–27 indicate 1-, 2-, 4-, or 8-byte unsigned integers follow; 31 signals indefinite length; 28–30 are reserved.
