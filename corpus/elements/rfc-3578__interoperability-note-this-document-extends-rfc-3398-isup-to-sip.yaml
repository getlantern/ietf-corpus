document: rfc-3578
kind: interoperability-note
summary: This document extends RFC 3398 (ISUP-to-SIP mapping), which only covers en-bloc signalling. Implementations must apply the procedures in RFC 3398 for building INVITEs and computing REL cause values; the present document adds overlap-specific rules layered on top of those procedures.
section: "1"
topics:
    - sip
    - voip
    - realtime
