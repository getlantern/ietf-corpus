document: rfc-3530
kind: wire-format
summary: The nfstime4 structure encodes time as int64_t seconds since January 1, 1970 UTC plus uint32_t nanoseconds. nseconds values greater than 999,999,999 are invalid. For negative seconds (pre-epoch), the nseconds field is added to the seconds field for the final representation.
section: "2.2"
