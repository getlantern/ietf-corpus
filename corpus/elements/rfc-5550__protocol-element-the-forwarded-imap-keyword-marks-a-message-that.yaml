document: rfc-5550
kind: protocol-element
summary: The $Forwarded IMAP keyword marks a message that was forwarded to another address. The $SubmitPending keyword marks a message awaiting submission. The $Submitted keyword marks a message that has begun the submission process; both submission keywords together indicate active in-flight submission.
