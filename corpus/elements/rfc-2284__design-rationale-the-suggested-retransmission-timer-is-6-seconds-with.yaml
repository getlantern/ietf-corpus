document: rfc-2284
kind: design-rationale
summary: The suggested retransmission timer is 6 seconds with a maximum of 10 retransmissions as default, with longer timeouts recommended when Token Cards are involved. This guidance exists because the authentication process will often involve user input, requiring care in retransmission strategies.
