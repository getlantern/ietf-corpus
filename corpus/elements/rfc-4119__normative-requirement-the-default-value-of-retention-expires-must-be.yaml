document: rfc-4119
kind: normative-requirement
summary: The default value of 'retention-expires' MUST be assumed to be twenty-four hours from the PIDF 'timestamp' element (or from time of receipt if 'timestamp' is absent). If the value has already passed when the Location Recipient receives the object, the Recipient MUST discard it immediately.
section: 2.2.2
rfc2119_level: MUST
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
