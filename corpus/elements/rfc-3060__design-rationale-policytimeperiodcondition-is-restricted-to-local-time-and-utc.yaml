document: rfc-3060
kind: design-rationale
summary: PolicyTimePeriodCondition is restricted to local time and UTC time, deliberately placing the mapping from human time representations (e.g., US Eastern Time) into the Policy Management Tool rather than into PDPs and PEPs, so the expensive conversion is done once rather than repeatedly in every enforcement point.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
