document: rfc-5566
kind: interoperability-note
summary: The IPsec Transport Mode specification from RFC 4023 for MPLS-in-IP tunnels applies equally to IP in IP tunnels with IPsec Transport Mode (tunnel type 5), meaning the same operational rules govern both tunnel type 5 and tunnel type 6.
