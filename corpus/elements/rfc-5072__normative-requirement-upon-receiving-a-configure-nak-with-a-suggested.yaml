document: rfc-5072
kind: normative-requirement
summary: Upon receiving a Configure-Nak with a suggested identifier different from the last Configure-Nak sent, a new Configure-Request MUST be sent using the peer's suggested identifier. If the suggested value equals what was last sent in a Configure-Nak, a new identifier MUST be chosen.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
