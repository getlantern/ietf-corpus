document: rfc-5546
kind: normative-requirement
summary: To cancel the complete range of a recurring VEVENT, the UID MUST be specified and RECURRENCE-ID MUST NOT be specified. To cancel an individual instance, RECURRENCE-ID MUST be specified. The Organizer MUST send a CANCEL message to each Attendee affected, and SEQUENCE MUST be incremented.
section: 3.2.5
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
