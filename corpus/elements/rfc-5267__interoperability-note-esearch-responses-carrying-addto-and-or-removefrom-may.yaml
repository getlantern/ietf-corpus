document: rfc-5267
kind: interoperability-note
summary: ESEARCH responses carrying ADDTO and/or REMOVEFROM MAY be sent at any time — when no command is in progress, during command processing, or while the client uses IDLE — consistent with the general IMAP rule that unsolicited responses may arrive at any time (except EXPUNGE).
section: 4.3.2
topics:
