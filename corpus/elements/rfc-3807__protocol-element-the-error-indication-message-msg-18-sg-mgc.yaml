document: rfc-3807
kind: protocol-element
summary: The Error Indication message (msg 18, SG -> MGC) is used to report error conditions from the V5 stack on the SG to V5 System Management on the MGC. The only valid Error Reason is OVERLOAD (0x1), indicating a C-channel overload state. Tag is 0x84.
section: "4.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
