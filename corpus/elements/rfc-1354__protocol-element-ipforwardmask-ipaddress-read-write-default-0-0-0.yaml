document: rfc-1354
kind: protocol-element
summary: ipForwardMask (IpAddress, read-write, default 0.0.0.0) is the subnet mask logical-ANDed with the destination address before comparison to ipForwardDest. Agents without arbitrary subnet mask support derive the mask from the IP Address Class.
