document: rfc-5837
kind: normative-requirement
summary: 'Within an Interface Information Object, the optional fields MUST appear in a fixed order: ifIndex first, then IP Address Sub-Object, then Interface Name Sub-Object, then MTU. Any data following these optional fields MUST be ignored.'
section: "4.1"
rfc2119_level: MUST
topics:
