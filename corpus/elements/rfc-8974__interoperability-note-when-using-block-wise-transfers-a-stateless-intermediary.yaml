document: rfc-8974
kind: interoperability-note
summary: When using block-wise transfers, a stateless intermediary may cause a server to conflate blocks from different clients. Intermediaries must use mechanisms such as the Request-Tag Option to keep distinct block-wise operations separate.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
