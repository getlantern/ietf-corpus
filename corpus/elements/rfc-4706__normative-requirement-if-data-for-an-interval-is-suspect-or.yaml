document: rfc-4706
kind: normative-requirement
summary: If data for an interval is suspect or known to be invalid, the agent MUST report the interval as invalid, and MUST NOT generate notifications based upon the value of an invalid current 15-minute event bucket.
section: 2.7.4
rfc2119_level: MUST
