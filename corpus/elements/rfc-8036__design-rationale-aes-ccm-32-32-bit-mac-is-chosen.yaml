document: rfc-8036
kind: design-rationale
summary: AES-CCM-32 (32-bit MAC) is chosen as the most common cipher in AMI because it balances security requirements against network throughput constraints; longer MACs improve resiliency but increase packet size and consume bandwidth in constrained metering networks.
