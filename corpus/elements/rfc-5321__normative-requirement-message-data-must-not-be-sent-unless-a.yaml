document: rfc-5321
kind: normative-requirement
summary: Message data MUST NOT be sent unless a 354 reply is received in response to the DATA command. If a 5yz reply is received instead, the client MUST NOT send the message data.
section: "3.3"
rfc2119_level: MUST NOT
