document: rfc-2370
kind: normative-requirement
summary: Opaque LSAs are only flooded to opaque-capable neighbors. Specifically, Opaque LSAs are only placed on the link-state retransmission lists of opaque-capable neighbors (per Section 13.3 of RFC 2328).
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
