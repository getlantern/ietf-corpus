document: rfc-9782
kind: security-consideration
summary: Media types only provide clues to the processing application. The application MUST verify that the received data matches the expected format regardless of the advertised media type, and MUST stop further processing on failure. Failing to do so could expose the user to privilege escalation and cross-protocol attacks.
section: "5"
topics:
    - security
