document: rfc-3722
kind: design-rationale
summary: iSCSI names require both transcribability (case-insensitive for human use) and byte-for-byte comparison efficiency (case-sensitive for embedded implementations). The solution normalizes names to lower-case with restricted punctuation to satisfy both goals simultaneously.
