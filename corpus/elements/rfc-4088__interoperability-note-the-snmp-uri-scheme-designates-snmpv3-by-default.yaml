document: rfc-4088
kind: interoperability-note
summary: The SNMP URI scheme designates SNMPv3 by default, but older SNMP versions (v1, v2c) MAY be used per RFC 3584 when unavoidable. For SNMPv1/v2c, securityName, contextName, and contextEngineID are mapped to/from the community name; SNMP version is intentionally omitted from the URI to allow forward compatibility.
section: "4.4"
topics:
    - snmp
