document: rfc-3959
kind: design-rationale
summary: The application server model, which uses early-session bodies, was adopted because performing all offer/answer exchanges within the original dialog avoids synchronization problems, does not require globally routable URIs, avoids service interaction issues, and makes firewall management easier compared to establishing a separate dialog for early media.
