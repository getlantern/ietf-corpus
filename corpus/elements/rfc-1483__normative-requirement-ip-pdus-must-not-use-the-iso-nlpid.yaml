document: rfc-1483
kind: normative-requirement
summary: IP PDUs MUST NOT use the ISO NLPID encapsulation (NLPID 0xCC) even though an NLPID is defined for IP; IP must instead be encapsulated using the SNAP header (LLC 0xAA-AA-03 followed by OUI 0x00-00-00 and EtherType 0x08-00).
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
