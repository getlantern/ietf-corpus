document: rfc-7811
kind: protocol-element
summary: The order_proxy for a destination D is D itself if D is in the same block as the computing router, or the relevant cut-vertex on the path toward D if D is in a different block. It is used in Select_Alternates to compare the topological position of D relative to the failed next-hop F.
section: 5.7.5
topics:
    - routing
