document: rfc-3242
kind: protocol-element
summary: The No-Header Packet (NHP) is a payload-only packet with no compressed header, used when all header fields are either unchanged or follow the established change pattern. NHP can only be used for CID=0 and is not allowed in R-mode. It updates the RTP Sequence Number context.
section: 4.1.1
