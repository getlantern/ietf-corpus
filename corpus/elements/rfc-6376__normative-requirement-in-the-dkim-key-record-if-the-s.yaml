document: rfc-6376
kind: normative-requirement
summary: In the DKIM key record, if the 's' flag is present in the t= tag, the domain of the AUID (i=) MUST be exactly the same as the SDID (d=) and MUST NOT be a subdomain. Use of the 's' flag is RECOMMENDED unless subdomaining is required.
section: "3.10"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
