document: rfc-4109
kind: interoperability-note
summary: 'RFC 2409 gave two conflicting requirement levels for DH MODP groups with elliptic curves: Section 4 said MAY while Sections 6.3 and 6.4 said SHOULD for groups 3 and 4. This document resolves the conflict by setting all EC DH groups to MAY.'
section: "2"
