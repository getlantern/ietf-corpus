document: rfc-9703
kind: security-consideration
summary: When EPE-SIDs are created for egress TE links where the neighbor AS is an independent entity, the neighboring AS may not allow OAM packets from the external world to reach its control plane, causing MPLS OAM packets to be dropped at the AS boundary.
