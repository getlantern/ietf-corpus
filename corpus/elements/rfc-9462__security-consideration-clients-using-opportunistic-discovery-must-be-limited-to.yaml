document: rfc-9462
kind: security-consideration
summary: Clients using Opportunistic Discovery MUST be limited to cases where the Unencrypted and Designated Resolver share the same IP address (SHOULD be private or local); deviating from this allows attackers to intercept queries via an Encrypted DNS Resolver they control on that IP.
section: "7"
topics:
    - dns
    - security
    - privacy
