document: rfc-8202
kind: normative-requirement
summary: Point-to-point adjacency setup MUST use the three-way handshaking procedure (RFC 5303) to prevent a non-MI-capable neighbor from prematurely bringing up an adjacency upon receiving an IIH with an IID-TLV for a non-zero instance.
section: 3.6.2
rfc2119_level: MUST
topics:
    - routing
