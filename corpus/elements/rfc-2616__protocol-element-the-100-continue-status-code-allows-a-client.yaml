document: rfc-2616
kind: protocol-element
summary: 'The 100 (Continue) status code allows a client with a large request body to first send just the headers (with Expect: 100-continue), wait for server confirmation, then send the body. This avoids sending a large body to a server that will reject the request.'
section: 8.2.3
topics:
