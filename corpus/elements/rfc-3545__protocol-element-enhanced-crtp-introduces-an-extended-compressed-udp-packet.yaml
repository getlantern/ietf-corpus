document: rfc-3545
kind: protocol-element
summary: Enhanced CRTP introduces an extended COMPRESSED_UDP packet with a new F flag indicating an additional flags byte. When F=1, selected individual RTP header fields (M, S, T, P, C) can be included as absolute values rather than carrying the full RTP header.
section: "2.1"
topics:
