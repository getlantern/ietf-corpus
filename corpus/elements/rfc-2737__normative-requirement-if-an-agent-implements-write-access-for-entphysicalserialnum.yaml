document: rfc-2737
kind: normative-requirement
summary: If an agent implements write access for entPhysicalSerialNum, entPhysicalAlias, or entPhysicalAssetID and a value is written, the agent must retain that value for as long as the entity remains instantiated, including across all re-initializations and reboots, even if the entity's entPhysicalIndex changes.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
