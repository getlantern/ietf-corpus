document: rfc-3636
kind: protocol-element
summary: ifMauDefaultType identifies the administratively-configured MAU type. When auto-negotiation is disabled, it determines the operational type; when auto-negotiation is enabled, it is the type the MAU reverts to if auto-negotiation is later disabled.
