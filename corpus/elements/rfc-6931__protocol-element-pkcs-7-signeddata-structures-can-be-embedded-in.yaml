document: rfc-6931
kind: protocol-element
summary: 'PKCS #7 signedData structures can be embedded in KeyInfo as a bag of certificates and/or CRLs using the PKCS7signedData element (''xmldsig-more#PKCS7signedData''). The binary PKCS #7 structure is base64-encoded; any signer information present is ignored.'
