document: rfc-3301
kind: design-rationale
summary: NSAP binary encoding was chosen for Called Number, Calling Number, Sub-Address, and Calling Sub-Address AVPs instead of ASCII because it supports a broader range of address encapsulation methods (E.164, ICD, DCC), matching ATM Forum AESA addressing.
