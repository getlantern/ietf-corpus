document: rfc-6464
kind: protocol-element
summary: The audio level carried in the extension reflects the RMS of all samples in the audio encoded by the packet, with no long-term averaging or smoothing. For payloads with error-correction bits, the level corresponds only to the data produced by normal decoding, not error concealment.
section: "3"
topics:
