document: rfc-4196
kind: security-consideration
summary: No security problem has been found on SEED. SEED is secure against all known attacks including Differential cryptanalysis, Linear cryptanalysis, and related key attacks. The best known attack is only an exhaustive search for the key, as evaluated by CRYPTREC.
