document: rfc-2380
kind: normative-requirement
summary: When using multicast servers that do not support QoS requests, a sender MUST set the service-specific (not global) break bit(s) to inform receivers that RSVP and Integrated Services are supported but the service cannot be delivered over ATM for the specific request.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - multicast
    - qos
