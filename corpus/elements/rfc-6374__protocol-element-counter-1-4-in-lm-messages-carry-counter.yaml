document: rfc-6374
kind: protocol-element
summary: 'Counter 1–4 in LM messages carry: Counter 1=A_TxP (querier transmit count), Counter 2=B_RxP or A_RxP (receive count), Counter 3=copy of prior Counter 1, Counter 4=copy of prior Counter 2. Transmit counters always appear at fixed packet offsets; this property facilitates hardware-assisted counter stamping.'
section: "3.1"
topics:
