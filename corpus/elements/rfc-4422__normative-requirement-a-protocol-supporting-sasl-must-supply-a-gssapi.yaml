document: rfc-4422
kind: normative-requirement
summary: 'A protocol supporting SASL MUST supply: a GSSAPI service name, mechanism negotiation facility detail, authentication exchange message definitions (including mechanism name field, optional initial response, challenge/response, and outcome messages), authorization identity string syntax, abort facility, security layer activation point, security layer ordering if other layers (e.g., TLS) are supported, and multiple-authentication behavior.'
section: "4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
