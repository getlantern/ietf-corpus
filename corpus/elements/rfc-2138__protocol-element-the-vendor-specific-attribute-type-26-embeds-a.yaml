document: rfc-2138
kind: protocol-element
summary: The Vendor-Specific attribute (Type 26) embeds a 4-octet SMI Enterprise Vendor-Id (high octet 0, low 3 octets the IANA Private Enterprise number) followed by vendor-defined sub-TLV fields. Minimum length is 7. It is RECOMMENDED to encode sub-attributes as vendor-type / vendor-length / value triples.
section: "5.26"
topics:
