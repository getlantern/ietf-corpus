document: rfc-3729
kind: protocol-element
summary: 'apmReportControlTable parameterizes recurring aggregated reports: it records data source, aggregation type, interval (default 3600 seconds), and negotiated size and count (RequestedSize/GrantedSize, RequestedReports/GrantedReports). It also exposes DeniedInserts and DroppedFrames counters for capacity planning.'
