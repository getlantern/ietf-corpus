document: rfc-4306
kind: wire-format
summary: 'The Generic Payload Header is prepended to each IKE payload and contains: Next Payload type (1 octet), Critical flag and RESERVED bits (1 octet, Critical in the high-order bit), and Payload Length (2 octets) including the header. The Critical flag controls handling of unrecognized payload types.'
section: "3.2"
topics:
    - ipsec
