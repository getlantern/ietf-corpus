document: rfc-7410
kind: design-rationale
summary: RFC 7001 originally defined a small fixed set of 'ptype' values for the Authentication-Results header field. Demand emerged to report additional types of message properties through this mechanism, motivating the creation of an extensible registry rather than continuing to enumerate values in a static specification.
section: "1"
topics:
    - email
    - registry
