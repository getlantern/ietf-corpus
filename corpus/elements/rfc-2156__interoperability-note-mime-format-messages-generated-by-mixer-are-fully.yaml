document: rfc-2156
kind: interoperability-note
summary: MIME format messages generated by MIXER are fully RFC 822 compliant and will not cause problems with non-MIME capable systems. The companion specification RFC 2157 defines body part mappings between X.400 and MIME; both documents together constitute the complete MIXER mapping.
section: "1.8"
