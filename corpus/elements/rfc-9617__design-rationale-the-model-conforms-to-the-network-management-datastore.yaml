document: rfc-9617
kind: design-rationale
summary: The model conforms to the Network Management Datastore Architecture (NMDA, RFC 8342), allowing operators to distinguish between intended and operational state. The 'info' container is config false (operational data), while 'profiles' and 'admin-config' are config true.
