document: rfc-9114
kind: normative-requirement
summary: The Transfer-Encoding header field MUST NOT be used in HTTP/3. Connection-specific header fields MUST NOT be generated; any message containing them MUST be treated as malformed. Field names MUST be converted to lowercase prior to encoding; uppercase field names MUST be treated as malformed.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
