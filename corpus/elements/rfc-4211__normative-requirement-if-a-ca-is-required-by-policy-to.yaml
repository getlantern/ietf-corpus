document: rfc-4211
kind: normative-requirement
summary: If a CA is required by policy to verify POP, the RA MUST forward the end entity's CertRequest and ProofOfPossession fields unaltered to the CA. If the CA is not required to verify POP, the RA SHOULD forward them unaltered.
section: "4"
rfc2119_level: MUST
topics:
    - pkix
    - security
