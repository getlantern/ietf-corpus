document: rfc-9867
kind: normative-requirement
summary: If the initiator did not include USE_PPK_INT in its IKE_SA_INIT request and the responder's policy mandates protecting the initial IKE SA with a PPK, the responder MUST return the NO_PROPOSAL_CHOSEN notification.
section: "3.1"
rfc2119_level: MUST
