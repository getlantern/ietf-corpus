document: rfc-4210
kind: normative-requirement
summary: An OOBCert used to distribute a root CA public key out-of-band MUST be self-signed (signature verifiable from SubjectPublicKeyInfo), and the subject and issuer fields MUST be identical. If subject is NULL, both subjectAltNames and issuerAltNames extensions MUST be present with equal values.
section: 5.2.5
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
