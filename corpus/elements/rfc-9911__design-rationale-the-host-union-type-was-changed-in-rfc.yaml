document: rfc-9911
kind: design-rationale
summary: The host union type was changed in RFC 9911 to use host-name instead of domain-name. This is because host names follow stricter syntax rules (RFC 952) than generic DNS domain names, and schema nodes representing host names should use the more restrictive type.
section: "4"
