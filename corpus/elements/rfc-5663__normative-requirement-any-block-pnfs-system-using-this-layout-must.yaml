document: rfc-5663
kind: normative-requirement
summary: Any block pNFS system using this layout MUST support content-based unique volume identification via the pnfs_block_sig_component4 data structure. This is necessary because the same volume may be accessible via multiple network technologies (e.g., iSCSI and Fibre Channel), making network addresses unsuitable for volume identification.
section: 2.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
