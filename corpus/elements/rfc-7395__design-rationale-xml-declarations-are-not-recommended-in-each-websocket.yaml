document: rfc-7395
kind: design-rationale
summary: XML declarations are NOT RECOMMENDED in each WebSocket frame because WebSocket messages are already mandated to be UTF-8 encoded, so declarations would only increase framing overhead without providing additional information.
section: 3.3.3
topics:
