document: rfc-8779
kind: protocol-element
summary: A Label subobject (Type 10) is added to the IRO to support explicit label control. The Label subobject MUST follow a subobject identifying a link (IP address Type 1/2 or interface ID Type 4). If the PCE cannot allocate labels from the set, it sends NO-PATH with 'No label resource in range' bit set.
section: "2.6"
topics:
    - routing
    - mpls
