document: rfc-6842
kind: security-consideration
summary: DHCP clients have no a priori knowledge of which network they are connecting to, so the client identifier will routinely be shared with network operators and could be used in ways that violate user privacy. This pre-existing privacy issue from RFC 2131 is not addressed by this document.
section: "4"
topics:
    - security
    - privacy
    - ip
