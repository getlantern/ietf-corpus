document: rfc-9575
kind: interoperability-note
summary: 'Because DRIP-unaware Observers may not process Authentication Messages, DRIP Wrapper messages must be sent in addition to (not in place of) the original ASTM Messages they encapsulate. Wrapped messages are effectively sent twice: once in the clear per F3411 requirements and once authenticated within the Wrapper.'
section: 4.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
