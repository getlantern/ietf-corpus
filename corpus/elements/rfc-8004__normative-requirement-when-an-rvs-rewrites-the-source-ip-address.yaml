document: rfc-8004
kind: normative-requirement
summary: When an RVS rewrites the source IP address of an I1 due to egress filtering, it MUST add a FROM parameter containing the Initiator's source IP address, protected by an RVS_HMAC keyed with the integrity key from rendezvous registration.
section: 4.3.1
rfc2119_level: MUST
topics:
    - ip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
