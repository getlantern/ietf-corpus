document: rfc-5190
kind: interoperability-note
summary: Multiple MIDCOM clients may create policy rules that share the same underlying NAT binding or firewall rule. MIDCOM-MIB implementations must manage shared resource properties (e.g., lifetime, precedence) such that all clients are served, and must communicate resource changes to all affected clients.
section: 5.3.1
topics:
    - snmp
    - nat
