document: rfc-3292
kind: wire-format
summary: ATM Labels (Type=0x100) encode a 12-bit VPI and 16-bit VCI in a 32-bit value. For virtual path connections the VCI field is not used and SHOULD be set to zero by the sender and ignored by the receiver.
section: 3.1.3.1
