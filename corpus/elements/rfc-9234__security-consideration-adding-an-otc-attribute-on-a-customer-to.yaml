document: rfc-9234
kind: security-consideration
summary: Adding an OTC Attribute on a Customer-to-Provider advertisement will cause the route to be considered ineligible by the Provider and its upstream peers, limiting propagation unpredictably. This could be exploited as a denial-of-reachability attack.
section: "8"
topics:
    - bgp
    - security
    - routing
