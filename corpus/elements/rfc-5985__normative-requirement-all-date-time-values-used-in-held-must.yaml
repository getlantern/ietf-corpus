document: rfc-5985
kind: normative-requirement
summary: All date-time values used in HELD MUST be expressed in UTC using the Gregorian calendar, and the time zone offset option MUST NOT be used. The extended date-time form using upper case 'T' and 'Z' characters MUST be used.
section: 6.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
