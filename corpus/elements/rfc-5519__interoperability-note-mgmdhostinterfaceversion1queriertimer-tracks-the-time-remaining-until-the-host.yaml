document: rfc-5519
kind: interoperability-note
summary: mgmdHostInterfaceVersion1QuerierTimer tracks the time remaining until the host assumes no IGMPv1 routers are present; while non-zero, an IGMPv2/v3 host replies to all queries with version 1 membership reports. This object is only present when mgmdHostInterfaceQuerierType is ipv4.
