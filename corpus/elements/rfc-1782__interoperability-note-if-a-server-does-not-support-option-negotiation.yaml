document: rfc-1782
kind: interoperability-note
summary: If a server does not support option negotiation, it will ignore appended options and return a DATA packet for RRQ or an ACK packet for WRQ, establishing normal TFTP data transfer without options. Clients should handle this as a valid server response.
section: Negotiation Protocol
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
