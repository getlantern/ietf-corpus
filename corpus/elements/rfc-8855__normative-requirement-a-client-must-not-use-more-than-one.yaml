document: rfc-8855
kind: normative-requirement
summary: A client MUST NOT use more than one TCP connection to communicate with a given floor control server within a conference. If unparseable data is received, the entity MUST close the TCP connection. Reconnection attempts MUST NOT exceed once per 30-second period to avoid server overload.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - realtime
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
