document: rfc-9574
kind: protocol-element
summary: The Leaf Auto-Discovery (Leaf A-D) route from RFC 9572 is used in selective AR mode. An AR-LEAF advertises it in response to a Replicator-AR route with L=1, including the PMSI Tunnel Attribute with Tunnel Type set to Assisted Replication Tunnel, T=AR-LEAF, and a downstream-assigned MPLS label or VNI. The Route Target is an IP-address-specific extended community derived from the AR-IP in the received Replicator-AR route.
section: "4"
topics:
    - mpls
    - routing
