document: rfc-6726
kind: interoperability-note
summary: 'When using multiple channels/layers, ordering guarantees between objects are lost: delivery of a second object may complete before the first. Applications with a mandatory requirement that objects complete in order SHOULD use a single channel.'
section: "4"
topics:
    - multicast
