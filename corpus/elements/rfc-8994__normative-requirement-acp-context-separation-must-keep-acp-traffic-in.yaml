document: rfc-8994
kind: normative-requirement
summary: ACP context separation MUST keep ACP traffic in its dedicated VRF, isolated from the data plane. This ensures the ACP operates independently of any data plane misconfiguration, routing changes, or security policies applied to the data plane.
section: "6.10"
rfc2119_level: MUST
topics:
    - security
    - ip
