document: rfc-6329
kind: protocol-element
summary: The SPBM-SI sub-TLV (type 3, in MT-Capability TLV of LSP) advertises a B-MAC unicast address, associated 12-bit Base VID, and a list of 24-bit I-SIDs each with Transmit (T) and Receive (R) bits indicating service group membership role. Multiple repetitions are allowed for additional B-MACs or overflow I-SIDs.
section: "16.1"
topics:
    - routing
