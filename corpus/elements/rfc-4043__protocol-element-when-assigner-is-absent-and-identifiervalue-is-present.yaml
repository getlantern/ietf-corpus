document: rfc-4043
kind: protocol-element
summary: When assigner is absent and identifierValue is present, the Assigner Authority is the issuing CA and the identifier is only local to that CA. Two such identifiers match if and only if the issuer DNs match using distinguishedNameMatch and the identifierValue fields consist of the same Unicode code points in the same order.
section: "2"
topics:
