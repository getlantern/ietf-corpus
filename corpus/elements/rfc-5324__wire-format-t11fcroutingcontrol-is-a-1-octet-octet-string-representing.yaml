document: rfc-5324
kind: wire-format
summary: T11FcRoutingControl is a 1-octet OCTET STRING representing the R_CTL field of an FC-2 frame, containing routing and information bits categorizing frame function. For CT_Authentication, the information field contains '02'h for Request CT_IUs and '03'h for Response CT_IUs. Used in combination with T11FcSpType to identify link-layer services.
section: "6.1"
topics:
