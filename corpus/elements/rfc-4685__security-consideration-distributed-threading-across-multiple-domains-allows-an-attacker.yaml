document: rfc-4685
kind: security-consideration
summary: Distributed threading across multiple domains allows an attacker to attach inappropriate or unwanted content to a discussion by marking an entry as a response to an entry on another domain. Mitigations include user-configurable allowed sources and heuristic legitimacy checks.
section: "7"
topics:
