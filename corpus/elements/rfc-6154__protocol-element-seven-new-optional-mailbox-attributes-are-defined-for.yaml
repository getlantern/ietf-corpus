document: rfc-6154
kind: protocol-element
summary: 'Seven new optional mailbox attributes are defined for use in IMAP LIST responses: \All (all messages), \Archive (archived messages), \Drafts (draft messages), \Flagged (flagged/important messages), \Junk (spam/junk mail), \Sent (sent message copies), and \Trash (deleted messages). A given mailbox may have none, one, or more than one of these attributes.'
