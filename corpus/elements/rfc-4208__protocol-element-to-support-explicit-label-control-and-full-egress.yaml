document: rfc-4208
kind: protocol-element
summary: 'To support explicit label control and full egress link identification, an ingress edge-node may include explicit control information as the only hop of the ERO: the first subobject is set to the node-ID of the egress core-node with the L-bit set, followed by subobjects identifying the link and labels.'
section: "3.3"
topics:
    - mpls
