document: rfc-5371
kind: protocol-element
summary: The priority field (8 bits) indicates importance of the JPEG 2000 packet in the payload; higher priority is typically set for packets containing lower sub-bands. For basic implementations, senders SHOULD set this to 255 and receivers SHOULD ignore it.
section: "4.2"
