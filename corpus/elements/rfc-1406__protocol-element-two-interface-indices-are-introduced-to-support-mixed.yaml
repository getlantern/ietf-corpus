document: rfc-1406
kind: protocol-element
summary: 'Two interface indices are introduced to support mixed SNMP agent deployments. dsx1IfIndex always equals MIB-II ifIndex. dsx1LineIndex identifies DS1 interfaces including internal ones: if no corresponding ifEntry exists, the value exceeds ifNumber with even numbers for equipment-side interfaces and odd numbers for network-side interfaces.'
section: "3.1"
topics:
    - snmp
