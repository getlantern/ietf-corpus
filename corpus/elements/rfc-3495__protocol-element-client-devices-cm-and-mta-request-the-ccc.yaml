document: rfc-3495
kind: protocol-element
summary: Client devices (CM and MTA) request the CCC option via DHCP option 55 (Parameter Request List) and identify their device type via option 60 (Vendor Class Identifier). Client devices never populate the CCC option in their own DHCP requests.
