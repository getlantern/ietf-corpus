document: rfc-9909
kind: protocol-element
summary: 'SLH-DSA offers two signing modes: Pure SLH-DSA (slh_sign/slh_verify, Algorithms 22 and 24 of FIPS 205) signs the entire content directly, while HashSLH-DSA (hash_slh_sign/hash_slh_verify, Algorithms 23 and 25) pre-hashes the content before signing. This document specifies use of both modes in PKIX certificates and CRLs.'
section: "4"
topics:
