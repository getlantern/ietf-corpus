document: rfc-4251
kind: normative-requirement
summary: All algorithm and method identifiers MUST be printable US-ASCII, non-empty strings no longer than 64 characters. Names MUST be case-sensitive. IANA-registered names (no '@') MUST NOT contain '@', ',', whitespace, control characters (ASCII ≤32), or DEL (127).
section: "6"
rfc2119_level: MUST
topics:
    - registry
    - security
