document: rfc-9779
kind: wire-format
summary: The query message label stack for an SR-MPLS Policy ends with GAL (value 13) at the bottom (S=1), followed by the ACH with 4-bit 0001, Version, Reserved, and Channel Type fields per RFC 5586. For loopback mode, forward path labels are followed by reverse path labels before the GAL.
section: 4.1.2
topics:
    - mpls
    - routing
