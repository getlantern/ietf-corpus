document: rfc-4604
kind: normative-requirement
summary: A host or router GMP module SHOULD have a configuration option to set the SSM address range(s). If this option exists, it MUST default to the IANA-allocated SSM range (232/8 for IPv4, FF3x::/96 for IPv6). The mechanism MUST at least allow for manual configuration.
section: "2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
