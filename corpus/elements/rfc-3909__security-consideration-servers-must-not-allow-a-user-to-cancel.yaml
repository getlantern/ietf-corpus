document: rfc-3909
kind: security-consideration
summary: Servers MUST NOT allow a user to cancel an operation belonging to another user. This is particularly relevant when the Proxy Authorization Control is in use, where different outstanding operations may be processed under different LDAP associations.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ldap
    - security
