document: rfc-4570
kind: wire-format
summary: 'The ABNF grammar defines source-filter as: ''source-filter'' '':'' SP filter-mode SP filter-spec, where filter-spec = nettype SP address-types SP dest-address SP src-list, and src-list is one or more space-separated unicast addresses or FQDNs. The basic-multicast-address form omits the /<ttl> and /<number of addresses> fields present in the SDP connection-address.'
