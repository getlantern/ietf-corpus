document: rfc-1738
kind: protocol-element
summary: The FTP URL scheme (`ftp://`) designates files and directories on FTP servers (RFC 959). Default port is 21. The url-path encodes a sequence of CWD commands and a final file name, with an optional `;type=<typecode>` suffix ('a' for ASCII, 'i' for image/binary, 'd' for directory listing).
section: "3.2"
