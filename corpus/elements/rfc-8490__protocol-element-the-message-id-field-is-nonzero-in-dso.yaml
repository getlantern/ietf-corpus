document: rfc-8490
kind: protocol-element
summary: The MESSAGE ID field is nonzero in DSO request messages (which require a response) and MUST be zero in DSO unidirectional messages (which must not elicit any response). Whether a message is a request or unidirectional is determined solely by the specification of the Primary TLV, not by the MESSAGE ID value. MESSAGE ID namespaces are independent per direction, so client and server may simultaneously use the same 16-bit value.
section: 5.4.1
topics:
    - dns
