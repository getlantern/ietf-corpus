kind: protocol-element
summary: 'IPv6-over-IPv4 tunneling encapsulates IPv6 datagrams within IPv4 packets to carry them over IPv4 routing infrastructure. Four tunnel topologies are supported: router-to-router, host-to-router, host-to-host, and router-to-host.'
