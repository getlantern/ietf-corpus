document: rfc-9607
kind: normative-requirement
summary: The mapping of the payload format media subtype and its parameters SHALL be implemented according to Section 3 of RFC 4855. The SCIP device SHALL list the SCIP payload type number in order of preference in the 'm' media line per the SDP Offer/Answer model.
