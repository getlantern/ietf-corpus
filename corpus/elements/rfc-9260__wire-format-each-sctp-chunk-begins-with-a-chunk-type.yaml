document: rfc-9260
kind: wire-format
summary: Each SCTP chunk begins with a Chunk Type (8-bit), Chunk Flags (8-bit), and Chunk Length (16-bit, inclusive of header but not padding), followed by variable-length Chunk Value. The total chunk length MUST be a multiple of 4 bytes; zero-byte padding is added by the sender and not counted in Chunk Length.
section: "3.2"
topics:
    - sctp
