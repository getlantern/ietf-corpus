document: rfc-5296
kind: design-rationale
summary: 'ERP provides algorithm agility but not true negotiation: the peer picks a cryptosuite and the server accepts or rejects it with alternatives. A full negotiation cannot be achieved in a single round-trip protocol, so the design trades negotiation completeness for latency.'
