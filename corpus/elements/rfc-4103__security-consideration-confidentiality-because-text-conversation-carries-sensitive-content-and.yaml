document: rfc-4103
kind: security-consideration
summary: 'Confidentiality: because text conversation carries sensitive content and the data volume is low, any encryption method MAY be applied to T.140 session contents or whole RTP packets. SRTP (RFC 3711) is identified as a suitable method for ensuring confidentiality.'
