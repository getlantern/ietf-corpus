document: rfc-7756
kind: interoperability-note
summary: Private IPv4 addresses (RFC 1918) may be used as IPv4 Service Addresses for nodes or services that do not need public IPv4 Internet reachability, conserving the IDC operator's pool of public IPv4 addresses. Alternatively, the IPv4 Service Continuity Prefix (RFC 7335) may be used for addresses with only local significance behind an ER.
section: "5.2"
topics:
