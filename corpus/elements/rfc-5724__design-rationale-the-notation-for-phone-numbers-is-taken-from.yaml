document: rfc-5724
kind: design-rationale
summary: The notation for phone numbers is taken from RFC 3966 (the 'tel' URI) including Erratum 203, because that format was specifically designed for representing telephone numbers in URIs. The 'sms' scheme reuses this work rather than defining its own phone number syntax.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
