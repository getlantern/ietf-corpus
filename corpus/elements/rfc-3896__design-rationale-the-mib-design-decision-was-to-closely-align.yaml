document: rfc-3896
kind: design-rationale
summary: The MIB design decision was to closely align objects with those readable from currently deployed DS3/E3 devices, rather than attempting to model all possible management functions (multiplexors, CSUs, DSUs). This pragmatic approach facilitates common management across heterogeneous devices.
