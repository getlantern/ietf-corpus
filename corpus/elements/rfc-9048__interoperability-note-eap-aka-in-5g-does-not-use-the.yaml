document: rfc-9048
kind: interoperability-note
summary: EAP-AKA' in 5G does not use the leading '6' character prefix for IMSI-based permanent usernames that is required in 4G; identifier handling follows 3GPP TS 33.501 Annex F. A server implementing only EAP-AKA (not EAP-AKA') may not recognize the '6', '7', or '8' leading characters used by EAP-AKA' peers.
section: "3"
topics:
