document: rfc-5096
kind: interoperability-note
summary: Home agent or correspondent node implementations that do not recognize the Experimental Mobility Header message type discard the message and send a Binding Error with Status field set to 2 (unrecognized MH Type value). Mobile nodes that do not recognize it should discard and send an ICMP Parameter Problem with code 0.
section: "1"
topics:
