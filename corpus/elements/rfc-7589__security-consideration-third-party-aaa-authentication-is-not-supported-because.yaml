document: rfc-7589
kind: security-consideration
summary: Third-party AAA authentication is not supported because TLS does not define that authentication model and NETCONF depends on the transport for authentication. SSH transport (RFC 6242) should be used if third-party authentication is needed.
section: "9"
topics:
