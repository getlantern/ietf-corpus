document: rfc-8485
kind: security-consideration
summary: The vector of trust value MUST be cryptographically protected in transit (e.g., via TLS per BCP 195) and MUST be associated with a trustmark, such as by being carried together in a signed OpenID Connect ID token or equivalent signed assertion.
