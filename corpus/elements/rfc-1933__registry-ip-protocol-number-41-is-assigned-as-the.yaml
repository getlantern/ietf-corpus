document: rfc-1933
kind: registry
summary: IP protocol number 41 is assigned as the payload type for IPv6-in-IPv4 encapsulation. An IPv4 datagram with Protocol=41 addressed to a node's own IPv4 address is decapsulated by removing the IPv4 header and passing the inner IPv6 datagram to the IPv6 layer.
section: 4.1.4
topics:
    - ip
    - v6ops
    - registry
