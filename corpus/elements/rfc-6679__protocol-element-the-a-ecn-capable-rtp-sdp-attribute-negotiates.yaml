document: rfc-6679
kind: protocol-element
summary: The 'a=ecn-capable-rtp:' SDP attribute negotiates ECN use for RTP sessions. It includes an ordered list of preferred initiation methods (rtp, ice, leap) and optional parameters including 'mode=' (setread/setonly/readonly) and 'ect=' (0/1/random) indicating endpoint ECN capabilities.
section: "6.1"
topics:
    - rtp
    - ecn
    - congestion
