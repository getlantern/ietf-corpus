document: rfc-5001
kind: wire-format
summary: The NSID EDNS option carries OPTION-CODE 3 and an OPTION-DATA field that is an opaque byte string of variable length. In queries the OPTION-DATA is empty (zero length); in responses it contains the server-chosen identifier.
