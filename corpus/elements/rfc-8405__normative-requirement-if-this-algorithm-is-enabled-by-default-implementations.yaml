document: rfc-8405
kind: normative-requirement
summary: 'If this algorithm is enabled by default, implementations SHOULD use the specified default values: INITIAL_SPF_DELAY=50 ms, SHORT_SPF_DELAY=200 ms, LONG_SPF_DELAY=5000 ms, TIME_TO_LEARN_INTERVAL=500 ms, HOLDDOWN_INTERVAL=10000 ms, to ensure consistent SPF delays across implementations.'
