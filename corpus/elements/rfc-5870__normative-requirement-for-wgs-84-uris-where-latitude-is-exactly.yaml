document: rfc-5870
kind: normative-requirement
summary: For WGS-84 URIs where <latitude> is exactly 90 or -90 degrees (the poles), <longitude> SHOULD be set to '0' by authors, but consumers MUST accept any longitude value from -180 to 180 at the poles.
section: 3.4.2
rfc2119_level: SHOULD
