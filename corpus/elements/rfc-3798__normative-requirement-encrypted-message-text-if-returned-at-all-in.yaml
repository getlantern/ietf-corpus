document: rfc-3798
kind: normative-requirement
summary: Encrypted message text, if returned at all in part 3 of the MDN multipart/report, MUST be returned only in its original encrypted form. An unencrypted return would reveal confidential content.
section: "3"
rfc2119_level: MUST
