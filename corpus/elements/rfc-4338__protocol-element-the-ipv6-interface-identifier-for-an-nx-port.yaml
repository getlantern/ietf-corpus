document: rfc-4338
kind: protocol-element
summary: The IPv6 Interface Identifier for an Nx_Port is derived from an EUI-64 address obtained from the N_Port_Name, with the Universal/Local (U/L) bit of the OUI field complemented. Different derivation procedures apply for N_Port_Name formats 0x1, 0x2, 0x5, and EUI-64 mapped formats (0xC–0xF).
section: "5.1"
topics:
