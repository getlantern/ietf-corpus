document: rfc-1894
kind: interoperability-note
summary: When gatewaying foreign delivery notifications into DSN format, the gateway MUST supply the DSN-Gateway field, MUST attempt to provide Reporting-MTA, Final-Recipient, Action, and Status fields, and SHOULD retain the original foreign diagnostic code in the Diagnostic-Code field with an appropriate diagnostic-type value.
section: "6.1"
topics:
    - email
