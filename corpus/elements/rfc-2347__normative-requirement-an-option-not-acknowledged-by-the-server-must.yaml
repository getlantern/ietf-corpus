document: rfc-2347
kind: normative-requirement
summary: An option not acknowledged by the server must be ignored by the client and server as if it were never requested. If multiple options were requested, the client must use those options which were acknowledged and must not use those which were not acknowledged.
section: Negotiation Protocol
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
