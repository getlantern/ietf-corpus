document: rfc-8912
kind: protocol-element
summary: 'DNS output fields include: T (query send time), dT (round-trip delay in seconds as decimal64 with 9 fraction digits), RCODE (DNS response code as uint64; non-zero values must be analyzed separately), and Logical (uint8 where 1=Lost and 0=Received; for lost queries dT and RCODE are set to their respective maximums).'
section: 6.4.2
topics:
