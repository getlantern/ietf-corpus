document: rfc-3242
kind: normative-requirement
summary: For NHP operation, the assisting layer MUST guarantee in-order delivery over the link and MUST provide a loss indication to the decompressor for each packet lost over the link, replacing the sequence number and CRC functions of normal ROHC headers.
section: "3.2"
rfc2119_level: MUST
topics:
