summary: srhSegmentIPv6EndpointBehavior (ElementID 502) is a 16-bit unsigned identifier IPFIX IE representing the SRv6 Endpoint behavior per RFC 8986 Section 4. Values are drawn from the IANA 'SRv6 Endpoint Behaviors' registry. It is a generic field for Options Templates.
