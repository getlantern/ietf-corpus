document: rfc-2349
kind: protocol-element
summary: 'The timeout option is negotiated by including the string ''timeout'' (case-insensitive, NULL-terminated) and a #secs value in ASCII in the RRQ or WRQ packet. Valid timeout values range from ''1'' to ''255'' seconds inclusive.'
section: Timeout Interval Option Specification
