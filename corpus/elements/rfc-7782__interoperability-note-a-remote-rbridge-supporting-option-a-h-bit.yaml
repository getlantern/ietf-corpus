document: rfc-7782
kind: interoperability-note
summary: A remote RBridge supporting Option A (H-bit set) is compatible with an AAE group operating under Option B (E-bit set), so the two options can coexist. This document and RFC 7781 (pseudo-nickname approach) can also be simultaneously deployed for different AAE groups in the same campus.
