document: rfc-6445
kind: normative-requirement
summary: To support IPv6 MPLS tunnels, all LSRs in the network MUST have a 32-bit LSR ID usable with the existing 32-bit mplsTunnelIngressLSRId and mplsTunnelEgressLSRId objects, as described in RFC 4990.
