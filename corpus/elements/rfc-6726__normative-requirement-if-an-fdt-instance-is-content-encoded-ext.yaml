document: rfc-6726
kind: normative-requirement
summary: If an FDT Instance is content encoded, EXT_CENC MUST be used to signal the encoding type and MUST appear in all ALC packets carrying the same FDT Instance ID alongside EXT_FDT. If content encoding is not used, EXT_CENC MUST NOT appear.
section: 3.4.3
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
