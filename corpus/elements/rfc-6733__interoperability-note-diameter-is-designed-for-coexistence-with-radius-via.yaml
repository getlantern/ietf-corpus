document: rfc-6733
kind: interoperability-note
summary: Diameter is designed for coexistence with RADIUS via translation agents (TLAs). AVP codes 1–255 are reserved for RADIUS backward compatibility. Translation agents MUST be session-stateful and MUST maintain transaction state; they MUST only advertise their locally supported applications. RADIUS deployments can migrate incrementally by inserting a TLA at the boundary without requiring all NAS devices to be upgraded simultaneously.
section: 2.8.4
topics:
    - diameter
    - radius
