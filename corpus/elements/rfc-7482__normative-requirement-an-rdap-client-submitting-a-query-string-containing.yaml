document: rfc-7482
kind: normative-requirement
summary: An RDAP client submitting a query string containing non-US-ASCII characters converts such strings into Unicode in UTF-8 encoding, normalizes using NFC (Normalization Form C), then percent-encodes per RFC 3986. Storage of strings as Unicode is RECOMMENDED.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
