document: rfc-2730
kind: protocol-element
summary: The MADCAP Server Multicast Address for each scope is the address at relative offset -1 from the last address of that scope, reserved by IANA. Clients SHOULD default to the address for IPv4 Local Scope (or SCOP 3 for IPv6) with maximum TTL of 16 when no configuration is present.
section: "2.10"
topics:
