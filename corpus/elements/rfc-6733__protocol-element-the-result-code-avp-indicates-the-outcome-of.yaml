document: rfc-6733
kind: protocol-element
summary: 'The Result-Code AVP indicates the outcome of a Diameter request in five classes: Informational (1xxx), Success (2xxx), Protocol Errors (3xxx, used with E-bit set in the answer), Transient Failures (4xxx, retry may succeed), and Permanent Failures (5xxx). Key codes include DIAMETER_UNABLE_TO_DELIVER (3002), DIAMETER_AUTHORIZATION_REJECTED (5003), and DIAMETER_UNABLE_TO_COMPLY (5009).'
section: "7.1"
topics:
    - diameter
