document: rfc-9240
kind: registry
summary: This document creates the 'ALTO Entity Property Types' IANA registry. New registrations require specifying the identifier, intended semantics, media type of the defining information resource (if resource-specific), and security considerations. The 'pid' property type is the first registered entry. Types with 'priv:' prefix are reserved for private use.
