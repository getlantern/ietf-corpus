document: rfc-9886
kind: normative-requirement
summary: DET IPv6 addresses, when looked up under ip6.arpa. using nibble-reversed notation, MUST resolve to an HHIT RRType. For UAS RID deployments, the BRID RRType MUST also be present to provide Broadcast Endorsements.
