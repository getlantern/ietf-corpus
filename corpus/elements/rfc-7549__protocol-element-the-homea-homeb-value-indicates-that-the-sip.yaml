document: rfc-7549
kind: protocol-element
summary: The 'homea-homeb' value indicates that the SIP entity responsible for the host part of the associated SIP URI represents the end of a traffic leg between the originating home network and the terminating home network; in 3GPP, this is between two S-CSCFs.
