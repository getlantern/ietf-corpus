document: rfc-1294
kind: protocol-element
summary: Frame Relay fragmentation uses SNAP with OUI=0x00-80-C2, PID=0x00-0D. Each fragment contains a 2-octet sequence number (incremented per original message), a 1-bit final flag, a 4-bit reserved field (must be zero), and an 11-bit offset (logical byte offset divided by 32).
section: "9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
