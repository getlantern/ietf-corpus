summary: 'Three Rule natures are defined: nature-compression (a compression Rule associated with a RuleID), nature-no-compression (the default passthrough Rule when no compression Rule matches), and nature-fragmentation (fragmentation parameters associated with a RuleID). A Rule must have exactly one nature.'
