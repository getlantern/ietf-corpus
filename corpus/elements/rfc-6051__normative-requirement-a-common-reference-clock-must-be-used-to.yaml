document: rfc-6051
kind: normative-requirement
summary: A common reference clock MUST be used to generate NTP-format timestamps in RTCP SR packets for all RTP flows that are to be synchronised. It is further RECOMMENDED that senders and receivers use a synchronised common NTP-format reference clock with common properties, especially timebase, where possible.
section: "2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
