document: rfc-9628
kind: normative-requirement
summary: Upon receipt of a Full Intra Request (FIR), a VP9 sender MUST send a picture with a keyframe for its spatial-layer 0 frame and then send frames without inter-picture prediction (P=0) for any higher-layer frames.
section: "5.2"
rfc2119_level: MUST
topics:
