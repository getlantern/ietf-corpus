document: rfc-1508
kind: protocol-element
summary: GSS_Sign() applies a data origin authentication signature to a message using the referenced context and qop_req, returning a separate per_msg_token. GSS_Verify() validates the per_msg_token against the message, applies replay detection and sequencing if enabled, and returns qop_state indicating the protection quality applied.
section: 2.3.1
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
