document: rfc-8047
kind: normative-requirement
summary: When address verification is in progress for a new preferred locator, the host SHOULD select a different locator listed as ACTIVE to continue communications until verification completes. Alternatively, the host MAY use the new preferred locator while UNVERIFIED to the extent Credit-Based Authorization permits.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
