document: rfc-7712
kind: design-rationale
summary: RFC 7712 generalizes the XMPP domain name association model beyond the single PKIX prooftype to allow alternatives such as DANE and POSH. This is motivated by scenarios where administrators cannot obtain PKIX certificates for all hosted domains — subsidiary services unable to receive CA verification email, hosting providers unwilling to hold tenants' private keys, and the operational overhead of managing large numbers of per-tenant certificates.
section: "1"
topics:
