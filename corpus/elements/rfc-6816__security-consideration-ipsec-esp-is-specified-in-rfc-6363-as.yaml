document: rfc-6816
kind: security-consideration
summary: IPsec/ESP is specified in RFC 6363 as mandatory-to-implement (but not mandatory-to-use) for baseline secure FECFRAME operation; this document does not alter that requirement and it is suited to deployments where the insecure domain is limited to the FECFRAME operational domain.
section: "6.4"
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
