document: rfc-6779
kind: normative-requirement
summary: When the agent determines that two NeighborIfIndex values refer to the same physical neighbor interface, it MUST aggregate the two address sets to a single index and MUST update all MIB tables indexed by NeighborIfIndex. Freed index values MAY be reused after the next agent restart.
section: "7"
rfc2119_level: MUST
topics:
    - snmp
