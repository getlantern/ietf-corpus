document: rfc-3380
kind: wire-format
summary: The 'delete-attribute' out-of-band attribute value is encoded as 0x16 (per RFC 2910). The value-length MUST be 0 and the value empty. It is supplied by the client in Set-Job-Attributes requests to remove an attribute from the Job object.
section: 8.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
