document: rfc-1890
kind: interoperability-note
summary: 'DVI4 as defined in this profile differs from IMA ADPCM in two ways: the header contains the predicted value rather than the first sample value, and DVI4 uses only an even number of compressed samples per block (no header-embedded first sample), unlike IMA ADPCM blocks.'
