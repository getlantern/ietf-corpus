document: rfc-2750
kind: design-rationale
summary: 'The PRT option is designed to support mixing strong (high-overhead) and weak (low-overhead) authentication certificates: weak certificates are included in every refresh while strong certificates are sent infrequently, reducing per-refresh POLICY_DATA processing overhead.'
section: "3.2"
