document: rfc-9126
kind: normative-requirement
summary: The client MUST only use a 'request_uri' value once since authorization request content (e.g., 'code_challenge') is unique per request. An expired 'request_uri' MUST be rejected as invalid.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
    - security
