document: rfc-1001
kind: protocol-element
summary: While processing a long-running name service request, the NBNS may send a WAIT FOR ACKNOWLEDGEMENT RESPONSE (WACK) to assure the requesting end-node that the NBNS is still operational and actively processing the request.
section: 15.1.5.2
