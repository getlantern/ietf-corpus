document: rfc-9115
kind: normative-requirement
summary: The NDC MUST NOT include any fields in the CSR, including extensions, unless they are specified in the template. When the IdO receives the CSR, it MUST verify that the CSR is consistent with the template in the referenced 'delegation' object.
section: "4.1"
rfc2119_level: MUST NOT
