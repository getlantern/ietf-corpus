summary: The Media Timeout circuit breaker (#2) triggers when MEDIA_TIMEOUT = ceil(k * max(Tf, Tr, Tdr) / Tdr) consecutive RTCP packets indicate non-increasing extended highest sequence number received; the recommended value of k is 5 reports.
