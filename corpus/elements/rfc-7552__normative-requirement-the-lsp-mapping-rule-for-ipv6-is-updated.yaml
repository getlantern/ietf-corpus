document: rfc-7552
kind: normative-requirement
summary: 'The LSP mapping rule for IPv6 is updated: if a packet must traverse a particular egress router and there is an LSP with an Address Prefix FEC element that is an IPv4 or IPv6 address of that router, the packet is mapped to that LSP. The original RFC 5036 rule incorrectly required a /32 address, which does not apply to IPv6.'
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
