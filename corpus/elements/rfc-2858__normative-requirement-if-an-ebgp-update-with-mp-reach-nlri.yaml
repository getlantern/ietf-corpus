document: rfc-2858
kind: normative-requirement
summary: If an EBGP UPDATE with MP_REACH_NLRI is received and the leftmost AS in AS_PATH does not match the peer's AS number, the local system SHALL send a NOTIFICATION with Error Code UPDATE Message Error and Subcode Malformed AS_PATH.
section: "2"
rfc2119_level: REQUIRED
