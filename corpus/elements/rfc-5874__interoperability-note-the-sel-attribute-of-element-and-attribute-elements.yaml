document: rfc-5874
kind: interoperability-note
summary: The 'sel' attribute of <element> and <attribute> elements uses XCAP Node Selector conventions (Section 6.4 of RFC 4825) including namespace prefix resolution rules; without a namespace prefix in an element selector, the XCAP Default Document Namespace MUST be applied.
