document: rfc-7147
kind: security-consideration
summary: Notifications for critical login failures (authentication, authorization, negotiation) are defined to expose security-related problems requiring immediate operator action. The iscsiTgtLoginAuthenticateFails and iscsiTgtLoginAuthorizeFails counters SHOULD trigger iscsiTgtLoginFailure notifications when incremented.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - snmp
