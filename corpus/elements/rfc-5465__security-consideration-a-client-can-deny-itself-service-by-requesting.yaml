document: rfc-5465
kind: security-consideration
summary: A client can deny itself service by requesting all events on all mailboxes, potentially swamping its own network connection or processing capability, and in the worst case degrading the server's service to other clients. Servers may refuse expensive notification requests with a tagged NO [NOTIFICATIONOVERFLOW].
section: "9"
topics:
