document: rfc-9776
kind: protocol-element
summary: 'Three query variants exist: (1) General Query—Group Address and Number of Sources both zero, sent to 224.0.0.1; (2) Group Specific Query—Group Address set to the multicast address, Number of Sources zero; (3) Group-and-Source Specific Query—Group Address and one or more Source Addresses set, used to verify interest in specific sources.'
section: 4.1.11
topics:
    - multicast
