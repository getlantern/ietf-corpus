document: rfc-8178
kind: normative-requirement
summary: Extensions to an existing minor version that add new or extended callback requests can only be made if the server can determine, based on the client's prior actions, that the client is aware of the changes before sending those callbacks. Similarly, extensions that change response structures may only be sent after the server determines the client is aware of the XDR changes.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
