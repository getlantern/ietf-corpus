document: rfc-7490
kind: protocol-element
summary: A targeted LDP (TLDP) session must be established between the repairing node and the repair tunnel endpoint so the repairing node can learn the PQ node's label binding for each destination. The LSP from S to the PQ node is already available as a basic property of LDP, requiring no new protocol extensions.
section: "4.2"
topics:
