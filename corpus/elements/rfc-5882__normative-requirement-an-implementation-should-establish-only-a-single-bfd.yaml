document: rfc-5882
kind: normative-requirement
summary: An implementation SHOULD establish only a single BFD session per data protocol path, regardless of the number of applications wishing to utilize it. There is no additional value in having multiple BFD sessions to the same endpoints.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
    - security
