document: rfc-1332
kind: normative-requirement
summary: The slot identifier must not be compressed if there is no ability for the PPP link level to indicate an error in reception to the decompression module, as synchronization after errors depends on receiving a packet with the slot identifier.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - tcp
