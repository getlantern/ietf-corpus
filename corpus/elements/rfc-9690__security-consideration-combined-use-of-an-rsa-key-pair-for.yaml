document: rfc-9690
kind: security-consideration
summary: Combined use of an RSA key pair for both RSA-KEM and digital signatures is NOT RECOMMENDED; ASC X9 requires separation between key pairs used for key establishment and digital signatures, and such separation may be essential to maintain provable security.
