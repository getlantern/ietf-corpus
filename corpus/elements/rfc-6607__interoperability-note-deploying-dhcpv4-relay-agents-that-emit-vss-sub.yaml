document: rfc-6607
kind: interoperability-note
summary: Deploying DHCPv4 relay agents that emit VSS sub-options together with DHCPv4 servers that do not support the VSS sub-option SHOULD NOT be done, as such a combination will not operate correctly. The relay agent can detect this situation when the VSS-Control sub-option reappears in the server's reply.
section: "4.1"
topics:
    - dns
