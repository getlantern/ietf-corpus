document: rfc-5433
kind: protocol-element
summary: 'EAP-GPSK performs mutual authentication via a four-message exchange: GPSK-1 (server sends ID_Server, RAND_Server, CSuite_List), GPSK-2 (peer sends ID_Peer, RAND_Peer, MAC), GPSK-3 (server confirms with MAC), and GPSK-4 (peer finalizes). Two error messages, GPSK-Fail and GPSK-Protected-Fail, handle failure cases.'
