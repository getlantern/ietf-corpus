document: rfc-4873
kind: normative-requirement
summary: While a dynamically controlled recovery LSP exists, the PROTECTION object in the original Path message MUST also be updated with the In-Place bit set (1), unless overridden by local policy. If dynamic recovery LSP creation fails, it is silently removed with no error sent upstream.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
