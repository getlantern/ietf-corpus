document: rfc-2984
kind: normative-requirement
summary: An S/MIME client SHOULD announce the set of cryptographic functions it supports by using the S/MIME capabilities attribute. This attribute MUST be signed by the client, and OIDs MUST be ordered with respect to preference.
section: "3"
rfc2119_level: MUST
