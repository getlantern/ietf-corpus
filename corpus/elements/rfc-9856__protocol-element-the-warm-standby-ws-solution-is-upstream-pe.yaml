document: rfc-9856
kind: protocol-element
summary: 'The Warm Standby (WS) solution is upstream-PE-based: all upstream PEs connected to redundant G-sources for an SFG elect a Single Forwarder (SF) among themselves. Non-SF PEs discard all (*,G)/(S,G) packets from local ACs; the SF forwards from exactly one local AC.'
section: "2.1"
topics:
    - routing
    - multicast
