document: rfc-8122
kind: wire-format
summary: The fingerprint attribute is encoded as 'fingerprint:<hash-func> <fingerprint>' where the fingerprint is a sequence of uppercase hexadecimal bytes separated by colons. The hash-func field identifies the hash function (e.g., sha-256, sha-1) and the fingerprint field encodes the DER-form certificate hash.
section: "5"
