document: rfc-9691
kind: normative-requirement
summary: If a TA uses a single remote publication server for multiple key pairs, it MUST include all publish/withdraw PDUs for the products of each key pair in a single query to reduce the risk of RPs seeing inconsistent data.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - pkix
