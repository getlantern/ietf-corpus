document: rfc-8536
kind: normative-requirement
summary: The utoff field MUST NOT be -2**31 and SHOULD be in the range [-89999, 93599] seconds (more than -25 hours and less than 26 hours), to support both 32-bit negation without overflow and the POSIX-required range.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - measurement
