document: rfc-9301
kind: normative-requirement
summary: The pre-shared secret used to authenticate Map-Register messages MUST be unique per LISP Site-ID. Implementations MUST implement HMAC-SHA-256-128 and SHOULD implement HMAC-SHA-256-128+HKDF-SHA256.
section: "5.6"
rfc2119_level: MUST
