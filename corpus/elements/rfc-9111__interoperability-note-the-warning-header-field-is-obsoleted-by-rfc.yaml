document: rfc-9111
kind: interoperability-note
summary: The Warning header field is obsoleted by RFC 9111 because it is not widely generated or surfaced to users. The information it carried can be derived from examining other fields such as Age, and remaining advisory information was not in practice added by caches or intermediaries.
section: "5.5"
topics:
