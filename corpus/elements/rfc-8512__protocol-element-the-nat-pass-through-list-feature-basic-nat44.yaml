document: rfc-8512
kind: protocol-element
summary: 'The nat-pass-through list (feature: basic-nat44 or napt44 or dst-nat) allows specifying IP prefixes and optional port numbers whose traffic must bypass translation, implementing REQ-6 of RFC 6888. If no prefix is specified, the port-based bypass applies to any destination address.'
section: "2.12"
topics:
