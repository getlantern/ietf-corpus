document: rfc-1572
kind: normative-requirement
summary: The DISPLAY variable uses the format <host>:<dispnum>[.<screennum>] identical to the X-DISPLAY-LOCATION option. If both are received with conflicting values, the most recently received information should be used.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
