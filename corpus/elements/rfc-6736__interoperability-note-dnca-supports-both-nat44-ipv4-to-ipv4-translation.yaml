document: rfc-6736
kind: interoperability-note
summary: DNCA supports both NAT44 (IPv4-to-IPv4 translation per RFC 2663) and NAT64 (stateful IPv6-to-IPv4 address family translation per RFC 6145 and RFC 6146), allowing the same Diameter application to control both translation types within a unified session management framework.
