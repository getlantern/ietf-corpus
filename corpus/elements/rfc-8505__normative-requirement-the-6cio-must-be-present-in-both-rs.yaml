document: rfc-8505
kind: normative-requirement
summary: The 6CIO MUST be present in both RS and RA messages unless already shared in recent exchanges or pre-configured. A 6CIO MUST be placed in an RA sent in response to an RS that carried a 6CIO.
section: "6.1"
rfc2119_level: MUST
topics:
