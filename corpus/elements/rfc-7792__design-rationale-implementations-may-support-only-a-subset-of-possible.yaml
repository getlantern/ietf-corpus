document: rfc-7792
kind: design-rationale
summary: Implementations may support only a subset of possible slot widths and central frequencies; for example, limiting central frequency granularity to 12.5 GHz (only even n values) or slot widths to 25 GHz (only even m values), without violating the protocol.
