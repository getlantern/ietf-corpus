document: rfc-9394
kind: protocol-element
summary: When a PARTIAL range references results that do not exist, the server returns only the results that are in the set. If the whole range references no existing results, the server returns the special value "NIL" in the PARTIAL return data item instead of a sequence set.
section: "3.1"
