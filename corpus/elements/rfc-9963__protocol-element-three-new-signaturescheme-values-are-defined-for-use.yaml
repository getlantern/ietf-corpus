document: rfc-9963
kind: protocol-element
summary: 'Three new SignatureScheme values are defined for use with TLS 1.3 client certificates: rsa_pkcs1_sha256_legacy (0x0420), rsa_pkcs1_sha384_legacy (0x0520), and rsa_pkcs1_sha512_legacy (0x0620). Each indicates RSASSA-PKCS1-v1_5 with the corresponding hash algorithm. They are exclusively for use in the client CertificateVerify message.'
section: "3"
