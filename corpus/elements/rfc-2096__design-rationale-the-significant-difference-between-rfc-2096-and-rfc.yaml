document: rfc-2096
kind: design-rationale
summary: The significant difference between RFC 2096 and RFC 1354 is explicit recognition that CIDR routes may have the same network number but different network masks. RFC 1354 discussed this but by consensus left it to future work; this MIB addresses it.
