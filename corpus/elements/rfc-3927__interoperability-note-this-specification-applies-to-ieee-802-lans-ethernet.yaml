document: rfc-3927
kind: interoperability-note
summary: This specification applies to IEEE 802 LANs (Ethernet, Token-Ring, 802.11 wireless) and other link technologies operating at ≥1 Mbps with ≤1 second round-trip latency that support ARP. Technologies with lower rates or higher latencies may need different values for probing and announcement constants.
