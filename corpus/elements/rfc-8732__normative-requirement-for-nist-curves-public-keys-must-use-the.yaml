document: rfc-8732
kind: normative-requirement
summary: For NIST curves, public keys MUST use the uncompressed point representation and MUST be converted using the algorithm in Section 2.3.4 of SEC1v2. If conversion fails or the compressed representation is used, the key exchange MUST fail.
section: "5.1"
rfc2119_level: MUST
topics:
    - crypto
