document: rfc-2138
kind: normative-requirement
summary: If an attribute is received in an Access-Request with an invalid Length, an Access-Reject SHOULD be transmitted. If an attribute with invalid length appears in an Access-Accept, Access-Reject, or Access-Challenge, the packet MUST be treated as an Access-Reject or silently discarded.
section: "5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
