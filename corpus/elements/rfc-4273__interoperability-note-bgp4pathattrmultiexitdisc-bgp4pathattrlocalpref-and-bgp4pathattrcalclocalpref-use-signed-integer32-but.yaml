document: rfc-4273
kind: interoperability-note
summary: bgp4PathAttrMultiExitDisc, bgp4PathAttrLocalPref, and bgp4PathAttrCalcLocalPref use signed Integer32, but the BGP-4 protocol uses unsigned 32-bit values; values above 2147483647 cannot be represented in this MIB.
