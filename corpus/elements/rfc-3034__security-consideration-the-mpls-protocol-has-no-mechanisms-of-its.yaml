document: rfc-3034
kind: security-consideration
summary: The MPLS protocol has no mechanisms of its own to protect against misdirection of packets or impersonation of an LSR, whether by accident or malicious intent. Altering a label in the DLCI field or any field in the label stack affects forwarding of the frame.
section: "8"
topics:
    - mpls
    - security
