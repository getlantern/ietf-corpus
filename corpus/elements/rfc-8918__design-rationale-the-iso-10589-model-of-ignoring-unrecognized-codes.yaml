document: rfc-8918
kind: design-rationale
summary: The ISO 10589 model of ignoring unrecognized codes is deliberately applied to disallowed TLVs as well, not just unknown ones, because extensibility requires that new TLVs added to PDU types do not break older implementations that have not yet been updated.
