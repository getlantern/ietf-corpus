summary: 'The AH packet format contains: Next Header (8 bits), Length (8 bits), RESERVED (16 bits), SPI (32 bits), optional Replay Prevention (64 bits), and Authentication Data (128 bits). The Length field counts the Replay Prevention field and Authentication Data in 32-bit words.'
