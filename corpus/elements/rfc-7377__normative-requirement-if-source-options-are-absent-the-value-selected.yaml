document: rfc-7377
kind: normative-requirement
summary: If source options are absent, the value 'selected' is assumed, meaning only the currently selected mailbox is searched. Presence of a source option without a result option implies the 'ALL' result option.
section: "2.1"
rfc2119_level: REQUIRED
