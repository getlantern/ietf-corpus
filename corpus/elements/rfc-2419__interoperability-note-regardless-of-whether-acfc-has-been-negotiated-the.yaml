document: rfc-2419
kind: interoperability-note
summary: Regardless of whether ACFC has been negotiated, the sender applies the encryption procedure only to the portion of the packet excluding the Address and Control fields. The Protocol and Information fields (and their extent under Multilink) are what gets encrypted.
