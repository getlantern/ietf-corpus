document: rfc-2447
kind: normative-requirement
summary: Compliant applications MUST support signing and encrypting text/calendar attachments using a mechanism based on Security Multiparts for MIME (RFC-1847) to authenticate the originator. Implementations MAY provide a means for users to disable signing and encrypting.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - email
    - crypto
