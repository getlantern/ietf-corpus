document: rfc-8333
kind: design-rationale
summary: Transient forwarding loops can congest links serving unrelated traffic because routers cannot distinguish looping packets from normally forwarded packets; class-of-service may mitigate but cannot fully prevent collateral congestion.
section: "3.2"
topics:
