document: rfc-8200
kind: normative-requirement
summary: IPv6 receivers must discard UDP packets containing a zero checksum and should log the error. An exception exists for protocols using UDP as a tunnel encapsulation that explicitly enable zero-checksum mode per RFC 6936.
section: "8.1"
rfc2119_level: MUST
topics:
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
