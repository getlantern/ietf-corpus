document: rfc-7048
kind: protocol-element
summary: 'An example (non-normative) algorithm introduces configurable parameters: BACKOFF_MULTIPLE (exponential base), MAX_RETRANS_TIMER (cap on retransmit interval), and MARK_UNREACHABLE (number of transmissions after which the NCE transitions to UNREACHABLE). The retransmit interval is computed as (BACKOFF_MULTIPLE ^ solicit_retrans_num) * RetransTimer * JitterFactor.'
section: "4"
