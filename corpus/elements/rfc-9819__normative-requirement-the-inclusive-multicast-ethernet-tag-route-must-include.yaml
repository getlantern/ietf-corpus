document: rfc-9819
kind: normative-requirement
summary: The Inclusive Multicast Ethernet Tag route MUST include the BGP Prefix-SID attribute with an SRv6 L2 Service TLV. The SRv6 Service SID MUST include only the LOC:FUNC portion with Endpoint Behavior End.DT2M, and an SRv6 SID Structure Sub-Sub-TLV MUST be included with LBL, LNL, and FL fields reflecting the SID structure.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
