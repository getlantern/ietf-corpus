document: rfc-4442
kind: security-consideration
summary: 'Traffic analysis: an on-path adversary can observe TESLA parameters to assist future attacks. Countermeasure: confidentiality via MIKEY public-key or symmetric-key encryption modes. The initial hash key does not require confidentiality due to the one-way property of the hash chain.'
