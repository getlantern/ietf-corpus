document: rfc-9111
kind: wire-format
summary: The delta-seconds rule is encoded as 1*DIGIT (one or more decimal digits), representing non-negative integer seconds. A recipient MUST use at least 31 bits of non-negative integer range; on overflow the value MUST be treated as 2147483648 (2^31), not as a negative number.
section: 1.2.2
topics:
