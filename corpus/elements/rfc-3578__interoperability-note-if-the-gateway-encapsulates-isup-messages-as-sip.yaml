document: rfc-3578
kind: interoperability-note
summary: If the gateway encapsulates ISUP messages as SIP bodies, the new INVITE sent for each SAM should include the original IAM and all SAMs received so far. This ensures that an egress gateway reconstructing the ISUP call has full context from a single SIP message.
section: "3.2"
topics:
    - sip
    - voip
    - realtime
