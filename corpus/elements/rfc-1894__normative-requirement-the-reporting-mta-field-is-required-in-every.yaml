document: rfc-1894
kind: normative-requirement
summary: The Reporting-MTA field is required in every DSN. It identifies the MTA that attempted delivery, relay, or gateway of the described message — not necessarily the MTA that issued the DSN (e.g., a gateway translating a foreign NDN uses the foreign MTA's name, not its own).
section: 2.2.2
rfc2119_level: REQUIRED
topics:
    - email
