document: rfc-8281
kind: design-rationale
summary: The Create (C) flag in the LSP object is introduced so that PCEs other than the one that instantiated an LSP can determine that the LSP is PCE-initiated — a state that would otherwise only be known by the PCC and the originating PCE. This is critical for backup PCE takeover and LSP state synchronization.
section: 5.3.1
topics:
    - routing
    - mpls
