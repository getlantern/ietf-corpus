document: rfc-5041
kind: normative-requirement
summary: The LLP MAY deliver incoming segments out of order for placement, but if it does, it MUST also provide information specifying the sender-specified order. The LLP MUST also provide the length of each DDP Segment received.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
