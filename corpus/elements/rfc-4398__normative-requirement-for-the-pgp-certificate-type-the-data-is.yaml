document: rfc-4398
kind: normative-requirement
summary: For the PGP certificate type, the data is binary and MUST NOT be encoded into ASCII armor. An implementation SHOULD process transferable public keys as described in Section 10.1 of RFC 2440, but MAY handle additional OpenPGP packets.
section: "2.1"
rfc2119_level: MUST NOT
