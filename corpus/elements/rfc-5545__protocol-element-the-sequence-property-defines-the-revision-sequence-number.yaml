document: rfc-5545
kind: protocol-element
summary: The SEQUENCE property defines the revision sequence number of the calendar component within a sequence of revisions. It MUST be incremented each time the organizer makes a significant revision to the calendar component. Attendees returning a REPLY use the SEQUENCE value to identify which version they are responding to.
section: 3.8.7.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
