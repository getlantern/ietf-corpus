document: rfc-5238
kind: normative-requirement
summary: DTLS over DCCP implementations SHOULD take steps to avoid retransmitting a request that has been queued but not yet actually transmitted by DCCP, for example by delaying the retransmission timer until DCCP indicates the message has been passed to the IP layer.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - tls
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
