document: rfc-8883
kind: security-consideration
summary: ICMPv6 errors defined in this document MAY be filtered by firewalls per RFC 4890. Implementations SHOULD allow a configurable policy to withhold sending these ICMP errors, because sending them could be exploited to covertly deduce the processing capabilities (parsing buffer sizes, header limits) of network nodes.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - ip
    - privacy
