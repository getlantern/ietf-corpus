document: rfc-7428
kind: normative-requirement
summary: When a node does not support or when M flag is 0, the node MUST use link-layer-derived addressing. When M flag support is present and M=1, the node MUST use DHCPv6-based addressing and MUST comply fully with RFC 6775.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
