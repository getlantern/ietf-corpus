document: rfc-6503
kind: protocol-element
summary: CCMP is a stateless, XML-based client-server protocol that allows authenticated and authorized clients to create, retrieve, update, and delete conference objects. Requests are carried in HTTP POST bodies and responses in HTTP 200 OK replies. CCMP messages conform to the XCON data model schema defined in RFC 6501.
