document: rfc-2518
kind: normative-requirement
summary: Lock token URIs MUST be unique across all resources for all time. Locks MUST be enforced based upon whatever authentication mechanism is used by the server, not based on the secrecy of the token values.
section: "6.3"
rfc2119_level: MUST
topics:
