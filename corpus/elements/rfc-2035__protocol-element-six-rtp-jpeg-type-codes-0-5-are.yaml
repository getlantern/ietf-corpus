document: rfc-2035
kind: protocol-element
summary: Six RTP/JPEG type codes (0–5) are defined. Even types (0/2/4) use 4:2:2 chroma subsampling; odd types (1/3/5) use 4:2:0. Pairs (0/1) have no restart markers; (2/3) have restart markers with a DRI segment but no packet alignment; (4/5) align restart intervals with RTP packets for partial decode.
section: "4.1"
topics:
