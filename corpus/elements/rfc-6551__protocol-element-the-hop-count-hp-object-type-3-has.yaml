document: rfc-6551
kind: protocol-element
summary: The Hop Count (HP) object (type 3) has a 4-bit reserved Res field, a 4-bit Flags field (no flags currently defined), and an 8-bit Hop Count field. When used as a constraint, the DAG root sets the maximum allowed hops; when used as a metric, each visited node increments the field.
section: "3.3"
topics:
    - routing
