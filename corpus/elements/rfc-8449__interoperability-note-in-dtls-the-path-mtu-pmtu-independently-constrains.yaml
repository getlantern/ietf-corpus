document: rfc-8449
kind: interoperability-note
summary: In DTLS, the Path MTU (PMTU) independently constrains record sizes. The `record_size_limit` extension SHOULD be set independently of PMTU discovery because the limit is fixed at handshake time based on endpoint constraints, whereas PMTU is dynamic.
