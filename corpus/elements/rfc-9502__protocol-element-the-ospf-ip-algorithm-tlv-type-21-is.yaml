document: rfc-9502
kind: protocol-element
summary: The OSPF IP Algorithm TLV (Type 21) is a top-level TLV of the Router Information Opaque LSA that advertises IP Flexible Algorithm participation in OSPF. It contains a variable-length list of 1-octet Algorithm values (128–255) and MUST only be advertised once in the Router Information LSA.
section: "5.2"
topics:
    - routing
    - ip
