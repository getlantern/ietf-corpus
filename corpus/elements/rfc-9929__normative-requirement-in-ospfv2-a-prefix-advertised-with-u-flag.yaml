document: rfc-9929
kind: normative-requirement
summary: In OSPFv2, a prefix advertised with U-Flag or UP-Flag MUST have its metric set to LSInfinity; if the metric is not equal to LSInfinity, both flags MUST be ignored. For default algorithm 0 prefixes, the unreachable prefix MUST also be advertised in the base OSPFv2 LSA (Summary-LSA, AS-external-LSA, or NSSA AS-external-LSA).
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
