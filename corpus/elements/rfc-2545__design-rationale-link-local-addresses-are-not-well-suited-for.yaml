document: rfc-2545
kind: design-rationale
summary: Link-local addresses are not well-suited for use as next hop attributes in BGP-4 under normal BGP rules, yet IPv6 requires a link-local next hop for directly connected routes; therefore the dual global+link-local next hop encoding was introduced to satisfy both constraints.
section: "2"
topics:
