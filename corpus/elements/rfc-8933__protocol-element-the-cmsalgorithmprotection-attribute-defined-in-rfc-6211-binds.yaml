document: rfc-8933
kind: protocol-element
summary: The CMSAlgorithmProtection attribute (defined in RFC 6211) binds the algorithm identifiers used by the originator as a signed or authenticated attribute, making algorithm substitution attacks significantly more difficult. It is recommended for inclusion whenever signed or authenticated attributes are present.
section: "4.1"
topics:
