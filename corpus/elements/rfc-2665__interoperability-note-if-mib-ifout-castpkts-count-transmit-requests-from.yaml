document: rfc-2665
kind: interoperability-note
summary: IF-MIB ifOut*castPkts count transmit requests from higher layers (including failed ones), while IEEE 802.3 aFramesTransmittedOK counts only successfully transmitted frames. MAC Control frames are not counted by ifOut*castPkts but are counted by aFramesTransmittedOK, and ifOutDiscards/ifOutErrors are counted by ifOut*castPkts but not ifOutOctets.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
