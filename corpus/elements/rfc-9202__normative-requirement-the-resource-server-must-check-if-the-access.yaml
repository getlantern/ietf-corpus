document: rfc-9202
kind: normative-requirement
summary: The resource server MUST check if the access token is still valid, if the resource server is the intended audience, and if the token was issued by an authorized authorization server. A resource server MUST have the capacity to store one access token for every proof-of-possession key of every authorized client.
section: 3.2.2
rfc2119_level: MUST
topics:
    - tls
    - security
    - oauth
