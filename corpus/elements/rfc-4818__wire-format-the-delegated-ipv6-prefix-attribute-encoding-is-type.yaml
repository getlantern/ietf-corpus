document: rfc-4818
kind: wire-format
summary: 'The Delegated-IPv6-Prefix attribute encoding is: Type (1 byte, value 123), Length (1 byte, 4–20), Reserved (1 byte, always zero), Prefix-Length (1 byte, 0–128), followed by the Prefix field (variable, only as long as needed to hold the prefix bits). Any bits in the prefix field beyond the prefix length MUST be zero.'
