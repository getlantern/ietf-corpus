document: rfc-4483
kind: normative-requirement
summary: A UAC/UAS indicates support for content indirection by including the message/external-body MIME type in the Accept header. User-Agents supporting content indirection MUST support content indirection of the application/sdp MIME type.
section: "5.1"
rfc2119_level: MUST
topics:
