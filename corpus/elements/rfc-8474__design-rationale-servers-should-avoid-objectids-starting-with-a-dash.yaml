document: rfc-8474
kind: design-rationale
summary: Servers should avoid ObjectIDs starting with a dash or digits, containing only digits, differing only by ASCII case, or equaling the sequence "NIL" in any case, to prevent confusion with IMAP nil values and avoid glob/spreadsheet autodetection. Prefixing every ID with an alphabetical character is recommended.
section: "8.1"
topics:
