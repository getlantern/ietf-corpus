document: rfc-2115
kind: protocol-element
summary: frDlcmiErrorThreshold (Counter N392) is the maximum number of unanswered Status Enquiries accepted before declaring the interface down, range 1..10, default 3. frDlcmiMonitoredEvents (Counter N393) is the number of polling intervals over which the error threshold is counted, range 1..10, default 4.
