document: rfc-8124
kind: normative-requirement
summary: An endpoint wishing to negotiate WebSocket as transport MUST indicate WebSocket or secure WebSocket in the 'proto' field of the 'm=' line. The server side (offerer or answerer) MUST add an 'a=websocket-uri' attribute with a ws-URI or wss-URI value in the media section.
section: "4.1"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
