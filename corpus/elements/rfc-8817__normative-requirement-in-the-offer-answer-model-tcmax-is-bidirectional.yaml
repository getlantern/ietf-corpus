document: rfc-8817
kind: normative-requirement
summary: 'In the Offer/Answer model, ''tcmax'' is bidirectional: both sides SHOULD use a common tcmax value. The answerer MAY agree to any tcmax equal to or less than the offerer''s value, or MAY state its own tcmax and rely on TSVCIS ignoring augmented data it cannot use.'
section: "4.4"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
