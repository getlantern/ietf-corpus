document: rfc-5802
kind: normative-requirement
summary: The client MUST verify that the initial part of the nonce used in subsequent messages is the same as the nonce it initially specified; the server MUST verify that the nonce sent by the client in the second message matches the one sent by the server in its first message.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
