document: rfc-9928
kind: interoperability-note
summary: To maintain interoperability with existing DHCPv6 relays and servers, the 4o6RA message format is unchanged from RFC 9915, and the 4o6RA implements the same message types as a DHCPv6 Relay Agent as described in Section 6 of RFC 7341. No additional requirements on DHCPv6 servers are introduced.
section: "3"
topics:
