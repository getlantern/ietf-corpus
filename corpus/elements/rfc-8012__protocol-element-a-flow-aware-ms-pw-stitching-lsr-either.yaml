document: rfc-8012
kind: protocol-element
summary: A flow-aware MS-PW stitching LSR either (a) carries over the same flow label (behave as label-based LB without EL push, Section 8.3) or (b) replaces the flow label with a newly computed one (behave as label-based LB with EL push, Section 8.4), depending on its local behavior.
section: "8.5"
