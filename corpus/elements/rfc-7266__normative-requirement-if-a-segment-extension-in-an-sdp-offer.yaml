document: rfc-7266
kind: normative-requirement
summary: If a segment extension in an SDP offer is marked 'sendonly' and the answerer desires to receive it, the extension MUST be marked 'recvonly' in the SDP answer. Extension direction MUST be compatible with the stream direction.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
