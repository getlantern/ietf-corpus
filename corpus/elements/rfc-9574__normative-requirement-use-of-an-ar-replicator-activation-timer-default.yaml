document: rfc-9574
kind: normative-requirement
summary: Use of an AR-REPLICATOR-activation-timer (default 3 seconds, SHOULD be configurable) on AR-LEAF nodes is RECOMMENDED. The AR-LEAF runs this timer before programming a newly selected AR-REPLICATOR, using regular ingress replication in the interim, to allow the AR-REPLICATOR time to program the AR-LEAF nodes.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
