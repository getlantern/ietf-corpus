document: rfc-8968
kind: normative-requirement
summary: Nodes MUST discard the DTLS state associated with a neighbour after a finite time of not receiving valid DTLS packets, to prevent an attacker from making a node believe it has reachability to a disconnected neighbour.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - security
