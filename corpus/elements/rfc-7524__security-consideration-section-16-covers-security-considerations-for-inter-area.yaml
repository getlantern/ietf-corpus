document: rfc-7524
kind: security-consideration
summary: Section 16 covers security considerations for inter-area P2MP segmented LSPs. The use of BGP as the inter-area signaling mechanism means that the security of the overall system depends on the security of the BGP sessions used to distribute Leaf A-D routes and I-PMSI/S-PMSI A-D routes. Standard BGP security mechanisms and the security properties defined in RFC 6514 and RFC 7117 apply.
section: "16"
topics:
    - security
    - bgp
    - mpls
