document: rfc-5247
kind: normative-requirement
summary: Where lower layers support key caching, the Secure Association Protocol phase is REQUIRED and MUST support derivation of fresh unicast and multicast TSKs even when the transported keying material from the backend authentication server is not fresh. This is typically accomplished via a nonce or counter exchange that is mixed with the keying material.
section: "3.1"
rfc2119_level: REQUIRED
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
