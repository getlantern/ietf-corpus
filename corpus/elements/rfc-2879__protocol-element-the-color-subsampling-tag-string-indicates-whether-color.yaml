document: rfc-2879
kind: protocol-element
summary: 'The ''color-subsampling'' tag (String) indicates whether color information is subsampled relative to luminance: ''1:1:1'' (no subsampling) or ''4:1:1'' (one color sample per four luminance samples). Used with full-color images in luminance-separating color spaces.'
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
