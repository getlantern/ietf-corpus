kind: protocol-element
summary: 'Digest-HA1 (type 121): carries the hexadecimal H(A1) value (per RFC 2617 Sections 3.1.3, 3.2.1, 3.2.2.2), allowing the RADIUS client to independently compute rspauth when qop=''auth-int'' and the server cannot know the response body. Used only in Access-Accept packets.'
