document: rfc-4412
kind: normative-requirement
summary: A UAS compliant with this specification MUST terminate a session established with a lower-priority value in favor of a new session with a higher relative priority value (preemption), unless local policy has call-waiting enabled. Termination uses BYE with a Reason header field.
section: 4.7.2.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
