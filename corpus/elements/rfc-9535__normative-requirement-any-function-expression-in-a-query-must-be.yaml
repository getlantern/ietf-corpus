document: rfc-9535
kind: normative-requirement
summary: Any function expression in a query must be well-typed according to the declared type rules; an implementation MUST raise an error if a function expression is not well-typed (e.g., using a LogicalType result in a comparison).
section: "2.4"
rfc2119_level: MUST
topics:
    - json
