document: rfc-9572
kind: normative-requirement
summary: If a received Inter-AS A-D route has the L flag set in its PTA, a receiving PE MUST originate a corresponding Leaf A-D route. A receiving ASBR MUST originate a corresponding Leaf A-D route only if it received/imported downstream Leaf A-D routes or has non-null downstream forwarding state.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
