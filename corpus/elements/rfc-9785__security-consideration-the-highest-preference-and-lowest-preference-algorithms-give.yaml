document: rfc-9785
kind: security-consideration
summary: The Highest-Preference and Lowest-Preference Algorithms give configuration-based control over DF election. A malicious user with access to PE configuration can change the preference value to redirect traffic through a chosen PE, an attack vector that does not exist in more automated algorithms like HRW.
section: "5"
topics:
    - security
    - routing
