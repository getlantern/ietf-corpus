document: rfc-2320
kind: protocol-element
summary: ipoaLisTable defines Logical IP Subnets of which the system is a member, indexed by ipoaLisSubnetAddr (IP subnet address). It holds ATMARP control parameters including inactivity timer, min holding time, queue depth, max calls, cache entry age, retries, timeout, default peak cell rate, and active VC count.
section: 3.1.1
