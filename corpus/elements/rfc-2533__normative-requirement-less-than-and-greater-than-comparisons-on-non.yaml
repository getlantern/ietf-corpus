document: rfc-2533
kind: normative-requirement
summary: Less-than and greater-than comparisons on non-numeric feature values amount to equality tests because no ordering relation on non-numeric values is defined by this specification. Specific applications may define such ordering for specific feature tags.
section: 4.2.2
rfc2119_level: OPTIONAL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
