document: rfc-1961
kind: design-rationale
summary: Protection level 3 (selective per-message integrity or confidentiality) is anticipated to be impractical for most implementations due to the difficulty of applying selective controls to messages passed through a SOCKS library; levels 1 or 2 are expected in practice.
