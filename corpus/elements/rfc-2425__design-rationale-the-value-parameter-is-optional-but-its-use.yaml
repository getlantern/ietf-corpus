document: rfc-2425
kind: design-rationale
summary: 'The ''value'' parameter is optional but its use is encouraged even when omitted: by defining a standard set of value types and formats, existing parsing code can be reused and generalized applications (e.g., search engines) can process typed data without knowing the schema of every property.'
section: 5.8.3
topics:
