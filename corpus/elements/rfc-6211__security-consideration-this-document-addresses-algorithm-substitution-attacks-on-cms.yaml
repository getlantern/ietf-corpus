document: rfc-6211
kind: security-consideration
summary: This document addresses algorithm substitution attacks on CMS, where an attacker changes the algorithm identifier or its parameters to alter signature or authentication verification results. While no known exploitation method exists at publication time, a successful attack could substitute a weaker algorithm or modify parameters (e.g., initial values for parameterized hash functions).
section: "5"
topics:
