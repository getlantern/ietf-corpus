document: rfc-3201
kind: normative-requirement
summary: If a device does not support per-circuit statistics, the counter objects (ifInOctets, ifInUcastPkts, ifInDiscards, ifInErrors, ifOutOctets, ifOutUcastPkts, ifOutDiscards, ifOutErrors, ifInBroadcastPkts) MUST NOT be supported and MUST return noSuchInstance.
section: 4.4.1
rfc2119_level: MUST NOT
topics:
    - snmp
