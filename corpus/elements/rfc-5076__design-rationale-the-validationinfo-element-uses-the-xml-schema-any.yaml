document: rfc-5076
kind: design-rationale
summary: The `<validationInfo>` element uses the XML Schema `<any>` wildcard rather than a fixed content model so that the content of validation information can be specified according to local requirements, accommodating varying local legislation and validation procedures without modifying this specification.
