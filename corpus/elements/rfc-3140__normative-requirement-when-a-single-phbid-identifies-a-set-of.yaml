document: rfc-3140
kind: normative-requirement
summary: When a single PHBID identifies a set of PHBs (bit 14 set to 1), that set MUST constitute a PHB Scheduling Class, meaning use of PHBs from the set MUST NOT cause intra-microflow traffic reordering when different PHBs from the set are applied to traffic in the same microflow.
section: "2"
rfc2119_level: MUST NOT
topics:
    - diffserv
    - qos
