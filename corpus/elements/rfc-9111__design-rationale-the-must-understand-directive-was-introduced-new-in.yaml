document: rfc-9111
kind: design-rationale
summary: The must-understand directive was introduced (new in RFC 9111) so that caches are not required to understand all new response status codes. A response with must-understand is only cacheable by a cache that understands and implements the status code's caching requirements, removing an obstacle to deploying new status codes.
section: 5.2.2.3
topics:
    - http
extracted_by: claude-sonnet-4-6
