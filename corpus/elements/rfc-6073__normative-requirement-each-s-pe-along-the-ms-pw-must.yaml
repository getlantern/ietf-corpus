document: rfc-6073
kind: normative-requirement
summary: Each S-PE along the MS-PW MUST store any PW status messages transiting it. If more than one status message with the same PW status bit set is received, only the last PW status message is stored.
section: "10.1"
rfc2119_level: MUST
topics:
    - mpls
