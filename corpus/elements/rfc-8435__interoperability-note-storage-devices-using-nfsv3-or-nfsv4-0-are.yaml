document: rfc-8435
kind: interoperability-note
summary: Storage devices using NFSv3 or NFSv4.0 are always treated as loosely coupled. NFSv4.1+ devices are tightly coupled only if they return EXCHGID4_FLAG_USE_PNFS_DS in EXCHANGE_ID and are advertised via a control protocol; otherwise they are treated as loosely coupled like NFSv4.0 devices.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
