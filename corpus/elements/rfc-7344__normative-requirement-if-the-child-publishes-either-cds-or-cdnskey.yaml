document: rfc-7344
kind: normative-requirement
summary: If the Child publishes either CDS or CDNSKEY, it SHOULD publish both. If the Child publishes both, the two RRsets MUST match in content. A Child MAY choose to publish only one type if it knows which the Parent consumes.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
    - security
