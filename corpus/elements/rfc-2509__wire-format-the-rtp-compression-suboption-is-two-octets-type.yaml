summary: 'The RTP-Compression suboption is two octets: Type (1 octet, value 1) and Length (1 octet, value 2). Its presence in the NCP option enables use of COMPRESSED_RTP, COMPRESSED_UDP, and CONTEXT_STATE protocol identifiers.'
