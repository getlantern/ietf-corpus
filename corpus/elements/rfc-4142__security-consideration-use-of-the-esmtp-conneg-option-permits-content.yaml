document: rfc-4142
kind: security-consideration
summary: Use of the ESMTP CONNEG option permits content transformation by intermediaries along the mail transfer path; encrypted content cannot be transformed by intermediaries lacking keying material, while conversion of signed-but-not-encrypted content will invalidate the signature.
