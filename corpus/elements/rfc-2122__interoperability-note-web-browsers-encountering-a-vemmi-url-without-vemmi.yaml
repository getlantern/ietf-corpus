document: rfc-2122
kind: interoperability-note
summary: Web browsers encountering a VEMMI URL without VEMMI support may either signal an unrecognized scheme error or misinterpret the URL as a relative URL. Mitigation strategies include HTTPD-level detection and offering fallback download links for VEMMI client software.
