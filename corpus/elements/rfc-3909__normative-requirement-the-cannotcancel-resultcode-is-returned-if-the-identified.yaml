document: rfc-3909
kind: normative-requirement
summary: The cannotCancel resultCode is returned if the identified operation does not support cancellation. Non-cancelable operations include those with no response, those that create/alter/destroy authentication or authorization associations, those that establish/alter/tear-down security services, and operations that abandon or cancel other operations.
section: "3"
rfc2119_level: REQUIRED
topics:
