document: rfc-9901
kind: interoperability-note
summary: JWS JSON Serialization support is OPTIONAL. When used, Disclosures are placed in the `disclosures` unprotected header parameter as an array of strings, and the KB-JWT (if present) is in the `kb_jwt` unprotected header. In General JSON Serialization, disclosures and kb_jwt MUST appear only in the first unprotected header.
section: "8"
topics:
