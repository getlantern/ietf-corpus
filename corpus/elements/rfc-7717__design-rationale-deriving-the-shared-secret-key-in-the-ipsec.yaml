document: rfc-7717
kind: design-rationale
summary: Deriving the shared secret key in the IPsec layer (rather than exposing it to the O/TWAMP client) is recommended so that IPsec keying material is not exposed; however, the host-internal interaction between layers is implementation-specific and outside the scope of this document.
