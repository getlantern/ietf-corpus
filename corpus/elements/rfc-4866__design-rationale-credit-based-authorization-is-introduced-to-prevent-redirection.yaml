document: rfc-4866
kind: design-rationale
summary: Credit-Based Authorization is introduced to prevent redirection-based flooding when concurrent care-of address tests allow a correspondent node to forward packets to an UNVERIFIED care-of address. By capping the correspondent node's outbound effort to no more than what it receives from a VERIFIED address, the attack cannot exceed the effectiveness of direct flooding — the threat level of the non-mobile Internet.
section: "3.6"
topics:
    - security
    - mobility
