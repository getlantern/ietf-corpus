document: rfc-9368
kind: normative-requirement
summary: Server operators SHOULD follow a three-step process when adding or removing a QUIC version, waiting at least one MSL between each step, to prevent false downgrade-attack detections caused by stale Version Negotiation packets reaching un-updated server instances.
section: "5"
rfc2119_level: SHOULD
topics:
    - quic
    - security
