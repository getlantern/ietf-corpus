document: rfc-7879
kind: normative-requirement
summary: During forking, B2BUAs MUST forward certificate fingerprints and SDP setup attributes from each answerer unmodified toward the offerer. The B2BUA replaces each answerer's transport address with its own unique transport address, enabling the offerer to establish a separate DTLS connection per answerer.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
