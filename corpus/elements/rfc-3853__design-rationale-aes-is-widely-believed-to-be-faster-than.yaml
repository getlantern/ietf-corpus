document: rfc-3853
kind: design-rationale
summary: AES is widely believed to be faster than 3DES and comparably secure, with lower memory requirements that make it suitable for mobile or embedded SIP devices. This performance and resource profile motivated replacing 3DES as the mandatory ciphersuite.
