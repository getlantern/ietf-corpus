document: rfc-9725
kind: normative-requirement
summary: Both the WHIP client and WHIP endpoint SHALL support RFC 9143 and use the 'max-bundle' policy. They MUST support multiplexed media per RFC 9143 Section 9 and SHALL use RTP/RTCP multiplexing. Both MUST include the 'rtcp-mux-only' attribute in each bundled 'm=' section per RFC 8858.
section: 4.4.1
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
