summary: The UDVM instruction set comprises 36 instructions (bytecodes 0–35) covering arithmetic/logical operations, memory operations, stack (PUSH/POP/CALL/RETURN), byte copying, I/O (INPUT-BITS, INPUT-HUFFMAN, INPUT-BYTES), hashing (SHA-1, CRC), state access/creation/free, OUTPUT, and END-MESSAGE.
