document: rfc-9731
kind: protocol-element
summary: A VN member (grouping 'vn-member') is keyed by 'vnm-id' and describes a single edge-to-edge link in the VN. It contains 'src' and 'dest' containers (each referencing an AP and optionally a VNAP plus a 'multi-src'/'multi-dest' boolean), a 'connectivity-matrix-id' leafref into the TE Topology model, and an empty 'underlay' container for augmentation.
