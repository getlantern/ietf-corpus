document: rfc-8839
kind: protocol-element
summary: The 'ice-pacing' session-level attribute indicates the desired Ta connectivity-check pacing interval in milliseconds. Default is 50 ms. Both agents use the larger of the two indicated values. Lite implementations MUST NOT include this attribute.
