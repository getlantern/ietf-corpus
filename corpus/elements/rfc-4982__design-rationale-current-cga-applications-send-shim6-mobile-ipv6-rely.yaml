document: rfc-4982
kind: design-rationale
summary: Current CGA applications (SEND, shim6, Mobile IPv6) rely on CGAs only to prove address ownership against third-party attackers, not to provide non-repudiation between peers. Because collision attacks require the attacker to generate both colliding messages, they do not enable new attacks against these ownership-proof use cases.
section: "3"
topics:
