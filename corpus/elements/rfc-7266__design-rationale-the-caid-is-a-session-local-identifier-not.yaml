document: rfc-7266
kind: design-rationale
summary: The CAID is a session-local identifier (not a globally registered value) mapped to a named algorithm via SDP, so that multiple MOS algorithms can be in use simultaneously within a session without requiring a globally unique numeric space for algorithms. This allows flexible per-session algorithm negotiation.
section: "4.1"
topics:
