document: rfc-7369
kind: interoperability-note
summary: This document specifies GMPLS RSVP-TE extensions that support, but do not modify, the underlying IEEE 802.1Q-2011 (CFM) and ITU-T Y.1731 OAM mechanisms. The Ethernet OAM entities configured via signaling must conform to those standards' formats and semantics.
