document: rfc-8249
kind: normative-requirement
summary: The link MTU size SHOULD be tested. After successful testing, link-local PDUs (CSNPs, PSNPs, E-L1CS FS-LSPs) are formatted no greater than the tested link MTU size to ensure safe transmission, because an intermediate bridge with a smaller port MTU may otherwise discard PDUs sized at Lz.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
