document: rfc-1413
kind: wire-format
summary: The user-id field is an unformatted octet-string of 1–512 octets. All octet values are permitted except NUL (000), LF (012), and CR (015). Space characters immediately after the OS-type colon separator are part of the identifier string and must not be ignored.
