document: rfc-7033
kind: design-rationale
summary: WebFinger is intentionally limited to static information (e.g., profile links, identity providers) and is not intended for dynamic data such as CPU temperature or toner levels. This scoping keeps the protocol simple and the caching model tractable.
section: "1"
