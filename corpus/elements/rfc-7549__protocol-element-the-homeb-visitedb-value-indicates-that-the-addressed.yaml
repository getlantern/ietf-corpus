document: rfc-7549
kind: protocol-element
summary: The 'homeb-visitedb' value indicates that the addressed SIP entity represents the end of a traffic leg between the terminating home network and the terminating visited network where the called user is located; in 3GPP, this is between the home S-CSCF and the UE or SCC AS to ATCF.
