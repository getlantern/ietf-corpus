document: rfc-1065
kind: interoperability-note
summary: A conforming implementation is only required to accept and recognize Opaque-encoded data; it need not unwrap and interpret the inner ASN.1 content. This makes Opaque useful for passing arbitrary data without requiring all agents to understand it.
section: 3.2.3.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
