document: rfc-7432
kind: wire-format
summary: 'The ESI Label Extended Community (Type 0x06, Sub-Type 0x01) is an 8-octet transitive community: Type (1 octet), Sub-Type (1 octet), Flags (1 octet, low-order bit = Single-Active mode), Reserved (2 octets), ESI Label (3 octets). Enables split-horizon filtering for multihomed sites.'
