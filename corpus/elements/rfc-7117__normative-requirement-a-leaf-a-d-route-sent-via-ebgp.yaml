document: rfc-7117
kind: normative-requirement
summary: A Leaf A-D route sent via EBGP in the segmented inter-AS model MUST carry the NO_ADVERTISE community to constrain its scope to the immediate EBGP neighbor. Leaf A-D routes for S-PMSI contexts MUST carry the NO_EXPORT community except in inter-AS option (c).
section: 7.2.2.2
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
