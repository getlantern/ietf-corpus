document: rfc-8487
kind: normative-requirement
summary: When a client receives multiple Mtrace2 Replies sharing the same Query ID (due to NO_SPACE splitting), it MUST treat them as a single Reply by collating the Augmented Response Blocks in order of receipt.
section: "5.9"
rfc2119_level: MUST
topics:
    - multicast
