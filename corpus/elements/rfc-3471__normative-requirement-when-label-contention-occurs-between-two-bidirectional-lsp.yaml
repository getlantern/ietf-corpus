document: rfc-3471
kind: normative-requirement
summary: When label contention occurs between two bidirectional LSP setup requests, the node with the higher node ID MUST issue a PathErr/NOTIFICATION message with a 'Routing problem/Label allocation failure' indication to win the contention.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
