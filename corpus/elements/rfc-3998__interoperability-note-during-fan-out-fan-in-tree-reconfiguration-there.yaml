document: rfc-3998
kind: interoperability-note
summary: During Fan-Out/Fan-In tree reconfiguration, there can be moments of inconsistency where 'subordinate-printers-supported' and 'parent-printers-supported' are not mutually consistent. The recommended practice is to Deactivate all affected Printers first, update all pointer attributes, then reactivate them.
section: "10.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
