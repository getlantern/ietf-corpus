document: rfc-2645
kind: design-rationale
summary: ODMR addresses the problem of mail delivery to hosts with dynamic IP addresses, which cannot use ESMTP ETRN (designed for static IPs). The solution reverses client/server roles after authentication so the intermittently-connected customer can pull queued mail from the provider.
section: "1"
