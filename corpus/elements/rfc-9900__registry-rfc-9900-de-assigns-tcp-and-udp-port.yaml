document: rfc-9900
kind: registry
summary: RFC 9900 de-assigns TCP and UDP port 832 from 'netconfsoaphttp' (NETCONF for SOAP over HTTPS, RFC 4743) and TCP and UDP port 833 from 'netconfsoapbeep' (NETCONF for SOAP over BEEP, RFC 4743). Service names are retained; notes are added to ports 832 and 833 indicating they were released by RFC 9900.
section: "4.2"
topics:
