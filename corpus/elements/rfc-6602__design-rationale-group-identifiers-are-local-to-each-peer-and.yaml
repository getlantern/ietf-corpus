document: rfc-6602
kind: design-rationale
summary: Group identifiers are local to each peer and not globally unique within a PMIPv6 domain; the same value may be used by other nodes. Both peers independently assign their own group identifiers and exchange them during initial session establishment, enabling each side to initiate bulk operations using its own local identifier.
section: "3.2"
topics:
    - mobility
