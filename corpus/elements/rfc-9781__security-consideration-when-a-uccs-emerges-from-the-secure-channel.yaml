document: rfc-9781
kind: security-consideration
summary: When a UCCS emerges from the Secure Channel into the receiver, the security properties of the channel no longer protect it; the UCCS is subject to the same security properties as any other unprotected data in the Verifier environment. If subsequently forwarded, it is treated as though it originated within the receiver.
section: "4"
topics:
    - security
    - cbor
