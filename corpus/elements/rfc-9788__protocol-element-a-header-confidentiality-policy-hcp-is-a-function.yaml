document: rfc-9788
kind: protocol-element
summary: A Header Confidentiality Policy (HCP) is a function hcp(name, val_in) -> val_out that, for each Non-Structural Header Field, returns either the original value (expose), a modified value (obscure), or null (remove from the Outer Header Section). HCPs are only relevant for encrypted messages.
section: "3.1"
topics:
