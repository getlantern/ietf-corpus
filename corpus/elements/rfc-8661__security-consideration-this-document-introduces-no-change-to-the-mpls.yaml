document: rfc-8661
kind: security-consideration
summary: This document introduces no change to the MPLS data plane (RFC 3031) and therefore requires no additional MPLS data-plane security. Security of SRMS advertisements relies on the authentication mechanisms of underlying routing protocols IS-IS (RFC 5304) and OSPF (RFC 5709), both of which optionally support cryptographic authentication.
section: "7"
topics:
