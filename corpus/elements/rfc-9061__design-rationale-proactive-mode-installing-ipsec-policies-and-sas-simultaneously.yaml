document: rfc-9061
kind: design-rationale
summary: Proactive mode (installing IPsec policies and SAs simultaneously at configuration time) is identified as a way to reduce latency and alleviate performance issues in the IKE-less case, as an alternative to reactive mode (waiting for sadb-acquire notifications before creating SAs).
