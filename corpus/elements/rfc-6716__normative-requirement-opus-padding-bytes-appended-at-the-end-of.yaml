document: rfc-6716
kind: normative-requirement
summary: Opus padding bytes appended at the end of a Code 3 packet MUST be set to zero by the encoder to avoid creating a covert channel. The decoder MUST accept any value for the padding bytes.
section: 3.2.5
rfc2119_level: MUST
topics:
    - realtime
    - voip
    - security
