document: rfc-3355
kind: security-consideration
summary: L2TP over AAL5 tunnel security may be compromised by attacks on the ATM transport network itself. Applications requiring protection are encouraged to use authentication headers, encrypted payloads, and/or ATM-layer security services described in ATM Forum specifications [AFSEC2].
section: "9"
topics:
    - security
    - vpn
