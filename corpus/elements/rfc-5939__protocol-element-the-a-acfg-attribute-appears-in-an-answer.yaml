document: rfc-5939
kind: protocol-element
summary: The 'a=acfg' attribute appears in an answer to identify which potential configuration from the offer was selected, including the config-number and the specific capability references chosen. At most one 'a=acfg' is permitted per media description. Config-numbers and capability numbers in 'a=acfg' refer to the offer, not the answer.
section: 3.5.2
topics:
    - realtime
