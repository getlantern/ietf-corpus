document: rfc-5190
kind: protocol-element
summary: 'Three SNMP notifications are defined: midcomUnsolicitedRuleEvent (ARE transaction — rule expiration, idle timeout, or internal termination), midcomSolicitedRuleEvent (PRR, PER, and RLC transaction replies), and midcomSolicitedGroupEvent (GLC transaction reply). Clients can selectively filter solicited notifications via snmpNotifyFilterTable and use polling instead.'
section: "5.4"
topics:
