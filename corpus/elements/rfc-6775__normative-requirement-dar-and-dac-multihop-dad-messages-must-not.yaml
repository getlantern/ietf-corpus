document: rfc-6775
kind: normative-requirement
summary: DAR and DAC multihop DAD messages MUST NOT modify any Neighbor Cache Entries on intermediate routers, since those messages are forwarded and lack the security guarantee of the RFC 4861 hop-limit=255 check.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - ip
