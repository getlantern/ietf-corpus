document: rfc-7308
kind: design-rationale
summary: The existing 32-bit Administrative Group (AG) sub-TLV is insufficient for large networks. Operators using AGs to flag geographic regions (e.g., metro areas) quickly exhaust 32 bits; color reuse across geographies is impractical because it prevents building LSPs that include one region while excluding another with the same bit value.
section: "1"
topics:
    - mpls
    - routing
