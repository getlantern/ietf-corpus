document: rfc-9339
kind: normative-requirement
summary: When the O (offset) flag is clear, the metric value to be advertised is copied directly from the TLV value. When the O flag is set, the signaled value is added to the provisioned metric; if the sum exceeds maximum interface cost (0xffff), the maximum cost is advertised.
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
