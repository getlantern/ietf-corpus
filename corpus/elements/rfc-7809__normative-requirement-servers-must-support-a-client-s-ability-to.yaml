document: rfc-7809
kind: normative-requirement
summary: Servers MUST support a client's ability to provide a time zone identifier for use in a calendar query REPORT using the new CALDAV:timezone-id XML element. If the identifier is unknown, the server MUST reject the request with a CALDAV:valid-timezone precondition error.
section: 3.1.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
