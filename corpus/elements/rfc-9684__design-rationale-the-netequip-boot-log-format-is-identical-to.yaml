document: rfc-9684
kind: design-rationale
summary: The netequip_boot log format is identical to the IMA format but its scope combines BIOS events and IMA events, covering every measurable event from boot (BIOS, Bootloader, etc.) through OS runtime. This unified format simplifies log retrieval for network equipment that needs a single comprehensive integrity log.
section: 2.1.1.4
topics:
