document: rfc-1808
kind: interoperability-note
summary: The schemes 'mailto', 'news', and 'telnet' are never appropriate for use with relative URLs. Schemes 'gopher', 'prospero', and 'wais' allow reserved characters outside generic-RL syntax but may be used with relative URLs when the base URL follows generic-RL. Schemes 'file', 'ftp', 'http', and 'nntp' can always be parsed using generic-RL syntax.
section: "2.3"
topics:
    - http
