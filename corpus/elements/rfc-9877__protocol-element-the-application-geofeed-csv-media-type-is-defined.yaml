document: rfc-9877
kind: protocol-element
summary: The 'application/geofeed+csv' media type is defined for geofeed files. The geofeed content is always UTF-8; the optional 'charset' parameter used by 'text/csv' is not used for this media type. The '+csv' structured syntax suffix is also registered.
