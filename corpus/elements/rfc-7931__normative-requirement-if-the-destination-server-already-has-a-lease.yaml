document: rfc-7931
kind: normative-requirement
summary: If the destination server already has a lease whose nfs_client_id4 (id string and boot verifier) exactly matches a migrated lease, the server SHOULD merge the two leases into one, making the union of their stateids available under the existing clientid4. The merged lease expiration time reflects the latest renewal of either ancestor lease.
section: 6.1.1.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
