document: rfc-1964
kind: protocol-element
summary: The Kerberos Principal Name Form (OID ...krb5_name(1), symbolic GSS_KRB5_NT_PRINCIPAL_NAME) is a mandatory name type representing a single-string Kerberos name. Components are separated by '/', a realm follows '@', and special characters including '@', '/', and '\' must be quoted with a preceding backslash.
section: 2.1.1
topics:
    - security
