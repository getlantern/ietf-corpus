document: rfc-9568
kind: normative-requirement
summary: If Proxy ARP is used on a VRRP Router, the router MUST advertise the Virtual Router MAC address in the Proxy ARP message. Using the real MAC address could cause hosts to learn the physical MAC address of the VRRP Router, breaking failover.
section: 8.1.3
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
