document: rfc-8445
kind: normative-requirement
summary: Host candidates MUST NOT include loopback, deprecated IPv4-compatible IPv6, or IPv6 site-local unicast addresses. When privacy-protecting IPv6 addresses are gathered, corresponding tracking-enabling addresses on the same interface and prefix MUST NOT be gathered.
section: 5.1.1.1
rfc2119_level: MUST NOT
topics:
    - nat
    - privacy
    - webrtc
