summary: 'The status-att-val production is redefined per RFC 3501 errata to enumerate five attribute/value pairs: MESSAGES (number), RECENT (number), UIDNEXT (nz-number), UIDVALIDITY (nz-number), UNSEEN (number). Extensions should extend this production using tagged-ext syntax.'
