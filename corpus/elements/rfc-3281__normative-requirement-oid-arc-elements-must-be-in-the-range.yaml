document: rfc-3281
kind: normative-requirement
summary: OID arc elements MUST be in the range 0–4,294,967,295 and SHOULD be less than 2^31. Implementations MUST support OID dotted-decimal string representations up to 100 bytes and OIDs with up to 20 elements. AAs SHOULD NOT issue ACs containing OIDs that breach these constraints.
section: Appendix A
rfc2119_level: MUST
topics:
    - pkix
    - registry
