document: rfc-8434
kind: design-rationale
summary: 'Three control protocol models exist: (1) loose coupling where the storage protocol doubles as the control protocol (block and object layouts); (2) tight coupling with a purpose-built proprietary protocol co-developed with the metadata server (file layout); and (3) a new Standards Track control protocol with documented interoperability. Each model carries different interoperability assumptions about independent development of metadata servers, storage devices, and clients.'
section: "3"
