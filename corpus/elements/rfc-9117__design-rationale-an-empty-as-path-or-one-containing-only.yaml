document: rfc-9117
kind: design-rationale
summary: An empty AS_PATH or one containing only an AS_CONFED_SEQUENCE segment is used as the indicator that a Flow Specification was originated inside the Local Domain. This allows any iBGP peer within the Local Domain, including a route controller not in the forwarding path, to originate Flow Specifications that pass the revised validation.
section: "4.1"
topics:
    - bgp
