document: rfc-1188
kind: normative-requirement
summary: The MTU of FDDI networks shall be 4352 octets, providing 4096 octets of data and 256 octets of network-layer headers. Implementations must not send packets larger than the MTU.
section: MAC Layer Details
rfc2119_level: MUST
topics:
    - ip
