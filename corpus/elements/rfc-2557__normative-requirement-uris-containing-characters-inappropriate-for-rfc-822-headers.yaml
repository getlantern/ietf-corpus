document: rfc-2557
kind: normative-requirement
summary: URIs containing characters inappropriate for RFC 822 headers MUST have spaces and other illegal characters encoded using MIME Part 3 (RFC 2047) methods. This encoding MUST only be applied in the header, never in the HTML text itself.
section: 4.4.1
rfc2119_level: MUST
topics:
