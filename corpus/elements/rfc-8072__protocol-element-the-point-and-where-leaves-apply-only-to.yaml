kind: protocol-element
summary: The 'point' and 'where' leaves apply only to 'insert' and 'move' operations. 'where' is an enumeration of 'before', 'after', 'first', or 'last' with a default of 'last'. 'point' provides the target-resource-offset for 'before' and 'after' cases.
