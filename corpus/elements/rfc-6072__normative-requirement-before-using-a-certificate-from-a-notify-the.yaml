document: rfc-6072
kind: normative-requirement
summary: 'Before using a certificate from a NOTIFY, the UA MUST verify: (1) From header matches subscribed AOR, (2) Identity header is valid per RFC 4474, (3) certificate validity times are current, and (4) the certificate is indexed only by the AOR asserted by the authentication service.'
section: "10.3"
rfc2119_level: MUST
topics:
    - sip
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
