document: rfc-4866
kind: design-rationale
summary: Semi-permanent security associations (based on a shared permanent home keygen token) are introduced because CGA-based authentication is computationally expensive and requires large CGA parameter payloads per message. An initial CGA exchange establishes the token, which then authenticates subsequent registrations more efficiently.
section: "3.3"
topics:
    - crypto
    - mobility
