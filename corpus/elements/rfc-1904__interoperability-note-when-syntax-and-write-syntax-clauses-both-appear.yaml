document: rfc-1904
kind: interoperability-note
summary: When SYNTAX and WRITE-SYNTAX clauses both appear in the same OBJECT or VARIATION clause, the SYNTAX clause applies only during read operations; WRITE-SYNTAX governs write operations exclusively. Implementors must apply the correct refinement based on operation type.
section: 5.4.3.1
topics:
    - snmp
