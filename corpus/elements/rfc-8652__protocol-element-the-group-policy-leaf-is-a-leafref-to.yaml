document: rfc-8652
kind: protocol-element
summary: The group-policy leaf is a leafref to /acl:acls/acl/name (RFC 8519) used to filter IGMP/MLD membership. The source-policy leaf (feature intf-source-policy) is a similar leafref to filter multicast sources. If either is not specified, no filtering is applied and all packets are accepted.
section: "4"
topics:
