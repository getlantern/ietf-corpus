document: rfc-8794
kind: protocol-element
summary: Identically Recurring Elements MAY appear multiple times within the same Parent Element; each recurrence MUST be identical in storage and semantics. They SHOULD include a CRC-32 Child Element for data resilience. If multiple copies exist with a valid CRC-32, the first valid copy is used.
section: 11.1.17
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
