document: rfc-7902
kind: protocol-element
summary: The 'Additional PMSI Tunnel Attribute Flags' Extended Community is a new Transitive Opaque Extended Community (per RFC 4360 and RFC 7153). Its six-octet value field is treated as a string of 48 one-bit flags, numbered 0 (MSB of most significant octet) through 47 (LSB of least significant octet).
