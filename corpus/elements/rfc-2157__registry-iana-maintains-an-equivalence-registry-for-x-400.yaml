document: rfc-2157
kind: registry
summary: IANA maintains an Equivalence Registry for X.400/MIME body part mappings. Anyone may register or update an entry; the IESG may lock registrations defined in standards-track documents (including RFC 2157) so that changes require IESG approval. Registration uses the form in Appendix D.
