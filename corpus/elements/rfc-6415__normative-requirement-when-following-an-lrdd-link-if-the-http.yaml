document: rfc-6415
kind: normative-requirement
summary: When following an 'lrdd' link, if the HTTP response status code is 301, 302, or 307, the client MUST follow the redirection and repeat the request. Processing is limited to a single level of LRDD inclusion (no recursive lrdd links).
section: "4.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
