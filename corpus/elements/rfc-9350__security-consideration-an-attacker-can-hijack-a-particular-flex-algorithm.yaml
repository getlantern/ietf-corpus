document: rfc-9350
kind: security-consideration
summary: An attacker can hijack a particular Flex-Algorithm by advertising a FAD with Priority 255 (or any value greater than the legitimate nodes), causing all routers in the area to compute paths according to the attacker's definition. This is mitigated by the existing IS-IS (RFC 5304, RFC 5310) and OSPF (RFC 7474, RFC 4552) authentication mechanisms.
section: "17"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
