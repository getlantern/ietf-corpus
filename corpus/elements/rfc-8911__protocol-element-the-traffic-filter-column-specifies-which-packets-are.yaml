document: rfc-8911
kind: protocol-element
summary: The Traffic Filter column specifies which packets are observed for Passive Metrics, using Type (e.g., BPF, PSAMP, OpenFlow) and Value (actual filter rules). The filter balances the operator's measurement needs against the user's need for privacy.
