document: rfc-8688
kind: normative-requirement
summary: For legacy interoperation, the network element conveying the announcement MUST use the 183 Session Progress response to establish the media session. The UAC MUST include support for 100rel (RFC 3262) in its INVITE, the network element MUST Require 100rel in the 183, and the UAC MUST issue a PRACK to which the network element MUST respond 200 OK PRACK.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
