document: rfc-1073
kind: interoperability-note
summary: A server receiving NAWS subnegotiations may perform an ioctl to apply the new window dimensions and signal its child process (e.g., via SIGWINCH on 4.3 BSD Unix). Because not all OS environments support this, server behavior on receipt of NAWS data is implementation-specific.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
