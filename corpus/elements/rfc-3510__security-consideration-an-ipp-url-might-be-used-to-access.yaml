document: rfc-3510
kind: security-consideration
summary: An IPP URL might be used to access an IPP print service at a print protocol application layer gateway (e.g., an IPP to LPD gateway per RFC 2569), causing silent compromise of IPP security mechanisms. There is no practical client-side defense; system administrators should avoid such configurations.
section: "8"
topics:
    - security
