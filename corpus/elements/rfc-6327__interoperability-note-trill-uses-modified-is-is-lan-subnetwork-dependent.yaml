document: rfc-6327
kind: interoperability-note
summary: TRILL uses modified IS-IS LAN subnetwork-dependent functions (Level 1, single Area zero, Ethertype-encoded frames) rather than the standard IS-IS broadcast subnetwork functions (IS-IS Section 8.4), because the TRILL environment requires zero configuration, VLAN awareness, native frame loop safety, and MTU robustness not present in Layer 3 IS-IS.
section: "2"
topics:
