document: rfc-2601
kind: normative-requirement
summary: An ATMARP server shall be locally configured. The ATMARP server may retrieve the ATMARP service registry data to validate the results; if an incorrect row is retrieved, the error may be flagged in a locally significant way.
section: "5"
rfc2119_level: REQUIRED
