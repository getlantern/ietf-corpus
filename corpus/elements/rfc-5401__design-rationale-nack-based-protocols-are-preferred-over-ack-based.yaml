document: rfc-5401
kind: design-rationale
summary: NACK-based protocols are preferred over ACK-based protocols for reliable multicast because they generate less frequent feedback messaging, simplifying the feedback implosion problem. Probabilistic timer-based suppression enables scalability to group sizes on the order of tens of thousands of receivers.
section: "1"
topics:
