document: rfc-3312
kind: wire-format
summary: A 580 response, BYE, or CANCEL indicating precondition failure SHOULD contain an SDP description (not an offer/answer) based on the last SDP received, with all 'm=' port numbers set to zero and the failing desired-status line using the 'failure' strength-tag (e.g., 'a=des:qos failure e2e send').
