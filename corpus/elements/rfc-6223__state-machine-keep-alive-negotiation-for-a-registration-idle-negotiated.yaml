document: rfc-6223
kind: state-machine
summary: 'Keep-alive negotiation for a registration: idle → negotiated (on REGISTER with "keep" response bearing a value) → active (sending keep-alives) → terminated (on registration expiry or refresh without re-negotiation). For a dialog: idle → negotiated (on initial INVITE or mid-dialog request with "keep" value in response) → active for dialog lifetime → terminated on BYE.'
section: "4.2"
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
