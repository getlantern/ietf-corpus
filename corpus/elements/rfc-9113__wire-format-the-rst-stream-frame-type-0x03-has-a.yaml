document: rfc-9113
kind: wire-format
summary: The RST_STREAM frame (type=0x03) has a fixed 4-octet payload containing a single unsigned 32-bit Error Code. It immediately terminates the referenced stream, causing it to enter 'closed' state. RST_STREAM MUST NOT be sent on a stream in the 'idle' state.
section: "6.4"
topics:
    - http
