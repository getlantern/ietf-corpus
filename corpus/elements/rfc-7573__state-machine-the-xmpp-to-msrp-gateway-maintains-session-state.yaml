document: rfc-7573
kind: state-machine
summary: 'The XMPP-to-MSRP gateway maintains session state across five phases: (1) receive XMPP chat message, (2) send SIP INVITE on behalf of XMPP user, (3) receive 200 OK and send ACK, (4) relay messages bidirectionally via MSRP SEND, (5) terminate on SIP BYE or XMPP ''gone'' chat state.'
section: "4"
topics:
