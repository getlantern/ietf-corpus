document: rfc-7509
kind: design-rationale
summary: The Repaired loss count metric is included alongside Post-repair loss count so that a sender or third party can derive the pre-repair loss count for a sequence number range (pre-repair = post-repair loss count + repaired loss count), enabling evaluation of repair mechanism effectiveness without reference to cumulative RTCP RR data.
