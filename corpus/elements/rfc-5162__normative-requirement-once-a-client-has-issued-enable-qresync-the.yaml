document: rfc-5162
kind: normative-requirement
summary: Once a client has issued 'ENABLE QRESYNC', the server SHOULD use the VANISHED response without the EARLIER tag instead of the EXPUNGE response, and SHOULD continue using VANISHED in lieu of EXPUNGE for the duration of the connection.
section: "3.6"
rfc2119_level: SHOULD
topics:
