document: rfc-4590
kind: protocol-element
summary: 'Digest-Stale (type 120): indicates nonce staleness; value is ''true'' or ''false'' (without quotes). Sent in Access-Challenge to signal that the nonce was expired but credentials were otherwise valid, prompting the HTTP-style client to retry without re-prompting the user.'
