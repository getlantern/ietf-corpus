document: rfc-5116
kind: normative-requirement
summary: If an application is unable to meet the uniqueness requirement on nonce generation, then it MUST use a zero-length nonce. Otherwise, an application SHOULD use nonces with a length of twelve octets.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
