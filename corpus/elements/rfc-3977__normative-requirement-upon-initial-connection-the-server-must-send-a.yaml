document: rfc-3977
kind: normative-requirement
summary: 'Upon initial connection the server MUST send a greeting: 200 if posting is allowed, 201 if posting is prohibited, or 400/502 if service is unavailable. Following a 400 or 502 response the server MUST immediately close the connection.'
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
