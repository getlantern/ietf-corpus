document: rfc-7239
kind: normative-requirement
summary: When proxies choose to use the "by" parameter, its default configuration SHOULD contain an obfuscated identifier. An IP address MAY be used instead if the receiving server requires address-based functionality.
section: "5.1"
rfc2119_level: SHOULD
