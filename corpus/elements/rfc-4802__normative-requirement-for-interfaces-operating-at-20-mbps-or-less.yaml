document: rfc-4802
kind: normative-requirement
summary: For interfaces operating at 20 Mbps or less, 32-bit byte and packet counters MUST be supported. For interfaces faster than 20 Mbps and slower than 650 Mbps, 32-bit packet counters MUST be supported and 64-bit octet counters MUST be supported. For interfaces at 650 Mbps or faster, 64-bit packet counters AND 64-bit octet counters MUST be supported.
section: "5.7"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
