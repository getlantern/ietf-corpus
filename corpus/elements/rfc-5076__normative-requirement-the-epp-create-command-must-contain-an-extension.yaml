document: rfc-5076
kind: normative-requirement
summary: The EPP `<create>` command MUST contain an `<extension>` element, and that `<extension>` element MUST contain an `<e164val:create>` element identifying the extension namespace, with one or more `<e164val:add>` child elements each bearing an `id` attribute.
section: 5.2.1
rfc2119_level: MUST
topics:
    - dns
    - registry
