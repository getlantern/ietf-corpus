document: rfc-9165
kind: interoperability-note
summary: The ABNF syntax within .abnf/.abnfb controllers is relaxed to allow a single line feed as a newline (CRLF = %x0A / %x0D.0A), as is customary for ABNF itself, though CDDL text strings make specifying newlines tedious.
