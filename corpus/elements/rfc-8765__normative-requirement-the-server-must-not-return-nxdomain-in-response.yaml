document: rfc-8765
kind: normative-requirement
summary: The server MUST NOT return NXDOMAIN in response to a SUBSCRIBE request for records that are unknown to the server at the time. The server MUST accept such requests and send Push Notifications if matching records are found in the future.
section: 6.2.1
rfc2119_level: MUST NOT
topics:
    - dns
