document: rfc-6721
kind: normative-requirement
summary: Atom Processors that verify signed Atom Documents MUST be able to verify RSA signatures; DSA support is not required. Atom Documents SHOULD NOT use MACs for signatures due to key-handling risks.
section: "5"
rfc2119_level: MUST
topics:
