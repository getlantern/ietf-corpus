document: rfc-8415
kind: normative-requirement
summary: Clients and servers MUST treat DUIDs as opaque values and MUST only compare DUIDs for equality. They MUST NOT restrict DUIDs to currently defined types, as additional types may be defined in the future.
section: "11"
rfc2119_level: MUST
topics:
    - ip
