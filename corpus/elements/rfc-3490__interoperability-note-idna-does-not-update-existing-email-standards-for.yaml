document: rfc-3490
kind: interoperability-note
summary: IDNA does not update existing email standards for address local parts. A domain label holding an email local part SHOULD NOT begin with the ACE prefix, and even if it does, it is interpreted literally rather than as an ACE label.
section: 3.2.2
topics:
    - dns
    - email
