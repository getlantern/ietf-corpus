document: rfc-4619
kind: normative-requirement
summary: If the PW packet length (payload plus control word) is less than 64 octets, the Length field MUST be set to the packet's length; otherwise the Length field MUST be set to zero. The egress PE uses this field to remove padding.
section: "7.3"
rfc2119_level: MUST
topics:
