document: rfc-6827
kind: wire-format
summary: The Local and Remote TE Router ID sub-TLV (Type 10, Length 8) is a sub-TLV of the OSPFv2 TE LSA Link TLV. Its Value field contains a 4-octet Local TE Router Identifier followed by a 4-octet Remote TE Router Identifier; neither value may be 0.
