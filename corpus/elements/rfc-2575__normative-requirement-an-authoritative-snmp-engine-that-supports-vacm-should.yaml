document: rfc-2575
kind: normative-requirement
summary: An authoritative SNMP engine that supports VACM SHOULD be configured with initial parameters at installation time, including a default context, an 'initial' group entry in vacmSecurityToGroupTable, appropriate entries in vacmAccessTable, and predefined 'internet' and 'restricted' MIB views.
section: A.1
rfc2119_level: SHOULD
