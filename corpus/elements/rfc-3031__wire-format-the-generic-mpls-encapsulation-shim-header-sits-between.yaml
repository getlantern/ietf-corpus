document: rfc-3031
kind: wire-format
summary: The generic MPLS encapsulation (shim header) sits between the data link and network layer headers and encodes the label stack for MPLS-specific hardware/software forwarding. It must include a TTL field and is specified in [MPLS-SHIM]. ATM-based encodings place the top-of-stack label in the VPI/VCI field (SVC), the VPI field (SVP), or split across VPI and partial VCI (SVP Multipoint).
section: "3.25"
