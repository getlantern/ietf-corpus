document: rfc-5269
kind: wire-format
summary: The Handover Key Reply Option (Type=28) is a TLV IPv6 Neighbor Discovery option carried in PrRtAdv. It contains Type, Length, Pad Length, 4-bit AT field, 4-bit Reserved, a 16-bit Key Lifetime in seconds, the Encrypted Handover Key (RSA-encrypted using RSAES-PKCS1-v1_5), and Padding.
section: "4.2"
