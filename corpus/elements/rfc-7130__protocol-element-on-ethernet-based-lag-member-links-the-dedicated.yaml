document: rfc-7130
kind: protocol-element
summary: On Ethernet-based LAG member links, the dedicated multicast destination MAC address 01-00-5E-90-00-01 is used as the immediate next hop for micro-BFD packets. This reduces additional MAC address usage and required resources on receiving hardware.
