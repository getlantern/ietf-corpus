document: rfc-6880
kind: normative-requirement
summary: policyIdentifier MUST be globally unique. Acceptable identifier types include an OID (RFC 4517), a URI (RFC 3986), or a UUID (RFC 4122). Implementations MUST assign globally unique identifiers to standard policies using best practices for the target schema language.
section: 4.4.1.1
rfc2119_level: MUST
topics:
    - security
