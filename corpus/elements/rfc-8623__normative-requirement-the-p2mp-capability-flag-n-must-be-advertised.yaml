document: rfc-8623
kind: normative-requirement
summary: The P2MP-CAPABILITY flag (N) MUST be advertised by both PCC and PCE for P2MP extensions of PCRpt messages to be allowed on a PCEP session. Similarly, P2MP-LSP-UPDATE-CAPABILITY (M) must be advertised by both for PCUpd, and P2MP-LSP-INSTANTIATION-CAPABILITY (P) must be set by both to support PCE-initiated P2MP LSP instantiation.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
