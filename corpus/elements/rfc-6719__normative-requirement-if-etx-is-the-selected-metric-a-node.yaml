document: rfc-6719
kind: normative-requirement
summary: If ETX is the selected metric, a node MUST NOT advertise it in a metric container; instead, it MUST advertise an approximation of its ETX in its advertised Rank value. If a node receives a DIO with a Metric Container holding an ETX metric, MRHOF MUST ignore that ETX value in Rank calculations.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
