document: rfc-7469
kind: privacy-consideration
summary: Pin Validation failure reports contain certificate chain information; in cases of organization-wide TLS interception, these reports may disclose the interception infrastructure to the report-uri operator. Additionally, the pinning state store reveals which domains a UA has visited, even after other browser state is cleared.
section: "5"
topics:
    - privacy
    - security
    - tls
