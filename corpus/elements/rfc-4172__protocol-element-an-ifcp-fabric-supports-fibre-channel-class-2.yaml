document: rfc-4172
kind: protocol-element
summary: An iFCP fabric supports Fibre Channel Class 2 (frame-multiplexed with end-to-end flow control) and Class 3 (frame-multiplexed, no delivery confirmation) transport services. Class 1 (dedicated circuit), Class 4 (virtual circuit with QoS), and Class 6 (reliable multicast) are not supported.
