document: rfc-2806
kind: design-rationale
summary: The scheme name 'tel' was chosen over 'callto' (URLs locate resources, not actions), 'telephone' (too long, less international), and 'phone' (less internationally acceptable). 'tel' is concise and considered more universally understood.
