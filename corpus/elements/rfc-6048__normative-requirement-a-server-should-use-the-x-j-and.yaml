document: rfc-6048
kind: normative-requirement
summary: A server SHOULD use the 'x', 'j', and '=' status values when these meanings are required and MUST NOT use them with any other meaning. Status field values 'x' and 'j' are case-sensitive.
section: "3.1"
rfc2119_level: MUST NOT
