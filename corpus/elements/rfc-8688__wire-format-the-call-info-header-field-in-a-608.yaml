document: rfc-8688
kind: wire-format
summary: 'The Call-Info header field in a 608 response carries a URI pointing to a JWS-encoded jCard. It uses a ''purpose'' parameter value of ''jwscard''. The JWS structure is: base64url(JOSE header) || ''.'' || base64url(JWT payload) || ''.'' || base64url(signature), with no line breaks.'
