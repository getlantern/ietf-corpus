document: rfc-4875
kind: wire-format
summary: The P2MP SESSION IPv4 object (C-Type 13) carries a 4-octet P2MP ID, a 2-octet Tunnel ID, and a 4-octet Extended Tunnel ID (ingress LSR address); the IPv6 variant (C-Type 14) uses a 16-octet Extended Tunnel ID. The P2MP ID replaces the Tunnel Endpoint Address of the RFC 3209 SESSION object.
section: "19.1"
topics:
    - mpls
    - routing
