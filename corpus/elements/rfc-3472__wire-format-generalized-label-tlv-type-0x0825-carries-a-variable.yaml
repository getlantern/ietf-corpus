document: rfc-3472
kind: wire-format
summary: Generalized Label TLV (type 0x0825) carries a variable-length Label field encoding a generalized label. It travels upstream in MAPPING messages; presence of both a generalized and a normal label TLV in the same MAPPING message is a protocol error.
section: "2.2"
