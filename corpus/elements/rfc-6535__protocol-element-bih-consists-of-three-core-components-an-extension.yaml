document: rfc-6535
kind: protocol-element
summary: 'BIH consists of three core components: an Extension Name Resolver (ENR), an Address Mapper, and either a Function Mapper (socket API layer) or a Protocol Translator (network layer). These cooperate to synthesize IPv4 addresses from AAAA records and translate communications between IPv4-only applications and IPv6-only peers.'
