document: rfc-7884
kind: interoperability-note
summary: Routers that do not recognize the S-BFD Discriminator TLV Type will silently ignore the TLV as specified in RFC 7770, and therefore will not learn S-BFD Discriminators via OSPF. This introduces no interoperability issues.
section: "2.1"
topics:
    - routing
