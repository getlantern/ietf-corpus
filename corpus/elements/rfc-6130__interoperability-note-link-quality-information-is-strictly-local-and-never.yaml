document: rfc-6130
kind: interoperability-note
summary: Link quality information is strictly local and never carried in signaling. Routers using different, the same, or no link quality algorithms can fully interoperate; link quality is a local admittance policy and is not equivalent to a link metric.
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
