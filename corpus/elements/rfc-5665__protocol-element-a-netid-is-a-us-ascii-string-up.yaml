document: rfc-5665
kind: protocol-element
summary: A netid is a US-ASCII string up to 2^32–1 octets in XDR encoding, though the registry restricts Standards Action assignments to 1–8 octets and First Come First Served assignments to 9–128 octets. The zero-length netid is Reserved.
