document: rfc-6581
kind: normative-requirement
summary: The initiator MUST set Control Flag A to 1 for the peer-to-peer model and MUST set each Control Flag B, C, and D to 1 for each RTR indication type it supports. For the client-server model, Control Flag A MUST be 0, and B, C, D MUST also be 0.
section: "9.2"
rfc2119_level: MUST
topics:
    - realtime
