document: rfc-2110
kind: normative-requirement
summary: 'The MIME standard requires that documents of ''Content-Type: Text'' MUST be in canonical form (CRLF line breaks) before Content-Transfer-Encoding, unlike HTTP which allows other line break representations. If the original document already uses CRLF, it SHOULD remain unconverted to preserve integrity checksums.'
section: "11"
rfc2119_level: MUST
topics:
    - email
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
