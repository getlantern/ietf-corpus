document: rfc-9112
kind: normative-requirement
summary: All HTTP senders and recipients are RECOMMENDED to support, at a minimum, request-line lengths of 8000 octets. A server receiving a request-target longer than any URI it wishes to parse MUST respond with 414 (URI Too Long).
section: "3"
rfc2119_level: RECOMMENDED
topics:
    - http
