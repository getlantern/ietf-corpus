document: rfc-6545
kind: design-rationale
summary: A star topology was added as a supported consortium model (in addition to direct peer and mesh topologies) to accommodate use cases such as country-level CSIRTs or service providers that distribute incident information to many consumer organizations, requiring trust relationships only between the central provider and each consumer.
