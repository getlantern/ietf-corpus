kind: wire-format
summary: SPIRITS XML documents use the 'application/spirits-event+xml' MIME type. The root element is <spirits-event> with namespace 'urn:ietf:params:xml:ns:spirits-1.0', containing one or more <Event> elements each optionally containing child elements such as <CallingPartyNumber>, <CalledPartyNumber>, <DialledDigits>, <Cause>, or <Cell-ID> as string values.
