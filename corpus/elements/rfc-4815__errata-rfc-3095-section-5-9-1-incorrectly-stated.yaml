document: rfc-4815
kind: errata
summary: RFC 3095 Section 5.9.1 incorrectly stated that the IR/IR-DYN CRC covers the entire packet excluding payload and including any Add-CID octet. The corrected text excludes Padding octets and the Add-CID octet for CID 0 from CRC calculation.
section: "2.2"
topics:
    - rtp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
