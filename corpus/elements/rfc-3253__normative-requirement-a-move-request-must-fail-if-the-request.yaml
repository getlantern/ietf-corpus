document: rfc-3253
kind: normative-requirement
summary: A MOVE request MUST fail if the request-URL identifies a version (DAV:cannot-rename-version precondition). When a resource is moved, versioning properties MUST have the same value at the destination URL as at the source URL.
section: "3.15"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
