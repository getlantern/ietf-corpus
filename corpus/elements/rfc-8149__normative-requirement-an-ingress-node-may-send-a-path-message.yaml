document: rfc-8149
kind: normative-requirement
summary: An ingress node MAY send a Path message with the 'P2MP-TE Tree Re-evaluation Request' flag set, selecting one S2L sub-LSP transiting a midpoint LSR to trigger the re-evaluation request. The ingress node MAY send a re-evaluation request to each border LSR on the path of the LSP tree.
section: "4.1"
rfc2119_level: MAY
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
