summary: Vendor-proprietary extensions should be implemented by augmenting the base model using YANG 'augment' with XPath expressions targeting the 'matches' or 'actions' containers. The 'example-newco-acl' appendix demonstrates adding payload matching, metadata matching, count/policer actions, and a default-action leaf.
