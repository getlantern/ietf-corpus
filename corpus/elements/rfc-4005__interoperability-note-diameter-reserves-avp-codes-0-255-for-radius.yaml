document: rfc-4005
kind: interoperability-note
summary: Diameter reserves AVP Codes 0-255 for RADIUS functions implemented in Diameter; AVPs with codes 256 and greater represent Diameter-only functions that may cause interoperability issues if the request traverses an AAA system supporting only RADIUS.
