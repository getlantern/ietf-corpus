document: rfc-8865
kind: normative-requirement
summary: SDP offerers and answerers MUST NOT include the 'hlang-send' or 'hlang-recv' attributes directly in the 'm=' section for 'application/webrtc-datachannel'; they MUST instead be associated with individual data channels using the 'dcsa' attribute. This updates RFC 8373.
section: "7"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
