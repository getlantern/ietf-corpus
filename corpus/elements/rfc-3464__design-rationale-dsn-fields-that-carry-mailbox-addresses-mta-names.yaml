document: rfc-3464
kind: design-rationale
summary: DSN fields that carry mailbox addresses, MTA names, and status codes use a 'type; value' structure rather than assuming any particular format, enabling the protocol to operate in multi-protocol (X.400, LAN-based) environments without losing 'foreign' information.
