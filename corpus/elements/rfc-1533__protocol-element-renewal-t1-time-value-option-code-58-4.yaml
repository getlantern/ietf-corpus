document: rfc-1533
kind: protocol-element
summary: Renewal (T1) Time Value option (code 58, 4 octets) specifies the time interval in seconds from address assignment until the client transitions to the RENEWING state. Rebinding (T2) Time Value option (code 59, 4 octets) specifies the interval until the client transitions to the REBINDING state.
