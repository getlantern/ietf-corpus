document: rfc-2440
kind: normative-requirement
summary: DSA signatures MUST use hash algorithms producing 160-bit output, matching q, the order of the group generated by the DSA key's generator. The hash result is used directly as a 160-bit number in the DSA algorithm.
section: 5.2.2
rfc2119_level: MUST
topics:
    - crypto
    - security
