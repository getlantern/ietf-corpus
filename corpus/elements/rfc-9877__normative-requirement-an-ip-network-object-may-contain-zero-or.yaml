document: rfc-9877
kind: normative-requirement
summary: An IP network object MAY contain zero or more geofeed link objects. Typically it has zero or one; if multiple are returned (e.g., for multiple languages), the server SHOULD provide 'hreflang' members. Except for the multiple-languages scenario, the server SHOULD NOT return more than one geofeed link object.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
