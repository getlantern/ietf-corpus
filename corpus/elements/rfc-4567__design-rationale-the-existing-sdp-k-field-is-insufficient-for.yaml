document: rfc-4567
kind: design-rationale
summary: The existing SDP 'k=' field is insufficient for key management protocols because it lacks extensibility and cannot carry the many parameters needed. A new 'key-mgmt' attribute with a protocol identifier and opaque base64 data field was introduced to support arbitrary key management protocols.
section: "1"
topics:
