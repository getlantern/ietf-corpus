document: rfc-8681
kind: design-rationale
summary: Each FEC Repair Packet uses a fixed 64-bit Repair FEC Payload ID regardless of encoding window size, because the encoding window contents and coding coefficients are described implicitly via FSS_ESI, NSS, Repair_Key, and DT rather than by enumerating all source symbols and coefficients individually.
section: "1.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
