document: rfc-9103
kind: protocol-element
summary: XoT (XFR-over-TLS) is the protocol defined in this document for performing DNS zone transfers over TLS 1.3+. AXoT refers to AXFR over TLS; IXoT refers to IXFR over TLS. In XoT, the secondary acts as the TLS client and the primary acts as the TLS server.
section: "2"
topics:
