document: rfc-7757
kind: interoperability-note
summary: Configuring EAMs with overlapping or identical IPv4 or IPv6 prefixes may produce asymmetric address translations, potentially making bidirectional communication impossible. Implementations MAY warn operators when overlapping EAMs are inserted or refuse to insert EAMs with identical prefix values.
section: "5"
topics:
    - v6ops
    - ip
