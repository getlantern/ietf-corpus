document: rfc-7570
kind: protocol-element
summary: The ERO Hop Attributes subobject is an OPTIONAL subobject carried in the ERO or SERO, using the standard ERO subobject format. It carries a list of Hop Attributes TLVs and enables per-hop attribute specification, building on the LSP_ATTRIBUTE semantics of RFC 5420.
