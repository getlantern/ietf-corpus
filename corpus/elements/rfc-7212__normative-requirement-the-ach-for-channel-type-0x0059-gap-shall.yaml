document: rfc-7212
kind: normative-requirement
summary: The ACH for Channel Type 0x0059 (GAP) SHALL NOT be followed by the ACH TLV Header defined in RFC 5586. Reserved fields MUST be sent as zero; implementations MUST ignore reserved field values on receipt.
section: "3"
rfc2119_level: MUST
