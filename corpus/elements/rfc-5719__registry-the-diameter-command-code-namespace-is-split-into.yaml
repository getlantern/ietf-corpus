summary: 'The Diameter Command Code namespace is split into four ranges: 0–255 reserved for RADIUS backward compatibility, 256–8,388,607 for permanent standard commands requiring IETF Review, 8,388,608–16,777,213 for vendor-specific codes allocated First Come First Served, and 16,777,214–16,777,215 reserved for experimental commands.'
