document: rfc-1771
kind: normative-requirement
summary: 'Connection collision resolution: when two simultaneous TCP connections form between the same BGP speaker pair, the connection initiated by the speaker with the higher-valued BGP Identifier is retained; the other is closed with a Cease NOTIFICATION. A collision with an Established connection unconditionally closes the newly created one.'
section: "6.8"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
