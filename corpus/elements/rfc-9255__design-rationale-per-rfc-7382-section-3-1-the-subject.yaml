document: rfc-9255
kind: design-rationale
summary: Per RFC 7382 Section 3.1, the Subject name in each RPKI certificate SHOULD NOT be meaningful. The CPS template deliberately avoids any attestation of real-world identity in certificate subject fields.
section: "3"
rfc2119_level: SHOULD NOT
