document: rfc-8794
kind: interoperability-note
summary: 'EBML backward compatibility allows a reader that supports a DocType version equal to or higher than the DocTypeReadVersion to read the document. Forward compatibility is not guaranteed: if a reader does not support the exact DocTypeVersion, it may not be able to interpret newer Elements introduced in that version.'
section: "15"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
