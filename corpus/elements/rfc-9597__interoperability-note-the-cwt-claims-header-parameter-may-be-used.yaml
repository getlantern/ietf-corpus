document: rfc-9597
kind: interoperability-note
summary: The CWT Claims header parameter MAY be used in any COSE object that uses header parameters, such as COSE_Sign objects; its use is not restricted to CWTs, enabling use with non-CBOR payloads such as bitmap images.
