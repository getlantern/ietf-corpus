document: rfc-6555
kind: interoperability-note
summary: Web browsers implement a same-origin policy that causes subsequent connections to the same hostname to go to the same IPv4 or IPv6 address as the previous successful connection; Happy Eyeballs must not violate this policy even though it may reduce responsiveness in failure scenarios.
section: "5.6"
topics:
    - ip
    - v6ops
    - http
    - security
