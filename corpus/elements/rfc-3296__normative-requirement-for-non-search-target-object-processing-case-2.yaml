document: rfc-3296
kind: normative-requirement
summary: For non-search target object processing (Case 2), when the target is a referral object, the server SHOULD return the URI value in the ref attribute, with the DN part modified to refer to the appropriate target in the referenced server. The DN part SHOULD NOT be trimmed even when identical.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
