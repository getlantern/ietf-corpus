document: rfc-7210
kind: state-machine
summary: 'Incoming key validation requires: (1) Peers field includes H, (2) Protocol field matches P, (3) Interfaces field includes I or ''all'', (4) Direction is ''in'' or ''both'', (5) LocalKeyName equals L, and (6) AcceptLifeTimeStart <= current time <= AcceptLifeTimeEnd. Exceeding an established security association''s lifetime does not immediately tear it down.'
