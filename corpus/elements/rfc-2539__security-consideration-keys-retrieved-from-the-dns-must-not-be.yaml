document: rfc-2539
kind: security-consideration
summary: Keys retrieved from the DNS MUST NOT be trusted unless (1) securely obtained from a secure resolver or independently verified by the user, and (2) that secure resolver and verification method conform to security policies acceptable to the user. As with all cryptographic algorithms, evaluating necessary key strength is important and dependent on local policy.
section: "5"
topics:
    - dns
    - crypto
    - security
