document: rfc-9915
kind: design-rationale
summary: 'Multiple DUID types exist because no single format is universally easy to generate and globally unique across all device categories: general-purpose computers can use DUID-LLT; vendor-provisioned devices use DUID-EN; devices with permanently attached interfaces but no writable storage use DUID-LL; devices with firmware UUIDs use DUID-UUID.'
section: "11"
topics:
