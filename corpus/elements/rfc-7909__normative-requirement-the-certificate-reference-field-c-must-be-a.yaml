document: rfc-7909
kind: normative-requirement
summary: The certificate reference field "c" MUST be a URL of type "rsync" (RFC 5781) or "http(s)" (RFC 7230) pointing to a specific resource certificate in an RPKI repository. Any non-URL-safe characters (including ";" and "+") must be URL encoded.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
