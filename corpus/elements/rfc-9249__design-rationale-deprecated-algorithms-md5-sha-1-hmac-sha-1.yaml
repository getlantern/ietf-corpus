document: rfc-9249
kind: design-rationale
summary: Deprecated algorithms (MD5, SHA-1, HMAC-SHA-1, HMAC-SHA1-12) and ASCII keystrings are modeled but gated behind a 'deprecated' YANG feature to support legacy compatibility when secure cryptographic algorithms are not available, while clearly marking them as deprecated per RFC 8573.
