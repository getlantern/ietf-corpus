document: rfc-7151
kind: protocol-element
summary: The HOST command is a new FTP command that allows a user-PI to specify which virtual host it wishes to connect to on a server-FTP process handling multiple virtual hosts at a single IP address. It takes a single hostname parameter and returns a 220 reply on success.
