document: rfc-8949
kind: protocol-element
summary: Indefinite-length encoding is available for arrays, maps, byte strings, and text strings by setting additional information to 31. Items are terminated by the 'break' stop code (0xFF, major type 7, additional info 31). Indefinite-length encoding is not valid for major types 0, 1, or 6.
section: "3.2"
