document: rfc-6620
kind: state-machine
summary: 'The FCFS SAVI binding state machine for each (IP address, device) pair has five states: NO_BIND (no binding exists), TENTATIVE (DAD in progress), VALID (binding confirmed and usable for filtering), TESTING_TP-LT (DAD_NS received from Trusted Port or lifetime expiring), and TESTING_VP (conflicting DAD_NS or data packet from a different Validating Port). Transitions are triggered by reception of DAD_NS, data packets, NA messages, and timer expiry.'
section: 3.2.3
topics:
    - ip
    - security
