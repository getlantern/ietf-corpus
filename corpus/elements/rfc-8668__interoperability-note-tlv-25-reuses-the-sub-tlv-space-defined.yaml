document: rfc-8668
kind: interoperability-note
summary: TLV 25 reuses the sub-TLV space defined for TLVs 22, 23, 141, 222, and 223. Sub-TLVs relating to inter-AS topology (remote AS number, IPv4/IPv6 remote ASBR Identifier, sub-TLVs 24–26), MTU (sub-TLV 28), and RTM Capability (sub-TLV 40) are prohibited (marked 'n') in TLV 25 as they are not meaningful for L2 bundle member links.
section: "5"
topics:
    - routing
