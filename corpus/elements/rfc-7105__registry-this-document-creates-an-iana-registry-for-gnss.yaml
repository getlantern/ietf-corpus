document: rfc-7105
kind: registry
summary: This document creates an IANA registry for GNSS System Types, mapping short string tokens (e.g., 'gps', 'galileo') to satellite navigation systems. Initial entries register GPS [GPS.ICD] and Galileo [Galileo.ICD]. The registry also records the supported signal identifiers and time system for each entry.
section: "9.1"
