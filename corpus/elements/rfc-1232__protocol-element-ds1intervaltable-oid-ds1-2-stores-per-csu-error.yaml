document: rfc-1232
kind: protocol-element
summary: ds1IntervalTable (OID ds1 2) stores per-CSU error statistics for each of the 96 most recent completed 15-minute intervals, indexed by ds1IntervalIndex and ds1IntervalNumber (1=most recent, 96=least recent). Counters include ESs, SESs, SEFSs, UASs, CSSs, BPVs, and CVs.
