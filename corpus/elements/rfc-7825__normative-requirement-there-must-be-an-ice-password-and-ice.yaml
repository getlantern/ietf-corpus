document: rfc-7825
kind: normative-requirement
summary: There MUST be an ICE-Password and ICE-ufrag parameter for each media stream, chosen randomly at session start. The ICE-ufrag MUST contain at least 24 bits of randomness (minimum 4 characters), and ICE-Password MUST contain at least 128 bits of randomness (minimum 22 characters), with an upper limit of 256 characters each.
section: "4.3"
rfc2119_level: MUST
topics:
    - nat
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
