document: rfc-8842
kind: normative-requirement
summary: Implementations wishing to use the 'tls-id' attribute MUST explicitly include it in SDP offers and answers. No default value is defined. If an offer or answer lacks 'tls-id', modifications of DTLS setup role, fingerprint set, or local transport parameters MUST be treated as indication of a new DTLS association.
section: "4"
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
