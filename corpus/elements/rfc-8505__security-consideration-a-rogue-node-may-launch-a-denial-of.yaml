document: rfc-8505
kind: security-consideration
summary: 'A rogue node may launch a denial-of-service attack against the 6LR or 6LBR registry. Mitigations include: the TID sequence counter to detect and clean up stale registrations, prompt de-registration when addresses are abandoned, individually configurable registration lifetimes, and router-enforced per-node address limits with LRU cleanup.'
