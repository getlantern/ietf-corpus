document: rfc-8660
kind: protocol-element
summary: A Mirror SID causes the NEXT operation (pop topmost label) followed by a lookup in the mirrored forwarding table using the packet contents exposed after the pop. The Mirror SID is a generalization of the context label in RFC 5331 because it makes no assumptions about the packet type underneath the top label.
section: 2.7.3.1
topics:
    - mpls
    - routing
