document: rfc-8267
kind: normative-requirement
summary: If an NFS version 4 client has provided a matching non-empty Write chunk, the corresponding READ operation MUST return its DDP-eligible data item using that chunk. If the client provided an empty matching Write chunk, the READ operation MUST return all result data items inline.
section: 6.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
