document: rfc-3371
kind: protocol-element
summary: l2tpTunnelStatsTable augments l2tpTunnelConfigTable with read-only per-tunnel statistics including local/remote TIDs, remote peer identity (hostname, vendor, firmware, protocol version), control channel sequence numbers (TxSeq, TxSeqAck, RxSeq, RxSeqAck), ZLB counts, out-of-sequence/window counters, and last result/error codes.
