document: rfc-8624
kind: security-consideration
summary: Retiring an algorithm too quickly would cause zones signed with that algorithm to be downgraded to the equivalent of unsigned zones. Therefore, algorithm deprecation must be done very slowly and only after careful consideration and measurement of deployment levels.
section: "4"
topics:
    - dns
    - security
    - crypto
