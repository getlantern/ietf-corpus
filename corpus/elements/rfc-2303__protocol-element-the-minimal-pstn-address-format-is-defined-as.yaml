document: rfc-2303
kind: protocol-element
summary: The minimal PSTN address format is defined as 'pstn-address = pstn-mbox [ qualif-type1 ]' where 'pstn-mbox = service-selector "=" global-phone'. The service-selector identifies the specific messaging service (e.g., VOICE, FAX, SMS).
