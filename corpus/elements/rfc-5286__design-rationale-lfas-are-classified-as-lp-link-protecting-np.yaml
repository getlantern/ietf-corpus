document: rfc-5286
kind: design-rationale
summary: LFAs are classified as LP (link-protecting), NP (node-protecting), and SP (SRLG-protecting) with distinct coverage vs. complexity trade-offs. LP+NP+SP gives maximum coverage; downstream paths guarantee no micro-loop but offer poor network-wide coverage; plain LFAs give good coverage but can produce loops under unprotected failures.
section: "3.7"
topics:
