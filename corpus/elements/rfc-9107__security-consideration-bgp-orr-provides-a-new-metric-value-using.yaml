document: rfc-9107
kind: security-consideration
summary: BGP ORR provides a new metric value using additional IGP information for computing routes on route reflectors. While any improperly used metric value could impact network resiliency, this extension does not change the underlying security issues inherent in existing IBGP per RFC 4456, and introduces no requirements for new protection measures.
section: "5"
topics:
    - bgp
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
