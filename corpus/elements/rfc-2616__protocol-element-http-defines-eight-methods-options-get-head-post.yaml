document: rfc-2616
kind: protocol-element
summary: 'HTTP defines eight methods: OPTIONS, GET, HEAD, POST, PUT, DELETE, TRACE, and CONNECT. GET and HEAD are ''safe'' (no side effects). GET, HEAD, PUT, DELETE, OPTIONS, and TRACE are idempotent (multiple identical requests have the same effect as a single request).'
section: "9"
