document: rfc-5055
kind: protocol-element
summary: 'RevocationInfos is a SEQUENCE of RevocationInfo CHOICE elements supporting: crl [0] CertificateList, delta-crl [1] CertificateList, ocsp [2] OCSPResponse, and other [3] OtherRevInfo (OID plus ANY). Certificates in revInfos MUST NOT be considered valid solely because they appear there; the server may ignore revocation info that does not apply to its constructed path.'
section: 3.2.9
topics:
    - pkix
