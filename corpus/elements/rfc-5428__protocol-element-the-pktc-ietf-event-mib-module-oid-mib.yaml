document: rfc-5428
kind: protocol-element
summary: 'The PKTC-IETF-EVENT-MIB module (OID mib-2 182) is structured into six sub-trees: pktcEventControl, pktcEventThrottle, pktcEventStatus, pktcEvents, pktcEventLog, and pktcEventNotifications. It provides SNMP-based management for events generated by PacketCable- and IPCablecom-compliant MTA devices.'
section: "4.1"
topics:
