document: rfc-5462
kind: design-rationale
summary: 'The name ''Traffic Class field'' (TC field) was chosen over the original ''Class of Service field'' because the field''s use had evolved beyond simple CoS: RFC 3270 defined EXP-Inferred-PSC LSPs and RFC 5129 extended it to carry explicit congestion marking (ECN) information. The broader name better covers all potential uses.'
