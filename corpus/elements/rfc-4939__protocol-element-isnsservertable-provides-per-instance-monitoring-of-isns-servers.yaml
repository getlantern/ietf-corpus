document: rfc-4939
kind: protocol-element
summary: isnsServerTable provides per-instance monitoring of iSNS servers, indexed by isnsServerIndex (Unsigned32 1..4294967295). Each row reports the server's name, iSNS version, TCP/UDP ports, operational role (server/backupServer/notSet), enabled discovery methods, and DD/DDS policy settings.
section: "3.3"
