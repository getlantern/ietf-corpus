document: rfc-5626
kind: normative-requirement
summary: If a pong is not received within 10 seconds after sending a ping (or immediately after processing any incoming message being received when that 10 seconds expires), then the client MUST treat the flow as failed.
section: 4.4.1
rfc2119_level: MUST
topics:
