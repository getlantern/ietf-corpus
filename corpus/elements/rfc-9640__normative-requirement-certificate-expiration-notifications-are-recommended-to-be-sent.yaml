document: rfc-9640
kind: normative-requirement
summary: Certificate expiration notifications are RECOMMENDED to be sent once a month for 3 months, then once a week for four weeks, then once a day until resolved. The notification MAY also be sent when the issuer's CRL is about to expire.
section: "2.3"
rfc2119_level: RECOMMENDED
topics:
    - yang
    - crypto
    - pkix
