document: rfc-5310
kind: design-rationale
summary: The Remaining Lifetime field is explicitly excluded from LSP authentication (zeroed before computation) so that intermediate ISes can age LSPs without needing to recompute or re-sign the authentication data, which would otherwise be impractical.
