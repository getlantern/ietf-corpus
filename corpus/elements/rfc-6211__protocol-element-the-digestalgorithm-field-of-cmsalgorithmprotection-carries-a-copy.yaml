document: rfc-6211
kind: protocol-element
summary: The digestAlgorithm field of CMSAlgorithmProtection carries a copy of SignerInfo.digestAlgorithm or AuthenticatedData.digestAlgorithm including all parameters; the signatureAlgorithm field is populated only when the attribute appears in SignerInfo.signedAttrs; the macAlgorithm field is populated only when in AuthenticatedData.authAttrs.
