document: rfc-2228
kind: protocol-element
summary: MIC carries a base 64 encoded integrity-protected ('safe') message; CONF carries a base 64 encoded confidentiality-protected ('confidential') message; ENC carries a base 64 encoded message with both integrity and confidentiality ('private'). The server decodes and verifies the argument and then interprets the content as an FTP command.
