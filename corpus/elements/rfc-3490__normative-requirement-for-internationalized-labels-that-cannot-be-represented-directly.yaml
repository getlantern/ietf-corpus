document: rfc-3490
kind: normative-requirement
summary: For internationalized labels that cannot be represented directly in ASCII, DNS servers MUST use the ACE form produced by the ToASCII operation. All IDNs served by DNS servers MUST contain only ASCII characters.
section: "6.3"
rfc2119_level: MUST
topics:
