document: rfc-9303
kind: normative-requirement
summary: The ITR-OTK MUST be generated by a properly seeded pseudo-random or strong random source per RFC 4086. A new ITR-OTK must be generated for each Map-Request and used for only a single Map-Request/Map-Reply exchange.
section: "7.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
