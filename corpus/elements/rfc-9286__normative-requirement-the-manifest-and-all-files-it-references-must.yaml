document: rfc-9286
kind: normative-requirement
summary: The manifest and all files it references MUST reside at the same publication point. If any manifest-listed files are found at a different publication point, the RP MUST treat the fetch as failed and MUST issue a warning.
section: "6.1"
rfc2119_level: MUST
topics:
