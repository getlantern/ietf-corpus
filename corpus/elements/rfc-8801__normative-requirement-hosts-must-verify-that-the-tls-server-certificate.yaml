document: rfc-8801
kind: normative-requirement
summary: Hosts MUST verify that the TLS server certificate is valid for the request and that a DNS-ID on the certificate equals the PvD ID FQDN. If validation fails, hosts MUST close the connection and treat the PvD as having no Additional Information.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
