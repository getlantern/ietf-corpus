document: rfc-8075
kind: protocol-element
summary: 'Three URI mapping modes are defined: null mapping (reverse-proxy with private CoAP URI derivation), default mapping (Target CoAP URI appended verbatim to HC Proxy URI), and URI mapping templates (Level 2 RFC 6570 templates for custom mappings). The ''tu'' template variable represents a full Target CoAP URI in the simple form.'
