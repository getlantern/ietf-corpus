document: rfc-5438
kind: privacy-consideration
summary: IMDNs provide a fine-grained view of IM Recipient activity. It is strongly RECOMMENDED that the IM Recipient obtain the user's consent before sending an IMDN. The IM Recipient may silently ignore IMDN requests or always send 'forbidden' status to protect user privacy.
section: "14.2"
topics:
    - privacy
    - realtime
