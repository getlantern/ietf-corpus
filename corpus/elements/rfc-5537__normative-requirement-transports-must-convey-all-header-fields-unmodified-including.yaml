document: rfc-5537
kind: normative-requirement
summary: Transports MUST convey all header fields unmodified, including octets in the range 128–255. Transports for relaying and serving agents MUST, and transports for other agents SHOULD, convey lines even if they exceed 998 characters in length.
section: "2"
rfc2119_level: MUST
