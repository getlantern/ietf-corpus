document: rfc-4352
kind: protocol-element
summary: 'The AMR-WB+ RTP payload consists of three octet-aligned sections in order: a 1-byte payload header, a variable-length table of contents (one or more ToC entries), and the audio data frames. All elements are octet-aligned; only AMR-WB frame types (0–9) require per-frame padding.'
section: "4.2"
