document: rfc-9554
kind: interoperability-note
summary: For N property backwards compatibility, secondary surnames currently placed in the family-name component and generational markers in honorific-suffixes should be duplicated in both the new and old components when writing, and readers should prefer the new components when both are populated with equal values.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
