document: rfc-4867
kind: normative-requirement
summary: An application implementing this payload format MUST understand all payload parameters in the out-of-band signaling (e.g., all SDP/media-type parameters defined in this document). To achieve basic interoperability, implementations SHOULD support both bandwidth-efficient and octet-aligned modes.
section: "4.5"
rfc2119_level: MUST
