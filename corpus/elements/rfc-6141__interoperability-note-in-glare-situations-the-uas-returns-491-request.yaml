document: rfc-6141
kind: interoperability-note
summary: In glare situations, the UAS returns 491 (Request Pending) and the UAC retries after a randomly selected time interval determined by which UA owns the Call-ID. RFC 3311 extends these glare rules to cover collisions between an UPDATE carrying an offer and another offer-carrying message (UPDATE, PRACK, or INVITE).
section: "3.5"
topics:
    - sip
    - realtime
