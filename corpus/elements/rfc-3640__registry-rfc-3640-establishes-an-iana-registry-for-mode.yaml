document: rfc-3640
kind: registry
summary: RFC 3640 establishes an IANA registry for mode definitions used with the mpeg4-generic MIME type. New mode registrations require a specification in the form of an RFC, MPEG standard, or other permanent reference (Specification Required policy per RFC 2434).
