document: rfc-4512
kind: design-rationale
summary: Short names (descriptors) are defined as more readable aliases for OIDs but are explicitly not expected to be displayed to end users; implementations are expected to translate them into local natural-language representations. The same short name can legitimately refer to different schema elements in different subschemas.
section: "6.2"
topics:
