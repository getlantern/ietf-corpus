document: rfc-2045
kind: wire-format
summary: 'The Content-Transfer-Encoding field value is a single case-insensitive token: one of ''7bit'', ''8bit'', ''binary'', ''quoted-printable'', ''base64'', or an ietf-token or x-token. The default value when the field is absent is ''7bit''.'
