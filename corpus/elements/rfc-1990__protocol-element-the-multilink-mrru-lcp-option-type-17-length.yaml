document: rfc-1990
kind: protocol-element
summary: The Multilink MRRU LCP Option (Type=17, Length=4) signals that the sender implements PPP Multilink and specifies the Max-Receive-Reconstructed-Unit as a 2-octet field. Its presence and acceptance cause all packets from the same peer on any link where the option is accepted to be processed by a single common protocol machine.
section: 5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
