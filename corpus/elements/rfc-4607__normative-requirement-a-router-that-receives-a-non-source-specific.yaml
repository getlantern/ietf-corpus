document: rfc-4607
kind: normative-requirement
summary: A router that receives a non-source-specific (*,G) request for data in the SSM address range MUST NOT use the request to establish forwarding state and MUST NOT propagate the request to neighboring routers. A router MAY log an error.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
