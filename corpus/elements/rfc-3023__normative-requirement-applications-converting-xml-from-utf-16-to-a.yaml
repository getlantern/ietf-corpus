document: rfc-3023
kind: normative-requirement
summary: Applications converting XML from 'utf-16' to a non-Unicode encoding MUST strip the BOM before conversion; when converting from another encoding into 'utf-16', the BOM MUST be added after conversion is complete. Conversions between 'utf-16' and 'utf-16be'/'utf-16le' MUST similarly strip or add the BOM.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
