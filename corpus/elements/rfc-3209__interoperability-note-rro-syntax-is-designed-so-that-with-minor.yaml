document: rfc-3209
kind: interoperability-note
summary: RRO syntax is designed so that, with minor changes, the entire object can be used as input to the EXPLICIT_ROUTE object. A sender can thus 'pin down' a session path by taking a received Resv RRO and applying it as the ERO in the next Path message.
section: 4.4.2
topics:
