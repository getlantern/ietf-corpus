document: rfc-4860
kind: protocol-element
summary: VDstPort is a 16-bit identifier in the SESSION that remains constant over the life of the reservation. Extended vDstPort is a 32-bit (IPv4) or 128-bit (IPv6) identifier; together they allow multiple generic aggregate reservations for the same PHB between the same Aggregator and Deaggregator pair.
section: "2.1"
topics:
