document: rfc-2131
kind: normative-requirement
summary: If a client uses a 'client identifier' in any message, it MUST use that same identifier in all subsequent messages so that servers correctly identify the client. The identifier MUST be unique to the client within its subnet.
section: "2"
rfc2119_level: MUST
topics:
    - ip
