document: rfc-9059
kind: normative-requirement
summary: The LSPs in a Bidirectional LSP Association MUST have matching endpoint nodes in the reverse directions. If a PCE speaker receives a non-compliant LSP, it MUST send PCErr Error-Type=26, Error-value=19 (Endpoint mismatch in the association group).
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
