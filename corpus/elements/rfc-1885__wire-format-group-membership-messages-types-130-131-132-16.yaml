document: rfc-1885
kind: wire-format
summary: 'Group Membership Messages (Types 130/131/132): 16-bit Maximum Response Delay (ms, meaningful only in Query), 16-bit Unused (zeroed), followed by the 128-bit Multicast Address. Hop Limit is set to 1. A zero Multicast Address in a Query implies a query for all groups.'
