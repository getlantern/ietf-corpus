document: rfc-8614
kind: normative-requirement
summary: When a deployment is known not to utilize multihoming, an implementation MAY provide a user-configurable override allowing the PW to come up despite an S-bit mismatch; the PE advertising S-bit=0 must set sequence numbers to 0, and the receiving PE must not expect non-zero sequence numbers.
section: "3.2"
rfc2119_level: MAY
topics:
    - mpls
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
