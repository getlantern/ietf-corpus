document: rfc-9495
kind: protocol-element
summary: The "issuemail" Property Tag is a CAA DNS RR property that restricts which Certification Authorities may issue certificates containing the id-kp-emailProtection key purpose and at least one rfc822Name or id-on-SmtpUTF8Mailbox value in the subjectAltName extension. Its presence in a Relevant RRSet signals that the domain is requesting restrictions on email certificate issuance.
section: "3"
topics:
