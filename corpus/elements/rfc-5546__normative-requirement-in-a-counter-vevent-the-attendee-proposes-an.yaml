document: rfc-5546
kind: normative-requirement
summary: In a COUNTER VEVENT, the Attendee proposes an alternative event time or details to the Organizer. The Organizer MUST respond with either an updated REQUEST (accepting the counter) or a DECLINECOUNTER message. COUNTER MUST NOT be used for VJOURNAL or VFREEBUSY components.
section: 3.2.7
rfc2119_level: MUST
topics:
    - email
