document: rfc-9601
kind: normative-requirement
summary: A tunnel ingress implementation SHOULD be able to be configured to zero the ECN field of the outer IP header, independently of any Diffserv configuration, even if the implementation does not claim compliance with RFC 6040, RFC 4301, or RFC 3168 full functionality mode.
section: "4"
rfc2119_level: SHOULD
topics:
