document: rfc-3887
kind: protocol-element
summary: The MTQP URI scheme takes the form mtqp://<mserver>/track/<unique-envid>/<mtrk-secret> or with a non-standard port. The path element '/track/' is case-insensitive, but unique-envid and mtrk-secret are case-sensitive.
