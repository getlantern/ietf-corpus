document: rfc-3723
kind: interoperability-note
summary: IKE Main Mode with pre-shared key SHOULD NOT be used when peers have dynamically assigned IP addresses, because this forces use of a group pre-shared key that is vulnerable to man-in-the-middle attack. In such cases, FQDN or USER_FQDN identity payloads SHOULD be used instead.
section: 2.3.3
topics:
    - ipsec
    - security
