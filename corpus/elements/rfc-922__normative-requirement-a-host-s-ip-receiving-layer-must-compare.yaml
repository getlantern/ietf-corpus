document: rfc-922
kind: normative-requirement
summary: A host's IP receiving layer must compare incoming destination addresses against both its own unicast addresses and all possible broadcast addresses for that host, in order to recognize and accept broadcast datagrams.
section: "5"
rfc2119_level: MUST
