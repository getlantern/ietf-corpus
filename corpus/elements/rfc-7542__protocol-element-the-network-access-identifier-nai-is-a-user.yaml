document: rfc-7542
kind: protocol-element
summary: The Network Access Identifier (NAI) is a user identifier submitted by a client during authentication, used to route authentication requests across domains and associate a user with a home account. It takes the form 'utf8-username@utf8-realm', or may omit either the username or the realm portion.
section: "2.2"
