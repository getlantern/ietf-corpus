document: rfc-9810
kind: design-rationale
summary: CMS EnvelopedData is used instead of the deprecated EncryptedValue throughout CMP (private key protection, certificate encryption, POP, revocation passphrases) to improve crypto agility. CMP version 3 was introduced specifically to signal this ASN.1-level change while maintaining version 2 backward compatibility.
section: "1.2"
topics:
