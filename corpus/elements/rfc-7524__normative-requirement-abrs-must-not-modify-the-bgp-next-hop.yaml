document: rfc-7524
kind: normative-requirement
summary: ABRs MUST NOT modify the BGP Next Hop when re-advertising either Intra-AS or Inter-AS I-PMSI/S-PMSI A-D routes, so that ABRs are not required to participate in the propagation of C-multicast routes.
section: 5.1.3
rfc2119_level: MUST NOT
