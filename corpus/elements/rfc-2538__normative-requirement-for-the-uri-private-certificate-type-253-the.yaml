document: rfc-2538
kind: normative-requirement
summary: For the URI private certificate type (253), the certificate portion of the CERT RR MUST begin with a null-terminated URI, and the URI SHOULD be such that a retrieval from it will lead to documentation on the format of the certificate.
section: "2.1"
rfc2119_level: MUST
topics:
