document: rfc-2301
kind: protocol-element
summary: PageNumber (tag 297, type SHORT, count=2) is required for all fax modes. The first value is the 0-based page number; the second value is the total page count (0 if unknown). Defined as a TIFF extension field.
section: 2.2.1
