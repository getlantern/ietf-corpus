summary: 'The 48-byte BHS contains: Opcode (6 bits in byte 0, with I and F flag bits), opcode-specific fields (bytes 1-3), TotalAHSLength (1 byte, in 4-byte units), DataSegmentLength (3 bytes, in bytes), LUN (8 bytes), Initiator Task Tag (4 bytes), and opcode-specific fields filling the remaining 20 bytes.'
