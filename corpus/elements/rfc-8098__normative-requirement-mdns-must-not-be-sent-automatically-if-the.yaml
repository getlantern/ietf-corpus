document: rfc-8098
kind: normative-requirement
summary: MDNs MUST NOT be sent automatically if the address in Disposition-Notification-To differs from the Return-Path address. In that case, user confirmation MUST be obtained; if confirmation is not possible, the MDN MUST NOT be sent.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - email
    - security
