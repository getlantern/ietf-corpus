document: rfc-7582
kind: normative-requirement
summary: In the Hierarchical Partitioned Method, when a PE (PE1) transmits a C-BIDIR flow and the upstream PE for the C-RPA is PE2, the packet's MPLS label stack MUST carry the PE Distinguisher Label assigned to PE2's IP address, not PE1's label, by the P-tunnel's root node.
section: 3.2.2.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
