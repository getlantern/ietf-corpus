document: rfc-5552
kind: normative-requirement
summary: The VoiceXML Media Server MUST allow the media session to be modified via a re-INVITE and SHOULD support the UPDATE method (RFC 3311). It MUST be possible to change streams between sendrecv, sendonly, and recvonly as per RFC 3264. Media session modification does not affect VoiceXML application execution except that recognition during hold results in noinput timeouts.
section: "3.3"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
