document: rfc-9642
kind: normative-requirement
summary: It is RECOMMENDED that server implementations encrypt keystore contents when persisted to non-volatile memory and zeroize decrypted keystore contents in volatile memory when not in use. If storing cleartext values, persistence-layer-level encryption SHOULD be used.
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
    - yang
    - netconf
    - crypto
    - security
