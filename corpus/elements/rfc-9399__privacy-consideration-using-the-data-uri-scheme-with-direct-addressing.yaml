document: rfc-9399
kind: privacy-consideration
summary: Using the 'data' URI scheme with direct addressing embeds logotype data in the certificate, generating no network traffic to fetch logotype data and thereby avoiding network observation and server-side tracking. Privacy-aware subscribers MAY insist on embedded logotype data.
