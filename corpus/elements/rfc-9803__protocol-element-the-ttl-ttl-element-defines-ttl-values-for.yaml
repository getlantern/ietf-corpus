document: rfc-9803
kind: protocol-element
summary: The <ttl:ttl> element defines TTL values for DNS resource records associated with domain and host objects. It has a required 'for' attribute specifying the DNS record type (NS, DS, DNAME, A, AAAA, or custom), and optional 'min', 'default', and 'max' attributes that MUST NOT appear in commands but MAY appear in responses.
section: 1.2.1
topics:
    - dns
    - registry
