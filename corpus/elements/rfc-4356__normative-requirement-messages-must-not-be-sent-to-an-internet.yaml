document: rfc-4356
kind: normative-requirement
summary: Messages MUST NOT be sent to an Internet mail system with an unqualified E.164 number (a number with no domain) instead of a fully-qualified domain name. All addresses in 'To:', 'Cc:', and 'Bcc:' headers MUST be in the form of fully-qualified domains.
section: 2.1.3.2
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
