document: rfc-2557
kind: privacy-consideration
summary: 'HTML-formatted email with inline links to externally-hosted objects can break recipient anonymity: when the recipient''s mailer fetches the linked object via HTTP, the HTTP transaction reveals the reader''s identity and workstation address to the sender.'
section: "11.1"
topics:
    - privacy
    - security
    - email
