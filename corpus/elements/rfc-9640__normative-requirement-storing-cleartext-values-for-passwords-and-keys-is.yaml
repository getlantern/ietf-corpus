document: rfc-9640
kind: normative-requirement
summary: Storing cleartext values for passwords and keys is NOT RECOMMENDED. The module enables cleartext storage only when specific feature statements (cleartext-passwords, cleartext-symmetric-keys, cleartext-private-keys) are explicitly enabled.
section: "3.5"
rfc2119_level: RECOMMENDED
