document: rfc-7024
kind: normative-requirement
summary: The MPLS label that a V-hub advertises with a VPN-IP default route MUST be mapped to an NHLFE that identifies the VRF of the V-hub, so that upon receiving a labeled packet the V-hub pops the label and performs a VRF lookup for further disposition.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - vpn
    - routing
