document: rfc-9990
kind: normative-requirement
summary: A separate report MUST be generated for each DMARC Policy Domain encountered during the reporting period. Each report MUST contain data for only one DMARC Policy Domain and for one policy configuration; if multiple configurations were observed, the reporter SHOULD note only the final configuration.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
    - security
