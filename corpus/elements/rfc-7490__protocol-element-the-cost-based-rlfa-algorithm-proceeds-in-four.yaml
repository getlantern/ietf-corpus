document: rfc-7490
kind: protocol-element
summary: 'The cost-based RLFA algorithm proceeds in four steps: (1) compute forward SPF from self; (2) compute SPFs at each neighbor for extended P-space; (3) compute reverse SPF at the far-end node for Q-space; (4) intersect extended P-space and Q-space, excluding pseudonodes, to find valid tunnel endpoints.'
section: "5.3"
