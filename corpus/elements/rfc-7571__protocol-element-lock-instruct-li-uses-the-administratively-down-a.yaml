document: rfc-7571
kind: protocol-element
summary: Lock Instruct (LI) uses the Administratively down (A) bit in the ADMIN_STATUS Object (RFC3471, RFC3473) to indicate the lock/unlock status of an LSP. An LSP in lock mode is prevented from carrying user data traffic.
section: "2.1"
topics:
    - mpls
    - routing
