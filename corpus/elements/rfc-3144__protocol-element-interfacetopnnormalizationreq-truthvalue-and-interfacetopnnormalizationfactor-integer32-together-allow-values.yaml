document: rfc-3144
kind: protocol-element
summary: interfaceTopNNormalizationReq (TruthValue) and interfaceTopNNormalizationFactor (Integer32) together allow values to be scaled by (normalizationFactor / ifSpeed) before ranking, enabling meaningful comparison of counters across interfaces running at different speeds (e.g., 10/100/1000 Mbps).
