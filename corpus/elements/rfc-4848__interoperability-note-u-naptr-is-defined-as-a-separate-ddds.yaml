document: rfc-4848
kind: interoperability-note
summary: U-NAPTR is defined as a separate DDDS application from S-NAPTR and is not an update to S-NAPTR. Implementations supporting U-NAPTR must recognize the 'U' flag and the limited regex form; pure S-NAPTR implementations will not process 'U'-flagged NAPTR records correctly.
section: "1"
topics:
    - dns
