document: rfc-5082
kind: interoperability-note
summary: 'RFC 5082 adds a new requirement vs. RFC 3682: related messages (ICMP errors) must also be sent and checked to have TTL=255. RFC 3682 implementations that use a default TTL other than 255 for originated packets will have their ICMP messages classified as Dangerous under RFC 5082.'
section: "6.1"
topics:
    - security
    - ip
    - routing
