document: rfc-9491
kind: protocol-element
summary: The End.NSH behavior interrupts normal SRH packet processing (RFC 8754 Section 4.3.1.1) and does not continue to S16. When the packet returns from the SF, the SFF reattaches the cached IPv6 and SRH headers using the NSH SPI and SI, then resumes from S16.
section: "5.2"
topics:
    - routing
    - ip
