document: rfc-9685
kind: design-rationale
summary: A new RPL MOP 5 (Non-Storing multicast with ingress replication) is introduced rather than extending MOP 3 because MOP 3 requires Storing Mode for both unicast and multicast, which is impractical for typical LLN deployments that use Non-Storing MOP 1 for unicast. The ingress replication approach at the Root avoids requiring Storing mode state in intermediate routers.
section: "6.3"
topics:
    - routing
    - multicast
