document: rfc-7118
kind: normative-requirement
summary: The SIP WebSocket Client MUST include the value "sip" in the Sec-WebSocket-Protocol header in its handshake request, and the 101 reply from the server MUST contain "sip" in its corresponding Sec-WebSocket-Protocol header.
