document: rfc-7695
kind: security-consideration
summary: An attacker able to cause repetitive Node ID changes generates Flooding Mechanism traffic and multiple subroutine executions. An attacker spoofing another Node's Node ID impedes collision resolution. In environments where such attacks are possible, the subroutine execution SHOULD be rate limited.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
