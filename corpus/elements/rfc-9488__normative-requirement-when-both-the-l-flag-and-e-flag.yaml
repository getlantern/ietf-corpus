document: rfc-9488
kind: normative-requirement
summary: When both the L flag and E flag are set to 0, the PCE SHOULD consider the protection eligibility as UNPROTECTED PREFERRED but MAY treat it as UNPROTECTED MANDATORY, for example when the PCE detects (via out-of-band means) that it is interacting with a legacy PCC expecting legacy behavior.
section: "5"
rfc2119_level: SHOULD
topics:
