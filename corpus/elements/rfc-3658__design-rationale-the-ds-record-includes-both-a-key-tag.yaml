document: rfc-3658
kind: design-rationale
summary: The DS record includes both a key tag and a SHA-1 digest rather than just one, because two different mapping functions provide greater assurance than either alone. The algorithm and key tag fields allow resolvers to quickly identify candidate KEY records, and the compact format keeps delegation answer sizes small to reduce DNS message overflow probability.
section: 2.4.1
topics:
