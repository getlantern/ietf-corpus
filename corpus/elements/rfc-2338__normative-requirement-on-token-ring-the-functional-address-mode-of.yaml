document: rfc-2338
kind: normative-requirement
summary: On token ring, the functional address mode of operation MUST be implemented by routers supporting VRRP. VRID 1 maps to 03-00-02-00-00-00, with subsequent VRIDs mapping via (0x4000 >> (VRID-1)) in non-canonical format.
section: "9.2"
rfc2119_level: MUST
topics:
    - routing
