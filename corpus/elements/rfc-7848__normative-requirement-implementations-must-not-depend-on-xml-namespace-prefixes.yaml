document: rfc-7848
kind: normative-requirement
summary: Implementations MUST NOT depend on XML namespace prefixes (e.g., 'smd' or 'mark') and MUST instead employ a proper namespace-aware XML parser and serializer to interpret and output XML documents.
section: "1.1"
rfc2119_level: MUST NOT
