document: rfc-9485
kind: design-rationale
summary: I-Regexp intentionally supports only Boolean matching (not capture groups, lookahead, or backreferences) because parsing-regexp libraries accumulating these features have become susceptible to exploitable bugs and unpredictable performance leading to denial-of-service attacks.
