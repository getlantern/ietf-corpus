document: rfc-5934
kind: normative-requirement
summary: TAMP implementations MUST support validation of TAMP messages that are directly validated using a trust anchor (public key identifier mechanism). Support for validation via an X.509 certification path originating with a trust anchor is OPTIONAL.
section: "1.2"
rfc2119_level: MUST
topics:
    - security
    - pkix
