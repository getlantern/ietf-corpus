document: rfc-1629
kind: security-consideration
summary: IS-IS carries authentication information in all PDUs using a simple password scheme. Passwords may be associated with each link, each area, and the Level 2 subdomain; a router lacking the appropriate password is prohibited from initializing the link, joining the area, or participating in the Level 2 subdomain. The authentication functions are extensible to support future cryptographic schemes in an upwardly compatible fashion.
section: "3.2"
topics:
    - routing
    - security
