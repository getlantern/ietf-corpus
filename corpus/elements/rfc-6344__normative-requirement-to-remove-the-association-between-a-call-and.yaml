document: rfc-6344
kind: normative-requirement
summary: To remove the association between a call and a VCG, a Notify message MUST be sent with a VCAT TLV where Action is set to 3. When the association between a VCG and all existing calls has been removed, the VCG is considered torn down.
section: 5.3.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
