document: rfc-7139
kind: design-rationale
summary: The G-PID value 47 was renamed from 'G.709 ODUj' to 'ODU-2.5G' to clarify it applies specifically to 2.5 Gbps TS granularity, since the new ODU-1.25G (value 66) and ODU-any (value 67) G-PIDs are needed to distinguish 1.25 Gbps granularity interfaces introduced by G.709-2012.
