document: rfc-7023
kind: interoperability-note
summary: Ethernet Link OAM (IEEE 802.3) and E-LMI (MEF16) are optional mechanisms. E-LMI is applicable only for single-hop Ethernet ACs (without any 802.1Q/802.1ad-compliant bridges in between); CFM and Y.1731 mechanisms are applicable in all types of Ethernet ACs.
section: "2"
topics:
