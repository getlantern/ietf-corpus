kind: registry
summary: Four new cipher suite values ({0xD0,0x01}, {0xD0,0x02}, {0xD0,0x03}, {0xD0,0x05}) are registered in the 'TLS Cipher Suites' registry defined by RFC 8446 and RFC 8447. TLS_ECDHE_PSK_WITH_AES_128_CCM_8_SHA256 is marked not recommended; the other three are recommended.
