document: rfc-9363
kind: protocol-element
summary: 'The last fragment of a datagram carries a Reassembly Check Sequence (RCS); the default algorithm is CRC32 (4 bytes, identity rcs-crc32). For ACK-on-Error, the All-1 fragment behavior is configurable as: all-1-data-no (RCS only), all-1-data-yes (one tile plus RCS), or all-1-data-sender-choice (sender decides).'
section: 4.10.3
