document: rfc-6276
kind: normative-requirement
summary: A DHCPv6 relay agent function MUST be used at the mobile router when it is away from home. This relay agent is co-located with the DHCPv6 client function, and the client MUST hand any outbound DHCPv6 messages to the co-located relay agent.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
