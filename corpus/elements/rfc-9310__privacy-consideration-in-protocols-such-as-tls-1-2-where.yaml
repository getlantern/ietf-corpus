document: rfc-9310
kind: privacy-consideration
summary: In protocols such as TLS 1.2 where certificates are exchanged in the clear, inclusion of the NFTypes extension can help an observer determine which 5G network function systems are of most interest. TLS 1.3 encrypts certificates, mitigating this exposure.
