document: rfc-5222
kind: protocol-element
summary: The geodetic-2d location profile supports Point, Polygon, Circle, Ellipse, and ArcBand shapes. When a non-Point shape spans multiple service areas, a server MAY return multiple <mapping> elements; servers are not required to return all mappings to prevent denial-of-service via very large query areas.
section: "12.2"
topics:
    - realtime
