document: rfc-5760
kind: wire-format
summary: 'The General Statistics sub-report block (SRBT=10) reports three aggregated values: 8-bit median fraction lost (MFL), 24-bit highest cumulative number of packets lost (HCNL), and 32-bit median inter-arrival jitter. A value of all 1s in any field indicates that value is not provided.'
