document: rfc-7574
kind: design-rationale
summary: PPSPP uses LEDBAT (RFC 6817) for congestion control so that seeding after download completes runs as background traffic, allowing the user to continue other network tasks without disruption. LEDBAT's low-extra-delay property makes it well suited for this background upload role.
section: "1.1"
topics:
    - realtime
    - congestion
    - udp
