document: rfc-5027
kind: protocol-element
summary: The "send" direction tag means media stream security negotiation has reached a stage where the other party can correctly process (decrypt and/or integrity-check) media packets sent to them, including SRTP and SRTCP. The "recv" direction tag means the local party can correctly process media packets sent by the other party.
