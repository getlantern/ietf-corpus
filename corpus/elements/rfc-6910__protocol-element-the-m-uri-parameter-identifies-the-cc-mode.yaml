document: rfc-6910
kind: protocol-element
summary: 'The ''m'' URI parameter identifies the CC mode: ''m=NR'' (no reply, CCNR), ''m=BS'' (busy subscriber, CCBS), and ''m=NL'' (not logged in, CCNL). Implementations MUST accept CC operations where the ''m'' parameter is missing or has an unknown value and execute them as best they can.'
section: "7.1"
topics:
    - sip
    - voip
