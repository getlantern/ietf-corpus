document: rfc-2981
kind: security-consideration
summary: Security for monitoring remote objects depends on the Management Target MIB (RFC 2573). For local access, the system records the security credentials of the trigger entry creator and uses isAccessAllowed to enforce access control on all object accesses, including local ones.
