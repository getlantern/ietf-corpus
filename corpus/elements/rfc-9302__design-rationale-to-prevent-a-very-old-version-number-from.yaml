document: rfc-9302
kind: design-rationale
summary: To prevent a very old version number from being mistaken for a new one due to wrap-around in the circular space, operators should update mappings only when all active traffic uses the latest version, or wait at least one mapping TTL before reusing numbers.
section: "7"
topics:
