document: rfc-2003
kind: security-consideration
summary: IP encapsulation makes it difficult for border routers to filter datagrams based on header fields, because the original Source Address, Destination Address, Protocol, and transport port numbers are not in their normal positions after encapsulation. Border routers need to carefully examine all datagrams and be aware of IP encapsulation protocols.
section: "6"
topics:
    - security
    - ip
