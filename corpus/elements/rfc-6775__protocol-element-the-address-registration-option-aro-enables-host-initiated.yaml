document: rfc-6775
kind: protocol-element
summary: The Address Registration Option (ARO) enables host-initiated unicast address registration with routers, replacing multicast NS address resolution. The router maintains a Neighbor Cache registry keyed on registered addresses with explicit lifetimes, supporting sleeping hosts.
