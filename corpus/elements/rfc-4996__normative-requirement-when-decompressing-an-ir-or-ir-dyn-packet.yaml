document: rfc-4996
kind: normative-requirement
summary: When decompressing an IR or IR-DYN packet, the decompressor MUST validate header integrity using CRC-8. If validation fails, the packet MUST NOT be delivered to upper layers.
section: 5.3.1.1
rfc2119_level: MUST
