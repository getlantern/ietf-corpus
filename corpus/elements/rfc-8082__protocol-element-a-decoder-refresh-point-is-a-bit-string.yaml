document: rfc-8082
kind: protocol-element
summary: A Decoder Refresh Point is a bit string, packetized in one or more RTP packets, that completely resets the decoder to a known state. Examples include IDR pictures in H.264/H.265, keyframes in VP8/VP9, and Intra pictures in H.261/MPEG-1/2/4. It also contains all header information above the picture layer conveyed in-band, such as parameter set NAL units in H.264.
section: "3"
