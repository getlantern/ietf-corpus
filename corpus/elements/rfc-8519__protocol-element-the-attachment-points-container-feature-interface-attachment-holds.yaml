summary: 'The ''attachment-points'' container (feature: interface-attachment) holds a list of interfaces, each with separate ''ingress'' and ''egress'' sub-containers. Each direction carries an ordered list of ACL references (leafrefs to /acls/acl/name) and optional per-ACE interface statistics.'
