document: rfc-3062
kind: protocol-element
summary: The Password Modify operation is an LDAPv3 Extended Operation identified by the OID passwdModifyOID (1.3.6.1.4.1.4203.1.11.1). It allows directory clients to update user passwords independent of the authentication identity form or password storage mechanism.
