document: rfc-1508
kind: design-rationale
summary: GSS_CONTINUE_NEEDED status returns allow multi-message authentication sequences of different underlying mechanisms to be handled uniformly without separate code paths in callers. Continuation calls to GSS_Init_sec_context() and GSS_Accept_sec_context() also encapsulate mutual authentication within the context initiation calls.
section: 1.2.1
topics:
    - security
