document: rfc-9066
kind: privacy-consideration
summary: The DOTS Call Home protocol does not leak new information that can be used to ease surveillance. Attack identification information is encrypted and shared only with an authorized entity in the domain to which the IP address/prefix is assigned. The Call Home DOTS server is not required to share internal network identifiers with the Call Home DOTS client.
section: "9"
topics:
    - privacy
    - security
