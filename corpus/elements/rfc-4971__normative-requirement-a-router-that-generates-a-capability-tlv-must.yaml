document: rfc-4971
kind: normative-requirement
summary: A router that generates a CAPABILITY TLV MUST have a Router ID that is a 32-bit number, unique within the IS-IS area. If any capability TLVs with domain flooding scope are generated, the ID MUST also be unique within the IS-IS routing domain.
section: "3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
