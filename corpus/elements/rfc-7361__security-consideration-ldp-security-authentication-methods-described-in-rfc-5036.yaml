document: rfc-7361
kind: security-consideration
summary: LDP security (authentication) methods described in RFC 5036 are applicable. The extensions optimize MAC flushing and reduce overall risk; however, if support for the new MAC Flush TLV can be spoofed, sub-optimal (but not catastrophic) MAC flushing behavior will result. The specification has no impact on the VPLS data-plane forwarding.
section: "8"
topics:
    - mpls
    - security
