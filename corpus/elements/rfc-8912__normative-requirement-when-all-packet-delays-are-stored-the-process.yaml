document: rfc-8912
kind: normative-requirement
summary: When all packet delays are stored, the process that calculates delay values MUST enforce the Tmax threshold on stored values before calculations. Calculations on delay SHALL be performed on the conditional distribution, conditioned on successful packet arrival within Tmax.
section: 4.3.1
rfc2119_level: MUST
topics:
    - measurement
