document: rfc-7602
kind: interoperability-note
summary: 'Deployment is designed to be backward compatible without a flag day: ISs on a given interface are first configured in ''send'' mode, and only after all routers on the interface are in ''send'' mode is ''verify'' mode enabled. The reverse order applies when disabling ESN support.'
section: "5.1"
topics:
