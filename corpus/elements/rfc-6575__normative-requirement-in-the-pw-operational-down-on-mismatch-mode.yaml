document: rfc-6575
kind: normative-requirement
summary: In the PW operational-down-on-mismatch mode, if a PE supporting IPv6 has already sent a Label Mapping and does not receive a matching Stack Capability sub-TLV from the far-end, it MUST withdraw its PW label with LDP status code 0x0000004A ('IP Address Type Mismatch').
section: "6.1"
rfc2119_level: MUST
topics:
    - vpn
    - ip
