document: rfc-4483
kind: normative-requirement
summary: If a hash parameter is included, the recipient MUST check the indirect content against that hash and indicate any mismatch to the user. If the hash parameter is NOT included, the sender SHOULD use only URI schemes that offer message integrity such as https.
section: "7"
rfc2119_level: MUST
topics:
