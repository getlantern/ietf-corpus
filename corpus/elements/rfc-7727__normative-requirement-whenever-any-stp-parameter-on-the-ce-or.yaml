document: rfc-7727
kind: normative-requirement
summary: Whenever any STP parameter on the CE or PE side changes, the system MUST transmit an updated TLV for the affected STP instances. When administrative or operational state changes, the system MUST transmit an updated State TLV to its peers.
section: 4.2.3
rfc2119_level: MUST
topics:
    - routing
