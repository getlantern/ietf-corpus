document: rfc-8064
kind: protocol-element
summary: The Interface Identifier (IID) is the lower 64 bits of a 128-bit IPv6 address used in SLAAC (RFC 4862). Traditionally formed from a Modified EUI-64 representation of the link-layer address per RFC 4291 Appendix A; this document changes the recommended default generation method to RFC 7217.
