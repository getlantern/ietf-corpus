summary: 'The Split-Horizon Type (SHT) field occupies the two high-order bits (bits 6 and 7) of the Flags octet in the ESI Label Extended Community. Values are: 00=Default SHT (backwards compatible), 01=Local Bias, 10=ESI Label-based filtering, 11=Unassigned.'
