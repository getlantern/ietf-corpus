document: rfc-9353
kind: security-consideration
summary: The new capability flag bits defined in this document are susceptible to a downgrade attack by setting them to zero, and Key-ID or KEY-CHAIN-NAME content can be altered to enable an on-path attack. IGP authentication and integrity (RFC 5304, 5310, or 5709) MUST be in place before advertising these parameters.
section: "7"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
