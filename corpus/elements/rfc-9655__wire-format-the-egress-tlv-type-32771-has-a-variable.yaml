document: rfc-9655
kind: wire-format
summary: 'The Egress TLV (Type=32771) has a variable-length Address field: 4 octets for IPv4 addresses and 16 octets for IPv6 addresses. The Length field excludes the Type and Length fields themselves. The TLV MUST appear before the Target FEC Stack TLV in the MPLS echo request packet.'
section: "3"
topics:
