document: rfc-2370
kind: protocol-element
summary: The OSPF neighbor structure is extended with a Neighbor Options field entry for Opaque capability, learned during the Database Exchange process via the neighbor's Database Description packets. This field determines whether Opaque LSAs are flooded to that neighbor.
section: "4.1"
topics:
