document: rfc-5261
kind: normative-requirement
summary: Specifications referencing this framework's schema types MUST define the full XML diff format with an appropriate MIME type and character set (e.g., UTF-8). Instance document elements based on these schema type definitions MUST be well-formed and SHOULD be valid.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
