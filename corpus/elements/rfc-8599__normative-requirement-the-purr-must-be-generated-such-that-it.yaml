document: rfc-8599
kind: normative-requirement
summary: The PURR MUST be generated such that it is unforgeable, anonymous, and unlinkable to entities other than the proxy. It must not be possible for an attacker to generate a valid PURR, associate a PURR with a specific user, or determine when two PURRs correspond to the same user.
section: 6.2.1
rfc2119_level: MUST
topics:
    - sip
    - privacy
    - security
    - crypto
