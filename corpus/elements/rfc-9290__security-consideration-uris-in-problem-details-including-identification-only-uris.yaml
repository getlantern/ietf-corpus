document: rfc-9290
kind: security-consideration
summary: URIs in problem details (including identification-only URIs for custom entries and the 'instance' URI) must not be automatically dereferenced, as doing so can cause information disclosure through tracking. Implementations must determine which client component may dereference and which servers are trusted.
