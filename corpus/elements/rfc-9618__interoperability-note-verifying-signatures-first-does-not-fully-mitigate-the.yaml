document: rfc-9618
kind: interoperability-note
summary: Verifying signatures first does not fully mitigate the attack for applications that evaluate untrusted PKIs (e.g., hosting providers accepting customer-supplied PKIs) or trusted PKIs containing technically constrained intermediates that do not constrain policy mapping or path length.
