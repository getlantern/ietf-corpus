document: rfc-9808
kind: normative-requirement
summary: The 'name' of a Telemetry Source Metric Object MUST be unique among metric objects within the containing Telemetry Source and MUST remain consistent for the same source reference across advertisements. Absence of 'data-percentile' indicates the data MUST be the mean over the time-granularity.
section: 2.1.1.2
rfc2119_level: MUST
topics:
