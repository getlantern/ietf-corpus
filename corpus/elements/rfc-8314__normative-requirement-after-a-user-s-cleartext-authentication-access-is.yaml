document: rfc-8314
kind: normative-requirement
summary: After a user's cleartext authentication access is revoked, the server MUST NOT provide any indication over a cleartext channel of whether the user's credentials were valid. Both invalid and valid credentials MUST result in the same access-denied indication.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
