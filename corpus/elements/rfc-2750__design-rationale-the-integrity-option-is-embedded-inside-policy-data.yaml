document: rfc-2750
kind: design-rationale
summary: The INTEGRITY option is embedded inside POLICY_DATA (rather than relying solely on RSVP-level integrity) because boundary PEPs separated by untrusted PIN nodes need a security channel that bypasses intermediate nodes that are RSVP-trusted but not policy-trusted.
section: "3.2"
