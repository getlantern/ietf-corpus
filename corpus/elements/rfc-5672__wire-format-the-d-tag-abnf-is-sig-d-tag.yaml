summary: 'The d= tag ABNF is: sig-d-tag = %x64 [FWS] "=" [FWS] domain-name; domain-name = sub-domain 1*(".") sub-domain, derived from RFC 5321 Domain but excluding address-literal. This corrects the earlier reference to RFC 2821.'
