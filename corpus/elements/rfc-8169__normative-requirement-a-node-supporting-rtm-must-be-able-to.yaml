document: rfc-8169
kind: normative-requirement
summary: A node supporting RTM MUST be able to act in two-step mode and MAY also support one-step mode. When advertising RTM capability in an IGP, the sub-TLV MUST reflect the actual RTM capability of the advertised interface.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
