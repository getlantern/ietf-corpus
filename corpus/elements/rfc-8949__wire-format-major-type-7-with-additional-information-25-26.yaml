summary: Major type 7 with additional information 25/26/27 encodes IEEE 754 half-precision (16-bit), single-precision (32-bit), or double-precision (64-bit) floating-point values in the following bytes. Additional info 0–23 encodes simple values directly; value 24 is a one-byte extension for simple values 32–255.
