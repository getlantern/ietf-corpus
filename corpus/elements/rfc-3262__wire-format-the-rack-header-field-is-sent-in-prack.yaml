document: rfc-3262
kind: wire-format
summary: 'The RAck header field is sent in PRACK requests and contains three fields: the RSeq value from the provisional response being acknowledged, the CSeq number from that response, and the CSeq method. BNF: RAck = "RAck" HCOLON response-num LWS CSeq-num LWS Method. Example: RAck: 776656 1 INVITE.'
section: "7.2"
topics:
    - sip
    - realtime
