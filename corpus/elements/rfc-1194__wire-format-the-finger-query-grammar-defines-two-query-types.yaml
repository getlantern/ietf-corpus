document: rfc-1194
kind: wire-format
summary: 'The Finger query grammar defines two query types: {Q1} ::= [{U}] [/W] {C} for local queries, and {Q2} ::= [{U}]{H} [/W] {C} for forwarded queries, where {H} ::= @hostname | @hostname{H} (recursive), {U} is a username, and {C} is CRLF.'
section: "2.3"
