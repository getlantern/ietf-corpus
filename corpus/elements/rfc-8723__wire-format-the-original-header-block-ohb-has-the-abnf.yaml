document: rfc-8723
kind: wire-format
summary: 'The Original Header Block (OHB) has the ABNF form: OHB = [PT] [SEQ] Config. The optional PT field is 1 octet, the optional SEQ field is 2 octets, and the mandatory Config field is 1 octet. An all-zero Config octet (0x00) indicates no modifications were made.'
