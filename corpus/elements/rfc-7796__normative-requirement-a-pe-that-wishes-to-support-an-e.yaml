document: rfc-7796
kind: normative-requirement
summary: A PE that wishes to support an E-Tree service MUST include an E-Tree sub-TLV in its PW Label Mapping message, providing its local root VLAN ID and leaf VLAN ID. A PE capable of VLAN mapping MUST set the V bit to 1.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
