document: rfc-9795
kind: normative-requirement
summary: For the "jcl" (linked jCard) case, the "rcdi" claim MUST include a "/jcl" key/digest entry protecting the referenced jCard object, and each URI referenced within that jCard MUST have a corresponding JSON pointer key and digest in "rcdi".
section: 6.1.4
rfc2119_level: MUST
topics:
    - crypto
    - json
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
