document: rfc-4874
kind: wire-format
summary: 'The XRO wire format is Class 232, C_Type 1, and consists of a variable-length sequence of subobjects. Supported subobject types are: 1 (IPv4 prefix), 2 (IPv6 prefix), 4 (Unnumbered Interface ID), 32 (Autonomous System Number), 34 (SRLG). The L bit in each subobject is repurposed from loose/strict to indicate mandatory exclusion (L=0, MUST exclude) or soft avoidance (L=1, SHOULD avoid).'
section: "3.1"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
