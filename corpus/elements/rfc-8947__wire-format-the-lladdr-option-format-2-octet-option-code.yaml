document: rfc-8947
kind: wire-format
summary: 'The LLADDR option format: 2-octet option-code (139), 2-octet option-len (12 + link-layer-len + LLaddr-options length), 2-octet link-layer-type (IANA hardware type), 2-octet link-layer-len, variable link-layer-address field, 4-octet extra-addresses (unsigned integer), 4-octet valid-lifetime (seconds), followed by LLaddr-options.'
