document: rfc-7532
kind: design-rationale
summary: Version 1 UUIDs were deprecated in favor of version 4 because virtual machines do not depend on unique physical MAC addresses and administrators can modify physical MAC addresses. Since FSN/FSL UUIDs are readable by unauthenticated users, version 1 UUIDs would also expose MAC addresses and timestamps to attackers.
section: "2.12"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
