document: rfc-4204
kind: state-machine
summary: 'The Data Link FSM defines five states: Down (not in service), Test (sending Test messages over the link), PasvTest (listening for Test messages), Up/Free (verified and in service, not allocated), and Up/Alloc (allocated for data traffic). Separate active-mode and passive-mode FSM descriptions cover the transmit and receive directions respectively.'
section: "11.3"
topics:
    - routing
