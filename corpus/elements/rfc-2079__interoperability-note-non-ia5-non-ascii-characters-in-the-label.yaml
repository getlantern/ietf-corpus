document: rfc-2079
kind: interoperability-note
summary: Non-IA5 (non-ASCII) characters in the label are discouraged because not all directory clients may handle them consistently. If included, they should use X.500/T.61 encoding conventions, not HTML escape sequences.
section: Discussion of the labeledURI Attribute Type
