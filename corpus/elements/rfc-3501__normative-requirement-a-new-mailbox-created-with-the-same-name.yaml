document: rfc-3501
kind: normative-requirement
summary: A new mailbox created with the same name as a deleted mailbox MUST have UIDs greater than any UIDs used in the previous incarnation, unless the new incarnation has a different UIDVALIDITY value. The highest-used UID of a deleted mailbox MUST be preserved.
section: 6.3.4
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
