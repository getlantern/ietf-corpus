document: rfc-5858
kind: normative-requirement
summary: The SPD and SAD MUST be extended to include ROHC-relevant parameters to support ROHCoIPsec. These extensions do not affect existing SPD fields or SAD parameters, preserving backwards compatibility with non-ROHC IPsec implementations.
