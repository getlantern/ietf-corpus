document: rfc-1521
kind: registry
summary: IANA maintains registries for MIME Content-Type/subtype values and for access-type values for Message/External-Body. New standard subtypes require a published specification and IANA approval per Appendix E. The entire content-transfer-encoding namespace (except 'X-' tokens) is reserved to IANA for future use.
