document: rfc-4644
kind: wire-format
summary: TAKETHIS article data is sent as a multi-line data block immediately following the CRLF of the command line. A single '.' on a line terminates the block; lines beginning with '.' in the original text have that dot doubled during transmission.
section: 2.5.2
