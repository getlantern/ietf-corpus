document: rfc-5121
kind: protocol-element
summary: The IPv6 link in 802.16 is defined as the collection of transport connections (CIDs) and, when the AR is separate from the BS, GRE tunnels between BS and AR. The granularity of the GRE tunnel SHOULD be no greater than per-MS or per-service-flow. Each MS belongs to a distinct point-to-point link.
section: "6.1"
topics:
    - ip
    - v6ops
