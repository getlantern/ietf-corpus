document: rfc-9240
kind: interoperability-note
summary: Property maps and filtered property maps cover the functionality of RFC 7285's Endpoint Property Service. ALTO servers may prefer to provide property maps instead of EPS, but it is recommended that they also retain the EPS to support legacy ALTO clients that do not implement this extension.
section: "9.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
