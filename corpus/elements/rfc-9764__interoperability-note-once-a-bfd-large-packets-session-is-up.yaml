document: rfc-9764
kind: interoperability-note
summary: Once a BFD Large Packets session is Up, if the Path MTU drops below the tested MTU the session goes Down. Conversely, if the Path MTU increases, the BFD session continues unaffected — the mechanism only ensures the minimally acceptable MTU is usable.
section: "4.4"
topics:
    - routing
