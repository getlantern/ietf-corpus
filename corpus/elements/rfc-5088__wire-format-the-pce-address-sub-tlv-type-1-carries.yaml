document: rfc-5088
kind: wire-format
summary: The PCE-ADDRESS sub-TLV (type=1) carries the IP address used to reach the PCE. Length is 8 octets for IPv4 and 20 octets for IPv6. The value field contains a 2-octet address-type (1=IPv4, 2=IPv6), 2-octet reserved field, and the PCE IP address.
section: "4.1"
topics:
    - routing
