document: rfc-9418
kind: normative-requirement
summary: A subservice declaration MUST provide a `type` (identityref derived from `subservice-base`) and an `id` (string unique among subservices of the same type). Together, `type` and `id` form the unique key for a subservice instance.
section: "3.2"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
