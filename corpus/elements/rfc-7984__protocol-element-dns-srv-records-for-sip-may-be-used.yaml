document: rfc-7984
kind: protocol-element
summary: DNS SRV records for SIP may be used to indicate address family preference by assigning lower priority values to SRV records whose targets resolve only in the preferred address family (e.g., IPv6-only targets at priority 10, dual-stack targets at priority 20).
section: "3.2"
