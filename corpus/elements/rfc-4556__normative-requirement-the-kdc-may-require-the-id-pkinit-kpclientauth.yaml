document: rfc-4556
kind: normative-requirement
summary: The KDC MAY require the id-pkinit-KPClientAuth EKU in client certificates; the digitalSignature key usage bit MUST be asserted when this EKU is present. If required but absent or inconsistent, return KDC_ERR_INCONSISTENT_KEY_PURPOSE. KDCs SHOULD also accept id-ms-kp-sc-logon (1.3.6.1.4.1.311.20.2.2) for compatibility with deployed certificates.
section: 3.2.2
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
