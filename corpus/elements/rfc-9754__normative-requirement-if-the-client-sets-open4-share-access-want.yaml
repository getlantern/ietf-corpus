document: rfc-9754
kind: normative-requirement
summary: If the client sets OPEN4_SHARE_ACCESS_WANT_DELEG_TIMESTAMPS in an OPEN operation, it MUST support fattr4_time_deleg_access and fattr4_time_deleg_modify in both CB_GETATTR and SETATTR operations.
section: "5"
rfc2119_level: MUST
