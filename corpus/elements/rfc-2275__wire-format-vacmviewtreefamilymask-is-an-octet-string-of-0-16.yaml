document: rfc-2275
kind: wire-format
summary: vacmViewTreeFamilyMask is an OCTET STRING of 0..16 bytes where each bit corresponds to a sub-identifier of vacmViewTreeFamilySubtree; a '1' bit requires exact match and a '0' bit is a wildcard. If the mask is shorter than the subtree length it is extended with 1's; a zero-length mask results in all-1's (no wildcards).
