document: rfc-5811
kind: design-rationale
summary: Three separate SCTP sockets (one per priority channel) are used instead of three SCTP streams over a single socket to avoid head-of-line blocking. Lower-priority unreliable packets on a single socket could block higher-priority reliable packets under congestion for an indeterminate period.
section: 4.2.1.1
topics:
    - sctp
    - routing
    - qos
