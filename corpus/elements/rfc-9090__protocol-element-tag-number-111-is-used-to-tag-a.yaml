document: rfc-9090
kind: protocol-element
summary: Tag number 111 is used to tag a CBOR byte string, array, or map as the BER encoding of an absolute object identifier (OID). The byte string content must be the value part of a BER-encoded OID per X.690 Clause 8.19.
