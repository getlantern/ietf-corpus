document: rfc-5092
kind: normative-requirement
summary: If an IMAP server allows mailbox names starting with './' or '../', ending with '/.' or '/..' , or containing '/../' or '/./', then such mailbox names MUST be percent-encoded to avoid misinterpretation as dot-segments during relative path resolution.
section: "7"
rfc2119_level: MUST
topics:
    - email
