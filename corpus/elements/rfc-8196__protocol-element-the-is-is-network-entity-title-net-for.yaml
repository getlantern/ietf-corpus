document: rfc-8196
kind: protocol-element
summary: The IS-IS Network Entity Title (NET) for autoconfiguration consists of a 13-octet area address set to all 0s followed by a 6-octet System ID. The special all-zeros area address distinguishes autoconfigured routers from manually configured ones.
section: "3.2"
