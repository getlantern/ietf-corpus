document: rfc-5603
kind: interoperability-note
summary: When pwEnetVlanMode is removeVlan, the service-delimiting VLAN field is stripped from PW-bound packets, which causes loss of Ethernet PRI (priority) bits transparency. Implementations and operators must account for this when CoS or QoS treatment based on PRI bits is required.
section: "10"
topics:
    - snmp
    - mpls
    - qos
