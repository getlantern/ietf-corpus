document: rfc-7727
kind: wire-format
summary: The STP Connect TLV wire format includes U=F=0 bits, Type=0x2000 (16 bits), Length (16 bits), Protocol Version (16 bits), A-bit (1 bit), Reserved (15 bits), and optional Sub-TLVs. No optional Sub-TLVs are defined for version 0x0001.
