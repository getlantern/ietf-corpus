document: rfc-7741
kind: design-rationale
summary: The sender may choose either 7-bit or 15-bit PictureID and may switch from 7-bit to 15-bit after wrap rather than resetting; the receiver must not assume a fixed size. This design allows flexibility for both short-lived and long-running sessions without pre-negotiation of PictureID width.
section: "4.2"
topics:
    - rtp
    - realtime
