document: rfc-1284
kind: protocol-element
summary: dot3CollTable (dot3 5) is the optional Ethernet-like Collision Statistics group providing a per-interface collision histogram. Each entry, indexed by (dot3CollIndex, dot3CollCount), holds dot3CollFrequencies — a count of MAC frames accompanied by exactly dot3CollCount (1–16) collisions.
