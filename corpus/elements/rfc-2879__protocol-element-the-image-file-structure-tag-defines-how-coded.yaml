document: rfc-2879
kind: protocol-element
summary: 'The ''image-file-structure'' tag defines how coded image data is wrapped: TIFF (full Adobe TIFF), TIFF-limited (restricted IFD placement per RFC 2301 §4.4.6), TIFF-minimal (minimal B&W mode, also known as TIFF-S), TIFF-MRC (augmented with sub-IFD for Mixed Raster Content, also known as TIFF-M), and TIFF-MRC-limited.'
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
