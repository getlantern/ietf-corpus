document: rfc-6263
kind: protocol-element
summary: The RTP packet with unknown payload type keepalive (Section 4.6) uses 0-length payload, a dynamic payload type not negotiated in SDP, increments sequence number by one per packet, uses the same timestamp value as a media packet would have, sets marker bit to zero, and uses the same SSRC as the media stream.
section: "4.6"
topics:
