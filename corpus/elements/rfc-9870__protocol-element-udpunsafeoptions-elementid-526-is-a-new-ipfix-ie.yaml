kind: protocol-element
summary: udpUnsafeOptions (ElementID 526) is a new IPFIX IE that exports observed UNSAFE UDP Options (Kind 192-255) in a Flow as a 64-bit bitmap. Kind 192 maps to the least significant bit and Kind 255 to the most significant bit.
