document: rfc-9442
kind: normative-requirement
summary: For Downlink frames, the payload length MUST be 64 bits (8 bytes). If less information bits are to be transmitted, padding MUST be used with bits equal to 0. The receiver MUST remove the added padding bits before the SCHC reassembly process.
section: "3.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
