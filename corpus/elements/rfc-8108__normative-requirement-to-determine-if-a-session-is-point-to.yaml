document: rfc-8108
kind: normative-requirement
summary: To determine if a session is point-to-point or multiparty, an endpoint MUST count distinct RTCP SDES CNAME values across received RTP and RTCP packets. Endpoints MUST NOT base this determination on connection type (unicast/multicast) or number of SSRCs received.
section: 5.4.2
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
