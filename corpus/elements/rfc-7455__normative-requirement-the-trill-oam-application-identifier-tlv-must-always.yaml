document: rfc-7455
kind: normative-requirement
summary: The TRILL OAM Application Identifier TLV MUST always be present and MUST be the first TLV in every TRILL OAM message. Any TRILL OAM message that does not include this TLV as the first TLV MUST be discarded by a TRILL MP.
section: 8.4.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
