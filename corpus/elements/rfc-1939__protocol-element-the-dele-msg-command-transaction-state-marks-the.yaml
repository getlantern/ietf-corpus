document: rfc-1939
kind: protocol-element
summary: The DELE msg command (TRANSACTION state) marks the specified message as deleted; actual deletion is deferred until the UPDATE state. Any subsequent reference to the message-number generates an error. RSET unmarks all deleted messages.
