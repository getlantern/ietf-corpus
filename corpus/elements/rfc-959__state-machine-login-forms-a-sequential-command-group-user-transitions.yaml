document: rfc-959
kind: state-machine
summary: 'Login forms a sequential command group: USER transitions to needing password (331) or completes login (230); PASS transitions to logged in (230), needing account (332), or fails; ACCT completes login (230) or is rejected. A failure at any point requires repeating the entire sequence. REIN resets all parameters to defaults while preserving in-progress transfers, returning to the post-connection state.'
section: 4.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
