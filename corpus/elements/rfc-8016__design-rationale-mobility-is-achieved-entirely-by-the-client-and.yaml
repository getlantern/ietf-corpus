document: rfc-8016
kind: design-rationale
summary: Mobility is achieved entirely by the client and TURN server; the remote peer does not need to support mobility or be aware of address changes. This design hides the IP address change from upper-layer protocols and peer endpoints, avoiding the costly ICE re-negotiation required under the existing TURN specification.
section: "1"
topics:
    - nat
