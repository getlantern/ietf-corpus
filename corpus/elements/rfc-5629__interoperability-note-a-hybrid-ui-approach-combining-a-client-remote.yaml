document: rfc-5629
kind: interoperability-note
summary: 'A hybrid UI approach combining a client-remote UI for prompts with a KPML client-local UI for digit collection is explicitly discouraged: it complicates the application by requiring deduplication of keypad input (sent to both media stream and KPML), and eliminates the primary bandwidth-saving benefit of KPML since a media stream is already present.'
section: "5.3"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
