document: rfc-3585
kind: interoperability-note
summary: The information model is designed so that additional key exchange protocols beyond IKE can be integrated by subclassing SANegotiationAction; only IKENegotiationAction is currently defined. The object-oriented inheritance from PCIM/PCIMe also allows future IPsec extensions to be added without restructuring existing classes.
section: "6.9"
topics:
    - ipsec
    - security
