summary: 'PwStatus is a BITS type with five fault flags: pwNotForwarding(0), servicePwRxFault(1), servicePwTxFault(2), psnPwRxFault(3), psnPwTxFault(4). No bits set indicates no faults; bits indicate faults in specific directions or layers affecting the PW.'
