kind: protocol-element
summary: AEAD_AES_128_CCM_8 (algorithm identifier 18) is identical to AEAD_AES_128_CCM except it uses an 8-octet authentication tag instead of 16 octets. The ciphertext is exactly 8 octets longer than the corresponding plaintext.
