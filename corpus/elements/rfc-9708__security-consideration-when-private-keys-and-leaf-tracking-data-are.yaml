document: rfc-9708
kind: security-consideration
summary: When private keys and leaf-tracking data are stored on non-volatile media or in VM environments, failed writes, VM snapshots or cloning can cause one-time keys to be reused, enabling signature forgery. Operational procedures must ensure confidentiality and integrity of both the key and its tracking data.
section: "6"
topics:
    - crypto
    - security
