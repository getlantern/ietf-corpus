document: rfc-6425
kind: normative-requirement
summary: The IPv4 or IPv6 Egress Address P2MP Responder sub-TLV SHOULD NOT be used with an echo request carrying a Multicast LDP FEC Stack sub-TLV, because upstream LSRs in Multicast LDP have no way to know the identity of downstream leaf nodes.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
