document: rfc-7291
kind: design-rationale
summary: IPv4-mapped IPv6 addresses are permitted in OPTION_V6_PCP_SERVER to accommodate deployments where IPv4 connectivity is provided while only DHCPv6 is in use, such as an IPv4-only PCP server in a Dual-Stack Lite (DS-Lite) context. This mirrors the logic in RFC 6887 Section 5.
section: "5"
topics:
    - pcp
    - ip
    - v6ops
