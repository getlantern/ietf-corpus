document: rfc-5250
kind: protocol-element
summary: An Opaque capability flag is added to the global OSPF router data structure indicating whether the router is running the Opaque option (capable of storing Opaque LSAs). An Opaque capability flag is also added to the OSPF neighbor structure, learned during Database Exchange by examining the O-bit in the neighbor's Database Description packets.
section: "4"
topics:
