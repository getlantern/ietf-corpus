document: rfc-4004
kind: protocol-element
summary: 'The MIP-Feature-Vector AVP (AVP Code 337, type Unsigned32) carries nine defined flag bits: Mobile-Node-Home-Address-Requested (1), Home-Address-Allocatable-Only-in-Home-Realm (2), Home-Agent-Requested (4), Foreign-Home-Agent-Available (8), MN-HA-Key-Request (16), MN-FA-Key-Request (32), FA-HA-Key-Request (64), Home-Agent-In-Foreign-Network (128), Co-Located-Mobile-Node (256).'
