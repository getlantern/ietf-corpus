document: rfc-2253
kind: protocol-element
summary: Each AttributeTypeAndValue is encoded as the AttributeType string, followed by '=' (ASCII 61), followed by the encoded AttributeValue. If the AttributeType is in the published LDAP attribute table, the short name is used; otherwise the dotted-decimal OID encoding is used.
