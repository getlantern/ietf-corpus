document: rfc-5696
kind: normative-requirement
summary: Experimental encoding schemes MUST interpret the 00 codepoint as not-PCN and MUST NOT change it; the 11 codepoint MUST indicate PCN-marking by one or both meters; once set to 11, it MUST NOT be changed to any other codepoint.
section: "5"
rfc2119_level: MUST
topics:
