document: rfc-2815
kind: interoperability-note
summary: Controlled Load service has less stringent path requirements than Guaranteed Service, but switches must still provide differential queuing and buffering for CL flows over best effort. Where non-QoS-capable devices exist, policing must be approximated at network edges.
