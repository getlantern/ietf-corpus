document: rfc-4090
kind: protocol-element
summary: 'Two new RRO IPv4/IPv6 sub-object flags: ''Bandwidth protection'' (0x04) indicates the backup path guarantees the desired bandwidth; ''Node protection'' (0x08) indicates the backup path protects against failure of the immediate downstream node. PLRs set or clear these to report actual protection status.'
section: "4.4"
topics:
    - mpls
    - routing
