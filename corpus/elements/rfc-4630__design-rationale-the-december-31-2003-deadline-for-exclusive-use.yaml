document: rfc-4630
kind: design-rationale
summary: The December 31, 2003 deadline for exclusive use of UTF8String was removed because implementation and deployment experience showed that many existing certificates use PrintableString, and forcing UTF8String-only would break interoperability with the vast bulk of already-deployed certificates.
