document: rfc-5251
kind: protocol-element
summary: Each PE maintains a Port Information Table (PIT) per L1VPN, containing <CPI, PPI> tuples for all ports within that VPN. For local PE ports the tuple also includes the VPN-PPI. The PIT may be populated via provisioning or auto-discovery procedures (e.g., LMP or BGP/OSPF-based mechanisms).
section: "4.1"
topics:
    - vpn
    - mpls
