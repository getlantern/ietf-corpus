document: rfc-4576
kind: normative-requirement
summary: When a PE receives from a CE router a type 3, 5, or 7 LSA with the DN bit set, the information from that LSA MUST NOT be used during the OSPF route calculation, preventing it from being translated into a BGP route.
section: "4"
rfc2119_level: MUST NOT
topics:
    - routing
    - vpn
    - mpls
    - bgp
