document: rfc-3986
kind: security-consideration
summary: Back-end systems that decode percent-encoded URIs before parsing component boundaries introduce path traversal and injection risks. Percent-encoded octets must not be decoded until the relevant component has been fully parsed and separated from its delimiters.
section: "7.3"
topics:
    - security
