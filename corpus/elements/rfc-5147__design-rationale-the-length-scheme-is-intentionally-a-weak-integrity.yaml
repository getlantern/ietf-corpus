document: rfc-5147
kind: design-rationale
summary: The 'length' scheme is intentionally a weak integrity check, included because it is easy to compute. The 'md5' scheme provides a stronger check using the MD5 algorithm (RFC 1321), encoded as 32 hexadecimal digits representing the 128-bit result.
section: "3.1"
