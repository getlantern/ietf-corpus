document: rfc-6958
kind: normative-requirement
summary: For measured values that exceed the maximum representable value, 0xFFFFFE (24-bit fields) or 0xFFFE (16-bit) or 0xFFFFFFFFE (36-bit) MUST be reported to indicate over-range. If measurement is unavailable, the all-ones sentinel MUST be reported.
section: "3.2"
rfc2119_level: MUST
topics:
