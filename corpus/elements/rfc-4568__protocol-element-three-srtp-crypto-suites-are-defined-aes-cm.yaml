document: rfc-4568
kind: protocol-element
summary: 'Three SRTP crypto-suites are defined: AES_CM_128_HMAC_SHA1_80 (128-bit key, 80-bit SRTP auth tag), AES_CM_128_HMAC_SHA1_32 (128-bit key, 32-bit SRTP auth tag), and F8_128_HMAC_SHA1_80 (128-bit key, AES f8 cipher, 80-bit auth tag). All use 128-bit master keys, 112-bit master salts, HMAC-SHA1, and 160-bit auth keys.'
section: "6.2"
topics:
