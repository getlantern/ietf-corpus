document: rfc-2197
kind: protocol-element
summary: Commands RSET, MAIL FROM, SEND FROM, SOML FROM, SAML FROM, and RCPT TO may appear anywhere in a pipelined command group. EHLO, DATA, VRFY, EXPN, TURN, QUIT, and NOOP may only appear as the last command in a group because their success or failure produces a state change the client must accommodate.
section: "4.1"
topics:
    - email
