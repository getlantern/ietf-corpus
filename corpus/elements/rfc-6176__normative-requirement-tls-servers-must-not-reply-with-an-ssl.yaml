document: rfc-6176
kind: normative-requirement
summary: TLS servers MUST NOT reply with an SSL 2.0 SERVER-HELLO with a protocol version less than { 0x03, 0x00 }; instead they MUST abort the connection when the highest protocol version offered by the client is { 0x02, 0x00 }.
section: "3"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
