document: rfc-7578
kind: normative-requirement
summary: Each part MUST contain a Content-Disposition header field with disposition type 'form-data'. The Content-Disposition header field MUST also contain an additional 'name' parameter whose value is the original field name from the form.
section: "4.2"
rfc2119_level: MUST
