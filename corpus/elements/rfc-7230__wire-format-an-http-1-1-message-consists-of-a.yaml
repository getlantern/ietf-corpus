document: rfc-7230
kind: wire-format
summary: 'An HTTP/1.1 message consists of a start-line, zero or more header fields each terminated by CRLF, an empty line (CRLF), and an optional message body: `HTTP-message = start-line *( header-field CRLF ) CRLF [ message-body ]`.'
