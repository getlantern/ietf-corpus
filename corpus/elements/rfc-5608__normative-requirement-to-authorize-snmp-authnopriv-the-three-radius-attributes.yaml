document: rfc-5608
kind: normative-requirement
summary: To authorize SNMP authNoPriv, the three RADIUS attributes MUST optionally be used with Management-Transport-Protection=No-Protection; there is no RADIUS combination equivalent to noAuthNoPriv since RADIUS always requires user authentication.
section: "2.3"
rfc2119_level: MUST
topics:
    - radius
    - snmp
