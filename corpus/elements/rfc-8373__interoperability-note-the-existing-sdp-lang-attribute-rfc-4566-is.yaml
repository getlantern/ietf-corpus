document: rfc-8373
kind: interoperability-note
summary: The existing SDP 'lang' attribute (RFC 4566) is similar but insufficiently specific and flexible; it is not mentioned in RFC 3264 and has no known SIP implementations, which is why the new 'hlang-send' and 'hlang-recv' attributes are defined instead.
