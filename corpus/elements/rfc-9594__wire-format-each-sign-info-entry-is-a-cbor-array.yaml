document: rfc-9594
kind: wire-format
summary: 'Each ''sign_info_entry'' is a CBOR array of five elements: ''id'' (tstr or array of tstr group names), ''sign_alg'' (int or tstr from COSE Algorithms registry), ''sign_parameters'' (CBOR array), ''sign_key_parameters'' (CBOR array of at least one element), and ''cred_fmt'' (int from COSE Header Parameters registry, or null if KDC does not store member credentials).'
section: 3.3.1
