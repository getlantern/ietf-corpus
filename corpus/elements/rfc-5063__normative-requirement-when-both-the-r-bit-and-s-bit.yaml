document: rfc-5063
kind: normative-requirement
summary: When both the R-bit and S-bit are set in the restarted node's Capability object, the downstream RSVP neighbor MUST follow the Srefresh generation procedures in Section 5.3.1. If the S-bit is cleared, it MUST revert to normal RecoveryPath procedures in Section 4.5.1. If R-bit is cleared but S-bit is set, it MUST treat the S-bit as cleared.
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
