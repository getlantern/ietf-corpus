document: rfc-9525
kind: security-consideration
summary: 'The set of names in a certificate defines the set of names affected by a compromise of any server in that set: the strength of the certificate is determined by the weakest server that presents any of those names. Service providers SHOULD request certificates with as few identifiers as necessary to identify a single service.'
section: "7.5"
topics:
    - tls
    - pkix
    - security
