document: rfc-8870
kind: normative-requirement
summary: The ekt_key_value MUST NOT be used for encrypting or decrypting information after the TTL (ekt_ttl) expires. To mitigate the risk of an attacker blocking EKTKey updates, the lifetime of the EKTKey MUST be limited using ekt_ttl.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
