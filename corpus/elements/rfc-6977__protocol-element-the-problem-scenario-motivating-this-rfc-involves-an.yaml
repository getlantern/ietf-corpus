document: rfc-6977
kind: protocol-element
summary: The problem scenario motivating this RFC involves an RSOO (Relay-Supplied Options option, RFC 6422) carrying configuration data (e.g., DS-Lite tunnel name) that can change via a RADIUS CoA message to the NAS/relay agent, but the DHCPv6 server has no means to detect such a change and cannot issue a Reconfigure message without this new mechanism.
section: "3"
topics:
    - radius
