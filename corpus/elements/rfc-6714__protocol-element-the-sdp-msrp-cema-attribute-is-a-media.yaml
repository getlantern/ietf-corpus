document: rfc-6714
kind: protocol-element
summary: 'The SDP ''msrp-cema'' attribute is a media-level, value-less SDP attribute that MSRP endpoints include in MSRP media descriptions to signal support for the CEMA extension. Its ABNF is: msrp-cema-attr = "msrp-cema", extending the attribute production from RFC 4566.'
section: "5"
topics:
