document: rfc-4833
kind: design-rationale
summary: The TZ Database is preferred over POSIX strings because POSIX strings can accurately represent at most one DST transition rule, whereas the TZ Database provides backwards consistency and accuracy for nearly all real-world locations since 1970, including irregular rule changes.
section: "1"
