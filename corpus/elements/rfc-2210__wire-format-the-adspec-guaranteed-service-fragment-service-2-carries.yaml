summary: 'The ADSPEC Guaranteed Service fragment (service 2) carries four mandatory 32-bit integer parameters: end-to-end composed C [Ctot] (param 133), end-to-end composed D [Dtot] (param 134), since-last-reshaping-point composed C [Csum] (param 135), and since-last-reshaping-point composed D [Dsum] (param 136). A header-only ''empty'' variant (length=0, break bit set) is also defined.'
