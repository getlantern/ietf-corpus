document: rfc-7117
kind: normative-requirement
summary: When the P2MP LSP is instantiated by RSVP-TE, an egress PE MUST NOT switch to the Selective tree until both the S-PMSI A-D binding announcement has been received and the RSVP-TE P2MP LSP has been established to that PE.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
