document: rfc-3015
kind: protocol-element
summary: A Termination is a logical entity on a MG that sources and/or sinks media and/or control streams. Terminations are either physical (semi-permanent, e.g., TDM channels) or ephemeral (e.g., RTP flows created by Add and destroyed by Subtract), uniquely identified by TerminationIDs assigned by the MG.
section: "6.2"
