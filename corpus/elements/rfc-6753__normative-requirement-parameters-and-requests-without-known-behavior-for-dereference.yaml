document: rfc-6753
kind: normative-requirement
summary: Parameters and requests without known behavior for dereference MUST NOT be used. The LS MUST ignore parameters it does not understand unless they are known to be invalid; if understood and invalid, the LS MAY generate a HELD error response.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - http
