document: rfc-4769
kind: wire-format
summary: Regular expressions may be used in NAPTR records to reduce record size; for example, "!(^.*)$!tel:\1;npdi!" dynamically replaces the expression with the telephone number plus leading '+'. This reduces individual record size and has significant impact on database storage at scale.
section: "4.5"
topics:
    - dns
