document: rfc-9358
kind: protocol-element
summary: The VIRTUAL-NETWORK-TLV (Type=65) is a mandatory TLV carried within the VNAG object. It communicates the Virtual Network Identifier — a human-readable symbolic name that uniquely identifies the VN. It may be customer-specified, operator-set, or auto-generated by the PCEP speaker.
