document: rfc-1902
kind: wire-format
summary: Opaque is [APPLICATION 4] IMPLICIT OCTET STRING carrying arbitrary ASN.1 BER-encoded data double-wrapped as an OCTET STRING. A conforming implementation need only accept and recognize opaquely-encoded data; it need not unwrap or interpret the inner encoding.
section: 7.1.9
