document: rfc-4420
kind: normative-requirement
summary: An LSR that supports LSP_ATTRIBUTES but does not recognize a TLV type code carried in it MUST pass the TLV on unaltered in the downstream LSP_ATTRIBUTES object. An LSR that supports the Attributes Flags TLV but does not recognize a set bit MUST forward the TLV unchanged.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
