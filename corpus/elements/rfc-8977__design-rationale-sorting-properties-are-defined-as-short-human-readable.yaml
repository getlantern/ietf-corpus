document: rfc-8977
kind: design-rationale
summary: Sorting properties are defined as short human-readable names (e.g., 'registrationDate', 'name') rather than JSONPath expressions because JSONPath is verbose and difficult to use in query strings; the 'jsonPath' field in sorting_metadata provides the mapping for clients that need it.
section: 2.3.1
topics:
