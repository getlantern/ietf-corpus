document: rfc-7865
kind: interoperability-note
summary: No version negotiation mechanism is defined for the recording metadata schema. The version is embedded in the XML namespace URI (urn:ietf:params:xml:ns:recording:1). Implementations may not interoperate if the metadata XML schema version implemented by the sender is not known by the receiver; future documents updating this schema should use a higher version number in the namespace.
section: "6.11"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
