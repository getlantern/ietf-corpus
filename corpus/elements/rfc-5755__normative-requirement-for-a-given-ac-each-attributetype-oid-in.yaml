document: rfc-5755
kind: normative-requirement
summary: For a given AC, each AttributeType OID in the attributes SEQUENCE MUST be unique (only one instance per type, though each may be multi-valued). An AC MUST contain at least one attribute; the SEQUENCE OF Attributes MUST NOT be of zero length.
section: 4.2.7
rfc2119_level: MUST
