document: rfc-5428
kind: protocol-element
summary: 'pktcEventThrottleAdminStatus controls event transmission throttling with four values: unconstrained(1), maintainBelowThreshold(2), stopAtThreshold(3), and inhibited(4). Throttling applies only to transmitted messages (SNMP/syslog) and does not affect local logging. An event generating both SNMP and syslog is counted as a single event.'
section: "6"
topics:
    - snmp
    - syslog
