document: rfc-9000
kind: normative-requirement
summary: Each endpoint MUST include its initial Source Connection ID in the initial_source_connection_id transport parameter; the server MUST also echo the client's original Destination Connection ID in original_destination_connection_id, authenticating all handshake connection IDs.
section: "7.3"
rfc2119_level: MUST
