document: rfc-6848
kind: design-rationale
summary: New civic address extensions MUST be defined only in the XML format; the DHCP format is not extended further because DHCP extensions cannot be safely conveyed in environments where format conversion is possible. This ensures lossless round-trip conversion between XML and DHCP representations.
section: "3"
topics:
    - privacy
    - registry
