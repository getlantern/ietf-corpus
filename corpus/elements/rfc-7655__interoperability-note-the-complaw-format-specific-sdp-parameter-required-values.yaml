document: rfc-7655
kind: interoperability-note
summary: The 'complaw' format-specific SDP parameter (required, values 'al' or 'mu') MUST be conveyed to communicate the G.711 companding law (A-law or mu-law) used, because G.711.0 encoding and decoding require knowledge of the companding law.
