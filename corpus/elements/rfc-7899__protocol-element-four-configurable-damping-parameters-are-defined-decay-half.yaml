document: rfc-7899
kind: protocol-element
summary: 'Four configurable damping parameters are defined: *decay-half-life* (half-life of exponential decay), *cutoff-threshold* (figure-of-merit value above which damping activates), *reuse-threshold* (value below which damping deactivates), and *increment-factor* (amount added to figure-of-merit on each multicast state update event).'
section: "5.1"
topics:
