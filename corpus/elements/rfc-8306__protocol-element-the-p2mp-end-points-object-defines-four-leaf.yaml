document: rfc-8306
kind: protocol-element
summary: 'The P2MP END-POINTS object defines four leaf types: 1 (new leaves to add), 2 (old leaves to remove), 3 (old leaves whose path may be modified/reoptimized), 4 (old leaves whose path must remain unchanged). A single END-POINTS object carries only one leaf type; multiple END-POINTS objects per RP are allowed to mix types.'
section: 3.3.2
topics:
