document: rfc-6113
kind: wire-format
summary: KrbFastArmor is an ASN.1 SEQUENCE with armor-type (Int32) and armor-value (OCTET STRING). The only currently defined armor type is FX_FAST_ARMOR_AP_REQUEST (value 1), which carries an ASN.1 DER-encoded AP-REQ; the AP-REQ subkey field MUST be present.
