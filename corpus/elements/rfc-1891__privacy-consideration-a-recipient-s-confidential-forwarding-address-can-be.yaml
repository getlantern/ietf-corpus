document: rfc-1891
kind: privacy-consideration
summary: 'A recipient''s confidential forwarding address can be protected by treating the forward as a mailing list: the MTA issues a DSN (if requested) upon ''delivery'' to the original address, then forwards with a new envelope return address. Any DSNs from the forwarded delivery will not reveal the actual forwarding destination to the original sender.'
section: 6.2.7.4
topics:
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
