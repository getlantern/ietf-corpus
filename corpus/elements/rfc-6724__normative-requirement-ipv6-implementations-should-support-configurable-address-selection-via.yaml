document: rfc-6724
kind: normative-requirement
summary: IPv6 implementations SHOULD support configurable address selection via a mechanism at least as powerful as the policy tables defined here. Implementations SHOULD provide an Automatic Row Additions flag allowing administrators to disable automatic addition of site-specific rows.
section: "2.1"
rfc2119_level: SHOULD
