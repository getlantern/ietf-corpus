document: rfc-3035
kind: interoperability-note
summary: A single device may behave as an ATM-LSR with respect to certain interface pairs and as a frame-based LSR with respect to others (e.g., an ATM switch with an Ethernet interface). The two functions may be considered coresident in a single box.
