document: rfc-8330
kind: interoperability-note
summary: The Availability SCSI-TLV is defined as a Generalized SCSI-TLV per RFC 8258 and is carried within the ISCD defined in RFC 4202/4203. The signaling extension to support LSP provisioning over links with variable discrete bandwidth is defined separately in the companion RSVP-TE document (draft-ietf-ccamp-rsvp-te-bandwidth-availability).
