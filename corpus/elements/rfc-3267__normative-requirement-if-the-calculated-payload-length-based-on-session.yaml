document: rfc-3267
kind: normative-requirement
summary: If the calculated payload length based on session parameters and payload header fields does not match the received packet size, the receiver SHOULD discard the packet; decoding a packet with length-field errors can severely degrade speech quality.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - security
