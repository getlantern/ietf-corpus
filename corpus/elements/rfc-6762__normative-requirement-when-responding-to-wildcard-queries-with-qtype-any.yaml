document: rfc-6762
kind: normative-requirement
summary: When responding to wildcard queries with qtype 'ANY' (255) or qclass 'ANY' (255), a Multicast DNS responder MUST respond with ALL of its records that match the query, unlike Unicast DNS which may return any subset.
section: "6.5"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
