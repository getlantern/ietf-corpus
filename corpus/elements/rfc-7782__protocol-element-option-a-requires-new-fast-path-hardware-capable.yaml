document: rfc-7782
kind: protocol-element
summary: Option A requires new fast-path hardware capable of data-plane learning of multiple attachments for a single end node MAC address. It can only be used safely if all edge RBridges interested in the relevant Data Labels announce the Option A capability; otherwise the AAE group must fall back to active-standby or isolate non-supporting RBridges.
