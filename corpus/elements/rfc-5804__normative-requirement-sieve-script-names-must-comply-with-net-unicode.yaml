document: rfc-5804
kind: normative-requirement
summary: Sieve script names MUST comply with Net-Unicode Definition and prohibit specific control characters (0000-001F, 007F, 0080-009F, 2028, 2029). Servers MUST allow names up to 128 Unicode characters and MUST NOT truncate names that exceed the server's internal limit.
section: "1.6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
