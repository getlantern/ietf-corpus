document: rfc-9422
kind: interoperability-note
summary: There is no requirement that limits advertised by the LIMITS extension comply with SMTP-mandated minimums (e.g., RFC 5321's minimum of 100 RCPT TO commands), because servers routinely impose smaller limits and it is especially important for clients to be aware of this.
section: "3.5"
topics:
