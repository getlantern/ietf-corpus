document: rfc-6585
kind: interoperability-note
summary: Non-browser HTTP applications such as WebDAV, CalDAV, widgets, software update clients, and Twitter clients can be adversely affected by captive portals, resulting in spurious errors and potentially content corruption. HTTP redirection does not solve this because many such applications follow redirects.
section: B
topics:
    - http
