document: rfc-6796
kind: normative-requirement
summary: The privacy of documents containing the <shared-secret> element MUST be preserved during transmission between server and UA. When RFC 6795 is used to distribute such documents, encryption as defined in RFC 3261 (i.e., TLS or S/MIME) MUST be used.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - sip
    - realtime
    - crypto
