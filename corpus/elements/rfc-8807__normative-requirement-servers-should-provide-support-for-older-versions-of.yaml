document: rfc-8807
kind: normative-requirement
summary: Servers SHOULD provide support for older versions of the extension in parallel to the newest version during a migration period (up to server policy), and SHOULD only include extension elements in the namespace of the newest version requested when responding to commands without extension elements.
section: "2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
