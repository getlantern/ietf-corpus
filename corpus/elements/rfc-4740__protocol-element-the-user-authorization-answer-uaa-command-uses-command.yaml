document: rfc-4740
kind: protocol-element
summary: The User-Authorization-Answer (UAA) command uses Command-Code 283 with the R bit cleared. It returns the assigned SIP server URI (SIP-Server-URI), SIP server capabilities (SIP-Server-Capabilities), or both, along with result codes such as DIAMETER_FIRST_REGISTRATION, DIAMETER_SUBSEQUENT_REGISTRATION, or DIAMETER_SERVER_SELECTION.
section: "8.2"
