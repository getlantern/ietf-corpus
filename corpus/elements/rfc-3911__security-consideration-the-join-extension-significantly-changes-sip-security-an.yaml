document: rfc-3911
kind: security-consideration
summary: 'The Join extension significantly changes SIP security: an eavesdropper who learns Call-ID, To, and From headers of a dialog could use the Join header to insert themselves into or monitor a conversation. Proper authentication (Digest or S/MIME) and authorization are therefore mandatory for accepting Join requests.'
section: "9"
topics:
    - sip
    - security
    - realtime
