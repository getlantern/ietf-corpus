document: rfc-4412
kind: protocol-element
summary: Preemption is a resource contention algorithm where an RP actor may disrupt an existing lower-priority session to accommodate a higher-priority incoming session. A single higher-priority session may displace more than one lower-priority session. Requests do not preempt others of equal priority unless the namespace specifies otherwise (e.g., DRSN flash-override-override).
section: 4.5.1
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
