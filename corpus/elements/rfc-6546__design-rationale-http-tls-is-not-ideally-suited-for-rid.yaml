document: rfc-6546
kind: design-rationale
summary: HTTP/TLS is not ideally suited for RID transport because HTTP is a client-server protocol while RID is a message-exchange protocol; however, the ease of implementation over HTTP/TLS outweighs these concerns, and a new port (4590) is used to differentiate RID traffic from standard HTTPS.
section: "3"
topics:
