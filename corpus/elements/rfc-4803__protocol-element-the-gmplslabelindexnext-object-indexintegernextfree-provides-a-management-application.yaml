document: rfc-4803
kind: protocol-element
summary: The gmplsLabelIndexNext object (IndexIntegerNextFree) provides a management application with an unused value suitable for use as gmplsLabelIndex when creating a new row. A value of zero indicates no unused value is available. The implementation MUST update this object whenever a row is created using the held index value.
section: "8"
topics:
