document: rfc-5251
kind: design-rationale
summary: Two separate identifiers are defined at each PE port (PPI for the provider realm and VPN-PPI for the customer realm) so that service provider operations remain independent of the VPN customer's addressing realm, and the service provider addressing realm is hidden from the customer.
