document: rfc-7530
kind: protocol-element
summary: The SECINFO operation allows a client to determine the security triple required for a specific filehandle. It returns a list of security mechanisms acceptable to the server for that namespace entry point, enabling in-band security negotiation without a separate protocol.
section: 3.3.1
topics:
    - security
