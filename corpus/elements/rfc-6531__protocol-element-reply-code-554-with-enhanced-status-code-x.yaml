document: rfc-6531
kind: protocol-element
summary: Reply-code 554 with enhanced status code X.6.9 is used when a message is rejected after the DATA command's final '.' because one or more recipients cannot accept internationalized headers. X.6.8 indicates a UTF-8 reply is required but forbidden by the client.
section: "3.5"
topics:
