document: rfc-4535
kind: normative-requirement
summary: GSAKMP requires that its supporting PKI implementations MUST be compliant with RFC 3280 for certificate path validation. If a GM's public key certificate is revoked, the issuing entity SHOULD signal the GO to expel that GM.
section: "4.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
