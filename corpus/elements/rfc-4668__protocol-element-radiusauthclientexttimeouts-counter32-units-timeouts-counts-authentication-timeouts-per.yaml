document: rfc-4668
kind: protocol-element
summary: radiusAuthClientExtTimeouts (Counter32, UNITS timeouts) counts authentication timeouts per server. A retry to the same server is counted as both a retransmission and a timeout; a send to a different server is counted as both a new Request and a timeout, avoiding double-counting ambiguity.
