document: rfc-4006
kind: security-consideration
summary: The credit-control application carries sensitive financial data including account balances and transaction amounts. Diameter security mechanisms (TLS or IPsec) MUST be used to protect credit-control messages against eavesdropping and tampering. Unauthorized modification could allow fraudulent credit manipulation.
section: "14"
topics:
    - diameter
    - security
