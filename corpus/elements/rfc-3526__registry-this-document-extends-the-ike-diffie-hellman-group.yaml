document: rfc-3526
kind: registry
summary: This document extends the IKE Diffie-Hellman Group registry. IKE (RFC 2409) originally defined groups 1-4; this document adds group 5 and groups 14-18. New group assignments require IETF Consensus and must be documented in a Standards Track RFC.
