document: rfc-9441
kind: protocol-element
summary: The SCHC Compound ACK is a failure SCHC ACK message that can contain several bitmaps, each identified by its corresponding window number. It provides feedback only for windows with fragment losses, has variable size depending on the number of windows reported, and is backwards compatible with the SCHC ACK defined in RFC 8724.
