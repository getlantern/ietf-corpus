document: rfc-5231
kind: design-rationale
summary: When multiple field names are specified in a COUNT test, counts for all fields are summed; if separate counts are desired, they must be done in two comparisons joined by 'allof' or 'anyof'. This simplifies the common case while preserving flexibility.
section: "4.2"
