document: rfc-3023
kind: security-consideration
summary: Any information stored outside the direct control of the user—including CSS stylesheets, XSL transformations, entity declarations, and DTDs—can be a source of insecurity. A 'whiteout attack' on a shared stylesheet, or redefinition of default attribute values in a DTD, can affect documents without modifying them directly. The security of any XML document depends recursively on all externally referenced documents.
section: "10"
topics:
    - security
