document: rfc-8311
kind: interoperability-note
summary: ECN field handling for tunnel encapsulation and decapsulation remains governed by RFC 6040 (being updated by ECN-SHIM), and related guidance for non-IP outer headers is in ECN-ENCAP. These requirements apply to all traffic including ECN experimental traffic.
