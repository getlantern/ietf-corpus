document: rfc-7892
kind: security-consideration
summary: This document does not introduce any new security considerations to the existing GMPLS signaling protocols. Implementers should refer to RFC 7139 for security measures and RFC 5920 for an overview of security vulnerabilities and protection mechanisms for the GMPLS control plane.
