document: rfc-2197
kind: normative-requirement
summary: Command statuses MUST be coordinated with responses by counting each separate response and correlating that count with the number of commands known to have been issued. Matching on the basis of either error code value or associated text is expressly forbidden.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
