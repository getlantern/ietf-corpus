document: rfc-4164
kind: interoperability-note
summary: Inter-profile context replication (replicating from a base context belonging to a different ROHC profile) is not defined in this document. Existing profiles would need to be updated to export context data entries in a compatible representation before inter-profile replication could be supported.
section: B.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
