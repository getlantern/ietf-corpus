document: rfc-8353
kind: interoperability-note
summary: 'RFC 8353 obsoletes RFC 5653. The two changes are: (1) a new getOutputToken() method on GSSException enabling error tokens from failed initSecContext/acceptSecContext to be forwarded to the peer, and (2) removal of all stream-based GSSContext methods that accepted InputStream/OutputStream parameters.'
section: "11"
topics:
