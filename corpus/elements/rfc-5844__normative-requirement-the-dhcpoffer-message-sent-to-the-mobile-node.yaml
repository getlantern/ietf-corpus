document: rfc-5844
kind: normative-requirement
summary: The DHCPOFFER message sent to the mobile node MUST include the Subnet Mask option and Router option set to the mobile node's IPv4 home subnet mask and default router address, and MUST include the Interface MTU option reflecting the tunnel MTU between MAG and LMA.
section: 3.4.3
rfc2119_level: MUST
topics:
    - mobility
    - ip
