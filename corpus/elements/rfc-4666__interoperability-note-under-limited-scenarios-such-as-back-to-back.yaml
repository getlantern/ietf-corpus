document: rfc-4666
kind: interoperability-note
summary: Under limited scenarios — such as back-to-back connections without redundancy requirements where SCTP-specific features are unnecessary — TCP MAY be used as the underlying transport protocol instead of SCTP. In all other deployments SCTP is strongly recommended.
section: 1.3.1
rfc2119_level: MAY
topics:
    - tcp
    - sctp
