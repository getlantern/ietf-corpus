document: rfc-9010
kind: wire-format
summary: The Extended Address Registration Option (EARO) carries a Type, Length, Status (8 bits), Opaque (8 bits), 4-bit reserved, I (2 bits), R (1 bit), T (1 bit) flags, TID (8 bits), Registration Lifetime (16 bits), and a variable-length ROVR (64–256 bits). The R flag signals whether the 6LR must ensure reachability; T flag enables the TID sequence counter.
section: "4.2"
topics:
