document: rfc-7702
kind: design-rationale
summary: Although a conference event package subscription (RFC 4575/RFC 6502) is not strictly required by RFC 7701, the document recommends it because XMPP MUC's temporary presence subscriptions and room rosters are best mapped to the SIP conference event package. This allows room participant lists to be delivered via NOTIFY rather than requiring custom mechanisms.
section: "5.3"
topics:
    - sip
    - realtime
