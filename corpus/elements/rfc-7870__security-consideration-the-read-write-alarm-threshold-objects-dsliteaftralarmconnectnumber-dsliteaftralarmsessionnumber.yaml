document: rfc-7870
kind: security-consideration
summary: 'The read-write alarm threshold objects (dsliteAFTRAlarmConnectNumber, dsliteAFTRAlarmSessionNumber, dsliteAFTRAlarmPortNumber) are vulnerable to attack: setting thresholds arbitrarily low causes notification floods, while setting them arbitrarily high effectively disables notifications, potentially concealing another attack.'
