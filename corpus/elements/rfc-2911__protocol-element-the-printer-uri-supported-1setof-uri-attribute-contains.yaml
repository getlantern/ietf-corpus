document: rfc-2911
kind: protocol-element
summary: The 'printer-uri-supported' (1setOf uri) attribute contains one or more URIs identifying communication channels to the Printer. Each URI has a parallel entry in 'uri-security-supported' (indicating security mechanism, e.g., 'tls' or 'none') and 'uri-authentication-supported' (indicating authentication mechanism, e.g., 'digest' or 'none'); all three attributes have the same cardinality.
section: 4.4.1
topics:
    - security
    - tls
