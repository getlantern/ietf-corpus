document: rfc-8960
kind: interoperability-note
summary: The 'ietf-mpls' YANG module is designed as an augmentation target for other MPLS YANG modules such as MPLS static LSP, LDP, and RSVP-TE. It imports 'ietf-routing' (RFC 8349), 'ietf-routing-types' (RFC 8294), 'ietf-yang-types' (RFC 6991), and 'ietf-interfaces' (RFC 8343).
