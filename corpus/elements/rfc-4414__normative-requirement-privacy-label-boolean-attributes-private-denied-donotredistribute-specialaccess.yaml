document: rfc-4414
kind: normative-requirement
summary: Privacy label boolean attributes (private, denied, doNotRedistribute, specialAccess) SHOULD be used in accordance with the level of access being granted the recipient of the data — 'private'/'denied' for anonymous/low-access users, 'doNotRedistribute'/'specialAccess' for authenticated high-access users.
section: 3.2.1
rfc2119_level: SHOULD
topics:
    - privacy
    - security
    - registry
