document: rfc-3621
kind: design-rationale
summary: The IEEE 802.3af working group deliberately limited its scope to defining only the hardware registers needed to build management interfaces, without specifying a full SNMP MIB. This RFC fills that gap by extending the Ethernet-like Interfaces MIB (RFC 3635) with the management objects required for PSE operation.
section: "3"
topics:
    - snmp
