document: rfc-9989
kind: wire-format
summary: 'DMARC Policy Records use an ABNF tag-value format. The record begins with ''v=DMARC1'', tags are separated by semicolons, and values are plain ASCII. Key tags include p (policy: none/quarantine/reject), sp (subdomain policy), np (non-existent subdomain policy), adkim/aspf (alignment mode: r/s), rua/ruf (reporting URIs), fo (failure options), psd (PSD flag: y/n/u), and t (test mode: y/n).'
section: "4.7"
topics:
