document: rfc-5088
kind: interoperability-note
summary: When the AS number is coded in two octets (2-byte ASN), the AS Number field in PCE-DOMAIN and NEIG-PCE-DOMAIN sub-TLVs MUST have its first two octets set to 0 to fit within the 32-bit Domain ID field.
section: "4.3"
topics:
    - routing
