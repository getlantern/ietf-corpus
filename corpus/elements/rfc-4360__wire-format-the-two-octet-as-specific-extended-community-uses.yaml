summary: The Two-Octet AS Specific Extended Community uses a 2-octet Type Field (high-order octet 0x00 or 0x40, low-order octet is sub-type) and a 6-octet Value Field split into a 2-octet Global Administrator sub-field (an IANA-assigned AS number) and a 4-octet Local Administrator sub-field.
