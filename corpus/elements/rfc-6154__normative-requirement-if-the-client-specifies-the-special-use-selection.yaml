document: rfc-6154
kind: normative-requirement
summary: If the client specifies the 'SPECIAL-USE' selection option, the LIST command MUST return only those mailboxes that have a special-use attribute set. The 'SPECIAL-USE' return option is implied by the 'SPECIAL-USE' selection option.
section: "2"
rfc2119_level: MUST
topics:
    - email
