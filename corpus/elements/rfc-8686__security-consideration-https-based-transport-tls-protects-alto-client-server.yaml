document: rfc-8686
kind: security-consideration
summary: HTTPS-based transport (TLS) protects ALTO client-server communication after discovery, but TLS certificate validation cannot detect attacks against the U-NAPTR DNS lookups used during the discovery procedure itself; those records must be secured via DNSSEC.
section: "6.1"
topics:
    - tls
    - dns
    - security
