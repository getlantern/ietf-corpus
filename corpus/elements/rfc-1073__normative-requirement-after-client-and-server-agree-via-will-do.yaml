document: rfc-1073
kind: normative-requirement
summary: After client and server agree via WILL/DO, the client may send an IAC SB NAWS subnegotiation to convey window size. The client may resend the subnegotiation whenever the window size changes.
section: "2"
rfc2119_level: MAY
