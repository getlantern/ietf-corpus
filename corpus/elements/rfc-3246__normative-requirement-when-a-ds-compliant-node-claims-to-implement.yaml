document: rfc-3246
kind: normative-requirement
summary: When a DS-compliant node claims to implement the EF PHB, the implementation MUST conform to the specification given in this document. However, the EF PHB is NOT REQUIRED to be implemented in order for a node to be considered DS-compliant.
