document: rfc-4550
kind: interoperability-note
summary: In the BURL/CHUNKING variant, a third EHLO command is required after authentication if and only if the second EHLO response (post-STARTTLS) does not list any BURL options, since BURL options may only appear after authentication.
section: 2.4.2
