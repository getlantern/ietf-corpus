summary: smCodeTable (smScriptObjects 2) is indexed by smScriptOwner, smScriptName, and smCodeIndex (Unsigned32 1..4294967295). Each row holds smCodeText (OCTET STRING, SIZE 1..1024) containing one fragment of a script. Modifications are only permitted when smScriptOperStatus is 'editing'.
