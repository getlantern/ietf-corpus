document: rfc-9157
kind: design-rationale
summary: RFC 6014 reduced DNSSEC cryptographic algorithm registration requirements from 'Standards Action' to 'RFC Required', but the corresponding IANA registries for DS hash algorithms and NSEC3 hash algorithms were left at 'Standards Action'. RFC 9157 addresses this inconsistency by bringing DS and NSEC3 hash algorithm requirements in line with all other DNSSEC cryptographic algorithms.
section: "1"
topics:
    - dns
    - registry
    - security
