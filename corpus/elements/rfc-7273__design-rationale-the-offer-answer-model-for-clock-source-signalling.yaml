document: rfc-7273
kind: design-rationale
summary: 'The offer/answer model for clock source signalling is declarative rather than negotiated: the offerer lists all supported clocks and the answerer selects a compatible subset. Full capability negotiation is deferred to the optional RFC 5939 SDP capability negotiation procedures.'
