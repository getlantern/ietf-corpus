document: rfc-3219
kind: normative-requirement
summary: An LS MUST NOT use route types in a peering session that are not supported by the peer LS as indicated via the Route Types Supported capability. If supported route types are unsatisfactory, the LS SHOULD terminate the peering session.
section: 4.2.1.1.1
rfc2119_level: MUST NOT
topics:
    - routing
    - voip
