document: rfc-9260
kind: protocol-element
summary: 'The two high-order bits of an unrecognized Parameter Type encode the handling action: 00=stop processing this chunk, 01=stop and report, 10=skip, 11=skip and report. Parameter types MUST be unique across all chunk types; for example, Type 5 always means IPv4 Address regardless of which chunk carries it.'
section: 3.2.1
topics:
    - sctp
