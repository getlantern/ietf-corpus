document: rfc-2739
kind: normative-requirement
summary: If the CALURI is an HTTP URI, the content returned with a GET SHOULD be a 'text/calendar' MIME body part. If it is an FTP URI, the resource SHOULD be a file with an 'ics' extension.
section: "1.3"
rfc2119_level: SHOULD
topics:
