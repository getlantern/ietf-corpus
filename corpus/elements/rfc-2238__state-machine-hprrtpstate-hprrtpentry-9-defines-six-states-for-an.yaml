document: rfc-2238
kind: state-machine
summary: 'hprRtpState (hprRtpEntry 9) defines six states for an RTP connection: rtpListening (waiting for call-in), rtpCalling (call-out in progress), rtpConnected (active), rtpPathSwitching (path switch timer running), rtpDisconnecting (no sessions; bringing down), and other(99). Transitions reflect connection lifecycle and path-switch events.'
