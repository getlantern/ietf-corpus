summary: 'SMDSAddress is encoded as an OCTET STRING of SIZE 8 (64 bits). The four most significant bits encode the address type: ''1100'' for individual addresses and ''1110'' for group addresses. The remaining 60 bits carry the BCD-encoded SMDS address.'
