document: rfc-4573
kind: security-consideration
summary: A denial-of-service threat exists because injected pathological datagrams can cause the receiver to move the camera to attacker-chosen positions. Data origin authentication and integrity protection (e.g., via SRTP) are RECOMMENDED to mitigate this.
