document: rfc-7176
kind: normative-requirement
summary: The VLAN-FLAGS sub-TLV MUST be carried in every TRILL IIH PDU. If the sending IS holds any nicknames, one MUST be included in the Sender Nickname field; otherwise the field is set to zero.
section: 2.2.1
rfc2119_level: MUST
topics:
