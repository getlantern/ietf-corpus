document: rfc-6544
kind: protocol-element
summary: 'ICE TCP defines three TCP candidate types: active (agent initiates connection but won''t receive incoming), passive (agent receives incoming but won''t initiate), and simultaneous-open (S-O; agent attempts to open a connection simultaneously with its peer). These types govern how TCP connections are established during connectivity checks.'
