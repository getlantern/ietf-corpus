document: rfc-8724
kind: normative-requirement
summary: The SCHC C/D Contexts MUST be stored at both ends; they can be learned via a provisioning protocol, out-of-band means, or pre-provisioning. The SCHC C/Ds on both sides MUST share the same set of Rules, as must the SCHC F/Rs on both sides.
section: "7"
rfc2119_level: MUST
topics:
