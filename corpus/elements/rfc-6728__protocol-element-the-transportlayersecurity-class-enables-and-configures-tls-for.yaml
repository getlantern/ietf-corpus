summary: The TransportLayerSecurity class enables and configures TLS (for TCP) or DTLS (for SCTP/UDP) on an export or collect destination. It is an optional aggregate sub-object of the transport-specific exporter and collector classes, covering certificate, private key, and CA configuration.
