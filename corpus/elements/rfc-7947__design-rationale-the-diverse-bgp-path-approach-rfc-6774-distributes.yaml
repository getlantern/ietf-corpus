document: rfc-7947
kind: design-rationale
summary: The diverse BGP path approach (RFC 6774) distributes multiple paths via separate BGP sessions per path, but is constrained by the number of configured sessions and may not eliminate path hiding in all cases; it can also significantly increase the number of BGP sessions the route server must handle.
