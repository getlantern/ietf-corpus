document: rfc-2743
kind: normative-requirement
summary: Mechanisms supporting optional services must send at least one token from acceptor to initiator during context establishment when the initiator requests such a service, so that the initiating GSS-API can correctly indicate whether the acceptor supports the requested service.
section: 1.2.1.2
rfc2119_level: MUST
topics:
    - security
