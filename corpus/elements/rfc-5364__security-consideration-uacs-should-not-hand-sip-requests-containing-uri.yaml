document: rfc-5364
kind: security-consideration
summary: UACs SHOULD NOT hand SIP requests containing URI lists to unauthenticated and untrusted parties, to prevent man-in-the-middle attacks or acquisition of URI lists for spam. URI lists containing private SIP URIs must be protected against eavesdropping via TLS or S/MIME encryption.
section: "8"
topics:
