document: rfc-7487
kind: normative-requirement
summary: The BFD Identifiers Sub-TLV MUST always be included in the BFD Configuration Sub-TLV in Path messages. The Negotiation Timer Parameters Sub-TLV MUST be included in Path messages if the N (negotiation) flag is not set.
section: "3.2"
rfc2119_level: MUST
