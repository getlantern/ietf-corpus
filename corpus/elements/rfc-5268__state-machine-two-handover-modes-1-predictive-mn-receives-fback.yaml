document: rfc-5268
kind: state-machine
summary: 'Two handover modes: (1) Predictive — MN receives FBack on the PAR''s link before disconnecting, so tunneling is active upon NAR attachment; MN sends UNA immediately on connecting. (2) Reactive — MN did not receive FBack on PAR''s link; MN sends UNA then immediately (re)sends FBU to PAR after attaching to NAR.'
section: "3.2"
topics:
