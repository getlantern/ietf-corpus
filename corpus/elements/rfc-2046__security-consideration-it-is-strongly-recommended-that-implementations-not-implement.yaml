document: rfc-2046
kind: security-consideration
summary: It is strongly recommended that implementations NOT implement a path-search mechanism whereby an arbitrary program named in a Content-Type parameter (e.g., an 'interpreter=' parameter) is found and executed using the message body as input, to reduce the danger of transmitting rogue programs.
section: 4.5.1
topics:
    - email
    - security
