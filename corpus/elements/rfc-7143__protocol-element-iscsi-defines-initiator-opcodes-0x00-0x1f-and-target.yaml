document: rfc-7143
kind: protocol-element
summary: 'iSCSI defines initiator opcodes 0x00–0x1F and target opcodes 0x20–0x3F. Initiator opcodes include: NOP-Out (0x00), SCSI Command (0x01), Task Management Request (0x02), Login Request (0x03), Text Request (0x04), SCSI Data-Out (0x05), Logout Request (0x06), SNACK (0x10). Target opcodes include: NOP-In (0x20), SCSI Response (0x21), Task Management Response (0x22), Login Response (0x23), Text Response (0x24), SCSI Data-In (0x25), Logout Response (0x26), R2T (0x31), Async Message (0x32), Reject (0x3F).'
section: 11.2.1.2
topics:
    - tcp
    - registry
