document: rfc-7873
kind: normative-requirement
summary: A DNS client MUST discard a response if it contains an illegal COOKIE option length or an incorrect Client Cookie value. If the client expected a COOKIE option and it is absent, the response MUST also be discarded.
section: "5.3"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
