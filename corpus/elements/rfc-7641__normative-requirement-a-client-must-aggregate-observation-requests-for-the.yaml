document: rfc-7641
kind: normative-requirement
summary: A client MUST aggregate observation requests for the same target resource and MUST NOT register more than once for that resource. The target resource is identified by all options in the request that are part of the Cache-Key, including the full request URI and the Accept Option.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
