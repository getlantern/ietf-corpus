document: rfc-9521
kind: normative-requirement
summary: When validating a received BFD packet with IP payload, the UDP destination port and TTL/Hop Limit of the inner IP packet MUST be validated; if validation fails, the packet MUST NOT be processed by BFD.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - security
