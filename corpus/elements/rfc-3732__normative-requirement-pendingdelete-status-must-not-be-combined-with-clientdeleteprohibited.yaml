document: rfc-3732
kind: normative-requirement
summary: '''pendingDelete'' status MUST NOT be combined with ''clientDeleteProhibited'' or ''serverDeleteProhibited''; ''pendingUpdate'' MUST NOT be combined with ''clientUpdateProhibited'' or ''serverUpdateProhibited''; and the four pending statuses MUST NOT be combined with each other.'
section: "2.3"
rfc2119_level: MUST NOT
