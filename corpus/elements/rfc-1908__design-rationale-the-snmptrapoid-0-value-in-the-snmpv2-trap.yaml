document: rfc-1908
kind: design-rationale
summary: 'The snmpTrapOID.0 value in the SNMPv2-Trap-PDU is calculated from the SNMPv1 Trap-PDU: if generic-trap is ''enterpriseSpecific'', the value is the enterprise OID concatenated with sub-identifiers ''0'' and the specific-trap value; otherwise, the corresponding standard trap OID from the SNMPv2 MIB is used.'
section: 3.1.2
topics:
    - snmp
