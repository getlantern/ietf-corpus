document: rfc-9594
kind: registry
summary: The 'ACE Groupcomm Errors' registry (Section 11.12) and 'ACE Groupcomm Rekeying Schemes' registry (Section 11.13) are created by this document. Error identifiers (integer values) map to named error conditions (e.g., 2 = 'Authentication credential incompatible with group configuration', 3 = 'Invalid PoP evidence', 4 = 'No available individual keying material'). Rekeying scheme entries identify supported algorithms for one-to-many rekeying.
section: "11.12"
