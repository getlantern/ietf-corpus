document: rfc-3956
kind: normative-requirement
summary: Multicast routers MUST perform at least the same address validity checks on the RP address derived from the multicast encoding as on RP addresses received via other means. At minimum, fe80::/10, ::/16, and ff00::/8 MUST be excluded from valid RP addresses.
section: "4"
rfc2119_level: MUST
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
