document: rfc-7460
kind: wire-format
summary: The PowerStateSet TC encodes both the Power State Set identifier and individual Power State values in a single INTEGER. For a Power State Set S, the named number S*256 identifies the set; for Power State X within set S, the value is S*256 + X + 1. Power States within a set are limited to 255 distinct values (0–254).
section: "9.1"
