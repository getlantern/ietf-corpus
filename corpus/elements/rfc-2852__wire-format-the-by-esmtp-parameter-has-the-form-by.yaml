document: rfc-2852
kind: wire-format
summary: The BY esmtp-parameter has the form 'BY=<by-time>;<by-mode>[T]' where by-time is a signed decimal integer of up to 9 digits (seconds), by-mode is 'N' (Notify) or 'R' (Return), and the optional 'T' flag requests trace DSNs.
