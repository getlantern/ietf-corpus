document: rfc-9929
kind: normative-requirement
summary: In IS-IS, any prefix advertisement with a metric value greater than 0xFE000000 MUST be used when advertising UPA. A prefix advertised with the U-Flag MUST have its metric set to a value larger than 0xFE000000; if the metric is less than or equal to 0xFE000000, both U-Flag and UP-Flag MUST be ignored.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
