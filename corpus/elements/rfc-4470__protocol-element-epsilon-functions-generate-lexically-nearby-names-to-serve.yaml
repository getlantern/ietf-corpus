document: rfc-4470
kind: protocol-element
summary: Epsilon functions generate lexically nearby names to serve as the owner name and next name of a minimally covering NSEC. They need not be perfect or consistent, but must not produce names that cover any existing instantiated names. They are named after the mathematical convention of using epsilon for small deviations.
section: "3"
topics:
    - dns
