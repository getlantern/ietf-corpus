document: rfc-3019
kind: protocol-element
summary: mldInterfaceProxyIfIndex (InterfaceIndexOrZero, default 0) identifies the upstream interface to which MLD Multicast Listener Reports are forwarded when MLD proxying is active. A value of 0 indicates no proxying.
