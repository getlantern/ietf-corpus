document: rfc-3620
kind: security-consideration
summary: Negotiating TLS end-to-end after a TUNNEL connection prevents intermediate proxies from observing or modifying cleartext, but only if TLS certificates are properly configured. Without public key infrastructure deployment, a proxy can mount a man-in-the-middle attack.
section: "7"
topics:
