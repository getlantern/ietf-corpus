document: rfc-8447
kind: security-consideration
summary: Recommended algorithms are regarded as secure at time of registration, but cryptographic algorithms and parameters will be broken or weakened over time. The 'Recommended' status in the registry may lag behind current cryptanalysis; implementers must independently verify that listed algorithms still provide expected security.
