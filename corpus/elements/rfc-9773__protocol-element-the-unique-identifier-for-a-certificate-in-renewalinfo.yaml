document: rfc-9773
kind: protocol-element
summary: The unique identifier for a certificate in RenewalInfo requests is constructed by concatenating the base64url-encoded keyIdentifier field of the certificate's AKI extension, a period character, and the base64url-encoded DER-encoded Serial Number field (without tag and length bytes), with all trailing '=' characters stripped from both parts.
