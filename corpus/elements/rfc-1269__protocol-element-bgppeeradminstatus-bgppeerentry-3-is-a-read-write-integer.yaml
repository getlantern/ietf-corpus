document: rfc-1269
kind: protocol-element
summary: bgpPeerAdminStatus (bgpPeerEntry 3) is a read-write INTEGER controlling the desired connection state. A transition from 'stop' to 'start' generates a BGP Start Event; 'start' to 'stop' generates a BGP Stop Event, allowing peer connections to be restarted via SNMP.
