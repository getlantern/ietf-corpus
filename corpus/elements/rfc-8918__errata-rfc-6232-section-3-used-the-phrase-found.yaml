document: rfc-8918
kind: errata
summary: 'RFC 6232 Section 3 used the phrase ''found in'' for the POI TLV requirement; this document corrects it to ''sent in'' to better reflect the intent: ''The POI TLV SHOULD be sent in all purges and MUST NOT be sent in LSPs with a non-zero Remaining Lifetime.'''
section: "3.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
