document: rfc-4740
kind: protocol-element
summary: The User-Authorization-Request (UAR) command uses Command-Code 283 with the R bit set. It is sent by the Diameter client in a SIP server to request authorization for a SIP REGISTER request, carrying SIP-AOR, Auth-Session-State, and optionally User-Name, SIP-Visited-Network-Id, and SIP-User-Authorization-Type AVPs.
section: "8.1"
topics:
