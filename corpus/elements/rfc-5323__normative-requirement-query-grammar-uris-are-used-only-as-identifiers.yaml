document: rfc-5323
kind: normative-requirement
summary: Query grammar URIs are used only as identifiers. Applications SHOULD NOT attempt to retrieve these URIs even if they appear to be retrievable (e.g., those beginning with 'http://'), to avoid unintended network requests.
section: "8"
rfc2119_level: SHOULD NOT
topics:
