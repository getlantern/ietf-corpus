document: rfc-3812
kind: protocol-element
summary: 'The mplsTunnelTable is the central table for creating, reconfiguring, and removing MPLS TE tunnels. Only point-to-point tunnel segments are supported; each tunnel can have one out-segment originating at the LSR and/or one in-segment terminating at it. Tunnel entries are uniquely identified across an MPLS network by the four-part index: mplsTunnelIndex, mplsTunnelInstance, mplsTunnelIngressLSRId, and mplsTunnelEgressLSRId.'
section: "6.1"
topics:
    - mpls
    - snmp
