document: rfc-9207
kind: normative-requirement
summary: Clients MUST validate the `iss` parameter precisely as described in Section 2.4 and MUST NOT allow multiple authorization servers to use the same issuer identifier. When authorization server details are manually configured, the client MUST ensure accepted `iss` values are unique per server.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
