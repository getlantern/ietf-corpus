document: rfc-2622
kind: protocol-element
summary: 'Address prefix ranges use four range operators: ^- (exclusive more specifics), ^+ (inclusive more specifics), ^n (all length-n specifics), and ^n-m (specifics of length n through m). Operators distribute over set members; chaining two operators directly on a single prefix is an error, but an operator may be applied to a set whose members already contain range operators.'
section: "2"
topics:
    - routing
    - ip
