document: rfc-5793
kind: wire-format
summary: 'The PB-PA message value contains: Flags (8 bits, bit 0 = EXCL for exclusive delivery), PA Message Vendor ID (24 bits), PA Subtype (32 bits), Posture Collector Identifier (16 bits), Posture Validator Identifier (16 bits), and PA Message Body (variable). Total fixed-length fields are 12 octets; minimum PB-TNC Message Length for PB-PA is 24.'
section: "4.5"
