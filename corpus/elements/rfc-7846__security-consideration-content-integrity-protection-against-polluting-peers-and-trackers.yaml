document: rfc-7846
kind: security-consideration
summary: 'Content integrity protection against polluting peers and trackers is a concern: a malicious tracker could return a list of polluter peers, or polluter peers could inject corrupted chunks. Implementers should use content integrity mechanisms at the peer layer (e.g., as defined in PPSPP/RFC 7574) to mitigate this.'
section: "6.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
