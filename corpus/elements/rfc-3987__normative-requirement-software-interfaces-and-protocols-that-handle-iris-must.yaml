document: rfc-3987
kind: normative-requirement
summary: Software interfaces and protocols that handle IRIs MUST define which character encoding is used. Intermediate software between IRI-capable and URI-only components MUST map IRIs to URIs per section 3.1 when transferring data; this mapping SHOULD be applied as late as possible.
section: "6.2"
rfc2119_level: MUST
topics:
