document: rfc-8955
kind: design-rationale
summary: The validation procedure ties Flow Specification acceptance to the originator of the best-match unicast route (Section 6) because the neighboring AS that advertises the best unicast route for a destination is effectively the traffic's immediate destination; if it requests drops, that cannot constitute a self-inflicted denial of service.
section: "6"
topics:
    - bgp
    - routing
    - security
