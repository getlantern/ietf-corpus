document: rfc-3731
kind: wire-format
summary: 'Contact type is encoded as a ''type'' attribute on <domain:contact> with enumerated values: ''admin'', ''billing'', or ''tech''. Status values are encoded on <domain:status> as required ''s'' attribute (enumerated) with optional ''lang'' attribute (default ''en'') and optional human-readable text content.'
