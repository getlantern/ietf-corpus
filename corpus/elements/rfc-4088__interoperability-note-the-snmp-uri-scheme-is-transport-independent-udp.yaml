document: rfc-4088
kind: interoperability-note
summary: The 'snmp' URI scheme is transport-independent; UDP is the default transport for backward compatibility, but other transports (e.g., SNMP over TCP per RFC 3430) MAY be used. The information designated by the URI SHOULD NOT depend on which transport is used.
section: "4.4"
topics:
    - snmp
