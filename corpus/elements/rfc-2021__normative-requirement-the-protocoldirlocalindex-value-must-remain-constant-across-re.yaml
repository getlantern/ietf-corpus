document: rfc-2021
kind: normative-requirement
summary: The protocolDirLocalIndex value must remain constant across re-initializations. If a protocol is deleted and re-created, it must receive a new value not previously used since the last re-initialization, and must not be re-used until the next agent-restart.
section: "6"
rfc2119_level: MUST
topics:
