document: rfc-7176
kind: wire-format
summary: 'The Interested Labels and Spanning Tree Roots sub-TLV (INT-LABEL, sub-TLV type 15) is a fine-grained label analogue to INT-VLAN. It encodes a 2-byte Nickname, 7-byte Interested Labels field (M4/M6/BM flags, 24-bit Label.start, 24-bit Label.end or bit-map), 4-byte AF Status Lost Counter, and 6*n root bridge IDs. Length: 11 + 6*n.'
section: 2.3.8
topics:
    - routing
    - mpls
