document: rfc-7533
kind: interoperability-note
summary: FedFS status code names and meanings are inspired by NFSv4 (RFC 7530) counterparts (e.g., FEDFS_ERR_ACCESS mirrors NFS4ERR_ACCESS), but their numeric values are different and must not be confused or aliased between protocols.
