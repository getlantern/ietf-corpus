document: rfc-2496
kind: protocol-element
summary: dsx3LoopbackConfig (read-write) represents the desired loopback state; dsx3LoopbackStatus (read-only) reflects the actual current state including loopbacks established by a manager or requested remotely from the far end. Values include NoLoop, PayloadLoop, LineLoop, OtherLoop, InwardLoop, and DualLoop.
section: 3.1.1
topics:
