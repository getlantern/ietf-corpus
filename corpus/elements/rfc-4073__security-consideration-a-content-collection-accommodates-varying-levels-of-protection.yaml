document: rfc-4073
kind: security-consideration
summary: A content collection accommodates varying levels of protection; it is expected to be encapsulated in one or more CMS protecting content types, but this is not required. Implementations must therefore handle multiple encapsulation levels and the security considerations of [CMS] apply.
section: "4"
topics:
