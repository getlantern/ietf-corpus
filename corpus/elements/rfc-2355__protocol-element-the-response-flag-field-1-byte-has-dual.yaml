document: rfc-2355
kind: protocol-element
summary: 'The RESPONSE-FLAG field (1 byte) has dual meaning: for outbound 3270-DATA/SCS-DATA it indicates response expectations (0x00=NO-RESPONSE, 0x01=ERROR-RESPONSE, 0x02=ALWAYS-RESPONSE); for RESPONSE messages it conveys the actual outcome (0x00=POSITIVE-RESPONSE, 0x01=NEGATIVE-RESPONSE). It must be ignored and set to 0x00 for all other DATA-TYPE values.'
section: 8.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
