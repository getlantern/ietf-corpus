document: rfc-3821
kind: interoperability-note
summary: In simultaneous open (both FCIP Entities initiate TCP connects concurrently), two TCP Connections and two FCIP Links are formed between the same FCIP Entities. This is not an error; Fibre Channel can handle two approximately equal connections between FC Fabric elements.
section: 8.1.4
topics:
    - tcp
