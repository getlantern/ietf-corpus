document: rfc-9448
kind: design-rationale
summary: For large or complex noncontiguous sets of telephone numbers, best practice is to split them into multiple STI certificates representing contiguous subsets, rather than encoding an unbounded noncontiguous set in a single identifier object, to avoid excessive identifier object sizes.
