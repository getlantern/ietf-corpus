document: rfc-5121
kind: normative-requirement
summary: The MS and BS MUST negotiate at most one convergence sublayer for IPv6 transport on a given link. Failure to negotiate a common CS results in failure to set up the transport connection.
section: "4"
rfc2119_level: MUST
