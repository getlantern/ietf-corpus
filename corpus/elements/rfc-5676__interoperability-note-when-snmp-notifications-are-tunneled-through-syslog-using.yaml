document: rfc-5676
kind: interoperability-note
summary: When SNMP notifications are tunneled through SYSLOG (using the RFC 5675 mapping) and then translated back to SNMP via this MIB, SYSLOG transport size restrictions and verbose textual encoding may cause truncation, resulting in an incomplete reconstructed SNMP notification.
