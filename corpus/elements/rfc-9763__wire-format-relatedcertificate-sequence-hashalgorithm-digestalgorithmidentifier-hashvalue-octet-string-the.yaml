document: rfc-9763
kind: wire-format
summary: RelatedCertificate ::= SEQUENCE { hashAlgorithm DigestAlgorithmIdentifier, hashValue OCTET STRING }. The hashAlgorithm field identifies the algorithm used to compute hashValue, which is the hash of the entire related certificate (DER-encoded). If the related certificate's signature OID explicitly indicates a hash algorithm (e.g., ecdsa-with-SHA512), that same algorithm SHOULD be used.
section: "4.1"
topics:
