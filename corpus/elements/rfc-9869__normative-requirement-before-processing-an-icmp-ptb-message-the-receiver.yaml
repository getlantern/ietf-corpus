document: rfc-9869
kind: normative-requirement
summary: Before processing an ICMP PTB message, the receiver MUST validate the protocol information in the quoted packet to confirm the message originated from the sending node. The receiver SHOULD also confirm that the REQ Option token in the quoted packet corresponds to a recently sent probe.
section: "5.2"
rfc2119_level: MUST
topics:
    - udp
    - security
