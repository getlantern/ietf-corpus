document: rfc-8898
kind: normative-requirement
summary: SIP endpoints that support this document MUST use encrypted JWTs for encoding and protecting access tokens when they are included in SIP requests, unless some other mechanism is used to guarantee that only authorized SIP endpoints have access to the access token.
