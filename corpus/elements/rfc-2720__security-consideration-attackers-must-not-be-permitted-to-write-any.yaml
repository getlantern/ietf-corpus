document: rfc-2720
kind: security-consideration
summary: Attackers must not be permitted to write any meter variables. Access restriction options include physical separation (separate control network), application-layer security (SNMPv2C community strings or SNMPv3 USM/VACM), and lower-layer security (e.g., encrypted TCP tunnel for SNMP). Separate network interfaces for control and metering are recommended.
section: "5.2"
topics:
    - snmp
    - measurement
    - security
