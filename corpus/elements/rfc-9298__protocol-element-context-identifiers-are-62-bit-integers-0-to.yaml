document: rfc-9298
kind: protocol-element
summary: Context Identifiers are 62-bit integers (0 to 2^62-1) encoded as QUIC variable-length integers. Context ID 0 is reserved for UDP payloads. Non-zero even values are client-allocated; odd values are proxy-allocated. Context IDs are scoped to a single HTTP request namespace.
section: "4"
topics:
