document: rfc-8201
kind: normative-requirement
summary: An attempt to detect a PMTU increase by sending a packet larger than the current estimate must not be done less than 5 minutes after a Packet Too Big message has been received for the given path. The recommended timer setting is 10 minutes.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
