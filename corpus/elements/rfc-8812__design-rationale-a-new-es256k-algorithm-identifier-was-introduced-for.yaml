document: rfc-8812
kind: design-rationale
summary: A new 'ES256K' algorithm identifier was introduced for JOSE because the existing JOSE 'ES256' algorithm is defined to be used only with the P-256 curve, not secp256k1. The COSE treatment of secp256k1 signing is intentionally parallel to JOSE.
