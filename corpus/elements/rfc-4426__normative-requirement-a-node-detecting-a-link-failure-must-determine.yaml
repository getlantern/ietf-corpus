document: rfc-4426
kind: normative-requirement
summary: A node detecting a link failure MUST determine the identities of all affected LSPs and send an End-to-End Failure Indication message to each LSP source. Each intermediate node receiving such a message MUST forward it to the appropriate next node. The message MUST be sent reliably from the detecting node to the LSP source.
section: 3.2.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
