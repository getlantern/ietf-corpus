document: rfc-9126
kind: interoperability-note
summary: The presence of 'pushed_authorization_request_endpoint' in server metadata is sufficient for a client to determine it may use the PAR flow. A 'request_uri' obtained from the PAR endpoint is usable at the authorization endpoint regardless of 'request_uri_parameter_supported' or 'require_request_uri_registration' OpenID Connect Discovery metadata.
section: "5"
topics:
