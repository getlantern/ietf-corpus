document: rfc-9425
kind: privacy-consideration
summary: Revealing domain and global quota counts to general users can expose the existence of other sensitive data. For example, comparing quota counts before and after sending to a private mailing list can reveal the number of list subscribers. Domain and global scope quotas SHOULD only be visible to administrators.
section: "8"
topics:
    - privacy
    - security
    - http
    - json
