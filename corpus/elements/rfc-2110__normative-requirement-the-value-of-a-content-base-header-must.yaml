document: rfc-2110
kind: normative-requirement
summary: The value of a Content-Base header MUST be an absolute URI. Content-Base and Content-Location headers are valid only within the heading where they occur and are meaningless in multipart headings (they do not apply to enclosed parts).
section: "4.2"
rfc2119_level: MUST
topics:
    - email
