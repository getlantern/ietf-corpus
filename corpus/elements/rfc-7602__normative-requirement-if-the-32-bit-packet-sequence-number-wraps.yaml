document: rfc-7602
kind: normative-requirement
summary: If the 32-bit Packet Sequence Number wraps or the router performs a cold restart, the 64-bit ESSN value MUST be set higher than the previous value to prevent sequence number reuse.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - security
