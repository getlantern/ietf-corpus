document: rfc-8370
kind: normative-requirement
summary: A Per-Peer Flow Control implementation SHOULD use a Retry Limit (Rl) value of 7 (rather than RFC 2961's suggested value of 3) to align the retransmit phase duration (~31.5 seconds) with the hello timeout.
section: "4"
rfc2119_level: SHOULD
