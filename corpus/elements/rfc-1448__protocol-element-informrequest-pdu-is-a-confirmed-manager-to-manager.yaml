document: rfc-1448
kind: protocol-element
summary: InformRequest-PDU is a confirmed manager-to-manager notification. The first two variable bindings MUST be sysUpTime.0 and snmpEventID.i. Upon receipt, the receiving entity responds with a Response-PDU echoing the same request-id and variable-bindings with error-status noError.
section: 4.2.7
topics:
    - snmp
