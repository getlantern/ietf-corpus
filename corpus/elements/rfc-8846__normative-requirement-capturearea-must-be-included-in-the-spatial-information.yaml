document: rfc-8846
kind: normative-requirement
summary: <captureArea> MUST be included in the spatial information of spatially definable video captures and MUST NOT be associated with audio captures. The four corner points (<bottomLeft>, <bottomRight>, <topLeft>, <topRight>) MUST be coplanar.
section: 11.5.2
rfc2119_level: MUST
