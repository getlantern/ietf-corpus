document: rfc-5685
kind: normative-requirement
summary: When the client is redirected, it MUST use the same PAD and SPD entries as it would have used with the original gateway. Receiving a REDIRECT notification MUST NOT result in the modification of any PAD or SPD entries.
section: "3"
rfc2119_level: MUST NOT
topics:
