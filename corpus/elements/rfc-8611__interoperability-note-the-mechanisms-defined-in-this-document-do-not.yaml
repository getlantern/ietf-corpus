document: rfc-8611
kind: interoperability-note
summary: The mechanisms defined in this document do not apply when an LSP is pinned to a particular LAG member (i.e., the LAG is not treated as one logical interface by the LSP), and are not reliably applicable when an intermediate L2 switch exists between routers in the LAG path.
