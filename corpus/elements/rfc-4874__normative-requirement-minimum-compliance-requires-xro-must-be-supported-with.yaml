document: rfc-4874
kind: normative-requirement
summary: 'Minimum compliance requires: XRO MUST be supported with IPv4/32 and IPv6/128 prefix subobjects using interface and node attributes. EXRS support is optional (MAY); if not supported, an encountered EXRS MUST be rejected as an unknown ERO subobject with PathErr ''Bad EXPLICIT_ROUTE object''.'
section: "6"
rfc2119_level: MUST
topics:
