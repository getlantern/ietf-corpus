document: rfc-3339
kind: interoperability-note
summary: Numeric offsets represent only time zones differing from UTC by an integral number of minutes. Many historical time zones differ by non-integral minutes; applications must convert such timestamps to the nearest representable UTC offset (e.g., the 1937 Netherlands offset of +00:19:32.13 becomes +00:20).
section: "4.2"
topics:
