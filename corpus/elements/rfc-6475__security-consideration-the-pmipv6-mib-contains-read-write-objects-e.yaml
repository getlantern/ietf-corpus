document: rfc-6475
kind: security-consideration
summary: The PMIPV6-MIB contains read-write objects (e.g., pmip6MagStatus, pmip6LmaStatus, pmip6LmaMinDelayBeforeBCEDelete, pmip6MobileNodeGeneratedTimestampInUse) that can affect PMIPv6 entity behavior; unauthorized write access could disrupt mobility sessions or allow replay attacks via timestamp manipulation. SNMPv3 with authentication and privacy is recommended.
section: "6"
topics:
    - security
    - snmp
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
