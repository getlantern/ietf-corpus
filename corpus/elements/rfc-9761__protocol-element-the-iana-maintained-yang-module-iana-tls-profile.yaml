summary: 'The IANA-maintained YANG module ''iana-tls-profile'' defines typedefs for all observable (D)TLS parameters: extension-type (uint16), supported-group (uint16), signature-algorithm (uint16), psk-key-exchange-mode (uint8), application-protocol (string), cert-compression-algorithm (uint16), cipher-algorithm (uint16), tls-version (enumeration: tls12=1, tls13=2), dtls-version (enumeration: dtls12=1, dtls13=2).'
