document: rfc-5724
kind: protocol-element
summary: 'The ''sms'' URI scheme follows the syntax: sms-uri = scheme ":" sms-hier-part [ "?" sms-fields ], where sms-hier-part contains one or more comma-separated telephone-subscriber recipients. The scheme supports an optional ''body'' field for pre-populating message text using percent-encoded UTF-8 characters.'
section: "2.2"
topics:
