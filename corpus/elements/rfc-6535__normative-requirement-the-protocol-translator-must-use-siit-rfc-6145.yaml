document: rfc-6535
kind: normative-requirement
summary: The Protocol Translator MUST use SIIT (RFC 6145) for IPv4/IPv6 conversion. To avoid unnecessary fragmentation, the host's IPv4 module SHOULD be configured with an MTU equal to the IPv6-enabled link MTU minus 20 bytes.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
