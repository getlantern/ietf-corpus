document: rfc-6977
kind: state-machine
summary: 'Upon receiving a Reconfigure-Reply, the relay transitions based on the status code: NotAllowed, NotConfigured, or Success triggers termination of the request; UnspecFail triggers a corrected retransmission. With multiple servers, the request is deemed successful for a client if at least one Reconfigure-Reply does not include that client''s Client Identifier Option.'
section: "6.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
