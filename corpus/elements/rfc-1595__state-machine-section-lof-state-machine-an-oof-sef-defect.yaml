document: rfc-1595
kind: state-machine
summary: 'Section LOF state machine: an OOF/SEF defect is declared on four contiguous errored frame alignment words and cleared on two contiguous error-free frames. LOF defect is declared when OOF/SEF persists for 3 ms and cleared when signal is in-frame for 1–3 ms. LOF failure is declared when LOF defect persists 2.5±0.5 s and cleared when LOF defect is absent for 10±0.5 s.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
