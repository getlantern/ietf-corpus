document: rfc-8480
kind: registry
summary: 'This document creates six 6TiSCH Parameters subregistries: 6P Version Numbers (currently only version 0), 6P Message Types (REQUEST, RESPONSE, CONFIRMATION), 6P Command Identifiers (ADD, DELETE, RELOCATE, COUNT, LIST, CLEAR, SIGNAL), 6P Return Codes (RC_SUCCESS, RC_EOL, RC_ERR, RC_RESET, RC_ERR_VERSION, RC_ERR_SFID, RC_ERR_SEQNUM, RC_ERR_CELLLIST, RC_ERR_BUSY, RC_ERR_LOCKED), 6P Scheduling Function Identifiers, and 6P CellOptions Bitmap values.'
