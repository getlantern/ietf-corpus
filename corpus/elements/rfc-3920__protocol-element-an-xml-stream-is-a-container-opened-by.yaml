document: rfc-3920
kind: protocol-element
summary: An XML stream is a container opened by a <stream> element and closed by </stream>; the initiating entity opens the initial stream, and the receiving entity MUST negotiate a response stream in the opposite direction to enable bidirectional exchange. XML stanzas (<message/>, <presence/>, <iq/>) are the discrete semantic units exchanged within streams.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
