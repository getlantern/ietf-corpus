document: rfc-1286
kind: wire-format
summary: MacAddress is defined as OCTET STRING (SIZE 6) in 'canonical' order (least-significant-bit first per IEEE 802.1a), even though 802.5 transmits MAC addresses most-significant-bit first. 16-bit addresses are represented by setting the upper 4 octets to zero.
