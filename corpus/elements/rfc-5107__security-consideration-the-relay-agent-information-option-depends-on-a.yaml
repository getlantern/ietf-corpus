document: rfc-5107
kind: security-consideration
summary: The Relay Agent Information option depends on a trusted relationship between relay and server (RFC 3046 Section 5). A perimeter defense blocking untrusted relay agent information options is recommended, with deeper defense via the authentication suboption (RFC 4030) as well.
section: "5"
topics:
    - security
