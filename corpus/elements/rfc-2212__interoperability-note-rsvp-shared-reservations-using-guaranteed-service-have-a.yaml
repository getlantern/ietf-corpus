document: rfc-2212
kind: interoperability-note
summary: 'RSVP shared reservations using guaranteed service have a known open problem: the RSpec rate R is set to achieve a delay bound (not merely to match sender traffic), so shared reservations can fail at a link whenever available bandwidth is less than R, even if the link has adequate bandwidth for the actual number of senders.'
section: Ordering and Merging
topics:
    - qos
