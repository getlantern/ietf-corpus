document: rfc-6321
kind: interoperability-note
summary: 'iCalendar X- extension properties and parameters are handled identically to standard properties: they are lowercased and represented as XML elements. However, unrecognized extension properties with unknown default value types must use IC:unknown, which may result in loss of type information that cannot be restored on round-trip.'
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
