document: rfc-7711
kind: normative-requirement
summary: If none of the fingerprint descriptor objects match the POSH server's PKIX information, the POSH client SHOULD reject the connection; however, the client might still accept the connection if other verification methods such as DANE succeed.
section: "3.3"
rfc2119_level: SHOULD
