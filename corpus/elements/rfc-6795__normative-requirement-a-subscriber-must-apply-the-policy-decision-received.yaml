document: rfc-6795
kind: normative-requirement
summary: A subscriber MUST apply the policy decision received in a NOTIFY request to the associated session. If the UA decides not to apply the policy, it MUST NOT set up the session or MUST terminate it, and MUST cancel or reject any pending INVITE transaction.
section: "3.9"
rfc2119_level: MUST
topics:
    - sip
