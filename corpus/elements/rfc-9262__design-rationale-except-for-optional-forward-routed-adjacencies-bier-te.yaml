document: rfc-9262
kind: design-rationale
summary: Except for optional forward_routed() adjacencies, BIER-TE does not require a routing underlay and can operate without IGP dependency. The BIER-TE controller directly populates BIFTs, replacing in-network autonomous path calculations with explicitly engineered paths.
