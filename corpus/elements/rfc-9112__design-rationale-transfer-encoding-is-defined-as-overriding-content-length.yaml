document: rfc-9112
kind: design-rationale
summary: Transfer-Encoding is defined as overriding Content-Length rather than being mutually incompatible because early implementations occasionally sent both chunked transfer coding and an estimated Content-Length for progress bars. This historical practice necessitated a defined precedence rule rather than prohibiting coexistence.
section: "6.1"
topics:
    - http
