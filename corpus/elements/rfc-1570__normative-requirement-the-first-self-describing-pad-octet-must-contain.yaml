document: rfc-1570
kind: normative-requirement
summary: The first self-describing pad octet MUST contain the value one (1). When no padding would otherwise be required but the final octet of the PPP Information field contains a value in the range 1 through MPV, at least one self-describing pad octet MUST be added.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
