document: rfc-9143
kind: interoperability-note
summary: The BUNDLE extension is backward compatible. Endpoints that do not support it generate offers and answers without 'group:BUNDLE' and assign a unique address:port to each 'm=' section per RFC 3264. An answerer that does not support BUNDLE will reject bundle-only 'm=' sections (zero port) as per RFC 3264.
section: "1.2"
topics:
    - realtime
    - rtp
