document: rfc-9580
kind: protocol-element
summary: OpenPGP defines 15 Signature Type IDs including Binary (0x00), Text (0x01), Generic/Persona/Casual/Positive Certification (0x10–0x13), Subkey Binding (0x18), Primary Key Binding (0x19), Key Revocation (0x20), and Subkey Revocation (0x28). Type ID 0xFF is reserved and MUST NOT be created or validated.
section: 5.2.1
topics:
