document: rfc-6851
kind: normative-requirement
summary: If a MOVE fails partway through a message set, the server MUST leave each affected message in a state where it is in at least one of the source or target mailboxes — no message may be lost or orphaned — even if the server returns a tagged NO response.
section: "3.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
