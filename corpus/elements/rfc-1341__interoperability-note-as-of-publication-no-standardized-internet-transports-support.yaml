document: rfc-1341
kind: interoperability-note
summary: As of publication, no standardized Internet transports support unencoded 8-bit or binary data in mail bodies; thus '8bit' and 'binary' Content-Transfer-Encoding values are not actually legal on the Internet at the time of this specification but are defined prospectively for future 8-bit-capable transports.
section: "5"
topics:
    - email
