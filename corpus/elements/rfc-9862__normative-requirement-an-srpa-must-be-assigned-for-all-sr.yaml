document: rfc-9862
kind: normative-requirement
summary: An SRPA MUST be assigned for all SR Policy LSPs by the PCEP speaker originating the LSP if the capability was advertised by both PCEP speakers. If this condition is not satisfied, the receiving PCEP speaker MUST send PCErr with Error-Type=6, Error-value=22 'Missing SR Policy Association'.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
