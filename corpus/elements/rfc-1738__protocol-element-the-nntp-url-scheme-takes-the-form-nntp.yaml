document: rfc-1738
kind: protocol-element
summary: 'The nntp URL scheme takes the form `nntp://<host>:<port>/<newsgroup-name>/<article-number>` with default port 119. Unlike news: URLs, it specifies a unique location, but most NNTP servers restrict access to local clients, so the news: form is preferred.'
