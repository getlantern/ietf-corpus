document: rfc-8529
kind: design-rationale
summary: The NI module itself defines only the framework (name, mount points, interface binding) and delegates VRF/VSI technology-specific information (e.g., L3VPN route targets, L2VPN pseudowire config) to separate augmenting documents such as the emerging L3VPN and L2VPN YANG models.
