summary: 'TransportAddressIPv4z encodes a scoped IPv4 transport address as a 10-octet string: octets 1-4 IPv4 address, 5-8 zone index, 9-10 port number, all in network-byte order. Used with transportDomainUdpIpv4z, transportDomainTcpIpv4z, or transportDomainSctpIpv4z.'
