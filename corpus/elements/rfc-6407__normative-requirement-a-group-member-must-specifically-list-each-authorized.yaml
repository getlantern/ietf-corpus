document: rfc-6407
kind: normative-requirement
summary: A group member MUST specifically list each authorized GCKS in its Group Peer Authorization Database (GPAD) and MUST ensure that the Phase 1 identity of the GCKS matches an authorized GCKS, preventing rogue-GCKS man-in-the-middle attacks.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
