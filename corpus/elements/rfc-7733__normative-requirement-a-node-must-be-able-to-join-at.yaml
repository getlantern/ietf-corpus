document: rfc-7733
kind: normative-requirement
summary: A node MUST be able to join at least one RPL Instance, as a new, temporary instance is created during each P2P-RPL route discovery operation. A node MAY be designed to join multiple RPL Instances.
section: 4.1.1
rfc2119_level: MUST
topics:
    - routing
