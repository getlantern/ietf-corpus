document: rfc-9921
kind: protocol-element
summary: The 3161-ttc COSE protected header parameter carries a DER-encoded RFC 3161 TimeStampToken (TST) bstr-wrapped in CBOR (Major type 2). It is used in TTC mode, where the payload is hashed and submitted to the TSA before the COSE message is signed.
