kind: design-rationale
summary: 'A rib-name nexthop case enables chained RIB lookups: a route''s nexthop points to another RIB by name, causing the lookup to continue in the specified RIB rather than terminating. This supports policy-based routing and VPN use cases without requiring separate protocol machinery.'
