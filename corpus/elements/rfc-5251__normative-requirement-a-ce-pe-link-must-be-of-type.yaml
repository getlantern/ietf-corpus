document: rfc-5251
kind: normative-requirement
summary: A <CE, PE> link MUST be of type <X, LSC> or <Y, TDM>, where X = PSC, L2SC, or TDM and Y = PSC or L2SC. The Generalized Protocol Identifier (GPID) MUST be signaled and identical at both the head-end and tail-end CE.
section: "2"
rfc2119_level: MUST
topics:
    - vpn
    - mpls
