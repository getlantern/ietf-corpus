document: rfc-5388
kind: protocol-element
summary: The 'RequestMetadata' element specifies configuration parameters requested for a traceroute measurement, including CtlTargetAddress, CtlMaxTtl, CtlProbesPerHop, CtlTimeOut, CtlPort, CtlType, and other optional fields. When omitted, all requested parameters are assumed to have been used as recorded in 'MeasurementMetadata'.
