document: rfc-3173
kind: security-consideration
summary: When IPComp is used without IPsec, it may make it difficult for border routers to filter datagrams based on header fields, since the original Protocol field value and transport layer headers (e.g., port numbers) are not in their normal positions or original values after compression.
