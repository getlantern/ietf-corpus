document: rfc-8516
kind: normative-requirement
summary: If a CoAP server is unable to serve a client sending requests more often than it can handle, the server SHOULD respond with response code 4.29 'Too Many Requests'. The Max-Age option indicates the number of seconds after which the server assumes the client may retry.
section: "3"
rfc2119_level: SHOULD
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
