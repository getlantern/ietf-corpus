document: rfc-7940
kind: protocol-element
summary: 'Character classes can be defined four ways: tag-based (''from-tag''), Unicode property-based (''property''), explicit code point list, or as set combinations (complement, union, intersection, difference, symmetric-difference). Named classes are referenced via an empty ''class'' element with ''by-ref''.'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
