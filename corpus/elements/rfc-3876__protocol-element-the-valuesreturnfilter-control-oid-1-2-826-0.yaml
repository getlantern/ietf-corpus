document: rfc-3876
kind: protocol-element
summary: The valuesReturnFilter control (OID 1.2.826.0.1.3344810.2.3) is an LDAPv3 control that causes the server to return only those attribute values that match a 'values return' filter. It applies only to Search operations and can be marked critical or non-critical by the client.
section: "2"
topics:
