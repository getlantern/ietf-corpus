document: rfc-7177
kind: interoperability-note
summary: A LAN Hello received on a port configured as point-to-point, or a P2P Hello received on a port not configured as point-to-point, is discarded. Hello type (LAN vs P2P) must match port configuration for a TRILL adjacency to be established.
section: "8.3"
topics:
    - routing
