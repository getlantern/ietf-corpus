document: rfc-2197
kind: interoperability-note
summary: The original SMTP specification (RFC 821) did not explicitly require servers to support command pipelining, resulting in a non-trivial number of deployed servers that cannot adequately handle pipelined commands. The PIPELINING extension provides an explicit opt-in mechanism to avoid compatibility issues.
