document: rfc-4149
kind: interoperability-note
summary: The SSPM-MIB is designed for use in conjunction with APM-MIB (RFC 3729) and TPM-MIB (RFC 4150). The AppLocalIndex from APM-MIB is the cross-reference key used in sspmSourceProfileType, sspmSinkType, and sspmCapabilitiesInstance to correlate measurement configuration with reporting structures.
