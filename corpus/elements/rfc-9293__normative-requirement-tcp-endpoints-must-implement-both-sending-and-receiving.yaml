document: rfc-9293
kind: normative-requirement
summary: TCP endpoints MUST implement both sending and receiving the MSS Option (MUST-14). If no MSS Option is received at connection setup, the implementation MUST assume a default send MSS of 536 bytes for IPv4 or 1220 bytes for IPv6 (MUST-15).
section: 3.7.1
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
