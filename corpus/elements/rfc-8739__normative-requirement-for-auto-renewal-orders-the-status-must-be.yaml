document: rfc-8739
kind: normative-requirement
summary: For auto-renewal Orders, the status MUST be 'valid' as long as STAR certificates are being issued. A new 'canceled' status is added; cancellation is the only way to terminate an active STAR Order before its end-date.
section: 3.1.1
rfc2119_level: MUST
