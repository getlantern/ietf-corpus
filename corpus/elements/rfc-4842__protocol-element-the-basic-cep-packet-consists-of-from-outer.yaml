document: rfc-4842
kind: protocol-element
summary: 'The basic CEP packet consists of (from outer to inner): PSN and Multiplexing Layer Headers, CEP Header, optional RTP Header (RFC 3550), and SONET/SDH Fragment. The SONET/SDH SPE or VT is broken into fragments, each prepended with a CEP header and optionally an RTP header, then carried over an MPLS PSN.'
