document: rfc-2740
kind: protocol-element
summary: 'The LS type field has been expanded from 8 to 16 bits: the top two bits encode flooding scope (00=link-local, 01=area, 10=AS, 11=reserved) and the next bit is the U-bit governing unknown LSA handling. If U-bit=0, unrecognized LSA types are treated as having link-local flooding scope; if U-bit=1, they are stored and flooded as if understood.'
section: A.4.2.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
