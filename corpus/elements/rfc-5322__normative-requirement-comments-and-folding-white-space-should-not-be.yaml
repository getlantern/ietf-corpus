document: rfc-5322
kind: normative-requirement
summary: Comments and folding white space SHOULD NOT be used around the '@' in the addr-spec. If the local-part can be represented as a dot-atom, the dot-atom form SHOULD be used and the quoted-string form SHOULD NOT be used.
section: 3.4.1
rfc2119_level: SHOULD NOT
topics:
    - email
