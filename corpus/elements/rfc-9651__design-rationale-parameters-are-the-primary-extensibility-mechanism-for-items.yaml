document: rfc-9651
kind: design-rationale
summary: Parameters are the primary extensibility mechanism for Items and Inner Lists, allowing field specifications to add information later without breaking parsers. Field specifications are discouraged from treating unrecognized parameters as errors, and Dictionary-based fields should ignore unknown keys to enable forward compatibility.
section: "2.3"
topics:
    - http
