document: rfc-7524
kind: protocol-element
summary: 'An inter-area P2MP service LSP is partitioned into three intra-area segments: an ingress area segment rooted at the ingress PE/ASBR, a backbone area segment rooted at the ingress ABR, and one or more egress area segments each rooted at an egress ABR. Each segment is carried over an intra-area P2MP LSP or instantiated using ingress replication.'
section: "3"
topics:
