document: rfc-5311
kind: normative-requirement
summary: If the Originating System sets the OL bit in a normal LSP, Extension-capable ISs MUST also treat the Virtual ISs as unreachable, consistent with legacy behavior, to avoid potential routing loops when leaf information is in Extended LSPs.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
