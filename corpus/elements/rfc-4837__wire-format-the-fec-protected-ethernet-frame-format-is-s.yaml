document: rfc-4837
kind: wire-format
summary: 'The FEC-protected Ethernet frame format is: S_FEC delimiter | Preamble/SFD | Ethernet Frame | FCS | T_FEC delimiter | Parity bytes | T_FEC delimiter. The RS(255,239,8) code is used, improving BER from 1E-4 to 1E-12. FEC is optional and adds a fixed delay in both transmit and receive paths.'
section: 2.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
