document: rfc-3621
kind: normative-requirement
summary: For non-modular devices, the group index value 1 MUST be used in pethPsePortGroupIndex, pethMainPseGroupIndex, and pethNotificationControlGroupIndex. The same value MUST be used across all three index objects to refer to a given box in a stack or module in a rack.
section: "5"
rfc2119_level: MUST
topics:
