document: rfc-7208
kind: protocol-element
summary: 'SPF mechanisms are: ''all'' (always matches), ''include'' (recursive check_host() evaluation), ''a'' (A/AAAA record match), ''mx'' (MX host match), ''ptr'' (reverse DNS, deprecated), ''ip4''/''ip6'' (explicit IP ranges with optional CIDR), and ''exists'' (arbitrary DNS A lookup). Each mechanism has an optional qualifier (+, -, ~, ?) defaulting to +.'
