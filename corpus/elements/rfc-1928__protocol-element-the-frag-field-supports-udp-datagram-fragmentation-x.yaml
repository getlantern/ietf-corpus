summary: 'The FRAG field supports UDP datagram fragmentation: X''00'' indicates a standalone datagram, values 1–127 indicate fragment position within a sequence, and the high-order bit (X''80'') indicates end-of-fragment sequence. Implementations maintain a reassembly queue and timer per fragment sequence.'
