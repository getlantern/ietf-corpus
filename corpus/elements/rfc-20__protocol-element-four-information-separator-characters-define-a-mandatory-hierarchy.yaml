summary: 'Four Information Separator characters define a mandatory hierarchy: FS (File Separator) is most inclusive, followed by GS (Group Separator), RS (Record Separator), and US (Unit Separator) as least inclusive. Content and length of the delimited units are not specified by the standard.'
