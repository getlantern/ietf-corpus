document: rfc-6339
kind: protocol-element
summary: The C binding gss_decapsulate_token() takes a gss_const_buffer_t input_token and gss_const_OID token_oid (the expected OID), and writes the decapsulated data into a gss_buffer_t output_token. Returns OM_uint32 status codes including GSS_S_DEFECTIVE_TOKEN when consistency checks fail.
section: "4.1"
topics:
