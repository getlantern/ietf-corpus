document: rfc-7931
kind: privacy-consideration
summary: Use of the uniform client ID string approach enables multiple servers acting in concert to determine when multiple requests received at different times originate from the same NFSv4.0 client, potentially correlating distinct user identities to the same person across different servers. Client implementers must weigh this privacy exposure against the operational benefits of the uniform approach.
section: "5.6"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
