document: rfc-2115
kind: protocol-element
summary: ifHCInOctets and ifHCOutOctets (64-bit octet counters) are only required for Frame Relay interfaces when ifSpeed is at or above 155 Mbits/s, consistent with the high-capacity counter requirements of RFC 1573.
