document: rfc-9925
kind: normative-requirement
summary: X.509 validators MUST NOT accept id-alg-unsigned in the place of a valid signature in the certification path. Treating it as an unknown algorithm — causing path validation to fail at Step (a.1) of RFC 5280 Section 6.1.3 — is the RECOMMENDED approach for unmodified implementations.
section: "4"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
