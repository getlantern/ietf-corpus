document: rfc-7986
kind: protocol-element
summary: 'The DISPLAY property parameter specifies how an image should be presented: BADGE (inline with event title, default), GRAPHIC (full image replacement), FULLSIZE (image enhancing the event), or THUMBNAIL (constrained-space variant). Default is BADGE when parameter is absent.'
section: "6.1"
