document: rfc-4005
kind: security-consideration
summary: The User-Password AVP represents sensitive information and relies on Diameter's mandatory IPsec or TLS transport encryption. In untrusted proxy environments, additional end-to-end encryption (e.g., CMS Security) SHOULD be applied to prevent password exposure to intermediate agents.
section: "5.1"
topics:
    - diameter
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
