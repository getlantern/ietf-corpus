document: rfc-4242
kind: normative-requirement
summary: A client MUST request the Information Refresh Time option in the Option Request Option (ORO) when sending Information-Request messages to the DHCPv6 server. A client MUST NOT request this option in the ORO in any other messages.
section: "3.2"
rfc2119_level: MUST
topics:
