document: rfc-3404
kind: protocol-element
summary: Service identifiers (the 'rs' production) include I2L (return one URI for the resource location), I2Ls (return multiple location URIs), I2R (return one resource instance), I2Rs (return multiple instances), I2C (return a resource description), and I2N (return a URN naming the resource).
