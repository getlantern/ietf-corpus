document: rfc-4028
kind: protocol-element
summary: The 422 (Session Interval Too Small) response code is generated by a UAS or proxy when a request contains a Session-Expires header field with a duration below the element's minimum timer. The 422 response MUST contain a Min-SE header field with the server's minimum timer.
section: "6"
topics:
