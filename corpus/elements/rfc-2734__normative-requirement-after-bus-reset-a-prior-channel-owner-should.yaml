document: rfc-2734
kind: normative-requirement
summary: After bus reset, a prior channel owner SHOULD reuse the same channel number and MAY attempt reallocation immediately; if a different channel number is desired, the owner SHALL wait at least one second after bus reset completion before allocation.
section: "9.10"
rfc2119_level: SHOULD
topics:
    - ip
    - multicast
