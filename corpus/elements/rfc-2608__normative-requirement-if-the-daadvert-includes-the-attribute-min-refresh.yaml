document: rfc-2608
kind: normative-requirement
summary: If the DAAdvert includes the attribute 'min-refresh-interval', SAs MUST NOT refresh any particular service advertisement more frequently than this value, and the DA SHOULD return REFRESH_REJECTED if violated.
