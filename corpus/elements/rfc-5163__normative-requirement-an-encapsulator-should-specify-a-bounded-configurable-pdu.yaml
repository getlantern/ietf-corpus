document: rfc-5163
kind: normative-requirement
summary: An Encapsulator SHOULD specify a bounded, configurable PDU Packing Threshold for PDU-Concat; if additional PDUs are not received within that threshold, the Encapsulator MUST immediately send all queued PDUs.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
