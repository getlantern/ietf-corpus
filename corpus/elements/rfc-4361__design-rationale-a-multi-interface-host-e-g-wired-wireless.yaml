document: rfc-4361
kind: design-rationale
summary: A multi-interface host (e.g., wired + wireless laptop) presents multiple DHCP identities under RFC 2131/2132, causing inconsistent DNS registration and IP address assignment. A node-level identifier shared across interfaces solves this.
section: "4.2"
topics:
