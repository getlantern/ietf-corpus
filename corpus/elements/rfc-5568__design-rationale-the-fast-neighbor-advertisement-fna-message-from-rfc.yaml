document: rfc-5568
kind: design-rationale
summary: The Fast Neighbor Advertisement (FNA) message from RFC 4068 was deprecated in favor of the Unsolicited Neighbor Advertisement (UNA) with 'O' bit cleared. UNA reuses the standard RFC 4861 message, reducing protocol complexity and avoiding a separate message type for the same function.
