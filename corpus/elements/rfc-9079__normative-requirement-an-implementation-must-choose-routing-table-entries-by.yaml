document: rfc-9079
kind: normative-requirement
summary: An implementation MUST choose routing table entries by using destination-first ordering, where R1 is preferred to R2 when R1's destination prefix is more specific than R2's, or the destination prefixes are equal and R1's source prefix is more specific than R2's.
section: "4"
rfc2119_level: MUST
topics:
    - routing
