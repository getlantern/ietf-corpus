document: rfc-7715
kind: normative-requirement
summary: After a link failure where node N is still reachable, LSR2 and LSR3 MUST send a Label Withdraw to LSR1 to withdraw the label binding after N updates them that the PLR address is no longer applicable.
section: 4.1.2
rfc2119_level: MUST
topics:
