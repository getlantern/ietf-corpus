document: rfc-3077
kind: protocol-element
summary: The Tunnel Type field (8 bits) in HELLO uses the IP protocol number from RFC 1700 to indicate the tunneling protocol. Value 47 (GRE) is recommended; other values permitting link-layer encapsulation are allowed.
