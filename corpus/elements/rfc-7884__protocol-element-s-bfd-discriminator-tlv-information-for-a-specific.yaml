document: rfc-7884
kind: protocol-element
summary: S-BFD Discriminator TLV information for a specific target identifier is only considered current and usable when the advertising router is itself reachable via OSPF calculated paths in the same area of the LSA. For domain-wide flooding from a remote area, the mechanism in RFC 5250 Section 5 should be used.
section: "2.2"
topics:
    - routing
