document: rfc-1661
kind: interoperability-note
summary: LCP Link Configuration, Link Termination, and Code-Reject packets (codes 1-7) are always sent as if no Configuration Options were negotiated, using default values. This ensures LCP packets remain recognizable even when one peer mistakenly believes the link is open with negotiated options.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
