document: rfc-6494
kind: security-consideration
summary: Certification authorities must ensure correct EKU values are inserted in each issued certificate, as relying parties accept or reject certificates for intended uses based on EKU content. Incorrect representation may cause rejection of appropriate certificates or acceptance of inappropriate ones.
section: "11"
