document: rfc-9553
kind: normative-requirement
summary: Implementations MUST validate that JSON objects with the @type property conform to the specification of the named JSContact object type. An object that is not the value of a property (e.g., the topmost object in JSON data) MUST have the @type property set.
section: 1.3.4
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
