document: rfc-3311
kind: design-rationale
summary: UPDATE was created because re-INVITE cannot be used to modify session parameters before the initial INVITE completes. Re-INVITE affects dialog state in addition to session state, making it unsuitable for early dialog modifications such as putting early media on hold.
section: "1"
topics:
