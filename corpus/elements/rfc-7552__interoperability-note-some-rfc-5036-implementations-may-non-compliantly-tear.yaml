document: rfc-7552
kind: interoperability-note
summary: Some RFC 5036 implementations may non-compliantly tear down the LDP session upon receiving an IPv6 address family in an Address message, rather than gracefully ignoring it per Section 3.5.5.1. The Dual-Stack capability TLV detection in Sections 6 and 7 prevents IPv6 address advertisements from being sent to such peers.
section: A.2
topics:
    - mpls
    - ip
    - v6ops
