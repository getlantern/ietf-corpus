document: rfc-2344
kind: protocol-element
summary: The Encapsulating Delivery Style has the mobile node explicitly encapsulate its outgoing packets in an IP-in-IP outer header addressed to the foreign agent. The foreign agent decapsulates and re-encapsulates them in a new tunnel from its care-of address to the home agent. This style supports broadcast, multicast, and selective reverse tunneling.
section: "5.2"
topics:
    - mobility
    - ip
    - multicast
