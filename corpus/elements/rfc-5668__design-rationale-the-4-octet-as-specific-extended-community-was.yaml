document: rfc-5668
kind: design-rationale
summary: The 4-octet AS specific extended community was introduced because the existing 2-octet AS specific extended community (RFC 4360) cannot carry 4-octet AS numbers, which became necessary as the AS number space expanded beyond 16 bits (RFC 4893). The new type mirrors the 2-octet variant but widens the Global Administrator sub-field from 2 to 4 octets.
