document: rfc-4798
kind: wire-format
summary: The BGP Next Hop field for IPv6 prefixes carries the egress 6PE's IPv4 address encoded as an IPv4-mapped IPv6 address (::ffff:0:0/96 prefix per RFC 4291), enabling automatic determination of the IPv4-signaled LSP to use.
