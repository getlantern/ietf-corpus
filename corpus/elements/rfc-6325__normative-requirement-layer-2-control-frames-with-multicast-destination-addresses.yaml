document: rfc-6325
kind: normative-requirement
summary: Layer 2 control frames with multicast destination addresses in the range 01-80-C2-00-00-00 to 01-80-C2-00-00-0F or equal to 01-80-C2-00-00-21 MUST NOT be encapsulated and forwarded by RBridges. RBridges conformant to this specification MUST discard TRILL other frames (those using the 16 reserved TRILL multicast addresses other than All-RBridges and All-IS-IS-RBridges).
section: "1.4"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
