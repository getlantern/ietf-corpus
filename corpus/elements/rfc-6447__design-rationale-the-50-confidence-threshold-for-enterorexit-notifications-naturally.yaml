document: rfc-6447
kind: design-rationale
summary: 'The 50% confidence threshold for <enterOrExit> notifications naturally limits notification frequency: small movements relative to location uncertainty at region borders do not trigger notifications, since the total confidence depends on location confidence (95% recommended per RFC 5491) and does not simply add to 100%.'
section: "3.4"
