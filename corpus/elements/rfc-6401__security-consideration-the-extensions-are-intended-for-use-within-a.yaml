document: rfc-6401
kind: security-consideration
summary: The extensions are intended for use within a single administrative domain. Network operators SHOULD use router alert protection (per RFC 6398) or tunnel/drop incoming RSVP messages at domain edges to prevent RSVP signaling carrying these policy elements from leaking across domain boundaries.
section: "6"
topics:
