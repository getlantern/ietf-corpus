document: rfc-7496
kind: normative-requirement
summary: When the send buffer has insufficient space, the SCTP stack MAY abandon other user messages of the same association with a priority lower than the incoming message's priority to make room. The selection algorithm is implementation specific.
section: "3.2"
rfc2119_level: MAY
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
