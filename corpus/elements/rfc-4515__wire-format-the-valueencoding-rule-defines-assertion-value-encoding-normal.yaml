document: rfc-4515
kind: wire-format
summary: 'The valueencoding rule defines assertion value encoding: normal = UTF1SUBSET / UTFMB; escaped = ESC HEX HEX. UTF1SUBSET covers %x01-27 / %x2B-5B / %x5D-7F, explicitly excluding NUL, LPAREN, RPAREN, ASTERISK, and ESC.'
