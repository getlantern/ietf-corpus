document: rfc-8951
kind: wire-format
summary: CsrAttrs is an ASN.1 SEQUENCE of AttrOrOID elements; AttrOrOID is a CHOICE between an OBJECT IDENTIFIER (oid) and an Attribute constrained by AttrSet. The sequence is DER-encoded (X.690) then base64-encoded to form the application/csrattrs body.
