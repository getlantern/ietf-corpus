document: rfc-9796
kind: normative-requirement
summary: An end client receiving a jCard with a "url" property MUST only display the URL and MUST NOT automatically follow the URL or provide an automatic preview, and MUST adhere to good practice to make the user's choice clear.
section: 10.9.5
rfc2119_level: MUST
topics:
