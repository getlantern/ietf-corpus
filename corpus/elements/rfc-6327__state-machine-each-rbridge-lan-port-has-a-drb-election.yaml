document: rfc-6327
kind: state-machine
summary: 'Each RBridge LAN port has a DRB election state: Down (operationally down), Suspended (same MAC as higher-priority port), DRB (port is Designated RBridge), or Not DRB (deferring to another). Transitions are driven by events D1–D5, including suspension timer expiry, adjacency table changes, receipt of higher-priority same-MAC Hello, and port going down.'
