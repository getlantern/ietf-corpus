document: rfc-4951
kind: normative-requirement
summary: An endpoint MUST NOT use any old Tunnel ID for the recovery tunnel; old tunnels MUST remain valid until the recovery process concludes. The endpoint MUST use the Tie Breaker AVP in recovery tunnel setup to ensure only a single recovery tunnel is established when both endpoints attempt simultaneous failover.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
