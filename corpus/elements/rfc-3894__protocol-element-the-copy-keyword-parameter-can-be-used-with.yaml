document: rfc-3894
kind: protocol-element
summary: The ":copy" keyword parameter can be used with the Sieve "fileinto" and "redirect" actions. When specified, it suppresses cancellation of the implicit "keep" behavior, causing the action to file or redirect a copy of the message in addition to normal delivery.
section: "3"
topics:
    - email
