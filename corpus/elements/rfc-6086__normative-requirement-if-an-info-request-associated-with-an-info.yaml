document: rfc-6086
kind: normative-requirement
summary: If an INFO request associated with an Info Package contains a message body part, that body part MUST be identified by a Content-Disposition header field value of 'Info-Package'. UAs MUST support multipart body parts in accordance with RFC 5621.
section: 4.3.1
rfc2119_level: MUST
topics:
