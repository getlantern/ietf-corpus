summary: 'The T11FspfInterfaceState textual convention defines the FSPF Neighbor Finite State Machine with six states: down(1), init(2), dbExchange(3), dbAckwait(4), dbWait(5), and full(6). The notification t11FspfNbrStateChangNotify fires on transitions to terminal states (Full or Down/Init regression).'
