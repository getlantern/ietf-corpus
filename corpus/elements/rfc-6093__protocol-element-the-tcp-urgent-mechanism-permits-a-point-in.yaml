document: rfc-6093
kind: protocol-element
summary: The TCP urgent mechanism permits a point in the data stream to be designated as the end of urgent information. It is NOT a mechanism for sending out-of-band data; urgent data must be delivered in-line to the TCP user. The URG control flag indicates the Urgent Pointer field is meaningful and must be added to the segment sequence number to yield the urgent pointer.
section: "2.1"
topics:
    - tcp
