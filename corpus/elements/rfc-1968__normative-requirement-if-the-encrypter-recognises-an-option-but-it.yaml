document: rfc-1968
kind: normative-requirement
summary: If the Encrypter recognises an option but it is unacceptable due to parameter values, it MUST send a Configure-Nak with the option modified appropriately, and the Nak MUST contain only those options that will be acceptable.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
