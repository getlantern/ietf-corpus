document: rfc-3515
kind: design-rationale
summary: Early versions of REFER required the agent to wait until the referenced action completed before sending a final response. This was infeasible due to non-INVITE transaction timeout rules in RFC 3261, which require a final response within the transaction lifetime. The current design uses an immediate 202 Accepted plus asynchronous NOTIFYs instead.
section: "6"
topics:
    - sip
    - realtime
