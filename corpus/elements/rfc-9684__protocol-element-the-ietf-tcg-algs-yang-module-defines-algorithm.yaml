kind: protocol-element
summary: 'The ietf-tcg-algs YANG module defines algorithm identities corresponding to TCG Algorithm Registry Table 3 (rev 1.32), organized into cryptographic function categories: asymmetric, symmetric, hash, signing, anonymous_signing, encryption_mode, method, and object_type. It also defines tpm12 and tpm20 API specification identities.'
