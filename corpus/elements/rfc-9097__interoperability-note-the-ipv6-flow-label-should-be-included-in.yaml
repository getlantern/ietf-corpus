document: rfc-9097
kind: interoperability-note
summary: The IPv6 flow label SHOULD be included in the flow definition when routers have complied with RFC 6438 guidelines, since multipath routing decisions (load balancing) use flow-identifying header fields. For link aggregation scenarios, multiple flows may be needed to occupy each member of the aggregate.
