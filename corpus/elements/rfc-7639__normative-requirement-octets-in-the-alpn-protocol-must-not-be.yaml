document: rfc-7639
kind: normative-requirement
summary: Octets in the ALPN protocol MUST NOT be percent-encoded if they are valid token characters except '%'. When using percent-encoding, uppercase hex digits MUST be used. These constraints ensure precisely one canonical representation for any ALPN protocol name.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - http
