document: rfc-1717
kind: design-rationale
summary: The Endpoint Discriminator option enables automatic bundle formation by identifying the physical peer endpoint across independently negotiated PPP links. Classes with globally unique values (IP address, IEEE 802.1 MAC) are preferred; Locally Assigned and PPP Magic-Number Block classes are deprecated because uniqueness is not guaranteed.
section: 5.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
