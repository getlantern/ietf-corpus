document: rfc-9117
kind: security-consideration
summary: Allowing Flow Specifications to originate from within the Local Domain (e.g., from a centralized SOC) improves overall network security by enabling faster and more scalable attack mitigation; operators can direct border routers to drop traffic or forward to pipe-cleaning locations during active attacks.
