document: rfc-3788
kind: design-rationale
summary: Traditional telephony network security was based on the closed network principle, with SS7 networks physically secured and end-users never directly connected to them. SIGTRAN protocols carry these signals over IP networks that lack this closed-network assumption, motivating the need for explicit cryptographic security.
section: "3"
topics:
