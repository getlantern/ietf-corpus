document: rfc-9038
kind: normative-requirement
summary: 'The <reason> element SHOULD follow the ABNF format: NAMESPACE-URI " not in login services", where NAMESPACE-URI is the unhandled XML namespace (e.g., "urn:ietf:params:xml:ns:domain-1.0 not in login services").'
section: "3"
rfc2119_level: SHOULD
