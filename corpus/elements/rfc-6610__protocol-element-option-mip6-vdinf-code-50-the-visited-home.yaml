document: rfc-6610
kind: protocol-element
summary: OPTION_MIP6_VDINF (code 50), the Visited Home Network Information option, is used by relay agents and DHCP servers to provide information about the local (visited) home network. It acts as a container carrying sub-options for the local ASP.
