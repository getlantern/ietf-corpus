document: rfc-5440
kind: wire-format
summary: 'The BANDWIDTH object body is 4 bytes: a single 32-bit IEEE 754 floating-point value representing bandwidth in bytes per second. Object-Type=1 is requested bandwidth; Object-Type=2 is bandwidth of the existing TE LSP being reoptimized. If requested bandwidth is nonzero, the PCReq MUST contain a BANDWIDTH object.'
section: "7.7"
topics:
    - routing
    - mpls
    - qos
