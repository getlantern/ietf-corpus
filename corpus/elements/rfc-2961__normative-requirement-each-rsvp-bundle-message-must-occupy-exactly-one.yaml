document: rfc-2961
kind: normative-requirement
summary: Each RSVP Bundle message MUST occupy exactly one IP datagram (allowing IP fragmentation up to approximately 64 KB). Bundle messages SHOULD NOT carry the Router Alert IP option because they are addressed directly to RSVP neighbors.
section: "3.3"
rfc2119_level: MUST
topics:
    - qos
