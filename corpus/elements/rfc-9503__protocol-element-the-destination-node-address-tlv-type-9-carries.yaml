document: rfc-9503
kind: protocol-element
summary: The Destination Node Address TLV (Type=9) carries the IPv4 or IPv6 address of the intended Session-Reflector node. For IPv4, Length=4 octets; for IPv6, Length=16 octets. It is used when the STAMP packet Destination Address is not a routable address of the Session-Reflector.
