document: rfc-6378
kind: normative-requirement
summary: Both the default frequency of the three rapid messages and the default frequency of continual message transmission SHALL be configurable by the operator. For management purposes, the operator SHOULD be able to retrieve current default and per-LSP actual frequency values.
section: "4.1"
rfc2119_level: MUST
topics:
