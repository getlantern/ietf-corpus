document: rfc-2228
kind: normative-requirement
summary: The AUTH command, if accepted, removes any state associated with prior FTP Security commands. The server MUST also require that the user reauthorize (reissue some or all of USER, PASS, and ACCT) when a new AUTH is accepted.
section: "3"
rfc2119_level: MUST
topics:
    - security
