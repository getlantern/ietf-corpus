document: rfc-2645
kind: interoperability-note
summary: ODMR is a restricted SMTP profile; the provider's ODMR listener need not be a full SMTP server but must implement EHLO, AUTH, ATRN, and QUIT, plus function as an SMTP client with access to outgoing mail queues.
