document: rfc-2533
kind: wire-format
summary: The feature predicate is defined by an ABNF grammar (based on RFC 2254 LDAP search filters) where a 'filter' is a parenthesized 'filtercomp' followed by optional parameters. Composite forms are '(&...)' for AND, '(|...)' for OR, and '(!...)' for NOT; simple comparisons use 'attr filtertype value' with filtertype being '=', '>=', or '<='.
section: "4.1"
extracted_by: claude-sonnet-4-6
