document: rfc-7363
kind: normative-requirement
summary: A failure history size K of 25% of the routing table size is RECOMMENDED. Using additional frequent RELOAD messages to every peer in the connection table for failure detection is NOT RECOMMENDED due to excessive bandwidth consumption.
section: "6.3"
rfc2119_level: RECOMMENDED
topics:
    - routing
