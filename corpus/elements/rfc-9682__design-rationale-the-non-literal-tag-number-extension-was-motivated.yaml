document: rfc-9682
kind: design-rationale
summary: The non-literal tag number extension was motivated by RFC 9277, which requires a range of tag numbers (0x63740101–0x6374FFFF) that cannot be expressed with RFC 8610's literal-only syntax. The ct-tag example demonstrates expressing such a range via a CDDL type reference.
section: "3.2"
