document: rfc-8445
kind: protocol-element
summary: Triggered checks are connectivity checks enqueued when an agent receives an incoming Binding request from its peer. They are placed in a per-checklist FIFO triggered-check queue and take priority over ordinary scheduled checks, accelerating pair validation.
