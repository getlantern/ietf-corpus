document: rfc-6543
kind: design-rationale
summary: The base PMIPv6 specification (RFC 5213) required use of fixed link-local and link-layer addresses but did not reserve specific values, creating operational challenges in multi-vendor deployments requiring manual coordination. This specification addresses that by making explicit reservations to simplify deployment.
section: "1"
topics:
