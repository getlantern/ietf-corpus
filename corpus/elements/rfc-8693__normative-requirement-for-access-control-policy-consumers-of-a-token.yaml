document: rfc-8693
kind: normative-requirement
summary: For access control policy, consumers of a token MUST only consider the token's top-level claims and the current actor identified by the top-level 'act' claim. Nested (prior) 'act' claims are informational only and MUST NOT be used in access control decisions.
section: "4.1"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
