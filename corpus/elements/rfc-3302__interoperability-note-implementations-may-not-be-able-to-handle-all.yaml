document: rfc-3302
kind: interoperability-note
summary: Implementations may not be able to handle all defined applications or profiles within applications of TIFF. The presence of the application parameter may aid in determining rendering capability before dispatching, but the parameter is not intended to convey capability levels.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
