document: rfc-1171
kind: state-machine
summary: 'The LCP automaton has seven states: Closed (1), Listen (2), Request-Sent (3), Ack-Received (4), Ack-Sent (5), Open (6), and Closing (7). Transitions are triggered by events including Active-Open, Passive-Open, Close, Timeout, Physical-Layer-Down, and receipt of Configure-Request/Ack/Nak, Terminate-Request/Ack, Code-Reject, and Echo-Request packets.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
