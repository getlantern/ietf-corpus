document: rfc-7911
kind: normative-requirement
summary: A new advertisement for a given address prefix and Path Identifier replaces a previous advertisement for the same address prefix and Path Identifier. If a BGP speaker receives a withdrawal for a prefix with a Path Identifier not seen before, it SHOULD silently ignore it.
section: "5"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
