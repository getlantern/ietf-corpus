summary: 'The ''performance-metrics-one-way-delay-loss'', ''performance-metrics-two-way-delay-loss'', and ''performance-metrics-one-way-bandwidth'' groupings define PM fields: one-way and two-way delay (uint32, range 0..16777215 microseconds), residual bandwidth, available bandwidth, and utilized bandwidth (IEEE 754 float32, bytes/sec) with anomaly normality indicators, per RFC 7471, RFC 8570, and RFC 7823.'
