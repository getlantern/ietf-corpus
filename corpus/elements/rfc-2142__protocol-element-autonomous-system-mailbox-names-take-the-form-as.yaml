document: rfc-2142
kind: protocol-element
summary: Autonomous System mailbox names take the form AS<number>@<registry-domain> (e.g., AS3557@RA.NET), used by Internet registries to provide mailing lists for AS technical contacts. Undeliverable names under this scheme should be treated as an inconvenience rather than a standards violation.
section: "8"
topics:
