document: rfc-4874
kind: design-rationale
summary: The XRO is designed to carry only the minimal set of exclusions needed to constrain loose-hop expansion, not to enumerate all undesired paths. Subobjects can be removed from the XRO by intermediate nodes as they become irrelevant, keeping signaling overhead bounded by the length of the primary LSP's RRO.
section: "1.2"
topics:
    - mpls
    - routing
