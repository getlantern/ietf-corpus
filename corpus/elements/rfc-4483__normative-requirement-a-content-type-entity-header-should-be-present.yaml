document: rfc-4483
kind: normative-requirement
summary: A Content-Type entity header SHOULD be present in the entity payload to support SIP content-type negotiation. The sender MUST be prepared for the receiver to reject content indirection if it cannot negotiate an appropriate MIME type.
section: "5.8"
rfc2119_level: SHOULD
topics:
    - sip
    - email
