document: rfc-4293
kind: protocol-element
summary: 'IpAddressPrefixOriginTC defines five values for prefix origin: other(1), manual(2), wellknown(3), dhcp(4), and routeradv(5). It is distinct from IpAddressOriginTC: the former describes how a prefix was learned, the latter how an address was created.'
