document: rfc-5433
kind: normative-requirement
summary: The MAC in GPSK-4 MUST always be included regardless of whether PD_Payload_Block is present. If MAC validation fails on any GPSK-4 packet, the server MUST silently discard the packet.
section: "9.3"
rfc2119_level: MUST
topics:
    - security
