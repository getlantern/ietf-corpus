document: rfc-7838
kind: design-rationale
summary: Alternative services do not replace the origin for any resource and are not visible to software above the access mechanism. They are analogous to DNS CNAME or SRV records — alternative routing information that does not change the identity or security context (including TLS certificate validation against the origin host name, not the alternative's) of the resource being accessed.
section: "2"
topics:
    - http
    - dns
