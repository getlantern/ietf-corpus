document: rfc-2459
kind: protocol-element
summary: The Authority Information Access extension (id-pe arc) provides information on how to access services for the issuing CA, including OCSP responder locations and CA issuer certificate retrieval URIs. It is a private Internet extension defined for use in both end-entity and CA certificates.
