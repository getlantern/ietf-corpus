document: rfc-8011
kind: protocol-element
summary: 'IPP operations are synchronous request/response pairs. Every operation request carries: a version-number, an operation-id, a request-id, and any required attributes and/or Document data. Every response carries: a version-number, a status-code, the matching request-id, and any required attributes or status messages.'
section: 4.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
