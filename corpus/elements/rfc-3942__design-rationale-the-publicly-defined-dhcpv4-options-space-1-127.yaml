document: rfc-3942
kind: design-rationale
summary: The publicly defined DHCPv4 options space (1-127) is nearly exhausted. Rather than using 16-bit option codes or a new magic cookie format (both of which impose significant implementation costs), the DHC WG chose to reclassify the largely-unused site-specific range (128-223) as publicly defined options, as the impact is minimal.
section: "3"
topics:
