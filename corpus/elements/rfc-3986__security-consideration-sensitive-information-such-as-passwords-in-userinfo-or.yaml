document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords in userinfo or session tokens in query strings should not be placed in URIs, as they may be logged, cached, referenced in Referer headers, or transmitted in plain text. Clear-text authentication in URIs has proven a security risk in nearly every deployment.
section: "7.5"
topics:
    - security
    - privacy
