document: rfc-4530
kind: design-rationale
summary: 'Distinguished names are not stable identifiers: a new object may receive a DN that previously identified a different (renamed or deleted) object. UUIDs are introduced to provide stable, space-and-time-unique identifiers that clients can use to distinguish or relocate objects across renames.'
section: "1"
