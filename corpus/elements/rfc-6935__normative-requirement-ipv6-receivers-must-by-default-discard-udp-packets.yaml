document: rfc-6935
kind: normative-requirement
summary: IPv6 receivers MUST by default discard UDP packets containing a zero checksum and SHOULD log the error. This default behavior is preserved from RFC 2460; only explicitly configured zero-checksum-mode ports are exempted.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
