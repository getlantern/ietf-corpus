document: rfc-2225
kind: design-rationale
summary: The default IP MTU of 9180 octets was chosen to match RFC 1209's IP MTU over SMDS, since having the same MTU for ATM AAL5 and SMDS reduces IP fragmentation and aids interoperability. NFS with overhead requires at least 8300 octets, and larger MTUs improve router performance.
