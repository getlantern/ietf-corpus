document: rfc-4265
kind: design-rationale
summary: The VPN-ID structure (3-octet OUI + 4-octet index) is adopted directly from RFC 2685, which defined the Global VPN Identifier format. Reusing an existing identifier scheme allows interoperability across VPN management frameworks without introducing a new naming authority.
section: "3.1"
topics:
