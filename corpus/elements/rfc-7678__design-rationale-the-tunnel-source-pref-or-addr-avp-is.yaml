document: rfc-7678
kind: design-rationale
summary: 'The Tunnel-Source-Pref-Or-Addr AVP is defined separately from Lw4o6-Binding to allow flexibility: the provisioning system can deliver just the tunnel source address to AAA independently, while still supporting delivery of the complete binding to the lw4o6 border router.'
