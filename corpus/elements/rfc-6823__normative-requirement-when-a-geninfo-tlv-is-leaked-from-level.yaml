document: rfc-6823
kind: normative-requirement
summary: When a GENINFO TLV is leaked from Level-2 to Level-1, the D bit MUST be set; otherwise it MUST be clear. GENINFO TLVs with the D bit set MUST NOT be leaked from Level-1 to Level-2, preventing TLV looping.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
