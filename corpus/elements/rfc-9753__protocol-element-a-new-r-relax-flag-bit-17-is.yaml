document: rfc-9753
kind: protocol-element
summary: A new R (RELAX) flag, bit 17, is added to the STATEFUL-PCE-CAPABILITY TLV. When set to 1, it indicates the PCEP speaker is willing to handle the P and I flags in the PCEP common object header for stateful PCEP messages; when unset, those flags are not handled for stateful messages.
section: "3.1"
topics:
