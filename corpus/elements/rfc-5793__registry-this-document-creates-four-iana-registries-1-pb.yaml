document: rfc-5793
kind: registry
summary: 'This document creates four IANA registries: (1) PB-TNC Message Types (section 6.2), (2) PA Subtypes (section 6.3), (3) PB-TNC Remediation Parameters Types (section 6.4), and (4) PB-TNC Error Codes (section 6.5). All use Expert Review with Specification Required as the registration policy. Vendor ID 0 entries require IANA registration; non-zero Vendor ID values are vendor-managed via SMI PENs.'
section: "6"
