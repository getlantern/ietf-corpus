document: rfc-5238
kind: protocol-element
summary: The two connection handshakes (DCCP and DTLS) are forced to happen in series, with DCCP first, followed by DTLS. However, DTLS records MAY be included in DCCP-Request and DCCP-Response packets to allow partial parallelism.
section: "3.2"
