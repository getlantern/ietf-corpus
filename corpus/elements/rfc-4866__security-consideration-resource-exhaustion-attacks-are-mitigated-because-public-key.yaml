document: rfc-4866
kind: security-consideration
summary: 'Resource exhaustion attacks are mitigated because public-key operations are deferred: the correspondent node performs the cheap CGA prefix check before the more expensive signature verification. The mobile node can also disable CGA Parameters Request options for correspondent nodes that persistently fail CGA verification, to avoid wasted verification effort.'
section: "6.6"
topics:
    - security
    - mobility
