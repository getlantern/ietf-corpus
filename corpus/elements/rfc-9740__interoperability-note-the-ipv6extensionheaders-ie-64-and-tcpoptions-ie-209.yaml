document: rfc-9740
kind: interoperability-note
summary: The ipv6ExtensionHeaders IE (64) and tcpOptions IE (209), both originally defined in RFC 5102, are deprecated by this document in favor of the new IEs. IANA has marked these entries as deprecated in the IPFIX registry and updated their references to point to RFC 9740.
