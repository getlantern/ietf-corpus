document: rfc-5506
kind: interoperability-note
summary: RFC 3711 (SRTP) requires that 'SRTCP MUST be given packets according to that requirement in the sense that the first part MUST be a sender report or a receiver report.' Although SRTP has no real functional dependency on this, changes in SRTP implementations MAY become necessary to support Reduced-Size RTCP.
section: 3.4.3
topics:
    - rtp
    - realtime
    - security
