document: rfc-9135
kind: wire-format
summary: The EVPN Router's MAC Extended Community is an 8-octet transitive extended community with Type=0x06 (EVPN) and Sub-Type=0x03, carrying a 6-octet MAC address. Only one instance MUST be attached per route; receivers process only the first if multiple are present.
