document: rfc-2181
kind: normative-requirement
summary: The domain name used as the value of an NS resource record, or part of the value of an MX resource record, must not be an alias. These names must have address records (currently A records) and must never have a CNAME RR.
section: "10.3"
rfc2119_level: MUST NOT
topics:
    - dns
