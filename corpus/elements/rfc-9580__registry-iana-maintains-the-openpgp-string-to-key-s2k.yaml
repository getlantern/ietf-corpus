summary: IANA maintains the 'OpenPGP String-to-Key (S2K) Types' registry with types 0 (Simple), 1 (Salted), 3 (Iterated and Salted), and 4 (Argon2, new in this document). IDs 100–110 are reserved for Private or Experimental Use. Generation of types 0 and 1 is prohibited for new output.
