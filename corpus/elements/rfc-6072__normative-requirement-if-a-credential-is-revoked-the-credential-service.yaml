document: rfc-6072
kind: normative-requirement
summary: If a credential is revoked, the credential service MUST terminate active subscriptions and send a NOTIFY with Subscription-State 'terminated' and reason 'deactivated'. Any time credentials change, the credential service MUST send a new NOTIFY to all active subscriptions.
section: "7.7"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
