document: rfc-2938
kind: design-rationale
summary: Base-32 was chosen over Base-64 because auxiliary predicate names have the same syntax as feature tags, and feature tag matching is case insensitive, making case-sensitive Base-64 unsuitable. Base-36 (using all letters A-Z) was considered but rejected because it would require extended precision multiplication and division to encode/decode hash values.
section: 3.1.2
extracted_by: claude-sonnet-4-6
