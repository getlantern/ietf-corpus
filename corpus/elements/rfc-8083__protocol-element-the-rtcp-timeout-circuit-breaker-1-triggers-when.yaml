document: rfc-8083
kind: protocol-element
summary: The RTCP Timeout circuit breaker (#1) triggers when no RTCP SR or RR packets are received for a period of at least 3 * Td, where Td is the deterministic RTCP reporting interval calculated without randomization and using Tmin=5 seconds.
