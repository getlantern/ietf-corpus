document: rfc-8987
kind: normative-requirement
summary: If a client's next-hop link-local address becomes unreachable, routes for the client's delegated prefixes MUST be retained by the delegating relay unless explicitly released or removed by expiring DHCP timers.
section: "4.3"
rfc2119_level: MUST
