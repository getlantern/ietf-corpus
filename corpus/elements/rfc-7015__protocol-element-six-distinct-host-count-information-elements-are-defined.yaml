document: rfc-7015
kind: protocol-element
summary: 'Six distinct host count Information Elements are defined to export distinct address counts reduced away during key aggregation: distinctCountOfSourceIPAddress (IE 378, unsigned64), distinctCountOfDestinationIPAddress (IE 379, unsigned64), distinctCountOfSourceIPv4Address (IE 380, unsigned32), distinctCountOfDestinationIPv4Address (IE 381, unsigned32), distinctCountOfSourceIPv6Address (IE 382, unsigned64), distinctCountOfDestinationIPv6Address (IE 383, unsigned64); all use totalCounter semantics.'
section: "7.3"
