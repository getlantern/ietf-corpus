document: rfc-4538
kind: design-rationale
summary: 'The UAC is required to use Require: tdialog rather than just including the header, so it can distinguish a 403 caused by the UAS not understanding the extension (retry within the dialog) from a 403 caused by the UAS understanding but choosing to deny (do not retry within the dialog).'
