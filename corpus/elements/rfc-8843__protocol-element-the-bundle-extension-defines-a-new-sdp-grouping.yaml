document: rfc-8843
kind: protocol-element
summary: The BUNDLE extension defines a new SDP Grouping Framework semantics value 'BUNDLE', enabling negotiation of a single transport (5-tuple) for multiple 'm=' sections. All 'm=' sections sharing that transport form a BUNDLE group, and the shared address:port is the BUNDLE address:port.
section: "5"
