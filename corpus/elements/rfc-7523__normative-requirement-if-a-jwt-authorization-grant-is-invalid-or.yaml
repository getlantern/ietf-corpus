document: rfc-7523
kind: normative-requirement
summary: If a JWT authorization grant is invalid or outside its valid time window, the authorization server MUST return an error response with the 'error' parameter set to 'invalid_grant'. The server MAY include 'error_description' or 'error_uri' with additional detail.
section: "3.1"
rfc2119_level: MUST
topics:
    - oauth
    - jose
