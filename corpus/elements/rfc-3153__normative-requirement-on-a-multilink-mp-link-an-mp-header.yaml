document: rfc-3153
kind: normative-requirement
summary: On a multilink (MP) link, an MP header MUST be outside of (i.e., wrap) a PPPmux header if both are present. Multilink frames must not be sent in Multiplexed frames.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
