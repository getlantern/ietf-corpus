document: rfc-4314
kind: protocol-element
summary: The LISTRIGHTS command takes a mailbox name and identifier and returns information about what rights can be granted to the identifier in the ACL for the mailbox. The LISTRIGHTS response includes required rights and zero or more sets of optional tied rights.
section: "3.4"
topics:
    - email
