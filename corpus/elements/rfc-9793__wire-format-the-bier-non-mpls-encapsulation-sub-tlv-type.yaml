document: rfc-9793
kind: wire-format
summary: The BIER non-MPLS Encapsulation sub-TLV (Type=3) encodes Max SI (1 octet), BS Len (4 bits), and BIFT-id (20 bits). The BIFT-id range starts at BIFT-id and ends at BIFT-id + Max SI, providing one BIFT-id per Set Identifier for non-MPLS BIER forwarding.
section: "3.2"
topics:
    - bgp
    - multicast
    - routing
