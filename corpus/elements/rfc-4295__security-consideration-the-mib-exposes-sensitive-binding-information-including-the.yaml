document: rfc-4295
kind: security-consideration
summary: The MIB exposes sensitive binding information including the mapping between a mobile node's home address and its current care-of address, which could be used to track the physical location of mobile nodes. Operators must apply appropriate SNMP access controls to read-only objects in the binding cache and history tables.
section: "6"
topics:
    - mobility
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
