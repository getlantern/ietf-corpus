document: rfc-8912
kind: protocol-element
summary: For Periodic stream generation, the Fixed Parameters are incT=0.0200 seconds (inter-packet interval, first bit to first bit) and dT=1.0 second (interval for allowed sample start times). These values apply to the UDP Round-Trip, PDV, and UDP Periodic One-Way metrics.
