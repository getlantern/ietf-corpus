document: rfc-4308
kind: registry
summary: IANA created a registry called 'Cryptographic Suites for IKEv1, IKEv2, and IPsec' consisting of a text string identifier and an RFC number listing associated transforms. New entries require RFC publication and approval by an IESG-designated expert. Initial entries are VPN-A and VPN-B, both defined in RFC 4308.
