document: rfc-6840
kind: normative-requirement
summary: The DNSSEC OK (DO) bit of a query MUST be copied into the response per RFC 3225, but resolvers MUST ignore the DO bit in responses they receive, to interoperate with implementations that fail to copy it.
section: "5.6"
rfc2119_level: MUST
topics:
    - dns
