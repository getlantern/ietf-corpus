document: rfc-9915
kind: normative-requirement
summary: Clients and servers using DUID-LLT MUST store it in stable storage and MUST continue to use it even if the generating network interface is removed. Devices without stable storage MUST NOT use DUID-LLT.
section: "11.2"
rfc2119_level: MUST
