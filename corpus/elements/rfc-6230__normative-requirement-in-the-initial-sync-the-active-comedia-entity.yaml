document: rfc-6230
kind: normative-requirement
summary: In the initial SYNC, the active COMEDIA entity MUST include a 'Keep-Alive' header with a value SHOULD be in the range 95–120 seconds and MUST NOT exceed 600 seconds. The passive entity MUST copy the identical value into the 200 response. This negotiated timeout applies for the full Control Framework session and MUST NOT appear in subsequent SYNC messages.
section: 6.3.4.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
