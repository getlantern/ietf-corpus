document: rfc-4113
kind: protocol-element
summary: udpEndpointLocalAddressType (InetAddressType) and udpEndpointLocalAddress (InetAddress) together represent the local endpoint address. A zero-length octet-string with unknown(0) type indicates willingness to accept both IPv4 and IPv6 datagrams.
