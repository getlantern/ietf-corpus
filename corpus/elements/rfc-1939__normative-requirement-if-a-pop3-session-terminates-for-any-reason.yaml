document: rfc-1939
kind: normative-requirement
summary: If a POP3 session terminates for any reason other than a client-issued QUIT command, the session does NOT enter the UPDATE state and MUST NOT remove any messages from the maildrop.
section: "6"
rfc2119_level: MUST NOT
