document: rfc-3518
kind: normative-requirement
summary: In split-bridge Source Routing model, the system that transmits an Explorer frame onto the PPP link MUST update the RIF on behalf of both systems, ensuring the receiving system can forward the frame without processing the RIF.
section: "2.4"
rfc2119_level: MUST
