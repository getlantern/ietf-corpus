document: rfc-9447
kind: security-consideration
summary: All ACME transactions and HTTPS REST transactions for token acquisition MUST use TLS to prevent eavesdroppers from capturing Authority Tokens. A preexisting trust relationship between the HTTPS REST client and Token Authority is required for mutual authentication.
section: "7"
rfc2119_level: MUST
topics:
    - acme
    - security
    - tls
