document: rfc-9855
kind: normative-requirement
summary: When TI-LFA protects Node-SIDs associated with a Flexible Algorithm, an implementation SHOULD use the constrained SPF algorithm bound to that Flexible Algorithm (per RFC 9350) instead of regular Dijkstra in all SPF and reverse-SPF computations, including P-space, Q-space, and post-convergence path computation.
section: "8"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
