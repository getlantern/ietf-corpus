document: rfc-2212
kind: normative-requirement
summary: Links are not permitted to fragment datagrams as part of guaranteed service. Datagrams larger than the MTU of the link MUST be policed as nonconformant.
section: Network Element Data Handling Requirements
rfc2119_level: MUST
