document: rfc-6454
kind: design-rationale
summary: The fully qualified host name is used instead of just the top-level domain because trust relationships between host names vary by deployment. For example, at educational institutions, student-hosted content and grade management applications share the same top-level domain but must be isolated from each other.
section: "3.2"
topics:
    - security
