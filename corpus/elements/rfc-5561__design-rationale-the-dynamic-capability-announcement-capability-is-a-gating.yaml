document: rfc-5561
kind: design-rationale
summary: 'The Dynamic Capability Announcement capability is a gating mechanism: only if a peer advertises it during initialization can the local speaker send post-establishment Capability messages. This prevents speakers from receiving unexpected capability updates from peers that have not opted in to dynamic capability negotiation.'
