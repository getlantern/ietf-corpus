document: rfc-9100
kind: design-rationale
summary: 'The SenML version number is repurposed as a bitmap rather than a linear counter: each bit position (feature code) represents an independently selectable capability feature. This allows a recipient to check exactly which features are required to process a given pack, rather than assuming all lower-numbered versions are subsumed.'
