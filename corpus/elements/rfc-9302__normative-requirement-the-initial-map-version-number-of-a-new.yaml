document: rfc-9302
kind: normative-requirement
summary: The initial Map-Version number of a new EID-to-RLOC mapping SHOULD be assigned randomly but MUST NOT be set to the Null Map-Version value (0x000). Optionally, the initial value may be configured by operators.
section: "6"
rfc2119_level: MUST NOT
topics:
