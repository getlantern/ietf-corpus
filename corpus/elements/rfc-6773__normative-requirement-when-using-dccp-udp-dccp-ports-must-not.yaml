document: rfc-6773
kind: normative-requirement
summary: When using DCCP-UDP, DCCP ports MUST NOT be included in the SDP 'm=' line. Instead, the DCCP port MUST be signalled via the new 'a=dccp-port:' media-level SDP attribute. The 'a=dccp-port:' attribute MUST be included when the DCCP-UDP protocol identifiers are used.
section: "5.2"
rfc2119_level: MUST
topics:
    - udp
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
