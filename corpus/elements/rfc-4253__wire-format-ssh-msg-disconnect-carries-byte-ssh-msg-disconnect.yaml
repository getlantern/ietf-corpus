summary: 'SSH_MSG_DISCONNECT carries: byte SSH_MSG_DISCONNECT, uint32 reason code, string description in ISO-10646 UTF-8, string language tag. Fifteen reason codes are defined (1-15), codes 0x10 to 0xFDFFFFFF require IETF CONSENSUS, and 0xFE000000-0xFFFFFFFF are PRIVATE USE.'
