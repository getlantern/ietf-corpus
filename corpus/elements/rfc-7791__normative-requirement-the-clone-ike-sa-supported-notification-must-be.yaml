document: rfc-7791
kind: normative-requirement
summary: The CLONE_IKE_SA_SUPPORTED notification MUST be sent in the IKE_AUTH exchange (in the first IKE_AUTH message from the initiator and in the last IKE_AUTH message from the responder). If both peers send this notification, they may clone the IKE SA; otherwise the IKE SA MUST NOT be cloned.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
