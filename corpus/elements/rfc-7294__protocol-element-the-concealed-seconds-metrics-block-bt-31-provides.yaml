document: rfc-7294
kind: protocol-element
summary: 'The Concealed Seconds Metrics Block (BT=31) provides metrics analogous to PSTN T1/E1 errored seconds: Unimpaired Seconds, Concealed Seconds, Severely Concealed Seconds (16 bits), and SCS Threshold (8 bits). Block length is 4 (32-bit words minus one).'
