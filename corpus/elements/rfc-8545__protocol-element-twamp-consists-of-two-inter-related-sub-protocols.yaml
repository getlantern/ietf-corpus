summary: 'TWAMP consists of two inter-related sub-protocols: TWAMP-Control (defined in RFC 5357 Section 3) using TCP, and TWAMP-Test (defined in RFC 5357 Section 4) using UDP. TWAMP Light (Appendix I of RFC 5357) combines an unspecified control protocol with TWAMP-Test and is not Standards Track.'
