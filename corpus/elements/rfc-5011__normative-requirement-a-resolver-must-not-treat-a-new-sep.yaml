document: rfc-5011
kind: normative-requirement
summary: A resolver MUST NOT treat a new SEP key as a trust anchor until the add hold-down time (30 days or the original TTL expiration, whichever is greater) has expired AND the resolver has retrieved and validated a DNSKEY RRSet after hold-down that still contains the new key.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
