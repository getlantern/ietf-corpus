document: rfc-5755
kind: protocol-element
summary: Attribute encryption uses CMS EnvelopedData (encAttrs attribute, id-aca-encAttrs { id-aca 6 }) to encrypt sets of attributes for predetermined recipients before signing. The cleartext ACClearAttrs structure includes acIssuer and acSerial fields to prevent ciphertext stealing; the AC verifier MUST verify these match after decryption.
section: "7.1"
topics:
    - pkix
    - crypto
    - security
