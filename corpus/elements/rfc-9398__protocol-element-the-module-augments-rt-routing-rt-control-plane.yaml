summary: The module augments /rt:routing/rt:control-plane-protocols/rt:control-plane-protocol with an 'mld-proxy' container (guarded by the 'mld-proxy' feature) containing an 'interfaces' list of upstream interfaces with per-interface configuration including mld-version (uint8, range 1..2, default 2), enabled (boolean, default true), and sender-source-address (inet:ipv6-address-no-zone).
