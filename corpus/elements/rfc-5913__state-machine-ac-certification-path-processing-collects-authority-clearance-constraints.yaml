document: rfc-5913
kind: state-machine
summary: AC certification path processing collects Authority Clearance Constraints from the user input, trust anchor, and all PKCs in the AA PKC certification path (including the AA PKC itself). The AC's Clearance attribute is then intersected with the resulting permitted-clearances state variable to produce effective-clearance.
