document: rfc-2960
kind: registry
summary: IANA maintains the SCTP Error Cause codes registry used in Operation Error (ERROR) and ABORT chunks. This RFC defines ten initial causes (invalid stream identifier, missing mandatory parameter, stale cookie, out of resource, unresolvable address, unrecognized chunk type, invalid mandatory parameter, unrecognized parameters, no user data, cookie received while shutting down). New causes require IETF consensus.
section: "13.3"
topics:
    - sctp
    - registry
