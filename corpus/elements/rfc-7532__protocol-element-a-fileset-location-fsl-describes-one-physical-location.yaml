document: rfc-7532
kind: protocol-element
summary: A Fileset Location (FSL) describes one physical location of a fileset's data and contains FslUuid, FsnUuid, and NsdbName. Additional type-specific attributes describe how to access the fileset; this document defines an NFS FSL subtype encoded as a fedfsNfsFsl LDAP entry.
section: "2.8"
