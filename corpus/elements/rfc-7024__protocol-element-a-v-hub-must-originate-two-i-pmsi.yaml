document: rfc-7024
kind: protocol-element
summary: 'A V-hub MUST originate two I-PMSI A-D routes: a standard ''vanilla'' I-PMSI A-D route and an ''Associated-V-spoke-only I-PMSI A-D route'' carrying only RT-VH. The latter carries traffic from other V-hubs, non-associated V-spokes, and vanilla PEs to the V-spokes associated with this V-hub. Each MUST use a distinct RD.'
section: "7.6"
topics:
    - mpls
    - bgp
    - vpn
    - multicast
