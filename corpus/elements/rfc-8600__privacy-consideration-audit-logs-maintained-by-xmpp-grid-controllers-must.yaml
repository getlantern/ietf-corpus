document: rfc-8600
kind: privacy-consideration
summary: Audit logs maintained by XMPP-Grid Controllers must be handled carefully to avoid storing information that violates privacy agreements or laws. Restricting access to sensitive Topics, or omitting sensitive data entirely, is the simplest means of protection.
