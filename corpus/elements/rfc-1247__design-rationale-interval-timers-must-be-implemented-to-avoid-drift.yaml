document: rfc-1247
kind: design-rationale
summary: Interval timers must be implemented to avoid drift. When multiple routers on the same network synchronize their Hello transmissions, routing packet collisions result. Where drift-free timers are not feasible, small random jitter should be added at each timer firing.
section: "4.4"
topics:
    - routing
