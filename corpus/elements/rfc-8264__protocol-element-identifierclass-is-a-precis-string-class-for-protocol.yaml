document: rfc-8264
kind: protocol-element
summary: IdentifierClass is a PRECIS string class for protocol strings such as usernames, filenames, and chat room names. It allows LetterDigits (category A) and printable ASCII7 (U+0021–U+007E, category K), and disallows spaces, symbols, punctuation, HasCompat code points, OtherLetterDigits, OldHangulJamo, Controls, and PrecisIgnorableProperties. Safety is prioritized over expressiveness.
section: "4.2"
topics:
    - security
