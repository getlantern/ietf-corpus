document: rfc-9341
kind: security-consideration
summary: Applying Alternate Marking outside a controlled domain allows attackers to inject artificially marked packets, potentially skewing measurements. Externally marked packets MUST be filtered or cleared at domain ingress boundaries; nodes outside the domain should ignore marked packets.
section: "10"
topics:
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
