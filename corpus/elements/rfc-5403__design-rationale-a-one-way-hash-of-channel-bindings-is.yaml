document: rfc-5403
kind: design-rationale
summary: A one-way hash of channel bindings is used in rbcmia_bind_chan_hash rather than the raw channel bindings because some channel bindings (e.g., those composed of public keys) can be relatively large, imposing a space management burden on implementations.
