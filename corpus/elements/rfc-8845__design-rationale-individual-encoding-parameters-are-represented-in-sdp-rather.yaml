document: rfc-8845
kind: design-rationale
summary: Individual Encoding parameters are represented in SDP rather than in CLUE messages, because SDP is the existing negotiation mechanism for codec parameters. Only the bandwidth parameter has special significance in CLUE, as it can be further constrained by the Encoding Group maximum.
section: "9.1"
