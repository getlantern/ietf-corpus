document: rfc-2982
kind: interoperability-note
summary: A no-deltas subset implementation prohibits deltaValue and changedValue sample types, making counter-based expressions unusable. Compliance is indicated by restricting expObjectSampleType write syntax to absoluteValue(1) and setting expResourceDeltaMinimum to -1.
section: 2.4.2
topics:
