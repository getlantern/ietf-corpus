document: rfc-9619
kind: design-rationale
summary: An originator of a query with QDCOUNT > 1 can have no expectations of how it will be processed, and a receiver of a response with QDCOUNT > 1 has no guidance for interpretation. The specification therefore standardizes rejection rather than defining multi-question semantics.
section: A.5
topics:
    - dns
