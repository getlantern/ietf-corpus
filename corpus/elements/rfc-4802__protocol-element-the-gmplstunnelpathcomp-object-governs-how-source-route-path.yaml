document: rfc-4802
kind: protocol-element
summary: 'The gmplsTunnelPathComp object governs how source-route path computation is performed: dynamicFull(1) means CSPF computes the full path, explicit(2) means the user provides the entire path, and dynamicPartial(3) means CSPF partially computes the path with the remainder filled in hop-by-hop. Default is dynamicFull.'
