document: rfc-8471
kind: normative-requirement
summary: The client MUST generate and store Token Binding keys in a secure manner that prevents key export. The scope of the Token Binding keys MUST NOT be broader than the scope of the tokens, as defined by the application protocol, to prevent cooperating servers from linking user identities.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
