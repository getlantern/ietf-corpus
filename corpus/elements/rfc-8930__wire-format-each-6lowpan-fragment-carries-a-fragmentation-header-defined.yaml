document: rfc-8930
kind: wire-format
summary: Each 6LoWPAN fragment carries a fragmentation header (defined in Section 5.3 of RFC 4944) that includes a 16-bit Datagram_Tag, a Datagram_Size field indicating total packet length, and for non-first fragments a datagram-offset field. The first fragment has a distinct header format from subsequent fragments.
