document: rfc-7517
kind: normative-requirement
summary: Member names within a JWK MUST be unique. JWK parsers MUST either reject JWKs with duplicate member names or use a JSON parser that returns only the lexically last duplicate, per ECMAScript 5.1 Section 15.12.
section: "4"
rfc2119_level: MUST
topics:
    - jose
    - json
