document: rfc-7668
kind: normative-requirement
summary: The 6LBR MUST ignore 6LNs whose Bluetooth LE device address is the same as the 6LBR's own, and MUST maintain at most one connection per Bluetooth LE device address at any given time, to avoid addressing conflicts.
section: "3"
rfc2119_level: MUST
