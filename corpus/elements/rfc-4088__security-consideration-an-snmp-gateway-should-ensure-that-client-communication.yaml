document: rfc-4088
kind: security-consideration
summary: An SNMP gateway SHOULD ensure that client communication is protected to at least the SNMP securityLevel used for the corresponding SNMP access. If a client provides keys or secrets, the gateway SHOULD use encryption in addition to integrity checks to prevent disclosure.
section: "6.1"
topics:
    - snmp
    - security
