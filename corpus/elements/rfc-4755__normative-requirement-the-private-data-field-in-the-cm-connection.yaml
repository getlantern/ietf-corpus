document: rfc-4755
kind: normative-requirement
summary: The private data field in the CM connection setup message (REQ) MUST include the Receive MTU, indicating the maximum packet size the requester can accept. The requester MUST also be able to accept smaller MTU sizes.
section: "5.1"
rfc2119_level: MUST
