document: rfc-7074
kind: design-rationale
summary: The introduction of separate Switching Types for EVPL (value 30) and 802_1 PBB-TE (value 40) for Ethernet technologies, rather than reusing L2SC, was driven by the need to disambiguate the SCSI field format for different Ethernet switching technologies operating within the same provider network.
