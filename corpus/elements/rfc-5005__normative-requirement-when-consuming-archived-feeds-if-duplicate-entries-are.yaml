document: rfc-5005
kind: normative-requirement
summary: When consuming archived feeds, if duplicate entries are found, clients SHOULD consider only the most recently updated entry to be part of the logical feed. If duplicates have the same update timestamp, the entry from the most recently updated feed document SHOULD replace others.
section: "4.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
