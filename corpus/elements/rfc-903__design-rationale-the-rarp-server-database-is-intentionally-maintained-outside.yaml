document: rfc-903
kind: design-rationale
summary: The RARP server database is intentionally maintained outside the operating system kernel, because maintaining such large databases inside the kernel is undesirable or impossible on many hosts. Implementations require out-of-kernel interaction (e.g., a user-space daemon).
section: II
extracted_by: claude-sonnet-4-6
