document: rfc-6530
kind: protocol-element
summary: The 'final delivery MTA' is the SMTP server that controls the format of local parts and is the only entity permitted to inspect and interpret them. It receives messages from the network for delivery to mailboxes or other local processing; local delivery arrangements such as message stores and IMAP/POP access are 'behind' it and outside SMTP transport.
section: "4.1"
topics:
    - email
