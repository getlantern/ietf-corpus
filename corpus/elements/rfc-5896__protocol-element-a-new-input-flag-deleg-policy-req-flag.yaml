document: rfc-5896
kind: protocol-element
summary: A new input flag, deleg_policy_req_flag, is added to gss_init_sec_context(). When set, delegation SHOULD be performed if recommended by central policy. A corresponding output flag, deleg_policy_state, is set when delegation was both recommended by central policy and successfully performed.
