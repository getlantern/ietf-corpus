document: rfc-3730
kind: state-machine
summary: 'The EPP server state machine defines states: Waiting for Client, Prepare Greeting, Waiting for Client Authentication, Processing <login>, Waiting for Command, Processing Command, Prepare Response, Prepare Fail Response, and End Session. Transitions are triggered by connection/hello receipt, <login> success or failure, command receipt and completion, timeouts, and idle conditions. Authentication failure produces a 2501 response; timeout or idle at the Waiting for Command state ends the session.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
