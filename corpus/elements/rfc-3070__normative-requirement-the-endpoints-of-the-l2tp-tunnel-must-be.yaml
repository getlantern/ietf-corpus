document: rfc-3070
kind: normative-requirement
summary: The endpoints of the L2TP tunnel MUST be identified by X.121/E.164 addresses in the case of Frame Relay SVCs; these addresses MAY be obtained as tunnel endpoints as defined in RFC 2868.
