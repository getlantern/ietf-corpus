document: rfc-9140
kind: security-consideration
summary: Misbinding attacks occur when a rogue server intercepts the OOB channel and tricks the user into associating the peer with an attacker-controlled server. EAP-NOOB mitigates this by including ServerInfo and all negotiated parameters in Hoob, enabling users to verify the intended server identity through the OOB channel before completing the association.
section: "6.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
