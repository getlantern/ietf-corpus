document: rfc-7852
kind: normative-requirement
summary: The 'privacyRequested' boolean attribute MUST be provided if the SubscriberInfo block is not empty. If more than one <tel> property appears in a subscriber xCard, a parameter from the 'vCard Property Values' registry MUST be specified on each.
section: 4.4.1
rfc2119_level: MUST
topics:
    - privacy
