document: rfc-6173
kind: interoperability-note
summary: When a TCP connection for an iFCP session terminates, both the tcpConnectionTable entry and the ifcpSessionAttributesTable entry are deleted simultaneously. TCP port fields may temporarily hold value 0 during initial session setup before port numbers are known.
