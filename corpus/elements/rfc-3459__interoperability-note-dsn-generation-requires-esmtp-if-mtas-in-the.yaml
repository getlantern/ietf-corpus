document: rfc-3459
kind: interoperability-note
summary: DSN generation requires ESMTP. If MTAs in the path do not support ESMTP, the DSN request will be rejected and the message defaults to notification on delay or failure. This is a backward-compatibility limitation when using critical content with non-ESMTP paths.
section: "11"
topics:
