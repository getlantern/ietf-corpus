document: rfc-3923
kind: normative-requirement
summary: A wrapped S/MIME object passing through an XMPP-CPIM gateway MUST be immutable and MUST NOT be modified by the gateway; the gateway MUST strip or add the XMPP wrapper but leave the S/MIME object untouched.
section: "8"
rfc2119_level: MUST
topics:
