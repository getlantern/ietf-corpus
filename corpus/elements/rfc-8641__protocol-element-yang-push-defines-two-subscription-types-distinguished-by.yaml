document: rfc-8641
kind: protocol-element
summary: 'YANG-Push defines two subscription types distinguished by update trigger: periodic subscriptions (triggered at a configured time interval with an optional anchor-time) and on-change subscriptions (triggered whenever changes to subscribed datastore nodes are detected). Both types specify a selection filter and a target datastore.'
section: "3.1"
topics:
    - yang
    - netconf
