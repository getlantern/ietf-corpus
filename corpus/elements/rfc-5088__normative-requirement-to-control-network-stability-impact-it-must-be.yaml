document: rfc-5088
kind: normative-requirement
summary: To control network stability impact, it MUST be possible to apply configurable rate limiting on PCE announcement of changed parameters, control of PCED TLV processing rate on PCCs, and configurable control of triggers that cause a PCC to swap to another PCE.
section: "9.6"
rfc2119_level: MUST
topics:
    - routing
