document: rfc-3810
kind: normative-requirement
summary: All MLDv2 messages MUST be sent with a link-local IPv6 Source Address, an IPv6 Hop Limit of 1, and an IPv6 Router Alert option in a Hop-by-Hop Options header. MLDv2 Reports may additionally use the unspecified address (::) as source if no valid link-local address has been acquired.
section: "5"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
