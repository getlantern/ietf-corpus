document: rfc-8010
kind: normative-requirement
summary: If an IPP status-code is returned, the HTTP status-code MUST be 200 (OK). With any other HTTP status-code, the HTTP response MUST NOT contain an IPP message body.
section: 3.4.3
rfc2119_level: MUST
topics:
    - http
