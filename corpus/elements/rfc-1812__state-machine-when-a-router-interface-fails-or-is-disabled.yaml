document: rfc-1812
kind: state-machine
summary: When a router interface fails or is disabled, it MUST immediately update its routing tables to reflect the lost connectivity and MUST send appropriate routing protocol updates. When an interface is re-enabled, the router MUST NOT begin forwarding traffic on it until the interface is fully operational and routing has converged.
section: 5.3.12
topics:
    - ip
    - routing
