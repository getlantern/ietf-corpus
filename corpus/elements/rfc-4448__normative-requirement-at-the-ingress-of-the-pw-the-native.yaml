document: rfc-4448
kind: normative-requirement
summary: At the ingress of the PW, the native Ethernet frame error processing mechanisms MUST be enabled. If a PE device receives an Ethernet frame containing hardware-level CRC errors, framing errors, or a runt condition, the frame MUST be discarded on input.
section: 4.4.4
rfc2119_level: MUST
topics:
    - mpls
