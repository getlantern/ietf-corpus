document: rfc-8873
kind: normative-requirement
summary: If the data channel used to transport the MSRP session fails and is torn down, both MSRP data channel endpoints SHALL consider the MSRP session failed. An endpoint MAY, based on local policy, try to negotiate a new MSRP data channel.
section: "5.3"
rfc2119_level: SHALL
topics:
    - webrtc
    - realtime
