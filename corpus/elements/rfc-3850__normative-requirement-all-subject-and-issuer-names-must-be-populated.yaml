document: rfc-3850
kind: normative-requirement
summary: All subject and issuer names MUST be populated (not an empty SEQUENCE) in S/MIME-compliant X.509 identity certificates, except that the subject DN in an end-entity certificate MAY be empty if subjectAltName is present and marked critical.
section: "3"
rfc2119_level: MUST
