document: rfc-1213
kind: protocol-element
summary: Textual convention DisplayString (OCTET STRING, SIZE 0..255) is restricted to the NVT ASCII character set for human-displayable text; used in sysDescr and ifDescr. Any OCTET STRING not declared as DisplayString may contain arbitrary binary data (0–255).
