document: rfc-2595
kind: normative-requirement
summary: If a subjectAltName extension of type dNSName is present in the certificate, it SHOULD be used as the source of the server's identity. A '*' wildcard MAY be used as the left-most name component; matching is case-insensitive.
section: "2.4"
rfc2119_level: SHOULD
topics:
