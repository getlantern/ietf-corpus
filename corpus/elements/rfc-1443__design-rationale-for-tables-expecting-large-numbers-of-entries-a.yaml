document: rfc-1443
kind: design-rationale
summary: For tables expecting large numbers of entries, a MIB object returning an acceptable index for creation is recommended; for small tables, pseudo-random index selection is recommended. This balances the efficiency of collision avoidance against the overhead of an auxiliary index object.
section: "2"
