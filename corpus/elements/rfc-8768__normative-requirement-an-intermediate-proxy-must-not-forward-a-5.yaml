document: rfc-8768
kind: normative-requirement
summary: An intermediate proxy MUST NOT forward a 5.08 (Hop Limit Reached) error message if it detects that its own identifier is already present in the diagnostic payload; such messages SHOULD be logged and alerts sent to administrators.
section: "4"
rfc2119_level: MUST NOT
