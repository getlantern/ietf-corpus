document: rfc-6513
kind: protocol-element
summary: 'Three PMSI types are defined: MI-PMSI (Multidirectional Inclusive) enables any PE to reach every other PE in the MVPN; UI-PMSI (Unidirectional Inclusive) enables one PE to reach all others in the MVPN; S-PMSI (Selective) enables a PE to reach a subset. At most one MI-PMSI and one UI-PMSI per PE per MVPN exist; multiple S-PMSIs per PE per MVPN are allowed.'
section: 3.2.1
topics:
    - mpls
    - multicast
    - routing
