document: rfc-4242
kind: normative-requirement
summary: When the client detects that the refresh time has expired, it SHOULD try to update its configuration data by sending an Information-Request, but MUST delay sending the first request by a random amount of time between 0 and INF_MAX_DELAY.
section: "3.2"
rfc2119_level: MUST
topics:
