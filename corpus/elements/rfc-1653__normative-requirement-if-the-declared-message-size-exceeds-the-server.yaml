document: rfc-1653
kind: normative-requirement
summary: If the declared message size exceeds the server's fixed maximum, the server responds with code 552. If the server currently lacks sufficient resources to accept a message of the indicated size but may be able to do so later, it responds with code 452.
section: "5.1"
rfc2119_level: SHOULD
topics:
