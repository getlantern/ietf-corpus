document: rfc-7810
kind: design-rationale
summary: The A bit was intentionally omitted from the Delay Variation and bandwidth sub-TLVs to help mitigate oscillations. Only sub-TLVs where anomaly-triggered fast failover is operationally useful include the A bit.
