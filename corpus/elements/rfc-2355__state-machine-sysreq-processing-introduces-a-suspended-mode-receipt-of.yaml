document: rfc-2355
kind: state-machine
summary: 'SYSREQ processing introduces a ''suspended mode'': receipt of Telnet AO by a server that agreed to SYSREQ causes the server to enter suspended mode, during which host-application data is rejected with sense code 0x082D (''LU Busy'') and all client-server exchange uses DATA-TYPE SSCP-LU-DATA. A second AO from the client exits suspended mode, sending LUSTAT 0x082B to the host.'
section: 10.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
