document: rfc-9161
kind: protocol-element
summary: The R Flag (Router) and O Flag (Override) from snooped NA messages are stored per Proxy ND entry. When replying to NS messages, the PE sets the R Flag as learned, sets the S Flag per RFC 4861, and sets the O Flag to 1 except when anycast is enabled and the entry was learned with O=0.
section: 3.2.1
topics:
    - ip
