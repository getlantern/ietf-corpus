document: rfc-2849
kind: security-consideration
summary: The ':<' URL directive causes external file or resource content to be included when processing an LDIF file. A malicious LDIF file could reference sensitive local files and cause their contents to be imported into a directory entry readable via LDAP.
section: Security Considerations
topics:
    - security
    - ldap
