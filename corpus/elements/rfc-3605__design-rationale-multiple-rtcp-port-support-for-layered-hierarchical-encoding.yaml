document: rfc-3605
kind: design-rationale
summary: Multiple RTCP port support (for layered/hierarchical encoding) was deliberately omitted because layered encoding is rarely used in practice, and when used is mostly in conjunction with multicast transmission. The NAT translation issues this memo addresses apply uniquely to unicast transmission.
section: "3.2"
topics:
    - rtp
    - nat
    - multicast
