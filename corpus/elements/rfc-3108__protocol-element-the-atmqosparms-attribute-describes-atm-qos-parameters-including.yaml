document: rfc-3108
kind: protocol-element
summary: The 'atmQOSparms' attribute describes ATM QoS parameters including acceptable and cumulative CDV (24-bit, microseconds), end-to-end and cumulative transit delay (16-bit, milliseconds), and acceptable cell loss ratio (8-bit order-of-magnitude exponent). A <directionFlag> of 'f', 'b', or 'fb' applies parameters to forward, backward, or both directions.
section: 5.6.1.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
