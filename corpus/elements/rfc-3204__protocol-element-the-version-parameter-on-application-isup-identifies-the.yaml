document: rfc-3204
kind: protocol-element
summary: The 'version' parameter on application/ISUP identifies the specific ISUP variant in use (e.g., 'itu-t', 'ansi', or a proprietary string like 'X-NetxProprietaryISUPv3'). This allows a SoftSwitch/Media Gateway Controller to correctly parse or reject the message. The specification places no constraints on allowed values; these are left to network administrator discretion.
section: "3.1"
topics:
