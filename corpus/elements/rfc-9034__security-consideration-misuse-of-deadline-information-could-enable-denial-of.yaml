document: rfc-9034
kind: security-consideration
summary: Misuse of deadline information could enable Denial of Service (DoS) attacks against time-critical flows. Proper functioning requires provisioning and management of network resources for deadline-bearing flows, performance monitoring, and admission control policy enforcement, applied either centrally (e.g., via a PCE) or in a distributed fashion.
