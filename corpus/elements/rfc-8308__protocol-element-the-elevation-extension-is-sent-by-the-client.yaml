document: rfc-8308
kind: protocol-element
summary: The 'elevation' extension is sent by the client with a value of 'y' (request elevation), 'n' (no elevation), or 'd' (server default). After authentication, a supporting server SHOULD send a SSH_MSG_GLOBAL_REQUEST with the request name 'elevation' and a boolean indicating whether elevation was performed.
section: "3.4"
topics:
    - security
    - crypto
