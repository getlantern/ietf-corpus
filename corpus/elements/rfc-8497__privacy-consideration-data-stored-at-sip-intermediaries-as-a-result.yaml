document: rfc-8497
kind: privacy-consideration
summary: Data stored at SIP intermediaries as a result of 'log me' marking should be retained only for the minimum period necessary for the troubleshooting purpose and then deleted. The recommended default is to not enable 'log me' logging unless explicitly configured by a user or administrator.
section: "8.5"
topics:
    - sip
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
