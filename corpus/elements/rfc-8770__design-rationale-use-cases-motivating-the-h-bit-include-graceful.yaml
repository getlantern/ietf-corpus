kind: design-rationale
summary: Use cases motivating the H-bit include graceful router isolation, closet switches participating in topology without carrying transit, overloaded routers temporarily repelling traffic, and BGP route reflectors (e.g., virtual RRs) that participate in OSPF for SPF computation but cannot forward transit traffic.
