document: rfc-7455
kind: normative-requirement
summary: For the Authentication TLV, Auth Types 0, 1, 2, and 54 MUST NOT be used; Auth Type 3 (HMAC-based per RFC 5310, using the same Key ID space as TRILL IS-IS) is RECOMMENDED. Key distribution is out of scope and reuses IS-IS key distribution.
section: 8.4.13
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
