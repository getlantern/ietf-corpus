document: rfc-9012
kind: normative-requirement
summary: Each TLV in a Tunnel Encapsulation attribute carried in an UPDATE of an AFI/SAFI listed in Section 6 MUST contain exactly one Tunnel Egress Endpoint sub-TLV. A TLV lacking one is treated as containing a malformed Tunnel Egress Endpoint sub-TLV.
section: "13"
rfc2119_level: MUST
topics:
