document: rfc-7672
kind: normative-requirement
summary: A security-aware DNS resolver MUST be used. Security-oblivious stub resolvers MUST NOT be used. An MTA using a non-validating security-aware stub resolver MAY use the stub resolver's ability to signal DNSSEC validation status obtained from an upstream validating recursive resolver via a secure channel.
section: 2.1.1
rfc2119_level: MUST
topics:
    - dns
    - email
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
