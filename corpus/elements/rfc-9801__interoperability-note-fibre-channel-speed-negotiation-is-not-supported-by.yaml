document: rfc-9801
kind: interoperability-note
summary: Fibre Channel speed negotiation is not supported by PLE. Both attachment circuits of the VPWS must be of the same service type and must use the same PLE payload type and payload size, enforced via manual configuration or signaling protocol mechanisms.
section: "7.1"
