document: rfc-3782
kind: normative-requirement
summary: Implementations SHOULD take measures to avoid a burst of data when leaving Fast Recovery, such as limiting packets sent per ACK ('maxburst_'), rate-based pacing, or setting ssthresh to the new cwnd and resetting cwnd to FlightSize.
