document: rfc-2893
kind: normative-requirement
summary: Both configured and automatic tunnel interfaces MUST have IPv6 link-local addresses. The Interface Identifier SHOULD be the 32-bit IPv4 address zero-padded on the left to 64 bits, forming a link-local address with the FE80::/64 prefix.
section: "3.7"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
