document: rfc-4343
kind: security-consideration
summary: A DNS name used as a case-sensitive index into a database or file system, or interpreted as binary data by an authentication or integrity system, may produce security vulnerabilities due to DNS case insensitivity. The recommended mitigation is to use a canonical form (e.g., consistently uppercase or lowercase) as described in RFC 4034, Section 6.
section: "6"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
