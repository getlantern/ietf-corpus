document: rfc-4088
kind: security-consideration
summary: SNMP gateways SHOULD impose authorization or access-control checks on all clients. If no access controls are imposed, the gateway MUST NOT automatically obtain or use SNMP authentication material for arbitrary securityNames, as this would defeat SNMP's access controls.
section: "6.1"
topics:
    - snmp
    - security
