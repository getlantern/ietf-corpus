document: rfc-3858
kind: normative-requirement
summary: The 'version' attribute on the 'watcherinfo' element MUST be representable using a 32-bit integer and does not wrap. Versions start at 0 and increment by one for each new document sent to a watcherinfo subscriber.
section: "3"
rfc2119_level: MUST
