document: rfc-6848
kind: normative-requirement
summary: All elements listed in a LoST <valid>, <invalid>, or <unchecked> element MUST be qualified with a namespace. The example in RFC 5222 Section 6 is erroneous because it omits namespace qualification; this document normatively corrects that.
section: "6"
rfc2119_level: MUST
topics:
