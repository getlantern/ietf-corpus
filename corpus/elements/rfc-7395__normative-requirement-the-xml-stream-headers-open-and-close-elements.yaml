document: rfc-7395
kind: normative-requirement
summary: The XML stream headers (<open/> and <close/> elements) MUST be qualified by the namespace 'urn:ietf:params:xml:ns:xmpp-framing'. If violated, the receiving entity MUST close the stream with an <invalid-namespace> error.
section: 3.3.2
rfc2119_level: MUST
topics:
    - websocket
    - realtime
