document: rfc-2622
kind: design-rationale
summary: 'RPSL supports four extension mechanisms: (1) adding rp-attributes and protocols to the dictionary class, (2) adding new optional attributes to existing classes, (3) adding entirely new classes, and (4) changing the syntax of existing RPSL attributes. This layered extensibility allows new routing protocols and features to be introduced without breaking existing tools.'
section: "10"
topics:
