document: rfc-7001
kind: wire-format
summary: 'The header field is formally defined in ABNF as: ''Authentication-Results:'' authserv-id [authres-version] (no-result / 1*resinfo). Each resinfo consists of a semicolon-delimited methodspec (''method=result''), optional reasonspec (''reason=value''), and zero or more propspec elements (''ptype.property=pvalue''). The ptype values are ''smtp'', ''header'', ''body'', or ''policy''.'
section: "2.2"
topics:
    - email
