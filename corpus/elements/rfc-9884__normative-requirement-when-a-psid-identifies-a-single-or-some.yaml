document: rfc-9884
kind: normative-requirement
summary: When a PSID identifies a single or some segment lists, the 'SR Segment List Associated PSID' sub-TLV MUST be used. For the 'some segment lists' case, multiple LSP Ping messages MUST be sent, each carrying one such sub-TLV.
section: "3"
rfc2119_level: MUST
topics:
