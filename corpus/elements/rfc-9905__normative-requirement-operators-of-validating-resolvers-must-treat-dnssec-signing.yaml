document: rfc-9905
kind: normative-requirement
summary: Operators of validating resolvers MUST treat DNSSEC signing algorithms RSASHA1 and RSASHA1-NSEC3-SHA1 as unsupported, rendering responses insecure if they cannot be validated by other supported signing algorithms.
section: "2"
rfc2119_level: MUST
topics:
