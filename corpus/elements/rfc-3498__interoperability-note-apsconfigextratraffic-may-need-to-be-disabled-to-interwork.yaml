document: rfc-3498
kind: interoperability-note
summary: apsConfigExtraTraffic may need to be disabled to interwork with other SONET network elements that do not support extra traffic on the protection channel. Extra traffic is only relevant to the 1:n architecture and must be disabled for 1+1.
