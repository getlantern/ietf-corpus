document: rfc-1284
kind: interoperability-note
summary: The testFullDuplexLoopBack test defined in RFC 1229 (ifExtnsTestTable) for ethernet-like interfaces can only be executed while the interface is offline. After test completion the MAC chip should be reinitialized for network operation but must remain offline.
section: "5.4"
