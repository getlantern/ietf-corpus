document: rfc-9176
kind: security-consideration
summary: 'Skipping freshness checks allows replay attacks on registration updates: an attacker who captures an earlier registration update could re-submit it to revert state. The Echo option (Section 5.3.4) is the normative mechanism to enforce freshness.'
section: "8.5"
topics:
    - security
