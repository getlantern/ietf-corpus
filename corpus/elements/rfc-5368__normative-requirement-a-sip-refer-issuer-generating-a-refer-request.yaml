document: rfc-5368
kind: normative-requirement
summary: A SIP REFER-Issuer generating a REFER request with multiple REFER-Targets SHOULD include the 'norefersub' option-tag in a Require header field and SHOULD include a Refer-Sub header field set to 'false' to suppress implicit subscription notifications.
section: "5"
rfc2119_level: SHOULD
