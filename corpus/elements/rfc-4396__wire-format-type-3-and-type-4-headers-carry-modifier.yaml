document: rfc-4396
kind: wire-format
summary: TYPE 3 and TYPE 4 headers carry modifier (decoration) fragments. Both contain TOTAL (4 bits), THIS (4 bits), and SDUR (24 bits) after the common header; neither includes SLEN or SIDX. LEN MUST be > 6 for both types.
