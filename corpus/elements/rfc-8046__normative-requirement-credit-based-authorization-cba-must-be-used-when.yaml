document: rfc-8046
kind: normative-requirement
summary: Credit-Based Authorization (CBA) MUST be used when a host sends data to an UNVERIFIED locator. If the credit counter is too low to cover the outbound packet size, the packet MUST be discarded or buffered; when sent to an UNVERIFIED locator, the credit counter MUST be reduced by the packet size.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
