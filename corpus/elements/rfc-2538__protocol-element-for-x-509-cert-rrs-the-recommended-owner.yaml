document: rfc-2538
kind: protocol-element
summary: 'For X.509 CERT RRs, the recommended owner name priority order is: (1) domain name in the certificate, (2) reverse DNS of IP address, (3) domain name from a URI in the certificate, (4) character string name treated as PGP, (5) DN mapped per RFC 2247.'
