document: rfc-5162
kind: protocol-element
summary: The CLOSED response code (no parameters) MUST be returned by the server when the currently selected mailbox is closed implicitly using the SELECT/EXAMINE command on another mailbox. It serves as a boundary between responses for the previously opened mailbox and the newly selected mailbox.
section: "3.7"
topics:
    - email
