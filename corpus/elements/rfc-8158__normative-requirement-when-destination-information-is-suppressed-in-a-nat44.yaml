document: rfc-8158
kind: normative-requirement
summary: When destination information is suppressed in a NAT44 session log event, the session log contains the same information as the BIB event; in such cases, the NAT device SHOULD NOT send both BIB and session events.
section: 4.6.1
rfc2119_level: SHOULD NOT
