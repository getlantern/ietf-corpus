document: rfc-7140
kind: normative-requirement
summary: An implementation supporting HSMP LSP MUST implement LDP Capability Parameters in Initialization messages (per RFC 5561). If the peer has not advertised the HSMP LSP Capability, label messages using the HSMP FEC Element SHOULD NOT be sent to that peer.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
