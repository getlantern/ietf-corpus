document: rfc-9052
kind: normative-requirement
summary: Labels in each header map MUST be unique; if a label appears multiple times, the message MUST be rejected as malformed. Attributes MUST be obtained from the protected bucket first; only if not found there may they be obtained from the unprotected bucket.
