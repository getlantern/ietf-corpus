document: rfc-7968
kind: protocol-element
summary: 'Six new APPsub-TLVs carried in the TRILL GENINFO TLV in E-L1FS FS-LSPs are defined: Tree and VLANs (type 11), Tree and VLANs Used (type 12), Tree and FGLs (type 13), Tree and FGLs Used (type 14), Tree and Groups (type 15), and Tree and Groups Used (type 16). The first four parallel finer-granularity versions of TREE-RT-IDs and TREE-USE-IDs.'
