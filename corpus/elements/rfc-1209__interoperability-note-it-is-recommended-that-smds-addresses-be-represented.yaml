document: rfc-1209
kind: interoperability-note
summary: It is RECOMMENDED that SMDS addresses be represented in native SMDS format (most significant bit of Address Type sub-field as high-order bit of first octet) in all higher layer Internet protocols such as SNMP, for consistency with ARP packet encoding.
section: Address Resolution
topics:
    - ip
    - snmp
