document: rfc-6140
kind: security-consideration
summary: RSA keys used for temporary GRUU generation should be at least 2048 bits for data requiring protection through 2030, and at least 3072 bits thereafter, per RSA Laboratories guidance. Private key disclosure would allow any party to correlate temporary GRUUs to each other and to their associated PBXes.
section: "10"
topics:
    - sip
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
