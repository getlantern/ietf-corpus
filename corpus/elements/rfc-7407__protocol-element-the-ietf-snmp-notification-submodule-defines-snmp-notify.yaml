summary: The ietf-snmp-notification submodule defines /snmp/notify (name, tag, type enum trap|inform) and /snmp/notify-filter-profile (name, include/exclude wildcard-object-identifier leaf-lists). It augments /snmp/target-params with a notify-filter-profile leafref, representing the MIB's sparse relationship between snmpTargetParamsTable and snmpNotifyFilterProfileTable.
