document: rfc-5124
kind: normative-requirement
summary: For announced sessions (SAP, web, email) with no interactive negotiation, incompatible profiles (secure and insecure) MUST NOT be specified as alternatives. For negotiated sessions, one profile MUST be chosen from among offered alternatives.
section: 3.3.4
rfc2119_level: MUST NOT
topics:
