document: rfc-6117
kind: normative-requirement
summary: The name of a URI Scheme MUST NOT be used as a Type string for an Enumservice that is not specifically about the respective protocol or URI Scheme, to avoid confusion (e.g., 'imap' for Internet mapping services would be invalid).
section: 4.2.1
rfc2119_level: MUST NOT
