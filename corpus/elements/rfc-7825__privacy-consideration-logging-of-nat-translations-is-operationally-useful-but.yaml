document: rfc-7825
kind: privacy-consideration
summary: Logging of NAT translations is operationally useful but can be privacy-invasive at Internet scale. Procedures for log flushing and privacy protection SHALL be in place, including consideration of log integrity, privacy protection, and retention/purging policies.
section: "11.2"
rfc2119_level: SHALL
topics:
    - privacy
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
