document: rfc-7459
kind: protocol-element
summary: 'For a normal distribution, uncertainty can be scaled to a desired confidence Cd using: Ud[x] <= U[x] * (erfinv(Cd^(1/n)) / erfinv(Co^(1/n))), where n is the number of dimensions and standard deviation is derived as S[x] = U[x] / (sqrt(2) * erfinv(C[x])).'
section: 5.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
