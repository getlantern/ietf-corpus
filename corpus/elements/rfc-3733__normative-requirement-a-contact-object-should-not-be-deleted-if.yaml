document: rfc-3733
kind: normative-requirement
summary: A contact object SHOULD NOT be deleted if it is associated with other known objects; associated contacts SHOULD NOT be deleted until associations have been broken. A server SHOULD notify clients of object relationships when a <delete> fails due to existing associations.
section: 3.2.2
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
