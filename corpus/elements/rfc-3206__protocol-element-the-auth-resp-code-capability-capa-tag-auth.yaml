document: rfc-3206
kind: protocol-element
summary: 'The AUTH-RESP-CODE capability (CAPA tag: AUTH-RESP-CODE, no arguments) indicates that the server includes the AUTH response code with every authentication error caused by a problem with user credentials. It can be announced in both AUTHORIZATION and TRANSACTION states with no difference.'
