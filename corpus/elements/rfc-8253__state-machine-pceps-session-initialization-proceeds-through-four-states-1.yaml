document: rfc-8253
kind: state-machine
summary: 'PCEPS session initialization proceeds through four states: (1) TCP connection established, (2) StartTLS messages exchanged in both directions, (3) TLS connection negotiated and established, (4) PCEP Open messages exchanged and session active. Any deviation from this ordering triggers an error.'
section: "3.1"
topics:
