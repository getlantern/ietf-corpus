document: rfc-4982
kind: design-rationale
summary: The Sec bits were chosen to encode the hash algorithm used rather than consuming additional hash bits (which would weaken security by reducing hash entropy in the address) or the 'u'/'g' bits (which are reserved for unique interface identifier purposes and have been honored by all existing mechanisms).
