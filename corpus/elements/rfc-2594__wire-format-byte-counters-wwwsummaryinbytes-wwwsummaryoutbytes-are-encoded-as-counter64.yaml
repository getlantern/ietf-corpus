document: rfc-2594
kind: wire-format
summary: Byte counters (wwwSummaryInBytes, wwwSummaryOutBytes) are encoded as Counter64 for full 64-bit precision, with companion Counter32 objects (wwwSummaryInLowBytes, wwwSummaryOutLowBytes) carrying the lowest 32 bits to support SNMPv1 agents that cannot handle Counter64.
