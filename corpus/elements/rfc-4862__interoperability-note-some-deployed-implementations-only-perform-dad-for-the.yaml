document: rfc-4862
kind: interoperability-note
summary: Some deployed implementations only perform DAD for the link-local address and skip DAD for global addresses that share the same interface identifier. This document does not invalidate such implementations but explicitly labels this optimization NOT RECOMMENDED and prohibits it in new implementations, because RFC 4941 and RFC 3972 introduce address types with distinct per-address interface identifiers.
section: "5.4"
topics:
    - ip
    - v6ops
