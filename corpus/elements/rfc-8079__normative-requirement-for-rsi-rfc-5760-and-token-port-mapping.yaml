document: rfc-8079
kind: normative-requirement
summary: For RSI (RFC 5760) and TOKEN/Port Mapping (RFC 6284) packets, a media-aware B2BUA MUST update all SSRC identifiers in the message, including the distribution source SSRC and Packet Sender SSRC, rewriting them with the SSRC the B2BUA uses when sending RTP to each participant.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
