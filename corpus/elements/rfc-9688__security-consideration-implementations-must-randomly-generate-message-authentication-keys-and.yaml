document: rfc-9688
kind: security-consideration
summary: Implementations must randomly generate message-authentication keys and one-time values (e.g., the ECDSA per-message k value); use of inadequate PRNGs can result in little or no security. RFC 4086 provides guidance on randomness requirements.
section: "6"
topics:
    - crypto
    - security
