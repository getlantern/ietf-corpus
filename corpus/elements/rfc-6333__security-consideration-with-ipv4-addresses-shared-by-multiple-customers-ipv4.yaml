document: rfc-6333
kind: security-consideration
summary: With IPv4 addresses shared by multiple customers, IPv4 address plus timestamp is no longer sufficient to identify a specific broadband user. The AFTR should log the tunnel-id, protocol, ports/IP addresses, and NAT binding creation time to uniquely identify user sessions, in order to support abuse investigations and lawful intercept.
section: "11"
topics:
