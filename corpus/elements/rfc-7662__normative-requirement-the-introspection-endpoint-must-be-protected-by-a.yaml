document: rfc-7662
kind: normative-requirement
summary: The introspection endpoint MUST be protected by a transport-layer security mechanism. The server MUST support TLS 1.2 and the client or protected resource MUST perform a TLS/SSL server certificate check as specified in RFC 6125.
section: "2"
rfc2119_level: MUST
topics:
