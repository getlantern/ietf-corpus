document: rfc-8939
kind: interoperability-note
summary: DetNet IP flow identification using 6-tuples is not fully applicable to all protocols. For ICMP, IPsec, and ESP, port information is unavailable, requiring use of fewer fields (e.g., 3-tuple or 2-tuple). ICMP type is excluded from the DetNet flow definition.
section: "3"
topics:
    - ip
    - ipsec
