document: rfc-1662
kind: normative-requirement
summary: For octet-synchronous links, the Flag Sequence MUST be transmitted during inter-frame time fill. For asynchronous links, inter-octet time fill MUST be accomplished by transmitting continuous '1' bits (mark-hold state).
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
