document: rfc-5946
kind: normative-requirement
summary: Upon receiving a Path message with a Notify Request object, the RSVP Receiver Proxy MUST include a Notify Request object in the Resv messages it generates, containing either the sender's address (Direct Notify) or an address of the Receiver Proxy itself (Indirect Notify).
section: "3.2"
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
