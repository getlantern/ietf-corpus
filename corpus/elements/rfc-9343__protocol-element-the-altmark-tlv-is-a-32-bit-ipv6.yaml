document: rfc-9343
kind: protocol-element
summary: The AltMark TLV is a 32-bit IPv6 Extension Header Option (Hop-by-Hop or Destination) carrying a 20-bit FlowMonID, a 1-bit Loss flag (L), a 1-bit Delay flag (D), and reserved bits. The Option Type is 0x12 (binary 000 10010).
