document: rfc-8221
kind: interoperability-note
summary: ENCR_AES_CBC MUST be implemented to maintain interoperability with implementations that followed RFC 7321, even though the industry trend is toward AEAD algorithms and ENCR_AES_CBC is expected to be replaced in the long term.
