document: rfc-3965
kind: security-consideration
summary: Offramp facsimile causes an outdial that imposes significant resource consumption including financial cost. Unsolicited bulk email triggering outdials is undesirable; offramps should implement sender authorization using source filtering or originator authentication.
section: 5.2.2
topics:
    - email
    - security
