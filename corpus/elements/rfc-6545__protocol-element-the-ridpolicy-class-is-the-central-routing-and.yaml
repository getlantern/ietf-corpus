document: rfc-6545
kind: protocol-element
summary: The RIDPolicy class is the central routing and policy element present in all message types. It carries mandatory attributes MsgType (TraceRequest, Acknowledgement, Result, InvestigationRequest, Report, Query) and MsgDestination (RIDSystem or SourceOfIncident), plus aggregate elements Node, IncidentID, PolicyRegion, TrafficType, and optional ReportSchema.
