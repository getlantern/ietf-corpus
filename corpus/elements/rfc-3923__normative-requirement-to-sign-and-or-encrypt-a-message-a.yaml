document: rfc-3923
kind: normative-requirement
summary: To sign and/or encrypt a message, a sending agent MUST generate a Message/CPIM object, sign and/or encrypt it using S/MIME, and provide the result within an XML CDATA section in an <e2e/> child of a <message/> stanza qualified by 'urn:ietf:params:xml:ns:xmpp-e2e'.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
