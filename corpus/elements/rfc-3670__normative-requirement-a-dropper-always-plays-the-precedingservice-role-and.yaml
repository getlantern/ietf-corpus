document: rfc-3670
kind: normative-requirement
summary: A dropper always plays the PrecedingService role and the associated queue always plays the FollowingService role in a NextService association; there is always exactly one queue from which a dropper drops packets.
section: "3.10"
rfc2119_level: MUST
