document: rfc-2284
kind: protocol-element
summary: The One-Time Password type (5) uses the OTP system defined in RFC 1938. The Request contains a displayable OTP challenge; the Response MUST be Type 5 (OTP) or Type 3 (Nak). The Response Type-Data contains the 6 words from the OTP dictionary. Messages MUST NOT be null-terminated.
section: "3.5"
topics:
