document: rfc-9780
kind: normative-requirement
summary: Non-IP encapsulation for multipoint BFD over P2MP MPLS LSP MUST use the G-ACh Label (GAL) at the bottom of the label stack followed by an Associated Channel Header (ACH), and the Channel Type field MUST be set to Multipoint BFD Session (0x0013).
section: "3.2"
rfc2119_level: MUST
topics:
