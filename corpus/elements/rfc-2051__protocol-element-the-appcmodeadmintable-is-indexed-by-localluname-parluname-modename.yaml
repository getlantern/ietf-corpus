document: rfc-2051
kind: protocol-element
summary: The appcModeAdminTable is indexed by (LocalLuName, ParLuName, ModeName). It captures mode configuration including COS name, maximum session limit, minimum contention-winner and contention-loser limits, pacing window sizes, preferred and bounded RU sizes, compression settings, sync level, and cryptography support. Reserved '*ALL' values allow mode definitions to apply broadly across all local or partner LUs.
section: 3.1.2
topics:
