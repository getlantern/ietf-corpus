document: rfc-2678
kind: interoperability-note
summary: The IP TTL field is intended to limit packet lifetimes to 255 seconds (RFC 791), but in practice it often acts as a strict hop count (RFC 1812). Packets could theoretically survive longer than 255 seconds. Connectivity measurements must account for packet lifetime considerations.
section: "2.5"
topics:
    - ip
    - measurement
