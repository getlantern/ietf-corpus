document: rfc-2725
kind: interoperability-note
summary: Objects without mnt-by attributes still exist in deployed registries. A missing mnt-by is interpreted as the absence of any control. New additions must conform to new requirements, but existing non-conformant data cannot be unconditionally purged.
section: C.3
topics:
