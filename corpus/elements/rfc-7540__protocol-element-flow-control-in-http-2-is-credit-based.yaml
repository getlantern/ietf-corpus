document: rfc-7540
kind: protocol-element
summary: Flow control in HTTP/2 is credit-based, using WINDOW_UPDATE frames, and applies only to DATA frames. The initial flow-control window is 65,535 octets for both new streams and the connection as a whole. Flow control cannot be disabled, is hop-by-hop, and is directional (controlled by the receiver).
section: "5.2"
topics:
    - http
