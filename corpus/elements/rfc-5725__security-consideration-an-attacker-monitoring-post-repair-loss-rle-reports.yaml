document: rfc-5725
kind: security-consideration
summary: An attacker monitoring Post-repair Loss RLE reports in addition to Pre-repair reports can infer the effectiveness of the repair process, but this does not enable new attacks beyond what an attacker could determine by observing RTP packets and performing the repair algorithms themselves.
