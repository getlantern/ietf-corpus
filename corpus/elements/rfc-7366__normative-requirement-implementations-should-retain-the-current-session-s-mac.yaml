document: rfc-7366
kind: normative-requirement
summary: Implementations SHOULD retain the current session's MAC ordering (encrypt-then-MAC or MAC-then-encrypt) across all rehandshakes for that session, and SHOULD NOT change state during a rehandshake.
section: "3.1"
rfc2119_level: SHOULD
topics:
