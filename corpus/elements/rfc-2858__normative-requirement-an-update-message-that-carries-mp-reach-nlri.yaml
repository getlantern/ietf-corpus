document: rfc-2858
kind: normative-requirement
summary: An UPDATE message that carries MP_REACH_NLRI MUST also carry the ORIGIN and AS_PATH attributes in both EBGP and IBGP exchanges. In IBGP exchanges, such a message MUST also carry the LOCAL_PREF attribute.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
