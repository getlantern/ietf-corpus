document: rfc-8182
kind: interoperability-note
summary: RRDP coexists with rsync-based RPKI repositories by including the rsync URI of every object in Snapshot and Delta Files alongside the content hash. This allows the same set of files on a filesystem to be distributed via both rsync and RRDP, and allows Relying Party tools to combine objects from both repository types for validation.
section: "4.1"
topics:
    - routing
