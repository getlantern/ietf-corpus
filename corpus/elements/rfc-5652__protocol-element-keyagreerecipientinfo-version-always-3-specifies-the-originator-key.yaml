document: rfc-5652
kind: protocol-element
summary: KeyAgreeRecipientInfo (version always 3) specifies the originator key via issuerAndSerialNumber, subjectKeyIdentifier, or raw originatorKey; includes optional User Keying Material (UKM) to ensure key uniqueness per session; and carries per-recipient encrypted content-encryption keys.
section: 6.2.2
topics:
