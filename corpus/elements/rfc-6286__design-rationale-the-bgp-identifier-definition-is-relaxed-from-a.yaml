document: rfc-6286
kind: design-rationale
summary: The BGP Identifier definition is relaxed from a valid IPv4 host address to any 4-octet non-zero integer to accommodate situations such as IPv6-only networks where assigning a valid IPv4 address to every BGP speaker may not be feasible. Only AS-wide uniqueness is required rather than global uniqueness.
section: "1"
topics:
