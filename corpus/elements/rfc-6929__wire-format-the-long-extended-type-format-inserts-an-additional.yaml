document: rfc-6929
kind: wire-format
summary: 'The Long Extended Type format inserts an additional flags octet between Extended-Type and Value: Type (1 octet), Length (1 octet, 5–255), Extended-Type (1 octet), M|Reserved (1 octet, 1-bit More flag + 7-bit reserved), Value (1+ octets). Attributes with Length 2, 3, or 4 MUST be treated as invalid.'
section: "2.2"
topics:
    - radius
    - security
