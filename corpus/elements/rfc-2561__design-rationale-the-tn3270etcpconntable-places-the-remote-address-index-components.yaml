document: rfc-2561
kind: design-rationale
summary: The tn3270eTcpConnTable places the remote address index components before the local address components so that a Management Station can issue a GET-NEXT operation using only the remote address pair to efficiently retrieve all entries associated with a particular TN3270E client.
