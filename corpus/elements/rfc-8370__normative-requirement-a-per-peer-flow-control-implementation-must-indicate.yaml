document: rfc-8370
kind: normative-requirement
summary: A Per-Peer Flow Control implementation MUST indicate support via the CAPABILITY object in Hello messages by setting Bit Number 27 (0x0010), the Per-Peer Flow-Control Capable (F-bit), and MUST also set the Refresh-Reduction-Capable bit in all RSVP-TE message headers.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
