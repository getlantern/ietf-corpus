document: rfc-1377
kind: design-rationale
summary: It is recommended that alignment be achieved through PPP header compression combinations whenever possible rather than leading zero padding. For example, an alignment of 3 could be achieved by combining uncompressed Address/Control fields (2 octets) with a compressed Protocol field (1 octet).
section: "3.1"
topics:
