document: rfc-7989
kind: design-rationale
summary: The session identifier is deliberately constructed to not reveal user, device, domain, or other sensitive information, removing the incentive for session border controllers to alter it. This ensures end-to-end integrity of the identifier through intermediaries that would otherwise rewrite Call-IDs.
section: "7"
topics:
