document: rfc-3031
kind: protocol-element
summary: Label scope may be per-platform (globally unique within an LSR) or per-interface (unique only on a given point-to-point interface). Per-interface label spaces are valid only when an LSR can reliably determine from the incoming interface which upstream peer placed a given label on a packet.
section: "3.14"
topics:
    - routing
extracted_by: claude-sonnet-4-6
