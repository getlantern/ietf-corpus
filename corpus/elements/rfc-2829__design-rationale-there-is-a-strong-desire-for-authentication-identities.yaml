document: rfc-2829
kind: design-rationale
summary: There is a strong desire for authentication identities to take the form of Distinguished Names so that authentication data can be stored in the directory itself. This means the stored data must either be useless for faking authentication or never passed across the wire unprotected.
section: "4"
topics:
    - ldap
    - security
