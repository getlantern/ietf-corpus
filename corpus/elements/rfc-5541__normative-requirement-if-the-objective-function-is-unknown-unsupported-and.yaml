document: rfc-5541
kind: normative-requirement
summary: If the objective function is unknown/unsupported and the P bit is set, the PCE MUST send a PCErr with error type 3 or 4 and error value 4 (Unrecognized/Unsupported parameter), and the related path computation request MUST be discarded.
section: 3.1.1
rfc2119_level: MUST
topics:
    - routing
