document: rfc-8930
kind: protocol-element
summary: 6LoWPAN Fragment Forwarding (6LFF) is a technique whereby an intermediate node forwards a fragment without reassembling if the next hop is a similar 6LoWPAN link. The routing decision is made on the first fragment, which carries the IPv6 routing information, and state is stored to forward subsequent fragments along the same path.
section: "1"
topics:
    - ip
    - routing
