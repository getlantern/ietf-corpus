document: rfc-7317
kind: security-consideration
summary: The readable nodes /system-state/platform (os-name, os-release, os-version, machine) and /system/authentication/user (including password hashes and SSH key data) can reveal sensitive system and credential information; read access should be controlled via NETCONF ACM.
