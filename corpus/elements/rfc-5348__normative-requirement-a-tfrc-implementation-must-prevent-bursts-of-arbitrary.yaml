document: rfc-5348
kind: normative-requirement
summary: A TFRC implementation MUST prevent bursts of arbitrary size; the burst limit MUST be less than or equal to one round-trip time's worth of packets. Implementations MAY use rate-based pacing to smooth bursts within that limit.
section: "4.6"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
