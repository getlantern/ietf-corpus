document: rfc-8077
kind: design-rationale
summary: Label reuse after withdrawal must be deferred until old packets bearing the released label can no longer persist in the network. Premature reuse can cause sequence-number restart confusion at the disposition router when sequencing is enabled.
section: 7.4.1
topics:
    - mpls
