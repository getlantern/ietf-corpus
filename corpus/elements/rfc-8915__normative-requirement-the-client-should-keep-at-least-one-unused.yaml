document: rfc-8915
kind: normative-requirement
summary: The client SHOULD keep at least one unused but recent cookie, AEAD keys, negotiated AEAD algorithm, and other necessary parameters in persistent storage to allow NTP session resumption without a fresh NTS-KE handshake when the NTS-KE server is unavailable.
section: "5.7"
rfc2119_level: SHOULD
topics:
    - ntp
