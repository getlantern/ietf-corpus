document: rfc-9642
kind: design-rationale
summary: The 'keystore-grouping' grouping is defined separately from the protocol-accessible 'keystore' container specifically to enable the keystore structure to be instantiated in other locations beyond the single top-level central keystore, accommodating modules that may need to place a keystore instance elsewhere in their data model.
section: 2.1.4
topics:
