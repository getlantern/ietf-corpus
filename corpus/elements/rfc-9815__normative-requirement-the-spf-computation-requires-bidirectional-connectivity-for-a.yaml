document: rfc-9815
kind: normative-requirement
summary: 'The SPF computation requires bidirectional connectivity: for a link to be used, the remote node''s Link NLRI must exist with matching address descriptors pointing back to the current node. A link is excluded if either direction''s SPF Status TLV indicates unreachable.'
section: "6.3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
