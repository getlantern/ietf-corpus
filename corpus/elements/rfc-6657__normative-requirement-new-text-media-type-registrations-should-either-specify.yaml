document: rfc-6657
kind: normative-requirement
summary: New 'text/*' media type registrations SHOULD either specify that the 'charset' parameter is not used (because charset is carried inside the payload) or require explicit unconditional inclusion of the 'charset' parameter, eliminating the need for a default value.
section: "3"
rfc2119_level: SHOULD
topics:
