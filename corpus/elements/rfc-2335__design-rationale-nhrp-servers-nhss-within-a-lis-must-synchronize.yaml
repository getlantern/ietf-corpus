document: rfc-2335
kind: design-rationale
summary: NHRP Servers (NHSs) within a LIS must synchronize their client databases so that any NHC can query any NHS about any NHC in the LIS. SCSP is chosen to solve this generalized server synchronization/cache-replication problem.
