summary: The NORM_CMD message (type=3) reuses the common header plus 'instance_id', 'grtt', 'backoff', 'gsize', and an 8-bit 'sub-type' field that selects among FLUSH(1), EOT(2), SQUELCH(3), CC(4), REPAIR_ADV(5), ACK_REQ(6), and APPLICATION(7) sub-commands, each with its own payload format.
