document: rfc-7493
kind: interoperability-note
summary: Paired surrogate escapes such as '\uD800\uDEAD' are legal in I-JSON, but lone surrogates like '\uDEAD' are invalid. Implementations must distinguish paired from unpaired surrogates when validating.
section: "2.1"
topics:
