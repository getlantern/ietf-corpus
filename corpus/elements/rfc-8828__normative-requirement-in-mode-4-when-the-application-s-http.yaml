document: rfc-8828
kind: normative-requirement
summary: In Mode 4, when the application's HTTP traffic is sent through a proxy, WebRTC media traffic MUST also be proxied. If the proxy does not support UDP, or the implementation does not support UDP proxying, UDP is disabled and TCP is used.
section: "5.2"
rfc2119_level: MUST
topics:
    - webrtc
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
