document: rfc-8253
kind: normative-requirement
summary: A PCEP speaker supporting PCEPS MUST NOT start the OpenWait timer after TCP establishment; instead it starts the StartTLSWait timer. The first message sent by the PCC to the PCE and by the PCE to the PCC MUST be a StartTLS message for PCEPS.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
