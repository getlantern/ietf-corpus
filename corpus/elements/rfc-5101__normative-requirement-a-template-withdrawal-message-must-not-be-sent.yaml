document: rfc-5101
kind: normative-requirement
summary: A Template Withdrawal Message MUST NOT be sent until sufficient time has elapsed (configurable, default 5 seconds after the last Data Record using that Template). The withdrawn Template ID MUST NOT be reused until sufficient time has elapsed for the Collector to process the withdrawal.
section: "8"
rfc2119_level: MUST NOT
topics:
    - measurement
