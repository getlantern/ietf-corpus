document: rfc-5613
kind: interoperability-note
summary: OSPF routers that do not support LLS will ignore the LLS data block appended after the OSPF packet or cryptographic message digest, preserving backward compatibility. Changes caused by LLS TLVs MUST NOT affect basic routing when interacting with non-LLS routers.
section: "4"
topics:
