document: rfc-8767
kind: normative-requirement
summary: TTL values SHOULD be capped on the order of days to weeks, with a recommended cap of 604,800 seconds (7 days). This replaces the effectively unbounded 31-bit cap suggested by RFC 2181.
section: "4"
rfc2119_level: SHOULD
