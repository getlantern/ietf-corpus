document: rfc-8193
kind: design-rationale
summary: Suppression is a separate object distinct from Instruction Schedules so that measurements can be temporarily halted and then automatically resumed without removing or modifying the underlying Schedule, and can be delivered on a different timing or protocol than the Schedule itself.
section: "4.3"
