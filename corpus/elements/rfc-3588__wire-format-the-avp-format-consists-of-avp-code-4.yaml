document: rfc-3588
kind: wire-format
summary: 'The AVP format consists of: AVP Code (4 octets), AVP Flags (1 octet; V=vendor-specific, M=mandatory, P=end-to-end protected), AVP Length (3 octets covering header and data), optional Vendor-ID (4 octets, present only when V bit set), and variable-length Data. AVPs are padded to a 32-bit boundary though padding is not included in AVP Length.'
section: "4.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
