document: rfc-2381
kind: normative-requirement
summary: Real-time support is REQUIRED for Guaranteed Service. In UNI 3.x, Bearer Class BCOB-A (or equivalent BCOB-X) MUST be used; in TM/UNI 4.0, CBR or rtVBR MUST be chosen. Non-real-time categories (nrtVBR, UBR, ABR) cannot guarantee consistently low delay.
section: 2.1.1
rfc2119_level: REQUIRED
topics:
    - ip
    - qos
