document: rfc-6585
kind: security-consideration
summary: When a server is under attack or receiving a large number of requests from a single party, responding to each with 429 consumes resources. Servers are not required to use 429; dropping connections may be more appropriate.
section: "7.2"
topics:
    - http
    - security
