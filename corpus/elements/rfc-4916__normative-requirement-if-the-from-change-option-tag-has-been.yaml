document: rfc-4916
kind: normative-requirement
summary: If the "from-change" option tag has been received during an INVITE-initiated dialog and the UA's identity changes compared to the last indicated identity, the UA MUST issue a request on the same dialog containing the new identity in the URI of the From header field. For this purpose the UA MUST use the UPDATE method unless a re-INVITE is already being used at the same time.
section: "4.3"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
