document: rfc-2136
kind: protocol-element
summary: 'Four update operations are defined by CLASS/TYPE metavalues: add to RRset (CLASS=zone), delete an RRset (CLASS=ANY, TYPE=rrset, empty RDATA), delete all RRsets from a name (CLASS=ANY, TYPE=ANY, empty RDATA), and delete a single RR from an RRset (CLASS=NONE, full RDATA). TTL must be zero for delete operations.'
section: "2.5"
