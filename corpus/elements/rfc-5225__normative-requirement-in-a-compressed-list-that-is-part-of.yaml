document: rfc-5225
kind: normative-requirement
summary: In a compressed list that is part of the dynamic chain, all X-bits in the XI list MUST be set (all items must be present). Previously established item table entries not present in the current list MUST also be retained in the decompressor context.
section: 6.6.13.5
rfc2119_level: MUST
