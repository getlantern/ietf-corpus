document: rfc-2948
kind: normative-requirement
summary: If a new OFB64_IV command is received while encryption is enabled, the encryption/decryption machine must be re-initialized immediately after the OFB64_IV command using the new IV and the keyid from the last START command.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
