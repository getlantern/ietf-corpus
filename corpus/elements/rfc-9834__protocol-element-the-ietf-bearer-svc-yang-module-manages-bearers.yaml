document: rfc-9834
kind: protocol-element
summary: The 'ietf-bearer-svc' YANG module manages bearers — physical or logical links connecting customer termination points to a provider network. It exposes bearer lifecycle, admin/oper status with timestamps, placement constraints, physical synchronization (SyncE), parent/child LAG relationships, and a server-assigned bearer reference used in subsequent AC requests.
section: "5.1"
topics:
