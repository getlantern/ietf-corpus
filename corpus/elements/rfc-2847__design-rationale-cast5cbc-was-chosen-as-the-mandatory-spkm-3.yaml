document: rfc-2847
kind: design-rationale
summary: 'cast5CBC was chosen as the mandatory SPKM-3 confidentiality algorithm over DES EDE3 (too slow: ~1.6 MB/s vs ~7.1 MB/s) and RC4 (intellectual property issues) because it offers royalty-free licensing, reasonable performance, and the cast6CBC superset was evaluated by NIST as having a ''high security margin'' with no major security gaps.'
section: 2.3.1
topics:
