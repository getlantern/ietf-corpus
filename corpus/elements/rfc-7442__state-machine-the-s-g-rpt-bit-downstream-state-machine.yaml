document: rfc-7442
kind: state-machine
summary: 'The (S,G,RPT-bit) downstream state machine has two relevant states: Prune (entered when Source Active route received and conditions (a)-(d) hold) and NoInfo (entered when any of those conditions cease to hold). The LSR acts as if it received Prune(S,G,rpt) on an MPLS interface without actually receiving one.'
section: "3.4"
topics:
    - mpls
    - multicast
