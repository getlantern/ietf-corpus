document: rfc-7597
kind: protocol-element
summary: A MAP domain consists of one or more MAP Customer Edge (CE) devices and Border Relays (BRs) connected to the same virtual link. A MAP Rule is a set of parameters describing the mapping between an IPv4 prefix, IPv4 address, or shared IPv4 address and an IPv6 prefix or address. Each domain uses a different mapping rule set.
