document: rfc-2333
kind: design-rationale
summary: 'To avoid multiple redundant short-cut paths being formed as a packet traverses multiple hops, only three categories of entities should be authorized to issue NHRP requests: (i) the originating host with an NBMA interface, (ii) the first router along the path whose next hop is on an NBMA interface, or (iii) a policy router within the NBMA network.'
section: "4"
