document: rfc-8259
kind: normative-requirement
summary: A JSON text MUST be encoded using UTF-8 when exchanged between systems that are not part of a closed ecosystem. Previous specifications did not require UTF-8, but it is the only encoding that achieves interoperability in practice.
section: "8.1"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
