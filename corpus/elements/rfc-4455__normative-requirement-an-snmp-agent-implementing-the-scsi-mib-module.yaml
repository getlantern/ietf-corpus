document: rfc-4455
kind: normative-requirement
summary: An SNMP agent implementing the SCSI MIB module should not send more than three SCSI notifications in any 10-second period, to avoid inundating the network or the destination host with excessive notifications.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - snmp
