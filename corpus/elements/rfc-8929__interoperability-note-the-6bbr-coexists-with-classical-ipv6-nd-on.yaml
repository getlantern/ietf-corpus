document: rfc-8929
kind: interoperability-note
summary: 'The 6BBR coexists with classical IPv6 ND on the backbone: classical ND messages are interpreted as emitted by the address owner and take precedence over 6BBR proxy responses. An NS(DAD) cannot be confused with a proxy registration because RFC 4862 requires NS(DAD) to be sent from the unspecified address, precluding an SLLAO, while RFC 8505 registration NS(EARO) requires an SLLAO.'
section: "3.1"
topics:
    - ip
