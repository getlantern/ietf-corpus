document: rfc-3883
kind: interoperability-note
summary: When the first probe LSA has a higher sequence number than what the probed neighbor holds (because LSA refreshes are not flooded over demand circuits), the neighbor will flood the probe LSA further; subsequent probe LSAs with the same sequence number will not cause additional flooding.
section: "2.1"
topics:
    - routing
