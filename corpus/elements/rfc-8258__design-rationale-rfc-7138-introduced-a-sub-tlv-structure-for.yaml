document: rfc-8258
kind: design-rationale
summary: RFC 7138 introduced a sub-TLV structure for technology-specific SCSI fields, which allows greater flexibility in structure, ordering, and support for extensions. This document generalizes that approach into a reusable Generalized SCSI format for future technologies and Switching Capability types, avoiding per-technology reinvention.
section: "1"
topics:
    - routing
    - mpls
