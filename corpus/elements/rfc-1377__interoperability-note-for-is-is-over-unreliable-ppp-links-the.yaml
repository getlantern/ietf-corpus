document: rfc-1377
kind: interoperability-note
summary: For IS-IS over unreliable PPP links, the Holding Time must be greater than k times the ISISHello timer, where k is chosen such that loss of k consecutive IS-IS Hellos is rare. If link quality is poor, the Holding Time must be increased or the ISISHello timer decreased to avoid unnecessary link flapping.
section: "1.1"
topics:
    - routing
