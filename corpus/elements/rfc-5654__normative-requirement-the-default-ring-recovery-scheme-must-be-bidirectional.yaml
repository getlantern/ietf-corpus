document: rfc-5654
kind: normative-requirement
summary: The default ring recovery scheme MUST be bidirectional recovery, and revertive switching MUST be the default behavior. Ring recovery MUST scale better than linearly with number of transport paths, and at least linearly with number of nodes and ring interconnects.
section: 2.5.6.1
rfc2119_level: MUST
topics:
