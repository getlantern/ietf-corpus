summary: 'Two new RSA public key algorithms are defined: ''rsa-sha2-256'' (RECOMMENDED) using SHA-256, and ''rsa-sha2-512'' (OPTIONAL) using SHA-512. Both use RSASSA-PKCS1-v1_5 signing and are suitable for both server and client authentication.'
