document: rfc-8167
kind: normative-requirement
summary: If a reverse-direction requester provides a non-empty chunk list to a Responder that does not support chunks, the Responder MUST reply with an RDMA_ERROR message with the rdma_err field set to ERR_CHUNK.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
