document: rfc-9963
kind: security-consideration
summary: The new legacy code points are forbidden for server certificates; RSASSA-PSS remains required for TLS 1.3 servers using RSA keys. This limits the security impact to only the cases necessary to unblock TLS 1.3 deployment.
