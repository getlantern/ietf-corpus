document: rfc-4326
kind: interoperability-note
summary: 'ULE uses TS private data but follows PSI packet PUSI semantics: PUSI=1 indicates the start of a new SNDU and the presence of a 1-byte Payload Pointer immediately after the 4-byte TS Packet header. This differs from PES format, which does not use the Payload Pointer.'
