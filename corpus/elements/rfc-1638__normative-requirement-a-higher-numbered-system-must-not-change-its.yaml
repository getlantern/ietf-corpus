document: rfc-1638
kind: normative-requirement
summary: A higher-numbered system MUST NOT change its bridge number to a lower number to resolve a Bridge-Identification mismatch; a system MAY change its bridge number to the higher of the two numbers.
section: "5.1"
rfc2119_level: MUST NOT
