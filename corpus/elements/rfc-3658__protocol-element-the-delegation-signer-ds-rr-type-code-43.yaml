document: rfc-3658
kind: protocol-element
summary: The Delegation Signer (DS) RR (type code 43) is inserted at a zone cut in the parent zone to indicate that the delegated child zone is digitally signed and identifies the key(s) the child uses to self-sign its apex KEY RRset. It replaces the RFC 2535 model of storing signed KEY RRsets at the parent.
section: "2.1"
topics:
    - dns
    - security
    - crypto
