document: rfc-6059
kind: normative-requirement
summary: On reception of a Router Advertisement from a router known in the SDAT, the host MUST first mark all addresses associated with that router as inoperable, then process the RA per RFC 4861 Section 6.3.4. The RA processing may subsequently restore addresses as operable.
section: 5.7.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
