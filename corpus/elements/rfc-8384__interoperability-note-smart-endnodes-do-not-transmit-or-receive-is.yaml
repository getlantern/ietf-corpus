document: rfc-8384
kind: interoperability-note
summary: Smart Endnodes do not transmit or receive IS-IS LSPs or E-L1FS FS LSPs and do not perform routing calculations. Only the attached edge RBridge can distinguish a Smart Endnode from a normal endnode; the rest of the TRILL campus is unaware of the distinction.
