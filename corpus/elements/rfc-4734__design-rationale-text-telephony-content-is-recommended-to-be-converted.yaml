document: rfc-4734
kind: design-rationale
summary: Text telephony content is RECOMMENDED to be converted to RFC 4103 character-mode packets at the sending gateway in anticipation of migration away from legacy PSTN modem protocols; signal format indicator events support a transitional period for lesser-capability gateways that can only encode the content as voice-band data.
