kind: interoperability-note
summary: RFC 3402 obsoletes RFC 2168 (URN resolution via DNS) and RFC 2915 (NAPTR DNS Resource Record), and updates RFC 2276. Applications built on those earlier specifications must migrate to the generalized DDDS framework.
