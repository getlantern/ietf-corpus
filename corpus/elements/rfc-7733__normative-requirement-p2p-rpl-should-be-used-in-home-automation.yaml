document: rfc-7733
kind: normative-requirement
summary: P2P-RPL SHOULD be used in home automation and building control networks, as its reactive discovery allows for low application response times even when on-the-fly route repair is needed. Non-storing mode SHOULD be used to reduce memory consumption.
section: "4"
rfc2119_level: SHOULD
topics:
