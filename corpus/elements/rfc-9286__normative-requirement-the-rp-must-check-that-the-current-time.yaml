document: rfc-9286
kind: normative-requirement
summary: The RP MUST check that the current time (UTC) is between thisUpdate and nextUpdate. A manifest whose current time is earlier than thisUpdate or later than nextUpdate MUST be treated as a failed fetch, and the RP proceeds to the failed-fetch procedure.
section: "6.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
