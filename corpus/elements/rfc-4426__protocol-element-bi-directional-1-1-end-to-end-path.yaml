document: rfc-4426
kind: protocol-element
summary: Bi-directional 1+1 end-to-end path protection pre-establishes a dedicated, resource-disjoint alternate path. Failure detection may be by an intermediate node (which sends a Failure Indication toward the end node) or by the end nodes themselves; switchover is coordinated via Switchover Request and Response messages between the two end nodes.
section: "3.2"
topics:
    - mpls
    - routing
