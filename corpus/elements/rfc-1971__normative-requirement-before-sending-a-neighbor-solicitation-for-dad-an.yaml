document: rfc-1971
kind: normative-requirement
summary: Before sending a Neighbor Solicitation for DAD, an interface MUST join the all-nodes multicast address and the solicited-node multicast address of the tentative address. The solicitation uses the unspecified address as IP source and the solicited-node multicast address as destination.
section: 5.4.2
rfc2119_level: MUST
topics:
