document: rfc-2744
kind: design-rationale
summary: The gss_name_t type is defined as a pointer to an implementation-defined (rather than void*) type so that C compilers can perform type-checking on behalf of the application programmer, reducing the likelihood of API misuse.
section: "3.10"
topics:
    - security
