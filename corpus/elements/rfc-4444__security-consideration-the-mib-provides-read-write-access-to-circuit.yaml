document: rfc-4444
kind: security-consideration
summary: The MIB provides read-write access to circuit-level timers and metrics (hello timers, metric values, LSP buffer sizes) that, if tampered with, could degrade IS-IS convergence, trigger excessive SPF computation, or cause adjacency failures. SNMP access control mechanisms should restrict write access to authorized managers only.
section: "7"
topics:
    - security
    - routing
    - snmp
