document: rfc-3284
kind: registry
summary: IANA administers the Secondary Compressor ID number space (values 1..255). New values must be documented in an RFC or equivalent peer-reviewed reference with sufficient detail for interoperability. Assignments are First Come, First Served per RFC 2434. This document defines no values in this space.
