document: rfc-6468
kind: design-rationale
summary: Using the ':message' tag is preferred over the URI 'body' parameter because it integrates naturally with Sieve script syntax, supports variable substitutions (RFC 5229), and allows non-ASCII characters to be included directly in UTF-8 without URI encoding.
