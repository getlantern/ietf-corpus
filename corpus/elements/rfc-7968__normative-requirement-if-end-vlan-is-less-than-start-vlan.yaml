document: rfc-7968
kind: normative-requirement
summary: If End.VLAN is less than Start.VLAN in a Tree-VLAN RECORD, the record MUST be ignored. Similarly, if Length of the TREE-VLANs APPsub-TLV is not a multiple of 6, the APPsub-TLV is corrupt and MUST be ignored.
section: 3.2.1
rfc2119_level: MUST
topics:
    - routing
