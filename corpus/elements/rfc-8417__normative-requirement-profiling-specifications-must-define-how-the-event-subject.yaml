document: rfc-8417
kind: normative-requirement
summary: Profiling specifications MUST define how the event subject is identified in the SET and how to differentiate between the event subject's issuer and the SET issuer. Profiling specifications MUST clearly specify the validation steps a recipient MUST perform to confirm syntactic and semantic validity.
