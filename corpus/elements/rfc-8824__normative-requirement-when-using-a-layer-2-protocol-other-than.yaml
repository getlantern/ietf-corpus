document: rfc-8824
kind: normative-requirement
summary: When using a Layer 2 protocol other than LPWAN, the use of a cryptographic integrity-protection mechanism to protect SCHC headers is REQUIRED, in order to continue to provide the properties that RFC 8724 relies upon.
