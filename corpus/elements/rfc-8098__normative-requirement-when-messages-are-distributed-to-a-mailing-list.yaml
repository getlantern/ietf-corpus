document: rfc-8098
kind: normative-requirement
summary: When messages are distributed to a mailing list in a newsgroup context, the Disposition-Notification-To header SHOULD be stripped by the resending/gatewaying agent, and clients seeing it SHOULD NOT generate an MDN.
section: "2.1"
rfc2119_level: SHOULD NOT
topics:
