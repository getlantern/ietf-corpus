document: rfc-4577
kind: normative-requirement
summary: Each OSPF instance MUST be associated with one or more Domain Identifiers; this MUST be configurable, and the default value SHOULD be NULL. If an instance has multiple Domain Identifiers, the NULL Domain Identifier MUST NOT be one of them.
section: 4.2.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
