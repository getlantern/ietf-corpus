document: rfc-5036
kind: normative-requirement
summary: If an LSR encounters a FEC Element with an unsupported Address Family or unknown type during decoding, it SHOULD stop decoding the FEC TLV, abort processing the message, and send an 'Unsupported Address Family' or 'Unknown FEC' Notification to its LDP peer.
section: 3.4.1.1
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
