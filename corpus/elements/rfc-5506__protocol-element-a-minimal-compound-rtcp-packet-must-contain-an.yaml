document: rfc-5506
kind: protocol-element
summary: A Minimal Compound RTCP packet must contain an RTCP RR or SR packet and an SDES packet with the CNAME item with a specified ordering. A Full Compound RTCP conforms to minimal compound rules and contains additional RTCP packets.
