document: rfc-7357
kind: protocol-element
summary: 'The Confidence field (0-254) in MAC-Reachability TLVs allows address learning sources to be prioritized: addresses learned via authenticated registration (e.g., 802.1X/EAP) can be advertised with high Confidence so they prevail over data plane observation. ESADI authentication in transit makes tampering very difficult.'
section: "5.1"
topics:
    - routing
    - security
