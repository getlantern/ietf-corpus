document: rfc-8941
kind: design-rationale
summary: Structured Fields abstract model is designed so that future HTTP versions can define alternative serializations (e.g., binary) that transmit the same abstract model more efficiently without requiring field redefinition. The format described in this document is the canonical text serialization for HTTP/1.1 and HTTP/2.
