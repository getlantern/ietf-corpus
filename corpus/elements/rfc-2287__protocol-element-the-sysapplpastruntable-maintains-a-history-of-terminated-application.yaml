document: rfc-2287
kind: protocol-element
summary: The sysApplPastRunTable maintains a history of terminated application invocations with columns for start time, exit state (complete/failed/other), and time ended. Entries are aged out when table size exceeds sysApplPastRunMaxRows (default 500) or entry age exceeds sysApplPastRunTblTimeLimit (default 7200 seconds); oldest entries (by sysApplPastRunTimeEnded) are removed first.
section: 5.2.1
topics:
