document: rfc-8679
kind: normative-requirement
summary: The protector MUST have its own connectivity with each service destination via a direct link or multi-hop path that MUST NOT traverse the protected egress router or be affected by the egress node failure. Each service destination MUST therefore be dual-homed or have dual paths.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
