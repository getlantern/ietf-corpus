document: rfc-4035
kind: registry
summary: This document restates the meaning of the CD (Checking Disabled) and AD (Authentic Data) bits in the DNS message header, originally reserved by RFC 2535 with the AD bit redefined by RFC 3655. No new DNS message header bits are defined in this document. The DNSSEC OK (DO) bit use, introduced by RFC 2671 and reserved by RFC 3225, is also restated without alteration.
section: "6"
topics:
