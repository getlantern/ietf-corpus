document: rfc-4704
kind: normative-requirement
summary: If a client is responsible for updating its AAAA RR and releases an address, it SHOULD delete the AAAA RR before sending a RELEASE message. If unable to renew lifetimes, the client SHOULD attempt to delete the AAAA RR before the lifetime expires.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
