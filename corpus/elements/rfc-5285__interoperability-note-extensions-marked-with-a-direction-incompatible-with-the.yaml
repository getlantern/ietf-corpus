document: rfc-5285
kind: interoperability-note
summary: Extensions marked with a direction incompatible with the stream direction are an error (e.g., a sendonly extension attribute on a recvonly stream). An answerer that does not understand or does not wish to use an offered extension SHOULD remove it from the SDP answer rather than retaining it.
section: "6"
topics:
