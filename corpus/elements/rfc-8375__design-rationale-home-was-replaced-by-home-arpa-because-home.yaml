document: rfc-8375
kind: design-rationale
summary: '''.home'' was replaced by ''home.arpa.'' because ''.home'' queries frequently leaked to root name servers and conflicted with existing uses. Using ''home.arpa.'' leverages the existing ''.arpa.'' allocation process (RFC 3172) and enables the necessary insecure delegation that ''.home'' could not obtain.'
section: "1"
