document: rfc-2298
kind: interoperability-note
summary: The MDN protocol supports gatewaying between Internet Mail and foreign systems (e.g., X.400). Foreign-originated MDNs must include the MDN-Gateway field; gateways should map foreign notification elements to MDN fields and may use extension fields (e.g., X400-*) to tunnel foreign protocol elements.
section: "8"
topics:
