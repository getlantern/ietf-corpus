document: rfc-7524
kind: normative-requirement
summary: To constrain distribution of a Leaf A-D route, the originating PE constructs an IP-based Route Target Extended Community with the upstream node's IP address in the Global Administrator field and Local Administrator set to 0, and adds this to the Leaf A-D route before advertising it to the upstream node.
section: 6.2.3
rfc2119_level: MUST
topics:
    - bgp
    - mpls
