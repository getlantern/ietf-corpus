document: rfc-7030
kind: normative-requirement
summary: For /simplereenroll, the request Subject field and SubjectAltName extension MUST be identical to the corresponding fields in the certificate being renewed or rekeyed. Name changes are indicated using the ChangeSubjectName attribute from RFC 6402.
section: 4.2.2
rfc2119_level: MUST
