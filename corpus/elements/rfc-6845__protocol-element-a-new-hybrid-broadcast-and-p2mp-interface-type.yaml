document: rfc-6845
kind: protocol-element
summary: A new hybrid-broadcast-and-P2MP interface type is defined for OSPF. Neighbor discovery, maintenance, and database synchronization follow broadcast procedures, but the network is represented as a collection of point-to-point links in router-LSAs as in P2MP mode.
