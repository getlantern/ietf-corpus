document: rfc-2875
kind: security-consideration
summary: 'The Static DH POP algorithm provides integrity but not origination: because the shared secret can be computed by either party (entity or recipient), a rogue recipient could fabricate a valid POP value. The Discrete Logarithm algorithm provides both integrity and origination assurance.'
