document: rfc-3275
kind: security-consideration
summary: Only what is signed is secure. When transforms are applied, the signer signs the transformed (not native) document. Verifiers must understand and validate the transforms; content excluded by XPath transforms can change without invalidating the signature, which may create security gaps if the excluded content is security-relevant.
section: 8.1.1
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
