document: rfc-5190
kind: protocol-element
summary: The midcomConfigFirewallTable configures how MIDCOM-MIB policy rules are mapped to firewall rules per IP interface, providing midcomConfigFirewallGroupId (the firewall rule group name) and midcomConfigFirewallPriority (the priority). All MIDCOM policy rules at a given interface share the same priority in the firewall implementation.
section: 5.2.2
