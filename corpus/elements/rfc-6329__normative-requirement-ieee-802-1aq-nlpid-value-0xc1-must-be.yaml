document: rfc-6329
kind: normative-requirement
summary: IEEE 802.1aq NLPID value 0xC1 MUST be included in the IS-IS IIH PDU Protocols Supported TLV (type 129) to indicate ability to run 802.1aq. 802.1aq frames MUST only flow on adjacencies that advertise this NLPID in both directions of IIH PDUs.
section: "13"
rfc2119_level: MUST
topics:
    - routing
