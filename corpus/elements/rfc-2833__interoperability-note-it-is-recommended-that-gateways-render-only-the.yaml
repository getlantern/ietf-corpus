document: rfc-2833
kind: interoperability-note
summary: It is RECOMMENDED that gateways render only the encoded tone and discard concurrent audio, because compression artifacts may introduce spurious tones. However, overlap between encoded tone and audio periods must be tolerated at onset.
section: "3.2"
rfc2119_level: RECOMMENDED
