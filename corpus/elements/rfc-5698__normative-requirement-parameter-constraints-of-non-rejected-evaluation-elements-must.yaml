document: rfc-5698
kind: normative-requirement
summary: 'Parameter constraints of non-rejected Evaluation elements MUST be evaluated: confirm the parameter was provided as input, check Min/Max bounds, and discard an Evaluation element if any constraint is not met or is unrecognized. If all Evaluation elements are rejected, the algorithm is not suitable.'
section: "6.4"
rfc2119_level: MUST
