document: rfc-7075
kind: design-rationale
summary: Support for realm-based redirection is indicated implicitly through application support discovered during the capabilities exchange phase. This avoids the need for a separate negotiation mechanism and ties the capability to applications that explicitly incorporate it by normative reference.
