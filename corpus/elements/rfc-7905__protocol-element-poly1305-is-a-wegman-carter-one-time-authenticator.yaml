document: rfc-7905
kind: protocol-element
summary: Poly1305 is a Wegman-Carter one-time authenticator that takes a 256-bit one-time key and a message and produces a 16-byte authentication tag. It is used together with ChaCha20 as the AEAD_CHACHA20_POLY1305 construction per RFC 7539.
section: "1"
