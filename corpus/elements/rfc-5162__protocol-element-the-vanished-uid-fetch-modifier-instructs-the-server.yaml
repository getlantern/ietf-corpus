document: rfc-5162
kind: protocol-element
summary: The VANISHED UID FETCH modifier instructs the server to report messages from the UID set parameter that have been expunged and whose associated mod-sequence is larger than the specified mod-sequence. It MUST only be specified together with the CHANGEDSINCE UID FETCH modifier and is NOT allowed with a plain FETCH command.
section: "3.2"
topics:
