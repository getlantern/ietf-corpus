summary: 'Five IANA-administered namespaces are defined: LSP Encoding Type (8 bits, values 1-255, values 1-11 defined here), Switching Type (8 bits, values 1-255, values 1-4/100/150/200 defined here), G-PID (16 bits, values 0-1500, values 0-46 defined here), Action (8 bits, values 0-255, values 0-3 defined here), and Interface_ID Type (16 bits, values 1-65535, values 1-5 defined here). All future assignments require IETF Consensus or a Specification.'
