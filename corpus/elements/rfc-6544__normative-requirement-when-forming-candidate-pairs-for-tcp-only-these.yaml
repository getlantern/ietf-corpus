document: rfc-6544
kind: normative-requirement
summary: 'When forming candidate pairs for TCP, only these pairings are valid: tcp-so with tcp-so, tcp-active with tcp-passive, and tcp-passive with tcp-active. When pruning the check list, the agent MUST remove any pair for which the local candidate is a passive TCP candidate.'
section: "6.2"
rfc2119_level: MUST
topics:
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
