document: rfc-5263
kind: normative-requirement
summary: The PA MUST NOT send a new NOTIFY containing a partial notification for the same Request-URI until it has received a final response from the watcher for the previous NOTIFY or the previous NOTIFY has timed out.
section: "4.4"
rfc2119_level: MUST NOT
