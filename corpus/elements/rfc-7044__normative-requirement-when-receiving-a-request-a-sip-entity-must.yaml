document: rfc-7044
kind: normative-requirement
summary: When receiving a request, a SIP entity MUST keep a copy (cache) of all hi-entries from the incoming request in the order received. If the Request-URI does not match the last cached hi-targeted-to-uri, the entity MUST add an hi-entry on behalf of the previous hop before proceeding.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
