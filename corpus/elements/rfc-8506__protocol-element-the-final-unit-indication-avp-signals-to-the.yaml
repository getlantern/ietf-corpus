document: rfc-8506
kind: protocol-element
summary: The Final-Unit-Indication AVP signals to the credit-control client that the granted units are the final ones; it carries a Final-Unit-Action AVP (TERMINATE, REDIRECT, or RESTRICT_ACCESS) defining what to do when the final units are consumed.
