document: rfc-8270
kind: design-rationale
summary: The LOGJAM research demonstrated that 768-bit DH groups can be broken and extrapolated the attack to 1024-bit groups, showing that state-sponsored actors and well-resourced organizations can break 1024-bit DH. This motivated raising the minimum from 1024 to 2048 bits.
