document: rfc-6015
kind: design-rationale
summary: Source packets are left unmodified to provide backward compatibility for non-FEC-capable receivers. In multicast sessions this allows FEC-capable and non-FEC-capable receivers to share the same source stream without requiring separate multicast groups.
section: "4.1"
topics:
