document: rfc-2227
kind: privacy-consideration
summary: 'The Meter design reveals no more information about individual users than HTTP/1.1''s ''Cache-control: s-maxage=0'' already would. It may actually help conceal organizational structure on the outbound side of a proxy. The specification is explicitly neutral with respect to privacy: it neither improves nor worsens user privacy relative to existing HTTP/1.1 mechanisms.'
section: "10"
topics:
