document: rfc-8149
kind: normative-requirement
summary: Upon receiving a PathErr with Notify error code and 'Preferable P2MP-TE Tree Exists' sub-code, the ingress node SHOULD trigger reoptimization of the LSP using the Make-Before-Break (MBB) method with a different LSP-ID.
section: "4.1"
rfc2119_level: SHOULD
topics:
