document: rfc-1541
kind: normative-requirement
summary: DHCP messages broadcast by a client prior to obtaining an IP address MUST have the source address field in the IP header set to 0. DHCP uses UDP port 67 (server) and port 68 (client).
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - udp
