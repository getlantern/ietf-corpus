document: rfc-5162
kind: protocol-element
summary: 'The VANISHED response reports that specified UIDs have been permanently removed from the mailbox. It can return information about multiple messages and returns UIDs instead of message numbers. It has two forms: one with the EARLIER tag (caused by UID FETCH VANISHED or SELECT/EXAMINE QRESYNC) and one without (caused by EXPUNGE/UID EXPUNGE or expunges in other connections).'
section: "3.6"
topics:
    - email
