document: rfc-8551
kind: wire-format
summary: 'The application/pkcs7-mime media type carries binary CMS objects, typically base64-encoded for SMTP transport. Sending agents SHOULD include the optional ''name'' Content-Type parameter and Content-Disposition ''filename'' with extensions: .p7m (SignedData/EnvelopedData/AuthEnvelopedData), .p7c (certs-only), .p7z (CompressedData), .p7s (signature).'
section: "3.2"
topics:
