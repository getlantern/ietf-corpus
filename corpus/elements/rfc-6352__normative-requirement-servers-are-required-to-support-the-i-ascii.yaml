document: rfc-6352
kind: normative-requirement
summary: Servers are REQUIRED to support the 'i;ascii-casemap' and 'i;unicode-casemap' collations for text matching in reports. In the absence of a client-specified collation, the server MUST default to 'i;unicode-casemap'. An unsupported collation MUST result in a CARDDAV:supported-collation precondition error.
section: "8.3"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
