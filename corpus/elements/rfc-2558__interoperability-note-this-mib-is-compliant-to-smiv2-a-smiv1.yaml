document: rfc-2558
kind: interoperability-note
summary: This MIB is compliant to SMIv2. A SMIv1-conformant MIB can be produced via translation, but some information will be lost (e.g., Counter64 objects cannot be translated) and machine-readable SMIv2 semantics become textual descriptions in SMIv1. The translated MIB must be semantically equivalent where translation is possible.
