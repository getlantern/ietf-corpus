document: rfc-8845
kind: protocol-element
summary: A Simultaneous Transmission Set is a set of Media Captures that a Provider can transmit simultaneously. Sets are Media-type-specific, apply across all Capture Scenes in an Advertisement, and constrain which Captures a Consumer may request together. An MCU Provider may advertise multiple mutually exclusive sets when a device (e.g., a zoom camera) cannot be used in two modes at once.
section: "8"
topics:
