document: rfc-5042
kind: normative-requirement
summary: An RNIC implementation MUST ensure that a Remote Peer is not able to access memory outside of the buffer specified when the STag was enabled for remote access, applying byte-granularity base-and-bounds checks on every incoming DDP Tagged Message.
section: 6.2.1
rfc2119_level: MUST
topics:
    - security
