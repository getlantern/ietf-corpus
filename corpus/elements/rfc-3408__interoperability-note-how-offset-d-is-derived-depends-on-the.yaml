document: rfc-3408
kind: interoperability-note
summary: 'How Offset_D is derived depends on the implementation of this profile over a specific link technology and must be specified in implementation documents. Two example approaches are given: counting non-context-updating packets and packet loss indications, or using link timing when a linear mapping between RTP SN and link timing is maintained.'
