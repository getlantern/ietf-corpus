document: rfc-9466
kind: wire-format
summary: The Simple PackedAssert message (P=1, A=0) header contains a 1-byte Zero field followed by 3 Reserved bytes, then a sequence of M Assert Records identical in format to RFC 7761 Assert message bodies. M is derived from the packet length.
