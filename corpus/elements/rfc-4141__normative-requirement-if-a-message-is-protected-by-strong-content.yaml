document: rfc-4141
kind: normative-requirement
summary: If a message is protected by strong content authentication or privacy techniques, an intermediary that converts content MUST ensure the results are similarly protected; otherwise it MUST NOT perform conversion.
section: "3"
rfc2119_level: MUST
topics:
