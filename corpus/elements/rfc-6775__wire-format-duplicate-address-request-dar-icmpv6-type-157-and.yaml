document: rfc-6775
kind: wire-format
summary: 'Duplicate Address Request (DAR, ICMPv6 type 157) and Duplicate Address Confirmation (DAC, ICMPv6 type 158) share a format: 8-bit Status (meaningful only in DAC), 16-bit Registration Lifetime, 64-bit EUI-64, and 128-bit Registered Address. Hop Limit is set to MULTIHOP_HOPLIMIT and MUST be ignored on receipt.'
section: "4.4"
topics:
