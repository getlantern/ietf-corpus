summary: 'The lmpTeLinkOperStatus object defines five TE link states: up(1), down(2), testing(3) — link verification in progress, init(4), degraded(5). The degraded state indicates no active control channel exists between the TE link endpoints but at least one data-bearing link remains allocated.'
