document: rfc-2835
kind: wire-format
summary: The HIPPI-6400 MAC header consists of D_ULA (48-bit destination ULA), S_ULA (48-bit source ULA), and M_len (32-bit, set to IEEE 802 packet length plus 8 bytes for LLC/SNAP). Total header is 16 bytes; packet length must be a multiple of 32 bytes.
