document: rfc-9429
kind: interoperability-note
summary: JSEP implementations must accept offers bearing legacy profile strings (RTP/AVP, RTP/AVPF, RTP/SAVP, RTP/SAVPF, and the TCP/DTLS and UDP/TLS SAVP/SAVPF variants) because some endpoints generate non-standard strings while still intending DTLS-SRTP. Generated answers must exactly match the offered profile.
section: 5.1.2
topics:
    - webrtc
    - realtime
