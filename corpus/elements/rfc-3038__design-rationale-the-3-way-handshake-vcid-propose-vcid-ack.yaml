document: rfc-3038
kind: design-rationale
summary: The 3-way handshake (VCID PROPOSE → VCID ACK → LDP REQUEST) is required because the transmission of the VCID PROPOSE message over the new VC is unreliable. The LDP REQUEST from node A serves as confirmation that the ACK was received correctly.
