summary: The filehandle type nfs_fh4 is encoded as variable-length opaque with a maximum size of NFS4_FHSIZE=128 bytes. The verifier type verifier4 is a fixed 8-byte opaque (NFS4_VERIFIER_SIZE=8). The sessionid4 is a fixed 16-byte opaque (NFS4_SESSIONID_SIZE=16).
