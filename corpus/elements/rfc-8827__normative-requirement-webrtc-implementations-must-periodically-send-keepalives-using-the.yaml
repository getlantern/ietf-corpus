document: rfc-8827
kind: normative-requirement
summary: WebRTC implementations MUST periodically send keepalives using the consent freshness mechanism specified in RFC 7675. If a keepalive fails and no new ICE channels can be established, then the session is terminated.
section: "4.4"
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
