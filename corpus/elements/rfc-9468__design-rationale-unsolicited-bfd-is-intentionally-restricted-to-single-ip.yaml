document: rfc-9468
kind: design-rationale
summary: Unsolicited BFD is intentionally restricted to single IP hops (RFC 5881) and not applied to multihop paths (RFC 5883) due to security risks associated with accepting BFD sessions from arbitrary remote systems across multiple hops.
