document: rfc-3479
kind: design-rationale
summary: The 'Temporary Shutdown' status code (E-bit=0) was introduced as an alternative to 'Shutdown' (E-bit=1) so that a shutting-down LSR can inform its peer that it intends to preserve FT Label state and return to service before the Reconnection Timer expires, enabling graceful software upgrades without destroying LSP state.
section: "8.1"
topics:
    - mpls
    - routing
