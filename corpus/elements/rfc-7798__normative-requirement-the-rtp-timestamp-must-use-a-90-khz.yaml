document: rfc-7798
kind: normative-requirement
summary: The RTP timestamp MUST use a 90 kHz clock rate. For NAL units with no timing properties of their own (e.g., parameter sets and SEI NAL units), the RTP timestamp MUST be set to the RTP timestamp of the coded picture of the access unit in which the NAL unit is included.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
