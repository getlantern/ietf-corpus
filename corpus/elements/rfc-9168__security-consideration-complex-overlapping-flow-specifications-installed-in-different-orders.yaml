document: rfc-9168
kind: security-consideration
summary: Complex overlapping Flow Specifications installed in different orders can lead to unexpected forwarding behavior that may be engineered by an attacker to create gaps in traffic monitoring or bypass mitigations. Implementers and operators SHOULD pay careful attention to manageability considerations.
