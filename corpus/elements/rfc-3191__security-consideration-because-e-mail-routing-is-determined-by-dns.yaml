document: rfc-3191
kind: security-consideration
summary: Because e-mail routing is determined by DNS data, a successful attack on DNS could cause messages to be diverted via a compromised MTA or gateway. Attack vectors include compromise of a DNS server, counterfeit DNS responses, and incorrect additional information in unrelated query responses.
section: "6"
topics:
    - email
    - dns
    - security
