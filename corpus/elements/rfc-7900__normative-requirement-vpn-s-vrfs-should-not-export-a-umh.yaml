document: rfc-7900
kind: normative-requirement
summary: VPN-S VRFs SHOULD NOT export a UMH-eligible route whose prefix matches both extranet C-sources and non-extranet C-sources in the context of a receiver VRF; failure may result in a VPN security violation.
