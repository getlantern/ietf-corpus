document: rfc-9068
kind: privacy-consideration
summary: The mandatory 'sub' claim enables resource servers to correlate requests. To prevent cross-resource-server tracking, authorization servers SHOULD assign distinct 'sub' values per resource server. To prevent within-resource correlation, distinct 'sub' and 'jti' values per token issuance may be required.
section: "6"
topics:
    - oauth
    - jose
    - privacy
