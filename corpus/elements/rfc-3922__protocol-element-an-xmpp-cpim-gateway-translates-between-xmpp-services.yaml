document: rfc-3922
kind: protocol-element
summary: An XMPP-CPIM gateway translates between XMPP services and non-XMPP services using CPIM specifications as common formats. The gateway is a dedicated translator, not an intermediate hop, and the mapping applies only to unencrypted, unsigned instant messages and presence information.
section: "1.1"
