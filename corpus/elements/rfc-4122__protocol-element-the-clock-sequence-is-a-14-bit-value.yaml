document: rfc-4122
kind: protocol-element
summary: The clock sequence is a 14-bit value stored across clock_seq_hi_and_reserved (upper 6 bits) and clock_seq_low (lower 8 bits). For version 1 it guards against duplicate UUIDs when the system clock goes backwards or the node ID changes; for versions 3/5 it is derived from a name hash; for version 4 it is randomly generated.
section: 4.1.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
