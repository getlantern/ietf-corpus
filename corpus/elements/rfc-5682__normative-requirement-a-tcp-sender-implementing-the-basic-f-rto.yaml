document: rfc-5682
kind: normative-requirement
summary: A TCP sender implementing the basic F-RTO algorithm MUST take the specified steps after the retransmission timer expires. If the retransmission timer expires again during F-RTO execution, the sender MUST restart the algorithm from step 1.
section: "2.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
