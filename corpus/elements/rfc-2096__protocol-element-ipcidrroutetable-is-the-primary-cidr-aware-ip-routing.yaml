document: rfc-2096
kind: protocol-element
summary: ipCidrRouteTable is the primary CIDR-aware IP routing table. It obsoletes and replaces both the RFC 1213 ipRouteTable and the ipForwardTable from RFC 1354, adding support for CIDR routes with identical network numbers but differing masks.
