document: rfc-8791
kind: protocol-element
summary: The 'structure' extension statement defines a named YANG data structure representing conceptual data independent of protocol context or encoding format. It is only valid as a top-level statement (substatement to 'module' or 'submodule') and its argument is the name of the data structure.
