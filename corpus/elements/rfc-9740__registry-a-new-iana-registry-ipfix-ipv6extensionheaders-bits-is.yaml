document: rfc-9740
kind: registry
summary: A new IANA registry 'IPFIX ipv6ExtensionHeaders Bits' is created. It maps bit positions (0–255) to IPv6 extension header types and is automatically updated whenever a new IPv6 extension header is assigned in the 'IPv6 Extension Header Types' registry. Initial values include bits 0–13 for known EH types; bits 14–255 are unassigned.
section: "8.4"
topics:
