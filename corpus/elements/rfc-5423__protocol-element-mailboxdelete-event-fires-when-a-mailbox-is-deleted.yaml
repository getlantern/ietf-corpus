document: rfc-5423
kind: protocol-element
summary: MailboxDelete event fires when a mailbox is deleted or becomes inaccessible via ACL change. Per IMAP4rev1 semantics the mailbox becomes \NOSELECT while child mailboxes and the hierarchy remain intact; only the named mailbox is affected.
section: "4.4"
topics:
