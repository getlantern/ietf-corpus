document: rfc-9486
kind: normative-requirement
summary: Implementations of IOAM MUST ensure that the addition of IOAM Data-Fields does not alter the way routers forward packets or the forwarding decisions they make, including ECMP behavior, which must be identical for packets with and without IOAM Data-Fields.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
