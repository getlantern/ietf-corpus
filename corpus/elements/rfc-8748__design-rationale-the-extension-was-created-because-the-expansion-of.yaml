document: rfc-8748
kind: design-rationale
summary: The extension was created because the expansion of the DNS namespace and novel business models made it impractical for EPP clients to obtain fee information out of band. A standardized protocol mechanism is needed for querying fees associated with billable transactions directly through EPP.
