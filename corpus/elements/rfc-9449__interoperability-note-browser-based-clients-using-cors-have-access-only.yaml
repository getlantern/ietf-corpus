document: rfc-9449
kind: interoperability-note
summary: Browser-based clients using CORS have access only to CORS-safelisted response headers by default. Servers must include WWW-Authenticate and DPoP-Nonce in the Access-Control-Expose-Headers response header for browser clients to obtain these values.
section: "7.1"
topics:
    - oauth
    - http
    - security
