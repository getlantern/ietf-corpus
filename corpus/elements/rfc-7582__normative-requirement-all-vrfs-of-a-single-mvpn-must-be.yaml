document: rfc-7582
kind: normative-requirement
summary: All VRFs of a single MVPN MUST be provisioned to use the same PMSI instantiation method (Flat Partitioned, Hierarchical Partitioned, or Unpartitioned) for that MVPN's I-PMSI. Similarly, all VRFs MUST use the same method for S-PMSIs instantiated by bidirectional P-tunnels.
section: 1.2.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
