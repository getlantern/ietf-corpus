document: rfc-3263
kind: security-consideration
summary: Proxies performing NAPTR queries could deliberately ignore SIPS entries to downgrade security for all users relying on them. Unlike DNS tampering (which requires wire interception), proxy compromise requires a break-in and is considered a less likely but harder-to-prevent threat.
section: "7"
topics:
    - sip
    - dns
    - security
