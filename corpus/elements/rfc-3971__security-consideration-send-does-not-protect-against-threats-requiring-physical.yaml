document: rfc-3971
kind: security-consideration
summary: SEND does not protect against threats requiring physical access to the link or involving a compromised router. It is specifically designed for environments where physical link security is not assured (e.g., wireless), and threats from within the link (e.g., a malicious router that passes certification but misuses its role) are outside SEND's scope.
section: "9.1"
topics:
    - security
    - ip
