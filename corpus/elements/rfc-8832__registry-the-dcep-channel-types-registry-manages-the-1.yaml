document: rfc-8832
kind: registry
summary: The DCEP 'Channel Types' registry manages the 1-byte Channel Type field in DATA_CHANNEL_OPEN. Initial entries cover six channel types (0x00–0x02 and 0x80–0x82), with 0x7f and 0xff reserved for extensibility. New Channel Types supporting ordered/unordered delivery MUST use the high-order bit to indicate unordered.
section: 8.2.2
rfc2119_level: MUST
topics:
    - webrtc
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
