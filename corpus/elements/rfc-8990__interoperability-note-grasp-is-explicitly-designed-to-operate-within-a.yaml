document: rfc-8990
kind: interoperability-note
summary: GRASP is explicitly designed to operate within a single addressing realm; its discovery and flooding mechanisms do not support operations across address translators or upper-layer proxies. IPv4 locator options MUST NOT be used within Divert options if internal NAT is in use.
section: "2.2"
topics:
    - nat
