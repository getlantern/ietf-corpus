document: rfc-5046
kind: protocol-element
summary: The iSER Hello/HelloReply exchange is the mandatory first exchange after a connection enters iSER-assisted mode. The Hello Message declares the initiator's iSER-IRD; the HelloReply declares the target's iSER-ORD. A negotiation failure occurs if iSER-IRD > 0 but iSER-ORD = 0, or if supported protocol versions do not overlap.
section: 5.1.3
extracted_by: claude-sonnet-4-6
