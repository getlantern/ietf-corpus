document: rfc-7724
kind: normative-requirement
summary: During the catch-up phase, the requestor MUST NOT update the saved base-time from incoming messages; if the connection is lost before CatchUpComplete, the requestor MUST use the base-time from the previous connection in its subsequent DHCPACTIVELEASEQUERY request.
section: 7.4.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
