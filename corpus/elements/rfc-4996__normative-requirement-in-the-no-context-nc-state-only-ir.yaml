document: rfc-4996
kind: normative-requirement
summary: In the No Context (NC) state, only IR and IR-CR packets carrying static field information may be decompressed; all other packet types MUST NOT be decompressed and MUST NOT be delivered to upper layers. Once a packet is successfully validated, the decompressor MUST transit to the FC state.
section: 5.3.1.3
rfc2119_level: MUST NOT
topics:
    - tcp
