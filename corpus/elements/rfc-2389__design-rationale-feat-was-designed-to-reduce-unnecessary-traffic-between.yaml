document: rfc-2389
kind: design-rationale
summary: FEAT was designed to reduce unnecessary traffic between user-PI and server-PI as more extensions are introduced. Without FEAT, a client would have to probe each extension in turn, which may be wasteful and may have undesired side effects from issuing commands merely to test support.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
