document: rfc-3646
kind: protocol-element
summary: The DNS Recursive Name Server option (OPTION_DNS_SERVERS, code 23) carries a list of one or more IPv6 addresses of DNS recursive name servers. The option-len field must be a multiple of 16, reflecting the 16-byte size of each IPv6 address.
