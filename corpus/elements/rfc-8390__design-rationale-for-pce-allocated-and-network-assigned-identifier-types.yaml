document: rfc-8390
kind: design-rationale
summary: For PCE-Allocated and Network-Assigned identifier types, transit nodes in a domain and the domain egress node SHOULD NOT process the signaled diversity information unless performing path computation. Only the domain ingress node (which consults a PCE or performs local computation) needs to process the constraint, keeping per-hop processing minimal.
section: "2.3"
topics:
    - mpls
    - routing
