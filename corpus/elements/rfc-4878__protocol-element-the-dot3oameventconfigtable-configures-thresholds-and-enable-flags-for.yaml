document: rfc-4878
kind: protocol-element
summary: 'The dot3OamEventConfigTable configures thresholds and enable flags for the four standard threshold-crossing link events: Errored Symbol Period, Errored Frame Period, Errored Frame, and Errored Frame Seconds Summary. It also enables Dying Gasp and Critical Event signaling via OAMPDU flags.'
