document: rfc-4210
kind: wire-format
summary: PBMParameter for shared-secret MAC protection encodes salt (OCTET STRING), owf (AlgorithmIdentifier for the one-way function), iterationCount (INTEGER), and mac (AlgorithmIdentifier). The salted secret is passed through the OWF iterationCount times to derive BASEKEY; key expansion uses OWF("N" || BASEKEY) if the MAC requires more than H bits.
section: 5.1.3.1
topics:
    - pkix
    - crypto
    - security
