document: rfc-9922
kind: protocol-element
summary: The 'duration' typedef encodes time durations as a string matching the pattern for weeks (PnW), days (PnD), and hours:minutes:seconds (THH:MM:SS). It explicitly does not support 'Y' (years) or 'M' (months) designators. Negative durations are permitted for alarm triggers before an associated time.
section: "6"
