document: rfc-4515
kind: security-consideration
summary: The string representation of LDAP search filters itself has no known security implications, but LDAP search filters do, as they are interpreted by LDAP servers to select entries from which data is retrieved. LDAP servers should protect maintained data from unauthorized access. Implementers are referred to RFC 4511 and RFC 4513 security considerations.
section: "5"
topics:
    - ldap
    - security
