document: rfc-5082
kind: interoperability-note
summary: For Uniform Model MPLS LSPs of more than one hop, the TTL at ingress (iTTL) will be less than 255, causing GTSM checks to fail. GTSM is only applicable over Pipe Model LSPs when tunneled over MPLS.
section: 5.2.2
topics:
    - mpls
    - security
    - ip
