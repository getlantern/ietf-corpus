document: rfc-2364
kind: interoperability-note
summary: Frame Relay/ATM FRF.8 interworking units are exempted from the requirement to support VC-multiplexed PPP, allowing them to remain compliant with FRF.8 when the PPP over AAL5 endpoint interoperates with an RFC 1973 endpoint.
