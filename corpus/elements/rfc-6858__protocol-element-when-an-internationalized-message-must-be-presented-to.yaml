document: rfc-6858
kind: protocol-element
summary: When an internationalized message must be presented to a conventional client, the server synthesizes a 'surrogate message' — a conventional message containing most of the original information. The surrogate is intended to convey important information to the user, not to signal special handling to client software.
section: "1"
topics:
