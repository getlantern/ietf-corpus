document: rfc-1583
kind: design-rationale
summary: OSPF utilizes IP multicast (AllSPFRouters) for Hello and flooding packets on broadcast networks, building on prior IS-IS work, to reduce bandwidth consumption compared to sending individual unicasts to each neighbor or flooding to the IP broadcast address.
section: "1.3"
topics:
    - routing
    - multicast
