document: rfc-6223
kind: normative-requirement
summary: When a SIP entity is willing to receive keep-alives, it MUST add a parameter value to the "keep" parameter before sending or forwarding the response. For INVITE, it MUST add a value in at least one reliable response, MUST NOT add different values across multiple responses to the same request, and SHOULD indicate willingness as soon as possible.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
