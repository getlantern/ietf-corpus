document: rfc-5228
kind: normative-requirement
summary: Implementations SHOULD convert header field text from all charsets to Unicode (UTF-8) for comparisons, and MUST be capable of converting US-ASCII, ISO-8859-1, the US-ASCII subset of ISO-8859-*, and UTF-8. If conversion fails, text MAY be treated as plain US-ASCII.
section: 2.7.2
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
