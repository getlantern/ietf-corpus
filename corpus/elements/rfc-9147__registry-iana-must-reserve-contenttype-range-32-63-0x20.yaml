document: rfc-9147
kind: registry
summary: IANA must reserve ContentType range 32–63 (0x20–0x3F) to avoid demultiplexing conflicts with DTLS 1.3 encrypted records. Content type 26 is allocated for the new ACK message. Handshake message types 9 (request_connection_id) and 10 (new_connection_id) are registered for CID lifecycle management.
