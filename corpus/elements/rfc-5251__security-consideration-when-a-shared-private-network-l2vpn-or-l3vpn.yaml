document: rfc-5251
kind: security-consideration
summary: When a shared private network (L2VPN or L3VPN) provides control-plane connectivity between a PE and multiple CEs, it is RECOMMENDED that each L1VPN customer have its own such private network, and that the security mechanisms of that private network SHOULD be used to protect CE-to-SP control-plane communications.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - vpn
    - security
    - mpls
