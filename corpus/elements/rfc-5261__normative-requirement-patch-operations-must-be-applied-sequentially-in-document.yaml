document: rfc-5261
kind: normative-requirement
summary: Patch operations MUST be applied sequentially in document order. After each patch is applied, the patched document becomes the new target for the next patch. If any patch operation fails, it is an error condition and further processing is not sensible.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
