document: rfc-8691
kind: security-consideration
summary: 802.11-OCB provides no cryptographic protection; an attacker within radio range can sniff or inject traffic, and a directional antenna allows attacks without close physical proximity. The link is less protected than wired or BSS-mode 802.11 links.
