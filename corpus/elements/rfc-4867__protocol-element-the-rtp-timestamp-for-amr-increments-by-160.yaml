document: rfc-4867
kind: protocol-element
summary: The RTP timestamp for AMR increments by 160 samples (8 kHz, 20 ms frame) per frame-block, and by 320 samples (16 kHz, 20 ms frame) per frame-block for AMR-WB. The timestamp corresponds to the first sample of the first frame-block in the packet.
