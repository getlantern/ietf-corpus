document: rfc-9795
kind: normative-requirement
summary: The "nam" key MUST be included exactly once in every "rcd" claim value JSON object. Its syntax MUST follow the display-name ABNF from RFC 3261, and if no display name exists, it MUST be an empty string.
section: 5.1.1
rfc2119_level: MUST
