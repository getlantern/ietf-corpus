document: rfc-9716
kind: security-consideration
summary: It is RECOMMENDED that operators deploy security mechanisms such as MACsec (IEEE 802.1AE) on inter-domain links or security-vulnerable links to prevent spoofing attacks. Appropriate filter policies SHOULD be applied at edges, and devices MUST have mechanisms to prevent denial-of-service attacks.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
