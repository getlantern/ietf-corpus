document: rfc-7045
kind: protocol-element
summary: An IPv6 extension header is any header that follows the initial 40 bytes of the packet and precedes the upper-layer header (which might be a transport header, an ICMPv6 header, or a notional 'No Next Header'). The Hop-by-Hop Options header, if present, must be first.
