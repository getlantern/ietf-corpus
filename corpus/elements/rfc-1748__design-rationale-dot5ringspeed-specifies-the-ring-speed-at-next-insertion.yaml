document: rfc-1748
kind: design-rationale
summary: dot5RingSpeed specifies the ring speed at next insertion rather than the current speed (given by ifSpeed), because a management station may want to pre-configure the speed for when the station next joins the ring. When set to unknown(1), the interface adopts the ring's actual speed at insertion time.
section: Appendix A
topics:
