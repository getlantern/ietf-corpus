document: rfc-6630
kind: normative-requirement
summary: HMAC-SHA256-128 is REQUIRED to implement as the cryptosuite and SHOULD be enabled in the default configuration. If the chosen algorithm is unacceptable, the server returns EAP-Finish/Re-auth with a Failure indication.
section: "5.2"
rfc2119_level: REQUIRED
topics:
