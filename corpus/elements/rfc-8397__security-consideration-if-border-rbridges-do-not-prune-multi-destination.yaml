document: rfc-8397
kind: security-consideration
summary: If border RBridges do not prune multi-destination distribution tree traffic in Data Labels configured as area-local, traffic that should be contained within an area may be delivered to end stations in other areas, violating security constraints that restrict Data Label traffic to a single area.
section: "6"
topics:
    - security
    - routing
