document: rfc-1939
kind: protocol-element
summary: The optional USER name and PASS string commands provide plaintext password authentication in the AUTHORIZATION state. USER must be issued first; if it returns +OK, PASS may be issued immediately after. PASS may treat spaces in its argument as part of the password rather than separators.
section: "7"
topics:
