document: rfc-9645
kind: design-rationale
summary: 'The cipher-suite leaf-list is ''ordered-by user'' so that preference ordering is explicit and deterministic: during the TLS handshake, the first mutually supported cipher suite in the configured list is selected. An empty list leaves acceptable cipher suites implementation-defined.'
section: 2.1.3.1
topics:
    - tls
    - yang
    - crypto
