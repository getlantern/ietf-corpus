document: rfc-7470
kind: normative-requirement
summary: A PCC SHOULD monitor the capabilities of a PCE via discovery mechanisms or negative responses, and SHOULD NOT include vendor information in a PCReq to a PCE believed not to support the information and that will not forward the request to a supporting PCE.
section: "6.6"
rfc2119_level: SHOULD NOT
topics:
    - routing
