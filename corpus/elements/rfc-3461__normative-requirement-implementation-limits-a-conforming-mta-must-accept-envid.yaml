document: rfc-3461
kind: normative-requirement
summary: 'Implementation limits: a conforming MTA MUST accept ENVID of at least 100 chars, NOTIFY of at least 28 chars, ORCPT of at least 500 chars, and RET of at least 8 chars. It MUST accept SMTP command lines of at least 1036 characters.'
section: "5.4"
rfc2119_level: MUST
topics:
    - email
