document: rfc-4590
kind: normative-requirement
summary: The RADIUS server MUST use the User-Name attribute (not Digest-Username) to look up user credentials. The Digest-Username attribute MUST NOT be used for determining appropriate user credentials.
section: "3.13"
rfc2119_level: MUST NOT
