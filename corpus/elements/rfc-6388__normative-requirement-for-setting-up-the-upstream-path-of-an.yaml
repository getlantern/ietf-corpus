document: rfc-6388
kind: normative-requirement
summary: For setting up the upstream path of an MP2MP LSP, ordered mode SHOULD be used. In ordered mode, the upstream path is installed at the leaf node only after the downstream path to the root has completed, ensuring upstream packets can reach the root without being dropped.
section: 3.3.1.3
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
