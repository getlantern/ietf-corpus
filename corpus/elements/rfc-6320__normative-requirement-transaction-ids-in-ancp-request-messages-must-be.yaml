document: rfc-6320
kind: normative-requirement
summary: Transaction IDs in ANCP request messages MUST be set to a value in the range (1, 2^24 - 1), maintained independently for each message type within each ANCP adjacency. They SHOULD be incremented by 1 for each new message of a given type, cycling back to 1 after reaching the maximum.
section: 3.6.1.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
