document: rfc-5112
kind: interoperability-note
summary: The presence-specific static dictionary is designed to coexist with the static SIP/SDP dictionary defined in RFC 3485. SigComp endpoints will initially announce the availability of one or both dictionaries until the other end acknowledges receipt of the announcement.
