document: rfc-7759
kind: security-consideration
summary: Security mechanisms for LSP Ping must already be in place and operational before OAM configuration using these extensions can be achieved securely. Exchange of security parameters (e.g., BFD authentication keys) is outside this document's scope and is assumed to use an off-line mechanism or an established secure key exchange protocol.
