document: rfc-6787
kind: wire-format
summary: An MRCPv2 message consists of a start-line, one or more header fields, an empty CRLF line terminating the headers, and an optional message body. Messages are UTF-8 encoded; lines are terminated by CRLF. The message-length field, which includes the start-line, MUST be the second token of every message to simplify framing and parsing.
section: "5.1"
topics:
    - realtime
