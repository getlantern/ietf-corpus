document: rfc-2752
kind: protocol-element
summary: 'POLICY_ERROR_OBJECT (A-Type=4) carries a 32-bit ErrorValue code and optional OctetString describing why a policy decision point failed to process the AUTH_DATA element. Error values include: ERROR_NO_MORE_INFO (1), UNSUPPORTED_CREDENTIAL_TYPE (2), INSUFFICIENT_PRIVILEGES (3), EXPIRED_CREDENTIAL (4), IDENTITY_CHANGED (5).'
section: 3.3.4
topics:
