document: rfc-6048
kind: interoperability-note
summary: The wildmat argument to LIST SUBSCRIPTIONS is new in RFC 6048. Servers that do not support CAPABILITIES or do not advertise SUBSCRIPTIONS in the LIST capability (i.e., those conforming only to RFC 2980) are unlikely to support the wildmat argument.
section: 2.6.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
