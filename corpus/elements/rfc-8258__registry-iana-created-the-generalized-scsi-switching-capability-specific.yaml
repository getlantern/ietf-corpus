document: rfc-8258
kind: registry
summary: IANA created the 'Generalized SCSI (Switching Capability Specific Information) TLV Types' registry under the 'Generalized Multi-Protocol Label Switching (GMPLS) Signaling Parameters' registry. Value 0 is Reserved; values 1-65535 are Unassigned. New allocations require 'Specification Required' policy and must indicate applicable Switching Type values.
