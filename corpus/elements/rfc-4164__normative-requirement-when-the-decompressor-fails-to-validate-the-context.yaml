document: rfc-4164
kind: normative-requirement
summary: When the decompressor fails to validate the context following decompression of one or more initial IR-CR packets, it MUST invalidate the context and remain in its initial state. The decompressor SHOULD send a STATIC-NACK, particularly when performing strict memory management such as deleting context state when a connection-oriented flow has terminated.
section: 3.4.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
