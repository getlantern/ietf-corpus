document: rfc-4978
kind: interoperability-note
summary: When using the zlib library, windowBits for deflateInit2() must be in the range -8 to -15; other values cause deflateInit2() to use the wrong format. The Z_FULL_FLUSH argument clears the dictionary without requiring any action from the receiving peer.
