document: rfc-7162
kind: protocol-element
summary: 'The VANISHED response reports permanently removed UIDs in two forms: VANISHED (EARLIER), caused by UID FETCH (VANISHED) or SELECT (QRESYNC) and not requiring sequence-number adjustment; and VANISHED without EARLIER, used for real-time expunge notification, which requires the client to decrement message counts. Servers MUST NOT combine the two forms.'
section: 3.2.10
topics:
    - email
