document: rfc-3211
kind: interoperability-note
summary: Implementations may encounter PBKDF2 encoded with an alternative HMAC-SHA1 OID from the IPsec arc (1.3.6.1.5.5.8.1.2) with absent rather than NULL parameters, due to the inability to precisely specify PBKDF2 in 1988 ASN.1.
