document: rfc-9101
kind: protocol-element
summary: A Request Object is a JWT whose Claims Set holds JSON-encoded OAuth 2.0 authorization request parameters. It must be either JWS-signed or JWS-signed then JWE-encrypted, and carries the media type 'application/oauth-authz-req+jwt'.
