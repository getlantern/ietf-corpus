document: rfc-8015
kind: normative-requirement
summary: The Interval Metric flag (I) MUST NOT use values I=00 or I=01. Senders MUST NOT use these values, and if a block is received with I=00 or I=01, the receiver MUST discard the block. Only I=10 (Interval Duration) and I=11 (Cumulative Duration) are valid.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
