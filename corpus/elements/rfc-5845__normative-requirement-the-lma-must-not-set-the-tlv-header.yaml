document: rfc-5845
kind: normative-requirement
summary: The LMA MUST NOT set the TLV-header format (T) flag in the Proxy Binding Acknowledgement unless that flag was set in the Proxy Binding Update received from the MAG, in order to avoid interoperability issues during handoff renegotiation.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
