document: rfc-2837
kind: state-machine
summary: FxPort physical state is controlled by fcFxPortPhysAdminStatus (online/offline/testing) and reflected in fcFxPortPhysOperStatus (online/offline/testing/linkFailure). When admin status is set to online, oper status moves to online if ready to accept Fabric Login, or enters and remains in linkFailure(4) if a fault prevents it from going online.
section: "3"
