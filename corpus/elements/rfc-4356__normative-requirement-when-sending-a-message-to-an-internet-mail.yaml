document: rfc-4356
kind: normative-requirement
summary: When sending a message to an Internet mail system, the MMS Relay/Server MUST convert the MM if required and MUST comply with the requirements of SMTP. The server SHOULD use associated information elements to define control information (header fields and SMTP envelope values).
section: 2.1.1
rfc2119_level: MUST
topics:
    - email
