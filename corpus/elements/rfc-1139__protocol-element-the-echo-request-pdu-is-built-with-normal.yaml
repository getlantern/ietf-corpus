document: rfc-1139
kind: protocol-element
summary: The echo-request PDU is built with normal field values and the target system's NSAP address as the destination. It is switched through the network and, upon reaching the destination, delivered to the echo-request entity after normal input processing. Segmentation rules defined for DT PDUs also apply.
section: "2.1"
topics:
