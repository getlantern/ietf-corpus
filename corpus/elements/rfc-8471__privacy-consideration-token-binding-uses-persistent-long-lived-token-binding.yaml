document: rfc-8471
kind: privacy-consideration
summary: Token Binding uses persistent, long-lived Token Binding IDs that are never transmitted in clear text and can be reset by the user at any time (e.g., when clearing browser cookies). The scope of Token Binding keys MUST NOT be broader than the scope of the tokens to prevent cooperating servers from linking user identities.
section: "8"
topics:
    - privacy
    - tls
