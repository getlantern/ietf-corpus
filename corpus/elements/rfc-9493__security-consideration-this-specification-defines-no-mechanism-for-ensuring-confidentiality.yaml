document: rfc-9493
kind: security-consideration
summary: This specification defines no mechanism for ensuring confidentiality or integrity of a Subject Identifier. Where such properties are required, implementations MUST use mechanisms provided by the containing format (e.g., JWS for SETs or JWTs) or at the transport or application layer (e.g., TLS).
section: "7"
rfc2119_level: MUST
topics:
    - security
    - tls
    - jose
