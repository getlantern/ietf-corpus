document: rfc-2711
kind: interoperability-note
summary: Routers are not required to examine datagrams not addressed to them unless those datagrams include the Router Alert option. Protocols relying on router inspection of transit datagrams must mandate use of this option.
section: "3.0"
topics:
    - ip
    - v6ops
