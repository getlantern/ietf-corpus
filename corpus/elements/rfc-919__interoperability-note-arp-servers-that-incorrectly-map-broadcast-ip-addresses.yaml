document: rfc-919
kind: interoperability-note
summary: ARP servers that incorrectly map broadcast IP addresses to hardware broadcast addresses cause forwarding loops. Networks with heterogeneous hosts that disagree about the broadcast address are especially vulnerable, as non-compliant hosts re-broadcast received datagrams, potentially exponentially amplifying traffic.
section: "7.1"
topics:
    - ip
