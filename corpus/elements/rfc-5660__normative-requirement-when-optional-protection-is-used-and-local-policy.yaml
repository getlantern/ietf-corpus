document: rfc-5660
kind: normative-requirement
summary: When optional protection is used and local policy permits, the SPD MUST be logically updated to add a suitable PROTECT or BYPASS entry for the exact 5-tuple at latch creation time, atomically, and such updates MUST NOT survive system crashes or reboots.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
