document: rfc-5380
kind: security-consideration
summary: Binding updates between the MAP and the mobile node must be authenticated; otherwise any host could send a BU for the mobile node's RCoA and hijack the mobile node's packets. The MAP sets the SA for the RCoA using IKEv2, with the RCoA used as the identity in the IKE CHILD_SA negotiation.
section: "12.1"
topics:
    - mobility
    - security
    - ipsec
    - crypto
