document: rfc-4237
kind: security-consideration
summary: The LDAP directory service provides unauthenticated, public access to directory data and is therefore vulnerable to attacks that redirect queries to a rogue server offering malicious data. RFC 2829 (LDAP Authentication Methods) describes applicable security considerations.
section: "3"
topics:
    - security
    - ldap
