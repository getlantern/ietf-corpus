document: rfc-8342
kind: interoperability-note
summary: Conventional configuration datastores (<running>, <candidate>, <startup>, <intended>) share exactly the same datastore schema, enabling data to be copied between them (e.g., NETCONF <copy-config>). Modules with no configuration data nodes MAY be omitted from the conventional datastore schema.
section: "5.1"
topics:
    - netconf
    - yang
