document: rfc-4398
kind: protocol-element
summary: For purpose-based OpenPGP CERT RR naming, the owner name should be the key fingerprint or Key ID expressed in hexadecimal. Multiple owner names can be used (full fingerprint, partial fingerprint, Key ID), and CNAME can reduce duplication when the same key material is stored under multiple names.
