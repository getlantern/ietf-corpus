document: rfc-6660
kind: security-consideration
summary: PCN-marking is meaningful only within a PCN-domain assumed to be under the control of a single operator or mutually trusting operators. Future inter-domain PCN extensions must address the lack of trust between domains, but that is out of scope for this document.
