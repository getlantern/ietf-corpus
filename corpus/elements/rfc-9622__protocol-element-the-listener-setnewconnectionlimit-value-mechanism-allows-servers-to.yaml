document: rfc-9622
kind: protocol-element
summary: The Listener.SetNewConnectionLimit(value) mechanism allows servers to rate-limit inbound Connection delivery. Each ConnectionReceived event decrements the limit; when it reaches zero, no further Connections are delivered until the limit is raised. Default is Infinite.
section: "7.2"
topics:
    - security
