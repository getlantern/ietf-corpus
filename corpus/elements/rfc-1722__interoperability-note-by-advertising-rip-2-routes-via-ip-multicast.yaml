document: rfc-1722
kind: interoperability-note
summary: By advertising RIP-2 routes via IP multicast rather than broadcast, RIP-2 speakers guarantee that RIP-1 routers are never exposed to routes whose correct interpretation requires knowing the subnet mask. This prevents RIP-1 nodes from misrouting traffic based on incomplete information.
section: "3.4"
topics:
    - routing
