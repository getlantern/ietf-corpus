document: rfc-2651
kind: protocol-element
summary: 'CIP defines two index-passing relationships: a ''polling relationship'' where the polled server notifies the polling server of new indices and the polling server may retrieve them immediately or later; and an ''index pushing'' relationship where a server sends its index unsolicited.'
