document: rfc-5152
kind: protocol-element
summary: Auto-discovery is the process of determining the domain boundary exit point (next-hop ABR or ASBR) based on routing information (IGP, BGP, or policy routing) as the TE LSP is being signaled. Without auto-discovery, the domain exit points must be statically configured or signaled as loose hops in the ERO.
section: "3.1"
topics:
    - routing
    - realtime
    - mpls
