document: rfc-8572
kind: protocol-element
summary: The conveyed information artifact is a CMS structure (RFC 5652) DER-encoded using ASN.1 (ITU-T X.690) that carries either redirect information or onboarding information. It may be unsigned/unencrypted, unsigned/encrypted, signed/unencrypted, or signed/encrypted, with the CMS topmost OID indicating which combination is used.
