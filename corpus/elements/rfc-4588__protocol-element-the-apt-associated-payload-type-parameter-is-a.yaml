document: rfc-4588
kind: protocol-element
summary: The "apt" (associated payload type) parameter is a REQUIRED SDP/MIME parameter that maps a retransmission payload type number to the corresponding original stream payload type. Multiple "apt" parameters MUST be included when the original stream uses multiple payload types.
section: "8.1"
topics:
    - rtp
    - realtime
