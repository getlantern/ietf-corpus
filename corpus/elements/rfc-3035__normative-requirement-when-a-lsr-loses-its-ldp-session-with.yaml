document: rfc-3035
kind: normative-requirement
summary: When a LSR loses its LDP session with another LSR, any binding information learned via that connection MUST be discarded. For bindings created as a result of requests from the peer, the LSR MAY destroy these bindings and deallocate associated labels.
section: "8.2"
rfc2119_level: MUST
topics:
    - mpls
