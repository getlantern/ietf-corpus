document: rfc-4769
kind: design-rationale
summary: Tel URIs may be easier and more efficient to use than SIP URIs and result in somewhat smaller NAPTR records. When adding hundreds of millions of records to DNS, the size difference could have a substantial impact on processing and storage requirements.
section: "5.2"
topics:
