document: rfc-9142
kind: protocol-element
summary: FFC Diffie-Hellman named groups range from group14 (2048-bit, ~112-bit security) through group18 (8192-bit, ~200-bit security). The minimum recommended group size is 2048 bits; group14 paired with SHA2-256 provides 112-bit security matching 3des-cbc.
