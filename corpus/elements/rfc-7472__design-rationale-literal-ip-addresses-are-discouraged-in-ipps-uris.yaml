document: rfc-7472
kind: design-rationale
summary: Literal IP addresses are discouraged in 'ipps' URIs because they are often changed after network device installation (e.g., DHCP reassignment), don't map simply to security domains, are difficult to validate with X.509 certificates, and link-local addresses are not portable.
section: "4.2"
topics:
