document: rfc-8330
kind: normative-requirement
summary: Only one Availability SCSI-TLV for a specific availability level SHOULD be sent. If multiple TLVs are present, the one with the lowest bandwidth value SHALL be processed. TLVs with invalid values (e.g., availability >= 1) MUST be ignored.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
