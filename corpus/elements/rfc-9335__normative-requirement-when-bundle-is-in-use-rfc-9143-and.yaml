document: rfc-9335
kind: normative-requirement
summary: When BUNDLE is in use (RFC 9143) and 'a=cryptex' is present for a media line, it MUST be present for all RTP-based 'm=' sections in the same bundle group, ensuring encrypted MID header extensions can be processed for stream association.
