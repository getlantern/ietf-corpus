document: rfc-4511
kind: design-rationale
summary: The Unbind operation is not the antithesis of the Bind operation despite its name; it functions as the 'quit' operation that terminates the LDAP session. The naming is historical and carried over from earlier LDAP versions, as noted non-normatively in Section 4.3.
section: "4.3"
topics:
    - ldap
