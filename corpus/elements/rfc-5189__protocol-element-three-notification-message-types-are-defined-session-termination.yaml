summary: 'Three notification message types are defined: Session Termination Notification (STN) carrying a termination reason; Policy Rule Event Notification (REN) carrying a policy rule identifier and remaining lifetime; and Group Event Notification (GEN) carrying a policy rule group identifier and remaining group lifetime. All contain a middlebox-unique notification identifier.'
