document: rfc-8550
kind: normative-requirement
summary: 'For RSA and RSASSA-PSS key sizes during certificate and CRL signature verification: keys <= 2047 bits SHOULD NOT be used; keys 2048–4096 bits MUST be supported; keys > 4096 bits MAY be supported. RSA keys of less than 2048 bits are considered cryptographically insecure.'
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
