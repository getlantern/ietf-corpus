document: rfc-8310
kind: protocol-element
summary: The Opportunistic Privacy profile uses Opportunistic Security per RFC 7435, attempting but not requiring encryption and authentication. It may result in an authenticated+encrypted, encrypted-only, or cleartext connection depending on fallback logic, available authentication information, and server capabilities.
