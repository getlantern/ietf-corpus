document: rfc-2207
kind: interoperability-note
summary: 'WF style reservations provide very limited service with these extensions: RESV messages for WF do not contain a FILTER_SPEC and SENDER_TEMPLATEs are ignored, so classifiers match all packets with the session''s destination IP address and protocol ID to WF reservations, defeating per-flow granularity.'
section: 4.2.2
topics:
