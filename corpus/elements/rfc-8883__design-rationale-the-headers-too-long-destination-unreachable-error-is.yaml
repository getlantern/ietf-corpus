document: rfc-8883
kind: design-rationale
summary: The 'Headers too long' Destination Unreachable error is assigned the lowest reporting priority because it is a coarse-grained error applicable to aggregate header size, whereas the Parameter Problem codes identify specific extension header or option violations that are more actionable for a sender.
