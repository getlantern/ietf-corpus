document: rfc-6584
kind: normative-requirement
summary: The anti-replay Sequence Number field MUST be initialized before signature generation so receivers can verify it during integrity checking. When anti-replay is enabled (AR=1), all 40 bits of the SN MUST be considered by the anti-replay mechanism.
section: 3.3.2
rfc2119_level: MUST
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
