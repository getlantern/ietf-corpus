document: rfc-8531
kind: design-rationale
summary: The model uses a three-level hierarchy (Maintenance Domain → Maintenance Association → Maintenance End Point) mirroring CFM, with choice/case constructs for names and identifiers so technology-specific YANG modules can augment them without redefining the structure. This provides uniformity while retaining extensibility.
