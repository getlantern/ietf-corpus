document: rfc-8287
kind: normative-requirement
summary: When a received echo reply does not contain the FEC Stack Change TLV, the initiator MUST NOT attempt to remove any FECs from the Target FEC Stack TLV in the next (TTL+1) traceroute request.
section: "7.1"
rfc2119_level: MUST NOT
topics:
