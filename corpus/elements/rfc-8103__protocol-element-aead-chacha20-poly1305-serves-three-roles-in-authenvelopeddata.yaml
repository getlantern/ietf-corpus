document: rfc-8103
kind: protocol-element
summary: 'AEAD_CHACHA20_POLY1305 serves three roles in AuthEnvelopedData: (1) authenticates authAttrs (used as DER-encoded AAD), (2) enciphers the content in encryptedContent, and (3) provides the MAC stored in the mac field. No padding of plaintext or AAD is required.'
section: "3"
