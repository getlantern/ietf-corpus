document: rfc-7310
kind: protocol-element
summary: apt-X provides stereo-pairing of channels so that the embedded autosync and auxiliary data channel can be shared across the channel pair. By default, channel-pairing is not enabled; out-of-band signaling is required to notify the receiver when the option is being used.
