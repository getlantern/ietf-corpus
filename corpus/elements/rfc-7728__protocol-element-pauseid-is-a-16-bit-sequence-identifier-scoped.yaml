document: rfc-7728
kind: protocol-element
summary: PauseID is a 16-bit sequence identifier scoped by Target SSRC that numbers entire pause-and-resume operations rather than individual messages. PAUSE, RESUME, and PAUSED share the same PauseID space for a given Target SSRC. Half the PauseID value range represents past values, a quarter represents future values; the remaining quarter is intentionally left undefined. Modulo arithmetic is used throughout.
section: "5.2"
topics:
    - rtp
    - realtime
