document: rfc-3024
kind: interoperability-note
summary: In the Limited Private Address Scenario (LPAS), mobile nodes using private (RFC 1918) addresses MUST set the 'T' bit and use reverse tunneling; foreign agent care-of addresses and home agent addresses used in registrations MUST be publicly routable. Foreign agents supporting reverse tunneling MUST support this private address scenario.
section: A.4
rfc2119_level: MUST
topics:
    - mobility
    - nat
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
