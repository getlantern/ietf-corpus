document: rfc-5919
kind: state-machine
summary: The EOL Notification timer is started immediately following LDP session establishment; it is reset by any subsequent label advertisement from the peer and stopped upon receipt of an End-of-LIB Notification. If the timer expires without receipt of a notification, the speaker behaves as if the End-of-LIB Notification was received.
section: "4.1"
topics:
    - mpls
    - routing
