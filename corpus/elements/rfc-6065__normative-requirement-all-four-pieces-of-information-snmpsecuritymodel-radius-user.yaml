document: rfc-6065
kind: normative-requirement
summary: All four pieces of information (SnmpSecurityModel, RADIUS User-Name, session identifier, and RADIUS Management-Policy-Id) are REQUIRED to process a session establishment indication; if User-Name or Management-Policy-Id is absent, invalid, or zero-length, no further processing is undertaken.
section: 7.2.1
rfc2119_level: REQUIRED
topics:
