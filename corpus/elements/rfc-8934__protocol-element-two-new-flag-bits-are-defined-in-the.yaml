summary: 'Two new flag bits are defined in the STATEFUL-PCE-CAPABILITY TLV: B (LSP-SCHEDULING-CAPABILITY) at bit position 22, indicating support for LSP scheduling, and PD (PD-LSP-CAPABILITY) at bit position 21, indicating support for periodical LSP scheduling.'
