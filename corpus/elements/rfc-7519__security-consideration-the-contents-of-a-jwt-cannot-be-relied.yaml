document: rfc-7519
kind: security-consideration
summary: The contents of a JWT cannot be relied upon in a trust decision unless cryptographically secured and bound to the necessary context. The key(s) used to sign and/or encrypt the JWT will typically need to be verifiably under the control of the party identified as the issuer.
section: "11.1"
topics:
    - jose
    - security
    - crypto
