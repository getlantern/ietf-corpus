document: rfc-7830
kind: normative-requirement
summary: Implementations MUST NOT use the Padding option if the DNS transport is not encrypted, because padding only provides a privacy benefit for encrypted transport and may make DNS amplification attacks easier.
section: "6"
rfc2119_level: MUST NOT
topics:
    - dns
