document: rfc-9309
kind: security-consideration
summary: The Robots Exclusion Protocol is not a substitute for valid content security measures. Paths listed in robots.txt are publicly exposed and discoverable; service owners should use application-layer security (e.g., HTTP Authentication per RFC 9110) to control actual access.
section: "3"
topics:
    - http
    - security
