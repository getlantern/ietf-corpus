document: rfc-8642
kind: normative-requirement
summary: Vendors MUST ensure that their implementations' 'set' directive treatment of any specific community does not change if or when that community becomes a new well-known community through future standardization. For most implementations this means the 'set' directive MUST continue to remove the community; for those where 'set' removes no communities, that behavior MUST continue.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
