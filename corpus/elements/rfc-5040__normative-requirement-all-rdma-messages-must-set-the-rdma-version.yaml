document: rfc-5040
kind: normative-requirement
summary: All RDMA Messages MUST set the RDMA Version field (bits 24-25) to 01b for compliance with this specification. Version 00b (RDMA Consortium) is also valid; interoperability between implementations of different versions depends on MPA protocol version negotiation.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
