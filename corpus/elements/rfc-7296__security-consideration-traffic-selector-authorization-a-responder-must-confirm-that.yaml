document: rfc-7296
kind: security-consideration
summary: 'Traffic Selector Authorization: a responder MUST confirm that the Traffic Selectors proposed by the initiator are consistent with the responder''s security policy before accepting a Child SA. Accepting overly broad TSes could silently bypass access controls.'
