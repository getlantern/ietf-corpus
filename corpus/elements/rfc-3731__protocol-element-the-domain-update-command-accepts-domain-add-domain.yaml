document: rfc-3731
kind: protocol-element
summary: The <domain:update> command accepts <domain:add>, <domain:rem>, and <domain:chg> child elements; at least one MUST be present. <domain:add>/<domain:rem> modify name servers, contacts, and status values; <domain:chg> modifies registrant and authInfo (a <domain:null> element removes authInfo).
section: 3.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
