document: rfc-8083
kind: normative-requirement
summary: RTP senders SHOULD monitor reported packet loss and delay to estimate whether media is usable; if unusable for a significant time, the application SHOULD cease transmission. Receivers SHOULD similarly monitor quality and SHOULD terminate the session if unusable.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
    - realtime
