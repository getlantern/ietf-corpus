document: rfc-3965
kind: normative-requirement
summary: A single multi-page document SHOULD be sent as a single multi-page TIFF file, though recipients MUST process multipart/mixed containing multiple TIFF files. If processing of any part fails, the entire message is treated as failing.
section: 2.2.4
rfc2119_level: SHOULD
topics:
