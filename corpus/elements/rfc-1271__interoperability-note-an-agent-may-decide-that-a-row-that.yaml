document: rfc-1271
kind: interoperability-note
summary: An agent may decide that a row that has been in the underCreation(3) state for an abnormally long time indicates a crashed management station, and may set the entry to invalid(4) to reclaim resources. A prudent agent will allow for the possibility that the management station is waiting for human input when determining this timeout.
section: "4.2"
topics:
    - snmp
