document: rfc-2326
kind: design-rationale
summary: RTSP requires the absolute URI (including scheme, host, and port) in every request line rather than just the absolute path as in HTTP. This simplifies virtual hosting and avoids HTTP's backward-compatibility requirement for the separate Host header, which does not apply to RTSP.
section: "6.2"
topics:
    - realtime
    - http
