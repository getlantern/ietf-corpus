document: rfc-4868
kind: design-rationale
summary: Fixed key lengths equal to the hash output length are required for authentication use (not variable) because allowing variable-length keys for IPsec authenticator functions would create interoperability issues, and keys shorter than the output length decrease security strength.
section: 2.1.1
topics:
    - ipsec
    - crypto
    - security
