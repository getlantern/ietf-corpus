document: rfc-9946
kind: protocol-element
summary: The KDF uses Kin (shared key identified by keyId), Label='UDPSTP' (UTF-8), and Context=the UTF-8 string of authUnixTime from the very first Setup Request PDU as a session nonce. Derived keys are used for all subsequent PDUs of that test connection; the KDF executes only once per connection.
