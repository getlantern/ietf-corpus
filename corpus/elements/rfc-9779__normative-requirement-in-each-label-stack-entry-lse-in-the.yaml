document: rfc-9779
kind: normative-requirement
summary: In each Label Stack Entry (LSE) in the MPLS label stack of query messages, the TTL value MUST be set to 255 per the Generalized TTL Security Mechanism (RFC 5082). This applies to both link and SR-MPLS Policy query messages.
section: 4.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
