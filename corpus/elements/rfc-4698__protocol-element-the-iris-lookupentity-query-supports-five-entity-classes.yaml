document: rfc-4698
kind: protocol-element
summary: 'The <iris:lookupEntity> query supports five entity classes: ''ipv4-handle'' (yields <ipv4Network>), ''ipv6-handle'' (yields <ipv6Network>), ''as-handle'' (yields <autonomousSystem>), ''contact-handle'' (yields <contact>), and ''organization-id'' (yields <organization>). Entity class names are case insensitive.'
section: "3.3"
