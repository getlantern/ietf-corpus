document: rfc-5648
kind: normative-requirement
summary: If the mobile node receives MCOA PROHIBITED status, it MUST stop registering multiple bindings with that node. If MCOA NON-MCOA BINDING EXISTS is received, the mobile node MUST set the 'O' flag to replace all bindings with an MCoA registration.
section: "5.7"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
