document: rfc-3915
kind: normative-requirement
summary: For the extended <update> command supporting RGP, at least one empty <domain:add>, <domain:rem>, or <domain:chg> element MUST be present if this extension is specified. This prevents modifying a domain object simultaneously with redemption grace period recovery processing.
section: 4.2.5
rfc2119_level: MUST
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
