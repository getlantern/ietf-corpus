document: rfc-6002
kind: design-rationale
summary: Simple label concatenation as done in RFC 4606 was deemed impractical for communicating multiple VLAN IDs (up to 4096) per LSP, motivating the Generalized Channel_Set Label format. The LABEL_SET object from RFC 3473 served as the foundation, but the new format allows the full set to be represented in a single object rather than requiring multiple objects.
section: "3"
topics:
