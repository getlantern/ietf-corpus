document: rfc-7217
kind: protocol-element
summary: The algorithm computes RID = F(Prefix, Net_Iface, Network_ID, DAD_Counter, secret_key), where F() is a pseudorandom function that MUST NOT be computable from outside without the secret key. The Interface Identifier is then taken as the least significant 64 bits of RID.
