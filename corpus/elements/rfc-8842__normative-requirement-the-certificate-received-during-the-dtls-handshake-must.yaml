document: rfc-8842
kind: normative-requirement
summary: The certificate received during the DTLS handshake MUST match a certificate fingerprint in the SDP 'fingerprint' attributes per RFC 8122. If fingerprints do not match, an endpoint MUST immediately tear down the media session.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
