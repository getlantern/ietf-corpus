document: rfc-5520
kind: interoperability-note
summary: A legacy head-end LSR that receives a PCRep ERO containing a PKS but does not understand how to encode it into RSVP-TE signaling must either fail the LSP setup or request a new path computation that avoids the domain that supplied the PKS. There is no way to protect such a legacy LSR since the PCE must keep the CPS confidential.
section: "6.6"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
