document: rfc-3637
kind: normative-requirement
summary: Any attempt to set etherWisDeviceTxTestPatternMode or etherWisDeviceRxTestPatternMode to a value other than none(1) when ifAdminStatus is up(1) MUST be rejected with inconsistentValue; likewise, setting ifAdminStatus to up(1) while a test pattern is active MUST be rejected.
