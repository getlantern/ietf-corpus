document: rfc-6323
kind: protocol-element
summary: The Send RTT Estimate Feature (feature number 128) is a server-priority, 1-byte Boolean feature that governs whether the sender must provide RTT Estimate options on its data packets. It is off by default (initial value 0) and is OPTIONAL for DCCP implementations.
