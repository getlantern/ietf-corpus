document: rfc-9140
kind: state-machine
summary: 'EAP-NOOB defines a five-state association state machine shared by both server and peer: Unregistered (0), Waiting for OOB (1), OOB Received (2), Reconnecting (3), and Registered (4). States 0–2 are ephemeral and can be reset by timeout or error; states 3–4 are persistent and can only be exited by explicit user reset or storage failure.'
section: "3.1"
topics:
    - security
