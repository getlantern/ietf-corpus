document: rfc-7787
kind: normative-requirement
summary: 'Each DNCP profile MUST specify: unicast transport (and optionally multicast); security scheme; transport parameters (ports, multicast addresses); additional TLV ignore rules; node identifier collision handling; Trickle Imin/Imax/k ranges; hash function H(x) and output bit length; DNCP_NODE_IDENTIFIER_LENGTH; and keep-alive configuration.'
section: "9"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
