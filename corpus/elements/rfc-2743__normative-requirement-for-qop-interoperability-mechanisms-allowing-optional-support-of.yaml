document: rfc-2743
kind: normative-requirement
summary: 'For QOP interoperability, mechanisms allowing optional support of particular QOP values must satisfy one of: (i) all implementations can process messages protected with any QOP value regardless of send capability, or (ii) mutually-supported receiver QOP values are determined during context establishment and only those values are used for message protection.'
section: 1.2.4
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
