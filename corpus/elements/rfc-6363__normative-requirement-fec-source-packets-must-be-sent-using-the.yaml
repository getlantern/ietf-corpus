document: rfc-6363
kind: normative-requirement
summary: FEC source packets MUST be sent using the same ADU flow identification information (e.g., UDP 5-tuple) as would have been used for the original source packets had the FEC Framework not been present. A single FEC repair flow MUST contain only FEC repair packets relating to a single FEC Framework instance.
section: "5.3"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
