summary: 'A PPSTP response is a JSON object with root key ''PPSPTrackerProtocol'' containing fields: version (integer), response_type (0x00=SUCCESSFUL|0x01=FAILED), error_code (integer), transaction_id (string), optional peer_addr, and optional swarm_result array. swarm_result elements contain swarm_id, result, and optional peer_group with peer_info entries.'
