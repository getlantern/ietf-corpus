document: rfc-2355
kind: wire-format
summary: A TN3270E data message is structured as <5-byte TN3270E Header><optional data><IAC EOR>. The value 0xff (decimal 255) anywhere in the data stream must be doubled to 0xffff; a single 0xff is interpreted as IAC.
