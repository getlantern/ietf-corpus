document: rfc-7863
kind: design-rationale
summary: The NFSv4.2 XDR reconverges the previously divergent NFSv4.0 (RFC 7531) and NFSv4.1 (RFC 5662) XDR strands by aliasing clientaddr4 to netaddr4, renaming its fields (r_netid to na_r_netid, r_addr to na_r_addr) while keeping the same semantics.
section: "2"
