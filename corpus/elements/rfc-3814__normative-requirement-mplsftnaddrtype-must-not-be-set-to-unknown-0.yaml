document: rfc-3814
kind: normative-requirement
summary: mplsFTNAddrType MUST NOT be set to unknown(0) when mplsFTNMask has bit sourceAddr(0) or destAddr(1) set. When both address bits are zero, mplsFTNAddrType SHOULD be set to unknown(0) and the address objects SHOULD be set to zero-length strings.
section: "9"
rfc2119_level: MUST NOT
topics:
