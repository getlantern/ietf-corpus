document: rfc-4860
kind: normative-requirement
summary: If multiple generic aggregate reservations share the same <DestAddress, SrcAddress, PHB-ID> but differ only in VDstPort/Extended VDstPort, a router using a classifier for policing MUST program the policing rate to the sum of reserved rates across all such reservations.
section: "3.1"
rfc2119_level: MUST
topics:
    - qos
    - diffserv
