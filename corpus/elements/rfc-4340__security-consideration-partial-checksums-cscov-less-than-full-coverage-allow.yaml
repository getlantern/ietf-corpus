document: rfc-4340
kind: security-consideration
summary: Partial checksums (CsCov less than full coverage) allow corrupted application data to reach applications undetected. Implementations honoring partial checksums MUST allow applications to detect corruption; the header itself is always fully checksummed.
section: "18.1"
topics:
    - security
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
