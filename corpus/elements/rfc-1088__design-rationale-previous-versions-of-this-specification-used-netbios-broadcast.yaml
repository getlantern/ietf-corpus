document: rfc-1088
kind: design-rationale
summary: Previous versions of this specification used NetBIOS broadcast datagram services to implement IP broadcasting. The current specification replaces this with NetBIOS group name services (IP.FF.FF.FF.FF); the broadcast datagram approach is declared obsolete.
section: Introduction
