document: rfc-9390
kind: protocol-element
summary: A session group is explicitly deleted by appending a Session-Group-Info AVP with SESSION_GROUP_STATUS cleared and SESSION_GROUP_ALLOCATION_ACTION cleared, identifying the group to be deleted. A session group is also implicitly deleted when its last session is removed.
