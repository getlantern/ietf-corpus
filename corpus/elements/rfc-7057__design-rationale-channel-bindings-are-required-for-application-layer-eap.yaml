document: rfc-7057
kind: design-rationale
summary: Channel bindings are required for application-layer EAP because, without them, a peer cannot verify if an authenticator is authorized to provide an advertised service. As more services adopt EAP, distinguishing which service is being contacted becomes critical, especially across organizational boundaries in federated environments.
section: "2"
topics:
    - security
