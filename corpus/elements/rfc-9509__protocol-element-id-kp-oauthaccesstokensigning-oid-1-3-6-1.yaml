document: rfc-9509
kind: protocol-element
summary: id-kp-oauthAccessTokenSigning (OID 1.3.6.1.5.5.7.3.39) is a new KeyPurposeId indicating the certificate's public key is certified for signing OAuth 2.0 access tokens for service authorization using JWS. The KU extension must be set to digitalSignature or nonRepudiation.
