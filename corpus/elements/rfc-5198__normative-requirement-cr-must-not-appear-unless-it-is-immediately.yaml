document: rfc-5198
kind: normative-requirement
summary: CR MUST NOT appear unless it is immediately followed by LF or NUL; the CR NUL sequence SHOULD be avoided because NUL is hostile to programming languages that use it as a string delimiter.
section: "2"
rfc2119_level: MUST NOT
topics:
    - security
