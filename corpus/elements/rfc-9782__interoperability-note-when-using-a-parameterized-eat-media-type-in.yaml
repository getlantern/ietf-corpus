document: rfc-9782
kind: interoperability-note
summary: When using a parameterized EAT media type in HTTP headers and the eat_profile value is an absolute URI, the quoted-string encoding MUST be used (e.g., eat_profile="tag:evidence.example,2022"). When the profile is an OID, the token encoding without quotes is used (e.g., eat_profile=2.999.1.).
section: "3"
topics:
