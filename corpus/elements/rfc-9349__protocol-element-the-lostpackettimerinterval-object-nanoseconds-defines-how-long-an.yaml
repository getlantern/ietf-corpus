document: rfc-9349
kind: protocol-element
summary: The lostPacketTimerInterval object (NanoSeconds) defines how long an IP-TFS receiver waits for a missing outer packet before declaring it lost. Setting this too low can adversely impact reordering and reassembly.
section: "4.2"
