document: rfc-8939
kind: security-consideration
summary: To protect against DoS attacks, excess traffic from malicious or malfunctioning devices can be mitigated through policing and shaping at the DetNet domain input or within an edge IEEE 802.1 TSN domain. Man-in-the-middle delay attacks can be mitigated through authentication and authorization of devices within the DetNet domain.
