document: rfc-8480
kind: design-rationale
summary: The choice between 2-step and 3-step transactions reflects which node has better knowledge of available cells. In a 2-step transaction, the initiator (A) selects candidate cells because it knows its own schedule best; in a 3-step transaction, the responder (B) selects candidates because B's local conditions (interference, load) are better known to B. An SF MUST specify which mode(s) it uses.
section: "3.1"
