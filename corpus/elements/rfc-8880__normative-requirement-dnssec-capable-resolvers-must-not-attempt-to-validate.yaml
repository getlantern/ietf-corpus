document: rfc-8880
kind: normative-requirement
summary: DNSSEC-capable resolvers MUST NOT attempt to validate answers received in response to queries for the IPv6 AAAA address records for 'ipv4only.arpa', since such answers are generated by the local network's DNS64/NAT64 gateway and not by the authoritative server.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - nat
    - security
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
