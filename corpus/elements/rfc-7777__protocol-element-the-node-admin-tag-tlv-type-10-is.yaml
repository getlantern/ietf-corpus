document: rfc-7777
kind: protocol-element
summary: The Node Admin Tag TLV (Type 10) is carried within the Router Information (RI) LSA for both OSPFv2 and OSPFv3. It advertises one or more 32-bit integer administrative tags identifying groups of nodes in the OSPF domain.
