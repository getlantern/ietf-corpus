document: rfc-5060
kind: protocol-element
summary: The pimBidirDFElectionTable contains one row per RP per interface for BIDIR-PIM Designated Forwarder election state. The robustness parameter pimInterfaceDFElectionRobustness (default 3) specifies how many lost DF-Election messages are needed to declare an election failure.
