document: rfc-1655
kind: normative-requirement
summary: For External BGP, BGP neighbors must belong to different AS's and share a common network, which should be used to carry BGP messages. Using BGP across an intervening AS invalidates the AS path information.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
