summary: Geometric inter-pair spacing is chosen so that a general geometric-stream sample with launch probability q < 1 independently sub-samples each Loss Pair of the idealized q=1 stream, ensuring that normalized Loss-Pair-Counts are on average identical to the idealized sample and yielding unbiased estimators for the loss episode metrics.
