document: rfc-7455
kind: design-rationale
summary: The TRILL OAM Message Channel reuses the 802.1Q CFM message format (Ethertype 0x8902) to promote a common OAM framework across technologies, enable nested fault monitoring, and allow direct reuse of CCM and LBM messages. Y.1731 adopts the same stance, making the approach broadly applicable.
section: "1"
extracted_by: claude-sonnet-4-6
