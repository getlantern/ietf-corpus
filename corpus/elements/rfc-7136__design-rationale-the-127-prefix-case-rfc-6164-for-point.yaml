document: rfc-7136
kind: design-rationale
summary: The /127 prefix case (RFC 6164) for point-to-point inter-router links produces global unicast addresses without 64-bit IIDs where the bits in positions named 'u' and 'g' have no special significance, further demonstrating the general inapplicability of Modified EUI-64 semantics to non-MAC-derived IIDs.
section: "2"
topics:
