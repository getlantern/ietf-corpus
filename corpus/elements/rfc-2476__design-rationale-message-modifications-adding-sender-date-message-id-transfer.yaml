document: rfc-2476
kind: design-rationale
summary: Message modifications (adding Sender, Date, Message-ID, transfer encoding, signing, encrypting, resolving aliases, header rewriting) are appropriate at the MSA but not at downstream MTAs. The paramount rule is to limit modifications to remedies for specific problems with clear solutions, especially for address elements.
section: "8"
topics:
