document: rfc-8026
kind: protocol-element
summary: 'The DHCPv6 client behavior for S46 Priority Option involves four steps: (1) build a candidate list of S46 mechanisms from valid configuration options in the DHCPv6 Advertise message; (2) build a priority list from s46-option-codes in OPTION_S46_PRIORITY ordered highest to lowest; (3) sequentially match priority list against candidate list; (4) configure the first matching mechanism.'
section: "1.4"
topics:
    - v6ops
    - ip
