document: rfc-1096
kind: interoperability-note
summary: When the X display location contains no hostname (e.g., ':0' or 'unix:0.0'), the Telnet client must substitute the actual client hostname before transmitting the value to the remote Telnet, since the remote host cannot resolve a bare display reference.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
