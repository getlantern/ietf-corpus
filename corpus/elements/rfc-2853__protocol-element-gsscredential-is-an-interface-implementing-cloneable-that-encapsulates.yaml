document: rfc-2853
kind: protocol-element
summary: GSSCredential is an interface (implementing Cloneable) that encapsulates GSS-API credentials for one or more mechanisms. It provides methods for querying remaining lifetime (getRemainingLifetime, getRemainingInitLifetime, getRemainingAcceptLifetime), usage type, and incrementally adding credential elements via add().
section: "5.3"
topics:
    - security
