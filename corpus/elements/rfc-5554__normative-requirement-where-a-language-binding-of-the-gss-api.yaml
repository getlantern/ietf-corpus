document: rfc-5554
kind: normative-requirement
summary: Where a language binding of the GSS-API models channel bindings as OCTET STRINGs (or the language's equivalent), the implementation MUST assume that the given bindings correspond only to the application-data field of GSS-CHANNEL-BINDINGS, rather than some encoding of the full GSS-CHANNEL-BINDINGS structure.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
