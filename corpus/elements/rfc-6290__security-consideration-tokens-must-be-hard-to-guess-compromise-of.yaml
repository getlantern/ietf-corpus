document: rfc-6290
kind: security-consideration
summary: Tokens must be hard to guess; compromise of one token by an attacker MUST NOT enable guessing of other tokens from the same maker. The QCD_SECRET length and the use of a cryptographic hash are the primary controls. Token storage on the taker side must also be secured against unauthorized access.
section: "9.1"
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
