document: rfc-1123
kind: normative-requirement
summary: Every Telnet implementation MUST include option negotiation and subnegotiation machinery, MUST carefully follow RFC-854 to avoid negotiation loops, MUST refuse unsupported options with WONT/DONT, and MUST default to and support NVT if all option negotiations fail.
section: 3.2.1
rfc2119_level: MUST
topics:
    - tcp
