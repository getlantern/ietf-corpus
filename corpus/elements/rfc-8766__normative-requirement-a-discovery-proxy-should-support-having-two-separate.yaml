document: rfc-8766
kind: normative-requirement
summary: 'A Discovery Proxy SHOULD support having two separate subdomains delegated to it for each link: one allowing arbitrary Net-Unicode text for service instance names, and a second restricted to letters, digits, and hyphens for host name (A and AAAA) records.'
section: "5.3"
rfc2119_level: SHOULD
