document: rfc-5660
kind: normative-requirement
summary: Implementations with a restartable key management process MUST arrange for existing latched connections to either be broken and disconnected or to survive the restart. If latch state is kept in a restartable process, it must be restored on restart or outstanding latches transitioned to CLOSED.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
