document: rfc-9303
kind: design-rationale
summary: Map-Register/Map-Notify security is explicitly out of scope for LISP-SEC because those exchanges are already protected by the security mechanisms in RFC 9301. LISP-SEC focuses solely on the Map-Request/Map-Reply lookup path, where RFC 9301 nonce protection is insufficient against on-path overclaiming attacks.
section: "1"
topics:
    - security
    - routing
