document: rfc-4366
kind: design-rationale
summary: The extended ServerHello is sent only in response to an extended ClientHello. This asymmetric design prevents the extended ServerHello from breaking existing TLS clients that do not understand extensions, while still allowing extension negotiation when both parties support it.
section: "2.2"
topics:
    - tls
