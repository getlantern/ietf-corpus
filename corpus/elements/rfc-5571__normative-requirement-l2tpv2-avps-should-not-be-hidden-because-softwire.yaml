document: rfc-5571
kind: normative-requirement
summary: L2TPv2 AVPs SHOULD NOT be hidden because Softwire establishment messages do not transport sensitive data such as usernames or passwords. The AVP hiding mechanism exists but is unnecessary in this context.
section: 5.1.1
rfc2119_level: SHOULD NOT
