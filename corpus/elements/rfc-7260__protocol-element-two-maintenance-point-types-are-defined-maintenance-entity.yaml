document: rfc-7260
kind: protocol-element
summary: 'Two maintenance point types are defined: Maintenance Entity Group End Points (MEPs) at LSP endpoints that initiate/terminate OAM messages, and Maintenance Entity Group Intermediate Points (MIPs) at transit nodes that react to but do not initiate OAM messages. Together they form a Maintenance Entity (ME) monitoring an LSP.'
