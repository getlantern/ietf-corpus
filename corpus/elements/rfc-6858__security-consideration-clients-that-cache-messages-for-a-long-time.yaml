document: rfc-6858
kind: security-consideration
summary: Clients that cache messages for a long time (e.g., stock Android client) must not serve a cached surrogate message after the client is upgraded to support internationalized email; they must retrieve the real message from the server instead.
section: "5"
topics:
    - email
    - security
