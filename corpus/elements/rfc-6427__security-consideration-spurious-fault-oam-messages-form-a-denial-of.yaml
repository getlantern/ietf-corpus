document: rfc-6427
kind: security-consideration
summary: Spurious fault OAM messages form a denial-of-service vector that can suppress alarms falsely. Because these messages are in a control channel, an attacker must subvert a transit node to inject them; transport networks operated as walled gardens reduce this risk.
section: "7"
topics:
