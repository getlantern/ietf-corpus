document: rfc-3376
kind: protocol-element
summary: IGMPv3 introduces IPMulticastListen(socket, interface, multicast-address, filter-mode, source-list) as the IP service interface for multicast reception. Filter-mode is INCLUDE (receive only from listed sources) or EXCLUDE (receive from all but listed sources). The old Join/Leave operations map to EXCLUDE/{} and INCLUDE/{} respectively.
section: "2"
topics:
    - multicast
