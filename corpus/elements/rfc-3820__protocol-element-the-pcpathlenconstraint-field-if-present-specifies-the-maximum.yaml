document: rfc-3820
kind: protocol-element
summary: The pCPathLenConstraint field, if present, specifies the maximum depth of the Proxy Certificate path that can be signed by this PC. A value of 0 means this certificate MUST NOT sign any further Proxy Certificate; absence means unlimited depth.
