document: rfc-6642
kind: normative-requirement
summary: When a receiver gets an RTCP TPLR message, it MUST follow the rules for NACK suppression in RFC 4585 and refrain from sending feedback requests (e.g., NACK or FIR) for the missing packets reported in the TPLR message.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
