document: rfc-4379
kind: normative-requirement
summary: An MPLS echo request MUST have a Target FEC Stack TLV describing the FEC Stack being tested. The Return Code and Subcode in the request are set to zero. In traceroute mode, the echo request SHOULD include a Downstream Mapping TLV.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
