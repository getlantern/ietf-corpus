document: rfc-4391
kind: normative-requirement
summary: All IPoIB implementations MUST support an MTU of 2044 octets (2048-octet IPoIB-link MTU minus 4-octet encapsulation overhead) as the default configuration. Larger and smaller MTUs MAY be supported.
section: "7"
rfc2119_level: MUST
topics:
