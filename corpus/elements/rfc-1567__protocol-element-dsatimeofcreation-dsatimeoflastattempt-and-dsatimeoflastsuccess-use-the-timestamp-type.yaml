document: rfc-1567
kind: protocol-element
summary: dsaTimeOfCreation, dsaTimeOfLastAttempt, and dsaTimeOfLastSuccess use the TimeStamp type (value of sysUpTime at the event). All three carry a value of zero if the event occurred before the network management subsystem was initialized, or if no successful attempt has been made.
