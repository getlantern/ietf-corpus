document: rfc-2250
kind: protocol-element
summary: When E=1 in the MPEG-2 header extension, one or more additional extension blocks (quant matrix, picture display, temporal/spatial scalable, copyright) follow. These are self-identifying via extension start codes; zero-padding aligns them to 32-bit boundaries. Their inclusion in any given RTP packet is optional even when the MPEG-2 extension header is present.
section: 3.4.1
topics:
    - rtp
    - realtime
