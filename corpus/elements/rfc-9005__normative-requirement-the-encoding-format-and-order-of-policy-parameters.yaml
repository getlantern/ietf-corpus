document: rfc-9005
kind: normative-requirement
summary: The encoding format and order of POLICY-PARAMETERS-TLV content MUST be known to the PCEP peers in advance, established during policy configuration. Only one POLICY-PARAMETERS-TLV can be carried; any additional occurrences MUST be ignored.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
