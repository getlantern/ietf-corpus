document: rfc-8797
kind: interoperability-note
summary: If the CM Private Data field capacity is too small to hold the 8-octet message, or the underlying RDMA transport is not managed by a Connection Manager, the CM Private Data mechanism cannot be used for RPC-over-RDMA version 1 property exchange.
section: "4"
extracted_by: claude-sonnet-4-6
