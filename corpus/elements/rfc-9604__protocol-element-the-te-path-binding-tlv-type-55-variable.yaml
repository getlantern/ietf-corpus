document: rfc-9604
kind: protocol-element
summary: The TE-PATH-BINDING TLV (type=55, variable length) is defined to carry a binding label/SID for a TE path. It is associated with the LSP object and may also appear in the PCEP-ERROR object. Multiple instances MAY be present in the same LSP object.
