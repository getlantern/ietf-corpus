document: rfc-6225
kind: interoperability-note
summary: For NAD83 datums (values 2 or 3), no available CRS URN covers three-dimensional coordinates; therefore, locations in these datums can only be represented as two-dimensional GML shapes (point or polygon), not as a three-dimensional prism.
