document: rfc-9803
kind: normative-requirement
summary: In Default Mode (policy attribute is '0' or 'false'), the EPP <info> response MUST contain <ttl:ttl> records for all DNS record types with non-default TTL values, and these elements MUST NOT have 'min', 'default', or 'max' attributes.
section: 2.1.1.1
rfc2119_level: MUST
topics:
    - dns
