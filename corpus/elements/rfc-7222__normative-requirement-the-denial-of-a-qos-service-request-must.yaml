document: rfc-7222
kind: normative-requirement
summary: The denial of a QoS Service Request MUST NOT result in removal of the mobility session for that mobile node. This constraint applies at both the LMA (when rejecting a MAG-initiated request) and the MAG (when rejecting an LMA-initiated request).
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
