document: rfc-2227
kind: protocol-element
summary: 'Three meter-request-directives control proxy participation: ''will-report-and-limit'' (willing to report and obey limits), ''wont-report'' (will limit but not report), and ''wont-limit'' (will report but not limit). An empty Meter header in a request is equivalent to ''will-report-and-limit''.'
section: "5.1"
topics:
    - http
