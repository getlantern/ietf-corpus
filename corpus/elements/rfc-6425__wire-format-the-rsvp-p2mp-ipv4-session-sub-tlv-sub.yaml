summary: 'The RSVP P2MP IPv4 Session sub-TLV (Sub-Type 17, Length 20) carries: P2MP ID (32 bits), MUST Be Zero / Tunnel ID (32 bits), Extended Tunnel ID (32 bits), IPv4 Tunnel Sender Address (32 bits), MUST Be Zero / LSP ID (32 bits). Fields are taken from RFC 4875 SESSION and SENDER_TEMPLATE objects; Sub-Group ID is omitted.'
