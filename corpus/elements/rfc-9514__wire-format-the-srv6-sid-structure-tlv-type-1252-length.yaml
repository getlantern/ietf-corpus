document: rfc-9514
kind: wire-format
summary: 'The SRv6 SID Structure TLV (Type 1252, Length 4) carries four 1-octet fields: LB Length (Locator Block bits), LN Length (Locator Node bits), Fun. Length (Function bits), and Arg. Length (Argument bits). It can appear as an attribute TLV for the SRv6 SID NLRI or as a sub-TLV of SRv6 End.X or LAN End.X SID TLVs.'
