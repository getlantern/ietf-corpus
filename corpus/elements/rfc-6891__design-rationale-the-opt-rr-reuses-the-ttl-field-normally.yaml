document: rfc-6891
kind: design-rationale
summary: The OPT RR reuses the TTL field (normally a 32-bit time value) to carry the extended RCODE (upper 8 bits), VERSION, DO flag, and reserved Z bits. This avoids adding new fixed fields to the DNS message header while extending its capabilities.
section: 6.1.3
topics:
    - dns
