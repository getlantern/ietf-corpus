document: rfc-3075
kind: protocol-element
summary: The Manifest element provides an application-controlled list of Reference elements whose digest validation is at application discretion rather than required by core validation. If a Manifest is referenced from SignedInfo, only the digest over the Manifest itself is checked by core validation.
section: "5.1"
topics:
