document: rfc-4704
kind: security-consideration
summary: Unauthenticated DNS updates can lead to serious confusion through malicious attack or misconfiguration. Both DHCPv6 clients and servers SHOULD use some form of update request origin authentication (e.g., Secure DNS Dynamic Update, RFC 3007) when performing DNS updates.
section: "10"
rfc2119_level: SHOULD
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
