document: rfc-2157
kind: interoperability-note
summary: The IA5Text body part maps to/from text/plain;charset=US-ASCII with no data conversion; the currency symbol at position 2/4 is silently converted to the dollar symbol because the IA5 and ASCII repertoires differ only there and real-world usage invariably intends dollar. Non-standard 8-bit data inside IA5 body parts is addressed by RFC 1428 guidance but is not required for MIXER conformance.
section: "6.1"
topics:
