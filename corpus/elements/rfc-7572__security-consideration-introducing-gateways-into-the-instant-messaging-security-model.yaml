document: rfc-7572
kind: security-consideration
summary: 'Introducing gateways into the instant messaging security model (RFC 2779) creates new risks: end-to-end confidentiality and integrity between IM clients that interface through a gateway can only be achieved if both sides support common formats, which is currently not widely standardized.'
