document: rfc-5104
kind: protocol-element
summary: Temporary Maximum Media Stream Bit Rate Request (TMMBR, pronounced 'timber') allows a receiver, translator, or mixer to request a sender to limit the maximum total media bit rate for a given stream. Each request is expressed as a tuple of (maximum total media bit rate, measured per-packet overhead), enabling multi-receiver constraint aggregation via a bounding-set algorithm.
section: 3.5.4
topics:
    - rtp
    - realtime
    - congestion
    - qos
