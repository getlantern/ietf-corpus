document: rfc-4931
kind: normative-requirement
summary: EPP actions that do not preserve the superordinate relationship between domain name objects and subordinate host objects MUST be explicitly disallowed. For example, a domain transfer that would orphan subordinate host objects must be prevented.
section: "1.1"
rfc2119_level: MUST
topics:
    - dns
