document: rfc-6764
kind: protocol-element
summary: DNS TXT records following RFC 6763 syntax are used alongside SRV records to advertise CalDAV and CardDAV services. A 'path' key in the TXT record carries the context path for the service (e.g., 'path=/caldav').
