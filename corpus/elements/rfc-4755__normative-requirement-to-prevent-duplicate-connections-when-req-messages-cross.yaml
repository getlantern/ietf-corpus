document: rfc-4755
kind: normative-requirement
summary: 'To prevent duplicate connections when REQ messages cross, MUST compare link-layer addresses (zeroing out connection mode flags): if the local address is numerically smaller, accept the connection; otherwise reject it with a ''Consumer Reject'' error code.'
section: "3.3"
rfc2119_level: MUST
topics:
