document: rfc-5001
kind: normative-requirement
summary: A resolver signals its desire for name server identification by sending an empty NSID option in an EDNS OPT pseudo-RR in the query message. The resolver MUST NOT include any NSID payload data in the query message.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - dns
