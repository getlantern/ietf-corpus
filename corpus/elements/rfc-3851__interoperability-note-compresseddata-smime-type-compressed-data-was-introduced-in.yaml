document: rfc-3851
kind: interoperability-note
summary: CompressedData (smime-type=compressed-data) was introduced in S/MIME v3.1 and is not recognized by earlier S/MIME agents. The id-cap-preferBinaryInside capability OID from [CMSCOMPR] is the preferred method for negotiating CompressedData support.
section: "3.5"
topics:
