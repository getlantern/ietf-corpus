document: rfc-6633
kind: normative-requirement
summary: TCP MUST silently discard any received ICMP Source Quench messages. This updates RFC 1122 Section 4.2.3.9, which previously required TCP to react by slowing transmission.
section: "3"
rfc2119_level: MUST
