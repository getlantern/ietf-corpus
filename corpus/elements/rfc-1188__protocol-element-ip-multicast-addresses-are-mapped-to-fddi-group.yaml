document: rfc-1188
kind: protocol-element
summary: IP multicast addresses are mapped to FDDI group addresses by placing the low order 23 bits of the IP address into the low order 23 bits of the FDDI group address 01-00-5E-00-00-00 (canonical order). When transmitted in native FDDI bit order, the multicast bit appears as the high order bit of the first octet.
section: Multicast Support
topics:
    - ip
    - multicast
