document: rfc-6738
kind: protocol-element
summary: The IKEv2-SK-Answer (IKESKA) command uses Command Code 329 with the 'R' bit cleared and Application-Id 11. It is sent by the HAAA to the IKEv2 server and SHALL include the Key AVP (from RFC 6734) on successful authorization.
section: "5.2"
topics:
