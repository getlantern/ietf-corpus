document: rfc-7552
kind: normative-requirement
summary: A Dual-stack LSR SHOULD prefer establishing an LDPoIPv6 session over an LDPoIPv4 session with a remote Dual-stack LSR. IPv6 LDP Link Hellos SHOULD be transmitted before IPv4 LDP Link Hellos when an interface comes into service or is reconfigured.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - ip
    - v6ops
