summary: LSP setup delay is conceptually similar to Round-trip Delay in IP networks, which justifies direct reuse of IPPM framework structures and notions (RFC 2330, RFC 2679, RFC 2681) including Poisson sampling methodology rather than defining a wholly new measurement framework.
