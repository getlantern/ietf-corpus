document: rfc-3586
kind: protocol-element
summary: Compliance Checking verifies that proposed SA parameters conform to the local security policy of each host. The security of IPSP-managed SAs should depend only on the correctness of compliance checking, even if SA resolution produces an incorrect result.
section: 3.2.7
topics:
