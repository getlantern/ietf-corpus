document: rfc-3016
kind: normative-requirement
summary: In in-band LATM mode (muxConfigPresent=1), the StreamMuxConfig element SHOULD be transmitted repeatedly depending on network conditions, because loss of a frame containing StreamMuxConfig makes the following frame non-decodable.
