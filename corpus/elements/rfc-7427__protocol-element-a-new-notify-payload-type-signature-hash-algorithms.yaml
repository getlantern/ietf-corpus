document: rfc-7427
kind: protocol-element
summary: A new Notify payload type SIGNATURE_HASH_ALGORITHMS (value 16431) is sent inside the IKE_SA_INIT exchange by each peer. It implicitly indicates support for the new 'Digital Signature' authentication method and carries a list of 16-bit hash algorithm identifiers (from the new IANA IKEv2 Hash Algorithms registry) that the sender supports.
section: "4"
topics:
