document: rfc-5913
kind: interoperability-note
summary: This document augments the certification path validation rules for PKCs defined in RFC 5280 and for ACs defined in RFC 5755. It adds the ability to provide and process Authority Clearance Constraints as an additional input to the certification path processing engine and requires processing of Authority Clearance Constraints present with trust anchor information.
section: 4.1.1
topics:
    - pkix
    - security
