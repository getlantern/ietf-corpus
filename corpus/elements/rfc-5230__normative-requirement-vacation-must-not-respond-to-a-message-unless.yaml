document: rfc-5230
kind: normative-requirement
summary: Vacation MUST NOT respond to a message unless the recipient's email address appears in a To, Cc, Bcc, Resent-To, Resent-Cc, or Resent-Bcc header field of the original message. Known addresses, the final envelope recipient, and :addresses values all count.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - email
