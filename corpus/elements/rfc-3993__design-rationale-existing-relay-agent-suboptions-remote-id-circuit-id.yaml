document: rfc-3993
kind: design-rationale
summary: Existing relay agent suboptions (Remote-ID, Circuit-ID) are based on physical network resources like IP addresses or ATM virtual circuit identifiers, making them path-dependent. The Subscriber-ID suboption was designed to carry a stable, provider-assigned value independent of the physical connection path, so clients connecting through different paths receive consistent identification.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
