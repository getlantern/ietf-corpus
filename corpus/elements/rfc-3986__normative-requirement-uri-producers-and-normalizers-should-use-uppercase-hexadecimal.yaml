document: rfc-3986
kind: normative-requirement
summary: URI producers and normalizers SHOULD use uppercase hexadecimal digits for all percent-encodings, for consistency. Percent-encoded octets in the unreserved character ranges (ALPHA, DIGIT, hyphen, period, underscore, tilde) SHOULD be decoded to their unreserved equivalents by normalizers.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
