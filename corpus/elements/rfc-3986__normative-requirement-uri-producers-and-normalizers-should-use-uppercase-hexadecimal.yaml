document: rfc-3986
kind: normative-requirement
summary: URI producers and normalizers SHOULD use uppercase hexadecimal digits for all percent-encodings. Percent-encoded octets in the ranges of ALPHA, DIGIT, hyphen, period, underscore, or tilde SHOULD NOT be created and SHOULD be decoded to their unreserved characters by normalizers.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
