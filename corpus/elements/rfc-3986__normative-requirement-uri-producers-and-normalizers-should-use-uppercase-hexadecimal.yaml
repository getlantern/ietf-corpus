document: rfc-3986
kind: normative-requirement
summary: URI producers and normalizers SHOULD use uppercase hexadecimal digits for all percent-encodings. Uppercase 'A'–'F' are equivalent to lowercase 'a'–'f' but uppercase is the canonical form.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
