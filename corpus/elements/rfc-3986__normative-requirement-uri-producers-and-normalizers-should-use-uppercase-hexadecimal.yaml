document: rfc-3986
kind: normative-requirement
summary: URI producers and normalizers SHOULD use uppercase hexadecimal digits for all percent-encodings, and SHOULD NOT create percent-encoded octets in the unreserved character ranges; when found, normalizers should decode them to their unreserved character equivalents.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - http
