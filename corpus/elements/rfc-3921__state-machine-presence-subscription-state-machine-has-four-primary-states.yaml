document: rfc-3921
kind: state-machine
summary: Presence subscription state machine has four primary states — None, To (user subscribed to contact), From (contact subscribed to user), and Both — plus intermediate pending substates (e.g., None+PendingOut, To+PendingIn). Transitions are triggered by outbound/inbound subscribe, subscribed, unsubscribe, and unsubscribed presence stanzas.
