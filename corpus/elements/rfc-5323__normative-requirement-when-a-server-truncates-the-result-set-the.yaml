document: rfc-5323
kind: normative-requirement
summary: When a server truncates the result set, the reply MUST use status code 207, return a DAV:multistatus response body, and indicate a status of 507 (Insufficient Storage) for the search arbiter URI. If partial results are included and the client requested an ordered result set, any partial results MUST be ordered as the client directed.
section: 2.3.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
