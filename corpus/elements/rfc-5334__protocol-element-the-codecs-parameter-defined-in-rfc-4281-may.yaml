document: rfc-5334
kind: protocol-element
summary: The 'codecs' parameter (defined in RFC 4281) may optionally be used with all three Ogg media types. Codec identifiers are mapped from binary header signatures to string values (e.g., '\x80theora' maps to 'theora', '\x01vorbis' maps to 'vorbis').
