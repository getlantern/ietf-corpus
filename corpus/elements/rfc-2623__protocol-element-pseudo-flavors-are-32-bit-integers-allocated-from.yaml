document: rfc-2623
kind: protocol-element
summary: Pseudo flavors are 32-bit integers allocated from the same number space as regular RPC security flavors. Each pseudo flavor maps to a specific triple of <GSS-API mechanism, quality of protection, RPCSEC_GSS service>, where service is one of rpc_gss_svc_none, rpc_gss_svc_integrity, or rpc_gss_svc_privacy.
section: "3.2"
topics:
