document: rfc-6898
kind: normative-requirement
summary: When sending a BehaviorConfig object in Config or ConfigNack messages, the flags field SHOULD be set based on the supported capabilities of the sending node. When sending a ConfigAck, the flags field MUST be set to the value received in the corresponding Config message.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
