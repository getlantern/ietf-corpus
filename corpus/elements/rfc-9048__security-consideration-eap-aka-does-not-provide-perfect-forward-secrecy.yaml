document: rfc-9048
kind: security-consideration
summary: EAP-AKA' does not provide Perfect Forward Secrecy (PFS). Long-term key theft (as reported in [Heist2015]) can expose past sessions to passive attackers. Use of a PFS-capable mechanism (e.g., tunneled EAP or the separately defined EAP-AKA' PFS extension) is recommended.
section: "7.3"
topics:
    - security
    - crypto
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
