document: rfc-1908
kind: normative-requirement
summary: For any object with an integer-valued SYNTAX clause where the INTEGER has no range restriction, the SYNTAX clause value must be changed to Integer32. Similarly, Counter must be changed to Counter32 and Gauge must be changed to Gauge32.
section: "2.1"
rfc2119_level: MUST
