document: rfc-1748
kind: normative-requirement
summary: The dot5Compliance MODULE-COMPLIANCE statement requires that conforming SNMPv2 entities implement dot5StateGroup and dot5StatsGroup as mandatory groups. Write access to dot5ActMonParticipate and dot5Functional is explicitly optional (MIN-ACCESS read-only).
