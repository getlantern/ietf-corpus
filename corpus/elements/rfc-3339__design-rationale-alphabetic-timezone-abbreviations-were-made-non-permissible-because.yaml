document: rfc-3339
kind: design-rationale
summary: Alphabetic timezone abbreviations were made non-permissible because attempts to label local offsets with alphabetic strings have resulted in poor interoperability historically (RFC 822 experience), leading RFC 2822 to mandate numeric offsets.
