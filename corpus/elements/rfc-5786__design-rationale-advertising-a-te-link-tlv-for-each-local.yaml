document: rfc-5786
kind: design-rationale
summary: Advertising a TE link TLV for each local address (possibly with a new link type) was rejected as inefficient because the only meaningful information is the address itself, and it would require implementations to treat those TLVs specially — for instance, the TE metric sub-TLV would be mandatory yet meaningless for a local address.
section: "3"
topics:
    - routing
