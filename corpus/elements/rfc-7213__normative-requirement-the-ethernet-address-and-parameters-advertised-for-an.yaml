document: rfc-7213
kind: normative-requirement
summary: The Ethernet address and parameters advertised for an interface SHOULD be persistent across restarts. On system restart, any data retained from prior GAP peer advertisements MUST be discarded to prevent operation on stale data.
section: "5"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
