document: rfc-8534
kind: normative-requirement
summary: When an ingress node receives a Leaf A-D route whose Route Key field does not match any current I-PMSI or S-PMSI A-D route it originated, but a wildcard S-PMSI A-D route originated by it is a valid match per Section 5.2 procedures, the Leaf A-D route MUST be processed by the ingress node.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
