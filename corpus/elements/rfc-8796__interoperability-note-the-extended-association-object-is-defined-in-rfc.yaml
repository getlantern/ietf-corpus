document: rfc-8796
kind: interoperability-note
summary: The Extended ASSOCIATION object is defined in RFC 4872 with class number in the form 11bbbbbb, ensuring that nodes not supporting these extensions will ignore the object and forward it unmodified, in accordance with RFC 2205 Section 3.10 unknown-class object handling. The extensions are thus fully backwards compatible.
