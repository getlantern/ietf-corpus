document: rfc-4555
kind: normative-requirement
summary: Unreliable lower-layer information (e.g., spoofable ICMP messages) SHOULD be treated only as a hint that there might be a problem; the initiator SHOULD trigger Dead Peer Detection to determine if the current path is still usable before changing addresses.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
