document: rfc-8201
kind: normative-requirement
summary: A packetization layer must use the PMTU for the path(s) in use by a connection and should not send segments that would result in packets larger than the PMTU, except for PMTU probes (which must not be fragmented to the PMTU).
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
    - tcp
    - v6ops
