document: rfc-8209
kind: interoperability-note
summary: BGPsec Router Certificates are not used to process manifests and ROAs or to verify signatures on Certificates or CRLs; their use is limited to verifying BGPsec certificate request signatures (by CAs) and BGPsec UPDATE message signatures (by BGPsec routers).
section: "2"
topics:
    - bgp
    - pkix
    - routing
