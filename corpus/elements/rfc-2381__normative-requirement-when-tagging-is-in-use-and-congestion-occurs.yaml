document: rfc-2381
kind: normative-requirement
summary: When tagging is in use and congestion occurs, an ATM switch MUST attempt to discard tagged (CLP=1) cells in preference to CLP=0 cells. Since GS and CLS REQUIRE excess traffic to be treated as best effort, the tagging option SHOULD always be chosen in VC setup if supported.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
