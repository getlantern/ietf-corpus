summary: 'Two new EAP code values are defined for ERP: EAP-Initiate (code 5) and EAP-Finish (code 6). Two Type values are defined under these codes: Re-auth-Start (Type=1) carried in EAP-Initiate, and Re-auth (Type=2) carried in both EAP-Initiate and EAP-Finish.'
