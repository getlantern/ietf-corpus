document: rfc-8539
kind: normative-requirement
summary: The DHCP 4o6 server MUST store the client's IPv6 softwire source address in the leasing address database alongside the IPv4 address and client identifier, and MUST include OPTION_DHCP4O6_S46_SADDR in every DHCPACK message sent.
