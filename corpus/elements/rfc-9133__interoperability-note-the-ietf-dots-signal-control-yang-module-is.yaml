document: rfc-9133
kind: interoperability-note
summary: The 'ietf-dots-signal-control' YANG module is not intended for use via NETCONF/RESTCONF for DOTS server management; it serves only to provide a data model and CBOR encoding for signal channel messages. A management data model is explicitly out of scope.
section: 3.2.2.2
topics:
