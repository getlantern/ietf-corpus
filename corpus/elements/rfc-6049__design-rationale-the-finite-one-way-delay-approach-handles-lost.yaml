document: rfc-6049
kind: design-rationale
summary: The Finite-One-way-Delay approach handles lost packets by reducing the event space to packets that actually arrive, computing conditional statistics rather than assigning infinite delay to losses. This avoids undefined outcomes while enabling valid mean calculations.
