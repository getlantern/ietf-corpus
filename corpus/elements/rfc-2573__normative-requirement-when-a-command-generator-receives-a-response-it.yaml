document: rfc-2573
kind: normative-requirement
summary: When a command generator receives a response, it MUST discard the response if the received values of messageProcessingModel, securityModel, securityName, contextEngineID, contextName, pduVersion, or request-id are not equal to those used in the original request.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
