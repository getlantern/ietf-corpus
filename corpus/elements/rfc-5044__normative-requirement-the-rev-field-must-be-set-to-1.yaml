document: rfc-5044
kind: normative-requirement
summary: The Rev field MUST be set to 1 by senders. If the receiver cannot interoperate with the received version, it MUST close the connection and report an error locally. MPA MUST provide the negotiated protocol version to DDP.
section: 7.1.1
rfc2119_level: MUST
topics:
