document: rfc-4090
kind: normative-requirement
summary: During facility backup ERO processing, before sending a Path message via a bypass tunnel, the PLR MUST remove all sub-objects preceding the first address belonging to the MP and replace this first MP address with an IP address of the MP, to avoid the MP rejecting the message due to a bad initial sub-object.
section: 6.4.4
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
