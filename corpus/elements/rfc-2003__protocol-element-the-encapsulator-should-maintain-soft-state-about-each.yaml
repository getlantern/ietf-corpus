document: rfc-2003
kind: protocol-element
summary: 'The encapsulator SHOULD maintain ''soft state'' about each tunnel it uses, including at minimum: the MTU of the tunnel, the TTL (path length) of the tunnel, and the reachability of the tunnel exit point. This state is updated from ICMP messages received from within the tunnel.'
