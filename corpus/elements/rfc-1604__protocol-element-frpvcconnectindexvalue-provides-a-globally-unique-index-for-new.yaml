document: rfc-1604
kind: protocol-element
summary: frPVCConnectIndexValue provides a globally unique index for new frPVCConnectTable entries. A returned value of 0 indicates no unassigned indices are available. After each retrieval the agent must advance the value to the next unassigned index.
