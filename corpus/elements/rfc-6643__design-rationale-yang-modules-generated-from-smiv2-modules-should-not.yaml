document: rfc-6643
kind: design-rationale
summary: YANG modules generated from SMIv2 modules should not be modified directly; changes must be made in the original SMIv2 module (updating LAST-UPDATED and REVISION) and the translation rerun. YANG augments and deviations on generated modules remain fully valid.
