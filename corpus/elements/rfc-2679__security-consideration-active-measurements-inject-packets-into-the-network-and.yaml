document: rfc-2679
kind: security-consideration
summary: Active measurements inject packets into the network and can harm it if measurement rates are too high, causing congestion or denial of service; conversely, routers may give measurement traffic different priority or an attacker may inject fake measurement traffic to skew results.
section: "6"
topics:
    - security
    - measurement
