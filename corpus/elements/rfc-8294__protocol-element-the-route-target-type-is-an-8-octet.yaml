document: rfc-8294
kind: protocol-element
summary: 'The route-target type is an 8-octet BGP extended community string identifying a set of sites in a BGP VPN. It supports four encoding formats: 0:2-octet-asn:4-octet-number, 1:4-octet-ipv4addr:2-octet-number, 2:4-octet-asn:2-octet-number, and 6:6-octet-mac-address, plus a generic hex pattern for future types.'
section: "3"
