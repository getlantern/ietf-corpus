document: rfc-6285
kind: normative-requirement
summary: Join time information (when RTP_Rx should send the SFGMP Join) MUST be conveyed in at least one RAMS-I message if the request is accepted. If the BRS cannot include it in the initial RAMS-I, it MUST send a subsequent RAMS-I message with this information.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
