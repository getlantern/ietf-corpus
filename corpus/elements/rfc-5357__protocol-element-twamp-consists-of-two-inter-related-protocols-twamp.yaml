document: rfc-5357
kind: protocol-element
summary: 'TWAMP consists of two inter-related protocols: TWAMP-Control, used to initiate, start, and stop test sessions over TCP, and TWAMP-Test, used to exchange test packets between Session-Sender and Session-Reflector over UDP. The Modes field and Command Number field are the two recognized extension mechanisms.'
