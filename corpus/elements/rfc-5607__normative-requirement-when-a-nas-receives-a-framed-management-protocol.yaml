document: rfc-5607
kind: normative-requirement
summary: When a NAS receives a Framed-Management-Protocol (133) Attribute in an Access-Accept packet, it MUST deliver that specified form of management access or disconnect the session. If the NAS does not support the provisioned protocol or the user-requested protocol does not match, the NAS MUST treat the Access-Accept as an Access-Reject.
section: "6.1"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
