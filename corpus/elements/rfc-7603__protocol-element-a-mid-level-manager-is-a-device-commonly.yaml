document: rfc-7603
kind: protocol-element
summary: A mid-level manager is a device (commonly a switch or proxy) that aggregates energy data reported by associated devices and forwards the aggregated data to an EnMS or a higher mid-level manager, irrespective of whether it powers those devices.
