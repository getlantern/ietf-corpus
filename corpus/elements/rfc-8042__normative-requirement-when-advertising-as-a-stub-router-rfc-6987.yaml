document: rfc-8042
kind: normative-requirement
summary: When advertising as a stub router (RFC 6987) on a two-part metric network, only the Router-to-Network metric in the stub router's Router-LSA links is set to MaxLinkMetric; the Network-to-Router metric is not affected.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
