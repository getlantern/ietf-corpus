document: rfc-8831
kind: normative-requirement
summary: Support for message interleaving as defined in RFC 8260 SHOULD be used. Until it is supported, the sender SHOULD limit maximum message size to 16 KB to avoid monopolization of the SCTP association.
section: "6.1"
rfc2119_level: SHOULD
topics:
