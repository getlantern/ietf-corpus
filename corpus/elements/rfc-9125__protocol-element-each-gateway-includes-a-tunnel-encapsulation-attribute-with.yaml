document: rfc-9125
kind: protocol-element
summary: Each gateway includes a Tunnel Encapsulation attribute with encapsulation information for all of the site's active gateways (including itself) in every route advertised externally. When the set of active gateways changes, each externally advertised route is re-advertised with a new Tunnel Encapsulation attribute reflecting the current set.
section: "3"
topics:
    - bgp
    - routing
