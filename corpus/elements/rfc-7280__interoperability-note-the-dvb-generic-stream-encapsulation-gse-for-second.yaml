document: rfc-7280
kind: interoperability-note
summary: The DVB Generic Stream Encapsulation (GSE) for second-generation DVB physical layers shares the same Type field format as ULE and therefore also uses the ULE Next-Header registry. RFC 7280 explicitly clarifies that the registry applies to both ULE and GSE.
section: "1"
topics:
    - registry
