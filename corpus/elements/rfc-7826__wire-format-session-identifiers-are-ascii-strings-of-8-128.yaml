document: rfc-7826
kind: wire-format
summary: Session identifiers are ASCII strings of 8–128 characters. The NPT time format uses either npt-hhmmss (hh:mm:ss[.fraction]) or npt-sec (seconds[.fraction], 1–19 digits). SMPTE timestamps use hours:minutes:seconds:frames.subframes format anchored at the start of the media clip.
