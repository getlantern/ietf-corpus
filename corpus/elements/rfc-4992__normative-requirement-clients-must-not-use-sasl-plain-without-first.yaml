document: rfc-4992
kind: normative-requirement
summary: Clients MUST NOT use SASL/PLAIN without first encrypting the TCP session (e.g., with TLS). Clients MUST implement SASL/PLAIN and TLS using the TLS_RSA_WITH_3DES_EDE_CBC_SHA cipher.
section: "14.1"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
