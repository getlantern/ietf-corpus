document: rfc-5802
kind: normative-requirement
summary: The characters ',' and '=' in usernames are sent as '=2C' and '=3D' respectively. If the server receives a username containing '=' not followed by '2C' or '3D', the server MUST fail the authentication.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
