document: rfc-5435
kind: normative-requirement
summary: If there are errors sending the notification, the Sieve interpreter SHOULD ignore the notification and not retry indefinitely. The interpreter MAY throttle notifications, silently ignoring requests when throttling.
section: "3.8"
rfc2119_level: SHOULD
