document: rfc-6425
kind: normative-requirement
summary: 'To identify a multicast LDP LSP under test, the echo request message MUST carry a Target FEC Stack TLV with exactly one of two new sub-TLVs: either a Multicast P2MP LDP FEC Stack sub-TLV or a Multicast MP2MP LDP FEC Stack sub-TLV.'
section: 3.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - multicast
