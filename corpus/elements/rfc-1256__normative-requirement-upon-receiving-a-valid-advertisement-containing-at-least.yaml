document: rfc-1256
kind: normative-requirement
summary: Upon receiving a valid advertisement containing at least one neighboring address with a preference level other than hex 80000000, a host MUST desist from sending any further solicitations on that interface until the next triggering event (startup, reinitialization, role change, or PerformRouterDiscovery change).
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
