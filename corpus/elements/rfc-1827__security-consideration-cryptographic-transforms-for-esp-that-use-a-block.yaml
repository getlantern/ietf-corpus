document: rfc-1827
kind: security-consideration
summary: Cryptographic transforms for ESP that use a block-chaining algorithm and lack a strong integrity mechanism are vulnerable to a cut-and-paste attack (Bellovin) and SHOULD NOT be used unless the Authentication Header is always present with packets using that ESP transform.
section: "6"
topics:
    - ipsec
    - vpn
    - security
    - crypto
