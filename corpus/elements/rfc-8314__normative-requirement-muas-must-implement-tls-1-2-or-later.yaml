document: rfc-8314
kind: normative-requirement
summary: MUAs MUST implement TLS 1.2 or later. Earlier TLS and SSL versions MAY also be supported, so long as the MUA requires at least TLS 1.1 when accessing accounts configured to impose minimum confidentiality requirements.
section: "5"
rfc2119_level: MUST
topics:
