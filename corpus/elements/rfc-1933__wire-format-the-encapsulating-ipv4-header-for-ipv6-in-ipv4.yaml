document: rfc-1933
kind: wire-format
summary: 'The encapsulating IPv4 header for IPv6-in-IPv4 uses: Version=4, IHL=5 (no options), TOS=0, Total Length = IPv6 payload length + 60, Protocol=41, source = outgoing interface IPv4 address, destination = tunnel endpoint IPv4 address. DF and MF flags are set per the MTU algorithm.'
