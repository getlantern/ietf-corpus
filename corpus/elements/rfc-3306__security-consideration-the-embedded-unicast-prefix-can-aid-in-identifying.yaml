document: rfc-3306
kind: security-consideration
summary: The embedded unicast prefix can aid in identifying the allocation domain of a multicast address. However, an allocation domain can avoid traceability by using a prefix not assigned to it or using a smaller scope embedded prefix — no enforcement mechanism is provided.
