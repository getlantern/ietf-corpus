document: rfc-6355
kind: interoperability-note
summary: DUID-UUID extends to DHCPv6 a capability already present in DHCPv4 via Client Machine Identifier Option (option 97, RFC 4578), which also embeds a UUID (GUID). This provides a consistent UUID-based identification mechanism across both DHCPv4 and DHCPv6.
section: "1"
topics:
