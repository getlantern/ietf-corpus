document: rfc-8279
kind: interoperability-note
summary: The BitStringLength Compatibility Check verifies that every BFR in a sub-domain has advertised support for the Imposition BitStringLength a BFIR intends to use. Failure indicates potential black holes; when it fails, the BFIR SHOULD log an error and may either proceed with the provisioned BitStringLength or fall back to a default BitStringLength that passes the check.
section: 6.10.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
