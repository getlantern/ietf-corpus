document: rfc-9540
kind: protocol-element
summary: For the "https" scheme, the presence of the "ohttp" parameter means the target is an Oblivious HTTP service accessible using the default "message/bhttp" media type. The parameter may be listed as mandatory (causing non-understanding clients to ignore the RR) or optional.
section: "4.1"
topics:
