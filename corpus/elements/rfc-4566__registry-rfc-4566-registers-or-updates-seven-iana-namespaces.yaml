document: rfc-4566
kind: registry
summary: 'RFC 4566 registers or updates seven IANA namespaces for SDP: media types (`audio`, `video`, `text`, `application`, `message`), transport protocols (`RTP/AVP`, `RTP/SAVP`, `udp`), media formats (`fmt`), attribute names (`att-field`), bandwidth specifiers (`CT`, `AS`), network types (`IN`), and address types (`IP4`, `IP6`).'
