document: rfc-5482
kind: normative-requirement
summary: If CHANGEABLE is false, USER_TIMEOUT MUST NOT be changed regardless of the received UTO option; TCP SHOULD nonetheless notify the application of the peer's advertised user timeout value.
section: "3.1"
rfc2119_level: MUST NOT
