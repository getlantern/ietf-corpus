document: rfc-9052
kind: interoperability-note
summary: 'RFC 9052 (together with RFC 9053) obsoletes RFC 8152. The original document was split: RFC 9052 covers structures and process, RFC 9053 covers algorithms. Implementations targeting RFC 8152 must also understand that the counter signature algorithm (label 7 from RFC 8152) must still be recognized for backwards compatibility with RFC 8152 senders.'
section: "1.2"
topics:
    - cbor
    - crypto
