document: rfc-8044
kind: wire-format
summary: The 'tlv' data type (value 13) encodes a Type-Length-Value as a 1-octet TLV-Type, 1-octet TLV-Length (MUST be 3–255), and one or more octets of TLV-Data. TLV-Data MUST NOT contain concat, vsa, extended, long-extended, or evs types.
