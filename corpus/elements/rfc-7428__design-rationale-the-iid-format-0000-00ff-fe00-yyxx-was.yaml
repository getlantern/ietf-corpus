document: rfc-7428
kind: design-rationale
summary: 'The IID format 0000:00ff:fe00:YYXX was chosen to enable efficient IPv6 header compression: the fixed pattern allows addresses to be reconstructed from the 8-bit NodeID alone, minimizing over-the-air bytes in constrained G.9959 networks.'
