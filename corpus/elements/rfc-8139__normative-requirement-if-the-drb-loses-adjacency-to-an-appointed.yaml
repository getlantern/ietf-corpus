document: rfc-8139
kind: normative-requirement
summary: If the DRB loses adjacency to an appointed Appointed Forwarder and native traffic from that forwarder still needs handling, the DRB SHOULD immediately appoint another forwarder or itself become the forwarder for that traffic.
section: "2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
