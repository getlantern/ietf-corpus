document: rfc-3492
kind: protocol-element
summary: 'Mixed-case annotation (Appendix A): when extended strings are case-folded before encoding, the last basic code point in each delta''s encoding annotates the case preference (uppercase if the basic code point is uppercase, lowercase otherwise) for the corresponding non-basic code point. These annotations are returned separately and do not alter decoded code point values. This feature is not used by IDNA ToASCII/ToUnicode.'
section: A
