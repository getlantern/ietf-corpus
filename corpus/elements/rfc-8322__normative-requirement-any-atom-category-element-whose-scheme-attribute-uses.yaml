document: rfc-8322
kind: normative-requirement
summary: Any atom:category element whose scheme attribute uses an unregistered scheme MUST be considered 'Private Use'. Implementations encountering such a category MUST parse the content without error but MAY otherwise ignore the element.
section: "7.1"
rfc2119_level: MUST
topics:
