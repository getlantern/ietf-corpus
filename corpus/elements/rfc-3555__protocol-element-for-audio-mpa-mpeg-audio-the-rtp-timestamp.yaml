document: rfc-3555
kind: protocol-element
summary: For audio/MPA (MPEG audio), the RTP timestamp clock rate is always 90000 Hz regardless of the audio sample rate; the 'channels' parameter does not apply, and the selected layer, sampling rate, and mode are signaled in-band in the payload.
