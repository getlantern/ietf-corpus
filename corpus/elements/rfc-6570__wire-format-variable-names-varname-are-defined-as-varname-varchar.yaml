document: rfc-6570
kind: wire-format
summary: 'Variable names (varname) are defined as: varname = varchar *( ["."] varchar ); varchar = ALPHA / DIGIT / "_" / pct-encoded. Variable names are case-sensitive. Pct-encoded triplets within a varname are not decoded and are treated as part of the name.'
section: "2.3"
