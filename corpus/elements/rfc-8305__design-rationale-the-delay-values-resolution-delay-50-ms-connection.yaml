document: rfc-8305
kind: design-rationale
summary: The delay values (Resolution Delay 50 ms, Connection Attempt Delay 250 ms, Minimum 100 ms, Maximum 2 s, Last Resort Local Synthesis Delay 2 s) were determined empirically by measuring timing of connections on a very wide set of production devices, chosen to reduce user-visible wait times while minimizing network load. These values are expected to increase over time as IPv6 reliability improves.
