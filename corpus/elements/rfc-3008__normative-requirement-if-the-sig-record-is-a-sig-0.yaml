document: rfc-3008
kind: normative-requirement
summary: If the SIG record is a SIG(0) protecting a message, the name type of the associated KEY SHOULD be 00 (user) or 10 (host/entity). Zone keys SHOULD NOT generate SIG(0) records, as transactions are initiated by a host or user, not a zone.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
