document: rfc-7781
kind: normative-requirement
summary: OAM packets MUST NOT use the pseudo-nickname as the ingress nickname except when responding to an OAM message that used the RBv's pseudo-nickname as the egress nickname. Using the pseudo-nickname in originated OAM messages would cause responses to be delivered to an arbitrary member RBridge.
section: "10"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
