document: rfc-2210
kind: wire-format
summary: 'The Guaranteed Service FLOWSPEC is 11 32-bit words with service_number=2 in its per-service header. It carries a Token Bucket TSpec (parameter 127, words 3-8: [r], [b], [p], [m], [M]) plus a Guaranteed Service RSpec (parameter 130, words 9-11) containing Rate [R] (IEEE 32-bit float) and Slack Term [S] (32-bit int).'
