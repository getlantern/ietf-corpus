document: rfc-8194
kind: security-consideration
summary: The /lmap/schedules subtree is writable by the Controller; unauthorized write access can cause unwanted load on the device or network, or direct measurement traffic to targets that become victims of an attack. The /lmap/suppressions subtree can either disable legitimate measurements or trigger unauthorized ones.
section: "5"
topics:
    - yang
    - security
    - measurement
