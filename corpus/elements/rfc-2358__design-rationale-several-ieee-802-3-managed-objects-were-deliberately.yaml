document: rfc-2358
kind: design-rationale
summary: Several IEEE 802.3 managed objects were deliberately removed from the MIB (including aFramesWithExcessiveDeferral, aInRangeLengthErrors, aMACEnableStatus, acInitializeMAC) based on implementation feedback documented in RFC 1369. The rationale was that these objects proved impractical or redundant in deployed implementations.
