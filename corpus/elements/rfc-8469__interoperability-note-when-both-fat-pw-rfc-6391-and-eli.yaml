document: rfc-8469
kind: interoperability-note
summary: When both FAT PW (RFC 6391) and ELI/EL (RFC 6790) are available, either may be used for ECMP; using both on the same PW simultaneously is not normally necessary and should be avoided. OAM path-following considerations apply to both methods as described in their respective RFCs.
