document: rfc-5643
kind: protocol-element
summary: ospfv3ExitOverflowInterval specifies in seconds how long after entering Overflow state before the router attempts to leave it and re-originate non-default AS-External-LSAs. A value of 0 means the router will not leave Overflow state until restarted.
section: "5"
