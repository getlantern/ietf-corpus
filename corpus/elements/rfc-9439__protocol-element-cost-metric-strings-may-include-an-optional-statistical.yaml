document: rfc-9439
kind: protocol-element
summary: 'Cost metric strings may include an optional statistical operator suffix appended with a colon ('':''). Valid operators are: ''cur'' (current), percentile (''p'' followed by a number in [0,100]), ''min'', ''max'', ''median'', ''mean'', ''stddev'', ''stdvar''. The total cost metric string MUST NOT exceed 32 characters as required by RFC 7285.'
section: "3.2"
topics:
    - json
