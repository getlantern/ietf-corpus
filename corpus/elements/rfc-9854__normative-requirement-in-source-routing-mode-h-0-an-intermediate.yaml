document: rfc-9854
kind: normative-requirement
summary: In source-routing mode (H=0), an intermediate router propagating an RREQ-DIO MUST append its receiving interface address to the Address Vector and MUST also append the transmitting interface address if it differs from the receiving interface address.
section: 6.2.5
rfc2119_level: MUST
topics:
    - routing
