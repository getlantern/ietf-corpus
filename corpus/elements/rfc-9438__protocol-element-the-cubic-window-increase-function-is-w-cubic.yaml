document: rfc-9438
kind: protocol-element
summary: The CUBIC window increase function is W_cubic(t) = C*(t−K)^3 + W_max, where t is elapsed time from the start of the current congestion avoidance stage, K is the time to grow back to W_max, C is the aggressiveness constant, and W_max is the window at the last congestion event.
section: "4.2"
topics:
    - congestion
    - tcp
    - quic
