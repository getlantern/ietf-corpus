document: rfc-9209
kind: design-rationale
summary: The Proxy-Status List is ordered with the intermediary closest to the origin first and the one closest to the user agent last, mirroring the natural inbound-to-outbound flow of the proxy chain. This ordering was chosen so that appending a new entry is a simple list append, and the full chain can be reconstructed in request-processing order.
section: "2"
topics:
