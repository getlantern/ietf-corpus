document: rfc-8528
kind: design-rationale
summary: Schema mount supports only implementation-time and run-time schema specification, not design-time mounts. Design-time mounts (where the mounted schema is fixed in the parent YANG module itself) are explicitly out of scope, left for a possible future YANG language revision.
section: "1"
topics:
    - yang
    - netconf
