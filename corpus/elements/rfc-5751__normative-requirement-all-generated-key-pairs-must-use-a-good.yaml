document: rfc-5751
kind: normative-requirement
summary: All generated key pairs MUST use a good source of non-deterministic random input and the private key MUST be protected securely. An S/MIME agent MUST NOT generate RSA or DSA keys less than 512 bits.
section: "4.1"
rfc2119_level: MUST
topics:
    - crypto
    - email
    - security
