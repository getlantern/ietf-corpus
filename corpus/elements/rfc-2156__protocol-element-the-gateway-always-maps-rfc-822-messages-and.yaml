document: rfc-2156
kind: protocol-element
summary: The gateway always maps RFC 822 messages and associated SMTP information to an X.400 IPM (using MTA, MTS, and IPMS Services), and Delivery Status Notifications to X.400 Reports. Going X.400 to RFC 822, IPMs and IPNs map to RFC 822 messages; Reports map to delivery status notifications. Probes are serviced by the gateway itself.
section: 1.5.3
topics:
