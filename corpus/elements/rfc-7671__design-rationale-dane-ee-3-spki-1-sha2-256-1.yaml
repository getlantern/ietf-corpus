document: rfc-7671
kind: design-rationale
summary: DANE-EE(3) SPKI(1) SHA2-256(1) is recommended as the preferred TLSA record type because SPKI(1) is compatible with raw public keys, the record survives certificate renewals with the same key, SHA2-256 is universally required, and it simplifies virtual hosting with a single certificate for all domains.
