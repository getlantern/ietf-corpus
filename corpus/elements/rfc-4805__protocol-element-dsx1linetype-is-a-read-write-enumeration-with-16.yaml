summary: dsx1LineType is a read-write enumeration with 16 values covering DS1-ESF (T1.107), D4, E1 with/without CRC, E1 with/without multiframing, unframed variants, DS2-M12, E2, E1-Q50 with/without CRC, J1-ESF (JT-G704/JT-G706/JT-I431), and J1-Unframed. It determines line speed and interpretation of usage and error statistics.
