document: rfc-9664
kind: design-rationale
summary: KEY RRs are given a separate lease duration (KEY-LEASE) because they are used in the DNS-SD Service Registration Protocol (RFC 9665) to reserve a name when the service is not present, requiring a potentially longer lifetime than other RRs.
