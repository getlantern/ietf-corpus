document: rfc-6148
kind: security-consideration
summary: A query by Remote ID returns consolidated lease-binding information for all nodes behind a connection. If performed by an unauthorized source, this could expose significant lease-binding data. Implementations MUST deploy DHCP message authentication per RFC 3118 to prevent unauthorized lease queries.
section: "6"
topics:
    - security
