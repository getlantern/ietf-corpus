document: rfc-9421
kind: protocol-element
summary: The req Boolean parameter on a component identifier indicates that the value is derived from the request that triggered a response, not from the response itself. This allows a response signature to bind to request components (e.g., method, path, Content-Digest). The req parameter MUST NOT be used in any component in a signature targeting a request message.
section: "2.4"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
