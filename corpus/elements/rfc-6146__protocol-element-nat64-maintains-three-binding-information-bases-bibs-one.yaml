document: rfc-6146
kind: protocol-element
summary: NAT64 maintains three Binding Information Bases (BIBs) — one each for TCP, UDP, and ICMP Queries. Each BIB entry maps an IPv6 transport address (or IPv6 address plus ICMP Identifier) to an IPv4 transport address owned by the NAT64. A given IPv6 or IPv4 transport address may appear in at most one entry per BIB.
section: "3.1"
topics:
