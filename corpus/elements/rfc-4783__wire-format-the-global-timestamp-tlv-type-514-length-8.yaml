document: rfc-4783
kind: wire-format
summary: The GLOBAL_TIMESTAMP TLV (Type 514, Length 8) contains a 32-bit unsigned fixed-point integer representing seconds since 00:00:00 UT on 1 January 1970. It MAY include leap seconds and SHOULD match the timestamp used in Management Plane alarm reports.
section: 3.1.1
