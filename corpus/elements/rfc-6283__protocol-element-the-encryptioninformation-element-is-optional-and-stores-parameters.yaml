document: rfc-6283
kind: protocol-element
summary: The <EncryptionInformation> element is optional and stores parameters of encryption methods used for archive data. Its <EncryptionInformationType> stores the type of encryption information (e.g., algorithm or key) and <EncryptionInformationValue> holds the actual data.
