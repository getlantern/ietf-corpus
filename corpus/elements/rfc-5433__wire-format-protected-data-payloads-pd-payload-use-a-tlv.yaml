document: rfc-5433
kind: wire-format
summary: 'Protected Data payloads (PD_Payload) use a TLV structure: 4-octet PData/Vendor, 2-octet PData/Specifier, 2-octet PData/Length (value only, excluding type and length fields), followed by PData/Value. Multiple PD_Payloads are concatenated into a PD_Payload_Block.'
section: "9.4"
