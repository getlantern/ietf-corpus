document: rfc-3010
kind: normative-requirement
summary: The transport used by RPC for NFS version 4 MUST provide congestion control comparable to TCP as defined in RFC 2581. If TCP is available, NFS version 4 SHOULD be supported over TCP.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
