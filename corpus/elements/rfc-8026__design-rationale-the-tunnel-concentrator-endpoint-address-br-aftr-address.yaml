document: rfc-8026
kind: design-rationale
summary: The tunnel concentrator endpoint address (BR/AFTR address) must be different for each softwire mechanism to ensure correct operation, even though the client's IPv6 addresses may overlap across mechanisms. This is because the BR/AFTR address uniquely identifies which mechanism is being served.
section: "2.1"
topics:
    - v6ops
    - ip
