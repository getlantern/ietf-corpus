document: rfc-1766
kind: design-rationale
summary: Language tag codes are always expressible in the US-ASCII character repertoire (a-z), which is present in most character sets. The question of selecting a character set rendering based solely on a language tag is not addressed, as it is considered impossible to resolve correctly in all cases (e.g., mixed Japanese-Chinese text).
section: "7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
