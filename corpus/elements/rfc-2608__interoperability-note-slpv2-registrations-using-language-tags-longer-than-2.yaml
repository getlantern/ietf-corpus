document: rfc-2608
kind: interoperability-note
summary: SLPv2 registrations using Language Tags longer than 2 characters are inaccessible to SLPv1 UAs. SLPv2 DAs MUST NOT return abstract service type strings in SrvTypeRply messages to SLPv1 clients, and SLPv1 requests by abstract service type do not match abstract service URLs.
