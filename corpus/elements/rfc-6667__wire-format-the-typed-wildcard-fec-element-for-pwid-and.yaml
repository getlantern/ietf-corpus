summary: 'The Typed Wildcard FEC Element for PWid and Generalized PWid is encoded as: Typed Wcard field (1 octet, value 0x05), Type field (1 octet, 0x80 for PWid or 0x81 for Generalized PWid), Len field (1 octet, value 2), followed by a reserved R bit and a 15-bit PW type field, totaling 5 octets.'
