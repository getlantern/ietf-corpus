document: rfc-6626
kind: normative-requirement
summary: If one or more network acknowledgement extensions are included with Code set to 'Success', the Mobile Router SHOULD treat the prefixes in the corresponding Prefix fields as allocated prefixes and create the appropriate bindings as defined in RFC5177.
