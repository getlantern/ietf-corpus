document: rfc-9136
kind: protocol-element
summary: An Overlay Index is an identifier (ESI, IP address, or MAC address in the tenant address space) carried in the RT-5 and used by an NVE as the next hop for a given IP prefix, requiring recursive resolution at the installing NVE/PE to find the egress NVE. Recursive resolution applies upon IP-VRF installation, not upon BGP propagation.
section: "3.2"
topics:
    - routing
    - bgp
