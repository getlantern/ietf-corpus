document: rfc-3731
kind: normative-requirement
summary: Date and time attribute values MUST be represented in UTC using the Gregorian calendar. The extended date-time form using upper case 'T' and 'Z' characters defined in RFC3339 MUST be used; time zone offset identifiers MUST NOT be used with EPP.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
