summary: 'This update applies not only to RTP/AVP but also to profiles that build upon it: RTP/SAVP (RFC 3711), RTP/AVPF (RFC 4585), and RTP/SAVPF (RFC 5124). All of these profiles inherit the revised codec recommendation.'
