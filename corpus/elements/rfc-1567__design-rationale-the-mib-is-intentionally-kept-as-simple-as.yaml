document: rfc-1567
kind: design-rationale
summary: The MIB is intentionally kept as simple as possible, divided into exactly three tables (dsaOpsTable, dsaEntriesTable, dsaIntTable) covering operations statistics, entry/cache statistics, and peer-DSA interaction respectively. Static DSA information is accessed via references to Directory Distinguished Names rather than being replicated into the MIB.
