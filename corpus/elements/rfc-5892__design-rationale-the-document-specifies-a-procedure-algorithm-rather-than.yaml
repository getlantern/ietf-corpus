document: rfc-5892
kind: design-rationale
summary: The document specifies a procedure (algorithm) rather than a static table of code points, so the derived property can be computed for any Unicode version including characters added after Unicode 5.2. Changes in Unicode properties that do not affect the algorithm output do not affect IDN code point status.
