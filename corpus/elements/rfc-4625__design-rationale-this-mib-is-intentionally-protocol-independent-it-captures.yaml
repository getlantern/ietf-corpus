document: rfc-4625
kind: design-rationale
summary: 'This MIB is intentionally protocol-independent: it captures routing table state usable regardless of whether FSPF or another routing protocol populates the table. Protocol-specific management objects (e.g., FSPF parameters) are left to RFC 4626.'
