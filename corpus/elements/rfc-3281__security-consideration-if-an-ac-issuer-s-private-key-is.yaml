document: rfc-3281
kind: security-consideration
summary: If an AC issuer's private key is compromised, all ACs it issued MUST be revoked. AC issuers should use tamper-resistant cryptographic modules and separation of duties. The freshness of revocation status directly affects the assurance of long-lived ACs; untimely or unavailable revocation information reduces binding assurance.
section: "8"
topics:
    - pkix
    - security
    - crypto
