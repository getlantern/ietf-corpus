document: rfc-2025
kind: interoperability-note
summary: SPKM data formats and procedures are designed to be as similar to the Kerberos V5 GSS-API mechanism as practical, to ease implementation in environments where Kerberos is already deployed. SPKM can serve as a drop-in replacement for any application using GSS-API.
section: "1"
topics:
