document: rfc-9825
kind: security-consideration
summary: The ietf-ospf-admin-tags YANG module must be accessed via YANG-based management protocols (NETCONF, RESTCONF) using a secure transport layer (SSH, TLS, QUIC) and mutual authentication. NACM (RFC 8341) should restrict write access to sensitive nodes such as local-prefix-admin-tags and area range admin-tags.
section: "8"
topics:
