document: rfc-9179
kind: interoperability-note
summary: KML 2.2/2.3 location values can be mapped bidirectionally to the YANG grouping when using supported altitude modes ('clampToGround' or 'absolute'). The relative height cases ('relativeToGround', 'relativeToSeaFloor') are not directly supported; applications must convert to absolute height before using the YANG grouping.
section: 5.1.4
topics:
    - yang
    - netconf
