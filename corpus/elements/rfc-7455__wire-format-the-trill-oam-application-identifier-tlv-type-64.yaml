document: rfc-7455
kind: wire-format
summary: 'The TRILL OAM Application Identifier TLV (Type 64, Length 9) contains: Version (1 octet), Reserved1 (3 octets), Fragment-ID (1 octet, reply only), Return Code (1 octet), Return Sub-code (1 octet), Reserved2 (12 bits), F (Final), C (Cross-Connect Error), O (out-of-band reply requested), and I (in-band reply requested) flags.'
section: 8.4.3
