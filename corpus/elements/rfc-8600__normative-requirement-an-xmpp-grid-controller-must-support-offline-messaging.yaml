document: rfc-8600
kind: normative-requirement
summary: An XMPP-Grid Controller MUST support 'offline messaging' delivery semantics as specified in RFC 6121 (using the XMPP <message/> stanza) to ensure messages are delivered to Consumers that are not online at publication time.
