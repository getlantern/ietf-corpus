document: rfc-9575
kind: normative-requirement
summary: The Observer MUST perform validation of the data being received in Broadcast RID. When correlation of different data streams does not match within acceptable thresholds, the data MUST be rejected as if the signature failed to validate.
section: 6.4.2
rfc2119_level: MUST
topics:
