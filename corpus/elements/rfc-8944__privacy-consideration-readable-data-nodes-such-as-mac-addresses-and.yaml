document: rfc-8944
kind: privacy-consideration
summary: 'Readable data nodes such as MAC addresses and VLAN/VXLAN identifiers are sensitive. Unrestricted read access (via get, get-config, or notifications) can lead to privacy violations: MAC addresses enable monitoring of device movements and can be used to derive physical location information, bypassing OS-level location protections. Read access MUST be controlled via NACM.'
section: "6"
topics:
    - privacy
    - security
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
