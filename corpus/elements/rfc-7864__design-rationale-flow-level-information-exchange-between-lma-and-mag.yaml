document: rfc-7864
kind: design-rationale
summary: Flow-level information exchange between LMA and MAG is not mandated; the specification only requires the LMA to maintain per-flow state (FMC). Flow-level signaling is defined as optional for cases where the MAG needs to associate flows with QoS paths or inform the MN.
section: "3.4"
