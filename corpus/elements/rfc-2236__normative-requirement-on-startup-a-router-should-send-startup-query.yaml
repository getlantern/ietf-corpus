document: rfc-2236
kind: normative-requirement
summary: On startup, a router SHOULD send [Startup Query Count] General Queries spaced closely together [Startup Query Interval] to quickly and reliably determine membership information. A General Query is addressed to 224.0.0.1 with Group Address field of 0.
