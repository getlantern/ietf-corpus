document: rfc-3016
kind: design-rationale
summary: Fragmentation rules are designed to be flexible to accommodate MPEG-4 Visual's wide range of networks, avoiding overly rigid rules (e.g., one video packet per RTP packet always) while still preventing meaningless fragmentation that would hurt error resiliency.
