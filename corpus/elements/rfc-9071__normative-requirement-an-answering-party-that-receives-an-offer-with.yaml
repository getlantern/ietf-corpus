document: rfc-9071
kind: normative-requirement
summary: An answering party that receives an offer with 'rtt-mixer' and is willing to use the method SHALL echo the attribute in the answer; if the offer did not contain 'rtt-mixer', the answer MUST NOT contain it. An answer MUST NOT accept more than one multiparty method in the same RTP session.
section: 2.3.2
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
