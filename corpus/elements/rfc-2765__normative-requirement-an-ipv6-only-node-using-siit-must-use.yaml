document: rfc-2765
kind: normative-requirement
summary: An IPv6-only node using SIIT MUST use an IPv4-translatable address as its source address when the destination is an IPv4-mapped address. An IPv4-translatable address MUST NOT be used with other forms of IPv6 destination addresses.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
