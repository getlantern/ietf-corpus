document: rfc-727
kind: interoperability-note
summary: 'The auto-logout warning mechanism cannot be gamed indefinitely: a server is not prevented from logging out the user process if inactivity continues even after the user repeatedly sends DON''T LOGOUT in response to WILL LOGOUT warnings.'
section: "6"
topics:
