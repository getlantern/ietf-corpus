document: rfc-2165
kind: protocol-element
summary: Transaction IDs (XIDs) are created from a random initial seed and incremented by one per new request. Retransmitted datagrams reuse the same XID so that DAs and SAs can return a cached reply on duplicate requests, avoiding double-processing.
section: "4.1"
