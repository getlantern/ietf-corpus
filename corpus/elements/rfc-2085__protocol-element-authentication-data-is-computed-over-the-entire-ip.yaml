document: rfc-2085
kind: protocol-element
summary: Authentication data is computed over the entire IP datagram. Fields that are variant during transit and the authentication data field itself must contain all zeros prior to computation. The Replay Prevention field, if present, is included in the calculation.
section: "2.2"
topics:
    - ipsec
    - crypto
