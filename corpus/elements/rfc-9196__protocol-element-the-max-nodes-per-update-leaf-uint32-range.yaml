document: rfc-9196
kind: protocol-element
summary: The max-nodes-per-update leaf (uint32, range 1..max) specifies the maximum number of data nodes that can be sent in a single update. The publisher MAY support more but SHOULD support at least this number; it can be used to avoid the 'update-too-big' error during subscription.
section: "5.2"
