document: rfc-2334
kind: normative-requirement
summary: When an LS receives a CSU Request with a CSA Sequence Number smaller than its cached entry's sequence number, the LS MUST acknowledge using the CSAS Record from its own cache (not from the incoming request), so the DCS is corrected to the newer state.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
