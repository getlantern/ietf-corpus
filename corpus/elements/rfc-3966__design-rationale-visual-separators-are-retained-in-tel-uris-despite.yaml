document: rfc-3966
kind: design-rationale
summary: Visual separators are retained in tel URIs despite complicating comparisons, following RFC 2396's principle that URIs are easier for people to remember when they consist of meaningful components. However, spaces are prohibited to avoid excessive percent-encoding.
section: 5.1.1
topics:
    - sip
    - realtime
    - voip
