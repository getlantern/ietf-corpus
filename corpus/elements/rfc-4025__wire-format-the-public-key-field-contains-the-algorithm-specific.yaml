document: rfc-4025
kind: wire-format
summary: The public key field contains the algorithm-specific portion of the KEY RR RDATA (everything after the first four octets). RSA keys have no length limit beyond the 65535-octet two-octet-length-encoding ceiling; this extension applies only to IPSECKEY, not KEY RRs.
