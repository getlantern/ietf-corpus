document: rfc-2086
kind: protocol-element
summary: The SETACL command changes the ACL on a specified mailbox for a given identifier. The third argument is an access right modification string with an optional '+' (add rights), '-' (remove rights), or no prefix (replace rights), followed by zero or more rights characters.
section: "4.1"
