document: rfc-3270
kind: wire-format
summary: 'The RSVP DIFFSERV object for an E-LSP (class=65, C_Type=1) consists of a 32-bit header with 28 reserved bits and a 4-bit MAPnb field (0–8 entries), followed by up to 8 MAP entries each 32 bits wide encoding: 13 reserved bits, a 3-bit EXP field, and a 16-bit PHBID field (encoded per RFC 3140).'
