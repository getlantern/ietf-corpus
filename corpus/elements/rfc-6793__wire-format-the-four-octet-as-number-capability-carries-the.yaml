document: rfc-6793
kind: wire-format
summary: The four-octet AS number capability carries the BGP speaker's AS number as a 4-octet entity in the Capability Value field; the Capability Length is set to 4. Between NEW BGP speakers, each AS number in AS_PATH and AGGREGATOR is encoded as a four-octet entity rather than the legacy two-octet encoding.
