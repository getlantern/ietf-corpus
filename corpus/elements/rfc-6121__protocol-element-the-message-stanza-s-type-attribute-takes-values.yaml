document: rfc-6121
kind: protocol-element
summary: 'The <message/> stanza''s ''type'' attribute takes values: ''chat'' (one-to-one session), ''normal'' (standalone, default), ''groupchat'' (multi-user room), ''headline'' (alerts/notifications), or ''error''; the <body/> child carries human-readable message content.'
section: 5.2.2
