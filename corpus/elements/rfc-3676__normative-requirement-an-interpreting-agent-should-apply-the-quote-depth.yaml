document: rfc-3676
kind: normative-requirement
summary: 'An interpreting agent SHOULD apply the ''quote-depth-wins'' rule for improperly formatted messages: if a flowed line is followed by a line of different quote depth, the flowed line is treated as the last line of its paragraph.'
section: "4.5"
rfc2119_level: SHOULD
