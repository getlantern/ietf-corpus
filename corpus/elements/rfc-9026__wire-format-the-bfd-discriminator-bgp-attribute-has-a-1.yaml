document: rfc-9026
kind: wire-format
summary: The BFD Discriminator BGP attribute has a 1-octet BFD Mode field, followed by a 4-octet BFD Discriminator field, followed by optional variable-length TLVs. The attribute is considered malformed if its total length is smaller than 11 octets.
