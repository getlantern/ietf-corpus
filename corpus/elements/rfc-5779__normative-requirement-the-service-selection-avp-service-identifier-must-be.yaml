document: rfc-5779
kind: normative-requirement
summary: The Service-Selection AVP service identifier MUST be unique within the PMIPv6 Domain. If the MAG receives service selection information from the MN via a lower-layer mechanism, the MAG MUST include the Service-Selection AVP in MAG-to-HAAA request messages.
section: "5.8"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
