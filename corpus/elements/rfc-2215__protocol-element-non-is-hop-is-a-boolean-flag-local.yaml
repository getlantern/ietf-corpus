document: rfc-2215
kind: protocol-element
summary: 'NON_IS_HOP is a boolean flag: local parameter_number 1 is set to 1 if the element does not implement the relevant QoS control service or knows of a break in the service chain; composed parameter_number 2 uses the OR rule, so a composed value of 1 at the endpoint indicates at least one non-IS hop along the path.'
section: "3.1"
