document: rfc-9549
kind: protocol-element
summary: 'Two email addresses with ASCII-only local-parts match if: (1) the local-parts are an exact match, AND (2) the host-parts match using case-insensitive ASCII comparison. The same matching rule applies when the local-part contains non-ASCII characters.'
