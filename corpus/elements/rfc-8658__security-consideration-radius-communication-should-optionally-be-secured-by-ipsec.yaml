document: rfc-8658
kind: security-consideration
summary: RADIUS communication should optionally be secured by IPsec (RFC 4301) or TLS (RFC 6614). The Message-Authenticator attribute (type 80, RFC 2869) should be used to protect both Access-Request and Access-Accept messages in the softwire configuration flow.
section: "6"
topics:
    - security
    - radius
    - tls
    - ipsec
