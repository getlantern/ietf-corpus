document: rfc-7843
kind: design-rationale
summary: The THIRD_PARTY_ID field is intentionally deployment-specific with no fixed semantics—it can hold any value agreed upon by PCP client and server, such as an L2TPv3 session ID or MPLS label. Variable length (up to 1016 octets) was chosen to accommodate diverse identifier types; Mohamed Boucadair suggested this variable length approach.
