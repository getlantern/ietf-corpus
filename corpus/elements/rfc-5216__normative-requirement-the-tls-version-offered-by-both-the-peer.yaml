document: rfc-5216
kind: normative-requirement
summary: The TLS version offered by both the peer (client_hello) and the server (server_hello) MUST correspond to TLS v1.0 or later. EAP-TLS implementations MUST support TLS v1.0.
section: 2.1.1
rfc2119_level: MUST
