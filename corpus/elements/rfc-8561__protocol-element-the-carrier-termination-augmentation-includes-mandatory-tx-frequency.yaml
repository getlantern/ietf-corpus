document: rfc-8561
kind: protocol-element
summary: The Carrier Termination augmentation includes mandatory tx-frequency (uint32, kHz) and a mandatory choice between rx-frequency (uint32, kHz) or duplex-distance (int32, kHz) to determine the receive frequency. The actual-rx-frequency and actual-duplex-distance are read-only computed state leaves.
