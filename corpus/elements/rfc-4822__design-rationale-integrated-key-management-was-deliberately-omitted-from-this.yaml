document: rfc-4822
kind: design-rationale
summary: Integrated key management was deliberately omitted from this specification to avoid having to change all RIPv2 implementations if a flaw in a key management protocol is discovered later; the Key-ID field serves as a hook for a future standardized key management protocol.
section: "3.1"
topics:
    - routing
    - security
