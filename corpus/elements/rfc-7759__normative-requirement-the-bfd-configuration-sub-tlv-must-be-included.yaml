document: rfc-7759
kind: normative-requirement
summary: The BFD Configuration sub-TLV MUST be included in the MPLS Echo Request if either the CC (C), CV (V), or both OAM Function flags are set. If the Integrity (I) flag is set and no BFD Authentication sub-TLV is present, authentication MUST use Keyed SHA1 with an empty (all-zero) pre-shared key.
section: 2.2.1
rfc2119_level: MUST
topics:
    - mpls
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
