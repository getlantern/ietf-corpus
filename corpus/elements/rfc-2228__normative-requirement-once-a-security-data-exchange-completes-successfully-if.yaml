document: rfc-2228
kind: normative-requirement
summary: Once a security data exchange completes successfully, if the mechanism supports integrity, integrity protection via MIC or ENC commands (and 631 or 632 replies) MUST be used on the control channel until a successful CCC command is issued. If the CCC command is not integrity-protected, the server MUST respond with 533.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
