document: rfc-8928
kind: protocol-element
summary: 'The NDPSO signature is computed over: the 128-bit CGA Message Type tag, the CIPO, the 16-byte Target Address, the NonceLR, the NonceLN, and the 1-byte EARO option length — concatenated in that order and signed with the private key using the algorithm indicated by Crypto-Type.'
