document: rfc-3518
kind: design-rationale
summary: The Bridge Control Packet Indicator bit was added (a new BCP option from RFC 2878) to give bridge control packets (STP BPDUs, GARP PDUs) preferential forwarding treatment analogous to IP precedence values 6-7 for routing protocol updates, preventing topology instability from delayed control traffic.
section: "3.5"
extracted_by: claude-sonnet-4-6
