document: rfc-1730
kind: normative-requirement
summary: If a server has an inactivity autologout timer, that timer MUST be of at least 30 minutes' duration. Receipt of any command from the client during that interval should suffice to reset the timer.
section: "5.4"
rfc2119_level: MUST
topics:
    - email
