document: rfc-9530
kind: interoperability-note
summary: When a response includes Content-Location, Repr-Digest is computed on the selected representation of the resource identified by Content-Location, not necessarily the target URI of the request. The Location header field does not affect Repr-Digest computation because it is not representation metadata.
section: "3.2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
