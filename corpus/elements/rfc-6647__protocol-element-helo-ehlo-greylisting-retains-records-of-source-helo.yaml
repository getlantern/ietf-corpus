document: rfc-6647
kind: protocol-element
summary: HELO/EHLO greylisting retains records of (source, HELO/EHLO parameter) tuples. A 4yz reply is returned to all commands for the remainder of the SMTP session if the tuple is new or has not reached a configured minimum age.
