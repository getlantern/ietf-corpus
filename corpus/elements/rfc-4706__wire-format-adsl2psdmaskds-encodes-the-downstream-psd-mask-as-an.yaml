summary: 'Adsl2PsdMaskDs encodes the downstream PSD mask as an OCTET STRING (SIZE 0..96) of up to 32 breakpoints; each breakpoint occupies 3 octets: 2 octets for sub-carrier index and 1 octet for PSD reduction (0–255 in units of 0.5 dBm/Hz).'
