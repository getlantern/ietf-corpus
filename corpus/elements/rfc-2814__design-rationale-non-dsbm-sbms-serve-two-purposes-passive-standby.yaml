document: rfc-2814
kind: design-rationale
summary: 'Non-DSBM SBMs serve two purposes: passive standby fault tolerance enabling re-election when the active DSBM fails, and division of the DSBM election scope so that physically distinct segments each have their own DSBM with accurate capacity knowledge, improving admission control efficiency over a single approximating DSBM.'
