document: rfc-9475
kind: design-rationale
summary: Without the "msgi" extension, a PASSporT in a SIP MESSAGE request offers no protection to message content and would be vulnerable to cut-and-paste attacks where the Identity header from a legitimate request is reused in a request for a different user.
section: "3.2"
topics:
    - sip
    - security
