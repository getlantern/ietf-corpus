document: rfc-7678
kind: protocol-element
summary: The Tunnel-Source-Pref-Or-Addr AVP (code 637) is a Grouped AVP that carries either the IPv6 Binding Prefix (Delegated-IPv6-Prefix) or the full tunnel source IPv6 address (Tunnel-Source-IPv6-Address) for lw4o6 CPE configuration; it MUST contain exactly one of the two, not both.
