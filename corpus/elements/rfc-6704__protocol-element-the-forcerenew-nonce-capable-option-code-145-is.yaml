document: rfc-6704
kind: protocol-element
summary: The FORCERENEW_NONCE_CAPABLE option (code 145) is used by clients to advertise support for the Forcerenew Nonce Authentication protocol in DHCP Discover and Request messages, and by servers to indicate preference in DHCP Offer messages. It carries a list of supported algorithm identifiers.
