document: rfc-5627
kind: normative-requirement
summary: 'The temporary GRUU construction algorithm MUST ensure: (1) the likelihood of collision with another GRUU is vanishingly small; and (2) given a pair of GRUUs, it MUST be computationally infeasible to determine whether they were issued for the same AOR or instance ID.'
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - crypto
    - privacy
