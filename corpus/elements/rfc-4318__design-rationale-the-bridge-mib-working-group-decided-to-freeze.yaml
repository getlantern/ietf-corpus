document: rfc-4318
kind: design-rationale
summary: The Bridge MIB Working Group decided to freeze the technical content of the MIB modules at a level compatible with 802.1t and 802.1w, rather than tracking 802.1D-2004, due to concerns that 802.1D-2004 changes would require non-backward-compatible SMI changes. Future updates are left to the IEEE 802.1 working group.
