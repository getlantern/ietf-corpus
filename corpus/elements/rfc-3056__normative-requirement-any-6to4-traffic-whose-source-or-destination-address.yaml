document: rfc-3056
kind: normative-requirement
summary: Any 6to4 traffic whose source or destination address embeds a V4ADDR that is not a global unicast address (e.g., RFC 1918, broadcast, multicast, loopback) MUST be silently discarded by both encapsulators and decapsulators.
section: "9"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
