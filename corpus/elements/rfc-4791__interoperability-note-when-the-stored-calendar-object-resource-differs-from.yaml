document: rfc-4791
kind: interoperability-note
summary: When the stored calendar object resource differs from the submitted one by octet equality (e.g., server normalizes data), a strong ETag MUST NOT be returned in the PUT response, requiring clients to re-fetch the resource and its ETag before making further changes.
section: 5.3.4
topics:
    - http
