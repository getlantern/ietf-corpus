document: rfc-6840
kind: protocol-element
summary: Setting the AD bit in a DNS query is defined as a signal that the requester understands and is interested in the AD bit value in the response. This allows requesting AD-bit semantics without also requesting DNSSEC data via the DO bit.
section: "5.7"
topics:
    - dns
