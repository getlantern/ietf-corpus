document: rfc-4901
kind: wire-format
summary: 'The HC control parameter is a 2-octet field with the format: 4 bits reserved (0000), 4-bit Packet Type field, 6-bit Length field, and 2 reserved bits. The first nibble is set to 0000 to avoid being mistaken for an IP packet. Packet Types 0-10 are defined; types 11-15 are reserved for IANA Expert Review assignment.'
section: "4.3"
