document: rfc-8373
kind: normative-requirement
summary: When a call is rejected due to no common language, the SIP response MUST use response code 488 (Not Acceptable Here) or 606 (Not Acceptable), with a Warning header field using warning code 308; the warning text SHOULD contain the supported languages and media.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - realtime
    - sip
