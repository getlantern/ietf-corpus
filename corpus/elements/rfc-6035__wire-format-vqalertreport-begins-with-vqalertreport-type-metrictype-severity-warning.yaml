summary: 'VQAlertReport begins with ''VQAlertReport: Type=<MetricType> Severity=<Warning|Critical|Clear> Dir=<local|remote>'' followed by SessionInfo, LocalMetrics, optionally RemoteMetrics, and DialogID. MetricType encodes the threshold-violating metric (e.g., RLQ, NLR, RTD).'
