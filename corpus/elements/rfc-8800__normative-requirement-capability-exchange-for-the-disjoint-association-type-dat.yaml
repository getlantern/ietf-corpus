document: rfc-8800
kind: normative-requirement
summary: Capability exchange for the Disjoint Association Type (DAT, value 2) MUST be performed before using the disjoint association. The PCEP speaker MUST include DAT in the ASSOC-Type-List TLV and MUST receive the same from the PCEP peer before using the Disjoint Association Group in PCEP messages.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
