summary: The extended PKAuthenticator retains the original fields (cusec [0], ctime [1], nonce [2], paChecksum [3]) and adds freshnessToken [4] OCTET STRING OPTIONAL. The freshnessToken covers the KDC-provided opaque blob and is included in the signed portion of the KRB_AS_REQ.
