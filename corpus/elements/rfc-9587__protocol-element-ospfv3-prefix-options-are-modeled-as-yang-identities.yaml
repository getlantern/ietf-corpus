summary: 'OSPFv3 prefix options are modeled as YANG identities based on ''ospfv3-e-prefix-option'': nu-bit (exclude from IPv6 unicast), la-bit (prefix is router interface address), p-bit (NSSA translation trigger), dn-bit (L3VPN prefix marker), and n-bit (host address identifying advertising router).'
