document: rfc-8898
kind: normative-requirement
summary: If a UAS/registrar chooses to challenge a request and is willing to accept an access token as a credential, it MUST include a WWW-Authenticate header field indicating a 'Bearer' scheme and including an AS address encoded as an https URI.
section: "2.2"
rfc2119_level: MUST
topics:
    - sip
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
