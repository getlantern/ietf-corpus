document: rfc-7937
kind: normative-requirement
summary: The first line of a CDNI Logging File MUST be the version directive, and the entity transmitting the file MUST set its value to 'cdni/1.0'. There MUST be one and only one version directive per file.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
