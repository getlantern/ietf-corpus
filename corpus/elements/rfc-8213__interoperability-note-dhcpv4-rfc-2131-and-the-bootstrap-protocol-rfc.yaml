document: rfc-8213
kind: interoperability-note
summary: DHCPv4 (RFC 2131) and the Bootstrap Protocol (RFC 1542) have no existing guidance for securing relay-to-server messages; this document fills that gap by requiring IPsec with encryption for DHCPv4 relay-to-server communication.
section: "1"
topics:
    - ipsec
    - security
