document: rfc-2658
kind: normative-requirement
summary: The Interleave Index (NNN) MUST have a value less than or equal to LLL. Values of NNN greater than LLL are invalid and the packet MUST be treated as lost, generating an erasure frame.
section: "3"
rfc2119_level: MUST
topics:
