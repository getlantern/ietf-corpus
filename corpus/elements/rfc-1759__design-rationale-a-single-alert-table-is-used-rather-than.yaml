document: rfc-1759
kind: design-rationale
summary: A single Alert Table is used rather than per-group alert tables because a single sub-unit entry can generate more than one simultaneous alert (e.g. paper jams at multiple points in a media path). Attaching extra information to the sub-unit entry would limit reports to one per entry.
section: 2.2.13.3
topics:
    - snmp
