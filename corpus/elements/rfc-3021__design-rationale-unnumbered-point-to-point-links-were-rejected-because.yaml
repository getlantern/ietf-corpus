document: rfc-3021
kind: design-rationale
summary: Unnumbered point-to-point links were rejected because they prevent consistent management and debugging of the link and lack standardization per RFC 1812. Host-address-only numbering (PPP-only) was rejected because it limits encapsulation choices and complicates link and network management.
