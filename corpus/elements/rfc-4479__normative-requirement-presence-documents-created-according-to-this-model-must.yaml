document: rfc-4479
kind: normative-requirement
summary: 'Presence documents created according to this model MUST be valid per the defined XML schemas, with one exception: a compositor MAY produce a document it cannot fully validate if it validates under lax processing rules. Implementations SHOULD be prepared to receive and extract information from documents that are not fully valid.'
section: "5"
rfc2119_level: MUST
topics:
