document: rfc-9527
kind: interoperability-note
summary: The DHCPv6 options and protocol are fully compatible with an HNA connected to multiple ISPs, each providing a different Registered Homenet Domain; however, handling multiple simultaneous Registered Homenet Domains is an implementation matter outside the scope of this document.
section: A.4
topics:
