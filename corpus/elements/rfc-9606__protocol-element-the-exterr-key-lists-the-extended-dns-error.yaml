document: rfc-9606
kind: protocol-element
summary: The 'exterr' key lists the Extended DNS Error (EDE) codes the resolver may return per RFC 8914. Individual codes or ranges (using '-') are supported; multiple non-contiguous values MUST be comma-separated. Presence of codes like Blocked (15), Censored (16), or Filtered (17) indicates the resolver reveals filtering reasons.
section: "5"
topics:
