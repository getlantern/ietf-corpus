document: rfc-7056
kind: security-consideration
summary: The GSS-API mechanism is responsible for authentication and integrity protection of the attributes, but the acceptor application is responsible for deciding whether the credential source is trusted to assert a given attribute and for validating the asserted value. Applications that bypass local policy checks SHOULD perform their own evaluation before relying on the information.
section: "7"
topics:
    - security
