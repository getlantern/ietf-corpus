document: rfc-8379
kind: normative-requirement
summary: For hybrid broadcast and P2MP interfaces receiving a Graceful-Link-Shutdown sub-TLV, the remote node MUST identify the neighbor corresponding to the graceful-shutdown link and set its metric to MaxLinkMetric; all remote nodes connected to the originator MUST reoriginate the Router-LSA.
section: "5.5"
rfc2119_level: MUST
topics:
    - routing
