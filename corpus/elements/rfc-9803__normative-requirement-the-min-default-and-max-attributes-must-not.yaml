document: rfc-9803
kind: normative-requirement
summary: The 'min', 'default', and 'max' attributes MUST NOT be present in EPP commands; they MAY be present in EPP responses. When present, 'min' MUST be lower than 'max', and 'default' MUST be between 'min' and 'max' inclusively.
section: 1.2.1
rfc2119_level: MUST NOT
topics:
    - dns
