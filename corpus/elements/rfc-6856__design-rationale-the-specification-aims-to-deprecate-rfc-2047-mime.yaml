document: rfc-6856
kind: design-rationale
summary: The specification aims to deprecate RFC 2047 MIME Message Header Extensions and RFC 2231 extended MIME parameter encodings (7-bit encoding mechanisms) in the future, as they have caused interoperability problems and have seen limited deployment compared to the hoped-for prevalence of native UTF-8 header support.
