kind: wire-format
summary: 'OPTION_S46_BIND_IPV6_PREFIX (137) encodes as: 2-byte option-code, 2-byte option-length (1 + prefix byte length), 1-byte bindprefix6-len (valid 0–128), and a variable-length bind-ipv6-prefix field padded on the right to an octet boundary. Padding bits beyond bindprefix6-len MUST be ignored.'
