document: rfc-7734
kind: design-rationale
summary: Each SPBM island is operationally isolated with its own control-plane instance and multipathing design (multiple equal-cost tree sets or multiple spanning trees). This isolation permits past, current, and future versions of Ethernet to be seamlessly interconnected at scale via EVPN as the unifying system.
