document: rfc-4210
kind: wire-format
summary: DHBMParameter for Diffie-Hellman-based MAC protection encodes owf (AlgorithmIdentifier, SHA-1 recommended) and mac (AlgorithmIdentifier, e.g., DES-MAC, Triple-DES-MAC, or HMAC). The OWF is applied to the DH computation result to derive BASEKEY; the same key-expansion rule as PBM applies if K > H.
section: 5.1.3.2
topics:
    - pkix
    - crypto
    - security
