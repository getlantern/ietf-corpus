kind: normative-requirement
summary: If NAT is detected in IKE_SA_INIT via NAT_DETECTION_SOURCE_IP and NAT_DETECTION_DESTINATION_IP, peers switch to port 4500 in the first IKE_INTERMEDIATE exchange and use it for all subsequent exchanges.
