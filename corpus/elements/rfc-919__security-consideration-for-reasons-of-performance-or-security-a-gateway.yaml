document: rfc-919
kind: security-consideration
summary: For reasons of performance or security, a gateway may choose not to forward broadcasts. It may be advisable to prohibit broadcasts into or out of an autonomous group of networks to prevent potential denial-of-service (every host bears cost for each broadcast received) and unintended information leakage.
section: "4"
topics:
    - ip
    - security
