document: rfc-6275
kind: protocol-element
summary: The Type 2 Routing Header is a new IPv6 routing header variant used by correspondent nodes to route packets directly to a mobile node's care-of address while carrying the home address as the ultimate destination. It allows route optimization without IP-in-IP encapsulation overhead.
section: "6.4"
