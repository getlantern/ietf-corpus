document: rfc-2389
kind: design-rationale
summary: The FEAT command itself is not included in the list of returned features; support for FEAT is indicated by returning any reply other than 500 or 502. Similarly, OPTS is not listed because it is mandatory whenever FEAT is implemented.
section: "3.2"
