document: rfc-7176
kind: wire-format
summary: 'The Group MAC Address sub-TLV (GMAC-ADDR, GADDR sub-TLV type 1) encodes a 2-byte Topology-ID, 2-byte VLAN ID, 1-byte Num Group Recs, and variable-length group records each containing a 6-byte multicast MAC group address and zero or more 6-byte source MAC addresses. Length formula: 5 + m + 6*n.'
section: 2.1.1
topics:
