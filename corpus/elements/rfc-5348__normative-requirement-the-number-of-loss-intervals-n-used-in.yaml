document: rfc-5348
kind: normative-requirement
summary: The number of loss intervals n used in calculating the loss event rate is RECOMMENDED to be 8. TFRC SHOULD NOT use values of n greater than 8 for traffic competing with TCP on the global Internet, as this would require additional mechanisms to handle sustained heavy loss.
section: "5.4"
rfc2119_level: RECOMMENDED
topics:
    - congestion
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
