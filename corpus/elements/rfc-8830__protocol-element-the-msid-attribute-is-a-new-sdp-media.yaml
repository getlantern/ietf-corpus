document: rfc-8830
kind: protocol-element
summary: The 'msid' attribute is a new SDP media-level attribute that associates RTP streams described in separate media descriptions with MediaStreams and MediaStreamTracks as defined in the WebRTC API. It consists of an 'msid-id' (the MediaStream id) and an optional 'msid-appdata' (the MediaStreamTrack id), each 1–64 token characters.
