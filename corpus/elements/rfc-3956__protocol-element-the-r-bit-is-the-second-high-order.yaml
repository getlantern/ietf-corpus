document: rfc-3956
kind: protocol-element
summary: The R-bit is the second high-order bit of the 4-bit flags field. When R=1, the address embeds the RP address and implies prefix FF70::/12, requiring P=1 and T=1. When R=0, semantics follow RFC 3306/RFC 3513 and RIID must be sent as zero and ignored.
