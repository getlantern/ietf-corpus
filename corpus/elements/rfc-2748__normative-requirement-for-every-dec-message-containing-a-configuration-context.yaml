document: rfc-2748
kind: normative-requirement
summary: For every DEC message containing a configuration context, the PEP MUST generate a corresponding RPT message with the Solicited Message flag set. RPT messages solicited by decisions for a given Client Handle MUST be sent in the same order as their corresponding DEC messages were received, and there MUST never be more than one solicited RPT per Decision.
section: "3.3"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
