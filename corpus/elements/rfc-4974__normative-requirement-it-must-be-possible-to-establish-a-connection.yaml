document: rfc-4974
kind: normative-requirement
summary: It MUST be possible to establish a Connection without dependence on a Call, and a Call without any associated Connections. It MUST be possible to associate more than one Connection with a Call. Signaling of a Connection associated with a Call MUST NOT require the distribution or retention of Call-related state within the network.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
