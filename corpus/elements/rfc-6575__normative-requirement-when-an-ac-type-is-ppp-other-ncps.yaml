document: rfc-6575
kind: normative-requirement
summary: When an AC type is PPP, other NCPs with the exception of CCP and ECP MUST be rejected during IPCP negotiation between the PE and local CE. The PE performs proxy PPP negotiation, not end-to-end between CEs.
section: 4.1.4
rfc2119_level: MUST
