document: rfc-5750
kind: normative-requirement
summary: For RSA and RSASSA-PSS, key sizes from 1024 to 4096 bits MUST be supported for certificate and CRL signature verification. Keys <= 1023 bits MAY be supported. For DSA, key sizes from 1024 to 3072 bits MUST be supported.
section: "4.3"
rfc2119_level: MUST
topics:
    - pkix
    - email
    - crypto
