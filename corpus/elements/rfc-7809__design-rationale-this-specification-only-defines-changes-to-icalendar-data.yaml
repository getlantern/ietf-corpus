document: rfc-7809
kind: design-rationale
summary: This specification only defines changes to iCalendar data exchanged via CalDAV; it does not apply to scheduling mechanisms based on iTIP (RFC5546) or iMIP (RFC6047) or other methods. This scope limitation avoids unintended interoperability issues with non-CalDAV calendar transports.
section: "3"
extracted_by: claude-sonnet-4-6
