document: rfc-6655
kind: design-rationale
summary: The _8 cipher suite variants (8-octet authentication tags) are introduced specifically because they produce shorter ciphertexts and are more suitable for bandwidth-constrained networks with small message sizes, at the cost of a shorter authentication tag compared to the full 16-octet tag.
