document: rfc-7372
kind: design-rationale
summary: RFC 6376 Section 6.1 discourages special treatment of messages bearing no valid DKIM signature. This document acknowledges that some operators disregard this advice and require valid Author Domain Signatures, and provides status codes for improved interoperability with such operators without endorsing their configuration.
