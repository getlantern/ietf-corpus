document: rfc-3749
kind: interoperability-note
summary: TLS originally defined only CompressionMethod.null, limiting interoperability for implementations wanting compression. This document adds DEFLATE (value 1) as a standard method to enable interoperable compressed TLS implementations.
section: "1"
topics:
    - tls
