document: rfc-8186
kind: protocol-element
summary: 'The Z field in the Error Estimate (defined in RFC 4656 Section 4.1.2) is repurposed as a ''Timestamp format'' indicator: value 0 means NTP 64-bit format; value 1 means PTPv2-truncated format. This field signals the timestamp format used in a collected test packet.'
section: "2.3"
topics:
