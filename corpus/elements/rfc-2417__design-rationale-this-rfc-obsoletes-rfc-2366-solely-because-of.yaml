summary: 'This RFC obsoletes RFC 2366 solely because of a clerical error in OID assignment: RFC 2366 rooted the MIB under snmpModules, whereas the corrected RFC 2417 roots it under mib-2 to be consistent with the location of other standard MIBs. No semantic changes to the managed objects were made.'
