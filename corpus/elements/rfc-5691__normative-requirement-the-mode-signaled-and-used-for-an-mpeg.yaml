document: rfc-5691
kind: normative-requirement
summary: The mode signaled and used for an MPEG Surround elementary stream MUST be either MPS-hbr or MPS-lbr. MPS-hbr SHALL be used when the frame size may exceed 63 bytes, e.g., when high-bitrate residual coding is in use.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
