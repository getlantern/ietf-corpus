document: rfc-3848
kind: registry
summary: 'IANA maintains a registry of ''WITH protocol types'' for use in the ''with'' clause of the Received header. This document adds seven new keywords: ESMTPA, ESMTPS, ESMTPSA, LMTP, LMTPA, LMTPS, and LMTPSA, and updates the references for existing SMTP and ESMTP entries to RFC 2821.'
