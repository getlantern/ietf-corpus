document: rfc-5401
kind: normative-requirement
summary: Values of 1.0e-06 seconds and 1000 seconds are RECOMMENDED for RTT_MIN and RTT_MAX respectively in GRTT quantization. NACK-based multicast applications may impose an additional smaller upper limit on advertised GRTT to meet delivery latency constraints at the expense of greater feedback volume.
section: 3.7.4
rfc2119_level: RECOMMENDED
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
