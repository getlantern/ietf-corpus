document: rfc-7220
kind: protocol-element
summary: The DESCRIPTION option (Code 128) is optional for both PCP servers and clients and MAY be included in a PCP MAP/PEER request to associate a human-readable description with the requested mapping. A PCP server MAY ignore it; rejection is signaled by omitting the option from the response.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
