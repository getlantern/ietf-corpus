document: rfc-2596
kind: normative-requirement
summary: Servers which support storing language codes in the DIT MUST allow any recognized attribute with the Directory String syntax to have a language option associated with it. Servers SHOULD allow language options to be associated with other attribute types as well.
section: "3.6"
rfc2119_level: MUST
topics:
    - ldap
