document: rfc-8628
kind: normative-requirement
summary: The client SHOULD only commence a device authorization request when prompted by the user and not automatically (e.g., on app start or session expiry) to avoid overloading the token endpoint due to the polling nature of the protocol.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - oauth
