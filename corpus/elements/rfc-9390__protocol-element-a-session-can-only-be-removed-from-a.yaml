document: rfc-9390
kind: protocol-element
summary: A session can only be removed from a session group by the Diameter node (client or server) that originally assigned the session to that group. A session group can only be deleted by its owner. Diameter applications with implicit group support MAY define a more constrained permission model.
section: "3.3"
topics:
    - diameter
