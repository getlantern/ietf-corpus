document: rfc-6623
kind: design-rationale
summary: RFC 6623 exists because RFC 6231 defined the IVR Control Package status codes but did not create a formal IANA registry for them, leaving no Standards Action-gated mechanism for future extensions. This document remedies that omission by establishing the registry and setting the assignment policy.
section: "1"
topics:
    - registry
    - realtime
