document: rfc-9824
kind: normative-requirement
summary: For NSEC3-based Compact Denial of Existence, NSEC3 parameters SHOULD be set to algorithm 1 (SHA-1), flags field 0, additional hash iteration count 0, and an empty salt ('1 0 0 -' in presentation format).
