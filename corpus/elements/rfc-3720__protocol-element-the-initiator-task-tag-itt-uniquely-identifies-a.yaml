document: rfc-3720
kind: protocol-element
summary: The Initiator Task Tag (ITT) uniquely identifies a task session-wide for its lifetime. All task-related PDUs for a command (R2T, Data-In, Status) must use consistent field values matching the ITT established at task instantiation; inconsistent values are a protocol error.
section: 3.2.4.3
topics:
    - tcp
