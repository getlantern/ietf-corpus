document: rfc-9836
kind: security-consideration
summary: An attacker with write access to 'ac-svc-ref' or 'ac-ntw-ref' can delete or modify ACs bound to a running VPN service, causing service malfunction and SLA violations including complete traffic interruption for a client. Such activity can be detected by monitoring and tracking network configuration changes.
section: "7"
topics:
