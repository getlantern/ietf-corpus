document: rfc-9190
kind: wire-format
summary: EAP-TLS fragmentation is provided by a flags octet within EAP-Response/EAP-Request packets and a conditional TLS Message Length field of four octets. A single TLS record including ContentType (1 byte), ProtocolVersion (2 bytes), and length (2 bytes) headers may be up to 16645 octets.
section: 2.1.9
topics:
    - tls
