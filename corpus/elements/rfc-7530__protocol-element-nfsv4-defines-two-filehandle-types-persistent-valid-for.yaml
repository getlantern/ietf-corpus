document: rfc-7530
kind: protocol-element
summary: 'NFSv4 defines two filehandle types: persistent (valid for the lifetime of the file system object) and volatile (may expire, signaled by NFS4ERR_FHEXPIRED). The REQUIRED attribute fh_expire_type is a bitmask with flags FH4_PERSISTENT, FH4_VOLATILE_ANY, FH4_NOEXPIRE_WITH_OPEN, FH4_VOL_MIGRATION, and FH4_VOL_RENAME.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
