document: rfc-5389
kind: protocol-element
summary: The magic cookie field MUST contain 0x2112A442 in network byte order. It occupies 32 bits formerly part of RFC 3489's 128-bit transaction ID, allowing servers to distinguish RFC 5389 from RFC 3489 clients and aiding protocol demultiplexing.
