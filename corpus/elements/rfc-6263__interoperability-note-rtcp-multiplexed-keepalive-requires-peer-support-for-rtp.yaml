document: rfc-6263
kind: interoperability-note
summary: RTCP multiplexed keepalive requires peer support for RTP/RTCP multiplexing (RFC 5761), and some RTCP monitoring tools expect RTCP to not be multiplexed; additionally, RTCP must be configured so that the Tmin value is less than or equal to the Tr interval.
section: "4.3"
topics:
    - rtp
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
