summary: 'N2_lost transitions: set to false when a 2-Hop Tuple is created under a SYMMETRIC link (L_lost=false); set to true when L_status changes from SYMMETRIC to LOST (L_lost set to true) while L_SYM_time has not yet expired; the 2-Hop Tuple is removed entirely when L_SYM_time expires or the Link Tuple is removed.'
