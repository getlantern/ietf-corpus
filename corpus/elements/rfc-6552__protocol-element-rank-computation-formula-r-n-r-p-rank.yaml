document: rfc-6552
kind: protocol-element
summary: 'Rank computation formula: R(N) = R(P) + rank_increase, where rank_increase = (Rf * Sp + Sr) * MinHopRankIncrease. Rf is the rank_factor, Sp is the step_of_rank for the link, and Sr is the stretch term (≤ stretch_of_rank). MinHopRankIncrease defaults to DEFAULT_MIN_HOP_RANK_INCREASE (256).'
section: "4.1"
