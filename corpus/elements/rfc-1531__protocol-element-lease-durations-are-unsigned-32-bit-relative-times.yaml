document: rfc-1531
kind: protocol-element
summary: Lease durations are unsigned 32-bit relative times in seconds; 0xffffffff is reserved to represent 'infinity' and the minimum lease duration is one hour. Times T1 (default 0.5 × lease) and T2 (default 0.875 × lease) govern entry into RENEWING and REBINDING states.
