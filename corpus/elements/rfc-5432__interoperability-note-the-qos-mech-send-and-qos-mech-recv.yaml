document: rfc-5432
kind: interoperability-note
summary: The 'qos-mech-send' and 'qos-mech-recv' attributes are independent of QoS preconditions (RFC 3312); preconditions handle direction negotiation while this mechanism handles which QoS protocol to use. Parameters for a chosen mechanism (e.g., bandwidth) must be negotiated separately.
