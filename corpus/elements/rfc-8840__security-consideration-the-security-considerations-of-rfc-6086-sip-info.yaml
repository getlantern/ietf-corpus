document: rfc-8840
kind: security-consideration
summary: The security considerations of RFC 6086 (SIP INFO), RFC 8838 (Trickle ICE), and RFC 8839 (ICE SDP Offer/Answer) all apply. The new Info Package 'trickle-ice' and the media type 'application/trickle-ice-sdpfrag' do not introduce additional security considerations beyond those specifications when used in the Trickle ICE context.
section: "13"
topics:
