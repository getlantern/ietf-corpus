document: rfc-4469
kind: design-rationale
summary: The primary motivation for CATENATE is to allow resource-constrained clients (e.g., mobile devices) to compose outbound messages containing large attachments already on the IMAP server without downloading and re-uploading them, saving bandwidth and processing. It also solves the sent-copy archival problem by avoiding a double upload.
