document: rfc-3289
kind: protocol-element
summary: diffServAlgDropTable identifies a packet-dropping algorithm (alwaysDrop, headDrop, tailDrop, or Active Queue Management) and counts drops. It references a diffServQEntry via diffServAlgDropQMeasure to determine current queue depth, and for AQM algorithms requires a diffServRandomDropEntry via diffServAlgDropSpecific.
section: 3.4.4
topics:
    - diffserv
    - snmp
    - qos
    - congestion
