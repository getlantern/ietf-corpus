document: rfc-4271
kind: design-rationale
summary: BGP uses TCP as its transport rather than implementing its own reliability layer, eliminating the need for explicit update fragmentation, retransmission, acknowledgement, and sequencing. This simplifies the protocol but couples BGP session lifetime to TCP connection state.
section: "3"
topics:
