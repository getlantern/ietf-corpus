document: rfc-7267
kind: normative-requirement
summary: BGP advertisements received with invalid prefix lengths (128–159 bits) MUST be rejected as having a bad packet format. The minimum valid Length is 96 bits except for the default route (0-length prefix).
section: 4.1.3
rfc2119_level: MUST
