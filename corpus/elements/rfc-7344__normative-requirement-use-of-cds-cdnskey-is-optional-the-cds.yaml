document: rfc-7344
kind: normative-requirement
summary: Use of CDS/CDNSKEY is OPTIONAL. The CDS/CDNSKEY RRset expresses what the Child would like the DS RRset to look like after the change; it is a replace operation. If neither CDS nor CDNSKEY RRset is present in the Child, this signals that no change should be made to the current DS set.
section: "4"
rfc2119_level: OPTIONAL
topics:
    - dns
    - security
