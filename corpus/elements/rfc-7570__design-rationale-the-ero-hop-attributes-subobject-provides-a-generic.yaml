document: rfc-7570
kind: design-rationale
summary: The ERO Hop Attributes subobject provides a generic per-hop attribute mechanism to support current and future ERO constraint extensions (e.g., WSON signaling, objective functions, metrics) without defining new ERO subobjects for each use case. It reuses the TLV structure already defined in RFC 5420 for whole-LSP attributes.
section: "1"
topics:
