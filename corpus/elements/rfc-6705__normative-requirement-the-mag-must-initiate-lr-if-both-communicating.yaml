document: rfc-6705
kind: normative-requirement
summary: The MAG MUST initiate LR if both communicating MNs are attached to it and the MNs are anchored at different LMAs. The MAG MUST NOT initiate LR in any other case.
section: "3.1"
rfc2119_level: MUST
topics:
