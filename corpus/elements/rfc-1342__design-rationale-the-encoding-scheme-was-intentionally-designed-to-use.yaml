document: rfc-1342
kind: design-rationale
summary: The encoding scheme was intentionally designed to use only ordinary printable ASCII characters rather than relying on infrequently-used RFC 822 features such as backslash-quoting, because many deployed mail relaying and reading programs fail to correctly handle those features, and breaking them would cause severe operational problems.
section: Introduction
