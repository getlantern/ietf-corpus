document: rfc-6333
kind: protocol-element
summary: The AFTR's NAT binding table is extended to include the source IPv6 address (Softwire-Id) of incoming tunneled packets. The composite key {Softwire-Id, IPv4+Port} disambiguates overlapping private IPv4 address spaces across different customers and allows the AFTR to reconstruct the correct IPv6 encapsulation for return traffic without static per-tunnel configuration.
section: "6.6"
topics:
    - nat
    - ip
    - v6ops
