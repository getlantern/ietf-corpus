document: rfc-6048
kind: wire-format
summary: 'Each line of the LIST COUNTS response MUST consist of five space-separated fields in order: newsgroup-name, high-water-mark, low-water-mark, estimated-article-count, status. TAB characters are not valid separators. Fields may include leading zeroes.'
section: 2.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
