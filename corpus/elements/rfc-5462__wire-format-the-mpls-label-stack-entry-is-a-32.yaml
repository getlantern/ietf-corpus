document: rfc-5462
kind: wire-format
summary: 'The MPLS label stack entry is a 32-bit field containing: Label (20 bits), TC/Traffic Class field (3 bits, formerly EXP), S/Bottom of Stack (1 bit), and TTL/Time to Live (8 bits). The three-bit TC field replaces the previously named ''EXP'' field in Figure 1 of RFC 3032.'
section: "2.1"
