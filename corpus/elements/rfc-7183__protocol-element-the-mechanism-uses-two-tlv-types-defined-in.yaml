document: rfc-7183
kind: protocol-element
summary: 'The mechanism uses two TLV types defined in RFC 7182: an ICV Message TLV (carrying an HMAC-SHA-256 integrity check value) and a TIMESTAMP Message TLV (carrying POSIX time). These are inserted into NHDP HELLO and OLSRv2 TC messages between RFC 5444 parsing/generation and NHDP/OLSRv2 processing.'
