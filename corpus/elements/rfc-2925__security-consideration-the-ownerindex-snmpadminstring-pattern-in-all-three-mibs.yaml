document: rfc-2925
kind: security-consideration
summary: The OwnerIndex (SnmpAdminString) pattern in all three MIBs, combined with SNMPv3 VACM vacmViewTreeFamilyTable configuration, restricts each management application's access to only its own table rows, preventing unauthorized modification or deletion of another application's ping, traceroute, or lookup entries.
section: "5.0"
topics:
    - security
    - snmp
