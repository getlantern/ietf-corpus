document: rfc-3371
kind: interoperability-note
summary: For L2TP tunnel interfaces, ifTable.ifType must be tunnel(131), ifTable.ifMtu for UDP/IP transport should be 65467 (65535−60 for IP−8 for UDP), ifTable.ifPhyAddress returns the assigned tunnel identifier, and ifTable.ifSpeed returns zero.
