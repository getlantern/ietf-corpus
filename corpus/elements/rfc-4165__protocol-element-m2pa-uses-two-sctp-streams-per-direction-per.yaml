document: rfc-4165
kind: protocol-element
summary: M2PA uses two SCTP streams per direction per association. Stream 0 carries Link Status messages (Alignment, Proving, Ready during alignment, Busy, Busy Ended, Out of Service). Stream 1 carries User Data messages and Link Status messages that must remain in sequence with User Data (Processor Outage, Processor Recovered, Ready after processor outage).
section: 1.7.3
topics:
    - sctp
