document: rfc-7356
kind: wire-format
summary: 'FS-PSNP PDU (type 12): Scope field bits 1–7 hold the flooding scope; bit 8 is the Unsupported (U) bit. U=1 signals that the sending IS does not support the specified scope. When U=1, variable-length fields other than authentication MUST NOT be included in the PDU.'
section: "3.3"
topics:
    - routing
