document: rfc-7734
kind: normative-requirement
summary: If an SPBM island has no BEBs registering interest in a particular I-SID, information about that I-SID from other SPBM islands, PBB PEs, or PBBNs MUST NOT be leaked into the local ISIS-SPB routing system.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
