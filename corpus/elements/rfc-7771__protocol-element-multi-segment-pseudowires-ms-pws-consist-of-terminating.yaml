document: rfc-7771
kind: protocol-element
summary: Multi-Segment Pseudowires (MS-PWs) consist of Terminating Provider Edge Routers (T-PEs), one or more Switching Provider Edge Routers (S-PEs), and a sequence of tunneled PW segments connecting adjacent nodes. Static MS-PWs lack end-to-end protection against S-PE failure even though each individual tunnel segment may be MPLS- or MPLS-TP-protected.
section: "1"
topics:
    - mpls
    - routing
