document: rfc-6933
kind: registry
summary: RFC 6933 creates the IANA-ENTITY-MIB module with the IANA-maintained IANAPhysicalClass TEXTUAL-CONVENTION (OID under mib-2). The PhysicalClass TC in ENTITY-MIB is deprecated and its use is replaced by IANAPhysicalClass, allowing enumeration additions without re-issuing the ENTITY-MIB.
section: "3.2"
