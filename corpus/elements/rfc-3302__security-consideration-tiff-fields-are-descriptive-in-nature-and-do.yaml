document: rfc-3302
kind: security-consideration
summary: TIFF fields are descriptive in nature and do not induce behavior in recipient applications, so currently defined fields do not create additional security risks. However, TIFF's extensible structure means future fields could theoretically be defined to induce recipient actions, presenting additional risks not present in TIFF 6.0.
section: "6"
topics:
    - security
