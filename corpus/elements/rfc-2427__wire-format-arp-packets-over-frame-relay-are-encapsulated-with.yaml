document: rfc-2427
kind: wire-format
summary: ARP packets over Frame Relay are encapsulated with NLPID 0x80 (SNAP), pad 0x00, OUI 0x00-00-00, and PID 0x0806. The ARP hardware type (ar$hrd) assigned to Frame Relay is 15 decimal (0x000F); ar$hln is 2, 3, or 4 matching the Q.922 address length.
section: "6"
