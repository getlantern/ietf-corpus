document: rfc-9479
kind: normative-requirement
summary: Maximum link bandwidth is application-independent; if different values for this attribute are advertised for a given link, all values MUST be ignored. Multiple advertisements for this attribute MUST NOT advertise different values for the same link.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
