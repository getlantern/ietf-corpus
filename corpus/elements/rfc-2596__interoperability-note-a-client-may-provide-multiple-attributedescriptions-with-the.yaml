document: rfc-2596
kind: interoperability-note
summary: A client may provide multiple AttributeDescriptions with the same base attribute type but different language options in a search request (e.g., both 'name;lang-en' and 'name;lang-fr'), enabling retrieval of values in multiple languages in a single query.
