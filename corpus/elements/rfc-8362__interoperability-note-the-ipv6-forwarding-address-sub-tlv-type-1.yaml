document: rfc-8362
kind: interoperability-note
summary: The IPv6-Forwarding-Address sub-TLV (type 1) MUST be ignored for non-IPv6 address families, and the IPv4-Forwarding-Address sub-TLV (type 2) MUST be ignored for non-IPv4 address families. In both cases, only the first occurrence is used; subsequent instances MUST be ignored.
section: "3.10"
topics:
    - routing
