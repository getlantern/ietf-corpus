document: rfc-4995
kind: design-rationale
summary: The ROHC segmentation protocol was designed without sequence numbers, relying solely on a 32-bit CRC and in-order delivery; it is not intended to replace link-layer segmentation, which should be preferred whenever available.
section: 5.2.5.1
