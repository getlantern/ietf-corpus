document: rfc-8163
kind: design-rationale
summary: '6LoBAC is a strict subset of LoWPAN encapsulation (RFC 4944 as updated by RFC 6282): the Mesh, Broadcast, Fragmentation, and LOWPAN_HC1 headers are omitted. This is possible because all MS/TP devices on a segment can communicate directly (no hidden nodes or mesh routing) and large payloads eliminate fragmentation needs.'
section: "5"
topics:
