document: rfc-8412
kind: security-consideration
summary: SWIMA does not verify the accuracy of reported software inventory data; endpoints may report false information through malice or error. The specification focuses solely on correct and reliable transport of what is reported, not on attestation of truthfulness. Tools that employ SWIMA must implement their own verification mechanisms.
section: "8.1"
topics:
    - security
