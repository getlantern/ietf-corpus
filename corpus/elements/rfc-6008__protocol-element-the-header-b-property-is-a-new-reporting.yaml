document: rfc-6008
kind: protocol-element
summary: The 'header.b' property is a new reporting item in Authentication-Results fields, used with method 'dkim'. Its value is the full or partial value of the DKIM-Signature 'b=' tag, providing a unique identifier to associate each verification result with the specific signature it describes.
