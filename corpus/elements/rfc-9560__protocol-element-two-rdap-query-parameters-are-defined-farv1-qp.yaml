document: rfc-9560
kind: protocol-element
summary: 'Two RDAP query parameters are defined: ''farv1_qp'' carries a single query purpose string from the user''s allowed purposes, and ''farv1_dnt'' carries a boolean requesting that the server not log or record identity information associated with the query. Both are OPTIONAL and appended to RDAP request URIs using application/x-www-form-urlencoded syntax.'
section: "4.2"
topics:
    - oauth
    - http
    - privacy
