document: rfc-1349
kind: protocol-element
summary: 'A host''s route cache must conceptually support two entry types: type 1 { destination, TOS, router } from code 3 (or code 1) Redirects, and type 2 { destination, *, router } from code 2 (or code 0) Redirects. Type 1 entries are always preferred over type 2 for matching destination and TOS.'
section: "7.1"
topics:
