document: rfc-4252
kind: normative-requirement
summary: For host-based authentication, the server MUST verify that the host key belongs to the named client host, that the given user on that host is allowed to log in, and that the signature is valid. It is RECOMMENDED that the server also verify the network address matches the given client host name.
section: "9"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
