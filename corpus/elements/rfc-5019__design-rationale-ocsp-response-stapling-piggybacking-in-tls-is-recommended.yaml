document: rfc-5019
kind: design-rationale
summary: OCSP response stapling (piggybacking in TLS) is recommended because it allows server-side caching that lowers responder load, enables validation when clients lack network access, reduces round trips during handshake, and simplifies client-side implementation to parsing only.
section: "6.3"
topics:
