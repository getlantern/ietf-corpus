document: rfc-7757
kind: normative-requirement
summary: If no matching EAM entry is found during IPv4-to-IPv6 or IPv6-to-IPv4 translation, the EAM algorithm is aborted and the implementation MUST proceed to translate the address according to RFC 6145.
section: 3.3.1
rfc2119_level: MUST
topics:
