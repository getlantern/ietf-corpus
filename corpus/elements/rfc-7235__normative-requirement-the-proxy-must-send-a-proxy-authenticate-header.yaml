document: rfc-7235
kind: normative-requirement
summary: The proxy MUST send a Proxy-Authenticate header field containing a challenge applicable to that proxy in each 407 (Proxy Authentication Required) response. The client MAY repeat the request with a new or replaced Proxy-Authorization header field.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
