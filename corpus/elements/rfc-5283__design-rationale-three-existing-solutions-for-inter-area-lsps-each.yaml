document: rfc-5283
kind: design-rationale
summary: 'Three existing solutions for inter-area LSPs each have drawbacks: IGP route leaking defeats the purpose of area hierarchy; BGP/MPLS hierarchy requires BGP on all ABRs and prevents IP/LDP Fast Reroute; inter-area RSVP-TE is undesirable when LDP is already deployed and TE is not needed. A pure LDP-based longest-match solution avoids all these drawbacks.'
section: "4"
topics:
