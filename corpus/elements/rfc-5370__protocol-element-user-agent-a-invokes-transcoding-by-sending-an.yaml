document: rfc-5370
kind: protocol-element
summary: 'User agent A invokes transcoding by sending an INVITE to the transcoder that includes a recipient-list body part (per RFC 5366) containing a single URI: user agent B''s URI. This single INVITE establishes both the A-T session and triggers T to call B.'
