document: rfc-8029
kind: protocol-element
summary: 'The Multipath Data sub-TLV (sub-type 1 within DDMAP) encodes the set of addresses or labels that exercise a specific ECMP path using Multipath Types: 0 (no multipath/empty), 2 (explicit IP addresses), 4 (IP address low/high ranges), 8 (bit-masked IP address set, max prefix 27 bits), 9 (bit-masked label set). IPv4 multipath addresses are drawn from 127/8; IPv6 from 0:0:0:0:0:FFFF:7F00:0/104.'
section: 3.4.1.1
topics:
    - mpls
