document: rfc-4625
kind: wire-format
summary: t11FcRouteSrcAddrId and t11FcRouteSrcMask are FcAddressIdOrZero fields for source-address-based route matching. When both are 0.0.0, the route matches all source addresses. Allowed mask values are 255.255.255, 255.255.0, 255.0.0, or 0.0.0.
section: "6"
