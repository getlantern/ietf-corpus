document: rfc-2734
kind: normative-requirement
summary: An IP-capable node SHALL implement configuration ROM with a unit directory, SHALL have max_rec of at least 8 (supporting 512-octet block payloads), SHALL be isochronous resource manager capable, and SHALL support both reception and transmission of asynchronous streams.
section: "3"
rfc2119_level: MUST
topics:
