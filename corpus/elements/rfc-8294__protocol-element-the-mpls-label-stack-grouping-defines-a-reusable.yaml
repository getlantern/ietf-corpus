document: rfc-8294
kind: protocol-element
summary: The mpls-label-stack grouping defines a reusable MPLS label stack as a list of entries keyed by a uint8 id indicating relative ordering (lowest id = top of stack). Each entry contains label, ttl (uint8), and traffic-class (uint8, range 0..7) fields.
