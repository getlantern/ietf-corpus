document: rfc-7743
kind: normative-requirement
summary: When an intermediate relay node sends the final Echo Reply to the initiator (converting from Relayed Echo Reply to Echo Reply), the destination UDP port MUST be copied from the Initiator Source Port field of the TLV, the source UDP port MUST be 3503, and the Message Type field MUST be updated from Relayed Echo Reply (5) to Echo Reply (2).
section: "4.5"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
