document: rfc-5286
kind: normative-requirement
summary: For LDP traffic to follow LFA paths, an LSR MUST distribute labels for all FECs to all neighbors (not just upstream), operate in liberal label retention mode to store labels from non-primary neighbors, and use downstream unsolicited mode. If these requirements are met, no targeted sessions or signaling extensions are needed.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
