document: rfc-7580
kind: design-rationale
summary: The Connectivity Matrix sub-TLV and Port Label Restrictions sub-TLV can be placed in separate LSAs to allow MTU-safe distribution. The Port Label Restrictions sub-TLV is carried in a Link TLV, of which there can be at most one per LSA per RFC 3630.
section: "5.1"
topics:
    - routing
    - mpls
