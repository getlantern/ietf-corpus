document: rfc-8004
kind: normative-requirement
summary: After receiving a relayed I1 packet, the Responder MUST append a VIA_RVS parameter to the R1 packet containing the IP address of the RVS that relayed the I1, primarily to allow operators to diagnose issues in RVS-assisted HIP exchanges.
section: 4.2.3
rfc2119_level: MUST
topics:
    - ip
