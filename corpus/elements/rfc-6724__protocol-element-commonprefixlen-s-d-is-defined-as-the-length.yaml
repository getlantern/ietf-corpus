document: rfc-6724
kind: protocol-element
summary: CommonPrefixLen(S, D) is defined as the length of the longest common prefix between source S and destination D, capped at the length of S's prefix (excluding the interface ID). For example, CommonPrefixLen(fe80::1, fe80::2) is 64.
section: "2.2"
topics:
