document: rfc-1724
kind: protocol-element
summary: 'rip2IfConfReceive is a read-create INTEGER controlling which RIP version updates are accepted: rip1(1), rip2(2), rip1OrRip2(3), doNotRecieve(4). Values rip2 and rip1OrRip2 imply reception of multicast packets. Default is rip1OrRip2.'
section: "4.2"
topics:
