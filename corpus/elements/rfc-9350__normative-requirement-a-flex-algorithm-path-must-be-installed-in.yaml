document: rfc-9350
kind: normative-requirement
summary: A Flex-Algorithm path MUST be installed in the MPLS forwarding plane using the label corresponding to the Prefix-SID advertised for that Flex-Algorithm. Traffic that should use Flex-Algorithm-specific paths MUST be dropped when no such paths are available.
section: "14.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
