document: rfc-1493
kind: protocol-element
summary: dot1dStpForwardDelay (dot1dStp 11) controls how long a port stays in each of the Listening and Learning states before transitioning to Forwarding, in hundredths of a second. It is also used to age all dynamic forwarding database entries when a topology change is underway.
section: "5.3"
