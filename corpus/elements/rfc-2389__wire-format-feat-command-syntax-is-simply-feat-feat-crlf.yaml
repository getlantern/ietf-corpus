document: rfc-2389
kind: wire-format
summary: FEAT command syntax is simply `feat = "Feat" CRLF` with no parameters. FEAT response uses a 211 multi-line format where each feature line begins with a mandatory single space, and the listing terminates with `211 End CRLF`.
