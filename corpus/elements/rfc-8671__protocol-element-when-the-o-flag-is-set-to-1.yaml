document: rfc-8671
kind: protocol-element
summary: When the O flag is set to 1 (Adj-RIB-Out), the Peer Address, Peer AS, and Peer BGP ID fields in the per-peer header are redefined to refer to the remote peer to which the encapsulated PDU is sent, rather than from which it was received.
