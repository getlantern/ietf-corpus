document: rfc-2879
kind: interoperability-note
summary: For 'color-illuminant', a receiver supporting a calibrated color space should declare any constraint on supported illuminants. In the absence of a color-illuminant constraint, a receiver is presumed to accept any specified illuminant value.
section: A.5
extracted_by: claude-sonnet-4-6
