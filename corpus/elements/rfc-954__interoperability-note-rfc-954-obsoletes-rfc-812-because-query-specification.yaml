document: rfc-954
kind: interoperability-note
summary: RFC 954 obsoletes RFC 812. Because query specification formats are stated to evolve over time, implementations should not hardcode format assumptions and should instead use the '?' command to discover supported syntax from the live server.
section: COMMAND LINES AND REPLIES
