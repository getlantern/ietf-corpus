document: rfc-8064
kind: interoperability-note
summary: At time of publication, RFC 6282 (6LoWPAN compression), RFC 4944 (IPv6 over IEEE 802.15.4), RFC 6775 (6LoWPAN Neighbor Discovery), and RFC 7428 (IPv6 over G.9959) may require updates to be fully compatible with these recommendations; future revisions should explain any design considerations that lead to use of link-layer-based stable IIDs.
