document: rfc-3327
kind: design-rationale
summary: The Path mechanism was designed in response to 3GPP requirements where network topology places intermediate proxies between a UA and its registrar that are not discoverable via SIP routing tables, DNS, or similar mechanisms. The path must be explicitly recorded during REGISTER so the home proxy can reconstruct the reverse route for inbound requests.
section: "1"
topics:
