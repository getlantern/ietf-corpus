document: rfc-6501
kind: wire-format
summary: 'The XCON-URI syntax is: XCON-URI = ''xcon'' '':'' [conf-object-id ''@''] host, where conf-object-id = 1*(unreserved / ''+'' / ''='' / ''/''). The host portion serves only as an identifier and is never resolved to an IP address.'
section: 3.3.1
topics:
