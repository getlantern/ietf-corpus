document: rfc-4194
kind: design-rationale
summary: SHF deliberately restricts numeric representation to hexadecimal only (no octal or decimal) and Word sizes to whole bytes. This simplification was intentional to ease implementations for practical present-day applications; formats for esoteric number systems or odd Word sizes are out of scope.
section: "1"
