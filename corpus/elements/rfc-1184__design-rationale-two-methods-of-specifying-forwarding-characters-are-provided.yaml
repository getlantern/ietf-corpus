document: rfc-1184
kind: design-rationale
summary: Two methods of specifying forwarding characters are provided—SLC_FORW1/SLC_FORW2 and FORWARDMASK—to ease client implementation. Many terminal drivers already support one or two line delimiters, making SLC_FORW1/2 easy to support without implementing a full in-process terminal driver, while FORWARDMASK accommodates drivers with richer delimiter support.
section: "5.6"
