document: rfc-9645
kind: design-rationale
summary: The tls-client-grouping and tls-server-grouping intentionally avoid any transport-level configuration (addresses, ports) so that consuming applications can define their own TCP connection strategy; for example, NETCONF Call Home can add TCP call-home configuration alongside the TLS grouping.
section: "1.1"
topics:
    - tls
    - yang
    - netconf
