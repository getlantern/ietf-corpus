document: rfc-5929
kind: interoperability-note
summary: The 'tls-unique' channel binding data may change over time due to renegotiation, creating a synchronization problem if the data changes between client authentication initiation and server processing of the first authentication message, causing spurious authentication failures.
section: "3.1"
topics:
    - tls
    - security
