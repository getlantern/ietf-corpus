document: rfc-6615
kind: interoperability-note
summary: The Observation Point table references the ENTITY MIB (RFC 4133) via ipfixObservationPointPhysicalEntity and the Interfaces MIB (RFC 2863) via ipfixObservationPointPhysicalInterface. Implementers wishing to specify physical observation points SHOULD implement these MIBs, but their implementation is OPTIONAL.
section: "7.1"
topics:
