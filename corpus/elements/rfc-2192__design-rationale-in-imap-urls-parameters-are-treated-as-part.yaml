document: rfc-2192
kind: design-rationale
summary: In IMAP URLs, parameters are treated as part of the normal path for relative URL resolution, deviating from RFC 1808. This is believed to match the behavior of the installed base and is expected to be documented in a future revision of the relative URL specification.
