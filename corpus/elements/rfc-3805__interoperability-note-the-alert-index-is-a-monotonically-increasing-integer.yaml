document: rfc-3805
kind: interoperability-note
summary: The Alert Index is a monotonically increasing integer; gaps in table index values signal that entries were deleted. Management applications detecting such gaps should re-acquire full printer state to detect state changes not captured in the trimmed Alert Table.
section: 2.2.13.4
topics:
