document: rfc-8377
kind: normative-requirement
summary: When a TRILL switch transmits a TRILL Data packet onto a link where any other TRILL switch requires explicit topology labeling, an explicit topology label MUST be included unless the packet is in topology zero (in which case it MAY be included).
section: 2.4.1
rfc2119_level: MUST
topics:
    - routing
