document: rfc-9537
kind: normative-requirement
summary: The required jCard "fn" property MUST use the Redaction by Empty Value Method to redact the property value. Removing the "fn" property would violate vCard (RFC 6350), and removing the value would violate fixed jCard array positions.
section: "3.2"
rfc2119_level: MUST
topics:
