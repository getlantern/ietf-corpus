document: rfc-4601
kind: normative-requirement
summary: Within one Address List Hello option, all addresses MUST be of the same address family; mixing IPv4 and IPv6 addresses within the same option is not permitted. The address family SHOULD match the IP source and destination of the packet header.
section: 4.3.4
rfc2119_level: MUST
topics:
    - multicast
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
