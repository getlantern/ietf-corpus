document: rfc-8679
kind: normative-requirement
summary: To defeat CE-based attacks that simulate link failures and trigger cascading egress link protection, a damping mechanism SHOULD be used by the egress router to suppress the services associated with the offending link or CE, effectively detaching them from the network.
section: "12"
rfc2119_level: SHOULD
topics:
    - mpls
    - security
