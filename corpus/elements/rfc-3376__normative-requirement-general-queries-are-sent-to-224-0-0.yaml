document: rfc-3376
kind: normative-requirement
summary: General Queries are sent to 224.0.0.1; Group-Specific and Group-and-Source-Specific Queries are sent to the queried multicast address. A system MUST accept and process any Query whose IP Destination Address contains any address (unicast or multicast) assigned to the receiving interface.
section: 4.1.12
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
