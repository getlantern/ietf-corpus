document: rfc-3655
kind: normative-requirement
summary: A response containing data marked Insecure in the answer or authority section MUST never have the AD bit set; the resolver SHOULD treat the data as Insecure whether or not SIG records are present.
section: "3"
rfc2119_level: MUST
topics:
