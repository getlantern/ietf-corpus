summary: 'The Protected Node Status Value Element (Type=3) encodes: 1-octet Type, variable-length Length (6 octets for IPv4, 18 octets for IPv6), 2-octet Addr Family, and the node address. It is carried in an MP Status TLV within a Label Mapping message sent over the tLDP session.'
