document: rfc-2613
kind: interoperability-note
summary: An external RMON probe may observe smonVlanIdStatsId=VID=0 on an Inter Switch Link, indicating a priority-tagged frame whose VLAN is determined by the ingress port's PVID; only a probe internal to the switch can correctly attribute such frames to the right VLAN.
section: "5"
topics:
