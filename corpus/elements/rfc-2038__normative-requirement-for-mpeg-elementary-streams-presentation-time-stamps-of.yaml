document: rfc-2038
kind: normative-requirement
summary: For MPEG Elementary Streams, Presentation Time Stamps of 32 bits at 90 kHz accuracy SHALL be carried in the fixed RTP header. All packets that make up an audio or video frame shall have the same timestamp.
section: "3"
rfc2119_level: REQUIRED
topics:
