document: rfc-8338
kind: wire-format
summary: The LDP P2MP PW Capability TLV (type 0x0703) is a 6-octet structure containing U bit, F bit, the TLV Code Point (16 bits), a 16-bit Length field (MUST be set to 2), and an S bit plus reserved fields; the S bit indicates advertisement (1) or withdrawal (0) of the capability.
