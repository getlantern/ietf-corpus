document: rfc-6864
kind: normative-requirement
summary: The IPv4 ID of non-atomic datagrams MUST NOT be reused when sending a copy of an earlier non-atomic datagram. This deprecates the RFC 1122 allowance for retransmitted segments to carry the same ID.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - ip
