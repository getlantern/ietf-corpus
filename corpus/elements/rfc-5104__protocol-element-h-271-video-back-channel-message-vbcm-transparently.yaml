document: rfc-5104
kind: protocol-element
summary: H.271 Video Back Channel Message (VBCM) transparently conveys ITU-T Rec. H.271 video back channel payloads from media receiver to media sender. Usage in multicast or centralized multipoint is restricted due to non-multicast-safe H.271 code points and the difficulty of correct state aggregation.
