document: rfc-6211
kind: interoperability-note
summary: For algorithms such as SHA-1, the NULL parameter may be included in the ASN.1 encoding by some implementations and omitted by others (see RFC 3370 Section 2.1 and RFC 4056 for conflicting conventions). Implementers must decide how to handle this corner case when comparing algorithm identifiers for equality.
section: "3"
topics:
