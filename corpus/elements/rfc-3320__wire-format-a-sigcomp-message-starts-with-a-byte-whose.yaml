document: rfc-3320
kind: wire-format
summary: A SigComp message starts with a byte whose five MSBs are all 1. Bit 5 (T-bit) indicates presence of a returned feedback item. Bits 6–7 (len) are non-zero when a partial state identifier follows; zero when UDVM bytecode is uploaded inline.
