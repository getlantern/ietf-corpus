document: rfc-5101
kind: normative-requirement
summary: The dateTimeSeconds type MUST be encoded as a 32-bit Unix timestamp; dateTimeMilliseconds as a 64-bit integer of milliseconds since epoch; dateTimeMicroseconds and dateTimeNanoseconds MUST be encoded as 64-bit integers in NTP format (RFC 1305).
section: "6.1"
rfc2119_level: MUST
topics:
    - measurement
