document: rfc-3420
kind: normative-requirement
summary: Any SIP extension that uses message/sipfrag MUST describe the replay and cut-and-paste threats unique to its particular usage, since a captured sipfrag part could be replayed or combined with other message parts in harmful ways.
section: "6"
rfc2119_level: MUST
