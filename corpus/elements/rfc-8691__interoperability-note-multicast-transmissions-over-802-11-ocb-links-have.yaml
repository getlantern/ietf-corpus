document: rfc-8691
kind: interoperability-note
summary: Multicast transmissions over 802.11-OCB links have known performance issues (per IEEE802-MCAST) that may be exacerbated in OCB mode; DAD and AR operations as specified in RFC 4861 cannot be guaranteed, and broadcast-based multicast is often detrimental to unicast traffic.
section: I
topics:
