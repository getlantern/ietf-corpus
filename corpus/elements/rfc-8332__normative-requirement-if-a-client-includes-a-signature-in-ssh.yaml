document: rfc-8332
kind: normative-requirement
summary: If a client includes a signature in SSH_MSG_USERAUTH_REQUEST, it MUST encode the same algorithm name in the signature field as in the outer request — either 'rsa-sha2-256' or 'rsa-sha2-512'.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
