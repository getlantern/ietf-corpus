document: rfc-8898
kind: design-rationale
summary: OAuth 2.0 and OpenID Connect are used to enable single sign-on for SIP, allowing users to authenticate once and gain access to both SIP and non-SIP services. The detailed OAuth2 procedure for obtaining tokens is intentionally left out of scope.
