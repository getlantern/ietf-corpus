document: rfc-9130
kind: protocol-element
summary: 'The ''ietf-isis'' module defines two RPC operations: ''clear-database'' (resets a particular IS-IS LSDB and restarts synchronization with all neighbors) and ''clear-adjacency'' (restarts a particular set of IS-IS adjacencies). Both take routing-protocol-instance-name and optional level and interface inputs.'
