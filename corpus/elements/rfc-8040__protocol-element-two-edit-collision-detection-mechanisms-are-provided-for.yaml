document: rfc-8040
kind: protocol-element
summary: 'Two edit collision detection mechanisms are provided for the datastore resource: a Last-Modified timestamp and an ETag entity-tag. Any change to configuration data resources updates both. The server MUST return an error if the datastore is locked by an external source (e.g., NETCONF).'
