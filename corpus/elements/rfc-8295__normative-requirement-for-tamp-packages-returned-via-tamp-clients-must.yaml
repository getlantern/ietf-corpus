document: rfc-8295
kind: normative-requirement
summary: For TAMP packages returned via /tamp, clients MUST support validation with a certificate (in addition to direct TA validation as specified in RFC 5934) and MUST reject the package if the digital signature does not validate back to an authorized TA.
section: 7.1.2
rfc2119_level: MUST
