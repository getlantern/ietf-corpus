document: rfc-8287
kind: wire-format
summary: The IGP-Adjacency Segment ID sub-TLV contains a 1-octet Adj. Type field (0=unnumbered, 1=parallel, 4=IPv4, 6=IPv6), a 1-octet Protocol field, a 2-octet Reserved field, variable-length Local Interface ID (4 or 16 octets), Remote Interface ID (4 or 16 octets), Advertising Node Identifier (4 or 6 octets), and Receiving Node Identifier (4 or 6 octets).
section: "5.3"
topics:
