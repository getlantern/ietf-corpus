document: rfc-4631
kind: protocol-element
summary: lmpDataLinkTable specifies data-bearing links associated with TE links, indexed by ifIndex. Fields include lmpDataLinkAddressType, local/remote IP addresses, and lmpDataLinkRemoteIfId. lmpDataLinkType is automatically populated by the node and does not require provisioning.
