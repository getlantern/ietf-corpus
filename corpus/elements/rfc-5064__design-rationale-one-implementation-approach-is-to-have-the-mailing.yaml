document: rfc-5064
kind: design-rationale
summary: One implementation approach is to have the mailing list expander generate an unambiguous URI based on the message identifier, and configure the archiving system to redirect such URIs to actual messages. This decouples the mailing list expander from the archive system, addressing the difficulty of tight integration.
section: "3.2"
