document: rfc-2835
kind: normative-requirement
summary: A HARP client MUST respond to HARP_REQUEST and InHARP_REQUEST messages if it is the target port. For multiple IP addresses (aliases), the client MUST cycle through all IP addresses and generate an InHARP_REPLY for each.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
