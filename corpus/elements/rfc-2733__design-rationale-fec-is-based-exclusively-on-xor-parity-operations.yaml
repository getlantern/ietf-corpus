document: rfc-2733
kind: design-rationale
summary: FEC is based exclusively on XOR (parity) operations because this enables a format that is independent of the media type, supports arbitrary block lengths and parity schemes, and allows the sender to adapt the FEC code without out-of-band signaling — the receiver can perform recovery without knowing the specific code in use.
section: "1"
topics:
    - rtp
    - realtime
