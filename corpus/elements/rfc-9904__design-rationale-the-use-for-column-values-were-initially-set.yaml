document: rfc-9904
kind: design-rationale
summary: The 'Use for' column values were initially set equal to the 'Implement for' column values (transcribed from RFC 8624), since historical interpretation treated them as covering both use and implementation. Where 'Implement for' is 'MUST', 'Use for' is set to 'RECOMMENDED', as 'MUST' is not permitted in 'Use for' columns.
section: "2.2"
topics:
    - dns
    - registry
    - security
