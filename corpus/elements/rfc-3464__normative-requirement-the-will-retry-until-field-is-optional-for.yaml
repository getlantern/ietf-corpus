document: rfc-3464
kind: normative-requirement
summary: The Will-Retry-Until field is optional for 'delayed' DSNs and MUST NOT appear in any other DSN type. Date-time fields in DSNs (Arrival-Date, Last-Attempt-Date, Will-Retry-Until) MUST use numeric timezones in [+/-]HHMM format.
section: 2.3.9
rfc2119_level: MUST NOT
topics:
