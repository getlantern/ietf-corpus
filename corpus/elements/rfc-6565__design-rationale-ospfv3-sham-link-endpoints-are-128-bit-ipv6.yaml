document: rfc-6565
kind: design-rationale
summary: OSPFv3 sham link endpoints are 128-bit IPv6 addresses rather than 32-bit Router IDs (as in OSPFv2), necessitating explicit configuration. Multiple OSPFv3 instances can be established across a single sham link, using the Instance ID in the protocol packet header to demultiplex them.
