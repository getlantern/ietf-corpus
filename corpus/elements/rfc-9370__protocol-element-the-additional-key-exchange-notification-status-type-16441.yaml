kind: protocol-element
summary: The ADDITIONAL_KEY_EXCHANGE notification (Status Type 16441, Protocol ID and SPI Size both 0) is used to link successive IKE_FOLLOWUP_KE exchanges to a corresponding CREATE_CHILD_SA exchange. The data is an opaque blob meaningful only to the responder.
