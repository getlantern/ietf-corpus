document: rfc-9209
kind: protocol-element
summary: The Proxy-Status HTTP response field is a Structured Fields List where each member represents an intermediary that handled the response. The first member is the intermediary closest to the origin server; the last is closest to the user agent. Members are String or Token values identifying the intermediary (e.g., a service name, hostname, or IP address), with optional parameters conveying additional handling details.
section: "2"
topics:
