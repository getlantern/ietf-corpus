summary: dot3ControlTable describes the MAC Control sublayer with dot3ControlFunctionsSupported (a BITS object with 'pause(0)' defined) and dot3ControlInUnknownOpcodes (count of MAC Control frames with unsupported opcodes). Only interfaces implementing MAC Control have a row in this table.
