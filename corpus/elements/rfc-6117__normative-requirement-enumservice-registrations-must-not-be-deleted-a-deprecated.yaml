document: rfc-6117
kind: normative-requirement
summary: Enumservice registrations MUST NOT be deleted. A deprecated Enumservice is handled by publishing a new Enumservice Specification that changes the <usage> element to 'DEPRECATED'; applications SHOULD expect to encounter legacy instances of deprecated Enumservices.
section: "11.7"
rfc2119_level: MUST NOT
topics:
