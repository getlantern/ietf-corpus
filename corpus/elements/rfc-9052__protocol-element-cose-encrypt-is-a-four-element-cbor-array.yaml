document: rfc-9052
kind: protocol-element
summary: COSE_Encrypt is a four-element CBOR array [protected, unprotected, ciphertext (bstr/nil), recipients ([+COSE_recipient])]. COSE_recipient uses the same structure with an optional recursive recipients field to enable nested key distribution. CBOR tag 96 identifies COSE_Encrypt.
