document: rfc-2425
kind: protocol-element
summary: The group construct (a dot-prefixed label before the type name) is used to group related attributes together for display purposes. Implementations that do not support grouping MAY strip off any text before the '.' and present types and values as normal.
section: 5.8.2
rfc2119_level: MAY
