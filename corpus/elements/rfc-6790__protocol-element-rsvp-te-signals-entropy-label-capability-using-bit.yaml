document: rfc-6790
kind: protocol-element
summary: RSVP-TE signals Entropy Label Capability using bit 9 of the Attribute Flags TLV in the LSP_ATTRIBUTES object. The ELC flag in a Path message indicates the ingress can process ELs in the upstream direction (bidirectional LSPs only); in a Resv message it indicates the egress can process ELs downstream.
section: "5.3"
topics:
    - mpls
