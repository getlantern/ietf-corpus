document: rfc-2252
kind: interoperability-note
summary: The IESG warns that until mandatory authentication mechanisms for LDAPv3 are standardized, clients and servers using update functionality are UNLIKELY TO INTEROPERATE, or MAY INTEROPERATE ONLY IF AUTHENTICATION IS REDUCED TO AN UNACCEPTABLY WEAK LEVEL. Implementors are discouraged from deploying update-capable LDAPv3 servers until a mandatory authentication standard is published as an RFC.
section: "2"
topics:
    - ldap
    - security
