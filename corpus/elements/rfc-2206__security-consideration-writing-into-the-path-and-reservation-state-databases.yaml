document: rfc-2206
kind: security-consideration
summary: Writing into the Path and Reservation State databases allows RSVP reservations to be made without authenticating through RSVP mechanisms, relying instead on SNMP authentication. This means SNMP access control is the sole gating mechanism for unauthorized reservation creation.
section: "4"
topics:
    - security
    - snmp
    - qos
