summary: 'QPACK defines two unidirectional streams: an encoder stream (type 0x02) carrying encoder instructions from encoder to decoder, and a decoder stream (type 0x03) carrying decoder instructions from decoder to encoder. These streams carry unframed sequences of instructions and must not be closed.'
