document: rfc-1342
kind: security-consideration
summary: The RFC explicitly states that security issues are not discussed in this memo. Implementers should nonetheless note that decoding arbitrary 8-bit values and displaying them could cause unwanted side-effects on the recipient's terminal; the document advises mail readers to guard against this.
section: Security Considerations
topics:
    - email
    - security
