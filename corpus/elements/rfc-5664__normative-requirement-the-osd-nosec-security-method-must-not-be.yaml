document: rfc-5664
kind: normative-requirement
summary: The OSD NOSEC security method MUST NOT be used for any I/O operation. Of the four T10 OSD security methods (NOSEC, CAPKEY, CMDRSP, ALLDATA), only non-NOSEC methods allow verification and enforcement of the metadata server's access control policy using layout credentials.
section: "13"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
