document: rfc-1662
kind: protocol-element
summary: Bit-stuffed framing inserts a '0' bit after all sequences of five contiguous '1' bits (including the last 5 bits of the FCS) to prevent simulation of the Flag Sequence. On reception, any '0' bit directly following five contiguous '1' bits is discarded prior to FCS computation.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
