document: rfc-7965
kind: normative-requirement
summary: For MS-PW co-routed binding, the initiating T-PE MUST set the C-bit and reset the S-bit. Each S-PE may select an alternative tunnel/LSP for the reverse direction only if it is co-routed with the forward tunnel/LSP.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
