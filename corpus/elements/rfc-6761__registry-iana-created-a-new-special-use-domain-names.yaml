summary: IANA created a new 'Special-Use Domain Names' registry, initially seeded with private-address reverse-mapping domains (from RFC 1918) and the Reserved Top Level DNS Names from RFC 2606. New entries require an IETF Standards Action or IESG Approval document with a 'Domain Name Reservation Considerations' section.
