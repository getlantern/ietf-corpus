document: rfc-3376
kind: wire-format
summary: 'The Membership Query message (Type=0x11) encodes: 8-bit Type, 8-bit Max Resp Code, 16-bit Checksum, 32-bit Group Address, 4-bit Resv, 1-bit S flag (Suppress Router-Side Processing), 3-bit QRV (Querier''s Robustness Variable), 8-bit QQIC (Querier''s Query Interval Code), 16-bit Number of Sources (N), followed by N×32-bit Source Addresses.'
section: "4.1"
topics:
    - multicast
