document: rfc-3307
kind: design-rationale
summary: The guidelines are driven by the need to avoid IPv6 multicast address collision at both the IPv6 layer and the link-layer. Several physical media (e.g., Ethernet, FDDI) map the low-order 32 bits of the IPv6 multicast address into the link-layer destination address, so collisions at the group ID level produce link-layer collisions.
section: "2"
topics:
    - multicast
    - ip
