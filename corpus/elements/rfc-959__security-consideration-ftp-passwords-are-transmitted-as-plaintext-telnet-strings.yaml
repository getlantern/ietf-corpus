document: rfc-959
kind: security-consideration
summary: FTP passwords are transmitted as plaintext Telnet strings over the control connection. The specification notes the server has no foolproof way to mask the password, making it the responsibility of the user-FTP process to hide sensitive password information from display.
section: 4.1.1
topics:
    - security
    - privacy
