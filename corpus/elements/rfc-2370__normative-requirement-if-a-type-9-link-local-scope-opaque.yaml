document: rfc-2370
kind: normative-requirement
summary: If a type-9 (link-local scope) Opaque LSA is to be flooded, it must not be sent out any interface other than the one it was received on. An implementation should track the IP interface associated with each link-local Opaque LSA.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
