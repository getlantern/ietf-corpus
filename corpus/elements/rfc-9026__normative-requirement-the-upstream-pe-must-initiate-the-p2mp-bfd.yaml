document: rfc-9026
kind: normative-requirement
summary: The Upstream PE MUST initiate the P2MP BFD session as MultipointHead (RFC 8562), MUST set the inner IP destination to 127.0.0.1/32 (IPv4) or ::1/128 (IPv6), and MUST include the BFD Discriminator attribute in the x-PMSI A-D Route with the My Discriminator value.
section: 3.1.6.1
rfc2119_level: MUST
topics:
    - vpn
    - multicast
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
