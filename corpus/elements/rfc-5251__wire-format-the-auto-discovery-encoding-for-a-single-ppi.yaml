document: rfc-5251
kind: wire-format
summary: 'The auto-discovery encoding for a single <PPI, CPI> tuple is: PPI Length (1 octet), PPI (variable), CPI AFI (2 octets, from RFC 1700), CPI Length (1 octet), CPI (variable). Both PPI and CPI are variable-length fields containing an address or <port index, address> tuple.'
section: 4.1.2
