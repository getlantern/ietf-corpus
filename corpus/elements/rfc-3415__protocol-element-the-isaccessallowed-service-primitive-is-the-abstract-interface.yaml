document: rfc-3415
kind: protocol-element
summary: 'The isAccessAllowed service primitive is the abstract interface to VACM, taking securityModel, securityName, securityLevel, viewType (read/write/notify), contextName, and variableName as inputs. It returns one of: accessAllowed, notInView, noSuchView, noSuchContext, noGroupName, noAccessEntry, or otherError.'
