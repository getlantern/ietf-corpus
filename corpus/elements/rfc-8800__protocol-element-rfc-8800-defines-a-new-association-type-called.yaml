document: rfc-8800
kind: protocol-element
summary: RFC 8800 defines a new Association type called 'Disjoint Association' (value 2), also referred to as DAT (Disjoint Association Type), based on the generic ASSOCIATION object defined in RFC 8697. A Disjoint Association Group (DAG) groups LSPs that must be computed with diverse (disjoint) paths.
