document: rfc-3805
kind: protocol-element
summary: The Interpreter sub-unit handles conversion of PDL or Control Language descriptions into marked images. The Interpreter Table has one entry per interpreter; prtInterpreterDefaultCharSetIn and prtInterpreterDefaultCharSetOut specify default coded character sets for that interpreter.
