document: rfc-9827
kind: design-rationale
summary: Future IPsec protocols such as Enhanced ESP (EESP) may introduce options for sending full 64-bit sequence numbers or omitting them entirely. Transform Type 5 is the designated negotiation vehicle for these future modes because it already governs how sequence numbers are handled.
section: "2"
topics:
