document: rfc-8315
kind: protocol-element
summary: The Cancel-Key header field contains a list of one or more <c-key> elements, each consisting of a scheme name and a Base64-encoded preimage value Base64(K). It is placed in cancel or supersede articles and reveals the secret key whose hash matches a Cancel-Lock entry in the target article.
section: "2.2"
topics:
    - security
