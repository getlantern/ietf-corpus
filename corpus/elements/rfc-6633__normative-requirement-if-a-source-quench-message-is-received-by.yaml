document: rfc-6633
kind: normative-requirement
summary: If a Source Quench message is received by any other transport-protocol instance, it MUST be silently ignored. Future applications cannot expect to receive these messages given the long-standing deprecation of their generation.
section: "6"
rfc2119_level: MUST
topics:
