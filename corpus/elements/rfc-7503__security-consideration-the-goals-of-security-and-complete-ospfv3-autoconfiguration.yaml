document: rfc-7503
kind: security-consideration
summary: The goals of security and complete OSPFv3 autoconfiguration are contradictory — autoconfiguration automatically adopts new devices into the network. Operators should carefully consider security requirements before deploying. Password-based HMAC-SHA authentication (Section 4) or OSPFv3 IPsec may be combined with autoconfiguration to mitigate this risk.
section: "8"
topics:
    - routing
    - security
