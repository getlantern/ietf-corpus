document: rfc-4383
kind: normative-requirement
summary: The SRTP replay list MUST NOT be updated based on the SRTP MAC; it MUST contain only indices of packets that have been TESLA-authenticated. Replay list updates occur only after successful TESLA verification.
section: 4.4.2
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - security
