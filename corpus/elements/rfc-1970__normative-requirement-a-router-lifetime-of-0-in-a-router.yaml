document: rfc-1970
kind: normative-requirement
summary: A Router Lifetime of 0 in a Router Advertisement indicates the router is not a default router and SHOULD NOT appear on the default router list. The Router Lifetime applies only to the router's usefulness as a default router, not to other fields or options.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
    - ip
