document: rfc-4310
kind: design-rationale
summary: Key data provided by a client maps to DNSKEY RR presentation formats, but the server is not obligated to use it. The server MAY issue out-of-band DNS queries to retrieve key data from the registered domain's apex to independently validate the DS information provided.
section: "2"
topics:
