document: rfc-2608
kind: design-rationale
summary: Scopes are administrative strings (not network topology) that allow administrators to provision service visibility to users; a UA configured with no scope uses DA/SA discovery to determine its scope list dynamically, enabling User Selectable Scopes. This separation allows fine-grained service provisioning without DNS or static configuration.
section: "11"
topics:
    - ldap
