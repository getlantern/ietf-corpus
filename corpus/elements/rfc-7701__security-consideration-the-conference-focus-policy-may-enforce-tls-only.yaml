document: rfc-7701
kind: security-consideration
summary: The conference focus policy MAY enforce TLS-only MSRP transport (Force TLS transport policy) to guarantee confidentiality and privacy. Without TLS, eavesdropping on the path between participant and MSRP switch is possible.
section: "11"
topics:
