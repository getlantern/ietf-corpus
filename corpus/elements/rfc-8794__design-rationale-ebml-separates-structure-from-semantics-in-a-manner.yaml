document: rfc-8794
kind: design-rationale
summary: 'EBML separates structure from semantics in a manner analogous to XML: the binary structural layer is defined by this RFC, while semantic layers are defined by separate EBML Schemas (analogous to XML Schemas). This allows the same structural framing to be reused by multiple unrelated formats such as Matroska and WebM.'
section: "1"
