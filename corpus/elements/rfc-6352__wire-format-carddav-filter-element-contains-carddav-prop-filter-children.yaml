document: rfc-6352
kind: wire-format
summary: CARDDAV:filter element contains CARDDAV:prop-filter children and a 'test' attribute (anyof|allof). CARDDAV:prop-filter targets a named vCard property and may contain CARDDAV:text-match and CARDDAV:param-filter; CARDDAV:param-filter targets a specific vCard parameter within that property.
