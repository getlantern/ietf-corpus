document: rfc-3080
kind: normative-requirement
summary: If a frame is poorly-formed (bad keyword, invalid parameters, unknown channel, mismatched sequence number, incorrect NUL usage, etc.), the session MUST be terminated without generating a response; logging a diagnostic entry is RECOMMENDED.
section: 2.2.1.1
rfc2119_level: MUST
