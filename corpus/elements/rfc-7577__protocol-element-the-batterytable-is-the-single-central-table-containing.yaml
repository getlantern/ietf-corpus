document: rfc-7577
kind: protocol-element
summary: 'The batteryTable is the single central table containing one conceptual row per battery in a managed entity, indexed by entPhysicalIndex from the Entity MIB (RFC 6933). It is divided into three groups: static properties (OIDs 1–9), current status (OIDs 10–18), and alarm thresholds and notification support (OIDs 19–25).'
