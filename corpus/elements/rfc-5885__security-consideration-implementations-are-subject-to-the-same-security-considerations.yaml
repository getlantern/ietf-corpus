document: rfc-5885
kind: security-consideration
summary: Implementations are subject to the same security considerations as RFC 5085, RFC 5880, and RFC 5881; no additional security issues are raised. The IP/UDP-encapsulated BFD uses TTL/Hop Limit procedures and the Generalized TTL Security Mechanism (GTSM) from RFC 5881 Section 5 as a security mechanism.
