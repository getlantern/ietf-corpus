document: rfc-8044
kind: wire-format
summary: The 'ipv4prefix' data type (value 11) encodes an IPv4 prefix as a 1-octet Reserved field, a 1-octet Prefix-Length (0–32), and a fixed 4-octet Prefix, for a total of 6 octets. This differs from RFC 6572, which used sub-octet bit alignment; this definition aligns both fields on octet boundaries.
section: "3.11"
topics:
