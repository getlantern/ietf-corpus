document: rfc-1289
kind: normative-requirement
summary: Implementation of the End Communication Layer Group is mandatory for all systems that implement end layer communications. It includes the Remote State Table, End System Counter Table, and supplementary scalars such as phivEndMaxLinks and phivEndRetransmitFactor.
