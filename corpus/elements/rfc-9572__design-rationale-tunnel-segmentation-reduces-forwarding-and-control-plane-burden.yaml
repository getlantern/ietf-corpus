document: rfc-9572
kind: design-rationale
summary: 'Tunnel segmentation reduces forwarding and control plane burden: instead of ingress-replicating to all PEs in an AS, a PE only replicates to local PEs and ABRs/RBRs which further replicate downstream. Smaller regions also improve tunnel aggregation efficiency and reduce BIER subdomain size.'
section: "2.1"
topics:
    - mpls
    - routing
    - multicast
