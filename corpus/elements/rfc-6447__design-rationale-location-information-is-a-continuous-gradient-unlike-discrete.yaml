document: rfc-6447
kind: design-rationale
summary: Location information is a continuous gradient unlike discrete-valued notification quantities, making it difficult to determine when a change is sufficiently large to warrant a notification. This motivates the location-specific filter extensions (movement, speed, region entry/exit, civic element changes) defined in this document.
section: "1"
topics:
