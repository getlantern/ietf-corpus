document: rfc-5595
kind: normative-requirement
summary: New versions of applications/protocols that include version negotiation SHOULD continue to use the same Service Code. They MAY allocate a new Service Code if significant new capabilities warrant it; if that new code is associated with a Well Known or Registered port, the DCCP Ports registry MUST be updated.
section: 2.2.1
rfc2119_level: SHOULD
topics:
    - congestion
    - registry
