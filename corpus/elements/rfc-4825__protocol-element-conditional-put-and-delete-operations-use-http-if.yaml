document: rfc-4825
kind: protocol-element
summary: Conditional PUT and DELETE operations use HTTP If-Match / If-None-Match headers with entity tags. All resources within a single XML document share the same entity tag; the Etag returned in a successful PUT or DELETE response reflects the updated document-level entity tag, enabling cache synchronization without a separate GET.
section: "7.11"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
