document: rfc-5798
kind: normative-requirement
summary: While in the Backup state, a router MUST NOT respond to ARP requests (IPv4) or ND Neighbor Solicitations (IPv6) for virtual router addresses, MUST NOT send ND Router Advertisements, and MUST discard packets with a destination link-layer MAC equal to the virtual router MAC address.
section: 6.4.2
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
