document: rfc-1443
kind: design-rationale
summary: Textual conventions are defined as ASN.1 macro expansions that happen conceptually at implementation time, not at run-time. This design allows MIB modules to define human-readable named types with precise semantics while preserving the on-wire encoding of the underlying primitive type.
