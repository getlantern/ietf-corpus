document: rfc-8415
kind: design-rationale
summary: Prefix delegation (IA_PD) was deliberately designed to require no knowledge of the requesting router's internal topology on the part of the delegating router; only the client's identity is needed to select a prefix. This makes it suitable for ISP-to-subscriber delegation of prefixes that subscribers subnet internally.
section: "6.3"
topics:
    - ip
