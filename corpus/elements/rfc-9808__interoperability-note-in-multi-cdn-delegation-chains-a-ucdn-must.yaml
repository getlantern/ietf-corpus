document: rfc-9808
kind: interoperability-note
summary: In multi-CDN delegation chains, a uCDN must aggregate telemetry from all dCDNs to which it delegated traffic when reporting usage upstream. Without this aggregation, delegated traffic becomes invisible to the content provider or higher-level uCDN.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
