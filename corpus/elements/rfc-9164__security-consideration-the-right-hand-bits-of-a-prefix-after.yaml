document: rfc-9164
kind: security-consideration
summary: The right-hand bits of a prefix after the prefix length are required to be zero; this prevents a malicious party from using those bits to transmit covert data. Such abuse is detected by tag validity checking and also by inspection of the raw protocol bytes.
section: "6"
