document: rfc-7641
kind: normative-requirement
summary: The server MUST ensure that a client eventually observes the latest resource state if the resource does not undergo a new change. When a client rejects a notification with Reset or the last retransmission of a confirmable notification times out, the server MUST remove the associated entry from the observer list.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
