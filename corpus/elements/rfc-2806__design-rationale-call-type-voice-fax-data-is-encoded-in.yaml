document: rfc-2806
kind: design-rationale
summary: Call type (voice/fax/data) is encoded in the URL scheme specifier rather than as a parameter because digital networks route different call types differently; specifying a fax call via the scheme ensures correct network routing and equipment selection. Encoding it as a parameter would reduce human readability.
section: 2.7.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
