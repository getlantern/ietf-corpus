document: rfc-6409
kind: normative-requirement
summary: A null return path (MAIL FROM:<>) is permitted and MUST NOT, in itself, be cause for rejecting a message, as MUAs need to generate null return-path messages for reasons including disposition notifications.
section: "3.2"
rfc2119_level: MUST NOT
