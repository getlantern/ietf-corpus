document: rfc-9224
kind: design-rationale
summary: The bootstrap approach uses existing IANA allocation registries (IPv4, IPv6, AS numbers, root zone) as the source of truth, because IANA already maintains the authoritative delegation data. This avoids duplicating processes and keeps the RDAP bootstrap data consistent with allocation records.
