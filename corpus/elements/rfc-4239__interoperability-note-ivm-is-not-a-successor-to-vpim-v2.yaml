document: rfc-4239
kind: interoperability-note
summary: IVM is not a successor to VPIM v2 but an alternative for a different application (desktop/unified messaging vs. voicemail-to-voicemail). VPIM v2 was designed for voicemail system interchange, not voicemail-to-email-client interoperability.
