document: rfc-2110
kind: wire-format
summary: The Content-Location header is encoded as 'Content-Location:' followed by an absoluteURI or relativeURI. The Content-Base header is encoded as 'Content-Base:' followed by an absoluteURI only. Both use RFC 822 syntax and may require line folding for long URIs.
section: "4.1"
