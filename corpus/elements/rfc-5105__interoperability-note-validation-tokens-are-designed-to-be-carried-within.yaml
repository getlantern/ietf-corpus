document: rfc-5105
kind: interoperability-note
summary: Validation Tokens are designed to be carried within EPP-based Registry/Registrar protocols; RFC 5076 defines the ENUM Validation Information Mapping for EPP. Exclusive XML canonicalization is specifically required to handle namespace inheritance when the token is embedded in such enclosing XML documents.
section: "3"
