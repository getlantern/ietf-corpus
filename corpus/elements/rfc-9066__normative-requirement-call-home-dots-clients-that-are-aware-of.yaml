document: rfc-9066
kind: normative-requirement
summary: Call Home DOTS clients that are aware of on-path CGNs MUST NOT include the external IP address and/or port number identifying the suspect attack source, but MUST include the internal IP address and/or port number to enable the Call Home DOTS server to identify the compromised device.
section: 5.3.2
rfc2119_level: MUST NOT
topics:
    - security
    - nat
    - ip
