document: rfc-6793
kind: interoperability-note
summary: The BGP Communities attribute [RFC1997] encodes AS numbers in the high-order two octets and will not function correctly for NEW BGP speakers with non-mappable four-octet AS numbers. Such speakers should use four-octet AS specific extended communities [RFC5668] instead.
section: "5"
topics:
