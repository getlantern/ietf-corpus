document: rfc-9830
kind: security-consideration
summary: SR Policy information advertised via BGP MUST be confined to the trusted SR domain (a single AS or multiple ASes within a single provider network). BGP peering sessions for SR Policy SAFI should be isolated from EBGP sessions outside the SR domain to prevent accidental or erroneous advertisement.
section: "7"
topics:
    - routing
    - bgp
    - security
