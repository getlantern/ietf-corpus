document: rfc-9132
kind: normative-requirement
summary: DOTS implementations MUST support the CoAP Observe Option for both 'mitigate' and 'config' resources. Mitigation status notifications from the DOTS server MUST always use Non-confirmable CoAP messages, overriding the RFC 7641 default that sends at least one Confirmable message every 24 hours.
section: 4.4.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
