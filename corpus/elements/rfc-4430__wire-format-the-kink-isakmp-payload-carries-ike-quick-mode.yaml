document: rfc-4430
kind: wire-format
summary: The KINK_ISAKMP payload carries IKE Quick Mode (phase 2) payloads and includes InnerNextPload (1 octet), QMMaj (4 bits, MUST be 1), QMMin (4 bits, MUST be 0), RESERVED (2 octets), followed by the Quick Mode payloads. Each KINK_ISAKMP payload MUST contain a single Quick Mode transaction.
section: 4.2.6
topics:
