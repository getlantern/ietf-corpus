document: rfc-7162
kind: protocol-element
summary: 'The QRESYNC parameter to SELECT/EXAMINE accepts four arguments: last known UIDVALIDITY, last known modification sequence, an optional set of known UIDs, and an optional parenthesized list of known sequence ranges with corresponding UIDs for match data. If UIDVALIDITY does not match, the server MUST ignore remaining parameters and behave as if no dynamic message data changed.'
section: 3.2.5
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
