document: rfc-4619
kind: wire-format
summary: 'The Control Word for one-to-one mapping mode is 4 octets: bits 0-3 MUST be 0 (PW data indicator), bit 4 is FECN (F), bit 5 is BECN (B), bit 6 is DE (D), bit 7 is C/R (C), bits 8-9 are FRG (fragmentation per RFC4623), bits 10-15 are Length, and bits 16-31 are the Sequence Number.'
section: "7.3"
topics:
    - mpls
