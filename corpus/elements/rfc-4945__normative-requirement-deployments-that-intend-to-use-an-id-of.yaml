document: rfc-4945
kind: normative-requirement
summary: Deployments that intend to use an ID of FQDN, USER_FQDN, IPV4_ADDR, or IPV6_ADDR MUST issue certificates with corresponding SubjectAltName fields populated with the same data. The dNSName field MUST NOT contain wildcards, and CIDR notation MUST NOT be used in SubjectAltName iPAddress fields.
section: 5.1.3.6
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
