document: rfc-7272
kind: protocol-element
summary: The Media Stream Correlation Identifier is a 32-bit field present in both the RTCP XR IDMS Report Block and the RTCP IDMS Settings Packet. When the sender is an SC (SPST=1), it carries the SyncGroupId identifying the synchronization group. The value 0 indicates an empty field; 2^32-1 is reserved.
section: "6"
