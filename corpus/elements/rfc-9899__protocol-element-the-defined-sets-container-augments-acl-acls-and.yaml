document: rfc-9899
kind: protocol-element
summary: 'The ''defined-sets'' container augments /acl:acls and provides reusable named sets: ipv4-prefix-sets, ipv6-prefix-sets, port-sets, protocol-sets, icmpv4-type-sets, icmpv6-type-sets, and aliases. Each set is identified by a unique name and referenced from ACE match criteria via leafref typedefs.'
