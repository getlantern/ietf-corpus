document: rfc-2982
kind: design-rationale
summary: Subset implementations that omit wildcarding or delta processing are explicitly supported to accommodate resource-constrained managed systems. Omitting wildcarding reduces retrieval complexity; omitting deltas eliminates ongoing state and sampling overhead. These subsets are driven by dependencies from the Event MIB and the need to support lower-end systems.
section: "2.4"
topics:
