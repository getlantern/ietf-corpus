document: rfc-5628
kind: normative-requirement
summary: A notifier MAY include the <temp-gruu> element when a contact has an instance ID and a temporary GRUU is associated with the AOR/instance ID. It SHOULD be included if the subscriber is authorized to register to the AOR, and SHOULD NOT be included otherwise unless explicitly configured.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
