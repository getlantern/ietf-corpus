document: rfc-1442
kind: normative-requirement
summary: An OBJECT IDENTIFIER instance may have at most 128 sub-identifiers, and each sub-identifier must not exceed 2^32-1 (4294967295). The final sub-identifier of any administratively assigned object name shall be positive; zero is reserved for future use.
section: 7.1.3
rfc2119_level: MUST
topics:
    - snmp
