document: rfc-1772
kind: normative-requirement
summary: 'A conformant implementation is required to support all of the following options when injecting BGP-4 routing information into BGP-3: inject default only, allow controlled deaggregation of specific routes, or allow export of only non-aggregated NLRI.'
