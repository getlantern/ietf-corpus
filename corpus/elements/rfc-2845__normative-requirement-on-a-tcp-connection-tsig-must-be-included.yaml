document: rfc-2845
kind: normative-requirement
summary: On a TCP connection, TSIG MUST be included on the first and last DNS envelopes. It MUST be placed on at least every 100th envelope. If a client TSIG verification fails, the client MUST close the connection.
section: "4.4"
rfc2119_level: MUST
topics:
    - dns
    - security
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
