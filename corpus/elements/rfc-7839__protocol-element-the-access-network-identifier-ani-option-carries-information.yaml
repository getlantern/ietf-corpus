document: rfc-7839
kind: protocol-element
summary: The Access-Network-Identifier (ANI) option carries information about the identity of the access network to which a DHCP client is attached, including access-technology type, network identifier, and operator identifiers. It is added by the DHCP relay agent in messages sent toward the server.
