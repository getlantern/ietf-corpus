document: rfc-8745
kind: security-consideration
summary: A malicious PCEP speaker could be spoofed and used as an attack vector by creating spurious associations; adding a false protection LSP to a PPAG could give a misleading sense of network reliability, causing failures when the working LSP goes down. Securing the PCEP session using TLS (RFC 8253) per BCP 195 (RFC 7525) is RECOMMENDED.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
    - mpls
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
