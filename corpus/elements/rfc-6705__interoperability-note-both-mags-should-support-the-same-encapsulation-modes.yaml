document: rfc-6705
kind: interoperability-note
summary: Both MAGs SHOULD support the same encapsulation modes defined for the LMA-MAG tunnel (IPv4/IPv6-over-IPv6, IPv4/IPv6-over-IPv4, IPv4/IPv6-over-IPv4-UDP per RFC 5844, TLV-header UDP and GRE tunneling per RFC 5845) to ensure compatibility for the inter-MAG localized routing tunnel.
section: "6.2"
topics:
    - mobility
    - vpn
