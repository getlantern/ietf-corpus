document: rfc-2651
kind: design-rationale
summary: 'Query routing is a client responsibility: the client collates, filters, and chases referrals. This gives the end-user maximum control over query resolution at the cost of added client complexity. A proxy can optionally decouple referral chasing for simple clients.'
section: 3.1.2
