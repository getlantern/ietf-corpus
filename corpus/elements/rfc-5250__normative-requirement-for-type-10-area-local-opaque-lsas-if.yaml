document: rfc-5250
kind: normative-requirement
summary: For type-10 (area-local) Opaque LSAs, if the area associated with the LSA differs from the area of the target interface, the LSA MUST be discarded and not acknowledged. An implementation SHOULD keep track of the OSPF area associated with each area-local Opaque LSA.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
