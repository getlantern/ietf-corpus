document: rfc-6956
kind: protocol-element
summary: 'Five Ethernet-processing LFBs are defined: EtherPHYCop (physical copper layer), EtherMACIn (MAC-layer ingress including locality check), EtherClassifier (Ethernet type/VLAN dispatch), EtherEncap (Ethernet encapsulation for egress), and EtherMACOut (MAC-layer egress). They collectively abstract physical and data-link layer processing for Ethernet media.'
section: "5.1"
topics:
