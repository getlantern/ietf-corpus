document: rfc-5574
kind: normative-requirement
summary: 'The ''mode'' and ''ptime'' values proposed in SDP contents MUST NOT be used for decoding: those values are not needed to properly decode an RTP Speex stream, as each Speex frame contains all needed information to decode itself.'
section: "6"
rfc2119_level: MUST NOT
