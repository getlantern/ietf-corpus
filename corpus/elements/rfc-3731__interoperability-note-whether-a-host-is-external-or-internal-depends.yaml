document: rfc-3731
kind: interoperability-note
summary: Whether a host is 'external' or 'internal' depends on the repository in which it is used for delegation. A host such as ns1.example1.com used as a name server for example2.com in the same repository MUST be treated as an internal (non-subordinate) host, subject to subordinate-host operation rules within that repository.
section: "1.1"
topics:
    - dns
