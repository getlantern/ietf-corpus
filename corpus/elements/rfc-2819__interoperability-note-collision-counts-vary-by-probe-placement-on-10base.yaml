document: rfc-2819
kind: interoperability-note
summary: Collision counts vary by probe placement. On 10BASE-5/10BASE-2, repeater-port probes detect more collisions than station-connected probes. On 10BASE-T, placement has less impact since a station detects collisions only while transmitting; probes on stations and repeaters should report similar counts.
