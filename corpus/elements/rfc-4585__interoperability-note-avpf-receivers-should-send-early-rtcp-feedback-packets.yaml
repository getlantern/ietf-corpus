document: rfc-4585
kind: interoperability-note
summary: AVPF receivers SHOULD send Early RTCP feedback packets only when all sending entities in the session support AVPF. In mixed AVP/AVPF sessions, receivers MAY include feedback in regularly scheduled RTCP packets following RFC 3550 timing but MUST NOT rely on the sender reacting to any feedback.
section: "5"
topics:
    - rtp
    - realtime
