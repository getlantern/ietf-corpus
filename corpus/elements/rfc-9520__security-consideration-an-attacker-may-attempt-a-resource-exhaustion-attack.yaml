document: rfc-9520
kind: security-consideration
summary: An attacker may attempt a resource exhaustion attack by sending queries for a large number of names and/or types that all result in resolution failure, exhausting the resolver's failure cache memory. Resolvers SHOULD bound memory devoted to this cache.
section: "5"
topics:
    - dns
    - security
