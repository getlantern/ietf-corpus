document: rfc-5691
kind: security-consideration
summary: 'The AAC extension_payload() mechanism used to embed MPEG Surround data creates a covert channel: extra data is gracefully skipped by decoders that do not support it and could be used to transmit unauthorized data inside an otherwise valid stream.'
