document: rfc-9669
kind: design-rationale
summary: BPF is no longer an acronym (formerly 'Berkeley Packet Filter'); the 'e' in eBPF stood for 'extended' but is now also dropped in common usage. The original cBPF (classic BPF) design is preserved through the deprecated 'packet' conformance group for legacy packet-access instructions, allowing a clean separation from the extended ISA.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
