document: rfc-3761
kind: security-consideration
summary: Even if DNSSEC is deployed, a service using ENUM for address translation should not blindly trust that a peer is the intended party; services should always authenticate peers as part of setup for the service itself.
section: "6.1"
topics:
    - dns
    - security
