document: rfc-4237
kind: protocol-element
summary: The vPIMUser object class is an AUXILIARY class that MUST include vPIMRfc822Mailbox and vPIMTelephoneNumber, and MAY include vPIMSpokenName, vPIMSupportedUABehaviors, vPIMSupportedAudioMediaTypes, vPIMSupportedMessageContext, vPIMTextName, vPIMExtendedAbsenceStatus, vPIMMaxMessageSize, and vPIMSubMailboxes. It contains information useful for verifying that the dialed telephone number corresponds to the intended recipient.
section: "2"
topics:
