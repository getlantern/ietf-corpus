document: rfc-6626
kind: security-consideration
summary: This specification operates within the security constraints of Mobile IPv4 (RFC5944), NAI (RFC2794), and RFC5177. Home agents SHOULD limit the number and size of prefixes assignable to a single Mobile Router to prevent address exhaustion attacks.
section: "4"
topics:
