document: rfc-9240
kind: normative-requirement
summary: The ALTO server MAY omit property values that are inherited rather than explicitly defined to achieve compact encoding. As a consequence, the ALTO Client MUST NOT assume inherited property values will be present in the response; if needed, the Client MUST apply the entity domain's inheritance rules to derive them.
section: "7.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
