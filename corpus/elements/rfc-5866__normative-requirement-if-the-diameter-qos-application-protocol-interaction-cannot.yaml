document: rfc-5866
kind: normative-requirement
summary: If the Diameter QoS application protocol interaction cannot be related to a prior authentication, the AE MUST authenticate the QoS reservation requesting entity as part of the Diameter QoS protocol interaction in order to authorize the QoS request.
section: "3.4"
rfc2119_level: MUST
