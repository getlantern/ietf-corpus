document: rfc-7256
kind: state-machine
summary: 'Grey-list conditional access flow: AN detects IGMP/MLD join matching a grey-list entry → sends Multicast Admission Control (Add) to NAS → NAS responds with Multicast Replication Control (Add) to authorize replication, or a rejection command code to deny; on IGMP/MLD leave the AN sends Multicast Admission Control (Delete) and stops replication.'
section: 6.2.4
topics:
