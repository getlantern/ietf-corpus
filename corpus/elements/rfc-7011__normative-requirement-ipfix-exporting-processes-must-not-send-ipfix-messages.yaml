document: rfc-7011
kind: normative-requirement
summary: IPFIX Exporting Processes MUST NOT send IPFIX Messages containing ill-formed UTF-8 string values for Information Elements of the string data type; Collecting Processes SHOULD detect and ignore such values. The string data type MUST be encoded in UTF-8 format.
section: 6.1.6
rfc2119_level: MUST NOT
topics:
    - measurement
    - security
