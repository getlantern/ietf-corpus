document: rfc-7766
kind: normative-requirement
summary: When sending multiple queries over a TCP connection, clients MUST NOT reuse the DNS Message ID of an in-flight query on that connection in order to avoid Message ID collisions.
section: 6.2.1
rfc2119_level: MUST NOT
topics:
