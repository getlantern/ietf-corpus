document: rfc-8305
kind: normative-requirement
summary: DNS queries SHOULD be sent over IPv6 first when multiple DNS server addresses are configured. If DNS queries to the IPv6 address receive no responses, that address may be marked as penalized and queries sent to other DNS server addresses.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
    - ip
    - v6ops
