kind: state-machine
summary: 'Feature set matching uses a 7-step algorithm: (1) formulate AND of both predicates; (2) expand ''set'' notation; (3) push negations inward via De Morgan''s laws; (4) eliminate negations by substituting LE/GE/NL/NG operators; (5) reduce to disjunctive normal form; (6) for each conjunction, group by feature tag and merge constraints; (7) if any conjunction survives unsatisfied, the feature sets overlap.'
