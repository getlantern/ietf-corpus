document: rfc-4650
kind: design-rationale
summary: Off-line pre-computation of the initial DH half-key (g^xi) is permitted to reduce real-time roundtrip delay and mitigate DoS risk, since the expensive DH exponentiation is decoupled from the latency-sensitive call setup phase.
