document: rfc-3393
kind: design-rationale
summary: The metric is deliberately parameterized rather than fixed because uses of ipdv remain partly a research topic and because different communities (e.g., ITU-T Y.1541 and Demichelis) propose different definitions. Parameterization allows a single framework to encompass competing proposals as long as all parameters are reported.
