document: rfc-8471
kind: security-consideration
summary: The bound token must be integrity-protected so that an attacker cannot remove the binding or substitute a Token Binding ID without detection. The Token Binding protocol does not prevent cooperating clients from sharing a bound token with its corresponding private key.
section: "7.1"
topics:
    - security
    - tls
