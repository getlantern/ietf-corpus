document: rfc-2862
kind: design-rationale
summary: 'Transmitting pointer coordinates separately from video is motivated by the conflicting resolution requirements: viewgraphs demand high spatial resolution while pointer movements require high temporal resolution. Encoding both in a single video stream would require at least S-VHS quality, making compression expensive and uncompressed transmission bandwidth-prohibitive.'
