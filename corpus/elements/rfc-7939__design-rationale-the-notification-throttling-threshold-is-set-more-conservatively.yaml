document: rfc-7939
kind: design-rationale
summary: The notification throttling threshold is set more conservatively than RFC 4750's OSPF recommendation because NHDP targets lossy wireless MANET channels where excessive notifications risk collisions and dropped packets, and dense deployments may trigger many simultaneous topology-change events.
section: 5.1.3.2
topics:
