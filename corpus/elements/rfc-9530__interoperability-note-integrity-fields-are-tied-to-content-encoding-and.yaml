document: rfc-9530
kind: interoperability-note
summary: Integrity fields are tied to Content-Encoding and Content-Type metadata. A given resource may produce different digest values when transferred with different content codings (e.g., uncompressed vs. Brotli-encoded). Peers must use the same representation metadata to reproduce a digest.
section: "1.2"
topics:
    - http
