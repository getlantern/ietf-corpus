document: rfc-2002
kind: wire-format
summary: The Prefix-Lengths Extension (Type 19) follows the Mobility Agent Advertisement Extension and contains one prefix-length byte per router address listed in the ICMP Router Advertisement, encoded in the same order as those router addresses. Length equals the Num Addrs value.
