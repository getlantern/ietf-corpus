document: rfc-2853
kind: privacy-consideration
summary: Anonymous authentication is provided to allow a client to authenticate a peer service without revealing its own identity, addressing privacy concerns about the specific inquiries made or avoidance of being tracked. Many mechanisms do not support anonymity; the application is always informed if the service is unavailable.
section: "3.4"
topics:
    - privacy
    - security
