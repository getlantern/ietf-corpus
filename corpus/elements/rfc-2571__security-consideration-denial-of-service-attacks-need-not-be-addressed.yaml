document: rfc-2571
kind: security-consideration
summary: Denial-of-service attacks need not be addressed by Security Models because such attacks are often indistinguishable from ordinary network failures that a viable management protocol must tolerate. Traffic analysis need not be addressed because SNMP traffic patterns are predictable and typically involve few management stations.
section: "1.4"
topics:
    - snmp
    - security
