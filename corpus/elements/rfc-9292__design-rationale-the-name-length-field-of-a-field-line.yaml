document: rfc-9292
kind: design-rationale
summary: 'The Name Length field of a Field Line has a minimum value of 1, which is intentional: it allows the zero value of the Content Terminator to unambiguously signal end-of-section in indeterminate-length encoding without a separate sentinel byte.'
section: "3.2"
topics:
