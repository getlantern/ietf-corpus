document: rfc-4992
kind: security-consideration
summary: XPC may be tunneled over TLS (XPCS) by establishing TLS immediately after TCP connection and before any blocks are sent. Server authentication for XPCS follows the convention described in IRIS-BEEP (RFC 3983 Section 6). TLS enables both authentication and confidentiality.
section: "9"
topics:
    - tls
    - security
