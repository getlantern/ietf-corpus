document: rfc-8826
kind: security-consideration
summary: The core browser security guarantee — that users can safely visit arbitrary web sites including those hosting malicious scripts — defines the WebRTC threat model. Any new WebRTC functionality must be designed with the intent to meet this standard, treating the browser as a Trusted Computing Base.
section: "3"
topics:
