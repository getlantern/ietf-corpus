summary: The Sym. Encrypted Integrity Protected Data Packet (Tag 18) wraps encrypted content with a Modification Detection Code. It supersedes the bare Symmetrically Encrypted Data Packet (Tag 9) by prepending an encrypted MDC packet to detect tampering.
