document: rfc-3398
kind: interoperability-note
summary: The auto-answer call setup flow using the CON (Connect Message) is not supported in ANSI ISUP networks; in ANSI networks, an ANM (without prior ACM) would be sent instead of a CON. Gateways implementing this flow must account for the ANSI variant.
section: 7.1.2
topics:
    - voip
    - realtime
