document: rfc-7268
kind: normative-requirement
summary: If multiple EAPoL-Announcement Attributes are present in a packet, their String fields MUST be concatenated before being parsed for EAPoL-Announcement TLVs, enabling TLVs longer than 253 octets to be transported. Similarly, EAPoL-Announcement TLVs larger than 253 octets MUST be fragmented across multiple EAPoL-Announcement Attributes.
section: "2.8"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
