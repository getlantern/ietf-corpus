document: rfc-5121
kind: normative-requirement
summary: The AdvDefaultLifetime (router lifetime) in router advertisements MUST be either zero or between MaxRtrAdvInterval and 43200 seconds. The default value is 2 * MaxRtrAdvInterval. This overrides the RFC 4861 specification.
section: "8.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
