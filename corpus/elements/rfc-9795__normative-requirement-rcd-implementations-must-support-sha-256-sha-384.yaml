document: rfc-9795
kind: normative-requirement
summary: RCD implementations MUST support SHA-256, SHA-384, and SHA-512 hash algorithms for computing "rcdi" digests. Hash algorithm identifiers MUST use only lowercase letters and MUST NOT contain hyphen characters; the character following the algorithm string MUST be a hyphen, with the subsequent base64-encoded digest.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - jose
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
