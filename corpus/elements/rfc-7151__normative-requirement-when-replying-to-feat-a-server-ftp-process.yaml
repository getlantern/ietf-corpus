document: rfc-7151
kind: normative-requirement
summary: When replying to FEAT, a server-FTP process that supports the HOST command MUST include a line containing the single word 'HOST'. It SHOULD be sent in upper case to maximize interoperability.
section: "3.4"
rfc2119_level: MUST
