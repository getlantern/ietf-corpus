document: rfc-5939
kind: normative-requirement
summary: Attribute capabilities ('a=acap') MUST NOT embed any capability negotiation parameters including 'csup', 'creq', 'acap', 'tcap', 'pcfg', 'acfg', or any defined extensions. Violations render the attribute capability invalid.
