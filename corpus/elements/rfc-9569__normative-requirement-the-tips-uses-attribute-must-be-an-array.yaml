document: rfc-9569
kind: normative-requirement
summary: 'The TIPS ''uses'' attribute MUST be an array with resource IDs of every network information resource for which the TIPS service can provide updates. It is RECOMMENDED that this set be closed under resource dependency: if the TIPS serves resource R1 which depends on R0, R0 should also be in the ''uses'' set.'
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
