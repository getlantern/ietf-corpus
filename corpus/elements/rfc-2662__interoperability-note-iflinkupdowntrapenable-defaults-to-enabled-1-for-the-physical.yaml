document: rfc-2662
kind: interoperability-note
summary: ifLinkUpDownTrapEnable defaults to enabled(1) for the physical interface and disabled(2) for fast and interleaved channel interfaces. ifConnectorPresent defaults to true(1) for physical and false(2) for channel interfaces. ifPhysAddress should be a zero-length octet string. ifRcvAddressTable is not applicable for ADSL interfaces.
section: 4.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
