document: rfc-9621
kind: protocol-element
summary: System Policy is input from an operating system or other global preferences that constrains or influences how an implementation gathers Candidate Paths and Candidate Protocol Stacks and races candidates during Connection establishment. The Transport Services API does not specify an interface for reading or writing System Policy.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
