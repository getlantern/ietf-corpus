document: rfc-7450
kind: protocol-element
summary: The Response MAC is a 48-bit source authentication value generated by the relay, computed as a hash digest of the source IP address, source UDP port, request nonce, and a private secret. Gateways must echo this value in subsequent Membership Update and Teardown messages to authenticate with the relay.
section: 5.1.4.6
topics:
    - multicast
    - security
