document: rfc-1374
kind: security-consideration
summary: The RFC notes security considerations but provides no protocol-level authentication or access-control mechanisms; HIPPI is a physically local, high-speed interface and security is presumed to rely on physical access control to the switch and cable plant rather than cryptographic means.
section: Security Considerations
topics:
