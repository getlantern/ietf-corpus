document: rfc-3075
kind: normative-requirement
summary: SHA-1 is REQUIRED for digest, HMAC-SHA1 is REQUIRED for MACs, DSA-with-SHA1 is REQUIRED for signatures, and Enveloped Signature transform is REQUIRED. RSA-with-SHA1 is RECOMMENDED. Use of MD5 is NOT RECOMMENDED due to known weaknesses.
section: "6.1"
rfc2119_level: REQUIRED
