document: rfc-8167
kind: normative-requirement
summary: A ULP MUST NOT perform reverse-direction ONC RPC operations until the peer has indicated it is prepared to handle them, to prevent connection loss from sending reverse-direction messages to an unprepared endpoint.
section: "6"
rfc2119_level: MUST NOT
