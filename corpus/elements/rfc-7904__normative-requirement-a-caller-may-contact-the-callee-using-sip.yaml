document: rfc-7904
kind: normative-requirement
summary: A caller MAY contact the callee using SIP or SIPS but SHOULD follow the preference indicated in the callee's contact_prefs attribute. A callee that accepts SIPS calls only SHOULD indicate this in its contact_prefs.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
