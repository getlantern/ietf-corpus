document: rfc-8999
kind: wire-format
summary: The QUIC long header begins with a Header Form bit set to 1, followed by 7 version-specific bits, a 32-bit Version field, an 8-bit Destination Connection ID Length, Destination Connection ID (0–255 bytes), an 8-bit Source Connection ID Length, Source Connection ID (0–255 bytes), and version-specific data of arbitrary length.
