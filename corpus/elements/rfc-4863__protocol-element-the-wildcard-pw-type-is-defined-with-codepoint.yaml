document: rfc-4863
kind: protocol-element
summary: The Wildcard PW Type is defined with codepoint 0x7FFF. It signals to the targeted PE that it should determine the PW Type for both directions and signal that back in a Label Mapping message. For matching purposes it is interpreted to match any PW Type other than itself.
