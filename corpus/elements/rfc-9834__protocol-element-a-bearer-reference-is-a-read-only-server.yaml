document: rfc-9834
kind: protocol-element
summary: A bearer reference is a read-only, server-assigned string ('bearer-reference') that uniquely identifies a bearer within the provider network. Customers retrieve this reference and include it in AC service requests to unambiguously bind an AC to a specific bearer.
