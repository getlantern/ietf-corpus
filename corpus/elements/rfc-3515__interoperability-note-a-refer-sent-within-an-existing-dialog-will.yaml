document: rfc-3515
kind: interoperability-note
summary: A REFER sent within an existing dialog will not fork. A REFER sent outside the context of a dialog MAY fork and, if accepted by multiple agents, MAY create multiple subscriptions. The agent sending the REFER manages each subscription separately and does NOT merge state from separate subscriptions.
section: "3.9"
topics:
    - sip
    - realtime
