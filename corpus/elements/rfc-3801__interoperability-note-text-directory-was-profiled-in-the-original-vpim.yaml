document: rfc-3801
kind: interoperability-note
summary: Text/Directory was profiled in the original VPIM v2 spec for transporting contact information but did not find widespread adoption and is no longer a feature. Conforming implementations SHOULD NOT send it, but MUST accept it for backward compatibility with earlier implementations.
section: 4.5.2
topics:
    - email
