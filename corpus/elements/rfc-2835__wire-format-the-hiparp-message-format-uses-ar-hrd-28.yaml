document: rfc-2835
kind: wire-format
summary: 'The HIPARP message format uses ar$hrd=28 and a different field layout than generic ARP: fields are ar$hrd (16b), ar$pro (16b), ar$op (16b), ar$pln (8b), ar$rhl (8b, requester HW address length), ar$thl (8b, target HW address length), ar$rpa (32b), ar$tpa (32b), ar$rha (variable), ar$tha (variable). ar$rhl and ar$thl are 6 for HIPPI-6400, 10 for HIPPI-800.'
section: "6.2"
