document: rfc-8474
kind: normative-requirement
summary: In cases where a client detects inconsistent ObjectID responses from a server, it SHOULD fall back to relying on the guarantees of RFC 3501. Client authors MUST ensure their design cannot enter an infinite loop of discarding cache and refetching data without user interaction.
section: "8.4"
rfc2119_level: MUST
topics:
    - email
