document: rfc-8314
kind: protocol-element
summary: 'A new SMTP ''tls'' Received header additional-registered-clause records the TLS ciphersuite negotiated for a connection. Optionally, a ''group'' sub-clause records the Diffie-Hellman group name. ABNF: tls-cipher-clause = CFWS ''tls'' FWS tls-cipher [ CFWS tls-dh-group-clause ]; tls-cipher is either a registered ciphersuite name or a 4-digit hex identifier.'
section: "4.3"
topics:
    - tls
    - email
