document: rfc-7138
kind: protocol-element
summary: 'TSG (3 bits): Tributary Slot Granularity field indicates the supported tributary slot type. Values: 0 = ignored (non-multiplexed), 1 = 1.25/2.5 Gbps with fallback, 2 = 2.5 Gbps only (RFC 4328 interfaces), 3 = 1.25 Gbps only; values 4-7 are reserved.'
