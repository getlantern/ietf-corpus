document: rfc-7724
kind: security-consideration
summary: 'TCP-based Active Leasequery is vulnerable to connection exhaustion attacks: malicious requestors can open connections and then send invalid, partial, or no queries to exhaust the server''s connection pool. Servers SHOULD limit accepted connections and idle connection lifetime.'
