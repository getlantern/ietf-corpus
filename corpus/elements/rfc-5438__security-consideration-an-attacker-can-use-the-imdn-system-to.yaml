document: rfc-5438
kind: security-consideration
summary: An attacker can use the IMDN system to mount denial-of-service attacks by sending IMs with IMDN requests to flood intermediaries (e.g., large URI-list expansion) or to 'bounce' IMDNs from unsuspecting endpoints. Logging all IMDN requests on the recipient user agent is suggested as a mitigation for tracking abuse.
section: "14"
topics:
    - security
    - realtime
