document: rfc-4933
kind: privacy-consideration
summary: The <contact:disclose> element enables clients to express per-element disclosure preferences (allow or restrict) for name, org, addr, voice, fax, and email fields. A flag value of '0'/'false' restricts disclosure; '1'/'true' permits it as an exception to the server's announced data collection policy.
section: "2.9"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
