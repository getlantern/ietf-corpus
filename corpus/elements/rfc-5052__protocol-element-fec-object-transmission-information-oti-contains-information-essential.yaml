document: rfc-5052
kind: protocol-element
summary: 'FEC Object Transmission Information (OTI) contains information essential to the decoder for decoding the encoded object. It consists of three element types: Mandatory (defined in this specification, required per FEC scheme type), Common (defined in this specification, optional per FEC scheme), and Scheme-specific (defined by the FEC scheme, opaque to the CDP).'
