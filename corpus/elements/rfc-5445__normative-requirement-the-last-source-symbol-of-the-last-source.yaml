document: rfc-5445
kind: normative-requirement
summary: The last source symbol of the last source block MUST be logically padded with zeroes when another Encoding Symbol is computed based on it, ensuring consistent interpretation by sender and receiver. The padded bytes need not actually be transmitted with the last source symbol's data.
section: 3.2.2.2
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
