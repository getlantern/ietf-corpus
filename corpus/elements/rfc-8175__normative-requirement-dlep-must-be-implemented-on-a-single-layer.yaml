document: rfc-8175
kind: normative-requirement
summary: DLEP MUST be implemented on a single Layer 2 domain. MAC addresses MUST be unique within the router-modem session, and the MAC address supplied in all DLEP Messages is used unmodified as the Destination MAC address for frames emitted by the participating router.
section: "3"
rfc2119_level: MUST
topics:
    - routing
