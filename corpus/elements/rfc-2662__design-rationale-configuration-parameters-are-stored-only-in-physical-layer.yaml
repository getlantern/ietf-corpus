document: rfc-2662
kind: design-rationale
summary: Configuration parameters are stored only in physical-layer profile tables. Channel ifEntrys carry no configuration of their own; instead they use the ifStackTable to locate their parent physical-layer entry and inherit its configuration, avoiding duplication across channel types.
section: 4.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
