document: rfc-8624
kind: normative-requirement
summary: DSA (algorithm 3) and DSA-NSEC3-SHA1 (algorithm 6) MUST NOT be used for DNSSEC signing or validation. These algorithms are not widely deployed and are vulnerable to private key compromise when using a weak or compromised random number generator.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
