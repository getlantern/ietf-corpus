document: rfc-8317
kind: interoperability-note
summary: By default and for backward compatibility with non-E-Tree EVPN, an AC that does not carry a Leaf designation is treated as a Root AC. Operators must explicitly configure ACs as Leaf before activation to enforce leaf-to-leaf traffic isolation.
