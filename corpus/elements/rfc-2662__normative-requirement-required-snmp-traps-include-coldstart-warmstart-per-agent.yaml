document: rfc-2662
kind: normative-requirement
summary: 'Required SNMP traps include: coldStart/warmStart per agent (e.g., per DSLAM) and linkUp/linkDown per physical-layer interface. A linkDown trap must be generated whenever Lof, Los, Lol, Loss of Signal Quality, or Lpr occurs; the corresponding linkUp is sent when all link failure conditions clear.'
section: "5.5"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
