document: rfc-5730
kind: wire-format
summary: The transaction identifier <trID> element combines a client-supplied <clTRID> and a server-assigned <svTRID>. Both are returned in every response. The <svTRID> is unique to the server; clients use <clTRID> to correlate commands with responses.
section: "2.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
