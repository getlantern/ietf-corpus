document: rfc-8896
kind: normative-requirement
summary: An implementor of this extension MUST treat a cost entry as a JSON array of values (not a single number) if that cost type was queried as a Calendar. The expected array length is the 'number-of-intervals' value announced in the IRD.
section: "3.3"
rfc2119_level: MUST
topics:
    - json
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
