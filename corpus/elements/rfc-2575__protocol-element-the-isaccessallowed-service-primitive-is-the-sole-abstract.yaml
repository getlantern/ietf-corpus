document: rfc-2575
kind: protocol-element
summary: The isAccessAllowed service primitive is the sole abstract interface of the View-based Access Control Model. It takes securityModel, securityName, securityLevel, viewType (read/write/notify), contextName, and variableName as inputs, and returns statusInformation of accessAllowed, notInView, noSuchView, noSuchContext, noGroupName, noAccessEntry, or otherError.
section: "3"
topics:
