document: rfc-7110
kind: normative-requirement
summary: The Reply Path return code field MUST be set to zero in a Reply Path TLV carried on an echo request message and MUST be ignored on receipt. The field is populated only in echo replies to report the result of return path selection.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
