document: rfc-5761
kind: normative-requirement
summary: If both ICE and RTP/RTCP multiplexing are desired, the initial offer MUST contain 'a=rtcp-mux', candidate lines for both RTP and RTCP, and an 'a=rtcp:' fallback port for each multiplexed media stream.
section: 5.1.3
rfc2119_level: MUST
topics:
