document: rfc-2765
kind: protocol-element
summary: IPv4-mapped addresses (0::ffff:a.b.c.d) are used in IPv6 packets to refer to IPv4 nodes that are not IPv6-capable. When an IPv6-only node sends packets to an IPv4 node, it uses the IPv4-mapped address as the destination, which signals to the translator that translation is needed.
section: "2.1"
topics:
    - ip
    - v6ops
