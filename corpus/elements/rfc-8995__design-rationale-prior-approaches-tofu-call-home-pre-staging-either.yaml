document: rfc-8995
kind: design-rationale
summary: Prior approaches (TOFU, call-home, pre-staging) either require human intervention, expose domain identity to the manufacturer, or require real-time manufacturer connectivity and transfer authorization responsibility to the manufacturer. BRSKI uses signed vouchers so the manufacturer authorizes only which registrar the pledge may trust; the registrar retains policy control, connectivity to the MASA is needed only during bootstrapping, and no out-of-band user action is required.
section: "1.1"
topics:
    - security
    - pkix
