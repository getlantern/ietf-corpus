document: rfc-6880
kind: protocol-element
summary: principalIsDisabled is a boolean attribute used to disable a principal; it SHOULD default to FALSE. principalLastCredentialChangeTime, principalCreateTime, and principalModifyTime are single-valued RFC 3339 timestamps tracking credential changes, creation, and non-credential modifications respectively.
