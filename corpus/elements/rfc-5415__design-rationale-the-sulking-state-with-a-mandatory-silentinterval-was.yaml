document: rfc-5415
kind: design-rationale
summary: The Sulking state with a mandatory SilentInterval was introduced after repeated discovery or DTLS failures to prevent the WTP from being used as a source of repeated connection floods against an AC. This silent period minimizes the WTP's contribution to DoS attacks on the network infrastructure.
section: 2.3.1
topics:
    - security
