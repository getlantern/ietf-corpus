document: rfc-7861
kind: normative-requirement
summary: A successful structured privilege assertion MUST be enumerated in the rcr_assertions field of the rgss3_create_res reply; if the server receives an unrecognized structured privilege assertion, it MUST reject with auth_stat RPCSEC_GSS_UNKNOWN_MESSAGE.
section: 2.7.1.4
rfc2119_level: MUST
topics:
    - security
    - crypto
