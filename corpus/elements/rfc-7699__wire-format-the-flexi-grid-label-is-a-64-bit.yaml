document: rfc-7699
kind: wire-format
summary: 'The Flexi-Grid Label is a 64-bit encoding with fields: Grid (3 bits), C.S. (4 bits), Identifier (variable), n (16-bit two''s-complement integer for central frequency), m (16-bit integer for slot width), and Reserved (set to zero on transmission). This extends the 32-bit fixed-grid lambda label defined in RFC 6205.'
section: "4.1"
topics:
