summary: 'The Repair FEC Payload ID is an 8-byte field prepended to FEC repair packets: Source Block Number SBN (16-bit), Encoding Symbol ID ESI (16-bit, k to n-1), Source Block Length k (16-bit), and Number of Encoding Symbols n (16-bit).'
