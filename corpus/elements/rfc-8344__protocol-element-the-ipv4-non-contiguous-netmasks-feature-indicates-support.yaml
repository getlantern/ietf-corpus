document: rfc-8344
kind: protocol-element
summary: The 'ipv4-non-contiguous-netmasks' feature indicates support for configuring non-contiguous subnet masks. When supported, the 'subnet' choice in the IPv4 address list allows either 'prefix-length' (uint8, 0..32) or 'netmask' (yang:dotted-quad); otherwise only prefix-length is available.
section: "4"
topics:
