document: rfc-6313
kind: protocol-element
summary: Structured Data Information Elements MAY be used in Options Template Sets, including as scope fields. This enables encoding of complex aggregated Observation Points (e.g., a PSAMP Selection Sequence Report Interpretation combining multiple router interfaces and linecards) that cannot be expressed with flat IPFIX records.
section: "5.3"
topics:
    - measurement
