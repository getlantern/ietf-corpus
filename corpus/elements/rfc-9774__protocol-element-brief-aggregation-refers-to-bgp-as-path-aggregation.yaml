summary: Brief aggregation refers to BGP AS_PATH aggregation per RFC 4271 Section 9.2.2.2 where any resulting AS_SETs are discarded and the ATOMIC_AGGREGATE attribute is attached; the resulting AS_PATH is the longest leading common sequence of tuples from contributing routes.
