document: rfc-5533
kind: wire-format
summary: The R1bis message (Type=5) is generated when a packet arrives referencing a non-existent context (Shim6 Payload Extension header or type-64–127 control message). It carries the 47-bit Packet Context Tag from the triggering packet and a 32-bit Responder Nonce, plus an optional Responder Validator.
