document: rfc-8253
kind: interoperability-note
summary: An existing PCEP session cannot be secured via TLS; the session MUST be closed and re-established with TLS. During incremental upgrade, the PCEP speaker SHOULD allow session establishment with and without TLS; once both ends support PCEPS, the session is re-established with TLS.
section: "5"
topics:
    - tls
    - security
    - routing
