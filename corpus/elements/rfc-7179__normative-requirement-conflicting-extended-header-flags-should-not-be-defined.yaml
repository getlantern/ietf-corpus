document: rfc-7179
kind: normative-requirement
summary: Conflicting extended header flags SHOULD NOT be defined. If conflicting extensions appear in the same packet, results are unpredictable; if they are defined despite this guidance, careful thought must be given to specifying their handling.
section: "2.4"
rfc2119_level: SHOULD NOT
