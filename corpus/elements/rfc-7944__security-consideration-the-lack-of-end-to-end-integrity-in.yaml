document: rfc-7944
kind: security-consideration
summary: 'The lack of end-to-end integrity in Diameter creates a transitive-trust requirement: nodes must trust that each adjacent peer properly validates DRMP from its own peers, extending potentially through long chains. If future end-to-end Diameter security is applied, agent modification of DRMP AVPs could violate integrity protection.'
section: "12.3"
topics:
    - diameter
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
