document: rfc-9835
kind: protocol-element
summary: The 'ip-connection' container (gated by 'layer3-ac') supports IPv4 and IPv6 address assignment via provider DHCP, DHCP relay, static addressing, or SLAAC (IPv6). 'address-allocation-type' selects the mode; 'local-address' and 'prefix-length' define the PE interface address and, for SLAAC, the advertised prefix.
section: "5.5"
