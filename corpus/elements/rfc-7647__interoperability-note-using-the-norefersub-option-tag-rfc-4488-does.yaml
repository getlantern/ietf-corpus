document: rfc-7647
kind: interoperability-note
summary: 'Using the norefersub option tag (RFC 4488) does not relax the out-of-dialog requirement for REFER, even if placed in a Require header field, because the recipient is still allowed to return Refer-Sub: true and create an implicit subscription.'
