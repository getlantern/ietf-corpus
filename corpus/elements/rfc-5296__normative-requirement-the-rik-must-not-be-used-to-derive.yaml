document: rfc-5296
kind: normative-requirement
summary: The rIK MUST NOT be used to derive any other keys and MUST NOT be transported to any entity other than the peer and server. Its length MUST equal the length of the rRK, and it MUST be expired when the EMSK expires.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
