summary: 'The RAMS signaling uses three RTCP transport-layer feedback messages: RAMS Request (RAMS-R, SFMT=1), RAMS Information (RAMS-I, SFMT=2), and RAMS Termination (RAMS-T, SFMT=3). All are sent with PT=RTPFB (205) and FMT=RAMS (6), and are payload-independent.'
