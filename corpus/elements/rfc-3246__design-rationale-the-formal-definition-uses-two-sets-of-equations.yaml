document: rfc-3246
kind: design-rationale
summary: 'The formal definition uses two sets of equations: ''aggregate behavior'' (eq_1/eq_2), which are packet-identity-unaware and describe service to the EF aggregate, and ''packet-identity-aware'' (eq_3/eq_4), which enable bounding the delay of an individual EF packet. Both characterize a single device''s behavior, not two modes.'
