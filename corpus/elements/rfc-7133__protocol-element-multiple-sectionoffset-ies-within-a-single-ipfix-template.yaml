document: rfc-7133
kind: protocol-element
summary: Multiple sectionOffset IEs within a single IPFIX Template apply positionally to packet section IEs in declaration order. If there are fewer sectionOffset IEs than packet section IEs, the remaining packet sections have an implied offset of zero; extra sectionOffset IEs beyond the count of packet section IEs are meaningless.
section: 3.2.2
topics:
