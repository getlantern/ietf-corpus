document: rfc-6609
kind: protocol-element
summary: The 'global' variables namespace allows accessing shared variables as 'global.<identifier>' (e.g., 'set "global.i_am_on_vacation" "1";'). The namespace has no sub-namespaces, and the variable-name part must be a valid identifier. Variables declared via 'global' command and accessed via the 'global' namespace are one and the same.
section: 3.4.2
topics:
    - email
