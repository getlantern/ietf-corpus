document: rfc-8247
kind: design-rationale
summary: ENCR_AES_GCM_16 is kept at SHOULD rather than promoted higher because, while widely implemented for ESP, the relatively small computation load of IKEv2 meant many IKEv2 implementations never added AES-GCM support.
