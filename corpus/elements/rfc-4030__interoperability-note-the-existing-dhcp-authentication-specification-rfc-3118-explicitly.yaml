document: rfc-4030
kind: interoperability-note
summary: The existing DHCP Authentication specification (RFC 3118) explicitly excludes relay-agent data from its authentication because relay-agent information is added after the client sends its message. This specification fills that gap for the relay-agent-to-server segment only.
section: "1"
topics:
    - security
