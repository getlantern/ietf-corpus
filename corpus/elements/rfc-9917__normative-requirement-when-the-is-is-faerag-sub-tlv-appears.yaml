document: rfc-9917
kind: normative-requirement
summary: When the IS-IS FAERAG Sub-TLV appears more than once in the set of FAD Sub-TLVs for a given Flex-Algorithm from a given IS, the first occurrence in the lowest-numbered LSP from that IS MUST be used and any other occurrences MUST be ignored.
section: "5"
rfc2119_level: MUST
topics:
    - routing
