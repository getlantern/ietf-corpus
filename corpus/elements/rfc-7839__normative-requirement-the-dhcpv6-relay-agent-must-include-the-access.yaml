document: rfc-7839
kind: normative-requirement
summary: The DHCPv6 relay agent MUST include the Access-Technology-Type Option (OPTION_ANI_ATT, code 105) whenever it includes any of the Network-Name, Access-Point-Name, or Access-Point-BSSID options in a Relay-forward message.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
