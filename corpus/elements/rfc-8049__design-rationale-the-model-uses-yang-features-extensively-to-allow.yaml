document: rfc-8049
kind: design-rationale
summary: 'The model uses YANG features extensively to allow modular implementations: IPv4/IPv6 support, individual routing protocols (rtg-ospf, rtg-bgp, rtg-rip, rtg-vrrp), QoS, encryption, cloud access, extranet VPN, site diversity, BFD, fast-reroute, and multicast are all gated by feature declarations, so implementations can advertise only supported capabilities.'
section: "6.1"
topics:
    - yang
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
