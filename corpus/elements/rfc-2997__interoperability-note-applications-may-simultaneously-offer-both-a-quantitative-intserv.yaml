document: rfc-2997
kind: interoperability-note
summary: Applications may simultaneously offer both a quantitative Intserv service (Guaranteed or Controlled Load) and the Null Service in the same ADSPEC, enabling network policy to decide which service type to provide. For example, a telephony application might benefit from Guaranteed Service but also advertise Null Service as a fallback.
section: 2.1.3
topics:
    - qos
    - diffserv
