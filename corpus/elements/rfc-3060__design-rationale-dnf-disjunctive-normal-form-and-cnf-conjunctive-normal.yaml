summary: DNF (Disjunctive Normal Form) and CNF (Conjunctive Normal Form) were chosen as the mechanisms for combining policy conditions because they strike a balance between expressiveness and tractability, deliberately avoiding full predicate calculus which would render consistency checking and PDP algorithms intractable.
