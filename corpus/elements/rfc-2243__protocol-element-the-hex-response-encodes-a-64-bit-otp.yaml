summary: The 'hex' response encodes a 64-bit OTP as 16 hexadecimal characters (with optional whitespace) prefixed by 'hex:'. The 'word' response encodes a 64-bit OTP as 6 OTP dictionary words prefixed by 'word:'. These explicitly identify the encoding to avoid ambiguity.
