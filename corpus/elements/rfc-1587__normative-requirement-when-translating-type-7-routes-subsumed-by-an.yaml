document: rfc-1587
kind: normative-requirement
summary: 'When translating type-7 routes subsumed by an address range to a type-5 LSA: if path type is external type-2, the type-5 metric is set to the largest type-7 metric within the range plus 1; if path type is external type-1, it is set to the largest metric. The highest path type among subsumed routes is used for the type-5 LSA.'
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
