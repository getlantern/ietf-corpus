document: rfc-9967
kind: registry
summary: IANA created the 'SCIM Event URIs' registry under the SCIM Schema URIs registry group, with Expert Review procedure. Event URI structure is 'urn:ietf:params:scim:event:{class}:{name}:{other}' where class is 'feed', 'prov', or 'misc'. Once allocated, names MUST NOT be reallocated.
