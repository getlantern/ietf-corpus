document: rfc-3830
kind: protocol-element
summary: 'Keys are derived from a TGK using PRF(TGK, constant || cs_id || csb_id || RAND). The 32-bit constants are taken from consecutive decimal digits of e: TEK=0x2AD01C64, authentication key=0x1B5C7973, encryption key=0x15798CEF, salting key=0x39A2C14B.'
