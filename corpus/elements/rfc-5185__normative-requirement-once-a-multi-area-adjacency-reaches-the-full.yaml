document: rfc-5185
kind: normative-requirement
summary: Once a multi-area adjacency reaches the FULL state, it is advertised as a link type 1 (point-to-point) in the Router LSA with Link ID set to the remote router's Router ID and Link Data set to the neighbor's IP address or IfIndex for unnumbered interfaces.
section: "2.7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
