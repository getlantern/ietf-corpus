document: rfc-4028
kind: normative-requirement
summary: When a proxy inserts a Session-Expires header field into a response (because the UAS did not support session timer but the UAC did), it MUST set the 'refresher' parameter to 'uac' and MUST add the 'timer' option tag to a Require header field in the response.
section: "8.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
