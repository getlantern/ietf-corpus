document: rfc-4636
kind: design-rationale
summary: The FA Error Extension is defined as non-skippable because a mobile node that cannot interpret it must not use the care-of address, ensuring that error status from the foreign agent is never silently ignored in a way that could lead to an inconsistent or insecure network attachment.
section: "3"
topics:
