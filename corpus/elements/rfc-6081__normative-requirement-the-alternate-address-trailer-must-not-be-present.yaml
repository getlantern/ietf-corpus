document: rfc-6081
kind: normative-requirement
summary: The Alternate Address Trailer MUST NOT be present in any packets other than indirect bubbles sent by a Teredo client. Each entry in the Alternate Address/Port List MUST contain a valid unicast IPv4 address, and the Port field MUST NOT be zero.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - nat
    - v6ops
