document: rfc-4901
kind: normative-requirement
summary: The HC PW MUST be used for compressed packets only. If a flow is not compressed, it MUST NOT be placed on the HC PW. HC PWs MUST be bi-directional, with a unidirectional leg set up in each direction using the same PW type for signaling in both directions.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
