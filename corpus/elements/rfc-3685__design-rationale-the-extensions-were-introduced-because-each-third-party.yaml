document: rfc-3685
kind: design-rationale
summary: The extensions were introduced because each third-party spam/virus tool has its own header format, forcing users to write tool-specific SIEVE scripts that break portability. By normalizing results to a numeric range, implementations can abstract away tool-specific details and scripts remain portable across environments.
section: "1"
