document: rfc-6344
kind: normative-requirement
summary: The Signal Type field in the VCAT TLV MUST never change over the lifetime of a VCG. The LCR field MUST NOT change over the life of a VCG. The VCG ID MUST NOT change over the lifetime of a VCG but MAY change over the lifetime of a call.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
