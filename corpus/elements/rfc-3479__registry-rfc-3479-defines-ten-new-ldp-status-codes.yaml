document: rfc-3479
kind: registry
summary: 'RFC 3479 defines ten new LDP status codes carried in the Status TLV of Notification messages: ''No LDP Session'' (0x1A, E=0), ''Zero FT seqnum'' (0x1B, E=1), ''Unexpected TLV/Session Not FT'' (0x1C, E=1), ''Unexpected TLV/Label Not FT'' (0x1D, E=1), ''Missing FT Protection TLV'' (0x1E, E=1), ''FT ACK sequence error'' (0x1F, E=1), ''Temporary Shutdown'' (0x20, E=0), ''FT Seq Numbers Exhausted'' (0x21, E=1), ''FT Session parameters changed'' (0x22, E=1), ''Unexpected FT Cork TLV'' (0x23, E=1).'
section: "8.1"
topics:
