document: rfc-3267
kind: interoperability-note
summary: 'In a gateway scenario between non-IP (GSM/3GPP) and IP networks, the gateway MUST forward CMR values in both directions. For a GW-to-GW scenario, the gateway should forward the minimum of: the CMR received from the IP side, the CMR calculated from non-IP reception quality, and any CMR the gateway chooses for congestion control on the IP side.'
section: "3.9"
topics:
    - rtp
    - realtime
    - voip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
