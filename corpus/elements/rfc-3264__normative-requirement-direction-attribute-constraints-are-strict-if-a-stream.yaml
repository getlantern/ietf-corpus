document: rfc-3264
kind: normative-requirement
summary: 'Direction attribute constraints are strict: if a stream is offered as sendonly, the answer MUST be recvonly or inactive; if offered as recvonly, the answer MUST be sendonly or inactive; if offered as inactive, it MUST be marked inactive in the answer.'
section: "6.1"
rfc2119_level: MUST
topics:
