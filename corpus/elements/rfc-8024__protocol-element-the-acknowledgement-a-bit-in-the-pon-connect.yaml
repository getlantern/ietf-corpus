document: rfc-8024
kind: protocol-element
summary: The Acknowledgement (A) bit in the PON Connect TLV indicates whether the sender has previously received a PON Connect TLV from the recipient. It enables the two OLTs to confirm bidirectional PON application connectivity within the Redundancy Group.
