document: rfc-6478
kind: normative-requirement
summary: If the transmitting PE does not want to use a new timer value requested via acknowledgment, it MUST refresh the PW OAM message with its preferred timer value. The receiving PE MUST NOT request a new refresh timer value more than once per refresh interval.
section: 5.3.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
