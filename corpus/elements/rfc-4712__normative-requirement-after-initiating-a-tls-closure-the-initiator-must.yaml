document: rfc-4712
kind: normative-requirement
summary: After initiating a TLS closure, the initiator MUST discard any TLS messages until it receives a closure alert. The other party, upon receiving a closure alert, MUST immediately transmit a TLS closure alert.
section: 2.2.2.1
rfc2119_level: MUST
topics:
    - tls
    - realtime
