document: rfc-6012
kind: normative-requirement
summary: Implementations MUST support DTLS over UDP and SHOULD support DTLS over DCCP. Syslog over DTLS over TCP MUST NOT be used; TLS over TCP (RFC 5425) is the appropriate mechanism when a reliable secure transport is required.
section: "5.1"
rfc2119_level: MUST
topics:
    - syslog
    - tls
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
