document: rfc-8487
kind: interoperability-note
summary: When an IGMP/MLD Proxy receives an Mtrace2 Query on its Incoming Interface, it notes WRONG_IF in the Forwarding Code and sends a Reply back to the client. When the Query arrives on the Outgoing Interface, it is forwarded onto the Incoming Interface toward the upstream router.
section: "6.4"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
