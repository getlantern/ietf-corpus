document: rfc-9763
kind: security-consideration
summary: CAs should be aware that retrieval of existing certificates via the provided URI may be subject to observation (traffic analysis). If this is a concern, the data URL option (inline PKCS#7) described in Section 3.1 should be used instead of an HTTP(S) URL to avoid leaking information about the related certificate.
section: "7"
topics:
