document: rfc-9045
kind: design-rationale
summary: 'RFC 4211''s original algorithm choices (HMAC-SHA1, DES-MAC, Triple-DES-MAC) were appropriate in 2005 but are no longer best choices: HMAC-SHA1 has stronger alternatives, DES-MAC provides only 56 bits of security (withdrawn by NIST), and Triple-DES-MAC provides only 112 bits (deprecated by NIST SP 800-131A).'
section: "1"
topics:
