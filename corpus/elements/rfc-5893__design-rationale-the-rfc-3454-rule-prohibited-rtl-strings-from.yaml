document: rfc-5893
kind: design-rationale
summary: The RFC 3454 rule prohibited RTL strings from ending with a digit. The strings 'ALEF 5' and '5 ALEF' display identically in an LTR context, so only one should be permitted; the new rule addresses this by allowing EN/AN at the end of RTL labels while requiring EN and AN not to coexist.
section: "4.3"
topics:
    - dns
