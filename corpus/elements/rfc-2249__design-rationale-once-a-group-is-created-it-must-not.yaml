document: rfc-2249
kind: design-rationale
summary: Once a group is created it must not be deleted or have its mtaGroupIndex changed unless the MTA is reinitialized, so that monitoring agents can rely on stable group assignments across multiple query operations. Deletion is not even required at reinitialization.
