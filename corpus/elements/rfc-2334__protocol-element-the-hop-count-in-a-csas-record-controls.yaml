document: rfc-2334
kind: protocol-element
summary: 'The Hop Count in a CSAS Record controls flood propagation: set to 1 for stand-alone records (CA alignment, one hop only) and to an administratively configured value >= (|SG|-1) when embedded in CSA Records for flooding, except when responding to a solicitation where Hop Count SHOULD be 1.'
section: B.2.0.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
