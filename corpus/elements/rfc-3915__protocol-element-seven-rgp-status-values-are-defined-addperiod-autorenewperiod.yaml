document: rfc-3915
kind: protocol-element
summary: 'Seven RGP status values are defined: addPeriod, autoRenewPeriod, renewPeriod, transferPeriod, redemptionPeriod, pendingRestore, and pendingDelete. These are conveyed in the ''s'' attribute of the <rgp:rgpStatus> element and represent the current grace period state of a domain name.'
