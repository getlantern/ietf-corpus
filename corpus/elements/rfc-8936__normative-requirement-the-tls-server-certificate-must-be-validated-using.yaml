document: rfc-8936
kind: normative-requirement
summary: The TLS server certificate MUST be validated using DNS-ID (RFC 6125) and/or DANE (RFC 6698). A SET delivery endpoint SHALL indicate supported HTTP authentication schemes via the 'WWW-Authenticate' header field when using HTTP authentication.
section: "3"
rfc2119_level: MUST
topics:
