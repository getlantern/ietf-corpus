document: rfc-6956
kind: design-rationale
summary: The library adheres to the weak-host model (RFC 1122) for IP packet processing within the Network Element, as it is considered the most practical model for a packet-processing NE. This contrasts with the strong-host model where packets are only accepted on the interface addressed.
