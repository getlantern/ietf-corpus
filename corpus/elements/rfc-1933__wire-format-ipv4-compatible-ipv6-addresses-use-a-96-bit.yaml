document: rfc-1933
kind: wire-format
summary: IPv4-compatible IPv6 addresses use a 96-bit all-zeros prefix (0:0:0:0:0:0) followed by a 32-bit IPv4 address in the low-order bits. The full 128-bit value serves as the node's IPv6 address while the embedded 32 bits serve as its IPv4 address.
section: "2"
