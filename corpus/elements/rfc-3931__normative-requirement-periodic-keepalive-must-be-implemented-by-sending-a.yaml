document: rfc-3931
kind: normative-requirement
summary: Periodic keepalive MUST be implemented by sending a Hello message if a configurable period (recommended default 60 seconds) has passed without receiving any message from the peer. An LCCE sending Hello messages across multiple control connections to the same endpoints MUST employ a jittered timer to prevent grouping.
section: "4.4"
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
