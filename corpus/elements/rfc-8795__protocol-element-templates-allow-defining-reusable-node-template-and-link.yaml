document: rfc-8795
kind: protocol-element
summary: Templates allow defining reusable node-template and link-template configurations. Multiple templates can apply to a single element; when conflicts occur, the template with the highest priority (lower numeric value, range 0–65535) wins. The 'reference-change-policy' parameter controls behavior when a referenced template changes.
section: "5.9"
topics:
