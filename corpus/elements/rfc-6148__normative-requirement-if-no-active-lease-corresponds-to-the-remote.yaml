document: rfc-6148
kind: normative-requirement
summary: If no active lease corresponds to the Remote ID in the DHCPLEASEQUERY, the server MUST reply with a DHCPLEASEUNKNOWN message. Servers that do not implement lease query by Remote ID SHOULD simply not respond.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
