document: rfc-6438
kind: protocol-element
summary: Intermediate IPv6 routers will encounter a mixture of tunneled and normal traffic. The hash design SHOULD include {protocol, dest port, source port} as additional input keys to provide entropy for flows whose flow label is zero, covering non-tunneled traffic.
section: "3"
topics:
    - ip
    - routing
