document: rfc-5416
kind: protocol-element
summary: The IEEE 802.11 WLAN Configuration Request (type 3398913) is sent by the AC to create, update, or delete a WLAN on the WTP; exactly one of Add WLAN, Delete WLAN, or Update WLAN MUST be present. The WTP MUST respond with an IEEE 802.11 WLAN Configuration Response (type 3398914) containing a Result Code and an optional Assigned WTP BSSID element, remaining in the Run state throughout.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
