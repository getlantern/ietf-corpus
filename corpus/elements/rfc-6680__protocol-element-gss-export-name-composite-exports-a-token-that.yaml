document: rfc-6680
kind: protocol-element
summary: GSS_Export_name_composite() exports a token that preserves name attribute information (including authenticated/complete flags) and can be re-imported with GSS_Import_name() using GSS_C_NT_COMPOSITE_EXPORT (OID 1.3.6.1.5.6.6). This is intended for inter-process communication.
section: "7.8"
topics:
