document: rfc-5428
kind: protocol-element
summary: pktcEventSyslogCapabilities is a read-only BITS object advertising the MTA's supported syslog message formats (formatBSDSyslog from RFC 3164, formatSyslogProtocol from RFC 5424) and transports (transportUDP, transportTLS, transportBEEP). The MTA MUST set the appropriate bits based on implementation.
