document: rfc-8630
kind: normative-requirement
summary: The public key used to verify the TA MUST be the same as the subjectPublicKeyInfo in both the CA certificate and the TAL. The TA MUST contain a stable key that does not change when the certificate is reissued.
section: "2.3"
rfc2119_level: MUST
