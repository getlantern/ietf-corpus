document: rfc-9388
kind: protocol-element
summary: 'The ''subdivisioncode'' footprint type is defined for ISO 3166-2 country subdivision codes. Each code consists of two parts separated by a hyphen: the ISO 3166-1 alpha-2 country code and up to three alphanumeric characters, expressed in lowercase (e.g., ''us-ny'', ''ca-on'').'
section: 2.1.1.1
