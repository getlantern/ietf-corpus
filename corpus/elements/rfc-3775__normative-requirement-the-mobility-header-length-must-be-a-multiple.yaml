document: rfc-3775
kind: normative-requirement
summary: The Mobility Header length MUST be a multiple of 8 octets and MUST be aligned on an 8-octet boundary. Mobility Header messages MUST NOT be sent with a type 2 routing header (except Binding Acknowledgement per Section 9.5.4) and MUST NOT use a Home Address destination option (except Binding Update per Sections 11.7.1 and 11.7.2).
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
