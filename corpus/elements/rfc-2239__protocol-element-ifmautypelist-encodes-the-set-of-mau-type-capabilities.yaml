document: rfc-2239
kind: protocol-element
summary: ifMauTypeList encodes the set of MAU type capabilities as a bitmask Integer32, where bit position n corresponds to a specific MAU type (e.g., bit 9 = 10BASE-T HD, bit 16 = 100BASE-TX FD). If auto-negotiation is present, this object maps to ifMauAutoNegCapability.
