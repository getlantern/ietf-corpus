document: rfc-8577
kind: design-rationale
summary: 'Two delegation stacking approaches are defined: ''Stack to Reach Delegation Hop'' keeps delegation labels out of the initial stack but limits delegation label sharing to LSPs with the same egress and path; ''Stack to Reach Egress'' includes all delegation labels in the initial stack allowing broader sharing but constrains hop count to ingress push capacity.'
section: "5.1"
topics:
