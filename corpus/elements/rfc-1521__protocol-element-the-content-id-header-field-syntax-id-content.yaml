document: rfc-1521
kind: protocol-element
summary: 'The Content-ID header field (syntax: ''id := "Content-ID" ":" msg-id'') provides a world-unique identifier for a MIME entity. It is mandatory for message/external-body entities to enable caching, and carries special semantics within multipart/alternative.'
