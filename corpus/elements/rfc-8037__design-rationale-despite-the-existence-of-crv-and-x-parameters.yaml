document: rfc-8037
kind: design-rationale
summary: Despite the existence of "crv" and "x" parameters in the OKP key type, implementations must not assume there is an underlying elliptic curve. This key type could be extended to represent DH algorithms based on hyperelliptic surfaces or other constructions.
