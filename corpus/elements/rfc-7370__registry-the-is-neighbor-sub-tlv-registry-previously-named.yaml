document: rfc-7370
kind: registry
summary: The IS Neighbor sub-TLV registry, previously named 'Sub-TLVs for TLVs 22, 141, and 222', has been extended to include TLVs 23 (IS Neighbor Attribute TLV) and 223 (MT IS Neighbor Attribute TLV) defined in RFC 5311, and renamed 'Sub-TLVs for TLVs 22, 23, 141, 222, and 223'. Settings for each sub-TLV mirror those for TLVs 22 and 222 respectively.
section: "2"
