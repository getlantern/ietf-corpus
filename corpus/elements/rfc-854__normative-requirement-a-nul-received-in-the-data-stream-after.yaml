document: rfc-854
kind: normative-requirement
summary: A NUL received in the data stream after a CR (absent options specifying otherwise) SHOULD be stripped before applying NVT-to-local character-set mapping. The CR NUL / CR LF rules apply symmetrically in both directions.
section: THE NETWORK VIRTUAL TERMINAL
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
