summary: The tedTable is the core TED MIB table providing TE link information sourced from OSPFv2, OSPFv3, IS-IS, or local configuration. It is indexed by tedLocalRouterId, tedRemoteRouterId, tedLinkInformationSource, and tedLinkIndex, and contains bandwidth, metric, administrative group, and protection type fields.
