document: rfc-7119
kind: design-rationale
summary: Template Records with identical Information Elements but different non-scope field ordering SHOULD be treated as identical by the Mediator, because the IPFIX guiding principle is that the semantic meaning of one Information Element does not depend on the value of any other. The exception is Scope field ordering, which MUST be treated as semantically significant.
section: 4.1.1
topics:
    - measurement
