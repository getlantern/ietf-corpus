document: rfc-6184
kind: normative-requirement
summary: In non-interleaved mode (packetization-mode=1), only single NAL unit packets, STAP-As, and FU-As MAY be used; STAP-Bs, MTAPs, and FU-Bs MUST NOT be used. Transmission order of NAL units MUST comply with NAL unit decoding order.
section: "6.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
