document: rfc-5122
kind: security-consideration
summary: Advertising XMPP IRIs/URIs in publicly accessible locations may enable harvesting of XMPP addresses from authority and path components, facilitating unsolicited bulk communications. Passwords and other user credentials are explicitly forbidden in the authority component; SASL (including SASL ANONYMOUS) is used for authentication instead.
section: "5.4"
topics:
    - realtime
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
