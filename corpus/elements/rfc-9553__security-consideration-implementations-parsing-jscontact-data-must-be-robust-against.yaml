document: rfc-9553
kind: security-consideration
summary: Implementations parsing JSContact data MUST be robust against malicious JSON inputs exploiting parser vulnerabilities (deeply nested objects, very large payloads, or data causing parser failures). Conformance to I-JSON (RFC 7493) reduces the attack surface.
