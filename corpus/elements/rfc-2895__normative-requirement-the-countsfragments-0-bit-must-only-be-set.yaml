document: rfc-2895
kind: normative-requirement
summary: The countsFragments(0) bit MUST only be set in a protocolDirParameters octet corresponding to a protocol that supports fragmentation and reassembly; TCP is explicitly excluded as it is not considered a fragmented-stream protocol.
section: 3.2.6.1
rfc2119_level: MUST
