document: rfc-1188
kind: design-rationale
summary: ARP uses hardware type code 1 (Ethernet) instead of 6 (IEEE 802) on FDDI because differing values between Ethernet and IEEE 802 networks cause interoperability problems in bridged environments, and the goal is not to preclude such interoperability.
