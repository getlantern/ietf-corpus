document: rfc-4730
kind: normative-requirement
summary: User Interfaces MUST buffer User Input upon receipt of an authenticated and accepted subscription. They MUST NOT provide a subscriber with digits detected prior to the authentication and authorization of that subscriber, to prevent access to pre-existing calling card or credit card input.
section: "3.5"
rfc2119_level: MUST
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
