document: rfc-7952
kind: wire-format
summary: For anyxml and leaf instances in JSON, the metadata object is added as a sibling member named '@' concatenated with the member name being annotated (e.g., '@foo:flag'). The namespace prefix is included if and only if it appears in the annotated member's name.
