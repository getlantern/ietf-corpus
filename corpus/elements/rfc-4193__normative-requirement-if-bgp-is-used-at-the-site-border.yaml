document: rfc-4193
kind: normative-requirement
summary: If BGP is used at the site border with an ISP, the default BGP configuration MUST filter out any Local IPv6 address prefixes both incoming and outgoing, unless specific /48 or longer routes are created for inter-site use.
section: "4.1"
rfc2119_level: MUST
topics:
