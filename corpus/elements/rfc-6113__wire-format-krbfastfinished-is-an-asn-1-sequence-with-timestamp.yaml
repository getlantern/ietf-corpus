document: rfc-6113
kind: wire-format
summary: KrbFastFinished is an ASN.1 SEQUENCE with timestamp and usec (KDC reply generation time), crealm and cname (authenticated client identity), and ticket-checksum (checksum of the issued ticket using armor key at KEY_USAGE_FAST_FINISHED=53). The client MUST use the KDC's time thereafter when using the returned ticket.
section: 5.4.3
topics:
