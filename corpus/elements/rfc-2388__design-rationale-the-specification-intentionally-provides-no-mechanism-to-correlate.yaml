document: rfc-2388
kind: design-rationale
summary: The specification intentionally provides no mechanism to correlate multipart/form-data with the originating form, because many different forms might transmit the same data. Applications may use a specific ACTION URL or hidden fields for this purpose.
section: "5.7"
