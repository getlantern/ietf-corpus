document: rfc-7812
kind: wire-format
summary: 'MRT LDP Label Option 1A encodes a topology-scoped FEC using a single label. Each router distributes separate FEC-label bindings for three topology-scoped FECs: default (MT-ID=0), MRT-Red, and MRT-Blue. Transit routers swap the incoming topology-colored label with the outgoing label for the same topology FEC learned from the MRT next hop.'
section: 6.1.1.1
