document: rfc-8428
kind: registry
summary: 'RFC 8428 registers 8 IANA media types: application/senml+json, application/sensml+json, application/senml+cbor, application/sensml+cbor, application/senml+xml, application/sensml+xml, application/senml-exi, and application/sensml-exi. File extensions include .senml, .sensml, .senmlc, and .sensmlc.'
