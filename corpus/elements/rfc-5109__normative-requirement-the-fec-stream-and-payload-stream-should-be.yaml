document: rfc-5109
kind: normative-requirement
summary: The FEC stream and payload stream SHOULD be sent through two separate RTP sessions; multiplexing by payload type into one RTP session SHOULD be avoided. The FEC and payload MUST NOT be multiplexed by SSRC into one single RTP session since they always share the same SSRC.
section: "14.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
