document: rfc-5545
kind: wire-format
summary: Each iCalendar content line has the form 'name *(";" param) ":" value CRLF'. Property names and parameter names are case-insensitive; property values are case-sensitive unless stated otherwise. Lines SHOULD NOT exceed 75 octets (excluding the line break) and SHOULD be folded by inserting CRLF followed by a single linear white-space character.
section: "3.1"
topics:
