document: rfc-8169
kind: wire-format
summary: The RTM G-ACh message begins with a 4-octet G-ACh header (Version=0, RTM G-ACh=0x000F), followed by an 8-octet Scratch Pad for accumulated residence time, then a Type/Length/Value field identifying and carrying the encapsulated timing packet (NTP or PTP). The Reserved field MUST be set to 0 on transmit and ignored on receipt.
section: "3"
topics:
