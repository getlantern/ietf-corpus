document: rfc-8946
kind: privacy-consideration
summary: Tracking call routing in SIP signaling via "div" reveals call forwarding policies and may expose relationships between different identifiers belonging to the same user. This information is ordinarily revealed to the called party's user agent service rather than the caller, but implementers should understand the trade-off, particularly when service logic is shared with a caller's network via 3xx responses.
section: "10"
topics:
    - privacy
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
