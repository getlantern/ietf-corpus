document: rfc-9393
kind: privacy-consideration
summary: CoSWID tags are not intended to contain confidential information. Tag authors are explicitly advised not to record unprotected, private software license keys in the entitlement-key field. Deployment of CoSWID tags describing installed software on an endpoint reveals software inventory, which may be sensitive.
section: "2.8"
topics:
    - privacy
    - security
    - cbor
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
