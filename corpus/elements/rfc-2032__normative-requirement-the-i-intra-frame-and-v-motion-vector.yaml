document: rfc-2032
kind: normative-requirement
summary: The I (INTRA-frame) and V (motion vector) flag bits in the H.261 header are hint flags whose sense may not change during the course of the RTP session. A conformant implementation may always set V=1 and I=0.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
