document: rfc-6148
kind: design-rationale
summary: Query by Remote ID allows an access concentrator (e.g., DSLAM) to proactively retrieve consolidated lease information for all clients on a circuit immediately after reboot, rather than waiting for client traffic. The Remote ID is pre-provisioned per circuit and survives reboots, making it a stable query key.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
