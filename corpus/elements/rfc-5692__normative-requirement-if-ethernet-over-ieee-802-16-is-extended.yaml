document: rfc-5692
kind: normative-requirement
summary: If Ethernet over IEEE 802.16 is extended to multiple end stations behind the SS, the SS SHOULD support bridging according to IEEE 802.1D and its amendment 802.16k between all its subscriber-side ports and the IEEE 802.16 air link.
section: "5.1"
rfc2119_level: SHOULD
