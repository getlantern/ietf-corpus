document: rfc-6545
kind: normative-requirement
summary: When a parser encounters an included XML document it does not understand, the included document MUST be ignored and not processed, but the remainder of the RID document MUST be processed. Implementations SHOULD NOT download schemas at runtime due to security implications, and included documents MUST NOT be required to provide a resolvable schema location.
section: "5.6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
