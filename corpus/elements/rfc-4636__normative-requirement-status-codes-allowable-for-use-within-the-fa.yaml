document: rfc-4636
kind: normative-requirement
summary: Status codes allowable for use within the FA Error Extension are within the range 64-127, drawn from the Mobile IPv4 foreign agent status codes defined in RFC 3344. Status codes used in the FA Error Extension must not be differently defined for use in the Code field of Registration Reply messages.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
