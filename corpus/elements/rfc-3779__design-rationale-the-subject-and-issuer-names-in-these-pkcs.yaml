document: rfc-3779
kind: design-rationale
summary: The Subject and Issuer names in these PKCs are used only for chaining during certification path validation and need not correspond to any physical entity. The Subject name may be randomly assigned by the issuing CA, allowing the resource holder limited anonymity while still supporting the right-to-use model.
section: Appendix D
topics:
