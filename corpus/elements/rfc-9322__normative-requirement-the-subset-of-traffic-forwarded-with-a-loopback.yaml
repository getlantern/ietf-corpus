document: rfc-9322
kind: normative-requirement
summary: The subset of traffic forwarded with a Loopback flag SHOULD NOT exceed 1/N of the interface capacity on any IOAM encapsulating node interface. Using N>100 as the default is RECOMMENDED in the absence of explicit operator configuration or prior topology knowledge.
section: 4.1.1
rfc2119_level: SHOULD NOT
topics:
