document: rfc-5428
kind: design-rationale
summary: The default syslog transport is TLS (port 6514) rather than UDP, reflecting a security-conscious design choice for event transmission. The default message format is formatSyslogProtocol (RFC 5424) rather than the legacy BSD syslog format (RFC 3164), preferring the newer IETF standard.
