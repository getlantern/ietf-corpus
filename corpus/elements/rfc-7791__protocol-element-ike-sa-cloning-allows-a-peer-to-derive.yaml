document: rfc-7791
kind: protocol-element
summary: IKE SA cloning allows a peer to derive a new parallel IKE SA from an existing one using a modified IKE SA rekey procedure, without performing a new authentication exchange. The new SA coexists with the old SA rather than replacing it.
