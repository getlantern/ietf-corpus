document: rfc-2954
kind: protocol-element
summary: 'frLportAddrDLCILen identifies the Q.922 address field and DLCI length for a UNI/NNI logical port, with five variants: twoOctets10Bits, threeOctets10Bits, threeOctets16Bits, fourOctets17Bits, and fourOctets23Bits. Valid DLCI index values for frPVCEndptDLCIIndex are constrained to the range 16..4194303.'
