document: rfc-1225
kind: protocol-element
summary: The RETR command retrieves a specified non-deleted message as a multi-line response. If the message's number exceeds 'highest number accessed', the server updates that value. The termination character in message content is byte-stuffed as with all multi-line responses.
section: The TRANSACTION State
