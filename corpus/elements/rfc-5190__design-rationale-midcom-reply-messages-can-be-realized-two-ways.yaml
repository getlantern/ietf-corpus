document: rfc-5190
kind: design-rationale
summary: 'MIDCOM reply messages can be realized two ways: (1) an SNMP notification optionally followed by GET transactions, or (2) polling via SNMP GET transactions until processing completes. The polling approach requires more operations but is more reliable because SNMP notifications are sent as unreliable UDP packets.'
section: 4.2.2
topics:
    - snmp
    - udp
