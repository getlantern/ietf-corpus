document: rfc-4366
kind: protocol-element
summary: 'Client Certificate URLs: after negotiating the client_certificate_url extension, clients MAY send a CertificateURL message (handshake type 21) in place of Certificate. It contains a CertChainType (individual_certs or pkipath) and a list of URLAndOptionalHash entries, each with a URL and an optional 20-byte SHA-1 hash.'
section: "3.3"
