document: rfc-2290
kind: design-rationale
summary: 'A unique IP address MUST NOT be assigned to a mobile node unless absolutely necessary: no unique address is required when the mobile node connects to its home link or when it uses a foreign agent''s care-of address. This preserves the shared-address efficiency of foreign agent care-of addresses.'
section: "1.4"
topics:
    - mobility
    - ip
