document: rfc-2575
kind: protocol-element
summary: 'An access policy is defined per (groupName, contextName, securityModel, securityLevel) tuple and specifies three MIB views: a read-view for retrieval operations, a write-view for modification operations, and a notify-view for notification content. Each view may independently be empty (no access) or reference a configured vacmViewTreeFamilyTable view.'
