document: rfc-7862
kind: normative-requirement
summary: New arms of a discriminated union in NFSv4.2 MUST follow the same minor versioning guidelines as operations — they may not be made REQUIRED. A server reports non-support of a new union arm by returning NFS4ERR_UNION_NOTSUPP.
section: "1.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
