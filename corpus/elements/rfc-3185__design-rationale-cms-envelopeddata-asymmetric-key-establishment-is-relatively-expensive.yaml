document: rfc-3185
kind: design-rationale
summary: CMS EnvelopedData asymmetric key establishment is relatively expensive, so this specification enables reuse of a content-encryption key (CEK) from one message (MSG1) as the basis for deriving the key-encryption key (KEK) for a later message (MSG2), improving efficiency in high-frequency communication scenarios.
