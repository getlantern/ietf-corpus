document: rfc-9590
kind: protocol-element
summary: The LIST-METADATA extension adds a new RETURN option, 'METADATA', to the IMAP LIST command. The option takes one or more annotation entry names as arguments and causes the server to return METADATA responses alongside LIST responses for each matching mailbox.
