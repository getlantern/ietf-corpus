document: rfc-2264
kind: normative-requirement
summary: An SNMP engine MUST use a mechanism to match incoming Responses to outstanding Requests and MUST drop any Responses that do not match an outstanding request, as an additional defense against replay.
section: 1.5.2
rfc2119_level: MUST
topics:
    - snmp
    - security
