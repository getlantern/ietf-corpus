document: rfc-4502
kind: state-machine
summary: 'Control table entries use the RowStatus textual convention with states notInService/active. Parameters that describe resulting data may only be modified when the entry is not active; the standard lifecycle is: deactivate, modify, reactivate. Deleting the control entry cascades to delete all associated data entries.'
