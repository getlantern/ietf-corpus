document: rfc-6960
kind: security-consideration
summary: 'Precomputed OCSP responses enable replay attacks: an attacker can replay a cached ''good'' response after a certificate has been revoked but before nextUpdate expires. Deployments must carefully weigh the operational benefits of response pre-production against this replay risk.'
section: "5"
topics:
    - pkix
    - security
