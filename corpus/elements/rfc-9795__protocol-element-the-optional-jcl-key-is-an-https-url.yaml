document: rfc-9795
kind: protocol-element
summary: The optional "jcl" key is an HTTPS URL pointing to a jCard JSON object served with media type application/json. It is mutually exclusive with "jcd", MUST appear at most once, and the referenced jCard MUST NOT contain recursively nested URI references.
section: 5.1.5
topics:
    - realtime
    - json
    - jose
