document: rfc-7619
kind: protocol-element
summary: A new ID Type, ID_NULL (value 13), is defined for the IKEv2 Identification payload. It is used when a remote peer is not authenticated and no validated identity can be presented. The Identification Data field for ID_NULL MUST be empty.
section: "2.2"
topics:
    - ipsec
