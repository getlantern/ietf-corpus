document: rfc-2630
kind: security-consideration
summary: RSA key transport as defined in RFC 2313 (PKCS#1 block type 02) has a known chosen-ciphertext vulnerability (Bleichenbacher attack). The vulnerability is primarily relevant to interactive applications rather than store-and-forward messaging; countermeasures are discussed in the Security Considerations section.
section: 12.3.2.1
topics:
    - crypto
    - security
    - pkix
