document: rfc-8946
kind: protocol-element
summary: The "div-o" PASSporT type embeds the original PASSporT inside an "opt" element rather than conveying it as a separate Identity header field. It is designed for non-SIP or gatewayed SIP environments such as out-of-band STIR scenarios where separate Identity header fields cannot be carried.
