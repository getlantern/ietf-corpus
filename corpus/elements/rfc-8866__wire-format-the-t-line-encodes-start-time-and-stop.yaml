document: rfc-8866
kind: wire-format
summary: The 't=' line encodes start-time and stop-time as decimal seconds since January 1, 1900 UTC (NTP epoch). To convert to Unix time, subtract 2208988800. A stop-time of zero means the session is unbounded.
