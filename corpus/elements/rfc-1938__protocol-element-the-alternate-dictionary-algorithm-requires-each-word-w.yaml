document: rfc-1938
kind: protocol-element
summary: The alternate dictionary algorithm requires each word W at position N to satisfy alg(W) % 2048 == N, where alg is the OTP hash algorithm. Words must not overlap the standard dictionary and must not consist solely of letters A–F to prevent ambiguity with hexadecimal encoding.
section: Appendix B
