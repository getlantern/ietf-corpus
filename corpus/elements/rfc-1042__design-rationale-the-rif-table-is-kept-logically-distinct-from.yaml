document: rfc-1042
kind: design-rationale
summary: The RIF table is kept logically distinct from the ARP table (IP-to-48-bit-address mapping) to allow a generalized 802 implementation that does not waste ARP cache memory with RIF fields on non-802.5 networks, even if implementations may store them together for performance.
section: For IEEE 802.5
topics:
