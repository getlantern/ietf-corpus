document: rfc-6135
kind: interoperability-note
summary: An MSRP UA conformant to this document can interoperate with a UA following the RFC 4975 connection model. However, if the COMEDIA UA is behind a NAT without an MSRP relay and the remote UA follows RFC 4975, NAT traversal requires ICE-TCP or SBC-assisted NAT traversal for TCP.
section: "5"
topics:
