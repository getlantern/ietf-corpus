document: rfc-2440
kind: wire-format
summary: 'Version 4 Public Key Packet: version (1 octet = 4), creation time (4 octets), public key algorithm (1 octet), then algorithm-specific MPIs — RSA: n, e; DSA: p, q, g, y; Elgamal: p, g, y. Version 3 additionally includes a two-octet validity period in days; V4 moves expiry to the signature packet.'
section: 5.5.2
