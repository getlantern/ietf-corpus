document: rfc-6107
kind: security-consideration
summary: The ability of an ingress LSR to request that an egress LSR advertise an LSP as a TE link MUST be subject to appropriate policy checks at the egress LSR. The egress MUST NOT automatically accept such a request unless explicitly configured with a policy permitting it.
section: "4"
rfc2119_level: MUST NOT
topics:
    - security
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
