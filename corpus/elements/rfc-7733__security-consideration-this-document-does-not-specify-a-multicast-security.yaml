document: rfc-7733
kind: security-consideration
summary: This document does not specify a multicast security solution; networks rely on Layer 2 security to prevent outsiders from injecting multicast traffic. This does not protect against impersonation by already-trusted devices, which is identified as an area for future specification.
section: "7.1"
topics:
    - security
    - multicast
