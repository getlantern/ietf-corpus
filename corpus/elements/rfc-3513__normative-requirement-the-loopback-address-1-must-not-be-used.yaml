document: rfc-3513
kind: normative-requirement
summary: The loopback address (::1) must not be used as a source address in packets sent outside a single node, must never be sent outside a single node, and must never be forwarded by a router. A packet received with destination address of loopback must be dropped.
section: 2.5.3
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
