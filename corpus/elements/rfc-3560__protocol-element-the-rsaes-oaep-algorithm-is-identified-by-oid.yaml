document: rfc-3560
kind: protocol-element
summary: The RSAES-OAEP algorithm is identified by OID id-RSAES-OAEP { pkcs-1 7 }. The AlgorithmIdentifier parameters field MUST be present and MUST contain RSAES-OAEP-params, a SEQUENCE with hashFunc, maskGenFunc, and pSourceFunc fields, each with SHA-1-based defaults.
