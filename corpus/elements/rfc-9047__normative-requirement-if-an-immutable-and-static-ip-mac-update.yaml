document: rfc-9047
kind: normative-requirement
summary: If an immutable and static IP->MAC update is received from a different PE, one of the two routes will be selected and the PE MUST alert the operator, analogous to the dual-static-flag case in RFC 7432 Section 15.2.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
