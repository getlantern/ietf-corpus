document: rfc-5919
kind: design-rationale
summary: The End-of-LIB mechanism is applicable only to 'Downstream Unsolicited' advertisement mode. In 'Downstream on Demand' mode, the speaker explicitly requests specific label bindings and already knows when it has received them, making End-of-LIB redundant.
