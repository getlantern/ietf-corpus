document: rfc-7652
kind: normative-requirement
summary: Each PA message MUST contain an AUTHENTICATION Opcode. The PA-Initiation message MUST also contain a NONCE option carrying a client-generated random nonce to prevent spoofed PA-Server messages from interrupting the authentication process.
section: 3.1.1
rfc2119_level: MUST
topics:
    - pcp
    - security
