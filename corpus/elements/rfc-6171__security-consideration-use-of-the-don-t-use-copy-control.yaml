document: rfc-6171
kind: security-consideration
summary: Use of the Don't Use Copy control may permit an attacker to amplify a denial-of-service attack by causing the server to consume additional resources through chaining instead of returning a referral. Servers can mitigate this by limiting chaining to authenticated entities.
section: "4"
topics:
