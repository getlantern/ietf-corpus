document: rfc-2125
kind: normative-requirement
summary: The Link Discriminator LCP Configuration Option MUST be negotiated by LCP on every link. Each link in a multilink bundle MUST have a unique discriminator assigned by the local endpoint.
section: "2.1"
rfc2119_level: MUST
