document: rfc-7303
kind: wire-format
summary: 'Character encoding priority for XML MIME consumers: (1) a BOM (0xFE 0xFF, 0xFF 0xFE, or 0xEF 0xBB 0xBF) is authoritative if present; (2) in the absence of a BOM, the MIME charset parameter is authoritative if present; (3) otherwise the XML encoding declaration or UTF-8 default applies.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
