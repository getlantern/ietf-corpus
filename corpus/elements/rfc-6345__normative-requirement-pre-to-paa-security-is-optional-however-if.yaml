document: rfc-6345
kind: normative-requirement
summary: PRE-to-PAA security is OPTIONAL; however, if a cryptographic mechanism is supported, it SHOULD be IPsec. When device characteristics preclude IPsec, alternatives such as DTLS or link-layer cryptographic security may be used.
section: "3"
rfc2119_level: SHOULD
topics:
