document: rfc-8529
kind: interoperability-note
summary: Implementations MAY restrict parent-referenced interface information visible within an NI mount point to only those interfaces whose 'bind-network-instance-name' matches the NI's 'name'; when such restrictions are applied, they SHOULD be expressed in the 'parent-reference' leaf-list so clients can discover them.
section: "3.3"
topics:
