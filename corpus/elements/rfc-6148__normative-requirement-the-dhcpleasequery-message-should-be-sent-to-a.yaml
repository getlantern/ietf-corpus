document: rfc-6148
kind: normative-requirement
summary: The DHCPLEASEQUERY message SHOULD be sent to a DHCP server known to possess authoritative information for the Remote ID. In the absence of such knowledge, it SHOULD be sent to all configured DHCP servers.
section: "4.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
