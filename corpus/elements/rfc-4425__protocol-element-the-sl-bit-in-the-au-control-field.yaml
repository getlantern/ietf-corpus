document: rfc-4425
kind: protocol-element
summary: The SL bit in the AU Control field MUST be toggled when an AU contains a sequence layer header that differs from the most recently transmitted sequence layer header. This allows receivers to detect that a lost RTP packet contained a new sequence layer header. The SL bit MUST be 0 for Simple and Main profiles.
section: "5.3"
topics:
    - rtp
    - realtime
