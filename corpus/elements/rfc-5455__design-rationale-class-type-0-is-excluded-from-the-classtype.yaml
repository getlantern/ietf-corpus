document: rfc-5455
kind: design-rationale
summary: Class-Type 0 is excluded from the CLASSTYPE object (its inclusion is prohibited) to allow backward compatibility with PCEs that do not support the CLASSTYPE object. The absence of the object signals Class 0, avoiding rejection by legacy PCEs.
