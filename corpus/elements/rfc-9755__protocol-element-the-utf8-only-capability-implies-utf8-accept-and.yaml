document: rfc-9755
kind: protocol-element
summary: The 'UTF8=ONLY' capability implies UTF8=ACCEPT and signals that the server requires UTF-8 support from clients. It will send UTF-8 in quoted-strings and will not accept modified UTF-7 mailbox names. Servers advertising UTF8=ONLY reject commands that require UTF-8 support without a preceding 'ENABLE UTF8=ACCEPT' with 'NO [CANNOT]'.
section: "7"
topics:
    - email
