document: rfc-6060
kind: normative-requirement
summary: An IB-BEB receiving a PATH message MUST be able to determine the appropriate CBP that is the termination point of the Eth-LSP. IB-BEBs SHOULD advertise CNP TE Links in the GMPLS control plane, and RSVP-TE signaling SHOULD use CNP TE Links to identify the termination point of Eth-LSPs.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
