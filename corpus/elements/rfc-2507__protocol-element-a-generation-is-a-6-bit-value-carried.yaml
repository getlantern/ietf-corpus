document: rfc-2507
kind: protocol-element
summary: A generation is a 6-bit value carried in full and compressed non-TCP headers that identifies the version of the context for a given CID. The generation is incremented whenever the context changes; compressed headers carry the generation so the decompressor can detect stale or mismatched context without requiring a handshake.
section: "3"
topics:
