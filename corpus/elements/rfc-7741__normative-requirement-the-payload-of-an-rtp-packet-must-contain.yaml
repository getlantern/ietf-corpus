document: rfc-7741
kind: normative-requirement
summary: The payload of an RTP packet MUST contain data from only one video frame. Partitions MUST be aggregated in decoding order. The last (or only) packet carrying data for a frame MUST have the M bit set.
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
