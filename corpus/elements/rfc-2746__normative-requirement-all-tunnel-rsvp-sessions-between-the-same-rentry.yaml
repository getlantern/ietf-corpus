document: rfc-2746
kind: normative-requirement
summary: All tunnel RSVP sessions between the same Rentry–Rexit pair use the same source IP, destination IP, and destination UDP port; individual sessions are distinguished solely by the source UDP port chosen by Rentry. The destination UDP port for tunnel sessions is IANA-assigned port 363.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - qos
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
