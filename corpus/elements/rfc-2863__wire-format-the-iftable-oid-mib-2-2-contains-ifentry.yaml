document: rfc-2863
kind: wire-format
summary: The ifTable (OID mib-2.2) contains IfEntry rows indexed by ifIndex (InterfaceIndex, Integer32 1..2147483647). Fields include ifType (IANAifType), ifMtu (Integer32, octets), ifSpeed (Gauge32, bps), ifPhysAddress (PhysAddress), ifAdminStatus (up/down/testing), ifOperStatus (seven-state INTEGER), ifLastChange (TimeTicks), and Counter32 traffic/error counters for inbound and outbound traffic.
