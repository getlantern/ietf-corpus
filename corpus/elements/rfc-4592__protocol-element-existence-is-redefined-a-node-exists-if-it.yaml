document: rfc-4592
kind: protocol-element
summary: 'Existence is redefined: a node exists if it owns at least one RRSet or has descendants that collectively own at least one RRSet (empty non-terminal). A leaf node with no descendants and no RRSets does not exist. This replaces RFC 1034''s ambiguous wording that implied all possible domain names exist.'
section: 2.2.3
topics:
    - dns
