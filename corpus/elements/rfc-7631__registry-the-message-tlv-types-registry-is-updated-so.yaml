document: rfc-7631
kind: registry
summary: The 'Message TLV Types' registry is updated so that types 0, 1, 7, and 8 now bear the description 'Defined by Type Extension' rather than specific TLV names. ICV (type 5) and TIMESTAMP (type 6) retain their names; types 9-223 remain unassigned and 224-255 reserved for experimental use.
