document: rfc-9193
kind: protocol-element
summary: 'The ''ct'' (Content-Format) field may be included in a SenML Record that contains a Data Value field (''vd'') to indicate the content format of that binary data. Its value is a Content-Format-Spec: either a CoAP Content-Format number in decimal or a Content-Format-String.'
