document: rfc-8402
kind: normative-requirement
summary: A source SR node MUST NOT use an SR Policy containing a Strict-SPF segment if the path crosses a node that does not support the Strict-SPF algorithm, since such nodes will not install forwarding entries for it.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
    - routing
