document: rfc-8656
kind: design-rationale
summary: TURN is designed to run as a userspace application without special OS privileges to simplify deployment and allow integration into peer-to-peer applications. A consequence is that Diffserv, TTL, and ECN fields may not be preserved across the relay, and there is no end-to-end IP fragmentation.
section: "3.6"
topics:
    - nat
