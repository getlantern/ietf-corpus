document: rfc-4553
kind: wire-format
summary: 'The SAToP Control Word is a 32-bit field structured as: bits 0–3 (set to zero unless ACH), L bit (attachment circuit fault), R bit (packet loss state), RSV and FRG (bits 6–9, reserved/fragmentation), LEN field (bits 10–15, payload length if < 64 bytes or zero), and 16-bit Sequence Number (bits 16–31).'
