document: rfc-6858
kind: interoperability-note
summary: This document updates RFC3501 (IMAP4rev1) by relaxing the requirement that sizes returned for messages be exact, permitting servers to return the original internationalized message size for surrogate messages, and by adding the DOWNGRADED response code reporting requirement.
