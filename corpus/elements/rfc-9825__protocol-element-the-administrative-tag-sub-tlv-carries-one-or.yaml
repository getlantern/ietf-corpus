document: rfc-9825
kind: protocol-element
summary: The Administrative Tag Sub-TLV carries one or more 32-bit unsigned integer administrative tags for OSPF prefixes. It uses a 16-bit Type field, a 16-bit Length field (must be a multiple of 4 octets), and a variable-length Value field of one or more 32-bit tags.
section: "2"
topics:
