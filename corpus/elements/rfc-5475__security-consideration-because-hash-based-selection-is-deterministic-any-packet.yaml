document: rfc-5475
kind: security-consideration
summary: Because Hash-based Selection is deterministic, any packet set with known selection properties can be replayed with identical outcomes as long as the Hash Function and parameters are unchanged. Replay attacks may be mitigated by periodically changing Hash Function parameters across all Observation Points simultaneously.
section: 6.2.3.3
topics:
    - measurement
    - security
