summary: 'The KeyTransRecipientInfo version MUST be either 0 or 2: version MUST be 0 if RecipientIdentifier is issuerAndSerialNumber, and MUST be 2 if RecipientIdentifier is subjectKeyIdentifier. The recipient''s certificate MUST contain an RSA public key.'
