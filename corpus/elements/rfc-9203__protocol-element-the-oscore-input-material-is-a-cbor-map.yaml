kind: protocol-element
summary: 'The OSCORE_Input_Material is a CBOR map (or JSON object) conveying the input for deriving an OSCORE security context. It carries optional fields: id (label 0), version (1), ms (2), hkdf (3), alg (4), salt (5), and contextId (6). All parameters are optional.'
