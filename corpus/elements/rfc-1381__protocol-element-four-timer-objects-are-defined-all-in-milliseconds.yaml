document: rfc-1381
kind: protocol-element
summary: 'Four timer objects are defined, all in milliseconds: T1 (max wait for PDU acknowledgment, default 3000), T2 (max delay before sending an acknowledgment, default 0), T3 (wait before considering the link disconnected, default 60000; zero means disconnect upon frame exchange completion), and T4 (max idle time without frame exchange, default 2147483647 indicating disabled).'
