document: rfc-2910
kind: protocol-element
summary: The 'ipp' URL scheme identifies IPP printer or job objects with implicit default port 631. It is intended as the value for the job attributes job-uri and job-printer-uri, the printer attribute printer-uri-supported, and the operation attributes job-uri and printer-uri. The 'ipp' scheme implies the same protocol semantics as 'http' except for the default port.
section: "5"
topics:
