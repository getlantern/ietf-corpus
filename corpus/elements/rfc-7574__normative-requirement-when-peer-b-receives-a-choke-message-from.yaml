document: rfc-7574
kind: normative-requirement
summary: When Peer B receives a CHOKE message from Peer A, it MUST NOT send new REQUEST messages and cannot expect answers to outstanding ones. When choked but receiving a HAVE from Peer A, Peer B is not automatically unchoked and MUST NOT send any new REQUEST messages.
section: "3.9"
rfc2119_level: MUST NOT
topics:
    - realtime
