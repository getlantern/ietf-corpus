document: rfc-1548
kind: normative-requirement
summary: A Configure-Nak MUST include only unacceptable options from the Configure-Request (with acceptable values suggested), MUST NOT reorder them, and MUST NOT include options with no value fields (those require Configure-Reject). When multiple instances of an option are acceptable, all acceptable values MUST be listed.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
