document: rfc-4044
kind: design-rationale
summary: The fcmPortLcStatsGroup provides Counter32-based ('low-capacity') equivalents for the Counter64 statistics in fcmPortClass23StatsGroup. This was added because some older SNMP systems do not yet support Counter64 objects, allowing those systems to still implement useful statistics.
