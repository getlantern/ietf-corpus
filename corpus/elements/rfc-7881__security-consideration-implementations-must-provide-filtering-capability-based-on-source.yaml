document: rfc-7881
kind: security-consideration
summary: Implementations MUST provide filtering capability based on source IP addresses of received S-BFD Control packets (per RFC 2827 BCP 38), MUST NOT act on packets with Martian source IP addresses, and MUST ensure response packets generated by the SBFDReflector have a reachable destination IP address.
section: "7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
