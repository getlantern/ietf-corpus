document: rfc-8139
kind: normative-requirement
summary: An inhibited Appointed Forwarder for VLAN-x MUST NOT ingress or egress native frames for VLAN-x on the inhibited link but still decapsulates received TRILL Data for possible forwarding to other links. The switch MUST still indicate its Appointed Forwarder status in TRILL Hellos even while inhibited.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
