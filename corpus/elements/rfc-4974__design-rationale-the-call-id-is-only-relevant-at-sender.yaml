document: rfc-4974
kind: design-rationale
summary: The Call_ID is only relevant at sender and receiver nodes; no maintenance of Call state at intermediate nodes is mandated. This design ensures no change in RFC 3473 transit implementations is required and there are no backward compatibility issues.
section: "5.2"
topics:
