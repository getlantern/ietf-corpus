document: rfc-1604
kind: protocol-element
summary: frPVCConnectStatusChange NOTIFICATION-TYPE (section 5) is sent when a PVC changes operational state. It carries frPVCConnectIndex, both endpoint ifIndex and DLCI pairs, both directional oper-status values, and frPVCEndptRcvdSigStatus. It is NOT sent when a FR-UNI interface changes state; linkDown/linkUp traps are sent for that case instead.
section: "5"
