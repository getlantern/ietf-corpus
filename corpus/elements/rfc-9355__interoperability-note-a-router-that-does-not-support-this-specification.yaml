document: rfc-9355
kind: interoperability-note
summary: A router that does not support this specification ignores the B-bit in received LLS blocks and does not set it in its own Hellos, so its neighbors supporting this specification will not invoke strict-mode with it, resulting in behavior identical to pre-specification operation with no backward compatibility issues.
section: "6"
topics:
    - routing
