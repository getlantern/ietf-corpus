document: rfc-5350
kind: protocol-element
summary: The Router Alert Option (RAO) Value field is two octets in length (up to 65536 distinct values) and carries extra information used by routers to decide whether to more closely examine a datagram. It is present in both IPv4 (RFC 2113) and IPv6 (RFC 2711) variants of the option.
