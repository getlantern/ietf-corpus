document: rfc-5059
kind: protocol-element
summary: No-Forward Bootstrap messages (No-Forward bit set) are sent to new or rebooting neighbors by the Designated Router to deliver the current RP-Set quickly. The RPF check is skipped for No-Forward BSMs. These messages are only accepted at startup before any previous BSM for the scope has been accepted and within BS_Period of startup.
section: 3.5.1
topics:
    - multicast
    - routing
