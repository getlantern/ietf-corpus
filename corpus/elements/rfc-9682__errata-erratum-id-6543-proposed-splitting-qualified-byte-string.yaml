document: rfc-9682
kind: errata
summary: Erratum ID 6543 proposed splitting qualified byte string literals (h'...' and b64'...') from plain UTF-8 byte string literals into separate ABNF rules. This document instead uses a simpler semantic post-processing approach, leaving bsqual handling to a step after syntactic parsing of BCHAR.
