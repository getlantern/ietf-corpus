document: rfc-6724
kind: interoperability-note
summary: When a host has a global IPv6 address but broken IPv6 connectivity, the default preference for IPv6 causes unwanted timeouts. Administrators can configure the policy table to prefer IPv4; implementations MAY do this automatically when they detect lack of IPv6 Internet connectivity, or treat it as part of Rule 1 (avoid unusable destinations).
section: 10.3.1
topics:
    - ip
    - v6ops
