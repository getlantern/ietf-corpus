summary: 'The hostTimeTable is provided alongside hostTable to enable fast bulk download: because its index runs 1..N sequentially, SNMP PDUs can be packed efficiently and multiple packets can be outstanding simultaneously, dramatically increasing transfer rates over MAC-address-indexed access.'
