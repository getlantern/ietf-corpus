document: rfc-1248
kind: protocol-element
summary: ospfIfAuthKey is a read-write OCTET STRING holding the authentication key; when the area uses simplePassword, the agent left-adjusts and zero-fills the key to 8 octets; when read, the object always returns a zero-length octet string to protect the key value.
