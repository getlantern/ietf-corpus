summary: 'NatTranslationEntity is a BITS textual convention with four flags: inboundSrcEndPoint(0), outboundDstEndPoint(1), inboundDstEndPoint(2), outboundSrcEndPoint(3). It encodes both session direction and which endpoint (source or destination) is subject to translation, and is used in address map, bind, and session objects.'
