document: rfc-8839
kind: normative-requirement
summary: When generating the initial answer accepting ICE, the answerer MUST include 'candidate' attributes for each available candidate, plus 'ice-ufrag', 'ice-pwd', and 'ice-options' with 'ice2'. The answerer MUST use the same transport protocol as the offer 'm=' line.
section: 4.3.2
rfc2119_level: MUST
topics:
