document: rfc-7865
kind: protocol-element
summary: The Recording Session (RS) class represents a SIP dialog between an SRC and SRS established for recording purposes. It has 'start-time' and 'end-time' attributes derivable from the SIP Date header or dialog setup/teardown times, and is represented by the 'recording' XML element whose SIP/SDP session provides its attributes.
section: "6.1"
topics:
