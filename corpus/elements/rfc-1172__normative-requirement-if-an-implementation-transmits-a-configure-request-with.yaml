document: rfc-1172
kind: normative-requirement
summary: If an implementation transmits a Configure-Request with a Magic-Number option, it MUST NOT respond with a Configure-Reject if its peer also sends a Magic-Number option — i.e., if an implementation wants Magic Numbers, it MUST allow its peer to use them too.
section: "2.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
