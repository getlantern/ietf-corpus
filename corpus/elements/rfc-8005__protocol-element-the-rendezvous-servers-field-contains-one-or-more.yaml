document: rfc-8005
kind: protocol-element
summary: The Rendezvous Servers field contains one or more variable-length wire-encoded domain names concatenated per RFC 1035 Section 3.3, using zero-length labels as separators. Domain names MUST NOT be compressed. RVSs are listed in order of preference within a single RR; preference ordering MUST NOT be inferred across multiple RRs.
section: "5.6"
topics:
    - dns
