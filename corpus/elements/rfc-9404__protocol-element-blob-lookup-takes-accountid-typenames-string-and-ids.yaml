document: rfc-9404
kind: protocol-element
summary: Blob/lookup takes accountId, typeNames (String[]), and ids (Id[]) and performs a reverse lookup to find which objects of each named data type reference each blobId. The response contains a list of BlobInfo objects each with id and matchedIds (a map from type name to Id[]).
