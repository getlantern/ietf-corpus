document: rfc-5959
kind: normative-requirement
summary: If an implementation supports EnvelopedData, it MUST implement key transport. When key transport is used, RSA encryption MUST be supported and RSAES-OAEP SHOULD be supported. When key agreement is used, DH ephemeral-static MUST be supported.
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
