document: rfc-7469
kind: privacy-consideration
summary: 'HPKP can be abused as a ''super-cookie'' to track users: a host can encode distinct arbitrary identifiers in pin values and use report-uri callbacks or subdomain connection failures to fingerprint individual UAs across sessions, even after cookies are cleared. UAs should allow users to clear pinning state and query current pinned hosts.'
section: "5"
topics:
    - privacy
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
