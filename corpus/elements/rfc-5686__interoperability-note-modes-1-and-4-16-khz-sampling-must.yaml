document: rfc-5686
kind: interoperability-note
summary: Modes 1 and 4 (16-kHz sampling) MUST NOT be specified in an SDP payload type with a clock rate of 8000; only Modes 0 and 3 are usable at 8-kHz clock rates. This constraint arises because SDP binds a payload type to a specific sampling frequency.
section: 6.2.1
topics:
    - rtp
    - realtime
    - voip
