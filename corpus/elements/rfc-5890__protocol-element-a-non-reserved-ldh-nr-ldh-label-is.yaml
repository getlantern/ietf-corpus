document: rfc-5890
kind: protocol-element
summary: A Non-Reserved LDH (NR-LDH) label is a valid LDH label that does not have '--' in the third and fourth positions, and is thus neither an IDN label nor a label form reserved by IDNA. All A-labels also conform to NR-LDH hostname syntax rules other than the length restriction.
section: 2.3.2.2
