document: rfc-6068
kind: registry
summary: IANA has registered the "Body" header field in the Message Header Fields Registry (RFC 3864) with status "reserved" and applicable protocol "None", to prevent its use as an actual message header field and avoid conflicts with 'mailto' URI semantics.
