document: rfc-3588
kind: protocol-element
summary: 'Result-Code AVP (Section 7.1) classifies outcomes as: Informational (1xxx), Success (2xxx), Protocol Errors (3xxx — carried with E bit set, may be generated by any node), Transient Failures (4xxx — retry may succeed), and Permanent Failures (5xxx — retry will not help). Experimental outcomes use Experimental-Result AVP with a vendor-assigned code.'
section: "7.1"
topics:
    - security
