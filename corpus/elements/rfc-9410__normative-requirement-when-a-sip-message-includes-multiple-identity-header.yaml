document: rfc-9410
kind: normative-requirement
summary: When a SIP message includes multiple Identity header fields and one has an error, the verification service MUST include the error response code and reason phrase in a Reason header field in the next provisional or final response sent to the authentication service.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - security
