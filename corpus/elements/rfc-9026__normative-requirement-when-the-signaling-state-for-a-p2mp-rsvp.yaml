document: rfc-9026
kind: normative-requirement
summary: When the signaling state for a P2MP RSVP-TE LSP is removed or transitions from Up to Down (per RFC 4875 procedures), the status of the corresponding P-tunnel MUST be re-evaluated, and the ingress Upstream PE MUST NOT be considered a valid candidate UMH.
section: 3.1.3
rfc2119_level: MUST
topics:
    - vpn
    - multicast
    - routing
    - mpls
