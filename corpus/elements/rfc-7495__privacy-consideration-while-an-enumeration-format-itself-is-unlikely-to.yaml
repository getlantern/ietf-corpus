document: rfc-7495
kind: privacy-consideration
summary: While an enumeration format itself is unlikely to raise privacy concerns, combining an enumeration value with other data in an IODEF document (e.g., attack vectors or system descriptions in a privacy-related incident) could expose sensitive information. Implementers are referred to the IODEF Security Considerations for guidance on protecting documents in transit and at rest, recipient authentication, and use of IODEF's restriction attribute.
section: "3"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
