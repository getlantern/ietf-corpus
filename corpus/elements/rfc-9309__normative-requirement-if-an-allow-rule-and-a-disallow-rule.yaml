document: rfc-9309
kind: normative-requirement
summary: If an 'allow' rule and a 'disallow' rule are equivalent, the 'allow' rule SHOULD be used. If no match is found among rules, the URI is allowed. The /robots.txt URI is implicitly allowed.
section: 2.2.2
rfc2119_level: SHOULD
topics:
