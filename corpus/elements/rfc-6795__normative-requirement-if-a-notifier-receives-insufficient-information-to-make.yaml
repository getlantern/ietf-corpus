document: rfc-6795
kind: normative-requirement
summary: If a notifier receives insufficient information to make a policy decision, it SHOULD accept the subscription and SHOULD generate a NOTIFY with the "insufficient-info" parameter. The NOTIFY body may be empty or contain hints about missing information.
section: "3.7"
rfc2119_level: SHOULD
topics:
    - sip
