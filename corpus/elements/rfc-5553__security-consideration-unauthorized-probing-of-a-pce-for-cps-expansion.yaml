document: rfc-5553
kind: security-consideration
summary: Unauthorized probing of a PCE for CPS expansion (e.g., by generating random Path Keys) must be mitigated by only allowing PKS expansion when requested by the LSR at the head end of the resulting CPS. Under specific circumstances, configured management stations may also be permitted.
section: "4"
topics:
    - security
    - routing
    - mpls
