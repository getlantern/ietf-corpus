document: rfc-1653
kind: normative-requirement
summary: A server is permitted but not required to accept a message that is actually larger than declared in the extended MAIL command, as may occur when the client used an inaccurate size-estimation heuristic.
section: "5.1"
rfc2119_level: MAY
topics:
