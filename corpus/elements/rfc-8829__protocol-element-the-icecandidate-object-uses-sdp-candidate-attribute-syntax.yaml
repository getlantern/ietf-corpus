document: rfc-8829
kind: protocol-element
summary: The IceCandidate object uses SDP candidate-attribute syntax from RFC 8839 Section 5.1 (without an 'a=' prefix) and contains fields for the associated ICE ufrag, m= section index (zero-based), and MID. The ufrag field identifies which session description and gathering phase the candidate belongs to, resolving ambiguities during ICE restarts.
section: 3.5.2.1
topics:
