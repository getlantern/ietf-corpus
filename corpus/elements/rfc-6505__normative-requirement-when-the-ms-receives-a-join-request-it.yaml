document: rfc-6505
kind: normative-requirement
summary: When the MS receives a <join> request it MUST automatically mix all media streams included in the request with any streams already joined to one of the entities, or it MUST fail the request entirely and MUST NOT join any streams nor change existing streams of the entities.
section: 4.2.2.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
