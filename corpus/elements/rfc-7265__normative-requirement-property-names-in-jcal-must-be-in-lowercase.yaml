document: rfc-7265
kind: normative-requirement
summary: Property names in jCal MUST be in lowercase. The iCalendar format specifies property names are case insensitive and recommends uppercase, but jCal mandates lowercase for all property names.
section: "3.4"
rfc2119_level: MUST
