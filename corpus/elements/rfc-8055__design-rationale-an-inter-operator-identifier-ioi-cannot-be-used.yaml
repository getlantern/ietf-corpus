document: rfc-8055
kind: design-rationale
summary: An Inter Operator Identifier (IOI) cannot be used to identify adjacent networks because IOIs are not defined for enterprise networks. The 'received-realm' parameter was introduced to fill this gap, allowing both operator and enterprise adjacent networks to be identified using a locally scoped token.
section: "1.1"
topics:
    - sip
