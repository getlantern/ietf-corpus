document: rfc-3201
kind: protocol-element
summary: ciCircuitStatus uses RowStatus to manage row lifecycle. When set to active(1), it triggers creation of an ifEntry and a ciIfMapEntry; when set to destroy(6), it removes those rows and may trigger cascading deletions in other tables.
