document: rfc-5478
kind: design-rationale
summary: DISA requires a large pool of Resource-Priority namespaces to support fine-grained assignment to groups of varying sizes — from entire branches of service (Army, Navy, etc.) down to temporary unit assignments such as task forces or platoons. This justifies deviating from RFC 4412's guidance to have as few namespaces as possible.
section: "1"
topics:
