document: rfc-1894
kind: interoperability-note
summary: Many existing MTAs send nondelivery notifications to the return address in the message header rather than the envelope return address, in violation of SMTP. If a message is forwarded through such an MTA, no action by the forwarding MTA can prevent the downstream MTA from disclosing a confidential forwarding address.
section: "4.2"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
