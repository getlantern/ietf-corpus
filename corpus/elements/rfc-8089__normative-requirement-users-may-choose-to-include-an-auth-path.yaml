document: rfc-8089
kind: normative-requirement
summary: Users MAY choose to include an auth-path with no file-auth when creating a URI to maximize compatibility with previous specifications, since some implementations incorrectly interpret all authority values (including "localhost") as non-local.
section: "2"
rfc2119_level: MAY
