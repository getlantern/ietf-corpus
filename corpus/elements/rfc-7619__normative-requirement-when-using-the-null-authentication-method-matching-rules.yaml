document: rfc-7619
kind: normative-requirement
summary: When using the NULL Authentication method, matching rules MUST include matching of a new flag in the SPD entry specifying whether unauthenticated users are allowed to use that entry. Only those SPD rules that explicitly have that flag turned on can be used with unauthenticated connections.
section: "2.4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
