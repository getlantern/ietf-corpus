document: rfc-9104
kind: protocol-element
summary: The Extended Administrative Group TLV (Type 1173) is a new BGP-LS Link Attribute TLV that encodes extended administrative groups (EAGs) for links. The Value field contains one or more 32-bit bitmasks indicating which administrative groups are enabled on the link.
