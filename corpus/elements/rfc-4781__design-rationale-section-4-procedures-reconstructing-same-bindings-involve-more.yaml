summary: Section 4 procedures (reconstructing same bindings) involve more computational overhead on the restarting router but require fewer label changes in neighbors, while Section 5 procedures (creating new bindings) are simpler but require twice as many labels. An LSR may mix approaches per AFI/SAFI.
