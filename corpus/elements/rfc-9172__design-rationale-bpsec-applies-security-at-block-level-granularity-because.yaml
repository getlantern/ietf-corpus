document: rfc-9172
kind: design-rationale
summary: BPSec applies security at block-level granularity because different blocks within a bundle represent different types of information with different security needs. For example, a payload might be encrypted while a summary extension block is integrity-signed but unencrypted to allow waypoint inspection.
section: "2.1"
topics:
