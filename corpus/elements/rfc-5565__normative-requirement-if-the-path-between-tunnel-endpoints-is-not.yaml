document: rfc-5565
kind: normative-requirement
summary: If the path between tunnel endpoints is not adequately secure and a control protocol is used to set up tunnels, the control protocol MUST have an authentication mechanism that MUST be used at setup time. BGP's MD5 authentication (RFC 2385) is deemed satisfactory.
section: "13.3"
rfc2119_level: MUST
topics:
    - security
    - bgp
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
