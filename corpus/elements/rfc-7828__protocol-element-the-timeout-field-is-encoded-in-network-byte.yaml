document: rfc-7828
kind: protocol-element
summary: The TIMEOUT field is encoded in network byte order and specifies the idle timeout in units of 100 milliseconds. When absent (OPTION-LENGTH=0), no timeout is signalled by the client. The idle period begins per RFC 7766's definition of an idle DNS-over-TCP session.
section: "3.1"
topics:
    - dns
    - tcp
