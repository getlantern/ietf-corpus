document: rfc-9568
kind: wire-format
summary: 'The VRRP Advertisement packet contains: 4-bit Version, 4-bit Type, 8-bit Virtual Rtr ID, 8-bit Priority, 8-bit IPvX Addr Count, 4-bit Reserve, 12-bit Max Advertise Interval, 16-bit Checksum, followed by one or more IPvX addresses. The packet is encapsulated in IPv4 or IPv6 depending on the address family being protected.'
section: "5.1"
topics:
