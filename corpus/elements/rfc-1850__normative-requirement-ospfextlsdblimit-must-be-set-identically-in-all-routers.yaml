document: rfc-1850
kind: normative-requirement
summary: ospfExtLsdbLimit MUST be set identically in all routers attached to the OSPF backbone and/or any regular OSPF area (stub areas and NSSAs are excluded). When the count of non-default AS-external-LSAs reaches this limit, the router enters OverflowState.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
