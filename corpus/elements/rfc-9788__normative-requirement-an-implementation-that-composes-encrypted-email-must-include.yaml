document: rfc-9788
kind: normative-requirement
summary: An implementation that composes encrypted email MUST include a copy of all Non-Structural Header Fields deliberately exposed outside the Cryptographic Envelope as HP-Outer Header Fields within the Cryptographic Payload. HP-Outer fields appearing elsewhere MUST be ignored for Header Protection evaluation.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
