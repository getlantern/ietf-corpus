summary: 'Three ''other'' logotype types are defined under id-logo (1.3.6.1.5.5.7.20): id-logo-loyalty (arc 1) for loyalty program logotypes, id-logo-background (arc 2) for certificate background images (MUST NOT exceed one per certificate), and id-logo-certImage (arc 3) for a complete visual certificate representation (MUST NOT exceed one per certificate).'
