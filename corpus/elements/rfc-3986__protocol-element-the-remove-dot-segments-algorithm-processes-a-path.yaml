document: rfc-3986
kind: protocol-element
summary: 'The remove_dot_segments algorithm processes a path input buffer left-to-right: "../" and "./" prefixes are stripped; "/./" and "/." are replaced by "/"; "/../" and "/.." remove the last output segment; lone "." or ".." are removed; otherwise the first segment is moved to output.'
section: 5.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
