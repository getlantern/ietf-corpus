document: rfc-4606
kind: normative-requirement
summary: The SUKLM label format MUST be used for any SONET/SDH signal request that is not transparent (i.e., when all Transparency bits are zero). Any transparent STS-1/STM-0/STS-3*N/STM-N signal request MUST use the label format defined in RFC 3471.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
