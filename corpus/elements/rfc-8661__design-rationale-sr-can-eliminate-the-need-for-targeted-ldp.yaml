document: rfc-8661
kind: design-rationale
summary: SR can eliminate the need for targeted LDP sessions used in RLFA-based FRR by providing SR-based repair tunnels expressed as node/adjacency segment stacks, while keeping steady-state traffic over LDP LSPs. The SR deployment can be confined to only the network region where these benefits are desired.
section: "4.2"
topics:
