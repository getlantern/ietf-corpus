document: rfc-2748
kind: normative-requirement
summary: The PEP MUST generate a Keep-Alive message randomly between 1/4 and 3/4 of the minimum KA Timer interval across all received CAT messages. Upon receiving a KA, the PDP MUST echo a KA back to the PEP. The client-type in KA messages MUST always be set to 0.
section: "3.9"
rfc2119_level: MUST
topics:
    - qos
