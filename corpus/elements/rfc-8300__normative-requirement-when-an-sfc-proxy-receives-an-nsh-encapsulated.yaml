document: rfc-8300
kind: normative-requirement
summary: When an SFC Proxy receives an NSH-encapsulated packet, it MUST remove the NSH before forwarding to an NSH-unaware SF. When receiving the packet back, it MUST re-encapsulate with the correct NSH and MUST decrement the Service Index by one.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
