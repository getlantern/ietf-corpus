document: rfc-7073
kind: protocol-element
summary: 'The ''email-id-identity'' response set extension is an OPTIONAL token indicating where the subject identifier was found in the message. Valid values are: dkim (signing domain from valid DKIM signature), ipv4, ipv6, rfc5321.helo, rfc5321.mailfrom, rfc5322.from, and spf (domain verified by SPF).'
section: "3.2"
topics:
    - email
