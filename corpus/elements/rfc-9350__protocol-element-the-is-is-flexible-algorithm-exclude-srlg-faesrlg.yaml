document: rfc-9350
kind: protocol-element
summary: The IS-IS Flexible Algorithm Exclude SRLG (FAESRLG) sub-TLV (Type 5) carries one or more SRLG values (each 4 octets) that MUST be excluded from the Flex-Algorithm topology. Unlike other IS-IS FAD sub-sub-TLVs, it MAY appear multiple times in the FAD set for a given IS; the receiver MUST take the union of all values.
section: "6.5"
topics:
    - routing
