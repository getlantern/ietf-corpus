document: rfc-7622
kind: protocol-element
summary: 'A JID (Jabber Identifier) is a UTF-8 encoded string structured as an ordered sequence of optional localpart, required domainpart, and optional resourcepart, demarcated by ''@'' and ''/'' separators. The formal ABNF syntax is: jid = [ localpart "@" ] domainpart [ "/" resourcepart ].'
section: "3.1"
topics:
