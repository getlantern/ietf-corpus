document: rfc-5893
kind: design-rationale
summary: The specification does not forbid leading European digits in ASCII-only labels to avoid invalidating a large installed base of such labels and to limit scope to RTL labels only. Registries are recommended to disallow RTL label registration in zones where the parent label begins with a digit.
section: "7.1"
topics:
    - dns
    - registry
