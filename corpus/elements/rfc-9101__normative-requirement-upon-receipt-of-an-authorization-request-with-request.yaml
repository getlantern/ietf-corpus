document: rfc-9101
kind: normative-requirement
summary: Upon receipt of an authorization request with 'request_uri', the authorization server MUST send an HTTP GET to retrieve the referenced Request Object unless it can retrieve it securely through other mechanisms.
section: 5.2.3
rfc2119_level: MUST
topics:
