summary: IANA is requested to designate bits 6 and 7 of the IPv4 TOS octet and the IPv6 Traffic Class octet as the ECN field, superseding their 'Currently Unused' designation in RFC 2474, with codepoints Not-ECT (00), ECT(1) (01), ECT(0) (10), and CE (11).
