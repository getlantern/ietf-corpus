document: rfc-2688
kind: interoperability-note
summary: The services described are only provided if both PPP link endpoints support the ISSLL architecture and mechanisms. Support is determined during PPP negotiation. The non-shared, dual-simplex nature of point-to-point links allows all admission control decisions to be made locally.
