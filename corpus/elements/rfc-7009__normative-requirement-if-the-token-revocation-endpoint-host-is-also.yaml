document: rfc-7009
kind: normative-requirement
summary: If the token revocation endpoint host is also reachable over HTTP, the server SHOULD offer a revocation service at the corresponding HTTP URI but MUST NOT publish it as a token revocation endpoint, ensuring accidentally HTTP-sent tokens are revoked.
section: "2"
rfc2119_level: SHOULD
topics:
    - oauth
    - security
