document: rfc-4193
kind: design-rationale
summary: A /7 prefix with a 41-bit Global ID space (including L bit) was chosen because it provides ~2.2 trillion assignments while consuming less than 0.8% of the total IPv6 address space. The field size was evaluated against a projected 2050 world population yielding 236 /48 prefixes per person.
section: 3.1.1
