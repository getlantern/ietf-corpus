document: rfc-2401
kind: design-rationale
summary: Tunnel mode is required for any transit SA involving a security gateway to avoid fragmentation and reassembly problems with IPsec packets, and to handle situations where multiple paths via different security gateways exist to the same destination behind those gateways.
section: "4.1"
topics:
    - ipsec
    - security
