document: rfc-2492
kind: wire-format
summary: MARS control messages are encapsulated as [0xAA-AA-03][0x00-00-5E][0x00-03][MARS control message]. The mar$pro field SHALL be 0x86DD (IPv6), mar$afn remains 0x0F (ATM), and mar$spln/mar$tpln are 0 or 16 (full IPv6 address length).
section: 4.1.5
topics:
    - ip
    - v6ops
