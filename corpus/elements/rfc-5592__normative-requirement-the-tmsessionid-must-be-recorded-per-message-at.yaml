document: rfc-5592
kind: normative-requirement
summary: The tmSessionID MUST be recorded per message at the time of receipt and MUST uniquely identify the session over which the message was received; this session identifier MUST NOT be reused until there are no references to it remaining.
section: 4.1.2
rfc2119_level: MUST
