document: rfc-5451
kind: design-rationale
summary: The authserv-id SHOULD be a hierarchical DNS domain name rather than a local hostname because a hierarchical identifier allows aggregating related trusted systems under a single parent identifier, whereas a flat namespace of hostnames requires maintaining a constantly-updated list of each trusted system individually.
section: "2.3"
topics:
    - email
    - security
