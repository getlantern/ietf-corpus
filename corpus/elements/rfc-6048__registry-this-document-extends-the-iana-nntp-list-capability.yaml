document: rfc-6048
kind: registry
summary: 'This document extends the IANA NNTP LIST capability registry by adding five optional keywords to the ''LIST'' capability label: COUNTS, DISTRIBUTIONS, MODERATORS, MOTD, and SUBSCRIPTIONS. It also adds three new status field values (''x'', ''j'', ''=newsgroup-name'') to the ACTIVE variant of LIST.'
