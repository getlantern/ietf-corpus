document: rfc-2916
kind: protocol-element
summary: 'The algorithm to convert an E.164 number to a DNS name has six steps: write in full form with country code, remove non-digit characters except leading ''+'', remove ''+'', insert dots between digits, reverse digit order, and append ''.e164.arpa''. For example, +46-8-9761234 becomes 4.3.2.1.6.7.9.8.6.4.e164.arpa.'
section: "2"
