document: rfc-8964
kind: normative-requirement
summary: When the Sequence Number field length is 16 or 28 bits, the sequence number MUST be incremented by one for each new App-flow packet sent. When 16 bits, d-CW bits 4–15 MUST be set to zero. A separate sequence number space MUST be maintained per DetNet App-flow.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
