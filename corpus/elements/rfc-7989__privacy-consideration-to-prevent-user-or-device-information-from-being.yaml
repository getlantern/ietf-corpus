document: rfc-7989
kind: privacy-consideration
summary: To prevent user or device information from being conveyed, endpoints MUST generate only version 4 (random) or version 5 (SHA-1) UUIDs. Version 1 UUIDs embed the MAC address of the endpoint and are therefore prohibited as they would expose device identity.
section: "12"
topics:
