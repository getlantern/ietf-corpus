document: rfc-8487
kind: wire-format
summary: 'The Mtrace2 Query TLV carries: 8-bit # Hops, a 32-bit or 128-bit Multicast Address, a 32-bit or 128-bit Source Address, a 32-bit or 128-bit Mtrace2 Client Address, a 16-bit Query ID, and a 16-bit Client Port #. The Length field MUST be 20 (IPv4) or 56 (IPv6).'
section: 3.2.1
topics:
    - multicast
