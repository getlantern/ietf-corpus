document: rfc-9561
kind: protocol-element
summary: The MDS fences a non-responding client by issuing a Reservation Acquire command with RACQA=001b (Preempt) or 010b (Preempt and Abort), CRKEY set to the server's key, PRKEY set to the client's key, and RTYPE=4h. The client can detect fencing via the Reservation Conflict NVMe status code.
section: 2.2.3
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
