document: rfc-8148
kind: interoperability-note
summary: When an NG-ACN call is routed to a PSAP that is not NG-ACN capable, the PSAP ignores or does not receive vehicle data; this is detectable by the IVS or TSP when the 200 OK response lacks a metadata/control structure acknowledging receipt, after which the IVS proceeds as for a CS-ACN call (e.g., oral data conveyance).
section: "5"
topics:
