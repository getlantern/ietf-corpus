summary: Policy-Ignorant Nodes (PINs) and policy-capable nodes that do not recognize the Receiver Proxy Control policy element apply the default handling defined in RFC 2750 Section 4.2, ensuring these objects can traverse such nodes in transit between Policy Enforcement Points.
