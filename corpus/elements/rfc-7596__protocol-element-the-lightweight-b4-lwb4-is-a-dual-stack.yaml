document: rfc-7596
kind: protocol-element
summary: The Lightweight B4 (lwB4) is a dual-stack CPE function that supports port-restricted IPv4 address allocation, implements NAPT44, and creates an IPv4-in-IPv6 softwire tunnel to an lwAFTR. It differs from a DS-Lite B4 in that it performs the NAPT44 function rather than delegating it to the AFTR.
section: "3"
