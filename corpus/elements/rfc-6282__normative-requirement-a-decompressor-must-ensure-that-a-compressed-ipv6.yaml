document: rfc-6282
kind: normative-requirement
summary: A decompressor MUST ensure that a compressed IPv6 Hop-by-Hop or Destination Options header is padded out to a multiple of 8 octets using Pad1 or PadN if necessary; Pad1/PadN at non-trailing positions MUST be carried in-line.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
