document: rfc-7275
kind: state-machine
summary: 'The ICCP Connection State Machine has six states: NONEXISTENT, INITIALIZED, CAPSENT, CAPREC, CONNECTING, and OPERATIONAL. Transitions are driven by LDP session establishment/teardown, LDP ICCP capability advertisement and receipt, and RG Connect/Disconnect message exchange; unexpected ICCP messages in pre-OPERATIONAL states trigger a NAK TLV.'
