document: rfc-6075
kind: security-consideration
summary: There are no known security issues with the registry itself. Individual protocols using Vendor Subtree names may have their own security issues. The introduction of Unicode carries inherent security implications, and restricting registrations to ASCII is considered to mitigate those risks.
section: "5"
topics:
