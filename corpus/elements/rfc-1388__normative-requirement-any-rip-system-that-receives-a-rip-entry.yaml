document: rfc-1388
kind: normative-requirement
summary: Any RIP system that receives a RIP entry containing a non-zero Route Tag value MUST re-advertise that value. Routes with no Route Tag value MUST advertise an RT of zero.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
