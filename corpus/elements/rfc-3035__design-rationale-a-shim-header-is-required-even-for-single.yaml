document: rfc-3035
kind: design-rationale
summary: A shim header is required even for single-label packets transmitted on LC-ATM interfaces because without it there would be no way to determine whether additional label stack entries are present. While two VCs per FEC or a priori knowledge could eliminate the overhead, these techniques have no practical utility.
section: "9"
topics:
