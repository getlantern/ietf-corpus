document: rfc-6327
kind: normative-requirement
summary: 'To enable any RBridge to definitively determine 2-way reachability, RB1''s neighbor list MUST eventually cover every possible range of SNPA IDs: if X1 is the smallest ID in a fragment without the ''smallest'' flag set, X1 MUST also appear as the largest ID in another fragment so no range is ever absent.'
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
