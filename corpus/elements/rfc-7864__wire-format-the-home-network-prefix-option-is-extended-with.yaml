document: rfc-7864
kind: wire-format
summary: The Home Network Prefix Option is extended with a new Off-link flag (L) in the Reserved field. When L=1, the MAG treats the conveyed HNP as off-link (not hosted on the MAG-MN interface) but adds it to the routing table for flow mobility; when L=0, the prefix is hosted on-link. The rest of the format is unchanged from RFC 5213.
section: "4.1"
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
