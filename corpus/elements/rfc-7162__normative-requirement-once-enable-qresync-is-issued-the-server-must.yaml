document: rfc-7162
kind: normative-requirement
summary: Once ENABLE QRESYNC is issued, the server MUST automatically include both UID and mod-sequence data in all subsequent untagged FETCH responses, whether caused by STORE/UID STORE, conditional STORE, a FETCH that implicitly sets \Seen, or an external agent.
section: 3.2.4
rfc2119_level: MUST
topics:
