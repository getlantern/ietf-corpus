document: rfc-1508
kind: protocol-element
summary: GSS_Accept_sec_context() inputs include acceptor_cred_handle, input_context_handle (0 for first call), chan_bindings, and input_token. Outputs include src_name (authenticated peer identity), mech_type, context state flags, delegated_cred_handle (significant only when deleg_state is TRUE), and output_token for mutual authentication continuation.
