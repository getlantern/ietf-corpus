document: rfc-2068
kind: registry
summary: IANA acts as registry for content-coding value tokens used in Accept-Encoding and Content-Encoding. Initial values are 'gzip' (LZ77 + CRC32), 'compress' (LZW), and 'deflate' (zlib/RFC 1950 + deflate/RFC 1951). New tokens must be publicly documented for independent implementation.
section: "3.5"
topics:
