document: rfc-9842
kind: normative-requirement
summary: If a client receives a dictionary with a 'type' value it does not understand, it MUST NOT use the dictionary. The 'type' value defaults to 'raw', representing an unformatted blob of bytes.
section: 2.1.4
rfc2119_level: MUST NOT
