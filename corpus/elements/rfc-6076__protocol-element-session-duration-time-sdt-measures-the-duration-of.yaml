document: rfc-6076
kind: protocol-element
summary: 'Session Duration Time (SDT) measures the duration of a dialog from receipt of the 200 OK to INVITE until receipt (or sending) of the associated BYE, or until Timer F expiration in failed completions. Formula: SDT = Time of BYE or Timeout - Time of 200 OK response to INVITE. Output SHOULD be in seconds.'
section: "4.5"
topics:
    - realtime
    - voip
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
