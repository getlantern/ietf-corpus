document: rfc-2518
kind: normative-requirement
summary: A lock token MUST be submitted by an authorized principal in the If header for all locked resources that a method may interact with, or the method MUST fail. For example, a MOVE where both source and destination are locked requires two lock tokens.
section: "7.6"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
