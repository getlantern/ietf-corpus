document: rfc-3733
kind: protocol-element
summary: The <contact:check> command queries server availability of one or more contact identifiers. The response <contact:chkData> contains one <contact:cd> per queried ID, each with a required boolean 'avail' attribute and an optional <contact:reason> element for unavailable objects.
section: 3.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
