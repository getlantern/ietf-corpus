document: rfc-1730
kind: security-consideration
summary: IMAP4 includes a LOGIN command that transmits the user password in plaintext, which is insecure on networks subject to eavesdropping. The AUTHENTICATE command provides stronger authentication and optional session-level integrity and privacy protection via a negotiated protection mechanism.
section: "11"
topics:
    - email
    - security
