document: rfc-2710
kind: security-consideration
summary: A forged Report message may cause routers to think there are listeners for an address when there are not; however, since listening to a multicast address is generally an unprivileged operation, a local user may trivially achieve the same effect without forging messages.
section: "9"
topics:
    - security
    - multicast
    - ip
