document: rfc-4075
kind: security-consideration
summary: A rogue DHCPv6 server could use the SNTP servers option to direct clients to a malicious SNTP server, causing incorrect time synchronization. This can compromise time-critical security mechanisms such as certificate validity checking and replay attack prevention via timestamps.
section: "6"
topics:
    - ntp
    - security
