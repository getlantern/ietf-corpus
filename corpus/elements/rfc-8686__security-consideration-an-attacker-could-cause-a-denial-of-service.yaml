document: rfc-8686
kind: security-consideration
summary: An attacker could cause a denial-of-service against the ALTO discovery procedure or underlying DNS, preventing clients from discovering any ALTO server. Applications must be prepared to operate without ALTO guidance; operators should follow best practices to secure DNS and ALTO infrastructure.
section: "6.2"
topics:
    - security
    - dns
