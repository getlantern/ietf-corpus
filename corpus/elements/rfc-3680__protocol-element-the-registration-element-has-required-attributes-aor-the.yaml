document: rfc-3680
kind: protocol-element
summary: 'The "registration" element has required attributes: "aor" (the address-of-record URI), "id" (unique identifier stable across notifications within a subscription), and "state" ("init", "active", or "terminated"). Registration state for a single AOR MUST be in a single "registration" element.'
section: "5.1"
topics:
