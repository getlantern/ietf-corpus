document: rfc-8577
kind: normative-requirement
summary: The LSI-D flag in LSP_ATTRIBUTES MUST be set only if the use and recording of TE link labels are requested/mandated. If an unsupporting transit hop receives a mandated TE link label requirement, it MUST send a PathErr with error code 24 and error value 70.
section: "9.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
