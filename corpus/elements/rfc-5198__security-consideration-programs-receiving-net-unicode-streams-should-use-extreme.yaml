document: rfc-5198
kind: security-consideration
summary: Programs receiving Net-Unicode streams should use extreme caution about assuming incoming data are normalized; attackers may deliberately send unnormalized text or invalid UTF-8 to evade naive text-matching systems such as firewalls.
