document: rfc-8435
kind: wire-format
summary: ff_layoutreturn4 is sent in the lrf_body of LAYOUTRETURN when layout type is LAYOUT4_FLEX_FILES. It contains fflr_ioerr_report (array of ff_ioerr4 for I/O errors) and fflr_iostats_report (array of ff_iostats4 for usage statistics); zero-length array indicates no errors.
section: "9.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
