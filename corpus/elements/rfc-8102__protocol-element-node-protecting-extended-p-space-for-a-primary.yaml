document: rfc-8102
kind: protocol-element
summary: Node-Protecting Extended P-Space for a primary next-hop node E is the set of routers reachable from one or more direct neighbors of S (excluding E) without traversing node E, excluding any direct neighbor with at least one ECMP path traversing node E.
section: 2.2.2
topics:
