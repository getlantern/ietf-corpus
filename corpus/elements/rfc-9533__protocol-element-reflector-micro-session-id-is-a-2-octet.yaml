document: rfc-9533
kind: protocol-element
summary: Reflector Micro-session ID is a 2-octet field carrying the LAG member link identifier of the Reflector side. Its value MUST be unique within a TWAMP session at the Session-Reflector. It may be used generically beyond LAGs in the future.
section: 4.2.1
topics:
