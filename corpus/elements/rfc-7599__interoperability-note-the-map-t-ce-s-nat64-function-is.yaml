document: rfc-7599
kind: interoperability-note
summary: 'The MAP-T CE''s NAT64 function is by default compatible with RFC 6146 stateful NAT64 devices placed in the operator''s network: configuring the CE''s DMR prefix to match the NAT64 device prefix allows MAP-T CEs to act as customer-side translators (CLAT, per RFC 6877) in environments using stateful NAT64.'
section: "12.4"
topics:
