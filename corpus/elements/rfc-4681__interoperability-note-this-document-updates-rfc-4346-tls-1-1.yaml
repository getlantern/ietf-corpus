document: rfc-4681
kind: interoperability-note
summary: This document updates RFC 4346 (TLS 1.1). The user_mapping extension follows the convention from RFC 4366 where the server echoes the same extension type in the server hello to signal understanding; absence of the echo means the client ignores the extension and sends no UserMappingDataList.
section: "1"
topics:
