document: rfc-9926
kind: normative-requirement
summary: Unused bits in the EDAR/EDAC Prefix field MUST be padded with zeros by the sender, and the receiver MUST treat padding as zeroed and MUST overwrite any unused bits with zeros before using the prefix.
section: "7.3"
rfc2119_level: MUST
