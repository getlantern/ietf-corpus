kind: protocol-element
summary: The SIP-Server-Assignment-Type AVP (Enumerated) identifies the reason a SAR is sent. Defined values include REGISTRATION, RE_REGISTRATION, UNREGISTERED_USER, TIMEOUT_DEREGISTRATION, USER_DEREGISTRATION, DEREGISTRATION_TOO_MUCH_DATA, ADMINISTRATIVE_DEREGISTRATION, AUTHENTICATION_FAILURE, AUTHENTICATION_TIMEOUT, NO_ASSIGNMENT, TIMEOUT_DEREGISTRATION_STORE_SERVER_NAME, and USER_DEREGISTRATION_STORE_SERVER_NAME.
section: "9.4"
