document: rfc-4944
kind: normative-requirement
summary: An IPv6 address prefix used for stateless autoconfiguration of an IEEE 802.15.4 interface MUST have a length of 64 bits. All zero addresses MUST NOT be used for either EUI-64 or short-address-derived interface identifiers.
section: "6"
rfc2119_level: MUST
topics:
    - ip
