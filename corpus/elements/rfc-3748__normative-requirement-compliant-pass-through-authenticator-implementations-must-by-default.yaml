document: rfc-3748
kind: normative-requirement
summary: Compliant pass-through authenticator implementations MUST by default forward EAP packets of any Type. When acting as pass-through, the authenticator MUST determine the authentication outcome solely based on the Accept/Reject indication sent by the backend authentication server, not by the contents of an encapsulated EAP packet.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
