document: rfc-9134
kind: interoperability-note
summary: In a constant bitrate (CBR) JPEG XS scenario using codestream packetization mode, the format guarantees both a constant number of bytes per video frame and a constant number of RTP packets per video frame. Variable bitrate or slice packetization mode requires additional mechanisms (encoder constraints, padding, or empty RTP packets) to achieve similar guarantees.
section: "4.1"
topics:
    - rtp
    - realtime
    - qos
