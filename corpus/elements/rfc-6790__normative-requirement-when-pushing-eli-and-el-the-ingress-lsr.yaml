document: rfc-6790
kind: normative-requirement
summary: When pushing ELI and EL, the ingress LSR MUST set the EL's TTL to zero (preventing inadvertent forwarding use) and MUST set the ELI's BoS bit to zero. The EL's BoS bit reflects whether more labels follow it in the stack.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
