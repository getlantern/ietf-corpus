document: rfc-6030
kind: normative-requirement
summary: When using passphrase-based key derivation (PBKDF2), the <DerivedKey> element from XML Encryption 1.1 MUST be used as a child of <EncryptionKey>; the 'Algorithm' attribute of <KeyDerivationMethod> MUST be set to the PBKDF2 URI, and the <PBKDF2-params> child element MUST be included.
section: "6.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
