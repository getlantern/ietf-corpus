document: rfc-6415
kind: protocol-element
summary: Link-based Resource Descriptor Documents (LRDD, pronounced 'lard') are per-resource descriptor documents linked via 'lrdd' relation type link templates. They provide resource-specific information not expressible via link templates and MUST have an 'application/xrd+xml' representation.
section: "1"
