document: rfc-9492
kind: security-consideration
summary: Tampering with ASLA link attribute advertisements may impact applications using them, including TE path computation. Because ASLA advertisements limit scope to specific applications, the impact of tampering is similarly limited in scope compared to legacy advertisements.
