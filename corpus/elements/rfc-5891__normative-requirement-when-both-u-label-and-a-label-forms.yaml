document: rfc-5891
kind: normative-requirement
summary: When both U-label and A-label forms are available at registration, the registry MUST ensure the A-label is lowercase, convert to a U-label, validate it, and verify the re-encoded A-label matches the provided input; if any test fails, the registration MUST be rejected.
section: 4.2.1
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
