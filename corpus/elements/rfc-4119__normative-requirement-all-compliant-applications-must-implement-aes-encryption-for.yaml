document: rfc-4119
kind: normative-requirement
summary: All compliant applications MUST implement AES encryption for S/MIME as specified in RFC 3565, and MUST also support the baseline S/MIME encryption and digital signature algorithms. Implementations MUST support password-based CMS encryption.
section: "4"
rfc2119_level: MUST
topics:
