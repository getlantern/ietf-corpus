document: rfc-3676
kind: normative-requirement
summary: When the newer soft-line-break insertion technique is used (inserting SP before CRLF), the DelSp parameter MUST be used and MUST be set to 'yes'. When the older technique is used, if DelSp is specified it MUST be set to 'no'.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
