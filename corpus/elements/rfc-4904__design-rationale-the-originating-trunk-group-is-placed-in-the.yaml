document: rfc-4904
kind: design-rationale
summary: The originating trunk group is placed in the Contact header rather than the From URI because a trunk group binding is valid only for the duration of the session, whereas the From URI is an abstract long-term identifier. The Contact URI has exactly the right session-scoped semantics.
section: "6.1"
topics:
    - sip
    - voip
