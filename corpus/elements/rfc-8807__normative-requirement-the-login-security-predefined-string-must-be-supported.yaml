document: rfc-8807
kind: normative-requirement
summary: The "[LOGIN-SECURITY]" predefined string MUST be supported by the server to allow clients to explicitly indicate whether to use the <loginSec:pw> element in place of the RFC 5730 <pw> element, or <loginSec:newPW> in place of <newPW>. The server MUST NOT allow the client to set the password to the value "[LOGIN-SECURITY]".
section: "3.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
