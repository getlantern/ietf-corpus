document: rfc-1541
kind: protocol-element
summary: 'Lease time T1 and T2 renewal timers: at T1 the client unicasts DHCPREQUEST to the original server (RENEWING state); at T2 the client broadcasts DHCPREQUEST to any server (REBINDING state). In both states, if no response arrives, the client retransmits at half the remaining interval down to a minimum of 60 seconds.'
section: 4.4.4
topics:
