document: rfc-5870
kind: design-rationale
summary: WGS-84 was chosen as the default CRS because GPS devices — anticipated to be a primary data source for 'geo' URI authoring — natively use WGS-84. Many other geographic data formats also use WGS-84, minimizing reprojection errors. The burden of any required spatial transformation is intentionally placed on URI authors rather than consumers.
section: "1"
