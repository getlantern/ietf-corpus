document: rfc-7070
kind: normative-requirement
summary: Application-defining documents must specify the type of rating scale used (e.g., linear), and all reputation service providers for that application space must adhere to it. This allows clients to switch providers without out-of-band coordination about score semantics.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
