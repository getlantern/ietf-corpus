document: rfc-5230
kind: normative-requirement
summary: Sites MAY define a minimum :days value greater than 0 and MAY define a maximum :days value, which MUST be greater than 7 and SHOULD be greater than 30. If :days is omitted, the default is 7 or the minimum value, whichever is greater.
section: "4.1"
rfc2119_level: MAY
topics:
    - email
