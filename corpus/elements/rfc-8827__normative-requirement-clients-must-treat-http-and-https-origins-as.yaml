document: rfc-8827
kind: normative-requirement
summary: Clients MUST treat HTTP and HTTPS origins as different permissions domains, because the security of the origin depends on authenticating content via HTTPS. Browsers that allow active mixed content MUST nevertheless disable WebRTC functionality in mixed content settings.
section: "6.1"
rfc2119_level: MUST
topics:
    - webrtc
    - security
