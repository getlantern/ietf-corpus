document: rfc-9922
kind: protocol-element
summary: 'The ''generic-schedule-params'' grouping provides system-wide scheduling guard parameters: description, time-zone-identifier, validity (latest time a schedule can start), max-allowed-start, min-allowed-start, max-allowed-end, and discard-action. These apply to all schedules on a system to prevent stale configuration.'
