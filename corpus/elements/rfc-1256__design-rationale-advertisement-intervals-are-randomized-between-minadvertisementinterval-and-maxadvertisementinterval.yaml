document: rfc-1256
kind: design-rationale
summary: Advertisement intervals are randomized between MinAdvertisementInterval and MaxAdvertisementInterval rather than being strictly periodic, to reduce synchronization probability with other routers on the same link. Routers are recommended to seed their PRNG with a unique value such as an IP or link-layer address.
section: "4.3"
topics:
    - ip
    - routing
