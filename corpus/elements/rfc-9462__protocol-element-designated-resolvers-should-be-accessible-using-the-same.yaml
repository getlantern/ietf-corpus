document: rfc-9462
kind: protocol-element
summary: Designated Resolvers SHOULD be accessible using the same IP address families as the associated Unencrypted DNS Resolver; they MAY support more address families but SHOULD NOT support fewer, to avoid connectivity failures for single-family clients.
section: "4"
topics:
