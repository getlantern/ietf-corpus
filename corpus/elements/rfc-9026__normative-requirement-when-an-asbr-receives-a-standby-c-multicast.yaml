document: rfc-9026
kind: normative-requirement
summary: When an ASBR receives a Standby C-multicast route with LOCAL_PREF=0 over iBGP, it MUST re-advertise it in eBGP with MED set to 0xffff; conversely, if received over eBGP with MED=0xffff, it MUST re-advertise in iBGP with LOCAL_PREF=0.
section: 4.4.2
rfc2119_level: MUST
topics:
    - vpn
    - multicast
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
