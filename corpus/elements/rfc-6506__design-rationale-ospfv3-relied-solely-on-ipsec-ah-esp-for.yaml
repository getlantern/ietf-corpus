document: rfc-6506
kind: design-rationale
summary: OSPFv3 relied solely on IPsec (AH/ESP) for authentication, but IPsec is difficult to configure and maintain in environments such as MANETs, and provides no replay protection when using manual keys. This specification introduces an Authentication Trailer mechanism analogous to OSPFv2's cryptographic authentication to address those gaps.
section: "1"
topics:
    - routing
    - security
    - crypto
