document: rfc-6148
kind: interoperability-note
summary: If a query by IP address, MAC address, or Client Identifier also carries option 82 with a Remote ID sub-option, the query type is still determined by the primary query key (IP/MAC/Client ID) as specified in RFC 4388, not as a Remote ID query.
section: "5"
