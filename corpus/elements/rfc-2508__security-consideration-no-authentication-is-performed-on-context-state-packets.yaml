document: rfc-2508
kind: security-consideration
summary: No authentication is performed on CONTEXT_STATE packets. An attacker with link access could inject false CONTEXT_STATE packets, causing context invalidations and repeated FULL_HEADER transmissions that reduce compression efficiency and likely cause congestion. However, such an attacker could also disrupt traffic in many other ways.
section: "8"
topics:
