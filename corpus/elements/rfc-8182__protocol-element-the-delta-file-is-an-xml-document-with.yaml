document: rfc-8182
kind: protocol-element
summary: The Delta File is an XML document with a root 'delta' element carrying version, session_id, and serial attributes, plus one or more 'publish' (uri, optional hash, base64 content) or 'withdraw' (uri, hash) child elements encoding all changes for exactly one serial increment of the repository.
