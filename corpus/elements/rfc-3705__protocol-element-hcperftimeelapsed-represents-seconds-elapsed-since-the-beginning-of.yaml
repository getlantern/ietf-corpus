document: rfc-3705
kind: protocol-element
summary: HCPerfTimeElapsed represents seconds elapsed since the beginning of the current measurement period. For 15-minute intervals the range is (0..899); for 24-hour intervals (0..86399). Capped at maximum value if the interval is extended by clock adjustments or leap seconds. Encoded as Integer32 (0..86399).
