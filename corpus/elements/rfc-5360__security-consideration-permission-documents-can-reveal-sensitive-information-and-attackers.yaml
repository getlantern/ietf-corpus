document: rfc-5360
kind: security-consideration
summary: Permission documents can reveal sensitive information and attackers may attempt to modify them to cause clients to grant or deny unintended permissions. Relays SHOULD use strong integrity protection and confidentiality when sending permission documents; end-to-end S/MIME is RECOMMENDED, with TLS/SIPS as a fallback for hop-by-hop protection.
section: "7"
topics:
