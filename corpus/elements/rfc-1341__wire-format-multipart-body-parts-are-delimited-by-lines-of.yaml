document: rfc-1341
kind: wire-format
summary: Multipart body parts are delimited by lines of the form '--<boundary>' and the final boundary is '--<boundary>--'. The 'boundary' parameter in the Content-Type is case-sensitive and MUST NOT appear within any body part. A preamble before the first boundary and an epilogue after the last are allowed and must be ignored by decoders.
section: "7.2"
topics:
    - email
