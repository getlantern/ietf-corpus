document: rfc-3153
kind: normative-requirement
summary: The transmitter SHOULD compress PPP Protocol IDs whose upper byte is zero (Protocol IDs 0x21 through 0xFD) in the per-subframe protocol field. This compression is independent of LCP-negotiated PFC for the outer multiplexed frame header.
section: "1.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
