document: rfc-1509
kind: protocol-element
summary: gss_delete_sec_context deletes local context data structures and generates an output_token that, when passed to the peer's gss_process_context_token, instructs it to also delete the context. No further security services may be obtained via the deleted context handle.
section: "3.6"
topics:
    - security
