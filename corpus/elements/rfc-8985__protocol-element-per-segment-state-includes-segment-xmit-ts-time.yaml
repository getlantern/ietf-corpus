document: rfc-8985
kind: protocol-element
summary: Per-segment state includes Segment.xmit_ts (time of last transmission, with INFINITE_TS indicating not in flight), Segment.lost (marked for retransmission), and Segment.retransmitted (ever retransmitted). Clock granularity must be finer than 1/4 of min RTT.
