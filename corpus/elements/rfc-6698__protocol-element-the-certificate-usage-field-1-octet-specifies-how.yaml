document: rfc-6698
kind: protocol-element
summary: The Certificate Usage field (1 octet) specifies how the TLSA record constrains the TLS certificate. Value 0 = CA constraint (PKIX path must include matching CA cert); 1 = service certificate constraint (end entity must match, PKIX validation required); 2 = trust anchor assertion (matching cert used as trust anchor); 3 = domain-issued certificate (end entity must match, no PKIX validation required).
section: 2.1.1
topics:
    - dns
    - tls
    - pkix
    - security
