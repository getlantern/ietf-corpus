document: rfc-9801
kind: normative-requirement
summary: For 10GBASE-R and 25GBASE-R, if an optional FEC layer is present, the PSN-bound NSP function MUST terminate the FEC and the CE-bound NSP function MUST generate the FEC. The CE-bound NSP MUST perform PCS code sync, descrambling, and MUST scramble the 64B/66B code stream before sending to the CE.
section: 4.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
