summary: BT field is 8 bits set to the constant 11, identifying this as a Multicast Acquisition report block. MA Method is 8 bits denoting the type of acquisition method (e.g., simple join=1, RAMS=2). Block Length is 16 bits giving the report block length in 32-bit words minus one.
