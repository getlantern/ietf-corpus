document: rfc-4174
kind: protocol-element
summary: 'The 32-bit iSNS Server Security Bitmap communicates the security settings required to communicate with the indicated iSNS server: bit 31 (Enabled), bit 30 (IKE/IPSec), bit 29 (Main Mode), bit 28 (Aggressive Mode), bit 27 (PFS), bit 26 (Transport Mode), bit 25 (Tunnel Mode).'
section: "2.4"
