document: rfc-5854
kind: normative-requirement
summary: 'Metalink Processors that verify signed Metalink Documents MUST be able to canonicalize using exclusive XML canonicalization (URI: ''http://www.w3.org/2001/10/xml-exc-c14n#'') and MUST be able to verify RSA signatures. Metalink Documents SHOULD NOT use MACs for signatures.'
section: "7.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
