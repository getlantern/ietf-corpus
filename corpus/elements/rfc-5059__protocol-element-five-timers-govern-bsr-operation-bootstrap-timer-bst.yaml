document: rfc-5059
kind: protocol-element
summary: 'Five timers govern BSR operation: Bootstrap Timer BST(Z) (BS_Period=60 s, BS_Timeout=130 s, BS_Min_Interval=10 s, BS_Rand_Override=5–23 s computed from BSR weight difference); Scope-Zone Expiry Timer SZT(Z) (SZ_Timeout=1300 s); Group-to-C-RP Expiry Timer CGET; Group-to-RP Expiry Timer GET; and C-RP Advertisement Timer CRPT (C_RP_Adv_Period=60 s, C_RP_Adv_Backoff=0–3 s).'
section: "5"
topics:
    - multicast
    - routing
