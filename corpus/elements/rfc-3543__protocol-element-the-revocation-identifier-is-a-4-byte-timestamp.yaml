document: rfc-3543
kind: protocol-element
summary: The Revocation Identifier is a 4-byte timestamp in both the revocation message and acknowledgment, used for replay protection. The revoking agent sets it from the same clock used for revocation extension timestamps; the acknowledging agent copies it verbatim to correlate the acknowledgment.
section: "3.5"
topics:
    - mobility
    - security
