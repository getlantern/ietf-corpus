document: rfc-9793
kind: normative-requirement
summary: A BFER MUST attach a BIER attribute to its own /32 or /128 host BFR-prefix NLRI, including one BIER TLV for each supported sub-domain with an MPLS and/or non-MPLS Encapsulation sub-TLV.
