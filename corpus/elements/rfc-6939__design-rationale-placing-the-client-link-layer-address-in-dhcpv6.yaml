document: rfc-6939
kind: design-rationale
summary: Placing the client link-layer address in DHCPv6 Relay-Forward messages (rather than in client messages) was chosen so that the option is populated by the first-hop relay agent, which has direct link-layer visibility, without requiring any changes to DHCPv6 client implementations.
