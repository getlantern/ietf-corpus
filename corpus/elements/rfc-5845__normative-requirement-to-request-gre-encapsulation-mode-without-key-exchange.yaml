document: rfc-5845
kind: normative-requirement
summary: To request GRE encapsulation mode without key exchange, the MAG MUST include the GRE Key option but omit the GRE Key Identifier field in the Proxy Binding Update; the LMA responds with the GRE Key option also omitting the GRE Key Identifier.
section: "3.2"
rfc2119_level: MUST
