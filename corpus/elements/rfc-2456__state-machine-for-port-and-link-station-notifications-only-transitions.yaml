document: rfc-2456
kind: state-machine
summary: For port and link station notifications, only transitions to 'active' or 'inactive' trigger a notification; intermediate operational states are not reported. For TG operational state, the boolean appnLocalTgOperational ('true'/'false') triggers notifications on any change. For DLUR-DLUS sessions, only transitions to 'active' or 'inactive' trigger dlurDlusStateChangeTrap.
