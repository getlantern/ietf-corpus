document: rfc-6926
kind: normative-requirement
summary: A server processing parallel queries MUST NOT block sending replies for a new query until all replies for an existing query are complete; requestors that cannot handle interleaved replies (demultiplexed by xid) MUST NOT send more than one query at a time.
section: "7.7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
