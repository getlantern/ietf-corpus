document: rfc-4566
kind: normative-requirement
summary: For RTP/AVP and RTP/SAVP media, the `<fmt>` sub-field MUST contain RTP payload type numbers. When a dynamic payload type is used, an `a=rtpmap:` attribute MUST be included to map the payload type number to a media encoding name.
section: "5.14"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
