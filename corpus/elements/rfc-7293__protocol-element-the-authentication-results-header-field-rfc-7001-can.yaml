document: rfc-7293
kind: protocol-element
summary: 'The Authentication-Results header field (RFC 7001) can report RRVS evaluation results using the method name ''rrvs'' with result values: none (protocol not in use), unknown (ownership undetermined), temperror, permerror, pass (continuous ownership confirmed), or fail (ownership not confirmed since timestamp).'
