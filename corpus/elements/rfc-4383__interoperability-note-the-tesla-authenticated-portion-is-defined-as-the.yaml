document: rfc-4383
kind: interoperability-note
summary: The TESLA Authenticated Portion is defined as the RTP header plus the Encrypted Portion only, whereas the SRTP Authenticated Portion is extended to include the TESLA authentication extension. The SRTP MAC therefore covers the TESLA MAC tag, ensuring TESLA MAC packet integrity is verified by the outer SRTP integrity check.
section: "4.2"
topics:
    - rtp
    - realtime
    - security
