document: rfc-4702
kind: security-consideration
summary: DHCP servers currently have limited ability to verify client identity due to the absence of entity authentication in DHCP itself. If DHCP Authentication (RFC 3118) becomes widely deployed, servers could develop greater confidence in client identities.
