document: rfc-7401
kind: wire-format
summary: The DIFFIE_HELLMAN parameter carries a Group ID (1 byte identifying the DH group) and the sender's DH public value. The DH_GROUP_LIST parameter carries an ordered list of Group IDs representing the sender's preferences, enabling DH group negotiation starting from the I1 packet.
section: 5.2.7
topics:
