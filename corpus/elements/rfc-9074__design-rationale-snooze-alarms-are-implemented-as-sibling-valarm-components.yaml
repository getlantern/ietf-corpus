document: rfc-9074
kind: design-rationale
summary: Snooze alarms are implemented as sibling VALARM components (rather than modifying the original alarm) so that the original VALARM remains unchanged except for its ACKNOWLEDGED property. This preserves the original alarm definition while allowing snooze state to be tracked independently.
section: "7"
