document: rfc-8311
kind: normative-requirement
summary: Network nodes that forward packets SHOULD NOT assume that the ECN CE codepoint indicates that the packet would have been dropped if ECN were not in use, and CE-marked packets SHOULD NOT be arbitrarily dropped, because Congestion Response Differences experiments employ different congestion responses to drops versus CE marks.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
