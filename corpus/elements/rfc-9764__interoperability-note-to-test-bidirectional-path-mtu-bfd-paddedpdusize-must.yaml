document: rfc-9764
kind: interoperability-note
summary: To test bidirectional Path MTU, bfd.PaddedPduSize must be configured on each side of the BFD session. Without consistent configuration on both sides, BFD with Large Packets may only correctly determine unidirectional connectivity at the tested MTU.
section: "4.3"
topics:
    - routing
