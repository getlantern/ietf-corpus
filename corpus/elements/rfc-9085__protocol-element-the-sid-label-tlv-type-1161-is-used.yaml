document: rfc-9085
kind: protocol-element
summary: The SID/Label TLV (Type 1161) is used as a sub-TLV by SR Capabilities and SR Local Block TLVs. Its length is either 3 octets (20-bit label, 4 leftmost bits set to 0) or 4 octets (32-bit SID index), making the total TLV size 7 or 8 octets respectively.
