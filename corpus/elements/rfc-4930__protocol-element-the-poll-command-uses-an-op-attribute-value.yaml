document: rfc-4930
kind: protocol-element
summary: 'The <poll> command uses an ''op'' attribute: value ''req'' retrieves the first message from the server queue (REQUIRED), and value ''ack'' with a ''msgID'' attribute (copied from the returned message ''id'') acknowledges receipt and dequeues the message.'
section: 2.9.2.3
