kind: protocol-element
summary: 'Five new service-type identities extend ''vpn-common:service-type'' from RFC 9181: ''virtual-network'' (ACTN logical network per RFC 8453), ''enhanced-vpn'' (VPN+), ''network-slice'' (IETF network slice), ''sdwan'' (PE-based SD-WAN), and ''basic-connectivity'' (plain IP connectivity over MPLS infrastructure).'
