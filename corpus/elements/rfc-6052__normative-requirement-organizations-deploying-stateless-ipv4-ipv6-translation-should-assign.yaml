document: rfc-6052
kind: normative-requirement
summary: Organizations deploying stateless IPv4/IPv6 translation SHOULD assign a Network-Specific Prefix to their service. IPv4-translatable and IPv4-converted IPv6 addresses MUST be constructed as specified in Section 2.2, and SHOULD use the same prefix to enable optimal intra-domain routing without translator involvement.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - nat
