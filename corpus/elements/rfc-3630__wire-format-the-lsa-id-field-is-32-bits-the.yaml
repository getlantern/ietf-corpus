document: rfc-3630
kind: wire-format
summary: 'The LSA ID field is 32 bits: the high 8 bits are the Opaque type (value 1 for TE LSA), and the low 24 bits are an Instance field. Up to 16,777,216 TE LSAs may be sourced by a single router. The LSA ID has no topological significance.'
section: "2.2"
