kind: design-rationale
summary: QoS mechanisms are modeled separately from the policy model because QoS services represent device-inherent capabilities that are controlled by policy, not defined by it. The QDDIM class hierarchies derive from the DMTF CIM network QoS submodel rather than PCIM, keeping device-mechanism modeling distinct from policy-condition/action modeling.
