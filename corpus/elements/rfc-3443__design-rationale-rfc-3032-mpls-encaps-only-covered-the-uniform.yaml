document: rfc-3443
kind: design-rationale
summary: RFC 3032 (MPLS-ENCAPS) only covered the Uniform Model and did not address the Pipe Model, Short Pipe Model, hierarchical LSPs, or TTL processing with Penultimate Hop Popping (PHP). This document fills those gaps.
