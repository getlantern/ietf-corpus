document: rfc-9625
kind: normative-requirement
summary: To support OISM procedures, an EVPN PE MUST also support RFC 9135 (IRB) and RFC 9251 (intra-subnet selective multicast). Certain procedures in RFC 9251 are modified when OISM is supported.
section: 1.2.3
rfc2119_level: MUST
