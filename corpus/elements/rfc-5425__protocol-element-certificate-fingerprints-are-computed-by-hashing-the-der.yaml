document: rfc-5425
kind: protocol-element
summary: Certificate fingerprints are computed by hashing the DER-encoded certificate with a cryptographically strong algorithm and encoding the result as colon-separated uppercase hexadecimal bytes prepended with the hash algorithm label (e.g., 'sha-1:E1:2D:...'). Implementations MUST support SHA-1 fingerprints.
section: 4.2.2
topics:
    - tls
    - syslog
    - pkix
    - crypto
