document: rfc-3961
kind: protocol-element
summary: 'The simplified profile for CBC ciphers with key derivation requires: unkeyed hash algorithm H suitable for HMAC, HMAC output size h (at least 80 bits and at least half of H''s output size), message block size m (multiple of 8 bits), basic encryption/decryption functions E and D, and cipher block size c (at least 5 octets).'
section: "5.2"
topics:
    - crypto
