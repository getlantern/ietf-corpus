document: rfc-6401
kind: security-consideration
summary: 'The integrity of ADMISSION_PRI and APP_RESOURCE_PRI policy elements can be protected by two mechanisms: (1) RSVP authentication (RFC 2747/RFC 3097) using the INTEGRITY object in RSVP messages for a chain of trust among policy-capable neighbors, or (2) the INTEGRITY object within the POLICY_DATA object for end-to-end integrity between non-neighboring RSVP PEPs across PINs.'
section: "6"
topics:
    - security
    - qos
    - routing
    - crypto
