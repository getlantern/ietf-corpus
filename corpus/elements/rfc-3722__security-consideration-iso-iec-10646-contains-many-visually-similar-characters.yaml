document: rfc-3722
kind: security-consideration
summary: ISO/IEC 10646 contains many visually similar characters, and this profile does not map similar-looking characters together. Users performing visual matching of iSCSI names (e.g., trusted third-party names) may be deceived by homoglyph substitution.
section: "9"
topics:
    - security
