document: rfc-9561
kind: design-rationale
summary: NGUID is preferred over EUI64 for NVMe namespace identification because it is the larger (16-octet vs 8-octet) identifier, providing a larger namespace for unique identifiers and reducing collision risk. The XDR length field implicitly encodes which identifier type is present.
section: "2.1"
