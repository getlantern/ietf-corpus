summary: The CHAP-Password attribute (Type 3, Length 19) contains a 1-octet CHAP Identifier followed by a 16-octet CHAP Response string. The CHAP challenge is taken from the CHAP-Challenge attribute (Type 60) if present, otherwise from the Request Authenticator field.
