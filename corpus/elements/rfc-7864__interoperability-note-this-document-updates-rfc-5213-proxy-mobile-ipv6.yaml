summary: This document updates RFC 5213 (Proxy Mobile IPv6) by extending Section 5.4.1 BCE processing rules to handle the new HI value 6, and requires implementation of RFC 7077 UPN/UPA messages for FMI/FMA; no other aspects of RFC 7077 are required.
