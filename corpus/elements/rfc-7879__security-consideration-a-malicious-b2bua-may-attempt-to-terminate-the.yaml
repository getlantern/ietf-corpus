document: rfc-7879
kind: security-consideration
summary: A malicious B2BUA may attempt to terminate the DTLS connection to decrypt RTP payloads. This attack can be detected and prevented by using the identity validation mechanisms in RFC 4474 or SIP-ID, either by the endpoints themselves or by authentication service proxies in the call path.
section: "7"
topics:
