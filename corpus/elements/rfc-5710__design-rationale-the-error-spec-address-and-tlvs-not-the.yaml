document: rfc-5710
kind: design-rationale
summary: The ERROR_SPEC address and TLVs—not the error code or value—identify the resource to be avoided. This design reuses the existing ERROR_SPEC structure from RFC 4920 to carry reroute targeting information without requiring new object types.
section: "2.1"
topics:
    - mpls
    - routing
