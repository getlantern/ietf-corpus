document: rfc-9733
kind: interoperability-note
summary: New enrollment protocol URI components require both an RFC specifying the protocol and a registration in the 'Well-Known URIs' registry, exactly as EST was registered in RFC 7030. URI values for CMC, SCEP, and other protocols are outside the scope of RFC 9733.
section: "4.3"
topics:
