summary: The security considerations of AVPF (RFC 4585, as updated by RFC 5506) and Codec Control Messages (RFC 5104) apply to this document in their entirety. The clarified FIR response behavior for layered codecs does not introduce any additional security considerations beyond those already documented in those RFCs.
