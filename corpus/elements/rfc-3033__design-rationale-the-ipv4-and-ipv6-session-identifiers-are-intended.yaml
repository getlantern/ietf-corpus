document: rfc-3033
kind: design-rationale
summary: 'The IPv4 and IPv6 session identifiers are intended only for explicit reservation (5-tuple: src/dst address, protocol, src/dst port). Wild card associations are explicitly deferred: if needed in the future, a different Identifier type value will be used rather than extending the current Session type.'
section: 4.1.2
topics:
    - ip
