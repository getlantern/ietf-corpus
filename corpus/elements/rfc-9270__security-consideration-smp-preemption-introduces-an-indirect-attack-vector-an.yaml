document: rfc-9270
kind: security-consideration
summary: 'SMP preemption introduces an indirect attack vector: an attacker can disrupt traffic on one protecting LSP by targeting a link used by a higher-priority primary LSP elsewhere in the network, causing preemption of the protecting LSP. Detailed knowledge of network topology, routes, and LSP priorities can significantly improve attack efficacy.'
section: "8"
topics:
    - security
    - mpls
    - routing
