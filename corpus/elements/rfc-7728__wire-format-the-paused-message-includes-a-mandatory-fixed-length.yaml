document: rfc-7728
kind: wire-format
summary: The PAUSED message includes a mandatory fixed-length 32-bit Type Specific parameter at the start of the Type Specific field carrying the extended RTP sequence number of the last RTP packet sent before the stream was paused, in the same format as the extended highest sequence number received defined in RFC 3550 Section 6.4.1.
section: "8.2"
topics:
