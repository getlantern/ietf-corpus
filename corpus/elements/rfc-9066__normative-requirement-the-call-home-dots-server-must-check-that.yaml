document: rfc-9066
kind: normative-requirement
summary: The Call Home DOTS server MUST check that the 'source-prefix' in a mitigation request is within the scope of the Call Home DOTS server domain. By default, the Call Home DOTS server considers any routable IP prefix in 'target-prefix' to be within the scope of the Call Home DOTS client.
section: 5.3.1
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
