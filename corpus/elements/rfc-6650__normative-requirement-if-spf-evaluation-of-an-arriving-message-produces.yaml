document: rfc-6650
kind: normative-requirement
summary: If SPF evaluation of an arriving message produces a 'Fail', 'SoftFail', 'TempError', or 'PermError' result, a report SHOULD NOT be generated to the RFC5321.MailFrom domain, as no reliable assertion can be made that use of the domain was authorized.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
