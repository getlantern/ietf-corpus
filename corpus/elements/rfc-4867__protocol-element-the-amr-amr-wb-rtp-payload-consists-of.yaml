document: rfc-4867
kind: protocol-element
summary: 'The AMR/AMR-WB RTP payload consists of three parts in order: a payload header (CMR field), a payload table of contents (list of per-frame ToC entries), and speech data. Payloads carrying more than one speech frame-block are called compound payloads.'
