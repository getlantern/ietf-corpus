document: rfc-4211
kind: wire-format
summary: EncKeyWithID encodes a PrivateKeyInfo plus an optional identifier (UTF8String or GeneralName). The identifier MUST be present when the purpose is to prove possession of the private key, and SHOULD be present when archiving a key for an escrow agent that will decrypt it.
section: 4.2.1
topics:
