document: rfc-8139
kind: design-rationale
summary: The requirement to support E-L1CS FS-LSPs for forwarder appointment frees the mechanism from Hello PDU size constraints. Using only Hello-based appointments, roughly 83 RBridges can be appointed per link (assuming 1,000 bytes available and 12 bytes per RBridge appointment); E-L1CS FS-LSPs increase capacity by several orders of magnitude.
section: 2.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
