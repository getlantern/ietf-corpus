document: rfc-9253
kind: design-rationale
summary: CONCEPT is introduced instead of extending CATEGORIES because CATEGORIES is used as informal free-form tagging with no guaranteed meaning to consumers, making formal inter-component relationships unreliable. CONCEPT uses URI values referencing well-defined external category resources, enabling hierarchical and namespaced categorization.
section: "1.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
