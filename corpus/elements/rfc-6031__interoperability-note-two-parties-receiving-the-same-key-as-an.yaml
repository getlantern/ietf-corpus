document: rfc-6031
kind: interoperability-note
summary: Two parties receiving the same key as an sKey OCTET STRING must interpret and load the key bytes in exactly the same way to interoperate; Sections 4.1 and 4.2 establish the normative byte-order correspondence between sKey and the AES and Triple-DES algorithm specifications.
