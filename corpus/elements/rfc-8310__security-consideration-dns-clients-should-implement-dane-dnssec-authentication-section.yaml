document: rfc-8310
kind: security-consideration
summary: DNS clients SHOULD implement DANE/DNSSEC authentication (Section 8.2) and offer a configuration option that limits authentication to those mechanisms with no fallback to pure PKIX-based authentication, to avoid sole reliance on the PKIX infrastructure.
section: "11"
topics:
