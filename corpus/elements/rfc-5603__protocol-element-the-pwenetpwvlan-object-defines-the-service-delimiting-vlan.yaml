document: rfc-5603
kind: protocol-element
summary: The pwEnetPwVlan object defines the service-delimiting VLAN field value on the PW side. The reserved value 4095 indicates port-mode (no VLAN applicable); value 0 indicates untagged frames when pwEnetVlanMode is noChange and pwEnetPortVlan is 0.
