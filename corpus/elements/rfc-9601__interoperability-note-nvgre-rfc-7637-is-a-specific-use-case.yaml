document: rfc-9601
kind: interoperability-note
summary: NVGRE (RFC 7637) is a specific use case of GRE that re-purposes the GRE key field as a Virtual Subnet ID. Because it is not under IETF change control but is documented as Informational, the GRE update text in Section 6.1.2 is also intended to apply to NVGRE implementations.
