document: rfc-9010
kind: wire-format
summary: The 6LoWPAN Capability Indication Option (6CIO) carries flags including L (node is a 6LR), E (supports EARO-based registration), P (Routing Registrar providing reachability services), D, B, and G, all in a 32-bit option. A 6LR serving RULs must set L, P, and E to 1.
section: 4.3.1
