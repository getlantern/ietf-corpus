document: rfc-9013
kind: wire-format
summary: The Tunnel Sub-TLV contains a 2-octet Tunnel Type field, a 2-octet Length field (unsigned 16-bit integer indicating the total octets of Tunnel Parameter Sub-TLVs), and a variable-length Tunnel Parameter Sub-TLVs field. Tunnel types are shared with the BGP Tunnel Encapsulation Attribute registry.
