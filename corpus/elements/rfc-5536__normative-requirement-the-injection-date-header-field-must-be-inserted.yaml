document: rfc-5536
kind: normative-requirement
summary: The Injection-Date header field MUST be inserted whenever an article is injected, but agents MUST accept articles without it (pre-standard software does not use it). Agents MUST NOT alter a pre-existing Date header field when adding Injection-Date.
section: 3.2.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
