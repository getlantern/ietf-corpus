document: rfc-4945
kind: wire-format
summary: 'Configuration data exchange uses PEM (Base64) encoding with specific delimiters: certificates use ''-----BEGIN/END CERTIFICATE-----'', CRLs use ''-----BEGIN/END CRL-----'', raw public keys (SubjectPublicKeyInfo only) use ''-----BEGIN/END PUBLIC KEY-----'', and PKCS#10 CSRs use ''-----BEGIN/END CERTIFICATE REQUEST-----''. Lines SHOULD be less than 76 characters; LF, CR, and CRLF line endings MUST all be accepted.'
