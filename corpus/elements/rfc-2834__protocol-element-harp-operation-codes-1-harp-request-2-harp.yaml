document: rfc-2834
kind: protocol-element
summary: 'HARP operation codes: 1 = HARP_REQUEST, 2 = HARP_REPLY, 8 = InHARP_REQUEST, 9 = InHARP_REPLY, 10 = HARP_NAK. HARP messages SHALL be transmitted with hardware type 28 (HIPARP) but SHALL be accepted with hardware type codes 28, 1, or 6.'
