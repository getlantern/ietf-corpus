document: rfc-6352
kind: design-rationale
summary: WebDAV was chosen as the CardDAV foundation because it significantly reduces design, implementation, interoperability testing, and deployment costs. Many limited clients (mobile devices) already have HTTP stacks, making WebDAV easier to implement than LDAP or ACAP.
section: "1"
