document: rfc-5304
kind: security-consideration
summary: Security quality depends entirely on the strength of the authentication algorithms, the strength of the key, correct implementation, and keeping the IS-IS Authentication Key confidential by all parties. If any of these are incorrect or insufficiently secure, no real security is provided.
section: "3.2"
topics:
