document: rfc-7286
kind: security-consideration
summary: An attacker could render ALTO server discovery unavailable via DoS against DHCP, DNS, or the ALTO server itself. Applications must be prepared to operate without ALTO guidance; operators should apply DoS protection best practices to all three infrastructure components.
section: "6.2"
topics:
