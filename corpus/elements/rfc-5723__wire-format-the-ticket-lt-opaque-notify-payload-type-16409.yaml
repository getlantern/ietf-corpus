summary: The TICKET_LT_OPAQUE Notify payload (type 16409) carries a 4-octet unsigned integer Lifetime field (seconds until expiry, network byte order) followed by a variable-length opaque Ticket field. Protocol ID and SPI Size MUST both be 0.
