document: rfc-1288
kind: security-consideration
summary: Allowing an RUIP to execute user programs in response to Finger queries is potentially dangerous. The RUIP MUST NOT allow system security to be compromised by such programs. Operating system bugs can be exploited via this mechanism.
section: 3.2.5
topics:
    - security
