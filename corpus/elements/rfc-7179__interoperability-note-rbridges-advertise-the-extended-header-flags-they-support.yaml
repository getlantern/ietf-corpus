document: rfc-7179
kind: interoperability-note
summary: RBridges advertise the extended header flags they support in IS-IS PDUs [RFC7176]. An RBridge that has not advertised support for a critical extended header flag will not normally receive frames with that flag set, providing a 'no critical surprises' guarantee. An RBridge is not required to support any extensions.
section: "2.2"
topics:
    - routing
