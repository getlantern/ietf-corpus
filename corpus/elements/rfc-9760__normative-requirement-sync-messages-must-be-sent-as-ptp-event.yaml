document: rfc-9760
kind: normative-requirement
summary: Sync messages MUST be sent as PTP event multicast messages (UDP port 319) to the PTP primary IP address. Two-step clocks MUST send Follow-up messages as PTP general multicast messages (UDP port 320). Announce messages MUST be sent as PTP general multicast messages (UDP port 320) to the PTP primary address.
section: "6"
rfc2119_level: MUST
topics:
    - udp
    - ip
    - multicast
