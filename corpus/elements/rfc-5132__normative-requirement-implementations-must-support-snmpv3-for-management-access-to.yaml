document: rfc-5132
kind: normative-requirement
summary: Implementations MUST support SNMPv3 for management access to this MIB. SNMP versions prior to SNMPv3 are not recommended due to lack of adequate security (authentication and privacy), as specified in the compliance statements.
section: "7.1"
rfc2119_level: MUST
topics:
