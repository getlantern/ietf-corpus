document: rfc-4008
kind: normative-requirement
summary: A natInterfaceTable row cannot be made active until the corresponding natInterfaceServiceType instance has been set; until then the row status MUST remain 'notReady'. None of the objects in the row may be modified while the row status is active(1).
section: "5"
rfc2119_level: MUST
topics:
