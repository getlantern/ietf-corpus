document: rfc-5213
kind: design-rationale
summary: Mobile IPv6 sequence numbers are insufficient for PMIPv6 because a newly serving MAG cannot determine the last sequence number used by the previous MAG in the absence of context transfer. PMIPv6 therefore supports a Timestamp-based alternative for message ordering when sequence numbers cannot be maintained across handoffs.
section: "5.5"
topics:
    - mobility
