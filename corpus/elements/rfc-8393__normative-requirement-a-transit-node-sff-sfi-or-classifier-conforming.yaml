document: rfc-8393
kind: normative-requirement
summary: A transit node (SFF, SFI, or classifier) conforming to this specification that receives a packet with 'Next Protocol' set to 'None' MUST NOT attempt to parse or process beyond the end of the NSH, but SHOULD process the NSH and metadata as normal.
section: "4"
rfc2119_level: MUST NOT
