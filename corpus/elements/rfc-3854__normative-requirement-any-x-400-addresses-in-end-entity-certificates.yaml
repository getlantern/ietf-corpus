document: rfc-3854
kind: normative-requirement
summary: Any X.400 addresses in end-entity certificates MUST be encoded using the x400Address CHOICE of the GeneralName type in the subjectAltName extension. Receiving agents MUST recognize X.400 addresses in the subjectAltName field.
section: "4.3"
rfc2119_level: MUST
topics:
