document: rfc-8620
kind: protocol-element
summary: PushSubscription allows clients to register webhook URLs for server-initiated push notifications. Properties include url, expires, types filter, and optional encryption keys (for Web Push). The server verifies ownership by POSTing a verification object to the client URL before delivering notifications.
section: "7.2"
topics:
