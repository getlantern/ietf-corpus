document: rfc-3853
kind: design-rationale
summary: SIP already has a normative SHOULD for TLS, and TLS in SIP requires AES and RSA. Requiring both 3DES/DSS for S/MIME and AES/RSA for TLS created duplicated implementation effort; unifying the algorithm requirements for TLS and S/MIME simplifies security implementations.
section: "1"
topics:
    - sip
    - tls
    - crypto
    - security
