document: rfc-1652
kind: protocol-element
summary: The SMTP service extension is named '8bit-MIMEtransport'; the EHLO keyword value is '8BITMIME'. No parameter is used with the 8BITMIME EHLO keyword. A server advertising this keyword indicates it will accept MIME messages containing arbitrary octet-aligned material.
section: "2"
topics:
