document: rfc-9622
kind: normative-requirement
summary: Connections that use Transport Services SHOULD use security in general. For compatibility with endpoints lacking transport security, applications can initialize SecurityParameters to indicate disabled or opportunistic security. Opportunistic security allows connections without security but still attempts unauthenticated security if available.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
