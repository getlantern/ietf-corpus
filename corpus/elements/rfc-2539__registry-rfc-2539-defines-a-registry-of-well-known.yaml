document: rfc-2539
kind: registry
summary: RFC 2539 defines a registry of well-known Diffie-Hellman prime/generator pairs indexed by a 16-bit value. Pairs 0x0000–0x07FF require IETF standards action; 0x0800–0xBFFF require RFC documentation; 0xC000–0xFFFF are available for private use and not centrally coordinated.
