document: rfc-9722
kind: protocol-element
summary: The Service Carving Time (SCT) is an absolute time advertised by a newly inserted or recovering PE along with its Ethernet Segment Route Type 4 (RT-4), representing the common future time at which all peering PEs in the multihoming group will simultaneously perform DF election.
