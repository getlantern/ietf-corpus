document: rfc-5858
kind: protocol-element
summary: Each SAD entry for a ROHC-enabled SA must contain a 'ROHC Data Item' storing the ROHC channel parameters (MAX_CID, PROFILES, MRRU), plus the integrity algorithm, its key, and the ICV length used by the ROHC process. Inbound SAs must also include a FEEDBACK_FOR parameter referencing the outbound SA.
section: "3.2"
topics:
    - ipsec
    - vpn
