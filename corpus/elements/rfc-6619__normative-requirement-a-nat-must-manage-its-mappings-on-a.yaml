document: rfc-6619
kind: normative-requirement
summary: A NAT MUST manage its mappings on a per-interface basis, associating each NAT session not only with the five tuples for the transport connection on both sides, but also with the internal interface on which the user device is connected to the NAT.
section: "4"
rfc2119_level: MUST
topics:
