document: rfc-9113
kind: wire-format
summary: The GOAWAY frame (type=0x07) contains a Reserved (1-bit), Last-Stream-ID (31-bit unsigned), Error Code (32-bit), and optional Additional Debug Data. It MUST use stream identifier 0x00. The Last-Stream-ID indicates the highest stream that may have been processed by the sender.
section: "6.8"
topics:
