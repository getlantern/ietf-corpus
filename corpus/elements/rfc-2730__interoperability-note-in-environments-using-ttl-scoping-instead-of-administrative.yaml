document: rfc-2730
kind: interoperability-note
summary: In environments using TTL scoping instead of administrative scoping, a client MUST NOT set the TTL of packets sent to an allocated address to a value greater than the maximum TTL indicated in the scope list. Administrative scope boundary routers are not present in such environments to prevent leakage.
section: "2.8"
topics:
    - multicast
    - ip
