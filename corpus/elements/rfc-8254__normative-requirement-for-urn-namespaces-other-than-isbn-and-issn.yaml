document: rfc-8254
kind: normative-requirement
summary: For URN namespaces other than ISBN and ISSN, reregistration with new RFC 8141-compliant templates is recommended but not required. Until updated, existing registration templates should be read as not requiring or allowing any features not permitted by the earlier URN (RFC 2141) and registration (RFC 3406) specifications.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - registry
