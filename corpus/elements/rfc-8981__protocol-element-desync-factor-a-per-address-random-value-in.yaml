document: rfc-8981
kind: protocol-element
summary: 'DESYNC_FACTOR: a per-address random value in the range [0, MAX_DESYNC_FACTOR] computed at address creation. Ensures statistically different preferred lifetimes across addresses and prevents synchronized regeneration across hosts. MAX_DESYNC_FACTOR = 0.4 * TEMP_PREFERRED_LIFETIME.'
section: "3.8"
topics:
    - ip
    - privacy
