document: rfc-4731
kind: design-rationale
summary: If the list of result options is empty, this requests an ESEARCH response instead of a SEARCH response, and is equivalent to specifying '(ALL)'. This allows clients to obtain sequence-set formatted results without explicitly requesting ALL.
section: "3.1"
