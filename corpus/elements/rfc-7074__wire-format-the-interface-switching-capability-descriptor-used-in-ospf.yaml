document: rfc-7074
kind: wire-format
summary: The Interface Switching Capability Descriptor used in OSPF and IS-IS contains an 8-bit Switching Cap field, an 8-bit Encoding field, 16 reserved bits, followed by a variable-length Switching Capability-specific information field whose format depends on the Switching Cap value.
