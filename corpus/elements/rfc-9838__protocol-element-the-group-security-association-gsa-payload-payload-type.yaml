document: rfc-9838
kind: protocol-element
summary: 'The Group Security Association (GSA) payload (Payload Type 51) carries group policy from the GCKS to GMs. It contains zero or one GSA KEK policy (Rekey SA), zero or more GSA TEK policies (Data-Security SAs), and zero or one Group-Wide (GW) policy. At least one TEK or KEK policy MUST be present. The substructure type is determined by the first octet: zero for GW policy, non-zero (security protocol ID) for SA policies.'
section: "4.4"
topics:
    - ipsec
    - security
    - crypto
