document: rfc-2907
kind: normative-requirement
summary: When a MADCAP server receives a Not Inside Message (NIM) from a Zone Border Router indicating scope X does not nest in scope Y, it MUST update its internal X/Y state to 'false' and MUST restart the NEST_NO_DECISION_TIMER for that X/Y state entry.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
