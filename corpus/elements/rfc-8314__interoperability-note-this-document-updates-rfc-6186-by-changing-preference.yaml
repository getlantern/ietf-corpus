document: rfc-8314
kind: interoperability-note
summary: This document updates RFC 6186 by changing preference rules and adding the new SRV service label _submissions._tcp for Message Submission with Implicit TLS. MUAs using RFC 6186 for account setup SHOULD ignore advertised services not satisfying minimum confidentiality requirements unless the user has explicitly requested reduced confidentiality.
section: "5.1"
topics:
