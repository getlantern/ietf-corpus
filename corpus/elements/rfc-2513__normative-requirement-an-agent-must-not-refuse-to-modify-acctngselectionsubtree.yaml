document: rfc-2513
kind: normative-requirement
summary: An agent must not refuse to modify acctngSelectionSubtree, acctngSelectionList, or acctngSelectionFile even while the row is 'active', and must not refuse to destroy a row whose referenced file is active. Such changes only take effect at the next file swap.
section: "4"
rfc2119_level: MUST NOT
