document: rfc-3986
kind: protocol-element
summary: 'The authority component has the form: authority = [ userinfo "@" ] host [ ":" port ]. It is introduced by "//" and terminated by the next "/", "?", "#", or end of URI. When present, the path must be empty or begin with "/".'
section: "3.2"
