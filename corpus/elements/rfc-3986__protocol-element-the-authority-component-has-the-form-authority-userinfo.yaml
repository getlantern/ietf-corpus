document: rfc-3986
kind: protocol-element
summary: 'The authority component has the form: authority = [ userinfo "@" ] host [ ":" port ]. It is preceded by "//" and terminated by the next "/", "?", "#", or end of URI. URI producers and normalizers should omit the ":" delimiter separating host from port if the port component is empty.'
section: "3.2"
topics:
    - http
    - dns
