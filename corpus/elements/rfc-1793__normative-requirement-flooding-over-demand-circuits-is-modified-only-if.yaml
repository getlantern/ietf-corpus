document: rfc-1793
kind: normative-requirement
summary: 'Flooding over demand circuits is modified only if all LSAs in the area''s link state database have the DC-bit set. When modified: (1) only truly changed LSAs are flooded (periodic refreshes with unchanged content are suppressed), and (2) DoNotAge MUST be set in LSA copies flooded out demand interfaces (except when LS age equals MaxAge).'
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
