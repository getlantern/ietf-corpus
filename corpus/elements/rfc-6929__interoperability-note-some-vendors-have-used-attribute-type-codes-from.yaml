document: rfc-6929
kind: interoperability-note
summary: Some vendors have used Attribute Type codes from the Reserved space (241–246) in proprietary dictionaries, conflicting with the Extended Attributes defined here. Implementations SHOULD support a per-client flag to distinguish 'Non-Standard Attributes' from 'IETF Attributes', defaulting to the IETF interpretation.
section: "5.1"
