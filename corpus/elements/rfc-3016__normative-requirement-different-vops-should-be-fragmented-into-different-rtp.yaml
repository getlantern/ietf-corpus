document: rfc-3016
kind: normative-requirement
summary: Different VOPs SHOULD be fragmented into different RTP packets so that each RTP packet corresponds to a unique VOP time instance, except that multiple consecutive small VOPs MAY be carried within one RTP packet.
section: "3.2"
rfc2119_level: SHOULD
