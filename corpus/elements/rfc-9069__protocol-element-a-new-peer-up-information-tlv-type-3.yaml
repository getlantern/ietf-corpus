document: rfc-9069
kind: protocol-element
summary: A new Peer Up Information TLV Type 3 (VRF/Table Name) is defined. The Information field contains a UTF-8 string equal to the VRF or table name (1 to 255 bytes). If a name is configured, it MUST be included; the default value 'global' MUST be used for the default Loc-RIB instance with a zero-filled distinguisher.
section: 5.2.1
topics:
    - bgp
    - routing
    - registry
