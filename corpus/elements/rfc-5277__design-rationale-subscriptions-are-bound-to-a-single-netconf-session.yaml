document: rfc-5277
kind: design-rationale
summary: Subscriptions are bound to a single NETCONF session and are non-persistent state; their lifetime is defined by session lifetime or the <stopTime> parameter. This design ensures that notification content fully describes an event without requiring protocol context, enabling independent analysis.
section: "1.2"
topics:
    - netconf
