document: rfc-9278
kind: interoperability-note
summary: The security considerations of RFC 7638 (JWK Thumbprint) apply when using JWK Thumbprint URIs. Implementations must be aware that the hash algorithm identifier in the URI must match a registered IANA Named Information hash name string for the URI to be considered valid.
