document: rfc-3673
kind: design-rationale
summary: The mechanism uses a single ASCII "+" character so that existing LDAP clients (including web browsers with LDAP URL support) can request all operational attributes without protocol or API changes. Compatibility with deployed clients was a primary design constraint.
