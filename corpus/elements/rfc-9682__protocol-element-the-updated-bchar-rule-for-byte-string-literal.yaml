document: rfc-9682
kind: protocol-element
summary: The updated BCHAR rule (for byte string literal content) adds explicit inclusion of \' (since the tightened SESC no longer allows it implicitly) and excludes U+007F–U+009F and surrogates, matching SCHAR's exclusions. BCHAR = %x20-26 / %x28-5B / %x5D-7E / NONASCII / SESC / "\'"/CRLF.
section: 2.1.2
topics:
    - cbor
