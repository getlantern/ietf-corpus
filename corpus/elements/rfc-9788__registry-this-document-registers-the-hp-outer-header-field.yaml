document: rfc-9788
kind: registry
summary: This document registers the HP-Outer Header Field in the 'Provisional Message Header Field Names' registry (per RFC 3864). The field is used only in the Inner Header Section of encrypted messages with Header Protection and MUST be ignored elsewhere.
