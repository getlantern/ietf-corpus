document: rfc-9289
kind: normative-requirement
summary: An RPC server MUST listen on the same ports for (D)TLS-protected RPC programs as the ports used when (D)TLS is not available. No separate TLS-specific port is introduced.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - security
