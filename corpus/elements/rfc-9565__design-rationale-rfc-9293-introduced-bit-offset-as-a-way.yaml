document: rfc-9565
kind: design-rationale
summary: RFC 9293 introduced 'Bit Offset' as a way to reference each TCP header flag's position within the 16-bit aligned view of the TCP header. This document adopts that bit-offset notation throughout the IE description to align with the authoritative TCP Header Flags registry and remove ambiguity from named-flag references.
section: "1"
topics:
    - tcp
