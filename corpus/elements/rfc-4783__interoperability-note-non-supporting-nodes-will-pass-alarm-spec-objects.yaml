document: rfc-4783
kind: interoperability-note
summary: Non-supporting nodes will pass ALARM_SPEC objects through unmodified per RFC 2205 rules because the C-Num value 198 is in the 11bbbbbb range, which mandates forwarding without processing. This ensures backward compatibility in mixed networks.
