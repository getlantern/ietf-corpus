document: rfc-5545
kind: interoperability-note
summary: The RANGE parameter value 'THISANDPRIOR' is deprecated by RFC 5545 and MUST NOT be generated by applications. Only 'THISANDFUTURE' is a valid RANGE parameter value. This is a breaking change from RFC 2445.
section: 3.2.13
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
