document: rfc-9728
kind: security-consideration
summary: Without audience-restricted access tokens, a malicious resource server could use the WWW-Authenticate header to cause a client to obtain a scoped token then replay it at a legitimate resource server. Use of RFC 8707 Resource Indicators is RECOMMENDED when using dynamically configured clients.
section: "7.4"
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
