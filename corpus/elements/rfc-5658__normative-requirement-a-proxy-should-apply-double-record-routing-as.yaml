document: rfc-5658
kind: normative-requirement
summary: A proxy SHOULD apply double Record-Routing as soon as it changes the transport protocol between its incoming and outgoing sides, and SHOULD also insert a Record-Route header for any multi-homed situation (scheme changes, SIGCOMP, IPv4/IPv6 changes, transport changes) that may impact processing of proxies on the path of subsequent requests.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
