document: rfc-9183
kind: protocol-element
summary: For multi-destination packets, only one border RBridge per area acts as the Designated Border RBridge (DBRB) to perform the level transition; by default, the border RBridge with the smallest nickname (treated as an unsigned integer) is elected DBRB.
section: "3.2"
topics:
    - routing
    - multicast
