document: rfc-7516
kind: protocol-element
summary: The 'enc' (Encryption Algorithm) Header Parameter identifies the AEAD content encryption algorithm used to produce the ciphertext and Authentication Tag from the plaintext. It MUST be an AEAD algorithm with a specified key length; this parameter MUST be present and MUST be understood and processed by implementations.
section: 4.1.2
topics:
