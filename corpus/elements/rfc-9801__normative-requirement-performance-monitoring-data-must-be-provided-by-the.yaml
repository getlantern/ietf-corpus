document: rfc-9801
kind: normative-requirement
summary: Performance monitoring data MUST be provided by the management interface; faults MUST be timestamped when declared and cleared. Fault and performance data SHOULD also be provided by a YANG data model (model specification is out of scope).
section: "7.3"
rfc2119_level: MUST
topics:
    - yang
