document: rfc-8842
kind: normative-requirement
summary: 'When a SIP ''offerless INVITE'' results in the receiver generating an offer: if a DTLS association already exists, the offer MUST include the previously assigned ''tls-id'' and ''fingerprint'' values; if not, the offer is generated as a new offer. In either case, if ICE is used, ICE restart MUST be initiated per RFC 8839.'
section: "8"
rfc2119_level: MUST
topics:
    - realtime
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
