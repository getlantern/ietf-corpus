document: rfc-5055
kind: normative-requirement
summary: The validationTime provided by the client MUST be a retrospective time; the server MUST perform validation using its current time if validationTime is absent. GeneralizedTime values MUST be expressed in UTC as YYYYMMDDHHMMSSZ and MUST NOT include fractional seconds.
section: 3.2.7
rfc2119_level: MUST
topics:
    - pkix
