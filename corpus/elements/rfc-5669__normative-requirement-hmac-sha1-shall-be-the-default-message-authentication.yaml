document: rfc-5669
kind: normative-requirement
summary: HMAC-SHA1 SHALL be the default message-authentication code used with SEED-CTR. The default session-authentication key length SHALL be 160 bits, the default authentication tag length SHALL be 80 bits, and SRTP_PREFIX_LENGTH SHALL be zero.
section: 2.1.1
rfc2119_level: SHALL
topics:
