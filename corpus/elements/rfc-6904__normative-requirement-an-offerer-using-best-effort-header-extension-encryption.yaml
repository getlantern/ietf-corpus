document: rfc-6904
kind: normative-requirement
summary: An offerer using best-effort header extension encryption MUST offer best-effort negotiation only when lack of confidentiality would be acceptable in the backward-compatible case, and users of best-effort encryption MUST be cautious of bid-down attacks.
section: "4.1"
rfc2119_level: MUST
topics:
