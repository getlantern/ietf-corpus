document: rfc-9112
kind: wire-format
summary: The status-line = HTTP-version SP status-code SP [ reason-phrase ], where status-code is a 3-digit integer (3DIGIT) and reason-phrase = 1*( HTAB / SP / VCHAR / obs-text). The space between status-code and reason-phrase MUST be sent even when the reason-phrase is absent.
section: "4"
topics:
    - http
