document: rfc-8663
kind: protocol-element
summary: Local policy MAY dictate use of MPLS-over-UDP even when the next hop toward the next segment is MPLS-capable; in that case the router replaces the top label with an MPLS-over-UDP tunnel rather than forwarding as native SR-MPLS.
section: 3.2.3
topics:
    - mpls
    - udp
