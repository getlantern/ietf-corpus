document: rfc-7356
kind: interoperability-note
summary: Domain scope (DFS/E-DFS) is not yet applicable to Layer 2 IS-IS deployments because current Layer 2 standards (e.g., RFC 6325) support only a single area. Domain scope for Layer 2 will be fully definable when multi-area Layer 2 support is standardized.
section: "10"
topics:
