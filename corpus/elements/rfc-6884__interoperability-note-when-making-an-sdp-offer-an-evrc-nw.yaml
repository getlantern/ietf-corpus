document: rfc-6884
kind: interoperability-note
summary: When making an SDP offer, an EVRC-NW offerer SHOULD also announce EVRC-B and EVRC-WB support in its 'm=audio' lines with EVRC-NW as the preferred codec. This enables fallback interoperability with endpoints that support only EVRC-B and/or EVRC-WB.
section: "13"
topics:
