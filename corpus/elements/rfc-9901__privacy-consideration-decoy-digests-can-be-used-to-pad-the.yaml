document: rfc-9901
kind: privacy-consideration
summary: Decoy digests can be used to pad the number of digests in an SD-JWT, obscuring the actual number of claims. Issuers should weigh this benefit against the additional payload size; consistently padded arrays prevent Verifiers from inferring the total element count.
section: "10.4"
topics:
    - jose
    - privacy
