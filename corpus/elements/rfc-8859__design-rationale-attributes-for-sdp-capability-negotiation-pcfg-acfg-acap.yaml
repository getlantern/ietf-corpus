document: rfc-8859
kind: design-rationale
summary: 'Attributes for SDP Capability Negotiation (pcfg, acfg, acap, tcap from RFC 5939) use the SPECIAL or INHERIT category because they encapsulate other attributes whose multiplexing categories vary. Section 14 provides detailed procedures: configurations must be coherent under multiplexing, and payload type numbers and latent configurations require special handling to avoid conflicts when bundling.'
section: "14"
