document: rfc-5762
kind: interoperability-note
summary: There can be overlap between RTCP Loss RLE Report Blocks (RFC 3611) and the DCCP Ack Vector option. Using both simultaneously wastes capacity but is not otherwise harmful; applications should choose one mechanism.
section: "4.2"
topics:
    - rtp
    - congestion
