document: rfc-6228
kind: interoperability-note
summary: A 199 response does not replace a final response; RFC 3261 rules governing when a final response is sent remain unchanged. A proxy MUST continue to forward requests according to RFC 3261 even if it has knowledge that the early dialog has been terminated.
