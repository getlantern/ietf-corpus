document: rfc-8915
kind: protocol-element
summary: The NTS-KE protocol is conducted over TCP port 4460 using TLS with ALPN 'ntske/1'. After a successful handshake, the client sends one request and the server sends one response, then both parties send TLS close_notify. The server discards all state after the exchange.
