document: rfc-7188
kind: normative-requirement
summary: The MPR and NBR_ADDR_TYPE TLV Value fields are converted to bit fields and MUST be interpreted as such; any test of Value = 1 or Value = 3 MUST be converted to a bitwise AND test (e.g., Value bitand 1 = 1).
section: 4.3.2
rfc2119_level: MUST
topics:
    - routing
