document: rfc-8689
kind: design-rationale
summary: 'The TLS-Required: No header field exists to allow senders to override recipient-side TLS policies (MTA-STS, DANE) in exceptional cases such as reporting a misconfigured or expired TLS certificate on the recipient''s mail server, where strict policy enforcement would block the diagnostic message.'
