kind: protocol-element
summary: Conceptual tables are defined using OBJECT-TYPE with SYNTAX 'SEQUENCE OF EntryType' for the table object and 'EntryType' for the row object; both have MAX-ACCESS 'not-accessible'. Each columnar object is accessed individually via instance identifiers formed from the INDEX or AUGMENTS clause of the row.
