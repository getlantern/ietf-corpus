document: rfc-7939
kind: interoperability-note
summary: 'The nhdpInterfaceTable ''sparse augments'' the IF-MIB ifTable: a row exists only when an interface supports and runs NHDP. Each nhdpInterfaceTable entry has a corresponding ifTable entry with matching index values. Deletion of the ifTable entry automatically removes the NHDP entry.'
section: "6.3"
topics:
    - routing
