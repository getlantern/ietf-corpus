document: rfc-9727
kind: normative-requirement
summary: The Publisher MUST publish the API catalog document in the Linkset format application/linkset+json (RFC 9264 Section 4.2). The Linkset SHOULD include a profile parameter with value 'https://www.rfc-editor.org/info/rfc9727' to indicate it represents an API catalog.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
