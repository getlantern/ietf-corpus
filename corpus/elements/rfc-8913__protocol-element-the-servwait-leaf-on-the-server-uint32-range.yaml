document: rfc-8913
kind: protocol-element
summary: The SERVWAIT leaf on the Server (uint32, range 1..604800 seconds, default 900) defines the TWAMP-Control TCP session timeout; the Server MAY discontinue a control connection if no packet has been received within this period, per Section 3.1 of RFC 5357.
