document: rfc-6630
kind: design-rationale
summary: ERP/AAK extends ERP to allow cryptographic keying material to be established on one or more Candidate Attachment Points (CAPs) prior to handover, reusing ERP packet formats with a new 'E' flag to differentiate early authentication from re-authentication. This avoids a full EAP exchange after handover by pre-positioning keys via the AAA infrastructure.
section: "1"
topics:
