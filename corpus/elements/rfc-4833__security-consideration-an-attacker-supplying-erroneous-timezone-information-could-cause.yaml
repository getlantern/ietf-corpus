document: rfc-4833
kind: security-consideration
summary: An attacker supplying erroneous timezone information could cause clients to miss scheduled events, trigger cron jobs at wrong times, or repeat/skip jobs during DST transitions. Client operating systems may do well to confirm timezone changes with a human in critical environments.
section: "9"
topics:
