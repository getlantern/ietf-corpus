document: rfc-7596
kind: protocol-element
summary: 'The lwAFTR binding table contains 3-tuple entries: the lwB4''s IPv6 address, the allocated public IPv4 address, and the restricted port set. This contrasts with DS-Lite''s 5-tuple NAPT table, as the lwAFTR requires only per-subscriber state.'
