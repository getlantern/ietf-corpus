document: rfc-2212
kind: normative-requirement
summary: Subnetwork network elements MUST adjust the token bucket rate and possibly bucket size to account for adding link-level headers. Tunnels MUST also account for additional IP headers they introduce.
section: Guidelines for Implementors
rfc2119_level: MUST
