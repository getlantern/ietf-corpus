document: rfc-3156
kind: protocol-element
summary: For sign-then-encrypt using RFC 1847 encapsulation, the data is first signed as a multipart/signed body and then encrypted to form the final multipart/encrypted body. This method is most useful for standard MIME-compliant message forwarding.
