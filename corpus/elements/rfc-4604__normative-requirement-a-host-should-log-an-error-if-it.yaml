document: rfc-4604
kind: normative-requirement
summary: A host SHOULD log an error if it receives an IGMPv2 or MLDv1 Group Specific Query for an address in a configured source-specific range (MODIFICATION), as this indicates the querying router may not be SSM-compliant or uses a different SSM range.
section: 2.2.5
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
