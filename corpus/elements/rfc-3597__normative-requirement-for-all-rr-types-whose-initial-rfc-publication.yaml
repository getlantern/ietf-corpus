document: rfc-3597
kind: normative-requirement
summary: For all RR types whose initial RFC publication was prior to RFC 3597, the DNSSEC canonical form remains unchanged (downcasing of embedded domain names applies). For all other RR types, the canonical form involves no downcasing of embedded domain names.
section: "7"
rfc2119_level: MUST
topics:
