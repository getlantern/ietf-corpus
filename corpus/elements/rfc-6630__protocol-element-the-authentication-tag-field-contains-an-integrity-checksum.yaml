document: rfc-6630
kind: protocol-element
summary: The Authentication Tag field contains an integrity checksum over the entire ERP/AAK packet from the first bit of Code through the last bit of the Cryptosuite field (excluding the tag itself), computed using the algorithm from the Cryptosuite field with rIK as the secret key.
