document: rfc-7987
kind: normative-requirement
summary: When the conditions of the corruption detection algorithm (Section 3.2) are met, an IS SHOULD generate a CorruptRemainingLifetime event to aid in identifying network problems. The algorithm cannot guarantee detection of all corrupt cases nor that all reported events are valid.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
