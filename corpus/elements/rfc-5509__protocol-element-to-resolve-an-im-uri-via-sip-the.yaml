document: rfc-5509
kind: protocol-element
summary: To resolve an 'im:' URI via SIP, the UA performs a DNS SRV lookup for "_im._sip.<domain>", following procedures defined in RFC 3861. For example, im:fred@example.com resolves via _im._sip.example.com to a SIP URI such as sip:fred@simple.example.com.
section: "3"
topics:
    - sip
    - dns
