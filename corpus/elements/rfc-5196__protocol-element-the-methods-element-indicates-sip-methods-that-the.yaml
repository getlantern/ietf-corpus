document: rfc-5196
kind: protocol-element
summary: The <methods> element indicates SIP methods that the service can receive (analogous to the SIP Allow header field). Methods are listed in <supported> and <notsupported> containers using values from the IANA SIP parameters registry methods table (e.g., INVITE, BYE, MESSAGE, SUBSCRIBE).
