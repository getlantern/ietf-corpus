document: rfc-2535
kind: protocol-element
summary: The KEY resource record (type 25) stores a public key associated with a DNS name. Its RDATA consists of a 16-bit flags field, a protocol octet, an algorithm octet, and a variable-length public key. Security-aware implementations MUST handle at least two simultaneously valid keys of the same type for the same name.
section: "3.1"
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
