document: rfc-5628
kind: design-rationale
summary: Registered contacts are frequently unreachable from outside the UA's domain (private addresses or firewall-blocked public addresses), making them useless for watchers. GRUUs are globally routable and represent additional registration state not included in RFC 3680 notifications, motivating this extension.
section: "1"
topics:
    - sip
    - realtime
