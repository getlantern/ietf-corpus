document: rfc-8777
kind: security-consideration
summary: AMT does not provide integrity protection for Multicast Data packets. An off-path attacker who discovers the gateway IP, relay IP, and relay source port can inject spoofed multicast data packets. Operators are encouraged to use IPsec opportunistically when IPSECKEY records are available.
section: "6.1"
topics:
    - security
    - multicast
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
