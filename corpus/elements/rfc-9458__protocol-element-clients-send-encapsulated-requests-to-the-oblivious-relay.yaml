document: rfc-9458
kind: protocol-element
summary: Clients send Encapsulated Requests to the Oblivious Relay Resource via HTTP POST with content type 'message/ohttp-req'. The relay forwards the same content to the Oblivious Gateway Resource, which decapsulates and processes it, then returns the Encapsulated Response with content type 'message/ohttp-res'.
