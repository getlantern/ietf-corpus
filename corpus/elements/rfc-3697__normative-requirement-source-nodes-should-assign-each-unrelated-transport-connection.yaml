document: rfc-3697
kind: normative-requirement
summary: Source nodes SHOULD assign each unrelated transport connection and application data stream to a new flow to enable Flow Label based classification. A source node which does not assign traffic to flows MUST set the Flow Label to zero.
section: "3"
rfc2119_level: SHOULD
