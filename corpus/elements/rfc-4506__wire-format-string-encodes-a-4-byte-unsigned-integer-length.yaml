document: rfc-4506
kind: wire-format
summary: String encodes a 4-byte unsigned integer length n followed by n ASCII bytes followed by 0–3 zero padding bytes. The declared maximum m defaults to 2^32-1; encoding a length exceeding the maximum is an error.
