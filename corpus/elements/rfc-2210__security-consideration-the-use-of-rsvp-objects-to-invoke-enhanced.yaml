document: rfc-2210
kind: security-consideration
summary: The use of RSVP objects to invoke enhanced QoS services introduces a security requirement to control and authenticate access to those services. Integrity of RSVP messages carrying SENDER_TSPEC, ADSPEC, and FLOWSPEC objects is addressed by RSVP cryptographic authentication (RFCRSVPMD5), discussed further in RFC 2205, RFC 2211, and RFC 2212.
section: "4"
topics:
    - security
    - qos
