document: rfc-6544
kind: normative-requirement
summary: An ICE TCP agent (full or lite) MUST be prepared to receive incoming TCP connection requests on the base of any simultaneous-open or passive TCP candidate. When a connection request is received, the agent MUST accept it and MUST utilize RFC 4571 framing for the lifetime of the connection.
section: "7.2"
rfc2119_level: MUST
topics:
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
