document: rfc-2878
kind: interoperability-note
summary: If both Management-Inline and Spanning-Tree-Protocol-Configuration Options are configure-rejected by a peer, this indicates an incomplete implementation with no spanning tree support at all; for safety the system should cease attempting to configure bridging and log the fact.
section: 4.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
