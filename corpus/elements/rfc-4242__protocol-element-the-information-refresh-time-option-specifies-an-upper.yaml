document: rfc-4242
kind: protocol-element
summary: The Information Refresh Time option specifies an upper bound for how long a client should wait before refreshing information retrieved from DHCPv6. It is only used in Reply messages in response to Information-Request messages. The option code is OPTION_INFORMATION_REFRESH_TIME (32).
