document: rfc-8434
kind: normative-requirement
summary: For the object layout type, when permissions change, a conflicting mandatory byte-range lock is granted, or a layout is revoked and reassigned, the metadata server MUST change the capability version attribute on all objects comprising the file to invalidate any outstanding capabilities before committing to those changes.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
