document: rfc-2192
kind: protocol-element
summary: The `[uidvalidity]` field in message list and message part URLs is optional. If present, it MUST be the value of the IMAP4 UIDVALIDITY status response at the time the URL was created, and SHOULD be used by the client to determine whether the URL is stale.
section: "6"
topics:
