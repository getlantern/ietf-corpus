document: rfc-8070
kind: interoperability-note
summary: During deployment, implementers may allow both freshness-token-based and legacy (pre-generated PKAuthenticator) exchanges. Until freshness tokens are required by the realm, the existing risks of pre-generated PKAuthenticators remain.
