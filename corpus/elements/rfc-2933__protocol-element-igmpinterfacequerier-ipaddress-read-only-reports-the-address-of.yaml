document: rfc-2933
kind: protocol-element
summary: igmpInterfaceQuerier (IpAddress, read-only) reports the address of the IGMP Querier on the subnet attached to the interface. igmpInterfaceQuerierUpTime records how long ago the querier last changed; igmpInterfaceQuerierExpiryTime reports remaining time before the Other Querier Present Timer expires (zero if local system is querier).
section: "4"
topics:
    - multicast
    - snmp
