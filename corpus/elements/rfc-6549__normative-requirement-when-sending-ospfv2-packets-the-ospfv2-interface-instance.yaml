document: rfc-6549
kind: normative-requirement
summary: When sending OSPFv2 packets, the OSPFv2 Interface Instance ID MUST be set in the OSPFv2 packet header. When receiving, the Header Instance ID is used to demultiplex the packet and associate it with the correct OSPFv2 instance; packets with a non-matching Instance ID MUST be discarded.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
