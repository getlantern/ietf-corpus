document: rfc-9746
kind: protocol-element
summary: Administrative SHT is the value advertised by an NVE in its A-D per ES route; operational SHT is the value actually used. The administrative SHT matches the operational SHT only if all NVEs attached to the ES advertise the same administrative SHT.
section: "2.4"
topics:
    - bgp
    - routing
