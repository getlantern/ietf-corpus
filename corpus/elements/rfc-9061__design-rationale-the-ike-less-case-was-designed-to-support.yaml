document: rfc-9061
kind: design-rationale
summary: The IKE-less case was designed to support resource-constrained NSFs that cannot run IKEv2 (memory/computation savings), and to enable centralized IPsec SA management for gateway-to-gateway or host-to-host scenarios under the same controller without requiring IKEv2 between NSFs. The tradeoff is greater complexity in the controller and potential scalability/performance issues at scale.
section: "4"
topics:
