document: rfc-4364
kind: protocol-element
summary: The VPN-IPv4 address family introduces a 12-byte address consisting of an 8-byte Route Distinguisher (RD) followed by a 4-byte IPv4 address. This ensures BGP never treats routes from different VPNs as comparable, even when those VPNs share the same IPv4 address prefix.
section: "4.1"
topics:
    - bgp
    - vpn
    - ip
    - mpls
