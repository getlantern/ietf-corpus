document: rfc-5348
kind: security-consideration
summary: In DCCP deployments, a receiver could spoof feedback packets to manipulate the sender's rate. RFC 4340's security mechanisms (e.g., Init Cookies) address this threat. Section 10.1 notes that TFRC-in-DCCP inherits DCCP's security properties for protecting feedback integrity.
section: "10.1"
topics:
    - security
    - congestion
