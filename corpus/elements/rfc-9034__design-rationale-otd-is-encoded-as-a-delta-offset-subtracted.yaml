document: rfc-9034
kind: design-rationale
summary: OTD is encoded as a delta (offset subtracted from DT) rather than an absolute origination timestamp, because the difference DT - OT is always smaller than DT itself; this reduces the OTD field to fewer bits than would be needed for an absolute value, conserving header space in constrained networks.
