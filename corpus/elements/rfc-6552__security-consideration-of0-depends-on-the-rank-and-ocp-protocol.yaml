document: rfc-6552
kind: security-consideration
summary: OF0 depends on the Rank and OCP protocol elements. If those elements are compromised — through modification or spoofing — an OF0 implementation may generate incorrect paths causing packets to be misrouted. Deployments are RECOMMENDED to use RPL security mechanisms where there is risk of routing information tampering.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
