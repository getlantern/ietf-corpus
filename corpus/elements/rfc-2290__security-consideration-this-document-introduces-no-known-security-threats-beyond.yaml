document: rfc-2290
kind: security-consideration
summary: This document introduces no known security threats beyond those facing any PPP node or Mobile IP node. Service providers SHOULD use cryptographically strong authentication (e.g., CHAP, RFC 1994) to prevent theft-of-service. Users requiring confidentiality should use PPP link encryption, IP-layer encryption, or application-layer encryption. Mobile IP authentication (RFC 2002) protects against trivial denial-of-service attacks against a mobile node and its home agent.
section: "4"
topics:
