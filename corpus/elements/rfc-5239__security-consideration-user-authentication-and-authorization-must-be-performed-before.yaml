document: rfc-5239
kind: security-consideration
summary: User authentication and authorization must be performed before any conferencing operation. The conferencing system must authenticate users, allocate conference user identifiers, and verify the user has appropriate authority based on system and conference-object-specific policies before processing any CCP request.
section: "11.1"
topics:
    - realtime
    - security
