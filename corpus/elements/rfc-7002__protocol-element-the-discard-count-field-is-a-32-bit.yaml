document: rfc-7002
kind: protocol-element
summary: The Discard Count field is a 32-bit unsigned value. If the measured value exceeds 0xFFFFFFFD, the value 0xFFFFFFFE MUST be reported to indicate over-range. If measurement is unavailable, 0xFFFFFFFF MUST be reported.
