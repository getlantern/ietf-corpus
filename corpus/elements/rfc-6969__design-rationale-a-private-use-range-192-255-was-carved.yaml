document: rfc-6969
kind: design-rationale
summary: A Private Use range (192-255) was carved out of the previously fully-Unassigned 128-255 block to allow operators to locally assign Instance IDs for specific applications without requiring IANA coordination. The motivating use case is IPv4-embedded IPv6 routing (as in draft OSPF-EMBED), where a separate Instance ID space enables easy operational identification of the application.
section: "1"
topics:
    - routing
