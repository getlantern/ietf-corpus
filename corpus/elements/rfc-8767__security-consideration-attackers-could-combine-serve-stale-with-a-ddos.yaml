document: rfc-8767
kind: security-consideration
summary: Attackers could combine serve-stale with a DDoS attack on authoritative servers to intentionally extend the lifetime of malicious or stale DNS records in resolver caches. The document acknowledges this risk but notes that attackers with this capacity could cause greater harm through other means.
section: "10"
topics:
