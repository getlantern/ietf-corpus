document: rfc-9159
kind: interoperability-note
summary: A Bluetooth LE 6LN link-local address only needs to be unique between the two communicating nodes (e.g., 6LN and 6LR), not across the entire multilink subnet; therefore EDAR/EDAC exchange for link-local address DAD is not required.
