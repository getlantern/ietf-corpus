document: rfc-3986
kind: design-rationale
summary: A URI provides only identification; access to the resource is neither guaranteed nor implied by the presence of a URI. Operations on a URI (access, update, replace) are defined by the protocols and data formats that use the URI, not by this specification.
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
