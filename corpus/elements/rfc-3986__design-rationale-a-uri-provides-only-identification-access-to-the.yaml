document: rfc-3986
kind: design-rationale
summary: A URI provides only identification; access to the resource is neither guaranteed nor implied by the presence of a URI. The specification intentionally separates identification from interaction so that URIs may be used in contexts where the named scheme is not the actual access mechanism (e.g., via caches, gateways, or proxies).
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
