document: rfc-7230
kind: normative-requirement
summary: A server MUST reject any received request containing whitespace between a header field-name and colon with a 400 (Bad Request) response. A proxy MUST remove any such whitespace from a response message before forwarding.
section: 3.2.4
rfc2119_level: MUST
topics:
    - http
    - security
