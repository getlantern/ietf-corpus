document: rfc-2853
kind: normative-requirement
summary: If the application instructs the GSSContext object that delegation is not desired, then the implementation MUST NOT permit delegation to occur. This is an exception to the general rule that a mechanism may enable services even if not requested — delegation may only be provided at the explicit request of the application.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
