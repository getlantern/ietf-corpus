document: rfc-4972
kind: normative-requirement
summary: If an LSR desires to join or leave a TE mesh-group in IS-IS, it MUST originate a new IS-IS LSP comprising the refreshed Router Capability TLV with the updated TE-MESH-GROUP sub-TLV.
section: "5.2"
rfc2119_level: MUST
