document: rfc-8081
kind: normative-requirement
summary: If a fragment identifier (following un-escaping) does not match any PostScript name in the name table, or if no fragment is specified, the first font in the collection is matched. The document notes that relying on a particular font always being first is unwise as ordering may change across revisions.
section: "4.2"
rfc2119_level: MAY
topics:
    - registry
