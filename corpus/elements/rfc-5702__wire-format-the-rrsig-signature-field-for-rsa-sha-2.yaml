document: rfc-5702
kind: wire-format
summary: 'The RRSIG signature field for RSA/SHA-2 uses RSASSA-PKCS1-v1_5: the padded structure is (00 | 01 | FF* | 00 | prefix | hash) raised to the private exponent mod n. The FF octet is repeated until the total length equals the modulus length.'
