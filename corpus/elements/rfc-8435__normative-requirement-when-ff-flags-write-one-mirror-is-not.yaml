document: rfc-8435
kind: normative-requirement
summary: When FF_FLAGS_WRITE_ONE_MIRROR is not set and the client updates mirrors serially, it SHOULD stop at the first error and report to the MDS. If updating in parallel, it SHOULD wait for all storage devices to respond so it can report all errors encountered.
section: 8.2.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
