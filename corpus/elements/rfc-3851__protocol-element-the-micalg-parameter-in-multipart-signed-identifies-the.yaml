document: rfc-3851
kind: protocol-element
summary: 'The micalg parameter in multipart/signed identifies the message digest algorithm(s) used for the MIC: sha1, md5, sha256, sha384, sha512, or ''unknown''. It enables one-pass signature verification. Multiple algorithms MUST be comma-separated.'
