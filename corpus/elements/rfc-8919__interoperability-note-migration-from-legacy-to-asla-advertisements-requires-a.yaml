document: rfc-8919
kind: interoperability-note
summary: 'Migration from legacy to ASLA advertisements requires a three-step process: (1) send ASLA while continuing legacy (duplicated advertisements), (2) enable use of ASLA on all routers, (3) remove legacy advertisements. Only after migration can incongruent per-application values be advertised.'
section: 6.3.3
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
