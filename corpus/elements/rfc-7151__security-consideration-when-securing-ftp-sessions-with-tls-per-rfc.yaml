document: rfc-7151
kind: security-consideration
summary: When securing FTP sessions with TLS per RFC 4217, client implementations SHOULD verify that the hostname in the HOST command parameter matches the identity in the server's X.509 certificate to prevent man-in-the-middle attacks.
