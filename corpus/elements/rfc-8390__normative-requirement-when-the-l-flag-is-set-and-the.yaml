document: rfc-8390
kind: normative-requirement
summary: When the L-flag is set and the processing node fails to find a diverse path, it SHOULD proceed with a best-effort path and MUST return a PathErr with error code 'Notify Error' (25) and sub-code 'Failed to satisfy Exclude Route' (15). The Path_State_Removed (PSR) flag MUST NOT be set.
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
