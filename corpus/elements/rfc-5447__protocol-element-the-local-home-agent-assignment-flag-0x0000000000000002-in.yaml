document: rfc-5447
kind: protocol-element
summary: The LOCAL_HOME_AGENT_ASSIGNMENT flag (0x0000000000000002) in the MIP6-Feature-Vector AVP signals that a local home agent outside the home realm is requested (in request) or authorized (in answer). The local HA may be assigned by the NAS, LAAA, or VAAA depending on deployment.
section: 4.2.5
topics:
