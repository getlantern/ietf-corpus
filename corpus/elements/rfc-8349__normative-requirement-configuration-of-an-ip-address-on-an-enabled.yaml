document: rfc-8349
kind: normative-requirement
summary: Configuration of an IP address on an enabled interface MUST result in the immediate creation of the corresponding direct route; the destination prefix is derived from the configured IP address and network prefix/mask, and the interface is set as the outgoing interface.
section: "6.2"
rfc2119_level: MUST
topics:
