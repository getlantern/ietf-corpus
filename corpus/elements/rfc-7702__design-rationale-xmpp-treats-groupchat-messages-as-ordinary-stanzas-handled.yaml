document: rfc-7702
kind: design-rationale
summary: XMPP treats groupchat messages as ordinary stanzas handled by the server or a MUC component, whereas MSRP treats groupchat as a media session (like audio/video) requiring a conference focus for signaling and a separate MSRP switch for data. This architectural difference drives the mapping complexity in this document.
