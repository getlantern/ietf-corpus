summary: 'Routes have two orthogonal state dimensions: route-state (active/inactive, triggered by nexthop resolution—active requires at least one fully resolved nexthop) and route-installed-state (installed/uninstalled, triggered by FIB installation eligibility and policy). Transitions in either dimension generate route-change notifications.'
