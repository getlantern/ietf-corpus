document: rfc-3395
kind: wire-format
summary: The protocolDirID for an application verb is formed by appending the 4-octet verb layer [0.a.b.c] to the parent application's protocolDirID, where 'a' is the high-order byte, 'b' the middle, and 'c' the low-order byte of the verbEnum. The special value '0.0.0.0' is reserved for the implicit connect(0) verb.
section: 3.2.2
topics:
