summary: IANA registered an LDAP Object Identifier for the VPIM directory schema, serving as a base OID for all schema elements defined in RFC 4237. The OID covers the vPIMUser object class and ten attributes (vPIMRfc822Mailbox through vPIMSubMailboxes).
