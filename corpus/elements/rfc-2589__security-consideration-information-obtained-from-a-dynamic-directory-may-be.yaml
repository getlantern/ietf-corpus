document: rfc-2589
kind: security-consideration
summary: Information obtained from a dynamic directory may be out of date. For example, IP addresses obtained from the directory may have been reassigned after the original host disconnected, so relying on dynamic directory data for authorization or routing decisions requires caution.
section: "10"
topics:
    - ldap
    - security
