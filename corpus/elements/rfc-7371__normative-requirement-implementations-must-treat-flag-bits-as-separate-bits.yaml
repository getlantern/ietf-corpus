document: rfc-7371
kind: normative-requirement
summary: Implementations MUST treat flag bits as separate bits rather than interpreting their combined value as a 4-bit integer. This is required to unambiguously associate meanings with individual flags and avoid misinterpretation of allowed prefix ranges.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - multicast
