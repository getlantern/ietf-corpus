document: rfc-3831
kind: normative-requirement
summary: FC Sequences are REQUIRED to be non-streamed, and an Nx_Port supporting IPv6 is REQUIRED to use continuously increasing SEQ_CNT. Each Exchange MUST start with SEQ_CNT=0 and every subsequent frame MUST increment SEQ_CNT by one.
section: "10"
rfc2119_level: REQUIRED
topics:
    - ip
