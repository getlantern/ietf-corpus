document: rfc-7024
kind: design-rationale
summary: V-spokes are provisioned to import only routes carrying a specific RT-VH; adding a new V-spoke requires provisioning only on that V-spoke — no changes to the V-hub are required. This one-sided provisioning model simplifies scaling the spoke population.
section: "3"
topics:
