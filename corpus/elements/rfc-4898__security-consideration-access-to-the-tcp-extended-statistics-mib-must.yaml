document: rfc-4898
kind: security-consideration
summary: Access to the TCP Extended Statistics MIB must be controlled using SNMP access control mechanisms, as the per-connection statistics expose detailed information about TCP behavior, congestion state, and active connections that could be exploited by adversaries to infer network topology or time attacks.
section: "5"
topics:
    - snmp
    - tcp
    - security
