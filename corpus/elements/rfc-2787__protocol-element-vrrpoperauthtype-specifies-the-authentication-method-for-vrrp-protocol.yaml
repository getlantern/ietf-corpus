document: rfc-2787
kind: protocol-element
summary: 'vrrpOperAuthType specifies the authentication method for VRRP protocol exchanges: noAuthentication(1), simpleTextPassword(2), or ipAuthenticationHeader(3). The value must be the same for all virtual routers sharing a given ifIndex. New enumerations require a standards-track RFC.'
