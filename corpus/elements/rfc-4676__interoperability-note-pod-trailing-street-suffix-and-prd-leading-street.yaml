document: rfc-4676
kind: interoperability-note
summary: POD (trailing street suffix) and PRD (leading street direction) SHOULD use the abbreviations N, E, S, W, NE, NW, SE, SW in English-speaking countries. For STS in the US, abbreviations from USPS Publication 28 Appendix C SHOULD be used.
section: "3.4"
