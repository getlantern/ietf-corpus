document: rfc-7394
kind: normative-requirement
summary: If the return path is any mechanism other than the co-routed LSP, the TTL TLV in the MPLS Echo Request MUST be ignored. The TLV's presence implies use of the co-routed LSP return path.
section: "1"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
