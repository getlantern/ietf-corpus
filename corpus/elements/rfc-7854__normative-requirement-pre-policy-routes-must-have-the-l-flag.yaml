document: rfc-7854
kind: normative-requirement
summary: Pre-policy routes MUST have the L flag clear in the BMP per-peer header; post-policy routes MUST have the L flag set. When a route is withdrawn, the withdraw MUST carry the same L flag value(s) as any previous announcement of that route.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - measurement
