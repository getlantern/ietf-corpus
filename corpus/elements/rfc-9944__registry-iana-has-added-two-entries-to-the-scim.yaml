summary: 'IANA has added two entries to the ''SCIM Schema URIs for Data Resources'' registry: urn:ietf:params:scim:schemas:core:2.0:Device (Core Device Schema) and urn:ietf:params:scim:schemas:core:2.0:EndpointApp (Endpoint Application). Additionally, ten extension URIs were added to the ''SCIM Server-Related Schema URIs'' registry covering BLE, Ethernet MAB, FIDO Device Onboard, DPP, endpointAppsExt, Zigbee, and four BLE pairing method extensions.'
