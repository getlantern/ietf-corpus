document: rfc-7151
kind: interoperability-note
summary: Internationalization of domain names is supported only through IDNA 'A-labels' (e.g., 'xn--e1afmkfd.com'). Non-ASCII domain names must be converted to A-label form before use in the HOST command.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
