document: rfc-9090
kind: protocol-element
summary: The CDDL control operator '.sdnv' constrains a byte string target to be the SDNV (BER encoding) of a single unsigned integer matching the control type. The operator '.sdnvseq' constrains the byte string to be a sequence of SDNVs decoding to an array of unsigned integers.
