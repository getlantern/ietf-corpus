document: rfc-4237
kind: security-consideration
summary: Service provider subscriber data is highly sensitive and subject to 'go fish' attacks via repeated LDAP queries to enumerate active messaging subscribers due to dense telephone number assignments. Providers may limit disclosure of telemarketing-useful data (e.g., text names) while still disclosing sender-useful data (e.g., spoken names).
section: "3"
topics:
    - security
    - ldap
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
