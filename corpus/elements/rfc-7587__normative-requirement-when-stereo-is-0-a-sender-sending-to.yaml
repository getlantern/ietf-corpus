document: rfc-7587
kind: normative-requirement
summary: When 'stereo' is 0, a sender sending to a single destination MUST NOT use stereo. Gateways sending to multiple destinations SHOULD NOT use stereo when 'stereo' is 0, as this wastes network resources.
section: "7.1"
rfc2119_level: MUST NOT
topics:
