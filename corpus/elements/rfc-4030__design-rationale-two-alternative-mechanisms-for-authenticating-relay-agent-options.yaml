document: rfc-4030
kind: design-rationale
summary: 'Two alternative mechanisms for authenticating relay agent options were developed: this suboption-based approach and IPsec-based authentication. The suboption approach is appropriate when IPsec is unavailable or when multiple relay agents make pairwise key management burdensome; IPsec is appropriate when it is readily available and pairwise keys can be efficiently managed.'
section: "13.2"
topics:
