document: rfc-7234
kind: interoperability-note
summary: The qualified forms of the private and no-cache response directives (e.g., 'private=fieldname', 'no-cache=fieldname') are not widely implemented; many caches treat them as equivalent to the unqualified forms. Implementors should not rely on the selective field suppression behavior of these qualified forms.
section: 5.2.2
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
