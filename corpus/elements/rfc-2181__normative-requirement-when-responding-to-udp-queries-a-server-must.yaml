document: rfc-2181
kind: normative-requirement
summary: When responding to UDP queries, a server must set the IP source address in the reply to the destination address from the query packet's IP header. If that address is not permitted, the server may use any legal address allocated to it, chosen to maximize client reachability.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
