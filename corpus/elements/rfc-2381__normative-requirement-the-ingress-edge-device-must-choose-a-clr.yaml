document: rfc-2381
kind: normative-requirement
summary: The ingress edge device MUST choose a CLR value that provides the appropriate IP-level packet loss rate. The CLR determination MUST account for packet size distribution and ATM Frame Discard mode, which can change effective packet loss rate by orders of magnitude.
section: "2.6"
rfc2119_level: MUST
topics:
