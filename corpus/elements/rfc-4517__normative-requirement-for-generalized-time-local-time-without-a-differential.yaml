document: rfc-4517
kind: normative-requirement
summary: For Generalized Time, local time without a differential SHALL NOT be used. The 'Z' form of g-time-zone SHOULD be used in preference to g-differential. Character strings that do not represent valid calendar dates or times SHOULD be considered invalid.
