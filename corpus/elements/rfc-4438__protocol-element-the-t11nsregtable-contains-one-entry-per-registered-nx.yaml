kind: protocol-element
summary: The t11NsRegTable contains one entry per registered Nx_Port, indexed by fcmInstanceIndex, t11NsInfoSubsetIndex, t11NsRegFabricIndex, and t11NsRegPortIdentifier. Each entry holds Port_Name (WWN), Node_Name (WWN), class of service, IP addresses, IPA, FC-4 Types, port type, Fabric Port Name, Hard Address, symbolic names, and FC-4 Features.
