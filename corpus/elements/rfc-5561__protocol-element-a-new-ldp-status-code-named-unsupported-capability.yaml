document: rfc-5561
kind: protocol-element
summary: A new LDP status code named 'Unsupported Capability' is defined (value 0x0000002E). The E-bit of the Status TLV in a Notification message carrying this code MUST be 0, meaning it is an advisory notification rather than a fatal error requiring session teardown at the LDP layer.
section: "8"
topics:
