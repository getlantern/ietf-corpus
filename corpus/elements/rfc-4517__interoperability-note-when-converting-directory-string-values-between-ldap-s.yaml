document: rfc-4517
kind: interoperability-note
summary: When converting Directory String values between LDAP's UTF-8 encoding and X.500 BER encoding (which uses TeletexString, PrintableString, or UniversalString alternatives), conversions SHOULD be done consistently with the Transcode step of RFC 4518 string preparation algorithms.
