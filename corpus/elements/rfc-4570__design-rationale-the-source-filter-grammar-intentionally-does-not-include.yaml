document: rfc-4570
kind: design-rationale
summary: The source-filter grammar intentionally does not include syntax to express 'exclude none' or 'include all'; the default behavior when no source-filter attribute is present is that all traffic sent to the connection-address is accepted (from any source).
section: "3.1"
topics:
