document: rfc-4798
kind: security-consideration
summary: No new security issues beyond BGP-4 and MP-BGP for IPv6 are introduced. For inter-AS cases (b) and (c), appropriate trust relationships must exist between ASes along the path, and ASBR 6PEs should only accept labeled packets with labels they explicitly signaled to the peer.
