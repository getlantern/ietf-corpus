document: rfc-4481
kind: protocol-element
summary: The <timed-status> element is a child of the PIDF <tuple> element and extends presence information to cover time intervals fully in the past or future. It may contain <basic> and <note> elements, as well as other PIDF <status> extensions with limited validity periods.
section: "3"
topics:
