document: rfc-2814
kind: normative-requirement
summary: A SBM implementation SHOULD satisfy all requirements of RFC 2747 (RSVP Cryptographic Authentication) and apply the same MD5-based integrity protection to SBM-specific objects in RSVP messages just as it does to standard RSVP objects.
