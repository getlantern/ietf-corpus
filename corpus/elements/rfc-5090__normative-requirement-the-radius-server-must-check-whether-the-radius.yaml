document: rfc-5090
kind: normative-requirement
summary: The RADIUS server MUST check whether the RADIUS client is authorized to serve users of the realm in Digest-Realm; if not, the server MUST send an Access-Reject and SHOULD log the event.
section: 2.2.1
rfc2119_level: MUST
