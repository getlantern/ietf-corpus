document: rfc-5839
kind: normative-requirement
summary: A notifier MUST generate entity-tags for event notifications of all resources for which it is responsible. The entity-tag MUST be unique across all versions of all entities for each state of a resource as reported by a given event package.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
