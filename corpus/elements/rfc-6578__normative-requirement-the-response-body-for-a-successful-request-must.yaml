document: rfc-6578
kind: normative-requirement
summary: The response body for a successful request MUST be a DAV:multistatus XML element containing one DAV:sync-token element plus one DAV:response for each member URL added, changed, or deleted. A given member URL MUST appear only once in the response.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
