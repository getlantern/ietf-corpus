document: rfc-5936
kind: normative-requirement
summary: An AXFR client MUST ensure that only a successfully transferred copy of zone data can be used to serve the zone. If any error is detected, erroneous data MUST be deleted and the client MUST continue serving the previous version. The externally visible behavior MUST be equivalent to the two-stage model.
section: "6"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
