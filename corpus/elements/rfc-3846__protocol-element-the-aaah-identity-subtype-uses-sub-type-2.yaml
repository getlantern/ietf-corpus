document: rfc-3846
kind: protocol-element
summary: The AAAH Identity subtype uses sub-type 2 of the NAI Carrying Extension and contains the NAI of the home AAA server in the form hostname@realm, where hostname and realm together form the complete FQDN (hostname.realm) of the home AAA server.
