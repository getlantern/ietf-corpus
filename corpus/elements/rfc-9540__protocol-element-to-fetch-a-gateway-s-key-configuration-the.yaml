document: rfc-9540
kind: protocol-element
summary: To fetch a gateway's key configuration, the client issues a GET request to the gateway URI with an Accept header specifying "application/ohttp-keys". The gateway responds with its key configuration in the body with content type "application/ohttp-keys".
