document: rfc-2214
kind: security-consideration
summary: Using an SNMP SET on this MIB results in an RSVP or Integrated Services reservation created under rules different from those applied when reservations are negotiated using RSVP directly. No additional security considerations beyond those imposed by SNMP itself are identified.
