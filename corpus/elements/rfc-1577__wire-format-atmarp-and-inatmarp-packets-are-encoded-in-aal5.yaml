document: rfc-1577
kind: wire-format
summary: ATMARP and InATMARP packets are encoded in AAL5 PDUs using LLC/SNAP encapsulation with LLC=0xAA-AA-03 (3 octets), OUI=0x00-00-00 (3 octets), Ethertype=0x08-06 (2 octets), for a fixed 8-octet LLC/SNAP header that aligns the ATMARP packet on a 64-bit boundary.
