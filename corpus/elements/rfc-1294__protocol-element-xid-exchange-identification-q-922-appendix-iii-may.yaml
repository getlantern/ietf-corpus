document: rfc-1294
kind: protocol-element
summary: XID (Exchange Identification, Q.922 Appendix III) may optionally be used at circuit initialization to negotiate maximum frame size (N201), retransmission timer (T200), and maximum outstanding I-frames (K). A K value of zero indicates unwillingness to support acknowledged mode multiple frame operation.
