document: rfc-3153
kind: interoperability-note
summary: In PPP Multilink (MP) bundles, PPPMuxCP is negotiated at the bundle level, not per link, because LCP is negotiated per link. PPP multiplexing therefore occurs before multilink encapsulation in the transmit path.
section: "3"
