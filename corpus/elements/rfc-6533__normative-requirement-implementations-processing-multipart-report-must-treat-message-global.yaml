document: rfc-6533
kind: normative-requirement
summary: Implementations processing multipart/report MUST treat message/global-delivery-status, message/global, and message/global-headers as equivalent to message/delivery-status, message/rfc822, and text/rfc822-headers respectively, and MUST expect any combination of the six media types inside a multipart/report.
section: "4.4"
rfc2119_level: MUST
topics:
