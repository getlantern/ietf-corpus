kind: protocol-element
summary: The Signature HTTP field carries the raw signature values. Its value is a Structured Field Dictionary where each key is a signature label matching a Signature-Input entry and each value is a Byte Sequence containing the raw bytes output by the HTTP_SIGN cryptographic primitive.
