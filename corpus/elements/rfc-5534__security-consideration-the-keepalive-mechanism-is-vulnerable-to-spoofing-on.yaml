document: rfc-5534
kind: security-consideration
summary: 'The keepalive mechanism is vulnerable to spoofing: on-path attackers that know a Shim6 context tag can send spoofed Keepalives to suppress legitimate keepalives, forcing nodes into unnecessary exploration. Off-path attackers are deterred by 47-bit random context tags.'
