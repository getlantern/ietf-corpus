document: rfc-8957
kind: protocol-element
summary: In the two-label stack case (LSP label plus application label), the SFL replaces the application label at the bottom of stack. At the egress LER, the LSP label is popped first, then the SFL is processed executing both the synonymous forwarding function and the additional per-flow action.
section: "4.1"
topics:
    - mpls
