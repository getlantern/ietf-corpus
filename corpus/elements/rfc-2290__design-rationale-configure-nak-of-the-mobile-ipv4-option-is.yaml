document: rfc-2290
kind: design-rationale
summary: Configure-Nak of the Mobile-IPv4 option is explicitly left undefined (and prohibited) in this version of the specification to reserve semantic space for a future useful meaning, avoiding premature commitment that would cause interoperability problems.
