document: rfc-8984
kind: protocol-element
summary: Alert objects have a mandatory trigger of type OffsetTrigger (SignedDuration offset relative to event start or end), AbsoluteTrigger (specific UTCDateTime), or UnknownTrigger (for forward compatibility). Implementations SHOULD NOT trigger for unknown trigger types but MUST preserve them.
section: 4.5.2
