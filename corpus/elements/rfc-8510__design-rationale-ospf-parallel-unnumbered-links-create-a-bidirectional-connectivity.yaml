document: rfc-8510
kind: design-rationale
summary: 'OSPF parallel unnumbered links create a bidirectional connectivity verification problem: two unidirectional parallel links can be mistaken for a valid bidirectional link during route computation. Advertising both Local and Remote Interface IDs allows each link advertisement to be cross-checked from both sides of the adjacency.'
section: "1"
topics:
    - routing
