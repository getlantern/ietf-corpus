document: rfc-6408
kind: protocol-element
summary: The extended NAPTR records provide a mapping from a domain to an SRV or A/AAAA record for a server supporting a specific transport protocol and Diameter application. Records contain an empty regular expression and a replacement value pointing to the SRV or A/AAAA record.
