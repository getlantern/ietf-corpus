document: rfc-3565
kind: normative-requirement
summary: If an S/MIME client is required to support symmetric encryption with AES, the SMIMECapabilities attribute MUST contain the AES OID in the symmetric algorithms category, and the parameter with this encoding MUST be absent.
section: "5.1"
rfc2119_level: MUST
