document: rfc-2067
kind: interoperability-note
summary: In a mixed 32-bit/64-bit HIPPI LAN, a 64-bit Source connecting to a 32-bit Destination must request with W=0 and not use Cable B. A 64-bit Destination must examine the W bit in the received I-field and use or ignore Cable B accordingly.
section: "8"
