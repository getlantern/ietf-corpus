document: rfc-2461
kind: design-rationale
summary: Routers are identified in Router Advertisements and Redirect messages by their link-local addresses rather than global unicast addresses. This allows hosts to maintain correct router associations across site renumbering events where global prefixes change but link-local addresses remain stable.
section: "3.1"
topics:
