document: rfc-5340
kind: wire-format
summary: 'The IPv6 prefix PrefixOptions field is 8 bits attached to each prefix in LSA bodies. Key bits include: NU (bit 0x01, no unicast—do not use prefix for unicast forwarding), LA (bit 0x02, prefix is a local address on the advertising router), P (bit 0x08, propagate NSSA prefix to AS external), and DN (bit 0x10, down bit for VPN loop prevention).'
section: A.4.1.1
topics:
