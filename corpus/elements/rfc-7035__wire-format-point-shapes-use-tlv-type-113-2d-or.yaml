document: rfc-7035
kind: wire-format
summary: Point shapes use TLV type 113 (2D) or 114 (3D); each coordinate is a 32-bit IEEE 754 float. Circle/Sphere shapes use type 115 (circle) or 116 (sphere), adding a Radius field after the coordinates.
section: 4.9.1.2
