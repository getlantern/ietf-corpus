document: rfc-6469
kind: normative-requirement
summary: When using unbundled mode, it is RECOMMENDED that audio stream data be extracted from DIF blocks and repackaged into the corresponding RTP payload format (DAT12, L16, L20) to maximize interoperability with non-DV-capable receivers.
