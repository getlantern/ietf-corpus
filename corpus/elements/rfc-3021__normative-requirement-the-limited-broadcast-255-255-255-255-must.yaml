document: rfc-3021
kind: normative-requirement
summary: The limited broadcast (255.255.255.255) MUST be used for all broadcast traffic on a point-to-point link with a 31-bit subnet mask, because a directed broadcast to the link is impossible when only two addresses exist.
section: "2.2"
rfc2119_level: MUST
topics:
