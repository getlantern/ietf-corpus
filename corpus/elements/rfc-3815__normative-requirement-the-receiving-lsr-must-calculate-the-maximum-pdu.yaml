document: rfc-3815
kind: normative-requirement
summary: The receiving LSR MUST calculate the maximum PDU length for the session by using the smaller of its and its peer's proposals for Max PDU Length. A proposed value of 255 or less specifies the default maximum length of 4096 octets.
section: "4"
rfc2119_level: MUST
topics:
