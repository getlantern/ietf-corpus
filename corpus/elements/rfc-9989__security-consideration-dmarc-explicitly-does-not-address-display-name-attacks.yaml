document: rfc-9989
kind: security-consideration
summary: DMARC explicitly does not address display name attacks, where an abuser uses a visually convincing human-readable display name in RFC5322.From while using a different actual domain. Mail Receivers and end users cannot rely on DMARC to detect this class of attack.
section: "11.4"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
