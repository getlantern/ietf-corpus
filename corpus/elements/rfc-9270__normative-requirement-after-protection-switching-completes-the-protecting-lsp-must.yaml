document: rfc-9270
kind: normative-requirement
summary: After protection switching completes, the protecting LSP MUST be signaled with S bit=0 and O bit=1 in the PROTECTION object, at which point link and node resources MUST be allocated for the LSP, which becomes a primary LSP ready to carry traffic.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
