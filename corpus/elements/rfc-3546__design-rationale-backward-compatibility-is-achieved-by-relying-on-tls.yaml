document: rfc-3546
kind: design-rationale
summary: Backward compatibility is achieved by relying on TLS 1.0's requirement that servers accept extended client hellos even if they do not understand extensions, and by requiring no mandatory server response for any of the defined extensions. Constrained clients may still need to reject servers lacking extension support.
section: "1"
topics:
    - tls
