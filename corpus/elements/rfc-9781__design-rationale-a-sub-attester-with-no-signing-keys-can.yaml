document: rfc-9781
kind: design-rationale
summary: A sub-Attester with no signing keys can use UCCS over a local Secure Channel (e.g., inter-process communication) to a lead Attester, which then hashes and signs the UCCS for Evidence. This allows minimal-complexity components to participate in attestation without holding signing keys.
section: "5.1"
topics:
    - security
    - cbor
