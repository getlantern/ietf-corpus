document: rfc-4072
kind: protocol-element
summary: The Accounting-EAP-Auth-Method AVP (AVP Code 465, type Unsigned64) identifies the EAP method(s) used to authenticate the user. For expanded EAP types, its value is (Vendor-Id × 2^32 + Vendor-Type). It MAY appear multiple times in Accounting-Request messages.
section: 4.1.5
