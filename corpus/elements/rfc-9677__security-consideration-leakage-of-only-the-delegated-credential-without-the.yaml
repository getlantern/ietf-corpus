document: rfc-9677
kind: security-consideration
summary: Leakage of only the delegated credential without the private key represents a limited security risk, since a delegated credential can only be used by an entity in possession of the associated private key. Delegated credentials are short-lived (max 7-day validity per RFC 9345), further limiting the impact of any single leaked credential-key pair.
section: "7"
topics:
    - tls
    - security
