document: rfc-9887
kind: normative-requirement
summary: Client-side validation of TLS TACACS+ server identities MUST follow RFC 9525. Applicable identifier types are DNS-ID, IP-ID, or SRV-ID; URI-IDs MUST NOT be used for TACACS+ server identity verification.
section: 3.4.2
rfc2119_level: MUST
topics:
