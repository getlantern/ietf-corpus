document: rfc-7989
kind: normative-requirement
summary: Endpoints MUST generate version 4 (random) or version 5 (SHA-1) UUIDs to address privacy concerns related to the use of MAC addresses in UUIDs. Version 1 UUIDs (which embed the MAC address) are explicitly prohibited.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
