document: rfc-9478
kind: interoperability-note
summary: The TS_SECLABEL type complements but does not replace existing TS Types. Implementations must continue to handle TS_IPV4_ADDR_RANGE and TS_IPV6_ADDR_RANGE per RFC 7296, and TS_SECLABEL is only valid alongside these types.
section: "1.3"
topics:
