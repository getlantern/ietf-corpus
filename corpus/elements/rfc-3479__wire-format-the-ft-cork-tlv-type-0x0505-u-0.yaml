document: rfc-3479
kind: wire-format
summary: The FT Cork TLV (type 0x0505, U=0, F=0, length=0) has a zero-length value field. It appears only on Keepalive messages alongside either an FT Protection TLV or FT ACK TLV; use on other messages or without those TLVs SHOULD generate an 'Unexpected FT Cork TLV' Notification.
section: "8.5"
topics:
