document: rfc-4348
kind: normative-requirement
summary: Implementations SHALL support both header-free and octet-aligned payload formats. Support for interleaving is optional. An implementation using SDP is required to understand all payload parameters in SDP-mapped form.
section: "6.4"
rfc2119_level: SHALL
topics:
