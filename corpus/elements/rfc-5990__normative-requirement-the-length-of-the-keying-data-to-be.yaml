document: rfc-5990
kind: normative-requirement
summary: The length of the keying data to be transported MUST be among the lengths supported by the underlying symmetric key-wrapping scheme (e.g., AES and Camellia Key Wraps require a multiple of 8 bytes, at least 16 bytes; Triple-DES requires 64-bit block size).
section: A.1
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
