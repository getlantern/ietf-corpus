summary: The 436 'Bad Identity-Info' response code is sent when the Identity-Info URI scheme is unsupported or the designated resource is unavailable. The 437 'Unsupported Certificate' response code is sent when the referenced certificate cannot be validated (self-signed, unknown CA, expired, or revoked).
