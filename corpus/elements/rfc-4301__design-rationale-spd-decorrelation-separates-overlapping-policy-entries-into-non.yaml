document: rfc-4301
kind: design-rationale
summary: SPD decorrelation separates overlapping policy entries into non-overlapping entries to enable caching of SPD lookups, which is critical for performance in security gateways and BITS/BITW implementations. Native host implementations implicitly cache via socket-to-SA binding and may not need decorrelation.
section: 4.4.1
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
