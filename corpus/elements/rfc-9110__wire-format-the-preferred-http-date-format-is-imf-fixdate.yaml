document: rfc-9110
kind: wire-format
summary: 'The preferred HTTP-date format is IMF-fixdate: a fixed-length single-zone format such as ''Sun, 06 Nov 1994 08:49:37 GMT''. Senders MUST generate IMF-fixdate; recipients MUST accept all three legacy formats. Two-digit year rfc850-dates appearing more than 50 years in the future MUST be interpreted as the most recent past year with the same last two digits.'
section: 5.6.7
topics:
    - http
