document: rfc-2741
kind: security-consideration
summary: 'AgentX provides no authentication or encryption between master agent and subagents at the protocol level. Security relies entirely on the transport: UNIX-domain socket file permissions provide OS-enforced access control, while TCP-based deployments must restrict access via firewall or bind only to loopback. Unauthorized subagent connections could manipulate MIB data seen by SNMP managers.'
section: "9"
topics:
    - snmp
    - security
