document: rfc-9061
kind: protocol-element
summary: The IKEv2 connection entry ('conn-entry' list) configures autostartup policy, initial-contact, IKE SA soft/hard lifetimes, integrity and encryption algorithm lists (ordered by priority), DH group, half-open SA timer and cookie threshold, local/remote PAD references, ESP encapsulation type, SPD entries, Child SA lifetimes, and state data (SPIs, NAT detection, rekey/reauth times).
