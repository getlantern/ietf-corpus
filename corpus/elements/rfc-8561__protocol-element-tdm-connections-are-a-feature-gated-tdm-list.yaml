document: rfc-8561
kind: protocol-element
summary: TDM connections are a feature-gated (tdm) list on the RLT keyed by tdm-type (identityref based on mw-types:tdm-type). Defined TDM types are E1 (2.048 Mbit/s) and STM-1 (155.52 Mbit/s), with a mandatory uint16 tdm-connections count per type.
