document: rfc-5847
kind: protocol-element
summary: The Heartbeat message is a Mobility Header message (protocol type 135, MH Type 13) periodically exchanged between MAG and LMA. It contains a Reserved field, a U bit (unsolicited response), an R bit (request=0/response=1), a 32-bit Sequence Number, and variable-length Mobility Options.
section: "3.3"
