document: rfc-9622
kind: privacy-consideration
summary: The Transport Services System resolves endpoint names internally when Initiate, Listen, or Rendezvous is called. Privacy considerations for the timing of this name resolution—specifically whether resolution is performed early (via Preconnection.Resolve()) or deferred—are given in Section 13, as early resolution can expose DNS queries before a connection is actually needed.
section: "6.1"
topics:
    - privacy
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
