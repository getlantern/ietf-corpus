document: rfc-2440
kind: normative-requirement
summary: Marker packets (Tag 10, body = the three octets 0x50 0x47 0x50 spelling 'PGP') MUST be ignored when received. They may be placed at the beginning of a message using features unavailable in PGP 2.6.x to trigger a 'newer software required' message from that implementation.
section: "5.8"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
