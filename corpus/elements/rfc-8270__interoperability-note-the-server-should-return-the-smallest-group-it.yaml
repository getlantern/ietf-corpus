document: rfc-8270
kind: interoperability-note
summary: The server should return the smallest group it knows that is larger than the size the client requested; if no such group exists, the server SHOULD return the largest group it knows. The returned group SHOULD be at least 2048 bits, retained from and updating RFC 4419.
section: "4"
topics:
    - crypto
    - security
