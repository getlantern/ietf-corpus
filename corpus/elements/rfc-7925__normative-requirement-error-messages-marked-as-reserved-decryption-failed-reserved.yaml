summary: Error messages marked as RESERVED (decryption_failed_RESERVED, no_certificate_RESERVED, export_restriction_RESERVED) MUST NOT be used with this profile. The TLS server MUST return decrypt_error instead of unknown_psk_identity for PSK ciphersuites.
