document: rfc-7210
kind: protocol-element
summary: The AlgID field indicates which cryptographic algorithm is used with the security protocol (e.g., AES-128-CBC, HMAC-SHA1-96, AES-128-CMAC). When KDF is 'none', the long-lived key is used directly; otherwise the derived short-lived key is used. When a set of short-lived keys is generated, AlgID identifies a ciphersuite.
section: "2"
topics:
