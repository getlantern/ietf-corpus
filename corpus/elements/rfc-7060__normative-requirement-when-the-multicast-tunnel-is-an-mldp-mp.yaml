document: rfc-7060
kind: normative-requirement
summary: When the multicast tunnel is an mLDP MP-LSP or RSVP-TE P2MP LSP, penultimate-hop popping MUST NOT be done, because the top tunnel label provides context in which the upstream-assigned label (second in stack) is to be interpreted (see RFC 5331).
section: "6"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
