document: rfc-3080
kind: protocol-element
summary: 'The SASL family of profiles maps each IANA-registered SASL mechanism to a URI ''http://iana.org/beep/SASL/mechanism''. Challenges and responses are exchanged as ''blob'' elements (always base64-encoded). The ''blob'' element carries an optional ''status'' attribute: ''abort'' (client aborts), ''complete'' (server signals success), or ''continue'' (default).'
section: "4.1"
topics:
    - security
