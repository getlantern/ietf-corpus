document: rfc-1755
kind: security-consideration
summary: Not all security issues relating to IP over ATM are clearly understood at this time, due to the fluid state of ATM specifications and the newness of the technology. Future revisions of this specification will address security capabilities that future ATM signaling standards may offer to IP over ATM signaling.
