document: rfc-5088
kind: normative-requirement
summary: The NEIG-PCE-DOMAIN sub-TLV MUST be present at least once with domain-type=1 (OSPF Area ID) if the R bit is set and Rd bit is cleared, and MUST be present at least once with domain-type=2 (AS Number) if the S bit is set and Sd bit is cleared.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
