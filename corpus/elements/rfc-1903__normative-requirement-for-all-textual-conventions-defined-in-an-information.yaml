document: rfc-1903
kind: normative-requirement
summary: For all textual conventions defined in an information module, the name shall be unique and mnemonic, and shall not exceed 64 characters in length; names longer than 32 characters are not recommended. All names in 'standard' information modules shall be unique across all such modules.
section: "1"
rfc2119_level: MUST
