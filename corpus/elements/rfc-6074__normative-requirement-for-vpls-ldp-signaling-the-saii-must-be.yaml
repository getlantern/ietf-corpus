document: rfc-6074
kind: normative-requirement
summary: For VPLS LDP signaling, the SAII MUST be set to the PE_addr (VSI-ID without the RD) of the sending PE to enable signaling of the reverse half of the PW. The VPLS-id is encoded in the AGI field and the remote PE_addr in the TAII field.
section: 3.2.3
rfc2119_level: MUST
topics:
    - mpls
    - vpn
