document: rfc-6660
kind: normative-requirement
summary: If no encapsulation is used for ECN-capable PCN-packets, the PCN-ingress-node MUST drop CE-marked packets to avoid congestion collapse, because there is no mechanism to propagate CE markings across the PCN-domain without a tunnel.
section: "5.1"
rfc2119_level: MUST
topics:
    - ecn
    - diffserv
    - qos
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
