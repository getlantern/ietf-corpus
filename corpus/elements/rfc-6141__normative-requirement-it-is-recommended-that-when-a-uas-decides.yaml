document: rfc-6141
kind: normative-requirement
summary: It is RECOMMENDED that when a UAS decides to start using new parameters for a stream for which all mandatory preconditions have been met, the UAS either sends media using the new parameters or sends a new offer with precondition-related attributes removed, to signal that the parameters are in use.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
