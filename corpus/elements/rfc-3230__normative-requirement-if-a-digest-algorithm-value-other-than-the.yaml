document: rfc-3230
kind: normative-requirement
summary: If a digest-algorithm value other than the four initially registered ones is defined, its associated encoding MUST either be represented as a quoted string, or MUST NOT include ';' or ',' in the character set used for the encoding.
section: 4.1.1
rfc2119_level: MUST
