document: rfc-9197
kind: wire-format
summary: 'The E2E Option-Type header is 4 octets: Namespace-ID (16 bits) and IOAM E2E-Type (16-bit bitmask). E2E-Type bits define presence of 64-bit sequence number (bit 0), 32-bit sequence number (bit 1), timestamp seconds (bit 2), and timestamp fraction (bit 3); bits 0 and 1 are mutually exclusive.'
section: "4.6"
