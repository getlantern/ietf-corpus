document: rfc-9420
kind: interoperability-note
summary: External joins allow a new member to join via an external Commit without a pre-published KeyPackage, using a GroupInfo object that includes the GroupContext and an external_pub key. This enables open-group scenarios where new members can join without prior coordination with existing members.
section: "3.3"
topics:
