document: rfc-8212
kind: security-consideration
summary: Permissive default routing policies can result in route leaks (RFC 7908) and routing of traffic through unexpected paths; these policies also have the potential to expose software defects or misconfiguration with unforeseen technical and business impacts. The default-deny update is intended to eliminate these inadvertent effects.
section: "4"
topics:
