summary: 'Two bidirectional P-tunnel technologies are supported: Multipoint-to-Multipoint (MP2MP) LSPs created via LDP extensions (RFC 6388), and BIDIR-PIM multicast distribution trees (RFC 5015). Other bidirectional tunnel technologies are outside the scope.'
