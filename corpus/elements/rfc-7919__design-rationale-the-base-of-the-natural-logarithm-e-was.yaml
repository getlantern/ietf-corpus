document: rfc-7919
kind: design-rationale
summary: The base of the natural logarithm (e) was chosen as the 'nothing-up-my-sleeve' number for deriving group moduli, ensuring middle bits are effectively random and ruling out any suspicion that primes were secretly selected to be weak. RFC 3526 used pi, but this document uses a distinct value to avoid reusing the same groups.
