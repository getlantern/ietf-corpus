document: rfc-2976
kind: design-rationale
summary: INFO was introduced because SIP lacked a general-purpose mechanism to carry session control information along the SIP signaling path during an active session. Re-INVITE can modify session characteristics but cannot carry arbitrary mid-session application-layer signaling.
