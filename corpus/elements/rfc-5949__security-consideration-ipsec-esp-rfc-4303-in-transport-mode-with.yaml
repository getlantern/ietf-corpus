document: rfc-5949
kind: security-consideration
summary: IPsec ESP (RFC 4303) in transport mode with mandatory integrity protection SHOULD be used for HI/HAck signaling. Confidentiality SHOULD be added when sensitive mobile node context is transferred. ESP in tunnel mode SHOULD protect forwarded data packets if the inter-MAG link exposes them to additional threats.
section: "7"
topics:
    - security
    - ipsec
    - mobility
