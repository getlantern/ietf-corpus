document: rfc-3775
kind: wire-format
summary: 'The Mobility Header is identified by Next Header value 135 and contains: 8-bit Payload Proto, 8-bit Header Len (units of 8 octets, excluding first 8 octets), 8-bit MH Type, 8-bit Reserved (must be initialized to zero), 16-bit Checksum (one''s complement of pseudo-header plus full header), and variable-length Message Data.'
