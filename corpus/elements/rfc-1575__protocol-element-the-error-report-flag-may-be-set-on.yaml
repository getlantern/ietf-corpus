document: rfc-1575
kind: protocol-element
summary: The error report flag may be set on the echo-request, echo-response, or both. If an echo-request is discarded, an error-report (ER) packet is sent to the echo-request source; if an echo-response is discarded, the ER packet is sent to the echo-response source. The echo-request entity and originator are not required to process ER packets.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
