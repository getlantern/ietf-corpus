document: rfc-4390
kind: interoperability-note
summary: RFC 1542 discourages broadcast replies in DHCP, but for IPoIB broadcast is a necessity because the server cannot receive the client's link-layer address via 'chaddr'. Implementors MUST override the RFC 1542 guidance in this context.
section: "2"
