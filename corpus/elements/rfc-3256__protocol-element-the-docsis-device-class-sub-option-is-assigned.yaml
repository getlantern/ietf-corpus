document: rfc-3256
kind: protocol-element
summary: 'The DOCSIS Device Class sub-option is assigned sub-option code 4 within the DHCP Relay Agent Information Option space. It carries a 32-bit Device Class field (d1-d4) identifying attributes of the cable modem, with bit #0 indicating a CPE Controlled Cable Modem (CCCM) and bits #1-31 reserved and set to zero.'
