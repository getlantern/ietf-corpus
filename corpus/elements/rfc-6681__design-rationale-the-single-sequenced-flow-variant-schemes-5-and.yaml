document: rfc-6681
kind: design-rationale
summary: The single sequenced flow variant (Schemes 5 and 6) leaves source packets unmodified—using no Source FEC Payload ID—because sequence numbers already present in the source flow can derive all necessary FEC identification information, providing backwards compatibility advantages.
