document: rfc-5777
kind: interoperability-note
summary: MAC and EUI64 address bit masks should use a contiguous series of N set bits followed by 48-N (or 64-N) clear bits, reflecting OUI and address-block boundaries. Non-contiguous masks such as 0xFF00FF000000 are explicitly noted as invalid; the masks are not intended to impose structure beyond what IEEE intended.
section: A
topics:
    - diameter
    - qos
