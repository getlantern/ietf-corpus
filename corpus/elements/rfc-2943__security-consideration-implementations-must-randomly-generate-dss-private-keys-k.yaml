document: rfc-2943
kind: security-consideration
summary: Implementations must randomly generate DSS private keys, 'k' values used in DSS signatures, and nonces. Use of inadequate pseudo-random number generators (PRNGs) can result in little or no security, as an attacker may reproduce the PRNG state and search a small set of possible values. RFC 1750 and FIPS PUB 186 Appendix 3 provide guidance.
section: "5"
topics:
    - crypto
    - security
