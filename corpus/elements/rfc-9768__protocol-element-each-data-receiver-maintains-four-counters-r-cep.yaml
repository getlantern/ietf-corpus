summary: 'Each Data Receiver maintains four counters: r.cep (CE packet count), r.ceb (CE byte count), r.e0b (ECT(0) byte count), and r.e1b (ECT(1) byte count). Byte counters reflect only TCP payload length, excluding TCP header and options.'
