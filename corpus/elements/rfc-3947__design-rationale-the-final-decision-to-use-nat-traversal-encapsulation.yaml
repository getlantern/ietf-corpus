document: rfc-3947
kind: design-rationale
summary: The final decision to use NAT-Traversal encapsulation is deferred to Quick Mode (not Phase 1) because Phase 1 only detects NAT presence; Quick Mode allows per-SA negotiation of whether UDP encapsulation is actually needed and which mode (tunnel vs. transport) to use.
