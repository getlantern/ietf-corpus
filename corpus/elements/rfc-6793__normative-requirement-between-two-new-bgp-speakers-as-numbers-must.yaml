document: rfc-6793
kind: normative-requirement
summary: Between two NEW BGP speakers, AS numbers MUST be encoded as four-octet entities in both AS_PATH and AGGREGATOR. AS4_PATH and AS4_AGGREGATOR MUST NOT be carried in UPDATE messages between NEW BGP speakers; if received, they MUST be discarded and UPDATE processing must continue.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
