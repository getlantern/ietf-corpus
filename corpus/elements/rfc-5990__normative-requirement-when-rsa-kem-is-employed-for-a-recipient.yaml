document: rfc-5990
kind: normative-requirement
summary: When RSA-KEM is employed for a recipient, the RecipientInfo alternative MUST be KeyTransRecipientInfo, with keyEncryptionAlgorithm.algorithm MUST be id-rsa-kem, keyEncryptionAlgorithm.parameters MUST be a GenericHybridParameters value, and encryptedKey MUST be the encrypted keying data output by the algorithm.
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
