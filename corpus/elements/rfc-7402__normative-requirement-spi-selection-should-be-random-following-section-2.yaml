document: rfc-7402
kind: normative-requirement
summary: SPI selection SHOULD be random, following Section 2.1 of RFC 4303. A different SPI SHOULD be used for each HIP exchange with a particular host to avoid replay attacks. When a host rekeys, the SPI MUST be changed.
section: 3.2.1
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
