document: rfc-1808
kind: interoperability-note
summary: For ftp URLs, the ';type=d' parameter to indicate a directory resource should not be used within contexts that allow relative URLs. If the retrieved directory contains relative URLs, the base URL path must include a trailing slash; using ';type=d' instead of a trailing slash creates ambiguity.
section: "5.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
