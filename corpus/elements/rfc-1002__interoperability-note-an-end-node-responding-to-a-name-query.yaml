document: rfc-1002
kind: interoperability-note
summary: An end node responding to a NAME QUERY REQUEST always sets the AA and RA bits in both positive and negative responses. An end node never sends a REDIRECT NAME QUERY RESPONSE; only an NBNS sends redirect responses.
section: 4.2.15
