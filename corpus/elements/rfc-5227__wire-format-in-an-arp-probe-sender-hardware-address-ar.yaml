document: rfc-5227
kind: wire-format
summary: 'In an ARP Probe: ''sender hardware address'' (ar$sha) MUST contain the sending interface''s hardware address; ''sender IP address'' (ar$spa) MUST be all zeroes; ''target hardware address'' (ar$tha) is ignored and SHOULD be set to all zeroes; ''target IP address'' (ar$tpa) MUST be set to the address being probed.'
section: 2.1.1
topics:
    - ip
