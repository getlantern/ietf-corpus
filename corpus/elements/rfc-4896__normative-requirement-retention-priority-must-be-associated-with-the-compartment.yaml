document: rfc-4896
kind: normative-requirement
summary: Retention priority MUST be associated with the compartment, not the piece of state. If the same state is created within a compartment with a different priority, the priority is updated rather than a new state created, and it MUST count only once against SMS.
section: "5.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
