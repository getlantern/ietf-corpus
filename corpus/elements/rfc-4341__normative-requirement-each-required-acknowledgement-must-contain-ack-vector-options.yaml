document: rfc-4341
kind: normative-requirement
summary: Each required acknowledgement MUST contain Ack Vector options that declare exactly which packets arrived and whether those packets were ECN-marked. Ack Vector coverage SHOULD generally span the receiver's entire Acknowledgement Window.
section: "6"
rfc2119_level: MUST
topics:
