document: rfc-5677
kind: normative-requirement
summary: If the MN changes its IP address (e.g., upon handover), it MUST refresh MIHF peer bindings (i.e., run the MIHF registration process). If the current Mobility Server is no longer suitable, the MN MAY perform a new discovery procedure.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
