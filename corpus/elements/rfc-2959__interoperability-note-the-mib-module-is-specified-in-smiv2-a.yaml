document: rfc-2959
kind: interoperability-note
summary: The MIB module is specified in SMIv2; a translation to SMIv1 is possible but loses Counter64 objects (such as rtpSenderPackets, rtpSenderOctets, rtpRcvrLostPackets, rtpRcvrPackets, rtpRcvrOctets) since SMIv1 has no equivalent, and machine-readable SMIv2 annotations become textual descriptions.
