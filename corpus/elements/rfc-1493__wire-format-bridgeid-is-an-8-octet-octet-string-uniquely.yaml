document: rfc-1493
kind: wire-format
summary: BridgeId is an 8-octet OCTET STRING uniquely identifying a bridge for STP. The first 2 octets (network byte order) contain the priority value; the last 6 octets contain the bridge's MAC address (typically the numerically smallest port MAC address).
