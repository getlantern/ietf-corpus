document: rfc-8780
kind: wire-format
summary: 'The Wavelength Allocation TLV (Type 10) in PCRep messages encodes: Reserved (16 bits), Flags (16 bits with M bit at bit 15 for allocation mode), Link Identifier (variable, indicating the interface), and Allocated Wavelength(s) (encoded as per Section 4.3.2). This TLV is carried as an Attribute TLV in ERO Hop Attribute subobjects.'
