document: rfc-9575
kind: normative-requirement
summary: When sending data over a medium that does not have underlying FEC (e.g., Legacy Transports such as Bluetooth 4.x), FEC per Section 5 MUST be used. FEC MUST NOT be used in Message Packs sent over Extended Transports, as those already provide lower-layer FEC.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
