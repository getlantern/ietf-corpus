document: rfc-5796
kind: normative-requirement
summary: All implementations conforming to this specification MUST support SA in transport mode to provide required IPsec security to PIM-SM link-local messages. Tunnel mode MAY also be supported, but if used, both destination and source address preservation MUST be employed.
section: "3"
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
