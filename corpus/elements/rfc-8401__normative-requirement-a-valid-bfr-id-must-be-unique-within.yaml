document: rfc-8401
kind: normative-requirement
summary: A valid BFR-id MUST be unique within the flooding scope. All BFERs/BFIRs MUST detect duplicate valid BFR-IDs for a given <MT,SD>; when detected, all advertising routers MUST be treated as if they did not advertise a valid BFR-id.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
