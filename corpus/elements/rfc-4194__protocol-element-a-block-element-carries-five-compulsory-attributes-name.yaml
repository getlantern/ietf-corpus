summary: 'A <block> element carries five compulsory attributes: ''name'' (human-readable string), ''address'' (64-bit hex start address in bytes), ''word_size'' (64-bit hex byte-count per word), ''length'' (64-bit hex word count), and ''checksum'' (20-byte SHA-1 digest in hex). The element content is the hexadecimal data.'
