document: rfc-4880
kind: interoperability-note
summary: PGP 2.6.x only accepts Version 3 signatures and only uses old-format packet headers. Software that must interoperate with PGP 2.6.x MUST use old format packets and may only generate Version 3 signatures. The One-Pass Signature packet (Tag 4) does not interoperate with PGP 2.6.x or earlier.
section: "4.2"
topics:
    - security
    - crypto
