document: rfc-9629
kind: design-rationale
summary: 'A KEM algorithm is a one-pass (store-and-forward) mechanism: the originator uses the recipient''s public key to produce a ciphertext and shared secret via Encapsulate(), while the recipient uses their private key and the ciphertext via Decapsulate(). This means originator and recipient do not need to be online simultaneously, making KEM suitable for CMS enveloped-data.'
section: "1"
topics:
