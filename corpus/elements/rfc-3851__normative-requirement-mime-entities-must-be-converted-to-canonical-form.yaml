document: rfc-3851
kind: normative-requirement
summary: MIME entities MUST be converted to canonical form before signing, enveloping, or compressing. Text entities MUST have line endings canonicalized to <CR><LF> and character sets canonicalized; multi-representation charsets such as ISO-2022 MUST use their canonical representation.
section: 3.1.1
rfc2119_level: MUST
topics:
    - email
