document: rfc-8198
kind: protocol-element
summary: Wildcard records in DNSSEC-signed zones can be used by validating resolvers to synthesize positive answers for names not explicitly present in the zone, provided the resolver can determine that the name would not exist without the wildcard match.
section: "5.3"
topics:
