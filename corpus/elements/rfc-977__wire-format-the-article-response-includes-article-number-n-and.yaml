document: rfc-977
kind: wire-format
summary: The ARTICLE response includes article number n and message-id <a> enclosed in angle brackets, derived from the article's Message-ID header (required by RFC 850). If the Message-ID header is missing, a single digit '0' should be supplied within the angle brackets.
section: 3.1.2
