summary: The ietf-ptp YANG module defines the top-level 'ptp' container with an 'instance-list' keyed by 'instance-number', grouping all PTP data sets (default-ds, current-ds, parent-ds, time-properties-ds, port-ds-list) for each Ordinary or Boundary Clock instance, plus 'transparent-clock-default-ds' and 'transparent-clock-port-ds-list' at the root for Transparent Clocks.
