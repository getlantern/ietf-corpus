document: rfc-7321
kind: normative-requirement
summary: To provide both confidentiality and authentication, an authenticated encryption transform from Section 2.1 SHOULD be used in ESP with NULL authentication. Alternatively, an ESP encryption transform and ESP authentication transform MAY be used together.
section: "3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - security
