document: rfc-9664
kind: normative-requirement
summary: A server that receives an 8-byte variant MUST respond with an 8-byte variant. A server that receives a 4-byte variant MUST treat it as specifying both LEASE and KEY-LEASE durations and MUST respond with a 4-byte variant.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
