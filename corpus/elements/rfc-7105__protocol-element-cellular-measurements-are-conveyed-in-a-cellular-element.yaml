document: rfc-7105
kind: protocol-element
summary: 'Cellular measurements are conveyed in a ''cellular'' element supporting LTE (eucid: 28-bit), UMTS (rnc: 12/16-bit, cid: 16-bit), GSM (lac: 16-bit, cid: 16-bit), and CDMA (sid: 15-bit, nid: 16-bit, baseid: 16-bit) cells. Both ''servingCell'' and multiple ''observedCell'' elements may be included; 3GPP cells are identified by MCC and MNC.'
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
