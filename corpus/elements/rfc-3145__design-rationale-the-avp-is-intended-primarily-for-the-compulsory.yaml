document: rfc-3145
kind: design-rationale
summary: The AVP is intended primarily for the compulsory tunneling case where the LAC and LNS are owned or managed by different entities, making PPP-specific disconnect information especially valuable for accounting and debugging. It has no effect on tunnel or PPP session functioning.
