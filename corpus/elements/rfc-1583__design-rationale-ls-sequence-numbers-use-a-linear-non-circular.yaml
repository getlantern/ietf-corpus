document: rfc-1583
kind: design-rationale
summary: LS sequence numbers use a linear (non-circular) signed 32-bit space from 0x80000001 to 0x7fffffff (InitialSequenceNumber to MaxSequenceNumber) to provide unambiguous ordering of LSA instances without the wraparound ambiguity present in circular sequence spaces.
