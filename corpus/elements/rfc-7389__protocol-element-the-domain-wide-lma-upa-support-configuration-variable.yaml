document: rfc-7389
kind: protocol-element
summary: The Domain-wide-LMA-UPA-Support configuration variable indicates whether all mobility entities in the PMIPv6 domain support the LMA User-Plane Address option. Its default value is zero on both LMA and MAG, and it MUST survive server reboots and service restarts and MUST be consistent across all LMA and MAG entities in the domain.
section: "5"
topics:
