document: rfc-2065
kind: protocol-element
summary: The KEY resource record (type 25) stores a public key associated with a DNS name. It includes a 16-bit flags field, an 8-bit protocol octet, an 8-bit algorithm number, and the variable-length public key. It can represent zone keys, host/entity keys, or user keys, with flag bits distinguishing these roles.
section: "3"
