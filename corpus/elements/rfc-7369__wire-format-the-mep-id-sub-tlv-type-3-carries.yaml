document: rfc-7369
kind: wire-format
summary: The MEP ID Sub-TLV (Type 3) carries a 16-bit Local MEP ID, 1-bit Transmit (T) flag, 1-bit Receive (R) flag, 14 reserved bits, then a 16-bit Remote MEP ID with the same T/R/Reserved layout. MEP IDs are integers in range 1–8191.
section: 3.3.3
