document: rfc-1629
kind: interoperability-note
summary: IS-IS allows an area to carry multiple area addresses simultaneously to support graceful address changes, area merges, and area splits. A Level 1 IS accepts a neighbor if any area addresses overlap, enabling incremental migration where both old and new addresses remain valid until all nodes have transitioned.
section: "3.2"
topics:
    - routing
