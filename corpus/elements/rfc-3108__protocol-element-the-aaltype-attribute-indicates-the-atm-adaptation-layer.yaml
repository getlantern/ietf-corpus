document: rfc-3108
kind: protocol-element
summary: 'The ''aalType'' attribute indicates the ATM Adaptation Layer in use. Valid string values are: ''AAL1'', ''AAL1_SDT'', ''AAL1_UDT'', ''AAL2'', ''AAL3/4'', ''AAL5'', and ''USER_DEFINED_AAL''. This attribute may be omitted when its value is redundant with the ''m'' line transport field.'
section: 5.6.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
