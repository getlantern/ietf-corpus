document: rfc-7110
kind: wire-format
summary: The IPv4 RSVP Tunnel sub-TLV (Type 26) carries a 4-octet IPv4 tunnel end point address, 2-octet Flags, 2-octet Tunnel ID, 4-octet Extended Tunnel ID, and 4-octet IPv4 tunnel sender address. It is derived from the RSVP IPv4 FEC TLV in RFC 4379 but omits the LSP-ID field and adds a Flags field with P (Primary) and S (Secondary) bits.
section: 4.3.1
topics:
    - mpls
