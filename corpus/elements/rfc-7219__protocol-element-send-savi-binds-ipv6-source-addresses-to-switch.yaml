document: rfc-7219
kind: protocol-element
summary: SEND SAVI binds IPv6 source addresses to switch ports (binding anchors) using SEND-validated DAD_NSOL, DAD_NADV, NUD_NSOL, and NUD_NADV messages. Data packets are validated by checking consistency against these bindings, and hosts are prevented from generating packets with off-link IPv6 source addresses.
