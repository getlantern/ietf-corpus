document: rfc-6350
kind: protocol-element
summary: The PREF parameter (optional) indicates the preferred instance of a property. Its value MUST be an integer between 1 and 100, where lower values indicate higher preference. When absent, the instance is treated as least preferred. The value is relative only to other instances of the same property in the same vCard.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
