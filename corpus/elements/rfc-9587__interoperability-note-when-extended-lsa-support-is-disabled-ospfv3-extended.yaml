document: rfc-9587
kind: interoperability-note
summary: When extended-lsa-support is disabled, OSPFv3 Extended LSAs may still be advertised in Extended LSA Sparse Mode to support incrementally deployed features, as described in Section 6.2 of RFC 8362. This allows coexistence during phased deployments.
