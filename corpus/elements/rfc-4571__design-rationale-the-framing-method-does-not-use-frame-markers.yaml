document: rfc-4571
kind: design-rationale
summary: The framing method does not use frame markers (a preceding octet of constant value) that would aid LENGTH-field error detection. Instead, receivers are directed to monitor predictable RTP/RTCP header fields. This reflects the design inherited from earlier RTP/AVP versions.
