document: rfc-8441
kind: design-rationale
summary: Using a SETTINGS parameter to opt into the Extended CONNECT feature avoids breaking non-supporting peers. Without the SETTINGS negotiation, a non-supporting server would detect the :protocol pseudo-header as a malformed request and generate a stream error.
section: "3"
topics:
