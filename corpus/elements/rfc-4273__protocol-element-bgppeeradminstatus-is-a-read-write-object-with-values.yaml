document: rfc-4273
kind: protocol-element
summary: bgpPeerAdminStatus is a read-write object with values stop(1) and start(2). Transitioning from stop to start issues a BGP Manual Start Event; start to stop issues a Manual Stop Event, enabling operator-initiated peer restarts via SNMP.
section: "4"
topics:
    - bgp
    - routing
    - snmp
