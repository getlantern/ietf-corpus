document: rfc-2406
kind: wire-format
summary: 'The ESP packet consists of: SPI (32-bit), Sequence Number (32-bit), Payload Data (variable), Padding (0-255 bytes), Pad Length (8-bit), Next Header (8-bit), and optional Authentication Data (variable). The SPI and Sequence Number are covered by authentication; Payload Data through Next Header are covered by both authentication and encryption.'
section: "2"
topics:
