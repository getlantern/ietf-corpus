document: rfc-7791
kind: normative-requirement
summary: When the IKE SA is cloned, peers MUST NOT transfer existing Child SAs created by the old IKE SA to the newly created IKE SA. All signaling for those Child SAs continues over the old IKE SA.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - vpn
