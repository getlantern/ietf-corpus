document: rfc-7005
kind: normative-requirement
summary: The DJB Metrics Block MUST be sent in the same compound RTCP packet as the Measurement Information Block. If the measurement interval is not received in the same compound RTCP packet, the DJB Metrics Block MUST be discarded.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
