document: rfc-8668
kind: normative-requirement
summary: When the SID/Index/Label field encodes a local label (3 octets, 20 rightmost bits used for the label value), the V- and L-Flags MUST be set. When it encodes a 4-octet index defining the offset in the SID/Label space, V- and L-Flags MUST be unset.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
