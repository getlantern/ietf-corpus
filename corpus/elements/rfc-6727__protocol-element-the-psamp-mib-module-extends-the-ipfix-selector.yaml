summary: The PSAMP-MIB module extends the IPFIX-SELECTOR-MIB by registering six new packet Selector function subtrees beneath ipfixSelectorFunctions (OIDs 2–7). Each subtree contains an availability object and, for parameterized functions, a parameter set table indexed by a local integer.
