document: rfc-2932
kind: protocol-element
summary: ipMRouteRtType is an INTEGER with values unicast(1) or multicast(2) indicating whether the route placed in the multicast RIB originated from the unicast RIB (due to local configuration, e.g., PIM over RIP) or was explicitly added by a multicast routing protocol (e.g., DVMRP, Multiprotocol BGP).
section: "4"
topics:
