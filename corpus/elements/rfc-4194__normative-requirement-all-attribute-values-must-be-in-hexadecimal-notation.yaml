document: rfc-4194
kind: normative-requirement
summary: All attribute values MUST be in hexadecimal notation, with the sole exception of the 'name' attribute in Dump and Block tags. Leading zeros MAY be omitted in all attributes except 'checksum', which MUST NOT omit leading zeros.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
