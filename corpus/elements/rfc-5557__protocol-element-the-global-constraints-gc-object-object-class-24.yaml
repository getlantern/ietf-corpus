document: rfc-5557
kind: protocol-element
summary: The GLOBAL CONSTRAINTS (GC) Object (Object-Class 24, Object-Type 1) is used in PCReq messages to specify global constraints applied to all individual path computations in a GCO request. It carries MH (Max Hop), MU (Max Utilization), mU (min Utilization), and OB (Overbooking factor) fields, plus optional TLVs.
