document: rfc-1757
kind: design-rationale
summary: 'History sampling should begin so that a new sample starts at the top of each clock hour, enabling user-friendly reports and cross-probe comparisons. Probes are encouraged to create two default history entries per interface at initialization: one with a ~30-second interval and one with a ~30-minute interval.'
section: 2.3.2
topics:
    - snmp
    - measurement
