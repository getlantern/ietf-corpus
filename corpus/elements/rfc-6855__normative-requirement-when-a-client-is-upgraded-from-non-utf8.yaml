document: rfc-6855
kind: normative-requirement
summary: When a client is upgraded from non-"UTF8=ACCEPT"-aware to aware, it MUST discard its cache of messages downloaded from the server, to cope with the case where a compliant server returns the same UIDVALIDITY to both legacy and UTF8=ACCEPT-aware clients.
section: "7"
rfc2119_level: MUST
topics:
    - email
