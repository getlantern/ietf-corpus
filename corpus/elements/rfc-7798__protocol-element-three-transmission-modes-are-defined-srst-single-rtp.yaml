document: rfc-7798
kind: protocol-element
summary: 'Three transmission modes are defined: SRST (single RTP stream on single transport), MRST (multiple RTP streams on single transport), and MRMT (multiple RTP streams on multiple transports). In MRST/MRMT, different SSRCs identify each sub-layer''s stream, and receivers must correctly associate SSRCs belonging to the same bitstream.'
