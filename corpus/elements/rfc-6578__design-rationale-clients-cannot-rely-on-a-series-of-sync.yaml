document: rfc-6578
kind: design-rationale
summary: Clients cannot rely on a series of sync-level '1' reports at multiple collection levels to track all changes, because changes to members of a collection do not necessarily change the collection's own ETag. A sync-level 'infinite' report must be used instead for complete tracking.
section: 3.5.1
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
