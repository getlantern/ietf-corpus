document: rfc-1573
kind: design-rationale
summary: The ifTable was not split into separate tables for packet-oriented vs. other interfaces. Instead, multiple SNMPv2 compliance statements with distinct object groups (ifGeneralGroup, ifPacketGroup, ifFixedLengthGroup) allow each sub-layer type to declare applicable objects without requiring agent rewrites.
