document: rfc-4252
kind: normative-requirement
summary: The 'none' authentication method MUST NOT be listed as supported by the server. The server MUST always reject a 'none' request unless the client is to be granted access without any authentication, in which case the server MUST accept it.
section: "4"
rfc2119_level: MUST NOT
topics:
    - security
