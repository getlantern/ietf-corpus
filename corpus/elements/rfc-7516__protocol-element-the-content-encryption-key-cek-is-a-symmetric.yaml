document: rfc-7516
kind: protocol-element
summary: The Content Encryption Key (CEK) is a symmetric key for the AEAD algorithm used to encrypt the plaintext. For Key Encryption, Key Wrapping, and Key Agreement with Key Wrapping modes, the CEK is randomly generated; for Direct Encryption, the CEK is the shared symmetric key itself.
