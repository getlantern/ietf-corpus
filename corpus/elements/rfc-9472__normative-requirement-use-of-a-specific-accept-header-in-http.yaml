document: rfc-9472
kind: normative-requirement
summary: Use of a specific Accept header in HTTP or the Accept Option in CoAP when retrieving SBOMs is NOT RECOMMENDED, because IoT devices have limited capabilities. Backend tooling is expected to handle multiple formats.
