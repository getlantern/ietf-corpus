document: rfc-4234
kind: protocol-element
summary: Core rule CRLF is defined as CR LF (%x0D %x0A), the Internet standard newline. CR is %x0D; LF is %x0A. WSP is SP / HTAB (%x20 / %x09). LWSP allows linear white space past a newline as *(WSP / CRLF WSP).
section: B.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
