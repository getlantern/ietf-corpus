document: rfc-9175
kind: design-rationale
summary: The Echo option is introduced rather than relying on echoing freshness indicators in CoAP payloads because payload-based approaches only work for methods and response codes that have a defined payload. The Echo option provides a convention that works for all methods and response codes.
section: "2.2"
topics:
    - security
