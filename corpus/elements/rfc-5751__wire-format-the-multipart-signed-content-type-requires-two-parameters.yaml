document: rfc-5751
kind: wire-format
summary: 'The multipart/signed Content-Type requires two parameters: ''protocol'' MUST be "application/pkcs7-signature" (quoted because ''/'' must be quoted in MIME), and ''micalg'' specifies the digest algorithm(s) used. micalg values include ''md5'', ''sha-1'', ''sha-224'', ''sha-256'', ''sha-384'', ''sha-512''. Multiple algorithms are comma-separated.'
section: 3.4.3.2
