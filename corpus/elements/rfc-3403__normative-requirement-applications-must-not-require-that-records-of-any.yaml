document: rfc-3403
kind: normative-requirement
summary: Applications MUST NOT require that records of any type be in the Additional Information section of any DNS response in order for clients to function; all applications must handle responses from nameservers that never fill in the Additional Information section.
section: 4.2.2
rfc2119_level: MUST NOT
topics:
    - dns
