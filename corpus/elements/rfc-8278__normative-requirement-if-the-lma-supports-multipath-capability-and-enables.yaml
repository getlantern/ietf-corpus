document: rfc-8278
kind: normative-requirement
summary: If the LMA supports multipath capability and enables it for a mobile node's session, the LMA MUST include the Multipath Binding option (without the MAG-NAI option) in the corresponding PBA reply.
section: "4.4"
rfc2119_level: MUST
topics:
    - multipath
    - mobility
