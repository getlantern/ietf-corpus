document: rfc-6361
kind: wire-format
summary: TNP packets (PPP Protocol field 005d) carry exactly one TRILL-encapsulated packet in the PPP Information field. The format is identical to the TRILL Ethernet encapsulation (RFC 6325 Section 4.1) except that the Outer MAC header and Ethertype are replaced by PPP headers and Protocol Field, and the Ethernet FCS is absent.
section: "2.2"
topics:
    - routing
