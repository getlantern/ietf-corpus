document: rfc-3080
kind: security-consideration
summary: Before performing any task associated with a message, each channel SHOULD apply appropriate access control based on the authenticated identity and privacy level associated with the BEEP session. Authorization is an internal matter for each peer; unauthorized operations may be rejected with error code 530.
section: "9"
rfc2119_level: SHOULD
topics:
