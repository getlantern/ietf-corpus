document: rfc-5958
kind: design-rationale
summary: The name 'PrivateKeyInfo' was changed to 'OneAsymmetricKey' to reflect the addition of the optional publicKey field, allowing both parts of an asymmetric key pair to be conveyed together. Not all algorithms will use both fields, but the publicKey field was added for completeness.
section: "1.3"
topics:
