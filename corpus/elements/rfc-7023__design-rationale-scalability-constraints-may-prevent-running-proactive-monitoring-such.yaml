document: rfc-7023
kind: design-rationale
summary: Scalability constraints may prevent running proactive monitoring such as CCMs with transmission enabled at a PE to detect EVC failures across the PW domain. This motivates the need for network-driven alarm mappings between the NS and PW domains rather than relying solely on end-to-end proactive OAM.
section: "2"
topics:
