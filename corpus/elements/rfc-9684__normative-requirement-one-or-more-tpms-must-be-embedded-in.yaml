document: rfc-9684
kind: normative-requirement
summary: One or more TPMs MUST be embedded in a composite device that provides attestation Evidence via the YANG module defined in this document. The device must include either TPM 1.2 or TPM 2.0 hardware, along with a corresponding TPM Software Stack (TSS).
section: "2"
rfc2119_level: MUST
topics:
    - yang
    - security
