document: rfc-2024
kind: interoperability-note
summary: A transport connection in 'connected' state with a zero-length dlswTConnOperPartnerVersion indicates the partner is a pre-standard RFC 1434+ DLSw node, not an AIW Version 1 DLSw Standard node. Managers can use this distinction to infer whether xBusy or standard pacing flow control is in use.
section: 2.5.3.4
topics:
    - snmp
