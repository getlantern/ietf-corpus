document: rfc-9961
kind: wire-format
summary: 'The SR MPLS P2MP Policy Tree Instance sub-TLV value field contains: Address Family (2 octets, IPv4/IPv6 only), Address Length (1 octet, 4 for IPv4 or 16 for IPv6), Reserved (1 octet, must be zero), Root (variable, 4 or 16 octets), Tree-ID (4 octets), and Instance-ID (2 octets). This format follows Section 2.3 of RFC 9960.'
section: 3.2.1.1
topics:
    - mpls
    - measurement
