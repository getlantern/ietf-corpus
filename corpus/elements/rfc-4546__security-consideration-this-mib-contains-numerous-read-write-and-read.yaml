document: rfc-4546
kind: security-consideration
summary: This MIB contains numerous read-write and read-create objects controlling downstream frequency, upstream channel parameters, modulation profiles, and power levels; unauthorized writes could disrupt cable service for large subscriber populations. SNMPv3 with authentication and privacy is strongly recommended.
