document: rfc-9605
kind: interoperability-note
summary: In simulcast, each of the N encoded representations of the same input image is independently encrypted by the SFrame layer and assigned a unique CTR value. SFUs can forward any simulcast layer without needing to decrypt or re-encrypt the payload.
section: 6.1.2
topics:
    - realtime
    - security
