document: rfc-7118
kind: normative-requirement
summary: SIP WebSocket Clients and SIP WebSocket Servers MUST accept both text and binary WebSocket frames. If there is at least one non-UTF-8 symbol in the SIP message, the whole message MUST be sent within a WebSocket binary message.
section: "4.2"
rfc2119_level: MUST
topics:
    - websocket
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
