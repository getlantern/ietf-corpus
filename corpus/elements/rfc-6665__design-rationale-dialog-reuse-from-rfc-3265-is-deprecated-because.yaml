document: rfc-6665
kind: design-rationale
summary: Dialog reuse from RFC 3265 is deprecated because it proved exceedingly confusing and error-prone in implementation (RFC 5057 clarifications remained insufficient). The GRUU mechanism (RFC 5627) provides an unambiguous alternative for targeting subscriptions at specific devices.
section: "4.5"
topics:
