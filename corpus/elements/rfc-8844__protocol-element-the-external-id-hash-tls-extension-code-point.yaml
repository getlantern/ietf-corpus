document: rfc-8844
kind: protocol-element
summary: The 'external_id_hash' TLS extension (code point 55) carries a SHA-256 hash of the identity assertion that the sending endpoint has asserted to its peer. Both peers include a hash of their own identity assertion. It is sent in ClientHello and, for TLS 1.3 servers, in EncryptedExtensions.
section: "3.2"
topics:
    - tls
    - security
    - webrtc
    - sip
