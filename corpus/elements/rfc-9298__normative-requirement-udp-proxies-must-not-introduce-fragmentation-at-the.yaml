document: rfc-9298
kind: normative-requirement
summary: UDP proxies MUST NOT introduce fragmentation at the IP layer when forwarding HTTP Datagrams to a UDP socket. In IPv4, the Don't Fragment (DF) bit MUST be set, if possible, to prevent path fragmentation.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - udp
    - ip
