document: rfc-4213
kind: interoperability-note
summary: IPv6/IPv4 nodes must provide resolver libraries capable of handling both A and AAAA DNS records. The lookup of A vs. AAAA records is independent of whether DNS packets travel over IPv4 or IPv6, and DNS servers need not know the IP version capabilities of the requesting node.
section: "2.2"
topics:
    - dns
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
