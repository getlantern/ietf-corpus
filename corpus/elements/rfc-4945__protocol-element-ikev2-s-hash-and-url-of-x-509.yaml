document: rfc-4945
kind: protocol-element
summary: IKEv2's 'Hash and URL of X.509 Certificate' CERT type allows the peer to send a certificate hash plus retrieval URL instead of the certificate itself, suited for low-memory/low-bandwidth devices. The sender MUST support http:// and MUST NOT require any specific url-path form; ftp:// MAY be supported.
section: 4.3.1
topics:
    - ipsec
    - pkix
