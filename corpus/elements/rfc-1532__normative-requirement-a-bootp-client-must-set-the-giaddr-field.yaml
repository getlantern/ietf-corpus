document: rfc-1532
kind: normative-requirement
summary: A BOOTP client MUST set the 'giaddr' field to 0.0.0.0 in all BOOTREQUEST messages it generates. A client MUST NOT interpret the 'giaddr' field in a BOOTREPLY as an IP router address and SHOULD completely ignore it.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
