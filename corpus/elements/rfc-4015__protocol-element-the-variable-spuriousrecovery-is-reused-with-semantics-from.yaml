document: rfc-4015
kind: protocol-element
summary: The variable SpuriousRecovery is reused with semantics from RFC 3522. The constant LATE_SPUR_TO (set to -1) is defined as an additional value, set when spurious retransmit detection is based on the ACK for the retransmit (e.g., DSACK-based detection per RFC 3708), as opposed to an ACK for an original transmit.
section: "2"
