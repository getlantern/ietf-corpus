document: rfc-3890
kind: interoperability-note
summary: When an ALG translates SDP between IPv4 and IPv6 domains, it may change the 'c=' address type without updating the bandwidth value, causing clients to underestimate required bit-rate. TIAS avoids this problem since its value does not include IP-version-specific overhead.
section: "3.1"
topics:
    - realtime
    - ip
    - nat
