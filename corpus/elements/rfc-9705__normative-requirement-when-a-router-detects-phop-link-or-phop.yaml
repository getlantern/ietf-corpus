document: rfc-9705
kind: normative-requirement
summary: When a router detects PHOP link or PHOP node failure for an LSP and is NOT an MP for the LSP, it MUST send a Conditional PathTear and delete the PSB and RSB states corresponding to the LSP.
section: 4.3.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
