document: rfc-2911
kind: protocol-element
summary: The Natural Language Override mechanism allows individual 'text' or 'name' attribute values to carry an explicit language tag using 'textWithLanguage' or 'nameWithLanguage' encoding when the value's language differs from the 'attributes-natural-language' operation attribute. The IPP object MUST store and return the associated natural language for all client-supplied attributes.
section: 4.1.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
