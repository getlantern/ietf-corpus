document: rfc-3161
kind: interoperability-note
summary: For email transport, time-stamp messages use MIME types application/timestamp-query (.TSQ) and application/timestamp-reply (.TSR) with base64 Content-Transfer-Encoding. Implementations SHOULD include optional 'name' and 'filename' parameters, with filenames limited to 8+3 characters.
section: "3.1"
topics:
