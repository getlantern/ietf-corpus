document: rfc-5870
kind: interoperability-note
summary: Legacy implementations encountering unknown 'geo' URI parameters can only determine equality if the same set of unknown parameter names appears in both URIs with bitwise-identical (post percent-decode) values; otherwise, the comparison result is undefined. Future parameter designers should account for this when choosing comparison rules.
section: 3.4.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
