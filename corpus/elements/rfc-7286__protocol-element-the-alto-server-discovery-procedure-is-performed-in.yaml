document: rfc-7286
kind: protocol-element
summary: 'The ALTO server discovery procedure is performed in two steps: (1) retrieve a DNS domain name per interface/address-family via local configuration or DHCP, and (2) perform a U-NAPTR/DDDS lookup on that domain name to obtain one or more HTTP(S) URIs for the ALTO server''s Information Resource Directory (IRD).'
section: "2"
topics:
