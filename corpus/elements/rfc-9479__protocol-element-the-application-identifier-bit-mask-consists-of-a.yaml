document: rfc-9479
kind: protocol-element
summary: The Application Identifier Bit Mask consists of a Standard Application Bit Mask (SABM) and a User-Defined Application Bit Mask (UDABM), each preceded by a one-octet length+flag field. The SABM defines R-bit (RSVP-TE), S-bit (SR Policy), and F-bit (LFA); the UDABM is unmanaged by IANA. Both are used in the ASLA sub-TLV and ASLA SRLG TLV.
section: "4.1"
topics:
    - routing
