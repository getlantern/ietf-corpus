document: rfc-9692
kind: normative-requirement
summary: If a link in _ThreeWay_ state needs to stop supporting an address family, change local addresses, or disable IPv4 forwarding, it MUST tear down and rebuild the adjacency, and MUST remove all state stored about the remote side including LIE source addresses.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
