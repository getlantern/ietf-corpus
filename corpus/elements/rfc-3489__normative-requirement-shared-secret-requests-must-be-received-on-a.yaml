document: rfc-3489
kind: normative-requirement
summary: Shared Secret Requests MUST be received on a TLS connection; if not, the server MUST generate a Shared Secret Error Response with ERROR-CODE 433. Client TLS authentication MUST NOT be performed to avoid computational DoS attacks.
section: "8.2"
rfc2119_level: MUST
topics:
    - nat
    - tls
    - security
