document: rfc-2215
kind: design-rationale
summary: Characterization parameters are defined as conceptually 'per-next-hop' rather than 'per-interface' or 'per-network-element' because they characterize properties of a specific path through the internetwork. In shared-media or large-cloud scenarios, elements may need to provide different values for different next-hops.
