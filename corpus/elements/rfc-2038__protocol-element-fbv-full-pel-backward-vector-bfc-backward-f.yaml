document: rfc-2038
kind: protocol-element
summary: FBV (full_pel_backward_vector), BFC (backward_f_code), FFV (full_pel_forward_vector), and FFC (forward_f_code) are copied from the most recent picture header into the RTP video-specific header. These values enable Picture_Header reconstruction after packet loss by providing the necessary motion vector context at each packet.
section: "3.4"
