document: rfc-5651
kind: protocol-element
summary: The Transport Object Identifier (TOI) field is 0, 16, 32, 48, 64, 80, 96, or 112 bits long (32*O + 16*H bits). It identifies which object within the session the packet pertains to and MUST be present in all packets if more than one object is transmitted in a session.
section: "5.1"
topics:
    - multicast
