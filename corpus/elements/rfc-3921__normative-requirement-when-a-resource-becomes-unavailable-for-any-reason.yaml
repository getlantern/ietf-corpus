document: rfc-3921
kind: normative-requirement
summary: When a resource becomes unavailable for any reason, the user's server MUST broadcast unavailable presence to all contacts with subscription 'from' or 'both', to other available resources of the user, and to any entities that received directed presence during the session.
section: 5.1.5
rfc2119_level: MUST
