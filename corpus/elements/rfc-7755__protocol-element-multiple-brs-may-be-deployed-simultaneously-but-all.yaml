document: rfc-7755
kind: protocol-element
summary: 'Multiple BRs may be deployed simultaneously, but all must share the same translation prefix and an identical EAM Table. This enables per-packet ECMP load balancing and stateless high availability: if one BR fails, routing protocols automatically redirect traffic to an alternate BR without disrupting existing flows beyond normal IP rerouting.'
