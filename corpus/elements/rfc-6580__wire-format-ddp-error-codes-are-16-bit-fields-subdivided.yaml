document: rfc-6580
kind: wire-format
summary: 'DDP error codes are 16-bit fields subdivided into: a 4-bit Layer (fixed at 0x1), a 4-bit Error Type, and an 8-bit Error Code. Unlike RDMAP errors, a numeric Error Code is required for all DDP registry entries except the Lower Layer Protocol reservation entry, which uses ''ALL''.'
section: "3.2"
