document: rfc-4590
kind: normative-requirement
summary: When the RADIUS client receives Access-Challenge attributes Digest-Qop, Digest-Algorithm, Digest-Domain, and Digest-Opaque along with a nonce, it MUST use them when constructing the WWW-Authenticate or Proxy-Authenticate header.
section: 2.1.5
rfc2119_level: MUST
topics:
