document: rfc-4291
kind: normative-requirement
summary: All interfaces are required to have at least one Link-Local unicast address. A host must recognize its Link-Local addresses, configured unicast/anycast addresses, the loopback address, All-Nodes multicast addresses, Solicited-Node multicast addresses, and all other joined multicast groups.
section: "2.8"
rfc2119_level: REQUIRED
topics:
