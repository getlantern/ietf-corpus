document: rfc-8766
kind: protocol-element
summary: 'Data translation rules map between the Unicast DNS delegated subdomain and the Multicast DNS ''.local'' namespace. Owner names and RDATA names ending in ''.local'' are translated: host names (targets of A/AAAA records) go to the LDH subdomain; all other names go to the rich-text subdomain.'
section: "5.5"
