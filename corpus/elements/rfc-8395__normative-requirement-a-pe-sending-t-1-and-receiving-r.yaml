document: rfc-8395
kind: normative-requirement
summary: A PE sending T=1 and receiving R=1 MUST include a flow label in the PW packet. With any other combination of T and R bits, a PE MUST NOT include a flow label in the PW packet.
section: "3"
rfc2119_level: MUST
