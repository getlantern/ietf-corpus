document: rfc-2631
kind: security-consideration
summary: Static Diffie-Hellman keys are vulnerable to small subgroup attacks [LAW98]. This affects both sides in Static-Static mode and the receiver in Ephemeral-Static mode. Mitigations include public key validation per Section 2.1.5 or using key generation methods resistant to this attack [LL97].
section: Security Considerations
topics:
    - crypto
    - security
