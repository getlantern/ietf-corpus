document: rfc-9756
kind: interoperability-note
summary: A PCEP implementation that receives an experimental Error-Type (252-255) but does not recognize it will treat the error as it would treat any other unknown Error-Type. Per RFC 5440, an implementation notified of a PCEP error will normally close the PCEP session; implementations are not required to take specific action based on Error-Types but may log for diagnostics.
section: "3.2"
topics:
    - routing
    - mpls
