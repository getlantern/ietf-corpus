document: rfc-4355
kind: security-consideration
summary: 'Sending an SMS, EMS, or MMS to certain special service numbers may trigger a subscription contract with premium charges. It is critical that end terminals present the destination tel: URI before sending via sms:tel, ems:tel, or mms:tel Enumservices to let users cancel.'
