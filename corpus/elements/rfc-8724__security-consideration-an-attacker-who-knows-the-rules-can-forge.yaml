document: rfc-8724
kind: security-consideration
summary: An attacker who knows the Rules can forge a SCHC Packet. Depending on CDAs used (e.g., not-sent with ignore MO), the decompressed packet may differ from what the original sender would have produced. Network access to SCHC devices should be restricted to legitimate devices.
section: 12.1.1
topics:
    - security
    - ip
