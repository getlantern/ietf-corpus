document: rfc-6325
kind: wire-format
summary: 'A TRILL Data frame on an Ethernet link is structured as: Outer Ethernet Header (with TRILL Ethertype), TRILL Header, Inner Ethernet Header (original frame''s MAC addresses and VLAN tag), Ethernet Payload, and a new FCS. The outer header carries the next-hop RBridge and transmitting RBridge MAC addresses.'
