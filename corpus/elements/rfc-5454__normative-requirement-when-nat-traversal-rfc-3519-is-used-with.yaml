document: rfc-5454
kind: normative-requirement
summary: When NAT traversal (RFC 3519) is used with a private CoA, the next header field of the Mobile Tunnel Data message MUST be set to the IPv6 value, and the encapsulation field of the UDP Tunnel Request Extension MUST be set to zero.
section: "3.9"
rfc2119_level: MUST
topics:
