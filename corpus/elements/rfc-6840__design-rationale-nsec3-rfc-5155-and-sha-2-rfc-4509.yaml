document: rfc-6840
kind: design-rationale
summary: NSEC3 (RFC 5155) and SHA-2 (RFC 4509, RFC 5702) are elevated to core DNSSEC protocol documents because a number of highly visible zones use them; validators not supporting NSEC3 will be unable to validate large portions of DNS space.
