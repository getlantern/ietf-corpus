document: rfc-2562
kind: normative-requirement
summary: In order to generate timestamp F, a TN3270E server MUST ensure that each measured transaction specifies DR and that the TN3270E RESPONSES function has been negotiated with the client. If the SNA host did not request DR, the server adds its own DR request to enable timestamp F.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
