document: rfc-4505
kind: security-consideration
summary: If anonymous users have both read and write access to the same area, the server can be used as an anonymous communication channel. The 'drop box' model should be implemented to forbid anonymous read access to areas accepting anonymous submissions.
section: "5"
topics:
