document: rfc-8038
kind: normative-requirement
summary: When using mibObjectValueRow or mibObjectValueTable, all INDEX fields defined in the INDEX clause of the conceptual row MUST be present as Scope Fields in the same order as the INDEX clause; the full OID of the SEQUENCE entry (not the SEQUENCE OF table) MUST be exported.
section: 5.8.2
rfc2119_level: MUST
