document: rfc-1647
kind: design-rationale
summary: TN3270E introduces separate terminal and printer device pools (generic vs. specific, with optional partner/paired printers) to prevent terminals with host-application significance from being 'accidentally' consumed by generic session requests, while still allowing specific requests to draw from either pool.
