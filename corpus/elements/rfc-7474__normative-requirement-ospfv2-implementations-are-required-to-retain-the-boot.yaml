document: rfc-7474
kind: normative-requirement
summary: OSPFv2 implementations are REQUIRED to retain the boot count in non-volatile storage for the entire deployment life of the OSPF router, so that the 64-bit sequence number's strictly increasing property is preserved across cold restarts.
section: "2"
rfc2119_level: REQUIRED
topics:
    - routing
    - security
