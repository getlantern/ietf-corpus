document: rfc-3280
kind: normative-requirement
summary: The issuer field MUST contain a non-empty distinguished name. Conforming implementations MUST be prepared to receive issuer and subject names containing country, organization, organizational-unit, DN qualifier, state or province name, common name, serial number, and domainComponent attribute types.
section: 4.1.2.4
rfc2119_level: MUST
