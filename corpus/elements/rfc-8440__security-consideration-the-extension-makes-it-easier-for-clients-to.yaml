document: rfc-8440
kind: security-consideration
summary: The extension makes it easier for clients to overload the server by requesting MYRIGHTS information for a large number of mailboxes in one command. Server implementations must ensure they can still serve other IMAP connections and yield execution when necessary during large MYRIGHTS retrievals.
section: "6"
topics:
    - email
    - security
