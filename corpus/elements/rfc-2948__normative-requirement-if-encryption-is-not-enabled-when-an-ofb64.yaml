document: rfc-2948
kind: normative-requirement
summary: If encryption is not enabled when an OFB64_IV command arrives, the machine must be re-initialized after the next START command, using the keyid from that START and the IV from the OFB64_IV command.
section: "3"
rfc2119_level: MUST
topics:
