document: rfc-9853
kind: privacy-consideration
summary: When using DTLS 1.3, peers SHOULD avoid reusing the same CID on multiple network paths, especially during connection migration or new path probing, as an adversary can otherwise correlate communication across paths. Endpoints should proactively request new CIDs via RequestConnectionId before the spare pool is depleted.
section: "9"
rfc2119_level: SHOULD
topics:
    - tls
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
