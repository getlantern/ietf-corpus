document: rfc-5840
kind: normative-requirement
summary: The recipient MUST ensure the Encrypted Payload (E) flag is consistent with the negotiated SA policy and MUST drop the incoming packet if inconsistent. E=1 means the ESP payload is encrypted; E=0 means integrity-only ESP.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
