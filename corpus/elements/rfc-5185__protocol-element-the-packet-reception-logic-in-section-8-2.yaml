document: rfc-5185
kind: protocol-element
summary: The packet reception logic in Section 8.2 of RFC 2328 is extended so that an OSPF packet is accepted if the Area ID in the header matches the configured area for a multi-area adjacency. The packet is then associated with that multi-area adjacency for further processing.
section: "2.3"
topics:
    - routing
