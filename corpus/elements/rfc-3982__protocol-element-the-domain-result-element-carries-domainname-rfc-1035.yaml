document: rfc-3982
kind: protocol-element
summary: 'The <domain> result element carries: domainName (RFC 1035 DNS name), optional idn (nameprep form), domainHandle, nameServer references (must be <host>), registrant and contact role references (must be <contact>), a <status> block with up to nine mutually exclusive status values, domainVariant, registrationReference, registry, registrar, and multiple datetime fields for lifecycle tracking.'
