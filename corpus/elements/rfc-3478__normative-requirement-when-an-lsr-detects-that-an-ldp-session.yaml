document: rfc-3478
kind: normative-requirement
summary: When an LSR detects that an LDP session with a neighbor went down, and the neighbor had advertised FT capability, the LSR SHOULD retain the label-FEC bindings received over that session (marking them stale) rather than discarding them immediately, to allow graceful re-synchronization.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
