document: rfc-9915
kind: protocol-element
summary: An Identity Association (IA) groups addresses (IA_NA) or delegated prefixes (IA_PD) assigned to a client under an IAID. Each IA_NA must be associated with exactly one interface; IA_PD may be associated with the client, a set of interfaces, or a single interface.
