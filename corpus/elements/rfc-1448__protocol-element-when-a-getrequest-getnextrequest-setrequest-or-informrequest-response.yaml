document: rfc-1448
kind: protocol-element
summary: When a GetRequest, GetNextRequest, SetRequest, or InformRequest response would exceed the message size limit, an alternate Response-PDU with error-status 'tooBig', error-index zero, and empty variable-bindings is sent. If even the tooBig response exceeds the size limit, it is silently discarded.
section: 4.2.1
topics:
    - snmp
