document: rfc-5130
kind: normative-requirement
summary: If an implementation needs to change tag values when propagating TLVs between levels at an area boundary, the TLV(s) SHOULD be copied to the newly generated Level-1 or Level-2 LSP, at which point sub-TLV contents MAY change as dictated by policy.
section: "4"
rfc2119_level: SHOULD
topics:
    - routing
