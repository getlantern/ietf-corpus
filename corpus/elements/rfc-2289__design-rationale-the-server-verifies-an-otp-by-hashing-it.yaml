document: rfc-2289
kind: design-rationale
summary: The server verifies an OTP by hashing it once and comparing to the stored previous OTP (Lamport's technique), meaning the server stores only the hash of the next expected password and never the secret pass-phrase, so no secret information need be stored on the server.
