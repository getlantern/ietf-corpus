document: rfc-7222
kind: normative-requirement
summary: When the LMA receives a Proxy Binding Update with Handoff Indicator (HI) hint = 3 (inter-MAG handover), the LMA MUST include in the Proxy Binding Acknowledgement all QoS option(s) for each QoS Service Request that is active for that mobile node, enabling the new MAG to allocate QoS resources on the new path.
section: "5.1"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
