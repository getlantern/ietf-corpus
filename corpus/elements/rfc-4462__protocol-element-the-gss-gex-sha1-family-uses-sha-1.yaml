document: rfc-4462
kind: protocol-element
summary: The gss-gex-sha1-* family uses SHA-1 and the group-exchange mechanism from RFC 4419, adding SSH_MSG_KEXGSS_GROUPREQ (byte 40) and SSH_MSG_KEXGSS_GROUP (byte 41) messages. The exchange hash for group exchange additionally includes min, n, max, p, and g fields.
section: "2.5"
