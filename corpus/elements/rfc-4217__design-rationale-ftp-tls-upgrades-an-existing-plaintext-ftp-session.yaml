document: rfc-4217
kind: design-rationale
summary: FTP-TLS upgrades an existing plaintext FTP session in place on the standard port 21, rather than using a separate dedicated port. This is analogous to STARTTLS in SMTP (RFC 3207) and HTTP upgrade in RFC 2817, and avoids requiring firewall policy changes for a new port.
section: "1"
topics:
