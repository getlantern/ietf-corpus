document: rfc-8845
kind: protocol-element
summary: A Multiple Content Capture (MCC) is a Capture that mixes and/or switches other Captures of a single type. It MAY reference Captures from within or across Capture Scenes, MAY contain no references (indicating unknown sources), and has MCC-specific attributes such as MaxCaptures, Policy, SynchronizationID, and Allow Subset Choice.
section: "7.2"
topics:
    - realtime
    - webrtc
