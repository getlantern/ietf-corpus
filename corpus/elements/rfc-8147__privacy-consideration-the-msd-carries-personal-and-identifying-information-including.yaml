document: rfc-8147
kind: privacy-consideration
summary: The MSD carries personal and identifying information including vehicle VIN, location, direction, and number of occupants. It must be protected against unauthorized disclosure and eavesdropping. Local regulations may impose additional privacy protection requirements beyond those in RFC 7852.
