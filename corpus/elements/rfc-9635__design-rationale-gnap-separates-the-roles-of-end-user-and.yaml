document: rfc-9635
kind: design-rationale
summary: GNAP separates the roles of end user and resource owner as distinct concepts that may or may not be fulfilled by the same person. This separation enables advanced use cases such as cross-user authentication (where a call-center agent requests access to a customer's data) and asynchronous authorization without assuming the end user is always the authorizing party.
section: "1.2"
topics:
    - oauth
    - security
