document: rfc-6232
kind: design-rationale
summary: IS-IS floods purges throughout an area without identifying which IS initiated the purge, making it difficult for network operators to locate the purge origin. Field experience identified implementation deficiencies and pre-ISO-TC1 implementations that improperly generate purges upon receiving corrupted LSPs as the motivating scenarios.
section: "1"
topics:
    - routing
