document: rfc-3501
kind: state-machine
summary: 'IMAP4rev1 connections exist in one of four states: Not Authenticated (initial; credentials required before most commands), Authenticated (mailbox selection required), Selected (a mailbox is open), and Logout (connection terminating). State transitions are triggered by successful LOGIN/AUTHENTICATE, SELECT/EXAMINE, CLOSE, LOGOUT, or connection events.'
