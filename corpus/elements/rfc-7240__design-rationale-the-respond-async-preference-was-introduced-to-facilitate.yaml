document: rfc-7240
kind: design-rationale
summary: The "respond-async" preference was introduced to facilitate asynchronous request handling by signaling the client's capability and willingness to handle 202 responses, since RFC 7231 defines 202 but provides little guidance on when to use it or how to retrieve the eventual result.
section: "4.1"
topics:
    - http
