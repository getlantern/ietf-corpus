document: rfc-8104
kind: protocol-element
summary: 'A context identifier is an IPv4/v6 address assigned to each ordered pair of {primary PE, protector}. It serves a dual role: identifying the primary PE and its associated protector for tunnel destination purposes, and indicating the primary PE''s label space on the protector for context-specific label switching.'
section: "4.3"
topics:
