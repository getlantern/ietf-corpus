document: rfc-4325
kind: design-rationale
summary: Existing methods such as directory lookup and the Subject Information Access extension in intermediary CA certificates require either a populated directory or top-down path construction; the AIA CRL extension enables bottom-up discovery directly from the CRL, complementing these approaches.
