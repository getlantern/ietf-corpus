document: rfc-5340
kind: design-rationale
summary: Addressing semantics have been removed from OSPF packets and core LSA types (router-LSAs, network-LSAs), creating a network-protocol-independent core. IPv6 addresses appear only in LSA payloads carried by Link State Update packets. Router IDs, Area IDs, and LS IDs remain 32-bit values that can no longer be assigned as IPv6 addresses.
section: "2.2"
topics:
    - routing
    - ip
