document: rfc-2580
kind: design-rationale
summary: The OBJECT-GROUP macro itself provides no conformance information; conformance information is specified through the inclusion of defined groups in a MODULE-COMPLIANCE macro. The macro expansion conceptually happens during implementation, not at run-time.
