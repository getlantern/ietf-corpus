document: rfc-3264
kind: normative-requirement
summary: 'An offer or answer MUST be a valid SDP message as defined by RFC 2327, with one exception: the e= and p= lines MAY both be omitted. Additionally, an SDP used in offer/answer MUST contain exactly one session description.'
section: "5"
rfc2119_level: MUST
topics:
