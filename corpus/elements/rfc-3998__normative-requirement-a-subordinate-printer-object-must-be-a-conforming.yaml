document: rfc-3998
kind: normative-requirement
summary: A Subordinate Printer object MUST be a conforming IPP Printer object, supporting all REQUIRED RFC 2911 operations and attributes. Non-Leaf Printer objects MUST NOT have an associated Output Device; only Leaf Printer objects may have one or more associated Output Devices.
section: "10.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
