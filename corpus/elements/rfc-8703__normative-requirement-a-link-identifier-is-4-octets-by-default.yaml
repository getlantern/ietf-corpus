document: rfc-8703
kind: normative-requirement
summary: A Link Identifier is 4 octets by default. If a modem wishes to use a different length, it MUST announce this using the Link Identifier Length Data Item in the Session Initialization Response Message.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
