document: rfc-9427
kind: security-consideration
summary: EAP servers SHOULD track successful inner authentication completion and associate that status with issued session tickets. Where the server cannot determine authentication status from a session ticket, it MUST assume inner authentication has not completed and MUST run inner authentication before granting access.
section: "5.1"
topics:
    - tls
    - security
