document: rfc-4164
kind: interoperability-note
summary: A profile supporting context replication SHOULD define for each control field whether its value is replicated from the base context or reinitialized. Examples include NBO/RND flags and the mode-of-operation parameter. This ensures predictable behavior when the new context differs from the base context in control state.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
