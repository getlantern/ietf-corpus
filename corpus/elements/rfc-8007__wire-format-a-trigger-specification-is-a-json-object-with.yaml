document: rfc-8007
kind: wire-format
summary: 'A Trigger Specification is a JSON object with mandatory ''type'' field (Trigger Type string) and at least one non-empty of: ''metadata.urls'', ''content.urls'', ''content.ccid'', ''metadata.patterns'', or ''content.patterns''. The ''metadata.patterns'' and ''content.patterns'' fields MUST NOT be present for ''preposition'' type triggers.'
section: 5.2.1
topics:
    - http
    - json
