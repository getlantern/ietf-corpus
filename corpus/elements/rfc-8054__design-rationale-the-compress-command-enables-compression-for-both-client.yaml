document: rfc-8054
kind: design-rationale
summary: The COMPRESS command enables compression for both client and server traffic, unlike legacy unstandardized commands (XZVER, XZHDR, XFEATURE COMPRESS, MODE COMPRESS) which enabled compression only for server responses. This removes the constraint of implementing compression separately in each NNTP command.
section: "1"
