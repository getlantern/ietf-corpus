document: rfc-9779
kind: normative-requirement
summary: In SR-MPLS networks, query messages defined in RFC 6374 MUST be transmitted along the same path as the data traffic for links and end-to-end SR-MPLS paths. This ensures collection of both transmit and receive timestamps for delay measurement and traffic counters for loss measurement.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
