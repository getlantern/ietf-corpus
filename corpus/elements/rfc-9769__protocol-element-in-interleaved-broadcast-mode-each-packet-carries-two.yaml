summary: 'In interleaved broadcast mode, each packet carries two transmit timestamps: the current transmission''s timestamp in the transmit timestamp field and the previous packet''s transmit timestamp in the origin timestamp field. The first broadcast packet uses a zero origin timestamp and is compatible with basic mode.'
