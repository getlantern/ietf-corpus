document: rfc-2445
kind: normative-requirement
summary: When parsing a content line, folded lines MUST first be unfolded by removing the CRLF and the immediately following single linear white space character. Unfolding restores the logical single-line representation before value parsing.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
