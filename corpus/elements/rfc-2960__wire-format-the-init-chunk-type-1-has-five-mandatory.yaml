document: rfc-2960
kind: wire-format
summary: The INIT chunk (Type=1) has five mandatory fixed fields — Initiate Tag (32 bits), a_rwnd (32 bits), Number of Outbound Streams (16 bits), Number of Inbound Streams (16 bits), and Initial TSN (32 bits) — followed by optional TLV parameters for IPv4/IPv6 addresses, Cookie Preservative, Host Name, and Supported Address Types.
