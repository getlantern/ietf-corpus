document: rfc-8832
kind: registry
summary: 'The DCEP ''Message Types'' registry manages the 1-byte Message Type field. Initial entries: Reserved (0x00, 0x01, 0xff), DATA_CHANNEL_ACK (0x02), DATA_CHANNEL_OPEN (0x03), Unassigned (0x04–0xfe). Values 0x00 and 0x01 are reserved to avoid interoperability problems with draft versions.'
section: 8.2.1
