document: rfc-3782
kind: normative-requirement
summary: An implementation SHOULD use a separate flag to record whether it is in Fast Recovery, rather than relying on the duplicate ACK counter, because the counter can be reset upon window updates and out-of-order ACKs.
section: "8"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
