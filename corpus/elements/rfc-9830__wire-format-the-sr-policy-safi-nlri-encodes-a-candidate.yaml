document: rfc-9830
kind: wire-format
summary: 'The SR Policy SAFI NLRI encodes a Candidate Path identifier as: 1-octet NLRI Length (96 bits for IPv4, 192 bits for IPv6), 4-octet Distinguisher, 4-octet Color, and 4- or 16-octet Endpoint address. The NLRI is carried with AFI 1 or 2 and SAFI 73.'
