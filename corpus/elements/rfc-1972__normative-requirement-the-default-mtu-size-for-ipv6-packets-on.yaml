document: rfc-1972
kind: normative-requirement
summary: The default MTU size for IPv6 packets on an Ethernet is 1500 octets. This size may be reduced by a Router Advertisement MTU option or by manual configuration.
section: Maximum Transmission Unit
rfc2119_level: MUST
topics:
    - ip
