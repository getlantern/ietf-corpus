document: rfc-7741
kind: normative-requirement
summary: The PictureID MUST increase by 1 for each subsequent frame and MUST wrap to 0 after reaching the maximum ID (all bits set). It MAY start at a random value. The receiver MUST NOT assume the number of bits in PictureID stays the same through the session.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
