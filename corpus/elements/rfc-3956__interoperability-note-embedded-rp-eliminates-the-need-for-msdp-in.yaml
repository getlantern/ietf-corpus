document: rfc-3956
kind: interoperability-note
summary: Embedded-RP eliminates the need for MSDP in interdomain IPv6 ASM. Senders' DRs send PIM-SM Register messages directly to the foreign RP encoded in the multicast group address, removing the MSDP source-active information distribution mesh entirely.
