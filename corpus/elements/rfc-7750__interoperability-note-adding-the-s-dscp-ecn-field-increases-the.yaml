document: rfc-7750
kind: interoperability-note
summary: Adding the S-DSCP-ECN field increases the unauthenticated Session-Reflector packet by 4 octets; implementations combining DSCP and ECN Monitoring with Symmetrical Size or Reflects Octets modes (RFC 6038) must account for this size increase in Padding Length calculations.
section: 2.2.2
topics:
    - measurement
    - diffserv
    - ecn
