document: rfc-5944
kind: protocol-element
summary: A Mobility Security Association (MSA) is a collection of security contexts between a pair of nodes applicable to Mobile IP messages. Each context specifies an authentication algorithm and mode, a shared secret or key pair, and a replay-protection style. The MSA is indexed by SPI and IP address.
section: "1.6"
topics:
    - mobility
    - security
    - crypto
