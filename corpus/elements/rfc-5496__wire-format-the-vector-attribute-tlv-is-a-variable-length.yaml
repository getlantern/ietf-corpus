document: rfc-5496
kind: wire-format
summary: 'The Vector Attribute TLV is a variable-length field: a 1-octet flags/type byte (bits F=Forward Unknown TLV, S=Bottom of Stack, and a 6-bit Type field set to 0), a 1-octet Length field, and a variable-length Value field containing an Encoded-Unicast address. Length depends on the Address Family of the Encoded-Unicast address.'
section: "4"
topics:
    - multicast
    - routing
