document: rfc-3046
kind: security-consideration
summary: The option relies on an implied trusted relationship between the relay agent and the DHCP server, with the DHCP client assumed untrusted. The trusted network must prevent unauthorized DHCP traffic from entering except through secured relay agents. Deployers must carefully evaluate security vulnerabilities before deployment.
section: "5.0"
topics:
    - security
