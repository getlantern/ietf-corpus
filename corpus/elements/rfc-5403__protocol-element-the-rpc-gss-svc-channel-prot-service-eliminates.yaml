document: rfc-5403
kind: protocol-element
summary: 'The rpc_gss_svc_channel_prot service eliminates per-request MICs: verifiers on both request and reply have flavor AUTH_NONE with zero-length contents. Non-NULL RPCSEC_GSS credentials are still used to identify the sending principal, with the service field set to rpc_gss_svc_channel_prot.'
section: "3.4"
