document: rfc-9716
kind: security-consideration
summary: The described procedures may be used by an attacker to extract a domain's internal information (e.g., topology, SIDs). An operator MUST deploy appropriate filter policies as described in RFC 8029 to restrict LSP ping and traceroute packets based on origin.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - routing
