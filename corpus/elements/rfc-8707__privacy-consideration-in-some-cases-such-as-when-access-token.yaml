document: rfc-8707
kind: privacy-consideration
summary: In some cases, such as when access token introspection is not being used, use of the 'resource' parameter may allow tracking client and user behavior at a more granular and specific level than would otherwise be possible without it, as the resource URI reveals the specific services accessed.
