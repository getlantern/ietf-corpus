document: rfc-6555
kind: design-rationale
summary: Non-winning connections are recommended to be abandoned (rather than reused) to reduce server file descriptors and TCP control block usage, reduce stateful middlebox (NAT/firewall) state, and prevent HTTP cookie and same-origin policy breakage that occurs when connections from the same client arrive from different IP address families.
section: "4.4"
topics:
