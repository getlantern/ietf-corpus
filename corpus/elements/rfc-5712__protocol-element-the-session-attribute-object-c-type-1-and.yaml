kind: protocol-element
summary: The SESSION-ATTRIBUTE object (C-Type 1 and 7) is extended with a new 'Soft Preemption Desired' bit flag (0x40), allowing a TE LSP head-end to signal that it wishes to benefit from soft preemption rather than hard preemption.
