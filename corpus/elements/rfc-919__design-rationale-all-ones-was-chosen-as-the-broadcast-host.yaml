document: rfc-919
kind: design-rationale
summary: All-ones was chosen as the broadcast host number because it is unlikely to be assigned to a real host, making conflicts rare. This choice was first proposed in IEN-212. The few hosts already assigned all-ones host numbers are expected to renumber.
