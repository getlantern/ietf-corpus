document: rfc-9082
kind: normative-requirement
summary: IDNs SHOULD NOT be represented as a mixture of A-labels and U-labels in a domain query. A server receiving a mixed-label query MAY convert all U-labels to A-labels and proceed, or MAY refuse to process the query.
section: 3.1.3
rfc2119_level: SHOULD NOT
topics:
    - dns
    - http
