kind: design-rationale
summary: 'allComponentsMatch is defined as a basic rule with a separate derivation mechanism (Section 6.3) because no single equality rule satisfies all contexts: for example, case-sensitive vs. case-insensitive string comparison may both be appropriate depending on the application. Derived rules such as directoryComponentsMatch override specific component types.'
