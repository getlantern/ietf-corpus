document: rfc-7166
kind: wire-format
summary: 'The Authentication Trailer has a 16-octet fixed header: 2-octet Authentication Type, 2-octet Auth Data Len (total AT length including header and digest), 2-octet Reserved, 2-octet SA ID, and a 64-bit Cryptographic Sequence Number (split into two 32-bit fields), followed by variable-length Authentication Data.'
section: "4.1"
topics:
