document: rfc-9068
kind: normative-requirement
summary: Authorization servers SHOULD use OAuth 2.0 Authorization Server Metadata (RFC 8414) to advertise signing keys via 'jwks_uri' and expected 'iss' value. If both OAuth 2.0 AS Metadata and OpenID Connect discovery are supported, their values MUST be consistent.
section: "4"
rfc2119_level: SHOULD
