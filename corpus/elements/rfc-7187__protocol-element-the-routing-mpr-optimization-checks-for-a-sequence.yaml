summary: The routing MPR optimization checks for a sequence x_0, ..., x_n of N1 elements where d1(x_0) + d2(x_0,y_1) + ... + d2(x_m-1,y_m) < d1(x_m), allowing x_1 through x_n to be removed from the routing MPR set if selected.
