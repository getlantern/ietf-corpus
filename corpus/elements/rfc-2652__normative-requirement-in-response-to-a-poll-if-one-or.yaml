document: rfc-2652
kind: normative-requirement
summary: In response to a poll, if one or more index objects are returned, the response must take the form of a MIME multipart/mixed message, with each part being an application/index.obj.<type> MIME object.
section: "2.4"
rfc2119_level: MUST
