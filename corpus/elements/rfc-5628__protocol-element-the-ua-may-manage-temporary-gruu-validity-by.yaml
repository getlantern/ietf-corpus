document: rfc-5628
kind: protocol-element
summary: The UA MAY manage temporary GRUU validity by subscribing to the registration event package, retaining GRUUs from REGISTER responses, and updating its valid-GRUU set from notifications. It should remove temporary GRUUs with a different 'callid' attribute or a 'cseq' value less than the 'first-cseq' attribute of the <temp-gruu> element.
section: "6.1"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
