kind: protocol-element
summary: The Capabilities Optional Parameter (Parameter Type 2) is an Optional Parameter carried in BGP OPEN messages. It contains one or more capability triples, each encoding a Capability Code (1 octet), Capability Length (1 octet), and Capability Value (variable length).
