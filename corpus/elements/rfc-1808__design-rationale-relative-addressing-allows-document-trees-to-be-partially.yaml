document: rfc-1808
kind: design-rationale
summary: Relative addressing allows document trees to be partially independent of their location and access scheme. A single set of hypertext documents can be simultaneously accessible via 'file', 'http', and 'ftp' schemes, and trees can be moved as a whole without changing any embedded URLs. Experience in the Web demonstrated this capability is necessary for long-term usability.
section: "1"
topics:
