document: rfc-1583
kind: protocol-element
summary: 'OSPF defines five LSA types: router links (1), network links (2), summary link to network (3), summary link to AS boundary router (4), and AS external link (5). Types 1–2 are flooded within an area; types 3–4 are generated by ABRs; type 5 is flooded AS-wide (except stub areas).'
section: 12.1.3
topics:
    - routing
