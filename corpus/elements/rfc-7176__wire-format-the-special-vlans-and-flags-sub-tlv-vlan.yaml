document: rfc-7176
kind: wire-format
summary: The Special VLANs and Flags sub-TLV (VLAN-FLAGS, MT-Port-Cap-TLV sub-TLV type 1) is an 8-byte structure encoding Port ID (2 bytes), Sender Nickname (2 bytes), Outer.VLAN (2 bytes with AF/AC/VM/BY flag bits), and Designated-VLAN (2 bytes with TR flag bit). It is carried in every TRILL IIH PDU.
section: 2.2.1
topics:
    - routing
