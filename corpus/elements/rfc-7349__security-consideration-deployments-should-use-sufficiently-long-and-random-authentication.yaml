document: rfc-7349
kind: security-consideration
summary: Deployments SHOULD use sufficiently long and random authentication keys to resist guessing and cryptographic attacks; management systems SHOULD support hexadecimal key input. Use of Cryptographic Authentication TLV is RECOMMENDED for all deployments to guard against spoofed-Hello attacks that can terminate adjacencies or sessions.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - security
    - crypto
