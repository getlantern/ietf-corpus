document: rfc-3671
kind: protocol-element
summary: Collective attribute types are defined as userApplications attributes with the COLLECTIVE flag. By convention, they are named by prefixing the non-collective supertype name with 'c-' (e.g., c-TelephoneNumber subtypes telephoneNumber).
