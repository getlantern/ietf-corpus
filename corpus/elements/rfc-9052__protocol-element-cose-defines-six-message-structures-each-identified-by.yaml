document: rfc-9052
kind: protocol-element
summary: 'COSE defines six message structures, each identified by a CBOR tag: COSE_Sign (tag 98, multi-signer), COSE_Sign1 (tag 18, single-signer), COSE_Encrypt (tag 96, enveloped), COSE_Encrypt0 (tag 16, single-recipient), COSE_Mac (tag 97, MACed with recipients), and COSE_Mac0 (tag 17, implicit-key MAC). All are CBOR arrays sharing a common protected/unprotected/content structure.'
section: "2"
