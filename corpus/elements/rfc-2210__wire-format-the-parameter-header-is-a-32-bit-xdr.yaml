summary: 'The Parameter Header is a 32-bit XDR unsigned integer: bits 31-24 are PARAM_NUM, bit 23 is the INVALID flag I (value not correctly processed at one or more hops), bits 22-16 are FLAGS (currently reserved, set to zero), and bits 15-0 are PARAM_LENGTH in 32-bit words not including the header.'
