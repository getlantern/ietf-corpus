document: rfc-3503
kind: normative-requirement
summary: Once the $MDNSent keyword is set, it MUST NOT be unset by a client. A client MAY set $MDNSent even when a user denies sending the notification, to prevent other MUAs from sending MDN for that message.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
