document: rfc-4917
kind: design-rationale
summary: The extension was created because the existing failure reason codes in Mobile IPv4 provide very limited information for end-user interpretation. A human-readable string (e.g., 'Prepaid Quota for the user is exhausted') allows meaningful feedback to be conveyed to the Mobile Node user beyond what numeric codes can express.
section: "1"
topics:
