document: rfc-4254
kind: security-consideration
summary: Uncontrolled setting of environment variables in a privileged process is a security hazard. Implementations should maintain an allowlist of permitted variable names or only set environment variables after the server process has dropped sufficient privileges.
section: "6.4"
topics:
    - security
