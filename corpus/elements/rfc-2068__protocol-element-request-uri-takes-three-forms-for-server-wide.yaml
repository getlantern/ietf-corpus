document: rfc-2068
kind: protocol-element
summary: 'Request-URI takes three forms: ''*'' for server-wide requests (e.g., OPTIONS), absoluteURI for requests to proxies, and abs_path for direct origin server requests. All HTTP/1.1 servers MUST accept absoluteURI in requests even though clients only generate it for proxies.'
section: 5.1.2
topics:
    - http
