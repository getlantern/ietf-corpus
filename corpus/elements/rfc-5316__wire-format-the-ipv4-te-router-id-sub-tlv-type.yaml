document: rfc-5316
kind: wire-format
summary: The IPv4 TE Router ID sub-TLV (type 11, for IS-IS Router Capability TLV) is 4 octets. The IPv6 TE Router ID sub-TLV (type 12) is 16 octets. Both are defined for inclusion in the IS-IS router capability TLV (TLV 242) to carry domain-wide TE Router IDs.
section: 3.3.4
topics:
