document: rfc-2617
kind: wire-format
summary: Basic credentials are encoded as base64(userid ":" password) where userid is TEXT excluding ":" and password is any TEXT. The resulting value is placed in the Authorization header as "Basic <base64-user-pass>", with no 76-character line-length limit unlike standard base64.
