document: rfc-5228
kind: normative-requirement
summary: The 'require' command, if present, MUST be used before anything other than another 'require'. An error occurs if 'require' appears after any other command type. Implementations MUST NOT execute any test or command after a 'require' if one of the required extensions is unavailable.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
