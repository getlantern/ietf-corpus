document: rfc-5701
kind: interoperability-note
summary: The sub-types of the IPv6 Address Specific Extended Community are the same as those defined for the IPv4 Address Specific Extended Community (RFC 4360), allowing applications designed for IPv4-based communities to map directly to the IPv6 variant.
