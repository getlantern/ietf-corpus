document: rfc-4343
kind: normative-requirement
summary: A lookup string octet with a value in the inclusive range from 0x41 to 0x5A (uppercase ASCII letters) MUST match the identical value and also match the corresponding value in the range from 0x61 to 0x7A (lowercase ASCII letters), and vice versa.
section: "3"
rfc2119_level: MUST
