document: rfc-5938
kind: normative-requirement
summary: When the Server and Control-Client have agreed to use Individual Session Control mode, the Control-Client, Server, Session-Sender, and Session-Reflector MUST all conform to the requirements of that mode. The original TWAMP-Control Start and Stop commands MUST NOT be used.
section: "2"
rfc2119_level: MUST NOT
topics:
    - measurement
