document: rfc-8990
kind: design-rationale
summary: CBOR (RFC 8949) was chosen as the on-wire encoding because it is readily extensible for unknown future requirements and imposes no practical restriction on objective value formats. The loop count is placed in the objective option (not the message header) because it is semantically a property of the objective itself.
section: "2.3"
