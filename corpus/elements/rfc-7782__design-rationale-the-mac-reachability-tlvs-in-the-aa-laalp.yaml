document: rfc-7782
kind: design-rationale
summary: The MAC-Reachability TLVs in the AA-LAALP-GROUP-MAC APPsub-TLV are organized so that each TLV contains MAC addresses from a single LAALP only. This grouping lets remote RBridges correlate MAC addresses with specific LAALP identifiers, which is necessary for correct split-horizon filtering and AAE group identification.
section: 4.1.3
topics:
