document: rfc-7619
kind: normative-requirement
summary: Implementations SHOULD restrict and isolate all anonymous IKE peers from each other and itself, allowing only access to itself and possibly its intended network ranges, to prevent rogue peers from stealing traffic via malicious Traffic Selectors.
section: "2.5"
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
