document: rfc-6530
kind: normative-requirement
summary: If a final delivery MTA downgrades internationalized emails or specially identifies messages utilizing extensions, it SHOULD include a mechanism to preserve or recover the original internationalized forms without information loss, to support access by SMTPUTF8-aware agents.
section: "8.2"
rfc2119_level: SHOULD
topics:
    - email
