summary: 'Four UNI routing models are defined for edge nodes: configuration-based (manual or DHCP neighbor list, no routing exchange), partial peering (limited reachability via signaling extensions), silent listening (edge passively receives full TE routing information), and full peering (edge establishes adjacencies and advertises LSAs).'
