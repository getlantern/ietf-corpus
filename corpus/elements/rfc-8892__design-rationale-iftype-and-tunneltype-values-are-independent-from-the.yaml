document: rfc-8892
kind: design-rationale
summary: ifType and tunnelType values are independent from the type of, or even existence of, a data model. Though originally defined in MIB modules, these values can be used in YANG objects, as part of OIDs, or simply as values exposed by local APIs or UIs.
