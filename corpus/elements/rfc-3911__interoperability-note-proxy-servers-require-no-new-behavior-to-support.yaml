document: rfc-3911
kind: interoperability-note
summary: Proxy servers require no new behavior to support this extension and simply pass the Join header transparently. However, a proxy may forward an INVITE with Join to an orthogonal set of Contacts (due to forking logic), in which case the request will fail.
section: "6"
topics:
