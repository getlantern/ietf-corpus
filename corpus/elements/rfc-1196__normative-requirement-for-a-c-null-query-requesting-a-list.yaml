document: rfc-1196
kind: normative-requirement
summary: For a {C} (null) query requesting a list of all online users, an RUIP MUST either answer or actively refuse. If it answers, it MUST provide at least each user's full name; additional information such as terminal location, office phone, and idle time SHOULD be configurable by the system administrator.
section: 2.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
