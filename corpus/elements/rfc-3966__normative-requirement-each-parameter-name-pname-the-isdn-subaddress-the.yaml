document: rfc-3966
kind: normative-requirement
summary: Each parameter name (pname), the ISDN subaddress, the 'extension', and the 'context' MUST NOT appear more than once in a tel URI. If present, 'isdn-subaddress' or 'extension' MUST appear first, followed by 'context', then other parameters in lexicographical order.
section: "3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
