document: rfc-9218
kind: protocol-element
summary: The incremental (i) parameter is a Structured Fields Boolean (default false) indicating whether the client can usefully process response bytes as they arrive incrementally. Servers may use this to decide whether to multiplex bandwidth across responses of equal urgency.
