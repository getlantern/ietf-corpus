document: rfc-6794
kind: normative-requirement
summary: The UAC MUST insert a Policy-ID header field into requests for which it has contacted a policy server and accepted the policies. If a token was received from the policy server, the UAC MUST include that token in the Policy-ID header field value.
section: 4.4.1
rfc2119_level: MUST
topics:
    - sip
