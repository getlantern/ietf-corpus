document: rfc-1001
kind: wire-format
summary: Second-level encoding compresses the first-level domain name per RFC 883 domain name representation and compression rules. This compressed form is the only NetBIOS name representation used in NetBIOS-over-TCP packet formats, except in the RDATA field of a NODE STATUS RESPONSE.
section: "14.2"
