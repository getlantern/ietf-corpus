document: rfc-4796
kind: protocol-element
summary: 'The ''content'' attribute is a new SDP media-level attribute defined by this specification. Its ABNF syntax is: content-attribute = "a=content:" mediacnt-tag, where mediacnt-tag = mediacnt *("،" mediacnt) and mediacnt = "slides" / "speaker" / "sl" / "main" / "alt" / mediacnt-ext.'
