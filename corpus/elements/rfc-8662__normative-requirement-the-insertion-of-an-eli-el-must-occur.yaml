document: rfc-8662
kind: normative-requirement
summary: The insertion of an ELI/EL MUST occur only with a SPRING label advertised by an LSR that advertised an ERLD (i.e., is entropy label capable) or with a SPRING label associated with a Binding SID that has the ELC set.
