document: rfc-5042
kind: protocol-element
summary: A Protection Domain (PD) is a local construct that associates Stream Context Memory, STags, and Data Buffers; the RNIC enforces that resources belonging to one PD cannot be accessed by resources in a different PD. Each untrusted Stream should have its own unique PD.
section: 2.2.4
topics:
    - security
