document: rfc-8314
kind: normative-requirement
summary: Certificate pinning MUST NOT be offered as an option in response to a failed certificate validation for an existing Mail Account — only during initial account setup. An MUA MUST NOT allow a certificate pinned for one account to validate connections for other accounts, and MUST allow users to revoke a pinned certificate.
section: "5.4"
rfc2119_level: MUST NOT
topics:
    - tls
    - email
    - pkix
    - security
