document: rfc-9326
kind: interoperability-note
summary: A transit or decapsulating IOAM node that receives an unknown IOAM-Option-Type ignores it per RFC 9197; nodes that do not support the DEX Option-Type will ignore it. The ability to skip over an unknown DEX Option-Type during parsing or decapsulation depends on the specific encapsulation (e.g., IPv6 Hop-by-Hop options can be skipped using the length field).
section: 3.1.2
topics:
