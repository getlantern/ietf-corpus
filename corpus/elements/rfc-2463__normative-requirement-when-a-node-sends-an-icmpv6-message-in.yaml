document: rfc-2463
kind: normative-requirement
summary: When a node sends an ICMPv6 message in response to a packet sent to one of its own unicast addresses, the Source Address of the reply MUST be that same address. For multicast/anycast responses, a unicast address on the receiving interface MUST be used.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
