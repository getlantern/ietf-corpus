document: rfc-2616
kind: normative-requirement
summary: HTTP/1.1 requests containing a message-body MUST include a valid Content-Length unless the server is known to be HTTP/1.1 compliant. If the server cannot determine message length it SHOULD return 400; if it requires Content-Length it SHOULD return 411.
section: "4.4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
