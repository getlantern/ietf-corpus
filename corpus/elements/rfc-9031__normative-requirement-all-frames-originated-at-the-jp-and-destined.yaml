document: rfc-9031
kind: normative-requirement
summary: All frames originated at the JP and destined to the pledge during the join process MUST be authenticated at the link layer using the key normally in use in the network. This prevents a time-replay attack where forged EB frames cause the pledge to reuse an IEEE 802.15.4 link-layer nonce.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
