document: rfc-2935
kind: normative-requirement
summary: Data from earlier IOTP messages in a transaction MUST be retained by the IOTP client for use in later messages, signature verification, retransmission, and customer care. Data MUST be retained until the end of the transaction and as long thereafter as any party may inquire.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
