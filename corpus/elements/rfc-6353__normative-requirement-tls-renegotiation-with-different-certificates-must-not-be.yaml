document: rfc-6353
kind: normative-requirement
summary: TLS renegotiation with different certificates MUST NOT be done. Implementations MUST either disable renegotiation completely (RECOMMENDED) or present the same certificate during renegotiation and verify that the peer also presented the same certificate.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - tls
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
