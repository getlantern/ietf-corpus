document: rfc-9195
kind: protocol-element
summary: The revision list (keyed by date) tracks editorial changes to the instance data set. Specification or design-effort instance data sets SHOULD have at least one entry; instance data produced by a server or subject to frequent updates SHOULD NOT use revision entries.
section: "3.2"
