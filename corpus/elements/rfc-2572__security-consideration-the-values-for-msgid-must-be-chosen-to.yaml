document: rfc-2572
kind: security-consideration
summary: The values for msgID must be chosen to avoid replay attacks; they need not be unpredictable but must not repeat across outstanding requests. Internal Class PDUs delivered at noAuthNoPriv security level open a window for spoofing or replay attacks, though receivers aware of these risks may accept them for engine ID discovery or misconfiguration detection.
section: "10"
topics:
