document: rfc-8502
kind: protocol-element
summary: L2L3-VPN-MULTICAST-MIB defines l2L3VpnMcastPmsiTunnelAttributeTable, where each entry represents the PMSI Tunnel attribute information of a specific P-tunnel on a PE router. The table is indexed by (l2L3VpnMcastPmsiTunnelAttributeType, l2L3VpnMcastPmsiTunnelAttributeId) to uniquely identify a P-tunnel.
section: "4.2"
topics:
