document: rfc-8072
kind: wire-format
summary: YANG Patch Status responses use media type 'application/yang-data+xml' or 'application/yang-data+json'. The 'error-path' field uses instance-identifier encoding per XML namespace rules for XML and per RFC 7951 for JSON, which differ in syntax.
