document: rfc-1158
kind: protocol-element
summary: 'The ifTable (IfEntry) contains 22 per-interface columns: ifIndex, ifDescr, ifType, ifMtu, ifSpeed, ifPhysAddress, ifAdminStatus, ifOperStatus, ifLastChange, eight traffic counters (ifIn/OutOctets, ifIn/OutUcastPkts, ifIn/OutNUcastPkts, ifIn/OutDiscards, ifIn/OutErrors), ifOutQLen, and ifSpecific (OID pointer to media-specific MIB). The ifSpecific column is new in MIB-II.'
section: 5.2.1
topics:
    - snmp
