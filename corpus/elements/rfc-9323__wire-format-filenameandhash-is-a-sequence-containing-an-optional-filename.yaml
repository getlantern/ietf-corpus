document: rfc-9323
kind: wire-format
summary: FileNameAndHash is a SEQUENCE containing an optional fileName (PortableFilename, IA5String restricted to [a-zA-Z0-9._-]) and a mandatory hash (Digest). The fileName field is OPTIONAL to support 'stand-alone' mode where nameless digital objects are addressed by digest alone.
section: 4.4.1
topics:
