document: rfc-7184
kind: protocol-element
summary: 'olsrv2IibLinkSetTable extends the NHDP IIB Link Set (via AUGMENTS on nhdpIibLinkSetEntry) with three OLSRv2-specific fields per link tuple: L_in_metric (olsrv2IibLinkSetInMetricValue, read-only), L_out_metric (olsrv2IibLinkSetOutMetricValue, read-write), and L_mpr_selector (olsrv2IibLinkSetMprSelector, a boolean indicating this router is a flooding MPR selector of the neighbor).'
