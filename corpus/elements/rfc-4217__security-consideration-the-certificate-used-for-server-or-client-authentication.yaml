document: rfc-4217
kind: security-consideration
summary: The certificate used for server (or client) authentication of data connections SHOULD be the same certificate used for the corresponding control connection. If different certificates are used, an alternative cross-checking mechanism must be provided to bind the identities of the two connections.
section: "15.1"
topics:
    - tls
    - security
    - pkix
