document: rfc-5882
kind: normative-requirement
summary: For non-protocol functions such as static routes, if the remote system is known or presumed BFD-capable and the BFD session is not Up, appropriate action SHOULD be taken (e.g., withdrawing the static route). If the remote is known not to support BFD, such action SHOULD NOT be taken.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
