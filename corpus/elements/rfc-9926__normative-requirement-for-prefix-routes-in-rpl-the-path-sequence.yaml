document: rfc-9926
kind: normative-requirement
summary: For prefix routes in RPL, the Path Sequence is used between and only between advertisements for the same Target and from the same origin (same ROVR value); only the freshest advertisement is retained. The RPL router that merges multiple advertisements for the same prefix MUST use and advertise the longest remaining lifetime across all origins.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - routing
