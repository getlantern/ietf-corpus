document: rfc-2623
kind: normative-requirement
summary: NFS server implementations SHOULD check the client's authorization on each NFS request, not only at mount time via the MOUNT protocol, to prevent file handle theft or guessing attacks.
section: "2.6"
rfc2119_level: SHOULD
