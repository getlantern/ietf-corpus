document: rfc-3981
kind: security-consideration
summary: Clients SHOULD NOT use authentication credentials and mechanisms subject to replay attacks when conducting entity lookups and search continuations that result from referrals in IRIS registry results, since referrals may direct queries to different registry services.
section: "11"
rfc2119_level: SHOULD NOT
topics:
    - security
    - registry
