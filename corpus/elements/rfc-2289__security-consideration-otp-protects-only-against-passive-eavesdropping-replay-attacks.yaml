document: rfc-2289
kind: security-consideration
summary: OTP protects only against passive eavesdropping/replay attacks. It does not provide privacy for transmitted data and does not protect against active attacks such as TCP session hijacking. IPsec is recommended for protection against session hijacking.
section: "10"
topics:
