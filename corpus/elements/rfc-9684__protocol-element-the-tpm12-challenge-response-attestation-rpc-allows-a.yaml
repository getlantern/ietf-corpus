document: rfc-9684
kind: protocol-element
summary: The tpm12-challenge-response-attestation RPC allows a Verifier to request signed TPM PCRs (TPM Quote operation) from a TPM 1.2 cryptoprocessor. Input includes PCR index selection, nonce, and optional certificate name(s); output includes a TPM_QUOTE2 binary response per TPM.
section: 2.1.1.3.1
topics:
