document: rfc-6955
kind: normative-requirement
summary: The Discrete Logarithm Signature requires the existence of a q parameter in the DH group. If the key-generation algorithm from RFC 2631 is used, the required restrictions are met. The length of q MUST be at least b bits where b is the output size of the hash function.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
