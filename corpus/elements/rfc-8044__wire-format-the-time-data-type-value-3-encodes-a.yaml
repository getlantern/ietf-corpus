document: rfc-8044
kind: wire-format
summary: The 'time' data type (value 3) encodes a 32-bit unsigned integer in network byte order representing seconds since 00:00:00 UTC January 1 1970, fixed at four octets. Being unsigned, it is not subject to a Year 2038 signed overflow.
