document: rfc-5672
kind: protocol-element
summary: The Signing Domain Identifier (SDID) is a single domain name that is the mandatory payload output of DKIM, referring to the identity claiming responsibility for introduction of a message into the mail stream. It is specified via the d= tag in the DKIM-Signature header field.
