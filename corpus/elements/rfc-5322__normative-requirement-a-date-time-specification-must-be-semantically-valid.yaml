document: rfc-5322
kind: normative-requirement
summary: 'A date-time specification MUST be semantically valid: the day-of-week (if present) MUST match the date, the numeric day MUST be within the allowed range for the month and year, the time-of-day MUST be 00:00:00 through 23:59:60 (allowing for leap seconds), and the zone minutes MUST be 00–59.'
section: "3.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
