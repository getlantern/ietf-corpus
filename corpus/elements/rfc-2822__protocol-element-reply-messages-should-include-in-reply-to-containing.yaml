document: rfc-2822
kind: protocol-element
summary: Reply messages SHOULD include 'In-Reply-To:' containing the parent message's 'Message-ID:' value(s), and 'References:' containing the thread chain (parent's 'References:' plus parent's 'Message-ID:'). These fields enable mail clients to display conversation threads.
section: 3.6.4
topics:
    - email
