document: rfc-8525
kind: design-rationale
summary: RFC 7895 assumed all datastores share exactly one schema, which is incompatible with NMDA where dynamic configuration datastores may have their own schema and the operational state datastore may support additional non-configurable modules. RFC 8525 introduces per-datastore schema references to resolve this.
section: "1"
topics:
