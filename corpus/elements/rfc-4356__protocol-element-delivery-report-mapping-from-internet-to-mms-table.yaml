document: rfc-4356
kind: protocol-element
summary: 'Delivery report mapping from Internet to MMS (Table 5): DSN Action ''delivered'' maps to X-Mms-Status ''retrieved''; ''failed'' maps to ''unreachable''; ''relayed'' maps to ''forwarded''. A single DSN reporting multiple recipients results in several MMS delivery reports. DSN Action ''delayed'' MUST NOT be mapped (deferred MUST NOT be used).'
section: 2.1.4.2
topics:
    - email
