document: rfc-9635
kind: normative-requirement
summary: When requesting multiple access tokens, each object in the array MUST include the label field and all label values MUST be unique within the request. If any label is missing or duplicated, the AS MUST return an invalid_request error.
section: 2.1.2
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
