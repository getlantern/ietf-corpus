document: rfc-6880
kind: security-consideration
summary: 'Access control is paramount: deleting or modifying critical principals (e.g., krbtgt/REALM@REALM) can disable an entire Kerberos realm. This document does not mandate an access control model, and access control is explicitly out of scope. Exposing access control objects via extensions may itself leak information about privileged principals.'
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
