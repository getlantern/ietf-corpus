document: rfc-6970
kind: security-consideration
summary: The THIRD_PARTY option MUST NOT be enabled unless the network on which PCP messages are sent is fully trusted (e.g., protected by ACLs on both the PCP client, server, and intermediate network), to prevent malicious users from creating mappings on behalf of third parties.
section: "6"
rfc2119_level: MUST NOT
topics:
    - security
    - nat
