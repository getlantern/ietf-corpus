document: rfc-6187
kind: security-consideration
summary: If a certificate indicates OCSP is used but no OCSP response is available, the absence of a response along with details of the attempted certificate use SHOULD be logged as a security event. Security quality depends on algorithm strength, key security, implementation correctness, and PKI/CA security.
section: "5"
topics:
    - pkix
    - security
