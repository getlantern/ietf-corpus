document: rfc-6884
kind: normative-requirement
summary: The RTP header marker bit (M) SHALL be set to 1 if the first frame in the packet is the first speech frame of a talkspurt. For all other packets, M SHALL be set to zero.
section: "5"
rfc2119_level: REQUIRED
