document: rfc-9252
kind: protocol-element
summary: For IPv4 VPN over SRv6 core (Section 5.1) and IPv6 VPN over SRv6 core (Section 5.2), the MPLS label field of the VPN NLRI carries the whole or a portion of the SRv6 SID Function part when the Transposition Scheme is used (Transposition Length ≤ 20 for 20-bit label field); otherwise it is set to Implicit NULL. Expected Endpoint Behaviors are End.DX4/End.DT4/End.DT46 for IPv4 and End.DX6/End.DT6/End.DT46 for IPv6.
section: "5.1"
topics:
    - bgp
    - routing
    - ip
