document: rfc-4301
kind: normative-requirement
summary: A sender SHOULD put traffic of different DSCP classes but with the same selector values on different SAs to support QoS appropriately. The IPsec implementation MUST permit establishment of multiple SAs between a given sender and receiver with the same selectors.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - qos
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
