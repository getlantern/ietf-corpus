document: rfc-6236
kind: normative-requirement
summary: If the image attribute is included in the SDP answer but none of the entries are usable or acceptable, the offerer MUST resort to other methods to determine the appropriate image size and MUST issue a new offer/answer without the image attribute.
section: 3.1.1.2
rfc2119_level: MUST
topics:
    - realtime
