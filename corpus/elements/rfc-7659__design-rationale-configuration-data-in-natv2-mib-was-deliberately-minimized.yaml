document: rfc-7659
kind: design-rationale
summary: Configuration data in NATV2-MIB was deliberately minimized to only what is needed to provide context for state and statistical information. Writable objects are limited to notification rate controls, thresholds, and resource quotas; the association between mappings and interfaces present in RFC 4008 was removed entirely.
section: 3.1.1
topics:
    - nat
    - snmp
