document: rfc-3958
kind: normative-requirement
summary: Application protocol developers using S-NAPTR MUST define the mechanics of the expected server identification handshake when the client connects to a server found through S-NAPTR, to confirm the server's authority for the original target domain.
section: 3.1.3
rfc2119_level: MUST
topics:
