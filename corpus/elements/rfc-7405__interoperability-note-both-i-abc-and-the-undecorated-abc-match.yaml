document: rfc-7405
kind: interoperability-note
summary: Both '%i"aBc"' and the undecorated '"abc"' match the same set of strings ('abc', 'Abc', 'aBc', etc.), ensuring that existing ABNF grammars without prefixes continue to behave identically after this extension is adopted.
