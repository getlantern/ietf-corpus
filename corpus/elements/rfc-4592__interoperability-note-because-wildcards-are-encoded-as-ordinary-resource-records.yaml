document: rfc-4592
kind: interoperability-note
summary: Because wildcards are encoded as ordinary resource records with special owner names, they participate in zone transfers (AXFR) and incremental zone transfers (IXFR, RFC 1995) identically to non-wildcard records. This property is a key advantage over alternative synthesis schemes.
