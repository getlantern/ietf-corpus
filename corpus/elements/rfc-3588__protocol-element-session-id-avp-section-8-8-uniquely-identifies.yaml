summary: 'Session-Id AVP (Section 8.8) uniquely identifies a Diameter session globally and eternally. It MUST be present in all messages associated with a session and is formatted as: DiameterIdentity '';'' high-32-bits-of-time '';'' low-32-bits '';'' optional-value. The same Session-Id binds all messages for a given user session.'
