document: rfc-1449
kind: protocol-element
summary: The rfc1157Domain transport domain identifies proxy destinations for community-based SNMPv1 (RFC 1157). When partyTDomain is rfc1157Domain, partyTAddress must be 6 octets (4-octet IP address + 2-octet UDP port, network-byte order) and partyAuthProtocol must be rfc1157noAuth.
