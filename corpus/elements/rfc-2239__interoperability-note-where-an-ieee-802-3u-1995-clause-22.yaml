document: rfc-2239
kind: interoperability-note
summary: Where an IEEE 802.3u-1995 clause 22 MII is present, a logic one in the remote fault bit maps to remoteFault(5) and a logic zero in the link status bit maps to notAvailable(4) in the mediaAvailable object; notAvailable(4) takes precedence over remoteFault(5).
