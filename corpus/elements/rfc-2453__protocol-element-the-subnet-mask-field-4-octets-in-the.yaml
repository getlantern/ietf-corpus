document: rfc-2453
kind: protocol-element
summary: The Subnet Mask field (4 octets) in the RIP-2 RTE specifies the mask applied to the IP address to yield the non-host portion. A value of zero means no subnet mask was included. This field eliminates the subnet/host ambiguity inherent in RIP-1.
section: "4.3"
topics:
    - routing
    - ip
