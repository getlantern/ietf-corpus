document: rfc-2765
kind: normative-requirement
summary: If an IPv6 routing header with a non-zero Segments Left field is present, the packet MUST NOT be translated. An ICMPv6 'parameter problem/erroneous header field' (Type 4/Code 0) error with the Pointer indicating the Segments Left field SHOULD be returned to the sender.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
