document: rfc-4585
kind: normative-requirement
summary: A minimal compound RTCP feedback packet (exactly one RR/SR, exactly one SDES with only CNAME, and the FB messages) SHOULD be used whenever an FB message is sent as an Early RTCP packet, to minimize packet size and maximize allowable feedback frequency within the RTCP bandwidth limit.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
