document: rfc-4660
kind: interoperability-note
summary: Resource-specific filters take precedence over domain-specific or list-specific filters in a SUBSCRIBE. If an individual resource-specific filter is present alongside a domain filter, the resource-specific filter overrides the domain-specific filter.
