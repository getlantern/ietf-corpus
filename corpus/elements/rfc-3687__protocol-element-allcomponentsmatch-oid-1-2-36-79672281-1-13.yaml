document: rfc-3687
kind: protocol-element
summary: allComponentsMatch (OID 1.2.36.79672281.1.13.6) performs component-wise equality matching for any ASN.1 type, including SET, SEQUENCE, SET OF, SEQUENCE OF, CHOICE, BIT STRING, string types, INTEGER, BOOLEAN, OBJECT IDENTIFIER, OCTET STRING, REAL, RELATIVE-OID, and open types. It uses case-sensitive string comparison and treats trailing zero bits in named-bit BIT STRINGs as absent.
section: "6.2"
topics:
    - ldap
