document: rfc-9651
kind: normative-requirement
summary: Display Strings are NOT RECOMMENDED for use in situations where a String or Token would be adequate, because Unicode has processing considerations (e.g., normalization) and security considerations (e.g., homograph attacks) that make it more difficult to handle correctly.
section: 3.3.8
rfc2119_level: RECOMMENDED
topics:
    - http
    - security
