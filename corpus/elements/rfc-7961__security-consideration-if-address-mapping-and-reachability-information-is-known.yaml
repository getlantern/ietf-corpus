document: rfc-7961
kind: security-consideration
summary: If address mapping and reachability information is known to be complete and correct, it can be used to detect forged packet source addresses. If native traffic arrives at a TRILL switch from an address that authoritative data indicates should not be reachable from that switch, the traffic should be discarded.
section: "4"
topics:
    - security
    - routing
