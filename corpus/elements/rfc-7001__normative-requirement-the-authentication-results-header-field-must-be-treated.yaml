document: rfc-7001
kind: normative-requirement
summary: 'The Authentication-Results header field MUST be treated as a trace header field: it MUST NOT be reordered and MUST be prepended to the message. It SHOULD be inserted above any other trace header fields (such as Received) that MTAs prepend.'
section: "4.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
