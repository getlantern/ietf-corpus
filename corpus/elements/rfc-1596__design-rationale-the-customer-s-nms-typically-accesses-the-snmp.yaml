document: rfc-1596
kind: design-rationale
summary: The customer's NMS typically accesses the SNMP proxy agent using SNMP over UDP over IP encapsulated in Frame Relay per RFC 1490/ANSI T1.617 Annex F, meaning the customer's own PVC is used as the management channel. Alternate access mechanisms are not precluded.
