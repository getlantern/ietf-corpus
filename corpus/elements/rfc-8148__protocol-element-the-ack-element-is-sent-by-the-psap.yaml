document: rfc-8148
kind: protocol-element
summary: The <ack> element is sent by the PSAP to acknowledge unsolicited IVS data, or by the IVS to acknowledge a PSAP <request> other than a successfully performed send-data request; it references the unique ID of the acknowledged metadata/control block and contains <actionResult> elements indicating success or failure with optional reason and details.
section: "9.3"
topics:
