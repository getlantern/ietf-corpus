document: rfc-3443
kind: normative-requirement
summary: For PHP operations, the oTTL check MUST be performed regardless of whether oTTL is used to update the outgoing header TTL. For Short Pipe Model PHP, the exposed header TTL is neither checked nor updated; for Uniform Model PHP, the exposed header TTL is set to oTTL.
section: "3.5"
rfc2119_level: MUST
topics:
    - mpls
