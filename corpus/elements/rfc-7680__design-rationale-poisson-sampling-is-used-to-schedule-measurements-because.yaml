document: rfc-7680
kind: design-rationale
summary: Poisson sampling is used to schedule measurements because it avoids self-synchronization effects and produces a statistically unbiased sample. The Poisson distribution limits the bias introduced by regular periodic probing, though other methods such as periodic sampling with random start times (RFC 3432) may be appropriate for specific situations.
