document: rfc-8251
kind: protocol-element
summary: The Opus packet padding parser (src/opus_decoder.c ~line 596) must decrement the signed 'len' value by each padding byte rather than accumulating into a separate counter, preventing integer overflow when padding signals more than 2^31-1 bytes.
