document: rfc-3220
kind: protocol-element
summary: 'Mobile IP introduces three new architectural entities: Mobile Node (host/router that changes point of attachment while keeping its IP address), Home Agent (router on home network that tunnels datagrams to the mobile node), and Foreign Agent (router on visited network providing routing services and detunneling datagrams for the mobile node).'
section: "1.5"
topics:
