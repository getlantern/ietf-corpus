document: rfc-8379
kind: normative-requirement
summary: For point-to-multipoint links, when a Graceful-Link-Shutdown sub-TLV is received, the remote node MUST identify the neighbor corresponding to the graceful-shutdown link, set its metric to MaxLinkMetric (0xffff), and MUST reoriginate the Router-LSA.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
