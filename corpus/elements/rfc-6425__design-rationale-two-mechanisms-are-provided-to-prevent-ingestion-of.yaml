document: rfc-6425
kind: design-rationale
summary: 'Two mechanisms are provided to prevent ingestion of a flood of concurrent echo replies at the ingress when pinging all egresses of a large P2MP LSP: (1) the Echo Jitter TLV causes responders to randomize reply timing; (2) the P2MP Responder Identifier TLV limits the scope of an echo request to a single egress.'
section: "2.2"
topics:
    - mpls
    - multicast
    - routing
