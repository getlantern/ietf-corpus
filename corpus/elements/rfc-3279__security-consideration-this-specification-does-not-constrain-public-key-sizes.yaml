document: rfc-3279
kind: security-consideration
summary: This specification does not constrain public key sizes or parameters; selection of appropriate key sizes is critical for security. The particular elliptic curve selected also impacts signature strength — some curves are cryptographically stronger than others. Use of well-known named curves from ANSI X9.62 is recommended.
section: "5"
topics:
