document: rfc-3015
kind: normative-requirement
summary: When ReserveGroup or ReserveValue is True, the MG SHALL reserve resources for all alternatives it can support and SHALL return an empty Local or Remote descriptor if it cannot support any alternative within that descriptor. When both are False, the MG SHOULD choose the first supportable Local alternative paired with a supportable Remote, returning Error 510 (Insufficient Resources) if none is possible.
section: 7.1.7
rfc2119_level: SHALL
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
