document: rfc-2662
kind: interoperability-note
summary: Implementation of the Entity MIB (RFC 2037) is optional and does not alter adslLineMib content or its IF-MIB relationship. If implemented, entAliasMappingTable should map ATU-C (or ATU-R) physical entities to their corresponding ifIndex values, and entPhysicalName approximates ifName semantics.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
