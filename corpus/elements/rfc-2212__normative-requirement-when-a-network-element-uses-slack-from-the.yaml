document: rfc-2212
kind: normative-requirement
summary: When a network element uses slack from the RSpec, the new (Rout, Sout) pair must satisfy Sout + b/Rout + Ctoti/Rout <= Sin + b/Rin + Ctoti/Rin, and r <= Rout <= Rin. At a merge/split point, Rout is the maximum of all incoming rates and Sout is the minimum slack.
section: Ordering and Merging
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
