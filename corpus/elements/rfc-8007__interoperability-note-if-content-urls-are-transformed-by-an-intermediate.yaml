document: rfc-8007
kind: interoperability-note
summary: If content URLs are transformed by an intermediate CDN in a cascade, that CDN MUST similarly transform URLs in CI/T Commands it passes downstream. URL scheme (HTTP vs HTTPS) MUST be ignored when matching URLs in Trigger Specifications.
section: "4.8"
