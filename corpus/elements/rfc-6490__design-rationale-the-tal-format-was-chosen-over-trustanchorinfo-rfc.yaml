document: rfc-6490
kind: design-rationale
summary: The TAL format was chosen over TrustAnchorInfo (RFC 5914) because RPKI implementors adopted TAL prior to the PKIX trust anchor work, the community preferred its simplicity, and no rsync URI extension was defined for TrustAnchorInfo. The ASCII encoding of TAL was also preferred over the binary ASN.1 encoding.
section: "2.1"
topics:
    - pkix
    - security
