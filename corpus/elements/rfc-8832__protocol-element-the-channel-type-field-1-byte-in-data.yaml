document: rfc-8832
kind: protocol-element
summary: 'The Channel Type field (1 byte) in DATA_CHANNEL_OPEN specifies reliability and ordering: DATA_CHANNEL_RELIABLE (0x00), DATA_CHANNEL_RELIABLE_UNORDERED (0x80), DATA_CHANNEL_PARTIAL_RELIABLE_REXMIT (0x01), DATA_CHANNEL_PARTIAL_RELIABLE_REXMIT_UNORDERED (0x81), DATA_CHANNEL_PARTIAL_RELIABLE_TIMED (0x02), and DATA_CHANNEL_PARTIAL_RELIABLE_TIMED_UNORDERED (0x82).'
section: "5.1"
