document: rfc-7685
kind: security-consideration
summary: The contents of the padding extension could be used as a covert channel. To prevent this, the extension data is required to be all zeros, though the length of the extension itself can still serve as a much smaller covert channel.
section: "5"
topics:
    - tls
    - security
    - privacy
