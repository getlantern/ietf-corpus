document: rfc-9086
kind: normative-requirement
summary: When a SID carries a 3-octet local label value (20 rightmost bits), the V- and L-Flags MUST be SET; when carrying a 4-octet SRGB index, the SRGB MUST be advertised using extensions defined in RFC 9085.
