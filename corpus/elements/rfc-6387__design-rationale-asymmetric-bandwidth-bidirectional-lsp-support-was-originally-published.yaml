document: rfc-6387
kind: design-rationale
summary: Asymmetric bandwidth bidirectional LSP support was originally published as Experimental (RFC 5467) because it was considered unlikely to be deployed. MPLS-TP (RFC 5654) subsequently mandated this capability, driving promotion to the Standards Track with no technical changes from RFC 5467.
section: "1"
topics:
    - mpls
    - routing
