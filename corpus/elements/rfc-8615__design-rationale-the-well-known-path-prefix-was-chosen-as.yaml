document: rfc-8615
kind: design-rationale
summary: The '/.well-known/' path prefix was chosen as a centralized 'sandbox' for well-known locations to reduce collision risks and minimize impact on preexisting URIs, rather than allowing arbitrary ad-hoc well-known locations that would usurp origin control over URI space.
section: "1"
