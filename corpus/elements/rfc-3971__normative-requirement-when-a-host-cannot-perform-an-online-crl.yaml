document: rfc-3971
kind: normative-requirement
summary: When a host cannot perform an online CRL check (because it has no Internet connection yet), acceptance of the router certificate MUST be considered provisional; the host MUST perform the CRL check as soon as a connection is established and SHOULD immediately stop using the router if the check fails or is disrupted.
section: 6.3.1
rfc2119_level: MUST
topics:
    - security
    - pkix
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
