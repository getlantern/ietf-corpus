document: rfc-5901
kind: protocol-element
summary: The DCSite element describes the credential collection site, classified by DCType (web, email, keylogger, automation, unspecified) and holding a choice of SiteURL, Domain, EmailSite, iodef:Address, or Unknown — each carrying an integer confidence attribute (0–100). Multiple DCSite elements indicate multiple collection sites.
section: "5.11"
topics:
