document: rfc-9960
kind: protocol-element
summary: This document updates the Replication-ID of the control plane identifier of a Replication segment (RFC 9524) to be the tuple <Root, Tree-ID, Instance-ID>. Replication segments used to instantiate a PTI are identified by <Root, Tree-ID, Instance-ID, Node-ID>.
section: "2.3"
topics:
