document: rfc-8556
kind: normative-requirement
summary: To determine the set of BFERs for a given C-flow using the LIR method, a BFIR MUST originate a (C-S,C-G) S-PMSI A-D route with a PTA and MUST set the Leaf Information Required (LIR) flag; BFERs that need to receive the flow respond with Leaf A-D routes.
section: 2.2.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
