document: rfc-1989
kind: normative-requirement
summary: All octets included in the FCS calculation MUST be counted (packet header, information field, padding, FCS octets), plus one flag octet per frame. Additional flag sequences and escape bits or octets MUST NOT be counted.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
