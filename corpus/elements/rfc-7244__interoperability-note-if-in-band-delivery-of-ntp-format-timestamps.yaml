document: rfc-7244
kind: interoperability-note
summary: If in-band delivery of NTP-format timestamps is supported (RFC 6051), the NTP timestamps Si and Sj for the Synchronization Offset calculation should be obtained directly from RTP packets; otherwise they must be calculated from corresponding RTP timestamps.
section: "4.2"
topics:
