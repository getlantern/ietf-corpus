document: rfc-2192
kind: normative-requirement
summary: The string `;AUTH=*` indicates the client SHOULD select an appropriate authentication mechanism from the CAPABILITY list or use an out-of-band security service resulting in a PREAUTH connection. If no mechanism is available and no user name is given, the client SHOULD fall back to anonymous login.
section: "3"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
