document: rfc-4193
kind: design-rationale
summary: Global IDs are pseudo-randomly allocated (not from a central registry) to allow self-generated, coordiation-free assignment with extremely high probability of uniqueness. The collision probability for 1000 interconnected networks with 40-bit IDs is approximately 4.54×10^-7.
