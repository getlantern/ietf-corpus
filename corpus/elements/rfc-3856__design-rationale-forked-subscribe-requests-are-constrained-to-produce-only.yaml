document: rfc-3856
kind: design-rationale
summary: Forked SUBSCRIBE requests are constrained to produce only a single dialog so that only one PA generates notifications per subscription. Supporting heterogeneous PAs each handling a subset of presence data would require the subscriber to act as aggregator, which can only reasonably be performed by agents representing the presentity.
section: "6.9"
topics:
    - sip
    - realtime
