document: rfc-3347
kind: normative-requirement
summary: iSCSI MUST provide for strong authentication when increased security is required. The protocol MUST support private authenticated login, where 'private' mandates protected identity exchange with no clear-text passwords at minimum.
section: "7.1"
rfc2119_level: MUST
topics:
