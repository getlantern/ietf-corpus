document: rfc-8203
kind: normative-requirement
summary: If a Shutdown Communication with an invalid Length value or invalid UTF-8 sequence is received, a message indicating this event SHOULD be logged for operator attention. An erroneous or malformed Shutdown Communication itself MAY be logged in hexdump format.
section: "4"
rfc2119_level: SHOULD
topics:
