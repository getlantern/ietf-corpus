document: rfc-9569
kind: normative-requirement
summary: 'The updates graph MUST satisfy three invariants: Continuity (all versions between start-seq and end-seq must exist, with incremental updates between every consecutive pair); Feasibility (a snapshot of start-seq must always be provided); and Right-shift only (start-seq and end-seq can only increase over time, never decrease).'
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
