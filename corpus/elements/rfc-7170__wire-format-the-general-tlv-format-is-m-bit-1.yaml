document: rfc-7170
kind: wire-format
summary: 'The general TLV format is: M bit (1=mandatory, 0=optional), R bit (reserved), TLV Type (14 bits, values 1–17 currently defined), Length (2 octets, length of Value field in octets), and variable-length Value. If a peer does not support a mandatory TLV, it MUST send a NAK TLV in response.'
section: 4.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
