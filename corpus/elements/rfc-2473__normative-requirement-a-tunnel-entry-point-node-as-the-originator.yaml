document: rfc-2473
kind: normative-requirement
summary: A tunnel entry-point node, as the originator of tunnel IPv6 packets, must support fragmentation of those tunnel packets. A tunnel intermediate node must not fragment a packet undergoing forwarding.
section: "7"
rfc2119_level: MUST
