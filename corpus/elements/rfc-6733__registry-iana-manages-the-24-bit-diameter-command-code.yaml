document: rfc-6733
kind: registry
summary: IANA manages the 24-bit Diameter Command Code space. Values 16,777,214 (0xFFFFFE) and 16,777,215 (0xFFFFFF) are reserved for experimental use. Base protocol command codes include CER/CEA (257), RAR/RAA (258), ACR/ACA (271), ASR/ASA (274), STR/STA (275), DWR/DWA (280), and DPR/DPA (282). New codes for vendor-specific use may be allocated under a relaxed policy compared to RFC 3588.
section: 11.2.1
topics:
    - diameter
    - registry
