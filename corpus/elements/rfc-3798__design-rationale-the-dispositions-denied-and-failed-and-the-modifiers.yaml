document: rfc-3798
kind: design-rationale
summary: The dispositions "denied" and "failed", and the modifiers "warning", "superseded", "expired", and "mailbox-terminated" present in RFC 2298 were removed from RFC 3798 because they saw no actual implementation or usage, simplifying the specification to match deployed reality.
