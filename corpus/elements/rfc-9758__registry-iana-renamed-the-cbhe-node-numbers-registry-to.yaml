document: rfc-9758
kind: registry
summary: 'IANA renamed the ''CBHE Node Numbers'' registry to ''''ipn'' Scheme URI Default Allocator Node Numbers'' and moved it under the URI Schemes registry group. Range 1–0x3FFF is Private Use; 0x4000–0xFFFFFFFE requires Expert Review. New entries: 0 (Null ipn URI) and 4294967295 (LocalNode ipn URIs).'
