document: rfc-7689
kind: interoperability-note
summary: Optical tributary signal characteristics — modulation format, FEC type, and center frequency (wavelength) — can change as a WSON signal traverses regenerators, OEO switches, or wavelength converters. These are summarized in the Optical Interface Class (RFC 7446) and must be conveyed in signaling for compatibility checking.
section: "3.1"
topics:
    - routing
    - mpls
