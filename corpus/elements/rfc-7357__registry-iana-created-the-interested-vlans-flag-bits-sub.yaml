document: rfc-7357
kind: registry
summary: IANA created the 'Interested VLANs Flag Bits' sub-registry in the TRILL Parameters registry (IETF Review). Bit 3 is assigned as the ESADI Participation (ES) bit in the INT-VLAN sub-TLV; bits 0-1 are M4/M6 multicast router attachment; bits 2, 16-19 are unassigned; bits 4-15 and 20-31 are used for VLAN IDs.
section: "7.1"
