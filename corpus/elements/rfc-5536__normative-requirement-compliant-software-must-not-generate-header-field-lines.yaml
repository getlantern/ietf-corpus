document: rfc-5536
kind: normative-requirement
summary: Compliant software MUST NOT generate header field lines of more than 998 octets. Every line of a header field body (including the first and any folded lines) MUST contain at least one non-whitespace character, making empty header field bodies illegal.
section: "2.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
