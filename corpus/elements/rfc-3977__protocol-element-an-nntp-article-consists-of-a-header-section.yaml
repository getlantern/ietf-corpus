document: rfc-3977
kind: protocol-element
summary: 'An NNTP article consists of a header section and a body separated by a single blank line (two consecutive CRLF pairs). Header lines follow the format ''name: content CRLF'' and may be folded by inserting CRLF before TAB or space. The body may be empty; the article MUST end with a CRLF pair.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
