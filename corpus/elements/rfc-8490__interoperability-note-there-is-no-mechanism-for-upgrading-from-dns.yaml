document: rfc-8490
kind: interoperability-note
summary: There is no mechanism for upgrading from DNS-over-TCP to DNS-over-TLS mid-connection. A connection is either DNS-over-TCP or DNS-over-TLS from the start; once a DSO session is established over a plaintext TCP connection, it remains plaintext for its entire lifetime.
section: "4.2"
topics:
    - dns
    - tls
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
