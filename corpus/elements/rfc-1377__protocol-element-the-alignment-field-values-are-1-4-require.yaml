document: rfc-1377
kind: protocol-element
summary: 'The Alignment field values are: 1–4 require an offset of that specific length modulo 4; 255 requests an odd-length offset (1 or 3); 254 requests an even-length offset (2 or 4). If the sender cannot dynamically vary padding, it MUST NAK with one of the two specific values.'
section: "3.1"
