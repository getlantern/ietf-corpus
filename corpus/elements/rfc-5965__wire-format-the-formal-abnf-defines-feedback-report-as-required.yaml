document: rfc-5965
kind: wire-format
summary: 'The formal ABNF defines feedback-report as: required fields (feedback-type, user-agent, version), opt-fields-once (arrival-date, incidents, original-envelope-id, original-mail-from, reporting-mta, source-ip), opt-fields-many (authres-header, original-rcpt-to, reported-domain, reported-uri), and zero or more ext-field entries. Fields may appear in any order.'
section: "3.5"
topics:
