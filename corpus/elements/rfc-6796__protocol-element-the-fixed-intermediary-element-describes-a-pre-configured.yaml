document: rfc-6796
kind: protocol-element
summary: The <fixed-intermediary> element describes a pre-configured media relay. It MUST contain one <int-host-port> element and MAY contain multiple <int-addl-port> elements. Its contents MUST be echoed to all policy servers that provide policies for the session.
