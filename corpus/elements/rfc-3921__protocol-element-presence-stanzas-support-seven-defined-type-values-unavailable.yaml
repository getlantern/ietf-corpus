document: rfc-3921
kind: protocol-element
summary: 'Presence stanzas support seven defined ''type'' values: ''unavailable'', ''subscribe'', ''subscribed'', ''unsubscribe'', ''unsubscribed'', ''probe'', and ''error''. A presence stanza with no ''type'' attribute signals the sender is online and available for communication.'
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
