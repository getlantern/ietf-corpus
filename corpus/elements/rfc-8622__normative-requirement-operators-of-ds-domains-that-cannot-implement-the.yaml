document: rfc-8622
kind: normative-requirement
summary: Operators of DS domains that cannot implement the LE PHB SHOULD NOT drop packets marked with the LE DSCP; they SHOULD map such packets to the default PHB and SHOULD preserve the LE DSCP marking.
