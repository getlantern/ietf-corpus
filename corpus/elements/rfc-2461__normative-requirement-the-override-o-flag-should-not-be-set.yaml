document: rfc-2461
kind: normative-requirement
summary: The Override (O) flag SHOULD NOT be set in solicited advertisements for anycast addresses or in solicited proxy advertisements. It SHOULD be set in all other solicited advertisements and in unsolicited advertisements so that receivers update their cached link-layer addresses.
section: "4.4"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
