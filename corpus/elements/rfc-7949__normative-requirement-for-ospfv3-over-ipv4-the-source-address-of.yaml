document: rfc-7949
kind: normative-requirement
summary: For OSPFv3 over IPv4, the source address of each transmitted packet MUST be the primary IPv4 address of the outgoing interface. All OSPFv3 routers on the link should share the same IPv4 subnet for transport to function correctly.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
