document: rfc-9779
kind: protocol-element
summary: The Block Number TLV (Type 6) is a new Mandatory TLV carried in LM query and response messages to correlate traffic counters using an 8-bit Block Number. The R flag distinguishes query direction (R=0, Counters 1&2) from response direction (R=1, Counters 3&4).
section: "6.2"
