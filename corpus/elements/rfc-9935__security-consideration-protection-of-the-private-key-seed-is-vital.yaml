document: rfc-9935
kind: security-consideration
summary: Protection of the private key (seed) is vital. Disclosure enables masquerades. The generation of private keys relies on a CSPRNG; inadequate PRNGs can result in little or no security, as an attacker may find it much easier to reproduce the PRNG environment than brute-force the full key space.
section: "9"
topics:
