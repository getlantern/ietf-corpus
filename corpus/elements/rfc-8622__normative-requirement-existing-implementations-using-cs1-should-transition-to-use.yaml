document: rfc-8622
kind: normative-requirement
summary: Existing implementations using CS1 SHOULD transition to use the unambiguous LE codepoint '000001' whenever possible. A DS domain still using CS1 for LE traffic SHOULD re-mark traffic to LE DSCP '000001' at egress to the next DS domain.
section: "6"
rfc2119_level: SHOULD
