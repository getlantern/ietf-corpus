document: rfc-7345
kind: design-rationale
summary: Security was focused on UDPTL-based fax transport rather than T.38-over-RTP because UDPTL is by far the dominant fax-over-IP transport; T.38 over RTP (which would use SRTP) accounts for a negligible share of implementations and never gained market traction.
