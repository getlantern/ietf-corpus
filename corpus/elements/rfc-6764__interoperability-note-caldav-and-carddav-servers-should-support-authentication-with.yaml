document: rfc-6764
kind: interoperability-note
summary: 'CalDAV and CardDAV servers SHOULD support authentication with the ''mailbox'' portion of mailto: URIs or email addresses as user identifiers. User identifiers extracted this way MUST NOT conflict with other login names on the server to avoid ambiguity.'
section: "7"
rfc2119_level: MUST NOT
topics:
