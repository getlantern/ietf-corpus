document: rfc-5838
kind: protocol-element
summary: A new AF-bit is added to the OSPFv3 Options field to indicate that a router supports multiple address families as defined in this specification. The existing V6-bit is only applicable to the IPv6 unicast AF and is ignored in other AFs.
section: "2.2"
topics:
    - routing
