document: rfc-2911
kind: protocol-element
summary: The 'job-state-reasons' attribute (1setOf type2 keyword) provides supplemental detail about a Job's current state. Values include 'job-incoming', 'job-data-insufficient', 'job-hold-until-specified', 'processing-to-stop-point', 'document-access-error', 'job-completed-successfully', 'job-completed-with-warnings', and 'job-completed-with-errors'.
section: 4.3.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
