document: rfc-5755
kind: protocol-element
summary: The Audit Identity extension (id-pe-ac-auditIdentity, { id-pe 4 }) carries an OCTET STRING of 1 to 20 octets that allows audit logging without directly identifying the AC holder. It MUST be marked critical so that verifiers that do not understand it cannot use the AC holder field for auditing instead.
section: 4.3.1
topics:
    - pkix
    - privacy
    - security
