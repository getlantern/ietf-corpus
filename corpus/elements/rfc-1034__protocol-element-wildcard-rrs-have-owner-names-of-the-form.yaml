document: rfc-1034
kind: protocol-element
summary: Wildcard RRs have owner names of the form '*.\<anydomain\>'. They synthesize RRs for query names that match descendants of \<anydomain\> where no explicit data exists, with the owner of synthesized RRs set to QNAME. Wildcards do not apply across zone cuts or when explicit data exists for any name between the wildcard domain and the query name.
section: 4.3.3
topics:
    - dns
