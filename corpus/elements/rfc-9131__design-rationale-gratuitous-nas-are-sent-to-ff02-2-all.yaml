document: rfc-9131
kind: design-rationale
summary: Gratuitous NAs are sent to ff02::2 (all-routers) rather than ff02::1 (all-nodes) to reduce multicast noise. With MLD snooping enabled, these NAs are only delivered to routers on the segment rather than flooded to all nodes.
section: "4.1"
topics:
    - ip
    - multicast
