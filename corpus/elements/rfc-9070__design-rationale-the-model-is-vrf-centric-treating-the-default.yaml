document: rfc-9070
kind: design-rationale
summary: The model is VRF-centric, treating the default forwarding table as just another VRF (network-instance). Although RFC 4364 distinguishes VRF tables from default forwarding tables, the YANG model collapses them to avoid unnecessary modeling complexity.
