document: rfc-8141
kind: normative-requirement
summary: The 'Interoperability' section of a URN namespace registration template MUST specify any known potential issues related to interoperability, including possible confusion with other URN namespaces, non-URN identifier systems, or URI schemes.
section: 6.4.5
rfc2119_level: MUST
