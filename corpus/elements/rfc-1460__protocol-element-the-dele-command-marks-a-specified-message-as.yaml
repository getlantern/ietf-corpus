document: rfc-1460
kind: protocol-element
summary: The DELE command marks a specified message as deleted; the message is not actually removed until the UPDATE state. Any subsequent reference to the deleted message-id generates an error. DELE also updates 'highest number accessed' if the message number exceeds it.
section: "5"
