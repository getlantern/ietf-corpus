document: rfc-5705
kind: design-rationale
summary: The context value allows applications to mix their own data with the TLS PRF to prevent substitution attacks. For example, when client credentials are valid for more than one identity, the expected identity can be mixed into the keying material via the context value.
section: "4"
topics:
    - tls
    - crypto
    - security
