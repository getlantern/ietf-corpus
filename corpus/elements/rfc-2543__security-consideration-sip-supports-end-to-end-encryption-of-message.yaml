document: rfc-2543
kind: security-consideration
summary: SIP supports end-to-end encryption of message bodies and selected header fields using PGP or S/MIME, and hop-by-hop encryption using TLS or IPsec. The Via field can be encrypted to hide routing topology from intermediaries.
section: "13.1"
