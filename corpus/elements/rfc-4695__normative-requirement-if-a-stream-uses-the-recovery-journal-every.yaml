document: rfc-4695
kind: normative-requirement
summary: If a stream uses the recovery journal, every payload MUST include a journal section. If a stream does not use journalling, a journal section MUST NOT appear. The journalling method for a stream is set at session start and MUST NOT be changed thereafter.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
