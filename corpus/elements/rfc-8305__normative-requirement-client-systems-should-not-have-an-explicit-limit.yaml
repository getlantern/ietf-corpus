document: rfc-8305
kind: normative-requirement
summary: Client systems SHOULD NOT have an explicit limit to the number of DNS servers that can be configured. If such a limit is required by hardware, the client SHOULD use at least one address from each address family from the available list.
section: "3.1"
rfc2119_level: SHOULD NOT
