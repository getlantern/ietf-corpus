document: rfc-3101
kind: normative-requirement
summary: All NSSA border routers MUST set the E-bit in Type-1 router-LSAs originated into directly attached non-stub areas, even when not currently translating, so that other NSSA border routers can see their ASBR status across the AS transit topology.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
