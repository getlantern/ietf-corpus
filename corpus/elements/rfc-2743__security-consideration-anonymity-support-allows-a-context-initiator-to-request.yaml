document: rfc-2743
kind: security-consideration
summary: Anonymity support allows a context initiator to request via anon_req_flag that its identity not be revealed to the context acceptor. Mechanisms are not required to honor this request; the caller is informed via the returned anon_state indicator whether the request was honored. Authentication as the anonymous principal (Section 4.5 OID) does not necessarily eliminate credential requirements.
section: 1.2.5
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
