document: rfc-8288
kind: normative-requirement
summary: If the anchor parameter's value is a relative URI, parsers MUST resolve it as per RFC 3986 Section 5. Link applications MUST NOT process a link with an anchor parameter without applying the anchor.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
