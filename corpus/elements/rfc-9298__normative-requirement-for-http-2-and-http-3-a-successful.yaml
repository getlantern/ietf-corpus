document: rfc-9298
kind: normative-requirement
summary: For HTTP/2 and HTTP/3, a successful response SHALL have a status code in the 2xx range and SHALL meet Capsule Protocol requirements. If not, the client MUST treat the attempt as failed and abort the request.
section: "3.5"
rfc2119_level: MUST
