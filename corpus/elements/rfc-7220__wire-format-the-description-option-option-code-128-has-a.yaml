document: rfc-7220
kind: wire-format
summary: The DESCRIPTION option (Option Code 128) has a 1-octet Option Code field, 1-octet Reserved field, 2-octet Length field, and a variable-length Description field carrying up to 1016 octets of UTF-8 text. It is valid for MAP and PEER opcodes and may appear at most once per message.
