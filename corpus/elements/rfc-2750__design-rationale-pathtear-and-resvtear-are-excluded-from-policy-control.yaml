document: rfc-2750
kind: design-rationale
summary: PathTear and ResvTear are excluded from policy control because RSVP integrity verification already guarantees the Tear originates from the node that installed the reservation, making it functionally equivalent to that node withholding refreshes—no independent policy decision is required.
