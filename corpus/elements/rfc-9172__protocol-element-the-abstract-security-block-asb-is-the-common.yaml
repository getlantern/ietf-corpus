document: rfc-9172
kind: protocol-element
summary: 'The Abstract Security Block (ASB) is the common data structure shared by BIB and BCB. Its fields in order are: Security Targets (CBOR array of unsigned integers), Security Context Id (CBOR unsigned integer), Security Context Flags (CBOR unsigned integer bit field), Security Source (CBOR array EID), optional Security Context Parameters (CBOR array of Id/value 2-tuples), and Security Results (CBOR array of per-target result arrays).'
section: "3.6"
topics:
    - security
    - cbor
