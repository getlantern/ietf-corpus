document: rfc-1883
kind: normative-requirement
summary: If a node encounters a Routing header with an unrecognized Routing Type and Segments Left is non-zero, the node must discard the packet and send an ICMP Parameter Problem, Code 0, pointing to the unrecognized Routing Type. If Segments Left is zero, the node must ignore the Routing header and proceed to the next header.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
