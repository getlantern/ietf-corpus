document: rfc-8489
kind: protocol-element
summary: The FINGERPRINT mechanism optionally appends a FINGERPRINT attribute containing a CRC-32 of the message XOR'd with 0x5354554e, enabling more reliable demultiplexing of STUN from other protocols (e.g., RTP). When used, agents verify its presence and correctness upon receipt. This mechanism is not backwards-compatible with RFC 3489.
section: "7"
topics:
    - nat
