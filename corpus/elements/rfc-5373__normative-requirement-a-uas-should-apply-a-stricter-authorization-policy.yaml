document: rfc-5373
kind: normative-requirement
summary: A UAS SHOULD apply a stricter authorization policy to requests with Priv-Answer-Mode than to requests with Answer-Mode. The default policy SHOULD be to refuse Priv-Answer-Mode requests unless the requester is authenticated and specifically authorized.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
    - security
    - realtime
