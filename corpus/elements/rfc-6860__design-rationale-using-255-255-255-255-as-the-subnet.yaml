document: rfc-6860
kind: design-rationale
summary: Using 255.255.255.255 as the subnet mask in the network-LSA hides the transit-only broadcast network without accidentally hiding access broadcast networks, since the Link State ID is preserved and the two-way connectivity check proceeds normally.
