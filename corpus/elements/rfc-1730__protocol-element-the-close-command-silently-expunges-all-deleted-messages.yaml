document: rfc-1730
kind: protocol-element
summary: The CLOSE command silently expunges all \Deleted messages and returns to authenticated state without sending untagged EXPUNGE responses. SELECT, EXAMINE, and LOGOUT also implicitly close the selected mailbox without expunging.
