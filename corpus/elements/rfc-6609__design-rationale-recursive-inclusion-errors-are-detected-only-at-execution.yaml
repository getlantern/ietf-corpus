document: rfc-6609
kind: design-rationale
summary: Recursive inclusion errors are detected only at execution time, not upload time, to avoid imposing an upload ordering requirement on script authors and generators. Similarly, missing-script errors are deferred to execution time so scripts can be uploaded in any order.
section: "3.1"
