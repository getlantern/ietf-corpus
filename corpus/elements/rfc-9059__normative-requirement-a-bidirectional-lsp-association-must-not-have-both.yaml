document: rfc-9059
kind: normative-requirement
summary: A Bidirectional LSP Association MUST NOT have both LSPs identified as the same direction (both forward or both reverse). Violation MUST result in PCErr Error-Type=26, Error-value=17 (Bidirectional LSP direction mismatch).
section: "5.7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
