document: rfc-7070
kind: privacy-consideration
summary: When a client queries a service about a subject, the service provider can infer the existence of that subject and observe which clients inquire about it over time — an unanticipated side-channel leak of private information about client activity and relationships.
section: "8.4"
topics:
    - privacy
