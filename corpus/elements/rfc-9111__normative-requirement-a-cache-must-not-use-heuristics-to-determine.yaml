document: rfc-9111
kind: normative-requirement
summary: A cache MUST NOT use heuristics to determine freshness when an explicit expiration time is present in the stored response. Heuristic expiration may only be used on responses without explicit freshness whose status codes are heuristically cacheable or that are marked explicitly cacheable (e.g., via the public directive).
section: 4.2.2
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
