document: rfc-6370
kind: interoperability-note
summary: The MPLS-TP LSP_ID maps to the GMPLS/RSVP-TE 5-tuple (Tunnel End-point Address, Tunnel_ID, Extended Tunnel_ID, Tunnel Sender Address, RSVP LSP_ID). For co-routed bidirectional LSPs, the LSP_Num maps to the RSVP LSP_ID; for associated bidirectional, each direction uses its own LSP_Num as RSVP LSP_ID. No mapping exists for Global_IDs as RSVP-TE has not yet been extended to accommodate them.
section: "5.3"
topics:
    - routing
