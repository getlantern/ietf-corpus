document: rfc-4072
kind: normative-requirement
summary: When the NAS issues the EAP-Request/Identity message to the EAP client, it SHOULD interpret the returned EAP-Response/Identity packet and copy its value to a User-Name AVP in the Diameter-EAP-Request, to enable realm-based routing.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - diameter
