document: rfc-4804
kind: design-rationale
summary: The IP Protocol number in E2E Path messages is left as 'RSVP' rather than being changed to 'RSVP-E2E-IGNORE' (as required by RFC 3175), because the absence of Router Alert already renders the message invisible to transit LSRs without needing a protocol number change.
section: "4.2"
topics:
