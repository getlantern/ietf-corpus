document: rfc-2910
kind: registry
summary: 'Appendix B registers the MIME media type ''application/ipp'' with IANA for encoding IPP operations. All IPP HTTP request and response message bodies MUST use Content-Type: application/ipp. Extensions to attribute syntaxes, attribute groups, and out-of-band values follow the ''type2'' registration procedures defined in RFC 2911 section 6.'
section: "14"
topics:
