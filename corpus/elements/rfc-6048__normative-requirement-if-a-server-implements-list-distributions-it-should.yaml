document: rfc-6048
kind: normative-requirement
summary: If a server implements LIST DISTRIBUTIONS, it SHOULD also implement LIST DISTRIB.PATS and include in the distributions list all distributions present in the distrib.pats list, enabling clients to use both commands jointly.
section: 2.3.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
