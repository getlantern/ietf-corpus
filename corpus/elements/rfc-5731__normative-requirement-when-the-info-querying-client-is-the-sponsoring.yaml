document: rfc-5731
kind: normative-requirement
summary: When the <info> querying client is the sponsoring client or provides valid authorization information, all available information MUST be returned. The <domain:authInfo> element MUST only be returned to the current sponsoring client or a client supplying valid authorization information.
section: 3.1.2
rfc2119_level: MUST
topics:
    - dns
    - security
