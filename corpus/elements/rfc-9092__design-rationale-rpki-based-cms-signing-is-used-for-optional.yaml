document: rfc-9092
kind: design-rationale
summary: RPKI-based CMS signing is used for optional authentication because RPSL authentication is widely weak; WebPKI HTTPS provides integrity and confidentiality for fetching but cannot authenticate IP address space assignment, which only RPKI can do.
