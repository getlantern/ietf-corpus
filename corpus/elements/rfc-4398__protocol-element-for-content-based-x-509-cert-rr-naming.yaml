document: rfc-4398
kind: protocol-element
summary: 'For content-based X.509 CERT RR naming, priority order is: (1) domain name in certificate/CRL identification, (2) reverse DNS of IP address, (3) domain name extracted from a URI in the certificate, (4) character string name treated as OpenPGP-style, (5) distinguished name mapped to domain per RFC 2247.'
section: "3.1"
