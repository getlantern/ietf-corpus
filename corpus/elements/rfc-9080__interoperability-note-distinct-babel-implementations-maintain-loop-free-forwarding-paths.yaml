document: rfc-9080
kind: interoperability-note
summary: Distinct Babel implementations maintain loop-free forwarding paths, but if they implement conflicting options they may not exchange a full set of routes. In the worst case, an IPv6-only and an IPv4-only implementation will exchange no routes at all.
section: "1.2"
topics:
    - routing
    - ip
