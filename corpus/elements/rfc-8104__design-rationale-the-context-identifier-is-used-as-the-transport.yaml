document: rfc-8104
kind: design-rationale
summary: The context identifier is used as the transport tunnel destination rather than the private IP address of the primary PE. This simultaneously routes traffic to the primary PE during normal operation and conveys the identity of the protector to PLRs so they can establish correctly targeted bypass tunnels without per-PW state.
section: 4.3.1
topics:
    - mpls
    - routing
