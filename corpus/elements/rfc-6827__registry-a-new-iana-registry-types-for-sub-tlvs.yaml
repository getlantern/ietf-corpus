document: rfc-6827
kind: registry
summary: A new IANA registry 'Types for sub-TLVs of Router Address TLV (Value 1)' was created. Types 0-32767 are assigned via Standards Action (type 0 reserved); types 32768-32777 are experimental and unregistered; types 32778-65535 require a future Standards Track RFC. Inter-RA Export Upward (12) and Downward (13) were the initial allocations.
