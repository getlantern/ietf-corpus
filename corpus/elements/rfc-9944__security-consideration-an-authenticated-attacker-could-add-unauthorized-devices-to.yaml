document: rfc-9944
kind: security-consideration
summary: An authenticated attacker could add unauthorized devices to the network, including devices with known vulnerabilities or IP-based devices acting as bots. Network administrators SHOULD establish access-control policies following the principle of least privilege, and SHOULD layer additional policies regarding what devices are permitted.
section: 8.1.1
topics:
    - security
