document: rfc-9240
kind: protocol-element
summary: An ALTO entity generalizes the concept of an ALTO endpoint. Entities can be individual IP addresses, PIDs, Autonomous Systems, country codes, TCP/UDP flows, routing elements, or Abstract Network Elements (ANEs). An entity is owned by exactly one entity domain name, and if two entities in different domains refer to the same physical object, they are treated as distinct entities.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
