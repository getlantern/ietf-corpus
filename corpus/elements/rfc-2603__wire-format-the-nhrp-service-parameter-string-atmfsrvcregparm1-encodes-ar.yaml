document: rfc-2603
kind: wire-format
summary: 'The NHRP service parameter string (atmfSrvcRegParm1) encodes: ar$pro.type (16 bits, protocol type, e.g. 0x0800 for IPv4), ar$pro.snap (40 bits, optional protocol type extension, 0 for IPv4/IPv6), ar$plen (8 bits, length of protocol address), ar$addr (plen octets, network address in network byte order), and ar$mask (plen octets, network mask in network byte order).'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
