document: rfc-6450
kind: design-rationale
summary: The default request rate of 1 per second (Default-Client-Request-Rate) was chosen because it is safe across most deployments and mirrors the conventional behavior of the ICMP 'ping' tool. The value may be less than 1 to support very low-rate environments.
section: 3.5.1
topics:
    - multicast
