document: rfc-4352
kind: normative-requirement
summary: 'ToC entries with #frames equal to 0 SHALL NOT be used, and a received packet containing such a ToC entry SHALL be discarded. Similarly, a packet containing a ToC entry with an undefined FT value SHALL be discarded entirely to prevent loss of depacketization synchronization.'
section: 4.3.2.1
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
