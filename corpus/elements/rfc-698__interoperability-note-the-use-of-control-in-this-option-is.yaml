document: rfc-698
kind: interoperability-note
summary: 'The use of ''CONTROL'' in this option is non-standard: it does not refer to NVT ASCII control codes 0–37, but rather to bit 8 of the extended character. Implementors must not conflate the two meanings.'
section: "5"
