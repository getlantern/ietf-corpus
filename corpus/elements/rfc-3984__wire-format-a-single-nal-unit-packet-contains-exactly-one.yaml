document: rfc-3984
kind: wire-format
summary: A Single NAL Unit Packet contains exactly one H.264 NAL unit; the NAL unit type octet (F|NRI|Type) is the first byte and also serves as the RTP payload header. Only nal_unit_type values 1-23 are valid in this packet type.
