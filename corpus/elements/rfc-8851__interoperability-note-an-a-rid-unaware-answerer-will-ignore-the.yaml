document: rfc-8851
kind: interoperability-note
summary: An 'a=rid'-unaware answerer will ignore the entire 'a=rid' line per standard offer/answer rules. Because RFC 8851 requires a valid 'a=fmtp' line to be present whenever one would otherwise be needed, ignoring 'a=rid' lines always results in a valid session description.
section: 6.2.1
