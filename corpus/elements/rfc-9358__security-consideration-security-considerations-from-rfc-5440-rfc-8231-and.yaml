document: rfc-9358
kind: security-consideration
summary: Security considerations from RFC 5440, RFC 8231, and RFC 8281 apply to the extensions defined in this document. Additional risks associated with LSP associations from a malicious PCEP speaker are described in RFC 8697 and apply equally to the VN Association Type. Securing the PCEP session using TLS (RFC 8253) is RECOMMENDED.
section: "5"
topics:
