document: rfc-3118
kind: security-consideration
summary: Delayed authentication does not support interdomain authentication; it is limited to intradomain scenarios where an out-of-band exchange of a shared secret is feasible. A real digital signature mechanism such as RSA would provide better security but was computationally infeasible at time of writing.
section: "9.2"
topics:
    - security
