document: rfc-7542
kind: wire-format
summary: 'UTF-8 multi-byte characters in NAIs are encoded per RFC 3629: UTF8-2 covers %xC2-DF + tail, UTF8-3 covers %xE0-EF sequences, and UTF8-4 covers %xF0-F4 sequences, where UTF8-tail is %x80-BF. All non-ASCII characters in NAIs must be valid UTF-8.'
