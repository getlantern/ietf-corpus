document: rfc-8049
kind: normative-requirement
summary: If the 'strict' leaf in the bearer 'requested-type' is true, the management system MUST treat the media type as an inviolable constraint and cannot substitute another. If the 'always-on' leaf is set to true, the management system MUST elect an always-on media type (ruling out dial-access types).
section: 6.6.3
rfc2119_level: MUST
topics:
    - yang
    - vpn
