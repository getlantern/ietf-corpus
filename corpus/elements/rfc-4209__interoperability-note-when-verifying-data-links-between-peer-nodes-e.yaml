document: rfc-4209
kind: interoperability-note
summary: When verifying data links between peer nodes (e.g., OXC1-OXC2) using LMP link verification, the OLSes (OLS1 and OLS2) must be made transparent with respect to the concatenated data links. Coordination of this transparency is the responsibility of the peer nodes.
section: "2.2"
topics:
