document: rfc-1471
kind: protocol-element
summary: pppLinkStatusPhysicalIndex identifies the lower-level interface (e.g., RS-232 port) over which the PPP link operates, containing the ifIndex value of the lower-layer interface entry. A value of 0 indicates no lower-layer interface is identifiable.
