document: rfc-6729
kind: normative-requirement
summary: An MTA implementing this specification SHOULD add a Received field whenever it determines a special handling condition will occur and places the message into that condition, or when it determines no special handling is required and prepares it for relay to the next handling agent.
section: "3"
rfc2119_level: SHOULD
