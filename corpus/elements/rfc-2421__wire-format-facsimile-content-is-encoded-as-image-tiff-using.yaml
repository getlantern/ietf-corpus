document: rfc-2421
kind: wire-format
summary: Facsimile content is encoded as image/tiff using the TIFF-F profile (RFC 2306). The content-type parameter 'application=faxbw' MUST be included in outbound messages. TIFF-F images MUST be encoded with exactly one image strip per facsimile page.
section: 4.3.5
topics:
    - email
    - voip
