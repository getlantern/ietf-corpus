document: rfc-5464
kind: normative-requirement
summary: If the METADATA extension is present, support for shared annotations is REQUIRED, whilst support for private annotations is OPTIONAL. When private annotations are restricted, the server MUST return NO when SETMETADATA attempts to create a private server annotation.
section: "3.3"
rfc2119_level: REQUIRED
topics:
