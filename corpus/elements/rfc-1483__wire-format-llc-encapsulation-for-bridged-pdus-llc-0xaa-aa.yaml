document: rfc-1483
kind: wire-format
summary: 'LLC Encapsulation for bridged PDUs: LLC 0xAA-AA-03 + OUI 0x00-80-C2 + 2-octet PID (encoding media type and FCS preservation) + PAD (for 4-octet alignment of user information field) + MAC frame contents. Ethernet/802.3 uses 2-octet PAD; 802.4, 802.5, FDDI use 3-octet PAD.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
