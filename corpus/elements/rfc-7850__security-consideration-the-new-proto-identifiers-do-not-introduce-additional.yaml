document: rfc-7850
kind: security-consideration
summary: The new 'proto' identifiers do not introduce additional security considerations beyond those specified by the individual transport protocols they identify and those detailed in Section 7 of RFC4566 (SDP). Security properties are inherited from the underlying transport (TLS, DTLS-SRTP, SRTP) referenced in each identifier.
section: "6"
topics:
