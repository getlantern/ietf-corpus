document: rfc-2793
kind: interoperability-note
summary: 'Since sequence numbers are not provided in the redundant header per RFC 2198, additional ordering rules must be followed to allow redundant data to be merged properly: redundant blocks must be in age order and sequence numbers are inferred by counting backwards from the RTP header sequence number.'
section: "2.3"
topics:
    - rtp
    - realtime
