document: rfc-9111
kind: normative-requirement
summary: A cache MUST NOT reuse a stored response unless the target URI matches, the request method allows reuse, Vary-nominated header fields match, no-cache is absent or the response has been successfully validated, and the stored response is fresh, allowed to be served stale, or successfully validated.
section: "4"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
