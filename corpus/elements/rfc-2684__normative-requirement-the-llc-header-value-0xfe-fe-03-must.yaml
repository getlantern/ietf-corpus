document: rfc-2684
kind: normative-requirement
summary: The LLC header value 0xFE-FE-03 MUST be used to identify a routed PDU in ISO NLPID format. A one-octet NLPID field follows the LLC header and MUST NOT be 0x00 (Null Network Layer).
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
