document: rfc-6806
kind: protocol-element
summary: The enc-pa-rep ticket flag (bit 15) is set by the KDC in all issued tickets to indicate KDC support for the FAST negotiation mechanism defined in this document. Clients use this flag to detect if the facility was available but stripped by an attacker.
