document: rfc-6326
kind: normative-requirement
summary: An INT-VLAN sub-TLV MUST be split into subranges whenever the information (multicast router attachment, appointed forwarder status lost counter, root bridges) differs across VLANs in the range. Using a range of one VLAN ID is always safe.
section: 2.3.6
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
