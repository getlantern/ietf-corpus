document: rfc-3479
kind: protocol-element
summary: 'The FT Session TLV (type 0x0503) negotiates FT capabilities on LDP Initialization. The FT Flags field contains: R (FT Reconnect Flag), S (Save State), A (All-Label Protection Required), C (Check-Pointing), and L (Learn From Network per RFC 3478). Invalid combinations include all of S/C/L zero, and L set together with S or C.'
section: "8.2"
topics:
    - mpls
    - routing
