document: rfc-8966
kind: normative-requirement
summary: A seqno request MUST NOT be forwarded to a multicast address and MUST NOT be forwarded to multiple neighbours simultaneously. A node MUST NOT increase its sequence number by more than 1 in reaction to a single seqno request.
section: 3.8.1.2
rfc2119_level: MUST NOT
topics:
    - routing
