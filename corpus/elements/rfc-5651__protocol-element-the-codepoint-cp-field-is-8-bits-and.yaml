document: rfc-5651
kind: protocol-element
summary: The Codepoint (CP) field is 8 bits and is an opaque identifier passed to the packet payload decoder to convey information on the codec being used. The mapping between codepoint and codec is defined per session and communicated out-of-band, analogous to the Payload Type field in RTP.
section: "5.1"
topics:
    - multicast
    - rtp
