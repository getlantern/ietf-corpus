document: rfc-7676
kind: normative-requirement
summary: A GRE tunnel MUST be able to carry a 1280-octet IPv6 packet from ingress to egress without fragmenting the payload packet. GRE ingress nodes MUST refrain from activating tunnels that do not satisfy this requirement.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
