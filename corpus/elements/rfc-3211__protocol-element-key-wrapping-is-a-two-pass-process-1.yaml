document: rfc-3211
kind: protocol-element
summary: 'Key wrapping is a two-pass process: (1) encrypt the formatted CEK block with the KEK using the specified IV, then (2) without resetting the IV (using the last ciphertext block as the IV), encrypt the result a second time. The output is the EncryptedKey.'
section: 2.3.1
