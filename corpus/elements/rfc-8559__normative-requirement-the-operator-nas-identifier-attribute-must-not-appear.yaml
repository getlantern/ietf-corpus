document: rfc-8559
kind: normative-requirement
summary: The Operator-NAS-Identifier attribute MUST NOT appear in a packet that does not also contain an Operator-Name attribute, and MUST NOT occur more than once per packet. Only the visited network may add Operator-NAS-Identifier; no other proxy or server in the network may add it.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
