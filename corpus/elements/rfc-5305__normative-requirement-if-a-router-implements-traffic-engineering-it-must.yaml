document: rfc-5305
kind: normative-requirement
summary: If a router implements traffic engineering, it MUST include the Traffic Engineering Router ID TLV (type 134) in its LSP. Implementations MUST NOT inject a /32 prefix for the router ID into their forwarding table.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
