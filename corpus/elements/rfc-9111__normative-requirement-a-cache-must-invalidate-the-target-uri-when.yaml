document: rfc-9111
kind: normative-requirement
summary: A cache MUST invalidate the target URI when it receives a non-error (2xx or 3xx) status code in response to an unsafe request method. A cache MUST NOT trigger invalidation of a URI whose origin differs from that of the target URI, to prevent denial-of-service attacks.
section: "4.4"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
