document: rfc-5042
kind: security-consideration
summary: A network-based attacker can impersonate a legal RDMAP/DDP peer by spoofing an IP address, requiring it to also guess valid STag and TO values for Tagged Messages; an invalid STag causes Stream teardown. End-to-end authentication such as IPsec is the primary countermeasure.
section: 5.1.1
topics:
    - security
