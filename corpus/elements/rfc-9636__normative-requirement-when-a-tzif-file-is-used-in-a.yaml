document: rfc-9636
kind: normative-requirement
summary: When a TZif file is used in a MIME message entity, it SHOULD be indicated by 'application/tzif-leap' if leap-second records are included, or 'application/tzif' (with leapcnt=0 in all headers) if they are not.
section: "4"
rfc2119_level: SHOULD
