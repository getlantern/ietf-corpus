document: rfc-7740
kind: design-rationale
summary: 'The procedures in this document are intentionally simpler than the IR mesh described in RFC 6514: they do not require each PE on the MP2MP tunnel to send a Selective P-Multicast Service Interface (S-PMSI) A-D route for the P2MP tunnel it roots, nor do they require each PE to send a Leaf A-D route to each P2MP root in the mesh.'
section: "1"
topics:
