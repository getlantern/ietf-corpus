document: rfc-8990
kind: normative-requirement
summary: All unicast GRASP messages MUST use a reliable transport protocol because GRASP itself does not provide error detection, retransmission, or flow control. Unless otherwise specified by the substrate, TCP MUST be used.
section: 2.5.3
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
