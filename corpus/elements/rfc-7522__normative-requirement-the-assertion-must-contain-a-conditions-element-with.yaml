document: rfc-7522
kind: normative-requirement
summary: The Assertion MUST contain a <Conditions> element with an <AudienceRestriction> element identifying the authorization server as an intended audience. The authorization server MUST reject any Assertion that does not contain its own identity as the intended audience.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - security
