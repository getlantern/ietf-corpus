document: rfc-860
kind: state-machine
summary: Process A sends DO TIMING-MARK to B. B may refuse with WON'T TIMING-MARK, or permit the mark to flow through its outgoing buffer (BUF2); instead of delivering it to the terminal, B enters the mark into its incoming buffer (BUF1). When the mark propagates through BUF1, B returns WILL TIMING-MARK to A over the Telnet connection.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
