document: rfc-2557
kind: wire-format
summary: The Content-Location header is defined in ABNF as 'Content-Location:' optionally surrounded by CFWS followed by a URI (absoluteURI or relativeURI per RFC 1738). Only a single Content-Location field is permitted per message or content heading.
