document: rfc-4028
kind: security-consideration
summary: 'Inside attacks: rogue proxies or UAs could attempt to force rapid session refreshes. The Min-SE mechanism prevents this by ensuring all elements on the path can enforce a minimum timer floor, and proxies will reject requests with too-small session intervals via 422.'
section: "11.1"
