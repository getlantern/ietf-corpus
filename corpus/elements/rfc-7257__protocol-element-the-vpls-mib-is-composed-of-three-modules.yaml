document: rfc-7257
kind: protocol-element
summary: 'The VPLS MIB is composed of three modules: VPLS-GENERIC-MIB for common parameters, VPLS-LDP-MIB for LDP-specific parameters (RFC 4762), and VPLS-BGP-MIB for BGP-specific parameters (RFC 4761). These modules are used in conjunction with PW-STD-MIB (RFC 5601).'
