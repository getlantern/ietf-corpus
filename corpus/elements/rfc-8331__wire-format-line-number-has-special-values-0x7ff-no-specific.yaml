document: rfc-8331
kind: wire-format
summary: 'Line_Number has special values: 0x7FF = no specific line location, 0x7FE = any line in vertical blanking range, 0x7FD = line number too large for 11 bits. An ANC packet with Line_Number=0x7FF and Horizontal_Offset=0xFFF is carried without any specific location.'
