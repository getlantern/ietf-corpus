summary: The Extended Next Hop Encoding capability (Capability Code 5, defined in RFC 5492) allows BGP speakers to dynamically discover whether, for a given NLRI AFI/SAFI, a peer supports advertisement with a next hop whose network protocol is determined by the Length of Next Hop Address field.
