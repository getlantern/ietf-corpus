document: rfc-3032
kind: protocol-element
summary: When sending labeled packets over PPP, the PPP Protocol field is set to hex 0281 for MPLS Unicast or hex 0283 for MPLS Multicast. Exactly one labeled packet is encapsulated in the PPP Information field.
