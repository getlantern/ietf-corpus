document: rfc-9242
kind: protocol-element
summary: Each IKE_INTERMEDIATE exchange uses its own SK_p[i/r]* key generation for IntAuth computation, matched to the same generation as the SK_e[i/r] and SK_a[i/r] keys protecting that exchange. The first exchange uses keys from IKE_SA_INIT; updated keys carry forward if a new key exchange occurred.
section: 3.3.2
topics:
