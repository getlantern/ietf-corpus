document: rfc-9567
kind: normative-requirement
summary: A reporting resolver MUST use a maximum expense or depth limit when performing additional DNS resolution to resolve the report query QNAME, in order to prevent cascading errors from triggering further error reports.
section: "6.1"
rfc2119_level: MUST
topics:
    - dns
