document: rfc-7455
kind: security-consideration
summary: 'An RBridge supporting OAM authentication can operate in three modes: (1) neither generate nor check Authentication TLVs, (2) include Authentication TLVs in sent messages but ignore them on receipt, or (3) enforce full authentication on both sent and received OAM messages, discarding unauthenticated or unverified messages.'
section: 8.4.13
topics:
    - security
