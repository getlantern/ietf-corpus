document: rfc-2941
kind: interoperability-note
summary: This document obsoletes RFC 1416 and updates the authentication option specification so that it can be used to securely enable the telnet encryption option (RFC 2946). The primary change is the addition of ENCRYPT_MASK and INI_CRED_FWD_MASK modifier bits.
section: "1"
topics:
    - security
    - crypto
