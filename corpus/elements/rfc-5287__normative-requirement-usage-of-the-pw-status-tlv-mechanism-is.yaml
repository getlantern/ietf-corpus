document: rfc-5287
kind: normative-requirement
summary: Usage of the PW Status TLV mechanism is NOT RECOMMENDED for TDM PWs while the IWF is operational to avoid contention with in-band data-plane status indications. However, if the IWF itself fails while the PWE3 control plane remains operational, a Status TLV with all fault bits set SHOULD be sent.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - mpls
