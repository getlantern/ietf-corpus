summary: 'IPv4PrefixInfoType encodes an IPv4 LPM table entry as: IPv4Address (4 bytes), Prefixlen (1 byte, range 0–32), ECMPFlag (boolean), DefaultRouteFlag (boolean), Reserved (1 byte), HopSelector (uint32). The HopSelector produced here is passed as metadata to downstream next-hop LFBs.'
