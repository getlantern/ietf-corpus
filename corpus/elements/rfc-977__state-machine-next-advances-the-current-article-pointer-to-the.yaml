document: rfc-977
kind: state-machine
summary: NEXT advances the current article pointer to the next article in the current newsgroup; LAST moves it to the previous article. If already at the last or first article respectively, an error is returned and the pointer remains unchanged. Both commands require a newsgroup to have been selected first.
section: "3.5"
topics:
