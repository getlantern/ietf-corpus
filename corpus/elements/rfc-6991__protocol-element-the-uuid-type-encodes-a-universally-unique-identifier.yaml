document: rfc-6991
kind: protocol-element
summary: The uuid type encodes a Universally Unique Identifier as defined by RFC 4122 in the standard 8-4-4-4-12 hex string form (e.g., f81d4fae-7dec-11d0-a765-00a0c91e6bf6), canonically lowercase. The dotted-quad type encodes an unsigned 32-bit number as four decimal octets separated by '.'.
