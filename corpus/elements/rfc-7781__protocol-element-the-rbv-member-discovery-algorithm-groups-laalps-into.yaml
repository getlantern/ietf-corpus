document: rfc-7781
kind: protocol-element
summary: 'The RBv member discovery algorithm groups LAALPs into RBvs by: first isolating LAALPs with OE-flag=1 into exclusive RBvs, then iteratively grouping remaining LAALPs that share exactly the same set of multihomed RBridges into a common RBv, processing in descending order of member count with ties broken by ascending LAALP ID.'
section: "4.1"
topics:
    - routing
