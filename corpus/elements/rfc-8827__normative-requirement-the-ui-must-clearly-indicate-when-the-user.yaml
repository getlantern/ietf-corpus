document: rfc-8827
kind: normative-requirement
summary: The UI MUST clearly indicate when the user's camera and microphone are in use. This indication MUST NOT be suppressible by JavaScript and MUST clearly indicate how to terminate device access, providing a UI means to immediately stop camera/microphone input without JS being able to prevent it.
section: "6.2"
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
