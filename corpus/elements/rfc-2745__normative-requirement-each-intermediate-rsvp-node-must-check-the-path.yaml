document: rfc-2745
kind: normative-requirement
summary: Each intermediate RSVP node must check the Path MTU in a DREQ; if the specified MTU exceeds the MTU of the incoming interface (toward the sender), the node reduces the Path MTU field to the smaller value before forwarding.
section: "4.3"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
