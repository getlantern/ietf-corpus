document: rfc-5959
kind: normative-requirement
summary: PBES2 with PBKDF2 using HMAC with SHA-256 as the key derivation algorithm and AES-128 Key Wrap with Padding as the encryption algorithm MUST be supported for the EncryptedPrivateKeyInfo structure. AES-256 Key Wrap with Padding MAY also be supported.
