document: rfc-5576
kind: protocol-element
summary: The 'fmtp' source attribute (a=ssrc:<ssrc> fmtp:<format> <format specific parameters>) conveys format-specific parameters for a given source. The <format> MUST be one of the media formats specified for the media stream, and MUST only be used for media types that explicitly specify source-level format parameters.
section: "6.3"
topics:
    - rtp
    - realtime
