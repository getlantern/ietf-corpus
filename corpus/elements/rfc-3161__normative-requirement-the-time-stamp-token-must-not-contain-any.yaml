document: rfc-3161
kind: normative-requirement
summary: The time-stamp token MUST NOT contain any signatures other than the signature of the TSA. The certificate identifier (ESSCertID) of the TSA certificate MUST be included as a signerInfo attribute inside a SigningCertificate attribute.
section: 2.4.2
rfc2119_level: MUST NOT
topics:
