document: rfc-8667
kind: normative-requirement
summary: The Prefix-SID sub-TLV MUST be present in the SID/Label Binding TLV when the M-Flag is clear (normal SRMS use), and MUST NOT be present when the M-Flag is set (Mirror Context). The SID/Label sub-TLV (Type 1) MUST be present in the Binding TLV when the M-Flag is set.
section: 2.4.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
