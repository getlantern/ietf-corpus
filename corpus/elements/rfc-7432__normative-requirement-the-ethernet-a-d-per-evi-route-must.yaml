document: rfc-7432
kind: normative-requirement
summary: The Ethernet A-D per EVI route MUST NOT be used for traffic forwarding by a remote PE until it also receives the associated set of Ethernet A-D per ES routes, to handle race conditions and prevent forwarding via a PE that has not yet established segment connectivity.
section: "8.4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
