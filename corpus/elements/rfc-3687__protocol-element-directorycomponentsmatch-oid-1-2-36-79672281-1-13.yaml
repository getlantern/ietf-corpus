document: rfc-3687
kind: protocol-element
summary: 'directoryComponentsMatch (OID 1.2.36.79672281.1.13.7) is derived from allComponentsMatch with overrides for directory-specific types: RDNSequence uses distinguishedNameMatch, RelativeDistinguishedName uses rdnMatch, TelephoneNumber uses telephoneNumberMatch, all string types use caseIgnoreMatch, GeneralizedTime uses generalizedTimeMatch, and UTCTime uses uTCTimeMatch.'
