document: rfc-7781
kind: normative-requirement
summary: Pseudonode LSP(s) MUST NOT be created for an RBv, since it is not a physical node. The tree root priority of the RBv's pseudo-nickname MUST be set to 0, and this nickname MUST NOT be listed in the 's' nicknames used to determine distribution tree roots.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
