document: rfc-3643
kind: normative-requirement
summary: When de-encapsulating a frame in the Synchronized state, if the Time Stamp words contain a valid time per SNTP the entity SHALL compute transit time as the difference between the current time base and the departure time recorded in the header, then process the result per the encapsulating protocol specification.
section: "4"
rfc2119_level: SHALL
topics:
    - ntp
