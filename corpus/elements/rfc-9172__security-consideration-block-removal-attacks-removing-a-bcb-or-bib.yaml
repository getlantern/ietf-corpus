document: rfc-9172
kind: security-consideration
summary: Block removal attacks (removing a BCB or BIB without its target, or removing both) leave no in-band evidence. BPSec must be combined with out-of-band policy specifying required security operations on transmission and reception to detect such attacks.
section: 8.2.2
topics:
    - security
