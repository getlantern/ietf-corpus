document: rfc-9003
kind: security-consideration
summary: Unless a transport providing integrity is used for the BGP session, a Shutdown Communication message could be forged; unless confidentiality is provided, it could be snooped. These risks are heightened here because the information is intended for human-to-human communication.
section: "6"
topics:
    - bgp
    - routing
    - security
