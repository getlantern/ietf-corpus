document: rfc-4639
kind: design-rationale
summary: Most MIB tables (e.g., docsDevNmAccessTable, docsDevFilterLLCTable) are specified not to persist across reboots. Upon reboot, these tables are cleared and repopulated from the DOCSIS configuration file supplied by the cable operator, enabling cable modem portability across different operators.
section: 3.1.2
topics:
    - snmp
