document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelExtraParamsPtr (RowPointer, default zeroDotZero) in gmplsTunnelEntry allows technology-specific additional parameters (e.g., SONET resource usage) to be supplied in an external table and referenced from the tunnel entry. A zeroDotZero value indicates no additional parameters.
