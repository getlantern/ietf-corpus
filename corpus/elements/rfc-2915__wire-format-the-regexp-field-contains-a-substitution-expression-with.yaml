summary: 'The Regexp field contains a substitution expression with grammar: subst_expr = delim-char ere delim-char repl delim-char *flags, where ere is a POSIX Extended Regular Expression, repl may include backreferences (\1–\9), and digits MUST NOT be used as delimiters to avoid confusion with backrefs.'
