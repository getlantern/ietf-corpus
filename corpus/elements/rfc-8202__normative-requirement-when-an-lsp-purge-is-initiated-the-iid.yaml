document: rfc-8202
kind: normative-requirement
summary: When an LSP purge is initiated, the IID-TLV MUST be retained, but the remainder of the body of the LSP SHOULD be removed, following the purge procedures in RFC 6233 and RFC 6232.
section: "3.1"
rfc2119_level: MUST
