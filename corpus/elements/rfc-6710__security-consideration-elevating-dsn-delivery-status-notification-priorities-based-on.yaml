document: rfc-6710
kind: security-consideration
summary: Elevating DSN (delivery status notification) priorities based on detection of DSN content creates exposure to fake DSN attacks, since untrusted systems could inject high-priority messages disguised as DSNs. DSN processing should follow normal Section 4.1 rules.
section: "4.6"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
