document: rfc-9504
kind: protocol-element
summary: 'Three new flags are defined in the LSP-EXTENDED-FLAG TLV (RFC 9357) for use in PCUpd, PCRpt, and PCInitiate messages: G (bit 0, GMPLS LSP indicator), B (bit 1, bidirectional co-routed LSP), and RG (bits 2-3, Routing Granularity with values 00=reserved, 01=node, 10=link, 11=label).'
section: 6.2.3
