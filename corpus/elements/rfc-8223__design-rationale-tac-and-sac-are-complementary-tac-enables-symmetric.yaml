document: rfc-8223
kind: design-rationale
summary: 'TAC and SAC are complementary: TAC enables symmetric awareness and controls which applications can be advertised at all, while SAC allows asymmetric disabling of receipt for specific already-negotiated applications. TAC should be used when the responding LSR is not aware of the targeted application; SAC should be used when the responding LSR is explicitly configured for the application.'
section: "4"
topics:
