document: rfc-2954
kind: protocol-element
summary: The frPVCEndptTable models PVC segment endpoints, indexed by ifIndex and frPVCEndptDLCIIndex. Each entry carries bidirectional traffic parameters (InMaxFrameSize, InBc, InBe, InCIR, OutMaxFrameSize, OutBc, OutBe, OutCIR), a connection identifier pointing to frPVCConnectTable, RowStatus, received signaling status, and extensive frame/octet/discard counters including FECN/BECN/DE/congestion statistics.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
