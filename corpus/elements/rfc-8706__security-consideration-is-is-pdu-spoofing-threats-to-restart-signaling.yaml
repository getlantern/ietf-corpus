document: rfc-8706
kind: security-consideration
summary: IS-IS PDU spoofing threats to restart signaling can be mitigated by IS-IS authentication (RFC 1195, ISO 10589), especially cryptographic authentication (RFC 5304, RFC 5310). No new attack surface beyond the ability to inject a false but valid-appearing IIH has been introduced.
section: "6"
topics:
