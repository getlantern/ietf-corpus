document: rfc-7266
kind: normative-requirement
summary: If a party wishes to reject a 'mosref' attribute offered by the offerer, it MUST set identifiers associated with segment extensions in the answer to values in the range 4096-4351, and the rejected answer MUST contain a 'mosref' attribute whose value is the value of the SDP offer.
section: "4.2"
rfc2119_level: MUST
topics:
