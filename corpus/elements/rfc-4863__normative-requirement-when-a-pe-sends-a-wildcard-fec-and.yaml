document: rfc-4863
kind: normative-requirement
summary: When a PE sends a wildcard FEC and receives a Label Mapping response, if the returned PW Type cannot be supported or is itself the wildcard value, the PE MUST respond with a Label Release message carrying an LDP Status Code of 'Generic Misconfiguration Error'.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
