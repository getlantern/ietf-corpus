document: rfc-5629
kind: normative-requirement
summary: For either presentation-free or presentation-capable user interfaces, the user agent MUST support the GRUU specification. The Contact header field in all dialog-initiating requests and responses MUST contain a GRUU, and the Supported header field MUST contain both the 'gruu' and 'tdialog' option tags.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
