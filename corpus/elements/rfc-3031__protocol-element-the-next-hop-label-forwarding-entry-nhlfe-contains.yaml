document: rfc-3031
kind: protocol-element
summary: 'The Next Hop Label Forwarding Entry (NHLFE) contains: (1) the packet''s next hop, (2) the label stack operation to perform (replace top label, pop stack, or replace and push one or more new labels), and optionally the data link encapsulation and label encoding method. If the next hop is the current LSR, the stack operation MUST be to pop the stack.'
section: "3.10"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
