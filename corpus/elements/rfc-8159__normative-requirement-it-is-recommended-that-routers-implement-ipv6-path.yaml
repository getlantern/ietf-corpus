document: rfc-8159
kind: normative-requirement
summary: It is RECOMMENDED that routers implement IPv6 Path MTU Discovery (RFC 1981) to confirm that the path has sufficient MTU for a maximum-length Ethernet frame plus encapsulation overhead. It is NOT RECOMMENDED to enable IPv6 fragmentation (RFC 2460 Section 4.5) for keyed IP tunnels.
section: "5"
rfc2119_level: RECOMMENDED
topics:
