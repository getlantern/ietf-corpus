document: rfc-8783
kind: protocol-element
summary: 'The ''activation-type'' enumeration controls when an ACL is enforced: ''activate-when-mitigating'' (value 1) installs the ACL only during active mitigation for the DOTS client; ''immediate'' (value 2) activates it immediately; ''deactivate'' (value 3) stores the ACL without activating it.'
section: "4.3"
