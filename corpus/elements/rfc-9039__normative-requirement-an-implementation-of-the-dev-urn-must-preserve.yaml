document: rfc-9039
kind: normative-requirement
summary: An implementation of the DEV URN MUST preserve the limitations and behaviors associated with device identifiers. In particular, a device identifier that is intended to be immutable should not become mutable as a part of implementing the DEV URN type.
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
