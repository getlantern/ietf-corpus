document: rfc-7296
kind: protocol-element
summary: The Configuration (CP) payload enables an IKE initiator to request an internal IP address from the responder security gateway. Defined attributes include INTERNAL_IP4_ADDRESS, INTERNAL_IP4_DNS, INTERNAL_IP4_NBNS, INTERNAL_IP6_ADDRESS, and INTERNAL_IP6_DNS.
