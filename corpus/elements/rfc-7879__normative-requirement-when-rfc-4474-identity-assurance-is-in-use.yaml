document: rfc-7879
kind: normative-requirement
summary: When RFC 4474 identity assurance is in use (SIP request contains both Identity and Identity-Info headers), B2BUAs MUST NOT modify any information used to construct the identity signature, including the entire SDP body and protected SIP headers. In this case a B2BUA cannot act as a media-relay B2BUA.
section: "3"
rfc2119_level: MUST NOT
topics:
    - sip
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
