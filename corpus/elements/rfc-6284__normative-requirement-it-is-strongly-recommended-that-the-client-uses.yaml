document: rfc-6284
kind: normative-requirement
summary: It is strongly RECOMMENDED that the client uses the same port for c0 (multicast RTCP reports) and c1 (unicast feedback/receive port), because periodic RTCP reports from c0 keep the NAT binding alive and conserve NAT port bindings.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
