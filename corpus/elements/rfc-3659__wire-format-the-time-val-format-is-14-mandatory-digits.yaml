document: rfc-3659
kind: wire-format
summary: The time-val format is 14 mandatory digits encoding YYYYMMDDHHMMSS, optionally followed by a period and one or more decimal fraction-of-second digits. All times are always represented in UTC in the Gregorian calendar.
