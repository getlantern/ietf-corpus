document: rfc-9209
kind: protocol-element
summary: The 'next-protocol' parameter indicates the ALPN protocol identifier (RFC 7301) used by the intermediary to connect to the next hop. Its value MUST be either a Token or Byte Sequence representing a TLS ALPN Protocol ID; if expressible as an ASCII Token, that form MUST be used.
section: 2.1.3
rfc2119_level: MUST
topics:
    - http
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
