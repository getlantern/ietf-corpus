document: rfc-6647
kind: normative-requirement
summary: Alternate (MX) servers SHOULD share the same greylisting database. When alternate MX servers relay mail back to the primary MX server, the primary SHOULD be configured to permit the other servers to relay without being subjected to greylisting.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - email
