document: rfc-3798
kind: protocol-element
summary: The Reporting-UA field is optional but recommended; it identifies the MUA that performed the disposition. For Internet Mail UAs it should include both the DNS name of the MUA instance and the product name (e.g., "pc.example.com; Foomail 97.1").
section: 3.2.1
topics:
