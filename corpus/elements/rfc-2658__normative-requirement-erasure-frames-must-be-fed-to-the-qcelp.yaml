document: rfc-2658
kind: normative-requirement
summary: Erasure frames MUST be fed to the Qcelp CODEC for all missing packets. Receivers MUST use the RTP timestamp clock (each CODEC data frame advances the clock exactly 160 counts) to determine how many frames are missing when a packet is dropped.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
