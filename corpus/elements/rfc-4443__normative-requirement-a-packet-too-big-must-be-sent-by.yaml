document: rfc-4443
kind: normative-requirement
summary: A Packet Too Big MUST be sent by a router in response to a packet it cannot forward because the packet is larger than the MTU of the outgoing link. As an exception to normal rules, it is sent even in response to packets with multicast, link-layer multicast, or link-layer broadcast destination addresses.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
