document: rfc-3057
kind: state-machine
summary: 'The ASP state machine has four states: ASP-DOWN (initial), ASP-INACTIVE (entered on ASPUP/UP ACK exchange), ASP-ACTIVE (entered on ASPAC/ACTIVE ACK exchange), and back to ASP-INACTIVE on ASPIA/INACTIVE ACK. The SG tracks these states per ASP to manage traffic routing and fail-over.'
section: 4.3.1
topics:
    - sctp
