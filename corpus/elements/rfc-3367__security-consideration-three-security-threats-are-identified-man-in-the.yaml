document: rfc-3367
kind: security-consideration
summary: 'Three security threats are identified: man-in-the-middle attacks (mitigated by transport-level authentication/encryption or XML signature methods from XMLDSIG), malicious agents spoofing a Service object (mitigated by signing the Service object so clients can verify its authenticity), and DoS attacks enabled by the added level of indirection in resolution.'
