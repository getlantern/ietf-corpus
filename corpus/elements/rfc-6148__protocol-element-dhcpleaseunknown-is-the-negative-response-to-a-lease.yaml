document: rfc-6148
kind: protocol-element
summary: DHCPLEASEUNKNOWN is the negative response to a lease query by Remote ID, indicating the server has no active lease for the queried Remote ID or does not manage the client. It MUST echo option 82 from the query and include no other options.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
