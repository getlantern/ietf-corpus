document: rfc-5372
kind: protocol-element
summary: The mh_id (Main Header Identification) field is 3 bits in the RTP payload header. It identifies the current JPEG 2000 main header version; value 0 has special meaning (no compensation), values 1–7 are used cyclically to track header changes.
