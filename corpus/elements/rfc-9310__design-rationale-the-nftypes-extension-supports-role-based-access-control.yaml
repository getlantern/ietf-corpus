document: rfc-9310
kind: design-rationale
summary: The NFTypes extension supports role-based access control decisions, complementing the identity-based access control already provided by the certificate subject and SubjectAltName extension. This distinction enables 5G operators to enforce access policies based on the functional role of a network function rather than only its identity.
section: "1"
topics:
