document: rfc-7896
kind: interoperability-note
summary: A non-conforming PCC (pre-RFC 7896) that treats all IRO subobjects as loose hops and sends an IRO to a conforming PCE may unexpectedly cause the PCE to fail path computation, because the PCE now interprets unset L bits as strict hops.
section: "3"
topics:
    - routing
