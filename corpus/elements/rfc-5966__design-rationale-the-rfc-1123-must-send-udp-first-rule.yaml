document: rfc-5966
kind: design-rationale
summary: The RFC 1123 MUST-send-UDP-first rule is relaxed to SHOULD because a resolver with an existing open TCP connection to a server has good operational reasons to reuse it rather than opening a new UDP exchange that may be truncated.
