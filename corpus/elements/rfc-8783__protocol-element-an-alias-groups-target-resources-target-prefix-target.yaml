document: rfc-8783
kind: protocol-element
summary: An alias groups target resources (target-prefix, target-port-range, target-protocol, target-fqdn, target-uri) under a named identifier. At least one of 'target-prefix', 'target-fqdn', or 'target-uri' MUST be present. Aliases created via the data channel can be referenced efficiently in subsequent DOTS signal channel mitigation requests.
section: "6.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
