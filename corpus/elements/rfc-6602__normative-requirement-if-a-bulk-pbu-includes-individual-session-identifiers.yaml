document: rfc-6602
kind: normative-requirement
summary: If a bulk PBU includes individual session identifiers (MN Identifier, HNP, IPv4 HoA, or GRE Key), the LMA MUST consider it invalid, reject the PBU, and send a PBA with Status INVALID_MOBILE_NODE_GROUP_IDENTIFIER (175).
section: 5.2.3
rfc2119_level: MUST
topics:
    - mobility
