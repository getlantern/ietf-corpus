document: rfc-3887
kind: protocol-element
summary: 'The TRACK command syntax is: TRACK <unique-envid> <mtrk-secret CRLF>, where mtrk-secret is the base64-encoded secret A from RFC-MTRK-ESMTP. The server validates by SHA1-hashing mtrk-secret and comparing it to the stored hash.'
