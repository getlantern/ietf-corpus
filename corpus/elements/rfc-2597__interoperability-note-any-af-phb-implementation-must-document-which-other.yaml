document: rfc-2597
kind: interoperability-note
summary: Any AF PHB implementation MUST document which other PHB groups may preempt AF forwarding resources (this MUST NOT happen in normal operation) and how excess resources are allocated between AF PHB and other PHB groups. Implementations MAY allow these relationships to be configurable.
