document: rfc-8016
kind: interoperability-note
summary: When (D)TLS is used as the STUN transport and the client's IP address changes, the client uses TLS Session Resumption without Server-Side State (RFC 5077) to resume secure communication with the TURN server from the new IP address, allowing the mobility mechanism to work seamlessly with (D)TLS.
section: "1"
topics:
    - tls
    - nat
