document: rfc-8076
kind: normative-requirement
summary: The ACL root item MUST contain the username of the Resource Owner in the 'to_user' field and can only be written by the owner of the public key certificate associated with that Resource-ID; the allow_delegation flag for a root ACL item is set to 1 by default.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
