document: rfc-9429
kind: protocol-element
summary: 'JSEP defines three BUNDLE policies: ''balanced'' (one transport per media type, marking subsequent same-type sections bundle-only), ''max-compat'' (separate transport per ''m='' section), and ''must-bundle'' (single transport, all but first marked bundle-only). The ''max-bundle'' policy from RFC 8829 is deprecated.'
section: 4.1.1
topics:
    - webrtc
    - realtime
