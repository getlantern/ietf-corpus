document: rfc-1647
kind: normative-requirement
summary: When a printer device-type (IBM-3287-1) is negotiated, at least one of SCS-CTL-CODES or DATA-STREAM-CTL (or both) MUST be included in the FUNCTIONS negotiation. This enables the server to know which types of host application sessions to accept on behalf of the client.
section: "10.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
