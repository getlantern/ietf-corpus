document: rfc-5550
kind: normative-requirement
summary: If an IMAP server supports PARTIAL in IMAP URLs used with CATENATE and URLAUTH, it MUST advertise the URL-PARTIAL capability in both the CAPABILITY response and the equivalent response-code.
