document: rfc-3007
kind: protocol-element
summary: TSIG (RFC 2845) uses a MAC derived from a shared secret for message authentication; it is inexpensive to calculate and verify. SIG(0) (RFC 2931) uses a private/public key pair, with the public key stored in DNS, and is more scalable.
section: "1.2"
