document: rfc-6455
kind: normative-requirement
summary: RSV1, RSV2, and RSV3 bits MUST be 0 unless an extension negotiated during the handshake defines meanings for non-zero values. If a nonzero value is received and no negotiated extension defines it, the receiving endpoint MUST fail the WebSocket connection.
section: "5.2"
rfc2119_level: MUST
topics:
    - websocket
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
