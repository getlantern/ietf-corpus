document: rfc-4789
kind: interoperability-note
summary: The snmpIeee802Domain OID constant can be assigned to TDomain objects in MIB modules such as SNMP-TARGET-MIB, NOTIFICATION-LOG-MIB, and ENTITY-MIB. When used, the corresponding TAddress value must conform to the MacAddress textual convention from SNMPv2-TC.
