document: rfc-6001
kind: normative-requirement
summary: The Lower Switching Capability field in the IACD sub-TLV MUST be set to the value of the Switching Capability of the ISCD sub-TLV advertised for the same TE link. If multiple ISCD sub-TLVs are advertised, the Lower SC value MUST be set to the SC to which the adjustment capacity is associated.
section: 3.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
