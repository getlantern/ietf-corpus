document: rfc-3479
kind: security-consideration
summary: The IESG noted that this specification lacks adequate guidance for timer and retry value choices for TCP connection fault tolerance, and users are advised to test configurations carefully for problems such as premature failovers. This specification should not serve as a model for TCP connection fault tolerance design in future documents.
section: IESG Note
topics:
    - mpls
    - routing
    - security
