document: rfc-9953
kind: normative-requirement
summary: A DoC server MUST be able to produce responses in the "application/dns-message" Content-Format, and all DoC clients MUST be able to parse such responses. Any other response Content-Format MUST be indicated via the Content-Format option.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
