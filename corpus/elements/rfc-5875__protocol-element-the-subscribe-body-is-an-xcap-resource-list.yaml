document: rfc-5875
kind: protocol-element
summary: The SUBSCRIBE body is an XCAP resource-list document (application/resource-lists+xml) containing a flat list of XCAP request URIs as <entry> elements. Subsequent SUBSCRIBE refreshes MAY change the URI list, in which case the notifier MUST use the new list.
section: "4.4"
topics:
    - sip
    - http
