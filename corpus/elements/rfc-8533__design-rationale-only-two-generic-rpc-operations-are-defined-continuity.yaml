document: rfc-8533
kind: design-rationale
summary: Only two generic RPC operations are defined (`continuity-check` and `path-discovery`) as base building blocks, corresponding to Ping and Traceroute semantics respectively. Technology-specific models (e.g., for IP, MPLS LSP Ping) are expected to augment these RPCs with protocol-specific parameters rather than defining new top-level operations.
