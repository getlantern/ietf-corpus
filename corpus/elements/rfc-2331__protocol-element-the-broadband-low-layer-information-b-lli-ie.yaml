document: rfc-2331
kind: protocol-element
summary: The Broadband Low Layer Information (B-LLI) IE is used together with the AAL Parameters IE to select an encapsulation for IP over ATM; it specifies LLC/SNAP encapsulation via layer_2_id=2 and user_information_layer=12 (LAN LLC, ISO 8802/2). B-LLI negotiation procedures follow Appendix D of [PER95].
section: "5.2"
topics:
