document: rfc-8807
kind: protocol-element
summary: 'The <loginSec:loginSec> element extends the EPP <login> command and MUST contain at least one of: <loginSec:userAgent> (optional client app/tech/OS info), <loginSec:pw> (extended password), or <loginSec:newPW> (extended new password).'
section: "4.1"
topics:
    - security
