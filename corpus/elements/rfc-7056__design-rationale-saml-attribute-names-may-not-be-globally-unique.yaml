document: rfc-7056
kind: design-rationale
summary: SAML attribute names may not be globally unique—unspecified name formats allow two issuers to choose the same name with different semantics. By including the NameFormat URI as part of the GSS attribute name, the specification ensures that attribute names are disambiguated by their format context.
section: "3"
topics:
    - security
