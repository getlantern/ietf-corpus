document: rfc-8416
kind: design-rationale
summary: SLURM was created because ISPs may need to use BGP and the RPKI with private address space or private AS numbers that cannot be verified by the global RPKI, and to allow operators to protect routes from adverse actions against the RPKI until those actions are remedied.
section: "1"
topics:
