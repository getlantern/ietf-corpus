document: rfc-4398
kind: protocol-element
summary: The key tag field is a 16-bit value computed for the key embedded in the certificate using the RRSIG Key Tag algorithm. It serves as an efficiency measure to narrow which CERT RRs may be applicable to a given key, but note that two different keys can share the same key tag.
