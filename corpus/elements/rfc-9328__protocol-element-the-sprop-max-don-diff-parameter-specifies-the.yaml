document: rfc-9328
kind: protocol-element
summary: The sprop-max-don-diff parameter specifies the maximum absolute difference between AbsDon values of any two consecutive NAL units in decoding order within the stream. When 0, no de-packetization buffer is needed; when > 0, its value determines the required de-packetization buffer depth.
section: "7.2"
topics:
