document: rfc-5732
kind: normative-requirement
summary: A host name object SHOULD NOT be deleted if the host object is associated with any other object (e.g., a domain object), as deleting without breaking associations can cause DNS resolution failure.
section: 3.2.2
rfc2119_level: SHOULD NOT
topics:
    - dns
