document: rfc-7532
kind: normative-requirement
summary: The component names of an NFSv4 pathname MUST be prepared using the component name rules from RFC 7530 Section 12 prior to encoding into the NFS URI path component. Non-ASCII characters and URI-reserved characters (including '/') MUST be represented by URI percent encoding.
section: 2.8.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
