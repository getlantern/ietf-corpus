document: rfc-5052
kind: normative-requirement
summary: An already defined Under-Specified FEC Scheme (i.e., FEC Encoding ID value) MUST be reused if the associated FEC Payload ID and FEC Object Transmission Information have the required fields and encoding formats for a new Under-Specified FEC scheme instance.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
    - registry
