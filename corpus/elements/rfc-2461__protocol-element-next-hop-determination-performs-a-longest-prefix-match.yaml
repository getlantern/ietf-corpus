document: rfc-2461
kind: protocol-element
summary: 'Next-hop determination performs a longest prefix match against the Prefix List: if the destination is on-link the next hop equals the destination itself; otherwise a router is selected from the Default Router List. Results are cached in the Destination Cache. If the Default Router List is empty, the destination is assumed on-link.'
section: "5.2"
topics:
