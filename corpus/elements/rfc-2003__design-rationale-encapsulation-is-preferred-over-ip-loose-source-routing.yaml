document: rfc-2003
kind: design-rationale
summary: Encapsulation is preferred over IP loose source routing because source routing has unsolved security problems, causes performance problems in Internet routers, is often processed incorrectly, may be blocked by firewalls, and it is considered impolite for intermediate routers to modify datagrams they did not originate.
section: "2"
topics:
