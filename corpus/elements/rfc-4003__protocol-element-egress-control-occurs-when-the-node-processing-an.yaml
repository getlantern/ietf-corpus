document: rfc-4003
kind: protocol-element
summary: Egress Control occurs when the node processing an ERO is the egress and the ERO contains one or more subobjects related to the output/downstream interface, which is indicated as the last listed local interface. The interface may be numbered or unnumbered.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
