document: rfc-2212
kind: normative-requirement
summary: In the RSpec, rate R MUST be greater than or equal to r (the token bucket rate) and slack S MUST be nonnegative. A flow MUST be rejected if the requested maximum datagram size M is larger than the MTU of the link.
section: Invocation Information
rfc2119_level: MUST
