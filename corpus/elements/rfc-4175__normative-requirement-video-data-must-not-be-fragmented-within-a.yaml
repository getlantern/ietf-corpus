document: rfc-4175
kind: normative-requirement
summary: Video data MUST NOT be fragmented within a pgroup when packetizing digital active line content. The length of each scan line or scan line fragment MUST be an integer multiple of the pgroup size in octets.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
