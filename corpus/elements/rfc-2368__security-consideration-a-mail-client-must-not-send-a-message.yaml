document: rfc-2368
kind: security-consideration
summary: A mail client MUST NOT send a message based on a mailto URL without first showing the user the full message (including all headers), fully decoded, and obtaining user approval. The client should also make it clear the user is about to send an electronic mail message.
section: "7"
topics:
    - email
    - security
