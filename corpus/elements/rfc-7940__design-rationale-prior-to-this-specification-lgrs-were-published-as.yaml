document: rfc-7940
kind: design-rationale
summary: Prior to this specification, LGRs were published as ASCII text or HTML loosely based on RFC 3743 format. These formats were inconsistent across implementations because the evaluation algorithms were implicit. A structured XML format improves machine readability, consistency, reusability, and maintainability.
section: "1"
