document: rfc-4997
kind: protocol-element
summary: Profile-specific encoding methods that are not definable using the ROHC-FN library (e.g., inferred_ip_v4_header_checksum) may be defined either in formal ROHC-FN syntax within the profile specification or by a rigorous plain-text definition. They are referenced in the FN specification by name followed by a quoted pointer to where they are defined.
section: "4.13"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
