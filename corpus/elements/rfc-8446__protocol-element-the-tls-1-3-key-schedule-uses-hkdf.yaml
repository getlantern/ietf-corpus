document: rfc-8446
kind: protocol-element
summary: 'The TLS 1.3 key schedule uses HKDF Extract-and-Expand to derive a chain of secrets: early_secret (from PSK or zeros), handshake_secret (from (EC)DHE shared secret), and master_secret (from zeros), each yielding directional traffic secrets, an exporter_master_secret, and a resumption_master_secret.'
