document: rfc-5651
kind: security-consideration
summary: Modification of the Congestion Control field may cause receivers to receive at an incorrect rate, potentially worsening or causing congestion. Modification of the Codepoint or packet payload may prevent or corrupt reconstruction of objects. All data transport fields MUST be protected by source authentication and data integrity mechanisms.
section: "8.3"
topics:
    - security
    - multicast
    - congestion
