document: rfc-8010
kind: registry
summary: This document updates the 'application/ipp' MIME media type registration. The type is 'application', subtype 'ipp', with no required or optional parameters. Encoding always contains binary data; charset and natural-language context are self-contained within IPP requests/responses.
