document: rfc-9930
kind: design-rationale
summary: TLS-PSK is NOT RECOMMENDED for use with TEAP because TEAP was not designed to work with TLS-PSK and no use cases, security analyses, or implementations exist. Its behavior with TEAP is entirely implementation-dependent and therefore not useful to deploy.
section: "3.2"
topics:
    - tls
    - security
