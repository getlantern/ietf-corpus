document: rfc-2725
kind: protocol-element
summary: The as-block object delegates a range of AS numbers to a given repository. Its key attribute specifies two AS numbers separated by a dash (e.g., AS1321 - AS1335), enabling hierarchical authorization and directed queries across multiple repositories.
