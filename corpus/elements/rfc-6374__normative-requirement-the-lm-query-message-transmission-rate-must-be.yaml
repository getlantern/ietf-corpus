document: rfc-6374
kind: normative-requirement
summary: The LM query message transmission rate MUST be sufficiently high, given counter size and channel speed/minimum packet size, that counter wrap cannot cause measurement ambiguity. For a 32-bit counter on a 100-Gbps link with 64-byte minimum packets, MaxLMInterval is approximately 22 seconds.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
