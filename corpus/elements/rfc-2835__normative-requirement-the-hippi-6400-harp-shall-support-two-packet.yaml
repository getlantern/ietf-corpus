document: rfc-2835
kind: normative-requirement
summary: 'The HIPPI-6400 HARP SHALL support two packet formats: the generic Ethernet ARP format (ar$hrd=1) and the HIPARP format (ar$hrd=28). The ar$hrd field SHALL differentiate between the two formats, and the reply SHALL be in the format of the request.'
section: "6"
rfc2119_level: SHALL
topics:
