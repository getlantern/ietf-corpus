document: rfc-4860
kind: normative-requirement
summary: When a Deaggregator determines an aggregate reservation is no longer needed, it MUST send an aggregate ResvTear. On receipt, the Aggregator SHOULD send an aggregate PathTear unless policy instructs otherwise.
