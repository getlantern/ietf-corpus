document: rfc-5460
kind: normative-requirement
summary: A LEASEQUERY-REPLY without any bindings MUST NOT be followed by a LEASEQUERY-DONE message for the same transaction-id. If the transaction-id in a received LEASEQUERY-DONE does not match an outstanding LEASEQUERY, the client MUST close the TCP connection.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
