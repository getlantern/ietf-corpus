document: rfc-2835
kind: normative-requirement
summary: PIBES MUST drop invalid messages (source not in target list or destination not an IP broadcast/multicast address). All valid incoming messages SHALL be forwarded to all addresses in the target list. It is RECOMMENDED that PIBES run on the same port as the HARP server.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
