document: rfc-3923
kind: normative-requirement
summary: Any XMPP address present in a certificate MUST be encoded using the ASN.1 Object Identifier 'id-on-xmppAddr' as specified in Section 5.1.1 of [XMPP-CORE]. Each URI MUST be of the form <im:address> or <pres:address>.
section: "6.3"
rfc2119_level: MUST
topics:
