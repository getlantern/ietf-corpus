document: rfc-8555
kind: wire-format
summary: 'The Replay-Nonce HTTP header field carries a server-generated value encoded as base64url (ABNF: 1*base64url). The server MUST generate values that are unique per message with high probability and unpredictable to third parties. Clients MUST ignore invalid Replay-Nonce values.'
section: 6.5.1
topics:
    - http
    - jose
    - security
