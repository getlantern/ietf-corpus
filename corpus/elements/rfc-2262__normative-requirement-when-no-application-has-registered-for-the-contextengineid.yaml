document: rfc-2262
kind: normative-requirement
summary: When no application has registered for the contextEngineID/pduType combination of an incoming request or notification, snmpUnknownPDUHandlers MUST be incremented and a Response containing the snmpUnknownPDUHandlers OID/value pair MUST be sent back to the originator.
section: 4.2.2.1
rfc2119_level: MUST
topics:
    - snmp
