document: rfc-8323
kind: normative-requirement
summary: For CoAP over reliable transports, the Observe Option value in 2.xx notifications MAY be empty on transmission and MUST be ignored on reception, since TCP guarantees ordered delivery and reordering detection is unnecessary.
section: "7.1"
rfc2119_level: MUST
topics:
    - tcp
