document: rfc-7519
kind: design-rationale
summary: JWTs were designed as a simpler, more compact alternative to SAML Assertions that fits in HTTP headers and query parameters. They use JSON encoding and a simpler token model rather than XML/XML DSIG, trading SAML's expressivity for compactness and ease of implementation.
