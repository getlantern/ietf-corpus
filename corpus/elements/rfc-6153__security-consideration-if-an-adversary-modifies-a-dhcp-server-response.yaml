document: rfc-6153
kind: security-consideration
summary: If an adversary modifies a DHCP server response or inserts its own response, a mobile node could be directed to contact a rogue ANDSF server; a modified response could also be used to mount an amplification attack. DHCP authentication (RFC 3118 / RFC 3315) MAY be used to mitigate these attacks.
section: "5"
topics:
    - security
    - mobility
