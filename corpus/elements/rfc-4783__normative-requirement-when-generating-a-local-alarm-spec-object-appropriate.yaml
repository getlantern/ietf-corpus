document: rfc-4783
kind: normative-requirement
summary: When generating a local ALARM_SPEC object, appropriate Error Node Address, Error Code, and Error Values MUST be set. The InPlace and NotGuilty flags SHOULD NOT be set, as they have meaning only in ERROR_SPEC objects.
section: 3.1.2
rfc2119_level: MUST
