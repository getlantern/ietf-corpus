document: rfc-2920
kind: normative-requirement
summary: Client SMTP implementations that employ pipelining MUST check ALL statuses associated with each command in a group; for example, the client must still check the DATA response even if no RCPT TO commands succeeded, and cannot assume DATA will be rejected.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
