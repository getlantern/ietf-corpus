document: rfc-9183
kind: protocol-element
summary: When a TRILL Data packet transitions from L1 to L2, the area border RBridge replaces the ingress TRILL switch nickname with its own nickname. When transitioning from L2 to L1, the egress nickname is replaced with the actual destination RBridge's nickname based on a MAC lookup.
section: "3.1"
topics:
    - routing
