document: rfc-5870
kind: normative-requirement
summary: Applications MUST NOT use 'geo' URIs with coordinate values that identify invalid locations (e.g., latitude beyond ±90), and SHOULD warn the user when such URIs are encountered.
section: "9.1"
rfc2119_level: MUST NOT
topics:
