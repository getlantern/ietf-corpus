document: rfc-3075
kind: normative-requirement
summary: Implementations MUST support Canonical XML [XML-C14N] as the CanonicalizationMethod; this is the only REQUIRED canonicalization algorithm. Minimal canonicalization and Canonical XML with Comments are RECOMMENDED but not required.
