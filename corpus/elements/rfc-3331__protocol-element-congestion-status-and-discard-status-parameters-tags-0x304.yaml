document: rfc-3331
kind: protocol-element
summary: 'Congestion Status and Discard Status parameters (Tags 0x304 and 0x305, Length=8 each) encode SS7 link congestion levels: LEVEL_NONE (0x0), LEVEL_1 (0x1), LEVEL_2 (0x2), LEVEL_3 (0x3). Networks without multiple congestion levels use only LEVEL_NONE and LEVEL_3.'
section: 3.3.1.8
