document: rfc-3861
kind: design-rationale
summary: The '_im' and '_pres' SRV Service labels must be paired with a specific Protocol label because these services may pass messages over multiple different transport protocols. Without the Protocol field, the advertisement would be incomplete and non-deterministic.
