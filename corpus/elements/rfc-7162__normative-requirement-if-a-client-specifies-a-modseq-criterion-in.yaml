document: rfc-7162
kind: normative-requirement
summary: If a client specifies a MODSEQ criterion in a SEARCH (or UID SEARCH) command and the server returns a non-empty result, the server MUST append the highest mod-sequence for all returned messages to the end of the untagged SEARCH response.
section: 3.1.6
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
