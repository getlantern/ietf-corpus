document: rfc-3428
kind: normative-requirement
summary: A UA presented with an IM URI SHOULD resolve it to a SIP URI and place it in the Request-URI before sending. If unable to resolve, it MAY place the IM URI directly, delegating resolution to a downstream device.
section: "5"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
