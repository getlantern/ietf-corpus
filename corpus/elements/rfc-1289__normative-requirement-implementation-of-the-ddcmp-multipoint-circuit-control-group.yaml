document: rfc-1289
kind: normative-requirement
summary: Implementation of the DDCMP Multipoint Circuit Control Group is mandatory for all systems that support DDCMP multipoint control circuits. It includes global scheduling timers (phivControlSchedTimer, phivControlDeadTimer, phivControlDelayTimer, phivControlStreamTimer) and the per-tributary Control Parameters Table.
section: "4"
rfc2119_level: REQUIRED
topics:
    - snmp
