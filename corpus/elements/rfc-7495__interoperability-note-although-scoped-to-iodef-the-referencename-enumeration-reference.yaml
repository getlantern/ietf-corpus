document: rfc-7495
kind: interoperability-note
summary: Although scoped to IODEF, the ReferenceName enumeration reference format is designed for reuse by any standard that needs to reference an enumeration identified by a specially formatted string. It provides a standardized interface allowing loose coupling between a standard and the enumeration identifiers it references.
section: "2.2"
topics:
    - security
    - registry
