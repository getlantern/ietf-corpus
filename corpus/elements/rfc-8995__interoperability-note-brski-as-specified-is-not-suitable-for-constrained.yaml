document: rfc-8995
kind: interoperability-note
summary: BRSKI as specified is not suitable for constrained devices (below Class 2 per RFC 7228) on challenged networks such as 802.15.4 LLNs. The large credential and key sizes required for device authentication risk congestion collapse or energy exhaustion of battery-powered intermediate routers. Constrained device support requires defining symmetric key techniques with sufficient algorithm agility, which is out of scope for this document.
section: 1.3.2
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
