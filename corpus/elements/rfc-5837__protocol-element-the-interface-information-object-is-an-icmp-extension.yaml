document: rfc-5837
kind: protocol-element
summary: 'The Interface Information Object is an ICMP extension object with Class-Num 2 that can be appended to ICMPv4/ICMPv6 Time Exceeded, Destination Unreachable, and Parameter Problem messages. A single ICMP message may contain zero to four instances, each describing a unique interface role: incoming interface, sub-IP component, outgoing interface, or next-hop.'
