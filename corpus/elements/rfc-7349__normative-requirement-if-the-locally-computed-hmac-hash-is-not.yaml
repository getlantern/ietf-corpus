document: rfc-7349
kind: normative-requirement
summary: If the locally computed HMAC hash is not equal to the received Authentication Data field value, the LDP Hello message MUST be discarded and an error event SHOULD be logged. The logging MUST be carefully rate-limited to avoid resource exhaustion under spoofed-Hello storms.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
