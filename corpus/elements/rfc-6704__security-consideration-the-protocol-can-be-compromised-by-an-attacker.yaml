document: rfc-6704
kind: security-consideration
summary: The protocol can be compromised by an attacker that intercepts the initial DHCP ACK in which the server sends the nonce to the client, enabling subsequent forgery of authenticated FORCERENEW messages.
section: "5.1"
topics:
    - security
    - crypto
