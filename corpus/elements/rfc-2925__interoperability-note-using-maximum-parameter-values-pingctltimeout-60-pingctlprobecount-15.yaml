document: rfc-2925
kind: interoperability-note
summary: Using maximum parameter values (pingCtlTimeOut=60, pingCtlProbeCount=15), a single ping test can take up to 15 minutes; using defaults (3s timeout, 1 probe) yields a maximum of 3 seconds. Management applications should account for this range when setting timeouts.
section: 3.1.2
topics:
    - snmp
    - measurement
