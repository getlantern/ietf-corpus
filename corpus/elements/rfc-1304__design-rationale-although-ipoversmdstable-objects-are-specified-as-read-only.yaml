document: rfc-1304
kind: design-rationale
summary: Although ipOverSMDSTable objects are specified as read-only, the MIB notes that at the agent's discretion they may be made read-write so an authorized management station can change IP subnetwork addressing configuration. This flexibility accommodates operational reconfiguration of LIS mappings without requiring a new MIB revision.
section: "4.4"
topics:
    - snmp
    - ip
