document: rfc-2421
kind: security-consideration
summary: Implementation of the VRFY command may enable automated sweeps for valid mailbox addresses or guessing of recipient addresses, reducing mailbox privacy. Implementations may limit the number of VRFY queries per session to mitigate this risk.
section: 5.1.8
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
