document: rfc-9722
kind: wire-format
summary: The Service Carving Time BGP Extended Community uses Type 0x06 and Sub-Type 0x0F. It encodes a 32-bit NTP seconds field and the high-order 16 bits of the NTP fraction field (lower 16 bits implicitly set to zero), yielding approximately 15 microseconds (2^-16 s) precision.
section: "2.1"
topics:
    - routing
    - mpls
    - ntp
