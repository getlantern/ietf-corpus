document: rfc-9071
kind: normative-requirement
summary: The number of redundant generations SHALL be deduced from SDP negotiation and set to the minimum declared by both parties. It is RECOMMENDED to declare and transmit one original and two redundant generations of T140blocks for good loss protection and low overhead.
