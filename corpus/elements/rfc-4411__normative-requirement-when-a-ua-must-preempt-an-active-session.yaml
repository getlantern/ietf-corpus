document: rfc-4411
kind: normative-requirement
summary: When a UA must preempt an active session to accept a higher-priority call, it MUST send a BYE to the active session; if the UA is the mixer of an ad hoc conference, it MUST send BYE to all participants of that conference.
section: "2.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
