document: rfc-8926
kind: security-consideration
summary: In multi-tenant environments where data confidentiality is required, an encryption mechanism SHOULD be used to encrypt tenant data end-to-end between NVEs. Any Geneve overlay data leaving the operator's security domain (e.g., inter-data-center over public networks) SHOULD be secured by IPsec or equivalent VPN technologies.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - security
    - routing
    - ipsec
    - vpn
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
