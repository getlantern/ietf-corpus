document: rfc-5225
kind: normative-requirement
summary: For profiles where the MSN is created by the compressor (0x0102, 0x0104, 0x0108), the MSN SHOULD be incremented by one for each packet sent for a specific CID, and MUST be initialized to a random value when the context is first created or when the associated profile changes.
section: 6.3.1
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
