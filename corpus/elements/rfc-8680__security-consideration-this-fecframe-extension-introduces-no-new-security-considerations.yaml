document: rfc-8680
kind: security-consideration
summary: This FECFRAME extension introduces no new security considerations beyond those in RFC 6363 Section 9. One additional threat noted is that attacks can attempt to corrupt source flows in order to modify receiver application behavior, as opposed to merely denying service.
