document: rfc-8987
kind: design-rationale
summary: Some relay implementations restrict delegated prefixes to one per DUID, installing only a single route and leaving other delegated prefixes unreachable; requirements G-2 and G-3 mandate support for multiple simultaneous delegations per client.
