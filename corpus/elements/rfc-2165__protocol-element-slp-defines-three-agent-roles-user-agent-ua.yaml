document: rfc-2165
kind: protocol-element
summary: 'SLP defines three agent roles: User Agent (UA) discovers services, Service Agent (SA) advertises services on behalf of one or more services, and Directory Agent (DA) centralizes registrations for efficient access. Only one DA is permitted per host.'
