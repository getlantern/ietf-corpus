document: rfc-3327
kind: normative-requirement
summary: If the UA has indicated Path support and the proxy requires the registrar to support the Path extension, the proxy SHOULD insert a Requires header field value for this extension. If the UA has not indicated support but proxy requires it, the proxy SHOULD reject with a 421 response.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
