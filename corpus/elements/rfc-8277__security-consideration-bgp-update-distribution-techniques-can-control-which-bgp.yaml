document: rfc-8277
kind: security-consideration
summary: BGP UPDATE distribution techniques can control which BGP speakers learn a given label binding, but if BGP sessions do not provide privacy, other routers may learn of the binding. There is no guarantee that a received MPLS packet's label was applied by an authorized router.
section: "7"
topics:
    - security
    - bgp
    - mpls
    - privacy
