document: rfc-7522
kind: interoperability-note
summary: Agreement between system entities on identifiers (Issuer, Audience), token endpoint location, signing keys, one-time use restrictions, maximum Assertion lifetime, and Subject/attribute requirements must be configured out of band. SAML Metadata [OASIS.saml-metadata-2.0-os] is one common method for this exchange.
