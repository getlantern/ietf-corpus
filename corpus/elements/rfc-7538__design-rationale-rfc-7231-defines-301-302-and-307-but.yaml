document: rfc-7538
kind: design-rationale
summary: 'RFC 7231 defines 301, 302, and 307 but explicitly does not define a permanent variant of 307 (one that preserves the request method). RFC 7538 adds 308 to fill this gap: the redirect matrix now has both a permanent and temporary variant for method-preserving redirects, mirroring the 301/302 pair for method-changing redirects.'
section: "1"
topics:
