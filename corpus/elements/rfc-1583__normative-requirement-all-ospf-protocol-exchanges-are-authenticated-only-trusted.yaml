document: rfc-1583
kind: normative-requirement
summary: All OSPF protocol exchanges are authenticated; only trusted routers can participate in the AS routing. A single authentication scheme is configured per area, allowing some areas to use stricter authentication than others.
section: "1.1"
rfc2119_level: MUST
topics:
    - routing
    - security
