document: rfc-5046
kind: interoperability-note
summary: If RDMAExtensions=Yes is not negotiated or negotiation fails, the connection MUST fall back to Traditional iSCSI mode per RFC 3720. For InfiniBand, this may require re-establishing the connection as an IPoIB connection since InfiniBand connections may not natively support TCP byte-stream mode.
section: "5.1"
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
