document: rfc-9573
kind: protocol-element
summary: The DCB-flag is Bit 47 in the 'Additional PMSI Tunnel Attribute Flags' BGP Extended Community [RFC7902]. A route 'carries the DCB-flag' when its PTA Flags field has the Extension bit set AND the Additional PMSI Tunnel Attribute Flags EC has the DCB-flag bit set.
section: "4.1"
topics:
