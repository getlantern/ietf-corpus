document: rfc-1725
kind: protocol-element
summary: The APOP command (AUTHORIZATION state) provides challenge-response authentication. The server includes an RFC 822 msg-id timestamp in its greeting banner; the client replies with APOP name digest where digest is MD5(timestamp + shared-secret) encoded as 32 lower-case hex characters.
