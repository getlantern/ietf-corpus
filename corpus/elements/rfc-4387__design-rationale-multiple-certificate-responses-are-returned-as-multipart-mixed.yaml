document: rfc-4387
kind: design-rationale
summary: 'Multiple certificate responses are returned as multipart/mixed rather than ASN.1 SEQUENCE OF Certificate or PKCS #7 because this is simpler with standard web-enabled tools and does not restrict the mechanism to DER-based data, allowing XML, PGP, and SPKI content as well.'
