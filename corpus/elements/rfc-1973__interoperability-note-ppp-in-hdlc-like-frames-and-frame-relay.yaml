document: rfc-1973
kind: interoperability-note
summary: PPP in HDLC-like frames and Frame Relay cannot co-exist on the same links because the Q.922 method for expanding the address from 1 to 2 to 4 octets is not distinguishable from the ISO 3309 method due to the structure of DLCI subfields.
