document: rfc-4676
kind: protocol-element
summary: Administrative hierarchy CAtypes 1–6 represent national subdivisions (A1=state/province, A2=county, A3=city, A4=city district/borough, A5=neighborhood/block, A6=group of streets below neighborhood). All elements are OPTIONAL and may appear in any order.
