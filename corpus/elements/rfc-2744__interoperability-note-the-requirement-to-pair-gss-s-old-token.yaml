document: rfc-2744
kind: interoperability-note
summary: The requirement to pair GSS_S_OLD_TOKEN and GSS_S_DUPLICATE_TOKEN with a routine error of GSS_S_FAILURE during context establishment did not exist in GSS-API version 1. Applications that must interoperate with v1 implementations must special-case these status codes.
section: "5.1"
topics:
    - security
