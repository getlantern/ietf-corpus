document: rfc-7589
kind: design-rationale
summary: The document retains the EOM sequence ]]>]]> for the initial <hello> message despite the known XML injection risk in order to maintain backward compatibility with existing RFC 5539 implementations. Chunked framing is adopted for subsequent messages when :base:1.1 is mutually advertised.
