document: rfc-9708
kind: design-rationale
summary: The pk-HSS-LMS-HashSig definition was updated to specify no ASN.1 wrapping for the public key (HSS-LMS-HashSig-PublicKey ::= OCTET STRING) to align with emerging conventions for carrying the public key in X.509 certificates, resolving errata Err7960 and Err7963 from RFC 8708.
section: "1.4"
topics:
