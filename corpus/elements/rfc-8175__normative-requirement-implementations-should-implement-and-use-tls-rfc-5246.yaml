document: rfc-8175
kind: normative-requirement
summary: Implementations SHOULD implement and use TLS (RFC 5246) to protect the TCP session; for 'networked deployments' TLS is STRONGLY RECOMMENDED. If TLS is used, the TLS session MUST be established before any Messages are passed between peers. Routers supporting TLS MUST prioritize TLS connection points over non-TLS ones.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - routing
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
