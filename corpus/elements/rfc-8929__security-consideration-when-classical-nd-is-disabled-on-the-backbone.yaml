document: rfc-8929
kind: security-consideration
summary: When classical ND is disabled on the backbone and RFC 8928 plus a 6LBR are mandated, the network gains zero-trust ND security (address theft becomes impossible), avoidance of remote ND DoS via multicast NS(Lookup) (the 6LBR knows all addresses), reduced multicast on the backbone, and more reliable DAD on large Wi-Fi infrastructures.
section: "11"
topics:
