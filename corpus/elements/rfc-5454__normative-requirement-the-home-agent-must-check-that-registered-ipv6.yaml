document: rfc-5454
kind: normative-requirement
summary: The home agent MUST check that registered IPv6 prefixes are not overlapping, ensuring all addresses under each prefix belong to a single mobile node at any time. These prefixes MUST NOT appear as on-link to any other node via Router Advertisements.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - mobility
    - v6ops
