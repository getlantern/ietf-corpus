document: rfc-6733
kind: design-rationale
summary: The ability to re-exchange CER/CEA in the Open state was deprecated because the multiplicity of Application-Id AVP meanings during dynamic capability re-exchange was considered an abuse of Diameter extensibility and too ambiguous to implement correctly. This feature was later re-introduced in a clean form in RFC 6737 using explicitly defined new commands.
section: 1.1.3
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
