document: rfc-5213
kind: normative-requirement
summary: The LMA MUST identify the mobile node from the Mobile Node Identifier option in the PBU. If the option is absent, the LMA MUST reject the request with status MISSING_MN_IDENTIFIER_OPTION.
section: 5.3.1
rfc2119_level: MUST
