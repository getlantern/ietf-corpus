document: rfc-2091
kind: wire-format
summary: IP RIP Version 2 triggered packets insert the 4-octet Update Header after the standard 4-byte RIP header. The Next Hop field MUST be zero because Triggered RIP cannot advertise routes on behalf of other WAN routers. If authentication is used it immediately follows the Update Header.
section: "5.3"
topics:
    - routing
