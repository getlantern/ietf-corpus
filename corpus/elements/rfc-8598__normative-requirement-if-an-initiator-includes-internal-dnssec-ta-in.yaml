document: rfc-8598
kind: normative-requirement
summary: If an initiator includes INTERNAL_DNSSEC_TA in CFG_REQUEST, it MUST also include one or more INTERNAL_DNS_DOMAIN attributes; if it does not, the responder MAY still respond with both attributes.
