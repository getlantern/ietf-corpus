document: rfc-6677
kind: normative-requirement
summary: In a success response (code 2), attributes that the server was unable to check or that failed to validate MUST NOT be returned. For failure (code 3), the server SHOULD include attributes that were successfully validated.
section: "5.3"
rfc2119_level: MUST NOT
