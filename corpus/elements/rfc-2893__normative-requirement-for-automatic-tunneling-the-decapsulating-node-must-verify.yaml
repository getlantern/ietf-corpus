document: rfc-2893
kind: normative-requirement
summary: For automatic tunneling, the decapsulating node MUST verify that encapsulated packets are acceptable before forwarding. Since automatic tunnels always tunnel directly to the destination, any packet received over an automatic tunnel SHOULD NOT be forwarded.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
