document: rfc-4591
kind: interoperability-note
summary: Clients obtain session parameters through the standard L2TPv3 three-way handshake (ICRQ/ICRP/ICCN). An LCCE MAY send ICRQ or ICRP before a PVC is ACTIVE as long as the Circuit Status AVP reflects INACTIVE and an SLI is sent when the PVC becomes ACTIVE.
section: "3.1"
topics:
    - vpn
