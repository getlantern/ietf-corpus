document: rfc-2038
kind: wire-format
summary: 'MPEG Audio-specific header: 32-bit field at start of payload after any RTP headers for MPEG1/2 Audio payload type. Fields: MBZ (16 bits, must be zero), Frag_offset (16 bits, byte offset into the audio frame for the data in this packet; 0 when packet contains complete frame(s)).'
