document: rfc-8250
kind: design-rationale
summary: The base time unit for PDM is 1 attosecond (10^-18 seconds), chosen as a common unit enabling uniform scaling across all hardware timer resolutions from picoseconds to seconds. The 16-bit delta plus 8-bit scale encoding can represent time differentials from 1 attosecond up to over 3×10^55 years without time synchronization between endpoints.
