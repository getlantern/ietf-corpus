document: rfc-5056
kind: normative-requirement
summary: Applications MUST verify that the same channel bindings are observed at either side of the channel, using an application-layer authentication protocol to authenticate one or both peers. If the authentication protocol supports channel binding, the application SHOULD use it.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
