document: rfc-8210
kind: protocol-element
summary: The Serial Number is a 32-bit strictly increasing unsigned integer that wraps from 2^32-1 to 0, denoting the logical version of a cache. A cache increments it upon completing a validated update from a parent cache or the Global RPKI. Serial Numbers are not commensurate between different caches or different protocol versions.
section: "2"
topics:
