document: rfc-8415
kind: security-consideration
summary: DHCPv6 is vulnerable to rogue server attacks (providing incorrect configuration) and denial-of-service attacks on a shared link. The Authentication option with the Reconfiguration Key Authentication Protocol (RKAP) provides client-server authentication; IPsec is recommended for securing communications between relay agents and servers.
section: "22"
topics:
