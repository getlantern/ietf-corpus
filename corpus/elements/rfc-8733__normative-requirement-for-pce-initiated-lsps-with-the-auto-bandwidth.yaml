document: rfc-8733
kind: normative-requirement
summary: For PCE-initiated LSPs with the auto-bandwidth feature enabled, the AUTO-BANDWIDTH-ATTRIBUTES TLV MUST be included in the LSPA object with both the PCInitiate message (at LSP creation) and the PCUpd message (when the PCE directs parameter changes). The RBNF of PCInitiate and PCUpd messages is unchanged.
section: "5.4"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
