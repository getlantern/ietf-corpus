document: rfc-7916
kind: normative-requirement
summary: Node coloring for alternate preference or exclusion SHOULD use IGP encoding per RFC 7917 (IS-IS node administrative tags) and RFC 7777 (OSPF node administrative tags). A specific alternate may be identified by interface, IP address, or router ID; groups by IGP-advertised marker.
section: 6.2.4.4
rfc2119_level: SHOULD
topics:
    - routing
