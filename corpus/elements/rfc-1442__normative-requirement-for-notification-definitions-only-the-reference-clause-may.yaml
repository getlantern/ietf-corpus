document: rfc-1442
kind: normative-requirement
summary: For notification definitions, only the REFERENCE clause may be added or updated without requiring a new OBJECT IDENTIFIER. Any other semantic change to a notification definition requires changing both its OID value and descriptor.
section: "10.3"
