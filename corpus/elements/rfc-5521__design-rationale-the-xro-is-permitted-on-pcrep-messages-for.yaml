document: rfc-5521
kind: design-rationale
summary: 'The XRO is permitted on PCRep messages for two purposes: on a PCRep with NO-PATH it identifies which XRO elements prevented a path from being found; on a successful PCRep it provides exclusions to be signaled during LSP setup via RSVP-TE XRO, which is particularly useful in per-domain path computation scenarios.'
section: 2.1.2
topics:
