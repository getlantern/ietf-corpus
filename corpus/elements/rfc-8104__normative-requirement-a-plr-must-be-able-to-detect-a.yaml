document: rfc-8104
kind: normative-requirement
summary: A PLR MUST be able to detect a failure by using a rapid mechanism such as physical-layer failure detection, BFD, S-BFD, or others. In anticipation of failure, the PLR MUST also pre-establish a bypass tunnel to a protector and pre-install a bypass route in the data plane.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
