document: rfc-2371
kind: protocol-element
summary: The QUERY command (valid in Idle state) lets a subordinate ask whether a specific transaction still exists at the superior. Responses are QUERIEDEXISTS or QUERIEDNOTFOUND; receipt of QUERIEDNOTFOUND means the subordinate should abort the transaction.
section: "13"
