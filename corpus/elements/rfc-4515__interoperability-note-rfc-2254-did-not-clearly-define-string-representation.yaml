document: rfc-4515
kind: interoperability-note
summary: RFC 2254 did not clearly define 'string representation' and did not state that it must be UTF-8-encoded Unicode. Implementations must accept non-valid UTF-8 input strings for backward compatibility with RFC 2254-era software.
