summary: RFC 7729 registers LFB Class Identifier 19, Class Name 'SM', version 1.0 in the IANA 'Logical Functional Block (LFB) Class Names and Class Identifiers' registry. The registration procedure for identifiers 0–65535 is Standards Action; over 65535 is First Come First Served.
