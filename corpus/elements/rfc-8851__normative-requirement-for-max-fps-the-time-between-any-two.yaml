document: rfc-8851
kind: normative-requirement
summary: For max-fps, the time between any two consecutive frames SHOULD NOT be less than 1/max-fps seconds. For max-br, the total bits in the payload portion of RTP SHOULD NOT exceed the specified value for any given one-second sliding window.
