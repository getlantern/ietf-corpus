document: rfc-6945
kind: security-consideration
summary: Readable objects in this MIB (connection addresses, ports, serial numbers, session IDs, prefix/origin data) are sensitive because an attacker who observes them can learn the RPKI topology and potentially plan attacks against routers or cache servers; GET and NOTIFY access should be controlled and values encrypted in transit.
section: "6"
topics:
