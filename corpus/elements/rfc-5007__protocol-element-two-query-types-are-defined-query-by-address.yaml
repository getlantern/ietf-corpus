document: rfc-5007
kind: protocol-element
summary: 'Two query types are defined: QUERY_BY_ADDRESS (1), which requires an OPTION_IAADDR in query-options and returns bindings for the client holding that address or delegated prefix; and QUERY_BY_CLIENTID (2), which requires an OPTION_CLIENTID and returns bindings for the specified client on a given or all links.'
section: 4.1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
