document: rfc-3280
kind: normative-requirement
summary: When extensions are used, as expected in this profile, the certificate version MUST be 3 (encoded value 2). Conforming implementations MUST recognize version 3 certificates at minimum; implementations SHOULD be prepared to accept any version certificate.
section: 4.1.2.1
rfc2119_level: MUST
