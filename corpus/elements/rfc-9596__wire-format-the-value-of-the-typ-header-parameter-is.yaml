document: rfc-9596
kind: wire-format
summary: The value of the "typ" header parameter is either an unsigned integer (uint) registered in the "CoAP Content-Formats" registry or a text string (tstr) content type value. String values have a media type name and MAY include media type parameters. This mirrors the syntax of the COSE content type header parameter defined in RFC 9052 Section 3.1.
section: "2"
topics:
    - cbor
    - crypto
