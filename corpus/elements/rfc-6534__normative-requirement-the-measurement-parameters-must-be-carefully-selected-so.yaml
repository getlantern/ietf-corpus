document: rfc-6534
kind: normative-requirement
summary: The measurement parameters MUST be carefully selected so that the measurements inject only trivial amounts of additional traffic into the networks they measure; injecting too much traffic can skew the results and, in extreme cases, cause congestion and denial of service.
section: "8"
rfc2119_level: MUST
topics:
    - measurement
    - security
