document: rfc-9656
kind: design-rationale
summary: Because microwave is a point-to-point technology, the majority of TE Topology (RFC 8795) leaves augmented by this model are not applicable. Specifically, admin-status and oper-status from te-topology apply only to microwave carriers (not radio links), since radio links are enabled/disabled via their constituent carriers.
section: "2.4"
