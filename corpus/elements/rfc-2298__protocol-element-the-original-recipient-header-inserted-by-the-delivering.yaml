document: rfc-2298
kind: protocol-element
summary: The Original-Recipient header, inserted by the delivering MTA, carries the original recipient address as obtained from the SMTP ORCPT parameter (RFC 1891). This allows MDNs to be correlated with messages on a per-recipient basis.
