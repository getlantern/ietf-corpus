document: rfc-1243
kind: design-rationale
summary: The DdpAddress textual convention is introduced solely to enhance readability and ease comparison with other specifications. Its introduction has no effect on the syntax or semantics of any managed objects; objects are always encoded by the rules that define the underlying primitive type.
