document: rfc-7357
kind: normative-requirement
summary: The ESADI Parameter APPsub-TLV MUST be included in a TRILL GENINFO TLV in ESADI-LSP number zero. If missing or if LSP number zero is unknown, priority defaults to 0x40 and CSNP Time defaults to 30 seconds.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
