document: rfc-5454
kind: design-rationale
summary: IPv6 care-of address registration is explicitly a non-goal. The specification only supports IPv4 CoA registration (inherited from MIPv4) and IPv6 home prefix registration, not IPv6-addressed care-of addresses.
section: "1.3"
topics:
