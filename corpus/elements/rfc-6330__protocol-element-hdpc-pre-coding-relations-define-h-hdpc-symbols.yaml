document: rfc-6330
kind: protocol-element
summary: HDPC pre-coding relations define H HDPC symbols as MT * GAMMA * Transpose[C[0],...,C[K'+S-1]], where MT is an H×(K'+S) matrix of octets using Rand[] and GAMMA is a (K'+S)×(K'+S) lower-triangular matrix using octet exponentiation of alpha=2.
section: 5.3.3.3
