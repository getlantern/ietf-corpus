document: rfc-9253
kind: design-rationale
summary: The RELATED-TO property is extended to allow URI values because the existing PARENT/CHILD/SIBLING types only allow UID references, which are inadequate for linking components across different CalDAV collections or servers. Adding new value types to those relationships would cause backward-compatibility issues.
section: "1.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
