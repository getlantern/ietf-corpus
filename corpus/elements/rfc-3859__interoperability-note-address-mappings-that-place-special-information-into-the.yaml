document: rfc-3859
kind: interoperability-note
summary: 'Address mappings that place special information into the pres: address local-part MUST use the meta-syntax defined in RFC 2846. Source-route mapping (placing the original address into the local part and naming the gateway in the domain part) is technically viable but has a history of operational problems and should be hidden from end-users.'
section: B.1
topics:
    - realtime
    - sip
