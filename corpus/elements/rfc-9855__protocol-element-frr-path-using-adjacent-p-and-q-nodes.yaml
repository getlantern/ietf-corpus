document: rfc-9855
kind: protocol-element
summary: 'FRR path using adjacent P and Q nodes: when P is in P(S,X) and Q is in Q(D,X), both on the post-convergence path and adjacent, the RL contains two segments: Node-SID(P) followed by Adj-SID(P->Q). This is comparable to a post-convergence DLFA repair tunnel.'
section: "5.3"
