document: rfc-8077
kind: protocol-element
summary: The PW Group ID TLV (type 0x096C) carries an arbitrary 32-bit group identifier used to send wildcard label withdrawals or wildcard status Notification messages to remote PEs upon physical port failure. It MUST only be used with the Generalized PWid FEC.
