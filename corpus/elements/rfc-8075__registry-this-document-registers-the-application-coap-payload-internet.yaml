document: rfc-8075
kind: registry
summary: This document registers the 'application/coap-payload' Internet media type with a mandatory 'cf' parameter (integer 0–65535 identifying the CoAP Content-Format). It is used by HTTP-to-CoAP proxies to carry CoAP payloads with unrecognized or unmapped content-formats.
section: "9.2"
topics:
