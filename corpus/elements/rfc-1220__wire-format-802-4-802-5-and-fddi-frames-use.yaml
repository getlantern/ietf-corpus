document: rfc-1220
kind: wire-format
summary: 802.4, 802.5, and FDDI frames use the same 0x0031 protocol and flag structure as 802.3 but prepend a pad byte and Frame Control field before the Destination MAC Address to preserve MAC-order bytes and avoid odd-boundary alignment problems.
section: "6.1"
