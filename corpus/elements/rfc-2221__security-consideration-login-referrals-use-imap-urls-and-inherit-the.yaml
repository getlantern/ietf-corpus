document: rfc-2221
kind: security-consideration
summary: Login referrals use IMAP URLs and inherit the security considerations of general Internet URLs (RFC 1738) and IMAP URLs [IMAP-URL]. Additionally, the LOGIN-REFERRALS capability makes it easier to write a rogue password-catching server, though the referral response itself makes detection of such intrusion easier.
section: "6"
topics:
    - security
