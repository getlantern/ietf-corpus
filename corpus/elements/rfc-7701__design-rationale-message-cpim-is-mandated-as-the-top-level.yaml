document: rfc-7701
kind: design-rationale
summary: Message/CPIM is mandated as the top-level wrapper for all IMs because it carries the sender (From) and recipient (To) information that would otherwise be unavailable to the recipient. This enables private message routing and sender identification without requiring MSRP-level extensions for each case.
section: "5.2"
topics:
