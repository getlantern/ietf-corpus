document: rfc-8030
kind: normative-requirement
summary: If the push service ceases to retry delivery prior to the message's advertised expiration and a delivery receipt was requested, the push service MUST return a 410 (Gone) response to the application server monitoring the receipt subscription.
section: "6.2"
rfc2119_level: MUST
topics:
    - http
