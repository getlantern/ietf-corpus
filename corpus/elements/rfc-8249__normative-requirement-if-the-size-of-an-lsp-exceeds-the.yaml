document: rfc-8249
kind: normative-requirement
summary: If the size of an LSP exceeds the MTU of a port over which it is to be propagated, the LSP MUST NOT be sent over that port and an LSPTooLargeToPropagate alarm shall be generated.
section: "5"
rfc2119_level: MUST NOT
topics:
    - routing
