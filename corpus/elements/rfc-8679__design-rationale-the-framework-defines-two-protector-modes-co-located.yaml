document: rfc-8679
kind: design-rationale
summary: 'The framework defines two protector modes: co-located (protector and backup egress router are the same router, forwarding directly to service destinations) and centralized (protector is a dedicated router that tunnels traffic to separate backup egress routers). Centralized mode reduces the number of routers requiring full protection service instances at the cost of an extra tunnel hop.'
section: "5.12"
topics:
    - mpls
    - routing
