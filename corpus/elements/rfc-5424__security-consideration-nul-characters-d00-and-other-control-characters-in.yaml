document: rfc-5424
kind: security-consideration
summary: NUL characters (%d00) and other control characters in MSG or PARAM-VALUE may be used by attackers to hide log data (NUL truncation in C/C++ programs), render messages unreadable (backspace injection), or invalidate cryptographic checksums embedded in messages.
section: "8.2"
topics:
    - security
