document: rfc-6787
kind: normative-requirement
summary: If an MRCPv2 client or server notices the underlying connection has been closed unexpectedly (without a prior re-INVITE closing that channel), it MUST send a SIP BYE to close down the SIP dialog and all other MRCP channels.
section: "4.6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
