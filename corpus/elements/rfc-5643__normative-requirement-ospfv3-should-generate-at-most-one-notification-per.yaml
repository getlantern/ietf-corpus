document: rfc-5643
kind: normative-requirement
summary: OSPFv3 should generate at most one notification per OSPFv3 event even when multiple unusual conditions are detected in a single packet. Only variables associated with the first unusual condition should be included in the notification.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - routing
    - snmp
