document: rfc-5459
kind: protocol-element
summary: A new optional 'dtx' parameter is added to the audio/G7291 media subtype. Permissible values are 0 (no DTX) and 1 (DTX support per G.729.1 Annex C). The parameter is omitted or 0 by default.
