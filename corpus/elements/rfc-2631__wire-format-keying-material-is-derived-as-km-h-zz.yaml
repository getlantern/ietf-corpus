summary: Keying material is derived as KM = H(ZZ || OtherInfo), where OtherInfo is the DER encoding of a SEQUENCE containing KeySpecificInfo (algorithm OID + 4-byte counter), optional partyAInfo OCTET STRING, and suppPubInfo OCTET STRING. EXPLICIT tagging is used.
