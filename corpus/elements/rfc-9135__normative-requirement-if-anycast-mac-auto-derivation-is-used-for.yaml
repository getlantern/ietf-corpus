document: rfc-9135
kind: normative-requirement
summary: 'If anycast MAC auto-derivation is used for IRB interfaces, the anycast MAC MUST be auto-derived from VRRP ranges: 00-00-5E-00-01-{VRID} for IPv4 and 00-00-5E-00-02-{VRID} for IPv6, with a default VRID of 1.'
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
