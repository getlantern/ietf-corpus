document: rfc-5923
kind: normative-requirement
summary: Before forming an alias, a client MUST authenticate the TLS connection per RFC 5922 Section 7.1, then MUST cache the server's identity (or identities) from the X.509 certificate, the server's resolved IP/port/transport from RFC 3263 server resolution, and the connection handle in the alias table.
section: "8.1"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
