document: rfc-6679
kind: wire-format
summary: 'The RTCP XR ECN Summary Report block (BT=13) contains per-SSRC data blocks each with: SSRC of Media Sender (32-bit), ECT(0) Counter (32-bit), ECT(1) Counter (32-bit), ECN-CE Counter (16-bit), not-ECT Counter (16-bit), Lost Packets Counter (16-bit), and Duplication Counter (16-bit). Block Length must be a multiple of five 32-bit words.'
section: "5.2"
topics:
    - rtp
    - ecn
    - congestion
