document: rfc-1890
kind: normative-requirement
summary: 'For frame-based audio codecs, the channel order is defined for the whole block: for two-channel audio, the encoded frame for the left channel precedes that for the right channel. All frame-oriented audio codecs should be able to encode and decode several consecutive frames within a single packet.'
section: "4.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
