document: rfc-7623
kind: normative-requirement
summary: PE nodes MAY implement an ARP/ND-proxy function to minimize broadcast ARP/ND traffic over the MPLS network. The PE snoops ARP/ND messages to build an IP/MAC cache and responds to ARP requests for remote hosts, flooding only on cache miss.
section: "7"
rfc2119_level: MAY
topics:
    - mpls
    - routing
