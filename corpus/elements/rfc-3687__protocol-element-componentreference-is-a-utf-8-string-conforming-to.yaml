document: rfc-3687
kind: protocol-element
summary: ComponentReference is a UTF-8 string conforming to an ABNF grammar that navigates ASN.1 type structure via dot-separated ComponentIds. ComponentId forms include identifier (named field), from-beginning (positive integer), count ("0"), from-end (negative integer), content, select (open type selector), and all ("*").
