document: rfc-5440
kind: design-rationale
summary: PCEP was designed to run over TCP rather than UDP or a new transport because TCP provides reliable messaging and flow control, fulfilling RFC 4657 requirements without additional protocol machinery. This choice also allows intermittent or permanent session models depending on request frequency.
section: "5"
topics:
