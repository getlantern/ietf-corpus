document: rfc-2858
kind: wire-format
summary: NLRI is encoded as one or more 2-tuples of <Length (1 octet), Prefix (variable)>. Length specifies the prefix length in bits; a length of zero matches all addresses. The Prefix field is padded with trailing bits to an octet boundary.
