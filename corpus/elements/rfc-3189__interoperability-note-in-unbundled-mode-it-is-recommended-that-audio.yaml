document: rfc-3189
kind: interoperability-note
summary: In unbundled mode, it is RECOMMENDED that audio be extracted from DIF blocks and repackaged into the corresponding RTP payload format for the audio encoding (DAT12, L16, or L20) to maximize interoperability with non-DV-capable receivers.
