document: rfc-4745
kind: normative-requirement
summary: Comparison of the 'value' attribute of <sphere> against the PT's stored sphere setting MUST use case-insensitive string comparison for each individual token. There is no registry for sphere values and they are treated as opaque strings.
section: "7.3"
rfc2119_level: MUST
