document: rfc-3267
kind: protocol-element
summary: The CMR (Codec Mode Request) is a 4-bit field in the payload header. Values 0-7 (AMR) or 0-8 (AMR-WB) indicate the requested speech mode; CMR=15 indicates no mode request; other values are reserved. The CMR is valid until the next CMR is received.
section: 4.3.1
topics:
    - rtp
    - realtime
