document: rfc-8392
kind: state-machine
summary: 'Creating a CWT involves: (1) create CWT Claims Set, (2) serialize to binary, (3) create COSE Header, (4) apply COSE_Sign/Sign1, COSE_Mac/Mac0, or COSE_Encrypt/Encrypt0, (5) optionally repeat for nested operations, (6) optionally prepend COSE and CWT CBOR tags.'
