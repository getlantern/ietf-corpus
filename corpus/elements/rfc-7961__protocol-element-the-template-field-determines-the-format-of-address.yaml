document: rfc-7961
kind: protocol-element
summary: The Template field determines the format of Address Sets. If the initial byte K is 1-31, it is followed by K AFNs (2 bytes each) specifying the address types. If K is 32-39, it encodes a well-known combination (e.g., 32=48-bit MAC only, 35=48-bit MAC+IPv4+IPv6). K=0 or K=255 causes the APPsub-TLV to be ignored.
section: "2"
