document: rfc-7070
kind: protocol-element
summary: An 'Application' is a formally defined, named context in which reputation queries are made (e.g., email-sending-domain evaluation, movie ratings). Each Application defines its own query parameters and Response Set fields, and is registered with IANA to prevent name collisions.
