document: rfc-8288
kind: normative-requirement
summary: If the URI-Reference in a link target is relative, parsers MUST resolve it as per RFC 3986 Section 5. Any base IRI appearing in the message's content is not applied.
section: "3.1"
rfc2119_level: MUST
