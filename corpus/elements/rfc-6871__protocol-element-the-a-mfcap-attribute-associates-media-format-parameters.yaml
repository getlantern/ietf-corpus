document: rfc-6871
kind: protocol-element
summary: The 'a=mfcap' attribute associates media format parameters (conventionally carried in 'a=fmtp') with one or more media capability numbers. Its form is 'a=mfcap:<media-cap-num-list> <list of parameters>'; multiple mfcap lines referencing the same capability number have their parameter lists concatenated with ';' in document order.
section: 3.3.2
topics:
    - realtime
