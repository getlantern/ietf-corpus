document: rfc-3107
kind: interoperability-note
summary: When Route Reflectors are used, the advertising LSR (A) may not know the full set of LSRs that receive its label mappings, since the Route Reflector need not be in the forwarding path and need not be capable of forwarding MPLS packets itself.
section: "2"
topics:
    - bgp
    - mpls
    - routing
