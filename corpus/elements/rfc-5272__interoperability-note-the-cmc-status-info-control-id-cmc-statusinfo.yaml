document: rfc-5272
kind: interoperability-note
summary: The CMC Status Info control (id-cmc-statusInfo, id-cmc 1) is retained for backward compatibility with RFC 2797. Servers MUST use the Extended CMC Status Info control but MAY additionally emit the older control. Clients MUST be able to deal with multiple CMC status info controls in a single PKI Response.
section: "6.1"
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
