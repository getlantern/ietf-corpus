document: rfc-2060
kind: protocol-element
summary: Each message has a 32-bit Unique Identifier (UID) that is strictly ascending within the mailbox and persists across sessions. UIDs, combined with the UIDVALIDITY value, form a 64-bit identifier guaranteed never to refer to any other message in the mailbox.
section: 2.3.1.1
topics:
