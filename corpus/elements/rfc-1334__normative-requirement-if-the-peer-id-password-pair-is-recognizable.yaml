document: rfc-1334
kind: normative-requirement
summary: If the Peer-ID/Password pair is recognizable and acceptable, the authenticator MUST transmit an Authenticate-Ack (Code 2). If not, the authenticator MUST transmit an Authenticate-Nak (Code 3) and SHOULD take action to terminate the link.
section: 2.2.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
