document: rfc-4237
kind: interoperability-note
summary: vPIMTelephoneNumber differs from the standard telephoneNumber attribute in LDAP in its support for sub-addressing information (appended after a second '+') and its specific use as a voice messaging address. In most cases the values will be the same.
section: "2.1"
