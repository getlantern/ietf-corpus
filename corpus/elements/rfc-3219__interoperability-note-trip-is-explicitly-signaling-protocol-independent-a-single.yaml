document: rfc-3219
kind: interoperability-note
summary: 'TRIP is explicitly signaling-protocol-independent: a single TRIP route is defined as the combination of an address prefix (with its address family) and an application protocol identifier, allowing TRIP to simultaneously carry routing tables for SIP, H.323, and other protocols over the same peering sessions.'
