summary: 'IANA created a "USRK Key Labels" registry. Labels must be printable US-ASCII, case-sensitive, no more than 64 characters, assigned via Specification Required policy. Labels of the form label-string@domain require Expert Review with Specification Required. Reserved labels: "EMSK", "dsrk@ietf.org", "experimental1", "experimental2", "private1", "private2".'
