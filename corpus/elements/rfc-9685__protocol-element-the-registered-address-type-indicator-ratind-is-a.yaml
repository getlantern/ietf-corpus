document: rfc-9685
kind: protocol-element
summary: The Registered Address Type Indicator (RATInd) is a new 2-bit P-Field used in the EARO, EDAR, and RPL Target Option (RTO) to signal whether a registered address is unicast (0), multicast (1), anycast (2), or reserved for prefix registration (3).
