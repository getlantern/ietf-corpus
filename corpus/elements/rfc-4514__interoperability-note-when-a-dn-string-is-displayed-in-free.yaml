document: rfc-4514
kind: interoperability-note
summary: When a DN string is displayed in free-form text, the characters '<' (U+003C) and '>' (U+003E) may be used as delimiters to distinguish the DN from surrounding text, since these characters may only appear inside a DN string if escaped. Any wrapping angle brackets are not part of the DN string.
section: A
