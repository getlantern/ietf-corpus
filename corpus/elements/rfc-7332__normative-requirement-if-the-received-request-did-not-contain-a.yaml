document: rfc-7332
kind: normative-requirement
summary: If the received request did not contain a Max-Forwards header field, a B2BUA MUST create one in any UAC-side request it generates; the value of the new Max-Forwards header SHOULD be 70, per RFC 3261 Section 16.6 Step 3.
section: "5"
rfc2119_level: MUST
