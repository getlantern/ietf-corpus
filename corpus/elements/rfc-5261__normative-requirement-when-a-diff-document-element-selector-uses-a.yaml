document: rfc-5261
kind: normative-requirement
summary: When a diff document element selector uses a prefix, the agent MUST look up that prefix in the diff document's namespace declarations and locate the corresponding element by namespace URI, regardless of what prefix the target document uses for the same namespace.
section: 4.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
