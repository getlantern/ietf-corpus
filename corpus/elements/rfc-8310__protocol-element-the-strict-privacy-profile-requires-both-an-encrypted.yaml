document: rfc-8310
kind: protocol-element
summary: The Strict Privacy profile requires both an encrypted and authenticated connection to a privacy-enabling DNS server; a hard failure occurs if this is not available. It mitigates both passive eavesdropping and active client-redirection attacks, at the cost of providing no DNS service if an authenticated encrypted connection cannot be established.
section: "5"
topics:
    - dns
    - tls
    - privacy
    - security
