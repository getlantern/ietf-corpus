document: rfc-5048
kind: state-machine
summary: 'Response Fence state: the fence is set when a fenced SCSI response message is handed off from the SCSI layer; it is cleared only after acknowledgement of the SCSI Response PDU carrying that fenced response is received from the initiator. All subsequent I_T_L nexus responses are held until the fence clears.'
section: 3.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
