document: rfc-2685
kind: design-rationale
summary: The VPN-ID format must not force assumptions about the shared network(s) nor prohibit use of shared network features, enabling the same VPN-ID format and value to apply at multiple layers (e.g., both ATM and IP layers) of the same shared network.
