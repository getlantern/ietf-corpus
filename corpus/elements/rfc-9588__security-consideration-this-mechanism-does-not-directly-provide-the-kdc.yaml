document: rfc-9588
kind: security-consideration
summary: This mechanism does not directly provide the KDC Authentication facility because no key confirmation is sent from the KDC to the client. When used as a stand-alone mechanism, the existing KDC authentication in the KDC-REP enc-part still applies.
section: "10.10"
topics:
