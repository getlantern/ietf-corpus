document: rfc-2178
kind: protocol-element
summary: LS Age is measured in seconds from origination. MaxAge is 3600 seconds; an LSA reaching MaxAge is removed from the database and flushed by flooding. The LS checksum uses Fletcher's algorithm over all LSA fields except LS Age.
section: 12.1.1
topics:
    - routing
