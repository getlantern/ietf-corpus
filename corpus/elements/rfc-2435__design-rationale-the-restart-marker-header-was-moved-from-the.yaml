document: rfc-2435
kind: design-rationale
summary: The Restart Marker header was moved from the Type field (as in RFC 2035) to a dedicated bit in the Type field plus an optional header, so the type-specific field is free for interlace and other type-specific purposes and new types can be added without encoding restart status in the type number.
section: Appendix D
topics:
    - rtp
    - realtime
