document: rfc-8282
kind: normative-requirement
summary: If no INTER-LAYER object is present in a PCReq, the PCE MUST process the SWITCH-LAYER object as though inter-layer path computation had been explicitly disallowed, and in such a case the SWITCH-LAYER object MUST NOT have more than one LSP Encoding Type and Switching Type with the I flag set.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
