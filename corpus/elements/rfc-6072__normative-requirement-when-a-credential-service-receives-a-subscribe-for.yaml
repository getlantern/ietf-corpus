document: rfc-6072
kind: normative-requirement
summary: When a credential service receives a SUBSCRIBE for a credential, it MUST challenge the UA using SIP Digest authentication and authorize that the UA is entitled to register as that AOR before delivering credentials.
section: "7.6"
rfc2119_level: MUST
topics:
