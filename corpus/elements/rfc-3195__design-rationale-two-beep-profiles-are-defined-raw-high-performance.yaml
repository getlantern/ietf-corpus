summary: 'Two BEEP profiles are defined: RAW (high-performance, minimal footprint, backward-compatible with UDP syslog format) and COOKED (structured XML format with per-entry acknowledgment). The choice allows implementers to trade overhead for richer semantics depending on use case.'
