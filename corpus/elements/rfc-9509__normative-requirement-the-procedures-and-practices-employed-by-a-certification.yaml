document: rfc-9509
kind: normative-requirement
summary: The procedures and practices employed by a Certification Authority MUST ensure that the correct values for the EKU extension as well as the KU extension are inserted in each certificate that is issued. Inclusion of the new KeyPurposeIds does not preclude inclusion of other KeyPurposeIds.
section: "5"
rfc2119_level: MUST
topics:
