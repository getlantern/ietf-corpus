document: rfc-7813
kind: normative-requirement
summary: The Hop sub-TLV MUST be used to specify a hop of a topology; the Edge Bridge flag MUST be set if the system is an Edge Bridge, and the Root flag MUST be set if the system is a root of the explicit tree.
section: "6.2"
rfc2119_level: MUST
