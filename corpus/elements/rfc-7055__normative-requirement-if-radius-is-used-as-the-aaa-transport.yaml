document: rfc-7055
kind: normative-requirement
summary: If RADIUS is used as the AAA transport, the acceptor MUST send its decomposed name in the registered RADIUS attributes (GSS-Acceptor-Service-Name, GSS-Acceptor-Host-Name, GSS-Acceptor-Service-Specifics, GSS-Acceptor-Realm-Name). The initiator MUST require that the EAP method support channel binding and MUST send the acceptor name as part of channel binding data.
section: "3.4"
rfc2119_level: MUST
topics:
    - security
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
