document: rfc-7949
kind: design-rationale
summary: 'The RFC 5838 restriction that OSPFv3 virtual links are only supported in the IPv6 address family was imposed because IPv4 destinations were not considered routable in an IPv6-presumed internet. This document relaxes that restriction: virtual links in IPv4 address families are now permitted provided the transport is also IPv4, making the constraint transport-symmetric rather than address-family-absolute.'
section: "3.4"
topics:
    - routing
    - ip
    - v6ops
