document: rfc-7774
kind: normative-requirement
summary: Clients MUST ignore all MPL Parameter Configuration Options in a DHCPv6 message if any option contains invalid values (e.g., reserved all-0 or all-1 values). In this case, the entire message is treated as not received, triggering the T2/refresh-time suspension logic.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
