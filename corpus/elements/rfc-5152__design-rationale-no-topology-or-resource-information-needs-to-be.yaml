document: rfc-5152
kind: design-rationale
summary: No topology or resource information needs to be distributed between domains, which is critical to preserve IGP/BGP scalability and confidentiality for TE LSPs spanning multiple routing domains. This is mandated by RFC 4105 and RFC 4216.
