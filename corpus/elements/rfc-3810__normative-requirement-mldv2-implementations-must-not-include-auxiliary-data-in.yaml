document: rfc-3810
kind: normative-requirement
summary: MLDv2 implementations MUST NOT include auxiliary data in transmitted Multicast Address Records (Aux Data Len MUST be set to zero), and MUST ignore any auxiliary data present in received records. Auxiliary data semantics are reserved for future MLD versions or extensions.
section: 5.2.10
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
