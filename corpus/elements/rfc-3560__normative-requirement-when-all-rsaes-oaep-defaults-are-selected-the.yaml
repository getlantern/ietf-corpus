summary: 'When all RSAES-OAEP defaults are selected, the SMIMECapability SEQUENCE MUST include id-RSAES-OAEP in capabilityID and MUST include an empty SEQUENCE in the parameters field, DER-encoded as: 30 0D 06 09 2A 86 48 86 F7 0D 01 01 07 30 00.'
