document: rfc-4108
kind: normative-requirement
summary: A preferred firmware package version number MUST be a monotonically increasing non-negative integer, and a unique OID MUST identify each distinct collection of features characterizing a firmware package. Each hardware module type and revision MUST be named by a unique OID.
section: 1.2.2
rfc2119_level: MUST
topics:
    - security
