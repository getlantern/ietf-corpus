document: rfc-8824
kind: wire-format
summary: CoAP options use Delta-Type (D-T), Length (L), Value (V) encoding. In SCHC Rules, the option number is derived from the D-T field and placed in the FID, the option value goes in the TV, and option length handling follows RFC 8724 Sections 7.4.1 and 7.4.2. Length coding differs between CoAP options and SCHC variable-size Compression Residue.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
