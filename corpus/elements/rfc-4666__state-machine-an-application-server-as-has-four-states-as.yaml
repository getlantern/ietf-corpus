document: rfc-4666
kind: state-machine
summary: 'An Application Server (AS) has four states: AS-Down (no constituent ASPs are active or inactive), AS-Inactive (at least one ASP inactive, none active), AS-Active (at least one ASP active and handling traffic), and AS-Pending (previously active, all ASPs gone inactive/down, a recovery timer is running). Transitions are driven entirely by changes in the active/inactive/down status of constituent ASPs.'
section: 4.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
