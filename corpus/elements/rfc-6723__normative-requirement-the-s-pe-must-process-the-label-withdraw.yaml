document: rfc-6723
kind: normative-requirement
summary: The S-PE MUST process the Label Withdraw message before the Label Request message. When the S-PE receives a Label Withdraw, it sends a Label Release in response and a Label Withdraw upstream, then processes subsequent LDP messages such as the Label Request.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
