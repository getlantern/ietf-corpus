document: rfc-6401
kind: design-rationale
summary: These extensions are intentionally scoped to a single administrative domain because a subset of RSVP messages use the IP Router Alert Option (RAO), whose security aspects and risks for cross-domain leakage are discussed in RFC 6398. End-to-end Internet use is explicitly out of scope.
section: "2"
topics:
    - security
    - qos
    - routing
