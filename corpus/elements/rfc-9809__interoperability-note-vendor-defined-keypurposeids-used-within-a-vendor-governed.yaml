document: rfc-9809
kind: interoperability-note
summary: Vendor-defined KeyPurposeIds used within a vendor-governed PKI do not pose interoperability concerns since non-critical extensions can be safely ignored if unrecognized, but using them outside their intended environment or in critical EKU extensions can cause interoperability failures.
section: "1"
topics:
