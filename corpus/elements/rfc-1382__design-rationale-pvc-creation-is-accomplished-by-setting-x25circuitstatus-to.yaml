summary: PVC creation is accomplished by setting x25CircuitStatus to pvc on a non-existing instance; the instance identifier supplies both the PLE index and the channel number, so a single set operation provides sufficient information. DEFVAL clauses on all other circuit table objects provide appropriate defaults.
