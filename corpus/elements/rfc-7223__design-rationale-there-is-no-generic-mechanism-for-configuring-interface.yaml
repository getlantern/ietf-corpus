document: rfc-7223
kind: design-rationale
summary: There is no generic mechanism for configuring interface layering; each interface-type-specific model defines its own layering data nodes using 'interface-ref' types. Two generic read-only leaf-lists ('higher-layer-if' and 'lower-layer-if') provide a unified view of the layering hierarchy regardless of the type-specific configuration method.
section: "3.3"
topics:
