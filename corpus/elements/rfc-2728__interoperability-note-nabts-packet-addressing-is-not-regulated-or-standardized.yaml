document: rfc-2728
kind: interoperability-note
summary: NABTS packet addressing is not regulated or standardized. Care is required to avoid address collisions when multiple independent services share an insertion point, as NABTS data may be inserted at production, network redistribution, regional operator, or local operator stages.
section: "4"
