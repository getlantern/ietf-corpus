document: rfc-4717
kind: wire-format
summary: ATM One-to-one VCC cell encapsulation uses the Generic Control Word followed by an 8-bit ATM-specific byte (M, V, Res, PTI[3], C) and 48-byte cell payload; when multiple cells are concatenated the ATM-specific byte MUST be repeated per cell (49 bytes per cell).
section: "9.3"
