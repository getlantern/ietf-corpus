document: rfc-6035
kind: interoperability-note
summary: RERL (Residual Echo Return Loss) relates to echo in the transmitted packet stream affecting the remote user, not the local user. To support diagnosis of echo experienced by the local user, the RERL value received via RTCP XR SHOULD be reported in the RemoteMetrics set.
section: 4.6.1
topics:
    - sip
    - voip
    - rtp
