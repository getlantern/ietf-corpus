document: rfc-3390
kind: design-rationale
summary: The larger initial window is explicitly not intended as encouragement for web browsers to open multiple simultaneous TCP connections with large windows, which works against TCP congestion control and increases unfairness; HTTP/1.1 persistent connections and pipelining are the recommended alternative.
