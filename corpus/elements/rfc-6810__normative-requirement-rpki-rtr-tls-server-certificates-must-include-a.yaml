document: rfc-6810
kind: normative-requirement
summary: rpki-rtr TLS server certificates MUST include a subjectAltName DNS-ID identifier (dNSName). rpki-rtr implementations using TLS MUST NOT use CN-ID identifiers for authentication. DNS names in server certificates SHOULD NOT contain wildcard characters.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - tls
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
