document: rfc-5286
kind: normative-requirement
summary: An implementation SHOULD continue using alternate next-hops for forwarding even after new routing information based on the changed topology is available, until one of the termination conditions is met. Premature switchover to a new primary that has not yet converged can cause micro-forwarding loops.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
