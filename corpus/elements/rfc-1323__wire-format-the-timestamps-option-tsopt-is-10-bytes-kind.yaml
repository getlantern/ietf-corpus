document: rfc-1323
kind: wire-format
summary: 'The Timestamps option (TSopt) is 10 bytes: Kind=8, Length=10, a 4-byte TSval (sender''s current timestamp clock), and a 4-byte TSecr (echo of the remote''s last TSval). TSecr is only valid when the ACK bit is set; otherwise its value must be zero.'
