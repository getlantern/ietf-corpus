document: rfc-3996
kind: normative-requirement
summary: Event Notification groups in the Get-Notifications response MUST be ordered in ascending time stamp (and sequence number) order for each Subscription object, following the Event Notification Ordering requirements in RFC 3995 section 9.
section: "5.2"
rfc2119_level: MUST
