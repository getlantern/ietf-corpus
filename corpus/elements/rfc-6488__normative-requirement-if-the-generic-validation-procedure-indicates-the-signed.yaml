document: rfc-6488
kind: normative-requirement
summary: If the generic validation procedure indicates the signed object is invalid, the signed object MUST be discarded and treated as though no signed object were present. The relying party MUST then also perform any additional validation steps required for the specific type of signed object.
section: "3"
rfc2119_level: MUST
topics:
