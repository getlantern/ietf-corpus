document: rfc-2163
kind: protocol-element
summary: The DNS query mechanism for MIXER mapping uses wildcard PX records (e.g., '*.net2.it. IN PX 50 ...') to provide implicit wildcard matching consistent with MCGAM semantics. DNS natively returns the longest matching rule in a single query, so no iterative multi-query search is required.
