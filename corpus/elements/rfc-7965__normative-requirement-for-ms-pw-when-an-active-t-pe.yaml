document: rfc-7965
kind: normative-requirement
summary: For MS-PW, when an active T-PE starts signaling, a PSN Tunnel Binding TLV MUST be carried in the Label Mapping message to the adjacent S-PE. If an S-PE cannot accept the binding request, it MUST reply with a Label Release with status code 0x0000003B to the upstream PE.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
