document: rfc-1722
kind: protocol-element
summary: The Next Hop field in a RIP-2 route entry allows the advertising router to specify a better next-hop gateway for that route. A value of 0.0.0.0 indicates the advertising router itself should be used as the next hop.
section: "3.2"
topics:
    - routing
