document: rfc-6901
kind: security-consideration
summary: JSON pointers may contain the NUL character (Unicode U+0000). Implementations in languages that use NUL as a string terminator must take care not to misinterpret this character, as it could cause pointer truncation or misbehavior.
section: "8"
topics:
    - json
    - security
