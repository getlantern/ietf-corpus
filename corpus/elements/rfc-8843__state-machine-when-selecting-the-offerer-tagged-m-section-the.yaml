document: rfc-8843
kind: state-machine
summary: 'When selecting the offerer-tagged ''m='' section, the answerer iterates the offer''s identification-tag list in order. A candidate is accepted only if: (1) the answerer will not move it out of the BUNDLE group, (2) the answerer will not reject it, and (3) it does not carry a zero port. If no candidate qualifies, the answerer MUST NOT create the BUNDLE group.'
section: 7.3.1
