document: rfc-4142
kind: design-rationale
summary: FFPIM enhances Internet mail to approximate classic T.30 facsimile service by adding capability negotiation and reliability features, while deliberately leveraging existing email infrastructure rather than creating fax-specific features unlikely to be implemented in non-fax software.
