document: rfc-3807
kind: design-rationale
summary: V5UA replaces the IUA DL-Establish/DL-Release primitives with MDL-ESTABLISH and MDL-RELEASE because in V5 (unlike ISDN), system management—not the data link layer itself—is responsible for establishing and releasing data links, per the V5 standard definitions.
section: 1.6.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
