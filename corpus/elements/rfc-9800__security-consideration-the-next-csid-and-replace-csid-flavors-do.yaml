document: rfc-9800
kind: security-consideration
summary: The NEXT-CSID and REPLACE-CSID flavors do not introduce new SID semantics or change how the SID list is encoded in the IPv6 packet. The paths enforced using compressed segment list encoding are topologically and semantically equivalent to those using uncompressed RFC 8986 SIDs, so this document is subject to the same security considerations as RFC 8402, RFC 8754, and RFC 8986.
section: "11"
topics:
