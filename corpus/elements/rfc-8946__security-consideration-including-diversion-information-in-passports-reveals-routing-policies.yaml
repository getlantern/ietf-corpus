document: rfc-8946
kind: security-consideration
summary: Including diversion information in PASSporTs reveals routing policies used by the retargeting entity. If an intermediate called number must remain confidential, no "div" PASSporT should be created for that retargeting; the only consequence is that downstream entities cannot correlate the incoming call with the original PASSporT without prior knowledge.
section: "11"
topics:
    - security
    - sip
