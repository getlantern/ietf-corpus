document: rfc-5846
kind: security-consideration
summary: A mobility node is only permitted to revoke mobility sessions currently registered with it; it is explicitly NOT allowed to revoke a mobile node's mobility session registered with a different mobility node. The binding revocation protocol inherits the same IPsec security association as the binding registration signaling, requiring no new SA.
section: "13"
topics:
    - mobility
    - security
    - ipsec
