document: rfc-9742
kind: protocol-element
summary: The 'selector' grouping defines syslog message filtering via a 'filter' container holding a 'facility-list' (keyed by facility and severity) and an optional 'pattern-match' leaf (POSIX 1003.2 regex against the MSG field, gated by the select-match feature). Both conditions must match when both are specified.
