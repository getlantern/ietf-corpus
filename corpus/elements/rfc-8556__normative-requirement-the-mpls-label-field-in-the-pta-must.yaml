document: rfc-8556
kind: normative-requirement
summary: The MPLS Label field in the PTA MUST contain an upstream-assigned non-zero MPLS label assigned by the BFIR constructing the PTA. Failure to follow label assignment constraints cannot be detected by the protocol and may result in improper handling of data packets by egress PE routers.
section: "2"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
