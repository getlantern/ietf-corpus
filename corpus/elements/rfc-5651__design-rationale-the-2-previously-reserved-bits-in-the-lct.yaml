document: rfc-5651
kind: design-rationale
summary: The 2 previously reserved bits in the LCT header were allocated as Protocol-Specific Indication (PSI) bits, allowing protocol instantiations to signal PI-specific state without requiring header extensions. A flat single namespace was also adopted for LCT Header Extension Types, replacing the previous split between PI-specific and general ranges.
section: "11"
topics:
