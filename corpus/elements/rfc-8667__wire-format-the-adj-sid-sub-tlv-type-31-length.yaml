document: rfc-8667
kind: wire-format
summary: The Adj-SID sub-TLV (Type 31, Length 5 or 6) contains a 1-octet Flags field (F/B/V/L/S/P bits), a 1-octet Weight for load balancing, and a variable SID/Label/Index. Multiple Adj-SID sub-TLVs MAY be associated with a single IS Neighbor; by default V-Flag and L-Flag are SET.
section: 2.2.1
topics:
    - routing
    - mpls
