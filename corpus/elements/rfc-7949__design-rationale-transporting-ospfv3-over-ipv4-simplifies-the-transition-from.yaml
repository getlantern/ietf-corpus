document: rfc-7949
kind: design-rationale
summary: Transporting OSPFv3 over IPv4 simplifies the transition from IPv4-only to dual-stack or IPv6-only routing domains. It allows operators to deploy and test OSPFv3 on existing IPv4 infrastructure, consolidating future protocol extensions on OSPFv3 while allowing OSPFv2 to enter maintenance mode, rather than requiring a flag-day cutover.
section: "1"
