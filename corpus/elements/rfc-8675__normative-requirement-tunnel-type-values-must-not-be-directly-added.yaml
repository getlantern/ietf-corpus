document: rfc-8675
kind: normative-requirement
summary: Tunnel type values must not be directly added to the iana-tunnel-type YANG module; they must instead be added to the 'tunnelType' subregistry under the SMI Numbers registry, after which IANA updates the YANG module accordingly.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - yang
    - registry
