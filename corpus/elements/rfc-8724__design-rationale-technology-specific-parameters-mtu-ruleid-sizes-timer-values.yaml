document: rfc-8724
kind: design-rationale
summary: Technology-specific parameters (MTU, RuleID sizes, timer values, WINDOW_SIZE, etc.) are deliberately delegated to Profiles defined in separate documents rather than fixed in this specification. This keeps the SCHC framework technology-independent while allowing full parameterization for specific LPWAN technologies.
section: "1"
topics:
