document: rfc-5596
kind: interoperability-note
summary: DCCP-Listen packets do not require special forwarding treatment and should traverse routers and middleboxes end-to-end. Middleboxes may use the address, port, and Service Code information to establish local forwarding state; NAT-specific processing is specified in RFC 5597.
section: 2.2.4
topics:
    - nat
    - congestion
