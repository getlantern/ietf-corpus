document: rfc-2543
kind: wire-format
summary: 'SIP messages follow RFC 822 generic-message format: a start-line (Request-Line or Status-Line), one or more header fields, a blank CRLF line terminating headers, and an optional message-body. Senders MUST terminate lines with CRLF; receivers MUST also accept bare CR or LF as line terminators.'
