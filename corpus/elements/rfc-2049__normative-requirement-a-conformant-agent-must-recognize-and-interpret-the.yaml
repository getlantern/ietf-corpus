document: rfc-2049
kind: normative-requirement
summary: A conformant agent MUST recognize and interpret the Content-Type header field, avoid showing users raw data with a non-text Content-Type, and be capable of sending at least text/plain messages with an explicit charset parameter when the character set is not US-ASCII.
section: "2"
rfc2119_level: MUST
topics:
    - email
