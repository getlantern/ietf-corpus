document: rfc-8629
kind: normative-requirement
summary: 'A modem receiving Suppress Forwarding in a Link Characteristics Request Message MUST suppress multi-hop forwarding only for the indicated destination: traffic to that destination from the peer router SHALL only be sent when it is one modem hop away.'
section: 3.2.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
