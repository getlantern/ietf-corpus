document: rfc-4244
kind: protocol-element
summary: The History-Info header is a new optional SIP header field that captures the sequence of Request-URIs as a SIP request is retargeted and forwarded. It may appear in any request or response not associated with an established dialog, including INVITE, REGISTER, MESSAGE, REFER, OPTIONS, SUBSCRIBE, PUBLISH, and NOTIFY.
section: "4.1"
topics:
