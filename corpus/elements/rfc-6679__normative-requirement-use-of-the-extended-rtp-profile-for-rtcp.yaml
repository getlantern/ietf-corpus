document: rfc-6679
kind: normative-requirement
summary: Use of the Extended RTP Profile for RTCP-Based Feedback (RTP/AVPF) or a profile that inherits its signalling rules MUST be signalled unless timely feedback is not required. Its use is RECOMMENDED even when timely feedback is not required.
section: 6.1.3
rfc2119_level: MUST
topics:
    - rtp
    - ecn
    - congestion
