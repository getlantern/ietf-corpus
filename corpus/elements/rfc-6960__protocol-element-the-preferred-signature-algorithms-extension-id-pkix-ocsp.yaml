document: rfc-6960
kind: protocol-element
summary: The Preferred Signature Algorithms extension (id-pkix-ocsp-pref-sig-algs, OID { id-pkix-ocsp 8 }) allows clients to declare ordered preferred signature algorithms in requestExtensions. Each PreferredSignatureAlgorithm contains a sigIdentifier and optional pubKeyAlgIdentifier (SMIMECapability) for specifying key parameters such as elliptic curve.
section: 4.4.7
topics:
