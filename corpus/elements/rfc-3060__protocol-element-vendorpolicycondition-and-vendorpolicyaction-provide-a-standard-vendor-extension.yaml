document: rfc-3060
kind: protocol-element
summary: VendorPolicyCondition and VendorPolicyAction provide a standard vendor extension mechanism. VendorPolicyCondition carries a multi-valued Constraint property and a ConstraintEncoding OID; VendorPolicyAction carries ActionData and ActionEncoding, allowing opaque vendor-specific policy data.
section: "6.6"
