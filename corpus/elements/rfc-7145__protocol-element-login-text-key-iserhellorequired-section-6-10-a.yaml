summary: 'Login/Text key iSERHelloRequired (Section 6.10): a boolean key negotiated by the initiator to determine if the target supports iSER Hello exchanges. If ''Yes'', the iSER Hello/HelloReply exchange is mandatory before any other Full Feature Phase PDUs.'
