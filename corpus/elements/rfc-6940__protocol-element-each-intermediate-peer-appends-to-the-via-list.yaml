document: rfc-6940
kind: protocol-element
summary: Each intermediate peer appends to the Via List as a message traverses the overlay. A peer may optionally truncate the Via List into an Opaque ID (e.g., an encryption of the full list), storing the mapping internally keyed by transaction ID to recover the path when the response arrives.
section: 6.3.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
