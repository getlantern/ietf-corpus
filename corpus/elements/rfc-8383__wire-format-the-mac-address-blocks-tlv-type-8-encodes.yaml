document: rfc-8383
kind: wire-format
summary: The MAC Address Blocks TLV (Type 8) encodes sets of Start.MAC and End.MAC 48-bit values (12 bytes per block); Length MUST be a multiple of 12. If not, the TLV is corrupt and the message MUST be discarded if Type 7 (sic, Type 8) is implemented.
section: 2.2.8
topics:
    - routing
