document: rfc-8338
kind: protocol-element
summary: The PMSI Tunnel Info field within the P2MP PW Upstream FEC Element encodes the PMSI Tunnel Type (from RFC 6514), PMSI Tunnel Type Length, and Transport LSP ID. For mLDP, the Tunnel Identifier is a P2MP FEC Element; for RSVP-TE, it is the RSVP-TE tunnel identifier.
section: 3.2.1
