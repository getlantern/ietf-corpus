document: rfc-4279
kind: normative-requirement
summary: The PSK identity MUST be first converted to a character string and then encoded to octets using UTF-8. IPv4 addresses are sent as dotted-decimal strings, domain names in their usual text form, and X.500 Distinguished Names in their string representation.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
