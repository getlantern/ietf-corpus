document: rfc-7555
kind: design-rationale
summary: 'Proxy MPLS Echo Request was created to address two scalability problems with P2MP LSP diagnostics: the automatic replication of MPLS Echo Requests as they traverse a large P2MP tree produces an unwieldy number of replies back to the root, and LDP-based P2MP/MP2MP LSPs (RFC 6388) require a leaf-to-root tracing capability not available in standard LSP Ping.'
section: "1"
