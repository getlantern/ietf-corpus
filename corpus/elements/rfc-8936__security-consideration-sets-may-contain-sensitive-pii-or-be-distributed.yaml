document: rfc-8936
kind: security-consideration
summary: SETs may contain sensitive PII or be distributed through third parties; both TLS (mandatory) and JWE encryption (when required) MUST be used to protect confidentiality. TLS 1.2 is the minimum supported version, with TLS 1.3 recommended.
section: "4.3"
