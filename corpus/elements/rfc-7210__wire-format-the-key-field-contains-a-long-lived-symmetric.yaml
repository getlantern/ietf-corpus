document: rfc-7210
kind: wire-format
summary: The Key field contains a long-lived symmetric cryptographic key encoded as a lowercase hexadecimal string with the most significant octet first. The length depends on the KDF and AlgID; for example, KDF=none and AlgID=AES128 requires a 128-bit key represented by 32 hexadecimal digits.
