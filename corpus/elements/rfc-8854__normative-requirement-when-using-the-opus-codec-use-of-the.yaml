document: rfc-8854
kind: normative-requirement
summary: When using the Opus codec, use of the built-in Opus FEC mechanism is RECOMMENDED. If multi-packet protection is needed, redundant encoding with reduced-bitrate Opus encodings SHOULD be used instead.
