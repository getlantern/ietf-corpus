document: rfc-7177
kind: protocol-element
summary: The DRB is elected among all RBridge ports on a broadcast link using the 7-bit priority field from each RBridge's Hellos, with MAC (SNPA) address as the primary tiebreaker, Port ID as the secondary tiebreaker, and System ID as the tertiary tiebreaker; all fields are compared as unsigned integers, with a larger value meaning higher priority.
section: 4.2.1
topics:
    - routing
