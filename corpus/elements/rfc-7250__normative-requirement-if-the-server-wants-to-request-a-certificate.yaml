document: rfc-7250
kind: normative-requirement
summary: If the server wants to request a certificate from the client, it MUST include the client_certificate_type extension in the ServerHello, and MUST also include a certificate_request payload. The selected value MUST be drawn from the list provided by the client in its ClientHello.
section: "4.2"
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
