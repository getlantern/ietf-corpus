document: rfc-9056
kind: protocol-element
summary: A single S-Label (DetNet service label) is used to support a single App-flow per Section 5.1 of RFC 8964. The IP six-tuple is mapped to the S-Label; various IP fields may be mapped or ignored when translating from IP to MPLS.
section: "4.2"
topics:
