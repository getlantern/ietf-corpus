document: rfc-8710
kind: interoperability-note
summary: When combining application/multipart-core with CoAP Observe (RFC 7641), the Observe option requires all notifications to carry the same Content-Format. The multipart-core type can serve as a stable Content-Format envelope, carrying an empty list for pending results and a single-element list once the resource becomes available.
