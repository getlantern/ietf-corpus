summary: An SHF Dump is an XML structure consisting of a <dump> root element with a compulsory 'name' attribute and optional 'blocks' attribute, containing one or more <block> child elements. The dump element represents a collection of independent data Blocks, typically corresponding to non-continuous memory regions.
