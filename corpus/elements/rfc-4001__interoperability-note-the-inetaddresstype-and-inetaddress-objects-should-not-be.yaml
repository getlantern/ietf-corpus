document: rfc-4001
kind: interoperability-note
summary: The InetAddressType and InetAddress objects SHOULD NOT be sub-typed in object definitions because sub-typing binds the MIB module to specific address formats, which may cause serious problems if new address formats need to be introduced. Compliance statements may restrict supported types.
section: "4"
topics:
