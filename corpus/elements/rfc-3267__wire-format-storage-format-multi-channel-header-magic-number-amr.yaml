document: rfc-3267
kind: wire-format
summary: 'Storage format multi-channel header: magic number ''#!AMR_MC1.0\n'' or ''#!AMR-WB_MC1.0\n'' followed by a 32-bit channel description field; bits 0-27 are reserved (write zero, ignore on read) and bits 28-31 (CHAN, 4-bit unsigned) indicate the number of audio channels.'
section: "5.2"
topics:
