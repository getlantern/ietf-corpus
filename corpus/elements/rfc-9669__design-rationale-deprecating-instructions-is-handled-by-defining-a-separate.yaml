document: rfc-9669
kind: design-rationale
summary: Deprecating instructions is handled by defining a separate 'legacy' conformance group for the deprecated instructions and a new superseding group that includes the original but excludes the legacy group. This allows implementations that drop deprecated instructions to claim conformance to the newer group while retaining backward-compatibility claims via the original group.
section: "7.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
