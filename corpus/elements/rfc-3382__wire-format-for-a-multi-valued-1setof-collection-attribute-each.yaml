document: rfc-3382
kind: wire-format
summary: For a multi-valued (1setOf) collection attribute, each additional collection value begins with a begCollection tag with zero name-length immediately following the previous endCollection. Nested collections are represented by a memberAttrName followed by a begCollection tag with zero name-length, terminated by a matching endCollection.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
