document: rfc-7984
kind: interoperability-note
summary: The getaddrinfo() function is the typical implementation vehicle for RFC 6724 address selection, translating a target DNS name into an ordered list of IPv4 and/or IPv6 addresses. This function should be invoked per SRV target, not across the full address set.
