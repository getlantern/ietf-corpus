document: rfc-3872
kind: normative-requirement
summary: If tripCfgAdminStatus is down(2), then tripCfgOperStatus SHOULD be down(2). If tripCfgAdminStatus is changed to up(1), then tripCfgOperStatus SHOULD change to up(1) if no fault prevents the TRIP protocol from moving to that state.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - snmp
    - voip
