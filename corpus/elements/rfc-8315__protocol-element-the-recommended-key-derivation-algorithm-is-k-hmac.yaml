document: rfc-8315
kind: protocol-element
summary: The RECOMMENDED key derivation algorithm is K = HMAC(sec, uid+mid), where <sec> is a local secret, <uid> is the user's login name (empty string if each user has a dedicated secret), and <mid> is the full Message-ID including angle brackets. This avoids the need for a per-article key database.
