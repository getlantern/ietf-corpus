document: rfc-8950
kind: interoperability-note
summary: The Extended Next Hop Encoding capability is not intended for AFI/SAFIs whose definitions already allow both IPv4 and IPv6 next hops (e.g., <1/132> per RFC 4684) or for which a different-family next-hop solution already exists (e.g., <2/1>, <2/2>, <2/4> with IPv4 next hop per RFC 4798).
