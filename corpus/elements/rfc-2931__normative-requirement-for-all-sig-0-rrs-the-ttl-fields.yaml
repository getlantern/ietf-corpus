document: rfc-2931
kind: normative-requirement
summary: For all SIG(0) RRs, the TTL fields SHOULD be zero and the CLASS field SHOULD be ANY; to conserve space, the owner name SHOULD be root (a single zero octet). The owner name, class, TTL, and original TTL are meaningless.
section: "3"
rfc2119_level: SHOULD
