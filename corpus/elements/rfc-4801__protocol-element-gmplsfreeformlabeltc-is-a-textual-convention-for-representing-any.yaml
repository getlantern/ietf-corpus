document: rfc-4801
kind: protocol-element
summary: GmplsFreeformLabelTC is a textual convention for representing any GMPLS label as an OCTET STRING of 0 to 64 bytes. It is used for labels whose types are not defined in any RFCs, or by systems that prefer not to use type-specific syntaxes.
