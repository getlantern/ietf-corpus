document: rfc-3630
kind: interoperability-note
summary: If IS-IS is also active in the domain, the Router Address TLV can be used to correlate OSPF and IS-IS TE LSAs from the same router, enabling a unified Traffic Engineering Database (TED) to be built from both protocols.
