document: rfc-7065
kind: security-consideration
summary: Security considerations for the TURN resolution mechanism, including normative authentication procedures for TLS clients, are defined in Section 5 of RFC 5928. The "turn" and "turns" URI schemes do not introduce specific security issues beyond those in RFC 3986.
