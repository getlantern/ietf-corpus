document: rfc-3560
kind: normative-requirement
summary: If a keyUsage extension is present in a certificate conveying an RSA public key with the id-RSAES-OAEP OID, the extension MUST contain keyEncipherment and/or dataEncipherment, but both SHOULD NOT be present simultaneously.
section: "4"
rfc2119_level: MUST
topics:
