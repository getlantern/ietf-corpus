document: rfc-4340
kind: interoperability-note
summary: RTP applications may run over DCCP to gain built-in congestion control. The selected DCCP CCID should be consistent with the media codec's rate-adaptation properties; TFRC (CCID 3) is generally appropriate for streaming media due to its smoother rate behavior.
section: "17.1"
topics:
    - rtp
    - realtime
    - congestion
    - udp
