document: rfc-7587
kind: normative-requirement
summary: The receiving side MUST be prepared to receive duplicate RTP packets. The receiver MUST provide at most one of those payloads to the Opus decoder for decoding, and MUST discard the others.
section: "4.1"
rfc2119_level: MUST
