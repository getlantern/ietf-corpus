document: rfc-9422
kind: normative-requirement
summary: Limit names MUST be comprehensible. When a limit is associated with a particular command, its name SHOULD begin with the name of that command, and SHOULD end with one or more terms describing the type of limit.
section: "3.2"
rfc2119_level: MUST
