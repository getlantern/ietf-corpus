document: rfc-3516
kind: interoperability-note
summary: Every IMAP4 body section has a MIME CTE; those without an explicit Content-Transfer-Encoding header are implicitly treated as "7bit" content. The Binary extension's decoding applies to these CTE labels as defined in RFC 2045.
