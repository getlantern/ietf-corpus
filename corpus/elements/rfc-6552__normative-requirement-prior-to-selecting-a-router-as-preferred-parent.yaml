document: rfc-6552
kind: normative-requirement
summary: Prior to selecting a router as preferred parent, an implementation SHOULD validate its Layer 2 and Layer 3 connectivity and suitability. A router that succeeds this validation SHOULD be preferred over one that did not.
section: 4.2.1
rfc2119_level: SHOULD
