document: rfc-8497
kind: design-rationale
summary: The Session-ID header field (RFC 7989) was chosen to carry the 'logme' marker because it is typically passed through B2BUAs and intermediaries per Session-ID requirement REQ3 in RFC 7206, making it well-suited for end-to-end propagation without introducing device- or user-specific information.
section: "3.1"
topics:
    - sip
    - realtime
