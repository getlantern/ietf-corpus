document: rfc-4301
kind: wire-format
summary: For tunnel mode IPv4 headers (Section 5.1.2.1), the outer header's TTL, TOS, DF bit, and fragmentation fields are derived from the inner header or SPD configuration. The outer destination address is the remote tunnel endpoint; the outer source address is the local tunnel endpoint.
section: 5.1.2.1
topics:
    - ipsec
    - ip
