kind: protocol-element
summary: 'The PMSI Tunnel attribute''s Tunnel Identifier encoding depends on Tunnel Type: RSVP-TE P2MP uses <Extended Tunnel ID, Reserved, Tunnel ID, P2MP ID> per RFC 4875; mLDP P2MP/MP2MP use FEC Elements; PIM-SM and BIDIR-PIM use <Sender Address, P-Multicast Group>; PIM-SSM uses <P-Root Node Address, P-Multicast Group>; Ingress Replication uses a unicast tunnel endpoint IP address.'
