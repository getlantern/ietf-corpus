document: rfc-3723
kind: normative-requirement
summary: iSCSI implementations using SRP MUST use one of the well-known groups defined in Appendix A. All groups up to 1536 bits (SRP-768, SRP-1024, SRP-1280, SRP-1536) MUST be supported by initiators and targets; targets MUST always offer 'SRP-1536' as one of the proposed groups.
section: 2.4.2
rfc2119_level: MUST
topics:
    - security
    - crypto
