document: rfc-9682
kind: security-consideration
summary: During the transition period, environments using a mix of updated and non-updated CDDL tools face an elevated risk of confusion. Attackers may craft CDDL models interpreted differently by different parts of a system, exploiting implementation divergence. Implementations must ascertain provenance, authenticity, and integrity of CDDL models, treating them with the same care as source code.
section: "4"
topics:
