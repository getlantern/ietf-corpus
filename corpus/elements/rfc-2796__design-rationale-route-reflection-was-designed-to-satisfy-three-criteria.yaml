document: rfc-2796
kind: design-rationale
summary: 'Route Reflection was designed to satisfy three criteria: simplicity (easy to configure and understand), easy transition (no topology or AS changes required), and compatibility (non-compliant IBGP peers can continue operating without loss of routing information). These criteria were motivated by operational experience with large, topology-rich networks.'
