document: rfc-2163
kind: wire-format
summary: 'PX RDATA consists of three fields: PREFERENCE (16-bit integer, lower values preferred), MAP822 (a <domain-name> containing the RFC822 domain part of the MCGAM), and MAPX400 (a <domain-name> containing the X.400 O/R address in DNS-compatible syntax). Standard DNS conventions including wildcards, abbreviations, and message compression apply.'
