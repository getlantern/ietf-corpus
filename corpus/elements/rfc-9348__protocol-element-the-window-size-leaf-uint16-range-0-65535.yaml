document: rfc-9348
kind: protocol-element
summary: The window-size leaf (uint16, range 0..65535) configures the maximum number of out-of-order outer packets that the receiver will buffer for reordering. Setting it to 0 disables reordering entirely, causing packets to be delivered in received order.
section: "3.2"
topics:
    - ipsec
    - yang
