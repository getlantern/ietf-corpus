kind: wire-format
summary: 'IPv4 DHCP Support Mode option (Type=39, Length=2): carries a 15-bit Reserved field and a 1-bit DHCP Support Mode flag (S). S=0 indicates the MAG should act as a DHCP relay; S=1 indicates it should act as a DHCP server.'
