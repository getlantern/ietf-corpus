document: rfc-7523
kind: normative-requirement
summary: The JWT MUST contain a 'sub' (subject) claim identifying the principal. For authorization grants the subject typically identifies the resource owner or delegate; for client authentication the subject MUST be the 'client_id' of the OAuth client.
section: "3"
rfc2119_level: MUST
topics:
