document: rfc-6140
kind: security-consideration
summary: The aggregate registration state of a SIP-PBX (a list of all phone numbers) is highly sensitive. SSP servers MUST use explicit, configurable whitelist policies controlling access to this information, with conservative defaults such as an empty access list or access restricted to the PBX itself.
section: "10"
topics:
    - sip
    - security
    - privacy
