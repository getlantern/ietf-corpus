document: rfc-9294
kind: security-consideration
summary: Tampering with application-specific link attribute information defined in this document may affect applications using it, including traffic engineering path computation. However, since advertisements are scoped to specific applications, the impact of tampering is similarly limited in scope and presents no significant additional risk beyond existing BGP-LS link attribute information in RFC 7752.
section: "8"
topics:
    - security
    - routing
    - bgp
