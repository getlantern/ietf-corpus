document: rfc-9820
kind: normative-requirement
summary: After successful EAP authentication and OSCORE key confirmation (Steps 7–8), all communication with the last CoAP-EAP resource MUST be protected with OSCORE. If application policy allows, the same OSCORE Security Context MAY be used to protect other resources between the same endpoints.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
