document: rfc-2460
kind: normative-requirement
summary: The Hop-by-Hop Options header, when present, must immediately follow the IPv6 header and is indicated by Next Header value zero. It must be examined and processed by every node along the delivery path, including source and destination.
section: "4"
rfc2119_level: MUST
topics:
    - ip
