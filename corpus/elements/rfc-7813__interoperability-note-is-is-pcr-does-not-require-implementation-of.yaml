document: rfc-7813
kind: interoperability-note
summary: IS-IS PCR does not require implementation of the full IS-IS SPB protocol, but only support of specific SPB sub-TLVs (SPB Link Metric, SPB Base VLAN-Identifiers, SPB Instance, SPBV MAC address, SPBM Service Identifier and Unicast Address). A bridge can support both IS-IS SPB and IS-IS PCR simultaneously via the same IS-IS entity on a per-instance basis.
section: "1"
topics:
    - routing
