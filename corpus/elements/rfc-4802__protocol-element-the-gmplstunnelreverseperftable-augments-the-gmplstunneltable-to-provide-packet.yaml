document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelReversePerfTable augments the gmplsTunnelTable to provide packet and byte performance counters for the reverse direction of bidirectional GMPLS tunnels. It includes 32-bit (gmplsTunnelReversePerfPackets, gmplsTunnelReversePerfBytes, gmplsTunnelReversePerfErrors) and 64-bit (gmplsTunnelReversePerfHCPackets, gmplsTunnelReversePerfHCBytes) counters. Objects return noSuchInstance for links that do not transport packets.
section: "5.6"
topics:
    - mpls
    - snmp
