document: rfc-9077
kind: normative-requirement
summary: It is RECOMMENDED that validating resolvers limit the maximum effective TTL value of negative responses (NSEC/NSEC3 RRs) to 3 hours (10800 seconds), consistent with RFC 2308's suggested maximum default negative cache TTL.
section: "3.4"
rfc2119_level: RECOMMENDED
topics:
