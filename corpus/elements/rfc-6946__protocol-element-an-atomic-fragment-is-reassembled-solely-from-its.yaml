document: rfc-6946
kind: protocol-element
summary: An atomic fragment is reassembled solely from its own contents. The Unfragmentable Part consists of all headers up to but not including the Fragment Header. The Next Header field of the last unfragmentable header is taken from the Fragment Header's Next Header field.
