document: rfc-8169
kind: wire-format
summary: 'RTM_SET sub-TLVs encode RTM-capable node addresses in one of three formats: IPv4 (Type=0x01, Length=8, 32-bit address), IPv6 (Type=0x02, Length=20, 128-bit address), or Unnumbered Interface (Type=0x03, Length=12, 32-bit Node ID + 32-bit Interface ID). All sub-TLV lengths MUST be multiples of 4 and at least 8.'
section: 4.4.1.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
