document: rfc-7916
kind: normative-requirement
summary: 'Bandwidth criteria SHOULD support at least two modes: Prune (exclude an LFA if its link speed is lower than the primary interface''s link speed) and Prefer (rank LFAs by link speed relative to the primary next-hop interface).'
