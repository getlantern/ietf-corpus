document: rfc-5670
kind: security-consideration
summary: All PCN-nodes are assumed to be trusted for truthful PCN-metering and -marking. A rogue PCN-interior-node could mark all packets (blocking all admissions) or mark no packets (allowing pre-congestion to go unreported), undermining the entire QoS protection mechanism.
section: "3"
topics:
    - security
    - qos
