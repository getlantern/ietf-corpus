document: rfc-4204
kind: state-machine
summary: 'The TE Link FSM defines four states: Down (no data links allocated), Init (data links allocated but not synchronized with neighbor; LinkSummary messages sent periodically), Up (operational; at least one control channel active), and Degraded (all control channels down but data links still allocated). Transitions are triggered by data channel, control channel, and LinkSummary ACK/NACK events.'
section: "11.2"
topics:
    - routing
