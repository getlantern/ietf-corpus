document: rfc-4380
kind: interoperability-note
summary: Teredo clients exchange IPv6 packets with 6to4 nodes (RFC 3056) and native IPv6 nodes through Teredo relays, which act as IPv6 routers advertising Teredo prefix reachability. Dual-stack hosts may implement a local relay to communicate directly with Teredo hosts without advertising a Teredo IPv6 address themselves.
section: "3.4"
topics:
