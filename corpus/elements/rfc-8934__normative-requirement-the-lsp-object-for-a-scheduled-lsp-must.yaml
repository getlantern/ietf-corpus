document: rfc-8934
kind: normative-requirement
summary: The LSP object for a scheduled LSP MUST NOT include both SCHED-LSP-ATTRIBUTE and SCHED-PD-LSP-ATTRIBUTE TLVs simultaneously; only one scheduling type (normal or periodical) is allowed.
section: "5.2"
rfc2119_level: MUST NOT
