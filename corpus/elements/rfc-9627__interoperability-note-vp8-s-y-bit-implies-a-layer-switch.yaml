document: rfc-9627
kind: interoperability-note
summary: VP8's Y bit implies a layer switch of all layers rather than just the layer in which it is sent, meaning not every layer switch point can be identified; this can cause some transmission inefficiency when LRR is used with VP8.
section: "4.2"
