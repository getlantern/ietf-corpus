document: rfc-4643
kind: normative-requirement
summary: A compliant implementation MUST NOT implement AUTHINFO PASS without also implementing support for TLS. Use of AUTHINFO PASS without an active strong encryption layer is deprecated. Any implementation SHOULD be configurable to disable it when TLS is not active, and this SHOULD be the default.
section: 2.3.2
rfc2119_level: MUST NOT
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
