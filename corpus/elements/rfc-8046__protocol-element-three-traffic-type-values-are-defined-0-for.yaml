kind: protocol-element
summary: 'Three Traffic Type values are defined: 0 for both HIP signaling and user data, 1 for signaling packets only, and 2 for data packets only. The P bit''s scope is restricted to the corresponding Traffic Type; the more specific Traffic Type rule takes precedence when conflicts arise.'
