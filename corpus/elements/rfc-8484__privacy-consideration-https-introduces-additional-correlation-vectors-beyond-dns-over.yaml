document: rfc-8484
kind: privacy-consideration
summary: HTTPS introduces additional correlation vectors beyond DNS-over-TLS, including HTTP cookies, User-Agent and Accept-Language headers, caching state, TLS session resumption tokens, and the mixing of DoH with other HTTP requests on the same connection.
section: "8.2"
topics:
