document: rfc-2426
kind: normative-requirement
summary: Predefined data type values MUST NOT be repeated in COMMA-separated value lists except within the N, NICKNAME, ADR, and CATEGORIES value types. Any SEMI-COLON character in a text value MUST be escaped with a BACKSLASH character.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
