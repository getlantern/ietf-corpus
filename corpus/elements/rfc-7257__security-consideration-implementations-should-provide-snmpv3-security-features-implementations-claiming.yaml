document: rfc-7257
kind: security-consideration
summary: Implementations SHOULD provide SNMPv3 security features; implementations claiming SNMPv3 compliance MUST include full USM support with AES cipher (RFC 3826). Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; SNMPv3 with cryptographic security is RECOMMENDED instead.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
