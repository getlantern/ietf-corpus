document: rfc-6026
kind: normative-requirement
summary: The INVITE server transaction MUST NOT generate 2xx retransmissions on its own; retransmissions are handled by the TU. Any 2xx retransmission passed from the TU to the transaction while in 'Accepted' MUST be forwarded to the transport layer.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - sip
