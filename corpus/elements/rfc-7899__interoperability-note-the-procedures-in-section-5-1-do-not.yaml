document: rfc-7899
kind: interoperability-note
summary: The procedures in Section 5.1 do not impact PIM refresh/expiration (Prune messages from S,G keep-alive timer expiry are not suppressed), the PIM Assert mechanism, Prune messages sent when the RPF neighbor changes, or Prune messages sent during RPT-to-SPT switching. These corner cases are explicitly exempted from damping.
section: "5.1"
topics:
