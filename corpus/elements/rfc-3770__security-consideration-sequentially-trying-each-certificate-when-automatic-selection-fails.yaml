document: rfc-3770
kind: security-consideration
summary: Sequentially trying each certificate when automatic selection fails discloses the SSIDs associated with each certificate, which might otherwise not be disclosed. This trial-and-error approach is therefore RECOMMENDED only when user selection is unavailable or impractical.
section: "5"
topics:
    - pkix
    - security
    - privacy
