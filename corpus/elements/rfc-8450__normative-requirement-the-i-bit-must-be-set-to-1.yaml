document: rfc-8450
kind: normative-requirement
summary: The I bit MUST be set to 1 if the packet contains coded picture parameters or slice data from a field in an interlaced frame, and 0 for progressive frame data. The F bit MUST be set to 1 for the second field of an interlaced frame, and 0 for the first field or any progressive frame data.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
