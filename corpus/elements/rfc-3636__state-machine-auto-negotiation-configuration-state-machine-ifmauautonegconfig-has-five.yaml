summary: 'Auto-negotiation configuration state machine (ifMauAutoNegConfig) has five states: other(1), configuring(2), complete(3), disabled(4), parallelDetectFail(5). The parallelDetectFail state maps to a parallel detection failure per IEEE 802.3 clause 28.2.3.1.'
