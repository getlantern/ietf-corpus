document: rfc-9493
kind: protocol-element
summary: 'The Account Identifier Format (name: "account") identifies a subject using an "acct" URI as defined in RFC 7565. It MUST contain a "uri" member whose value is the "acct" URI; the member is REQUIRED and MUST NOT be null or empty.'
