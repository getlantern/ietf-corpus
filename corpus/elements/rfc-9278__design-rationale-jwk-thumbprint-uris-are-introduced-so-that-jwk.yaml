document: rfc-9278
kind: design-rationale
summary: JWK Thumbprint URIs are introduced so that JWK Thumbprints can be used as key identifiers in contexts that require URIs (e.g., JWT claims, SIOPv2 subject identifiers). Wrapping the thumbprint in a URI also allows differentiation from other URI-based identifiers such as Decentralized Identifiers (DIDs).
