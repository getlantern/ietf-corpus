document: rfc-1382
kind: interoperability-note
summary: MIB-II ifInUcastPkts counts X.25 packets with a clear M-bit delivered to higher layers; ifOutUcastPkts counts such packets received from higher layers. ifInUnknownProtos counts packets with unknown circuit identifiers; ifInErrors counts packets received containing protocol errors.
