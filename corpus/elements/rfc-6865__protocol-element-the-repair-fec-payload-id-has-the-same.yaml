document: rfc-6865
kind: protocol-element
summary: The Repair FEC Payload ID has the same structure as the Source FEC Payload ID — (32-m)-bit SBN, m-bit ESI, 16-bit k — but the ESI identifies repair symbols (k <= ESI <= n-1). It is prepended to the repair symbol in the FEC repair packet.
section: 5.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
