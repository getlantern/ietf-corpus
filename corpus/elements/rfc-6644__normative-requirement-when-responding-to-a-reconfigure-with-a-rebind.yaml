document: rfc-6644
kind: normative-requirement
summary: When responding to a Reconfigure with a Rebind, the client creates and sends the Rebind exactly as specified in RFC 3315 Section 18.1.4, except it copies the Option Request option and any IA options from the Reconfigure message into the Rebind.
section: "5"
rfc2119_level: REQUIRED
