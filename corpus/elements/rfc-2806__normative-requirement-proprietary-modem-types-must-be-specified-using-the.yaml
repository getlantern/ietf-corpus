document: rfc-2806
kind: normative-requirement
summary: Proprietary modem types MUST be specified using the vendor naming tree 'vnd.x.y', where 'x' is the vendor name (sharing the MIME vendor name space from RFC 2048) and 'y' is the modem type. Submitting new modem types to the ietf-types list for review is strongly recommended.
section: 2.5.9
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
