document: rfc-8008
kind: design-rationale
summary: The FCI adopts the semantics of 'capabilities with footprint restrictions' rather than 'footprints with capability attributes'. This choice reflects that contractual agreements define basic coverage, and the FCI's primary role is to convey updates to capabilities and coverage relative to those agreements.
section: "3"
extracted_by: claude-sonnet-4-6
