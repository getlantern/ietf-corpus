document: rfc-4588
kind: interoperability-note
summary: For RTSP with session-multiplexing, the presentation SHOULD support aggregate control with a session-level RTSP URL, and the receiver SHOULD use aggregate control for the original and retransmission sessions together. Without this, two separate session-id values would prevent the sender from associating them.
section: "9.2"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
