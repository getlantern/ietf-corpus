document: rfc-8787
kind: design-rationale
summary: The primary intent of the 'loc-src' parameter is for use in emergency calling. Architectures such as 3GPP and ETSI prefer location from edge proxies or core-network nodes over UE-provided location, requiring a means to distinguish which node added each locationValue. RFC 6442 ordering alone does not identify the adding node.
section: "3"
topics:
    - sip
    - realtime
