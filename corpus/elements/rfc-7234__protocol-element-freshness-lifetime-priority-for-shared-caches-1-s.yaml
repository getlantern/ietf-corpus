document: rfc-7234
kind: protocol-element
summary: 'Freshness lifetime priority for shared caches: (1) s-maxage, (2) max-age, (3) Expires minus Date. For private caches s-maxage is skipped. If multiple values exist for a single directive (e.g., two Expires fields), the value is considered invalid and the response should be treated as stale.'
section: 4.2.1
topics:
