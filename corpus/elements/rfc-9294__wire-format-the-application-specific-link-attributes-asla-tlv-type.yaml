summary: The Application-Specific Link Attributes (ASLA) TLV (type 1122) contains a 1-octet SABM Length, 1-octet UDABM Length, 2-octet Reserved field (zero on tx, ignored on rx), variable-length Standard Application Identifier Bit Mask (0, 4, or 8 octets), variable-length User-Defined Application Identifier Bit Mask, and Link Attribute sub-TLVs.
