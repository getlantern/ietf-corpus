document: rfc-8334
kind: normative-requirement
summary: Upon receiving a valid <domain:create> command to create a Launch Application, the server MUST create an application object, assign an application identifier, set the pendingCreate status, and return the application identifier to the client with the <launch:applicationID> element.
section: "2.1"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
