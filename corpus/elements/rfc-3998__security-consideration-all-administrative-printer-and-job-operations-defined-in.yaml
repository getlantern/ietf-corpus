document: rfc-3998
kind: security-consideration
summary: All administrative Printer and Job operations defined in this document require the authenticated user to be an operator or administrator of the Printer object as defined in RFC 2911 sections 1 and 8.5. Job operations (Cancel-Current-Job, Suspend-Current-Job, Resume-Job) additionally permit the job owner. The security model is inherited from RFC 2911.
section: "16"
topics:
    - security
