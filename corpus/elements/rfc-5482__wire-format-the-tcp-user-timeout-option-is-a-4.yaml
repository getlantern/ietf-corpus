document: rfc-5482
kind: wire-format
summary: The TCP User Timeout Option is a 4-byte TCP option with Kind=28, Length=4, a 1-bit Granularity field (G), and a 15-bit unsigned integer User Timeout field. When G=1 the timeout is in minutes; when G=0 it is in seconds.
section: "3.3"
