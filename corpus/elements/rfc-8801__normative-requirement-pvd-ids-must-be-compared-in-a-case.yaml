document: rfc-8801
kind: normative-requirement
summary: PvD IDs MUST be compared in a case-insensitive manner as defined by RFC 4343. For example, 'pvd.example.com.' and 'PvD.Example.coM.' refer to the same PvD.
section: "3.4"
rfc2119_level: MUST
