document: rfc-2275
kind: protocol-element
summary: 'An access policy for a group in a given context is defined by three MIB views: read-view (for Get/GetNext/GetBulk), write-view (for Set), and notify-view (for Inform/SNMPv2-Trap). Empty viewName (zero-length) means no access is granted.'
