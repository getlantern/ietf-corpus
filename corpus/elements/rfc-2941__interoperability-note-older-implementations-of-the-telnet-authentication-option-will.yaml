document: rfc-2941
kind: interoperability-note
summary: Older implementations of the telnet authentication option will not understand the ENCRYPT_MASK and INI_CRED_FWD_MASK bits. An implementation offering these bits SHOULD also offer type pairs with these bits unset if backwards compatibility is required.
section: "2"
topics:
