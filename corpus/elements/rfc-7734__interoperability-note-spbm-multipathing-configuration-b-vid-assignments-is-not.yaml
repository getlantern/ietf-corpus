document: rfc-7734
kind: interoperability-note
summary: SPBM multipathing configuration (B-VID assignments) is not propagated across the IP/MPLS EVPN core, enabling independent multipathing designs in each SPBM island. I-SID-based load-balancing per RFC 7623 allows multiple gateways per B-VID across the EVPN.
section: "3"
topics:
