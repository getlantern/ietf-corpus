document: rfc-9885
kind: normative-requirement
summary: A router that receives an MP-TLV MUST accept all of the information in all of the parts. The order of arrival and placement of TLV parts in LSP fragments is irrelevant; parts MAY occur in a single LSP or in different LSPs.
section: "5"
rfc2119_level: MUST
topics:
    - routing
