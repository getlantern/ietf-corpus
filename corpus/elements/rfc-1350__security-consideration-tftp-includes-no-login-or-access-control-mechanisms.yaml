document: rfc-1350
kind: security-consideration
summary: TFTP includes no login or access control mechanisms. Care must be taken in rights granted to a TFTP server process; common practice restricts TFTP to files with public read access and disallows write access to prevent unauthorized access to the server's file system.
section: Security Considerations
topics:
    - security
    - udp
