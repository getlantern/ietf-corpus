document: rfc-7268
kind: protocol-element
summary: EAP-Server-Id (Type 176) carries a Server-Id generated by the EAP method as defined in RFC 5247 Appendix A. At most one instance MUST NOT appear in an Access-Request (NUL placeholder); one or more instances MAY appear in Access-Accept and Accounting-Request. The home RADIUS server SHOULD include it in the Access-Accept only if it was present in the Access-Request.
section: "2.4"
topics:
    - radius
    - security
