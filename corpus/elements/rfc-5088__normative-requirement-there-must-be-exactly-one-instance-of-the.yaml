document: rfc-5088
kind: normative-requirement
summary: There MUST be exactly one instance of the PATH-SCOPE sub-TLV within each PCED TLV. If it appears more than once, only the first occurrence is processed and any others MUST be ignored.
section: "4.2"
rfc2119_level: MUST
topics:
