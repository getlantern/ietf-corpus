document: rfc-6873
kind: wire-format
summary: The Index Pointers section occupies bytes 0–59 of each SIP CLF record. It contains the Version (1 byte), Record Length (6 bytes), and 13 hexadecimal-encoded 4-byte field pointers (CSeq, Response Status-Code, R-URI, Destination IP:port, Source IP:port, To URI, To Tag, From URI, From Tag, Call-Id, Server-Txn, Client-Txn, Optional Fields Start), packed without delimiters as a 52-character hex string.
section: "4.1"
topics:
    - sip
    - realtime
