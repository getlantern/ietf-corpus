document: rfc-8296
kind: design-rationale
summary: The non-MPLS BIER encapsulation uses a distinct Ethertype (0xAB37) rather than the MPLS Ethertype (0x8847) to allow non-MPLS BIER to coexist with non-BIER MPLS in the same deployment without BIFT-id values conflicting with MPLS label values.
section: 2.2.3
