document: rfc-6190
kind: design-rationale
summary: The PACSI NAL unit was introduced to allow MANEs to make forwarding and discarding decisions based on a single summary NAL unit rather than parsing codec-internal NAL unit structures, enabling scalable MANE operation without requiring deep knowledge of the SVC codec syntax.
