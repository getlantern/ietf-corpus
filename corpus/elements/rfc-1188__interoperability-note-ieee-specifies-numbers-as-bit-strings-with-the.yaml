document: rfc-1188
kind: interoperability-note
summary: IEEE specifies numbers as bit-strings with the least significant bit first (bit-wise little-endian), while Internet protocols are documented in bit-wise big-endian order. This can cause confusion; the appendix provides conversion tables for key values such as UI (IEEE 11000000 = Internet 3), SAP for SNAP (IEEE 01010101 = Internet 170), and others.
section: Appendix on Numbers
topics:
    - ip
