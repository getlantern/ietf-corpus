document: rfc-9294
kind: normative-requirement
summary: When IS-IS ASLA sub-TLV has the RSVP-TE application bit set, the link attributes MUST be encoded using respective BGP-LS top-level TLVs per RFC 7752, RFC 8571, and RFC 9104; similarly SRLG values with RSVP-TE bit MUST use the top-level BGP-LS SRLG TLV (1096).
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
