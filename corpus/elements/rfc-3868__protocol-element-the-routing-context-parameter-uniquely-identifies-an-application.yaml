document: rfc-3868
kind: protocol-element
summary: The Routing Context parameter uniquely identifies an Application Server from the perspective of an SGP or ASP. There is a 1:1 relationship between a Routing Context value and a Routing Key within an AS; it functions as an index into an AS Table containing the AS Routing Keys.
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
