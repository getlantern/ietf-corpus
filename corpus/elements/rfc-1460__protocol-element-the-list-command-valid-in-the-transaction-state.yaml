document: rfc-1460
kind: protocol-element
summary: The LIST command, valid in the TRANSACTION state, returns a scan listing. With a message-id argument it returns that message's id and size; without an argument it returns a multi-line scan listing for all non-deleted messages. The format requires message-id first, then size in octets.
