document: rfc-7812
kind: normative-requirement
summary: Routers that support MPLS and implement IP MRT fast reroute MUST support tunneling of IP traffic using MRT LDP Label Option 1A (topology-scoped FEC encoded using a single label), for hardware compatibility and ease of removing MRT-topology marking at area/level boundaries.
section: 6.3.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
