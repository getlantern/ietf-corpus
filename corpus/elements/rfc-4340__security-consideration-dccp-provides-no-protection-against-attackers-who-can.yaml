document: rfc-4340
kind: security-consideration
summary: DCCP provides no protection against attackers who can snoop on a connection in progress or guess valid sequence numbers. Applications requiring stronger security should use IPsec; application-level cryptography may also suffice.
section: "3.5"
topics:
    - security
    - udp
    - ipsec
