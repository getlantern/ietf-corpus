document: rfc-8476
kind: wire-format
summary: The Link MSD Sub-TLV has a 2-octet Type, 2-octet Length (variable), and a Value field of one or more 1-octet MSD-Type / 1-octet MSD-Value pairs. MSD-Value 0 represents inability to impose any MSD stack depth on that link as an outgoing interface.
