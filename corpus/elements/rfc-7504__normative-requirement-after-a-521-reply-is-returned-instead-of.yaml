document: rfc-7504
kind: normative-requirement
summary: After a 521 reply is returned instead of the usual 220, the SMTP session proceeds normally. If the client sends additional commands other than QUIT, the server MAY continue sending 521 reply codes or simply close the connection.
section: "3"
rfc2119_level: MAY
topics:
    - email
