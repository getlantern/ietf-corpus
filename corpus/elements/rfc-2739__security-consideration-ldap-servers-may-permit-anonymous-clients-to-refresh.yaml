document: rfc-2739
kind: security-consideration
summary: LDAP servers may permit anonymous clients to refresh entries they did not create, which has implications for data integrity. Servers may require clients to bind before issuing a RefreshRequest, impacting performance and scalability. vCard objects may have been created by an entity other than the one they represent, so recipients should verify the vCard source.
section: "4"
topics:
    - security
    - ldap
