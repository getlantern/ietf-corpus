document: rfc-2326
kind: security-consideration
summary: For unicast delivery, the client provides the destination address, which provides a degree of access control. For multicast, the server chooses the address for live/near-on-demand use, while client-specified multicast addresses are used only when joining a pre-established conference.
section: "1.6"
topics:
    - security
    - realtime
    - multicast
