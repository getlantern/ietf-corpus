document: rfc-1132
kind: normative-requirement
summary: Mapping of Internet Protocol addresses to 802.IPX addresses is performed using ARP, in the same fashion as with other IEEE 802.X physical addresses, with the distinction that the hardware address length is 10 bytes rather than 2 or 6.
section: Address Mappings
rfc2119_level: REQUIRED
