document: rfc-8684
kind: protocol-element
summary: The ADD_ADDR option advertises an additional address to the remote host and includes an Echo flag, the IP address, an Address ID, and an HMAC authenticating the advertisement. The receiver MUST echo it back (Echo-flag=1) to confirm receipt, enabling the sender to retransmit if no echo is received.
section: 3.4.1
topics:
    - multipath
    - tcp
    - nat
    - security
