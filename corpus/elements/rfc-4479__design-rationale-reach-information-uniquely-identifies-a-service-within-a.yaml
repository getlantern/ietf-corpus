document: rfc-4479
kind: design-rationale
summary: 'Reach information uniquely identifies a service within a presence document: two services in a document cannot share identical reach information, because a watcher would then have no way to choose between them. Reach information is a ''weak contract''—it indicates the presentity''s intent but does not guarantee connection to the described service.'
section: 3.3.2
topics:
    - sip
    - realtime
