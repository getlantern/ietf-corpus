document: rfc-6513
kind: wire-format
summary: For GRE encapsulation with a single PMSI per P-tunnel, C-multicast data are encapsulated in GRE with the outer IP destination set to the P-group address. For aggregate P-tunnels carrying multiple MVPNs, an upstream-assigned MPLS label is prepended before the GRE header to identify the MVPN.
section: 12.1.1
topics:
    - mpls
    - multicast
    - routing
