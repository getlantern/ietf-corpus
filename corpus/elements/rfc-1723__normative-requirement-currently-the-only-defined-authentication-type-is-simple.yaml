document: rfc-1723
kind: normative-requirement
summary: Currently, the only defined Authentication Type is simple password (type 2). The 16-octet password field must be left-justified and padded on the right with null bytes (0x00) if the password is under 16 octets.
section: "3.1"
rfc2119_level: MUST
topics:
