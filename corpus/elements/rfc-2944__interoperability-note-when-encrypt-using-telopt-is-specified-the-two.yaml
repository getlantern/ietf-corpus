document: rfc-2944
kind: interoperability-note
summary: When ENCRYPT_USING_TELOPT is specified, the two octets of the authentication-type-pair are appended to the session key K before the hash for the RESPONSE message M is computed. If no encryption flag is set, nothing is appended to K.
