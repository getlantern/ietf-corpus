document: rfc-5497
kind: protocol-element
summary: The INTERVAL_TIME Message TLV defines the maximum time before another message of the same type from the same originator should be received. The interval time MAY be hop-count-dependent, which is appropriate when messages are sent with different hop limits.
section: "7.1"
