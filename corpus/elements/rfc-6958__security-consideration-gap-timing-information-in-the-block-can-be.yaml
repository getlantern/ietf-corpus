document: rfc-6958
kind: security-consideration
summary: Gap timing information in the block can be used to infer when competing traffic was active on the path (e.g., a competing multimedia stream causing a loss burst). However, only the timing of loss — not its cause — is leaked, and this is considered a low risk.
