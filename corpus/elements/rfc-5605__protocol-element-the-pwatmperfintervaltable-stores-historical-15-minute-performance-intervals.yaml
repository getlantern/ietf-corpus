document: rfc-5605
kind: protocol-element
summary: The pwAtmPerfIntervalTable stores historical 15-minute performance intervals indexed by pwIndex and pwAtmPerfIntervalNumber (1..96, covering up to 24 hours). Interval 1 is the most recently completed 15-minute interval. Includes pwAtmPerfIntervalValidData and pwAtmPerfIntervalDuration to account for clock adjustments.
