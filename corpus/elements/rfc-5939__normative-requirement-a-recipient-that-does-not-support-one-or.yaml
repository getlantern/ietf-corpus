document: rfc-5939
kind: normative-requirement
summary: A recipient that does not support one or more required extensions listed in 'a=creq' MUST NOT perform SDP Capability Negotiation; it MUST instead proceed as if the capability negotiation attributes were absent. If the recipient is an answerer, it SHOULD include 'a=csup' in the answer listing the extensions it does support.
section: 3.3.2
rfc2119_level: MUST NOT
topics:
    - realtime
