document: rfc-2067
kind: normative-requirement
summary: The HIPPI-FP D1_AreaSize SHALL be 3 (64-bit words); no D1 fill is permitted. Leading short bursts are not permitted; any short burst must be the last burst of the packet. Nonzero values for D2_Offset are not permitted.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
