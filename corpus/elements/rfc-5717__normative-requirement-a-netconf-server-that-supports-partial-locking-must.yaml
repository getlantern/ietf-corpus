document: rfc-5717
kind: normative-requirement
summary: A NETCONF server that supports partial locking MUST be able to grant multiple simultaneous partial locks to a single NETCONF session. Nodes in overlapping protected areas MUST be protected until all overlapping locks are released.
section: 2.4.1
rfc2119_level: MUST
topics:
    - netconf
    - yang
