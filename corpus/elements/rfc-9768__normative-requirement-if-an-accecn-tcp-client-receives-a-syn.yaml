document: rfc-9768
kind: normative-requirement
summary: If an AccECN TCP Client receives a SYN/ACK with (AE,CWR,ECE)=(1,1,1) — indicating a broken server that reflects SYN flags — it MUST fall back to Not ECN mode for both its half-connections and continue with ECN disabled.
section: 3.1.2
rfc2119_level: MUST
topics:
    - tcp
    - congestion
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
