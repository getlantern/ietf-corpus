document: rfc-6757
kind: wire-format
summary: 'The Network-Identifier sub-option encodes: ANI Type=1, ANI Length (5–32 octets), a 1-bit E flag indicating UTF-8 encoding, 7 reserved bits, an 8-bit Net-Name Length (MUST NOT be zero), a variable-length Network Name, an 8-bit AP-Name Len, and a variable-length Access-Point Name in UTF-8.'
section: 3.1.1
