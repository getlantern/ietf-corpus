document: rfc-5103
kind: protocol-element
summary: 'biflowDirection (IE 239) is an unsigned8 identifier element that describes the direction assignment method used for a Biflow. Values are: 0x00 (arbitrary), 0x01 (initiator — Source is initiator), 0x02 (reverseInitiator — Destination is initiator), 0x03 (perimeter — Source is outside-perimeter endpoint). It MAY appear per-Flow-Record or via IPFIX Options scoped to an Observation Domain or Exporting Process.'
section: "6.3"
topics:
    - measurement
