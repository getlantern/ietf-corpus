document: rfc-6065
kind: normative-requirement
summary: The vacmAaaSessionID value MUST be unique among all currently open sessions of all of the SNMP engine's transport models; implementations where tmSessionID has a compatible syntax and is globally unique MAY use that value.
section: "8"
rfc2119_level: MUST
