document: rfc-9953
kind: normative-requirement
summary: The request URI hostname MUST be the Authentication Domain Name (ADN) when obtained via DNR, or the SVCB target name when obtained via a _dns query. For each element in the "docpath" SvcParam, a Uri-Path option MUST be added to the request.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
