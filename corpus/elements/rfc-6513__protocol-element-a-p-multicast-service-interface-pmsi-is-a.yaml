document: rfc-6513
kind: protocol-element
summary: A P-Multicast Service Interface (PMSI) is a conceptual overlay on the provider network enabling a PE in an MVPN to deliver packets to some or all other PEs in that MVPN, with each receiver able to identify the originating MVPN. PMSIs are instantiated by P-tunnels using PIM trees, mLDP LSPs, RSVP-TE P2MP LSPs, or unicast meshes.
section: "3.2"
topics:
    - mpls
    - multicast
    - routing
