document: rfc-9322
kind: normative-requirement
summary: An IOAM encapsulating node that supports the Loopback flag MUST support the ability to incorporate the Loopback flag selectively into a subset of forwarded packets, to prevent excessive looped-back traffic from overloading the network.
section: 4.1.1
rfc2119_level: MUST
