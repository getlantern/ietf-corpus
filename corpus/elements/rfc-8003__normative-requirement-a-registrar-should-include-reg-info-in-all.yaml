document: rfc-8003
kind: normative-requirement
summary: A registrar SHOULD include REG_INFO in all R1 packets to announce capabilities; if temporarily unable to provide services, it SHOULD include an empty REG_INFO with no service types listed.
section: "3.1"
rfc2119_level: SHOULD
