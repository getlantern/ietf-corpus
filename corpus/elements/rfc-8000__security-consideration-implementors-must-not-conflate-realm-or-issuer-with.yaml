document: rfc-8000
kind: security-consideration
summary: Implementors must not conflate 'realm' (or 'issuer') with 'NFSv4 Domain'; they are distinct concepts. Configuration and lookup protocols (such as LDAP) are generally required to evaluate a user principal's authorization context.
