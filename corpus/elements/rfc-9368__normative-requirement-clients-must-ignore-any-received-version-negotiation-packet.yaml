document: rfc-9368
kind: normative-requirement
summary: Clients MUST ignore any received Version Negotiation packet that contains the Original Version. A client reacting to a Version Negotiation packet MUST also ignore further Version Negotiation packets received in response to the resulting connection attempt.
section: "4"
rfc2119_level: MUST
topics:
    - quic
    - security
