document: rfc-1213
kind: security-consideration
summary: MIB-II exposes several read-write objects (ipForwarding, ipDefaultTTL, routing table entries, tcpConnState) that can alter network behavior; the SNMP community-string security model provides only weak authentication, and implementors must recognize the risk of unauthorized manipulation of these control objects.
section: "9"
topics:
