document: rfc-6749
kind: interoperability-note
summary: OAuth 2.0 is not backward compatible with OAuth 1.0 (RFC 5849) and shares very few implementation details with it. The two versions may coexist on the network; implementers familiar with OAuth 1.0 should treat this specification as entirely new.
section: "1"
topics:
    - oauth
