summary: 'IANA created a registry for ''LFB Class Names and LFB Class Identifiers'' (Section 8.1). This document registers 13 LFB classes: EtherPHYCop, EtherMACIn, EtherClassifier, EtherEncap, EtherMACOut, IPv4Validator, IPv6Validator, IPv4UcastLPM, IPv4NextHop, IPv6UcastLPM, IPv6NextHop, RedirectIn, RedirectOut, BasicMetadataDispatch, and GenericScheduler.'
