document: rfc-6072
kind: security-consideration
summary: TLS clients MUST check that the SubjectAltName of the server certificate exactly matches the intended server name. Any intermediary in the TLS path can substitute an attacker-controlled certificate, exposing private key material or Digest credentials.
section: "10"
topics:
    - tls
    - security
