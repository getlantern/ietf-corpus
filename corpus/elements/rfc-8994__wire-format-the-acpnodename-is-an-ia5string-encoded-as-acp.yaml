document: rfc-8994
kind: wire-format
summary: The AcpNodeName is an IA5String encoded as 'acp-address@acp-domain-name' where acp-address is 32 hexadecimal digits (128-bit IPv6 address) or '0', optionally preceded by a '+rsub' routing-subdomain component in the local-part. It is carried in the X.509 SubjectAlternativeName otherName extension with OID id-on-AcpNodeName (1.3.6.1.5.5.7.8.10).
section: 6.2.2
topics:
    - pkix
    - ip
