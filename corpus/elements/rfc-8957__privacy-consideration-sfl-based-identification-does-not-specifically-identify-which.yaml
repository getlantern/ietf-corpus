document: rfc-8957
kind: privacy-consideration
summary: SFL-based identification does not specifically identify which node originated the packet unless the attacker can inspect the network at the point of ingress or inspect control protocol packets. Minimizing the scope of the identity indication reduces observability of flow characteristics.
