document: rfc-4976
kind: normative-requirement
summary: A client MUST authenticate itself to each of its relays using HTTP Digest authentication. The client MUST be able to form a connection to the first relay and send an AUTH command to get a URI for use in the To-Path header.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
