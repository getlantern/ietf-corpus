document: rfc-5482
kind: normative-requirement
summary: A connection that has enabled UTO options SHOULD include a UTO option in the first packet that does not have the SYN flag set, minimizing state kept for non-synchronized connections and supporting SYN-cookie deployments.
section: "3"
rfc2119_level: SHOULD
