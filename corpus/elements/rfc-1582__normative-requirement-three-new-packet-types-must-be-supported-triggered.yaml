document: rfc-1582
kind: normative-requirement
summary: 'Three new packet types MUST be supported: TRIGGERED REQUEST (asks peer for full routing database), TRIGGERED RESPONSE (full database excluding split-horizon entries), and TRIGGERED ACKNOWLEDGEMENT (per-fragment ACK for every triggered response received).'
section: "2.7"
rfc2119_level: MUST
topics:
    - routing
