document: rfc-9922
kind: protocol-element
summary: 'The ''icalendar-recurrence'' grouping extends recurrence-time-zone-with-periods with iCalendar-compatible filter components: bysecond, byminute, byhour, byday (with direction for monthly/yearly nth-occurrence), bymonthday, byyearday, byyearweek, byyearmonth, bysetpos, workweek-start, and exception-dates. The final recurrence set excludes dates listed in exception-dates.'
section: 3.3.8
topics:
