document: rfc-8946
kind: normative-requirement
summary: All "div" PASSporTs MUST contain a "div" claim indicating the previous destination. A new PASSporT with a "div" claim MUST NOT be produced if the canonical form of the "dest" identifier has not changed due to retargeting.
section: "3"
rfc2119_level: MUST
topics:
