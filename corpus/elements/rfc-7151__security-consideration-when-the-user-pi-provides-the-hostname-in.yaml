document: rfc-7151
kind: security-consideration
summary: When the user-PI provides the hostname in the TLS SNI 'server_name' extension, the server-PI MUST verify that the name in the HOST command matches the 'server_name' extension value to prevent routing mismatches.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - tls
