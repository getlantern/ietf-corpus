document: rfc-6652
kind: wire-format
summary: 'The ''ra='' modifier uses the ABNF production ''spf-report-tag = "ra=" qp-section'', where the value is a qp-section (quoted-printable encoded local-part per MIME). The ''rp='' modifier uses ''spf-rp-tag = "rp=" 1*12DIGIT "/" 1*12DIGIT''. The ''rr='' modifier uses ''spf-rr-tag = "rr=" spf-rr-type *( ":" spf-rr-type )'' where spf-rr-type is one of: all, e, f, s, n.'
