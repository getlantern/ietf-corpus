document: rfc-8883
kind: normative-requirement
summary: A host MAY modify its usage of protocol headers in subsequent packets to avoid repeated occurrences of the same processing-limit error. A host system SHOULD take appropriate action if it is creating packets with extension headers on behalf of the application.
section: "4.2"
rfc2119_level: MAY
topics:
    - ip
