document: rfc-4401
kind: normative-requirement
summary: When successfully applied to the same inputs by an initiator and acceptor using the same security context, GSS_Pseudo_random() MUST produce the same results for both, even if called multiple times (as long as the context is not expired).
section: "2"
rfc2119_level: MUST
topics:
