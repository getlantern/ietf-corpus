document: rfc-8198
kind: normative-requirement
summary: It is RECOMMENDED that validating resolvers limit the maximum effective TTL value of negative responses (NSEC/NSEC3 RRs) to 10800 seconds (3 hours), consistent with RFC 2308's suggested maximum default negative cache TTL.
section: "5.4"
rfc2119_level: RECOMMENDED
