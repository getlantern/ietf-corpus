document: rfc-5936
kind: wire-format
summary: AXFR uses the standard DNS message format with a 16-bit ID field, QR/OPCODE/flag bits (AA, TC, RD, RA, Z, AD, CD), a 4-bit RCODE, and four 16-bit section count fields (QDCOUNT, ANCOUNT, NSCOUNT, ARCOUNT). Over TCP, messages are prefixed with a 2-octet unsigned length field, giving a maximum message size of 65535 octets.
section: "2"
