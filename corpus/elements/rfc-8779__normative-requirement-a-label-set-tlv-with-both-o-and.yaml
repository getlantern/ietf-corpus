document: rfc-8779
kind: normative-requirement
summary: A LABEL-SET TLV with both O and L bits set MUST trigger a PCErr with Error-Type=10 and Error-value=29. A LABEL-SET TLV with O bit set and Action field not set to 0 (Inclusive List) or containing more than one subchannel MUST trigger Error-value=30.
section: 2.5.2.5
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
