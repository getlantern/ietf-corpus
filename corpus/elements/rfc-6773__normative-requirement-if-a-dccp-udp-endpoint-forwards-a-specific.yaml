document: rfc-6773
kind: normative-requirement
summary: If a DCCP-UDP endpoint forwards a specific network-layer option to the DCCP module, it MUST also forward all subsequent packets with that option. Consistent forwarding is essential for correct operation of many end-to-end options.
section: "3.4"
rfc2119_level: MUST
topics:
    - udp
    - nat
