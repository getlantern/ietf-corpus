document: rfc-8661
kind: protocol-element
summary: 'The SRMS preference value is an unsigned 8-bit integer: 0 is reserved and indicates advertisements from that node MUST NOT be used; values 1–255 represent preference with 255 being most preferred. Nodes that do not advertise a preference value are assigned a default preference of 128.'
section: 3.2.3
