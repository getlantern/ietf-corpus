summary: A Single NAL Unit Packet consists of a 2-byte PayloadHdr (same field layout as the NAL unit header), a conditional 16-bit DONL field in network byte order (present only when sprop-max-don-diff > 0), followed by the NAL unit payload data (the NAL unit excluding its header).
