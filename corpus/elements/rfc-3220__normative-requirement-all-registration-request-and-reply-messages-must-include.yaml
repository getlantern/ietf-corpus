document: rfc-3220
kind: normative-requirement
summary: All Registration Request and Reply messages MUST include an authorization-enabling extension (e.g., Mobile-Home Authentication Extension). All implementations of Mobile IP MUST implement HMAC-MD5 as the default authentication algorithm, and MUST be able to associate any SPI with any supported authentication algorithm.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
