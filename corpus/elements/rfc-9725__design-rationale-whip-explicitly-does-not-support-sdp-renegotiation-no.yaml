document: rfc-9725
kind: design-rationale
summary: 'WHIP explicitly does not support SDP renegotiation: no modifications to ''m='' sections are permitted after the initial offer/answer exchange. Only ICE-related information can be updated via HTTP PATCH. This simplification lowers implementation complexity for both hardware encoders and media servers.'
