document: rfc-4120
kind: normative-requirement
summary: Applications MUST make a separate authorization decision after authentication based on the authenticated name, requested operation, and local access control information. Kerberos ticket issuance alone does not authorize use of a service.
section: 3.2.3
rfc2119_level: MUST
topics:
    - security
