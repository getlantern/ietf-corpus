document: rfc-2741
kind: wire-format
summary: A VarBind is encoded as a 2-byte v.type field (plus 2 reserved bytes), an Object Identifier v.name, and type-dependent v.data. Integer/Counter32/Gauge32/TimeTicks are 4 bytes; Counter64 is 8 bytes; Null, noSuchObject, noSuchInstance, and endOfMibView carry no data bytes.
