document: rfc-9575
kind: normative-requirement
summary: Observers MUST validate all signatures received, which requires the Host Identity (HI) to correspond to a DET. HIs MAY be retrieved from a local cache if present; the cache is pre-configured with well-known HIs and further populated by received Broadcast Endorsements and DNS lookups.
section: 3.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
