document: rfc-7599
kind: normative-requirement
summary: MAP-T CEs and BRs MUST follow ICMP/ICMPv6 translation per RFC 6145. When receiving IPv4 ICMP messages, the MAP-T CE MUST rewrite the ICMP ID field to a port value derived from the CE's Port Set ID, to identify the sending host in the absence of separate source/destination port fields.
section: "9"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - ip
