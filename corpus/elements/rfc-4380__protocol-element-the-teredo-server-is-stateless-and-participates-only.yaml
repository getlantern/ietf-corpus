document: rfc-4380
kind: protocol-element
summary: The Teredo server is stateless and participates only in qualification (RS/RA exchange), bubble relay, and ICMPv6 echo relay. The server never relays actual data traffic; data flows directly between clients and through relays selected by the destination.
