document: rfc-4266
kind: protocol-element
summary: The gopher URI scheme takes the form gopher://<host>:<port>/<gopher-path>, where <gopher-path> consists of a single-character gophertype followed by an optional selector, search string, and Gopher+ string separated by encoded tabs (%09). If the port is omitted, it defaults to 70.
section: "2.1"
