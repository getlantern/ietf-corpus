document: rfc-6926
kind: wire-format
summary: The base-time option (code 152) is a 4-octet unsigned integer in network byte order representing the absolute time (seconds since 1970-01-01) at which the server created the reply message; all other time-based options in the same message are relative to this value.
section: 6.2.3
