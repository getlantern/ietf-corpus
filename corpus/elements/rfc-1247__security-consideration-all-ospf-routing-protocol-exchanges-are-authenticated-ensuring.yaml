document: rfc-1247
kind: security-consideration
summary: All OSPF routing protocol exchanges are authenticated, ensuring only trusted routers participate in AS routing. Authentication type is configured per area (schemes defined in Appendix E), allowing stricter authentication in some areas than others. The 64-bit authentication field is excluded from the packet checksum.
