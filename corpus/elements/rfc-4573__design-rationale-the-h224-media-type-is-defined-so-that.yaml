document: rfc-4573
kind: design-rationale
summary: The H224 media type is defined so that signaling gateways between H.323 and SDP-based systems can support far-end camera control end-to-end without any protocol translation in the middle, since RTP packets in H.323 annex Q already carry H.224 frames.
