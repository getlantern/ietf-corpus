document: rfc-9514
kind: protocol-element
summary: 'The SRv6 BGP EPE SID Flags byte defines three bits: B-Flag (Backup, eligible for FRR), S-Flag (Set, SID refers to a BGP Peer Set), and P-Flag (Persistent, value survives restart/flap). These flags are shared by both the SRv6 BGP PeerNode SID TLV and the SRv6 End.X SID TLV when advertising BGP Peer Adjacency SIDs.'
section: "7.2"
topics:
    - routing
    - bgp
    - ip
