document: rfc-6450
kind: normative-requirement
summary: The Version option (type 0) MUST always be included in all messages; its length MUST be 1 and the value MUST be set to 2 for the current protocol version. A server receiving a message with a version other than 2 SHOULD send a Server Response with version set to 2.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
