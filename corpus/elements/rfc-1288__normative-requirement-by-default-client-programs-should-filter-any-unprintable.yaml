document: rfc-1288
kind: normative-requirement
summary: By default, client programs SHOULD filter any unprintable data from RUIP responses, retaining only printable 7-bit characters (ASCII 32–126), tabs (ASCII 9), and CRLFs, to protect against terminal escape code attacks and window-name hijacking.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - security
