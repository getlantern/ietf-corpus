document: rfc-7461
kind: design-rationale
summary: Energy Object identity information (writable MIB objects) should be persisted across device reloads in static environments (e.g., a switch monitoring fixed PoE phones) to avoid repeated network discovery, but persistence may not be valuable in dynamic environments (e.g., a wireless AP monitoring mobile PCs).
section: "4.5"
topics:
