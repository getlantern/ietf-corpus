document: rfc-8335
kind: normative-requirement
summary: When a node receives an ICMP Extended Echo Request and has not explicitly enabled ICMP Extended Echo functionality, or the source address is not authorized, or the source/destination address conditions are not met, the node MUST silently discard the incoming message.
section: "4"
rfc2119_level: MUST
topics:
