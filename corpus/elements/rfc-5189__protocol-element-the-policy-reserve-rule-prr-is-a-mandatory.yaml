document: rfc-5189
kind: protocol-element
summary: The Policy Reserve Rule (PRR) is a mandatory configuration transaction that reserves an IP address, or IP address plus consecutive port range, on one or both sides of the middlebox without yet affecting packet processing. On a pure firewall the reservation succeeds with empty values; on a traditional NAT only an external address (A2) is reserved; on a twice-NAT both A1 and A2 are reserved.
section: 2.3.8
topics:
    - nat
