document: rfc-5272
kind: normative-requirement
summary: When AuthenticatedData is used for a Full PKI Request, the Password Recipient Info option of RecipientInfo MUST be used, a randomly generated key MUST be used to compute the MAC, and the key derivation input MUST be a concatenation of the identifier (encoded as UTF8) and the shared-secret.
section: "3.2"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
