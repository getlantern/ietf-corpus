document: rfc-6738
kind: security-consideration
summary: To mitigate exposure of a long-lived PSK, the HAAA is expected to derive and return a session-specific SK rather than the PSK itself. Use of short-lived secrets based on prior network access authentication and the inclusion of nonces is strongly recommended to ensure key freshness and limit key scope.
section: "10"
