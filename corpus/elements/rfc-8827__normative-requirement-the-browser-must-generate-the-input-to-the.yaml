document: rfc-8827
kind: normative-requirement
summary: The browser MUST generate the input to the IdP assertion process and display verification results to the user in a way that cannot be imitated by the calling site. The IdP proxy on the sender's side MUST ensure it is running in the IdP's origin prior to issuing assertions.
section: 7, 9.4.1
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
