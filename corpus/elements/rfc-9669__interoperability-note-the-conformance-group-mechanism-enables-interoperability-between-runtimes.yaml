document: rfc-9669
kind: interoperability-note
summary: 'The conformance group mechanism enables interoperability between runtimes and compilers: a runtime advertises supported conformance groups (e.g., base32, base64, atomic64), and compilers only emit instructions within those groups. Capability discovery can be manual or automated via tooling.'
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
