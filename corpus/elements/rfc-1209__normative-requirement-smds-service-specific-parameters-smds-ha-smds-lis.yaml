document: rfc-1209
kind: normative-requirement
summary: SMDS service-specific parameters (smds$ha, smds$lis-ga, smds$arp-req) MUST be implemented in each IP station and MUST be user configurable, as values are determined at SMDS subscription time and differ per LIS.
section: Logical IP Subnetwork Configuration
rfc2119_level: MUST
