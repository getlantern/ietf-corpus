document: rfc-9595
kind: design-rationale
summary: If the YANG data type changes in a new revision of a published module such that the resulting CBOR encoding changes, implementations will be aided significantly if a new SID is assigned. SID reassignment on type change is not required but strongly recommended for CBOR compatibility.
