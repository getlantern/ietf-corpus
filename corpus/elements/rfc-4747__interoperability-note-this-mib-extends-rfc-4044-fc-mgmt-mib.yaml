document: rfc-4747
kind: interoperability-note
summary: This MIB extends RFC 4044 (FC-MGMT-MIB) by augmenting fcmSwitchTable and fcmPortEntry. The t11vfVirtualSwitchTable and t11vfPortTable use AUGMENTS clauses, so creating or deleting a row in t11vfVirtualSwitchTable simultaneously creates or deletes the corresponding row in fcmSwitchTable.
section: "5.2"
topics:
