document: rfc-8490
kind: registry
summary: 'This document creates the IANA ''DSO Type Codes'' registry for 16-bit DSO-TYPE values used in DSO TLVs. Initial entries include the three mandatory base TLVs: Keepalive (0x0001), Retry Delay (0x0002), and Encryption Padding (0x0003). New entries require IETF Review.'
section: "10.3"
