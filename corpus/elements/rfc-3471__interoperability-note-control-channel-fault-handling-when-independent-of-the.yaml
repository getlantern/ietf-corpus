document: rfc-3471
kind: interoperability-note
summary: Control channel fault handling when independent of the data channel requires protocol-specific mechanisms (defined in RFC 3473 and RFC 3472) to handle both neighbor communication interruptions (with state resynchronization on restore) and node control-plane restarts (requiring label mapping preservation). These cases only apply when there are mechanisms to detect data channel failures independently.
section: "9.2"
topics:
    - mpls
    - routing
