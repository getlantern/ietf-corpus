document: rfc-6923
kind: design-rationale
summary: RFC 6923 augments RFC 6370's AS-number-based (IP/MPLS) identifiers with ITU-T ICC-based equivalents. Both identifier families are not intended for simultaneous use within the same domain; operators choose one convention.
