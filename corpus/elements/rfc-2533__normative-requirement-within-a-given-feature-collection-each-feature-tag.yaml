document: rfc-2533
kind: normative-requirement
summary: Within a given feature collection, each feature tag may have only one value. A feature predicate that requires the same tag to equal two different values within a single conjunction is always unsatisfiable (evaluates to FALSE) and the conjunction is discarded.
section: "7.2"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
