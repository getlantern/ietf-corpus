document: rfc-5749
kind: interoperability-note
summary: For ERP implicit bootstrapping, the local ER server (acting as KRS) includes a KDE-Request in the AAA packet encapsulating the first EAP-Response message, and the home AAA server (acting as KDS) includes the KDE-Response in the AAA message carrying EAP-Success. A AAA User-Name attribute serves as the PID.
