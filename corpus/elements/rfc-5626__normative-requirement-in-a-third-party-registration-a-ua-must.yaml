document: rfc-5626
kind: normative-requirement
summary: In a third-party registration, a UA MUST NOT include a 'reg-id' header field parameter if the registering UA is not the same instance as the UA referred to by the target Contact header field. A UAC also MUST NOT include an instance-id feature tag or reg-id parameter in a request to un-register all Contacts.
section: 4.2.3
rfc2119_level: MUST NOT
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
