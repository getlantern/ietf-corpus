document: rfc-9802
kind: interoperability-note
summary: Conventional backup and restore strategies for stateless signature schemes (e.g., duplicating private key material or storing a copy for device recovery) will lead to OTS key reuse with high probability when applied to stateful HBS schemes, because correct state management cannot be guaranteed across independent copies. SP 800-208 Section 7 and draft-wiggers-hbs-state describe compliant availability strategies.
section: "11"
topics:
