document: rfc-5092
kind: normative-requirement
summary: Unsafe or reserved characters (such as space, ';', '?') present in <enc-mailbox> or <enc-search> MUST be percent-encoded as described in RFC 3986. Synchronizing literals are not allowed in enc-search content.
section: "5"
rfc2119_level: MUST
