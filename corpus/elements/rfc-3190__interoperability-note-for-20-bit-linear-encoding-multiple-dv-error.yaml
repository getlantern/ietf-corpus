document: rfc-3190
kind: interoperability-note
summary: For 20-bit linear encoding, multiple DV error code values (80000h through 8000Fh) are mapped to 80010h to allow 16-bit systems to play 20-bit audio data by ignoring the four least significant bits. No error code translation is specified for 24-bit linear because that encoding is not in the DV specification.
section: "6"
