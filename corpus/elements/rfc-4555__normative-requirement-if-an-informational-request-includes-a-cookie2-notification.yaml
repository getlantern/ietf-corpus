document: rfc-4555
kind: normative-requirement
summary: If an INFORMATIONAL request includes a COOKIE2 notification, the recipient MUST copy the notification as-is to the response. When processing the response, the original sender MUST verify that the value matches; if the values do not match, the IKE_SA MUST be closed.
section: "3.7"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
