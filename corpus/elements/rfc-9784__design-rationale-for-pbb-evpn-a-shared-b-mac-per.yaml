document: rfc-9784
kind: design-rationale
summary: For PBB-EVPN, a shared B-MAC per PE is recommended for single-homed vESes (minimizing B-MAC table size), a shared B-MAC per PE per ENNI for Single-Active vESes (scoping failure propagation to the ENNI), and a dedicated B-MAC per vES for All-Active vESes (required for aliasing and split-horizon). A single B-MAC per vES per PE is an alternative allowed for Single-Active scenarios.
section: "4"
topics:
    - mpls
    - routing
