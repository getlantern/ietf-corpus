document: rfc-8695
kind: security-consideration
summary: The mandatory-to-implement secure transport for NETCONF access is SSH (RFC 6242), and for RESTCONF access is TLS (RFC 8446). Access control is provided by NACM (RFC 8341), which restricts NETCONF/RESTCONF users to preconfigured subsets of operations and content.
section: "6"
topics:
