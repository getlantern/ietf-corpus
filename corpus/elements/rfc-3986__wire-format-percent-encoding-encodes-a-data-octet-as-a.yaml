document: rfc-3986
kind: wire-format
summary: 'Percent-encoding encodes a data octet as a triplet: pct-encoded = "%" HEXDIG HEXDIG. Uppercase hex digits A–F are equivalent to lowercase a–f; URIs differing only in hex case of percent-encoded octets are equivalent.'
section: "2.1"
