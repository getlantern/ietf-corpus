document: rfc-3986
kind: wire-format
summary: 'Percent-encoding encodes a data octet as a character triplet: the percent character "%" followed by two uppercase hexadecimal digits representing the octet''s numeric value (e.g., "%20" for space). The ABNF rule is: pct-encoded = "%" HEXDIG HEXDIG.'
section: "2.1"
