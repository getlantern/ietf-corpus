document: rfc-7217
kind: normative-requirement
summary: Hosts SHOULD try at least IDGEN_RETRIES tentative addresses if DAD fails for successive generated addresses. In the event a DAD conflict cannot be solved, hosts MUST NOT automatically fall back to employing other algorithms for generating Interface Identifiers.
