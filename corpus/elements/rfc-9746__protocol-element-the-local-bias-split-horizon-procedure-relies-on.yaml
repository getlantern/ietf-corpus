document: rfc-9746
kind: protocol-element
summary: The local-bias split-horizon procedure relies on the source IP address of the tunnel header to identify the ingress NVE. The egress NVE filters BUM frames on all local interfaces connected to ESs shared with the ingress NVE, while the ingress NVE locally replicates to all directly attached ESs regardless of DF election state.
section: "1.2"
topics:
    - routing
    - mpls
