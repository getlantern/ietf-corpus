document: rfc-1662
kind: normative-requirement
summary: Frames that are too short (fewer than 4 octets with 16-bit FCS), that end with a Control Escape octet followed immediately by a closing Flag Sequence, or where octet-framing is violated, are silently discarded and not counted as FCS errors.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
