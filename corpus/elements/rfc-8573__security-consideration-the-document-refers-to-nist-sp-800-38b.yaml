document: rfc-8573
kind: security-consideration
summary: The document refers to NIST SP 800-38B for CMAC mode authentication recommendations and to RFC 4493 Security Considerations for security guarantees of AES-CMAC. MD5-based authentication is deprecated as it is not a secure MAC per analysis in [BCK] and RFC 6151.
