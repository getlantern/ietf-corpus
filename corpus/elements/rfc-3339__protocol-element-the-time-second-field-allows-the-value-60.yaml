document: rfc-3339
kind: protocol-element
summary: The time-second field allows the value '60' at the end of months in which a leap second occurs (historically end of June or December, e.g. XXXX-06-30T23:59:60Z). A subtracted leap second reduces the maximum to '58'.
section: "5.7"
