document: rfc-1583
kind: protocol-element
summary: OSPF attaches a network mask to every advertised route, enabling variable-length subnetting (VLSM). A packet is always routed to the longest (most specific) matching prefix; host routes use mask 0xffffffff. This allows a single class A/B/C network to be subdivided into variable-sized subnets.
section: "3.5"
topics:
    - routing
    - ip
