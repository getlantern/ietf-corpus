document: rfc-4867
kind: normative-requirement
summary: The single-channel AMR storage file magic number MUST be the ASCII string "#!AMR\n" (0x2321414d520a). The single-channel AMR-WB magic number MUST be "#!AMR-WB\n" (0x2321414d522d57420a). The "\n" MUST be included in the comparison.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
