document: rfc-8861
kind: normative-requirement
summary: Every non-reporting source in an RTCP Reporting Group MUST include an RTCP RGRS packet in every compound RTCP packet in which it sends an RR or SR (unless Reduced-Size RTCP is in use). Each RGRS packet MUST contain at least one reporting source SSRC.
section: 3.2.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
