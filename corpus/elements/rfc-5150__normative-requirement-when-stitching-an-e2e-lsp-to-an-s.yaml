document: rfc-5150
kind: normative-requirement
summary: When stitching an e2e LSP to an S-LSP, the switching type in the Generalized Label Request of the e2e LSP MUST be equal to the switching type of the S-LSP. The GMPLS node MUST use RFC 4206 signaling procedures to send the Path message to the S-LSP end point, identifying the S-LSP in the RSVP_HOP.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
