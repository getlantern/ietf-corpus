document: rfc-6616
kind: normative-requirement
summary: RPs MUST NOT automatically retry on failed authentication attempts. OPs SHOULD only redirect to RPs with the same domain component of the base URI. Applications SHOULD NOT invoke browsers to communicate with unconfigured OPs.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - security
    - oauth
