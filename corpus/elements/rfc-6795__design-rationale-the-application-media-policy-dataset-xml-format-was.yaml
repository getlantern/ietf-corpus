document: rfc-6795
kind: design-rationale
summary: The "application/media-policy-dataset+xml" format was chosen over direct SDP for SUBSCRIBE bodies because it is more flexible, supports information not expressible in SDP (e.g., target URI), allows encoding both local and remote session descriptions in a single document, and aligns the formats for session-specific and session-independent policies.
section: "3.3"
topics:
    - sip
