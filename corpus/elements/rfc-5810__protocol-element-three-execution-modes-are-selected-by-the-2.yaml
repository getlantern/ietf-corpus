document: rfc-5810
kind: protocol-element
summary: 'Three execution modes are selected by the 2-bit EM flag: execute-all-or-none (0b01, rollback on any failure), execute-until-failure (0b10, stop on first failure, no rollback), and continue-execute-on-failure (0b11, process all regardless of failures). Value 0b00 is reserved.'
section: 4.3.1.1
topics:
