document: rfc-8995
kind: wire-format
summary: The MASA URI PKIX extension is encoded as an IA5String identified by OID id-pe-masa-url (id-pe 32). Typically only the 'authority' component is stored; the registrar infers scheme 'https://' and path '/.well-known/brski' when no slash character appears in the value. A complete URI including scheme, authority, and path MAY be stored for diagnostics.
section: 2.3.2
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
