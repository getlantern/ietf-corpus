document: rfc-3097
kind: interoperability-note
summary: Two nodes whose Integrity implementations conform to this modification will interoperate using Message Type 12 for Bundle messages and types 25/26 for the Integrity handshake. A non-conformant Integrity implementation will not interoperate with a conformant one, though two non-conformant implementations can still interoperate as before.
section: "3"
