document: rfc-4363
kind: protocol-element
summary: dot1qLearningConstraintsTable manages VLAN learning constraints specifying whether pairs of VLANs share a Filtering Database (Shared VLAN Learning) or use independent databases (Independent VLAN Learning), controlled per constraint set. dot1qConstraintSetDefault and dot1qConstraintTypeDefault give system-wide defaults.
