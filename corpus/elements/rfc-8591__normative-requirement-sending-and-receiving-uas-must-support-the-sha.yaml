document: rfc-8591
kind: normative-requirement
summary: Sending and receiving UAs MUST support the SHA-256 message digest algorithm and MUST support ECDSA with NIST P-256 and SHA-256 for signing. UAs SHOULD support EdDSA with Ed25519.
section: "4.1"
rfc2119_level: MUST
topics:
