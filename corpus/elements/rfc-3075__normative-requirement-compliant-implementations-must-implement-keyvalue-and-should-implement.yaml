document: rfc-3075
kind: normative-requirement
summary: Compliant implementations MUST implement KeyValue and SHOULD implement RetrievalMethod. Multiple declarations within KeyInfo refer to the same key; multiple X509Data groupings about the same key but different certificates MUST be inside a single KeyInfo.
section: "4.4"
rfc2119_level: MUST
