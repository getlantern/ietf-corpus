document: rfc-9291
kind: protocol-element
summary: 'The ''connection'' container configures Layer 2 interface properties for a VPN network access: encapsulation type (untagged, dot1q, priority-tagged, QinQ) with tag operations (pop, push, translate), LAG/LACP parameters (mode, speed, system-id, admin-key, system-priority, member-link list with per-link MTU and OAM 802.3ah), flow control, LLDP, and split-horizon group assignment.'
