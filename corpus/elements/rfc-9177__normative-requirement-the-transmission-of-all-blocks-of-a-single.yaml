document: rfc-9177
kind: normative-requirement
summary: The transmission of all blocks of a single body over an unreliable transport MUST either all be Confirmable or all be Non-confirmable; mixing CON and NON within a single Q-Block exchange is not permitted.
section: "7"
rfc2119_level: MUST
topics:
    - congestion
