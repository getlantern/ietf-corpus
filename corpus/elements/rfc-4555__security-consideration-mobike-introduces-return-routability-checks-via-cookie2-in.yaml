document: rfc-4555
kind: security-consideration
summary: MOBIKE introduces return routability checks (via COOKIE2 in INFORMATIONAL exchanges) to limit 'third-party bombing' attacks in which an adversary redirects a high-volume IPsec flow toward a victim. Only a party that holds the IKE_SA keys and has seen the request can form a valid COOKIE2 response.
section: "5.3"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
