document: rfc-5371
kind: normative-requirement
summary: Users of this payload format MUST monitor packet loss to ensure the packet loss rate is within acceptable parameters when using best-effort service. Packet loss is acceptable if a TCP flow across the same network path would not achieve less average throughput than the RTP flow.
section: "10"
rfc2119_level: MUST
topics:
    - congestion
    - rtp
    - realtime
