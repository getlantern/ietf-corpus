document: rfc-2894
kind: protocol-element
summary: Router Renumbering messages are carried in ICMPv6 packets with Type 138. Code 0 is a Command, Code 1 is a Result, and Code 255 is a Sequence Number Reset. The message consists of a 16-octet RR Header followed by a variable-length Message Body.
