document: rfc-4184
kind: normative-requirement
summary: If an AC-3 frame exceeds the network MTU, it SHOULD be fragmented at the RTP level. RTP packets containing fragments of the same frame SHALL be sent in consecutive order from first to last fragment.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
