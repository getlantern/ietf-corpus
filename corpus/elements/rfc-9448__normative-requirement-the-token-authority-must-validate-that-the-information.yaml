document: rfc-9448
kind: normative-requirement
summary: The Token Authority MUST validate that the information in the ASN.1 TNAuthList accurately represents the SPC or TN resources the requesting party is authorized to represent, based on the pre-established and verified relationship between the Token Authority and the requesting party.
