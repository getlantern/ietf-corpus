document: rfc-7597
kind: design-rationale
summary: The Generalized Modulus Algorithm (GMA) was chosen for port-mapping because it supports both non-contiguous uniformly-distributed port sets (maximizing PSID embedding flexibility) and contiguous port ranges (a=0 case), with a reversible PSID derivation from any port number via bitmask operations, and supports a broad range of address-sharing ratios.
section: Appendix B
