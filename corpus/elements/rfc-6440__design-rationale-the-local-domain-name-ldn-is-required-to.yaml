document: rfc-6440
kind: design-rationale
summary: The local domain name (LDN) is required to derive the Domain-Specific Root Key (DSRK) from the EMSK; without LDN discovery, ERP re-authentication cannot proceed. No lower-layer mechanism for LDN discovery had previously been defined, motivating this DHCPv6 option.
section: "1"
topics:
    - security
