document: rfc-8731
kind: security-consideration
summary: Curve25519 with SHA-256 provides strong (~128 bits) security and is efficient on a wide range of architectures. Curve448 with SHA-512 provides stronger (~224 bits) security but has not received the same level of cryptographic review as Curve25519 and is slower.
