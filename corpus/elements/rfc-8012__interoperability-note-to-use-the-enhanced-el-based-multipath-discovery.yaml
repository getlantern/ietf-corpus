document: rfc-8012
kind: interoperability-note
summary: To use the enhanced EL-based multipath discovery end-to-end, all LSRs along the LSP must understand the new DS flags (L and E) and Multipath Information Type {10}. Mechanisms to verify this condition are out of scope of this document.
