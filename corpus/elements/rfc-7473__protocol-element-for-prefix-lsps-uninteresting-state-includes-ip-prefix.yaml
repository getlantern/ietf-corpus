document: rfc-7473
kind: protocol-element
summary: For Prefix-LSPs, uninteresting state includes IP Prefix FEC label bindings and LDP Status, but explicitly excludes IP address bindings (ADDRESS messages). IP address bindings are still advertised because other applications such as mLDP rely on peer IP addresses for upstream LSR selection.
section: 3.1.1
topics:
    - routing
    - mpls
