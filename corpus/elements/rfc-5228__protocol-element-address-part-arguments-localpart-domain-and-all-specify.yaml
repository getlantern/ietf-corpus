document: rfc-5228
kind: protocol-element
summary: Address-part arguments :localpart, :domain, and :all specify which portion of an email address to compare against. The default is ':all'. If an address is syntactically invalid, it will not be matched by :localpart or :domain tests.
section: 2.7.4
