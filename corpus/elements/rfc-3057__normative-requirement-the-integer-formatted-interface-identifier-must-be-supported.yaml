document: rfc-3057
kind: normative-requirement
summary: The integer-formatted Interface Identifier MUST be supported; the text-formatted Interface Identifier MAY optionally be supported. If the optional Interface Identifier parameter is present in ASPAC/ASPIA messages, the integer format MUST be supported.
