document: rfc-7420
kind: design-rationale
summary: The PCEP MIB is intentionally limited to read-only access for all objects except pcePcepNotificationsMaxRate. This design confines the MIB's role to monitoring and prevents SNMP-based modification of PCEP operational parameters, reducing the attack surface.
section: "3"
topics:
