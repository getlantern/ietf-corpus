document: rfc-5112
kind: design-rationale
summary: A priority scheme (1–5) was assigned to each string, with low values (1) indicating high probability of occurrence in presence documents. Strings with low priority numbers are placed at the end of the dictionary to benefit compression algorithms like DEFLATE that achieve better efficiency when commonly-used strings are at the bottom.
