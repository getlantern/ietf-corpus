document: rfc-8945
kind: registry
summary: IANA maintains a DNS RCODEs registry including 'TSIG Error values'. This document defines BADSIG (16), BADKEY (17), BADTIME (18), and BADTRUNC (22) for use in the TSIG RR Error field. New error codes are assigned per RFC 6895.
