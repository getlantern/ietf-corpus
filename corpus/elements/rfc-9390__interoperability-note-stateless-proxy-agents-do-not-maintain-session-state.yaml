document: rfc-9390
kind: interoperability-note
summary: Stateless Proxy Agents do not maintain session state, so session groups are transparent to them. Session-group-related AVPs are optional and should not be removed by stateless proxies; if they are removed, the client and server will detect the absence and fall back to single-session processing.
section: "5"
topics:
