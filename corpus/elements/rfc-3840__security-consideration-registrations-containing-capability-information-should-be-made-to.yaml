document: rfc-3840
kind: security-consideration
summary: Registrations containing capability information SHOULD be made to a SIPS URI, and the registrar SHOULD challenge the UA using digest over TLS to provide authenticity, confidentiality, and integrity. Feature tags should only be trusted when they come from the user or UA they describe.
section: "11.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - security
    - tls
