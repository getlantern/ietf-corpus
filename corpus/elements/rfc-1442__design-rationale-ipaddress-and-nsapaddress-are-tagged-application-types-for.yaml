summary: IpAddress and NsapAddress are tagged APPLICATION types 'for historical reasons'. The document notes that new MIB designs should represent network addresses using the TEXTUAL-CONVENTION macro rather than these tagged types, implying the tagging predates the cleaner textual convention mechanism.
