document: rfc-8150
kind: protocol-element
summary: Signal Degrade (SD) detection uses packet loss measurement per second. The SD defect is detected after mplsLpsConfigSdBadSeconds (2–10, default 10) consecutive Bad Seconds where packet loss ratio exceeds mplsLpsConfigSdThreshold (0–100%, default 30%), and cleared after mplsLpsConfigSdGoodSeconds (2–10, default 10) consecutive Good Seconds.
section: "8"
