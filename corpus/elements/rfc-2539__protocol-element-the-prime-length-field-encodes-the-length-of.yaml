document: rfc-2539
kind: protocol-element
summary: The prime length field encodes the length of the DH prime in bytes when the value is 16 or greater. If the value is 1 or 2, the prime field is instead an unsigned index into a table of up to 65,536 well-known prime/generator pairs. Values of 0 and 3 through 15 are reserved.
