document: rfc-5619
kind: design-rationale
summary: IKEv2 is preferred over IKEv1 because it is more reliable (better replay-protection and DoS-protection mechanisms), integrates NAT-traversal natively, and supports EAP authentication enabling user-level (not just machine-level) authentication for nomadic scenarios.
