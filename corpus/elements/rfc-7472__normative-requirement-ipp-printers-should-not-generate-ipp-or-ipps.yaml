document: rfc-7472
kind: normative-requirement
summary: IPP Printers SHOULD NOT generate 'ipp' or 'ipps' URIs (or allow administrators to configure) lengths above 255 octets, because many older IPP Client implementations do not properly support these lengths.
section: "4.2"
rfc2119_level: SHOULD NOT
