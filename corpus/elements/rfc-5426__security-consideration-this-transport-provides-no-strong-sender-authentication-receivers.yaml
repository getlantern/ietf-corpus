document: rfc-5426
kind: security-consideration
summary: This transport provides no strong sender authentication. Receivers cannot verify that a syslog message was sent by the reported originator, enabling attackers to forge messages that hide attacks, misdirect administrators, or give false system status indications.
section: "5.1"
topics:
    - syslog
    - security
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
