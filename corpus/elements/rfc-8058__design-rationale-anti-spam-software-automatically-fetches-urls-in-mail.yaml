document: rfc-8058
kind: design-rationale
summary: Anti-spam software automatically fetches URLs in mail header fields, causing accidental unsubscriptions when GET-based List-Unsubscribe URIs are used. The RFC introduces a POST-based mechanism so senders can distinguish intentional user actions from automated fetches.
section: "1"
topics:
    - email
