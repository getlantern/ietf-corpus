document: rfc-6876
kind: normative-requirement
summary: The PT-TLS Initiator MUST send a Version Request message as its first PT-TLS message and MUST NOT send any other messages until it receives a Version Response or Error. Subsequent assessments on the same session MUST use the negotiated version and MUST NOT send additional version negotiation messages.
section: "3.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
