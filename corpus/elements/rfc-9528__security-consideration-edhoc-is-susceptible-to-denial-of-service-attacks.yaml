document: rfc-9528
kind: security-consideration
summary: EDHOC is susceptible to denial-of-service attacks because the Responder must allocate state before authenticating the Initiator. Implementations MUST use available DoS mitigation such as puzzle mechanisms. Padding in EAD_1 mitigates amplification attacks by equalizing request/response sizes.
section: "9.7"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
