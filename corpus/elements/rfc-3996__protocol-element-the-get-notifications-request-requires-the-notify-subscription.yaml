document: rfc-3996
kind: protocol-element
summary: The Get-Notifications request requires the 'notify-subscription-ids' (1setOf integer(1:MAX)) operation attribute identifying one or more Subscription objects. The client MUST supply this attribute with at least one value, and the Printer MUST support it with multiple values.
section: 5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
