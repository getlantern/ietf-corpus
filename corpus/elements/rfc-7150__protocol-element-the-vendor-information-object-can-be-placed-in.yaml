document: rfc-7150
kind: protocol-element
summary: The Vendor Information object can be placed in a PCReq message to apply to a single path computation request or to a set of synchronized requests, mirroring the usage of the Objective Function object. Its position in the PCReq grammar is defined within <svec-list> and <request> as a <vendor-info-list>.
section: "2"
topics:
