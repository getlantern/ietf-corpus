document: rfc-8231
kind: security-consideration
summary: A malicious PCE with delegated LSP control can reroute traffic, cause denial of service, or enable traffic interception by modifying LSP paths. The security of the stateful PCEP session is therefore critical; TCP-MD5, TCP-AO, or TLS SHOULD be used to authenticate PCEP peers.
section: "10.3"
topics:
    - security
    - mpls
    - routing
