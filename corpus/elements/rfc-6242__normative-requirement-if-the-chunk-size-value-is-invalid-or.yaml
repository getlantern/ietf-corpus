document: rfc-6242
kind: normative-requirement
summary: If the chunk-size value is invalid or an error occurs during decoding of chunked framing, the peer MUST terminate the NETCONF session by closing the corresponding SSH channel. Implementations MUST ensure they are not vulnerable to buffer overrun.
section: "4.2"
rfc2119_level: MUST
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
