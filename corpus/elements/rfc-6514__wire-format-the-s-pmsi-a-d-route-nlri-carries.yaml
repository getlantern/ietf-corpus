document: rfc-6514
kind: wire-format
summary: The S-PMSI A-D Route NLRI carries an 8-octet RD, 1-octet Multicast Source Length, variable Multicast Source (C-S address), 1-octet Multicast Group Length, variable Multicast Group (C-G address or C-LDP MP Opaque Value Element), and Originating Router's IP Address. Source/Group Length values of 32 indicate IPv4, 128 indicate IPv6.
section: "4.3"
topics:
    - bgp
    - multicast
    - vpn
    - mpls
    - routing
