document: rfc-8130
kind: design-rationale
summary: In the MELPe bitstream, the most significant bits are designated as priority bits intended for greater protection in the underlying communications channel. For IP networks, such additional protection is irrelevant, but bitstreams are presented identically in IP networks for the convenience of interoperable gateway devices.
section: "3.1"
topics:
