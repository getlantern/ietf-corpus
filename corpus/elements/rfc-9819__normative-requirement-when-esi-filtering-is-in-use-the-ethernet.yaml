document: rfc-9819
kind: normative-requirement
summary: When ESI Filtering is in use, the Ethernet A-D per ES route MUST include the BGP Prefix-SID attribute with an SRv6 L2 Service TLV carrying the SRv6 Service SID containing the ESI Filtering ARG value. The SRv6 SID Structure Sub-Sub-TLV MUST be included with AL set to the size of the ARG; the AL size SHOULD be a multiple of 8.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
