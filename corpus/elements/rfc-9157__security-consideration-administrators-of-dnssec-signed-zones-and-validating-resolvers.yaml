document: rfc-9157
kind: security-consideration
summary: Administrators of DNSSEC-signed zones and validating resolvers should not make security decisions based on the contents of IANA registries. With more non-standards-track algorithms potentially appearing in registries, registry presence is an even weaker signal of algorithm safety; security decisions should be based on the security literature.
section: "5"
topics:
    - dns
    - security
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
