document: rfc-2480
kind: normative-requirement
summary: Gateways MAY provide facilities to sign and/or encrypt material passing from the non-MIME side to the MIME side, but such facilities MUST NOT be enabled by default, as the security exposure of transferring unsecured content within the application domain behind the gateway must be assessed first.
section: "4"
rfc2119_level: MAY
topics:
