document: rfc-8260
kind: protocol-element
summary: The I-FORWARD-TSN chunk (Type=194) replaces FORWARD-TSN when user message interleaving is used with the Partial Reliability extension. It replaces the 16-bit SSN with a 32-bit MID and adds a U bit to distinguish ordered from unordered messages, applying the same skipping principle to both.
section: 2.3.1
topics:
