document: rfc-1376
kind: wire-format
summary: DNA Phase IV Routing data packets use PPP Protocol field hex 0027. The Information field contains a 2-octet Length field (LSB first, VAX byte ordering) followed by the DNA Phase IV Routing packet. The Length field counts octets in the DNA packet only, not itself.
