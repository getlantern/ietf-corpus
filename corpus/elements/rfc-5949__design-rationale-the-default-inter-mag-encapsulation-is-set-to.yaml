kind: design-rationale
summary: The default inter-MAG encapsulation is set to match the LMA-MAG tunnel mechanism so that PMAG and NMAG automatically interoperate without special configuration or dynamic negotiation; this avoids the need for an additional tunnel negotiation protocol.
