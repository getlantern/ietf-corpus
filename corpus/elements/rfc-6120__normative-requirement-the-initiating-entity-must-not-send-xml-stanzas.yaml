document: rfc-6120
kind: normative-requirement
summary: The initiating entity MUST NOT send XML stanzas to entities other than itself or the connected server until stream negotiation is complete; if it does, the receiving entity MUST NOT accept such stanzas and MUST close the stream with a <not-authorized/> stream error.
section: 4.3.5
rfc2119_level: MUST NOT
topics:
    - security
