document: rfc-8794
kind: normative-requirement
summary: A String Element MUST either be empty or contain only printable ASCII characters in the range 0x20 to 0x7E, with the exception of null-byte termination (Section 13). A UTF-8 Element MUST contain only valid Unicode as defined in RFC 3629.
section: "7.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
