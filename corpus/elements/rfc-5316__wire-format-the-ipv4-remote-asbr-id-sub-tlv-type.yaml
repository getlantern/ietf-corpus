document: rfc-5316
kind: wire-format
summary: The IPv4 Remote ASBR ID sub-TLV (type 25) is 4 octets in length and carries the IPv4 identifier of the remote ASBR. The IPv6 Remote ASBR ID sub-TLV (type 26) is 16 octets and carries the IPv6 identifier of the remote ASBR.
