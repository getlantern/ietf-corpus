document: rfc-8688
kind: design-rationale
summary: 608 is distinct from 607 (Unwanted) because 607 indicates a human user rejected the call, while 608 indicates a machine or algorithm did so. In some jurisdictions this distinction is legally significant, and downstream analytics engines must be able to weight these differently rather than treating an algorithmic rejection as a human rejection.
