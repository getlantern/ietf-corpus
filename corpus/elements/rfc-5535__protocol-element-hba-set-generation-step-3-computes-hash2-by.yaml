summary: HBA-set generation step 3 computes Hash2 by SHA-1 over (Modifier || 9 zero octets || public_key_or_extended_modifier || Multi-Prefix extension), taking the 112 leftmost bits. Steps 3-4 are iterated until the 16*Sec leftmost bits of Hash2 are all zero, providing the Sec-based brute-force resistance.
