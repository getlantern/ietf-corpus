document: rfc-1902
kind: normative-requirement
summary: 'Syntax refinement via the SYNTAX clause must not change the object''s primitive or application type. Permitted refinements are: narrowing integer or size ranges, removing named-value enumerations (INTEGER or BITS), and reducing OCTET STRING character repertoire. No other refinements are allowed.'
section: "9"
rfc2119_level: MUST
topics:
