document: rfc-3839
kind: security-consideration
summary: 3GPP files have an extensible structure, so future metadata fields or media formats could theoretically be defined to induce actions on recipients, presenting additional security risks not present in the current specification. There is no current provision for encryption, signing, or authentication.
section: "2"
topics:
