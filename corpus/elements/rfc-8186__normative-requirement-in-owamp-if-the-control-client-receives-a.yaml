document: rfc-8186
kind: normative-requirement
summary: In OWAMP, if the Control-Client receives a Server Greeting with PTPv2 Timestamp flag set to 1 and the Session-Sender can use PTPv2 format, the Control-Client MUST set the PTPv2 Timestamp flag to 1 in the Set-Up-Response and the Session-Sender MUST use PTPv2 timestamp format.
section: "2.1"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
