document: rfc-7541
kind: wire-format
summary: String literals are encoded with a 1-bit Huffman flag (H), a 7-bit-prefix integer giving the byte length, and then the raw or Huffman-encoded string data. Padding after Huffman-encoded data uses the MSBs of the EOS symbol code.
