document: rfc-4789
kind: design-rationale
summary: SNMP over IEEE 802 is an optional transport mapping intended for managing simple devices directly over an 802 LAN without IP. The motivation was identified in applications like the Two-Port MAC Relay (IEEE 802.1 project P802.1aj), which require management at the link layer.
