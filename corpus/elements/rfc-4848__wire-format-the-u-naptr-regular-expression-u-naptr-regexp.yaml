document: rfc-4848
kind: wire-format
summary: The U-NAPTR regular expression (u-naptr-regexp) is restricted to the form '!.*!<URI>!' where <URI> is a constant URI string as defined in STD 66. This complete-replacement form avoids the need for full regex parsers in U-NAPTR clients.
section: "2.2"
topics:
    - dns
