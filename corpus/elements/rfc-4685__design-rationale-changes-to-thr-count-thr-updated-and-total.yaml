document: rfc-4685
kind: design-rationale
summary: Changes to thr:count, thr:updated, and total should be treated as 'insignificant' updates per RFC 4287, meaning the containing feed/entry atom:updated value SHOULD NOT be changed when only these extension values change, to avoid cache invalidation churn.
section: "6"
