document: rfc-1981
kind: protocol-element
summary: Path MTU Discovery works by having a source node initially assume the PMTU equals the MTU of the first hop. When an intermediate node discards an oversized packet, it returns an ICMPv6 Packet Too Big message containing the constricting link's MTU, and the source reduces its PMTU estimate accordingly.
