document: rfc-7248
kind: normative-requirement
summary: If the XMPP user approves a subscription request, the XMPP server MUST return a <presence/> stanza of type 'subscribed'; if declined, MUST return 'unsubscribed' and the XMPP-to-SIP gateway MUST transform it into an empty SIP NOTIFY with Subscription-State 'terminated' and reason 'rejected'.
section: 4.3.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
