document: rfc-5268
kind: normative-requirement
summary: In network-initiated handover, the MN MUST process an unsolicited PrRtAdv to configure a new CoA and MUST send an FBU to the PAR prior to switching to the new link. The PAR MUST continue forwarding packets to the MN on the current link until the FBU is received.
section: "3.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
