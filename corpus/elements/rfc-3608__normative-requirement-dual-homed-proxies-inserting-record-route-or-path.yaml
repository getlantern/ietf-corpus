document: rfc-3608
kind: normative-requirement
summary: 'Dual-homed proxies inserting Record-Route or Path header field values SHOULD record not one but two route values when processing the request: the first indicating the receiving interface, and the second indicating the sending interface. No modification of the recorded route is needed when processing the response.'
section: "6.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
