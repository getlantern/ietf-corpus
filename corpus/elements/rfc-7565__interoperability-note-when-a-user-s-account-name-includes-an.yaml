document: rfc-7565
kind: interoperability-note
summary: When a user's account name includes an at-sign character (U+0040), it must be percent-encoded as '%40' to avoid ambiguity with the '@' delimiter separating the userpart from the host. For example, 'juliet@capulet.example' registered at 'shoppingsite.example' becomes 'acct:juliet%40capulet.example@shoppingsite.example'.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
