document: rfc-4341
kind: protocol-element
summary: 'Ack Ratio feature controls the receiver''s DCCP-Ack sending rate: when Ack Ratio is R, the receiver sends one DCCP-Ack per R data packets. For each RTT with a DCCP-Ack congestion event, Ack Ratio is doubled; for each cwnd/(R^2 - R) consecutive congestion-free windows, Ack Ratio is decreased by 1.'
section: "6.1"
topics:
    - congestion
    - udp
