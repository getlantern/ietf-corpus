document: rfc-8224
kind: protocol-element
summary: 'Four failure response codes apply to Identity header validation: 428 ''Use Identity Header'' (required but absent/unsupported ppt), 436 ''Bad Identity Info'' (cannot acquire credentials from ''info'' URI), 437 ''Unsupported Credential'' (credential acquired but not trusted or algorithm unsupported), and 438 ''Invalid Identity Header'' (no valid PASSporT found). A 403 ''Stale Date'' may be sent for freshness failures.'
section: 6.2.2
topics:
