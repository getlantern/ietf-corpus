document: rfc-8038
kind: normative-requirement
summary: When exporting over SCTP, the MIB Field Options Data Records MUST be exported reliably and in the same SCTP stream as their associated Templates per RFC 6526; in constrained environments the MIB Field Options and Data Templates MAY be sent in separate SCTP messages provided order is maintained.
section: "5.7"
rfc2119_level: MUST
topics:
    - snmp
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
