document: rfc-9197
kind: normative-requirement
summary: An IOAM transit node MUST NOT modify any fixed-size trace option header fields other than Flags and RemainingLen; specifically it MUST NOT modify Namespace-ID, NodeLen, IOAM Trace-Type, or Reserved.
section: 4.4.1
rfc2119_level: MUST NOT
