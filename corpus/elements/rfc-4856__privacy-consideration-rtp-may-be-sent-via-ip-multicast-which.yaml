document: rfc-4856
kind: privacy-consideration
summary: RTP may be sent via IP multicast, which provides no direct means for a sender to know all receivers and no privacy. Users may be more sensitive to privacy concerns with audio/video communication; use of security mechanisms with RTP to provide confidentiality and integrity is important.
section: "4"
topics:
    - privacy
    - security
    - rtp
    - multicast
