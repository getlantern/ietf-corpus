document: rfc-7689
kind: normative-requirement
summary: Only the first RB Identifier listed in the RB Set field SHALL be processed; any others SHOULD be ignored. For unidirectional LSPs, only one ResourceBlockInfo sub-TLV SHALL be processed and the I/O bits can be safely ignored.
section: 4.2.1
rfc2119_level: MUST
