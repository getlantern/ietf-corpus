document: rfc-7521
kind: privacy-consideration
summary: Assertions may contain privacy-sensitive information and should only be transmitted over encrypted channels such as TLS. Where necessary, the assertion or portions of it should be encrypted to the authorization server to prevent disclosure to the client. Deployments should include only the minimum information necessary.
section: "8.4"
topics:
    - oauth
    - privacy
    - tls
