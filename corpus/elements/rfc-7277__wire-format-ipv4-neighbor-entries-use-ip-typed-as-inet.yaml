document: rfc-7277
kind: wire-format
summary: IPv4 neighbor entries use 'ip' typed as inet:ipv4-address-no-zone and 'link-layer-address' typed as yang:phys-address (mandatory in config, optional in state). IPv6 neighbor entries use inet:ipv6-address-no-zone for 'ip' with the same phys-address type for the link-layer address.
