document: rfc-4449
kind: design-rationale
summary: This mechanism uses a preconfigured shared secret between mobile node and correspondent node to eliminate return routability test messages, reducing latency. It provides stronger assurance of home address ownership than the default mechanism but requires manual configuration and limits applicability to trusted, administered environments.
section: "1"
topics:
