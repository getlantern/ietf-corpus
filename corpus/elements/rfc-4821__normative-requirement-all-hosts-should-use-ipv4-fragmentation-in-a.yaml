document: rfc-4821
kind: normative-requirement
summary: 'All hosts SHOULD use IPv4 fragmentation in a mode that mimics IPv6 functionality: all fragmentation SHOULD be done on the host, and all IPv4 packets including fragments SHOULD have the DF bit set.'
