document: rfc-4466
kind: design-rationale
summary: RFC 4466 collects ABNF extensions to IMAP4 commands from IMAPEXT, LEMONADE, and individual documents into one place to minimize cross-references and to define reusable building blocks for future extensions that can be combined compatibly.
