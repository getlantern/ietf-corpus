document: rfc-1938
kind: protocol-element
summary: The OTP system produces a 64-bit one-time password by passing the concatenation of the seed and pass-phrase through the hash function N times (the sequence number). Each successful authentication decrements N by one, yielding a unique, non-invertible sequence.
section: "6.0"
topics:
    - security
    - crypto
