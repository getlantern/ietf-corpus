document: rfc-5036
kind: normative-requirement
summary: In Ordered Label Distribution Control, an LSR MUST wait until a label mapping is received from a downstream LSR before advertising a label mapping for a FEC to upstream LSRs, unless the LSR is the egress for that FEC.
section: 2.6.1.2
rfc2119_level: MUST
topics:
