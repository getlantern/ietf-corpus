document: rfc-2462
kind: security-consideration
summary: 'DAD is vulnerable to denial-of-service attacks: any node can respond to Neighbor Solicitations for a tentative address, causing the victim to reject the address as a duplicate. This can be mitigated by authenticating Neighbor Discovery packets via IPsec [RFC2402].'
