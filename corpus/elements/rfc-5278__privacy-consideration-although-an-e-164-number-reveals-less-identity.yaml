document: rfc-5278
kind: privacy-consideration
summary: Although an E.164 number reveals less identity information than a SIP or email username@hostname URI, publicly available ENUM mappings still expose the association between a telephone number and messaging service endpoints, creating risk of unwanted communication targeting.
