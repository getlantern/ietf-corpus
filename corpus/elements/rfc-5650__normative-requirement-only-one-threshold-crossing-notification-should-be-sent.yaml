document: rfc-5650
kind: normative-requirement
summary: Only one threshold crossing notification SHOULD be sent per 15-minute interval per interface. Since the current 15-minute counter resets every 15 minutes, the notification may recur as often as every 15 minutes if the condition persists.
section: "2.9"
rfc2119_level: SHOULD
topics:
