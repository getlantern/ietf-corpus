document: rfc-7503
kind: protocol-element
summary: The Router-Hardware-Fingerprint TLV has type 1 and MUST be advertised in the AC LSA with LSID 0. It contains a variable-length value of 32 octets or greater constructed from hardware attributes (e.g., MAC addresses, CPU ID, serial numbers) with an extremely high probability of uniqueness that persists across restarts.
section: 7.2.2
topics:
    - routing
