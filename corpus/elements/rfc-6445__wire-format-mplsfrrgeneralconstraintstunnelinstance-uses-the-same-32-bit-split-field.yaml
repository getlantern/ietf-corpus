summary: 'mplsFrrGeneralConstraintsTunnelInstance uses the same 32-bit split-field convention: lower 16 bits carry the protected tunnel instance, upper 16 bits MUST be all zeros for backup LSP identification. A value of 0 indicates a tunnel-head (ingress) configuration.'
