document: rfc-1542
kind: normative-requirement
summary: 'When delivering a BOOTREPLY to a client, the relay agent SHOULD check the BROADCAST flag: if set to 1, the reply SHOULD be broadcast using 255.255.255.255 and the link-layer broadcast; if cleared, the reply SHOULD be unicast to ''yiaddr''/''chaddr''. The UDP destination port MUST be BOOTPC (68).'
section: 4.1.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
