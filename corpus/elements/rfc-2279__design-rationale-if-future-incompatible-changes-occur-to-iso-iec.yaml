document: rfc-2279
kind: design-rationale
summary: If future incompatible changes occur to ISO/IEC 10646, the 'UTF-8' MIME charset label will remain aligned with the version prior to the incompatible change unless the IETF explicitly decides otherwise. The 'Korean mess' (Amendment 5 Hangul repositioning) is treated as a one-time exception justifying the legacy 'UNICODE-1-1-UTF-8' label rather than versioning the primary label.
