document: rfc-7555
kind: normative-requirement
summary: When MTU testing, if the MPLS Echo Request is transported as an IP datagram the IP header DF bit MUST be set to prevent fragmentation. The Proxy LSR must also set the DF bit when the MPLS Payload Size field in the Proxy Echo Parameters TLV is non-zero.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
