document: rfc-5260
kind: protocol-element
summary: 'The date-part argument selects a specific component of the extracted date/time value for comparison. Supported values include: year, month, day, date (yyyy-mm-dd), julian (Modified Julian Day), hour, minute, second, time (hh:mm:ss), iso8601, std11, zone, and weekday (0=Sunday through 6=Saturday).'
section: "4.2"
