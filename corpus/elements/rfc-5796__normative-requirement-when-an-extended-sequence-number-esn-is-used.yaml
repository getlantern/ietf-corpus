document: rfc-5796
kind: normative-requirement
summary: When an Extended Sequence Number (ESN) is used with a manually keyed SA, the ESN value MUST be saved over a reboot, along with an indication of which sequence numbers have been used. When manual configuration is used, ESN SHOULD be deployed as the sequence number for the sliding window protocol.
section: "14"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
