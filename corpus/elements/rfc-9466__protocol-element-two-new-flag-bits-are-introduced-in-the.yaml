document: rfc-9466
kind: protocol-element
summary: 'Two new flag bits are introduced in the PIM Assert message header via RFC 9436: the Packed (P) flag (bit 0) and the Aggregated (A) flag (bit 1). P=1 indicates a PackedAssert message; A=1 within a PackedAssert indicates aggregated encoding.'
section: "3.2"
