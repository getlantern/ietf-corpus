document: rfc-1490
kind: wire-format
summary: 'Fragmented packets use NLPID 0x80, OUI 0x00-80-C2, PID 0x00-0D, followed by a 2-octet sequence number, then a word containing: 1-bit Final flag (F), 4-bit reserved (must be 0), and 11-bit offset (logical byte offset divided by 32). The first fragment has offset 0; the last fragment has F=1.'
section: "6"
