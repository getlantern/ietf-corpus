document: rfc-9780
kind: normative-requirement
summary: Setting the Reply Mode field to 'Do not reply' for the LSP Ping used to bootstrap a MultipointTail is RECOMMENDED, because BFD Demand mode means the MPLS echo reply from a tail has no useful information to convey to the head.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - mpls
