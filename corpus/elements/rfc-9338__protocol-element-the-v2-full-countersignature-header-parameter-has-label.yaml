document: rfc-9338
kind: protocol-element
summary: The V2 full countersignature header parameter has label 11 and carries one or more COSE_Countersignature values. It may appear as an unprotected attribute in COSE_Sign1, COSE_Signature, COSE_Encrypt, COSE_recipient, COSE_Encrypt0, COSE_Mac, and COSE_Mac0 structures.
