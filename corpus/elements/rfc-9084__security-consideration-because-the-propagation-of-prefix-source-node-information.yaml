document: rfc-9084
kind: security-consideration
summary: Because the propagation of prefix source node information crosses OSPF area or domain boundaries, it exposes router identity outside areas where it would normally be hidden or abstracted by the base OSPF protocol. Operators may limit propagation to a subset of prefixes at ABRs or ASBRs.
section: "5"
topics:
