document: rfc-9788
kind: wire-format
summary: 'The HP-Outer Header Field syntax is: ''HP-Outer:'' [FWS] field-name '': '' hp-outer-value CRLF, where hp-outer-value matches the unstructured production from RFC 5322 §3.2.5 but without the obsolete obs-unstruct option. Each instance encodes a single Non-Structural Header Field name and its Outer Header Section value.'
section: 2.2.1
