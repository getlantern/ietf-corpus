kind: protocol-element
summary: 'ICMPv4-to-ICMPv6 type/code mappings: Echo/Echo Reply (8/0)→(128/129); Destination Unreachable (3) codes translated (e.g., Code 0,1→0, Code 4→PTB Type 2); Time Exceeded (11)→Type 3; Parameter Problem (12)→Type 4. Obsoleted, single-hop, and unknown types are silently dropped.'
