document: rfc-9758
kind: registry
summary: IANA created the ''ipn' Scheme URI Allocator Identifiers' registry. Ranges 0–0xFFFF and 0x10000–0x3FFFFFFF require Expert Review; 0x40000000–0x7FFFFFFF is Experimental Use; 0x80000000–0xFFFFFFFF is Reserved. Initial entries are Default Allocator (ID 0, IANA) and Example Range (974848–978943, 12-bit range).
section: "9.1"
