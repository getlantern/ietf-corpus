document: rfc-8623
kind: protocol-element
summary: The PCRpt message is extended to support P2MP TE LSPs, incorporating END-POINTS and S2LS objects in end-point-path-pair lists. At least one END-POINTS instance MUST be present for P2MP LSP; destinations are grouped by operational status and leaf type.
section: "6.1"
topics:
