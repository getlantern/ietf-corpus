document: rfc-9972
kind: protocol-element
summary: Type 22 is a per-AFI/SAFI 64-bit Gauge of routes in the pre-policy Adj-RIB-In rejected by an inbound policy. Unlike Stat Type 0 (a monotonically increasing 32-bit counter), Type 22 is a Gauge reflecting the current count due to ongoing policy configuration changes.
