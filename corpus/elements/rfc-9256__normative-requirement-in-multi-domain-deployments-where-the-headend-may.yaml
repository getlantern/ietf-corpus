document: rfc-9256
kind: normative-requirement
summary: In multi-domain deployments where the headend may be unable to verify reachability of SIDs in remote domains, Types A or B MUST be used for SIDs whose reachability cannot be verified. The first SID MUST always be reachable regardless of its type.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
