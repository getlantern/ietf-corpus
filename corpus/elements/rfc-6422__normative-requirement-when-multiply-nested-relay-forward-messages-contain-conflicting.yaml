document: rfc-6422
kind: normative-requirement
summary: When multiply-nested Relay-Forward messages contain conflicting values for options in their respective RSOOs, the DHCP server MUST choose no more than one of these options to forward to the client and MUST NOT forward more than one of these options.
section: "6"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
