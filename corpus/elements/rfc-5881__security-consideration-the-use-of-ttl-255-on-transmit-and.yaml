document: rfc-5881
kind: security-consideration
summary: The use of TTL=255 on transmit and receive, coupled with an association to an incoming interface, is considered to supply equivalent security characteristics to other infrastructure protocols, as it is not trivially spoofable. The security implications are further discussed in RFC 5082 (GTSM).
section: "9"
topics:
    - security
    - routing
