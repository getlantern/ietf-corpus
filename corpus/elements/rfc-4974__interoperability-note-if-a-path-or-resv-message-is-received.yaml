document: rfc-4974
kind: interoperability-note
summary: If a Path or Resv message is received with a non-zero Call ID but without the C bit set, and the Call ID is not recognized, the receiver is RECOMMENDED to assume Call establishment is delayed and ignore the message. If the Call never materializes, failure to refresh will cause the LSPs to be torn down.
section: "6.7"
rfc2119_level: RECOMMENDED
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
