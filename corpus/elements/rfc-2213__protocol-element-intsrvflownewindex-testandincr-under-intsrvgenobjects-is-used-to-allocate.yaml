document: rfc-2213
kind: protocol-element
summary: intSrvFlowNewIndex (TestAndIncr) under intSrvGenObjects is used to allocate new intSrvFlowNumber values safely. The manager reads, then writes back the same value in the SET that creates the new row; if the SET fails with 'inconsistentValue', the process repeats.
