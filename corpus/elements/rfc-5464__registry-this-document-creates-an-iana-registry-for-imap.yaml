document: rfc-5464
kind: registry
summary: 'This document creates an IANA registry for IMAP METADATA entries. Each registration requires: Type (Mailbox or Server), Name (entry path), Description, Content-type with charset, RFC Number, and Contact. All entries must have ''/shared'' or ''/private'' as a prefix, and non-vendor entries must be defined in a Standards Track or IESG-approved Experimental RFC.'
section: "6.1"
topics:
    - email
    - registry
