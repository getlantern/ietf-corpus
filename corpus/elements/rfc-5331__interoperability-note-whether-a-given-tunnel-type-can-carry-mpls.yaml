document: rfc-5331
kind: interoperability-note
summary: Whether a given tunnel type can carry MPLS packets with downstream-assigned labels, upstream-assigned labels, or both is determined by the tunnel type and described in RFC 5332. On multi-access data links, RFC 5332 uses a different ether type to distinguish upstream-assigned from downstream-assigned labels.
section: "7"
topics:
