document: rfc-6991
kind: protocol-element
summary: The counter32 type (uint32) represents a non-negative integer that monotonically increases to 2^32-1 then wraps to zero. Counters have no defined initial value, so a single value carries no information content; discontinuities should be flagged by a companion schema node. Equivalent to SMIv2 Counter32.
