document: rfc-6936
kind: normative-requirement
summary: IPv6 nodes MUST provide a method for an application or protocol to require that a particular UDP datagram be sent with a calculated checksum at any time, even when the socket is operating in zero-checksum mode (e.g., for keepalive datagrams).
section: "4"
rfc2119_level: MUST
topics:
    - udp
    - ip
