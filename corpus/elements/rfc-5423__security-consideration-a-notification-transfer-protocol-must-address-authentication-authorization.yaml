document: rfc-5423
kind: security-consideration
summary: A notification transfer protocol must address authentication, authorization, privacy, message integrity, and denial-of-service. Publish/subscribe protocols more complex than a single end-to-end TCP connection require extra attention to these issues and must carefully balance deployment requirements with security and privacy.
