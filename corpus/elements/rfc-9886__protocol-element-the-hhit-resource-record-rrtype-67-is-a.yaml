document: rfc-9886
kind: protocol-element
summary: 'The HHIT Resource Record (RRType 67) is a CBOR-encoded DNS record containing three fields: hhit-entity-type (uint), hid-abbreviation (15-character string), and canonical-registration-cert (byte string holding an X.509 DER certificate). It provides public key material and a URI pointer to private information resources.'
