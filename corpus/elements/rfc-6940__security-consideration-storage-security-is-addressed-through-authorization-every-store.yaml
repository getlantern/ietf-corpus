document: rfc-6940
kind: security-consideration
summary: Storage security is addressed through authorization (every Store request is verified against the Kind's access control policy via the stored digital signature), distributed quota enforcement (limiting storage burden per node), and correctness verification (readers can check data integrity via signatures). Residual attacks include the responsible peer silently losing data.
section: "13.5"
topics:
    - security
