document: rfc-5109
kind: design-rationale
summary: RFC 5109 fixes an inconsistency in RFC 2733 and RFC 3009 where the P, X, and CC fields of the RTP header were set in ways incompatible with RFC 3550, preventing payload-independent RTP validity checks. RFC 5109 places all recovery values in the FEC header and uses standard RFC 3550 RTP header semantics.
section: "1"
topics:
