summary: 'The full encapsulation consists of: IPv6 Header (320 bits), Session ID (32 bits), Cookie bits 0:31 (32 bits), Cookie bits 32:63 (32 bits), optional L2-Specific Sublayer (32 bits), and variable-length Ethernet payload. The IPv6 Next Header field is set to 0x73 to indicate L2TPv3. No UDP header is carried.'
