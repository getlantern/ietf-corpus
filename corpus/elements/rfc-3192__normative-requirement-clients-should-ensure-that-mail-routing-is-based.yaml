document: rfc-3192
kind: normative-requirement
summary: Clients SHOULD ensure that mail routing is based only on authoritative DNS answers. Once DNS Security mechanisms (DNSSEC) become more widely deployed, clients SHOULD employ those mechanisms to verify authenticity and integrity of mail routing records.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - email
    - dns
