document: rfc-7787
kind: wire-format
summary: Each TLV is encoded as a 2-byte Type field, a 2-byte Length field (value bytes only, excluding padding), the value bytes, and zero-padding bytes to the next 4-byte boundary. Padding bytes are excluded from the Length field itself but are counted in any enclosing TLV's Length.
