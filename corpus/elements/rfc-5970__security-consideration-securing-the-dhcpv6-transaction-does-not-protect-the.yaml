document: rfc-5970
kind: security-consideration
summary: Securing the DHCPv6 transaction does not protect the boot file download channel. Implementers should use HTTPS (RFC 2818) or TLS within HTTP (RFC 2817) to prevent spoofing, or implement boot image signing with a configurable key so malicious images can be detected and rejected.
section: "7"
topics:
    - security
    - realtime
    - tls
    - http
