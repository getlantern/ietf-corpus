document: rfc-1544
kind: normative-requirement
summary: The MD5 algorithm MUST be computed on the canonical form of the raw data, before applying any content-transfer-encoding. The receiver also applies MD5 on the raw data after undoing any content-transfer-encoding.
section: "2"
rfc2119_level: MUST
topics:
    - email
    - crypto
