summary: The MIB module is restricted to reading standard PTP data elements as described in IEEE Std. 1588-2008, enabling monitoring of PTP clock operation. Objects for detailed performance measurement supporting the Telecom Profile (G.8265.1) or future profiles are considered out of scope.
