document: rfc-1902
kind: normative-requirement
summary: Every information module must contain exactly one MODULE-IDENTITY invocation with mandatory LAST-UPDATED, ORGANIZATION, CONTACT-INFO, and DESCRIPTION clauses. This invocation must appear immediately after any IMPORTS statements. The ASN.1 EXPORTS statement is not allowed; all items are automatically exported.
section: "5"
rfc2119_level: MUST
topics:
