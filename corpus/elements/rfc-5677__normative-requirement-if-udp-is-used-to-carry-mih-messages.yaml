document: rfc-5677
kind: normative-requirement
summary: If UDP is used to carry MIH messages, MIH MUST use MIH ACKs. A message is retransmitted if its ACK is not received within the MIHF-configured timeout interval.
section: "6.3"
rfc2119_level: MUST
topics:
