document: rfc-8339
kind: protocol-element
summary: This document defines a new P2MP Pseudowire sub-TLV for the Target Forwarding Equivalence Class (FEC) Stack TLV used in LSP Ping. It is added by the Root PE (R-PE) originator of the echo request to identify the P2MP PW under test at the Leaf PE (L-PE).
