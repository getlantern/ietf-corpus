summary: 'QUERY Record types (QTYPE) include: 1 = Address query (explicit address, returns all addresses for the same interface), 2 = Frame query (ARP, ND, RARP, or SEND frame), and 5 = Unknown unicast MAC Query Frame (frame with unknown destination MAC). Values 0 and 15 are reserved; 3–4 and 6–14 are unassigned.'
