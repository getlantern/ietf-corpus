document: rfc-3986
kind: protocol-element
summary: 'The path component uses five ABNF rules: path-abempty (begins with "/" or is empty), path-absolute (begins with "/" but not "//"), path-noscheme (begins with a non-colon segment), path-rootless (begins with a segment), and path-empty (zero characters). The dot-segments "." and ".." are defined for relative navigation within the hierarchy.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
