document: rfc-2460
kind: normative-requirement
summary: 'When more than one extension header is used, the recommended order is: IPv6 header, Hop-by-Hop Options, Destination Options (for intermediate nodes), Routing, Fragment, AH, ESP, Destination Options (for final destination), upper-layer header. IPv6 nodes must accept extension headers in any order.'
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
