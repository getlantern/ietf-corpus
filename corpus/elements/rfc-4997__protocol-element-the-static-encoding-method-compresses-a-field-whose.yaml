document: rfc-4997
kind: protocol-element
summary: The static encoding method compresses a field whose length and value match an existing context entry to zero bits (CLENGTH=0). At the compressor the binding succeeds only when the context value equals the uncompressed value; at the decompressor it succeeds only if a valid context entry exists.
section: 4.11.4
