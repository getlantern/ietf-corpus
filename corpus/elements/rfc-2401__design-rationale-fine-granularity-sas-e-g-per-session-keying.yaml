document: rfc-2401
kind: design-rationale
summary: Fine-granularity SAs (e.g., per-session keying) are generally more vulnerable to traffic analysis than coarse-granularity ones carrying traffic from many subscribers, because an observer can more easily correlate traffic patterns to specific communications.
section: "4.2"
topics:
    - ipsec
    - security
    - privacy
