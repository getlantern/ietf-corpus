document: rfc-1996
kind: normative-requirement
summary: If a slave does not implement the NOTIFY opcode, it must respond with a NOTIMP error. A master receiving NOTIMP should treat the NOTIFY transaction as complete for that slave.
section: "3.12"
rfc2119_level: MUST
topics:
    - dns
