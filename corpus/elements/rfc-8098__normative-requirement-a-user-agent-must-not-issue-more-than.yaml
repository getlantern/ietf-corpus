document: rfc-8098
kind: normative-requirement
summary: A user agent MUST NOT issue more than one MDN per recipient per message. Once an MDN has been issued for a recipient, no further MDNs may be issued even if another disposition occurs.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - email
