document: rfc-6463
kind: normative-requirement
summary: If the rfLMA in proxy-MAG role receives an error PBA' (e.g., Status 130, no response, or missing A4CoA echo), it SHOULD attempt reassignment to a new r2LMA and retry; if all attempts fail it MUST propagate the latest failure Status Value (or 130 if no response) to the MAG.
section: 5.3.2
rfc2119_level: SHOULD
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
