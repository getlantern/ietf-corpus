document: rfc-8695
kind: protocol-element
summary: 'RIP timers are defined as a container with four leaves: update-interval (default 30s), invalid-interval (default 180s), holddown-interval (default 180s), and flush-interval (default 240s). YANG ''must'' constraints enforce that invalid-interval >= update-interval*3 and flush-interval > invalid-interval.'
section: "4"
topics:
