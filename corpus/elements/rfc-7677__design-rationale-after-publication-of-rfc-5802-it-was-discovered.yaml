document: rfc-7677
kind: design-rationale
summary: After publication of RFC 5802, it was discovered that TLS does not have the expected properties for 'tls-unique' channel binding to be secure without the session hash extension (RFC 7627); this motivated the normative text in this document requiring RFC 7627 or prohibition of session resumption when using '-PLUS' variants.
section: "1"
topics:
    - tls
    - crypto
    - security
