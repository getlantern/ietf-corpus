document: rfc-3398
kind: design-rationale
summary: The parameter mapping problem is largely confined to the IAM/INVITE exchange because once an INVITE has been sent, headers like To and From become essentially fixed, and subsequent signaling is routed via Via and Route headers. This justifies the document's focus on that boundary rather than full per-message mapping.
