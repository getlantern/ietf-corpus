document: rfc-4088
kind: normative-requirement
summary: OIDs within an OID group in an SNMP URI SHOULD be accessed by a single SNMP operation containing a variable binding for each OID, in order to ensure consistent results (e.g., for InetAddress/InetAddressType pairs).
section: "4.3"
rfc2119_level: SHOULD
topics:
    - snmp
