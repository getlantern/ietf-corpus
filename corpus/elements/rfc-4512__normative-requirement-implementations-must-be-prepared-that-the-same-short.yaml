document: rfc-4512
kind: normative-requirement
summary: Implementations MUST be prepared that the same short name (descriptor) might be used in a subschema to refer to different kinds of schema elements (e.g., both an object class 'x-fubar' and an attribute type 'x-fubar') and across different subschemas.
section: "6.2"
rfc2119_level: MUST
