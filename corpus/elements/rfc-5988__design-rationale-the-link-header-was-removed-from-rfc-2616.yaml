document: rfc-5988
kind: design-rationale
summary: The Link header was removed from RFC 2616 (HTTP/1.1) due to lack of implementation experience. RFC 5988 re-specifies it with updated but backwards-compatible syntax because implementations reappeared and new use cases emerged, addressing the unclear status that led some to mint application-specific HTTP headers instead.
section: "1"
topics:
    - http
