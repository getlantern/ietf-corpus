document: rfc-9643
kind: protocol-element
summary: 'The ''ietf-tcp-common'' module defines a single reusable grouping ''tcp-common-grouping'' containing a presence container ''keepalives'' with three leaves: ''idle-time'' (uint16, seconds, default 7200), ''max-probes'' (uint16, default 9), and ''probe-interval'' (uint16, seconds, default 75). This grouping is shared by both the tcp-client and tcp-server modules.'
section: "2"
