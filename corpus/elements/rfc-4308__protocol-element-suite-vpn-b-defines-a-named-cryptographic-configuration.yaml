document: rfc-4308
kind: protocol-element
summary: Suite 'VPN-B' defines a named cryptographic configuration expected to represent next-generation corporate VPN security. IPsec uses ESP with AES-128-CBC encryption and AES-XCBC-MAC-96 integrity; IKE/IKEv2 uses AES-128-CBC encryption, AES-XCBC-PRF-128 PRF, AES-XCBC-MAC-96 integrity, and 2048-bit MODP Diffie-Hellman.
section: "2.2"
topics:
    - ipsec
    - vpn
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
