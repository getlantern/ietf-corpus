document: rfc-4939
kind: wire-format
summary: IsnsDdsStatusType is a 32-bit BITS field encoding DDS status; bit 31 (ddsEnabled) indicates whether the DDS is enabled. All other bits are RESERVED. Setting a bit to 1 enables the feature.
