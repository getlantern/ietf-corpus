document: rfc-5848
kind: normative-requirement
summary: Each unique signer MUST have a unique APP-NAME and PROCID combination on each host. A Signature Block message MUST use the same HOSTNAME, APP-NAME, and PROC-ID as the corresponding Certificate Block messages containing the Payload Block.
section: "3"
rfc2119_level: MUST
