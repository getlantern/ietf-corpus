document: rfc-2211
kind: protocol-element
summary: TSpec A is a substitute for (greater than or equal to) TSpec B if and only if A's r, b, p, and M are each greater than or equal to B's and A's m is less than or equal to B's. TSpecs that differ but do not satisfy all five conditions are unordered with respect to each other.
