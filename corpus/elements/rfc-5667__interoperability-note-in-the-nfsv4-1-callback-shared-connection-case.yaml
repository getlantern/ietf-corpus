document: rfc-5667
kind: interoperability-note
summary: In the NFSv4.1 callback shared-connection case, the XID in the RPC/RDMA header may collide with XIDs used by the client for other requests; both client and server must inspect the RPC component to determine whether the message is an RPC CALL or RPC REPLY before processing the XID.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
