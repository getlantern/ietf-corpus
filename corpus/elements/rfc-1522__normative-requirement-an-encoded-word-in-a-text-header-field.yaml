document: rfc-1522
kind: normative-requirement
summary: An encoded-word in a 'text' header field MUST be separated from any adjacent encoded-word or 'text' by linear-white-space. Similarly, encoded-words within 'phrase' and 'comment' contexts must be separated from adjacent tokens by linear-white-space.
