document: rfc-8461
kind: protocol-element
summary: MX host validation requires that the MX record name matches one or more 'mx' patterns in the applied policy. Wildcard '*' may only match the entire left-most label; '*.example.com' matches 'mail.example.com' but not 'example.com' or 'foo.bar.example.com'. Internationalized domain names must use Punycode A-labels.
section: "4.1"
topics:
    - email
    - tls
    - dns
