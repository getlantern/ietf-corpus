document: rfc-8266
kind: security-consideration
summary: Authentication and authorization decisions must be based on a thing's stable underlying identity (URI, file path, etc.), not its nickname, because nicknames are human-friendly handles that can be spoofed or confused.
section: "6.1"
topics:
    - security
