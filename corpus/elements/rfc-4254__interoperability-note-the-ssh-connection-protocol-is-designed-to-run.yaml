document: rfc-4254
kind: interoperability-note
summary: The SSH Connection Protocol is designed to run on top of SSH transport ([SSH-TRANS]) and user authentication ([SSH-USERAUTH]) layers; it relies entirely on those layers for encryption, integrity, and user authentication and does not provide these itself.
section: "1"
topics:
    - security
