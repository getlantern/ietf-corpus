document: rfc-4282
kind: interoperability-note
summary: RFC 4282 adds support for UTF-8 characters (%x80–FF) in the username portion, which may be unacceptable to RFC 2486-compliant nodes that only support ASCII. Similarly, NAIs without a username (for privacy) and long NAIs (beyond 63 octets) may not be accepted by RFC 2486-compliant nodes.
section: Appendix A
topics:
