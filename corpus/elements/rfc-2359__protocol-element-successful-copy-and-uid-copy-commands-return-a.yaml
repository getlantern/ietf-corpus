document: rfc-2359
kind: protocol-element
summary: Successful COPY and UID COPY commands return a COPYUID response code in the tagged OK response whenever at least one message was copied. COPYUID carries the UIDVALIDITY of the destination mailbox, the source UIDs in copy order, and the destination UIDs in assignment order.
section: "4.3"
topics:
    - email
