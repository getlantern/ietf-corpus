document: rfc-5044
kind: normative-requirement
summary: 'MPA MUST detect the following errors and SHOULD provide error codes to DDP: (1) TCP connection closed/terminated/lost, (2) CRC mismatch, (3) Marker and ULPDU_Length disagreement on FPDU start (when CRC is valid), (4) invalid MPA Request or Reply Frame (which MUST cause immediate TCP connection close).'
section: "8"
rfc2119_level: MUST
topics:
    - tcp
