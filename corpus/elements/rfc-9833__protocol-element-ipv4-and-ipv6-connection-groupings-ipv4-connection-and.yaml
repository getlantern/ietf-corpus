document: rfc-9833
kind: protocol-element
summary: IPv4 and IPv6 connection groupings ('ipv4-connection' and 'ipv6-connection') provide local-address, virtual-address (for redundancy), prefix-length, address-allocation-type, and a choice between dynamic allocation (DHCP server/relay, explicit address pools) and static-addresses (ordered list of address-id + customer-address entries).
