document: rfc-822
kind: design-rationale
summary: Source routing via the route component of route-addr is discouraged because the choice of transmission route should normally be left to the mail transport service. Source routing is provided only for cases where the sender has special need of path restriction.
section: 6.2.7
topics:
    - email
