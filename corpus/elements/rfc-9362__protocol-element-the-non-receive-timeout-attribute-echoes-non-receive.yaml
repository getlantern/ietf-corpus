document: rfc-9362
kind: protocol-element
summary: The 'non-receive-timeout' attribute echoes NON_RECEIVE_TIMEOUT from RFC 9177, representing the maximum time to wait for a missing payload before requesting retransmission. It is optional, expressed in seconds as decimal64 with default 4.00 s (twice non-timeout), and maps to CBOR key 32779.
section: "3"
