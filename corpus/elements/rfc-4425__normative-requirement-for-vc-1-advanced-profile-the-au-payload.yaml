document: rfc-4425
kind: normative-requirement
summary: For VC-1 Advanced profile, the AU payload MUST contain VC-1 bit stream data in EBDU format using the byte-stuffing encapsulation mode defined in Annex E of SMPTE 421M. The AU payload MUST start at an EBDU boundary except when containing a fragmented frame.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
