document: rfc-6822
kind: normative-requirement
summary: 'MI-RTRs MUST discard IS-IS PDUs if: the destination is AllL1IS or AllL2IS and the PDU contains an IID-TLV; or the destination is one of the new MI-IS-IS multicast addresses but the PDU has a zero IID or no IID-TLV.'
section: 2.6.1
rfc2119_level: MUST
topics:
    - routing
