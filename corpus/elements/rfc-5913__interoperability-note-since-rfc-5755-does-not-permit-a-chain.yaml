document: rfc-5913
kind: interoperability-note
summary: Since RFC 5755 does not permit a chain of ACs, the Authority Clearance Constraints extension may only appear in PKCs of a CA or AA (not in ACs themselves). The extension may also appear in or be associated with a trust anchor.
