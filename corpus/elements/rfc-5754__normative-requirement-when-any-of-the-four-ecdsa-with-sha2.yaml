document: rfc-5754
kind: normative-requirement
summary: When any of the four ECDSA-with-SHA2 OIDs appears within an AlgorithmIdentifier, the parameters field MUST be absent; the AlgorithmIdentifier SHALL be a SEQUENCE of one component (the OID only).
section: "3.3"
rfc2119_level: MUST
topics:
    - crypto
