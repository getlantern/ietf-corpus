document: rfc-9213
kind: interoperability-note
summary: 'A targeted cache with longer freshness lifetimes (e.g., CDN-Cache-Control: max-age=3600 vs Cache-Control: max-age=600) may serve responses that appear stale to downstream caches, negatively impacting their cache efficiency. The Age header field propagates this staleness.'
section: "2.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
