document: rfc-1767
kind: normative-requirement
summary: For transmission of sensitive EDI data, appropriate security services such as authentication, privacy, and/or non-repudiation MUST be added, either via Internet MIME-based security services or EDI-based standards. This specification itself provides no security mechanisms.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - email
