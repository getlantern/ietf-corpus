document: rfc-2560
kind: normative-requirement
summary: CAs that support OCSP SHALL provide the capability to include the AuthorityInfoAccess extension in certificates that can be checked using OCSP, and MUST provide for inclusion of a URI accessLocation with the OID id-ad-ocsp for the accessMethod.
section: "3.1"
rfc2119_level: MUST
