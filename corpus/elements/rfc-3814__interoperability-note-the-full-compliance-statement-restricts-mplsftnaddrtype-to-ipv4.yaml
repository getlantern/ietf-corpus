document: rfc-3814
kind: interoperability-note
summary: The full compliance statement restricts mplsFTNAddrType to ipv4(1) or ipv6(2) and address objects to SIZE (4 | 20). Implementations are only required to support the address types actually supported on the LSR, allowing IPv4-only or IPv6-only deployments.
section: "9"
topics:
