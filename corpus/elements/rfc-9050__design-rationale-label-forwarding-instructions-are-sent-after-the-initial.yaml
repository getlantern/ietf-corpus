document: rfc-9050
kind: design-rationale
summary: Label-forwarding instructions are sent after the initial PCInitiate/PCRpt exchange with the ingress PCC so that the PLSP-ID and other LSP identifiers assigned by the ingress can be included in the subsequent label-forwarding instruction PCInitiate messages to all nodes along the path.
