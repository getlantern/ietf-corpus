document: rfc-8145
kind: normative-requirement
summary: A DNS client SHOULD include the edns-key-tag option when issuing a DNSKEY query for a zone corresponding to a trust anchor, and SHOULD also set the DNSSEC OK (DO) bit in the OPT RR.
