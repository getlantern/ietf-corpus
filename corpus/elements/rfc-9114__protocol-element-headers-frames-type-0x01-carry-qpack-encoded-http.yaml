document: rfc-9114
kind: protocol-element
summary: HEADERS frames (type=0x01) carry QPACK-encoded HTTP field sections. They can only be sent on request streams or push streams; receipt on a control stream is a connection error of type H3_FRAME_UNEXPECTED.
