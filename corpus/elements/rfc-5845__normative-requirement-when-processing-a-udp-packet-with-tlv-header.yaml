document: rfc-5845
kind: normative-requirement
summary: When processing a UDP packet with TLV-header format, if the payload packet length calculated from the UDP header length field differs from the length calculated from the TLV-header length field, the receiving node MUST discard the received IP packet.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
    - udp
