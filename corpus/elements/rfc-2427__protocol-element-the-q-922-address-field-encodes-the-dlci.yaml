summary: The Q.922 address field encodes the DLCI in the high-order bits along with C/R (Command/Response), FECN (Forward Explicit Congestion Notification), BECN (Backward Explicit Congestion Notification), DE (Discard Eligibility), and EA (Address Extension) bits. For ARP purposes, C/R, FECN, BECN, and DE are set to zero.
