document: rfc-9885
kind: normative-requirement
summary: The contents of an MP-TLV MUST be processed as if they were concatenated. If the TLV internals contain key information, replication of the key MUST be taken to indicate that subsequent data MUST be processed as if concatenated after a single copy of the key information.
section: "5"
rfc2119_level: MUST
topics:
    - routing
