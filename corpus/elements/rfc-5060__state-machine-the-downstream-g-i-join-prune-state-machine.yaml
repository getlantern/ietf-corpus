document: rfc-5060
kind: state-machine
summary: 'The downstream (*,G,I) join/prune state machine has three states: noInfo(1), join(2), prunePending(3). The prunePending state is entered when a Prune is received and the router waits to see if a downstream router will override it before acting.'
