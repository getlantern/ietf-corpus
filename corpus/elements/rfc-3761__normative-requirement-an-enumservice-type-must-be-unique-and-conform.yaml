document: rfc-3761
kind: normative-requirement
summary: An Enumservice type MUST be unique and conform to the ABNF in Section 2.4.2. Subtypes MUST be unique within a given type. Neither type nor subtype MUST NOT start with 'X-', which is reserved for experimental private use.
section: 3.1.2
rfc2119_level: MUST
topics:
