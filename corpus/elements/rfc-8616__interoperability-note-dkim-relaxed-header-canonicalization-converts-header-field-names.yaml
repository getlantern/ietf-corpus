document: rfc-8616
kind: interoperability-note
summary: DKIM relaxed header canonicalization converts header field names from uppercase to lowercase. Field names are restricted to printable ASCII per RFC 5322, so this case conversion remains ASCII case conversion and is unaffected by internationalization.
