document: rfc-1191
kind: protocol-element
summary: 'Cached PMTU information is aged to handle route changes: when a PMTU value has not been decreased for approximately 10 minutes, the estimate is reset to the first-hop link MTU and all packetization layers using the path are notified, restarting the PMTU Discovery process.'
