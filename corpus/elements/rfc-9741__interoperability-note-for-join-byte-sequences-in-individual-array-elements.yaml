document: rfc-9741
kind: interoperability-note
summary: For .join, byte sequences in individual array elements need not individually be valid UTF-8; only the final concatenated result must be valid UTF-8 if the target is a text string. This contrasts with RFC 8949 Section 3.2.3.
section: "3.1"
