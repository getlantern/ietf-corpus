document: rfc-5287
kind: normative-requirement
summary: 'Specific LDP status codes from RFC 4446 MUST be used to indicate TDM PW setup failures: ''Incompatible bit-rate'' for T1 encapsulation mode or timeslot mismatches, and ''CEP/TDM misconfiguration'' for RTP header, timestamping clock, signaling, trunk framing, or AAL1 mode mismatches.'
section: "5"
rfc2119_level: MUST
topics:
