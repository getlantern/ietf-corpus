document: rfc-8693
kind: normative-requirement
summary: The 'grant_type' parameter MUST be 'urn:ietf:params:oauth:grant-type:token-exchange' to indicate a token exchange request. The 'subject_token' and 'subject_token_type' parameters are also REQUIRED in every token exchange request.
section: "2.1"
rfc2119_level: REQUIRED
topics:
    - oauth
