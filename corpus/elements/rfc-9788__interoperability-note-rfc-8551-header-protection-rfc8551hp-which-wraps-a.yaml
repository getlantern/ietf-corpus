document: rfc-9788
kind: interoperability-note
summary: 'RFC 8551 Header Protection (RFC8551HP), which wraps a message/rfc822 MIME object in the Cryptographic Payload, causes widespread rendering failures in Legacy MUAs: some cannot render message/rfc822 at all, others show the protected message as a forwarded attachment stripped of security indicators. This specification supersedes RFC8551HP.'
section: 1.1.1
topics:
    - email
