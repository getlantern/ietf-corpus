document: rfc-4623
kind: protocol-element
summary: The MRRU (Maximum Reassembled Receive Unit) AVP, attribute number 95, advertises the maximum size of a reassembled frame excluding L2TP encapsulation and L2-specific sublayer. Its presence in a control message signifies the ability to receive and reassemble PW fragments.
section: "5.4"
