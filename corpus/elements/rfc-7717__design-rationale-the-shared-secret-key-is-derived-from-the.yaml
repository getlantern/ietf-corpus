document: rfc-7717
kind: design-rationale
summary: The shared secret key is derived from the IKEv2 SA rather than the child SA because it is possible that an IKEv2 SA is created without generating any child SA (RFC 6023), making the IKEv2 SA a more universally available derivation source.
