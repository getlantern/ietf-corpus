document: rfc-9437
kind: protocol-element
summary: The PubSubKey is a soft- or hard-state security association between an ITR and a Map-Server used to authenticate Map-Notify messages. It may be a pre-shared key or derived via LISP-SEC as PubSubKey = KDF(OTK + nonce), where KDF is identified by the OTK Wrapping ID.
section: "7.1"
topics:
    - routing
    - security
    - crypto
