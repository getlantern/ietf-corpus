document: rfc-9329
kind: wire-format
summary: TCP-encapsulated ESP packets are preceded by a 16-bit Length field (network byte order) specifying the length of the ESP packet including the Length field itself. The ESP SPI MUST NOT be zero, and the Length value MUST NOT be 0 or 1.
section: "3.2"
topics:
    - ipsec
    - vpn
    - tcp
