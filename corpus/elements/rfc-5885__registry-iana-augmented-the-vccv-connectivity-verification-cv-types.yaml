summary: 'IANA augmented the ''VCCV Connectivity Verification (CV) Types'' registry (MPLS) in the Pseudowire Name Spaces with four new BFD CV Type bits: 0x04 (BFD IP/UDP, fault detection only), 0x08 (BFD IP/UDP, fault detection and status signaling), 0x10 (BFD PW-ACH, fault detection only), 0x20 (BFD PW-ACH, fault detection and status signaling).'
