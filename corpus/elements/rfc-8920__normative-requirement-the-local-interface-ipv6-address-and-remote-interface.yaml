document: rfc-8920
kind: normative-requirement
summary: The Local Interface IPv6 Address and Remote Interface IPv6 Address sub-TLVs are application-independent and MUST NOT be advertised in the ASLA sub-TLV; they MAY be advertised as sub-TLVs of the OSPFv3 Router-Link TLV (types 24 and 25, respectively).
section: "9"
rfc2119_level: MUST NOT
topics:
    - routing
