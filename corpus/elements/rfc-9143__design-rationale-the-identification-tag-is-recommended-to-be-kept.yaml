document: rfc-9143
kind: design-rationale
summary: The identification-tag is recommended to be kept short; a 1–3 byte tag results in the minimal number of 32-bit words used for the RTP SDES header extension when using the 1-byte header. The exact frequency of MID transmission is intentionally unspecified, as it depends on packet-loss rate, RTCP reporting interval, and acceptable overhead.
section: "15.2"
topics:
