kind: protocol-element
summary: 'Unavailable Seconds (UASs) are counted as follows: any ten consecutive Severely Error Seconds (SES) trigger UAS state, and those 10 SES are added to the UAS counter when first entering UAS state; each additional UAS increments the counter by one.'
