kind: protocol-element
summary: 'The sendMessage ASI is used to pass a message from the Dispatcher to the appropriate Transport Model. Parameters: IN destTransportDomain, destTransportAddress, outgoingMessage, outgoingMessageLength, tmStateReference; OUT statusInformation. It replaces the previously informal ''Send SNMP Message to Network'' arrows in RFC 3411 scenario diagrams.'
