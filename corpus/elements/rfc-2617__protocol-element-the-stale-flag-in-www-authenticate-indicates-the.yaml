document: rfc-2617
kind: protocol-element
summary: The stale flag in WWW-Authenticate indicates the previous request was rejected only because the nonce was stale but the digest was otherwise valid. When stale=TRUE the client may retry with a new nonce without reprompting the user; stale=FALSE or absent means credentials themselves are invalid.
section: 3.2.1
topics:
    - http
    - security
