document: rfc-8538
kind: protocol-element
summary: A new subcode called 'Hard Reset' (value 9) is defined for BGP Cease NOTIFICATION messages. When the 'N' bit has been exchanged, a Hard Reset signals that the session is to be fully terminated rather than gracefully restarted.
