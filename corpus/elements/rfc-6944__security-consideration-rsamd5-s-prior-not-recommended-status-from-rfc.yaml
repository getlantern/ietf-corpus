document: rfc-6944
kind: security-consideration
summary: RSAMD5's prior 'NOT RECOMMENDED' status from RFC 4034 has been strengthened to 'Must Not Implement' due to known weaknesses in the MD5 hash function. This document does not introduce new security considerations beyond consolidating and clarifying existing algorithm statuses.
