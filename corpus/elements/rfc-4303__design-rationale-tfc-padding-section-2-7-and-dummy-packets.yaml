document: rfc-4303
kind: design-rationale
summary: TFC padding (Section 2.7) and dummy packets (Next Header = 59, Section 2.6) are provided as separate, complementary mechanisms because the 255-byte Padding field alone is too limited to effectively conceal traffic characteristics. Together, they allow variable-length real and dummy packets that better support traffic flow confidentiality.
section: "2.6"
topics:
    - ipsec
    - privacy
    - security
