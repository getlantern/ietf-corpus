document: rfc-6849
kind: registry
summary: 'IANA registered eight new media types for loopback payload formats: audio/encaprtp, video/encaprtp, text/encaprtp, application/encaprtp (encapsulated RTP) and audio/rtploopback, video/rtploopback, text/rtploopback, application/rtploopback (direct loopback). All are framed, RTP-only, LIMITED USE, with required parameter ''rate''.'
section: "14.2"
