document: rfc-2878
kind: normative-requirement
summary: A system MUST NOT transmit a MAC Type numbered higher than 4 unless it has received a MAC-Support Configuration Option from its peer indicating willingness to receive frames of that MAC Type.
section: "4.2"
rfc2119_level: MUST NOT
