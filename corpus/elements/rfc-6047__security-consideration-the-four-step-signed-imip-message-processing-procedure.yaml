document: rfc-6047
kind: security-consideration
summary: 'The four-step signed iMIP message processing procedure: (1) determine the S/MIME signer; (2) correlate the signer to an ATTENDEE or ORGANIZER property; (3) verify the signer is authorized for the operation per iTIP; (4) if all conditions are met, process the message. The signer''s email MUST appear in the rfc822Name field of the subject alternative name extension of the signer certificate.'
section: "3"
topics:
    - email
    - security
    - crypto
    - pkix
