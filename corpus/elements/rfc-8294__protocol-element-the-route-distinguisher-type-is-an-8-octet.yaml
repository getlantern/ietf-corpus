document: rfc-8294
kind: protocol-element
summary: 'The route-distinguisher type is an 8-octet string value used to distinguish routes from different BGP VPNs. It shares the same encoding pattern as route-target: types 0, 1, 2, and 6 as defined in RFC 4360, RFC 5668, and RFC 7432.'
