document: rfc-9256
kind: normative-requirement
summary: When building the MPLS label stack or SRv6 SID list from a segment list, the node MUST interpret segments such that the first segment is the topmost MPLS label or first SRv6 SID (active segment), and the last segment is the bottommost label or last SRv6 SID.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
