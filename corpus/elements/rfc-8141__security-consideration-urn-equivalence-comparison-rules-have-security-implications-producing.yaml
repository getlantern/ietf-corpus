document: rfc-8141
kind: security-consideration
summary: 'URN-equivalence comparison rules have security implications: producing false negatives (treating equivalent URNs as different) or false positives (treating different URNs as equivalent) can create exploitable ambiguity. Namespace definitions must specify equivalence rules carefully and MUST NOT introduce additional false negatives relative to the base procedure.'
section: 6.4.4
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
