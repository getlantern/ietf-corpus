document: rfc-2067
kind: normative-requirement
summary: ULP-id (8 bits) SHALL contain 4. D1_Data_Set_Present SHALL be set. Start_D2_on_Burst_Boundary SHALL be zero. Reserved bits SHALL be zero. D2_Size SHALL contain the byte count of the IEEE 802.2 LLC PDU and SHALL NOT exceed 65,288.
section: "5.1"
rfc2119_level: MUST
