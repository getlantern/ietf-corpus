document: rfc-6733
kind: normative-requirement
summary: A new Command Code MUST be allocated when required AVPs are added to, deleted from, or redefined in an existing command's CCF, or when transport characteristics (e.g., number of round trips) change. Such a CCF change MUST also trigger the definition of a new Diameter application for any application using that command.
section: 1.3.3
rfc2119_level: MUST
topics:
    - diameter
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
