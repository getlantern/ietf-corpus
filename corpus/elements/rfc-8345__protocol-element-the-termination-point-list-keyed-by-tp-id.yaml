document: rfc-8345
kind: protocol-element
summary: The `termination-point` list (keyed by `tp-id` of type `inet:uri`) is augmented into each `node` by `ietf-network-topology`. A termination point anchors links and may represent a port or interface. It may have a `supporting-termination-point` list referencing termination points in underlay nodes.
section: "4.2"
