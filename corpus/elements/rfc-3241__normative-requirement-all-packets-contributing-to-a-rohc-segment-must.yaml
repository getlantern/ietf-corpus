document: rfc-3241
kind: normative-requirement
summary: All packets contributing to a ROHC segment MUST be sent with the same Data Link Layer Protocol Field value (0x0003 or 0x0005). A unit reconstructed from packets with differing Protocol field values MUST be discarded.
section: "4"
rfc2119_level: MUST
topics:
