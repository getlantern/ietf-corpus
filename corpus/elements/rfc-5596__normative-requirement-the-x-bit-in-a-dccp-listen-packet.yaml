document: rfc-5596
kind: normative-requirement
summary: The X bit in a DCCP-Listen packet MUST be set to 1, requiring use of the long (generic) sequence number header, since short sequence numbers cannot be negotiated before a connection is established.
section: 2.2.1
rfc2119_level: MUST
topics:
    - nat
    - congestion
