document: rfc-3805
kind: wire-format
summary: 'hrPrinterDetectedErrorState is an OCTET STRING (SIZE 0..128) with bit-encoded error flags: bit 0=lowPaper, 1=noPaper, 2=lowToner, 3=noToner, 4=doorOpen, 5=jammed, 6=offline, 7=serviceRequested, 8=inputTrayMissing, 9=outputTrayMissing, 10=markerSupplyMissing, 11=outputNearFull, 12=outputFull, 13=inputTrayEmpty, 14=overduePreventMaint. Bit 0 is the MSB of byte 1.'
section: 2.2.13.2.1
