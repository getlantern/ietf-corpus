document: rfc-7880
kind: design-rationale
summary: S-BFD eliminates the requirement for egress nodes to maintain per-path/LSP/function active BFD sessions when only one side desires continuity testing. The Reflector BFD concept replaces a large number of active BFD sessions with a small number of stateless reflectors, significantly reducing total session count in large networks.
section: "8.1"
topics:
    - realtime
