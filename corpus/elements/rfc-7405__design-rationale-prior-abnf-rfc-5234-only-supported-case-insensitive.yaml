document: rfc-7405
kind: design-rationale
summary: Prior ABNF (RFC 5234) only supported case-insensitive string literals; achieving case-sensitive matching required specifying individual characters by numeric value (e.g., %d97 %d98 %d99), which was inconvenient and error prone both to write and read. This document introduces explicit prefix syntax to address that gap.
