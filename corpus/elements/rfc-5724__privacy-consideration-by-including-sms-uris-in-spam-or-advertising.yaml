document: rfc-5724
kind: privacy-consideration
summary: By including 'sms' URIs in spam or advertising, originators may attempt to reveal an individual's phone number or link an email identity to a mobile phone identity. User agents MAY make users aware of this risk before composing or sending SMS messages. User agents that provide no such feedback make users more vulnerable to this attack.
section: "4"
topics:
    - privacy
    - security
