document: rfc-6638
kind: protocol-element
summary: CALDAV:schedule-default-calendar-URL is a WebDAV property on the scheduling Inbox collection that specifies the calendar collection into which new scheduling object resources are automatically placed. Servers MUST reject deletion of the calendar collection referenced by this property.
section: "9.2"
