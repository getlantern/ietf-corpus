document: rfc-5985
kind: security-consideration
summary: Location information is vulnerable to IP address spoofing attacks, which could cause a Device to receive another Device's location. Mitigations include limiting Location URI lifetime via 'expires' and configuring the LIS to invalidate URIs upon detecting Device movement or address changes.
section: "9.3"
topics:
    - security
