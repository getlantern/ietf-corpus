document: rfc-5907
kind: protocol-element
summary: ntpEntHeartbeatInterval (default 60 seconds, read-write) controls the interval for heartbeat notifications. If set to 0 with the heartbeat bit enabled, exactly one heartbeat is sent. The value is stored persistently across restarts.
