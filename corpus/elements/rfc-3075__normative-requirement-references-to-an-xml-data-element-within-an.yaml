document: rfc-3075
kind: normative-requirement
summary: References to an XML data element within an Object element SHOULD identify the actual element pointed to; where the content is non-XML, the reference SHOULD indicate Object as the Type. The Type attribute is advisory and no validation of it is required.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
