document: rfc-7877
kind: design-rationale
summary: SED Groups provide indirect linking between Public Identifiers and SED Records, significantly improving scalability and manageability. A change to a network node used for multiple routes requires only a single SED Record update rather than millions of individual Public Identifier updates.
