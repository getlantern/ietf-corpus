document: rfc-9391
kind: interoperability-note
summary: 'SCHC over NIDD is backward compatible with legacy NB-IoT devices: Non-IP transmission features of the operator network can carry SCHC-compressed packets for devices that do not natively support SCHC, using NGW-PGW or NGW-SCEF as intermediaries.'
