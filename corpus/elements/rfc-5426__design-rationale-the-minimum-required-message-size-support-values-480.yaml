document: rfc-5426
kind: design-rationale
summary: 'The minimum required message size support values (480 octets for IPv4, 1180 octets for IPv6) were derived from the minimum MTU sizes that Internet hosts are required to support: 576 octets for IPv4 (RFC 791) and 1280 octets for IPv6 (RFC 2460). Datagrams conforming to these limits have the greatest chance of delivery without requiring IP fragmentation.'
section: "3.2"
topics:
