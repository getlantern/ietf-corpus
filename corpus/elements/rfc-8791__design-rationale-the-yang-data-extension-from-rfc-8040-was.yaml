document: rfc-8791
kind: design-rationale
summary: 'The ''yang-data'' extension from RFC 8040 was limited in functionality: it assumed top-level use only and did not support augmentation from external modules. RFC 8791 replaces it with the more flexible ''structure'' and ''augment-structure'' extensions to address these gaps.'
section: "1"
