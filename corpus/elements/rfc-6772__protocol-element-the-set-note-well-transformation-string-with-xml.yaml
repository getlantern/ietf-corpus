document: rfc-6772
kind: protocol-element
summary: The <set-note-well> transformation (string with xml:lang attribute) sets a human-readable privacy statement in the PIDF-LO <note-well> element. If absent and the PIDF-LO is newly created, no content is provided for <note-well>.
section: "6.3"
topics:
    - privacy
