document: rfc-7959
kind: security-consideration
summary: All blocks of a resource protected by a security association MUST be subject to the same security checks; it MUST NOT be possible for unprotected exchanges to influence blocks of an otherwise protected resource. Where object security is used, PUT/POST should be implemented atomically.
section: "7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
