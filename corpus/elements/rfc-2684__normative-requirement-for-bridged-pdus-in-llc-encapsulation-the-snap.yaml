document: rfc-2684
kind: normative-requirement
summary: For bridged PDUs in LLC Encapsulation, the SNAP header MUST use OUI 0x00-80-C2 (802.1 organization code) and the two-octet PID MUST specify the bridged media type and whether the original LAN FCS is preserved.
section: "5.2"
rfc2119_level: MUST
