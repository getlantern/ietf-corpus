document: rfc-2446
kind: normative-requirement
summary: When delegating, the Delegator MUST notify the Organizer by sending a REPLY with partstat=DELEGATED and a 'delegated-to' parameter containing the Delegate's calendar address. The Delegate MUST send a REPLY to the Organizer and SHOULD include the 'delegated-from' parameter with the Delegator's address.
section: 3.2.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
