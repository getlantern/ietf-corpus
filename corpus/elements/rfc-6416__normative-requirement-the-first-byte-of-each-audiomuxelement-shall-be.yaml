document: rfc-6416
kind: normative-requirement
summary: The first byte of each audioMuxElement SHALL be located at the first payload location in an RTP packet. A complete audioMuxElement or a part of one SHALL be mapped directly onto an RTP payload without removal of syntax elements.
section: "6.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
