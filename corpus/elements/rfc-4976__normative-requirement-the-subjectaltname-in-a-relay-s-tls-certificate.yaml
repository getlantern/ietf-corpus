document: rfc-4976
kind: normative-requirement
summary: The SubjectAltName in a relay's TLS certificate MUST match the hostname portion of the MSRP URI. The certificate MUST be valid per RFC 3280, including having a valid date and being signed by an acceptable CA.
section: "9.2"
rfc2119_level: MUST
topics:
    - realtime
    - tls
    - pkix
