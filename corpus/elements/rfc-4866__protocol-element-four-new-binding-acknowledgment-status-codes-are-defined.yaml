summary: 'Four new Binding Acknowledgment status codes are defined: 147 (''Permanent home keygen token unavailable''), 148 (''CGA and signature verification failed''), 149 (''Permanent home keygen token exists''), and 150 (''Non-null home nonce index expected''). Each signals a specific authentication failure to the mobile node.'
