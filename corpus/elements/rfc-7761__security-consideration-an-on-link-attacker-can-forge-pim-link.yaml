document: rfc-7761
kind: security-consideration
summary: 'An on-link attacker can forge PIM link-local messages (Hello, Join/Prune, Assert) to disrupt multicast routing on a LAN segment: forged Assert messages can hijack the forwarder role, and forged Hello messages can trigger spurious DR re-elections or advertise false neighbor state.'
section: 6.1.1
topics:
    - security
    - multicast
