document: rfc-3025
kind: design-rationale
summary: The Vendor/Org-ID uses the SMI Network Management Private Enterprise Code (high-order octet=0, low-order 3 octets = enterprise code in network byte order) to uniquely identify vendors/organizations without requiring a new registry, leveraging the existing IANA enterprise number assignment.
