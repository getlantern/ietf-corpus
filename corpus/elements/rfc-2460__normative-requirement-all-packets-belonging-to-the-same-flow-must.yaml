document: rfc-2460
kind: normative-requirement
summary: All packets belonging to the same flow must be sent with the same source address, destination address, and flow label. If any packet includes a Hop-by-Hop Options header, all packets in the flow must carry the same Hop-by-Hop Options header contents.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - qos
