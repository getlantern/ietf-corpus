document: rfc-4933
kind: security-consideration
summary: Authorization information is REQUIRED to create a contact object and is used in query and transfer operations to verify client authorization. Both client and server MUST ensure authorization information is stored and exchanged with high-grade encryption to provide privacy services, as inadvertent disclosure can result in unauthorized transfers and information release.
section: "7"
topics:
