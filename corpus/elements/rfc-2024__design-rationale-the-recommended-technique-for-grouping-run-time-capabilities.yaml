document: rfc-2024
kind: design-rationale
summary: The recommended technique for grouping run-time capabilities exchange is to defer sending a capabilities message until no further capabilities-related SNMP SET changes have arrived for a pre-defined period, thereby batching multiple variable changes into a single over-the-wire message.
section: 2.5.2
topics:
    - snmp
