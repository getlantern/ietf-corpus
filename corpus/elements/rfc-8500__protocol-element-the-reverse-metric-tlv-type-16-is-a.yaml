document: rfc-8500
kind: protocol-element
summary: The Reverse Metric TLV (Type 16) is a new TLV carried inside IS-IS Hello (IIH) PDUs. It contains a 1-octet Flags field, a 3-octet Metric field (24-bit unsigned integer offset), a 1-octet sub-TLV length, and optional sub-TLVs. Total length is variable (5–255 octets).
