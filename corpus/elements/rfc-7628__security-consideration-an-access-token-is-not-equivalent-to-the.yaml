document: rfc-7628
kind: security-consideration
summary: An access token is not equivalent to the user's long-term password. Resource servers should ensure that actions taken in an authenticated channel (e.g., changing passwords via XMPP) are appropriate to the strength of the presented credential.
section: "5"
topics:
    - oauth
    - security
