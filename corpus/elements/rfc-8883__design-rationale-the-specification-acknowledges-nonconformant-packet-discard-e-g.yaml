document: rfc-8883
kind: design-rationale
summary: The specification acknowledges nonconformant packet discard (e.g., intermediate nodes dropping packets they cannot parse for transport-layer filtering) and deliberately provides ICMP error codes for these cases, taking the position that visibility into packet loss is more valuable than withholding error reporting for nonconformant behavior.
section: "1.3"
topics:
