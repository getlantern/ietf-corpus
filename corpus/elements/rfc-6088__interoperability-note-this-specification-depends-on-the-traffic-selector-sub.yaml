document: rfc-6088
kind: interoperability-note
summary: This specification depends on the traffic selector sub-option container format defined in RFC 6089. Implementations must pair these binary selector formats with the sub-option framing from RFC 6089 and must use the TS Format field values defined here to identify which encoding is in use.
