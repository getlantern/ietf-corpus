document: rfc-3986
kind: design-rationale
summary: URI characters are restricted to a limited set (ASCII letters, digits, a few special characters) to support global transcription. The ability to copy a URI from one medium to another (e.g., from a napkin to a keyboard) was prioritized over allowing the most meaningful possible characters.
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
