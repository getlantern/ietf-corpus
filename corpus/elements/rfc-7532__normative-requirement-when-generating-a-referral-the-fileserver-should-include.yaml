document: rfc-7532
kind: normative-requirement
summary: When generating a referral, the fileserver SHOULD include the maximum possible number of FSL records. However, the fileserver MAY omit some FSL records (e.g., due to protocol format limitations) and MAY convert or reduce FSL record contents to match the referral format, attempting to maintain original meaning where possible.
section: 2.8.4
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
