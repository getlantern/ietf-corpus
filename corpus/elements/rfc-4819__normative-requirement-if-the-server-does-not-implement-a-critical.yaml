document: rfc-4819
kind: normative-requirement
summary: If the server does not implement a critical attribute, it MUST fail the add with SSH_PUBLICKEY_ATTRIBUTE_NOT_SUPPORTED. Mere storage of the attribute is insufficient; the server must understand and implement the intent of the attribute.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
