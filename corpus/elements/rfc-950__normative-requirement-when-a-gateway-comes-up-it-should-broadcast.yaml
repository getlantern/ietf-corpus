document: rfc-950
kind: normative-requirement
summary: When a gateway comes up it should broadcast an Address Mask Reply; when a host receives such a message that disagrees with its current mask, it should update its mask to conform to the received value.
section: "2.3"
rfc2119_level: SHOULD
