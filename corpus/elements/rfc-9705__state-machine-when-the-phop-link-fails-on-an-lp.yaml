document: rfc-9705
kind: state-machine
summary: 'When the PHOP link fails on an LP-MP, the LP-MP MUST retain PSB and RSB states until: the Node-ID signaling adjacency with the PHOP PLR goes down, a normal or Remote PathTear is received for its PSB, or a ResvTear is received for its RSB. On PHOP node failure, the LP-MP MUST send a normal PathTear and delete states.'
section: 4.3.2
topics:
    - mpls
    - routing
