document: rfc-3648
kind: normative-requirement
summary: If an ORDERPATCH request changes ordering semantics but does not specify positions for all members, the server MUST assign positions for unspecified members following the last client-specified position. If the request does not change ordering semantics, unspecified member positions MUST remain unchanged.
section: "7"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
