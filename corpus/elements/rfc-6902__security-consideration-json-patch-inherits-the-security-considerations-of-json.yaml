document: rfc-6902
kind: security-consideration
summary: JSON Patch inherits the security considerations of JSON (RFC 4627) and JSON Pointer (RFC 6901). Additionally, some older browsers can be coerced into loading a JSON array as a script, exposing a JSON Patch document containing sensitive information via a Cross-Site Request Forgery (CSRF) attack.
section: "7"
topics:
    - json
    - security
