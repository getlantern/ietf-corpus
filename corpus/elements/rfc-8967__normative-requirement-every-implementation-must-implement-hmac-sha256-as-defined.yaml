document: rfc-8967
kind: normative-requirement
summary: Every implementation MUST implement HMAC-SHA256 as defined in RFC 6234 and RFC 2104. Implementations SHOULD implement keyed BLAKE2s with 128-bit digests, and MAY implement other MAC algorithms.
