document: rfc-3630
kind: protocol-element
summary: The Traffic Engineering LSA is a Type 10 (area-local scope) Opaque LSA used to distribute TE topology information within an OSPF area. It describes routers, point-to-point links, and connections to multi-access networks, analogous to a Router LSA but with extended link attributes.
