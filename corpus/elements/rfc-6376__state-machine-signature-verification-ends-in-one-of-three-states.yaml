document: rfc-6376
kind: state-machine
summary: 'Signature verification ends in one of three states: SUCCESS (successful verification), PERMFAIL (permanent non-recoverable error such as signature verification failure), or TEMPFAIL (temporary recoverable error such as DNS query timeout). The SDID and result MUST be output for SUCCESS and TEMPFAIL.'
section: "3.9"
