document: rfc-8484
kind: wire-format
summary: For GET requests, the DNS wire-format message is encoded as base64url (RFC 4648) without padding and passed as the 'dns' URI Template variable. The example shows a 33-byte DNS query for 'www.example.com' becoming a base64url-encoded path parameter.
section: 4.1.1
