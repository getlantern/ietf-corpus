document: rfc-9264
kind: design-rationale
summary: Extension target attributes are always treated as repeatable (array-valued) in the JSON serialization because, lacking standardization, their cardinality is unknown to generic applications. This avoids ambiguity when round-tripping between formats.
section: 4.2.4.3
topics:
