kind: protocol-element
summary: The docsIetfQosServiceClassTable (CMTS-only, read-create) defines named Service Class templates. When a CM configuration file or DSA message references a Service Class Name, the CMTS expands it into Provisioned, Admitted, and Active QoS Parameter Sets for the new Service Flow.
