document: rfc-1832
kind: wire-format
summary: Variable-length opaque data (opaque identifier<m>) encodes a 4-byte unsigned integer length n, followed by n data bytes, followed by 0–3 zero padding bytes. Default maximum m is 2^32-1. It is an error to encode a length greater than the specified maximum.
section: "3.10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
