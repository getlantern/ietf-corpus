document: rfc-5465
kind: interoperability-note
summary: A server implementing NOTIFY is not required to implement LIST-EXTENDED (RFC 5258), but must be able to return extended LIST responses as defined in RFC 5258, since MailboxName events use extended LIST responses with OLDNAME and attribute data.
