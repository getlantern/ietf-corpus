document: rfc-9557
kind: security-consideration
summary: Where IXDTF timestamps are embedded in access control information or other security-sensitive contexts requiring consistent interpretation across multiple actors, only extensions with a well-understood shared resolution of inconsistent data may be employed. Unresolved inconsistencies between UTC offset and time zone in such contexts can lead to authorization bypasses or incorrect access decisions.
section: "7.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
