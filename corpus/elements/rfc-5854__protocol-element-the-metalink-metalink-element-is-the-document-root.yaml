document: rfc-5854
kind: protocol-element
summary: The 'metalink:metalink' element is the document root element of a Metalink Document, acting as a container for metadata and data. It MUST contain one or more metalink:file child elements, and MAY contain metalink:generator, metalink:origin, metalink:published, and metalink:updated elements (at most one each).
section: 4.1.1
