document: rfc-6072
kind: normative-requirement
summary: User certificates MUST implement sha1WithRSAEncryption and sha256WithRSAEncryption for the signatureAlgorithm. The SubjectAltName must contain a URI type set to the user's SIP AOR URL. A validity period of one year or less is RECOMMENDED.
section: "10.6"
rfc2119_level: MUST
topics:
    - pkix
    - security
    - sip
