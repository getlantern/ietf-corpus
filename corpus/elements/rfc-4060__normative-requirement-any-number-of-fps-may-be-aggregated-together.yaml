document: rfc-4060
kind: normative-requirement
summary: Any number of FPs MAY be aggregated together in an RTP payload and they MUST be consecutive in time. One SHOULD always keep the RTP payload size smaller than the MTU to avoid IP fragmentation.
section: 3.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
