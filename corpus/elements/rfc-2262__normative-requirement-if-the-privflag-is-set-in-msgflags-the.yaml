document: rfc-2262
kind: normative-requirement
summary: If the privFlag is set in msgFlags, the authFlag MUST also be set to one. The SNMP architecture explicitly requires that if privacy is selected, authentication is also required; the combination authFlag=0/privFlag=1 is invalid.
section: "6.4"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
