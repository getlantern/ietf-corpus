document: rfc-4372
kind: normative-requirement
summary: If a CUI attribute was included in an Access-Accept packet, RADIUS clients supporting CUI MUST ensure the CUI attribute appears in all RADIUS Accounting-Request packets (Start, Interim, and Stop), regardless of whether the client originally requested the CUI.
section: "2.1"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
