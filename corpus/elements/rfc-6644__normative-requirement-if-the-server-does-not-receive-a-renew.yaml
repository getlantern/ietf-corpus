document: rfc-6644
kind: normative-requirement
summary: If the server does not receive a Renew, Rebind, or Information-request from the client within REC_TIMEOUT, it retransmits the Reconfigure, doubles REC_TIMEOUT, and repeats. After REC_MAX_RC unsuccessful attempts the server SHOULD abort the reconfigure process for that client.
section: "4"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
