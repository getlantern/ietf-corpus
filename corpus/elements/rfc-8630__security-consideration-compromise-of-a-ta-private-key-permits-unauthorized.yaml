document: rfc-8630
kind: security-consideration
summary: Compromise of a TA private key permits unauthorized parties to masquerade as a TA with potentially severe consequences. Reliance on an inappropriate or incorrect TA has similarly severe consequences. The TAL does not directly list covered resources; the RP must inspect the TA certificate's INR extensions, which allows the issuer to claim authority over any resource.
section: "5"
topics:
