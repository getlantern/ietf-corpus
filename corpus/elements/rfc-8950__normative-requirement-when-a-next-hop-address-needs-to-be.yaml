document: rfc-8950
kind: normative-requirement
summary: When a next-hop address needs to be passed along unchanged (e.g., by a Route Reflector), its encoding MUST NOT be changed. If a particular RR client cannot handle that encoding, the NLRI in question cannot be distributed to that client.
section: "5"
rfc2119_level: MUST NOT
topics:
    - bgp
    - ip
    - v6ops
