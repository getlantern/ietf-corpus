document: rfc-9329
kind: normative-requirement
summary: TCP keep-alives and TLS keep-alives MAY be used but MUST NOT be used as indications of IKE peer liveness; peer liveness MUST be checked using IKE informational packets (RFC 7296).
section: "6.7"
rfc2119_level: MUST NOT
topics:
