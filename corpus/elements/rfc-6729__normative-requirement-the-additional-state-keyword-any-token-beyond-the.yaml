document: rfc-6729
kind: normative-requirement
summary: The additional-state-keyword (any token beyond the registered set) MUST be registered; unregistered keywords may appear as unreg-state-keyword but the expectation is registration. New state keywords require registration in the IANA Registered-states sub-registry.
section: "3"
rfc2119_level: MUST
