document: rfc-1532
kind: normative-requirement
summary: When relaying a BOOTREQUEST, the relay agent MUST increment the 'hops' field and MUST preserve all other BOOTP fields intact. The relay MUST NOT rebroadcast the BOOTREQUEST on the physical interface from which it was received if it arrived as a broadcast.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ip
