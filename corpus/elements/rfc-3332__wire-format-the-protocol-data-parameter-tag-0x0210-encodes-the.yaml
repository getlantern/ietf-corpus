document: rfc-3332
kind: wire-format
summary: 'The Protocol Data parameter (Tag 0x0210) encodes the full MTP3 routing label: Originating Point Code (32 bits), Destination Point Code (32 bits), Service Indicator/SI (8 bits), Network Indicator/NI (8 bits), Message Priority/MP (8 bits), Signalling Link Selection/SLS (8 bits), followed by variable-length User Protocol Data. Point Codes are right-justified; unused bits are coded ''0''.'
section: 3.3.1
topics:
    - realtime
    - voip
