document: rfc-9567
kind: normative-requirement
summary: For the monitoring agent to gain more confidence that the report is not spoofed, the reporting resolver SHOULD send error reports over TCP (RFC 7766) or other connection-oriented protocols, or SHOULD use DNS Cookies (RFC 7873), making it harder to falsify the source address.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - dns
    - security
