summary: 'The subject''s public key is carried in subjectPublicKeyInfo (RFC 5280), containing two sub-fields: algorithm and subjectPublicKey. The algorithm field uses the AlgorithmIdentifier type with the RSA PKCS#1 v1.5 with SHA-256 OID and its associated parameters from RFC 4055 Section 5.'
