document: rfc-4538
kind: wire-format
summary: 'Target-Dialog header field grammar: ''Target-Dialog = "Target-Dialog" HCOLON callid *(SEMI td-param)'' where td-param includes remote-param (''remote-tag'' EQUAL token), local-param (''local-tag'' EQUAL token), or generic-param. The callid value is taken from RFC 3261.'
