document: rfc-7121
kind: interoperability-note
summary: FEPO v1.1 retains backward compatibility with CEs that implement only v1.0 because no existing components were changed — only new datatypes and components were appended. However, v1.0-only CEs cannot use the AllCEs, HAMode, or PrimaryCEChanged features introduced in v1.1.
section: "3.1"
topics:
    - routing
