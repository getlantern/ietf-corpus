document: rfc-7740
kind: protocol-element
summary: The S-PMSI A-D route advertised by PEx includes a PMSI Tunnel Attribute (PTA) with tunnel type set to Ingress Replication, Leaf Information Required flag set, a downstream-allocated MPLS label that peer PEs in the same partition MUST use when sending C-BIDIR flows to PEx, and the Tunnel Identifier set to a routable address of the originator.
section: "2.1"
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
