document: rfc-5663
kind: wire-format
summary: The pnfs_block_volume_type4 enum defines PNFS_BLOCK_VOLUME_SIMPLE (single LU), PNFS_BLOCK_VOLUME_SLICE (portion of another volume with bsv_start, bsv_length, bsv_volume), PNFS_BLOCK_VOLUME_CONCAT (bv_volumes array of indices), and PNFS_BLOCK_VOLUME_STRIPE (bsv_stripe_unit size + bsv_volumes array). These are combined in pnfs_block_deviceaddr4 as an array where the root is the last element.
section: 2.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
