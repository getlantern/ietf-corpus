document: rfc-9784
kind: normative-requirement
summary: A PE supporting vES MUST handle a vES with m EVCs among n ENNIs belonging to p PEs in any arbitrary order, where n >= p >= m >= 2 (R4a). Each vES MUST be identified by its own virtual ESI (vESI) (R4b).
section: "3.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
