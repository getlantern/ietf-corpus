document: rfc-3035
kind: protocol-element
summary: VC-merge is the process by which a switch receives cells on several incoming VCIs and transmits them on a single outgoing VCI without causing cells of different AAL5 PDUs to become interleaved. Most ATM switches do not support this capability.
