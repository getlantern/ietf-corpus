document: rfc-5215
kind: normative-requirement
summary: The Vorbis configuration MUST be conveyed via the signalling channel (e.g., SDP) used to set up the session as initial state. Implementations MUST support in-band delivery of updated codebooks and SHOULD support out-of-band codebook update using a new SDP file.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
