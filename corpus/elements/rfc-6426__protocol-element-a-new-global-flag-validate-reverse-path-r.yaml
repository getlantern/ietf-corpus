document: rfc-6426
kind: protocol-element
summary: 'A new Global flag ''Validate Reverse Path'' (R) is defined in the LSP ping packet header (Global Flags field bit vector: MBZ|R|T|V). When set in an echo request, the Responder SHOULD return a Reverse-path Target FEC Stack TLV in the echo response.'
section: 3.4.1
topics:
