document: rfc-2834
kind: normative-requirement
summary: During registration on a non-broadcast network, the client SHALL retry each non-broadcast HARP server address in the HRAL at least once every 5 seconds until registration completes. The authoritative server SHOULD be considered non-responsive after failing to reply to any two HARP_REQUESTs in the last 120 seconds.
section: 5.1.2
rfc2119_level: SHALL
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
