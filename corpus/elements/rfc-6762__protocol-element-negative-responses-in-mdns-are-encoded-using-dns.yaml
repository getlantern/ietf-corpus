document: rfc-6762
kind: protocol-element
summary: Negative responses in mDNS are encoded using DNS NSEC records. The restricted mDNS NSEC format requires the 'Next Domain Name' field to equal the record's own name, a Type Bit Map block number of 0, and a block length of 1-32 bytes. The NSEC bit MUST NOT be set in synthesized mDNS NSEC records.
section: "6.1"
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
