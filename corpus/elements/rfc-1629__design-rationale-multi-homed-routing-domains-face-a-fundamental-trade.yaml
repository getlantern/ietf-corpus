document: rfc-1629
kind: design-rationale
summary: 'Multi-homed routing domains face a fundamental trade-off across at least four solutions: (1) provider-independent addressing requires worldwide per-organization routing entries; (2) per-provider addressing scales well but lacks automatic backup and requires renumbering on topology change; (3) single-provider-based addressing with selective advertisement; and (4) shared-prefix assignment for cooperative multi-provider groups.'
section: "5.4"
