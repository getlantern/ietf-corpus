document: rfc-9363
kind: normative-requirement
summary: In a compression-rule-entry, matching-operator values other than mo-ignore MUST have a target-value present; mo-msb additionally requires a matching-operator-value argument specifying the number of most significant bits to match. These constraints are enforced via YANG 'must' statements.
section: "5.1"
rfc2119_level: MUST
topics:
    - yang
