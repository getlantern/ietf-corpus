document: rfc-8572
kind: protocol-element
summary: The 'ietf-sztp-conveyed-info' YANG 1.1 module defines a yang-data structure 'conveyed-information' with a mandatory choice between 'redirect-information' (list of bootstrap servers with address, optional port defaulting to 443, optional trust-anchor CMS) and 'onboarding-information' (boot-image, configuration-handling, pre/post-configuration scripts, configuration).
