document: rfc-2239
kind: design-rationale
summary: This MIB is designed as a superset of RFC 1515, which is moved to historic status. It retains all RFC 1515 objects and adds support for 100 Mb/s devices, auto-negotiation on interface MAUs, and jack management, allowing a smooth migration path for existing implementations.
section: "2.1"
topics:
