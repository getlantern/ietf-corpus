document: rfc-3921
kind: normative-requirement
summary: Server routing for message stanzas to a bare JID MUST deliver to the available resource with the highest non-negative priority; if all resources have negative priority or there are no available resources, the server MUST either store the message for later delivery or return an error.
section: "11"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
