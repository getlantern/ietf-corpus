document: rfc-9220
kind: protocol-element
summary: 'HTTP/3 stream closure maps to WebSocket connection closure analogously to TCP: orderly closure is represented as a FIN bit on the stream (Section 4.4 of HTTP/3), and RST exceptions are represented with a stream error of type H3_REQUEST_CANCELLED (Section 8.1 of HTTP/3).'
