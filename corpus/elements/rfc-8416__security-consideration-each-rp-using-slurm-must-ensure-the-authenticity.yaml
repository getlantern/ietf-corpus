document: rfc-8416
kind: security-consideration
summary: Each RP using SLURM MUST ensure the authenticity and integrity of any SLURM file it uses. If the RP updates its SLURM file over the network, it MUST verify the authenticity and integrity of the updated file; the specific mechanism to do so is out of scope for this document.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - bgp
