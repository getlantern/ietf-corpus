document: rfc-6120
kind: wire-format
summary: 'The stream header (<stream:stream>) carries five defined attributes: ''from'' (sender JID), ''to'' (receiver domain), ''id'' (server-generated unique opaque stream identifier), ''xml:lang'' (default natural language), and ''version'' (must be ''1.0'' for XMPP 1.0). The stream namespace prefix maps to ''http://etherx.jabber.org/streams''.'
section: "4.7"
