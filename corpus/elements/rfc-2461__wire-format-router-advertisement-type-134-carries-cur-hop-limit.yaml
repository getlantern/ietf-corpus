document: rfc-2461
kind: wire-format
summary: 'Router Advertisement (Type 134) carries: Cur Hop Limit (8-bit unsigned), M flag (1-bit managed address configuration), O flag (1-bit other stateful configuration), Reserved (6-bit), Router Lifetime (16-bit, seconds, max ~18.2 hours), Reachable Time (32-bit, milliseconds), and Retrans Timer (32-bit, milliseconds). Source MUST be the interface link-local address; Hop Limit is 255.'
section: "4.2"
topics:
