document: rfc-9552
kind: wire-format
summary: The TLV format used in both Link-State NLRIs and the BGP-LS Attribute consists of a 2-octet Type field, a 2-octet Length field (length of Value in octets, zero for no value), and a variable-length Value field. TLVs are not padded to 4-octet alignment.
section: "5.1"
