document: rfc-5557
kind: normative-requirement
summary: The PCReq request message MUST allow requesting the PCE to provide the order in which TE LSPs should be reoptimized (migration path) to minimize traffic disruption, and in response the PCE MUST be able to indicate that order in the PCRep message.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
