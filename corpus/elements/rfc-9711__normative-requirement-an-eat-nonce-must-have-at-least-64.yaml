document: rfc-9711
kind: normative-requirement
summary: An EAT nonce MUST have at least 64 bits of entropy. In CBOR, it MUST be a byte string 8–64 bytes long; in JSON, a text string 8–88 bytes long. All receivers MUST be able to accommodate the maximum size.
section: "4.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
