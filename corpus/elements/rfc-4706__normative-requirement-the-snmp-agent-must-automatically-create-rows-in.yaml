document: rfc-4706
kind: normative-requirement
summary: The SNMP agent MUST automatically create rows in adsl2ChannelStatusTable and adsl2PMChCurrTable when the number of bearer channels increases, and MUST destroy rows in those tables plus adsl2PMChHist15MinTable and adsl2PMChHist1DTable when the count decreases.
