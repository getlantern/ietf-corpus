document: rfc-9360
kind: protocol-element
summary: The 'x5t' header parameter (label 34, value type COSE_CertHash) identifies the end-entity X.509 certificate by a hash thumbprint. It is a two-element array containing the hash algorithm identifier (integer or string from the COSE Algorithms registry) and the binary hash computed over the DER-encoded certificate.
