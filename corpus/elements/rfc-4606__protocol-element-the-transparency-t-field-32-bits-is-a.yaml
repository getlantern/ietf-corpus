document: rfc-4606
kind: protocol-element
summary: 'The Transparency (T) field (32 bits) is a flag vector indicating overhead transparency: Flag 1 (bit 1) requests Section/Regenerator Section layer transparency (entire frames delivered unmodified, pointers cannot be adjusted), and Flag 2 (bit 2) requests Line/Multiplex Section layer transparency (LOH/MSOH delivered unmodified). Transparency applies only to STS-1/STM-0 and STS-3*N/STM-N signal types.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
