document: rfc-8950
kind: normative-requirement
summary: By default, if a BGP session is running over IPvx and the BGP speaker is putting its own address in as the next hop, the next-hop address SHOULD be specified as an IPvx address using the encoding rules of the AFI/SAFI definition. This default may be overridden by policy.
section: "5"
rfc2119_level: SHOULD
topics:
    - bgp
    - ip
    - v6ops
