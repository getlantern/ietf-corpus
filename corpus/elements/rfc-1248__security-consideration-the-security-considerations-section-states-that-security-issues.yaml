document: rfc-1248
kind: security-consideration
summary: The Security Considerations section states that security issues are not discussed in this memo. The MIB does include per-area authentication type (none or simplePassword) and read-write ospfIfAuthKey/ospfVirtIfAuthKey, but authentication key exposure via SNMP GET is prevented by returning a zero-length string.
