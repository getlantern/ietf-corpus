document: rfc-5896
kind: protocol-element
summary: When both deleg_req_flag and deleg_policy_req_flag are set, delegation is attempted unconditionally. deleg_state returns TRUE in both initiator and acceptor on success; deleg_policy_state additionally returns TRUE for the initiator if mechanism-specific policy also recommended delegation.
