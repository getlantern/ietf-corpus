document: rfc-9686
kind: normative-requirement
summary: DHCPv6 relay agents that relay ADDR-REG-INFORM messages directly from clients MUST include the client's link-layer address using the Client Link-Layer Address option (RFC 6939) if they would do so for other DHCPv6 client messages such as Solicit, Request, and Rebind.
section: 4.2.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
