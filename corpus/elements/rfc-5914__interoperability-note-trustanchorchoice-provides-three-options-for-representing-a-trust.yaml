document: rfc-5914
kind: interoperability-note
summary: TrustAnchorChoice provides three options for representing a trust anchor—a bare Certificate, a TBSCertificate with modified extensions, or a TrustAnchorInfo—enabling interoperability with environments that use existing X.509 certificate representations while supporting the richer TrustAnchorInfo format.
