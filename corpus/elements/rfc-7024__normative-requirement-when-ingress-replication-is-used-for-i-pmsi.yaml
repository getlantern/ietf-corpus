document: rfc-7024
kind: normative-requirement
summary: When Ingress Replication is used for I-PMSI P-tunnels in an MVPN with V-hub/V-spoke PEs, the PMSI Tunnel attribute in the I-PMSI A-D route MUST set Tunnel Type to Ingress Replication, MUST set the Leaf Information Required flag to 1, and MUST carry no MPLS labels.
section: "7.9"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
