document: rfc-6716
kind: interoperability-note
summary: The version of SILK used inside Opus is substantially modified from and not compatible with the stand-alone SILK codec previously deployed by Skype. Implementors interested in the original stand-alone SILK codec must refer to the SILK reference separately.
