document: rfc-9849
kind: registry
summary: RFC 9849 creates the new ECH Configuration Extension registry (Section 11.3). Extension types with the high-order bit set are mandatory; clients MUST ignore ECHConfig structures containing unrecognized mandatory extensions. A set of Reserved codepoints is defined for server GREASE use and will never be assigned.
section: "11.3"
topics:
    - tls
    - registry
