document: rfc-5619
kind: design-rationale
summary: EAP SHOULD be used (instead of pre-shared keys or certificates alone) in nomadic cases requiring both machine and user authentication, because pre-shared keys and certificates only support machine authentication and cannot segregate traffic per user.
