document: rfc-9702
kind: protocol-element
summary: Module ietf-mpls-msd augments the IETF MPLS YANG data model (RFC 8960) to expose Node MSD and Link MSD as read-only operational state. Node MSD is the smallest MSD across all links; Link MSD is the MSD supported by a specific interface.
section: "2.2"
topics:
