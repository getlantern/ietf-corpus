document: rfc-2748
kind: normative-requirement
summary: A client handle MUST be explicitly deleted by the PEP before it can be reused for a new request state. Handles referring to different request states MUST be unique within the context of a particular TCP connection and client-type.
section: "2.4"
rfc2119_level: MUST
topics:
    - qos
