document: rfc-9190
kind: state-machine
summary: 'EAP-TLS 1.3 state machine: after the TLS Finished exchange, the server may send post-handshake messages (NewSessionTicket) in one or more EAP-Requests; once all post-handshake messages are sent, the server sends Application Data 0x00 (success indication); after receiving the empty EAP-Response, the server transitions to sending EAP-Success only. TLS Error alerts trigger transition to EAP-Failure only.'
section: "2.5"
topics:
    - tls
