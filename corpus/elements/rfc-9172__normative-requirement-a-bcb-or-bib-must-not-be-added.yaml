document: rfc-9172
kind: normative-requirement
summary: A BCB or BIB MUST NOT be added to a bundle if the 'Bundle is a fragment' flag is set in the bundle processing control flags. Security operations are not applied to fragment bundles due to the complexity of payload-block fragmentation.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
