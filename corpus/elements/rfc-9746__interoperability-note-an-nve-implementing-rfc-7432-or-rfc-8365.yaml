document: rfc-9746
kind: interoperability-note
summary: An NVE implementing RFC 7432 or RFC 8365 but not this specification is assumed to ignore all Flags in the ESI Label Extended Community except the Single-Active bit. This means such NVEs silently treat any SHT value as 00, which triggers the fallback-to-default mechanism in upgraded NVEs.
section: "2.4"
topics:
    - bgp
    - routing
