document: rfc-7730
kind: protocol-element
summary: 'The Relying Party (RP) TAL processing procedure consists of: (1) retrieving the object at one of the TAL''s URIs, (2) confirming it is a current self-signed RPKI CA certificate conforming to RFC 6487, (3) confirming the TAL public key matches the retrieved certificate''s public key, and (4) performing any additional locally-defined checks.'
section: "3"
topics:
