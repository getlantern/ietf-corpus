summary: The <mark:trademark> element represents a registered trademark and contains fields including <mark:id>, <mark:markName>, one or more <mark:holder> elements, <mark:jurisdiction> (two-character WIPO ST.3 code), <mark:goodsAndServices>, <mark:regNum>, <mark:regDate>, and optional <mark:label> (A-label DNS forms), <mark:class> (WIPO Nice Classification), and expiry date.
