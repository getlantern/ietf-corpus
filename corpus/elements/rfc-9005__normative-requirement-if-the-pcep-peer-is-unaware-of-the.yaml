document: rfc-9005
kind: normative-requirement
summary: If the PCEP peer is unaware of the policy parameters associated with the policy and receives the POLICY-PARAMETERS-TLV, it MUST reject the PCEP message and send a PCErr with Error-Type 26 'Association Error' and Error-value 12 'Not expecting policy parameters'.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
