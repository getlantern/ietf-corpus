document: rfc-3108
kind: protocol-element
summary: The 'capability' attribute indicates the ATM Service Category (ATMF) or ATM Transfer Capability (ITU I.371). Supported <asc> values are CBR, nrt-VBR, rt-VBR, UBR, ABR, and GFR; supported <atc> values are DBR, SBR, ABT/IT, ABT/DT, and ABR. An integer <subtype> field further qualifies the service category per ITU Q.2931 and ATMF TM 4.1.
section: 5.6.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
