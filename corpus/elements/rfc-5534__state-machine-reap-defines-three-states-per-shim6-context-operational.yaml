document: rfc-5534
kind: state-machine
summary: 'REAP defines three states per Shim6 context: Operational (address pairs assumed working), Exploring (no traffic received from peer beyond Send Timeout), and InboundOK (traffic received from peer but peer may not be receiving from this node). Transitions are triggered by incoming/outgoing payload packets, Keepalive/Probe message reception, and timer expirations.'
