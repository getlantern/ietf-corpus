document: rfc-9930
kind: normative-requirement
summary: Phase 2 MUST NOT occur if the Phase 1 TLS handshake fails, as an unestablished tunnel would compromise security. A successful TEAP Phase 2 conversation MUST always end with a Crypto-Binding TLV and Result TLV exchange.
section: "3.6"
rfc2119_level: MUST NOT
topics:
