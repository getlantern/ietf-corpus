document: rfc-8615
kind: interoperability-note
summary: Well-known URIs can only be used with URI schemes whose definitions explicitly allow it. The 'http' and 'https' schemes are updated by this document; 'ws' and 'wss' support is defined in RFC 8307. Other schemes must update their definitions independently.
