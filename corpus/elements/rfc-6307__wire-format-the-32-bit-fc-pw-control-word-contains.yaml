document: rfc-6307
kind: wire-format
summary: 'The 32-bit FC PW Control Word contains: 4 reserved bits (set to 0), a 3-bit Payload Type (PT) field, a 1-bit X flag, 2 fragmentation bits (set to 0), a 6-bit Length field, and a 16-bit Sequence Number (set to 0). It precedes an FC Encapsulation Header in every PW packet.'
section: "3.1"
