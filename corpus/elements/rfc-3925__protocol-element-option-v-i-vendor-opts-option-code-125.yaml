document: rfc-3925
kind: protocol-element
summary: OPTION_V-I_VENDOR_OPTS (option code 125) allows DHCP clients and servers to exchange vendor-specific information keyed by 32-bit IANA Enterprise Numbers. Either party may send this option; it may appear in DHCPDISCOVER, DHCPOFFER, DHCPREQUEST, DHCPACK, and DHCPINFORM messages.
section: "4"
topics:
