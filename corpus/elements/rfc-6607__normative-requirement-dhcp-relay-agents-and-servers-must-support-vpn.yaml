document: rfc-6607
kind: normative-requirement
summary: DHCP relay agents and servers MUST support VPN assignment by the relay agent (the approach in Section 4.1). They SHOULD support VPN assignment by the DHCP server (Section 4.2) but SHOULD NOT be configured to operate with both approaches simultaneously.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
