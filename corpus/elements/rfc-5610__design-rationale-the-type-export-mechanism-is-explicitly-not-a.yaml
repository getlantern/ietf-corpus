document: rfc-5610
kind: design-rationale
summary: The type export mechanism is explicitly not a replacement for IANA registration of generally useful Information Elements. It introduces overhead and does not provide the real interoperability achieved by standardization; IANA registration is strongly recommended for new IEs intended for broad use.
section: "1"
topics:
