document: rfc-5779
kind: normative-requirement
summary: When the LMA updates the HAAA with its address, the LMA address information in the request MUST contain either the IP address or the FQDN uniquely identifying the LMA, or both. When HAAA includes MIP6-Agent-Info in an answer back to the LMA (indicating no relocation), it MUST set MIP-Home-Agent-Address to all zeroes and omit MIP-Home-Agent-Host.
section: 4.2.2
rfc2119_level: MUST
topics:
    - diameter
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
