document: rfc-1448
kind: protocol-element
summary: If the GetBulkRequest Response-PDU would exceed the message size limit, the response is generated with fewer variable bindings (those at the end are removed) such that the message size is approximately but not greater than the constraint. If all bindings in an iteration return endOfMibView, the response may be truncated at that iteration.
section: 4.2.3
topics:
