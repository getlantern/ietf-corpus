document: rfc-5269
kind: normative-requirement
summary: The AR MUST have a certificate suitable for a SEND-capable router, support SEND certificate discovery, and include a SEND CGA Option and SEND Signature Option in PrRtAdv messages. Mobile nodes MUST be configured with one or more SEND trust anchors.
section: "3.2"
rfc2119_level: MUST
topics:
