document: rfc-9421
kind: protocol-element
summary: The Accept-Signature HTTP field allows a sender to request that the recipient apply specified signatures to subsequent messages in the exchange. Its value is a Dictionary in the same format as Signature-Input, specifying required labels, covered components, and parameters. The recipient SHOULD apply the requested signatures if capable.
section: "5.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
