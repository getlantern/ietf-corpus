document: rfc-7357
kind: protocol-element
summary: ESADI participation for a VLAN-scoped instance is announced by setting bit 3 (ESADI Participation / ES bit) in the Interested VLANs sub-TLV; for an FGL-scoped instance, bit 3 is set in the Interested Labels sub-TLV [RFC7176]. No Hellos are sent; adjacencies are derived solely from the TRILL IS-IS link state database.
section: "2.2"
topics:
    - routing
