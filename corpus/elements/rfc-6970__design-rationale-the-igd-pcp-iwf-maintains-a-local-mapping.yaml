document: rfc-6970
kind: design-rationale
summary: The IGD-PCP IWF maintains a local mapping table storing all active mappings constructed by internal IGD Control Points. This design choice restricts the amount of PCP messages exchanged with the PCP server, avoiding unnecessary roundtrips for listing or querying mappings.
