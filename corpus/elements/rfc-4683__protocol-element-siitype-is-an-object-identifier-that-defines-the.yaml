document: rfc-4683
kind: protocol-element
summary: SIItype is an Object Identifier that defines the format and scope of the Sensitive Identification Information. For closed communities the CA may assign the OID, but registration is recommended. An example Korean SIItype OID hierarchy is provided under id-KISA { iso(1) member-body(2) 410 200004 }.
