document: rfc-2982
kind: protocol-element
summary: Wildcarding allows a single expression to apply to multiple instances by omitting part or all of the instance portion of an expObjectID and setting expObjectIDWildcard to true. The application performs GetNext-equivalent traversal to discover instances. All wildcarded objects in a single expression must share the same semantics for the missing instance portion.
section: 2.3.2
topics:
    - snmp
