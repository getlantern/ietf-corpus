summary: 'Two ESP Security Associations are created per HIP association: SA-RI (Responder-to-Initiator) and SA-IR (Initiator-to-Responder). The Initiator defines SPI-RI during R1 processing; the Responder defines SPI-IR during I2 processing and communicates it in R2.'
