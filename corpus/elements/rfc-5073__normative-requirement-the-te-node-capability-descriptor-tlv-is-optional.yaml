document: rfc-5073
kind: normative-requirement
summary: The TE Node Capability Descriptor TLV is OPTIONAL and MUST NOT appear more than once in an OSPF Router Information LSA. If it appears more than once, only the first occurrence MUST be processed and others MUST be ignored.
section: "5.1"
rfc2119_level: MUST NOT
topics:
