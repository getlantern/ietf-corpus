document: rfc-2937
kind: design-rationale
summary: To avoid inventing a new namespace, the option reuses existing DHCP option codes (from RFC 2132) to identify name services rather than defining a parallel identification scheme. This allows the search order option to piggyback on already-standardized name service options.
section: Introduction
topics:
