document: rfc-4545
kind: interoperability-note
summary: IPS-AUTH-MIB provides only the set of identity definitions; it does not implement access control lists, login/authentication failure statistics, or notifications. Other MIB modules that require authorization must reference ipsAuthIdentAttributesTable rows via RowPointer and implement their own access list logic.
section: "4"
topics:
