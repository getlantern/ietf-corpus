document: rfc-9972
kind: wire-format
summary: 'Per-AFI/SAFI Statistics encode ''Stat Data'' as an 11-byte value: 2-byte AFI, 1-byte SAFI, and a 64-bit Gauge; ''Stat Len'' MUST be set to 11. Duplicate (AFI, SAFI) pairs MUST NOT appear within the same BMP Statistics Report message.'
section: "3.1"
topics:
