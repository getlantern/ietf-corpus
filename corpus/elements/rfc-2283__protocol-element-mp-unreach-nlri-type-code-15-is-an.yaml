document: rfc-2283
kind: protocol-element
summary: MP_UNREACH_NLRI (Type Code 15) is an optional non-transitive BGP path attribute used to withdraw multiple unfeasible routes from service. It contains one or more triples of <Address Family Identifier, Subsequent Address Family Identifier, Withdrawn Routes>.
