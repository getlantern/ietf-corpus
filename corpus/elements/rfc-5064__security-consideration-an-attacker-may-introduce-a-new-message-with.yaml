document: rfc-5064
kind: security-consideration
summary: An attacker may introduce a new message with the same message identifier to break the URI link to an existing archived message. Countermeasures include checking incoming message identifiers against existing archived ones, discarding duplicates, or using authentication on incoming messages.
section: "3.2"
topics:
    - security
    - email
