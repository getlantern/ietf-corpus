document: rfc-3859
kind: protocol-element
summary: The notify operation has three attributes (watcher, target, TransID) plus content (PRESENCE INFORMATION). The watcher and target values are identical to those in the triggering subscribe operation. There is no application response to the notify operation defined in CPP.
section: "3.1"
topics:
