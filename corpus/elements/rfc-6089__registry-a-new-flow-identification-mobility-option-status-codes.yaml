summary: 'A new ''Flow Identification Mobility Option Status Codes'' namespace is created with defined values: 0 (success), 128 (administratively prohibited), 129 (rejected, unspecified), 130 (malformed), 131 (BID not found), 132 (FID not found), 133 (TS format not supported); 1–127 and 134–250 are unassigned; 251–255 reserved for experiments.'
