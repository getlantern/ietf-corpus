document: rfc-5239
kind: protocol-element
summary: The conference notification service provides updates about conference instance state to authorized parties. Notification content is filtered by conference user identifier and associated role, so users receive only data they are authorized to view. SIP NOTIFY (RFC 3265) with the conferencing event package (RFC 4575) is used for SIP-based notifications.
section: "8.2"
topics:
    - realtime
    - sip
