document: rfc-6141
kind: normative-requirement
summary: A UAS SHOULD only return an error response to a re-INVITE if no changes to the session state have been executed since the re-INVITE was received. Such an error response indicates that no changes were executed as a result of the re-INVITE or any transaction within it.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
