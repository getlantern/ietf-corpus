document: rfc-8075
kind: normative-requirement
summary: An HTTP Accept */* header MUST be mapped to a CoAP request with no Accept option. Failure to map Accept and Accept-* headers SHOULD be silently ignored by forwarding the CoAP request without an Accept option.
section: "6.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
