document: rfc-5557
kind: normative-requirement
summary: The Order TLV MUST be included in the RP object of the PCRep message if the D-bit is set in the RP object of the corresponding PCReq message. The PCE MUST specify the order number in response to such an Order Request.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
