document: rfc-2446
kind: security-consideration
summary: iTIP implementations SHOULD use RFC-1847 (S/MIME multipart/signed and multipart/encrypted) to sign and/or encrypt iTIP transactions, providing data integrity, authentication, and confidentiality. Implementation controls such as filtering unknown or unauthorized organizers and rate-limiting incoming scheduling messages are also recommended.
section: "6.2"
topics:
    - security
    - email
