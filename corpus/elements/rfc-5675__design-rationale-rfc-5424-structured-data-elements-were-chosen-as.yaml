document: rfc-5675
kind: design-rationale
summary: RFC 5424 structured data elements were chosen as the mapping vehicle because they allow carrying SNMP notification information without information loss, unlike earlier SYSLOG formats. The SYSLOG MSG field carries only a free-form human-readable description while the structured data carries the machine-parseable PDU content.
section: "1"
topics:
    - snmp
    - syslog
