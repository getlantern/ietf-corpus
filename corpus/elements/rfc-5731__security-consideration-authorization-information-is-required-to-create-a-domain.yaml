document: rfc-5731
kind: security-consideration
summary: Authorization information is REQUIRED to create a domain object and is used in query and transfer operations as an additional means of determining client authorization. Both client and server MUST ensure that authorization information is stored and exchanged with high-grade encryption to provide privacy services; failure to protect it can result in unauthorized transfers and unauthorized information disclosure.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - dns
