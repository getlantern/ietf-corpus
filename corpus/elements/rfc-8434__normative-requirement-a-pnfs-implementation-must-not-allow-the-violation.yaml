document: rfc-8434
kind: normative-requirement
summary: 'A pNFS implementation MUST NOT allow the violation of NFSv4.1''s access controls: ACLs and file open modes (RFC 5661 Section 12.9). The layout type specification may require the metadata server to update storage devices so they can enforce security; enforcement may be delegated to the storage device (file layout) or to the client (flexible file layout).'
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
