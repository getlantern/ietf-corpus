document: rfc-5965
kind: protocol-element
summary: 'Optional single-occurrence fields include: Original-Envelope-Id (SMTP envelope ID), Original-Mail-From (MAIL FROM address), Arrival-Date (formatted per RFC 5322 section 3.3), Reporting-MTA (generating MTA name), Source-IP (IPv4 or IPv6 of sending MTA), and Incidents (unsigned 32-bit integer count of similar incidents).'
