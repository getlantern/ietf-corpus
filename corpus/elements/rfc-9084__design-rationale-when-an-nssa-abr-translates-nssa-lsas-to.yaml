document: rfc-9084
kind: design-rationale
summary: When an NSSA ABR translates NSSA LSAs to AS-external LSAs, information about the NSSA ASBR or the router outside the OSPF domain is not propagated. The extensions enable this information to be preserved and follow the same ABR inter-area procedures for NSSA translation.
section: "3"
topics:
    - routing
