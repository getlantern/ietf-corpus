document: rfc-4815
kind: errata
summary: 'RFC 3095 Section 5.7.5 was ambiguous about how the R-P (RTP Padding) bit is updated in the context via Extension 3. The corrected rule: if R-PT=1, R-P carries the absolute RTP padding bit value and updates context(R-P); if R-PT=0, context(R-P) is updated to zero regardless.'
section: "6.4"
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
