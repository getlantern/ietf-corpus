document: rfc-7306
kind: normative-requirement
summary: An Immediate Data or Immediate Data with SE Message MUST reference an Untagged Buffer (QN=0), MUST consume exactly one Untagged Buffer, and the DDP layer MUST transmit exactly 8 bytes of data. The Remote Peer MUST check that exactly 8 bytes are present.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
