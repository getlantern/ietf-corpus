document: rfc-9166
kind: design-rationale
summary: IGMP snooping and MLD snooping are defined as separate schema branches rather than a combined branch. This allows each to be supported independently, models minor behavioral differences more cleanly, and is consistent with the approach taken in RFC 8652.
