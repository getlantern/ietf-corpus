document: rfc-8047
kind: protocol-element
summary: 'ESP_INFO processing when received with LOCATOR_SET in an UPDATE covers four cases: (1) OLD==NEW existing SPI is gratuitous for middleboxes; (2) OLD!=NEW non-zero means rekeying existing SA; (3) OLD SPI zero means new SA creation; (4) NEW SPI zero means SA deprecation, setting all uniquely bound locators to DEPRECATED.'
section: "5.2"
topics:
    - ipsec
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
