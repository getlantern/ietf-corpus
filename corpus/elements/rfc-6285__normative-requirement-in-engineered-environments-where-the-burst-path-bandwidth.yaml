document: rfc-6285
kind: normative-requirement
summary: In engineered environments where the burst path bandwidth is known, the BRS MUST transmit burst packets at an initial bitrate higher than the nominal multicast bitrate but within the engineered or reserved bandwidth limit. The BRS MUST continuously monitor for congestion-caused packet loss during the burst.
section: "6.4"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
