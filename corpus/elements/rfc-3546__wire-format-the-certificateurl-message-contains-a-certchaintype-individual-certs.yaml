document: rfc-3546
kind: wire-format
summary: The CertificateURL message contains a CertChainType (individual_certs(0) or pkipath(1)) and a url_and_hash_list (1..2^16-1 bytes). Each URLAndOptionalHash entry has a url (1..2^16-1 bytes), a Boolean hash_present field, and an optional SHA1Hash (20 bytes) of the certificate or chain.
