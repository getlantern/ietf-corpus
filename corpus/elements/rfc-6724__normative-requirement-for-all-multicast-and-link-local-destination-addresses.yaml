document: rfc-6724
kind: normative-requirement
summary: For all multicast and link-local destination addresses, the candidate source address set MUST only include addresses assigned to interfaces on the same link as the outgoing interface. For site-local unicast destinations, the candidate set MUST only include same-site addresses. Multicast addresses and the unspecified address MUST NOT be included in any candidate set.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
