document: rfc-8841
kind: normative-requirement
summary: 'When sending an SDP offer or answer during ICE negotiation, the proto value MUST match the transport of the default candidate: ''UDP/DTLS/SCTP'' for UDP default, ''TCP/DTLS/SCTP'' for TCP default. After ICE nomination, the proto value MUST match the nominated candidate pair''s transport.'
section: "12.2"
rfc2119_level: MUST
topics:
    - sctp
    - webrtc
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
