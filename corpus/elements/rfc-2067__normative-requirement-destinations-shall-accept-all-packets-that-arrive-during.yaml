document: rfc-2067
kind: normative-requirement
summary: Destinations SHALL accept all packets that arrive during a connection and SHALL NOT abort a connection (deassert CONNECT) simply because too many bursts were received. Transient buffer shortages must never cause rejected connections.
section: "5.4"
rfc2119_level: MUST NOT
topics:
    - ip
