document: rfc-3344
kind: normative-requirement
summary: The foreign agent MUST NOT increase the Lifetime selected by the mobile node in the Registration Request, and the home agent MUST NOT increase that Lifetime either. If the Lifetime in the Reply is greater than that in the Request, the Request's Lifetime MUST be used.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
