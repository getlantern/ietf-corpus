document: rfc-3454
kind: security-consideration
summary: Some Unicode code points are invisible. Protocols that permit invisible characters (by not mapping them out or prohibiting them) can cause user confusion when two identical-looking strings do not compare as equal.
section: "9.1"
topics:
    - security
    - privacy
