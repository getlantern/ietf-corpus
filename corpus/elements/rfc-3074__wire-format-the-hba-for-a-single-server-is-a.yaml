document: rfc-3074
kind: wire-format
summary: The HBA for a single server is a 32-octet bitmap. The first octet represents hash values 0-7, the next 8-15, and so on; within each octet the least significant bit represents the smallest hash value. Each bit set to 1 means the server must service requests hashing to that value.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
