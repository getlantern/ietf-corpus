document: rfc-3592
kind: state-machine
summary: Line AIS defect detected as '111' in bits 6-7-8 of K2 byte in 5 consecutive frames; terminated when that pattern absent for 5 consecutive frames. Line AIS failure declared at 2.5 ±0.5 s; cleared when absent 10 ±0.5 s. STS-Path AIS detected as all-ones in H1 and H2 bytes in 3 contiguous frames; terminated on valid STS Pointer with NDF='1001' for 1 frame or '0110' for 3 frames.
section: "3.5"
