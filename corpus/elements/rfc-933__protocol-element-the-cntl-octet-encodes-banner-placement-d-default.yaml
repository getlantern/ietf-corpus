document: rfc-933
kind: protocol-element
summary: 'The CNTL octet encodes banner placement: D (Default, User-Telnet decides), T (Top of screen), B (Bottom of screen), L (Left side, precise meaning TBD), R (Right side, precise meaning TBD). T and B (or R and L) are used together when multiple banners are desired.'
