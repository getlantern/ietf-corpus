document: rfc-4331
kind: interoperability-note
summary: Clients must not assume DAV:quota-used-bytes equals the sum of DAV:getcontentlength properties for a collection's resources, because compression, metadata, and server-inserted content affect actual storage. Furthermore, quota may be tracked per user rather than per collection, so quota-used-bytes on a collection and its members may be identical.
section: "7"
topics:
    - http
