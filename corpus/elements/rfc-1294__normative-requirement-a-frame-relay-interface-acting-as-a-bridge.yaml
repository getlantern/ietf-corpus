document: rfc-1294
kind: normative-requirement
summary: A Frame Relay interface acting as a bridge must be able to flood, forward, and filter packets. Flooding is performed by sending the packet through each relevant DLC; dynamic MAC address learning is required.
section: "13"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
