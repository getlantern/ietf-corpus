document: rfc-8127
kind: design-rationale
summary: The LMA-controlled configuration extension addresses the operational challenge of managing tens of thousands of MAGs in large PMIPv6 deployments (e.g., residential), where aggressive local timer configurations can create unpredictable and excessive signaling load on the LMA. Centralizing control at the LMA provides deterministic load management.
section: "1"
topics:
