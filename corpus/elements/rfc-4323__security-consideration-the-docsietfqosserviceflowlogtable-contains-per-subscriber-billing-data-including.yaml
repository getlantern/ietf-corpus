document: rfc-4323
kind: security-consideration
summary: The docsIetfQosServiceFlowLogTable contains per-subscriber billing data including CM MAC addresses, packet and octet counts, and active session durations. This CMTS-only table must be protected against unauthorized read access to prevent subscriber privacy exposure and billing data tampering.
