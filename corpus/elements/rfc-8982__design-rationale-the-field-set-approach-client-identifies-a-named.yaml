document: rfc-8982
kind: design-rationale
summary: The field set approach (client identifies a named server-defined set) was chosen over explicit field selection (client enumerates individual fields) because RDAP's tree-structured JSON objects and jCard arrays make field-level syntax definition complex, and field sets simplify query strings while facilitating interoperability and result limits.
