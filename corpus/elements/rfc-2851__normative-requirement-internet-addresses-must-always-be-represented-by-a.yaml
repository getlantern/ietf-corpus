document: rfc-2851
kind: normative-requirement
summary: Internet addresses MUST always be represented by a pair of InetAddressType/InetAddress objects. It is not allowed to share an InetAddressType between multiple InetAddress objects, and the InetAddressType object MUST immediately precede the InetAddress object.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
    - ip
