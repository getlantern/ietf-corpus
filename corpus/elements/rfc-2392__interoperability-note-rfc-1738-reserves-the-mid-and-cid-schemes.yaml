document: rfc-2392
kind: interoperability-note
summary: RFC 1738 reserves the 'mid' and 'cid' schemes for Message-ID and Content-ID respectively; this document defines the syntax for those schemes. Implementations must handle addr-spec characters not allowed in URLs via %hh encoding, including '/' which is reserved within the 'mid' scheme.
section: "2"
