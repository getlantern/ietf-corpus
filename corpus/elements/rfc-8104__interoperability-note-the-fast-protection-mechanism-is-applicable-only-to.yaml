document: rfc-8104
kind: interoperability-note
summary: The fast protection mechanism is applicable only to LDP-signaled PWs and requires multihomed CE with redundant PWs. It depends on MPLS upstream label assignment and context-specific label switching (RFC 5331) and is intended to complement, not replace, global repair and control-plane convergence.
section: "4.1"
topics:
    - mpls
    - routing
