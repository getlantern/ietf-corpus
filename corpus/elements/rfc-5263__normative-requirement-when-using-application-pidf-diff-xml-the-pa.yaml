document: rfc-5263
kind: normative-requirement
summary: When using 'application/pidf-diff+xml', the PA MUST include a 'version' attribute initialized to 1 for the first partial notification within a given subscription, and MUST increment it by one with each subsequent partial notification. The version is scoped to the subscription and is only reset when the subscription is terminated, not when refreshed.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
