document: rfc-5571
kind: protocol-element
summary: The RADIUS Delegated-IPv6-Prefix attribute (RFC 4818) in the Access-Accept message must be used by the SC for IPv6 prefix delegation. The SC must associate the DHCP DUID of a DHCPv6 request to the tunnel and its authenticated user.
section: 8.2.1
topics:
