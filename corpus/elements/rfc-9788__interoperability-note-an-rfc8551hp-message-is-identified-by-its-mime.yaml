document: rfc-9788
kind: interoperability-note
summary: 'An RFC8551HP message is identified by its MIME structure: a Cryptographic Envelope whose Cryptographic Payload is a single message/rfc822 object, with no hp= parameter on the Cryptographic Payload or its immediate child. When identified, a conformant MUA may render it by treating the Payload''s immediate child as the Cryptographic Payload.'
section: 4.10.1
topics:
