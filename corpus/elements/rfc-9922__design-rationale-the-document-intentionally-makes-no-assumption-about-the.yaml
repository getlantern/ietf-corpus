document: rfc-9922
kind: design-rationale
summary: The document intentionally makes no assumption about the nature of actions triggered by schedules, and detection/resolution of schedule conflicts are explicitly out of scope. The module is a generic reusable library for scheduling, not a complete scheduling system.
