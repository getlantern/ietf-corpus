document: rfc-9829
kind: normative-requirement
summary: 'An RPKI CA MUST include exactly two extensions in every CRL it issues: an Authority Key Identifier (AKI) and a CRL Number. No other CRL extensions are allowed.'
section: "3.1"
rfc2119_level: MUST
topics:
