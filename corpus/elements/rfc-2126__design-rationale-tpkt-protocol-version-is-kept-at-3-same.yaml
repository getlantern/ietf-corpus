document: rfc-2126
kind: design-rationale
summary: TPKT protocol version is kept at 3 (same as RFC1006) because the changes in ITOT do not conflict with RFC1006; changing the version would have prevented existing RFC1006 implementations from interoperating with the new protocol, unnecessarily fracturing the installed base.
