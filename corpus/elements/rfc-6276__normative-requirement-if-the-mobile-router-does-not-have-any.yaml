document: rfc-6276
kind: normative-requirement
summary: If the mobile router does not have any active delegated prefixes with unexpired leases, the mobile router MUST initiate a DHCPv6 message exchange with a DHCPv6 Solicit message. If the mobile router has one or more active delegated prefixes, it MUST initiate exchange with a DHCPv6 Rebind message.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
