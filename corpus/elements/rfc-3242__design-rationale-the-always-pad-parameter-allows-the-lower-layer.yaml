document: rfc-3242
kind: design-rationale
summary: The ALWAYS_PAD parameter allows the lower layer to use ROHC padding octets as a leading sequence to distinguish RHP from NHP when the link protocol provides no dedicated packet-type field. This sacrifices RHP efficiency slightly but favors the more frequent NHP path.
section: 5.1.1
topics:
