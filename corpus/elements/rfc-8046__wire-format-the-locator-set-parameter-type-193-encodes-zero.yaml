document: rfc-8046
kind: wire-format
summary: The LOCATOR_SET parameter (Type 193) encodes zero or more Locator sub-parameters, each containing an 8-bit Traffic Type, 8-bit Locator Type, 8-bit Locator Length (in 4-byte words), 7-bit Reserved field, 1-bit P (preferred) flag, a 32-bit Locator Lifetime in seconds, and a variable-length Locator field whose length is Locator Length × 4 octets.
