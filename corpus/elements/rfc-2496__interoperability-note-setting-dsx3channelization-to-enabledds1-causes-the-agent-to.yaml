document: rfc-2496
kind: interoperability-note
summary: Setting dsx3Channelization to enabledDs1 causes the agent to create 28 ifEntries of type DS1 in channel order; setting it to disabled destroys them. The dsx1ChanMappingTable entries in the DS1 MIB map DS3 ifIndex and channel number to DS1 ifIndex.
section: 2.2.2
topics:
