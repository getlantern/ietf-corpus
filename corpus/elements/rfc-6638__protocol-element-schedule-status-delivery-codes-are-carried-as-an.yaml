document: rfc-6638
kind: protocol-element
summary: 'SCHEDULE-STATUS delivery codes are carried as an iCalendar property parameter: 1.0 (pending), 1.1 (sent, delivery unknown — typical for iMIP), 1.2 (delivered), 3.7 (unrecognized calendar user address), 3.8 (insufficient privileges), 5.1 (temporary failure, retry possible), 5.2 (permanent routing failure), 5.3 (scheduling rejected permanently).'
section: 3.2.9
topics:
