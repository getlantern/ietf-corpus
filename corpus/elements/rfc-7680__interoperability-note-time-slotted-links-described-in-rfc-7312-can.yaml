document: rfc-7680
kind: interoperability-note
summary: 'Time-slotted links (described in RFC 7312) can greatly modify the sample characteristics of a Poisson stream: unbiased packets with randomized inter-packet intervals may be converted to a new distribution, possibly with strong periodic characteristics, after encountering a time-slotted link.'
