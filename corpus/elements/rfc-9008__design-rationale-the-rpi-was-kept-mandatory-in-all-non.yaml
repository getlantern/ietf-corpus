document: rfc-9008
kind: design-rationale
summary: The RPI was kept mandatory in all Non-Storing downward flows (removing the earlier proposed exception) because RFC 8138 can compress the RPI to three bytes or fewer, removing the bandwidth pressure that motivated the exception and improving compression code-path simplicity.
