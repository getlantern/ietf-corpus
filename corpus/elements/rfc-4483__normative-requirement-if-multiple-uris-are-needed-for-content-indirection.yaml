document: rfc-4483
kind: normative-requirement
summary: If multiple URIs are needed for content indirection, a multipart MIME type must be used. Each URI MUST be contained in a single entity. Indirect content may be mixed with directly-supplied content.
section: "5.11"
rfc2119_level: MUST
topics:
    - sip
    - email
