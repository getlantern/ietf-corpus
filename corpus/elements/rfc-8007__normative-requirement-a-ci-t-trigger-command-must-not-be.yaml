document: rfc-8007
kind: normative-requirement
summary: A CI/T Trigger Command MUST NOT be reported as 'complete' until all actions have been completed successfully. In a CDN cascade, a command MUST NOT be reported as 'complete' until it is 'complete' in all downstream CDNs.
section: "2.3"
rfc2119_level: MUST NOT
topics:
