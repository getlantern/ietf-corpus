document: rfc-1854
kind: interoperability-note
summary: 'Known flaws in deployed servers that break pipelining include: (1) losing data from TCP buffers during connection handoff/process forking mid-dialogue; (2) flushing the TCP input buffer when a command fails; (3) improper correlation of RCPT TO results with subsequent DATA command acceptance.'
