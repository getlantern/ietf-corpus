document: rfc-5239
kind: protocol-element
summary: A conference blueprint is a static conference object describing a typical conference setting supported by the system, including supported media types, participant roles, capacity limits, floor control availability, and sidebar definitions. Each system maintains one or more blueprints that serve as the basis for cloning conference reservations and active conferences.
