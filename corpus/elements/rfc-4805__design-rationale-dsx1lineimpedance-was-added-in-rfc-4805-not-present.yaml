document: rfc-4805
kind: design-rationale
summary: 'dsx1LineImpedance was added in RFC 4805 (not present in RFC 3895) to express nominal line impedance: balanced 100 ohms for T1/J1, unbalanced 75 ohms or balanced 120 ohms for E1. This object provides information needed for physical layer configuration that was not expressible in earlier versions of the MIB.'
