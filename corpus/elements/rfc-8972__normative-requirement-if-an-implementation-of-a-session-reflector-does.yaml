document: rfc-8972
kind: normative-requirement
summary: If an implementation of a Session-Reflector does not recognize the Type field value, it MUST include a copy of the TLV in the reflected STAMP packet, MUST set the U flag to 1, and MUST skip the processing of the unrecognized TLV.
section: "4"
rfc2119_level: MUST
topics:
    - measurement
