document: rfc-8362
kind: protocol-element
summary: 'Nine new OSPFv3 Extended LSA types are defined with LS function codes 33–41 (skipping 38): E-Router-LSA (0xA021), E-Network-LSA (0xA022), E-Inter-Area-Prefix-LSA (0xA023), E-Inter-Area-Router-LSA (0xA024), E-AS-External-LSA (0xC025), E-Type-7-LSA (0xA027), E-Link-LSA (0x8028), and E-Intra-Area-Prefix-LSA (0xA029). These correspond to the eight original fixed-format LSAs with function code incremented by 32 (0x20).'
section: "2"
topics:
