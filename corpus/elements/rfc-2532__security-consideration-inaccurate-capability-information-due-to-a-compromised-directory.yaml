document: rfc-2532
kind: security-consideration
summary: Inaccurate capability information — due to a compromised directory server, improper manual configuration, compromised DNS, or spoofed MDN — could cause a denial of service. Implementations SHOULD provide a mechanism to override cached capability data.
section: "4.1"
topics:
