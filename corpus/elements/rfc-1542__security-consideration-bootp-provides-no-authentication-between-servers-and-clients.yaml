document: rfc-1542
kind: security-consideration
summary: BOOTP provides no authentication between servers and clients, making it vulnerable to rogue servers that can supply false IP addresses, incorrect routing information, and spoofed DNS server addresses. Unauthorized relay agents present similar risks. Malicious clients can masquerade as legitimate ones or exhaust dynamically allocated resources.
section: Security Considerations
topics:
    - security
