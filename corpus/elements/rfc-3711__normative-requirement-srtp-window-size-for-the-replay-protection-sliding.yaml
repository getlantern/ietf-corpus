document: rfc-3711
kind: normative-requirement
summary: SRTP-WINDOW-SIZE for the replay protection sliding window MUST be at least 64 but MAY be set to a higher value. Packets with index lagging more than SRTP-WINDOW-SIZE behind the current context index may be assumed already received.
section: 3.3.2
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
