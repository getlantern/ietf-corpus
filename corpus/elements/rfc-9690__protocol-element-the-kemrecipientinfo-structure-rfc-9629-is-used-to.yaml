document: rfc-9690
kind: protocol-element
summary: 'The KEMRecipientInfo structure (RFC 9629) is used to convey RSA-KEM parameters. Its fields include: version (0), rid (recipient identifier), kem (id-kem-rsa), kemct (ciphertext C), kdf (key derivation function), kekLength (key-encryption key size in octets), ukm (optional random input), wrap (key-encryption algorithm), and encryptedKey (wrapped keying material).'
section: "2.2"
topics:
