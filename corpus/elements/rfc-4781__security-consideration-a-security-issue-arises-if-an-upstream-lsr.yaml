document: rfc-4781
kind: security-consideration
summary: A security issue arises if an upstream LSR continues using labels after expiration of the BGP session that caused their use, while the downstream LSR has already released and re-used those labels, potentially causing misrouting or unauthorized service access. The Restart Time extends the vulnerability window.
section: "8"
topics:
    - bgp
    - mpls
    - security
