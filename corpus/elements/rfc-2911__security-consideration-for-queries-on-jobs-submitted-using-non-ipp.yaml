document: rfc-2911
kind: security-consideration
summary: For queries on jobs submitted using non-IPP protocols (e.g., LPD), the Printer object SHOULD return job information but MAY omit sensitive attributes. The 'job-originating-user-name' for such jobs depends on the authentication information available from the non-IPP protocol.
section: "8.6"
topics:
    - security
