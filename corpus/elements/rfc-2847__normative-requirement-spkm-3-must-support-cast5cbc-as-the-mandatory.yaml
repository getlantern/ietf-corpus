document: rfc-2847
kind: normative-requirement
summary: SPKM-3 MUST support cast5CBC as the mandatory confidentiality algorithm with a keyLength of 128 bits, because 56-bit DES is inadequate and LIPKEY requires strong encryption to protect the password transmitted to the target.
section: 2.3.1
rfc2119_level: MUST
