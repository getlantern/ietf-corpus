document: rfc-7339
kind: normative-requirement
summary: A SIP client SHOULD remove "oc", "oc-validity", and "oc-seq" parameters from all but the topmost Via header of a received response, preventing inadvertently or maliciously injected parameters from propagating upstream.
section: "5.4"
rfc2119_level: SHOULD
topics:
