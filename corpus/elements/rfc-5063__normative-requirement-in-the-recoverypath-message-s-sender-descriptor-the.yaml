document: rfc-5063
kind: normative-requirement
summary: In the RecoveryPath message's sender descriptor, the Recovery Label object MUST be included with the label value copied from the Label object in the most recent Resv message sent to the restarted node. MESSAGE_ID, MESSAGE_ID_ACK, MESSAGE_ID_NACK, and Integrity objects are not copied but regenerated fresh.
section: 4.5.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
