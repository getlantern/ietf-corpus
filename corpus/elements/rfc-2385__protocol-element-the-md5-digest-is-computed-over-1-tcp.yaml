document: rfc-2385
kind: protocol-element
summary: 'The MD5 digest is computed over: (1) TCP pseudo-header (source IP, destination IP, zero-padded protocol number, segment length), (2) TCP header excluding options with checksum set to zero, (3) TCP segment data if any, and (4) a shared key/password known to both endpoints.'
section: "2.0"
topics:
