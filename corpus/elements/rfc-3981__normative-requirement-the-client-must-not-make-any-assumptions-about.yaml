document: rfc-3981
kind: normative-requirement
summary: The client MUST NOT make any assumptions about the contents of a bag when relaying it. A server MUST NOT ignore a bag when received; if a bag cannot be recognized or accepted, one of the bag error codes MUST be returned.
section: "4.4"
rfc2119_level: MUST
topics:
    - registry
