document: rfc-6552
kind: normative-requirement
summary: An implementation SHOULD allow the operator to configure a rank_factor and apply it to all links to multiply the effect of link properties in rank_increase computation. The rank_factor MUST be set between MINIMUM_RANK_FACTOR (1) and MAXIMUM_RANK_FACTOR (4).
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
