document: rfc-6223
kind: normative-requirement
summary: If a SIP entity receives a "keep" parameter with a non-zero value, it MUST use the procedures defined for the Flow-Timer header field (RFC 5626), sending keep-alives at least as often as the recommended frequency, randomly distributed between 80% and 100% of that value.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
