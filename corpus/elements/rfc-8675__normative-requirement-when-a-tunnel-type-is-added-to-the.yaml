document: rfc-8675
kind: normative-requirement
summary: When a tunnel type is added to the 'tunnelType' subregistry, a new 'identity' statement must be added to the iana-tunnel-type YANG module, using the lower-case of the corresponding IANAifType-MIB enumeration as the identity name.
section: "4.1"
rfc2119_level: MUST
