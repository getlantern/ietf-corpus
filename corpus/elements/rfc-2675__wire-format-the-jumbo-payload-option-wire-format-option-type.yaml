document: rfc-2675
kind: wire-format
summary: 'The Jumbo Payload option wire format: Option Type (8-bit, value 0xC2), Opt Data Len (8-bit, value 4), Jumbo Payload Length (32-bit unsigned integer). The Jumbo Payload Length excludes the IPv6 header but includes the Hop-by-Hop Options header and any other extension headers present.'
