document: rfc-4865
kind: security-consideration
summary: Future message release intentionally delays delivery, creating an element of deception. The RFC 2822 Date header and message trace fields are not required to be modified to reflect the release delay; recipients receive the original submission timestamp.
section: "6"
topics:
