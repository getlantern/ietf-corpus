document: rfc-3834
kind: design-rationale
summary: The Subject field prefix 'Auto:' is specified only as an aid to humans and SHOULD NOT be machine-parsed as proof of automatic submission, because mail user agents may translate it just as they translate 'Re:' — making it an unreliable programmatic signal.
section: 3.1.5
topics:
    - email
