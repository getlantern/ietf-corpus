document: rfc-5939
kind: security-consideration
summary: When session-level attribute capabilities are referenced in media-level potential configurations, individual media streams may end up with inconsistent combinations of session-level attributes, leading to undefined behavior. If interaction between a session-level attribute and other attributes is possible, the entity generating the SDP SHOULD NOT assume well-defined operation at the receiver, making such mechanisms unsuitable for security-critical use.
section: 3.5.1
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
