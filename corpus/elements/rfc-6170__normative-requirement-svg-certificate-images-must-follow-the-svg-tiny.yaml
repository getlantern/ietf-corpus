document: rfc-6170
kind: normative-requirement
summary: SVG certificate images MUST follow the SVG Tiny 1.2 profile and MUST NOT contain any IRI references to external resources of type B, C, or D (per SVG Tiny 1.2 Section 14.1.4), and MUST NOT contain any 'script' element.
section: "5.2"
rfc2119_level: MUST NOT
