document: rfc-5958
kind: protocol-element
summary: 'PrivateKeyInfo is defined as an alias for OneAsymmetricKey to maintain backwards compatibility with RFC 5208 and PKCS #12. When version is v1 and no v2 fields are used, the structure is identical to the original RFC 5208 PrivateKeyInfo.'
