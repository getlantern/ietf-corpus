document: rfc-3850
kind: normative-requirement
summary: Receiving agents MUST support the CRL format defined in RFC 3280. Both v1 and v2 CRLs MUST be supported. All agents MUST be capable of performing revocation checks using CRLs and MUST perform revocation status checking per RFC 3280.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - security
