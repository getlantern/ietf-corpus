document: rfc-7434
kind: interoperability-note
summary: ISDN call transfer cancels all ISDN User-to-User supplementary services; therefore UUI header fields cannot be exchanged in transactions clearing down the SIP dialog after call transfer has occurred. ISDN conferencing also precludes UUS1 implicit.
section: "3.2"
topics:
    - sip
    - realtime
    - voip
