document: rfc-4033
kind: protocol-element
summary: The Key Signing Key (KSK) signs one or more other authentication keys for a zone (typically the ZSK), while the Zone Signing Key (ZSK) signs zone data. This distinction is purely operational; DNSSEC validation does not differentiate between them, and a single key may serve both roles.
