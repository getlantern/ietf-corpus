document: rfc-5227
kind: normative-requirement
summary: During probing, if the host receives any ARP packet (Request or Reply) where the 'sender IP address' is the address being probed, the host MUST treat the address as in use and indicate to the configuring agent that the address is not acceptable.
section: 2.1.1
rfc2119_level: MUST
topics:
    - ip
