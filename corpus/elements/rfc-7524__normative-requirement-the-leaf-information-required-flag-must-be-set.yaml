document: rfc-7524
kind: normative-requirement
summary: The 'Leaf Information Required' flag MUST be set in VPLS A-D routes and VPLS S-PMSI A-D routes when re-advertised by ingress or egress ABRs, with the same exception as for MVPN (no aggregation policy and mLDP used for intra-area transport). ABRs re-advertising VPLS A-D routes MUST NOT modify the BGP Next Hop.
section: 5.2.2
rfc2119_level: MUST
topics:
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
