document: rfc-2743
kind: design-rationale
summary: 'prot_ready_state achieves full backward compatibility with GSS-V1 callers: V1 callers unaware of prot_ready_state receive expected behavior from GSS_S_COMPLETE without early per-message access, while V2 callers can optionally use per-message protection before full context establishment, enabling pipelined data transfer during handshakes.'
section: 1.2.7
topics:
    - security
