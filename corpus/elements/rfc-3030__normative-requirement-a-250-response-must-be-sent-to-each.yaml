document: rfc-3030
kind: normative-requirement
summary: A 250 response MUST be sent to each successful BDAT data block. If a failure occurs, the receiver-SMTP MUST accept and discard the associated message data before sending the 5XX or 4XX error code.
section: "2"
rfc2119_level: MUST
