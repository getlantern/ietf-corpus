document: rfc-7518
kind: normative-requirement
summary: A key of the same size as the hash output or larger MUST be used with HMAC SHA-2 algorithms. For HS256, HS384, and HS512, this means minimum key sizes of 256, 384, and 512 bits, respectively.
section: "3.2"
rfc2119_level: MUST
