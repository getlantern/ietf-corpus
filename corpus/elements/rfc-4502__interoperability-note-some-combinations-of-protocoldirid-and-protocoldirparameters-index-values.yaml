document: rfc-4502
kind: interoperability-note
summary: Some combinations of protocolDirID and protocolDirParameters index values may result in an SNMP OID exceeding 128 sub-identifiers, which exceeds the SNMP protocol maximum. Implementations must take care to avoid such combinations when constructing table indexes.
