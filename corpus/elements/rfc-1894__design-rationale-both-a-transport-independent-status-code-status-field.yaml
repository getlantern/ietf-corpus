document: rfc-1894
kind: design-rationale
summary: Both a transport-independent status code (Status field) and a transport-specific diagnostic code (Diagnostic-Code field) are provided because translation to a generic status code may lose precision. The Diagnostic-Code retains the original transport error for trouble tickets and tunneling of foreign NDNs.
section: 2.3.6
topics:
    - email
