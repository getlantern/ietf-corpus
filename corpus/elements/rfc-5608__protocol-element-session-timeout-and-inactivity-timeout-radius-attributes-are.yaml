document: rfc-5608
kind: protocol-element
summary: Session-Timeout and Inactivity-Timeout RADIUS attributes are used to limit the extent of a secure transport session carrying SNMP traffic. Session-Timeout sets the maximum session duration in seconds; Inactivity-Timeout sets the maximum idle time before disconnection.
section: "2.3"
topics:
    - radius
    - snmp
