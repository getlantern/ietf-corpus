document: rfc-5066
kind: wire-format
summary: EfmProfileIndexList is an OCTET STRING (SIZE 0..6) where each octet encodes an 8-bit EfmProfileIndex value (1–255); a zero-length string is object-specific. It represents a list of up to 6 profile indices, any of which may be selected for PME configuration.
