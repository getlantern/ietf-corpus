document: rfc-6765
kind: protocol-element
summary: gBondBce group contains gBondBceConfRemoteDiscoveryCode (PhysAddress, 6 octets) per BCE. Writing this object from a -O subtype BCE performs an atomic Set-if-Clear operation on the remote BCE's discovery register via the G.994.1 handshake protocol to assign BCEs to aggregation groups.
