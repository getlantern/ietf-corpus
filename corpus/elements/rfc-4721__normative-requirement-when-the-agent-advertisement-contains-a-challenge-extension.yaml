document: rfc-4721
kind: normative-requirement
summary: When the Agent Advertisement contains a Challenge extension and the mobile node has no security association with the foreign agent, the mobile node MUST include the Challenge value in a Mobile-Foreign Challenge extension to the Registration Request.
section: "3.1"
rfc2119_level: MUST
