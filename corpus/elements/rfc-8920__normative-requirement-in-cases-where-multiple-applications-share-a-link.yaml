document: rfc-8920
kind: normative-requirement
summary: In cases where multiple applications share a link and one is RSVP-TE, attributes for applications other than RSVP-TE MUST be advertised using application-specific advertisements even when legacy RSVP-TE advertisements are also present.
section: 12.2.1
rfc2119_level: MUST
topics:
    - routing
