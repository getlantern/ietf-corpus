document: rfc-2574
kind: security-consideration
summary: USM protects against modification of information and masquerade (principal threats) and provides limited protection against disclosure and message stream modification (replay/delay within 150 seconds). It explicitly does not protect against denial-of-service or traffic analysis, as these are indistinguishable from normal network failures or predictable management patterns.
section: "1.1"
topics:
    - snmp
    - security
