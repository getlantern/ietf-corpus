document: rfc-7865
kind: protocol-element
summary: The Participant class ('participant' element) describes a device involved in a CS and/or contributing or consuming media streams. Its attributes are nameID (list of (Name, AoR) tuples where AoR is a SIP/SIPS/tel URI, FQDN, or IP address) and participant_id (base64 UUID). The SRC should create participant objects for all known participants even without direct signaling relationships.
section: "6.5"
topics:
    - sip
    - realtime
