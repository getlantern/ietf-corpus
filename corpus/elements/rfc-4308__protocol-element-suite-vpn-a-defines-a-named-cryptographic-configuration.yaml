document: rfc-4308
kind: protocol-element
summary: Suite 'VPN-A' defines a named cryptographic configuration for IPsec VPNs matching commonly used corporate VPN security at the time of publication. IPsec uses ESP with TripleDES-CBC encryption and HMAC-SHA1-96 integrity; IKE/IKEv2 uses TripleDES-CBC encryption, HMAC-SHA1 PRF, HMAC-SHA1-96 integrity, and 1024-bit MODP Diffie-Hellman.
section: "2.1"
topics:
    - ipsec
    - vpn
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
