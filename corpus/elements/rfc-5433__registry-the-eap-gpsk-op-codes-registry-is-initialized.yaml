kind: registry
summary: 'The ''EAP-GPSK OP Codes'' registry is initialized with: 0x00 (Reserved), 0x01 (GPSK-1), 0x02 (GPSK-2), 0x03 (GPSK-3), 0x04 (GPSK-4), 0x05 (GPSK-Fail), 0x06 (GPSK-Protected-Fail). The field is 8 bits; all other values require IANA registration.'
