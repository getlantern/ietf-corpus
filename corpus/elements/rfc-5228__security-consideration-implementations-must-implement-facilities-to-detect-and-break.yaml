document: rfc-5228
kind: security-consideration
summary: Implementations MUST implement facilities to detect and break message loops (per SMTP section 6.2), MUST provide means for administrators to limit redirect use (including limiting the number of redirects per script, with a SHOULD of 1 if no multi-destination use case exists), and MUST log redirect use to facilitate abuse tracking.
section: "10"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
