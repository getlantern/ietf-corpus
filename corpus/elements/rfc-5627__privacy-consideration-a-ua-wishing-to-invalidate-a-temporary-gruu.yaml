document: rfc-5627
kind: privacy-consideration
summary: A UA wishing to invalidate a temporary GRUU to limit reachability SHOULD change the Call-ID in a REGISTER refresh rather than forcefully expiring and re-registering, which would cause unnecessary unreachability. The specification does not provide the ability to invalidate individual temporary GRUUs.
section: "10.3"
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
