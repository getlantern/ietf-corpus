document: rfc-7783
kind: normative-requirement
summary: When conflicting Affinity sub-TLVs advertise the same virtual RBridge as child in the same tree, the RBridge with the highest priority to be a tree root retains the affinity association; lower-priority RBridges MUST stop advertising conflicting Affinity sub-TLVs, recalculate, and if appropriate advertise new non-conflicting ones.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
