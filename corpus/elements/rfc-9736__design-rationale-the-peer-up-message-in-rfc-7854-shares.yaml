document: rfc-9736
kind: design-rationale
summary: The Peer Up message in RFC 7854 shares a TLV namespace with the Initiation message. Experience showed this was a mistake because it hampers extension of the protocol, motivating the creation of a separate namespace for Peer Up.
section: "1"
