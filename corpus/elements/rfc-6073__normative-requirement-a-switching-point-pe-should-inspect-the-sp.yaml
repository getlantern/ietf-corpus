document: rfc-6073
kind: normative-requirement
summary: A switching point PE SHOULD inspect the SP-PE TLV to verify its own IP address does not appear; if detected, the PE SHOULD break the loop and send a Label Release with error code 0x0000003A 'PW Loop Detected'.
section: "7.6"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
