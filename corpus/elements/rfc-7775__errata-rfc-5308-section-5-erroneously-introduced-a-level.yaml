document: rfc-7775
kind: errata
summary: RFC 5308 Section 5 erroneously introduced a 'Level 2 down prefix' route type and associated preference rule. No such route type is defined by RFC 5302, and this document corrects RFC 5308 to eliminate that route type, aligning IPv6 behavior with IPv4.
section: "2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
