document: rfc-2373
kind: protocol-element
summary: 'Interface identifiers in IPv6 unicast addresses must be unique on their link and are required to be 64 bits long in EUI-64 format for many address types. The ''u'' (universal/local) bit must be inverted when forming an interface identifier from an EUI-64 token: ''1'' means global scope, ''0'' means local scope.'
section: 2.5.1
topics:
