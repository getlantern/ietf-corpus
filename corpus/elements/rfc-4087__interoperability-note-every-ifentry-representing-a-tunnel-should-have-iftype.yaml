document: rfc-4087
kind: interoperability-note
summary: Every ifEntry representing a tunnel should have ifType set to tunnel(131). An entry in the IP Tunnel MIB exists for every ifEntry with this ifType. Creating a tunnel via SNMP also instantiates rows in ifTable and tunnelIfTable; deleting it removes those rows.
section: 3.1.3
topics:
    - snmp
    - ip
