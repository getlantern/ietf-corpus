document: rfc-9071
kind: security-consideration
summary: The RTP-mixer model requires the mixer to decrypt, repack, and re-encrypt secured text from all conference participants, so the mixer must be fully trusted for confidentiality and integrity of real-time text data — analogous to the trust model for centralized audio/video mixers.
