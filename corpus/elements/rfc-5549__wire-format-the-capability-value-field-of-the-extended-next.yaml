summary: 'The Capability Value field of the Extended Next Hop Encoding capability consists of N triples, each 6 octets: NLRI AFI (2 octets), NLRI SAFI (2 octets), Nexthop AFI (2 octets). For IPv4 NLRI with IPv6 NH: NLRI AFI=1, NLRI SAFI=1/2/4/128, Nexthop AFI=2.'
