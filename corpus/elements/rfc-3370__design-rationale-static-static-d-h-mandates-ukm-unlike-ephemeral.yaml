document: rfc-3370
kind: design-rationale
summary: Static-Static D-H mandates ukm (unlike Ephemeral-Static where it is optional) because the same static key pair is reused across multiple messages. Without ukm, every message between the same sender and recipient would generate the same key-encryption key.
section: 4.1.2
topics:
    - crypto
    - security
