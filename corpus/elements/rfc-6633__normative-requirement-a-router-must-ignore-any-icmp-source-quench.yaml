document: rfc-6633
kind: normative-requirement
summary: A router MUST ignore any ICMP Source Quench messages it receives. This updates RFC 1812 Section 4.3.3.3; there are no valid reasons for a router to react to these messages in the current Internet.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - congestion
