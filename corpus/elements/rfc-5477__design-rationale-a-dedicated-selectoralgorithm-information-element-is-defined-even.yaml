document: rfc-5477
kind: design-rationale
summary: A dedicated selectorAlgorithm Information Element is defined even though the selection method can sometimes be inferred from the presence of other IEs. The explicit IE is required so it can be used as scope in Selector Report Interpretation Options Templates, providing unambiguous binding between reported statistics and the selection method that generated them.
section: "7"
topics:
