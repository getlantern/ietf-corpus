document: rfc-4675
kind: protocol-element
summary: The Egress-VLAN-Name attribute (Type 58) identifies an allowed egress VLAN by its administratively assigned name (IEEE 802.1Q clause 12.10.2.1.3) rather than by VLAN-ID. Multiple instances may appear, each adding a named VLAN to the allowed egress list.
