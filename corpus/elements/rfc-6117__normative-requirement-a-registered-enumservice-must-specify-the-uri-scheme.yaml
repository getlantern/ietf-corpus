document: rfc-6117
kind: normative-requirement
summary: A registered Enumservice MUST specify the URI Scheme(s) that may be used for the Enumservice, and MUST define how to use the NAPTR RR and the URI(s) it resolves to, enabling it to function as a selection mechanism for NAPTR records.
section: "3.1"
rfc2119_level: MUST
topics:
