document: rfc-3443
kind: state-machine
summary: In the Short Pipe Model without PHP, the outer (tunnel) TTL is independent of the tunneled packet TTL. The tunneled packet TTL is decremented by exactly two across the entire LSP (once at ingress Push, once at egress Pop).
