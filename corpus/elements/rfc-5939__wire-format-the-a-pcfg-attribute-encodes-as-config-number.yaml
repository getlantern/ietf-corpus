document: rfc-5939
kind: wire-format
summary: 'The ''a=pcfg'' attribute encodes as: config-number (1–10 DIGIT) optionally followed by a pot-cfg-list of space-separated configurations. Attribute config lists use the form ''a=[delete-attributes:]mo-att-cap-list(|mo-att-cap-list)*''; transport config lists use ''t=trpr-cap-num(|trpr-cap-num)*''; extension config lists use ''[+]ext-cap-name=ext-cap-list''. No whitespace is permitted within config list productions.'
section: 3.5.1
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
