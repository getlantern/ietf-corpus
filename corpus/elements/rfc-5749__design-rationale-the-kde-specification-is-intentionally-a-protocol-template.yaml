document: rfc-5749
kind: design-rationale
summary: The KDE specification is intentionally a protocol template that does not define message formats, data encoding, or other implementation details. It must be instantiated for a specific AAA protocol (RADIUS or Diameter) before it can be implemented, allowing reuse across different AAA deployments.
