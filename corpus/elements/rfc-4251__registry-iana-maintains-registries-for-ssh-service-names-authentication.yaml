document: rfc-4251
kind: registry
summary: IANA maintains registries for SSH service names, authentication methods, connection protocol channel/request names, key exchange method names, and assigned algorithm names (encryption, MAC, public key, compression). All IANA-registered names require IETF CONSENSUS. Message numbers 0–191 are allocated by IETF CONSENSUS; 192–255 are PRIVATE USE.
