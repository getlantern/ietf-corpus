document: rfc-8210
kind: normative-requirement
summary: Caches MUST set the Expire Interval to a value larger than either the Refresh Interval or the Retry Interval. The router MUST NOT retain data past the time indicated by the Expire Interval.
section: "6"
rfc2119_level: MUST
topics:
    - routing
    - bgp
