document: rfc-6221
kind: normative-requirement
summary: In Relay-Forward messages created by the LDRA, the link-address parameter MUST be set to the Unspecified Address (::), the peer-address MUST be set per Section 6.1, and the Interface-ID option MUST be included.
section: "5.1"
rfc2119_level: MUST
