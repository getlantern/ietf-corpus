document: rfc-4390
kind: design-rationale
summary: To desynchronize the burst of broadcast responses at subnet startup, RFC 2131 recommends that clients wait a random time (1–10 seconds) before initiating server discovery. This same random delay naturally spreads out DHCP server broadcast responses triggered by the mandatory use of the BROADCAST flag over IPoIB.
