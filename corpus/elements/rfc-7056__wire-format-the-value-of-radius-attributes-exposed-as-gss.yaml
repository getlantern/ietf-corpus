document: rfc-7056
kind: wire-format
summary: The value of RADIUS attributes exposed as GSS name attributes is the raw octets of the RADIUS packet; integers are in network byte order. The display value SHOULD be a human-readable string if the implementation knows the attribute type.
section: "5"
