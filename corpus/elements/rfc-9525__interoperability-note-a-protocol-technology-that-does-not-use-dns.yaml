document: rfc-9525
kind: interoperability-note
summary: A protocol technology that does not use DNS SRV records MUST state that SRV-ID is not supported. Similarly, a technology that does not use URIs to identify application services MUST state that URI-ID is not supported. A technology MAY disallow wildcard certificates entirely, in which case it MUST state so.
section: "3"
topics:
    - tls
    - pkix
