document: rfc-2616
kind: security-consideration
summary: 'DNS spoofing is a risk for HTTP clients and caching proxies: a hostile DNS server can cause misdirected requests. HTTP security relies on the security of DNS; clients and proxies that cache DNS lookups should apply short TTLs and re-verify host identity when handling sensitive operations.'
section: "15.3"
topics:
    - http
    - security
    - dns
