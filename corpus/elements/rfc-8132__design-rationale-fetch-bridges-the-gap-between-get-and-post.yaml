document: rfc-8132
kind: design-rationale
summary: 'FETCH bridges the gap between GET and POST: it allows passing query parameters in the request body (like POST) while retaining safe and idempotent semantics. This enables cacheable, server-side selection of resource subsets without the URI size limitations and character set constraints that GET would impose.'
section: "1.1"
topics:
