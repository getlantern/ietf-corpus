document: rfc-8559
kind: protocol-element
summary: The Operator-NAS-Identifier attribute (Type 241.8) is a new opaque token that identifies an individual NAS within a visited network. It MAY appear in Access-Request, Accounting-Request, CoA-Request, or Disconnect-Request packets, and MUST NOT appear in any other packet types. Only the visited network (operator) may create this attribute.
section: "3.4"
topics:
