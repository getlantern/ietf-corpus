document: rfc-6339
kind: protocol-element
summary: GSS_Decapsulate_token() removes the mechanism-independent token header from an initial GSS-API context token, validating the OID and ASN.1 DER structure. Returns GSS_S_COMPLETE, GSS_S_DEFECTIVE_TOKEN (OID mismatch or ASN.1 DER length errors), or GSS_S_FAILURE.
