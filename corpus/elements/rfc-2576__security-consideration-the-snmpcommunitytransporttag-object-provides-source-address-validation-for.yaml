document: rfc-2576
kind: security-consideration
summary: The snmpCommunityTransportTag object provides source address validation for incoming SNMPv1/SNMPv2c requests, allowing administrators to restrict which transport endpoints may use a given community string. A zero-length tag disables this check, accepting requests from any source.
section: "5.3"
topics:
    - snmp
    - security
