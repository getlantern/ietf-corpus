document: rfc-8466
kind: protocol-element
summary: 'QoS classification policy rules support two match types: match-flow (dscp, dot1q, pcp, src-mac, dst-mac, color-type, target-sites, any, vpn-id) and match-application (identityref). Matched flows are assigned a target-class-id for downstream QoS treatment via standard (pre-defined provider profile) or custom (per-class bandwidth, delay, jitter, loss) QoS profiles.'
section: 5.10.2
topics:
