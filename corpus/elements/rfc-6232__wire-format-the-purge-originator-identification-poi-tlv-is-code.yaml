summary: The Purge Originator Identification (POI) TLV is CODE 13, with a LENGTH field covering the total value, a 1-octet count of system IDs (values 1 or 2 only), the system ID of the IS that inserted the TLV, and an optional system ID of the IS from which the purge was received.
