document: rfc-8226
kind: security-consideration
summary: The TNAuthList extension can divulge to relying parties extraneous telephone numbers associated with a certificate, especially when AIA is used to link thousands of numbers to a single certificate; the SPC in a certificate can also be used to identify the carrier. Short-lived per-TN certificates are suggested as a privacy-preserving alternative.
section: "12"
topics:
    - security
    - privacy
    - pkix
    - sip
