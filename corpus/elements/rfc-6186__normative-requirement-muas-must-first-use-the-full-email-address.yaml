document: rfc-6186
kind: normative-requirement
summary: MUAs MUST first use the full email address as the user identifier for authentication. If that fails, they SHOULD fall back to using only the local-part of the email address. If both fail, the MUA SHOULD prompt the user for a valid identifier.
section: "4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
