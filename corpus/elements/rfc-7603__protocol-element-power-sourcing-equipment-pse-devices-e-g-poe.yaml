document: rfc-7603
kind: protocol-element
summary: Power Sourcing Equipment (PSE) devices (e.g., PoE switches) supply power to Powered Devices (PDs) over Ethernet or USB per RFC 3621. The PSE can control per-port power supply and meter actual power provided, and can associate each port with a specific connected device.
section: "2.2"
topics:
