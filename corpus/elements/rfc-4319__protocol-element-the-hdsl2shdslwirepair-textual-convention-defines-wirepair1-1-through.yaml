document: rfc-4319
kind: protocol-element
summary: The Hdsl2ShdslWirePair textual convention defines wirePair1(1) through wirePair4(4). HDSL2 supports only wirePair1 (two-wire); SHDSL adds optional wirePair2 (four-wire); G.shdsl.bis further adds wirePair3 (six-wire) and wirePair4 (eight-wire).
