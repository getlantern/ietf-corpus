document: rfc-6610
kind: wire-format
summary: OPTION_MIP6_HAA (code 72) carries a 16-byte IPv6 Address field for the home agent. For IPv4-only infrastructures, the address is encoded as an IPv4-Embedded IPv6 address using the Well-Known Prefix per RFC 6052.
section: "3.4"
topics:
    - mobility
    - ip
