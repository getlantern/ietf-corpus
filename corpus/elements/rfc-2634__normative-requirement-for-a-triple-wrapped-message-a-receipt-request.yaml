document: rfc-2634
kind: normative-requirement
summary: For a triple wrapped message, a receipt request MUST be placed in the inside signature, not in the outside signature. An eSSSecurityLabel attribute MUST NOT be used in an EnvelopedData or unsigned attributes; it must appear only in a signedAttributes block.
section: 1.3.1
rfc2119_level: MUST
topics:
    - email
    - security
