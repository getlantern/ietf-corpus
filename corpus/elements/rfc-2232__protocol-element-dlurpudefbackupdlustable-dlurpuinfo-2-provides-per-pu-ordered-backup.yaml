document: rfc-2232
kind: protocol-element
summary: dlurPuDefBackupDlusTable (dlurPuInfo 2) provides per-PU ordered backup DLUS lists, indexed by dlurPuDefBackupDlusPuName and dlurPuDefBackupDlusIndex. PUs without entries in this table fall back to dlurDefaultDefBackupDlusTable for backup DLUS selection.
