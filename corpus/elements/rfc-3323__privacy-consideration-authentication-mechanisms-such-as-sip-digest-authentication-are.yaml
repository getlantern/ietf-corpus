document: rfc-3323
kind: privacy-consideration
summary: Authentication mechanisms such as SIP Digest authentication are outside the scope of the privacy considerations in this document. Users that do not wish to reveal their identity to servers issuing authentication challenges MAY elect not to respond to such challenges.
