document: rfc-5789
kind: normative-requirement
summary: The server MUST apply the entire set of changes atomically and never provide a partially modified representation. If the entire patch document cannot be successfully applied, the server MUST NOT apply any of the changes.
section: "2"
rfc2119_level: MUST
