document: rfc-5724
kind: normative-requirement
summary: Phone numbers in 'sms' URIs MUST be written in international form with country code (beginning with '+') unless the number only works inside a certain geographic area or network. Visual separators (hyphens, dots, parentheses) MUST NOT convey any meaning other than readability.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
