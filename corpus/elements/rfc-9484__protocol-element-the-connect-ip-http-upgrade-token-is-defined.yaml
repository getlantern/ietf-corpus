document: rfc-9484
kind: protocol-element
summary: The 'connect-ip' HTTP upgrade token is defined to negotiate an IP tunnel over HTTP. Clients issue requests containing this token, and the resulting tunnels use the Capsule Protocol with HTTP Datagrams carrying IP packets. The tunnel lifetime is tied to the HTTP request stream.
section: "4"
topics:
