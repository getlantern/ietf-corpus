document: rfc-5733
kind: state-machine
summary: A contact object transitions into a pending state (pendingCreate, pendingDelete, pendingTransfer, or pendingUpdate) when a transform command is processed but its action is not immediately completed. The pending status MUST be removed once the action is completed, and clients MUST be notified via a service message.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
