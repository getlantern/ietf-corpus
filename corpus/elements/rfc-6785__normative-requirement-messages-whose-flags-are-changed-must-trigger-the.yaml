document: rfc-6785
kind: normative-requirement
summary: Messages whose flags are changed MUST trigger the execution of a Sieve script, except that flag changes resulting from a script that was itself invoked because of flag changes SHOULD NOT result in a further invocation. Implementations MUST take steps to avoid such loops.
section: 2.2.3
rfc2119_level: MUST
topics:
    - email
    - security
