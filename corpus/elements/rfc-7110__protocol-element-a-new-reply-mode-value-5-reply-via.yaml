document: rfc-7110
kind: protocol-element
summary: A new Reply Mode value 5, 'Reply via Specified Path', is defined. This mode directs the egress LSR receiving an echo request to send the echo reply along the paths specified in the Reply Path TLV included in the echo request.
section: "4.1"
