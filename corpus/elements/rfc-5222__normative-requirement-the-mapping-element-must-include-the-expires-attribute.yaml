document: rfc-5222
kind: normative-requirement
summary: The <mapping> element MUST include the 'expires' attribute containing the absolute time (timezoned XML dateTime) at which the mapping becomes invalid. Alternatively, the attribute may contain 'NO-CACHE' or 'NO-EXPIRATION'.
section: "5.2"
rfc2119_level: MUST
topics:
    - realtime
