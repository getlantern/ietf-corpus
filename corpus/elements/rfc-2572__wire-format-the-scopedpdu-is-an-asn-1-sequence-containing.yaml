document: rfc-2572
kind: wire-format
summary: The ScopedPDU is an ASN.1 SEQUENCE containing contextEngineID (OCTET STRING), contextName (OCTET STRING), and data (ANY, e.g., PDUs per RFC 1905). When privacy is applied, it is encoded as an encrypted OCTET STRING in the ScopedPduData field.
