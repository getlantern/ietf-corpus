document: rfc-2459
kind: protocol-element
summary: The Policy Mappings extension (OID id-ce 33), used only in CA certificates, lists pairs of issuerDomainPolicy and subjectDomainPolicy OIDs indicating that the issuing CA considers its policy equivalent to the subject CA's policy. This extension MUST be non-critical.
section: 4.2.1.6
