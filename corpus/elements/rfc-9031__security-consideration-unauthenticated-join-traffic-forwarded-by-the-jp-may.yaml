document: rfc-9031
kind: security-consideration
summary: Unauthenticated join traffic forwarded by the JP may cause intermediate 6TiSCH nodes to over-allocate bandwidth and energy. JPs SHOULD mark forwarded join traffic with DSCP AF43 so Scheduling Functions can suppress additional cell allocation for such traffic.
section: "6.1"
topics:
    - security
    - diffserv
