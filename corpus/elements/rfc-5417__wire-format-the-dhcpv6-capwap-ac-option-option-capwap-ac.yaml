document: rfc-5417
kind: wire-format
summary: The DHCPv6 CAPWAP AC option (OPTION_CAPWAP_AC_V6, code 52) carries one or more 128-bit IPv6 addresses of CAPWAP ACs. The option-code and option-length are each 16-bit fields; option-length MUST be a multiple of sixteen, with ACs listed in preference order.
