document: rfc-9553
kind: normative-requirement
summary: Extensions MUST NOT lead to a required update of the JSContact specification. A new minor version MUST NOT require implementations to change their processing; differing major versions indicate backwards-incompatible changes and implementations MUST be prepared for them.
