document: rfc-7880
kind: normative-requirement
summary: S-BFD Control packets transmitted by an SBFDInitiator MUST set the Your Discriminator field to the S-BFD Discriminator corresponding to the remote target entity. Every SBFDInitiator MUST also have a locally unique My Discriminator allocated from the BFD Discriminator pool.
section: "7.3"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
