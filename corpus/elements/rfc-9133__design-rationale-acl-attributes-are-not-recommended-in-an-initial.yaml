document: rfc-9133
kind: design-rationale
summary: ACL attributes are NOT RECOMMENDED in an initial mitigation request for a given mitigation scope or in scope-adjusting requests. This recommendation is explicitly motivated by the desire to avoid delaying attack mitigations because of failures to process ACL attributes.
section: 3.2.1
topics:
    - security
