document: rfc-4660
kind: design-rationale
summary: Filtering is expected to be particularly valuable for mobile wireless devices with high latency, low bandwidth, limited processing, small displays, and limited battery power, as it reduces the amount of information generated at the event notification source. However, implementers must be aware of the computational burden placed on the notifier.
