document: rfc-7219
kind: normative-requirement
summary: Ports connected to hosts SHOULD be configured as Validating ports. No more than one host SHOULD be connected per Validating port, as multiple hosts on the same port can spoof each other's addresses and perform replay attacks.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - ip
    - security
