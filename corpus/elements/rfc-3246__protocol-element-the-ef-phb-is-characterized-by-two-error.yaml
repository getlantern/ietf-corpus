document: rfc-3246
kind: protocol-element
summary: 'The EF PHB is characterized by two error terms: E_a (aggregate error term, worst-case deviation between actual and ideal departure time for the EF aggregate) and E_p (per-packet error term, worst-case deviation for an individually tracked EF packet). E_p >= E_a typically.'
