document: rfc-9915
kind: normative-requirement
summary: The IAID for a given IA use MUST be consistent across restarts of the DHCP client, maintained either through non-volatile storage or a deterministic algorithm. The IAID MUST be unique among IAIDs for that IA type on the client.
section: "12"
rfc2119_level: MUST
topics:
