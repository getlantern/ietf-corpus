document: rfc-5098
kind: normative-requirement
summary: The majority of device-level and endpoint-level MIB objects in this MIB MUST NOT persist their values across MTA reboots. This includes all ring cadence, caller ID, VMWI, DSCP, tone, and pulse signal configuration objects.
section: "5"
rfc2119_level: MUST NOT
