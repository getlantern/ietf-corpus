document: rfc-933
kind: wire-format
summary: The subnegotiation command 'IAC SB OUTMRK CNTL data IAC SE' carries the banner. CNTL is a single octet control flag indicating banner placement; data is ASCII banner text. CRLF separates lines within a multiline banner.
