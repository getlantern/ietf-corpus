document: rfc-9374
kind: protocol-element
summary: 'The updated ORCHID construction is: Prefix (p bits, max 28) | Info (n bits) | OGA ID (4 or 8 bits) | Hash (m bits), where p+n+o+m = 128. The Info field carries the HHIT hierarchy bits (HID), and all fields are included in the cSHAKE128 hash input to protect against substitution attacks.'
section: "3.5"
