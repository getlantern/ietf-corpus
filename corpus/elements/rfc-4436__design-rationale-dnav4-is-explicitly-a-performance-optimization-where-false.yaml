document: rfc-4436
kind: design-rationale
summary: DNAv4 is explicitly a performance optimization where false positives are unacceptable but false negatives are acceptable. If a router ignores unicast ARP Requests, DNAv4 will fail to detect re-attachment, but the host still operates correctly via normal DHCP processing.
section: "1.1"
topics:
