document: rfc-8010
kind: interoperability-note
summary: IPP objects SHOULD understand any valid request whose major version-number is greater than 0, and respond with the Client-supplied version-number if supported or the highest supported version-number otherwise. This design makes supporting multiple IPP versions straightforward.
section: "9"
