document: rfc-7792
kind: protocol-element
summary: The frequency slot for a flexi-grid LSP is defined as [(central frequency) - (slot width)/2] to [(central frequency) + (slot width)/2], where central frequency in THz is 193.1 + n * 0.00625 (n is any integer) and slot width in GHz is 12.5 * m (m is a positive integer).
section: "3.2"
topics:
    - routing
    - mpls
