document: rfc-1534
kind: normative-requirement
summary: A DHCP server supporting BOOTP clients MUST formulate a BOOTP BOOTREPLY message rather than a DHCP DHCPOFFER; it MUST NOT include the 'DHCP message type' option and MUST NOT exceed the size limit for BOOTREPLY messages.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
