document: rfc-4051
kind: design-rationale
summary: The xmldsig-more# URI prefix was adopted for additional algorithms to avoid implying official W3C status while providing a stable namespace. Dereferencing such URIs may or may not produce a temporary placeholder document; permission to use the prefix was given by the W3C.
