document: rfc-9172
kind: design-rationale
summary: BPSec uses user-defined, parameterized security contexts rather than mandating a single cipher suite. This allows flexibility across deployments with different algorithm preferences (e.g., SHA-2 vs. SHA-3) and resource constraints without defining separate contexts for each configuration.
section: "2.4"
topics:
    - security
