document: rfc-2227
kind: normative-requirement
summary: 'Proxies counting Range requests MUST count as a ''use'' or ''reuse'' only those Range requests that result in the return of byte #0 of the resource, to produce consistent approximations across partial-content scenarios.'
section: "5.4"
rfc2119_level: MUST
topics:
    - http
