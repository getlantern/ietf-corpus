document: rfc-4011
kind: normative-requirement
summary: PolicyScript code MUST be expressed in the ASCII character set. Any syntax error, use of a reserved keyword, reference to an unknown identifier, improper argument count, type-coercion failure, or exceeding local storage limits MUST cause an RTE.
section: "5.1"
rfc2119_level: MUST
