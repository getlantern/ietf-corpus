document: rfc-3437
kind: protocol-element
summary: The LCP Want Options AVP (Attribute Type 49) carries a PPP LCP Configure-Request information field from the LAC to the LNS, indicating LCP options the LAC wants the LNS to negotiate. It is sent in ICCN or OCCN messages and has Vendor ID 0 (IETF).
