document: rfc-9731
kind: design-rationale
summary: VN-level constraints and optimization criteria are delegated to the TE Topology model (RFC 8795) via a leafref to the abstract node's connectivity-matrix rather than duplicating them in the VN model. The vn-compute RPC is an exception, including constraints directly to allow standalone use without a pre-existing abstract topology.
