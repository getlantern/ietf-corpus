document: rfc-6615
kind: protocol-element
summary: Four statistical augmentation tables extend the Transport Session, Template, Metering Process, and Selection Process tables, providing counters for bytes, packets, messages, records, templates, discarded messages, and selection drop counts. Each includes a discontinuity timestamp to signal counter resets.
