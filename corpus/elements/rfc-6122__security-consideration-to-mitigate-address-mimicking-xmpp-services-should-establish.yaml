document: rfc-6122
kind: security-consideration
summary: To mitigate address mimicking, XMPP services SHOULD establish registration policies restricting localpart characters to known scripts, and XMPP clients SHOULD warn users when a JID mixes characters from more than one script or uses characters outside the user's preferred language range.
section: 4.3.2
rfc2119_level: SHOULD
topics:
    - security
    - privacy
