document: rfc-6880
kind: design-rationale
summary: The information model is explicitly not a schema; it describes objects, properties, and relationships as an abstract view of KDC data. Implementations are expected to produce a mapping to a concrete schema language (e.g., LDAP, SQL, YAML) rather than implement the model directly.
