document: rfc-8399
kind: protocol-element
summary: If an email address includes an IDN but the local-part can be represented in ASCII, the address is placed in the rfc822Name choice of GeneralName (type IA5String). If the local-part cannot be represented in ASCII, the address is placed in the otherName choice using SmtpUTF8Mailbox per RFC 8398.
section: "2.5"
topics:
    - pkix
    - email
