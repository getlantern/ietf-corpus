document: rfc-7728
kind: interoperability-note
summary: When the negotiated signaling uses only 'rtcp-fb ccm tmmbr', no additional 'pause' attribute is required for TMMBR/TMMBN-based pause/resume, but there is no guarantee that pre-RFC-7728 TMMBR/TMMBN implementations behave exactly as described here when using a bitrate value of 0.
