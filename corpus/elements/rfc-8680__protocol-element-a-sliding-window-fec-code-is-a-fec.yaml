document: rfc-8680
kind: protocol-element
summary: A Sliding Window FEC Code is a FEC code that generates repair symbols on the fly, at any time, from the set of source symbols present in the sliding encoding window at that time. These codes are also known as convolutional codes, in contrast to Block FEC Codes that operate independently on per-block segments.
section: "2.1"
topics:
    - realtime
    - multicast
