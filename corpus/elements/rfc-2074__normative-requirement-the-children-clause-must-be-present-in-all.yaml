document: rfc-2074
kind: normative-requirement
summary: The CHILDREN clause must be present in all protocol-identifier macro declarations in which the 'hasChildren(0)' bit is set in the ATTRIBUTES clause. The ADDRESS-FORMAT clause must be present when the 'addressRecognitionCapable(1)' bit is set.
section: 4.2.6
rfc2119_level: MUST
