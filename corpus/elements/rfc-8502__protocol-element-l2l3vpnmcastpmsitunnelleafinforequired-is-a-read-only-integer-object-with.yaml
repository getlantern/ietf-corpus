document: rfc-8502
kind: protocol-element
summary: l2L3VpnMCastPmsiTunnelLeafInfoRequired is a read-only integer object with values false(0), true(1), or notAvailable(2). When true, it indicates the originating PE requests receivers to send a new Leaf A-D route; notAvailable is used when the P-tunnel has no corresponding PMSI Tunnel attribute.
section: "4.2"
topics:
    - multicast
    - vpn
    - snmp
