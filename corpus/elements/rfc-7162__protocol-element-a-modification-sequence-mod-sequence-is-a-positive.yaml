document: rfc-7162
kind: protocol-element
summary: A modification sequence (mod-sequence) is a positive unsigned 63-bit opaque value associated with every IMAP message, updated by the server whenever a metadata item (such as a flag) is modified. It enables clients to determine exactly which messages have changed since a known point in time.
section: "3.1"
