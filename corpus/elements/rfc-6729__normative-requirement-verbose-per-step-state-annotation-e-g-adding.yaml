document: rfc-6729
kind: normative-requirement
summary: Verbose per-step state annotation (e.g., adding four Received fields for auth, virus scan, spam scan, and outbound queuing within a single system pass) SHOULD NOT be applied except when doing detailed analysis of a single component to identify performance issues.
section: "4"
rfc2119_level: SHOULD NOT
