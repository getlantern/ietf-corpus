document: rfc-7540
kind: wire-format
summary: 'Every HTTP/2 frame begins with a fixed 9-octet header: a 24-bit unsigned Length (payload size, excluding the header), an 8-bit Type, an 8-bit Flags field, a reserved 1-bit R field that MUST remain unset, and a 31-bit unsigned Stream Identifier. Stream identifier 0x0 is reserved for connection-level frames.'
section: "4.1"
topics:
    - http
