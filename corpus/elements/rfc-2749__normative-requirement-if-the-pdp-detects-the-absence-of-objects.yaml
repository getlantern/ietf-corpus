document: rfc-2749
kind: normative-requirement
summary: If the PDP detects the absence of objects required by RSVP, it should return an Error in the Decision message indicating 'Mandatory client-specific info missing'. If optional but policy-needed objects are absent, the PDP should return a negative Decision.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
