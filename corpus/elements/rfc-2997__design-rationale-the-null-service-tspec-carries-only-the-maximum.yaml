document: rfc-2997
kind: design-rationale
summary: The Null Service Tspec carries only the maximum packet size parameter (M) to avoid fragmentation. No other quantitative parameters (token bucket rate, peak rate, burst size) are defined, reflecting the service's intent to avoid requiring applications to specify resource requirements.
