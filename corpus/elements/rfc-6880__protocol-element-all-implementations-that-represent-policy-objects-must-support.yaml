document: rfc-6880
kind: protocol-element
summary: 'All implementations that represent policy objects MUST support four mandatory-to-implement policy types: (1) Password Quality Policy — requirements on new passwords; (2) Password Management Policy — controls how passwords are changed; (3) Keying Policy — determines enctypes and keys assigned to new principals; (4) Ticket Flag Policy — specifies ticket flags allowed for a principal.'
section: 4.4.2
topics:
    - security
