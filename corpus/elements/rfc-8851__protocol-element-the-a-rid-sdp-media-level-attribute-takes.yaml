document: rfc-8851
kind: protocol-element
summary: 'The ''a=rid'' SDP media-level attribute takes the form: ''a=rid:<rid-id> <direction> [pt=<fmt-list>;]<restriction>=<value>...''. The ''direction'' field is either ''send'' or ''recv'' and is expressed independently of the media section''s sendrecv/sendonly/recvonly/inactive attributes.'
