document: rfc-2609
kind: interoperability-note
summary: Translation between template languages requires the same ordered attribute definitions across language versions. Non-literal attribute identifiers, type names, flags, and boolean constants 'true'/'false' are never translated; only attribute values and descriptive help text are translatable. A 'localize-<tag>' attribute naming convention is suggested for localizing attribute identifier display names.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
