document: rfc-9069
kind: security-consideration
summary: The security considerations of RFC 7854 Section 11 apply. Implementations SHOULD require that BMP sessions only be established with authorized and trusted monitoring devices. This document is not believed to introduce additional security considerations beyond RFC 7854.
section: "7"
rfc2119_level: SHOULD
