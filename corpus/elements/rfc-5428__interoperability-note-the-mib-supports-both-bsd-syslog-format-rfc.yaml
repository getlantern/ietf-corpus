document: rfc-5428
kind: interoperability-note
summary: The MIB supports both BSD syslog format (RFC 3164) and IETF syslog protocol (RFC 5424) message formats, selectable via pktcEventSyslogMessageFormat. This dual-format support enables interoperability with both legacy and modern syslog infrastructure.
