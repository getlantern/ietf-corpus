document: rfc-2213
kind: protocol-element
summary: intSrvFlowFlowId (0..16777215, read-only) carries the IPv6 flow ID used by a sender, and is only meaningful for IPv6 sessions. The compliance statement marks it not-accessible for non-IPv6 systems.
