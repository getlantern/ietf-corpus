document: rfc-8271
kind: normative-requirement
summary: When the procedures defined in this document are in use, the BYPASS_ASSIGNMENT subobject MUST be added by each downstream PLR in the RSVP Path RRO message of the GMPLS signaled bidirectional protected LSP to record the downstream bidirectional bypass tunnel assignment.
section: 4.5.1
rfc2119_level: MUST
topics:
