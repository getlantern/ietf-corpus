document: rfc-3489
kind: security-consideration
summary: The four primary attacks on STUN (DDoS amplification, client silencing, identity assumption, and eavesdropping) all require an attacker to inject a Binding Response with a forged MAPPED-ADDRESS. All such attacks require the attacker to know the 128-bit random transaction ID, which necessitates eavesdropping on or intercepting STUN requests.
section: "12.1"
topics:
    - nat
    - security
