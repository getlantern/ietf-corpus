document: rfc-9770
kind: normative-requirement
summary: MAX_INDEX is REQUIRED to be at least (MAX_N - 1) and is RECOMMENDED to be at least ((2^32) - 1). MAX_INDEX SHOULD be orders of magnitude greater than MAX_N to reduce the likelihood of index wraparound causing ambiguity in cursor-based diff queries.
section: 6.2.1
rfc2119_level: REQUIRED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
