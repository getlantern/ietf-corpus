document: rfc-5256
kind: security-consideration
summary: The SORT and THREAD extensions do not introduce security considerations beyond those present in the base IMAP protocol. However, IMAP protocol transactions including message data are sent in cleartext unless protection is negotiated via STARTTLS, privacy protection in AUTHENTICATE, or another mechanism.
section: "6"
topics:
