document: rfc-3748
kind: design-rationale
summary: EAP authentication is initiated by the server (authenticator) rather than the client, unlike many authentication protocols. This design allows the authenticator to request more information before selecting an authentication method, and permits pass-through to a backend server that implements the actual methods.
section: "1.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
