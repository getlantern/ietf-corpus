document: rfc-3510
kind: security-consideration
summary: An IPP URL might be faked to point to a rogue IPP print service, collecting confidential document contents from IPP clients. Server authentication mechanisms and security mechanisms in RFC 2910 are sufficient to address this threat.
section: "8"
topics:
    - security
