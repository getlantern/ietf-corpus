summary: 'The OSPF interface state machine is modeled via the ''if-state-type'' enumeration with states: down (1), loopback (2), waiting (3), point-to-point (4), dr (5), bdr (6), dr-other (7). State transitions are triggered by link events and DR election results, per RFC 2328.'
