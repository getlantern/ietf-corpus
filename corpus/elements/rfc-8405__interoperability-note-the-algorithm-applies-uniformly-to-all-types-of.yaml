document: rfc-8405
kind: interoperability-note
summary: The algorithm applies uniformly to all types of IGP routing table computation (full SPF, incremental SPF, Partial Route Computation), treating them identically. The choice of computation type is a local implementation decision and does not affect the back-off state machine.
