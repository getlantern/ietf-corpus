kind: normative-requirement
summary: pcePcepSessOverloadTime MUST be set to zero when pcePcepSessOverloaded is false; pcePcepSessPeerOverloadTime MUST be zero when pcePcepSessPeerOverloaded is false. These fields are only meaningful when the respective overload flag is true.
