document: rfc-8114
kind: interoperability-note
summary: Version mismatches between IGMP and MLD may arise at the mB4 (e.g., IGMPv2 with MLDv2, or IGMPv3 with MLDv1). The mB4 should perform the router portion of the matching IGMP version and apply RFC 3376 Section 7 interaction for signaling with IPv4 receivers. IPv4 SSM requires MLDv2 in the IPv6 network.
section: B
topics:
