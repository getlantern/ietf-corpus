document: rfc-4429
kind: interoperability-note
summary: If a node with only Optimistic Addresses cannot obtain the router's link-layer address (because the RA omitted the SLLAO and the node cannot send an RS with SLLAO or an NS), the node is unable to communicate until at least one address is no longer Optimistic.
section: "2.4"
