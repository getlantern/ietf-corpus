document: rfc-4796
kind: normative-requirement
summary: An SDP answer MAY contain 'content' attributes even if none were present in the offer, and MAY contain no 'content' attributes even if they were present in the offer. The values of 'content' attributes do not need to match in an offer and an answer.
section: "6"
rfc2119_level: MAY
topics:
    - realtime
    - sip
