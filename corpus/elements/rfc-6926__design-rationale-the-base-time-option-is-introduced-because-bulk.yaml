document: rfc-6926
kind: design-rationale
summary: The base-time option is introduced because Bulk Leasequery requestors and servers may not be time-synchronized; all other time values are expressed as offsets from base-time so the requestor can convert server-context times to local context without requiring NTP alignment.
section: "7.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
