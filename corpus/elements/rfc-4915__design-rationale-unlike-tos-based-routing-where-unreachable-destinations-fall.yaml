document: rfc-4915
kind: design-rationale
summary: Unlike TOS-based routing where unreachable destinations fall back to TOS 0, MT routing makes fallback optional. Also, links/prefixes not advertised for a specific topology simply do not exist in that topology, rather than defaulting to TOS 0 metric.
section: "1.1"
topics:
    - routing
