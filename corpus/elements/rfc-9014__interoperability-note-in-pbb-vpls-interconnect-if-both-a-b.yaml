document: rfc-9014
kind: interoperability-note
summary: In PBB-VPLS interconnect, if both a B-component PW and an I-component EVPN-Overlay binding exist to the same far-end, the EVPN binding is kept down operationally while the B-component PW is active. The EVPN binding is only activated when no corresponding B-component PW exists to that far end.
section: 4.3.1
topics:
    - routing
    - bgp
    - mpls
