document: rfc-8016
kind: design-rationale
summary: The mobility ticket is opaque to the client and its internal structure is not subject to interoperability requirements — implementations may diverge from the Appendix A example. This design allows the TURN server to store arbitrary system-internal state (encrypted and integrity-protected) without constraining the server implementation.
