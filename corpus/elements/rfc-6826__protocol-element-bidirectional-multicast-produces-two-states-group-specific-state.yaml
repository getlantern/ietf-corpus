document: rfc-6826
kind: protocol-element
summary: 'Bidirectional multicast produces two states: group-specific state (PIM Join received, subnet mask /32 for IPv4 or /128 for IPv6) and RP state (static RP mapping, variable subnet mask). Each state results in a separate MP2MP LSP; PIM on the root LSR merges the two LSPs by treating each LSP as a PIM-enabled interface.'
section: "2.3"
topics:
    - mpls
    - multicast
    - routing
