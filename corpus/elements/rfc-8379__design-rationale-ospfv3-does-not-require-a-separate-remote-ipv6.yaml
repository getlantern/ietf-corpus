document: rfc-8379
kind: design-rationale
summary: OSPFv3 does not require a separate remote IPv6 address sub-TLV because the OSPFv3 Router-Link TLV (RFC 8362) already contains the Interface ID and neighbor Interface ID, which uniquely identify the connecting interface on the remote side.
