summary: 'The ifMauAutoNegConfig object reports auto-negotiation process status with states: other(1), configuring(2), complete(3), disabled(4), and parallelDetectFail(5). The parallelDetectFail state maps to a failure in parallel detection as defined in IEEE 802.3 clause 28.2.3.1.'
