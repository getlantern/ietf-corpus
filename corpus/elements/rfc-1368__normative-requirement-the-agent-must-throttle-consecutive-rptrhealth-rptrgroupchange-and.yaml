document: rfc-1368
kind: normative-requirement
summary: The agent must throttle consecutive rptrHealth, rptrGroupChange, and rptrResetEvent traps for the same condition so that there is at least a five-second gap between consecutive transmissions of each trap type.
section: "4.5"
rfc2119_level: MUST
