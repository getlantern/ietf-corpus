document: rfc-5660
kind: normative-requirement
summary: The parameters latched in an IPsec channel MUST remain unchanged once the channel is established. Timeouts while establishing child SAs matching latched parameters MUST be treated as packet loss.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
