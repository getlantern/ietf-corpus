document: rfc-9833
kind: design-rationale
summary: 'The AC model ecosystem is layered: ietf-ac-common is imported by ietf-bearer-svc, ietf-ac-svc, and ietf-ac-ntw; ietf-ac-glue augments L2/L3 VPN service and network models (LxSM/LxNM) with AC references. This layering enables data inheritance from service to network models per RFC 8969 and facilitates correlation between service requests and network provisioning.'
