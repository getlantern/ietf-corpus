summary: The gauge32 and gauge64 types represent non-negative integers that may increase or decrease but are clamped to their maximum (2^32-1 or 2^64-1) and minimum (0) values. They are equivalent to SMIv2 Gauge32 and CounterBasedGauge64 respectively.
