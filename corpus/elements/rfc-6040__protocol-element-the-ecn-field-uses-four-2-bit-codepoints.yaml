document: rfc-6040
kind: protocol-element
summary: 'The ECN field uses four 2-bit codepoints: Not-ECT (00) for non-ECN-capable transport, ECT(0) (10) and ECT(1) (01) for ECN-capable transport, and CE (11) for Congestion Experienced. Severity ranking from highest to lowest is CE, ECT(1), ECT(0), Not-ECT.'
