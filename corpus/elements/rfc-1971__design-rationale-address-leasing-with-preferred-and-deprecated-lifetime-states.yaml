document: rfc-1971
kind: design-rationale
summary: Address leasing with preferred and deprecated lifetime states facilitates graceful site renumbering. Dividing valid addresses into preferred and deprecated categories signals to upper layers that an address may become invalid soon, allowing applications to transition to new addresses without breaking existing TCP connections.
section: "4.1"
topics:
