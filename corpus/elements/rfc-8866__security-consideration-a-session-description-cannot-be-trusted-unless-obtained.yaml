document: rfc-8866
kind: security-consideration
summary: 'A session description cannot be trusted unless obtained via an authenticated and integrity-protected transport from a known and trusted source. Endpoints receiving descriptions over unauthenticated transports SHOULD exercise care: the media destination, session parameters, or media security may be compromised.'
section: "7"
topics:
    - realtime
    - security
