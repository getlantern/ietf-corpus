document: rfc-7916
kind: protocol-element
summary: Link coloring assigns administrative-group markers to protecting interfaces and configures protected interfaces with include colors (with preference levels) and exclude colors. Node coloring assigns IGP-flooded tags to routers, enabling group-level alternate preference or exclusion without per-interface configuration on each node.
section: 6.2.4.2
topics:
    - routing
