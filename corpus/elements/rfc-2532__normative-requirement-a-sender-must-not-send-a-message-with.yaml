document: rfc-2532
kind: normative-requirement
summary: A sender MUST NOT send a message with no processable content (such as a blank or capability-request-only message) in order to elicit an MDN/DSN capability response, as this will confuse non-aware recipients.
section: 3.3.1
rfc2119_level: MUST NOT
topics:
    - email
