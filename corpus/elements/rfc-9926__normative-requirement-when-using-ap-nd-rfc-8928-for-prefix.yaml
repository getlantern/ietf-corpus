document: rfc-9926
kind: normative-requirement
summary: When using AP-ND (RFC 8928) for prefix security, a keypair MUST be created and associated with the prefix before deployment, a ROVR MUST be generated from that keypair, and the keypair MUST be provisioned in each node that needs to register the prefix. The prefix and ROVR MUST be installed in the 6LBR at first registration or by an external mechanism such as IPAM or DHCPv6 snooping.
section: "9"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
