document: rfc-1471
kind: protocol-element
summary: The PPP Echo Test (pppEchoTest, pppTests 1) causes a PPP Echo Packet to be sent; ifExtnsTestResult returns success(2) if the echo response is received properly, or failed(7) otherwise. The definition of 'proper' is left to implementor discretion.
