document: rfc-2514
kind: interoperability-note
summary: atmClpTransparentNoScr (type 9) and atmClpTransparentScr (type 10) connections will be rejected at UNI 3.0 or UNI 3.1 interfaces. Implementors targeting those interfaces should use atmNoClpNoScr (type 2) or atmNoClpScr (type 5) instead.
