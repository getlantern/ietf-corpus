document: rfc-6768
kind: design-rationale
summary: The MIB is structured as an extension to GBOND-MIB rather than a standalone module, placing only ATM-specific objects (differential delay tolerance, lost cell counts) in G9981-MIB while reusing GBOND-MIB for generic bonding management. This avoids duplication and follows the RFC 4181 modular structure recommendation.
section: "5.1"
