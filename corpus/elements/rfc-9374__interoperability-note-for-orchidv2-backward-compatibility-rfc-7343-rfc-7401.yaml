document: rfc-9374
kind: interoperability-note
summary: 'For ORCHIDv2 backward compatibility (RFC 7343/RFC 7401), ORCHID decoding is selected by the prefix: HITs use 2001:20::/28 with a 4-bit OGA ID and 96-bit hash, while HHITs use the HHIT-specific prefix (2001:30::/28) with an 8-bit OGA ID and 64-bit hash. The Prefix and OGA ID are NOT included in the hash input for HIPv2.'
section: 3.5.3
topics:
    - ip
    - crypto
    - security
