document: rfc-3479
kind: normative-requirement
summary: If an LSR cannot pend a mandatory operation (Label Withdraw, Release, or Abort) during TCP failure, it MUST NOT attempt to re-establish the previous LDP session and MUST release all state as if the Reconnection Timer expired.
section: 5.4.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
