document: rfc-1225
kind: protocol-element
summary: The PASS command, valid only after a successful USER command in AUTHORIZATION, provides a password. On success the server acquires an exclusive-access lock on the maildrop, parses it into individual messages, and the session enters TRANSACTION state.
section: The AUTHORIZATION State
