document: rfc-5251
kind: security-consideration
summary: The association of a PE port with a particular L1VPN (PIT) is enforced solely through manual provisioning by the service provider and cannot be altered via CE-PE signaling. This prevents signaling from being used to deliver L1VPN traffic to the wrong customer. Operators should apply security to the management process and may use LMP data-plane connectivity tests to detect misconfiguration.
section: "5"
topics:
    - vpn
    - security
    - mpls
