document: rfc-2327
kind: interoperability-note
summary: When a list of payload formats is given in an 'm=' field, all formats may be used in the session but the first is the default format. For RTP, the encoding names in the Audio/Video Profile do not specify unique encodings (clock rate, channel count), so rtpmap attributes or static payload type numbers must be used instead.
section: "6"
topics:
