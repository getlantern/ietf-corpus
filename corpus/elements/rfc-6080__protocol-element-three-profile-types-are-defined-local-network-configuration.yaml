document: rfc-6080
kind: protocol-element
summary: 'Three profile types are defined: ''local-network'' (configuration for the local network provided by the local network provider), ''device'' (device-specific configuration from the device provider), and ''user'' (user-specific configuration from the SIP service provider). Each type is requested via a separate SUBSCRIBE dialog using the ''profile-type'' Event header parameter.'
section: "3.3"
topics:
    - sip
