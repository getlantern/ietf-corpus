document: rfc-9060
kind: protocol-element
summary: ACME (RFC 8555) is the anticipated mechanism for acquiring delegate certificates. An entity requests an Authority Token from the parent with the desired TNAuthList; if further subdelegation is intended, the token request should include the 'ca' Authority Token flag.
section: "8.1"
topics:
