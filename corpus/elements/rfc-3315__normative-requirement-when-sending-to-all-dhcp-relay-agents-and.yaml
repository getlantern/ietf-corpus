document: rfc-3315
kind: normative-requirement
summary: When sending to All_DHCP_Relay_Agents_and_Servers, the client MUST use a link-local address assigned to the requesting interface as the IP source address. When sending unicast after receiving a Server Unicast option, the source MUST be an address suitable for the server to respond to.
section: "16"
rfc2119_level: MUST
topics:
