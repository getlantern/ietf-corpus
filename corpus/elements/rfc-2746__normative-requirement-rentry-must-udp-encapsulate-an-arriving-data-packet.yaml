document: rfc-2746
kind: normative-requirement
summary: Rentry MUST UDP-encapsulate an arriving data packet only if a corresponding tunnel session reservation is actually in place (not merely PATH state); if no reservation exists, the packet is forwarded using the normal IP-in-IP tunnel encapsulation.
section: "5"
rfc2119_level: MUST
topics:
