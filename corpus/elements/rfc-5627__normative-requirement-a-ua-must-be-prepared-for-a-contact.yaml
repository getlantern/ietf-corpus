document: rfc-5627
kind: normative-requirement
summary: A UA MUST be prepared for a Contact header field in a REGISTER response to contain just a 'pub-gruu', just a 'temp-gruu', neither, or both. If the Call-ID changed from a previous REGISTER for the same contact or reg-id, the UA MUST discard all temporary GRUUs learned through prior responses.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
