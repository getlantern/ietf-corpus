document: rfc-3501
kind: protocol-element
summary: The AUTHENTICATE command initiates a SASL authentication exchange. Server challenges are command continuation requests ('+') followed by BASE64-encoded data; client responses are single lines of BASE64. The client may cancel by sending a single '*', which MUST cause the server to reject with BAD.
section: 6.2.2
topics:
