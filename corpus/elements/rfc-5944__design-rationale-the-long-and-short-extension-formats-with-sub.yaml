document: rfc-5944
kind: design-rationale
summary: The Long and Short Extension formats with Sub-Type fields were introduced to prevent exhaustion of the 255-value Extension Type space. Grouping related extensions under one Type value with Sub-Types allows new extensions to be added without consuming additional Type numbers.
section: "1.8"
topics:
    - mobility
    - ip
