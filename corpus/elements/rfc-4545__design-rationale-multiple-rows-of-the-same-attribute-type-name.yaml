document: rfc-4545
kind: design-rationale
summary: Multiple rows of the same attribute type (name, address, or credential) within one identity are treated with OR logic — matching any one suffices. Rows of different types are combined with AND logic — at least one row from each non-empty category must match. Empty categories are ignored entirely.
section: "7.1"
topics:
