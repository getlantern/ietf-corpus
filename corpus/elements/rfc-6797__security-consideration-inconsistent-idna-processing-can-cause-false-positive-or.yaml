document: rfc-6797
kind: security-consideration
summary: Inconsistent IDNA processing can cause false-positive or false-negative domain name matching in HSTS enforcement, potentially connecting users to unintended hosts or blocking intended ones. IDNA-canonicalization with full Unicode and IDNA validation MUST occur before HSTS domain matching.
section: "14.10"
topics:
    - security
    - dns
