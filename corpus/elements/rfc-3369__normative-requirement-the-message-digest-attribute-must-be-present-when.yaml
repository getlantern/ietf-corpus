document: rfc-3369
kind: normative-requirement
summary: The message-digest attribute MUST be present when any signed or authenticated attributes are present. It MUST have exactly one attribute value; zero or multiple instances are not permitted within SignedAttributes or AuthAttributes.
section: "11.2"
rfc2119_level: MUST
topics:
    - crypto
