document: rfc-3034
kind: normative-requirement
summary: When an LSR loses its LDP session with another LSR, it MUST discard any binding information learned via that connection. Label bindings created as a result of requests from the peer may be destroyed and their labels deallocated.
section: "7.1"
rfc2119_level: MUST
topics:
    - mpls
