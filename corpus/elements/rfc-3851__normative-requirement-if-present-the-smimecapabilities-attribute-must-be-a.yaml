document: rfc-3851
kind: normative-requirement
summary: If present, the SMIMECapabilities attribute MUST be a SignedAttribute and MUST NOT be an UnsignedAttribute. A signerInfo MUST NOT include multiple instances of the SMIMECapabilities attribute, and it MUST contain exactly one AttributeValue.
section: 2.5.2
rfc2119_level: MUST
topics:
