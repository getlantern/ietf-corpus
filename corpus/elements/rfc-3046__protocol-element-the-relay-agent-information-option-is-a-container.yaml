document: rfc-3046
kind: protocol-element
summary: The Relay Agent Information option is a container option inserted by the relay agent when forwarding client-to-server DHCP packets. The server echoes it verbatim in replies, and the relay agent strips it before forwarding the reply to the client.
section: "2.0"
