document: rfc-7389
kind: interoperability-note
summary: The LMA User-Plane Address mobility option is carried in PBU and PBA messages like any other mobility header option per RFC 5213 and inherits that specification's security guidelines. Encapsulation mode selection for the user-plane tunnel must follow considerations in RFC 5213 and RFC 5844.
