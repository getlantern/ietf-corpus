document: rfc-2037
kind: normative-requirement
summary: The value of entPhysicalContainedIn for a 'module' entity (entPhysicalClass = module(9)) must equal an entPhysicalIndex representing the parent 'container' entity (entPhysicalClass = container(5)). The containment relationships define a strict hierarchy; recursion is not allowed.
