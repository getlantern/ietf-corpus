document: rfc-2745
kind: wire-format
summary: 'The IPv4 DIAG_RESPONSE object (Class=32, C-Type=1) encodes: DREQ Arrival Time (32-bit NTP timestamp, middle 32 bits of 64-bit NTP form), Incoming Interface Address, Outgoing Interface Address, Previous-RSVP-Hop Router Address, D-TTL (8 bits), M flag (1 bit), R-error (3 bits), K refresh multiplier (4 bits), Timer value (16 bits), an optional TUNNEL object, and variable-length response objects.'
section: "3.6"
topics:
    - qos
    - ntp
