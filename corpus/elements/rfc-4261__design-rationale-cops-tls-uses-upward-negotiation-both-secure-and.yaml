document: rfc-4261
kind: design-rationale
summary: COPS/TLS uses Upward Negotiation (both secure and insecure versions share the same port, with capability discovery) rather than Separate Ports, because the Separate Ports approach does not scale well and requires a new port for each secure protocol variant.
section: "3"
topics:
