summary: 'Five cipher suites are defined, identified by a 2-byte identifier in the SFrame Cipher Suites IANA registry: AES_128_CTR_HMAC_SHA256_80 (0x0001), AES_128_CTR_HMAC_SHA256_64 (0x0002), AES_128_CTR_HMAC_SHA256_32 (0x0003), AES_128_GCM_SHA256_128 (0x0004), and AES_256_GCM_SHA512_128 (0x0005). Each specifies a hash function (Nh), key size (Nk), nonce size (Nn), and tag size (Nt).'
