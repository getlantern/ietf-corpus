document: rfc-7618
kind: design-rationale
summary: The solution is restricted to point-to-point links, tunnels, and environments with link-layer authentication before IP assignment. It is explicitly unsuitable for shared media such as Ethernet, WLAN, or cable, because the IP address is no longer a unique host identifier.
