document: rfc-7774
kind: normative-requirement
summary: DHCPv6 packets SHOULD be filtered on the border router between the ROLL network and the Internet, except for packets between the ROLL network and a remote DHCPv6 server or configured relay agents, to protect against attacks from outside the network.
section: "4"
rfc2119_level: SHOULD
topics:
