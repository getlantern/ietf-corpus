document: rfc-5066
kind: state-machine
summary: 'A PCS port operational state is derived from its PMEs: ''up'' if at least one PME is operationally up; ''lowerLayerDown'' when all connected PMEs are down; ''notPresent'' when no PME is connected; ''down'' during initialization. The efmCuPmeOperStatus object extends the PME ifOperStatus ''down'' value with ''downReady'', ''downNotReady'', and ''init'' sub-states.'
section: 3.1.4
