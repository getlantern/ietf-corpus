document: rfc-7189
kind: design-rationale
summary: Four MPLS-TP CV types arise from the combination of two monitoring modes (coordinated and independent, per RFC 6428) with two functionality levels (fault detection only vs. fault detection plus AC/PW status signaling via RFC 6310 OAM message mapping). This matrix-based design cleanly accommodates all operational requirements.
section: "2.2"
topics:
