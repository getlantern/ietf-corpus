document: rfc-863
kind: protocol-element
summary: The Discard Protocol defines a TCP-based service in which a server listens for connections on TCP port 9, throws away all received data, and sends no response. The connection persists until the client terminates it.
section: TCP Based Discard Service
topics:
    - tcp
