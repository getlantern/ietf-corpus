document: rfc-2387
kind: normative-requirement
summary: 'MIME-capable MUAs are required to provide the processing application: (a) the bodies and Content-* headers of MIME entities, (b) the parameters of the Multipart/Related Content-type header, and (c) the correspondence between each body''s local file name, header data, and content-ID.'
section: "6.1"
rfc2119_level: REQUIRED
