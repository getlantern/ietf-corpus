document: rfc-4133
kind: protocol-element
summary: entPhysicalUris (OCTET STRING, read-write) carries one or more URIs conforming to RFC 3986 section 2, separated by whitespace, providing additional identification information such as CLEI URNs. If not supported or unknown, the object is not instantiated or a zero-length string is returned. Added in version 3.
