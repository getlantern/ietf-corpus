document: rfc-2142
kind: design-rationale
summary: LIST-specific -REQUEST mailbox names are mandated even when generic list-software mailbox names (e.g., 'majordomo') exist at the site, because relying on software-named mailboxes requires senders to know what list software is deployed, which is considered problematic.
