document: rfc-2959
kind: design-rationale
summary: rtpRcvrRTT returns 'noSuchInstance' rather than a zero or invalid value when the RTP agent does not share a clock with the stream sender, because the RFC 1889 RTT algorithm produces meaningful results only when the monitor is also the sending host for that particular receiver.
