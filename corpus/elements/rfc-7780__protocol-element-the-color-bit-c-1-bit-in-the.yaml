document: rfc-7780
kind: protocol-element
summary: The Color bit (C, 1 bit) in the TRILL Header allows ingress switches to optionally mark packets for implementation-specific purposes. Transit TRILL switches MUST NOT change this bit; transit and egress switches MAY use it for traffic labeling or statistical analysis.
section: "10.1"
topics:
    - routing
