document: rfc-9250
kind: normative-requirement
summary: DoQ stubs SHOULD use a Strict usage profile for server authentication, aligning with DoH's authentication model. DNS privacy services SHOULD provide credentials that clients can use to authenticate the server. Authentication requirements for zone transfer follow RFC 9103.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - dns
    - quic
    - security
