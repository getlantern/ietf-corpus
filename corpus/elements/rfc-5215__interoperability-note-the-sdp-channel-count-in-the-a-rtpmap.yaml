document: rfc-5215
kind: interoperability-note
summary: The SDP channel count in the 'a=rtpmap' attribute SHOULD match the current Vorbis stream or be considered the maximum expected channel count. The Configuration payload delivers exact information, so SDP information SHOULD be considered a hint only.
section: "7.1"
