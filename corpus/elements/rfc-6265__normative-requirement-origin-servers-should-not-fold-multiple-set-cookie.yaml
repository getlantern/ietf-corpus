document: rfc-6265
kind: normative-requirement
summary: Origin servers SHOULD NOT fold multiple Set-Cookie header fields into a single header field, because the comma character (%x2C) is used by Set-Cookie in a way that conflicts with the standard HTTP header folding mechanism.
section: "3"
rfc2119_level: SHOULD NOT
