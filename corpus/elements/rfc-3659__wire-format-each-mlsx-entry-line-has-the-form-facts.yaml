document: rfc-3659
kind: wire-format
summary: Each MLSx entry line has the form 'facts SP pathname CRLF', where facts is a series of 'factname=value;' pairs with no embedded spaces, followed by exactly one space, then the pathname. MLST responses are sent over the control connection indented by one space; MLSD data is sent over a data connection.
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
