document: rfc-9793
kind: normative-requirement
summary: Two different BFR-prefixes MUST NOT have the same non-zero BFR-ID in the same sub-domain. If duplication is detected, the receiving BFR MUST NOT use those BFR-prefixes for BIFT calculation, and an error SHOULD be logged.
section: "4"
rfc2119_level: MUST NOT
topics:
    - bgp
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
