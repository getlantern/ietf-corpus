document: rfc-3767
kind: normative-requirement
summary: When performing mutual authentication using DIGEST-MD5 for the client, DIGEST-MD5 MUST only be used within a TLS server-authenticated pipe, and MUST only be used for client authentication — the DIGEST-MD5 security services (confidentiality, integrity) are not used.
section: 2.3.1
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
