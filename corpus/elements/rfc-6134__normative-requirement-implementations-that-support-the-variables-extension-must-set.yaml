document: rfc-6134
kind: normative-requirement
summary: Implementations that support the Variables extension MUST set the ${0} match variable to the value in the list that matched the query when using ":list". Other numbered match variables MAY be set with list-specific information.
section: "2.2"
rfc2119_level: MUST
