document: rfc-8966
kind: normative-requirement
summary: Whenever a node changes the selected router-id for a given destination, it MUST send a triggered update as an urgent TLV. The number of repeated copies MUST NOT exceed 5; the node SHOULD make a reasonable attempt to ensure all reachable neighbours receive this update (via acknowledgment requests or repetition).
section: 3.7.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
