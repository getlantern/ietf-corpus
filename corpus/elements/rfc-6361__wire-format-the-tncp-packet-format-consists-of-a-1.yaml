document: rfc-6361
kind: wire-format
summary: The TNCP packet format consists of a 1-octet Code field (LCP codes 1-7 only), a 1-octet Identifier field, a 2-octet Length field, and a variable-length Data field formatted as described in RFC 1661 Section 5. The PPP Protocol field is set to hex 805d.
section: "2.1"
topics:
