document: rfc-4188
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers are RECOMMENDED to use SNMPv3 with full cryptographic mechanisms (authentication and privacy) to protect access to this MIB module.
