document: rfc-2225
kind: normative-requirement
summary: All members of a LIS MUST have a mechanism for resolving IP addresses to ATM addresses via ATMARP and vice versa via InATMARP when using SVCs, and MUST have a mechanism for resolving VCs to IP addresses via InATMARP when using PVCs.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
