document: rfc-6794
kind: design-rationale
summary: The Policy-ID header field token parameter allows domains with multiple proxy/policy server combinations (e.g., a load-balanced farm) to route all requests belonging to the same session to the same proxy/policy server that configured per-session state such as a session border device for pinhole opening.
section: 4.4.2
topics:
