document: rfc-5055
kind: design-rationale
summary: 'The validation policy reference mechanism (OID plus optional parameters) allows SCVP to be deployed without requiring each deployment to register a new OID: the default policy (id-svp-defaultValPolicy) covers standard PKIX path processing with server-chosen defaults, and clients override individual parameters inline rather than defining a new policy OID.'
section: 3.2.4.1.1
topics:
    - pkix
