document: rfc-9492
kind: protocol-element
summary: The Application-Specific Link Attributes (ASLA) sub-TLV is defined as a sub-TLV of the OSPFv2 Extended Link TLV (type 10) and OSPFv3 Router-Link TLV (type 11). It contains Standard Application Identifier Bit Mask (SABM), User-Defined Application Identifier Bit Mask (UDABM), and Link Attribute sub-TLVs, allowing advertisement of application-specific link attribute values.
