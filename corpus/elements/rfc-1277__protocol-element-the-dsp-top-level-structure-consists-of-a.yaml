document: rfc-1277
kind: protocol-element
summary: The DSP top-level structure consists of a 2-digit Prefix followed by a Network Specific part of up to 20 digits (27 for Telex IDI format). The IDP plus the 2-digit prefix together identify a subnetwork in which the remainder of the DSP (Network Specific Part) is interpreted.
section: "4.3"
