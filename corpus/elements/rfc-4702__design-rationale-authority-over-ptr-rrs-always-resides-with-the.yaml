document: rfc-4702
kind: design-rationale
summary: Authority over PTR RRs always resides with the DHCP server that allocates the address, while authority over A RRs may be delegated to either the client or the server depending on site policy. This asymmetry drives the two primary models of operation.
section: "1.2"
topics:
