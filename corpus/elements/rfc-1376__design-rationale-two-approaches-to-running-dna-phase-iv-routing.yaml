summary: 'Two approaches to running DNA Phase IV Routing over serial links exist: treating the link as Ethernet (the approach adopted here, used by several router vendors), versus Digital''s own DDCMP-based approach with different control messages. This document adopts the Ethernet-emulation approach for PPP.'
