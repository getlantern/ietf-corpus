document: rfc-7577
kind: privacy-consideration
summary: For battery-powered devices correlated to individuals, objects such as batteryChargingCycleCount, batteryLastChargingCycleTime, batteryChargingOperState, batteryActualCharge, and related alarm thresholds can reveal information about users' activities and habits (e.g., proximity to power outlets, device usage intensity). Battery monitoring of individually owned devices SHOULD occur only with proper authorization.
section: "5"
topics:
    - privacy
    - snmp
