document: rfc-3728
kind: design-rationale
summary: There is no requirement for an agent to align 15-minute intervals with wall-clock quarter hours, though implementations MAY do so. Similarly, 1-day intervals MAY be aligned with the start of a day. This avoids mandating clock synchronization for basic performance management.
section: "2.4"
topics:
