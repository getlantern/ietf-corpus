document: rfc-6956
kind: protocol-element
summary: EtherPHYCop LFB abstracts the Ethernet physical copper interface. It receives frames from the media via a singleton output 'EtherPHYOut' (passing PHYPortID metadata downstream) and transmits frames from upstream LFBs received at singleton input 'EtherPHYIn'. It covers all Ethernet variants including Ethernet V2, 802.3 RAW, IEEE 802.3/802.2, and VLAN/MACinMAC.
section: 5.1.1
topics:
    - routing
