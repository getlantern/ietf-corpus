document: rfc-7982
kind: design-rationale
summary: The Resp field is included so a stateful server can report how many responses it has sent, giving the client a hint about whether loss occurred upstream (client-to-server) or downstream (server-to-client). The document acknowledges it cannot always distinguish loss from reordering, but aggregate metrics over time can reveal patterns.
