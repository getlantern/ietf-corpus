document: rfc-2159
kind: protocol-element
summary: 'The image/g3fax content-type defines six parameters: page-length (A4, B4, Unlimited), page-width (A3, A4, B4), encoding (1-dimensional, 2-dimensional, Uncompressed), resolution (Fine, Coarse), DCS (a Base64-encoded bit string from T.30), and pages (integer count of pages in the document).'
section: "2.1"
