document: rfc-9328
kind: normative-requirement
summary: 'In SDP offer/answer when the answer does not include recv-ols-id selecting a sub-OLS, the parameters tier-flag, profile-id, sub-profile-id, and interop-constraints MUST be used symmetrically: the value in the offer MUST be the same as in the answer, either explicitly or implicitly.'
