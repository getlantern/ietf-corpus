document: rfc-7668
kind: wire-format
summary: A 64-bit Interface Identifier (IID) is formed from the 48-bit Bluetooth device address by inserting 0xFF and 0xFE in the middle, following RFC 7136. No bit transformation is applied; public and random addresses are treated identically in the IID.
section: 3.2.2
topics:
    - ip
    - v6ops
