document: rfc-6780
kind: normative-requirement
summary: To indicate association between multiple sessions, a node sending a Path message MUST include an appropriate ASSOCIATION object in the outgoing Path messages corresponding to each of the associated sessions. In the absence of Association-Type-specific rules, the included ASSOCIATION object MUST be identical across those messages.
section: 3.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
