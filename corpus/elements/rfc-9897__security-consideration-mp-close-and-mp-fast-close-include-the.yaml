document: rfc-9897
kind: security-consideration
summary: MP_CLOSE and MP_FAST_CLOSE include the peer's Key Data to prevent unauthorized shutdown of MP-DCCP connections. The Nonce in MP_JOIN, MP_ADDADDR, and MP_REMOVEADDR prevents replay attacks. An MP_SEQ accompanies options requiring confirmation to prevent inconsistencies from reordering.
section: "4"
topics:
