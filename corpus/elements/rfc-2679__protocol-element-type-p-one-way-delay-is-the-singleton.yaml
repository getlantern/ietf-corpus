document: rfc-2679
kind: protocol-element
summary: 'Type-P-One-way-Delay is the singleton metric: for a real number dT, it means Src sent the first bit of a Type-P packet at wire-time T and Dst received the last bit at wire-time T+dT. The value is undefined (informally infinite) if the packet is not received.'
section: "3"
