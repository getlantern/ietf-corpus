document: rfc-6871
kind: normative-requirement
summary: Latent configurations returned in SDP answers MUST match offered latent configurations (or parameter subsets thereof); the answerer MUST NOT introduce new configuration numbers not present in the offer. All numbering in the answer MUST refer to the configuration and capability attribute numbering of the offer.
section: 3.3.5
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
