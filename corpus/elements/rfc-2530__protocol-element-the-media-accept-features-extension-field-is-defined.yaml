document: rfc-2530
kind: protocol-element
summary: 'The ''Media-Accept-Features'' extension field is defined for use in both DSN (per-recipient fields per RFC 1894 section 2.3) and MDN (extension fields per RFC 2298 section 3.1) messages. Its value is a media-feature-tags expression using the ABNF: media-features = "Media-Accept-Features" ":" media-feature-tags.'
