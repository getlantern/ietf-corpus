document: rfc-7432
kind: normative-requirement
summary: Each PE MUST advertise an Inclusive Multicast Ethernet Tag route to handle multi-destination (BUM) traffic. This route MUST carry a PMSI Tunnel attribute per RFC 6514 with the Tunnel Type set to the P-tunnel technology in use (e.g., Ingress Replication or P2MP tree).
section: "11"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
