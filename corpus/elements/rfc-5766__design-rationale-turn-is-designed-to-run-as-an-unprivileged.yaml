document: rfc-5766
kind: design-rationale
summary: TURN is designed to run as an unprivileged user-space application to simplify deployment and enable embedding in peer-to-peer applications. The trade-off is that Diffserv, TTL, and ECN fields may not be preserved and ICMP messages are not relayed.
section: "2.6"
topics:
