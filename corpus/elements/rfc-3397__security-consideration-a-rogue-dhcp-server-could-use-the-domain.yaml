document: rfc-3397
kind: security-consideration
summary: 'A rogue DHCP server could use the domain search option to redirect traffic: a user requesting ''myhost'' expecting ''myhost.bigco.com'' might instead reach ''myhost.roguedomain.com''. DNSSEC does not avert this attack since the rogue domain''s records may be legitimately signed, making this a more fruitful attack avenue than providing an illegitimate DNS server option.'
section: "4"
topics:
    - security
    - dns
