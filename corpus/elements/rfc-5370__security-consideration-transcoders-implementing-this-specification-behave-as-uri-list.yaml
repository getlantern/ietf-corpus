document: rfc-5370
kind: security-consideration
summary: Transcoders implementing this specification behave as URI-list services per RFC 5366, so security considerations from RFC 5363 apply, including list integrity and protection against unsolicited requests. UAs SHOULD integrity-protect URI-lists using S/MIME or TLS, which can also provide confidentiality.
section: "5"
rfc2119_level: SHOULD
topics:
