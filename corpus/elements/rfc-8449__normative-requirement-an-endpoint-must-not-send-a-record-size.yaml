document: rfc-8449
kind: normative-requirement
summary: An endpoint MUST NOT send a `record_size_limit` value higher than the protocol-defined maximum record size unless explicitly allowed by a future version or extension. A server MUST NOT enforce this restriction on the client's advertised value.
section: "4"
rfc2119_level: MUST NOT
topics:
    - tls
