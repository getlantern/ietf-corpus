document: rfc-5751
kind: normative-requirement
summary: For signature generation and encryption key establishment, key sizes 1024-2048 bits are SHOULD; sizes below 1024 are SHOULD NOT. For signature verification and decryption, key sizes 1024-2048 bits are MUST; sizes below 1024 or above 2048 are MAY.
section: "4.2"
rfc2119_level: SHOULD
topics:
