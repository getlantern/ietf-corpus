document: rfc-8964
kind: interoperability-note
summary: ECMP treatment of DetNet flows is NOT RECOMMENDED. An Entropy Label Indicator (ELI) and Entropy Label (EL) MAY be carried below the S-Label to prevent ECMP treatment; when used, the same EL value SHOULD be used for all packets sent using a specific S-Label to force the flow onto a single path.
section: 4.2.2
rfc2119_level: SHOULD NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
