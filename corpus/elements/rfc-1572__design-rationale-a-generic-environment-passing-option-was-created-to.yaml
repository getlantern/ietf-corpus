document: rfc-1572
kind: design-rationale
summary: A generic environment-passing option was created to avoid defining a new Telnet option each time new configuration information needed to be propagated through a session. The option carries arbitrary name/value pairs that the Telnet session itself does not need to interpret.
section: "4"
