document: rfc-7886
kind: wire-format
summary: The S-BFD Target Discriminator ID AVP Attribute Value field encodes one or more 32-bit (4-octet) discriminator values in sequence. At least one discriminator must be present; additional discriminators are optional and follow immediately with no delimiter.
