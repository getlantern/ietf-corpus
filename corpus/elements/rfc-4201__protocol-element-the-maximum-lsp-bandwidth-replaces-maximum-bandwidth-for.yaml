document: rfc-4201
kind: protocol-element
summary: The Maximum LSP Bandwidth replaces Maximum Bandwidth for bundled links. The Maximum LSP Bandwidth of a bundled link at priority p is the maximum of the Maximum LSP Bandwidth at priority p across all of its component links.
section: "3.10"
topics:
