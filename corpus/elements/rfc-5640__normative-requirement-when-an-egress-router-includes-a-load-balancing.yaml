document: rfc-5640
kind: normative-requirement
summary: When an egress router includes a Load-Balancing Block sub-TLV for L2TPv3-over-IP, it MUST encode the Session ID field of the encapsulation sub-TLV so that the most significant bits of the Session ID, after extracting the block, are non-zero.
section: "2.1"
rfc2119_level: MUST
topics:
    - vpn
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
