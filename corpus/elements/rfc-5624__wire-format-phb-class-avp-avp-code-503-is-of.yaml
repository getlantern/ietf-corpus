document: rfc-5624
kind: wire-format
summary: 'PHB-Class AVP (AVP Code 503) is of type Unsigned32 encoding a DiffServ per-hop behavior identifier. It supports three cases: a single PHB (DSCP left-justified in bits 0-5), a set of PHBs (bit 14 set to 1), and experimental/local-use PHBs (12-bit PHBID, bit 15 set to 1).'
section: "3.4"
topics:
    - qos
    - diffserv
    - diameter
