document: rfc-4878
kind: design-rationale
summary: Active OAM mode can initiate monitoring actions (such as putting the peer into loopback), while passive mode waits for the peer to initiate. The default mode should be active unless the device is intended to play a subservient role, reflecting an asymmetric deployment model (e.g., customer premises equipment vs. provider edge).
section: "6"
extracted_by: claude-sonnet-4-6
