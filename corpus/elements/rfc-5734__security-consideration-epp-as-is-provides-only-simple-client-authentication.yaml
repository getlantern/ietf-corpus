document: rfc-5734
kind: security-consideration
summary: EPP as-is provides only simple client authentication using identifiers and plain text passwords; a passive attack is sufficient to recover credentials and forge commands. TLS MUST be used to provide integrity, confidentiality, and mutual authentication.
section: "8"
topics:
