document: rfc-4302
kind: design-rationale
summary: The IPv6 Flow Label is treated as mutable (zeroed before ICV calculation) even though RFC 2460 described it as only potentially mutable. This choice retains compatibility with existing AHv1 implementations that treated the flow label as mutable.
section: 3.3.3.1.2.1
topics:
    - ipsec
    - ip
