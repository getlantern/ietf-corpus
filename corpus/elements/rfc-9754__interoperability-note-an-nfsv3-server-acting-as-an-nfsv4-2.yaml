document: rfc-9754
kind: interoperability-note
summary: An NFSv3 server acting as an NFSv4.2 client gateway can use the delegation timestamps feature to proxy access and modify times for NFSv3 clients, serving attribute queries locally without sending spurious GETATTRs to the NFSv4.2 server. This requires server-client time synchronization, often already provided by RPCSEC_GSS.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
