document: rfc-2227
kind: protocol-element
summary: The 'wont-ask' response directive advises the proxy SHOULD NOT send Meter headers to that server; the proxy should forget this advice after no more than 24 hours. This avoids overhead for servers not wishing to use the Meter header, and implies 'dont-report'.
section: "5.1"
topics:
    - http
