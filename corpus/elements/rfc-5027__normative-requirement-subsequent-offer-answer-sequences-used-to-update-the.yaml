document: rfc-5027
kind: normative-requirement
summary: Subsequent offer/answer sequences used to update the precondition status for a secure media stream SHOULD use the same key material as the initial offer/answer exchange; crypto or key-mgmt attribute lines in offers sent in response to confirm-status SHOULD repeat the same data as the previous offer.
section: "3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - security
    - crypto
