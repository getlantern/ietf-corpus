document: rfc-4867
kind: design-rationale
summary: The built-in redundant transmission scheme (piggy-backing earlier frame-blocks) provides equivalent functionality to RFC 2198 and is more efficient for spreads up to 5 frames. RFC 2198 is preferred only when the time spread exceeds 5 frames or a non-AMR codec is needed for the redundant encoding.
section: 3.7.1
topics:
    - rtp
    - realtime
