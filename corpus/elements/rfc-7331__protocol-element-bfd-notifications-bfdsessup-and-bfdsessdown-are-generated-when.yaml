document: rfc-7331
kind: protocol-element
summary: BFD notifications bfdSessUp and bfdSessDown are generated when contiguous ranges of session entries transition state, carrying two bfdSessDiag instances indicating the low and high index range. For a single session, both instances MUST be identical.
