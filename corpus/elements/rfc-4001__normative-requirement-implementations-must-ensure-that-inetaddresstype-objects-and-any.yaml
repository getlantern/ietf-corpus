document: rfc-4001
kind: normative-requirement
summary: Implementations must ensure that InetAddressType objects and any dependent InetAddress objects are consistent. An inconsistentValue error must be generated if an attempt to change an InetAddressType object would lead to an undefined InetAddress value.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
    - ip
