document: rfc-5888
kind: interoperability-note
summary: For capability negotiation, a client that understands 'group' and 'mid' but does not want to use them can indicate support by including empty 'a=group' lines for each supported semantics value. A server receiving such an offer SHOULD add its capabilities in the same form in the answer.
section: "9.3"
topics:
    - sip
    - realtime
