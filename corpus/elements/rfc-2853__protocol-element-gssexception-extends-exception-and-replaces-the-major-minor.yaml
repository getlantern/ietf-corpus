document: rfc-2853
kind: protocol-element
summary: GSSException extends Exception and replaces the major/minor status code return pattern from the C bindings. It carries a major GSS status code (integer 1–20) and an optional mechanism-specific minor status code, with getMajorString() and getMinorString() for human-readable messages.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
