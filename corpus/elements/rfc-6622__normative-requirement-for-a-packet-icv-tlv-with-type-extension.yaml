document: rfc-6622
kind: normative-requirement
summary: For a Packet ICV TLV with type extension=1, the ICV is calculated over <hash-function>, <cryptographic-function>, <key-id-length>, and <key-id> (in that order) concatenated with the entire packet including packet header, all Packet TLVs (excluding Packet ICV TLVs), and all included messages.
section: 12.2.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
