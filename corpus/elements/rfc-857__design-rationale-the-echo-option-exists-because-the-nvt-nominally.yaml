document: rfc-857
kind: design-rationale
summary: The Echo option exists because the NVT nominally operates with local echoing (keyboard output directly to printer), but highly interactive remote applications need to control echoing. The option allows both ends to agree that characters typed on an NVT keyboard will be echoed by the remote party.
section: "4"
