document: rfc-9142
kind: security-consideration
summary: MODP groups with a modulus size less than 2048 bits are too small for the symmetric ciphers used in SSH. If the diffie-hellman-group-exchange methods are used, the MODP group modulus must be at least 2048 bits.
section: "5"
topics:
    - crypto
    - security
