document: rfc-2598
kind: normative-requirement
summary: Unexpected drops by the downstream domain's policer SHOULD be noted (e.g., via SNMP traps) as possible security violations or serious misconfiguration. Similarly, EF queue overflow drops SHOULD be noted as possible attacks or serious misconfiguration.
section: "3"
rfc2119_level: SHOULD
