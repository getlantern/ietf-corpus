document: rfc-9910
kind: design-rationale
summary: For single-result link relations ('rdap-up', 'rdap-top'), a server may substitute a direct lookup URL for the search URL because both yield the same result at response generation time. However, if the database changes between response generation and client resolution, the results may differ; server operators should consider which approach best serves their clients.
section: "7"
topics:
