document: rfc-6206
kind: normative-requirement
summary: A protocol SHOULD set k and Imin such that Imin is at least two to three times as long as the time required to transmit k packets; otherwise, if more than k nodes simultaneously reset to Imin, the resulting burst of communication causes congestion and significant packet loss that reduces Trickle's efficiency.
section: "6.6"
rfc2119_level: SHOULD
topics:
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
