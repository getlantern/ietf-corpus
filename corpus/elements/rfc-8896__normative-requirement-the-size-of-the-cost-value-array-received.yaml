document: rfc-8896
kind: normative-requirement
summary: The size of the cost value array received by the Client MUST equal the 'number-of-intervals' attribute in the IRD for the requested cost type. When the received array size differs, the Client SHOULD ignore the received array.
section: "3.3"
rfc2119_level: MUST
topics:
    - json
    - http
