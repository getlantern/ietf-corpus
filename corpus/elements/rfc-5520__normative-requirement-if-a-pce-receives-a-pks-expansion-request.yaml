document: rfc-5520
kind: normative-requirement
summary: If a PCE receives a PKS expansion request but cannot find the CPS or if retrieval is not allowed by policy, it MUST respond with a PCRep containing a NO-PATH object. The NO-PATH-VECTOR TLV SHOULD indicate 'Cannot expand PKS' using the assigned bit flag.
section: "4"
rfc2119_level: MUST
topics:
    - routing
