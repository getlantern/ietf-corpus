document: rfc-8311
kind: normative-requirement
summary: Congestion Marking Differences experiments SHOULD modify network behavior for ECT(1) rather than ECT(0) if only one codepoint's behavior is modified. Experiments MUST NOT modify network behavior for ECT(0) in a fashion that requires sender congestion response changes to obtain desired network behavior.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
