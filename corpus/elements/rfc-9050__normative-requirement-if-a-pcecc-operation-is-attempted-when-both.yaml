document: rfc-9050
kind: normative-requirement
summary: If a PCECC operation is attempted when both speakers have not agreed to PCECC capability in OPEN messages, the receiver MUST send a PCErr with Error-Type=19, Error-value=16 and terminate the PCEP session.
section: "5.4"
rfc2119_level: MUST
