document: rfc-6865
kind: security-consideration
summary: Modifying the SBN, ESI, or k fields in the Explicit Source FEC Payload ID or Repair FEC Payload ID can corrupt the source block identified by the SBN. Security measures are RECOMMENDED to protect the integrity of FEC Source and Repair Packets.
section: "6.2"
topics:
