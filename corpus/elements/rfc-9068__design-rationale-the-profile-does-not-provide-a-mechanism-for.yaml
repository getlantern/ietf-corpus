document: rfc-9068
kind: design-rationale
summary: The profile does not provide a mechanism for clients to directly request specific claims in JWT access tokens; instead, the authorization server infers required claims from client_id, scope, and resource parameters. This preserves the authorization server's control over token content.
section: 2.2.2
topics:
    - oauth
    - jose
