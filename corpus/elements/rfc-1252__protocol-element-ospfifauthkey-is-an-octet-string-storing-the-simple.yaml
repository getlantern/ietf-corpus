document: rfc-1252
kind: protocol-element
summary: ospfIfAuthKey is an OCTET STRING storing the simple-password authentication key for an interface; when the key is shorter than 8 octets it is left-adjusted and zero-filled to 8 octets. When read, this object always returns an octet string of length zero to protect the key.
section: "5.7"
topics:
