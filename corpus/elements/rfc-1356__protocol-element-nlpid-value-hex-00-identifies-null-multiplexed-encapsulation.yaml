document: rfc-1356
kind: protocol-element
summary: NLPID value hex 00 identifies Null (multiplexed) encapsulation, allowing multiple network layer protocols over a single virtual circuit. Each X.25 complete packet sequence on such a circuit begins with a one-octet NLPID identifying the protocol for that sequence only.
