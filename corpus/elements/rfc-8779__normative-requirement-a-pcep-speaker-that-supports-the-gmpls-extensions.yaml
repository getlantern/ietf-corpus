document: rfc-8779
kind: normative-requirement
summary: A PCEP speaker that supports the GMPLS extensions defined in this document MUST include the GMPLS-CAPABILITY TLV in the Open message. If one of the PCEP peers does not include this TLV, the peers MUST NOT make use of the objects and TLVs defined in this document.
section: 2.1.2
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
