document: rfc-4301
kind: protocol-element
summary: ICMP error messages received on the unprotected side are forwarded to the IPsec implementation, which may use the embedded original datagram header to correlate with an SA. ICMP messages received on the protected side are processed normally. Protected transit ICMP messages must be examined to apply access control.
section: "6"
topics:
    - ipsec
    - security
    - ip
