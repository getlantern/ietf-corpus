document: rfc-1286
kind: interoperability-note
summary: The Bridge MIB counters and objects apply only to the subset of interface traffic belonging to bridged protocols. In a device that also performs IP routing, only non-IP frames fall within the bridging domain and are counted.
section: 4.2.2
topics:
