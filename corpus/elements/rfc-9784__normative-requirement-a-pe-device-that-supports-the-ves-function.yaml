document: rfc-9784
kind: normative-requirement
summary: A PE device that supports the vES function MUST support local switching among different vESes associated with the same service instance on a single physical port. For Single-Active vESes, local switching is performed among active EVCs associated with the same service instance on the same ENNI.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
