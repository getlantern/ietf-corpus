document: rfc-6619
kind: design-rationale
summary: When user devices connect via individual point-to-point links, the NAT can identify the correct mapping via the interface rather than a unique private IP address, making it possible to support any number of devices behind the NAT using very few IPv4 addresses.
section: "2"
topics:
