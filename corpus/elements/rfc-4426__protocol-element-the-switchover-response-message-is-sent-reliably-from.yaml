document: rfc-4426
kind: protocol-element
summary: The Switchover Response Message is sent reliably from the slave to the master to indicate completion or failure of the switchover. If the slave cannot switch over, both master and slave notify the operator, and the failure MAY trigger end-to-end recovery.
section: 2.5.3
