document: rfc-9462
kind: protocol-element
summary: Discovery using a known resolver name is triggered by issuing a SVCB query for '_dns.<known-name>', which can be sent to any resolver; the resulting records SHOULD be available in public DNS if the resolver's A/AAAA records are also publicly available.
section: "5"
topics:
