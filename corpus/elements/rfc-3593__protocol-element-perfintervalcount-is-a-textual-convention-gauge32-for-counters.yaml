document: rfc-3593
kind: protocol-element
summary: PerfIntervalCount is a Textual Convention (Gauge32) for counters associated with a previous 15-minute measurement interval. At interval end, IntervalCount(n) is discarded, each IntervalCount(i) takes the value of IntervalCount(i-1), and IntervalCount(1) takes the value of CurrentCount.
