document: rfc-7317
kind: wire-format
summary: 'The crypt-hash type encodes passwords in one of four patterns: ''$0$<cleartext>'' for unencrypted values, ''$1$<salt(1-8)>$<hash(22)>'' for MD5, ''$5$(rounds=N$)?<salt(1-16)>$<hash(43)>'' for SHA-256, or ''$6$(rounds=N$)?<salt(1-16)>$<hash(86)>'' for SHA-512. A ''$0$'' prefix signals that the server must compute and store the hash on receipt.'
section: "5"
