document: rfc-2954
kind: security-consideration
summary: The FRS agent exposes traffic parameters, performance counters, and configuration for all customer PVCs. Unauthorized read access could reveal sensitive customer data including CIR, Bc, Be, and DLCI assignments. Instance-level MIB view granularity (section 2.3) is required to prevent cross-customer information disclosure.
section: "6"
topics:
    - security
    - snmp
    - privacy
