document: rfc-5560
kind: normative-requirement
summary: If a packet is sent but lost or does not arrive within [T, T+T0], the Type-P-one-way-packet-arrival-count metric is undefined. Applications MAY report an impossible value (e.g., -1) to indicate this condition instead of undefined.
section: "2.4"
rfc2119_level: MAY
topics:
    - measurement
