document: rfc-5792
kind: security-consideration
summary: 'Trust in the PA-TNC exchange depends on each component in the chain: Posture Collectors must accurately report endpoint posture, Posture Validators must correctly evaluate it, and the Posture Broker Client/Server must faithfully route messages. A compromised endpoint can report false posture and defeat the assessment.'
section: "5.1"
topics:
    - security
