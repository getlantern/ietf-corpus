document: rfc-7433
kind: normative-requirement
summary: A package MUST define a 'purpose' header field value to identify the package. A package MUST describe the new application and provide use case examples. The default 'content' value MUST be defined or referenced. Any restrictions on size of UUI data MUST be described.
section: "5"
rfc2119_level: MUST
topics:
