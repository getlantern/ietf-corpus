document: rfc-6787
kind: security-consideration
summary: 'Indirect content access via URIs (e.g., grammar URIs, audio URIs) introduces risk: a malicious client could direct the server to fetch content from arbitrary hosts or exhaust server resources. Implementations MUST carefully validate URI schemes and enforce access controls, and SHOULD use HTTPS for fetched content.'
section: "12.4"
topics:
    - security
    - realtime
