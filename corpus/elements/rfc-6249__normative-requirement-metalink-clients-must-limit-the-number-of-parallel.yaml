document: rfc-6249
kind: normative-requirement
summary: Metalink clients MUST limit the number of parallel connections to mirror servers, ideally based on observing aggregate throughput changes. Clients MUST NOT make more than one concurrent request to each individual mirror server.
section: "7"
rfc2119_level: MUST
topics:
    - http
    - congestion
