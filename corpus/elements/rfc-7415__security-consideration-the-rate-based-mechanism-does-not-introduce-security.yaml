document: rfc-7415
kind: security-consideration
summary: The rate-based mechanism does not introduce security concerns beyond the general overload control security issues discussed in RFC 7339, with the exception of resonance. Resonance — synchronized bucket occupancies causing peaky arrivals and control instability — is a concern specific to this algorithm, and mitigation methods are described in Section 3.5.3.
section: "6"
topics:
