document: rfc-7503
kind: normative-requirement
summary: All OSPFv3 interfaces SHOULD be autoconfigured to use an Interface Instance ID of 0 for the base IPv6 unicast address family. If IPv4 unicast addresses are advertised, the base IPv4 unicast address family instance ID value of 64 SHOULD be used for those interfaces.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
