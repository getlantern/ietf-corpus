document: rfc-9656
kind: design-rationale
summary: A microwave radio link is always an aggregate of one or multiple carriers. Supporting carriers are identified by their termination points and listed as bundled links in the TE topology model (RFC 8795). The rlt-mode container then further specifies the exact aggregation/protection configuration (e.g., 1+0, 2+0, 1+1).
section: "2.2"
