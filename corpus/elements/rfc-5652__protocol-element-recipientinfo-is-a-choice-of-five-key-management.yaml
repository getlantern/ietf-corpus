document: rfc-5652
kind: protocol-element
summary: 'RecipientInfo is a CHOICE of five key management variants: ktri (KeyTransRecipientInfo), kari ([1] KeyAgreeRecipientInfo), kekri ([2] KEKRecipientInfo), pwri ([3] PasswordRecipientInfo), and ori ([4] OtherRecipientInfo). Any technique may be used per recipient of the same encrypted content.'
section: "6.2"
