document: rfc-5580
kind: normative-requirement
summary: The RADIUS server MUST attach available policy rules to the Access-Accept, Access-Reject, or Access-Challenge message when the RADIUS client is supposed to provide location information. When location information is made available to other entities, the RADIUS server MUST attach the privacy rules to the location information.
section: 7.2.2
rfc2119_level: MUST
topics:
    - radius
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
