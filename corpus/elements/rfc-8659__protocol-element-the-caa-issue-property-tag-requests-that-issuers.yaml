document: rfc-8659
kind: protocol-element
summary: The CAA 'issue' Property Tag requests that Issuers perform CAA issue restriction processing for the FQDN and grants authorization to issue certificates to the named issuer-domain-name. An empty issuer-domain-name (e.g., 'issue ";"') requests that no certificates be issued by any Issuer. Malformed issue-values that do not match the ABNF MUST be treated as specifying an empty issuer-domain-name.
section: "4.2"
topics:
    - dns
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
