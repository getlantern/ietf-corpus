document: rfc-5444
kind: design-rationale
summary: The Message Header is explicitly designed to contain sufficient information (originator address, hop limit, hop count, sequence number) to allow duplicate detection and scope-limited forwarding decisions without parsing the Message Body, enabling separation of forwarding logic from protocol-specific processing.
