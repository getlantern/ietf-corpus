document: rfc-9061
kind: normative-requirement
summary: The seq-overflow flag (permitting sequence number rollover) MUST be false when AEAD encryption is used. Setting this flag to true is strongly discouraged in general.
section: 5.1.2
rfc2119_level: MUST
