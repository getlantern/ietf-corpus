document: rfc-8045
kind: normative-requirement
summary: The IP-Port-Limit-Info Attribute MUST contain the IP-Port-Limit TLV. When IP-Port-Type TLV is absent the limit applies to all IP transport protocols; when IP-Port-Ext-IPv4-Addr TLV is absent the limit applies to all IPv4 addresses managed by the address-sharing device.
section: 3.1.1
rfc2119_level: MUST
topics:
    - radius
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
