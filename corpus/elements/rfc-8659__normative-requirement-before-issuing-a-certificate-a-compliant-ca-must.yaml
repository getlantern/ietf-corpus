document: rfc-8659
kind: normative-requirement
summary: Before issuing a certificate, a compliant CA MUST check for publication of a Relevant RRset. If such an RRset exists, the CA MUST NOT issue a certificate unless the request is consistent with the applicable CAA RRset or an exception in the relevant CP or CPS applies.
section: "3"
rfc2119_level: MUST NOT
topics:
    - dns
    - pkix
    - security
