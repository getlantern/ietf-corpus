document: rfc-3472
kind: protocol-element
summary: Bidirectional LSP setup is indicated by the presence of an Upstream Label TLV (type 0x0826) in the REQUEST message. It uses the same format as the Generalized Label and MUST indicate a label that is valid for forwarding at the time the REQUEST is sent.
