document: rfc-7742
kind: interoperability-note
summary: H.264 optional parameters max-mbps, max-smbps, max-fs, max-cpb, max-dpb, and max-br allow signaling capabilities beyond the profile-level-id level; implementations MAY include them but SHOULD interpret them when received to maximize sent video quality.
