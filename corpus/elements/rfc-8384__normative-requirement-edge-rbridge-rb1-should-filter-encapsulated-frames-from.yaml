document: rfc-8384
kind: normative-requirement
summary: Edge RBridge RB1 SHOULD filter encapsulated frames from Smart Endnode ports based on the inner source MAC and Data Label expected for that Smart Endnode; frames with unexpected MAC or Data Label SHOULD be dropped to prevent rogue injection.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - routing
    - security
