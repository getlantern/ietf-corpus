document: rfc-1766
kind: normative-requirement
summary: When using Multipart/Alternative body parts to convey the same content in different languages, a Content-Language header should be placed on each body part, and a summary Content-Language header should be placed on the Multipart/Alternative itself.
section: "4"
rfc2119_level: SHOULD
