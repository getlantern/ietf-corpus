document: rfc-2233
kind: design-rationale
summary: The non-unicast packet counters (ifInNUcastPkts, ifOutNUcastPkts) are deprecated in favor of separate multicast and broadcast counters introduced by RFC 1229. The output non-unicast counters in RFC 1229 also counted errors, creating definitional inconsistency that the new per-type counters correct.
section: 3.1.8
topics:
    - snmp
