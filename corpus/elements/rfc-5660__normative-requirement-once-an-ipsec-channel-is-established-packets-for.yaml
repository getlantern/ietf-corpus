document: rfc-5660
kind: normative-requirement
summary: Once an IPsec channel is established, packets for the latched connection MUST NOT be sent unprotected or protected by a non-matching SA, and such inbound packets must be dropped or cause channel termination before data can be delivered to the application.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
