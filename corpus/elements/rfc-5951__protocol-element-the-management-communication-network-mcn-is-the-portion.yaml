document: rfc-5951
kind: protocol-element
summary: The Management Communication Network (MCN) is the portion of the Data Communication Network (DCN) supporting management plane communication; it connects management systems with NEs and NEs with NEs. The MCN and SCN are logically separate networks but may share the same physical DCN.
