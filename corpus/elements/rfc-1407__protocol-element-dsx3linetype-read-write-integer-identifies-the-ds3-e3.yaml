summary: 'dsx3LineType (read-write INTEGER) identifies the DS3/E3 application: dsx3M23, dsx3SYNTRAN, dsx3CbitParity, dsx3ClearChannel (C-bits used only for AIS), e3other, e3Framed, or e3Plcp. DS3 operates at 44.736 Mbps; E3 at 34.368 Mbps.'
