document: rfc-5549
kind: normative-requirement
summary: When a next hop address is passed along unchanged (e.g., by a Route Reflector), its encoding MUST NOT be changed. If a particular RR client cannot handle the encoding, the NLRI cannot be distributed to that client.
section: "5"
rfc2119_level: MUST NOT
topics:
