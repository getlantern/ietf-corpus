document: rfc-4319
kind: normative-requirement
summary: Only one threshold notification SHOULD be sent per 15-minute interval per interface. Non-threshold notifications SHOULD be rate limited with at least a 1-minute gap between consecutive same-event notifications; rate-limited notifications are dropped and not queued.
section: "2.8"
rfc2119_level: SHOULD
