document: rfc-9143
kind: privacy-consideration
summary: The identification-tag MUST NOT contain any user information, and applications SHALL avoid generating identification-tags using a pattern that enables user or application identification. The MID SDES item is used solely to associate RTP-based media with the correct SDP 'm=' section.
section: "15.2"
topics:
    - privacy
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
