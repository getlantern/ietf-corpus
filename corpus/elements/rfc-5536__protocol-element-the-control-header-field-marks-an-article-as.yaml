document: rfc-5536
kind: protocol-element
summary: The Control header field marks an article as a control message and specifies desired actions via a verb and optional arguments. Legal verbs and arguments are defined in RFC 5537. An article with a Control header field MUST NOT also have a Supersedes header field.
section: 3.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
