document: rfc-4088
kind: protocol-element
summary: An OID group in an SNMP URI consists of a parenthesized, comma-separated set of OIDs, e.g., (oid1,oid2). Group semantics extend single-OID semantics to each OID in the group, and are intended to support atomic access to related MIB object instances.
section: "4.3"
topics:
    - snmp
