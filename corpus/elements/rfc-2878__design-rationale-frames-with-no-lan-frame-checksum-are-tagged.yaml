document: rfc-2878
kind: design-rationale
summary: Frames with no LAN Frame Checksum are tagged and carried across the PPP link rather than requiring software FCS computation, because requiring FCS calculation in software would impose a severe performance penalty on Bridge/Router implementations and raises interpretation ambiguities.
section: "3.2"
