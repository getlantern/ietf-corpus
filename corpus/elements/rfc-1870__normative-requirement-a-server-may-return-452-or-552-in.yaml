document: rfc-1870
kind: normative-requirement
summary: A server may return 452 or 552 in response to a RCPT command based on per-recipient unwillingness to accept a message of the declared size. A 452 allows requeue; a 552 does not.
section: "6.4"
rfc2119_level: MAY
