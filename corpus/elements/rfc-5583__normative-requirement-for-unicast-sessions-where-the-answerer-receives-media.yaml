document: rfc-5583
kind: normative-requirement
summary: For unicast sessions where the answerer receives media, the answerer MAY remove media Operation Points but MUST use the dependency relations from the offer when sending. For multicast sessions, the answerer MUST accept all Operation Points and their dependencies or MUST remove non-accepted Operation Points completely.
section: "6.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
