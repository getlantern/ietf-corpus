document: rfc-4801
kind: protocol-element
summary: GmplsSegmentDirectionTC defines the direction of data flow on an LSP segment relative to the LSP head. Values are forward(1) (data flows from head-end toward tail-end) and reverse(2) (data flows from tail-end toward head-end).
