document: rfc-8305
kind: normative-requirement
summary: When a client has both IPv4 and IPv6 connectivity, it SHOULD send both AAAA and A DNS queries as soon as possible, with the AAAA query made first and immediately followed by the A query.
section: "3"
rfc2119_level: SHOULD
