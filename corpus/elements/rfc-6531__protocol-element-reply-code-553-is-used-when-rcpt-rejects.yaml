document: rfc-6531
kind: protocol-element
summary: Reply-code 553 is used when RCPT rejects an internationalized address requiring ASCII; reply-code 550 when MAIL rejects one. Enhanced status code X.6.7 ('Non-ASCII addresses not permitted for that sender/recipient') accompanies these when enhanced codes are supported.
section: "3.5"
