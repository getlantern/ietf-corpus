document: rfc-8919
kind: protocol-element
summary: 'The Application Identifier Bit Mask encodes two variable-length bit masks: the Standard Application Identifier Bit Mask (SABM, 0-8 octets) identifying standardized applications (RSVP-TE R-bit, SR Policy S-bit, LFA F-bit) and the User-Defined Application Identifier Bit Mask (UDABM, 0-8 octets) for non-standard applications. Both masks are prefixed by a 1-octet length+flag field.'
section: "4.1"
topics:
