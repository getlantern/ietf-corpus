document: rfc-8028
kind: design-rationale
summary: A PIO with A=0 and L=0 was previously uncommon but is needed to signal to hosts which router to use as first hop for a given source prefix without triggering SLAAC or announcing an on-link prefix. The MIF router scenario in Figure 1 is the motivating example.
