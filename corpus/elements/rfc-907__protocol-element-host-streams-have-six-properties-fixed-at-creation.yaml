document: rfc-907
kind: protocol-element
summary: 'Host streams have six properties fixed at creation: slot size (words of message text per slot), interval (1/2/4/8 frames of 21.2 ms each), reliability, reliability length, priority, and maximum messages per slot. The stream interval cannot be changed after creation; all other properties can be modified via Change Stream Parameters Request.'
section: "6.1"
topics:
    - qos
    - realtime
