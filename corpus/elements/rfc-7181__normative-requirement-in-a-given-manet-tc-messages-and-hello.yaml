document: rfc-7181
kind: normative-requirement
summary: In a given MANET, TC messages and HELLO messages MUST both use IP or both use UDP so that messages of both protocols can be combined into the same RFC 5444 packet.
section: "5.1"
rfc2119_level: MUST
