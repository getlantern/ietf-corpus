document: rfc-7688
kind: protocol-element
summary: Resource Block Pool State sub-TLV describes the usage state of a resource encoded as either a list of integer values or a bitmap indicating whether a single resource is available or in use. This information is dynamic and changes with connection establishment or teardown.
