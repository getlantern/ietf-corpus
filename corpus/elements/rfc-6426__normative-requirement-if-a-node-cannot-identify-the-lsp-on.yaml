document: rfc-6426
kind: normative-requirement
summary: If a node cannot identify the LSP on which an echo response would be sent, the node MUST drop the echo request packet and not send any response. All responses MUST always be sent on an LSP path using the ACH header and ACH channel type of on-demand CV.
section: 4.2.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
