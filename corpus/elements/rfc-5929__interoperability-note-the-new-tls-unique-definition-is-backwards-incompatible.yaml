document: rfc-5929
kind: interoperability-note
summary: 'The new ''tls-unique'' definition is backwards-incompatible with the original except when: (a) only one handshake has taken place before authentication, and (b) that handshake was a full (not abbreviated) handshake. Original and new implementations only interoperate under both conditions.'
section: "8"
