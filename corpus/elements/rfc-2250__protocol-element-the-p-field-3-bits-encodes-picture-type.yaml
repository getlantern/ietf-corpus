document: rfc-2250
kind: protocol-element
summary: 'The P field (3 bits) encodes picture type: I=1, P=2, B=3, D=4; value 0 is forbidden and values 5–7 are reserved. FBV/BFC apply only to B frames; FFV/FFC apply to P and B frames; all four must be zero for I frames.'
