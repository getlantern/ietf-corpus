document: rfc-3038
kind: protocol-element
summary: The VPID notification procedure assigns a shared VP Identifier (VPID) for each direction of a VP link. After VPID notification completes, the VCID of any VC within that VP is constructed as VPID (MSB) concatenated with the VCI (LSB), eliminating the need for a separate per-VC VCID notification.
