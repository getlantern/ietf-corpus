document: rfc-5846
kind: normative-requirement
summary: The Home Agent MUST send the BRI to the mobile node using a Type 2 routing header containing the mobile node's registered IPv6 home address, with the care-of address as the IPv6 destination. If revoking only the IPv4 HoA binding, the HA MUST set the V bit and include the IPv4 Home Address option.
section: "7"
rfc2119_level: MUST
topics:
    - mobility
    - ip
