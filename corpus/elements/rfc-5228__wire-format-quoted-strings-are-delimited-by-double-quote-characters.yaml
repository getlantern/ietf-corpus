document: rfc-5228
kind: wire-format
summary: Quoted strings are delimited by double-quote characters (US-ASCII 34). Inside, '\"' represents a double-quote and '\\' represents a backslash. Scripts SHOULD NOT escape other characters with a backslash; undefined escape sequences like '\a' are interpreted as just 'a'.
section: 2.4.2
topics:
    - email
