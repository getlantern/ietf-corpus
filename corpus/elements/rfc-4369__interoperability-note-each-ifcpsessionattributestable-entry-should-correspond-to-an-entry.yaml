document: rfc-4369
kind: interoperability-note
summary: Each ifcpSessionAttributesTable entry should correspond to an entry in the TCP-MIB tcpConnectionTable (RFC 4022). The InetAddressType values for local and remote portals in the iFCP session table and the TCP-MIB index must match to simplify cross-table lookups. IPv4 sessions may also appear in the legacy tcpConnTable of RFC 2012.
section: "4"
topics:
    - snmp
    - tcp
