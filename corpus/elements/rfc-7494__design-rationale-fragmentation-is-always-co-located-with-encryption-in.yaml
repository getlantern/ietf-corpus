document: rfc-7494
kind: design-rationale
summary: Fragmentation is always co-located with encryption in both profiles because fragmentation and encryption are functionally coupled in IEEE 802.11; placing them at different entities would require re-encryption of fragments, which is not supported.
section: "2.1"
