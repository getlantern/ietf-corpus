document: rfc-3816
kind: protocol-element
summary: rohcChannelTable lists all channels per IP interface used for ROHC compressed packets and/or feedback. Each entry carries rohcChannelID (unique Unsigned32 1..4294967295), rohcChannelType (notInUse/rohc/dedicatedFeedback), rohcChannelFeedbackFor (pointer to data channel), rohcChannelDescr, and rohcChannelStatus (enabled/disabled).
section: 4.1.1
topics:
