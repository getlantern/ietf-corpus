document: rfc-9395
kind: security-consideration
summary: There are only security benefits to deprecating IKEv1 and using IKEv2. Deprecated algorithms have long been in disuse; their non-support in implementations simplifies those implementations and reduces accidental use through misconfiguration or downgrade attacks.
section: "6"
topics:
