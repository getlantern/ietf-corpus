document: rfc-9428
kind: normative-requirement
summary: IIDs for NFC-enabled devices MUST be 64-bit stable random identifiers (RIDs) generated using the algorithm in RFC 7217. The NFC Link-Layer Address (SSAP) MUST be used as the source of the Net_Iface parameter to the F() algorithm.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
