document: rfc-6625
kind: wire-format
summary: 'The MCAST-VPN NLRI of an S-PMSI A-D route contains: RD (8 octets), Multicast Source Length (1 octet), Multicast Source (variable), Multicast Group Length (1 octet), Multicast Group (variable), and Originating Router''s IP Address. In the base specification, source and group length fields are always non-zero.'
