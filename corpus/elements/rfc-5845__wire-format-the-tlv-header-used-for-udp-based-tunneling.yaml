kind: wire-format
summary: The TLV header used for UDP-based tunneling with GRE consists of a 4-bit Type field (always 0), a 4-bit Reserved field, an 8-bit Next Header field (IANA protocol number of following header), and a 16-bit Length field indicating the payload length excluding the TLV header itself.
