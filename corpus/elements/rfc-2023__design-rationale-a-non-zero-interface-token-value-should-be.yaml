document: rfc-2023
kind: design-rationale
summary: A non-zero Interface-Token value should be chosen using the most random means possible, combining sources such as machine serial numbers, other network hardware addresses, and system clocks. A link-layer address alone is insufficient as a seed because it may not always be unique.
section: "4.1"
