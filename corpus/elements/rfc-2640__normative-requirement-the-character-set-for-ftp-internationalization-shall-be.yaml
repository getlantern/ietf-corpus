document: rfc-2640
kind: normative-requirement
summary: The character set for FTP internationalization SHALL be ISO/IEC 10646:1993, and it is STRONGLY RECOMMENDED that clients and servers use UTF-8 encoding when exchanging pathnames. Clients and servers are under no obligation to convert file contents for STOR or RETR operations.
section: "2"
rfc2119_level: RECOMMENDED
topics:
    - email
    - crypto
