document: rfc-1654
kind: normative-requirement
summary: Upon receipt of an OPEN message, a BGP speaker MUST calculate the Hold Timer value as the smaller of its configured Hold Time and the received Hold Time. The Hold Time MUST be either zero or at least three seconds; implementations MUST reject values of one or two seconds.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
