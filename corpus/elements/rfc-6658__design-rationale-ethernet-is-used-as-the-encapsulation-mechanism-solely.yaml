document: rfc-6658
kind: design-rationale
summary: Ethernet is used as the encapsulation mechanism solely for its protocol multiplexing capability and widespread hardware availability. No Ethernet features beyond protocol multiplexing are required; Ethernet OAM is not required, and VLANs, IEEE 802.1p, and 802.1Q tagging are explicitly not supported.
section: "6"
topics:
