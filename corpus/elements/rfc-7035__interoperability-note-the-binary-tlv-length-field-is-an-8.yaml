document: rfc-7035
kind: interoperability-note
summary: The binary TLV Length field is an 8-bit integer limited to 255 octets. This can be problematic for map URLs; applications using the XML form but that may interoperate with a binary decoder are encouraged to keep map URLs within 255 bytes.
section: 4.11.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
