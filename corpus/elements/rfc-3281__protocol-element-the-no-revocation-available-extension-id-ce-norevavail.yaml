document: rfc-3281
kind: protocol-element
summary: The No Revocation Available extension (id-ce-noRevAvail, { id-ce 56 }) signals that no revocation information will be issued for the AC. Its syntax is NULL ('0500'H in DER) and it MUST be non-critical. Where no noRevAvail is present, the AC issuer implicitly commits to supporting revocation status checks.
section: 4.3.6
topics:
    - pkix
    - security
