document: rfc-5268
kind: design-rationale
summary: The Fast Neighbor Advertisement (FNA) message from RFC 4068 is deprecated in favor of the standard Unsolicited Neighbor Advertisement (UNA) with the 'O' bit cleared. This eliminates a separate message type while retaining the same fast attachment-notification semantics using existing Neighbor Discovery infrastructure.
section: "2"
topics:
    - mobility
    - ip
