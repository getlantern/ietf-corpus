document: rfc-9704
kind: normative-requirement
summary: When DNSSEC validation yields an Insecure result, the client SHOULD retry validation using a different method (e.g., external resolver); if not retrying, it MUST consider validation to have failed.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
