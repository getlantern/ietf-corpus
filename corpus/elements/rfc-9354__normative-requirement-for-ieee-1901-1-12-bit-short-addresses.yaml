document: rfc-9354
kind: normative-requirement
summary: For IEEE 1901.1 12-bit short addresses, the 64-bit IID MUST be derived by inserting 0xFFFE into the 48-bit pseudo-address formed from 24-bit NID and 12-bit TEI, resulting in YYYY:YYFF:FE00:0XXX.
