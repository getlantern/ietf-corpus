document: rfc-5465
kind: protocol-element
summary: The NotificationOverflow mechanism allows a server unable to deliver all requested notifications to disable them. The server MUST send an untagged 'OK [NOTIFICATIONOVERFLOW]' response and behave as if NOTIFY NONE had been received.
section: "5.8"
topics:
