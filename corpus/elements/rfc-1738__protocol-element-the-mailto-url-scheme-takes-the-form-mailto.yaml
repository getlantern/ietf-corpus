document: rfc-1738
kind: protocol-element
summary: The mailto URL scheme takes the form `mailto:<rfc822-addr-spec>` and designates an Internet mailing address. It does not refer to a data object; there are no reserved characters, but '%' in RFC 822 addresses must be encoded.
