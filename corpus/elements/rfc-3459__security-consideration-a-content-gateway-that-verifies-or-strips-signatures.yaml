document: rfc-3459
kind: security-consideration
summary: A content gateway that verifies or strips signatures on behalf of endpoints becomes a target for tampering. When the gateway establishes a signature mechanism between itself and the endpoint, the gateway must be secured, as it holds responsibility for signed component integrity.
section: "15"
topics:
