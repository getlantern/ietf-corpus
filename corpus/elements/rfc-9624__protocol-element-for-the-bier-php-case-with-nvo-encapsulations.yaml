document: rfc-9624
kind: protocol-element
summary: 'For the BIER PHP case with NVO encapsulations, a well-known IP multicast destination address is used: 224.0.0.122 (IPv4) or FF02:0:0:0:0:0:0:14 (IPv6). These addresses are shared across all BDs; the inner NVO header identifies the specific BD.'
section: "2.1"
topics:
