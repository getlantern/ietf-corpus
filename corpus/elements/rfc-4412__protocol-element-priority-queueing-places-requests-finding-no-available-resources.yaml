document: rfc-4412
kind: protocol-element
summary: Priority queueing places requests finding no available resources into per-priority queues served in first-come, first-served order. Full queues cause immediate rejection; queued requests exceeding a waiting time limit are ejected with 408 (Request Timeout). An RP actor MAY impose a global queue size limit dropping lower-priority entries with 408.
section: 4.5.2
topics:
    - sip
    - realtime
