document: rfc-5654
kind: normative-requirement
summary: Following a control-plane failure, the control plane MUST be capable of restarting and relearning its previous state without impacting forwarding. The control plane MUST also provide a mechanism for dynamic ownership transfer between management plane and control plane, minimizing data-plane reconfiguration.
section: "2.4"
rfc2119_level: MUST
topics:
    - mpls
