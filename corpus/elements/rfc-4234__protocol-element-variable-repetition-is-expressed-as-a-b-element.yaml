document: rfc-4234
kind: protocol-element
summary: Variable repetition is expressed as <a>*<b>element, meaning at least <a> and at most <b> occurrences. Default values are 0 and infinity; *element allows any number including zero, 1*element requires at least one.
section: "3.6"
