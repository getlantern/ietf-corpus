document: rfc-7941
kind: wire-format
summary: The two-byte format consists of an 8-bit ID field followed by an 8-bit length field (len), where the data payload is len bytes of UTF-8 text encoding the SDES item value. This reuses the RFC 5285 two-byte header format and supports SDES items up to 255 bytes.
section: 4.1.2
topics:
