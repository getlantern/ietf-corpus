document: rfc-9925
kind: protocol-element
summary: id-rdna-unsigned (OID 1.3.6.1.5.5.7.25.1) is a placeholder RDN attribute type whose value is a zero-length UTF8String. Senders MAY use a single-attribute, single-RDN issuer of this type as a placeholder when a non-empty issuer is syntactically required.
section: "3.2"
topics:
