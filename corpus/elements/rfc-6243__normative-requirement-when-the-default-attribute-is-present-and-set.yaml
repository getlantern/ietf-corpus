document: rfc-6243
kind: normative-requirement
summary: When the 'default' attribute is present and set to 'true' or '1' in <edit-config> or <copy-config>, the server MUST treat it as a request to return the node to its default value. The node MUST contain a value equal to the schema default value; otherwise the server MUST return an 'invalid-value' error.
section: 4.5.2
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
