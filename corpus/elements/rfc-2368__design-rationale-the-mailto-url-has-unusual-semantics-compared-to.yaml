document: rfc-2368
kind: design-rationale
summary: 'The mailto URL has unusual semantics compared to schemes like http: resolving it does not cause immediate interaction with a server. Instead, the client creates a draft message with header fields set as defaults, which the user may edit, send, or discard.'
