document: rfc-5660
kind: normative-requirement
summary: Under no circumstance is the PAD to be modified at all by connection latching, and IPsec policy databases MUST NOT be modified in any way that persists beyond the lifetime of the related packet flows or survives reboots.
section: "1"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
