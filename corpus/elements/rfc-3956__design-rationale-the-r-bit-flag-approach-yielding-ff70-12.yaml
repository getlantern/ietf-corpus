document: rfc-3956
kind: design-rationale
summary: The R-bit flag approach (yielding FF70::/12) was chosen over using the leftmost reserved bits (which would have produced FF3x:8000::/17). The flag-bit approach leverages the existing P and T bit semantics from RFC 3306 and keeps the address format extensions coherent.
