document: rfc-2910
kind: security-consideration
summary: IPP clients MUST support Digest Authentication [RFC2617] with MD5 and MD5-sess. IPP Printers SHOULD support Digest Authentication with MD5 and MD5-sess. The Message Integrity feature need not be used.
section: 8.1.1
rfc2119_level: MUST
topics:
    - security
    - http
