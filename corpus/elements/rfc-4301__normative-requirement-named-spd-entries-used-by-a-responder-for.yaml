document: rfc-4301
kind: normative-requirement
summary: Named SPD entries used by a responder for access control (e.g., for road warriors) MUST be supported by all IPsec implementations. The name communicated via IKE in the ID payload is bound to the Remote IP address in the SAD entry created by the negotiation.
section: 4.4.1.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
