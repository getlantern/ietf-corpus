document: rfc-9922
kind: normative-requirement
summary: In 'recurrence-utc-with-periods', the 'period-start' timeticks value MUST NOT exceed the value of the frequency instance (e.g., must be < 100 for secondly, < 6000 for minutely, < 360000 for hourly, < 8640000 for daily, etc.).
section: 3.3.6
rfc2119_level: MUST NOT
