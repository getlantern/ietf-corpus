document: rfc-6936
kind: normative-requirement
summary: Transported protocols SHOULD send keepalive messages with a zero UDP checksum to discover paths with middleboxes that drop zero-checksum packets; an endpoint that observes appreciable keepalive loss MAY terminate the tunnel.
