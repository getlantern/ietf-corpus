document: rfc-3219
kind: normative-requirement
summary: KEEPALIVE messages MUST NOT be sent more than once every 3 seconds. If the negotiated Hold Time is zero, periodic KEEPALIVE messages MUST NOT be sent. An implementation SHOULD adjust the KEEPALIVE rate as a function of the negotiated Hold Time.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - routing
    - voip
