document: rfc-9294
kind: normative-requirement
summary: When the same application-specific link attributes are advertised both within the ASLA TLV and as top-level TLVs, the attributes within the ASLA TLV take precedence for the applications indicated in the ASLA TLV encoding.
section: "3"
rfc2119_level: MUST
topics:
