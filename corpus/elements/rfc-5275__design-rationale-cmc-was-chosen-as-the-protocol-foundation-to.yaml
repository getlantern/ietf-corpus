document: rfc-5275
kind: design-rationale
summary: CMC was chosen as the protocol foundation to avoid creating an entirely new protocol. Its layering model—control attributes included in a CMC message protected by CMS—provides the request/response structure needed for GL management without reinventing transport or protection primitives.
