document: rfc-6551
kind: design-rationale
summary: A single link or node characteristic can serve simultaneously as a metric (to optimize path cost) and as a constraint (to filter links/nodes). For example, hop count may be minimized as an additive metric while a maximum-hop constraint prunes paths that exceed an operator-defined bound.
