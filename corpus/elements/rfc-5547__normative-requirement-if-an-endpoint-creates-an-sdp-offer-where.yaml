document: rfc-5547
kind: normative-requirement
summary: If an endpoint creates an SDP offer where the 'file-transfer-id' is unchanged but the file selector changes to select a new file, this is an error and the SDP answerer MUST abort the file transfer operation (e.g., by setting the port to zero).
section: "8.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
