document: rfc-4750
kind: protocol-element
summary: The ospfAreaTable (OID ospf 2) describes configured parameters and statistics for each OSPF area, including area ID, authentication type, import policy (importExternal/importNoExternal/importNssa), SPF run count, ABR/ASBR counts, LSA count, NSSA translator role and state, and translator stability interval. Area 0.0.0.0 is always the backbone.
