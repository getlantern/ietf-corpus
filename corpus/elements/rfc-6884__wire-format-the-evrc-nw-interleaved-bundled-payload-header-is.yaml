document: rfc-6884
kind: wire-format
summary: 'The EVRC-NW interleaved/bundled payload header is a 32-bit structure containing: Reserved (R, 1 bit, MUST be zero), Encoding capability flag (C, 1 bit), Interleave length (LLL, 3 bits), Interleave index (NNN, 3 bits), Mode request (MMM, 3 bits), Count (5 bits), followed by TOC entries and codec data frames.'
