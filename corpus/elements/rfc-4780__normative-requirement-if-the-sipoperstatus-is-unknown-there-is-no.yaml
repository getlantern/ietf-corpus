document: rfc-4780
kind: normative-requirement
summary: If the sipOperStatus is 'unknown', there is no corresponding value of applOperStatus; therefore, the last known value of applOperStatus SHOULD be maintained until sipOperStatus transitions to a value that can be mapped appropriately.
