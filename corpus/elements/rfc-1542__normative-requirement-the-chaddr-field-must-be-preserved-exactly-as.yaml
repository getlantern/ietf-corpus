document: rfc-1542
kind: normative-requirement
summary: The 'chaddr' field MUST be preserved exactly as specified by the BOOTP client. A relay agent MUST NOT reverse the bit ordering of 'chaddr' even when relaying between networks that use different bit orderings.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
