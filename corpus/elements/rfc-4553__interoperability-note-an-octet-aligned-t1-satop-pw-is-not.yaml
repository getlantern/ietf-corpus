document: rfc-4553
kind: interoperability-note
summary: An octet-aligned T1 SAToP PW is not interoperable with a regular T1 SAToP PW carrying a non-aligned bit-stream; both sides MUST agree on using this mode during PW setup for the PW to be operational.
