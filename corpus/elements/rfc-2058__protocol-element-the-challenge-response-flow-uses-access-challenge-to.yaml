document: rfc-2058
kind: protocol-element
summary: The challenge/response flow uses Access-Challenge to issue an unpredictable number to the user, who encrypts it with their device. The NAS re-submits an Access-Request with a new ID, the encrypted response in User-Password, and the State attribute from the challenge (if any) copied unmodified.
section: "2.1"
topics:
    - radius
    - security
