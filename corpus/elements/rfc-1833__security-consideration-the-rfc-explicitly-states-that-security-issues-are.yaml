document: rfc-1833
kind: security-consideration
summary: The RFC explicitly states that security issues are not discussed in this memo. The only access control specified is that RPCBPROC_SET and RPCBPROC_UNSET are restricted to local clients, and that only the service owner or super-user may unset a registration.
section: Security Considerations
