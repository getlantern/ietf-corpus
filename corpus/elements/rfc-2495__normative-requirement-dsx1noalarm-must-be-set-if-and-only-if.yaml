document: rfc-2495
kind: normative-requirement
summary: dsx1NoAlarm must be set if and only if no other status flag is set in the dsx1LineStatus bitmap. If dsx1LoopbackState is set, the actual loopback in effect is determined from dsx1LoopbackConfig.
section: 3.1.1
rfc2119_level: MUST
