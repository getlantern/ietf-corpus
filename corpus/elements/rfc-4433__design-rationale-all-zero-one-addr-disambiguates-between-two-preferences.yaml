summary: 'ALL-ZERO-ONE-ADDR disambiguates between two preferences: 255.255.255.255 signals a preference for an HA in the home domain, while 0.0.0.0 indicates no preference, allowing the network to assign any suitable HA regardless of domain proximity.'
