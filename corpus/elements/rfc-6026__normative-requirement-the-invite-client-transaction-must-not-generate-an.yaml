document: rfc-6026
kind: normative-requirement
summary: The INVITE client transaction MUST NOT generate an ACK to any 2xx response on its own; ACK generation is delegated to the TU. A UAC core sends ACK via a new transaction; a proxy core forwards the 2xx upstream.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
