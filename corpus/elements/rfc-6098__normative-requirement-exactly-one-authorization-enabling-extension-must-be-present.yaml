document: rfc-6098
kind: normative-requirement
summary: Exactly one authorization-enabling extension MUST be present in a GNM. If no such extension is found, more than one is found, or the Authenticator is invalid, the receiver MUST reject the GNM and SHOULD log the error as a security exception.
section: 4.5.1
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
