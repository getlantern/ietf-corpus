document: rfc-6788
kind: design-rationale
summary: The LIO mechanism is explicitly NOT RECOMMENDED for networks requiring the subscriber's MAC address for identification, because AN-initiated RSes are not preceded by an L2 frame from the subscriber, making it impossible to determine the end-device's MAC address.
section: "2"
