document: rfc-4604
kind: normative-requirement
summary: If the host IP module of an SSM-aware host receives a non-source-specific request to receive multicast traffic sent to an SSM destination address, it SHOULD return an error to the application (MODIFICATION to IGMPv3/MLDv2).
section: "2.1"
rfc2119_level: SHOULD
topics:
    - multicast
