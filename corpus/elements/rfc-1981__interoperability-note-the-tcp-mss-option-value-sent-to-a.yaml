document: rfc-1981
kind: interoperability-note
summary: The TCP MSS option value sent to a peer is independent of the local PMTU. The TCP layer must also store the MSS received from its peer and must not send any segment larger than that peer MSS, regardless of the PMTU.
section: "5.4"
topics:
    - tcp
    - ip
