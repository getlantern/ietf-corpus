document: rfc-6407
kind: normative-requirement
summary: A GCKS MUST distribute unique keys for each Data-Security SA that uses a counter-based mode of operation (AES-CTR, AES-GCM, AES-CCM, AES-GMAC) in order to maintain unique key and nonce usage across all group senders.
