document: rfc-6320
kind: wire-format
summary: ANCP TLVs consist of a 16-bit IANA-registered Type field, a 16-bit Length field (byte count of the Value field, excluding padding), and a variable-length Value field padded with zeroes to a 4-byte word boundary. TLVs may be nested; padding within inner TLVs MUST be included in the outer Length.
section: 3.6.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
