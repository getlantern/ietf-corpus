document: rfc-9341
kind: protocol-element
summary: 'Single-Marking delay methodology: whenever the color changes, a measurement node timestamps the first packet of the new block. Comparing the timestamp of the same first packet at an upstream node versus a downstream node yields the one-way delay for that block.'
