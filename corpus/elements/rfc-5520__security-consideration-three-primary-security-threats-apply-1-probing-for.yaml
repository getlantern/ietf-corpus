document: rfc-5520
kind: security-consideration
summary: 'Three primary security threats apply: (1) probing for CPS contents via random path-key expansion requests, (2) alteration of path-keys by intermediaries or insertion of fake keys, and (3) DoS via flooding with bogus expansion requests. Most threats can be mitigated using existing PCEP and RSVP-TE security mechanisms for point-to-point authenticated communication.'
