document: rfc-2060
kind: normative-requirement
summary: A server MUST send mailbox size updates automatically if a mailbox size change is observed during command processing. A client implementation MUST record mailbox size updates and MUST NOT assume any command after initial mailbox selection will return the mailbox size.
section: "5.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
