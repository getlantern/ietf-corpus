document: rfc-9141
kind: security-consideration
summary: Replacing cleartext FTP URIs with HTTPS ensures resources on the IETF infrastructure can be accessed securely. HTTPS provides an encrypted channel including server identity verification via certificate validation and integrity/confidentiality protections commensurate with the negotiated TLS version and ciphersuite.
