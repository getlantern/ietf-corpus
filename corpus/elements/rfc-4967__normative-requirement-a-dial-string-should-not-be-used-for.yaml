document: rfc-4967
kind: normative-requirement
summary: A dial string SHOULD NOT be used for an Address of Record (AoR) in a SIP REGISTER request, because parameters are ignored in registration and two registrations with different phone-contexts would be considered equivalent.
section: "4"
rfc2119_level: SHOULD NOT
topics:
