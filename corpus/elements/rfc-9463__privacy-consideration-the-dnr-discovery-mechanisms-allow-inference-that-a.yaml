document: rfc-9463
kind: privacy-consideration
summary: The DNR discovery mechanisms allow inference that a DHCP client or IPv6 host supports Encrypted DNS options, but do not reveal whether clients can consume them or disclose their encryption capabilities. The mechanisms do not expose more privacy information than existing Do53 discovery options. Encrypted DNS does not reduce data available at the resolver itself.
section: "8"
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
