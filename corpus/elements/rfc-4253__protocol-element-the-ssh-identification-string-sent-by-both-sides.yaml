document: rfc-4253
kind: protocol-element
summary: The SSH identification string sent by both sides upon connection has the format 'SSH-protoversion-softwareversion SP comments CR LF'. For SSH version 2.0, the protoversion MUST be '2.0'. The string is limited to 255 characters including CR LF.
section: "4.2"
topics:
    - security
    - crypto
