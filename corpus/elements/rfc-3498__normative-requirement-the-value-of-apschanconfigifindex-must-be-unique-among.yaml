document: rfc-3498
kind: normative-requirement
summary: The value of apsChanConfigIfIndex MUST be unique among all instances; a particular SONET LTE (ifType sonet(39)) can only be configured in one APS group. This object cannot be changed while the associated APS group is active.
section: "4"
rfc2119_level: MUST
