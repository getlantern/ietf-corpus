document: rfc-6638
kind: protocol-element
summary: Freebusy information is requested by POSTing a VFREEBUSY/METHOD:REQUEST iCalendar object to the Organizer's scheduling Outbox. The response is an XML document rooted at CALDAV:schedule-response containing one CALDAV:response per requested calendar user, each with delivery status and optionally a VFREEBUSY component.
