document: rfc-3456
kind: normative-requirement
summary: The assigned DHCP address MUST NOT be depended upon for security. A remote host can always set its own IP address and thus evade any security measures based on DHCP authentication; the security gateway MUST use per-tunnel packet filters or quick mode selectors instead.
section: "5"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
