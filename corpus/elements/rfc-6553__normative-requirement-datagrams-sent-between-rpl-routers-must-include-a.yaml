document: rfc-6553
kind: normative-requirement
summary: Datagrams sent between RPL routers MUST include a RPL Option or RPL Source Route Header (RFC 6554) and MAY include both. A datagram with a Source Routing Header need not include the RPL Option since the SRH already guarantees loop freedom.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
