document: rfc-8323
kind: protocol-element
summary: Capabilities and Settings Messages (CSMs, code 7.01) carry capability options (what the sender can receive) and setting options (what the sender will apply). One CSM MUST be sent at connection start; additional CSMs MAY be sent later. Options are cumulative and not reset by subsequent CSMs.
section: "5.3"
topics:
    - tcp
