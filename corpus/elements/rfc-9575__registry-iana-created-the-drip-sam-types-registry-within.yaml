document: rfc-9575
kind: registry
summary: IANA created the 'DRIP SAM Types' registry within the 'Drone Remote ID Protocol' registry group as a mirror of ASTM allocations. New additions require Standards Action coordinated with ICAO as ASTM's designated registrar. Values 0x01 (DRIP Link), 0x02 (DRIP Wrapper), 0x03 (DRIP Manifest), and 0x04 (DRIP Frame) are allocated to IETF.
