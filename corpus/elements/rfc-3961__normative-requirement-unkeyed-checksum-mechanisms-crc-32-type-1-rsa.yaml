document: rfc-3961
kind: normative-requirement
summary: Unkeyed checksum mechanisms (CRC-32 type 1, RSA-MD4 type 2, RSA-MD5 type 7) may only be used with caution in limited circumstances where the lack of a key creates no attack window, preferably only within an encrypted message. Keyed checksum algorithms are recommended.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
