document: rfc-2625
kind: normative-requirement
summary: The LLC Header value SHALL be set to 0xAA-AA-03; other values of DSAP/SSAP SHALL NOT be used. The SNAP OUI SHALL be 0x00-00-00 with PID 0x08-00 for IP and 0x08-06 for ARP/InARP.
