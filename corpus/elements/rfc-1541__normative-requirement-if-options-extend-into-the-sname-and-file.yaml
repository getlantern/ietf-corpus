document: rfc-1541
kind: normative-requirement
summary: If options extend into the 'sname' and 'file' fields, the 'option overload' option MUST appear in the 'options' field. The 'options' field MUST be interpreted first, then 'file', then 'sname'. Each overloaded field MUST begin with the first octet, be terminated by 'end', and padded with 'pad' options.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
