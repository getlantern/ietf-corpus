document: rfc-5295
kind: design-rationale
summary: The NULL octet separator between the key label and optional data was chosen to prevent collisions when one key label is a prefix of another (e.g., "foobar" vs "foobarExtendedV2"), as a simpler alternative to a label assignment policy prohibiting prefixes.
