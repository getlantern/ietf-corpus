document: rfc-1990
kind: normative-requirement
summary: An implementation MUST set the sequence number of the first fragment transmitted on a newly-constructed bundle to zero. Joining a secondary link to an existing bundle is invisible to the protocol and MUST NOT reset the sequence number space.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
