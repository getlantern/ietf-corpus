summary: 'The Flow-based PM encapsulation consists of three 32-bit label stack entries: Extension Label (value 15), Flow-ID Label Indicator (value 18), and Flow-ID Label. The FL''s TC field is repurposed to carry L (loss), D (delay), and T (type) bits rather than traffic-class markings.'
