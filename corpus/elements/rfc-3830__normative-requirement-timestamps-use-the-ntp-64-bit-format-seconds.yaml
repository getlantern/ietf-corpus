document: rfc-3830
kind: normative-requirement
summary: Timestamps use the NTP 64-bit format (seconds since 0h, 1 January 1900). Implementations MUST be aware of and account for the ~136-year counter overflow. UTC is RECOMMENDED.
section: 4.2.8
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
