document: rfc-1583
kind: normative-requirement
summary: When forwarding an IP packet, it must always be forwarded to the network that is the best (longest/most specific) match for the packet's destination. Subnet masks must be assigned so that the best match for any IP destination is unambiguous.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
