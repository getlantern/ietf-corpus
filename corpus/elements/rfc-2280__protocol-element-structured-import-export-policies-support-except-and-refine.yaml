document: rfc-2280
kind: protocol-element
summary: 'Structured import/export policies support EXCEPT and REFINE operators. EXCEPT subtracts: right-hand-side filters are restricted to routes also matched by the left, and left-hand-side filters exclude routes matched by the right. REFINE takes the Cartesian product of peerings with ANDed filters and concatenated actions.'
section: "6.6"
topics:
