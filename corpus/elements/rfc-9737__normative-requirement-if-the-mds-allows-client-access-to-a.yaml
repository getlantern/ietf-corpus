document: rfc-9737
kind: normative-requirement
summary: If the MDS allows client access to a file during resilvering, the client MUST have the same layout (set of mirror instances) after the resilvering as before, and any proxy server inserted into the layout MUST stay in the layout until the grace period is finished.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
