document: rfc-6311
kind: normative-requirement
summary: The IKE Message ID synchronization request value M1 MUST be chosen so that it is larger than any value known to have been used; it is RECOMMENDED to increment the known value at least by the size of the IKE sender window.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
