document: rfc-8362
kind: design-rationale
summary: The N-bit is introduced as distinct from the LA-bit to allow explicit identification of a router's own address (a 'Node' address) versus a local interface address. The LA-bit could also be set on anycast addresses, making it insufficient for applications such as Segment Routing Node SID identification that require selection of a prefix uniquely associated with the advertising router.
section: 3.1.1
topics:
    - routing
