document: rfc-9622
kind: normative-requirement
summary: Protocol-specific Transport Property names MUST use the protocol acronym as the Namespace (e.g., tcp.userTimeoutValue). Vendor-specific Properties MUST be placed in a Namespace starting with underscore ('_'). IETF protocol-specific Property names MUST be specified in an RFC from the IETF Stream after IETF Review.
section: "4.1"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
