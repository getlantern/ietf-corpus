document: rfc-4202
kind: design-rationale
summary: 'To prevent data traffic from exhausting control channel capacity in GMPLS optical networks, a router can restrict BGP nexthop resolution: if the nexthop resolves via an interface that is not packet-switch capable, a discard route is installed for the BGP destination rather than forwarding over the control channel.'
section: "1.2"
topics:
    - routing
