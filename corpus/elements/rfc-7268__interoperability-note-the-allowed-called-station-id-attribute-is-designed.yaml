document: rfc-7268
kind: interoperability-note
summary: The Allowed-Called-Station-Id Attribute is designed primarily for wireless pre-authentication scenarios (e.g., IEEE 802.11 pre-authentication) where no Called-Station-Id is present in the Access-Request. The attribute is expected to be used largely in wireless access scenarios; the potential lack of space for a full NID-Name in wired 802.1X scenarios is acknowledged but not considered serious.
section: "2.1"
topics:
    - radius
