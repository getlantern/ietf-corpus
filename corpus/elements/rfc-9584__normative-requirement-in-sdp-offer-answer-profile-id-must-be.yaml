document: rfc-9584
kind: normative-requirement
summary: In SDP Offer/Answer, profile-id MUST be used symmetrically. The answerer MUST either keep all configuration parameters identical to the offer (with level-id allowed to be lower) or remove the media format entirely. The answer MUST NOT contain a payload type from the offer with a configuration differing in any parameter except level-id.
section: 7.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
