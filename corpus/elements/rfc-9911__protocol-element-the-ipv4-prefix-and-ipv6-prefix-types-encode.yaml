document: rfc-9911
kind: protocol-element
summary: The ipv4-prefix and ipv6-prefix types encode IP prefixes in address/length notation. Implementations MUST return values in canonical format with non-prefix bits set to zero (e.g., 192.0.2.1/24 is accepted but returned as 192.0.2.0/24).
