document: rfc-3460
kind: protocol-element
summary: PolicyRoleCollection is a new class derived from CIM Collection that aggregates resources sharing a common role (via ElementInPolicyRoleCollection). Its PolicyRole property must match the PolicyRoles property of applicable PolicySets, enabling PDPs to determine rule applicability to resources.
section: 5.6.2
