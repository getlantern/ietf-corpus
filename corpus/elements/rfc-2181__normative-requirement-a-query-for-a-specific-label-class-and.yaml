document: rfc-2181
kind: normative-requirement
summary: A query for a specific label, class, and type must return all records in the associated RRSet. If the entire RRSet will not fit in the response, the response must be marked as truncated (TC bit set).
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
