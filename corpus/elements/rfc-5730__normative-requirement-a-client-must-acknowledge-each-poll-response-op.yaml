document: rfc-5730
kind: normative-requirement
summary: A client MUST acknowledge each <poll> response (op="ack" with the msgID) to dequeue the message and make subsequent messages available. The server MUST dequeue the message and decrement the queue counter after acknowledgement.
section: 2.9.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
