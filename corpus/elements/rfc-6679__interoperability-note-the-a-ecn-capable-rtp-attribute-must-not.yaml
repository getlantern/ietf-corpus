document: rfc-6679
kind: interoperability-note
summary: The 'a=ecn-capable-rtp:' attribute MUST NOT be used for RTP sessions using TCP, SCTP, or DCCP transport or for non-RTP sessions, since those transports have native ECN support. It is only applicable to RTP sessions over UDP/IP.
section: 6.1.3
rfc2119_level: MUST NOT
topics:
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
