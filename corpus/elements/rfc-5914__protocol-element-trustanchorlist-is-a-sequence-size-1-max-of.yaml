kind: protocol-element
summary: TrustAnchorList is a SEQUENCE SIZE (1..MAX) OF TrustAnchorChoice, allowing a collection of trust anchors to be represented together. TrustAnchorChoice is a CHOICE among a bare Certificate, a TBSCertificate ([1] EXPLICIT), and a TrustAnchorInfo ([2] EXPLICIT).
