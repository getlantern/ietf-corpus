document: rfc-6674
kind: normative-requirement
summary: Softwire peers SHOULD use the correct path MTU value for the tunnel path between the access gateway and AFTR. This value MAY be statically configured at softwire creation time or dynamically discovered using standard path MTU discovery techniques.
section: "5"
rfc2119_level: SHOULD
