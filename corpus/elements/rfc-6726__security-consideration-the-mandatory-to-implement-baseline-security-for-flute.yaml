document: rfc-6726
kind: security-consideration
summary: The mandatory-to-implement baseline security for FLUTE is IPsec/ESP in transport mode, inheriting ALC's baseline. Data origin authentication, content integrity, and anti-replay SHALL be supported; confidentiality is RECOMMENDED. Automated key management is RECOMMENDED for long-lived sessions.
section: "7.5"
topics:
    - security
    - ipsec
