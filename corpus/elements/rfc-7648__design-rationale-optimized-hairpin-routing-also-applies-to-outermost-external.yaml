document: rfc-7648
kind: design-rationale
summary: Optimized hairpin routing also applies to outermost external addresses; since the proxy knows these addresses, it can anticipate and perform hairpin rewriting locally, offering higher throughput and lower latency than routing packets all the way to the outermost NAT gateway.
section: "3.1"
