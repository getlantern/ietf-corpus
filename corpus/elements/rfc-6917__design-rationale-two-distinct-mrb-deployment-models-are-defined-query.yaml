document: rfc-6917
kind: design-rationale
summary: 'Two distinct MRB deployment models are defined: Query MRB (AS explicitly queries MRB via HTTP or SIP before connecting to MS, MRB is off the signaling path) and In-line MRB (AS sends control/media signaling directly to MRB, which remains in the path). Both share the same Publish interface so MS implementations need not change.'
