document: rfc-5985
kind: normative-requirement
summary: Devices MUST NOT use the 'Expect' header or the 'Range' header in HELD requests. The LIS MAY return 501 (not implemented) errors if either of these HTTP features are used.
section: "8"
rfc2119_level: MUST NOT
