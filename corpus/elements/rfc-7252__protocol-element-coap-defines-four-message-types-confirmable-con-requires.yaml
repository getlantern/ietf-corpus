document: rfc-7252
kind: protocol-element
summary: 'CoAP defines four message types: Confirmable (CON, requires ACK or RST), Non-confirmable (NON, no ACK required but has a Message ID for deduplication), Acknowledgement (ACK, echoes Message ID of CON), and Reset (RST, indicates missing context). Requests may be carried in CON or NON; responses may be carried in CON, NON, or piggybacked in ACK.'
section: "2.1"
topics:
