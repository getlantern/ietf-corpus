document: rfc-2960
kind: security-consideration
summary: 'The State Cookie four-way handshake protects against flooding attacks analogous to TCP SYN floods: the server allocates no state until the COOKIE ECHO carrying a valid MAC is received, so a spoofed INIT wave cannot exhaust server resources.'
section: 11.2.4.1
topics:
    - sctp
    - security
