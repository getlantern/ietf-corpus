document: rfc-4476
kind: security-consideration
summary: If an AC is tied to the holder's PKC using the baseCertificateID component and a rogue CA shares the same issuer name, a malicious party could use a fraudulently issued PKC together with the AC. Proper PKI name management or use of ObjectDigestInfo mitigates this.
section: "3"
topics:
    - pkix
    - security
