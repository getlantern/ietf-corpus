document: rfc-6052
kind: normative-requirement
summary: Bits 64 to 71 of an IPv4-embedded IPv6 address are reserved for compatibility with the IPv6 host identifier format and MUST be set to zero. When using a /96 Network-Specific Prefix, administrators MUST ensure bits 64–71 are zero.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
