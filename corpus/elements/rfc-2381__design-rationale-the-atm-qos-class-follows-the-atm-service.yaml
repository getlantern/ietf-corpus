document: rfc-2381
kind: design-rationale
summary: The ATM QoS Class follows the ATM service category rather than the IP service to avoid combinations unlikely to be supported. For example, if only nrtVBR is available for GS, choosing QoS Class 1 (real-time) would likely cause connection failure.
section: "2.6"
topics:
