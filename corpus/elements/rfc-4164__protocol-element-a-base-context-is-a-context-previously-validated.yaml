document: rfc-4164
kind: protocol-element
summary: A base context is a context previously validated by both compressor and decompressor. The compressor uses a base context as the reference when building a new context via replication. Only contexts acknowledged by the decompressor (using the CRC option) are eligible as base contexts.
section: "2"
