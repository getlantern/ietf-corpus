document: rfc-6469
kind: normative-requirement
summary: The choice of bundled or unbundled audio/video transmission MUST be indicated as part of the dynamic payload type assignment and MUST remain unchanged for the duration of the RTP session to avoid complicated sequence number synchronization procedures.
section: "2.3"
rfc2119_level: MUST
topics:
