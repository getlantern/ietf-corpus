document: rfc-4030
kind: normative-requirement
summary: At the replay detection check stage, the receiver MUST NOT update its notion of the last valid Replay Detection value until the checksum has been successfully tested, to prevent a malicious host from injecting a high replay counter value.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - security
