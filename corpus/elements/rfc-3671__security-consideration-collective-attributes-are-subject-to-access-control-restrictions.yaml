document: rfc-3671
kind: security-consideration
summary: Collective attributes are subject to access control restrictions and other administrative policy. Access via an entry in a collection is governed by rules for that entry's attributes; access via a subentry is governed by rules for that subentry's attributes. Because LDAP lacks a standard access model, server implementations may differ in specifics.
section: "4"
topics:
    - ldap
    - security
