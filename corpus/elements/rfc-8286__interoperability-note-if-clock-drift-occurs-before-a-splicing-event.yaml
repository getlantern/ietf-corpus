document: rfc-8286
kind: interoperability-note
summary: If clock drift occurs before a splicing event, causing the RTP-to-NTP timestamp mapping to change, an updated RTCP SR or updated Splicing Interval information may need to be sent in a timely manner to maintain accurate splicing at the splicer.
section: "3.2"
topics:
