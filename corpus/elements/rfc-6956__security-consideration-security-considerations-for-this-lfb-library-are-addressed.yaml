document: rfc-6956
kind: security-consideration
summary: Security considerations for this LFB library are addressed in Section 9, which references the ForCES protocol security mechanisms defined in RFC 5810 and the FE model security in RFC 5812. The LFB library itself does not introduce additional security mechanisms beyond those defined in the ForCES framework.
section: "9"
topics:
    - security
    - routing
