document: rfc-3111
kind: design-rationale
summary: SLPv2 for IPv4 uses only one administratively scoped multicast address because only 256 relative assignments were available. IPv6's larger address space and scoped multicast architecture allow a range of distinct group-id assignments (FF0X::116, FF0X::123, FF0X::1:1000–13FF), improving scalability and reducing unnecessary multicast delivery.
section: "4.1"
topics:
    - multicast
    - v6ops
