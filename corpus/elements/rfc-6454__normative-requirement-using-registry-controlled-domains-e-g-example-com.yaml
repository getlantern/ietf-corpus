document: rfc-6454
kind: normative-requirement
summary: Using 'registry-controlled' domains (e.g., 'example.com' instead of 'www.example.com') as the unit of isolation is NOT RECOMMENDED because the notion of a registry-controlled domain depends on human practice rather than DNS properties, and is incompatible with non-DNS URI schemes.
section: "8.2"
rfc2119_level: SHOULD NOT
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
