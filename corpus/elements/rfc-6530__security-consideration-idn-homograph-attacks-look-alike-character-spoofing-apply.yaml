document: rfc-6530
kind: security-consideration
summary: IDN homograph attacks (look-alike character spoofing) apply to the local part of internationalized email addresses just as they do to domain names in URLs. The fix of forcing displayed elements to normalized lowercase that works for domain names does not apply to email local parts, which are case-sensitive.
section: "13"
topics:
    - email
    - security
