document: rfc-6488
kind: protocol-element
summary: The Binary-Signing-Time attribute (OID 1.2.840.113549.1.9.16.2.46) MAY be present but its presence or absence MUST NOT affect validity. Its value is a BinaryTime INTEGER (0..MAX) representing time as defined in RFC 6019.
