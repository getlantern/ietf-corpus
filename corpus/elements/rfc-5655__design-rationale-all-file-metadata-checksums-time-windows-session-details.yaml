document: rfc-5655
kind: design-rationale
summary: All file metadata (checksums, time windows, session details) is stored as IPFIX Options within the message stream rather than in a separate file header, making IPFIX Files fully wire-protocol-compatible and requiring no extensions to the IPFIX protocol itself.
