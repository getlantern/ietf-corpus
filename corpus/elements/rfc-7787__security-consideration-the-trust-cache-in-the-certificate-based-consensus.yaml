document: rfc-7787
kind: security-consideration
summary: The trust cache in the certificate-based consensus mechanism can be poisoned before revocation occurs, allowing a compromised device to rejoin the network under a different identity. Remediation may require physical intervention and manual flushing of trust caches on all nodes.
section: "10"
topics:
