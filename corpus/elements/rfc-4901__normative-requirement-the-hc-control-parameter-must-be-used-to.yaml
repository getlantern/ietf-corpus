document: rfc-4901
kind: normative-requirement
summary: The HC control parameter MUST be used to identify packet types for the HC scheme in use. The PW label MUST be used as the demultiplexer field by the HD, appearing at the bottom of the MPLS label stack. The LSR performing decompression MUST ensure that the label it distributes for a channel is unique.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
