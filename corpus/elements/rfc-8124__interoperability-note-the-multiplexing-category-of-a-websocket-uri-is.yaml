document: rfc-8124
kind: interoperability-note
summary: The multiplexing category of 'a=websocket-uri' is CAUTION because bundling WebSocket is technically possible but considered impractical. No multiplexing rules are specified; if future extensions define WebSocket bundling, multiplexing rules for this attribute will need to be defined separately.
section: "3.3"
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
