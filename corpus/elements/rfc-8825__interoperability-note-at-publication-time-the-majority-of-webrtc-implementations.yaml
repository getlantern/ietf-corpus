document: rfc-8825
kind: interoperability-note
summary: At publication time, the majority of WebRTC implementations support ICE as described in RFC 5245 and use a pre-standard version of Trickle ICE (RFC 8838). The 'ice2' attribute defined in RFC 8445 can be used to detect the version in use and provide a smooth transition.
