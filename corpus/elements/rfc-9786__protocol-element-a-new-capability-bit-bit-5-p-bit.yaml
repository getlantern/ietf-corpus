document: rfc-9786
kind: protocol-element
summary: 'A new capability bit (Bit 5, ''P'' bit) is defined in the DF Election Capabilities bitmap of the DF Election Extended Community (RFC 8584): ''Port Mode Designated Forwarder Election''. When set, it signals that the DF election algorithm SHOULD be modified to consider the port ES only and not the Ethernet Tags.'
section: "3.1"
topics:
