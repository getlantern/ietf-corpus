document: rfc-3775
kind: design-rationale
summary: The return routability procedure was chosen for correspondent node binding authorization because it requires no pre-arranged security associations or PKI between mobile nodes and correspondent nodes, enabling global-scale deployment. The accepted trade-off is that on-path adversaries are not mitigated, since they can already redirect traffic without Mobile IPv6.
section: "5.2"
topics:
    - security
    - crypto
    - ip
    - mobility
