document: rfc-2584
kind: interoperability-note
summary: If hprIpActiveLsLsName has the same value as appnLsName in the APPN MIB, or hprIpAppnPortName equals appnPortName, they refer to the same APPN link station or port respectively, providing cross-MIB linkage.
