document: rfc-8555
kind: normative-requirement
summary: Use of HTTPS is REQUIRED for all ACME communications. ACME servers SHOULD follow the TLS recommendations of RFC 7525. ACME clients MUST send a User-Agent header field including the ACME software name and version.
section: "6.1"
rfc2119_level: REQUIRED
topics:
