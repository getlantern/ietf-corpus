document: rfc-3173
kind: design-rationale
summary: Small IP datagrams are likely to expand as a result of compression, so a numeric threshold should be applied before compression; IP datagrams smaller than the threshold are sent in original form. The threshold is implementation dependent.
section: "2.2"
topics:
    - ip
