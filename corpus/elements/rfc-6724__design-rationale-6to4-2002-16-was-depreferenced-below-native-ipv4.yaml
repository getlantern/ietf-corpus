document: rfc-6724
kind: design-rationale
summary: 6to4 (2002::/16) was depreferenced below native IPv4 because 6to4 connectivity is less reliable today and expected to be phased out. It remains above Teredo (2001::/32) because 6to4 is more efficient in connection establishment time, bandwidth, and server load.
section: Appendix B
