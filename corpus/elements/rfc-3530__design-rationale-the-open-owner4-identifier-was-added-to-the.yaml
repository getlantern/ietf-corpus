document: rfc-3530
kind: design-rationale
summary: The open_owner4 identifier was added to the state model (relative to RFC 3010) specifically to accommodate POSIX-based clients, where a file descriptor may be shared among processes (open_owner4) while individual processes hold locks (lock_owner4). This mapping enables correct POSIX file locking semantics over NFS.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
