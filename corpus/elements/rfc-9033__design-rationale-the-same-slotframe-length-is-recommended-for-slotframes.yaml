document: rfc-9033
kind: design-rationale
summary: The same slotframe length is RECOMMENDED for Slotframes 0, 1, and 2 because it allows a node to determine which slotOffset values are already used by its AutoRxCell when generating a CellList for 6P negotiated cells, thereby avoiding scheduling collisions between autonomous and negotiated cells at the same [slotOffset, channelOffset].
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
