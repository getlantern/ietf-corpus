document: rfc-3193
kind: normative-requirement
summary: Once the L2TP tunnel is deleted by either peer, any phase 1 and phase 2 SAs which still exist as a result of the L2TP tunnel between the peers SHOULD be deleted. Phase 1 and phase 2 delete messages SHOULD be sent when this occurs.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - vpn
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
