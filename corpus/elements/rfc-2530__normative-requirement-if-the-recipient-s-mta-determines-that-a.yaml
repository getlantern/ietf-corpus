document: rfc-2530
kind: normative-requirement
summary: If the recipient's MTA determines that a message cannot be processed, it is strongly encouraged to reject the message with enhanced status code 5.6.1 (RFC 1893), either in response to the end-of-mail-data indicator (if RFC 2034 enhanced error codes are supported) or by generating a delivery failure DSN.
section: "4"
rfc2119_level: SHOULD
topics:
