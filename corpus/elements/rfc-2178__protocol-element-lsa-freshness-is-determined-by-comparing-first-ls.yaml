summary: 'LSA freshness is determined by comparing: first LS Sequence Number (higher is newer), then LS Checksum (higher is newer if sequence numbers equal), then LS Age (newer if one is MaxAge; otherwise the one less than MaxAgeDiff=900 seconds older is considered newer).'
