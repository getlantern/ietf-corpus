document: rfc-4601
kind: normative-requirement
summary: The Address List option MUST be included in all Hello messages if secondary addresses exist; the primary address of the source interface MUST NOT be listed within it. This enables the NBR macro to map MRIB next-hop information to the correct primary address for Join/Prune destinations.
section: 4.3.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
