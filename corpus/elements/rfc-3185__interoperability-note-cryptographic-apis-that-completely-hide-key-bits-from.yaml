document: rfc-3185
kind: interoperability-note
summary: Cryptographic APIs that completely hide key bits from the CMS layer will likely prevent CEK reuse under this scheme, since they lack a primitive that transforms MSG1.CEK into MSG2.KEK; implementers should verify API support before adopting this approach.
