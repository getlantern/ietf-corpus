document: rfc-4012
kind: design-rationale
summary: The MPBGP protocol name (rather than BGP4+) was chosen for the dictionary because the '+' character is not allowed by RPSL specification in protocol names. MPBGP is understood to mean BGP4 with multi-protocol extensions.
