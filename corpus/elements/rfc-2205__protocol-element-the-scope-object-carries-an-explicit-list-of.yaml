document: rfc-2205
kind: protocol-element
summary: The SCOPE object carries an explicit list of sender hosts toward which a Resv, ResvErr, or ResvTear message is to be forwarded, used to prevent forwarding loops in wildcard-style reservations. A SCOPE object appearing in a ResvTear message is ignored.
section: 3.1.2
topics:
