document: rfc-6749
kind: protocol-element
summary: An access token is an opaque string representing a specific scope and duration of access, issued to the client by the authorization server. Tokens may be identifiers or self-contained signed assertions; their format is defined by companion specifications such as RFC 6750.
section: "1.4"
topics:
