document: rfc-2915
kind: normative-requirement
summary: Among NAPTR records with equal Order values, records SHOULD be processed in ascending Preference order. A client MAY consider records with higher Preference if it has a reason such as not understanding the preferred protocol or service.
section: "2"
rfc2119_level: SHOULD
