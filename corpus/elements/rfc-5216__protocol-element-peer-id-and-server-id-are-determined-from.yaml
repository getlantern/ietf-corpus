document: rfc-5216
kind: protocol-element
summary: Peer-Id and Server-Id are determined from the subject or subjectAltName fields in certificates. For hosts, dnsName SHOULD be present; for users, rfc822Name conforming to NAI grammar SHOULD be used. Multiple subjectAltName fields are all considered valid identifiers.
section: "5.2"
topics:
