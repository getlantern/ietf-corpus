document: rfc-6775
kind: protocol-element
summary: The Authoritative Border Router Option (ABRO) carries a monotonically increasing version number and the originating 6LBR address, allowing 6LRs to suppress redistribution of stale prefix/context information and associate PIOs and 6COs with their originating 6LBR.
