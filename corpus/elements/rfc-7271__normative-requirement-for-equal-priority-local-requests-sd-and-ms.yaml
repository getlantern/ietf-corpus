document: rfc-7271
kind: normative-requirement
summary: For equal-priority local requests (SD and MS), the first-come, first-served rule SHALL be applied; a subsequent equal-priority request requesting a different FPath action is considered lower priority. For MS commands, the subsequent conflicting local MS SHALL be rejected and cleared.
section: 10.2.1
rfc2119_level: SHALL
topics:
