document: rfc-4825
kind: normative-requirement
summary: For SIP-based systems, it is RECOMMENDED that the XUI equal the user's Address-of-Record (AOR). A SIP User Agent SHOULD assume its XUI equals its AOR if no XUI is explicitly provisioned, since SIP URI characters not allowed in HTTP path segments (such as '?' and '/') MUST be percent-encoded.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - http
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
