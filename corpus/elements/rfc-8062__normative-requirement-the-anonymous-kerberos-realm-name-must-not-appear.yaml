document: rfc-8062
kind: normative-requirement
summary: The anonymous Kerberos realm name MUST NOT appear in the transited field of a ticket. The TGS MAY omit the previous realm from the transited field if the cross-realm TGT is anonymous, to hide the authentication path.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
