document: rfc-9801
kind: security-consideration
summary: A data-plane attack may force PLE packets to be dropped, reordered, or delayed beyond the de-jitter buffer limit, leading to degradation or service disruption; RFC 9055 (DetNet Security Considerations) is cited as a reference. PTP-based clock synchronization is also sensitive to PDV and vulnerable to threats outlined in RFC 7384.
section: "9"
topics:
