document: rfc-4439
kind: protocol-element
summary: t11FamFcIdCacheTable caches recently released Fibre Channel Address Identifiers to support best-effort re-assignment (Preferred Domain_ID concept). Each entry maps a WWN index (t11FamFcIdCacheWwn) to a range described by t11FamFcIdCacheAreaIdPortId and t11FamFcIdCachePortIds. The oldest entry is evicted when the cache reaches t11FamMaxFcIdCacheSize.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
