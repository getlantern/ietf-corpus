document: rfc-977
kind: design-rationale
summary: NNTP was designed so that news articles need only be stored on one central host, with subscribers on other hosts reading via stream connections. This avoids the inefficiency of mailing list distribution where a separate copy is sent to each subscriber, consuming large quantities of bandwidth, CPU, and disk at each destination.
section: "1.3"
topics:
