document: rfc-2261
kind: protocol-element
summary: The Message Processing Subsystem is responsible for preparing outgoing messages and extracting data from received messages. It may contain multiple Message Processing Models simultaneously (e.g., SNMPv1, SNMPv2c, SNMPv3, and others), enabling an SNMP engine to send and receive multiple versions of SNMP messages.
section: 3.1.1.3
