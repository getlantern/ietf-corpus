document: rfc-8344
kind: protocol-element
summary: The 'ipv6-privacy-autoconf' feature indicates support for privacy extensions per RFC 4941. When declared, the 'create-temporary-addresses', 'temporary-valid-lifetime', and 'temporary-preferred-lifetime' leaves in the 'autoconf' container are available.
