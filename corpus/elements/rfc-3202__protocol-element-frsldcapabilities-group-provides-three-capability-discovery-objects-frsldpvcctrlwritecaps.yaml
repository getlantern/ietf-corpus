document: rfc-3202
kind: protocol-element
summary: 'frsldCapabilities group provides three capability-discovery objects: frsldPvcCtrlWriteCaps (writable objects in PVC control table), frsldSmplCtrlWriteCaps (writable objects in sample control table), and frsldRPCaps (bitmask of reference points the device supports). Four memory-management objects (frsldMaxPvcCtrls, frsldNumPvcCtrls, frsldMaxSmplCtrls, frsldNumSmplCtrls) control allocation limits.'
section: 3.6.1
topics:
