document: rfc-4244
kind: privacy-consideration
summary: The History-Info header can inadvertently reveal routing information about the requestor. The Privacy header with priv-values 'session', 'header', or 'history' controls whether intermediaries include or strip History-Info. Local policy may further restrict which Request-URIs are captured or forwarded.
section: "3.3"
topics:
    - sip
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
