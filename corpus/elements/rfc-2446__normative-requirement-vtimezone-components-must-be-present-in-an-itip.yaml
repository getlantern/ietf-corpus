document: rfc-2446
kind: normative-requirement
summary: VTIMEZONE components MUST be present in an iTIP message if any date/time value in the message refers to a timezone. Within VTIMEZONE, DTSTART MUST be in local time format, and each STANDARD or DAYLIGHT sub-component must have TZOFFSETFROM and TZOFFSETTO.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
