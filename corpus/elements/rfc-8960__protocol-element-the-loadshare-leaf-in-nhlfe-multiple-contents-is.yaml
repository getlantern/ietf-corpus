document: rfc-8960
kind: protocol-element
summary: The 'loadshare' leaf in 'nhlfe-multiple-contents' is a uint16 (default 1) used to compute unequal load balancing ratios across multiple outgoing next hops. A share is the ratio of this value to the total across all next hops, per RFC 3031 Sections 3.11 and 3.12.
section: "2.5"
topics:
    - mpls
    - yang
