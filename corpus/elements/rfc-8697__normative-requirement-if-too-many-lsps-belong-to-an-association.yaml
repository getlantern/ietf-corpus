document: rfc-8697
kind: normative-requirement
summary: If too many LSPs belong to an association group, the PCEP speaker MUST return PCErr Error-Type 26, Error-value 2 ('Too many LSPs in the association group'). If a new association cannot be handled, it MUST return Error-Type 26, Error-value 3 ('Too many association groups').
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
