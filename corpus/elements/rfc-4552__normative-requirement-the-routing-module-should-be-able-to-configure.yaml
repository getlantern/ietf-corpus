document: rfc-4552
kind: normative-requirement
summary: The routing module SHOULD be able to configure, modify, and delete IPsec rules on the fly, which is needed mainly for securing virtual links. IP encapsulation of ESP packets MUST be supported; UDP encapsulation of ESP packets SHOULD NOT be used.
section: "6"
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
    - routing
