document: rfc-3501
kind: normative-requirement
summary: A server MUST implement a configuration that does NOT permit any plaintext password mechanisms unless STARTTLS has been negotiated or equivalent protection is provided. A client MUST NOT send a LOGIN command if the LOGINDISABLED capability is advertised.
section: 6.2.3
rfc2119_level: MUST
topics:
    - email
    - security
