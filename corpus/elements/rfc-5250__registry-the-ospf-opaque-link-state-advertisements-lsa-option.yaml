document: rfc-5250
kind: registry
summary: 'The OSPF Opaque Link-State Advertisements (LSA) Option Types registry is updated: values 0-127 require IETF Consensus, values 128-255 are reserved for Private Use. Assigned values include: 1 (Traffic Engineering LSA, RFC 3630), 2 (Sycamore Optical Topology Descriptions), 3 (grace-LSA, RFC 3623), 4 (Router Information RI, RFC 4970), 5-127 unassigned.'
