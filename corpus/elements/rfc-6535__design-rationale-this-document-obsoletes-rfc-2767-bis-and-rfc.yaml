document: rfc-6535
kind: design-rationale
summary: This document obsoletes RFC 2767 (BIS) and RFC 3338 (BIA) and combines them into a single Standards Track document. Key improvements include use of RFC 1918 addresses instead of unassigned addresses (0.0.0.1-0.0.0.255), addition of PTR/reverse DNS support, DNSSEC considerations, and a recommendation to prefer the API-layer approach.
section: "7"
topics:
