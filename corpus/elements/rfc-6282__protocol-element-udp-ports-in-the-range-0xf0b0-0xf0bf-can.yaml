document: rfc-6282
kind: protocol-element
summary: UDP ports in the range 0xf0b0–0xf0bf can be compressed to 4 bits using stateless compression (P=11 in UDP LOWPAN_NHC). This is a 16-port range inherited from RFC 4944 and is not IANA-reserved.
