document: rfc-5613
kind: protocol-element
summary: The Extended Options and Flags (EOF) TLV has Type=1 and a 4-byte Value field. Its bits MAY announce OSPF link-local capabilities or perform boolean link-local signaling. The EOF-TLV MUST only appear once in the LLS data block.
section: "2.4"
topics:
    - routing
