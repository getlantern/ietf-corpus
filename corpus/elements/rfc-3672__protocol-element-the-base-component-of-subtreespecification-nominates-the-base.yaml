document: rfc-3672
kind: protocol-element
summary: The base component of SubtreeSpecification nominates the base entry of the subtree as an RDNSequence relative to the scope root; when absent or empty, the root entry of the scope is the base. Entries not subordinate to the base are excluded from the subtree.
section: 2.1.1
topics:
