document: rfc-5063
kind: protocol-element
summary: 'The Capability object is carried in RSVP Hello messages. Absence of the Capability object MUST be treated as if all three bits (T, R, S) are cleared (0). The Hello message format is extended to: <Hello Message> ::= <Common Header> [<INTEGRITY>] <HELLO> [<RESTART_CAP>] [<CAPABILITY>].'
section: "4.2"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
