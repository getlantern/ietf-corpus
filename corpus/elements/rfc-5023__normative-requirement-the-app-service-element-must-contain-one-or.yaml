document: rfc-5023
kind: normative-requirement
summary: The app:service element MUST contain one or more app:workspace elements. Each app:workspace MUST contain one atom:title element. Each app:collection element MUST contain an 'href' attribute giving the Collection IRI and MUST contain one atom:title element.
section: 8.3.1
rfc2119_level: MUST
