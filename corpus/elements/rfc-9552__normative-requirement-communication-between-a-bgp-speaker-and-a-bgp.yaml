document: rfc-9552
kind: normative-requirement
summary: Communication between a BGP Speaker and a BGP-LS Consumer MUST be unidirectional (from BGP Speaker to Consumer). A BGP-LS Consumer MUST NOT send information to a BGP Speaker for origination into BGP-LS.
section: "3"
rfc2119_level: MUST NOT
topics:
