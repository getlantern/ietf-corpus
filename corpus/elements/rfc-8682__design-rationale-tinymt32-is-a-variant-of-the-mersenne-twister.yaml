document: rfc-8682
kind: design-rationale
summary: 'TinyMT32 is a variant of the Mersenne Twister with a far shorter period (2^127 - 1 vs. MT''s 2^19937 - 1), but this tradeoff is intentional: the merit is the small 127-bit internal state, which is compatible with embedded devices where MT''s 19937-bit state is impractical.'
section: "1"
