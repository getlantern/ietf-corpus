document: rfc-7441
kind: interoperability-note
summary: The C-multicast Shared Tree Join route and Source Active A-D route are not used for mLDP signaling because mLDP does not have unidirectional shared trees. The Intra-AS and Inter-AS I-PMSI A-D routes do not carry protocol-specific multicast state and are unaffected by this document.
