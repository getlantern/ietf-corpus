document: rfc-1532
kind: protocol-element
summary: The 'flags' field (2 octets) has its most significant bit defined as the BROADCAST (B) flag; the remaining 15 bits are designated MBZ (MUST BE ZERO) and reserved for future use. The BROADCAST flag signals to servers and relay agents that the client requires broadcast delivery of BOOTREPLY messages.
section: "2.2"
topics:
