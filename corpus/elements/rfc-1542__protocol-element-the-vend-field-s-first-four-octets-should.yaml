document: rfc-1542
kind: protocol-element
summary: The 'vend' field's first four octets SHOULD contain a magic cookie (99.130.83.99 in dotted decimal for the standard format) to identify the vendor information format. If no information follows, the byte after the cookie SHOULD be the 'End' tag (255) and remaining bytes zeroed.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
