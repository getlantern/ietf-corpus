document: rfc-8104
kind: normative-requirement
summary: A protector MUST advertise the Egress Protection Capability TLV in its LDP Initialization and Capability messages. The TLV MUST carry the context identifier(s) of the {primary PE, protector} pairs for which the sender is the protector. This TLV MUST NOT be advertised by the primary PE or backup PE to the protector.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
