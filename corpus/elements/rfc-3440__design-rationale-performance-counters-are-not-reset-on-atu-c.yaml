document: rfc-3440
kind: design-rationale
summary: Performance counters are not reset on ATU-C or ATU-R reinitialization — only on agent reset or reinitialization. This ensures continuity of performance data across link-layer events, which are frequent in ADSL operation.
section: 4.2.5
