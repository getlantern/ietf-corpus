document: rfc-4319
kind: design-rationale
summary: The MIB module is designed to require no management communication between modems beyond what is inherent in the EOC line protocol (ANSI T1E1.4 for HDSL2, ITU G.991.2 for SHDSL), allowing an agent to reside at either end of the line.
