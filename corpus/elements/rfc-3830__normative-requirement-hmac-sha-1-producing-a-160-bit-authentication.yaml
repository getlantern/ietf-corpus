document: rfc-3830
kind: normative-requirement
summary: HMAC-SHA-1 producing a 160-bit authentication tag is the mandatory MAC algorithm. The authentication key SHOULD be 160 bits (equal to the hash output size). NULL MAC MUST NOT be used unless underlying protocols guarantee security.
section: 4.2.4
rfc2119_level: MUST NOT
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
