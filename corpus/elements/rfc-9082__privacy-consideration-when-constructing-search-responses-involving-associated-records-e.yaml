document: rfc-9082
kind: privacy-consideration
summary: When constructing search responses involving associated records (e.g., IDN variants), the response must be filtered by privacy and data-releasing policies. There may not be a single static policy for all clients; client identity and authorization can determine the breadth of returned data.
section: "4.2"
topics:
    - privacy
    - registry
