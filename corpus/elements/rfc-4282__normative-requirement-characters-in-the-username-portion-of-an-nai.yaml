document: rfc-4282
kind: normative-requirement
summary: Characters in the username portion of an NAI MUST satisfy the ABNF in Section 2.1 and the requirements of RFC 4013 (SASLprep), including mapping, normalization, prohibited output, bidirectional character handling, and exclusion of unassigned code points.
section: "2.4"
rfc2119_level: MUST
