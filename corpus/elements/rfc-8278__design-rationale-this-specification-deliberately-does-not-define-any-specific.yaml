document: rfc-8278
kind: design-rationale
summary: This specification deliberately does not define any specific traffic distribution scheme, but identifies per-flow and per-packet distribution as two well-known implementation approaches, noting that per-packet distribution requires care due to reordering, buffering, and application performance impacts from asymmetric link characteristics.
section: "3.2"
topics:
