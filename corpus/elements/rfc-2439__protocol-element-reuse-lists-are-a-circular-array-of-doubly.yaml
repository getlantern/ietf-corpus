document: rfc-2439
kind: protocol-element
summary: Reuse lists are a circular array of doubly-linked list heads, each representing suppressed routes scheduled for reevaluation at a specific future time increment (delta-reuse). Routes are inserted into the list corresponding to their estimated reuse eligibility time.
