document: rfc-2937
kind: wire-format
summary: Option code is 117 (1 byte), followed by a length field (1 byte), followed by an ordered sequence of 16-bit big-endian integers, each representing a DHCP option code for a name service. Minimum length is 2 bytes (one name service entry).
