document: rfc-3640
kind: normative-requirement
summary: Receivers capable of receiving modes that support interleaving MUST be able to decode interleaved Access Units. When interleaving is applied, senders MUST signal the maximum displacement in time via the MIME parameter 'maxDisplacement'.
section: 3.2.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
