document: rfc-9479
kind: normative-requirement
summary: Maximum reservable link bandwidth and unreserved bandwidth are RSVP-TE-specific; when advertised via ASLA, bits other than the R-bit MUST NOT be set in the Application Identifier Bit Mask. Advertisements with other bits set MUST be ignored.
section: 4.2.2
rfc2119_level: MUST
topics:
