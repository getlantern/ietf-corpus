document: rfc-4338
kind: normative-requirement
summary: An IP-capable Nx_Port MUST support N_Port_Name formats 0x1, 0x2, 0x5, 0xC, 0xD, 0xE, or 0xF; MUST support Class 3; MUST support continuously increasing SEQ_CNT; and MUST be able to transmit and receive an FC-4 Information Unit at least 1304 octets long.
section: "3"
rfc2119_level: MUST
topics:
