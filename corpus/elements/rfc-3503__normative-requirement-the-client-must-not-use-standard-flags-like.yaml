document: rfc-3503
kind: normative-requirement
summary: The client MUST NOT use standard flags like \Draft or \Answered to indicate MDN was previously sent. In the presence of the $MDNSent keyword, the client MUST ignore all other flags or keywords for MDN generation purposes and MUST NOT send the MDN.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
