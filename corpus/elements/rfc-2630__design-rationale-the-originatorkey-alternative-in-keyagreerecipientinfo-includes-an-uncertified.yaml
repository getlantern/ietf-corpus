document: rfc-2630
kind: design-rationale
summary: The originatorKey alternative in KeyAgreeRecipientInfo includes an uncertified ephemeral public key, permitting originator anonymity. The optional UKM field ensures a distinct pairwise key is derived even when the same two parties communicate repeatedly with the same ephemeral key.
section: 6.2.2
topics:
    - crypto
    - security
    - privacy
