document: rfc-3014
kind: normative-requirement
summary: If adding an entry would exceed nlmConfigGlobalEntryLimit or system resources, the oldest entry in any log SHOULD be removed. If adding an entry would exceed nlmConfigLogEntryLimit, the oldest entry in that specific log SHOULD be removed.
section: "3"
rfc2119_level: SHOULD
