document: rfc-2236
kind: protocol-element
summary: 'Key timer defaults: Query Interval = 125 seconds, Query Response Interval = 100 (10 seconds), Last Member Query Interval = 10 (1 second), Unsolicited Report Interval = 10 seconds, Version 1 Router Present Timeout = 400 seconds. Non-default timer settings MUST be consistent among all routers on a single link.'
