document: rfc-3961
kind: normative-requirement
summary: The four 'weak' and twelve 'semi-weak' DES keys identified in the DES specifications SHALL NOT be used for encrypting Kerberos messages. The 48 'possibly-weak' keys are not avoided; weak-key corrections are applied after key generation and string-to-key operations.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
