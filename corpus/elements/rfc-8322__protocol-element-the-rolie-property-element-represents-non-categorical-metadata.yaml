document: rfc-8322
kind: protocol-element
summary: The rolie:property element represents non-categorical metadata as name/value pairs in an atom:entry, where 'name' is a URI identifying the property and 'value' is unbounded text. It supplements atom:category for properties such as content-specific identifiers where allowed values are unbounded.
section: 6.2.4
topics:
