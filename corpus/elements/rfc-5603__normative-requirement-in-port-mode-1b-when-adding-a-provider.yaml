document: rfc-5603
kind: normative-requirement
summary: In port mode (1B) when adding a provider VLAN tag to outgoing PW packets using addVlan, the pwType SHOULD be set to EthernetTagged. In single VLAN one-to-one, change, and remove modes, pwType SHOULD also be EthernetTagged.
section: "9"
rfc2119_level: SHOULD
