document: rfc-8675
kind: design-rationale
summary: The module intentionally does not add all existing IETF tunneling technologies (e.g., LISP, NSH) to the tunnelType registry; the scope is limited to reflecting the current IANA registry and defining the maintenance process, with new registrations following the IETF interface type registration procedure.
