document: rfc-9504
kind: protocol-element
summary: 'Three new flags are added to the GMPLS-CAPABILITY TLV (value 45 in PCEP TLV Type Indicators): R (LSP-REPORT-CAPABILITY, bit 31), U (LSP-UPDATE-CAPABILITY, bit 30), and I (LSP-INSTANTIATION-CAPABILITY, bit 29). These flags, when set, advertise the ability to send/receive PCRpt, PCUpd, and PCInitiate messages respectively for GMPLS LSPs.'
section: 6.2.1
topics:
    - routing
    - bgp
