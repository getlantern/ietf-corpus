document: rfc-2747
kind: normative-requirement
summary: Receivers SHOULD NOT attempt to handshake with senders whose INTEGRITY object has HF=0. Whether to perform an integrity handshake, and whether to accept messages from senders that refuse challenges, SHOULD be an administrative decision based on the network environment.
section: "4.3"
rfc2119_level: SHOULD NOT
topics:
    - security
