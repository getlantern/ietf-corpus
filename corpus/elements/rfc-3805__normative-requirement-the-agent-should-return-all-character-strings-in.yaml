document: rfc-3805
kind: normative-requirement
summary: The agent SHOULD return all character strings in the UTF-8 transform of ISO 10646 to conform with the IETF Policy on Character Sets and Languages (RFC 2277). Localization SHOULD only be performed on objects named 'xxxDescription' or 'prtConsoleDisplayBufferText'.
