document: rfc-4639
kind: interoperability-note
summary: docsDevNmAccessTable is deprecated in favor of SNMP coexistence MIBs (RFC 3584), TARGET and NOTIFICATION MIBs (RFC 3413), and VACM MIBs (RFC 3415). The table applies only to SNMPv1/v2c traffic and MUST NOT be consulted for SNMPv3 traffic.
section: 3.3.2.2
topics:
