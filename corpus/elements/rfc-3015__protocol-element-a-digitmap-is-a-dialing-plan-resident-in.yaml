document: rfc-3015
kind: protocol-element
summary: 'A DigitMap is a dialing plan resident in the MG for detecting and reporting digit events. Digit collection is governed by three configurable timers: start timer T (started before any digit is dialed), long interdigit timer L (applied when at least one more digit is needed for any pattern match), and short timer S (applied when a complete match exists but additional digits could yield a different match).'
section: 7.1.14
topics:
    - realtime
    - voip
