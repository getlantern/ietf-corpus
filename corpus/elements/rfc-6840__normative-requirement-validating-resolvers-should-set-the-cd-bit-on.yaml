document: rfc-6840
kind: normative-requirement
summary: Validating resolvers SHOULD set the CD bit on every upstream query regardless of whether the incoming query had CD set or whether a trust anchor covers the QNAME. This ensures predictable single-validator behavior and full DNSSEC data availability in cache.
section: "5.9"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
