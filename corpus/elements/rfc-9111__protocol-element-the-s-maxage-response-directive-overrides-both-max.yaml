document: rfc-9111
kind: protocol-element
summary: The s-maxage response directive overrides both max-age and Expires for shared caches and incorporates proxy-revalidate semantics. A shared cache MUST NOT reuse a stale s-maxage response without revalidation, and it permits caching of responses to requests with an Authorization header field.
section: 5.2.2.10
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
