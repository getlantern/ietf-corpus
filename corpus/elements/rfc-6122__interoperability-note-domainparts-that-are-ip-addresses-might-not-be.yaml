document: rfc-6122
kind: interoperability-note
summary: Domainparts that are IP addresses might not be accepted by other services for server-to-server communication, and domainparts that are unqualified hostnames cannot be used on public networks because they are only resolvable on a local network.
section: "2.2"
topics:
