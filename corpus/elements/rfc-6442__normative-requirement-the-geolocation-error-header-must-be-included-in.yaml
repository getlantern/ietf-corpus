document: rfc-6442
kind: normative-requirement
summary: The Geolocation-Error header MUST be included in every 424 response. A 424 MUST NOT be sent in response to a request that lacks a Geolocation header entirely, as the UA may not support the extension.
section: "4.3"
rfc2119_level: MUST
topics:
    - realtime
