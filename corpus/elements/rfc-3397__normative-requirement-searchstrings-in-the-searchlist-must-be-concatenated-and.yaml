document: rfc-3397
kind: normative-requirement
summary: Searchstrings in the searchlist MUST be concatenated and encoded using the DNS name compression technique described in RFC 1035 section 4.1.4, where an entire domain name or list of labels at the end of a domain name may be replaced with a pointer to a prior occurrence of the same name.
section: "2"
rfc2119_level: MUST
topics:
    - dns
