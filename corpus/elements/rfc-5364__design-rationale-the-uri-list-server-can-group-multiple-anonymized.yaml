document: rfc-5364
kind: design-rationale
summary: The URI-list server can group multiple anonymized URIs sharing the same 'copyControl' level into a single anonymous entry with a 'count' attribute, rather than repeating 'sip:anonymous@anonymous.invalid' multiple times. This reduces list size while preserving recipient count information.
