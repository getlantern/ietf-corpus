document: rfc-4315
kind: protocol-element
summary: The UID EXPUNGE command permanently removes all messages that both have the \Deleted flag set and have a UID included in the specified sequence set from the currently selected mailbox. Messages without \Deleted or with UIDs not in the set are unaffected.
section: "2.1"
topics:
    - email
