document: rfc-6969
kind: registry
summary: 'The IANA ''OSPFv3 Instance ID Address Family Values'' registry is updated by RFC 6969: Instance IDs 128-191 remain Unassigned but now require Standards Action for assignment, while Instance IDs 192-255 are designated Reserved for Private Use per RFC 5226. The previous RFC 5838 reference is removed for these modified ranges.'
