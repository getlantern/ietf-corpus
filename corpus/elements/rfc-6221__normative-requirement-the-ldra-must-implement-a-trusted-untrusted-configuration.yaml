document: rfc-6221
kind: normative-requirement
summary: The LDRA MUST implement a trusted/untrusted configuration for all client-facing interfaces (SHOULD be configurable per interface). On untrusted interfaces, the LDRA MUST discard any RELAY-FORW (12) message received from the client.
section: 6.1.2
rfc2119_level: MUST
topics:
    - ip
    - security
