document: rfc-8399
kind: protocol-element
summary: 'IDNs are carried in certificates in ACE-encoded form: all U-labels within an IDN are converted to A-labels using the Punycode algorithm (RFC 3492) with the ACE prefix ''xn--'' added at the beginning of the string. The one exception is SmtpUTF8Mailbox which carries U-labels.'
section: "1"
topics:
