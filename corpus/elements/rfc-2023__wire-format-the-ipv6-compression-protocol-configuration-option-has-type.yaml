document: rfc-2023
kind: wire-format
summary: The IPv6-Compression-Protocol Configuration Option has Type=2, Length>=4, a 2-octet IPv6-Compression-Protocol field (whose values match PPP Data Link Layer Protocol field values for the compression protocol), and a variable-length Data field. Value 0x004f identifies IPv6 Header Compression.
