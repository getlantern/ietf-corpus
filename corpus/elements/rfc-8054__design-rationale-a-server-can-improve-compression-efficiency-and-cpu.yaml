document: rfc-8054
kind: design-rationale
summary: A server can improve compression efficiency and CPU performance by adjusting the DEFLATE compression level (e.g., setting it to 0) at the start of incompressible non-text multi-line data blocks such as yEnc-encoded attachments, preventing wasted CPU cycles on incompressible data.
