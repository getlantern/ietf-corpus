document: rfc-7140
kind: wire-format
summary: The HSMP LSP Capability Parameter TLV is a 32-bit+ structure with type 0x0902. The U-bit MUST be 1 (silently ignore unknown), the F-bit MUST be 0 (not forwarded), Length SHOULD be 1, followed by the S-bit and Reserved fields as defined in RFC 5561.
section: "3.1"
topics:
    - mpls
    - routing
