document: rfc-3772
kind: design-rationale
summary: 'Using LCP Vendor-Specific Option to enable proprietary protocols was rejected because: (1) negotiation would occur before peer authentication, complicating security analysis; (2) compulsory tunneling creates deployment problems; (3) unassigned protocol numbers complicate diagnostic tools. A fixed set of vendor-specific protocol numbers solves all three problems.'
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
