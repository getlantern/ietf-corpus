document: rfc-9641
kind: protocol-element
summary: The 'certificate-expiration' notification (defined in RFC 9640's 'trust-anchor-cert-grouping') is exposed within the truststore's certificate list nodes and carries an 'expiration-date' leaf of type 'yang:date-and-time', alerting clients when a certificate is nearing or has passed expiration.
section: 2.1.3.5
