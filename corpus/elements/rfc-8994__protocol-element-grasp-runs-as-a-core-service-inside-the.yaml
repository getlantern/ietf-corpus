document: rfc-8994
kind: protocol-element
summary: GRASP runs as a core service inside the ACP, using the ACP VRF as its security and transport substrate (TCP/TLS over ACP addresses). The ACP GRASP instance supports service discovery for BRSKI, OAM functions, and ACP certificate maintenance. DULL GRASP operates separately on each link outside the ACP for neighbor discovery.
section: "6.9"
topics:
