document: rfc-1449
kind: normative-requirement
summary: BER serialization must use the primitive encoding form for all simple ASN.1 types (INTEGER, OCTET STRING, OBJECT IDENTIFIER, BIT STRING); the constructed form must be used only for structured types (SEQUENCE or IMPLICIT SEQUENCE).
section: "8"
rfc2119_level: MUST
topics:
