document: rfc-7659
kind: interoperability-note
summary: NATV2-MIB is not backwards compatible with NAT-MIB (RFC 4008) and both may be deployed on the same device during transition. Section 5.2 discusses operational considerations for coexistence. RFC 7658 formally deprecates all objects in NAT-MIB.
section: "5.2"
topics:
    - nat
    - snmp
