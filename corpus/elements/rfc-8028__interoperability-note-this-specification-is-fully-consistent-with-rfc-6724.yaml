document: rfc-8028
kind: interoperability-note
summary: This specification is fully consistent with RFC 6724 and depends on support for Rule 5.5. Hosts that do not support RFC 6724 Rule 5.5 may fail to communicate in the presence of BCP 38 ingress filters or stateful firewalls in multihomed networks.
