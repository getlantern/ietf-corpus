summary: 'Six new SCVP WantBack OIDs are defined: id-swb-partial-cert-path (id-swb 15), id-swb-ers-pkc-cert (id-swb 16), id-swb-ers-best-cert-path (id-swb 17), id-swb-ers-partial-cert-path (id-swb 18), id-swb-ers-revocation-info (id-swb 19), and id-swb-ers-all (id-swb 20). Each id-swb-ers OID requests an EvidenceRecord for the corresponding PKI artifact.'
