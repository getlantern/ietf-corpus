document: rfc-7708
kind: interoperability-note
summary: Where the LSP is subject to ECMP load balancing, some LSRs may treat special-purpose labels as ordinary labels, causing GAL-carrying OAM packets to take a different path than the corresponding PW data packets. If this path divergence is not acceptable, an alternative VCCV CC type must be used.
section: "3"
topics:
    - mpls
    - routing
