document: rfc-927
kind: state-machine
summary: 'Successful negotiation requires both sides to agree: the server sends DO TUID and the user responds WILL TUID (or vice versa), after which the user sends IAC SB TUID <uuid> IAC SE. If either side refuses (WON''T or DON''T), no UUID is transmitted and double login avoidance does not occur.'
section: "5"
