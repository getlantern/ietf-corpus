document: rfc-9660
kind: design-rationale
summary: The ZONEVERSION option is defined as a registry of TYPE values rather than a single fixed format to accommodate zones that use distribution and synchronization mechanisms other than SOA SERIAL (e.g., relational databases or proprietary methods). Private Use code points (246–254) are also allocated for zone operators with non-standard versioning.
