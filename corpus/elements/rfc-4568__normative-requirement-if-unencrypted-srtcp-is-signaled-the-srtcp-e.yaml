document: rfc-4568
kind: normative-requirement
summary: If UNENCRYPTED_SRTCP is signaled, the SRTCP E bit MUST be clear (0) in all SRTCP messages. If the default encryption is used, the E bit MUST be set (1) in all SRTCP messages. Offerers and answerers MUST NOT use the SRTCP E-bit to override the UNENCRYPTED_SRTCP parameter.
section: 6.3.2
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
