document: rfc-8531
kind: protocol-element
summary: 'The module defines identity hierarchies for: ''technology-types'' (base for TRILL, MPLS-TP, etc.); ''command-sub-type'' with derived identities ''on-demand'' and ''proactive''; ''name-format'' with ''name-format-null''; ''identifier-format'' with ''identifier-format-integer''; and ''defect-types'' with derived identities rdi, remote-mep-defect, loss-of-continuity, cv-defect, invalid-oam-defect, and cross-connect-defect.'
