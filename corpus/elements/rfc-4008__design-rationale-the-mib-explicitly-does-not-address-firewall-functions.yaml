document: rfc-4008
kind: design-rationale
summary: The MIB explicitly does not address firewall functions and must not be used for configuring or monitoring them. This scoping decision keeps the NAT MIB focused on address and port translation and avoids overlap with firewall management MIBs.
section: "1"
topics:
    - nat
