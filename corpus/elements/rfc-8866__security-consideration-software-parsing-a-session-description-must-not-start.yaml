document: rfc-8866
kind: security-consideration
summary: Software parsing a session description MUST NOT start software except that specifically configured for multimedia sessions. A session description arriving by announcement, email, or WWW MUST NOT deliver the user into an interactive multimedia session without explicit user consent.
section: "7"
topics:
    - realtime
    - security
