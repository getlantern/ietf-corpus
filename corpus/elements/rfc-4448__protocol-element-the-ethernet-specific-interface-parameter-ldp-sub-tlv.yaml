document: rfc-4448
kind: protocol-element
summary: The Ethernet-specific Interface Parameter LDP Sub-TLV (0x06, Requested VLAN ID Sub-TLV) is an optional 16-bit value indicating the requested VLAN ID. It MUST be used by a PE that is incapable of rewriting the 802.1Q Ethernet VLAN tag on output, and is applicable only to PW type 0x0004.
section: "4.3"
topics:
    - mpls
