document: rfc-8412
kind: normative-requirement
summary: A SWIMA-PC MUST NOT report events with EIDs from any Epoch other than the current EID Epoch. When a SWIMA-PV observes an Epoch change, it MUST obtain a full inventory to resynchronize before tracking further events.
section: 3.7.6
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
