document: rfc-4733
kind: normative-requirement
summary: The RTP sequence number MUST be incremented by one for each successive RTP packet sent, including retransmissions of final event reports, so that the receiver can detect lost packets for RTCP receiver reports.
section: 2.5.1.6
rfc2119_level: MUST
topics:
    - rtp
    - realtime
