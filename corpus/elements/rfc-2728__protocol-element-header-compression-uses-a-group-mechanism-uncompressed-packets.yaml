document: rfc-2728
kind: protocol-element
summary: 'Header compression uses a group mechanism: uncompressed packets cache the full UDP/IP header keyed by group value (7-bit field). Subsequent compressed packets for the same group omit all header fields except IP Identification and UDP Checksum. Groups with identical bits are assumed to share all other UDP/IP header fields.'
section: "3.5"
topics:
    - ip
    - udp
