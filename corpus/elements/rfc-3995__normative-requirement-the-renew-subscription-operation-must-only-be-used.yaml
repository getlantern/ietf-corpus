document: rfc-3995
kind: normative-requirement
summary: The Renew-Subscription operation MUST only be used on Per-Printer Subscription Objects, not Per-Job Subscription Objects. It is the client's duty to invoke this operation frequently enough to preserve a Per-Printer Subscription Object before its lease expires; the Printer deletes the object when the lease expires without renewal.
section: 11.2.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
