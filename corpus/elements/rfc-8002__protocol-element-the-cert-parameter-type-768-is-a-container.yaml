document: rfc-8002
kind: protocol-element
summary: The CERT parameter (type 768) is a container for digital certificates carried in HIP control packets. It includes CERT group, CERT count, CERT ID, and CERT type fields, followed by the certificate data and optional padding. It is a non-critical parameter protected by the HIP SIGNATURE field.
