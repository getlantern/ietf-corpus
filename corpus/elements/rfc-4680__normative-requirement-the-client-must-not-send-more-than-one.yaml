document: rfc-4680
kind: normative-requirement
summary: The client MUST NOT send more than one SupplementalData handshake message, and the server MUST NOT send more than one SupplementalData handshake message. Receiving more than one results in a fatal error and the receiver MUST close the connection with a fatal unexpected_message alert.
section: "2"
rfc2119_level: MUST NOT
topics:
    - tls
