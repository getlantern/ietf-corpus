document: rfc-3845
kind: normative-requirement
summary: Bit 0 in window block 0 refers to the non-existing RR type 0 and MUST be set to 0. After verification, the validator MUST ignore the value of bit 0 in window block 0.
section: 2.1.2
rfc2119_level: MUST
