document: rfc-5557
kind: protocol-element
summary: 'Two new bit flags are added to the Flags field of the RP object: Bit 21 (M-bit, Make-before-break) — when set, make-before-break reoptimization is required for that request; Bit 22 (D-bit, orDer) — when set, the PCC requires the PCE to specify in the PCRep the order in which this path request is to be provisioned.'
section: "5.3"
topics:
    - routing
    - mpls
