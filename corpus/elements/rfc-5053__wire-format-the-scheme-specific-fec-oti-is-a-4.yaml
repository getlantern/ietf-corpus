summary: 'The Scheme-Specific FEC OTI is a 4-octet field: Z (number of source blocks, 16 bits), N (number of sub-blocks, 8 bits), Al (symbol alignment parameter, 8 bits). Combined with the Common OTI, the total encoded FEC OTI is 14 octets.'
