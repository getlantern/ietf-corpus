document: rfc-2257
kind: security-consideration
summary: AgentX is designed for use between co-located processes on a single managed node and provides no built-in authentication or encryption. Security depends entirely on the underlying transport; deployments using TCP across a network must apply external network-level security controls to prevent unauthorized subagent connections.
section: "9"
topics:
    - snmp
    - security
