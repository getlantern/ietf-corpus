summary: In Direct Delivery Style, the foreign agent forwards an IP-in-IP packet with the encapsulating header Source Address copied from the Care-of Address field of the Registration Request, Destination Address copied from the Home Agent field of the most recent successful Registration Reply, and Protocol field 4 (IP in IP).
