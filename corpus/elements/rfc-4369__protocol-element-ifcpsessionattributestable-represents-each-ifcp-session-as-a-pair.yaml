document: rfc-4369
kind: protocol-element
summary: ifcpSessionAttributesTable represents each iFCP session as a pair of N_PORTs joined by a single TCP/IP connection. Fields include local and remote portal IP address/port, local and remote N_Port WWN and FCID, FCID alias, IP_TOV, LTI values, and a bound flag indicating assignment to specific N_PORTs.
