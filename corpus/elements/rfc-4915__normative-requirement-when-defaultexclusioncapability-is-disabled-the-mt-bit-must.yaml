document: rfc-4915
kind: normative-requirement
summary: When DefaultExclusionCapability is disabled, the MT-bit MUST be cleared in Hello packets and SHOULD be cleared in Database Description packets, and all links participating in non-default topologies are automatically included in the default topology.
section: "4.2"
rfc2119_level: MUST
topics:
