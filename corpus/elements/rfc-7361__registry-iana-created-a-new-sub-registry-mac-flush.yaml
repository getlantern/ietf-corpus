document: rfc-7361
kind: registry
summary: IANA created a new sub-registry 'MAC Flush Flags' under LDP Parameters. Bit 0 (0x80) is the C-flag (Context), bit 1 (0x40) is the N-flag (Negative MAC flushing), bits 2–7 are unassigned. New bits are assigned by Standards Action per RFC 5226.
section: "7.2"
