document: rfc-4035
kind: normative-requirement
summary: 'When responding to a query with the DO bit set, a security-aware authoritative name server MUST include NSEC RRs in four cases: No Data (name exists but type absent), Name Error (name absent), Wildcard Answer, and Wildcard No Data, to prove that an exact match was not present.'
section: 3.1.3
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
