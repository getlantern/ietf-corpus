document: rfc-5592
kind: protocol-element
summary: SSH sessions in the SSH Transport Model are uniquely identified by the combination of tmTransportAddress and tmSecurityName. The SnmpSSHAddress Textual Convention supports a 'user@hostname:port' syntax; if a 'user@' prefix is present, that user name is used for SSH authentication; otherwise tmSecurityName is used.
section: 3.1.4
topics:
    - snmp
