document: rfc-5116
kind: protocol-element
summary: 'AEAD_AES_128_GCM uses AES-128 in GCM mode with a 16-octet (128-bit) authentication tag appended to the ciphertext. Parameters: K_LEN=16 octets, P_MAX=2^36-31 octets, A_MAX=2^61-1 octets, N_MIN=N_MAX=12 octets, C_MAX=2^36-15 octets. Ciphertext is exactly 16 octets longer than plaintext.'
section: "5.1"
topics:
