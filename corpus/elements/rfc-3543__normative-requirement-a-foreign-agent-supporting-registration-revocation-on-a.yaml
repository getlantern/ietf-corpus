document: rfc-3543
kind: normative-requirement
summary: A foreign agent supporting registration revocation on a link MUST set the 'X' bit in its Agent Advertisement Extensions on that link. To participate in revocation, the foreign agent MUST have an existing security association with the home agent identified in the registration request.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
