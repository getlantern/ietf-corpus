document: rfc-5991
kind: protocol-element
summary: A Teredo IPv6 address embeds the Teredo prefix (32 bits, IANA-assigned value 2001:0000::/32), the server IPv4 address (32 bits), the Flags field (16 bits), and the obfuscated external port and IPv4 address (each 16 and 32 bits). Predictability of each field varies, with the Flags field historically having only 1 variable bit (the cone bit).
section: "3.1"
topics:
