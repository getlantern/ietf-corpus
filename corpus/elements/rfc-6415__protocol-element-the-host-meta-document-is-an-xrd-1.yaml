document: rfc-6415
kind: protocol-element
summary: The host-meta document is an XRD 1.0 XML document served at '/.well-known/host-meta' that describes host-wide metadata and resource-specific link templates. It may include Property elements, Link elements with fixed href attributes (host-wide), and Link elements with template attributes (resource-specific).
section: "3"
