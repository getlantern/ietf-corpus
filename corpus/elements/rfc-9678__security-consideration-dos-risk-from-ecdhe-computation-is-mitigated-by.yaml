document: rfc-9678
kind: security-consideration
summary: DoS risk from ECDHE computation is mitigated by requiring the AKA authentication (demonstrating possession of the long-term key) to succeed before FS calculations begin. This limits amplification attacks to identified subscribers and makes bulk attacks identifiable for blocking.
section: "7.3"
topics:
    - security
    - crypto
