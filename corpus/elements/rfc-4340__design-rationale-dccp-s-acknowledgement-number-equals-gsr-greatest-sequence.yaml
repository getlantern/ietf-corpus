document: rfc-4340
kind: design-rationale
summary: DCCP's Acknowledgement Number equals GSR (greatest sequence number received) rather than TCP's smallest-not-yet-received cumulative ACK, because DCCP is unreliable and separate options such as Ack Vector provide precise loss information.
