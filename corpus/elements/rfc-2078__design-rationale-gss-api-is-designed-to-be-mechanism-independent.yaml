document: rfc-2078
kind: design-rationale
summary: GSS-API is designed to be mechanism-independent, supporting both secret-key (e.g., Kerberos) and public-key (e.g., X.509) cryptographic technologies under a single interface. This allows source-level portability of applications across different security environments without requiring separate code paths.
section: "1"
topics:
