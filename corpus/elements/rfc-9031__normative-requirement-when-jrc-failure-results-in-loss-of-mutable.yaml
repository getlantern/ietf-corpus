document: rfc-9031
kind: normative-requirement
summary: When JRC failure results in loss of mutable security-context parameters, the network administrator MUST force all networks managed by the failed JRC to rejoin through out-of-band means. The RFC 8613 Appendix B.2 nonce-renegotiation procedure is RECOMMENDED; nonces exchanged via that procedure MUST be at least 8 bytes.
section: 8.3.3
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
