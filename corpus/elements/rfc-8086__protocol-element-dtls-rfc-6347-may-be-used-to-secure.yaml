document: rfc-8086
kind: protocol-element
summary: DTLS (RFC 6347) MAY be used to secure a GRE-in-UDP tunnel. When DTLS is used, the UDP destination port MUST be set to 4755 (GRE-UDP-DTLS), and only a single DTLS session is permitted per encapsulator/decapsulator IP address pair.
section: "5"
topics:
    - tls
    - udp
    - security
