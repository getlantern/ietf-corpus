document: rfc-2429
kind: normative-requirement
summary: For a packet beginning with an EOS or EOSBS code, PLEN shall be zero and no Picture, GOB, or Slice start codes shall be included within the same packet. Encoders are generally to be discouraged from sending EOS and EOSBS.
section: 5.1.3
rfc2119_level: MUST
topics:
    - rtp
    - realtime
