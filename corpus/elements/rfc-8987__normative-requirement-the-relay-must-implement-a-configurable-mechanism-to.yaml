document: rfc-8987
kind: normative-requirement
summary: The relay MUST implement a configurable mechanism to limit the maximum number of active prefix delegations on a single port for all client identifiers and IA_PDs. Failure to implement this may enable resource depletion attacks.
section: "4.1"
rfc2119_level: MUST
