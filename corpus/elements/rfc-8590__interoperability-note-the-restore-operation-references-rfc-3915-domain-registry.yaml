document: rfc-8590
kind: interoperability-note
summary: The 'restore' operation references RFC 3915 (Domain Registry Grace Period Mapping) and MUST set the 'op' attribute to either 'request' or 'report'. Implementations must be aware of this dependency on the grace period extension for restore sub-operation semantics.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
