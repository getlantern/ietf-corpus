document: rfc-5692
kind: protocol-element
summary: IEEE 802.16 establishes connections between a Base Station (BS) and Subscriber Stations (SSs) identified by a 16-bit Connection Identifier (CID). Each connection realizes an individual service flow with a defined QoS profile; packets over the air are identified only by CID, not MAC address.
section: "4.1"
topics:
