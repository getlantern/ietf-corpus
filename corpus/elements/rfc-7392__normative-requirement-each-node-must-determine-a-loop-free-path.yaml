document: rfc-7392
kind: normative-requirement
summary: Each node MUST determine a loop-free path if it is to signal the MS-PW. RFC 6073 Section 7.6 provides a mechanism by which a node can check that the path taken by an MS-PW does not include loops.
section: "4.1"
rfc2119_level: MUST
topics:
