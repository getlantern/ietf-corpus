document: rfc-7574
kind: security-consideration
summary: Channel IDs must be randomly chosen and the handshake requires the initiator's channel ID to be echoed in the responder's reply datagram prefix. This three-way check ensures both peers are reachable at their claimed addresses and prevents replay and spoofing attacks.
section: "12.1"
topics:
    - security
    - realtime
