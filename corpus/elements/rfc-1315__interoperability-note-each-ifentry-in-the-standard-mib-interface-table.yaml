document: rfc-1315
kind: interoperability-note
summary: Each ifEntry in the standard MIB Interface Table with an ifType of Frame Relay represents a Q.922 interface. Zero or more virtual circuit entries in frCircuitTable are layered onto this ifEntry and are correlated via the Index textual convention (range 1..ifNumber).
