document: rfc-8063
kind: security-consideration
summary: The <domain:authInfo> element in <keyrelay:keyRelayData> is used as an indication that placing the key material on the receiving client's poll queue is authorized by the registrant of the domain. Authorization of EPP clients to perform DNS changes is registry-specific policy and is not covered by this document.
section: "6"
topics:
    - security
    - dns
