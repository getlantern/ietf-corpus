document: rfc-5036
kind: privacy-consideration
summary: LDP messages are transmitted in cleartext, allowing an eavesdropper to determine which routers are MPLS-enabled, what FEC-label bindings are in use, the network topology, and traffic-engineering configurations. LDP provides no confidentiality protection.
section: "5.2"
topics:
    - mpls
    - routing
    - privacy
    - security
