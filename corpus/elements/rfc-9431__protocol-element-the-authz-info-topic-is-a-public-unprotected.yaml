document: rfc-9431
kind: protocol-element
summary: The "authz-info" topic is a public, unprotected MQTT topic used to pre-upload access tokens to the Broker before TLS client authentication. Clients MUST only publish to it (subscribing is not allowed), using TLS:Anon,MQTT:None.
section: 2.2.2
topics:
