document: rfc-6019
kind: wire-format
summary: BinaryTime uses ASN.1 variable-length INTEGER encoding. A four-octet value can represent times up to 03:14:07 on January 19, 2038 (0x7FFFFFFF); a five-octet integer suffices for the next seventeen millennia beyond that.
