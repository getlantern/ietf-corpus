document: rfc-2491
kind: protocol-element
summary: 'A Transient Neighbor is an off-LL neighbor discovered through unsolicited messages such as Router Redirects. Three possible relationships exist between any two IPv6 interfaces: On-LL Neighbor, Off-LL Neighbor (shortcut), or Off-LL non-Neighbor.'
