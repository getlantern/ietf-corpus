document: rfc-8584
kind: protocol-element
summary: For VLAN-aware Bundle services with AC-DF enabled, DF election is performed per <ES, VLAN> rather than per <ES, VLAN Bundle>. Each PE advertises one Ethernet A-D per EVI route per Ethernet Tag in the bundle, and withdrawal of any individual route signals ACS DOWN only for that specific VLAN, leaving other VLANs in the bundle unaffected.
section: "4.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
