document: rfc-7638
kind: registry
summary: This specification adds to the instructions for Designated Experts of the JSON Web Key Types, JSON Web Key Elliptic Curve, and JSON Web Key Parameters registries under the JOSE registry, requiring that new member names and values use only printable ASCII excluding double quote and backslash, or specify exact Unicode code point sequences.
