document: rfc-7743
kind: normative-requirement
summary: If an LSR spans two addressing domains (e.g., an ASBR), the final address entry added to the stack SHOULD set the K bit to ensure that entry persists as a relay node across the entire traceroute operation.
section: "4.2"
rfc2119_level: SHOULD
