document: rfc-7056
kind: normative-requirement
summary: The raw value of the federated-saml-nameid GSS name attribute MUST be the well-formed serialization of the <saml:NameID> element encoded as UTF-8. For formats defined in SAML Section 8.3, missing NameQualifier or SPNameQualifier values MUST be populated according to the format's defaulting rules prior to serialization.
section: "6.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
