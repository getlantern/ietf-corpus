document: rfc-8525
kind: interoperability-note
summary: The new '/yang-library' tree is ignored by legacy RFC 7895 clients, while NMDA-aware clients ignore the deprecated '/modules-state' tree. This split allows a single server to serve both legacy and NMDA-aware clients simultaneously without breaking either.
section: "1"
topics:
