document: rfc-6909
kind: normative-requirement
summary: If the MAG is not configured for IPv4 traffic offload support but receives a PBA with the IPv4 Traffic Offload Selector option, the MAG MUST ignore the option and process the rest of the message per RFC 5213.
section: "3.2"
rfc2119_level: MUST
topics:
    - pcp
    - nat
    - mobility
