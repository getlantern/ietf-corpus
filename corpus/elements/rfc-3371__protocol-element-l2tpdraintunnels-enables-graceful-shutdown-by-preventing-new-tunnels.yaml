document: rfc-3371
kind: protocol-element
summary: l2tpDrainTunnels enables graceful shutdown by preventing new tunnels and sessions while keeping active ones alive. Setting to true(1) transitions all domains and tunnels to the draining state; the value must be maintained in non-volatile memory.
section: "4.0"
