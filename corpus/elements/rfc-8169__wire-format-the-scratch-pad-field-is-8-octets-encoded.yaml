document: rfc-8169
kind: wire-format
summary: The Scratch Pad field is 8 octets encoded as a 64-bit signed integer representing residence time in nanoseconds multiplied by 2^16. The first RTM-capable node MUST initialize it with its own residence time; each subsequent RTM-capable transit node adds its measured residence time to the accumulated value.
section: "3"
topics:
