document: rfc-9959
kind: security-consideration
summary: The security considerations for Careful Resume are the same as for other sender-based congestion control methods. These methods rely on the receiver appropriately acknowledging receipt of data; an on-path or off-path attacker's ability to influence CC depends on the security properties of the underlying transport protocol.
section: "7"
topics:
