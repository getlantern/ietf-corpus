document: rfc-8948
kind: security-consideration
summary: Security and privacy considerations for the QUAD option are inherited from RFC 8415 (DHCPv6), RFC 7227 (DHCPv6 option guidelines), RFC 8200 (IPv6), and RFC 8947 (link-layer address assignment via DHCP). No additional security mechanisms specific to the QUAD option are defined beyond these inherited considerations.
