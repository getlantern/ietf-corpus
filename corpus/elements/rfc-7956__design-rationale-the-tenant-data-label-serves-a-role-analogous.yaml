document: rfc-7956
kind: design-rationale
summary: 'The tenant Data Label serves a role analogous to an MPLS VPN label: it identifies the tenant VRF at the egress RBridge for incoming inter-subnet traffic. Unlike MPLS VPN labels, tenant Data Labels are independently allocated per edge RBridge with no campus-wide coordination authority required.'
