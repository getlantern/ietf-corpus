document: rfc-2920
kind: interoperability-note
summary: 'Known flaws in deployed SMTP servers that break pipelining include: (1) losing data from process buffers during mid-dialogue connection handoff; (2) flushing the TCP input buffer on command failure; and (3) improperly handling RCPT TO failures, either refusing DATA after any RCPT failure or accepting DATA when all RCPT TO commands failed.'
section: "1"
