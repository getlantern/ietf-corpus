document: rfc-5662
kind: protocol-element
summary: 'The open_claim_type4 enumeration adds three new claim types in NFSv4.1: CLAIM_FH=4 (ordinary open by current filehandle, no special rights), CLAIM_DELEG_CUR_FH=5 (delegation-backed open by filehandle), and CLAIM_DELEG_PREV_FH=6 (previous-delegation open by filehandle), supplementing the four NFSv4.0 claim types.'
