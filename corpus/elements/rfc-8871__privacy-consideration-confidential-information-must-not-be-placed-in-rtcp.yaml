document: rfc-8871
kind: privacy-consideration
summary: Confidential information must not be placed in RTCP packets or RTP header extensions, as both are visible to Media Distributors. The framework ensures media content privacy by restricting E2E key access to trusted endpoints only, making media content unreadable by the conferencing infrastructure.
section: "4.1"
topics:
    - privacy
    - realtime
    - rtp
    - security
