document: rfc-4055
kind: normative-requirement
summary: When the RSA private key owner restricts use exclusively to RSAES-OAEP, id-RSAES-OAEP MUST be used in the SubjectPublicKeyInfo algorithm field; if parameters are present, they MUST contain RSAES-OAEP-params. The certificate user MUST then use the key only for RSAES-OAEP operations.
section: "1.2"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
