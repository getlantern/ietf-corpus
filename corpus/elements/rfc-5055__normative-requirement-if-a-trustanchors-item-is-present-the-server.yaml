document: rfc-5055
kind: normative-requirement
summary: If a trustAnchors item is present, the server MUST NOT consider any certification paths ending in other trust anchors as valid. Additionally, the trust anchor itself MUST NOT be included in any certification path returned by the server.
section: 3.2.4.7
rfc2119_level: MUST NOT
topics:
