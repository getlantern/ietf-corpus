document: rfc-5910
kind: security-consideration
summary: EPP transform operations on domain objects MUST be restricted to the sponsoring client as authenticated per RFC 5730 Sections 2.9.1.1 and 7. Any attempt by a non-sponsoring client to perform a transform MUST be rejected with an appropriate EPP authorization error.
section: "9"
rfc2119_level: MUST
topics:
    - dns
    - security
