document: rfc-2782
kind: security-consideration
summary: DNS spoofing attacks can supply false port numbers via SRV records in addition to false host names and addresses. This is not a new vulnerability but is a slightly extended version of the existing DNS spoofing threat, with little additional practical impact.
section: Security Considerations
topics:
