document: rfc-9731
kind: interoperability-note
summary: The VN YANG model is tightly coupled with the TE Topology model (RFC 8795); any underlay technology not supported by RFC 8795 is also unsupported by the VN model unless the 'underlay' container is augmented by a separate future model.
