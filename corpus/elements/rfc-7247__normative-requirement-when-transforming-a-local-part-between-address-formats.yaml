document: rfc-7247
kind: normative-requirement
summary: 'When transforming a local part between address formats, an application SHOULD: (1) unescape escaped characters in the source address, (2) leave unmodified any characters allowed in the destination scheme, and (3) escape characters allowed in the source but reserved in the destination using the destination scheme''s escaping rules.'
section: "6.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
