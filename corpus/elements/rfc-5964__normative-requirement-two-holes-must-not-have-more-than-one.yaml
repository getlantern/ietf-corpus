document: rfc-5964
kind: normative-requirement
summary: Two holes MUST NOT have more than one point of intersection. If two or more holes overlap or share a common boundary, they represent a single hole and must be merged into one with shared boundaries removed.
section: "3"
rfc2119_level: MUST NOT
