document: rfc-4088
kind: protocol-element
summary: An SNMP service URI designates a communication endpoint (host, port, SNMP context) without specifying any OIDs. If contextEngineID is omitted, it must be discovered by querying the SNMP agent; if port is omitted, port 161 is assumed.
