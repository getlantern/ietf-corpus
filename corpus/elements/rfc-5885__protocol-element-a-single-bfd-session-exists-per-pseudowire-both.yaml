document: rfc-5885
kind: protocol-element
summary: A single BFD session exists per pseudowire. Both PW endpoints take the Active role, sending initial BFD Control packets with a Your Discriminator field of zero; the pseudowire demultiplexer field provides context to demultiplex the first BFD Control packet.
