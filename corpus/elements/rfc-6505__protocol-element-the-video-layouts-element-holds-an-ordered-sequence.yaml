document: rfc-6505
kind: protocol-element
summary: 'The <video-layouts> element holds an ordered sequence of <video-layout> child elements, each with a ''min-participants'' threshold. The MS automatically activates the appropriate layout based on current participant count, supporting predefined XCON layouts: <single-view>, <dual-view>, <quad-view>, <multiple-3x3>, <multiple-4x4>, <multiple-5x1>, and others.'
section: 4.2.1.4.2
topics:
