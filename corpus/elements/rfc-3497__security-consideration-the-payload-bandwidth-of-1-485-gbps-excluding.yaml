document: rfc-3497
kind: security-consideration
summary: The payload bandwidth of 1.485 Gbps (excluding RTP overhead) creates a significant denial-of-service risk if transmitted onto typical Internet paths. Since congestion control is architecturally impossible for uncompressed SMPTE 292M flows, deployment must be confined to private or QoS-provisioned networks.
section: "9"
topics:
    - security
    - rtp
    - realtime
    - congestion
