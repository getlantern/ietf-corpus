document: rfc-2959
kind: normative-requirement
summary: Implementors of this MIB SHOULD implement the inverse lookup tables (rtpSessionInverseTable, rtpSenderInverseTable, rtpRcvrInverseTable) for multicast RTP sessions when table indexes are not available from other MIBs, to avoid expensive tree walks.
