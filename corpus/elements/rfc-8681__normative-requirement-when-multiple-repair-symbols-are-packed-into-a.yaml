document: rfc-8681
kind: normative-requirement
summary: When multiple repair symbols are packed into a single FEC Repair Packet, the repair key for each successive symbol MUST be the Repair_Key value in the Repair FEC Payload ID incremented by 1, looping from 65535 back to 0.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
