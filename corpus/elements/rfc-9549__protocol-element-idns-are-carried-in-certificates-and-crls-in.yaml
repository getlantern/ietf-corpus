document: rfc-9549
kind: protocol-element
summary: 'IDNs are carried in certificates and CRLs in ACE-encoded form: all U-labels are converted to A-labels using the Punycode algorithm (RFC 3492) with the ''xn--'' prefix. The dNSName field in GeneralName is type IA5String, limiting it to ASCII, which necessitates the A-label encoding.'
section: "2.3"
topics:
    - pkix
    - dns
