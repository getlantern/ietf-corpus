document: rfc-2744
kind: protocol-element
summary: 'Supplementary status bits in the lower 16 bits of a GSS major status include: GSS_S_CONTINUE_NEEDED (bit 0, returned by gss_init_sec_context or gss_accept_sec_context requiring another call), GSS_S_DUPLICATE_TOKEN (bit 1), GSS_S_OLD_TOKEN (bit 2), GSS_S_UNSEQ_TOKEN (bit 3), and GSS_S_GAP_TOKEN (bit 4).'
section: 3.9.1
topics:
