document: rfc-1598
kind: normative-requirement
summary: Unlike HDLC framing, X.25 framing does not align the Information field on a 32-bit boundary; alignment to a 16-bit boundary occurs when Protocol-Field-Compression reduces the Protocol field to one octet. Protocol-Field-Compression SHOULD be negotiated when this improves throughput.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
