document: rfc-6904
kind: protocol-element
summary: 'Two new SRTP keys are derived using the standard SRTP key derivation algorithm (Section 4.3.1 of RFC 3711): k_he (header encryption key) with label 0x06 and n=n_e, and k_hs (header salting key) with label 0x07 and n=n_s. The key sizes match those used for SRTP payload encryption and salting.'
