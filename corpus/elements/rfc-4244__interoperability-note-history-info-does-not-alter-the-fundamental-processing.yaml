document: rfc-4244
kind: interoperability-note
summary: History-Info does not alter the fundamental processing of proxies for determining request targets as defined in RFC 3261 Sections 16.5 and 16.6. Its addition is purely an optional, additional header field and does not impact SIP request forwarding or retargeting mechanics.
