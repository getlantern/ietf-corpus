document: rfc-9561
kind: protocol-element
summary: A volatile write cache on an NVMe controller is considered enabled when bit 0 of the Volatile Write Cache (VWC) field in the Identify Controller data structure is set AND the Volatile Write Cache Enable (WCE) bit in the Volatile Write Cache Feature (Feature Identifier 06h) is set. The NVMe Flush command (NVME-BASE Section 7.1) is the NVMe equivalent of SCSI SYNCHRONIZE CACHE.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
