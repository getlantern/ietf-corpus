document: rfc-2562
kind: interoperability-note
summary: When a collection includes both clients that can and cannot calculate an IP-network component, data is aggregated differently based on the excludeIpComponent(1) bit. Mixing capable and incapable clients in an IP-inclusive collection silently drops the incapable clients' transactions from aggregation.
section: "3.2"
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
