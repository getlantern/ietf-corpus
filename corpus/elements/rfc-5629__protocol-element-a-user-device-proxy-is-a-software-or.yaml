document: rfc-5629
kind: protocol-element
summary: A User Device Proxy is a software or hardware system through which a user indirectly interacts with an application. It terminates and re-originates both SIP signaling and media traffic, and monitors media streams to convert user input received in the media stream to events reported to the user interface.
section: "3"
topics:
    - sip
    - realtime
