document: rfc-2652
kind: design-rationale
summary: Aggregation must not compromise the ability to correctly route queries while avoiding excessive false negatives. The acceptable likelihood of false negatives must be established per application domain, controlled by index granularity and aggregation rules. Heterogeneous mesh aggregation across different index types is considered ill-understood and is not covered.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
