document: rfc-3489
kind: normative-requirement
summary: 'A STUN server MUST be prepared to receive Binding Requests on four address/port combinations: (A1,P1), (A2,P1), (A1,P2), and (A2,P2), where A1/P1 is the primary address/port and A2/P2 are advertised via CHANGED-ADDRESS.'
section: "8.1"
rfc2119_level: MUST
topics:
    - nat
    - udp
