document: rfc-4261
kind: security-consideration
summary: A COPS PDP and PEP MUST check the results of the TLS negotiation to verify that an acceptable degree of authentication and privacy was achieved; if unacceptable algorithms or key lengths result, either side MAY terminate the connection.
