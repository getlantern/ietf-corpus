document: rfc-3015
kind: design-rationale
summary: The protocol is defined as common text with ITU-T Recommendation H.248, enabling a single specification to serve both IETF and ITU-T standardization tracks. This dual-standardization approach was chosen to facilitate global interoperability between internet-side and PSTN/SCN-side equipment from different vendors.
