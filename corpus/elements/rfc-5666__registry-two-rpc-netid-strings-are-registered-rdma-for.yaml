summary: 'Two RPC netid strings are registered: ''rdma'' for IPv4 RDMA transports and ''rdma6'' for IPv6 RDMA transports. These may be used for any RDMA network satisfying the abstract requirements of Section 2 and able to identify endpoints using IP port addressing.'
