document: rfc-2592
kind: interoperability-note
summary: Suspension of scripts is optional. An implementation that does not support suspension will transition to 'suspending' when smRunControl is set to 'suspend' and remain there until 'resume' or termination, never entering the 'suspended' state. This is explicitly permitted in the compliance statement.
section: "6"
topics:
    - snmp
