document: rfc-4145
kind: protocol-element
summary: 'The ''connection'' attribute is a media-level, charset-independent attribute that disambiguates whether a subsequent SDP exchange requests a new TCP connection or continuation of the existing one. Its ABNF is: connection-attr = ''a=connection:'' conn-value, where conn-value = ''new'' / ''existing''.'
section: "5"
topics:
