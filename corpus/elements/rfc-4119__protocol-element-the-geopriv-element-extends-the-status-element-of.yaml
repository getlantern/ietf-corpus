document: rfc-4119
kind: protocol-element
summary: The 'geopriv' element extends the 'status' element of PIDF and serves as the top-level container for location information. It has two mandatory subelements ('location-info' and 'usage-rules') and two optional subelements ('method' and 'provided-by'), plus extensibility slots for arbitrary other elements.
section: "2.2"
