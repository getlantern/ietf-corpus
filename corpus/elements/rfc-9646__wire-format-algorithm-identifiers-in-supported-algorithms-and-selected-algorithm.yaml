document: rfc-9646
kind: wire-format
summary: Algorithm identifiers in 'supported-algorithms' and 'selected-algorithm' are encoded as DER-encoded AlgorithmIdentifier binary values per RFC 2986 and ITU-T X.690. Format identifiers use identityref values derived from the 'certificate-request-format' base identity (e.g., 'ietf-ztp-types:p10-csr').
