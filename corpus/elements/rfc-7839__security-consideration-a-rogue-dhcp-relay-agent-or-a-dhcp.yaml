document: rfc-7839
kind: security-consideration
summary: A rogue DHCP relay agent or a DHCP client masquerading as a relay agent can insert or overwrite Access-Network-Identifier options with incorrect values. A perimeter defense blocking untrusted relay agent options and the authentication sub-option for the DHCPv4 Relay-Agent-Information Option (RFC 4030) SHOULD be deployed.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
