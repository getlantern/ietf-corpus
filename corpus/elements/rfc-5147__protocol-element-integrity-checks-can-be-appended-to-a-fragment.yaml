document: rfc-5147
kind: protocol-element
summary: Integrity checks can be appended to a fragment identifier using the 'length' or 'md5' schemes, optionally followed by a MIME charset. The 'length' scheme specifies character count; the 'md5' scheme specifies a 32-hexdigit MD5 fingerprint of the MIME entity after stripping content-encodings.
section: "2.3"
topics:
