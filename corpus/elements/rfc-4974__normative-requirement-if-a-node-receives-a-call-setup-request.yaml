document: rfc-4974
kind: normative-requirement
summary: If a node receives a Call setup request with an address pair and long Call ID matching an existing Call, it MUST return an error Notify message with Error Code 'Call Management' and Error Value 'Duplicate Call', and MUST NOT make any changes to the existing Call.
section: "6.5"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
