document: rfc-6345
kind: wire-format
summary: The PaC-Information AVP (AVP Code 10) is of type OctetString. It contains an IP address — 16 octets for IPv6 or 4 octets for IPv4 — followed by a 2-octet UDP port number of the PaC, both encoded in network-byte order.
