document: rfc-4119
kind: protocol-element
summary: The 'location-info' element is a mandatory child of 'geopriv' and contains one or more chunks of location information in an imported XML format. The format is identified by the imported XML Schema namespace; both GML 3.0 and civicLoc formats are recognized.
