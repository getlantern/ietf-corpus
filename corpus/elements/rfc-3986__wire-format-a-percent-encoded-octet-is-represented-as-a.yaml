document: rfc-3986
kind: wire-format
summary: 'A percent-encoded octet is represented as a character triplet: pct-encoded = "%" HEXDIG HEXDIG. The uppercase hexadecimal digits A–F are equivalent to lowercase a–f, and URIs differing only in the case of hex digits in percent-encoded octets are equivalent.'
section: "2.1"
