kind: wire-format
summary: The GRE Key Extension carries a Type field (8-bit, value 48), a Sub-Type field (8-bit, value 0), a Length field (value 4), and a Key Identifier field (32-bit / 4 octets) inserted in every GRE packet of user traffic. Total encoded length is 8 octets including Type, Sub-Type, and Length.
