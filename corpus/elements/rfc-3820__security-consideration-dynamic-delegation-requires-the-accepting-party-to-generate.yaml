document: rfc-3820
kind: security-consideration
summary: Dynamic delegation requires the accepting party to generate a new key pair, which is computationally expensive. Implementors should authenticate the delegating party before generating keys and maintain state to detect and prevent denial-of-service attacks via repeated delegation requests.
section: "6.4"
topics:
    - pkix
    - security
