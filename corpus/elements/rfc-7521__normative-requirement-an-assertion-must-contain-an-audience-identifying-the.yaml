document: rfc-7521
kind: normative-requirement
summary: An assertion MUST contain an Audience identifying the authorization server as the intended audience. The authorization server MUST reject any assertion that does not contain its own identity as the intended audience. Audience values MUST be compared using Simple String Comparison per RFC 3986 Section 6.2.1.
section: "5.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
