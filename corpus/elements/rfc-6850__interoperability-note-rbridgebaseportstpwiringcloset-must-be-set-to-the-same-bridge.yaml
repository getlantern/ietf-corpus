document: rfc-6850
kind: interoperability-note
summary: rbridgeBasePortStpWiringCloset must be set to the same Bridge ID value on all RBridge ports participating in the Wiring Closet topology solution (RFC 6325 Appendix A.3.3); a non-zero value signals that the solution is active on that port.
