document: rfc-8349
kind: normative-requirement
summary: If ip:forwarding is set to 'false' for an interface, the forwarding of IPv4 or IPv6 datagrams through that interface MUST be disabled, though the interface MAY still participate in routing protocols such as OSPF.
section: "6.2"
rfc2119_level: MUST
topics:
