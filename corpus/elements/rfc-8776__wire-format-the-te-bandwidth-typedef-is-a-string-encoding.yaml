document: rfc-8776
kind: wire-format
summary: The 'te-bandwidth' typedef is a string encoding a comma-separated list of decimal, hex integer, or IEEE 754 hex-float values. For packet switching, units are bytes per second (e.g., '0x1p10'); for OTN, integer lists identify ODU types (e.g., '0,2,3,1'); for DWDM, pairs encode frequency slot number and slot width (e.g., '0,2,3,3'). Canonical form is lowercase hex with '0x' prefix.
section: "4"
topics:
