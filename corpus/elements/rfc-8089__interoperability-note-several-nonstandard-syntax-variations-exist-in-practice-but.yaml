document: rfc-8089
kind: interoperability-note
summary: 'Several nonstandard syntax variations exist in practice but are not supported by the normative syntax: user information in the authority (for VMS paths), DOS/Windows drive letters, vertical line character in place of colon in drive letters, UNC strings mapped to authority or path, and backslash as path separator.'
