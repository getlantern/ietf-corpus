document: rfc-9432
kind: protocol-element
summary: 'A catalog zone is a regular DNS zone whose contents are specially crafted: PTR records under the ''zones'' label list member zones, and additional RRsets encode properties. All RRs MUST have CLASS IN (1); TTL values carry no meaning and SHOULD be ignored.'
