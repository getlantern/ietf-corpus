document: rfc-8967
kind: state-machine
summary: 'Challenge lifecycle: sender detects Index mismatch → sends unicast Challenge Request with fresh nonce stored in neighbour table with 30-second expiry timer → receiver replies with Challenge Reply copying the nonce → challenger compares nonces; if equal, challenge succeeds and stored (Index, PC) is updated.'
