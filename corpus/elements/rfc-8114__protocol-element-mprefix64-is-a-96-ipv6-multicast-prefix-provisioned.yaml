summary: mPrefix64 is a /96 IPv6 multicast prefix provisioned to both mAFTR and mB4, used to construct IPv4-embedded IPv6 multicast addresses. It can be of type ASM_mPrefix64 (for ASM mode) or SSM_mPrefix64 (for SSM mode).
