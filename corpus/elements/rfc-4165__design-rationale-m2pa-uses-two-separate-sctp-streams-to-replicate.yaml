document: rfc-4165
kind: design-rationale
summary: M2PA uses two separate SCTP streams to replicate MTP2's priority of Link Status messages over User Data messages. Separation allows implementors to schedule reads and writes with appropriate priority without requiring a new priority mechanism at the SCTP layer.
section: 1.7.3
topics:
    - sctp
