document: rfc-4293
kind: protocol-element
summary: ipv6RouterAdvertTable contains non-routing information an IPv6 router uses when constructing router advertisement messages (e.g., flags and intervals), but not prefix or routing-specific data. This table is required only for IPv6 router entities.
