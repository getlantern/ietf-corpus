document: rfc-4606
kind: interoperability-note
summary: When a hierarchy of SONET/SDH LSPs is used, a higher-order LSP acts as a virtual link. Labels for lower-order LSPs within it have the S, U, K fields set to zero (non-significant), yielding the form '0,0,0,L,M'. In tunneling cases (e.g., VC-4 containing VC-3 containing VC-12) where SUKLM is insufficient, per-layer-network signaling (hierarchical LSPs) must be used.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
