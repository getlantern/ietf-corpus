document: rfc-3995
kind: interoperability-note
summary: This specification extends the RFC 2911 Job Creation operations (Print-Job, Print-URI, Create-Job) and the Validate-Job and Restart-Job operations by allowing Subscription Template Attributes Groups in requests and Subscription Attributes Groups in responses. Implementations of this extension must handle these additional groups without breaking base IPP/1.1 interoperability.
section: 11.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
