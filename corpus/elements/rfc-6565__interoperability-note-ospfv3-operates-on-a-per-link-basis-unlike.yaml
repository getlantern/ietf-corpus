document: rfc-6565
kind: interoperability-note
summary: OSPFv3 operates on a per-link basis (unlike OSPFv2's per-IP-subnet model), allowing multiple OSPFv3 instances over a single PE-CE interface all associated with the same VRF. This changes the RFC 4577 constraint that each interface belongs to no more than one OSPF instance.
section: "3.1"
topics:
    - routing
    - mpls
    - vpn
