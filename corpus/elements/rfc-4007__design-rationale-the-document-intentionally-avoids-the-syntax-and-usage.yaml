document: rfc-4007
kind: design-rationale
summary: The document intentionally avoids the syntax and usage of unicast site-local addresses because the IPv6 working group decided to deprecate them (RFC 3879). Only link-local and multicast scopes are addressed here; future local addressing schemes will be documented separately.
