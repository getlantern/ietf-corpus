document: rfc-6810
kind: normative-requirement
summary: An Error Report PDU MUST NOT be sent in response to another Error Report PDU. If an erroneous Error Report PDU is received, the session SHOULD be dropped.
section: "5.10"
rfc2119_level: MUST NOT
