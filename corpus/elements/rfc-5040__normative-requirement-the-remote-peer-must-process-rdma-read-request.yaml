document: rfc-5040
kind: normative-requirement
summary: The Remote Peer MUST process RDMA Read Request Messages in the order they were sent. A single RDMA Read Request Message MUST only read from one remote Tagged Buffer. The Data Source MUST ensure sufficient Untagged Buffers on Queue Number 1 to support the ULP-negotiated maximum number of concurrent RDMA Read Requests.
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
