document: rfc-4235
kind: normative-requirement
summary: A user agent that registers with address-of-record X SHOULD authorize subscriptions from any entity that can authenticate itself as X, and SHOULD send complete dialog state to such subscribers. This enables shared-line / single-line-extension applications.
section: "3.6"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
