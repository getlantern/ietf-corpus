document: rfc-5510
kind: security-consideration
summary: If confidentiality is a concern, it is RECOMMENDED that encryption be applied either over the whole object before FEC encoding or on a per-packet basis (e.g., using IPsec ESP). FEC itself neither introduces nor mitigates access control vulnerabilities.
section: 9.2.1
rfc2119_level: RECOMMENDED
topics:
    - security
    - multicast
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
