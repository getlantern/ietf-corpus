document: rfc-7866
kind: normative-requirement
summary: The SRC and SRS MUST support SIP with TLS version 1.2, SHOULD follow RFC 7525 best practices, and the RS MUST be at least as secure as the CS — meaning at least equivalent cipher suite strength. A CS using SIPS/SRTP may not be recorded over plain SIP/RTP without equivalent compensating controls.
section: "12"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - security
    - realtime
