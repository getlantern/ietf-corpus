document: rfc-4661
kind: protocol-element
summary: The simple-filter document is an XML 1.0 document rooted at <filter-set>, which contains an optional <ns-bindings> element and one or more <filter> elements. The optional 'package' attribute on <filter-set> identifies the event package to which the filter criteria apply.
