document: rfc-9716
kind: protocol-element
summary: The Reply Path TLV (from RFC 7110) is used with Reply Mode 5 to carry the SR return path as an ordered list of Segment sub-TLVs. This document defines three new sub-TLVs (Type-A, Type-C, Type-D) for encoding SR label stacks within the Reply Path TLV.
