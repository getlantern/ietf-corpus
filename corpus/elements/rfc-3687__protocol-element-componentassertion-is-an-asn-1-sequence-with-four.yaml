summary: 'ComponentAssertion is an ASN.1 SEQUENCE with four fields: an optional component reference (UTF8String), a useDefaultValues BOOLEAN defaulting TRUE, a matching rule OID (rule), and an assertion value. It evaluates to TRUE, FALSE, or Undefined for each tested ASN.1 value.'
