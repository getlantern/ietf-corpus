document: rfc-7035
kind: wire-format
summary: 'Map metadata TLVs: map media type (type 126) and map URL (type 127) are variable-length UTF-8 strings; map reference point coordinates (type 129); map orientation angle (type 130, single 32-bit float); map scale (type 131, one to three 32-bit floats). The binary form restricts all values to 255 octets maximum.'
