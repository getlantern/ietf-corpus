document: rfc-2425
kind: protocol-element
summary: For non-textual directory information (e.g., images, sounds) already having natural MIME representations, a multipart/related Content-Type is used. The root body part must be text/directory; non-text parts are referenced by Content-ID URIs from within the root part.
