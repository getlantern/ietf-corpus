document: rfc-9025
kind: design-rationale
summary: 'Four requirements must be satisfied to carry DetNet MPLS flows over an IP network: flow identification, DetNet sequence number carriage, OAM/data distinction, and queuing/forwarding indication. The MPLS encapsulation (RFC 8964) fully satisfies all four; the DetNet IP data plane (RFC 8939) only partially satisfies them (no sequence number).'
section: "1"
topics:
