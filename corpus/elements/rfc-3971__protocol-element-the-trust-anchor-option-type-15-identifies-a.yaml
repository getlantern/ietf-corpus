document: rfc-3971
kind: protocol-element
summary: 'The Trust Anchor Option (Type 15) identifies a trust anchor by Name Type: value 1 (mandatory) indicates a DER Encoded X.501 Name; value 2 (optional) indicates an FQDN in DNS wire format. Used in CPS messages to specify which anchor the host trusts, and in CPA messages to indicate which anchor the path was built for.'
section: 6.4.3
topics:
    - security
    - pkix
    - ip
