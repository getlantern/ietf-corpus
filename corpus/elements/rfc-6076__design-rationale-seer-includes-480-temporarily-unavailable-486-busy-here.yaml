document: rfc-6076
kind: design-rationale
summary: SEER includes 480 (Temporarily Unavailable), 486 (Busy Here), 600 (Busy Everywhere), and 603 (Decline) in its numerator because these response codes clearly indicate the effect of an individual user rather than network failure. Codes like 401, 407, and 420 were excluded since they may reflect misconfiguration rather than pure user effect.
section: "4.7"
