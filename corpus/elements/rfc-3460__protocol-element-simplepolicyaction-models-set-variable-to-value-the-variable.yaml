document: rfc-3460
kind: protocol-element
summary: SimplePolicyAction models 'SET <variable> TO <value>'. The variable is linked via PolicyVariableInSimplePolicyAction and the value via PolicyValueInSimplePolicyAction aggregations; expected values expressed through ExpectedPolicyValuesForVariable are for validation only and do not affect execution.
section: 5.8.4
