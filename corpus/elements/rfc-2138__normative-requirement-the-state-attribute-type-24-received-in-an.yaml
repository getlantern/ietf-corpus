document: rfc-2138
kind: normative-requirement
summary: The State attribute (Type 24) received in an Access-Challenge MUST be sent unmodified in the subsequent Access-Request reply. A packet MAY contain at most one State attribute.
section: "5.24"
rfc2119_level: MUST
topics:
