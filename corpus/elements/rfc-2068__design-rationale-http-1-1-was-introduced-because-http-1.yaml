document: rfc-2068
kind: design-rationale
summary: HTTP/1.1 was introduced because HTTP/1.0 did not adequately address hierarchical proxies, caching, persistent connections, and virtual hosts. The proliferation of incompletely-implemented HTTP/1.0 applications also necessitated a new version number to allow communicating applications to determine each other's true capabilities.
section: "1.1"
topics:
