document: rfc-9625
kind: normative-requirement
summary: 'PEs in a Tenant Domain MUST be provisioned to know which of three SMET-origination cases applies: no BD has a multicast router (Case 1), more than one BD may (Case 2), or exactly one BD may (Case 3). In Case 2, per-BD SMET routes MUST NOT be originated to avoid duplicate ingress of externally-sourced traffic.'
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
