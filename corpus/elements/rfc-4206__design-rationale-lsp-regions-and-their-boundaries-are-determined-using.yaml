document: rfc-4206
kind: design-rationale
summary: LSP regions and their boundaries are determined using Interface Switching Capability ordering to control FA-LSP boundaries. When an LSP crosses a region boundary at a node, that node becomes an edge LSR responsible for establishing an FA-LSP across the region.
