document: rfc-2284
kind: protocol-element
summary: The Nak type (3) is valid only in Response messages and is sent when the requested authentication Type is unacceptable. The Type-Data field MUST contain a single octet indicating the peer's desired authentication type. Authentication Types are numbered 4 and above.
section: "3.3"
topics:
    - security
