document: rfc-1582
kind: normative-requirement
summary: The sequence number MUST be incremented every time updated routing information is sent on a WAN, and MUST remain identical across all fragments of the same update. If a fragment is retransmitted, its sequence number MUST NOT change.
section: "3"
rfc2119_level: MUST
topics:
    - routing
