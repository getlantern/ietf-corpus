document: rfc-4348
kind: interoperability-note
summary: The header-free payload format is not compatible with AMR-WB RTP payload; only non-interoperable VMR-WB modes may use it. For interoperable interconnection with AMR-WB, only the octet-aligned payload format may be used.
section: "6.2"
