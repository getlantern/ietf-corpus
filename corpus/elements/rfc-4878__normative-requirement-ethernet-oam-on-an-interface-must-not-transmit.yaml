document: rfc-4878
kind: normative-requirement
summary: Ethernet OAM on an interface must not transmit OAMPDUs that exceed the peer's advertised maximum OAMPDU size (dot3OamPeerMaxOamPduSize). Peers negotiate to use the smaller of the two maximum sizes.
section: "6"
rfc2119_level: MUST NOT
