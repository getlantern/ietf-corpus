document: rfc-6320
kind: normative-requirement
summary: If the recipient of an ANCP message does not understand a particular TLV, it MUST silently ignore it. TLVs MAY be added to a message in any order unless otherwise specified.
section: 3.6.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
