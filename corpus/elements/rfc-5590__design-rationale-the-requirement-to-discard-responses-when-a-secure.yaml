document: rfc-5590
kind: design-rationale
summary: The requirement to discard responses when a secure transport session closes between request and response is architecturally a SHOULD (not a MUST) to allow future Security Models where this restriction might not make sense. However, not requiring this could lead to added complexity and security vulnerabilities, so most Security Models SHOULD require it.
section: 3.3.4
topics:
    - snmp
    - security
