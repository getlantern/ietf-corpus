document: rfc-7023
kind: protocol-element
summary: 'PW defect status code points defined in RFC 6310 are used: forward defect is the logical OR of Local AC (ingress) Receive Fault, Local PSN-facing PW (egress) Transmit Fault, and PW Not Forwarding; reverse defect is the logical OR of Local AC (egress) Transmit Fault and Local PSN-facing PW (ingress) Receive Fault.'
