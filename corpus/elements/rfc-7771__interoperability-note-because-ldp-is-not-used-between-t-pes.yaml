document: rfc-7771
kind: interoperability-note
summary: Because LDP is not used between T-PEs for statically provisioned MS-PWs, the RFC 6870 LDP-based negotiation procedures cannot be used. Operators must take care to identically provision both endpoint T-PEs with respect to whether MS-PW redundancy is enabled, which PW is primary, and the precedence of secondary MS-PWs.
section: "3"
topics:
    - mpls
    - routing
