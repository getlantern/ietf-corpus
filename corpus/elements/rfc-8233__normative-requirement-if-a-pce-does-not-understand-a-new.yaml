document: rfc-8233
kind: normative-requirement
summary: If a PCE does not understand a new METRIC type and the P bit is set in the METRIC object header, the PCE MUST send a PCErr message with Error-Type=4 (Not supported object) and Error-value=4 (Unsupported parameter).
section: 3.1.4
rfc2119_level: MUST
topics:
