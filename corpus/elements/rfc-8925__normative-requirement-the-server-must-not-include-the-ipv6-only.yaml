document: rfc-8925
kind: normative-requirement
summary: The server MUST NOT include the IPv6-Only Preferred option in DHCPOFFER or DHCPACK if the selected pool is not configured as IPv6-mostly, or if the option was not present in the client's Parameter Request List.
