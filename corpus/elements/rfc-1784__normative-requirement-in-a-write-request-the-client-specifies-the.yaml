document: rfc-1784
kind: normative-requirement
summary: In a Write Request, the client specifies the file size in octets as the tsize value; the server echoes it back in the OACK. If the file is too large for the server to handle, it may abort the transfer with Error packet error code 3.
section: Transfer Size Option Specification
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
