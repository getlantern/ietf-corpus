document: rfc-8229
kind: wire-format
summary: TCP-encapsulated IKE messages are preceded by a 16-bit unsigned integer Length field (network byte order) giving the length of the IKE message including the non-ESP marker, followed by a 32-bit all-zeros Non-ESP Marker, then the IKE header.
