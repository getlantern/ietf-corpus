document: rfc-5565
kind: security-consideration
summary: Encapsulation headers must appear in the clear to be processed by P routers, making them vulnerable to spoofing and replay attacks. An unauthorized node could send encapsulated packets to a receiving endpoint, causing policy violations by bypassing authorized ingress filtering.
section: "13.1"
topics:
    - security
    - vpn
    - ip
