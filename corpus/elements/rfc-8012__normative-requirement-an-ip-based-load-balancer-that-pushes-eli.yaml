document: rfc-8012
kind: normative-requirement
summary: An IP-based load balancer that pushes ELI/EL MUST set {L=0, E=1} in DS Flags and MUST respond with Multipath Type {10} including Associated Label Multipath Information (the EL values) mapped to each returned IP address when matching addresses are found.
section: "8.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
