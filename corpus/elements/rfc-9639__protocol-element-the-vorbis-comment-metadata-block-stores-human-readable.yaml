document: rfc-9639
kind: protocol-element
summary: The Vorbis comment metadata block stores human-readable UTF-8 metadata as a vendor string followed by name=value fields. Field lengths and count use little-endian 32-bit integers, in contrast to FLAC's usual big-endian convention. Field names MUST consist only of printable ASCII (U+0020–U+007E excluding '=') and MUST be evaluated case-insensitively.
section: "8.6"
topics:
    - json
