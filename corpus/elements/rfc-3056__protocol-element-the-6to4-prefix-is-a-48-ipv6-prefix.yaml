summary: 'The 6to4 prefix is a /48 IPv6 prefix constructed as: Format Prefix 001 (3 bits), TLA 0x0002 (13 bits), V4ADDR (32 bits), yielding the abbreviated form 2002:V4ADDR::/48. Within the site it is used exactly like any other /48 prefix.'
