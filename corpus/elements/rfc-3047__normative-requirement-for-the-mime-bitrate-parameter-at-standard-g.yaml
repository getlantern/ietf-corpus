document: rfc-3047
kind: normative-requirement
summary: For the MIME 'bitrate' parameter at standard G.722.1 rates, the value MUST be either 24000 or 32000. For non-standard rates, the value MUST be a multiple of 400, with RECOMMENDED range of 16000 to 32000.
section: "4"
rfc2119_level: MUST
