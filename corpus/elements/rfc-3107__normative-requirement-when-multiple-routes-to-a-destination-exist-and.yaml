document: rfc-3107
kind: normative-requirement
summary: When multiple routes to a destination exist and a labeled route is withdrawn with a label specified, only the route matching that specific label is withdrawn. If no label is specified at withdrawal, only the unlabeled route is withdrawn; labeled routes remain.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
    - routing
