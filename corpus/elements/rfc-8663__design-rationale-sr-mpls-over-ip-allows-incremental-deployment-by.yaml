document: rfc-8663
kind: design-rationale
summary: SR-MPLS-over-IP allows incremental deployment by tunneling SR-MPLS packets across portions of a network that are not SR-MPLS capable, connecting islands of SR-MPLS over a legacy IP network without requiring upgrades to intermediate routers.
