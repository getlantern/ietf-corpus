document: rfc-8505
kind: protocol-element
summary: The Extended Address Registration Option (EARO) updates the ARO for use in NS and NA messages. It adds a Transaction ID (TID) for mobility detection, an R flag to request reachability services, a T flag indicating TID presence, an I field for topology selection, an Opaque field, and renames the EUI-64 field to the Registration Ownership Verifier (ROVR).
section: "4.1"
topics:
