document: rfc-2381
kind: interoperability-note
summary: UNI 3.0 and UNI 3.1 are incompatible in actual codepoints but semantically equivalent; rtVBR and ABR service categories are new in TM/UNI 4.0 and unavailable in UNI 3.x. GS with rtVBR is not supported under UNI 3.x because BCOB-C cannot represent real-time behavior and UNI 3.1 Appendix F precludes VBR with timing required.
section: "1.2"
