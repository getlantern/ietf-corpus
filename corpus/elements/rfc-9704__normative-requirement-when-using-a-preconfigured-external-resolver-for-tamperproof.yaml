document: rfc-9704
kind: normative-requirement
summary: When using a preconfigured external resolver for tamperproof validation, clients MUST NOT relax the acceptance rules (e.g., AD bit checking, RRSIG validation) they would otherwise apply when using that resolver.
section: "6.1"
rfc2119_level: MUST NOT
