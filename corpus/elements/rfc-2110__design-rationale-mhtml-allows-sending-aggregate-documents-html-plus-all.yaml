document: rfc-2110
kind: design-rationale
summary: MHTML allows sending aggregate documents (HTML plus all linked resources such as inline images, style sheets, and applets) within a single MIME email message so that recipients without full Internet connectivity can still render the complete document. This addresses the case where linked URIs are only accessible within a private network.
section: "3"
topics:
    - email
