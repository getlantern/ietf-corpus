document: rfc-9509
kind: protocol-element
summary: id-kp-httpContentEncrypt (OID 1.3.6.1.5.5.7.3.38) is a new KeyPurposeId indicating the certificate's public key is certified for encrypting JSON objects in HTTP messages (e.g., encrypting the CEK using RSAES-OAEP to produce the JWE Encrypted Key between SEPPs). The KU extension must be set to keyEncipherment.
