document: rfc-6381
kind: design-rationale
summary: The dot ('.') character is reserved as a hierarchy delimiter within each codec identifier element, enabling codec strings to encode multi-level namespace hierarchies (e.g., codec family, OTI, profile-level). This allows the namespace for each subsequent element to be determined by its preceding element.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
