document: rfc-1885
kind: normative-requirement
summary: A Packet Too Big message MUST be sent by a router when it cannot forward a packet because the packet exceeds the MTU of the outgoing link. This message is an exception to the no-error-for-multicast rule and MUST be sent even for multicast-destined packets.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
