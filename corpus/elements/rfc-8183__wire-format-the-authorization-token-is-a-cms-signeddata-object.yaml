document: rfc-8183
kind: wire-format
summary: The authorization token is a CMS SignedData object using eContentType id-ct-xml, with the signer's BPKI EE certificate in the CMS wrapper. Recipients verify the CMS signature against the referrer's BPKI CA certificate and confirm the enclosed BPKI TA matches the prospective publisher's identity.
section: "5.3"
topics:
    - pkix
    - crypto
    - security
