document: rfc-6891
kind: normative-requirement
summary: Conformant middleboxes MUST NOT limit DNS messages over UDP to 512 bytes. Middleboxes that simply forward requests MUST NOT modify and MUST NOT delete the OPT record contents in either direction.
section: 6.2.6
rfc2119_level: MUST NOT
topics:
