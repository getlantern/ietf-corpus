document: rfc-3912
kind: interoperability-note
summary: The WHOIS protocol has no mechanism for indicating the character set in use. Originally US-ASCII was predominant, but some servers outside the USA use other character encodings for requests, replies, or both, adversely impacting interoperability.
section: "4"
