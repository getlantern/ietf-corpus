document: rfc-8986
kind: normative-requirement
summary: When performing flow-based selection within a set (e.g., ECMP paths, End.X adjacency arrays, multi-SID-list SR Policies), the IPv6 Source Address, Destination Address, and Flow Label of the outer IPv6 header MUST be included in the flow-based hash.
section: "7"
rfc2119_level: MUST
