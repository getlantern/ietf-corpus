document: rfc-9748
kind: normative-requirement
summary: In the NTP Reference Identifier Codes and NTP Kiss-o'-Death Codes registries, each byte of the ID field (other than zero-padding) MUST be an ASCII uppercase letter or digit. Fields starting with 0x58 (uppercase 'X') are reserved for Private or Experimental Use and IANA cannot assign them.
section: "3"
rfc2119_level: REQUIRED
topics:
    - ntp
    - registry
