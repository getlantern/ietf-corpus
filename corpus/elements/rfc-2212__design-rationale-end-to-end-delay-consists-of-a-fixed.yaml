document: rfc-2212
kind: design-rationale
summary: End-to-end delay consists of a fixed component (path latency, determined by routing) and a queueing component (controlled by guaranteed service). The queueing delay is primarily a function of token bucket size b and reserved rate R, both under application control, so applications can estimate and tune their delay a priori.
