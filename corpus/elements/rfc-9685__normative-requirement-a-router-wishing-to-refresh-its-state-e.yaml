document: rfc-9685
kind: normative-requirement
summary: A router wishing to refresh its state (e.g., upon reboot) SHOULD send an asynchronous NA(EARO) with the new 'Registration Refresh Request' status value; the multicast NA(EARO) MUST be sent to the all-nodes link-scope multicast address ff02::1 with the Target set to the link-local address previously exposed for registrations.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
