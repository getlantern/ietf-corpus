document: rfc-9399
kind: security-consideration
summary: CAs accepting graphics from certificate requesters for embedded logotypes should be cautious if the hash algorithm used to sign the certificate is vulnerable to collision attacks (per RFC 6151), as the accepted image may help an attacker obtain colliding certificates with identical signatures.
section: "9"
topics:
    - pkix
    - security
    - crypto
