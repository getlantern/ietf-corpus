document: rfc-2910
kind: wire-format
summary: 'dateTime is encoded as an 11-octet OCTET-STRING per RFC 1903 DateAndTime. resolution is 9 octets: two SIGNED-INTEGERs (cross-feed direction, then feed direction) followed by a SIGNED-BYTE (units). rangeOfInteger is 8 octets: two SIGNED-INTEGERs (lower bound, then upper bound).'
