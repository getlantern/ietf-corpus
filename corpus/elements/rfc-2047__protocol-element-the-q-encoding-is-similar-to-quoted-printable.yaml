document: rfc-2047
kind: protocol-element
summary: 'The ''Q'' encoding is similar to Quoted-Printable (RFC 2045): any 8-bit value may be encoded as ''='' followed by two uppercase hex digits; ''_'' (underscore, ASCII 95) always represents hexadecimal 20 (SPACE); other printable ASCII characters except ''='', ''?'', and ''_'' MAY be used as-is. SPACE and TAB MUST NOT appear literally.'
section: "4.2"
rfc2119_level: MUST NOT
