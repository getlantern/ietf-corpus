document: rfc-8001
kind: protocol-element
summary: A new SRLG Collection Flag is defined in the Attribute Flags TLV (RFC 5420). When set, it signals that SRLG information SHOULD be reported to the ingress and egress nodes along the LSP setup path. It is carried in either an LSP_REQUIRED_ATTRIBUTES object (mandatory collection) or an LSP_ATTRIBUTES object (desired but not mandatory).
section: "4.1"
topics:
    - routing
    - mpls
    - registry
