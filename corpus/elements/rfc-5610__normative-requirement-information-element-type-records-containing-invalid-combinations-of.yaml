document: rfc-5610
kind: normative-requirement
summary: Information Element type records containing invalid combinations of informationElementSemantics and informationElementDataType MUST NOT be sent by Exporting Processes, and MUST be ignored by Collecting Processes. For example, a counter cannot be encoded as an IPv4 address.
section: "3.10"
rfc2119_level: MUST NOT
