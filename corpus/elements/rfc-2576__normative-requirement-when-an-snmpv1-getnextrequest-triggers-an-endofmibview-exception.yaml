document: rfc-2576
kind: normative-requirement
summary: When an SNMPv1 GetNextRequest triggers an endOfMibView exception from SNMPv2 MIB access, the error-status SHALL be set to noSuchName with the error-index pointing to the offending binding and the original variable binding list returned.
section: 4.1.2.2.2
rfc2119_level: MUST
topics:
    - snmp
