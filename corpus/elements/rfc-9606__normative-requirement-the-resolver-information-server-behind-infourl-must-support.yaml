document: rfc-9606
kind: normative-requirement
summary: The resolver information server behind 'infourl' MUST support only the content-type 'text/html'. The DNS client MUST reject the URL as invalid if the scheme is not 'https'. Invalid URLs MUST be ignored.
section: "5"
rfc2119_level: MUST
topics:
