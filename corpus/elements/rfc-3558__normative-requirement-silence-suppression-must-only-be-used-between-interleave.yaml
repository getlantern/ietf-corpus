document: rfc-3558
kind: normative-requirement
summary: Silence suppression MUST only be used between interleave groups. Within an interleave group, a ToC with Frame Type 0 (Blank) MUST be used if the codec outputs a blank frame; the M bit is not set for blank frames.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
