document: rfc-6465
kind: wire-format
summary: Using the one-byte header format (RFC 5285), the 4-bit len field is the number minus one of audio level bytes following the header, so len=2 means three levels. Using the two-byte header format, the 8-bit len field contains the exact number of audio levels.
