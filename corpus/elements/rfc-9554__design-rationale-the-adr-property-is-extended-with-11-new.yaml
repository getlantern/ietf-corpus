document: rfc-9554
kind: design-rationale
summary: The ADR property is extended with 11 new granular components (room, apartment, floor, streetnumber, streetname, building, block, subdistrict, district, landmark, direction) because international addresses require components that implementations currently combine into the single street address field, losing structural information.
