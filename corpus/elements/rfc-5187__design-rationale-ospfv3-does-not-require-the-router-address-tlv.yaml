document: rfc-5187
kind: design-rationale
summary: OSPFv3 does not require the router-address TLV used in OSPFv2 graceful restart because in OSPFv3, neighboring routers on any link are always identified by their Router IDs, whereas OSPFv2 uses IPv4 interface addresses for neighbors on broadcast, NBMA, and point-to-multipoint links.
section: "2"
topics:
