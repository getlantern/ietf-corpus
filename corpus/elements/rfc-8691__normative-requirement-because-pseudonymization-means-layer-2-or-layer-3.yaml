document: rfc-8691
kind: normative-requirement
summary: Because pseudonymization means layer-2 or layer-3 addresses cannot be relied upon for trust, upper-layer protocols and applications SHOULD NOT rely on layer-2 or layer-3 addresses to assume that the other participant can be trusted.
section: "5.3"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - security
    - privacy
