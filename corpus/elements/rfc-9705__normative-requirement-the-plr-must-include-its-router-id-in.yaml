document: rfc-9705
kind: normative-requirement
summary: The PLR MUST include its router ID in a Node-ID sub-object in the RRO carried in subsequent Path messages for the LSP, placing the Node-ID sub-object after the IPv4/IPv6 address or unnumbered interface ID sub-object.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
