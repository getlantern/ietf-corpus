document: rfc-7361
kind: protocol-element
summary: The PBB B-MAC List Sub-TLV (type 0x0407) carries one or more 48-bit Backbone MAC addresses representing the source B-MACs associated with the B-VPLS instance that originated the MAC withdraw message. At least one B-MAC address MUST be present.
