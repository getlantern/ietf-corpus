summary: 'The Internet Date/Time Format is defined by the ABNF: date-time = full-date ''T'' full-time, where full-date = date-fullyear ''-'' date-month ''-'' date-mday (4DIGIT ''-'' 2DIGIT ''-'' 2DIGIT) and full-time = partial-time time-offset.'
