summary: 'The Internet Date/Time Format is defined by the ABNF production: date-time = full-date "T" full-time, where full-date = date-fullyear "-" date-month "-" date-mday, and full-time = partial-time time-offset. All fields and punctuation are mandatory except time-secfrac.'
