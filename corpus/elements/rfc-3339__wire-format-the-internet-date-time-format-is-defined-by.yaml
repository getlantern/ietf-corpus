document: rfc-3339
kind: wire-format
summary: The Internet Date/Time Format is defined by the ABNF production `date-time = full-date "T" full-time`, where full-date is `date-fullyear "-" date-month "-" date-mday` (e.g., `1985-04-12T23:20:50.52Z`). All fields and punctuation are mandatory.
