document: rfc-8859
kind: normative-requirement
summary: Attributes in the IDENTICAL category MUST be repeated across all media descriptions under multiplexing. For example, rtcp-mux MUST be enabled for all "m=" lines transported over a single 5-tuple because RTCP reporting is per RTP session.
section: "4.3"
rfc2119_level: MUST
