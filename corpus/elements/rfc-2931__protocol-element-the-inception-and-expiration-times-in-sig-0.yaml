document: rfc-2931
kind: protocol-element
summary: The inception and expiration times in SIG(0)s resist replay attacks. They should form a time bracket such that messages outside it can be ignored; in IP networks this bracket should not normally extend more than 5 minutes into the past or future.
section: "3.3"
topics:
