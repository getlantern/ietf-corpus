summary: Similar to the (C-*,C-*-BIDIR) case, PEy MUST advertise a Leaf A-D route in response to receiving a (C-*,C-G-BIDIR) S-PMSI A-D route with IR PTA from its Upstream PE when it has corresponding local (C-*,C-G-BIDIR) join state from its CEs.
