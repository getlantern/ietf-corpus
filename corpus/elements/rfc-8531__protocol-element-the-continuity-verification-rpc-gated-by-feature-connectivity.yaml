document: rfc-8531
kind: protocol-element
summary: The 'continuity-verification' RPC (gated by feature 'connectivity-verification') mirrors continuity-check but uses 'interval' instead of 'cc-transmit-interval', and verifies not only reachability but also that MEPs are connected through the expected path. Count defaults to 3, packet-size range is 64..10000 octets.
section: "4.4"
