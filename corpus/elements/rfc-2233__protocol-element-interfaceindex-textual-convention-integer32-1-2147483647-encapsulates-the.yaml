document: rfc-2233
kind: protocol-element
summary: InterfaceIndex textual convention (Integer32, 1..2147483647) encapsulates the semantics of ifIndex and is intended to be imported by other MIB modules that need to reference interface sub-layers. InterfaceIndexOrZero extends it to permit zero for object-specific uses such as 'no interface' or 'all interfaces'.
