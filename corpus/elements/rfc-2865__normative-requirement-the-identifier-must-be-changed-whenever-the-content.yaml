document: rfc-2865
kind: normative-requirement
summary: The Identifier MUST be changed whenever the content of the Attributes field changes, and whenever a valid reply has been received for a previous request. For retransmissions to the same server with unchanged attributes, the Identifier MUST remain unchanged and the same Request Authenticator and source port MUST be used.
section: "4.1"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
