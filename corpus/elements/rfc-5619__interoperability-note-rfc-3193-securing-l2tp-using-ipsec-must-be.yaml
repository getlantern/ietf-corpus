document: rfc-5619
kind: interoperability-note
summary: RFC 3193 (Securing L2TP using IPsec) MUST be supported for time-to-market deployments; however, new implementations SHOULD use IKEv2 (RFC 4306) instead of IKEv1 (RFC 2409). Appendix A provides legacy SPD examples for IKEv1-based deployments.
