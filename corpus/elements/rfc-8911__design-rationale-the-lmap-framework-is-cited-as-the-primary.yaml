document: rfc-8911
kind: design-rationale
summary: 'The LMAP framework is cited as the primary driver for the new registry''s success: the LMAP Control Protocol will embed Performance Metrics Registry Identifiers in protocol messages, requiring metrics to be precisely enough defined for a Measurement Agent to implement them. This operational constraint prevents the vagueness that doomed RFC 4148''s undefined Type-P.'
section: "6.1"
topics:
    - registry
    - measurement
