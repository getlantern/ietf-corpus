document: rfc-9051
kind: protocol-element
summary: IMAP4rev2 operates over TCP on port 143 (cleartext) or port 993 (Implicit TLS). All protocol data is line-oriented (CRLF-terminated). Client commands are prefixed with a unique tag; server untagged responses are prefixed with '*'; command continuation requests are prefixed with '+'.
section: "2.1"
