document: rfc-5116
kind: interoperability-note
summary: An implementation MAY accept additional inputs beyond the standard four (K, N, P, A), but such extensions MUST NOT affect interoperability with other implementations. Each algorithm SHOULD accept 12-octet nonces to aid cross-implementation compatibility.
