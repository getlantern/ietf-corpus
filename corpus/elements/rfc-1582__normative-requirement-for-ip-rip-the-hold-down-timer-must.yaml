document: rfc-1582
kind: normative-requirement
summary: For IP RIP, the hold-down timer MUST run for 120 seconds (consistent with LAN RIP) and the database entry timer defaults to 180 seconds. If the database entry timer expires while a circuit is down, the routing application MUST issue a triggered request when the circuit comes back up.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
