document: rfc-4175
kind: normative-requirement
summary: A 90-kHz RTP timestamp SHOULD be used for both progressive and interlaced video. If the sampling instant does not correspond to an integer clock value, the value SHALL be truncated to the next lowest integer.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
