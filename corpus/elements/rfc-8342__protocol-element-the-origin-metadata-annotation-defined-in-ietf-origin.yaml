document: rfc-8342
kind: protocol-element
summary: The 'origin' metadata annotation (defined in ietf-origin YANG module) can appear on any configuration data node in <operational>, indicating its source. The annotation is inherited from parent nodes if not specified; it MUST be specified for all top-level configuration data nodes.
