document: rfc-8341
kind: protocol-element
summary: The nacm:default-deny-write YANG extension marks a data node as a sensitive security parameter; only a recovery session may write it unless an explicit NACM rule permits access. The nacm:default-deny-all extension additionally restricts all read, write, and execute access to recovery sessions by default.
section: 3.5.2
topics:
    - netconf
    - security
    - yang
