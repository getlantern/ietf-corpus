document: rfc-3115
kind: interoperability-note
summary: RFC 3115 obsoletes RFC 3025 because implementations followed the IANA-assigned type numbers (CVSE=38, NVSE=134) rather than the values in RFC 3025 (CVSE=37, NVSE=133). Implementations conforming to RFC 3025's numeric values are incompatible with RFC 3115-conformant implementations.
section: RFC Editor Note
topics:
    - mobility
