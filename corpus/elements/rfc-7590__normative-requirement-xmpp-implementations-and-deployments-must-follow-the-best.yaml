document: rfc-7590
kind: normative-requirement
summary: XMPP implementations and deployments MUST follow the best current practices documented in RFC 7525 ('Recommendations for Secure Use of TLS and DTLS'), covering protocol versions, fallback, compression, session resumption, cipher suites, public key lengths, and forward secrecy.
