document: rfc-2508
kind: normative-requirement
summary: When more than one IPv4 header is present in the context, the IP ID fields of encapsulating headers MUST be sent as absolute values (RANDOM fields) in the COMPRESSED_RTP packet. Only the IP ID of the IPv4 header immediately preceding the UDP header may be sent differentially.
section: 3.3.2
rfc2119_level: MUST
topics:
    - rtp
    - ip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
