document: rfc-8062
kind: normative-requirement
summary: A GSS-API initiator MUST carefully check resulting context attributes from GSS_Init_Sec_Context() when requesting anonymity and MUST NOT send the initial security context token to the acceptor if the anonymity attribute was not granted.
section: "6"
rfc2119_level: MUST
topics:
