document: rfc-1374
kind: protocol-element
summary: A HIPPI packet consists of an 8-octet HIPPI-FP header, a 24-octet HIPPI-LE header (D1_Area), an 8-octet IEEE 802.2 LLC/SNAP header, and an IP or ARP payload (D2_Area), with trailing fill octets to align the total length to a multiple of 8 octets.
section: Protocol/Packet Format
