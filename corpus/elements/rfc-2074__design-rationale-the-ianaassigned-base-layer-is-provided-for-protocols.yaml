document: rfc-2074
kind: design-rationale
summary: The ianaAssigned base-layer is provided for protocols that cannot be identified by examination of appropriate network traffic (e.g., those requiring configuration-based criteria). Standard protocols remapped to non-standard ports should use the user-extensibility feature of protocolDirTable instead, and do not need IANA assignments.
section: 5.2.5
topics:
