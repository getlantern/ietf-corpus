document: rfc-7077
kind: design-rationale
summary: The protocol fills a gap in base PMIPv6 (RFC5213) which had no mechanism for the LMA to asynchronously notify the MAG about session changes. Existing mechanisms (Heartbeat RFC5847, Binding Revocation RFC5846) were too purpose-specific to serve as a general notification framework.
section: "1"
topics:
    - mobility
