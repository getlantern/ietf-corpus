document: rfc-9701
kind: interoperability-note
summary: One way to manage RS credentials is to use dynamic client registration (RFC 7591), treating each RS as an OAuth client. The AS should maintain at minimum a client_id and token_endpoint_auth_method, plus complementary authentication metadata such as jwks or client_secret.
