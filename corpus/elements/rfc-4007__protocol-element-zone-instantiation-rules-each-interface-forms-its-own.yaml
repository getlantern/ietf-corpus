document: rfc-4007
kind: protocol-element
summary: 'Zone instantiation rules: each interface forms its own interface-local zone (multicast only); each link and its attached interfaces form a single link-local zone; there is a single global zone; zones of other scopes must be defined and configured by network administrators. Each interface belongs to exactly one zone of each possible scope.'
section: "5"
