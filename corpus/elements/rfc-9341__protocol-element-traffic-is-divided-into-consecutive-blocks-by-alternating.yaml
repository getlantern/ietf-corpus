document: rfc-9341
kind: protocol-element
summary: Traffic is divided into consecutive blocks by alternating a marking color (A or B) in a packet header flag bit. All packets in the same block share the same color; a color change signals the boundary between blocks and serves as an auto-synchronization signal for measurement points along the path.
section: "3.1"
topics:
    - measurement
    - ip
    - mpls
