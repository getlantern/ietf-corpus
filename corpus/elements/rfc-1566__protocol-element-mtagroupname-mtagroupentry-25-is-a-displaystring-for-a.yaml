document: rfc-1566
kind: protocol-element
summary: mtaGroupName (mtaGroupEntry 25) is a DisplayString. For a group connected to a single remote Internet MTA it should be the domain name; for OSI MTAs the string-encoded Distinguished Name per RFC 1485; for X.400(1984) MTAs without a DN, the RFC 1327 syntax 'mta in globalid'.
