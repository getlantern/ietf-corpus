document: rfc-4286
kind: protocol-element
summary: 'MRD defines three message types: Multicast Router Advertisement (sent periodically by routers with multicast forwarding enabled and in response to solicitations), Multicast Router Solicitation (sent by devices wishing to discover multicast routers), and Multicast Router Termination (sent when a router stops IP multicast routing on an interface).'
section: "2"
topics:
