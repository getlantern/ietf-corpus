document: rfc-2982
kind: protocol-element
summary: expExpression uses a subset of ANSI C syntax (up to 1024 bytes). Variables reference objects by $n (e.g., $1, $5). Allowed operators include arithmetic, bitwise, logical, and comparison operators. Allowed functions include counter32(), counter64(), arraySection(), stringBegins/Ends/Contains(), oidBegins/Ends/Contains(), average(), maximum(), minimum(), sum(), and exists().
