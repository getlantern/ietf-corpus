document: rfc-8166
kind: normative-requirement
summary: When a Requester provides a Write list, the Responder MUST push data corresponding to DDP-eligible result items to Requester memory and MUST copy and update all segment information into the RPC Reply message's Transport header reflecting actual bytes written.
section: 4.3.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
