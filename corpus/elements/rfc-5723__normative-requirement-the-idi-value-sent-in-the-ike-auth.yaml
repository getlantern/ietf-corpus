document: rfc-5723
kind: normative-requirement
summary: The IDi value sent in the IKE_AUTH exchange following IKE_SESSION_RESUME MUST be identical to the value included in the ticket. A CERT payload MUST NOT be included in this exchange, and IDr MUST also match the ticket.
section: 4.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
