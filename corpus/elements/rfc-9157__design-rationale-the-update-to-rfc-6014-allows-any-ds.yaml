document: rfc-9157
kind: design-rationale
summary: The update to RFC 6014 allows any DS hash algorithms, NSEC3 hash algorithms, NSEC3 parameters, and NSEC3 flags that are fully described in an RFC to receive IANA identifiers, rather than requiring a full Standards Action. This lowers the barrier for documenting new algorithms while still requiring an RFC.
