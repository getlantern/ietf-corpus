document: rfc-9847
kind: protocol-element
summary: 'The ''Recommended'' column in TLS registries now supports three values: ''Y'' (IETF consensus recommends the item), ''N'' (not evaluated or no consensus), and ''D'' (discouraged — may cause problems such as weak cryptography or interoperability issues). This extends the binary Y/N scheme from RFC 8447.'
section: "3"
topics:
    - tls
    - registry
    - security
