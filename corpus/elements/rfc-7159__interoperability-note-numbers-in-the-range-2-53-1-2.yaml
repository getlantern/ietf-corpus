document: rfc-7159
kind: interoperability-note
summary: Numbers in the range [-(2**53)+1, (2**53)-1] that are integers are interoperable across IEEE 754-2008 binary64 implementations. Numbers outside this range (e.g., 1E400) or with extreme precision may cause interoperability problems.
