document: rfc-2128
kind: interoperability-note
summary: The Dial Control MIB depends on encapsulation-layer MIBs (e.g., PPP) for ifEntry creation, ifTestTable, and ifRcvAddressTable definitions. The Dial Control MIB adds supplementary RowStatus-controlled information but never independently creates ifEntries.
section: "2.2"
