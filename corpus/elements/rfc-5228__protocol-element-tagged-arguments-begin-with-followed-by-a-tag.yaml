document: rfc-5228
kind: protocol-element
summary: Tagged arguments begin with ':' followed by a tag name (e.g., ':contains'). They must appear before positional arguments but may appear in any order relative to other tagged arguments. They SHOULD NOT take other tagged arguments as their own arguments.
section: 2.6.2
topics:
