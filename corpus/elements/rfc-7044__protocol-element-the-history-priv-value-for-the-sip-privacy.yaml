document: rfc-7044
kind: protocol-element
summary: The 'history' priv-value for the SIP Privacy header field is defined. When present in the message header, it directs the Privacy Service to anonymize all hi-targeted-to-uris in hi-entries belonging to the responsible domain. When present inside the hi-targeted-to-uri headers component of a specific hi-entry, only that entry is anonymized.
section: "5"
topics:
    - sip
    - privacy
