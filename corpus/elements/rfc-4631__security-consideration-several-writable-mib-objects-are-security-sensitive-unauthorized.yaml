document: rfc-4631
kind: security-consideration
summary: 'Several writable MIB objects are security-sensitive: unauthorized write access to lmpCcAdminStatus, lmpNbrAdminStatus, or lmpCcAuthentication could disrupt LMP adjacencies or disable authentication on control channels. Implementations should restrict SNMP write access using SNMPv3 USM with authentication and privacy.'
section: "10"
topics:
    - security
    - routing
