document: rfc-8445
kind: protocol-element
summary: 'ICE defines four candidate types: host (from local interfaces), server-reflexive (NAT binding learned via STUN/TURN), peer-reflexive (NAT binding discovered during connectivity checks), and relayed (address allocated on a TURN server). Each candidate has a transport address, type, base, priority, foundation, and component ID.'
section: "2.1"
