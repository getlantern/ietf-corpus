document: rfc-6544
kind: normative-requirement
summary: If a TCP connection cannot be established for a connectivity check, the check is considered to have failed, and a full-mode agent MUST update the pair state to Failed in the check list. STUN retransmissions are not needed over TCP since TCP provides reliable delivery.
section: "7.1"
rfc2119_level: MUST
topics:
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
