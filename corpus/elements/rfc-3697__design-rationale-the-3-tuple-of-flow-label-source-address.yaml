document: rfc-3697
kind: design-rationale
summary: The 3-tuple of Flow Label, Source Address, and Destination Address enables efficient IPv6 flow classification using only fixed-position main header fields. This avoids dependence on fields that may be unavailable due to fragmentation or encryption, or that require traversing a chain of IPv6 option headers to locate.
section: "1"
topics:
