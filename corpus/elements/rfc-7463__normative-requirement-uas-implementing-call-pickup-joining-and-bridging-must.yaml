document: rfc-7463
kind: normative-requirement
summary: UAs implementing call pickup, joining, and bridging MUST support sending an INVITE with Replaces (RFC 3891) or Join (RFC 3911), and all UAs implementing shared appearances that support INVITE MUST support receiving an INVITE with those header fields.
section: "5.3"
rfc2119_level: MUST
