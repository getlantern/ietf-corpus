document: rfc-3731
kind: protocol-element
summary: The <domain:create> command requires <domain:name> and <domain:authInfo>; optional elements include <domain:period> (1–99 years or months), <domain:ns> (name servers), <domain:registrant>, and <domain:contact> (admin/billing/tech types). The <domain:creData> response returns name, creation date, and optional expiry date.
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
