document: rfc-7616
kind: protocol-element
summary: 'The Authorization header field carries the client''s Digest response with parameters: username (or username*), realm, uri, qop, cnonce, nc, response, userhash, and opaque. The opaque and algorithm values MUST match those supplied in the WWW-Authenticate challenge.'
