document: rfc-3124
kind: normative-requirement
summary: The CM MUST invoke the cmapp_send() callback after a cm_request() call, granting the stream permission to send up to PMTU bytes. Each cm_request() is an implicit request for up to one PMTU-sized transmission.
section: "3.2"
rfc2119_level: MUST
topics:
    - congestion
