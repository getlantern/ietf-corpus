document: rfc-4443
kind: wire-format
summary: 'Echo Request (Type 128) and Echo Reply (Type 129) messages share a format: 8-bit Type, 8-bit Code (0), 16-bit Checksum, 16-bit Identifier, 16-bit Sequence Number, and zero or more octets of arbitrary Data. There is no limitation on the amount of data.'
