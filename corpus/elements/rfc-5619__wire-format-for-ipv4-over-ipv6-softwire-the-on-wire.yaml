document: rfc-5619
kind: wire-format
summary: 'For IPv4-over-IPv6 softwire, the on-wire packet layering is: IPv6 header (SI to SC), ESP header, UDP header (src/dst port 1701), L2TPv2 header, PPP header, IPv4 header, payload, ESP ICV. ESP operates in transport mode.'
