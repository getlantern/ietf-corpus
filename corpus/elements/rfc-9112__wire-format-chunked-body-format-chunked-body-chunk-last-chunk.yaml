document: rfc-9112
kind: wire-format
summary: 'Chunked body format: chunked-body = *chunk last-chunk trailer-section CRLF. Each chunk = chunk-size [ chunk-ext ] CRLF chunk-data CRLF, where chunk-size is 1*HEXDIG. The last-chunk has chunk-size of zero. Recipients MUST anticipate large hex numerals to prevent integer overflow.'
section: "7.1"
topics:
    - http
