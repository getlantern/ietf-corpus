document: rfc-9464
kind: protocol-element
summary: The SvcParams field encodes service parameters using the wire format from RFC 9460 Section 2.2. The service parameters MUST NOT include 'ipv4hint' or 'ipv6hint' (superseded by included IP addresses) and apply to all IP addresses in the attribute.
section: "3.1"
topics:
