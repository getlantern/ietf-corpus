document: rfc-2233
kind: normative-requirement
summary: A previously unused ifIndex value MUST be assigned to a dynamically added interface when an agent has no knowledge of whether the interface is the 'same' or 'different' from a previously incarnated interface, to prevent management stations from incorrectly calculating counter differences.
section: 3.1.5
rfc2119_level: MUST
topics:
    - snmp
