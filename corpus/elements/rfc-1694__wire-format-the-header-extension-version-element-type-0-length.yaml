document: rfc-1694
kind: wire-format
summary: The Header Extension Version element (Type=0, Length=3, Value=1) must appear first within the Header Extension; any Type=0 element outside the first three octets is an error. The Header Extension PAD must not be 9 octets long, and if non-zero must follow all elements and begin with at least one all-zero octet.
section: "4.6"
topics:
    - snmp
