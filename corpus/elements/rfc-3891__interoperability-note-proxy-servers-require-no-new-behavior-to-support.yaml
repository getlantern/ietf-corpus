document: rfc-3891
kind: interoperability-note
summary: Proxy servers require no new behavior to support the Replaces extension and simply pass the header transparently. However, a proxy that forks based on application-layer logic (caller screening, time-of-day routing) may forward an INVITE with Replaces to a set of Contacts unrelated to the intended target, causing the request to fail.
section: "5"
topics:
    - sip
    - realtime
