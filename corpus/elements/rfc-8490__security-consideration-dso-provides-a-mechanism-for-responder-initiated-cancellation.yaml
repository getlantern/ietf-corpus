document: rfc-8490
kind: security-consideration
summary: DSO provides a mechanism for responder-initiated cancellation of long-lived operations by sending a new DSO response message with the original operation's MESSAGE ID and a nonzero RCODE indicating the reason, allowing selective cleanup without terminating the entire session.
