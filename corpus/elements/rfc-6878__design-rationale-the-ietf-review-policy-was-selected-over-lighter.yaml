document: rfc-6878
kind: design-rationale
summary: The IETF Review policy was selected over lighter-weight registration policies because new Priority values carry potential architectural implications. Documents contemplating new Priority values should consider whether SIP Resource-Priority (RFC 4412) or a different protocol would better meet their requirements.
