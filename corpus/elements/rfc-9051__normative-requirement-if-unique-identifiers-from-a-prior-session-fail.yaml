document: rfc-9051
kind: normative-requirement
summary: If unique identifiers from a prior session fail to persist, UIDVALIDITY MUST be greater than the value used in the earlier session. UIDNEXT MUST NOT change unless new messages are added and MUST change whenever new messages are added, even if those messages are subsequently expunged.
section: 2.3.1.1
rfc2119_level: MUST
topics:
    - email
