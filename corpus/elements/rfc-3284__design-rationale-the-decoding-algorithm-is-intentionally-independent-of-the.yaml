document: rfc-3284
kind: design-rationale
summary: The decoding algorithm is intentionally independent of the encoder's string matching and windowing algorithms, so that encoder implementations can compete and improve without requiring decoder updates. The delta file encodes all information the decoder needs (window positions, instruction choices) explicitly.
section: "1"
