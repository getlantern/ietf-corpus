document: rfc-5545
kind: protocol-element
summary: The VTIMEZONE component defines a timezone used in the iCalendar object. It MUST contain a TZID property and at least one STANDARD or DAYLIGHT sub-component, each with DTSTART, TZOFFSETFROM, and TZOFFSETTO properties. Multiple STANDARD/DAYLIGHT sub-components can represent historical timezone changes.
section: 3.6.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
