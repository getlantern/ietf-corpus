document: rfc-6871
kind: protocol-element
summary: The 'a=rmcap' attribute defines RTP-based media format capabilities in the form of a media subtype (e.g., PCMU, G729) and encoding parameters, assigning each a media capability number. Multiple capability numbers may be assigned to the same subtype to allow association with different parameter sets in different configurations.
section: 3.3.1
topics:
    - realtime
    - rtp
