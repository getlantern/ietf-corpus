document: rfc-2589
kind: protocol-element
summary: The entryTtl operational attribute (OID 1.3.6.1.4.1.1466.101.119.3, SYNTAX Integer, SINGLE-VALUE, NO-USER-MODIFICATION) indicates the seconds remaining before a dynamic entry disappears. It is maintained by the server and can only be changed via the Refresh operation.
