document: rfc-7503
kind: normative-requirement
summary: A pseudorandom number SHOULD be used for the OSPFv3 Router ID in autoconfigured deployments, seeded with a variable likely to be unique such as a portion or hash of the Router-Hardware-Fingerprint. OSPFv3 routers SHOULD maintain the last successfully chosen Router ID in nonvolatile storage.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
