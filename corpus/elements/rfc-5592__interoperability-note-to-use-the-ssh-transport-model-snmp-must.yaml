document: rfc-5592
kind: interoperability-note
summary: To use the SSH Transport Model, SNMP MUST be paired with a Security Model that knows how to process a tmStateReference, such as the Transport Security Model (TSM) for SNMP defined in RFC 5591. The SSH Transport Model alone does not provide sufficient integration with SNMP without a compatible Security Model.
section: "8"
topics:
    - snmp
    - security
