document: rfc-6505
kind: normative-requirement
summary: 'The MS MUST respond to every request message with a response message. If the MS cannot process a request and execute the mixer operation in whole, the operation is considered failed: the MS MUST ensure no part of the mixer operation is carried out and MUST indicate the failure class with an appropriate 4xx status code.'
section: "4.2"
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
