document: rfc-9341
kind: protocol-element
summary: A Block Number (BN) MAY be used for data correlation. When used, the BN MUST be assigned to each measurement block and associated with every packet count and timestamp reported, so that a correlator can match upstream and downstream samples to the same block.
section: "4.3"
topics:
    - measurement
