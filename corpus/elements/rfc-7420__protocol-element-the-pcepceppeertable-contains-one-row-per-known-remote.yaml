document: rfc-7420
kind: protocol-element
summary: The pcePcepPeerTable contains one row per known remote PCEP speaker, indexed by pcePcepEntityIndex + InetAddressType + InetAddress. It aggregates statistics (message counts, response times, session setup successes/failures) across all sessions to that peer and persists entries even when no active session exists.
