document: rfc-9052
kind: security-consideration
summary: After signature or MAC verification, the application MUST perform additional checks to ensure the key is correctly paired with the signing identity and that the signing identity is authorized before performing actions. COSE cryptographic verification alone does not constitute authorization.
section: "4.4"
topics:
    - security
    - crypto
