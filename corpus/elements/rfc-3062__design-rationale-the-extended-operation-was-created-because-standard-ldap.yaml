document: rfc-3062
kind: design-rationale
summary: The extended operation was created because standard LDAP update operations (e.g., Modify) act on directory entry attributes and cannot modify passwords when the user has no directory entry, is not represented by a DN, or when passwords are stored outside the directory (e.g., by a SASL service provider such as DIGEST-MD5).
section: "1"
topics:
    - ldap
    - security
