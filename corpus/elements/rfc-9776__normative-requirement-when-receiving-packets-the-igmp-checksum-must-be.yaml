document: rfc-9776
kind: normative-requirement
summary: When receiving packets, the IGMP Checksum MUST be verified before processing. The checksum is the 16-bit one's complement sum of the entire IP payload, with the Checksum field set to zero during computation.
section: 4.1.2
rfc2119_level: MUST
topics:
    - multicast
