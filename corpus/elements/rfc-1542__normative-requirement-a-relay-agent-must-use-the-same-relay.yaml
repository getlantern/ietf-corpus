document: rfc-1542
kind: normative-requirement
summary: A relay agent MUST use the same relay destination (or set of destinations) for all BOOTREQUEST messages from a given client. Round-robin load balancing across servers is prohibited because it breaks DHCP's multi-exchange protocol flow.
section: 4.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
