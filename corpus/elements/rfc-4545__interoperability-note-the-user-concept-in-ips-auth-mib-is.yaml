document: rfc-4545
kind: interoperability-note
summary: 'The ''user'' concept in IPS-AUTH-MIB is distinct from an SNMPv3 USM user: an IPS-AUTH identity supports multiple names, addresses, and credentials combined with AND/OR logic, whereas a USM user has exactly one username, one auth protocol, and one privacy protocol. The two coexist on the same system without conflict.'
section: "5"
topics:
