document: rfc-8182
kind: normative-requirement
summary: Repository Servers SHOULD retain old Snapshot Files for at least 5 minutes after a new Update Notification File is published, and SHOULD retain old Delta Files for at least 5 minutes after they are no longer referenced, to avoid race conditions where a Relying Party fetches a stale notification just before it is updated.
section: 3.5.2.2
rfc2119_level: SHOULD
topics:
    - routing
