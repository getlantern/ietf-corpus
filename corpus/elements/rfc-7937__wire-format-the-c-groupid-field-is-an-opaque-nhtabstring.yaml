summary: The c-groupid field is an opaque NHTABSTRING derived from the client IPv4 or IPv6 address; it MAY be structured (e.g., 'US/TN/MEM/38138'). The cs(header) and sc(header) fields use QSTRING encoding with percent-encoding for embedded DQUOTEs.
