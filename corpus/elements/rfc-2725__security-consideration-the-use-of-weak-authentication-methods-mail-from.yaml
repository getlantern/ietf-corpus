document: rfc-2725
kind: security-consideration
summary: The use of weak authentication methods (mail-from, crypt-pw) is discouraged because mail forgery is easy and crypt-pw passwords are transmitted in cleartext and are subject to guessing attacks via the exposed encrypted form. Strong cryptographic authentication (pgpkey) is preferred.
