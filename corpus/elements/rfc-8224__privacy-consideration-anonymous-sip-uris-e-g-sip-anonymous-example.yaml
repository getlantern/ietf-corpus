document: rfc-8224
kind: privacy-consideration
summary: Anonymous SIP URIs (e.g., sip:anonymous@example.com) are fully compatible with the Identity mechanism; authentication services can sign them to assert 'authenticated but anonymous' identity. However, the domain 'anonymous.invalid' cannot be used by authentication services because no credential authority can exist for that domain.
section: "11"
topics:
    - sip
    - privacy
