document: rfc-6388
kind: normative-requirement
summary: If an LSR receives a Label Mapping with an MBB parameter from downstream LSR-D but its upstream LSR-U has not advertised MBB capability, the LSR MUST immediately send an MBB notification to LSR-D. The result is a normal MP LSP, not an MBB MP LSP.
section: "8.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
