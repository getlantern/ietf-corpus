document: rfc-9132
kind: protocol-element
summary: 'The DOTS Happy Eyeballs procedure attempts connections in preference order: UDP over IPv6, UDP over IPv4, TCP over IPv6, TCP over IPv4. The DOTS client caches connection outcomes for roughly 10 minutes. If only TLS over TCP succeeds, the client SHOULD NOT probe for DTLS availability more than once every 24 hours and MUST NOT probe more often than every 5 minutes.'
section: "4.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
