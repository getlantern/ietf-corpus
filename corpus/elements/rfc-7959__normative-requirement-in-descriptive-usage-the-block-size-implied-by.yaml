document: rfc-7959
kind: normative-requirement
summary: In descriptive usage, the block size implied by SZX MUST match the size of the payload in bytes when the M bit is set. If the server returns a smaller block size than the client requested, the client MUST use the smaller size in subsequent requests.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
