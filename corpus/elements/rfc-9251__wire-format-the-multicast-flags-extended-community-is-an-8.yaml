document: rfc-9251
kind: wire-format
summary: The Multicast Flags Extended Community is an 8-octet EVPN Extended Community (Type 0x06, Sub-Type 0x09) with a 2-octet Flags field where bit 15 (I) = IGMP Proxy Support and bit 14 (M) = MLD Proxy Support; bits 0-13 are reserved. The remaining 4 octets are Reserved and set to 0.
section: "9.4"
topics:
    - multicast
    - routing
