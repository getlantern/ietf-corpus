document: rfc-6119
kind: design-rationale
summary: The IPv6 Global Interface Address TLV (type 233) in IIH PDUs was introduced because the existing IPv6 Interface Address TLV only carries link-local addresses in IIH PDUs, and globally unique IPv6 addresses are needed for constructing the IPv6 Neighbor Address sub-TLV.
section: 3.2.3
topics:
