document: rfc-8681
kind: security-consideration
summary: Numerical overflows in parameter derivation formulae (e.g., Appendix C.1) and malicious corruption of RTP timestamp fields used in parameter derivation may cause hazardous behavior. It is RECOMMENDED to check that all computed parameter values remain within reasonable bounds.
section: "7.5"
topics:
