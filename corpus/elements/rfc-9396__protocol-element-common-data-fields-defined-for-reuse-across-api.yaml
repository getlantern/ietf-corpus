document: rfc-9396
kind: protocol-element
summary: 'Common data fields defined for reuse across API types are: `locations` (array of URI strings identifying the RS), `actions` (array of action strings), `datatypes` (array of data-type strings), `identifier` (single resource identifier string), and `privileges` (array of privilege-level strings). When combined in one object, the resulting permissions are the product of all values.'
section: "2.2"
