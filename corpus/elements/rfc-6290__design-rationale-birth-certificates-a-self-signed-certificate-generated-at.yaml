document: rfc-6290
kind: design-rationale
summary: Birth Certificates (a self-signed certificate generated at reboot time) were rejected in favor of QCD tokens because they require the token taker to store a public key certificate and perform expensive asymmetric key verification; the symmetric-key hash approach is lighter weight and simpler.
section: A.3
topics:
