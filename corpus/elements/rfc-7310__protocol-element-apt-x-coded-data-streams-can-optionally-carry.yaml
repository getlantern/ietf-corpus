document: rfc-7310
kind: protocol-element
summary: apt-X coded data streams can optionally carry synchronization information and an auxiliary data channel within the coded audio data without additional overhead. The auxiliary data bit rate is 1/4 of the sample frequency (e.g., 12 kbit/s at Fs=48 kHz). Out-of-band signaling is required to notify the receiver when autosync and auxiliary data are embedded.
section: "3"
topics:
