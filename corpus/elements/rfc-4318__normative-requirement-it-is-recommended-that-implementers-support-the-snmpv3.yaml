document: rfc-4318
kind: normative-requirement
summary: It is RECOMMENDED that implementers support the SNMPv3 framework including full cryptographic mechanisms for authentication and privacy. Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; SNMPv3 with cryptographic security SHOULD be deployed instead.
section: "8"
rfc2119_level: RECOMMENDED
topics:
