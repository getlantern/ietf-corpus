document: rfc-8251
kind: security-consideration
summary: The SILK resampler buffer used the wrong element size (opus_int32 instead of opus_int16) in memcpy calls, and the buffer was undersized. While the overlap was unlikely to be exploitable in practice, the undefined behavior was a potential security risk.
