document: rfc-8114
kind: protocol-element
summary: Two static and dynamic PIM triggering modes are defined. In Static Mode, the mAFTR is pre-configured with permanent (S6,G6) and (*,G6) TIB6 entries. In Dynamic Mode, (S6,G6) or (*,G6) entries are instantiated or withdrawn upon receipt of PIMv6 messages.
section: "8.4"
topics:
