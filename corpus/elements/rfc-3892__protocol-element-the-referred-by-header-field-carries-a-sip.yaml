document: rfc-3892
kind: protocol-element
summary: The Referred-By header field carries a SIP URI representing the identity of the referrer and optionally the Content-ID (cid parameter) of a body part containing the Referred-By token. It can appear in any SIP request but is meaningless for ACK and CANCEL.
