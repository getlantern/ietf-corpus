document: rfc-8505
kind: security-consideration
summary: The LLN MAC layer MUST provide secure unicast to/from a Routing Registrar and secure broadcast/multicast from the Routing Registrar to prevent tampering with or replaying ND messages. RFC 6775 relies on lower-layer encryption; this specification inherits and extends that requirement.
section: "7"
topics:
    - security
    - ip
    - v6ops
