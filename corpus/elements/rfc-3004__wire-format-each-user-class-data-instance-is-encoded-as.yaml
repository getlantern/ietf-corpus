document: rfc-3004
kind: wire-format
summary: 'Each User Class Data instance is encoded as UC_Len_i (1 octet length) followed by UC_Len_i octets of opaque User_Class_Data_i. The total option Len equals the sum of all UC_Len_i values plus m (the number of User Classes): Len = UC_Len_1 + UC_Len_2 + ... + UC_Len_m + m.'
section: "4"
