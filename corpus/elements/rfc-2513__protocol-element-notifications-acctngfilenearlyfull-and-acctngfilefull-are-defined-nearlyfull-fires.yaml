document: rfc-2513
kind: protocol-element
summary: Notifications acctngFileNearlyFull and acctngFileFull are defined. NearlyFull fires on transition to exceeding acctngControlTrapThreshold percent of max size; Full fires on transition to max size and, if acctngAgentMode is swapOnCommand, fires periodically until collection resumes.
