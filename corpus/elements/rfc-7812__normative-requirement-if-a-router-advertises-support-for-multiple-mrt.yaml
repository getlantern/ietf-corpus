document: rfc-7812
kind: normative-requirement
summary: If a router advertises support for multiple MRT profiles, it MUST create the transit forwarding topologies for each of those profiles, unless the profile specifies None for the MRT Forwarding Mechanism.
section: "8.1"
rfc2119_level: MUST
topics:
    - routing
