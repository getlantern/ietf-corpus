document: rfc-6715
kind: protocol-element
summary: The HOBBY property specifies hobbies of the vCard subject. It accepts a single text value, supports cardinality *, and takes optional LEVEL (high/medium/low) and INDEX parameters. A hobby is an activity one actively engages in, as distinct from an INTEREST.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
