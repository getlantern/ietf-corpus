document: rfc-8490
kind: normative-requirement
summary: A DSO Retry Delay message MUST NOT be initiated by a client. If a server receives a DSO Retry Delay message from a client, this is a fatal error and the server MUST forcibly abort the connection immediately.
section: 6.6.1
rfc2119_level: MUST NOT
topics:
    - dns
