document: rfc-1903
kind: protocol-element
summary: 'RowStatus manages the creation and deletion of conceptual rows via six values: active(1), notInService(2), notReady(3) [states; readable], and createAndGo(4), createAndWait(5), destroy(6) [actions; writable only]. Only three values—active, notInService, notReady—are returned in GET responses.'
