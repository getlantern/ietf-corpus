document: rfc-2493
kind: protocol-element
summary: xyzValidIntervals is a read-only INTEGER (0..n, where 1 ≤ n ≤ 96) indicating the number of previous near-end intervals for which data was collected. In proxy situations, this reflects the maximum interval number for which data is available, not necessarily all intervals up to n.
