document: rfc-4208
kind: normative-requirement
summary: When GMPLS is used for the core network, it is RECOMMENDED that VPN connections use the procedure based on MPLS-HIER (RFC 4206), where the core connection is signaled first and then referenced via an IF_ID RSVP_HOP object when forwarding the original Path message within the VPN addressing realm.
section: "7"
rfc2119_level: RECOMMENDED
topics:
