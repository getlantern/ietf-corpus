document: rfc-4669
kind: design-rationale
summary: The term 'malformed' for RADIUS packets is not explicitly defined in RFC 2865 but in practice means the implementation determined the packet does not match the RFC 2865 format. Some implementations also treat VSAs that do not follow RFC 2865 recommendations as malformed; these de facto definitions are reflected in the MIB counter descriptions.
section: "2"
topics:
