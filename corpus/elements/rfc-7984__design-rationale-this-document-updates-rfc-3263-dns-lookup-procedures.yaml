document: rfc-7984
kind: design-rationale
summary: This document updates RFC 3263 DNS lookup procedures in preparation for forthcoming Happy Eyeballs specifications for SIP, because looking up only 'A or AAAA records' (not both) adds significant connection delay for dual-stack clients and degrades user experience.
section: "1"
topics:
