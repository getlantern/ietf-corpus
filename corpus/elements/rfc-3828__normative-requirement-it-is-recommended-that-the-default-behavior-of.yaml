document: rfc-3828
kind: normative-requirement
summary: It is RECOMMENDED that the default behavior of UDP-Lite mimic UDP by setting Checksum Coverage to match the full packet length. Applications wanting partial coverage must explicitly request it via a system call on both sender and receiver sides.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
