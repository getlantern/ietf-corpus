document: rfc-7159
kind: interoperability-note
summary: Numbers that are integers in the range [-(2**53)+1, (2**53)-1] are interoperable across implementations using IEEE 754-2008 binary64 (double precision). Numbers outside this range or with extreme precision (e.g., 1E400) may cause interoperability problems.
