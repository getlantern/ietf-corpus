document: rfc-5677
kind: security-consideration
summary: For MoS discovery via DNS, fake DNS requests and responses may cause denial of service or force the MN to perform incorrect handovers. DNSSEC (RFC 4033) is recommended as a mitigation. For DHCP-based discovery, absent authentication bindings between link layer and DHCP layer, DHCP source and message integrity cannot be verified.
section: "8.1"
topics:
    - mobility
    - dns
    - security
