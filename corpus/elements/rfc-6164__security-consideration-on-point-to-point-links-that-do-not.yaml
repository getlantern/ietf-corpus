document: rfc-6164
kind: security-consideration
summary: 'On point-to-point links that do not use Neighbor Discovery (e.g., SONET links), assigning a prefix shorter than /127 creates a ping-pong forwarding loop attack vector: packets addressed to unused addresses in the subnet bounce between the two routers indefinitely.'
section: "5.1"
