document: rfc-2665
kind: interoperability-note
summary: Collision-related counters (dot3StatsSingleCollisionFrames, dot3StatsMultipleCollisionFrames, dot3StatsLateCollisions, dot3StatsExcessiveCollisions, dot3StatsDeferredTransmissions, dot3StatsSQETestErrors, dot3StatsCarrierSenseErrors) do not increment when the interface is operating in full-duplex mode, as collisions do not occur in full-duplex operation.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
