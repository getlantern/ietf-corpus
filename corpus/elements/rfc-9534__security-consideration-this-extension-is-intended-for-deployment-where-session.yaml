document: rfc-9534
kind: security-consideration
summary: This extension is intended for deployment where Session-Sender and Session-Reflector are directly connected over a LAG. It is assumed that a node has previously verified the integrity of the LAG connection and the identity of its one-hop peer. No additional security issues are introduced beyond those in RFC 8762 and RFC 8972.
section: "6"
topics:
    - security
    - measurement
