document: rfc-4712
kind: wire-format
summary: Packet Loss in Fraction and Packet Discard in Fraction are each 8 bits expressed as a fixed-point number with the binary point at the left edge (i.e., the integer part of the fraction multiplied by 256, capped at 255). All integer fields use network byte order (big-endian); all header data is aligned to its natural length.
