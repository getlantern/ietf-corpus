document: rfc-3544
kind: interoperability-note
summary: IPHC methods for handling packet reordering are disabled by default over PPP because PPP does not reorder packets. When using reordering mechanisms such as multiclass multilink PPP (RFC 2686), care must be taken so that packets sharing the same compression context are not reordered.
