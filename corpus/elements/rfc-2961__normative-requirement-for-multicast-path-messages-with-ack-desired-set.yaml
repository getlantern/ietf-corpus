document: rfc-2961
kind: normative-requirement
summary: For multicast Path messages with ACK_Desired set, receivers MUST wait a random interval before acknowledging to prevent ACK implosion. The random interval SHOULD be between zero and a configured maximum proportional to the refresh and rapid retransmission intervals.
section: "4.7"
rfc2119_level: MUST
topics:
    - qos
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
