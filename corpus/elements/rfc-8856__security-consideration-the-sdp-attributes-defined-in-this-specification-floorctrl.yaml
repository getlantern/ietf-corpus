document: rfc-8856
kind: security-consideration
summary: The SDP attributes defined in this specification (floorctrl, confid, userid, floorid, bfcpver) do not reveal content of individual BFCP-controlled media streams, but they do reveal which media streams will be BFCP-controlled, which may be sensitive information.
