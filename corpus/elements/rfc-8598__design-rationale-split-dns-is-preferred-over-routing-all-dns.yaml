document: rfc-8598
kind: design-rationale
summary: Split DNS is preferred over routing all DNS through the enterprise VPN because it keeps non-enterprise user DNS activity private from the enterprise and removes the enterprise's legal and technical responsibility to resolve every possible DNS query from remote users.
section: "2"
topics:
