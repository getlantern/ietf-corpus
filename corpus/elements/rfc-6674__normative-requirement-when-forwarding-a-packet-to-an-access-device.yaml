document: rfc-6674
kind: normative-requirement
summary: When forwarding a packet to an access device, the AFTR SHOULD obtain the CID from the NAT binding associated with that flow and use it in the softwire encapsulation (e.g., add it to the GRE Key extension) before tunneling the packet to the access gateway.
section: "4"
rfc2119_level: SHOULD
topics:
    - nat
    - v6ops
    - ip
