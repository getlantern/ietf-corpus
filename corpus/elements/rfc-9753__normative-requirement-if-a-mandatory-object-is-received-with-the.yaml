document: rfc-9753
kind: normative-requirement
summary: If a mandatory object is received with the P flag set incorrectly in a PCUpd or PCInitiate message, the receiving peer MUST send a PCErr message with Error-Type=10 and Error-value=1. On a session where both peers set the R bit, the PCE SHOULD set the P flag by default unless local configuration/policy indicates otherwise.
section: 3.2.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
