document: rfc-6290
kind: normative-requirement
summary: After rekeying an IKE SA, the initiator SHOULD send a new QCD_TOKEN in a separate INFORMATIONAL exchange immediately after the CREATE_CHILD_SA exchange if the initiator is a token maker. The responder may include the new token in the CREATE_CHILD_SA response.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
