document: rfc-9354
kind: normative-requirement
summary: For address registration in route-over mode, a PLC device MUST register its addresses by sending a unicast link-local NS to the 6LR. Non-link-local addresses MUST be registered via ARO or EARO in DAR or EDAR messages.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
