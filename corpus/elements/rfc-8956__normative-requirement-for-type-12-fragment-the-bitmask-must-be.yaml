document: rfc-8956
kind: normative-requirement
summary: For Type 12 (Fragment), the bitmask MUST be encoded as a single octet (bitmask_op len=00). Reserved bitmask bits (0, 1, 2, 7) MUST be set to 0 on NLRI encoding and MUST be ignored during decoding.
section: "3.6"
rfc2119_level: MUST
