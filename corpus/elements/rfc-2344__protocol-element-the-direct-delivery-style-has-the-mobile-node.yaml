document: rfc-2344
kind: protocol-element
summary: The Direct Delivery Style has the mobile node send unencapsulated packets addressed to the correspondent host directly to the foreign agent (which is set as default router). The foreign agent intercepts them and encapsulates them into a tunnel from its care-of address to the home agent. This style does not support selective reverse tunneling or broadcast/multicast.
section: "5.1"
topics:
    - mobility
    - ip
