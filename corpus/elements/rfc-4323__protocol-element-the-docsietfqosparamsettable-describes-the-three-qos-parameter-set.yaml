kind: protocol-element
summary: The docsIetfQosParamSetTable describes the three QoS Parameter Set types (active, admitted, provisioned) for each Service Flow, indexed by {ifIndex, docsIetfQosServiceFlowId, docsIetfQosParamSetType}. It is read-only and carries scheduling type, max/min traffic rates, burst sizes, latency, polling intervals, grant parameters, and TOS masks.
