document: rfc-7961
kind: protocol-element
summary: The Flags byte contains the D (Directory) flag and L (Local) flag. D=1 indicates directory information; L=1 indicates locally learned information by observing ingressed frames. Both can be set simultaneously. Reserved bits MUST be sent as zero and ignored on receipt.
