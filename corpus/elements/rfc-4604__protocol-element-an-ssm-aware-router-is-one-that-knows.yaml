document: rfc-4604
kind: protocol-element
summary: An 'SSM-aware' router is one that knows the SSM address range and is capable of applying SSM semantics as described in this document. An SSM-aware router MAY support configuring SSM semantics for addresses outside the IANA-allocated range, but MUST default to the IANA-allocated range.
section: "3"
topics:
    - multicast
