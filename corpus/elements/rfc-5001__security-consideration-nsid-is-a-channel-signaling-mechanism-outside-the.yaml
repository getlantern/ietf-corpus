document: rfc-5001
kind: security-consideration
summary: NSID is a channel signaling mechanism outside the scope of DNSSEC. Applications requiring integrity protection for NSID data must use a channel security mechanism such as TSIG. Some NSID payload types (e.g., unicast addresses) are security-sensitive in anycast deployments and operators must choose payloads carefully.
section: "5"
topics:
    - dns
    - security
