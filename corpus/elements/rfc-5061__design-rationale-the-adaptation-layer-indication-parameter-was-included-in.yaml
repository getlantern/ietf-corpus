document: rfc-5061
kind: design-rationale
summary: The Adaptation Layer Indication parameter was included in this document (rather than a separate RFC) purely for convenience to minimize the number of SCTP extension documents. It carries a 32-bit opaque code point for upper-layer protocols such as adaptation layers that need to signal their presence during association setup.
section: 4.2.6
topics:
