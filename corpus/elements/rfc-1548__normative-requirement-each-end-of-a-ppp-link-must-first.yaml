document: rfc-1548
kind: normative-requirement
summary: Each end of a PPP link MUST first send LCP packets to configure and test the data link before any other traffic. After LCP Opened, PPP MUST send NCP packets to configure each desired network-layer protocol before that protocol's datagrams may be sent.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
