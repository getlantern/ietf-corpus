document: rfc-1531
kind: protocol-element
summary: 'DHCP defines seven message types: DHCPDISCOVER (client broadcast to locate servers), DHCPOFFER (server offer of parameters), DHCPREQUEST (client selection or renewal), DHCPACK (server confirmation with committed address), DHCPNAK (server refusal), DHCPDECLINE (client reports address conflict), and DHCPRELEASE (client relinquishes lease).'
