document: rfc-2725
kind: normative-requirement
summary: An auth-override attribute can only be added to a maintainer if that maintainer has been inactive for the prior 60 days, and the override date specified must be at least 60 days from the current date unless there is already authorization to modify the maintainer.
section: "10.1"
rfc2119_level: MUST
topics:
    - routing
    - registry
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
