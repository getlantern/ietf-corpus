document: rfc-9803
kind: security-consideration
summary: Short TTLs on delegation records enhance the effectiveness of fast flux DNS techniques, where malicious actors rapidly change DNS configuration to evade takedown. Server operators should set a lower TTL limit that accounts for this risk, and client implementations should consider controls to deter abusive behavior as outlined in ICANN SAC-025.
section: "6.1"
topics:
    - security
    - dns
