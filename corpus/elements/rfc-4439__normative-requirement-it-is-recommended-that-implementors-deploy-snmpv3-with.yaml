document: rfc-4439
kind: normative-requirement
summary: It is RECOMMENDED that implementors deploy SNMPv3 with full cryptographic mechanisms (authentication and privacy). Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; access to MIB objects should be restricted to principals with legitimate rights.
section: "11"
rfc2119_level: RECOMMENDED
topics:
