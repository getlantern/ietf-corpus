document: rfc-2019
kind: wire-format
summary: The Source/Target Link-layer Address option for FDDI carries Type (1 or 2), Length (1, in units of 8 octets), and the 48-bit FDDI IEEE 802 address in canonical bit order. The address reflects the currently active address, which may differ from the built-in address token.
