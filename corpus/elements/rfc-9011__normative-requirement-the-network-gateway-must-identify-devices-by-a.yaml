document: rfc-9011
kind: normative-requirement
summary: The Network Gateway MUST identify devices by a unique 64-bit DevEUI when communicating with the SCHC gateway. The 32-bit DevAddr used over the air is translated to DevEUI at the Network Gateway.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
