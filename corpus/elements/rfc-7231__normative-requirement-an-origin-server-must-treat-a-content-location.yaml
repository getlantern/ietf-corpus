document: rfc-7231
kind: normative-requirement
summary: An origin server MUST treat a Content-Location field received in a request as transitory request context rather than metadata to be saved verbatim. An origin server MUST NOT use such context information to alter the request semantics.
section: 3.1.4.2
rfc2119_level: MUST NOT
topics:
    - http
