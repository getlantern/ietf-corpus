document: rfc-4842
kind: protocol-element
summary: 'CEP defines three Near-End performance monitors: ES-CEP (Errored Seconds, containing at least one missing/dropped packet), SES-CEP (Severely Errored Seconds, containing buffer underrun/overrun, LOPS, or excessive missing packets), and UAS-CEP (Unavailable Seconds, declared after a configurable number of consecutive SES-CEP, default 10, and cleared after 10 consecutive seconds without SES-CEP).'
section: "10"
topics:
