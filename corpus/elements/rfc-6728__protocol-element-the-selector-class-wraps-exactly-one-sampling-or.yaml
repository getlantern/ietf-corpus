document: rfc-6728
kind: protocol-element
summary: 'The Selector class wraps exactly one sampling or filtering method—SelectAll, SampCountBased, SampTimeBased, SampRandOutOfN, SampUniProb, FilterMatch, or FilterHash—and exposes read-only aggregate statistics: packetsObserved, packetsDropped, and selectorDiscontinuityTime (absolute timestamp, not relative to sysUpTime).'
