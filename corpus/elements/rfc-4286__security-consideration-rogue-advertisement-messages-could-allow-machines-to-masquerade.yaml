document: rfc-4286
kind: security-consideration
summary: Rogue Advertisement messages could allow machines to masquerade as multicast routers, enabling eavesdropping or denial of service. Mitigations include SEND-based link-local addresses for IPv6 (allowing switch-based router authentication challenges) and IPsec ESP mode for both IPv4 and IPv6 using a manually configured symmetric key with HMAC-SHA-1.
section: "7"
topics:
    - multicast
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
