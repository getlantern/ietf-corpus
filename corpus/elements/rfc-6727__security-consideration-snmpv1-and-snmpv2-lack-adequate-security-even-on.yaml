document: rfc-6727
kind: security-consideration
summary: SNMPv1 and SNMPv2 lack adequate security even on IPsec-protected networks because they provide no per-principal access control. SNMPv3 with full cryptographic support is RECOMMENDED to restrict access to authorized principals only.
section: "7"
topics:
