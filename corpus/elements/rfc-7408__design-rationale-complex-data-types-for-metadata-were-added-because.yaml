document: rfc-7408
kind: design-rationale
summary: Complex data types for metadata were added because real-world use cases (such as OpenFlow Action Set metadata and controller-supplied action lists) require arrays and structs as metadata, not just atomic types. RFC 5812 limited metadata to atomic types only.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
