summary: 'NNI inter-AS connectivity is modeled with three option flavors: Option A (back-to-back VRF attachment), Option B (ASBR-to-ASBR with RT redistribution), and Option C (multihop MP-EBGP). The site-vpn-flavor-nni value identifies a site as an NNI interconnect point between administrative domains.'
