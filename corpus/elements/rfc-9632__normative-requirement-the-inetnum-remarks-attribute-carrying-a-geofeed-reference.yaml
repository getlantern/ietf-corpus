document: rfc-9632
kind: normative-requirement
summary: 'The inetnum: remarks: attribute carrying a geofeed reference MUST use the format ''remarks: Geofeed <URL>'', where the token ''Geofeed '' is case-sensitive and the URL MUST refer only to a single geofeed file.'
section: "3"
rfc2119_level: MUST
