document: rfc-9514
kind: normative-requirement
summary: The SRv6 BGP PeerNode SID TLV MUST be included alongside SRv6 SIDs associated with BGP PeerNode or PeerSet functionality. Reserved bits in its Flags field MUST be set to 0 when originated and ignored on receipt.
section: "7.2"
rfc2119_level: MUST
topics:
