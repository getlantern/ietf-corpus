document: rfc-2578
kind: normative-requirement
summary: An OBJECT IDENTIFIER value may have at most 128 sub-identifiers, and each sub-identifier must not exceed 2^32-1 (4294967295 decimal). All OBJECT IDENTIFIER values must have at least two sub-identifiers.
section: "3.5"
rfc2119_level: MUST
topics:
