document: rfc-4032
kind: protocol-element
summary: 'The updated transaction/local status table (replacing Table 3 of RFC 3312) governs answerer behavior: if both transac and local status are ''no'', new values are no/no; if both are ''yes'', new values are yes/yes; mixed cases depend on local information. Answerers may now downgrade current status values, which RFC 3312 previously disallowed.'
section: "4.1"
topics:
