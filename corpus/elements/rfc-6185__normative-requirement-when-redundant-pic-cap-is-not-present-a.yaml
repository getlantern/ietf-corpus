document: rfc-6185
kind: normative-requirement
summary: When redundant-pic-cap is not present, a value of 0 MUST be used. When present, the value MUST be either 0 or 1. When the indicated profile disallows redundant coded pictures, redundant-pic-cap MUST be 0.
section: "6.1"
rfc2119_level: MUST
