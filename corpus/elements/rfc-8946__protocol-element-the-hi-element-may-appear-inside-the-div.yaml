document: rfc-8946
kind: protocol-element
summary: The "hi" element may appear inside the "div" claim to correlate the PASSporT with a History-Info header field index parameter value (e.g., "1.2.1"). This optional field assists relying parties in matching PASSporTs to History-Info entries when not all retargeting events produce a "div" PASSporT.
