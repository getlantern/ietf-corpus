document: rfc-2091
kind: wire-format
summary: IP RIP Version 1 triggered packets (Commands 9, 10, 11) insert the 4-octet Update Header after the standard RIP Version 1 command/version header. Update Responses carry up to 25 routing entries of 20 octets each (Address Family, IP address, metric), all big-endian.
section: "5.2"
topics:
