document: rfc-5484
kind: protocol-element
summary: RTP header extensions (per RFC 5285) carry inline time-code associations when continuity is not guaranteed. The short form (3 bytes) maps a compact time-code to the packet's own RTP timestamp; the long form (12 bytes) carries a full SMPTE 12M time-code plus a signed 32-bit offset D, establishing an association for timestamp T+D.
section: "6.4"
topics:
    - rtp
    - realtime
