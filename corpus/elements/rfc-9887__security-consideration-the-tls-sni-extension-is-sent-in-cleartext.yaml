document: rfc-9887
kind: security-consideration
summary: The TLS SNI extension is sent in cleartext as part of the TLS client hello and is subject to eavesdropping. Operators must be aware of this exposure when designing deployments.
section: 5.1.5
topics:
    - tls
    - privacy
    - security
