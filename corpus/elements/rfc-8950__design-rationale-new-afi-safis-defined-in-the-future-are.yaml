document: rfc-8950
kind: design-rationale
summary: New AFI/SAFIs defined in the future are expected to include provisions for both IPv4 and IPv6 next hops from the outset (using Length of Next Hop Address field determination), making the Extended Next Hop Encoding capability unnecessary for them.
