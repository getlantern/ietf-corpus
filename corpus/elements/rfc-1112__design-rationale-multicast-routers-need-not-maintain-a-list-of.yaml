document: rfc-1112
kind: design-rationale
summary: Multicast routers need not maintain a list of individual members of each host group — only that at least one host belongs to a group on a particular network. This design keeps router state proportional to the number of active groups, not the number of hosts.
section: Appendix II
topics:
    - multicast
    - ip
