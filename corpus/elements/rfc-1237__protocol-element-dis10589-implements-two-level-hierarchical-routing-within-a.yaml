document: rfc-1237
kind: protocol-element
summary: DIS10589 implements two-level hierarchical routing within a routing domain. Level 1 ISs know only the topology within their area and route to the ID field; Level 2 ISs know the level 2 backbone topology and route to address prefixes using longest-match, preferring internal routes over external routes.
section: "3.2"
topics:
    - routing
