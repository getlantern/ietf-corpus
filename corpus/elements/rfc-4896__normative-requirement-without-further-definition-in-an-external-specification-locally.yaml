document: rfc-4896
kind: normative-requirement
summary: Without further definition in an external specification, locally available state items SHOULD NOT be used. Any definition of locally available state item use MUST NOT conflict with other uses. If mapped to a compartment, such state items MUST have retention priority 65535.
