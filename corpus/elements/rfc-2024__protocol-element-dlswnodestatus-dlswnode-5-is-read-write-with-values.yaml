document: rfc-2024
kind: protocol-element
summary: dlswNodeStatus (dlswNode 5) is read-write with values active(1) and inactive(2). Setting to inactive disconnects all circuits, all transport connections, all local DLC connections, and stops processing DLC connection setup traffic. Setting to active restores DLSw to its initial state.
section: "3.0"
topics:
