document: rfc-3984
kind: normative-requirement
summary: Implementations MUST follow the congestion control requirements for RTP as specified in applicable RTP profiles. Senders must reduce their transmission rate when congestion is detected to avoid contributing to network collapse.
section: "10"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
    - realtime
