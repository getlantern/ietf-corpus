document: rfc-4302
kind: protocol-element
summary: Extended Sequence Number (ESN) provides a 64-bit sequence number for high-speed implementations. Only the low-order 32 bits are transmitted in the AH Sequence Number field; the high-order 32 bits are maintained by sender and receiver and included in the ICV computation but not transmitted.
section: 2.5.1
topics:
    - ipsec
    - security
