document: rfc-4368
kind: design-rationale
summary: The label partition model restricts control and unlabeled VPI/VCI to single values each, which is more restrictive than RFC 3035 allows. This reflects widespread implementation practice and was deemed sufficiently flexible by the MPLS working group for operational needs.
