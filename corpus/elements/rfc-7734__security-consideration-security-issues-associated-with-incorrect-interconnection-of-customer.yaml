summary: Security issues associated with incorrect interconnection of customer LANs cannot be directly addressed by this document, as they require misconfiguration in the SPBM domains. Identifiers administered globally are relayed transparently by EVPN and only policed within the SPBM domains, requiring careful synchronization.
