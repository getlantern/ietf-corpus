document: rfc-9929
kind: normative-requirement
summary: Processing of received UPAs is optional and SHOULD be controlled by receiver configuration. Applications using UPA MUST NOT use the absence of a UPA to infer that prefix reachability has been restored; they must rely on their own mechanisms to verify reachability.
section: "5"
rfc2119_level: MUST NOT
topics:
    - routing
