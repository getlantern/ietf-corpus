document: rfc-4287
kind: normative-requirement
summary: atom:feed SHOULD contain one atom:link with rel='self' pointing to the preferred URI for the feed. It MUST NOT contain more than one atom:link with rel='alternate' having the same combination of type and hreflang values.
section: 4.1.1
rfc2119_level: SHOULD
