document: rfc-6680
kind: security-consideration
summary: '''Authenticated'' means only that a trusted third party (not the peer itself) asserted the attribute; it does not imply any semantic claim about the attribute''s accuracy is true. Additional semantics are always the result of applying local policy. For example, a ''mail'' attribute may be authenticated via signed SAML yet still be user-modifiable in some deployments.'
section: "9"
topics:
    - security
