document: rfc-5401
kind: normative-requirement
summary: Any building block components for NACK-oriented reliable multicast SHALL be capable of operating without intermediate system assistance. It is RECOMMENDED that protocols also consider utilizing intermediate system assistance features when available.
section: "2.7"
rfc2119_level: RECOMMENDED
topics:
    - multicast
