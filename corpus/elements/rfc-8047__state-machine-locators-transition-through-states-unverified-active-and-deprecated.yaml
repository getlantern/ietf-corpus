document: rfc-8047
kind: state-machine
summary: Locators transition through states UNVERIFIED, ACTIVE, and DEPRECATED. Newly learned addresses start UNVERIFIED; after address verification they become ACTIVE; addresses not listed in a received LOCATOR_SET are set to DEPRECATED; a DEPRECATED address reappears as UNVERIFIED when re-listed in a LOCATOR_SET.
section: "5.2"
topics:
