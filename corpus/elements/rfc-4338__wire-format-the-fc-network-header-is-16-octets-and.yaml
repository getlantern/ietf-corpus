summary: 'The FC Network_Header is 16 octets and contains two 8-octet fields: Destination N_Port_Name and Source N_Port_Name. N_Port_Name formats MUST be one of 0x1, 0x2, 0x5, 0xC, 0xD, 0xE, or 0xF.'
