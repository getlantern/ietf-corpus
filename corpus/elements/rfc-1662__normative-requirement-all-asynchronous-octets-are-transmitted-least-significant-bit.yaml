document: rfc-1662
kind: normative-requirement
summary: All asynchronous octets are transmitted least significant bit first, with one start bit, eight bits of data, and one stop bit. There is no provision for seven-bit asynchronous links.
section: 4.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
