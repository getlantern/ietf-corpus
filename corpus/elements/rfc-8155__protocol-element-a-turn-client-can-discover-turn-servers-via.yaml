document: rfc-8155
kind: protocol-element
summary: A TURN client can discover TURN servers via mDNS by multicasting PTR queries to '_turn._udp.local.', '_turn._tcp.local', '_turns._udp.local.', or '_turns._tcp.local'. TURN servers may also send gratuitous mDNS answers on startup, wake, or network change.
section: "5.1"
topics:
    - dns
    - nat
