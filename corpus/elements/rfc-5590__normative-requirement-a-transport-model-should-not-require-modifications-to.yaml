document: rfc-5590
kind: normative-requirement
summary: A Transport Model SHOULD NOT require modifications to the underlying transport protocol, as modifying the protocol might change its security characteristics in ways that could impact other existing usages. If a change is necessary, it SHOULD be an extension with no impact on existing usages.
section: 3.1.1
rfc2119_level: SHOULD NOT
topics:
    - snmp
    - security
