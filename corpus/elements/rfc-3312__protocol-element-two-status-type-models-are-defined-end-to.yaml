summary: 'Two status type models are defined: end-to-end (e2e), reflecting the reservation status across the entire path, and segmented (local/remote), reflecting per-access-network reservation status for each UA. The values ''send'', ''recv'', ''local'', and ''remote'' are from the perspective of the SDP-generating entity.'
