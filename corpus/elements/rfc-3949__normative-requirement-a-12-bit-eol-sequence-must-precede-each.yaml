document: rfc-3949
kind: normative-requirement
summary: A 12-bit EOL sequence MUST precede each line of MH-compressed data (Compression=3). EOLs MAY be byte-aligned (fill bits added before each EOL), controlled by T4Options bit 2.
section: "3.4"
rfc2119_level: MUST
