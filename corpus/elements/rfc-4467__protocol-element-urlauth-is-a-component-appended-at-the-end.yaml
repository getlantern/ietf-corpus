document: rfc-4467
kind: protocol-element
summary: URLAUTH is a component appended at the end of an IMAP URL that conveys authorization to access the addressed data. It contains an authorized access identifier, an authorization mechanism name, and an authorization token generated from the URL, the access identifier, the mechanism name, and a secret mailbox access key.
section: "2.1"
topics:
    - email
    - security
