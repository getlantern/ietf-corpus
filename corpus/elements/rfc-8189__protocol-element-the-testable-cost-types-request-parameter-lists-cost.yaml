document: rfc-8189
kind: protocol-element
summary: The 'testable-cost-types' request parameter lists cost types used only for constraint tests; if omitted, it defaults to the cost types in 'multi-cost-types' or 'cost-type'. This allows filtering by a metric without returning its values.
