document: rfc-7482
kind: protocol-element
summary: Autonomous System number lookup syntax is 'autnum/<autonomous system number>', where the AS number is in asplain format per RFC 5396. If a number falls within a registered block, the query targets the block; individual registrations are treated as blocks of size 1.
section: 3.1.2
topics:
    - routing
    - bgp
    - http
