document: rfc-1725
kind: protocol-element
summary: The USER command (AUTHORIZATION state) takes a mailbox name as its sole argument. If the server responds +OK, the client may issue PASS to complete authentication or QUIT to abort. A -ERR response allows the client to retry with a new authentication command.
