document: rfc-9213
kind: design-rationale
summary: 'The example ''CDN-Cache-Control: none'' (where ''none'' is not a registered directive) demonstrates a pattern for preventing all non-CDN caches from storing a response while still allowing CDN storage — using an unrecognized directive to avoid an empty header value that would be ignored.'
