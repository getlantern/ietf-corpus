document: rfc-6652
kind: protocol-element
summary: 'Four SPF result-based report request tokens are defined: ''all'' (all reports), ''e'' (TempError or PermError), ''f'' (Fail), ''s'' (SoftFail), and ''n'' (Neutral or None). These correspond to SPF evaluation outcomes defined in RFC 4408.'
