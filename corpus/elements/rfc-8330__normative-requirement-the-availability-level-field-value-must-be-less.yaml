document: rfc-8330
kind: normative-requirement
summary: The Availability level field value MUST be less than 1. It is a binary32-format floating-point number (IEEE 754-2008) transmitted in network byte order, typically expressed as 0.99, 0.999, 0.9999, or 0.99999.
section: "4.1"
rfc2119_level: MUST
topics:
