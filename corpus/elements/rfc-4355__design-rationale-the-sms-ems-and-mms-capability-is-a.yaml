document: rfc-4355
kind: design-rationale
summary: 'The SMS, EMS, and MMS capability is a nested superset: a resource advertising MMS support can also receive EMS and SMS content, and a resource advertising EMS support can also receive SMS content. Clients MAY therefore consider NAPTRs for higher-capability services when sending lower-capability content.'
section: "5.1"
topics:
    - dns
