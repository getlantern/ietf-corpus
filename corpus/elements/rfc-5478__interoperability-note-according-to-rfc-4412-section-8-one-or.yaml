document: rfc-5478
kind: interoperability-note
summary: According to RFC 4412 Section 8, one or more sets of namespaces can be treated as equivalent when configured as an aggregated grouping. These aggregates may consist of any IANA-registered namespaces, not just adjacent or consecutive ones.
