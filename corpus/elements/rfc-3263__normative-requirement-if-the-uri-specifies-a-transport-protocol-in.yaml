document: rfc-3263
kind: normative-requirement
summary: If the URI specifies a transport protocol in the transport parameter, that transport protocol SHOULD be used. If no transport is specified but TARGET is a numeric IP address, the client SHOULD use UDP for a SIP URI and TCP for a SIPS URI.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
