document: rfc-5810
kind: security-consideration
summary: PL messages may carry sensitive data including network configuration, encryption keys, and routing state. The TML SHOULD provide confidentiality via TLS or IPsec. A 'no security' deployment option (Section 9.1) is described but is appropriate only in physically secured environments.
section: "9"
topics:
    - routing
    - security
    - tls
    - ipsec
