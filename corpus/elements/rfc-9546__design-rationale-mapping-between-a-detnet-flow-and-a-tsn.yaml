document: rfc-9546
kind: design-rationale
summary: Mapping between a DetNet flow and a TSN Stream is performed only on the edge node of the TSN sub-network; intermediate TSN nodes do not need to recognize the S-Label. This design, using passive and active stream identification functions at the edge, simplifies intermediate node forwarding by keeping identification within the Ethernet header.
section: "4.1"
topics:
