document: rfc-1989
kind: design-rationale
summary: InGoodOctets is defined separately from the SNMP MIB ifInOctets because ifInOctets includes octets for discarded and errored frames, which would skew loss calculations; InGoodOctets counts only octets from successfully received frames.
