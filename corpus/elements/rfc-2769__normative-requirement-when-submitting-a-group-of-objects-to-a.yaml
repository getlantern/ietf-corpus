document: rfc-2769
kind: normative-requirement
summary: When submitting a group of objects to a repository, a user MUST append exactly one 'timestamp' and one or more 'signature' meta-objects, in that order. A repository must reject a transaction that does not include any 'signature' meta-object.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
