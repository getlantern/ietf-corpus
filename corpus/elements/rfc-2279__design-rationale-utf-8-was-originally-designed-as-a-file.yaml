document: rfc-2279
kind: design-rationale
summary: 'UTF-8 was originally designed as a File System Safe UCS Transformation Format (FSS-UTF) for UNIX compatibility. Key design properties include: lexicographic sort order preservation for UCS-4 strings; Boyer-Moore search algorithm compatibility; and reliable auto-detection since the probability of a non-UTF-8 byte string appearing as valid UTF-8 decreases rapidly with string length.'
section: "1"
