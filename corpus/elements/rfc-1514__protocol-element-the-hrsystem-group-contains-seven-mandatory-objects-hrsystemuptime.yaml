document: rfc-1514
kind: protocol-element
summary: 'The hrSystem group contains seven mandatory objects: hrSystemUptime (TimeTicks since host initialization), hrSystemDate (local date/time, read-write), hrSystemInitialLoadDevice (boot device index), hrSystemInitialLoadParameters (boot parameters), hrSystemNumUsers (active user sessions), hrSystemProcesses (process count), and hrSystemMaxProcesses (maximum process limit).'
