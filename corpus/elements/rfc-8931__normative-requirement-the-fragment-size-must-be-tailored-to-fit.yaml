document: rfc-8931
kind: normative-requirement
summary: The Fragment_Size MUST be tailored to fit the minimal MTU along the path; refragmentation is not allowed since fragments are recovered end-to-end based on sequence number. The first fragment MUST have enough slack to accommodate less-efficient compression at next hops within the Link MTU.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
