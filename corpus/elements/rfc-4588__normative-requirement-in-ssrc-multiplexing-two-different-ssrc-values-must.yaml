document: rfc-4588
kind: normative-requirement
summary: In SSRC-multiplexing, two different SSRC values MUST be used for the original and retransmission streams. On collision, an RTCP BYE MUST be sent only for the affected stream; MUST NOT be sent for the associated stream.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
