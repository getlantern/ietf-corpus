document: rfc-2960
kind: protocol-element
summary: The State Cookie is a mandatory variable-length parameter (Type=7) in the INIT ACK. It MUST contain all association state and parameter information needed by the responder to recreate the association, plus a MAC, allowing the server to remain stateless until the COOKIE ECHO is verified.
section: 5.1.3
topics:
    - sctp
    - security
    - crypto
