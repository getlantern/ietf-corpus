document: rfc-4412
kind: design-rationale
summary: The Resource-Priority header field differs from the existing SIP Priority header in that Priority describes importance to the receiving human or agent, while Resource-Priority influences consumption of gateway, proxy, and PSTN trunk resources. Additionally, any UAC can assert any Priority value freely, whereas Resource-Priority use is subject to authentication and authorization.
section: "1"
topics:
