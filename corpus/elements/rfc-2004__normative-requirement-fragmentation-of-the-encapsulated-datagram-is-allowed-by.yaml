document: rfc-2004
kind: normative-requirement
summary: Fragmentation of the encapsulated datagram is allowed by the encapsulator unless the 'Don't Fragment' (DF) bit is set in the IP header; this restriction is required so that nodes employing Path MTU Discovery (RFC 1191) can obtain the information they seek.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ip
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
