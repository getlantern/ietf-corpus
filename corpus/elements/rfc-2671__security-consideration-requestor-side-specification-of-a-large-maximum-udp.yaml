document: rfc-2671
kind: security-consideration
summary: 'Requestor-side specification of a large maximum UDP buffer size may enable a DNS denial-of-service attack: if responders are induced to send oversized messages that intermediate gateways cannot forward, ICMP storms may result between gateways and responders.'
