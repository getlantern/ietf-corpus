document: rfc-7899
kind: security-consideration
summary: When damping is triggered and a Prune has been requested for a state, that state may remain active for some time, potentially preventing an otherwise acceptable new state from being created if the router's multicast state table is near its limit; operators should account for this interaction between damping and state limits.
section: "8"
topics:
