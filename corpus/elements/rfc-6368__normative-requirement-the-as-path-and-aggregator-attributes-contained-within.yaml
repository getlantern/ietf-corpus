document: rfc-6368
kind: normative-requirement
summary: The AS_PATH and AGGREGATOR attributes contained within an ATTR_SET attribute MUST be encoded using 4-octet AS numbers per RFC 4893, regardless of the capabilities advertised by the BGP speaker receiving the ATTR_SET. BGP speakers supporting this document MUST also support RFC 4893.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
