document: rfc-7579
kind: wire-format
summary: The Connectivity Matrix Field TLV begins with a 4-bit Conn field (0=fixed, 1=switched), an 8-bit MatrixID, and a Reserved field, followed by pairs of Link Set Fields (Link Set A and Link Set B) encoding the input-to-output connectivity. Valid dir combinations for the pair are (input, output) or (bidirectional, bidirectional).
section: "2.1"
topics:
