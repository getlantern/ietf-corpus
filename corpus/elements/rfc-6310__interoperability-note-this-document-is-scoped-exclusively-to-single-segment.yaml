document: rfc-6310
kind: interoperability-note
summary: This document is scoped exclusively to single-segment PWs. While the mechanisms may also apply to terminating PEs (T-PEs) in multi-segment PW deployments, RFC 6073 Section 10 provides the authoritative procedures for generating or relaying PW status by a switching PE (S-PE). Ethernet PW OAM interworking is covered in a separate document.
