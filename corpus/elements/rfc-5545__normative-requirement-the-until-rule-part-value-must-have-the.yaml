document: rfc-5545
kind: normative-requirement
summary: The UNTIL rule part value MUST have the same value type as the DTSTART property. If DTSTART is specified as a date with UTC time or local time with timezone reference, then UNTIL MUST be specified as a date with UTC time. In STANDARD and DAYLIGHT sub-components, UNTIL MUST always be UTC.
section: 3.3.10
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
