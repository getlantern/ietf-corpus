kind: protocol-element
summary: The 'sprop-maxcapturerate' and 'sprop-stereo' parameters are unidirectional sender-only parameters that allow the receiver to set up a reduced-complexity audio processing pipeline; they do not affect interoperability and the receiver MUST be capable of receiving any signal.
