document: rfc-5061
kind: normative-requirement
summary: All arithmetic on ASCONF Sequence Numbers MUST be performed modulo 2**32 using Serial Number Arithmetic as defined in RFC 1982 (SERIAL_BITS=32). The sequence number wraps from 2**32−1 back to 0.
section: "3"
rfc2119_level: MUST
