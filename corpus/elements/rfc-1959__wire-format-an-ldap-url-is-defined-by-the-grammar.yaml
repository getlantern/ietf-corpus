document: rfc-1959
kind: wire-format
summary: 'An LDAP URL is defined by the grammar: `ldap://[<hostport>]/<dn>[?<attributes>[?<scope>?<filter>]]`. The `<hostport>` is `<hostname>[:<portnumber>]`, defaulting to TCP port 389. All URL-illegal characters (e.g., spaces) must be percent-encoded per RFC 1738.'
section: "2"
topics:
