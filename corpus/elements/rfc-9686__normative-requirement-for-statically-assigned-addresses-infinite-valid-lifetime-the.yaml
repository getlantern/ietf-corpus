document: rfc-9686
kind: normative-requirement
summary: For statically assigned addresses (infinite Valid Lifetime), the client MUST schedule the next refresh at StaticAddrRegRefreshInterval seconds in the future (default 4 hours, SHOULD be configurable) to prevent excessive multicast traffic.
section: 4.6.2
rfc2119_level: MUST
