document: rfc-2373
kind: wire-format
summary: To create an EUI-64 interface identifier from an IEEE 802 48-bit MAC address, insert two octets (0xFF and 0xFE) between the company_id and vendor-supplied id, then invert the universal/local bit. This is the preferred method when IEEE 802 MAC addresses are available.
