document: rfc-5332
kind: normative-requirement
summary: For a point-to-point data link or tunnel, either every MPLS packet MUST carry an upstream-assigned label, or every MPLS packet MUST carry a downstream-assigned label. In the absence of any other information, the use of downstream-assigned labels MUST be presumed by default.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
