document: rfc-5865
kind: design-rationale
summary: Routine and priority traffic can be admitted using the same DSCP value because the choice of which calls are admitted is handled in the admission procedure in the control plane, not by data-plane policing. Preemption, if required, is handled via RFC 4542 Section 2.3.5.2.
section: "2.3"
topics:
