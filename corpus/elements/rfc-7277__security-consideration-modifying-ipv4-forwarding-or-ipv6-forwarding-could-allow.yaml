document: rfc-7277
kind: security-consideration
summary: Modifying 'ipv4/forwarding' or 'ipv6/forwarding' could allow an attacker to open a conduit into a network area or deny transit service; enabling forwarding may allow bypassing of security safeguards by routing packets through an unintended path.
