document: rfc-4326
kind: wire-format
summary: The SNDU base format consists of a 1-bit D-field (MSB of Length), a 15-bit Length field, a 16-bit Type field, an optional 6-byte NPA Destination Address (when D=0), the PDU payload, and a 32-bit CRC-32 trailer. All multi-byte values are in network byte order (most significant byte first).
