document: rfc-8075
kind: security-consideration
summary: 'URI mapping introduces three risks: DoS via multicast URIs (mitigate with default-deny multicast whitelist), topology leakage via ''/.well-known/core'' (mitigate with default-deny resource whitelist), and CoAP target transparency (mitigate with HTTPS-only interface to make Target CoAP URIs opaque to passive attackers).'
section: "10.4"
topics:
    - security
    - privacy
    - http
