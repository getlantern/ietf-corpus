document: rfc-3339
kind: interoperability-note
summary: Lexicographic (string) sorting of timestamps yields a time-ordered sequence only when all timestamps use the same time zone string, the same offset form, and the same number of fractional-second digits; optional punctuation or mixed offset representations break this property.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
