document: rfc-1304
kind: interoperability-note
summary: The SIP interface type is identified by ifType value 31 (sip) in MIB-II, and ifSpecific must be set to the OBJECT IDENTIFIER sip ::= { transmission 31 }. All index objects (sipL3Index, sipL2Index, etc.) carry the same value as ifIndex for the corresponding interface.
