document: rfc-9961
kind: normative-requirement
summary: Egress Address P2MP Responder sub-TLVs SHOULD NOT be used when an echo request carries an SR P2MP Policy MPLS CP FEC, because transit routers lack visibility into downstream Leaf nodes in SR P2MP deployments (unlike RSVP-TE). A node receiving such sub-TLVs will not respond.
section: 3.1.1
rfc2119_level: SHOULD NOT
topics:
    - mpls
    - measurement
