document: rfc-7603
kind: protocol-element
summary: Energy objects that support the EMAN framework possess their own Universally Unique Identifier (UUID) and are responsible for their own power reporting and control. Devices without EMAN capabilities rely on their supplying device (PSE) for power reporting.
section: "2.2"
