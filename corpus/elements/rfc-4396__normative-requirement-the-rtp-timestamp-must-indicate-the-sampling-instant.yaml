document: rfc-4396
kind: normative-requirement
summary: The RTP timestamp MUST indicate the sampling instant of the earliest (or only) unit in the packet. The initial value SHOULD be randomly determined as specified in RTP. Timestamp clockrates MUST be signaled out-of-band at session setup.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
