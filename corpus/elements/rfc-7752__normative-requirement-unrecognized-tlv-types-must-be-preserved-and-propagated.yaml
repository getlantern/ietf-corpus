document: rfc-7752
kind: normative-requirement
summary: Unrecognized TLV types MUST be preserved and propagated. All TLVs MUST be ordered in ascending order by TLV Type; where multiple TLVs share the same type, they MUST be ordered in ascending order of the TLV value treated as an opaque hexadecimal string.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
