document: rfc-9300
kind: state-machine
summary: 'The Echo-Nonce reachability algorithm: an ITR enters ''Echo-Nonce-request'' state by setting N- and E-bits with a random 24-bit nonce; the co-located ETR/ITR at the remote site echoes the nonce (N=1, E=0) in return traffic. If the ITR does not observe the echoed nonce before a timeout, the path to the ETR RLOC is declared unreachable and the ITR switches to an alternate Locator.'
section: "10.1"
topics:
    - ip
    - routing
