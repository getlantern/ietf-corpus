document: rfc-5951
kind: design-rationale
summary: 'The CCh can be realized in seven ways categorized as: out-of-fiber out-of-band (physically distinct or shared network), in-fiber out-of-band (shared interface, overhead-based, or data-link-associated using GAL), and in-band (data-channel-associated using GAL under top label, or mixed with user traffic). Different node pairs in the same MCN/SCN can use different CCh types.'
