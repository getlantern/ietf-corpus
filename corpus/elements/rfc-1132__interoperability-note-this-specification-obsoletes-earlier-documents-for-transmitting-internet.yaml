document: rfc-1132
kind: interoperability-note
summary: This specification obsoletes earlier documents for transmitting Internet packets over IPX networks. It differs from predecessors by supporting multiple network protocols simultaneously over IPX and by enabling packet transmission through IPX bridges.
section: Status of this Memo
