document: rfc-8571
kind: security-consideration
summary: The TLVs propagate IGP link state and resource-availability information. IGP instances originating these TLVs are assumed to support all required security and authentication mechanisms (as described in RFC 8570 and RFC 7471) to prevent security issues when propagating into BGP-LS. No additional risk is introduced beyond existing BGP-LS link attribute information.
section: "3"
topics:
    - bgp
    - security
    - routing
