document: rfc-7455
kind: normative-requirement
summary: Destination RBridges receiving a Loopback Message MUST echo the received Loopback Transaction Identifier without modification. At each retransmission, the Session Identification Number MUST be incremented.
section: "9.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
