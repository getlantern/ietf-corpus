document: rfc-6672
kind: normative-requirement
summary: When a DNAME is employed as a substitution instruction, a CNAME RR with TTL equal to the corresponding DNAME RR MUST be synthesized and included in the answer section. The synthesized CNAME owner name is the QNAME of the query.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
