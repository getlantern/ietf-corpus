document: rfc-2206
kind: protocol-element
summary: rsvpResvShared (TruthValue) indicates whether a shared reservation style is requested; rsvpResvExplicit (TruthValue) indicates whether individual senders are listed via Filter Specifications. Together these encode the four RSVP reservation styles (WF, FF, SE).
