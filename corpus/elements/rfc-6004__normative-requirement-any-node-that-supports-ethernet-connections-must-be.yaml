document: rfc-6004
kind: normative-requirement
summary: Any node that supports Ethernet connections MUST be able to accept and process Call setups per RFC 4974. Ethernet connections MUST treat the Ethernet (virtual) connection identifier as the long Call ID described in RFC 4974.
section: 2.2.1
rfc2119_level: MUST
topics:
