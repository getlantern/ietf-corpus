document: rfc-4659
kind: security-consideration
summary: Security considerations for the transport of IPv6 reachability information using BGP from RFC 2545 Section 5 apply to these extensions. The same data plane, control plane, and PE/P device security considerations from RFC 4364 Section 13 apply equally to IPv6 VPNs.
