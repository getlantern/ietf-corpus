document: rfc-2793
kind: design-rationale
summary: A zero-length primary T140block MAY be transmitted with redundant data during 'silent periods' to ensure the latest T140block is protected against packet loss at the end of a text input sequence, avoiding the problem of it growing stale before being retransmitted as redundancy.
section: "3.4"
topics:
