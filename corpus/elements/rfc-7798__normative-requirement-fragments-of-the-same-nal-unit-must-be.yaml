document: rfc-7798
kind: normative-requirement
summary: Fragments of the same NAL unit MUST be sent in consecutive ascending RTP sequence number order with no intervening packets from the same RTP stream. APs MUST NOT be fragmented; FUs MUST NOT be nested.
section: 4.4.3
rfc2119_level: MUST
topics:
