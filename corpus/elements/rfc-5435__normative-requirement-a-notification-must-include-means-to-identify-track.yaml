document: rfc-5435
kind: normative-requirement
summary: A notification MUST include means to identify/track its origin so that a recipient can stop notifications or contact the sender. This is required to help track misconfigured or abusive notification origins.
section: "3.8"
rfc2119_level: MUST
topics:
    - email
    - security
