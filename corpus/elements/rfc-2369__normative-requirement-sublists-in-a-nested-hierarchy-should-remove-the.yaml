document: rfc-2369
kind: normative-requirement
summary: Sublists in a nested hierarchy SHOULD remove the parent list's List-Help, List-Subscribe, List-Unsubscribe, and List-Owner fields and insert their own versions. If the sublist has no own archive it MUST leave the List-Archive field untouched; otherwise it SHOULD replace it.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
