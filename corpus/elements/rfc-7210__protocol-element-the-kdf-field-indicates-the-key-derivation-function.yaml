document: rfc-7210
kind: protocol-element
summary: The KDF field indicates the key derivation function used to generate short-lived keys from the long-lived Key field value. When the long-lived key is intended for direct use, KDF is set to 'none'. A KDF is a one-way function that provides cryptographic separation of key material.
section: "2"
topics:
