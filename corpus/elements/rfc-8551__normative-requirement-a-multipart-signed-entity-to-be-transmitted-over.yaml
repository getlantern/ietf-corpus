document: rfc-8551
kind: normative-requirement
summary: A multipart/signed entity to be transmitted over SMTP or other 7-bit constrained transport MUST have transfer encoding applied so that it is represented as 7-bit text. RFC 1847 prohibits agents from changing the transfer encoding of the first part of a multipart/signed message.
section: 3.1.3
rfc2119_level: MUST
topics:
    - email
    - security
