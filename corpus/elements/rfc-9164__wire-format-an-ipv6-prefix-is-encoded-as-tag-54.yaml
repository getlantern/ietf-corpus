document: rfc-9164
kind: wire-format
summary: 'An IPv6 prefix is encoded as tag 54 wrapping a two-element array with the prefix length (unsigned integer) first, followed by the minimal-length prefix byte string with trailing zero bytes omitted. Example: 54([48, h''20010db81234'']) for 2001:db8:1234::/48.'
section: "3.2"
topics:
