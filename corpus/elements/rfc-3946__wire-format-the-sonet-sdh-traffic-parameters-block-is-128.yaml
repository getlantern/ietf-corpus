document: rfc-3946
kind: wire-format
summary: 'The SONET/SDH Traffic Parameters block is 128 bits organized as four 32-bit words: Signal Type (8 bits), RCC (8 bits), NCC (16 bits), NVC (16 bits), Multiplier/MT (16 bits), Transparency/T (32 bits), and Profile/P (32 bits). This structure is used identically in RSVP-TE SENDER_TSPEC/FLOWSPEC objects and CR-LDP TLVs.'
section: "2.1"
