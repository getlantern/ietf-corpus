summary: The binary SigComp dictionary state value is the concatenation of a string subset and a table subset. The string subset contains all dictionary strings arranged roughly so that low-priority-number (high-frequency) strings appear at the end. Total string subset size is 0x0D8C bytes; table subset size is 0x0558 bytes.
