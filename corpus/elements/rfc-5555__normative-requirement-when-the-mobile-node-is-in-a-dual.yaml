document: rfc-5555
kind: normative-requirement
summary: When the mobile node is in a dual-stack visited network and acquires both IPv4 and IPv6 care-of addresses, it SHOULD prioritize the IPv6 care-of address for its MIPv6 binding; after three failed IPv6 binding update attempts, it SHOULD fall back to the IPv4 care-of address.
section: 4.4.1
rfc2119_level: SHOULD
topics:
    - mobility
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
