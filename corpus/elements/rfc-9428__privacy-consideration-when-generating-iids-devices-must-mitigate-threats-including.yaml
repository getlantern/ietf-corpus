document: rfc-9428
kind: privacy-consideration
summary: When generating IIDs, devices must mitigate threats including correlation of activities over time, location tracking, device-specific vulnerability exploitation, and address scanning. IPv6 over NFC uses RFC 7217 RIDs and short-lived connections with a different address per connection to reduce these risks.
section: "7"
topics:
