document: rfc-4119
kind: normative-requirement
summary: The 'ruleset-reference' URI SHOULD use the HTTPS scheme; if it does, the server holding the rules MUST authenticate any access attempt. Rulesets carried as MIME bodies SHOULD be encrypted and signed by the Rule Maker; unsigned rulesets SHOULD NOT be honored by Location Servers or Recipients.
section: 2.2.2
rfc2119_level: SHOULD
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
