document: rfc-4623
kind: design-rationale
summary: PWE3 fragmentation reuses existing PW sequence number fields rather than defining a separate fragmentation header (as RFC 1990 did). This avoids adding overhead to a new dedicated header when the PW control word already carries a sequence number.
section: A
