document: rfc-8824
kind: normative-requirement
summary: SCHC MUST set the Field Length for Uri-Path and Uri-Query options to a variable value, regardless of whether the length is known when the Rule is defined. The Compression Residue size is expressed in bytes.
section: "5.3"
