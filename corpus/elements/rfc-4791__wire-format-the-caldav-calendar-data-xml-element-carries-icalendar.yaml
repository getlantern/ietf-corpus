document: rfc-4791
kind: wire-format
summary: The CALDAV:calendar-data XML element carries iCalendar data in REPORT responses and requests. In requests it specifies which components and properties to return; it supports CALDAV:expand (expand recurrences), CALDAV:limit-recurrence-set, and CALDAV:limit-freebusy-set child elements.
section: "9.6"
