document: rfc-9492
kind: normative-requirement
summary: It is RECOMMENDED to advertise all link attributes for RSVP-TE in the existing OSPFv2 TE Opaque LSA and OSPFv3 Intra-Area-TE-LSA to maintain backwards compatibility. Link attributes not allowed in the ASLA sub-TLV (e.g., maximum reservable link bandwidth, unreserved bandwidth) MUST use those legacy LSAs and MUST NOT be advertised in the ASLA sub-TLV.
section: 12.3.4
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
