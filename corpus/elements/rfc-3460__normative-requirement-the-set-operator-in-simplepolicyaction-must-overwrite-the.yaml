document: rfc-3460
kind: normative-requirement
summary: The SET operator in SimplePolicyAction MUST overwrite the old value of the variable. For multi-valued variables, the only defined update operation is complete replacement of all previous values with a new set; no Add or Remove operations are defined.
section: 5.8.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
