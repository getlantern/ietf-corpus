document: rfc-2971
kind: normative-requirement
summary: Implementations MUST NOT use contact information from an ID response to submit automatic bug reports; implementations may include such information in a report but are prohibited from sending it without user authorization.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - email
    - privacy
