document: rfc-2865
kind: normative-requirement
summary: Text and string attribute values of length zero MUST NOT be sent; the entire attribute MUST be omitted instead. Implementations MUST be able to deal with embedded nulls in attribute values and MUST NOT use strcpy() when handling strings.
section: "5"
rfc2119_level: MUST NOT
topics:
