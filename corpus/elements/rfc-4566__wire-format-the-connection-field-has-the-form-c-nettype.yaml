document: rfc-4566
kind: wire-format
summary: The connection field has the form `c=<nettype> <addrtype> <connection-address>`. For IPv4 multicast, TTL is appended with a slash (e.g., `c=IN IP4 224.2.36.42/127`); for layered multicast an address count may also be appended (e.g., `c=IN IP4 224.2.1.1/127/3`).
section: "5.7"
topics:
    - realtime
    - multicast
    - ip
