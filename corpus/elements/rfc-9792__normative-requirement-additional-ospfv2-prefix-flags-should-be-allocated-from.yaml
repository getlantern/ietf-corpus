document: rfc-9792
kind: normative-requirement
summary: Additional OSPFv2 prefix flags SHOULD be allocated from the unused bits in the Flags field of the OSPFv2 Extended Prefix TLV prior to allocating flags in the new OSPFv2 Prefix Extended Flags sub-TLV, to preserve the simpler fixed-size encoding where possible.
section: "2"
rfc2119_level: SHOULD
