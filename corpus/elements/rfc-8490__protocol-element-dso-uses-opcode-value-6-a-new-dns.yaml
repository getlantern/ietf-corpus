document: rfc-8490
kind: protocol-element
summary: DSO uses OPCODE value 6, a new DNS OPCODE for DNS Stateful Operations. DSO messages use the standard 12-byte DNS header but omit all four resource-record sections; the DSO-specific payload is TLV-encoded data appended after the header.
