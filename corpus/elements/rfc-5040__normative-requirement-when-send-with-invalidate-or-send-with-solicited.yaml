document: rfc-5040
kind: normative-requirement
summary: When Send with Invalidate or Send with Solicited Event and Invalidate Messages are Delivered, the RDMAP layer MUST verify the STag is associated with the RDMAP Stream and then invalidate it; if the STag is not associated with the RDMAP Stream, RDMAP MUST issue a Terminate Message with the 'STag Cannot be Invalidated' error code.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
