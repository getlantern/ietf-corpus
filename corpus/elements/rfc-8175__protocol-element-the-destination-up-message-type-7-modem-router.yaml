document: rfc-8175
kind: protocol-element
summary: The Destination Up Message (type 7, modem→router) announces a newly reachable destination identified by its MAC Address, along with optional address and metric Data Items. The router acknowledges with a Destination Up Response (type 8); if not interested, the router sets status 1 'Not Interested' and the modem MUST NOT send further Messages about that destination.
section: "12.11"
topics:
    - routing
