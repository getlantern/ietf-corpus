document: rfc-5988
kind: wire-format
summary: 'The Link header field is defined as: Link = "Link" ":" #link-value, where link-value = "<" URI-Reference ">" *( ";" link-param ). Parameters include rel, anchor, rev, hreflang, media, title, title*, type, and link-extensions. Multiple link-values are comma-separated.'
