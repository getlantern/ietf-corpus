document: rfc-2015
kind: normative-requirement
summary: All data signed according to this protocol MUST be constrained to 7 bits; 8-bit data must be encoded using Quoted-Printable or Base64. This applies even when a signed object is also encrypted.
section: "3"
rfc2119_level: MUST
topics:
