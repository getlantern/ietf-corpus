document: rfc-9710
kind: wire-format
summary: 'The ''forwardingStatus'' IE encodes a 1-byte layout in the least-significant byte: bits 7-6 carry the Status (Forward, Drop, etc.) and bits 5-0 carry the Reason code or flags. Example: 0x40 (01000000) = Forward with no further information; 0x89 (10001001) = Drop with Bad TTL.'
section: "4.3"
topics:
