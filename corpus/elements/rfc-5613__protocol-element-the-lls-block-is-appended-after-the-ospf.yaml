document: rfc-5613
kind: protocol-element
summary: The LLS block is appended after the OSPF packet body, or after the authentication data block when cryptographic authentication is used. Its length is not included in the OSPF packet length field but is included in the IPv4/IPv6 packet length.
section: "2"
