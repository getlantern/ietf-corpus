document: rfc-3501
kind: security-consideration
summary: A server MUST implement a configuration rejecting all plaintext password mechanisms unless STARTTLS or other session protection is active. Servers SHOULD additionally implement non-plaintext SASL mechanisms such as GSSAPI or DIGEST-MD5 to reduce reliance on transport-layer security alone.
section: 6.2.2
topics:
    - email
    - security
