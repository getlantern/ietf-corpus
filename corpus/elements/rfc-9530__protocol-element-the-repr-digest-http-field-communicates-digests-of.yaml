document: rfc-9530
kind: protocol-element
summary: The Repr-Digest HTTP field communicates digests of the entire selected representation data (Section 8.1 of [HTTP]). It is a Structured Fields Dictionary with the same key/value structure as Content-Digest, but computed over representation data rather than message content.
