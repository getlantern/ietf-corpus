document: rfc-8225
kind: protocol-element
summary: The optional "mky" (Media Key) claim binds SDP media security key fingerprints (from "a=fingerprint" attributes) to the PASSporT identity assertions. It is a JSON array of objects each containing "alg" and "dig" fields, where "dig" is the hexadecimal hash value without colons.
