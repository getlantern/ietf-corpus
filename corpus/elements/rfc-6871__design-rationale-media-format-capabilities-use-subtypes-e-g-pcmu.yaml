document: rfc-6871
kind: design-rationale
summary: Media format capabilities use subtypes (e.g., PCMU, G729) rather than RTP payload type numbers, deliberately deferring payload type assignment to the 'pt=' parameter in a 'pcfg' line. This allows the same media subtype capability to be referenced by multiple configurations with different payload type numbers, enabling the offerer to distinguish encrypted vs. unencrypted early media before receiving the answer.
section: 3.3.6.2
topics:
    - realtime
    - rtp
