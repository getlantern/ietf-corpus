document: rfc-3414
kind: interoperability-note
summary: A zero-length msgUserName does not match any user entry, but it is specifically permitted and used for snmpEngineID discovery. Implementations must not reject zero-length userNames during the discovery exchange.
section: "2.4"
topics:
