document: rfc-3472
kind: wire-format
summary: Label Set TLV (type 0x0827) carries an Action field (8 bits), Reserved bits, Label Type (14 bits indicating the TLV type of the labels), and one or more Subchannel entries. Actions 0/1 add/exclude specific labels; actions 2/3 add/exclude label ranges.
