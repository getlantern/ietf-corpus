summary: The framework XML schema (namespace `urn:ietf:params:xml:ns:e164val-1.0`) defines `insertType` for create/renew/transfer (one or more `<add>` elements), `updateType` for update (zero or more `<add>`, `<rem>`, `<chg>` elements), and `infDataType` for info responses (zero or more `<inf>` elements). The `<validationInfo>` element uses `ValidationInfoType` with an `<any namespace="##other"/>` wildcard.
