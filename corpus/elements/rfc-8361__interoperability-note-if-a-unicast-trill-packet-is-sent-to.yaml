document: rfc-8361
kind: interoperability-note
summary: If a unicast TRILL packet is sent to an R-nickname that is not a tree root, the packet either will not be forwarded at all or, if re-encapsulated and forwarded, will be subject to incorrect pruning and will not reach all intended recipients.
