document: rfc-3381
kind: design-rationale
summary: When the job's 'copies' attribute is '1' or not supplied, 'job-collation-type' is defined to be '4' (collated-documents), since with only one copy there is no meaningful distinction between collated and uncollated document ordering.
section: "4.1"
