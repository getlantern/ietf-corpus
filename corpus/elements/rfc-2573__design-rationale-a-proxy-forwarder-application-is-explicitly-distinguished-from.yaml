document: rfc-2573
kind: design-rationale
summary: 'A proxy forwarder application is explicitly distinguished from a command responder application: a proxy forwards based on context (contextEngineID/contextName) alone without needing a detailed MIB view definition, whereas a command responder processes requests based on individual managed object types and instances and requires the full MIB view.'
section: "1.5"
topics:
    - snmp
