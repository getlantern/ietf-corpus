document: rfc-4896
kind: protocol-element
summary: STATE-FREE does not check minimum_access_length because the application must authenticate the message before state can be freed. STATE-FREE can only free state in the compartment corresponding to the message being decompressed; attempting to free state from another compartment or unassociated state has no effect.
section: "3.3"
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
