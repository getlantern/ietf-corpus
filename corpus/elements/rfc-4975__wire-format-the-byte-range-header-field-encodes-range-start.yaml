document: rfc-4975
kind: wire-format
summary: The Byte-Range header field encodes 'range-start "-" range-end "/" total', where the first octet has position 1; range-end MAY be '*' when unknown or the chunk is interruptible, and total MAY be '*' when the message length is not known in advance.
