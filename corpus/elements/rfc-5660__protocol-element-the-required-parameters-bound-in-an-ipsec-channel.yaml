summary: 'The REQUIRED parameters bound in an IPsec channel are: type of protection (confidentiality and/or integrity), transport vs. tunnel mode, quality of protection (QoP: algorithm suites, key lengths, replay protection), local identity, and peer identity as per the IPsec processing model and BTNS.'
