document: rfc-2462
kind: design-rationale
summary: 'Addresses formed from the same interface identifier share a uniqueness property: if the link-local address is unique, all other addresses derived from the same identifier are also unique. This allows DAD to skip per-address checks for stateless addresses after the link-local address passes.'
section: "5.4"
