document: rfc-4601
kind: normative-requirement
summary: The LAN Prune Delay option SHOULD be included in all Hello messages sent on multi-access LANs, advertising the router's Propagation_Delay and Override_Interval. These values are only applied when all neighbors on the link advertise the option; otherwise, default values are used.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
