document: rfc-9755
kind: interoperability-note
summary: 'Surrogate (downgraded) messages cannot be actual substitutes for originals: digital signatures over the original will often fail verification on the surrogate. Servers serving the same user via multiple clients (POP, webmail, IMAP) must exert extreme care to ensure UIDVALIDITY behaves as expected.'
section: "8"
topics:
