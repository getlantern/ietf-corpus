document: rfc-3748
kind: wire-format
summary: 'Success (Code=3) and Failure (Code=4) packets are exactly 4 octets: Code, Identifier, and Length=4 with no Data field. The Identifier MUST match the Identifier of the Response packet that triggered the Success or Failure.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
