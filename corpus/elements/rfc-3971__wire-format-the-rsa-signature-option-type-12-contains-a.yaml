summary: The RSA Signature Option (Type 12) contains a 16-bit Reserved field, a 128-bit Key Hash field (leftmost 128 bits of SHA-1 over the sender's public key), a variable-length Digital Signature field (RSASSA-PKCS1-v1_5 with SHA-1), and variable-length Padding to align to 8-octet boundaries.
