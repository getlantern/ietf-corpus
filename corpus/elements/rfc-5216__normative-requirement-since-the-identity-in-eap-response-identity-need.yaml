document: rfc-5216
kind: normative-requirement
summary: Since the identity in EAP-Response/Identity need not match the certificate identity, EAP-TLS implementations SHOULD NOT require them to be identical. If they differ, the EAP-Response/Identity identity is unauthenticated and SHOULD NOT be used for access control or accounting.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
