document: rfc-7450
kind: interoperability-note
summary: AMT provides automatic NAT traversal by using the source IP address and UDP port of the received Membership Update message as the destination for subsequent Multicast Data messages. The NAT mapping is refreshed with each periodic three-way handshake.
