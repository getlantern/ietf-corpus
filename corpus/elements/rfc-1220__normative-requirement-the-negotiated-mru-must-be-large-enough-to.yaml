document: rfc-1220
kind: normative-requirement
summary: The negotiated MRU must be large enough to support the MAC Types negotiated for support, as there is no fragmentation and reassembly; even Ethernet frames exceed the default MRU of 1500 octets.
section: "3.3"
rfc2119_level: MUST
