summary: 'TMOD-2 AVP (AVP Code 501) is a Grouped AVP with the same structure as TMOD-1, carrying a second token bucket parameter set. It is needed for DiffServ assured forwarding (AF) traffic, which requires two token buckets: one for average traffic and one for burst traffic.'
