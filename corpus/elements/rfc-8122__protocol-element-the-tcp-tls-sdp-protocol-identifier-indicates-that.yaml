document: rfc-8122
kind: protocol-element
summary: The 'TCP/TLS' SDP protocol identifier indicates that the media described will use TLS over TCP. An 'm' line specifying 'TCP/TLS' MUST further qualify the protocol using a fmt identifier to indicate the application being run over TLS.
