document: rfc-3432
kind: security-consideration
summary: The periodic stream method can be abused for denial-of-service attacks against Dst and/or intervening networks. Administrators SHOULD establish bilateral or multi-lateral agreements on timing, size, and frequency; unauthorized use may be cause for immediate packet rejection or other escalation.
section: "6.1"
topics:
    - security
    - measurement
