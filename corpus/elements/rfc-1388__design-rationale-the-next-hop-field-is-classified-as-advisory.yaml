document: rfc-1388
kind: design-rationale
summary: 'The Next Hop field is classified as ''advisory'': if the provided information is ignored, a possibly sub-optimal but absolutely valid route may still be taken. Its primary purpose is to eliminate extra hops when RIP is not running on all routers on a network.'
section: "3.5"
