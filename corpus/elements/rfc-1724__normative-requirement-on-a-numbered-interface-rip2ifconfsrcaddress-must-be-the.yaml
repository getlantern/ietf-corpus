document: rfc-1724
kind: normative-requirement
summary: On a numbered interface, rip2IfConfSrcAddress MUST be the same value as rip2IfConfAddress. On an unnumbered interface, it must be the value of rip2IfConfAddress for some interface on the system.
section: "4.2"
rfc2119_level: MUST
