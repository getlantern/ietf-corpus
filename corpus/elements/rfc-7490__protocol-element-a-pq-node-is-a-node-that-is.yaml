document: rfc-7490
kind: protocol-element
summary: A PQ node is a node that is a member of both the extended P-space of S with respect to link S-E and the Q-space of E with respect to that link. Repair tunnel endpoints are chosen from the set of PQ nodes; they guarantee loop-free delivery after a single link failure.
