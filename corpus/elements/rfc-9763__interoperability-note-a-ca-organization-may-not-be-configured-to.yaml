document: rfc-9763
kind: interoperability-note
summary: A CA organization may not be configured to validate certificates issued by a different CA organization. Cross-CA use of relatedCertRequest may require pre-arrangement (e.g., contractual agreements and pre-configured trust anchors from the other CA organization) before the CA can process the attribute.
section: "6"
topics:
