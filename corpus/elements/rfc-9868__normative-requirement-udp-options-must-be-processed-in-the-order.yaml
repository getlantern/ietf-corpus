document: rfc-9868
kind: normative-requirement
summary: UDP Options MUST be processed in the order they appear in the surplus area. Except for FRAG, NOP, EXP, and UEXP, each option SHOULD NOT appear more than once; if duplicated, a receiver MUST interpret only the first instance and MUST ignore subsequent instances.
section: "10"
rfc2119_level: MUST
topics:
    - udp
