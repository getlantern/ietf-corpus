document: rfc-1894
kind: design-rationale
summary: 'The DSN format carries both the original (sender-specified) and final (as seen by the Reporting MTA) recipient addresses because different users of the DSN need different forms: the sender needs the original to match their records, while a postmaster needs the final address to reproduce a failure.'
