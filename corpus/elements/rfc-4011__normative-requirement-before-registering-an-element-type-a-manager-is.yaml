document: rfc-4011
kind: normative-requirement
summary: Before registering an element type, a manager is REQUIRED to inspect the pmElementTypeRegTable to see whether it is already registered. The management station is responsible for registering well-formed OIDs, as the system implementing the MIB may not validate them.
section: 4.3.1
rfc2119_level: REQUIRED
