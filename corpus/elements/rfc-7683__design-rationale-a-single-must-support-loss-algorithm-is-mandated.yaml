document: rfc-7683
kind: design-rationale
summary: A single must-support loss algorithm is mandated so that a reporting node can always rely on at least one common abatement algorithm with any reacting node. The loss algorithm is stateless, avoiding the need for reacting nodes to pre-establish state before an overload report arrives.
section: "6.1"
topics:
