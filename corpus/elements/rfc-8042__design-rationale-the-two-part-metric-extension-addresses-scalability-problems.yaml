document: rfc-8042
kind: design-rationale
summary: The two-part metric extension addresses scalability problems with RFC 6845 hybrid interface type on satellite radio networks. When a mobile terminal's capability changes, RFC 6845 requires all other routers to update their Router-LSAs; with two-part metrics, only the affected router updates its own LSA.
section: "1"
topics:
    - routing
    - mpls
