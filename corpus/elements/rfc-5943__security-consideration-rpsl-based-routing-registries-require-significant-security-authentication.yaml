document: rfc-5943
kind: security-consideration
summary: RPSL-based routing registries require significant security; authentication and authorization weaknesses in RPSL (discussed in RFC 2725) are especially relevant given the potential for nefarious actors to abuse the pingable attribute to direct probes at victim addresses.
