document: rfc-3963
kind: normative-requirement
summary: When the Mobile Router Flag (R) is set in a Binding Update, the Home Registration Flag (H) MUST also be set. This reflects that NEMO Basic Support does not allow sending a Binding Update for a Mobile Network Prefix to correspondent nodes (no route optimization).
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
