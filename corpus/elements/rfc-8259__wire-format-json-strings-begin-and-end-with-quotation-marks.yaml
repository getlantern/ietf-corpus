document: rfc-8259
kind: wire-format
summary: 'JSON strings begin and end with quotation marks (`"`). Characters that MUST be escaped are: quotation mark, reverse solidus, and control characters U+0000 through U+001F. BMP characters may be escaped as `\uXXXX`; non-BMP characters require a 12-character UTF-16 surrogate pair escape sequence.'
section: "7"
topics:
