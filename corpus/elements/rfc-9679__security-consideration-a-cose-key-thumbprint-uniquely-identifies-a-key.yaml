document: rfc-9679
kind: security-consideration
summary: A COSE Key Thumbprint uniquely identifies a key only if a single unambiguous COSE Key representation is defined and consistently used. Optional parameters (including key IDs) are excluded from thumbprint computation, so applications needing optional-parameter inclusion cannot use this specification.
