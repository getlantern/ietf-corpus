document: rfc-7916
kind: normative-requirement
summary: 'An implementation MUST behave deterministically in LFA selection: given the same topology and policy configuration, it MUST always choose the same alternate for a given prefix. The implementation SHOULD document its selection algorithm sufficiently for third-party simulation tools to reproduce its choices.'
section: "7.5"
rfc2119_level: MUST
topics:
    - routing
