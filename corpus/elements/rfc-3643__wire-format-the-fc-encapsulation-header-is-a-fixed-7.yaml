document: rfc-3643
kind: wire-format
summary: 'The FC Encapsulation Header is a fixed 7-word (28-byte) structure containing: Protocol# (8-bit), Version (8-bit), -Protocol# (8-bit), -Version (8-bit) in word 0; two Encapsulating Protocol Specific words (words 1-2); Flags (6-bit) and Frame Length (10-bit) with their one''s complements in word 3; Time Stamp [Seconds] (32-bit) in word 4; Time Stamp [Seconds Fraction] (32-bit) in word 5; and CRC (32-bit) in word 6.'
section: "3.1"
