document: rfc-5775
kind: protocol-element
summary: The EXT_FTI LCT Header Extension (type value 64) is defined for communicating FEC Object Transmission Information in association with data packets of an object. The HEC field contains the encoded FEC Object Transmission Information as defined in RFC 5052.
