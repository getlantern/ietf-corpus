document: rfc-3038
kind: design-rationale
summary: VCI=32 (used for unlabeled packet transfer) is explicitly excluded from VPID notification so that the same encapsulation method can be applied uniformly to both VPID procedure messages and inband VCID procedure messages. VCI=33 and VCI=34 are used instead.
