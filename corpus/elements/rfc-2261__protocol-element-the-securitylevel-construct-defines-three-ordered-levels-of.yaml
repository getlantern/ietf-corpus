document: rfc-2261
kind: protocol-element
summary: 'The securityLevel construct defines three ordered levels of security: noAuthNoPriv (no authentication, no privacy), authNoPriv (authentication but no privacy), and authPriv (authentication and privacy). Every message has an associated securityLevel that all subsystems and applications must honor.'
section: 3.4.3
topics:
