document: rfc-2342
kind: normative-requirement
summary: When a client must create a mailbox and it is unclear which Personal Namespace to use (e.g., when multiple exist), the client SHOULD let the user select which namespace to create the mailbox in.
section: "5"
rfc2119_level: SHOULD
