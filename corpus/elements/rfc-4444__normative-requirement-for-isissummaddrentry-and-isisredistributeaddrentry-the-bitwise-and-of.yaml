document: rfc-4444
kind: normative-requirement
summary: For isisSummAddrEntry and isisRedistributeAddrEntry, the bitwise AND of the address value with the mask derived from the prefix length MUST equal the address itself; an inconsistentName error MUST be returned on SET or CREATE if the index pair is inconsistent.
