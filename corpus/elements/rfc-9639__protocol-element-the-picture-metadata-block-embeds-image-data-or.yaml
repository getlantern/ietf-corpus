document: rfc-9639
kind: protocol-element
summary: The picture metadata block embeds image data or a URI, derived from ID3v2 APIC frames. It contains u(32) picture type, u(32)+data media type, u(32)+data description (UTF-8), u(32) width, u(32) height, u(32) color depth, u(32) color count, u(32)+data picture data. Width, height, color depth, and color count are informational only; applications MUST NOT use them for decoding.
section: "8.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
