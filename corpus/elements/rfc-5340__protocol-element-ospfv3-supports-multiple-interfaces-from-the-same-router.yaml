document: rfc-5340
kind: protocol-element
summary: OSPFv3 supports multiple interfaces from the same router attached to the same physical link using a Standby Interface state (Section 4.9). Only one interface per router per link is the Active interface; others are in Standby state, suppressing adjacency formation and LSA origination except as needed for topology accuracy.
section: "4.9"
topics:
    - routing
