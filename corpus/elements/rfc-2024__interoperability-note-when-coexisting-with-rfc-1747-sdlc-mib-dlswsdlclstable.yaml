document: rfc-2024
kind: interoperability-note
summary: When coexisting with RFC 1747 (SDLC MIB), dlswSdlcLsTable uses the same interface/link-station-address indices as RFC 1747, providing a mapping between native SDLC addressing and DLSw domain addressing (local MAC and SAP). Circuit entries with SDLC use dlswCircuitS1DlcType=sdlc and dlswCircuitS1Dlc pointing to sdlcLSAdminTable, sdlcLSOperTable, or sdlcLSStatsTable rows.
section: "2.3"
topics:
