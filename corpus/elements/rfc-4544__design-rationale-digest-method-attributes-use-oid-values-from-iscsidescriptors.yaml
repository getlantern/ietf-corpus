document: rfc-4544
kind: design-rationale
summary: Digest method attributes use OID values (from iscsiDescriptors subtree) rather than enumerated integers, because implementations may need to add proprietary digest methods. Vendors define corresponding OBJECT-IDENTITY entries in their enterprise MIBs and return those OIDs.
section: "6.15"
topics:
