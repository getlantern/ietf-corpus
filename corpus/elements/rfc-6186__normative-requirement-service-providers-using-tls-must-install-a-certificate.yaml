document: rfc-6186
kind: normative-requirement
summary: Service providers using TLS MUST install a certificate verifiable by MUAs per RFC 6125 (SRV RR as starting point). If multiple domains are hosted on the same IP address, the service provider MUST enable support for TLS Server Name Indication (RFC 6066).
section: "5"
rfc2119_level: MUST
topics:
    - email
    - tls
    - pkix
