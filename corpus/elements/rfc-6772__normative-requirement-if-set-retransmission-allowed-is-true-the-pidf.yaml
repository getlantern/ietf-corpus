document: rfc-6772
kind: normative-requirement
summary: If <set-retransmission-allowed> is TRUE, the PIDF-LO <retransmission-allowed> MUST be set to TRUE; if FALSE, it MUST be set to FALSE. If absent and the PIDF-LO is created for the first time, the value MUST be set to FALSE.
section: "6.1"
rfc2119_level: MUST
topics:
    - privacy
