document: rfc-2253
kind: protocol-element
summary: A DistinguishedName is encoded as the string encodings of each RelativeDistinguishedName in the RDNSequence, starting with the last element and moving backwards toward the first, with adjoining RDN encodings separated by a comma character (',' ASCII 44). An empty RDNSequence produces an empty string.
section: "2.1"
