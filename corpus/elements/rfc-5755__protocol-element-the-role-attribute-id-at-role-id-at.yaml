document: rfc-5755
kind: protocol-element
summary: The Role attribute (id-at-role, { id-at 72 }) uses RoleSyntax, a SEQUENCE with optional roleAuthority ([0] GeneralNames) and mandatory roleName ([1] GeneralName). The roleName MUST use the uniformResourceIdentifier CHOICE to allow domain-qualified role names that distinguish, e.g., 'administrator' as defined by different organizations.
section: 4.4.5
topics:
    - pkix
    - security
