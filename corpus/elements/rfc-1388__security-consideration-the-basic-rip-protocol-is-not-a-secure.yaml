document: rfc-1388
kind: security-consideration
summary: The basic RIP protocol is not a secure protocol. RIP-2 addresses this by incorporating an extensible authentication mechanism using the first route-entry slot in the packet; the only currently defined method is simple plain-text password, which provides minimal security.
section: Security Considerations
