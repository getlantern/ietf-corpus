summary: 'The Flags Suboption encodes as: Code (1 octet, value 10), Length (1 octet, value 1), Flags (1 octet). Within the Flags octet, bit 0 (U) is the UNICAST flag; bits 1-7 are MUST BE ZERO (MBZ) reserved for future use.'
