document: rfc-7118
kind: security-consideration
summary: Server operators should note that TLS certificate authentication for SIP over WebSocket follows WebSocket (RFC 6455) validation procedures, which differ from SIP domain certificate procedures in RFC 5922; certificates valid for SIP over TLS/TCP may not be appropriate for SIP over secure WebSocket.
section: "9.1"
topics:
    - websocket
    - sip
    - security
    - tls
    - pkix
