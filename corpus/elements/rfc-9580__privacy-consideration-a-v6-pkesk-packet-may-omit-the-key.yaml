document: rfc-9580
kind: privacy-consideration
summary: A v6 PKESK packet MAY omit the key fingerprint (zero-size field) to create an 'anonymous recipient'. The receiver tries all available private keys, hiding the intended decryption key from traffic analysis. Similarly, a v3 PKESK MAY use an all-zeros Key ID.
section: 5.1.8
topics:
    - privacy
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
