document: rfc-9470
kind: normative-requirement
summary: When a request includes the `max_age` parameter, the authorization server MUST include the `auth_time` claim in the issued ID Token (inherited from OIDC Section 3.1.2.1). This ensures the resource server can evaluate authentication recentness.
section: "5"
rfc2119_level: MUST
topics:
    - oauth
    - security
