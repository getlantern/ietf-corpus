document: rfc-1426
kind: normative-requirement
summary: Once a server SMTP accepts a content body containing octets with the high-order (8th) bit set, the server SMTP must deliver or relay the content in such a way as to preserve all bits in each octet.
section: "4"
rfc2119_level: MUST
