document: rfc-4930
kind: protocol-element
summary: Transaction identifiers provide command-response synchronization integrity. Each response includes a <trID> element containing the client-supplied <clTRID> (if provided) and a server-assigned <svTRID>. These SHOULD be logged, retained, and protected.
section: "2.6"
