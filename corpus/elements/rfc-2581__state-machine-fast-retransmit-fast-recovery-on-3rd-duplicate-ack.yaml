document: rfc-2581
kind: state-machine
summary: 'Fast retransmit/fast recovery: on 3rd duplicate ACK, set ssthresh per equation 3, retransmit lost segment, set cwnd to ssthresh+3*SMSS; increment cwnd by SMSS for each additional duplicate ACK; on new ACK, deflate cwnd to ssthresh and resume congestion avoidance.'
section: "3.2"
topics:
