document: rfc-8828
kind: privacy-consideration
summary: When a client is behind a NAT, WebRTC ICE can reveal private RFC 1918 addresses to web applications. In the worst case, these can contain 24 bits of entropy with an indefinite lifetime, representing a significant fingerprinting surface.
section: "3"
topics:
    - webrtc
    - privacy
    - nat
