document: rfc-6089
kind: interoperability-note
summary: This specification is compatible with RFC 3775 home deregistration (zero-lifetime BU deletes all bindings including flow bindings) and with RFC 5648 specific BID deregistration, which does not remove all bindings and SHOULD include flow summary options to preserve desired flow bindings.
