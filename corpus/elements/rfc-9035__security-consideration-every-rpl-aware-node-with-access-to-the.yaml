document: rfc-9035
kind: security-consideration
summary: Every RPL-aware node with access to the RPL domain can inject any RPL-based attack; see RFC 7416 for a full threat analysis. This document does not change the security requirements or operations of existing RPL deployments and assumes existing RPL security mechanisms are in place.
