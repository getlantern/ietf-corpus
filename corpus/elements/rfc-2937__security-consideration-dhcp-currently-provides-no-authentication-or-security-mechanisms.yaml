document: rfc-2937
kind: security-consideration
summary: DHCP currently provides no authentication or security mechanisms. Potential exposures to attack are discussed in section 7 of RFC 2131; this option inherits those vulnerabilities, allowing a rogue DHCP server to redirect name service lookups.
section: Security Considerations
topics:
    - security
    - dns
