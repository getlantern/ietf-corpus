document: rfc-5070
kind: protocol-element
summary: The History class is a log of significant events and actions performed during incident handling, composed of one or more HistoryItem entries. Each HistoryItem carries a required DateTime, a required 'action' attribute classifying the performed action, and optional Contact and Description elements.
