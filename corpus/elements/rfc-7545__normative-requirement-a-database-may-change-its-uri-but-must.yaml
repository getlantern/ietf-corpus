document: rfc-7545
kind: normative-requirement
summary: A Database MAY change its URI but MUST indicate the upcoming change by including alternate database URIs in DbUpdateSpec for a minimum of 2 weeks before disabling the old URI. Devices SHOULD detect infinite redirection loops; if no suitable database is reachable, the device MUST treat this as equivalent to a no-available-spectrum response.
section: 4.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
