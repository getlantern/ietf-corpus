document: rfc-1891
kind: normative-requirement
summary: A 'delayed' DSN MAY be issued only if NOTIFY included DELAY or no NOTIFY was supplied. If NOTIFY was supplied without the DELAY keyword, a delayed DSN MUST NOT be issued. A conforming MTA is never required to issue delayed DSNs.
section: 6.2.5
rfc2119_level: MUST NOT
topics:
    - email
