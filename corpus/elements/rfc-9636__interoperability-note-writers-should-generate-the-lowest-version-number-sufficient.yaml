document: rfc-9636
kind: interoperability-note
summary: 'Writers SHOULD generate the lowest version number sufficient for a file''s data: generate version 4 only if the leap-second table expires or is truncated at the start; generate version 3 only if the TZ string extension is necessary; otherwise use version 2.'
