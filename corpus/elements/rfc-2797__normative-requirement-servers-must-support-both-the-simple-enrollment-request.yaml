document: rfc-2797
kind: normative-requirement
summary: Servers MUST support both the Simple Enrollment Request and the Full Enrollment Request. Clients SHOULD use the Full Enrollment Request message when enrolling. An enrollment response MUST be returned to all Full Enrollment Requests.
section: "4.2"
rfc2119_level: MUST
