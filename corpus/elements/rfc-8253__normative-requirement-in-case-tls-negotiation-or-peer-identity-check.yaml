document: rfc-8253
kind: normative-requirement
summary: In case TLS negotiation or peer identity check fails, both peers MUST immediately close the connection. The initiator SHOULD follow RFC 5440's exponential back-off retry procedure for session re-establishment.
section: "3.6"
rfc2119_level: MUST
topics:
    - tls
    - security
    - routing
