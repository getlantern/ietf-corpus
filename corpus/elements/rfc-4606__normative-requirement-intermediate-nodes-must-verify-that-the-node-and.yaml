document: rfc-4606
kind: normative-requirement
summary: Intermediate nodes MUST verify that the node and interfaces can support the requested Transparency flags. If the requested flags cannot be supported, the receiver node MUST generate a PathErr or NOTIFICATION message as appropriate.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
