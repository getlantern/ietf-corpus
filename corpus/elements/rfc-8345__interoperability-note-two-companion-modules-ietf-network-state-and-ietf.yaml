document: rfc-8345
kind: interoperability-note
summary: Two companion modules — `ietf-network-state` and `ietf-network-topology-state` — are defined in Appendix B for implementations that do not support NMDA. They mirror the main modules but with all data nodes set `config false`. Implementations supporting NMDA SHOULD NOT implement these companion modules.
