document: rfc-9148
kind: security-consideration
summary: When a Registrar is present and server-side key generation is used without end-to-end CMS encryption, the Registrar can observe the private key in transit, acting as a man-in-the-middle. Clients must trust the Registrar not to expose the key.
section: "9.2"
topics:
    - security
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
