document: rfc-7662
kind: protocol-element
summary: The introspection endpoint is an OAuth 2.0 endpoint that accepts a token parameter and returns a JSON document representing the meta-information surrounding the token, including whether the token is currently active. The definition of 'active' is implementation-dependent but typically means issued by this server, not expired, and not revoked.
section: "2"
topics:
