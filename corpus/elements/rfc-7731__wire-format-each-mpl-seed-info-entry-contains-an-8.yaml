document: rfc-7731
kind: wire-format
summary: Each MPL Seed Info entry contains an 8-bit min-seqno, a 6-bit bm-len (size of buffered-mpl-messages in octets), a 2-bit S field (seed-id length), a variable-length seed-id (0, 2, 8, or 16 octets), and a variable-length bit-vector buffered-mpl-messages where the i-th bit represents sequence number min-seqno+i. The structure has no octet alignment requirement.
section: "6.3"
topics:
    - multicast
    - ip
