document: rfc-2539
kind: protocol-element
summary: Diffie-Hellman keys are stored in the DNS as KEY RRs using algorithm number 2. The first 4 octets (flags, protocol, algorithm) are common to all KEY RRs as described in RFC 2535; the remainder encodes the DH public key parameters.
