document: rfc-4022
kind: normative-requirement
summary: The tcpHCGroup (tcpHCInSegs, tcpHCOutSegs) is mandatory for systems capable of receiving or transmitting more than 1 million TCP segments per second, since a Counter32 wraps in just over an hour at that rate.
