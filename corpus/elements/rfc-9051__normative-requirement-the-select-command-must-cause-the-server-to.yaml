document: rfc-9051
kind: normative-requirement
summary: The SELECT command MUST cause the server to return untagged FLAGS, EXISTS, and LIST responses plus OK responses with PERMANENTFLAGS, UIDNEXT, and UIDVALIDITY response codes before the tagged OK. When deselecting an existing mailbox via a new SELECT, the server MUST return an untagged OK [CLOSED] response code.
section: 6.3.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
