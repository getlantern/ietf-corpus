kind: protocol-element
summary: The RD lookup interface is a GET to the type-specific lookup URI with optional search criteria (attribute filters), page, and count query parameters for pagination. Both resource lookup (core.rd-lookup-res) and endpoint lookup (core.rd-lookup-ep) are mandatory.
