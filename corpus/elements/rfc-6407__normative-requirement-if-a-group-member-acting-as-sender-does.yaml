document: rfc-6407
kind: normative-requirement
summary: If a group member acting as sender does not hold a current SID value upon receiving a counter-mode Data-Security SA via GROUPKEY-PUSH, it MUST NOT install that SA; it MAY initiate a GROUPKEY-PULL exchange to obtain a SID value.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
