document: rfc-9814
kind: protocol-element
summary: SLH-DSA uses a Forest of Random Subsets (FORS) few-time signature scheme combined with a hypertree of WOTS+ one-time signatures across d layers of Merkle subtrees. A signature consists of a randomization string, the FORS signature, the WOTS+ signatures for each layer, and the authentication paths to the hypertree root. Verification succeeds only if the recomputed root matches the pre-trusted hypertree root.
section: "2"
topics:
