document: rfc-4505
kind: protocol-element
summary: The 'trace' stringprep profile is defined for use with the SASL ANONYMOUS mechanism. It uses the Unicode 3.2 character repertoire, requires no mapping or normalization, and prohibits characters from StringPrep tables C.2.1, C.2.2, C.3, C.4, C.5, C.6, C.8, and C.9.
