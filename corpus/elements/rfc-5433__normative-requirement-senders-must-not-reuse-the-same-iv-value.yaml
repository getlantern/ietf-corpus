document: rfc-5433
kind: normative-requirement
summary: Senders MUST NOT reuse the same IV value across messages, use a sequence of values with low Hamming distance, or use ciphertext from a received message as an IV. If no encryption is used, IV Length MUST be 0.
section: "9.4"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
