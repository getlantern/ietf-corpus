document: rfc-8322
kind: normative-requirement
summary: Link elements SHOULD be included in all Feeds to support paging using the 'first', 'last', 'previous', and 'next' link relation types per RFC 5005. Implementations SHOULD also support archive link mechanisms per Section 4 of RFC 5005.
section: 6.1.2
rfc2119_level: SHOULD
topics:
    - http
