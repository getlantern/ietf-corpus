document: rfc-8873
kind: wire-format
summary: Each MSRP chunk is delivered in a single SCTP user message. All sent MSRP chunks SHALL have lengths less than or equal to the peer's 'max-message-size' attribute (RFC 8841) associated with the SCTP association. Standard MSRP framing and chunking procedures per RFC 4975 apply.
section: "5.4"
rfc2119_level: SHALL
topics:
    - webrtc
    - realtime
