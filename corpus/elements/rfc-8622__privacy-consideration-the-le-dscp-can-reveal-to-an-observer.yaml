document: rfc-8622
kind: privacy-consideration
summary: The LE DSCP can reveal to an observer (e.g., a state-level actor) that transferred content is considered low priority or low urgency, potentially allowing surveillance resources to be focused on non-LE (i.e., higher-priority) traffic while ignoring LE background traffic such as software downloads or telemetry data. The disclosed information has limited utility without correlation to user identity metadata.
section: "13"
topics:
