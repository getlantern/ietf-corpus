document: rfc-9899
kind: design-rationale
summary: RFC 8519 does not support aliases or defined sets, forcing operators to duplicate match criteria across ACLs. The enhanced module introduces reusable defined sets (prefix, port, protocol, ICMP, aliases) to decouple rule creation from set management, enabling add/remove of entries without redefining parent ACL rules.
section: A.2
topics:
