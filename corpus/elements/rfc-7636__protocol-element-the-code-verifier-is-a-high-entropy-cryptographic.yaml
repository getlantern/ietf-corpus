summary: 'The code_verifier is a high-entropy cryptographic random string using unreserved characters [A-Z]/[a-z]/[0-9]/"-"/"."/"_"/"~" with a minimum length of 43 characters and a maximum length of 128 characters, created fresh for each authorization request. ABNF: code-verifier = 43*128unreserved.'
