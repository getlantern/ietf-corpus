document: rfc-4719
kind: normative-requirement
summary: LCCEs SHOULD monitor for congestion using explicit congestion notification or by measuring packet loss. When severe congestion is detected, the Ethernet PW SHOULD be halted by tearing down the L2TP session via a CDN message.
section: "5"
rfc2119_level: SHOULD
topics:
