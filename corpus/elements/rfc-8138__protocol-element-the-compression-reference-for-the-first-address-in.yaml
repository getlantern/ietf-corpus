document: rfc-8138
kind: protocol-element
summary: The Compression Reference for the first address in an SRH header is the source of the encapsulating IPv6 packet (typically the DODAG root in Non-Storing RPL). For each subsequent SRH entry, the reference is the fully expanded address of the preceding entry. An abstract context table indexed by Global RPLInstanceID provides the root address.
section: "5.4"
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
