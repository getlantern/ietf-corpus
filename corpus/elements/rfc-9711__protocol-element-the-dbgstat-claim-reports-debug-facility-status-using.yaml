document: rfc-9711
kind: protocol-element
summary: 'The ''dbgstat'' claim reports debug facility status using five ordered levels: enabled, disabled, disabled-since-boot, disabled-permanently (only OEM can re-enable), and disabled-fully-and-permanently. Higher levels imply all lower constraints are met.'
