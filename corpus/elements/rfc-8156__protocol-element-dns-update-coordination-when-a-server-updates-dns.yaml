document: rfc-8156
kind: protocol-element
summary: 'DNS update coordination: when a server updates DNS on behalf of a client, it records the hostname, zone name, and update flags in OPTION_F_DNS_REMOVAL_INFO (code 116), which encapsulates OPTION_F_DNS_HOST_NAME (117), OPTION_F_DNS_ZONE_NAME (118), and OPTION_F_DNS_FLAGS (119). This allows the partner or a taking-over server to remove DNS records created by the original server.'
section: "9"
topics:
    - dns
