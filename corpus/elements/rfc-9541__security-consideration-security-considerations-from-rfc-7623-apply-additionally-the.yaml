document: rfc-9541
kind: security-consideration
summary: Security considerations from RFC 7623 apply. Additionally, the extra B-MAC/I-SID routes generated by this feature may consume additional memory and processing resources on receiving PEs, including non-supporting ones. It is RECOMMENDED to activate the feature only when necessary (when multihomed networks or devices are attached), and not by default on any PBB-EVPN PE.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
