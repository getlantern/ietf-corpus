document: rfc-8402
kind: protocol-element
summary: SRv6 encodes a segment as an IPv6 address and an SR Policy as an ordered list of IPv6 addresses in a Segment Routing Header (SRH). The active segment is the Destination Address (DA) of the IPv6 packet; NEXT is implemented by decrementing SegmentsLeft (SL) and copying the next segment to DA.
section: "1"
topics:
