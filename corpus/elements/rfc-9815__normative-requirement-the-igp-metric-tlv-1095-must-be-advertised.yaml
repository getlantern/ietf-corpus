document: rfc-9815
kind: normative-requirement
summary: The IGP Metric (TLV 1095) MUST be advertised with every Link NLRI; a Link NLRI received without an IGP Metric TLV MUST be treated as malformed (treat-as-withdraw). The metric length is 4 octets and applies to the output side of the interface.
section: 5.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
