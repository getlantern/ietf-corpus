document: rfc-4422
kind: state-machine
summary: A SASL authentication exchange begins with a client request naming a mechanism, followed by one or more server-challenge/client-response pairs, and concludes with a server outcome message. If a security layer was negotiated and the outcome is successful, the layer is installed immediately after the outcome.
