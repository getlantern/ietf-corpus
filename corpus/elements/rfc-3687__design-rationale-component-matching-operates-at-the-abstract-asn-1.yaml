document: rfc-3687
kind: design-rationale
summary: Component matching operates at the abstract ASN.1 value level, independent of any particular encoding such as BER. This allows the matching rules to apply consistently regardless of which on-wire encoding (BER, DER, GSER, etc.) is used to store or transfer attribute values.
section: "2"
topics:
