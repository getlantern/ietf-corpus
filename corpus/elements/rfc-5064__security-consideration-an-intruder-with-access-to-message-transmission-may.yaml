document: rfc-5064
kind: security-consideration
summary: An intruder with access to message transmission may insert a URI pointing to malicious content. This can be addressed by using a secured transmission method. Additionally, a message harmless when received directly could produce problems when accessed via the URI due to inadequate escaping in the archive format.
section: "4"
topics:
    - security
    - email
