document: rfc-4935
kind: protocol-element
summary: 't11FcsFabricDiscoveryTable (indexed by fcmInstanceIndex, fcmSwitchIndex) provides per-switch discovery control with four objects: t11FcsFabricDiscoveryRangeLow and t11FcsFabricDiscoveryRangeHigh (T11FabricIndex bounding the Fabric range), t11FcsFabricDiscoveryStart (write ''start'' to trigger; reads always return ''noOp''), and t11FcsFabricDiscoveryTimeOut (Unsigned32, 300–86400 seconds, default 900). Values in this table are not retained over agent reboots.'
section: "6"
topics:
