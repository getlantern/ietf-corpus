document: rfc-8519
kind: design-rationale
summary: 'Feature statements serve two purposes: the first set advertises per-header-type device capabilities (e.g., ''match-on-eth''); the second set advertises which combinations of header types a device supports (e.g., ''mixed-eth-ipv4''). This two-tier model prevents misconfiguration of ACE types within an ACL.'
section: "3"
topics:
