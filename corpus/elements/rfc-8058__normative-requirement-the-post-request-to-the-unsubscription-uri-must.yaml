document: rfc-8058
kind: normative-requirement
summary: The POST request to the unsubscription URI MUST NOT include cookies, HTTP authorization, or any other context information, to prevent inappropriately linking the unsubscribe to previous web activity.
section: "3.1"
rfc2119_level: MUST NOT
