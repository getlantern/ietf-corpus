document: rfc-6455
kind: security-consideration
summary: Servers SHOULD validate the Origin header to prevent unauthorized cross-origin use by browser scripts. Non-browser clients can provide any arbitrary Origin value, so origin validation only provides meaningful protection for browser-initiated connections.
section: "10.2"
topics:
    - websocket
    - security
