document: rfc-6607
kind: protocol-element
summary: 'The VSS Type field selects the VSS information encoding: Type 0 = NVT ASCII VPN identifier (MUST NOT be null-terminated), Type 1 = RFC 2685 7-octet VPN-ID, Type 255 = global/default VPN (no additional VSS information; length MUST be 1). Types 2–254 are unassigned.'
