document: rfc-5079
kind: design-rationale
summary: Display names make a poor mechanism for indicating anonymity because they are meant for human consumption, not automata; language variations and misspellings can cause an automaton to miss the hint. Nevertheless, RFC 3261 explicitly designated the display name as a way to declare anonymity, so a check on it is included.
section: "3"
topics:
