document: rfc-1533
kind: protocol-element
summary: Domain Name Server option (code 6, minimum 4 octets, must be multiple of 4) specifies a list of DNS (RFC 1035) servers available to the client, listed in order of preference. Domain Name option (code 15, minimum 1 octet) specifies the domain name the client should use when resolving hostnames via DNS.
section: 3.8, 3.17
topics:
