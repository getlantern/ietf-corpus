document: rfc-9621
kind: protocol-element
summary: 'A Connection Group is a set of Connections that shares Connection Properties and Cached State. Properties are ''entangled'': changing a Connection Property on any Connection in the group changes it for all others, except for Connection Priority. Only Connections within the same Connection Group may be multiplexed together.'
section: 4.1.8
topics:
