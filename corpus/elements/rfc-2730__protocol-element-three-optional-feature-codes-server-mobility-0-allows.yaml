document: rfc-2730
kind: protocol-element
summary: 'Three optional feature codes: Server Mobility (0) allows renew/release on a different server than the one that allocated; Retry After (1) lets servers defer large allocations; Shared Lease Identifier (2) allows any client knowing the Lease Identifier to modify the lease, intended for conferencing.'
