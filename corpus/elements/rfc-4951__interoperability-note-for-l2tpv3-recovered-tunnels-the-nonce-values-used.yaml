document: rfc-4951
kind: interoperability-note
summary: For L2TPv3 recovered tunnels, the nonce values used for Control Message authentication MUST be reset to those exchanged during the recovery tunnel handshake, ensuring the recovered tunnel's authentication context is consistent between endpoints and not stale from the pre-failure connection.
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
