document: rfc-5815
kind: protocol-element
summary: Four Statistical Tables augment the Transport Session, Template, Metering Process, and Selection Process tables. The Transport Session stats include byte/packet/message/record/template rates and counts plus a discard counter; all statistical tables carry a discontinuity timestamp to signal counter resets to the management system.
