document: rfc-2665
kind: normative-requirement
summary: 64-bit HC octet counters (ifHCInOctets, ifHCOutOctets) are required for Ethernet-like interfaces capable of operating at 20 Mbit/s or faster, even if currently running slower. 64-bit HC packet counters are required for interfaces capable of 640 Mbit/s or faster.
section: 3.2.7
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
