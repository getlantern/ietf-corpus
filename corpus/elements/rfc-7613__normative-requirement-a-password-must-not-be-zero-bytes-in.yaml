document: rfc-7613
kind: normative-requirement
summary: A password MUST NOT be zero bytes in length. This rule is enforced after any normalization and mapping of code points, to prevent accidental omission of a password when internationalized characters are accepted.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
