document: rfc-9772
kind: protocol-element
summary: ICMP and ICMPv6 are cited as examples of active OAM protocols providing on-demand defect detection and failure localization. ICMP control messages immediately follow the inner IP header encapsulated in Geneve. ICMP extensions for Geneve networks use mechanisms defined in RFC 4884.
