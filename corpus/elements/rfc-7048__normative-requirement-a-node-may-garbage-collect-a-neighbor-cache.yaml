document: rfc-7048
kind: normative-requirement
summary: A node MAY garbage collect a Neighbor Cache Entry at any time as specified in RFC 4861; this freedom is unchanged by the introduction of the UNREACHABLE state. An implementation MAY prefer garbage collecting UNREACHABLE NCEs over others.
section: "3"
rfc2119_level: MAY
topics:
