document: rfc-2125
kind: protocol-element
summary: BACP (PPP protocol type 0xC02B) operates identically to LCP except it uses only Codes 1–7 (Configure-Request through Code-Reject) and has its own Configuration Options. BACP is negotiated once per multilink bundle and applies to all links in the bundle.
section: "3"
extracted_by: claude-sonnet-4-6
