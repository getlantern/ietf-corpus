document: rfc-1209
kind: normative-requirement
summary: An SMDS Group Address (smds$lis-ga) MUST be configured at subscription time to identify all LIS member SNIs. If SMDS address screening tables are used, both source and destination tables for each SNI MUST allow direct communication between all LIS hosts and use of smds$lis-ga.
section: Logical IP Subnetwork Configuration
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
