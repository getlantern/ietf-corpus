document: rfc-5415
kind: security-consideration
summary: The use of MD5 within CAPWAP is limited to non-security-critical functions. MD5 MUST NOT be used for any security-sensitive operations such as message authentication or key derivation, as its collision resistance is broken.
section: 12.1.5
topics:
