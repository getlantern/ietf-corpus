kind: wire-format
summary: The MD5 algorithm produces a 128-bit (16-octet) digest. Those 16 octets are base64-encoded to produce the value of the Content-MD5 header field (e.g., 'Q2hlY2sgSW50ZWdyaXR5IQ==').
