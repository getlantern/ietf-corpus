document: rfc-2653
kind: normative-requirement
summary: CIP requests sent using the mail transport MUST include a Reply-To header as specified by RFC-822. Mail received without a Reply-To header MUST be ignored (with a log message), and the receiver MUST NOT attempt to reply to any address derived from the incoming mail.
section: 2.2.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
