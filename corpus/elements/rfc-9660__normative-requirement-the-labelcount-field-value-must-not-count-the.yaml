document: rfc-9660
kind: normative-requirement
summary: The LABELCOUNT field value MUST NOT count the null (root) label that terminates the original QNAME, and MUST be less than or equal to the number of labels in the original QNAME. The Root zone has a LABELCOUNT of 0.
section: "2.1"
rfc2119_level: MUST NOT
topics:
