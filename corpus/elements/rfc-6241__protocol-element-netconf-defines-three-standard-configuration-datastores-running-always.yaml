document: rfc-6241
kind: protocol-element
summary: 'NETCONF defines three standard configuration datastores: <running> (always present, holds active configuration), <candidate> (optional, for staging without affecting running), and <startup> (optional, holds boot configuration). Only <running> exists in the base model; others require capability advertisement.'
section: "5.1"
