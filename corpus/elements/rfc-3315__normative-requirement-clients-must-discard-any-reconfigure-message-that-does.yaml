document: rfc-3315
kind: normative-requirement
summary: Clients MUST discard any Reconfigure message that does not include a valid authentication option or that fails authentication validation. Reconfigure is the only DHCPv6 message type that mandates authentication.
section: "15.11"
rfc2119_level: MUST
topics:
    - ip
    - security
