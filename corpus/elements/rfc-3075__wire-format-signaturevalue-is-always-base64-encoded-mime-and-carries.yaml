document: rfc-3075
kind: wire-format
summary: SignatureValue is always base64-encoded [MIME] and carries the raw cryptographic output of the SignatureMethod algorithm over the canonicalized SignedInfo. For DSA, the value is the base64 encoding of the concatenated 20-octet I2OSP encodings of integers r and s.
