document: rfc-6325
kind: protocol-element
summary: Distribution trees are computed by all RBridges using SPF and span the entire campus. Multi-destination frames are forwarded along a specific tree selected by the ingress RBridge, subject to VLAN and IP multicast pruning and a Reverse Path Forwarding Check to suppress loops.
