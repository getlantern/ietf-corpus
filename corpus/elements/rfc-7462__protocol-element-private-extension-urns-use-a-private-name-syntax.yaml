document: rfc-7462
kind: protocol-element
summary: Private-extension URNs use a <private-name> syntax of the form <alert-label>@<provider>, where <provider> is registered with IANA. A private-name may appear as either an <alert-category> or an <alert-ind-part>, and all subsequent <alert-label>s until the next <private-name> are owned by that organization.
section: "10.2"
topics:
    - sip
    - realtime
    - registry
