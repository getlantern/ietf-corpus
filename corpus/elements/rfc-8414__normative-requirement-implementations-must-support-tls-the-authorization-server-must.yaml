document: rfc-8414
kind: normative-requirement
summary: Implementations MUST support TLS. The authorization server MUST support TLS version 1.2 and MAY support additional TLS mechanisms. When using TLS, the client MUST perform a TLS/SSL server certificate check per RFC 6125.
section: "6.1"
rfc2119_level: MUST
topics:
    - tls
    - oauth
    - security
