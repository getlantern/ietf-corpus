document: rfc-3371
kind: interoperability-note
summary: A MIB conforming to SMIv1 can be produced from this SMIv2 MIB by translation, except that Counter64 objects must be omitted since SMIv1 has no equivalent. Machine-readable SMIv2 annotations become textual descriptions in SMIv1 but this is not considered a semantic change.
