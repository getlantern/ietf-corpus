document: rfc-4455
kind: normative-requirement
summary: For command counters on systems running at 4 Gbit/second or higher, each counter must be defined as both a Counter32 and a Counter64, with the Counter64 mandatory for such high-speed systems to prevent wrap within an hour.
section: "7.5"
rfc2119_level: MUST
topics:
    - snmp
