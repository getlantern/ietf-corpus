document: rfc-2183
kind: protocol-element
summary: The 'creation-date' parameter MAY indicate the date at which the file was created. Its value MUST be a quoted-string containing an RFC 822 date-time. UNIX implementors are cautioned that st_ctime is not the creation time and is inappropriate as a source value.
section: "2.4"
topics:
    - email
