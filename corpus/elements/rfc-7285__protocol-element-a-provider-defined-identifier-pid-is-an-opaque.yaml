document: rfc-7285
kind: protocol-element
summary: A Provider-Defined Identifier (PID) is an opaque string identifying an aggregation of network endpoints (e.g., a subnet, POP, or AS). PIDs are defined in an ALTO network map and serve as the primary abstraction for compactly expressing path costs between groups of endpoints.
