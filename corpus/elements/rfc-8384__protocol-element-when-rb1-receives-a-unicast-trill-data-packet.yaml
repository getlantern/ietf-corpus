document: rfc-8384
kind: protocol-element
summary: 'When RB1 receives a unicast TRILL Data packet destined for a Smart Endnode''s MAC, it forwards the packet still encapsulated: the outer Ethernet destination is the Smart Endnode''s MAC, and RB1 decrements the hop count by 1 to account for the RB1-to-Smart-Endnode hop.'
section: "5.2"
