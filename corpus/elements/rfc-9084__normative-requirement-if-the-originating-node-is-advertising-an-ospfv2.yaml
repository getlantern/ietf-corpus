document: rfc-9084
kind: normative-requirement
summary: If the originating node is advertising an OSPFv2 Router Address TLV (RFC 3630) or an OSPFv3 Router IPv6 Address TLV (RFC 5329), that same address MUST be used in the Router Address field of the Prefix Source Router Address Sub-TLV.
section: "3"
rfc2119_level: MUST
topics:
    - routing
