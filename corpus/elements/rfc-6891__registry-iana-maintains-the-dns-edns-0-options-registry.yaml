kind: registry
summary: 'IANA maintains the DNS EDNS(0) Options registry (OPT Option Code space): codes 0–4 assigned, 5–65000 available for assignment, 65001–65534 for local/experimental use, 65535 reserved. New option code assignments require Expert Review; code 65535 is assigned to ''Reserved for future expansion''.'
