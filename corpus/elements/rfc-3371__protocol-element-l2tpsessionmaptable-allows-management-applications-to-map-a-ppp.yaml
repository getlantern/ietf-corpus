document: rfc-3371
kind: protocol-element
summary: l2tpSessionMapTable allows management applications to map a PPP or DS0 interface to a specific L2TP tunnel session. On the LAC it also maps physical or virtual PPP-terminating interfaces to tunnels, compensating for the inability to use ifStackTable at the LAC.
section: "3.4"
topics:
