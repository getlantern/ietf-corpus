document: rfc-5059
kind: protocol-element
summary: The BSR election uses a weight metric defined as the concatenation of the BSR Priority field (most-significant bits) and the BSR IP address (least-significant bits), treated as a fixed-precision unsigned integer. A C-BSR that hears a higher-weight C-BSR suppresses its own Bootstrap messages.
section: "3.1"
topics:
    - multicast
    - routing
