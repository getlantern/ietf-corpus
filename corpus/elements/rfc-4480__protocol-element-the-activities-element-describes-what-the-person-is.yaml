document: rfc-4480
kind: protocol-element
summary: The <activities> element describes what the person is currently doing, expressed as an enumeration of activity-describing child elements (e.g., <meeting/>, <travel/>, <vacation/>). A person may be engaged in multiple activities simultaneously, and the element may carry 'from' and 'until' temporal attributes.
section: "3.2"
topics:
