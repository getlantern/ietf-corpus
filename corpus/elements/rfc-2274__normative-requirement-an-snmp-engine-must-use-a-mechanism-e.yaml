document: rfc-2274
kind: normative-requirement
summary: An SNMP engine MUST use a mechanism (e.g., msgID) to match incoming Responses to outstanding Requests and MUST drop any Response that does not match an outstanding Request.
section: 1.5.2
rfc2119_level: MUST
topics:
