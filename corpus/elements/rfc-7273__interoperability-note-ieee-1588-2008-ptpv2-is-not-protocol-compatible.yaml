document: rfc-7273
kind: interoperability-note
summary: IEEE 1588-2008 (PTPv2) is not protocol compatible with IEEE 1588-2002 (PTPv1), and each requires distinct version tokens (`IEEE1588-2008` vs. `IEEE1588-2002`) in SDP. IEEE 802.1AS-2011 is a Layer-2-only profile of IEEE 1588-2008 supporting only numeric domain 0.
