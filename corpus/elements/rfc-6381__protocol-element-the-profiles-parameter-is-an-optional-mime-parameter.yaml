document: rfc-6381
kind: protocol-element
summary: The 'profiles' parameter is an OPTIONAL MIME parameter whose value is a single profile identifier or a comma-separated list of identifiers indicating the profile(s) of the overall container format to which the file claims conformance. It applies to box-structured files with an initial box containing compatibility brands (ISO Base Media File Format and QuickTime families).
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
