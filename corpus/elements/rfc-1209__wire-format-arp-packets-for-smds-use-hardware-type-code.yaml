kind: wire-format
summary: ARP packets for SMDS use hardware type code 14 (0x0E), protocol type 2048 (0x0800) for IP, hardware address length 8 (SMDS address size in octets), protocol address length 4, and operation code 1 (request) or 2 (reply).
