document: rfc-4807
kind: normative-requirement
summary: Objects with SpdAdminStatus set to disabled MUST NOT be used by the packet processing engine. If a rule's spdRuleDefAdminStatus is disabled, processing MUST continue as if the rule's filter had effectively failed.
section: "6"
rfc2119_level: MUST NOT
topics:
