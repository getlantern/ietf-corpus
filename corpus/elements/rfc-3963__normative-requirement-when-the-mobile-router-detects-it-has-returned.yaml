document: rfc-3963
kind: normative-requirement
summary: When the Mobile Router detects it has returned to its home link, it MUST de-register with its Home Agent. When sending a de-registration Binding Update in Explicit mode, it SHOULD NOT include Mobile Network Prefix options; on receipt the Home Agent deletes all associated Mobile Network Prefix routes.
section: "5.8"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
