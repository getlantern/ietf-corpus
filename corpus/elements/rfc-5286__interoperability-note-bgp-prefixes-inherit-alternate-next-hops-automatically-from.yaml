document: rfc-5286
kind: interoperability-note
summary: 'BGP prefixes inherit alternate next-hops automatically from IGP: BGP resolves its next-hop to the AS exit router via IGP routes, and the IGP-computed LFA for that exit router''s router-id becomes BGP''s alternate. The BGP decision process is unaltered. Multicast BGP routes do not copy alternate next-hops.'
section: "6.4"
topics:
    - routing
    - ip
    - bgp
