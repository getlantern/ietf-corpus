document: rfc-2228
kind: protocol-element
summary: 'A new 6yz reply class is introduced for protected replies: 631 (integrity protected), 632 (integrity and confidentiality protected), 633 (confidentiality protected). The text part is a base 64 encoded message produced by the security mechanism. Multiline 6yz replies must protect and encode each fragment separately, with each continuation line formed as ''code-base64fragment''.'
section: "5.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
