document: rfc-5519
kind: protocol-element
summary: mgmdRouterInterfaceLastMemberQueryInterval (Unsigned32 0..31744, tenths of seconds, default 10) is the Max Query Response Interval inserted into group-specific queries sent in response to Leave Group messages; reducing it decreases leave latency. This value is irrelevant if mgmdRouterInterfaceVersion is 1.
section: "5"
topics:
