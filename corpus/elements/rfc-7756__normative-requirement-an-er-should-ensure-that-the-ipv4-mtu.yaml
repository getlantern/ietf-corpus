document: rfc-7756
kind: normative-requirement
summary: An ER SHOULD ensure that the IPv4 MTU presented to applications or downstream nodes equals the configured IPv6 Path MTU minus 20 bytes, preventing IPv6 fragmentation. A node-based ER sets this on the virtual adapter; a network-based ER advertises it via the DHCPv4 Interface MTU option (RFC 2132).
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
