document: rfc-1237
kind: design-rationale
summary: NSAPs must be assigned along topological rather than purely administrative or organizational boundaries. Administrative and organizational boundaries often diverge from network topology, and misalignment prevents routing data abstraction, resulting in flat inter-domain routing that does not scale to very large internets.
section: "4"
topics:
    - routing
