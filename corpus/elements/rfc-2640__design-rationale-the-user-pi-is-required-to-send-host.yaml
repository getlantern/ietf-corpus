document: rfc-2640
kind: design-rationale
summary: The user-PI is required to send HOST or LANG before any other command so that the server can distinguish compliant from legacy clients and adjust its behavior accordingly; this mechanism avoids breaking the large installed base of older FTP clients.
section: "4.1"
