document: rfc-8974
kind: normative-requirement
summary: If a server receives a request with a token within the advertised limit but is unable to handle it, it MUST NOT treat the request as a message-format error; instead it SHOULD return a 5.03 (Service Unavailable) response.
section: 2.2.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
