document: rfc-5063
kind: security-consideration
summary: 'The procedures cannot be used to create false forwarding state: a restarting node that receives a RecoveryPath message not matching existing forwarding state MUST NOT create or modify forwarding state to match, and SHOULD log such an event as a potential attack indicator.'
