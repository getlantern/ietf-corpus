document: rfc-4043
kind: privacy-consideration
summary: The permanent identifier allows organizations to create links between different certificates associated with an entity across overlapping or non-overlapping validity periods. This ability to link certificates conflicts with privacy, and CAs must clearly disclose plans to issue such certificates to potential subjects.
section: "4"
topics:
    - pkix
    - privacy
