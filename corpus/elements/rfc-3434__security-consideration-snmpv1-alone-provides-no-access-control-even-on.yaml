document: rfc-3434
kind: security-consideration
summary: SNMPv1 alone provides no access control even on a secure network. Implementors are recommended to use the SNMPv3 framework, specifically USM (STD 62, RFC 3414) and VACM (STD 62, RFC 3415), to control GET/SET access to HC-ALARM-MIB objects.
section: "10"
topics:
