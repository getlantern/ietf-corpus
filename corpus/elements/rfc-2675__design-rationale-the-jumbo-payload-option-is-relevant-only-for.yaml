document: rfc-2675
kind: design-rationale
summary: The Jumbo Payload option is relevant only for nodes attached to links with MTU greater than 65,575 octets (65,535 + 40-byte IPv6 header), and need not be implemented by nodes that do not support such large-MTU links, keeping the option optional for most deployments.
