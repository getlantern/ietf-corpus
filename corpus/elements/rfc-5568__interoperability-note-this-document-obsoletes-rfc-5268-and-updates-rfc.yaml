document: rfc-5568
kind: interoperability-note
summary: This document obsoletes RFC 5268 and updates RFC 4068. It deprecates ICMPv6-format HI and HAck messages from RFC 5268 and specifies Mobility Header formats instead. Implementations receiving RFC 5268-style ICMPv6 HI/HAck MAY interpret them per RFC 5268 for backward compatibility.
section: "8"
topics:
    - mobility
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
