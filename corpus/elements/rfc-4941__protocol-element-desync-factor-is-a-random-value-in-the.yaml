document: rfc-4941
kind: protocol-element
summary: DESYNC_FACTOR is a random value in the range [0, MAX_DESYNC_FACTOR] computed once at system start, ensuring clients do not synchronize address regeneration. It must never exceed (TEMP_VALID_LIFETIME - REGEN_ADVANCE). MAX_DESYNC_FACTOR is 10 minutes.
section: "5"
