document: rfc-5428
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers SHOULD deploy SNMPv3 with full cryptographic security (authentication and privacy) for access to this MIB module.
