document: rfc-3986
kind: interoperability-note
summary: Some older erroneous implementations fail to separate a reference's query and/or fragment component from the path before merging base and reference paths, causing interoperability failures when query or fragment data contains the strings "/../" or "/./".
section: 5.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
