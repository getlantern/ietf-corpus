document: rfc-3986
kind: interoperability-note
summary: Some older, erroneous implementations fail to separate a reference's query and/or fragment components from the path component before merging with the base path and removing dot-segments. This causes interoperability failures when query or fragment strings contain "/./" or "/../".
section: 5.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
