document: rfc-7484
kind: interoperability-note
summary: When a new object is allocated (new AS range, TLD, or IP address range), there is no guarantee its entry will appear promptly in the corresponding bootstrap registry; the RDAP server setup may go live and be registered later. Clients must tolerate missing entries for newly allocated objects.
section: "8"
topics:
    - registry
