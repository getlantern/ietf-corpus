document: rfc-8004
kind: normative-requirement
summary: When an R1 is replying to a relayed I1, the check that a system has sent an I1 to the R1's originator (state I1-SENT check) SHOULD be based on HITs only; if IP addresses are also checked, the source IP address MUST be checked against the IP address in the VIA_RVS parameter.
section: 4.3.4
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
