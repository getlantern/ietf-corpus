document: rfc-9183
kind: normative-requirement
summary: RBridges supporting and configured for single-nickname multilevel MUST also support unique-nickname multilevel (RFC 8397). If any border RBridge for an L1 area supports only unique-nickname multilevel, all single-nickname-configured border RBridges for that area MUST fall back to unique-nickname behavior. Operators SHOULD be notified when this fallback occurs.
section: "8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
