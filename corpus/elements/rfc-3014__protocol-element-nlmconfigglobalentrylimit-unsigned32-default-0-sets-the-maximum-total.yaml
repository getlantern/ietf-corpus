summary: nlmConfigGlobalEntryLimit (Unsigned32, default 0) sets the maximum total number of notification entries across all logs; 0 means no limit. nlmConfigGlobalAgeOut (Unsigned32, units minutes, default 1440) sets the age after which Notifications MAY be removed; 0 means no age out.
