document: rfc-8231
kind: normative-requirement
summary: Each LSP Update Request in PCUpd MUST contain all LSP parameters the PCE wishes to set. PCErr and PCRpt messages triggered by a PCUpd MUST include the SRP-ID-number from the triggering PCUpd for correlation. PCRpt messages MUST NOT be pruned from the PCC's egress queue.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
