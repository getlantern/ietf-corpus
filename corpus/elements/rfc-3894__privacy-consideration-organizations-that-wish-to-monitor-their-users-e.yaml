document: rfc-3894
kind: privacy-consideration
summary: Organizations that wish to monitor their users' e-mail traffic must familiarize themselves with local data protection laws before creating stores of old e-mail traffic without the knowledge or consent of senders or intended recipients. Organizations using "redirect :copy" for legal monitoring should set users' privacy expectations correctly.
section: "4"
topics:
    - email
    - privacy
