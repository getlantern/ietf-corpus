document: rfc-1655
kind: design-rationale
summary: AS's are classified as stub (single connection, local traffic only), multihomed (multiple connections, refuses transit), or transit (multiple connections, carries transit traffic). A major goal of BGP usage is to control the flow of transit traffic.
