document: rfc-4013
kind: security-consideration
summary: 'Application of SASLprep may affect the feasibility of brute force and dictionary attacks: while the number of possible prepared strings is less than the number of possible Unicode strings, the number of usable names and passwords is greater than if only ASCII were used.'
