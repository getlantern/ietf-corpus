document: rfc-6122
kind: protocol-element
summary: The Nodeprep stringprep profile applies to XMPP localparts. It uses Unicode 3.2, maps via stringprep Tables B.1 and B.2, normalizes to Unicode NFC-KC, prohibits stringprep Tables C.1.1 through C.9, and additionally prohibits the ASCII characters '"', '&', "'", '/', ':', '<', '>', and '@'.
section: A
topics:
    - security
