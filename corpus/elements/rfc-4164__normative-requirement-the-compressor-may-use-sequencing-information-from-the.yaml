document: rfc-4164
kind: normative-requirement
summary: The compressor MAY use sequencing information from the last acknowledgement received to determine which fields can safely be replicated, avoiding replication of fields that have changed significantly from the state corresponding to the acknowledged packet.
section: 3.3.3.1
