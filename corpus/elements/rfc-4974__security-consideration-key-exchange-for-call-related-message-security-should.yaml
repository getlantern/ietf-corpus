document: rfc-4974
kind: security-consideration
summary: Key exchange for Call-related message security should be configured or arranged dynamically per deployment per RFC 4107. Since Call endpoints are not necessarily IP-adjacent in the control plane, key exchange must be treated as a remote procedure; IKEv2 (RFC 4306) is particularly suggested by RFC 3473.
section: "9.1"
topics:
    - security
    - mpls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
