document: rfc-7442
kind: security-consideration
summary: All security considerations for mLDP (RFC 6388) apply to this specification. From a security standpoint, the use of Transit Shared Tree TLVs is no different from the use of Transit Source TLVs defined in RFC 6826; no additional security risks are introduced.
