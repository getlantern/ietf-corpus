document: rfc-3471
kind: interoperability-note
summary: The Generalized Label carries only a single level of label hierarchy; it is non-hierarchical. When multiple levels of label (LSPs within LSPs) are required, each LSP must be established separately using the LSP hierarchy mechanisms defined in [MPLS-HIERARCHY].
section: "3.2"
topics:
