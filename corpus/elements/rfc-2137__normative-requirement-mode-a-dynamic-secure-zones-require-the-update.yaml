document: rfc-2137
kind: normative-requirement
summary: Mode A dynamic secure zones require the update requester to provide SIG RRs that will authenticate the post-update state of all RR sets changed by the update that are non-empty after the update. The request must also delete any previous data SIG RRs invalidated by the request.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
