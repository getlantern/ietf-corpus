document: rfc-7377
kind: normative-requirement
summary: If the SEARCHRES extension is used in an ESEARCH command, that command MUST be executed after all previous SEARCH/ESEARCH commands complete and before any subsequent ones; the server MAY run consecutive ESEARCH commands in parallel only when none use SEARCHRES.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
