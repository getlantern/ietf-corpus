document: rfc-5103
kind: normative-requirement
summary: In core network deployments with no stable perimeter and no ability to determine initiator/responder, the Metering Process MAY assign Biflow Source and Destination arbitrarily, but SHOULD be consistent in its choice and SHOULD maintain direction for the lifetime of the Biflow even across active timeouts.
section: "5.3"
rfc2119_level: MAY
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
