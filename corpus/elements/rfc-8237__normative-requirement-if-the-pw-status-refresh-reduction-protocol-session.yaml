document: rfc-8237
kind: normative-requirement
summary: If the PW status refresh reduction protocol session is terminated (entering INACTIVE or STARTUP), the PE MUST immediately resend all previously sent PW status messages for that LSP, and the Refresh Timer value MUST NOT be set to 0.
section: "3"
rfc2119_level: MUST
