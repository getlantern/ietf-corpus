document: rfc-8046
kind: normative-requirement
summary: The host receiving a LOCATOR_SET MUST detect and avoid reprocessing a LOCATOR_SET parameter that is redundant with one recently received and processed, because the same UPDATE may be sent in parallel to multiple peer addresses including an RVS.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
    - mobility
