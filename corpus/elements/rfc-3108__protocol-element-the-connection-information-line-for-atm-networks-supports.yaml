document: rfc-3108
kind: protocol-element
summary: 'The connection information line for ATM networks supports three <addressType> values: NSAP (40 hex-digit dotted notation), E164 (decimal number up to 15 digits), and GWID or ALIAS (alphanumeric string up to 32 characters identifying a gateway or node alias). Each of the three fields may be independently wildcarded to ''$'' or ''-''.'
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
