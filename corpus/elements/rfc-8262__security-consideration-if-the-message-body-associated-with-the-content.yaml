document: rfc-8262
kind: security-consideration
summary: If the message-body associated with the Content-ID header field is an encrypted body, it MUST NOT be possible to derive a key that can be used to decrypt the body from the Content-ID header field value.
section: "7"
rfc2119_level: MUST NOT
