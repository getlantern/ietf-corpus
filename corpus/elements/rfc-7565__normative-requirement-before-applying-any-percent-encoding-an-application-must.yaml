document: rfc-7565
kind: normative-requirement
summary: Before applying any percent-encoding, an application MUST ensure that the userpart consists only of Unicode code points conforming to the PRECIS IdentifierClass (RFC 7564), and the host consists only of Unicode code points conforming to RFC 5892.
section: "6"
rfc2119_level: MUST
