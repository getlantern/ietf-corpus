document: rfc-9917
kind: normative-requirement
summary: The IS-IS FAERAG Sub-TLV MUST NOT appear more than once in a single IS-IS FAD Sub-TLV. If it appears more than once, the IS-IS FAD Sub-TLV MUST be ignored by the receiver.
section: "5"
rfc2119_level: MUST NOT
topics:
