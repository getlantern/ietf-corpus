document: rfc-8323
kind: security-consideration
summary: A peer MUST NOT assume that a successful connection to an Alternative-Address (received in a Release message) inherits all the security properties of the current connection. The guidance from an Alternative-Address Option cannot be followed blindly.
section: "10.1"
rfc2119_level: MUST NOT
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
