document: rfc-1990
kind: design-rationale
summary: Senders SHOULD avoid keeping member links idle because M is not incremented on idle links, delaying the receiver's ability to detect lost fragments. Senders SHOULD rotate traffic among all member links when total traffic would not overflow a single link.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
