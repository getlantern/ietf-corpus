document: rfc-3687
kind: normative-requirement
summary: 'A ComponentAssertion is Undefined if: (a) the matching rule is unknown; (b) the rule is not applicable to the referenced component type even after type substitutions; (c) the assertion value does not conform to the rule''s assertion syntax; (d) an open type in the value cannot be decoded; or (e) the implementation does not support the combination.'
section: "3.2"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
