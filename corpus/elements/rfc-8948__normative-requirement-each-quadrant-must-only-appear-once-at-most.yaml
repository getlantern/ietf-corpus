document: rfc-8948
kind: normative-requirement
summary: Each quadrant MUST only appear once at most in the QUAD option. If more than one occurrence of the same quadrant identifier appears, only the first occurrence is processed and the rest MUST be ignored by the server.
section: "4.1"
rfc2119_level: MUST
topics:
