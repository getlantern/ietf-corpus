document: rfc-8779
kind: normative-requirement
summary: If a PCEP speaker supports the extensions of this specification but did not advertise GMPLS-CAPABILITY, upon receipt of a message including an extension defined in this document, it MUST generate a PCErr with Error-Type=10 and Error-value=31 (Missing GMPLS-CAPABILITY TLV), and it SHOULD terminate the PCEP session.
section: 2.1.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
