document: rfc-4149
kind: interoperability-note
summary: 'The DISMAN pingMIB and tracerouteMIB (RFC 2925) provide active probes oriented toward connectivity determination, not quality measurement. The SSPM-MIB fills a complementary role: measuring the quality of connectivity. Both should be monitored with the same probes to reduce network overhead.'
section: "5.2"
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
