document: rfc-3281
kind: normative-requirement
summary: ACs conforming to this profile MUST use the v2Form choice for the issuer, which MUST contain exactly one GeneralName in the issuerName with a non-empty distinguished name in the directoryName field. The baseCertificateID and objectDigestInfo fields MUST be omitted from V2Form.
section: 4.2.3
rfc2119_level: MUST
topics:
    - pkix
    - security
