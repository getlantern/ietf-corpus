document: rfc-4896
kind: normative-requirement
summary: A compressor MUST NOT use more than the most recently advertised resources. Reducing advertised resources SHOULD NOT be done unless absolutely necessary; if reduced, memory MUST NOT be reclaimed until the remote endpoint acknowledges the advertisement. Both endpoints MUST delete state according to retention priority to accommodate an SMS reduction.
section: "10.2"
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
