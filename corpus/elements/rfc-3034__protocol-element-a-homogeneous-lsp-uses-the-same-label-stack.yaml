document: rfc-3034
kind: protocol-element
summary: A homogeneous LSP uses the same label stack encoding on every hop. A heterogeneous LSP uses different encodings on different hops (e.g., Frame Relay DLCI on one segment, Generic MPLS shim on another); each boundary LSR must decode the incoming encoding, operate on the label stack, and re-encode for the outgoing interface.
section: "5.2"
topics:
    - mpls
