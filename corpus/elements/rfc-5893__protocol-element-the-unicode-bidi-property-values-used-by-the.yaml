summary: 'The Unicode Bidi property values used by the rule are: L (left-to-right), R (right-to-left), AL (Arabic letter), EN (European number), ES (European number separator), ET (European number terminator), AN (Arabic number), CS (common number separator), NSM (nonspacing mark), BN (boundary neutral), ON (other neutrals). Directional control characters (LRE, LRO, RLE, RLO, PDF) are not used in IDNA labels.'
