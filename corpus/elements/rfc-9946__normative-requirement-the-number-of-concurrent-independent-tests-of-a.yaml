document: rfc-9946
kind: normative-requirement
summary: The number of concurrent independent tests of a path SHALL be limited to one, regardless of the number of flows, to prevent measurement impairment and additional congestion on the bottleneck.
section: "4.2"
rfc2119_level: MUST
topics:
