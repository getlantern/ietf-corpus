document: rfc-6486
kind: interoperability-note
summary: When a CA performs a key rollover and two CA instances simultaneously publish to the same repository publication point, each CA instance publishes its own manifest describing only its own products. There will thus be multiple current manifests at the publication point.
section: "5.2"
topics:
