document: rfc-7705
kind: interoperability-note
summary: Implementations MAY support a flexible model where the eBGP speaker attempts to open the session using either the 'Local AS' or the globally configured ASN. If the session establishes to the globally configured ASN, the AS_PATH modifications described in this document SHOULD NOT be performed, as they are unnecessary.
section: "3.3"
topics:
    - bgp
    - routing
