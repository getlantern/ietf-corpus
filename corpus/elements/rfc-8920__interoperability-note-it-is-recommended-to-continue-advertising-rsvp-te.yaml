document: rfc-8920
kind: interoperability-note
summary: It is RECOMMENDED to continue advertising RSVP-TE link attributes in the existing OSPFv2 TE Opaque LSA and OSPFv3 Intra-Area-TE-LSA for backwards compatibility; RSVP-TE can eventually use application-specific advertisements only for newly defined link attributes designated as application-specific.
