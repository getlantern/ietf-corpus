document: rfc-5140
kind: protocol-element
summary: 'Two new TRIP address families are defined: TrunkGroup (code 4) and Carrier (code 5). These flat (non-hierarchical) address families allow AvailableCircuits, TotalCircuitCapacity, and CallSuccess to be reported at the granularity of a trunkgroup or carrier rather than a prefix, enabling more accurate and scalable resource reporting.'
