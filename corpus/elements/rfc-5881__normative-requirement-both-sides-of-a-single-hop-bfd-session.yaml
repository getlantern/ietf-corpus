document: rfc-5881
kind: normative-requirement
summary: Both sides of a single-hop BFD session MUST take the 'Active' role, sending initial BFD Control packets with a zero value of Your Discriminator. Any BFD packet from the remote machine with a zero Your Discriminator MUST be associated with the session bound to the remote system, interface, and protocol.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - security
