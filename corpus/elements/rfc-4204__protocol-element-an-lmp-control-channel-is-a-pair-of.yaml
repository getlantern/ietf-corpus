document: rfc-4204
kind: protocol-element
summary: An LMP control channel is a pair of mutually reachable IP interfaces identified by a 32-bit node-wide unique CC_Id. All LMP packets run over UDP with an LMP port number, except Test messages which may use in-band transport over data links.
