document: rfc-2456
kind: normative-requirement
summary: Notifications are only sent for row creation if the new state is active (or operational/true). This rule prevents sending a notification when a row is created with an inactive initial state, which would then immediately be followed by another notification upon activation.
section: "3"
rfc2119_level: SHOULD
topics:
    - snmp
