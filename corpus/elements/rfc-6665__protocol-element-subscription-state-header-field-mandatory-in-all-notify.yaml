document: rfc-6665
kind: protocol-element
summary: 'Subscription-State header field: mandatory in all NOTIFY requests; value is ''active'', ''pending'', or ''terminated''. For active/pending, MUST include an ''expires'' parameter. For terminated, SHOULD include a ''reason'' parameter (deactivated, probation, rejected, timeout, giveup, noresource, invariant) and optionally a ''retry-after'' parameter.'
section: 8.2.3
topics:
    - sip
    - realtime
