document: rfc-3031
kind: protocol-element
summary: Penultimate Hop Popping (PHP) allows the penultimate LSR in an LSP to pop the top label before forwarding, so the LSP egress receives the packet with the label it actually needs for its own forwarding decision (or as a plain network layer packet), requiring only one lookup instead of two.
section: "3.16"
topics:
    - routing
