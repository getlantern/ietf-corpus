document: rfc-4273
kind: state-machine
summary: 'The bgpPeerState object models the BGP FSM with six states: idle(1), connect(2), active(3), opensent(4), openconfirm(5), and established(6), mirroring the RFC 4271 Section 8.2.2 FSM. Notifications fire on entry to established and on backward transitions.'
