document: rfc-4282
kind: protocol-element
summary: When routing through a mediating realm is required, an NAI of the form 'user@homerealm.example.net' MAY be encoded as 'homerealm.example.net!user@otherrealm.example.net'. The part before the unescaped '!' MUST be a realm name as defined in Section 2.1 ABNF. This encoding may be applied recursively for multiple mediating realms.
section: "2.7"
topics:
    - radius
    - diameter
