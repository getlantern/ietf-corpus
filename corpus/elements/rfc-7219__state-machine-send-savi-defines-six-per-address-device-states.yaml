document: rfc-7219
kind: state-machine
summary: 'SEND SAVI defines six per-(address, device) states: NO_BIND (no binding), TENTATIVE_DAD (DAD_NSOL received, awaiting DAD outcome), TENTATIVE_NUD (data received without prior binding, NUD_NSOL issued), VALID (ownership confirmed, packets forwarded), TESTING_VP (periodic NUD ownership check on current anchor port), and TESTING_VP'' (conflict from alternate port detected, testing existing anchor while holding alternative). Transitions are triggered by reception of DAD_NSOL, DAD_NADV, NUD_NADV, data packets, or LIFETIME expiry.'
section: 3.3.2
topics:
    - ip
    - security
