document: rfc-7865
kind: privacy-consideration
summary: An SRC MAY by policy limit the parts of metadata sent to the SRS. The SRS MUST NOT record additional metadata beyond what local policy requires (data minimization principle). UUID generation MUST NOT use personally identifying information, and implementations using Name-Based UUIDs should use a non-PII namespace ID.
section: "10"
topics:
