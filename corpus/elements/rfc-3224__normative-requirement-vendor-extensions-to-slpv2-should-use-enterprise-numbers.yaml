document: rfc-3224
kind: normative-requirement
summary: Vendor Extensions to SLPv2 SHOULD use Enterprise Numbers to avoid any possibility of a name space collision. Each vendor is responsible for ensuring that vendor extensions under their own authority are non-conflicting.
section: "2.0"
rfc2119_level: SHOULD
topics:
