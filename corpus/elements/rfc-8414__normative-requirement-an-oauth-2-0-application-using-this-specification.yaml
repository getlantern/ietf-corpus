document: rfc-8414
kind: normative-requirement
summary: An OAuth 2.0 application using this specification MUST specify what well-known URI suffix it will use. The well-known URI suffix used MUST be registered in the IANA 'Well-Known URIs' registry.
section: "3"
rfc2119_level: MUST
