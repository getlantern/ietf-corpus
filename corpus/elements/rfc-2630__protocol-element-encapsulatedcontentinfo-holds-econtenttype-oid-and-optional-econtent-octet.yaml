document: rfc-2630
kind: protocol-element
summary: EncapsulatedContentInfo holds eContentType (OID) and optional eContent (OCTET STRING). When eContent is absent the structure represents an external signature where the signed content is conveyed out-of-band; signature generation proceeds as if eContent were present.
section: "5.2"
topics:
