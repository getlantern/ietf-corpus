document: rfc-5026
kind: normative-requirement
summary: It is RECOMMENDED that the DNS server return the IP addresses of the Home Agents in AAAA records as part of the additional data section of the SRV reply, to avoid requiring an additional DNS round trip.
section: 5.1.2
rfc2119_level: RECOMMENDED
topics:
