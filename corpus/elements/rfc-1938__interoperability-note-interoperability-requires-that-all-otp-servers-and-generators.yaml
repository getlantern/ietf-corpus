document: rfc-1938
kind: interoperability-note
summary: Interoperability requires that all OTP servers and generators use the same standard dictionary (originally from RFC 1760, reproduced in Appendix C). Generators supporting pass-phrases longer than 63 characters risk loss of interchangeability with conforming implementations.
section: "6.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
