document: rfc-8201
kind: normative-requirement
summary: A node must not reduce its estimate of the Path MTU below the IPv6 minimum link MTU on receipt of a Packet Too Big message. If a Packet Too Big message reports a next-hop MTU less than the IPv6 minimum link MTU, the node must discard it.
section: "4"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
