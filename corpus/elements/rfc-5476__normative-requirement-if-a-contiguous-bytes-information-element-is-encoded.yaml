document: rfc-5476
kind: normative-requirement
summary: If a contiguous-bytes Information Element is encoded with a fixed-length field that is too long for the selected packet, padding MUST NOT be used; instead the Exporting Process MUST export a new Template Record with the correct fixed-length or a variable-length field.
section: 6.4.1
rfc2119_level: MUST NOT
