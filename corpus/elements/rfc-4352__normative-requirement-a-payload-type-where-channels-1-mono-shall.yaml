document: rfc-4352
kind: normative-requirement
summary: A payload type where channels=1 (mono) SHALL only carry mono content; a payload type with channels=2 MAY carry both mono and stereo. When the 'interleaving' parameter is absent, interleaved mode SHALL NOT be used.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
