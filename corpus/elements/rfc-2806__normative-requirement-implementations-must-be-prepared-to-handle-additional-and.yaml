document: rfc-2806
kind: normative-requirement
summary: Implementations MUST be prepared to handle additional and/or unknown parameters gracefully but MUST NOT use a URL that contains unknown parameters, as they may be vital for correct interpretation. Instead, the implementation SHOULD report an error to the user.
section: 2.5.11
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
