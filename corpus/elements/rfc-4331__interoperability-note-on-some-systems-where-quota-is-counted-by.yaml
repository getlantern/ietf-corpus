document: rfc-4331
kind: interoperability-note
summary: On some systems where quota is counted by collection, a sub-collection's quota may be larger than the parent collection's quota (e.g., /~milele/ capped at 100 MB but /~milele/public/ unlimited). Changing a parent collection's quota does not necessarily require changing descendant collection quotas.
section: "7"
topics:
