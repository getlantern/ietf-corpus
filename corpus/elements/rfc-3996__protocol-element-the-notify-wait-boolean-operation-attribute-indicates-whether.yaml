document: rfc-3996
kind: protocol-element
summary: The 'notify-wait' (boolean) operation attribute indicates whether the Notification Recipient requests Event Wait Mode. If 'true', the Printer keeps the connection open and sends Event Notifications as they occur; if 'false' or omitted, no Event Wait Mode is requested.
section: 5.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
