document: rfc-5865
kind: interoperability-note
summary: This document updates RFC 4542 and RFC 4594. The Telephony Service Class in RFC 4594 does not involve dynamic capacity admission; this document adds a separate Admitted Telephony Class. Capacity admission is also added to three RFC 4594 video classes (CS4, CS3 for VoD, AF4).
