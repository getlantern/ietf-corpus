document: rfc-5796
kind: design-rationale
summary: The Extended Sequence Number (ESN) with a 64-bit counter is recommended for manual keying because a PIM router can never exhaust the 2^64-1 packet sequence space in its lifetime, making sequence number rollover a non-issue and allowing manual keys to remain viable without forced rekeying due to counter exhaustion.
section: "14"
topics:
