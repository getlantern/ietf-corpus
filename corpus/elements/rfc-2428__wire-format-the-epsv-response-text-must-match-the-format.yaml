document: rfc-2428
kind: wire-format
summary: 'The EPSV response text MUST match the format: <text>(<d><d><d><tcp-port><d>). The first two fields inside the parentheses MUST be blank; the third field MUST be the TCP port number string. Example: ''Entering Extended Passive Mode (|||6446|)''.'
