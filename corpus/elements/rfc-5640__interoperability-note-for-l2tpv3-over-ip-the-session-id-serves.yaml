document: rfc-5640
kind: interoperability-note
summary: For L2TPv3-over-IP, the Session ID serves as the load-balancing field; for GRE, the GRE Key (RFC 2890) serves this role. The load-balancing block mechanism is not defined for IP-in-IP (tunnel type 7).
