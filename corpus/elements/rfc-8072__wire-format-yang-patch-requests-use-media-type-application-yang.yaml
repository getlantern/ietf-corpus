document: rfc-8072
kind: wire-format
summary: YANG Patch requests use media type 'application/yang-patch+xml' or 'application/yang-patch+json' with UTF-8 charset. The 'value' anydata node is only present for 'create', 'merge', 'replace', and 'insert' operations and contains the target resource encoded per RFC 7950 (XML) or RFC 7951 (JSON).
section: "2.2"
