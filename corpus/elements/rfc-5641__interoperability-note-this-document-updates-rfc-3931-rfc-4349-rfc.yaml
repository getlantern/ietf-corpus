document: rfc-5641
kind: interoperability-note
summary: This document updates RFC 3931, RFC 4349, RFC 4454, RFC 4591, and RFC 4719 to adopt the generalized (A) bit definition and to deprecate the (N) bit; it also removes two sentences from RFC 4719 Section 2.2(c) that mandated specific N bit values in ICRQ/ICRP and ICCN/SLI messages.
