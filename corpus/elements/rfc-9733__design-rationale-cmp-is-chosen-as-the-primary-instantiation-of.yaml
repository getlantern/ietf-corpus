document: rfc-9733
kind: design-rationale
summary: CMP is chosen as the primary instantiation of BRSKI-AE over CMC and SCEP because CMP has broader industry adoption than CMC, and SCEP has unspecified issues. The Lightweight CMP Profile (LCMPP) provides a well-specified and sufficient subset for BRSKI-AE requirements.
