document: rfc-4501
kind: normative-requirement
summary: Relative dnsname values (those not ending with '.') are assumed to be relative to the root, so 'dns:host.example' and 'dns:host.example.' refer to the same owner name. An empty dnsname is interpreted as the root ('.').
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - dns
