document: rfc-3320
kind: design-rationale
summary: The locally available state_retention_priority of 65535 is reserved exclusively for locally available state items, ensuring they are always freed before application-created state when compartment memory is exhausted, preventing local state from interfering with remotely requested state.
section: "6.2"
