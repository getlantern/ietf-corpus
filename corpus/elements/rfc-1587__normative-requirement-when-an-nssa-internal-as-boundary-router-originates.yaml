document: rfc-1587
kind: normative-requirement
summary: When an NSSA internal AS boundary router originates a type-7 LSA intended for translation, it must set the P-bit and include a valid forwarding address. If a router is simultaneously an NSSA area border router and an ASBR, it must reset the P-bit in the type-7 LSA to prevent re-translation by another border router.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
