document: rfc-9026
kind: normative-requirement
summary: When using (C-S,C-G) counter information in a context with fast restoration mechanisms, a configurable timer MUST be set on the downstream PE to wait before updating the UMH; a timeout of three seconds is suggested as a suitable default.
section: 3.1.5
rfc2119_level: MUST
topics:
    - vpn
    - multicast
    - routing
