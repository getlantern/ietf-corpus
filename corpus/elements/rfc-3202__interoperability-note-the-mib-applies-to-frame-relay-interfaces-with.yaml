document: rfc-3202
kind: interoperability-note
summary: The MIB applies to frame relay interfaces with ifType frameRelay(32) or frameRelayService(44). Proprietary reference points (otherTxLocalRP, otherRxLocalRP, etc.) MAY exist anywhere in the network not covered by the standard reference points; their meaning is defined by the device manufacturer.
