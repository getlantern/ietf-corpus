document: rfc-2273
kind: normative-requirement
summary: A proxy forwarder application MUST NOT register a contextEngineID value equal to the snmpEngineID of its associated SNMP engine, to prevent the proxy from intercepting messages intended for local command responders.
section: 3.5.1.1
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
