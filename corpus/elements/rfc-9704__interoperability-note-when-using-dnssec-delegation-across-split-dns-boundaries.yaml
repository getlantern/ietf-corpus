document: rfc-9704
kind: interoperability-note
summary: When using DNSSEC delegation across split DNS boundaries, any claimed subdomains that lack a globally trusted DNSKEY MUST be marked as unsigned in the public DNS; otherwise local resolution results would be rejected by validating stubs not implementing this specification.
