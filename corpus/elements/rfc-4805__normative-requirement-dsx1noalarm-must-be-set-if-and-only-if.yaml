document: rfc-4805
kind: normative-requirement
summary: dsx1NoAlarm must be set if and only if no other flag is set in the dsx1LineStatus bitmap. This invariant ensures that a zero-alarm condition is unambiguously represented and distinguishable from any alarm combination.
section: "4"
rfc2119_level: MUST
topics:
