document: rfc-1996
kind: normative-requirement
summary: Conforming implementations must set AUCOUNT=0 and ADCOUNT=0 in NOTIFY requests. Current implementations must ignore (but not discard) the authority and additional sections if present, since future revisions may define backwards-compatible uses for them.
section: "3.9"
rfc2119_level: MUST
topics:
    - dns
