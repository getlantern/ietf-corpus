document: rfc-2115
kind: protocol-element
summary: frCircuitTable is indexed by (frCircuitIfIndex, frCircuitDlci) and contains per-virtual-circuit statistics and configuration including state, FECN/BECN counters, sent/received frame and octet counts, committed burst, excess burst, throughput, multicast type, discard counts, DE flag counters, and row status. The management virtual circuit (DLCI 0) is included in this table.
section: "6.2"
topics:
    - congestion
