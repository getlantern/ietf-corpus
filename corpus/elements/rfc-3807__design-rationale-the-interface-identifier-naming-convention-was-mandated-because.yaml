document: rfc-3807
kind: design-rationale
summary: The Interface Identifier naming convention was mandated because IUA identifies C-channels by endpoints without link association, yet V5 System Management requires full knowledge of signaling and bearer channels per link for protection switching and bearer channel allocation. Without the convention, there is no guarantee a C-channel is on the link it claims.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
