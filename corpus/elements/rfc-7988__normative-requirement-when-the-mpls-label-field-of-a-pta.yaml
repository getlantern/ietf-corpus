document: rfc-7988
kind: normative-requirement
summary: When the MPLS Label field of a PTA is not significant (e.g., in S-PMSI A-D or Inter-AS I-PMSI A-D routes specifying IR), it SHOULD be set to zero upon transmission and MUST be ignored upon reception.
section: "7"
rfc2119_level: MUST
topics:
