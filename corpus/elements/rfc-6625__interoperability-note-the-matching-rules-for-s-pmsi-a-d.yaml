document: rfc-6625
kind: interoperability-note
summary: 'The matching rules for S-PMSI A-D routes with wildcards are order-independent: the S-PMSI A-D route matched by a given (C-S,C-G) does not depend on the order in which routes were originated or received, only on their NLRI specificity according to the defined priority rules.'
section: "3"
topics:
