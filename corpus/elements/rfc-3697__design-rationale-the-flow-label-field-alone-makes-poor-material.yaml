document: rfc-3697
kind: design-rationale
summary: The Flow Label field alone makes poor material for a hash key, which is why nodes MUST NOT assume mathematical properties of Flow Label values and router performance SHOULD NOT depend on their distribution. This prevents routers from being built with assumptions that could be exploited to cause load imbalance.
section: "2"
