document: rfc-4513
kind: security-consideration
summary: Sessions without data integrity and privacy services (e.g., via StartTLS, IPsec, or SASL) are subject to man-in-the-middle attacks. Client and server implementers SHOULD use data protection services; a resultCode of confidentialityRequired indicates the server requires stronger data confidentiality.
section: "6.1"
topics:
    - ldap
    - security
    - tls
