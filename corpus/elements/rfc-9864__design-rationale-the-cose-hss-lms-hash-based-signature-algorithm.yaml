document: rfc-9864
kind: design-rationale
summary: The COSE HSS-LMS hash-based signature algorithm is polymorphic because the algorithm identifier does not specify the hash function. Like ECDH, this specification does not register replacement fully-specified algorithms, leaving this to future specifications.
