document: rfc-3204
kind: interoperability-note
summary: 'The ''base'' parameter enables graceful fallback: if a receiver does not recognize the ''version'' string, it may attempt to process the encapsulated ISUP using the identified ''base'' specification. Only base values with the compatibility flag ''yes'' support the ITU-T 1992 forward compatibility mechanism.'
section: "3.1"
topics:
    - sip
    - realtime
