document: rfc-5109
kind: protocol-element
summary: The Uneven Level Protection (ULP) algorithm applies independent XOR parity protection at multiple levels, each with its own protection length and packet mask. Lower-numbered levels cover the beginning of packets (more important data); a single FEC packet carries parity data for all its levels concatenated after their respective level headers.
