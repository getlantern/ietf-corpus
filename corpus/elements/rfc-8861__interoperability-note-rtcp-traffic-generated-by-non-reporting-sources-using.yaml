document: rfc-8861
kind: interoperability-note
summary: RTCP traffic generated by non-reporting sources using Reporting Groups may appear to observers unaware of these semantics as though those sources are experiencing a network disconnection. A congestion-control sender relying on RTCP might incorrectly infer complete congestion collapse, though this requires fairly sophisticated RTCP analysis.
section: "4.2"
topics:
    - rtp
    - realtime
    - congestion
