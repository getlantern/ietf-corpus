document: rfc-5512
kind: protocol-element
summary: The Protocol Type sub-TLV (type 2) contains a 2-octet payload protocol type using IANA Ethertype values (e.g., IPv4=0x0800, IPv6=0x86dd, MPLS=0x8847). It MUST be encoded for L2TPv3 and is not required for IP-in-IP or GRE tunnels.
section: "4.2"
topics:
    - bgp
    - routing
    - vpn
