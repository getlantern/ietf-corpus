kind: protocol-element
summary: 'The dsx3LineStatus object is a bitmap (INTEGER 1..4095) representing simultaneous failure and loopback states. Defined bit positions include: dsx3NoAlarm(1), dsx3RcvRAIFailure(2), dsx3RcvAIS(8), dsx3LOF(32), dsx3LOS(64), dsx3LoopbackState(128), dsx3UnavailSigState(1024), and dsx3NetEquipOOS(2048).'
