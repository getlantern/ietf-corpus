document: rfc-4618
kind: normative-requirement
summary: The network MUST be configured with an MTU sufficient to transport the largest encapsulation packets. If RFC4623 fragmentation is not used and an encapsulated L2 PDU exceeds the PSN tunnel MTU, the PDU MUST be dropped by the ingress router.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
