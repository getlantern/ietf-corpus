summary: 'The ''neighbor-origin'' typedef enumerates three values: ''other'', ''static'' (configured via NETCONF/CLI), and ''dynamic'' (resolved via IPv4 ARP or IPv6 Neighbor Discovery). This applies to both IPv4 ARP cache and IPv6 Neighbor Cache entries.'
