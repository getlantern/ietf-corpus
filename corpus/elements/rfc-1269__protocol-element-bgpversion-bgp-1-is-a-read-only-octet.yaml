document: rfc-1269
kind: protocol-element
summary: bgpVersion (bgp 1) is a read-only OCTET STRING representing a bit-vector of supported BGP protocol version numbers. Bit i set means version (i+1) is supported; the MSB of the first octet refers to bit 0.
