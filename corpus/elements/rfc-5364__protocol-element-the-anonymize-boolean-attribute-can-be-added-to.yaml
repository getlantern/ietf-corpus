document: rfc-5364
kind: protocol-element
summary: The 'anonymize' boolean attribute can be added to <entry> elements. When set to 'true', it instructs the URI-list server to replace the URI with 'sip:anonymous@anonymous.invalid' in the recipient-history list, while still routing to the real URI. The default value is 'false'.
section: "4"
topics:
    - sip
    - realtime
    - privacy
