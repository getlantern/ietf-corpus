document: rfc-7182
kind: wire-format
summary: 'ICV TLV value with type extension 1 or 2 encodes: <hash-function> (1 octet), <cryptographic-function> (1 octet), <key-id-length> (1 octet), optional <key-id> (<key-id-length> octets), and <ICV-data> (remaining octets). ICV-data length = <length> - 3 - <key-id-length>.'
