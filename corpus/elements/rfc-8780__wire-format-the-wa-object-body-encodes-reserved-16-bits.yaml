summary: 'The WA object body encodes: Reserved (16 bits), Flags (16 bits, M bit at bit 15 for Wavelength Allocation Mode), followed by variable-length TLVs. The M bit distinguishes explicit label control (M=1) from Label Set-based distributed assignment (M=0).'
