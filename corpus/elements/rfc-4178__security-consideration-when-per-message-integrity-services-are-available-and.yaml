document: rfc-4178
kind: security-consideration
summary: 'When per-message integrity services are available and the mechanism list was altered by an adversary to force a non-mutually-preferred mechanism: if the initiator sends the last token, both peers fail; if the acceptor sends the last token, the acceptor will not complete and the initiator will at worst complete with its preferred mechanism selected.'
section: "7"
topics:
