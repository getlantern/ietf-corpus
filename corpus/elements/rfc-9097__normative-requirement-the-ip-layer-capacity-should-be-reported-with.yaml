document: rfc-9097
kind: normative-requirement
summary: The IP-Layer Capacity SHOULD be reported with at least single-Megabit resolution in units of Mbps (1,000,000 bits per second). The related One-Way Loss and Round-Trip Delay measurements for the same Singleton SHALL be reported with meaningful resolution.
section: "5.6"
rfc2119_level: SHALL
topics:
