document: rfc-9538
kind: normative-requirement
summary: For a STAR delegation method, the 'start' and 'end' properties of the time-window object MUST be understood as the start-date and end-date of the certificate validity. For a non-STAR delegation, they MUST be understood as the notBefore and notAfter fields of the certificate.
section: "3.1"
rfc2119_level: MUST
topics:
    - acme
    - pkix
