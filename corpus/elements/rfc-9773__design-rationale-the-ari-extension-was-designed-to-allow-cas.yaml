document: rfc-9773
kind: design-rationale
summary: The ARI extension was designed to allow CAs to suggest renewal windows to mitigate load spikes and handle exceptional circumstances such as mass-revocation events or upcoming mass-renewal spikes, which existing client-driven renewal strategies (fixed interval, percentage of validity) cannot accommodate.
