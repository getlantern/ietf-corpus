document: rfc-9708
kind: errata
summary: RFC 9708 resolves Err7960 and Err7963 against RFC 8708 by updating the pk-HSS-LMS-HashSig PUBLIC-KEY definition to specify no ASN.1 wrapping for the HSS/LMS public key, making it consistent with X.509 certificate conventions.
section: "1.4"
topics:
