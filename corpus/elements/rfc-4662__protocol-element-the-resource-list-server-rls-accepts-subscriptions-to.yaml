document: rfc-4662
kind: protocol-element
summary: The Resource List Server (RLS) accepts subscriptions to resource lists and sends notifications to update subscribers of the state of the resources in a resource list. It acts as a notifier for list subscriptions and as a subscriber for back-end subscriptions to individual resources.
