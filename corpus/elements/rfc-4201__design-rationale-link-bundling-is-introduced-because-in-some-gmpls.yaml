document: rfc-4201
kind: design-rationale
summary: Link bundling is introduced because in some GMPLS contexts (e.g., SONET/SDH cross-connects composed of multiple fibers where a label is a TDM time slot valid only within a specific fiber), a combination of <TE link identifier, label> is insufficient to unambiguously identify the resource used by an LSP. The component link identifier fills this gap.
section: "2"
topics:
