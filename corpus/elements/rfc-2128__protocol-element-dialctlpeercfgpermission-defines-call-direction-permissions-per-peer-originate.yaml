document: rfc-2128
kind: protocol-element
summary: 'dialCtlPeerCfgPermission defines call direction permissions per peer: originate(1), answer(2), both(3), callback(4), or none(5). The callback(4) value either rejects then calls back or uses the ''Reverse charging'' IE, and is intended to control charging rather than security.'
section: "3.1"
