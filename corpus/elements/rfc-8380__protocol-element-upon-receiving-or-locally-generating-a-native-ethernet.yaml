document: rfc-8380
kind: protocol-element
summary: Upon receiving or locally generating a native Ethernet frame, the TRILL-EN checks the (MAC and VLAN) <-> Edge RBridge mapping table and performs TRILL encapsulation if the entry is found; if no mapping is found and no directory reply is received, the frame is dropped or forwarded natively depending on configuration.
