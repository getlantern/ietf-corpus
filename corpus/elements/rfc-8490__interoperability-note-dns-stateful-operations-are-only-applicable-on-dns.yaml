document: rfc-8490
kind: interoperability-note
summary: DNS Stateful Operations are only applicable on DNS-over-TCP and DNS-over-TLS. DNS-over-UDP is excluded because it does not provide in-order delivery or session semantics. DNS-over-HTTP is excluded because it has its own session management mechanism incompatible with DSO.
section: "4.2"
topics:
    - dns
    - tcp
    - tls
    - http
