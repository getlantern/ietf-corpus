document: rfc-3697
kind: normative-requirement
summary: A source node MUST ensure it does not unintentionally reuse Flow Label values currently in use or recently used when creating new flows. Flow Label values previously used with a specific address pair MUST NOT be assigned to new flows with the same address pair within 120 seconds of the termination of the previous flow.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ip
