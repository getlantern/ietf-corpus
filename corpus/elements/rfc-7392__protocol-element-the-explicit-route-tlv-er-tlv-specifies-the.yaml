document: rfc-7392
kind: protocol-element
summary: The Explicit Route TLV (ER-TLV) specifies the path to be taken by the MS-PW being established, encoding an ordered list of abstract nodes (groups of one or more S-PEs identified by IPv4, IPv6, or S-PE address). Its format follows Section 4.1 of RFC 3212 and contains one or more ER-Hop TLVs.
section: "3.2"
topics:
    - mpls
