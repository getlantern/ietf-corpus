document: rfc-2616
kind: protocol-element
summary: 'The Vary response header specifies the set of request-header fields that fully determines which cached response is acceptable for a request. Caches MUST use the Vary value to select or revalidate a cached response; ''Vary: *'' makes a response uncacheable by shared caches.'
section: "14.44"
topics:
    - http
extracted_by: claude-sonnet-4-6
