document: rfc-5969
kind: protocol-element
summary: A 6rd domain consists of 6rd Customer Edge (CE) routers and one or more 6rd Border Relays (BRs). The 6rd delegated prefix is created by concatenating the 6rd prefix and a consecutive set of bits from the CE IPv4 address, with length equal to the 6rd prefix length (n) plus the number of IPv4 bits used (o).
section: "4"
topics:
