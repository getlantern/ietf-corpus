document: rfc-4206
kind: security-consideration
summary: CR-LDP avoids the control/data plane separation security issue because CR-LDP messages are sent over TCP sessions with no assumption of direct neighbor adjacency; TCP MD5 (per RFC 3036) is the recommended authentication mechanism for LDP message integrity.
section: "7"
topics:
