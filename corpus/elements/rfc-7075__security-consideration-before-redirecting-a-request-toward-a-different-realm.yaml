document: rfc-7075
kind: security-consideration
summary: Before redirecting a request toward a different realm, the client or proxy MUST ensure that authorization checks have been performed at each connection along the path to the realm identified in the redirect indication, per RFC 6733 Section 2.9.
section: "4"
rfc2119_level: MUST
