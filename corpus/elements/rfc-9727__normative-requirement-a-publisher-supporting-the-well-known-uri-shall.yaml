document: rfc-9727
kind: normative-requirement
summary: A Publisher supporting the well-known URI SHALL resolve an HTTPS GET request to /.well-known/api-catalog and return an API catalog document, and SHALL resolve an HTTPS HEAD request with a response including a Link header with the api-catalog relation.
section: "2"
rfc2119_level: REQUIRED
topics:
    - http
