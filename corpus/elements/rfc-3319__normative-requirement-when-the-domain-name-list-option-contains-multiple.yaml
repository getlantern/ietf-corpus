document: rfc-3319
kind: normative-requirement
summary: When the domain name list option contains multiple entries, the client MUST try the records in the order listed, applying the RFC 3263 Section 4.1 mechanism for each, and only resolves subsequent names if the first fails, yields no common transport, or is administratively prohibited.
section: "3.1"
rfc2119_level: MUST
topics:
    - sip
    - dns
