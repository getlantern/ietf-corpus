document: rfc-4303
kind: protocol-element
summary: The Integrity Check Value (ICV) is an optional variable-length field computed over the ESP header, Payload, and ESP trailer (including implicit high-order ESN bits). It is present only when the integrity service is selected; its length and comparison rules MUST be specified by the integrity algorithm RFC.
section: "2.8"
topics:
    - ipsec
    - security
    - crypto
