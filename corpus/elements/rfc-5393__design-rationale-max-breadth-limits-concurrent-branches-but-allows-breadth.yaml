document: rfc-5393
kind: design-rationale
summary: Max-Breadth limits concurrent branches but allows breadth from completed branches to be reclaimed for subsequent sequential forks. An alternative that forbade reclamation was rejected because it would dramatically reduce the potential reach of requests and break existing deployments.
section: "7.1"
topics:
