document: rfc-7280
kind: protocol-element
summary: Values 0-255 decimal in the ULE Next-Header registry identify Mandatory Extension Headers (or link-dependent Type fields). The registered integer value corresponds to a 16-bit Type value with the most significant 8 bits set to zero.
