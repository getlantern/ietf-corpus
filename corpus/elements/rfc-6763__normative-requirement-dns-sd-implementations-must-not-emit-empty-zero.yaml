document: rfc-6763
kind: normative-requirement
summary: DNS-SD implementations MUST NOT emit empty (zero-string) TXT records. Clients MUST treat a single-zero-byte TXT record, an empty TXT record, and the absence of any TXT record as equivalent.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
