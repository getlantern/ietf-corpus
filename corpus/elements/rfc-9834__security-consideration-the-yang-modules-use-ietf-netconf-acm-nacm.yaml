document: rfc-9834
kind: security-consideration
summary: The YANG modules use 'ietf-netconf-acm' (NACM, RFC 8341) for access control. Write access to bearer and AC provisioning data must be restricted to authorized administrators, as unauthorized modifications could disrupt network connectivity for all services delivered over affected bearers or ACs.
section: "7"
topics:
    - yang
    - security
