document: rfc-1123
kind: normative-requirement
summary: A User-FTP MUST NOT send Telnet controls other than SYNCH and IP on the FTP control connection and MUST NOT attempt Telnet option negotiation. A server-FTP MUST be capable of accepting and refusing Telnet option negotiations (DONT/WONT). On multihomed servers, the data port MUST share the same local IP as the control connection.
section: 4.1.2.12
rfc2119_level: MUST NOT
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
