document: rfc-9090
kind: design-rationale
summary: The BER encoding format was chosen for OIDs because staying close to ASN.1 BER makes back-and-forth translation easy, avoids inventing a third serialization form (alongside dotted decimal and BER), and aligns with existing expectations about OID encoding cost. A more efficient encoding could have been chosen otherwise.
section: "2.3"
