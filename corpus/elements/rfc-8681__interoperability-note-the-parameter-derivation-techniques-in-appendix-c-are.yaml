kind: interoperability-note
summary: 'The parameter derivation techniques in Appendix C are informational: using a different derivation does not prevent encoder-decoder interoperability since a decoder can still recover erased symbols. However, inappropriate parameters may cause recovered ADUs to arrive after their real-time validity deadline, making them useless to the application.'
