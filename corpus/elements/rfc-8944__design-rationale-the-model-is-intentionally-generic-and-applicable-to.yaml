document: rfc-8944
kind: design-rationale
summary: The model is intentionally generic and applicable to L2 networks built with different technologies (Ethernet, VLAN, QinQ, PBB, TRILL, VPLS, VXLAN). Technology-specific advanced attributes are out of scope; dedicated YANG modules (e.g., TRILL-YANG) are recommended for deeper technology-specific configuration.
