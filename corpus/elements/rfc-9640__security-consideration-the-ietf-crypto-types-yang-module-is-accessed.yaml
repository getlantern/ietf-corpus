document: rfc-9640
kind: security-consideration
summary: The ietf-crypto-types YANG module is accessed via NETCONF and RESTCONF, both of which have mandatory-to-implement secure transport (SSH, TLS, QUIC) and mandatory mutual authentication. NACM (RFC 8341) provides access control for restricting users to authorized protocol operations and content.
section: "3.8"
topics:
    - security
    - yang
    - netconf
    - tls
