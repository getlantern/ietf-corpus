document: rfc-1294
kind: design-rationale
summary: Frame Relay fragmentation is scoped to the DTE boundaries of the Frame Relay network (unlike IP fragmentation which is end-to-end). A packet is first fully encapsulated, then fragmented, so reassembled packets follow the same processing path as unfragmented packets.
section: "9"
