document: rfc-6121
kind: protocol-element
summary: The 'ver' attribute on <query/> is a server-generated opaque version string; clients set it to their last cached version when requesting the roster, or to the empty string to bootstrap versioning; if unrecognized by the server, the full roster is returned.
section: 2.1.1
extracted_by: claude-sonnet-4-6
