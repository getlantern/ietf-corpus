document: rfc-9374
kind: privacy-consideration
summary: There is no expectation of privacy for DETs. They are broadcast in the clear over Bluetooth and Wi-Fi and can be correlated with DET registration information and UA operational history. A DET may be persistent for the life of a UA if activity harvesting is not a concern.
section: "9.4"
topics:
    - privacy
    - security
