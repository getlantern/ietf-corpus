document: rfc-3831
kind: design-rationale
summary: IPv6 over FC does not use the FC Name Server, so FC soft zoning (Name Server masking) provides no security boundary for IPv6 traffic. This is a non-obvious limitation of applying FC zoning to IPv6 networks.
