document: rfc-8530
kind: design-rationale
summary: The 'inline' schema-mount approach is anticipated for self-managed LNEs (managed=false) where each LNE may have a different module set, while 'shared-schema' is expected when all LNEs share the same schema, enabling more efficient representation at the host level.
