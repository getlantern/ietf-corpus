document: rfc-9972
kind: normative-requirement
summary: For Per-AFI/SAFI Statistics, the 'Stat Len' MUST be set to 11, and duplicate (AFI, SAFI) pairs MUST NOT appear within the same BMP Statistics Report message. Per-AFI/SAFI statistics MUST NOT be included if there is no data to report for that AFI/SAFI.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - bgp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
