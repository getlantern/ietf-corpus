document: rfc-1213
kind: design-rationale
summary: The atTable was deprecated because efficient implementations assumed a single network protocol environment and unidirectional (network-to-physical) mappings; the need to support multi-protocol nodes and inverse mappings (e.g., ES-IS) invalidated both assumptions.
