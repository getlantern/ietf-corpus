document: rfc-7170
kind: normative-requirement
summary: Phase 2 EAP methods used in Server Unauthenticated Provisioning Mode MUST provide mutual authentication, key generation, and resistance to dictionary attacks. Example qualifying inner methods include EAP-pwd (RFC 5931) and EAP-EKE (RFC 6124).
