document: rfc-9961
kind: interoperability-note
summary: For P2MP trees using non-adjacent Replication segments connected by a unicast path (e.g., via an SR Policy), SR P2MP OAM tools verify the Replication segments while unicast OAM tools verify the unicast path; the Replication-SID should not be exposed or examined on the unicast path. For ping, either Pipe Mode or Uniform Mode can be used.
section: 3.1.3
topics:
    - mpls
    - measurement
