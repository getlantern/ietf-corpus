document: rfc-6241
kind: normative-requirement
summary: The transport connection MUST provide reliable, sequenced data delivery. Resources acquired during a connection (e.g., locks) MUST be automatically released when the connection closes, enabling failure recovery without explicit cleanup.
section: "2.1"
rfc2119_level: MUST
topics:
    - netconf
