document: rfc-2652
kind: protocol-element
summary: The datachanged command (application/index.cmd.datachanged) requires parameters 'type' and 'dsi'. It is used by a pollee to notify a poller that index data has changed. The body is formatted as RFC 822 attribute-value pairs, with allowed attributes defined by the index type specification.
section: 2.3.3
topics:
