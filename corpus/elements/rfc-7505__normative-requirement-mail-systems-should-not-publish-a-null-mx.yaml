document: rfc-7505
kind: normative-requirement
summary: Mail systems SHOULD NOT publish a null MX record for domains they use in RFC5321.MailFrom or RFC5322.From addresses, as doing so risks having outbound mail rejected by receiving systems.
section: "4.2"
rfc2119_level: SHOULD NOT
