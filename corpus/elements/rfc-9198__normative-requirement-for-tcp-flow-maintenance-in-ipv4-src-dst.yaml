document: rfc-9198
kind: normative-requirement
summary: 'For TCP flow maintenance: in IPv4, Src, Dst, port-Src, port-Dst, sequence number, and Diffserv SHOULD be the same across all probes for a given flow; in IPv6, Flow Label, Src, and Dst SHOULD be the same.'
section: "4.1"
rfc2119_level: SHOULD
