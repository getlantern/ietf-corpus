document: rfc-9633
kind: protocol-element
summary: 'The forwarding sub-layer ''operation'' uses ''mpls-fwd-operation'' typedef with values: impose-and-forward, pop-and-forward, pop-impose-and-forward, swap-and-forward, forward, and pop-and-lookup. All but ''forward'' mirror RFC 8960 MPLS base operations.'
