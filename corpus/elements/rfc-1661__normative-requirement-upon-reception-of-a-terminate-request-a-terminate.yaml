document: rfc-1661
kind: normative-requirement
summary: Upon reception of a Terminate-Request, a Terminate-Ack MUST be transmitted. The receiver of a Terminate-Request MUST NOT disconnect until at least one Restart time has passed after sending the Terminate-Ack.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
