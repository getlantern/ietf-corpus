document: rfc-3546
kind: protocol-element
summary: The extended ServerHello adds a server_hello_extension_list field (Extension list, 0..2^16-1 bytes) and MAY be sent in response to an extended ClientHello. The extended server hello is only sent when the client has first sent an extended client hello.
