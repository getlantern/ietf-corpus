document: rfc-4553
kind: state-machine
summary: 'The CE-bound SAToP IWF has three states: Intermediate (enters after PW setup, plays ''all ones''), Normal Operation (enters when preconfigured TDM data amount received in consecutive packets), and Packet Loss (enters when preconfigured consecutive packets are lost or intermediate timer expires). Returns to Normal from Packet Loss after receiving a preconfigured number of consecutive valid packets.'
section: 6.2.2
topics:
    - realtime
