document: rfc-7272
kind: protocol-element
summary: The Packet Presented NTP timestamp in the RTCP IDMS Settings Packet uses the full 64-bit NTP format, unlike the 32-bit truncated form in the XR block, to support use cases (e.g., phased-array transducers) requiring sub-millisecond playout precision from the MSAS.
