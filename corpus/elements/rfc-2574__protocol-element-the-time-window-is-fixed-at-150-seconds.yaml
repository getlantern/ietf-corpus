document: rfc-2574
kind: protocol-element
summary: The Time Window is fixed at 150 seconds for all users. Messages whose msgAuthoritativeEngineTime differs from the receiver's local notion by more than +/-150 seconds are rejected as outside the Time Window with a notInTimeWindow error.
