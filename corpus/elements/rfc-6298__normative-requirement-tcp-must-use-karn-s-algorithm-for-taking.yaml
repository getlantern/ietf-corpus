document: rfc-6298
kind: normative-requirement
summary: 'TCP MUST use Karn''s algorithm for taking RTT samples: RTT samples MUST NOT be made using segments that were retransmitted, due to ambiguity about which transmission triggered the ACK. The exception is when the TCP timestamp option is employed.'
