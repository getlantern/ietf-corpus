document: rfc-7573
kind: protocol-element
summary: Receipt of the XMPP 'gone' chat state at an XMPP-to-MSRP gateway serves as a trigger to send a SIP BYE, formally terminating the MSRP session. Conversely, receipt of a SIP BYE at an MSRP-to-XMPP gateway triggers a 'gone' chat state notification to the XMPP user.
section: "6.1"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
