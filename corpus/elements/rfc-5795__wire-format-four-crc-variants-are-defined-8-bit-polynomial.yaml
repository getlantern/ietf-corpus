document: rfc-5795
kind: wire-format
summary: 'Four CRC variants are defined: 8-bit (polynomial x^8+x^2+x+1, covers IR/IR-DYN header integrity), 3-bit (polynomial x^3+x+1, compressed header verification), 7-bit (polynomial x^7+x^6+x^3+x^2+x+1, stronger compressed header verification), and 32-bit (PPP-style polynomial, segmentation CRC). All initialize the CRC register to all 1s.'
section: 5.3.1
