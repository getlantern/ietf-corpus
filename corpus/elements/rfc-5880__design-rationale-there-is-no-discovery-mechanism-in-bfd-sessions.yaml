document: rfc-5880
kind: design-rationale
summary: There is no discovery mechanism in BFD; sessions are established based on the needs of the application using BFD (e.g., an OSPF neighbor discovered via Hello). This avoids adding another discovery layer and keeps BFD a simple liveness-detection service decoupled from higher-layer routing logic.
section: "3.1"
topics:
    - routing
