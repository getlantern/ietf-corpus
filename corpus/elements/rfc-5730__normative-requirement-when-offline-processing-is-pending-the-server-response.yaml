document: rfc-5730
kind: normative-requirement
summary: When offline processing is pending, the server response MUST clearly note the command has been received but the action is pending (result code 1001). The object state MUST reflect the pending action, and the server MUST notify the client when offline processing completes.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
