document: rfc-2112
kind: protocol-element
summary: The Multipart/Related content-type provides a mechanism for representing compound objects consisting of several inter-related MIME body parts where proper display cannot be achieved by individually displaying constituent parts. The content-type of the object is specified by the required 'type' parameter.
section: "3"
