document: rfc-8356
kind: interoperability-note
summary: Handling of unknown experimental PCEP objects depends on the message type context; for example, a PCE handles unknown objects in PCReq per RFC 5440 rules, while RFC 8231 specifies rules for unknown objects in PCUpd messages.
