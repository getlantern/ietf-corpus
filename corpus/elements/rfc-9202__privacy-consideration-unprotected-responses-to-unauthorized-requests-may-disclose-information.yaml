document: rfc-9202
kind: privacy-consideration
summary: Unprotected responses to unauthorized requests may disclose information about the resource server or its relationship with the client; responses should include as little information as possible. Unprotected requests may reveal client identity and resource access patterns, so clients SHOULD NOT send confidential data in unprotected requests.
section: "8"
topics:
