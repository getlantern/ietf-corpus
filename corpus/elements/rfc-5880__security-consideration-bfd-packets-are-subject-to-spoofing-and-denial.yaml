document: rfc-5880
kind: security-consideration
summary: BFD packets are subject to spoofing and denial-of-service attacks that could cause false session failures or prevent failure detection. Using the randomized discriminator value and cryptographic authentication (SHA1) mitigates spoofing. The use of BFD without authentication in environments where packets could be injected is explicitly noted as a security risk.
section: "9"
topics:
    - security
