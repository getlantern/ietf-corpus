document: rfc-9766
kind: protocol-element
summary: 'Recommended triggers for sending LAYOUT_WCC include: client issuing GETATTR for size, space_used, change, time_access, time_metadata, or time_modify; client sending NFS4ERR_ACCESS via LAYOUTRETURN or LAYOUTERROR; and client sending SETATTR to refresh proxied times per RFC 9754.'
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
