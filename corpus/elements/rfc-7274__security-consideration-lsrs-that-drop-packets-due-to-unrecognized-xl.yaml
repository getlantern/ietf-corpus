document: rfc-7274
kind: security-consideration
summary: LSRs that drop packets due to unrecognized XL or ESPL MAY log the event, but logging MUST be rate-limited. Without rate-limiting, per-packet logging of crafted traffic could exhaust system resources.
section: "6"
topics:
    - mpls
    - security
