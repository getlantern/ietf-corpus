document: rfc-3265
kind: security-consideration
summary: Notifiers SHOULD require authentication to reduce denial-of-service risk. The SUBSCRIBE/NOTIFY pattern (one SUBSCRIBE triggers multiple NOTIFYs) is a classic amplification setup; creation of subscription state on SUBSCRIBE receipt can also be exploited to exhaust resources.
section: "5.3"
topics:
    - sip
    - security
    - realtime
