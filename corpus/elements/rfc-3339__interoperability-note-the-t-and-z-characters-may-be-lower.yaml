document: rfc-3339
kind: interoperability-note
summary: The 'T' and 'Z' characters MAY be lower case 't' or 'z' per ABNF and ISO 8601, but applications generating the format SHOULD use upper case. Implementations must accept both cases unless the environment is case-sensitive.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
