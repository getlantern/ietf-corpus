document: rfc-3339
kind: interoperability-note
summary: The 'T' and 'Z' characters MAY be lower case 't' or 'z' per ABNF and ISO 8601, but some environments (e.g., XML) distinguish case. Implementations should be prepared to accept both cases when parsing.
section: "5.6"
