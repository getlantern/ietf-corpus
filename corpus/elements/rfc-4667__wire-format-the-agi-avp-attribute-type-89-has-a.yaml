document: rfc-4667
kind: wire-format
summary: The AGI AVP (Attribute Type 89) has a variable-length AGI field encoding the Attachment Group Identifier. Total length is 6 octets plus the AGI field length. The M bit SHOULD be set to 0; the H bit MAY be 0 or 1. MAY be present in ICRQ.
