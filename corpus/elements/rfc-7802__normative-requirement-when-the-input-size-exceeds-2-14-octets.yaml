document: rfc-7802
kind: normative-requirement
summary: When the input size exceeds 2^14 octets per RFC 4401 and exceeds an implementation's resources, the mechanism MUST return GSS_S_FAILURE with GSS_KRB5_S_KG_INPUT_TOO_LONG as the minor status code.
