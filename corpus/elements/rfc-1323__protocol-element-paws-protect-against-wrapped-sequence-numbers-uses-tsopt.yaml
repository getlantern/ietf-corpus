document: rfc-1323
kind: protocol-element
summary: PAWS (Protect Against Wrapped Sequence numbers) uses TSopt to reject old duplicate segments within a connection. A segment is discarded if SEG.TSval < TS.Recent (modular 32-bit comparison), treating the timestamp as a logical extension of the high-order sequence number bits.
section: "4.2"
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
