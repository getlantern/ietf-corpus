document: rfc-2677
kind: normative-requirement
summary: A translated SMIv1 MIB must be semantically equivalent to the SMIv2 version, except where objects or events are omitted because no translation is possible (e.g., Counter64). Loss of machine-readable information during translation is not considered to change MIB semantics.
section: "2"
rfc2119_level: MUST
topics:
    - snmp
