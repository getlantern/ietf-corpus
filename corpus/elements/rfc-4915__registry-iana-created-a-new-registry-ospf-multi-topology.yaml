document: rfc-4915
kind: registry
summary: 'IANA created a new registry ''OSPF Multi-Topology ID Values''. Reserved values: 0 (default topology metric), 1 (default multicast topology), 2 (IPv4 in-band management), 3-31 (IANA assignments), 32-127 (experimental/proprietary per RFC3692), 128-255 (invalid, SHOULD be ignored). Only MT-IDs 0-127 are valid since AS-External-LSAs use the high-order bit (E-bit) for external metric-type.'
section: "3.7"
topics:
    - registry
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
