document: rfc-8105
kind: protocol-element
summary: DECT ULE uses a Permanent Virtual Circuit (PVC) established via a DECT service call between PP and FP. The PP specifies <<IWU-ATTRIBUTES>> in a service-change (other) message, followed by service-change (resume); the FP responds with service-change-accept (resume) containing a valid paging descriptor.
