document: rfc-3503
kind: normative-requirement
summary: A client MUST be prepared to receive NO from the server when attempting to STORE $MDNSent, even if the server advertises arbitrary keyword support, because servers may limit the number of keywords per mailbox. A client SHOULD NOT send MDN if it fails to store the $MDNSent keyword.
section: "3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
