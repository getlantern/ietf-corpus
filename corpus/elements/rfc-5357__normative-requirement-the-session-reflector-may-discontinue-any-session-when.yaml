document: rfc-5357
kind: normative-requirement
summary: The Session-Reflector MAY discontinue any session when no packet associated with that session has been received for REFWAIT seconds. The default value of REFWAIT SHALL be 900 seconds and MAY be configurable.
section: "4.2"
rfc2119_level: SHALL
topics:
    - measurement
