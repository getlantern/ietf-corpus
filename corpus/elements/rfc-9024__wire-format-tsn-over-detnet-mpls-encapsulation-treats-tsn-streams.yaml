document: rfc-9024
kind: wire-format
summary: 'TSN over DetNet MPLS encapsulation treats TSN Streams as the MPLS App-flow payload. The encapsulation stack (from top to bottom) comprises: MPLS Labels, d-CW, TSN-L2 frame, and optionally IP/UDP sub-network headers. Two sequence number sizes are supported in the d-CW: 16-bit and 28-bit.'
section: "4.2"
