document: rfc-2368
kind: wire-format
summary: 'The mailto URL syntax is: `mailtoURL = "mailto:" [ to ] [ headers ]`, where `to = #mailbox`, `headers = "?" header *( "&" header )`, and `header = hname "=" hvalue`. The characters "?", "=", and "&" are reserved within mailto URLs.'
