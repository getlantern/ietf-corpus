document: rfc-4710
kind: normative-requirement
summary: RAQMON SHOULD NOT derive One-Way End-to-End Network Delay by assuming Internet paths are symmetric (i.e., by dividing Round-Trip Delay by two); actual one-way measurements per RFC 2679 must be used.
section: "5.12"
rfc2119_level: SHOULD NOT
topics:
