document: rfc-3546
kind: normative-requirement
summary: 'Servers that support client_certificate_url MUST support the http: URL scheme for fetching certificate chains, and MAY support other schemes. If a SHA-1 hash is present for a URL, the server MUST verify the hash and MUST abort with bad_certificate_hash_value if it does not match.'
section: "3.3"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
