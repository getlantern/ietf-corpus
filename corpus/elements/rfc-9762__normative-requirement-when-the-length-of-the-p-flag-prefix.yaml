document: rfc-9762
kind: normative-requirement
summary: When the length of the P-flag prefix list increases to one, the client SHOULD start requesting prefixes via DHCPv6 prefix delegation unless it is already doing so. When the list decreases to zero, the client SHOULD stop requesting or renewing prefixes via DHCPv6-PD if it has no other reason to do so.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
