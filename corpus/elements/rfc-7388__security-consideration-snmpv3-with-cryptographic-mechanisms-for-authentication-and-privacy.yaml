document: rfc-7388
kind: security-consideration
summary: SNMPv3 with cryptographic mechanisms for authentication and privacy is RECOMMENDED. Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Operators must configure SNMP entities to restrict access to legitimate principals.
