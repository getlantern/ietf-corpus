document: rfc-9560
kind: normative-requirement
summary: Clients MAY operate as either session-oriented or token-oriented, but MUST do so consistently without mixing token-oriented and session-oriented requests while interacting with an OP. Servers SHOULD support both types to maximize interoperability but MAY restrict to one type per local policy.
section: 3.1.2
rfc2119_level: MUST
topics:
    - oauth
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
