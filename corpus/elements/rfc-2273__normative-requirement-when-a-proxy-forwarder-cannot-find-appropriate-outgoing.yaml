document: rfc-2273
kind: normative-requirement
summary: When a proxy forwarder cannot find appropriate outgoing management target information, it MUST increment the snmpProxyDrops counter and call returnResponsePdu with a statusInformation indicating the error and the OID/value of snmpProxyDrops before halting processing.
section: 3.5.1.1
rfc2119_level: MUST
topics:
    - snmp
