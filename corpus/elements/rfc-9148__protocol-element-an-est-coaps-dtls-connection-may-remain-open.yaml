document: rfc-9148
kind: protocol-element
summary: An EST-coaps DTLS connection MAY remain open for sequential EST transactions, unlike RFC 7030's HTTPS model. This accommodates constrained devices that cannot afford a full DTLS handshake for every EST transaction.
