document: rfc-8973
kind: wire-format
summary: 'DHCPv4 DOTS Address option (OPTION_V4_DOTS_ADDRESS, code 148): 1-octet code, 1-octet length (set to 4*N for N IPv4 addresses), followed by one or more 4-octet IPv4 addresses in order of preference. RFC 3396 MUST be used if the option exceeds 255 octets.'
section: 5.2.2
rfc2119_level: MUST
