document: rfc-8531
kind: protocol-element
summary: The top-level container is 'domains', which holds a list of Maintenance Domains (MDs) keyed by 'technology' (identityref) and 'md-name-string'. Each MD has an optional 'md-level' (uint32, range 0..255), a 'md-name-format' (identityref), and a 'md-name' choice node for technology-specific name formats.
