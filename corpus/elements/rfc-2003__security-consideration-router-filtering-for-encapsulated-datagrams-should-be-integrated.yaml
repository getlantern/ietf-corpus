document: rfc-2003
kind: security-consideration
summary: Router filtering for encapsulated datagrams should be integrated with IP authentication (RFC 1826). Encapsulated packets lacking authentication from a trusted source represent a potentially large security risk; encrypted encapsulated datagrams can only be filtered if the router shares the relevant security association.
section: "6.1"
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
