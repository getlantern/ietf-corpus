document: rfc-8794
kind: protocol-element
summary: 'EBML versioning uses two independent version axes: the EBML Header version (EBMLVersion / EBMLReadVersion) and the EBML Document body version (DocTypeVersion / DocTypeReadVersion). A reader can process the document if it supports the EBMLReadVersion or any higher version it also supports.'
section: "10"
