document: rfc-6439
kind: normative-requirement
summary: There MUST NOT be two Appointed Forwarders on a link simultaneously ingressing and egressing native frames for the same VLAN. Dual AFs for the same VLAN can form a loop where frames are unprotected by the TRILL hop count.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
