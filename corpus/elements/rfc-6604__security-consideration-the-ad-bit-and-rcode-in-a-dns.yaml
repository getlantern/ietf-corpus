document: rfc-6604
kind: security-consideration
summary: 'The AD bit and RCODE in a DNS response are not in general protected by DNSSEC. They are protected only when: the relevant zones are signed, DNSSEC RRs are requested and provided in responses, and the querier has appropriate trust anchors and validates the DNSSEC RRs.'
section: "4"
topics:
    - dns
    - security
