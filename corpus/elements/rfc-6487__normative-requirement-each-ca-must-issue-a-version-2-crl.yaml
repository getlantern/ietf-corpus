document: rfc-6487
kind: normative-requirement
summary: Each CA MUST issue a version 2 CRL consistent with RFC 5280. CRLs MUST NOT include Indirect or Delta CRLs. Only the Authority Key Identifier and CRL Number extensions are allowed; no CRL entry extensions are permitted, and only Serial Number and Revocation Date fields may appear per revoked certificate.
section: "5"
rfc2119_level: MUST
topics:
    - pkix
