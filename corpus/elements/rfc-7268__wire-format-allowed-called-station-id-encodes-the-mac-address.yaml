document: rfc-7268
kind: wire-format
summary: Allowed-Called-Station-Id encodes the MAC address as uppercase ASCII in canonical format with octets separated by '-' (e.g., '00-10-A4-23-19-C0'). When network-name restrictions are also intended, the network name is appended after ':', e.g., '00-10-A4-23-19-C0:AP1'. When only a network-name restriction is intended, the MAC address field is omitted but ':' and the network name are included, e.g., ':AP1'.
section: "2.1"
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
