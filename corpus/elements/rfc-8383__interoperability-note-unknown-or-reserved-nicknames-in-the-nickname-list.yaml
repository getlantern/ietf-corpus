document: rfc-8383
kind: interoperability-note
summary: Unknown or reserved nicknames in the nickname list are ignored, but the flush operation still executes with the remaining valid nicknames. Similarly, VLAN or FGL blocks where End is less than Start are ignored but the message is still processed for other valid blocks.
section: "2.1"
topics:
    - routing
