document: rfc-4589
kind: design-rationale
summary: The registry uses protocol tokens (constants) rather than free-text strings to enable systems to operate across multiple languages; a UI can readily translate a finite set of tokens to user-appropriate textual or iconic representations without requiring per-token internationalization.
