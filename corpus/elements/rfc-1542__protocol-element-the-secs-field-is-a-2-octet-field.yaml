document: rfc-1542
kind: protocol-element
summary: The 'secs' field is a 2-octet field representing elapsed seconds since the client sent its first BOOTREQUEST. Servers and relay agents MAY use it as a policy control mechanism, e.g., for load shedding or prioritizing long-waiting clients.
section: "3.2"
