document: rfc-5042
kind: normative-requirement
summary: The Privileged Resource Manager MUST NOT assume that different Streams share Partial Mutual Trust unless there is a mechanism to ensure that the Streams do indeed share Partial Mutual Trust, such as explicit notification from the ULP that owns the Streams.
section: "3"
rfc2119_level: MUST NOT
topics:
