document: rfc-9767
kind: wire-format
summary: 'The introspection request is a JSON object with fields: access_token (string, REQUIRED), proof (string, RECOMMENDED), resource_server (object/string, REQUIRED), and access (array, OPTIONAL). The response includes active (boolean, REQUIRED) and, if active, fields including access, key, flags, exp, iat, nbf, aud, sub, iss, and instance_id.'
