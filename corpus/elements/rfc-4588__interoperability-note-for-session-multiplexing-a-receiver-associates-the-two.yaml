document: rfc-4588
kind: interoperability-note
summary: For session-multiplexing, a receiver associates the two streams sharing the same SSRC across the two sessions (sessions are associated out-of-band via SDP FID grouping). For SSRC-multiplexing, the receiver uses CNAME matching and correlates retransmission packets against outstanding NACK requests to determine the SSRC-to-original-stream mapping.
section: "5.3"
topics:
    - rtp
    - realtime
