document: rfc-7680
kind: design-rationale
summary: 'The Poisson arrival rate lambda is deliberately left unconstrained except at extremes: too high a rate perturbs the network and causes congestion; too low a rate fails to capture interesting network behavior. For detecting loss ratios below 1% over one-minute periods, several hundred samples per minute may be required.'
