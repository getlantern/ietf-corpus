document: rfc-3994
kind: privacy-consideration
summary: There are privacy issues in sending isComposing status before a conversation is established, since a status message may reveal that the user considered composing a message even if they later abandon it. Page-mode indications are RECOMMENDED only in reply to earlier messages.
section: "7"
topics:
    - privacy
    - realtime
