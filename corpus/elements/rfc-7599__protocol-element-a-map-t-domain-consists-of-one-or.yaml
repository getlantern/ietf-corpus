document: rfc-7599
kind: protocol-element
summary: A MAP-T domain consists of one or more MAP Customer Edge (CE) routers and Border Relays (BRs) connected by an IPv6 network and sharing a common set of MAP Rules. CEs implement NAPT44 plus stateless NAT64; BRs connect MAP domains to native IPv4 networks via stateless NAT64.
section: "3"
