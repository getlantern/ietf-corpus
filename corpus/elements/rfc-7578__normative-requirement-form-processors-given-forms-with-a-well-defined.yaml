document: rfc-7578
kind: normative-requirement
summary: Form processors given forms with a well-defined ordering SHOULD send back results in that order. Intermediaries MUST NOT reorder the results. Form parts with identical field names MUST NOT be coalesced.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - http
