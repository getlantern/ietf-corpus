document: rfc-8490
kind: normative-requirement
summary: The four DNS header count fields (QDCOUNT, ANCOUNT, NSCOUNT, ARCOUNT) MUST be set to zero on transmission in DSO messages. If a DSO message is received where any of the count fields are not zero, a FORMERR MUST be returned.
section: "5.4"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
