document: rfc-5161
kind: normative-requirement
summary: The ENABLE command is only valid in the authenticated state before any mailbox is selected. Clients MUST NOT issue ENABLE once they SELECT/EXAMINE a mailbox.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - email
