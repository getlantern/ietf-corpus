document: rfc-2131
kind: normative-requirement
summary: The server MUST NOT send a lease expiration time to the client in response to a DHCPINFORM message and SHOULD NOT fill in 'yiaddr'; the server unicasts the DHCPACK reply directly to the 'ciaddr' field of the DHCPINFORM.
section: 4.3.5
rfc2119_level: MUST NOT
topics:
