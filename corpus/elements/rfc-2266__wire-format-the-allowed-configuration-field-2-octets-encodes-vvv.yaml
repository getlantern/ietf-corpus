document: rfc-2266
kind: wire-format
summary: 'The allowed configuration field (2 octets) encodes: vvv (version), D (duplicate address detected), C (configuration incompatible), N (access denied by security), FF (granted frame type), PP (granted address mode), and R (granted device type). The slave device sets this field to all zeros in its training request.'
