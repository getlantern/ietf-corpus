document: rfc-7271
kind: registry
summary: 'IANA created the MPLS PSC Capability Flag Registry within G-ACh Parameters. Allocation policy is Standards Action. Flags must be multiples of 4 octets. Five 4-octet flags are defined: bit 0 (0x80000000) priority modification, bit 1 (0x40000000) non-revertive behavior modification, bit 2 (0x20000000) MS-W support, bit 3 (0x10000000) SD protection, bit 4 (0x08000000) EXER support; bits 5-31 unassigned.'
section: "14.3"
topics:
