document: rfc-1662
kind: protocol-element
summary: 'Octet stuffing uses the Control Escape octet (0x7d). Each Flag Sequence, Control Escape, and any ACCM-flagged octet is replaced by a two-octet sequence: 0x7d followed by the original octet XOR''d with 0x20 (bit 5 complemented).'
section: "4.2"
