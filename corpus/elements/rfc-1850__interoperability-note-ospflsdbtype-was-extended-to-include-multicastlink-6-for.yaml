document: rfc-1850
kind: interoperability-note
summary: ospfLsdbType was extended to include multicastLink(6) for Group-membership LSAs and nssaExternalLink(7) for NSSA LSAs. AS External LSAs (type 5) remain valid in ospfLsdbTable for backward compatibility but should preferably appear in ospfExtLsdbTable.
