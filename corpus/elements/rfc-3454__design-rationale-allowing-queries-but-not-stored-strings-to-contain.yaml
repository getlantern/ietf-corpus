document: rfc-3454
kind: design-rationale
summary: 'Allowing queries (but not stored strings) to contain unassigned code points eliminates the need for explicit versioning in protocols: old query applications can still find new stored strings because the unassigned code points pass through, while stored strings remain stable and comparable across profile versions.'
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
