document: rfc-5388
kind: normative-requirement
summary: Measurement parameters MUST be carefully selected so that measurements inject trivial amounts of additional traffic into networks; injecting too much can skew results and in extreme cases cause congestion and denial of service.
section: "8.1"
rfc2119_level: MUST
topics:
    - measurement
    - security
