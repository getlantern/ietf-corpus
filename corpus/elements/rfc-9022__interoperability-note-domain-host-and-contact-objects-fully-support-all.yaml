kind: interoperability-note
summary: Domain, Host, and Contact objects fully support all attributes from EPP mappings RFC 5731, RFC 5732, and RFC 5733 respectively; the XML schema substitution groups feature allows registry-specific extensions to replace the abstract element definitions (abstractDomain, abstractHost, abstractContact).
