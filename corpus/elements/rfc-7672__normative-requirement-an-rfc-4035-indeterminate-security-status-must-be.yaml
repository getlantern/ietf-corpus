document: rfc-7672
kind: normative-requirement
summary: An RFC 4035 'indeterminate' security status MUST be treated by the SMTP client as though a 'bogus' or error result had been returned. All 'insecure' RRsets MUST be handled identically; non-validated data cannot be used for authentication.
section: 2.1.1
rfc2119_level: MUST
topics:
    - dns
    - email
    - security
