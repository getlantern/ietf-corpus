document: rfc-8408
kind: interoperability-note
summary: A PCEP speaker that does not recognize the PATH-SETUP-TYPE-CAPABILITY TLV will ignore it per RFC 5440 rules, effectively treating the peer as supporting only RSVP-TE. Similarly, an unrecognized PATH-SETUP-TYPE TLV causes the receiver to default to RSVP-TE for path setup.
section: "3"
