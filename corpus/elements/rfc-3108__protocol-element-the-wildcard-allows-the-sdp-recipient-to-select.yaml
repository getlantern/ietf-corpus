document: rfc-3108
kind: protocol-element
summary: The '$' wildcard allows the SDP recipient to select any permitted value for a parameter. The '-' value indicates the parameter is irrelevant or obtainable from another source (provisioning, defaults, another protocol). The strings 'CHOOSE' and 'OMIT' may be used in lieu of '$' and '-' respectively if special characters are construed as RFC 2327 violations.
section: "2.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
