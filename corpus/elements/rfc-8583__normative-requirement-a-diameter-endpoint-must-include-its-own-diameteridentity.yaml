document: rfc-8583
kind: normative-requirement
summary: A Diameter endpoint MUST include its own DiameterIdentity in the SourceID AVP, MUST include a Load-Type AVP of type HOST, and MUST include its Load value in the Load-Value AVP within the Load AVP.
