document: rfc-4479
kind: design-rationale
summary: The presence data model introduces three distinct components—Person, Service, and Device—to fill gaps in RFC 2778 and RFC 3863, which modeled presence only as tuples without clearly distinguishing the human user, the communications service, and the physical device. Each component addresses a different aspect of a user's ability and willingness to communicate.
section: "3"
