summary: 'dot5Commands is a read-write INTEGER controlling interface ring membership: noop(1), open(2), reset(3), close(4). Setting open(2) corresponds to ifAdminStatus up(1); setting close(4) corresponds to ifAdminStatus down(2). When read, always returns noop(1).'
