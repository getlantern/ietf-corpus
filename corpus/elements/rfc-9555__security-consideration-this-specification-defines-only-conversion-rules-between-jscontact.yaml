document: rfc-9555
kind: security-consideration
summary: This specification defines only conversion rules between JSContact and vCard. The security considerations for parsing and formatting these data formats—including injection risks and data validation—are inherited from RFC 9553 Section 4 and RFC 6350 Section 9 and are not restated here.
