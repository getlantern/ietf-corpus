kind: interoperability-note
summary: RIPng is derived from RIP-1 (RFC 1058) and RIP-2 (RFC 1723) with the minimum changes needed for IPv6 operation. It uses version number 1 in the header; packets with unrecognized versions are handled per section 2.4 input processing.
