document: rfc-5426
kind: security-consideration
summary: This transport provides no confidentiality; syslog messages are transmitted in clear text. An attacker observing the network can read the human-readable contents of syslog messages and use that knowledge to compromise systems.
section: "5.2"
topics:
    - syslog
    - security
    - privacy
    - udp
