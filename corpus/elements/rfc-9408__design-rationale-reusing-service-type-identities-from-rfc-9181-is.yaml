summary: Reusing service-type identities from RFC 9181 is intentional to ease correlation between the SAP topology and the network models (L3NM RFC 9182, L2NM RFC 9291) used to provision services, enabling consistent referencing across customer-facing and resource-facing interfaces in the service orchestration stack.
