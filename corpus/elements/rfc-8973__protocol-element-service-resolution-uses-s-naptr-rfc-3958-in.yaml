document: rfc-8973
kind: protocol-element
summary: 'Service resolution uses S-NAPTR (RFC 3958) in two steps: first retrieve the DNS domain name (e.g., via DHCP), then perform S-NAPTR lookups using the application service tags ''DOTS'' or ''DOTS-CALL-HOME'' combined with protocol tags ''signal.udp'', ''signal.tcp'', or ''data.tcp'' to obtain host, port, and protocol tuples.'
