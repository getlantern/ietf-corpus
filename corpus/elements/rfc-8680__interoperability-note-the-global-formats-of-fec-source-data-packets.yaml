document: rfc-8680
kind: interoperability-note
summary: The global formats of FEC source data packets and repair data packets from RFC 6363 (Figures 6, 7, and 8) remain unchanged for sliding window FEC codes; only the contents and interpretation of the FEC Payload IDs differ, keeping the wire format compatible with existing FECFRAME infrastructure.
