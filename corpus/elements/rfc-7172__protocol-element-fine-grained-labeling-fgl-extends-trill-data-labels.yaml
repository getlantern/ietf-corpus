document: rfc-7172
kind: protocol-element
summary: Fine-Grained Labeling (FGL) extends TRILL data labels to 24 bits, denoted (X.Y), where X is the 12-bit high-order part and Y is the 12-bit low-order part. This provides up to 2^24 labels, vastly exceeding the 4094 VLANs supported by the base protocol.
section: "2.3"
topics:
    - routing
