document: rfc-7119
kind: normative-requirement
summary: An IPFIX Mediator that does not modify (Options) Template Records MUST maintain a Template Mapping composed of related received and exported Template Records, including Template Record Information Elements, Template ID, Observation Domain ID, Transport Session information, and metadata scoped to the Template.
section: "4.1"
rfc2119_level: MUST
topics:
    - measurement
