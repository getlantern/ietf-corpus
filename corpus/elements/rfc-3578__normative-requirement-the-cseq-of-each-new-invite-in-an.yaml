document: rfc-3578
kind: normative-requirement
summary: The CSeq of each new INVITE in an overlap signalling sequence is recommended to be higher than any previous CSeq generated for the same Call-ID across all dialogs, to avoid confusion at destination when the original INVITE has forked and established multiple early dialogs with distinct CSeq spaces.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - voip
    - realtime
