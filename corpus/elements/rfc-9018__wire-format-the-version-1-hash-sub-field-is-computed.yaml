summary: The Version 1 Hash Sub-Field is computed as SipHash-2-4(Client Cookie | Version | Reserved | Timestamp | Client-IP, Server Secret), where Client-IP is 4 bytes for IPv4 or 16 bytes for IPv6, yielding a total input of exactly 20 bytes (IPv4) or 32 bytes (IPv6).
