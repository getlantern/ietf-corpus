document: rfc-5601
kind: design-rationale
summary: The PW is generally not an ifIndex on its own for agent scalability reasons; it is instead associated via PWE3 MIB modules to the ifIndex it is emulating. An ifIndex representation is permitted as an exception for implementations that find it convenient.
