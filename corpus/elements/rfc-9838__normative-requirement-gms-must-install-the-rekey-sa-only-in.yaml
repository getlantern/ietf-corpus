document: rfc-9838
kind: normative-requirement
summary: GMs MUST install the Rekey SA only in the inbound direction. If a GM is not a sender for a Data-Security SA, it MUST install that SA only in the inbound direction; if it is a sender and does not receive its own data, it MUST install the SA only in the outbound direction.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
