document: rfc-8357
kind: normative-requirement
summary: When an IPv4 DHCP server receives a message from a relay agent with the 'Source Port Sub-option', it MUST remember the UDP source port and use that port as the UDP destination port when sending the reply to the same relay agent.
section: "5.1"
rfc2119_level: MUST
topics:
    - udp
