document: rfc-5192
kind: security-consideration
summary: The DHCP options MUST NOT be used to negotiate the use of PANA between client and agent. Using the presence or absence of these options as an indication of network-mandated PANA authentication enables bidding-down attacks, potentially causing clients to choose lower-grade or no security mechanisms.
section: "7"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
