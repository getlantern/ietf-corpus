document: rfc-7274
kind: normative-requirement
summary: ESPLs MUST NOT be used for load balancing, consistent with the same prohibition on regular special-purpose labels in RFC 6790. Existing implementations that do not recognize XL may violate this and reorder packets in a flow.
section: "3"
rfc2119_level: MUST NOT
