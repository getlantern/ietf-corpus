document: rfc-4236
kind: security-consideration
summary: Specific HTTP adaptation threats include rewriting the Request-URI of an HTTP CONNECT request or removing hop-by-hop Upgrade headers before an HTTP proxy can act on them. OPES agents MUST NOT perform such actions without HTTP client or server consent.
section: "7"
rfc2119_level: MUST NOT
topics:
