document: rfc-6562
kind: normative-requirement
summary: It is RECOMMENDED to add at least one octet of RTP padding to all packets in a media stream. Because SRTP encrypts the padding octet count but not the RTP header padding bit, adding padding to every packet prevents an attacker from determining which packets required padding.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - security
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
