document: rfc-4235
kind: normative-requirement
summary: For unauthenticated or third-party subscribers, it is RECOMMENDED to forbid subscriptions to specific dialogs and instead report only a single 'virtual' FSM whose state aggregates all real dialogs, conveying no dialog identifiers. This prevents disclosure of call details beyond what an INVITE probe would reveal.
section: 3.7.2
rfc2119_level: RECOMMENDED
topics:
    - sip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
