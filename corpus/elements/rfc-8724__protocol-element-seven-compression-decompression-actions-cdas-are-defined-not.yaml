document: rfc-8724
kind: protocol-element
summary: 'Seven Compression/Decompression Actions (CDAs) are defined: not-sent (elide, restore from TV), value-sent (send full field), mapping-sent (send index into TV list), LSB (send least-significant bits), compute-* (elide, recompute at decompressor), DevIID (elide, derive IID from L2 Dev address), AppIID (elide, derive IID from L2 App address).'
