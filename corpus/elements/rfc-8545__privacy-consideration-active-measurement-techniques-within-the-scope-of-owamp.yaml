document: rfc-8545
kind: privacy-consideration
summary: Active measurement techniques within the scope of OWAMP/TWAMP greatly reduce the sensitive information available to potential observers compared to passive observation of user traffic. For broader privacy considerations covering both active and passive techniques, the LMAP framework (RFC 7594) is referenced.
