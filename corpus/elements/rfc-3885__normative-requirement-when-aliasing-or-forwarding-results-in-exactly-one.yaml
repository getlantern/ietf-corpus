document: rfc-3885
kind: normative-requirement
summary: When aliasing or forwarding results in exactly one recipient, the MTA SHOULD treat it as an ordinary hop-to-hop transfer and forward MTRK=, ENVID=, and ORCPT= values; these MUST NOT be modified except for decrementing mtrk-timeout.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - email
