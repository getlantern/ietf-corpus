document: rfc-6843
kind: design-rationale
summary: Round-trip delay values can be determined either via RTCP SR/RR (using NTP timestamp, LSR, and DLSR fields from RFC 3550) or via RTCP XR Receiver Reference Time and DLRR Report Blocks (using LRR and DLRR fields from RFC 3611), providing two equivalent measurement paths.
section: "3.2"
topics:
    - rtp
    - realtime
    - measurement
