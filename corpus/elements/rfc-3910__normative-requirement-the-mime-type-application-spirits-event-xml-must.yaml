document: rfc-3910
kind: normative-requirement
summary: The MIME type 'application/spirits-event+xml' MUST be present in the Content-Type header of all SPIRITS requests and responses. The Accept header, if present, MUST include this MIME type in SUBSCRIBE requests.
section: "3"
rfc2119_level: MUST
