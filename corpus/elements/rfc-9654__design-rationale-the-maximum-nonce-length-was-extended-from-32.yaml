document: rfc-9654
kind: design-rationale
summary: The maximum Nonce length was extended from 32 octets (RFC 8954) to 128 octets to support cryptographic algorithms that generate nonces longer than 32 octets. The minimum of 1 octet is retained for backward compatibility with older OCSP requesters following RFC 6960.
section: "1"
topics:
    - pkix
    - crypto
