document: rfc-9069
kind: interoperability-note
summary: 'Although RFC 7854 defines ''locally originated routes'' in Section 8.2, this document replaces that section: locally sourced routes now MUST use the Loc-RIB Instance Peer Type rather than the previously defined mechanism, which did not capture all selected routes from BGP peers.'
section: "1"
