summary: 'The SDP ''floorid'' media-level attribute conveys a floor identifier and optional pointers to BFCP-controlled media streams (ABNF: floor-id = 1*DIGIT SP ''mstrm:'' token *(SP token)). Each token value corresponds to the ''label'' attribute of a BFCP-controlled media stream.'
