document: rfc-1771
kind: state-machine
summary: 'BGP FSM has six states: Idle (no resources, refuses connections; Start event triggers transition to Connect), Connect (awaiting TCP completion), Active (initiating TCP connection), OpenSent (awaiting OPEN message), OpenConfirm (awaiting KEEPALIVE), Established (full UPDATE/KEEPALIVE/NOTIFICATION exchange). Any unexpected event in most states sends a Finite State Machine Error NOTIFICATION and transitions to Idle.'
section: "8"
topics:
