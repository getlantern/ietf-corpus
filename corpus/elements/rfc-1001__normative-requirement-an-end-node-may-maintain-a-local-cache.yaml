document: rfc-1001
kind: normative-requirement
summary: An end-node may maintain a local cache of NetBIOS name-to-IP address entries; all cache entries should be flushed periodically. Cache entries for a given IP address must be flushed whenever any indication of trouble with the node at that address is received (e.g., upon sending a NAME CONFLICT DEMAND to that node).
section: 15.1.8
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
