document: rfc-5082
kind: interoperability-note
summary: When a tunnel decapsulator forwards a protocol packet to a directly connected protocol peer (rather than being the peer itself), the TTL is decremented by normal IP forwarding, making it impossible to deliver the packet to the protocol peer with TTL=255.
section: 5.2.1
topics:
    - ip
    - security
    - routing
