document: rfc-4414
kind: normative-requirement
summary: The <inDomain> element in the contactSearchGroup MUST only contain a valid domain name (no '@' symbol), and matching SHOULD take place only on the domain given with no partial matches on substrings or parent domains.
section: 3.1.5
rfc2119_level: MUST
