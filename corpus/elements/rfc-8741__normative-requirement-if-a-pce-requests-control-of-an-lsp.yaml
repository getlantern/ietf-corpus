document: rfc-8741
kind: normative-requirement
summary: If a PCE requests control of an LSP already delegated to another PCE, the PCC MAY ignore the request or MAY revoke the delegation to the first PCE before delegating it to the second; the choice is a matter of local policy.
section: "4"
rfc2119_level: MAY
topics:
    - mpls
    - routing
