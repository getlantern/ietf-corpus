document: rfc-3605
kind: interoperability-note
summary: Implementations of RTP adhering to the earlier RFC 1889 specification may not be able to make use of the SDP 'a=rtcp' attribute defined in this document, since RFC 1889 required RTCP ports to be derived algorithmically from the base media port.
section: "1"
topics:
