document: rfc-2213
kind: protocol-element
summary: intSrvFlowBurst (BurstSize, bytes) represents the largest burst expected from the sender. If set below the sender's advertised burst, the receiver requests network pacing beyond normal; such pacing is at the network's option.
section: "3.3"
topics:
