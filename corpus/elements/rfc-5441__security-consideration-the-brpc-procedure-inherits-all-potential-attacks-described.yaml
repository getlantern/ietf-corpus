document: rfc-5441
kind: security-consideration
summary: The BRPC procedure inherits all potential attacks described in RFC 5440 Section 10, including spoofing, snooping, falsification, and denial of service. An implementation MAY support a policy module governing conditions under which a PCE participates in BRPC (e.g., origin of requests, rate limits).
