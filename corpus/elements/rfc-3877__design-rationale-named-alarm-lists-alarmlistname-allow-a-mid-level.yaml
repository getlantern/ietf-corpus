document: rfc-3877
kind: design-rationale
summary: Named alarm lists (alarmListName) allow a mid-level manager to maintain separate alarm lists per managed device and support distributed alarm management scenarios, while the zero-length list name is reserved as the default for systems that do not support multiple named lists.
