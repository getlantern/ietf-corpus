document: rfc-8685
kind: normative-requirement
summary: If both PCEP peers attempt to set the P-flag in the H-PCE-CAPABILITY TLV, session establishment MUST fail and the responding speaker MUST send a PCErr with Error-Type=1 (PCEP session establishment failure).
section: 3.2.1
rfc2119_level: MUST
