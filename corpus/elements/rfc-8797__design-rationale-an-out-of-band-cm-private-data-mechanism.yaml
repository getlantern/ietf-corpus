document: rfc-8797
kind: design-rationale
summary: An out-of-band CM Private Data mechanism was chosen because RPC-over-RDMA version 1 has no way to extend its XDR-based Transport Header format while preserving interoperability with existing implementations. The Private Data exchange is independent of and does not alter the XDR definition in RFC 8166.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
