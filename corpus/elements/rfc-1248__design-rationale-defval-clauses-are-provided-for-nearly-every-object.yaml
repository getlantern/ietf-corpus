kind: design-rationale
summary: DEFVAL clauses are provided for nearly every object to minimize parameterization; the simplest valid OSPF configuration requires only a single SNMP SET (ospfAdminStat := enabled), after which the process auto-discovers interfaces, derives metrics from ifSpeed, and places all interfaces in backbone area 0.0.0.0.
