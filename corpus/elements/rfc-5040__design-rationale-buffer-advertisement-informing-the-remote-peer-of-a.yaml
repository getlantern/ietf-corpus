document: rfc-5040
kind: design-rationale
summary: Buffer Advertisement — informing the Remote Peer of a Tagged Buffer's STag, base address, and length — is deliberately left outside the scope of RDMAP and delegated to the ULP. A typical method embeds the Tagged Buffer identifiers in a Send Message to the peer.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
