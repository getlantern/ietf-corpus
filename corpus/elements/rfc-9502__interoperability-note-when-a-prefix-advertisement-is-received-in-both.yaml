document: rfc-9502
kind: interoperability-note
summary: When a prefix advertisement is received in both an IS-IS SRv6 Locator TLV (RFC 9352) and an IS-IS IPv6 Algorithm Prefix Reachability TLV, the receiver MUST ignore both of them and MUST NOT install any forwarding entries based on these advertisements. This situation SHOULD be logged as an error.
section: "6.2"
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
