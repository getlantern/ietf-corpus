document: rfc-6581
kind: protocol-element
summary: 'Three new SCTP Function Codes for DDP Session Control are defined: Enhanced DDP Stream Session Initiate (0x005), Enhanced DDP Stream Session Accept (0x006), and Enhanced DDP Stream Session Reject (0x007). These parallel the unenhanced codes from RFC 5043 and carry IRD/ORD fields in the first 32 bits of Private Data.'
