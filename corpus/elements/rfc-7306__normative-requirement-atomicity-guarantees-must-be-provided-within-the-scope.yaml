document: rfc-7306
kind: normative-requirement
summary: Atomicity guarantees MUST be provided within the scope of a single RNIC. Atomicity with respect to access via other RNICs or local processor memory accesses to the same Tagged Buffer is OPTIONAL.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
