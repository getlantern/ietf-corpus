document: rfc-9944
kind: wire-format
summary: Device MAC addresses across BLE, DPP, and Ethernet MAB extensions are stored as strings matching the ECMA regular expression ^[0-9A-Fa-f]{2}(:[0-9A-Fa-f]{2}){5}$, representing a 48-bit colon-separated hexadecimal value. The BLE IRK is a string that is write-only and never returned.
section: 7.1.1
topics:
