document: rfc-7915
kind: security-consideration
summary: The use of stateless IP/ICMP translators does not introduce new security issues beyond those already present in IPv4, IPv6, and the routing protocols used to route packets to the translator. However, potential issues arise from deriving IPv4 addresses from IPv6 addresses, particularly for addresses like broadcast, loopback, or non-IPv4-translatable addresses; RFC 6052 addresses these.
section: "8"
topics:
