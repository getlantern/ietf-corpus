document: rfc-2919
kind: wire-format
summary: 'The list identifier syntax is defined as: list-id = list-label ''.'' list-id-namespace, where list-label is a dot-atom-text and list-id-namespace is either a domain-name or the reserved string ''localhost''. A list-id MUST NOT exceed 255 octets.'
