document: rfc-9140
kind: design-rationale
summary: EAP-NOOB requires dynamically generated OOB messages rather than static printed codes because the receipt of the OOB message authorizes the server to take ownership of the device. Static codes could be leaked before deployment and reused to claim unauthorized ownership; dynamic messages prevent this.
section: "1"
topics:
    - security
