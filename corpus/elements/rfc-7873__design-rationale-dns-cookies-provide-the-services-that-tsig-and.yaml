document: rfc-7873
kind: design-rationale
summary: 'DNS Cookies provide the services that TSIG and SIG(0) do not: lightweight message authentication of both requests and responses with no requirement for pre-configuration or per-client server-side state. TSIG requires key pre-agreement and time synchronization; SIG(0) does not authenticate requests and requires public-key cryptography.'
section: "3.3"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
