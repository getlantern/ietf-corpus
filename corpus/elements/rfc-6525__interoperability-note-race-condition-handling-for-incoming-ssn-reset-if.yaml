document: rfc-6525
kind: interoperability-note
summary: 'Race condition handling for Incoming SSN Reset: if an Outgoing SSN Reset Request completely overlaps a simultaneously received Incoming SSN Reset Request, the endpoint MUST respond ''Nothing to do''. If partial overlap or already-reset streams, the Incoming request MUST still be processed normally.'
section: 5.2.3
topics:
    - sctp
