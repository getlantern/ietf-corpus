document: rfc-9174
kind: wire-format
summary: 'The SESS_INIT message contains: Message Header (1 octet), Keepalive Interval (U16, seconds), Segment MRU (U64, bytes), Transfer MRU (U64, bytes), Node ID Length (U16), Node ID Data (variable, UTF-8), Session Extension Items Length (U32), and Session Extension Items (variable). A zero-length Node ID Data indicates the absence of a node ID.'
section: "4.6"
