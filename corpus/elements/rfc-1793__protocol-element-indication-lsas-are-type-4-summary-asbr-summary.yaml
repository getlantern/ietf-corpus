document: rfc-1793
kind: protocol-element
summary: Indication-LSAs are type-4-summary (ASBR-summary) LSAs with the LSA's cost set to LSInfinity and the DC-bit clear, originated by area border routers to convey the existence of DoNotAge-incapable routers across area boundaries. They always have the DC-bit clear and are used even when the originating ABR is not actually an ASBR.
section: 2.5.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
