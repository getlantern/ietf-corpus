document: rfc-6660
kind: interoperability-note
summary: 'The encoding is compatible with BCP 124 (RFC 4774) for alternate ECN semantics: it designates PCN-compatible DSCPs as no longer supporting default ECN semantics within the PCN-domain. Ingress and egress nodes prevent unintended ECN mark leakage into or out of the domain.'
section: "6.1"
