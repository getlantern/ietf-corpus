document: rfc-9209
kind: security-consideration
summary: The content of the Proxy-Status field is not verified; an intermediary can claim certain actions (e.g., sending a request over an encrypted channel) without actually performing them. Recipients cannot rely on Proxy-Status values as trustworthy attestations.
section: "4"
topics:
    - http
    - security
