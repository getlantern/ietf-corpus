document: rfc-3606
kind: normative-requirement
summary: Calling party subaddress information SHALL only be transferred to the called party if calling party number delivery is enabled (atmSigSupportClgPtyNumDel = enabled(1)). This dependency is enforced by the object description in atmSigSupportClgPtySubAddr.
