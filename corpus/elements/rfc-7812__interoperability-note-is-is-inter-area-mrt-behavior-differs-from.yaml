document: rfc-7812
kind: interoperability-note
summary: IS-IS inter-area MRT behavior differs from OSPF because an IS-IS interface can belong to both Level-1 and Level-2 simultaneously, while an OSPF interface belongs to only one area. The explicit IS-IS inter-level forwarding behavior is described separately in Appendix A.
