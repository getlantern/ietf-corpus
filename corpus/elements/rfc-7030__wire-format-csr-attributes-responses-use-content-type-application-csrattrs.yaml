document: rfc-7030
kind: wire-format
summary: CSR Attributes responses use Content-Type application/csrattrs with Content-Transfer-Encoding base64. The body is a DER-encoded ASN.1 SEQUENCE of AttrOrOID elements, where each element is either an OBJECT IDENTIFIER or an Attribute. An empty SEQUENCE is equivalent to HTTP 204 or 404.
