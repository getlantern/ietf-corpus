document: rfc-6911
kind: protocol-element
summary: The Framed-IPv6-Address Attribute (Type 168, Length 18) carries a 128-bit IPv6 address assigned to the NAS-facing interface of the RG/host. It MAY appear multiple times in Access-Accept packets and MAY be used as a hint in Access-Request packets.
