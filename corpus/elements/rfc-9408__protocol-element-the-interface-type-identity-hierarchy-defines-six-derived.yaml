document: rfc-9408
kind: protocol-element
summary: 'The ''interface-type'' identity hierarchy defines six derived types: ''phy'' (physical port), ''loopback'', ''lag'' (Link Aggregation Group per IEEE 802.1AX), ''irb'' (Integrated Routing and Bridging, connecting IP-VRF to bridge domain), ''local-bridge'' (internal bridging reference), and ''logical'' (sub-interface, used only when no more specific type applies).'
