document: rfc-20
kind: interoperability-note
summary: 'The characters @, [, \, ], ^, `, {, |, }, ~, # (positions 4/0, 5/11–5/15, 6/0, 7/11–7/14, 2/3) should not be used in international interchange without prior agreement between sender and recipient, due to differing national assignments.'
