document: rfc-3168
kind: security-consideration
summary: The ECN field is not covered by IPsec cryptographic integrity checks; modifying the ECN field in an IPsec-tunneled packet does not cause any integrity verification failure and may constitute a covert channel. Running the tunnel in limited-functionality mode eliminates this channel.
section: "9.2"
topics:
    - ecn
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
