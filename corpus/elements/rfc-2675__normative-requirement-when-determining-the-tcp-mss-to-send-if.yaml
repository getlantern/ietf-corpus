document: rfc-2675
kind: normative-requirement
summary: When determining the TCP MSS to send, if the MTU of the directly attached interface minus 60 is greater than or equal to 65,535, the MSS value must be set to 65,535.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
