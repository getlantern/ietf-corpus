document: rfc-6364
kind: normative-requirement
summary: In multicast-based applications, receivers SHOULD NOT send an answer back to the sender specifying their FEC protection choices, since this can overwhelm the sender in large-scale multicast applications.
section: "5.1"
rfc2119_level: SHOULD NOT
topics:
