document: rfc-5438
kind: interoperability-note
summary: An IM Sender matches an IMDN to an IM by correlating the Message-ID header field in the IM with the <message-id> element in the IMDN XML body. The Message-ID of the IMDN itself is distinct and unrelated to the IM's Message-ID.
section: 7.1.2
topics:
    - realtime
    - sip
