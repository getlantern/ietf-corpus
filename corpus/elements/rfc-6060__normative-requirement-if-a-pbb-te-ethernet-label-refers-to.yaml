document: rfc-6060
kind: normative-requirement
summary: 'If a PBB-TE Ethernet Label refers to a reserved IEEE MAC address (01-80-C2-00-00-00 to 01-80-C2-00-00-0F), a bridge encountering the mismatch MUST immediately generate an error: Routing problem (24) / Unacceptable label value (6).'
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
