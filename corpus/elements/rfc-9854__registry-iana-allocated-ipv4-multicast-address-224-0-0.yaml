summary: IANA allocated IPv4 multicast address 224.0.0.69 with link-local scope, named 'all-AODV-RPL-nodes', in the Local Network Control Block (224.0.0/24) registry for nodes implementing AODV-RPL. RFC 9854 is also added as an additional reference for MOP=4 ('P2P Route Discovery') in the RPL 'Mode of Operation' registry.
