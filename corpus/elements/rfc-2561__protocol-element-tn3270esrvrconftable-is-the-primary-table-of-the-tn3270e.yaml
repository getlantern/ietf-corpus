document: rfc-2561
kind: protocol-element
summary: tn3270eSrvrConfTable is the primary table of the TN3270E-MIB, containing configuration and control objects for each TN3270E server, indexed by tn3270eSrvrConfIndex. Key objects include InactivityTimeout, ConnectivityChk (NOP/TIMING-MARK), AdminStatus, OperStatus, SessionTermState, and SrvrType.
