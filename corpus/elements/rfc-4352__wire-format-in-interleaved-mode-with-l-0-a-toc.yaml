document: rfc-4352
kind: wire-format
summary: In interleaved mode with L=0, a ToC entry extends the basic 16-bit header with a list of n 4-bit unsigned displacement fields (DIS1..DISn, values 0–15) indicating per-frame decoding-order displacement, with 4-bit padding when n is odd. With L=1, displacement fields are 8 bits each (values 0–255), allowing interleaving depths up to 256 frames.
section: 4.3.2.2
topics:
    - rtp
    - realtime
