document: rfc-5190
kind: normative-requirement
summary: SNMP Command Responders instantiating the MIDCOM-MIB SHOULD use VACM to control access to midcomRuleTable and midcomGroupTable. Individual MIDCOM clients SHOULD only have access to entries they created, restricted to entries whose initial index matches their SNMP securityName or VACM groupName, for read, write, and notify access.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
