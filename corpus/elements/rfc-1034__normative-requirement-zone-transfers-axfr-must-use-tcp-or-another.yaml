document: rfc-1034
kind: normative-requirement
summary: Zone transfers (AXFR) must use TCP or another reliable protocol because accuracy is essential. The first and last messages in an AXFR response must contain the data for the top authoritative node of the zone.
section: 4.3.5
rfc2119_level: MUST
topics:
    - dns
