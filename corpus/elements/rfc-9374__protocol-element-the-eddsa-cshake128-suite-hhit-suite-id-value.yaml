document: rfc-9374
kind: protocol-element
summary: The EdDSA/cSHAKE128 suite (HHIT Suite ID value 5) uses cSHAKE128 as the hash function with KMAC128 as the HMAC and EdDSA as the signature algorithm family. The cSHAKE128 output length is variable (at most 96 bits) and used directly in the ORCHID without truncation.
section: 3.4.2
topics:
