document: rfc-2326
kind: interoperability-note
summary: While most real-time media will use RTP as a transport protocol, RTSP operation does not depend on RTP. RTSP data MAY be interleaved with RTP and RTCP packets on the same TCP connection using the embedded binary data mechanism.
section: "1.8"
topics:
