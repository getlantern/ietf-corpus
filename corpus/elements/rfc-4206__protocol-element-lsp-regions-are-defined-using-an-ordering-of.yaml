document: rfc-4206
kind: protocol-element
summary: 'LSP regions are defined using an ordering of Interface Switching Capabilities: PSC-1 < PSC-2 < PSC-3 < PSC-4 < TDM < LSC < FSC. A region boundary exists at node-i when the interface switching capability increases across that node along the LSP path.'
