document: rfc-5844
kind: normative-requirement
summary: If the mobile node is not authorized for IPv4 service or IPv4 routing is not enabled in the home network, the LMA MUST reject the Proxy Binding Update and send a PBA with Status set to NOT_AUTHORIZED_FOR_IPV4_MOBILITY_SERVICE (170).
section: 3.1.2.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - security
