document: rfc-6977
kind: design-rationale
summary: The default server behavior is to reject Reconfigure-Request messages (rather than accept) because allowing an untrusted relay to trigger Reconfigure messages poses a security risk. An administrator must explicitly enable this feature on the server.
section: "6.5"
topics:
    - security
