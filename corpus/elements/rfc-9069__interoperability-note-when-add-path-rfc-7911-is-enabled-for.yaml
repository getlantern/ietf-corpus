document: rfc-9069
kind: interoperability-note
summary: When ADD-PATH (RFC 7911) is enabled for an address family and the Loc-RIB contains additional paths, the ADD-PATH capability SHOULD be reflected in the fabricated Peer Up OPEN message so that BMP receivers correctly parse the additional-path-encoded Route Monitoring messages.
section: "5.2"
topics:
