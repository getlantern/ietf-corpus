document: rfc-4915
kind: protocol-element
summary: A separate SPF is computed for each MT-ID to find independent paths to IP prefixes. Network-LSAs are used by all topologies during SPF, but during SPF for a given MT-ID only the links and metrics for that MT-ID are considered.
section: "3.6"
