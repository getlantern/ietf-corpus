document: rfc-2298
kind: normative-requirement
summary: MDNs SHOULD NOT be sent automatically if the Disposition-Notification-To address differs from the Return-Path address. User confirmation SHOULD be obtained; if unobtainable, an MDN SHOULD NOT be sent. This reduces mail loops and MDN-based mail bombing.
section: "2.1"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
