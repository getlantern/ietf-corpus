document: rfc-6474
kind: normative-requirement
summary: For the BIRTHPLACE property, the value type and VALUE parameter MUST match — if VALUE=uri is specified, the value must be a URI; if VALUE=text or default, the value must be text.
section: "2.1"
rfc2119_level: MUST
