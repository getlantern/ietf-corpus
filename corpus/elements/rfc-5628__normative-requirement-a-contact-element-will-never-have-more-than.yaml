document: rfc-5628
kind: normative-requirement
summary: A contact element will never have more than one <pub-gruu> and one <temp-gruu> child element, since a particular contact cannot be associated with more than one instance ID. Multiple contacts sharing the same instance ID will have identical <pub-gruu> and <temp-gruu> child elements.
section: "5"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
