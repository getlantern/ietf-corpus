document: rfc-2043
kind: wire-format
summary: 'SNA XID or FID2 PIUs over LLC 802.2 are encapsulated in the PPP Information field with PPP Protocol field 0x004B. The frame contains: Protocol (0x004B), DSAP Address, SSAP Address, Control Field, and LLC Information Field (carrying the XID or FID2 PIU).'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
