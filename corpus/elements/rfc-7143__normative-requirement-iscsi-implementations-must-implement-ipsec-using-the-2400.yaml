document: rfc-7143
kind: normative-requirement
summary: iSCSI implementations MUST implement IPsec using the 2400-series RFCs (IPsec v2 / IKEv1) and SHOULD implement IPsec using the 4300-series RFCs (IPsec v3 / IKEv2) as specified in RFC 7146. Extended sequence numbers (ESNs) are required when using ESPv2.
section: "9.3"
rfc2119_level: MUST
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
