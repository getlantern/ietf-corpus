document: rfc-1972
kind: wire-format
summary: 'The Ethernet multicast address for an IPv6 multicast destination DST is: 33:33:DST[13]:DST[14]:DST[15]:DST[16], where DST[13]-DST[16] are the last four octets of the 16-octet IPv6 destination address.'
