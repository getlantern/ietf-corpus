document: rfc-6554
kind: design-rationale
summary: The SRH introduces the CmprI, CmprE, and Pad fields to allow compaction of the Address[1..n] vector when all entries share a common prefix with the IPv6 Destination Address. This is a typical scenario in LLNs where routers in a routing domain share a common prefix, and compaction reduces consumption of scarce channel capacity.
section: "2"
topics:
    - ip
    - routing
