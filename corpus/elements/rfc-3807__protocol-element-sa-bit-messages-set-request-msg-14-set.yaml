document: rfc-3807
kind: protocol-element
summary: Sa-Bit Messages (Set Request msg 14, Set Confirm msg 15, Status Request msg 16, Status Indication msg 17) are used between V5 System Management on the MGC and the L1 FSM on the SG to set and read Sa bit values on E1 links. For V5, only the Sa7 bit (BIT ID 0x7) is used for the Link Identification procedure.
section: "4.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
