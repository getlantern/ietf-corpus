document: rfc-9234
kind: design-rationale
summary: BGP Role negotiation was designed as an in-band replacement for purely operator-driven, configuration-based route leak prevention, which had no mechanism to verify that both eBGP speakers agreed on the peering relationship. By encoding the role in OPEN messages, both sides must concur.
section: "1"
topics:
    - bgp
    - routing
