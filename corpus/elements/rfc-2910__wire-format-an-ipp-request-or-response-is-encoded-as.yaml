document: rfc-2910
kind: wire-format
summary: 'An IPP request or response is encoded as: version-number (2 bytes), operation-id or status-code (2 bytes), request-id (4 bytes), zero or more attribute-groups (variable length), end-of-attributes-tag (1 byte, always required), and optional data. The end-of-attributes-tag is always present even when data is absent.'
section: 3.1.1
topics:
    - http
