kind: protocol-element
summary: 'NATV2-MIB defines four key textual conventions: ProtocolNumber (a Unsigned32 0..255 based on the IANA Protocol Numbers registry), Natv2SubscriberIndex (Unsigned32 1..4294967295), Natv2InstanceIndex (Unsigned32 1..4294967295), and Natv2PoolIndex (Unsigned32 1..4294967295). All index types are administered values intended to be permanently associated with their respective entities.'
