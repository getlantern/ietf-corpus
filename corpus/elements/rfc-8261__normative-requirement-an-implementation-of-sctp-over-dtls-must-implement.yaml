document: rfc-8261
kind: normative-requirement
summary: An implementation of SCTP over DTLS MUST implement and use a path MTU discovery method that functions without ICMP, to provide SCTP/DTLS with an MTU estimate. Implementation of Packetization Layer Path MTU Discovery (RFC 4821) in SCTP or DTLS is RECOMMENDED.
section: "4"
rfc2119_level: MUST
topics:
    - sctp
    - tls
