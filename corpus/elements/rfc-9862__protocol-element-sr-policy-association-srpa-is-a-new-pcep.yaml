document: rfc-9862
kind: protocol-element
summary: SR Policy Association (SRPA) is a new PCEP Association Type (6) that groups Candidate Paths belonging to the same SR Policy. Each LSP in an SRPA represents one Candidate Path; the SRPA encodes the SR Policy Identifier, Candidate Path Identifier, and optional Candidate Path Attributes.
