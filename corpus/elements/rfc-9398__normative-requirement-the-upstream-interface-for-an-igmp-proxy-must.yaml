document: rfc-9398
kind: normative-requirement
summary: 'The upstream interface for an IGMP Proxy MUST NOT be configured to use PIM. This is enforced via a YANG ''must'' constraint: the interface name must not appear in the PIM interface list under /rt:routing/rt:control-plane-protocols/pim-base:pim.'
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - yang
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
