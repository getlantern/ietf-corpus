document: rfc-4932
kind: interoperability-note
summary: RFC 4932 relaxes the RFC 3732 requirement that at least one <host:add>, <host:rem>, or <host:chg> element be present in an <update> command, allowing all such elements to be omitted when an <update> extension is present.
