document: rfc-9081
kind: interoperability-note
summary: Although both RFC 6514 Section 13 ('rpt-spt' mode) and Section 14 ('spt-only' mode) define MVPN SA routes, MVPN/MSDP SA interoperation described in this document applies only to 'spt-only' mode; 'rpt-spt' mode interoperation is out of scope.
