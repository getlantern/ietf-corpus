document: rfc-5121
kind: state-machine
summary: 'IPv6 link establishment in 802.16 follows a sequential procedure: (1) initial ranging/synchronization, (2) SBC-REQ/RSP basic capability exchange, (3) PKMv2-based authentication, (4) 802.16 registration, (5) REG-REQ/RSP capability exchange with IPv6 CS capability indicated by Bit #2, (6) service flow establishment for IPv6 over IP CS, (7) router advertisement/solicitation exchange.'
section: "6.2"
topics:
