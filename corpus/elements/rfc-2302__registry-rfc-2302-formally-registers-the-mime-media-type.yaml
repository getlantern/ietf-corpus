document: rfc-2302
kind: registry
summary: RFC 2302 formally registers the MIME media type image/tiff with IANA, covering all profiles and extensions that build on TIFF 6.0 encoded image data. The registration supersedes the earlier definition in RFC 1528, which was limited to TIFF Class F.
