document: rfc-2068
kind: security-consideration
summary: The Basic authentication scheme encodes credentials as base64-encoded plaintext, providing no confidentiality protection. HTTP/1.1 also defines Digest authentication as a stronger alternative; servers SHOULD offer stronger schemes when available.
