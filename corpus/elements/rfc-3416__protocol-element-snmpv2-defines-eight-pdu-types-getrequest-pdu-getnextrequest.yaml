document: rfc-3416
kind: protocol-element
summary: 'SNMPv2 defines eight PDU types: GetRequest-PDU, GetNextRequest-PDU, GetBulkRequest-PDU, Response-PDU, SetRequest-PDU, InformRequest-PDU, SNMPv2-Trap-PDU, and Report-PDU. Each is an ASN.1 IMPLICIT encoding tagged [0] through [8] respectively (tag [4] is obsolete). The Report-PDU semantics are not defined in this document and must be defined by the administrative framework using it.'
section: "3"
topics:
