document: rfc-8072
kind: protocol-element
summary: 'Seven edit operations are defined: ''create'' (create if not exists, error if exists), ''delete'' (delete if exists, error if not), ''insert'' (insert new user-ordered entry), ''merge'' (merge with target, create if not exists), ''move'' (reorder user-ordered entry), ''replace'' (replace target), and ''remove'' (delete if exists, no error if not).'
section: "2.5"
