document: rfc-5717
kind: normative-requirement
summary: If a lock is already held on any node within the subtrees to be locked, the error-tag is 'lock-denied' and error-info includes the session-id of the lock owner. If the lock is held by a non-NETCONF session, a session-id of 0 (zero) SHOULD be included.
section: 2.4.1
rfc2119_level: SHOULD
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
