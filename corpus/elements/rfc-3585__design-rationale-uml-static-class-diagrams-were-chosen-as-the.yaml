document: rfc-3585
kind: design-rationale
summary: UML static class diagrams were chosen as the canonical form because they provide a graphical, task-independent way to model systems. The conceptual UML view does not necessarily translate class-for-class into any particular implementation; for example, an LDAP schema may flatten the hierarchy to fewer classes due to reference-following inefficiency.
