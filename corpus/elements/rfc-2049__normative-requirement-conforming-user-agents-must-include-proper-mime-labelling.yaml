document: rfc-2049
kind: normative-requirement
summary: Conforming user agents MUST include proper MIME labelling when sending anything other than plain US-ASCII text. Sending non-US-ASCII text without a MIME-Version field is strongly discouraged as it impedes interoperability.
section: "2"
rfc2119_level: MUST
topics:
