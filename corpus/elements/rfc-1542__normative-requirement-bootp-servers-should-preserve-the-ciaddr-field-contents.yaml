document: rfc-1542
kind: normative-requirement
summary: BOOTP servers SHOULD preserve the 'ciaddr' field contents in BOOTREPLY messages, exactly matching what was in the corresponding BOOTREQUEST. The 'ciaddr' field alone SHOULD NOT be trusted as the sole key in identifying a client.
section: "5.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
