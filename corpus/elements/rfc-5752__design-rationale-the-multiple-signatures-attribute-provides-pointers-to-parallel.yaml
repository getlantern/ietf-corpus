document: rfc-5752
kind: design-rationale
summary: The multiple-signatures attribute provides pointers to parallel signatures by the same signer, in contrast to the countersignature attribute which provides serial signatures. It is not intended to sign over an existing signature but to cross-link simultaneous SignerInfo objects at the same level.
section: "1"
topics:
    - crypto
    - security
