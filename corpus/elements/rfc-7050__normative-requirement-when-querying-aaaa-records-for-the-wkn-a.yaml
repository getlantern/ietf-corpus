document: rfc-7050
kind: normative-requirement
summary: When querying AAAA records for the WKN, a node MUST set the Checking Disabled (CD) bit to zero; otherwise the DNS64 server will not perform IPv6 address synthesis and will not reveal the Pref64::/n.
