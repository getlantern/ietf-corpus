document: rfc-6658
kind: interoperability-note
summary: The packet PW encapsulation conforms to the PW protocol stack defined in RFC 4448 (Ethernet PW). The loss of 32-bit alignment between the virtual Ethernet header and the optional control word is a deliberate choice to preserve backwards compatibility with the Ethernet PW design.
