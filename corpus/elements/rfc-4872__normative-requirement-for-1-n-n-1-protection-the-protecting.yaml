document: rfc-4872
kind: normative-requirement
summary: For 1:N (N>1) protection, the protecting LSP's Association ID MUST by default be set to the LSP ID of the protected LSP corresponding to N=1. Each working LSP sets its Association ID to the protecting LSP ID.
section: "7.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
