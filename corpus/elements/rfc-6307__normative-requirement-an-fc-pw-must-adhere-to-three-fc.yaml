document: rfc-6307
kind: normative-requirement
summary: 'An FC PW MUST adhere to three FC timing requirements: latency no more than half R_T_TOV (default 100 ms) for Primitive Sequences, no more than half E_D_TOV (default 2 s) for frames, and within R_A_TOV (default 10 s) for the fabric. The FC PW MUST NOT be used where high or variable latency may violate these requirements.'
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - realtime
