document: rfc-2141
kind: wire-format
summary: 'The reserved character set is `{ %, /, ?, # }`. These characters may not appear literally in an NSS without percent-encoding. The `%` introduces escape sequences; `/`, `?`, and `#` are reserved for future use.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
