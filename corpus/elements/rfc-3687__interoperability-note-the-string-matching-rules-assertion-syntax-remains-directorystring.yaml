document: rfc-3687
kind: interoperability-note
summary: The string matching rules' assertion syntax remains DirectoryString regardless of the component's actual string type. An implementation must compare a DirectoryString assertion to a restricted character string component value; if corresponding characters are not representable in both character sets, matching returns FALSE.
section: 3.2.1.1
topics:
    - ldap
