document: rfc-6736
kind: protocol-element
summary: 'The NC-Request-Type AVP (AVP Code 595, Enumerated, mandatory in all NCRs) indicates the request type: INITIAL_REQUEST (1) to create a new DNCA session, UPDATE_REQUEST (2) to modify bindings in an existing session, or QUERY_REQUEST (3) to retrieve current binding information.'
