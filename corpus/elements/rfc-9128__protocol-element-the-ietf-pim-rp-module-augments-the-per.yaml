document: rfc-9128
kind: protocol-element
summary: The ietf-pim-rp module augments the per-AF branch with an 'rp' container holding static-rp (ipv4-rp/ipv6-rp lists keyed by rp-address), BSR configuration (bsr-candidate, rp-candidate), read-only rp-list (all active RPs with source type and expiration), and rp-mappings (group-range-to-RP mappings). It is shared by PIM-SM and BIDIR-PIM but not PIM-DM.
section: "3.2"
topics:
    - yang
    - multicast
