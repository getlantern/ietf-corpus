document: rfc-5846
kind: interoperability-note
summary: The binding revocation mechanism applies uniformly to base MIPv6 (RFC 3775), DSMIPv6 (RFC 5555), Multiple Care-of Addresses (RFC 5648), and Proxy Mobile IPv6 (RFC 5213/RFC 5844), using the same MH Type 16 message format. The P bit distinguishes PMIPv6 bindings from MIPv6 bindings within the same message structure.
