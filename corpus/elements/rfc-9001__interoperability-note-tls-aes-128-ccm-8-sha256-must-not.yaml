document: rfc-9001
kind: interoperability-note
summary: TLS_AES_128_CCM_8_SHA256 MUST NOT be negotiated for use with QUIC because no header protection scheme is defined for it in this document. All other TLS 1.3 cipher suites are supported, subject to header protection algorithm availability.
section: "5.3"
topics:
    - quic
    - tls
    - crypto
