document: rfc-8078
kind: security-consideration
summary: Turning off DNSSEC reduces domain security and should only be done as a last resort to prevent validation errors from mismatched DS and DNSKEY records. Re-establishing trust in delegation can be hard and takes time.
section: "5"
topics:
