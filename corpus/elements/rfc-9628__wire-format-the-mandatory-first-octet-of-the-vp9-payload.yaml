summary: 'The mandatory first octet of the VP9 payload descriptor encodes eight 1-bit flags: I (PID present), P (inter-picture predicted), L (layer indices present), F (flexible mode), B (start of frame), E (end of frame), V (scalability structure present), Z (not a reference for upper spatial layers).'
