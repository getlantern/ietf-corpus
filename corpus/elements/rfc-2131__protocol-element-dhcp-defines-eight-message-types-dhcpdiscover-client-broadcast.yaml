document: rfc-2131
kind: protocol-element
summary: 'DHCP defines eight message types: DHCPDISCOVER (client broadcast to locate servers), DHCPOFFER (server response with offered parameters), DHCPREQUEST (client selects an offer or renews a lease), DHCPACK (server commits configuration), DHCPNAK (server rejects client address), DHCPDECLINE (client reports address in use), DHCPRELEASE (client relinquishes lease), and DHCPINFORM (client requests parameters without address allocation).'
