document: rfc-6048
kind: normative-requirement
summary: For a newsgroup with '=other.group' status, a newsgroup name MUST immediately follow the '=' sign. The Newsgroups header fields of articles filed under an alias MUST NOT be altered.
section: "3.1"
rfc2119_level: MUST
