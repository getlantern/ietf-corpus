document: rfc-2358
kind: design-rationale
summary: 'The document takes the position that ''an Ethernet is an Ethernet'': all speeds (10/100 Mbit) should share ifType ethernetCsmacd(6), with speed differentiation delegated to ifSpeed/ifHighSpeed and duplex mode to ifMauType in the MAU MIB. This avoids proliferating new ifType values for each Ethernet variant.'
section: 3.2.6
topics:
