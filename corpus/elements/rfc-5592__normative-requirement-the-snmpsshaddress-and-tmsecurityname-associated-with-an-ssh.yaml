document: rfc-5592
kind: normative-requirement
summary: The SnmpSSHAddress and tmSecurityName associated with an SSH session MUST remain constant during the life of the session. Messages MUST NOT be sent through an existing SSH session established using a different tmSecurityName.
section: 3.1.4
rfc2119_level: MUST
topics:
    - snmp
    - security
