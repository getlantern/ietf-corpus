document: rfc-3024
kind: normative-requirement
summary: The mobile node MUST set the TTL field of the IP header to 255 in Registration Requests sent to the foreign agent. This limits the reverse-tunnel hijacking attack by preventing malicious nodes more than one hop away from posing as valid mobile nodes.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
