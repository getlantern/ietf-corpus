document: rfc-9363
kind: wire-format
summary: Field Length (fl-type) is a union of uint8 (fixed size in bits) and identityref (function-based length). Defined functions include fl-variable (variable-length field, length in bytes as defined for CoAP) and fl-token-length (CoAP Token Length field).
