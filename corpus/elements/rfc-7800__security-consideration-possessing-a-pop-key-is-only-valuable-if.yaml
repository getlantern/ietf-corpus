document: rfc-7800
kind: security-consideration
summary: Possessing a PoP key is only valuable if the key is kept secret. Appropriate means must be used to prevent unintended parties from learning private or symmetric key values. JWT integrity and data origin authentication are required for all JWTs carrying PoP information.
