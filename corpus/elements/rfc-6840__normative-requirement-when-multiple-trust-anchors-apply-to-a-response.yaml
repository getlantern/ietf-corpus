document: rfc-6840
kind: normative-requirement
summary: When multiple trust anchors apply to a response, the recommended default policy ('Accept Any Success') is to try all applicable trust anchors; the result is Secure if any yields Secure, Insecure only if all yield Insecure, and Bogus if one or more yield Bogus with no Secure result.
section: "5.10"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
