document: rfc-8265
kind: normative-requirement
summary: A username MUST NOT be zero bytes in length. This rule is enforced after any normalization and mapping of code points, to prevent applications from mistakenly omitting a username entirely when internationalized strings are accepted.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
