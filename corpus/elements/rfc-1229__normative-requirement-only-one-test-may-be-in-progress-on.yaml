document: rfc-1229
kind: normative-requirement
summary: Only one test may be in progress on each interface at any one time. If a second test is invoked while one is running, the second test must be rejected. Some agents may also reject a new test if any prior test is active on another interface.
section: "4.2"
rfc2119_level: MUST
topics:
    - snmp
