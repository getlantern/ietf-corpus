document: rfc-4761
kind: security-consideration
summary: 'VPLS labels must be accepted only from valid interfaces: for a PE, links from P routers; for an ASBR, links from ASBRs in ASes that are part of the given VPLS. This is especially critical for multi-AS VPLS deployments.'
