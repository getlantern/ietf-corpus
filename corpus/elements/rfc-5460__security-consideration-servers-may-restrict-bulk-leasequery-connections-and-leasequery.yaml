document: rfc-5460
kind: security-consideration
summary: Servers MAY restrict Bulk Leasequery connections and LEASEQUERY messages to certain trusted clients. Connections from non-permitted clients SHOULD be closed immediately to avoid server connection resource exhaustion. Servers MAY also restrict clients to specific query types.
section: "7.1"
topics:
    - security
    - dns
