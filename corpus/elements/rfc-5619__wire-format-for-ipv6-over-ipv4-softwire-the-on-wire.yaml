document: rfc-5619
kind: wire-format
summary: 'For IPv6-over-IPv4 softwire, the on-wire packet layering is: IPv4 header (SI to SC), ESP header, UDP header (src/dst port 1701), L2TPv2 header, PPP header, IPv6 header, payload, ESP ICV. ESP operates in transport mode.'
