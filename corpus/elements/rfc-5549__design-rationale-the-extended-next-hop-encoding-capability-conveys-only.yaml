document: rfc-5549
kind: design-rationale
summary: The Extended Next Hop Encoding capability conveys only next hop encoding information for a given AFI/SAFI; it does not affect whether that AFI/SAFI is permitted. AFI/SAFI allowance remains solely determined by the Multiprotocol Extensions capability (RFC4760).
