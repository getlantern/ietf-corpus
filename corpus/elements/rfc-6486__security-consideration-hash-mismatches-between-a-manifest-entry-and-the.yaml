document: rfc-6486
kind: security-consideration
summary: Hash mismatches between a manifest entry and the retrieved file likely indicate a superseded object whose newer version is unavailable, possibly due to an attack. For CRLs, an RP SHOULD endeavor to use the most recently issued valid CRL even if its hash does not match the manifest entry.
section: "6.6"
topics:
    - pkix
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
