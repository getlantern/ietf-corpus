summary: IANA IS-IS TLV registry is updated with GADDR-TLV (type 142, permitted in LSPs) and TRILL Neighbor TLV (type 145, permitted in IIHs). IANA sub-TLV registries are updated for sub-TLVs under GADDR TLV (types 1–6), MT-Port-Cap-TLV (types 1–3, 7–8), Router Capability/MT-Capability TLVs (types 6–10, 13–18), and Extended IS Reachability/MT-ISN TLVs (type 28).
