document: rfc-1542
kind: normative-requirement
summary: When relaying a BOOTREPLY, if the 'giaddr' field does not match one of the relay agent's directly-connected logical interfaces, the BOOTREPLY MUST be silently discarded. All BOOTP fields MUST be preserved intact; the relay agent MUST NOT modify any field.
section: 4.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
