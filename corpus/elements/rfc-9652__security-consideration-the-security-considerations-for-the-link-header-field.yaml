document: rfc-9652
kind: security-consideration
summary: 'The security considerations for the Link header field (RFC 8288) and for URI Templates (RFC 6570) both apply to Link-Template. Target attributes conveyed via Display Strings are vulnerable to a wide variety of attacks; implementers should consult Unicode Technical Report #36 for handling guidance.'
