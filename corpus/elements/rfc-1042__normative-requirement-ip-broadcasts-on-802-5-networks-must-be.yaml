document: rfc-1042
kind: normative-requirement
summary: IP broadcasts on 802.5 networks must be sent as single-route broadcasts to prevent multiple copies of IP broadcast packets, which would have undesirable effects on protocols using IP.
section: For IEEE 802.5
rfc2119_level: MUST
topics:
    - ip
    - multicast
