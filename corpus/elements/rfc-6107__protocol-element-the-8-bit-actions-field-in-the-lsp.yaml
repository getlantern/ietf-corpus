document: rfc-6107
kind: protocol-element
summary: 'The 8-bit Actions field in the LSP_TUNNEL_INTERFACE_ID object carries five bit flags: P (Private, bit 7), T (TE link suppression, bit 6), R (Routing adjacency, bit 5), B (Bundle, bit 4), and H (Hierarchy/stitching, bit 3). All flags are simultaneously meaningful; a value of 0x00 indicates a standard FA.'
section: 3.1.2
topics:
