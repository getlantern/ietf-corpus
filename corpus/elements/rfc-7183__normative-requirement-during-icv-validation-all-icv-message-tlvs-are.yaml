document: rfc-7183
kind: normative-requirement
summary: During ICV validation, all ICV Message TLVs are temporarily removed and msg-hop-count and msg-hop-limit are set to 0; if the recalculated ICV differs from the TLV value, message validation fails.
section: 6.3.2
rfc2119_level: MUST
topics:
