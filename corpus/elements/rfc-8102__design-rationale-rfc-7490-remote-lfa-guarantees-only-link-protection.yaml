document: rfc-8102
kind: design-rationale
summary: RFC 7490 remote-LFA guarantees only link protection; the resulting PQ-nodes may not provide node protection for all destinations in the event of primary next-hop node failure. This document defines procedures to determine whether a PQ-node actually guarantees node protection for a specific destination.
section: "1"
topics:
    - routing
