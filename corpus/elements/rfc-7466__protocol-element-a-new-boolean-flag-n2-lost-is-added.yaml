document: rfc-7466
kind: protocol-element
summary: A new boolean flag N2_lost is added to each 2-Hop Tuple in the 2-Hop Set. N2_lost=false when the corresponding Link Tuple has L_status=SYMMETRIC (L_lost=false); N2_lost=true when L_SYM_time has not expired but L_lost=true (L_status=LOST). In all other LOST cases, no 2-Hop Tuple is retained.
section: "4.1"
topics:
    - routing
