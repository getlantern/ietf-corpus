document: rfc-5755
kind: design-rationale
summary: The v2Form issuerName-only choice for AttCertIssuer was selected so the AC issuer does not need to know in advance which PKC the AC verifier will use for the issuer. Using baseCertificateID would force the verifier to trust whichever PKC the issuer chose at AC creation time.
section: 4.2.3
topics:
    - pkix
