document: rfc-3965
kind: normative-requirement
summary: Offramps SHOULD ensure that the G3Fax recipient is provided with contact information about the offramp and sufficient information (MAIL FROM, From, Sender, Reply-To, Message-Id, Received headers) to trace the originator of the IFax message.
section: 5.2.4
rfc2119_level: SHOULD
topics:
    - email
    - security
