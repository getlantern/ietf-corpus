document: rfc-9140
kind: registry
summary: IANA creates an 'EAP-NOOB Cryptosuites' registry. Suite 1 (mandatory-to-implement) uses Curve25519 ECDHE and SHA-256. The Cryptosuites field is a JSON array of integer identifiers ordered by decreasing server priority; the peer responds with a single integer Cryptosuitep. New entries require Specification Required.
section: "5.1"
topics:
