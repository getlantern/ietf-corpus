document: rfc-2476
kind: normative-requirement
summary: If the MSA cannot determine a return path to the submitting user (from a valid MAIL FROM, valid source IP, or authenticated identity), the MSA SHOULD immediately reject the message with a 550 code to the MAIL FROM command.
