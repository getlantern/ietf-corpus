document: rfc-9159
kind: protocol-element
summary: The MTU size for IPv6 mesh over Bluetooth LE links is 1280 octets. Bluetooth 4.2 defines a default MTU of 251 bytes; excluding the 4-byte L2CAP header, 247 bytes are available above L2CAP, and IPSP negotiates a link-layer connection providing at least 1280 octets for the IPv6 layer.
section: "3.1"
