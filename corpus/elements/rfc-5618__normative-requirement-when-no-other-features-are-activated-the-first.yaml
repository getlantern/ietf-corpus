document: rfc-5618
kind: normative-requirement
summary: When no other features are activated, the first 28 bits of the 32-bit Modes Field MUST be zero. A client conforming to this extension MAY ignore the values in the first 28 bits or MAY support other features communicated in those bit positions.
section: "3.1"
rfc2119_level: MUST
topics:
    - measurement
