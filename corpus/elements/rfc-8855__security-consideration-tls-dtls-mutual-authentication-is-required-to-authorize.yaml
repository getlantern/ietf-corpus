document: rfc-8855
kind: security-consideration
summary: TLS/DTLS mutual authentication is required to authorize floor participants and floor chairs, preventing unauthorized floor operations such as illegitimate floor grants or releases. Without mutual authentication, an attacker could impersonate a floor chair.
section: "9.1"
topics:
    - security
    - tls
    - realtime
