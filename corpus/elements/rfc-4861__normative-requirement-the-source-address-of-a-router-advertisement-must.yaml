document: rfc-4861
kind: normative-requirement
summary: The source address of a Router Advertisement MUST be the link-local address assigned to the sending interface. Hosts MUST silently discard RAs with source addresses that are not link-local.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - routing
