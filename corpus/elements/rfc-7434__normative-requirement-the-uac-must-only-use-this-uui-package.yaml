document: rfc-7434
kind: normative-requirement
summary: The UAC MUST only use this UUI package in association with the initial INVITE method and the BYE method relating to an INVITE dialog. Usage on re-INVITE transactions, other methods within the INVITE dialog, or methods not associated with a dialog is precluded.
section: "7"
rfc2119_level: MUST
topics:
    - sip
    - realtime
