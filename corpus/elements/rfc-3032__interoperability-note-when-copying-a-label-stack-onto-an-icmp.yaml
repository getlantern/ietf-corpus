document: rfc-3032
kind: interoperability-note
summary: When copying a label stack onto an ICMP error message (to route the ICMP through an MPLS tunnel back toward the source), label values must be copied exactly, but TTL values in the copied label stack should be set to the TTL placed in the ICMP IP header, not the original TTL values.
section: 2.3.2
topics:
    - mpls
