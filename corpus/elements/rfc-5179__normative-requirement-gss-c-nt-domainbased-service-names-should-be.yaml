document: rfc-5179
kind: normative-requirement
summary: GSS_C_NT_DOMAINBASED_SERVICE names SHOULD be mapped to Kerberos V principal names such that <service> becomes the first component, <hostname> the second, <domain> the third, and the realm corresponds to the domain name treated as a hostname.
section: "1"
rfc2119_level: SHOULD
