document: rfc-4443
kind: normative-requirement
summary: If a router receives a packet with a Hop Limit of zero, or decrements a packet's Hop Limit to zero, it MUST discard the packet and originate an ICMPv6 Time Exceeded message with Code 0 to the source of the packet.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
