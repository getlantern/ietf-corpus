document: rfc-954
kind: security-consideration
summary: The wildcard asterisk query ('*hostname') enables bulk enumeration of all members of any registered group or host with no authentication or rate limiting. RFC 954 notes only the performance impact, not the disclosure risk.
section: COMMAND LINES AND REPLIES
