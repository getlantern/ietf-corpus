document: rfc-4954
kind: security-consideration
summary: Before SASL negotiation begins, all protocol interactions are in the clear and may be modified by an active attacker. Clients and servers MUST discard any knowledge obtained prior to the start of SASL negotiation upon establishment of a security layer, preventing injection of pre-authentication data.
section: "9"
topics:
    - email
    - security
