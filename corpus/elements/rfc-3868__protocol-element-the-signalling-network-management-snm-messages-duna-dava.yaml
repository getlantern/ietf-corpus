document: rfc-3868
kind: protocol-element
summary: The Signalling Network Management (SNM) messages—DUNA, DAVA, DAUD, SCON, DUPU, DRST—carry SS7 network status information from the SG to ASPs, notifying them of destination unreachability, reachability, congestion, restricted state, and user-part unavailability.
