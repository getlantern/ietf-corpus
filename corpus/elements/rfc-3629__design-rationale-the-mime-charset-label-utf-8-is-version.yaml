document: rfc-3629
kind: design-rationale
summary: 'The MIME charset label ''UTF-8'' is version-independent by design: a label without a version number allows older applications to process newer data correctly when no new characters are present, whereas an unknown version-specific label would cause outright failure. The ''Korean mess'' incompatible change is deemed an acceptable historical exception because no significant data using the old Hangul encoding existed.'
section: "8"
