document: rfc-1460
kind: normative-requirement
summary: The APOP timestamp included in the server's banner greeting MUST be different each time the POP3 server issues a greeting, to provide replay protection. Its syntax corresponds to the 'msg-id' production in RFC 822.
section: "7"
rfc2119_level: MUST
topics:
    - email
    - security
    - crypto
