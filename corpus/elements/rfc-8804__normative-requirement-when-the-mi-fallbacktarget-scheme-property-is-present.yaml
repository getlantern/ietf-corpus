document: rfc-8804
kind: normative-requirement
summary: When the MI.FallbackTarget 'scheme' property is present, the dCDN MUST use that scheme for HTTP redirection to the uCDN fallback address. If absent or empty, the dCDN MUST use the same scheme as in the request received by the dCDN.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
