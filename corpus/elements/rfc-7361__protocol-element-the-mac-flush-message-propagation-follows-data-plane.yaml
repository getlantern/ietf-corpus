document: rfc-7361
kind: protocol-element
summary: 'The MAC flush message propagation follows data-plane split-horizon rules in H-VPLS: a MAC flush message received in the context of a spoke PW is propagated on mesh PWs, but a MAC flush message received in the context of a mesh PW is not propagated to other mesh PWs.'
