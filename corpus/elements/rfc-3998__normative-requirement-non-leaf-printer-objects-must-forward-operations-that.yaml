document: rfc-3998
kind: normative-requirement
summary: Non-Leaf Printer objects MUST forward operations that directly affect jobs to the appropriate Subordinate Printer(s), including Print-Job, Print-URI, Create-Job, Send-Document, Cancel-Job, Hold-Job, Release-Job, Restart-Job, Get-Jobs, and Purge-Jobs. Forwarding is done on a best-efforts basis and the Non-Leaf Printer responds to its client without waiting for Subordinate Printer responses.
section: 10.7.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
