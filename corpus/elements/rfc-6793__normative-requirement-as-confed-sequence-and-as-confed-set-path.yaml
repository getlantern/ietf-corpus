document: rfc-6793
kind: normative-requirement
summary: AS_CONFED_SEQUENCE and AS_CONFED_SET path segments MUST NOT be included in the AS4_PATH attribute of an UPDATE message. A NEW BGP speaker receiving these types in the AS4_PATH attribute MUST discard those segments, adjust the relevant attribute fields, and continue processing.
section: "3"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
