document: rfc-1184
kind: normative-requirement
summary: Whenever IAC AO is received, a Telnet Synch signal MUST be returned. When processing a Synch (TCP urgent mode active), all data MUST be discarded—but not Telnet commands—until IAC DM is found and the connection leaves urgent mode.
section: "5.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
