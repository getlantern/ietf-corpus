document: rfc-1356
kind: protocol-element
summary: NLPID value hex 80 (128) identifies IEEE SNAP encapsulation. A five-octet SNAP header is included in the CUD field immediately following the hex 80 octet; SNAP headers are NOT included in subsequent X.25 data packets. Only one SNAP-identified protocol may be carried per circuit opened with this encoding.
section: "3.2"
topics:
