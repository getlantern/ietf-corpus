document: rfc-4544
kind: design-rationale
summary: Each iSCSI MIB object exports a separate attributes table and one or more statistics tables that augment it, rather than combining them. This design allows attributes and statistics to be added independently as iSCSI evolves, keeping the schema cleaner.
section: "6.2"
topics:
