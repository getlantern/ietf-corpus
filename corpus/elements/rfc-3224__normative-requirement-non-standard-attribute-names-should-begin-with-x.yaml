document: rfc-3224
kind: normative-requirement
summary: Non-standard attribute names SHOULD begin with 'x-' followed by the vendor's Enterprise Number and a '-' to guarantee unambiguous interpretation. For example, Acme (Enterprise 9999) would use 'x-9999-cheat-mode'.
section: "4.0"
rfc2119_level: SHOULD
topics:
    - registry
