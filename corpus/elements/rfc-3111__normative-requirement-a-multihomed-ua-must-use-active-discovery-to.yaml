document: rfc-3111
kind: normative-requirement
summary: A multihomed UA MUST use active discovery to detect DAs before issuing multicast requests, and MUST issue requests using increasing multicast scopes starting at FF01 up to a maximum of FF05 to solicit DAAdvertisements.
section: 4.2.4.2
rfc2119_level: MUST
topics:
