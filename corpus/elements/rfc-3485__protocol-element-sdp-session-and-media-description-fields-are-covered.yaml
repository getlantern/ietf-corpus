summary: SDP session and media description fields are covered by the dictionary, including session-level lines (v=, o=, s=, i=, u=, e=, c=IN IP4/IP6, b=, t=, r=, z=, k=) and media lines (m=audio, m=video, m=application, m=data, m=control), as well as common a= attribute names such as a=rtpmap:, a=fmtp:, a=sendrecv, a=recvonly, a=sendonly, a=inactive.
