document: rfc-9011
kind: normative-requirement
summary: For battery-powered devices, the SCHC receiver SHOULD send a SCHC ACK after every window even if there are no missing tiles, and the SCHC sender SHOULD wait for the SCHC ACK before sending tiles from the next window. This avoids useless uplinks when network coverage is lost.
section: 5.6.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
