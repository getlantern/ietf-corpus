document: rfc-7271
kind: design-rationale
summary: The Freeze command is introduced as a local-only (non-signaled) command to allow operators to lock the protection group state, preventing the priority swap from moving traffic back to the working path when SF-P occurs and PSC communication is broken. It provides an escape hatch for operators who need to keep traffic on the protection path during maintenance.
section: "4.3"
topics:
    - mpls
    - routing
