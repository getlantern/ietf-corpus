document: rfc-8658
kind: interoperability-note
summary: 'The BNG must implement dual roles: it acts as an AAA/RADIUS client toward the AAA server and as a DHCPv6 server toward Customer Edge devices. Softwire46 configuration flows from AAA → BNG via RADIUS and from BNG → CE via DHCPv6 container options (OPTION_S46_CONT_MAPE/MAPT/LW).'
section: "4"
topics:
