document: rfc-5840
kind: normative-requirement
summary: The Version field (V, 2 bits) MUST be sent as 0 and checked by the receiver. If the version differs from the expected version, the packet MUST be dropped. Future modifications require a new version number.
section: "2"
rfc2119_level: MUST
topics:
