document: rfc-7012
kind: design-rationale
summary: Information Elements with the 'post' prefix (e.g., postIpClassOfService) report Flow properties obtained after middlebox modification within the Observation Domain rather than directly observed at the Observation Point. This design allows reporting of both pre- and post-modification values.
