document: rfc-5064
kind: normative-requirement
summary: Multiple Archived-At header fields with the same URI SHOULD be avoided. An Archived-At header field SHOULD only be created if the message is actually being made available at the URI given in the header field.
section: "2.2"
rfc2119_level: SHOULD
topics:
