document: rfc-9090
kind: protocol-element
summary: 'OID tags can be applied to CBOR arrays and maps for tag factoring: when the tag content is an array, the tag is imputed to all byte string, array, or map elements; when the content is a map, the tag is imputed to all byte string, array, or map keys. Values in maps are unaffected.'
