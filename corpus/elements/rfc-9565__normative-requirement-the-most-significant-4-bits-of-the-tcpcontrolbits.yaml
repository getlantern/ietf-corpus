document: rfc-9565
kind: normative-requirement
summary: The most significant 4 bits of the tcpControlBits Information Element (corresponding to the TCP Data Offset field) MUST be reported by the Exporter with a value of zero and MUST be ignored by the Collector. The tcpHeaderLength Information Element should be used to encode the TCP header length value instead.
section: "3"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
