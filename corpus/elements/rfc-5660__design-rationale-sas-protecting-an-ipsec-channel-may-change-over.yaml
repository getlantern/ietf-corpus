document: rfc-5660
kind: design-rationale
summary: SAs protecting an IPsec channel may change over time through expiration and re-keying, as long as replacement SAs remain congruent to the latched parameters. This design allows IPsec channels to survive SA expiration so that key exchange operational considerations do not affect the connection latching feature.
section: "2"
topics:
