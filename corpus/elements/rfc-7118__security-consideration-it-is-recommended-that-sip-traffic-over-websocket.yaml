document: rfc-7118
kind: security-consideration
summary: It is RECOMMENDED that SIP traffic over WebSocket be protected using a secure WebSocket connection (TLS over TCP). When establishing a connection using SIP over secure WebSocket, the client MUST authenticate the server using the server's certificate according to the WebSocket validation procedure in RFC 6455.
section: "9.1"
topics:
    - websocket
    - sip
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
