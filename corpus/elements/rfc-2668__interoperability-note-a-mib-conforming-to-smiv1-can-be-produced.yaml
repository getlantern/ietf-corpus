document: rfc-2668
kind: interoperability-note
summary: A MIB conforming to SMIv1 can be produced by translating the SMIv2 module; however Counter64 objects cannot be translated and must be omitted, and machine-readable SMIv2 information is converted to textual descriptions, without changing the MIB semantics.
