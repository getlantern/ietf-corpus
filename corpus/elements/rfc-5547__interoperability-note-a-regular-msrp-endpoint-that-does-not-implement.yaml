document: rfc-5547
kind: interoperability-note
summary: 'A regular MSRP endpoint that does not implement the file transfer extensions can still act as SDP answerer and file receiver for a push: it answers the offer ignoring extension attributes. However, the user experience is degraded because the recipient has no protocol means to identify the transfer or accept/reject based on file metadata.'
section: "4"
topics:
