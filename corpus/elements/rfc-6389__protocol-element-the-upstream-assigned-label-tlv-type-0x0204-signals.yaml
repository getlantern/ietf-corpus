document: rfc-6389
kind: protocol-element
summary: The Upstream-Assigned Label TLV (type 0x0204) signals an upstream-assigned label and is carried in Label Mapping, Label Withdraw, and Label Release messages. It contains a 4-octet Reserved field followed by a 20-bit label value in a 4-octet field.
