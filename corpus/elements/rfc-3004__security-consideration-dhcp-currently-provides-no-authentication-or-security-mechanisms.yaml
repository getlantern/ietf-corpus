document: rfc-3004
kind: security-consideration
summary: DHCP currently provides no authentication or security mechanisms. As a result, a DHCP server cannot check if a client or user is authorized to use a given User Class, introducing a vulnerability when User Class is used to gate access to special parameters such as a particular database server.
section: "6"
topics:
    - security
