document: rfc-6074
kind: wire-format
summary: For VPWS (Colored Pools) LDP signaling, the AGI is encoded as Type=1, Length=8, 8-byte VPWS identifier. The TAII is Type=1, Length=4, 4-byte remote pool number. The SAII is Type=1, Length=4, 4-byte local pool number. The same AGI Type (1) and AII Type (1) are used for both VPLS and VPWS.
section: 3.3.3
topics:
