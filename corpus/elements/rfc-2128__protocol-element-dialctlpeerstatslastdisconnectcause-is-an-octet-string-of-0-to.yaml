document: rfc-2128
kind: protocol-element
summary: dialCtlPeerStatsLastDisconnectCause is an OCTET STRING of 0 to 4 bytes encoding the network-specific cause value from the last call. Interpretation depends on interface type and protocol; references include ITU-T Q.931, X.25, Bellcore SR-NWT-001953/002343, and German Telekom FTZ 1TR6.
