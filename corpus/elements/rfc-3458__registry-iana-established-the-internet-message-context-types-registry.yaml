document: rfc-3458
kind: registry
summary: 'IANA established the ''Internet Message Context Types'' registry with Specification Required policy (RFC required). Initial values are: voice-message, fax-message, pager-message, multimedia-message, text-message, and none. The Message-Context header itself is registered as an RFC 2822 header with min 0, max 1 occurrences.'
