document: rfc-8052
kind: normative-requirement
summary: A key associated with an IEC 61850 confidentiality algorithm MUST be distributed as a TEK_ALGORITHM_KEY attribute in the KD payload, with key sizes matching the algorithm (16 octets for AES-CBC-128; 32 octets for AES-CBC-256; 20 octets for AES-GCM-128 with 4-octet salt; 36 octets for AES-GCM-256 with 4-octet salt).
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
