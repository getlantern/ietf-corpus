document: rfc-7530
kind: wire-format
summary: stateid4 is encoded as uint32_t seqid (4 bytes, monotonically incremented per state transition) followed by opaque other[NFS4_OTHER_SIZE] (12 bytes), for a total of 128 bits. The seqid field is read-only to the client.
