document: rfc-6402
kind: normative-requirement
summary: If CMC services are available via HTTP or FTP, accessLocation in the id-ad-cmc SIA extension MUST be a uniformResourceIdentifier. If via email, it MUST be an rfc822Name. If via TCP/IP, dNSName or iPAddress name forms MUST be used.
section: "2.11"
rfc2119_level: MUST
topics:
