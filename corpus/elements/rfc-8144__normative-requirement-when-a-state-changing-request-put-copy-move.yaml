document: rfc-8144
kind: normative-requirement
summary: When a state-changing request (PUT, COPY/MOVE, PATCH, POST) contains 'return=representation' and the resource is created or updated successfully, the server SHOULD include an entity representing the current state of the resource in the 201 or 200 response.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
