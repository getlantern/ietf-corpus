document: rfc-9326
kind: design-rationale
summary: The recommendation that N >> M (where M is the max number of transit IOAM nodes) for the packet selection ratio is based on the fact that one DEX-marked packet can trigger up to M exported packets. Keeping N much larger than M ensures exported packet volume is substantially lower than forwarded data packet volume.
section: 3.1.1
topics:
    - measurement
