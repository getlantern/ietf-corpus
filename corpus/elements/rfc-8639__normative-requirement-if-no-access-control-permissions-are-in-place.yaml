document: rfc-8639
kind: normative-requirement
summary: If no access control permissions are in place for event records on an event stream, a receiver MUST be allowed access to all event records. If subscriber permissions change during the lifecycle of a subscription and event stream access is no longer permitted, the subscription MUST be terminated.
section: "2.1"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
