document: rfc-1994
kind: normative-requirement
summary: Each challenge value SHOULD be unique, since repetition of a challenge value with the same secret permits an attacker to replay a previously intercepted response. The challenge SHOULD exhibit global and temporal uniqueness.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
