document: rfc-8473
kind: interoperability-note
summary: Token Binding over HTTP is only defined when HTTP is layered over TLS (i.e., HTTPS per RFC 2818). TokenBindingMessages are not defined for plain HTTP. This document addresses TLS 1.2; Token Binding for TLS 1.3 is addressed in a separate draft (draft-ietf-tokbind-tls13).
section: "1"
topics:
