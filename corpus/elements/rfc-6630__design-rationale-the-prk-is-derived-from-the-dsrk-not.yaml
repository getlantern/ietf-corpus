document: rfc-6630
kind: design-rationale
summary: The pRK is derived from the DSRK (not EMSK) when the peer is in a visited realm, and if the peer has previously authenticated via ERP or ERP/AAK the DSRK SHOULD be directly reused. This avoids redundant key derivation while preserving domain isolation when roaming.
section: "4"
topics:
