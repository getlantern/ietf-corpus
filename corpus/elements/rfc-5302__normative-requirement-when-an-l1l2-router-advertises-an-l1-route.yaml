document: rfc-5302
kind: normative-requirement
summary: When an L1L2 router advertises an L1 route into L2, where that L1 route was learned via TLV 130 ('IP External Reachability Information'), it SHOULD advertise the prefix in its L2 LSP within TLV 130. L1 routes learned via TLV 128 SHOULD still be advertised within TLV 128.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
