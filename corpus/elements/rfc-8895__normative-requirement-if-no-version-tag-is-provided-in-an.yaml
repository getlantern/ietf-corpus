document: rfc-8895
kind: normative-requirement
summary: If no version tag is provided in an AddUpdateReq, the server MUST send a full replacement for that resource before any incremental changes. If a valid current tag is provided and the client accepts incremental changes, the server MAY omit the initial full replacement.
section: 6.7.1
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
