document: rfc-9914
kind: interoperability-note
summary: P-Routes can be deployed in a hybrid mode where the P-Route's Mode of Operation (Storing or Non-Storing) differs from that of the main RPL Instance. The forwarding method priority order and the DODAG-of-Instances ordering must be respected to ensure loop-free operation in such hybrid configurations.
section: "9"
topics:
    - routing
