document: rfc-6858
kind: normative-requirement
summary: This specification relaxes the RFC3501 requirement that IMAP-reported message sizes be exact. When a conventional client requests size information for an internationalized message, the IMAP server is permitted to return the size of the original internationalized message even though the surrogate message differs in size.
section: "3"
rfc2119_level: MAY
topics:
    - email
