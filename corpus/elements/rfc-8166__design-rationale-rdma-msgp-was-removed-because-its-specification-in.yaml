document: rfc-8166
kind: design-rationale
summary: RDMA_MSGP was removed because its specification in RFC 5666 was incomplete—missing full descriptions of alignment, threshold fields, peer negotiation, and interaction with Read/Write chunks—and no complete interoperable prototype was ever built. Its benefit is limited to payloads at the very end of an argument or result list, which is atypical for NFSv4 COMPOUND RPCs.
section: 4.6.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
