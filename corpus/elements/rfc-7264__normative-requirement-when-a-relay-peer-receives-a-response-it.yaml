document: rfc-7264
kind: normative-requirement
summary: 'When a relay peer receives a response, it MUST follow the rules in RFC 6940: validate the message, readjust the destination_list, and forward to the next hop based on the connection table. No added relay-specific requirement exists beyond ordinary peer behavior.'
section: 5.4.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
