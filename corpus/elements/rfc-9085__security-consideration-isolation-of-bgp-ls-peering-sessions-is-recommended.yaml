document: rfc-9085
kind: security-consideration
summary: Isolation of BGP-LS peering sessions is recommended to prevent BGP-LS topology information (including newly added SR TLVs) from leaking to external BGP peers outside the SR domain. BGP peering sessions for other address families may be established to routers outside the SR domain.
section: "5"
topics:
