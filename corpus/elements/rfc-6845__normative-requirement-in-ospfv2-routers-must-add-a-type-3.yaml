document: rfc-6845
kind: normative-requirement
summary: In OSPFv2, routers MUST add a Type 3 link for their own IP address and MUST also add a Type 3 link with Link ID set to the IP subnet address, Link Data set to the IP subnet mask, and cost equal to the configured output cost of the interface.
section: 4.6.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
