document: rfc-5023
kind: interoperability-note
summary: Deletion of a Media Link Entry via DELETE SHOULD result in the deletion of the corresponding Media Resource. Clients and servers should treat the Media Link Entry and its associated Media Resource as a coupled pair for deletion purposes.
section: "9.4"
