document: rfc-8870
kind: normative-requirement
summary: Once a client and server have concluded a handshake negotiating an EKTCipher, the server MUST provide the client a key (EKTKey) to be used when encrypting/decrypting EKTCiphertext values. When an EKTKey is received and processed successfully, the recipient MUST respond with an ACK message.
section: 5.2.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
