document: rfc-2790
kind: design-rationale
summary: hrSystemUptime tracks time since the host was last initialized, intentionally distinct from sysUpTime in SNMPv2-MIB which tracks only SNMP agent uptime; the two values diverge when the agent is restarted without rebooting the host.
