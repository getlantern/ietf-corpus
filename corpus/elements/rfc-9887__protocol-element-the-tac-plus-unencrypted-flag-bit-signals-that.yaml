document: rfc-9887
kind: protocol-element
summary: The TAC_PLUS_UNENCRYPTED_FLAG bit signals that obfuscation is not used for the session. On TLS connections, this flag must always be set to 1; a TLS TACACS+ server that receives it unset returns TAC_PLUS_AUTHEN_STATUS_ERROR, TAC_PLUS_AUTHOR_STATUS_ERROR, or TAC_PLUS_ACCT_STATUS_ERROR as appropriate and terminates the session.
section: "4"
topics:
