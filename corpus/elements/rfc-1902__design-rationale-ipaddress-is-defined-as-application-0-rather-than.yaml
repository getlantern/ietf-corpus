document: rfc-1902
kind: design-rationale
summary: IpAddress is defined as APPLICATION 0 rather than a plain OCTET STRING because the tagged type was inherited from SNMPv1 for historical compatibility. New address types should use textual conventions instead, since IpAddress is permanently limited to 32-bit IPv4 and cannot represent IPv6 or other address families.
section: 7.1.5
topics:
    - snmp
    - ip
