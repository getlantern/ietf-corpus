document: rfc-4005
kind: normative-requirement
summary: For multi-round authentication exchanges, the server MUST set the Result-Code AVP to DIAMETER_MULTI_ROUND_AUTH in the AA-Answer; subsequent AAR messages MUST include any State AVPs that were present in the preceding AAA.
section: "3.2"
rfc2119_level: MUST
