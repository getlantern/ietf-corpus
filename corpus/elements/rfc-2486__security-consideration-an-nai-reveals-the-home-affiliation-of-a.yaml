document: rfc-2486
kind: security-consideration
summary: An NAI reveals the home affiliation of a user, which may assist an attacker in probing the username space. This is most concerning in protocols that transmit the username in clear-text, such as RADIUS. IPsec confidentiality services (RFC 2401) may be used to prevent snooping.
section: "5"
topics:
    - security
    - privacy
    - radius
    - ipsec
