document: rfc-8435
kind: normative-requirement
summary: After a write error and receipt of a new layout, the client MUST NOT assume the new layout matches the previous one. If updates were not committed to all mirrors, the client MUST resend those updates to all mirrors in the new layout.
section: 8.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
