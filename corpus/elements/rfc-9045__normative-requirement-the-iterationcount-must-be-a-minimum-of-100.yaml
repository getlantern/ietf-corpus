document: rfc-9045
kind: normative-requirement
summary: The iterationCount MUST be a minimum of 100; however, it SHOULD be as large as server performance will allow, typically at least 10,000 per NIST SP 800-63B. An iteration count smaller than 10,000 may be used when automated generation produces shared secrets with high entropy.
section: "4.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
