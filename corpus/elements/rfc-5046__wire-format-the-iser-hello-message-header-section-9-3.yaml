document: rfc-5046
kind: wire-format
summary: The iSER Hello Message header (Section 9.3, Figure 4) carries the iSER protocol version range supported by the initiator and the iSER-IRD value. It is encapsulated in a SendSE RDMA message and is the mandatory first message sent by the initiator after transitioning to iSER-assisted mode.
section: "9.3"
