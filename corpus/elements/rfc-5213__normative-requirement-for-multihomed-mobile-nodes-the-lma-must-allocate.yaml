document: rfc-5213
kind: normative-requirement
summary: For multihomed mobile nodes, the LMA MUST allocate a separate mobility session and Binding Cache entry (with its own lifetime) for each attached interface. All prefixes assigned to a given interface MUST be managed under exactly one mobility session.
section: "5.4"
rfc2119_level: MUST
topics:
    - mobility
