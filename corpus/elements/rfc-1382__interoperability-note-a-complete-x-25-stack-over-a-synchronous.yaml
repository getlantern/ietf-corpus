document: rfc-1382
kind: interoperability-note
summary: 'A complete X.25 stack over a synchronous line requires at least two MIB-II ifTable entries: one for LAPB and one for the X.25 packet layer. x25OperDataLinkId points to the lapbAdmnIndex instance for the LAPB interface beneath the X.25 PLE; lapbOperPortId in turn identifies the RS-232 sync line.'
section: "3.1"
topics:
