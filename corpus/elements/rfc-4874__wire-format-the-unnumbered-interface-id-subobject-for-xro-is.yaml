document: rfc-4874
kind: wire-format
summary: 'The Unnumbered Interface ID subobject for XRO is 12 bytes: 1-bit L flag, 7-bit Type (4), 1-byte Length, 1-byte Reserved, 1-byte Attribute, 4-byte TE Router ID, and 4-byte Interface ID. Attribute values are 0 (interface), 1 (node), and 2 (SRLG).'
