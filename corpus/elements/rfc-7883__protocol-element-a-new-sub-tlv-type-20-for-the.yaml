document: rfc-7883
kind: protocol-element
summary: A new sub-TLV (Type 20) for the IS-IS Router CAPABILITY TLV (TLV 242) is defined to advertise S-BFD Discriminators. The sub-TLV carries one or more 32-bit discriminator values and is formatted per RFC 5305.
