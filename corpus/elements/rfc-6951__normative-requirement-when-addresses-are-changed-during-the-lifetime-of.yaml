document: rfc-6951
kind: normative-requirement
summary: When addresses are changed during the lifetime of an association, the RFC 5061 dynamic address reconfiguration extension MUST be used with wildcard addresses only. If an SCTP endpoint receives an ABORT with the T-bit set, it MAY use this as an indication that the peer's visible addresses may have changed.
section: "5.7"
rfc2119_level: MUST
topics:
    - sctp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
