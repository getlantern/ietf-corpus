document: rfc-9725
kind: security-consideration
summary: HTTPS SHALL be used for all WHIP signaling to preserve the WebRTC security model. Security considerations from RFC 8826 (WebRTC security), RFC 8446 (TLS 1.3), RFC 9147 (DTLS 1.3), and RFC 9110 (HTTP) all apply.
