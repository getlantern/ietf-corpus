document: rfc-3758
kind: normative-requirement
summary: Upon receipt of a FORWARD TSN chunk, the data receiver MUST consider any missing TSNs earlier than or equal to the New Cumulative TSN value as received and stop reporting them as gaps in subsequent SACKs.
section: "3.2"
rfc2119_level: MUST
topics:
