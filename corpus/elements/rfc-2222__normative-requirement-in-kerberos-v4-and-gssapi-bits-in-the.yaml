document: rfc-2222
kind: normative-requirement
summary: In KERBEROS_V4 and GSSAPI, bits in the security layer bitmask which are not understood MUST be negotiated off. Bit 1 means no security layer, bit 2 means integrity protection, bit 4 means privacy protection.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
