document: rfc-7198
kind: normative-requirement
summary: If RTCP is being sent for the main RTP stream, the sender MUST also generate RTCP for the duplicate stream as if it were a regular media stream. The sender MUST NOT copy the RTCP packets from the main stream; it MUST generate new, independent RTCP reports for the duplicate stream.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
