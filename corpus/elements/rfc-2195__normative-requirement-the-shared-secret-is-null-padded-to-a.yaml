document: rfc-2195
kind: normative-requirement
summary: The shared secret is null-padded to a length of 64 bytes before use as the HMAC key. If the shared secret is longer than 64 bytes, the MD5 digest of the shared secret is used as a 16-byte input to the keyed MD5 calculation.
section: "2"
rfc2119_level: MUST
topics:
    - email
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
