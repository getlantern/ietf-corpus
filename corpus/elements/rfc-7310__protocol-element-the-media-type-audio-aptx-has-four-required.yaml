document: rfc-7310
kind: protocol-element
summary: 'The media type audio/aptx has four required parameters: ''rate'' (RTP timestamp clock rate equal to sampling rate in Hz), ''channels'' (number of logical audio channels), ''variant'' (standard or enhanced), and ''bitresolution'' (16 for Standard apt-X; 16 or 24 for Enhanced apt-X).'
