kind: design-rationale
summary: The incoming call procedures (rather than outgoing call procedures) are used for L2VPN signaling because they have advantages in terms of semantic relevance for pseudowire setup. The reference PWE3L2TP document provides more details on why incoming call procedures are more appropriate.
