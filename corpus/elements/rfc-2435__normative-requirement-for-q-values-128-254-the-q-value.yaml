document: rfc-2435
kind: normative-requirement
summary: For Q values 128–254, the Q value to quantization table mapping MUST be static; a Q value of 255 denotes a dynamic mapping and decoders MUST NOT depend on any previous version of those tables. Packets MUST NOT contain Q=255 and Length=0.
section: 3.1.8
rfc2119_level: MUST
topics:
