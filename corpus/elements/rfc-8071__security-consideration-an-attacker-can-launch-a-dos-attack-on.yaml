document: rfc-8071
kind: security-consideration
summary: An attacker can launch a DoS attack on the call home client by triggering computationally expensive operations (e.g., TLS 1.3 KeyShare asymmetric operations) before being rejected. Mitigations such as temporarily blacklisting source addresses after repeated failed login attempts are recommended.
