document: rfc-3560
kind: security-consideration
summary: Use of inadequate pseudo-random number generators (PRNGs) for RSA key generation can result in little or no security; an attacker may reproduce the PRNG environment and search a small key space rather than brute-forcing. RFC 1750 provides guidance on quality random number generation.
section: "6"
topics:
    - crypto
    - security
