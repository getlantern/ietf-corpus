document: rfc-9248
kind: normative-requirement
summary: NACK, FIR, and PLI features per RFC 4585 and RFC 5104 MUST be implemented and MUST be announced with the 'ccm' feedback value. For backwards compatibility with devices not supporting these, implementations MUST also implement SIP INFO messages to send/receive XML-encoded Picture Fast Update messages per RFC 5168.
section: "6.8"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - rtp
