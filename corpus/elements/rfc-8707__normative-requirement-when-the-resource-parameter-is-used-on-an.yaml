document: rfc-8707
kind: normative-requirement
summary: When the 'resource' parameter is used on an access token request for all grant types, it indicates the target service or protected resource where the client intends to use the requested access token. The acceptable resource values are at the authorization server's sole discretion.
section: "2.2"
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
