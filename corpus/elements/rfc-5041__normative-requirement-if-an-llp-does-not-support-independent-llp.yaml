document: rfc-5041
kind: normative-requirement
summary: If an LLP does not support independent LLP Stream teardown, and a DDP error occurs on a specific DDP Stream, the LLP MUST label that stream as erroneous and MUST NOT allow further data transfer on it after DDP requests teardown.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
