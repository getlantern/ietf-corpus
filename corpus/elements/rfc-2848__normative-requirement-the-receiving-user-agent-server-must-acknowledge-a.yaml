document: rfc-2848
kind: normative-requirement
summary: The receiving user agent server MUST acknowledge a NOTIFY request by returning a final response (normally a '200 OK'). If the response code class is above 2xx, the Gateway may treat it as a failure of the monitoring session.
section: 3.5.3.2
rfc2119_level: MUST
