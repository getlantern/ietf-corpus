document: rfc-2507
kind: protocol-element
summary: 'The ''twice'' algorithm allows a decompressor to repair a corrupted TCP context without a round-trip: after a TCP checksum failure, the decompressor re-applies the current segment''s delta one or two additional times and recomputes the checksum to verify success. Analysis of TCP traces shows 83–99% repair success for data streams; success is lower (53–99%) for acknowledgment streams.'
section: "10.1"
topics:
    - ip
    - tcp
