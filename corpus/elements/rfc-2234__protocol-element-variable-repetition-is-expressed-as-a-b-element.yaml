document: rfc-2234
kind: protocol-element
summary: Variable repetition is expressed as '<a>*<b>element', indicating at least <a> and at most <b> occurrences. Defaults are 0 and infinity; '*element' allows any number including zero, '1*element' requires at least one.
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
