document: rfc-5944
kind: security-consideration
summary: Ingress filtering by ISPs may discard packets from a mobile node using its home address as the source while attached to a foreign network, since that address does not match the foreign network's prefix. Reverse tunneling (flag T) is recommended to work around this.
section: "5.6"
topics:
    - mobility
    - security
    - ip
