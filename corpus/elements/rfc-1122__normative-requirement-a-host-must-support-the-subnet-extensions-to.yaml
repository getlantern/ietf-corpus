document: rfc-1122
kind: normative-requirement
summary: A host MUST support the subnet extensions to IP (RFC-950); every local IP address will have an associated address mask of the form {-1,-1,0}. The subnet mask MUST be used in all local/remote routing decisions.
section: 3.2.1.3
rfc2119_level: MUST
topics:
    - ip
