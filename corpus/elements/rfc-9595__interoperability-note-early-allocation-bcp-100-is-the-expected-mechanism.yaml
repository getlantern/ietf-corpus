document: rfc-9595
kind: interoperability-note
summary: Early Allocation (BCP 100) is the expected mechanism for most IETF documents to obtain stable SID values before RFC publication, since changing SID values during IETF document processing is difficult. Experimental SID ranges may be used prior to working group adoption.
