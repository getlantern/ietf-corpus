document: rfc-9664
kind: normative-requirement
summary: If the DNS Response does not include an Update Lease option, the Requester SHOULD continue sending Refresh Requests as if the server had returned an identical Update Lease option, treating the server as non-supporting.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - dns
