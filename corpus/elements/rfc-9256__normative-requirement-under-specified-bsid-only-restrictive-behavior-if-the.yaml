document: rfc-9256
kind: normative-requirement
summary: Under Specified-BSID-only restrictive behavior, if the active candidate path has an unspecified or unavailable BSID, no BSID is bound and the candidate path is considered invalid. An alert MUST be triggered via mechanisms like syslog, and other candidate paths MUST then be evaluated.
section: 6.2.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
