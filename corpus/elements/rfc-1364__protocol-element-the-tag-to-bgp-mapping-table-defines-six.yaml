kind: protocol-element
summary: 'The tag-to-BGP mapping table defines six automatic tag settings: c=0/pl=00 => O=EGP, P=<l>; c=0/pl=01 => O=EGP, P=<l,nh>; c=0/pl=10 => never export; c=1/pl=00 => O=IGP, P=<l>; c=1/pl=01 => O=IGP, P=<l,nh>; c=1/pl=10 => out of band via IBGP.'
