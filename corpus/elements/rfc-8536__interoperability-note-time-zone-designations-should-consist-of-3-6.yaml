document: rfc-8536
kind: interoperability-note
summary: Time zone designations SHOULD consist of 3–6 ASCII alphanumeric characters plus '-' and '+'. Non-ASCII characters and abbreviations outside this range are not recommended due to widespread reader incompatibilities documented in Appendix A.
