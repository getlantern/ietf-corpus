document: rfc-7510
kind: normative-requirement
summary: Measures SHOULD be taken to prevent non-congestion-controlled MPLS-in-UDP traffic from escaping to the general Internet, such as physical/logical isolation of links, packet filters on UDP destination port 6635, software-based tunnel restrictions, or a managed circuit breaker.
section: "5"
rfc2119_level: SHOULD
topics:
    - mpls
    - udp
    - congestion
    - security
