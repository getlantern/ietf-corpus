document: rfc-3380
kind: normative-requirement
summary: The 'delete-attribute' out-of-band value MUST NOT be used in Set-Printer-Attributes, where the absence of an attribute indicates it is not supported. An IPP Printer MUST support 'delete-attribute' if it supports Set-Job-Attributes.
section: "8.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
