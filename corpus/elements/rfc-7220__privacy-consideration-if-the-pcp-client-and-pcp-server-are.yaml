document: rfc-7220
kind: privacy-consideration
summary: If the PCP client and PCP server are not under the same administrative entity, the DESCRIPTION option can leak privacy-related information. PCP clients SHOULD NOT include user identifiers, locations, or names in the description text.
section: "4"
