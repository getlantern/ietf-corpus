document: rfc-9788
kind: normative-requirement
summary: An MUA MUST NOT generate an RFC8551HP message (the legacy scheme from RFC 8551 that wraps a message/rfc822 object). However, for backward compatibility, an MUA MAY attempt to render or respond to such a message as though it has standard Header Protection.
section: "4.10"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
