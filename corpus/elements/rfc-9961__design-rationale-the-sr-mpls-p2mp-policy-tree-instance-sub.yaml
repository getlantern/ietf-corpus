summary: The SR MPLS P2MP Policy Tree Instance sub-TLV tests a specific PTI within a specific CP, not the CP itself, reflecting the granularity at which SR P2MP Policy connectivity needs to be verified—since a CP may contain multiple PTIs for Make-Before-Break operations.
