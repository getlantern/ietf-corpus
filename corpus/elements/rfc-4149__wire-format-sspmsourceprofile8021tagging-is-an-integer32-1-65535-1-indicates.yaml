document: rfc-4149
kind: wire-format
summary: 'sspmSourceProfile8021Tagging is an Integer32 (-1..65535): -1 indicates untagged packets; 0–65535 is the 802.1Q tag value. The 12-bit VLAN-ID field within the tag must not encode all-ones (value 4095); attempts to set such a value must be rejected with ''inconsistentValue''.'
