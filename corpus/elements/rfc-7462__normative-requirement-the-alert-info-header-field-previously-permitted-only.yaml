document: rfc-7462
kind: normative-requirement
summary: The Alert-Info header field, previously permitted only in 180 (Ringing) responses, is now additionally allowed in any non-100 provisional response to INVITE. This enables signaling of tones for situations such as 181 (Call Is Being Forwarded) and 182 (Call Is Being Queued).
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
