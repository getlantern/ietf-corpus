document: rfc-8070
kind: security-consideration
summary: The freshness token SHOULD include signing, encrypting, or sealing of KDC data to determine authenticity and prevent tampering. Freshness tokens are not required to be single-use or bound to specific AS exchanges, but they must expire to preserve the freshness guarantee.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
