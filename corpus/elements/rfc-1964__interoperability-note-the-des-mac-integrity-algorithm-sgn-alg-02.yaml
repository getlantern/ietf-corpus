document: rfc-1964
kind: interoperability-note
summary: The DES-MAC integrity algorithm (SGN_ALG=02 00) may not be present in all implementations. The spec notes this explicitly for both MIC and Wrap contexts, implying implementations must be prepared to handle peers that do not support it.
