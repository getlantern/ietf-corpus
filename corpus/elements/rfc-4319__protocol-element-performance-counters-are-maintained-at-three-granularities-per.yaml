document: rfc-4319
kind: protocol-element
summary: 'Performance counters are maintained at three granularities per segment endpoint: cumulative since last xU restart (ES, SES, CRCanomalies, LOSWS, UAS), current and up to 96 historical 15-minute intervals, and current and up to 30 historical 1-day intervals. Counters are reset only on agent reset, not xU reinitialization.'
section: "2.6"
