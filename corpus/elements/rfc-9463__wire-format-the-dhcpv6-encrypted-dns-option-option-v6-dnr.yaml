document: rfc-9463
kind: wire-format
summary: The DHCPv6 Encrypted DNS option (OPTION_V6_DNR, code 144) carries a 16-bit Option-code, 16-bit Option-length, 16-bit Service Priority, 16-bit ADN Length, variable-length authentication-domain-name (FQDN encoded per RFC 8415 Section 10), optional 16-bit Addr Length followed by 16-byte IPv6 addresses, and optional SvcParams. In ADN-only mode, Addr Length, addresses, and SvcParams are absent.
section: "4.1"
topics:
    - dns
    - ip
