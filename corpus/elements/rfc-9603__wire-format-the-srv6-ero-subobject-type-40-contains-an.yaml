document: rfc-9603
kind: wire-format
summary: The SRv6-ERO subobject (Type=40) contains an L flag, 4-bit NT field, 12-bit Flags field (V/T/F/S bits), 2-octet Reserved, 2-octet Endpoint Behavior, an optional 128-bit SRv6 SID, an optional variable-length NAI, and an optional 8-byte SID Structure. The Length MUST be at least 24 and a multiple of 4.
section: 4.3.1
topics:
