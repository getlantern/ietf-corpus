document: rfc-1577
kind: interoperability-note
summary: ATM does not support broadcast addressing, so there are no mappings from IP broadcast addresses to ATM services. Separately, ATM does not support multicast address services; current IP multicast implementations (MBONE and IP tunneling) continue to operate over ATM-based logical IP subnets in WAN configuration.
section: "7"
topics:
    - ip
    - multicast
