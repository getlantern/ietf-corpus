document: rfc-6795
kind: normative-requirement
summary: All subscriptions to session-specific policies SHOULD be authenticated and authorized before approval. If a UA cannot be authenticated, the policy server MAY provide a generic policy that does not reveal sensitive information.
section: "3.7"
rfc2119_level: SHOULD
