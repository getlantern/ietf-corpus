document: rfc-3895
kind: protocol-element
summary: 'dsx1LoopbackStatus is a read-only bitmap (INTEGER 1..127) indicating currently active loopbacks and their source (manager or far end). Seven bit positions: NoLoopback(1), NearEndPayloadLoopback(2), NearEndLineLoopback(4), NearEndOtherLoopback(8), NearEndInwardLoopback(16), FarEndPayloadLoopback(32), FarEndLineLoopback(64).'
