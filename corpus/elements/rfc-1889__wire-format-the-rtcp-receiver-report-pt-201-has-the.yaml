document: rfc-1889
kind: wire-format
summary: The RTCP Receiver Report (PT=201) has the same structure as the SR packet but omits the 20-octet sender information section; the packet type constant is 201 instead of 200. An empty RR (RC=0) is placed at the head of a compound RTCP packet when there is nothing to report.
section: 6.3.2
topics:
    - rtp
    - realtime
