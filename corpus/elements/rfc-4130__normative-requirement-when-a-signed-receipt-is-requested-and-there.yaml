document: rfc-4130
kind: normative-requirement
summary: When a signed receipt is requested and there is an error processing message contents, a signed receipt MUST still be returned. The reason for the processing failure MUST be set in the disposition-field; the request for a signed receipt SHALL still be honored.
section: 7.3.1
rfc2119_level: MUST
topics:
    - http
    - email
    - security
