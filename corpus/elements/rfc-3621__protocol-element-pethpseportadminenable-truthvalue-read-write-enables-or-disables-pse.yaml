document: rfc-3621
kind: protocol-element
summary: pethPsePortAdminEnable (TruthValue, read-write) enables or disables PSE function on a port. When false(2), the interface behaves as if it has no PSE capability. References IEEE 802.3af Section 30.9.1.1.2 aPSEAdminState.
