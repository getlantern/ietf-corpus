document: rfc-5389
kind: security-consideration
summary: 'RFC 5389 includes a hash agility plan: MESSAGE-INTEGRITY currently uses HMAC-SHA1 (with an MD5-derived key for long-term credentials). If SHA-1 is found cryptographically broken, a new attribute will be defined replacing MESSAGE-INTEGRITY with a stronger hash algorithm.'
section: "16.3"
topics:
    - nat
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
