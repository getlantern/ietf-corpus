document: rfc-2332
kind: normative-requirement
summary: An NHRP Error Indication SHALL NEVER be generated in response to another NHRP Error Indication. When an Error Indication is generated, the offending packet SHALL be discarded, and no more than one Error Indication may be generated per erroneous packet.
section: 5.2.7
rfc2119_level: MUST NOT
topics:
    - ip
