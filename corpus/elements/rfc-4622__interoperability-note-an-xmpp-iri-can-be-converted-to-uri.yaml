document: rfc-4622
kind: interoperability-note
summary: An XMPP IRI can be converted to URI syntax via RFC 3987 Section 3.1, and an XMPP URI to IRI via Section 3.2, ensuring interoperability with applications that can process URIs but not IRIs.
