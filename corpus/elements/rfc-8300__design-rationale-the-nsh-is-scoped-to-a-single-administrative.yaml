document: rfc-8300
kind: design-rationale
summary: The NSH is scoped to a single administrative domain by design. This deliberate constraint, shared with RFC 7665, ensures clear domain boundaries for security enforcement and avoids the complexity of inter-domain trust models.
section: "1.1"
topics:
