summary: 'Separate Up-Adjustment-Interval and Down-Adjustment-Interval (and corresponding thresholds) are provided because operators may need asymmetric behavior: responding quickly to traffic increases (to prevent congestion) while being more conservative about releasing reserved bandwidth on decreases.'
