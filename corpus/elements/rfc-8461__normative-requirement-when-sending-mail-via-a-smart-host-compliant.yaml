document: rfc-8461
kind: normative-requirement
summary: When sending mail via a smart host, compliant senders MUST treat the smart host domain as the Policy Domain. When sending mail to a mailbox at a subdomain, compliant senders MUST NOT attempt to fetch a policy from the parent zone.
section: "3.4"
rfc2119_level: MUST
topics:
    - email
    - tls
