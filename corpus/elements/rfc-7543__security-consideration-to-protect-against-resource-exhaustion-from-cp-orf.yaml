document: rfc-7543
kind: security-consideration
summary: To protect against resource exhaustion from CP-ORF oversubscription, a device MUST advertise willingness to receive CP-ORF only to known, trusted iBGP peers, and MUST enforce a per-peer limit on the number of CP-ORFs installable at any given time, ignoring requests that exceed the limit.
section: "8"
topics:
    - bgp
    - routing
    - security
