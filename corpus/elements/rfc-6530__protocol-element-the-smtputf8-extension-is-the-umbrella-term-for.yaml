document: rfc-6530
kind: protocol-element
summary: The SMTPUTF8 extension is the umbrella term for email address internationalization defined by this framework and its companion documents. It permits UTF-8 strings in email address local parts and domain names, selective UTF-8 in message headers, and requires 8BITMIME support. All-ASCII addresses and non-ASCII (i18n) addresses are mutually exclusive sets; SMTPUTF8 permits their union.
section: "4.2"
topics:
    - email
