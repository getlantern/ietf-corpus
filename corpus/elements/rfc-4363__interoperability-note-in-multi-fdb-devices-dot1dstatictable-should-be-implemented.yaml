document: rfc-4363
kind: interoperability-note
summary: In multi-FDB devices, dot1dStaticTable should be implemented as read-only (static entries from all FDBs, deduplicated by MAC+port index). Write access to static unicast and multicast entries should instead be provided through dot1qStaticUnicastTable and dot1qStaticMulticastTable.
section: 3.4.3.4
topics:
    - snmp
