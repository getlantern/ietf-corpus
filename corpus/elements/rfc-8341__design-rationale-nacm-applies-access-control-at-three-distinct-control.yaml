document: rfc-8341
kind: design-rationale
summary: NACM applies access control at three distinct control points — protocol operation invocation, datastore data node access, and outgoing notification events — because NETCONF's extensible RPC model and YANG data modeling make it impossible to restrict access using only a static list of standard protocol operations.
section: "2.1"
topics:
    - netconf
    - security
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
