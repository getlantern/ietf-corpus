document: rfc-7469
kind: wire-format
summary: The pin-directive encodes a cryptographic identity as 'pin-<algorithm>=<base64-encoded-SPKI-fingerprint>'. The only currently allowed algorithm token is 'sha256'; the value is the base64-encoded SHA-256 hash of the DER-encoded SubjectPublicKeyInfo structure of an X.509 certificate.
section: 2.1.1
topics:
