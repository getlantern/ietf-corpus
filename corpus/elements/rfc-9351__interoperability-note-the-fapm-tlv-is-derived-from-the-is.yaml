document: rfc-9351
kind: interoperability-note
summary: 'The FAPM TLV is derived from the IS-IS Flexible Algorithm Prefix Metric sub-TLV or the OSPFv2/OSPFv3 Flexible Algorithm Prefix Metric sub-TLV defined in RFC 9350. The Flags field semantics differ between protocols: it is meaningful for OSPF and must be zeroed for IS-IS.'
section: "4"
topics:
