document: rfc-4995
kind: wire-format
summary: The Add-CID octet has the fixed prefix 1110 in bits 0-3 and carries 4 bits of CID (values 1-15) in bits 4-7; it encodes small CIDs 1 through 15 and immediately precedes the packet type indication.
