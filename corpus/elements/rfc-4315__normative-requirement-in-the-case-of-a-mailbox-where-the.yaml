document: rfc-4315
kind: normative-requirement
summary: In the case of a mailbox where the client can COPY or APPEND but not SELECT or EXAMINE, the server SHOULD NOT send an APPENDUID or COPYUID response code as it would disclose information about the mailbox.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
