summary: UDP Periodic One-Way metrics (IDs 12–17) use TWAMP-Test packet format with 142 bytes total payload, periodic stream with incT=0.0200s and dT=1.0000s. TWAMP Session-Sender and Session-Reflector serve as the reference implementation examples for Src and Dst roles respectively.
