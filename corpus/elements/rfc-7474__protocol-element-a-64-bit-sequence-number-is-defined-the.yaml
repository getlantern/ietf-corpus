document: rfc-7474
kind: protocol-element
summary: 'A 64-bit sequence number is defined: the most significant 32 bits hold a boot count (persisted across restarts in non-volatile storage) and the least significant 32 bits hold a strictly increasing per-packet counter. The combined value provides replay protection across both session boundaries (inter-session) and within a session (intra-session).'
section: "2"
topics:
