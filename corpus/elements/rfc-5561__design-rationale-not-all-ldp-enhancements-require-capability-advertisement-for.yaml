document: rfc-5561
kind: design-rationale
summary: Not all LDP enhancements require capability advertisement. For example, upstream label allocation requires it, but inbound label filtering (where a speaker installs forwarding state for only certain FECs) does not, because no behavioral deviation from RFC 5036 need be signaled.
