document: rfc-9584
kind: normative-requirement
summary: A non-fragmented NAL unit MUST NOT be transmitted in a single FU; the S bit and E bit MUST NOT both be set to 1 in the same FU header. FuType in the FU header MUST equal the Type field of the fragmented NAL unit.
section: 4.3.3
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
