document: rfc-2327
kind: protocol-element
summary: 'The encryption key field ''k='' supports four methods: ''clear:<key>'' (key in plaintext), ''base64:<key>'' (base64-encoded key for characters prohibited in SDP), ''uri:<URI>'' (key fetched from URI on demand to reduce server synchronisation), and ''prompt'' (user prompted at join time). A ''k='' field may appear at session level or per media description.'
section: "6"
topics:
