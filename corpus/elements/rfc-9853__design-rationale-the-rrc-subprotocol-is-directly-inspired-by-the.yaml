document: rfc-9853
kind: design-rationale
summary: The RRC subprotocol is directly inspired by the QUIC path validation procedure (RFC 9000, Section 8.2). This addresses the gap left by RFC 9146, which described the threat of CID-based address spoofing but did not specify a concrete mechanism for verifying reachability at a new peer address.
section: "1"
topics:
    - tls
    - security
    - quic
