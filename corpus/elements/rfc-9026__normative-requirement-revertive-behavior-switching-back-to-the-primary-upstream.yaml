document: rfc-9026
kind: normative-requirement
summary: Revertive behavior — switching back to the Primary Upstream PE when it recovers — MUST be supported; non-revertive behavior MAY be supported via configuration, but the behavior MUST be consistent on all PEs in a given MVPN.
section: "4"
rfc2119_level: MUST
topics:
