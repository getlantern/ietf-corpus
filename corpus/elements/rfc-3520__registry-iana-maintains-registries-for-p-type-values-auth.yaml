document: rfc-3520
kind: registry
summary: 'IANA maintains registries for: P-Type values (AUTH_SESSION = 0x04); X-Type attribute types (AUTH_ENT_ID=1 through AUTHENTICATION_DATA=8); and per-X-Type SubType registries (AUTH_ENT_ID subtypes 1–9, SOURCE_ADDR/DEST_ADDR subtypes 1–4, START_TIME/END_TIME NTP_TIMESTAMP=1, RESOURCES subtypes 1–4). Values 0–127 require IETF Consensus; 128–255 are Private Use.'
section: "8"
