document: rfc-9328
kind: normative-requirement
summary: An AP MUST NOT contain NAL units from more than one access unit, MUST carry at least two aggregation units, MUST NOT contain FUs, and MUST NOT be nested (an AP cannot contain another AP). The AP Type field MUST be 28; LayerId MUST equal the lowest LayerId of all aggregated NAL units; TID MUST equal the lowest TID of all aggregated NAL units.
section: 4.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
