document: rfc-2590
kind: normative-requirement
summary: The default IPv6 MTU for a Frame Relay interface is 1592 octets, derived from the typical Frame Relay maximum frame size of at least 1600 octets. A smaller value may be configured but never below the IPv6 minimum MTU.
section: "2"
rfc2119_level: SHOULD
topics:
    - ip
