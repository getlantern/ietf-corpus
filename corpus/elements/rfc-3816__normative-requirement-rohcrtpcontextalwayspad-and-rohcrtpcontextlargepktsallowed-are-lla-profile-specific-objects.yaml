document: rfc-3816
kind: normative-requirement
summary: rohcRtpContextAlwaysPad and rohcRtpContextLargePktsAllowed are LLA-profile-specific objects; they MUST NOT be instantiated when the corresponding rohcProfile value is other than 0x0005. Similarly, rohcRtpContextNHPs, rohcRtpContextCSPs, rohcRtpContextCCPs, rohcRtpContextPktsLostPhysical, and rohcRtpContextPktsLostPreLink MUST NOT be instantiated for non-LLA profiles.
section: "5"
rfc2119_level: MUST NOT
topics:
    - snmp
