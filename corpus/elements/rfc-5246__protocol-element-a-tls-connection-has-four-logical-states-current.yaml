document: rfc-5246
kind: protocol-element
summary: 'A TLS connection has four logical states: current read, current write, pending read, and pending write. Each state holds a compression algorithm, cipher state, MAC key, and a per-direction sequence number (uint64). Security parameters include a 48-byte master secret and 32-byte client/server randoms.'
section: "6.1"
