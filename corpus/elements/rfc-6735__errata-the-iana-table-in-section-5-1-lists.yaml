document: rfc-6735
kind: errata
summary: The IANA table in Section 5.1 lists both ALRP-Namespace (AVP Code 616) and ALRP-Value (AVP Code 617) as type Unsigned32, while the body text in Sections 3.4.1 and 3.4.2 defines them as Unsigned16 and Unsigned8 respectively. This is an internal inconsistency in the RFC.
section: "5.1"
topics:
