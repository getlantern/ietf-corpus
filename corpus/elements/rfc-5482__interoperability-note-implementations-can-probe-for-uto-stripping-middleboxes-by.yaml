document: rfc-5482
kind: interoperability-note
summary: Implementations can probe for UTO-stripping middleboxes by exchanging UTO options on the first data segments after the handshake. When UTO-carrying segments are persistently lost, UTO SHOULD be disabled for the connection; if the connection is reset, a transparent re-establishment without UTO may be attempted before any application data is exchanged.
section: "4.1"
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
