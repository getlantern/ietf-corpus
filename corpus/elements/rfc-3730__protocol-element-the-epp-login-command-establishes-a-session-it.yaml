document: rfc-3730
kind: protocol-element
summary: The EPP <login> command establishes a session. It carries <clID> (client identifier), <pw> (plain text password), an optional <newPW>, <options> with <version> and <lang>, and <svcs> listing the object namespace URIs (and optional extension URIs) to be managed during the session.
