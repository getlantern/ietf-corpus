document: rfc-5311
kind: normative-requirement
summary: LSP number zero of an Extended LSP set MUST include an Area Address TLV. The set of area addresses advertised MUST be a subset of those in the normal LSP number zero at the same level, and SHOULD be syntactically identical.
section: 4.2.4
rfc2119_level: MUST
topics:
    - routing
