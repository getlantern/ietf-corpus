document: rfc-9608
kind: security-consideration
summary: If noRevAvail is incorrectly used for a certificate with a validity period that is not adequately short, it creates a window of opportunity for attackers to exploit a compromised private key. Certificate validity periods must be carefully assessed before using this extension.
section: "6.1"
topics:
