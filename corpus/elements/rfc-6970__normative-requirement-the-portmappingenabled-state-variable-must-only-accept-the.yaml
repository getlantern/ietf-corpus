document: rfc-6970
kind: normative-requirement
summary: The PortMappingEnabled state variable MUST only accept the value "1"; the IGD-PCP IWF MUST send back an error if any other value is signaled, because PCP does not support deactivating dynamic NAT mappings.
section: "4.1"
rfc2119_level: MUST
topics:
