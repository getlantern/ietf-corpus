document: rfc-7946
kind: design-rationale
summary: GeometryCollections SHOULD be used sparingly to maximize interoperability. Nested GeometryCollections SHOULD be avoided, and a GeometryCollection composed of a single part or parts of a single type should use a simpler multi-geometry type (MultiPoint, MultiLineString, or MultiPolygon) instead.
section: 3.1.8
topics:
