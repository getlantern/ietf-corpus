document: rfc-2595
kind: normative-requirement
summary: If the POP3 STLS command is implemented, the POP3 extension mechanism MUST also be implemented to avoid the need for client probing of multiple commands. The capability name 'STLS' indicates this command is present and permitted in the current state.
section: "4"
rfc2119_level: MUST
