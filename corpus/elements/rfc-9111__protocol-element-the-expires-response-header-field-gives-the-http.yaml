document: rfc-9111
kind: protocol-element
summary: The Expires response header field gives the HTTP-date after which the response is considered stale. When Cache-Control max-age or s-maxage is also present, recipients MUST ignore Expires, as it exists only for implementations that have not implemented Cache-Control.
section: "5.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
