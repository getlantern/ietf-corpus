document: rfc-9110
kind: protocol-element
summary: The 'origin' of a URI is the triple {scheme, host, port} after normalizing scheme and host to lowercase and removing leading zeros from the port. Two origins are distinct if they differ in any of the three components, even when the same entity controls both.
section: 4.3.1
topics:
    - http
    - security
