document: rfc-6958
kind: design-rationale
summary: The block does not provide per-packet statistics, deliberately omitting the per-packet confidentiality risk identified in RFC 3611 Section 7. The coarser burst/gap granularity reduces information leakage while still enabling quality analysis.
section: "7"
