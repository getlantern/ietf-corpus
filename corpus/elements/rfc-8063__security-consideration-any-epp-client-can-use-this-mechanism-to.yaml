document: rfc-8063
kind: security-consideration
summary: Any EPP client can use this mechanism to place data on the message queue of another EPP client, creating a potential denial-of-service attack vector. A server MAY set a policy that limits or rejects <keyrelay:create> commands if abuse is detected.
