document: rfc-6625
kind: protocol-element
summary: (C-*,C-*) S-PMSI A-D routes represent a policy where a PE does not use I-PMSIs for any multicast data traffic from its MVPN sites. When combined with BGP C-multicast routing, this implements the 'S-PMSI only' model where no I-PMSIs are used for the given MVPN. A PE originates a (C-*,C-*) route only if provisioned with the policy to do so.
section: "4.4"
topics:
    - multicast
    - routing
    - bgp
