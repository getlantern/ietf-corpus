document: rfc-2848
kind: design-rationale
summary: Only the generic 'TN' network type is defined rather than specific types like 'ISDN' or 'GSM', and transports are named 'voice', 'fax', 'pager' rather than referencing specific protocols. This deliberately hides underlying telephone network complexity and allows the GSTN to choose implementation details.
section: "3.4"
topics:
