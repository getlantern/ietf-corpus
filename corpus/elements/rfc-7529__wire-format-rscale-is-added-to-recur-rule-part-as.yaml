document: rfc-7529
kind: wire-format
summary: RSCALE is added to recur-rule-part as 'RSCALE=' followed by an iana-token or x-name identifying a CLDR-registered calendar system name. The SKIP element takes values OMIT, BACKWARD, or FORWARD. Month numbers are extended with an optional 'L' suffix to indicate a leap month.
section: "4"
