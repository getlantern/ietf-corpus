document: rfc-8623
kind: protocol-element
summary: The PCUpd message is extended for P2MP TE LSPs with an end-point-path-pair list containing optional END-POINTS and intended-path (ERO/SERO) pairs. The PCC SHOULD use make-before-break or sub-group-based procedures from RFC 4875 based on local policy.
