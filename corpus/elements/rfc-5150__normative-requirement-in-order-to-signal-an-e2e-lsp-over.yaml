document: rfc-5150
kind: normative-requirement
summary: In order to signal an e2e LSP over an LSP segment, signaling procedures described in Section 8.1.1 of RFC 4206 MUST be used. The RSVP-TE signaling extensions described in Section 5.1 MUST be used for stitching an e2e packet or non-packet GMPLS LSP to an S-LSP.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
