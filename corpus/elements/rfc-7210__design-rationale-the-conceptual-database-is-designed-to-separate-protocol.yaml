document: rfc-7210
kind: design-rationale
summary: The conceptual database is designed to separate protocol-specific aspects from both manual and automated key management, avoiding the need to build knowledge of any security protocol into key management protocols. This minimizes protocol-specific knowledge in operational interfaces and allows many different implementation approaches.
