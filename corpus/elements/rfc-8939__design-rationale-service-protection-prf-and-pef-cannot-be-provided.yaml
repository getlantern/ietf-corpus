document: rfc-8939
kind: design-rationale
summary: Service protection (PRF and PEF) cannot be provided end-to-end in the DetNet IP data plane due to the lack of unified end-to-end sequencing information. Instead, service protection can only be provided on a per-link or per-sub-network basis using technologies such as MPLS or IEEE 802.1 TSN.
section: "4.2"
topics:
    - ip
    - qos
    - mpls
