document: rfc-8225
kind: normative-requirement
summary: The PASSporT payload MUST include the "iat" (Issued At) JWT claim set to the date and time of origination of the personal communications. This is required for protecting against replay and cut-and-paste attacks.
section: 5.1.1
rfc2119_level: MUST
topics:
