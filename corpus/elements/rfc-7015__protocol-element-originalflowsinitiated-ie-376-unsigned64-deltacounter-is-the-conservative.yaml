document: rfc-7015
kind: protocol-element
summary: originalFlowsInitiated (IE 376, unsigned64, deltaCounter) is the conservative count of Original Flows whose first packet is represented within an Aggregated Flow. originalFlowsCompleted (IE 377, unsigned64, deltaCounter) is the conservative count of Original Flows whose last packet is represented. Both must sum to the original count on re-aggregation.
section: 7.2.2
