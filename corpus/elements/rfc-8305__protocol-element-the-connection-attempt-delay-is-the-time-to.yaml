document: rfc-8305
kind: protocol-element
summary: The Connection Attempt Delay is the time to wait before starting the next connection attempt. The recommended default is 250 milliseconds. A more nuanced implementation should target the time when the previous attempt would send its second TCP SYN, based on the TCP retransmission timer (RFC 6298).
