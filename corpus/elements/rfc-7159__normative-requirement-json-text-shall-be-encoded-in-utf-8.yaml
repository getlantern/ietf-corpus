document: rfc-7159
kind: normative-requirement
summary: JSON text SHALL be encoded in UTF-8, UTF-16, or UTF-32. The default encoding is UTF-8; many implementations cannot read UTF-16 or UTF-32, so UTF-8 maximizes interoperability.
section: "8.1"
rfc2119_level: REQUIRED
