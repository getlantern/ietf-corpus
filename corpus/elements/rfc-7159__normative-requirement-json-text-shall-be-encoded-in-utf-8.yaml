document: rfc-7159
kind: normative-requirement
summary: JSON text SHALL be encoded in UTF-8, UTF-16, or UTF-32. The default encoding is UTF-8, and UTF-8-encoded texts are interoperable in the sense that they will be read successfully by the maximum number of implementations.
section: "8.1"
rfc2119_level: REQUIRED
topics:
