document: rfc-6146
kind: normative-requirement
summary: NAT64 SHOULD support manually configured BIB entries for all three BIBs. Dynamically created entries are deleted when their last associated session is removed; manually configured entries persist until removed by an administrator.
section: "3.1"
rfc2119_level: SHOULD
topics:
