document: rfc-1184
kind: design-rationale
summary: 'Three states for signal handling are identified: (1) local editing + local signal trapping, (2) remote editing + local signal trapping, (3) remote editing + remote signal trapping. The fourth combination—local editing + remote signal trapping—is not useful because signals affecting line editing cannot be forwarded until the line is completed.'
