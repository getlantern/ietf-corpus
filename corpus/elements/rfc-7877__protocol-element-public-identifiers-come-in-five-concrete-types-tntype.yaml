document: rfc-7877
kind: protocol-element
summary: 'Public Identifiers come in five concrete types: TNType (single telephone number), RNType (routing number), TNRType (contiguous TN range with startTn/endTn), TNPType (TN prefix), and URIPubIdType (URI). All extend abstract PubIdType and may be members of zero or more Destination Groups or directly associated with SED Records.'
