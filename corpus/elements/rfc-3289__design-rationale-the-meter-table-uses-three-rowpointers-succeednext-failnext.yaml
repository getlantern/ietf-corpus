document: rfc-3289
kind: design-rationale
summary: The Meter Table uses three RowPointers (succeedNext, failNext, specific) rather than a richer N-rate structure because of SNMP modeling constraints. Multi-rate meters such as trTCM are expressed by chaining multiple meter entries through the failNext link, with diffServTBParamType in the first entry indicating the overall algorithm.
