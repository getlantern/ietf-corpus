document: rfc-5985
kind: protocol-element
summary: 'The ''locationType'' element MAY appear in a locationRequest and contains a space-separated list of requested location types: ''any'', ''geodetic'', ''civic'', or ''locationURI''. An optional ''exact'' boolean attribute (default false) requires strict type adherence.'
section: "6.2"
