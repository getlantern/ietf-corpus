summary: The extension is designed to handle both standard iTIP/iMIP calendar messages and non-standard cases where the enclosed iCalendar data lacks a METHOD property, or the data is in an alternative machine-readable format such as JSCalendar, reflecting real-world diversity in calendar email practices.
