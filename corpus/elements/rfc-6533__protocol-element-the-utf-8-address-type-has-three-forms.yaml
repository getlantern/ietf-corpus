document: rfc-6533
kind: protocol-element
summary: 'The UTF-8 address type has three forms: utf-8-addr-xtext (7-bit safe, suitable for all transports), utf-8-addr-unitext (safe for ORCPT when SMTPUTF8 is advertised), and utf-8-address (native 8-bit form, only for protocols capable of native 8-bit representation).'
