document: rfc-5846
kind: wire-format
summary: 'The Binding Revocation Message uses Mobility Header Type 16. The outer format contains Payload Proto (8-bit), Header Len (8-bit, in units of 8 octets excluding first 8), MH Type (value 16), Reserved (8-bit, MUST be zero/ignored), Checksum (16-bit), and Binding Revocation Type (8-bit: 1=BRI, 2=BRA), followed by variable Binding Revocation Message Data.'
section: "5"
