document: rfc-2131
kind: design-rationale
summary: The BROADCAST flag in the 'flags' field was added to handle clients whose TCP/IP stack cannot receive unicast IP datagrams before being configured with an IP address; setting this bit instructs servers and relay agents to broadcast replies rather than unicast to the uninitialized client.
section: "2"
topics:
