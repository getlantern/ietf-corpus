document: rfc-3519
kind: interoperability-note
summary: When the Encapsulation field in the UDP Tunnel Request Extension is non-zero, a specific encapsulation format is requested; the HA MUST either accept with that format or reject with ERROR_HA_UDP_ENCAP_UNAVAIL (code 142). When zero, the encapsulation defaults to the 'M' and 'G' bits of the Registration Request.
section: "4.1"
topics:
    - nat
    - mobility
