document: rfc-3355
kind: normative-requirement
summary: An L2TP implementation MUST support LLC encapsulated L2TP on PVCs. It MAY additionally support LLC encapsulated L2TP on SVCs and MAY support VC-multiplexed L2TP on PVCs or SVCs.
section: "4"
rfc2119_level: MUST
