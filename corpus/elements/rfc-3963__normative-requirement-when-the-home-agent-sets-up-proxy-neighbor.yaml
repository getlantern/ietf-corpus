document: rfc-3963
kind: normative-requirement
summary: When the Home Agent sets up Proxy Neighbor Discovery for a Mobile Router whose Binding Update had the R flag set, the Router (R) bit in the Proxy Neighbor Advertisement MUST be set, reflecting that the Mobile Router is a router, not just a host.
section: "6.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
