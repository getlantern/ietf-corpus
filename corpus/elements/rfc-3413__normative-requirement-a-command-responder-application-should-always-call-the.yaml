document: rfc-3413
kind: normative-requirement
summary: A command responder application should always call the returnResponsePdu abstract service interface, even in the event of an error such as resource allocation failure. The PDU passed must contain appropriate errorStatus and errorIndex values.
section: "3.2"
rfc2119_level: SHOULD
topics:
