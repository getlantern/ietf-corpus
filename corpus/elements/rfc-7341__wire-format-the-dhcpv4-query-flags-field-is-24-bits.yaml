document: rfc-7341
kind: wire-format
summary: The DHCPv4-query flags field is 24 bits. Bit U (unicast flag, MSB) indicates whether the encapsulated DHCPv4 message would have been sent to a unicast (1) or broadcast (0) IPv4 address. Remaining bits (MBZ) MUST be set to zero on send and ignored on receive.
section: "6.3"
topics:
    - ip
    - v6ops
