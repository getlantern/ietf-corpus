document: rfc-9219
kind: security-consideration
summary: Using server-side S/MIME verification requires the client to trust the server's verification code, configuration, and operational practices. A malicious or compromised server could return false verification status — conveying successful verification for a forged message or reporting failure for a properly signed one.
section: "6"
topics:
