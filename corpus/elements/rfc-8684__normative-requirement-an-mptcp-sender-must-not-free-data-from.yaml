document: rfc-8684
kind: normative-requirement
summary: An MPTCP sender MUST NOT free data from the send buffer until it has been acknowledged by both a Data ACK on any subflow and at the subflow level by all subflows on which the data was sent.
section: 3.3.2
rfc2119_level: MUST NOT
topics:
    - multipath
    - tcp
