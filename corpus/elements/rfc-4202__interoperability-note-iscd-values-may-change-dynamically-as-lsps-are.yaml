document: rfc-4202
kind: interoperability-note
summary: ISCD values may change dynamically as LSPs are allocated or released, requiring the advertising LSR to re-flood modified descriptors. For example, allocating a VC-3 LSP on an STM-64 TDM interface may reduce the advertised Maximum LSP Bandwidth for non-preemptable priorities from STM-64 to STM-16.
section: 2.4.8
topics:
    - routing
