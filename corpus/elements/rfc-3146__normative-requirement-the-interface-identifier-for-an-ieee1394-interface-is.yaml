document: rfc-3146
kind: normative-requirement
summary: The Interface Identifier for an IEEE1394 interface is formed from the EUI-64 identifier by complementing the U/L bit (next-to-lowest order bit of the first octet). An IPv6 address prefix for stateless autoconfiguration MUST have a length of 64 bits.
section: "6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
