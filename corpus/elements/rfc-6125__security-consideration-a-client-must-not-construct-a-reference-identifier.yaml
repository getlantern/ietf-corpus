document: rfc-6125
kind: security-consideration
summary: A client MUST NOT construct a reference identifier corresponding to RDNs other than those of type Common Name, and MUST NOT check for RDNs other than Common Name in presented identifiers, to prevent attacks based on matching non-CN RDN attributes.
section: 6.2.1
rfc2119_level: MUST NOT
topics:
    - tls
    - pkix
    - security
