document: rfc-9008
kind: interoperability-note
summary: To avoid a 'flag day' caused by incompatibility between nodes using Option Type 0x63 and those using 0x23, it is suggested that RPL implementations accept both 0x63 and 0x23 when processing the RPL Option header. The DODAG Configuration flag allows incremental deployment.
section: "4.2"
topics:
