document: rfc-7482
kind: design-rationale
summary: RDAP query URLs are restricted to HTTP GET and HEAD methods only, reflecting that WHOIS services are inherently read-only. Resource management, provisioning, and update functions are explicitly out of scope because registries have divergent methods for these functions and uniform interoperability is not needed.
section: "1"
topics:
