document: rfc-2279
kind: normative-requirement
summary: Any UTF-8 data not containing Hangul syllables encoded with pre-Amendment 5 ISO/IEC 10646 assignments SHOULD NOT use the charset label 'UNICODE-1-1-UTF-8'. Creating new Hangul-containing data without taking Amendment 5 into account is strongly discouraged.
section: "5"
rfc2119_level: SHOULD NOT
