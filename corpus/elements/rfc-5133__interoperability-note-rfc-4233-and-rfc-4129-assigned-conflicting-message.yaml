document: rfc-5133
kind: interoperability-note
summary: RFC 4233 and RFC 4129 assigned conflicting message type values (both using type 5) for TEI Query Request and DLC Status messages respectively. This document resolves the conflict by renumbering the TEI Query Request to type 8, updating RFC 4233.
