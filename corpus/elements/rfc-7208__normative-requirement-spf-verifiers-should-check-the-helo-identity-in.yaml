document: rfc-7208
kind: normative-requirement
summary: SPF verifiers SHOULD check the 'HELO' identity in addition to 'MAIL FROM', and checking 'HELO' before 'MAIL FROM' is the RECOMMENDED sequence. Checking 'HELO' can reduce DNS resource usage and is only possible when the HELO string is a valid multi-label domain name.
section: "2.3"
rfc2119_level: RECOMMENDED
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
