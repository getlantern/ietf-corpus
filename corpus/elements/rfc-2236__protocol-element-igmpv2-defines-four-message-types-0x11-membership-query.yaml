document: rfc-2236
kind: protocol-element
summary: 'IGMPv2 defines four message types: 0x11 (Membership Query, with General and Group-Specific subtypes), 0x16 (Version 2 Membership Report), 0x17 (Leave Group), and 0x12 (Version 1 Membership Report for backwards compatibility). Unrecognized message types MUST be silently ignored.'
