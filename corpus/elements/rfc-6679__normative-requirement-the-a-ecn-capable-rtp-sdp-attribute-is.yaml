document: rfc-6679
kind: normative-requirement
summary: The 'a=ecn-capable-rtp:' SDP attribute is a media-level attribute and MUST NOT be used at the session level. It MUST be used when employing ECN for RTP in SDP-based systems. The 'rtcp-xr' attribute with 'ecn-sum' parameter MUST also always be used.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
