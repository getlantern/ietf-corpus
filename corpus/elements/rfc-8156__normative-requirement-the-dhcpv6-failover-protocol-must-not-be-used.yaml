document: rfc-8156
kind: normative-requirement
summary: The DHCPv6 failover protocol MUST NOT be used for new leases shorter than 30 seconds, because the lazy-update and MCLT mechanisms are not designed for such short lifetimes. Leases already approaching expiration are not subject to this restriction.
section: "1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
