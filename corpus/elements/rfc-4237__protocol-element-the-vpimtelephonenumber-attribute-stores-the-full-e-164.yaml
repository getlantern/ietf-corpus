document: rfc-4237
kind: protocol-element
summary: The vPIMTelephoneNumber attribute stores the full E.164 form of the telephone number including any sub-addressing portion, encoded with no parentheses, spaces, dots, or hyphens, with a leading '+' and a '+' delineating the submailbox. It is the primary search key for directory lookups.
