document: rfc-8206
kind: normative-requirement
summary: For inbound announcements (CE to PE), the PE router MUST generate a signature from the old (local) ASN forward-signing to the new (global) ASN with pCount=0; signing in iBGP is required for this AS-migration scenario only.
section: "5.2"
rfc2119_level: MUST
