document: rfc-3273
kind: normative-requirement
summary: If a remote monitoring device implements a group, it must implement all objects in that group. For example, an agent implementing the network layer matrix group must implement both the nlMatrixSDHighCapacityTable and the nlMatrixDSHighCapacityTable.
section: "2.1"
rfc2119_level: MUST
topics:
