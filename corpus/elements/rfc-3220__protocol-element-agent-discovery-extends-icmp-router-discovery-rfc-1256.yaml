document: rfc-3220
kind: protocol-element
summary: 'Agent Discovery extends ICMP Router Discovery (RFC 1256): an Agent Advertisement is an ICMP Router Advertisement carrying a Mobility Agent Advertisement Extension. An Agent Solicitation is an ICMP Router Solicitation with IP TTL set to 1. All mobility agents MUST process packets to the Mobile-Agents multicast group 224.0.0.11.'
section: "2"
topics:
    - mobility
    - ip
