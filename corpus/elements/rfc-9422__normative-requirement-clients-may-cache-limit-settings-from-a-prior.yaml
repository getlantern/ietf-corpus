document: rfc-9422
kind: normative-requirement
summary: Clients MAY cache limit settings from a prior session for use in subsequent sessions to the same server. However, clients MUST be able to accommodate any limit changes that occur between sessions, since servers may adjust limits at any time.
section: "3.8"
rfc2119_level: MAY
topics:
    - email
