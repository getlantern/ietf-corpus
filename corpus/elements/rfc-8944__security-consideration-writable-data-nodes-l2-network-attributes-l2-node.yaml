document: rfc-8944
kind: security-consideration
summary: 'Writable data nodes (l2-network-attributes, l2-node-attributes, l2-link-attributes, l2-termination-point-attributes) are sensitive: a malicious client could sabotage name, management-address, rate, delay, or termination-point attributes to disrupt network operations. For learned topologies the server prohibits misconfiguration; for configured topologies unauthorized writes can take effect in the operational datastore.'
section: "6"
topics:
