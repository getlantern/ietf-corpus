document: rfc-2427
kind: protocol-element
summary: The Q.922 XID exchange allows negotiation of maximum frame size N201 (default 260 octets), retransmission timer T200 (default 1.5 s), and maximum outstanding I-frames K (3–40 depending on link speed). A K value of zero signals unwillingness to support acknowledged-mode operation.
section: "5"
