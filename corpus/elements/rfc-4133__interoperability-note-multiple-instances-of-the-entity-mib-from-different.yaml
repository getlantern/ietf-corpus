document: rfc-4133
kind: interoperability-note
summary: Multiple instances of the Entity MIB from different agents in the same managed system are not required to be equivalent or consistent. Index values and vendor-specific identifiers are likely to differ between agents, and each agent may manage different subsets of the chassis.
section: "2.9"
topics:
