document: rfc-4133
kind: interoperability-note
summary: The syntax of entPhysicalDescr, entPhysicalName, and entLogicalDescr was changed from DisplayString to SnmpAdminString in version 2. The working group chose to update the existing objects rather than deprecate and replace them, despite this not being strictly supported by SMIv2, to minimize adverse impact on backward compatibility.
section: "2.11"
topics:
