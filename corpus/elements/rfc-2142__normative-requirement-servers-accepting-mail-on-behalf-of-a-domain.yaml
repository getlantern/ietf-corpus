document: rfc-2142
kind: normative-requirement
summary: Servers accepting mail on behalf of a domain must accept and correctly process well-known mailbox names for that domain, even if the server itself does not support the associated service (e.g., mail exchangers for a domain must accept USENET@domain even if they don't run NNTP).
section: "1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
