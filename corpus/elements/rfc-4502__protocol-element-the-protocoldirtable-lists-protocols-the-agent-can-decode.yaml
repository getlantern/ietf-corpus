summary: The protocolDirTable lists protocols the agent can decode and count, indexed by protocolDirID (OCTET STRING 4..128) and protocolDirParameters (OCTET STRING 1..32). It supports limited extensibility, allowing child protocol entries to be added via SNMP for protocols whose parent has the 'extensible' bit set.
