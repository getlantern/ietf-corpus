document: rfc-9390
kind: security-consideration
summary: 'Group commands amplify the blast radius of a compromised Diameter node: an attacker controlling a client or server could launch denial-of-service attacks by terminating or modifying a large number of sessions using only a few group commands, versus many individual session commands in the base protocol.'
