document: rfc-7864
kind: normative-requirement
summary: When the MAG sends a PBU with Handoff Indicator value 6 ('Attachment over a new interface sharing prefixes') and the BCE ATT/MN-LL-Identifier does not match, the LMA MUST treat the request as creating a new mobility session sharing the same HNPs as the existing BCE.
section: 3.2.1
rfc2119_level: MUST
topics:
    - mobility
