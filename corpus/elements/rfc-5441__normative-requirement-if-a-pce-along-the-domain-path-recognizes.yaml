document: rfc-5441
kind: normative-requirement
summary: If a PCE along the domain path recognizes but does not support the BRPC procedure, it MUST return a PCErr message to the upstream PCE with Error-Type 13 ('BRPC procedure completion failure').
section: "9"
rfc2119_level: MUST
