document: rfc-2681
kind: protocol-element
summary: Calibration error 'e' is defined as a bound such that the reported value is within (true value - e) to (true value + e) at least 95% of the time. The total measurement error can be bounded by 2*Rsource + Hinitial + Hfinal + Hrefl, representing clock resolution and host-time uncertainties.
section: 2.7.4
topics:
