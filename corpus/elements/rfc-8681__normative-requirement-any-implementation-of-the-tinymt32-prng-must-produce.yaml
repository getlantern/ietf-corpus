document: rfc-8681
kind: normative-requirement
summary: 'Any implementation of the TinyMT32 PRNG MUST produce the same output as the reference implementation of RFC 8682. Compliance is verified via three criteria: one from RFC 8682 for the 32-bit generator, and two in Appendix A for the 4-bit and 8-bit mapping functions.'
section: "3.5"
rfc2119_level: MUST
topics:
