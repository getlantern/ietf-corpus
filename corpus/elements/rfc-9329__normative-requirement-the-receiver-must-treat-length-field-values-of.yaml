document: rfc-9329
kind: normative-requirement
summary: The receiver MUST treat Length field values of 0 or 1 as fatal errors and MUST close the TCP connection. Empty messages where Length equals 2 MUST be silently ignored.
section: "3.1"
rfc2119_level: MUST
topics:
