document: rfc-9437
kind: security-consideration
summary: Cache poisoning via malicious Map-Notify messages is prevented by the combination of monotonically increasing nonces and the PubSubKey security association between ITRs and Map-Servers. Integrity protection of Map-Request messages (e.g., via LISP-SEC) is RECOMMENDED to prevent xTR-ID hijacking.
section: "7"
topics:
