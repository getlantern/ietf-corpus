document: rfc-1112
kind: protocol-element
summary: Host groups are identified by Class D IP addresses, with the high-order four bits set to '1110'. The range is 224.0.0.0 to 239.255.255.255. The address 224.0.0.0 is unassigned; 224.0.0.1 is permanently assigned to all IP hosts.
