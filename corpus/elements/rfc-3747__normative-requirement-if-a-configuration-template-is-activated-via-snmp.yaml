document: rfc-3747
kind: normative-requirement
summary: If a configuration template is activated via SNMP SET requests, an accurate error response value MUST be returned. On systems where activation may take a long time, extra mechanisms must be provided to detect errors after an early response.
section: "6.1"
rfc2119_level: MUST
topics:
    - diffserv
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
