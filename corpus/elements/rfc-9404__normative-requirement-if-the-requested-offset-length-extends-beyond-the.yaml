document: rfc-9404
kind: normative-requirement
summary: If the requested offset+length extends beyond the blob, the server returns available octets and MUST set isTruncated to true. If offset is past the end, an empty string is returned with isTruncated true. Any digest is calculated on the octets that would be returned for a data field.
section: "4.2"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
