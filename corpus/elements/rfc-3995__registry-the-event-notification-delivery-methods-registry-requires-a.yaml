summary: 'The Event Notification Delivery Methods registry requires a registration document specifying: the keyword name, whether Push or Pull, whether Compound Event Notifications are supported, Event Life for Pull methods, security considerations, and IANA registration template. The ''ippget'' delivery method is the sole initially registered method.'
