document: rfc-7889
kind: protocol-element
summary: The APPENDLIMIT extension is advertised in the CAPABILITY response as either 'APPENDLIMIT=<number>' (global limit for all mailboxes) or 'APPENDLIMIT' without a value (per-mailbox limits discoverable via STATUS or LIST).
