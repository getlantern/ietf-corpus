document: rfc-8662
kind: normative-requirement
summary: An implementation SHOULD try to maximize the possibility of load-balancing by inserting ELI/EL where multiple equal-cost paths are available while minimizing the number of ELI/EL pairs inserted. In case of trade-off, implementations SHOULD provide operator flexibility to select placement criteria or specify a sub-objective for optimization.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - routing
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
