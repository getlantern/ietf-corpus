document: rfc-9762
kind: normative-requirement
summary: Hosts supporting the P flag SHOULD process ICMPv6 redirects unless configured otherwise. Without redirect processing, traffic between clients using delegated prefixes on the same link must traverse the default router, causing higher latency.
section: "7.4"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
