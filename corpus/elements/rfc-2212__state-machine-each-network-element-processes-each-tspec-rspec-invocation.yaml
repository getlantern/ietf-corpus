document: rfc-2212
kind: state-machine
summary: Each network element processes each (TSpec, RSpec) invocation through admission control, transitioning to either ACCEPTED (returning a new (Rout, Sout)) or REJECTED. On re-invocation with changed parameters, admission control is reapplied; on refresh for a flow that previously consumed slack Si, the element reuses Si without recomputation.
section: Invocation Information
topics:
