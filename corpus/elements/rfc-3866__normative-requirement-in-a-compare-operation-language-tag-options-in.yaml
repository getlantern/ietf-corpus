document: rfc-3866
kind: normative-requirement
summary: In a compare operation, language tag options in the AttributeDescription are treated the same as in a search filter equality match. If no attribute matches the type/subtype and language tag options, noSuchAttributeType is returned.
section: "2.4"
rfc2119_level: MUST
topics:
