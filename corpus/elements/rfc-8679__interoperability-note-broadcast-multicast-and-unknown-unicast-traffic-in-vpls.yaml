document: rfc-8679
kind: interoperability-note
summary: Broadcast, multicast, and unknown unicast traffic in VPLS and EVPN are out of scope because either the protector cannot pre-establish the forwarding state for egress protection, or the PLR must not reroute traffic to other routers to avoid duplication; these cases are left for future study.
section: "1"
topics:
