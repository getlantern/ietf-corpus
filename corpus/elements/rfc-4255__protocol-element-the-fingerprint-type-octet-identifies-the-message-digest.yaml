document: rfc-4255
kind: protocol-element
summary: 'The fingerprint type octet identifies the message-digest algorithm: 0 is reserved, 1 is SHA-1. Adding new values requires IETF consensus. As few fingerprint types as possible should be reserved; additional types are only warranted to increase security.'
section: 3.1.2
