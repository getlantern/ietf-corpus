document: rfc-4588
kind: normative-requirement
summary: In SSRC-multiplexing, the receiver MUST NOT have two outstanding NACK requests for the same packet sequence number in two different original streams before the SSRC association is resolved, to avoid ambiguity. SSRC-multiplexing MUST NOT be used in multicast sessions for the same reason.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
