document: rfc-8624
kind: design-rationale
summary: RSASHA512 is NOT RECOMMENDED for signing despite having no significant cryptographic advantage over RSASHA256, because broader deployment would only make deprecation of older algorithms harder. Users wanting stronger algorithms should switch to elliptic curve cryptography.
section: "3.1"
