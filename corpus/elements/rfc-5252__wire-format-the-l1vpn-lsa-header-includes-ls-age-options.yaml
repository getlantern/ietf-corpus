kind: wire-format
summary: The L1VPN LSA header includes LS age, Options, LS Type (11), Opaque Type (1 byte), Opaque ID (3 bytes), Advertising Router (32-bit), LS Sequence Number (32-bit), LS checksum (16-bit), and Length (16-bit), followed by L1VPN Info TLV and optional TE Link TLV.
