document: rfc-3537
kind: protocol-element
summary: 'HMAC key wrapping with AES uses a simpler algorithm: the key is prefixed with its 1-octet length, padded to a multiple of 8 octets with random bytes, then encrypted using the AES Key Wrap algorithm (RFC 3394 section 2.2.1). The result is 8 octets longer than the padded input.'
section: "4.1"
topics:
