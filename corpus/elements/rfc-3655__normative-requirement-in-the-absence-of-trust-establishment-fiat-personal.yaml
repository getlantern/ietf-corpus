document: rfc-3655
kind: normative-requirement
summary: In the absence of trust establishment (fiat, personal, or knowledge-based), the AD bit from a recursive name server SHOULD NOT be trusted. A roaming/traveling host SHOULD NOT use recursive DNS servers offered by DHCP when security status matters.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
