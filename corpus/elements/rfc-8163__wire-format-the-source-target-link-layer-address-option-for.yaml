summary: 'The Source/Target Link-Layer Address option for 8-bit MS/TP MAC addresses has the following format: Type (1 octet), Length=1 (1 octet, indicating 8 octets total), a zero pad octet (0x00), MS/TP Address (1 octet in canonical bit order), and four octets of zero padding.'
