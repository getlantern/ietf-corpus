document: rfc-9111
kind: interoperability-note
summary: 'The Pragma request header field (notably ''Pragma: no-cache'') is deprecated in this specification in favor of Cache-Control. Because the meaning of ''Pragma: no-cache'' in responses was never specified, it cannot reliably replace ''Cache-Control: no-cache'' in responses.'
section: "5.4"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
