document: rfc-4644
kind: interoperability-note
summary: Because some news server software may not immediately determine whether an article is suitable, a server MAY acknowledge successful transfer (239) but later silently discard the article. Clients cannot rely on 239 as a guarantee of propagation.
section: 2.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
