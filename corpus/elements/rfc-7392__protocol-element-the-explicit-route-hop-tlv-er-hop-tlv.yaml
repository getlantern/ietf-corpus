document: rfc-7392
kind: protocol-element
summary: The Explicit Route Hop TLV (ER-Hop TLV) identifies an abstract node representing one hop along the MS-PW path. This document defines a new ER-Hop TLV Type, value 0x0805, for the 'L2 PW Address of Switching Point', in addition to the IPv4 Prefix, IPv6 Prefix, AS Number, and LSP-ID types inherited from RFC 3212.
section: "3.3"
topics:
