document: rfc-2131
kind: design-rationale
summary: DHCP clients broadcast DHCPREQUEST (during SELECTING) rather than unicasting directly to the chosen server so that all servers that received the original DHCPDISCOVER also receive the DHCPREQUEST, enabling non-selected servers to release any tentatively held addresses.
section: "3.1"
topics:
    - ip
