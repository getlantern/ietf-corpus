document: rfc-1996
kind: normative-requirement
summary: A slave that receives a NOTIFY request from a host that is not a known master for the zone containing the QNAME should ignore the request and log an error. This guards against unauthorized NOTIFY senders.
section: "3.10"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
