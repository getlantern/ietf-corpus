document: rfc-2815
kind: security-consideration
summary: QoS mechanisms open the possibility for denial-of-service and theft-of-service attacks. Any use of these service mappings assumes that all requests for service are authenticated appropriately. No new security issues beyond those in companion documents RFC 2816 and RFC 2814 are introduced.
section: "8"
topics:
