document: rfc-7074
kind: security-consideration
summary: This document only impacts the values carried in a single Switching Type field in signaling and routing protocols. As no new protocol formats or mechanisms are defined, there are no particular security implications. General MPLS/GMPLS security issues are addressed in RFC 5920.
