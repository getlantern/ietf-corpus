document: rfc-8544
kind: normative-requirement
summary: An attempt to add an organization ID with a role that already exists does not change the object at all; the server SHOULD notify clients by sending a 2305 error response code. Likewise for remove/change when the role does not exist.
section: 4.2.5
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
