document: rfc-6185
kind: normative-requirement
summary: Congestion control for RTP SHALL be used in accordance with RFC 3550 and any applicable RTP profile. When best-effort service is used, implementations SHALL monitor packet loss to ensure it remains within acceptable parameters.
section: "5"
rfc2119_level: MUST
topics:
