document: rfc-1890
kind: normative-requirement
summary: For applications using silence suppression, the first packet of a talkspurt (first packet after a silence period) MUST be distinguished by setting the marker bit in the RTP data header. Applications without silence suppression set the bit to zero.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
