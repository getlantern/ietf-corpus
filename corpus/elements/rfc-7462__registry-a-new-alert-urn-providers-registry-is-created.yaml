document: rfc-7462
kind: registry
summary: A new 'Alert URN Providers' registry is created, managed under the 'First Come First Served' policy (RFC 5226), recording <provider> values used to construct <private-name>s. Each entry contains the provider value, registrant name, and contact URI. Private extension URNs themselves are not registered with IANA.
