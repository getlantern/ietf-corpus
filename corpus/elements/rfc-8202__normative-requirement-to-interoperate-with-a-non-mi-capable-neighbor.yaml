document: rfc-8202
kind: normative-requirement
summary: 'To interoperate with a non-MI-capable neighbor over a point-to-point circuit, an MI-RTR MUST NOT send IS-IS PDUs for instances other than IID #0 over that circuit. All IIHs sent on a point-to-point circuit by an MI-RTR MUST include an IID-TLV (including those for IID #0) to signal MI-RTR capability.'
section: 3.6.2
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
