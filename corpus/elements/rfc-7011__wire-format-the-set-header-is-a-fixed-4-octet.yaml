document: rfc-7011
kind: wire-format
summary: The Set Header is a fixed 4-octet structure with Set ID (16-bit) and Length (16-bit, total Set length including header, records, and padding). Set ID 2 is reserved for Template Sets, 3 for Options Template Sets, 4–255 reserved for future use, and values 256 and above identify Data Sets.
