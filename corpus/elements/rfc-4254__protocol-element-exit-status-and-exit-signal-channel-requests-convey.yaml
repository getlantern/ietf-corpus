document: rfc-4254
kind: protocol-element
summary: Exit status and exit-signal channel requests convey command termination information. 'exit-status' carries a uint32 exit code; 'exit-signal' carries signal name (without SIG prefix), core-dump boolean, UTF-8 error message, and language tag. The channel must subsequently be closed with SSH_MSG_CHANNEL_CLOSE.
section: "6.10"
topics:
    - security
