document: rfc-7716
kind: interoperability-note
summary: 'Key differences from RFC 7524''s GTM procedures: RFC 7716 uses C-multicast Shared/Source Tree Joins (with RD=0) rather than Leaf A-D routes; uses RFC 6514 Leaf A-D NLRI format rather than the RFC 7524-defined format; uses a single RD value of zero (not two distinct RD values with different semantics as in RFC 7524).'
section: "3"
topics:
