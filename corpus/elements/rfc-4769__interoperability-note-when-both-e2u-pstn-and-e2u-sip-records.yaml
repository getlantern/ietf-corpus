document: rfc-4769
kind: interoperability-note
summary: When both E2U+pstn and E2U+sip records are returned, a typical calling application prioritizes the on-net SIP record and may fall back to the E2U+pstn record to route via a PSTN-connected media gateway if the IP call route fails.
section: "6.2"
topics:
    - dns
    - sip
