document: rfc-7428
kind: normative-requirement
summary: Implementations claiming conformance MUST enable G.9959 shared network key security. For applications with high confidentiality or integrity requirements, additional application-layer security (e.g., IPsec, TLS) SHOULD be applied.
section: "2.5"
rfc2119_level: MUST
topics:
