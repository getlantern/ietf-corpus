document: rfc-5571
kind: protocol-element
summary: A Softwire consists of an L2TPv2 Control Connection (Control Channel), a single L2TPv2 Session, and a PPP link negotiated over that session. There is exactly one L2TPv2 session per tunnel in the Softwire environment.
