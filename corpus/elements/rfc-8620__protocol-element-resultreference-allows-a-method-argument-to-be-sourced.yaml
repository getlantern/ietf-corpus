document: rfc-8620
kind: protocol-element
summary: ResultReference allows a method argument to be sourced from a prior method's response in the same request by prefixing the argument name with '#'. The reference specifies resultOf (call-id), name (expected response name), and path (JSON Pointer extended with '*' for array flattening).
section: "3.7"
