document: rfc-2266
kind: security-consideration
summary: vgRptrPortAllowedTrainType is the primary access-control mechanism, allowing a network manager to restrict each port to specific device types (end nodes only, promiscuous end nodes, repeaters, or any combination). The N-bit in the allowed configuration field during training can explicitly deny access due to security restrictions.
