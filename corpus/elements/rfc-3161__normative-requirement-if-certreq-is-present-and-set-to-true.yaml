document: rfc-3161
kind: normative-requirement
summary: If certReq is present and set to true, the TSA's public key certificate referenced by ESSCertID MUST be provided in the SignedData certificates field. If certReq is missing or false, the certificates field MUST NOT be present in the response.
section: 2.4.1
rfc2119_level: MUST
topics:
