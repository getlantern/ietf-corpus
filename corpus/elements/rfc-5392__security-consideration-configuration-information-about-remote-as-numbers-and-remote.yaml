document: rfc-5392
kind: security-consideration
summary: Configuration information about remote AS numbers and remote ASBR IDs is obtained manually from neighboring administrations and should be carefully checked. If a BGP session exists between ASBRs, inconsistencies (e.g., differing remote AS numbers) SHOULD trigger operator alerts or suppression of the OSPF advertisement, per local policy.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
