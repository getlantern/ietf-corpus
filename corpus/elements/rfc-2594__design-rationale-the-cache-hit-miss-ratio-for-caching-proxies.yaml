document: rfc-2594
kind: design-rationale
summary: The cache hit/miss ratio for caching proxies is intentionally not stored as an explicit MIB object; instead it is derivable from the existing incoming and outgoing request/response counters. This avoids redundancy while still enabling the metric.
section: "4.3"
