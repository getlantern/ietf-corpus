document: rfc-8779
kind: protocol-element
summary: 'A new 2-bit Routing Granularity (RG) flag (bits 15-16) is defined in the RP object to indicate the requested ERO route granularity: 0=reserved, 1=node, 2=link, 3=label. This supports the Explicit Label Control feature of RSVP-TE.'
