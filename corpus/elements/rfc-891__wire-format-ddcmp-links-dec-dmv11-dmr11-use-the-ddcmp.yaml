document: rfc-891
kind: wire-format
summary: 'DDCMP links (DEC DMV11/DMR11) use the DDCMP frame: SYN SYN SOH (24 bits) | Count (14 bits) | Flag (2 bits) | Resp (8 bits) | Seq (8 bits) | Adr (8 bits) | CRC1 (16 bits) | Data | CRC2 (16 bits). The Internet datagram is placed in the Data field as-is with no stuffing; error detection and retransmission are handled by the DDCMP interface hardware.'
section: A.2
topics:
    - ip
