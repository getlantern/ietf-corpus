document: rfc-4191
kind: interoperability-note
summary: 'The extension is backwards-compatible: Type A hosts (implementing only RFC 2461) ignore the new Prf field and Route Information Options and continue to function as before. Routers advertising preferences must configure settings that work optimally for all host types (A, B, and C) simultaneously.'
