document: rfc-9552
kind: protocol-element
summary: All non-VPN BGP-LS link, node, and prefix information SHALL be encoded using AFI 16388 / SAFI 71. VPN information SHALL use AFI 16388 / SAFI 72, which prepends an 8-octet Route Distinguisher to the NLRI.
section: "5.2"
topics:
