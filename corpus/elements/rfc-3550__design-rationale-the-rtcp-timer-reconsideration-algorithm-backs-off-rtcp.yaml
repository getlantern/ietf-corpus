document: rfc-3550
kind: design-rationale
summary: The RTCP timer reconsideration algorithm backs off RTCP transmission when group membership is growing rapidly (e.g., many simultaneous joins), preventing momentary RTCP bandwidth bursts. The complementary reverse reconsideration algorithm accelerates transmission when membership shrinks, enabling faster adaptation.
section: "6.2"
