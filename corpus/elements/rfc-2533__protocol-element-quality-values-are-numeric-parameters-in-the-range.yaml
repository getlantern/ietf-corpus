document: rfc-2533
kind: protocol-element
summary: Quality values are numeric parameters in the range 0 to 1 (up to 3 fractional digits) attached to any filter sub-expression with ';q=qvalue' syntax. Higher values are preferred; absent quality values default to 1.0. Only top-level quality values are recognized for ranking.
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
