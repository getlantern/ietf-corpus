document: rfc-7775
kind: protocol-element
summary: L2->L2 inter-area routes for IPv6 (TLVs 236/237) have up/down=1 (ignored, treated as 0) and external bit=1; these are learned from another IS-IS instance in another area, with R-Flag=0. This corrects the RFC 5308 specification.
section: "3.2"
