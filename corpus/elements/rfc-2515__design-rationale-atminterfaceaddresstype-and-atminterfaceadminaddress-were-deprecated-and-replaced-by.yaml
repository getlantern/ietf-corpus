document: rfc-2515
kind: design-rationale
summary: atmInterfaceAddressType and atmInterfaceAdminAddress were deprecated and replaced by atmInterfaceSubscrAddress. The new object captures the service-provider-assigned subscriber address on the network side of a public UNI, which is distinct from ifPhysAddress (the host-side address).
