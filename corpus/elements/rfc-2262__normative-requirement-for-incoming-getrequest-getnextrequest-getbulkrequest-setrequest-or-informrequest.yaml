document: rfc-2262
kind: normative-requirement
summary: For incoming GetRequest, GetNextRequest, GetBulkRequest, SetRequest, or InformRequest PDUs, if the value of securityEngineID is not equal to the local snmpEngineID, the message MUST be discarded without further processing and a FAILURE result returned.
section: "7.2"
rfc2119_level: MUST
topics:
    - snmp
    - security
