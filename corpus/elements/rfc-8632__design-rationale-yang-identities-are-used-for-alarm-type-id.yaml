document: rfc-8632
kind: design-rationale
summary: YANG identities are used for alarm-type-id because they are hierarchical and distributed, enabling vendors and SDOs to define their own alarm type hierarchies without a central registry. A string qualifier is added for alarm types not fully known at design time (e.g., user-configurable digital inputs).
section: "3.2"
topics:
