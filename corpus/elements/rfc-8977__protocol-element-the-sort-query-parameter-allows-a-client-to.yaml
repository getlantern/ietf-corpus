document: rfc-8977
kind: protocol-element
summary: 'The ''sort'' query parameter allows a client to specify one or more properties and sort directions for the result set. ABNF: sort = "sort=" sortItem *( "," sortItem ); sortItem = property-ref [":" ( "a" / "d" )]. ''a'' indicates ascending, ''d'' descending.'
section: "2.3"
topics:
    - json
