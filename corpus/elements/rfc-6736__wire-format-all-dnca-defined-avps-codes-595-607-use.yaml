document: rfc-6736
kind: wire-format
summary: All DNCA-defined AVPs (Codes 595–607) use standard Diameter AVP encoding with the 'M' (mandatory) and optionally 'P' (protected) flags set, but MUST NOT have the 'V' (vendor-specific) flag set. Max-NAT-Bindings (601) is Unsigned32; NC-Request-Type (595), NAT-External-Port-Style (604), and NAT-Control-Binding-Status (606) are Enumerated; NAT-Control-Binding-Template (602) is OctetString; Duplicate-Session-Id (603) is UTF8String; remaining new AVPs are Grouped.
section: "8.7"
topics:
    - nat
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
