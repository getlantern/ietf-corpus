document: rfc-4467
kind: normative-requirement
summary: The URLFETCH command MUST return an untagged URLFETCH response and a tagged OK response to any syntactically valid URLFETCH command; a NO response indicates a server internal failure. The server MUST return NIL for URLs referring to an entire server, mailbox list, entire mailbox, or search results.
section: BASE.6.3.URLFETCH
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
