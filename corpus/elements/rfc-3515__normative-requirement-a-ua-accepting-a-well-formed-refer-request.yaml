document: rfc-3515
kind: normative-requirement
summary: A UA accepting a well-formed REFER request SHOULD request approval from the user to proceed. If approval is granted, the UA MUST contact the resource identified by the URI in the Refer-To header field value.
section: 2.4.2
rfc2119_level: SHOULD
topics:
