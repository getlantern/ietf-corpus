document: rfc-5465
kind: normative-requirement
summary: If a client requests events for an unsupported type, the server MUST refuse with a tagged NO response (not BAD). The response SHOULD contain the BADEVENT response code listing all events supported by the server.
section: "3.1"
rfc2119_level: MUST
topics:
