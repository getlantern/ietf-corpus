document: rfc-2371
kind: protocol-element
summary: The PREPARE command (valid only in Enlisted state) requests the secondary to prepare the transaction for commitment (phase one of two-phase commit). Responses are PREPARED (enters Prepared state), ABORTED (subordinate vetoes; enters Idle), or READONLY (subordinate no longer cares; enters Idle).
section: "13"
