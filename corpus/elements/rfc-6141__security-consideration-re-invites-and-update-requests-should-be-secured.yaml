document: rfc-6141
kind: security-consideration
summary: re-INVITEs and UPDATE requests SHOULD be secured using a mechanism equivalent to or stronger than the initial INVITE that created the session. If the initial INVITE was end-to-end integrity protected or encrypted, subsequent re-INVITEs and UPDATE requests should be as well to avoid downgrading session security.
section: "6"
rfc2119_level: SHOULD
topics:
    - sip
    - security
    - realtime
