document: rfc-6849
kind: normative-requirement
summary: Direction mode attributes 'recvonly' and 'sendonly' are incompatible with the loopback mechanism and MUST NOT be indicated when generating an SDP offer or answer. If received, the agent SHOULD treat it as a protocol failure and terminate or reject the session.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
