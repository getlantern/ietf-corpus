document: rfc-4055
kind: design-rationale
summary: 'PKCS #1 Version 1.5 signatures are included for compatibility with existing applications. Although no attacks are known against PKCS #1 v1.5, RSASSA-PSS is preferred for new applications because it has provable security properties, and a gradual migration is encouraged.'
