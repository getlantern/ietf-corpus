document: rfc-3550
kind: interoperability-note
summary: All RTP and RTCP integer fields are in network byte order (big-endian). All header fields are aligned to their natural length (16-bit fields on even offsets, 32-bit fields at 4-byte boundaries). Implementations must observe these alignment requirements for correct interoperation across architectures.
section: "4"
topics:
