document: rfc-7529
kind: normative-requirement
summary: When SKIP=BACKWARD is set, a date with an invalid month is changed to the previous valid month, and a date with an invalid day-of-month is changed to the previous valid day-of-month. If changing the month results in an invalid day-of-month, the skip behavior is reapplied.
section: "4.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
