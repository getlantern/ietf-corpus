document: rfc-4871
kind: normative-requirement
summary: When signing a header field that occurs more than once, signers MUST sign the physically last instance. To sign multiple instances, the field name MUST appear multiple times in h= and MUST be signed from the bottom of the header block to the top.
section: "5.4"
rfc2119_level: MUST
topics:
    - email
