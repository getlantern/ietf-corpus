document: rfc-4771
kind: protocol-element
summary: The rate parameter R governs how frequently the ROC is included in SRTP packets (every Rth packet). R MUST be a non-zero unsigned integer; if not negotiated, the default value of 1 is used, meaning the ROC is included in every packet.
