document: rfc-7180
kind: normative-requirement
summary: For TRILL Switches with ports conforming to IEEE 802.1Q-2011, the DEI bit in the Inner.VLAN MUST be set to the DEI value provided by the EISS interface on ingressing a native frame, and MUST be provided to the EISS when transiting or egressing a TRILL Data frame. The DEI bit for a transit frame MUST be taken from the Inner.VLAN.
section: "7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
