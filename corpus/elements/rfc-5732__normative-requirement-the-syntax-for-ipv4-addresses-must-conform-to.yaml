document: rfc-5732
kind: normative-requirement
summary: The syntax for IPv4 addresses MUST conform to RFC 0791 and IPv6 addresses MUST conform to RFC 4291. When provisioned as a DNS name server, IP addresses SHOULD be required only as needed to generate DNS glue records.
section: "2.5"
rfc2119_level: MUST
topics:
    - dns
    - ip
