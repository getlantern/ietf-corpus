document: rfc-7159
kind: security-consideration
summary: Using a language's `eval()` function to parse JSON texts constitutes an unacceptable security risk, since JSON text could contain executable code along with data declarations. This applies to JavaScript and any other language whose syntax is a superset of JSON.
section: "12"
topics:
    - json
    - security
