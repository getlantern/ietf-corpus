document: rfc-7591
kind: normative-requirement
summary: The authorization server MUST return all registered metadata about a client in the registration response, including any fields provisioned by the authorization server itself. The response MUST use HTTP 201 Created with content type 'application/json'.
section: 3.2.1
rfc2119_level: MUST
topics:
    - oauth
    - http
