document: rfc-7532
kind: interoperability-note
summary: After fileset migration, administrators SHOULD keep redirecting junctions on the source fileserver in place for at least the value of FsnTTL seconds because referring fileservers may have cached stale FSL data during that window. File-access protocols that do not communicate cache expiry make the required duration indeterminate.
section: 2.8.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
