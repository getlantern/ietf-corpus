document: rfc-7615
kind: security-consideration
summary: Adding information to HTTP responses sent over an unencrypted channel can affect security and privacy. The presence of Authentication-Info or Proxy-Authentication-Info alone reveals that HTTP authentication is in use, and scheme-specific parameters may expose additional sensitive information.
section: "5"
topics:
    - http
    - security
    - privacy
