document: rfc-4363
kind: design-rationale
summary: Three new textual conventions (VlanIdOrAny, VlanIdOrNone, VlanIdOrAnyOrNone) were defined in Q-BRIDGE-MIB to address a proliferation of incompatible VLAN-ID representations appearing across standards-track MIB documents (e.g., RFC 2613, RFC 3318, RFC 4323, RFC 4149), reducing confusion and unnecessary complexity.
