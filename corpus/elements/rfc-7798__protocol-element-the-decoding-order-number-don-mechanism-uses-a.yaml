document: rfc-7798
kind: protocol-element
summary: The Decoding Order Number (DON) mechanism uses a 16-bit DONL field in the first packet of an interleaved sequence and an 8-bit DOND difference field in subsequent AP units to allow receivers to reconstruct NAL unit decoding order when it differs from transmission order (interleaved mode). This is activated by the SDP parameter sprop-max-don-diff.
section: "4.6"
topics:
