document: rfc-9929
kind: normative-requirement
summary: An ABR or ASBR MUST withdraw a previously advertised UPA when the reason for which the UPA was generated ceases (e.g., prefix reachability is restored or its metric falls below the configured threshold).
section: "2"
rfc2119_level: MUST
