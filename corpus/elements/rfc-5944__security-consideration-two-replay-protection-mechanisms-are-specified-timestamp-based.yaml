document: rfc-5944
kind: security-consideration
summary: 'Two replay protection mechanisms are specified: timestamp-based (mobile node and home agent clocks synchronized within a window; the Identification field encodes a timestamp) and nonce-based (home agent sends a nonce in the Reply; mobile node uses it in the next Request). The Mobility Security Association between each pair of nodes defines which style is in use.'
section: "5.7"
topics:
    - mobility
    - security
