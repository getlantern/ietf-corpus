document: rfc-9911
kind: protocol-element
summary: The domain-name type (string, 1..253 characters) models DNS domain names with a pattern permitting current practices. The host-name type, new in RFC 9911, is a stricter subtype (2..max, letters/digits/hyphens/dots only) for fully qualified host names per RFC 952 and RFC 1123. The host union was updated to use host-name instead of domain-name.
section: "4"
