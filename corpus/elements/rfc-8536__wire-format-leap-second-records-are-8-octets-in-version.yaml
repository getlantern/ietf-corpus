document: rfc-8536
kind: wire-format
summary: Leap-second records are 8 octets in version 1 (4-octet occur + 4-octet corr) and 12 octets in version 2+ (8-octet occur + 4-octet corr). The occur field is a UNIX leap time value; corr is the cumulative LEAPCORR value on or after the occurrence.
section: "3.2"
