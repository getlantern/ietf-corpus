document: rfc-8624
kind: normative-requirement
summary: ECDSAP256SHA256 (algorithm 13) MUST be supported for both DNSSEC signing and validation. It is widely deployed and provides more cryptographic strength with shorter signatures than RSA-based algorithms.
section: "3.1"
rfc2119_level: MUST
topics:
