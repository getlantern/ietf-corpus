document: rfc-9633
kind: normative-requirement
summary: When aggregating DetNet flows, if bandwidth reservation is used the reservation should represent the total aggregate bandwidth; if maximum delay bounds are used, the system should ensure the total DetNet flow delay does not exceed the maximum delay bound of any individual flow.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
