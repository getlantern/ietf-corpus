document: rfc-3402
kind: security-consideration
summary: The DDDS algorithm itself does not introduce specific security issues; security considerations arise when the algorithm is coupled with a specific Database and Application. Dynamic delegation points are identified as a general point of attack, but specific threats depend on the Application and Database chosen.
