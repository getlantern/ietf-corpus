document: rfc-8440
kind: interoperability-note
summary: 'If the server is unable to look up the set of rights for a given mailbox, it does not send the MYRIGHTS reply for that mailbox. The "bar" mailbox example illustrates this: a non-existent mailbox receives a LIST response but no MYRIGHTS reply.'
