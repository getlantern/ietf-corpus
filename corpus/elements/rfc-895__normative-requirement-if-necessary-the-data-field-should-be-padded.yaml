document: rfc-895
kind: normative-requirement
summary: If necessary, the data field should be padded to meet the Experimental Ethernet minimum frame size. This padding is not part of the IP packet and is not included in the total length field of the IP header.
section: Frame Format
rfc2119_level: SHOULD
topics:
    - ip
