summary: 'Three EKU OIDs are defined for CMP delegation: id-kp-cmcCA (pkix.kp.27) for CA role, id-kp-cmcRA (pkix.kp.28) for RA role, and id-kp-cmKGA (pkix.kp.32) for Key Generation Authority. These reuse CMC OIDs for CA/RA as protocol-agnostic roles.'
