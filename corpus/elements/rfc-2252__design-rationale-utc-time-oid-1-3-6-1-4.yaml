document: rfc-2252
kind: design-rationale
summary: UTC Time (OID 1.3.6.1.4.1.1466.115.121.1.53) is described as historical; new attribute definitions SHOULD use GeneralizedTime instead, implicitly because UTCTime uses a two-digit year and does not unambiguously represent dates beyond 1999.
