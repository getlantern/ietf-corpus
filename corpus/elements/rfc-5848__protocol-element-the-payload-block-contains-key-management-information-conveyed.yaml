document: rfc-5848
kind: protocol-element
summary: The Payload Block contains key management information conveyed via Certificate Block fragments. It consists of a full local timestamp, a one-octet Key Blob Type ('C'=PKIX cert, 'P'=OpenPGP cert, 'K'=raw public key, 'N'=pre-distributed, 'U'=installation-specific), and the base64-encoded key blob. There is exactly one Payload Block per reboot session.
section: "5.2"
topics:
