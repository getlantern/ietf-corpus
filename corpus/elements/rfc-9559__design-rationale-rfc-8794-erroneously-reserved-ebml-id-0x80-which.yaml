document: rfc-9559
kind: design-rationale
summary: RFC 8794 erroneously reserved EBML ID 0x80, which was already in use by deployed Matroska implementations. RFC 9559 updates RFC 8794 to un-reserve 0x80, expanding valid one-octet EBML Element IDs from 0x81–0xFE to 0x80–0xFE (127 values instead of 126).
section: "4.2"
topics:
    - registry
