document: rfc-2326
kind: design-rationale
summary: Including all transport initialization in SETUP (rather than deriving it from DESCRIBE) spares firewalls and intermediate devices the complex task of parsing DESCRIBE responses. This design makes RTSP 'firewall friendly' by concentrating transport parameters in a single method.
section: "10.4"
topics:
    - realtime
    - security
