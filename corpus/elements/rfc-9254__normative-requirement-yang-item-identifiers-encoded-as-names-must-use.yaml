document: rfc-9254
kind: normative-requirement
summary: YANG item identifiers encoded as names MUST use the namespace-qualified form (module:identifier) for all members of a top-level CBOR map and whenever the namespace of a representation node differs from its parent. In all other cases, the simple form MUST be used.
section: "3.3"
rfc2119_level: MUST
topics:
    - yang
    - cbor
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
