document: rfc-4862
kind: wire-format
summary: 'A global address is formed as: (128−N) bits of link prefix followed by N bits of interface identifier, for a total of exactly 128 bits. The prefix comes from the Prefix Information option in a Router Advertisement; if prefix length + IID length ≠ 128, the option MUST be ignored.'
section: 5.5.3
topics:
    - ip
    - v6ops
