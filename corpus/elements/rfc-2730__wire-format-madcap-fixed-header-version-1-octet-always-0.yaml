document: rfc-2730
kind: wire-format
summary: 'MADCAP fixed header: version (1 octet, always 0), msgtype (1 octet), addrfamily (2 octets, IANA address family number), xid (4 octets, transaction ID). Options field follows as variable-length TLV list. All multi-octet quantities are in network byte order. Messages shorter than 12 bytes MUST be ignored.'
