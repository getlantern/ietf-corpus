document: rfc-7623
kind: design-rationale
summary: Using BGP-based Inclusive Multicast Ethernet Tag routes for per-I-SID multicast pruning is advantageous over IEEE MMRP because it scales to a large number of PEs and works with any LSP type, whereas MMRP operates only over P2P pseudowires.
