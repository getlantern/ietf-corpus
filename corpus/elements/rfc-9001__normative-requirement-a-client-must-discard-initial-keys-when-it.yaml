document: rfc-9001
kind: normative-requirement
summary: A client MUST discard Initial keys when it first sends a Handshake packet; a server MUST discard Initial keys when it first successfully processes a Handshake packet. Endpoints MUST NOT send Initial packets after this point.
section: 4.9.1
rfc2119_level: MUST
