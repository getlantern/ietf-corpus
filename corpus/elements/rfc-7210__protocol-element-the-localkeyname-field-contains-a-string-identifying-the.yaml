document: rfc-7210
kind: protocol-element
summary: The LocalKeyName field contains a string identifying the key that can be used to retrieve it in the local database when received in a message. Many routing protocols restrict this to integers representable in 16 or 32 bits. Key names requiring internationalization must address canonicalization and normalization for binary comparison.
