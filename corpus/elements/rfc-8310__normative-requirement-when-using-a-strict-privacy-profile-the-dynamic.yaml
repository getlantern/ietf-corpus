document: rfc-8310
kind: normative-requirement
summary: When using a Strict Privacy profile, the dynamic discovery technique used as a source of authentication domain names MUST be considered secure and trustworthy; this requirement does not apply when using an Opportunistic Privacy profile.
section: "7.3"
rfc2119_level: MUST
