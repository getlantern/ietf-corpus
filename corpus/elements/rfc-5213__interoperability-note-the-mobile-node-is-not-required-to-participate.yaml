document: rfc-5213
kind: interoperability-note
summary: The mobile node is not required to participate in any IP mobility-related signaling within a PMIPv6 domain. The network tracks the mobile node's movements and initiates all mobility signaling on its behalf, making the mobile node's IPv6 stack mobility-agnostic.
section: "3"
topics:
    - mobility
