document: rfc-8556
kind: protocol-element
summary: At a BFER acting as a P-tunnel segmentation boundary, the upstream-assigned MPLS label (which the BFIR assigns distinctly per C-flow per Section 2.1 constraints) is used to select the correct next P-tunnel segment for the packet, enabling label-based switching at segmentation points without per-flow multicast state.
section: 4.2.2
topics:
    - multicast
    - mpls
    - routing
