document: rfc-9835
kind: design-rationale
summary: Unlike the AC service model (RFC 9834), where an AC is scoped to a network, 'ietf-ac-ntw' identifies an AC uniquely within the scope of a node. This reflects that the network model operates at PE-node granularity, directly anchoring ACs to physical or logical network elements.
section: "5.1"
topics:
    - yang
    - netconf
