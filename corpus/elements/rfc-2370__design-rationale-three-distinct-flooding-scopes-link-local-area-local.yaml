document: rfc-2370
kind: design-rationale
summary: Three distinct flooding scopes (link-local, area-local, AS-wide) were defined to provide a generalized extensibility mechanism for OSPF. Applications can distribute information at the appropriate topological granularity without requiring new flooding procedures.
