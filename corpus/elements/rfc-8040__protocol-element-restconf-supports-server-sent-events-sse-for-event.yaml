document: rfc-8040
kind: protocol-element
summary: RESTCONF supports Server-Sent Events (SSE) for event stream resources. Clients subscribe to notifications by issuing a GET on the event stream URI. Event streams function according to NETCONF Event Notifications (RFC 5277). Available streams are discovered from the '{+restconf}/data/ietf-restconf-monitoring:restconf-state/streams' list.
section: "6"
topics:
