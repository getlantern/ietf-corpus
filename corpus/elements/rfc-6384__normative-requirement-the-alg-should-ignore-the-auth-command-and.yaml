document: rfc-6384
kind: normative-requirement
summary: The ALG SHOULD ignore the AUTH command and not go into transparent mode if the server response is in the 4xx or 5xx ranges. In transparent mode, the ALG MUST continue to adjust sequence numbers if it was doing so before entering transparent mode.
section: "5"
rfc2119_level: SHOULD
topics:
    - nat
    - v6ops
