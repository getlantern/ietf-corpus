document: rfc-8305
kind: protocol-element
summary: 'The Happy Eyeballs Connection Setup has four distinct phases: (1) initiation of asynchronous DNS queries, (2) sorting of resolved destination addresses, (3) initiation of asynchronous connection attempts, and (4) establishment of one connection that cancels all other attempts. The algorithm assumes IPv6 is preferred over IPv4.'
section: "2"
topics:
