document: rfc-2125
kind: protocol-element
summary: The Call-Status BAP option (type 0x06, Length=4) contains a 1-octet Status field (0=success; non-zero failure, using Q.931 cause codes where applicable; 255=non-specific failure) and a 1-octet Action field (0=no retry, 1=retry). MUST be included in Call-Status-Indication packets.
section: "6.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
