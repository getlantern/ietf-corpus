document: rfc-8940
kind: protocol-element
summary: 'EAP-AKA Session-Id for fast reconnect is derived as the concatenation of the EAP Type Code (0x17) with the NONCE_S field from AT_NONCE_S, followed by the MAC field from AT_MAC from EAP-Request/AKA-Reauthentication: Session-Id = 0x17 || NONCE_S || MAC.'
