document: rfc-7916
kind: interoperability-note
summary: When parallel links between two nodes are configured as a Layer 3 bundle (so that failure of any member link requires rerouting out of the entire bundle), LFA behavior SHOULD be adapted so that the alternate covers the whole bundle rather than just using the surviving member link as the next hop.
section: 6.2.6
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
