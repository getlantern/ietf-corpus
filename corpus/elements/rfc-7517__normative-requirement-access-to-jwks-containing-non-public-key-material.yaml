document: rfc-7517
kind: normative-requirement
summary: Access to JWKs containing non-public key material by parties without legitimate access MUST be prevented. Encrypting the JWK as a JWE is recommended; a "cty" header value of "jwk+json" MUST be used to signal that JWE content is a JWK.
section: "7"
rfc2119_level: MUST
topics:
    - jose
    - security
    - crypto
