document: rfc-1548
kind: protocol-element
summary: 'The Protocol field uses value ranges to distinguish packet categories: 0x0000–0x3fff for network-layer protocols, 0x8000–0xbfff for associated NCPs, 0x4000–0x7fff for low-volume protocols without NCP, and 0xc000–0xffff for link-layer Control Protocols such as LCP (0xc021).'
