document: rfc-8359
kind: protocol-element
summary: The Unassigned Upstream Label is defined as the special label value '0xFFFFFFFF' (all-ones pattern) for a 4-octet label, with similar all-ones patterns expected for labels of other sizes. Its presence in the UPSTREAM_LABEL object of a Path message indicates the upstream node has not assigned an upstream label and requests the downstream node to provide a symmetric label.
section: "3"
topics:
    - mpls
    - routing
