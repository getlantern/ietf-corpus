document: rfc-8864
kind: normative-requirement
summary: When a subprotocol is defined for use over data channels with the SDP offer/answer mechanism, any SDP attributes that may be negotiated using 'a=dcsa:' MUST be added to the IANA attribute-name registry with a new Usage Level of the form 'dcsa (foo)'.
section: "9.3"
rfc2119_level: MUST
topics:
    - webrtc
    - registry
