document: rfc-8580
kind: normative-requirement
summary: Implementations MUST NOT allow use of the FCC extension with the reject and ereject actions (RFC 5429). Doing so would violate the SMTP principle that a message is either delivered or bounced back to the sender, as the saved copy would contain the original message.
section: "7"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
