document: rfc-9048
kind: normative-requirement
summary: The AT_KDF_INPUT attribute value sent by the server MUST be non-empty (Actual Network Name Length > 0). If the attribute is empty, the peer MUST treat it as if AUTN were incorrect and fail the authentication.
section: "3.1"
rfc2119_level: MUST
topics:
