document: rfc-7578
kind: protocol-element
summary: 'For parts representing file content, a ''filename'' parameter SHOULD be supplied in the Content-Disposition header field. Receivers must not use the filename blindly: check it against local file system conventions and discard any directory path information present.'
section: "4.2"
topics:
    - http
    - security
