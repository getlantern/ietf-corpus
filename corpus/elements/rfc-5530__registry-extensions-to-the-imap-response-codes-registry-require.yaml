document: rfc-5530
kind: registry
summary: Extensions to the IMAP Response Codes registry require a registration request to IANA forwarded to a Designated Expert. After 30 days of community review on the IMAP Extensions mailing list or a successful IETF Last Call, the expert approves or denies the request. Registrations may not be deleted; obsolete codes are marked 'obsolete' in the registry.
