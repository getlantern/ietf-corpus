document: rfc-5658
kind: design-rationale
summary: Record-Route rewriting in responses is not recommended because the callee cannot sign the rewritten route set, breaking end-to-end protection. This violates the Internet's principles of openness and end-to-end connectivity because the route set seen by the caller differs from the one seen by the callee.
section: "4"
topics:
    - sip
    - security
    - realtime
