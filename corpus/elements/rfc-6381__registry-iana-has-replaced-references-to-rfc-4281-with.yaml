document: rfc-6381
kind: registry
summary: 'IANA has replaced references to RFC 4281 with references to RFC 6381 in the ''MIME Media Types'' registry, indicating that the ''codecs'' and/or ''profiles'' parameters are optional for: audio/3gpp, video/3gpp (RFC 3839); audio/3gpp2, video/3gpp2 (RFC 4393); audio/mp4, video/mp4, application/mp4 (RFC 4337); video/quicktime; application/mp21.'
