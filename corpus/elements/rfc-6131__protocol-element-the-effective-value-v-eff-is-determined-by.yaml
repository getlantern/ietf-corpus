document: rfc-6131
kind: protocol-element
summary: 'The effective value v(eff) is determined by clamping the specified value v(spec) to the site-defined range [v(min), v(max)]: values below v(min) are raised to v(min), values above v(max) are lowered to v(max), and values within range are used as-is.'
