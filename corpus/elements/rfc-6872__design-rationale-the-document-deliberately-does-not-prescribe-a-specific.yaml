document: rfc-6872
kind: design-rationale
summary: The document deliberately does not prescribe a specific representation format for SIP CLF records; it defines only an information model so that other documents (e.g., RFC 6873 for UTF-8 encoding) can define concrete formats, allowing multiple representations to coexist.
