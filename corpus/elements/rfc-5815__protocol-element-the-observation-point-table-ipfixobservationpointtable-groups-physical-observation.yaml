document: rfc-5815
kind: protocol-element
summary: 'The Observation Point Table (ipfixObservationPointTable) groups physical Observation Points under an Observation Point Group Id. Each entry references the physical entity via the ENTITY MIB (PhysicalIndexOrZero) or the interface via the IF MIB (InterfaceIndexOrZero) and specifies monitoring direction: unknown(0), ingress(1), egress(2), or both(3).'
section: "5.6"
