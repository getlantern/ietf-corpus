document: rfc-7989
kind: normative-requirement
summary: Devices storing a session identifier in a log file SHOULD follow the security considerations outlined in RFC 6872. The primary intent of a session identifier is for troubleshooting, so it should be included in logs used for troubleshooting purposes.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
