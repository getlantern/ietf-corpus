document: rfc-2205
kind: normative-requirement
summary: 'The high-order two bits of the Class-Num field determine what action a node takes when it does not recognize an object class: depending on the bit pattern, a node must ignore the object and continue processing, ignore the entire message, or return an error. This enables forward compatibility with future object definitions.'
section: 3.1.2
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
