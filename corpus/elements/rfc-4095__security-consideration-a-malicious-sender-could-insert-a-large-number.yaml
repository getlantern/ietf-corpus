document: rfc-4095
kind: security-consideration
summary: A malicious sender could insert a large number of solicitation class keywords or improperly formatted keywords, causing a Denial of Service attack via excessive DNS lookups on recipients or overloading a provider at a particular URI. Improperly formatted keywords with non-existent TLDs could attack DNS registry providers or root servers.
section: "6"
topics:
    - security
    - dns
    - email
