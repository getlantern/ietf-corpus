document: rfc-2460
kind: state-machine
summary: 'Type 0 Routing header processing: if Segments Left=0, proceed to next header; if Hdr Ext Len is odd, send ICMP Problem and discard; else swap Destination Address with Address[n - SegmentsLeft], decrement Segments Left and Hop Limit, and resubmit for forwarding. Discard if any address is multicast.'
