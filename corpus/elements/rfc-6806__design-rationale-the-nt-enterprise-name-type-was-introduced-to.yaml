document: rfc-6806
kind: design-rationale
summary: The NT-ENTERPRISE name type was introduced to unify email and Kerberos principal names, allowing users to log on with a familiar alias (e.g., 'alice@EXAMPLE.COM') without knowing the actual realm of their Kerberos principal. This lets administrators move principals across realms transparently.
section: "5"
topics:
