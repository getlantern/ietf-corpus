document: rfc-9533
kind: normative-requirement
summary: The micro OWAMP Session-Sender MUST send micro OWAMP-Test packets over the member link with which the session is associated. When the micro OWAMP Session-Receiver receives a test packet, it MUST use the receiving member link to correlate the micro OWAMP session; if no session matches, the packet MUST be discarded.
section: "3.2"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
