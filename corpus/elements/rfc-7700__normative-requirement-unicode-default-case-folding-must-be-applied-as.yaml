document: rfc-7700
kind: normative-requirement
summary: Unicode Default Case Folding MUST be applied as defined in the Unicode Standard. This ensures nicknames differing only by case (e.g., 'stpeter' vs. 'StPeter') are treated as equivalent during comparison.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
