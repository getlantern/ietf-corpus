document: rfc-4238
kind: protocol-element
summary: VPIM directory discovery uses the ENUM protocol by querying for the VPIMDIR service associated with the recipient's telephone number. The DNS query name is constructed per RFC 3761, and the telephone number MAY contain additional sub-address digits.
