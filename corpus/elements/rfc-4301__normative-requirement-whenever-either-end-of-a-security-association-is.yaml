document: rfc-4301
kind: normative-requirement
summary: 'Whenever either end of a security association is a security gateway, the SA MUST be tunnel mode, with two exceptions: when the security gateway is acting as a host (e.g., for SNMP) and when providing security between two intermediate systems along a path.'
section: "4.1"
rfc2119_level: MUST
topics:
