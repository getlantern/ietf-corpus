document: rfc-8402
kind: protocol-element
summary: An IGP-Prefix Segment (Prefix-SID) is an IGP segment attached to an IGP prefix, global by default within the SR domain. Its context is the tuple <prefix, topology, algorithm>; multiple SIDs MAY be allocated to the same prefix so long as this tuple is unique.
section: "3.1"
topics:
    - routing
