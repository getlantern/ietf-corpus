document: rfc-5627
kind: normative-requirement
summary: An originating authoritative proxy MUST record-route when it receives a dialog-forming request where the Contact contains a valid GRUU in the proxy's domain associated with the authenticated requestor's AOR, and the request contains Record-Route headers. Forwarding services SHOULD NOT be applied to requests sent to a GRUU.
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
