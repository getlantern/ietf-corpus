document: rfc-2192
kind: normative-requirement
summary: For mailbox list URLs, the field `;TYPE=<list_type>` MUST be included. The list type may be either 'LIST' or 'LSUB' and is case-insensitive. The program SHOULD use '%' as the list_mailbox wildcard if it supports a hierarchical view, otherwise SHOULD use '*'.
section: "5"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
