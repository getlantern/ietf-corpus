document: rfc-6850
kind: normative-requirement
summary: The value of all configurable MIB objects (read-write and read-create) MUST be retained across re-initializations of the management system. This applies to ForwardDelay, multipath enables, port flags, nickname configuration, ESADI parameters, and MTU settings.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
