document: rfc-9068
kind: normative-requirement
summary: For access tokens from grants involving a resource owner (e.g., authorization code grant), 'sub' SHOULD correspond to the resource owner's subject identifier. For grants without a resource owner (e.g., client credentials), 'sub' SHOULD correspond to a client application identifier.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - oauth
    - jose
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
