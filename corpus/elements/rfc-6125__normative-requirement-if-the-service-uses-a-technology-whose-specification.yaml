document: rfc-6125
kind: normative-requirement
summary: If the service uses a technology whose specification stipulates SRV-ID usage, the certificate SHOULD include an SRV-ID. If the specification stipulates URI-ID usage, the certificate SHOULD include a URI-ID where the scheme SHALL be the protocol's scheme and the host SHALL be the fully qualified DNS domain name.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - tls
    - pkix
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
