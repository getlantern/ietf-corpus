document: rfc-7274
kind: state-machine
summary: 'The special-purpose label retirement lifecycle has three states: Active → Deprecated (via IETF consensus + Informational RFC, IANA marks ''deprecated'') → Surveyed (12-month survey; repeat after 6 more months if still in use) → Retired (Standards Track RFC releases value ≥24 months after deprecation RFC, only if survey shows no remaining use).'
