document: rfc-6062
kind: normative-requirement
summary: The server MUST initiate an outgoing TCP connection for a Connect request; the timeout value MUST be at least 30 seconds. If connection fails or times out, the server MUST return 447 (Connection Timeout or Failure).
section: "5.2"
rfc2119_level: MUST
topics:
    - nat
    - tcp
