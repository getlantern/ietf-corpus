document: rfc-7172
kind: normative-requirement
summary: If distribution tree roots are configured, there MUST be at least one tree rooted at a nickname held by an FGL TRILL switch or an FGL link pseudonode. If misconfigured such that no such tree exists, the highest-priority FGL nickname is used to construct an additional tree regardless of configuration.
section: "4.5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
