document: rfc-5360
kind: normative-requirement
summary: MESSAGE requests sent to request permissions MUST include a permission document and SHOULD include a human-readable part in their bodies. The human-readable part contains the same information as the permission document in plain text, enabling legacy UAs to display and act on it.
section: 5.3.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
