document: rfc-6226
kind: normative-requirement
summary: When remaining mappings are from BSR, the RP with the lowest Candidate-RP-Advertisement priority value (indicating highest priority per RFC 5059) is selected; if tied, the BSR hash function from RFC 4601 Section 4.7.2 is applied for PIM-SM groups.
