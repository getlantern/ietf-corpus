kind: interoperability-note
summary: Partial reliability (RFC 3758) and additional PR-SCTP policies (RFC 7496), stream reset (RFC 6525), and message interleaving (RFC 8260) extensions can all be used in combination with DTLS encapsulation without restrictions beyond those stated for the base protocol.
