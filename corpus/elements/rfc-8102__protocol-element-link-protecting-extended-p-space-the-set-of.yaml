document: rfc-8102
kind: protocol-element
summary: 'Link-Protecting Extended P-Space: the set of routers reachable from direct neighbors of S (except primary next-hop E) without traversing the S-E link on any shortest path. Any direct neighbor with at least one ECMP path traversing S-E must be excluded.'
