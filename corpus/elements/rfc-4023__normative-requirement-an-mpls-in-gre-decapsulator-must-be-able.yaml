document: rfc-4023
kind: normative-requirement
summary: An MPLS-in-GRE decapsulator MUST be able to process packets correctly without the optional GRE checksum, key, and sequence number fields. It MAY also process packets with these optional fields.
section: "4"
rfc2119_level: MUST
