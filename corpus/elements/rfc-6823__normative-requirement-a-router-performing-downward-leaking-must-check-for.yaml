document: rfc-6823
kind: normative-requirement
summary: A router performing downward leaking MUST check for duplicate GENINFO TLVs by comparing contents, and the set of LSPs generated by a router for a given level MUST NOT contain two or more copies of the same GENINFO TLV.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
