document: rfc-8229
kind: normative-requirement
summary: Individual packets on a TCP encapsulation connection SHOULD NOT use different QoS/DSCP markings than the rest of the connection, as different priorities may cause packets to be routed differently and introduce unnecessary delays.
section: "12.3"
rfc2119_level: SHOULD NOT
