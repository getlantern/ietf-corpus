document: rfc-4366
kind: normative-requirement
summary: An extension type MUST NOT appear in the extended ServerHello unless the same extension type appeared in the corresponding ClientHello. Clients MUST abort the handshake if they receive an unrequested extension type in the ServerHello.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
