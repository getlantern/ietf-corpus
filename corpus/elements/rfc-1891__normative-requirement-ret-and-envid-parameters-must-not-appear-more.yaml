document: rfc-1891
kind: normative-requirement
summary: RET and ENVID parameters MUST NOT appear more than once each in a single MAIL command. NOTIFY and ORCPT parameters MUST NOT appear more than once in any RCPT command. Servers SHOULD respond with '501 syntax error in parameters or arguments' if duplicates appear.
section: "5.5"
rfc2119_level: MUST NOT
topics:
    - email
