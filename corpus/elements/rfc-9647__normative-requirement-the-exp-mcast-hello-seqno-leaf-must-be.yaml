document: rfc-9647
kind: normative-requirement
summary: The exp-mcast-hello-seqno leaf MUST be NULL if multicast Hello packets are not expected or processing of multicast packets is not enabled. Similarly, exp-ucast-hello-seqno and ucast-hello-seqno MUST be NULL if unicast Hellos are not expected or not being sent.
section: "2.3"
rfc2119_level: MUST
topics:
    - yang
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
