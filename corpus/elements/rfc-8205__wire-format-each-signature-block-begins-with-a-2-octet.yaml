summary: Each Signature_Block begins with a 2-octet length, a 1-octet Algorithm Suite Identifier, and a sequence of Signature Segments. Each Signature Segment contains a fixed 20-octet Subject Key Identifier (SKI), a 2-octet Signature Length, and a variable-length Signature field.
