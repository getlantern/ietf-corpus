document: rfc-5627
kind: normative-requirement
summary: When a temporary GRUU has no more registered contacts bound to it (due to expiration or de-registration of the last contact for the instance ID), the temporary GRUU MUST be invalidated. A public GRUU SHOULD remain valid after contact expiry and return 480 (Temporarily Unavailable) until re-registration.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
