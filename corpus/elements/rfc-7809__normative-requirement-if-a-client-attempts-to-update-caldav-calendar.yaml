document: rfc-7809
kind: normative-requirement
summary: If a client attempts to update CALDAV:calendar-timezone-id with a value not corresponding to a time zone known to the server, the server MUST reject the property update using a CALDAV:valid-timezone pre-condition error.
section: 3.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
