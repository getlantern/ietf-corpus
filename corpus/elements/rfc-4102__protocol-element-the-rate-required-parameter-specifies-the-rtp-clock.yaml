document: rfc-4102
kind: protocol-element
summary: The 'rate' required parameter specifies the RTP clock rate of the payload carried within the RTP packet. Typically 1000, but other rates MAY be specified; it MUST be set equal to the clock rate of the text payload format carried as the primary encoding.
