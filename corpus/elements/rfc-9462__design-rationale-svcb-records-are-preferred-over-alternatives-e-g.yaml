document: rfc-9462
kind: design-rationale
summary: SVCB records are preferred over alternatives (e.g., TXT overloading, application-layer hints) because they are extensible via typed parameter keys, keep DNS client logic self-contained, and are already required for TLS Encrypted ClientHello (ECH) support, maximizing the privacy benefit when paired with encrypted DNS.
