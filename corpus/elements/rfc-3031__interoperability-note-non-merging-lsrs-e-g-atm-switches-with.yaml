document: rfc-3031
kind: interoperability-note
summary: Non-merging LSRs (e.g., ATM switches with SVC/SVP encoding) require multiple downstream labels per FEC — one per upstream source — and must explicitly request additional labels from downstream peers. Without label merging, the number of labels per FEC can grow as large as the total number of upstream nodes forwarding that FEC to a given LSR.
section: 3.26.2
topics:
    - routing
