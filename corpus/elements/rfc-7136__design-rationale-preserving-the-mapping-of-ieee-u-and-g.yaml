document: rfc-7136
kind: design-rationale
summary: 'Preserving the mapping of IEEE ''u'' and ''g'' bits into the IID retains operational usefulness: if an IID is known or suspected to have been created per RFC 4291, it can be reverse-transformed back into a MAC address for fault diagnosis. New methods are free to use these bit positions as additional pseudo-random bits to reduce duplicate IID probability.'
section: "3"
topics:
