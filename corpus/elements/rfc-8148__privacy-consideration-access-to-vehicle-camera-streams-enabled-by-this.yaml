document: rfc-8148
kind: privacy-consideration
summary: Access to vehicle camera streams enabled by this document must be carefully restricted to within the context of an emergency call or to verified emergency services providers (e.g., by verifying that a camera access request is signed by a certificate issued by an emergency services registrar).
