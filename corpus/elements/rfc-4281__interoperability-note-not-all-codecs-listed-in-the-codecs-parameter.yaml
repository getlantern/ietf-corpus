document: rfc-4281
kind: interoperability-note
summary: Not all codecs listed in the Codecs parameter are necessarily required to render the content (e.g., alternative audio tracks, optional timed text). Receivers that lack support for a listed codec MAY need to examine the media elements to determine if the unsupported codec is actually required.
section: "3"
topics:
    - realtime
