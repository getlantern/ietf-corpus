document: rfc-9175
kind: normative-requirement
summary: When an Echo response is sent to mitigate amplification, it MUST be sent as a piggybacked or Non-confirmable response, never as a separate response (which would cause amplification due to retransmission).
section: "2.4"
rfc2119_level: MUST
topics:
    - security
