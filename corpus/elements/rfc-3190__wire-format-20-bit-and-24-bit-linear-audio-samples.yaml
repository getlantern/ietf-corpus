document: rfc-3190
kind: wire-format
summary: 20-bit and 24-bit linear audio samples are represented as signed two's complement values packed contiguously MSB-first into payload octets. For 20-bit encoding, an odd number of samples leaves the four LSBs of the last octet unused.
