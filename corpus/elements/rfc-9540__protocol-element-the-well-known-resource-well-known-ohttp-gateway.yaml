document: rfc-9540
kind: protocol-element
summary: The well-known resource "/.well-known/ohttp-gateway" is defined as the Oblivious Gateway Resource location, accessible on the same host as the Target Resource. Servers may use 3xx redirects to direct clients and relays to the actual gateway location.
