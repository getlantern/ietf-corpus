document: rfc-9664
kind: security-consideration
summary: Servers MUST enforce a minimum lease duration to prevent excessive server load from rapid renewals. A minimum of 30 seconds is RECOMMENDED for both LEASE and KEY-LEASE, though much longer durations (e.g., one hour) SHOULD be used in most cases.
section: "8"
topics:
