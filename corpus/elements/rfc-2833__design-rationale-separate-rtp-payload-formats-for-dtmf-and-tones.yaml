document: rfc-2833
kind: design-rationale
summary: Separate RTP payload formats for DTMF and tones are necessary because low-rate voice codecs (e.g., G.723.1) cannot reliably reproduce tone signals accurately enough for automatic recognition; out-of-band event encoding also permits higher redundancy at lower bit rates.
