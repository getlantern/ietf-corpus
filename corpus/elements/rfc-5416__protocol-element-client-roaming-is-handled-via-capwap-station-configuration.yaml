document: rfc-5416
kind: protocol-element
summary: 'Client roaming is handled via CAPWAP Station Configuration Request messages: after a station re-associates with a New WTP, the AC sends a Delete Station to the Old WTP and an Add Station with updated session keys to the New WTP. The 802.1X re-authentication step is skipped if key caching was employed.'
section: "2.3"
topics:
    - security
    - mobility
