document: rfc-9690
kind: protocol-element
summary: 'GenericHybridParameters is an ASN.1 SEQUENCE with two fields: kem (a KeyEncapsulationMechanism AlgorithmIdentifier with algorithm id-kem-rsa and RsaKemParameters) and dem (a DataEncapsulationMechanism AlgorithmIdentifier identifying the key-encryption algorithm). When present, these constrain the kdf, kekLength, and wrap fields of KEMRecipientInfo.'
