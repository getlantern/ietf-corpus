document: rfc-8147
kind: security-consideration
summary: Control information (PSAP requests to the vehicle) must originate only from a PSAP or authorized emergency services provider and must not be modified in transit. PSAP callback calls present additional verification challenges since current mechanisms are not ideal for confirming a callback is genuinely from the responding PSAP.
section: "14.4"
topics:
    - security
    - sip
