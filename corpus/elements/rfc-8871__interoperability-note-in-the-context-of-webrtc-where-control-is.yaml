document: rfc-8871
kind: interoperability-note
summary: In the context of WebRTC, where control is split between a JavaScript application and a browser, the browser acts as the Trusted Endpoint for PERC purposes, just as it acts as the endpoint for DTLS-SRTP in one-to-one calls. This maps PERC's trust model onto the existing WebRTC security architecture.
section: 3.2.1
topics:
    - webrtc
    - realtime
    - rtp
    - security
