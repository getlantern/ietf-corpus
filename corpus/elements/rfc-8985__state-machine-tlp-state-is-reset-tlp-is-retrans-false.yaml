document: rfc-8985
kind: state-machine
summary: TLP state is reset (TLP.is_retrans = false, TLP.end_seq = None) when initiating a connection, fast recovery, or RTO recovery. TLP.end_seq is set to SND.NXT when a probe is sent and cleared to None when the probe is confirmed delivered, deemed lost, or superseded.
