document: rfc-9052
kind: protocol-element
summary: COSE_Sign1 is a four-element CBOR array [protected, unprotected, payload (bstr/nil), signature (bstr)] used when only one signature is applied. Header parameters for both content and signature share a single pair of buckets, unlike COSE_Sign. CBOR tag 18 identifies a tagged COSE_Sign1 structure.
section: "4.2"
topics:
    - cbor
    - crypto
