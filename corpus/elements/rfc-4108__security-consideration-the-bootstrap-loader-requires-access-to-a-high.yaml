document: rfc-4108
kind: security-consideration
summary: The bootstrap loader requires access to a high-quality random number generator for signature key operations. Weak or predictable random number generation undermines the security of all cryptographic operations in the firmware loading process.
section: "6.2"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
