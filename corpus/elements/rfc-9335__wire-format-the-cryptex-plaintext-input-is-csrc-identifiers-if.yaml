document: rfc-9335
kind: wire-format
summary: 'The Cryptex plaintext input is: CSRC identifiers (if used) || header extension data (excluding first 4 bytes) || RTP payload || RTP padding || RTP pad count. The first 4*CC bytes of ciphertext replace the CSRC fields; the remainder becomes the RTP payload.'
