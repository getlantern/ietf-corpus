document: rfc-3585
kind: protocol-element
summary: The IPsec Policy Model class hierarchy derives from PCIM/PCIMe and DMTF CIM. The top-level policy classes are SARule (base), IKERule, and IPsecRule. Action classes span SAStaticAction (IKERejectAction, IPsecBypassAction, IPsecDiscardAction, PreconfiguredSAAction) and SANegotiationAction (IKENegotiationAction → IKEAction, IPsecAction → IPsecTransportAction, IPsecTunnelAction). Transform classes are AHTransform, ESPTransform, and IPCOMPTransform.
section: "3"
topics:
