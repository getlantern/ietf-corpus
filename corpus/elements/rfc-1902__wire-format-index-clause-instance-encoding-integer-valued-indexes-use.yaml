document: rfc-1902
kind: wire-format
summary: 'INDEX clause instance encoding: integer-valued indexes use one sub-identifier; fixed-length or IMPLIED variable-length strings use n sub-identifiers (one per octet); variable-length strings without IMPLIED use n+1 (length then octets); OIDs without IMPLIED use n+1 (count then sub-ids); IpAddress uses 4 sub-identifiers. IMPLIED may only appear on the last index component and not on potentially zero-length strings.'
section: "7.7"
topics:
