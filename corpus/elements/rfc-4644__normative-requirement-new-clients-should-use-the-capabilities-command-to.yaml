document: rfc-4644
kind: normative-requirement
summary: New clients SHOULD use the CAPABILITIES command to detect STREAMING support but MAY use MODE STREAM for backwards compatibility with legacy servers. Servers MUST accept MODE STREAM for backwards compatibility with legacy clients.
section: "2.3"
rfc2119_level: MUST
