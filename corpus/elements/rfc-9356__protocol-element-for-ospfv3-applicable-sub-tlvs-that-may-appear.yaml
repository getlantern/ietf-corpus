summary: 'For OSPFv3, applicable sub-TLVs that MAY appear within the L2 Bundle Member Attributes sub-TLV include: Adj-SID (5), LAN Adj-SID (6), Application-Specific Link Attributes (11), Shared Risk Link Group (12), Unidirectional Link Delay (13), Min/Max Unidirectional Link Delay (14), Unidirectional Delay Variation (15), Unidirectional Link Loss (16), Residual/Available/Utilized Bandwidth (17-19), Administrative Group (20), Extended Administrative Group (21), TE Metric (22), and Maximum Link Bandwidth (23).'
