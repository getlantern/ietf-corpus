document: rfc-3608
kind: protocol-element
summary: The registrar MAY return more than one Service-Route header field or element in the 200-class response to handle network topologies requiring traversal of multiple proxies (e.g., a firewall proxy before the home service proxy). The order is top-down, meaning the topmost entry is visited first.
section: "6.3"
topics:
