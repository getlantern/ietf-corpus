document: rfc-9432
kind: normative-requirement
summary: Unless the member node label (<unique-N>) is the same in $NEWCATZ, all zone-associated state for a just-migrated zone MUST be reset. The original catalog owner must change the label (triggering a state reset) before or simultaneously with adding the coo property to prevent state takeover by the new owner.
section: 4.3.1
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
