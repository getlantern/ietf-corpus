document: rfc-8940
kind: security-consideration
summary: The Session-Id definitions given for EAP-SIM, EAP-AKA, and PEAP are required to be unique per session, unforgeable, and unguessable by an outside party per RFC 5247 Section 10. These definitions have been widely deployed for years in all major EAP implementations.
section: "4"
topics:
