document: rfc-9909
kind: protocol-element
summary: SLH-DSA-PublicKey and SLH-DSA-PrivateKey are ASN.1 OCTET STRING types (defined in RFC 9814) that can be used to carry SLH-DSA or HashSLH-DSA keys in environments that use ASN.1 encoding but do not define their own raw-to-ASN.1 mapping. The bit ordering maps the most significant bit of the OCTET STRING to the most significant bit of the BIT STRING.
section: "5"
topics:
