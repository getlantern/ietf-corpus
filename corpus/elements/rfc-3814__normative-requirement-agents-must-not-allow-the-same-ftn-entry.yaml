document: rfc-3814
kind: normative-requirement
summary: Agents MUST NOT allow the same FTN entry (identified by mplsFTNMapCurrIndex) to be applied multiple times to the same interface. Agents MUST NOT allow creation of rows in mplsFTNMapTable until the corresponding rows exist in mplsFTNTable.
section: "9"
rfc2119_level: MUST NOT
