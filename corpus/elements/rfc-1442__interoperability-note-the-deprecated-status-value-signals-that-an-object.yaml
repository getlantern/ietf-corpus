document: rfc-1442
kind: interoperability-note
summary: The 'deprecated' STATUS value signals that an object or notification is obsolete but that implementors may wish to support it to foster interoperability with older implementations. It differs from 'obsolete', which carries no such recommendation.
section: "7.4"
