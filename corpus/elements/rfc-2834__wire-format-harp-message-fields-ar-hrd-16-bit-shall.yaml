document: rfc-2834
kind: wire-format
summary: 'HARP message fields: ar$hrd (16-bit, SHALL be 28 = HIPARP), ar$pro (16-bit, SHALL be 2048 = IP), ar$op (16-bit operation code), ar$pln (8-bit, SHALL be 4), ar$rhl (8-bit requester HW address length, 10 for HIPPI-800 or 6 for HIPPI-6400), ar$thl (8-bit target HW address length), ar$rpa (32-bit requester IP), ar$tpa (32-bit target IP), ar$rha (variable requester HW address), ar$tha (variable target HW address).'
section: "6.3"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
