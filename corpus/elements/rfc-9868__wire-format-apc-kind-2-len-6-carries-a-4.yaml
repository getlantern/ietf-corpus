document: rfc-9868
kind: wire-format
summary: APC (Kind=2, Len=6) carries a 4-byte CRC32c of the UDP user data payload only (excluding IP pseudoheader, UDP header, and surplus area) in network byte order. There are no reserved values including zero; the option is simply omitted to indicate 'not used'.
section: "11.3"
