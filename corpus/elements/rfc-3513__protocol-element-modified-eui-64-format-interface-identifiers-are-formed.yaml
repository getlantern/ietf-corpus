document: rfc-3513
kind: protocol-element
summary: Modified EUI-64 format interface identifiers are formed by inverting the 'u' (universal/local) bit of an IEEE EUI-64 identifier. A 'u' bit of 1 indicates global scope; 0 indicates local scope. For IEEE 802 48-bit MACs, two octets 0xFF 0xFE are inserted between the company_id and vendor extension before inverting 'u'.
section: 2.5.1
topics:
