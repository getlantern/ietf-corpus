document: rfc-6765
kind: protocol-element
summary: The Generic Bonding Sub-layer (GBS) represents a bonded xDSL port in the ifTable as a separate interface with ifType g9981(263), g9982(264), or g9983(265) for ATM, Ethernet, or TDIM bonding respectively. It aggregates up to 32 Bonding Channel Entities (BCEs), each representing an xDSL line or individual bearer channel.
section: 4.1.1
