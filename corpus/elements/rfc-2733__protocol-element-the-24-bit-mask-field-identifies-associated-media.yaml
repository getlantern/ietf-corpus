document: rfc-2733
kind: protocol-element
summary: 'The 24-bit mask field identifies associated media packets: if bit i is set, the media packet with sequence number N+i (where N is the SN base) was used to generate the FEC packet. The least significant bit corresponds to i=0, the most significant to i=23.'
