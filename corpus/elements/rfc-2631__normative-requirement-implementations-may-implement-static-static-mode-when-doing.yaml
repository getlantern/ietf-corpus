document: rfc-2631
kind: normative-requirement
summary: Implementations MAY implement Static-Static mode. When doing so, both originator and recipient SHOULD perform the Section 2.1.5 public key validation or verify that their CA has validated the keys, to prevent small subgroup attacks.
section: "2.4"
rfc2119_level: MAY
