document: rfc-7615
kind: normative-requirement
summary: Unlike Authentication-Info, the Proxy-Authentication-Info header field applies only to the next outbound client on the response chain, because only the client that chose a given proxy is likely to have the credentials necessary for authentication.
section: "4"
rfc2119_level: MUST NOT
topics:
