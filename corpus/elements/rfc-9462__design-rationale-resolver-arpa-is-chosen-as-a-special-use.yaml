document: rfc-9462
kind: design-rationale
summary: '''resolver.arpa'' is chosen as a Special-Use Domain Name analogous to ''ipv4only.arpa'' (RFC 8880): the client is not interested in an authoritative answer but uses the query to communicate with the locally configured resolver, similar to how ''ipv4only.arpa'' enables client-to-middlebox communication.'
section: A
