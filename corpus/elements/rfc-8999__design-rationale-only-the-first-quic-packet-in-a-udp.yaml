document: rfc-8999
kind: design-rationale
summary: Only the first QUIC packet in a UDP datagram is covered by the invariant properties. A QUIC version may permit multiple packets per datagram, but invariants apply only to the first, keeping the specification minimal and version-agnostic.
section: "5"
