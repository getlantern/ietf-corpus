document: rfc-5286
kind: normative-requirement
summary: 'When the primary next-hop uses a broadcast link, an alternate SHOULD be loop-free with respect to that link''s pseudo-node (PN): D_opt(N,D) < D_opt(N,PN) + D_opt(PN,D). A node-protecting LFA on a broadcast interface is not automatically link-protecting.'
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
