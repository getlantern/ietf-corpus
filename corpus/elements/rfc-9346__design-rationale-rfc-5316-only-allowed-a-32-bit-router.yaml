document: rfc-9346
kind: design-rationale
summary: RFC 5316 only allowed a 32-bit Router ID in TLV 141's fixed header, which is problematic in IPv6-only deployments lacking an IPv4 address. RFC 9346 adds the IPv6 Local ASBR Identifier sub-TLV and specifies use of 0.0.0.0 as a sentinel value to support IPv6-only operation.
section: Appendix A
topics:
    - routing
    - mpls
