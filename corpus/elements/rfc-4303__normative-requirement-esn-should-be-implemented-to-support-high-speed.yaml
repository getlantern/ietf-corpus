document: rfc-4303
kind: normative-requirement
summary: ESN SHOULD be implemented to support high-speed IPsec, and use of ESN MUST be negotiated by an SA management protocol. In IKEv2 the default is ESN unless 32-bit sequence numbers are explicitly negotiated.
section: 2.2.1
rfc2119_level: SHOULD
topics:
