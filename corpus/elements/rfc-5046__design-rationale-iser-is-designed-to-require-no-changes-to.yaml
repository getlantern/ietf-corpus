document: rfc-5046
kind: design-rationale
summary: iSER is designed to require no changes to the iSCSI ecosystem (MIB, bootstrapping, naming, discovery, security, authentication) and no iSCSI- or iSER-specific hardware in the RDMA controller, so that any generic RDMA-Capable Controller can be used and existing iSCSI infrastructure is fully reused.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
