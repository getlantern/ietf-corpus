document: rfc-6130
kind: protocol-element
summary: A Link Tuple (L_neighbor_iface_addr_list, L_HEARD_time, L_SYM_time, L_quality, L_pending, L_lost, L_time) records a single link from a 1-hop neighbor's MANET interface. L_status is derived from these fields and takes values PENDING, HEARD, SYMMETRIC, or LOST.
section: "7.1"
topics:
    - routing
    - mobility
