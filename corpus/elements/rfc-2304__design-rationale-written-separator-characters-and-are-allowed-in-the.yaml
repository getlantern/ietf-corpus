document: rfc-2304
kind: design-rationale
summary: Written separator characters ('-' and '.') are allowed in the syntax to facilitate user specification of PSTN e-mail addresses by permitting insertion between dial elements. They carry no semantic meaning and must be ignored by implementations.
section: "2"
topics:
