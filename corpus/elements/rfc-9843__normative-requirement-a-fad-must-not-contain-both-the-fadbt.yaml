document: rfc-9843
kind: normative-requirement
summary: A FAD MUST NOT contain both the FADBT sub-TLV and the FADRB sub-TLV. If both are advertised in the same FAD, the FAD MUST be ignored by the receiver. Each of FADRB and FADBT MUST NOT appear more than once in an FAD.
section: 4.1.3.2
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
