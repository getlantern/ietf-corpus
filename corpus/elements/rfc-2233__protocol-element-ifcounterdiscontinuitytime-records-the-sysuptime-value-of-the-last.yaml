document: rfc-2233
kind: protocol-element
summary: ifCounterDiscontinuityTime records the sysUpTime value of the last counter discontinuity on an interface. Management applications must discard any calculated counter difference when this value differs between successive polls, in addition to checking sysUpTime for agent re-initialization.
section: 3.1.5
topics:
    - snmp
