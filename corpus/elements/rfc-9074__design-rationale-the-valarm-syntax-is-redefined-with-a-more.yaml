document: rfc-9074
kind: design-rationale
summary: The VALARM syntax is redefined with a more extensible form (alarmcext) because the original RFC 5545 syntax was difficult to extend with properties common to all alarm types and did not support nested subcomponents needed by proximity alarm triggers (VLOCATION).
section: "3"
