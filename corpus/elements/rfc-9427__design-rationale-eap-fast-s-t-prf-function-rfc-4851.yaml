document: rfc-9427
kind: design-rationale
summary: EAP-FAST's T-PRF function (RFC 4851 Section 5.5) is not used for TLS 1.3; it is replaced by the TLS 1.3 TLS-Exporter function. Similarly, EAP-FAST's PAC is deprecated in TLS 1.3 because TLS 1.3 session tickets are functionally equivalent.
section: "2.3"
topics:
    - tls
    - crypto
    - security
