document: rfc-2334
kind: normative-requirement
summary: After a restart, any CSA Record sent by the restarting LS MUST carry a CSA Sequence Number unique within the SG for the given OID/Cache Key pair. The RECOMMENDED method is the previously-known sequence number plus a configured constant.
section: B.2.0.2
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
