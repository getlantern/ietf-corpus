document: rfc-9577
kind: security-consideration
summary: Context-bound challenges force token issuance and redemption to occur close in time, enabling a colluding Issuer and Origin to correlate events. Clients MAY introduce delay between challenge receipt and token redemption (using max-age as a guide) to make timing linkability harder.
section: "5.5"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
