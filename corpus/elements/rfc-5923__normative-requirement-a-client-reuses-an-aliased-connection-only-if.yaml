document: rfc-5923
kind: normative-requirement
summary: A client reuses an aliased connection only if (1) RFC 3263 resolution on a URI yields a resolved address already in the alias table, AND (2) the URI used for resolution matches one of the cached identities in the corresponding alias table row. Both conditions must hold simultaneously.
section: "8.1"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
