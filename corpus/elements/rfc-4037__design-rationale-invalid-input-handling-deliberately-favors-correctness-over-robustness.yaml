document: rfc-4037
kind: design-rationale
summary: 'Invalid input handling deliberately favors correctness over robustness: connection or transaction termination on invalid messages prevents silently corrupted application messages from reaching end users. OPES adaptations are high-level and cannot be automatically validated, so ''robustness guessing'' is more dangerous than termination.'
section: "5"
