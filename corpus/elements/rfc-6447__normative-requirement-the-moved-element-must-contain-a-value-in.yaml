document: rfc-6447
kind: normative-requirement
summary: The <moved> element MUST contain a value in meters indicating the minimum distance the resource must have moved from its last notification location to trigger an event. The distance MUST be measured in meters absolutely from the point of the last notification and must include vertical movement.
section: "3.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
