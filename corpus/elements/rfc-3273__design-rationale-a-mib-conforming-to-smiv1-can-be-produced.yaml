document: rfc-3273
kind: design-rationale
summary: A MIB conforming to SMIv1 can be produced from this SMIv2 MIB by translation, but Counter64 objects cannot be translated and must be omitted. The RFC explicitly states this loss of machine-readable information does not change the semantics of the MIB.
