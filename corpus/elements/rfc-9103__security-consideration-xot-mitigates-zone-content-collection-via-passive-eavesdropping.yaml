document: rfc-9103
kind: security-consideration
summary: 'XoT mitigates zone content collection via passive eavesdropping on cleartext zone transfers. It does not mitigate: inference of zone activity from encrypted connection sizes and timing; identification of hidden primaries from encrypted connection patterns; or zone content collection via zone enumeration techniques such as NSEC walking.'
section: "15"
topics:
