document: rfc-6455
kind: normative-requirement
summary: If at any time an endpoint encounters data destined for the UTF-8 decoder that does not conform to the UTF-8 specification (RFC 3629), the endpoint MUST fail the WebSocket connection. Clients MUST NOT show Close frame reason text to end users as it is not guaranteed to be human-readable.
section: "8.1"
rfc2119_level: MUST
topics:
    - websocket
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
