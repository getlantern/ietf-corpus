document: rfc-7866
kind: security-consideration
summary: Metadata in the RS may contain sensitive call details such as participant identities, call timing, and media attributes. The SRC may be configured to suppress certain metadata for privacy reasons; the SRS MUST protect stored metadata with appropriate access controls.
section: "12.3"
topics:
    - security
    - privacy
    - realtime
