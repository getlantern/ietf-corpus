document: rfc-3591
kind: security-consideration
summary: Several MIB objects have MAX-ACCESS read-write (e.g., power thresholds, TIM detection mode, trace identifiers, APR control), making them potential targets for unauthorized modification that could disrupt optical network operation. The document recommends applying SNMPv3 with authentication and privacy for all management access to these objects.
section: "5"
topics:
