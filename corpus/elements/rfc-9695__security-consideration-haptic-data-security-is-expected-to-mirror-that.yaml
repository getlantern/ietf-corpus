document: rfc-9695
kind: security-consideration
summary: Haptic data security is expected to mirror that of audio/video media. Descriptive haptic encodings (XML/JSON) may present risk if extensibility or injected executable data allows malicious instructions to execute arbitrary code in kernel space, bypassing system permissions and sandboxes.
section: "3"
topics:
