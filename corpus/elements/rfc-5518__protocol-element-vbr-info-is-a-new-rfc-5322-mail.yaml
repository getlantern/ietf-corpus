document: rfc-5518
kind: protocol-element
summary: 'VBR-Info is a new RFC 5322 mail header field used by senders to assert which third-party certification services will vouch for their messages. It contains three components: the accountable domain (md=), the message content type (mc=), and a colon-separated list of certifier domains (mv=).'
section: "2"
