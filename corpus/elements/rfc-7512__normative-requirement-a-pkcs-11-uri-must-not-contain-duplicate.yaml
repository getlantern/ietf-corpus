document: rfc-7512
kind: normative-requirement
summary: 'A PKCS #11 URI MUST NOT contain duplicate attributes of the same name in the URI path component; each attribute may appear at most once in the path. Duplicate vendor attributes MAY appear in the query component.'
section: "2.3"
rfc2119_level: MUST NOT
