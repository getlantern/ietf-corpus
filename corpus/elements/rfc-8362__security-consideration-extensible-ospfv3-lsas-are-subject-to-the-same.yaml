document: rfc-8362
kind: security-consideration
summary: Extensible OSPFv3 LSAs are subject to the same security concerns as RFC 5340. Implementations MUST assure that malformed TLV and sub-TLV permutations do not cause hard OSPFv3 failures (e.g., crashes or protocol restarts).
section: "7"
topics:
    - routing
    - security
