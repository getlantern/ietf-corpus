document: rfc-2065
kind: security-consideration
summary: Zone private keys and zone file master copies should be kept on off-line, physically secure, non-network-connected machines. The zone file should be signed offline and then transferred to network servers by sneaker-net or similar one-way mechanisms to prevent tampering from the network. Compromise of all servers for a zone does not affect the data authenticity assurance.
section: "7.2"
topics:
    - dns
    - security
