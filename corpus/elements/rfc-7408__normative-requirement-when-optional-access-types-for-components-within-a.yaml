document: rfc-7408
kind: normative-requirement
summary: When optional access types for components within a struct are defined, those access types MUST override the access type of the enclosing struct. Access types provided for components in a capability MUST be ignored; access types for structs in metadata MUST be ignored.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
