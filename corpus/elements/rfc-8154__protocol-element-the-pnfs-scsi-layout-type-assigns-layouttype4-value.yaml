document: rfc-8154
kind: protocol-element
summary: The pNFS SCSI layout type assigns layouttype4 value LAYOUT4_SCSI = 5, extending the existing layout type enumeration. This new layout type maps NFS file regions to extents on SCSI block storage devices accessed via protocols such as FCP, iSCSI, or SAS.
