document: rfc-9384
kind: normative-requirement
summary: When a BGP connection is terminated due to a BFD session going into the Down state, the BGP speaker SHOULD send a NOTIFICATION message with the error code 'Cease' and the error subcode 'BFD Down'.
section: "3"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
    - security
