document: rfc-5360
kind: normative-requirement
summary: If a recipient is removed from a relay's translation logic, the relay SHOULD delete the permissions related to that recipient. It is also RECOMMENDED that relays request recipients to refresh permissions periodically; if a recipient fails to refresh, the relay SHOULD delete those permissions.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
