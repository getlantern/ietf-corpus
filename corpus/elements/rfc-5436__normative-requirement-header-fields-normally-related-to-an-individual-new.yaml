document: rfc-5436
kind: normative-requirement
summary: Header fields normally related to an individual new message, such as 'Message-ID' and 'Date', MUST be generated fresh for the notification message and MUST NOT be copied from the triggering message. Any URI headers with those names MUST be ignored.
section: "2.7"
rfc2119_level: MUST NOT
topics:
    - email
