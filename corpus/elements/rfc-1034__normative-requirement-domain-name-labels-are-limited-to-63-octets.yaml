document: rfc-1034
kind: normative-requirement
summary: Domain name labels are limited to 63 octets or less. The total encoded domain name must not exceed 255 octets. These constraints simplify implementations and bound resource usage.
section: "3.1"
rfc2119_level: MUST
topics:
