document: rfc-1595
kind: protocol-element
summary: 'Unavailable Seconds (UAS): an interface is unavailable at the onset of 10 contiguous SESs (those 10 SESs are included in unavailable time) and becomes available again at the onset of 10 contiguous non-SES seconds (those 10 seconds are excluded from unavailable time). Only UAS counters are incremented while unavailable; all other counters are incremented only while available.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
