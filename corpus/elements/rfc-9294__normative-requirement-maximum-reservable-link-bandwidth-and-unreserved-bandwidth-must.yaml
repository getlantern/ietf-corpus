document: rfc-9294
kind: normative-requirement
summary: Maximum Reservable Link Bandwidth and Unreserved Bandwidth MUST be encoded only in the respective top-level BGP-LS TLVs (1090 and 1091) and not within the BGP-LS ASLA TLV, even though RFC 8919 allows them in IS-IS ASLA sub-TLV.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - bgp
