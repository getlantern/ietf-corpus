document: rfc-9914
kind: protocol-element
summary: 'The Via Information Option (VIO) is a new RPL Control Message Option introduced to signal a sequence of hops forming a segment or protection path inside a P-DAO. It appears in two variants: SM-VIO (Storing Mode, strict hop sequence) and NSM-VIO (Non-Storing Mode, loose source-routed sequence). The via list in the VIO is encoded as an SRH-6LoRH starting with the first hop after the ingress and ending at the egress.'
section: "5.3"
topics:
    - routing
