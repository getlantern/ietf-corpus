document: rfc-7581
kind: wire-format
summary: The Resource Block Pool State Field encodes resource availability using either a list of 16-bit unsigned integers (Action=0, giving the number of available resources per RB) or a bitmap (Action=1, one bit per RB where 0=available, 1=in-use). The bitmap form must be padded to a multiple of 4 bytes.
section: "3.3"
topics:
