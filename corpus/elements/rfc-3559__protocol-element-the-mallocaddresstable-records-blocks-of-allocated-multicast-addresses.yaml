document: rfc-3559
kind: protocol-element
summary: The mallocAddressTable records blocks of allocated multicast addresses, indexed by (mallocAddressAddressType, mallocAddressFirstAddress). Each entry carries mallocAddressNumAddrs (block size) and mallocAddressRequestId (foreign key into mallocRequestTable), enabling the query 'who allocated address A?'.
