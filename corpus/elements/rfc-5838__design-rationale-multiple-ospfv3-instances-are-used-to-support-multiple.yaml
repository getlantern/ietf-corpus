document: rfc-5838
kind: design-rationale
summary: Multiple OSPFv3 instances are used to support multiple address families by mapping each AF to a separate Instance ID. This approach introduces no new protocol mechanisms, minimizes extensions, simplifies implementation, and preserves the existing instance/area/interface configuration model.
section: "1.1"
topics:
    - routing
