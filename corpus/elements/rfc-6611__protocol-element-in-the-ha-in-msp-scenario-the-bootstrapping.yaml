document: rfc-6611
kind: protocol-element
summary: 'In the HA-in-MSP scenario, the bootstrapping proceeds in five steps: (1) MN authenticates via IEEE 802.11i/802.1X and AAAH assigns HA and returns info to NAS; (2) MN sends DHCPv6 Information-request; (3) NAS/DHCP relay forwards request with AAA-provided HA info in Relay-Supplied Options; (4) DHCP server extracts and includes HA info in Reply; (5) relay delivers Reply to MN.'
section: 4.2.1
