document: rfc-2730
kind: design-rationale
summary: The DISCOVER/OFFER/REQUEST three-way handshake allows a client to receive competing OFFERs from multiple servers simultaneously, choose the best one, and notify unchosen servers via a multicast REQUEST containing the selected Server Identifier so they can release their temporary address reservations.
section: "1.5"
topics:
    - multicast
