document: rfc-8994
kind: normative-requirement
summary: TA information MUST be provisioned to an ACP node during initial enrollment and MUST also be renewable via EST. ACP nodes MUST support certificate path validation with zero or one intermediate CA; they SHOULD support two intermediate CAs and two TAs to permit TA migration.
section: 6.2.4
rfc2119_level: MUST
