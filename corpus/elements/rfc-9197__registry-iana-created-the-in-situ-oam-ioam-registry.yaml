document: rfc-9197
kind: registry
summary: 'IANA created the ''In Situ OAM (IOAM)'' registry group containing seven registries: IOAM Option-Type (128 code points, IETF Review for 4–127), IOAM Trace-Type (24-bit bitmask, bits 12–21 via IETF Review), IOAM Trace-Flags (4-bit, bits 1–3 via IETF Review), IOAM POT-Type (256 code points), IOAM POT-Flags, IOAM E2E-Type (16-bit bitmask), and IOAM Namespace-ID (operator-assigned 0x0001–0x7FFF, IANA Expert Review 0x8000–0xFFFF).'
section: "7"
