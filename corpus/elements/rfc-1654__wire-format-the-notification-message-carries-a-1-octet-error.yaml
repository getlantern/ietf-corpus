summary: The NOTIFICATION message carries a 1-octet Error Code, 1-octet Error Subcode, and variable Data field. Minimum length is 21 octets including header. Six error codes are defined (Message Header, OPEN, UPDATE, Hold Timer Expired, FSM Error, Cease).
