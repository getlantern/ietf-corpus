document: rfc-9390
kind: normative-requirement
summary: If the Diameter server accepts a client's group assignment request, the server MUST assign the new session to each identified group, MUST store any newly identified groups locally, and MUST include all received Session-Group-Info AVPs in its response.
section: 4.2.1
rfc2119_level: MUST
