document: rfc-4825
kind: registry
summary: 'Five MIME types are registered: application/xcap-el+xml (XML element body), application/xcap-att+xml (XML attribute value), application/xcap-ns+xml (namespace bindings), application/xcap-error+xml (conflict/error responses), and application/xcap-caps+xml (server capabilities). Two URN sub-namespaces are also registered: urn:ietf:params:xml:ns:xcap-error and urn:ietf:params:xml:ns:xcap-caps.'
section: "15.2"
