document: rfc-8079
kind: interoperability-note
summary: RTP/RTCP multiplexing (RFC 5761) and Reduced-Size RTCP (RFC 5506) may be used independently on each side of a Media Relay or Media Terminator B2BUA, allowing the B2BUA to use the feature on the side that supports it. However, increased RTCP Feedback rates from Reduced-Size may be counterproductive when the non-supporting side has limited bandwidth.
section: "3.2"
topics:
    - rtp
    - realtime
