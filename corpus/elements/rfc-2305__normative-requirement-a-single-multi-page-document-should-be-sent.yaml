document: rfc-2305
kind: normative-requirement
summary: A single multi-page document SHOULD be sent as a single multi-page TIFF file. However, recipients MUST be able to process multipart/mixed messages containing multiple TIFF files. If processing of any part of a multipart message fails, the entire message is treated as a processing failure.
section: 2.2.4
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
