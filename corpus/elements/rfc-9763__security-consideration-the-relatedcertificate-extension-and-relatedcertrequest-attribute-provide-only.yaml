document: rfc-9763
kind: security-consideration
summary: The RelatedCertificate extension and relatedCertRequest attribute provide only a means to express that multiple certificates are related; they do not by themselves effect any security function. The mechanisms are intended for interpretation by the recipient (verifier or CA) and must be used within a broader authentication and authorization framework.
section: "7"
topics:
    - security
    - pkix
