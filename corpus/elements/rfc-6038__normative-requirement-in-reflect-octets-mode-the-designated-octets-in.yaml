document: rfc-6038
kind: normative-requirement
summary: In Reflect Octets mode, the designated octets in the Session-Sender's Packet Padding (to be reflected) field MUST be included in the Session-Reflector's test packet, and the reflected field MUST conform to the length specified in the Request-TW-Session message.
section: "5.2"
rfc2119_level: MUST
