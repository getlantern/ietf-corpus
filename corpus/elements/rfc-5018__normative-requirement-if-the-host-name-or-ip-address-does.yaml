document: rfc-5018
kind: normative-requirement
summary: If the host name or IP address does not match the certificate identity, user-oriented clients MUST notify the user or terminate the connection with a bad certificate error; automated clients MUST log the error and SHOULD terminate the connection.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
