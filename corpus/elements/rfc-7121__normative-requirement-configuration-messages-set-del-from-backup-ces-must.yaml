document: rfc-7121
kind: normative-requirement
summary: Configuration messages (SET/DEL) from backup CEs MUST be dropped by the FE and logged as received errors. Backup CEs are permitted only to issue queries and receive heartbeats and async events.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
