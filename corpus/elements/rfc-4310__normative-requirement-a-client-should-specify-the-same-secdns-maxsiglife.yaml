document: rfc-4310
kind: normative-requirement
summary: A client SHOULD specify the same <secDNS:maxSigLife> value for all <secDNS:dsData> elements associated with a domain; if not present or if multiple values are requested, the server's default signature expiration policy applies.
section: 3.1.2
rfc2119_level: SHOULD
