document: rfc-7349
kind: normative-requirement
summary: To achieve smooth key transition, KeyStartAccept SHOULD be less than KeyStartGenerate, and KeyStopGenerate SHOULD be less than KeyStopAccept. When a new key replaces an old, the KeyStartGenerate time for the new key MUST be less than or equal to the KeyStopGenerate time of the old key.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
