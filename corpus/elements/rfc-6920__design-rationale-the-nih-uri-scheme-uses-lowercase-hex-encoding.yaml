document: rfc-6920
kind: design-rationale
summary: The nih URI scheme uses lowercase hex encoding rather than base64url because base64url uses both uppercase and lowercase characters, which can cause confusion when spoken aloud. The nih format is specifically designed for the 'confirmation' use case where a resource name must be spoken over a voice channel.
section: "7"
topics:
