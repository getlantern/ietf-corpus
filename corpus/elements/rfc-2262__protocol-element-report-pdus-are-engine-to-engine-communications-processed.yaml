document: rfc-2262
kind: protocol-element
summary: Report PDUs are engine-to-engine communications processed directly by the SNMPv3 Message Processing Model and are generally not passed to applications, unlike all other PDU types. They carry OID/value pairs from statusInformation (e.g., error counters).
section: "6.4"
