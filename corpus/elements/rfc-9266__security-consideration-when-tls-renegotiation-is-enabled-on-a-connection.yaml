document: rfc-9266
kind: security-consideration
summary: When TLS renegotiation is enabled on a connection, the 'tls-exporter' channel binding type is not defined for that connection, and implementations MUST NOT support it. Users should upgrade to TLS 1.3 or later to take advantage of channel binding.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
