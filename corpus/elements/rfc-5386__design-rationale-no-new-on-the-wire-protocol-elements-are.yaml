document: rfc-5386
kind: design-rationale
summary: No new on-the-wire protocol elements are added to IKEv2 for BTNS. The unauthenticated mode is achieved entirely through PAD and SPD extensions to the RFC 4301 processing model, making BTNS a policy-layer change rather than a protocol-layer change.
section: "1"
topics:
    - ipsec
    - security
