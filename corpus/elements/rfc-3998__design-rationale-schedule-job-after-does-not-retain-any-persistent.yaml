document: rfc-3998
kind: design-rationale
summary: Schedule-Job-After does not retain any persistent link between the two jobs after positioning; no attribute on either job points to the other. The relationship is a one-time scheduling placement, not a durable dependency, so subsequent Schedule-Job-After operations can freely reorder jobs.
section: 4.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
