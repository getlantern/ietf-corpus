document: rfc-8167
kind: normative-requirement
summary: Whether presented inline or as a separate chunk, the ONC RPC Reply header MUST start with the same XID value present in the RPC-over-RDMA header, and the RPC header's msg_type field MUST contain the value REPLY.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
