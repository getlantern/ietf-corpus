document: rfc-8457
kind: protocol-element
summary: The "\Important" mailbox attribute designates a special-use mailbox containing messages likely important to the user. In implementations supporting "$Important", it typically represents a virtual mailbox collecting messages marked with that keyword from other mailboxes.
