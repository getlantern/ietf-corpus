document: rfc-7110
kind: wire-format
summary: The IPv6 RSVP Tunnel sub-TLV (Type 27) carries a 16-octet IPv6 tunnel end point address, 2-octet Flags, 2-octet Tunnel ID, 16-octet Extended Tunnel ID, and 16-octet IPv6 tunnel sender address. It is derived from the RSVP IPv6 FEC TLV in RFC 4379, omitting LSP-ID and adding P/S Flags.
section: 4.3.2
topics:
    - mpls
