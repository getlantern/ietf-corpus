document: rfc-7726
kind: interoperability-note
summary: The procedures in this document are fully backward compatible with RFC 5884 implementations. The egress LSR must be upgraded to support multiple BFD sessions per <MPLS LSP, FEC> before the ingress LSR is upgraded, to ensure correct operation during a phased rollout.
