document: rfc-3555
kind: security-consideration
summary: Several audio and video encodings are suitable for hiding data via steganography. The MIME subtype registration procedure itself imposes no security risks, but implementors should consult RFC 3550 for security considerations of RTP transport, including use of encryption for confidentiality.
section: "5"
topics:
