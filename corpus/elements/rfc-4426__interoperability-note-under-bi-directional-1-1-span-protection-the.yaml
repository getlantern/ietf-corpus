document: rfc-4426
kind: interoperability-note
summary: Under bi-directional 1+1 span protection, the working and protection spans are exposed to routing and signaling as a single TE link, so the switchover SHOULD be transparent to routing and signaling. GMPLS-based mechanisms MAY not be necessary when the underlying transport technology already provides the switchover mechanism.
section: "2.2"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
