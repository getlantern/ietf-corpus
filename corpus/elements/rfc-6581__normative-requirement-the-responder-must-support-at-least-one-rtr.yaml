document: rfc-6581
kind: normative-requirement
summary: The responder MUST support at least one RTR indication option if it supports Enhanced RDMA connection establishment. If Control Flag A is 1 in the MPA Request, the responder MUST set Control Flag A to 1 in the MPA Reply and MUST set at least one RTR indication option flag.
section: "9.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
