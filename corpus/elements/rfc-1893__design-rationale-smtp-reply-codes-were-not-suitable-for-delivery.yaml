document: rfc-1893
kind: design-rationale
summary: SMTP reply codes were not suitable for delivery status notifications because SMTP provides only about 12 useful delivery codes, each overloaded to indicate several error conditions, and the remaining available code space is insufficient to cover MIME, media conversion, and security errors without incompatibility.
section: "1"
