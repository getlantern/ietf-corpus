document: rfc-4862
kind: security-consideration
summary: Stateless address autoconfiguration requires no authentication of a host before it connects to and uses a network. The document acknowledges this threat is inherent in the Internet architecture and cannot be fully addressed within the autoconfiguration mechanism itself.
