document: rfc-8920
kind: wire-format
summary: The ASLA sub-TLV has a 4-octet header (Type 2 octets, Length 2 octets) followed by SABM Length (1 octet), UDABM Length (1 octet), Reserved (2 octets), then variable-length SABM and UDABM fields, then link attribute sub-sub-TLVs. SABM Length and UDABM Length each encode the length of their respective bit mask in octets.
section: "5"
