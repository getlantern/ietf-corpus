summary: 'The intermediateProcessId Information Element (ElementId 406, Data Type: unsigned32, Semantics: identifier) is an identifier of an Intermediate Process that is unique per IPFIX Device, used primarily as a scope field in Options Templates. Note that process identifiers may be assigned dynamically.'
