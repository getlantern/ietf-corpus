document: rfc-3963
kind: normative-requirement
summary: When a dynamic routing protocol runs between the Mobile Router and Home Agent, routing protocol messages exchanged through the bi-directional tunnel MUST use appropriate authentication and confidentiality protection mechanisms (IPsec ESP) as defined in RFC 2406. Link-local addresses used in inner IPv6 headers MUST NOT be forwarded to another link.
section: "8"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
