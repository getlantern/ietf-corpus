document: rfc-2943
kind: state-machine
summary: 'Unilateral (client-to-server) DSA authentication proceeds through four steps: (1) server sends AUTHENTICATION SEND with supported types; (2) client sends NAME and DSS_INITIALIZE; (3) server replies with DSS_TOKENBA containing Sequence(TokenID, TokenBA); (4) client sends DSS_CERTA_TOKENAB containing Sequence(TokenID, CertA, TokenAB). Authentication type pair is DSS | AUTH_CLIENT_TO_SERVER | AUTH_HOW_ONE_WAY | ENCRYPT_OFF | INI_CRED_FWD_OFF.'
section: "3.1"
topics:
