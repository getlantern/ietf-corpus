document: rfc-9179
kind: normative-requirement
summary: All data nodes in the YANG module are writable/creatable/deletable (config true by default). The module defines only groupings, so security and access-control considerations are primarily the responsibility of designers of modules that use these groupings.
section: "7"
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
    - security
