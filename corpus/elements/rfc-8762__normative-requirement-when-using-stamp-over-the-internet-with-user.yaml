document: rfc-8762
kind: normative-requirement
summary: When using STAMP over the Internet with User Ports range destination port numbers, the possible impact of STAMP-Test packets MUST be thoroughly analyzed and the use MUST be agreed upon by nodes hosting the Session-Sender and Session-Reflector before starting the session.
