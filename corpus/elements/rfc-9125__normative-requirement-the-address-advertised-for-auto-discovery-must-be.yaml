document: rfc-9125
kind: normative-requirement
summary: The address advertised for auto-discovery MUST be a different loopback address than is advertised for packets directed to the gateway itself, to avoid the side effect of applying the Tunnel Encapsulation attribute to packets addressed to the gateway.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
