document: rfc-7692
kind: normative-requirement
summary: If the agreed parameters contain 'client_no_context_takeover', the client MUST start compressing each new message with an empty LZ77 sliding window. If the agreed parameters contain 'server_no_context_takeover', the server MUST do the same.
section: 7.2.1
rfc2119_level: MUST
topics:
    - websocket
