document: rfc-3711
kind: registry
summary: SRTP defines key derivation label constants 0x00–0x05 for the six session keys/salts (SRTP encryption, SRTP authentication, SRTP salt, SRTCP encryption, SRTCP authentication, SRTCP salt). Future extensions MAY use label values 0x06–0xFF for other purposes, and new transforms must be defined in companion standards-track RFCs.
section: 4.3.1
