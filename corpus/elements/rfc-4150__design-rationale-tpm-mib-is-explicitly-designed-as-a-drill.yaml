document: rfc-4150
kind: design-rationale
summary: TPM-MIB is explicitly designed as a drill-down extension to APM-MIB (RFC3729), monitoring sub-application transaction flows not perceived by the end user. For example, APM-MIB reports overall web-browser response time while TPM-MIB separately tracks DNS, TCP-connect, and individual HTTP GET sub-transactions within the same application.
section: "2"
topics:
    - snmp
    - measurement
