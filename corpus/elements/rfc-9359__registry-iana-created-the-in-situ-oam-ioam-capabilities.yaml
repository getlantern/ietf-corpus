document: rfc-9359
kind: registry
summary: 'IANA created the ''In Situ OAM (IOAM) Capabilities'' registry with two subregistries: ''IOAM SoP Capability'' (2-bit field for Size of POT, initial value 0b00 = 64-bit PktID and 64-bit Cumulative; 0b01-0b11 via IETF Review) and ''IOAM TSF Capability'' (2-bit timestamp format field, initial values PTP/NTP/POSIX; 0b11 via IETF Review).'
