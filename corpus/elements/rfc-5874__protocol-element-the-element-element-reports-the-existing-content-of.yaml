kind: protocol-element
summary: The <element> element reports the existing content of an XCAP document element. It has a mandatory 'sel' attribute (percent-encoded relative URI) and an optional boolean 'exists' attribute; absence of 'exists' implies the element is present, and its child is the located XML element.
