document: rfc-1515
kind: interoperability-note
summary: An agent implementing repeater MAU objects must also implement the 802.3 Repeater MIB (RFC 1368). The rpMauGroupIndex and rpMauPortIndex values must match the rptrPortGroupIndex and rptrPortIndex values for the connected port.
section: 3.3.3
topics:
