document: rfc-5995
kind: design-rationale
summary: Letting the server assign the new member URI simplifies clients (no need to enumerate existing members or lock the collection to avoid name collisions) and can reduce server complexity by reusing internal identifiers such as UUIDs or primary keys rather than persisting a separate client-supplied identifier.
