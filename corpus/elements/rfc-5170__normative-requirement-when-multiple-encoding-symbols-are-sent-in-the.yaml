document: rfc-5170
kind: normative-requirement
summary: When multiple encoding symbols are sent in the same packet (G > 1), all symbols in an Encoding Symbol Group MUST be either all source symbols or all repair symbols; mixed packets are not permitted. Symbols are stored consecutively in the packet without padding.
section: "5.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
