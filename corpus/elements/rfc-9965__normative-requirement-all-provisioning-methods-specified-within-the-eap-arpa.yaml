document: rfc-9965
kind: normative-requirement
summary: All provisioning methods specified within the eap.arpa. domain MUST define a way to authenticate the server, either at the EAP layer (e.g., TLS-based EAP) or after network access has been granted (e.g., via HTTPS). The peer MUST treat the local network as untrusted regardless.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
