document: rfc-2447
kind: normative-requirement
summary: A MIME body part conforming to iMIP MUST have an RFC-2045 Content-Type value of 'text/calendar'. The Content-Type header MUST also include the 'method' parameter whose value MUST be the same as the METHOD property in the iCalendar object.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
