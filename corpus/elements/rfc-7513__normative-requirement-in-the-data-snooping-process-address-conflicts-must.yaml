document: rfc-7513
kind: normative-requirement
summary: In the Data Snooping Process, address conflicts MUST be detected and prevented before a binding is established from an unmatched data packet. A Duplicate Address Detection message (ARP Request/Probe or DAD NS) is sent; a reply from any other port indicates a conflict and the entry is discarded.
section: 7.6.1
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
