document: rfc-7438
kind: design-rationale
summary: 'RFC 6826 and RFC 7246 allow only a single (S,G) tree per MP-LSP and do not support non-bidirectional ASM shared trees. Wildcard encodings were introduced to address both limitations: they allow aggregating multiple IP multicast trees onto one MP-LSP (saving routing state) and allow (*,G) shared trees to be attached to MP-LSPs.'
section: "1"
topics:
