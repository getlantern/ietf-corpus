document: rfc-2457
kind: protocol-element
summary: The ebnSearchTable, indexed by ebnSearchLuName and ebnSearchIndex, enumerates the configured ordered list of control points to which an EBN forwards LOCATE searches. Special CP name values '*', '*SELF', and '*EBNS' indicate dynamic, self-search, and all-native-EBN behaviors respectively.
