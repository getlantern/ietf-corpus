document: rfc-7584
kind: security-consideration
summary: ICE uses STUN short-term credential mechanism (HMAC-SHA1 MESSAGE-INTEGRITY) for authentication and message integrity on connectivity checks. If the signaling channel carrying ice-ufrag/ice-pwd is not encrypted, eavesdroppers can obtain the keys and defeat STUN authentication, eliminating the security benefit over Hosted NAT Traversal solutions.
section: "5"
topics:
    - security
    - nat
    - sip
    - crypto
