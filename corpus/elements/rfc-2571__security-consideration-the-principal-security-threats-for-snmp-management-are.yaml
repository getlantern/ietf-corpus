document: rfc-2571
kind: security-consideration
summary: The principal security threats for SNMP management are modification of information (unauthorized alteration of in-transit messages) and masquerade (assuming an authorized principal's identity to perform unauthorized operations). Security Models SHOULD protect against both.
section: "1.4"
topics:
