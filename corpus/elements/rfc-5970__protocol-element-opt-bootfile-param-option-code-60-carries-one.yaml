document: rfc-5970
kind: protocol-element
summary: OPT_BOOTFILE_PARAM (option code 60) carries one or more UTF-8 (RFC 3629) strings sent by the server to the client, each preceded by a 16-bit param-len field. These strings specify boot parameters analogous to command-line arguments (e.g., kernel parameters, root filesystem location).
section: "3.2"
topics:
    - realtime
