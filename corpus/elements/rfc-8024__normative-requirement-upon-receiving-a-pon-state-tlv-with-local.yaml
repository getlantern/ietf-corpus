document: rfc-8024
kind: normative-requirement
summary: Upon receiving a PON State TLV with Local PON Port State set in the PW-failure scenario, the protection OLT MUST activate its PON interface to the protection trunk fiber and MUST send a notification for the protection PW with Preferential Forwarding active so traffic switches to the protection PW.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
