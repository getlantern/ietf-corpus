document: rfc-9930
kind: protocol-element
summary: The Result TLV (type 3, mandatory, length 2) provides acknowledged success/failure messages for protected termination. The 2-octet Status field has values 1=Success and 2=Failure. A Result TLV indicating success MUST be accompanied by a Crypto-Binding TLV; one indicating failure MUST NOT be accompanied by NAK, EAP-Payload, or Crypto-Binding TLVs.
section: 4.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
