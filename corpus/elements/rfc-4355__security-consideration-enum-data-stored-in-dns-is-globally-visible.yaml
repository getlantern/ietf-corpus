document: rfc-4355
kind: security-consideration
summary: ENUM data stored in DNS is globally visible and anonymous. Publishing telephone numbers and email addresses in ENUM exposes data subjects to automated harvesting for spam, junk faxes, and unsolicited SMS; unlike email, users cannot easily use 'sacrificial' phone numbers.
section: "6"
topics:
    - dns
    - privacy
    - security
