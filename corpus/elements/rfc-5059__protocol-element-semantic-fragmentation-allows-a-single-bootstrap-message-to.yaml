document: rfc-5059
kind: protocol-element
summary: Semantic fragmentation allows a single Bootstrap message to be split across multiple PIM Bootstrap Message Fragments (BSMFs), each a separate IP datagram with the same Fragment Tag. All fragments must have identical Type, No-Forward bit, Fragment Tag, Hash Mask Len, BSR Priority, and BSR Address. A receiver must collect all Frag RP Cnt RP addresses for a group range before updating that range.
section: 4.1.1
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
