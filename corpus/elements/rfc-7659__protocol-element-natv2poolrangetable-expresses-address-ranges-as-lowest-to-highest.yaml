document: rfc-7659
kind: protocol-element
summary: natv2PoolRangeTable expresses address ranges as lowest-to-highest address pairs rather than prefix notation, providing maximum flexibility for non-contiguous or arbitrarily bounded external address pools. It is indexed by NAT instance, pool index, and a conceptual row index.
