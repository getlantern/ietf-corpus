document: rfc-5764
kind: protocol-element
summary: The use_srtp DTLS extension allows peers to negotiate SRTP protection during the DTLS handshake. The client includes a list of acceptable SRTP protection profiles in the ClientHello extended hello; the server responds with a single chosen profile. Once negotiated, RTP/RTCP application data is protected solely using SRTP rather than the DTLS record-layer encoding.
section: "4.1"
topics:
    - tls
    - rtp
    - webrtc
    - crypto
