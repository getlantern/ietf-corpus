document: rfc-1907
kind: protocol-element
summary: authenticationFailure (snmpTraps 5) is a NOTIFICATION-TYPE signifying that the agent received a protocol message that is not properly authenticated. All SNMPv2 implementations must be capable of generating this trap, subject to snmpEnableAuthenTraps.
section: 2.4.1
topics:
    - snmp
    - security
