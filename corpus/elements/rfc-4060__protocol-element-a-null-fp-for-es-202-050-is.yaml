document: rfc-4060
kind: protocol-element
summary: A Null FP for ES 202 050 is defined by setting the content of both frames to null (filling the first 88 bits with zeros), computing the 4-bit CRC per Section 7.2.4 of ES 202 050, and padding 4 zeros to achieve octet alignment. Null FPs mark the end of a transmission segment.
section: 3.2.1.2
topics:
