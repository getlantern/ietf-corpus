document: rfc-8692
kind: normative-requirement
summary: When the RSA private key owner wishes to limit public key use exclusively to RSASSA-PSS with SHAKEs, the AlgorithmIdentifiers for RSASSA-PSS defined in Section 3 SHOULD be used as the algorithm field in the SubjectPublicKeyInfo sequence. Conforming client implementations that process RSASSA-PSS with SHAKE public keys MUST recognize the corresponding OIDs.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
