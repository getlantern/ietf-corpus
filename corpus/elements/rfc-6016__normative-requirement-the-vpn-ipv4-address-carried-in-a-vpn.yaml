document: rfc-6016
kind: normative-requirement
summary: The VPN-IPv4 address carried in a VPN-IPv4 RSVP_HOP object MUST be advertised by the sender into BGP with an associated locally allocated label, and that advertisement MUST be propagated throughout the VPN. Frames received with that label MUST be given to the local control plane for RSVP processing.
section: "3.1"
rfc2119_level: MUST
topics:
    - qos
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
