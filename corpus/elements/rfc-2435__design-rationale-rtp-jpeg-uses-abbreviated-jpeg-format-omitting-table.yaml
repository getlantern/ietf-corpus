document: rfc-2435
kind: design-rationale
summary: RTP/JPEG uses abbreviated JPEG format (omitting table headers from the bit stream) because table-specification data rarely changes from frame to frame, reducing overhead. An explicit RTP/JPEG header carries the information that would otherwise appear in JPEG frame and scan headers.
