document: rfc-5665
kind: design-rationale
summary: The cross-reference fields linking the netid registry and the uaddr format registry use numeric values. IANA is explicitly permitted to renumber these cross-references, but if it does so, both registries must be updated atomically to maintain consistency.
section: "5.3"
topics:
