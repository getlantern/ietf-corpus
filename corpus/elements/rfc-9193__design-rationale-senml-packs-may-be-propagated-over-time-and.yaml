document: rfc-9193
kind: design-rationale
summary: SenML packs may be propagated over time and via multiple entities, so the creator cannot assume shared out-of-band context with all consumers. Inline content format indication enables automatic interpretation without requiring prior negotiation or contextual knowledge.
