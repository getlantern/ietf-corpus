document: rfc-5740
kind: protocol-element
summary: The NORM_INFO message carries application-defined out-of-band context for a NormObject (e.g., MIME type). It is atomic — its size is limited to one NormSegmentSize — allowing rapid repair. NORM_FLAG_INFO in NORM_DATA signals its availability, and NORM_INFO SHALL be transmitted as the first message for any NormObject that has one.
section: 4.2.2
topics:
    - multicast
