document: rfc-4171
kind: normative-requirement
summary: When a backup server assumes the active server role it SHALL transmit heartbeats replacing its own IP/port for the active server fields, but MUST NOT change the original ordered list of backup server IP Address and TCP/UDP Port entries.
section: "2.8"
rfc2119_level: MUST NOT
