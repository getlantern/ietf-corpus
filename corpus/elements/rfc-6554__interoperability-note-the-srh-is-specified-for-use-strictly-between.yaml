document: rfc-6554
kind: interoperability-note
summary: The SRH is specified for use strictly between RPL routers within the same RPL routing domain, defined as a collection of RPL routers under a single administration. RPL Border Routers MUST NOT allow datagrams carrying an SRH to enter or exit the RPL routing domain.
section: "1"
topics:
