document: rfc-9441
kind: security-consideration
summary: 'Read access to the YANG module may expose sensitive operational information: an attacker could learn the F/R mode, bitmap management configuration, buffer sizes, and ACK request timing, enabling potential traffic analysis or targeted attacks. Read access should be controlled via NACM (RFC 8341).'
