document: rfc-9165
kind: design-rationale
summary: The .feature operator was introduced because Boolean valid/invalid validation is too simplistic for rapidly evolving data models. It allows a specification to identify extension points and accept extensions while marking them as such, rather than treating unknown extensions as wholesale invalid.
section: "4"
