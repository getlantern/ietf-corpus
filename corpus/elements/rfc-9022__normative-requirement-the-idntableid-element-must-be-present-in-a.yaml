document: rfc-9022
kind: normative-requirement
summary: The <idnTableId> element MUST be present in a domain object if the domain is an IDN; <uName> (Unicode FQDN) MUST be provided if available; <crDate> and <exDate> MUST be present if the domain has been allocated.
section: 5.1.1.1
rfc2119_level: MUST
