document: rfc-6016
kind: normative-requirement
summary: The ingress PE MUST recognize the IP Router Alert Option in Path messages arriving from a CE and intercept those messages for RSVP processing. This is the only point in the L3VPN where RAO processing is required.
section: "3.2"
rfc2119_level: MUST
topics:
    - qos
    - routing
