document: rfc-4456
kind: interoperability-note
summary: MEDs and IGP metrics may cause route reflection topologies to produce different route selections than a full IBGP mesh. Route selection equivalence can be preserved by ensuring intra-cluster IGP metrics are better than inter-cluster metrics, or by using LOCAL_PREF to encode MED values, or community-based policies.
section: "11"
topics:
