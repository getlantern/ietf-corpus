document: rfc-8733
kind: security-consideration
summary: Incorrect auto-bandwidth parameters in the AUTO-BANDWIDTH-ATTRIBUTES sub-TLVs could adversely affect LSP bandwidth reservations and the broader network. It is RECOMMENDED that these PCEP extensions only be activated on authenticated and encrypted sessions using TLS (RFC 8253) per BCP 195 (RFC 7525) for sessions across PCEs and PCCs of the same administrative authority.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
    - mpls
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
