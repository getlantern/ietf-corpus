document: rfc-3090
kind: normative-requirement
summary: Each RR set qualifying for zone membership in a locally secured zone MUST be signed by a key that is in the apex's KEY RR set and is a zone signing KEY RR. This updates RFC 2535 section 2.3.1.
section: 2.2.d
rfc2119_level: MUST
topics:
    - dns
    - security
