document: rfc-3065
kind: wire-format
summary: AS_CONFED_SEQUENCE (type 3) is an ordered set of Member AS Numbers in the local confederation that an UPDATE message has traversed. AS_CONFED_SET (type 4) is an unordered set of Member AS Numbers in the local confederation that the UPDATE message has traversed. Both extend the AS_PATH segment type field.
