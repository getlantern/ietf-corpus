document: rfc-2429
kind: design-rationale
summary: In the VRC scheme, thread 0 is the 'canonical' thread with highest priority; sync frame contents of higher-numbered threads are discarded when lower-numbered threads are received intact. Packets with lower thread numbers for a sync frame shall be delivered first under normal conditions.
section: "4.2"
topics:
    - rtp
    - realtime
