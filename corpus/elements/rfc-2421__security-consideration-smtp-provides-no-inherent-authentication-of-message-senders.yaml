document: rfc-2421
kind: security-consideration
summary: SMTP provides no inherent authentication of message senders, so the From and Sender header fields and the MAIL FROM address may be spoofed. In voice mail contexts, recognition of the sender's voice may provide identity assurance independent of header fields.
section: 10.2.1
topics:
    - email
    - security
    - voip
