document: rfc-4036
kind: design-rationale
summary: CMTS-based subscriber management duplicates CM-based filtering from RFC 2669 but is more secure because physical access to the CMTS is controlled by the network operator; a malicious user could tamper with cable modem software to disable its filtering policies, but cannot similarly subvert the CMTS.
section: "3"
topics:
