document: rfc-1332
kind: normative-requirement
summary: If negotiation about the remote IP-address is required and the peer did not provide the option in its Configure-Request, the IP-Address option SHOULD be appended to a Configure-Nak with a value acceptable as the remote IP-address or all-zeros to request the peer provide it.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
