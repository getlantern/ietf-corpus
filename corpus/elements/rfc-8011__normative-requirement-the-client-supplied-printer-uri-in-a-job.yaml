document: rfc-8011
kind: normative-requirement
summary: The Client-supplied Printer URI in a Job Creation request MUST be one of the values in the Printer's 'printer-uri-supported' attribute, and that attribute MUST contain at least one URI. The Printer generates the Job URI based on its configured security policy and the URI used by the Client in the Job Creation request.
section: "3.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
