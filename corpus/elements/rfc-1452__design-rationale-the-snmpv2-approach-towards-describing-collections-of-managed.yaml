document: rfc-1452
kind: design-rationale
summary: The SNMPv2 approach towards describing collections of managed objects is nearly a proper superset of SNMPv1. Both use ASN.1 as the basis for a formal descriptive notation, and SNMPv2 largely codifies existing practice based on extensive experience with the current framework.
