document: rfc-9628
kind: normative-requirement
summary: The F bit (flexible mode) MUST only change on the first packet of a key picture — a picture whose base spatial-layer frame is a keyframe (P=0, SID=0 or L=0, B=1). The F bit also MUST only be set to one if the I bit is also set to one.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
