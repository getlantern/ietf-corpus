document: rfc-7619
kind: normative-requirement
summary: INITIAL_CONTACT notifications MUST NOT be used to delete other IKE SAs based on the same peer identity when NULL authentication is in use, without additional verification that the existing IKE SAs are actually stale, because the peer identity is not authenticated.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
