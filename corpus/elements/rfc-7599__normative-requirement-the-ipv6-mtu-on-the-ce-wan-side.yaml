document: rfc-7599
kind: normative-requirement
summary: The IPv6 MTU on the CE WAN-side interface SHOULD be configured so that no fragmentation occurs within the MAP domain boundary. Fragmentation in MAP-T domains SHOULD be handled as described in Sections 4 and 5 of RFC 6145.
