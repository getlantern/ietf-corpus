document: rfc-4842
kind: interoperability-note
summary: 'A CEP pseudowire can be configured asymmetrically: one PE can use bandwidth reduction modes (DBA, fractional SPE) while the other sends the entire circuit unmodified. A PE that identifies such an asymmetric configuration based on comparing received CEP Options with its own configuration MAY report this to the operator but the pseudowire can still be established.'
section: "12.3"
topics:
    - realtime
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
