summary: The report block is 6 32-bit words (Block Length=5). The first word contains BT=20 (8 bits), Interval Metric flag I (2 bits), Loss/Discard Combination flag C (1 bit), reserved (5 bits), and Block Length (16 bits). The second word is the 32-bit SSRC of Source.
