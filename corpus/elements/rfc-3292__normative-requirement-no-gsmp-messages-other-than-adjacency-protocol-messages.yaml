document: rfc-3292
kind: normative-requirement
summary: No GSMP messages (other than adjacency protocol messages) may be sent across the link until the adjacency protocol has achieved synchronisation; all GSMP messages received on a link that does not currently have state synchronisation MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
