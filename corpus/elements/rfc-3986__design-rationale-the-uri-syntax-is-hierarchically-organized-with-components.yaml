document: rfc-3986
kind: design-rationale
summary: The URI syntax is hierarchically organized with components of decreasing significance from left to right, using "/", "?", and "#" as delimiters. This enables relative referencing, allowing document trees to be moved without changing internal references and to be served under multiple schemes simultaneously.
section: 1.2.3
