document: rfc-5219
kind: protocol-element
summary: The Continuation (C) flag in the ADU descriptor signals whether the following data is a continuation of an ADU frame split across multiple RTP packets. When splitting occurs, all packets for the same ADU carry the same total ADU size value in their descriptors, and each packet after the first has C=1.
section: "4.3"
topics:
    - rtp
    - realtime
