document: rfc-3265
kind: normative-requirement
summary: NOTIFY requests MUST contain a 'Subscription-State' header with a value of 'active', 'pending', or 'terminated'. If the value is 'active' or 'pending', the notifier SHOULD also include an 'expires' parameter; this mechanism MUST NOT be used to lengthen a subscription.
section: 3.2.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
