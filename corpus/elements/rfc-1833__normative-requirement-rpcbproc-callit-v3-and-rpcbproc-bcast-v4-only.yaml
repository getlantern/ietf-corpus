document: rfc-1833
kind: normative-requirement
summary: RPCBPROC_CALLIT (v3) and RPCBPROC_BCAST (v4) only send a response if the remote procedure was successfully executed; they are silent (no response) on failure. This behavior is intentional for broadcast use.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ip
