document: rfc-7798
kind: normative-requirement
summary: PACIs MUST NOT be fragmented (an FU must not carry a PACI) and MUST NOT be aggregated (an AP must not contain a PACI). The PACI payload MAY be a single NAL unit, an FU, or an AP.
section: 4.4.4
rfc2119_level: MUST
