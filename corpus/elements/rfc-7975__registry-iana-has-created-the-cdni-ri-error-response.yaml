document: rfc-7975
kind: registry
summary: IANA has created the 'CDNI RI Error response code' subregistry within the CDNI Parameters registry. Values are three-digit integers with registration policy 'Specification Required'. Initial entries (100, 400, 500–506) are registered by RFC 7975. New registrations must provide Code, Reason, Description, and Specification.
section: "6.2"
