document: rfc-3024
kind: normative-requirement
summary: Upon receipt of a valid Registration Reply, the foreign agent MUST update its visitor list to record that the mobile node has been granted a reverse tunnel and the delivery style expected, then MUST process incoming traffic accordingly and tunnel it from the care-of address to the home agent.
section: 4.2.2
rfc2119_level: MUST
topics:
    - mobility
    - ip
