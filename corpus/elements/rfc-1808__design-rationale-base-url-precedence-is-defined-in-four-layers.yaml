document: rfc-1808
kind: design-rationale
summary: 'Base URL precedence is defined in four layers from innermost (highest) to outermost: (1) base URL embedded in document content, (2) base URL of encapsulating entity, (3) URL used to retrieve the entity, (4) empty string (undefined). This layering allows composite documents to override retrieval context without affecting components that define their own base.'
section: "3"
topics:
