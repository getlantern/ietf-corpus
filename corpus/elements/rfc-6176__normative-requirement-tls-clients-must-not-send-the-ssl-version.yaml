document: rfc-6176
kind: normative-requirement
summary: TLS clients MUST NOT send the SSL version 2.0 compatible CLIENT-HELLO message format, and MUST NOT send any ClientHello message that specifies a protocol version less than { 0x03, 0x00 }.
