document: rfc-9584
kind: normative-requirement
summary: In SDP, the encoding name in a=rtpmap MUST be 'evc', the clock rate MUST be 90000, and optional parameters profile-id, level-id, toolset-id, max-recv-level-id, sprop-max-don-diff, sprop-depack-buf-bytes, and depack-buf-cap MUST be included in the a=fmtp line when present.
section: 7.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
