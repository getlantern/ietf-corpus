document: rfc-6936
kind: normative-requirement
summary: A middlebox MUST allow forwarding of IPv6 UDP datagrams with both zero and standard checksums using the same UDP port, and MUST NOT maintain separate flow state depending on whether a datagram's UDP checksum field is zero or non-zero.
section: "5"
rfc2119_level: MUST
topics:
