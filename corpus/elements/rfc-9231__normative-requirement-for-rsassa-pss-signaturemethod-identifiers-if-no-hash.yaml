document: rfc-9231
kind: normative-requirement
summary: For RSASSA-PSS SignatureMethod identifiers, if no hash function is specified, SHA-256 is the default (not SHA-1 as in RFC 8017). The default salt length SHALL be the number of octets in the hash value of the digest method if SaltLength is not specified. The TrailerField defaults to 1 (0xBC) when omitted.
section: 2.3.9
rfc2119_level: SHALL
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
