document: rfc-7802
kind: protocol-element
summary: The Kerberos V GSS-API PRF is defined as PRF+(K, L, S) = truncate(L, T0 || T1 || .. || Tn), where Tn = pseudo-random(K, n || S). K is the session key, L is the desired output length, S is the input string, and pseudo-random() is the Kerberos V PRF from RFC 3961.
