document: rfc-4860
kind: security-consideration
summary: RSVP Authentication does not provide confidentiality or traffic analysis protection. IPsec ESP (RFC 4303) may be used for confidentiality. Generic aggregate reservations carry more traffic analysis risk than E2E reservations since RSVP messages collectively represent a whole set of users.
section: "6"
topics:
    - security
    - privacy
    - qos
