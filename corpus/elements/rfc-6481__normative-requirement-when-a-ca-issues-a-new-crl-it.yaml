document: rfc-6481
kind: normative-requirement
summary: When a CA issues a new CRL, it replaces the previous CRL in the repository publication point. CAs MUST NOT continue to publish previous CRLs; the new CRL MUST replace (overwrite) previous CRLs signed by the same CA instance.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
