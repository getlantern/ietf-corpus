document: rfc-2480
kind: design-rationale
summary: The three requirements for security multiparts through gateways — applying security to entire MIME objects, converting MIME to non-MIME formats, and deploying security end-to-end — are fundamentally in conflict. It is possible to satisfy two at once but not all three simultaneously, and no compromise optimizes all three because real-world situations exist where any one requirement may be absolute.
section: "3"
topics:
