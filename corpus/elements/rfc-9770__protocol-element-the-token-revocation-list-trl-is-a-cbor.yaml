document: rfc-9770
kind: protocol-element
summary: The Token Revocation List (TRL) is a CBOR array of CBOR byte strings, each being the token hash of a revoked but not yet expired access token. The array MUST be treated as a set (order has no meaning). It is initialized as empty and accessible via the TRL endpoint at the AS.
section: "5"
topics:
