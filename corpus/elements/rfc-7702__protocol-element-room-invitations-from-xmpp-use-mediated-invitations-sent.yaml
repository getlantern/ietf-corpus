document: rfc-7702
kind: protocol-element
summary: Room invitations from XMPP use mediated invitations (sent through the room via XEP-0045 <invite/> element); the gateway translates these into a SIP REFER request to the conference focus with the invitee's address in the Refer-To header, as per RFC 4579 Section 5.5.
section: "5.7"
topics:
    - sip
    - realtime
