document: rfc-5268
kind: design-rationale
summary: The protocol deliberately avoids modifying base Mobile IPv6, IPv6 SLAAC, or DHCP. It introduces only a minimal optional extension to Neighbor Discovery (a Router Advertisement in response to UNA), keeping the fast handover mechanism as an orthogonal optimization layer.
