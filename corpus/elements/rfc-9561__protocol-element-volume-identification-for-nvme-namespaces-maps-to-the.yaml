document: rfc-9561
kind: protocol-element
summary: Volume identification for NVMe namespaces maps to the SCSI Device Identification VPD page (page code 83h). NVMe namespaces are identified via their EUI64 (8-octet) or NGUID (16-octet) identifiers encoded as XDR variable-length opaque in the sbv_designator field. PS_DESIGNATOR_T10 and PS_DESIGNATOR_NAME have no NVMe equivalent and cannot be used.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
