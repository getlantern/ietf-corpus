document: rfc-4606
kind: interoperability-note
summary: When a SONET STS-Nc SPE with N=3*X is requested, the Elementary Signal MUST always be STS-3c SPE and NCC MUST equal X. This means contiguous concatenation of three STS-1 SPEs cannot be directly requested; it must instead be coded using the STS-3c SPE signal type to facilitate SONET/SDH interworking.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
