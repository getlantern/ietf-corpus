document: rfc-7705
kind: design-rationale
summary: The AS migration mechanisms are designed to allow an ISP to change its ASN without coordinating simultaneous changes with potentially tens of thousands of customers. The asymmetric approach lets the ISP migrate internally while customers gradually update their configurations, avoiding mass-outage risk from ASN mismatch.
section: "1"
topics:
