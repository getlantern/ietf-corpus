document: rfc-3339
kind: design-rationale
summary: Rarely used options are likely to contain parser bugs discovered only in production. The profile therefore omits most ISO 8601 optional features, retaining only fractional seconds as optional, expected to be used only by applications requiring strict ordering or unusual precision.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
