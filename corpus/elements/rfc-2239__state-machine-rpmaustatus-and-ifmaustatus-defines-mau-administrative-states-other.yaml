document: rfc-2239
kind: state-machine
summary: 'rpMauStatus (and ifMauStatus) defines MAU administrative states: other(1), unknown(2), operational(3), standby(4), shutdown(5), reset(6). Writing reset(6) causes a power-cycle equivalent reset; setting a mixing-type MAU or AUI to standby(4) causes it to enter shutdown instead.'
