document: rfc-5454
kind: normative-requirement
summary: The home agent MUST check that inner IPv6 packets received over the tunnel have a source address falling under the registered IPv6 prefix(es) for that mobile node. Packets with unregistered outer or inner source addresses SHOULD be dropped.
section: 3.3.2
rfc2119_level: MUST
topics:
    - ip
    - mobility
    - security
