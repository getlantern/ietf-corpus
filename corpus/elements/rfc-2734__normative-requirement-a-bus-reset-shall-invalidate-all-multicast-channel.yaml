document: rfc-2734
kind: normative-requirement
summary: A bus reset SHALL invalidate all multicast channel mappings and zero all MCAP advertisement interval timers. Nodes without prior channel ownership SHALL NOT attempt channel allocation or send MCAP solicitations until at least ten seconds after bus reset completion.
section: "9.10"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
