document: rfc-2301
kind: protocol-element
summary: 'TIFF-FX defines six facsimile profiles: S (minimal B&W, MH/T.4), F (extended B&W, MH/MR/MMR per T.4/T.6), J (lossless B&W JBIG per T.85/T.82), C (lossy color JPEG per T.42/T.81), L (lossless color JBIG per T.43/T.82), and M (Mixed Raster Content per T.44). Profile hierarchy has S as root, C branching from S for color.'
section: "1"
