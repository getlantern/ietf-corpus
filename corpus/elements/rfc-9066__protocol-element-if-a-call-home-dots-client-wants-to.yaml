document: rfc-9066
kind: protocol-element
summary: 'If a Call Home DOTS client wants to redirect a Call Home DOTS server to another Call Home DOTS client, it sends a Non-confirmable PUT request to the predefined resource ''.well-known/dots/redirect'' with three attributes: ''alt-ch-client'' (mandatory FQDN of alternate client), ''alt-ch-client-record'' (optional list of IP addresses), and ''ttl'' (optional time-to-live in seconds). These attributes MUST NOT be used for base DOTS signal channel operations.'
section: 5.2.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
