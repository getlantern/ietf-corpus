document: rfc-8685
kind: normative-requirement
summary: Unassigned bits in the H-PCE-CAPABILITY TLV Flags field MUST be set to 0 on transmission and MUST be ignored on receipt. The same rule applies to the H-PCE-FLAG TLV.
