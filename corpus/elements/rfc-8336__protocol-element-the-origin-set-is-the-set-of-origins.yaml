document: rfc-8336
kind: protocol-element
summary: The Origin Set is the set of origins a given connection might be used for. By default it is uninitialized, meaning standard HTTP/2 coalescing rules from RFC 7540 Section 9.1.1 apply. It is initialized when the first ORIGIN frame is successfully processed.
section: "2.3"
