document: rfc-3739
kind: protocol-element
summary: The biometricInfo extension (id-pe-biometricInfo, OID 1.3.6.1.5.5.7.1.2) is an optional non-critical extension storing a SEQUENCE OF BiometricData, each containing a type indicator, hash algorithm, hash value, and optional source URI for authenticating biometric templates without storing the raw biometric data.
