document: rfc-8149
kind: protocol-element
summary: The 'Preferable P2MP-TE Tree Exists' notification is defined as sub-code 13 in PathErr messages with Notify error code 25. It is sent by a midpoint LSR (solicited or unsolicited) to inform the ingress node that a better P2MP-TE LSP tree exists.
section: "5.2"
topics:
