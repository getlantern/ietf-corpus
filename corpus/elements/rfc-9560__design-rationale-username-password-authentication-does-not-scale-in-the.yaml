document: rfc-9560
kind: design-rationale
summary: Username/password authentication does not scale in the RDAP ecosystem because it requires users to maintain credentials with hundreds of different registry operators and does not provide sufficient identity detail for fine-grained access control. Federated authentication via OpenID Connect allows clients to reuse a single credential across multiple RDAP servers while enabling richer identity claims.
section: "1.1"
topics:
    - oauth
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
