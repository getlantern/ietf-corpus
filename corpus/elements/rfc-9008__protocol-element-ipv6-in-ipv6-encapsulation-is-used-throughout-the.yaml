document: rfc-9008
kind: protocol-element
summary: IPv6-in-IPv6 encapsulation is used throughout the RPL data plane to allow RPL artifacts (RPI, RH3) to be added or removed by intermediate routers without violating the IPv6 rule against on-the-fly header modification. The outer header is addressed either to the root (upward) or to the end host or 6LR parent of a RUL (downward).
section: "6"
topics:
    - ip
    - routing
