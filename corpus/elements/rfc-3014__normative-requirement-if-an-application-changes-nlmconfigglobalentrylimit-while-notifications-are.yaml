document: rfc-3014
kind: normative-requirement
summary: If an application changes nlmConfigGlobalEntryLimit while Notifications are in the log, the oldest Notifications MUST be discarded to bring the log down to the new limit; nlmConfigGlobalEntryLimit MUST take precedence over nlmConfigGlobalAgeOut and nlmConfigLogEntryLimit.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
