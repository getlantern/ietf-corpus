document: rfc-9647
kind: design-rationale
summary: The 'default-apply' boolean on both mac-key-set and dtls objects enables automatic propagation of security credentials to newly created interfaces, reducing the risk of an interface being inadvertently left unsecured when added to a router already using MAC or DTLS.
