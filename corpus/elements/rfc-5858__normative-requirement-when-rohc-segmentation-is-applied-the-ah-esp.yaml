document: rfc-5858
kind: normative-requirement
summary: When ROHC segmentation is applied, the AH/ESP sequence number MUST be incremented by one for each segment transmitted over the ROHC channel, enabling the remote IPsec implementation to identify segments by a contiguous range of sequence numbers.
section: "4.3"
rfc2119_level: MUST
topics:
