document: rfc-3287
kind: normative-requirement
summary: An entry MUST NOT exist in the active state in dsmonAggControlTable unless all objects have appropriate values. Activating a dsmonAggControlEntry causes the agent to create exactly 64 associated dsmonAggProfileEntries; deactivating it deletes them.
section: "4"
rfc2119_level: MUST NOT
