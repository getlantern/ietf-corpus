document: rfc-5533
kind: normative-requirement
summary: When a Locator List is included in I2, R2, or I2bis, the CGA Parameter Data Structure option MUST also be included so the receiver can verify the locators. The CGA Signature option MUST additionally be included when any locator in the list uses CGA rather than HBA for verification.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
