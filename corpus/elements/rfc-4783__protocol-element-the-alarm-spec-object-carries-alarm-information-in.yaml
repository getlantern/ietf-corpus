document: rfc-4783
kind: protocol-element
summary: The ALARM_SPEC object carries alarm information in Path and Resv messages. It uses the same format as the ERROR_SPEC object but with class number 198 (C-Num 11bbbbbb). C-Types 1 and 2 are reserved; C-Types 3 and 4 are IPv4 and IPv6 IF_ID ALARM_SPEC objects respectively.
section: "3.1"
topics:
