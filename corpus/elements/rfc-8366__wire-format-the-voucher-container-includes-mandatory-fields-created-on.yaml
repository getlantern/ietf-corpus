document: rfc-8366
kind: wire-format
summary: 'The voucher container includes mandatory fields ''created-on'' (yang:date-and-time), ''assertion'' (enumeration: verified/logged/proximity), ''serial-number'' (string), and ''pinned-domain-cert'' (binary, DER-encoded X.509v3 certificate). Optional fields include ''expires-on'', ''idevid-issuer'', ''domain-cert-revocation-checks'', ''nonce'' (8–32 bytes binary), and ''last-renewal-date''.'
