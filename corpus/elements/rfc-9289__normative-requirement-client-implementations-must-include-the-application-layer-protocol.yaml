document: rfc-9289
kind: normative-requirement
summary: Client implementations MUST include the application_layer_protocol_negotiation(16) extension in their ClientHello and MUST include the 'sunrpc' protocol identifier. Server implementations MUST include the same extension in their ServerHello with only the 'sunrpc' identifier.
section: "5"
rfc2119_level: MUST
topics:
