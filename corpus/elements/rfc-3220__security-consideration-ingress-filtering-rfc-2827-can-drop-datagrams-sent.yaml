document: rfc-3220
kind: security-consideration
summary: Ingress filtering (RFC 2827) can drop datagrams sent by a visiting mobile node because the source address (home address) does not match the prefix of the visited link. Reverse tunneling (requested via the 'T' bit) addresses this by routing outbound mobile-node datagrams through the foreign agent back to the home agent before onward delivery.
section: "5.6"
topics:
    - mobility
    - security
    - ip
