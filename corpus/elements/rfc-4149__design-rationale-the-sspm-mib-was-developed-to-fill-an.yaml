document: rfc-4149
kind: design-rationale
summary: 'The SSPM-MIB was developed to fill an explicit gap in the RMON/IPPM framework: existing IETF work defined passive monitoring and performance metrics, but did not define a remotely configurable active traffic generation capability (''active probe''). This MIB addresses that void.'
