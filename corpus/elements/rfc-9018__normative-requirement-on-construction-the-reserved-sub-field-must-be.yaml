document: rfc-9018
kind: normative-requirement
summary: On construction, the Reserved Sub-Field MUST be set to zero octets. On Server Cookie verification, the server MUST NOT enforce those fields to be zero; the Hash must be computed with the received Reserved value as-is.
section: "4.2"
rfc2119_level: MUST
topics:
