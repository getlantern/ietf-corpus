document: rfc-5604
kind: normative-requirement
summary: The CE-bound TDM IWF SHOULD use the sequence number in the control word to detect lost (LOPS) and mis-ordered packets. If RTP header is used, the RTP sequence numbers MAY be used for the same purposes.
