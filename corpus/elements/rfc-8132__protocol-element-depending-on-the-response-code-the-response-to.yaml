document: rfc-8132
kind: protocol-element
summary: Depending on the response code, the response to a FETCH request is cacheable; the request body is part of the cache key. A 2.05 (Content) response is the typical cacheable response for FETCH. The Max-Age option in the response has equivalent semantics to its use in a GET.
section: "2"
topics:
