document: rfc-3672
kind: protocol-element
summary: The SubtreeSpecification syntax provides a general-purpose mechanism for specifying a subset of entries in a DIT subtree. It consists of a base entry, optional specificExclusions, minimum/maximum depth bounds, and an optional specificationFilter (a boolean expression over objectClass OIDs). Its LDAP OID is 1.3.6.1.4.1.1466.115.121.1.45.
