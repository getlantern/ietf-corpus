document: rfc-3437
kind: normative-requirement
summary: For FCS-ALT in the LCP Allow Options AVP, the LNS SHOULD only accept FCS-ALT types listed in the AVP, even though FCS is stripped at the LAC and the option has no consequence to the LNS itself.
