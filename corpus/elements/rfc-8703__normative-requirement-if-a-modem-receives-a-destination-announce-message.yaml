document: rfc-8703
kind: normative-requirement
summary: If a modem receives a Destination Announce Message from a router containing an unknown Link Identifier, the modem MUST terminate the session by issuing a Session Termination Message with status code 131 ('Invalid Destination') and transition to the Session Termination state.
section: "2"
rfc2119_level: MUST
topics:
    - routing
