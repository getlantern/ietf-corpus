document: rfc-891
kind: wire-format
summary: 'Serial links with program-interrupt interfaces use character-stuffing framing: async links begin with DLE-STX and end with DLE-ETX; sync links prefix SYN-SYN before the DLE-STX. Within the data portion, each DLE byte is escaped as DLE-DLE. Time-fill uses DEL between frames or DLE-DEL within data. No checksum is transmitted.'
section: A.1
topics:
    - ip
