document: rfc-8362
kind: wire-format
summary: Each TLV in the Extended LSA body encodes a 2-octet Type, a 2-octet Length (value portion only, excluding padding), and a variable-length Value field. TLVs and nested sub-TLVs are padded to 4-octet alignment; padding bytes are not counted in the Length field.
