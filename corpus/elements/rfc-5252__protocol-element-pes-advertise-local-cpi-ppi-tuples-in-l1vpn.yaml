document: rfc-5252
kind: protocol-element
summary: PEs advertise local <CPI, PPI> tuples in L1VPN LSAs. In steady state, all PEs associated with a particular L1VPN will have identical local PITs for that L1VPN, enabling full mesh knowledge of remote PE-to-CE links.
