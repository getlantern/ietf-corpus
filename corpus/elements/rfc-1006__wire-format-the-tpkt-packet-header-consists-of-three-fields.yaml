document: rfc-1006
kind: wire-format
summary: 'The TPKT packet header consists of three fields: vrsn (8 bits), reserved (8 bits), and packet length (16 bits, min=7, max=65535). The packet length encodes the total byte count of the entire TPKT including the header, permitting a maximum TPDU size of 65531 octets.'
