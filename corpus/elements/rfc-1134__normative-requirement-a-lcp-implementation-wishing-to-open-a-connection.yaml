document: rfc-1134
kind: normative-requirement
summary: A LCP implementation wishing to open a connection MUST transmit a Configure-Request (Code=1) packet. Upon reception of a Configure-Request, an appropriate reply MUST be transmitted. The Restart timer is started after transmission to guard against packet loss.
section: 4.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
