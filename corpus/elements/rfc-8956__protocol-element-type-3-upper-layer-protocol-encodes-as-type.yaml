document: rfc-8956
kind: protocol-element
summary: Type 3 (Upper-Layer Protocol) encodes as type (1 octet) followed by {numeric_op, value} pairs matching the first Next Header value in IPv6 packets that is not an extension header. Values SHOULD be encoded as a single octet (numeric_op len=00).
section: "3.3"
topics:
