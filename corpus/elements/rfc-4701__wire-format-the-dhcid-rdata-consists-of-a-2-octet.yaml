document: rfc-4701
kind: wire-format
summary: The DHCID RDATA consists of a 2-octet identifier type code (network byte order), followed by a 1-octet digest type code, followed by n octets of digest. For SHA-256 (digest type 1), the digest is 32 octets, making the total RDATA 35 octets.
