document: rfc-2440
kind: protocol-element
summary: 'Three S2K specifier types convert passphrases to symmetric keys: Simple (type 0x00, direct hash of passphrase), Salted (type 0x01, 8-octet salt prepended before hashing), and Iterated-and-Salted (type 0x03, 8-octet salt plus an exponentially-encoded octet count for repeated hashing). All are used to encrypt private key material and symmetric-key ESK packets.'
section: 3.6.1
topics:
    - crypto
    - security
