document: rfc-4364
kind: wire-format
summary: 'A Route Distinguisher is 8 bytes: a 2-byte type field followed by a 6-byte value. Type 0 encodes a 2-byte ASN administrator and 4-byte assigned number; Type 1 encodes a 4-byte IP address administrator and 2-byte assigned number; Type 2 encodes a 4-byte 4-octet ASN administrator and 2-byte assigned number.'
section: "4.2"
