document: rfc-8843
kind: design-rationale
summary: Requiring the DTLS client to include the 'use_srtp' extension in the initial ClientHello (even when DTLS-SRTP is not currently negotiated) avoids the need for a DTLS renegotiation later if DTLS-SRTP encrypted media is added to the BUNDLE group mid-session.
