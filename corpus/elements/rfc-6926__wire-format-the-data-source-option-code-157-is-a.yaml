document: rfc-6926
kind: wire-format
summary: The data-source option (code 157) is a 1-octet flags field; the low-order R bit indicates whether the most recent state change for an IP address occurred on the local server (0) or a remote server (1). Unassigned bits MUST be ignored.
section: 6.2.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
