document: rfc-7523
kind: normative-requirement
summary: The authorization server MUST reject a JWT that is not valid in all respects per the JWT specification. The authorization server MUST validate the JWT according to all listed criteria before issuing an access token or relying on client authentication.
section: "3"
rfc2119_level: MUST
topics:
