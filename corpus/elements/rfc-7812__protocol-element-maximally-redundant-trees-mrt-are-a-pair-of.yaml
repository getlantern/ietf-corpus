document: rfc-7812
kind: protocol-element
summary: Maximally Redundant Trees (MRT) are a pair of directed spanning trees providing maximally disjoint paths toward a common root. Only cut-links and cut-vertices are shared between the trees. Each router stores primary, MRT-Blue, and MRT-Red next hops for each destination.
