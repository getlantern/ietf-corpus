document: rfc-2392
kind: security-consideration
summary: The 'mid:' and 'cid:' URL values disclose no more about the originator's environment than the corresponding Message-ID and Content-ID header values already do. Where confidentiality is a concern, originators using these URL schemes must take the same precautions already required for Message-ID and Content-ID headers in email.
section: "3"
topics:
    - security
    - email
    - privacy
