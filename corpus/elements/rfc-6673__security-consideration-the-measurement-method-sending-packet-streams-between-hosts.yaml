document: rfc-6673
kind: security-consideration
summary: The measurement method — sending packet streams between hosts through intervening networks — could be abused for denial-of-service attacks against the destination or intervening networks. Bilateral or multilateral agreements on timing, size, and frequency of measurements are recommended.
section: "9.1"
topics:
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
