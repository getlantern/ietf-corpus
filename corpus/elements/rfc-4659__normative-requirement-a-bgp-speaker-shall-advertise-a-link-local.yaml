document: rfc-4659
kind: normative-requirement
summary: A BGP speaker SHALL advertise a link-local address in the Next Hop field if and only if it shares a common subnet with the peer the route is being advertised to; in all other cases only the global IPv6 address shall be advertised.
section: 3.2.1.1
rfc2119_level: SHOULD
topics:
    - bgp
    - ip
