document: rfc-4120
kind: normative-requirement
summary: Application servers MUST either perform transited-realm checks themselves or reject cross-realm tickets without the TRANSITED-POLICY-CHECKED flag set. If any transited realm is untrusted to authenticate the client principal, the authentication attempt MUST be rejected.
section: "2.7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
