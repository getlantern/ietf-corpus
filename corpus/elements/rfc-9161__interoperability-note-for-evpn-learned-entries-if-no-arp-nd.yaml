document: rfc-9161
kind: interoperability-note
summary: For EVPN-learned entries, if no ARP/ND Extended Community is received with the RT2, the PE adds a configured R Flag and O Flag (MAY default to 1), providing backwards compatibility with RFC 7432 PEs that do not support the ARP/ND Extended Community of RFC 9047.
