document: rfc-9010
kind: normative-requirement
summary: The two most significant bits of the ARO/EARO Status field MUST be set to 0 by the sender and ignored by the receiver; the range of valid ARO/EARO Status values is reduced from 0–255 to 0–63.
section: "8"
rfc2119_level: MUST
