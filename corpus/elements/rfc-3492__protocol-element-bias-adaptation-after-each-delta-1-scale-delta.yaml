document: rfc-3492
kind: protocol-element
summary: 'Bias adaptation after each delta: (1) scale delta dividing by damp (first delta) or 2 (subsequent); (2) increase by delta/numpoints to compensate for longer string; (3) repeatedly divide by (base-tmin) until below threshold; (4) set bias = base*divisions + (base-tmin+1)*delta/(delta+skew).'
section: "3.4"
topics:
