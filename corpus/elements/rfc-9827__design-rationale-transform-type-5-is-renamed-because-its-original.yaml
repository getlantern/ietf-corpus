document: rfc-9827
kind: design-rationale
summary: Transform Type 5 is renamed because its original name ('Extended Sequence Numbers') implied it could only negotiate ESN usage, which was too narrow. The rename enables future Transform IDs to cover additional sequence number handling modes, such as full 64-bit transmission, omitted counters, and multicast SA cases where replay protection is not possible.
section: "2"
topics:
