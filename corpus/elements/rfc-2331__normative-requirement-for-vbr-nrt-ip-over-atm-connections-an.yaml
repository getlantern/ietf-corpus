document: rfc-2331
kind: normative-requirement
summary: For VBR-nrt IP over ATM connections, an MBS value of N*(Maximum MTU) is RECOMMENDED where N>=1 with a default of 2 and Maximum MTU equals 192 cells (consistent with an IP MTU of 9180 bytes per RFC 1626).
section: Appendix B
rfc2119_level: RECOMMENDED
topics:
    - ip
    - qos
