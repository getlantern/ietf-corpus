document: rfc-5942
kind: protocol-element
summary: 'A Redirect message can signal that an individual address is on-link: if the Target and Destination Address of the Redirect are identical, the Target Address is treated as on-link and the Destination Cache (not the Prefix List) is updated per RFC 4861 Section 8.'
