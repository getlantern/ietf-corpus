document: rfc-3986
kind: security-consideration
summary: Back-end transcoding of URIs by intermediaries (gateways, proxies) that re-encode percent-encoded octets under a different character set can silently transform a URI into one identifying a different resource, potentially bypassing access controls.
section: "7.3"
topics:
    - security
