document: rfc-4302
kind: protocol-element
summary: The SPI is a 32-bit value used by a receiver to identify the SA to which an incoming packet is bound. SPI values 1–255 are reserved by IANA; SPI value 0 is reserved for local implementation use and MUST NOT be sent on the wire.
section: "2.4"
