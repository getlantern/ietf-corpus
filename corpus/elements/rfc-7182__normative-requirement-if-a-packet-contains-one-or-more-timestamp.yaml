document: rfc-7182
kind: normative-requirement
summary: If a packet contains one or more TIMESTAMP TLVs and one or more ICV TLVs, the TIMESTAMP TLVs (and any other Packet TLVs) MUST be added to the packet before the ICV TLVs, so that timestamps are covered by the ICV calculation.
section: "8.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
