document: rfc-3315
kind: protocol-element
summary: 'Each DHCP client and server has exactly one DUID (DHCP Unique Identifier), which must be globally unique and stable over time. Three types are defined: DUID-LLT (link-layer plus time), DUID-EN (vendor enterprise number), and DUID-LL (link-layer only); max 128 octets excluding the 2-octet type code.'
