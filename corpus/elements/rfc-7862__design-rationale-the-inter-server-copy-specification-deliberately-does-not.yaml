document: rfc-7862
kind: design-rationale
summary: The inter-server copy specification deliberately does not mandate the server-to-server copy protocol, allowing homogeneous environments to use optimized mechanisms (block-level replication, shared SAN without data transfer) while still specifying how NFSv4.x can be used when servers are willing.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
