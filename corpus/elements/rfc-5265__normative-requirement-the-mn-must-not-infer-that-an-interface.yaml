document: rfc-5265
kind: normative-requirement
summary: 'The MN MUST NOT infer that an interface is connected to the internal network unless: (1) a successful registration has been completed through that interface to the i-HA, (2) the registration reply contained a TNC extension, and (3) the connection status of the interface has not changed since that registration.'
section: 3.2.3
rfc2119_level: MUST NOT
topics:
    - security
    - vpn
    - mobility
