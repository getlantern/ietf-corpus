document: rfc-1989
kind: design-rationale
summary: LQM is deliberately divided into a fully-specified 'mechanism' (the LQR packet and procedures) and an unspecified 'policy' (how to judge quality and react). This allows two implementations with different policies to interoperate, and encourages experimentation.
