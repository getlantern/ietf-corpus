document: rfc-8973
kind: normative-requirement
summary: Before retrying a failed S-NAPTR lookup (e.g., NXDOMAIN or timeout), a DOTS client MUST wait a time period appropriate for the encountered error. If no DOTS-specific S-NAPTR records are retrieved, the discovery procedure fails for that domain/interface/IP-version combination.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
