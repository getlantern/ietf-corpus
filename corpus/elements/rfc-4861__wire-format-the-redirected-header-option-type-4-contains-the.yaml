document: rfc-4861
kind: wire-format
summary: The Redirected Header option (Type 4) contains the original redirecting packet's IP header plus data, truncated so the Redirect message does not exceed the IPv6 minimum MTU. Reserved fields (16-bit + 32-bit) MUST be initialized to zero and ignored on receipt.
section: 4.6.3
topics:
    - ip
