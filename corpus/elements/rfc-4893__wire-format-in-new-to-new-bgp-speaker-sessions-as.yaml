document: rfc-4893
kind: wire-format
summary: In NEW-to-NEW BGP speaker sessions, AS numbers in AS_PATH and AGGREGATOR attributes are encoded as 4-octet (32-bit) entities rather than the legacy 2-octet encoding. Existing 2-octet AS numbers are mapped to 4-octet by zero-padding the two high-order octets.
section: "3"
topics:
