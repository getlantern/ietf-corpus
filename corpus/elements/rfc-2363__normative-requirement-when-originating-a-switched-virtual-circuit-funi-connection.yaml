document: rfc-2363
kind: normative-requirement
summary: When originating a switched virtual circuit FUNI connection, the caller MUST request in the SETUP message either VC-multiplexed PPP, LLC-encapsulated PPP, or both; the called implementation MUST be able to accept an incoming call offering LLC-encapsulated PPP.
section: "7"
rfc2119_level: MUST
topics:
    - ip
