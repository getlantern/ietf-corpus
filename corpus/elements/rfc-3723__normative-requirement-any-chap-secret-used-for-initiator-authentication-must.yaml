document: rfc-3723
kind: normative-requirement
summary: Any CHAP secret used for initiator authentication MUST NOT be configured for target authentication, and vice versa. If an iSCSI implementation can function as both initiator and target, different CHAP secrets and identities MUST be configured for these two roles.
section: 2.4.1
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
