document: rfc-5905
kind: protocol-element
summary: 'NTP defines six association modes: Symmetric Active (1), Symmetric Passive (2), Client (3), Server (4), Broadcast Server (5), and Broadcast Client (6). A client (mode 3) sends mode-3 packets and receives mode-4 responses; symmetric active peers exchange mode-1 packets. Persistent associations are mobilized at startup; ephemeral associations are mobilized on packet arrival and demobilized on error or timeout.'
section: "3"
