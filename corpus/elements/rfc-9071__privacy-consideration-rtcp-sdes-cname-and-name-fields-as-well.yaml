document: rfc-9071
kind: privacy-consideration
summary: RTCP SDES CNAME and NAME fields, as well as conference notifications, may reveal sensitive personal information. Real-time text services are frequently used by deaf and hard-of-hearing individuals who may not wish to disclose this characteristic; conference systems incorporating the mixer MAY need to be designed with confidentiality of such characteristics in mind.
section: "10"
topics:
    - privacy
    - realtime
    - rtp
