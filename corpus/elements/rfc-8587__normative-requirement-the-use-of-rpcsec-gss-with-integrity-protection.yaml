document: rfc-8587
kind: normative-requirement
summary: The use of RPCSEC_GSS with integrity protection is RECOMMENDED in all cases when interrogating location information. When integrity protection cannot be used, returned location information should be subject to filtering to eliminate untrusted network addresses; if neither is possible, the client should ignore trunking and replica information.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
