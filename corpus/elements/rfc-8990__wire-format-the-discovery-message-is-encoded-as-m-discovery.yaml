document: rfc-8990
kind: wire-format
summary: 'The Discovery message is encoded as [M_DISCOVERY, session-id, initiator, objective] where ''initiator'' is the globally unique IP address of the initiator used solely for Session ID disambiguation. The objective MUST be exactly one of: a Discovery Objective, a Negotiation Objective (rapid mode), or a Synchronization Objective (rapid mode).'
section: 2.8.4
topics:
    - cbor
