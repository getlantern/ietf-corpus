document: rfc-8866
kind: protocol-element
summary: Attributes ('a=') are the primary extensibility mechanism for SDP. Property attributes take no value ('a=<name>'), while value attributes take the form 'a=<name>:<value>'. Attribute names MUST use the US-ASCII subset of UTF-8; attribute values MAY use any octet except Nul, LF, and CR.
section: "5.13"
topics:
    - realtime
