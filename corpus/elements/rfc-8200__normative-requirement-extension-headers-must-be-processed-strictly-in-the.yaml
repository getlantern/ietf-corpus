document: rfc-8200
kind: normative-requirement
summary: Extension headers must be processed strictly in the order they appear in the packet; a receiver must not scan through a packet looking for a particular kind of extension header and process that header prior to processing all preceding ones.
section: "4"
rfc2119_level: MUST
topics:
    - ip
