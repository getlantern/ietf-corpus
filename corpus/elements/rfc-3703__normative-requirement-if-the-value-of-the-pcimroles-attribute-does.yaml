document: rfc-3703
kind: normative-requirement
summary: If the value of the pcimRoles attribute does not conform to the format '<RoleName>[&&<RoleName>]*' with role names in alphabetical UCS-2 collating order, the attribute is malformed and the policy rule SHOULD be treated as disabled.
section: "5.3"
rfc2119_level: SHOULD
