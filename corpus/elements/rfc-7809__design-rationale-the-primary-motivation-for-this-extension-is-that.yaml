document: rfc-7809
kind: design-rationale
summary: The primary motivation for this extension is that VTIMEZONE components can be larger octet-wise than the events or tasks that use them, and in many deployments these definitions are unchanging. This is especially problematic for mobile/limited devices with constrained bandwidth, CPU, and energy resources.
section: "1"
