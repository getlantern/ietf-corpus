document: rfc-7140
kind: state-machine
summary: Leaf node Z allocates label L and sends HSMP-D Label Mapping <X,Y,L> to upstream LSR U, then waits for HSMP-U Label Mapping <X,Y,Lu> from U. Upon receipt, if no forwarding state exists for upstream <X,Y>, Z creates state to push label Lu onto traffic to be forwarded over the HSMP LSP.
section: 3.4.1
topics:
    - mpls
    - routing
