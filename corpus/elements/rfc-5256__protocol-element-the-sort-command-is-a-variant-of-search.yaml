document: rfc-5256
kind: protocol-element
summary: The SORT command is a variant of SEARCH with sorting semantics. Its arguments are a parenthesized list of sort criteria, a mandatory charset specification, and one or more searching criteria. It returns matching messages in an untagged SORT response sorted in ascending order by the specified criteria.
