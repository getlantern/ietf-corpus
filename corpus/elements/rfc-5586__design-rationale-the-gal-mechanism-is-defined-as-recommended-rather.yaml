document: rfc-5586
kind: design-rationale
summary: The GAL mechanism is defined as RECOMMENDED (rather than mandatory) for identifying MPLS OAM packets when IP-based mechanisms (TTL expiry, 127/8 addressing) are unavailable, but MAY also be used in addition to IP-based mechanisms in environments where both are possible.
