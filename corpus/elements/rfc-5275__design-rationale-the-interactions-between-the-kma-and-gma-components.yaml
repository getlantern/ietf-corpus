document: rfc-5275
kind: design-rationale
summary: The interactions between the KMA and GMA components are explicitly left out of scope. Separating them would require the KMA to duplicate validation checks against a potentially corrupt GMA, blurring the functional boundary. Proprietary trust mechanisms are recommended to support separation.
section: "2"
topics:
