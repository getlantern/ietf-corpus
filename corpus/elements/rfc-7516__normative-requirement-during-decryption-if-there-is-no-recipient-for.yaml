document: rfc-7516
kind: normative-requirement
summary: During decryption, if there is no recipient for which all decryption steps succeeded, the JWE MUST be considered invalid. In the multi-recipient case, the encrypted content for at least one recipient MUST successfully validate.
section: "5.2"
rfc2119_level: MUST
topics:
    - jose
    - crypto
