document: rfc-7846
kind: protocol-element
summary: 'The swarm action element (ppsp_tp_swarm_action_t) identifies the action to take in a named swarm: swarm_id (string), action (''JOIN''|''LEAVE''), and peer_mode (''SEEDER''|''LEECH''). Multiple swarm action elements may be included in a single CONNECT request.'
section: 3.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
