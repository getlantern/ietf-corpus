document: rfc-6364
kind: normative-requirement
summary: In TIAS-based bitrate calculations, packet size SHALL include all headers and payload excluding IP and UDP headers. In AS-based calculations, packet size SHALL include all headers and payload plus IP and UDP headers.
section: "4.7"
rfc2119_level: SHALL
