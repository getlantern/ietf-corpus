document: rfc-3986
kind: design-rationale
summary: 'The URI character set is restricted to basic Latin letters, digits, and a few special characters to support global transcription: URIs must be enterable on keyboards across languages and locales, and readable from non-digital media (e.g., napkin, billboard). Transcribability was prioritized over expressiveness.'
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
