document: rfc-9457
kind: protocol-element
summary: The 'status' member is a JSON number indicating the HTTP status code generated by the origin server. It is advisory only; generators MUST use the same status code in the actual HTTP response to ensure correct behavior by generic HTTP software.
section: 3.1.2
topics:
