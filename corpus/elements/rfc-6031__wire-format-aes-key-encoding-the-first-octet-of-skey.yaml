summary: 'AES key encoding: the first octet of sKey (OCTET STRING) SHALL become key byte index 0 as used in FIPS 197 key expansion; successive octets map to increasing key byte indices. Conformance SHALL be verified against the FIPS 197 Appendix A test vector (TLV: 04 10 2b7e151628aed2a6abf7158809cf4f3c).'
