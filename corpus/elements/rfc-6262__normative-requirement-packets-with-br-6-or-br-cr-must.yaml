document: rfc-6262
kind: normative-requirement
summary: Packets with BR = 6 or BR > CR MUST be discarded. The value 6 is reserved for the rate index; any packet received with this value MUST be discarded.
section: "3.3"
rfc2119_level: MUST
topics:
