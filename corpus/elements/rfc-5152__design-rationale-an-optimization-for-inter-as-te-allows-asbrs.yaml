document: rfc-5152
kind: design-rationale
summary: An optimization for inter-AS TE allows ASBRs to flood TE information for inter-ASBR links even when no IGP adjacency exists over those links. This allows ingress ASBRs to make better route selections and reduces call setup failure due to unsatisfied constraints on inter-ASBR links.
