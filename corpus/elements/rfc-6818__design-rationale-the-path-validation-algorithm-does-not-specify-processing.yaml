document: rfc-6818
kind: design-rationale
summary: The path validation algorithm does not specify processing rules for additional information in self-signed trust anchor certificates; implementations are free to use or ignore such information. RFC 5914 defines trust anchor formats and RFC 5937 provides guidance on using them to initialize path validation inputs.
section: "4"
topics:
