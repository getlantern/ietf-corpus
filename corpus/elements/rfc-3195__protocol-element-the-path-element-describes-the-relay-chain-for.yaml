document: rfc-3195
kind: protocol-element
summary: The 'path' element describes the relay chain for associated 'entry' elements. Each nested 'path' element represents one hop, carrying 'fromFQDN', 'fromIP', 'toFQDN', 'toIP', 'linkprops', and a unique 'pathID'. An empty nested 'path' identifies a device; a 'path' with a nested 'path' identifies a relay.
section: 4.4.3
topics:
