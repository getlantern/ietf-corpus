document: rfc-2091
kind: normative-requirement
summary: When retransmitting a packet while the routing database is in flux, the packet MUST be re-created from the database to contain only the subset of routes that currently apply; if none still apply, nothing is retransmitted.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
