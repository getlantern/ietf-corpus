document: rfc-3550
kind: protocol-element
summary: A Mixer is an intermediate RTP node that receives packets from one or more sources, possibly transcodes, combines them into a new stream with its own SSRC, and adjusts timing. A Translator forwards packets with their original SSRC intact, performing address translation or encoding conversion without resynchronization.
