document: rfc-2370
kind: protocol-element
summary: A global Opaque capability flag is added to the OSPF router data structure to indicate whether the router is running the Opaque option (capable of storing Opaque LSAs). An opaque-capable router continues to interoperate with non-opaque-capable OSPF routers.
section: "4.0"
topics:
    - routing
