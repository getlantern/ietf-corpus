document: rfc-951
kind: interoperability-note
summary: Cross-gateway booting is an optional extension requiring cooperating gateways and servers. The forwarding agent (which may or may not be co-located with the gateway) fills in 'giaddr' and increments 'hops'. A non-gateway forwarding agent may use the broadcast address of the receiving interface as 'giaddr', allowing normal gateways to forward the reply without involving the agent.
section: "8"
topics:
