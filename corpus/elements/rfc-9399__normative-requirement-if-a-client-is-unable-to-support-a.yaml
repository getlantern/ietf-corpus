document: rfc-9399
kind: normative-requirement
summary: If a client is unable to support a provided logotype, it MUST NOT report an error; instead it MUST behave as though no logotype certificate extension was included. The client MUST include the ability to disable the fetching of logotypes.
section: "6"
rfc2119_level: MUST NOT
