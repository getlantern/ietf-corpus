document: rfc-9554
kind: protocol-element
summary: The SOCIALPROFILE property (cardinality *) specifies URI or free-text usernames for social media profiles. The SERVICE-TYPE parameter MUST be assigned when the value type is TEXT, and MUST NOT be assigned more than once. Names MUST be compared case-insensitively.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
