document: rfc-1237
kind: interoperability-note
summary: For non-U.S. parts of the Internet, local NSAP formats based on national DCC assignments may be preferable to GOSIP Version 2 format. The technical principles of hierarchical NSAP assignment and routing data abstraction apply equally regardless of which IDP format is used.
section: "6.2"
topics:
    - routing
