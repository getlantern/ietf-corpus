document: rfc-3921
kind: protocol-element
summary: A roster item in the 'jabber:iq:roster' namespace is identified by a required 'jid' attribute and carries a 'subscription' attribute with values 'none', 'to', 'from', or 'both'. Items may include an optional 'name' attribute and one or more <group/> child elements for categorization.
