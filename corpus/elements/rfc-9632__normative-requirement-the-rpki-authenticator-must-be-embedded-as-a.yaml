document: rfc-9632
kind: normative-requirement
summary: 'The RPKI authenticator MUST be embedded as a series of ''#'' comment lines at the end of the geofeed file, bracketed by ''# RPKI Signature: <range>'' and ''# End Signature: <range>'' lines; the IP address range MUST match that of the geofeed URL in the inetnum:.'
section: "5"
rfc2119_level: MUST
topics:
    - security
    - crypto
