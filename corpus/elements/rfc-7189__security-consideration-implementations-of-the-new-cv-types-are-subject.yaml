document: rfc-7189
kind: security-consideration
summary: Implementations of the new CV types are subject to the same security considerations as RFC 5085 (VCCV), RFC 5880 (BFD), RFC 5881 (BFD for IPv4/IPv6), and RFC 6428 (MPLS-TP CC/CV/RDI). No additional security issues are introduced by this specification.
