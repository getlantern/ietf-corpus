document: rfc-3963
kind: protocol-element
summary: A new Mobile Router Flag (R) is added to the Binding Acknowledgement message to indicate that the Home Agent supports Mobile Routers. It is set to 1 only if the corresponding Binding Update had the Mobile Router Flag set to 1.
