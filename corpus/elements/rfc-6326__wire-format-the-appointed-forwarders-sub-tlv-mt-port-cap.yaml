document: rfc-6326
kind: wire-format
summary: The Appointed Forwarders sub-TLV (MT-PORT-CAP sub-TLV type 3, length 6*n) is sent by the DRB and contains n appointment records each with a 2-byte Appointee Nickname and two 2-byte fields for Start.VLAN and End.VLAN specifying the inclusive VLAN range for which the IS is appointed forwarder.
