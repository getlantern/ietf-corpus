summary: 'The extension is motivated by three use cases: (1) redundant PCE failover where a newly elected primary PCE must take control; (2) vPCE load balancing where a new instance needs to acquire LSPs; and (3) global optimization where a PCE temporarily takes control and returns delegation afterward.'
