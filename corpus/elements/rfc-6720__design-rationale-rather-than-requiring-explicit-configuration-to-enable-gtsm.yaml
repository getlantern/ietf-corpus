document: rfc-6720
kind: design-rationale
summary: Rather than requiring explicit configuration to enable GTSM, this document specifies a 'built-in dynamic GTSM capability negotiation' where both peers automatically detect each other's support and agree to use GTSM, lowering deployment friction while preserving backward compatibility with non-GTSM peers.
