document: rfc-8591
kind: interoperability-note
summary: UAs that support both S/MIME and CPIM SHOULD be able to validate signatures and decrypt enveloped data whether operations are applied to the entire CPIM body or only the CPIM payload, since some messaging networks require inspection of CPIM metadata.
section: "9.1"
topics:
    - sip
    - security
