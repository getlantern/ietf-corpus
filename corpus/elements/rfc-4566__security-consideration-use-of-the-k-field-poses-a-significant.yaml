document: rfc-4566
kind: security-consideration
summary: Use of the `k=` field poses a significant security risk since it conveys session encryption keys in the clear. It also provides no way to indicate key algorithms and supports only a single symmetric key (not separate confidentiality and integrity keys). Its use is NOT RECOMMENDED.
section: "7"
topics:
