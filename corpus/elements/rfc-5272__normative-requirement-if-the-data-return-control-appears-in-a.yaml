document: rfc-5272
kind: normative-requirement
summary: If the Data Return control appears in a Full PKI Request, the server MUST return it as part of the PKI Response. This control allows clients to pass opaque state information that is echoed back.
section: "6.4"
rfc2119_level: MUST
topics:
