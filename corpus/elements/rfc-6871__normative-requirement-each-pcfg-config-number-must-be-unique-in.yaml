document: rfc-6871
kind: normative-requirement
summary: Each 'pcfg' config-number MUST be unique in the entire SDP (extending RFC 5939, which only required uniqueness within a media description). Config-numbers MUST NOT overlap between potential and latent configurations, and MUST NOT contain leading zeroes.
section: 3.4.1.1
rfc2119_level: MUST
topics:
    - realtime
