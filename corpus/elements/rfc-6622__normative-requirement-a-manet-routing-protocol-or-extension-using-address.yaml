document: rfc-6622
kind: normative-requirement
summary: A MANET routing protocol or extension using Address Block ICV TLVs MUST specify how to include any concatenated attributes of the address in the ICV verification process. TLVs concatenated with the address for calculating the ICV MUST NOT include Address Block ICV TLVs already associated with the address.
section: "10.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
