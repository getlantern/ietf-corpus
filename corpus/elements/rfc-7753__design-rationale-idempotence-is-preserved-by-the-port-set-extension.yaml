document: rfc-7753
kind: design-rationale
summary: Idempotence is preserved by the PORT_SET extension, but the order in which overlapping port-set requests arrive determines which mapping is created. Clients are therefore required to prevent overlapping requests rather than relying on server-side deduplication.
section: "6.3"
topics:
