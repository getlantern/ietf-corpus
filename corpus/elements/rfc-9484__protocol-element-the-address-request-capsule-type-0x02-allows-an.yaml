document: rfc-9484
kind: protocol-element
summary: The ADDRESS_REQUEST capsule (type 0x02) allows an endpoint to request IP address assignment from its peer, optionally indicating a preferred address. Request IDs MUST NOT be reused and MUST NOT be zero. If the capsule contains zero Requested Addresses, the receiver MUST abort the IP proxying request stream.
section: 4.7.2
topics:
    - http
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
