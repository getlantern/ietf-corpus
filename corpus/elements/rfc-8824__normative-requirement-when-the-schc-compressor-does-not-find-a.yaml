document: rfc-8824
kind: normative-requirement
summary: When the SCHC compressor does not find a matching Rule to compress a CoAP header, the packet MUST be sent uncompressed using the RuleID dedicated to that purpose, with the Compression Residue being the complete header of the packet.
section: "3"
rfc2119_level: MUST
topics:
