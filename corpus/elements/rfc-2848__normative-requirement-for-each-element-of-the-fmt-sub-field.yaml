document: rfc-2848
kind: normative-requirement
summary: For each element of the Fmt sub-field in a PINT media line, there MUST be a following fmtp attribute. The fmtp attribute describes the sources (uri-ref, opaque-ref, or sub-part-ref) used with a given Fmt entry.
