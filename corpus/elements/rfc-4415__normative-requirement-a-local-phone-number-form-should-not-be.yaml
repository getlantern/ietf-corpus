document: rfc-4415
kind: normative-requirement
summary: A 'local phone number' form SHOULD NOT be used in a voice:tel NAPTR unless the zone controller is certain it can be unambiguously distinguished by all clients that can access the record and that calls can be routed to the destination from their access points.
section: "3"
rfc2119_level: SHOULD NOT
