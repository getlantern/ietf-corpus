document: rfc-9324
kind: design-rationale
summary: Early BGP speaker memory constraints caused implementations to not keep a full Adj-RIB-In; when new RPKI data arrive, these implementations must issue route refresh to recover dropped paths, imposing a serious resource burden on neighbors.
