document: rfc-3648
kind: normative-requirement
summary: In an ordered collection, each internal member URI MUST appear in the ordering exactly once, and the ordering MUST NOT include any URIs that are not internal members. The server MUST remove a URI from the ordering when it is removed from the collection, and MUST add a URI when one is added.
section: "4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
