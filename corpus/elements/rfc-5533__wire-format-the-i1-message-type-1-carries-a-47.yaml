document: rfc-5533
kind: wire-format
summary: The I1 message (Type=1) carries a 47-bit Initiator Context Tag and a 32-bit random Initiator Nonce. The ULID Pair option MUST be included when the packet's IPv6 addresses do not match the ULID pair; the Forked Instance Identifier option MUST be included when forking an existing context.
section: "5.4"
topics:
