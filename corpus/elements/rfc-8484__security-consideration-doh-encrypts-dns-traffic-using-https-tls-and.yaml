document: rfc-8484
kind: security-consideration
summary: DoH encrypts DNS traffic using HTTPS (TLS) and requires server authentication, mitigating passive surveillance and active attacks that divert DNS traffic to rogue servers. It also mitigates classic UDP-based DNS amplification attacks.
