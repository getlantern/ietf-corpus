document: rfc-3986
kind: protocol-element
summary: 'The remove_dot_segments algorithm iteratively processes "." and ".." path segments: "./" and "../" prefixes are stripped; "/./" is replaced by "/"; "/../" removes the last output segment; isolated "." or ".." are discarded.'
