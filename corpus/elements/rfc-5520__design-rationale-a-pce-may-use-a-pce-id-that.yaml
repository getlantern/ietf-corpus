document: rfc-5520
kind: design-rationale
summary: A PCE MAY use a PCE-ID that is only meaningful within its domain (e.g., an IGP Router ID or a non-routable value) rather than a globally reachable IP address. This provides greater security and confidentiality by limiting the ability of external entities to target the PCE directly.
section: 3.1.1
topics:
    - routing
    - security
