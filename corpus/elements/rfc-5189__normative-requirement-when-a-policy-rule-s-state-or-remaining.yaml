document: rfc-5189
kind: normative-requirement
summary: When a policy rule's state or remaining lifetime changes (other than natural time decrement), the middlebox MUST notify all other agents that can access the rule and are in open sessions via a Policy Rule Event Notification (REN) message. The requesting agent receives the corresponding reply instead of a REN.
section: 2.3.4
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
