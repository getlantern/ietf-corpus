document: rfc-9930
kind: normative-requirement
summary: All TEAP implementations MUST support session resumption. If the server agrees to resume, Phase 2 is bypassed; if not, the server rejects resumption and both parties MUST proceed with Phase 2 after the full TLS handshake.
section: "3.5"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
