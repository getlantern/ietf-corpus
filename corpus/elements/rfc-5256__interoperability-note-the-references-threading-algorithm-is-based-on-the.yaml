document: rfc-5256
kind: interoperability-note
summary: The REFERENCES threading algorithm is based on the algorithm written by Jamie Zawinski and used in Netscape Mail and News versions 2.0 through 3.0. Server capability names starting with 'SORT' or consisting of 'THREAD=' followed by an algorithm name indicate support, allowing future upwards-compatible extensions.
