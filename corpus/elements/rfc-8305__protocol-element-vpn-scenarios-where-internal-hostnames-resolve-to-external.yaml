document: rfc-8305
kind: protocol-element
summary: VPN scenarios where internal hostnames resolve to external IPv4 addresses with no route on an IPv6-only underlying network require the client to resolve the A record via the VPN resolver and locally synthesize an IPv6 address using the NAT64 prefix, as if the address were application-provided.
section: "7.3"
