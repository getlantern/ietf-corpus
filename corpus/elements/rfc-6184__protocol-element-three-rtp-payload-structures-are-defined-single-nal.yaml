document: rfc-6184
kind: protocol-element
summary: 'Three RTP payload structures are defined: Single NAL Unit Packet (NAL unit types 1–23), Aggregation Packet (STAP-A=24, STAP-B=25, MTAP16=26, MTAP24=27), and Fragmentation Unit (FU-A=28, FU-B=29). The NAL unit type field in the first byte of the RTP payload identifies which structure is present.'
section: "5.2"
