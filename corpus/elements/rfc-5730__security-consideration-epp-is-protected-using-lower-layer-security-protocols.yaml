document: rfc-5730
kind: security-consideration
summary: EPP is protected using lower-layer security protocols; the specification does not define transport-level security itself. Server operators may limit failed login attempts (N >= 1) after which the connection is closed. Transaction identifiers SHOULD be logged, retained, and protected to ensure consistent temporal and state-management records.
section: "7"
topics:
    - security
