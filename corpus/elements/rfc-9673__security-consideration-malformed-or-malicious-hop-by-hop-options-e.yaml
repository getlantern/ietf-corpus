document: rfc-9673
kind: security-consideration
summary: Malformed or malicious Hop-by-Hop options (e.g., excessive number of options, oversized Extension Headers) can exhaust router resources or prevent hardware optimizations for later header processing such as ECMP or port filtering. Implementations must fail gracefully.
