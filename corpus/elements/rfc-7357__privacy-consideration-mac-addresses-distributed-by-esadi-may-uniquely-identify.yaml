document: rfc-7357
kind: privacy-consideration
summary: MAC addresses distributed by ESADI may uniquely identify individual end station users and constitute sensitive reachability information in campus networks. Network operators should minimize retention of MAC reachability logs to only what is clearly required, balancing privacy against network management and legal obligations. In IXP deployments, the addresses are typically ISP router ports with fewer privacy concerns.
section: "8.1"
topics:
    - routing
    - privacy
