document: rfc-9329
kind: wire-format
summary: Each TCP stream used for IKE/IPsec encapsulation MUST begin with a 6-byte stream prefix containing the ASCII string "IKETCP" (0x49 0x4b 0x45 0x54 0x43 0x50), sent once and only by the TCP Originator.
