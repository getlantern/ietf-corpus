document: rfc-4802
kind: interoperability-note
summary: LSRs can migrate from MPLS-TE-STD-MIB to GMPLS-TE-STD-MIB by adding support for the additional tables and objects; no removal of MPLS-TE-STD-MIB support is required. Setting gmplsTunnelLSPEncoding to 'tunnelLspNotGmpls' allows an MPLS-TE LSP to benefit from the extended GMPLS MIB objects without supporting GMPLS signaling protocols.
section: "1.1"
topics:
    - mpls
    - snmp
