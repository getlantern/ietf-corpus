document: rfc-9615
kind: normative-requirement
summary: To signal consent to act as the child's signer, the child DNS operator MUST copublish the child's CDS/CDNSKEY RRsets at the corresponding signaling name under each signaling domain, excluding those that would fall within the child domain.
