document: rfc-6643
kind: interoperability-note
summary: The SMIv2 IMPORT mechanism imports specific named symbols, whereas YANG import statements import all symbols of the referenced module; translation rules must carefully filter SMIv2 imports to avoid generating spurious YANG dependencies on modules not actually needed.
