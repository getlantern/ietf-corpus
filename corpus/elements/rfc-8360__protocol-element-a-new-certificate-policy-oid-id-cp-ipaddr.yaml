summary: A new Certificate Policy OID id-cp-ipAddr-asNumber-v2 (pkix cp(14) 3) is defined as an alternative to the RFC 6484 OID (pkix cp(14) 2). Certificates bearing this OID follow the amended validation algorithm rather than RFC 6487 validation.
