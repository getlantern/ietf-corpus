document: rfc-7986
kind: normative-requirement
summary: 'Calendar user agents SHOULD use the EMAIL parameter value for the contact''s email address over any mailto: calendar user address in the property value. Calendar user agents SHOULD NOT include an EMAIL parameter when its value matches the property''s calendar user address.'
section: "6.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
