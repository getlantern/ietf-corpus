document: rfc-7150
kind: security-consideration
summary: The protocol extensions do not substantially change the nature of PCEP, so the security considerations of RFC 5440 apply unchanged; further considerations for PCEP over TCP are in RFC 6952. Operators should be aware that the Vendor Information object and TLV may be used as a vector for message-size amplification attacks consuming bandwidth and processing power, mitigated by authentication and integrity procedures from RFC 5440.
section: "7"
topics:
    - security
    - routing
