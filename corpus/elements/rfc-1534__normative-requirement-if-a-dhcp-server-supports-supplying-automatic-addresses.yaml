document: rfc-1534
kind: normative-requirement
summary: If a DHCP server supports supplying automatic addresses to BOOTP clients, this feature MUST be configurable and MUST default to OFF; enabling it must be an active decision by the system administrator.
section: "2"
rfc2119_level: MUST
