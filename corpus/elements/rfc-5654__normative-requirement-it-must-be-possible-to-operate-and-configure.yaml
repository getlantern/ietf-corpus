document: rfc-5654
kind: normative-requirement
summary: It MUST be possible to operate and configure the MPLS-TP data plane without any IP forwarding capability; the data plane only operates on the MPLS label. This applies equally to protection mechanisms.
section: "2.3"
rfc2119_level: MUST
topics:
