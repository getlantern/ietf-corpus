document: rfc-4387
kind: normative-requirement
summary: CRL URIs MUST support retrieval by the iHash and sKIDHash attribute types. A CRL query MUST return the matching CRL with the greatest thisUpdate value (the most recent CRL).
section: "2.2"
rfc2119_level: MUST
