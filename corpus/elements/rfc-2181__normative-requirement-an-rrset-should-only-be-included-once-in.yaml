document: rfc-2181
kind: normative-requirement
summary: An RRSet should only be included once in any DNS reply, regardless of which section (Answer, Authority, or Additional) it appears in. It should not be repeated in the same or any other section except where explicitly required by specification (e.g., SOA in AXFR).
section: "5.5"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
