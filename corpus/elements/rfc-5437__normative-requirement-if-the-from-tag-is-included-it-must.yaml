document: rfc-5437
kind: normative-requirement
summary: If the ':from' tag is included, it MUST be an electronic address conforming to the 'Mailbox' rule in RFC 5321. If transformed to XMPP syntax, it MUST be encapsulated as the value of an XMPP SHIM header named 'Resent-From'.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
