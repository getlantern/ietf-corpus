document: rfc-8838
kind: design-rationale
summary: In Trickle ICE, the initiator SHOULD generate and transmit the initial ICE description as early as possible, even with zero candidates, because this enables the remote party to start gathering and trickling its own candidates sooner. The initial ICE description no longer needs to contain a full generation of candidates.
section: "4"
