document: rfc-2863
kind: design-rationale
summary: Virtual circuits in connection-oriented sub-layers (e.g., Frame Relay, X.25) are strongly recommended not to have individual ifTable rows, to avoid proliferation of conceptual rows with redundant information. A media-specific MIB that assigns per-VC rows must present compelling rationale in its specification.
section: 3.1.3
topics:
    - snmp
