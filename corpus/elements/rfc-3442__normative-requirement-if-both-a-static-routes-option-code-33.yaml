document: rfc-3442
kind: normative-requirement
summary: If both a Static Routes option (code 33) and the Classless Static Routes option are provided, DHCP clients that support this option MUST NOT install the routes from the Static Routes option.
section: DHCP Client Behavior
rfc2119_level: MUST NOT
