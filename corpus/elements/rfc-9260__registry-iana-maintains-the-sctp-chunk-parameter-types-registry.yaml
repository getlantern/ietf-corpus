document: rfc-9260
kind: registry
summary: IANA maintains the 'SCTP Chunk Parameter Types' registry (Section 15.3) and the 'SCTP Payload Protocol Identifiers' registry (Section 15.5). Parameter types MUST be unique across all chunk types. Payload Protocol Identifier 0 indicates no application identifier; all other values are application-assigned and opaque to SCTP.
section: "15.3"
topics:
    - sctp
    - registry
