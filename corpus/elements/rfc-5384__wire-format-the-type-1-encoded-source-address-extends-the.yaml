document: rfc-5384
kind: wire-format
summary: The type 1 Encoded-Source Address extends the standard PIM source encoding by appending one or more Join Attribute TLVs, each with a 1-byte field containing F-bit (transitive), E-bit (end of attributes), and 6-bit Attr_Type, followed by a 1-octet Length field and a variable-length Value field.
section: 3.4.1
topics:
