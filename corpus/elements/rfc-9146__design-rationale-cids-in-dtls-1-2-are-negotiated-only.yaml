document: rfc-9146
kind: design-rationale
summary: CIDs in DTLS 1.2 are negotiated only at handshake time; there is no mid-session CID update message because DTLS 1.2 does not support TLS 1.3-style post-handshake messages. This is the simplest design achievable within DTLS 1.2 constraints.
section: "3"
