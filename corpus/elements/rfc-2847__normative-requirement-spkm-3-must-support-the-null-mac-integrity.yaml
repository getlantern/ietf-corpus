document: rfc-2847
kind: normative-requirement
summary: SPKM-3 MUST support the NULL-MAC integrity algorithm, which returns a zero-length bit string regardless of input, to handle cases where the initiator cannot calculate an integrity value in the REQ-TOKEN due to lack of a target certificate.
section: 2.3.1
rfc2119_level: MUST
topics:
