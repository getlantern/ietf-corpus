document: rfc-5246
kind: wire-format
summary: 'GenericAEADCipher: nonce_explicit (SecurityParameters.record_iv_length bytes) followed by aead-ciphered content. Additional authenticated data is seq_num || TLSCompressed.type || TLSCompressed.version || TLSCompressed.length. No separate MAC key is used; AEAD expansion MUST NOT exceed 1024 bytes.'
