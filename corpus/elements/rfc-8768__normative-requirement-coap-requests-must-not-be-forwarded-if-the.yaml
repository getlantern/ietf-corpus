document: rfc-8768
kind: normative-requirement
summary: CoAP requests MUST NOT be forwarded if the Hop-Limit option is set to '0' after decrement. Such requests SHOULD be logged and a 5.08 (Hop Limit Reached) error response sent back to the CoAP peer.
section: "3"
rfc2119_level: MUST NOT
