document: rfc-7984
kind: normative-requirement
summary: If two copies of the same SIP request arrive at the destination client, the client SHOULD reject the second with a response code of 482 (Loop Detected), optionally including a reason phrase such as 'Merged Request'.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - sip
