document: rfc-3637
kind: interoperability-note
summary: SONET-MIB counter objects (e.g., sonetPathCurrentSESs) are 15-minute interval counters subject to inhibiting during unavailable or severely errored seconds, whereas 802.3ae defines generalized non-resetable counters with no inhibiting; the SONET-MIB objects are only approximate representations.
section: "3.6"
topics:
    - snmp
