document: rfc-8225
kind: protocol-element
summary: PASSporT is a JSON Web Token (JWT) signed as a JSON Web Signature (JWS) that cryptographically asserts the originating and destination identities of a personal communications session. It uses X.509-based certificates for signing authority and is designed to be transported over insecure channels while remaining verifiable at the destination.
