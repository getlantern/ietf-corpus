document: rfc-2021
kind: wire-format
summary: Variable-length network addresses (addressMapNetworkAddress, nlHostAddress) are encoded as an OCTET STRING consisting of a leading length octet followed by the address bytes in network byte order. For IPv4, this is 0x04 followed by the 4 address octets.
