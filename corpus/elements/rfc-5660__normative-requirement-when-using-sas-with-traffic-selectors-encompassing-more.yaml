document: rfc-5660
kind: normative-requirement
summary: When using SAs with traffic selectors encompassing more than a single flow, an implementation MUST report the QoP as indeterminate rather than selecting one cryptographic suite; implementations SHOULD provide an API for requesting narrow child SAs when a specific QoP is needed.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
