document: rfc-3195
kind: protocol-element
summary: 'The syslog service defines three operational roles: device (source of syslog entries), relay (accepts entries from devices/relays and forwards to collectors/relays), and collector (sink for syslog entries). A single server may serve in all three roles simultaneously using different BEEP channels.'
