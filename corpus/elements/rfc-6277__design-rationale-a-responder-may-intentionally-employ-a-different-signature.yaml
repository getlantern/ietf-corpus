document: rfc-6277
kind: design-rationale
summary: 'A responder may intentionally employ a different signature algorithm than the CA uses for certificates and CRLs: a less computationally expensive algorithm may suffice for status responses, and using two independent algorithms guards against a single algorithm compromise affecting both certificate issuance and status.'
