document: rfc-6736
kind: normative-requirement
summary: When an INITIAL_REQUEST NCR identifies an already-existing session (matching endpoint identifier), the NAT device MUST return an NCA with Result-Code SESSION_EXISTS and provide the existing Session-Id in the Duplicate-Session-Id AVP.
section: "4.1"
rfc2119_level: MUST
topics:
