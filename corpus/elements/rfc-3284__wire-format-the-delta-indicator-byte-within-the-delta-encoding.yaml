document: rfc-3284
kind: wire-format
summary: 'The Delta_Indicator byte within the delta encoding of a target window has three bits: VCD_DATACOMP (bit 0), VCD_INSTCOMP (bit 1), and VCD_ADDRCOMP (bit 2), indicating whether the ADD/RUN data section, the instructions section, and the COPY addresses section (respectively) have been compressed with the secondary compressor.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
