document: rfc-5120
kind: normative-requirement
summary: A router MUST include within its LSPs in the Reachable Intermediate Systems TLV only adjacent nodes participating in the corresponding topology, and MUST advertise such TLVs only if it participates itself in the corresponding topology.
section: "3"
rfc2119_level: MUST
topics:
    - routing
