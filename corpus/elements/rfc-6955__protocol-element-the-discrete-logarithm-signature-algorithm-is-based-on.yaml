document: rfc-6955
kind: protocol-element
summary: The Discrete Logarithm Signature algorithm is based on DSA but removes FIPS-186-3 size restrictions on p and q, replacing them with the requirement that q must be at least b bits (where b is the hash output size). It requires a q parameter in the DH group parameters and produces a DSA-Sig-Value (r, s) pair.
section: "5"
