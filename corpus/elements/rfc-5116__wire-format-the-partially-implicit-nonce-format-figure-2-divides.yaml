kind: wire-format
summary: The partially implicit nonce format (Figure 2) divides the Fixed field into Fixed-Common (may be implicit) and Fixed-Distinct (must be explicit) sub-fields, followed by a Counter field. The Fixed-Distinct field and Counter field MUST be in the explicit part of the nonce.
