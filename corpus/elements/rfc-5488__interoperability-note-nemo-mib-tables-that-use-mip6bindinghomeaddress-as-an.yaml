document: rfc-5488
kind: interoperability-note
summary: NEMO-MIB tables that use mip6BindingHomeAddress as an index object can produce OIDs with more than 128 sub-identifiers if the address exceeds 112 (or 113) octets, making those rows inaccessible via SNMPv1, SNMPv2c, or SNMPv3.
section: "3"
topics:
