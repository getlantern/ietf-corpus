document: rfc-8089
kind: wire-format
summary: 'The file URI syntax is defined in ABNF as: file-URI = file-scheme ":" file-hier-part, where file-scheme = "file", file-hier-part = ( "//" auth-path ) / local-path, auth-path = [ file-auth ] path-absolute, local-path = path-absolute, and file-auth = "localhost" / host. The authority component including double slashes is optional.'
section: "2"
