document: rfc-5611
kind: protocol-element
summary: 'The Bit Rate field in the TDM PW AVP encodes the local AC bit rate in units of 64 Kbit/s as an unsigned 16-bit integer. For structure-agnostic emulation, specific fixed values apply: 32 for E1, 24 or 25 for T1, 535 for E3, 699 for T3. For CESoPSN PWs, the value equals the number of DS0 channels.'
section: "2.1"
topics:
