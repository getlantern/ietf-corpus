document: rfc-6763
kind: normative-requirement
summary: TXT record keys MUST consist of printable US-ASCII characters (0x20–0x7E) excluding '=' (0x3D). Keys are case-insensitive. Strings beginning with '=' (missing key) MUST be silently ignored. Keys SHOULD be no more than nine characters long.
section: "6.4"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
