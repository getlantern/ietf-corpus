document: rfc-7293
kind: registry
summary: 'This document registers three enhanced SMTP status codes: X.7.17 (''Mailbox owner has changed'' — continuous ownership test failed), X.7.18 (''Domain owner has changed'' — domain ownership changed since specified date-time), and X.7.19 (''RRVS test cannot be completed'' — required timestamp was never recorded). All are associated with 5XX basic status codes.'
section: "15.3"
