document: rfc-8434
kind: protocol-element
summary: A layout stateid is a 128-bit quantity returned by a server that uniquely defines the layout state for a specific layout type and file (RFC 5661 Section 12.5.2). Layout stateids have different handling from other stateid types as described in RFC 5661 Section 12.5.3.
