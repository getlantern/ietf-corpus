document: rfc-7630
kind: security-consideration
summary: All security considerations of RFC 3414 apply to the HMAC-SHA-2 authentication protocols. The security of each protocol depends on key length, size of the hash function's internal state, and length of the truncated MAC; at publication all four protocols provide a very high level of security.
section: "9.1"
topics:
