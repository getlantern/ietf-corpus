document: rfc-1933
kind: normative-requirement
summary: The decapsulating node performs IPv4 reassembly before decapsulating the IPv6 packet so that all IPv6 options are preserved even if the encapsulating IPv4 packet was fragmented. The encapsulating IPv4 header is then discarded and the IPv6 packet processed normally.
section: 4.1.5
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
