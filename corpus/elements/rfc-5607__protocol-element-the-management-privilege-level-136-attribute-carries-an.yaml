document: rfc-5607
kind: protocol-element
summary: The Management-Privilege-Level (136) Attribute carries an integer-valued privilege level for CLI management access. It MAY be used in both Access-Request and Access-Accept packets. Specific access rights conferred by each integer value are implementation-dependent.
