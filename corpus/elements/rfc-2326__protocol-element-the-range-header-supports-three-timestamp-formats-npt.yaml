document: rfc-2326
kind: protocol-element
summary: 'The Range header supports three timestamp formats: NPT (Normal Play Time, relative to presentation start), SMPTE relative timestamps (hours:minutes:seconds:frames for frame-level accuracy), and absolute UTC clock time. Media servers supporting playback MUST support NPT.'
