document: rfc-9443
kind: protocol-element
summary: QUIC packets (in the absence of bit greasing) are assigned first-byte ranges [80..127] and [192..255] exclusively. The range [64..79], previously reserved solely for TURN channels, now also maps to QUIC when the source IP address and port do not match a responding TURN server.
section: "3"
topics:
