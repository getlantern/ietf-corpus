document: rfc-2748
kind: normative-requirement
summary: When the PDP issues an SSQ message referencing a specific handle that the PEP does not recognize, the PEP MUST immediately send a DRQ for that handle. If no handle is specified, the PEP MUST synchronize all active state and then MUST issue a Synchronize State Complete (SSC) message when finished.
section: "3.5"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
