document: rfc-9002
kind: normative-requirement
summary: On entering a recovery period, a sender MUST set ssthresh to half the congestion window at loss detection, and the congestion window MUST be set to the reduced ssthresh value before exiting recovery. A single packet MAY be sent immediately upon entering recovery to speed up loss recovery.
section: 7.3.2
rfc2119_level: MUST
topics:
    - quic
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
