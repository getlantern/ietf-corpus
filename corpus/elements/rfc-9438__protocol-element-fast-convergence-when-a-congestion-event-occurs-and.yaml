kind: protocol-element
summary: 'Fast convergence: when a congestion event occurs and cwnd < W_max (indicating the saturation point is shrinking), W_max is further reduced to cwnd*(1+β_cubic)/2 before applying the multiplicative decrease, lengthening the time this flow needs to recover and giving new flows more room to grow.'
