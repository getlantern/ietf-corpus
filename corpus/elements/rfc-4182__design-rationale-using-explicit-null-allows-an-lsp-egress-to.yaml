document: rfc-4182
kind: design-rationale
summary: Using Explicit NULL allows an LSP egress to determine immediately, without a Label Information Base (LIB) lookup, that further forwarding is governed by the label or IP header below. This forwarding-performance benefit motivates binding Explicit NULL rather than an ordinary label to a tunnel FEC.
section: "3"
topics:
