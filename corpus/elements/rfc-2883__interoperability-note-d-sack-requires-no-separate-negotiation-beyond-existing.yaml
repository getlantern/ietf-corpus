document: rfc-2883
kind: interoperability-note
summary: D-SACK requires no separate negotiation beyond existing SACK capability. If a TCP sender does not understand D-SACK, it simply discards D-SACK blocks and processes remaining SACK blocks normally, causing no interoperability problems with the extension.
section: "2"
topics:
    - tcp
