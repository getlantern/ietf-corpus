document: rfc-9737
kind: protocol-element
summary: The anonymous stateid of all zeros (defined in Section 8.2.3 of RFC 8881) is repurposed as the lrf_stateid value in LAYOUTRETURN to allow clients to report I/O errors to the MDS during the grace recovery period without a valid layout stateid.
section: "2"
