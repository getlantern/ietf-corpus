document: rfc-1323
kind: normative-requirement
summary: WSopt MUST be sent only in SYN segments, and both sides must include it in their SYN to enable scaling in either direction. If either side omits WSopt, both Snd.Wind.Scale and Rcv.Wind.Scale are set to zero and scaling is disabled.
section: "2.2"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
