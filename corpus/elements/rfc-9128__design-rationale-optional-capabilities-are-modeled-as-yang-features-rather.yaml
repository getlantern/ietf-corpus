document: rfc-9128
kind: design-rationale
summary: Optional capabilities are modeled as YANG features rather than mandatory nodes to allow any major existing PIM implementation to claim compliance with the base model and to simplify capability negotiation. Operational state parameters are not widely designated as features because defaulting an unsupported state value is generally harmless.
section: "2.2"
topics:
    - yang
    - multicast
