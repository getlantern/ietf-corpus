document: rfc-5561
kind: normative-requirement
summary: Backward Compatibility TLVs MUST NOT be included in Capability messages. An LDP speaker that receives a Capability message containing Backward Compatibility TLVs SHOULD silently ignore those TLVs and continue processing the remainder of the message.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
