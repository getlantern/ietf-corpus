document: rfc-3927
kind: normative-requirement
summary: A host SHOULD NOT have both an operable routable address and an IPv4 Link-Local address configured on the same interface simultaneously. When an operable routable address becomes available, the host MUST use it for new communications and MUST cease advertising the Link-Local address.
section: "1.9"
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
