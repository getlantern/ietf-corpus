document: rfc-9274
kind: design-rationale
summary: RFC 7285 originally allowed only 'numerical' and 'ordinal' cost modes. RFC 9274 relaxes this constraint to allow additional cost modes (e.g., for path vector use cases), with a registry to track them and prevent proliferation of incompatible values.
section: "1"
topics:
    - registry
