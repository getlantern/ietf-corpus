document: rfc-5864
kind: protocol-element
summary: AFS services are located using DNS SRV RRs with service labels 'afs3-vlserver' (VLDB services) and 'afs3-prserver' (PTS services). The SRV label format is _<service>._<proto>.<cell-name>. Other AFS services (file and volume management) are located through the VLDB service and do not use DNS SRV RRs.
section: "4"
topics:
    - dns
    - routing
