document: rfc-7909
kind: normative-requirement
summary: The certificate referenced in the "c" field MUST be an end-entity (non-CA) certificate, MUST conform to the X.509 PKIX Resource Certificate profile (RFC 6487), and MUST have RFC 3779 extensions that cover the Internet number resource in the signed attributes.
