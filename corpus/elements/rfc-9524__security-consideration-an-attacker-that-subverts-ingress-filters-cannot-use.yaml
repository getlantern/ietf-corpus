document: rfc-9524
kind: security-consideration
summary: An attacker that subverts ingress filters cannot use a stack of Replication segments for amplification or link exhaustion attacks because Replication segment trees always terminate at a leaf or bud node resulting in decapsulation. However, an attacker could still inject traffic to receivers within a P2MP service.
section: "4"
topics:
    - security
    - routing
    - multicast
