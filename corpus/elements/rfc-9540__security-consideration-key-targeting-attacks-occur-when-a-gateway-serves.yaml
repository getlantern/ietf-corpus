document: rfc-9540
kind: security-consideration
summary: Key targeting attacks occur when a gateway serves unique key configurations to specific clients or populations, enabling linkability. Clients SHOULD employ a technique such as key consistency checks (e.g., confirming the key with a shared proxy per [CONSISTENCY]) to mitigate these attacks.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
