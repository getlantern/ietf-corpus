document: rfc-6089
kind: security-consideration
summary: 'Flow bindings introduce finer-grained attack surface compared to standard binding updates: an attacker who can impersonate the MN or modify a BU can divert or replicate individual flows of special interest to an address of the attacker''s choosing. Authentication and integrity protection of BUs becomes doubly critical.'
