document: rfc-5244
kind: interoperability-note
summary: Implementations of RFC 5244 will be fully backward compatible with RFC 2833 implementations only in the case of full ABCD-bit signalling. The degree of change from RFC 2833 Section 3.14 is otherwise substantial because some RFC 2833 event codes were deprecated as ambiguous, erroneous, or redundant.
