document: rfc-9117
kind: interoperability-note
summary: In a confederation topology, ORIGINATOR_ID is not advertised when propagating routes across local ASes. Without condition b.2, a Flow Specification received from peer Y1 and a best-match unicast route received from peer Y2 (both in local AS Y) would fail the originator-match check; condition b.2 resolves this.
section: "5"
topics:
