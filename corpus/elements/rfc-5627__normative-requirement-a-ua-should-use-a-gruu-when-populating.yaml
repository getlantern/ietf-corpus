document: rfc-5627
kind: normative-requirement
summary: A UA SHOULD use a GRUU when populating the Contact header field of dialog-forming and target refresh requests and responses (INVITE, SUBSCRIBE, NOTIFY, REFER, UPDATE, and their 2xx responses). A UA MUST have an active registration before using a GRUU and MUST NOT reuse a GRUU from a lapsed registration.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
