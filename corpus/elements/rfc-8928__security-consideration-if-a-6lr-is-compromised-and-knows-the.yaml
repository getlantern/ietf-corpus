document: rfc-8928
kind: security-consideration
summary: If a 6LR is compromised and knows the real owner's ROVR, it can falsely claim the owner moved and passed validation, then attract/inject traffic or allow an attacker to steal address ownership. The 6LBR–6LR link MUST be integrity-protected to limit this threat.
section: "7.4"
topics:
    - security
    - ip
