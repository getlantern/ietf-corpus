document: rfc-7619
kind: interoperability-note
summary: Existing IKEv2 implementations may have assumed that remote peers are always identified; NULL authentication invalidates this assumption. Omissions or errors in handling abusive authenticated clients may have been unnoticed previously but will be exposed and exploited when unauthenticated peers are supported.
section: "3.2"
topics:
    - ipsec
    - security
