document: rfc-6844
kind: protocol-element
summary: The 'issue' property tag authorizes the holder of the specified issuer domain name to issue certificates for the domain in which the property is published. An issue value with no domain name (e.g., ";") requests that no certificates be issued by any CA.
section: "5.2"
topics:
