document: rfc-5888
kind: protocol-element
summary: 'The ''mid'' (media stream identification) attribute identifies individual media streams within an SDP session description. Its ABNF syntax is: mid-attribute = "a=mid:" identification-tag, where identification-tag is a token as defined in RFC 4566.'
