document: rfc-9172
kind: normative-requirement
summary: When a BCB shares security targets with a BIB, the BIB MUST also be encrypted. If targets overlap partially, the BIB must be split and the portion covering BCB targets encrypted. A BIB MUST NOT be added for a target already covered by a BCB.
section: "3.9"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
