document: rfc-7022
kind: security-consideration
summary: A 96-bit RTCP CNAME length allows on the order of 2^40 globally unique CNAMEs before significant collision probability arises (approximately 50% chance of one collision after 2^48 CNAMEs), justifying the 96-bit minimum length requirement.
section: "6.1"
topics:
