document: rfc-1256
kind: normative-requirement
summary: When an interface first becomes an advertising interface, the router MUST limit the first MAX_INITIAL_ADVERTISEMENTS transmissions to intervals no greater than MAX_INITIAL_ADVERT_INTERVAL (16 seconds), increasing the likelihood of rapid discovery in the presence of packet loss.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
