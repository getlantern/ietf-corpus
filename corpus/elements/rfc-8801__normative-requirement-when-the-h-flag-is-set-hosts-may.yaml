document: rfc-8801
kind: normative-requirement
summary: When the H-flag is set, hosts MAY retrieve PvD Additional Information via an HTTP-over-TLS GET to 'https://<PvD-ID>/.well-known/pvd'. Hosts MUST NOT perform this retrieval when the H-flag is not set.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - http
    - tls
