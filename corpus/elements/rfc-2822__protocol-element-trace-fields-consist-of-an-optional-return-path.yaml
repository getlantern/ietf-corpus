document: rfc-2822
kind: protocol-element
summary: Trace fields consist of an optional 'Return-Path:' field (containing angle-bracket-enclosed optional addr-spec) and one or more 'Received:' fields (containing name/value pairs followed by a semicolon and date-time). These are strictly informational per this standard; full semantics are in RFC 2821.
