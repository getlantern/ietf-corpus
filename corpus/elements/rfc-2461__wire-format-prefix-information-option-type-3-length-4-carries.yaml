summary: 'Prefix Information option (Type 3, Length 4) carries: Prefix Length (8-bit, 0-128), L-bit (on-link flag), A-bit (autonomous address-configuration flag), Valid Lifetime (32-bit, seconds), Preferred Lifetime (32-bit, seconds), Reserved2 (32-bit), and Prefix (128-bit). All-ones lifetime (0xffffffff) represents infinity.'
