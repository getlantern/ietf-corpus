document: rfc-5155
kind: normative-requirement
summary: 'Dynamic update processing for NSEC3 zones MUST account for empty non-terminals: when removing a name, NSEC3 RRs for empty non-terminals it created MUST be removed; when adding a name requiring a new NSEC3 RR, NSEC3 RRs for any newly-created empty non-terminals MUST also be added.'
section: "7.5"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
