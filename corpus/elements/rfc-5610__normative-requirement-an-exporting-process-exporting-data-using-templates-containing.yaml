document: rfc-5610
kind: normative-requirement
summary: An Exporting Process exporting data using Templates containing enterprise-specific Information Elements SHOULD export an Information Element type record for each such IE when interoperability across vendor implementations is important. Collecting Processes MAY use these type records to improve handling of unknown enterprise-specific IEs.
section: "3.9"
rfc2119_level: SHOULD
topics:
    - snmp
