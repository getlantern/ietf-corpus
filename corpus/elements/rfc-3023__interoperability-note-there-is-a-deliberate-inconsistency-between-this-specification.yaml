document: rfc-3023
kind: interoperability-note
summary: 'There is a deliberate inconsistency between this specification and HTTP/1.1: text/xml defaults to ''us-ascii'' rather than HTTP''s historical default of ISO-8859-1. US-ASCII was chosen as the intersection of UTF-8 and ISO-8859-1 and as a better internationalization baseline for a new format.'
section: "3.1"
topics:
    - http
