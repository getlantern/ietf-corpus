document: rfc-7879
kind: design-rationale
summary: B2BUAs that provide identity assurance and terminate DTLS-SRTP sessions are explicitly out of scope. Because such a B2BUA generates the identity signature itself, it is not possible to detect whether it has terminated the DTLS-SRTP session.
section: "1.2"
topics:
    - sip
    - tls
    - security
