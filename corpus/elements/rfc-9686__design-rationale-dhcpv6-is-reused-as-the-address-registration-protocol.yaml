document: rfc-9686
kind: design-rationale
summary: DHCPv6 is reused as the address registration protocol so that enterprises can maintain IPv4-equivalent DHCP-log-based troubleshooting and forensics workflows for IPv6. SLAAC addresses are self-configured and never appear in DHCPv6 lease tables without this mechanism, breaking tools that map IP addresses to devices or users.
section: "1"
topics:
