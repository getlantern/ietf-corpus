document: rfc-1964
kind: security-consideration
summary: MD2.5 has received limited evaluation and an initial assessment suggests it may be significantly weaker than DES MAC MD5. The algorithm intentionally uses only 8 of 16 MD5 output bytes to guard against postfix attacks where data is appended to an existing message with corresponding checksum modification.
section: 1.2.1.1
topics:
    - security
    - crypto
