document: rfc-3980
kind: protocol-element
summary: The iSCSI NAA naming format uses the prefix "naa." followed by an NAA identifier represented in ASCII-encoded hexadecimal digits. The NAA identifier is defined by INCITS T11 FC-FS and may be either 64-bit (16 hex chars) or 128-bit (32 hex chars) in length.
section: "4.1"
