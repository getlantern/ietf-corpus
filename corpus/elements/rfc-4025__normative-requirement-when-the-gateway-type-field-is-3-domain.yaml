document: rfc-4025
kind: normative-requirement
summary: When the gateway type field is 3 (domain name) and the integrity of the subsequent address query is suspect, the IPSECKEY RR MUST be ignored whenever the resulting gateway does not match the QNAME of the original IPSECKEY RR query.
section: 4.1.2
rfc2119_level: MUST
topics:
    - dns
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
