document: rfc-4837
kind: security-consideration
summary: Several read-write objects in the DOT3-EPON-MIB (notably dot3MpcpAdminState) can disrupt EPON service if set by unauthorized parties. SNMP security mechanisms (SNMPv3 with authentication and privacy) should be used to restrict write access to authorized managers only.
section: "9"
topics:
    - security
    - snmp
