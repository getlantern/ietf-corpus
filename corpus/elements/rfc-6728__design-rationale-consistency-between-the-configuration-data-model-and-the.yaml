document: rfc-6728
kind: design-rationale
summary: Consistency between the configuration data model and the IPFIX MIB module (RFC 6615) and PSAMP MIB module (RFC 6727) is an explicit design goal. Parameters in the data model are named to match corresponding MIB managed objects, and certain IPFIX MIB state objects are adopted as read-only state parameters.
