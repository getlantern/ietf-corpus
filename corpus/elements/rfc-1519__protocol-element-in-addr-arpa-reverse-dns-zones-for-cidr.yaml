document: rfc-1519
kind: protocol-element
summary: IN-ADDR.ARPA reverse DNS zones for CIDR blocks must be delegated along octet boundaries. For a block of 1024 class-C networks spanning 199.0.0 – 199.3.255, delegation requires four second-level records (0.199, 1.199, 2.199, 3.199 IN-ADDR.ARPA) rather than 1024 third-level records.
section: "7.1"
topics:
    - ip
    - dns
