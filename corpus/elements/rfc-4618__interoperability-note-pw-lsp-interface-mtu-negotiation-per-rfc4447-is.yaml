document: rfc-4618
kind: interoperability-note
summary: PW LSP Interface MTU negotiation per RFC4447 is independent of PPP Maximum Receive Unit (MRU) advertisement. A PPP PDU exceeding the negotiated PW tunnel MTU will be discarded by the ingress router regardless of PPP MRU settings.
