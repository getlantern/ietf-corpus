document: rfc-8466
kind: protocol-element
summary: 'The site-network-access is composed of three parameter classes: bearer (sub-Layer 2 attachment requirements, e.g., access media type), connection (Layer 2 protocol properties including encapsulation-type and eth-inf-type), and availability (redundancy mode). Access type is either point-to-point or multipoint.'
section: 5.3.2
