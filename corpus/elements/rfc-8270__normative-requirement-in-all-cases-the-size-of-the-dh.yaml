document: rfc-8270
kind: normative-requirement
summary: In all cases, the size of the DH group SHOULD be at least 2048 bits; setting the group size to 3072 SHOULD be possible as the need may arise in coming years. This updates RFC 4419 Section 3 paragraph 11.
