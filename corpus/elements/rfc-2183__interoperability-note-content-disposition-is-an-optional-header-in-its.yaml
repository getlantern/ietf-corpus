document: rfc-2183
kind: interoperability-note
summary: Content-Disposition is an optional header; in its absence, the MUA may use whatever presentation method it deems suitable. MIME content-type parameters are per-content-type, whereas Content-Disposition parameters are valid for all dispositions.
