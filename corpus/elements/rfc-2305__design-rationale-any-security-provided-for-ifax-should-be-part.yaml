document: rfc-2305
kind: design-rationale
summary: Any security provided for IFax should be part of the existing Internet security infrastructure rather than a new or separate mechanism. This design choice maintains interoperability with Internet mail while leveraging established security solutions.
section: "5.1"
topics:
