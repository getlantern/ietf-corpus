document: rfc-6134
kind: interoperability-note
summary: Applications are only REQUIRED to support "addrbook:default". If a server has no address book concept, it MAY support ":addrbook:default" by having all matches fail, but this SHOULD NOT be done except as a last resort. Other Sieve tests supporting ":list" SHOULD be documented in a specification with a testable capability string.
section: "2.5"
topics:
