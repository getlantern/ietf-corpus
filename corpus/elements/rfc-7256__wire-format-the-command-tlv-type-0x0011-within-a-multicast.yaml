document: rfc-7256
kind: wire-format
summary: The Command TLV (Type 0x0011) within a Multicast Replication Control message contains an 8-bit Command Code (1=Add, 2=Delete, 3=Delete All, 4=Admission Control Reject, 5=Conditional Access Reject, 6=Both Reject), an 8-bit Accounting field meaningful only on Add, a 16-bit Reserved field, and an embedded Multicast-Flow TLV.
section: "4.3"
topics:
    - multicast
