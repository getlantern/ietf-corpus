document: rfc-8810
kind: interoperability-note
summary: Implementors may have chosen to use code points in the range 128-255 under the former 'Private Use' designation prior to RFC 8810. Such uses are no worse than any other code point collision and can be dealt with in the same manner as code point squatting; the survey-identified prestandard uses have been formally registered as deprecated.
section: "2"
topics:
