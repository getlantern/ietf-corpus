document: rfc-6829
kind: design-rationale
summary: The PE address family could previously only be inferred indirectly by examining the lengths of the Sender's/Remote PE Address fields or calculating the length of the sub-TLVs, rather than being explicit in the sub-TLV definition. This ambiguity is resolved by renaming the existing sub-TLVs to include an 'IPv4' qualifier with no semantic changes.
section: "2"
