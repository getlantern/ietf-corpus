document: rfc-5888
kind: normative-requirement
summary: SIP systems MUST perform media alignment by matching nth 'm' lines regardless of the presence of 'group' or 'mid' attributes. If a 'mid' identifier in the offer differs from the 'mid' in the answer, all 'mid' and 'group' lines must be ignored.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
