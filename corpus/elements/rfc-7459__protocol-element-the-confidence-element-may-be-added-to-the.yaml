document: rfc-7459
kind: protocol-element
summary: 'The ''confidence'' element MAY be added to the ''location-info'' element of a PIDF-LO document to express confidence in the associated location information as a percentage (exclusive range 0–100) or the special value ''unknown''. An optional ''pdf'' attribute indicates the shape of the probability distribution: unknown, normal, or rectangular.'
section: "4.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
