document: rfc-4303
kind: wire-format
summary: An ESP packet begins with a 32-bit SPI field and a 32-bit Sequence Number, followed by variable-length Payload Data (which may include an IV and TFC padding), then Padding (0–255 bytes), a 1-byte Pad Length, a 1-byte Next Header, and an optional variable-length ICV. The outer IP header MUST carry protocol number 50.
section: "2"
topics:
    - ipsec
    - security
    - ip
