document: rfc-3012
kind: normative-requirement
summary: The Foreign Agent MUST NOT accept any Challenge in the Registration Request unless it was offered in the last successful Registration Reply or among the last CHALLENGE_WINDOW (default 2) advertised challenge values; otherwise it SHOULD send UNKNOWN_CHALLENGE.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mobility
    - security
