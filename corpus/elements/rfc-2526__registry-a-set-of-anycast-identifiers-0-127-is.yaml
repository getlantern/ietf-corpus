document: rfc-2526
kind: registry
summary: A set of anycast identifiers (0–127) is defined within each subnet prefix. Anycast ID 127 (0x7F) is reserved; ID 126 (0x7E) is assigned to Mobile IPv6 Home-Agents anycast; IDs 0–125 (0x00–0x7D) are reserved for future assignment.
