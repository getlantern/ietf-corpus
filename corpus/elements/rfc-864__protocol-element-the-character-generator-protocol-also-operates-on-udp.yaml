document: rfc-864
kind: protocol-element
summary: The Character Generator Protocol also operates on UDP port 19. When a UDP datagram is received, the server responds with a single answering datagram containing a random number of characters (between 0 and 512); the content of the received datagram is ignored.
section: UDP Based Character Generator Service
