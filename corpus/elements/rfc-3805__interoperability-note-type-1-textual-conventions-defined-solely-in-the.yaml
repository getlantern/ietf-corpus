summary: Type 1 textual conventions (defined solely in the Printer MIB) require a new Printer MIB RFC for any additional enumerated values. Type 2 textual conventions (registered in the IANA Printer MIB) allow additions via Designated Expert Review without republishing the Printer MIB.
