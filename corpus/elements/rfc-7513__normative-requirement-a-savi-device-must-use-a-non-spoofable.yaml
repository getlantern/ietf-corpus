document: rfc-7513
kind: normative-requirement
summary: A SAVI device MUST use a non-spoofable and exclusive binding anchor. Using a spoofable anchor (e.g., a plain MAC address) or a non-exclusive anchor (e.g., a port shared via a non-SAVI device) can lead to worse outcomes than allowing spoofed IP traffic.
section: 4.3.5
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
