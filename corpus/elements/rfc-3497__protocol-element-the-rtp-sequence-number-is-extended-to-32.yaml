document: rfc-3497
kind: protocol-element
summary: The RTP sequence number is extended to 32 bits by appending a 16-bit high-order extension in the payload header. The standard RTP header carries the low 16 bits; the payload header carries the high 16 bits in network byte order. This extension accommodates HDTV's 1.485 Gbps data rate.
section: "5.2"
topics:
    - rtp
    - realtime
