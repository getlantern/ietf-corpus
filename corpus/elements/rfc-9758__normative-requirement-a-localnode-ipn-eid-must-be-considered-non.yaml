document: rfc-9758
kind: normative-requirement
summary: A LocalNode ipn EID MUST be considered non-routable. Bundles using it as source or destination MUST NOT leave the local node; externally received bundles with LocalNode EIDs MUST be discarded. LocalNode EIDs MUST NOT appear in node directories, peer discovery, or as BPSec security sources for transmitted bundles.
section: "5.4"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
