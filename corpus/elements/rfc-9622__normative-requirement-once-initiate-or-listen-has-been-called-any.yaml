document: rfc-9622
kind: normative-requirement
summary: Once Initiate or Listen has been called, any changes to the Preconnection MUST NOT have any effect on the resulting Connection or Listener. The Preconnection may be reused afterward.
section: "7.1"
rfc2119_level: MUST NOT
