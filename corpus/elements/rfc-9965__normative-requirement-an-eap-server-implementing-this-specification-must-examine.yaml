document: rfc-9965
kind: normative-requirement
summary: An EAP server implementing this specification MUST examine the EAP Identity to detect realms under eap.arpa. If the EPI is malformed, the server MUST reply with EAP Failure. If the EPI is unrecognized, the server MUST reply with EAP Nak of type zero (0).
section: 3.4.2
rfc2119_level: MUST
topics:
    - security
