document: rfc-5343
kind: security-consideration
summary: The isAccessAllowed() primitive does not take contextEngineID into account, so a request with localEngineID is treated identically to one with the correct snmpEngineID by the access control subsystem. It is therefore not possible to define a special restricted view for contextEngineID discovery.
section: "5"
topics:
    - snmp
    - security
