document: rfc-4972
kind: interoperability-note
summary: The TE-MESH-GROUP TLVs do not introduce interoperability issues. OSPF routers not supporting the TLV SHOULD silently ignore it per RFC 2370; IS-IS routers not supporting the sub-TLV SHOULD silently ignore it.
