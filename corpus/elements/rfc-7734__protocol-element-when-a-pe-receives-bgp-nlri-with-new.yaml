document: rfc-7734
kind: protocol-element
summary: When a PE receives BGP NLRI with new information, it checks if it is the elected DF for the relevant I-SID/B-VID mapping, then constructs or updates SPBM service identifier and unicast address sub-TLVs for advertisement into ISIS-SPB, and populates a forwarding table indexed by B-MAC+I-SID pointing to the MPLS label stack.
section: "4.4"
topics:
    - routing
    - bgp
