document: rfc-9587
kind: interoperability-note
summary: The YANG module is applicable only when the control-plane-protocol type is 'ospf:ospfv3', enforced by YANG 'when' conditions on all augmentations. This prevents the Extended LSA schema from being applied to OSPFv2 instances.
