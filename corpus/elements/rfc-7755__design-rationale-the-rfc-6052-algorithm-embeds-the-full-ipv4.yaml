document: rfc-7755
kind: design-rationale
summary: The RFC 6052 algorithm embeds the full IPv4 client source address inside the IPv6 translation prefix, preserving it end-to-end through the IDC without any additional mechanism. Applications may optionally extract the embedded IPv4 address for geolocation, logging, and abuse handling.
section: "1.4"
topics:
