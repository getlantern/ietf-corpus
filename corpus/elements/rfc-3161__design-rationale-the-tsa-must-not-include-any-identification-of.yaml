document: rfc-3161
kind: design-rationale
summary: The TSA must not include any identification of the requesting entity in time-stamp tokens. If TSA needs to authenticate requesters, external mechanisms (CMS encapsulation or TLS) must be used. This separates authentication from the timestamping function.
section: "2.1"
topics:
    - pkix
    - privacy
    - security
