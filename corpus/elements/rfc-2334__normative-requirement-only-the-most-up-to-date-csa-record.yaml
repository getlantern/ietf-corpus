document: rfc-2334
kind: normative-requirement
summary: Only the most up-to-date CSA Record instance may be queued on a given DCS retransmit queue; if a newer CSA Record for the same entry arrives while an older one is queued, the older one MUST be immediately dequeued and its timer disassociated before enqueuing the newer instance.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
