document: rfc-2156
kind: protocol-element
summary: 'The OR Address attribute key table defines keys and encodings for all X.400 address attributes: 1984/1988 attributes (C, ADMD, PRMD, O, OU, PN, S, G, I, GQ, DD, X121, T-ID, UA-ID, CN) and 1988-only attributes for Teletex variants and physical delivery (PD-SERVICE, PD-C, PD-CODE, PD-OFFICE, PD-ADDRESS, PD-STREET, PD-BOX, etc.), each with P, N, T, P/T, UPA, I, or X encoding.'
section: 4.1.1
topics:
    - email
