document: rfc-5216
kind: normative-requirement
summary: During the EAP-TLS conversation, the EAP peer and server MUST NOT request or negotiate TLS compression. TLS ciphersuite negotiation MUST NOT be used to negotiate the ciphersuites used to secure data traffic (only the EAP conversation).
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
