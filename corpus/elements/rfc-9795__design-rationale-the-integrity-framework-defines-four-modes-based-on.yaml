document: rfc-9795
kind: design-rationale
summary: 'The integrity framework defines four modes based on two independent axes: whether the signer is authoritative and whether URI references to external content are present. Mode 1 (authoritative, no URIs) requires no additional integrity mechanism; mode 2 requires "rcdi"; modes 3 and 4 (non-authoritative) use JWT Claim Constraints, optionally combined with "rcdi".'
section: "4"
