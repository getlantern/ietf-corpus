document: rfc-3602
kind: normative-requirement
summary: If weak keys are discovered for AES, weak keys SHOULD be checked for and discarded when using manual key management. When using dynamic key management (e.g., IKE), weak key checks SHOULD NOT be performed as unnecessary complexity.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - security
