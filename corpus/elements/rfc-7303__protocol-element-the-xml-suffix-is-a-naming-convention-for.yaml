document: rfc-7303
kind: protocol-element
summary: The '+xml' suffix is a naming convention for XML-based media types allowing generic XML tools (browsers, editors, search engines) to detect and process XML MIME entities. Applications may check for '+xml' by comparing the last four characters of the subtype.
section: "4.2"
