summary: The <domain:authInfoType> uses a choice between <domain:pw> (password-based, pwAuthInfoType from eppcom) and <domain:ext> (extension mechanism). In update context, an additional <domain:null> element is allowed within <domain:authInfoChgType> to remove authorization information.
