document: rfc-4511
kind: normative-requirement
summary: The entire list of modifications in a ModifyRequest MUST be performed in the listed order as a single atomic operation. If the Modify Response indicates any error, the client may expect that no modifications of the DIT have been performed.
section: "4.6"
rfc2119_level: MUST
