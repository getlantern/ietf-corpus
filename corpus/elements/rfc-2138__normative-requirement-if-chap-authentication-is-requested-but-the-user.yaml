document: rfc-2138
kind: normative-requirement
summary: If CHAP authentication is requested but the user's plaintext password is unavailable to the RADIUS server, the server MUST send an Access-Reject; CHAP requires cleartext password access to recompute the challenge hash.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
