document: rfc-6236
kind: security-consideration
summary: The image attribute parameters (especially image size values) can be set to values that cause memory or CPU exhaustion, either by mistake or by a malicious SDP sender. This is analogous to extreme values in a=fmtp lines. Implementers should also consider DoS attacks not detectable by parameter checking alone.
section: "6"
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
