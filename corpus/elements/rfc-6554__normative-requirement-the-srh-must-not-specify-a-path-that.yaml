document: rfc-6554
kind: normative-requirement
summary: The SRH MUST NOT specify a path that visits a node more than once. At minimum, the source MUST ensure that IPv6 addresses do not appear more than once and that the IPv6 Source and Destination addresses of the encapsulating datagram do not appear in the SRH.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ip
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
