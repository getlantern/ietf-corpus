document: rfc-7916
kind: normative-requirement
summary: When SRLG protection is computed, the SRLG violation check SHOULD be performed on both PLR-to-alternate and alternate-to-destination paths, based on the SRLG set of the primary path. Implementations SHOULD allow exclusion of violating alternates or a preference system based on number or cost of violations.
section: 6.2.4.1
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
