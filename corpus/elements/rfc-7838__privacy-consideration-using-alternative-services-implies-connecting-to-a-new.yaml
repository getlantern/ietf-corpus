document: rfc-7838
kind: privacy-consideration
summary: Using alternative services implies connecting to a new server-supplied host name; servers could use unique names to track client requests across networks, especially when the 'persist' flag is used. In a user agent, any alternative service information MUST be removed when origin-specific data (e.g., cookies) is cleared.
section: "9.4"
rfc2119_level: MUST
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
