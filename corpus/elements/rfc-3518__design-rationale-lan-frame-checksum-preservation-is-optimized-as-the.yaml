document: rfc-3518
kind: design-rationale
summary: LAN Frame Checksum Preservation is optimized as the primary mode because IEEE 802.1 requires the Extended LAN to maintain the same probability of undetected error as an individual LAN. Frames without a precalculated FCS are tagged and carried across the line rather than requiring software FCS calculation.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
