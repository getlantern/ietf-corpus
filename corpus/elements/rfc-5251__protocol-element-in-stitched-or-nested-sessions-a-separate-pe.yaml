document: rfc-5251
kind: protocol-element
summary: In 'stitched or nested' sessions, a separate PE-to-PE session is established when the Path message arrives at the ingress PE, either by associating an existing PE-to-PE LSP/FA-LSP or establishing a new compliant segment. The CE-to-CE and PE-to-PE sessions are distinct; provider topology is not exposed to CEs.
section: 4.3.1.2
topics:
