document: rfc-8853
kind: protocol-element
summary: A new media-level SDP attribute 'a=simulcast' is defined. It describes, independently for 'send' and 'receive' directions, the number of simulcast RTP streams and potential alternative formats for each, with each stream identified by a rid-id from RFC 8851. The attribute MUST NOT be used at the session level.
section: "5.1"
topics:
    - realtime
    - rtp
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
