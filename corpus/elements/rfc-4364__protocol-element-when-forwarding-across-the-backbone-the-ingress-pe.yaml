document: rfc-4364
kind: protocol-element
summary: 'When forwarding across the backbone, the ingress PE pushes a two-label MPLS stack: a VPN route label (inner) identifying the egress VRF or attachment circuit, and a tunnel label (outer) routing the packet to the egress PE. The core P routers switch solely on the tunnel label and never inspect VPN routes.'
