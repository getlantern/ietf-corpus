document: rfc-9061
kind: wire-format
summary: 'The tunnel-grouping encodes IPsec tunnel mode endpoints: mandatory local and remote IP addresses, a df-bit enumeration (clear/set/copy, ignored for IPv6), a bypass-dscp boolean (copy inner DSCP to outer if true), and an ordered dscp-mapping list for inner-to-outer DSCP translation when bypass-dscp is false.'
