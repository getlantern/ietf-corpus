document: rfc-5610
kind: protocol-element
summary: The privateEnterpriseNumber Information Element (IE 346, unsigned32, semantics=identifier) carries an IANA-assigned private enterprise number. It is used as a scope field alongside informationElementId to identify enterprise-specific Information Elements; set to 0 (or omitted) for IANA-assigned IEs.
