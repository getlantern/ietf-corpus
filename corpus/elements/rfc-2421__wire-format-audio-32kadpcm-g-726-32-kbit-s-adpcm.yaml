document: rfc-2421
kind: wire-format
summary: 'Audio/32KADPCM (G.726 32 kbit/s ADPCM) is the mandatory default voice encoding sub-type of audio/* used within multipart/voice-message. Body parts MUST carry a Content-Disposition: inline header with a ''voice'' parameter identifying the audio role.'
