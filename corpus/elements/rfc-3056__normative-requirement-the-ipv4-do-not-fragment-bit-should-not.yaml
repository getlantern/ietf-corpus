document: rfc-3056
kind: normative-requirement
summary: The IPv4 'do not fragment' bit SHOULD NOT be set in the encapsulating IPv4 header, so that intermediate IPv4 fragmentation can occur when the IPv6 MTU is too large for an intermediate subnet.
section: "4"
rfc2119_level: SHOULD NOT
