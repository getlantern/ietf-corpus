document: rfc-9546
kind: security-consideration
summary: Security considerations from the DetNet architecture (RFC 8655), MPLS data plane (RFC 8964), DetNet security considerations (RFC 9055), and the DetNet OAM Framework apply to this specification. Security concerns related to MPLS OAM tools such as LSP Ping (RFC 8029) and BFD over PW (RFC 5885) also apply.
