document: rfc-6241
kind: protocol-element
summary: 'NETCONF is partitioned into four layers: (1) Secure Transport, (2) Messages (<rpc>, <rpc-reply>, <notification>), (3) Operations (<get-config>, <edit-config>, etc.), and (4) Content (configuration/notification data). Only layers 1–3 are defined by this document.'
section: "1.2"
