document: rfc-3323
kind: normative-requirement
summary: User agents SHOULD not include optional headers that might divulge personal information (e.g., Call-Info). Users SHOULD populate URIs in accordance with anonymization guidelines and SHOULD create an anonymous From header field for requests seeking privacy.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
