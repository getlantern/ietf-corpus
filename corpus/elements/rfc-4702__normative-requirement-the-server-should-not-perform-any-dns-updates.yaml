document: rfc-4702
kind: normative-requirement
summary: The server SHOULD NOT perform any DNS updates if N=1 in the DHCPACK Flags field; however, the server SHOULD delete any RRs it previously added via DNS updates for the client.
section: "4.1"
rfc2119_level: SHOULD NOT
