document: rfc-6455
kind: normative-requirement
summary: When a server receives a Sec-WebSocket-Version value it does not support, it MUST abort the handshake with an appropriate HTTP error (e.g., 426 Upgrade Required) and MUST include a Sec-WebSocket-Version header field listing all versions it is willing to use.
section: "4.4"
rfc2119_level: MUST
topics:
    - websocket
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
