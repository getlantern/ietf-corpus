document: rfc-1833
kind: normative-requirement
summary: RPCBIND only accepts RPCBPROC_SET and RPCBPROC_UNSET requests from clients running on the same machine as the RPCBIND program. All other procedures can be called remotely.
section: 2.2.2
rfc2119_level: MUST
topics:
