document: rfc-7480
kind: normative-requirement
summary: It is RECOMMENDED that servers use the Access-Control-Allow-Origin header field (CORS header) when responding to queries; a value of '*' is suitable for public resources. Use of the Access-Control-Allow-Credentials header field is NOT RECOMMENDED.
section: "5.6"
rfc2119_level: RECOMMENDED
topics:
    - http
    - security
