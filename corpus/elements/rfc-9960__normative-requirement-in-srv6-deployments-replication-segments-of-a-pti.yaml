document: rfc-9960
kind: normative-requirement
summary: In SRv6 deployments, Replication segments of a PTI MUST be instantiated on Leaf nodes of the tree since behavior like Penultimate Hop Popping (PHP) is not feasible because the Tree-SID is carried in the IPv6 Destination Address field of the outer IPv6 header.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
