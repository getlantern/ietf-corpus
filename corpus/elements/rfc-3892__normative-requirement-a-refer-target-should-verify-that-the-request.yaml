document: rfc-3892
kind: normative-requirement
summary: A refer target SHOULD verify that the request it receives matches the Refer-To header field in the token, including at least the request method and any end-to-end header field values. The URI in Refer-To may differ from request URI due to re-targeting.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
