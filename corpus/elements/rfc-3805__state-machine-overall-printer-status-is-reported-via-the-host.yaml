document: rfc-3805
kind: state-machine
summary: 'Overall printer status is reported via the Host Resources MIB triple (hrDeviceStatus, hrPrinterStatus, hrPrinterDetectedErrorState): Idle=(running,idle,none); Busy/Active=(running,printing,—); Non-Critical Alert=(warning,idle or printing,lowPaper/lowToner/serviceRequested); Critical Alert=(down,other,jammed/noPaper/noToner/coverOpen); Unavailable=(down,other,—); Off-line=(down,other,offline); Moving on-line=(down,warmup,—); Standby=(running,other,—).'
