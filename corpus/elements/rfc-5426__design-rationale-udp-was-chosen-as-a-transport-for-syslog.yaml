document: rfc-5426
kind: design-rationale
summary: UDP was chosen as a transport for syslog because it is lightweight and builds upon the existing widespread use of UDP for syslog (as observed in RFC 3164). Administrators are warned that significant reliability and security issues stem from this choice.
section: "1"
topics:
    - syslog
    - udp
