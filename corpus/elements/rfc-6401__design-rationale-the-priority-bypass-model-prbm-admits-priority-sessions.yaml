document: rfc-6401
kind: design-rationale
summary: The Priority Bypass Model (PrBM) admits priority sessions unconditionally regardless of current load, on the rationale that in practice priority traffic volume is very low most of the time and even during congestion remains a small enough fraction to be absorbed within the engineered capacity safety margin without noticeable QoS degradation.
section: A.3
topics:
