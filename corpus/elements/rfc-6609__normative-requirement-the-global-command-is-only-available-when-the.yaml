document: rfc-6609
kind: normative-requirement
summary: The 'global' command is only available when the script has both 'include' and 'variables' in its require line. If 'global' appears with only one of them required, an error MUST be generated when the script is uploaded. If 'global' names a variable already defined with 'set' in the immediate script, an error MUST be generated.
section: 3.4.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
