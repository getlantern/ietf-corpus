document: rfc-8253
kind: design-rationale
summary: PCEPS uses the StartTLS mechanism rather than a dedicated port to avoid consuming a scarce port number allocation and to simplify PCEP configuration. The StartTLS procedure allows both secured and unsecured PCEP to share the same port.
section: "3.1"
topics:
    - tls
    - security
    - routing
