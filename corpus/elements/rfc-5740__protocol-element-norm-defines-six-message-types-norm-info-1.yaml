summary: 'NORM defines six message types: NORM_INFO(1) for out-of-band context, NORM_DATA(2) for application data/FEC, NORM_CMD(3) for control functions, NORM_NACK(4) for repair requests, NORM_ACK(5) for congestion control feedback, and NORM_REPORT(6) for experimental use.'
