document: rfc-3031
kind: normative-requirement
summary: When a labeled packet is received with an invalid (unbound) incoming label, it MUST be discarded unless it can be determined by some external means that forwarding it unlabeled cannot cause harm (e.g., a loop or incorrect routing due to insufficient network layer header information).
section: "3.18"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
