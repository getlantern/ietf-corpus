document: rfc-1971
kind: design-rationale
summary: For addresses generated via stateless autoconfiguration from the same interface token, it is sufficient to test only the link-local address for uniqueness. Because uniqueness is determined by the interface token portion and prefixes are assumed correctly assigned, all or none of the addresses from the same token will be duplicates.
section: "5.4"
topics:
