document: rfc-6857
kind: protocol-element
summary: MIME body part header field downgrading parses the message's MIME structure at all levels; Content-ID, Content-Type, Content-Disposition, and Content-Description body part header fields containing non-ASCII strings are downgraded using the same methods as the corresponding top-level header fields.
