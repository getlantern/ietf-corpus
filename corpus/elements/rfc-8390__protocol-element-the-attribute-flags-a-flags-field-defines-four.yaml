document: rfc-8390
kind: protocol-element
summary: 'The Attribute Flags (A-Flags) field defines four flags for the Diversity XRO/EXRS subobject: 0x01 Destination node exception, 0x02 Processing node exception, 0x04 Penultimate node exception, and 0x08 LSP ID to be ignored (tunnel-level exclusion). Any combination is permitted.'
