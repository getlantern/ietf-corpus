document: rfc-8536
kind: protocol-element
summary: 'Version 3 TZif files MAY extend POSIX TZ strings in two ways: transition time hours may be signed and range from -167 to 167 (vs. POSIX''s 0–24), and DST can be specified as in effect all year (start January 1 at 00:00, end December 31 at 24:00 plus the DST offset).'
section: 3.3.1
topics:
