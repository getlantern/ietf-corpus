document: rfc-7175
kind: normative-requirement
summary: One-hop TRILL BFD Control frames are sent between neighbor RBridges only if TRILL IS-IS has detected bidirectional connectivity (adjacency in 2-Way or Report state per RFC 7177) and both RBridges indicate BFD support via the BFD-Enabled TLV (RFC 6213).
section: "3.1"
rfc2119_level: SHOULD
topics:
    - routing
