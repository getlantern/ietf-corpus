document: rfc-8912
kind: protocol-element
summary: 'DNS Response Latency (ID 4: RTDNS) and Loss (ID 5: RLDNS) metrics use UDP port 53 with a fully specified DNS query payload: QR=0, OPCODE=0, RD=1, QDCOUNT=1, with QNAME/QTYPE provided as runtime parameters. The Local Host/Resolver maps to the Src role and the Foreign Name Server maps to the Dst role.'
section: "6.2"
topics:
