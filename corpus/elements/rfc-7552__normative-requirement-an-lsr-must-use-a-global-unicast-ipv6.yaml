document: rfc-7552
kind: normative-requirement
summary: An LSR MUST use a global unicast IPv6 address in the IPv6 Transport Address optional object of outgoing targeted Hellos and MUST discard incoming targeted Hellos that do not contain a global unicast IPv6 address. For Link Hellos, the LSR MUST prefer a global unicast IPv6 address over unique-local or link-local addresses when choosing.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
