document: rfc-6425
kind: normative-requirement
summary: LSP ping MUST NOT be used to attempt to measure round-trip time for P2MP data delivery, because P2MP LSPs are unidirectional and echo replies are often returned via the control plane.
section: 4.1.2
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
    - multicast
