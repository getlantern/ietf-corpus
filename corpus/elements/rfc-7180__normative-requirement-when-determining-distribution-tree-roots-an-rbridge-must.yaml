document: rfc-7180
kind: normative-requirement
summary: When determining distribution tree roots, an RBridge MUST ignore all nicknames held by TRILL Switches that are in overload or are data unreachable. This prevents overloaded nodes from being selected as tree roots.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
