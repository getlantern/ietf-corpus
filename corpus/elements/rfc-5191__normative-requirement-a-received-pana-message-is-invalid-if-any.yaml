document: rfc-5191
kind: normative-requirement
summary: 'A received PANA message is invalid if: any header field is invalid; the message type is unexpected for the current phase; required AVPs are missing or misplaced; AVPs cannot be decoded; or a post-EAP-Success message lacks an AUTH AVP whose value matches the computed hash. Invalid messages MUST be discarded.'
section: "5.5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
