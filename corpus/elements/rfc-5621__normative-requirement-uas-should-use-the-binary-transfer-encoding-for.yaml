document: rfc-5621
kind: normative-requirement
summary: UAs SHOULD use the binary transfer encoding for all payloads in SIP, including binary payloads. The only exception is when transferring application data between applications that only handle a different encoding (e.g., base64).
section: "3.2"
rfc2119_level: SHOULD
topics:
