document: rfc-4502
kind: security-consideration
summary: Section 7 addresses the security of SNMP access to RMON2 MIB objects. Several objects have read-write or read-create access and are sensitive because they control the probe's monitoring functions; unauthorized modification could disrupt network management data collection. SNMPv3 security mechanisms are recommended to control access.
section: "7"
topics:
    - snmp
    - security
