document: rfc-2051
kind: protocol-element
summary: 'Compression negotiation for local LUs is controlled by appcLluAdminCompression (prohibited/required/negotiable) together with separate inbound and outbound compression level objects supporting: none, rle (run-length encoding), lz9, lz10, and lz12 (Lempel-Ziv-like with 9-, 10-, or 12-bit codes). An additional flag (appcLluAdminCompRleBeforeLZ) specifies whether RLE is applied before LZ compression. These values are used during SNA BIND negotiation.'
section: "4"
topics:
