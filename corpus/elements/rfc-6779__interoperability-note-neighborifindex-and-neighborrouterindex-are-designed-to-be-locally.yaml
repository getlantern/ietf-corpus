document: rfc-6779
kind: interoperability-note
summary: NeighborIfIndex and NeighborRouterIndex are designed to be locally common between the NHDP-MIB module and any dependent routing protocol MIB module on the same router. Both MIB modules SHOULD use these indexes to enable cross-referencing of state information.
section: "6.2"
topics:
    - snmp
