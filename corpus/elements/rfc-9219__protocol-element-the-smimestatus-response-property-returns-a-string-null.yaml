document: rfc-9219
kind: protocol-element
summary: The "smimeStatus" response property returns a String|null value representing the S/MIME signature and certificate verification status. Null signifies no signature; possible string values include "unknown", "signed", "signed/verified", "signed/failed", "encrypted+signed/verified", and "encrypted+signed/failed".
section: "4.1"
