document: rfc-5460
kind: normative-requirement
summary: LEASEQUERY-DATA MUST ONLY be sent in response to a successful LEASEQUERY and only if more than one client's data is to be sent. The transaction-id field MUST match the originating LEASEQUERY request.
section: 5.2.1
rfc2119_level: MUST
