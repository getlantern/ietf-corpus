document: rfc-4976
kind: security-consideration
summary: Relays never forward messages unless they have a trust relationship with either the sending or receiving client, and only forward a message coming from or going to the client that holds the matching URI token. This prevents open-relay abuse and DoS amplification.
section: "9.3"
topics:
    - realtime
    - security
