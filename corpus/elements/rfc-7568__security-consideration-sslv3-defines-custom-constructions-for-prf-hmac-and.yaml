document: rfc-7568
kind: security-consideration
summary: SSLv3 defines custom constructions for PRF, HMAC, and digital signatures that lack the cryptographic scrutiny of standard TLS constructions. All SSLv3 primitives rely on SHA-1 and MD5, which are considered weak and are being replaced with stronger hash functions such as SHA-256.
section: "4.3"
topics:
    - tls
    - security
    - crypto
