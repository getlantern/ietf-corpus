document: rfc-4833
kind: design-rationale
summary: TZ Name is preferred over POSIX string for most uses because it is easier for users to configure and provides historical accuracy. POSIX strings are more suitable for small-footprint applications that don't maintain a local copy of the TZ Database.
section: "6"
