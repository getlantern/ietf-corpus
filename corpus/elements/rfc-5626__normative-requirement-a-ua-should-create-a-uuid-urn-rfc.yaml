document: rfc-5626
kind: normative-requirement
summary: A UA SHOULD create a UUID URN (RFC 4122) as its instance-id. If a URN scheme other than UUID is used, the UA MUST only use URNs for which an RFC from the IETF stream defines how the URN is constructed and used in the '+sip.instance' Contact header field parameter.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
