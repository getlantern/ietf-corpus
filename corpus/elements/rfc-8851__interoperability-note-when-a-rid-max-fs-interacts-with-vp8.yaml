document: rfc-8851
kind: interoperability-note
summary: When 'a=rid' max-fs interacts with VP8's 'max-fs' fmtp parameter, the sent stream conforms to min(rid_max_fs, fmtp_max_fs * macroblock_size); similarly max-width and max-height are bounded by both the rid values and those derived from sqrt(fmtp_max_fs * 8) per RFC 7741 Section 6.1.
section: 8.1.2
topics:
    - rtp
    - webrtc
    - realtime
