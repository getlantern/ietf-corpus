document: rfc-7856
kind: interoperability-note
summary: The Softwire Mesh MIB requires implementation of the IP Tunnel MIB (RFC 4087); the softwire mesh interface must also have an entry in the IF-MIB (RFC 2863), indexed by ifIndex, as tunnels are represented as logical interfaces.
