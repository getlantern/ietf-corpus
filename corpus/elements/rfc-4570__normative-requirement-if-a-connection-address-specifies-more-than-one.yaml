document: rfc-4570
kind: normative-requirement
summary: If a connection-address specifies more than one multicast address via the <number of addresses> field, a source filter for each address must be stated explicitly using a separate 'a=source-filter' line per address, unless the '*' wildcard is used for <dest-address>.
section: "3.1"
rfc2119_level: MUST
topics:
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
