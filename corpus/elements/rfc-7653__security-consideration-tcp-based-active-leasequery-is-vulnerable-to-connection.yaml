document: rfc-7653
kind: security-consideration
summary: 'TCP-based Active Leasequery is vulnerable to connection exhaustion attacks: malicious requestors can establish connections but send invalid, partial, or no queries to exhaust the server''s connection pool. Servers SHOULD limit the number of accepted connections and the duration idle connections remain open.'
section: "10"
topics:
