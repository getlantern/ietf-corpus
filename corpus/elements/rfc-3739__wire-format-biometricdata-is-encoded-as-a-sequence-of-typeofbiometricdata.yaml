summary: BiometricData is encoded as a SEQUENCE of typeOfBiometricData (CHOICE of PredefinedBiometricType INTEGER or OID), hashAlgorithm (AlgorithmIdentifier), biometricDataHash (OCTET STRING), and optional sourceDataUri (IA5String). PredefinedBiometricType values are picture(0) and handwritten-signature(1).
