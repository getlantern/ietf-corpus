document: rfc-2728
kind: security-consideration
summary: Because VBI delivery is a broadcast network, transmitted data is accessible to any receiver. Security is delegated entirely to other protocol layers—IPsec, TLS, or application-layer protocols—as no link-layer security mechanism is defined in this document.
