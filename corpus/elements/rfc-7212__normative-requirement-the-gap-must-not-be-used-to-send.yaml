document: rfc-7212
kind: normative-requirement
summary: The GAP MUST NOT be used to send TLVs in cleartext where the value requires confidentiality, such as TLVs containing bare cryptographic keying material. Applications requiring confidentiality must implement their own confidentiality mechanism.
section: "9"
rfc2119_level: MUST NOT
topics:
    - mpls
    - security
    - crypto
