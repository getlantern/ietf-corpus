document: rfc-8308
kind: design-rationale
summary: Without the 'elevation' extension, Windows SSH servers must always elevate administrative sessions to ensure full access. The extension allows clients to explicitly request or decline elevation, reducing attack surface by avoiding unnecessary elevation for sessions that don't require it.
section: "3.4"
topics:
    - security
    - crypto
