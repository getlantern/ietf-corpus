document: rfc-3545
kind: normative-requirement
summary: When F=0 and dT=0, the decompressor sets deltaT to 0. When F=1 and dT=0, the decompressor KEEPS THE CURRENT deltaT in the context (does NOT reset deltaT to 0), which is a key behavioral difference from RFC 2508.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
