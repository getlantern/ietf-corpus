document: rfc-7195
kind: normative-requirement
summary: If the answerer becomes the active party, it MUST extract the E.164 number from the offer's 'c=' line and MUST establish a circuit-switched bearer to that address, and MUST send correlation identifiers (callerid, uuie, dtmf) as applicable.
section: 5.6.2
rfc2119_level: MUST
topics:
