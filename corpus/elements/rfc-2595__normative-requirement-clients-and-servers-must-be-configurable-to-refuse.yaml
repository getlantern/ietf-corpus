document: rfc-2595
kind: normative-requirement
summary: Clients and servers MUST be configurable to refuse all clear-text login commands or mechanisms unless an encryption layer of adequate strength is active. Servers which allow unencrypted clear-text logins SHOULD be configurable to refuse them on both a server-wide and per-user basis.
section: "2.3"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
