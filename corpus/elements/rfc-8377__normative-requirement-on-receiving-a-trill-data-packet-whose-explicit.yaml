document: rfc-8377
kind: normative-requirement
summary: On receiving a TRILL Data packet whose explicit topology label differs from the port's own topology determination for that packet, the TRILL switch MUST discard the packet (applies to ports with Explicit Topology capability value 1).
section: 2.4.1
rfc2119_level: MUST
topics:
    - routing
