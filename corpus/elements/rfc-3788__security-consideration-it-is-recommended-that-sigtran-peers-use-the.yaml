document: rfc-3788
kind: security-consideration
summary: It is recommended that SIGTRAN peers use the same security mechanism (IPsec or TLS) across all sessions with other SIGTRAN peers. Inconsistent use can result in redundant security mechanisms (e.g., TLS over IPsec) or security vulnerabilities.
section: "8"
topics:
    - ipsec
    - tls
    - security
