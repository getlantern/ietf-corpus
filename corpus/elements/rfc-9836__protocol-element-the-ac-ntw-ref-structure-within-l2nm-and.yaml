document: rfc-9836
kind: protocol-element
summary: 'The ''ac-ntw-ref'' structure within L2NM and L3NM augmentations carries three leafrefs: ''ac-ref'' (key, mandatory), ''node-ref'' (optional node identifier), and ''network-ref'' pointing to ''/nw:networks/network/network-id''. This allows correlation of a VPN network access with a specific AC in a specific network.'
section: "5"
