document: rfc-8345
kind: normative-requirement
summary: Network types SHOULD always be represented using presence containers, not leafs of type `empty`. This enables representation of hierarchies of network subtypes (e.g., an OSPF network is also an L3-unicast-IGP network) within instance information.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - yang
    - routing
