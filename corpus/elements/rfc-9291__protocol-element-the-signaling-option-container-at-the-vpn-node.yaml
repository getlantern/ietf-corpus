document: rfc-9291
kind: protocol-element
summary: The 'signaling-option' container at the VPN node level covers BGP, LDP, and L2TP pseudowire signaling. It includes 'advertise-mtu' and 'mtu-allow-mismatch' flags applicable to all signaling types. LDP and L2TP are grouped under a common 'ldp-or-l2tp' structure because they share AGI, SAII, and TAII parameters.
section: 7.5.2
topics:
