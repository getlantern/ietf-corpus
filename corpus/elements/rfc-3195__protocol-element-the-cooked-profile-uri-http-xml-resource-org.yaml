document: rfc-3195
kind: protocol-element
summary: 'The COOKED profile (URI: http://xml.resource.org/profiles/syslog/COOKED) uses application/beep+xml and defines three XML elements: ''iam'' (peer identity and role), ''entry'' (parsed syslog message with structured fields), and ''path'' (relay chain with per-hop security properties). Each MSG is individually acknowledged with ''ok'' or ''error''.'
