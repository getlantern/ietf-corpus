document: rfc-1425
kind: normative-requirement
summary: A client SMTP MUST NOT cache any information returned if the EHLO command succeeds. It must issue the EHLO command at the start of each SMTP session if information about extended facilities is needed.
section: "4"
rfc2119_level: MUST NOT
topics:
