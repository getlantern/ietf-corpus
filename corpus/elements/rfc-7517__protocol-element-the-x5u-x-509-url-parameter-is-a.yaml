document: rfc-7517
kind: protocol-element
summary: The "x5u" (X.509 URL) parameter is a URI pointing to an X.509 certificate or certificate chain in PEM-encoded form. The resource MUST be retrieved via TLS with server identity validation, and the key in the first certificate MUST match the JWK's public key.
