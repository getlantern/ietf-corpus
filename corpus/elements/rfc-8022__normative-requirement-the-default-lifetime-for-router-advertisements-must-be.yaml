document: rfc-8022
kind: normative-requirement
summary: The 'default-lifetime' for Router Advertisements MUST be either zero or between max-rtr-adv-interval and 9000 seconds. If not configured, the device SHOULD use a value of 3 * max-rtr-adv-interval.
section: "9.1"
rfc2119_level: MUST
topics:
    - yang
    - routing
    - ip
