document: rfc-8658
kind: normative-requirement
summary: 'The Softwire46-Configuration Attribute MUST contain one or more of the following attributes: Softwire46-MAP-E, Softwire46-MAP-T, and/or Softwire46-Lightweight-4over6. There MUST be at most one instance of each type encapsulated in one Softwire46-Configuration Attribute.'
section: "3.1"
rfc2119_level: MUST
