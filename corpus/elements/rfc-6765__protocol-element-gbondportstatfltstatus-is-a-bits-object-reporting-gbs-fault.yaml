document: rfc-6765
kind: protocol-element
summary: 'gBondPortStatFltStatus is a BITS object reporting GBS fault conditions: noPeer(0), peerPowerLoss(1) (Dying Gasp), peerBondSchemeMismatch(2), bceSubTypeMismatch(3), lowRate(4), init(5), and ready(6). Both ifOperStatus and gBondPortStatFltStatus must be inspected together to determine the true operational status of a GBS port.'
