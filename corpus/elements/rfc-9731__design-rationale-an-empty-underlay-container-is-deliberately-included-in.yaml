document: rfc-9731
kind: design-rationale
summary: An empty 'underlay' container is deliberately included in the vn-member grouping to serve as an augmentation anchor for underlay technologies not modeled by RFC 8795 (e.g., Segment Routing Policy per RFC 9256). This future-proofs the model without prematurely encoding SR specifics.
section: "4.4"
topics:
