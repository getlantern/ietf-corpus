document: rfc-9740
kind: interoperability-note
summary: Implementations of the tcpSharedOptionExID IEs require a locally maintained list of valid ExIDs from the IANA 'TCP Experimental Option Experiment Identifiers' registry to determine whether an observed ExID is 2 or 4 bytes long. Without this list, an implementation cannot autonomously distinguish 2-byte from 4-byte ExIDs.
section: "5"
topics:
    - tcp
