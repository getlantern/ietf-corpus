document: rfc-7796
kind: normative-requirement
summary: If both the local PE and its peer have the P bit set (both are leaf-only), the local PE MUST send a Label Release message with status code 'Leaf-to-Leaf PW released' and exit the signaling process, preventing a useless leaf-to-leaf PW from being established.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
