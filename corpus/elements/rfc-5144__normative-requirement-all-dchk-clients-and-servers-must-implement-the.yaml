document: rfc-5144
kind: normative-requirement
summary: All DCHK clients and servers MUST implement the Lightweight UDP Transport Protocol (IRIS-LWZ). Use of other transports such as IRIS-XPC or BEEP is optional and at the discretion of the server operator.
