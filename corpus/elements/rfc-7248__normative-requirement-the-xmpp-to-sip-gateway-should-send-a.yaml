document: rfc-7248
kind: normative-requirement
summary: The XMPP-to-SIP gateway SHOULD send a new SUBSCRIBE request to the SIP user whenever the XMPP user initiates a presence session and also SHOULD refresh before the SIP subscription expires during an active XMPP session.
section: 4.2.2
rfc2119_level: SHOULD
