document: rfc-8138
kind: design-rationale
summary: This specification intentionally omits backward-compatibility mechanisms between nodes supporting 6LoRH compression and those that do not. Targeting simple constrained implementations, it assumes a homogeneous network. Mismatch situations are administrative errors (wrong device or misconfiguration) handled by management alerts, not in-band protocol negotiation.
