document: rfc-4642
kind: protocol-element
summary: The STARTTLS extension adds a STARTTLS command and advertises the capability label 'STARTTLS' in response to the CAPABILITIES command. It provides connection-based security via TLS, enabling encryption, data integrity, optional certificate-based authentication, and optional data compression.
