document: rfc-3081
kind: normative-requirement
summary: Before sending a message, the sending BEEP peer must ensure that the size of the payload is within the window advertised by the receiving peer; if not, the peer may segment the message, delay sending, or signal the application.
section: 3.1.2
rfc2119_level: MUST
topics:
    - tcp
    - congestion
