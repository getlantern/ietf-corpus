document: rfc-8532
kind: protocol-element
summary: 'The ''test-point-locations'' grouping under each network node provides five location-type containers: IPv4 (key: ipv4-location + ni), IPv6 (key: ipv6-location + ni), MAC address, AS number, and router-id. Each contains a list of test-point-location-info entries plus an optional routing-instance-ref (VRF/NI reference).'
section: "3.5"
