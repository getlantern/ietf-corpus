document: rfc-8285
kind: interoperability-note
summary: Use of RTP header extensions reduces the efficiency of RTP header compression (e.g., RFC 2508, RFC 3095) because the header extension is sent uncompressed unless the compression module is updated. Intermittent extension presence can also require updates to the fixed header, further reducing compression efficiency.
section: 4.1.2
topics:
    - rtp
    - realtime
