document: rfc-8263
kind: normative-requirement
summary: A GROUPKEY-PUSH ACK MUST be sent even if the GROUPKEY-PUSH message contains a Delete payload for the KEK used to protect it. The ACK is sent only after successful processing of the GROUPKEY-PUSH message per RFC 6407.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - vpn
