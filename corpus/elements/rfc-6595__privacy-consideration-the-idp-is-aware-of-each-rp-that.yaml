document: rfc-6595
kind: privacy-consideration
summary: The IdP is aware of each RP that a user authenticates to; the protocol does not hide this information. IdPs can track user access to services using RPs, which SASL server implementers should be aware of.
section: "6.3"
topics:
    - privacy
    - security
