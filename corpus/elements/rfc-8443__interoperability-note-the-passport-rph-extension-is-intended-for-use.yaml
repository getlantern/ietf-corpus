document: rfc-8443
kind: interoperability-note
summary: The PASSporT 'rph' extension is intended for use in environments where there are means to verify that the signer of the SIP 'Resource-Priority' header field is authoritative; use in other environments is out of scope. How the extension is used for real-time communications is also out of scope.
