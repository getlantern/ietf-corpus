document: rfc-9117
kind: interoperability-note
summary: The original RFC 8955 mandatory AS_PATH validation rule (first AS must equal neighbor AS) is redefined as optional for the Flow Specification address family, per RFC 4271 Section 6.3. A BGP speaker may still optionally enforce it; when enforced for a non-route-server peer, security characteristics are equivalent to those in RFC 8955.
section: "4.2"
topics:
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
