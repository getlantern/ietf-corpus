document: rfc-7844
kind: normative-requirement
summary: Clients interested in their privacy SHOULD NOT use IA_TA (temporary addresses option, code 4), as it reveals the desire for privacy and may trigger countermeasures, is not widely supported, and addresses obtained via IA_NA under the anonymity profile already serve as de facto temporary addresses.
section: 4.5.1
rfc2119_level: SHOULD NOT
topics:
    - privacy
