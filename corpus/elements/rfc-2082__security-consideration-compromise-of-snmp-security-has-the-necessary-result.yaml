document: rfc-2082
kind: security-consideration
summary: Compromise of SNMP security has the necessary result that RIP-2 configuration parameters manageable via SNMP — including the routing table and Authentication Key — may be compromised. Changing Authentication Keys using non-encrypted SNMP is no more secure than sending passwords in the clear.
section: "8"
topics:
    - routing
    - security
