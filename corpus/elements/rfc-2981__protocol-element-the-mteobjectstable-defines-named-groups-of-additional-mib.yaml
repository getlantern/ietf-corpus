document: rfc-2981
kind: protocol-element
summary: The mteObjectsTable defines named groups of additional MIB objects to attach to notifications. Objects are added in lexical index order, with trigger-level objects first, then trigger-test-level, then event-level. Each object can be wildcarded using mteObjectsIDWildcard.
