document: rfc-4501
kind: normative-requirement
summary: The digit representation of DNS types and classes MAY be used when a mnemonic is not well known, but SHOULD NOT be used for types and classes defined in the DNS specification (RFC 1035). All implementations MUST recognize the mnemonics defined in RFC 1035.
section: "3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
