document: rfc-2163
kind: protocol-element
summary: 'X.400 O/R name attributes are encoded into DNS <domain-name> syntax via an escape mechanism: missing attributes map to bare <attr-label>, blank attributes append ''b'', hyphens map to ''-h-'', quoted dots to ''-d-'', spaces to ''-b-'', and other non-alphanumeric characters to their 3-digit decimal ASCII code enclosed in hyphens. A trailing hyphen in the translation is omitted.'
section: 4.2.1
topics:
    - dns
    - email
