document: rfc-5161
kind: wire-format
summary: 'The ENABLE command syntax is: ''ENABLE'' followed by one or more SP-separated capability names. The ENABLED response syntax is: ''ENABLED'' followed by zero or more SP-separated capability names. Both are extensions to the command-any and response-data non-terminals from RFC 3501.'
