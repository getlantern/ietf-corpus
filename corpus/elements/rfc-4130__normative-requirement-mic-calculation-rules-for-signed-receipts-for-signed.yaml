document: rfc-4130
kind: normative-requirement
summary: 'MIC calculation rules for signed receipts: for signed messages, MIC is calculated over the RFC 1767/3023 MIME header and content after canonicalization; for encrypted unsigned messages, MIC is over the decrypted and canonicalized content; for unsigned unencrypted messages, MIC is calculated over message contents without MIME or RFC 2822 headers.'
section: 7.3.1
rfc2119_level: MUST
topics:
    - http
    - email
    - crypto
