document: rfc-8104
kind: normative-requirement
summary: A context identifier MUST be globally unique (or unique in the address space of the network where the primary PE and protector reside). A distinct context identifier MUST be assigned to each {primary PE, protector} pair, and a given PW MUST be associated with one and only one such pair.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
