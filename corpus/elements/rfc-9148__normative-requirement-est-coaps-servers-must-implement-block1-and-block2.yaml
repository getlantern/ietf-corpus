document: rfc-9148
kind: normative-requirement
summary: EST-coaps servers MUST implement Block1 and Block2 options (RFC 7959). EST-coaps clients MUST implement Block2, and MUST implement Block1 only if they expect to send requests exceeding the path MTU.
section: "4.6"
rfc2119_level: MUST
topics:
