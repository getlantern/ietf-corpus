document: rfc-3931
kind: normative-requirement
summary: When negotiating a control connection over UDP, control messages MUST be sent using registered UDP destination port 1701. Subsequent control and data traffic associated with the connection must use the same negotiated UDP port pair.
section: 4.1.2.2
rfc2119_level: MUST
topics:
    - vpn
    - udp
