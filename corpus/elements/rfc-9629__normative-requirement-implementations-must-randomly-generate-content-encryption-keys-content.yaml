document: rfc-9629
kind: normative-requirement
summary: Implementations MUST randomly generate content-encryption keys, content-authenticated-encryption keys, and message-authentication keys. The generation of KEM key pairs also relies on random numbers; use of inadequate PRNGs can result in little or no security.
section: "7"
rfc2119_level: MUST
topics:
    - crypto
    - security
