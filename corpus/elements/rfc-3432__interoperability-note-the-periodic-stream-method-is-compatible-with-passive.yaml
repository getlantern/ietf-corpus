document: rfc-3432
kind: interoperability-note
summary: The periodic stream method is compatible with passive measurement as well as active measurement; in passive measurement, arrival randomness of user media flows may satisfy the independent-start-time requirement, or a randomized measurement start within a flow may be needed.
