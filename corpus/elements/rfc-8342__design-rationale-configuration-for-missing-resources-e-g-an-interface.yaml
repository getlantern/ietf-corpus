document: rfc-8342
kind: design-rationale
summary: Configuration for missing resources (e.g., an interface not currently present) is allowed to exist in <running> and <intended> but will not appear in <operational>. This prevents a missing resource from rendering the configuration invalid and causing devices to restart with invalid configurations after a reboot.
section: 5.3.2
topics:
    - netconf
    - yang
