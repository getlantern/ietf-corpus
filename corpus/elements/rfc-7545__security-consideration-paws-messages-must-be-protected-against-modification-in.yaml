document: rfc-7545
kind: security-consideration
summary: PAWS messages must be protected against modification in transit; TLS (via HTTPS) provides this integrity protection. Without it, a man-in-the-middle could inject false spectrum data, enabling secondary devices to cause interference or deny service.
section: "10.2"
topics:
    - security
    - tls
