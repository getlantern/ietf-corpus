document: rfc-7726
kind: security-consideration
summary: Multiple BFD sessions consume system and network resources. It is critical to provision only the minimum number of BFD sessions needed per FEC and to promptly delete sessions when no longer required. Security measures from RFC 4379 and RFC 5884 must also be followed.
section: "4"
topics:
    - security
    - mpls
    - routing
