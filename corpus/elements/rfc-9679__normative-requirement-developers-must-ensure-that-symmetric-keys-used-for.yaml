document: rfc-9679
kind: normative-requirement
summary: Developers MUST ensure that symmetric keys used for thumbprinting have sufficient entropy (at least 128-bit randomly selected key); thumbprints MUST NOT be used with passwords or other low-entropy secrets. If entropy sufficiency cannot be determined, thumbprints of symmetric keys MUST NOT be used.
section: "7"
rfc2119_level: MUST NOT
topics:
    - cbor
    - crypto
    - security
