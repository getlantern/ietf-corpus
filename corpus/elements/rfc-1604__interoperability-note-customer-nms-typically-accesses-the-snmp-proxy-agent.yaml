document: rfc-1604
kind: interoperability-note
summary: Customer NMS typically accesses the SNMP proxy-agent using SNMP over UDP/IP encapsulated in Frame Relay per RFC 1490/ANSI T1.617 Annex F. The customer itself has a PVC to the proxy-agent; alternate access mechanisms are not precluded.
