document: rfc-7623
kind: normative-requirement
summary: B-MAC addresses must be globally unique across all interconnected networks including PBB-EVPN and IEEE 802.1aq/802.1Qbp networks. Uniqueness for All-Active segments is achieved via operator-assigned OUI-based MAC pools.
section: "8.1"
rfc2119_level: MUST
topics:
