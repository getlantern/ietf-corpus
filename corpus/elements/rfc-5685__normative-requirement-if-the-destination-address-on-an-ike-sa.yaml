document: rfc-5685
kind: normative-requirement
summary: If the destination address on an IKE_SA_INIT request is an anycast address, the receiving VPN gateway MUST include the REDIRECT payload to redirect the client to a unicast address. The gateway MAY redirect to its own unicast address if not overloaded.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
