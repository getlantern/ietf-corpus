summary: 'OF0 fixes the following constants: DEFAULT_STEP_OF_RANK=3, MINIMUM_STEP_OF_RANK=1, MAXIMUM_STEP_OF_RANK=9, DEFAULT_RANK_STRETCH=0, MAXIMUM_RANK_STRETCH=5, DEFAULT_RANK_FACTOR=1, MINIMUM_RANK_FACTOR=1, MAXIMUM_RANK_FACTOR=4. With DEFAULT_MIN_HOP_RANK_INCREASE=256, these allow encoding a minimum of 28 (worst) to a maximum of 255 (excellent) hops.'
