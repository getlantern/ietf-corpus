document: rfc-9921
kind: design-rationale
summary: The primary motivation for CTT is 'long-term signatures' — signatures that remain verifiable after the signing certificate expires. The signer acquires a fresh TST covering the signature from a TSA, which proves the signing certificate was valid at signing time, preventing subsequent denial by the signer.
section: "1.1"
