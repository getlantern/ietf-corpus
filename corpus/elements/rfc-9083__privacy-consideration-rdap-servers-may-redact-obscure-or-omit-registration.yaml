document: rfc-9083
kind: privacy-consideration
summary: RDAP servers may redact, obscure, or omit registration data based on authorization level; registered status values "removed", "obscured", and "private" explicitly signal data suppression on entity objects. Truncation notices allow servers to communicate the reason for omitted data (authorization, load, or unexplainable).
section: "9"
topics:
