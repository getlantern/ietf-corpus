document: rfc-8583
kind: security-consideration
summary: 'Load information may be sensitive: unauthorized recipients could infer network topology, identify heavily loaded nodes as DoS targets, or use load reports as feedback about an ongoing DoS attack. Additionally, malicious or erroneous load reports (including manipulation by agents) can negatively impact routing decisions.'
