document: rfc-5170
kind: normative-requirement
summary: 'PRNG scaling MUST use the formula: scaled_value = (unsigned long)((double)maxv * (double)raw_value / (double)0x7FFFFFFF). Modulo-based scaling must be avoided because least-significant bits of the PRNG output are less random.'
section: "5.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
