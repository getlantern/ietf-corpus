document: rfc-5464
kind: normative-requirement
summary: A server that supports unsolicited annotation change responses MUST support the ENABLE [RFC5161] extension and MUST only send unsolicited METADATA responses if the client first used the ENABLE command with 'METADATA' or 'METADATA-SERVER'.
section: "1"
rfc2119_level: MUST
topics:
    - email
