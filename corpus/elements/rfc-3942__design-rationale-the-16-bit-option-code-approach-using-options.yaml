document: rfc-3942
kind: design-rationale
summary: The 16-bit option code approach (using options 126 and 127 or a new magic cookie) was rejected because it penalizes the first option assigned, requires significant changes to clients/servers/relay agents, could adversely impact existing implementations, and forces clients to send multiple DHCPDISCOVER messages.
section: "3.1"
topics:
