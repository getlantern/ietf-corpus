document: rfc-4291
kind: normative-requirement
summary: The loopback address (::1) must not be assigned to any physical interface, must not be used as the source address in packets sent outside a single node, must never be forwarded by a router, and a packet received with a loopback destination must be dropped.
section: 2.5.3
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
