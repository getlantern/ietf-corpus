document: rfc-7705
kind: normative-requirement
summary: A BGP router configured with 'Internal BGP AS Migration' MUST treat UPDATEs sent and received on this session as if it were a natively configured iBGP session, as defined by RFC 4271 and RFC 4456. The BGP attributes and acceptable operations are identical to standard iBGP.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
