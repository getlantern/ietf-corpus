document: rfc-9135
kind: protocol-element
summary: In symmetric IRB, the MPLS Label2 field in the MAC/IP Advertisement route is set to an MPLS label or VNI corresponding to the tenant's IP-VRF. A non-zero Label2 signals symmetric IRB mode to receiving PEs.
