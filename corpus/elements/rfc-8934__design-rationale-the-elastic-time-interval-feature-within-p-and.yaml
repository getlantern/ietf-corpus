document: rfc-8934
kind: design-rationale
summary: The elastic time interval feature (within -P and Q) is provided so that users who need a scheduled LSP for interval [Ta, Tb] but have some flexibility on exact timing can allow the PCE to optimize placement within the elastic range, enabling better resource utilization across the network.
