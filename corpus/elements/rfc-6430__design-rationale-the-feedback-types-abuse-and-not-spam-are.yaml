document: rfc-6430
kind: design-rationale
summary: 'The feedback types "abuse" and "not-spam" are treated as opposites: a mistaken not-spam report can be countermanded by a subsequent abuse report from the same user, and operators may consider collected reports of both types when making future assessments.'
