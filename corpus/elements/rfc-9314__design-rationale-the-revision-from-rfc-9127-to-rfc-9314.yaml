document: rfc-9314
kind: design-rationale
summary: 'The revision from RFC 9127 to RFC 9314 introduces a backwards-incompatible change: an ''if-feature'' called ''client-base-cfg-parms'' was added to the ''client-cfg-parms'' grouping so that BFD clients that do not need those parameters can deviate without being forced to include them. Clients using these parameters must now verify server feature support first.'
section: "2.11"
topics:
