document: rfc-1034
kind: protocol-element
summary: 'A zone''s data comprises: authoritative RRs for all nodes within the zone; the top-node data (including the SOA and NS RRs); delegation NS RRs at zone cuts (not authoritative for the zone); and glue address RRs for subzone name servers whose names fall below the cut.'
section: 4.2.1
