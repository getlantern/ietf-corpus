document: rfc-1647
kind: state-machine
summary: A TN3270E connection operates in either '3270 mode' or 'NVT mode'. The connection starts in 3270 mode after successful negotiation. Sending a DATA-TYPE of NVT-DATA while in 3270 mode (or 3270-DATA while in NVT mode) constitutes a mode switch request. A mode switch causes the client to perform the equivalent of a 3270 Erase/Reset operation using the default partition size.
section: "9.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
