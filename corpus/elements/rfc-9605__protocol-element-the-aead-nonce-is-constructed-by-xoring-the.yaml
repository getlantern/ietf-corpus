document: rfc-9605
kind: protocol-element
summary: The AEAD nonce is constructed by XORing the sframe_salt with the CTR value (encoded as a big-endian integer of length AEAD.Nn). The SFrame header is concatenated with application-supplied metadata and used as AAD for the AEAD operation.
