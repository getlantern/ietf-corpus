document: rfc-6560
kind: protocol-element
summary: 'Reply Key generation uses the KRB-FX-CF2 algorithm from RFC 6113: Client Key = KRB-FX-CF2(ArmorKey, K2, "OTPComb1", "OTPComb2") and Reply Key = KRB-FX-CF2(ArmorKey, K2, "OTPComb3", "OTPComb4"), where K2 is derived from the OTP value (or its iterated hash) via string-to-key with the label "Krb-preAuth".'
section: "3.6"
topics:
    - security
    - crypto
