document: rfc-9869
kind: design-rationale
summary: When DPLPMTUD is active at more than one layer simultaneously, REQ Option token values must be coordinated to ensure each probe packet can be identified by a unique token. Implementations should avoid performing DPLPMTUD both within UDP Options and in an Upper Layer protocol simultaneously.
section: "3"
topics:
