document: rfc-3111
kind: normative-requirement
summary: Broadcast-only configuration for SLP is not supported under IPv6. If a User Agent wishes to discover Directory Agents or query multiple Service Agents, it MUST multicast the request to the appropriate multicast address.
section: "2"
rfc2119_level: MUST
