document: rfc-9042
kind: protocol-element
summary: The :mailboxid tagged argument to fileinto consumes one additional token — a string containing the OBJECTID of the target mailbox. When specified, fileinto first checks whether a mailbox exists in the user's personal namespace with that MAILBOXID and, if found, delivers there; otherwise proceeds as without :mailboxid.
