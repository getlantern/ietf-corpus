document: rfc-3986
kind: wire-format
summary: IPv4 addresses must use strict dotted-decimal notation with four decimal octets in the range 0–255 (dec-octet). IPv6 addresses consist of eight 16-bit hex pieces separated by colons, optionally with a "::" elision for consecutive zeros, enclosed in square brackets.
section: 3.2.2
topics:
