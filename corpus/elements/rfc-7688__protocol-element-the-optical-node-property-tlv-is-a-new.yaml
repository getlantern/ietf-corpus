document: rfc-7688
kind: protocol-element
summary: The Optical Node Property TLV is a new top-level TLV for use in the OSPF TE LSA (defined in RFC 3630). It describes a single WSON node's signal compatibility constraints and node properties, and is comprised of a set of optional sub-TLVs with no ordering requirements.
