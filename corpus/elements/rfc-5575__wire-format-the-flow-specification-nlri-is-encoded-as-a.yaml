document: rfc-5575
kind: wire-format
summary: The Flow Specification NLRI is encoded as a 1- or 2-octet length field followed by a variable-length NLRI value. If the length value is less than 240 (0xf0), a single octet is used; otherwise a 2-octet extended-length form is used where the most significant nibble is all ones, supporting a maximum NLRI length of 4095 octets.
section: "4"
topics:
