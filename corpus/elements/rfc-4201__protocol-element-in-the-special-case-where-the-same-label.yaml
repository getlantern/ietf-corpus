document: rfc-4201
kind: protocol-element
summary: 'In the special case where the same label is valid across all component links (bundle-scope label), two TLVs SHOULD be used: the first identifies the TE link (bundle), and the second uses a special all-ones value (0xFFFFFFFF for types 1–2; Interface ID = 0xFFFFFFFF for type 3) to indicate bundle scope. This applies to both unidirectional and bidirectional LSPs.'
section: "2.3"
topics:
    - mpls
    - routing
