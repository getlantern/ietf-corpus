document: rfc-4442
kind: design-rationale
summary: NTP-based out-of-band clock synchronization is preferred over inband MIKEY piggybacking because NTP allows half-roundtrip MIKEY variants, while inband synchronization requires a full MIKEY handshake and only works when the media receiver is the MIKEY initiator.
