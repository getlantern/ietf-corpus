document: rfc-4233
kind: protocol-element
summary: The IUA Message Header, present in QPTM and TEI Status MGMT messages immediately after the Common Header, carries the Interface Identifier (integer Tag=0x1 or text Tag=0x3) and DLCI (Tag=0x5, Length=8), which together identify the physical ISDN channel at the SG.
