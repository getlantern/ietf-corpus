document: rfc-2597
kind: normative-requirement
summary: An AF implementation MUST detect and respond to long-term congestion by dropping packets while handling short-term congestion by queueing. A smoothing or filtering function MUST monitor instantaneous congestion and compute a smoothed congestion level used by the dropping algorithm.
section: "4"
rfc2119_level: MUST
topics:
    - diffserv
    - congestion
