document: rfc-7473
kind: protocol-element
summary: RFC 7473 defines the State Advertisement Control (SAC) Capability TLV (type 0x050D) that allows an LDP speaker to announce to its peer which non-negotiated application states (Prefix-LSPs and/or P2P-PWs) it does not wish to receive. The TLV carries one or more SAC Elements, each controlling a specific application. This capability is built on the LDP Capabilities framework (RFC 5561).
section: "4.1"
topics:
    - routing
    - mpls
