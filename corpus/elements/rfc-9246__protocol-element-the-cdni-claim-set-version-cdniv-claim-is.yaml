document: rfc-9246
kind: protocol-element
summary: The CDNI Claim Set Version (cdniv) claim is a JSON integer that ties the claim set to a specific version of the specification. For this version its value MUST be '1'; in the absence of this claim the value is assumed to be '1'. Implementations MUST reject signed JWTs with unsupported cdniv values.
section: 2.1.8
topics:
    - jose
    - json
