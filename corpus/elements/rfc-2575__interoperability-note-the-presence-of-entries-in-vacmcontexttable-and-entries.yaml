summary: 'The presence of entries in vacmContextTable and entries in vacmAccessTable are independent: a context in vacmContextTable need not be referenced by any vacmAccessTable entry, and a contextName referenced in vacmAccessTable need not currently exist as an entry in vacmContextTable.'
