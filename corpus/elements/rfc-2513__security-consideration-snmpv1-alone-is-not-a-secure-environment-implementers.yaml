document: rfc-2513
kind: security-consideration
summary: SNMPv1 alone is not a secure environment. Implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2274) and View-based Access Control Model (RFC 2275) to restrict GET/SET access to authorized principals.
