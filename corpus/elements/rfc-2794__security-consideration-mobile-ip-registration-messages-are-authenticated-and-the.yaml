document: rfc-2794
kind: security-consideration
summary: Mobile IP registration messages are authenticated and the authentication is verified by the recipient. The specification does not prohibit sending the NAI in the clear over the network, but this is not considered a security issue since NAIs are not secret credentials.
section: "7"
topics:
