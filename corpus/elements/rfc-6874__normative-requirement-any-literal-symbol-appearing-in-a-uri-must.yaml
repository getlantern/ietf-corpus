document: rfc-6874
kind: normative-requirement
summary: Any literal "%" symbol appearing in a URI MUST be percent-encoded as "%25". Consequently, the scoped address fe80::a%en1 appears in a URI as http://[fe80::a%25en1].
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - http
