document: rfc-9567
kind: protocol-element
summary: A report query is a DNS TXT record query sent by a reporting resolver to the monitoring agent; the error information is entirely encoded in the QNAME, so the act of sending the query constitutes the error report. No RCODE is included because the RCODE is not relevant to the extended DNS error code.
section: "4"
topics:
