document: rfc-5065
kind: interoperability-note
summary: When aggregation is performed within a confederation, AS_SET substitutes with AS_CONFED_SET and AS_SEQUENCE with AS_CONFED_SEQUENCE. Confederation-type segments (AS_CONFED_SET, AS_CONFED_SEQUENCE) MUST be kept separate from non-confederation segments (AS_SET, AS_SEQUENCE).
section: A
topics:
