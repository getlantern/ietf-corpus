document: rfc-5460
kind: normative-requirement
summary: The Client Link option MUST NOT appear in Bulk Leasequery replies. When multiple bindings are returned, the server uses LEASEQUERY-REPLY followed by LEASEQUERY-DATA messages instead of the Client Link option mechanism specified in RFC 5007.
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
