document: rfc-3119
kind: protocol-element
summary: The RTP timestamp is a 32-bit 90 kHz value representing the presentation time of the first ADU packed within the packet. When interleaving is used, outgoing RTP timestamps will not necessarily be monotonically non-decreasing.
