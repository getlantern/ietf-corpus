document: rfc-5789
kind: normative-requirement
summary: Clients using patch formats that require a known base-point SHOULD use a conditional request such that the request will fail if the resource has been updated since the client last accessed it, for example using a strong ETag in an If-Match header.
section: "2"
rfc2119_level: SHOULD
topics:
    - http
