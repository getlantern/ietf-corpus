document: rfc-2959
kind: security-consideration
summary: SNMPv1 alone is not a secure environment; implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) to properly restrict GET/SET access to MIB objects.
