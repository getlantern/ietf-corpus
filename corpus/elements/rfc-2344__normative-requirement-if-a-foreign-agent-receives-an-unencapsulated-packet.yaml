document: rfc-2344
kind: normative-requirement
summary: If a foreign agent receives an unencapsulated packet from a mobile node that explicitly requested the Encapsulating Delivery Style, the foreign agent MUST NOT reverse-tunnel such a packet and MUST forward it using standard IP routing mechanisms.
section: 5.2.1
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
