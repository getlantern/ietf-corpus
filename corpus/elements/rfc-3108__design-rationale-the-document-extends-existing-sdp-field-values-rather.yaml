document: rfc-3108
kind: design-rationale
summary: The document extends existing SDP field values rather than defining new SDP fields, so that standard RFC 2327-compliant parsers react in a well-defined and safe manner when the <networkType> is 'ATM'. New attributes are introduced only in the media attribute ('a') lines, where RFC 2327 explicitly permits free-form extensions.
section: "1"
topics:
    - security
