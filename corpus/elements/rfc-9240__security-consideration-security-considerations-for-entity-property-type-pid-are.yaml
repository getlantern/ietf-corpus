document: rfc-9240
kind: security-consideration
summary: Security considerations for entity property type 'pid' are identical to those for the ALTO endpoint property type 'pid' in RFC 7285. Property maps that expose entity domain contents (PID-to-address mappings, address-to-property mappings) reveal network topology information; ALTO servers should apply access control consistent with RFC 7285's security model to all property map resources.
section: "11"
topics:
    - security
