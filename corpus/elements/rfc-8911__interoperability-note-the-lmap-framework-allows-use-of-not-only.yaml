document: rfc-8911
kind: interoperability-note
summary: The LMAP framework allows use of not only the IANA Performance Metrics Registry but also other registries from other organizations or private registries. Organizations creating such registries for LMAP contexts are encouraged to use the Registry format defined in this document to simplify Measurement Agent implementations that programmatically consume registry entries.
section: "4.1"
topics:
    - registry
    - measurement
