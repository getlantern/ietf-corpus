document: rfc-4916
kind: interoperability-note
summary: To cater for UAs that cannot tolerate a changed From/To URI in mid-dialog requests, the UAC SHOULD only send a request with a changed From URI to peers that have indicated support for the "from-change" option tag in their Supported header field.
section: "3"
topics:
