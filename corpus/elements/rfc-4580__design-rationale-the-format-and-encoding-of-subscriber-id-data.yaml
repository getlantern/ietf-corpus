document: rfc-4580
kind: design-rationale
summary: The format and encoding of subscriber-id data is intentionally not standardized because the option is only intended for use within a single administrative domain, exchanged only between relay agents and DHCPv6 servers within that domain. No semantic requirements are imposed on the data.
