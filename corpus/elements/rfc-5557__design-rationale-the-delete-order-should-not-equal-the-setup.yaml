document: rfc-5557
kind: design-rationale
summary: The delete order SHOULD NOT equal the setup order. If the delete order is higher than the setup order, make-before-break is possible; if the delete order is lower, make-before-break cannot be performed. This encoding allows the PCE to communicate migration feasibility implicitly through the relative ordering values.
section: "5.4"
topics:
