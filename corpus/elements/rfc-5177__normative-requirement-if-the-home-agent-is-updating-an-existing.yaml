document: rfc-5177
kind: normative-requirement
summary: If the Home Agent is updating an existing binding for a Mobile Router and one or more Mobile Network prefixes are missing from the new Registration Request, the Home Agent MUST delete those prefixes from the Registration Table and MUST disable forwarding for those prefixes.
section: "6.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
