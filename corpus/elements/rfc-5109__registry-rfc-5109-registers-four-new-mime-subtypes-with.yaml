document: rfc-5109
kind: registry
summary: 'RFC 5109 registers four new MIME subtypes with IANA: audio/ulpfec, video/ulpfec, text/ulpfec, and application/ulpfec. All require a ''rate'' parameter (RTP timestamp clock rate, MUST be >1000 Hz in a separate stream) and support an optional ''onelevelonly'' parameter (0 or 1, default 0) indicating whether only one FEC level is used.'
