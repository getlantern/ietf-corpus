document: rfc-7232
kind: normative-requirement
summary: A client MUST send an entity-tag in any cache validation request (using If-Match or If-None-Match) if an entity-tag has been provided by the origin server. It SHOULD send both validators if both have been provided, to allow both HTTP/1.0 and HTTP/1.1 caches to respond appropriately.
section: "2.4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
