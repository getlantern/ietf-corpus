document: rfc-726
kind: normative-requirement
summary: A break character requires the using host to transmit all text accumulated up to and including that character, and causes the using host to suspend print/discard processing on subsequent user input until a new IAC SB RCTE <cmd> IAC SE command is received from the serving host.
section: "5"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
