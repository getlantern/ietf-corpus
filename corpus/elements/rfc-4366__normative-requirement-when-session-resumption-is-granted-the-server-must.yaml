document: rfc-4366
kind: normative-requirement
summary: When session resumption is granted, the server MUST ignore any extensions in the client hello and send a ServerHello containing none of the extension types; functionality negotiated in the original session applies to the resumed session.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - security
