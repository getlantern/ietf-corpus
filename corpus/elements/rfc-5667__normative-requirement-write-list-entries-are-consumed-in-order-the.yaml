document: rfc-5667
kind: normative-requirement
summary: 'Write list entries are consumed in order: the first entry MUST be used by the first READ or READLINK in the COMPOUND, the next by the next, and so on. If more READ/READLINK operations exist than Write list entries, the remaining MUST return results inline.'
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
