document: rfc-4601
kind: normative-requirement
summary: If conflicting secondary address mappings are received from different PIM neighbors on the same interface, only the most recently received mapping MUST be maintained and an error SHOULD be logged to the administrator in a rate-limited manner.
section: 4.3.4
rfc2119_level: MUST
topics:
    - multicast
    - routing
