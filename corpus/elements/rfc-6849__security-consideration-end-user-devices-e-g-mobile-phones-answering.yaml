document: rfc-6849
kind: security-consideration
summary: End-user devices (e.g., mobile phones) answering loopback requests without authentication or user notification risk battery drain and denial of normal phone service; devices SHOULD notify the user of active loopback sessions and implement session timeouts or keepalive/refresh mechanisms.
section: "12"
topics:
    - security
    - realtime
    - voip
