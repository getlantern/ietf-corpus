document: rfc-1964
kind: protocol-element
summary: The confidentiality key for Wrap token DES-CBC encryption is derived by XOR-ing the context key with the constant f0f0f0f0f0f0f0f0. The MD2.5 seed key is derived by byte-reversing the context key. The context key is the Kerberos session key or subkey if present in the authenticator.
section: "1.2"
topics:
    - security
    - crypto
