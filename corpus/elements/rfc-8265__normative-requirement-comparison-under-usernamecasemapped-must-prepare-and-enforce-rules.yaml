document: rfc-8265
kind: normative-requirement
summary: Comparison under UsernameCaseMapped MUST prepare and enforce rules on each string; two strings are equivalent if and only if they are an exact octet-for-octet match. An implementation MUST NOT treat two strings as equivalent before the comparison operation is completed.
section: 3.3.4
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
