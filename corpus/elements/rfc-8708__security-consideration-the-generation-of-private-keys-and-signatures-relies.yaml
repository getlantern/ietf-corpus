document: rfc-8708
kind: security-consideration
summary: The generation of private keys and signatures relies on random numbers; use of inadequate PRNGs can result in little or no security because an attacker can search the reduced PRNG output space. RFC 4086 guidance on randomness MUST be followed.
section: "6"
topics:
    - security
    - crypto
