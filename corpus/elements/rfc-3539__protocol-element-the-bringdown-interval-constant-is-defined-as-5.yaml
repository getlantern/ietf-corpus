document: rfc-3539
kind: protocol-element
summary: The BRINGDOWN_INTERVAL constant is defined as 5 minutes; a connection that has been unutilized (excluding watchdog traffic) for less than this interval MUST NOT be brought down. Functioning connections should remain open for a minimum of 5 minutes to prevent periodic closing and reopening of secondary connections.
section: "3.3"
topics:
