document: rfc-8919
kind: interoperability-note
summary: So long as any legacy router in the network has any of the defined applications (RSVP-TE, SR Policy, LFA) enabled, all routers MUST continue to advertise link attributes using legacy advertisements, since legacy routers will only process legacy advertisements.
section: 6.3.3
topics:
