document: rfc-1647
kind: wire-format
summary: 'Every TN3270E data message is prefixed by a 5-byte header: DATA-TYPE (1 byte), REQUEST-FLAG (1 byte), RESPONSE-FLAG (1 byte), SEQ-NUMBER (2 bytes). The message format is <TN3270E Header><data><IAC EOR>, or <TN3270E Header><IAC EOR> when no data is present.'
section: "8.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
