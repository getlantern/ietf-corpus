document: rfc-7309
kind: design-rationale
summary: 'With inter-AS option B, each PE must replicate multicast traffic to all PEs in both local and remote domains. The ICCP solution limits replication: a PE replicates only to local PEs and the ASBR, and the remote ASBR replicates to its local PEs, distributing load more efficiently.'
section: "3"
topics:
