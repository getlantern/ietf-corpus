document: rfc-2181
kind: design-rationale
summary: Differing TTLs within an RRSet are deprecated because no use for this has been found that cannot be better accomplished otherwise, and it causes partial replies from caching servers where some but not all TTLs in an RRSet have expired, leading to incomplete non-truncated responses.
section: "5.2"
topics:
