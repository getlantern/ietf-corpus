document: rfc-4819
kind: normative-requirement
summary: There is no requirement that list responses be in any particular order. Client implementations MUST NOT rely on responses being in any order. Implementations SHOULD support the 'list' request.
section: "4.3"
rfc2119_level: SHOULD
