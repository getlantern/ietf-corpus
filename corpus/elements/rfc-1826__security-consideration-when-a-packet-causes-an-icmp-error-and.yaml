document: rfc-1826
kind: security-consideration
summary: When a packet causes an ICMP error and is too large to fit entirely within the ICMP reply, the receiver of the ICMP message may be unable to authenticate the returned portion, forcing a choice between trusting an unauthenticated ICMP message or ignoring a legitimate one.
