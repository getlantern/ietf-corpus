document: rfc-4750
kind: protocol-element
summary: The ospfLsdbTable (OID ospf 4) represents the per-area link state database, indexed by AreaID, LSA type, Link State ID, and Router ID. Each entry exposes the LSA sequence number (signed 32-bit, starting at 0x80000001), age in seconds, Fletcher checksum, and the full raw advertisement as an OCTET STRING.
