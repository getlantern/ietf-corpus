document: rfc-1731
kind: wire-format
summary: 'The Kerberos V4 client final message contains: octets 1-4 with the original server checksum (network byte order), octet 5 with the selected protection mechanism bit-mask, octets 6-8 with the maximum cipher-text buffer size the client can receive (network byte order), followed by the user name string. The data is padded to a multiple of 8 octets and PCBC-encrypted with the session key.'
