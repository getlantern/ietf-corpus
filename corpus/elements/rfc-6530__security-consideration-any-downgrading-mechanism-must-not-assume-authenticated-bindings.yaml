document: rfc-6530
kind: security-consideration
summary: Any downgrading mechanism must not assume authenticated bindings between internationalized and ASCII addresses. This risk is mitigated by performing transformations prior to final delivery at systems under the administrative control of the sending user, rather than in transit by uncontrolled intermediaries.
section: "13"
topics:
