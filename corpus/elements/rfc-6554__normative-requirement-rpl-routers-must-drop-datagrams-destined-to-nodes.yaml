document: rfc-6554
kind: normative-requirement
summary: RPL routers MUST drop datagrams destined to nodes outside the RPL routing domain if the outermost IPv6 header contains an SRH not generated by the forwarding router. Datagrams carrying an SRH MUST NOT be allowed to enter or exit a RPL routing domain.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
