document: rfc-2049
kind: interoperability-note
summary: 'Certain literal strings corrupt messages in some SMTP implementations: a period ''.'' alone on a line and lines beginning with ''From '' (with a space) are known to be altered. Encoders can prevent this by substituting ''=2E'' and ''=46rom '' respectively in quoted-printable.'
