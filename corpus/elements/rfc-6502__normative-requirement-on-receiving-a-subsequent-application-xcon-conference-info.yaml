document: rfc-6502
kind: normative-requirement
summary: On receiving a subsequent 'application/xcon-conference-info+xml' notification, the subscriber MUST replace its local document copy entirely; on receiving an 'application/xcon-conference-info-diff+xml' notification, it MUST apply the indicated changes to its local copy.
section: "5.2"
rfc2119_level: MUST
topics:
