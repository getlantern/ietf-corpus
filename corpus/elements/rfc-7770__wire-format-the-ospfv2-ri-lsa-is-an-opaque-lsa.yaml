document: rfc-7770
kind: wire-format
summary: The OSPFv2 RI LSA is an Opaque LSA with Opaque type field set to 4 and the Opaque ID field carrying the RI LSA Instance ID. The standard OSPFv2 LSA header fields (LS age, Options, LS type 9/10/11, Advertising Router, LS sequence number, checksum, length) precede the TLV payload.
