document: rfc-3886
kind: protocol-element
summary: 'The Action field defines seven possible states: ''failed'' (delivery failed), ''delayed'' (in queue awaiting delivery), ''delivered'' (successfully delivered to final recipient), ''expanded'' (forwarded to multiple addresses), ''relayed'' (delivered to non-tracking environment), ''transferred'' (transferred to another MTRK-compliant MTA), ''opaque'' (unknown status).'
section: 3.3.3
