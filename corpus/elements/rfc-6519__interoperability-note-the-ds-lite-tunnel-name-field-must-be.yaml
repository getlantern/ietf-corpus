document: rfc-6519
kind: interoperability-note
summary: 'The DS-Lite-Tunnel-Name field MUST be encoded exactly as required for DHCPv6 domain names (RFC 3315 Section 8): length-prefixed DNS labels, each at most 63 octets, terminated by a zero-length label. Any future updates to RFC 3315 Section 8 also apply to this field''s encoding.'
section: "4.1"
topics:
