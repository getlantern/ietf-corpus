document: rfc-7692
kind: registry
summary: IANA registered the RSV1 bit as the 'Per-Message Compressed' framing header bit in the WebSocket Framing Header Bits Registry (defined in RFC 6455). RSV1 is set for compressed messages and unset for uncompressed messages on the first fragment of data frames.
section: "9.2"
