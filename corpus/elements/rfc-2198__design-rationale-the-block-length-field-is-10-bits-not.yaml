document: rfc-2198
kind: design-rationale
summary: The block length field is 10 bits (not the 'obvious' 8 bits) because an 8-bit field cannot encode lengths above 255 bytes, which is insufficient for encodings such as 80ms PCM or DVI. The 10-bit/14-bit split balances block-length range against timestamp-offset range.
section: "3"
