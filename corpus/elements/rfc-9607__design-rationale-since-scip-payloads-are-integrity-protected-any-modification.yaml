document: rfc-9607
kind: design-rationale
summary: Since SCIP payloads are integrity protected, any modification of the SCIP payload is detected as an integrity violation by SCIP endpoints, leading to retransmission and eventually communication failure—providing a strong incentive for network devices to relay payloads transparently.
