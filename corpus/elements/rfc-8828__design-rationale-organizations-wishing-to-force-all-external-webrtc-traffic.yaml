document: rfc-8828
kind: design-rationale
summary: Organizations wishing to force all external WebRTC traffic through a proxy or enterprise TURN server can achieve this via organizational firewall policy rather than requiring a stricter default mode. This allows direct connections for intra-organization traffic while still controlling external traffic paths.
section: "5.2"
topics:
    - webrtc
    - nat
    - security
