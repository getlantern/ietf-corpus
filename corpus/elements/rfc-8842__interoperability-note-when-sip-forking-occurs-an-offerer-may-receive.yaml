document: rfc-8842
kind: interoperability-note
summary: When SIP forking occurs, an offerer may receive DTLS ClientHello messages and SDP answers from multiple remote locations. The offerer MUST NOT declare a fingerprint mismatch until it determines that no additional SDP answers will arrive from other remote locations.
section: "8"
rfc2119_level: MUST NOT
topics:
    - realtime
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
