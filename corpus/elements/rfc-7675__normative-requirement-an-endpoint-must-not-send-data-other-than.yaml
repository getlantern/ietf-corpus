document: rfc-7675
kind: normative-requirement
summary: An endpoint MUST NOT send data other than the messages used to establish consent unless the receiving endpoint has consented to receive data. No application data (e.g., RTP or DTLS) can be sent until consent is obtained.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
