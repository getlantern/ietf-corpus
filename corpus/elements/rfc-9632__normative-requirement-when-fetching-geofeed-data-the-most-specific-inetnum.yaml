document: rfc-9632
kind: normative-requirement
summary: 'When fetching geofeed data, the most specific inetnum: object with a geofeed reference MUST be used; data from less-specific inetnum: objects MUST be ignored when a more-specific one covering the address of interest has a geofeed reference.'
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - ip
