document: rfc-7724
kind: normative-requirement
summary: When a requestor operates in secure mode, it MUST attempt TLS negotiation and MUST close the TCP connection if the TLS handshake fails or if the server does not support TLS. The requestor MUST validate the server's digital certificate during the TLS handshake.
section: "7.2"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
