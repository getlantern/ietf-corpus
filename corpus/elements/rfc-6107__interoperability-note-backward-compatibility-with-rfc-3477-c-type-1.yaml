document: rfc-6107
kind: interoperability-note
summary: Backward compatibility with RFC 3477 C-Type 1 (unnumbered FA) is fully maintained; back-level ingress nodes continue to use C-Type 1 and back-level egresses continue to support it. The new unnumbered C-Type 4 with IGP Instance Identifier set to 0xffffffff is functionally equivalent to the existing C-Type 1 mechanism.
section: "3.7"
topics:
