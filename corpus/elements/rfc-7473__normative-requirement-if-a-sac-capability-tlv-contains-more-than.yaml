document: rfc-7473
kind: normative-requirement
summary: If a SAC Capability TLV contains more than one SAC Element, each element MUST belong to a distinct application type — the same App type MUST NOT appear more than once. A receiver of a malformed TLV with duplicate app types SHOULD discard that TLV and continue processing the rest of the message.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
