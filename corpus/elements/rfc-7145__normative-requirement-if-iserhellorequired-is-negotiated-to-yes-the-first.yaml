document: rfc-7145
kind: normative-requirement
summary: If iSERHelloRequired is negotiated to 'Yes', the first iSER Message sent by the initiator MUST be the iSER Hello Message; if 'No', the initiator MUST NOT send an iSER Hello Message. Receipt of an iSER Hello Message when iSERHelloRequired='No' MUST be treated as an iSER protocol error.
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
