document: rfc-4252
kind: design-rationale
summary: Host-based authentication is similar to UNIX 'rhosts' and 'hosts.equiv' but checks client host identity more rigorously using cryptographic host keys rather than IP addresses alone. It is explicitly noted as not suitable for high-security sites.
