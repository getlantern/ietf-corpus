kind: registry
summary: IANA maintains the VRRP IP protocol number (112 decimal) and the VRRP multicast address (224.0.0.18). The virtual router MAC OUI block 00-00-5E-00-01-xx (256 addresses) is allocated by IANA for VRRP virtual router MAC addresses.
