document: rfc-8742
kind: interoperability-note
summary: In CDDL, CBOR Sequences are supported as byte string contents via the '.cborseq' control operator, but CDDL does not yet provide for unadorned CBOR Sequences as a top-level subject; the workaround is to use an array for the top-level rule with explanatory text.
section: "4.1"
topics:
