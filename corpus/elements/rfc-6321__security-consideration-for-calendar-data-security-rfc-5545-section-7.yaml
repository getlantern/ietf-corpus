document: rfc-6321
kind: security-consideration
summary: For calendar data security, RFC 5545 Section 7 applies and no new concerns are introduced by the xCal mapping. Using XML as a format introduces additional security risks discussed in RFC 3470 Section 7 (guidelines for XML in IETF protocols) and the application/xml security discussion in RFC 3023.
section: "6"
topics:
    - security
