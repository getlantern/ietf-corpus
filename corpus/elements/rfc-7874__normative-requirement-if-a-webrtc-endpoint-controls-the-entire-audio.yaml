document: rfc-7874
kind: normative-requirement
summary: If a WebRTC endpoint controls the entire audio-capture path, it is RECOMMENDED that gain be adjusted so an average speaker produces an RMS of 2600 (-19 dBm0). Software endpoints that do not control the full capture path SHOULD use AGC to dynamically adjust to 2600 +/- 6 dB.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
