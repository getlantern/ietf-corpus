document: rfc-7888
kind: interoperability-note
summary: The APPENDLIMIT extension (RFC 7889) allows a server to advertise its APPEND size limit, enabling well-behaved clients to avoid uploading oversized messages and thereby reducing the scenarios where oversized non-synchronizing literals become a problem.
