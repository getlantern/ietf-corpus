document: rfc-7730
kind: design-rationale
summary: The TAL enables selected data in the trust anchor (specifically the INR extensions) to change without requiring redistribution of the trust anchor itself. Since INRs associated with a trust anchor are likely to change over time, the TAL remains constant as long as the trust anchor's public key and location do not change.
section: "2.1"
topics:
