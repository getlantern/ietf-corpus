document: rfc-2250
kind: design-rationale
summary: The RTP timestamp for MPEG System streams deliberately does not represent media presentation time; instead it tracks target transmission time. This non-standard use of the RTP timestamp is justified by the need to reduce network-induced jitter and synchronize clock drift between transmitter and receiver in MPEG System environments.
