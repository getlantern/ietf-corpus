document: rfc-5658
kind: protocol-element
summary: A multi-homed proxy is connected to two or more different networks with an interface into each such that traffic arrives on one network and exits through another. Examples include IPv4-to-IPv6 transition proxies, transport protocol switching proxies, and SIGCOMP-to-non-SIGCOMP proxies.
section: "3.1"
topics:
    - sip
    - realtime
