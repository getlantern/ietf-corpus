summary: 'The NB-IoT architecture defines three SCHC deployment scenarios: (1) SCHC over NIDD as a normative end-to-end application-layer scenario, (2) SCHC over the Radio Link (Dev-UE to RGW-eNB in PDCP), and (3) SCHC over DoNAS/NAS (Dev-UE to NGW-MME).'
