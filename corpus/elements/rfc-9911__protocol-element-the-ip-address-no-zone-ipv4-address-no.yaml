document: rfc-9911
kind: protocol-element
summary: The ip-address-no-zone, ipv4-address-no-zone, and ipv6-address-no-zone types restrict the corresponding address types to exclude zone identifiers. These are used when the zone is determined by context and embedding it in the value would be redundant.
