document: rfc-8689
kind: interoperability-note
summary: 'Messages tagged ''TLS-Required: No'' may be relayed through MTAs that do not support REQUIRETLS; as a result, the REQUIRETLS SMTP option will not be uniformly observed across all relay hops for such messages.'
