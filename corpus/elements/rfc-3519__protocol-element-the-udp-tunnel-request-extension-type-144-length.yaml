document: rfc-3519
kind: protocol-element
summary: The UDP Tunnel Request Extension (Type 144, Length 6) is a skippable extension added to Mobile IP Registration Requests to signal that the sender supports MIP UDP tunnelling. It contains F (Force) and R (Registration through FA Required) flags, an Encapsulation field using IP Protocol field numbering, and Reserved fields.
section: "3.1"
topics:
