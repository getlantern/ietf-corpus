document: rfc-8420
kind: protocol-element
summary: A new value called "Identity" (5) is defined in the "IKEv2 Hash Algorithms" registry for use in the SIGNATURE_HASH_ALGORITHMS notification. Inserting this value signals that the receiver supports at least one signature algorithm accepting messages of arbitrary size, such as Ed25519 and Ed448.
section: "2"
topics:
    - ipsec
    - crypto
    - registry
