document: rfc-4360
kind: normative-requirement
summary: If a route has a non-transitive extended community, the community SHOULD be removed before advertising the route across an Autonomous System boundary, but SHOULD NOT be removed when advertising across a BGP Confederation boundary.
section: "6"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
