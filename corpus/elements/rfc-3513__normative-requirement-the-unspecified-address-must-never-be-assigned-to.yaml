document: rfc-3513
kind: normative-requirement
summary: The unspecified address (::) must never be assigned to any node and must not be used as a destination address or in Routing Headers. An IPv6 router must never forward a packet with a source address of unspecified.
section: 2.5.2
rfc2119_level: MUST NOT
topics:
