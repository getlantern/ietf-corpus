document: rfc-8326
kind: interoperability-note
summary: Use of RFC 7911 (Add-Paths) or BEST-EXTERNAL advertisement among Route Reflectors in an IBGP full mesh can prevent transient unreachability during EBGP session establishment by ensuring new path advertisements do not trigger withdrawal of previously advertised paths.
section: C.2.2
topics:
