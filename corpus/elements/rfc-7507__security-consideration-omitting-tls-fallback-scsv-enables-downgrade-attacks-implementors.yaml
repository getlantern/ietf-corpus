document: rfc-7507
kind: security-consideration
summary: Omitting TLS_FALLBACK_SCSV enables downgrade attacks. Implementors must consider whether the protocol version in ClientHello.client_version still provides an acceptable level of protection before choosing to omit the SCSV.
section: "6"
topics:
