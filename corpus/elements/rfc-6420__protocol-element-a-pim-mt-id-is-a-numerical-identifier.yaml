document: rfc-6420
kind: protocol-element
summary: A PIM MT-ID is a numerical identifier (1–4095) assigned per PIM domain to uniquely identify a PIM RPF topology. It is used only in the PIM control plane for RPF lookup selection and does not function as a forwarding-plane differentiator; forwarding differentiation is achieved via group and/or source addresses.
section: "3.2"
topics:
    - multicast
    - routing
