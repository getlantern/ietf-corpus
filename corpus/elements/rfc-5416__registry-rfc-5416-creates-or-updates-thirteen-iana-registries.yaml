document: rfc-5416
kind: registry
summary: 'RFC 5416 creates or updates thirteen IANA registries: CAPWAP Wireless Binding Identifier (IEEE 802.11 = 1); CAPWAP IEEE 802.11 Message Types (WLAN Configuration Request = 3398913, Response = 3398914); CAPWAP Message Element Types for 25 IEEE 802.11 elements (types 1024–1048); and new enumeration registries for IEEE 802.11 Key Status, QoS, Auth Type, Antenna Combiner, Antenna Selection, Session Key Flags, Tagging Policy, WTP Radio Fail, WTP Radio Type, and WTP Encryption Capabilities.'
