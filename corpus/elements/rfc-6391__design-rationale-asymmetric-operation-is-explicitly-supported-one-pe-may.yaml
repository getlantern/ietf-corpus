document: rfc-6391
kind: design-rationale
summary: 'Asymmetric operation is explicitly supported: one PE may include a flow LSE while its peer does not. This accommodates scenarios where only one direction has sufficient bandwidth to justify flow classification, or where a PE must receive the entire PW on a single interface for context-dependent processing such as egress policing.'
section: "8.6"
topics:
