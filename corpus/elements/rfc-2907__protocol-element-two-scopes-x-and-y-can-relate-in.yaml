document: rfc-2907
kind: protocol-element
summary: 'Two scopes X and Y can relate in exactly four ways: X nests inside Y, Y nests inside X, X and Y do not nest (overlap), or X and Y nest inside each other (interpreted as sharing exactly the same border, even if covering different address ranges). Indeterminate nesting state is treated as false.'
