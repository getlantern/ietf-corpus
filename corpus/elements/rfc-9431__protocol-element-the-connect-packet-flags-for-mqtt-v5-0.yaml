document: rfc-9431
kind: protocol-element
summary: The CONNECT packet flags for MQTT v5.0 ACE authentication MUST have User Name Flag and Password Flag set to 0; the AUTH property carries the token. For MQTT v3.1.1, both User Name Flag and Password Flag MUST be set to 1.
section: 2.2.4.1
topics:
    - oauth
    - tls
