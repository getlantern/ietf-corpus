document: rfc-8916
kind: design-rationale
summary: Authentication supports both key-chain references and direct key/algorithm specification to accommodate different deployment practices; MD5 is constrained to be the only permissible algorithm, consistent with the TCP MD5 signatures used in RFC 3618 and RFC 5925.
