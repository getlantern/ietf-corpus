document: rfc-2222
kind: protocol-element
summary: The EXTERNAL mechanism (name 'EXTERNAL') defers authentication to an external system such as IPsec or TLS. The client sends an initial response with the authorization identity (or empty string to derive it from external credentials); the server uses out-of-band information to determine authorization.
section: "7.4"
topics:
