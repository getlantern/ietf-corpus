document: rfc-7311
kind: interoperability-note
summary: The AIGP attribute is only applicable in networks where each router uses tunneling to deliver packets to the BGP next hop. Use in other scenarios is outside the scope of this document. If a Route Reflector supports AIGP but some clients do not, routing choices may not reflect the intended policy.
section: "3.1"
topics:
    - bgp
    - routing
