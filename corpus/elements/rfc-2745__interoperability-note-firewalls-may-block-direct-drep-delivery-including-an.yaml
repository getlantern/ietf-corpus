document: rfc-2745
kind: interoperability-note
summary: Firewalls may block direct DREP delivery. Including an empty ROUTE object in a DREQ causes DREP packets to traverse the same firewall holes used by other RSVP messages via hop-by-hop reverse routing. When a third-party requester is separated from LAST-HOP by a firewall, no current solution is known other than relocating LAST-HOP to the requester's side of the firewall.
section: "5.1"
topics:
    - qos
    - security
