document: rfc-7650
kind: normative-requirement
summary: In the URI-NODE-MATCH policy, a given value MUST be written and overwritten if and only if the URI-MATCH condition is met and, in addition, the dictionary key is equal to the Node-ID in the certificate and that Node-ID is the one indicated in the SignerIdentity value cert_hash.
section: "9"
rfc2119_level: MUST
topics:
