document: rfc-3635
kind: normative-requirement
summary: All ethernet-like interfaces MUST return ethernetCsmacd(6) for ifType regardless of speed or link-layer encapsulation, and MUST NOT return fastEther(62), fastEtherFX(69), or gigabitEthernet(117).
