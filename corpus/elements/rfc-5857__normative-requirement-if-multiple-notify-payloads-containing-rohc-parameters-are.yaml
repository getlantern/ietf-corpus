document: rfc-5857
kind: normative-requirement
summary: If multiple Notify payloads containing ROHC parameters are received, all but the first MUST be dropped. If the initiator does not receive a Notify payload with the responder's ROHC channel parameters, ROHC MUST NOT be enabled on the Child SA.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
