document: rfc-4356
kind: normative-requirement
summary: When a message is gatewayed from MMS to Internet mail, a 'Received:' header MUST be added as per SMTP. A message MAY be rejected if the number of 'Received:' headers exceeds a locally-defined maximum, which MUST conform to SMTP Section 6.2 and SHOULD be no less than 100.
section: 2.1.3.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
