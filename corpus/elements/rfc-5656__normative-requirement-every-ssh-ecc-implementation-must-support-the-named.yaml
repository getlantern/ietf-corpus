document: rfc-5656
kind: normative-requirement
summary: Every SSH ECC implementation MUST support the named curves nistp256 (secp256r1), nistp384 (secp384r1), and nistp521 (secp521r1). These curves SHOULD always be enabled unless specifically disabled by local security policy.
section: "10.1"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
