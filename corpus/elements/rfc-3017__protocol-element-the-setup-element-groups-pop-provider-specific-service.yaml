document: rfc-3017
kind: protocol-element
summary: 'The setup element groups POP/provider-specific service configuration: dnsServerAddress (IP, dotted-decimal), nntpServerName, smtpServerName, popServerName, imapServerName, wwwProxyServerName, ftpProxyServerName, winsockProxyServerName, defaultGatewayAddress, userNamePrefix, and userNameSuffix. It carries a required ''id'' attribute for cross-referencing.'
