document: rfc-7198
kind: protocol-element
summary: SDP signaling for temporal redundancy uses 'a=ssrc-group:DUP' to associate the SSRCs of the main and duplicate streams, 'a=duplication-delay' (from RFC 7197) for the delay value, and identical CNAME values on both SSRCs. The DUP grouping semantics are defined in RFC 7104.
section: "4.2"
topics:
    - rtp
    - realtime
