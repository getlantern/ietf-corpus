document: rfc-8063
kind: normative-requirement
summary: When the <create> command is validated, the server MUST insert an EPP <poll> message using the key relay info response into the receiving client's poll queue that belongs to the registrar on record of the provided domain name.
section: 3.2.1
rfc2119_level: MUST
topics:
    - dns
    - registry
