summary: 'The date-mday field''s maximum value depends on the month and year: 28 for February in a normal year, 29 in a leap year, 30 for April/June/September/November, and 31 for all other months. Hour values are restricted to 00-23 (ISO 8601''s hour value of 24 is not permitted).'
