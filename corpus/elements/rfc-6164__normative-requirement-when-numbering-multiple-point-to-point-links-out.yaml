document: rfc-6164
kind: normative-requirement
summary: When numbering multiple point-to-point links out of a single /64, addresses with all zeros in the rightmost 64 bits SHOULD NOT be assigned as unicast addresses, to avoid colliding with the Subnet-Router anycast address defined in RFC 4291.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
