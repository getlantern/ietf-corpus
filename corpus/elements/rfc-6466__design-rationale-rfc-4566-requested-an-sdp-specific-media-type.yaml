document: rfc-6466
kind: design-rationale
summary: RFC 4566 requested an SDP-specific media type registry separate from the MIME media types namespace used by the earlier RFC 2327. The top-level types registered by RFC 4566 ('audio', 'video', 'text', 'application', 'message') omitted 'image', which was already widely deployed for T.38 fax-over-IP — necessitating this registration.
section: "1"
topics:
