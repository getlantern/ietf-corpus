document: rfc-6822
kind: normative-requirement
summary: When an IID-TLV with non-zero IID appears in an SNP or LSP, exactly one ITID MUST be present indicating the associated topology. If no ITIDs or multiple ITIDs are present, or the IID is zero, the PDU MUST be ignored.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
