document: rfc-7274
kind: normative-requirement
summary: Retirement of a special-purpose label value requires IETF consensus with MPLS WG review, an Informational RFC to mark the value deprecated, a survey after 12 months, and a Standards Track RFC to release the value no earlier than 24 months after the deprecation RFC.
section: "3.2"
rfc2119_level: MUST
topics:
