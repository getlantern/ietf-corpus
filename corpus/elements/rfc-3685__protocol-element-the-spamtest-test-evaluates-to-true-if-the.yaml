document: rfc-3685
kind: protocol-element
summary: The 'spamtest' test evaluates to true if the spamtest result matches a given value. It returns a string starting with a numeric value in the range '0' through '10', where 0 means not tested, 1 means clear, 2-9 indicate increasing likelihood of spam, and 10 means definitely spam.
