document: rfc-5857
kind: design-rationale
summary: 'LARGE_CIDS and FEEDBACK_FOR are implicitly derived rather than explicitly signaled to reduce negotiation overhead: LARGE_CIDS is fully determined by the MAX_CID value, and FEEDBACK_FOR always refers to the reverse SA of a bidirectional SA pair.'
