document: rfc-6780
kind: protocol-element
summary: The Extended Association ID field is variable-length and 4-byte aligned, scoped by the Association Source. It MUST have length zero or be 4-byte aligned. It MUST be included when the Association ID field alone is insufficient to uniquely identify the association within the scope of the source.
section: "4.1"
topics:
    - mpls
    - routing
