document: rfc-8028
kind: design-rationale
summary: Source address selection (RFC 6724) precedes first-hop router selection. The document builds on RFC 6724 Rule 5.5 to ensure that, once a source address is chosen, the packet is sent to a router known to advertise that source prefix, avoiding BCP 38 discards.
