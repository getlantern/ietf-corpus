document: rfc-9857
kind: interoperability-note
summary: The SR Binding SID TLV (Type 1201) SHOULD NOT be used for SRv6 BSIDs because it cannot signal SRv6 Endpoint behavior or SID structure; its use for SRv6 has been deprecated and is documented only for backward compatibility with early draft implementations.
