document: rfc-2473
kind: normative-requirement
summary: Loopback encapsulation — where an entry-point encapsulates tunnel packets originated from and destined to itself — must be avoided. Implementations should reject configurations where entry-point and exit-point addresses belong to the same node.
section: 4.1.2
rfc2119_level: SHOULD
topics:
    - ip
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
