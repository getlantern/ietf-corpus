document: rfc-5265
kind: normative-requirement
summary: The x-HA and i-HA addresses MUST be different; if the MN detects they are the same it MUST assume it is on the external network and bypass network detection, because a shared address would confuse foreign agents processing the parallel registration requests.
section: "3.5"
rfc2119_level: MUST
topics:
    - mobility
    - interoperability-note
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
