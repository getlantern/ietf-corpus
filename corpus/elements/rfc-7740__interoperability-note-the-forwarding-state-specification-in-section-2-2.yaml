document: rfc-7740
kind: interoperability-note
summary: The forwarding state specification in Section 2.2 matches the 'When an S-PMSI is a Match for Transmission' and 'Match for Reception' rules for the 'Flat Partitioning' method in RFC 7582, except that rules about (C-*,C-*) are not applicable since this document always requires (C-*,C-*-BIDIR) S-PMSI A-D routes for VPNs supporting C-BIDIR flows.
section: "2.2"
topics:
