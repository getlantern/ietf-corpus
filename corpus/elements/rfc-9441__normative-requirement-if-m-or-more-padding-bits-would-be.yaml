document: rfc-9441
kind: normative-requirement
summary: If M or more padding bits would be needed after the last bitmap to fill the last L2 Word, M bits set to 0 MUST be appended after the last bitmap before padding is applied, signaling the end of the SCHC Compound ACK message.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
