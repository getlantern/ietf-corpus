document: rfc-7716
kind: protocol-element
summary: For C-Multicast Source/Shared Tree Joins in GTM, the upstream-node-identifying RT is constructed with the IP address of the Upstream PBR (not Upstream PE). In scenarios where it is known a priori that the Next Hop of these routes does not change, the second RT (based on Next Hop of an I-PMSI A-D route) is not needed.
section: "2.9"
topics:
    - bgp
    - routing
    - multicast
