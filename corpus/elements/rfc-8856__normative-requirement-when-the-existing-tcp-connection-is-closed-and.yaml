document: rfc-8856
kind: normative-requirement
summary: When the existing TCP connection is closed and needs re-establishment per RFC 8855 rules, the floor control client MUST send an offer to the floor control server to re-establish it. If a timeout occurs, the endpoint that detected the timeout MUST send an offer.
section: "7.1"
rfc2119_level: MUST
topics:
    - realtime
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
