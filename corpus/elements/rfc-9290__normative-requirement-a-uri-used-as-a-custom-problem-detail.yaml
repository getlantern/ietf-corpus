document: rfc-9290
kind: normative-requirement
summary: A URI used as a Custom Problem Detail entry key is for identification only and MUST NOT be dereferenced during normal handling of problem details (only in diagnostic or debugging procedures involving humans), to prevent tracking and information disclosure.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - cbor
    - security
    - privacy
