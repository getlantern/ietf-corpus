document: rfc-5454
kind: interoperability-note
summary: A registration reply lacking an IPv6 prefix reply extension, in response to a request that included at least one IPv6 prefix request extension, is a backward-compatibility signal indicating the home agent does not support DSMIPv4 extensions (it silently skipped the skippable extensions).
section: "2.2"
topics:
