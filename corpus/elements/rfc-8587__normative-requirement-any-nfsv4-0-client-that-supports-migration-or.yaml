document: rfc-8587
kind: normative-requirement
summary: Any NFSv4.0 client that supports migration or trunking detection needs to present a uniform client ID string to all NFSv4.0 servers; failure to do so will make trunking detection impossible.
section: 5.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
