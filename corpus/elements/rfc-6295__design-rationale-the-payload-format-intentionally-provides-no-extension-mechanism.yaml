document: rfc-6295
kind: design-rationale
summary: The payload format intentionally provides no extension mechanism for new MIDI features beyond encoding MIDI 1.0 DIN cable commands. The design encourages development of entirely new payload formats for specialized uses, relying on IETF codec negotiation tools (RFC 3264, RFC 2326) for backward-compatible deployment of new formats.
section: "7"
