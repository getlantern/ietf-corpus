document: rfc-8783
kind: normative-requirement
summary: DOTS servers MUST limit the number of 'dots-client' resources to 1 per request; requests with multiple 'dots-client' resources MUST be rejected. A '409 Conflict' status-line MUST be returned if the data resource already exists.
section: "5.1"
rfc2119_level: MUST
topics:
