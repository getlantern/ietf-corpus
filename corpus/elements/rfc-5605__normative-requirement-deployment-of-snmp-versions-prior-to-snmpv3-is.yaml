document: rfc-5605
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. It is RECOMMENDED to deploy SNMPv3 with cryptographic security enabled for authentication and privacy of ATM PW MIB data.
