document: rfc-9745
kind: security-consideration
summary: Client application developers SHOULD always check the referred resource's documentation to verify authenticity and accuracy of deprecation information. When a Link header field provides documentation without HTTPS, its content may not be secure, private, or integrity-guaranteed.
section: "7"
rfc2119_level: SHOULD
topics:
