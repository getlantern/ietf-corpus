summary: 'ROHC channel lifecycle follows PPP NCP state: taking down either IPCP or IPV6CP while the other remains open leaves ROHC contexts active; taking down LCP destroys the channel entirely and restarts ROHC with all contexts in no-context state when LCP is reopened.'
