document: rfc-9489
kind: protocol-element
summary: The EVPN IP Prefix sub-TLV (sub-type 45) identifies the IP prefix for an EVI under test at a peer PE, derived from the IP Prefix route (RT-5). Total length MUST be either 32 bytes for IPv4 or 56 bytes for IPv6. Fields include RD (8 octets), Ethernet Tag ID, ESI (10 octets), IP Prefix Len, IP Prefix (4 or 16 octets), and GW IP Address (4 or 16 octets).
section: "4.4"
topics:
    - mpls
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
