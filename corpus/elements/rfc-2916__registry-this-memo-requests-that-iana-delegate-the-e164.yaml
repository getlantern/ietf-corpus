document: rfc-2916
kind: registry
summary: This memo requests that IANA delegate the E164.ARPA domain following instructions from the IAB. Names within the zone are to be delegated per ITU Recommendation E.164, with hierarchical codes assigned accordingly. Delegations in e164.arpa (not in sub-delegated domains) require Expert Review, with a designated expert appointed by the IESG.
