document: rfc-4711
kind: wire-format
summary: All unreported optional QoS metrics use a sentinel value of -1 encoded as Integer32 to distinguish 'not reported' from a zero measurement. Fields such as raqmonParticipantSetupDelay, raqmonParticipantNetRTTMean, raqmonParticipantIAJitterMean, raqmonParticipantLostPackets, etc. share this convention.
