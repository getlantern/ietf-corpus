document: rfc-5689
kind: wire-format
summary: The extended MKCOL request body is an XML document with DAV:mkcol as root, containing one or more DAV:set > DAV:prop subtrees. The response body (when present) is an XML document with DAV:mkcol-response as root, containing DAV:propstat elements each holding DAV:prop, DAV:status, and optionally DAV:error and DAV:responsedescription.
