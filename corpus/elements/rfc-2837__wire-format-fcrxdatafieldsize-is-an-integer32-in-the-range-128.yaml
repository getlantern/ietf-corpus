document: rfc-2837
kind: wire-format
summary: FcRxDataFieldSize is an Integer32 in the range 128..2112 representing the receive data field size in bytes for an NxPort or FxPort. FcBbCredit is an Integer32 in the range 0..32767 representing buffer-to-buffer credit (in buffers). FcFeNxPortIndex is an Integer32 in the range 1..126 reflecting the maximum NL_Port count on an FL_Port loop.
