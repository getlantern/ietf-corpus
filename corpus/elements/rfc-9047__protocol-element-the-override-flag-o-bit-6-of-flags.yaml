document: rfc-9047
kind: protocol-element
summary: The Override flag (O, bit 6 of Flags) is normally set to 1 for IPv6->MAC pairs and set to 0 only when IPv6 anycast is enabled. The ingress PE installs the ND entry with the received O flag value and uses it when replying to Neighbor Solicitations.
section: "2"
topics:
