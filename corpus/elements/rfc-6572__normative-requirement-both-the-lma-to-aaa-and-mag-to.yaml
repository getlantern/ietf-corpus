document: rfc-6572
kind: normative-requirement
summary: Both the LMA-to-AAA and MAG-to-AAA interfaces MUST support transfer of accounting records (binding cache entry creation/deletion times, octet counts). Local data traffic routed by the MAG without reverse tunneling MUST also be reported to AAA Accounting servers via RADIUS.
section: "7.1"
rfc2119_level: MUST
topics:
    - mobility
    - radius
