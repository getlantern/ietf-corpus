document: rfc-6544
kind: normative-requirement
summary: If an agent's local candidate is tcp-active or tcp-so and the selected TCP connection has closed, it MUST reopen a connection to the remote candidate of the selected pair. If the local candidate is tcp-passive, the agent MUST await an incoming connection and cannot send media until one arrives.
section: "11.1"
rfc2119_level: MUST
topics:
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
