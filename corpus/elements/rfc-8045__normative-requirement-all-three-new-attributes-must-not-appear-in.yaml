document: rfc-8045
kind: normative-requirement
summary: All three new attributes MUST NOT appear in RADIUS Reject or Challenge packets. IP-Port-Range MUST NOT appear in Access-Accept, Access-Request, or CoA-Request packets; it is restricted exclusively to Accounting-Request.
