summary: 'The ''vpn-topology'' identity hierarchy defines four topologies: any-to-any (all sites communicate freely), hub-spoke (spokes communicate with hubs only; hubs can communicate with each other), hub-spoke-disjoint (hubs cannot communicate with each other), and custom (controlled by import/export policies for complex hub-spoke roles).'
