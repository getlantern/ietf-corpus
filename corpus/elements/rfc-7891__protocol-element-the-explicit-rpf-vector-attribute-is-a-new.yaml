document: rfc-7891
kind: protocol-element
summary: The Explicit RPF Vector Attribute is a new PIM Join Attribute TLV (type 4) that encodes an explicit list of directly connected PIM neighbors as hop-by-hop RPF path, bypassing unicast route lookup entirely. Unlike the loose RPF Vector of RFC 5496, if no matching PIM neighbor exists for an Explicit RPF Vector, the router does not fall back to loose routing.
section: "1"
topics:
    - routing
    - multicast
