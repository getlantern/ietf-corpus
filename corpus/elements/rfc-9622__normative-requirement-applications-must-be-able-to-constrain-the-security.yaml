document: rfc-9622
kind: normative-requirement
summary: Applications MUST be able to constrain the security protocols and versions that the Transport Services System will use, via the allowedSecurityProtocols parameter or an equivalent mechanism, to prevent use of protocols with unknown or weak security properties.
