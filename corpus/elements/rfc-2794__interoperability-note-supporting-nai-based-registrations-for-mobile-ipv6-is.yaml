document: rfc-2794
kind: interoperability-note
summary: Supporting NAI-based registrations for Mobile IPv6 is explicitly out of scope for RFC 2794. The document notes that IPv6 lacks deployed mechanisms equivalent to the foreign agent model, and sketches how Stateless Address Autoconfiguration or DHCPv6 might be extended in the future.
