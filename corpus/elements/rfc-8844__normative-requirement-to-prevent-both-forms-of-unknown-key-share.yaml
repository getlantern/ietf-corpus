document: rfc-8844
kind: normative-requirement
summary: To prevent both forms of unknown key-share attack, endpoints MUST use the 'external_session_id' extension (Section 4.3) in addition to 'external_id_hash' (Section 3.2) so that two calls between the same parties cannot be altered by an attacker.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - tls
    - webrtc
    - sip
