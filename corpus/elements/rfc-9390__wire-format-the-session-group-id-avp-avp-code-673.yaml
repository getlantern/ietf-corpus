document: rfc-9390
kind: wire-format
summary: The Session-Group-Id AVP (AVP Code 673) is of type UTF8String and MUST be globally unique. It MUST begin with the DiameterIdentity of the owning node, followed by a ';' delimiter and an implementation-defined portion, mirroring the Session-Id AVP format from RFC 6733 Section 8.8.
section: "7.3"
topics:
    - diameter
