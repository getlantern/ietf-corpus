document: rfc-4616
kind: security-consideration
summary: The PLAIN mechanism provides no integrity or confidentiality protections itself. By default, implementations SHOULD NOT advertise and SHOULD NOT make use of PLAIN unless adequate data security services (e.g., TLS) are in place.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - security
    - tls
