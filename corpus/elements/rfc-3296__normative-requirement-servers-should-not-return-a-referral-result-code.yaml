document: rfc-3296
kind: normative-requirement
summary: Servers SHOULD NOT return a referral result code if the bind name (or authentication/authorization identity) is (or is subordinate to) a referral object; instead they MAY use the knowledge information or process the request normally (e.g., return invalidCredentials).
section: 5.6.1
rfc2119_level: SHOULD NOT
topics:
