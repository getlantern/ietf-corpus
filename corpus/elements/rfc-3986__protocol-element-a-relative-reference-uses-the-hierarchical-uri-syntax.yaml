document: rfc-3986
kind: protocol-element
summary: 'A relative reference uses the hierarchical URI syntax to express a target relative to a base URI: relative-ref = relative-part [ "?" query ] [ "#" fragment ]. Types include network-path references ("//"), absolute-path references ("/"), and relative-path references (no leading slash).'
