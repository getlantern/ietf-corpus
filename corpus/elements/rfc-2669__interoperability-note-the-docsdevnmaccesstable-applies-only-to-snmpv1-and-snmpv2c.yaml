document: rfc-2669
kind: interoperability-note
summary: The docsDevNmAccessTable applies only to SNMPv1 and SNMPv2c traffic; SNMPv3 traffic is not subject to these filters and SNMPv3-only agents need not implement this table. An SMIv1 translation of this MIB is possible except that Counter64 objects cannot be translated.
