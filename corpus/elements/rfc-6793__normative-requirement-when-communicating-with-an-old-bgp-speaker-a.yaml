document: rfc-6793
kind: normative-requirement
summary: When communicating with an OLD BGP speaker, a NEW BGP speaker MUST send AS path information in AS_PATH encoded with two-octet AS numbers (using AS_TRANS for non-mappable four-octet AS numbers), and MUST also send AS4_PATH unless all AS path information is composed solely of mappable four-octet AS numbers, in which case AS4_PATH MUST NOT be sent.
section: 4.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
