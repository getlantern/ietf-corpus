document: rfc-3108
kind: interoperability-note
summary: The transport value 'AAL1/AVP' used in previous versions of this document is considered equivalent to 'AAL1/ATMF'. The value 'AAL1/AVP' is unsuitable going forward because the AVP profile is closely tied to RTP, whereas AAL1/ATMF references the correct ATMF standard.
section: 5.5.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
