document: rfc-4931
kind: security-consideration
summary: Authorization information is REQUIRED to create a domain object and is used as an additional authorization factor in query and transfer operations. Both client and server MUST ensure that authorization information is stored and exchanged with high-grade encryption to prevent unauthorized transfers and inadvertent disclosure.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - dns
