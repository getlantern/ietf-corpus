document: rfc-6665
kind: normative-requirement
summary: NOTIFY requests MUST contain a Subscription-State header field. If value is 'active' or 'pending', the notifier MUST include an 'expires' parameter for remaining subscription time; this mechanism MUST NOT be used to lengthen a subscription beyond what was negotiated.
section: 4.2.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
