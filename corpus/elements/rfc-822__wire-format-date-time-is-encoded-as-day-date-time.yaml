document: rfc-822
kind: wire-format
summary: Date-time is encoded as '[ day "," ] date time', where date is '1*2DIGIT month 2DIGIT' (e.g., '20 Jun 82'), time is 'HH:MM[:SS]', and zone is a named zone (UT, GMT, EST/EDT, etc.), a single military letter, or a signed 4-digit offset (e.g., +0530).
