document: rfc-7056
kind: normative-requirement
summary: If the content of each <saml:AttributeValue> element is a simple text node, the raw and display values of the GSS name attribute MUST be the text content of the element(s), with the raw value encoded as UTF-8. If the value is not simple or is empty, the raw value(s) MUST be a namespace well-formed serialization of the <saml:AttributeValue> element(s) encoded as UTF-8.
section: "6.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
