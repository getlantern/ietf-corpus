document: rfc-5296
kind: normative-requirement
summary: 'HMAC-SHA256-128 (cryptosuite value 2) is mandatory to implement and should be enabled in the default configuration. The defined cryptosuites are: 1=HMAC-SHA256-64, 2=HMAC-SHA256-128, 3=HMAC-SHA256-256.'
section: 5.3.2
rfc2119_level: REQUIRED
topics:
