document: rfc-8397
kind: normative-requirement
summary: The border RBridge with the highest tree root priority MUST advertise both the set of global distribution tree root nicknames and a separate set of local distribution tree root nicknames. Since global and local tree root nicknames indicate different flooding scopes, these two sets MUST NOT overlap.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - routing
