document: rfc-4566
kind: normative-requirement
summary: The `k=` (encryption key) field MUST NOT be used unless it can be guaranteed that the SDP is conveyed over a secure and trusted channel, such as SDP inside an S/MIME message or a TLS-protected HTTP session.
section: "5.12"
rfc2119_level: MUST NOT
