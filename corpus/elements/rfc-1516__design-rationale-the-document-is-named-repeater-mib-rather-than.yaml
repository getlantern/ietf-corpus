document: rfc-1516
kind: design-rationale
summary: 'The document is named ''Repeater MIB'' rather than ''Hub MIB'' to avoid confusion: the term ''hub'' is commonly used to refer to modular chassis devices with mixed LAN/WAN connectivity bridging 802.3, token ring, and FDDI segments, which are outside the scope of this specification.'
