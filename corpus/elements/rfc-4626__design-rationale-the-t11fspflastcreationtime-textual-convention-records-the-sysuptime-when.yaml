document: rfc-4626
kind: design-rationale
summary: The T11FspfLastCreationTime textual convention records the sysUpTime when a row was last created, enabling management applications to detect that a row was deleted and re-created between reads, which would otherwise cause an undetectable discontinuity in counter data.
