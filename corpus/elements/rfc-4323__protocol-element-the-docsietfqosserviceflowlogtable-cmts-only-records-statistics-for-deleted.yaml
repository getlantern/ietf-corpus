summary: The docsIetfQosServiceFlowLogTable (CMTS-only) records statistics for deleted Service Flows, including total packet/octet counts, creation and deletion timestamps, active-second count, CM MAC address (for billing), and policed-drop/delay counters. Maximum log size and record retention duration are vendor-specific.
