document: rfc-5935
kind: interoperability-note
summary: Various independent schemes for expressing SMI datatypes in XSD existed prior to this RFC, exhibiting commonality on numeric types but significant differences on non-numeric types. This document establishes the IETF standard mapping to ensure uniform expression and general interoperability.
