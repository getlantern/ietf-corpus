document: rfc-3518
kind: interoperability-note
summary: 'When connected to an old BCP bridge (RFC 1638), a system has three options: terminate the connection, run without spanning tree on the link (dangerous), or send Configure-Ack and operate in RFC 1638-compatible mode using the old BPDU format from Appendix A.'
section: 4.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
