document: rfc-5723
kind: design-rationale
summary: 'Two approaches are defined for gateway state storage: ''ticket by value'' (state encrypted into the ticket itself) and ''ticket by reference'' (an opaque index into gateway storage). The client behaves identically in both cases and cannot distinguish which is in use, so the ticket format is intentionally unspecified.'
section: "1"
