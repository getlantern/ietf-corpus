document: rfc-6681
kind: design-rationale
summary: Two Source and Repair FEC Payload ID formats (A and B) are provided because format A is appropriate when the stream has many typically smaller source blocks (16-bit SBN, 16-bit ESI), while format B is applicable when the stream has fewer large source blocks each with many encoding symbols (8-bit SBN, 24-bit ESI).
section: 6.2.1.2
