document: rfc-7900
kind: protocol-element
summary: Incoming and Outgoing Extranet RTs govern PIM-based PE-PE extranet control. A source VRF MUST carry RT-S-to-R as an Outgoing Extranet RT; a receiver VRF MUST carry RT-S-to-R as an Incoming Extranet RT. Both serve as import RTs and also as export RTs for specific routes.
section: 6.1.1
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
