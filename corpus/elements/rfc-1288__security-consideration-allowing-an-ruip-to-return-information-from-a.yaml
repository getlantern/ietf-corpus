document: rfc-1288
kind: security-consideration
summary: Allowing an RUIP to return information from a user-modifiable file is equivalent to allowing any information about the system to be freely distributed. This can enable information disclosure in clever or straightforward ways and should disturb administrators who wish to control returned data.
section: 3.2.4
topics:
    - security
    - privacy
