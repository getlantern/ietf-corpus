document: rfc-4256
kind: design-rationale
summary: The keyboard-interactive method was designed so that SSH clients require little or no knowledge of the underlying authentication mechanism(s), allowing the server to arbitrarily select or change authentication mechanisms without requiring client code updates — a significant advantage over tightly-coupled methods like 'password'.
section: "2"
