document: rfc-3736
kind: design-rationale
summary: Stateless DHCP is used by nodes that have already obtained IPv6 addresses through other mechanisms (such as stateless address autoconfiguration) and need only configuration information like DNS server addresses. The server is called 'stateless' because it need not maintain any dynamic state for individual clients.
section: "1"
