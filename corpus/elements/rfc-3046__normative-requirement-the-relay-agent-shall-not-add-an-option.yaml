document: rfc-3046
kind: normative-requirement
summary: The relay agent SHALL NOT add an 'Option Overload' option to the packet, nor use the 'file' or 'sname' fields for the Relay Agent Information option. It SHALL NOT parse or remove Relay Agent Information options that may appear in those fields in server-to-client packets.
section: "2.1"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
