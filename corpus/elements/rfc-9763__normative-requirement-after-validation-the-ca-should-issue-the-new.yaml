document: rfc-9763
kind: normative-requirement
summary: After validation, the CA SHOULD issue the new certificate containing the RelatedCertificate extension referencing the IssuerAndSerialNumber from the relatedCertRequest attribute. The CA may also apply local policy (e.g., remaining validity period of the related certificate).
section: "3.2"
rfc2119_level: SHOULD
