document: rfc-9218
kind: normative-requirement
summary: It is RECOMMENDED that servers respect the urgency parameter and send higher-urgency responses before lower-urgency responses when possible. Non-incremental responses of the same urgency SHOULD be served in ascending order of stream ID (request order).
section: "10"
rfc2119_level: RECOMMENDED
topics:
    - http
