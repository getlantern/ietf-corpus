document: rfc-4567
kind: normative-requirement
summary: In RTSP PLAY mode, the server SHALL be the Initiator of the key management exchange. Only one key management protocol SHALL be used per session/media level in RTSP.
section: "4.2"
rfc2119_level: MUST
