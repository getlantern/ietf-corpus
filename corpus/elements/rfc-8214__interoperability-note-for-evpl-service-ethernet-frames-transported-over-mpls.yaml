document: rfc-8214
kind: interoperability-note
summary: For EVPL service, Ethernet frames transported over MPLS/IP SHOULD remain tagged with the originating VID, and any VID translation MUST be performed at the disposition PE. For EPL service, frames are transported as-is and tags are not altered.
section: "1"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
    - bgp
