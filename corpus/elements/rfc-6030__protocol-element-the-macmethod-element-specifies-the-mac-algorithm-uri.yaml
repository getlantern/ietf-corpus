document: rfc-6030
kind: protocol-element
summary: The <MACMethod> element specifies the MAC algorithm URI and carries an encrypted <MACKey> (or <MACKeyReference> for pre-shared MAC keys). It is required when encryption algorithms lacking integrity checks (e.g., AES-CBC) are used, and applies container-wide to all encrypted values.
section: 6.1.1
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
