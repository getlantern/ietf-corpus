summary: 'All OSPF packets share a common header containing: Version # (set to 2), Packet type (1 octet), Packet length (total bytes including header), Router ID (32-bit), Area ID (32-bit), Checksum (16-bit one''s complement of entire packet excluding 64-bit authentication field), Autype, and Authentication data.'
