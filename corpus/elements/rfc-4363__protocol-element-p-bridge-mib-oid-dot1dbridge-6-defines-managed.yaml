document: rfc-4363
kind: protocol-element
summary: P-BRIDGE-MIB (OID dot1dBridge 6) defines managed objects for the Traffic Classes and Enhanced Multicast Filtering components of IEEE 802.1D-1998 and P802.1t-2001, including GARP and GMRP control, priority queuing, and high-capacity port statistics. It obsoletes the priority/multicast portions of RFC 2674.
