document: rfc-2625
kind: protocol-element
summary: 'The FARP Responder Flags (8-bit field) define actions upon successful address match: bit 0 (INIT_P_LOGI) triggers a Port Login to the requester, bit 1 (INIT_REPLY) triggers sending a FARP-REPLY; both bits may be set simultaneously. If no bits are set, the responder takes no action.'
section: "5.5"
topics:
