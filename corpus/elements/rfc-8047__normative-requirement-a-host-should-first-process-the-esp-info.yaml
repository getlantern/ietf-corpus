document: rfc-8047
kind: normative-requirement
summary: A host SHOULD first process the ESP_INFO before the LOCATOR_SET in a received UPDATE, since the ESP_INFO may contain a new SPI value mapped to an existing SPI while a Type 1 Locator only contains a reference to the new SPI.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - mobility
    - ipsec
