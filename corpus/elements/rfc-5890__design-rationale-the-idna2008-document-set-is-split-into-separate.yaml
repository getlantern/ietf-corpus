document: rfc-5890
kind: design-rationale
summary: The IDNA2008 document set is split into separate normative documents (Protocol, Tables, Bidi, Definitions) and a non-normative Rationale document. This structure separates the stable technical rules from explanatory and advisory material, and allows the Tables specification to evolve with Unicode updates independently.
