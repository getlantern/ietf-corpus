document: rfc-8006
kind: protocol-element
summary: ProtocolACL restricts content delivery based on the delivery protocol via an ordered array of ProtocolRule objects pairing protocol strings (from the 'CDNI Metadata Protocol Types' registry) with allow/deny actions. Absent 'protocol-acl' means allow-all.
