document: rfc-4588
kind: design-rationale
summary: Both session-multiplexing and SSRC-multiplexing are defined. Session-multiplexing allows multicast receivers to subscribe selectively to the retransmission session and enables differential network treatment; SSRC-multiplexing minimizes port usage for servers handling many concurrent sessions.
