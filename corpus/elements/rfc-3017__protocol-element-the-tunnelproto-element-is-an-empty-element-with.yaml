document: rfc-3017
kind: protocol-element
summary: 'The tunnelProto element is an empty element with a required ''type'' attribute specifying a tunneling protocol supported by the POP. Defined values: L2TP, PPTP, L2F, ATMP, AHT (IP AH Tunnel), ESPT (IP ESP Tunnel), IPIP, MIP (Minimal IP-IP), GRE. Multiple instances may appear.'
section: 6.1.6
topics:
