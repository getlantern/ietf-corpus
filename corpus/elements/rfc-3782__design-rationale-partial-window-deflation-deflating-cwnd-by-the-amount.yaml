document: rfc-3782
kind: design-rationale
summary: Partial window deflation (deflating cwnd by the amount of new data acknowledged and adding back SMSS) was chosen over simply setting cwnd to ssthresh on each partial ACK, because it more accurately tracks the number of outstanding packets and recovers more smoothly when multiple packets are dropped.
