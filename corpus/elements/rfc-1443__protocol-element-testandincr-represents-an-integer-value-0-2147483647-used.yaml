document: rfc-1443
kind: protocol-element
summary: TestAndIncr represents an integer value (0..2147483647) used for atomic operations. A management protocol SET must supply the exact current value; on mismatch the operation fails with 'inconsistentValue'. On success, the value wraps to zero at 2^31-1, otherwise increments by one.
