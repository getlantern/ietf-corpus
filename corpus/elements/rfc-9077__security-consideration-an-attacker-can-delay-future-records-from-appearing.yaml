document: rfc-9077
kind: security-consideration
summary: An attacker can delay future records from appearing in a cache by seeding it with queries that cause NSEC or NSEC3 responses to be cached for aggressive use. This document reduces that attack's impact in cases where NSEC/NSEC3 TTLs were previously higher than the zone operator intended.
section: "5"
topics:
    - dns
    - security
