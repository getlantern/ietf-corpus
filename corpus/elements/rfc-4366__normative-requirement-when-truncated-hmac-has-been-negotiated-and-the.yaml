document: rfc-4366
kind: normative-requirement
summary: 'When truncated HMAC has been negotiated and the cipher suite uses HMAC, both client and server MUST use truncated HMACs: CipherSpec.hash_size is 10 bytes and only the first 10 bytes of HMAC output are transmitted and checked. This does not affect PRF calculation.'
section: "3.5"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
