document: rfc-2561
kind: normative-requirement
summary: When both TN3270E-MIB and SYSAPPL-MIB are implemented, the primary index tn3270eSrvrConfIndex SHOULD equal one of the SYSAPPL-MIB's sysApplElmtRunIndex values, enabling the sysApplElmtRunTable to supply additional server information.
section: "3.0"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
