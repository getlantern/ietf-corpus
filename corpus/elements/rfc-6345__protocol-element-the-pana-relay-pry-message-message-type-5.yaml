document: rfc-6345
kind: protocol-element
summary: 'The PANA-Relay (PRY) message (Message Type 5) is sent by the PRE to the PAA or by the PAA to the PRE. It carries exactly one PaC-Information AVP and one Relayed-Message AVP. Its grammar is: PANA-Relay ::= < PANA-Header: 5 > { PaC-Information } { Relayed-Message } *[ AVP ].'
section: "4.1"
topics:
    - security
