document: rfc-8196
kind: normative-requirement
summary: 'The Router-Fingerprint TLV with the A flag set MUST be included in LSP #0. If an LSP #0 is received without this TLV or with the A flag clear, it is flooded normally but the entire LSP set from that router MUST be ignored in the Decision Process.'
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
