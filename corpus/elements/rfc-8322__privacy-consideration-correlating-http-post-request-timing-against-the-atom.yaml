document: rfc-8322
kind: privacy-consideration
summary: Correlating HTTP POST request timing against the atom:updated field can be used to profile users. This risk can be mitigated by using backend control of Feeds rather than HTTP POST when profiling is a concern. Cross-provider data correlation may also allow attackers to assemble datasets violating separation-of-duties policies; vetting clients at account provisioning is the primary mitigation.
section: "10"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
