document: rfc-6864
kind: interoperability-note
summary: NATs and other address-sharing mechanisms present a particularly challenging situation for fragmentation because they overwrite portions of the reassembly tuple, potentially destroying its uniqueness. Reassembly followed by re-fragmentation at the NAT is the recommended approach to maintain ID uniqueness on the outgoing side.
section: 5.3.1
topics:
    - ip
    - nat
