document: rfc-8610
kind: protocol-element
summary: Representation types use '#N.M' notation referencing CBOR major type N and additional information M. For tagged values (major type 6), '#6.nnn(type)' specifies the tag number and the type of the tagged item. This notation describes a set of values at the data-model level and does not mandate a specific serialization encoding.
section: 2.2.3
topics:
    - cbor
