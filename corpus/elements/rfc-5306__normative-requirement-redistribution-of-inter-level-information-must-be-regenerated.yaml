document: rfc-5306
kind: normative-requirement
summary: Redistribution of inter-level information MUST be regenerated before flooding a restarting router's LSP; the Level-n non-pseudonode LSP(s) MUST NOT be flooded until the other level's T2 timer has expired and its SPF has been run.
section: 3.4.1.1
rfc2119_level: MUST NOT
topics:
    - routing
