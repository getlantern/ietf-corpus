document: rfc-7428
kind: design-rationale
summary: The 0xFFFF infinite-lifetime extension is needed for island-mode networks whose network controller (e.g., a battery-powered remote control) may be sleeping and unable to perform periodic prefix renewal, making a finite lifetime impractical.
section: 4.4.2.3
topics:
