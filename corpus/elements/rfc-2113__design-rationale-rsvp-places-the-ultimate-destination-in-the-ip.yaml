document: rfc-2113
kind: design-rationale
summary: RSVP places the ultimate destination in the IP Destination Address field rather than the next RSVP-capable hop, enabling automatic tunneling through non-RSVP routers. The Router Alert option complements this by asking RSVP-aware routers to intercept and process such packets without requiring changes to the destination address.
section: "1.0"
topics:
    - ip
