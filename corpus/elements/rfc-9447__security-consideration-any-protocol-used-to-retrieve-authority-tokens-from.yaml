document: rfc-9447
kind: security-consideration
summary: Any protocol used to retrieve Authority Tokens from a Token Authority MUST use confidentiality to prevent eavesdroppers from acquiring tokens. Although a captured fingerprint could be replayed, the ACME server's fingerprint check prevents unauthorized certificate issuance to a different account.
section: "7"
rfc2119_level: MUST
topics:
    - acme
    - security
