document: rfc-3033
kind: wire-format
summary: 'The RSVP message format in the User-user IE: Protocol discriminator=0x06, Internet protocol/application identifier=RSVP message (0x02), followed by the full RSVP message. SETUP may carry RSVP Resv, CONNECT may carry RSVP ResvConf, and RELEASE may carry RSVP ResvErr or ResvTear.'
section: 4.2.2
