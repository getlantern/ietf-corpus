document: rfc-4560
kind: normative-requirement
summary: A remote ping test is started by setting pingCtlAdminStatus to enabled(1). The corresponding pingCtlEntry MUST have been created, and its pingCtlRowStatus set to active(1), prior to starting the test.
section: 3.1.2
rfc2119_level: MUST
topics:
