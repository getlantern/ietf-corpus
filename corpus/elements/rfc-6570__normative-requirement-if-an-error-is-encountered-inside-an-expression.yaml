document: rfc-6570
kind: normative-requirement
summary: If an error is encountered inside an expression (unknown operator, unsupported modifier, disallowed character), the unprocessed parts SHOULD be copied to the result unexpanded, processing of the remainder of the template SHOULD continue, and the error location and type SHOULD be indicated to the invoking application.
section: "3"
rfc2119_level: SHOULD
