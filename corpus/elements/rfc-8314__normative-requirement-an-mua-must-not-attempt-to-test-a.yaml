document: rfc-8314
kind: normative-requirement
summary: An MUA MUST NOT attempt to test a Mail Account configuration by submitting authentication credentials to a server unless a TLS session meeting minimum confidentiality levels has been established. If requirements are not satisfied, the MUA must explicitly warn that the user's password may be exposed.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - tls
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
