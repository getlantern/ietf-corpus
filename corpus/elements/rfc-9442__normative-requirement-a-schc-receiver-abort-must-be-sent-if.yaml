document: rfc-9442
kind: normative-requirement
summary: A SCHC Receiver-Abort MUST be sent if all RuleIDs are being processed by the receiver at a certain time and a new one is requested, or if the RuleID of the fragment is not valid. A SCHC Receiver-Abort MUST also be triggered when the Inactivity Timer expires. A Receiver-Abort Downlink message MUST only be sent when there is a Downlink transmission opportunity.
section: 3.5.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
