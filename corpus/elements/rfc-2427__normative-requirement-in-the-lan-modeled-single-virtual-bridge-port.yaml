document: rfc-2427
kind: normative-requirement
summary: In the LAN-modeled single virtual bridge port configuration, Frame Relay bridges must provide a mechanism to dynamically learn MAC-address-to-DLCI associations; bridged packets must conform to the Section 4.2 encapsulation to enable this learning.
