document: rfc-9552
kind: wire-format
summary: 'The MPLS Protocol Mask TLV (code 1094, length 1 octet) carries a bitmask of enabled MPLS signaling protocols: L (LDP) and R (RSVP-TE). It is only valid for Protocol-IDs ''Static configuration'' or ''Direct'' and MUST NOT be included for other Protocol-IDs.'
section: 5.3.2.2
