document: rfc-2402
kind: security-consideration
summary: The anti-replay service is effective only if the receiver actually checks the Sequence Number. Adding or removing IP security labels (BSO, ESO, CIPSO) along a packet's path conflicts with those options' classification as immutable and is incompatible with use of IPsec/AH.
section: "6"
topics:
    - ipsec
    - security
