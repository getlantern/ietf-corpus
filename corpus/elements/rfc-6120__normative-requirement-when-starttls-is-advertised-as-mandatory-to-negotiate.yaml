document: rfc-6120
kind: normative-requirement
summary: When STARTTLS is advertised as mandatory-to-negotiate (via a <required/> child element in the feature advertisement), the initiating entity MUST negotiate TLS before proceeding with any further stream negotiation, including SASL authentication.
section: 5.3.1
rfc2119_level: MUST
topics:
