document: rfc-7442
kind: normative-requirement
summary: In Mechanism 1, whenever an RP discovers a new multicast source (via PIM Register or MSDP), the RP SHOULD originate a BGP Source Active auto-discovery route carrying an MCAST-VPN NLRI with RD=0, the source address S, and the group address G.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
