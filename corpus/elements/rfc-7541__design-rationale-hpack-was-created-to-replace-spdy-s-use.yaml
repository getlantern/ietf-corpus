document: rfc-7541
kind: design-rationale
summary: HPACK was created to replace SPDY's use of DEFLATE for header compression, which was effective but exposed a security risk demonstrated by the CRIME attack. HPACK eliminates redundant header fields while limiting vulnerability to known security attacks and bounding memory requirements for constrained environments.
section: "1"
topics:
    - http
    - security
