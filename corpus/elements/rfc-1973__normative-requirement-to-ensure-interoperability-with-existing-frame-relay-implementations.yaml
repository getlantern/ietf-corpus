document: rfc-1973
kind: normative-requirement
summary: To ensure interoperability with existing Frame Relay implementations, the initial Maximum-Receive-Unit (MRU) is 1600 octets, overriding the standard LCP configuration default. This affects minimum required buffer space for receiving, not the size of packets sent.
section: "6"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
