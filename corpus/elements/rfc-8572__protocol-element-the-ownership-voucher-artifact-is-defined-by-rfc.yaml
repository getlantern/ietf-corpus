document: rfc-8572
kind: protocol-element
summary: The ownership voucher artifact is defined by RFC 8366 and is a manufacturer-signed CMS structure whose eContentType is id-ct-animaJSONVoucher. It binds a device (by serial number) to an owner by including a 'pinned-domain-cert' X.509 certificate that anchors the owner certificate chain.
section: "3.3"
