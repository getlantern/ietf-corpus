document: rfc-5898
kind: security-consideration
summary: It is strongly RECOMMENDED that S/MIME integrity protection be applied to SDP session descriptions carrying connectivity preconditions. The SIP identity mechanism (RFC 4474) is an alternative when the user agent provides identity services rather than a proxy server.
