document: rfc-3645
kind: design-rationale
summary: GSS-API was chosen as the basis for this TSIG algorithm because it provides mechanism and protocol independence — the underlying security mechanism can be negotiated on the fly and varied per connection — and it removes the protocol developer from the responsibility of creating and managing a security infrastructure such as key distribution systems.
