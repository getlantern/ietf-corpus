document: rfc-4191
kind: security-consideration
summary: A malicious node could overload hosts with a large number of routes in Route Information Options or very frequent Router Advertisements. The same attack already exists with Prefix Information Options, and SEND WG work on securing router discovery messages is intended to address these threats.
