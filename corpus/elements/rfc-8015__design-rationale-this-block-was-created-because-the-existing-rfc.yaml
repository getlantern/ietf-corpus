document: rfc-8015
kind: design-rationale
summary: This block was created because the existing RFC 7003 Burst/Gap Discard Metrics Block depends on the RFC 6958 Burst/Gap Loss Metrics Block, requiring both to be sent together. When burst discards and burst losses do not occur simultaneously, a standalone block reporting total packets discarded, total burst duration, and total number of bursts is more concise and sufficient.
section: "1.1"
topics:
    - rtp
    - realtime
