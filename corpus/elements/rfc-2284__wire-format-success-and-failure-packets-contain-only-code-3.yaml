document: rfc-2284
kind: wire-format
summary: Success and Failure packets contain only Code (3 for Success, 4 for Failure), Identifier (1 octet, MUST match the Identifier of the Response it acknowledges), and Length (fixed value of 4). There is no Data field.
section: 2.2.2
topics:
    - security
