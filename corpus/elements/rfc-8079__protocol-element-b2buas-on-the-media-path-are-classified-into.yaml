document: rfc-8079
kind: protocol-element
summary: 'B2BUAs on the media path are classified into three categories: (1) Media Relay, which forwards RTP/RTCP without inspection or modification; (2) Media-aware Relay, which inspects and/or modifies RTP/RTCP headers; and (3) Media Terminator, which fully terminates and regenerates RTP/RTCP.'
