document: rfc-7862
kind: wire-format
summary: 'The app_data_block4 structure contains: adb_offset (offset4), adb_block_size (length4), adb_block_count (length4), adb_reloff_blocknum (length4), adb_block_num (count4), adb_reloff_pattern (length4), and adb_pattern (variable-length opaque). Setting adb_reloff_pattern or adb_reloff_blocknum to NFS4_UINT64_MAX indicates the corresponding field is absent in all ADBs.'
