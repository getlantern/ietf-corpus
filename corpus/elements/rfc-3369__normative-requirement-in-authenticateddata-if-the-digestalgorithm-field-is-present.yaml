document: rfc-3369
kind: normative-requirement
summary: In AuthenticatedData, if the digestAlgorithm field is present then the authAttrs field MUST also be present, and vice versa. authAttrs MUST be DER encoded and MUST contain at minimum content-type and message-digest attributes when present.
section: "9.1"
rfc2119_level: MUST
topics:
    - crypto
