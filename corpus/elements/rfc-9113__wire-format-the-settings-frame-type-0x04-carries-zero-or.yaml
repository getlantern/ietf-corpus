document: rfc-9113
kind: wire-format
summary: The SETTINGS frame (type=0x04) carries zero or more Setting fields, each consisting of a 16-bit Identifier and a 32-bit Value. The stream identifier MUST be 0x00. A SETTINGS frame with ACK flag set MUST have an empty payload. Each parameter in SETTINGS replaces any existing value for that parameter.
section: "6.5"
topics:
