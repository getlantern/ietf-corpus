document: rfc-2535
kind: protocol-element
summary: The key tag field (2 octets) enables efficient selection among multiple candidate keys before the expensive signature check. For RSA/MD5 it is the most significant 16 of the least significant 24 bits of the public modulus; for all other algorithms it is a simple checksum of the KEY RR as specified in Appendix C.
section: 4.1.6
