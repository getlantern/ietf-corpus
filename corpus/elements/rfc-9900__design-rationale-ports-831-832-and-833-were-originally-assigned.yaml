document: rfc-9900
kind: design-rationale
summary: Ports 831, 832, and 833 were originally assigned for NETCONF over BEEP and NETCONF over SOAP, but those protocols were never deployed in production. The corresponding RFCs (RFC 4743 and RFC 4744) have been marked Historic, making the port reservations unnecessary and releasing scarce port number resources.
section: "1"
topics:
