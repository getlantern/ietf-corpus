document: rfc-5881
kind: normative-requirement
summary: Implementations MUST ensure that all BFD Control packets are transmitted over the one-hop path being protected by BFD. On a multiaccess network, BFD Control packets MUST be transmitted with source and destination addresses that are part of the subnet.
section: "6"
rfc2119_level: MUST
topics:
    - routing
    - ip
