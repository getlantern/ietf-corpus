document: rfc-3530
kind: design-rationale
summary: Volatile filehandles were introduced to accommodate server environments where persistent filehandles are infeasible due to the lack of filesystem-level invariants, or where hierarchical storage management or filesystem reorganization makes persistence impractical. The tradeoff is increased client implementation burden to re-traverse the namespace on expiry.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
