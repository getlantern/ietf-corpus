document: rfc-8895
kind: normative-requirement
summary: When an update stream covers resources R0 and R1 where R1 depends on R0, the server MUST send the update for R0 before sending related updates for R1. For example, a network map update MUST precede dependent cost map updates.
section: 6.7.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
