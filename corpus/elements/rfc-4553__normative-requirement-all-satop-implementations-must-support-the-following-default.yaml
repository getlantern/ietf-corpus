document: rfc-4553
kind: normative-requirement
summary: 'All SAToP implementations MUST support the following default payload sizes: E1 — 256 bytes, T1 — 192 bytes, E3 and T3 — 1024 bytes. The payload size MUST be defined during PW setup, MUST be the same for both directions of the PW, and MUST remain unchanged for the lifetime of the PW.'
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
