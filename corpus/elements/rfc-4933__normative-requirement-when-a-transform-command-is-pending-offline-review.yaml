document: rfc-4933
kind: normative-requirement
summary: When a transform command is pending offline review, the server MUST return response code 1001, MUST manage object status to reflect the pending action, and MUST notify all involved clients when offline processing is completed.
section: "3.3"
rfc2119_level: MUST
