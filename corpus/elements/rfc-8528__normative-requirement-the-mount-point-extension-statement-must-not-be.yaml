document: rfc-8528
kind: normative-requirement
summary: The 'mount-point' extension statement MUST NOT be used in a YANG version 1 module. This restriction exists because YANG version 1 cannot support invocation of mounted RPC operations or receipt of mounted notifications.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - yang
    - netconf
