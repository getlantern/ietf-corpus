document: rfc-2955
kind: security-consideration
summary: Several MIB objects carry read-write or read-create access and can affect network operations if SET by unauthorized principals. SNMPv1 alone provides no access control; the document recommends using SNMPv3 with the User-based Security Model (RFC 2574) and the View-based Access Control Model (RFC 2575) to restrict GET/SET access to authorized users only.
section: "10"
topics:
    - snmp
    - security
