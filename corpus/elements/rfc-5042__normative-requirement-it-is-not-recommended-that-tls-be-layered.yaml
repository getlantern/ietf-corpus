document: rfc-5042
kind: normative-requirement
summary: 'It is not RECOMMENDED that TLS be layered on top of RDMAP or DDP: TLS beneath RDMAP destroys flow-through zero-copy because out-of-order packets cannot be decrypted until all preceding packets arrive; TLS above RDMAP leaves RDMAP/DDP headers unprotected.'
section: 5.4.2
rfc2119_level: RECOMMENDED
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
