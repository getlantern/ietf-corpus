document: rfc-4738
kind: protocol-element
summary: 'The KEMAC payload in R_MESSAGE carries the encrypted TGK and MAC: KEMAC = E(encr_key, IDr || {TGK}) || MAC. The encr_key and auth_key are derived from the envelope key (env_key) per RFC 3830 Section 4.1.4. The first sub-payload is the Responder''s identity (IDr), followed by one or more TGK payloads chosen by the Responder.'
section: "3.6"
topics:
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
