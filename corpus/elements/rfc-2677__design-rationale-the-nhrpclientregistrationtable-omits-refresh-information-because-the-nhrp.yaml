document: rfc-2677
kind: design-rationale
summary: The nhrpClientRegistrationTable omits refresh information because the NHRP specification does not mandate a refresh algorithm. The table is intentionally scoped to track only the registration requests that clients must maintain, leaving refresh policy to implementations.
section: 3.2.2
topics:
