kind: registry
summary: IANA registered a new MIME type 'application/rlmi+xml' for Resource List Meta-Information. It supports an optional 'charset' parameter; UTF-8 encoding is strongly encouraged. This type is used to convey meta-information for the state of lists of resources within a SIP subscription.
