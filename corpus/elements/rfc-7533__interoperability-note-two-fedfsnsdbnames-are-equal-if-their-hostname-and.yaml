document: rfc-7533
kind: interoperability-note
summary: Two FedFsNsdbNames are equal if their hostname and port fields match. Port value 0 always matches port 389 (standard LDAP); thus (nsdb.example.com, 0) equals (nsdb.example.com, 389) but not (nsdb.example.com, 1066) or (nsdb.foo.example.com, 389).
section: "4.1"
topics:
    - ldap
