document: rfc-5048
kind: protocol-element
summary: 'TaskReporting is a new Login/Text negotiation key (scope: SW, Leading Only, irrelevant for Discovery sessions) with three values: RFC3720 (default), ResponseFence, and FastAbort. The result function is AND, and the negotiation originator MUST offer at least RFC3720 and ResponseFence.'
section: "9.1"
topics:
