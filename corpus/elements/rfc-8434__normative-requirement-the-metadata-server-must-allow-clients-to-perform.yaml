document: rfc-8434
kind: normative-requirement
summary: The metadata server MUST allow clients to perform data I/O against it even if it has already granted the client a layout; a layout type might discourage such I/O but cannot forbid it. The metadata server MUST also be able to do storage allocation (create, delete, extend, or truncate files).
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
