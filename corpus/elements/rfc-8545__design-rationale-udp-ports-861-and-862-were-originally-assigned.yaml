document: rfc-8545
kind: design-rationale
summary: UDP ports 861 and 862 were originally assigned to the OWAMP/TWAMP control protocols, but control protocols require TCP and cannot use UDP. The ports were reassigned to the test protocols (OWAMP-Test, TWAMP-Test) which actually operate over UDP, making the well-known port assignments useful.
