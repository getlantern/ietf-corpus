document: rfc-4522
kind: normative-requirement
summary: Where the binary option is present in an attribute description, the associated attribute values or assertion values MUST be BER encoded. The contents octets of the associated AttributeValue or AssertionValue OCTET STRING are a complete BER encoding of the relevant value.
section: "3"
rfc2119_level: MUST
topics:
