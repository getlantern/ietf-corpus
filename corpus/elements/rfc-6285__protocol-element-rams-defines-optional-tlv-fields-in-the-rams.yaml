document: rfc-6285
kind: protocol-element
summary: 'RAMS defines optional TLV fields in the RAMS-R message for burst control: Min RAMS Buffer Fill Requirement (Type=2, 32-bit, milliseconds), Max RAMS Buffer Fill Requirement (Type=3, 32-bit, milliseconds), Max Receive Bitrate (Type=4, 64-bit, bits per second), Preamble-only Allowed (Type=5, zero-length), and Supported Enterprise Number(s). These let the receiver constrain burst behavior.'
section: "7.2"
topics:
