document: rfc-2338
kind: normative-requirement
summary: The IP TTL MUST be set to 255 on transmission. A VRRP router receiving a packet with TTL not equal to 255 MUST discard the packet. This mechanism protects against VRRP packets injected from remote networks.
section: 5.2.3
rfc2119_level: MUST
topics:
    - routing
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
