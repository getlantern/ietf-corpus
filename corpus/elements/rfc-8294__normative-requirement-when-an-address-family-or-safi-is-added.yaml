document: rfc-8294
kind: normative-requirement
summary: When an Address Family or SAFI is added to its respective IANA registry, a new 'enum' statement MUST be added to the iana-routing-types YANG module. The enum name must be a valid lowercase YANG identifier with hyphens, and must include value, optional status, optional description, and optional reference substatements.
section: "5.1"
rfc2119_level: MUST
topics:
    - registry
    - yang
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
