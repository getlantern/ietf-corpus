document: rfc-6522
kind: design-rationale
summary: RFC 6522 removes the constraint from RFC 3462 that multipart/report must be used only as the outermost MIME type of a message. That restriction prevented forwarding a report as part of another multipart MIME message and limited transmission of multiple administrative reports within a single container.
section: "1"
