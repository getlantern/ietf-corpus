document: rfc-8286
kind: protocol-element
summary: The Splicing Interval is a pair of NTP timestamps (wallclock time) representing the splicing-in point and splicing-out point, as defined per RFC 6828. It tells the splicer when to start and end substitution of the main RTP stream.
