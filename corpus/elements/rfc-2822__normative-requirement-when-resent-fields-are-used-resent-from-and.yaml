document: rfc-2822
kind: normative-requirement
summary: When resent fields are used, 'Resent-From:' and 'Resent-Date:' MUST be present. 'Resent-Message-ID:' SHOULD be included. 'Resent-Sender:' SHOULD NOT be used if it would be identical to 'Resent-From:'.
section: 3.6.6
rfc2119_level: MUST
topics:
    - email
