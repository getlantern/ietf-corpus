document: rfc-3730
kind: normative-requirement
summary: The <version> and <lang> values in a <login> command MUST exactly match values advertised in the server's greeting. The server MUST respond to a successful <login> with no <resData> element.
section: 2.9.1.1
rfc2119_level: MUST
