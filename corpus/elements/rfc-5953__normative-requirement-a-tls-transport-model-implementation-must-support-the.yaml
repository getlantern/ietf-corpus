document: rfc-5953
kind: normative-requirement
summary: A TLS Transport Model implementation MUST support the authentication of both the server and the client using X.509 certificates. TLSTM implementations are REQUIRED to support X.509 certificates; other forms of authentication are outside the scope of this specification.
section: 3.1.1
rfc2119_level: MUST
topics:
    - snmp
    - tls
    - pkix
    - security
