document: rfc-8383
kind: normative-requirement
summary: For Type 5 (Bit Map of FGLs) TLV, Length MUST be at least 3. If Length is 0, 1, or 2, the TLV is corrupt and the Address Flush message MUST be discarded if Type 5 is implemented.
section: 2.2.5
rfc2119_level: MUST
topics:
    - routing
