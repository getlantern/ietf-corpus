document: rfc-4776
kind: normative-requirement
summary: After initial location information has been introduced, it MUST be afforded the protections defined in RFC 3694. Location information SHOULD NOT be sent from a DHCP client to a DHCP server; a client that does so implicitly grants the server unlimited retention and distribution permissions.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
