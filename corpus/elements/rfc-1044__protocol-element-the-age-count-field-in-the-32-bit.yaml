document: rfc-1044
kind: protocol-element
summary: 'The Age Count field in the 32-bit message header serves the same purpose as the IP Time to Live: each bridge decrements it by one as the message passes through; when the result reaches zero the message is discarded. This prevents datagrams from circulating endlessly in improperly configured networks.'
section: AGE COUNT
topics:
