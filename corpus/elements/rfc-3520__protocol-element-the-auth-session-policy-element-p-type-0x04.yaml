document: rfc-3520
kind: protocol-element
summary: The AUTH_SESSION policy element (P-Type = 0x04) is a POLICY_DATA-conformant policy element that carries session authorization information. It consists of a 16-bit Length, a 16-bit P-Type field, and a variable-length Session Authorization Attribute List describing the authorized session.
section: "3.2"
