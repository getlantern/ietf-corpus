document: rfc-6212
kind: normative-requirement
summary: When VBR query mechanisms other than reading a VBR-Info header field are applied (e.g., locally configured policy or queries absent any VBR-Info field), the verifying server MAY generate an Authentication-Results field to relay the results of the VBR query.
section: "4"
rfc2119_level: MAY
