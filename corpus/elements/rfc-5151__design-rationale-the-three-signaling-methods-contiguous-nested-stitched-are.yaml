document: rfc-5151
kind: design-rationale
summary: The three signaling methods (contiguous, nested, stitched) are per-domain transit options, not end-to-end choices. This allows each domain operator to choose the method that best suits their administrative and technical requirements, enabling, for example, an ingress that wants maximal control to request contiguous signaling while a transit domain operator who wants per-domain reoptimization control may permit only stitching.
section: "2.1"
topics:
    - mpls
    - routing
