document: rfc-5089
kind: security-consideration
summary: The security of PCE discovery relies entirely on the security of IS-IS. Mechanisms from RFC 3567 for ensuring authenticity and integrity of IS-IS LSPs and their TLVs can be used to secure the PCED sub-TLV as well.
