document: rfc-5389
kind: protocol-element
summary: The MESSAGE-INTEGRITY attribute contains a 20-byte HMAC-SHA1 over the STUN message up to and including MESSAGE-INTEGRITY itself. For long-term credentials the key is MD5(username:realm:SASLprep(password)); for short-term credentials it is SASLprep(password).
section: "15.4"
topics:
    - nat
    - security
    - crypto
