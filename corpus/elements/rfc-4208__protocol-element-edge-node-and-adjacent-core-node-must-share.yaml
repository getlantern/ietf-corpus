document: rfc-4208
kind: protocol-element
summary: Edge-node and adjacent core-node must share the same address space used by GMPLS to signal between edge-nodes across the core. A set of <edge-node, core-node> tuples share an address space if edge-nodes can establish LSPs among themselves without address mapping or translation.
section: "2"
topics:
