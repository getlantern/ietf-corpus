document: rfc-9573
kind: interoperability-note
summary: The three label allocation methods (DCB, common context-specific label spaces, per-PE disjoint blocks) can be used in any combination depending on deployment. The MAY in Section 4.2 means use of these procedures is optional, but when used, all PEs and segmentation points must consistently support them.
section: "4.2"
