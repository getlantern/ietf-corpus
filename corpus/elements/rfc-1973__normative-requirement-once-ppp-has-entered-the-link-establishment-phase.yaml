document: rfc-1973
kind: normative-requirement
summary: Once PPP has entered the Link Establishment phase, packets with other NLPID values MUST NOT be sent, and on receipt such packets MUST be silently discarded, until the PPP link enters the Network-Layer Protocol phase.
section: "4"
rfc2119_level: MUST NOT
