document: rfc-2445
kind: protocol-element
summary: The ORGANIZER property specifies the CAL-ADDRESS of the calendar user who created or is responsible for a VEVENT, VTODO, VJOURNAL, or VFREEBUSY component. It supports CN, DIR, SENT-BY, and LANGUAGE parameters.
