summary: 'Time Bucket Jitter Measurement message (ACH type 0x0010) extends the RFC 6374 fixed header with: Number of Buckets (8-bit unsigned), Reserved1 (24-bit, send as zero), Interval (64-bit, in 10 ns units), and then N 64-bit Number of Pkts in Bucket fields, one per bucket, followed by a TLV block.'
