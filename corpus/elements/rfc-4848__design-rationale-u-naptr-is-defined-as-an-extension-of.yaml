document: rfc-4848
kind: design-rationale
summary: U-NAPTR is defined as an extension of S-NAPTR specifically to allow URIs as DDDS resolution targets. S-NAPTR rules out regular expressions in NAPTR records, which also rules out providing a URI as the target — a restriction too limiting for several applications that need URI-based service location.
section: "1"
topics:
    - dns
