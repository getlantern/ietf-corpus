document: rfc-8156
kind: interoperability-note
summary: The failover message format is compatible with the standard DHCPv6 message format (RFC 3315, Section 6) and reuses the TCP framing defined in DHCPv6 Bulk Leasequery (RFC 5460, Section 5.1). Options used in failover messages are drawn from the same DHCPv6 Option Codes registry, requiring coordination with existing DHCPv6 option assignments.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
