document: rfc-6140
kind: normative-requirement
summary: REGISTER requests that attempt to de-register a single AOR that has been implicitly registered via a bulk registration MUST NOT remove that AOR; the registrar acts as if the UA tried to unregister a contact that was not registered. Renewal and removal are bound to the bulk registered contact as a whole.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
