document: rfc-7695
kind: normative-requirement
summary: When the Backoff Timer fires for a pair with no Current Assignment, the subroutine MUST be run with BackoffTriggered=true. Even if multiple events occur before execution, the subroutine MUST be run only once.
section: "4.1"
rfc2119_level: MUST
topics:
