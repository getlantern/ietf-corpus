document: rfc-1694
kind: normative-requirement
summary: 'For SMDS interfaces: ifType must be set to 31, ifMtu to 9232, ifPromiscuousMode to false(2), ifConnectorPresent to false(2), and ifLinkUpDownTrapEnable to disabled(2). These are fixed values with no configuration flexibility.'
