document: rfc-5082
kind: security-consideration
summary: GTSM protects single-hop protocol sessions but does not protect against on-the-wire attacks; it only makes it difficult (not impossible) to engineer a TTL of 255 from non-directly connected locations, assuming no compromised routers in the path.
