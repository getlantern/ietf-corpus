document: rfc-7678
kind: wire-format
summary: 'The Port-Set-Identifier AVP (code 639) is a structured OctetString of exactly 4 octets (total AVP length 12): Offset (8-bit unsigned, values 0–15), PSIDLength (8-bit unsigned, values 0 to 16-a), and PSIDValue (16-bit, PSID right-justified in low-order k bits). A PSIDLength of 0 means no PSID.'
