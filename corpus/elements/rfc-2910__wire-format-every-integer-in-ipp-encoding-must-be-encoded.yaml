document: rfc-2910
kind: wire-format
summary: Every integer in IPP encoding MUST be encoded as a signed integer using two's-complement binary encoding in big-endian (network) order. Width is 1 octet (SIGNED-BYTE) for version-number and tags, 2 octets (SIGNED-SHORT) for operation-id, status-code, and length fields, and 4 octets (SIGNED-INTEGER) for value fields and request-id.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
