document: rfc-4939
kind: normative-requirement
summary: When isnsServerDefaultDdDdsStatus is inNoDomain (the default), newly registered devices are not placed in any Discovery Domain or DDS. When set to inDefaultDdAndDds, new devices are automatically added to a default DD and DDS.
section: "5"
rfc2119_level: SHOULD
