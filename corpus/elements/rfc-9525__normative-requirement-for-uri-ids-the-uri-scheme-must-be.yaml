document: rfc-9525
kind: normative-requirement
summary: For URI-IDs, the URI scheme MUST be that of the protocol associated with the application service type, and the 'host' component MUST be the FQDN of the service. The application protocol specification MUST specify which URI schemes are acceptable in URI-IDs.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
