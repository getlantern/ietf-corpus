document: rfc-7345
kind: wire-format
summary: 'Packet demultiplexing on the shared UDP port uses the first byte value: 0–1 indicates STUN, 20–63 indicates DTLS. This allows STUN (for NAT traversal) and DTLS to share the same IP address and port.'
