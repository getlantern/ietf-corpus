document: rfc-7090
kind: interoperability-note
summary: In multi-stage routing, the PSAP URI domain (e.g., psap@example.com) may differ from the next-hop domain stored during emergency call setup (e.g., esrp@example.net), causing the VoIP provider to treat a legitimate PSAP callback as a normal call.
section: "3.2"
topics:
