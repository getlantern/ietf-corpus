document: rfc-7766
kind: interoperability-note
summary: When DNS-over-TCP is used as a transport for DNS private exchange (e.g., DNS-over-TLS), implementors must be aware of TCP Fast Open and ensure that data requiring protection is not accidentally transmitted in the clear during TFO.
