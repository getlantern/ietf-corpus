document: rfc-8929
kind: normative-requirement
summary: When a node receives multiple NA messages with an EARO and the same ROVR, it MUST favor the NA with the freshest EARO over the others. A 6LBR deployed on the backbone MUST be capable of maintaining state for each 6BBR that has registered with the same TID and ROVR (since an address may be registered to more than one 6BBR).
section: "6"
rfc2119_level: MUST
topics:
    - ip
