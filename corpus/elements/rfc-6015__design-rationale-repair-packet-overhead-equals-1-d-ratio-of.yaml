document: rfc-6015
kind: design-rationale
summary: Repair packet overhead equals 1/D (ratio of repair bytes to protected source bytes, ignoring FEC header size). A larger D reduces bandwidth overhead at the cost of a larger source block and increased latency before recovery is possible.
section: "1.2"
topics:
