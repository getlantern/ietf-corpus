document: rfc-9208
kind: design-rationale
summary: Quota roots are used rather than per-mailbox quotas because not all implementations can calculate usage or apply quotas on arbitrary mailboxes or hierarchies; a quota root may span multiple mailboxes and need not be named after any mailbox.
section: "3.2"
topics:
