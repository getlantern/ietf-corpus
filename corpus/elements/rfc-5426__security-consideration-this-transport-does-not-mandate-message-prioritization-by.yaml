document: rfc-5426
kind: security-consideration
summary: This transport does not mandate message prioritization by severity. Without prioritization by sender, receiver, or network, a flood of low-severity messages can overwhelm the receiver and cause high-severity messages to be discarded.
section: "5.5"
topics:
