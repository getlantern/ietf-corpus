document: rfc-3891
kind: security-consideration
summary: 'Four authorization scenarios are defined as warranting replacement: (1) replacement by a party equivalent to the replaced party; (2) replacement on behalf of the replaced party, possibly transitively via REFER/Referred-By; (3) replacement by a former participant; (4) replacement by a specifically authorized party. Former-participant authorization (#3) is the weakest and SHOULD NOT be relied upon alone.'
section: "8"
topics:
