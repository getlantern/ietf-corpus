document: rfc-7716
kind: protocol-element
summary: The Protocol Boundary Router (PBR) is the core router at the boundary between the core network and attachment networks. PBRs play the role of PE routers in MVPN, storing GTM routing information in the global table rather than a VRF, and using BGP-MVPN procedures adapted for the global table.
section: "1"
topics:
