document: rfc-1973
kind: state-machine
summary: Initial LCP packets contain the sequence cf-c0-21 following the header. When a LCP Configure-Request is received and recognized, the PPP link enters Link Establishment phase; on NCP success it enters Network-Layer Protocol phase; on Max-Configure failure it MAY enter Termination phase or fall back to RFC 1490 encapsulation.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
