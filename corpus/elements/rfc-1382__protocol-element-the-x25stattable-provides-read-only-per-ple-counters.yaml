summary: 'The x25StatTable provides read-only per-PLE counters including: incoming/outgoing calls, call refusals, provider-initiated clears and resets, restarts, data packets, interrupt packets, active circuit gauges (outgoing, incoming, two-way), and timer expiry counters for T20–T26 plus retry count exceeded events.'
