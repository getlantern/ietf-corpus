document: rfc-9190
kind: protocol-element
summary: The EAP-TLS server sends a protected success result indication as an encrypted TLS record with application data 0x00 after successfully processing the client Finished and sending its last handshake message. This MUST NOT be sent before those conditions are met, and afterward no more EAP-Requests may be sent.
section: "2.5"
topics:
    - tls
