document: rfc-7403
kind: protocol-element
summary: The Reason header with SIP/483/"Traceroute Response" in a 200 OK signals to the UAC that Max-Forwards reached 0 at this B2BUA; the absence of this Reason header in a 200 OK from a loopback INVITE signals that the final target UAS was reached, completing the traceroute.
section: "3.2"
