document: rfc-7049
kind: design-rationale
summary: CBOR allows multiple encodings of the same value (e.g., the integer 7 can be represented in several ways) because requiring unique encodings would add encoder complexity. Protocols requiring determinism are expected to layer canonical-form rules on top.
section: "1.1"
