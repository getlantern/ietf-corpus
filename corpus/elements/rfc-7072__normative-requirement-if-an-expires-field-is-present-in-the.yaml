document: rfc-7072
kind: normative-requirement
summary: If an Expires field is present in the template response, the client SHOULD NOT send another query to the same server before the indicated timestamp. If no Expires field is present, the client SHOULD wait at least one day before re-querying.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
    - http
