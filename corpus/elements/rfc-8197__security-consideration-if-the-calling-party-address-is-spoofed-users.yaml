document: rfc-8197
kind: security-consideration
summary: If the calling party address is spoofed, users may falsely report the caller identity, potentially blocking legitimate users of that identity — a form of denial-of-service. The 607 response code SHOULD NOT be used for creating global call filters unless the calling party identity has been authenticated per SIP-IDENTITY.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - security
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
