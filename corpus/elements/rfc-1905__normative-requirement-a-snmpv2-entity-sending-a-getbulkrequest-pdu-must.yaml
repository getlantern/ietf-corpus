document: rfc-1905
kind: normative-requirement
summary: A SNMPv2 entity sending a GetBulkRequest-PDU MUST take care to set its parameters to reduce the risk of IP fragmentation, particularly by using only small values for max-repetitions under conditions of network stress.
section: "2.5"
rfc2119_level: MUST
