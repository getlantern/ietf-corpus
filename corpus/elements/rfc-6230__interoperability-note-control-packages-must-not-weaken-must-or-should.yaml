document: rfc-6230
kind: interoperability-note
summary: Control Packages MUST NOT weaken MUST or SHOULD statements in the base framework document. A Control Package MAY strengthen SHOULD, RECOMMENDED, or MAY to MUST if justified by the specific usage. New methods, header fields, and status codes require Standards-Track RFCs.
