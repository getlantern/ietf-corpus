document: rfc-8299
kind: normative-requirement
summary: By default, all sites in an IP VPN MUST be authorized to access a configured cloud resource. If restrictions are required, the operator MAY configure the `permit-site` or `deny-site` leaf-lists to limit or deny specific sites from accessing a cloud target.
section: 6.2.2
rfc2119_level: MUST
topics:
    - yang
    - vpn
