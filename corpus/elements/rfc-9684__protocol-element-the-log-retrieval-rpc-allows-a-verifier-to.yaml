document: rfc-9684
kind: protocol-element
summary: 'The log-retrieval RPC allows a Verifier to acquire measurement log Evidence that was extended into specific TPM PCRs. Log selection supports three index types: last-entry (binary content match), numeric index, or timestamp. Supported log types include bios, ima, and netequip_boot.'
section: 2.1.1.4
topics:
    - yang
    - netconf
    - security
