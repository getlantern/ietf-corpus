document: rfc-7699
kind: design-rationale
summary: The flexi-grid label format is intentionally modeled on the fixed-grid label defined in RFC 6205 so that the first 32 bits remain backward compatible with RFC 6205 implementations; a legacy node will recognize the format of the first word even if it cannot interpret the new grid type value.
section: "4.1"
