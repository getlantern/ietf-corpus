document: rfc-5196
kind: protocol-element
summary: The <event-packages> element lists SIP event packages supported or not supported by a service, using <supported> and <notsupported> containers. Valid values are drawn from the IANA SIP event types namespace registry (e.g., conference, dialog, presence, refer, winfo).
section: 3.2.14
topics:
