document: rfc-6679
kind: design-rationale
summary: ECN support for RTP is more important than for TCP because packet loss in real-time audio-visual media is highly visible to users and cannot be repaired by retransmission. ECN allows applications to reduce transmission rate before routers drop packets, preserving media quality in a controlled manner.
section: "3"
topics:
