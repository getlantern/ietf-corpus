document: rfc-9072
kind: design-rationale
summary: Optional Parameter type code 255 is reserved as the 'Extended Length' signal. When the Non-Ext OP Type octet equals 255, the receiver switches to extended parsing. This re-uses an existing field position to signal the format change without altering the base message framing.
section: "1"
topics:
