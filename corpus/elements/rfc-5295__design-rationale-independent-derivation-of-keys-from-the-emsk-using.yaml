document: rfc-5295
kind: design-rationale
summary: Independent derivation of keys from the EMSK (using different PRF inputs per child key) was chosen over a keystream approach so that child keys can be derived in any order without depending on other keys. This allows new usages to be developed without cumbersome coordination between usage definitions.
