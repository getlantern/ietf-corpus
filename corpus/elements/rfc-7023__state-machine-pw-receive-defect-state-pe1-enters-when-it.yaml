document: rfc-7023
kind: state-machine
summary: 'PW Receive Defect State: PE1 enters when it receives a Forward Defect Indication (FDI) from PE2, detects loss of PSN tunnel connectivity upstream, or detects loss of PW connectivity via VCCV-BFD, VCCV-Ping, or NS OAM CC. PE1 exits when all previously detected defects clear and PE2 has cleared any FDI; exit may transition to the PW operational state or PW transmit defect state.'
section: 4.4.1
topics:
