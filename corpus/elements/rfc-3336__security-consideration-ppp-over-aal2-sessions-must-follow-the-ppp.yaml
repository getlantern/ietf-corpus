document: rfc-3336
kind: security-consideration
summary: PPP over AAL2 sessions MUST follow the PPP link operation state machine (RFC 1661), which includes an authentication phase using PAP or CHAP before any network-layer packets are exchanged, allowing a receiver to authenticate the sender.
section: "9"
topics:
