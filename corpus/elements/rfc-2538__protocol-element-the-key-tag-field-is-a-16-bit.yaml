document: rfc-2538
kind: protocol-element
summary: The key tag field is a 16-bit value computed for the key embedded in the certificate as specified in DNSSEC (RFC 2535), used as an efficiency measure to identify which CERT RRs may apply to a particular key. The key must be transformed to KEY RR public key format before computing the tag.
section: "2"
