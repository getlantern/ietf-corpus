document: rfc-7838
kind: interoperability-note
summary: The ALPN protocol name 'http/1.1', registered by RFC 7301 Section 6, identifies HTTP/1.1 over TLS. An ALPN protocol name implicitly includes TLS unless specified otherwise in its definition, so the h2c (cleartext HTTP/2) protocol cannot be used as an alternative service for origins requiring TLS authentication.
section: "2"
topics:
    - http
    - tls
