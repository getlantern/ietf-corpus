document: rfc-6001
kind: protocol-element
summary: The CALL_ATTRIBUTES object (class 202, C-Num form 11bbbbbb, C-Type 1) signals attributes for or reports operational state of a call, modeled on the LSP_ATTRIBUTES object from RFC 5420. LSRs that do not recognize it pass it transparently. It carries Call Attributes TLVs in its value field.
section: 5.1.1
topics:
