document: rfc-4120
kind: protocol-element
summary: KRB_AP_REQ (msg-type 14) carries a ticket and an Authenticator encrypted in the session key. The Authenticator contains cname, crealm, timestamp, optional checksum, optional sequence number, and optional subkey, proving the client possesses the session key and preventing replay.
section: 5.5.1
topics:
    - security
    - crypto
