document: rfc-8686
kind: normative-requirement
summary: When DNS lookups fail (including temporary errors), and further domain names remain to be tried, the procedure SHOULD immediately try the next domain name without waiting for retries.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - dns
