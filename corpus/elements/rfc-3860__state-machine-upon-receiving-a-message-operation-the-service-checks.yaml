document: rfc-3860
kind: state-machine
summary: 'Upon receiving a message operation, the service checks: (1) syntactic validity of source/destination — failure if invalid; (2) resolvability of destination — failure if unresolvable and not final recipient; (3) access control — failure if denied. On success: ''success'' if delivered, ''failure'' if delivery fails, ''indeterminant'' if delegated with no future authoritative indication, or deferred response if delegation will yield a future indication.'
section: 3.4.1
topics:
    - realtime
