document: rfc-6353
kind: normative-requirement
summary: The tmSecurityName MUST be constant for all traffic passing through a single TLSTM session. Messages MUST NOT be sent through an existing (D)TLS connection that was established using a different tmSecurityName.
section: 4.4.1.1
rfc2119_level: MUST
