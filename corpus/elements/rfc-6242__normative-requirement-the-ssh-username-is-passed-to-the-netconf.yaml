document: rfc-6242
kind: normative-requirement
summary: The SSH username is passed to the NETCONF message layer without modification. If the username is not representable in XML (i.e., does not comply with NETCONF username requirements in RFC 6241), the SSH session MUST be dropped.
section: "3"
rfc2119_level: MUST
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
