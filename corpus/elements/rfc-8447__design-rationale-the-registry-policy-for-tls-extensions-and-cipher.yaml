document: rfc-8447
kind: design-rationale
summary: The registry policy for TLS extensions and cipher suites was loosened from IETF Review to Specification Required because the WG essentially provided no cryptographic review of cipher suites or supported groups anyway, especially for national cipher suites. The change reflects operational reality rather than a reduction in intended rigor.
