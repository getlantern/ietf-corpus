document: rfc-3445
kind: protocol-element
summary: The KEY RR uses type 25 and is restricted to storing DNSSEC keys only. In the flags field, all bits except bit 7 (Zone bit) are reserved. Bit 7 set to 1 indicates a DNS Zone key; set to 0 indicates a non-zone DNSSEC key (e.g., SIG(0)/TKEY).
section: "3"
