document: rfc-5070
kind: normative-requirement
summary: Either a Port or Portlist class MUST be specified for each Service instance. When Portlist is used in both source and target within a Flow, there MUST be symmetry in the number and sequence of ports so that the n-th source port corresponds to the n-th target port.
section: "3.17"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
