document: rfc-9705
kind: normative-requirement
summary: A node supporting facility backup protection (RFC 4090) MUST NOT set the RI-RSVP flag (I-bit) unless it supports all the extensions specified in this document. Setting the I-bit without full RI-RSVP-FRR support may result in lingering stale states and disruption of normal FRR operations.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
