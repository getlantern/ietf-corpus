document: rfc-6031
kind: normative-requirement
summary: If a PSKC key package is used in multiple provisioning interactions referencing the same key, the KeyId value MUST remain identical across all interactions (e.g., for subsequent metadata updates the same KeyId used at initial provisioning MUST be reused).
section: 3.2.1
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
