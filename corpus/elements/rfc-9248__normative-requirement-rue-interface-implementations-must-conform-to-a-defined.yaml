document: rfc-9248
kind: normative-requirement
summary: RUE interface implementations MUST conform to a defined set of core SIP standards including RFC 3261, RFC 3263, RFC 3264, RFC 5626 (Outbound), RFC 8866 (SDP), RFC 8445/8839 (ICE), and RFC 6442 (Geolocation), among others. Implementations MUST implement full ICE, though they MAY interwork with ICE-lite user agents.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
