document: rfc-7056
kind: protocol-element
summary: RADIUS attributes received in a GSS-EAP access-accept message are named as 'urn:ietf:params:gss:radius-attribute' followed by a space and the numeric RADIUS attribute name per RFC 6929 Section 2.7. For example, the User-Name attribute (type 1) is named 'urn:ietf:params:gss:radius-attribute 1'; extended type 1 within type 241 is 'urn:ietf:params:gss:radius-attribute 241.1'.
section: "5"
topics:
    - security
    - registry
