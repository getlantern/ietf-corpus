document: rfc-7589
kind: normative-requirement
summary: Implementations MUST support mutual TLS certificate-based authentication. The NETCONF client MUST act as the TLS client and the TLS server MUST send a CertificateRequest to obtain a certificate from the client.
section: "1"
rfc2119_level: MUST
topics:
    - tls
    - netconf
    - pkix
    - security
