document: rfc-1738
kind: protocol-element
summary: The HTTP URL scheme (`http://`) takes the form `http://<host>:<port>/<path>?<searchpart>`. Default port is 80. No user name or password is allowed. The path and searchpart are both optional; '/', ';', and '?' are reserved within those components.
section: "3.3"
topics:
