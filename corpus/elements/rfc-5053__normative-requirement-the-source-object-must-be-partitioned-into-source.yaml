document: rfc-5053
kind: normative-requirement
summary: The source object MUST be partitioned into source blocks and sub-blocks using the Partition[] function, which splits I items into J approximately equal groups (JL groups of size IL = ceil(I/J), JS groups of size IS = floor(I/J)).
section: 5.3.1.2
rfc2119_level: MUST
