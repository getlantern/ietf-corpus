document: rfc-9368
kind: protocol-element
summary: Incompatible version negotiation is initiated by the server sending a Version Negotiation packet listing its Offered Versions. The client searches for a mutually supported version, selects one, and sends a new first flight; that version becomes the Negotiated Version.
