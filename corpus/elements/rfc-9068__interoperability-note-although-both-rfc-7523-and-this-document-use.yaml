document: rfc-9068
kind: interoperability-note
summary: 'Although both RFC 7523 and this document use JWTs in the OAuth 2.0 context, they serve different purposes: RFC 7523 defines how a JWT Bearer Token is used to request an access token, while RFC 9068 defines how access tokens themselves are encoded in JWT format.'
section: "1"
