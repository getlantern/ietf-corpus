document: rfc-9705
kind: normative-requirement
summary: For Node-ID-based Hello sessions between non-immediate neighbors (PLR and MP), the router MUST set TTL to 255 in all outgoing Node-ID-based Hello messages. The default hello interval MUST be set to the default specified in RFC 8370.
section: 4.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
