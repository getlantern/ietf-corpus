summary: 'The IEEE 802.11 Frame Info field (WTP-to-AC, 32 bits) encodes per-frame radio metadata: RSSI (signed 8-bit, dBm), SNR (signed 8-bit, dB), and Data Rate (unsigned 16-bit, units of 0.1 Mbps; e.g., 55 = 5.5 Mbps).'
