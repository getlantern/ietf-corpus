document: rfc-9756
kind: registry
summary: This document changes the registration procedure for approximately 37 PCEP registries under the 'Path Computation Element Protocol (PCEP) Numbers' registry group from Standards Action to IETF Review, allowing any IETF Stream RFC (not only Standards Track or BCP) to request allocations.
