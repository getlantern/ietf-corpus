document: rfc-7225
kind: protocol-element
summary: The PREFIX64 PCP option (Option Code 129) allows PCP clients to learn the Pref64::/n prefix and suffix used by a PCP-controlled NAT64 device to build IPv4-converted IPv6 addresses. It is valid for MAP and ANNOUNCE opcodes and may appear in both requests and responses.
section: "4.1"
topics:
    - nat
    - pcp
    - v6ops
    - ip
