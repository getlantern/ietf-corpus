document: rfc-9350
kind: normative-requirement
summary: 'Every router configured to participate in a Flex-Algorithm MUST select the winning FAD by: (1) choosing the advertisement(s) with the numerically greatest Priority value, then (2) tie-breaking by the numerically greatest System-ID (IS-IS) or Router-ID (OSPF). The selected FAD is the ''winning FAD''.'
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
