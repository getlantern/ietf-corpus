document: rfc-7530
kind: protocol-element
summary: The fs_locations RECOMMENDED attribute (using fs_locations4 structure) supports multi-server namespaces by specifying alternative or replacement locations for file systems. It is used for referrals (redirecting clients to another server), replication (alternative instances), and migration (non-disruptive transfer).
section: "8.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
