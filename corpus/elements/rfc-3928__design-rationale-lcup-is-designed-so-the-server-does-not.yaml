document: rfc-3928
kind: design-rationale
summary: LCUP is designed so the server does not maintain per-client state; clients are responsible for storing the cookie that captures how up-to-date they are relative to the server. This avoids the need for LCUP-specific update agreements before use and lets the client choose when and from where to pull changes.
section: "1"
topics:
