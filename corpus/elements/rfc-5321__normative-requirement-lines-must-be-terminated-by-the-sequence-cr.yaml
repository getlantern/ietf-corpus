document: rfc-5321
kind: normative-requirement
summary: Lines MUST be terminated by the sequence CR (0x0D) followed immediately by LF (0x0A). Implementations MUST NOT recognize or generate any other character or sequence as a line terminator. Clients MUST NOT transmit bare CR or LF characters except as part of a CRLF sequence.
section: 2.3.8
rfc2119_level: MUST NOT
topics:
    - email
