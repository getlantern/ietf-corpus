document: rfc-2127
kind: interoperability-note
summary: SPID handling applies only to BRI interfaces in North America and is required for DMS-100, NI-1, and NI-2 switch protocols, and optional for 5ESS; up to 8 SPIDs per BRI are possible. The EID (USID + TID, 2 bytes) returned by the switch during registration is used by some switch firmware versions to route incoming SETUP messages to the correct endpoint.
section: 3.4.5
topics:
