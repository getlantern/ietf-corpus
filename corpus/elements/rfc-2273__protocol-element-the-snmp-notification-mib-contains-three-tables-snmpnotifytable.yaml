document: rfc-2273
kind: protocol-element
summary: 'The SNMP-NOTIFICATION-MIB contains three tables: snmpNotifyTable (selects target addresses and notification type Trap vs Inform), a sparse augmentation of snmpTargetAddrTable associating filter profiles with targets, and snmpNotifyFilterTable defining OID subtree-based filters that limit which notifications are sent to which targets.'
