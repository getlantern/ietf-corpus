document: rfc-9582
kind: security-consideration
summary: There is no assumption of confidentiality for ROA data; ROAs are expected to be stored in publicly accessible repositories. There is no explicit authentication—the RPKI PKI provides authorization only, not authentication—and non-repudiation is not intended.
