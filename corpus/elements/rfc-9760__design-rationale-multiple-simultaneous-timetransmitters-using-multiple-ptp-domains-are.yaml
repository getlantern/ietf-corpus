summary: Multiple simultaneous timeTransmitters using multiple PTP domains are RECOMMENDED to provide redundancy against rogue timeTransmitters, network delay asymmetry, and security attacks such as delay attacks, packet interception, and packet manipulation, assuming different paths to each timeTransmitter.
