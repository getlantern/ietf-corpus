document: rfc-3408
kind: normative-requirement
summary: The Mode and SN_ACKed parameters MUST always be attached to every packet delivered to the assisting layer (AL). SN_ACKed indicates the latest RTP SN that has been acknowledged and is used only when Mode value = R-mode.
section: "2.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
