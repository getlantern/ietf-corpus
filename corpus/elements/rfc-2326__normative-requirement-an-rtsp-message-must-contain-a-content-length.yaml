document: rfc-2326
kind: normative-requirement
summary: An RTSP message MUST contain a Content-Length header whenever that message contains a payload. RTSP does not support HTTP/1.1 chunked transfer coding and requires Content-Length.
section: "9"
rfc2119_level: MUST
topics:
