document: rfc-1793
kind: interoperability-note
summary: Unmodified OSPF routers will likely treat DoNotAge LSAs as MaxAge LSAs, potentially causing continual retransmissions. To prevent this, DoNotAge LSAs are only used in areas where all LSAs have the DC-bit set, ensuring backward compatibility.
section: "2.5"
topics:
    - routing
