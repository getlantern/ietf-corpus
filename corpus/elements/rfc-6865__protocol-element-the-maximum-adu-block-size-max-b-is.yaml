document: rfc-6865
kind: protocol-element
summary: The maximum ADU block size max_B is computed as min(max_k, max_rt), where max_k = floor((2^^m - 1) * CR) constrains the block size to allow room for repair symbols, and max_rt = floor(l / d) constrains it based on real-time latency l and per-ADU duration d.
