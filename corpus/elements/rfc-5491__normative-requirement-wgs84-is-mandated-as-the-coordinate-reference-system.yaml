document: rfc-5491
kind: normative-requirement
summary: 'WGS84 is mandated as the coordinate reference system: EPSG 4326 (URN urn:ogc:def:crs:EPSG::4326) for 2D shapes and EPSG 4979 (URN urn:ogc:def:crs:EPSG::4979) for 3D volumes; distances and heights use EPSG 9001 (meters).'
