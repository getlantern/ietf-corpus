document: rfc-2396
kind: normative-requirement
summary: Implementations should not escape or unescape the same string more than once, since unescaping an already-unescaped string may misinterpret a literal percent as an escape prefix, and vice versa.
section: 2.4.2
rfc2119_level: SHOULD NOT
