document: rfc-8986
kind: protocol-element
summary: End.B6.Encaps is the SRv6 instantiation of a Binding SID. It applies the End behavior's SRH processing and then pushes a new IPv6 header with its own SRH containing SR Policy B, setting the outer SA to A and outer DA to the first SID of B.
section: "4.13"
topics:
    - routing
    - ip
