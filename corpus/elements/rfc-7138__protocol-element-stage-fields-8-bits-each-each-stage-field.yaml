document: rfc-7138
kind: protocol-element
summary: 'Stage fields (8 bits each): Each Stage field identifies a Signal Type in the multiplexing hierarchy used to transport the signal. Stage fields MUST be ordered from the lowest-order ODU to the highest-order ODU (ascending toward server layer). The number of Stage fields MUST equal Num of stages.'
section: 4.1.3
topics:
    - routing
