document: rfc-8693
kind: design-rationale
summary: 'The distinction between ''urn:ietf:params:oauth:token-type:access_token'' and ''urn:ietf:params:oauth:token-type:jwt'' is intentional: the former indicates an opaque OAuth access token (which may internally be a JWT), while the latter specifically indicates a JWT is being exchanged, typically in cross-domain use cases.'
section: "3"
topics:
