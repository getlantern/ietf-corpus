document: rfc-1247
kind: protocol-element
summary: AS external link advertisements may specify a forwarding address field. When set, packets for the external destination are routed directly to that address rather than to the advertising AS boundary router, enabling AS boundary routers to function as route servers.
section: "2.2"
topics:
    - routing
