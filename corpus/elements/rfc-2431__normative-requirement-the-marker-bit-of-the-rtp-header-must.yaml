document: rfc-2431
kind: normative-requirement
summary: The Marker bit of the RTP header MUST be set to 1 for the last packet of a frame (or the last fragment of the last scan line if fragmented), and set to 0 on all other packets.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
