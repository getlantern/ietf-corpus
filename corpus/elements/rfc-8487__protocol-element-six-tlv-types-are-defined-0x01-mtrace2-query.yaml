document: rfc-8487
kind: protocol-element
summary: 'Six TLV types are defined: 0x01 (Mtrace2 Query), 0x02 (Mtrace2 Request), 0x03 (Mtrace2 Reply), 0x04 (Mtrace2 Standard Response Block), 0x05 (Mtrace2 Augmented Response Block), and 0x06 (Mtrace2 Extended Query Block). Each Mtrace2 message MUST begin with a Query, Request, or Reply TLV.'
section: "3.2"
topics:
