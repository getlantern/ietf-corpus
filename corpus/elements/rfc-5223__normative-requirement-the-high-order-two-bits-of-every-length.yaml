document: rfc-5223
kind: normative-requirement
summary: The high-order two bits of every length octet in the domain name encoding MUST be zero, and the remaining six bits limit each label to 63 octets or less. The total domain name length is restricted to 255 octets or less.
section: "3"
rfc2119_level: MUST
topics:
    - dns
