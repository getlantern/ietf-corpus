kind: wire-format
summary: 'The PUZZLE notification payload carries: Protocol ID (1 octet, MUST be 0), SPI Size (1 octet, MUST be 0), Notify Message Type (2 octets, value 16434), PRF (2 octets, Transform ID of PRF algorithm to use), and Difficulty (1 octet, ZBC; 0 means Initiator chooses).'
