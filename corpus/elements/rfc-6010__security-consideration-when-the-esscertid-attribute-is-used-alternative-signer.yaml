document: rfc-6010
kind: security-consideration
summary: When the ESSCertId attribute is used, alternative signer certificates are not permitted; only the referenced certificate may be used, potentially causing failure where alternative certificates would succeed. This limits the flexibility of the CCC alternative certification path discovery mechanism.
section: "6"
topics:
