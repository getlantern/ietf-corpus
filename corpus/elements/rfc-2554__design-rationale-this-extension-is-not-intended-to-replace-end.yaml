document: rfc-2554
kind: design-rationale
summary: 'This extension is not intended to replace end-to-end message signature/encryption (S/MIME, PGP). It addresses a different problem: it is useful within a trusted enclave, protects the message envelope rather than body, authenticates submission rather than authorship, and can assure delivery to the next hop when mutual authentication and a security layer are negotiated.'
section: "9"
topics:
