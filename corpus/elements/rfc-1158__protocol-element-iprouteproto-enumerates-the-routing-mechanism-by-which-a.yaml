summary: 'ipRouteProto enumerates the routing mechanism by which a route was learned: local(2), netmgmt(3), icmp(4), egp(5), ggp(6), hello(7), rip(8), is-is(9), es-is(10), ciscoIgrp(11), bbnSpfIgp(12), ospf(13), bgp(14). Setting ipRouteType to invalid(2) logically removes a route entry.'
