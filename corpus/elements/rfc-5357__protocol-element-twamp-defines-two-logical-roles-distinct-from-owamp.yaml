document: rfc-5357
kind: protocol-element
summary: 'TWAMP defines two logical roles distinct from OWAMP: the Session-Reflector (replacing Session-Receiver) which transmits a measurement packet in response to each received test packet without collecting packet-level data, and the Server which manages sessions but cannot return test results. The Fetch-Client role does not exist in TWAMP because the Session-Reflector retains no data to fetch.'
section: "1.2"
topics:
    - measurement
