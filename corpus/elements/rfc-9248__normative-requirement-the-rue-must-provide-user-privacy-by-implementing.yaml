document: rfc-9248
kind: normative-requirement
summary: The RUE MUST provide user privacy by implementing local one-way mute (without signaling) for both audio and video. However, the RUE MUST maintain NAT bindings by periodically sending silence/comfort noise/blank screen media packets on all active media sessions per RFC 6263.
section: "6.7"
rfc2119_level: MUST
topics:
    - privacy
    - realtime
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
