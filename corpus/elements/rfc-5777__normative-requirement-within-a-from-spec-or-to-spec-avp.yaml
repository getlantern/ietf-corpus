document: rfc-5777
kind: normative-requirement
summary: Within a From-Spec or To-Spec AVP, if both IP address and MAC address and port AVPs are present together, the packet MUST match all specifications (AND semantics across address families). If multiple AVPs of the same kind appear, the packet MUST match any one (OR semantics within a kind).
section: 4.1.5
rfc2119_level: MUST
topics:
    - diameter
    - qos
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
