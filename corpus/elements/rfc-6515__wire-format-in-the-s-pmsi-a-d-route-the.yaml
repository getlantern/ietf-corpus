document: rfc-6515
kind: wire-format
summary: In the S-PMSI A-D Route, the 'Originating Router's IP Address' length is computed from the NLRI length minus the 8-octet RD and the variable-length multicast source and group fields (each with their own length subfields). If the computed length is neither 4 nor 16, the attribute MUST be treated as 'incorrect' per RFC 4760 Section 7.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
