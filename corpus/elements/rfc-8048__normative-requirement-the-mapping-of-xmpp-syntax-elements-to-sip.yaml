document: rfc-8048
kind: normative-requirement
summary: 'The mapping of XMPP syntax elements to SIP syntax elements MUST follow Table 1: <presence/> stanza maps to ''Event: presence'', XMPP resource identifier maps to PIDF tuple ''id'', from/to map to From/To headers, type maps to PIDF basic status, xml:lang maps to Content-Language, <priority/> maps to PIDF contact priority, and <status/> maps to PIDF <note/>.'
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
