summary: This document registers conflict cause code 4 ('request-rejected-legitimate-traffic') in the IANA 'DOTS Signal Channel Conflict Cause Codes' registry. This code is returned by the DOTS server to indicate that attack traffic has been classified as legitimate traffic.
