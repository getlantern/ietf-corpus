document: rfc-8163
kind: normative-requirement
summary: When a 16-bit address is required for LOWPAN_IPHC compression (analogous to an IEEE 802.15.4 short address), it MUST be formed by left-padding the 8-bit MS/TP address with a zero octet, yielding 0x00 followed by the MS/TP address.
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
