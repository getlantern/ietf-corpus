document: rfc-4997
kind: protocol-element
summary: The '=:=' operator means 'is encoded by' and represents a two-way mapping between compressed and uncompressed field attributes. During compression the uncompressed attributes are known and compressed attributes are matched; during decompression the direction is reversed — both operations are captured in a single field definition.
section: 3.2.1
