document: rfc-9927
kind: design-rationale
summary: RFC 8928 placed the C-flag at bit position 3 of the EARO flags field but never registered it with IANA. RFC 9685 subsequently defined the P-Field at bits 2 and 3 with proper IANA registration, creating an overlap. To resolve this conflict, RFC 9927 repositions the C-flag to bit 1.
section: "1"
topics:
