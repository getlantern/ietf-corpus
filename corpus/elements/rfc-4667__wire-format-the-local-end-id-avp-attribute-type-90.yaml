document: rfc-4667
kind: wire-format
summary: The Local End ID AVP (Attribute Type 90) encodes the SAII value in a variable-length field. Total length is 6 octets plus the SAII field length. The M bit SHOULD be set to 0; the H bit MAY be 0 or 1. MAY be present in ICRQ.
