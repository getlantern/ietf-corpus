document: rfc-6677
kind: design-rationale
summary: 'EAP channel bindings differ from RFC 5056 channel bindings: RFC 5056 binds layers of a session together, while EAP channel bindings verify the accuracy of information advertised to an EAP peer by an authenticator during EAP execution. The term ''channel bindings'' was independently adopted for both concepts before the conflict was discovered.'
section: "4"
topics:
    - security
