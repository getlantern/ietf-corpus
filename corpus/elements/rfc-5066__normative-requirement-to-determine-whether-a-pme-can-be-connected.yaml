document: rfc-5066
kind: normative-requirement
summary: 'To determine whether a PME can be connected to a PCS, all relevant parameters SHALL be inspected: ifCapStackTable (cross-connect capability), ifStackTable (current connections), and efmCuPAFCapacity (aggregation limit). No single object is sufficient.'
