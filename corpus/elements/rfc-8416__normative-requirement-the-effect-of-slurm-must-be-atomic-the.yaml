document: rfc-8416
kind: normative-requirement
summary: 'The effect of SLURM MUST be atomic: the RP output MUST either be entirely as if no SLURM file were used, or MUST reflect the entire SLURM configuration. Partial application of SLURM (e.g., one of two locally asserted routes for the same prefix) could result in inconsistent route validity states.'
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
