document: rfc-9345
kind: normative-requirement
summary: A server that supports this specification SHALL send a 'delegated_credential' extension in the CertificateRequest when requesting client authentication. If the server receives a delegated credential without having indicated support, it MUST abort with an 'unexpected_message' alert.
section: 4.1.2
rfc2119_level: MUST
topics:
    - tls
