kind: protocol-element
summary: 'interfaceTopNControlTable is an RMON-style control table where a management station creates rows to configure TopN reports: selecting the variable, sample type, normalization, duration, and requested report size. Entries in interfaceTopNTable are static after the report completes and are associated with a control entry.'
