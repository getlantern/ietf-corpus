document: rfc-2622
kind: protocol-element
summary: 'The export attribute syntax mirrors import: ''export: [protocol <p1>] [into <p2>] to <peering-1> [action <action-1>] ... announce <filter>''. Both protocol keywords default to BGP; specifying them enables multi-protocol policies and route injection between protocols such as BGP4 into OSPF or STATIC into BGP4.'
section: "6.2"
topics:
    - routing
    - bgp
