document: rfc-6206
kind: normative-requirement
summary: A protocol using Trickle MUST specify what constitutes a 'consistent' transmission, what constitutes an 'inconsistent' transmission, what external events (if any) reset the Trickle timer, what information a node transmits in Trickle messages, and what actions the protocol takes outside the algorithm when an inconsistency is detected.
section: "5"
rfc2119_level: MUST
topics:
    - realtime
