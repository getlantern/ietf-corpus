document: rfc-8138
kind: normative-requirement
summary: Upon reception, if the first SRH-6LoRH entry matches one of the router's own addresses, the router MUST consume (pop) that entry before forwarding. Consumed entries are permanently removed and cannot be recovered, unlike standard IPv6 Routing Headers.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
