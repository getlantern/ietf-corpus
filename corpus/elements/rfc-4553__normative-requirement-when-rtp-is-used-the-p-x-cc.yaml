document: rfc-4553
kind: normative-requirement
summary: When RTP is used, the P, X, CC, and M fields of the fixed RTP header MUST be set to zero. The RTP sequence number MUST be the same as the sequence number in the SAToP control word. The RTP timestamp clock frequency MUST be an integer multiple of 8 kHz, and all implementations MUST support the 8 kHz clock.
section: 4.3.2
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
