document: rfc-9005
kind: normative-requirement
summary: The capability exchange for the Policy Association Type (PAT) MUST be done before using the Policy Association. The PCEP speaker MUST include the PAT in the ASSOC-Type-List TLV and MUST receive the same from the PCEP peer before using the PAG in PCEP messages.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
