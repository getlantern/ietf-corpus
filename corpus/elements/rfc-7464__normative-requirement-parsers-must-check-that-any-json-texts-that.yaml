document: rfc-7464
kind: normative-requirement
summary: Parsers MUST check that any JSON texts that are a top-level number, or that might be 'true', 'false', or 'null', include JSON whitespace (at least one byte matching the 'ws' ABNF rule from RFC 7159) after that value; otherwise the JSON text may have been truncated.
section: "2.4"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
