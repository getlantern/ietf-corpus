document: rfc-7145
kind: normative-requirement
summary: The iSER layer at the target MUST send the final Login Response PDU in native transport mode (byte stream mode for TCP) to conclude the iSCSI Login Phase, and for iWARP connections the sending of the Login Response PDU and the iSER HelloReply MUST be performed atomically.
section: 5.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
