document: rfc-5985
kind: design-rationale
summary: The LIS SHOULD NOT require Device authentication because requiring it could prevent Devices from accessing emergency location services. The default authorization mechanism is IP return routability — the LIS responds to the source IP address, implicitly authorizing only the holder of that address.
section: "8"
topics:
    - security
