document: rfc-2833
kind: protocol-element
summary: The volume field in the named event payload encodes the tone power level in dBm0 magnitude (sign dropped), ranging 0 to 63. Valid DTMF range is 0–36 dBm0 (must accept); below -55 dBm0 must be rejected. For non-tone events the field is set to zero and ignored.
