document: rfc-3288
kind: protocol-element
summary: 'Request-response exchange pattern: the client sends a BEEP ''MSG'' containing a SOAP envelope; the server sends back a single ''RPY'' message containing a SOAP envelope. SOAP faults are always returned in the ''RPY'' message, never in an ''ERR'' message.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
