document: rfc-1629
kind: normative-requirement
summary: The ID field must be unique within an area for end systems and Level 1 ISs, and unique within the routing domain for Level 2 ISs. The ID field is assumed to be flat; RFC 1526 may optionally be used to assure globally unique IDs.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
