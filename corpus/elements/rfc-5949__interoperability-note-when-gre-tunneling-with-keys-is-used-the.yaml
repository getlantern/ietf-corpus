document: rfc-5949
kind: interoperability-note
summary: When GRE tunneling with keys is used, the NMAG selects the GRE key for downlink packets and the PMAG selects the key for uplink packets; these are exchanged via the GRE Key option (RFC 5845) in the HI and HAck messages respectively.
