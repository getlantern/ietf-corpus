document: rfc-4217
kind: interoperability-note
summary: PBSZ 0 is not strictly valid per the grammar in RFC 2228 Section 8.1, which specifies decimal integers from 1 to (2^32)-1. However, using '0' to mean a streaming (unbuffered) protocol is unambiguous in context and is required by this specification for FTP-TLS.
