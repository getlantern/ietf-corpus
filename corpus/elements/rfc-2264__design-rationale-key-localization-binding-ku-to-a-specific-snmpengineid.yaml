document: rfc-2264
kind: design-rationale
summary: Key localization (binding Ku to a specific snmpEngineID via hashing) ensures that compromise of a user's key at one SNMP engine does not compromise that user's communications with other engines, even though the user may use a single password across the network.
section: "2.6"
topics:
