document: rfc-5343
kind: registry
summary: IANA maintains a registry for SnmpEngineID formats. The fifth octet (format octet) values 0-5 and 128-255 were allocated by RFC 3411; RFC 5343 allocates format value 6 for 'local engine'. New assignments in the 1-127 range require a specification per RFC 5226; values 128-255 are enterprise-specific.
