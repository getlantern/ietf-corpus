document: rfc-2334
kind: protocol-element
summary: The CSA Sequence Number is a signed 32-bit value (range -2^31+1 to 2^31-1; 0x80000000 reserved) assigned by the originator. A strictly larger sequence number means a more recent advertisement; the originator increments it on each cache-entry modification requiring synchronization.
section: B.2.0.2
