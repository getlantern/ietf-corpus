document: rfc-2864
kind: security-consideration
summary: SNMPv1 alone is not a secure environment. It is recommended that implementers use SNMPv3 with the User-based Security Model (RFC 2574) and the View-based Access Control Model (RFC 2575) to control access to MIB objects.
