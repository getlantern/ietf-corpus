document: rfc-3896
kind: protocol-element
summary: The dsx3Channelization object controls whether a DS3/E3 is unchannelized (disabled), channelized into DS1s (enabledDs1, creating 28 ifEntries), or channelized into DS2s (enabledDs2, creating 7 ifEntries). Setting this object causes creation or deletion of subordinate ifTable entries.
