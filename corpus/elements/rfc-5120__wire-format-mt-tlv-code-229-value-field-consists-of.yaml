document: rfc-5120
kind: wire-format
summary: 'MT TLV (code 229) value field consists of 2-byte MT components: bit 15 = OVERLOAD (O), bit 14 = ATTACH (A), bits 13-12 = reserved (R), bits 11-0 = 12-bit MT ID. LENGTH SHOULD be 2 times the number of MT components.'
section: "7.1"
topics:
