document: rfc-6750
kind: normative-requirement
summary: Clients MUST NOT use more than one method to transmit the bearer token in each request. The three permitted methods are the Authorization header, form-encoded body parameter, and URI query parameter.
section: "2"
rfc2119_level: MUST NOT
