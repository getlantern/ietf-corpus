document: rfc-8015
kind: normative-requirement
summary: For the Sum of Burst Durations field (24 bits), if the measured value exceeds 0xFFFFFD, the value 0xFFFFFE MUST be reported to indicate over-range. If the measurement is unavailable, 0xFFFFFF MUST be reported.
section: "3.2"
rfc2119_level: MUST
