kind: protocol-element
summary: Association shared keys are derived by concatenating the endpoint pair shared key with the two key vectors (from RANDOM, CHUNKS, and HMAC-ALGO parameters), ordered by numerical value of the key vectors in network byte order. Padding is removed before concatenation.
