document: rfc-8753
kind: design-rationale
summary: IANA-published IDNA derived property tables are non-normative and exist only for the convenience of implementers; the absence of tables for a given Unicode version does not mean IDNA cannot be used with that version. Confusion over this point has caused significant harm, and the registry title has been changed from 'IDNA Parameters' to 'IDNA Rules and Derived Property Values' to reduce it.
section: "5"
topics:
