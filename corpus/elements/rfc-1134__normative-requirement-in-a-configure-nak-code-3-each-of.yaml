document: rfc-1134
kind: normative-requirement
summary: In a Configure-Nak (Code=3), each of the nak'd Configuration Options MUST be modified to a value acceptable to the sender, and options MUST NOT be reordered. Configure-Nak is used to refuse a specific option value while suggesting an acceptable alternative; Configure-Reject is used to refuse negotiation of an option entirely.
section: 4.3.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
