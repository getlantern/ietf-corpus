document: rfc-6425
kind: protocol-element
summary: MP2MP LSPs can be handled for OAM purposes by treating them as a collection of P2MP trees, with each MP2MP leaf node acting like a P2MP head-end. The remaining leaf nodes then act like egress or bud nodes for that virtual P2MP tree.
