document: rfc-1220
kind: normative-requirement
summary: In the absence of a determination about whether a bridged protocol requires ordered delivery, the transmitting station must act as though all protocols require order preservation when distributing traffic across multiple parallel links.
section: "3.2"
rfc2119_level: MUST
