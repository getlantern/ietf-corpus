document: rfc-3518
kind: normative-requirement
summary: PPP links supporting Bridging MUST negotiate an MRU large enough to support the MAC Types that are later negotiated for Bridging support, because bridged Ethernet frames are larger than the default PPP MRU of 1500 octets.
section: 4.1.1
rfc2119_level: MUST
