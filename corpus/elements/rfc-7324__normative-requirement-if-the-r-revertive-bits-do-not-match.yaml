document: rfc-7324
kind: normative-requirement
summary: If the R (Revertive) bits do not match between protection domain endpoints, the node indicating non-revertive MUST switch to Revertive mode if it is supported. If not supported, the node must behave as specified in Section 4.3.
section: "4.2"
rfc2119_level: MUST
