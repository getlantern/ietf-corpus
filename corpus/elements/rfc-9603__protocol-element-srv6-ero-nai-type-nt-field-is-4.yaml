document: rfc-9603
kind: protocol-element
summary: SRv6-ERO NAI Type (NT) field is 4 bits. NT=0 means NAI is absent; NT=2 means IPv6 node ID; NT=4 means IPv6 adjacency with global IPv6 addresses; NT=6 means link-local IPv6 adjacency with (global IPv6 address, interface ID) tuples.
section: 4.3.1
topics:
    - routing
    - ip
