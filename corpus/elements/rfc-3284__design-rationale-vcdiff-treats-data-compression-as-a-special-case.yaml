document: rfc-3284
kind: design-rationale
summary: Vcdiff treats data compression as a special case of differencing where the source data is empty, unifying Lempel-Ziv'77 string parsing and Tichy block-move differencing into a single framework. This allows a single format to serve both compression-only and delta-compression use cases.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
