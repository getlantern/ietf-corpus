document: rfc-8300
kind: normative-requirement
summary: NSH implementations MUST support MD Types 0x1 and 0x2 (where length is 0x2). Packets with MD Type values not supported MUST be silently dropped. MD Type 0x0 and 0xF SHOULD be silently discarded.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
