document: rfc-9569
kind: normative-requirement
summary: If the resource-id references a POST-mode service requiring input, the ALTO client MUST set the 'input' field to a JSON object with the expected parameters. If 'input' is missing or invalid, the server MUST return the same error response that resource would return for missing or invalid inputs.
section: "6.1"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
