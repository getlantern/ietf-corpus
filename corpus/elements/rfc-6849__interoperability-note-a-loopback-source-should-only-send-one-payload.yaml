document: rfc-6849
kind: interoperability-note
summary: A loopback source SHOULD only send one payload type per loopback RTP session when using direct (rtploopback) mode, because direct loopback does not retain the original RTP header and therefore provides no indication of the original payload type.
section: "7.2"
topics:
    - rtp
    - realtime
