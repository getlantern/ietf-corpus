document: rfc-3371
kind: interoperability-note
summary: Creating a tunnelIfEntry in the IP Tunnel MIB (RFC 2667) with encapsulation method 'l2tp' automatically creates entries in l2tpTunnelConfigTable, l2tpTunnelStatsTable, and l2tpUdpStatsTable. L2TP tunnel creation for non-IP transports is defined in the transport-specific MIB.
