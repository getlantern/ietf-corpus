document: rfc-1034
kind: security-consideration
summary: The resolver must bound the amount of work (packets sent, parallel processes started) so that a request cannot enter an infinite loop or trigger a chain reaction of queries, even if some data is incorrectly configured. This is the highest-priority design constraint for resolver implementors.
section: 5.3.3
topics:
    - dns
    - security
