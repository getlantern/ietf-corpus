document: rfc-5246
kind: design-rationale
summary: AEAD cipher support was added in TLS 1.2 to allow authenticated encryption modes (e.g., AES-GCM, AES-CCM) that provide both confidentiality and integrity in a single primitive, eliminating the separate MAC computation required by stream and CBC modes.
section: "1.2"
topics:
    - tls
    - crypto
