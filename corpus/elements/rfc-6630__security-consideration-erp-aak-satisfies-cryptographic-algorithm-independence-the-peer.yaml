document: rfc-6630
kind: security-consideration
summary: 'ERP/AAK satisfies cryptographic algorithm independence: the peer indicates the chosen algorithm in EAP-Initiate/Re-auth; if unacceptable the server rejects with failure. Strong, fresh per-CAP session keys are always derived on demand, and compromise of one pMSK does not compromise any other pMSK.'
