document: rfc-9366
kind: design-rationale
summary: Experience with more recently defined protocols (notably STIR, per draft-ietf-stir-identity-header-errors-handling) shows it is useful to allow multiple Reason values with the same protocol value. RFC 3326 restricted this to one value per protocol, which proved unnecessarily limiting.
