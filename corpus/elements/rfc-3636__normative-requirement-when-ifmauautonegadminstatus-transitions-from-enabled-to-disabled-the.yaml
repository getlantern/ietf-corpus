document: rfc-3636
kind: normative-requirement
summary: When ifMauAutoNegAdminStatus transitions from enabled to disabled, the agent MUST ensure that the operational MAU type (as reported by ifMauType) correctly transitions to the value specified by ifMauDefaultType, rather than continuing to operate at the auto-negotiation-determined value.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
