document: rfc-2369
kind: design-rationale
summary: Variable substitution in URL command syntax was deliberately excluded because it would immeasurably increase complexity, potentially require redefining the URL standard, and the need for variables in list command syntaxes is lessening. The List-Help field covers the gap for services that do require variable fields.
section: A.5
topics:
