document: rfc-9462
kind: interoperability-note
summary: When DNR (RFC 9463) indications via DHCP or IPv6 RAs are present, they SHOULD take precedence over designations discovered via 'resolver.arpa' for the same resolver; clients may suppress resolver.arpa queries when DNR provides the same resolver. If DNR SvcParams are incomplete, a SVCB query to the ADN can supplement them.
section: "6.5"
topics:
    - dns
    - ip
