document: rfc-7677
kind: normative-requirement
summary: To be secure, either SCRAM-SHA-256-PLUS or SCRAM-SHA-1-PLUS MUST be used over a TLS channel that has had the session hash extension (RFC 7627) negotiated, or session resumption MUST NOT have been used.
section: "4"
rfc2119_level: MUST
topics:
