document: rfc-4631
kind: protocol-element
summary: lmpControlChannelTable configures LMP control channels indexed by lmpCcId (non-zero Unsigned32). Key fields include lmpCcHelloInterval and lmpCcHelloDeadInterval (each with min, max, and post-negotiation read-only variants), lmpCcSetupRole (active/passive), lmpCcAuthentication, lmpCcIsIf, and lmpCcUnderlyingIfIndex.
section: "6.2"
topics:
    - routing
    - mpls
