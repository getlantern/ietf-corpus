document: rfc-3036
kind: normative-requirement
summary: When using ordered label distribution control, an LSR MUST wait until a label from a downstream LSR is received before mapping a FEC and passing corresponding labels to upstream LSRs, unless the LSR is itself the egress for the FEC.
section: 2.6.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
