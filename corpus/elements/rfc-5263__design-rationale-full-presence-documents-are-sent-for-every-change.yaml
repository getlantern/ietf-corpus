document: rfc-5263
kind: design-rationale
summary: Full presence documents are sent for every change even when only a single element changes. Over low-bandwidth, high-latency links this degrades the presence service, motivating a partial notification mechanism that delivers only what has changed.
section: "1"
topics:
    - sip
    - realtime
