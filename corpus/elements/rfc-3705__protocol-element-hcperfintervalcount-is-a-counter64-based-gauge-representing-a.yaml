document: rfc-3705
kind: protocol-element
summary: 'HCPerfIntervalCount is a Counter64-based gauge representing a previous 15-minute measurement interval. At each interval boundary: X(n) is discarded, X(i) takes X(i-1) for n>=i>1, X(1) takes the prior current value Y, and aggregate Z is adjusted if supported.'
