document: rfc-9937
kind: interoperability-note
summary: PRR MAY be used with loss detection algorithms from Reno (RFC 5681), NewReno (RFC 6582), SACK (RFC 6675), FACK, and RACK-TLP (RFC 8985). PRR requires only that the loss detection algorithm communicate how many packets were marked lost and delivered per ACK, with no dependency on the loss detection details.
