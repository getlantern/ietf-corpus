document: rfc-6455
kind: wire-format
summary: 'Masking is performed by XOR: transformed-octet-i = original-octet-i XOR masking-key-octet[i MOD 4], where the masking key is a 32-bit (4-byte) value carried in the frame header. The same algorithm applies for masking and unmasking.'
section: "5.3"
topics:
