document: rfc-1442
kind: design-rationale
summary: When de-OSIfying MIB modules from other organizations, events should be mapped to NOTIFICATION-TYPE sparingly because SNMPv2 emphasizes trap-directed polling; few or no notifications typically need to be defined for any MIB module.
section: "11.3"
