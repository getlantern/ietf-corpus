document: rfc-9073
kind: protocol-element
summary: The PARTICIPANT-TYPE property specifies the role of a participant in an event. Defined values include ACTIVE, INACTIVE, SPONSOR, CONTACT, BOOKING-CONTACT, EMERGENCY-CONTACT, PUBLICITY-CONTACT, PLANNER-CONTACT, PERFORMER, SPEAKER, and IANA-registered extensions. It MUST appear exactly once in a PARTICIPANT component.
section: "6.2"
