document: rfc-2212
kind: design-rationale
summary: No buffer specification is included in the RSpec because the network element is expected to derive required buffer space from the TSpec token bucket and peak rate, the RSpec rate and slack, and the upstream Ctot/Dtot or Csum/Dsum values, combined with internal traffic management knowledge.
