document: rfc-8295
kind: interoperability-note
summary: Clients that support CCC (CMS Content Constraints, RFC 6010) can signal support for the encrypted key package OID via a content type attribute in the CSR; if the client knows a priori that the server supports it, inclusion of the attribute in the CSR is not required.
