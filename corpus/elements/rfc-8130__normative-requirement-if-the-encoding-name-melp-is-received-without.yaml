document: rfc-8130
kind: normative-requirement
summary: If the encoding name 'MELP' is received without a 'bitrate' parameter, the fixed coder bitrate of 2400 MUST be used. The alternate encoding names MELP2400, MELP1200, and MELP600 MUST NOT specify a 'bitrate' parameter.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
