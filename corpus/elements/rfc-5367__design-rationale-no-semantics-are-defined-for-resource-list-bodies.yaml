document: rfc-5367
kind: design-rationale
summary: No semantics are defined for resource-list bodies in subsequent SUBSCRIBE requests because the dialog URI (used for subsequent requests) identifies a resource that does not support recipient-list bodies, as opposed to the public URI used for initial requests.
