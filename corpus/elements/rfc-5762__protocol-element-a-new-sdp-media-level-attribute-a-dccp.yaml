document: rfc-5762
kind: protocol-element
summary: A new SDP media-level attribute 'a=dccp-service-code:' is defined to signal the DCCP service code for an RTP session. The attribute is not subject to the charset attribute and supports hexadecimal, decimal, or ASCII service code encoding.
section: "5.2"
topics:
    - rtp
    - realtime
    - registry
