document: rfc-6155
kind: normative-requirement
summary: All HELD requests that contain Device identity MUST be authenticated by the LIS. For such requests, the requestor MUST support HTTP Digest Authentication (RFC 2617). Unauthenticated requests may be challenged with HTTP 401 or rejected with HTTP 403.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - http
    - realtime
