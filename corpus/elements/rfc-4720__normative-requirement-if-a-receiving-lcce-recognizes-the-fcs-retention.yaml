document: rfc-4720
kind: normative-requirement
summary: If a receiving LCCE recognizes the FCS Retention AVP and complies with the FCS retention request, it MUST include an FCS Retention AVP as acknowledgement in the corresponding ICRP or ICCN message. FCS retention is always bidirectional.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
