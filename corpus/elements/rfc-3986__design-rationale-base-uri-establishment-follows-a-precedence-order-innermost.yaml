document: rfc-3986
kind: design-rationale
summary: 'Base URI establishment follows a precedence order (innermost highest): (1) base URI embedded in content, (2) base URI of the encapsulating entity, (3) URI used to retrieve the representation, (4) application-defined default. A sender of relative references is responsible for ensuring a well-defined base URI exists.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
