document: rfc-3922
kind: design-rationale
summary: 'XMPP and CPIM are distinctly foreign technologies: XMPP is an XML streaming protocol not based on MIME, whereas CPIM uses MIME content-types (''Message/CPIM'' and ''application/pidf+xml'') as common formats. The mapping approach translates XMPP elements/attributes to CPIM headers and MIME formats to achieve interworking via a dedicated gateway.'
section: "2"
topics:
