document: rfc-2981
kind: normative-requirement
summary: Error notifications SHOULD be enabled only for the diagnosis of problems indicated by error counters; if minimizing notification loss is a concern they SHOULD be transmitted as Inform PDUs as described in the SNMP Target MIB or directed to a log.
section: "5"
rfc2119_level: SHOULD
