document: rfc-6122
kind: design-rationale
summary: The XMPP Working Group deliberately split the address format into a separate document (RFC 6122) so as not to delay publication of the main XMPP core specification (RFC 6120) while the community works on replacing Nodeprep/Resourceprep with a modern PRECIS-based approach. This document is explicitly expected to be short-lived.
section: "1.1"
