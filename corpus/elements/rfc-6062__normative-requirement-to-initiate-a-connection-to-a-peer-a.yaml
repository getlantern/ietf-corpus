document: rfc-6062
kind: normative-requirement
summary: To initiate a connection to a peer, a client MUST send a Connect request over the control connection including an XOR-PEER-ADDRESS attribute. Connect requests with the same XOR-PEER-ADDRESS MUST NOT be sent simultaneously.
section: "4.3"
rfc2119_level: MUST
topics:
    - nat
    - tcp
