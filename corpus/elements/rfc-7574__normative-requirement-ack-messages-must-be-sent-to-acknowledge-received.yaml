document: rfc-7574
kind: normative-requirement
summary: ACK messages MUST be sent to acknowledge received chunks when PPSPP runs over an unreliable transport protocol. When LEDBAT is used, an ACK message MUST contain the one-way delay computed from the sender's system time received in the DATA message.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - congestion
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
