document: rfc-8898
kind: interoperability-note
summary: If an access token is a reference token (opaque string), the registrar MAY perform OAuth 2.0 token introspection (RFC 7662) via HTTP POST to obtain metadata and claims. If a structured JWT, the registrar validates locally per RFC 7519.
section: 1.4.1
topics:
    - sip
    - oauth
    - jose
