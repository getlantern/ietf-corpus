summary: 'RFD parameters common to all implementations include: Withdrawal penalty (1,000), Re-Advertisement penalty (0 or 1,000), Attribute Change penalty (500), Suppress Threshold (2,000–3,000), Half-Life (15 min), Reuse Threshold (750), and Max Suppress Time (60 min). Some are operator-tunable; others are fixed.'
