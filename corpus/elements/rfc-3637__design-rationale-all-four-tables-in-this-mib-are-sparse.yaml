document: rfc-3637
kind: design-rationale
summary: All four tables in this MIB are sparse augmentations of SONET-MIB tables, requiring the same ifIndex value in both; this approach avoids duplicating SONET-MIB objects and requires no hardware beyond that mandated by 802.3ae subclause 50.3.11.
