document: rfc-5934
kind: normative-requirement
summary: Trust Anchor Update messages MUST be signed. Upon receipt of a valid, authorized Trust Anchor Update, the trust anchor store MUST perform all specified updates and return a Trust Anchor Update Confirm message. Support for Trust Anchor Update messages is REQUIRED; support for all other message formats is RECOMMENDED.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - pkix
