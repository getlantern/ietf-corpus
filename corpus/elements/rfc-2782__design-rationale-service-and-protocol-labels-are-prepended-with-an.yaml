document: rfc-2782
kind: design-rationale
summary: Service and protocol labels are prepended with an underscore to reduce the probability of accidental collision with existing DNS labels used for unrelated purposes. This change from RFC 2052 is the primary functional modification.
section: Changes from RFC 2052
topics:
    - dns
