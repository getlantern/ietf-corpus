document: rfc-5003
kind: protocol-element
summary: The Global ID field in AII Type 2 is a 4-octet field containing a value unique to the provider, typically derived from the provider's 2-octet or 4-octet Autonomous System Number (ASN). Use of a globally unique ASN ensures global uniqueness of the AII.
section: "3.2"
topics:
