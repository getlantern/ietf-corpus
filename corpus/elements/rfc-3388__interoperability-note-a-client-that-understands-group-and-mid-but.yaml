document: rfc-3388
kind: interoperability-note
summary: A client that understands 'group' and 'mid' but does not wish to use them in a session MAY advertise capability by including empty 'a=group' lines (one per understood semantics). A server receiving such an offer SHOULD echo empty 'a=group' lines for the semantics it supports.
section: "8.3"
topics:
    - realtime
    - sip
