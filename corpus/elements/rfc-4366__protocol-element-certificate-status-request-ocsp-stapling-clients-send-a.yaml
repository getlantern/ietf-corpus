document: rfc-4366
kind: protocol-element
summary: 'Certificate Status Request (OCSP stapling): clients send a status_request extension containing a CertificateStatusRequest with CertificateStatusType ocsp(1) and an OCSPStatusRequest carrying a responder_id_list and DER-encoded request_extensions. A zero-length responder_id_list means responders are implicitly known to the server.'
section: "3.6"
topics:
