document: rfc-9487
kind: protocol-element
summary: 'srhSegmentIPv6BasicList (ElementID 496) is a variable-length IPFIX IE holding an ordered basicList (RFC 6313) of zero or more 128-bit IPv6 addresses representing the SRv6 Segment List. Per RFC 8754, the list is encoded from last segment to first: Segment List[0] is the last segment of the SR Policy.'
section: 5.1.5
topics:
    - ip
    - routing
