document: rfc-1567
kind: interoperability-note
summary: The DSA-MIB is designed for use in conjunction with the APPLICATION-MIB (RFC 1565) and uses applIndex as its primary index, binding DSA-specific statistics to the application-level network service entry. Host resource monitoring is delegated to the Host Resources MIB (RFC 1514).
