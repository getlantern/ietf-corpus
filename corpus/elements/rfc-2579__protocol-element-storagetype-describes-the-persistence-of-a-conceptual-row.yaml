document: rfc-2579
kind: protocol-element
summary: 'StorageType describes the persistence of a conceptual row: other(1), volatile(2, lost on reboot), nonVolatile(3, backed by stable storage), permanent(4, can be changed but not deleted), readOnly(5, can be neither changed nor deleted). A permanent(4) or readOnly(5) value cannot be written; the value cannot be modified to permanent(4) or readOnly(5) from the other three types.'
section: "2"
