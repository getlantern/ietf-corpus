document: rfc-8551
kind: protocol-element
summary: The AuthEnvelopedData CMS content type (new in S/MIME v4.0, smime-type 'authEnveloped-data') provides both data confidentiality and message integrity but does not provide authentication or non-repudiation. It requires a public key for each intended recipient to distribute the symmetric CEK.
