document: rfc-1271
kind: interoperability-note
summary: When multiple management stations simultaneously attempt to create the same conceptual row, only the first will succeed; the others receive an error. Each control entry contains an EntryStatus object whose creation semantics serialize concurrent row-addition attempts.
