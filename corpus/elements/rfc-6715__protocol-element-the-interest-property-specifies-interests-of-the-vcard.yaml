document: rfc-6715
kind: protocol-element
summary: The INTEREST property specifies interests of the vCard subject. It accepts a single text value, supports cardinality *, and takes optional LEVEL (high/medium/low) and INDEX parameters. An interest is a topic one finds interesting but does not necessarily actively pursue, distinguishing it from HOBBY.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
