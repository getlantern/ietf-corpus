document: rfc-6290
kind: normative-requirement
summary: When a QCD token becomes invalid (e.g., due to IP address change in the Section 5.2 method), the token maker MUST send the new token in a protected message under the existing IKE SA. A token taker MUST accept such gratuitous QCD_TOKEN notifications in protected exchanges.
section: "4.4"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
