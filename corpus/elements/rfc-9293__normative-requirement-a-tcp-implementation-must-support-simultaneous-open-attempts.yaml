document: rfc-9293
kind: normative-requirement
summary: A TCP implementation MUST support simultaneous open attempts (MUST-10) and MUST track whether SYN-RECEIVED was reached via a passive or active OPEN (MUST-11), since this determines whether a received RST causes a return to LISTEN or an abort to CLOSED.
section: "3.5"
rfc2119_level: MUST
topics:
    - tcp
