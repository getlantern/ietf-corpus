document: rfc-3006
kind: protocol-element
summary: 'When computing a compressed TSpec from (r, b, p, M, m) with explicit compression factor f percent and bytes-saved N: r''=r*f/100, b''=b*f/100, p''=p (unchanged), M''=M-N, m''=m-N. These adjusted values are used as input to admission control and resource allocation in place of the sender TSpec.'
section: "3"
topics:
