document: rfc-6530
kind: security-consideration
summary: 'New UTF-8 header and message formats may create filter-evasion attacks: a malformed or ''invalid'' internationalized message may be interpreted differently by a spam/security filter than by the recipient''s MUA, allowing content to bypass filtering. Analogous attacks already exist for invalid MIME syntax, HTML markup, and image encodings.'
section: "13"
topics:
    - email
    - security
