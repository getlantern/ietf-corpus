summary: This document assigns values 2-8 in the 'Mobile Node Identifier Option Subtypes' registry (IPv6 Address=2, IMSI=3, P-TMSI=4, EUI-48=5, EUI-64=6, GUTI=7, DUID=8), reserves 9-15, and leaves 16-255 unassigned. The registration procedure is Standards Action.
