document: rfc-4409
kind: design-rationale
summary: Message modification by the MSA should be limited to remedies for specific problems with clear solutions. Indiscriminately appending a domain to an address that lacks one typically results in more broken addresses, since the unqualified local part must first be verified as valid in the target domain.
section: "8"
topics:
