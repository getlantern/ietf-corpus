document: rfc-2456
kind: protocol-element
summary: The APPN-TRAP-MIB module defines a set of SNMP notifications (traps/informs) for devices with APPN and DLUR capabilities, covering local TG operational state, CP-CP session state, port state, link station state, DLUR-DLUS session state, and final ISR accounting statistics. It is rooted at appnMIB 0 and presupposes the APPN MIB (RFC 2455).
section: "3.1"
topics:
    - snmp
    - registry
