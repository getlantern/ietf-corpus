document: rfc-4950
kind: security-consideration
summary: Network operators may wish to selectively provide MPLS extension information in ICMP messages based on policy, for example only including MPLS extensions in messages destined to network management address blocks. An implementation could gate inclusion on the destination address of the ICMP message, a global configuration option, or the depth of the incoming label stack.
section: "6"
topics:
    - mpls
    - security
    - ip
