document: rfc-9370
kind: security-consideration
summary: Encryption, PRF, and integrity transform types (1–3) are not susceptible to Shor's algorithm but are susceptible to Grover's attack. Per NIST guidance, AES with a minimum 128-bit key remains acceptable for current applications, though longer keys should be considered for data requiring long-term secrecy.
