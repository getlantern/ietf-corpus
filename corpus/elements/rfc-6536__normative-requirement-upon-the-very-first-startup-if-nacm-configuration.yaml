document: rfc-6536
kind: normative-requirement
summary: Upon the very first startup, if NACM configuration is absent, a server MUST NOT allow any write access to any session role except a recovery session. Access control is not enforced for server-initiated access during bootup.
section: 3.4.1
rfc2119_level: MUST NOT
topics:
    - netconf
    - security
