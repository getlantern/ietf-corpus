document: rfc-5650
kind: design-rationale
summary: The xTU-R status (xdsl2LineStatusXtur) is obtained via the Embedded Operations Channel (EOC), so its information may be unavailable when the xTU-R is unreachable during a line error condition. Therefore, not all error conditions may always be included in the xTU-R current status, and implementations must account for this gap.
section: "2.9"
topics:
    - snmp
