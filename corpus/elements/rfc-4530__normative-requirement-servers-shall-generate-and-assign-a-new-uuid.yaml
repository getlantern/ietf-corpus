document: rfc-4530
kind: normative-requirement
summary: Servers SHALL generate and assign a new UUID to each entry upon its addition to the directory and provide that UUID as the value of the 'entryUUID' operational attribute. An entry's UUID is immutable.
section: "2.4"
rfc2119_level: SHALL
topics:
