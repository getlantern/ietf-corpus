document: rfc-9353
kind: normative-requirement
summary: It is RECOMMENDED that PCEP be secured using TLS per RFC 8253, as TCP MD5 has been obsoleted by TCP-AO due to security concerns and TCP-AO is not widely implemented. An implementation SHOULD offer at least one of the two security capabilities defined in this document.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - tls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
