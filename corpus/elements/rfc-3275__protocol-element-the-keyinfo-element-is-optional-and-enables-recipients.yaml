document: rfc-3275
kind: protocol-element
summary: The KeyInfo element is optional and enables recipients to obtain the key needed to validate the signature. It may contain KeyName, KeyValue, RetrievalMethod, X509Data, PGPData, SPKIData, MgmtData, or extension elements. Compliant implementations MUST implement KeyValue and SHOULD implement RetrievalMethod.
section: "4.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
