document: rfc-2178
kind: normative-requirement
summary: A router MUST NOT originate a new instance of an LSA more often than once every MinLSArrival seconds. When a self-originated LSA is received via flooding with a higher sequence number, the router must re-originate immediately to reclaim it.
section: "13.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
