document: rfc-6940
kind: interoperability-note
summary: TLS over TCP and DTLS over UDP are the only currently defined mandatory overlay link protocols. The specification defines extension points for future overlay link protocols (HIP, ICE-TCP, message-oriented transports, tunneled transports) via the IANA Overlay Link Protocols registry and the overlay Configuration Document.
section: 6.6.1
topics:
