document: rfc-4303
kind: security-consideration
summary: Using encryption without a strong integrity mechanism (encryption-only ESP) generally provides defense only against passive attackers; it may be insecure against active attacks. An underlying integrity service applied before encryption also does not necessarily protect confidentiality against active attackers.
section: "1"
topics:
    - ipsec
    - security
    - crypto
