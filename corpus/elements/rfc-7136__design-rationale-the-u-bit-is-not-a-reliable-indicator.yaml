document: rfc-7136
kind: design-rationale
summary: The 'u' bit is not a reliable indicator of universal uniqueness because MAC addresses with universal scope are sometimes assigned to multiple devices by manufacturers, and the same virtual MAC address is widely reused in virtual machine environments. Once mapped to an IID with 'u'=1, such identifiers purport uniqueness but are actually ambiguous.
section: "2"
topics:
