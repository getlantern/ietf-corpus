document: rfc-9144
kind: design-rationale
summary: Origin metadata is omitted by default in comparison output to reduce noise, but can be included via 'report-origin' to help explain the cause of a difference — for example, when a node in <intended> has origin 'system' in <operational>, indicating it was set by the device rather than the client.
section: "3"
topics:
