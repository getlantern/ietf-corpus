document: rfc-2746
kind: protocol-element
summary: A 'hard pipe' tunnel uses a fixed tunnel reservation that is never adjusted regardless of changing end-to-end sessions; a 'soft pipe' tunnel dynamically adjusts the tunnel reservation up or down as end-to-end sessions arrive or depart, optionally using hysteresis.
