document: rfc-5389
kind: normative-requirement
summary: In the short-term credential mechanism, a request or indication MUST include both USERNAME and MESSAGE-INTEGRITY. If either is absent in a request, the server MUST reject it with error 400 (Bad Request); if absent in an indication, the agent MUST silently discard it.
section: 10.1.1
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
