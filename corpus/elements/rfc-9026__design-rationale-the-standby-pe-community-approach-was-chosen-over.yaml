document: rfc-9026
kind: design-rationale
summary: The Standby PE community approach was chosen over advertising a single C-multicast join to both primary and secondary PEs because it allows the protection level (cold/warm/hot standby) to be changed by reconfiguring only the secondary Upstream PE, without touching any downstream PEs.
