document: rfc-1973
kind: wire-format
summary: The PPP-in-Frame-Relay frame begins with a Flag (0x7e), followed by a 2-octet Q.922 Address field, a 1-octet Control field, NLPID (0xcf), and then the PPP Protocol field followed by PPP Information and Padding. Fields are transmitted left to right.
