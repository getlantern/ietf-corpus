document: rfc-4873
kind: interoperability-note
summary: In PSC (packet switch capable) environments, it may be desirable to construct the Sender_Template and Session objects for segment recovery LSPs per RFC 4090 conventions. These extensions are intended to be compatible with fast reroute and in some cases used together with it.
