document: rfc-2115
kind: protocol-element
summary: frCircuitCommittedBurst (Bc) is the maximum data in bits the network agrees to transfer under normal conditions during the measurement interval. frCircuitExcessBurst (Be) is the maximum uncommitted data bits the network will attempt to deliver; defaults to ifSpeed if not configured. frCircuitThroughput determines the measurement interval T = Bc/throughput, or T = Be/ifSpeed when both Bc and throughput are zero.
section: "6.2"
topics:
    - qos
