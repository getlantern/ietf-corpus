document: rfc-2037
kind: interoperability-note
summary: Multiple agents within the same managed system are free to implement the Entity MIB independently; multiple instances are not required to be equivalent or consistent. An NMS may attempt to align instances by examining table columns, but vendor-specific identifiers and index values are likely to differ across agents.
section: "3.8"
topics:
    - snmp
