document: rfc-792
kind: normative-requirement
summary: On receipt of a Source Quench message, the source host should cut back the rate at which it is sending traffic to the specified destination until it no longer receives Source Quench messages, then may gradually increase the rate again.
section: Source Quench Message
rfc2119_level: SHOULD
topics:
    - ip
    - congestion
