document: rfc-7542
kind: security-consideration
summary: Any attacker capable of observing traffic containing the NAI can track the user and correlate activity across time and across multiple protocols. Authentication credentials SHOULD be transported over channels permitting private communications, or multiple identifiers SHOULD be used to make user tracking impossible.
section: "4.1"
topics:
    - security
    - privacy
