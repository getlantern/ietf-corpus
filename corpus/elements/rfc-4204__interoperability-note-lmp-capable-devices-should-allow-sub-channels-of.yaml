document: rfc-4204
kind: interoperability-note
summary: LMP-capable devices SHOULD allow sub-channels of a component link to be locally configured as logical data links to ensure interworking between data links with different multiplexing capabilities. For example, a cross-connect with OC-192 interfaces connected through a 4:1 SONET MUX should configure each OC-48 sub-channel as a separate data link.
section: "1"
topics:
    - routing
