document: rfc-2658
kind: normative-requirement
summary: Once transmission begins with a given SSRC and interleave value, senders MUST NOT increase the interleave value; a new SSRC MUST be used if an increase is needed. The interleave value MAY be decreased only between interleave groups and once decreased MUST NOT be increased.
section: "3.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
