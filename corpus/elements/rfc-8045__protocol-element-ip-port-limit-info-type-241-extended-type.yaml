document: rfc-8045
kind: protocol-element
summary: IP-Port-Limit-Info (Type 241, Extended-Type 5) limits the maximum number of IP source transport ports for a user, optionally scoped to a specific IP transport protocol (IP-Port-Type TLV) and external IPv4 address (IP-Port-Ext-IPv4-Addr TLV). It MAY appear in Access-Accept, Access-Request, CoA-Request, and Accounting-Request packets.
section: 3.1.1
topics:
    - radius
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
