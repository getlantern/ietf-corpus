document: rfc-5323
kind: protocol-element
summary: The DAV:score element is added to the DAV:response element to indicate relevance scoring for DAV:contains results. Its value is an integer from 0 to 10000 inclusive, with higher values indicating higher relevance. Scores are only meaningful within a single query result and should not be compared across different queries.
section: 5.16.1
topics:
    - http
