document: rfc-5454
kind: design-rationale
summary: DSMIPv4 keeps Mobile IPv4 as an IPv4-only signaling protocol while enabling it to set up IPv6 tunnels over IPv4. This design allows dual-stack nodes to use a single mobility protocol for both address families and serves as a controlled IPv6-over-IPv4 transition mechanism without requiring all network nodes to support IPv6.
section: "1"
topics:
