document: rfc-9112
kind: normative-requirement
summary: All HTTP data over TLS MUST be sent as TLS "application data". Clients MUST send a closure alert before closing the connection. Servers MUST attempt to initiate an exchange of closure alerts before closing, to avoid the TCP reset problem.
section: "9.7"
rfc2119_level: MUST
topics:
    - http
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
