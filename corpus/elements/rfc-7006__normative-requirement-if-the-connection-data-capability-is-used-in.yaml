document: rfc-7006
kind: normative-requirement
summary: If the connection data capability is used in a selected potential configuration chosen by the answerer, the configuration MUST by default use the port number from the actual offer 'm=' line, unless the network type is 'PSTN' in which case port 9 MUST be assumed.
section: 3.3.2
rfc2119_level: MUST
topics:
    - realtime
    - sip
