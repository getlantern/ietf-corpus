document: rfc-5018
kind: normative-requirement
summary: At TLS connection establishment, the floor control server MUST present its certificate to the client, and the certificate MUST either be directly signed by one of the other party's trust anchors or validated via a certification path terminating at a trust anchor.
section: "5.1"
rfc2119_level: MUST
