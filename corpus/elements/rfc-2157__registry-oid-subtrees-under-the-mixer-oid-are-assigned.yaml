summary: 'OID subtrees under the mixer OID are assigned: mixer-bp-data { mixer 2 1 } for Extended Body Part data OIDs and mixer-bp-parameter { mixer 2 2 } for parameter OIDs. Specific assignments include id-mime-bp-data (.1), id-mime-bp-parameters (.2), id-mime-postscript-body (.3), id-mime-jpeg-body (.4), id-mime-gif-body (.5 under data, as FTAM ref), and heading extensions id-hex-multipart-message-v2.'
