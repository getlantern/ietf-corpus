document: rfc-8024
kind: normative-requirement
summary: When a fault is detected on the working PW (e.g., via VCCV BFD), the working OLT SHOULD turn off its associated PON interface and then send an ICCP message with PON State TLV with Local PON Port State set to notify the protection OLT.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - mpls
