document: rfc-7323
kind: normative-requirement
summary: Implementations MUST handle a shrinking (retracted) window as specified in RFC 1122 Section 4.2.2.16. The receiver MUST honor as in-window any segment that would have been in-window for any ACK previously sent.
section: "2.4"
rfc2119_level: MUST
topics:
    - tcp
