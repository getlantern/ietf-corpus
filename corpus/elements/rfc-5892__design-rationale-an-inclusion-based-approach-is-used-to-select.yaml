document: rfc-5892
kind: design-rationale
summary: An inclusion-based approach is used to select permitted code points for IDNs, rather than the exclusion-based approach of Stringprep/Nameprep. This reflects IAB consensus that identifying permitted characters is preferable to excluding a small number from the total Unicode set.
