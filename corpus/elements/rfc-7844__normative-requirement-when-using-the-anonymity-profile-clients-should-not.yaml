document: rfc-7844
kind: normative-requirement
summary: When using the anonymity profile, clients SHOULD NOT use the Requested IP Address option in DHCPDISCOVER messages, to avoid disclosing an IP address used at a previous location or with a different link-layer address.
section: "3.3"
rfc2119_level: SHOULD NOT
