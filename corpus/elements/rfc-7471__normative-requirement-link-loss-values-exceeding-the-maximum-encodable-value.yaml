document: rfc-7471
kind: normative-requirement
summary: Link loss values exceeding the maximum encodable value of 50.331642% SHOULD be encoded as the maximum value (2^24 - 2), since high-speed links with over 50% loss are considered unusable and precision matters more at high speeds.
section: 4.4.5
rfc2119_level: SHOULD
topics:
    - routing
    - measurement
