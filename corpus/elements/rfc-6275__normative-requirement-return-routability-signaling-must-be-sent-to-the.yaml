document: rfc-6275
kind: normative-requirement
summary: Return Routability signaling MUST be sent to the correspondent node's home address (not its care-of address) if the correspondent node is mobile. If Return Routability signaling times out after MAX_RO_FAILURE attempts, the mobile node MUST revert to sending packets through its home agent.
section: 5.2.9
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
