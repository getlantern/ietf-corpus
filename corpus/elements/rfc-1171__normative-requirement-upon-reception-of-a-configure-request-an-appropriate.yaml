document: rfc-1171
kind: normative-requirement
summary: Upon reception of a Configure-Request, an appropriate reply MUST be transmitted. A LCP implementation wishing to open a connection MUST transmit a Configure-Request packet with Code=1 and any desired changes to default Configuration Options.
section: 4.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
