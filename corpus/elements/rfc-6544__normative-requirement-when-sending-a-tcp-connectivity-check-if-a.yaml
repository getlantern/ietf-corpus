document: rfc-6544
kind: normative-requirement
summary: When sending a TCP connectivity check, if a connection does not yet exist the agent opens one. Once established, the agent MUST utilize the RFC 4571 shim for the duration the connection remains open; STUN Binding requests and responses are sent on top of this shim with the RFC 4571 length field preceding each STUN message.
section: "7.1"
rfc2119_level: MUST
topics:
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
