document: rfc-2728
kind: protocol-element
summary: A 32-bit CRC using the MPEG-2 transport stream generator polynomial (ISO/IEC 13818-1) is appended to every schema 0x00 packet, covering schema byte, compression key, headers, and payload. Initial CRC state is 0xFFFFFFFF; this differs from the Ethernet CRC algorithm.
section: "3.5"
