document: rfc-4361
kind: normative-requirement
summary: DHCPv4 clients conforming to this specification MUST use stable DHCPv4 node identifiers in the dhcp-client-identifier option and MUST NOT use client identifiers based solely on layer-two addresses hard-wired to the device.
