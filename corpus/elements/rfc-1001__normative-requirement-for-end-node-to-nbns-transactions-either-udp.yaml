document: rfc-1001
kind: normative-requirement
summary: For end-node to NBNS transactions, either UDP or TCP may be used as transport. If a UDP response is truncated, the NBNS sets a truncation flag; the end-node may then open a TCP connection and repeat the request to receive the complete, untruncated response.
section: 15.1.5.1
rfc2119_level: MAY
topics:
    - udp
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
