document: rfc-2249
kind: interoperability-note
summary: 'This MIB obsoletes RFC 1566. Changes include: reworded DESCRIPTION fields; new mtaGroupDescription and mtaGroupURL fields; separation of last outbound attempt from last successful outbound; conversion operation counters; explicit group hierarchy; per-group error table using RFC 1893 status codes; oldest-message-ID field; and per-MTA and per-group loop counters.'
section: "7"
