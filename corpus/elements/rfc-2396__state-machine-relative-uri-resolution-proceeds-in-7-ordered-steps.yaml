document: rfc-2396
kind: state-machine
summary: 'Relative URI resolution proceeds in 7 ordered steps: (1) parse reference into components; (2) if all components empty/undefined, reference is current document; (3) if scheme is defined, use as absolute URI; (4) inherit authority from base if undefined; (5) if path starts with ''/'', use as absolute path; (6) merge relative path with base path using dot-segment removal algorithm; (7) recombine components into absolute URI.'
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
