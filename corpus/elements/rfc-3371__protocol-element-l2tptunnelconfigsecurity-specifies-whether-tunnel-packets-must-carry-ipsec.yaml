document: rfc-3371
kind: protocol-element
summary: l2tpTunnelConfigSecurity specifies whether tunnel packets must carry IPsec headers (ipsec(3)), covering both control and session packets. The type of IPsec headers (AH, ESP, etc.) is outside scope. Cannot be modified when the tunnel is connecting or connected.
section: "4.0"
topics:
    - snmp
    - vpn
    - ipsec
    - security
