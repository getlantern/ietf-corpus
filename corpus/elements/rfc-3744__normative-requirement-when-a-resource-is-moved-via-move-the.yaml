document: rfc-3744
kind: normative-requirement
summary: When a resource is moved via MOVE, the non-inherited and non-protected ACEs in the DAV:acl property MUST NOT be modified, or the MOVE request MUST fail. Handling of inherited and protected ACEs is intentionally left to implementations.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
