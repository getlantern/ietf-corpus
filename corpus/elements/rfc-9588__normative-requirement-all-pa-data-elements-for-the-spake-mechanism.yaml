document: rfc-9588
kind: normative-requirement
summary: All PA-DATA elements for the SPAKE mechanism MUST use padata-type PA-SPAKE (value 151), and the padata-value MUST be empty or contain a DER encoding of the ASN.1 type PA-SPAKE.
