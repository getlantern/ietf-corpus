document: rfc-7356
kind: security-consideration
summary: New FS PDUs are subject to the same security concerns as standard LSP/CSNP/PSNP PDUs addressed in RFC 5304 and RFC 5310. Authentication TLVs MAY be included in FS PDUs using scope-specific or shared authentication configuration. The additional PDU types increase router processing load, expanding the attack surface for denial-of-service attacks.
section: "13"
topics:
    - routing
    - security
