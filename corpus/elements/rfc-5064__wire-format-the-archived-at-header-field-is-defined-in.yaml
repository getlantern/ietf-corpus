document: rfc-5064
kind: wire-format
summary: 'The Archived-At header field is defined in ABNF as: `archived-at = "Archived-At:" [FWS] "<" folded-URI ">" CRLF` and `folded-URI = <URI, but free insertion of FWS permitted>`. To convert a folded-URI to a URI, apply RFC 2822 unfolding rules then delete remaining un-encoded SP characters.'
section: "2.1"
topics:
    - email
