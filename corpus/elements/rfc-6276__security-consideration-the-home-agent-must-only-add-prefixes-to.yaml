document: rfc-6276
kind: security-consideration
summary: The home agent MUST only add prefixes to a mobile router's Binding Cache Entry if the mobile router has a valid DHCPv6 Prefix Delegation lease for those prefixes, preventing a mobile router from claiming mobile network prefixes belonging to another mobile router.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - mobility
    - ip
