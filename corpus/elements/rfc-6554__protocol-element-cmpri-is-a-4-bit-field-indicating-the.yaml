document: rfc-6554
kind: protocol-element
summary: CmprI is a 4-bit field indicating the number of prefix octets elided from each intermediate segment (Addresses[1..n-1]). CmprE is a 4-bit field indicating the number of prefix octets elided from the last segment (Address[n]). The elided prefix is taken from the IPv6 Destination Address of the packet carrying the SRH.
