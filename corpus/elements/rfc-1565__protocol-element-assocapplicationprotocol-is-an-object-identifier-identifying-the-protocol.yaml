document: rfc-1565
kind: protocol-element
summary: assocApplicationProtocol is an OBJECT IDENTIFIER identifying the protocol in use. For OSI applications it is the Application Context OID. For Internet applications, the IANA registry is used; if unregistered, the forms {applTCPProtoID port} or {applUDPProtoID port} are used instead.
