document: rfc-5190
kind: security-consideration
summary: Unauthorized access to MIDCOM service configuration (midcomConfigFirewallTable, midcomCapabilities subtree) could allow an attacker to alter firewall rule priorities or disable capabilities. Write access to configuration objects SHOULD be restricted more strictly than write access to transaction objects, and typically should not be granted to MIDCOM clients.
section: "10.4"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
