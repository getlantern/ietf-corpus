document: rfc-7630
kind: protocol-element
summary: 'Outgoing message authentication: (1) set msgAuthenticationParameters to N zero octets, (2) compute HMAC over wholeMsg using authKey of M octets with hash function H per RFC 6234, (3) take first N octets as MAC, (4) replace msgAuthenticationParameters with MAC, (5) return authenticatedWholeMsg with success status.'
section: 4.2.1
