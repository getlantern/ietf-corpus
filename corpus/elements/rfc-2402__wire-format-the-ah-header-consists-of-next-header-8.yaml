document: rfc-2402
kind: wire-format
summary: 'The AH header consists of: Next Header (8-bit), Payload Len (8-bit, length in 32-bit words minus 2), Reserved (16-bit, zero), SPI (32-bit), Sequence Number (32-bit), and Authentication Data (variable-length, multiple of 32 bits). The IP protocol number immediately preceding AH is 51.'
