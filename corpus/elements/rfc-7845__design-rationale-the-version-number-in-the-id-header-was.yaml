document: rfc-7845
kind: design-rationale
summary: The version number in the ID header was split into major/minor sub-fields (upper/lower four bits) to allow backwards-compatible extensions without requiring a new codec identifier. The initial version '1' was chosen to prevent implementations from treating the byte as a null terminator for 'OpusHead'.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
