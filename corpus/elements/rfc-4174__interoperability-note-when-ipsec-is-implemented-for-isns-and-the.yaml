document: rfc-4174
kind: interoperability-note
summary: When IPsec is implemented for iSNS and the risk of false discovery information is a significant concern, IPsec SAs SHOULD also be used for iSNS traffic itself — relying solely on IP Storage protocols to detect false discovery information is less robust.
section: "3"
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
