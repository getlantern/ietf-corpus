document: rfc-9494
kind: normative-requirement
summary: Once the LLGR period begins, the helper MUST immediately remove all stale routes for an address family if the F bit is not set in the newly received LLGR Capability, if the AFI/SAFI is absent from the newly received LLGR Capability, or if no LLGR/GR Capability is received at all in the re-established session.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
