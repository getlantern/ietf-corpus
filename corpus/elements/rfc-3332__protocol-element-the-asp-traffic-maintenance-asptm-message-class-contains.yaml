document: rfc-3332
kind: protocol-element
summary: 'The ASP Traffic Maintenance (ASPTM) message class contains: ASP Active (ASPAC, type 1), ASP Inactive (ASPIA, type 2), and their acknowledgements (ASPAC ACK, ASPIA ACK). These control which ASPs are actively processing traffic for a given Routing Context within an Application Server.'
