document: rfc-7639
kind: design-rationale
summary: Exposing protocol information at the HTTP layer via the ALPN header allows a proxy to deny CONNECT requests earlier and with better error reporting (e.g., a 403 status code), rather than requiring packet inspection after the tunnel is established.
section: "2.3"
topics:
    - http
