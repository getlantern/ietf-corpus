document: rfc-3931
kind: normative-requirement
summary: Each subsequent retransmission of a control message MUST employ an exponential backoff interval (e.g., 1, 2, 4, 8 seconds). If no peer response is detected after several retransmissions (default 10, but MUST be configurable), the control connection and all associated sessions MUST be cleared.
section: "4.2"
rfc2119_level: MUST
topics:
    - vpn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
