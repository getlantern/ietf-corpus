document: rfc-7208
kind: security-consideration
summary: Processing limits on DNS lookups (10-term limit, 2-void-lookup limit, 20-second timeout) are essential to prevent denial-of-service attacks via deeply nested 'include' chains or adversarially crafted SPF records that trigger excessive DNS queries.
section: "11.1"
topics:
