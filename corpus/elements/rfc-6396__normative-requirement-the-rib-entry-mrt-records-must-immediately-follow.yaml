document: rfc-6396
kind: normative-requirement
summary: The RIB entry MRT records MUST immediately follow the PEER_INDEX_TABLE MRT record. The View Name encoding MUST follow the UTF-8 transformation format (RFC 3629), and when no View Name is present, the View Name Length MUST be set to 0.
section: 4.3.1
rfc2119_level: MUST
