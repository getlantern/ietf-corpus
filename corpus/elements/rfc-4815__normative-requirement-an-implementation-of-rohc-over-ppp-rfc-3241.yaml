document: rfc-4815
kind: normative-requirement
summary: An implementation of ROHC-over-PPP (RFC 3241) MUST ensure the same profile set is negotiated for both IPv4 (IPCP) and IPv6 (IPV6CP). The PROFILES sub-option cannot use logical union across IPCP/IPV6CP negotiations, as this would produce an ambiguous profile set.
section: "10"
rfc2119_level: MUST
topics:
    - rtp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
