summary: 'The VRRPv3 MIB module contains three tables: vrrpv3OperationsTable (operational characteristics of each virtual router instance), vrrpv3StatisticsTable (per-virtual-router statistics), and vrrpv3AssociatedIpAddrTable (IP addresses backed up by each virtual router). Tables are indexed on ifIndex, VRID, and IP address type.'
