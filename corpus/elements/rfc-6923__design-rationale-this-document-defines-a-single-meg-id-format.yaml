document: rfc-6923
kind: design-rationale
summary: This document defines a single MEG_ID format applicable to MPLS-TP Sections, LSPs, and Pseudowires alike, in contrast to RFC 6370 which defines distinct maintenance identifiers for each entity type. This simplification follows ITU-T practice.
