document: rfc-8487
kind: wire-format
summary: The IPv6 Mtrace2 Standard Response Block (Type 0x04) replaces interface addresses with 32-bit Interface IDs, adds a 128-bit Local Address and 128-bit Remote Address, and uses an 8-bit Src Prefix Len instead of the 7-bit Src Mask used in IPv4.
section: 3.2.5
topics:
