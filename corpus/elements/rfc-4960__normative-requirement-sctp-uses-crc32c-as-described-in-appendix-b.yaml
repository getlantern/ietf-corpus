document: rfc-4960
kind: normative-requirement
summary: SCTP uses CRC32c (as described in Appendix B) for the packet checksum field. A receiver MUST silently discard any packet with an invalid CRC32c checksum.
section: "6.8"
rfc2119_level: MUST
topics:
