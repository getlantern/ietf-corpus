document: rfc-8271
kind: protocol-element
summary: 'Point of Remote Repair (PRR): a downstream MP that, upon receiving the protected LSP''s rerouted Path message via a bypass tunnel, assumes the role of upstream PLR and triggers reroute of traffic and signaling in the upstream direction to restore co-routing. This role is introduced to solve RSVP soft-state timeout after node-protection FRR.'
section: "2.2"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
