document: rfc-6674
kind: protocol-element
summary: GI-DS-Lite logically extends existing point-to-point access tunnels beyond the access gateway to an AFTR using softwires with an embedded Context Identifier (CID). The CID uniquely identifies the end-system to which tunneled packets belong. Local policies at the access gateway determine which portion of traffic is forwarded to the AFTR.
section: "3"
topics:
