document: rfc-8262
kind: interoperability-note
summary: RFC 5368 is updated so that the Refer-To header field in a REFER request with multiple REFER-Targets may point to either a body part or a complete message-body carrying the URI list, and either a MIME Content-ID header field (RFC 4483) or a SIP Content-ID header field (RFC 8262) may be used to label it.
