document: rfc-3980
kind: interoperability-note
summary: This document updates RFC 3720 by adding the "naa." type as a valid iSCSI node name format, complementing the previously defined IQN and EUI-64 formats. iSCSI implementations MUST accept names of this new type in addition to existing formats.
