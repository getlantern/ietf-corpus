document: rfc-1904
kind: protocol-element
summary: The GROUP clause in MODULE-COMPLIANCE names object or notification groups that are conditionally mandatory or unconditionally optional. A group in a GROUP clause must be absent from MANDATORY-GROUPS; the DESCRIPTION specifies conditions under which it becomes mandatory.
