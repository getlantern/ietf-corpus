document: rfc-7737
kind: interoperability-note
summary: When multiple consecutive 'Reply via Specified Path' (value=5) entries appear in the Reply Mode Order TLV but fewer corresponding Reply Path TLVs exist, the earlier value=5 entries consume the available TLVs and the remaining ones imply the reverse LSP.
