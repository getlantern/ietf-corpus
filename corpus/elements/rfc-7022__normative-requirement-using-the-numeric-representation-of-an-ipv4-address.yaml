document: rfc-7022
kind: normative-requirement
summary: Using the numeric representation of an IPv4 address as the 'host' part of an RTCP CNAME is NOT RECOMMENDED, because public IPv4 addresses can be shared by multiple hosts, and it is often impossible for a host to know if NAT is present.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - nat
    - ip
