document: rfc-2834
kind: normative-requirement
summary: If a HARP client receives a HARP message with an operation code (ar$op) it does not support, it MUST gracefully discard the message and continue normal operation. A client is NOT REQUIRED to return any message to the sender of an undefined message.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
