document: rfc-9056
kind: normative-requirement
summary: When a DetNet IP flow is sent over DetNet MPLS, a DetNet relay node MUST ensure that the provisioned DetNet IP traffic treatment is provided at the forwarding sub-layer as described in Section 5.2 of RFC 8964.
section: "5.2"
rfc2119_level: MUST
topics:
