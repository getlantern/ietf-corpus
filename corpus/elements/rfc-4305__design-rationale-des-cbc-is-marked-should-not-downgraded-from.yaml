document: rfc-4305
kind: design-rationale
summary: DES-CBC is marked SHOULD NOT (downgraded from MUST in RFC 2406) because the IETF deprecated single DES years ago; this document is the first standards-track recognition of that deprecation. NIST also formally proposed withdrawal of single DES in July 2004.
