document: rfc-5247
kind: normative-requirement
summary: The AAA layer MUST delete transported keys once sent and MUST NOT retain keys it has previously sent. A AAA layer that has transported the MSK MUST delete it, and no keys MUST be derived from the MSK from that point forward by the AAA layer.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
