document: rfc-5429
kind: normative-requirement
summary: If the 'reason' string contains multiple CRLF-separated lines, it MUST be returned as a multiline SMTP/LMTP response per Section 4.2.1 of [SMTP]. No line MUST exceed the SMTP maximum line length limit.
section: "2.5"
rfc2119_level: MUST
