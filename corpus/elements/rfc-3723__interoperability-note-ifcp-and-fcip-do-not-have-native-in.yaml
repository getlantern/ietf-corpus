document: rfc-3723
kind: interoperability-note
summary: iFCP and FCIP do not have native in-band security mechanisms and rely entirely on the IPsec protocol suite for data confidentiality and authentication, with IKE as the key management protocol. Because iFCP and FCIP devices are the last line of defense for an entire Fibre Channel island, successful attacks could compromise all Fibre Channel hosts behind the devices.
section: "1.2"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
