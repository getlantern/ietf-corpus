document: rfc-3767
kind: security-consideration
summary: The protocol is designed to give no information to support a dictionary attack whether by eavesdropping (countered by TLS/DIGEST-MD5) or by server/client impersonation (countered by mutual authentication). DIGEST-MD5 is only used inside a TLS-authenticated pipe to prevent offline dictionary attacks from captured traffic.
section: "5"
topics:
    - security
    - crypto
