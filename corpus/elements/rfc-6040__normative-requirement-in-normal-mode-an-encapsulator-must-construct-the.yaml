document: rfc-6040
kind: normative-requirement
summary: In normal mode, an encapsulator MUST construct the outer IP header by copying the two-bit ECN field of the incoming IP header verbatim (including any CE marking). The IPv4 header checksum also changes whenever the ECN field changes.
section: "4.1"
rfc2119_level: MUST
topics:
    - ecn
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
