document: rfc-4261
kind: normative-requirement
summary: If the PDP hostname does not match the certificate identity, a PEP on a user-oriented system MUST either notify the user or terminate with a bad certificate error; unattended PEPs MUST log the error and MUST terminate the connection.
section: "7.2"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
