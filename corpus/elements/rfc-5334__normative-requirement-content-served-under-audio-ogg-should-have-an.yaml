document: rfc-5334
kind: normative-requirement
summary: Content served under audio/ogg SHOULD have an Ogg Skeleton logical bitstream when using the default .oga file extension. The .ogg and .spx extensions require no Skeleton due to backward compatibility concerns.
section: "10.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
