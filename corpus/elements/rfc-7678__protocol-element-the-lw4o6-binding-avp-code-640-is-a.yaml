summary: The Lw4o6-Binding AVP (code 640) is a Grouped AVP binding an lw4o6 tunnel to IPv4 packets; it contains mandatory Tunnel-Source-Pref-Or-Addr and Lw4o6-External-IPv4-Addr sub-AVPs, and an optional Port-Set-Identifier when the IPv4 address is shared.
