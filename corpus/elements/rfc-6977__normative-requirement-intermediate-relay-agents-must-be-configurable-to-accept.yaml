document: rfc-6977
kind: normative-requirement
summary: Intermediate relay agents MUST be configurable to accept or reject Reconfigure-Request messages from other relay agents. The default behavior when no explicit configuration is present is to accept Reconfigure-Request messages.
section: "6.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
