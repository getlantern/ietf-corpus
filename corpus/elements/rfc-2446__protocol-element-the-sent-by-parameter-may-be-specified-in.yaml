document: rfc-2446
kind: protocol-element
summary: The 'sent-by' parameter may be specified in either the ORGANIZER or ATTENDEE properties to indicate that the responding calendar user acted on behalf of the named principal. Attendee responses sent via 'sent-by' are still directed toward the CU designated as Organizer.
section: 2.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
