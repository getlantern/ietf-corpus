summary: rsvpSessionTable (rsvpObjects 1) provides per-session statistics indexed by rsvpSessionNumber. Each entry records session type, destination address (4–16 octets), protocol, port, and gauges for distinct senders, incoming reservations, and upstream reservation requests.
