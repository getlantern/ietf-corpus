document: rfc-7983
kind: design-rationale
summary: RFC 5764 only allocated first-byte values 0 and 1 for STUN, which implicitly restricted STUN method codepoints to 0x000–0x07F, reducing available IETF Review slots from 2048 to 128 and eliminating the Designated Expert range entirely. This document allocates values 2 and 3 to STUN to preserve the Designated Expert codepoint range.
section: "3"
topics:
