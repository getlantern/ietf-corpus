document: rfc-3966
kind: security-consideration
summary: Web clients MUST NOT use the 'tel' URI to place telephone calls without explicit user consent. Automatic calls may incur costs, place malicious calls, take the user's line off-hook, or reveal the user's phone number (possibly unlisted) to a remote party via caller ID.
section: "11"
rfc2119_level: MUST NOT
topics:
    - security
    - voip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
