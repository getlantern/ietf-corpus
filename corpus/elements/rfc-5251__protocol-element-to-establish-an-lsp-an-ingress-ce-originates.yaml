document: rfc-5251
kind: protocol-element
summary: To establish an LSP, an ingress CE originates a Path message containing the CPI of its own port in the Sender Template and the target CPI in the Session object. The ingress PE looks up the PIT to map CPIs to PPIs before forwarding within the provider network; the egress PE reverses the mapping before delivering to the egress CE.
section: "4.3"
topics:
    - vpn
    - mpls
