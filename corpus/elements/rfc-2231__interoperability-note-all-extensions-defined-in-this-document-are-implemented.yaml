document: rfc-2231
kind: interoperability-note
summary: All extensions defined in this document are implemented in a fashion that is completely syntactically compatible with existing MIME implementations, and are designed to have as little impact as possible on existing MIME uses. Existing processors that do not understand the extensions will see the raw continuation segments as separate (unknown) parameters.
