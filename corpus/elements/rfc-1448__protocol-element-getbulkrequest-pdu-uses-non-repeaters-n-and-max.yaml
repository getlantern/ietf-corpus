document: rfc-1448
kind: protocol-element
summary: 'GetBulkRequest-PDU uses non-repeaters (N) and max-repetitions (M) fields: the first N bindings are retrieved as single GetNext operations, while the remaining R bindings are each retrieved M times lexicographically. The total requested bindings is N + (M * R).'
section: 4.2.3
