document: rfc-3645
kind: normative-requirement
summary: When GSS_S_COMPLETE was the last major_status and a non-NULL token was sent, the server's confirmation response MUST be signed with a TSIG record. If the response is not signed or the signature is invalid, the client MAY continue waiting for a valid response within a locally specified time period.
section: 3.1.3.1
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
