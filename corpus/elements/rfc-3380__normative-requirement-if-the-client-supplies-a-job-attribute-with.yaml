document: rfc-3380
kind: normative-requirement
summary: If the client supplies a job attribute with the 'delete-attribute' out-of-band value in Set-Job-Attributes, the Printer MUST remove the attribute and all its values from the Job object. Any subsequent Get-Job-Attributes or Get-Jobs MUST NOT return any attribute deleted this way.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
