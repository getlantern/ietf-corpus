document: rfc-4712
kind: normative-requirement
summary: RRCs MUST implement the TCP transport for RAQMON PDUs and MAY implement the SNMP transport. This asymmetry ensures all collectors support the congestion-safe transport regardless of which the RDS uses.
section: "2"
rfc2119_level: MUST
topics:
    - realtime
    - tcp
    - snmp
