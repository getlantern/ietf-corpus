document: rfc-5760
kind: protocol-element
summary: A new RTCP packet type RSI (Receiver Summary Information) is defined with payload type 209. It carries a fixed header including the Distribution Source SSRC, the Summarized SSRC (the Media Sender being reported on), and a 64-bit NTP wallclock timestamp, followed by variable-length sub-report blocks.
