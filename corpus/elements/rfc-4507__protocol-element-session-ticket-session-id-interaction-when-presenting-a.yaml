document: rfc-4507
kind: protocol-element
summary: 'Session ticket / Session ID interaction: when presenting a ticket, the client MAY include a non-empty Session ID. If the server accepts the ticket and the Session ID is non-empty, it MUST echo the same Session ID, enabling the client to distinguish resumption from full handshake fallback.'
section: "3.4"
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
