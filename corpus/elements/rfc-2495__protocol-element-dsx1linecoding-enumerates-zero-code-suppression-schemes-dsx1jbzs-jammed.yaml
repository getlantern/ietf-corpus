document: rfc-2495
kind: protocol-element
summary: 'dsx1LineCoding enumerates zero code suppression schemes: dsx1JBZS (Jammed Bit), dsx1B8ZS, dsx1HDB3, dsx1ZBTSI, dsx1AMI, and dsx1B6ZS (for DS2). E1 links use HDB3 or AMI; DS2 uses B6ZS.'
