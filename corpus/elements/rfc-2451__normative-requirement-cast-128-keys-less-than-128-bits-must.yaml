document: rfc-2451
kind: normative-requirement
summary: CAST-128 keys less than 128 bits MUST be padded with zeros in the rightmost (least significant) positions out to 128 bits, since the CAST-128 key schedule assumes a 128-bit input key.
section: "2.2"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
