document: rfc-2863
kind: state-machine
summary: 'ifOperStatus has seven states: up (ready to pass packets), down (not ready or fault), testing (no operational packets), unknown (state indeterminate), dormant (operable but waiting for external event), notPresent (hardware component missing), and lowerLayerDown (down due to lower-layer interface state). Transitions from any state except notPresent into down trigger a linkDown trap; transitions out of down to any state except notPresent trigger a linkUp trap.'
section: 3.1.12
topics:
    - snmp
