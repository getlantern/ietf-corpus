document: rfc-6806
kind: interoperability-note
summary: The AD-LOGIN-ALIAS information SHOULD be dropped in the general cross-realm ticket-granting case because the use of AD-KDC-ISSUED authorization data elements in cross-realm cases has not been well explored. However, a realm MAY re-sign alias information from certain trusted realms.
section: "6"
topics:
