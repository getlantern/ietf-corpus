document: rfc-6435
kind: normative-requirement
summary: When a MEP receives a Lock command from an NMS or management process, it MUST take the transport path out of service; that is, it MUST stop injecting or forwarding traffic onto the locked LSP, PW, or bidirectional Section.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
