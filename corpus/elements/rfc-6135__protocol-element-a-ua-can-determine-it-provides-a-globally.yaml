document: rfc-6135
kind: protocol-element
summary: 'A UA can determine it provides a globally reachable IP address in three scenarios: it is not behind a NAT; it relays MSRP connections via an MSRP relay or TURN server; or it has used STUN to retrieve the NAT address and confirmed endpoint-independent mapping and filtering behavior.'
