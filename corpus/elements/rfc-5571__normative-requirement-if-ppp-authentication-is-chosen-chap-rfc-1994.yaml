document: rfc-5571
kind: normative-requirement
summary: If PPP authentication is chosen, CHAP (RFC 1994) MUST be supported by both the Softwire Initiator and Softwire Concentrator. Other methods (MS-CHAPv1, EAP) MAY additionally be supported.
