document: rfc-8245
kind: normative-requirement
summary: If a specification updating RFC 5444 introduces new flags, the <version> field in the Packet Header MUST NOT be 0, and new flags MUST indicate packet/Address Block/TLV structure only and MUST NOT be used for other semantics such as message forwarding behavior.
section: "5"
rfc2119_level: MUST
topics:
    - routing
