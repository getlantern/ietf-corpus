document: rfc-8551
kind: normative-requirement
summary: Each MIME entity MUST be converted to canonical form before signing, enveloping, or compressing. Text MIME entities MUST have line endings canonicalized to <CR><LF> and character set canonicalized; for charsets with multiple representations, the canonical representation MUST be used.
section: 3.1.1
rfc2119_level: MUST
topics:
