document: rfc-1390
kind: protocol-element
summary: An IP multicast address is mapped to an FDDI group address by placing the low-order 23 bits of the IP address into the low-order 23 bits of the FDDI group address 01-00-5E-00-00-00 (canonical order). The resulting FDDI address is bit-reversed per-octet for transmission in the destination MAC field.
section: Multicast Support
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
