document: rfc-6277
kind: protocol-element
summary: 'For dynamic responses, the responder MAY select its signing algorithm using a five-level precedence: (1) client''s preferred algorithm, (2) algorithm used to sign the issuer''s CRL, (3) algorithm used to sign the OCSPRequest, (4) out-of-band advertised default, (5) mandatory/recommended algorithm for the OCSP protocol version.'
section: "5.1"
topics:
    - pkix
    - crypto
