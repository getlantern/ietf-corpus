document: rfc-8947
kind: state-machine
summary: 'Address assignment lifecycle: (1) Client sends Solicit with IA_LL+LLADDR; (2) Server responds with Advertise (or Reply if Rapid Commit); (3) Client sends Request copying LLADDR from Advertise; (4) Server assigns and sends Reply; (5) Client uses addresses, renews at T1 via Renew, rebinds at T2 via Rebind, releases via Release when done.'
section: "5"
topics:
