document: rfc-3608
kind: interoperability-note
summary: 'The Service-Route mechanism is only applicable when: (1) the UA registers with a registrar, (2) the registrar has knowledge of a service proxy for the UA, (3) the registrar has sufficient knowledge of the topology to construct a reasonable service route, and (4) the service route is the same for all contacts of a single AOR — it does not provide contact-specific service routes.'
section: "4"
topics:
