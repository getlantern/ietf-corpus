document: rfc-6368
kind: protocol-element
summary: ATTR_SET (BGP path attribute type code 128) is a new optional transitive BGP path attribute that carries a set of BGP path attributes. It is used by PE routers to push customer network BGP attributes into a stack at VRF export and pop them at VRF import, enabling transparent carriage of iBGP path attributes across the BGP/MPLS VPN core.
section: "5"
topics:
