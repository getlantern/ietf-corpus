document: rfc-8268
kind: security-consideration
summary: Due to security concerns with SHA-1 (RFC 6194) and MODP groups with fewer than 2048 bits (NIST SP 800-131Ar1), implementers should use larger DH MODP group sizes with SHA-2 data-integrity verification.
