document: rfc-6956
kind: protocol-element
summary: 'Two IP packet validation LFBs are defined: IPv4Validator and IPv6Validator. IPv4Validator checks header length, total length, TTL, and checksum fields, while IPv6Validator checks header, total length, and hop limit. Invalid packets produce a ValidateErrorID metadata; exceptional cases (e.g., TTL zero, router alert options) produce an ExceptionID metadata.'
section: "5.2"
topics:
    - routing
    - ip
