document: rfc-2494
kind: protocol-element
summary: The DS0Bundle MIB defines managed objects for collections of DS0 channels bundled together to carry data at speeds greater than a single DS0, using ifType ds0Bundle(82). The ifSpeed for a ds0Bundle is N*64000 where N is the number of constituent DS0s.
section: "2.2"
topics:
