document: rfc-3588
kind: normative-requirement
summary: Diameter clients MUST support either TCP or SCTP. Diameter agents and servers MUST support both TCP and SCTP. All Diameter nodes MUST be prepared to receive connections on port 3868. A given peer state machine instance MUST NOT use more than one transport connection to communicate with a given peer.
section: "2.1"
rfc2119_level: MUST
topics:
    - tcp
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
