document: rfc-9967
kind: normative-requirement
summary: The 'Set-Txn' HTTP response header value MUST match the 'txn' claim in a subsequent Security Event Token confirming async request completion. The 'Location' header MUST be either a URI where the completion event MAY be retrieved or the normal SCIM location.
section: 2.5.1.1
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
