document: rfc-4206
kind: protocol-element
summary: The Interface Switching Capability of an FA is set to the near-end Interface Switching Capability of the first link in the FA-LSP. For PSC-type capabilities, the Interface MTU is the minimum MTU along the FA-LSP path and the Minimum LSP Bandwidth is the bandwidth of the FA-LSP.
section: 3.1.9
topics:
    - mpls
    - routing
