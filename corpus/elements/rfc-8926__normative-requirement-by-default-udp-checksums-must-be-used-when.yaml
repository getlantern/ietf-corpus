document: rfc-8926
kind: normative-requirement
summary: By default, UDP checksums MUST be used when Geneve is transported over IPv6. A tunnel endpoint MAY be configured for zero UDP checksum only when operating in a traffic-managed controlled environment (TMCE) meeting specific conditions in Section 4.3.1, and MUST meet all requirements of RFC 6936 Section 4 and requirement 1 of Section 5.
section: 4.3.1
rfc2119_level: MUST
topics:
    - routing
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
