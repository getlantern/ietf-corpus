document: rfc-4568
kind: normative-requirement
summary: Implementations MUST employ security mechanisms that provide confidentiality and integrity for the keying material. When used with SIP, the application SHOULD employ either the SIPS URI or S/MIME; use of transport-layer or IP-layer security in lieu of SIPS/S/MIME is NOT RECOMMENDED because protection cannot be ensured through intermediate SIP proxies.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
