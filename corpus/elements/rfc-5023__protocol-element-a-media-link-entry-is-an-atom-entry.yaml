document: rfc-5023
kind: protocol-element
summary: A Media Link Entry is an Atom Entry that describes a Media Resource. It MUST have an atom:content element with a 'src' attribute whose value is an IRI for the Media Resource, and SHOULD contain an atom:link with rel='edit-media' pointing to the IRI for modifying the Media Resource.
section: "9.6"
topics:
    - http
