document: rfc-3041
kind: interoperability-note
summary: In the absence of stable storage, there is no history value available across restarts. The initial history value must be generated at random, potentially drawing on machine-specific configuration data (user identity, security keys, serial numbers) combined with random bits, then processed through MD5.
section: 3.2.2
topics:
