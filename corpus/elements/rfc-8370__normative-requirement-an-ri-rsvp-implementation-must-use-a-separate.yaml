document: rfc-8370
kind: normative-requirement
summary: An RI-RSVP implementation MUST use a separate shorter refresh interval for unacknowledged Path/Resv (uR) messages, with a default of 30 seconds RECOMMENDED, ensuring unacknowledged state is refreshed promptly despite the large general refresh interval.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
