document: rfc-5350
kind: interoperability-note
summary: For IPv4, value 0 means 'Router shall examine packet' (used by RSVP and IGMP), whereas for IPv6, value 0 means the datagram contains a Multicast Listener Discovery message. The semantics of value 0 differ between the two protocol versions.
