document: rfc-6454
kind: protocol-element
summary: The Unicode serialization of an origin returns the string 'null' for non-scheme/host/port origins, or constructs 'scheme://host[:port]' where A-labels in the host are converted to corresponding U-labels, and the port is omitted if it equals the default for the scheme.
