document: rfc-5760
kind: wire-format
summary: 'The RSI packet header is 20 octets: standard RTCP 32-bit header (V=2, P, reserved, PT=RSI=209, 16-bit length), followed by a 32-bit SSRC of the Distribution Source, a 32-bit Summarized SSRC of the Media Sender, and a 64-bit NTP timestamp (most significant word then least significant word).'
