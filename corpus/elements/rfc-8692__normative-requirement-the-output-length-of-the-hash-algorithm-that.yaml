document: rfc-8692
kind: normative-requirement
summary: The output length of the hash algorithm that hashes the message SHALL be 32 bytes for SHAKE128 or 64 bytes for SHAKE256. The RSASSA-PSS saltLength MUST be 32 bytes for id-RSASSA-PSS-SHAKE128 or 64 bytes for id-RSASSA-PSS-SHAKE256.
section: 4.1.1
rfc2119_level: MUST
topics:
