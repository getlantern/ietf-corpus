document: rfc-7462
kind: registry
summary: A new 'Alert URN Identifiers' registry is created, managed under the 'Specification Required' policy (RFC 5226). It records standardized <alert-category> and <alert-identifier> values with reference and description. A new URN MUST NOT be registered if it equals an already-registered URN under case-insensitive comparison.
section: "9.2"
topics:
