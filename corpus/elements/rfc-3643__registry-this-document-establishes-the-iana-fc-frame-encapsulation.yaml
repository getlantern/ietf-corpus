document: rfc-3643
kind: registry
summary: This document establishes the IANA FC Frame Encapsulation Protocol Number Registry. Values are assigned only for Standards Track RFCs approved by the IESG. Protocol# 0 is reserved until all others are assigned; values 240-255 are set aside for private use. Protocol# 1 is assigned to FCIP and Protocol# 2 to iFCP.
