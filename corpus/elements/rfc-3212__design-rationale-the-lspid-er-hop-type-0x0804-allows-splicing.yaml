document: rfc-3212
kind: design-rationale
summary: 'The LSPID ER-Hop (type 0x0804) allows splicing or stacking CR-LSPs to eliminate the need to store the full remaining ER-TLV at each end of a loosely routed segment: the upstream LSR needs only the next ER-Hop and LSPID, while the downstream LSR needs only the LSPID.'
section: 4.7.4
topics:
