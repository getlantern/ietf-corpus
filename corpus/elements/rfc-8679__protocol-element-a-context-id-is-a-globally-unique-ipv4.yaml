document: rfc-8679
kind: protocol-element
summary: 'A ''context ID'' is a globally unique IPv4 or IPv6 address assigned to a protected egress {E, P}. It is logically owned by both E and P: for the egress router it indicates the protector; for the protector it indicates the egress router''s forwarding context; for other routers it is reachable via both, similar to an anycast address.'
section: "5.7"
topics:
    - mpls
    - routing
