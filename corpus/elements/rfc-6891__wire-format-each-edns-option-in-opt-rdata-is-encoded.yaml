document: rfc-6891
kind: wire-format
summary: 'Each EDNS option in OPT RDATA is encoded as: OPTION-CODE (16-bit, assigned by Expert Review), OPTION-LENGTH (16-bit, size in octets of OPTION-DATA), and OPTION-DATA (variable, MUST be treated as a bit field). Order of options is undefined.'
