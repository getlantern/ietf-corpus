document: rfc-9795
kind: design-rationale
summary: Per-element digests in "rcdi" (rather than a single digest over the entire "rcd") allow a verifier to validate only those elements actually retrieved and rendered to the end user, avoiding unnecessary fetching of URI-linked content solely for integrity verification.
