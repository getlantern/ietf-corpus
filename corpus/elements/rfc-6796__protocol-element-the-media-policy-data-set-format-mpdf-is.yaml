document: rfc-6796
kind: protocol-element
summary: 'The Media Policy Data Set Format (MPDF) is an XML document format with namespace URN ''urn:ietf:params:xml:ns:mediadataset'' and media type ''application/media-policy-dataset+xml''. It has two root elements: <session-info> for session information documents and <session-policy> for session policy documents.'
