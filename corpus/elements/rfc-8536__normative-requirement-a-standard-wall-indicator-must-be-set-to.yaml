document: rfc-8536
kind: normative-requirement
summary: A standard/wall indicator MUST be set to 1 (standard) if the corresponding UT/local indicator is set to 1 (UT). If isstdcnt or isutcnt is zero, all transition times are assumed to be wall time or local time respectively.
section: "3.2"
rfc2119_level: MUST
topics:
    - measurement
