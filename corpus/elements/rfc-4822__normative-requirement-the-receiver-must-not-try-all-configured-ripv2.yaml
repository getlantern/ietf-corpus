document: rfc-4822
kind: normative-requirement
summary: The receiver MUST NOT try all configured RIPv2 Security Associations (keys) on the receiving interface, as this creates an easily exploited denial-of-service attack; the Key Identifier and receiving interface MUST be used to select the specific Security Association.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
