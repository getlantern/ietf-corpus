document: rfc-2916
kind: protocol-element
summary: NAPTR resource records are used to identify available services for a specific E.164 number in DNS. The input to the NAPTR algorithm is the E.164 number after step 2 processing (leading '+' and digits only); the output is an absolute URI per RFC 2396.
