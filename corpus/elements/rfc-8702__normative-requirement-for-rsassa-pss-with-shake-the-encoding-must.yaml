document: rfc-8702
kind: normative-requirement
summary: For RSASSA-PSS with SHAKE, the encoding MUST omit the parameters field. The hash algorithm used to hash the message and the mask generation function MUST both be the same SHAKE variant (both SHAKE128 or both SHAKE256).
section: 3.2.1
rfc2119_level: MUST
topics:
    - crypto
    - security
