document: rfc-5404
kind: normative-requirement
summary: Implementations SHOULD NOT use the CBR parameter unless interacting with a device that cannot support variable bitrate (e.g., an H.320 gateway). When using CBR mode, a receiver MUST monitor packet loss rate to ensure congestion is not caused.
section: "9"
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - congestion
