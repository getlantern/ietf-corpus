document: rfc-8305
kind: design-rationale
summary: A minimum Connection Attempt Delay of 10 ms (recommended 100 ms) is required to avoid congestion collapse in the presence of high packet-loss rates; without a floor, historical RTT data could drive attempts so close together they overwhelm the network.
