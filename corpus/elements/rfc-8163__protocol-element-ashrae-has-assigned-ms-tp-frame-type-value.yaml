document: rfc-8163
kind: protocol-element
summary: ASHRAE has assigned MS/TP Frame Type value 34 (decimal) to indicate IPv6 over MS/TP (LoBAC) Encapsulation. This value falls within the range 32–127 that designates COBS-encoded data frames carrying Encoded Data and Encoded CRC-32K fields.
