document: rfc-7572
kind: interoperability-note
summary: There is no SIP header field that matches the meaning of the XMPP message 'type' attribute values ("normal", "chat", "groupchat", "headline", "error"), so no general mapping is possible; the 'type' field is dropped when translating XMPP to SIP.
