document: rfc-2155
kind: protocol-element
summary: The appnSessIntermediate group includes appnIsInGlobal (controls whether RSCVs and counters are collected), appnIsInTable (active intermediate sessions through this node), and appnIsRtpTable (intermediate sessions running over HPR RTP connections). Deactivating intermediate sessions is a supported management operation.
