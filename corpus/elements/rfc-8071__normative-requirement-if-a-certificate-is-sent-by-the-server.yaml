document: rfc-8071
kind: normative-requirement
summary: If a certificate is sent by the server, the server MUST also send all intermediate certificates leading up to a well-known and trusted issuer, as defined for SSH in RFC 6187 Section 2.1 and for TLS in RFC 5246 Section 7.4.2.
