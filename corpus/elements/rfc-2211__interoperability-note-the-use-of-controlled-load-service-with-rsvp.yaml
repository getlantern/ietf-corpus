summary: The use of Controlled-Load service with RSVP is specified in RFC 2210, which defines the format of RSVP FLOWSPEC, SENDER_TSPEC, and ADSPEC objects for controlled-load applications. The RSVP protocol itself is specified in RFC 2205.
