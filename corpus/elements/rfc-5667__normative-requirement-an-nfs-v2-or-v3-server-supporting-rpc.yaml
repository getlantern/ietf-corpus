document: rfc-5667
kind: normative-requirement
summary: An NFS v2 or v3 server supporting RPC/RDMA MAY choose an arbitrary port or MAY use the alternative well-known port number, and MAY register with the RPC portmapper under the netid assigned by RFC 5666.
section: "6"
rfc2119_level: MAY
