document: rfc-9486
kind: normative-requirement
summary: All IOAM IPv6 options require alignment on multiples of 4 bytes, ensuring that fields specified in RFC 9197 are aligned at a multiple-of-4 offset from the start of the hop-by-hop and destination options header.
