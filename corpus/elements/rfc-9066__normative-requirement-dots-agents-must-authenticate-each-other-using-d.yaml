document: rfc-9066
kind: normative-requirement
summary: DOTS agents MUST authenticate each other using (D)TLS before a DOTS signal channel session is considered valid. Security considerations from RFC 9132 Section 11 and those related to (D)TLS early data from RFC 9132 Section 7 MUST also be considered.
