document: rfc-9746
kind: design-rationale
summary: ESI Label filtering is preferred for Single-Active multihoming and cross-domain scenarios because local bias is unsuitable for Single-Active (ingress NVE deactivates non-DF ACs, preventing local replication) and requires a stable source IP identity across next-hops, which may not hold in multi-domain networks.
section: "1.2"
topics:
    - routing
    - mpls
