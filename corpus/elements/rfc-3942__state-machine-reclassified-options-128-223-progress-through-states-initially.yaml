document: rfc-3942
kind: state-machine
summary: 'Reclassified options (128-223) progress through states: initially ''Unavailable'' (IANA-managed, not assignable); after vendor notification within 6 months, move to ''Tentatively Assigned''; after 6 months with no vendor claim, move to ''Unassigned'' (available for new assignments); after Internet-Draft published and RFC approved, move to ''Assigned''.'
