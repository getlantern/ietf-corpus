document: rfc-2455
kind: design-rationale
summary: Branch network nodes are treated as a distinct third node type in this MIB (parallel to NN and EN) despite being technically network nodes in the base APPN architecture, because the distinction increases clarity for management applications—BrNNs omit appnNnTopo objects but implement appnSessIntermediate and two appnEnUniqueCaps objects.
