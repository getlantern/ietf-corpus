document: rfc-5692
kind: normative-requirement
summary: When stateful IPv6 address autoconfiguration is required, DHCPv6 (RFC 3315) MUST be performed. When stateless autoconfiguration is required, RFC 4862 and RFC 4861 MUST be followed.
