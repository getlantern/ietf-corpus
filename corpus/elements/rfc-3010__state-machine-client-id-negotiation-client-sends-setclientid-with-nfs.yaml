document: rfc-3010
kind: state-machine
summary: 'Client ID negotiation: client sends SETCLIENTID with nfs_client_id4 (verifier + opaque id) and callback address, server responds with clientid4 and confirm verifier; client must then send SETCLIENTID_CONFIRM to activate the clientid. A new verifier from a previously known client causes the server to release prior lock state.'
section: 8.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
