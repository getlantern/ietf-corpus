document: rfc-8610
kind: design-rationale
summary: CDDL's matching semantics are grounded in Parsing Expression Grammars (PEGs), which use prioritized (ordered) choice to resolve what would be ambiguity in generative grammars. Occurrence indicators are greedy, consuming as much input as possible, which eliminates most ambiguity but requires careful ordering of alternatives.
