document: rfc-8632
kind: design-rationale
summary: The recommended practice is to raise a single alarm on the root-cause resource and enumerate affected resources in the impacted-resource leaf-list, rather than generating separate alarms per affected resource. This limits alarm volume and directs operators to the actionable resource.
section: "3.6"
