document: rfc-3024
kind: design-rationale
summary: Reverse tunnels are symmetric with the forward tunnel (same encapsulation method and IP address endpoints), using IP-in-IP by default. This avoids additional negotiation complexity and allows both tunnels to share the same registered encapsulation options.
section: "1.2"
topics:
    - mobility
    - ip
