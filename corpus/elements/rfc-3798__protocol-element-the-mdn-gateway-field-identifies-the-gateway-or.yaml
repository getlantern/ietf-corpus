document: rfc-3798
kind: protocol-element
summary: 'The MDN-Gateway field identifies the gateway or MTA that translated a foreign disposition notification into MDN format. It MUST appear in any MDN translated by a gateway and MUST NOT appear otherwise. Syntax: "MDN-Gateway" ":" mta-name-type ";" mta-name.'
section: 3.2.2
topics:
