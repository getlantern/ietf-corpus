document: rfc-8040
kind: design-rationale
summary: RESTCONF uses a data-model-driven API where the client can derive all management resource URLs from YANG modules, eliminating the need for HATEOAS links in responses. Because the YANG schema determines the resource structure, the server does not need to embed hypermedia links.
section: "1.3"
topics:
    - netconf
    - yang
    - http
