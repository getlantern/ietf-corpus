document: rfc-5088
kind: registry
summary: IANA created the 'PCE Capability Flags' registry, a top-level OSPF registry managing 32-bit capability flags for PCE-CAP-FLAGS. Initial assignments include bits 0-8 for GMPLS constraints, bidirectional, diverse, load-balanced, synchronized, multiple objectives, additive constraints, request prioritization, and multiple requests per message. New bits require IETF Consensus.
section: "7.2"
