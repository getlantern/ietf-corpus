document: rfc-7983
kind: design-rationale
summary: RFC 5764 implicitly treated TLS ContentType values 20–63 as DTLS without warning that allocations outside this range (0–19 and 64–255) would break demultiplexing. This document adds coordination requirements to those ranges in the TLS ContentType registry.
section: "5"
topics:
    - tls
    - rtp
