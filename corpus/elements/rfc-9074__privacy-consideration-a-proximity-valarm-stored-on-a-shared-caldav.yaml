document: rfc-9074
kind: privacy-consideration
summary: A proximity VALARM stored on a shared CalDAV calendar can expose a user's intended future location to anyone with calendar access. If the client updates the shared resource with an ACKNOWLEDGED property upon triggering, it also leaks the exact date and time of arrival or departure. CalDAV clients implementing proximity alarms SHOULD give users the option to store and/or acknowledge alarms on the local device only.
section: "10"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
