document: rfc-8317
kind: normative-requirement
summary: In MAC mobility scenarios where a MAC address is advertised with different Root or Leaf-Indications, MAC mobility procedures (RFC 7432 Section 15) MUST take precedence to identify the MAC's location before associating it with a Root or Leaf site.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
