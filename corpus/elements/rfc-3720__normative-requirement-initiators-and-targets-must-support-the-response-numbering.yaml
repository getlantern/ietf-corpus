document: rfc-3720
kind: normative-requirement
summary: Initiators and targets MUST support the response-numbering scheme (StatSN/ExpStatSN). Initiators MUST undertake recovery actions if the difference between StatSN and ExpStatSN exceeds an implementation-defined constant that MUST NOT exceed 2**31-1.
section: 3.2.2.2
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
