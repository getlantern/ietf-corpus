document: rfc-8851
kind: normative-requirement
summary: When modifying a session, any RIDs with proposed changes SHOULD use a new ID rather than reusing one from the previous offer/answer exchange to avoid race conditions with media; RIDs without proposed changes SHOULD reuse the ID from the previous exchange.
section: "6.5"
rfc2119_level: SHOULD
topics:
    - rtp
    - webrtc
    - realtime
