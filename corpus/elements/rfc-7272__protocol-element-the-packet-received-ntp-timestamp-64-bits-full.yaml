document: rfc-7272
kind: protocol-element
summary: The Packet Received NTP timestamp (64 bits, full NTP format per RFC 5905) records the wallclock time of arrival of the first octet of the reported RTP packet at the SC. In the RTCP IDMS Settings Packet it reflects the reference client's reception time and is used by SCs to adjust playout delay.
section: "6"
topics:
