document: rfc-8264
kind: protocol-element
summary: 'The PRECIS derived property assigns each Unicode code point a value: PVALID (allowed in any class), FREE_PVAL (allowed only in FreeformClass), CONTEXTJ/CONTEXTO (allowed only when a contextual rule is satisfied), DISALLOWED (not permitted in any class), or UNASSIGNED (not yet designated in Unicode). ID_PVAL and FREE_DIS are defined but not used in practice.'
section: "8"
