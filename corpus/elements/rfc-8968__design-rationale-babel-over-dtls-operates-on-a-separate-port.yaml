document: rfc-8968
kind: design-rationale
summary: Babel over DTLS operates on a separate port (6699) from unprotected Babel (6696) so that a node can simultaneously listen for unencrypted Multicast Hellos (for neighbour discovery) while enforcing DTLS for all other traffic.
