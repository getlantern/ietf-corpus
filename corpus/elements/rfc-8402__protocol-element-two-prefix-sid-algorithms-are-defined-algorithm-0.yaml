summary: 'Two Prefix-SID algorithms are defined: Algorithm 0 (Shortest Path First) follows the standard ECMP-aware SPF and permits local policy overrides; Algorithm 1 (Strict-SPF) mandates ECMP-aware SPF forwarding and prohibits any local policy override, though FRR mechanisms remain compliant.'
