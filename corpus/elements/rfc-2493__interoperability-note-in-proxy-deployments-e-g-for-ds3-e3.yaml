document: rfc-2493
kind: interoperability-note
summary: In proxy deployments (e.g., for DS3/E3 interfaces), periods of lost communication between proxy and managed device may result in some 15-minute intervals being unavailable. xyzValidIntervals in such cases reflects the maximum interval number with available data, not a contiguous range.
