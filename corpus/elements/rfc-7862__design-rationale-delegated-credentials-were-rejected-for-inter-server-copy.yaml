document: rfc-7862
kind: design-rationale
summary: Delegated credentials were rejected for inter-server copy authorization because the destination would authenticate as the user principal and could access other files. RPCSEC_GSSv3 structured privilege assertions are used instead, constraining the destination server's authorization to the specific file being copied.
section: 4.9.1.1
topics:
    - security
    - crypto
