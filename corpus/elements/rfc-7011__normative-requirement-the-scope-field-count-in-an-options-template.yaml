document: rfc-7011
kind: normative-requirement
summary: The Scope Field Count in an Options Template Record MUST NOT be zero; at least one Scope Field is required. If a different order of Scope Fields would result in a different semantic meaning, the order MUST be preserved by the Exporting Process.
