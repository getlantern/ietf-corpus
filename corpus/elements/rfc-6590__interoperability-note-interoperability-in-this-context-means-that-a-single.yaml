document: rfc-6590
kind: interoperability-note
summary: Interoperability in this context means that a single report generator consistently applies the same transformation, allowing the same report receiver to correlate multiple reports from that generator. There is no cross-generator interoperability requirement; two generators may use entirely different transformation algorithms without issue.
section: "4"
topics:
    - email
    - privacy
