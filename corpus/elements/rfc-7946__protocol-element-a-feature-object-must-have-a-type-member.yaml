document: rfc-7946
kind: protocol-element
summary: A Feature object MUST have a "type" member with value "Feature", a "geometry" member (either a Geometry object or JSON null for unlocated features), and a "properties" member (any JSON object or null). An optional "id" member SHOULD be a JSON string or number.
section: "3.2"
topics:
    - json
