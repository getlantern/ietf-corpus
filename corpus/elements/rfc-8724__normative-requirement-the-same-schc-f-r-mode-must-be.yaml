document: rfc-8724
kind: normative-requirement
summary: The same SCHC F/R mode MUST be used for all SCHC Fragments of a given SCHC Packet. At least one RuleID MUST be allocated to tag packets for which compression was not possible; such packets MUST be sent uncompressed using that dedicated RuleID.
section: "8.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
