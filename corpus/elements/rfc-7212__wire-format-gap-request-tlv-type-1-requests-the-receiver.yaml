document: rfc-7212
kind: wire-format
summary: 'GAP Request TLV (Type=1): requests the receiver to transmit an immediate unicast GAP update. If Length is zero, an update for all applications is requested; otherwise Value contains a sequence of 16-bit Application IDs specifying which applications to update.'
