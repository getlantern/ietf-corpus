document: rfc-8149
kind: normative-requirement
summary: If no preferable tree can be found, the midpoint LSR that expands loose next hop(s) MUST propagate the 'P2MP-TE Tree Re-evaluation Request' flag downstream by setting it in the LSP_ATTRIBUTES object of the RSVP Path message.
section: "4.1"
rfc2119_level: MUST
