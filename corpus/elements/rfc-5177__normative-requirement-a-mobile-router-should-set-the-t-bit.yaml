document: rfc-5177
kind: normative-requirement
summary: A Mobile Router SHOULD set the 'T' bit to 1 in all Registration Request messages to indicate the need for reverse tunnels for all traffic. Without reverse tunnels, traffic from the Mobile Network will be subject to ingress filtering in visited networks.
section: "5"
rfc2119_level: SHOULD
topics:
    - mobility
    - ip
