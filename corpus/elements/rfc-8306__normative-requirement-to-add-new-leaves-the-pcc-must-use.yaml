document: rfc-8306
kind: normative-requirement
summary: To add new leaves the PCC MUST use END-POINTS with leaf type 1; to remove leaves it MUST use leaf type 2. When adding or removing leaves, the PCC MUST also provide old leaves as END-POINTS with leaf type 3, 4, or both, and MUST supply the old path as RROs following each END-POINTS object.
section: "3.10"
rfc2119_level: MUST
topics:
    - mpls
    - routing
