document: rfc-9965
kind: design-rationale
summary: 'The eap.arpa realm was chosen because it is not routable within a AAA proxy system: the eap.arpa. domain does not exist in DNS (preventing dynamic discovery per RFC 7585), and administrators cannot register it within the DNS to satisfy RFC 7542 Section 2.5 requirements. This ensures EPIs stay local.'
section: "3.7"
topics:
    - security
    - dns
