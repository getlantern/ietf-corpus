document: rfc-9643
kind: normative-requirement
summary: A keepalive implementation MUST NOT interpret failure to respond to any specific keepalive probe as a dead connection, because ACK segments containing no data are not reliably transmitted by TCP.
section: 2.1.5
rfc2119_level: MUST NOT
