document: rfc-7848
kind: protocol-element
summary: The <mark:mark> element describes an applicant's prior right to a domain name and contains one or more <mark:trademark>, <mark:treatyOrStatute>, and <mark:court> child elements. It substitutes for the abstract <mark:abstractMark> element, enabling extension via XML schema substitution groups.
