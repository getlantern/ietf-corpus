document: rfc-1541
kind: protocol-element
summary: The 'client identifier' option allows a client to supply an explicit identifier (e.g., hardware address or DNS name) to the server, eliminating overloading of 'chaddr'. If absent, the server uses 'chaddr' as the client identifier. New client identifier types are registered with IANA.
section: "2"
topics:
