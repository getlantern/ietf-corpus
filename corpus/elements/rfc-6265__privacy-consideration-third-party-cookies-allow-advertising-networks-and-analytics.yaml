document: rfc-6265
kind: privacy-consideration
summary: Third-party cookies allow advertising networks and analytics providers to track users across unrelated sites by correlating cookies set when third-party resources are loaded. User agents are granted wide latitude to implement third-party cookie blocking policies; this document does not endorse any specific policy but notes that server-side workarounds (e.g., identifying information in URLs) can defeat blocking.
section: "7.1"
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
