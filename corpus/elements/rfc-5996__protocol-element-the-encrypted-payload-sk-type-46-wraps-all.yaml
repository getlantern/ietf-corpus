document: rfc-5996
kind: protocol-element
summary: The Encrypted payload (SK, type 46) wraps all inner payloads with encryption and integrity protection. It contains an initialization vector, ciphertext (inner payloads plus padding), padding length octet, and an integrity checksum. Every message after IKE_SA_INIT is wrapped entirely in an Encrypted payload.
section: "3.14"
topics:
    - ipsec
    - crypto
