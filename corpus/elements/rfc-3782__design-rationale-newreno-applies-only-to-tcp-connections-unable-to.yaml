document: rfc-3782
kind: design-rationale
summary: NewReno applies only to TCP connections unable to use SACK. When SACK is available it is the preferred mechanism; NewReno is a practical improvement for the large portion of connections where SACK is unavailable or unsupported by the peer.
section: "1"
topics:
