document: rfc-3381
kind: design-rationale
summary: The 'uncollated-sheets(3)' value of job-collation-type may result in physically collated output if the device has an output bin collator; however, job progress monitoring is indistinguishable from a device without such a collator, so the value reflects the job's requested processing mode rather than the physical output order.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
