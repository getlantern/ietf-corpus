document: rfc-6125
kind: protocol-element
summary: A 'reference identifier' is constructed by the client from a source domain and optionally an application service type, used for matching against presented identifiers in a server's certificate. A 'presented identifier' is one provided by the server within its PKIX certificate during TLS negotiation.
section: "1.8"
topics:
