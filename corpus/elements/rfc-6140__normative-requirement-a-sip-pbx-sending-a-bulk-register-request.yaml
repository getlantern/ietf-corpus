document: rfc-6140
kind: normative-requirement
summary: A SIP-PBX sending a bulk REGISTER request MUST include the option tag 'gin' in both a 'Require' header field and a 'Proxy-Require' header field, and MUST include at least one Contact URI containing the 'bnc' parameter with no user portion.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
