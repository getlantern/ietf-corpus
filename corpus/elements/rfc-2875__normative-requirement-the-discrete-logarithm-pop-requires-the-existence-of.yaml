document: rfc-2875
kind: normative-requirement
summary: The Discrete Logarithm POP requires the existence of a q parameter (a large prime such that q divides p-1). If keys are generated per DH-X9.42, this requirement is automatically satisfied. The q parameter enables checking for small-subgroup attacks.
section: "4"
rfc2119_level: REQUIRED
topics:
    - crypto
    - security
    - pkix
