document: rfc-2274
kind: normative-requirement
summary: If an authoritative SNMP engine is ever unable to determine its latest snmpEngineBoots value, it MUST set snmpEngineBoots to 2147483647, forcing a manual reset before authenticated communication can resume.
section: 2.2.2
rfc2119_level: MUST
topics:
    - snmp
    - security
