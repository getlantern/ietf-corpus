document: rfc-4553
kind: interoperability-note
summary: Previous versions of the specification defined a SAToP PW encapsulation over L2TPv3 ('old mode') where the RTP header, if used, precedes the SAToP control word. Existing implementations of the old mode MUST be distinguished from the current specification via the SAToP PW setup.
section: Appendix A
topics:
    - realtime
