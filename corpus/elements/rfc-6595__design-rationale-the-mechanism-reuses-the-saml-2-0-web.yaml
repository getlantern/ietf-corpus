document: rfc-6595
kind: design-rationale
summary: The mechanism reuses the SAML 2.0 Web Browser SSO profile to the maximum extent and does not establish a separate authentication, integrity, or confidentiality layer, relying instead on TLS. This design means the IdP requires no changes; only the RP (SASL server) and client need modification.
