document: rfc-7267
kind: normative-requirement
summary: Each S-PE MUST be assigned an address (at least a Global ID + Prefix in AII Type 2 format) that uniquely identifies it for the PW Switching Point PE TLV. An S-PE without such an address receiving a dynamic MS-PW Label Mapping message MUST return a Label Release with status code 'Resources Unavailable' (0x38).
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
