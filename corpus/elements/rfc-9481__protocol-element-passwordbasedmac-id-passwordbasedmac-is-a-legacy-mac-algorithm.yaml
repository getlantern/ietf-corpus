document: rfc-9481
kind: protocol-element
summary: PasswordBasedMac (id-PasswordBasedMac) is a legacy MAC algorithm combining PBKDF1-derived keys with HMAC, carried in the protectionAlg field of PKIHeader; it is optional in the updated profile and should be replaced by PBMAC1.
