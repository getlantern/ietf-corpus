document: rfc-7788
kind: protocol-element
summary: 'The border discovery algorithm evaluates each interface in order: (1) use fixed category if configured, (2) if DHCPv6 PD lease acquired with "HOMENET" user class, classify as external, (3) if DHCPv4 address acquired with "HOMENET" user class, classify as external, (4) otherwise classify as internal.'
section: "5.3"
