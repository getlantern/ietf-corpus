document: rfc-6510
kind: normative-requirement
summary: On a Resv message, LSRs MUST be prepared to receive the LSP_ATTRIBUTES object in any order in any position. Only one instance of LSP_ATTRIBUTES is meaningful within the context of a FILTER_SPEC object; subsequent instances SHOULD be ignored and MUST be forwarded unchanged.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
