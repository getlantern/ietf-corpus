document: rfc-1626
kind: normative-requirement
summary: All router implementations compliant with this specification must implement the IP Path MTU Discovery mechanism as defined in RFC-1191 and clarified by RFC-1435. Host implementations should also implement Path MTU Discovery.
section: Path MTU Discovery Required
rfc2119_level: MUST
topics:
    - ip
