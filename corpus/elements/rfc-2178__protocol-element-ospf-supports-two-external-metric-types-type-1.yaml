document: rfc-2178
kind: protocol-element
summary: 'OSPF supports two external metric types: Type 1 is expressed in the same units as internal link cost; Type 2 is considered greater than any internal AS path cost. When both exist, Type 1 always takes precedence. A forwarding address field in AS-external-LSAs allows direct routing to the actual exit point rather than through the advertising router.'
section: "2.3"
topics:
    - routing
