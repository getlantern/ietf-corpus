document: rfc-4780
kind: normative-requirement
summary: Timer D's default value MUST be equal to or greater than 32000 milliseconds for UDP transport, and its value MUST be 0 for TCP/SCTP transport, governing the time a server transaction can remain in the 'Completed' state.
section: "7.2"
rfc2119_level: MUST
