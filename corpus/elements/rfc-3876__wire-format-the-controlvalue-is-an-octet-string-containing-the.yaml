summary: The controlValue is an OCTET STRING containing the BER encoding of a ValuesReturnFilter, defined as SEQUENCE OF SimpleFilterItem. SimpleFilterItem is a CHOICE supporting equalityMatch [3], substrings [4], greaterOrEqual [5], lessOrEqual [6], present [7], approxMatch [8], and extensibleMatch [9].
