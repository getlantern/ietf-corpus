document: rfc-7648
kind: normative-requirement
summary: A PCP proxy co-located with a NAT MUST be configurable to disable relaying unknown Opcodes and mandatory-to-process unknown options, because such messages may carry hidden internal addresses or ports that would not be translated.
section: 3.4.2
rfc2119_level: MUST
topics:
    - pcp
    - nat
