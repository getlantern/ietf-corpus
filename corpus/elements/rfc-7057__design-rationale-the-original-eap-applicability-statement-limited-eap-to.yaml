document: rfc-7057
kind: design-rationale
summary: The original EAP applicability statement limited EAP to 'network access authentication where IP layer connectivity may not be available' and stated that use for bulk data transport is NOT RECOMMENDED. The bulk data prohibition remains valid, but the scope restriction proved too narrow given ABFAB application-layer authentication use cases.
section: "1"
topics:
    - security
