document: rfc-6750
kind: design-rationale
summary: Bearer tokens can either encode authorization information directly or contain a reference to it; references MUST be infeasible to guess and may require an extra server-to-issuer interaction to resolve. This document intentionally does not specify token encoding or contents.
section: "5.2"
topics:
    - oauth
    - security
