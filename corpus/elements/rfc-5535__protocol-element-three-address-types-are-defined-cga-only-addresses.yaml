document: rfc-5535
kind: protocol-element
summary: 'Three address types are defined: CGA-only addresses (bound to a public key and single prefix, no Multi-Prefix extension), CGA/HBA addresses (bound to both a public key and a prefix set, support both SeND and HBA), and HBA-only addresses (bound to a prefix set, use a random nonce instead of a public key, cannot be used for SeND).'
