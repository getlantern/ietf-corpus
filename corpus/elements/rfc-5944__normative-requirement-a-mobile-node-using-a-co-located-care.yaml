document: rfc-5944
kind: normative-requirement
summary: A mobile node using a co-located care-of address MUST be located on the link identified by the network prefix of that care-of address; otherwise datagrams to the care-of address would be undeliverable.
section: "1.7"
rfc2119_level: MUST
