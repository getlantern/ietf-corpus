document: rfc-4320
kind: security-consideration
summary: Without the prohibition on forwarding late non-INVITE responses at proxies, an attacker could easily forge messages that appear to be late responses; RFC 3261-compliant proxies are required to forward these, wasting bandwidth and CPU and potentially overwhelming user agents on low-speed connections.
section: "5"
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
