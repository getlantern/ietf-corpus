document: rfc-8444
kind: protocol-element
summary: The flooding scope of the OSPFv2 Extended Prefix Opaque LSA used for advertising the BIER Sub-TLV is area-local. To support multi-area BIER deployments, OSPF ABRs propagate BIER information between areas by copying the entire BIER Sub-TLV when originating inter-area Extended Prefix Opaque LSAs.
section: "2.3"
topics:
    - routing
    - multicast
