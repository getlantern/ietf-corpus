document: rfc-8007
kind: design-rationale
summary: Trigger Status Resource URIs are fully under dCDN control and uCDNs MUST NOT make assumptions about URI structure. Since all Trigger Status Resource URIs are returned to the uCDN when created and listed in collections, no URI structure convention is needed for discovery.
section: "4"
