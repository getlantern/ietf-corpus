document: rfc-1034
kind: protocol-element
summary: 'Optional negative response caching: an authoritative name server may include the zone''s SOA RR in the additional section of an authoritative response. The SOA MINIMUM field controls how long the negative result (NXDOMAIN or no-data) may be cached by resolvers.'
