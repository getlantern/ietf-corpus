document: rfc-6243
kind: normative-requirement
summary: In 'trim' basic mode, a valid 'delete' operation for a missing data node that has a schema default value MUST fail with a 'data-missing' error-tag. Setting a node to its schema default value MUST succeed but the value MUST NOT be saved in the datastore.
section: 2.2.3
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
