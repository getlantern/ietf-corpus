document: rfc-2535
kind: wire-format
summary: 'NXT RR RDATA (type 30): a variable-length next domain name in wire format followed by a type bit map. Each bit in the bit map represents one RR type present at the owner name; bit 30 (NXT) is always set. Trailing zero octets are prohibited. If any RR type number exceeds 127, an alternate format is indicated by setting the zero bit.'
section: "5.2"
topics:
    - dns
    - security
