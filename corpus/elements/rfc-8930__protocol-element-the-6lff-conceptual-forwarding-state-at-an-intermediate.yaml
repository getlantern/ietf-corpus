document: rfc-8930
kind: protocol-element
summary: 'The 6LFF conceptual forwarding state at an intermediate node contains: the incoming Datagram_Tag and associated interface/link-layer address of the predecessor, the node''s own source link-layer address for forwarding, the next-hop interface and link-layer address resolved on the first fragment, a locally allocated outgoing Datagram_Tag, an optional remainder buffer, and a stale-state timer.'
