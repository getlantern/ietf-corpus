document: rfc-7231
kind: security-consideration
summary: The User-Agent and Server header fields can expose product and version information useful to attackers for fingerprinting clients and servers. Senders should limit the granularity of information disclosed and operators should consider the privacy tradeoffs of detailed version tokens.
section: "9.7"
topics:
    - http
    - security
    - privacy
