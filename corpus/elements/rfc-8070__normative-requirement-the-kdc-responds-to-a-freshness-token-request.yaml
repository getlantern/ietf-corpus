document: rfc-8070
kind: normative-requirement
summary: The KDC responds to a freshness token request with a KRB_ERROR carrying error-code KDC_ERR_PREAUTH_REQUIRED and includes a padata element with padata-type PA_AS_FRESHNESS and padata-value containing the freshness token in the METHOD-DATA object.
section: "2.2"
rfc2119_level: REQUIRED
topics:
    - security
