document: rfc-7894
kind: protocol-element
summary: The estIdentityLinking attribute (id-aa-estIdentityLinking, OID id-smime 58) is a DirectoryString with maximum length 255, carrying the EST identity linking semantics from RFC 7030 Section 3.5 without confusion with legacy challengePassword uses. It is a SINGLE VALUE attribute with caseExactMatch equality matching.
section: "3.3"
topics:
