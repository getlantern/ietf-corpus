document: rfc-4610
kind: design-rationale
summary: Rate-limiting of Register and Register-Stop messages is performed end-to-end (DR→RP1→{RP2,RP3}); no additional rate-limiting logic between the RPs is required because the existing per-hop rate limiting in RFC 4601 is sufficient.
section: "4"
topics:
