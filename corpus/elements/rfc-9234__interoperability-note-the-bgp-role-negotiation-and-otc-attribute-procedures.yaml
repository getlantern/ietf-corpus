document: rfc-9234
kind: interoperability-note
summary: The BGP Role negotiation and OTC Attribute procedures are NOT RECOMMENDED between ASes within an AS Confederation (RFC 5065). If an OTC Attribute exits the Confederation, its value MUST equal the AS Confederation Identifier, not any Member-AS Number.
section: "5"
topics:
