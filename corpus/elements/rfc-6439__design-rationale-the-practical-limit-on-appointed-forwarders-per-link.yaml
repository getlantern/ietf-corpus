document: rfc-6439
kind: design-rationale
summary: The practical limit on Appointed Forwarders per link (~83 RBridges given ~1000 bytes available in a TRILL Hello, or ~166 if the Designated VLAN is an extreme value) is an incidental consequence of Hello PDU size constraints rather than a deliberate design choice. Links with more than a handful of RBridges are expected to be rare.
section: 2.2.3
topics:
    - routing
