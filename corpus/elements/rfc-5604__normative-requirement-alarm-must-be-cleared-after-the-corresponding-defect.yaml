document: rfc-5604
kind: normative-requirement
summary: Alarm MUST be cleared after the corresponding defect is undetected for the amount of time specified by pwTDMCfgClearAlarmThreshold (default 10000 milliseconds). Alarms are only reported when the defect state persists for pwTDMCfgAlarmThreshold (default 2500 milliseconds).
section: "8"
rfc2119_level: MUST
