document: rfc-4266
kind: security-consideration
summary: The Gopher protocol transmits passwords in cleartext for authentication and offers no privacy mechanisms. Both properties are considered extremely unsafe in current practice. Implementers should refer to the general URI security considerations in RFC 3986.
section: "3"
topics:
    - security
    - privacy
