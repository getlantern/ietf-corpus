document: rfc-9342
kind: design-rationale
summary: The scope of Multipoint Alternate Marking differs from RFC 5644 (which covers active one-to-group spatial metrics with a single source). This document defines group-to-group passive and hybrid measurements where multiparty metrics apply to clusters as spatial segments of a multipoint path, extending RFC 5644's metric names to the group-to-group topology.
section: "2.1"
topics:
    - measurement
