document: rfc-8641
kind: normative-requirement
summary: A publisher MUST support at least one type of selection filter (subtree or XPath). Only a single selection filter can be applied to a subscription at a time; a new filter in an RPC request replaces any existing one.
section: "3.6"
rfc2119_level: MUST
topics:
