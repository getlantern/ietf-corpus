document: rfc-9194
kind: security-consideration
summary: Writable data nodes (enable-receive, metric, whole-lan, allow-unreachable, exclude-te-metric at interface and per-level scopes) are sensitive because unauthorized write operations can alter routing metrics and negatively affect network operations; security implications are described in RFC 8500.
