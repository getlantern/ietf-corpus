document: rfc-5229
kind: protocol-element
summary: 'The "set" action supports modifiers applied before storing: ":lower" (precedence 40), ":upper" (40), ":lowerfirst" (30), ":upperfirst" (30), ":quotewildcard" (20), ":length" (10). Higher-precedence modifiers are applied first; using two modifiers of equal precedence is an error.'
section: "4.1"
