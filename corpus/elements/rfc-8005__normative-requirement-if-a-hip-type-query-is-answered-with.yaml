document: rfc-8005
kind: normative-requirement
summary: If a HIP type query is answered with RCODE=3 (Name Error), the Responder's information is not present in the DNS, and further queries for the same owner name SHOULD NOT be made.
section: "3"
rfc2119_level: SHOULD NOT
