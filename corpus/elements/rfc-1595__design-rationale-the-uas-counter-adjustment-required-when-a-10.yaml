document: rfc-1595
kind: design-rationale
summary: The UAS counter adjustment required when a 10-or-more-second SES/UAS boundary period crosses a 900-second statistics window causes successive GETs of sonetPathIntervalSES and sonetPathIntervalUAS to return differing values. This is acknowledged as 'an unavoidable side-effect of selecting the presently defined managed objects as a basis for this memo.'
section: "3.5"
topics:
