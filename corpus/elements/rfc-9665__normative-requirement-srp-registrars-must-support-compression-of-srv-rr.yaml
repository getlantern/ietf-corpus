document: rfc-9665
kind: normative-requirement
summary: SRP registrars MUST support compression of SRV RR targets in incoming SRP Updates, since requesters MAY compress these targets to save space. However, authoritative DNS servers (including those that are also SRP registrars) MUST NOT compress SRV record targets in DNS responses.
section: 3.2.5.4
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
