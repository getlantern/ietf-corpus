document: rfc-5910
kind: security-consideration
summary: Data validity checking and DS record creation at the server require computational resources. Server operators SHOULD take steps to manage command load to minimize the risk of a denial-of-service attack. Server operators SHOULD also limit the range of acceptable signature lifetime values (maxSigLife) to counter potential adverse situations.
section: "9"
rfc2119_level: SHOULD
topics:
    - dns
    - security
