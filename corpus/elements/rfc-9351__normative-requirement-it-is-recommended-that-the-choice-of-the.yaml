document: rfc-9351
kind: normative-requirement
summary: It is RECOMMENDED that the choice of the node used for originating IGP topology information into BGP-LS be made such that the advertising node supports all FAD extensions in use in its part of the network, to avoid advertising an incomplete FAD.
section: "3.6"
rfc2119_level: RECOMMENDED
