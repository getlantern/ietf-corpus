document: rfc-8539
kind: normative-requirement
summary: If the DHCPV4-RESPONSE does not contain a valid OPTION_S46_BR option with at least one valid IPv6 BR address, the client MUST discard the message, as the softwire cannot be configured without the BR address.
section: "7.1"
rfc2119_level: MUST
topics:
    - v6ops
