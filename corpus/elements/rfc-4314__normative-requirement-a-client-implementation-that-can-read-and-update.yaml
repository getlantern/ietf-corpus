document: rfc-4314
kind: normative-requirement
summary: A client implementation that can read and update ACLs but doesn't allow the user to change rights it doesn't recognize MUST preserve unrecognized rights, to avoid unintentionally removing permissions it doesn't understand.
section: 5.1.2
rfc2119_level: MUST
