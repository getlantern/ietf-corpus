document: rfc-3077
kind: security-consideration
summary: Feed tunnel end-point addresses sent in HELLO messages may be considered sensitive information on unidirectional links that are easy to intercept. Link-layer security mechanisms should be used when such information is sensitive.
section: "11"
topics:
