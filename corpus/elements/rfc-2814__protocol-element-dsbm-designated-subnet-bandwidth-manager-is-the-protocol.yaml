document: rfc-2814
kind: protocol-element
summary: DSBM (Designated Subnet Bandwidth Manager) is the protocol entity responsible for admission control on a managed L2 segment. At most one DSBM exists per segment; when multiple SBMs are present one is elected via a dynamic algorithm or static configuration.
