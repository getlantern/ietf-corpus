document: rfc-5939
kind: design-rationale
summary: 'Capabilities and potential configurations are encoded as SDP attributes within a single SDP session description (rather than multiple SDP bodies in multipart MIME) for two reasons: multipart MIME support is not ubiquitous, and unknown SDP attributes are silently ignored by entities that do not support the framework, providing seamless backwards compatibility with RFC 3264.'
section: "3.1"
topics:
