document: rfc-5488
kind: protocol-element
summary: nemoStatus (nemoSystem 2) is a read-write INTEGER { enabled(1), disabled(2) } controlling whether agent discovery and registration functions are operational. Changing from enabled to disabled terminates these functions; disabled to enabled starts them.
