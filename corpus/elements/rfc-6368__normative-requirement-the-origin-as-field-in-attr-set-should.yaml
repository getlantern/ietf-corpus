document: rfc-6368
kind: normative-requirement
summary: The Origin AS field in ATTR_SET SHOULD contain the autonomous-system number of the customer network originating the given set of attributes. It is encoded as a 32-bit unsigned integer in network byte order regardless of whether the originating PE supports 4-octet AS numbers.
section: "5"
rfc2119_level: SHOULD
topics:
    - bgp
    - vpn
