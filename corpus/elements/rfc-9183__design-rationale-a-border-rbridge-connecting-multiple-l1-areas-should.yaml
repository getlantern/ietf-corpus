document: rfc-9183
kind: design-rationale
summary: A border RBridge connecting multiple L1 areas SHOULD use a single area nickname for all those areas to minimize nickname consumption and reduce the number of nicknames advertised in L2. However, it may need to hold multiple nicknames if it is the root of multiple L1 or L2 distribution trees.
section: "6"
topics:
    - routing
