document: rfc-5464
kind: normative-requirement
summary: If SETMETADATA fails because a value is too large, the server MUST return a tagged NO with '[METADATA MAXSIZE NNN]'. If the annotation count limit is reached, it MUST return '[METADATA TOOMANY]'. If private annotations are unsupported on the mailbox, it MUST return '[METADATA NOPRIVATE]'.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
