document: rfc-6446
kind: normative-requirement
summary: The 'period' parameter for the adaptive minimum rate formula MUST be chosen to be greater than the reciprocal value of the 'adaptive-min-rate' parameter, and it is RECOMMENDED to be several times larger than that reciprocal to maximize the effectiveness of the timeout formula.
