document: rfc-6454
kind: design-rationale
summary: 'User agents determine how much authority to grant a resource by examining its media type: passive content such as images carries no authority, while active content such as HTML documents carries the full authority of its origin. Content sniffing that misidentifies media types can lead to privilege escalation vulnerabilities.'
section: "3.3"
topics:
    - security
    - http
