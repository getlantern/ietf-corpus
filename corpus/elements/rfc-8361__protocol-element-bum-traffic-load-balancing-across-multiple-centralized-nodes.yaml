document: rfc-8361
kind: protocol-element
summary: 'BUM traffic load-balancing across multiple centralized nodes uses a VLAN-based (or FGL-based) algorithm: all R-nicknames are ordered numerically 0 to k-1; for data label ID m, the egress R-nickname index is (m mod k). A node holding more R-nicknames receives a proportionally larger share of BUM traffic.'
section: "8"
topics:
    - routing
