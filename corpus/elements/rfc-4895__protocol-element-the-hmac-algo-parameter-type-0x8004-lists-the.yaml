document: rfc-4895
kind: protocol-element
summary: The HMAC-ALGO parameter (type 0x8004) lists the HMAC Identifiers the sender requests the peer to use, ordered by sender preference. It must be included once in INIT or INIT-ACK if the sender wants to send or receive authenticated chunks.
section: "3.3"
