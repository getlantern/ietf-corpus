document: rfc-5268
kind: security-consideration
summary: The BADF option protects FBU messages by computing a MAC (HMAC-SHA1 by default) using a shared key between the MN and the PAR. This ensures only the legitimate owner of the PCoA can redirect traffic, preventing hijacking of the forwarding tunnel.
