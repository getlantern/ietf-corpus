summary: 'Eight LDAP attributes are defined: calCalURI (OID .478), calFBURL (.479), calCAPURI (.480), calCalAdrURI (.481), calOtherCalURIs (.482), calOtherFBURLs (.483), calOtherCAPURIs (.484), calOtherCalAdrURIs (.485). All use IA5String syntax with caseIgnoreMatch equality. The calOther* attributes are MULTI-VALUE.'
