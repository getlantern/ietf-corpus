document: rfc-4326
kind: interoperability-note
summary: A format_identifier value of 0x554C4531 has been registered for ULE with SMPTE. Transport Streams using the PMT SHOULD insert a descriptor with this value in the PMT ES_info descriptor loop; ULE Streams may also be identified by stream_type 0x91 in SI/PSI tables.
