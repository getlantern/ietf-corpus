document: rfc-6616
kind: protocol-element
summary: The GSS-API mechanism attributes for OPENID20 are GSS_C_MA_MECH_CONCRETE, GSS_C_MA_ITOK_FRAMED, and GSS_C_MA_AUTH_INIT per RFC 5587. Per-message tokens and GSS_Pseudo_random are not supported.
