document: rfc-9173
kind: normative-requirement
summary: HMAC keys used with BIB-HMAC-SHA2 MUST be symmetric and MUST have a key length equal to the HMAC output size (i.e., multiples of 8 bytes). This ensures that special padding-aware AES key wrap algorithms are not needed.
section: "3.5"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
