document: rfc-5104
kind: interoperability-note
summary: 'H.271 message-type equivalence table: type 0 (reference picture positive ACK) maps loosely to AVPF RPSI but is not multicast-safe; types 1 (picture loss) and 2 (partial loss) map to PLI and SLI respectively; type 5 (refresh point) maps to CCM FIR. Types 3 and 4 (CRC checks) have no AVPF equivalent and are multicast-safe.'
section: 3.5.3
topics:
