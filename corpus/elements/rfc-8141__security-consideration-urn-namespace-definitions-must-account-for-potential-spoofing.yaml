document: rfc-8141
kind: security-consideration
summary: 'URN namespace definitions must account for potential spoofing: declarations ought to be taken as advisory since there is always a danger of providing misinformation. Namespace registrations should also address privacy risks such as leakage of private information when names are communicated on the public Internet and the potential for directory harvesting.'
section: "8"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
