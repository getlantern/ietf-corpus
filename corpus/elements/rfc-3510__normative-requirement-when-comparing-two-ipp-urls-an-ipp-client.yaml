document: rfc-3510
kind: normative-requirement
summary: When comparing two IPP URLs, an IPP Client MUST use the same rules as those defined for HTTP URI comparisons in RFC 2616, with the exception that a port that is empty or not given MUST be treated as equivalent to port 631.
section: "4.7"
rfc2119_level: MUST
topics:
