document: rfc-1252
kind: design-rationale
summary: The default TOS 0 metric is defined as 10^8 / ifSpeed, yielding values such as 1 for ≥100 Mbps, 10 for Ethernet, 65 for T1, and 10416 for 9.6 Kbps links. This provides unambiguous and proportional cost values derived automatically from interface speed.
