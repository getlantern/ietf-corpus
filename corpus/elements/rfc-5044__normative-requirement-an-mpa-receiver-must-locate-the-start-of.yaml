document: rfc-5044
kind: normative-requirement
summary: An MPA receiver MUST locate the start of each FPDU unambiguously and verify its CRC (if enabled) before passing the ULPDU to DDP. The ULPDU_Length field MUST be used to determine whether the entire FPDU is present before forwarding.
section: "6"
rfc2119_level: MUST
topics:
    - tcp
