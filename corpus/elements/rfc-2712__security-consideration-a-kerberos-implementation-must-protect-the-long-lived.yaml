document: rfc-2712
kind: security-consideration
summary: A Kerberos implementation must protect the long-lived secret shared between the principal and the KDC. A weak password may be subject to a dictionary attack; implementors may use secondary authentication (e.g., token card) or PKINIT (public-key-based initial KDC authentication) to strengthen security.
section: "6"
topics:
