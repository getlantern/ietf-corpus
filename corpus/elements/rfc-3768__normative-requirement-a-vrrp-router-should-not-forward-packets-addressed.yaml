document: rfc-3768
kind: normative-requirement
summary: A VRRP router SHOULD NOT forward packets addressed to the virtual IP addresses it has adopted as Master if it is not the owner, to avoid unnecessary traffic and potential forwarding loops on LANs (e.g., token ring) that receive their own transmitted packets.
section: "8.4"
rfc2119_level: SHOULD NOT
topics:
    - ip
