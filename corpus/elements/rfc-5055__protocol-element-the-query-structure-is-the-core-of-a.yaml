document: rfc-5055
kind: protocol-element
summary: The Query structure is the core of a CVRequest and MUST contain queriedCerts (CertReferences), checks (CertChecks), and validationPolicy (ValidationPolicy). Optional fields include wantBack [1], responseFlags, serverContextInfo [2], validationTime [3] GeneralizedTime, intermediateCerts [4] CertBundle, revInfos [5] RevocationInfos, producedAt [6] GeneralizedTime, and queryExtensions [7].
