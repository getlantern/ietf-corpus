document: rfc-8599
kind: normative-requirement
summary: Operators MUST ensure that the PNS-related SIP URI parameters conveyed in a REGISTER request Contact URI are not sent to other users or to non-trusted network entities. Where the SIP event package for registrations is used, subscriptions MUST be properly authenticated and authorized.
section: "13"
rfc2119_level: MUST
topics:
    - sip
    - security
    - privacy
