document: rfc-8129
kind: security-consideration
summary: Application service evaluation of site-defined indicators MUST consider the realm of original authentication in order to avoid cross-realm indicator collisions. Failure to enforce this property can result in invalid authorization decisions.
section: "5"
rfc2119_level: MUST
