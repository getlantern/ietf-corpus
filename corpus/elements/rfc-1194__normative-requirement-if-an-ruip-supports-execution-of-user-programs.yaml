document: rfc-1194
kind: normative-requirement
summary: If an RUIP supports execution of user programs in response to Finger queries, the RUIP MUST NOT allow system security to be compromised by that program, given the persistent risk of exploitable operating system bugs.
section: 3.2.5
rfc2119_level: MUST NOT
topics:
    - security
