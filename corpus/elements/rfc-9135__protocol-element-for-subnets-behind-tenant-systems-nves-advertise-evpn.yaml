document: rfc-9135
kind: protocol-element
summary: For subnets behind Tenant Systems, NVEs advertise EVPN RT-5 (IP Prefix routes) with the TS's overlay IP address as the Gateway Address field and MPLS Label=0. Receiving NVEs use recursive route resolution to resolve the subnet prefix to its advertising NVE.
section: 9.2.1
topics:
