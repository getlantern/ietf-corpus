document: rfc-4605
kind: protocol-element
summary: When building the membership database, IGMPv1/v2 and MLDv1 subscriptions are converted to IGMPv3/MLDv2 equivalents, timers are removed, and EXCLUDE-mode sources with source timer > 0 are removed before merging using IGMPv3/MLDv2 multi-membership rules.
