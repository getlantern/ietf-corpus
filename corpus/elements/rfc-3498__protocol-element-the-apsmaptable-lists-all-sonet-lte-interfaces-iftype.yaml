document: rfc-3498
kind: protocol-element
summary: The apsMapTable lists all SONET LTE interfaces (ifType sonet(39)) on the system, providing a mapping from ifIndex to APS group name (apsMapGroupName) and channel number (apsMapChanNumber, range -1..14, where -1 means not in any group and 0 means null/protection channel). Entries are automatically updated as side effects of apsChanConfigTable operations and cannot be directly created or deleted.
section: "4"
topics:
