document: rfc-5316
kind: normative-requirement
summary: The flooding-scope S bit SHOULD be set to 0 for single IGP area scope, and MAY be set to 1 for domain-wide flooding. Configuration control SHOULD be provided in ASBR implementations to select the flooding scope.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
