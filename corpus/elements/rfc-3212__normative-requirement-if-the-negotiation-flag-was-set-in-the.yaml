document: rfc-3212
kind: normative-requirement
summary: If the negotiation flag was set in the Label Request Message, the egress LSR MUST include the (possibly negotiated) Traffic Parameters and Weight in the Label Mapping message. The Traffic Parameters and Weight in a Label Mapping message MUST be forwarded unchanged.
section: 4.3.2.2
rfc2119_level: MUST
topics:
