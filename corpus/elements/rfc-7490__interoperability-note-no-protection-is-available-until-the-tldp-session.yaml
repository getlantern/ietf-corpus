document: rfc-7490
kind: interoperability-note
summary: No protection is available until the TLDP session has been established and a label for the destination has been learned from the remote LFA repair target. New tunnels require TLDP session setup and label acquisition before they can carry repair traffic, limiting the speed of bringing a new tunnel into service.
