document: rfc-4291
kind: normative-requirement
summary: When a unicast address is assigned to more than one interface (turning it into an anycast address), all nodes to which the address is assigned must be explicitly configured to know it is an anycast address.
section: "2.6"
rfc2119_level: MUST
