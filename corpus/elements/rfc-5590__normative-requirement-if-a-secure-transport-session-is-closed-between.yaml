document: rfc-5590
kind: normative-requirement
summary: If a secure transport session is closed between the time a request message is received and the corresponding response is sent, the response message SHOULD be discarded even if a new session has been established. This is architecturally a SHOULD; specific Security Models may REQUIRE it.
section: 3.3.4
rfc2119_level: SHOULD
topics:
    - snmp
    - security
