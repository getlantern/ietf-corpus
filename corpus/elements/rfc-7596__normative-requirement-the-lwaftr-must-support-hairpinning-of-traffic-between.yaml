document: rfc-7596
kind: normative-requirement
summary: The lwAFTR MUST support hairpinning of traffic between two lwB4s by performing decapsulation and re-encapsulation of packets from one lwB4 destined to another lwB4 on the same lwAFTR. The hairpinning policy MUST be configurable.
section: "6.2"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
