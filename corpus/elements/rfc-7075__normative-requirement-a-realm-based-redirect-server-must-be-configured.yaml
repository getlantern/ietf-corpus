document: rfc-7075
kind: normative-requirement
summary: A Realm-based Redirect Server MUST be configured with an application that incorporates realm-based redirection, the Local Action field set to LOCAL, an application-specific field indicating realm-based redirection, and one or more target realm identities.
section: "3.1"
rfc2119_level: MUST
