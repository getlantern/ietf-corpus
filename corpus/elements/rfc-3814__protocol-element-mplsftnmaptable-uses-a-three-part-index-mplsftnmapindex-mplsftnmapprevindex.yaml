document: rfc-3814
kind: protocol-element
summary: mplsFTNMapTable uses a three-part index (mplsFTNMapIndex, mplsFTNMapPrevIndex, mplsFTNMapCurrIndex) implementing a linked-list structure where mplsFTNMapPrevIndex points to the preceding entry on the same interface. The agent self-adjusts mplsFTNMapPrevIndex after any insertion or deletion so the list ordering remains consistent without requiring explicit reindexing.
section: "5.2"
topics:
    - mpls
    - snmp
