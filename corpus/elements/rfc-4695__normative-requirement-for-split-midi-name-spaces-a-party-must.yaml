document: rfc-4695
kind: normative-requirement
summary: For split MIDI name spaces, a party MUST NOT send several RTP MIDI streams sharing a name space in the same RTP session; each MUST be sent from a different RTP session. All such streams MUST use the same SSRC value and the same randomly chosen RTP timestamp initialization value.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
