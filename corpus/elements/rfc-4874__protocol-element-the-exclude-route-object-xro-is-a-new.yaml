document: rfc-4874
kind: protocol-element
summary: The EXCLUDE_ROUTE object (XRO) is a new RSVP-TE object (Class 232, C_Type 1) that carries a list of abstract nodes and resources that must not or should not be traversed by the LSP path. It contains a series of variable-length subobjects encoding IPv4 prefixes, IPv6 prefixes, unnumbered interface IDs, autonomous system numbers, and SRLGs.
section: "3.1"
topics:
