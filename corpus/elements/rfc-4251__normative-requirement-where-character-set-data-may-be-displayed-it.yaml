document: rfc-4251
kind: normative-requirement
summary: Where character set data may be displayed, it MUST be explicitly specified. ISO-10646 UTF-8 encoding is used in most places; internal algorithm and protocol names MUST be in US-ASCII. Client and server user names MUST be encoded using ISO 10646 UTF-8.
section: "4.5"
rfc2119_level: MUST
topics:
    - security
