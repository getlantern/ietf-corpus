document: rfc-8194
kind: security-consideration
summary: The /lmap/tasks subtree configures Tasks invokable by a Controller and SHOULD have write access only for the system responsible for configuring the MA. Care must be taken to not expose Tasks to a Controller that can cause damage to the system or network.
