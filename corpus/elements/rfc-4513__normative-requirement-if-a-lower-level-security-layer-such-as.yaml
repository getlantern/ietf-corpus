document: rfc-4513
kind: normative-requirement
summary: If a lower-level security layer (such as TLS) is installed, any SASL layer SHALL be layered on top of it regardless of negotiation order. Removing TLS does not affect the continuing service of the SASL layer.
section: 5.2.1.6
rfc2119_level: MUST
topics:
    - ldap
    - tls
    - security
