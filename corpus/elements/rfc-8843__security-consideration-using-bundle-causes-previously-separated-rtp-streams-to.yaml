document: rfc-8843
kind: security-consideration
summary: Using BUNDLE causes previously separated RTP streams to share the same security context. If different security policies would have applied to the individual streams, or if different parties would have had access to the security contexts, additional analysis is required before applying BUNDLE.
section: "17"
