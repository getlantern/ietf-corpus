kind: design-rationale
summary: The new code point analysis review requires a team of experts (designated expert team) rather than a single designated expert, because the required expertise spans Unicode, DNS, writing systems, and ICANN policy — knowledge too broad for any one person. The team must reach consensus for any nontrivial recommendations.
