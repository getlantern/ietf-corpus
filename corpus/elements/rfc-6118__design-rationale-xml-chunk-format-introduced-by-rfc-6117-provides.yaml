document: rfc-6118
kind: design-rationale
summary: XML chunk format introduced by RFC 6117 provides machine-readable, structured Enumservice records with explicit fields for class, type, subtype, URI scheme, functional specification, security considerations, usage, and registration documents. Legacy registrations lacked several of these fields and used free-form text.
