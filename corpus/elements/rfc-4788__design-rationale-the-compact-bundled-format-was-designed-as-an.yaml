document: rfc-4788
kind: design-rationale
summary: The compact bundled format was designed as an alternative to the header-free format that allows bundling multiple frames without extra headers, trading flexibility (single-rate only, no interleaving or mode change requests) for lower overhead compared to the interleaved/bundled format. This is targeted at low-bandwidth dial-up and wireless networks.
section: "1.2"
topics:
