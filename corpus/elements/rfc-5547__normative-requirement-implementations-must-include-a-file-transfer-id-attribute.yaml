document: rfc-5547
kind: normative-requirement
summary: Implementations MUST include a 'file-transfer-id' attribute in SDP offers and answers. The offerer MUST select a new globally unique random identifier; the answerer MUST copy the value into the SDP answer.
section: "8.1"
rfc2119_level: MUST
topics:
    - realtime
