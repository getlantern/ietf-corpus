document: rfc-5001
kind: interoperability-note
summary: 'NSID semantics are not transitive: an NSID request in a query asks only the directly queried server to identify itself. A recursive name server receiving an NSID request identifies itself, not the authoritative servers it queries on the client''s behalf.'
section: "3.2"
topics:
    - dns
