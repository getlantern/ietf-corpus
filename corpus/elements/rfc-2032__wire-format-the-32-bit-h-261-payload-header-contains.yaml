document: rfc-2032
kind: wire-format
summary: 'The 32-bit H.261 payload header contains: SBIT (3 bits) — unused bits at start of first octet; EBIT (3 bits) — unused bits at end of last octet; I (1 bit) — INTRA-frame only flag; V (1 bit) — motion vector flag; GOBN (4 bits) — GOB number; MBAP (5 bits) — macroblock address predictor; QUANT (5 bits) — quantizer value; HMVD (5 bits) — horizontal motion vector data; VMVD (5 bits) — vertical motion vector data.'
