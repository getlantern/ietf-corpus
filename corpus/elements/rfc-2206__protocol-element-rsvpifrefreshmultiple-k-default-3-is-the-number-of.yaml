document: rfc-2206
kind: protocol-element
summary: rsvpIfRefreshMultiple (K, default 3) is the number of refresh intervals that must elapse before unrefreshed PATH or RESV state ages out. rsvpIfRefreshBlockadeMultiple (Kb, default 4) is the minimum number of refresh intervals that blockade state persists once entered.
