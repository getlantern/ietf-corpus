document: rfc-7787
kind: normative-requirement
summary: The set of TLVs in Node Data MUST be strictly ordered by ascending binary content (type and length included). Node data content MUST be passed along exactly as received; the H(Node Data) field SHOULD be verified on receipt and mismatching TLVs SHOULD be discarded.
section: 7.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
