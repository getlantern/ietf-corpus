document: rfc-9111
kind: security-consideration
summary: Cache poisoning attacks occur when an attacker inserts a malicious response into a shared cache, distributing malicious content to many clients. A common vector exploits differences in HTTP message parsing between proxies and user agents.
section: "7.1"
topics:
