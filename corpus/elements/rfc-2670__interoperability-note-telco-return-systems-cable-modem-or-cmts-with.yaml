document: rfc-2670
kind: interoperability-note
summary: Telco Return systems (cable modem or CMTS with no upstream RF channel) are accommodated by the layering model without modification; upstream Telco Return channels are managed by PPP or modem MIBs, while the DOCSIS RF MIB only covers the downstream RF channel in such deployments.
