document: rfc-4444
kind: interoperability-note
summary: The MIB includes isisCirc3WayEnabled and isisCircExtendedCircID to support the three-way handshake for point-to-point adjacencies defined in RFC 3373. The extended circuit ID must be unique across all circuits on the IS when 3-way is enabled.
