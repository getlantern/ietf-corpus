document: rfc-8178
kind: protocol-element
summary: A 'feature package' is a set of features defined together, either as part of a minor version or as part of the same protocol extension. If a responder is aware of one protocol element within a feature package, it must be aware of all protocol elements within that feature package.
section: "2"
