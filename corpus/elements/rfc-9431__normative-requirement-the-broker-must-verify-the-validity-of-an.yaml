document: rfc-9431
kind: normative-requirement
summary: The Broker MUST verify the validity of an access token (either locally or via introspection) and MUST verify claims per ACE framework Section 5.10.1.1. For self-contained tokens the Broker MUST process the token's security protection (COSE for CWT, JOSE for JWT) before any other processing.
section: 2.2.5
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - cbor
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
