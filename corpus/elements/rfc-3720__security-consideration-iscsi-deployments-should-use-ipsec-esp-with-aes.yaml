document: rfc-3720
kind: security-consideration
summary: iSCSI deployments SHOULD use IPsec ESP with AES-CBC (minimum 128-bit key) for confidentiality and HMAC-SHA1-96 for integrity as specified in RFC 3723. IKE with certificate-based mutual authentication is recommended for high-security environments; pre-shared keys are acceptable only with strong secrets.
section: "8.3"
topics:
    - security
    - ipsec
    - crypto
