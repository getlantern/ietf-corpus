document: rfc-9621
kind: design-rationale
summary: The architecture requires applications to specify Endpoint Identifiers at a higher level of abstraction (hostname or URL) rather than IP addresses, so that the Transport Services Implementation can perform resolution, path selection, and racing on the application's behalf, enabling automatic protocol and path agility without application changes.
section: "2.3"
topics:
