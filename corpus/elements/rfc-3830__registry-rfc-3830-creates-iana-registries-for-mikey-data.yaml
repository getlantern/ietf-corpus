document: rfc-3830
kind: registry
summary: RFC 3830 creates IANA registries for MIKEY data type values, next payload type values, PRF function identifiers, CS ID map type values, encryption algorithm values (KEMAC Encr alg), MAC algorithm values, DH group identifiers, and signature type values. New entries are added via IANA registration per RFC 2434.
