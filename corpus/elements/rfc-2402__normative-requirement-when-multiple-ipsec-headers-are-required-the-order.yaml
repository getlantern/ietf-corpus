document: rfc-2402
kind: normative-requirement
summary: When multiple IPsec headers are required, the order of application MUST be defined by security policy. Each IPsec header SHOULD ignore (not zero or predict) the contents of IPsec headers to be applied later.
section: "3.3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
