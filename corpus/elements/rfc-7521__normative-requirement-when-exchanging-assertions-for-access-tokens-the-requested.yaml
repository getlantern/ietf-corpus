document: rfc-7521
kind: normative-requirement
summary: When exchanging assertions for access tokens, the requested scope MUST be equal to or less than the scope originally granted to the authorized accessor. The authorization server MUST limit the issued access token scope accordingly.
section: "4.1"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
