document: rfc-5710
kind: security-consideration
summary: The new 'Reroute' error code (34) is functionally equivalent to existing 'Notify/Local node maintenance required' and 'Notify/Local link maintenance required' semantics, so no new security considerations are introduced. Implementors should consult Sections 9 of RFC 4920 and RFC 4736 for the applicable security analysis.
