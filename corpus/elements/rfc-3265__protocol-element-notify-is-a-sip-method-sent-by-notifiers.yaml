document: rfc-3265
kind: protocol-element
summary: NOTIFY is a SIP method sent by notifiers to inform subscribers of changes in subscribed state. A single SUBSCRIBE may trigger multiple NOTIFY requests; NOTIFY does not terminate the corresponding subscription.
