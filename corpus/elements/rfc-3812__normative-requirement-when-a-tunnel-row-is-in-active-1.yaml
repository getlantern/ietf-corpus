document: rfc-3812
kind: normative-requirement
summary: When a tunnel row is in active(1) state, no objects in that row can be modified except mplsTunnelAdminStatus, mplsTunnelRowStatus, and mplsTunnelStorageType. Similarly, active hop rows restrict modification to mplsTunnelHopRowStatus and mplsTunnelHopStorageType.
section: "11"
rfc2119_level: MUST NOT
topics:
    - mpls
    - snmp
