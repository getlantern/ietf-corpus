document: rfc-2533
kind: normative-requirement
summary: If an unrecognized feature tag is encountered during feature set predicate processing, it should still be processed as a legitimate feature tag. The matching rules are designed to allow new tags without affecting existing capability assertions.
section: 4.2.3
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
