document: rfc-8332
kind: normative-requirement
summary: When authenticating with an RSA key against a server that does not implement 'server-sig-algs', clients MAY default to 'ssh-rsa' to avoid authentication penalties; once rsa-sha2-* is widely adopted, clients MAY instead default to one of the new algorithms.
section: "3.3"
rfc2119_level: MAY
topics:
    - security
    - crypto
