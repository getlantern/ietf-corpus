document: rfc-3807
kind: protocol-element
summary: The V5UA message header extends the IUA header by replacing the Spare field with the Envelope Function Address (EFA). The Tag field changes from 0x5 (IUA) to 0x81 (V5UA) to signal this extension, and the DLCI field is followed by the 13-bit EFA rather than a spare field.
section: "4.1"
topics:
