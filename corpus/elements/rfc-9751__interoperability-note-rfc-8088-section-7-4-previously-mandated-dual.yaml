document: rfc-9751
kind: interoperability-note
summary: RFC 8088 Section 7.4 previously mandated dual registration in both the 'Media Types' registry and the 'RTP Payload Format Media Types' registry. RFC 9751 removes that dual-registration requirement, updating the IANA Considerations guidance in RFC 8088 to reference only the 'Media Types' registry. The Informational status of RFC 8088 is unaffected.
section: "2"
topics:
    - rtp
    - registry
    - realtime
