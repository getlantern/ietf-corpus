document: rfc-9513
kind: protocol-element
summary: 'Four SRv6-specific MSD types are defined for OSPFv3, shared with IS-IS via the ''IGP MSD-Types'' IANA registry: Maximum Segments Left (max value of SRH Segments Left before applying Endpoint behavior), Maximum End Pop (max SIDs for PSP/USP), Maximum H.Encaps (max SIDs addable via H.Encaps), and Maximum End D (max SIDs in SRH during decapsulation).'
