document: rfc-2572
kind: protocol-element
summary: Applications register with the PDU Dispatcher by specifying a contextEngineID and one or more pduTypes they will handle via registerContextEngineID. They unregister via unregisterContextEngineID when they no longer wish to handle those PDU types.
