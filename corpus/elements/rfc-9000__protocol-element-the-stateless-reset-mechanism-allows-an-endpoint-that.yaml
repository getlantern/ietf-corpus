document: rfc-9000
kind: protocol-element
summary: The stateless reset mechanism allows an endpoint that has lost connection state to terminate the connection. It sends a packet whose last 16 bytes are a Stateless Reset Token (derived from the connection ID via an HMAC-based construction). The peer identifies the token and closes the connection.
section: "10.3"
topics:
    - quic
    - security
