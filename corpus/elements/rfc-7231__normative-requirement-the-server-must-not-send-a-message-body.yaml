document: rfc-7231
kind: normative-requirement
summary: The server MUST NOT send a message body in the response to a HEAD request; the response terminates at the end of the header section. The server SHOULD send the same header fields as it would for GET.
section: 4.3.2
rfc2119_level: MUST NOT
topics:
    - http
