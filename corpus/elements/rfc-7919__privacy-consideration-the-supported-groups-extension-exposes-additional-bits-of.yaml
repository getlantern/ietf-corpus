document: rfc-7919
kind: privacy-consideration
summary: The Supported Groups extension exposes additional bits of information that distinguish classes of TLS clients, enabling fingerprinting. To minimize fingerprinting, clients SHOULD support all named groups at or above their minimum security threshold. New groups SHOULD NOT be added to the registry without considering the fingerprinting cost.
section: "9.1"
topics:
    - tls
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
