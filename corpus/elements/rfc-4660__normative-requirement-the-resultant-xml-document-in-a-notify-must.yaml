document: rfc-4660
kind: normative-requirement
summary: The resultant XML document in a NOTIFY MUST be well formed and valid; all mandatory elements and attributes MUST be included regardless of filter expressions, so if filtering produces an invalid document, the notifier MUST add required elements from the original.
section: 5.3.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
