document: rfc-2251
kind: normative-requirement
summary: 'A server MUST evaluate filters according to the three-valued logic of X.511(93) section 7.8.1: TRUE, FALSE, or Undefined. Entries matching TRUE are returned; FALSE/Undefined are ignored. Servers MUST NOT return errors if attribute descriptions or matching rule IDs are not recognized.'
section: 4.5.1
rfc2119_level: MUST
topics:
    - ldap
