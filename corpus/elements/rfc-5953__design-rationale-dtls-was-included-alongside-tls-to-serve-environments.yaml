document: rfc-5953
kind: design-rationale
summary: DTLS was included alongside TLS to serve environments where connectionless UDP transport is preferred (e.g., where existing SNMP infrastructure uses UDP). TLS/TCP is better suited for large data transfers due to TCP's support for larger packet sizes.
section: "1"
topics:
