document: rfc-4996
kind: normative-requirement
summary: The Reserved bits in the compressed list header and in 8-bit XI items MUST be set to zero; otherwise, the decompressor MUST discard the packet. Similarly, the 4-bit Padding field MUST be set to zero when present.
section: 6.3.3
rfc2119_level: MUST
topics:
