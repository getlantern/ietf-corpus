document: rfc-7198
kind: design-rationale
summary: The capacity requirement for duplication restricts its use to managed networks and makes it unsuitable for unmanaged public networks. Duplication and de-duplication nodes must track the original stream's adaptation state (e.g., bitrate changes) and apply the same adaptation to the duplicate stream.
section: "7"
topics:
