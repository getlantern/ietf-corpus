document: rfc-2396
kind: wire-format
summary: 'An escaped octet is encoded as a triplet: the percent character ''%'' followed by exactly two hexadecimal digits representing the octet value, e.g., ''%20'' for US-ASCII space. escaped = ''%'' hex hex.'
