document: rfc-8395
kind: design-rationale
summary: The optional flow label mode allows PWs to be transported over ECMPs to achieve load-balancing, particularly beneficial for high-bandwidth Ethernet services where PW attachment circuit bandwidth and PSN core link bandwidth are of the same order of magnitude. Single-path delivery to preserve packet order remains the default.
