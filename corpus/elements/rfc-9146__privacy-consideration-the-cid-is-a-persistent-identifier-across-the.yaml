document: rfc-9146
kind: privacy-consideration
summary: The CID is a persistent identifier across the lifetime of a DTLS connection, introducing linkability risk. An on-path adversary can correlate all payloads carrying the same CID pair, just as with the 5-tuple in classical DTLS.
section: "8"
topics:
    - tls
    - privacy
