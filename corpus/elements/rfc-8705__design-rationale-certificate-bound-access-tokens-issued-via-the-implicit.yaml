document: rfc-8705
kind: design-rationale
summary: Certificate-bound access tokens issued via the implicit grant flow are explicitly out of scope because end users interact with the authorization endpoint via a web browser, and client certificates in browsers cause operational and usability problems (intrusive certificate selection UI).
