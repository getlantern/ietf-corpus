document: rfc-1905
kind: interoperability-note
summary: SNMPv1 proxy compatibility requires agents to return legacy error codes noSuchName (2), badValue (3), and readOnly (4) in specific situations. SNMPv2 managers MUST be able to handle these codes as specified in RFC 1908 coexistence rules.
section: 4.2.4
topics:
    - snmp
