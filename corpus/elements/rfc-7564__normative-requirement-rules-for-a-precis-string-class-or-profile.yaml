document: rfc-7564
kind: normative-requirement
summary: 'Rules for a PRECIS string class or profile MUST be applied in the following fixed order: (1) Width Mapping, (2) Additional Mapping, (3) Case Mapping, (4) Normalization, (5) Directionality, (6) Behavioral rules (valid/contextual/disallowed/unassigned).'
section: "7"
rfc2119_level: MUST
