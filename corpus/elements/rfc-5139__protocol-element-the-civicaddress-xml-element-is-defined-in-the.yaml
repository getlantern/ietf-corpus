document: rfc-5139
kind: protocol-element
summary: The civicAddress XML element is defined in the namespace 'urn:ietf:params:xml:ns:pidf:geopriv10:civicAddr' and contains a sequence of optional civic address fields including country, A1-A6, thoroughfare elements (RD, RDSEC, RDBR, RDSUBBR), and building-level elements (BLD, UNIT, ROOM, SEAT). All fields except 'country' and 'PLC' support the xml:lang attribute.
