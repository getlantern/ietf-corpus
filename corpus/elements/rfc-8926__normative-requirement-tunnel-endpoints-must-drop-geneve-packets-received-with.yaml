document: rfc-8926
kind: normative-requirement
summary: Tunnel endpoints MUST drop Geneve packets received with an unknown version number. Transit devices encountering an unknown version MUST treat the packet as a UDP packet with an unknown payload rather than dropping it.
section: "3.4"
rfc2119_level: MUST
topics:
