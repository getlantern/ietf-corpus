document: rfc-1116
kind: design-rationale
summary: LINEMODE was created because existing ECHO/SUPPRESS-GO-AHEAD heuristics for local line editing were unreliable and semantically incorrect. Using SUPRESS-GO-AHEAD as an indicator of line-at-a-time mode misreads RFC 858; using ECHO alone provides no way to turn off echo while keeping local editing active (e.g., during password entry).
section: "4"
