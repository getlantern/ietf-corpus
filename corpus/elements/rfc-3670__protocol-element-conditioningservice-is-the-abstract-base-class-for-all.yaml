summary: 'ConditioningService is the abstract base class for all traffic-conditioning primitives: ClassifierService, MeterService, MarkerService, DropperService, QueuingService, and PacketSchedulingService. Instances are chained into a datapath via NextService and related associations rather than by any fixed order.'
