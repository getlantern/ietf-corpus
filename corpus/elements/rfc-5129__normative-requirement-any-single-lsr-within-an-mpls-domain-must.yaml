document: rfc-5129
kind: normative-requirement
summary: Any single LSR within an MPLS domain MUST NOT be configured to enable ECN marking unless all egress LSRs surrounding it are already configured to handle ECN marking.
section: "3"
rfc2119_level: MUST NOT
topics:
