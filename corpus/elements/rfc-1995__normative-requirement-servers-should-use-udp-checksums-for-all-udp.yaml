document: rfc-1995
kind: normative-requirement
summary: Servers should use UDP checksums for all UDP responses. A cautious client that receives a UDP packet with a checksum value of zero should ignore the result and retry using TCP IXFR.
section: "2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
