document: rfc-6415
kind: normative-requirement
summary: The host-meta document root MUST be an 'XRD' element. The document SHOULD NOT include a 'Subject' element, as no URI is available to identify hosts. The use of the 'Alias' element is undefined and NOT RECOMMENDED.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
