document: rfc-4438
kind: interoperability-note
summary: The MIB is designed to accommodate multiple Name Server Information Subsets across multiple SNMP agents and contexts; the union of all subsets represents the complete Name Server database, and subsets may overlap (their intersection may be non-empty).
