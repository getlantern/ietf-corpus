document: rfc-3279
kind: normative-requirement
summary: The cofactor field MUST be included in ECDH public key parameters. The ECParameters version MUST have the value 1 (ecpVer1). If EC parameters are implicitlyCA and the CA signed with a non-ECDSA algorithm, clients MUST NOT use the elliptic curve public key.
section: 2.3.5
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
