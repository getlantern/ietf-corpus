document: rfc-4871
kind: design-rationale
summary: Two canonicalization algorithms (simple and relaxed) exist because different signers have different tolerances for in-transit modification. Relaxed tolerates whitespace normalization and header line rewrapping common among mail relays; simple requires byte-for-byte fidelity.
section: "3.4"
