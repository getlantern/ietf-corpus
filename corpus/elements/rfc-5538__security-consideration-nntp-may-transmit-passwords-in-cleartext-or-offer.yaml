document: rfc-5538
kind: security-consideration
summary: NNTP may transmit passwords in cleartext or offer no privacy at all; both are considered extremely unsafe in current practice. Alternatives are discussed in RFC 4642 (TLS) and RFC 4643 (authentication extension).
