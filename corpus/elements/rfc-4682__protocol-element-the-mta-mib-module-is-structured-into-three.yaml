document: rfc-4682
kind: protocol-element
summary: 'The MTA MIB module is structured into three object groups: pktcMtaDevBase (device characteristics), pktcMtaDevServer (back office servers and timers), and pktcMtaDevSecurity (security associations, KDC realms, and CMSes). A fourth subtree pktcMtaDevErrors holds configuration error reporting objects.'
