document: rfc-8155
kind: normative-requirement
summary: If a client wishes to communicate via a specific interface and address family, it SHOULD query TURN servers discovered for that specific interface and address family. Discovery must be performed per combination of interface and address family on multi-homed hosts.
section: "3"
rfc2119_level: SHOULD
topics:
    - nat
    - ip
