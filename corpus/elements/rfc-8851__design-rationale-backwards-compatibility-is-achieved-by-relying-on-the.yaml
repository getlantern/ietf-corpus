document: rfc-8851
kind: design-rationale
summary: Backwards compatibility is achieved by relying on the standard SDP rule that unknown 'a=' lines are ignored, meaning 'a=rid'-unaware implementations will produce valid sessions. Extensibility is achieved by having offerers include all supported restrictions and having answerers ignore unknown ones.
