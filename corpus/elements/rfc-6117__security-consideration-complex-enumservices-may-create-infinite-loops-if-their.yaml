document: rfc-6117
kind: security-consideration
summary: Complex Enumservices may create infinite loops if their resolved URI triggers additional ENUM lookups for the same E.164 number. The DNS Considerations section MUST address loop mitigation, particularly for Enumservices using the 'tel' URI Scheme or other URI Schemes using E.164 numbers.
section: "3.3"
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
