document: rfc-9540
kind: normative-requirement
summary: If the "ohttp" parameter is included in a DNS server SVCB RR, the "alpn" parameter MUST include at least one HTTP value (such as "h2" or "h3").
section: "4.2"
rfc2119_level: MUST
