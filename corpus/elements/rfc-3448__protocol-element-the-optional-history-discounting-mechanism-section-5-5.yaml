document: rfc-3448
kind: protocol-element
summary: The optional history discounting mechanism (Section 5.5) associates per-interval discount factors DF_i and a general discount factor DF (initialized to 1). When the current loss-free interval I_0 exceeds twice the weighted average I_mean, DF is reduced to 2*I_mean/I_0, clamped to a THRESHOLD of 0.5, concentrating weight on recent history.
section: "5.5"
topics:
    - congestion
    - measurement
