document: rfc-7652
kind: interoperability-note
summary: When a PCP proxy (RFC 7648) sits between PCP clients and a PCP server, the proxy authenticates independently with the server. Re-authentication between proxy and server does not interrupt service to clients because the proxy may continue sending common PCP messages during that period.
section: "8"
topics:
