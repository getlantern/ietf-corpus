document: rfc-2564
kind: design-rationale
summary: Per-row discontinuity indicators (e.g., applOpenChannelOpenTime) are used instead of sysUpTime.0 because table rows come and go with running application elements; a row appearing or disappearing does not imply a sysUpTime.0 discontinuity, nor vice versa.
