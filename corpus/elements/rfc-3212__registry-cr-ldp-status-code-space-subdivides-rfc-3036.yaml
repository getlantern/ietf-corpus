document: rfc-3212
kind: registry
summary: 'CR-LDP Status Code Space: subdivides RFC 3036 status code space in range 0x04000000-0x040000FF, allocated through IETF Consensus. Defines: Bad Explicit Routing TLV Error (0x04000001), Bad Strict Node Error (0x04000002), Bad Loose Node Error (0x04000003), Bad Initial ER-Hop Error (0x04000004), Resource Unavailable (0x04000005), Traffic Parameters Unavailable (0x04000006), LSP Preempted (0x04000007), Modify Request Not Supported (0x04000008).'
