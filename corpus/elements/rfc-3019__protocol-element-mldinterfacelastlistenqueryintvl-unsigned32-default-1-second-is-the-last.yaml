document: rfc-3019
kind: protocol-element
summary: mldInterfaceLastListenQueryIntvl (Unsigned32, default 1 second) is the Last Member Query Interval — both the Max Response Delay in Group-Specific Queries and the spacing between such queries. Reducing it lowers leave latency at the cost of more query traffic.
