document: rfc-8265
kind: normative-requirement
summary: In OpaqueString enforcement, fullwidth and halfwidth code points MUST NOT be mapped to their decomposition mappings, and any non-ASCII space MUST be mapped to SPACE (U+0020). NFC normalization MUST be applied; there is no case mapping or directionality rule.
section: 4.2.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
