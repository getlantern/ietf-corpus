kind: protocol-element
summary: AES-128-CMAC-96 is defined for TCP-AO with KDF_Alg=KDF_AES_128_CMAC, Key_Length=128 bits, and MAC_Length=96 bits. The AES-128-CMAC output is truncated from 128 bits to 96 bits.
