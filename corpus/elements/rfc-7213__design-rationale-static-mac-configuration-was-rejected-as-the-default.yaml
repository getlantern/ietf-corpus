document: rfc-7213
kind: design-rationale
summary: Static MAC configuration was rejected as the default approach because it presents an administrative burden and causes operational problems on hardware replacement, especially across provider boundaries. Broadcast (FF-FF-FF-FF-FF-FF) was also rejected due to excessive frame distribution and potential special handling by devices.
