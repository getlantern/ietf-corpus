document: rfc-3292
kind: normative-requirement
summary: On completion of a Delete All Input Port or Delete All Output Port operation, all connections on the port MUST be deleted and all dynamically assigned Label values MUST be unassigned; there MUST be no connections established in the Label space GSMP controls on that port.
section: "4.5"
rfc2119_level: MUST
topics:
    - mpls
