document: rfc-8191
kind: protocol-element
summary: 'The HNP renumbering procedure under the same LMA uses the RFC 7077 Update Notification (UPN) / Update Notification Acknowledgement (UPA) exchange: the LMA sends UPN with the new HNP to the MAG, the MAG notifies the MN and updates bindings, then sends UPA back to the LMA to confirm successful renumbering.'
section: "3"
