document: rfc-3291
kind: design-rationale
summary: InetAutonomousSystemNumber uses Unsigned32 without a range restriction (rather than 0..65535) in order to forward-compatibly support a future expansion of the AS number space to 32 bits, even though current AS numbers are limited to 16 bits.
