document: rfc-9126
kind: design-rationale
summary: HTTP POST to the authorization endpoint via user agent was considered as an alternative for large requests, but is optional per RFC 6749 and is prohibitively difficult for native mobile applications that are constrained by platform APIs to launch browsers via GET. PAR is simpler and provides additional security benefits.
section: "1"
topics:
    - oauth
    - http
