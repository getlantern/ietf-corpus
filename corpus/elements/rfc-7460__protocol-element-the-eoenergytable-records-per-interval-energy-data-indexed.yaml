document: rfc-7460
kind: protocol-element
summary: The eoEnergyTable records per-interval energy data indexed by eoEnergyParametersIndex and eoEnergyCollectionStartTime. Fields include eoEnergyConsumed, eoEnergyProvided, eoEnergyStored (all in watt-hours scaled by eoEnergyUnitMultiplier), eoEnergyAccuracy, eoEnergyMaxConsumed, eoEnergyMaxProduced, and eoEnergyDiscontinuityTime. The buffer retains eoEnergyParametersIntervalNumber intervals, replacing the oldest except when the oldest holds the max values.
