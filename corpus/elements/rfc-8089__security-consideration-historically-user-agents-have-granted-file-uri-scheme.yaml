document: rfc-8089
kind: security-consideration
summary: Historically, user agents have granted file URI scheme content a large amount of privilege, which can lead to privilege escalation attacks. The most secure option is to use globally unique identifiers as the origin for each file URI per RFC 6454; directory-based privileges have seen some success but are not widely adopted.
section: "5"
topics:
