document: rfc-2769
kind: normative-requirement
summary: A repository that receives a 'commit-request' must not redistribute the request, and must delay the response until the corresponding transaction has been processed; it must keep state about pending commit requests.
section: "7.4"
rfc2119_level: MUST
topics:
    - routing
