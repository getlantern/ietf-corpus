document: rfc-9742
kind: security-consideration
summary: The remote/destination/transport subtree exposes information about remote hosts and services (e.g., that UDP/514 syslog is enabled), which could allow a malicious user to spam those hosts. TLS transport configuration also reveals certificate properties.
section: "8"
topics:
    - syslog
    - security
