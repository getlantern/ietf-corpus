document: rfc-4762
kind: normative-requirement
summary: If a PE receives a MAC Address Withdraw Message and does not understand it, it MUST ignore the message; it will continue using stale MAC associations until they are overwritten by normal learning or aged out.
section: 6.2.1
rfc2119_level: MUST
topics:
    - mpls
