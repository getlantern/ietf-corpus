document: rfc-9396
kind: design-rationale
summary: The `scope` parameter is insufficient for fine-grained authorization such as 'transfer 45 EUR to Merchant A' or 'read access to directory A and write access to file X'. The `authorization_details` parameter introduces JSON-structured objects to express these detailed requirements in a way that scope strings cannot convey.
section: "1"
topics:
    - oauth
    - json
