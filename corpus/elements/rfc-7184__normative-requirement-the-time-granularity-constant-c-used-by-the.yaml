document: rfc-7184
kind: normative-requirement
summary: The time granularity constant C used by the Olsrv2TimeValueCompressedForm32TC textual convention MUST be the same as used by NHDP (RFC 6130). The maximum value of C is constrained to no greater than 1/1024 seconds due to the Unsigned32 millisecond representation limit of 3932160000 ms.
section: "7"
rfc2119_level: MUST
topics:
    - routing
    - snmp
