document: rfc-7170
kind: normative-requirement
summary: The Crypto-Binding TLV MUST be exchanged and verified before the final Result TLV exchange regardless of whether an inner EAP method was run. When multiple EAP methods are executed in sequence, an Intermediate-Result TLV MUST accompany the Crypto-Binding TLV after each successful method.
section: 3.3.3
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
