document: rfc-4803
kind: design-rationale
summary: Bidirectional LSPs share a single mplsXCIndex across all segments to facilitate simple references from MPLS-TE-STD-MIB and GMPLS-TE-STD-MIB and to make fate-sharing obvious. A direction indicator on each segment (forward/reverse) prevents incorrectly connecting all in-segments to all out-segments.
