document: rfc-2862
kind: protocol-element
summary: The RTP payload for real-time pointers consists of a single 32-bit word appended to the standard RTP header. It contains L, M, R flag bits, a 12-bit x-coordinate, a 3-bit PIN field, and a 12-bit y-coordinate, with two MBZ (must be zero) bits separating the fields. There is no payload-specific header.
section: "2"
topics:
