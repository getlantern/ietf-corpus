document: rfc-3312
kind: normative-requirement
summary: A UA receiving an unknown precondition-type with a 'mandatory' strength-tag MUST refuse the offer, unless the only unknown mandatory preconditions have the 'local' tag (in which case the UA need not participate). When refusing due to an unknown type, the 'unknown' strength-tag is used in the failure SDP.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
