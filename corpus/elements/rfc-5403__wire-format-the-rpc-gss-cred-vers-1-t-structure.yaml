summary: 'The rpc_gss_cred_vers_1_t structure encodes: gss_proc (rpc_gss_proc_t), seq_num (unsigned int), service (rpc_gss_service_t), and handle (variable-length opaque). This structure is used for both version 1 and version 2 credentials, with rgc_version in the outer union selecting the version.'
