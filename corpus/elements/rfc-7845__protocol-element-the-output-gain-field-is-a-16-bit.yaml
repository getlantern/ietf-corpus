document: rfc-7845
kind: protocol-element
summary: The Output Gain field is a 16-bit signed Q7.8 fixed-point value in dB representing 20*log10 of the factor to scale decoder output. Players and media frameworks SHOULD apply it by default; any additional volume adjustment MUST be applied in addition to this gain.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
