document: rfc-2531
kind: protocol-element
summary: dpi (Integer >0) indicates resolution; dpi-xyratio (Rational >0) expresses the ratio of horizontal to vertical resolution. When dpi-xyratio is present and not equal to 1, dpi indicates horizontal resolution and vertical resolution equals dpi divided by dpi-xyratio.
section: "3.2"
extracted_by: claude-sonnet-4-6
