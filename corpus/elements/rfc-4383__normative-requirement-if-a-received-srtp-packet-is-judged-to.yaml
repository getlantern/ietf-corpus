document: rfc-4383
kind: normative-requirement
summary: If a received SRTP packet is judged to be replayed, it MUST be discarded and the event SHOULD be logged. If the SRTP integrity tag verification fails, the packet MUST likewise be discarded and the event SHOULD be logged.
section: 4.4.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
