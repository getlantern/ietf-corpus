document: rfc-7112
kind: interoperability-note
summary: The requirement to include the entire IPv6 Header Chain in the First Fragment does not preclude the use of large payloads; only the headers (IPv6 base header through Upper-Layer Header) must fit in the First Fragment. The payload data may still be fragmented across subsequent fragments.
section: "1"
topics:
