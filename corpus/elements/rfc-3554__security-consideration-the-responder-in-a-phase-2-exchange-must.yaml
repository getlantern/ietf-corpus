document: rfc-3554
kind: security-consideration
summary: The Responder in a Phase 2 exchange MUST verify the Initiator's authority to receive traffic for all addresses in the Initiator's Phase 2 selectors. Failure allows any valid Phase 1 peer to claim another peer's addresses and intercept their traffic.
section: "4"
rfc2119_level: MUST
topics:
    - sctp
    - ipsec
    - security
