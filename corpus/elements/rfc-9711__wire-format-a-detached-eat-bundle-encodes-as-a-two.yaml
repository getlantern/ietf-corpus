document: rfc-9711
kind: wire-format
summary: 'A Detached-EAT-Bundle encodes as a two-element CBOR array: a main-token (Nested-Token) and a map of label-to-wrapped-claims-set pairs. In CBOR, each claims set is a byte-string-wrapped Claims-Set; in JSON, it is base64url encoded. CBOR tag 602 identifies tagged bundles.'
