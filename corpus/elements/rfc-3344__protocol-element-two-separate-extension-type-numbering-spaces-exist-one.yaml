document: rfc-3344
kind: protocol-element
summary: 'Two separate extension type numbering spaces exist: one for Mobile IP control messages (UDP port 434) and one for ICMP Router Discovery messages. Types 32/33/34 are defined for control messages; types 0/16/19 for ICMP Router Discovery. This orthogonality allows identical type values across spaces.'
section: "1.8"
topics:
