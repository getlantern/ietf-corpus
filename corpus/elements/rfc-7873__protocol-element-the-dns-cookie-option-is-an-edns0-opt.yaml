document: rfc-7873
kind: protocol-element
summary: The DNS COOKIE option is an EDNS0 OPT RR option (OPTION-CODE 10) carried in the RDATA of an OPT RR in both requests and responses. It uses two distinguished formats—client-only and client-plus-server—that share the same option code and are distinguished solely by length.
