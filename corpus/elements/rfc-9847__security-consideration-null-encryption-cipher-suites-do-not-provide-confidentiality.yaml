document: rfc-9847
kind: security-consideration
summary: NULL-encryption cipher suites do not provide confidentiality and MUST NOT be used in protocols or applications that require confidentiality as a security property. EXPORT suites use weak ciphers (deprecated in TLS 1.1). Anonymous (anon) suites provide no authentication and are vulnerable to on-path attacks.
section: "5"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
