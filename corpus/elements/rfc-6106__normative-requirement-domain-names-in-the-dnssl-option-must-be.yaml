document: rfc-6106
kind: normative-requirement
summary: Domain names in the DNSSL option MUST be encoded using the RFC 1035 Section 3.1 label sequence technique and MUST NOT be encoded in compressed form as described in RFC 1035 Section 4.1.4. The field size MUST be a multiple of 8 octets, with remaining octets padded with zeros.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
