document: rfc-4825
kind: protocol-element
summary: Namespace bindings for node selector evaluation are encoded in the URI query component as xpointer xmlns() expressions (e.g., '?xmlns(a=urn:test:ns)'). If no query component is present, only the application usage's default document namespace is defined. A server MUST ignore xpointer expressions not from the xmlns() scheme.
section: "6.4"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
