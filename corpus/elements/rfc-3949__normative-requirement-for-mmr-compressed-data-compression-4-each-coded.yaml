document: rfc-3949
kind: normative-requirement
summary: For MMR-compressed data (Compression=4), each coded strip MUST include an end-of-facsimile-block (EOFB) code at its end. The uncompressed mode bit in T6Options MUST be set to 0 for fax; T6Options must be present and equal 0.
section: 4.2.2
rfc2119_level: MUST
topics:
    - email
