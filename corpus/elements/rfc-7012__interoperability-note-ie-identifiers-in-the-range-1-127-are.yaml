document: rfc-7012
kind: interoperability-note
summary: IE identifiers in the range 1–127 are backward-compatible with NetFlow version 9 field types (RFC 3954). New assignments in this range are restricted to IEs that are compatible with the NetFlow v9 protocol, ensuring tools supporting both protocols can share the same identifier space.
