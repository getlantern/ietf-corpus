document: rfc-7952
kind: protocol-element
summary: For DSDL schema mapping, if the data model contains at least one 'md:annotation' statement, a RELAX NG named pattern (recommended name '__yang_metadata__') MUST be added as a child of the root grammar element, and a reference to it MUST appear in every element pattern for anydata, container, leaf, leaf-list, or list nodes.
