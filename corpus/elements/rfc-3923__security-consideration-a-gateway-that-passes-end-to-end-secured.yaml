document: rfc-3923
kind: security-consideration
summary: A gateway that passes end-to-end secured stanzas between XMPP and non-XMPP services MUST be compliant with the minimum security requirements of the instant messaging and presence protocols it interfaces with, as the S/MIME object integrity is preserved end-to-end.
