document: rfc-6190
kind: normative-requirement
summary: The M bit of an RTP packet whose payload is an NI-MTAP MUST be set to 1 if the last NAL unit in decoding order of the access unit associated with the RTP timestamp is contained in the packet.
section: "4.1"
rfc2119_level: MUST
topics:
