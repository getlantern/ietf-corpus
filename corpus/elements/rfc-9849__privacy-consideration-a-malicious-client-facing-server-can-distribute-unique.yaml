document: rfc-9849
kind: privacy-consideration
summary: 'A malicious client-facing server can distribute unique per-client ECHConfig values as tracking vectors. Clients can mitigate by flushing DNS and ECHConfig state when changing networks. ECHConfig rotation rate is also a trade-off: too-frequent rotation reduces the anonymity set size.'
section: "10.3"
topics:
