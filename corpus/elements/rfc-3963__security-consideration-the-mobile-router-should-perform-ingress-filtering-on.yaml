document: rfc-3963
kind: security-consideration
summary: 'The Mobile Router SHOULD perform ingress filtering on packets received from the Mobile Network: source IP addresses must belong to a Mobile Network Prefix and must not match any of the Mobile Router''s own addresses. This prevents nodes in the Mobile Network from launching IP spoofing attacks through the bi-directional tunnel.'
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
