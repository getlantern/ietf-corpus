document: rfc-6793
kind: normative-requirement
summary: A NEW BGP speaker receiving a malformed AS4_PATH or AS4_AGGREGATOR attribute in an UPDATE message from an OLD BGP speaker MUST discard the attribute and continue processing the UPDATE message. The error SHOULD be logged locally for analysis.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
