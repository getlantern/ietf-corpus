document: rfc-7006
kind: normative-requirement
summary: The combined set of actual and potential configurations for any given media description MUST NOT use the 'ccap' attribute to negotiate more than one address with an IN network type; it is not permissible to select between IPv4 and IPv6 address families or different IP addresses within the same family.
section: 3.1.2
rfc2119_level: MUST NOT
topics:
    - realtime
    - sip
    - ip
