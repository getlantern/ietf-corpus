document: rfc-9903
kind: protocol-element
summary: 'TI-LFA (Topology Independent LFA) is modeled as an optional feature (''ti-lfa'') augmenting the OSPF interface fast-reroute/lfa subtree. It includes an enabled boolean (default false) and selection-tie-breakers: node-protection and srlg-disjoint, each with a configurable priority (uint8, default 128, lower value = more preferred).'
section: "3"
topics:
