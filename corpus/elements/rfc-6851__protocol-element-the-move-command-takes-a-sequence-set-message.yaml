document: rfc-6851
kind: protocol-element
summary: The MOVE command takes a sequence set (message sequence numbers) and a mailbox name as arguments. It moves each message in the set from the currently selected source mailbox to the named target mailbox, creating a new message with a new UID in the target and removing the original from the source, appearing to the client as a single atomic action.
section: "3.1"
topics:
    - email
