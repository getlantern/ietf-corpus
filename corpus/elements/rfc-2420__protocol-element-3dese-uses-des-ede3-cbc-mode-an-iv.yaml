document: rfc-2420
kind: protocol-element
summary: '3DESE uses DES-EDE3-CBC mode: an IV is XOR''d with the first 64-bit plaintext block, then the keyed DES function is applied as Encrypt(k1), Decrypt(k2), Encrypt(k3) to produce ciphertext. Successive blocks XOR the previous ciphertext block with the current plaintext before applying DES-EDE3.'
section: "1.1"
