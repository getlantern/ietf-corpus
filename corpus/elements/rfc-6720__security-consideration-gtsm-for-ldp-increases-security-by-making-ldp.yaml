document: rfc-6720
kind: security-consideration
summary: GTSM for LDP increases security by making LDP more resilient to off-link attacks. By verifying that incoming LDP/TCP packets have TTL=255, packets forged from outside the directly connected subnet are discarded before they consume router CPU resources.
