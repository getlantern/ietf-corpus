document: rfc-1195
kind: normative-requirement
summary: All IS-IS routers MUST ignore and pass through any TLV codes in received PDUs that are not recognized. This allows IP-specific TLVs to be safely ignored by OSI-only routers and OSI-specific TLVs to be safely ignored by IP-only routers.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
