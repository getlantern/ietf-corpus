document: rfc-8976
kind: normative-requirement
summary: For the SIMPLE scheme, all records including glue and occluded data MUST be included in the digest; duplicate RRs MUST be omitted (only one instance digested); the placeholder apex ZONEMD RR(s) and the RRSIG covering the apex ZONEMD RRset MUST NOT be included.
section: 3.3.1.1
rfc2119_level: MUST
topics:
