document: rfc-5234
kind: design-rationale
summary: External encoding (e.g., 7-bit ASCII, 8-bit octets, 16-bit Unicode) is intentionally separated from ABNF grammar definitions so the same grammar can be used across multiple encoding environments. Encoding details are explicitly out of scope for ABNF itself.
section: "2.4"
