document: rfc-3772
kind: security-consideration
summary: The security of VSAP is subject to the provisions of the proprietary mechanism used. Implementations wishing to avoid security problems SHOULD send LCP Configure-Nak in response to Configure-Request specifying VSAP, or MAY terminate operation.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
