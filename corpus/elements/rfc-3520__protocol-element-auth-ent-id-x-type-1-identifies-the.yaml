kind: protocol-element
summary: 'AUTH_ENT_ID (X-Type 1) identifies the entity that authorized the session. It supports nine sub-types: IPV4_ADDRESS (32-bit), IPV6_ADDRESS (128-bit), FQDN, ASCII_DN, UNICODE_DN, URI, KRB_PRINCIPAL, X509_V3_CERT, and PGP_CERT.'
