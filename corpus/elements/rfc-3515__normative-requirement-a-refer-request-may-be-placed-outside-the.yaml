document: rfc-3515
kind: normative-requirement
summary: A REFER request MAY be placed outside the scope of a dialog created with an INVITE. REFER creates a dialog and MAY be Record-Routed, hence MUST contain a single Contact header field value. REFERs occurring inside an existing dialog MUST follow the Route/Record-Route logic of that dialog.
section: "2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
