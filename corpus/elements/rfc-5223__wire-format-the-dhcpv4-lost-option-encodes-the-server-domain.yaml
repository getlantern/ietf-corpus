summary: 'The DHCPv4 LoST option encodes the server domain name as: Code=137 (1 byte), Len=n (1 byte), followed by RFC 1035 DNS name encoding (variable, up to 255 octets). Each label is a 1-octet length followed by that many octets; a zero-length byte terminates the name.'
