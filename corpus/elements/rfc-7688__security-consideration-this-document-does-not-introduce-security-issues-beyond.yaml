document: rfc-7688
kind: security-consideration
summary: This document does not introduce security issues beyond those in RFC 3630 and RFC 4203. Opaque LSAs are not used for SPF computation or normal routing, so the extensions have no direct effect on IP routing. However, tampering with GMPLS TE LSAs may affect the underlying transport, and the security mechanisms of RFC 2328 apply to Opaque LSAs in OSPFv2.
section: "5"
topics:
    - security
    - routing
