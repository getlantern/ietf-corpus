document: rfc-8610
kind: security-consideration
summary: Where a CDDL matcher is part of a system's implementation, the security of that system must not depend solely on the correctness of the CDDL specification or CDDL tool; additional independent defenses must be in place. CDDL correctness cannot be assumed as a security property.
section: "5"
topics:
    - security
    - cbor
