document: rfc-4013
kind: interoperability-note
summary: SASLprep is intended for use with SASL mechanisms such as PLAIN, CRAM-MD5, and DIGEST-MD5. Any specification wishing to use SASLprep must explicitly incorporate RFC 4013 and provide precise details as to where and how this algorithm is used.
section: "1"
topics:
