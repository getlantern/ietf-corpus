document: rfc-7260
kind: normative-requirement
summary: The control plane MAY provide information on whether OAM entities need to be set up. If OAM entities are created, control-plane signaling MUST provide a means to activate/deactivate OAM message flows and associated alarms.
section: "3"
rfc2119_level: MUST
topics:
