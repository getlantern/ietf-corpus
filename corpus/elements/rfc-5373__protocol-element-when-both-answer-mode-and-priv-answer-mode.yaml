document: rfc-5373
kind: protocol-element
summary: When both Answer-Mode and Priv-Answer-Mode are present in a request, the UAS first tests authorization for Priv-Answer-Mode. If authorized, it processes as if only Priv-Answer-Mode was present; otherwise it falls back to processing as if only Answer-Mode was present.
section: "4.1"
topics:
