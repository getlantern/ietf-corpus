document: rfc-3464
kind: registry
summary: 'IANA maintains registries of address-types (e.g., ''rfc822''), diagnostic-types (e.g., ''smtp''), and MTA-name-types (e.g., ''dns''). Registrations require: proposed name, syntax specification, encoding rules for non-ASCII values, and optionally a mapping to Internet addresses or DSN status codes. Names beginning with ''X-'' are excluded.'
section: 2.1.2
topics:
