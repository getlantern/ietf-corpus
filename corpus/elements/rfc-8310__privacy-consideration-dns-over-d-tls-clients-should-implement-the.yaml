document: rfc-8310
kind: privacy-consideration
summary: 'DNS-over-(D)TLS clients SHOULD implement the RFC 7871 privacy election: if a client does not include an edns-client-subnet option with SOURCE PREFIX-LENGTH set to 0, the DNS server may leak client address information to upstream authoritative servers.'
section: "11.1"
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
