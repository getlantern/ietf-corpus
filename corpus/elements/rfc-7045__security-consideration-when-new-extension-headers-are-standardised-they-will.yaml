document: rfc-7045
kind: security-consideration
summary: When new extension headers are standardised, they will exercise new code paths in hosts that recognise them, so caution may be required during deployment. The deployment process is expected to be slow and dependent on satisfactory operational experience, and new extensions will fail in some parts of the Internet until deployment is complete.
section: "3"
topics:
