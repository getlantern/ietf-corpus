document: rfc-9231
kind: normative-requirement
summary: 'For RSA-MD5 signatures, the value input to the signature function MUST contain a prepended ASN.1 algorithm object identifier for the hash function. The FF octet in PKCS #1 v1.5 padding MUST be repeated enough times so the quantity being encrypted is exactly one octet shorter than the RSA modulus.'
section: 2.3.1
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
