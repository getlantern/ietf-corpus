document: rfc-6339
kind: wire-format
summary: 'The encapsulated token format is an ASN.1 DER SEQUENCE: a 0x60 application tag byte, a DER-encoded length, a 0x06 OID tag byte, the DER-encoded OID length, the OID octets, then the raw token data. For example, 3-byte input ''foo'' with OID 1.2.840.113554.1.2.2 produces the 16-byte sequence 60 0e 06 09 2a 86 48 86 f7 12 01 02 02 66 6f 6f.'
section: "6"
topics:
