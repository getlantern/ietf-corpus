document: rfc-8512
kind: protocol-element
summary: 'The external-ip-address-pool list (feature: basic-nat44 or napt44 or nat64) specifies pools of external IPv4 prefixes (inet:ipv4-prefix, mandatory) identified by pool-id (uint32, must >= 1). Multiple non-contiguous blocks are supported, aligning with RFC 6888''s requirement that the NAT external address pool have no size or contiguity limitations.'
section: "2.5"
topics:
    - nat
    - yang
extracted_by: claude-sonnet-4-6
