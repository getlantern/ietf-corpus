document: rfc-2574
kind: normative-requirement
summary: Report messages MUST be sent with a securityLevel of noAuthNoPriv, because an SNMP engine may generate Reports even when it does not know the user on whose behalf the triggering message was sent.
section: "11.4"
rfc2119_level: MUST
topics:
    - snmp
    - security
