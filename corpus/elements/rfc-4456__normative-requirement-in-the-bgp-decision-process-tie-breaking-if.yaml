document: rfc-4456
kind: normative-requirement
summary: In the BGP Decision Process tie-breaking, if a route carries the ORIGINATOR_ID attribute, the ORIGINATOR_ID SHOULD be treated as the BGP Identifier of the advertising speaker in Step f), replacing the use of the actual neighbor's BGP Identifier.
section: "9"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
