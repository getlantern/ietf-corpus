document: rfc-1248
kind: protocol-element
summary: ospfVirtIfTable (OID ospf 9) describes OSPF virtual links; indexed by ospfVirtIfAreaID (the transit area, which must not be 0.0.0.0) and ospfVirtIfNeighbor (RouterID); virtual interface state is limited to down(1) or pointToPoint(4).
section: "5.9"
