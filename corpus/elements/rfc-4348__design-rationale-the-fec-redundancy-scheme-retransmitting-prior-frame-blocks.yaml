document: rfc-4348
kind: design-rationale
summary: The FEC redundancy scheme (retransmitting prior frame-blocks alongside current ones using a sliding window) was designed to require no signaling at session setup, because a packet with redundant frames is indistinguishable from one with only new frames. This is simpler than RFC 2198 for spreads of up to 5 frame times.
section: "4.1"
topics:
    - rtp
    - realtime
