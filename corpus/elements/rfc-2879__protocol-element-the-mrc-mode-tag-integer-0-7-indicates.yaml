document: rfc-2879
kind: protocol-element
summary: The 'MRC-mode' tag (Integer 0..7) indicates MRC (Mixed Raster Content per ITU T.44) availability and maximum mode number; zero means MRC is unavailable. 'MRC-max-stripe-size' (Integer) bounds the number of scan lines per MRC stripe.
section: "3.8"
