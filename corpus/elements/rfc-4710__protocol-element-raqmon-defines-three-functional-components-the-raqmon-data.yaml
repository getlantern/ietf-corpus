summary: 'RAQMON defines three functional components: the RAQMON Data Source (RDS) on end-devices (IP phones, IM clients, etc.), the RAQMON Report Collector (RRC) as a computationally resourceful network server aggregation point, and the RAQMON MIB extending the RMON MIB for management application access via SNMP.'
