document: rfc-5885
kind: design-rationale
summary: The VCCV control channel provides the context to bind and bootstrap the BFD session without exchanging discriminator values out-of-band; the pseudowire demultiplexer field (MPLS PW Label or L2TPv3 Session ID) demultiplexes the first BFD Control packet, so single-hop BFD initialization procedures are followed.
