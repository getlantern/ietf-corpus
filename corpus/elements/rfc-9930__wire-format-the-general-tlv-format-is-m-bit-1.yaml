document: rfc-9930
kind: wire-format
summary: 'The general TLV format is: M bit (1=mandatory, 0=optional), R bit (reserved, 0), TLV Type (14-bit field, values 0–19 assigned), Length (2 octets, length of Value field in octets), and Value. If a peer or server receives a TLV with an unknown mandatory type, it MUST send a NAK TLV and ignore all other TLVs in that message.'
section: 4.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
