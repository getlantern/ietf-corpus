document: rfc-7578
kind: design-rationale
summary: The nested 'multipart/mixed' method for multiple files per field (from RFC 2388) was deprecated because no known sender implementations exist, and the simpler approach of repeated top-level parts with the same 'name' parameter matches all widely deployed implementations.
