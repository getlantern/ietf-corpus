document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords should not be embedded in the userinfo subcomponent of a URI; cleartext transmission of authentication information has proven to be a security risk. Implementations should reject storage of such data in unencrypted form.
section: "7.5"
topics:
    - security
    - privacy
