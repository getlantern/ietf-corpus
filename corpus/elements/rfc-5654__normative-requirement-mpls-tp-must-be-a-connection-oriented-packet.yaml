document: rfc-5654
kind: normative-requirement
summary: MPLS-TP MUST be a connection-oriented packet-switching technology with traffic-engineering capabilities that allow deterministic control of the use of network resources. It MUST support traffic-engineered P2P and P2MP transport paths.
section: "2.1"
rfc2119_level: MUST
topics:
