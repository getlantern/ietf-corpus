document: rfc-2496
kind: interoperability-note
summary: When an agent proxies for DS3/E3 devices and has communication gaps, some performance intervals may be unavailable. dsx3ValidIntervals reports the maximum interval number for which data is available; dsx3InvalidIntervals counts intervals within that range with no data. Missing far-end interval rows return noSuchInstance.
section: 2.4.4
topics:
