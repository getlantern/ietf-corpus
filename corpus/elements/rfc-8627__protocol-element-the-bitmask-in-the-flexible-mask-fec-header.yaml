document: rfc-8627
kind: protocol-element
summary: The bitmask in the flexible mask FEC header can be 15, 46, or 110 bits. The k-bit in each mask word indicates whether another mask word follows (k=1) or if this is the last block (k=0), allowing variable-length coverage of up to 110 source packets.
