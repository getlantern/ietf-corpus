document: rfc-9357
kind: protocol-element
summary: The LSP-EXTENDED-FLAG TLV (Type=64) is a new TLV for the LSP object that provides an extended Flag field as an array of 32-bit flag units. It follows the standard PCEP TLV format with a 16-bit Type, 16-bit Length, and variable-length LSP Extended Flags field.
