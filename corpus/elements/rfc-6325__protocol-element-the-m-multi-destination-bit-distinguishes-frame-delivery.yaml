summary: 'The M (Multi-destination) bit distinguishes frame delivery modes: M=0 indicates known unicast where the egress nickname field specifies the decapsulating RBridge; M=1 indicates multi-destination delivery where the egress nickname field specifies a distribution tree root nickname selected by the ingress RBridge.'
