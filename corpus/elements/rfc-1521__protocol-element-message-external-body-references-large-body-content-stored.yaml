document: rfc-1521
kind: protocol-element
summary: Message/External-Body references large body content stored externally, using an 'access-type' parameter. Defined access types are 'ftp', 'tftp', 'anon-ftp', 'local-file', 'afs', and 'mail-server'. A Content-ID header is mandatory for all message/external-body entities to enable caching.
section: 7.3.3
topics:
    - email
