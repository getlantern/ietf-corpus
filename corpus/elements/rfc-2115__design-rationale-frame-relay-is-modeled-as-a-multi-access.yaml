document: rfc-2115
kind: design-rationale
summary: Frame Relay is modeled as a multi-access medium rather than a group of point-to-point connections. This single-interface-with-many-virtual-connections model allows a network manager to group all virtual connections with their corresponding physical connection, simplifying diagnostics and troubleshooting.
section: "4.1"
