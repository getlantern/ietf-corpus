document: rfc-6681
kind: protocol-element
summary: 'Six Fully-Specified FEC Schemes are defined: Schemes 1 and 2 for arbitrary packet flows using Raptor (RFC 5053) and RaptorQ (RFC 6330) respectively; Schemes 3 and 4 are optimized variants for small source blocks; Schemes 5 and 6 apply to a single flow already carrying a sequence number.'
