document: rfc-7265
kind: normative-requirement
summary: 'For properties with ENCODING=BASE64: if the value type is BINARY, the base64 encoding MUST be preserved; if the value type is not BINARY, the ENCODING parameter MUST be removed and the value MUST be base64 decoded. Base64 encoding MUST conform to RFC 4648 Section 4.'
section: "3.1"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
