document: rfc-2743
kind: wire-format
summary: 'Section 3.2 defines the Mechanism-Independent Exported Name Object Format: a header containing a 2-byte token identifier (0x04 0x01), a 2-byte OID length, the DER-encoded mechanism OID, a 4-byte name length, and the mechanism-specific name bytes. This blob is generated by GSS_Export_name() and supports direct binary comparison for ACL lookups.'
section: "3.2"
topics:
