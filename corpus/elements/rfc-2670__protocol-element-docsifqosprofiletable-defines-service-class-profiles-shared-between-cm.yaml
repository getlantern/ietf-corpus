summary: docsIfQosProfileTable defines service class profiles shared between CM and CMTS, comprising priority (0–7), max/guaranteed upstream bandwidth, max downstream bandwidth, max TX burst (mini-slots), and a baseline privacy flag. Entries may be created by management station or automatically from REG-REQ/TFTP option file.
