document: rfc-3255
kind: interoperability-note
summary: RFC 2615 supports only STS-3c-SPE, STS-12c-SPE, STS-48c-SPE, and STS-192c-SPE on the SONET side (VC-4, VC-4-4c, VC-4-16c, VC-4-64c on SDH side), with VC-4-4c and above not widely supported in SDH networks at the time of publication.
