document: rfc-2440
kind: design-rationale
summary: The Iterated-and-Salted S2K type encodes the iteration count in a single octet using the formula count = (16 + (c & 15)) << ((c >> 4) + 6), providing a wide range of hash-work levels in minimal space. This compactly represents counts large enough to significantly impede dictionary attacks.
section: 3.6.1.3
