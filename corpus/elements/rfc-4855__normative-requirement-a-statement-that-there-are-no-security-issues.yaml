document: rfc-4855
kind: normative-requirement
summary: A statement that there are 'no security issues associated with this type' MUST NOT be confused with 'the security issues associated with this type have not been assessed'; all descriptions of security issues MUST be as accurate as possible.
section: "5"
rfc2119_level: MUST NOT
