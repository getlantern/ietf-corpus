document: rfc-4150
kind: design-rationale
summary: The statistics structure is designed so that adjacent report intervals can be combined by simple addition rules (S(N), S(S(X)), MAX(Xmax), MIN(Xmin), and a positional correction term for S(I·X)), allowing a management station to merge two 30-second reports into a 60-second report without re-processing raw data.
