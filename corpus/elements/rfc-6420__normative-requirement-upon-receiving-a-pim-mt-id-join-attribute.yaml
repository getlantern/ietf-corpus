document: rfc-6420
kind: normative-requirement
summary: Upon receiving a PIM MT-ID Join Attribute, a router MUST validate the encoding, apply conflict resolution rules to determine which MT-ID to use, and then use the identified topology for RPF unless overridden by local configuration. Local configuration always takes precedence.
section: 4.2.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
