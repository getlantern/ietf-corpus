document: rfc-8860
kind: design-rationale
summary: RTP was originally restricted to single media types per session because RTCP timing rules assume all media flows in a session have broadly similar reporting requirements; mixing audio and video can result in either excessive or insufficient RTCP for some flows depending on configuration.
section: "3"
topics:
