document: rfc-8089
kind: normative-requirement
summary: When a file URI is produced representing textual data from the Unicode Standard, the data SHOULD be encoded as octets according to UTF-8 before percent-encoding is applied, as per Section 2.5 of RFC 3986.
section: "4"
rfc2119_level: SHOULD
