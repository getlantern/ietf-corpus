document: rfc-9112
kind: security-consideration
summary: HTTP does not define a specific message integrity mechanism; it relies on transport error detection and length/chunk-delimited framing. The "https" scheme provides authenticated encryption, but care is needed to ensure TLS connection closure cannot be used to truncate messages.
section: "11.3"
topics:
    - http
    - security
    - tls
