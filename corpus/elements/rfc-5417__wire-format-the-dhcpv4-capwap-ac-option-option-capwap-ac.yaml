document: rfc-5417
kind: wire-format
summary: The DHCPv4 CAPWAP AC option (OPTION_CAPWAP_AC_V4, code 138) carries one or more 32-bit IPv4 addresses of CAPWAP ACs. The option-length field MUST be a multiple of four, with ACs listed in preference order.
