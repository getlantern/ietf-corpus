document: rfc-3288
kind: registry
summary: IANA maintains a list of SOAP profile features registered using the template in Section 6.1. Features not registered with IANA must have identifiers starting with 'x-'. The IESG designates an expert reviewer; developers must solicit commentary on beepwg@lists.beepcore.org before contacting the IESG.
