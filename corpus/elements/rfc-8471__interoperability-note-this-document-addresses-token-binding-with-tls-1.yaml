document: rfc-8471
kind: interoperability-note
summary: This document addresses Token Binding with TLS 1.2 (RFC 5246). Token Binding for TLS 1.3 is addressed separately in draft-ietf-tokbind-tls13. Specifications using Token Binding with application protocols such as HTTP (RFC 8473) MAY prohibit TLS renegotiation in combination with Token Binding to avoid synchronization complexity.
section: "1"
topics:
    - tls
    - http
