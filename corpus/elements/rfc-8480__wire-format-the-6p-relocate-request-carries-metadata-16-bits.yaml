document: rfc-8480
kind: wire-format
summary: The 6P RELOCATE Request carries Metadata (16 bits), CellOptions (8 bits), NumCells (8 bits), a Relocation CellList of exactly NumCells entries, and a Candidate CellList of NumCandidate entries (0, NumCells, or more). In a 3-step transaction the Candidate CellList MUST be empty.
section: 3.3.3
