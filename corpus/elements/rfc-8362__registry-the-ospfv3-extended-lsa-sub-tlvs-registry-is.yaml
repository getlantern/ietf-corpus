document: rfc-8362
kind: registry
summary: 'The ''OSPFv3 Extended LSA Sub-TLVs'' registry is created within the existing OSPFv3 IANA registry. Values 0–3 are assigned (Reserved, IPv6-Forwarding-Address, IPv4-Forwarding-Address, Route-Tag). Range 4–32767: IETF Review/IESG Approval; 32768–33023: Experimental; 33024–45055: FCFS; 45056–65535: unassigned.'
