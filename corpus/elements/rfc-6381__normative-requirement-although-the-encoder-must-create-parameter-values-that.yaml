document: rfc-6381
kind: normative-requirement
summary: Although the encoder MUST create parameter values that are complete and accurate in 'breadth' (reporting all four-character codes used in all tracks), receivers MUST NOT rely on the parameter values being complete in 'depth', since hierarchical rules for a codec code may have been written after a server was implemented.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
