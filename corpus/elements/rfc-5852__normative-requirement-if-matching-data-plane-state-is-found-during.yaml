document: rfc-5852
kind: normative-requirement
summary: If matching Data Plane state is found during MP-to-CP Handover, the LSR MUST save the Path state (including the set H bit), MUST forward the Path message to the egress, and MUST retain any MP state associated with the LSP.
section: "4.1"
rfc2119_level: MUST
