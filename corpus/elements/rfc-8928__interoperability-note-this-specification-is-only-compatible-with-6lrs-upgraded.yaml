document: rfc-8928
kind: interoperability-note
summary: This specification is only compatible with 6LRs upgraded to support it; in mixed deployments the 'A' flag must remain unset until all 6LRs are upgraded. An attacker can defeat protection by attaching to any legacy 6LR in the subnet.
section: "7.1"
topics:
    - ip
    - security
