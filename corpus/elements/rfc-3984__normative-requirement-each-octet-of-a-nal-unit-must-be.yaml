document: rfc-3984
kind: normative-requirement
summary: Each octet of a NAL unit MUST be part of exactly one fragment. Fragments of the same NAL unit MUST be sent in consecutive ascending RTP sequence number order with no intervening packets from the same stream. STAPs and MTAPs MUST NOT be fragmented; FUs MUST NOT be nested.
section: "5.8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
