document: rfc-2630
kind: normative-requirement
summary: SignedData version must be 1 when no attribute certificates are present, encapsulated type is id-data, and all SignerInfos are version 1; version must be 3 if attribute certificates are present, encapsulated type is not id-data, or any SignerInfo is version 3.
section: "5.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
