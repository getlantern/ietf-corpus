document: rfc-7150
kind: normative-requirement
summary: 'A PCE that receives a PCReq containing a Vendor Information object MUST act according to the P flag: if the P flag is set, the object is mandatory and the request must either be processed using the object''s contents or rejected per RFC 5440; if the P flag is clear, the object MAY be used or ignored.'
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
