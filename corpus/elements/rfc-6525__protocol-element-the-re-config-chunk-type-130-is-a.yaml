document: rfc-6525
kind: protocol-element
summary: The RE-CONFIG chunk (Type 130) is a new SCTP chunk used to carry stream reconfiguration requests and responses. It contains one or two Re-configuration Parameters and uses chunk type upper-bits '10' so unrecognized receivers ignore it and continue processing.
section: "3.1"
