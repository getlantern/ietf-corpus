document: rfc-3332
kind: protocol-element
summary: 'The SSNM message class carries SS7 network management events: Destination Unavailable (DUNA), Destination Available (DAVA), Destination State Audit (DAUD), Signalling Congestion (SCON), Destination User Part Unavailable (DUPU), and Destination Restricted (DRST). Each carries a mandatory Affected Point Code and optional Network Appearance, Routing Context, and INFO String.'
