document: rfc-5619
kind: security-consideration
summary: A rogue softwire concentrator can impersonate the legitimate SC when no prior trust relationship is established, enabling denial-of-service via packet blackholing and full eavesdropping of all SI traffic. Mutual authentication is the primary countermeasure.
