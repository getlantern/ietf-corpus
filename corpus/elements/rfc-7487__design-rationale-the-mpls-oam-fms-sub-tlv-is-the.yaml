summary: The MPLS OAM FMS Sub-TLV is the only OAM Configuration TLV requiring examination by intermediate nodes because server MEPs at intermediate points — co-located with an MPLS-TP client/server adaptation function — must be instructed to originate AIS/LKR signals toward client LSPs upon detecting faults.
