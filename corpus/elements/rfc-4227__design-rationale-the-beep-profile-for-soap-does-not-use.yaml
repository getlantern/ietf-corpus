document: rfc-4227
kind: design-rationale
summary: The BEEP profile for SOAP does not use the BEEP ERR message for SOAP faults; SOAP faults are always returned in RPY (one-to-one) or ANS (one-to-many) messages. ERR is reserved for BEEP-level errors unrelated to the SOAP envelope (e.g., malformed MIME).
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
