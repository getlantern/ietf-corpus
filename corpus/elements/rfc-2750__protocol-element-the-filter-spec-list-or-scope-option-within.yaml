document: rfc-2750
kind: protocol-element
summary: The FILTER_SPEC (list) or SCOPE option within POLICY_DATA associates the object with specific flows; the two types are mutually exclusive. In WF/SE styles the FILTER_SPEC option preserves the original flow/POLICY_DATA association across PIN nodes that may independently alter flow lists.
section: "3.2"
