document: rfc-9135
kind: normative-requirement
summary: The EVPN Router's MAC Extended Community MUST be added to RT-2 routes when an Ethernet NVO tunnel is used for symmetric IRB. If an IP NVO tunnel type is used, this extended community is not required.
section: 9.1.1
rfc2119_level: MUST
