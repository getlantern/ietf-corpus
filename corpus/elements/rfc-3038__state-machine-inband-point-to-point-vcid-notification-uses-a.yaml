document: rfc-3038
kind: state-machine
summary: 'Inband point-to-point VCID notification uses a 3-way handshake: upstream node A sends VCID PROPOSE through the new VC; node B replies with VCID ACK over the LDP VC; node A then sends an LDP Label Request, after which node B sends an LDP Label Mapping. The handshake states are: VC established, PROPOSE sent, ACK received, REQUEST sent, MAPPING received.'
section: 3.1.1
topics:
