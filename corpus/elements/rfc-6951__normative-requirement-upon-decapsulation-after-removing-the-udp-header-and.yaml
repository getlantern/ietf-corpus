document: rfc-6951
kind: normative-requirement
summary: Upon decapsulation, after removing the UDP header and finding the SCTP association via the verification tag, the UDP source port MUST be stored as the encapsulation port for the destination address from which the SCTP packet was received.
section: "5.4"
rfc2119_level: MUST
topics:
    - sctp
    - udp
