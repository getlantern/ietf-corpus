summary: 'RFC 9111 updates the HTTP Field Name Registry: Age, Cache-Control, and Expires are registered as permanent; Pragma is marked deprecated; Warning is marked obsoleted. The HTTP Warn Codes registry is annotated to note that Warning has been obsoleted.'
