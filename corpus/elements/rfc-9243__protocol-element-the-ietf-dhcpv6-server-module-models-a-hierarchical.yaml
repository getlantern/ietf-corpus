document: rfc-9243
kind: protocol-element
summary: 'The ietf-dhcpv6-server module models a hierarchical address and prefix allocation structure: a top-level allocation-ranges container holds global resource-config parameters, under which an allocation-range list specifies IPv6 prefixes, and within each range, separate address-pools (guarded by the na-assignment feature) and prefix-pools (guarded by the prefix-delegation feature) are defined.'
section: "3.1"
