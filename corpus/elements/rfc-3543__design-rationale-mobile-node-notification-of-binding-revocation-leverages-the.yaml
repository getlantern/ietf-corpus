document: rfc-3543
kind: design-rationale
summary: 'Mobile node notification of binding revocation leverages the existing agent advertisement sequence number mechanism from RFC 3344: a foreign agent can reset the sequence number to 0 in a unicast advertisement to signal that the binding is no longer active, without introducing new protocol machinery for the mobile node.'
section: "4.1"
topics:
    - mobility
