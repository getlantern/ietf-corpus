kind: state-machine
summary: 'Authorization states: pending → valid (any challenge validated) or invalid (challenge fails/error); valid → revoked (server action), deactivated (client action), or expired (time passes ''expires''). Order states: pending → ready (all authz valid) → processing (finalize submitted) → valid (cert issued) or invalid (error, authz failure, or expiry).'
