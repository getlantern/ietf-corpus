document: rfc-2745
kind: normative-requirement
summary: If an error condition prevents a DREP from being forwarded further, the message is simply dropped. If an error condition prevents a DREQ from being forwarded further, the node must convert the DREQ to a DREP and return it to the requester address.
section: "4.4"
rfc2119_level: MUST
topics:
    - qos
