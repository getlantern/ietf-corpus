document: rfc-4467
kind: design-rationale
summary: The INTERNAL mechanism incorporates a means of identifying the token generation algorithm within the token so that if the algorithm must be changed (e.g., due to a discovered attack), the server can support a transition period validating tokens under either the old or new algorithm.
