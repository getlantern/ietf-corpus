summary: 'The ''OSPFv2 Extended Prefix Opaque LSA TLVs'' registry (added to OSPFv2 Parameters) defines top-level TLVs for Extended Prefix Opaque LSAs. Initial allocations: 0=Reserved, 1=OSPFv2 Extended Prefix TLV. Range 32768-33023 for Experimental Use; 33024-65535 requires an IETF specification before assignment.'
