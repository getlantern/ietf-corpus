document: rfc-9600
kind: normative-requirement
summary: When decapsulating a non-IP inner frame with an ECN indication understood by the RBridge, the egress MUST follow RFC 9599 Section 4.4 guidelines to set ECN information in the decapsulated native frame, combining the TRILL flags word with the inner frame per Table 3.
section: 3.3.2
rfc2119_level: MUST
topics:
    - ecn
