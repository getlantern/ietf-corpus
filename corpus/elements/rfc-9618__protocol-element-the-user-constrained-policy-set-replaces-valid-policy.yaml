summary: The user_constrained_policy_set replaces valid_policy_tree as a primary output. It is computed from valid_policy_node_set (leaf nodes not under anyPolicy plus any depth-n anyPolicy node), producing authority_constrained_policy_set, then filtered by user-initial-policy-set and augmented with anyPolicy-qualified entries if needed.
