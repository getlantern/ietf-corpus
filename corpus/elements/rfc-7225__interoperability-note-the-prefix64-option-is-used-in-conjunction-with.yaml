document: rfc-7225
kind: interoperability-note
summary: The PREFIX64 option is used in conjunction with the PORT_SET option in SIP/RTP scenarios to enable IPv6-only SIP UAs to exchange media with IPv4-only UAs without requiring an ALG at the NAT64 or special functions at the IPv4-only SIP Proxy Server.
section: "5.2"
topics:
