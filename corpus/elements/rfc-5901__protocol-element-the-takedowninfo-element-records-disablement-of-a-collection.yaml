document: rfc-5901
kind: protocol-element
summary: The TakeDownInfo element records disablement of a collection site, with optional TakeDownDate, zero or more TakeDownAgency free-form strings, and TakeDownComments. Multiple TakeDownInfo elements per PhraudReport are permitted to support multi-agency or multi-date takedown activities.
section: "5.12"
