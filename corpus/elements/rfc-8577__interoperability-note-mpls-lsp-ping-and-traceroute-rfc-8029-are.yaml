document: rfc-8577
kind: interoperability-note
summary: MPLS LSP ping and traceroute (RFC 8029) are applicable for Segment Routed RSVP-TE tunnels. Existing procedures allow the label stack imposed at a delegation hop to be reported back in the Label Stack Sub-TLV in MPLS echo replies for traceroute.
