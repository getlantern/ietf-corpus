document: rfc-4836
kind: normative-requirement
summary: An agent implementing repeater-MAU related objects MUST also comply with the snmpRptrModCompl compliance statement of the 802.3 Repeater MIB (RFC 2108); the values of rpMauGroupIndex and rpMauPortIndex SHALL be the same as rptrPortGroupIndex and rptrPortIndex for the connected port.
section: 3.2.2
rfc2119_level: MUST
topics:
    - snmp
