document: rfc-5538
kind: design-rationale
summary: The 'news-message-ID' MIME external-body access type was registered in 1993 to allow one article to annotate another via MIME message/external-body without actual inclusion; 'news' URIs now provide a more common modern equivalent for accessing articles by Message-ID.
