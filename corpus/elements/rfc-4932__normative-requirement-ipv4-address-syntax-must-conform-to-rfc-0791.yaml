document: rfc-4932
kind: normative-requirement
summary: IPv4 address syntax MUST conform to RFC 0791 and IPv6 address syntax MUST conform to RFC 4291. A server MAY reject IP addresses not allocated for public use by IANA. IP addresses SHOULD be required only as needed to generate DNS glue records.
section: "2.5"
rfc2119_level: MUST
topics:
    - dns
    - ip
