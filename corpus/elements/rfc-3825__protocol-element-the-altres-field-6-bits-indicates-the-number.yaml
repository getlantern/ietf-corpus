document: rfc-3825
kind: protocol-element
summary: The AltRes field (6 bits) indicates the number of valid bits in the Altitude value. Values above 30 are undefined and reserved. If AT=1 (meters), an AltRes of 0 indicates unknown altitude; maximum precision is AltRes=30.
section: "2.1"
