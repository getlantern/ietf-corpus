document: rfc-3566
kind: design-rationale
summary: The 96-bit truncation length was selected because it is the default authenticator length specified in the AH specification and meets the security requirements described in XCBC-MAC-2. This aligns AES-XCBC-MAC-96 with other IPsec authenticators such as HMAC-SHA-1-96.
section: "4.3"
topics:
    - crypto
    - ipsec
    - security
