document: rfc-7272
kind: protocol-element
summary: The SDP media-level attribute 'rtcp-idms' signals participation in IDMS and carries the SyncGroupId (a decimal 32-bit unsigned integer, 0=empty, 4294967295 reserved). Both senders and receivers may insert it; it may appear multiple times for a session to couple multiple synchronization groups.
