document: rfc-6696
kind: normative-requirement
summary: The rIK MUST remain on the peer and the ER server and MUST NOT be transported to any other entity. The rIK MUST NOT be used to derive any keys other than as specified in this document, and MUST be expired when the EMSK expires.
section: "4.4"
rfc2119_level: MUST NOT
topics:
