document: rfc-5547
kind: state-machine
summary: 'On receiving an SDP offer for a push, the answerer checks: (1) if port is zero, close and do nothing; (2) if port non-zero and ''file-transfer-id'' already seen, keep existing session; (3) if port non-zero and ''file-transfer-id'' is new, prompt user and initiate new file transfer.'
section: 8.3.1
topics:
    - realtime
