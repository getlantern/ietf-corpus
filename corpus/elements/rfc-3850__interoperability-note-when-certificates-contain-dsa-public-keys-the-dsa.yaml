document: rfc-3850
kind: interoperability-note
summary: When certificates contain DSA public keys, the DSA parameters may be located only in the root certificate, requiring the recipient to possess both the end-entity and root certificates to perform signature verification. This is a valid reason to transmit the root certificate in a message.
section: "2.3"
topics:
    - email
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
