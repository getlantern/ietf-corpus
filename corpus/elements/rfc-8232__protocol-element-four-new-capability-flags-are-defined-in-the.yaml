summary: 'Four new capability flags are defined in the STATEFUL-PCE-CAPABILITY TLV: S bit (bit 30, INCLUDE-DB-VERSION), D bit (bit 27, DELTA-LSP-SYNC-CAPABILITY), F bit (bit 26, TRIGGERED-INITIAL-SYNC), and T bit (bit 28, TRIGGERED-RESYNC). Each must be advertised during session establishment.'
