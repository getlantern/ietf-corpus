document: rfc-7900
kind: normative-requirement
summary: RTs MUST be assigned so that UMH-eligible routes from different VPNs covering an ambiguous IP address have no RT in common, preventing an egress VRF from falsely correlating an A-D route from one VPN with a UMH route from another.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
