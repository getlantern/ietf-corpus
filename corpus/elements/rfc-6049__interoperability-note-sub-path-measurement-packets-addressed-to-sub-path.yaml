document: rfc-6049
kind: interoperability-note
summary: Sub-path measurement packets (addressed to sub-path edge nodes) may traverse different physical paths through ECMP or bundled links than packets addressed to the complete-path endpoints, causing composed performance estimates to differ from actual complete-path performance.
section: 3.1.8.1
topics:
    - measurement
