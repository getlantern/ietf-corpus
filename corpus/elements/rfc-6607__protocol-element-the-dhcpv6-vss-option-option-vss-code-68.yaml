document: rfc-6607
kind: protocol-element
summary: The DHCPv6 VSS option (OPTION_VSS, code 68) carries a Type byte and VSS information and may be included by either a DHCPv6 client or relay agent in Relay-forward messages (or directly in client messages). Minimum option length is 1 octet. Code and length fields are each 2 octets.
section: "3.4"
