document: rfc-5854
kind: protocol-element
summary: The 'metalink:url' element contains a file IRI and MAY have a 'priority' attribute (positive integer 1–999999, lower = higher priority) and a 'location' attribute (ISO 3166-1 alpha-2 country code). Elements without a priority attribute are treated as lowest priority (999999).
section: 4.2.16
