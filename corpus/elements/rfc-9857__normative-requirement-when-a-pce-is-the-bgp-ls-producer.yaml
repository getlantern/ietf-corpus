document: rfc-9857
kind: normative-requirement
summary: When a PCE is the BGP-LS Producer, it MUST NOT include its own identifiers in the Node Descriptor TLV; the Node Descriptor TLV MUST carry only the identifiers of the SR Policy headend.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
