document: rfc-4880
kind: wire-format
summary: Multiprecision integers (MPIs) consist of a two-octet bit-length scalar followed by the integer octets in big-endian order. Unused bits in the most significant octet MUST be zero. The total size is ((MPI.length + 7) / 8) + 2 octets.
section: "3.2"
topics:
