document: rfc-8420
kind: interoperability-note
summary: RFC 7427 defines SIGNATURE_HASH_ALGORITHMS where each IKE peer lists supported hash algorithms, assuming all signature schemes involve a hashing phase. EdDSA does not fit this model; RFC 8420 extends that mechanism with the "Identity" identifier to accommodate hash-free signature algorithms.
section: "1"
topics:
