document: rfc-4409
kind: protocol-element
summary: A Message Submission Agent (MSA) is a process that accepts messages from MUAs on port 587, and either delivers them directly or relays them as an SMTP client to an MTA. It operates under submission-specific policies distinct from those of relay MTAs.
section: "2.1"
