document: rfc-6726
kind: normative-requirement
summary: Whenever content encoding is applied to a file, the 'Content-Encoding' attribute MUST be included in the FDT file description entry and MUST be used as described in RFC 2616. 'Content-MD5' MUST NOT be regarded as a security mechanism.
section: 3.4.2
rfc2119_level: MUST
topics:
    - multicast
