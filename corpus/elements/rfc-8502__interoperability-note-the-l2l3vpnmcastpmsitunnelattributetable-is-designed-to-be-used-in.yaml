document: rfc-8502
kind: interoperability-note
summary: The l2L3VpnMcastPmsiTunnelAttributeTable is designed to be used in conjunction with other MIBs such as MPLS-TE-STD-MIB (RFC 3812) via l2L3VpnMcastPmsiTunnelPointer and IF-MIB (RFC 2863) via l2L3VpnMcastPmsiTunnelIf, enabling cross-table lookups for complete P-tunnel configuration and interface information.
