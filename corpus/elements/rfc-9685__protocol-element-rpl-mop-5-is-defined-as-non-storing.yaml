kind: protocol-element
summary: RPL MOP 5 is defined as 'Non-Storing Mode of Operation with ingress replication multicast support', where the RPL Root performs ingress replication by transmitting one copy of each multicast packet to each 6LR that is transit for the multicast target using source-routing headers.
