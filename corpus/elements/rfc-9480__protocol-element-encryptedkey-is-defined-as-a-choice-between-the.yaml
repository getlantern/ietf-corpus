document: rfc-9480
kind: protocol-element
summary: EncryptedKey is defined as a CHOICE between the deprecated EncryptedValue and EnvelopedData (tagged [0]). It is used in CMP to transport private keys, certificates, or revocation passphrases in encrypted form. EnvelopedData is the recommended choice.
