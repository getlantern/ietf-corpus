document: rfc-6320
kind: normative-requirement
summary: Because ANCP uses TCP (a reliable transport), the GSMPv3 fragmentation mechanism is unnecessary. An ANCP agent MUST set the I Flag and SubMessage Number fields to 1 to signify 'no fragmentation'.
section: 3.6.1.7
rfc2119_level: MUST
topics:
    - tcp
