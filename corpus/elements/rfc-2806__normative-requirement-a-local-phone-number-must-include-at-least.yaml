document: rfc-2806
kind: normative-requirement
summary: A local-phone-number MUST include at least one area-specifier; the local entity MUST NOT attempt to place the call if it cannot originate calls within the specified locale. Multiple area-specifier instances are permitted, meaning the number is valid in all listed areas.
section: 2.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
