document: rfc-5049
kind: design-rationale
summary: Compartment lifetime was simplified to be linked only to REGISTER transactions (not to SIP dialogs or transactions) because the complexity introduced by dialog/transaction-scoped compartments (e.g., requiring edge proxies to keep dialog state) outweighed the benefits in most deployment scenarios.
section: "9.3"
topics:
    - sip
