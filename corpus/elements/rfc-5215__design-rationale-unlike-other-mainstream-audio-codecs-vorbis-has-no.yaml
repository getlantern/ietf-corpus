document: rfc-5215
kind: design-rationale
summary: Unlike other mainstream audio codecs, Vorbis has no statically configured probability model; all entropy decoding configuration (VQ and Huffman models) must be transmitted to the decoder as codebook headers before any audio can be decoded. This necessitates special in-band and out-of-band delivery mechanisms for configuration data in RTP.
section: "3"
topics:
