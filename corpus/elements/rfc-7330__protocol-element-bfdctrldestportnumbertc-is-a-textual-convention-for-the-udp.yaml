document: rfc-7330
kind: protocol-element
summary: BfdCtrlDestPortNumberTC is a Textual Convention for the UDP destination port of BFD control packets. Port 3784 represents single-hop, 4784 multi-hop, and 6784 BFD on LAG sessions; the value 0 is reserved for special conditions.
