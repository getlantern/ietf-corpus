document: rfc-9838
kind: normative-requirement
summary: If the IKE SA is closed and no GIKE_UPDATE policy was received during registration, the GM MUST consider itself excluded from the group and must re-register. By convention, the GCKS closes the IKE SA; the GM SHOULD NOT close it unilaterally.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
