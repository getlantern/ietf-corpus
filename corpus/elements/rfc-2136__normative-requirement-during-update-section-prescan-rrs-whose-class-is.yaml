document: rfc-2136
kind: normative-requirement
summary: During Update Section prescan, RRs whose CLASS is not ANY must not have TYPE of ANY, AXFR, MAILA, MAILB, or any unrecognized type; violations signal FORMERR. CLASS=ANY or CLASS=NONE RRs must have TTL=0, else FORMERR.
section: 3.4.1
rfc2119_level: MUST
