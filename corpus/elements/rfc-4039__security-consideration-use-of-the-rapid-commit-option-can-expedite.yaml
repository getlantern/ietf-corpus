document: rfc-4039
kind: security-consideration
summary: 'Use of the Rapid Commit option can expedite denial-of-service attacks: a mischievous client can consume all available addresses more rapidly, or do so without requiring two-way communication, since injecting DHCPDISCOVER messages with Rapid Commit is sufficient to cause a server to allocate an address.'
section: "6"
topics:
    - security
