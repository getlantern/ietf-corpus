document: rfc-3182
kind: protocol-element
summary: Kerberos user authentication uses a KERBEROS_TKT CREDENTIAL sub-type. The Kerberos ticket for the next-hop network node or its PDP is obtained from the KDC and inserted as the CREDENTIAL OctetString in an AUTH_USER policy element.
section: "4.2"
topics:
