document: rfc-5996
kind: normative-requirement
summary: Both parties in the IKE_AUTH exchange MUST verify that all signatures and MACs are computed correctly. If shared-secret authentication is used, the names in the ID payload MUST correspond to the key used to generate the AUTH payload.
section: "1.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
