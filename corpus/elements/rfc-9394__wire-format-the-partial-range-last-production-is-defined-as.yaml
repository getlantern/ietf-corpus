document: rfc-9394
kind: wire-format
summary: The partial-range-last production is defined as "MINUS nz-number ":" MINUS nz-number" (e.g., -500:-400), requesting results from newest (highest UIDs) to oldest. A range -500:-400 is equivalent to -400:-500.
