document: rfc-7986
kind: registry
summary: 'IANA created two new iCalendar registries: ''Display Types'' (initial values: BADGE, GRAPHIC, FULLSIZE, THUMBNAIL) and ''Feature Types'' (initial values: AUDIO, CHAT, FEED, MODERATOR, PHONE, SCREEN, VIDEO). New values may be added per RFC 5545 Sections 8.2.1 and 8.2.6.'
