document: rfc-9554
kind: design-rationale
summary: The N property gains secondary surname and generation components to facilitate formatting with the Unicode CLDR Person Name standard and to properly represent naming conventions (e.g., paternal/maternal surnames) that implementations currently force into the family-name or honorific-suffixes components.
section: "2.2"
