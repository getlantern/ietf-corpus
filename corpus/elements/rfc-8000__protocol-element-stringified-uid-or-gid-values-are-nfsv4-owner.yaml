document: rfc-8000
kind: protocol-element
summary: Stringified UID or GID values are NFSv4 owner and group strings consisting of decimal numeric values with no leading zeros and no '@' sign, as defined in RFC 5661 Section 5.9. These MUST NOT be used in multi-domain deployments.
