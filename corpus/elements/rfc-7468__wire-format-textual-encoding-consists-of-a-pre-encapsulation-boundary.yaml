document: rfc-7468
kind: wire-format
summary: Textual encoding consists of a pre-encapsulation boundary line '-----BEGIN <label>-----', followed by base64-encoded data (per RFC 4648 Section 4), followed by a post-encapsulation boundary line '-----END <label>-----'. There is exactly one space between 'BEGIN'/'END' and the label, and exactly five hyphen-minus characters on each side.
