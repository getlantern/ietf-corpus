document: rfc-6030
kind: wire-format
summary: Triple-DES key bundles are encoded as a concatenated OCTET STRING of Key1 || Key2 || Key3 (each 64 bits, 8 bytes, MSB first), with two-key Triple-DES using Key2 in place of Key3. The encoding must match SP 800-67 Appendix B test vectors.
section: 4.2.2
topics:
