document: rfc-9148
kind: protocol-element
summary: 'CoAP response code mapping: GET requests (/crts, /att) return 2.05 on success; POST requests (/sen, /sren, /skg, /skc) return 2.04 on success. Delayed responses use 5.03 with Max-Age. HTTP 4xx/5xx map to equivalent CoAP 4.xx/5.xx codes.'
