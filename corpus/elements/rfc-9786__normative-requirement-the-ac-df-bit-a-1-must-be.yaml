document: rfc-9786
kind: normative-requirement
summary: The AC-DF bit (A=1) MUST be set to 0 when advertising Port Mode DF Election capability (P=1). Upon receiving the AC-DF bit set (A=1) from a remote PE, it MUST be ignored when performing Port Mode DF Election, because AC (sub-interface) down events do not influence port-level DF election.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
