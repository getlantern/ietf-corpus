document: rfc-5291
kind: registry
summary: IANA created the 'BGP Outbound Route Filtering (ORF) Types' registry. Value 0 is reserved; 1–63 require Standards Action or Early IANA Allocation; 64–127 are First Come First Served; 128–255 are vendor-specific and not assigned by IANA. The ORF Capability itself is assigned Capability Code 3.
