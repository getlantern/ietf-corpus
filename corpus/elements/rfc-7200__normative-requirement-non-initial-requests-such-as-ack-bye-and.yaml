document: rfc-7200
kind: normative-requirement
summary: Non-initial requests such as ACK, BYE, and CANCEL MUST NOT be subjected to load filtering. Additionally, SUBSCRIBE requests are not filtered if the event-type header indicates the load-control event package itself.
section: 5.3.2
rfc2119_level: MUST NOT
topics:
