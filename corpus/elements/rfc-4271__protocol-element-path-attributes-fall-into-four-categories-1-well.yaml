document: rfc-4271
kind: protocol-element
summary: 'Path attributes fall into four categories: (1) well-known mandatory — must be in every NLRI-bearing UPDATE; (2) well-known discretionary — may or may not be sent; (3) optional transitive — forwarded to other ASes with Partial bit logic; (4) optional non-transitive — not forwarded beyond the receiving AS.'
