document: rfc-9627
kind: normative-requirement
summary: When the C bit is 1, TTID MUST NOT be less than CTID, and TLID MUST NOT be less than CLID; at least one of TTID or TLID MUST be greater than CTID or CLID respectively, ensuring the target layer is an upgrade from the current layer.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
