document: rfc-3033
kind: design-rationale
summary: For long-lived session signaling, the Generic Identifier IE was chosen over B-LLI, B-HLI, and User-user IEs to carry the session identifier because it best matches the original purpose of these elements — the Generic Identifier is specifically designed for identifier transfer between c-planes.
