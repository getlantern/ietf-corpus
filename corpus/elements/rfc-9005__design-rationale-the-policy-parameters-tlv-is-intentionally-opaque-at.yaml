document: rfc-9005
kind: design-rationale
summary: The POLICY-PARAMETERS-TLV is intentionally opaque at the protocol level, carrying parameters in any format understood by PCEP peers. This design choice decouples policy parameter encoding from the PCEP protocol itself, at the cost of requiring out-of-band agreement on encoding formats.
section: "5.1"
topics:
    - mpls
    - routing
