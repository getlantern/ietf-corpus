document: rfc-5245
kind: normative-requirement
summary: After ICE completes, agents MUST send keepalives at least once every 15 seconds on each selected candidate pair using STUN Binding Indications, to maintain NAT bindings. If the selected pair uses a relayed candidate, TURN channel data or Send indications may substitute.
section: "10"
rfc2119_level: MUST
topics:
    - nat
    - webrtc
