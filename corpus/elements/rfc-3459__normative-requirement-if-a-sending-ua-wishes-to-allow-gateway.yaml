document: rfc-3459
kind: normative-requirement
summary: If a sending UA wishes to allow gateway decryption of encrypted content, the sending UA MUST mark the encrypted content as not REQUIRED; otherwise the gateway will treat unmarked encrypted content as REQUIRED.
section: "7"
rfc2119_level: MUST
topics:
    - email
    - crypto
