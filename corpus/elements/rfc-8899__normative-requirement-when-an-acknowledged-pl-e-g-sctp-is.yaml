document: rfc-8899
kind: normative-requirement
summary: When an acknowledged PL (e.g., SCTP) is used and DPLPMTUD is in the SEARCH_COMPLETE state, DPLPMTUD SHOULD NOT continue to generate PLPMTU probes, and a sender MUST NOT implement the CONFIRMATION_TIMER.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - sctp
