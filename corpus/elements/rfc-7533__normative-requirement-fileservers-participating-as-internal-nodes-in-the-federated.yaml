document: rfc-7533
kind: normative-requirement
summary: Fileservers participating as 'internal' nodes in the federated namespace MUST implement FEDFS_NULL, FEDFS_CREATE_JUNCTION, FEDFS_DELETE_JUNCTION, FEDFS_LOOKUP_JUNCTION, FEDFS_SET_NSDB_PARAMS, FEDFS_GET_NSDB_PARAMS, and FEDFS_GET_LIMITED_NSDB_PARAMS. They SHOULD additionally implement FEDFS_CREATE_REPLICATION, FEDFS_DELETE_REPLICATION, and FEDFS_LOOKUP_REPLICATION.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
