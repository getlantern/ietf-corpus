document: rfc-4340
kind: normative-requirement
summary: 'The Mandatory option marks the immediately following option O as mandatory: if the receiver does not understand or process O, it MUST reset the connection with Reset Code 6, ''Mandatory Failure''. Mandatory MUST NOT be sent on DCCP-Data packets and any received there MUST be ignored.'
section: 5.8.2
rfc2119_level: MUST
topics:
    - udp
    - congestion
