document: rfc-7683
kind: normative-requirement
summary: A reacting node MUST include the OC-Supported-Features AVP in all request messages it originates or relays. If it includes the OC-Feature-Vector sub-AVP, it MUST indicate support for the loss algorithm, and MUST also indicate any additional supported algorithms.
section: 5.1.1
rfc2119_level: MUST
