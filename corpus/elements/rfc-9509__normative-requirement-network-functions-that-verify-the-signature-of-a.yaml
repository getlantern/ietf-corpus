document: rfc-9509
kind: normative-requirement
summary: Network Functions that verify the signature of a CCA (JWT), decrypt JSON objects in HTTP messages using JWE, or verify OAuth 2.0 access token signatures SHOULD require that the corresponding KeyPurposeIds (id-kp-jwt, id-kp-httpContentEncrypt, id-kp-oauthAccessTokenSigning) be specified in the EKU extension of the presented certificate.
section: "3"
rfc2119_level: SHOULD
topics:
    - pkix
    - jose
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
