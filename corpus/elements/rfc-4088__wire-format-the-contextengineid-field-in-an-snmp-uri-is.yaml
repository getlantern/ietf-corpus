document: rfc-4088
kind: wire-format
summary: The contextEngineID field in an SNMP URI is encoded as a sequence of HEXDIG pairs (1*(HEXDIG HEXDIG)), representing a variable-length binary value as a hexadecimal string. Multi-byte UTF-8 characters in securityName or contextName must be percent-encoded.
