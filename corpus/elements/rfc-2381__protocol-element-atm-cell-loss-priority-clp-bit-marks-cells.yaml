document: rfc-2381
kind: protocol-element
summary: ATM Cell Loss Priority (CLP) bit marks cells as low priority (CLP=1, 'tagged'). Tagging may be done by the source to indicate relative priority, or by a switch for policing violations. Options for tagging are decided at call setup time.
