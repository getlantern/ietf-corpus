document: rfc-5561
kind: wire-format
summary: The Capability message (code point 0x0202) contains a 2-octet type field with U-bit=0, a 2-octet Length, a 4-octet Message ID, followed by one or more Capability Parameter TLVs (TLV_1 through TLV_N) whose S-bits indicate the new state for each capability.
