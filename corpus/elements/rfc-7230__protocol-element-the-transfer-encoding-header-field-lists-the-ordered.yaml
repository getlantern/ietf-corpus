document: rfc-7230
kind: protocol-element
summary: The Transfer-Encoding header field lists the ordered sequence of transfer codings applied to form the message body from the payload body. It is a property of the message, not the representation; any recipient along the chain MAY decode or add transfer codings.
section: 3.3.1
