document: rfc-5786
kind: protocol-element
summary: The Node Attribute TLV (type 5, variable length) is a new top-level TLV in OSPF TE LSAs that carries attributes associated with a router, including its local addresses. It contains one or more sub-TLVs; this document defines sub-TLV type 1 (Node IPv4 Local Address) and sub-TLV type 2 (Node IPv6 Local Address).
section: "4.1"
topics:
    - routing
