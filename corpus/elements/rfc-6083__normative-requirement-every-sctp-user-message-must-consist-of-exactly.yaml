document: rfc-6083
kind: normative-requirement
summary: Every SCTP user message MUST consist of exactly one DTLS record. This one-to-one mapping between SCTP user messages and DTLS records is a fundamental structural constraint of the protocol.
section: "4.1"
rfc2119_level: MUST
topics:
