document: rfc-3545
kind: wire-format
summary: 'When F=1 in COMPRESSED_UDP, the packet includes selected RTP fields: delta IPv4 ID (if dI=1, variable), delta RTP timestamp (if dT=1, variable), absolute IPv4 ID (if I=1, 2 bytes), RTP sequence number (if S=1, 2 bytes), RTP timestamp (if T=1, 4 bytes), RTP payload type (if P=1, 1 byte), and CSRC list (if CC>0).'
