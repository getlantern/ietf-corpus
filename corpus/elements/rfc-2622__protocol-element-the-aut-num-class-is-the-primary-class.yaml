document: rfc-2622
kind: protocol-element
summary: The aut-num class is the primary class for routing policy, keyed by AS number. It contains import, export, and default attributes specifying the AS's routing policy. The admin-c attribute is mandatory for the aut-num class (unlike other classes where it is optional).
