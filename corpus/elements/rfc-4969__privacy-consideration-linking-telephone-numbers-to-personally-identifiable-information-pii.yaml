document: rfc-4969
kind: privacy-consideration
summary: Linking telephone numbers to Personally Identifiable Information (PII) via vCards provides a "reverse lookup" from number to owner. Publication of such PII is covered by data-protection law in many jurisdictions and in most cases requires the explicit consent of the affected individual.
section: "5.2"
topics:
    - privacy
    - dns
