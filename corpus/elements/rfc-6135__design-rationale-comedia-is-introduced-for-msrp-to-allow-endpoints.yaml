document: rfc-6135
kind: design-rationale
summary: COMEDIA is introduced for MSRP to allow endpoints behind NATs to negotiate which side initiates the TCP transport connection, avoiding the need for complex mechanisms such as ICE-TCP or relays. RFC 4975 mandates the SDP offerer is always active, but this is inflexible when the offerer is behind a NAT.
section: "1"
topics:
    - nat
    - realtime
