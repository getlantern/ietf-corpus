kind: protocol-element
summary: 'The ''floorctrl'' SDP media-level attribute is defined to perform floor control server determination. Its ABNF is: floor-control-attribute = ''a=floorctrl:'' role *(SP role), where role = ''c-only'' / ''s-only'' / ''c-s''.'
