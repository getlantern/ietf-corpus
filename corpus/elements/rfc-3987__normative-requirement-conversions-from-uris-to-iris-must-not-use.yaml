document: rfc-3987
kind: normative-requirement
summary: Conversions from URIs to IRIs MUST NOT use any character encoding other than UTF-8 in steps 3 and 4, even if context suggests another encoding was originally used in the URI (e.g., iso-8859-1 percent-encoded sequences must not be decoded as non-UTF-8).
section: "3.2"
rfc2119_level: MUST NOT
topics:
