document: rfc-3165
kind: protocol-element
summary: smLaunchRowExpireTime is a countdown timer (ticks backwards in centi-seconds); setting it to maximum value 2147483647 disables the timer. When it reaches 0 with no associated smRunTable entries, the row is deleted; otherwise smLaunchOperStatus transitions to 'expired' until all associated run entries are gone.
section: "6"
