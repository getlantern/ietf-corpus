document: rfc-4326
kind: normative-requirement
summary: When packing further SNDUs into a TS Packet where PUSI was not previously set, the Encapsulator MUST update the PUSI to 1 and insert a Payload Pointer immediately after the TS Packet header. The Packing Threshold MUST be bounded and SHOULD be configurable.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
