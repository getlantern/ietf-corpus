document: rfc-4366
kind: privacy-consideration
summary: The trusted_ca_keys extension reveals which CA root keys a client possesses, which may be regarded as confidential information. Clients should use this extension with care to avoid inadvertently disclosing their trust anchor configuration.
section: "6.4"
