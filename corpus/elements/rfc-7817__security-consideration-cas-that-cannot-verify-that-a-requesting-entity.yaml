document: rfc-7817
kind: security-consideration
summary: CAs that cannot verify that a requesting entity is authorized to run email service for a set of SRV-IDs or DNS-IDs MUST NOT include those identifiers in issued certificates, to prevent unauthorized parties from obtaining certificates that would pass server identity checks.
section: "4.1"
rfc2119_level: MUST NOT
topics:
