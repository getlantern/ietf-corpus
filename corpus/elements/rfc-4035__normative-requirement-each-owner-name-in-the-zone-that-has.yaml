document: rfc-4035
kind: normative-requirement
summary: Each owner name in the zone that has authoritative data or a delegation point NS RRset MUST have an NSEC resource record. An NSEC record (and its associated RRSIG RRset) MUST NOT be the only RRset at any particular owner name.
section: "2.3"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
