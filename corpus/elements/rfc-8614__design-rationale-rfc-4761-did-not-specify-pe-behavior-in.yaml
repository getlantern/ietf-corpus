document: rfc-8614
kind: design-rationale
summary: RFC 4761 did not specify PE behavior in mixed environments where some PEs support Control Word (CW) or sequencing and others do not. If a PE set the C-bit or S-bit and the remote PE disagreed, the PW would not come up, which was overly restrictive for real deployments.
section: "2"
topics:
    - mpls
    - bgp
    - routing
