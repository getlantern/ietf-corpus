document: rfc-7759
kind: protocol-element
summary: The MPLS OAM Functions TLV (Type 27) is the top-level TLV carried in LSP Ping Echo Request/Reply messages to configure proactive MPLS-TP OAM functions. It contains a 32-bit MPLS OAM Function Flags field followed by optional sub-TLVs specifying detailed OAM configuration parameters.
