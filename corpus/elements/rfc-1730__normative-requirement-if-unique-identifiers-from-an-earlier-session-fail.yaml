document: rfc-1730
kind: normative-requirement
summary: If unique identifiers from an earlier session fail to persist to a new session, the UIDVALIDITY value MUST be greater than in the earlier session. Server implementations MUST implicitly include the UID data item in any FETCH response caused by a UID command.
section: 6.4.9
rfc2119_level: MUST
topics:
    - email
