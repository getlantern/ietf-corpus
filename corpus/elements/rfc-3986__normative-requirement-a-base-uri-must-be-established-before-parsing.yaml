document: rfc-3986
kind: normative-requirement
summary: 'A base URI must be established before parsing relative references and must conform to the absolute-URI syntax (no fragment). Precedence order (highest first): (1) base URI embedded in content, (2) base URI of encapsulating entity, (3) retrieval URI, (4) application default.'
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
