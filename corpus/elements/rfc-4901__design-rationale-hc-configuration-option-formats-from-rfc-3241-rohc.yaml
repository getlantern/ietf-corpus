document: rfc-4901
kind: design-rationale
summary: HC configuration option formats from RFC 3241 (ROHC over PPP) and RFC 3544 (CRTP/ECRTP/IPHC over PPP) are reused as TLVs in LDP PW signaling rather than defining new formats, but the detailed PPP negotiation process is not reused. A single HC PW supports only one HC scheme, so the full PPP multi-protocol negotiation is unnecessary.
section: "3"
topics:
