document: rfc-9669
kind: protocol-element
summary: The BPF arithmetic instruction set includes ADD, SUB, MUL, DIV/SDIV, OR, AND, LSH, RSH, NEG, MOD/SMOD, XOR, MOV/MOVSX, ARSH, and END, encoded in the 4-bit 'code' field. Division/multiplication/modulo belong to divmul32/divmul64 conformance groups; other instructions belong to base32/base64.
section: "4.1"
