document: rfc-7970
kind: interoperability-note
summary: Private attribute extensions using ext-value must be deconflicted using the IODEF-Document private-enum-name (FQDN of CSIRT) and private-enum-id attributes. Recipients encountering an unknown ext-value use these fields to identify the defining organization and obtain semantics out of band.
section: "5.3"
topics:
    - security
