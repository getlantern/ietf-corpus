document: rfc-7813
kind: security-consideration
summary: IS-IS PCR adds no additional security risks to IS-IS but is not suitable for zero-configuration environments. Any path selection and resource allocation mechanism is potentially vulnerable to attack; the security considerations of RFC 4655 (PCE architecture) apply. IS-IS routing security measures including peer advertisement authentication via RFC 5310 should be applied.
section: "10"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
