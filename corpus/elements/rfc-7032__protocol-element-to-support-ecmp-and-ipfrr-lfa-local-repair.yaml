document: rfc-7032
kind: protocol-element
summary: To support ECMP and IPFRR LFA local-repair, the upstream access LSR/ABR sends LDP DoD Label Requests to both best next-hop and alternate next-hop neighbors and installs all received labels as primary and alternate entries in its LIB and LFIB.
