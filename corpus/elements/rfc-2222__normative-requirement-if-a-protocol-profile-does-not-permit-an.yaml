document: rfc-2222
kind: normative-requirement
summary: If a protocol profile does not permit an initial client response and the client sends data first, the server issues a challenge with no data and the client's response to that empty challenge is used as the initial client response.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
