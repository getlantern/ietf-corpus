document: rfc-3307
kind: security-consideration
summary: The allocation mechanisms described do not alter the security properties of Any Source or Source Specific multicast service models. However, the ability to allocate large blocks of addresses can enable Denial-of-Service attacks; RFC 2908 contains a more in-depth discussion of security issues surrounding dynamic multicast address allocation.
section: "6"
topics:
