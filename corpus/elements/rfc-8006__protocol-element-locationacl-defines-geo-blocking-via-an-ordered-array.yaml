document: rfc-8006
kind: protocol-element
summary: 'LocationACL defines geo-blocking via an ordered array of LocationRule objects pairing Footprint objects (footprint-type: ipv4cidr, ipv6cidr, asn, or countrycode) with allow/deny actions. Absent ''locations'' means allow-all; non-matching footprints result in deny.'
section: 4.2.2
topics:
