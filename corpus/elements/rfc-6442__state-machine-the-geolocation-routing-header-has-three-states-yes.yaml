document: rfc-6442
kind: state-machine
summary: 'The Geolocation-Routing header has three states: "yes" (intermediaries may use location for routing and may change to "no" for downstream), "no" (intermediaries MUST NOT view or route on location), and absent-while-Geolocation-present (treated identically to "no"). Absent-with-no-Geolocation-header allows intermediaries to freely set the value.'
section: 4.2.1
topics:
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
