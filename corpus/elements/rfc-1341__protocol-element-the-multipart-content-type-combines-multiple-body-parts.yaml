document: rfc-1341
kind: protocol-element
summary: 'The ''multipart'' Content-Type combines multiple body parts of independent data types using a boundary delimiter. Four subtypes are defined: mixed (default), alternative (same data in multiple formats), parallel (simultaneous display), and digest (each part is of type message).'
