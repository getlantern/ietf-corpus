document: rfc-4850
kind: design-rationale
summary: The key is declarative and purely informational — functional iSCSI behavior must not depend on it and it must not be used for interoperability decisions — to ensure that nodes which do not implement or understand the key continue to operate correctly and that the key cannot be used to exclude non-implementing nodes.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
