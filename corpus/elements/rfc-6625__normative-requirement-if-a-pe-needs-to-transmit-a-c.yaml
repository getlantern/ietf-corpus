document: rfc-6625
kind: normative-requirement
summary: If a PE needs to transmit a (C-S,C-G) C-flow and it matches a (C-*,C-*) S-PMSI A-D route per Section 3.1, the PE MUST use the P-tunnel advertised in that route. A (C-S,C-G) cannot match both a (C-*,C-*) wildcard and any other wildcard simultaneously.
section: "4.4"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
