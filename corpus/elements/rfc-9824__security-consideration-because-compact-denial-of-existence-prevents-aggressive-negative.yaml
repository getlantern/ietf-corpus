document: rfc-9824
kind: security-consideration
summary: 'Because Compact Denial of Existence prevents aggressive negative caching (resolvers cannot synthesize NXDOMAIN from NSEC records), Pseudorandom Subdomain Attacks are more effective: all random-name queries must be forwarded to authoritative servers, making resource exhaustion more likely.'
section: "8"
topics:
