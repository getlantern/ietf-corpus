document: rfc-1542
kind: normative-requirement
summary: The 'secs' field SHOULD represent the elapsed time in seconds since the client sent its first BOOTREQUEST message; the first message SHOULD set 'secs' to zero. Clients SHOULD NOT use a constant value for this field.
section: "3.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
