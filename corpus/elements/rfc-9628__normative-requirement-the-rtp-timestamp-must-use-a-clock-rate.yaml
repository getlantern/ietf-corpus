document: rfc-9628
kind: normative-requirement
summary: The RTP timestamp MUST use a clock rate of 90 kHz. All frames of the same picture MUST have the same timestamp. Every picture containing a frame with show_frame==1 MUST have a unique timestamp modulo 2^32.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
