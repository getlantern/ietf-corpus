document: rfc-7844
kind: normative-requirement
summary: Clients using the anonymity profile SHOULD NOT send the Host Name option; if they do, they MUST send a non-qualified host name (never an FQDN) and MUST obfuscate the host name value.
section: "3.7"
rfc2119_level: SHOULD NOT
topics:
