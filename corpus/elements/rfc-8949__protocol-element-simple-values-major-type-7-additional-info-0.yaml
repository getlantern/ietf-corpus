document: rfc-8949
kind: protocol-element
summary: Simple values (major type 7, additional info 0–24) include false (20), true (21), null (22), and undefined (23). Values 0–19 and 32–255 are unassigned. Each simple value has exactly one encoding; two-byte sequences starting with 0xf8 followed by a byte < 0x20 are not well-formed.
