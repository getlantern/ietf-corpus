document: rfc-4251
kind: normative-requirement
summary: The implementer MUST ensure that credentials validate the professed user identity AND that the server's local security policy permits the requested access. Where local security policy exists, it MUST be applied and enforced correctly, even though the type of service may not be known at authentication time.
section: 9.4.3
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
