document: rfc-6668
kind: interoperability-note
summary: Users, implementors, and administrators may place hmac-sha2-256 and hmac-sha2-512 ahead of the REQUIRED hmac-sha1 algorithm in algorithm negotiation proposals so that SHA-2-based MACs are negotiated first.
