document: rfc-2280
kind: protocol-element
summary: 'An address-prefix-range extends an IPv4 prefix with one of four range operators: ''^-'' (exclusive more-specifics), ''^+'' (inclusive more-specifics), ''^n'' (all length-n specifics), or ''^n-m'' (all specifics of length n through m). Range operators distribute over set members.'
