document: rfc-2067
kind: wire-format
summary: 'The HIPPI packet structure for IP datagrams is: HIPPI-FP header (8 bytes), HIPPI-LE header (24 bytes), IEEE 802.2 LLC/SNAP header (8 bytes), IP datagram, and trailing fill bytes to round up to a multiple of 8 bytes. The total overhead is 40 bytes.'
