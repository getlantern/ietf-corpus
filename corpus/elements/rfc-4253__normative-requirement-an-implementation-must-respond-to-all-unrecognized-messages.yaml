document: rfc-4253
kind: normative-requirement
summary: An implementation MUST respond to all unrecognized messages with SSH_MSG_UNIMPLEMENTED in the order received. SSH_MSG_UNIMPLEMENTED carries the uint32 packet sequence number of the rejected message.
section: "11.4"
rfc2119_level: MUST
topics:
    - security
