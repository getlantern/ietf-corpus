document: rfc-9309
kind: design-rationale
summary: Crawlers MAY interpret other records not part of the robots.txt protocol (e.g., Sitemaps) and MAY be lenient with misspellings, but such parsing MUST NOT interfere with defined records. This allows extensibility while preserving core protocol integrity.
section: 2.2.4
topics:
