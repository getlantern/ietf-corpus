document: rfc-5595
kind: normative-requirement
summary: If the server port is not associated with the requested Service Code, the server SHOULD reject the request with a DCCP-Reset using Reset Code 8 ('Bad Service Code'), but MAY use 'Connection Refused' instead.
section: 3.3.1
rfc2119_level: SHOULD
topics:
    - congestion
