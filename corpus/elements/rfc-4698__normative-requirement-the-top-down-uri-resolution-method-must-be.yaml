document: rfc-4698
kind: normative-requirement
summary: The top-down URI resolution method MUST be identified as 'top' in IRIS URIs for AREG1. The resolution process first tries direct resolution against areg.iris.arpa; if no server is reachable, a negative response is returned.
section: "7.3"
rfc2119_level: MUST
topics:
