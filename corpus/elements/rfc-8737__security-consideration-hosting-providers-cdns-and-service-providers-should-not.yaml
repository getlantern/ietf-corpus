document: rfc-8737
kind: security-consideration
summary: Hosting providers, CDNs, and service providers SHOULD NOT allow users to supply their own certificates for TLS ALPN validation. Providers wishing to implement tls-alpn-01 SHOULD generate validation certificates themselves and not expose this to users.
section: "5"
