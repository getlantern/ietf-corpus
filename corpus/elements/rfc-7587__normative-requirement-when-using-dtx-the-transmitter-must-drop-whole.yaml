document: rfc-7587
kind: normative-requirement
summary: When using DTX, the transmitter MUST drop whole frames only, based on the size of the last transmitted frame, to ensure successive RTP timestamps differ by a multiple of 120 and to allow the receiver to use whole frames for concealment.
section: 3.1.3
rfc2119_level: MUST
topics:
    - rtp
    - realtime
