document: rfc-9067
kind: design-rationale
summary: The set-application-tag action was introduced because the standard tag is automatically advertised in OSPF AS-External LSAs, whereas an application-specific tag allows applications requiring different semantics or policy to use a tag that is not implicitly advertised.
section: "7.2"
