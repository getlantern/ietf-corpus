document: rfc-5588
kind: security-consideration
summary: Acceptor applications MUST only store delegated credentials into appropriate credential stores and only after proper authorization of the authenticated initiator principal to the requested service(s). Storing delegated credentials without authorization would allow privilege escalation.
section: "6"
rfc2119_level: MUST
topics:
    - security
