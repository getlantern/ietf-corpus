document: rfc-3008
kind: design-rationale
summary: 'There is no additional flexibility granted by allowing host/user key material signatures: as long as users and hosts can authenticate update requests to the primary zone server, zone key signatures are sufficient to protect data integrity to the world at large.'
section: 3.2.1
topics:
    - dns
    - security
