document: rfc-6970
kind: normative-requirement
summary: For infinite PortMappingLeaseDuration requests, the IGD-PCP IWF MUST set Requested Lifetime to 4294967296. For finite durations, it MUST set the same value, MUST maintain a timer set to the initial requested duration, and MUST periodically renew the PCP mapping until that timer expires.
section: "5.9"
rfc2119_level: MUST
topics:
    - nat
