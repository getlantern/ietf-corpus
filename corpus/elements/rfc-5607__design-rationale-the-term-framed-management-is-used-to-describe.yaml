document: rfc-5607
kind: design-rationale
summary: The term 'Framed Management' is used to describe management protocols other than CLI (e.g., SNMP, NETCONF, Web-based) because they format management information in binary or textual encodings such as HTML, XML, or ASN.1/BER, as opposed to text-based terminal emulation. This distinguishes them from the existing NAS-Prompt and Administrative Service-Type values.
section: "1"
