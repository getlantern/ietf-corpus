document: rfc-9448
kind: design-rationale
summary: A client may request an Authority Token scoped to a subset of its own authority. This allows constructing a TNAuthList limited to specific TelephoneNumberRanges or TelephoneNumbers rather than the full scope of an SPC, reducing information exposure to CAs that process the token.
section: "5.7"
topics:
    - acme
    - voip
    - privacy
