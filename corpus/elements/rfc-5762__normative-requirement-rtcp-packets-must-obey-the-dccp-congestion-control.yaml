document: rfc-5762
kind: normative-requirement
summary: RTCP packets MUST obey the DCCP congestion control algorithm negotiated for the connection. If there is insufficient capacity at the RTCP transmission timer expiry, the RTCP packet is delayed until capacity is available.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
