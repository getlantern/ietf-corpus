document: rfc-8610
kind: security-consideration
summary: Extension points in CDDL specifications (sockets, wildcards such as '* tstr => any') require careful security analysis, as extensions may introduce data items outside the original security model. Specification writers are strongly encouraged to keep CDDL as simple as possible and to value clarity over elegance.
section: "5"
topics:
