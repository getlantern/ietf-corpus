document: rfc-6871
kind: normative-requirement
summary: Each 'lcfg' attribute MUST be specified at the media level, MUST include a config-number unique in the entire SDP (not overlapping any 'pcfg' config-number), MUST include a media type ('mt='), and MUST reference a valid transport capability ('t='). The pot-cfg-list MUST NOT contain more than one instance of each parameter type.
section: 3.4.1.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
