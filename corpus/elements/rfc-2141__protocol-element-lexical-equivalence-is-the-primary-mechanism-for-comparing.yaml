document: rfc-2141
kind: protocol-element
summary: 'Lexical equivalence is the primary mechanism for comparing URNs without resolution: it normalizes `urn:` prefix case, NID case, and percent-escape case, but does not decode percent-encoded characters. For example, `URN:FOO:a123%2c456` and `urn:foo:a123%2C456` are lexically equivalent, but `urn:foo:a123,456` and `urn:foo:a123%2C456` are not.'
section: "5"
