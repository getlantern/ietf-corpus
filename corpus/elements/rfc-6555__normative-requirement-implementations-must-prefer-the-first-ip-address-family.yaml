document: rfc-6555
kind: normative-requirement
summary: Implementations MUST prefer the first IP address family returned by the host's address preference policy unless implementing a stateful algorithm. If the host's policy is unknown or not attainable, implementations MUST prefer IPv6 over IPv4.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
