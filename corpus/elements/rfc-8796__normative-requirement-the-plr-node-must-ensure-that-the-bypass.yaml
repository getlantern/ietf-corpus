document: rfc-8796
kind: normative-requirement
summary: The PLR node MUST ensure that the bypass tunnel assignment can satisfy the protected LSP MTU requirements post-FRR, preventing packets from being dropped due to exceeding the MTU size of the backup path after traffic is rerouted.
section: "3.3"
rfc2119_level: MUST
topics:
