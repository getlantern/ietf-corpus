document: rfc-2623
kind: security-consideration
summary: Port monitoring (requiring source ports < 1024) is at best an inconvenience to an attacker and SHOULD NOT be depended on for security, as many operating systems have no privilege constraints on port binding and physical access trivially grants root privileges.
section: "2.1"
topics:
    - security
