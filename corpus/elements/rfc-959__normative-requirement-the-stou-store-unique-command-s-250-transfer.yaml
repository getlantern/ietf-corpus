document: rfc-959
kind: normative-requirement
summary: The STOU (Store Unique) command's 250 Transfer Started response MUST include the unique filename generated for the new file. The REST (Restart) command MUST be immediately followed by the appropriate FTP service command (RETR, STOR, etc.) to resume transfer.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
