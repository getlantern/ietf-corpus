document: rfc-7660
kind: privacy-consideration
summary: Flow-Count and Packet-Count AVPs provide more information that can be privacy sensitive, directly related to traffic captured by filters and associated reports. Narrow filtering creates the highest privacy sensitivity but is too resource-intensive to be widely applied on large networks.
