document: rfc-5025
kind: normative-requirement
summary: The final presence document D sent to a watcher MUST satisfy D = F(D), where F is the privacy filtering operation. Further applications of the filtering operation must be a no-op, ensuring the document is fully compliant with privacy policy.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - privacy
