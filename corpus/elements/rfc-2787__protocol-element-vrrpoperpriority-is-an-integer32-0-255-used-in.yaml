document: rfc-2787
kind: protocol-element
summary: vrrpOperPriority is an Integer32 (0..255) used in the master election process; higher values mean higher priority. Priority 255 denotes the IP address owner; priority 0 (not settable via SNMP, sent by master) signals cessation of VRRP participation and triggers backup-to-master transition. Default is 100.
