document: rfc-4982
kind: design-rationale
summary: 'Multiple hash algorithm support is added for two forward-looking reasons: future CGA applications may require stronger collision resistance than SHA-1 provides, and the recent attacks demonstrate that protocols must be able to migrate away from compromised hash functions without major disruption.'
