document: rfc-7833
kind: normative-requirement
summary: In the request-response model, the RADIUS Access-Request MUST include exactly one RADIUS User-Name attribute whose value MUST conform to the Network Access Identifier (NAI) scheme, and the RP MUST NOT include more than one SAML request element.
section: "4.2"
rfc2119_level: MUST
topics:
    - radius
    - security
