document: rfc-2491
kind: interoperability-note
summary: An IPv6/NBMA driver does not need to consider establishing a shortcut VC directly to a driver attached to a different type of NBMA network (e.g., an ATM driver need not interwork with an FR driver), as it can assume both ends are attached to the same NBMA technology.
section: "4.7"
topics:
    - ip
    - v6ops
