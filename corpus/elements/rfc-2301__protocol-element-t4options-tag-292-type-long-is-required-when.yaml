document: rfc-2301
kind: protocol-element
summary: T4Options (tag 292, type LONG) is required when Compression=3. Bit 0 selects MH (0) or MR (1) encoding; bit 1 must be 0; bit 2 indicates byte-aligned EOLs (1) or non-byte-aligned (0). Default is 0 (MH, non-byte-aligned).
section: 3.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
