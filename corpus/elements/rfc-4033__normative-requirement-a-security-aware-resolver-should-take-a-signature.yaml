document: rfc-4033
kind: normative-requirement
summary: A security-aware resolver should take a signature's validation period into consideration when determining the TTL of data in its cache, using the time remaining before RRSIG expiration as an upper bound for the cached RRset TTL.
section: "6"
rfc2119_level: SHOULD
topics:
    - dns
    - security
