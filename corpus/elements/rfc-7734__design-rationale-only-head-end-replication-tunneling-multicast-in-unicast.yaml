document: rfc-7734
kind: design-rationale
summary: Only head-end replication (tunneling multicast in unicast PBB frames) is supported for multicast traffic interworking. Native PBB multicast forwarding over EVPN, PE replication, and optimized PBB multicast across EVPN are explicitly out of scope for this document.
