document: rfc-5592
kind: design-rationale
summary: USM requires a separate user and key-management infrastructure independent of existing security deployments, and operators reported this as a reason for not deploying SNMPv3. SSHTM was designed to leverage the existing and commonly deployed SSH security infrastructure to maximize deployment success while minimizing implementation and deployment costs.
section: "1.4"
topics:
    - snmp
    - security
