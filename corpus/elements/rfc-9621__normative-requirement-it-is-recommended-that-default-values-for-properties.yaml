document: rfc-9621
kind: normative-requirement
summary: It is RECOMMENDED that default values for Properties be selected to ensure correctness for the widest set of applications; for example, reliability should be enabled by default because both reliability-requiring and non-requiring applications can function when reliability is provided.
section: "3.1"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
