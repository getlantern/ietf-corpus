document: rfc-2733
kind: interoperability-note
summary: FEC packets use dynamic RTP payload types. Per RFC 1889, RTP participants that cannot recognize a payload type must discard it, providing backwards compatibility with non-FEC-capable receivers in mixed multicast groups.
