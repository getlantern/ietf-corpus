document: rfc-9824
kind: normative-requirement
summary: For a nonexistent name, the NSEC Type Bit Maps field MUST only have bits set for RRSIG, NSEC, and NXNAME. The dynamically constructed NSEC record MUST have corresponding RRSIGs generated.
section: "3.1"
rfc2119_level: MUST
topics:
