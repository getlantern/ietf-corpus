document: rfc-3963
kind: normative-requirement
summary: When the Home Agent receives a data packet destined for the Mobile Network, it MUST forward the packet to the Mobile Router through the bi-directional tunnel. The Home Agent may use the routing table, the Binding Cache, or a combination to determine the forwarding path.
section: "6.5"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
