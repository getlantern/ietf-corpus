document: rfc-7432
kind: wire-format
summary: The ES-Import Route Target (Type 0x06, Sub-Type 0x02) is an 8-octet transitive extended community carrying a 6-octet ES-Import value. For ESI Types 1, 2, and 3, it is auto-derived from the high-order 6 octets of the ESI Value, enabling all PEs on a multihomed segment to import Ethernet Segment routes.
section: "7.6"
topics:
