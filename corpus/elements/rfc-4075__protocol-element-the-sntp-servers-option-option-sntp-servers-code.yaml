document: rfc-4075
kind: protocol-element
summary: The SNTP servers option (OPTION_SNTP_SERVERS, code 31) provides a list of one or more IPv6 addresses of SNTP servers available to the DHCPv6 client for time synchronization. The option-len field indicates the total length of the SNTP server address fields in octets and must be a multiple of 16.
section: "4"
topics:
