document: rfc-8245
kind: interoperability-note
summary: A protocol-independent message optimizer MAY be used by the generating router but MUST NOT be applied to messages that are forwarded unchanged, because reordering or restructuring a forwarded message would break end-to-end authentication mechanisms such as RFC 7182 ICV TLVs.
section: Appendix B
topics:
    - routing
    - security
