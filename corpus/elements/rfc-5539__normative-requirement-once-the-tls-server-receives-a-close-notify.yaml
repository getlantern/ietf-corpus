document: rfc-5539
kind: normative-requirement
summary: Once the TLS server receives a close_notify from the TLS client, it MUST reply with a close_notify unless it has already detected the connection was closed (e.g., via TCP).
section: "2.2"
rfc2119_level: MUST
topics:
