document: rfc-5796
kind: normative-requirement
summary: 'During manual rekeying, the SA replacement operation (step 2: replacing original outbound SA with new SPI and key values) MUST be atomic with respect to sending PIM-SM packets on the link, so that no PIM-SM packets are sent without authentication/encryption.'
section: "9.1"
rfc2119_level: MUST
topics:
