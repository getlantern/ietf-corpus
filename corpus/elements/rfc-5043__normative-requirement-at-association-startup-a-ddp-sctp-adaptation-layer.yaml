document: rfc-5043
kind: normative-requirement
summary: 'At association startup, a DDP/SCTP adaptation layer MUST include an adaptation layer indication in its INIT or INIT-ACK. After the INIT/INIT-ACK exchange, an endpoint MUST verify the Adaptation Indication: NONE or any other value means DDP/RDMA procedures MUST NOT be performed.'
section: "11.1"
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
