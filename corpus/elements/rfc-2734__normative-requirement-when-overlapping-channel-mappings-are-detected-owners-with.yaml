document: rfc-2734
kind: normative-requirement
summary: When overlapping channel mappings are detected, owners with smaller physical IDs (least significant six bits of source_ID) SHALL cease transmission on invalid channel numbers; the owner with the largest physical ID need not take action.
section: "9.6"
rfc2119_level: MUST
topics:
