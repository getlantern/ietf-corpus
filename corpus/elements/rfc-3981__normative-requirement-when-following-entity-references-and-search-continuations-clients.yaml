document: rfc-3981
kind: normative-requirement
summary: When following entity references and search continuations, clients SHOULD only follow an <entity> or <searchContinuation> response once. Failure to do so may result in the client process getting stuck in a never-ending referral loop.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - registry
    - security
