document: rfc-3095
kind: normative-requirement
summary: When using scaled RTP Timestamp encoding, the decompressor MUST detect wraparound of the unscaled 32-bit TS and update TS_OFFSET to (wrapped-around unscaled TS) modulo TS_STRIDE.
