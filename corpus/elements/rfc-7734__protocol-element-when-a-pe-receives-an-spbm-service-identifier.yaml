document: rfc-7734
kind: protocol-element
summary: When a PE receives an SPBM service identifier and unicast address sub-TLV via ISIS-SPB MT capability TLV and is the DF for that B-VID, it creates or updates a MAC/IP advertisement route NLRI for each new or changed I-SID, setting the Route Distinguisher, ESI, Ethernet Tag ID (I-SID), MAC address, and a locally assigned MPLS label.
section: "4.3"
topics:
    - routing
    - bgp
