document: rfc-9645
kind: normative-requirement
summary: When the test-peer-aliveness presence container is configured in tls-client-grouping, the TLS client MUST send HeartbeatRequest messages as defined in RFC 6520; an unresponsive server is dropped after approximately max-wait * max-attempts seconds.
section: "3.3"
rfc2119_level: MUST
