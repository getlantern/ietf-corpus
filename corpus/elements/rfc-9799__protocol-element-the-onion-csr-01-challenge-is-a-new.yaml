document: rfc-9799
kind: protocol-element
summary: The onion-csr-01 challenge is a new ACME challenge type that allows validation of '.onion' Special-Use Domain Names by proving control over the hidden service's private key via a specially crafted CSR. It supports wildcard certificate issuance, unlike http-01 and tls-alpn-01. It MUST NOT be used to issue certificates for Special-Use Domain Names that are not '.onion'.
section: "3.2"
topics:
    - security
    - pkix
    - crypto
