document: rfc-6513
kind: normative-requirement
summary: Each Intra-AS I-PMSI A-D route MUST carry one or more Route Target Extended Community attributes. Any PE with a matching RT configured for import treats the advertising PE as a member of the corresponding MVPN, realizing BGP-based auto-discovery of MVPN membership.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
    - multicast
    - routing
