document: rfc-4447
kind: wire-format
summary: The PW Grouping ID TLV (type 0x096C) carries a 32-bit arbitrary value representing a group of PWs. It is used with the Generalized PWid FEC element to enable wildcard label withdrawals or status notifications upon physical port failure.
