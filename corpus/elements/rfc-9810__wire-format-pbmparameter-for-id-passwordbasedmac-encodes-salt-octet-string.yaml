summary: 'PBMParameter for id-PasswordBasedMac encodes: salt (OCTET STRING), owf (AlgorithmIdentifier for the one-way function), iterationCount (INTEGER), and mac (AlgorithmIdentifier). When K > H bits are required, key expansion using OWF("N" || BASEKEY) MUST be applied.'
