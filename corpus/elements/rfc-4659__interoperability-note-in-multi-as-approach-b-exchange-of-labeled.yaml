document: rfc-4659
kind: interoperability-note
summary: In Multi-AS approach (b), exchange of labeled VPN-IPv6 routes between ASBRs MUST be carried out per RFC 2545 (BGP-IPv6) and RFC 3107 (MPLS-BGP). Both IPv4 and IPv6 peering between ASBRs are supported.
