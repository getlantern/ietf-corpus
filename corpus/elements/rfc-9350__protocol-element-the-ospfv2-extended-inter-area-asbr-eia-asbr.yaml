document: rfc-9350
kind: protocol-element
summary: The OSPFv2 Extended Inter-Area ASBR (EIA-ASBR) LSA (Opaque Type 11, LS Type 10) is originated by OSPFv2 ABRs to advertise Flex-Algorithm-specific reachability and metrics for ASBRs external to the area. Semantically equivalent to the Type 4 summary-LSA, but carries the ASBR Router ID in the LSA body rather than in the LSID.
section: "10.1"
topics:
    - routing
