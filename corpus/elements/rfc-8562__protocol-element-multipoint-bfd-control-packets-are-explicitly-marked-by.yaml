document: rfc-8562
kind: protocol-element
summary: Multipoint BFD Control packets are explicitly marked by setting the Multipoint (M) bit defined in RFC 5880. This allows tails to identify multipoint packets without relying on knowledge of whether the packet was received over a multipoint path.
section: "5.1"
topics:
    - routing
    - multicast
