document: rfc-5049
kind: protocol-element
summary: Outgoing requests use the SIP/SigComp identifier of the destination URI as the remote application identifier; incoming requests use the SIP/SigComp identifier from the top-most Via entry. For legacy apps without identifiers, IP address plus port (or connection ID for TCP) is used as fallback.
section: "9.1"
topics:
    - sip
    - tcp
