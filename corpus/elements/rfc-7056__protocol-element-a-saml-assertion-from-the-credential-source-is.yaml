document: rfc-7056
kind: protocol-element
summary: A SAML assertion from the credential source is exposed as the GSS name attribute 'urn:ietf:params:gss:federated-saml-assertion'. Its value is the assertion carried in the AAA protocol or used for authentication. It is absent if no assertion is present or if the assertion fails local policy.
section: "6.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
