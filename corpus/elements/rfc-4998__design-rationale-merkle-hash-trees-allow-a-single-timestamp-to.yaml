document: rfc-4998
kind: design-rationale
summary: Merkle hash trees allow a single timestamp to cover many data objects while keeping proof size small. The tree is reduced to a few PartialHashtrees per data object, and deletion of one data object does not affect provability of others, enabling efficient large-scale archival with per-object verification paths.
section: "1.2"
topics:
    - crypto
