document: rfc-4553
kind: normative-requirement
summary: The CE-bound IWF MUST provide an indication of TDM data validity to the CE, either by transporting or generating the native AIS indication. T3 AIS cannot be detected or generated by structure-agnostic means, so a structure-aware NSP MUST be used when generating a valid T3 AIS pattern.
section: 6.2.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
