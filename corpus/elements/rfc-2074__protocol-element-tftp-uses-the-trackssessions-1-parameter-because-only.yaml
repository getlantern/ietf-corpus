document: rfc-2074
kind: protocol-element
summary: TFTP uses the 'tracksSessions(1)' parameter because only the first packet goes to UDP port 69; subsequent packets use dynamically assigned ports. The parameter indicates the probe tracks the remapped session ports.
section: 5.5.6
