document: rfc-2273
kind: protocol-element
summary: The sendPdu abstract service interface is used by command generators and notification originators to dispatch PDUs. Key parameters include transportDomain, transportAddress, messageProcessingModel, securityModel, securityName, securityLevel, contextEngineID, contextName, pduVersion, PDU, and expectResponse. On success it returns a sendPduHandle for correlating responses.
section: "3.1"
topics:
