document: rfc-8338
kind: protocol-element
summary: The Selective Tree Interface Parameter sub-TLV (type 0x1B) in the optional parameters of the P2MP PW Upstream FEC Element allows selective multicast tree association. Absence of this sub-TLV means the P2MP PW is associated with all multicast traffic originating from the root.
section: 3.2.1
topics:
    - mpls
    - multicast
