document: rfc-1577
kind: normative-requirement
summary: A single ATMARP Server MUST be located within the LIS and MUST have authoritative responsibility for resolving the ATMARP requests of all IP members within the LIS. There is to be one and only one ATMARP Server operational per logical IP subnet.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
