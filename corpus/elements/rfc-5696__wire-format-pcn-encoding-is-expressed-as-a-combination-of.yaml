document: rfc-5696
kind: wire-format
summary: 'PCN encoding is expressed as a combination of a PCN-compatible DSCP and the 2-bit ECN field in the IP header. The four ECN codepoints map to: not-PCN (00), Not-marked/NM (10), Experimental/EXP (01), and PCN-marked/PM (11).'
