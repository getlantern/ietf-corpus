document: rfc-6726
kind: normative-requirement
summary: The TOI field MUST be included in all ALC packets sent within a FLUTE session, except for Close Session packets (A flag = 1) that contain no payload. TOI value '0' MUST be reserved exclusively for delivery of FDT Instances.
section: "3.1"
rfc2119_level: MUST
topics:
    - multicast
