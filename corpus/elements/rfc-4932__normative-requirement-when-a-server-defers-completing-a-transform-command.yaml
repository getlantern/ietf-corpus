document: rfc-4932
kind: normative-requirement
summary: When a server defers completing a transform command for offline review, it MUST return response code 1001, MUST manage the object status to reflect the pending action, and MUST notify all involved clients via a service message when the action is completed.
section: "3.2"
rfc2119_level: MUST
topics:
    - registry
