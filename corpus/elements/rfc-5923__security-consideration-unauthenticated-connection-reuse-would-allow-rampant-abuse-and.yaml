document: rfc-5923
kind: security-consideration
summary: Unauthenticated connection reuse would allow rampant abuse and hijacking — for example, a malicious program on a multiuser system could hijack SIP requests destined for the well-known SIP port from a large relay proxy. Authenticating connection aliases via TLS mutual certificate exchange is essential to prevent this.
section: "9"
topics:
