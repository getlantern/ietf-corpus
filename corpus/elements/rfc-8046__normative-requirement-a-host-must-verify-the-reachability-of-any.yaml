document: rfc-8046
kind: normative-requirement
summary: A host MUST verify the reachability of any UNVERIFIED address. The status of a newly learned address MUST initially be set to UNVERIFIED unless it was advertised in an R1 packet as a new preferred locator.
section: "5.4"
rfc2119_level: MUST
topics:
