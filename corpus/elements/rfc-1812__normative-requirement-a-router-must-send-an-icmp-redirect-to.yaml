document: rfc-1812
kind: normative-requirement
summary: A router MUST send an ICMP Redirect to the source host when it forwards a datagram out the same interface it arrived on and the source is on the same subnet as the better next-hop. The Redirect MUST contain the IP header plus first 8 bytes of the offending datagram.
section: 5.2.7.2
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
