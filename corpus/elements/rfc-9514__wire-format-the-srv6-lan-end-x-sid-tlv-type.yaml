document: rfc-9514
kind: wire-format
summary: The SRv6 LAN End.X SID TLV (Type 1107 for IS-IS, 1108 for OSPFv3, variable length) adds a Neighbor ID field (6 octets for IS-IS System-ID or 4 octets for OSPFv3 Router-ID) before the 16-octet SID, allowing advertisement of End.X SIDs to all non-DIS/non-DR LAN neighbors in a single BGP-LS Link NLRI.
section: "4.2"
topics:
    - routing
    - bgp
    - ip
