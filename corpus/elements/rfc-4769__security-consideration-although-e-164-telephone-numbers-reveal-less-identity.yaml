document: rfc-4769
kind: security-consideration
summary: Although E.164 telephone numbers reveal less identity information than SIP or email URIs with usernames, PSTN Enumservice data is still publicly available and carries risk of unwanted communication. DNSSEC applicability and DNS threat analysis are covered in RFC 3761 and RFC 3833 respectively.
section: "7"
topics:
