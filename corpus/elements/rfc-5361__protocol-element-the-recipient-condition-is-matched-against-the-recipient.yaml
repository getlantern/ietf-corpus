document: rfc-5361
kind: protocol-element
summary: The recipient condition is matched against the recipient URI of a translation. When performing a translation, a relay matches the recipient condition against the destination URI of the outgoing request; when receiving a grant/deny request, it matches against the identity of the granting/denying entity.
section: 3.1.1
topics:
    - sip
    - security
