document: rfc-2510
kind: normative-requirement
summary: CAs and RAs MUST enforce Proof of Possession (POP) by some means, because many non-PKIX operational protocols do not explicitly check the binding between an end entity and its private key; without CA/RA enforcement, certificates in the Internet PKI become less meaningful.
section: "2.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
