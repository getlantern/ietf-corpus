document: rfc-1662
kind: design-rationale
summary: The FCS was designed so that a specific 'good FCS' constant value (PPPGOODFCS16=0xf0b8, PPPGOODFCS32=0xdebb20e3) results when the FCS operation passes over the complemented FCS, enabling receivers to detect valid frames without separately tracking frame length.
