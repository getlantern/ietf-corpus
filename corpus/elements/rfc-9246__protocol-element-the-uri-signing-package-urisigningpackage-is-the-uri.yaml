kind: protocol-element
summary: The URI Signing Package (URISigningPackage) is the URI attribute that encapsulates all URI Signing claims in a signed JWT encoded format. It is exposed in the Signed URI as a path-style parameter or a form-style parameter, with the parameter name defined in CDNI Metadata or by configuration.
