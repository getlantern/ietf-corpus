document: rfc-2590
kind: normative-requirement
summary: The DLCI field within the interface identifier MUST be extended with leading zeros to 24 bits. If a DLCI is not known, all 24 bits of the DLCI field MUST be set to 1 (the 'unspecified DLCI' value).
section: "4"
rfc2119_level: MUST
