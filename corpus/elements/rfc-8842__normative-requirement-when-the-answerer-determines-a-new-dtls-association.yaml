document: rfc-8842
kind: normative-requirement
summary: When the answerer determines a new DTLS association is required, it MUST insert a new unique 'tls-id' in the answer. If the answerer does not accept a new DTLS association that the offer requires, it MUST reject the associated 'm=' lines.
section: "5.3"
rfc2119_level: MUST
topics:
    - realtime
    - sip
