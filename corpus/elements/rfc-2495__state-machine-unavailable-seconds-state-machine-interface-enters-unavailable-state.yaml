document: rfc-2495
kind: state-machine
summary: 'Unavailable Seconds state machine: interface enters unavailable state at onset of 10 contiguous SESs; exits when 10 contiguous seconds with no SESs occur. While unavailable, only UAS counter increments. Agents must retroactively adjust ES, BES, SES, SEFS, PCV, and DM counts when crossing the available/unavailable boundary near interval boundaries.'
section: 2.4.3
