document: rfc-7633
kind: security-consideration
summary: A malicious certificate issuer could issue a certificate specifying a TLS feature that the server cannot support, causing clients to reject valid connections; however, the RFC notes this risk is limited since a CA could equally refuse to issue the certificate at all.
section: "5.2"
topics:
    - tls
    - pkix
    - security
