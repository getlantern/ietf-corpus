document: rfc-4430
kind: wire-format
summary: 'The generic KINK payload header is: Next Payload (1 octet), RESERVED (1 octet), Payload Length (2 octets), followed by a variable-length value. Payload types include KINK_DONE (0), KINK_AP_REQ (1), KINK_AP_REP (2), KINK_KRB_ERROR (3), KINK_TGT_REQ (4), KINK_TGT_REP (5), KINK_ISAKMP (6), KINK_ENCRYPT (7), KINK_ERROR (8).'
section: "4.2"
topics:
