document: rfc-7188
kind: normative-requirement
summary: For the MPR and NBR_ADDR_TYPE bit-field registries, a set bit (1) must mean the address has the designated property, and an unset bit (0) must not be used to convey any specific information about the designated property.
section: 5.4.1
rfc2119_level: MUST NOT
topics:
