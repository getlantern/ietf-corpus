document: rfc-5557
kind: normative-requirement
summary: The request message MUST allow indicating per-request whether make-before-break is required (e.g., for voice traffic) or break-before-make is acceptable (e.g., for Internet traffic). The response must allow indicating TE LSPs for which make-before-break reoptimization is not possible.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
