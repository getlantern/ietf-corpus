document: rfc-1869
kind: protocol-element
summary: EHLO success returns code 250 (possibly multiline). Failure to list extensions returns 554. Unacceptable argument returns 501. Unimplemented EHLO returns 502. Service unavailable returns 421. An RFC 821 server that does not recognize EHLO returns 500.
