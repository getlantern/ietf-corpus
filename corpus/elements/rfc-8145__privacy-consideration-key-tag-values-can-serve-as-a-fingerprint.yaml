document: rfc-8145
kind: privacy-consideration
summary: Key Tag values can serve as a fingerprint to identify particular validating DNS clients, especially if the resolver is configured with trust anchors for zones beyond the root. Resolvers MAY transmit Key Tags only for a subset of queries (e.g., every 25th) or with a certain probability (e.g., 5%) to mitigate this.
section: "8"
topics:
    - dns
    - privacy
