document: rfc-8408
kind: normative-requirement
summary: A PCEP speaker SHOULD include the PATH-SETUP-TYPE-CAPABILITY TLV in its OPEN object if it supports PSTs other than RSVP-TE. Absence of this TLV is equivalent to advertising only PST=0 (RSVP-TE).
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
