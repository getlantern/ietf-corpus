document: rfc-6787
kind: security-consideration
summary: The DELETE-VOICEPRINT method can irreversibly delete a speaker's voiceprint from a repository; servers MUST ensure appropriate authorization before permitting this operation. DTMF and recognition audio buffers may capture sensitive user input, requiring access controls to prevent unauthorized retrieval.
section: "12.8"
topics:
    - security
    - realtime
