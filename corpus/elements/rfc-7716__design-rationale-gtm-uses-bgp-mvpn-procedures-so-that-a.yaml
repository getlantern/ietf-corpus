document: rfc-7716
kind: design-rationale
summary: 'GTM uses BGP-MVPN procedures so that a single control plane governs both VPN and non-VPN multicast. Most MVPN features carry over automatically to GTM: scaling, aggregation, flexible tunnel technology, segmented/non-segmented tunnels, wildcard support, ASM/SSM/bidir multicast, IPv4/IPv6 over either infrastructure, and support for BSR as an RP-to-group mapping protocol.'
section: "1"
topics:
