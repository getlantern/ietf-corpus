document: rfc-3414
kind: design-rationale
summary: Key localization (deriving per-engine keys from a single user password) was introduced so that compromise of a key at one authoritative SNMP engine does not compromise the user's key at other engines, while still allowing a single user password across the network.
section: "2.6"
topics:
    - snmp
    - security
    - crypto
