document: rfc-7427
kind: normative-requirement
summary: 'When encoding the ASN.1 AlgorithmIdentifier, implementations SHOULD use the preferred format called for by the algorithm specification: if the algorithm specification says ''preferredPresent'', the parameters object must be present (NULL if no parameters); if ''preferredAbsent'', the entire optional parameters object is omitted.'
section: "3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
