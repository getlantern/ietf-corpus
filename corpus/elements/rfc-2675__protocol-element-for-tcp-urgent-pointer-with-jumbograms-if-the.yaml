document: rfc-2675
kind: protocol-element
summary: 'For TCP Urgent Pointer with jumbograms: if the offset to the urgent data exceeds 65,535 and is greater than or equal to the TCP data length, set the Urgent field to 65,535. If it exceeds 65,535 but is less than the data length, split the TCP packet so the first piece ends within 65,534 bytes of the urgent pointer.'
section: "5.2"
topics:
    - tcp
