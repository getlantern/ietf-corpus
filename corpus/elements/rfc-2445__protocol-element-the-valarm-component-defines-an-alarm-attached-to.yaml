document: rfc-2445
kind: protocol-element
summary: 'The VALARM component defines an alarm attached to a VEVENT or VTODO. The required ACTION property specifies the alarm type: AUDIO, DISPLAY, EMAIL, or PROCEDURE. TRIGGER (required) specifies when the alarm fires; REPEAT and DURATION together define repeating alarms.'
section: 4.6.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
