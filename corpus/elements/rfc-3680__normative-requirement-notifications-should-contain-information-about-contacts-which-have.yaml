document: rfc-3680
kind: normative-requirement
summary: Notifications SHOULD contain information about contacts which have changed state rather than the full state of all contacts. However, notifications triggered by a fetch operation (SUBSCRIBE with Expires of 0) SHOULD contain full state of all contacts.
section: 4.7.2
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
