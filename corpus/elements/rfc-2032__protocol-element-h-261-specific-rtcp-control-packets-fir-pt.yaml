document: rfc-2032
kind: protocol-element
summary: H.261-specific RTCP control packets (FIR, PT=192; NACK, PT=193) are sent via unicast directly from the decoder to the coder's RTP source port, not to the session's normal RTCP destination address. This 'reverse' control path avoids multicast NACK implosion.
section: "5.1"
topics:
