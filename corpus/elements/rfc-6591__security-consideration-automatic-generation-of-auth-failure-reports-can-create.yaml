document: rfc-6591
kind: security-consideration
summary: Automatic generation of auth-failure reports can create a denial-of-service attack when large volumes of email trigger authentication failures. Report generators SHOULD only generate reports after an out-of-band arrangement between parties, rather than triggering automatically based on DNS-discovered data alone.
section: "6.3"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
