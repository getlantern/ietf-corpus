document: rfc-2212
kind: normative-requirement
summary: When a network element uses slack Si to reduce its resource reservation for flow i, the value Si MUST be stored. On subsequent reservation refreshes for that flow, the element MUST reuse the same slack Si without further computation, ensuring reservation consistency.
section: Guidelines for Implementors
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
