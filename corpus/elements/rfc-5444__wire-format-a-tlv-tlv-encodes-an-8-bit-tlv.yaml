document: rfc-5444
kind: wire-format
summary: A TLV (<tlv>) encodes an 8-bit <tlv-type>, an 8-bit <tlv-flags>, an optional 8-bit <tlv-type-ext>, optional 8-bit <index-start> and <index-stop> fields, and an optional <length> field that is 8 bits when thasextlen is clear or 16 bits when set, followed by a <value> field of <length> octets when thasvalue is set.
section: 5.4.1
topics:
    - routing
