document: rfc-7644
kind: security-consideration
summary: Anonymous (unauthenticated) SCIM requests introduce risk; service providers that accept them (e.g., for self-registration) MUST evaluate the risk of exposing resource creation to unauthenticated clients and apply appropriate controls.
