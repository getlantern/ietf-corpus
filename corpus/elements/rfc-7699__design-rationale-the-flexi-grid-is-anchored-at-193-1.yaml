document: rfc-7699
kind: design-rationale
summary: The flexi-grid is anchored at 193.1 THz with a 6.25 GHz nominal central frequency granularity and 12.5 GHz slot width granularity, per ITU-T G.694.1. Implementations are not required to support every possible slot width or position; subsets are explicitly allowed, enabling deployment flexibility.
