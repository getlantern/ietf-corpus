document: rfc-7184
kind: wire-format
summary: The Olsrv2TimeValueCompressedForm32TC textual convention stores OLSRv2 time values as an Unsigned32 in milliseconds (range 1..3932160000), corresponding to the 8-bit exponent-mantissa compressed form (3-bit mantissa, 5-bit exponent) defined in RFC 5497. The MIB stores the integer millisecond value; the protocol derives the compressed form via the RFC 5497 algorithm.
section: "7"
topics:
