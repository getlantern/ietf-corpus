document: rfc-2661
kind: security-consideration
summary: L2TP does not provide end-to-end security between the remote system and the home LAN. Applications requiring end-to-end confidentiality must use their own security mechanisms. The security boundary is only between the LAC and LNS tunnel endpoints.
section: "9.3"
topics:
    - vpn
    - security
