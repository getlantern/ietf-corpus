document: rfc-7223
kind: interoperability-note
summary: The 'description' leaf may be mapped to ifAlias in implementations. Implementers must handle differences in value space and persistence between this leaf and ifAlias; the IF-MIB defines ifAlias to be stored in non-volatile storage.
