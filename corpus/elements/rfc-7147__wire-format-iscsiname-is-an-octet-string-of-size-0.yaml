document: rfc-7147
kind: wire-format
summary: IscsiName is an OCTET STRING of SIZE(0 | 16..223) encoded as UTF-8, where a zero-length string indicates absence of an iSCSI name. The 16-byte minimum and 223-byte maximum match the iSCSI name format specified in RFC 7143 Section 4.2.7.
