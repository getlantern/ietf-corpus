document: rfc-6933
kind: security-consideration
summary: The entLogicalCommunity object may expose SNMPv1/v2c community strings used as management credentials. Agents must guard against returning higher-privilege community strings than were used in the request, and SNMPv3 deployments should prefer the context-based objects instead.
section: "5"
topics:
