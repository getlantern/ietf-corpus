document: rfc-8784
kind: security-consideration
summary: The PPK must contain at least 256 bits of entropy to provide 128 bits of post-quantum security (equivalent to NIST Category 5) and resist Grover's algorithm. Deriving a PPK from a password or other low-entropy source is insecure.
section: "6"
topics:
