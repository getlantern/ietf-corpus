document: rfc-4422
kind: wire-format
summary: Each security-layer protected-data buffer is transferred over the transport as a four-octet network-byte-order length field followed by the buffer octets. The length field value MUST NOT exceed the maximum size negotiated or specified for the receiving side.
section: "3.7"
topics:
    - security
