document: rfc-8317
kind: protocol-element
summary: 'For Scenario 1 (Leaf or Root per PE), two BGP Route Targets per EVI are used: one for Root sites and one for Leaf sites. Root PEs import both Root and Leaf RTs; Leaf-only PEs import only the Root RT, preventing MAC route exchange between Leaf-only PEs.'
section: "3.1"
topics:
