document: rfc-8334
kind: design-rationale
summary: Launch phases MAY overlap (e.g., "claims" and "landrush" simultaneously); the recommended approach is to set "claims" as the <launch:phase> value and "landrush" as the sub-phase via the "name" attribute, rather than introducing new phase values.
section: "2.3"
topics:
    - registry
