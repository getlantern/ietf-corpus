document: rfc-2446
kind: normative-requirement
summary: If the UID in an ADD method is not found on the recipient's calendar, the recipient SHOULD send a REFRESH to the Organizer to obtain the latest version of the VEVENT. An Attendee implementation that does not support ADD should respond with REQUEST-STATUS value 3.14 and request a REFRESH.
section: 3.2.4
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
