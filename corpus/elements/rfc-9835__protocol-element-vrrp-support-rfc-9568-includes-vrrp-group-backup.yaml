document: rfc-9835
kind: protocol-element
summary: VRRP support (RFC 9568) includes 'vrrp-group', 'backup-peer', 'virtual-ip-address' (list), 'priority', 'ping-reply', and per-instance status. No authentication node is included because VRRP currently has no defined authentication mechanism per RFC 9568 Section 9.
