document: rfc-8227
kind: state-machine
summary: Transition from Idle to Pass-Through is triggered when an RPS request changes from NR to any other code in any direction, provided the new request is not destined to this node. Reversion from Pass-Through to Idle requires NR received in both directions simultaneously. Transition to Switching requires an RPS request destined to this node, an externally initiated command, or detection of a local MPLS-TP section failure.
section: 5.2.4
topics:
    - mpls
    - routing
