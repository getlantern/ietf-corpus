document: rfc-4513
kind: security-consideration
summary: LDAP implementations SHOULD NOT by default support authentication using clear text passwords unless the session is protected by TLS or other data confidentiality mechanisms. Server implementations supporting clear-text password authentication MUST support a policy requiring TLS or equivalent confidentiality protection.
section: 6.3.3
rfc2119_level: MUST
topics:
    - ldap
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
