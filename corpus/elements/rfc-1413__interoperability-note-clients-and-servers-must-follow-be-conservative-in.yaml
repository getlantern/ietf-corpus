document: rfc-1413
kind: interoperability-note
summary: Clients and servers must follow 'be conservative in what you send, be liberal in what you accept' for whitespace. Whitespace is permitted anywhere except within a token, but everything from the colon after the OS type through the terminating CR-LF is part of the user-id and whitespace there is significant.
section: "5"
