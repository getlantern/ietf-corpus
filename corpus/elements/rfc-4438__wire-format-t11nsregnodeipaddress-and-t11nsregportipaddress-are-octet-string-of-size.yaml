summary: t11NsRegNodeIpAddress and t11NsRegPortIpAddress are OCTET STRING of SIZE (0 | 16), encoding either a 32-bit IPv4 address (right-justified in 16 bytes with leftmost 12 bytes set to x'00 00 00 00 00 00 00 00 00 00 FF FF') or a 128-bit IPv6 address, in network-byte order.
