summary: diffServClfrElementTable defines classifier elements, each with a precedence value, a 'specific' RowPointer to the matching rule, and a 'next' RowPointer directing matched traffic to the next functional data path element. Multiple elements within a classifier are evaluated at each precedence level as if in parallel.
