summary: With virtual concatenation, PPP over SONET/SDH gains access to VT-1.5-nv (n=1-64, 1.6–102 Mbit/s), STS-1-nv (n=1-64, 49–3100 Mbit/s), and STS-3c-nv (n=1-64, 150–10000 Mbit/s) on SONET, and corresponding VC-12-nv, VC-3-nv, VC-4-nv on SDH.
