document: rfc-7182
kind: security-consideration
summary: A MANET routing protocol using this framework MUST describe how the framework and TLVs are used and MUST describe the protection attained. It SHOULD indicate which security threats are counteracted (e.g., link or identity spoofing) and which are not (e.g., compromised keys).
section: "14"
topics:
    - security
    - crypto
    - routing
