document: rfc-6135
kind: protocol-element
summary: When an MSRP UA uses a self-signed TLS certificate to authenticate itself to peers, it includes its certificate fingerprint in the SDP. Fingerprints can only be exchanged in peer-to-peer communication, as MSRP relays do not receive SDP payloads.
section: "4.3"
topics:
    - tls
    - realtime
    - security
