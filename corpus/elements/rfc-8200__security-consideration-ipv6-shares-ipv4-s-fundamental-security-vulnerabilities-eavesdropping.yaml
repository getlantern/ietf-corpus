document: rfc-8200
kind: security-consideration
summary: 'IPv6 shares IPv4''s fundamental security vulnerabilities: eavesdropping, replay, packet insertion, packet deletion, packet modification, MITM attacks, and DoS attacks. IPsec (RFC 4301) can protect against all except DoS; there is no mechanism in IPv6 to protect against DoS attacks.'
