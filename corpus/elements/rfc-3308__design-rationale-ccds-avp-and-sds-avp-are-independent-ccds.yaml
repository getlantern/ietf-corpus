document: rfc-3308
kind: design-rationale
summary: CCDS AVP and SDS AVP are independent; CCDS handles diffserv for the control connection while SDS handles data sessions. The PHB code in one SHOULD NOT imply anything about the PHB code in the other, allowing implementations to support either or both.
section: "5"
topics:
