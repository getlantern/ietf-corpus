document: rfc-9842
kind: normative-requirement
summary: For clients such as browsers that protect against payload readability and user tracking, dictionary compression MUST only be used when both the dictionary and the compressed response are fully readable by the client — either same-origin or cross-origin passing a CORS check.
section: 9.3.2
rfc2119_level: MUST
topics:
    - http
    - security
    - privacy
