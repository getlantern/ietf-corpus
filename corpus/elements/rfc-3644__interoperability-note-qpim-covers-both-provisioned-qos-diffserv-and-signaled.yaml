document: rfc-3644
kind: interoperability-note
summary: 'QPIM covers both provisioned QoS (DiffServ) and signaled QoS (IntServ/RSVP) using distinct action hierarchies: QoSPolicyAdmissionAction/PHBAction for DiffServ, and QoSPolicyRSVPAdmissionAction/QoSPolicyRSVPSimpleAction for RSVP. The model does not mandate the use of either methodology.'
