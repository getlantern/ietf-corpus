document: rfc-7886
kind: design-rationale
summary: Although RFC 7880 (S-BFD) primarily concerns advertising a single discriminator, the L2TPv3 AVP encoding was designed to allow an arbitrary number of S-BFD Discriminators for extensibility. This enables future use cases requiring multiple discriminators without a format change.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
