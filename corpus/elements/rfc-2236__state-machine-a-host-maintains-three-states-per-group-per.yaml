document: rfc-2236
kind: state-machine
summary: 'A host maintains three states per group per interface: Non-Member (initial), Delaying Member (member with running report delay timer), and Idle Member (member without running timer). Transitions are triggered by join group, leave group, query received, report received, and timer expired events.'
