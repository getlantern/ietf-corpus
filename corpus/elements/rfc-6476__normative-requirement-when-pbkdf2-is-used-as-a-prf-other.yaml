document: rfc-6476
kind: normative-requirement
summary: When PBKDF2 is used as a PRF other than the default, the PBKDF2-params 'salt' parameter MUST be an empty (zero-length) string and the 'iterationCount' parameter MUST be one, since these values are not used in the PRF process.
section: "4"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
