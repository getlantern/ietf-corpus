document: rfc-9467
kind: normative-requirement
summary: When PC is strictly larger than PCh (i ≥ S), the window MUST be shifted left by (i - S + 1), PCh MUST be updated to the received PC, and the right-edge window value MUST be set.
section: "3.2"
rfc2119_level: MUST
topics:
