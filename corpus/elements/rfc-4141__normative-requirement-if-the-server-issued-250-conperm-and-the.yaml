document: rfc-4141
kind: normative-requirement
summary: If the server issued 250-CONPERM and the client is participating in CONPERM for this message, the client MUST issue the CONPERM parameter in MAIL-FROM. If the server does not issue 250-CONPERM, the client MUST treat the transmission as permanently rejected.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
