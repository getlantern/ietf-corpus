document: rfc-3301
kind: design-rationale
summary: Separate Rx Minimum/Maximum BPS AVPs were introduced alongside the existing Tx BPS AVPs because ATM traffic contracts are inherently asymmetric; absence of the Rx AVPs signals symmetric operation, preserving backward compatibility with RFC 2661 implementations.
