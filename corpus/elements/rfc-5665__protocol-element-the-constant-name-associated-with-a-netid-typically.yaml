document: rfc-5665
kind: protocol-element
summary: The constant name associated with a netid typically carries the prefix 'NC_' and a suffix equal to the upper-case netid. The constant 'NC_' alone is Reserved, and the constant name may be 1 to 131 octets long. Constants with 'NC_' prefix and total length ≤11 characters should be for Standards Action assignments.
section: "5.1"
topics:
    - registry
