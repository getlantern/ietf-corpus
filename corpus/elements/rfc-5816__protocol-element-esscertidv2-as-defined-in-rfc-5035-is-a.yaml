document: rfc-5816
kind: protocol-element
summary: ESSCertIDv2, as defined in RFC 5035, is a certificate identifier that supports any hash algorithm and is carried inside a SigningCertificateV2 signed attribute within a CMS SignedData signerInfo. It replaces ESSCertID (SHA-1 only) when non-SHA-1 hashing is required.
section: 2.2.1
topics:
