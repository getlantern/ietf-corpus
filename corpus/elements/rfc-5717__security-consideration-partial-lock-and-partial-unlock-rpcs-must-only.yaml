document: rfc-5717
kind: security-consideration
summary: <partial-lock> and <partial-unlock> RPCs MUST only be allowed for authenticated users and SHOULD only be allowed for authorized users. Partial locking is not an authorization mechanism and SHOULD NOT be used to provide security or access control.
section: "3"
topics:
