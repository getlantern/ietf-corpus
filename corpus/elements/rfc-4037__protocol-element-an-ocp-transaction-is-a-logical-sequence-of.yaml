document: rfc-4037
kind: protocol-element
summary: An OCP transaction is a logical sequence of messages processing a single original application message, producing zero or more adapted messages. It starts with Transaction Start (TS) sent by the OPES processor and ends with the first Transaction End (TE) message from either side.
