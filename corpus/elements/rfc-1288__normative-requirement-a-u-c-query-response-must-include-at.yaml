document: rfc-1288
kind: normative-requirement
summary: A {U}{C} query response MUST include at least the full name of the specified user. If the user is logged in, at least the same amount of information returned by a {C} query for that user MUST also be returned.
section: 2.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
