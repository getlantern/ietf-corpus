document: rfc-6321
kind: normative-requirement
summary: For the XML iCalendar property, if the XML source contains characters not allowed in TEXT values, the data MUST be base64 encoded, with ENCODING=BASE64 and VALUE=BINARY parameters both present and set accordingly.
