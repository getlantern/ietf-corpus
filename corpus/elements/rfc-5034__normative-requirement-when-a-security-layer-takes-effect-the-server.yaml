document: rfc-5034
kind: normative-requirement
summary: When a security layer takes effect, the server MUST discard any knowledge previously obtained from the client not obtained from the SASL negotiation itself, and the client MUST discard any knowledge obtained from the server such as the list of available POP3 service extensions.
section: "4"
rfc2119_level: MUST
topics:
