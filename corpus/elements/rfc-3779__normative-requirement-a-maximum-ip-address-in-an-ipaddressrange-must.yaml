document: rfc-3779
kind: normative-requirement
summary: A maximum IP address in an IPAddressRange MUST contain at least one bit whose value is 1; the subsequent octets may not be omitted or all zero. This ensures unambiguous semantic interpretation that all unspecified high-address bits are ones.
section: 2.2.3.9
rfc2119_level: MUST
topics:
    - pkix
    - ip
