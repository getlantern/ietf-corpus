document: rfc-6716
kind: wire-format
summary: 'The TOC byte occupies the first byte of every Opus packet and encodes: a 5-bit ''config'' field (bits 0–4) selecting one of 32 mode/bandwidth/frame-size configurations, a 1-bit stereo flag ''s'' (bit 5), and a 2-bit frame-count code ''c'' (bits 6–7) indicating 1 frame, 2 equal-size frames, 2 variable-size frames, or an arbitrary number of frames.'
section: "3.1"
topics:
