document: rfc-9020
kind: security-consideration
summary: NETCONF access MUST use SSH as the mandatory-to-implement secure transport (RFC 6242); RESTCONF access MUST use HTTPS with TLS (RFC 8446). NACM (RFC 8341) SHOULD be used to restrict access to sensitive SR configuration and state nodes.
section: "9"
topics:
