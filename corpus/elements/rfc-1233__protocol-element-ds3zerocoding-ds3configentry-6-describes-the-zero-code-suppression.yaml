document: rfc-1233
kind: protocol-element
summary: ds3ZeroCoding (ds3ConfigEntry 6) describes the zero-code suppression method used on the DS3 link, with defined values ds3other(1) and ds3B3ZS(2). B3ZS uses specified patterns of normal bits and bipolar violations to replace sequences of zero bits.
