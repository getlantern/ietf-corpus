document: rfc-4875
kind: normative-requirement
summary: Each S2L sub-LSP of a P2MP LSP MUST have the same protection characteristics. Fast reroute procedures from RFC 4090 MUST be followed, and RRO processing MUST apply to SRROs as well unless otherwise modified.
section: "15"
rfc2119_level: MUST
topics:
