document: rfc-9448
kind: protocol-element
summary: The challenge type used for TNAuthList authorization is 'tkauth-01' with a 'tkauth-type' of 'atc', inherited from RFC 9447. The challenge object may also include a 'token-authority' parameter providing the URL of the Token Authority, and a 'token' nonce.
