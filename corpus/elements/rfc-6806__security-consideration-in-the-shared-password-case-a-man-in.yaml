document: rfc-6806
kind: security-consideration
summary: In the shared-password case, a man-in-the-middle can alter the client principal name in the request or replay a prior KDC response with modified PA-ETYPE-INFO, causing a client to unknowingly authenticate with wrong credentials without the attacker knowing the password.
section: "13.1"
topics:
