document: rfc-8864
kind: design-rationale
summary: Two separate SDP attributes ('a=dcmap:' for channel parameters and 'a=dcsa:' for subprotocol parameters) are defined rather than a single unified attribute, because channel properties are fixed at creation time while subprotocol attributes are subject to ongoing offer/answer negotiation following subprotocol-specific rules.
