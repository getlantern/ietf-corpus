document: rfc-2511
kind: security-consideration
summary: The security of CRMF delivery is entirely reliant on the security mechanisms of the enclosing protocol or process. That protocol must ensure integrity, data origin authenticity, and privacy. Encryption of a CRMF is strongly recommended when it contains subscriber-sensitive information and when the CA has an accessible encryption certificate.
section: "8"
topics:
