document: rfc-5611
kind: protocol-element
summary: 'The C bit in the RTP AVP controls RTP header position: C=1 places the RTP header after the Control Word (standard SAToP/CESoPSN over L2TPv3); C=0 places the RTP header before the Control Word (legacy mode described in RFC 4553 Appendix A and RFC 5086 Appendix C).'
section: "2.2"
topics:
