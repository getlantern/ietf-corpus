document: rfc-9910
kind: protocol-element
summary: The 'rdap-active' link relation denotes a relation search filtered for status 'active'. It is used only as a link relation in link objects combined with 'rdap-up' or 'rdap-top' (e.g., rel='rdap-up rdap-active'), and cannot be used as a <relation> value in relation search URLs.
section: "3.4"
topics:
