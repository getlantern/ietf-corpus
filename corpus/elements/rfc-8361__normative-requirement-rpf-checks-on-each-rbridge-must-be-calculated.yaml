document: rfc-8361
kind: normative-requirement
summary: RPF checks on each RBridge MUST be calculated as if the centralized node were the ingress RBridge for trees rooted at that node, rather than using the actual ingress virtual RBridge. This allows traffic to arrive correctly on the centralized-node-facing port.
section: "3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
