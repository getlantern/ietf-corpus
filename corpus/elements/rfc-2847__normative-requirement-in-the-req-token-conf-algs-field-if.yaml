document: rfc-2847
kind: normative-requirement
summary: In the REQ-TOKEN Conf-Algs field, if the SPKM-3 implementation supports an algorithm weaker than cast5CBC, cast5CBC MUST be listed first to encourage negotiation of the stronger algorithm.
