document: rfc-5710
kind: normative-requirement
summary: After initiating a reroute request when LSP removal on timeout is desired, the initiating node MUST start a timeout period. Upon receipt of a PathTear or a trigger Path message with an ERO avoiding the indicated resource, the timeout MUST be canceled.
section: 2.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
