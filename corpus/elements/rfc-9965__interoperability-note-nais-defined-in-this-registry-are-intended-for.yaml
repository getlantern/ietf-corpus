document: rfc-9965
kind: interoperability-note
summary: NAIs defined in this registry are intended for use in RADIUS User-Name attributes (RFC 2865 Section 5.1), which recommends support for at least 63 octets. NAIs between 63–253 octets may work; lengths of 254 octets or more will not work with RADIUS.
section: 5.2.2
topics:
    - security
    - registry
