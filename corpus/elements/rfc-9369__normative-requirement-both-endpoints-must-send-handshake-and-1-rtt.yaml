document: rfc-9369
kind: normative-requirement
summary: Both endpoints MUST send Handshake and 1-RTT packets using the negotiated version. An endpoint MUST drop packets using any other version. Endpoints have no need to generate keying material to decrypt or authenticate such packets.
section: "4.1"
rfc2119_level: MUST
topics:
    - quic
    - security
