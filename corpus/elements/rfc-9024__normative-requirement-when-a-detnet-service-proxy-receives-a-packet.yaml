document: rfc-9024
kind: normative-requirement
summary: When a DetNet service proxy receives a packet from the TSN entity, it MUST check whether such an App-flow is present in its mapping table. If present, it MUST forward the packet to the DetNet service and forwarding sub-layers; if no match is found, it MUST drop the packet.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
