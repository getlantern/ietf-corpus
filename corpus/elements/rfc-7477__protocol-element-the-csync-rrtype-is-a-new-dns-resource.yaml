document: rfc-7477
kind: protocol-element
summary: The CSYNC RRType is a new DNS resource record published at the apex of a child zone. Its RDATA contains a 32-bit SOA serial number, a 16-bit Flags field, and a Type Bit Map indicating which delegation record types (e.g., NS, A, AAAA) the parental agent should copy from the child zone to the parent.
section: "2"
