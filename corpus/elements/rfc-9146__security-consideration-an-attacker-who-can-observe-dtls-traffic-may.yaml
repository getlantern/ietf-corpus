document: rfc-9146
kind: security-consideration
summary: An attacker who can observe DTLS traffic may replay datagrams with modified IP addresses and port numbers. The three-condition check in Section 6 (cryptographic verification, recency, reachability) limits but does not fully eliminate this attack surface.
