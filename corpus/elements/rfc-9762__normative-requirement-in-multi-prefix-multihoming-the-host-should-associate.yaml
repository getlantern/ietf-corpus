document: rfc-9762
kind: normative-requirement
summary: In multi-prefix multihoming, the host SHOULD associate each delegated prefix with the link-local address of the DHCPv6 server or relay from which it received the REPLY packet. When multiple REPLYs carry the same prefix from distinct link-local addresses, the host SHOULD associate the prefix with all such addresses.
section: "8"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
