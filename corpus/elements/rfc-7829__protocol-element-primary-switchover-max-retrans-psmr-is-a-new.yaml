document: rfc-7829
kind: protocol-element
summary: Primary.Switchover.Max.Retrans (PSMR) is a new tunable parameter governing the Primary Path Switchover feature. For SCTP-PF implementations PSMR MUST be >= PFMR; for standard SCTP implementations PSMR MUST be >= PMR. Setting PSMR = PFMR (or PMR for standard SCTP) disables forced switchback to the original primary path.
section: "5"
topics:
