document: rfc-9439
kind: normative-requirement
summary: If a cost metric string does not include the optional statistical operator, the statistical operator SHOULD be interpreted as the default defined for the base metric. If the base metric defines no default, the metric MUST be considered the median value.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
