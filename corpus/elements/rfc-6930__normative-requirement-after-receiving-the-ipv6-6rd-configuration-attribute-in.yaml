document: rfc-6930
kind: normative-requirement
summary: After receiving the IPv6-6rd-Configuration attribute in the initial Access-Accept, the BNG SHOULD store the 6rd configuration parameters locally so it can reply to subsequent DHCP Request messages (lease renewal) without a new Access-Request.
