document: rfc-9820
kind: wire-format
summary: In the CoAP-EAP payload (media type application/coap-eap), the trigger message (Step 0) carries only a relative URI. All other messages carry an EAP packet (Code + Identifier + Length + Data fields) immediately followed by the CoAP-EAP_Info CBOR Object for cipher suite negotiation and related parameters.
