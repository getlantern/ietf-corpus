document: rfc-7537
kind: registry
summary: IANA created the 'Multipath Types' registry for MPLS LSP Ping. Values 0-250 and 255 require Standards Action; 251-254 are Experimental Use. Initial values include 0 (no multipath), 2 (IP address), 4 (IP address range), 8 (Bit-masked IP address set), and 9 (Bit-masked label set), all from RFC 4379.
section: "2.2"
topics:
