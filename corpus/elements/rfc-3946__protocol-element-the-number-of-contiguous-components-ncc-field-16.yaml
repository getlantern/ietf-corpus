document: rfc-3946
kind: protocol-element
summary: The Number of Contiguous Components (NCC) field (16 bits) specifies how many identical Elementary Signal SPEs/VCs are to be contiguously concatenated as requested by RCC. When requesting STS-Nc SPE with N=3*X, the Elementary Signal must be STS-3c_SPE and NCC must equal X; this prohibits coding contiguous concatenation of three STS-1 SPEs directly. NCC must be zero when RCC is zero.
section: "2.1"
topics:
    - mpls
    - routing
