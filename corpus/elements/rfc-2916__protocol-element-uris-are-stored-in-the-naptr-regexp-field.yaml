document: rfc-2916
kind: protocol-element
summary: URIs are stored in the NAPTR regexp field. The service field uses compound names like 'sip+E2U', 'mailto+E2U', 'tel+E2U', or 'ldap+E2U' to identify the protocol and E2U service. The 'u' flag in the flags field indicates the result is a URI.
