document: rfc-6822
kind: design-rationale
summary: Supporting multiple topologies (ITIDs) within a single non-zero instance is preferred over multiple instances in most cases, as it reduces the number of adjacencies required. Multiple instances are only warranted when the desired topology sets for different application groups are largely disjoint.
section: "3.3"
