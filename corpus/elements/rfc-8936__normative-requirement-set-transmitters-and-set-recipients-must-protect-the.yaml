document: rfc-8936
kind: normative-requirement
summary: SET Transmitters and SET Recipients MUST protect the confidentiality of SET contents when SETs may contain sensitive information. The event delivery endpoint MUST support at least TLS version 1.2 and SHOULD support the newest version of TLS that meets its security requirements.
section: "4.3"
rfc2119_level: MUST
topics:
    - tls
    - security
    - privacy
