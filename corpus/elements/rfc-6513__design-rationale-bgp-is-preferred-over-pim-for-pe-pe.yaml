document: rfc-6513
kind: design-rationale
summary: BGP is preferred over PIM for PE-PE exchange of C-multicast routing because BGP provides reliable transport with incremental updates; PIM is a soft-state protocol requiring periodic full retransmissions whose overhead grows with the number of MVPNs and C-trees.
section: "2.5"
topics:
    - bgp
    - mpls
    - multicast
    - routing
