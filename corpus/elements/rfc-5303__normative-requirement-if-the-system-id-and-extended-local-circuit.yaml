document: rfc-5303
kind: normative-requirement
summary: If the system ID and Extended Local Circuit ID of the neighboring system are known (three-way state Initializing or Up), the neighbor's system ID SHALL be reported in the Neighbor System ID field and the neighbor's Extended Local Circuit ID SHALL be reported in the Neighbor Extended Local Circuit ID field.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
