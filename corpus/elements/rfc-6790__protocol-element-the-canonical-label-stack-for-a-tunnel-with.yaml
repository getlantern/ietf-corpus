document: rfc-6790
kind: protocol-element
summary: The canonical label stack for a tunnel with an entropy label is <TL, ELI, EL> followed by the remaining packet header. This increases label stack depth by two relative to a plain tunnel; transit LSRs swap only TL and leave ELI and EL intact, while the egress pops all three.
section: "4.1"
topics:
