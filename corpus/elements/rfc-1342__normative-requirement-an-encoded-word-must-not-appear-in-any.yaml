document: rfc-1342
kind: normative-requirement
summary: An encoded-word MUST NOT appear in any portion of an 'address'. Additionally, an encoded-word MUST NOT be used in a Received header field.
section: Use of encoded-words in message headers
rfc2119_level: MUST NOT
