document: rfc-6370
kind: design-rationale
summary: The IF_ID format (Node_ID::IF_Num) was chosen to be compatible with GMPLS, which requires interface identification in three formats; the MPLS-TP format is consistent with the GMPLS third format (IPv4 address plus 32-bit interface integer) substituting Node_ID for the IPv4 address.
