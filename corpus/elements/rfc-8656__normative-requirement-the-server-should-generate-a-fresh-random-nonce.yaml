document: rfc-8656
kind: normative-requirement
summary: The server SHOULD generate a fresh random nonce for each new Allocate attempt and SHOULD expire the nonce at least once per hour during the allocation's lifetime, following the randomness recommendations in RFC 4086, to prevent replay attacks.
section: "5"
rfc2119_level: SHOULD
topics:
