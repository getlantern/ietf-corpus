document: rfc-2495
kind: interoperability-note
summary: Successive GETs of dsx1IntervalSESs and dsx1IntervalUASs may return differing values if the 10-second period leading to available or unavailable time crosses a 900-second statistics window boundary and the first GET occurs during the first few seconds of the new window.
section: 2.4.3
