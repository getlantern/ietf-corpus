document: rfc-4436
kind: design-rationale
summary: DNAv4 does not apply to IPv4 Link-Local addresses because they are not issued by an authoritative server and have no guaranteed usable lifetime; a host's claim is only valid while it remains connected and actively defending the address.
section: "2.3"
