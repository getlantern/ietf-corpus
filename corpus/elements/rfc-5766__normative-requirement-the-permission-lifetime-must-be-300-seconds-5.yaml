document: rfc-5766
kind: normative-requirement
summary: The Permission Lifetime MUST be 300 seconds (5 minutes). A permission is reset to this value when installed or refreshed; the server silently discards UDP datagrams from peers without a matching IP-address permission.
section: "8"
rfc2119_level: MUST
topics:
    - nat
    - security
