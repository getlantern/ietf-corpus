document: rfc-3020
kind: interoperability-note
summary: Bundles and bundle links must appear in the ifStackTable (RFC 2863). Each bundle link appears as a lower layer beneath its owner bundle; the bundle itself appears as a lower layer to a frame relay service or UNI. This layering is required for correct integration with the interfaces group.
section: 2.3.2
topics:
    - snmp
