document: rfc-8534
kind: protocol-element
summary: The 'match for tracking' is a new concept distinct from 'match for reception'. It is determined by applying the RFC 6625 match-for-reception rules but NOT ignoring S-PMSI A-D routes whose PTA specifies 'no tunnel information present' if those routes have the LIR or LIR-pF flag set.
section: "3"
topics:
    - multicast
    - mpls
    - routing
