summary: The t11FcRouteFabricTable provides per-Fabric routing metadata indexed by fcmInstanceIndex, fcmSwitchIndex, and t11FcRouteFabricIndex. It contains t11FcRouteFabricLastChange, a TimeStamp reflecting the most recent creation, modification, or deletion of any route in that Fabric.
