document: rfc-9274
kind: interoperability-note
summary: Legacy ALTO servers will reply with error code E_INVALID_FIELD_VALUE for requests including a cost type other than 'numerical' or 'ordinal' for the 'routingcost' metric. ALTO clients must use capability advertisement (RFC 7285 Section 9.2) to discover supported cost modes before using new ones.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
