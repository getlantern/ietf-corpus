kind: wire-format
summary: For IP/UDP BFD encapsulation, BFD Control packets are transmitted in UDP with destination port 3784, source port in range 49152–65535, destination IP from 127/8 (IPv4) or 0:0:0:0:0:FFFF:127.0.0.0/104 (IPv6), and TTL/Hop Limit set to 255.
