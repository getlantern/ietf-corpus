document: rfc-7472
kind: normative-requirement
summary: When comparing two 'ipps' URIs, an IPP Client MUST use the same rules as for 'http' and 'https' URI comparisons in RFC 7230, except that a port that is empty or not given MUST be treated as equivalent to port 631.
section: "4.6"
rfc2119_level: MUST
topics:
    - http
