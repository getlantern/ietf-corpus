document: rfc-3720
kind: normative-requirement
summary: iSCSI targets and initiators MUST support at least one TCP connection and MAY support several connections in a session. For error recovery purposes, targets and initiators that support a single active connection SHOULD support two connections during recovery.
section: 3.2.1
rfc2119_level: MUST
topics:
    - tcp
    - security
