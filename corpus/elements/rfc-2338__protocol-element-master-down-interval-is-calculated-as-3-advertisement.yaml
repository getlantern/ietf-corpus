document: rfc-2338
kind: protocol-element
summary: Master_Down_Interval is calculated as (3 × Advertisement_Interval) + Skew_Time, where Skew_Time = (256 − Priority) / 256 seconds. This skew staggers Backup transitions based on priority to ensure the highest-priority Backup wins.
section: 6.1.2
topics:
    - routing
