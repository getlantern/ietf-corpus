document: rfc-7513
kind: security-consideration
summary: The Data Snooping Process is inherently less secure than the DHCP Snooping Process because it relies on ARP/NS and leasequery rather than direct observation of DHCP exchanges. A sophisticated attacker who can suppress leasequery responses or forge ARP replies may be able to establish false bindings.
section: "11.1"
topics:
    - security
    - ip
