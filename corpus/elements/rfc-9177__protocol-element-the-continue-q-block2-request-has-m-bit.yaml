document: rfc-9177
kind: protocol-element
summary: The 'Continue' Q-Block2 request has M bit set with 'NUM modulo MAX_PAYLOADS' equal to zero (and NUM non-zero). It confirms that the previous MAX_PAYLOADS_SET was fully received and instructs the server to continue sending the next set without waiting for the NON_TIMEOUT_RANDOM delay.
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
