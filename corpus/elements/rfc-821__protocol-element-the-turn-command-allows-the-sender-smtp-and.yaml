document: rfc-821
kind: protocol-element
summary: The TURN command allows the sender-SMTP and receiver-SMTP to reverse roles over the existing transmission channel. The receiver may refuse with reply 502. TURN is optional and most useful when channel establishment is costly.
section: "3.8"
