document: rfc-6172
kind: protocol-element
summary: 'iFCP address translation mode must translate fabric addresses embedded in two types of N_PORT control frames: Extended Link Services (ELSs) and FC-4 Link Services (FC-4 LSs) for SCSI over Fibre Channel Protocol (FCP). The embedded fabric address translations were specified in Section 7.3 of RFC 4172.'
section: "3"
