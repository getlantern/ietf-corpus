document: rfc-3550
kind: normative-requirement
summary: Every compound RTCP packet MUST begin with an SR or RR report packet to enable header validation. Even if no data has been sent or received, an empty RR MUST be sent as the first packet of the compound.
section: "6.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
