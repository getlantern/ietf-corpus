document: rfc-8473
kind: normative-requirement
summary: The scope of Token Binding key pairs generated by web browsers for binding HTTP cookies MUST be no wider than the granularity of a registered domain (eTLD+1). User Agents SHOULD use an up-to-date public suffix list such as Mozilla's PSL.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
