document: rfc-9112
kind: normative-requirement
summary: If a message is received with both Transfer-Encoding and Content-Length, Transfer-Encoding overrides. An intermediary that forwards such a message MUST first remove the Content-Length field and process the Transfer-Encoding prior to forwarding.
section: "6.3"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
