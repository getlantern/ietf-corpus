document: rfc-7798
kind: normative-requirement
summary: PACI F1 and F2 bits MUST be 0 in this version; receivers MUST ignore F1=1 and/or F2=1 and any associated PHES data. The Y bit MUST be 0 and receivers MUST ignore Y=1 and any associated PHES data.
section: 4.4.4
rfc2119_level: MUST
