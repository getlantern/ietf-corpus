document: rfc-7035
kind: wire-format
summary: All coordinate, distance, and angle values in the binary form are encoded as IEEE 754 single-precision 32-bit floating-point (sign, 8 exponent bits, 23 fractional bits), most-significant bit first. When a value cannot be exactly represented, the best approximation MUST be selected per Clinger (1990).
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
