document: rfc-7151
kind: normative-requirement
summary: A server-PI SHOULD validate that the hostname given represents a valid virtual host upon receiving HOST. If the hostname is syntactically invalid, a 501 reply SHOULD be sent; if valid but not a known virtual host, a 504 reply SHOULD be sent.
section: "3.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
