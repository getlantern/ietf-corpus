document: rfc-7346
kind: interoperability-note
summary: RFC 7346 resolves a disagreement between RFC 4007 Section 5 and RFC 4291 Section 2.7 regarding how multicast scop 3 is configured. RFC 4007's bullet requiring administrative configuration of non-interface-local, non-link-local, non-global scopes is updated to defer to the IPv6 addressing architecture as updated by RFC 7346.
section: "4"
topics:
