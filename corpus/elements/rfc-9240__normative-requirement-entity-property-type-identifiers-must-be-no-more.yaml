document: rfc-9240
kind: normative-requirement
summary: Entity property type identifiers MUST be no more than 32 characters using only US-ASCII alphanumeric, hyphen-minus, colon, or low line. All entity property types not prefixed with 'priv:' MUST be registered in the 'ALTO Entity Property Types' registry. The 'priv:' prefix alone is not a valid identifier; an additional distinguishing string MUST follow.
section: 5.2.1
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
