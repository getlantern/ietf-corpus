document: rfc-9200
kind: protocol-element
summary: The authz-info endpoint, implemented by the RS at default path '/authz-info', accepts POST requests carrying an access token. It is not itself a protected resource and MUST NOT be protected as such. The RS stores the verified token for subsequent client authorization decisions.
section: 5.10.1
topics:
    - oauth
