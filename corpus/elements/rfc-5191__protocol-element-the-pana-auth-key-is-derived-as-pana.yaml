document: rfc-5191
kind: protocol-element
summary: 'The PANA_AUTH_KEY is derived as: PANA_AUTH_KEY = prf+(MSK, "IETF PANA" | I_PAR | I_PAN | PaC_nonce | PAA_nonce | Key_ID), where prf+ is the IKEv2 function from RFC 4306, I_PAR and I_PAN are the initial (S-bit) message bodies, and Key_ID is the MSK identifier from the Key-Id AVP.'
section: "5.3"
topics:
    - security
    - crypto
