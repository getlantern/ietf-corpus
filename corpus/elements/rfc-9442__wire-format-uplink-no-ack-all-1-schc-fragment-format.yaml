summary: 'Uplink No-ACK All-1 SCHC Fragment format: RuleID (3 bits) | FCN=ALL-1 (5 bits) | RCS (5 bits) | padding b''000 (3 bits) | Payload (0–80 bits). Sender-Abort is 1 byte (RuleID + FCN=ALL-1 only) making All-1 distinguishable by minimum size of 2 bytes.'
