summary: The epsk-supported-hash typedef enumerates sha-256 and sha-384, representing the hash algorithms supported by an External Pre-Shared Key (EPSK) instance per RFC 8446 §4.2.11; sha-256 is the default for the hash leaf in tls13-epsk containers.
