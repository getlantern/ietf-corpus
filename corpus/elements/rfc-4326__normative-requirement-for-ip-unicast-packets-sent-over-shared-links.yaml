document: rfc-4326
kind: normative-requirement
summary: For IP unicast packets sent over shared links (multiple Receivers), the SNDU Destination Address field MUST be carried (D=0). For multicast packets with D=0, the IP group address MUST be mapped to the multicast NPA address following RFC 1112 (IPv4) or RFC 2464 (IPv6).
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
