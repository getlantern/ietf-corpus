document: rfc-5060
kind: security-consideration
summary: Several MIB objects have read-write or read-create access and can alter PIM router behavior (timer values, RP configuration, interface mode). Unauthorized write access could disrupt multicast forwarding across the network. The Security Considerations section recommends using SNMPv3 with authentication and privacy to protect these objects.
section: "6"
topics:
    - security
    - snmp
    - multicast
