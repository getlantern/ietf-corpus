document: rfc-8852
kind: design-rationale
summary: RTP header extensions for these SDES items are necessary because recipients typically need to identify streams immediately upon receipt, and RTCP delivery may not be sufficiently responsive at stream startup or after stream changes.
section: "3.3"
topics:
