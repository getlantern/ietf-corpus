document: rfc-3490
kind: normative-requirement
summary: ACE labels obtained from domain name slots SHOULD be hidden from users when it is known that the environment can handle the non-ACE form, except when the ACE form is explicitly requested. When requirements 2 and 3 both apply, requirement 2 (ASCII-only in IDN-unaware slots) takes precedence.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
