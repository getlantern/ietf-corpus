document: rfc-8108
kind: normative-requirement
summary: When using RTP/AVPF or RTP/SAVPF with T_rr_interval non-zero and an intent to have Td smaller than T_rr_interval, Td is RECOMMENDED to be targeted at less than 1/4 of T_rr_interval to avoid very large actual reporting intervals.
section: 7.2.2
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
