document: rfc-5908
kind: normative-requirement
summary: The OPTION_NTP_SERVER option MUST NOT appear in DHCPv6 messages other than Solicit, Advertise, Request, Renew, Rebind, Information-Request, and Reply. If it appears in other messages, the receiver MUST ignore it.
section: "5"
rfc2119_level: MUST NOT
topics:
    - ntp
