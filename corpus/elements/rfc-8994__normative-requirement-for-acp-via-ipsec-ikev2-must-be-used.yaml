document: rfc-8994
kind: normative-requirement
summary: For ACP via IPsec, IKEv2 MUST be used. The cipher suite profile MUST follow RFC 8221 (IPsec/ESP) and RFC 8247 (IKEv2). An optional GRE-over-IPsec variant is defined for environments where native IPsec ESP encapsulation is problematic (e.g., certain middleboxes).
section: 6.8.3
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
