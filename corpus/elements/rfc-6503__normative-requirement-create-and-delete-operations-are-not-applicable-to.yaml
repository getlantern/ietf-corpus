document: rfc-6503
kind: normative-requirement
summary: Create and delete operations are not applicable to usersRequest messages and MUST NOT be processed by the server; a response-code of '403' MUST be returned in those cases, since the <users> section is created and removed only in conjunction with creation and deletion of the parent conference document.
section: 5.3.5
rfc2119_level: MUST
topics:
    - realtime
