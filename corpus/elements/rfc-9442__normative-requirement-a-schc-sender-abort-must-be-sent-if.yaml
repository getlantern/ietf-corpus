document: rfc-9442
kind: normative-requirement
summary: A SCHC Sender-Abort MUST be sent if the number of repeated All-1s sent in sequence, without a Compound ACK reception in between, is greater than or equal to MAX_ACK_REQUESTS.
section: 3.5.1.1
rfc2119_level: MUST
