document: rfc-1894
kind: wire-format
summary: 'The xtext encoding allows arbitrary octets in DSN fields: printable ASCII chars (except "+", "\", "(") may appear as-is; other octets are encoded as "+" followed by two uppercase hex digits. The "+" character itself MUST be encoded as "+2B".'
section: 2.1.1
rfc2119_level: MUST
topics:
    - email
