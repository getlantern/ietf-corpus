document: rfc-9355
kind: design-rationale
summary: The Local Interface IPv4 Address TLV was introduced to solve the problem that OSPFv3 uses IPv6 link-local addresses for Hello packets even in IPv4 AF instances, meaning the neighbor's IPv4 address needed for BFD session setup is not otherwise available during Init state.
section: "4.1"
