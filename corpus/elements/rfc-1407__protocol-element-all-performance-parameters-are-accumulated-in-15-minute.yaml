document: rfc-1407
kind: protocol-element
summary: All performance parameters are accumulated in 15-minute intervals; up to 96 intervals (24 hours) are retained per interface. Fewer than 96 intervals are available if the agent was restarted within the last 24 hours. A rolling 24-hour total is also maintained. No requirement exists for aligning intervals with wall-clock quarter-hours.
section: 3.3.2
topics:
