document: rfc-1382
kind: protocol-element
summary: X121Address is a textual convention defined as OCTET STRING (SIZE(0..17)) containing ASCII characters [0-9], each octet holding one digit of the X.121 address. A zero-length value is valid and may be returned by PLEs that only support PVCs.
