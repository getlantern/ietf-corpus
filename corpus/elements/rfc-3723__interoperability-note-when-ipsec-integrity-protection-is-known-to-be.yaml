document: rfc-3723
kind: interoperability-note
summary: 'When IPsec integrity protection is known to be in place end-to-end between iSCSI endpoints, portions of iSCSI can be simplified: CRC check failure recovery is not necessary, and in certain NIC offload scenarios the iSCSI 32-bit CRC can be omitted entirely as it provides no additional protection.'
section: "3.6"
topics:
    - security
    - tcp
