document: rfc-6344
kind: normative-requirement
summary: To associate an existing VCAT call with a new VCG, a Notify message MUST be sent with CALL_ATTRIBUTES containing a VCAT TLV with Action=1, and Number of Members MUST equal the sum of all LSPs associated with the VCG. The sender MUST be prepared to receive an error response.
section: 5.3.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
