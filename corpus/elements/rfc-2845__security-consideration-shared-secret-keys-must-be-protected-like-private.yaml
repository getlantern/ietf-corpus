document: rfc-2845
kind: security-consideration
summary: Shared secret keys must be protected like private keys. Secrets should never be shared by more than two entities, never transmitted in the clear, and should be stored in encrypted form where possible. Compromised client hosts require the server to suspend all secrets known to that client.
section: "6.2"
topics:
    - dns
    - security
