document: rfc-7833
kind: normative-requirement
summary: The IdP MUST establish the identity of the client using a RADIUS authentication method. If ForceAuthn is present and true in the AuthnRequest, the IdP MUST freshly authenticate rather than relying on existing session state.
section: 7.3.3
rfc2119_level: MUST
topics:
    - radius
    - security
