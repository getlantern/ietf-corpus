document: rfc-7975
kind: protocol-element
summary: 'The ''error'' dictionary contains: error-code (Integer, mandatory, three-digit) and reason (String, optional). Error class 1xx = informational, 4xx = uCDN error, 5xx = dCDN error. Defined codes include 501 (unable to retrieve metadata), 502 (loop detected), 503 (max hops exceeded), 504 (out of capacity), 505 (delivery protocol not supported), 506 (redirection protocol not supported).'
section: "4.7"
