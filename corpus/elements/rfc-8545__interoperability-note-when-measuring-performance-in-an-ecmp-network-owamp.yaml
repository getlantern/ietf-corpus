document: rfc-8545
kind: interoperability-note
summary: When measuring performance in an ECMP network, OWAMP-Test/TWAMP-Test can monitor different paths by varying only one of the five-tuple parameters (e.g., source port number). Using the reallocated well-known UDP port as the Receiver Port does not negatively impact concurrent ECMP path monitoring since port use is optional.
section: "5.3"
topics:
    - measurement
    - ip
