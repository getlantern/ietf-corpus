document: rfc-9429
kind: design-rationale
summary: JSEP provides createOffer/createAnswer rather than a getCapabilities API because the latter would require every application (or a mandatory library) to generate correct session descriptions from raw capabilities. This would make even simple examples complex and force library adoption.
