document: rfc-5763
kind: normative-requirement
summary: To enable continuity of authentication, implementations SHOULD attempt to keep a constant long-term key. Verifying implementations SHOULD maintain a cache of the key used for each peer identity and alert the user if that key changes.
section: "8.4"
rfc2119_level: SHOULD
topics:
    - tls
    - security
    - crypto
