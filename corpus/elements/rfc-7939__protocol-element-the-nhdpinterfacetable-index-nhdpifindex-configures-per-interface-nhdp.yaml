summary: 'The nhdpInterfaceTable (INDEX { nhdpIfIndex }) configures per-interface NHDP parameters: nhdpHelloInterval (default 2000 ms), nhdpHelloMinInterval (default 500 ms), nhdpRefreshInterval (default 2000 ms), nhdpLHoldTime (default 6000 ms), nhdpHHoldTime (default 6000 ms), nhdpHpMaxJitter (default 500 ms), nhdpHtMaxJitter (default 500 ms), and link-quality thresholds (nhdpHystAcceptQuality, nhdpHystRejectQuality, nhdpInitialQuality, nhdpInitialPending).'
