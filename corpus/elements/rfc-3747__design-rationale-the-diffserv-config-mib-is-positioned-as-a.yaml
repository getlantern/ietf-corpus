document: rfc-3747
kind: design-rationale
summary: The DIFFSERV-CONFIG-MIB is positioned as a conceptual layer between the Policy-based Management MIB and the instance-specific Differentiated Services MIB. Changes to this MIB do not directly alter external traffic behavior; instead, configurations are instantiated into the DIFFSERV-MIB only when activated via policy or SNMP operations.
section: "5"
topics:
