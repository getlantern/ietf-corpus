document: rfc-2605
kind: security-consideration
summary: The MIB data can reveal directory system configuration and enable traffic pattern analysis, passively increasing vulnerability. It is recommended to control read access and consider encrypting object values in transit using SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575).
section: Security Considerations
topics:
    - snmp
    - security
    - ldap
