document: rfc-3798
kind: security-consideration
summary: MDNs do not provide non-repudiation or proof of delivery. MDNs may be lost in transit, forged, or bypassed; they cannot be relied upon as a guarantee that a message was or was not seen by the recipient.
section: "6.3"
topics:
