document: rfc-5388
kind: protocol-element
summary: OSName, OSVersion, ToolName, and ToolVersion elements are required in 'MeasurementMetadata' to enable cross-implementation result comparison. Because standard IPPM metrics do not apply to traceroute, OS and tool identification are the only means of normalizing results.
section: 5.2.5
topics:
    - measurement
