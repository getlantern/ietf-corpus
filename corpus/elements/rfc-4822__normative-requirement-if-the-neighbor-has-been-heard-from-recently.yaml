document: rfc-4822
kind: normative-requirement
summary: If the neighbor has been heard from recently and the received sequence number is less than the last received sequence number, the message MUST be discarded unprocessed and the out-of-order sequence number SHOULD be logged as a security event.
section: 2.3.2
rfc2119_level: MUST
topics:
    - routing
    - security
