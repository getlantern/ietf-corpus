document: rfc-3292
kind: design-rationale
summary: GSMP is deliberately asymmetric (controller as master, switch as slave) to allow a single controller to manage multiple switches via separate control connections and to allow a switch to be controlled by multiple controllers via static switch partitioning, cleanly separating control-plane intelligence from forwarding hardware.
