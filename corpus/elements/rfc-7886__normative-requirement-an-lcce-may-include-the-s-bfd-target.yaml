document: rfc-7886
kind: normative-requirement
summary: An LCCE MAY include the S-BFD Target Discriminator ID AVP in an L2TP control message (ICRQ, ICRP, OCRQ, OCRP). The receiving LCCE MAY use this AVP if it wants to monitor connectivity to the advertising LCCE using S-BFD.
section: "2.1"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
