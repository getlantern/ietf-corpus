document: rfc-9516
kind: state-machine
summary: In SFP traceroute mode, the sender begins with NSH TTL=1 and increments by 1 for each subsequent Echo Request. The sender stops transmitting when the received Echo Reply contains Return Code 5 ('End of the SFP'). This discovers the RSP hop-by-hop and localizes defects.
section: 6.5.4
topics:
    - routing
