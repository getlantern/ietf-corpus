document: rfc-9176
kind: normative-requirement
summary: A registrant-EP that uses an ephemeral port to register MUST include the base parameter in the registration to provide a valid network path. A registrant behind NAT MUST provide a reachable base address.
section: "5"
rfc2119_level: MUST
topics:
