document: rfc-9530
kind: security-consideration
summary: Integrity field validation consumes computational resources. Implementations can restrict validation by algorithm type, count, or content size to avoid resource exhaustion; however, skipping validation or ignoring failure of a preferred algorithm opens the door to downgrade attacks.
section: "6.7"
topics:
