document: rfc-6266
kind: security-consideration
summary: Trusting the server-provided file extension could introduce privilege escalation when the saved file is later opened by the operating system. Recipients should validate that the extension safely matches the received media type rather than blindly using the server-supplied name.
section: "4.3"
topics:
    - http
    - security
