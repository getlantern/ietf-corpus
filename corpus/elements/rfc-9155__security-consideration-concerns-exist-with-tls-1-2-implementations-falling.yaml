document: rfc-9155
kind: security-consideration
summary: Concerns exist with TLS 1.2 implementations falling back to SHA-1 signatures. This document deprecates MD5 and SHA-1 for digital signatures in TLS 1.2 and DTLS 1.2 to address those concerns.
