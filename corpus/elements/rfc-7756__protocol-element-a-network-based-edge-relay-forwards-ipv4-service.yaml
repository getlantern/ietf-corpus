document: rfc-7756
kind: protocol-element
summary: 'A network-based Edge Relay forwards IPv4 Service Address traffic onto an IPv4 network segment and acts as the default IPv4 router for nodes on that segment. It has three sub-variants: basic IPv4-only segment, ''on a stick'' (single dual-stack interface passes IPv6 natively while translating IPv4), and IPv6-bridging (transparently bridges IPv6 while intercepting IPv6 Service Address traffic for translation).'
section: "3.2"
topics:
    - ip
    - v6ops
