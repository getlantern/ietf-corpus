document: rfc-2848
kind: state-machine
summary: 'The SUBSCRIBE/UNSUBSCRIBE/NOTIFY monitoring session state machine mirrors INVITE/BYE/in-session: SUBSCRIBE opens the monitoring session, NOTIFY carries status updates during it, and UNSUBSCRIBE closes it. Either client or gateway may initiate UNSUBSCRIBE; only the client initiates SUBSCRIBE.'
section: 3.5.3
topics:
    - realtime
    - sip
