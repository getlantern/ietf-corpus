document: rfc-6936
kind: design-rationale
summary: For tunnel encapsulations, the inner payload (e.g., an IP packet) already carries its own integrity check, making the outer UDP checksum redundant. AMT replication also requires a different pseudo-header per tunnel egress, making full checksum computation an unwarranted burden for lightweight tunnel protocols.
section: 1.3.2
topics:
    - udp
    - ip
