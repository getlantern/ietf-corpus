document: rfc-6437
kind: protocol-element
summary: A forwarding node MAY change the flow label of arriving packets whose flow label value is zero. In that case, it is RECOMMENDED that the forwarding node sets the flow label to a uniformly distributed value using the same method recommended for source nodes.
