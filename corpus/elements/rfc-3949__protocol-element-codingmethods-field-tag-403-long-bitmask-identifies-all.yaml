document: rfc-3949
kind: protocol-element
summary: 'CodingMethods field (tag 403, LONG bitmask) identifies all compression methods used in the file: bit 1=MH (T.4 1D), bit 2=MR (T.4 2D), bit 3=MMR (T.6), bit 4=JBIG via T.85, bit 5=Baseline JPEG, bit 6=JBIG color via T.43; limited to 32 standard compression types.'
section: 2.2.4
