document: rfc-8485
kind: protocol-element
summary: The 'vtr' (vector of trust request) parameter allows an RP to request a partial set of acceptable VoT values in an OpenID Connect authorization or token request. Its value is a JSON array of strings; values within each string are ANDed together while separate array elements are ORed.
section: "4.1"
topics:
    - oauth
    - json
