document: rfc-5768
kind: interoperability-note
summary: ICE inherently requires both endpoints to support it. Within a domain, gateways acting as ICE agents on one side and non-ICE agents on the other allow ICE to be used on inter-domain calls even when the terminating device does not support ICE.
section: "3.1"
topics:
    - sip
    - webrtc
    - nat
