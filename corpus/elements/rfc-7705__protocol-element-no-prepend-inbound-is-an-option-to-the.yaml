document: rfc-7705
kind: protocol-element
summary: '''No Prepend Inbound'' is an option to the ''Local AS'' mechanism that causes the router to not prepend the legacy ASN to the AS_PATH when advertising updates received from CE devices to iBGP neighbors. Without this option, ''Local AS'' alone would artificially lengthen the AS_PATH.'
section: "3.1"
topics:
    - bgp
    - routing
