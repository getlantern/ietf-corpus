document: rfc-1374
kind: state-machine
summary: 'Channel data rate discovery: a 64-bit Source attempts connection with W=1 and Camp-on; if rejected, retries with W=0; if 32-bit succeeds, Source marks Destination as 32-bit-only; if 32-bit is also rejected, Destination/path is considered down. The Double_Wide field in HIPPI-LE provides a hint for the return path.'
section: Channel Data Rate Discovery
topics:
