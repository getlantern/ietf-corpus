document: rfc-8782
kind: security-consideration
summary: All DOTS signal channel traffic MUST be protected by (D)TLS with mutual authentication. DOTS clients are entitled to access only resources they create; a DOTS client cannot retrieve data related to mitigation requests created by other DOTS clients of the same domain.
section: "10"
topics:
    - security
    - tls
