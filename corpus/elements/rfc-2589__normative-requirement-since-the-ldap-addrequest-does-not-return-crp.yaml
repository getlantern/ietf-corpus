document: rfc-2589
kind: normative-requirement
summary: Since the LDAP AddRequest does not return CRP information, a client must issue a Refresh extended operation immediately after an Add that created a dynamic entry; the Refresh Response returns the CRP (responseTtl) to the client.
section: "6.1"
rfc2119_level: MUST
topics:
    - ldap
