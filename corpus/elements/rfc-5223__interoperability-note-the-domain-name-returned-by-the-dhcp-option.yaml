document: rfc-5223
kind: interoperability-note
summary: The domain name returned by the DHCP option is used as input to the DNS-based U-NAPTR LoST discovery procedure specified in RFC 5222, which reuses the URI-enabled NAPTR specification from RFC 4848. Clients must implement this downstream DNS resolution step.
section: "1"
topics:
