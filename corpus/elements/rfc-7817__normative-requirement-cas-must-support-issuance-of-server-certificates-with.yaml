document: rfc-7817
kind: normative-requirement
summary: CAs MUST support issuance of server certificates with a DNS-ID identifier type and with an SRV-ID identifier type for each type of email service. CAs that cannot verify authorization for a particular domain MUST NOT include email SRV-IDs/DNS-IDs in certificates they issue.
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - email
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
