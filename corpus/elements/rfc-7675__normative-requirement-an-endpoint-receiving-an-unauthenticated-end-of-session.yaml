document: rfc-7675
kind: normative-requirement
summary: An endpoint receiving an unauthenticated end-of-session message SHOULD continue sending media (over connectionless transport) or attempt to re-establish the connection (over connection-oriented transport) until consent expires or it receives an authenticated message revoking consent.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - webrtc
    - security
