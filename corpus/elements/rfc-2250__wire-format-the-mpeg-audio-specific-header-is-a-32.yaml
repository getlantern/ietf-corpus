document: rfc-2250
kind: wire-format
summary: 'The MPEG Audio-specific header is a 32-bit field placed at the start of the payload (after RTP headers) for every MPEG-1/2 Audio packet. Fields: MBZ (16 bits, reserved zero), Frag_offset (16 bits, byte offset into the audio frame for the data in this packet).'
section: "3.5"
