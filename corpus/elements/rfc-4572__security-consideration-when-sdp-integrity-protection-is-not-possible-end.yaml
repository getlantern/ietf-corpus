document: rfc-4572
kind: security-consideration
summary: When SDP integrity protection is not possible, end systems SHOULD maintain a cache of certificates previously presented. Users SHOULD be warned when an unsecured certificate from a previously unknown endpoint is presented, and STRONGLY warned when a different certificate appears from a known party — providing SSH-like trust-on-first-use semantics.
section: "7"
topics:
    - tls
    - pkix
    - security
