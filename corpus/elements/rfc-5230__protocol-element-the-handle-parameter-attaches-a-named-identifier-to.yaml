document: rfc-5230
kind: protocol-element
summary: The ':handle' parameter attaches a named identifier to a vacation response for tracking. All vacation statements sharing the same handle are treated as the same response regardless of other argument differences, enabling a user to suppress duplicate replies across different script branches.
section: "4.2"
topics:
