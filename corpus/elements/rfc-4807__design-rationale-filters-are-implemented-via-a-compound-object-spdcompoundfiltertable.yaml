document: rfc-4807
kind: design-rationale
summary: Filters are implemented via a compound object (spdCompoundFilterTable + spdSubfiltersTable) rather than the IPCP's fixed condition/filter pairing. This provides greater flexibility for complex multi-criteria filters without IPCP's structural constraints and allows recursive nesting with no inherent depth limit.
