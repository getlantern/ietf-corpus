document: rfc-3276
kind: protocol-element
summary: The hdsl2ShdslSpanInvalidNumRepeaters notification is generated after discovery if the number of discovered repeaters differs from hdsl2ShdslSpanConfNumRepeaters. Excess provisioned-but-absent repeater entries are discarded; excess discovered-but-unprovisioned repeater entries are created using the default span configuration profile.
section: "4.6"
topics:
