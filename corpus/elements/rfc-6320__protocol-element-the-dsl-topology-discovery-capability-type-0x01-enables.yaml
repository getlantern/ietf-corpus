document: rfc-6320
kind: protocol-element
summary: The DSL Topology Discovery capability (Type 0x01) enables the AN to report subscriber line status changes to the NAS via Port Up and Port Down event messages. The AN MUST send a Port Up event when a line comes up and a Port Down event when a line goes down, carrying DSL line attributes in the message body.
section: "6"
