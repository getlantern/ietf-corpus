document: rfc-4364
kind: security-consideration
summary: 'BGP/MPLS VPNs without cryptographic measures are intended to provide security equivalent to a Layer 2 backbone (e.g., Frame Relay): absent misconfiguration, systems in one VPN cannot access systems in another. However, this method does not encrypt data or verify integrity; IPsec or other cryptographic measures must be added when confidentiality or tamper detection is required.'
section: "1.6"
topics:
    - vpn
    - security
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
