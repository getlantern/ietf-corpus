document: rfc-8919
kind: normative-requirement
summary: Maximum link bandwidth is an application-independent attribute; when advertised using the ASLA sub-TLV, multiple different values for the same link MUST NOT be advertised. If different values are advertised, all values MUST be ignored.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
