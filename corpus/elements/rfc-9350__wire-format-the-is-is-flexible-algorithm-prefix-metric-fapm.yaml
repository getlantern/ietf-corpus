document: rfc-9350
kind: wire-format
summary: The IS-IS Flexible Algorithm Prefix Metric (FAPM) sub-TLV (Type 6, Length 5) is a sub-TLV of TLVs 135, 235, 236, and 237. It encodes Flex-Algorithm (1 octet, 128-255) and Metric (4 octets). It MUST NOT be advertised as a sub-TLV of the IS-IS SRv6 Locator TLV.
