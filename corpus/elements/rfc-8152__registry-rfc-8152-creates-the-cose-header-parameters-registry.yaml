summary: RFC 8152 creates the COSE Header Parameters registry with initial entries alg (1), crit (2), content type (3), kid (4), IV (5), Partial IV (6), counter signature (7). It also creates the COSE Header Algorithm Parameters registry for algorithm-specific header parameters.
