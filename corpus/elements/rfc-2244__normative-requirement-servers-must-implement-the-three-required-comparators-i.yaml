document: rfc-2244
kind: normative-requirement
summary: 'Servers MUST implement the three required comparators: i;octet (byte-by-byte ordering/equality/prefix/substring), i;ascii-casemap (case-insensitive ASCII ordering/equality/prefix/substring), and i;ascii-numeric (decimal integer ordering/equality). Servers MUST respond to unknown or improperly used comparators with a BAD response.'
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
