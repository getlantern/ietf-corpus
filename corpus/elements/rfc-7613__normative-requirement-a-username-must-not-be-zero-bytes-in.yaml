document: rfc-7613
kind: normative-requirement
summary: A username MUST NOT be zero bytes in length. This rule is enforced after any normalization and mapping of code points, to prevent a non-empty sequence of internationalized characters from canonicalizing to an empty string.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
