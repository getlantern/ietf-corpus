document: rfc-8865
kind: normative-requirement
summary: An offerer and answerer MUST include the SDP 'dcmap' attribute in each offer and answer, with the 'subprotocol' attribute parameter set to 't140', in the 'm=' section describing the SCTP association used to realize the T.140 data channel.
section: "4.1"
rfc2119_level: MUST
topics:
