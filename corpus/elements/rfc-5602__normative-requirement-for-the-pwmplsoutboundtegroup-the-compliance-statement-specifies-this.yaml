document: rfc-5602
kind: normative-requirement
summary: For the pwMplsOutboundTeGroup, the compliance statement specifies this group MUST be supported if the implementation allows MPLS-TE tunnels to carry PW traffic. At least one of mplsTe(0) or mplsNonTe(1) MUST be supported if PW signaling is supported.
section: "8"
rfc2119_level: MUST
