document: rfc-3253
kind: protocol-element
summary: The REPORT method is an extensible mechanism for obtaining parameterized information about a resource. The REPORT MUST NOT change any content or dead properties (DAV:no-modification postcondition). If a Depth header is included, the response MUST be a 207 Multi-Status.
section: "3.6"
