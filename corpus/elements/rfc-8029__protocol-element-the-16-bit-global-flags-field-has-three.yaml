document: rfc-8029
kind: protocol-element
summary: 'The 16-bit Global Flags field has three defined bits: V (Validate FEC Stack) — receiver performs FEC Stack validation if set; T (Respond Only If TTL Expired) — receiver drops request and suppresses reply if MPLS TTL > 1; R (Validate Reverse Path) — receiver should return reverse-path FEC info. All remaining bits MUST be zero on send and ignored on receipt.'
section: "3"
topics:
