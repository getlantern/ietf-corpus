document: rfc-9786
kind: protocol-element
summary: When the Port Mode capability is signaled, preference-based DF election (RFC 9785) is modified to consider the port only and not associated Ethernet Tags. The Port Mode capability is compatible with the 'Don't Preempt' (D) bit, enabling non-revertive behavior at the port level upon interface recovery.
section: "3.4"
topics:
    - routing
    - bgp
