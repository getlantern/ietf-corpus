document: rfc-9025
kind: normative-requirement
summary: To support outgoing DetNet MPLS over UDP encapsulation, an implementation MUST support the provisioning of UDP and IP header information in addition to or in place of F-Labels. When PRF is performed at the MPLS service sub-layer, each member flow requires its own provisioned UDP and IP header information.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
