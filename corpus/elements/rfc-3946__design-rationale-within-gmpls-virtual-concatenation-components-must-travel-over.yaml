document: rfc-3946
kind: design-rationale
summary: Within GMPLS, virtual concatenation components must travel over the same component link if they belong to the same LSP, because labels are bound to a component link. This is more restrictive than ANSI T1.105/ITU-T G.707, which allow components on diverse paths. Routing components on different paths within GMPLS requires establishing separate LSPs that are then associated together.
section: "3"
topics:
    - mpls
    - routing
