document: rfc-5801
kind: interoperability-note
summary: The SASL 'GSSAPI' mechanism (RFC 4752) for Kerberos V5 is not wire-compatible with Kerberos V5 used as a GS2 mechanism. If one side supports only 'GSSAPI' and the other only GS2, mechanism negotiation will fail.
section: "13.1"
topics:
    - security
