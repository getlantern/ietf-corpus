document: rfc-7389
kind: security-consideration
summary: If LMA user-plane and control-plane functions are hosted on separate entities, any control messages between them that contain the LMA User-Plane Address mobility option MUST be protected using end-to-end security associations offering integrity and data origin authentication.
section: "7"
rfc2119_level: MUST
topics:
