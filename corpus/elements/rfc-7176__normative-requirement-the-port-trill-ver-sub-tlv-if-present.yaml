document: rfc-7176
kind: normative-requirement
summary: The PORT-TRILL-VER sub-TLV, if present, MUST occur in an MT-Port-Cap-TLV in a TRILL IIH. If missing, the originating IS is assumed to support only base version zero with no optional capabilities. When multiple occurrences exist, the minimum version and intersection of capabilities apply.
section: 2.2.4
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
