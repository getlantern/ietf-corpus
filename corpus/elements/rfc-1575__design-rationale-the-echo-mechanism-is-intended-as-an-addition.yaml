document: rfc-1575
kind: design-rationale
summary: The echo mechanism is intended as an addition to network management facilities rather than a replacement. It addresses the limitation that network management protocols themselves use the same potentially-lossy network layer, so a simpler in-band probe is needed to verify that the lowest levels of networking software operate correctly.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
