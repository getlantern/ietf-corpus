document: rfc-8770
kind: normative-requirement
summary: All routers supporting the H-bit MUST check the RI LSAs of all nodes in the area. If any router does not advertise the OSPF Host Router capability, the SPF modifications described in Section 4 MUST NOT be used in the area.
section: "5"
rfc2119_level: MUST
topics:
    - routing
