document: rfc-9925
kind: interoperability-note
summary: Some applications check self-signedness to classify locally configured certificates as trust anchors. Such applications may need to modify their configuration model or user interface before accepting an unsigned certificate as a trust anchor, since unsigned certificates are not self-signed or self-issued.
section: "4"
topics:
    - pkix
