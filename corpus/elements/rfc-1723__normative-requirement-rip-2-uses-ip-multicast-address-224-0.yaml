document: rfc-1723
kind: normative-requirement
summary: RIP-2 uses IP multicast address 224.0.0.9 for periodic broadcasts to reduce unnecessary load on hosts not listening to RIP-2 messages. If multicasting is used, it SHOULD be used on all interfaces which support it.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - routing
    - multicast
    - ip
