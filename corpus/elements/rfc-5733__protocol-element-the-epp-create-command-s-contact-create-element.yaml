document: rfc-5733
kind: protocol-element
summary: 'The EPP <create> command''s <contact:create> element requires: id, one or two postalInfo elements (type=''int'' or ''loc''), optional voice, optional fax, email, authInfo, and optional disclose. On success, the server returns <contact:creData> with id and crDate.'
