document: rfc-4072
kind: normative-requirement
summary: While acting as a pass-through, the NAS MUST validate the EAP header fields (Code, Identifier, Length) prior to forwarding an EAP packet to or from the Diameter server; pending EAP Responses that do not match the current Identifier are silently discarded.
section: "2.4"
rfc2119_level: MUST
topics:
    - diameter
    - security
