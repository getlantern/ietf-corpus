document: rfc-5553
kind: security-consideration
summary: A PCE is vulnerable to DoS via flood of PKS expansion requests (addressed in RFC 5520) and RSVP-TE is vulnerable to floods of spurious PKS Path messages. The latter is mitigated by RSVP-TE message integrity mechanisms and the chain-of-trust security model.
