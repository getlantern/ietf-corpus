document: rfc-2591
kind: normative-requirement
summary: When an action is configured to occur at a nonexistent time caused by a forward time transition (e.g., start-of-DST clock-forward), the action SHOULD be invoked immediately upon the time transition. If multiple actions are affected, they SHALL be invoked in the order they would normally have occurred.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
