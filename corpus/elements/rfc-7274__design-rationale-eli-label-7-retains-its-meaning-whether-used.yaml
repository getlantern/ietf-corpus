document: rfc-7274
kind: design-rationale
summary: ELI (label 7) retains its meaning whether used as a regular special-purpose label or as an ESPL following XL, because deployed hardware looks for ELI without checking whether the preceding label is XL. This backward compatibility exception is explicitly carved out to avoid breaking existing deployments.
section: "3.1"
topics:
    - mpls
