document: rfc-9710
kind: normative-requirement
summary: The 'anonymizationFlags' PmA bit (bit 2) MUST NOT be set when the flag is associated with a non-endpoint (i.e., source or destination) Information Element. The PmA bit SHOULD be consistent within a record.
