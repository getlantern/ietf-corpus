summary: RFC 7011 relies on and updates the IANA 'IPFIX Information Elements' registry (formerly at IANA-IPFIX), which is now the normative reference for all Information Element definitions as specified in RFC 7012. The document also references the IANA Private Enterprise Numbers (PEN) registry for enterprise-specific Information Elements.
