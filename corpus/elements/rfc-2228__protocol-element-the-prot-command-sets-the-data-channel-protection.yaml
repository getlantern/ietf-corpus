document: rfc-2228
kind: protocol-element
summary: 'The PROT command sets the data channel protection level with a single character: C (Clear — raw data, no security), S (Safe — integrity protected), E (Confidential — confidentiality protected), or P (Private — integrity and confidentiality protected). The default level if no PROT is issued is Clear.'
