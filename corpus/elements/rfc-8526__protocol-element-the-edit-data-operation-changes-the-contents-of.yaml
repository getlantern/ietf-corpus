document: rfc-8526
kind: protocol-element
summary: 'The <edit-data> operation changes the contents of a writable datastore, accepting parameters: ''datastore'' (mandatory), ''default-operation'' (merge/replace/none, default merge), and ''edit-content'' (config or url). It does not support ''error-option'' or ''test-option''; error behavior is always rollback-on-error.'
section: 3.1.2
topics:
    - netconf
    - yang
