document: rfc-2401
kind: normative-requirement
summary: When a single bit string is generated for multiple keys, the encryption key(s) MUST be taken from the first (leftmost, high-order) bits and the authentication key(s) MUST be taken from the remaining bits, ensuring consistent key derivation at both SA endpoints.
section: 4.6.2
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
