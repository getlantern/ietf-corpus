document: rfc-1341
kind: normative-requirement
summary: The character set name 'ASCII' is reserved and MUST NOT be used for any purpose; 'US-ASCII' (referring specifically to ANSI X3.4-1986) must be used instead. National use variations of ISO 646 are NOT ASCII and their use in Internet mail is explicitly discouraged.
section: 7.1.1
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
