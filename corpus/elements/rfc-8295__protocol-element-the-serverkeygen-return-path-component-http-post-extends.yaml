document: rfc-8295
kind: protocol-element
summary: The /serverkeygen/return path component (HTTP POST) extends RFC 7030's /serverkeygen to support returning asymmetric key package receipts and errors (RFC 7191). Additionally, /serverkeygen responses may now return keys encapsulated in broader CMS content types including the encrypted key package (RFC 6032) with EncryptedData, EnvelopedData, or AuthEnvelopedData, with EnvelopedData being mandatory-to-implement.
section: "8.1"
topics:
