summary: 'The strict-priority scheduling scheme is designed to tie node overload to transport congestion: when the ForCES node CPU is overwhelmed, channel queues grow, SCTP propagates congestion back to the source, and HP work is always prioritized to maintain a robust steady processing capacity.'
