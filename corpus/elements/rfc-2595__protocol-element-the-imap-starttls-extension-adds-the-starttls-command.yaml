document: rfc-2595
kind: protocol-element
summary: The IMAP STARTTLS extension adds the 'STARTTLS' command, advertised in the CAPABILITY response. TLS negotiation begins immediately after the CRLF at the end of the tagged OK response. The SASL EXTERNAL mechanism MAY be used to authenticate once TLS client credentials are successfully exchanged.
section: "3"
topics:
