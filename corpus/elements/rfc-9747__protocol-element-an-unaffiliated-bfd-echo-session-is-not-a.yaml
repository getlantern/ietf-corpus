document: rfc-9747
kind: protocol-element
summary: An Unaffiliated BFD Echo session is not a true BFD session because there is no BFD protocol state coordination with the remote end. From the local initiator's standpoint it behaves like a BFD session, with received state derived from locally generated packets looped back by the remote IP forwarder rather than from remote BFD Control packets.
section: "2"
topics:
