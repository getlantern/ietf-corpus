document: rfc-2793
kind: security-consideration
summary: Since the payload carries text conversation content, encryption is important for security. Any encryption method MAY be applied to T.140 session contents or to the whole RTP packets; when redundant data is included, the same security considerations as RFC 2198 apply.
section: "5"
topics:
