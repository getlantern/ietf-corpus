document: rfc-8484
kind: protocol-element
summary: Each DNS query-response pair is mapped to one HTTP exchange. For GET requests, the DNS query is encoded as a base64url 'dns' query parameter. For POST requests, the DNS query is the HTTP message body with Content-Type 'application/dns-message'.
section: "4.1"
topics:
    - dns
    - http
