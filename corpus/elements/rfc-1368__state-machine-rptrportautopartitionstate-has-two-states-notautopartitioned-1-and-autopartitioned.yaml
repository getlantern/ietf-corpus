document: rfc-1368
kind: state-machine
summary: 'rptrPortAutoPartitionState has two states: notAutoPartitioned(1) and autoPartitioned(2). Enabling a port via rptrPortAdminStatus exerts BEGIN on the auto-partition state machine, always entering notAutoPartitioned(1). Partition conditions are specified in the IEEE 802.3 Std Section 9 state machine.'
section: "4.2"
topics:
    - snmp
