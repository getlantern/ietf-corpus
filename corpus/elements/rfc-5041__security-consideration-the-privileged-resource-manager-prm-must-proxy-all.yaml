document: rfc-5041
kind: security-consideration
summary: The Privileged Resource Manager (PRM) MUST proxy all non-privileged ULP interactions with the RNIC that could affect other ULPs, MUST verify a ULP's right to access a Data Buffer before associating it with an STag, and SHOULD prevent any Local Peer from consuming more than its fair share of resources.
section: 8.3.2
rfc2119_level: MUST
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
