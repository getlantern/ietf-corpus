document: rfc-5227
kind: normative-requirement
summary: Before using any IPv4 address (whether from manual configuration, DHCP, or any other source), a host MUST test to see if the address is already in use by broadcasting ARP Probe packets. This also applies when an interface transitions from inactive to active, when waking from sleep, or when any connectivity change occurs.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
