document: rfc-3524
kind: design-rationale
summary: The SRF mechanism is useful when the remote party needs to be involved in resource reservation. When a resource reservation protocol allows the SDP generator to unilaterally allocate resources in both directions (sendrecv), the generator can choose any mapping and the SRF mechanism is unnecessary.
