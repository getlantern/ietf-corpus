document: rfc-4971
kind: normative-requirement
summary: An implementation SHOULD advertise the update to a capabilities TLV in the same LSP fragment as the advertisement it replaces. Where not possible, the two affected LSP fragments should be flooded as an atomic action.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
