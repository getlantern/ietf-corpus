document: rfc-2283
kind: protocol-element
summary: MP_REACH_NLRI (Type Code 14) is an optional non-transitive BGP path attribute used to advertise feasible routes, the next hop network layer address, and Subnetwork Points of Attachment (SNPAs). It contains one or more triples of <Address Family Information, Next Hop Information, Network Layer Reachability Information>.
