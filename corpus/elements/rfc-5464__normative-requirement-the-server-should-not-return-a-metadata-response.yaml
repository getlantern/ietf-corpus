document: rfc-5464
kind: normative-requirement
summary: The server SHOULD NOT return a METADATA response containing updated annotation data after a SETMETADATA command. Clients MUST NOT assume a METADATA response will be sent, and MUST assume that if the command succeeds, the annotation has been changed.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - email
