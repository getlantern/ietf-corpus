document: rfc-6086
kind: design-rationale
summary: RFC 2976 legacy INFO usages lacked a registration mechanism, making it impossible for a UA to indicate which types of application-level contexts it supports for the INFO method. This caused industry-wide interoperability problems requiring static configuration and proprietary workarounds. The working group resolved this by defining the Info Package framework and IANA registry rather than deprecating INFO entirely.
section: "2"
topics:
    - sip
    - realtime
