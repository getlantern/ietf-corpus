document: rfc-7024
kind: normative-requirement
summary: When a V-hub originates a non-Internet VPN-IP default route, the V-hub MUST attach RT-VH (not RT-VPN) to that route so that only associated V-spokes import it, while other V-hubs and vanilla PEs do not.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - vpn
    - routing
