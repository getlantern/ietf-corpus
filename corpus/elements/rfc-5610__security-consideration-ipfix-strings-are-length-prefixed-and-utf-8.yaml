document: rfc-5610
kind: security-consideration
summary: IPFIX strings are length-prefixed and UTF-8 encoded, mitigating unterminated-string attacks. However, Collecting Processes must pay particular attention to buffer sizes when converting between length-prefixed and null-terminated strings, and must reject strings containing U+0000 null characters.
section: "4"
