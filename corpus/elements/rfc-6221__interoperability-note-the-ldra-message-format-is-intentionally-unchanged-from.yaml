document: rfc-6221
kind: interoperability-note
summary: The LDRA message format is intentionally unchanged from RFC 3315 to maintain interoperability with existing DHCP relays and servers. The LDRA implements the same Relay-Forward and Relay-Reply message types as a standard DHCPv6 Relay Agent.
