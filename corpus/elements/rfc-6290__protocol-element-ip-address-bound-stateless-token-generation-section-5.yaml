document: rfc-6290
kind: protocol-element
summary: 'IP-address-bound stateless token generation (Section 5.2): includes the token taker''s IP address in the hash: TOKEN_SECRET_DATA = HASH(QCD_SECRET | SPI-I | SPI-R | IPaddr-T). This mitigates load-sharing cluster exposure but requires token replacement if the token taker''s address changes.'
section: "5.2"
topics:
    - ipsec
    - crypto
    - security
