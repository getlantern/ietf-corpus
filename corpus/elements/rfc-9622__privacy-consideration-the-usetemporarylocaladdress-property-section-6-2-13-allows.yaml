document: rfc-9622
kind: privacy-consideration
summary: The useTemporaryLocalAddress property (Section 6.2.13) allows applications to prefer temporary ('privacy') IPv6 addresses (RFC 8981) to prevent linking connections over time. However, temporary addresses cannot be used with IPv4, and they may interfere with protocol resumption mechanisms that reduce latency.
section: 6.2.13
topics:
    - privacy
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
