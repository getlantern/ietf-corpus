document: rfc-4701
kind: normative-requirement
summary: When the updater uses the client's link-layer address (htype and chaddr), the first two octets of the DHCID RDATA MUST be zero, followed by digest type 1 (SHA-256) and the hash of htype || chaddr || FQDN.
section: 3.5.3
rfc2119_level: MUST
topics:
    - dns
