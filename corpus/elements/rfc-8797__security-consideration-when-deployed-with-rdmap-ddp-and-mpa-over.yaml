document: rfc-8797
kind: security-consideration
summary: When deployed with RDMAP, DDP, and MPA over TCP, IPsec protects the CM Private Data exchange by establishing a protected channel before any operations are exchanged. However, IPsec is not available for InfiniBand or RoCE deployments, which rely on physical security and CRC checks.
