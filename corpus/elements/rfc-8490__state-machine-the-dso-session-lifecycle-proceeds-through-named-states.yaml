document: rfc-8490
kind: state-machine
summary: 'The DSO session lifecycle proceeds through named states: Connection Establishment, Connected but Sessionless, DSO Session Establishment in Progress (client sent request, awaiting response for up to 30 seconds), DSO Session Establishment Timeout (30 seconds elapsed with no response — client forcibly aborts), DSO Session Establishment Failed (nonzero RCODE received), DSO Session Established (NOERROR received), Server Shutdown, Client Shutdown, Reconnect, Forcibly Abort, and Abort Reconnect Wait.'
section: "5"
topics:
    - dns
