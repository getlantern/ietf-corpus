document: rfc-7401
kind: protocol-element
summary: The R1 generation counter is a monotonically increasing 64-bit counter protecting Initiators from R1 replay attacks. There SHOULD be a separate counter per local Host Identity. When multiple R1s arrive, the Initiator SHOULD respond to the one with the largest generation counter.
section: 4.1.4
topics:
    - security
    - ip
