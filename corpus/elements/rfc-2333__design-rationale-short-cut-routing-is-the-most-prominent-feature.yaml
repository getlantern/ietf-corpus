document: rfc-2333
kind: design-rationale
summary: Short-cut routing is the most prominent feature of NHRP. When source and destination are on the same logical NBMA network but in different LISs, NHRP provides the source with the NBMA address of the destination (if directly attached) or of the optimal egress router (if not), allowing packets to bypass intermediate routers entirely.
