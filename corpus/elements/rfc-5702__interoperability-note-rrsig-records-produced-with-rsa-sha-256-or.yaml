document: rfc-5702
kind: interoperability-note
summary: RRSIG records produced with RSA/SHA-256 or RSA/SHA-512 will have the same size as those produced with RSA/SHA-1, if the keys have the same length, because signature size depends on key size rather than the hash algorithm.
section: "4.2"
