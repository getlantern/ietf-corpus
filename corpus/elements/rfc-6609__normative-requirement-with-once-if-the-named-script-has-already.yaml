document: rfc-6609
kind: normative-requirement
summary: With ':once', if the named script has already been included at any point during script execution, processing continues without re-including it. Implementations MUST NOT generate an error if ':once' would cause recursive inclusion; the script MUST be treated as previously included.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - email
