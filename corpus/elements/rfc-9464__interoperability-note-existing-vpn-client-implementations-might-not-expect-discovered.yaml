document: rfc-9464
kind: interoperability-note
summary: Existing VPN client implementations might not expect discovered DNS resolver IP addresses to be outside the covered IP address ranges of the VPN tunnel; implementations should be prepared for this scenario when encrypted DNS is deployed.
