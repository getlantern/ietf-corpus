document: rfc-5566
kind: protocol-element
summary: The IPsec Tunnel Authenticator sub-TLV (sub-TLV type 3) is a new sub-TLV for the BGP Tunnel Encapsulation attribute. It carries an authenticator type (2 octets) and a variable-length value field used to authenticate the originating BGP speaker. One or more sub-TLVs MAY be included in any IPsec-type Encapsulation SAFI NLRI.
section: "4"
topics:
