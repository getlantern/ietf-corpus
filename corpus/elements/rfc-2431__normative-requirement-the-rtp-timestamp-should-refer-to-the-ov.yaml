document: rfc-2431
kind: normative-requirement
summary: The RTP Timestamp SHOULD refer to the 'Ov' field synchronization point of the first field; the timestamp is based on a 90kHz clock and all scan line packets within the same frame share the same timestamp.
section: "4.1"
rfc2119_level: SHOULD
