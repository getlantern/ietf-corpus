document: rfc-7156
kind: state-machine
summary: 'In the LMA-Initiated LR authorization flow (scenario A11): LMA1 detects data packet, sends AA-Request with LOCAL_MAG_ROUTING_SUPPORTED bit set and two MN identifiers, receives AA-Answer, then initiates LRI/LRA with MAG1. On LRA_WAIT_TIME expiration, LMA1 re-requests authorization before retransmitting LRI up to LRI_RETRIES.'
