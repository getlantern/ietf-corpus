document: rfc-9572
kind: normative-requirement
summary: An egress NVE MAY omit the Leaf A-D route in response to an S-PMSI A-D route with the L flag set if it has already advertised a corresponding SMET route; the source NVE MUST use the SMET route in lieu of the Leaf A-D route.
section: "4"
rfc2119_level: MAY
topics:
    - mpls
    - routing
    - multicast
