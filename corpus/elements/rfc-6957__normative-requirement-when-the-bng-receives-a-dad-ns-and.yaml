document: rfc-6957
kind: normative-requirement
summary: When the BNG receives a DAD NS and no entry exists for the tentative address, the BNG MUST create a Binding Table entry (tentative address + link-layer source from NS) and MUST NOT reply to the CPE or forward the NS.
section: 4.2.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
