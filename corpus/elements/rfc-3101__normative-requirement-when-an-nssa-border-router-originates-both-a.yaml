document: rfc-3101
kind: normative-requirement
summary: When an NSSA border router originates both a Type-5 LSA and a Type-7 LSA for the same network, the P-bit MUST be clear in the Type-7 LSA to prevent another NSSA border router from also translating it into a Type-5 LSA.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
