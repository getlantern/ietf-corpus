document: rfc-4069
kind: security-consideration
summary: Read access to physical band parameters (vdslLineSCMPhysBandTable objects) may provide knowledge enabling malicious behavior, such as applying intentional interference on physical bands. GET and NOTIFY access to these objects should be controlled, and values should possibly be encrypted when sent over the network via SNMP.
section: "6"
topics:
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
