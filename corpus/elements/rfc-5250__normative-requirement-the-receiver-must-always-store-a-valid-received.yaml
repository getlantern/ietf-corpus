document: rfc-5250
kind: normative-requirement
summary: The receiver MUST always store a valid received Opaque LSA in its link-state database, and MUST NOT accept Opaque LSAs that violate the flooding scope (e.g., a type-11 Opaque LSA is not accepted in a stub area or NSSA).
section: "3"
rfc2119_level: MUST
topics:
    - routing
