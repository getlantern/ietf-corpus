document: rfc-5049
kind: normative-requirement
summary: If a SIP application does not have a compartment for a message it needs to send, it MAY choose not to compress it even when 'comp=sigcomp' is present, because stateless compression is not typically worthwhile and may result in message expansion.
section: "9.4"
rfc2119_level: MAY
topics:
