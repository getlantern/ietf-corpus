document: rfc-1847
kind: normative-requirement
summary: The entire contents of a multipart/signed container MUST be treated as opaque while in transit from originator to recipient. Intermediate message transfer agents must not alter the content in any way, including changing content transfer encodings.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - security
    - crypto
