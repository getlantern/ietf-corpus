kind: protocol-element
summary: radiusAuthServerExtTable (STATUS current) is the version-neutral replacement for the deprecated radiusAuthServerTable. Each entry is indexed by radiusAuthServerExtIndex and includes radiusAuthServerInetAddressType (InetAddressType), radiusAuthServerInetAddress (InetAddress), and radiusAuthClientServerInetPortNumber (InetPortNumber, range 1..65535), supporting both IPv4 and IPv6 server addresses.
