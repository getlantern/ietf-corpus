document: rfc-2446
kind: design-rationale
summary: iTIP is defined independent of the particular transport used to transmit scheduling information. This allows the same application-layer protocol to be bound to multiple transports (store-and-forward email via iMIP, real-time, or others), preventing lock-in to a single delivery mechanism.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
