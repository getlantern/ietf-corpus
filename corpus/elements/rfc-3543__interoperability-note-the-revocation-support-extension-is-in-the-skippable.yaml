document: rfc-3543
kind: interoperability-note
summary: The Revocation Support Extension is in the skippable range (Type 128–255). If a receiving mobility agent does not understand this extension, it MUST skip it and continue processing the registration request, ensuring backwards compatibility with RFC 3344 agents.
section: "3.2"
topics:
    - mobility
