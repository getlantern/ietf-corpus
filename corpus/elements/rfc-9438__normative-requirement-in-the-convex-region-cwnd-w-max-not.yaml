document: rfc-9438
kind: normative-requirement
summary: In the convex region (cwnd ≥ W_max, not Reno-friendly), cwnd MUST be incremented by (target − cwnd) / cwnd for each received new ACK. This "maximum probing phase" very slowly probes for a new W_max.
section: "4.5"
rfc2119_level: MUST
topics:
    - congestion
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
