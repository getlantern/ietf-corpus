document: rfc-8845
kind: protocol-element
summary: A Capture Scene is a structure representing a spatial region captured by one or more Capture Devices. It contains one or more Capture Scene Views (CSVs), each being a list of Media Captures of the same type that together form one representation of the entire Scene. Spatial relationships exist only within a single Capture Scene.
section: "7.3"
topics:
