document: rfc-2895
kind: protocol-element
summary: The ianaAssigned pseudo-protocol (base layer value 5) handles protocols that cannot be identified deterministically from network traffic alone. IANA maintains a central enumeration to ensure interoperability; children are encoded as [0.0.0.5] followed by [0.0.a.b] for the protocol enumeration value.
