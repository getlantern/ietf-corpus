document: rfc-8176
kind: protocol-element
summary: One-time password method reference value 'otp' intentionally covers both HOTP (RFC 4226) and TOTP (RFC 6238) families. The single identifier satisfies either OTP variant, allowing relying parties to confirm OTP use without distinguishing between HMAC-based and time-based implementations.
