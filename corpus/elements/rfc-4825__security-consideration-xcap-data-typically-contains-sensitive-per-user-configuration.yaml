document: rfc-4825
kind: security-consideration
summary: XCAP data typically contains sensitive per-user configuration such as presence authorization policies and contact lists. Servers MUST implement both HTTP Digest and HTTPS/TLS; deploying an HTTPS XCAP root URI is strongly recommended to protect credentials and user data in transit.
section: "14"
topics:
