document: rfc-8945
kind: normative-requirement
summary: Implementations that support TSIG MUST implement HMAC-SHA1 and HMAC-SHA256. HMAC-MD5 use is MUST NOT; hmac-sha1 use is NOT RECOMMENDED; hmac-sha256 use is RECOMMENDED. SHA-1 truncated to 96 bits SHOULD be implemented for compatibility.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
