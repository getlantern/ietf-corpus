document: rfc-1595
kind: state-machine
summary: 'STS-Path RDI state machine: RDI is detected as a ''1'' in bit 5 of the G1 byte for five contiguous frames and removed when a ''0'' is seen for five contiguous frames. STS-Path RFI failure is declared at 2.5±0.5 s and cleared when absent for 10±0.5 s. An STS PTE must generate RDI within 100 ms of detecting AIS or LOP, and cease within 100 ms when no longer detected.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
