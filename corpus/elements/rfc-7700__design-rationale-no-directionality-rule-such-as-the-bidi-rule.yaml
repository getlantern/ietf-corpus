document: rfc-7700
kind: design-rationale
summary: No directionality rule (such as the Bidi Rule from RFC 5893) is applied to nicknames, because it is acceptable for a nickname to render differently in right-to-left versus left-to-right layout systems, provided presentation is consistent within any given layout system.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
