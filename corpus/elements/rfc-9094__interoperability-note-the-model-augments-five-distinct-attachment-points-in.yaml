summary: 'The model augments five distinct attachment points in the TE topology: te-node-attributes (connectivity-matrices and information-source-entry), tunnel-termination-point (local-link-connectivities), te-link-attributes, and link-template. Implementations must handle all five contexts to fully support WSON topology representation.'
