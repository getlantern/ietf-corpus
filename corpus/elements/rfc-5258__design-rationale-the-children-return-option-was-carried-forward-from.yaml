document: rfc-5258
kind: design-rationale
summary: The CHILDREN return option was carried forward from the original Child Mailbox Extension (RFC 3348, by Gahrns and Cheng) to give clients a way to efficiently determine mailbox hierarchy without issuing wildcard LIST commands for every mailbox, enabling collapsed outline views in mail clients.
