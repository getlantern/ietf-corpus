document: rfc-5761
kind: normative-requirement
summary: If an answerer wishes to multiplex RTP and RTCP onto a single port, it MUST include a media-level 'a=rtcp-mux' attribute in the answer, and RTP payload types used in the answer MUST conform to the conflict-avoidance rules in Section 4.
section: 5.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
