document: rfc-8333
kind: protocol-element
summary: LSP_GEN_TIMER is an existing IGP timer defining the delay between consecutive generation of local LSPs/LSAs; it batches multiple local events into a single update. In IS-IS this is minimumLSPGenerationInterval; in OSPFv2 it is MinLSInterval.
section: "5.1"
topics:
    - routing
