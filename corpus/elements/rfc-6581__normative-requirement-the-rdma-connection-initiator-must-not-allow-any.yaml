document: rfc-6581
kind: normative-requirement
summary: The RDMA connection initiator MUST NOT allow any later FULPDUs to be transmitted before the RTR indication. One method is to delay notifying the ULP that the connection has been established until after any required RTR indication has been transmitted.
section: "5"
rfc2119_level: MUST NOT
topics:
    - realtime
