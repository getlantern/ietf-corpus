document: rfc-2137
kind: normative-requirement
summary: For every owner name affected by an update, the updater must append a request SIG RR signed with a private key that is valid for that name and the zone's class. An update affecting multiple owner names covered by different dynamic update keys requires multiple request SIG RRs.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
