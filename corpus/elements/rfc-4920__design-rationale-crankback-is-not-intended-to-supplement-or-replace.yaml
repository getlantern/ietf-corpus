document: rfc-4920
kind: design-rationale
summary: Crankback is not intended to supplement or replace TE flooding (OSPF/IS-IS); information gathered from crankback is used only to compute an alternate path for the specific LSP being signaled, not to influence path computations of other LSPs, keeping the mechanisms independent and avoiding the overhead of available-link-bandwidth flooding.
section: "1.4"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
