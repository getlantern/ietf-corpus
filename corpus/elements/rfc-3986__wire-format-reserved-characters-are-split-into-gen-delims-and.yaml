document: rfc-3986
kind: wire-format
summary: Reserved characters are split into gen-delims (":", "/", "?", "#", "[", "]", "@") and sub-delims ("!", "$", "&", "'", "(", ")", "*", "+", ",", ";", "="). Data conflicting with a reserved character's delimiter role must be percent-encoded before the URI is formed.
section: "2.2"
