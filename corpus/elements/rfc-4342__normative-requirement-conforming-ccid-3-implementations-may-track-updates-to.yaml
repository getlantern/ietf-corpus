document: rfc-4342
kind: normative-requirement
summary: Conforming CCID 3 implementations MAY track updates to the TCP throughput equation directly as standardized by IETF, but SHOULD wait for explicit updates to CCID 3 before implementing other changes to TFRC congestion control.
