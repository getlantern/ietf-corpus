document: rfc-4495
kind: security-consideration
summary: If a compliant router mistakenly transmits a ResvTear upstream simultaneously with the partial-preemption ResvErr, all upstream routers will tear down the entire reservation. This inadvertently frees all bandwidth and may prevent re-establishment, with the most severe impact on large aggregates.
section: "7"
topics:
    - security
    - qos
