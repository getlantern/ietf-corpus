document: rfc-3558
kind: normative-requirement
summary: A receiver MUST have prior knowledge of the packet format to correctly decode RTP packets. When both formats are used in the same session, different RTP payload type values MUST be used for each format.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
