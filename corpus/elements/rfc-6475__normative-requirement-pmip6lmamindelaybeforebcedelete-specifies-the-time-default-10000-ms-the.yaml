document: rfc-6475
kind: normative-requirement
summary: pmip6LmaMinDelayBeforeBCEDelete specifies the time (default 10000 ms) the LMA MUST wait before deleting a Binding Cache entry upon receiving a PBU with lifetime 0; if a valid PBU with lifetime > 0 arrives during this interval the BCE must be updated instead.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - snmp
