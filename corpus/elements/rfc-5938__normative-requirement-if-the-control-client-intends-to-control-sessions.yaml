document: rfc-5938
kind: normative-requirement
summary: If the Control-Client intends to control sessions on an individual basis, it MUST set mode bit 4 in the Setup Response message and MUST use the start/stop commands intended for individual session control. The original Start and Stop commands (2 and 3) and their acknowledgements as defined in RFC 5357 MUST NOT be used.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
