document: rfc-3779
kind: normative-requirement
summary: If no authorization is being granted for a particular AFI and optional SAFI, there MUST NOT be an IPAddressFamily member for that AFI/SAFI in the IPAddrBlocks SEQUENCE. Similarly, if no authorization is being granted for a particular AS identifier form, there MUST NOT be a corresponding asnum/rdi member in the ASIdentifiers SEQUENCE.
section: 2.2.3.3
rfc2119_level: MUST NOT
topics:
    - pkix
    - ip
    - bgp
