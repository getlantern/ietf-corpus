document: rfc-8105
kind: interoperability-note
summary: A significant difference from IEEE 802.15.4 is that DECT ULE in its primary configuration does not support mesh topology or multihop networks at the link layer, so the RFC 4944 mesh header and the 6LR role are not defined for DECT ULE.
