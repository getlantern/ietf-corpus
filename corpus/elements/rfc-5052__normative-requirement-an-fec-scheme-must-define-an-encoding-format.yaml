document: rfc-5052
kind: normative-requirement
summary: An FEC Scheme MUST define an encoding format for the Common FEC OTI elements it uses. The encoding format length MUST either be fixed or derivable from examining the encoded octets themselves. If no Scheme-specific FEC OTI element is defined, such an element MUST NOT be introduced in future versions of the FEC scheme.
section: 6.2.1
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
