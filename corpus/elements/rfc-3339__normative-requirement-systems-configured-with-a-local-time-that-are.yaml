document: rfc-3339
kind: normative-requirement
summary: Systems configured with a local time that are unaware of the corresponding UTC offset and depend on time synchronization with other Internet systems MUST use a mechanism that ensures correct synchronization with UTC.
section: "4.4"
rfc2119_level: MUST
