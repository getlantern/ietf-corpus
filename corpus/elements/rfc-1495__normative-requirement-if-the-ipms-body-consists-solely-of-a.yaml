document: rfc-1495
kind: normative-requirement
summary: If the IPMS.Body consists solely of a single IA5Text body part, the RFC-822 message body is NOT marked as a MIME content. This prevents RFC-822 mailers from invoking MIME functionality unnecessarily.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - email
