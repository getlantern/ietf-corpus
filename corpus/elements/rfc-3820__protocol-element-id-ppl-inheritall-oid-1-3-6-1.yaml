document: rfc-3820
kind: protocol-element
summary: id-ppl-inheritAll (OID 1.3.6.1.5.5.7.21.1) indicates an unrestricted proxy that inherits all rights from the issuing Proxy Issuer; for authorization purposes it effectively impersonates the PI. id-ppl-independent (OID 1.3.6.1.5.5.7.21.2) indicates a proxy that inherits no rights and must be treated as an independent identity.
section: 3.8.2
topics:
    - pkix
    - security
