document: rfc-9513
kind: design-rationale
summary: The SRv6 SID Structure sub-TLV is intended for informational use by control and management planes only — for example, validating SRv6 SID instantiation conformance via BGP-LS controllers or automating domain boundary filtering. It MUST NOT be used at transit nodes for forwarding decisions.
section: "10"
topics:
