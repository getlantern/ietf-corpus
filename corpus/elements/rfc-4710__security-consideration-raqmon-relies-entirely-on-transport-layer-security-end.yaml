document: rfc-4710
kind: security-consideration
summary: RAQMON relies entirely on transport-layer security (end-to-end authentication, confidentiality, integrity, replay protection) rather than defining application-level security mechanisms; absence of transport security implies absence of all RAQMON security, requiring deployments to ensure their transport choice supports secure operation.
section: "8.3"
topics:
    - security
    - qos
    - realtime
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
