document: rfc-9745
kind: design-rationale
summary: Deprecation-related information is only a hint; it cannot be depended on. Client applications SHOULD always be implemented in ways that allow them to function without deprecation-related information, making increased scope hints safe to use even if partially invisible to consumers.
section: "2.2"
topics:
    - http
