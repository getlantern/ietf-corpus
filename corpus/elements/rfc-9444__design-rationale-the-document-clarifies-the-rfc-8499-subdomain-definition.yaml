document: rfc-9444
kind: design-rationale
summary: The document clarifies the RFC 8499 subdomain definition as ambiguous because it appears to allow a domain to be a subdomain of itself. This document explicitly interprets it as requiring a 'different domain', so mmm.example.com is not a subdomain of mmm.example.com.
section: "2"
topics:
    - acme
    - dns
