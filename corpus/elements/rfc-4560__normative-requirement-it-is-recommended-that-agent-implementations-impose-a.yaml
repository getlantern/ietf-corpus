document: rfc-4560
kind: normative-requirement
summary: It is RECOMMENDED that agent implementations impose a time limit for how long a traceroute operation is allowed to take. An implementation that cannot process multiple traceroute operations simultaneously SHOULD impose a shorter maximum allowed time period.
section: 3.2.2
rfc2119_level: RECOMMENDED
