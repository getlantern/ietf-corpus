document: rfc-793
kind: interoperability-note
summary: A passive OPEN with an unspecified foreign socket (all zeros) accepts connections from any caller. When multiple passive OPENs share the same local socket, an active OPEN is matched first to a TCB with a specific matching foreign socket before considering TCBs with unspecified foreign sockets.
section: "2.7"
topics:
    - tcp
