document: rfc-6230
kind: normative-requirement
summary: A UA in the active COMEDIA role that is a SIP UAS MUST wait for a SIP ACK (or PRACK for reliable provisional responses) before issuing the SYNC. A UAC MUST send the SYNC immediately upon Control Channel establishment and MUST wait at least 2*Transaction-Timeout (20 seconds) for a response.
section: "6"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
