document: rfc-5621
kind: security-consideration
summary: SIP message bodies can be end-to-end encrypted and integrity protected using S/MIME (RFC 3851), as described in RFC 3261. UASs that cannot decrypt a message body or body part can use the 493 (Undecipherable) response to report the error.
section: "11"
topics:
