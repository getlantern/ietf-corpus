document: rfc-1808
kind: normative-requirement
summary: It is the responsibility of the distributor(s) of a document containing relative URLs to ensure that the base URL for that document can be established. Relative URLs cannot be used reliably when the document's base URL is not well-defined.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
