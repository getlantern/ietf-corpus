document: rfc-3995
kind: protocol-element
summary: '''notify-lease-duration'' (integer(0:67108863)) specifies the lease duration in seconds for a Per-Printer Subscription Object. A value of 0 means the lease never expires. This attribute MUST NOT be present on Per-Job Subscription Objects. The maximum value of 67,108,863 (~2 years) is chosen to prevent overflow when added to ''printer-up-time''.'
section: 5.3.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
