document: rfc-6643
kind: normative-requirement
summary: An OCTET STRING type with an associated DISPLAY-HINT MUST be formatted according to the DISPLAY-HINT as described in RFC 2579 and maps to the YANG string type; without a DISPLAY-HINT it maps to the YANG binary type.
section: "2"
rfc2119_level: MUST
topics:
