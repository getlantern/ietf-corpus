document: rfc-2669
kind: interoperability-note
summary: DOCSIS 1.0 requires Cable Modems to implement only SNMPv1 and process only IPv4 customer traffic; future versions of the DOCSIS standard are expected to require SNMPv3 and IPv6 support. Design choices in this MIB reflect the 1.0 constraints.
section: "3"
topics:
