document: rfc-6827
kind: design-rationale
summary: An ASON RA may be identified by the combination of its OSPF Instance ID and OSPF Area ID. Using just the OSPF Area ID is RECOMMENDED when proper network-wide configuration permits, because it simplifies RA isolation via OSPF's built-in area-ID matching on packet receipt.
section: "2"
topics:
    - routing
