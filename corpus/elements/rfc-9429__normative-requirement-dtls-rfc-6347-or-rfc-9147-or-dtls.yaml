kind: normative-requirement
summary: DTLS (RFC 6347 or RFC 9147) or DTLS-SRTP (RFC 5763) MUST be used as appropriate for the media type per RFC 8827. The SDP security descriptions mechanism for SRTP keying (RFC 4568) MUST NOT be used.
