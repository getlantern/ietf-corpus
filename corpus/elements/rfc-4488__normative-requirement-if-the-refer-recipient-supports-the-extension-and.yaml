document: rfc-4488
kind: normative-requirement
summary: 'If the REFER-Recipient supports the extension and is willing to process the REFER without an implicit subscription, it MUST insert ''Refer-Sub: false'' in the 2xx response. If the REFER-Recipient does not include ''Refer-Sub: false'' in the response, an implicit subscription is created as in the default case.'
section: "4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
