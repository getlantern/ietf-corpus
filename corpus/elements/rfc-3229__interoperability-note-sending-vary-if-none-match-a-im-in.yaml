document: rfc-3229
kind: interoperability-note
summary: 'Sending "Vary: If-None-Match, A-IM" in 226 responses is insufficient to prevent non-IM-aware proxy caches from incorrectly "validating" a cached 226 response; the im cache-directive combined with no-store is the correct mechanism for safety.'
section: "5.5"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
