document: rfc-1565
kind: design-rationale
summary: Static configuration information (with a mean time to change of days or longer) is delegated to directory services rather than stored in the MIB. The MIB focuses on transient application status only, with applDirectoryName providing a linkage key to the corresponding X.500 directory entry.
