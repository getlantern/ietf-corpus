document: rfc-9197
kind: wire-format
summary: 'The Opaque State Snapshot is a variable-length field: 1-octet Length (in 4-octet multiples), 3-octet Schema ID, followed by opaque data. When a node has no opaque state to report, Length MUST be 0 and Schema ID MUST be 0xFFFFFF.'
section: 4.4.2.13
rfc2119_level: MUST
topics:
    - measurement
