document: rfc-4449
kind: design-rationale
summary: The mechanism is limited to scenarios where MN and CN are in the same administrative domain, the CN has good reason to trust the MN, and traffic volume is low. Application in the general Internet is typically not possible due to configuration effort and trust requirements.
