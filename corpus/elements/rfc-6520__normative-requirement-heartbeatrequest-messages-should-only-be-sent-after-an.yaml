document: rfc-6520
kind: normative-requirement
summary: HeartbeatRequest messages SHOULD only be sent after an idle period that is at least multiple round-trip times long. This idle period SHOULD be configurable between one second and multiple minutes, with a tunable per-peer default.
section: "5.2"
rfc2119_level: SHOULD
topics:
