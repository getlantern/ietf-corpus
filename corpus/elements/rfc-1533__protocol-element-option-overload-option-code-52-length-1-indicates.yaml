document: rfc-1533
kind: protocol-element
summary: Option Overload option (code 52, length 1) indicates that the DHCP 'sname' or 'file' fields are being used to carry options. Value 1 means 'file' holds options; 2 means 'sname' holds options; 3 means both fields hold options. The client must interpret overloaded fields after the standard options field.
section: "9.3"
topics:
