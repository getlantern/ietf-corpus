document: rfc-4762
kind: security-consideration
summary: Traffic isolation between VPLS domains is guaranteed by per-VPLS L2 FIB tables and per-VPLS PWs. Customer traffic SHOULD be encrypted and/or authenticated before entering the service provider network if security is required.
section: "14"
rfc2119_level: SHOULD
topics:
