document: rfc-3414
kind: protocol-element
summary: Discovery allows a non-authoritative engine to learn a remote authoritative engine's snmpEngineID by sending a noAuthNoPriv Request with zero-length msgUserName and msgAuthoritativeEngineID; the response is a Report PDU containing the authoritative engine's snmpEngineID and the usmStatsUnknownEngineIDs counter.
