document: rfc-6525
kind: normative-requirement
summary: At any given time there MUST NOT be more than one re-configuration request in flight. If the Re-configuration Timer is running when a new request is to be sent, the RE-CONFIG chunk containing that request MUST be buffered until the timer stops.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
