document: rfc-1406
kind: protocol-element
summary: 'dsx1TransmitClockSource is a read-write INTEGER specifying transmit clock: loopTiming(1) uses recovered receive clock, localTiming(2) uses a local clock source, throughTiming(3) uses recovered receive clock from another interface. This object was added in RFC 1406 and did not exist in RFC 1232.'
section: 4.1.1
topics:
