document: rfc-6148
kind: protocol-element
summary: The Remote ID sub-option is sub-option 2 of the Relay Agent Information option (option 82), as defined by RFC 3046. It globally and uniquely identifies the remote node connected to the access concentrator and is pre-provisioned per circuit.
