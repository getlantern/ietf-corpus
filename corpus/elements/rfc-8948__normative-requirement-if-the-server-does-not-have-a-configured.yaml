document: rfc-8948
kind: normative-requirement
summary: If the server does not have a configured address pool matching the client's quadrant request, it SHOULD return the IA_LL option with addresses belonging to a quadrant managed by the server, following local policy. This applies when the client specifies quadrant preferences.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ip
