document: rfc-9047
kind: design-rationale
summary: The EVPN MAC/IP Advertisement route alone does not convey whether an IPv6->MAC pair belongs to a router or a host, or whether the address is anycast. The ARP/ND Extended Community was defined to carry this additional context so that proxy-ND PEs can issue Neighbor Advertisements with correct flag information.
section: "1"
topics:
    - routing
