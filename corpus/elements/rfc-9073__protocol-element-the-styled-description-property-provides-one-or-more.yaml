document: rfc-9073
kind: protocol-element
summary: The STYLED-DESCRIPTION property provides one or more rich-text descriptions (e.g., HTML, RTF) replacing or supplementing the plain-text DESCRIPTION property. VALUE must be URI or TEXT; FMTTYPE, DERIVED, and LANGUAGE parameters are supported.
section: "6.5"
