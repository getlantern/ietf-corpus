summary: 'isdnSignalingTable provides per-Terminal-Endpoint configuration: signaling protocol, calling address (isdnSignalingCallingAddress, E.164 format preferred with ''+'' prefix), subaddress, B channel count, and a RowStatus for dynamic row creation/deletion. isdnSignalingGetIndex (TestAndIncr) is used to safely allocate new row indices.'
