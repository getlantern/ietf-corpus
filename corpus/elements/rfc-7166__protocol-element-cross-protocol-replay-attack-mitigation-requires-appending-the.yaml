document: rfc-7166
kind: protocol-element
summary: Cross-protocol replay attack mitigation requires appending the two-octet OSPFv3 Cryptographic Protocol ID (value 1 for OSPFv3) to the Authentication Key K before use, yielding the Protocol-Specific Authentication Key Ks. This prevents keys shared between protocols from being used in replay attacks across protocols.
section: "4.4"
topics:
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
