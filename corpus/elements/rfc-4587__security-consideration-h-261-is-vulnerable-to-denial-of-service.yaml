document: rfc-4587
kind: security-consideration
summary: H.261 is vulnerable to denial-of-service attacks where an attacker injects pathological RTP packets containing frames that inflate receiver-side decoding complexity or corrupt future frame decoding. Authentication and integrity protection of RTP packets (e.g., via SRTP) is RECOMMENDED.
section: "8"
topics:
