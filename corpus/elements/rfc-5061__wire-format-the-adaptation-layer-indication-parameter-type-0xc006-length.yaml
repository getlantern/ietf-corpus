document: rfc-5061
kind: wire-format
summary: The Adaptation Layer Indication parameter (type 0xC006, length 8) carries a 32-bit opaque Adaptation Code Point exchanged in INIT/INIT-ACK. It MUST NOT be sent in any chunk other than INIT or INIT-ACK, and SHOULD be passed opaquely to the upper-layer protocol without examination by the SCTP stack.
section: 4.2.6
topics:
    - sctp
