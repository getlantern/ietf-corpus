document: rfc-8104
kind: security-consideration
summary: PW traffic rerouted by a PLR to a protector, and further to a backup PE in the centralized model, should not be viewed as a new security threat, since all rerouting via PLRs, protectors, and backup PEs is planned and anticipated, and backup PEs can be used anyway to host PWs and LDP sessions.
section: "8"
topics:
