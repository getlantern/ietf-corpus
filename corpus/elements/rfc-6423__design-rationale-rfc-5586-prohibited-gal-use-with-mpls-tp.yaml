document: rfc-6423
kind: design-rationale
summary: RFC 5586 prohibited GAL use with MPLS-TP PWs while allowing it for MPLS PWs, creating an inconsistency. This inconsistency caused unnecessary implementation differences and conflicted with MPLS-TP interoperability requirements (RFC 5654), motivating the removal of the restriction.
section: "3"
topics:
