document: rfc-8516
kind: normative-requirement
summary: If a client repeats a request answered with 4.29 before Max-Age time has elapsed, the server MAY respond with a more generic error code (e.g., 5.03) to slow down clients that do not recognize the 4.29 code.
section: "3"
rfc2119_level: MAY
topics:
