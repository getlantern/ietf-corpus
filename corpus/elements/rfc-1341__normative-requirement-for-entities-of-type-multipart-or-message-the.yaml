document: rfc-1341
kind: normative-requirement
summary: For entities of type 'multipart' or 'message', the Content-Transfer-Encoding is not permitted to have any value other than a bit-width token (7bit, 8bit, etc.) or 'binary'. Encoding of content within multipart or message bodies must be done at the innermost level by encoding the actual nested body.
section: "5"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
