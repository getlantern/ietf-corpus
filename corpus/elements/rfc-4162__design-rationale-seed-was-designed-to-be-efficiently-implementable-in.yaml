document: rfc-4162
kind: design-rationale
summary: SEED was designed to be efficiently implementable in hardware and software with restricted resources (mobile devices, smart cards), making it suitable for constrained environments while maintaining 128-bit security. It is a Korean national industrial standard (TTAS.KO-12.0004) widely deployed in South Korean e-commerce and financial PKI.
