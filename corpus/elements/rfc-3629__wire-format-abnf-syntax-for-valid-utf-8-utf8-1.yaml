document: rfc-3629
kind: wire-format
summary: 'ABNF syntax for valid UTF-8: UTF8-1 = %x00-7F; UTF8-2 = %xC2-DF UTF8-tail; UTF8-3 handles ranges %xE0/%xE1-EC/%xED/%xEE-EF with appropriate tail constraints; UTF8-4 handles %xF0/%xF1-F3/%xF4 with appropriate tail constraints; UTF8-tail = %x80-BF. Octet values C0, C1, and F5–FF are excluded.'
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
