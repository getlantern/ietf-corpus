document: rfc-3020
kind: security-consideration
summary: Read-write and read-create objects in this MIB can negatively affect network operations if SET operations are performed without proper access control. No managed objects contain sensitive information, but SNMPv3 with User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) is recommended to restrict GET/SET access to authorized principals.
section: "6"
topics:
