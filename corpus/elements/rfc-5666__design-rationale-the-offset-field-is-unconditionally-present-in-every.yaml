document: rfc-5666
kind: design-rationale
summary: The offset field is unconditionally present in every xdr_rdma_segment, even though zero-based offset schemes exist. This enables pre-registration and region-based registrations across many RDMA implementations, and produces the most general and simplified protocol form.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
