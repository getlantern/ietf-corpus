document: rfc-6435
kind: design-rationale
summary: While the lock function can be realized entirely using the management plane, dispatching messages to two MEPs simultaneously presents coordination challenges. The optional LI OAM message provides additional in-band coordination to achieve a tightly-windowed lock when the management plane is busy.
