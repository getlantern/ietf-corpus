document: rfc-5664
kind: protocol-element
summary: 'pnfs_osd_ioerr4 reports a single component I/O error to the metadata server: oer_component (failed object ID), oer_comp_offset and oer_comp_length (byte range within the component covering all failed I/O operations), oer_iswrite (true if the operation was data-modifying), and oer_errno.'
section: "8.2"
