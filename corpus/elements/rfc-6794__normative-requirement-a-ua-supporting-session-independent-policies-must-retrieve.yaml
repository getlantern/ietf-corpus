document: rfc-6794
kind: normative-requirement
summary: A UA supporting session-independent policies MUST retrieve them using the 'ua-profile' event package [RFC6080] from both the local network (using 'local-network' profile-type) and SIP service provider domain (using 'user' profile-type). If session-independent and session-specific policies are both present, the UA MUST apply session-independent policies first.
section: 3.2.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
