document: rfc-6350
kind: protocol-element
summary: The KIND property specifies what the vCard represents. Defined values are "individual" (default), "group", "org", and "location". Implementations MUST support these values. If absent, "individual" MUST be assumed. If present with an unknown value, the implementation SHOULD act neutrally.
section: 6.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
