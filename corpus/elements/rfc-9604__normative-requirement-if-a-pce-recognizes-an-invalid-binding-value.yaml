document: rfc-9604
kind: normative-requirement
summary: If a PCE recognizes an invalid binding value (e.g., a label from the reserved MPLS label space), it MUST send a PCErr with Error-Type=10 ('Reception of an invalid object') and Error-value=2 ('Bad label value').
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
