document: rfc-5462
kind: protocol-element
summary: The Traffic Class (TC) field is a three-bit field in the MPLS label stack entry used to carry traffic class information. It supersedes the 'EXP field' name in all IETF RFCs and documents; RFC 3270 and RFC 5129 define how to use the field.
