document: rfc-3928
kind: normative-requirement
summary: During the sync phase the server MUST NOT return any entries with persistPhase set to TRUE; during the persist phase all entries returned MUST have persistPhase set to TRUE. Sync phase entries MUST be returned before any persist phase entries.
section: 4.3.2
rfc2119_level: MUST NOT
topics:
