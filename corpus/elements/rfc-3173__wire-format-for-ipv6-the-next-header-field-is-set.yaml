document: rfc-3173
kind: wire-format
summary: For IPv6, the Next Header field is set to 108 (IPComp Datagram) and Payload Length reflects the compressed payload. The IPComp header is placed using the same rules as the IPv6 Fragment Header, but if both are present, the Fragment Header MUST precede the IPComp header.
section: "3.2"
topics:
    - ip
