document: rfc-4532
kind: protocol-element
summary: The 'Who am I?' operation can be extended with controls to request the authorization identity in a particular context. When a Proxied Authorization Control (RFC 4370) is attached, the operation returns the authzId the server associates with the assumed identity asserted in that control.
section: "4.1"
topics:
    - ldap
