document: rfc-7313
kind: normative-requirement
summary: When a BGP speaker receives a ROUTE-REFRESH message with a Message Subtype other than 0, 1, or 2, it MUST ignore the message. It SHOULD log an error for further analysis.
section: "5"
rfc2119_level: MUST
topics:
