document: rfc-2510
kind: wire-format
summary: The PasswordBasedMac protection algorithm (OID 1 2 840 113533 7 66 13) uses PBMParameter ::= SEQUENCE { salt OCTET STRING, owf AlgorithmIdentifier, iterationCount INTEGER, mac AlgorithmIdentifier }. The OWF (SHA-1 recommended) is applied iterationCount times to the salted shared secret to derive BASEKEY, which is then used as the MAC key.
