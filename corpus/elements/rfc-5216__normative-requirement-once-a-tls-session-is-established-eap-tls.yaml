document: rfc-5216
kind: normative-requirement
summary: Once a TLS session is established, EAP-TLS peer and server implementations MUST validate that the identities represented in the certificates are appropriate and authorized. Implementations SHOULD verify the Extended Key Usage extension (id-kp-serverAuth for server certs, id-kp-clientAuth for peer certs).
section: "5.3"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
