document: rfc-9705
kind: normative-requirement
summary: If a node finds that NHOP or NNHOP (for node-protected LSPs) does not support RI-RSVP-FRR extensions, it MUST reduce the refresh period in TIME_VALUES to the default short refresh interval and MUST NOT send Remote PathTear or Conditional PathTear to the downstream node.
section: 4.6.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
