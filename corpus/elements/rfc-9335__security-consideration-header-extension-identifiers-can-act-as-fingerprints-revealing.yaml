document: rfc-9335
kind: security-consideration
summary: Header extension identifiers can act as fingerprints revealing endpoint identity or application type. CSRC values in RTP packets can reveal who was speaking during a conference call, making their encryption (which Cryptex provides) important for privacy.
section: "1.1"
topics:
    - rtp
    - privacy
    - security
