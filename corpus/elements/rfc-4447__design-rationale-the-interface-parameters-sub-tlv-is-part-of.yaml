document: rfc-4447
kind: design-rationale
summary: 'The Interface Parameters sub-TLV is part of the FEC in the PWid element, making it impossible to change after PW setup. This is by design: only static interface parameters (like MTU) belong there, while dynamic information (like status) must use optional parameter TLVs.'
section: "5.2"
topics:
    - mpls
