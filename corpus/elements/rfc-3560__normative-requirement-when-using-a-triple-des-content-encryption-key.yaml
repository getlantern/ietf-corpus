document: rfc-3560
kind: normative-requirement
summary: When using a Triple-DES content-encryption key, implementations MUST adjust the parity bits to ensure odd parity for each octet of each DES key comprising the Triple-DES key prior to RSAES-OAEP encryption.
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
