document: rfc-9766
kind: normative-requirement
summary: The metadata server MAY use LAYOUT_WCC attributes to avoid querying data servers via NFSv3 GETATTR, but MAY also choose to ignore those attributes and still issue GETATTR calls to strengthen the consistency model.
