document: rfc-8263
kind: protocol-element
summary: 'Four KEK_ACK_REQUESTED types are defined: REKEY_ACK_KEK_SHA256 (value 1) uses PRF-HMAC-SHA-256 with the KEK_ALGORITHM_KEY as base_key; REKEY_ACK_LKH_SHA256 (value 2) uses PRF-HMAC-SHA-256 with the first LKH key as base_key; REKEY_ACK_KEK_SHA512 (value 3) and REKEY_ACK_LKH_SHA512 (value 4) are identical to the SHA-256 variants but use PRF-HMAC-SHA-512.'
section: "2.1"
