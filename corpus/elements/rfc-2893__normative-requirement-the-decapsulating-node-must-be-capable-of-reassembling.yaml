document: rfc-2893
kind: normative-requirement
summary: The decapsulating node MUST be capable of reassembling an IPv4 packet that is 1300 bytes (1280 bytes of IPv6 plus the 20-byte IPv4 header), ensuring minimum-size IPv6 packets encapsulated in IPv4 can always be reassembled.
section: "3.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
