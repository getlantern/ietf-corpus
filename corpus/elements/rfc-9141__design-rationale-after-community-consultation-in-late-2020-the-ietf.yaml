document: rfc-9141
kind: design-rationale
summary: After community consultation in late 2020, the IETF decided to retire the FTP service at ftp.ietf.org, ops.ietf.org, and ietf.org. This document formally updates the 25 RFCs (published 1997–2006) that contained explicit FTP-based references to ensure continued availability of the referenced materials.
