document: rfc-5374
kind: design-rationale
summary: MAC-based authentication using a single shared secret is insufficient for data origin authentication in groups with more than two parties because every Group Member holds the MAC key and can forge valid MAC tags. Digital signatures (e.g., RSA/SHA-1) or TESLA are required when per-sender authentication is needed.
section: "4.3"
topics:
    - ipsec
    - multicast
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
