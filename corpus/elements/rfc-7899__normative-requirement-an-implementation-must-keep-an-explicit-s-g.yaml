document: rfc-7899
kind: normative-requirement
summary: An implementation MUST keep an explicit (S,G) state as long as damping is active on that (S,G); once the state expires and damping becomes inactive, the associated figure-of-merit and damping state are removed.
section: "5.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
