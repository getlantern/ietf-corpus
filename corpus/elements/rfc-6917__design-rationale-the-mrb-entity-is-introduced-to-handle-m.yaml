document: rfc-6917
kind: design-rationale
summary: The MRB entity is introduced to handle M:N deployment architectures where multiple Application Servers and multiple heterogeneous Media Servers with differing capabilities and capacities must be dynamically matched. Without an MRB, selecting an appropriate Media Server based on capability and availability in such topologies is intractable using static signaling alone.
