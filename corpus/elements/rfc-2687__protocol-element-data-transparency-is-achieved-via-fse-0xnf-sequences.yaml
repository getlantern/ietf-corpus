document: rfc-2687
kind: protocol-element
summary: 'Data transparency is achieved via FSE/0xnF sequences: an FSE byte followed by a byte whose lower nibble is 0xF (values 0x8F-0xFF, with R=1 always) encodes between one and four literal FSE bytes using the upper 4 bits as a bitmask pattern. Zero bits in the pattern indicate positions where actual data bytes are copied.'
