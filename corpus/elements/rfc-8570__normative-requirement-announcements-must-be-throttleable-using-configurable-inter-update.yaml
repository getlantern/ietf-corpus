document: rfc-8570
kind: normative-requirement
summary: Announcements MUST be throttleable using configurable inter-update throttle timers; the minimum announcement periodicity is one announcement per second and the default SHOULD be 120 seconds. Implementations SHOULD NOT permit the inter-update timer to be lower than the measurement interval.
section: "7"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
