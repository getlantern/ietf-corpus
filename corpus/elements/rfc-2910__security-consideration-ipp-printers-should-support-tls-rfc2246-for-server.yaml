document: rfc-2910
kind: security-consideration
summary: IPP Printers SHOULD support TLS [RFC2246] for Server Authentication and Operation Privacy. If TLS is supported, the Printer MUST support TLS_DHE_DSS_WITH_3DES_EDE_CBC_SHA. IPP clients supporting TLS MUST also support that cipher suite. All other cipher suites are OPTIONAL.
section: 8.1.2
rfc2119_level: SHOULD
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
