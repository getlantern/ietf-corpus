document: rfc-3775
kind: security-consideration
summary: To prevent replay attacks, correspondent nodes MUST retain bindings and associated sequence number information at least as long as the nonces used in their authorization remain valid. Deleting a binding prematurely can allow replay of old Binding Updates.
section: 5.2.8
topics:
    - security
    - ip
    - mobility
