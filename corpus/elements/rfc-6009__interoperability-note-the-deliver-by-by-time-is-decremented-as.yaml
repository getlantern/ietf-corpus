document: rfc-6009
kind: interoperability-note
summary: The Deliver-By by-time is decremented as a message passes through the transport infrastructure, so 'bytimerelative' values can be negative. Scripts must either perform additional checks or use a comparator capable of handling signed integers (i;ascii-numeric cannot handle negative values).
section: "5"
