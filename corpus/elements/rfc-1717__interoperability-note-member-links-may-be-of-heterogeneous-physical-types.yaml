document: rfc-1717
kind: interoperability-note
summary: Member links may be of heterogeneous physical types (async dial-up, synchronous leased lines, ISDN B-channels, X.25 SVCs, Frame Relay). Links of different transmission rates may coexist in one bundle, and fragment sizes may be proportioned to link speeds.
section: "2"
