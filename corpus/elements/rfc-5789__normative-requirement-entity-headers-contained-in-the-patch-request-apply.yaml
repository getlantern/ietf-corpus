document: rfc-5789
kind: normative-requirement
summary: Entity-headers contained in the PATCH request apply only to the contained patch document and MUST NOT be applied to the resource being modified. Servers SHOULD NOT store such headers except as trace information.
section: "2"
rfc2119_level: MUST NOT
