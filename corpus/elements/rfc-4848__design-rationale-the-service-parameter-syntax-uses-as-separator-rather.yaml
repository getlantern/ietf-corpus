document: rfc-4848
kind: design-rationale
summary: The service parameter syntax uses ':' as separator rather than '+' (as in RFC 3404 URI DDDS) because '+' is a valid character in URI scheme names. Since U-NAPTR service tags may correspond to URI schemes, using '+' as a separator would create ambiguity.
section: "4.5"
topics:
    - dns
