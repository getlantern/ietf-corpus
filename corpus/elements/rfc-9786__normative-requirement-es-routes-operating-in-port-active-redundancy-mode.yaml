document: rfc-9786
kind: normative-requirement
summary: ES routes operating in Port-Active redundancy mode MUST signal the Single-Active multihomed site redundancy mode along with the Ethernet A-D per-ES route, and the ESI label-based split-horizon procedures of RFC 7432 Section 8.3 SHOULD be employed to prevent transient echo packets when L2 circuits are involved.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
    - bgp
    - mpls
