document: rfc-8381
kind: normative-requirement
summary: An RBridge SHOULD set VERR to 4 and return an error packet when it receives a Vendor Channel message with VERR=0, SL=0, a known OUI/CID and Sub-Protocol, and an unrecognized Sub-Version value (when it implements and uses the Sub-Version field).
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
