document: rfc-2305
kind: security-consideration
summary: 'Confidential authorization information needed to dial a G3Fax recipient (e.g., calling card numbers encoded in the To: address) might be disclosed to the recipient. Senders SHOULD be provided a method to prevent such disclosure; authorization must be bound to specific senders and messages to prevent replay attacks.'
section: 5.2.3
rfc2119_level: SHOULD
topics:
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
