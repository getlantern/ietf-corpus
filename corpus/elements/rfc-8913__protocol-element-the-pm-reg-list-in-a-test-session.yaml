document: rfc-8913
kind: protocol-element
summary: The pm-reg-list in a test-session-request holds one or more uint16 Performance Metrics Registry index values (per RFC 8911) that specify the metrics to be measured. All entries in the list MUST have the same packet stream characteristics so they measure a single stream.
section: "5.2"
topics:
    - measurement
    - registry
