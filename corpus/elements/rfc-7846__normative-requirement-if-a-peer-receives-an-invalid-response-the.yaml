document: rfc-7846
kind: normative-requirement
summary: If a peer receives an invalid response, the same request with identical content including the same transaction_id MUST be repeated. The transaction_id may be reused only if all content including date/time information is identical.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
