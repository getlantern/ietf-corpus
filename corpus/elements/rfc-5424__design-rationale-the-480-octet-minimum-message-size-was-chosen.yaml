document: rfc-5424
kind: design-rationale
summary: 'The 480-octet minimum message size was chosen to fit in a single UDP packet and avoid fragmentation: in a broken network a single packet has higher delivery probability than two fragments. Some UDP implementations historically did not support messages larger than 480 octets.'
section: A.2
topics:
    - udp
