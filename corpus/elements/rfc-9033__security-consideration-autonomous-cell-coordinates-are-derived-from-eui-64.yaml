document: rfc-9033
kind: security-consideration
summary: Autonomous cell coordinates are derived from EUI-64 addresses that are visible on the wire and unencrypted by link-layer security, making them easy targets for selective jamming. An attacker can jam a JP's AutoRxCell to block pledges from joining; the recommended countermeasure is pseudorandom JP selection when the link to the current JP appears bad.
section: "16"
topics:
    - security
