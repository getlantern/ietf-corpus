document: rfc-7268
kind: normative-requirement
summary: When Access-Request cipher or AKM suite attributes (WLAN-Pairwise-Cipher, WLAN-Group-Cipher, WLAN-AKM-Suite, or WLAN-Group-Mgmt-Cipher) are unacceptable to the RADIUS server, a WLAN-Reason-Code Attribute with value 29 ('Requested service rejected because of service provider ciphersuite or AKM requirement') SHOULD be returned in the Access-Reject.
section: "5"
rfc2119_level: SHOULD
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
