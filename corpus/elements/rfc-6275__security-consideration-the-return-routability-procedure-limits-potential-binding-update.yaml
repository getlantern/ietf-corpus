document: rfc-6275
kind: security-consideration
summary: The return routability procedure limits potential Binding Update attackers to those with on-path access between the home network and the correspondent node. Off-path attackers cannot forge Binding Updates because they cannot intercept the keygen tokens sent to both the home address and care-of address.
section: "15.4"
topics:
    - security
    - ip
