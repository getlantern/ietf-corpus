document: rfc-2853
kind: normative-requirement
summary: 'When null is passed as the GSSCredential to createContext, the implementation SHOULD follow a defined priority order for default principal selection: (1) single authorized principal, (2) default network identity, (3) mapped local identity, (4) user-configurable default.'
section: "4.8"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
