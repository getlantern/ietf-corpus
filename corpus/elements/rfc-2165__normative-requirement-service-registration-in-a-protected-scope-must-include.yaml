document: rfc-2165
kind: normative-requirement
summary: Service registration in a protected scope MUST include both a URL Authentication block and an Attribute Authentication block; the SA MUST set both the 'U' and 'A' header bits, and the DA MUST verify authentication before registering.
section: "9"
rfc2119_level: MUST
topics:
    - security
