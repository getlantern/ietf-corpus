document: rfc-3723
kind: normative-requirement
summary: To provide data origin authentication and integrity with ESP, HMAC-SHA1 MUST be supported and AES in CBC MAC mode with XCBC extensions (RFC 3566) SHOULD be supported. ESP with NULL encryption MUST be supported for authentication-only use.
section: 2.3.1
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
