document: rfc-6276
kind: design-rationale
summary: DHCPv6 client-server unicast (via Server Unicast option) is not recommended for this scenario because it requires a prior Solicit/Advertise exchange, which itself requires the relay agent to be present—providing little gain over the relay-based approach already specified.
