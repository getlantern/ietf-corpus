document: rfc-6870
kind: interoperability-note
summary: 'This document updates RFC 4447 in two ways: (1) prescribing that any RFC 4447-compliant PE MUST ignore status bits it does not recognize, and (2) clarifying that a status bit may indicate non-fault status or an instruction to the peer PE, not just a fault condition.'
