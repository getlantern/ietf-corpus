document: rfc-7171
kind: normative-requirement
summary: The NEA Client SHOULD choose the version sent by the NEA Server if it supports it, but MAY choose a lesser version. If the NEA Client only supports versions greater than the NEA Server's value, it MUST abnormally terminate EAP negotiation.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
