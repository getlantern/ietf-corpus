document: rfc-4006
kind: interoperability-note
summary: The Diameter credit-control application intentionally does not define rating input AVPs; these are specified in service-specific documents (3GPP, OMA, informational RFCs). Interoperability requires prior agreement on Service-Context-Id values and associated rating AVPs between credit-control client and server providers.
section: "4.1"
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
