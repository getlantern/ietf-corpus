document: rfc-1079
kind: interoperability-note
summary: Many systems allow only certain discrete terminal speeds. When a received speed does not match an allowed value, implementations should pick the nearest allowed speed, rounding in the safe direction (e.g., rounding up when speed is used for padding, since too much padding is better than too little).
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
