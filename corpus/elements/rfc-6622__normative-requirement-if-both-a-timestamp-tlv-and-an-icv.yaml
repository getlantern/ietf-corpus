document: rfc-6622
kind: normative-requirement
summary: If both a TIMESTAMP TLV and an ICV TLV are associated with an address, the TIMESTAMP TLV value MUST be covered when calculating the ICV (concatenated with the address and any other values).
section: "10.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
