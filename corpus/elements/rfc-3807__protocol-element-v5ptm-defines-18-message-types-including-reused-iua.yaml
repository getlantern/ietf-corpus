kind: protocol-element
summary: 'V5PTM defines 18 message types including reused IUA messages (Data Request/Indication, Unit Data Request/Indication, Establish/Release primitives) and new V5-specific messages: Link Status Start/Stop Reporting, Link Status Indication, Sa-Bit Set Request/Confirm, Sa-Bit Status Request/Indication, and Error Indication.'
