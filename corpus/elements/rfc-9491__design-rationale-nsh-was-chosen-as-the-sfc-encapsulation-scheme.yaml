document: rfc-9491
kind: design-rationale
summary: NSH was chosen as the SFC encapsulation scheme because it is transport-independent, avoiding the need to replicate specification effort per underlying transport. This design encourages consistent SFC-based service delivery across network segments that enable distinct transport protocols.
section: "1.1"
topics:
