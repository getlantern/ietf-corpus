document: rfc-3826
kind: interoperability-note
summary: The CFB128-AES-128 protocol is designed to be completely interchangeable with existing USM authentication and privacy protocols (CBC-DES, HMAC-MD5-96, HMAC-SHA-96), requiring no changes to the overall SNMP message structure.
