document: rfc-9580
kind: wire-format
summary: The Version 6 PKESK packet identifies the recipient by a 1-octet key version number and variable-length fingerprint (32 octets for v6 keys, 20 for v4 keys), preceded by a 1-octet size field. This replaces the 8-octet Key ID used in v3 PKESK.
