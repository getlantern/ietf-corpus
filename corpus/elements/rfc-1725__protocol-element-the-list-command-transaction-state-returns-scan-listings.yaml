document: rfc-1725
kind: protocol-element
summary: The LIST command (TRANSACTION state) returns scan listings in the format 'msg-number size-in-octets'. With no argument it returns a multi-line response for all non-deleted messages; with a message-number argument it returns a single-line scan listing for that message.
