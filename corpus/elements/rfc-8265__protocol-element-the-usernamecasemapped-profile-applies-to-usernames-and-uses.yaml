summary: 'The UsernameCaseMapped profile applies to usernames and uses the PRECIS IdentifierClass with rules: Width Mapping (fullwidth/halfwidth to decomposition), Case Mapping (uppercase/titlecase to lowercase via Unicode toLowerCase()), NFC Normalization, and the Bidi Rule for right-to-left strings.'
