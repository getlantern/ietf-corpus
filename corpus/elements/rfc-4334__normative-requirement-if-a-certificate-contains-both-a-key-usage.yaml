document: rfc-4334
kind: normative-requirement
summary: If a certificate contains both a key usage extension and an extended key usage extension, both extensions MUST be processed independently, and the certificate MUST only be used for a purpose consistent with both extensions.
section: "2"
rfc2119_level: MUST
