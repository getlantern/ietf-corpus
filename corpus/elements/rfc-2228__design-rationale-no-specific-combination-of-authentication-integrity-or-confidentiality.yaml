document: rfc-2228
kind: design-rationale
summary: No specific combination of authentication, integrity, or confidentiality is required by this specification. Partial implementations (e.g., integrity only, one-way authentication, or encryption without integrity) are explicitly permitted to accommodate policy constraints such as export controls.
