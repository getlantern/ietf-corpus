document: rfc-8839
kind: normative-requirement
summary: An agent generating local candidates MUST NOT use FQDN addresses. An agent processing remote candidates MUST ignore 'candidate' lines that include FQDNs or unrecognized IP address versions.
section: "5.1"
rfc2119_level: MUST
