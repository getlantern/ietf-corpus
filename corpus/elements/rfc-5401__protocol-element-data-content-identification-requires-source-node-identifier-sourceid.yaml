document: rfc-5401
kind: protocol-element
summary: 'Data content identification requires: source node identifier <sourceId>, object/stream identifier <objectId>, FEC block identifier <sourceBlockNumber>, FEC symbol identifier <encodingSymbolId>, and flags to differentiate field usage. The same fields appear in both data messages and NACK messages requesting repair.'
