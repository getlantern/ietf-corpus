document: rfc-1134
kind: normative-requirement
summary: The Restart timer MUST be configurable but should default to 3 seconds. Max-Restart (maximum retransmissions before declaring livelock) MUST also be configurable but should default to 10 retransmissions. Any loop detection timeout MUST be configurable.
section: 4.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
