document: rfc-5466
kind: protocol-element
summary: 'Filters have two scopes: private (only accessible to the logged-in user) stored under /private/filters/values/<filter_name>, and public (all logged-in users) stored under /shared/filters/values/<filter_name>. Both may coexist with the same name.'
section: "3.2"
