document: rfc-6749
kind: wire-format
summary: 'Access token response is a JSON object (Content-Type: application/json) with Cache-Control: no-store. Required fields: access_token, token_type. Recommended: expires_in (seconds). Optional: refresh_token, scope. The response MUST NOT be cached.'
