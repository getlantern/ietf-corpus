document: rfc-5380
kind: design-rationale
summary: The default MAP selection algorithm in a distributed MAP environment selects the most distant (furthest) available MAP with non-zero preference and non-zero valid lifetime. A more distant MAP reduces the probability of frequent re-registrations, particularly important for fast-moving mobile nodes.
section: "9.1"
topics:
