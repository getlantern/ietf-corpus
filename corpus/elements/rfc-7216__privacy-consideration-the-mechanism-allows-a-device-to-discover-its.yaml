document: rfc-7216
kind: privacy-consideration
summary: The mechanism allows a device to discover its local LIS, which could help an unauthorized third party identify the correct LIS server to attack for a given IP address and subsequently obtain location information. It is therefore important that a LIS meet the security requirements of the Location Configuration Protocol it implements.
section: "5"
topics:
    - privacy
    - security
