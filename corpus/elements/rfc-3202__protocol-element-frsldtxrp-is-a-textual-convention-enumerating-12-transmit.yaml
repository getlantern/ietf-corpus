document: rfc-3202
kind: protocol-element
summary: 'FrsldTxRP is a textual convention enumerating 12 transmit reference points: srcLocalRP(1), ingTxLocalRP(2), tpTxLocalRP(3), eqiTxLocalRP(4), eqoTxLocalRP(5), otherTxLocalRP(6), and the remote variants (7–12). FrsldRxRP mirrors this for receive-side reference points. Together they define the measurement domain.'
