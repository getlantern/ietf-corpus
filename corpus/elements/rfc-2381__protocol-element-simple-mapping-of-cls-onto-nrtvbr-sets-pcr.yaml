document: rfc-2381
kind: protocol-element
summary: Simple mapping of CLS onto nrtVBR sets PCR=p_r, SCR=r_r, MBS=b_r from the receiver TSpec. For ABR VCs, TSpec rate r_r sets the MCR; since no signalled bucket depth exists, the edge device SHOULD buffer at least b_r bytes plus jitter margin.
section: 2.5.2
