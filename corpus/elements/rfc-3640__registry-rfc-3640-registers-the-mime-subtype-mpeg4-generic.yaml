document: rfc-3640
kind: registry
summary: RFC 3640 registers the MIME subtype 'mpeg4-generic' under the media types 'video', 'audio', or 'application'. Required MIME parameters are streamType, profile-level-id, config, and mode. Optional parameters include objectType, constantSize, constantDuration, maxDisplacement, de-interleaveBufferSize, sizeLength, indexLength, indexDeltaLength, CTSDeltaLength, DTSDeltaLength, randomAccessIndication, streamStateIndication, and auxiliaryDataSizeLength.
section: "4.1"
