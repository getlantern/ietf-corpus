document: rfc-3983
kind: security-consideration
summary: Because IRIS contains a referral mechanism that may traverse multiple servers, clients SHOULD NOT use the SASL/PLAIN tuning profile to avoid handing user credentials to untrusted servers. Per SASL/PLAIN rules, clients MUST NOT use SASL/PLAIN without first encrypting the TCP session (e.g., via TLS).
section: "12"
rfc2119_level: MUST NOT
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
