document: rfc-6187
kind: normative-requirement
summary: If the KeyUsage extension is present in a certificate for x509v3-ssh-dss, x509v3-ssh-rsa, x509v3-rsa2048-sha256, or x509v3-ecdsa-sha2-*, the digitalSignature bit MUST be set. For ecmqv-sha2 key exchange, the keyAgreement bit MUST be set.
section: 2.2.1
rfc2119_level: MUST
topics:
