document: rfc-9853
kind: state-machine
summary: 'Enhanced path validation: initiator sends path_challenge to the previously valid (old) address; if the old path is preferred the responder returns path_response (no migration); if the old path is no longer preferred it returns path_drop, triggering a basic check on the new address; if T expires, a basic check on the new address is also initiated.'
section: "5.2"
