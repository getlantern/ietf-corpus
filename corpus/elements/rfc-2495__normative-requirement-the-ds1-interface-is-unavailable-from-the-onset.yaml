document: rfc-2495
kind: normative-requirement
summary: The DS1 interface is unavailable from the onset of 10 contiguous Severely Errored Seconds (SES), or the onset of the condition leading to a failure. Once unavailable, all counters except UAS are frozen.
section: 2.4.3
