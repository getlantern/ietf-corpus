document: rfc-4648
kind: protocol-element
summary: Base 32 encoding with extended hex alphabet ('base32hex') uses the alphabet 0–9 and A–V plus pad '='. Unlike standard base32 and base64, encoded data maintains its sort order when compared bit-wise. Used by NSEC3 in DNSSEC.
