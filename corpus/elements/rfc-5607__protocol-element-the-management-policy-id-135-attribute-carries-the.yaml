document: rfc-5607
kind: protocol-element
summary: The Management-Policy-Id (135) Attribute carries the name of a pre-provisioned management access policy of local scope. Zero or one instances MAY appear in an Access-Accept packet. The policy name is a simple, unstructured UTF-8 text string with no implicit hierarchy.
section: "6.3"
