document: rfc-2422
kind: interoperability-note
summary: The four-bit code word ordering within a byte may differ between existing implementations of G.726 codecs. Since audio/32KADPCM permits only little endian ordering, codecs that support the opposite ordering must reorder code words before storing to or retrieving from this content type.
section: "4"
topics:
