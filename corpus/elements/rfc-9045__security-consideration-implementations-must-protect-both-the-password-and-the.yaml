document: rfc-9045
kind: security-consideration
summary: Implementations must protect both the password and the MAC key; compromise of either may allow an attacker to undermine authentication. Using a one-time password increases security, assuming the integrity-protected transaction completes before an attacker can mount an offline attack.
section: "6"
topics:
