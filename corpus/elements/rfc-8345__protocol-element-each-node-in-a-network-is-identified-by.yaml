document: rfc-8345
kind: protocol-element
summary: Each `node` in a network is identified by a `node-id` (type `inet:uri`) unique within its containing network. A node may have a `supporting-node` list that references nodes in underlay networks, capturing hierarchical device representations (e.g., a router node supported by line-card nodes).
