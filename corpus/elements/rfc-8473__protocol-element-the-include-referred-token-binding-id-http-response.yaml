document: rfc-8473
kind: protocol-element
summary: The Include-Referred-Token-Binding-ID HTTP response header field signals to a client that it should reveal, to a Token Provider, the Token Binding ID used between itself and the Token Consumer. Its only defined value is 'true' (case insensitive), and it is meaningful only when the HTTP status code is a redirect (300–399).
section: "5.3"
topics:
    - http
    - security
    - oauth
