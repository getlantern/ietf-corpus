document: rfc-6076
kind: protocol-element
summary: Session Establishment Ratio (SER) measures the ratio of INVITE requests resulting in a 200 OK to total INVITE requests minus those resulting in a 3XX response. It is analogous to the ITU-T E.411 Answer Seizure Ratio (ASR). Measured at the originating UA only.
section: "4.6"
topics:
    - realtime
    - voip
    - measurement
