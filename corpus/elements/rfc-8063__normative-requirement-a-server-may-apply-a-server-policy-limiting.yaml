document: rfc-8063
kind: normative-requirement
summary: A server MAY apply a server policy limiting the number of <keyRelayData> elements per relay object; when that policy is violated, the server MUST respond with EPP result code 2308 'Data management policy violation'.
section: 3.1.2
rfc2119_level: MUST
topics:
