document: rfc-4469
kind: design-rationale
summary: The server performs no MIME conversion or validation when catenating URL-referenced parts; the client bears full responsibility for MIME correctness. This avoids complex server-side MIME processing and potential data corruption from well-intentioned but incorrect transformations.
