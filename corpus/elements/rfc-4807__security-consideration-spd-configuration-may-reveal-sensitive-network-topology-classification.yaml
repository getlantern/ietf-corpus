document: rfc-4807
kind: security-consideration
summary: SPD configuration may reveal sensitive network topology, classification levels, or protection authorities. SNMPv3 with privacy (authPriv) SHOULD be used to prevent involuntary disclosure of policy contents to passive observers.
section: "7.3"
