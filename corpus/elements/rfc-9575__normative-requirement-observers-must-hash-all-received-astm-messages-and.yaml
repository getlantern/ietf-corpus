document: rfc-9575
kind: normative-requirement
summary: Observers MUST hash all received ASTM Messages and cross-check them against hashes in received Manifests. At least one ASTM Message Hash in a Manifest MUST be from an F3411 message containing nonce-like data to prevent replay attacks.
section: "4.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
