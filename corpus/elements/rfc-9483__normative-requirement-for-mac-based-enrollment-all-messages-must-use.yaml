document: rfc-9483
kind: normative-requirement
summary: For MAC-based enrollment, all messages MUST use MAC-based protection, and the PKI management entity checking MAC-based protection MUST replace this protection (re-protect with its own credentials) before forwarding upstream, since the next hop may not know the shared secret.
section: 4.1.5
rfc2119_level: MUST
topics:
    - pkix
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
