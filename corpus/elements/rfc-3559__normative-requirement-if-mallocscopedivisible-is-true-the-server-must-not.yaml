document: rfc-3559
kind: normative-requirement
summary: If mallocScopeDivisible is true, the server must not allocate addresses out of the entire scope range; it may only allocate from a subrange learned via another method. Creating or deleting a non-divisible scope has the side effect of creating or deleting the corresponding mallocAllocRangeTable entry; deleting a divisible scope deletes any corresponding allocation range and request entries.
section: "4"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
