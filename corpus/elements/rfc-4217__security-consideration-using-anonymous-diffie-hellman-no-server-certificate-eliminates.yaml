document: rfc-4217
kind: security-consideration
summary: Using anonymous Diffie-Hellman (no server certificate) eliminates server identity authentication and provides little protection against man-in-the-middle attacks. Without client certificates, a malicious client can still hijack a data connection (port stealing).
section: 15.1.1
topics:
    - tls
    - security
    - crypto
