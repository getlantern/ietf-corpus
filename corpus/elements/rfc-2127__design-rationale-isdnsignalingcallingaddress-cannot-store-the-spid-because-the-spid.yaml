document: rfc-2127
kind: design-rationale
summary: isdnSignalingCallingAddress cannot store the SPID because the SPID (9–20 digits, North America only) and the calling address may differ and both must be present simultaneously; a separate isdnEndpointSpid object in isdnEndpointTable is therefore required.
section: 3.4.5
