document: rfc-9814
kind: design-rationale
summary: SLH-DSA is motivated by the threat of Cryptographically Relevant Quantum Computers (CRQCs), which would break RSA, DSA, ECDSA, and EdDSA. As a post-quantum cryptosystem, SLH-DSA's security rests on hash-function properties rather than hard mathematical problems vulnerable to Grover's or Shor's algorithms.
section: "1.2"
topics:
