document: rfc-9721
kind: protocol-element
summary: 'The MAC-IP route to parent MAC route relationship: each local MAC-IP route (Mx-IPx) is a dependent child of the parent local MAC route (Mx), inheriting its sequence number. Multiple sibling MAC-IP routes may share a common parent MAC route in the MAC address sharing scenario. The parent MAC route maintains the authoritative sequence number for all children.'
section: "5.1"
topics:
    - routing
