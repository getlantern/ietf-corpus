document: rfc-5340
kind: normative-requirement
summary: Before sending a Hello packet, the interface's Interface ID MUST be copied into the Hello packet. Hello packets no longer contain a network mask field, and DR/BDR choices are encoded as Router IDs rather than IP interface addresses. Unrecognized bits in the Hello packet's Options field should be cleared.
section: 4.2.1.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
