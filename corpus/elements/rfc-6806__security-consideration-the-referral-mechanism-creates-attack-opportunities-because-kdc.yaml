document: rfc-6806
kind: security-consideration
summary: The referral mechanism creates attack opportunities because KDC request and response fields defined in RFC 4120 are not protected. FAST (RFC 6113) fully mitigates these issues by protecting both request and response; the Section 11 negotiation mechanism provides partial protection by detecting modification of requests that result in replies.
section: "13"
topics:
    - security
