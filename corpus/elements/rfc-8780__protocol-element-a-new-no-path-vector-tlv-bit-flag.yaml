summary: 'A new NO-PATH-VECTOR TLV bit flag (Bit 23) is defined: when set by the PCE, it indicates no feasible route was found satisfying all RWA constraints (wavelength restriction, signal compatibility, etc.). This flag is carried in the NO-PATH object''s NO-PATH-VECTOR TLV.'
