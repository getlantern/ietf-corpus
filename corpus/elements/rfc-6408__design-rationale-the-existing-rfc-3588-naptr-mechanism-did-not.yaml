document: rfc-6408
kind: design-rationale
summary: The existing RFC 3588 NAPTR mechanism did not include the Diameter Application Identifier in the service field, forcing a peer to perform a Diameter capability exchange with every discovered node to find one supporting the required application. The extended S-NAPTR format eliminates this overhead by encoding the application ID directly in the DNS record.
section: "1"
topics:
    - diameter
    - dns
