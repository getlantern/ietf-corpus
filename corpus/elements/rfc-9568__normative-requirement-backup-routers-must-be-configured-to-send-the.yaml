document: rfc-9568
kind: normative-requirement
summary: Backup Routers MUST be configured to send the same Router Advertisement options as the address owner when they become Active. Special-service options (e.g., Home Agent Information) SHOULD NOT be sent unless Backup Routers are fully prepared to assume those services with a complete synchronized database.
section: 8.2.3
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
