document: rfc-8782
kind: protocol-element
summary: '''cuid'' (Client Unique Identifier) is a globally unique, stable identifier generated by the DOTS client, derived as a base64url-encoded truncated SHA-256 hash of the client''s SPKI, raw public key, or PSK identity. It SHOULD be 22 characters to avoid UDP fragmentation.'
