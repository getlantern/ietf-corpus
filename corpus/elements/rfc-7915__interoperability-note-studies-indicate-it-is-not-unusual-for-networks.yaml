document: rfc-7915
kind: interoperability-note
summary: Studies indicate it is not unusual for networks to drop ICMPv6 Packet Too Big error messages. Such drops cause PMTUD black holes (RFC 2923) that can only be overcome with Packetization Layer Path MTU Discovery (PLPMTUD, RFC 4821). Implementations should account for this operational reality.
section: "7"
topics:
