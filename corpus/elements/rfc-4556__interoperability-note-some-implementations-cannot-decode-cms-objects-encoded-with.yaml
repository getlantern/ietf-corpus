document: rfc-4556
kind: interoperability-note
summary: Some implementations cannot decode CMS objects encoded with BER, specifically indefinite-length encodings. To maximize interoperability, implementers SHOULD encode CMS objects used in PKINIT with DER rather than BER.
section: 3.1.3
topics:
    - crypto
    - security
