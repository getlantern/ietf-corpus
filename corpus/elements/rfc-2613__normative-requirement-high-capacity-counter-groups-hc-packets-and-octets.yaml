document: rfc-2613
kind: normative-requirement
summary: High-capacity counter groups (HC packets and octets) are mandatory for interfaces with ifSpeed greater than 10 MB/sec (hcVlanTo100mbGroup) and greater than 100 MB/sec (hcVlan100mbPlusGroup, hcPrio100mbPlusGroup), and MUST also be kept on smonDataSources of type VLAN or entPhysicalEntry.
section: "5"
rfc2119_level: MUST
topics:
