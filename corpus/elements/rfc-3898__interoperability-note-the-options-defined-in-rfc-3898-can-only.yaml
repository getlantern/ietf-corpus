document: rfc-3898
kind: interoperability-note
summary: The options defined in RFC 3898 can only configure NIS servers reachable via IPv6. IPv4 NIS server configuration is handled by RFC 2132 DHCP options. Mechanisms for configuring IPv4/IPv6 dual-stack applications were not specified in this document.
section: "1"
topics:
