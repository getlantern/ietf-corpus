document: rfc-2227
kind: interoperability-note
summary: When responses carry a Vary header, separate hit-counts MUST be maintained for each combination of selecting request-headers, even if they map to the same entity-tag. A proxy that does not support the Vary mechanism must not cache Vary responses and need not implement any hit-counting for them.
section: "7.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
