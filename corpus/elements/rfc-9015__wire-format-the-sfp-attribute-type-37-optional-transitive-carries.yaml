document: rfc-9015
kind: wire-format
summary: 'The SFP Attribute (type 37, Optional Transitive) carries a sequence of TLVs and Sub-TLVs each with a common format: 1-octet Type, 2-octet Length (octets following the Length field), and variable Value. Content includes zero or more Association TLVs and one or more Hop TLVs.'
