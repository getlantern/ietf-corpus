document: rfc-2326
kind: normative-requirement
summary: RTSP applications MUST understand the class of any status code (indicated by the first digit) and treat any unrecognized response as equivalent to the x00 status code of that class. An unrecognized response MUST NOT be cached.
section: 7.1.1
rfc2119_level: MUST
topics:
    - realtime
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
