document: rfc-2558
kind: state-machine
summary: 'Unavailable Seconds (UAS): interface becomes unavailable at the onset of 10 contiguous SESs (the 10 SESs are included in unavailable time). Interface becomes available at the onset of 10 contiguous non-SES seconds (those 10 seconds are excluded from unavailable time). While unavailable, only UAS counters are incremented.'
section: "3.5"
