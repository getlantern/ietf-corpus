document: rfc-8497
kind: security-consideration
summary: '''Log me'' marking MUST be disabled by default at both endpoints and intermediaries and MUST be enabled only by authorized users. An end user or network administrator must give explicit permission for a terminal or intermediary to initiate marking.'
