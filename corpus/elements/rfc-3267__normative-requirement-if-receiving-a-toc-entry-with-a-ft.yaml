document: rfc-3267
kind: normative-requirement
summary: If receiving a ToC entry with a FT value in the range 9-14 for AMR or 10-13 for AMR-WB, the whole packet SHOULD be discarded to avoid loss of data synchronization in depacketization, which can cause severe degradation in speech quality.
section: 4.3.2
rfc2119_level: SHOULD
topics:
