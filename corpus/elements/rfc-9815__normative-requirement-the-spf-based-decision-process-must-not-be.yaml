document: rfc-9815
kind: normative-requirement
summary: The SPF-based Decision Process MUST NOT be used with AFI/SAFI combinations other than BGP-LS AFI (16388) / SAFI 80. Two BGP speakers MUST exchange the Multiprotocol Extensions Capability (RFC 4760) with AFI 16388 / SAFI 80 before exchanging BGP-LS-SPF NLRIs.
