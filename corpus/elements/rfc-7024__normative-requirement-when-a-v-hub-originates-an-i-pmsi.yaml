document: rfc-7024
kind: normative-requirement
summary: When a V-hub originates an I-PMSI/S-PMSI/SA A-D route, the route MUST also carry RT-VH (the RT of the V-hub's VPN-IP default route), in addition to RTs constructed per RFC 6514/6625, so that associated V-spokes also import these multicast routes.
section: "7.6"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
