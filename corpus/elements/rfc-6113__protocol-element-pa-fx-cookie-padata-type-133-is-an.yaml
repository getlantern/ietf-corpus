document: rfc-6113
kind: protocol-element
summary: PA-FX-COOKIE (padata type 133) is an opaque stateless token sent by the KDC to capture conversation state across multiple AS-exchange round trips, since KDCs may be stateless and different requests may be handled by different KDCs. The client MUST copy the exact cookie into the next message; the KDC MUST include a cookie in KDC_ERR_PREAUTH_REQUIRED and KDC_ERR_MORE_PREAUTH_DATA_REQUIRED responses.
section: "5.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
