document: rfc-6277
kind: normative-requirement
summary: Clients requesting OCSP services SHALL be capable of processing responses signed using RSA with SHA-1 (sha1WithRSAEncryption) and RSA with SHA-256 (sha256WithRSAEncryption). Clients SHOULD also be capable of processing responses signed using DSA keys (id-dsa-with-sha1). Clients MAY support other algorithms.
section: "3"
rfc2119_level: SHALL
topics:
    - pkix
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
