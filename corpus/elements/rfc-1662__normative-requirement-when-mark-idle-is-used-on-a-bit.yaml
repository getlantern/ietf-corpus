document: rfc-1662
kind: normative-requirement
summary: When mark idle is used on a bit-synchronous link, the implementation MUST ensure at least 15 consecutive '1' bits between Flags during the idle period, and that the Flag Sequence is always generated at the beginning of a frame after an idle period.
section: "5.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
