document: rfc-1495
kind: design-rationale
summary: 'The mappings are designed to support three scenarios: (1) arbitrary binary content exchange between MIME and MHS users, (2) MIME content-types tunneling through an MHS relay without loss, and (3) MHS body parts tunneling through a MIME relay without loss. MHS heading extensions carry additional MIME semantics to enable reversible transformations.'
