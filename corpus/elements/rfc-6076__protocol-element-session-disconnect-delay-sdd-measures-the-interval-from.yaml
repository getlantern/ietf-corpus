document: rfc-6076
kind: protocol-element
summary: 'Session Disconnect Delay (SDD) measures the interval from sending the BYE message until receiving the 2XX response. Formula: SDD = Time of 2XX or Timeout - Time of BYE. Can be measured at either endpoint UA. Output SHOULD be in milliseconds.'
section: "4.4"
topics:
