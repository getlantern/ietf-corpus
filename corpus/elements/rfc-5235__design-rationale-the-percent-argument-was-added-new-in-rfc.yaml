document: rfc-5235
kind: design-rationale
summary: The ':percent' argument was added (new in RFC 5235 vs. RFC 3685) to provide a 0–100 range for spamtest results, offering finer-grained spam likelihood reporting than the original 0–10 scale. The 'spamtestplus' capability identifier was introduced to distinguish implementations supporting this argument.
section: Appendix B
