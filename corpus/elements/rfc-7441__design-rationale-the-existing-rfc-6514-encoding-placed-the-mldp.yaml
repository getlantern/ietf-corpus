document: rfc-7441
kind: design-rationale
summary: The existing RFC 6514 encoding placed the mLDP Root Node in the Multicast Source field and the Opaque Value in the Multicast Group field, but provided no way to distinguish whether the Multicast Group field contained an IP address or an mLDP Opaque Value, breaking mixed PIM/mLDP deployments.
section: "2"
topics:
