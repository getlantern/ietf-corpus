document: rfc-4266
kind: protocol-element
summary: The Gopher selector string is a sequence of octets that may contain any octets except 0x09 (HT/tab), 0x0A (LF), and 0x0D (CR). The selector string may be empty, which refers to the top-level directory on a Gopher server.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
