document: rfc-4605
kind: normative-requirement
summary: To mitigate the black-hole attack via querier election, an operator SHOULD assign the subnet's lowest IP address(es) to the proxy device(s) so they win the querier election.
section: "5"
rfc2119_level: SHOULD
