document: rfc-9132
kind: normative-requirement
summary: DOTS agents MUST NOT send more than one UDP datagram per round-trip time to the peer on average; if the client cannot maintain an RTT estimate, it MUST NOT send more than one Non-confirmable request every 3 seconds.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - security
    - congestion
