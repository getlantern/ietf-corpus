document: rfc-5607
kind: security-consideration
summary: In proxy deployments, sensitive user credentials (e.g., passwords) are likely available in cleartext at each proxy server, since RADIUS passwords are only protected on a hop-by-hop basis. This risk is present whenever password authentication is used for management access across proxy chains.
section: "12.2"
topics:
    - radius
    - security
    - privacy
