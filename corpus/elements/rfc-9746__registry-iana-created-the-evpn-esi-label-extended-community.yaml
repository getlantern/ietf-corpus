document: rfc-9746
kind: registry
summary: IANA created the 'EVPN ESI Label Extended Community Flags' registry for the 1-octet Flags field of the ESI Label Extended Community. Bit positions 0-1 are 'Multihoming Redundancy Mode' (RFC 7432), bits 2-5 are Unassigned, and bits 6-7 are 'Split-Horizon Type' (RFC 9746). New registrations require IETF Review.
