document: rfc-9480
kind: security-consideration
summary: When a CA issues a certificate containing EKU extensions defined in Section 4.5 (cmcCA, cmcRA, cmKGA), this expresses delegation of authorization originally held only by the CA certificate itself. Such delegation is a sensitive PKI action and requires special care to ensure only legitimate entities receive such EKUs.
section: "2.25"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
