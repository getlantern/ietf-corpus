document: rfc-7266
kind: normative-requirement
summary: Senders MUST send the MOS Metrics Block in the same compound RTCP packet as the Measurement Information block (RFC 6776). Receivers MUST verify that the measurement period is received in the same compound RTCP packet; if not, the MOS Metrics Block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
