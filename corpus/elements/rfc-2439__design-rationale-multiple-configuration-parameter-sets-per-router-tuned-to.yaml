document: rfc-2439
kind: design-rationale
summary: Multiple configuration parameter sets per router (tuned to short-term severe flap vs. chronic mild flap, or to routes with vs. without alternate paths) allow more nuanced suppression policies. Parameter selection may be based on BGP LOCAL_PREF, prefix length, or presence of an alternate path.
