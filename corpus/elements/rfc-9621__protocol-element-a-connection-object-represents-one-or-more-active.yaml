document: rfc-9621
kind: protocol-element
summary: A Connection object represents one or more active transport protocol instances that can send and/or receive Messages between Local and Remote Endpoints. It can represent a connection-oriented protocol (TCP), a fully specified 5-tuple for connectionless protocols (UDP), a pool of transport instances, or a stream of a multistreaming protocol.
section: 4.1.2
topics:
