document: rfc-5034
kind: normative-requirement
summary: If the server cannot Base64 decode a client response, it MUST reject the AUTH command with an -ERR reply. If the client cannot Base64 decode a server challenge, it MUST cancel the authentication using the '*' response.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
