document: rfc-8338
kind: normative-requirement
summary: A P2MP PW MUST be associated with a transport LSP established using either RSVP-TE or mLDP. When using mLDP, the new L2VPN-MCAST application TLV Opaque Value Element type MUST be used in the P2MP FEC Element.
section: 3.2.1
rfc2119_level: MUST
topics:
