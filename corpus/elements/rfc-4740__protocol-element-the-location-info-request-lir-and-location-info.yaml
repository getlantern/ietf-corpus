document: rfc-4740
kind: protocol-element
summary: The Location-Info-Request (LIR) and Location-Info-Answer (LIA) commands use Command-Code 285. LIR requests the URI of the SIP server assigned to a given SIP-AOR; LIA returns that URI or result codes DIAMETER_UNREGISTERED_SERVICE or DIAMETER_ERROR_IDENTITY_NOT_REGISTERED when no server is assigned.
section: "8.5"
