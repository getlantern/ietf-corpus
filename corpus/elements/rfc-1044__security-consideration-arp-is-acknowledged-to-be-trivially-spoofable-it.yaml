document: rfc-1044
kind: security-consideration
summary: ARP is acknowledged to be trivially spoofable ('it's easy to lie with ARP'). The specification recommends that static routing table entries override any contradicting dynamic ARP information to provide authentication. ARP servers may optionally issue responses on a need-to-know basis in secure environments, enabled by the Source Correct bit in the ARP request.
section: BROADCAST ARP
topics:
    - security
    - ip
