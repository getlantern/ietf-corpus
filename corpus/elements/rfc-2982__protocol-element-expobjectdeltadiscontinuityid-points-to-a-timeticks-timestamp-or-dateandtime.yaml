document: rfc-2982
kind: protocol-element
summary: expObjectDeltaDiscontinuityID points to a TimeTicks, TimeStamp, or DateAndTime object that signals a counter discontinuity for the associated delta object. It defaults to sysUpTimeInstance. Even if a custom discontinuity object is specified, implementations must also check sysUpTime for overall discontinuities.
