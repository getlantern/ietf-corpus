document: rfc-8103
kind: design-rationale
summary: ChaCha20 and Poly1305 were chosen because they are designed for high-performance software implementations, require few resources and inexpensive operations, and are suitable across a wide range of systems. They were also designed to minimize information leakage through side channels.
