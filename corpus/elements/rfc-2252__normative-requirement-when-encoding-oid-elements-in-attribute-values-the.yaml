document: rfc-2252
kind: normative-requirement
summary: When encoding OID elements in attribute values, the descriptor (descr) form SHOULD be used in preference to the numeric OID form, as object descriptors are more human-readable. Where assigned and known by the implementation, descriptors SHOULD be used to the greatest extent possible.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
