document: rfc-5576
kind: normative-requirement
summary: In offer/answer, SSRC IDs for sources described in an SDP answer MUST be distinct from SSRC IDs for sources of that media stream in the offer. New SSRC IDs in an updated offer MUST also be distinct from those established in the most recent offer/answer exchange.
section: "8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
