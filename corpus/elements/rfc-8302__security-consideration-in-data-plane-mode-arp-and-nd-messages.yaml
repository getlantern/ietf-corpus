document: rfc-8302
kind: security-consideration
summary: In data-plane mode, ARP and ND messages can be easily forged without SEND, making IP/MAC learning from ARP/ND hackable. Link-layer security (IEEE 802.1AE) between end stations and edge RBridges could improve security but imposes requirements on end stations that conflict with TRILL's goal of operating with unmodified end stations.
section: "9.1"
topics:
    - security
    - routing
