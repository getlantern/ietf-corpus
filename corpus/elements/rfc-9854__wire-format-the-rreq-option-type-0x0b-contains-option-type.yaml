summary: 'The RREQ option (Type 0x0B) contains: Option Type (8-bit), Option Length (8-bit), S/H/X flags (3 bits), Compr (4 bits), L (2 bits), RankLimit (8 bits), Orig SeqNo (8 bits), and an optional variable-length Address Vector present only in source-routing mode (H=0) with prefix bytes elided per Compr.'
