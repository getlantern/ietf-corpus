document: rfc-9761
kind: design-rationale
summary: New ACL TLS Version and ACL DTLS Version registries are created separately from the main TLS IANA registries because the TLS and DTLS IANA registries do not maintain (D)TLS version numbers. This allows the 'iana-tls-profile' YANG module to be automatically updated by IANA when new (D)TLS versions are standardized.
section: "5.3"
topics:
    - tls
    - yang
    - registry
