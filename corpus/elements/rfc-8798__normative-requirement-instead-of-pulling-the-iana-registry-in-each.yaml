document: rfc-8798
kind: normative-requirement
summary: Instead of pulling the IANA registry in each individual instance of the code, the software update mechanism (or a similar mechanism leading to less frequent IANA visits) SHOULD be used to disseminate updated units registries obtained from IANA towards the instances via common repositories, to avoid high load at IANA and a potential single point of failure.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
