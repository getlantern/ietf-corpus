document: rfc-7032
kind: protocol-element
summary: A downstream access LSR responds to a Label Request with a Label Mapping only when the FEC has a route in its RIB and a valid downstream label binding exists (from LDP DoD or DU), or when acting as egress. If no downstream label is yet available but an LDP DoD session to the next hop exists, the downstream LSR propagates the request and responds only after receiving the label from the next hop.
section: 4.3.1
topics:
    - mpls
