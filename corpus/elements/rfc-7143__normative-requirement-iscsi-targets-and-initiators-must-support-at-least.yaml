document: rfc-7143
kind: normative-requirement
summary: iSCSI targets and initiators MUST support at least one TCP connection per session and MAY support several. For error recovery purposes, implementations supporting a single active connection SHOULD support two connections during recovery.
section: 4.2.1
rfc2119_level: MUST
topics:
    - tcp
