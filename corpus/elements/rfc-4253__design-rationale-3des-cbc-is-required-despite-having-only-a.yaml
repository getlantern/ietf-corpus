document: rfc-4253
kind: design-rationale
summary: 3des-cbc is REQUIRED despite having only a 112-bit effective key length (below the 128-bit threshold) because all known implementations support it and it is the fundamental interoperable algorithm. It is expected to be deprecated by STANDARDS ACTION once a stronger algorithm becomes ubiquitous.
section: "6.3"
topics:
