document: rfc-6736
kind: normative-requirement
summary: When the NAT controller is unreachable (detected via Diameter watchdog messages or failed accounting responses), NAT-bindings and NAT device state for that session MUST be cleaned up after a grace period that is operator-configurable on the NAT device (and may be zero).
section: "4.6"
rfc2119_level: MUST
topics:
    - nat
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
