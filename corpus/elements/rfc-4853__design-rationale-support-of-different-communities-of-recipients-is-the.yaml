document: rfc-4853
kind: design-rationale
summary: Support of different communities of recipients is the primary reason signers choose to include more than one signature. For example, if some recipients support RSA and others ECDSA, the signer can generate two signatures so each recipient can validate one.
section: "1"
topics:
