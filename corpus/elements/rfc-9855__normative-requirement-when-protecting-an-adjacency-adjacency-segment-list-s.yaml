document: rfc-9855
kind: normative-requirement
summary: When protecting an [Adjacency, Adjacency] segment list, S MUST apply a NEXT operation on Adj-SID(S-F) and then one or more PUSH operations. If the RL terminates on F, only RL segments are pushed; otherwise a node segment of F is pushed first.
section: 6.2.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
