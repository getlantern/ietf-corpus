document: rfc-1717
kind: protocol-element
summary: PPP Multilink uses protocol identifier 0x003d to encapsulate fragments. A single reassembly structure is associated with each bundle; all fragments received over member links are presented to the same network-layer protocol machine whether or not they carry multilink headers.
