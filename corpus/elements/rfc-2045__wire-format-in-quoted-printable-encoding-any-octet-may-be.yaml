document: rfc-2045
kind: wire-format
summary: In Quoted-Printable encoding, any octet may be represented as '=' followed by two uppercase hexadecimal digits (e.g., '=3D' for '='). Encoded lines must be no more than 76 characters long, not counting the trailing CRLF; soft line breaks are indicated by '=' as the last character.
