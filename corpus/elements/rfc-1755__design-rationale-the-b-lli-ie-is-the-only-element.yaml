document: rfc-1755
kind: design-rationale
summary: The B-LLI IE is the only element in UNI 3.1 for designating protocol endpoints. The framework principle is that all protocols in SETUP IEs MUST be used to encapsulate the call, but the highest-layer protocol specified SHOULD manage the call, creating a hierarchy that supports future higher-level protocol and application bindings.
section: 6.2.1
topics:
