document: rfc-4745
kind: protocol-element
summary: The <identity> condition restricts rule matching to one or more authenticated entities using <one> (exact URI match) and <many> (domain-wide match with optional <except> exclusions) child elements. The <identity> condition is TRUE if any child element evaluates to TRUE (logical OR). If <identity> is absent, other conditions apply to any user regardless of authentication.
section: "7.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
