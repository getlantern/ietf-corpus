document: rfc-2851
kind: wire-format
summary: 'InetAddressIPv6 encodes an IPv6 address as 16 or 20 octets: octets 1-16 hold the IPv6 address in network byte order, and octets 17-20 hold an optional scope identifier in network byte order. DISPLAY-HINT is ''2x:2x:2x:2x:2x:2x:2x:2x%4d''.'
