document: rfc-3015
kind: protocol-element
summary: 'Eight commands are defined: Add (add Termination to Context, creating a new Context if none specified), Modify (change properties/events/signals), Subtract (disconnect and return statistics, deleting Context when last Termination removed), Move (atomic relocation), AuditValue (query current state), AuditCapabilities (query possible values), Notify (MG-to-MGC event report), and ServiceChange (registration, restart, in/out-of-service).'
section: "7.2"
topics:
    - realtime
    - voip
