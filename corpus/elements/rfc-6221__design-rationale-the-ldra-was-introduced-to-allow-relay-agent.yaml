document: rfc-6221
kind: design-rationale
summary: The LDRA was introduced to allow Relay Agent Information (including Interface-ID) to be inserted by access nodes (DSLAMs, Ethernet switches) that perform only Layer 2 bridging and have no IPv6 control or routing capability. This fills the gap where a DHCPv6 server would otherwise be unaware of how a client is attached to the network.
section: "1"
topics:
