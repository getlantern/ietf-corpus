document: rfc-4544
kind: protocol-element
summary: The iscsiInstanceAttributesTable is the root table of the iSCSI MIB; every other table entry is owned by exactly one iSCSI instance indexed by iscsiInstIndex. It carries vendor ID, supported version range (iscsiInstVersionMin/Max), portal/node/session counts, and session failure tracking (iscsiInstSsnFailures, iscsiInstLastSsnFailureType, iscsiInstLastSsnRmtNodeName).
section: "6.3"
