summary: 'ds3LineType (ds3ConfigEntry 5) indicates the variety of DS3 C-bit application: ds3M23, ds3SYNTRAN, ds3CbitParity, ds3ClearChannel, or other. The line type affects interpretation of usage and error statistics; all operate at 44.736 Mbps.'
