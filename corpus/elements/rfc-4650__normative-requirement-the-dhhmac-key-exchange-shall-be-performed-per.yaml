kind: normative-requirement
summary: 'The DHHMAC key exchange SHALL be performed per Figure 1: initiator sends I_message with g^(xi) and HMAC, responder replies with R_message containing g^(xr) and HMAC. Both parties then independently compute TGK = g^(xi*xr).'
