document: rfc-1316
kind: design-rationale
summary: The Character MIB is designed as one layer in a MIB stack, sitting above physical-layer MIBs (RS-232-like, Parallel-printer-like) and below or alongside application-layer MIBs (Telnet MIB, PPP MIB), enabling complementary use across layers.
