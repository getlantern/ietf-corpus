document: rfc-5246
kind: normative-requirement
summary: When a client receives a CertificateRequest but has no suitable certificate, it MUST send an empty Certificate message rather than omitting it or sending a no_certificate alert (which is reserved for SSLv3 only).
section: 7.4.6
rfc2119_level: MUST
