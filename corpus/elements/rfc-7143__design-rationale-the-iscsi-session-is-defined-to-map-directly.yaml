document: rfc-7143
kind: design-rationale
summary: The iSCSI session is defined to map directly to the SCSI I_T nexus, with the session identifier being a tuple of ISID (initiator-assigned) and Target Portal Group Tag (target-assigned). This design preserves the SCSI single-initiator/single-target relationship across multiple TCP connections, allowing connection-level failover and load balancing while maintaining correct SCSI task ordering and reservation semantics.
section: "4.4"
topics:
