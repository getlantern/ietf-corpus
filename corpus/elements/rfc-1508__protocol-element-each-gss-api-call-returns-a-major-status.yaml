document: rfc-1508
kind: protocol-element
summary: Each GSS-API call returns a major_status (mechanism-independent indication such as GSS_COMPLETE, GSS_FAILURE, GSS_CONTINUE_NEEDED) and a minor_status (mechanism-specific detail, not defined by this specification). Fatal error codes include GSS_BAD_BINDINGS, GSS_BAD_MECH, GSS_BAD_SIG, GSS_DEFECTIVE_TOKEN, GSS_NO_CRED, and others; informatory codes include GSS_DUPLICATE_TOKEN, GSS_OLD_TOKEN, and GSS_UNSEQ_TOKEN.
section: 1.2.1
topics:
    - security
