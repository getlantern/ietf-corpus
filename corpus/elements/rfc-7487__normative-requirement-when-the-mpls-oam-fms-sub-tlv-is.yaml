document: rfc-7487
kind: normative-requirement
summary: When the MPLS OAM FMS Sub-TLV is present, the 'OAM MIP entities desired' and 'OAM MEP entities desired' flags MUST be set and the entire OAM Configuration TLV MUST be placed in LSP_REQUIRED_ATTRIBUTES or LSP_ATTRIBUTES to ensure capable intermediate nodes process it.
