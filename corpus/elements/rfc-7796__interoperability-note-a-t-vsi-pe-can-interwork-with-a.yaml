document: rfc-7796
kind: interoperability-note
summary: A T-VSI PE can interwork with a traditional VPLS PE (VSI without E-Tree support) using Compatible Mode. In this mode, the legacy PE can only be attached with root nodes; a raw PW SHOULD be used, and the T-VSI PE strips the E-Tree VLAN on egress and restores the root VLAN on ingress.
section: 5.3.2
topics:
    - mpls
    - routing
