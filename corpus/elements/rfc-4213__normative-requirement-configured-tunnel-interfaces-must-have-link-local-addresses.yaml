document: rfc-4213
kind: normative-requirement
summary: Configured tunnel interfaces MUST have link-local addresses because they are IPv6 interfaces over the IPv4 link layer. The interface identifier may be based on the 32-bit IPv4 address of an underlying interface, prepended by zeros, with the U/L bit set to zero.
section: "3.7"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
