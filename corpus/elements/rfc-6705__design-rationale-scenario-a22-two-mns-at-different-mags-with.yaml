document: rfc-6705
kind: design-rationale
summary: Scenario A22 (two MNs at different MAGs with different LMAs) is explicitly excluded from the protocol because PMIPv6 defines no inter-LMA communication mechanism. When a supported scenario morphs into A22, LR must be torn down, accepting transient packet loss rather than permanent misdirection.
