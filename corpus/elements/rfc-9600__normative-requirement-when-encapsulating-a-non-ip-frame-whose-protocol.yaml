document: rfc-9600
kind: normative-requirement
summary: When encapsulating a non-IP frame whose protocol has an ECN capability indication, the ingress RBridge MUST follow the guidelines in RFC 9599 Section 4.3 to add a flags word to the TRILL header, copying from the native frame's ECN field into TRILL-ECN.
section: "3.1"
rfc2119_level: MUST
topics:
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
