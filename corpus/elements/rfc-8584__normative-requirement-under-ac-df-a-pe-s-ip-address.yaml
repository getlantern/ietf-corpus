document: rfc-8584
kind: normative-requirement
summary: Under AC-DF, a PE's IP address MUST be removed from the ES candidate list if its Ethernet A-D per ES route is withdrawn. A PE's IP address MUST NOT be considered a candidate DF for an <ES, Ethernet Tag> if its Ethernet A-D per EVI route for that <ES, Ethernet Tag> is withdrawn.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
