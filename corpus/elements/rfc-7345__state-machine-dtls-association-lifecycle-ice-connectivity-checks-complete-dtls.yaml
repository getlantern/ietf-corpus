document: rfc-7345
kind: state-machine
summary: 'DTLS association lifecycle: ICE connectivity checks complete → DTLS handshake begins → handshake completes, UDPTL transport begins → on session modification, old and new associations coexist → old association deleted once new one is established. On ICE restart, handshake is repeated and new association replaces old.'
