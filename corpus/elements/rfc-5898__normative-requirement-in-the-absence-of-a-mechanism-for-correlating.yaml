document: rfc-5898
kind: normative-requirement
summary: In the absence of a mechanism for correlating a dialog to a media stream (e.g., ICE), a UAS MUST NOT require the offerer to confirm a connectivity precondition, because the offerer cannot determine which dialog had its connectivity verified.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
