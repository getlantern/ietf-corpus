document: rfc-9628
kind: wire-format
summary: 'The Layer Refresh Request (LRR) index for VP9 uses two octets: a 5-bit RES field followed by a 3-bit TID in the first octet, and a 5-bit RES field followed by a 3-bit SID in the second octet. Both RES fields MUST be zero on transmission and ignored on reception.'
section: "5.3"
topics:
    - rtp
    - realtime
