document: rfc-4011
kind: protocol-element
summary: Precedence groups allow multiple policies to be ranked so that for each element only the highest-precedence matching ready policy is active. Lower-precedence policies in the group are not executed if a higher-precedence policy matches the same element.
section: "4.1"
