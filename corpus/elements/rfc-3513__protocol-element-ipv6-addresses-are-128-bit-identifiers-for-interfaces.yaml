document: rfc-3513
kind: protocol-element
summary: 'IPv6 addresses are 128-bit identifiers for interfaces and sets of interfaces. There are three address types: unicast (single interface), anycast (nearest of a set), and multicast (all of a set). There are no broadcast addresses in IPv6; their function is superseded by multicast.'
