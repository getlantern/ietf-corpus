document: rfc-6619
kind: design-rationale
summary: For deployments where exactly one user device connects per tunnel interface and all tunnels use the same IPv4 address, storing the user device address in addition to the interface identifier is redundant; omitting it can decrease mapping entry storage and improve NAT scalability.
section: "4"
