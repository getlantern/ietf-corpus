document: rfc-8804
kind: normative-requirement
summary: When using HTTP redirect to route a client back to the uCDN fallback, the dCDN is responsible for using the original URL path as the client used for the original uCDN request, stripping any dCDN path-prefix and/or uCDN hostname that may have been added.
section: "3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
