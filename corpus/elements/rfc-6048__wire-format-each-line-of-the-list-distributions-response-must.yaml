document: rfc-6048
kind: wire-format
summary: 'Each line of the LIST DISTRIBUTIONS response MUST consist of two fields: the distribution name and its description, separated by one or more space or TAB characters (typically a single TAB). No leading or trailing whitespace; the description may contain whitespace.'
