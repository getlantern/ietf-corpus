document: rfc-5574
kind: protocol-element
summary: The RTP Marker (M) bit is set to one on the first packet sent after a silence period during which packets have not been transmitted contiguously. The Timestamp is a 32-bit word corresponding to the sampling instant for the first frame in the RTP packet.
