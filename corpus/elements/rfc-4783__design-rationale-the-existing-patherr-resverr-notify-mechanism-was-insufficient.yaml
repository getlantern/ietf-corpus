document: rfc-4783
kind: design-rationale
summary: The existing PathErr/ResvErr/Notify mechanism was insufficient for alarm communication because those messages indicate control state problems and can only report one problem at a time, making it impossible to communicate alarm clearance or correlate all problems associated with a single LSP.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
