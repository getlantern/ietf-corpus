document: rfc-6447
kind: security-consideration
summary: Authorization policies to limit access to location information are provided by external protocols such as Common Policy (RFC 4745), Geolocation Policy, or HELD context. While Geolocation Policy defines a standardized format for geolocation authorization policies, it does not define specific policies for controlling filters.
section: "5"
topics:
