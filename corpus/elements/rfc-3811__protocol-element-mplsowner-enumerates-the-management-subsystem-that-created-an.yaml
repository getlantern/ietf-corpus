document: rfc-3811
kind: protocol-element
summary: 'MplsOwner enumerates the management subsystem that created an MPLS object: unknown(1), other(2), snmp(3), ldp(4), crldp(5), rsvpTe(6), or policyAgent(7). Objects created by any of these MAY be modified or destroyed by the same or a different subsystem.'
