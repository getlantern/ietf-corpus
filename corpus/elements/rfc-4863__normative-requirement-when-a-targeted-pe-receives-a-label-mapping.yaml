document: rfc-4863
kind: normative-requirement
summary: When a targeted PE receives a Label Mapping message with the wildcard PW Type and is not configured to use a specific, non-wildcard PW Type, it MUST respond with a Label Release message carrying an LDP Status Code of 'Generic Misconfiguration Error'.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
