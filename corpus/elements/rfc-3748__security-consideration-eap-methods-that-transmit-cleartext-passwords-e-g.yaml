document: rfc-3748
kind: security-consideration
summary: EAP methods that transmit cleartext passwords (e.g., GTC) MUST NOT be used outside a protected tunnel with server authentication, as passwords would be exposed to eavesdroppers. The EAP GTC method is explicitly restricted from supporting cleartext passwords in the absence of such a tunnel.
section: "7.14"
topics:
    - security
