document: rfc-9444
kind: normative-requirement
summary: If the subdomainAuthAllowed field is present in an authorization object, it MUST be true for authorizations where ACME server policy allows certificates to be issued for any subdomain subordinate to the domain specified in the identifier field.
section: "4.1"
rfc2119_level: MUST
