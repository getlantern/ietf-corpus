document: rfc-6347
kind: protocol-element
summary: The HelloVerifyRequest message contains a server_version field and an opaque cookie<0..2^8-1>. It is sent by the server in response to an initial ClientHello to enable a stateless cookie exchange that counters DoS and amplification attacks. The cookie size limit is 255 bytes (increased from 32 in DTLS 1.0).
section: 4.2.1
topics:
    - tls
    - security
