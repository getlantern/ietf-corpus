document: rfc-6463
kind: normative-requirement
summary: If a MAG receives a PBA containing the Redirect mobility option without having first included the Redirect-Capability option in the corresponding PBU, the MAG MUST ignore the Redirect option and process the PBA as described in RFC 5213.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
