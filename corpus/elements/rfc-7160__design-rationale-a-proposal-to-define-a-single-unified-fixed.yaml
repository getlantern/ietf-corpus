kind: design-rationale
summary: A proposal to define a single unified fixed clock rate for all payloads (Wenger and Perkins, AVT-VAR-RATE) was considered as an alternative solution but was rejected at IETF 61. The approach chosen instead mandates different SSRCs per clock rate when RTCP is in use.
