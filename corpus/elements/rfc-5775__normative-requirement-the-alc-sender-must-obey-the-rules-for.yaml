document: rfc-5775
kind: normative-requirement
summary: The ALC sender MUST obey the rules for filling in the CCI field in packet headers and MUST send packets at rates dictated by the multiple rate congestion control building block. The sender MUST use the same TSI for all packets in the session.
section: "4.3"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
