document: rfc-4806
kind: protocol-element
summary: An OCSP request is a CERTREQ payload with Cert Encoding value 14 ('OCSP Content'). Its Certificate Authority field contains zero or more SHA-1 hashes of trusted OCSP responder certificates, identifying Trusted Responders (case b of RFC 2560 Section 2.2); for CA-signed or CA-designated responders no hashes are needed.
section: "3.1"
topics:
    - ipsec
    - pkix
    - security
