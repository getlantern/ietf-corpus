document: rfc-8078
kind: normative-requirement
summary: Parents SHOULD NOT refuse CDS/CDNSKEY updates that do not yet have a matching DNSKEY in the child zone, allowing the child to pre-publish a spare or potentially offline DNSKEY.
section: "3.1"
rfc2119_level: SHOULD NOT
