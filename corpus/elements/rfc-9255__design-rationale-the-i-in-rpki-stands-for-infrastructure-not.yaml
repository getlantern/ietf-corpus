document: rfc-9255
kind: design-rationale
summary: 'The ''I'' in RPKI stands for ''Infrastructure,'' not ''Identity.'' RFC 6480 Section 2.1 states explicitly: ''An important property of this PKI is that certificates do not attest to the identity of the subject.'''
