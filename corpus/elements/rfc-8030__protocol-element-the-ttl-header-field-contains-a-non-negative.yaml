document: rfc-8030
kind: protocol-element
summary: The TTL header field contains a non-negative integer representing time in seconds. A recipient parsing TTL SHOULD use an arithmetic type of at least 31 bits; if the value exceeds the maximum representable integer, it MUST be treated as 2147483648 (2^31).
section: "5.2"
topics:
