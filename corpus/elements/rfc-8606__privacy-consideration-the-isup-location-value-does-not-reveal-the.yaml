document: rfc-8606
kind: privacy-consideration
summary: The ISUP location value does not reveal the identity of the originating or terminating party, nor the physical location of the caller or callee. It shows only the ISUP network location of the device that released the call, providing little more exposure than the Q.850 cause code itself.
section: "6"
topics:
