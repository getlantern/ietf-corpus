document: rfc-5884
kind: normative-requirement
summary: BFD Control packets sent by the ingress LSR MUST be encapsulated in the MPLS label stack corresponding to the FEC under test. The packet MUST be a UDP packet with destination port 3784 and the IP TTL or hop limit MUST be set to 1.
section: "7"
rfc2119_level: MUST
