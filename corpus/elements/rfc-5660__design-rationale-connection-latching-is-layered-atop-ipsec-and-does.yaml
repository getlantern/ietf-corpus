document: rfc-5660
kind: design-rationale
summary: Connection latching is layered atop IPsec and does not modify the underlying IPsec architecture; the feature that allows concurrent SAs with overlapping traffic selectors remains, and it is up to transport protocols and applications to decide whether and how to respond to conflicts.
section: "6.1"
topics:
