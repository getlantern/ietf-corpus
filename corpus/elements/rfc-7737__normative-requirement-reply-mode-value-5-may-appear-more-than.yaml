document: rfc-7737
kind: normative-requirement
summary: Reply Mode value 5 MAY appear more than once in the Reply Mode Order TLV, but each instance MUST have a corresponding Reply Path TLV. Three instances of value 5 require three Reply Path TLVs.
section: "3.2"
rfc2119_level: MUST
