document: rfc-5607
kind: design-rationale
summary: Management-Privilege-Level (136) is RECOMMENDED for use only with Service-Type NAS-Prompt (7), not Administrative (6). Using it with Administrative may require decreasing the maximum privilege level, which is counterintuitive; it is also NOT RECOMMENDED to combine it with Management-Policy-Id due to undefined overlay behavior.
section: "6.4"
topics:
    - radius
