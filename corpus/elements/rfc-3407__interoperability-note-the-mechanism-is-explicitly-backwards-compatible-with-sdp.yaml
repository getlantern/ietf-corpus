document: rfc-3407
kind: interoperability-note
summary: 'The mechanism is explicitly backwards compatible with SDP: capability declarations are carried as standard SDP attributes and do not alter the semantics of ''m='' lines or other existing SDP fields. An endpoint not understanding simcap attributes will simply ignore them.'
