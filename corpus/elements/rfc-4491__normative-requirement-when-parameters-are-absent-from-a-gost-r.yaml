document: rfc-4491
kind: normative-requirement
summary: When parameters are absent from a GOST R 34.10-94 or GOST R 34.10-2001 AlgorithmIdentifier, they are inherited per RFC 3280 Section 6.1. When working_public_key_parameters is null, the certificate and any verifiable signature SHALL be rejected.
