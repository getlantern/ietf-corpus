document: rfc-6719
kind: design-rationale
summary: MRHOF cannot be directly used for metric maximization, but a maximization problem can be converted to minimization if a fixed best-case metric value exists and all metric values are negative (e.g., using the logarithm of link reliability). MRHOF is not required to work with such converted metrics.
