document: rfc-3146
kind: normative-requirement
summary: The unicast_FIFO field in the Link-layer Address option MUST specify the 48-bit offset of the node's FIFO for IPv6 datagrams, and this offset MUST NOT change except as the result of a power reset.
section: "8"
rfc2119_level: MUST NOT
