document: rfc-5672
kind: normative-requirement
summary: If the key record contains the "s" flag in the t= tag, the domain of the AUID (i= tag) MUST be the same as that of the SDID (d= domain). If the flag is absent, the domain of the AUID MUST be the same as, or a subdomain of, the SDID.
section: "11"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
