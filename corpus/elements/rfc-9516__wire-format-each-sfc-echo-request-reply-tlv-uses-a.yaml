document: rfc-9516
kind: wire-format
summary: Each SFC Echo Request/Reply TLV uses a 1-octet Type field, 1-octet Reserved field (MUST be zeroed on transmission), 2-octet Length field (length of Value in octets), and a variable-length Value field. Sub-TLVs may be nested within the Value field of an outer TLV.
