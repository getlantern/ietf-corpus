document: rfc-4877
kind: normative-requirement
summary: When PKI-based authentication is used and the mobile node presents its home address in the IDi payload, the home agent MUST verify that the home address matches the address in an iPAddress field in the SubjectAltName extension of the certificate.
section: "7.3"
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
    - mobility
    - security
