document: rfc-5666
kind: normative-requirement
summary: The RPC client MUST NOT send unacknowledged requests in excess of the granted RPC server credit limit. If the limit is exceeded, the RDMA layer may signal an error and possibly terminate the connection.
section: "3.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
