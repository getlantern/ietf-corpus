document: rfc-8201
kind: interoperability-note
summary: Path MTU Discovery must be performed even when a node believes a destination is on the same link, because a neighboring router acting as a proxy may make a multi-hop destination appear directly connected, and the actual PMTU may be lower than the link MTU.
