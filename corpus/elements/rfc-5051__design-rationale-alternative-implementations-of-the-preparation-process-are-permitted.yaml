document: rfc-5051
kind: design-rationale
summary: Alternative implementations of the preparation process are permitted if they produce the same results. For example, converting all input to UTF-16 or UTF-32 prior to step (2) is acceptable, and UTF-32 may be used as an alternative to UTF-8 in step (3) if all strings are Unicode.
