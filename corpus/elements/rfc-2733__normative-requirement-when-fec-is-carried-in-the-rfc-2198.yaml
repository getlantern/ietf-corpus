document: rfc-2733
kind: normative-requirement
summary: When FEC is carried in the RFC 2198 redundant encodings format, an rtpmap attribute MUST be used for the dynamic FEC payload type, and the FEC MUST protect only the main codec; the fmtp attribute for the FEC MUST NOT be present in this case.
section: "11.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
