document: rfc-4372
kind: normative-requirement
summary: To prevent a man-in-the-middle from stripping the CUI from an Access-Request (a denial-of-service vector), the NAS SHOULD include a Message-Authenticator(80) attribute within Access-Request packets that contain a CUI attribute.
section: "6"
rfc2119_level: SHOULD
topics:
    - radius
    - security
