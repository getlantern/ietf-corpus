document: rfc-6951
kind: normative-requirement
summary: For legacy NAT traversal with single-homed associations, IP addresses MUST NOT be listed in the INIT and INIT-ACK chunks. To use multiple addresses, RFC 5061 MUST be used only with wildcard addresses in ASCONF chunks in combination with RFC 4895.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - sctp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
