document: rfc-5459
kind: wire-format
summary: When a SID is appended to actual audio frames, the FT value in the payload header reflects the audio encoding rate, not the SID. The SID is identified as the remaining bytes after all complete audio frames, and its size (2, 3, or 6 octets) is inferred from payload length.
