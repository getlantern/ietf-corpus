document: rfc-1493
kind: normative-requirement
summary: A bridge implementing this MIB is assumed to also implement at least the 'system' group and the 'interfaces' group from MIB-II. Bridge MIB counters apply only to the subset of interface data for protocols being bridged, not all traffic on the interface.
section: "3.2"
rfc2119_level: MUST
