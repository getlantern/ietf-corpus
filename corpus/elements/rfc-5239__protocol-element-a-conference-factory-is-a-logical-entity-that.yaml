document: rfc-5239
kind: protocol-element
summary: A conference factory is a logical entity that generates unique URIs identifying a conference focus. The conference identifier (conference ID) is a call-signaling-protocol-specific URI that identifies a specific conference focus and its associated conference instance; it is protocol-specific (e.g., SIP URI, ISUP address).
