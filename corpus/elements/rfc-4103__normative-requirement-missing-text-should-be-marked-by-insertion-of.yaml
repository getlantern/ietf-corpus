document: rfc-4103
kind: normative-requirement
summary: Missing text SHOULD be marked by insertion of a missing text marker in the received stream for each missing T140block, as specified in ITU-T T.140 Addendum 1. Packet loss is detected by observing gaps in RTP sequence numbers.
section: "5.3"
rfc2119_level: SHOULD
topics:
