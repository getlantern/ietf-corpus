document: rfc-7231
kind: protocol-element
summary: The Content-Location header field references a URI that can be used as an identifier for a specific resource corresponding to the payload. In a 2xx response, if Content-Location matches the effective request URI, the recipient MAY treat the payload as a current representation of that resource.
section: 3.1.4.2
topics:
    - http
