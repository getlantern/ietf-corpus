document: rfc-5213
kind: protocol-element
summary: The Link-local Address option carries the link-local address of the MAG on the point-to-point link shared with the mobile node. If ALL_ZERO is sent in the PBU, the LMA generates the link-local address and returns it in the PBA for the MAG to use on the access link.
section: "8.7"
topics:
    - mobility
