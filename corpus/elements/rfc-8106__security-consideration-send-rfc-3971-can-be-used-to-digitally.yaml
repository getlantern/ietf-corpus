document: rfc-8106
kind: security-consideration
summary: SEND (RFC 3971) can be used to digitally sign RA messages including RDNSS and DNSSL options. Network devices SHOULD block rogue RA messages from unauthorized nodes using RA Guard techniques (RFC 6104, RFC 6105).
section: "7.2"
topics:
