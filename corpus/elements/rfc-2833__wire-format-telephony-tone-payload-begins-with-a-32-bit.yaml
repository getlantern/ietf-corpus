document: rfc-2833
kind: wire-format
summary: 'Telephony tone payload begins with a 32-bit header: modulation frequency (9 bits), T bit (divide modulation by 3), volume (6 bits), and duration (16 bits). This is followed by pairs of 16-bit frequency entries each consisting of 4 reserved bits and a 12-bit frequency value in Hz; any number of frequencies may be included.'
section: "4.4"
