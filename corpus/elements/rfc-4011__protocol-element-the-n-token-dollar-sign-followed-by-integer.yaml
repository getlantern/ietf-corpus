document: rfc-4011
kind: protocol-element
summary: The '$n' token (dollar sign followed by integer 0-128) in SNMP OID string arguments is expanded at execution time to the nth subidentifier of the index of the current element. The special token '$*' expands to all subidentifiers separated by dots. Using a token beyond the index length is an RTE.
section: "6"
topics:
