document: rfc-2419
kind: interoperability-note
summary: Because DESE adds a 2-byte sequence number and up to 8 bytes of padding, the effective payload size increases relative to the negotiated MRU. Negotiation of DESE does not automatically increase the MRU value, so implementations must account for this growth.
