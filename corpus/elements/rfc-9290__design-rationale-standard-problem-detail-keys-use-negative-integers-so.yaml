document: rfc-9290
kind: design-rationale
summary: Standard Problem Detail keys use negative integers so they can never conflict with Custom Problem Detail keys, which use unsigned integers or URIs. This partitioning ensures a global namespace for standard entries without collisions from application-specific extensions.
section: "3.1"
