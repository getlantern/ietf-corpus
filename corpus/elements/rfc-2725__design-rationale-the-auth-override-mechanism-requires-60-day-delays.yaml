document: rfc-2725
kind: design-rationale
summary: The auth-override mechanism requires 60-day delays and notifies the maintainer so that a legitimate maintainer who is merely slow to respond can remove the override before it takes effect, reducing the risk of unauthorized takeover while still enabling recovery from truly unresponsive maintainers.
section: C.3
topics:
    - routing
    - registry
    - security
