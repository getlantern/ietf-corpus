document: rfc-5762
kind: security-consideration
summary: DCCP partial checksums SHOULD NOT be used in conjunction with SRTP authentication. Message authentication codes cannot tolerate bit errors in the payload, and SRTP profiles require authentication for security even when using AES counter mode.
section: "6"
topics:
