document: rfc-9540
kind: protocol-element
summary: The "ohttp" SvcParamKey is used in SVCB and HTTPS DNS resource records to indicate that a service can be accessed as an Oblivious HTTP target via an associated gateway. Both the presentation and wire-format values for the parameter MUST be empty.
