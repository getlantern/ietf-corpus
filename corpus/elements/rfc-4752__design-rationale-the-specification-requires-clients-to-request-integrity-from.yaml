document: rfc-4752
kind: design-rationale
summary: The specification requires clients to request integrity from GSS_Init_sec_context (upgrading from RFC 2222/RFC 2078 behavior) so that the security layer negotiation can be wrapped with GSS_Wrap, satisfying RFC 4422's requirement that security layer negotiation be integrity-protected.
