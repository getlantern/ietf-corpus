document: rfc-5198
kind: normative-requirement
summary: If the protocol has the concept of 'lines', line-endings MUST be indicated by the sequence CR (U+000D) followed by LF (U+000A). CR SHOULD NOT appear except when followed by LF.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
