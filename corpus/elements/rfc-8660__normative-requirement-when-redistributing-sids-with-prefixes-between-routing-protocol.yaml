document: rfc-8660
kind: normative-requirement
summary: When redistributing SIDs with prefixes between routing protocol instances with different SRGBs, the index MUST NOT be redistributed. If the receiving instance chooses to advertise an index, it MUST allocate a fresh index relative to its own SRGB and compute the local label accordingly.
section: 2.5.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
