document: rfc-9127
kind: interoperability-note
summary: The YANG modules conform to NMDA (RFC 8342), meaning configuration and operational state data are not separated into distinct top-level or sibling containers. The same nodes carry both 'rw' (config) and 'ro' (state) leaves.
