document: rfc-2159
kind: normative-requirement
summary: When converting from G3Fax to X.400, trailing EOLs MUST NOT be removed, since the X.400 Implementor Guide recommends that each page should end with 6 consecutive EOLs. This is a change from RFC 1494.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
