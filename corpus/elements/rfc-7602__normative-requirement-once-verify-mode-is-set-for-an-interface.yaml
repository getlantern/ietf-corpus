document: rfc-7602
kind: normative-requirement
summary: Once 'verify' mode is set for an interface, all IIH PDUs and SNPs sent on that interface MUST contain the ESN TLV; any such PDU received without an ESN TLV MUST be discarded.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - security
