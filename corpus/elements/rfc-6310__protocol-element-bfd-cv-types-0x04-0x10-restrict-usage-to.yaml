document: rfc-6310
kind: protocol-element
summary: 'BFD CV types 0x04/0x10 restrict usage to four diagnostic codes: 0 (no diagnostic — correctly receiving), 1 (control detection time expired — stopped receiving), 3 (neighbor signaled session down), and 7 (administratively down). CV types 0x08/0x20 additionally use codes 6 (Concatenated Path Down) and 8 (Reverse Concatenated Path Down) to signal AC and forwarding defects without requiring the BFD session itself to go down.'
section: 6.1.3
topics:
    - mpls
