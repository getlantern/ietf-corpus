document: rfc-7345
kind: normative-requirement
summary: The offerer SHOULD assign the SDP 'setup' attribute a value of 'actpass' by default; it MUST NOT assign 'holdconn'. If 'actpass' or 'passive' is assigned, the offerer MUST be prepared to receive a DTLS ClientHello before receiving the SDP answer.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - tls
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
