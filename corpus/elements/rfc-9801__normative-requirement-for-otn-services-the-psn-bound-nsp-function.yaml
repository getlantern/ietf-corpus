document: rfc-9801
kind: normative-requirement
summary: For OTN services, the PSN-bound NSP function MUST terminate the FEC and replace the OTUk overhead in row 1, columns 8–14 with an all-zeros pattern, producing an extended ODUk frame. The frame alignment overhead (row 1, columns 1–7) is kept as-is.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
