document: rfc-9779
kind: design-rationale
summary: For ECMP delay measurement on SR-MPLS Policies, different entropy label values (per RFC 6790) are used in query and response messages to influence the ECMP path taken via the forwarding plane's hashing function, enabling per-ECMP-path delay measurement without modifying the SR label stack.
