document: rfc-9203
kind: normative-requirement
summary: If ace_client_recipientid equals ace_server_recipientid, the client MUST stop the exchange and MUST NOT derive the security context, since Sender and Recipient Keys would be equal. The client MAY restart the exchange.
section: "4.3"
rfc2119_level: MUST NOT
topics:
