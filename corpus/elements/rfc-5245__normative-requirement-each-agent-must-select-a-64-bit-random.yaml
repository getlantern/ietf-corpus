document: rfc-5245
kind: normative-requirement
summary: Each agent MUST select a 64-bit random tie-breaker value uniformly distributed between 0 and 2^64-1. This value is used in ICE-CONTROLLED and ICE-CONTROLLING STUN attributes to detect and resolve role conflicts when both agents mistakenly believe they have the same role.
section: "5.2"
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
