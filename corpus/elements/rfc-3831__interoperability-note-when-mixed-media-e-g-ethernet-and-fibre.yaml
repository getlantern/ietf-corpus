document: rfc-3831
kind: interoperability-note
summary: When mixed media (e.g., Ethernet and Fibre Channel) are bridged together, the smallest MTU of all media must be advertised by routers in MTU options; if no routers are present, each node connected to higher-MTU media must be manually configured.
