document: rfc-6551
kind: protocol-element
summary: The Latency object (type 5) carries one or more 4-byte sub-objects each encoding latency as a 32-bit unsigned integer in microseconds. It may be used as a maximum-latency constraint or as an aggregated additive path metric reflecting cumulative path latency.
section: "4.2"
