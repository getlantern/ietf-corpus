document: rfc-9015
kind: design-rationale
summary: 'An SFIR-RD value of zero in an SFT TLV''s SFIR-RD list has the special meaning of ''open choice'': any SFIR in the overlay with the correct SFT and RT is relevant. This avoids enumerating all SFIs in the SFPR while still constraining selection to the correct SFT.'
