document: rfc-2205
kind: interoperability-note
summary: RSVP operates correctly through non-RSVP clouds by relying on standard IP routing for Path messages. A Path message traversing a non-RSVP cloud carries the IP address of the last RSVP-capable router before the cloud; the following RSVP node forwards Resv messages directly back to that address, skipping the non-RSVP segment.
section: "2.9"
topics:
    - qos
    - realtime
