document: rfc-5961
kind: security-consideration
summary: The mitigations in this document do NOT protect against on-path (man-in-the-middle) attacks; they only raise the bar for off-path blind attacks. Full protection against both on- and off-path attacks requires IPsec AH (RFC 4302) or IPsec ESP (RFC 4303).
section: "10"
topics:
