document: rfc-5676
kind: design-rationale
summary: A separate SYSLOG notification log (syslogMsgTable) is provided alongside the generic NOTIFICATION-LOG-MIB because SYSLOG messages may not always generate SNMP notifications, and SNMP notifications may not carry all SYSLOG structured data — making a SYSLOG-specific log necessary.
section: "5"
topics:
