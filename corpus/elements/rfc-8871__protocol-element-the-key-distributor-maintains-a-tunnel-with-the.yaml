document: rfc-8871
kind: protocol-element
summary: The Key Distributor maintains a tunnel with the Media Distributor (e.g., via the PERC-DTLS tunnel protocol) that enables the Media Distributor to relay DTLS packets between endpoints and the Key Distributor, while the Key Distributor securely delivers HBH key information back to the Media Distributor over the same tunnel.
