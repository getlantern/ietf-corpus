document: rfc-5304
kind: security-consideration
summary: The HMAC-MD5 mechanism does not prevent replay attacks; however, in most cases such attacks would trigger existing IS-IS protocol mechanisms that effectively reject old information. The mechanism provides improved security against passive attacks compared to cleartext password authentication.
section: "3.1"
topics:
