document: rfc-6072
kind: security-consideration
summary: Private keys SHOULD NOT be stored in the clear on devices or servers. It is RECOMMENDED to encrypt them using tamper-resistant hardware, decrypting only during signing operations and re-encrypting immediately to limit RAM exposure.
section: "10.7"
topics:
    - security
    - crypto
