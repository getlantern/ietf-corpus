document: rfc-8000
kind: normative-requirement
summary: The RPCSEC_GSS GSS-API security mechanism used in a multi-domain namespace is REQUIRED to employ a method of cross NFSv4 Domain trust so that a principal from one domain can be authenticated in another domain using the same security mechanism.
section: "6.2"
rfc2119_level: REQUIRED
topics:
