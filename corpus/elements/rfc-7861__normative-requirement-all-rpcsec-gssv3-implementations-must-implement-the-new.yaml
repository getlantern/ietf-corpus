document: rfc-7861
kind: normative-requirement
summary: All RPCSEC_GSSv3 implementations MUST implement the new RPCSEC_GSS version number, the new reply verifier, and the new auth_stat values. There is no RPCSEC_GSS_CREATE payload that is REQUIRED; the protocol is feature-driven beyond these mandatory items.
section: "1.2"
rfc2119_level: MUST
topics:
