document: rfc-2518
kind: normative-requirement
summary: MKCOL MUST fail if the resource identified by the Request-URI is non-null. All ancestors MUST already exist, or the method MUST fail with a 409 (Conflict) status code. During MKCOL processing, a server MUST make the Request-URI a member of its parent collection.
section: 8.3.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
