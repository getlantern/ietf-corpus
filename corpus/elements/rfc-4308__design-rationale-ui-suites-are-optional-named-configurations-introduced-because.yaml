document: rfc-4308
kind: design-rationale
summary: UI suites are optional named configurations introduced because implementation experience showed that the large number of algorithm choices in IPsec made it difficult for administrators to achieve interoperability without careful pre-agreement. A small number of named suites covering typical security policies simplifies administration.
