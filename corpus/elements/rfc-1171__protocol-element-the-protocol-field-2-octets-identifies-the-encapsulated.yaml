document: rfc-1171
kind: protocol-element
summary: The Protocol field (2 octets) identifies the encapsulated network-layer protocol. Values in the 0xxx range identify network protocols (e.g., 0x0021 = IP), 8xxx range identifies NCPs (e.g., 0x8021 = IPCP), and cxxx range identifies LCP or associated protocols (e.g., 0xc021 = LCP).
section: "3.1"
