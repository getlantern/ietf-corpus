document: rfc-1247
kind: protocol-element
summary: Virtual links are configured between two backbone routers sharing a common non-backbone transit area. They behave as unnumbered point-to-point backbone links; their costs equal the intra-area distance between endpoints and use intra-area routing of the transit area to forward packets.
section: "3.1"
topics:
    - routing
