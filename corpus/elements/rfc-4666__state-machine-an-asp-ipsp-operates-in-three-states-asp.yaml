document: rfc-4666
kind: state-machine
summary: 'An ASP/IPSP operates in three states: ASP-Down (SCTP association absent or ASP not activated), ASP-Inactive (SCTP association established and ASP Up exchanged, but not processing traffic), and ASP-Active (processing traffic for one or more Application Servers). Transitions are triggered by ASP Up/Down/Active/Inactive messages and their acknowledgements, or by loss of the SCTP association.'
section: 4.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
