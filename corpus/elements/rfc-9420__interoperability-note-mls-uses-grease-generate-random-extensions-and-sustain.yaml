document: rfc-9420
kind: interoperability-note
summary: MLS uses GREASE (Generate Random Extensions And Sustain Extensibility) by having senders insert random values into extensible fields. Receivers are required to ignore unknown values in capabilities, extension types, proposal types, and credential types. GREASE values are registered in the appropriate IANA registries.
section: "13.5"
topics:
