document: rfc-2494
kind: normative-requirement
summary: Only the ifGeneralInformationGroup and ifCounterDiscontinuityGroup from RFC 2233 need to be supported for DS0 and DS0Bundle interfaces. The ifLinkUpDownTrapEnable must be set to disabled(2) with read-only access, and ifConnectorPresent must be set to false(2).
section: "2.2"
rfc2119_level: MUST
