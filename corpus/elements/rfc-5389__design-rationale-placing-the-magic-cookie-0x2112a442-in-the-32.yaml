document: rfc-5389
kind: design-rationale
summary: Placing the magic cookie 0x2112A442 in the 32 bits formerly used as part of RFC 3489's 128-bit transaction ID achieves backwards-compatible detection of RFC 5389 clients without changing the overall message structure, allowing servers to infer support for XOR-MAPPED-ADDRESS and other new attributes.
