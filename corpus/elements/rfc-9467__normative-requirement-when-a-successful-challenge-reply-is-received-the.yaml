document: rfc-9467
kind: normative-requirement
summary: When a successful Challenge Reply is received, the Index from the PC TLV MUST be stored in the neighbour table Index field, and the PC from the TLV MUST be stored in both the PCm and PCu fields of the neighbour table entry.
