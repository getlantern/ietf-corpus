document: rfc-2459
kind: normative-requirement
summary: 'When subjectAltName contains an iPAddress it MUST be stored in network byte order: exactly 4 octets for IPv4 (RFC 791) or exactly 16 octets for IPv6 (RFC 1883). DNS names MUST use preferred name syntax per RFC 1034 as IA5String in dNSName; email addresses MUST use rfc822Name.'
section: 4.2.1.7
rfc2119_level: MUST
topics:
    - pkix
    - ip
