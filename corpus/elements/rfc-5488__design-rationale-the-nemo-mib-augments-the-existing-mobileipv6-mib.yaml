document: rfc-5488
kind: design-rationale
summary: The NEMO MIB augments the existing MOBILEIPV6-MIB tables (via AUGMENTS) rather than redefining them, because a mobile router may also function as a mobile node. This avoids duplication and allows a single entity to be managed through both MIBs simultaneously.
