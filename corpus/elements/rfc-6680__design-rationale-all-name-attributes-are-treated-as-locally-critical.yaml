document: rfc-6680
kind: design-rationale
summary: 'All name attributes are treated as locally critical: the mechanism(s) must understand them. This is required because name attributes necessarily have semantics the mechanism must act upon (including transporting application-specific attributes to peers), even though there is no protocol provision guaranteeing that remote peers understand any given attribute.'
section: "7.6"
topics:
    - security
