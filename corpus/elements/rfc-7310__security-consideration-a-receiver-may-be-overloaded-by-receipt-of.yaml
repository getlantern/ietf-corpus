document: rfc-7310
kind: security-consideration
summary: A receiver may be overloaded by receipt of too many packets (desired or undesired). Network-layer authentication may be used to discard packets from undesired sources, though the processing cost of authentication itself may be prohibitive. Multicast source pruning via IGMP is a potential future mitigation.
section: "8"
topics:
