document: rfc-9719
kind: protocol-element
summary: 'The error-set YANG notification carries two sub-trees: tie-level-error (listing TIEs with level inconsistencies per RIFT instance) and neighbor-error (listing neighbors with errors per interface). Per Section 2.6, implementations should notify on unexpected TIE and neighbor layer errors.'
section: "2.6"
