kind: wire-format
summary: For 5.1 audio (six channels, 24-bit Enhanced apt-X at 48 kHz, 4 ms interval), each RTP packet contains 864 bytes of encoded data comprising 48 coded samples per channel. Each 24-bit sample is packed as MSB, Middle Byte, LSB in sequence.
