document: rfc-6577
kind: interoperability-note
summary: The update to replace 'hardfail' with 'fail' for SPF authentication results also applies to Sender-ID (RFC 4406), since Sender-ID reuses SPF result codes. Implementations processing Authentication-Results headers for either mechanism should treat 'fail' as the canonical result name going forward.
section: "4.2"
topics:
    - email
