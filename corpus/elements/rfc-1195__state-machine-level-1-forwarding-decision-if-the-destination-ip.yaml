document: rfc-1195
kind: state-machine
summary: 'Level 1 forwarding decision: if the destination IP address matches an [IP address, subnet mask] reachable within the area, route via Level 1; otherwise forward to the nearest attached Level 2 router. An unattached Level 2 router sets the ''not attached'' flag in its Level 1 LSPs so Level 1 routers bypass it.'
section: 3.10.1
topics:
