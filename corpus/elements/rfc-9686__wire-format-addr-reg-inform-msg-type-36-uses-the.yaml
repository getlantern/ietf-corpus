document: rfc-9686
kind: wire-format
summary: 'ADDR-REG-INFORM (msg-type 36) uses the standard DHCPv6 message format: 1-byte msg-type, 3-byte transaction-id, followed by variable-length options. It MUST carry a Client Identifier option and exactly one IA Address option containing the address being registered.'
section: "4.2"
