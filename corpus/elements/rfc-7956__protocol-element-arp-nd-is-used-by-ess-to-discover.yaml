document: rfc-7956
kind: protocol-element
summary: ARP/ND is used by ESs to discover the gateway MAC of their local edge RBridge. The edge RBridge responds to ARP/ND requests for the gateway IP with its gateway MAC, simultaneously learning the ES's IP-to-MAC mapping and generating local IP routing entries in the tenant VRF.
section: "5.1"
topics:
