document: rfc-5264
kind: design-rationale
summary: The partial PIDF format (RFC 5262) contains a 'version' attribute that could serve for versioning, but the RFC deliberately chose not to introduce an additional versioning mechanism. Using both entity-tags (from RFC 3903) and the PIDF version attribute would add ambiguity and a potentially undefined error case if the two mechanisms contradicted each other.
section: "3.2"
topics:
    - sip
    - realtime
