document: rfc-7296
kind: security-consideration
summary: Implementations MUST rate-limit actions triggered by unprotected IKE messages and MUST NOT act on ICMP or unprotected Notify messages when deciding whether a peer has failed, as these can be trivially forged by an on-path attacker.
section: "2.4"
topics:
    - ipsec
    - vpn
    - security
