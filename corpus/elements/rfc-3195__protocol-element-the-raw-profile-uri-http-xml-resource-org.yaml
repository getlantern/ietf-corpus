document: rfc-3195
kind: protocol-element
summary: 'The RAW profile (URI: http://xml.resource.org/profiles/syslog/RAW) carries syslog messages in the existing UDP format over BEEP. The listener sends the first MSG (which may be empty), and the initiator replies with ANS messages carrying syslog entries; a NUL reply indicates completion.'
