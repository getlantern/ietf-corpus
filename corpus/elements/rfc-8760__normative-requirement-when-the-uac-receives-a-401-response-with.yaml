document: rfc-8760
kind: normative-requirement
summary: When the UAC receives a 401 response with multiple WWW-Authenticate header fields with different realms, it SHOULD retry and add an Authorization header field containing credentials that match the topmost header field of any of the realms unless a local policy dictates otherwise.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
