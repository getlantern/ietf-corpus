document: rfc-2380
kind: normative-requirement
summary: Implementations MUST NOT normally send more than one copy of a particular data packet to a particular next-hop (ATM end-point). Some transient duplicate transmission is acceptable only during VC setup and transition.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - multicast
    - qos
