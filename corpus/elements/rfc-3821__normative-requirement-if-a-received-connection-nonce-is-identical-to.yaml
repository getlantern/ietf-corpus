document: rfc-3821
kind: normative-requirement
summary: If a received Connection Nonce is identical to the most recently received nonce from the same IP Address, or if a duplicate FSF is received during FCIP Link formation, the FCIP Entity SHALL close the TCP Connection to prevent replay attacks.
section: 8.1.3
rfc2119_level: REQUIRED
topics:
    - tcp
    - security
