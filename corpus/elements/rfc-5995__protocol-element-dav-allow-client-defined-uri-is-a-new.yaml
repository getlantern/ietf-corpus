document: rfc-5995
kind: protocol-element
summary: 'DAV:allow-client-defined-URI is a new precondition name that servers use to inform clients that the collection does not allow client-specified URIs for new members. Its XML content model is: <!ELEMENT allow-client-defined-uri (add-member?)>, optionally embedding the Add-Member URI.'
section: "4.1"
topics:
    - http
