document: rfc-8519
kind: normative-requirement
summary: In the port-range-or-operator grouping, when a range case is used, the lower-port MUST be less than or equal to the upper-port. This is enforced with a YANG 'must' statement that generates an error-message on violation.
section: "4.2"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - tcp
    - udp
