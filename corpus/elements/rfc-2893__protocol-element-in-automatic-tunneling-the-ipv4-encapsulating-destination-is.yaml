document: rfc-2893
kind: protocol-element
summary: In automatic tunneling, the IPv4 encapsulating destination is the low-order 32 bits of the IPv4-compatible IPv6 destination address. A static routing entry for 0:0:0:0:0:0/96 directs all IPv4-compatible destinations to a pseudo-interface driver that performs automatic encapsulation, requiring no per-tunnel configuration.
section: "5.3"
topics:
    - ip
    - v6ops
