document: rfc-3986
kind: design-rationale
summary: URI syntax uses a limited character set (letters, digits, and a few special characters) to support global transcription—the ability to write a URI on a napkin and accurately enter it on any keyboard. The ability to transcribe an identifier from one medium to another was considered more important than allowing maximally meaningful or locale-specific component names.
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
