document: rfc-9346
kind: wire-format
summary: The Remote AS Number sub-TLV (type 24) is 4 octets in length and carries the AS number of the neighboring AS. When only 2 octets are used for the AS number, the high-order 2 octets MUST be set to 0.
section: 3.4.1
topics:
