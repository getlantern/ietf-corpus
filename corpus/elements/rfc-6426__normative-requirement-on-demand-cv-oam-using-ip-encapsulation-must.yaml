document: rfc-6426
kind: normative-requirement
summary: On-demand CV OAM using IP encapsulation MUST be supported for MPLS-TP LSPs when IP addressing is in use. The echo response MUST be sent on the reverse path of the LSP, and the reply MUST contain IP/UDP headers followed by the on-demand CV payload.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
