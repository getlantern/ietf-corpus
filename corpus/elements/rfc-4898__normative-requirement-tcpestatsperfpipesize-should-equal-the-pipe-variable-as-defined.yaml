document: rfc-4898
kind: normative-requirement
summary: tcpEStatsPerfPipeSize SHOULD equal the 'pipe' variable as defined in RFC 3517 when that algorithm is implemented. If RFC 3517 is not implemented, the in-flight data octets SHOULD be estimated as SND.NXT minus SND.UNA adjusted by retransmit and dupack counts.
section: "4"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
