document: rfc-8086
kind: protocol-element
summary: The UDP source port field carries a 16-bit entropy value generated by the encapsulator to identify a flow. The value SHOULD be within the ephemeral port range 49152–65535, providing 14 bits of entropy for inner flow identification.
