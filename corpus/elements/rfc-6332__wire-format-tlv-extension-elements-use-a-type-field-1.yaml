document: rfc-6332
kind: wire-format
summary: TLV extension elements use a Type field (1 octet), a Reserved field (1 octet), a Length field (2 octets indicating value length in octets excluding Type, Reserved, and Length), and a variable-length Value. TLV elements not on a 32-bit boundary MUST be padded with zero bits.
section: "4.2"
topics:
    - rtp
    - multicast
    - realtime
