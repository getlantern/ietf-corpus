document: rfc-1122
kind: normative-requirement
summary: Every Internet host connected to a 10 Mbps Ethernet MUST send and receive RFC-894 encapsulation and SHOULD receive RFC-1042 encapsulation. If a host sends both formats, it MUST provide a configuration switch defaulting to RFC-894. A host MUST NOT send IEEE 802 packets using the K1=6 protocol identifier.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
