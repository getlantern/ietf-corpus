document: rfc-7162
kind: interoperability-note
summary: The presence of the QRESYNC capability implies support for CONDSTORE even if CONDSTORE is not separately advertised. 'ENABLE QRESYNC' and 'ENABLE QRESYNC CONDSTORE' are equivalent and both CONDSTORE enabling commands. Servers SHOULD advertise CONDSTORE in addition to QRESYNC for compatibility with CONDSTORE-only clients.
section: 3.2.2
topics:
