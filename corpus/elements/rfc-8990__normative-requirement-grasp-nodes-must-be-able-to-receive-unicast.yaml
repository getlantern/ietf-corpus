document: rfc-8990
kind: normative-requirement
summary: GRASP nodes MUST be able to receive unicast messages of at least GRASP_DEF_MAX_SIZE (2048) bytes and MUST NOT send unicast messages longer than GRASP_DEF_MAX_SIZE bytes unless a longer size is explicitly allowed for the objective concerned, for example via prior GRASP negotiation.
section: 2.8.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
