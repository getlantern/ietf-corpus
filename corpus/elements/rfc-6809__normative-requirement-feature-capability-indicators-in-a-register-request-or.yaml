document: rfc-6809
kind: normative-requirement
summary: Feature-capability indicators in a REGISTER request or response apply only for the duration of the registration of the contact explicitly conveyed in that REGISTER request. SIP entities MUST NOT insert a Feature-Caps header field in pure registration binding fetching messages (REGISTER without a Contact header field).
section: 4.3.3
rfc2119_level: MUST NOT
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
