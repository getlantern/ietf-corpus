document: rfc-4233
kind: security-consideration
summary: IUA relies on SCTP's built-in security mechanisms including resistance to flooding and masquerade attacks. Use of SCTP is recommended over TCP partly for these security properties; TCP MAY be used only in scenarios without redundancy requirements or where redundancy is handled below the transport layer.
section: "6"
topics:
    - security
    - sctp
