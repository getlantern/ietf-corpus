document: rfc-3878
kind: normative-requirement
summary: Setting arcRowStatus to 'destroy' removes the ARC setting and resumes normal alarm reporting for the resource and alarm type. Only arcState, arcNalmTimeRemaining, and arcRowStatus can be updated when a row is active. All objects except arcNalmTimeRemaining must be set before a row can be activated.
section: "5"
rfc2119_level: MUST
topics:
