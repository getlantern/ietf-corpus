document: rfc-8305
kind: interoperability-note
summary: A simple implementation of RFC 8305 remains compliant with the predecessor RFC 6555. RFC 8305 adds handling for multiple addresses per family, DNS updates during racing, historical RTT leverage, and NAT64/DNS64 support — none of which were addressed by RFC 6555.
