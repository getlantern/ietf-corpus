document: rfc-1521
kind: normative-requirement
summary: A subtype specification in Content-Type is MANDATORY — there are no default subtypes. New top-level content types may only be defined by an extension to the standard; experimental or private types must begin with 'X-'.
section: "4"
rfc2119_level: REQUIRED
