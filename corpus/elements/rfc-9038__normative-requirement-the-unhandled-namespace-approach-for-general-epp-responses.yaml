document: rfc-9038
kind: normative-requirement
summary: The unhandled namespace approach for general EPP responses SHOULD only apply to command-response extensions, since the server SHOULD NOT accept an object-level EPP command if the client did not include the object-level namespace URI in login services.
section: "5"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
