document: rfc-9873
kind: privacy-consideration
summary: The content of <addlEmail:email> elements must be processed in the same way as <contact:email> elements, including potential publication in RDAP directory services. Many data protection regulations classify email addresses as personal data, so all policies governing collection, transmission, and processing of contact information MUST apply equally to additional email addresses.
section: "9"
topics:
    - email
    - privacy
