document: rfc-8613
kind: normative-requirement
summary: Applications supporting both OSCORE and Block-wise transfers MUST specify a MAX_UNFRAGMENTED_SIZE security policy. Messages exceeding this size SHOULD be fragmented by the sending endpoint using Inner Block options rather than relying on unprotected Outer Block options.
section: 4.1.3.4.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
