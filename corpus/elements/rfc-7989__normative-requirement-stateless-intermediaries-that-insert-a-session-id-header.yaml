document: rfc-7989
kind: normative-requirement
summary: 'Stateless intermediaries that insert a Session-ID header on behalf of an endpoint MUST use version 5 UUIDs. If the tag value for the endpoint is unknown (e.g., a new INVITE without a To: tag), the intermediary MUST NOT attempt to generate a UUID for that endpoint.'
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
