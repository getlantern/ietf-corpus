document: rfc-6857
kind: normative-requirement
summary: For the Received header field, perform Domain downgrading for U-labels and Comment downgrading for non-ASCII comments. After those steps, if the FOR clause contains a non-ASCII local-part, remove the FOR clause; if the ID clause contains a non-ASCII value, remove the ID clause.
section: 3.2.4
rfc2119_level: REQUIRED
topics:
    - email
