document: rfc-8920
kind: security-consideration
summary: In deployments where potential attackers may have access to networks within the OSPF routing domain, stronger authentication mechanisms such as those in RFC 5709 (OSPFv2 HMAC-SHA), RFC 7474, RFC 4552 (OSPFv3 auth/confidentiality), or RFC 7166 SHOULD be used.
