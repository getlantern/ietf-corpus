document: rfc-8611
kind: security-consideration
summary: To prevent leakage of diagnostic information to untrusted users, a responder LSR MUST only accept MPLS echo request messages from designated trusted sources by filtering the source IP address field; however, source IP address filtering provides only a weak form of access control.
section: "12"
rfc2119_level: MUST
topics:
    - mpls
    - security
