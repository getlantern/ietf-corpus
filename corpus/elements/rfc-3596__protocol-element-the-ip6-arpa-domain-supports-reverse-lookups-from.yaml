document: rfc-3596
kind: protocol-element
summary: The IP6.ARPA domain supports reverse lookups from an IPv6 address to a host name. An IPv6 address is represented as a sequence of nibbles separated by dots in reverse order with the suffix ".IP6.ARPA".
