document: rfc-2513
kind: wire-format
summary: 'DataCollectionList is an OCTET STRING (SIZE 0..8) bit-field: data items 1–8 occupy the first octet with item 1 at the MSB; a set bit means the item is included. If the OCTET STRING is too short to represent an item, that item is absent from the set.'
