document: rfc-7977
kind: protocol-element
summary: An MSRP WebSocket Client is an MSRP entity capable of opening outbound connections to MSRP relays that are WebSocket servers and communicating using the WebSocket MSRP subprotocol. An MSRP WebSocket Server is an MSRP relay capable of listening for inbound connections from WebSocket clients.
section: "2.1"
topics:
    - websocket
    - realtime
