document: rfc-1759
kind: wire-format
summary: 'The CodedCharSet textual convention uses INTEGER values divided into three regions: 3-999 for standard character sets (MIBenum from IANA), 1000-1999 for Unicode/ISO 10646 subsets, and 2000+ for vendor-specific sets. The value ''other(1)'' is used when the set is not enumerated.'
