document: rfc-9002
kind: normative-requirement
summary: Endpoints SHOULD use an initial congestion window of ten times the maximum datagram size, limited to the larger of 14,720 bytes or twice the maximum datagram size, per RFC 6928 with the byte limit increased to account for UDP's 8-byte versus TCP's 20-byte overhead.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - quic
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
