document: rfc-2427
kind: security-consideration
summary: ARP and RARP are used without authentication, making Frame Relay networks subject to the same known ARP security issues as other networks, including host impersonation. No additional security mechanisms have been added to ARP or RARP for use with Frame Relay.
section: "10"
topics:
    - security
