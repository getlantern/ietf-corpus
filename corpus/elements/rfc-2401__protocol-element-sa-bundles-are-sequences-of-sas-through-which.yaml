document: rfc-2401
kind: protocol-element
summary: 'SA bundles are sequences of SAs through which traffic must be processed to satisfy a security policy requiring a combination of services not achievable with a single SA. Two combination approaches are defined: transport adjacency (multiple protocols without tunneling) and iterated tunneling (multiple layers via IP tunneling).'
section: "4.3"
topics:
