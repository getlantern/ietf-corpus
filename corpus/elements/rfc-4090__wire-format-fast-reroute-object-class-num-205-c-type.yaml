document: rfc-4090
kind: wire-format
summary: 'FAST_REROUTE object (Class-Num 205, C-Type 1): 20 bytes total, containing Setup Priority (1 byte), Hold Priority (1 byte), Hop-limit (1 byte), Flags (1 byte, 0x01=one-to-one desired, 0x02=facility backup desired), Bandwidth (4-byte IEEE float, bytes/sec), Include-any (4 bytes), Exclude-any (4 bytes), Include-all (4 bytes). High-order bits of Class-Num are 11, causing unknown nodes to ignore and forward unchanged.'
section: "4.1"
topics:
