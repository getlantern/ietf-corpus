document: rfc-5549
kind: normative-requirement
summary: A BGP speaker MUST only advertise IPv4 or VPN-IPv4 NLRI with an IPv6 Next Hop if it has first ascertained via BGP Capability Advertisement that the peer supports the Extended Next Hop Encoding capability for the relevant AFI/SAFI pair.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
