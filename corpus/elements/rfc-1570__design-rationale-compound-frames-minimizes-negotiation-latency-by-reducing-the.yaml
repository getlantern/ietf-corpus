document: rfc-1570
kind: design-rationale
summary: 'Compound-Frames minimizes negotiation latency by reducing the number of frames exchanged: the peer SHOULD respond with a Configure-Ack followed in a compound frame by its own LCP Configure-Request and any desired NCP Configure-Requests, reducing the minimum configuration round-trips to 4 frames.'
section: 2.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
