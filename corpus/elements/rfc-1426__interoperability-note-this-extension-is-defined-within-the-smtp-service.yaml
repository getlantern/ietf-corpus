document: rfc-1426
kind: interoperability-note
summary: This extension is defined within the SMTP Service Extensions framework (RFC 1425). A server not responding with 250 to EHLO, or not including '8BITMIME' in the EHLO response, is treated as not supporting this extension, and the client must fall back to 7-bit operation.
