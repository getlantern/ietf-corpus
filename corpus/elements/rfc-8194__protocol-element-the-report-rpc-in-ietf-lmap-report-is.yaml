document: rfc-8194
kind: protocol-element
summary: The report RPC (in ietf-lmap-report) is invoked by a Measurement Agent on a Collector. Its input includes date, optional agent-id/group-id/measurement-point, and a list of result records each containing schedule/action/task identifiers, options, tags, event time, start/end times, cycle-number, status-code, conflict list, and tabular result data.
section: "4.3"
