document: rfc-7643
kind: security-consideration
summary: Passwords and other sensitive security data SHOULD be hashed when stored locally. Service providers that pass cleartext passwords immediately to another system MUST do so over a secured connection (TLS). If temporarily persisted (e.g., for workflow), the value MUST be encrypted.
section: "9.2"
topics:
    - security
    - crypto
