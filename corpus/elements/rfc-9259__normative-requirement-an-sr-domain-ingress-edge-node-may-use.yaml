document: rfc-9259
kind: normative-requirement
summary: An SR domain ingress edge node MAY use the O-flag in the SRH to mark packets to trigger telemetry data collection and export at segment endpoints. Based on local configuration, it may implement a classification and sampling mechanism.
section: 2.1.1
rfc2119_level: MAY
topics:
