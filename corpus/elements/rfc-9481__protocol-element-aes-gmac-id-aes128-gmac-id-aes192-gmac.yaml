document: rfc-9481
kind: protocol-element
summary: AES-GMAC (id-aes128-GMAC, id-aes192-GMAC, id-aes256-GMAC) is specified as a symmetric key-based MAC for CMP message protection but must never be reused with the same nonce and must not be used as the PRF in PBKDF2.
section: 6.2.2
topics:
