document: rfc-9835
kind: design-rationale
summary: YANG feature flags (e.g., 'layer2-ac', 'layer3-ac', 'rtg-bgp', 'bfd') gate conditional subtrees to accommodate deployments that support only a subset of capabilities, avoiding a monolithic module that requires full implementation. This allows, for example, Layer-2-only or routing-protocol-specific deployments.
section: "5.1"
topics:
    - yang
    - netconf
