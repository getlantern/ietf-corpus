document: rfc-4173
kind: design-rationale
summary: Applying credentials to a boot image loaded through iSCSI is outside the scope of this document because the identity of a boot image may not be known when the Boot Stage starts, and images may recursively load other images based on hardware configuration and user input. Each image-loading component is expected to verify images independently.
section: "8"
topics:
    - security
