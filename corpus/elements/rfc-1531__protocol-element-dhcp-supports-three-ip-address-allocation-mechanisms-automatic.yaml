document: rfc-1531
kind: protocol-element
summary: 'DHCP supports three IP address allocation mechanisms: automatic (permanent assignment), dynamic (time-limited lease enabling address reuse), and manual (administrator-assigned address conveyed via DHCP). Dynamic allocation is the only mechanism that allows automatic reuse of addresses.'
