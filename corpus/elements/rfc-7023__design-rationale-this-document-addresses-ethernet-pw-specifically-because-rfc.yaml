summary: This document addresses Ethernet PW specifically because RFC 6310 covers ATM and Frame Relay emulation over PWs but explicitly does not describe defect state mapping for Ethernet due to its unique OAM characteristics (e.g., CFM MEG levels, AIS/RDI, CCM-based continuity check with 3.5× timeout).
