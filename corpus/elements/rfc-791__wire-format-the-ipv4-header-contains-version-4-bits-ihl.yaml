summary: 'The IPv4 header contains: Version (4 bits), IHL (4 bits, minimum 5), Type of Service (8 bits), Total Length (16 bits), Identification (16 bits), Flags (3 bits), Fragment Offset (13 bits), TTL (8 bits), Protocol (8 bits), Header Checksum (16 bits), Source Address (32 bits), Destination Address (32 bits), followed by variable-length Options padded to a 32-bit boundary.'
