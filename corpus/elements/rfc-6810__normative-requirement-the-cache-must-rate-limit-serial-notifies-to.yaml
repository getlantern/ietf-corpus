document: rfc-6810
kind: normative-requirement
summary: The cache MUST rate-limit Serial Notifies to no more than one per minute. The cache SHOULD send a Notify PDU when its serial changes, as a hint for the router to poll sooner.
section: "6.2"
rfc2119_level: MUST
topics:
