document: rfc-6282
kind: wire-format
summary: LOWPAN_IPHC base encoding occupies 2 octets (bits 0–1 are '01', bit 2 is '1', followed by TF[2], NH[1], HLIM[2], CID[1], SAC[1], SAM[2], M[1], DAC[1], DAM[2]). An optional third octet (Context Identifier Extension) is appended when CID=1, containing SCI[4] and DCI[4].
