document: rfc-2245
kind: design-rationale
summary: 'Anonymous trace information should take one of three forms: an Internet email address, an opaque string without ''@'', or nothing. This provides flexibility while allowing administrators to identify the source of access without mandating disclosure of user identity.'
section: "2"
topics:
    - security
    - privacy
