document: rfc-3279
kind: normative-requirement
summary: For EC certificates, if keyCertSign or cRLSign is present, keyAgreement, encipherOnly, and decipherOnly SHOULD NOT be present. The keyUsage extension MUST NOT assert both encipherOnly and decipherOnly simultaneously.
