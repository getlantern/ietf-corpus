document: rfc-6442
kind: design-rationale
summary: The document deliberately does not specify which of multiple competing location sources (e.g., on-board GPS vs. cell tower assertion) is more accurate. Instead, a 'you break it, you bought it' policy makes an intermediary that inserts a second location fully responsible for all location information in that request.
section: "3.3"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
