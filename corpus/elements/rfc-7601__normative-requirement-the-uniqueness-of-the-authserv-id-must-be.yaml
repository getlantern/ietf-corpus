document: rfc-7601
kind: normative-requirement
summary: The uniqueness of the authserv-id MUST be guaranteed by the ADMD that generates it and MUST pertain to that ADMD. MUAs or downstream filters SHOULD use this identifier to determine whether the data in an Authentication-Results header field ought to be used or ignored.
section: "2.5"
rfc2119_level: MUST
topics:
    - email
    - security
