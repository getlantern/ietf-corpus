document: rfc-9213
kind: protocol-element
summary: A Targeted Cache-Control Header Field is an HTTP response header field with the same semantics as Cache-Control but with a distinct field name indicating its target cache class. For example, CDN-Cache-Control targets CDN caches.
section: "2"
