document: rfc-5258
kind: normative-requirement
summary: Any extended LIST command (extended in any of the three ways described) MUST NOT treat the empty mailbox name as the special request to return the hierarchy delimiter and root name. If multiple mailbox names are provided and one is the empty string, the empty string MUST be ignored for matching purposes.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
