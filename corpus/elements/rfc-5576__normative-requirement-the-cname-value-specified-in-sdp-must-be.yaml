document: rfc-5576
kind: normative-requirement
summary: The 'cname' value specified in SDP MUST be the CNAME that the media sender will place in its RTCP SDES packets. If a mismatched CNAME is received in RTCP, the receiver SHOULD assume an SSRC collision has occurred.
section: "6.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
