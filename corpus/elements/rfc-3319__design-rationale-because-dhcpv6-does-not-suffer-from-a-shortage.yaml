document: rfc-3319
kind: design-rationale
summary: Because DHCPv6 does not suffer from a shortage of option codes, the encoding byte found in the IPv4 DHCP SIP option (RFC 3361) is omitted, making options shorter, easier to parse, better word-aligned for numeric addresses, and allowing clients to request either option type via the option request option.
section: "3"
