document: rfc-8915
kind: normative-requirement
summary: Implementations receiving a record with an unrecognized Record Type MUST ignore it if the Critical Bit is 0, and MUST treat it as an error if the Critical Bit is 1. Servers MUST respond with error code 0 ('Unrecognized Critical Record') in the latter case.
section: "4"
rfc2119_level: MUST
topics:
    - ntp
