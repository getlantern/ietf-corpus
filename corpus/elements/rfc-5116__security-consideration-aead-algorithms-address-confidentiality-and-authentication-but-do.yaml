document: rfc-5116
kind: security-consideration
summary: AEAD algorithms address confidentiality and authentication but do nothing to address key generation or key management. AEAD algorithms that rely on distinct nonces may be inappropriate for some applications or scenarios where nonce uniqueness cannot be guaranteed.
