document: rfc-8945
kind: normative-requirement
summary: If a non-forwarding server does not recognize the key or algorithm, it MUST generate an error response with RCODE 9 (NOTAUTH) and TSIG ERROR 17 (BADKEY). This response MUST be unsigned.
section: 5.2.1
rfc2119_level: MUST
topics:
    - dns
    - security
