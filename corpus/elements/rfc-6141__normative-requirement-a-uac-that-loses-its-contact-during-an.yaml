document: rfc-6141
kind: normative-requirement
summary: A UAC that loses its contact during an ongoing re-INVITE SHOULD generate a CANCEL to cancel the re-INVITE and transition the INVITE client transaction to Terminated, then SHOULD send a new re-INVITE to synchronize session state with the UAS.
section: "5.5"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
