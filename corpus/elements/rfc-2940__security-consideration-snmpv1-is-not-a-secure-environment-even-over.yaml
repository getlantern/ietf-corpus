document: rfc-2940
kind: security-consideration
summary: SNMPv1 is not a secure environment; even over IPsec there is no per-principal access control. Implementers are recommended to use SNMPv3 with the User-based Security Model (USM) and View-based Access Control Model (VACM) to restrict GET/SET access to authorised principals.
section: "6"
topics:
    - snmp
    - security
