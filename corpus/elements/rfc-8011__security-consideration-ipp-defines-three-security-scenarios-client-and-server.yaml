document: rfc-8011
kind: security-consideration
summary: 'IPP defines three security scenarios: Client and Server in the same security domain (internal network, relaxed requirements); Client and Server in different security domains (requiring authentication and message privacy via TLS); and Print by Reference, where the Printer fetches document data from a third-party URI, potentially exposing the document to intermediate servers with no IPP-enforced security.'
section: "9.1"
topics:
    - security
    - tls
