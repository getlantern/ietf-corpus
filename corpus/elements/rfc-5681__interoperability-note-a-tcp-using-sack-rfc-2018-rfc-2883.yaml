document: rfc-5681
kind: interoperability-note
summary: A TCP using SACK (RFC 2018, RFC 2883) can use SACK information to determine duplicate ACKs, e.g., if an ACK contains previously unknown SACK information, instead of relying solely on the five-condition definition of a duplicate ACK.
