document: rfc-9646
kind: security-consideration
summary: The deployment-generated LDevID certificate and associated private key are considered user data and SHOULD be cleared whenever the SZTP-client is reset to factory default state (e.g., via the 'factory-reset' RPC defined in RFC 8808), unlike the manufacturer-generated IDevID.
section: 4.1.6
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
