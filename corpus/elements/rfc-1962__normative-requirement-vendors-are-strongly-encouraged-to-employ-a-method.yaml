document: rfc-1962
kind: normative-requirement
summary: Vendors are strongly encouraged to employ a method of validating the compressed data or recognizing out-of-sync compressor/decompressor pairs. Each compression algorithm must supply a way of determining if data is being passed reliably, or must require use of a reliable transport such as LAPB.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
