document: rfc-8600
kind: security-consideration
summary: The trust model delineates that the network provides only best-effort delivery without confidentiality or integrity; the Controller is trusted to broker and enforce authorization but is not trusted to verify the truth/correctness of data; and Platforms are trusted to preserve confidentiality of retrieved data.
