document: rfc-5007
kind: security-consideration
summary: LEASEQUERY and LEASEQUERY-REPLY messages should be secured using DHCPv6 authentication (RFC 3315 Section 21). For access concentrator requestors, IPsec-based security per RFC 3315 Section 21.1 SHOULD be used to prevent malicious servers from injecting incorrect lease or routing information.
section: "5"
topics:
    - security
    - ipsec
