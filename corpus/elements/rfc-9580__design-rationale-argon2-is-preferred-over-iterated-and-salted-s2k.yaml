document: rfc-9580
kind: design-rationale
summary: Argon2 is preferred over Iterated and Salted S2K because it provides memory hardness, making dictionary attacks on passphrases significantly more expensive. Iterated and Salted S2K increases computational cost only and offers no memory-hardness guarantee.
section: 3.7.2
topics:
