document: rfc-7701
kind: design-rationale
summary: Private messages are restricted to a single recipient (single To header in Message/CPIM) due to added complexity of multi-recipient delivery failure reporting. Senders wishing to address multiple recipients privately must send individual messages per recipient.
section: "6.2"
