document: rfc-9664
kind: normative-requirement
summary: Requesters SHOULD NOT send a Refresh Request when all RRs in the request would have more than 50% of their lease duration remaining before expiry, though early refresh MAY be performed when needed (e.g., for power-constrained devices).
section: 5.2.1
rfc2119_level: SHOULD NOT
topics:
    - dns
