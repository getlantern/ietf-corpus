document: rfc-3748
kind: protocol-element
summary: The EAP multiplexing model uses the Code field (analogous to IP protocol number) to demultiplex to peer vs. authenticator layers, and the Type field (analogous to TCP/UDP port) to demultiplex to specific EAP method implementations. Legacy Nak (Type 3) and Expanded Nak (Type 254) are used exclusively for method negotiation and MUST NOT carry data destined for other EAP methods.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
