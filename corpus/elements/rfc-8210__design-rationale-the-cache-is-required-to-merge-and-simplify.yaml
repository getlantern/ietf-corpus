document: rfc-8210
kind: design-rationale
summary: The cache is required to merge and simplify the change set before delivering updates to the router. The explicit rationale given is that the entire purpose of the RPKI-Router protocol is to offload work from resource-constrained router platforms to the cache; simplifying the change set is therefore the cache's job.
section: "5.3"
topics:
    - routing
    - bgp
