document: rfc-3440
kind: design-rationale
summary: Unavailable seconds-line (UasL) explicitly excludes seconds caused solely by fast retrains and failed fast retrains, because fast retrains are considered normal network operation rather than availability failures. This prevents the UasL counter from being inflated by routine G.Lite link maintenance events.
section: 4.2.4
topics:
    - snmp
