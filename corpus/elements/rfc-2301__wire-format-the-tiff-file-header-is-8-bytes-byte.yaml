document: rfc-2301
kind: wire-format
summary: 'The TIFF file header is 8 bytes: byte order indicator (2 bytes: 0x4949 ''II''=little-endian or 0x4D4D ''MM''=big-endian), TIFF magic number 42 (2 bytes, ordered per byte-order field), and offset to first IFD (4 bytes). Profile S requires ''II'' with IFD offset=8.'
section: 2.1.1
extracted_by: claude-sonnet-4-6
