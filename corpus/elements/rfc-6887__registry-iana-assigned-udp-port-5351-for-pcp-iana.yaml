summary: 'IANA assigned UDP port 5351 for PCP. IANA created four registries: PCP Opcodes (initial values: ANNOUNCE=0, MAP=1, PEER=2), PCP Result Codes (0–13 defined), PCP Options (THIRD_PARTY, PREFER_FAILURE, FILTER defined), and the port number assignment. New entries in all registries require IETF Review.'
