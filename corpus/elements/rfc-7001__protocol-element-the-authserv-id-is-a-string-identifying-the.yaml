document: rfc-7001
kind: protocol-element
summary: The authserv-id is a string identifying the authentication service within the ADMD that conducted the checks. It is machine-readable and is used by consumers to determine whether the header field contents are trustworthy. Common practice is to use the ADMD's organizational DNS domain name.
section: "2.4"
topics:
