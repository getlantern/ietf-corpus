document: rfc-959
kind: wire-format
summary: 'Stream mode uses a two-byte escape sequence for record-structured files: the first byte is all ones (escape), and the second byte encodes 1 for EOR, 2 for EOF, or 3 for both. If a data byte of all ones is intended, it must be repeated as the second byte of the escape sequence.'
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
