document: rfc-5065
kind: design-rationale
summary: BGP requires all IBGP speakers within a single AS to be fully meshed, requiring n*(n-1)/2 unique sessions for n speakers. Confederations address this scaling problem by subdividing a large AS into smaller Member-ASes that appear as a single AS externally, reducing intra-domain connection complexity to the inter-domain model.
section: "1"
topics:
    - bgp
    - routing
