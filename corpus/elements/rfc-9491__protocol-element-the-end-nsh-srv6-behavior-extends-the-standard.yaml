document: rfc-9491
kind: protocol-element
summary: 'The End.NSH SRv6 behavior extends the standard SRv6 processing (RFC 8754 Section 4.3.1.1 through S15) with two additional steps: S15.1 removes and stores IPv6 and SRH headers in a local cache indexed by <NSH: service-path-id, service-index-1>; S15.2 submits the packet to the NSH FIB lookup for the SF.'
section: "5.2"
topics:
