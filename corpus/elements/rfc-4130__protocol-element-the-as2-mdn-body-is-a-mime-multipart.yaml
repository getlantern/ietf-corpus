document: rfc-4130
kind: protocol-element
summary: The AS2-MDN body is a MIME multipart/report with report-type=disposition-notification. When signed, the outer content-type is multipart/signed; the first part is a multipart/report and the second part is application/pkcs7-signature. The machine-readable part includes final-recipient-field, AS2-disposition-field, and optionally AS2-received-content-MIC-field.
section: 7.4.2
topics:
    - http
    - email
    - crypto
