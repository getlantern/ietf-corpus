document: rfc-8945
kind: security-consideration
summary: Shared secret keys must be protected like private keys. Secrets SHOULD NOT be shared by more than two entities, as any additional party knowing the key can impersonate any other party in the group. Secrets should never be transmitted in the clear and SHOULD be at least as long as the keyed hash output.
section: "10"
topics:
