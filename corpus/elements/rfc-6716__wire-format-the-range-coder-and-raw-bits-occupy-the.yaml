document: rfc-6716
kind: wire-format
summary: 'The range coder and raw bits occupy the same byte sequence within a CELT frame: range coder data is packed MSB-to-LSB from the start of the frame, while raw bits are packed LSB-to-MSB from the end; the two regions may overlap, and a decoder MUST allow this overlap.'
section: "4.1"
topics:
    - realtime
    - voip
