document: rfc-7877
kind: normative-requirement
summary: Response types 'Attribute value invalid' and 'Object does not exist' MUST NOT be used interchangeably. 'Object does not exist' MUST be returned for missing preexisting objects identified by valid keys; 'Attribute value invalid' MUST be returned for malformed object identifiers.
section: "5.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
