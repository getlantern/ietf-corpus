document: rfc-9795
kind: protocol-element
summary: The "crn" (Call Reason) JWT claim is an optional single string describing the intent or purpose of the call, corresponding to the "call-reason" parameter of the SIP Call-Info header (RFC 9796). It is intentionally kept separate from "rcd" because call reason is per-call data rather than stable caller-identity data.
