document: rfc-7705
kind: security-consideration
summary: BGP sessions on routers implementing these AS migration mechanisms SHOULD be protected using TCP Authentication Option (RFC 5925) and the Generalized TTL Security Mechanism (RFC 5082) to reduce exposure to session hijacking or spoofing.
