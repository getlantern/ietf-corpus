document: rfc-5712
kind: security-consideration
summary: Soft preemption introduces a temporary link under-provisioning condition while soft preempted TE LSPs are rerouted. If soft preemption processes are subverted, network operators face risk from this under-provisioning; MPLS control plane security techniques should be applied to protect against attacks. The document does not introduce new security issues beyond those of the original RSVP protocol (RFC 3209).
section: "10"
topics:
    - security
    - mpls
