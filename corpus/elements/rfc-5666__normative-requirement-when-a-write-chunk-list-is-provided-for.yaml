document: rfc-5666
kind: normative-requirement
summary: When a write chunk list is provided for RPC call results, the RPC server MUST provide any corresponding data via RDMA Write to the memory referenced in the chunk list entries. The write chunk list mapping onto procedure results MUST be determined for each upper-layer protocol.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
