document: rfc-4462
kind: protocol-element
summary: The gss-group1-sha1-* family of key exchange methods uses SHA-1 as HASH and the 1024-bit group from SSH-TRANSPORT Section 8.1. Method names are formed by concatenating 'gss-group1-sha1-' with the Base64(MD5(DER(OID))) of the underlying GSS-API mechanism's OID.
section: "2.3"
topics:
