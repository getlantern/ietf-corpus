document: rfc-2250
kind: normative-requirement
summary: Each MPEG ES header must be completely contained within a single RTP packet. Consequently, a minimum RTP payload size of 261 bytes must be supported to accommodate the largest single ES header (extension_data() containing quant_matrix_extension()).
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
