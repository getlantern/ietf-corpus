document: rfc-6088
kind: normative-requirement
summary: For the IPv4 (K)Start DS field, the 2 least significant bits MUST be ignored in any comparison, as they are reserved for ECN use per RFC 3168. The same rule applies to the (L)End DS field, which MUST be coded the same way as (K).
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - diffserv
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
