document: rfc-4106
kind: design-rationale
summary: AES-GCM-ESP was designed to combine CTR-mode encryption with a parallelizable authentication mechanism, solving the problem that CTR alone provides no data origin authentication and no standard authentication algorithm can be efficiently implemented at high (10–40 Gbps) data rates.
