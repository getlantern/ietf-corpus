document: rfc-3156
kind: wire-format
summary: The micalg hash-symbol for application/pgp-signature is formed by converting the OpenPGP text name to lower case and prefixing with "pgp-". Defined values include "pgp-md5", "pgp-sha1", "pgp-ripemd160", "pgp-md2", "pgp-tiger192", and "pgp-haval-5-160".
