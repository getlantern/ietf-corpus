document: rfc-4939
kind: design-rationale
summary: The MIB supports management of multiple iSNS server instances via a single SNMP context by using isnsServerIndex as the primary index across all tables. This allows a single SNMP agent to monitor heterogeneous deployments with several iSNS servers.
section: "3.4"
topics:
    - snmp
