document: rfc-9347
kind: interoperability-note
summary: An AGGFRAG_PAYLOAD empty payload (header only, no DataBlocks) is defined to allow reporting congestion control information on a paired SA that is not itself AGGFRAG_PAYLOAD-enabled. This is currently only applicable in non-IKEv2 deployments.
section: 2.2.4
topics:
    - ipsec
    - vpn
    - congestion
