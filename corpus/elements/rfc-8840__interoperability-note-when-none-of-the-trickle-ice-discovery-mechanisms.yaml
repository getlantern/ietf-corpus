document: rfc-8840
kind: interoperability-note
summary: When none of the Trickle ICE discovery mechanisms are applicable, SIP UAs should use Half Trickle mode, where the first Offer contains a complete set of ICE candidates. Half Trickle Offers are compatible with both ICE SIP endpoints (RFC 8839) and legacy endpoints (RFC 3264), and once a single Offer/Answer is exchanged Full Trickle can be used thereafter.
section: "5.3"
topics:
