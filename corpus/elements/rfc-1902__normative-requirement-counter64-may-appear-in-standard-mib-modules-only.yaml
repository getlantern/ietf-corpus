document: rfc-1902
kind: normative-requirement
summary: Counter64 may appear in standard MIB modules only if the modeled information would wrap in less than one hour were Counter32 used instead. This restricts Counter64 to high-rate quantities such as high-speed interface octet counts.
section: 7.1.10
rfc2119_level: MUST
topics:
    - snmp
    - measurement
