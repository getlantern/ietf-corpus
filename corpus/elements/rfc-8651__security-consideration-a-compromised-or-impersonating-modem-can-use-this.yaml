document: rfc-8651
kind: security-consideration
summary: A compromised or impersonating modem can use this extension to suppress router transmission. This attack vector is similar in scope to base DLEP threats (session reset, traffic drop). RFC 8175's TLS mechanism is the defined mitigation against impersonating attackers.
section: "4"
topics:
    - security
    - tls
    - routing
