document: rfc-9587
kind: protocol-element
summary: The 'extended-lsa-support' boolean leaf at the area level inherits from the instance level if unspecified. For regular areas (where AS-scoped LSAs are flooded), disabling area-level Extended LSA support is prohibited when instance-level support is enabled, because E-AS-External-LSAs flood into all regular areas.
section: "4"
topics:
