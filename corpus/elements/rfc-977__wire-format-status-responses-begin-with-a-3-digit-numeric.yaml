document: rfc-977
kind: wire-format
summary: 'Status responses begin with a 3-digit numeric code. First digit indicates success/failure category: 1xx informative, 2xx ok, 3xx ok-continue, 4xx command correct but failed, 5xx unimplemented or error. Second digit indicates function category: x0x connection/misc, x1x newsgroup selection, x2x article selection, x3x distribution, x4x posting, x8x nonstandard extensions, x9x debugging.'
