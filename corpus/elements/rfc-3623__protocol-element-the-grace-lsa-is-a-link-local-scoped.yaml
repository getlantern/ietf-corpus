document: rfc-3623
kind: protocol-element
summary: The Grace-LSA is a link-local scoped Opaque-LSA (LS type 9) with Opaque Type 3 and Opaque ID 0, originated by a router wishing to execute a graceful restart. It requests that neighbors continue to advertise the router as fully adjacent during a specified grace period. Its body is TLV-encoded and includes the grace period length, restart reason, and optionally the router's IP interface address.
section: A
topics:
    - routing
