document: rfc-7234
kind: protocol-element
summary: 'Warning header codes are divided into 1xx (freshness/validation status — MUST be deleted after validation, only generated by caches during validation) and 2xx (persistent representation aspects — MUST NOT be deleted after validation unless a full response is sent). Defined codes: 110 (Stale), 111 (Revalidation Failed), 112 (Disconnected), 113 (Heuristic Expiration), 199 (Misc), 214 (Transformation Applied), 299 (Misc Persistent).'
section: "5.5"
