document: rfc-3472
kind: normative-requirement
summary: Transit and egress nodes MUST verify that the node and outgoing interface can support the requested LSP Encoding Type. If encoding cannot be supported, the node MUST generate a NOTIFICATION message with a 'Routing problem/Unsupported Encoding' indication.
section: 2.1.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
