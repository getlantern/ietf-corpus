document: rfc-5541
kind: design-rationale
summary: Objective function discovery is handled via PCEP rather than OSPF/IS-IS PCE discovery extensions (RFC 5088/5089) because those IGP mechanisms are intended for a few generic parameters, while detailed PCE parameters such as supported objective functions belong in the PCEP session-setup exchange.
