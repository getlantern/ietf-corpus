document: rfc-8639
kind: protocol-element
summary: The 'delete-subscription' RPC cancels an existing dynamic subscription. Once the publisher accepts, it MUST NOT send any more notification messages for that subscription. Only the original subscriber's transport session may invoke this RPC; configured subscriptions cannot be deleted via this RPC.
section: 2.4.4
topics:
    - yang
    - netconf
