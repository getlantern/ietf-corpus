document: rfc-9908
kind: design-rationale
summary: RFC 7030, Section 4.5 was sufficiently ambiguous that there was no universal understanding of how the CSR Attributes Response should encode extension values, leading to implementation challenges in deployments such as RFC 8994 (ACP). This document clarifies the encoding rules and adds a template-based alternative.
