document: rfc-4443
kind: security-consideration
summary: ICMP messages may be used to attempt denial-of-service attacks by sending back-to-back erroneous IP packets. Correct implementation of the rate-limiting mechanism in Section 2.4(f) provides the primary defense against this attack.
section: "5.2"
topics:
