document: rfc-3868
kind: wire-format
summary: 'The Common Message Header is 8 bytes: Version (8 bits), Reserved (8 bits), Message Class (8 bits), Message Type (8 bits), and Message Length (32 bits, includes header and all padding). The data portion carries SCCP-User data directly, not an encapsulated SCCP message.'
section: "3.1"
