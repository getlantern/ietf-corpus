document: rfc-922
kind: normative-requirement
summary: A gateway that receives a local broadcast datagram on the hardware network to which the datagram is addressed must not forward it, but should treat itself as a destination (e.g., for routing table updates).
section: "6.1"
rfc2119_level: MUST NOT
topics:
