document: rfc-7877
kind: security-consideration
summary: SPPF implementations must provide confidentiality and authentication via the substrate protocol (e.g., TLS as used in the RFC 7878 SOAP transport). Without these controls, sensitive SED routing data could be intercepted or tampered with in transit.
section: "9.1"
topics:
    - security
    - sip
