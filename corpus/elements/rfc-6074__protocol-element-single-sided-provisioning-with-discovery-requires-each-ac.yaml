document: rfc-6074
kind: protocol-element
summary: Single-sided provisioning with discovery requires each AC to be provisioned only with a VPN-ID (sent as AGI) and a locally unique AII; only one endpoint needs a remote name. BGP auto-discovery distributes <VPN-id, local AII> pairs, allowing PEs to discover remote peers without pre-configuring their addresses.
section: 3.1.1.2
topics:
    - mpls
    - vpn
    - bgp
