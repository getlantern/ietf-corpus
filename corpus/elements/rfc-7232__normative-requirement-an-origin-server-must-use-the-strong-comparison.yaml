document: rfc-7232
kind: normative-requirement
summary: An origin server MUST use the strong comparison function when comparing entity-tags for If-Match, since the client intends this precondition to prevent the method from being applied if there have been any changes to the representation data.
section: "3.1"
rfc2119_level: MUST
topics:
