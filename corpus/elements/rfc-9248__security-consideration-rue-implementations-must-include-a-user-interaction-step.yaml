document: rfc-9248
kind: security-consideration
summary: RUE implementations MUST include a user interaction step to select from available providers before proceeding to register with any provider, because different providers within a country may have different policies. This ensures informed provider selection rather than silent automatic registration.
section: "11"
topics:
    - security
