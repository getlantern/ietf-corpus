document: rfc-8781
kind: interoperability-note
summary: The PREF64 option may appear more than once in a single RA (e.g., during graceful renumbering from one NAT64 prefix to another). Hosts must handle multiple PREF64 options per RA and follow RFC 7050 Section 3 for address synthesis, using only prefixes with nonzero lifetimes.
section: "5"
topics:
