document: rfc-2138
kind: normative-requirement
summary: An Access-Request MUST contain a User-Name attribute and MUST contain either a User-Password or CHAP-Password attribute. It SHOULD contain NAS-IP-Address or NAS-Identifier and SHOULD contain NAS-Port or NAS-Port-Type.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
