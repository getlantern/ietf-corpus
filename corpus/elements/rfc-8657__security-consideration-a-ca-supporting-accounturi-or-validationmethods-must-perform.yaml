document: rfc-8657
kind: security-consideration
summary: A CA supporting "accounturi" or "validationmethods" MUST perform CAA validation using a trusted DNSSEC-validating resolver, where "trusted" means both trusting the resolver and securing the communications path between the resolver and the CA validation system.
section: "5.6"
rfc2119_level: MUST
topics:
    - acme
    - pkix
    - security
    - dns
