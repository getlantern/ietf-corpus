document: rfc-9145
kind: security-consideration
summary: NTP time synchronization is required for replay attack prevention via timestamps. RFC 8633 describes NTP best current practices and RFC 8915 specifies cryptographic NTP security; both should be considered for SFC deployments.
section: "9.3"
