document: rfc-5854
kind: protocol-element
summary: The 'metalink:hash' element conveys a cryptographic hash for a complete file or a piece. All hashes are encoded in lowercase hexadecimal. Hash elements with a 'type' attribute MUST contain a hash of the complete file; those inside metalink:pieces MUST NOT have a 'type' attribute.
section: 4.2.4
topics:
    - security
    - crypto
