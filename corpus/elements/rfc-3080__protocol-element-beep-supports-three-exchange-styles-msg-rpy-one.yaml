document: rfc-3080
kind: protocol-element
summary: 'BEEP supports three exchange styles: MSG/RPY (one-to-one positive reply), MSG/ERR (one-to-one negative reply), and MSG/ANS...NUL (one-to-many reply where the server streams zero or more ANS messages followed by a NUL terminator).'
