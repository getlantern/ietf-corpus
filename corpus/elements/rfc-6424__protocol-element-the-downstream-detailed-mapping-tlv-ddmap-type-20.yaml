document: rfc-6424
kind: protocol-element
summary: The Downstream Detailed Mapping TLV (DDMAP, type 20) replaces the DSMAP and MAY be included in MPLS echo requests to request per-downstream detailed information in the echo reply. It carries MTU, Address Type, DS Flags, Downstream Address, Downstream Interface Address, per-downstream Return Code and Return Subcode, and a list of sub-TLVs.
section: "3.3"
topics:
    - mpls
