document: rfc-9272
kind: interoperability-note
summary: This document updates the definitions of the BAR and IPA fields in Section 6.1 of RFC 8401 (IS-IS BIER) and Section 2.1 of RFC 8444 (OSPFv2 BIER extensions) to support non-zero BAR and IPA values beyond the originally defined value of 0.
