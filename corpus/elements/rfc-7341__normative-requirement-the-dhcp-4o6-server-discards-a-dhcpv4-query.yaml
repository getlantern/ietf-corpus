document: rfc-7341
kind: normative-requirement
summary: The DHCP 4o6 server discards a DHCPv4-query message that contains no DHCPv4 Message option. If the query was received directly, the DHCPv4-response MUST be unicast from the interface on which the original message was received.
section: "11"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
