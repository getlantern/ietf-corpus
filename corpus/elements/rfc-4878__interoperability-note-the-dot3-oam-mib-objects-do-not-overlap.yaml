document: rfc-4878
kind: interoperability-note
summary: The DOT3-OAM-MIB objects do not overlap with the interfaces MIB (RFC 2863), the Ethernet-like interfaces MIB (RFC 3635), or any other currently standardized Ethernet management MIB; all managed objects here are additive and specific to OAM functions defined in IEEE 802.3ah Clause 57.
section: "4.1"
