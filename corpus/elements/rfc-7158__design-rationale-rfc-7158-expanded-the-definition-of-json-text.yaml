document: rfc-7158
kind: design-rationale
summary: RFC 7158 expanded the definition of 'JSON text' from 'must be an object or array' to 'any JSON value'. This change was made because RFC 4627's constraint was inconsistent with ECMAScript's JSON specification and with widespread practice.
section: "2"
topics:
    - json
