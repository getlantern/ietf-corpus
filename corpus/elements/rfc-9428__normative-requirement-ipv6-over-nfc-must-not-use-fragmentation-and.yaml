document: rfc-9428
kind: normative-requirement
summary: IPv6 over NFC MUST NOT use fragmentation and reassembly (FAR) at the adaptation layer. Instead, the NFC link connection MUST be configured with an MIU size sufficient to support the IPv6 MTU requirement (1280 bytes), achieved by setting MIUX to 0x480.
section: "4.7"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
