document: rfc-7064
kind: security-consideration
summary: A STUN client MUST ensure that the username, password, 'stuns' URI, and any other security-relevant parameters are received with equivalent security before using the 'stuns' URI. Receiving those parameters over a TLS session with commensurate ciphersuites is one appropriate mechanism.
section: "4"
rfc2119_level: MUST
topics:
    - nat
    - tls
    - security
