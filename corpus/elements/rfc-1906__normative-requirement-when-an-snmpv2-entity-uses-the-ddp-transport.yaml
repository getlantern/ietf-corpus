document: rfc-1906
kind: normative-requirement
summary: When an SNMPv2 entity uses the DDP transport mapping, it MUST be capable of accepting messages of at least 484 octets. NBP names should be stored in stable storage and should not change more often than the IP address of a typical TCP/IP node.
section: "5.2"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
