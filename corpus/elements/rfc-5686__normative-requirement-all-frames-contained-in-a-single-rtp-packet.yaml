document: rfc-5686
kind: normative-requirement
summary: All frames contained in a single RTP packet MUST be of the same mode, and frames MUST NOT be split between RTP packets. A single RTP packet SHOULD NOT include more frames than fit in the path MTU.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
