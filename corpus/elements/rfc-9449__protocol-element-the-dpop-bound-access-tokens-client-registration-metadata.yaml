document: rfc-9449
kind: protocol-element
summary: The dpop_bound_access_tokens client registration metadata parameter is a boolean indicating the client always uses DPoP for token requests (default false). If true, the authorization server MUST reject token requests from that client lacking the DPoP header.
section: "5.2"
topics:
    - oauth
    - security
