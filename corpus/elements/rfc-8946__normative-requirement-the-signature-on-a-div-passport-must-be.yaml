document: rfc-8946
kind: normative-requirement
summary: The signature on a "div" PASSporT MUST be created with a credential that has authority over the identity in the "div" claim (the previous destination), not the "orig" field. This is a significant departure from baseline STIR, where the signer has authority over "orig".
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
