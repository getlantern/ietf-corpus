document: rfc-3380
kind: state-machine
summary: 'Set-Job-Attributes defines allowed job-state transitions: ''pending'' may stay ''pending'' or move to ''pending-held''; ''pending-held'' may stay or move to ''pending''; ''processing'' and ''processing-stopped'' may stay in state or return ''client-error-not-possible'' depending on implementation; ''completed'', ''canceled'', and ''aborted'' always return ''client-error-not-possible''.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
