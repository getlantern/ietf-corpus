document: rfc-8579
kind: design-rationale
summary: The ':specialuse' fallback does not attempt delivery to the default mailbox when the special-use mailbox delivery fails for non-existence reasons. This prevents messages from being unexpectedly spread across two mailboxes in case of transient or intermittent delivery failures.
section: "4"
topics:
    - email
