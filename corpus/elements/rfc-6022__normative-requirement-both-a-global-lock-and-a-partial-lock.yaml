document: rfc-6022
kind: normative-requirement
summary: Both a global lock and a partial lock entry in the locks container MUST contain the NETCONF session-id of the locking session; if the lock is held by a non-NETCONF-managed session (e.g., CLI), a session-id of 0 is reported.
section: "5"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
