document: rfc-7455
kind: normative-requirement
summary: In TRILL, a MEP-ID MUST be a number in the range 1 to 65535, extending the 802.1Q CFM restriction of 1–8191 to enable 1-to-1 mapping with 16-bit RBridge nicknames used in the Base Mode.
