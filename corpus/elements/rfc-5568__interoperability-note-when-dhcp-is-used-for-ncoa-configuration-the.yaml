document: rfc-5568
kind: interoperability-note
summary: When DHCP is used for NCoA configuration, the protocol only provides forwarding support for PCoA. The MN must still formulate an NCoA to transmit the FBU, but MUST NOT send data packets using that NCoA; DHCP must be performed upon attaching to NAR's link. This is signaled by PrRtAdv Code 5.
section: "5.2"
topics:
    - mobility
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
