document: rfc-3464
kind: protocol-element
summary: 'The Action field indicates the disposition of the message for a recipient, with five defined values: ''failed'' (delivery abandoned), ''delayed'' (retry ongoing), ''delivered'' (terminal success), ''relayed'' (forwarded to DSN-unaware environment), ''expanded'' (forwarded to multiple addresses, non-terminal).'
