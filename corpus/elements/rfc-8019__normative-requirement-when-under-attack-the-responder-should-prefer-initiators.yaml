document: rfc-8019
kind: normative-requirement
summary: When under attack, the Responder SHOULD prefer Initiators presenting a Session Resumption ticket (RFC 5723) but SHOULD NOT serve resumed Initiators exclusively, as this would lock out legitimate clients with no ticket.
section: "4.5"
rfc2119_level: SHOULD
topics:
