document: rfc-3641
kind: design-rationale
summary: GSER is based on ASN.1 value notation with changes to accommodate its use as a transfer syntax and to support well-established ad-hoc string encodings for LDAP directory data types. Though primarily intended for LDAP attribute and assertion syntaxes, it can be used wherever human-readable renderings of ASN.1 values are useful.
section: "1"
topics:
