document: rfc-9224
kind: protocol-element
summary: The authoritative RDAP server for a domain name is found by a label-wise longest match of the target domain name against entries in the Bootstrap Service Registry for Domain Name Space, matching per label from right to left. If multiple entries tie for longest match, they are considered equivalent.
