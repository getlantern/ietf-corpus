document: rfc-2744
kind: protocol-element
summary: OM_uint32 is the portable 32-bit unsigned integer type used throughout the C binding. Implementations should use the X/Open xom.h definition if available; otherwise the smallest natural unsigned type providing at least 32 bits of precision.
section: "3.1"
