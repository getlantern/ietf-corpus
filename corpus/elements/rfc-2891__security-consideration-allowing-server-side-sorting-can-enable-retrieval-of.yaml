document: rfc-2891
kind: security-consideration
summary: Allowing server-side sorting can enable retrieval of a large number of records regardless of administrative limits on maximum records returned. A client could combine sorting with updated search filters to retrieve all records in small result sets, circumventing administrative limits.
section: "4"
topics:
    - ldap
    - security
