document: rfc-1134
kind: normative-requirement
summary: The Configuration Options in a Configure-Ack MUST NOT be reordered or modified in any way from those received in the Configure-Request. Invalid Configure-Ack packets (wrong Identifier or options mismatch) should be silently discarded.
section: 4.3.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
