document: rfc-8658
kind: design-rationale
summary: The RADIUS attributes defined in this document have a 1:1 field mapping into the corresponding DHCPv6 options in RFC 7598, RFC 8026, and RFC 8115. This allows the BNG to directly translate RADIUS-received configuration into DHCPv6 options for CE provisioning without protocol-specific processing.
section: "1"
topics:
