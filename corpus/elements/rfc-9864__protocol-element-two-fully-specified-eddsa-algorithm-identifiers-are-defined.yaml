document: rfc-9864
kind: protocol-element
summary: 'Two fully-specified EdDSA algorithm identifiers are defined for both JOSE and COSE: Ed25519 (COSE value -19, EdDSA using the Ed25519 parameter set from RFC 8032 §5.1) and Ed448 (COSE value -53, EdDSA using the Ed448 parameter set from RFC 8032 §5.2). Both are JOSE Optional and COSE Recommended. These replace the polymorphic EdDSA identifiers in JOSE and COSE.'
section: "2.2"
topics:
