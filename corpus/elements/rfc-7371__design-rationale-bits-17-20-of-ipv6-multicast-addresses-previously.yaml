document: rfc-7371
kind: design-rationale
summary: Bits 17-20 of IPv6 multicast addresses, previously reserved, are redefined as generic flag bits (ff2) applicable to any multicast address. This allows addresses to be treated more uniformly and permits these bits to be assigned meanings in the future independent of multicast address type. The decision was triggered by the ADDR-FORMAT specification that proposed associating a meaning with one of the reserved bits.
section: "2"
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
