document: rfc-8960
kind: normative-requirement
summary: The 'rib-mpls-properties' grouping (including destination-prefix and route-context) is only valid for routes in the native MPLS RIB, enforced by a 'when' condition checking that the address-family is derived from 'mpls:mpls'. Similarly, the active-route RPC input augmentation applies only to the native MPLS RIB.
section: "2.5"
rfc2119_level: MUST
topics:
    - mpls
    - yang
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
