document: rfc-9502
kind: registry
summary: 'This document updates multiple IANA registries: adds IS-IS IP Algorithm Sub-TLV (29) to ''IS-IS Sub-TLVs for IS-IS Router CAPABILITY TLV''; adds OSPF IP Algorithm TLV (21) to ''OSPF Router Information (RI) TLVs''; adds IS-IS TLVs 126 (IPv4 Algorithm Prefix Reachability) and 127 (IPv6 Algorithm Prefix Reachability) to ''IS-IS Top-Level TLV Codepoints''; registers OSPFv2 Extended Prefix sub-TLV types 6 and 7; registers OSPFv3 Extended-LSA sub-TLV types 35 and 36; registers OSPFv2 Extended Inter-Area ASBR sub-TLV type 2; and creates new ''IP Algorithm Prefix Reachability Sub-TLV Flags'' registry.'
section: "11"
topics:
    - registry
    - routing
    - ip
