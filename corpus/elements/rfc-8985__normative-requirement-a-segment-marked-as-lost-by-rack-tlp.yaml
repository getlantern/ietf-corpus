document: rfc-8985
kind: normative-requirement
summary: A segment marked as lost by RACK-TLP MUST NOT be retransmitted until congestion control deems it appropriate. The PRR algorithm [RFC6937] is RECOMMENDED for the congestion control actions triggered by RACK-TLP loss detections.
section: "9.3"
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
