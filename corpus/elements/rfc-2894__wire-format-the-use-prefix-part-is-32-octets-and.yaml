document: rfc-2894
kind: wire-format
summary: 'The Use-Prefix Part is 32 octets and contains: UseLen (8-bit), KeepLen (8-bit, sum with UseLen ≤ 128), FlagMask (8-bit), RAFlags (8-bit), Valid Lifetime (32-bit seconds), Preferred Lifetime (32-bit seconds), V and P flags (1-bit each) controlling real-time lifetime decrement, reserved bits, and UsePrefix (128-bit).'
