document: rfc-3520
kind: protocol-element
summary: AUTHENTICATION_DATA (X-Type 8) contains a cryptographic signature over all preceding fields in the AUTH_SESSION policy element. Its computation method depends on the AUTH_ENT_ID sub-type (shared key, Kerberos, or public key).
