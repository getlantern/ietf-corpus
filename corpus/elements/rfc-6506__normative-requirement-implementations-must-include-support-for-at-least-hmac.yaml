document: rfc-6506
kind: normative-requirement
summary: Implementations MUST include support for at least HMAC-SHA-256, SHOULD include support for HMAC-SHA-1, and MAY include support for HMAC-SHA-384 and HMAC-SHA-512. HMAC-SHA-256 MUST be the default authentication algorithm.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - security
    - crypto
