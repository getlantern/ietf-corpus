document: rfc-5948
kind: protocol-element
summary: IPv4 CS classifies packets based on upper-layer header fields (source and destination IPv4 addresses, source and destination ports, Type-of-Service, and IP Protocol field) to place the packet on one of the available connections identified by the CID. The CS may employ Packet Header Suppression (PHS) after classification.
section: Appendix B
topics:
