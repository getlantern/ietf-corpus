summary: EncryptionInfo is an ASN.1 SEQUENCE containing encryptionInfoType (OBJECT IDENTIFIER) and encryptionInfoValue (ANY DEFINED BY encryptionInfoType), storing parameters needed for unambiguous re-encryption of unencrypted data objects to exactly reproduce the archived encrypted form.
