document: rfc-7981
kind: design-rationale
summary: 'The IS-IS Router CAPABILITY TLV is intentionally a generic mechanism: it does not define specific capabilities itself but provides a container for application-specific sub-TLVs. This allows independent extension without modifying the base TLV structure.'
