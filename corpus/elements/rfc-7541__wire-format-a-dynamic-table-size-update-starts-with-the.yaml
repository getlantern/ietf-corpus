document: rfc-7541
kind: wire-format
summary: A dynamic table size update starts with the '001' 3-bit pattern followed by the new maximum size as a 5-bit-prefix integer. The new maximum size MUST be lower than or equal to the limit set by the protocol; a value exceeding this limit MUST be treated as a decoding error.
section: "6.3"
topics:
