document: rfc-2126
kind: normative-requirement
summary: Connection Request and Connection Confirmation TPDUs must not negotiate the use of Explicit Flow Control in Class 2 over TCP, because the absence of a flow control policy would cause Multiplexing to degrade quality of service; Multiplexing is therefore not supported.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - tcp
