document: rfc-4553
kind: wire-format
summary: The basic SAToP packet consists of PSN and PW demultiplexing layer headers, followed by the SAToP Encapsulation Header (Control Word and optional RTP header), followed by TDM data payload. For UDP PSN the optional RTP header precedes the Control Word; for L2TPv3 and MPLS PSN it follows the Control Word.
