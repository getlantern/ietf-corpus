summary: 'The HcValueStatus textual convention encodes the validity and sign of a high-capacity absolute value using three enumerated states: valueNotAvailable(1) when the instance could not be accessed, valuePositive(2) for non-negative values, and valueNegative(3) for negative values (the absolute value must be multiplied by -1).'
