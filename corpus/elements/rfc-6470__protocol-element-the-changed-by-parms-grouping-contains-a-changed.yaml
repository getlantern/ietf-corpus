document: rfc-6470
kind: protocol-element
summary: The 'changed-by-parms' grouping contains a 'changed-by' container with a mandatory choice between an empty 'server' leaf (internal action) and a 'by-user' case using common-session-parms (management session). This grouping is reused in netconf-config-change and netconf-capability-change.
section: "2.2"
