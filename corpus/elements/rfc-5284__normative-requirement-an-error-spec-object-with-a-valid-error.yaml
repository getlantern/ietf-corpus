document: rfc-5284
kind: normative-requirement
summary: An ERROR_SPEC object with a valid error code MUST be included in all PathErr, ResvErr, and Notify messages even when a USER_ERROR_SPEC object is present; if no other error code applies, Error Code MUST be set to 'User Error Spec'.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
