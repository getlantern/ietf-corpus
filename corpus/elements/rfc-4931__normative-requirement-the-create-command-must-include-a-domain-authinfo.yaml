document: rfc-4931
kind: normative-requirement
summary: The <create> command MUST include a <domain:authInfo> element. Referenced host objects MUST be known to the server before association with the domain; referenced contact object identifiers MUST likewise be pre-existing in the repository.
section: 3.2.1
rfc2119_level: MUST
