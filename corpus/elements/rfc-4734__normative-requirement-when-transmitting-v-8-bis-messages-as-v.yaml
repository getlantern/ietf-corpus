document: rfc-4734
kind: normative-requirement
summary: 'When transmitting V.8 bis messages as V.21 bit events, the transmitted information MUST include the complete contents: initial HDLC flags, information field, checksum, terminating HDLC flags, and extra ''0'' bits inserted per V.8 bis clause 7.2.8 to prevent false HDLC flag recognition.'
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
