document: rfc-5162
kind: interoperability-note
summary: For compatibility with clients that only support CONDSTORE, servers SHOULD advertise CONDSTORE in the CAPABILITY response as well. A CONDSTORE-only client may incur an extra unneeded round-trip when resynchronizing mailboxes that had messages expunged but no flag changes.
section: "1"
topics:
    - email
