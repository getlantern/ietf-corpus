document: rfc-8166
kind: wire-format
summary: 'A plain RDMA segment (xdr_rdma_segment) encodes three fields: a 32-bit handle (steering tag / R_key), a 32-bit length (size of the memory region in bytes), and a 64-bit offset (virtual address or base offset of the region). An empty segment has a zero length field.'
section: 3.4.3
