document: rfc-4396
kind: normative-requirement
summary: Static sample descriptions MUST be buffered at the client for at least the duration of the session. If dynamic sample descriptions are used, their buffering and SIDX value updates MUST follow the sliding-window wraparound algorithm in Section 4.2.1.
section: "4.2"
rfc2119_level: MUST
topics:
