document: rfc-2947
kind: interoperability-note
summary: The key derivation algorithm assumes it is safe to use a non-DES key (or part thereof) as a DES key, which is true for most authentication systems in popular use. New Telnet AUTHENTICATION mechanisms may specify alternative key derivation if their negotiated session key cannot safely be used this way.
section: "5"
topics:
