document: rfc-2147
kind: wire-format
summary: The UDP length field is a 16-bit field that normally encodes the length of the UDP header plus data; for IPv6 jumbograms (payload > 65535 bytes), it is set to zero as a sentinel to indicate that the true length is carried in the IPv6 Jumbo Payload hop-by-hop option.
