document: rfc-4790
kind: normative-requirement
summary: If positional information is returned for substring match results, it SHOULD fully specify the substring(s) in the result that matches, independent of the length of the search string, such as both starting and ending offsets. Returning just the starting offset is not acceptable.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
