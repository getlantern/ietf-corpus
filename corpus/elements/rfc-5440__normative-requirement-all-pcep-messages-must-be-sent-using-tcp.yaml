document: rfc-5440
kind: normative-requirement
summary: All PCEP messages MUST be sent using TCP port 4189 for both source and destination TCP port. PCEP relies on TCP to fulfill reliable messaging and flow control requirements without further protocol work.
section: "5"
rfc2119_level: MUST
