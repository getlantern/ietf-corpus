kind: design-rationale
summary: 'The solution is intentionally DS vs. DNSKEY agnostic: some Parents want the Child to express keys as DS records, others prefer to receive DNSKEY and calculate DS themselves. Supporting both avoids forcing a choice where no consensus exists.'
