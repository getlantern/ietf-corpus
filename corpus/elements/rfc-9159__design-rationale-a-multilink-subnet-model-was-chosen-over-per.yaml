document: rfc-9159
kind: design-rationale
summary: A multilink subnet model was chosen over per-link subnets because implementing a separate subnet on each peripheral-central link and routing between them was considered excessively complex for constrained IoT nodes. The benefits of a single multilink subnet outweigh the drawbacks identified in RFC 4903.
section: "3.2"
topics:
    - ip
