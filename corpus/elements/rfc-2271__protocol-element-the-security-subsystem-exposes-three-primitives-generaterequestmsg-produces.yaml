document: rfc-2271
kind: protocol-element
summary: 'The Security Subsystem exposes three primitives: generateRequestMsg (produces a secured outgoing request or notification, outputting securityParameters and wholeMsg), processIncomingMsg (validates an incoming message and outputs securityEngineID, securityName, scopedPDU, and a securityStateReference for later response), and generateResponseMsg (produces a secured response using the cached securityStateReference).'
section: "4.4"
topics:
