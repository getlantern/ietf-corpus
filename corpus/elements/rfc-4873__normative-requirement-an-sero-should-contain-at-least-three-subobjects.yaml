document: rfc-4873
kind: normative-requirement
summary: 'An SERO SHOULD contain at least three subobjects: the first MUST indicate the branch node, the second SHOULD be a protection subobject, and the final MUST be the merge node. The address in the first subobject SHOULD also appear in the ERO or another SERO to ensure the branch node is along the LSP path.'
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
