document: rfc-5261
kind: protocol-element
summary: The <replace> element has only a required 'sel' attribute (xpath type). If the located target is an element, comment, or processing instruction, the single child of <replace> MUST be of the same node type. For attribute and text node replacement, <replace> contains text content or MAY be empty.
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
