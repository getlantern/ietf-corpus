document: rfc-4592
kind: protocol-element
summary: A wildcard domain name may have subdomains and may itself be an empty non-terminal. There is no need to inspect subdomains for additional asterisk labels. A lookup encountering a wildcard empty non-terminal terminates as any empty non-terminal match would.
section: 2.1.3
topics:
    - dns
