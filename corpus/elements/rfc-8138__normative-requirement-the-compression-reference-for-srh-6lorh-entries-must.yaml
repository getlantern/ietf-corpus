document: rfc-8138
kind: normative-requirement
summary: 'The Compression Reference for SRH-6LoRH entries MUST be determined in priority order: (1) by explicit configuration (address or 6LoWPAN Context ID), (2) the LOWPAN_IPHC source address when no IP-in-IP encapsulation is present, (3) the Encapsulator Address from IP-in-IP-6LoRH when provided, or (4) the implicitly known DODAG root address.'
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
