document: rfc-3747
kind: protocol-element
summary: 'diffServConfigStart is a RowPointer that references the first element of a functional datapath in the DIFFSERV-MIB, pointing to one of: diffServClfrEntry, diffServMeterEntry, diffServActionEntry, diffServAlgDropEntry, or diffServQEntry. A value of zeroDotZero indicates no further DiffServ treatment; a non-existent row is treated equivalently to zeroDotZero.'
