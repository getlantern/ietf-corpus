document: rfc-5953
kind: normative-requirement
summary: The (D)TLS client MUST verify the server's presented certificate and MUST NOT transmit SNMP messages until the server certificate has been authenticated, the client certificate has been transmitted, and the TLS connection has been fully established.
section: 5.3.1
rfc2119_level: MUST NOT
