document: rfc-5723
kind: interoperability-note
summary: NAT traversal status is explicitly not part of session resumption state; it MUST be re-detected in IKE_SESSION_RESUME. If NAT is detected, the initiator switches to UDP encapsulation on port 4500 as per normal IKEv2 procedures.
section: 4.3.2
topics:
    - ipsec
    - nat
