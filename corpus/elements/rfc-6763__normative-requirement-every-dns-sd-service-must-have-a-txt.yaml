document: rfc-6763
kind: normative-requirement
summary: Every DNS-SD service MUST have a TXT record with the same name as its SRV record, even if the TXT record contains only a single zero byte. This gives the service explicit control over the TTL of its TXT record.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
