document: rfc-1994
kind: security-consideration
summary: The secret SHOULD NOT be the same in both directions of a CHAP exchange. If the same secret is used bidirectionally, an attacker can replay the peer's Challenge, accept the computed Response, and use it to authenticate to the original authenticator.
section: Security Considerations
topics:
    - security
    - crypto
