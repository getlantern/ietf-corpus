document: rfc-7718
kind: security-consideration
summary: This document itself introduces no new security or privacy issues, as it only creates registries. However, the security considerations for active measurement of live networks from RFC 4656 and RFC 5357 remain applicable, and privacy considerations for measurement systems (especially where Internet users participate) are addressed in RFC 7594.
section: "4"
topics:
    - security
    - privacy
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
