document: rfc-8859
kind: normative-requirement
summary: For attributes in the SUM category, software MUST apply the sum of all attribute values being multiplexed instead of trying to use them independently. This applies to bandwidth (b=AS) and other rate-limiting attributes so the aggregate value is used for the shared transport.
section: "4.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - qos
