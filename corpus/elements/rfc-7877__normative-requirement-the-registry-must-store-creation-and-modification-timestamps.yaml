document: rfc-7877
kind: normative-requirement
summary: The Registry MUST store creation and modification timestamps for all objects and MUST include cDate and mDate in Get operation responses. If the client passes in date/time values, the Registry MUST ignore them.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
