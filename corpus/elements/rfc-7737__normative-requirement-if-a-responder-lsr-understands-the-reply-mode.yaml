document: rfc-7737
kind: normative-requirement
summary: If a responder LSR understands the Reply Mode Order TLV but the TLV is invalid (too few values, repeated non-5 modes, value 1 present, or missing Reply Path TLVs for repeated value 5), the responder MUST ignore the entire TLV and use only the Reply Mode field.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
