document: rfc-4817
kind: normative-requirement
summary: When an MPLS/L2TPv3 flow carries payload traffic not known to be TCP-friendly and runs across an unprovisioned path that could become congested, the application MUST employ additional mechanisms to ensure that offered load is reduced appropriately during congestion.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - congestion
