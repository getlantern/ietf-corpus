document: rfc-8777
kind: design-rationale
summary: DRIAD uses reverse IP DNS zones because AMT gateways typically only know the source IP of an (S,G) and have no other name for the sender. Reverse IP lookup is thus the natural and universal index for finding per-sender relay information.
section: "3.4"
topics:
    - dns
    - multicast
