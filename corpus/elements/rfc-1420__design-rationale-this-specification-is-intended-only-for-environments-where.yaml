document: rfc-1420
kind: design-rationale
summary: This specification is intended only for environments where UDP transport is not available; the preferred mapping for SNMP is onto UDP. No managed agent in a heterogeneous transport environment should be required to support more than one mapping, though management stations are strongly encouraged to support all popular transports.
section: "1"
topics:
