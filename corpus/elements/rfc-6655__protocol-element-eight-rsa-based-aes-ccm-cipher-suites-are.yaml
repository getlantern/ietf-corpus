document: rfc-6655
kind: protocol-element
summary: 'Eight RSA-based AES-CCM cipher suites are defined: TLS_RSA_WITH_AES_128_CCM (0xC0,0x9C), TLS_RSA_WITH_AES_256_CCM (0xC0,0x9D), TLS_DHE_RSA_WITH_AES_128_CCM (0xC0,0x9E), TLS_DHE_RSA_WITH_AES_256_CCM (0xC0,0x9F), and their _8 variants with 8-octet authentication tags (0xC0,0xA0–0xC0,0xA3). Non-_8 suites use 16-octet authentication tags; all use the TLS 1.2 PRF with HMAC-SHA-256.'
