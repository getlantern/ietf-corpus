document: rfc-9908
kind: normative-requirement
summary: The 'values' field of an id-aa-extensionReqTemplate attribute MUST contain a SET with exactly one element of type ExtensionTemplate (not the regular Extension type). For each extension specified, the client SHOULD include the given critical flag and SHOULD use the given extnValue when present.
section: "3.4"
rfc2119_level: MUST
topics:
    - pkix
    - security
