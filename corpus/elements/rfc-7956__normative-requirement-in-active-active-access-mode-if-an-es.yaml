document: rfc-7956
kind: normative-requirement
summary: In active-active access mode, if an ES is connected to two RBridges RB1 and RB2, both MUST be configured to act as a distributed L3 gateway for that ES so that either RBridge can serve as an egress for inter-subnet traffic destined to it.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
