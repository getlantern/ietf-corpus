document: rfc-6611
kind: security-consideration
summary: The transport of assigned home agent information via the AAA infrastructure from AAA server to AAA client (NAS) is only integrity protected per standard Diameter or other AAA protocol security mechanisms (RFC 3588). No additional security considerations are imposed, and this document does not introduce any new security issues to Mobile IPv6.
