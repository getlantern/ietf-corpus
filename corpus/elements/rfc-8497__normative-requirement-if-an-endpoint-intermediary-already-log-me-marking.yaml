document: rfc-8497
kind: normative-requirement
summary: If an endpoint/intermediary already 'log me' marking a dialog receives a SIP INVITE with a Join header field and without a 'log me' marker, it MUST NOT 'log me' mark the new dialog. Conversely, if not marking and receives an INVITE with Join and with 'log me', it MUST mark the new dialog.
section: 5.2.3
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
