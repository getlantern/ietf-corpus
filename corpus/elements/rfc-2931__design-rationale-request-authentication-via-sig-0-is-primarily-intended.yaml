document: rfc-2931
kind: design-rationale
summary: Request authentication via SIG(0) is primarily intended for dynamic update requests (RFC 2136), TKEY requests (RFC 2930), or future requests requiring authentication. Older DNS servers predating dynamic update may return errors or ignore requests with a non-empty additional section.
section: "2.2"
topics:
    - dns
    - security
