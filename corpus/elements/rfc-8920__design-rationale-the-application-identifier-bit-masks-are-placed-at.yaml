document: rfc-8920
kind: design-rationale
summary: The Application Identifier Bit Masks are placed at the ASLA sub-TLV level rather than within individual attribute sub-sub-TLVs so that the format of previously defined link attributes can be kept unchanged and reused when advertising them inside the ASLA sub-TLV.
