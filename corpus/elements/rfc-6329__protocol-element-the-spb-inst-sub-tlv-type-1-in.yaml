kind: protocol-element
summary: The SPB-Inst sub-TLV (type 1, in MT-Capability TLV of LSP) carries the node's 64-bit CIST Root Identifier, 32-bit CIST External Root Path Cost, 16-bit Bridge Priority, V bit (auto-allocated SPSourceID), 20-bit SPSourceID, and per-tree VLAN-ID tuples containing ECT-ALGORITHM, Base VID, SPVID, and U/M/A flags.
