document: rfc-1565
kind: design-rationale
summary: The MIB is designed as a building block for application-specific MIBs (e.g., MTA or DSA monitoring MIBs). Each specific network service type is expected to define its own MIB that extends these common facilities, rather than encoding all attributes in a single monolithic MIB.
