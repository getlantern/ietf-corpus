document: rfc-1002
kind: wire-format
summary: 'Node Status Response NODE_NAME entry: 16 bytes of NETBIOS FORMAT NAME followed by 2-byte NAME_FLAGS. NAME_FLAGS include G (group), ONT (node type), DRG (deregistering), CNF (conflict), ACT (active—always 1), PRM (permanent node name), and RESERVED bits.'
section: 4.2.18
