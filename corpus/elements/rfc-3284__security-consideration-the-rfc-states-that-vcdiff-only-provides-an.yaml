document: rfc-3284
kind: security-consideration
summary: The RFC states that Vcdiff only provides an encoding format for compressed and differenced data and does not address storage in file systems or runtime memory management. The authors do not anticipate any security issues specific to the Vcdiff format itself.
section: "12"
