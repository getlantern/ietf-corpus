document: rfc-5155
kind: registry
summary: This document creates the 'DNSSEC NSEC3 Flags' registry (8 one-bit flags). Bit 7 (LSB) is the Opt-Out flag; bits 0–6 are available for assignment via IETF Standards Action. Also creates the 'DNSSEC NSEC3PARAM Flags' registry where bit 7 is reserved and must be zero.
