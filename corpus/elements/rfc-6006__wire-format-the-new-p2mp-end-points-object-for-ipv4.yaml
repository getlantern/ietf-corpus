document: rfc-6006
kind: wire-format
summary: The new P2MP END-POINTS object for IPv4 (Object-Type 3) contains a 4-byte Leaf type field, a 4-byte Source IPv4 address, and one or more 4-byte Destination IPv4 addresses. The IPv6 variant (Object-Type 4) uses 16-byte addresses with a 4-byte Leaf type prefix.
