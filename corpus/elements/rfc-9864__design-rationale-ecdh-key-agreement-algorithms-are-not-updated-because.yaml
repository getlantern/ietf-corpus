document: rfc-9864
kind: design-rationale
summary: ECDH key agreement algorithms are not updated because doing so would require specifying the curve, KDF, and other parameters; while the specification describes how this could be done (e.g., 'ECDH-ES using Concat KDF and P-256'), it does not register such replacements, leaving this to future specifications if needed.
section: "6.2"
topics:
