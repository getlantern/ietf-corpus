document: rfc-3938
kind: design-rationale
summary: No existing message context value (voice-message, fax-message, pager-message, multimedia-message, text-message, none) adequately identified video messages, motivating a new dedicated 'video-message' context value to cover video email from cell phones and webcam-based services.
