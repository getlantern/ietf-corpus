document: rfc-3961
kind: security-consideration
summary: DES is no longer considered a strong encryption mechanism due to advances in large-scale attacks; Triple-DES is generally preferred despite poorer performance. DES also has 48 'possibly-weak' keys beyond the 16 weak/semi-weak keys that are not avoided by the Kerberos specification.
