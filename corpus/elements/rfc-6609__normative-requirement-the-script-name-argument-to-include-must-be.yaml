document: rfc-6609
kind: normative-requirement
summary: The script name argument to 'include' MUST be a constant string as defined in RFC 5229 Section 3; implementations MUST NOT expand variables in the script name argument. Script names MUST be restricted according to ManageSieve (RFC 5804) Section 1.6.
section: "3.2"
rfc2119_level: MUST NOT
