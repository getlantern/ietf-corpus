document: rfc-3321
kind: normative-requirement
summary: An endpoint wishing to receive shared_state_id from its peer must not set the I-bit (which suppresses the list of locally available states) to 1, since shared state availability is communicated via this list.
section: "6.2"
rfc2119_level: MUST NOT
