document: rfc-2743
kind: normative-requirement
summary: Zero-length tokens are never returned by GSS routines for transfer to a peer. Context-level tokens may be output by GSS-API calls whether or not calls indicate successful completion; per-message tokens are to be returned only upon successful per-message call completion.
section: 1.1.2
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
