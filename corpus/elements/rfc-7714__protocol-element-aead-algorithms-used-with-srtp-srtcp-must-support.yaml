document: rfc-7714
kind: protocol-element
summary: 'AEAD algorithms used with SRTP/SRTCP must support: minimum Associated Data length of 12 octets, nonce (IV) length of exactly 12 octets, 16-octet authentication tag, GCM plaintext up to 2^36-32 octets per invocation, and a maximum of 2^48 invocations for SRTP or 2^31 for SRTCP per instantiation.'
