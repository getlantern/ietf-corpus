document: rfc-9824
kind: protocol-element
summary: 'For a nonexistent name, the authoritative server generates a NODATA response (RCODE NOERROR, empty Answer) with a dynamically constructed NSEC record whose owner name matches the QNAME placed in the Authority section. Example: ''a.example.com. 300 IN NSEC \000.a.example.com. RRSIG NSEC NXNAME''.'
section: "3.1"
topics:
    - dns
