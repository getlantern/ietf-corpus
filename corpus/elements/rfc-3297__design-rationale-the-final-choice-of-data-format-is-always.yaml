document: rfc-3297
kind: design-rationale
summary: The final choice of data format is always made by the sender based on the receiver's declared capabilities, not by the receiver choosing from enumerated alternatives. This more closely matches T.30 negotiation, integrates cleanly with extended Internet fax, and handles cases where dynamically generated content cannot be enumerated in advance.
section: 3.2.3
topics:
    - email
