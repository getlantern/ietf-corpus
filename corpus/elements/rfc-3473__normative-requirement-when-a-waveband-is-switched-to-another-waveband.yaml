document: rfc-3473
kind: normative-requirement
summary: When a waveband is switched to another waveband with mirrored wavelengths, the Start and End Label fields in the waveband label MUST be flipped before forwarding. This MUST be performed in both directions for bidirectional waveband tunnels.
section: 2.4.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
