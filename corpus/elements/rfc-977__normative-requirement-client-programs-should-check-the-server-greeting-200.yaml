document: rfc-977
kind: normative-requirement
summary: Client programs should check the server greeting (200 vs 201) to determine whether posting is permitted before allowing users to compose messages, to avoid wasted effort composing articles that cannot be posted.
section: 3.10.1
rfc2119_level: SHOULD
