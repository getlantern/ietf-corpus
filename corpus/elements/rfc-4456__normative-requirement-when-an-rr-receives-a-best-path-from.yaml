document: rfc-4456
kind: normative-requirement
summary: When an RR receives a best path from a Client peer, it MUST reflect that route to all Non-Client peers and also to all other Client peers, eliminating the need for clients to be fully meshed with each other.
section: "6"
rfc2119_level: MUST
topics:
