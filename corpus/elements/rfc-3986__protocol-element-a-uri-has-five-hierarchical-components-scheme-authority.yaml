summary: 'A URI has five hierarchical components: scheme, authority, path, query, and fragment, with the ABNF: URI = scheme ":" hier-part [ "?" query ] [ "#" fragment ]. The scheme and path are required (path may be empty); authority, query, and fragment are optional.'
