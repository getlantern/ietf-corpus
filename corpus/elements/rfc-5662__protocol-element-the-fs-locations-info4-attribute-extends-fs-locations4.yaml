summary: 'The fs_locations_info4 attribute extends fs_locations4 with per-server replica metadata: fls_currency (staleness indicator), a byte-indexed fls_info array carrying consistency class numbers (simultaneous use, handle, fileid, write-verifier, change, readdir) and read/write ranks and orders, plus transport flags (FSLI4TF_RDMA).'
