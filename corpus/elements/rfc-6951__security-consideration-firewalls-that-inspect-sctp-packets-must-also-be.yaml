document: rfc-6951
kind: security-consideration
summary: Firewalls that inspect SCTP packets must also be aware of UDP encapsulation and apply corresponding rules to the encapsulated packets; otherwise, encapsulated SCTP traffic may bypass SCTP-specific firewall policies.
