document: rfc-5730
kind: security-consideration
summary: EPP transmits client credentials (identifier and password) as plain text XML elements. The specification requires additional identification and authorization schemes at other protocol layers to provide robust security, and mandates that initial credentials be delivered to clients via out-of-band methods that protect against inadvertent disclosure.
section: "7"
topics:
    - security
    - crypto
