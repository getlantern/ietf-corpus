document: rfc-8680
kind: interoperability-note
summary: RFC 8680 is fully backward compatible with RFC 6363. Block FEC codes and sliding window FEC codes can coexist; each sliding window FEC scheme has its own IANA-registered FEC Encoding ID carried in FEC Framework Configuration Information, allowing legacy receivers to detect unsupported schemes and reject sessions they cannot handle.
