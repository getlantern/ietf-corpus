document: rfc-2539
kind: security-consideration
summary: 'Standard Diffie-Hellman key strength requirements apply: (p-1)/2 should also be prime, g should be primitive mod p, and p should be ''large.'' Failure to select strong parameters allows discrete logarithm attacks that would expose the shared secret.'
