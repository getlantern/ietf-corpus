document: rfc-9669
kind: wire-format
summary: 'The wide instruction encoding is 128 bits: a standard 64-bit basic instruction followed by a 64-bit pseudo-instruction whose ''opcode'', ''dst_reg'', ''src_reg'', and ''offset'' are all zero, with the second 32-bit immediate value in the ''next_imm'' field and a ''reserved'' field set to zero.'
