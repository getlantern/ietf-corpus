document: rfc-3597
kind: normative-requirement
summary: Unknown RR types cause no additional section processing. Future RR type specifications MAY specify type-specific additional section processing rules, but any such processing MUST be optional since it can only be performed by servers that know the RR type.
section: "8"
rfc2119_level: MUST
topics:
