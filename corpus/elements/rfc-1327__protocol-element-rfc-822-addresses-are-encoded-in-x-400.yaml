document: rfc-1327
kind: protocol-element
summary: RFC 822 addresses are encoded in X.400 using a Domain Defined Attribute of type 'RFC-822' with a PrintableString value (using ps-encoded for non-printable characters). Where the address exceeds 128 characters, continuation DDAs with keywords RFC822C1, RFC822C2, RFC822C3 allow up to 512 total characters; longer addresses cannot be encoded.
section: 4.3.2
topics:
    - email
