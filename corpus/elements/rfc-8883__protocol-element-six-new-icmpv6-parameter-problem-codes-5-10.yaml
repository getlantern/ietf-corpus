summary: 'Six new ICMPv6 Parameter Problem codes (5–10) are defined for extension header processing limit errors: Code 5 (Unrecognized Next Header by intermediate node), Code 6 (Extension header too big), Code 7 (Extension header chain too long), Code 8 (Too many extension headers), Code 9 (Too many options in extension header), Code 10 (Option too big).'
