document: rfc-4424
kind: wire-format
summary: 'Table 3 (frame types for RTP transport) is updated: FT 7 is Full-Rate 8.55 kbps (171 bits), FT 8 is Half-Rate 4.0 kbps (80 bits), and FT 10 is Eighth-Rate 0.8 kbps (16 bits), replacing reserved entries 7, 8, and 10 of RFC 4348. All frame sizes remain unique to allow header-free payload format use.'
