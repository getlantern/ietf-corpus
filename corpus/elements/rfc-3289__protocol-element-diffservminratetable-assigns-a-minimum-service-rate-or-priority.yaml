document: rfc-3289
kind: protocol-element
summary: diffServMinRateTable assigns a minimum service rate or priority to a queue or scheduler input. Rates may be expressed as absolute (diffServMinRateAbsolute) or relative as a fraction of ifSpeed (diffServMinRateRelative); the two are inter-related and changes to one may update the other.
