document: rfc-9668
kind: normative-requirement
summary: The Initiator MUST choose a C_I that is neither used in any current EDHOC session as this peer's connection identifier nor the Recipient ID in a current OSCORE Security Context where the ID Context is not present. C_I SHOULD NOT be the Recipient ID of any current OSCORE Security Context.
section: 4.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
