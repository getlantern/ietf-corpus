document: rfc-6325
kind: protocol-element
summary: The ESADI (End-Station Address Distribution Information) protocol is a per-VLAN IS-IS instance carried in TRILL Data frames (Inner.MacDA All-ESADI-RBridges, L2-IS-IS Ethertype). It allows appointed VLAN-x forwarders to optionally distribute authenticated MAC address information to other RBridges, providing more authoritative learning than data-plane snooping.
section: 4.2.5
topics:
    - routing
    - security
