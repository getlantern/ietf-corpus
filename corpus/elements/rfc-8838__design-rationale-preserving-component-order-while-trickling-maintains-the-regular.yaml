document: rfc-8838
kind: design-rationale
summary: Preserving component order while trickling maintains the regular ICE property that connectivity checks for the same foundation and component are attempted simultaneously by both agents. This simultaneous checking is important for NAT traversal because it allows firewalls to whitelist both endpoints via the hole-punching effect.
section: "17"
topics:
