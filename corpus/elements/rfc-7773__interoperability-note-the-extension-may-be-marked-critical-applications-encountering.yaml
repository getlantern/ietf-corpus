document: rfc-7773
kind: interoperability-note
summary: The extension MAY be marked critical. Applications encountering an unrecognized authentication context type in a non-critical extension must ignore it; in a critical extension, they must reject the certificate. This mirrors standard X.509 criticality handling.
section: "2"
topics:
