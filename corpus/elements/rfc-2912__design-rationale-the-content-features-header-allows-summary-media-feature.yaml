document: rfc-2912
kind: design-rationale
summary: The 'Content-features:' header allows summary media feature information to be provided about a multipart composite without requiring recipients to open and examine the inner content. This is particularly useful for opaque composites such as 'application/zip' or encrypted messages where examining content to discover features is not possible.
section: 3.2.2
topics:
    - email
