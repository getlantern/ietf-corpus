document: rfc-1766
kind: design-rationale
summary: All primary tag values other than 2-letter ISO 639 codes, 'i', and 'x' are reserved to remain open toward new revisions of ISO 639. The 'i' and 'x' designations are the minimum mechanism needed to extend the tag scheme to meet future requirements.
