document: rfc-8629
kind: normative-requirement
summary: The Reserved field in the Hop Count Data Item MUST be set to zero by the sender (a modem) and ignored by the receiver (a router). The Hop Count field MUST contain a value of at least one (1) if the associated destination is reachable.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
