document: rfc-6607
kind: normative-requirement
summary: VSS information MUST be included in every client message concerning any IP address on a VPN other than the global or default VPN. A client that does not receive its requested VSS option (or receives a different value) in a reply SHOULD drop the packet, since the allocated address will not be on the requested VPN.
section: "6"
rfc2119_level: MUST
topics:
    - dns
