document: rfc-7145
kind: protocol-element
summary: Login/Text keys TargetRecvDataSegmentLength (Section 6.4) and InitiatorRecvDataSegmentLength (Section 6.5) declare the maximum size of an iSER Message (RDMA Send payload) that the target and initiator, respectively, can receive. These replace the single MaxRecvDataSegmentLength semantics for iSER connections.
section: "6.4"
