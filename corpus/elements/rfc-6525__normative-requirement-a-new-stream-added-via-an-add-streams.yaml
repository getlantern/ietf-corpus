document: rfc-6525
kind: normative-requirement
summary: A new stream added via an Add Streams request MUST use SSN 0 for its first ordered message. The sender MUST await a positive Success acknowledgment before using any additional streams added by such a request.
section: 5.1.5
rfc2119_level: MUST
topics:
