document: rfc-8945
kind: normative-requirement
summary: When a server detects a key or MAC error, it SHOULD send back an unsigned error message (MAC Size == 0 and empty MAC) and MUST NOT send back a signed error message. For time validity or truncation policy errors, the server SHOULD send back a signed error message.
section: 5.3.2
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
