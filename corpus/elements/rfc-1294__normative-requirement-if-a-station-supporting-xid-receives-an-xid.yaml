document: rfc-1294
kind: normative-requirement
summary: If a station supporting XID receives an XID frame, it shall respond with an XID response, and if the remote maximum frame size is smaller than the local maximum, the local system shall reduce its maximum size to the remote value before generating the response.
section: "8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
