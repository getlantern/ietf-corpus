document: rfc-6558
kind: design-rationale
summary: Implementations may defer actual conversion until results are needed for script processing, to avoid doing conversions unnecessarily. For example, if a 'convert' action is processed but a 'discard' action results, the conversion need not actually be performed.
section: "2"
