document: rfc-7618
kind: normative-requirement
summary: A DHCP 4o6 server serving only shared-address pools MUST discard requests that do not contain OPTION_V4_PORTPARAMS in the Parameter Request List option, ensuring non-supporting clients do not inadvertently receive shared addresses.
