document: rfc-6710
kind: design-rationale
summary: Priority applies per message rather than per recipient to keep the protocol simpler, based on the expectation that different priorities per recipient on the same message will be uncommon. When needed, senders can send separate messages with the same content segregated by priority.
section: Appendix E
topics:
    - email
