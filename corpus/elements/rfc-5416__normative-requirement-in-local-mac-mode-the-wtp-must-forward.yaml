document: rfc-5416
kind: normative-requirement
summary: In Local MAC mode, the WTP MUST forward all IEEE 802.1X, EAP, and RSNA Key Management frames to the AC and forward the corresponding responses to the station, ensuring the AAA client and RSNA Key Management remain on the AC.
