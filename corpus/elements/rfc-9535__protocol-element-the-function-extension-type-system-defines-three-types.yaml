document: rfc-9535
kind: protocol-element
summary: 'The function extension type system defines three types: ValueType (JSON values or the special result Nothing), LogicalType (LogicalTrue or LogicalFalse), and NodesType (nodelists). NodesType can be implicitly converted to LogicalType but not to ValueType.'
