document: rfc-9090
kind: interoperability-note
summary: For OIDs under '1.3.6.1.4.1', both tag 111 and tag 112 representations are valid, but tag 112 is the preferred serialization. Decoders implementing deterministic encoding MUST accept tag 112 as equivalent to tag 111 with the prefix h'2b06010401' in the enclosed byte string.
section: "2.2"
topics:
