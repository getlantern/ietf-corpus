document: rfc-4036
kind: design-rationale
summary: Separate upstream and downstream filter groups are defined for cable modem traffic versus subscriber host traffic, distinguished solely by MAC address match. This enables operators to apply different policies to modems (e.g., server-subnet-only access) versus their attached hosts.
section: 3.2.3
topics:
    - snmp
