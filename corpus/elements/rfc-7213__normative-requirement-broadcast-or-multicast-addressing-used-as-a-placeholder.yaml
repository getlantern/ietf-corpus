document: rfc-7213
kind: normative-requirement
summary: Broadcast or multicast addressing used as a placeholder for an unknown unicast MAC address MUST NOT be used on links not known to be point-to-point. The implementation MUST provide a means for the operator to declare that a link is point-to-point if it supports these addressing modes.
section: "2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
