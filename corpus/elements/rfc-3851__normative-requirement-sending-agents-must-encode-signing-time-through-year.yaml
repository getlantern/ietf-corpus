document: rfc-3851
kind: normative-requirement
summary: Sending agents MUST encode signing time through year 2049 as UTCTime; times in 2050 or later MUST be encoded as GeneralizedTime. In UTCTime, YY >= 50 is interpreted as 19YY; YY < 50 is interpreted as 20YY.
section: 2.5.1
rfc2119_level: MUST
topics:
    - email
    - crypto
