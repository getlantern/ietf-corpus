document: rfc-7925
kind: interoperability-note
summary: The SNI extension cannot be used with constrained servers that are not provisioned with DNS domain names (e.g., local IoT devices identified by EUI-64), because SNI does not offer the ability to convey a 64-bit EUI-64 identifier.
section: 4.4.1
topics:
