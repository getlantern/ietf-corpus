document: rfc-7389
kind: wire-format
summary: The LMA User-Plane Address mobility option (Type=59) carries an 8-bit Type, 8-bit Length, 16-bit Reserved field (must be zero), and a variable-length LMA User-Plane Address field holding either a 32-bit IPv4 address or a 128-bit IPv6 address. Alignment requirement is 8n+2.
section: "4"
topics:
