document: rfc-7493
kind: security-consideration
summary: All security considerations that apply to JSON (RFC 7159) apply equally to I-JSON. There are no additional security considerations specific to I-JSON. Because I-JSON forbids JSON idioms that can lead to unpredictable behavior in receiving software, it may be a more secure basis for Internet protocols.
section: "5"
topics:
