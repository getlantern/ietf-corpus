document: rfc-7267
kind: normative-requirement
summary: If the PW AII routing table lookup does not yield a next-hop IP address, the destination AII is unreachable, PW setup MUST fail, and a Label Release MUST be returned with status 'AII Unreachable'. All PEs capable of dynamic MS-PW path selection MUST build a PW AII routing table.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
