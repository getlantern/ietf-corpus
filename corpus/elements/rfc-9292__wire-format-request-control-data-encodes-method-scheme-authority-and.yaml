document: rfc-9292
kind: wire-format
summary: Request Control Data encodes Method, Scheme, Authority, and Path as an ordered sequence of length-prefixed byte strings. Where HTTP/2 would omit the ':authority' pseudo-header, a zero-length value is encoded instead.
