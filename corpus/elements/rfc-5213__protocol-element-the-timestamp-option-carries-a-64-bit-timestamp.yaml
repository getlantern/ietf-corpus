document: rfc-5213
kind: protocol-element
summary: The Timestamp option carries a 64-bit timestamp (in NTP format) inserted by the MAG for message ordering at the LMA. The LMA accepts a PBU only if its timestamp is strictly greater than the most recently accepted timestamp for that mobility session.
section: "8.8"
topics:
