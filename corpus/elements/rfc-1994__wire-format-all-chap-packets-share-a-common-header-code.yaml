document: rfc-1994
kind: wire-format
summary: 'All CHAP packets share a common header: Code (1 octet identifying packet type — 1=Challenge, 2=Response, 3=Success, 4=Failure), Identifier (1 octet), and Length (2 octets, inclusive of the entire packet). Octets beyond the Length field are treated as Data Link Layer padding and ignored.'
