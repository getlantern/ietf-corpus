document: rfc-7541
kind: design-rationale
summary: The encoder is solely responsible for deciding which header fields to insert into the dynamic table; the decoder executes the encoder's prescribed modifications without discretion. This asymmetry keeps decoders simple and enables wide interoperability.
section: "1.1"
