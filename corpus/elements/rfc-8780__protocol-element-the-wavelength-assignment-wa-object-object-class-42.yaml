document: rfc-8780
kind: protocol-element
summary: The Wavelength Assignment (WA) object (Object-Class 42, Object-Type 1) is a new PCEP object carrying wavelength-assignment-related constraints in a PCReq message. It contains a 16-bit Flags field (with M bit for allocation mode) followed by variable-length TLVs; at least one TLV MUST be present.
