document: rfc-5177
kind: normative-requirement
summary: If a dynamic routing protocol is used between the Mobile Router and Home Agent, routing updates SHOULD be protected with IPsec ESP confidentiality to prevent home network topology information from being visible to eavesdroppers.
section: "10.1"
rfc2119_level: SHOULD
topics:
