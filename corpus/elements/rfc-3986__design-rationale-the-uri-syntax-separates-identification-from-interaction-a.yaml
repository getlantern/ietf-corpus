document: rfc-3986
kind: design-rationale
summary: 'The URI syntax separates identification from interaction: a URI identifies a resource but neither guarantees nor implies that the resource is accessible. Operations on the resource (access, update, replace) are defined by the protocols that use URIs, not by the URI specification itself.'
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
