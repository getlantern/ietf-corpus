document: rfc-7653
kind: protocol-element
summary: The catch-up phase occurs when ACTIVELEASEQUERY includes OPTION_LQ_START_TIME. The server sends historical binding data (possibly interleaved with real-time updates) until it signals completion with a LEASEQUERY-DATA containing status CatchUpComplete or DataMissing.
section: 8.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
