document: rfc-5884
kind: security-consideration
summary: Security considerations from [BFD], [BFD-MHOP], and [RFC4379] all apply. For MPLS-encapsulated BFD Control packets, MPLS security considerations apply. When BFD Control packets sent by the egress LSR are routed, the authentication considerations in [BFD-MHOP] should be followed.
section: "8"
topics:
