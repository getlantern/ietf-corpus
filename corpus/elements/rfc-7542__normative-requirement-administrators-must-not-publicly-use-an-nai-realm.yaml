document: rfc-7542
kind: normative-requirement
summary: Administrators MUST NOT publicly use an NAI realm without first owning the corresponding FQDN. Administration of NAI realm names piggybacks on the DNS namespace administration, and rights to use an NAI realm are obtained coincident with acquiring the corresponding FQDN.
section: "5"
rfc2119_level: MUST
topics:
    - radius
    - dns
