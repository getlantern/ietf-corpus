document: rfc-1427
kind: normative-requirement
summary: A successful 250 reply to the extended MAIL command does not guarantee successful transfer. SMTP clients using the extended MAIL command must still be prepared to handle temporary and permanent error replies (including 452 and 552) after issuing DATA or after message transfer.
section: "6.2"
rfc2119_level: MUST
topics:
    - email
