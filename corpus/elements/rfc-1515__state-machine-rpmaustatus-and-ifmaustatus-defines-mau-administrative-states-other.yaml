document: rfc-1515
kind: state-machine
summary: 'rpMauStatus (and ifMauStatus) defines MAU administrative states: other(1), unknown(2), operational(3), standby(4), shutdown(5), reset(6). Writing reset(6) triggers a power-cycle equivalent; writing standby(4) to a mixing-type MAU or AUI instead causes the shutdown state. The agent is not required to return the value reset(6).'
section: 4.1.1
topics:
