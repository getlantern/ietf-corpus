document: rfc-8260
kind: protocol-element
summary: The I-DATA chunk (Type=64) is a new SCTP chunk for payload data supporting user message interleaving. It replaces the SSN field of DATA chunks with a 32-bit Message Identifier (MID) and adds a Fragment Sequence Number (FSN) field shared with the PPID location, with the B bit determining which value is present. The chunk header is 20 bytes, 4 bytes more than DATA.
section: "2.1"
topics:
    - sctp
    - webrtc
