document: rfc-9703
kind: protocol-element
summary: PeerSet SID Sub-TLV (Type 40) represents a set of peer nodes/links over which load-balancing occurs, carrying Local AS Number (4 octets), Local BGP Router ID (4 octets), No. of elements in set (2 octets), Reserved (2 octets), followed by one or more Remote AS Number / Remote BGP Router ID pairs (8 octets each).
