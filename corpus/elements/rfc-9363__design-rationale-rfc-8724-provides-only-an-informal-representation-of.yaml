document: rfc-9363
kind: design-rationale
summary: RFC 8724 provides only an informal representation of SCHC Rules; this document formalizes them as a YANG data model to ensure the same definition on both ends of a constrained network link and to enable one SCHC instance to update specific values (e.g., IPv6 prefix, destination address) in the other.
section: "1"
topics:
    - yang
    - netconf
