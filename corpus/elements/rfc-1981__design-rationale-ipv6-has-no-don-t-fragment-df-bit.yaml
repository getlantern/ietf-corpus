document: rfc-1981
kind: design-rationale
summary: IPv6 has no Don't Fragment (DF) bit and no MTU plateau tables, unlike the IPv4 Path MTU Discovery mechanism in RFC 1191. All Packet Too Big messages in IPv6 report the actual MTU of the constricting link, eliminating the need for old-style messages or plateau tables.
section: Appendix A
topics:
