summary: Major type 7 encodes simple values (false=20, true=21, null=22, undefined=23), extended simple values in a following byte (values 32–255), and IEEE 754 floating-point in 16 bits (additional info 25), 32 bits (26), or 64 bits (27). The 'break' stop code is 0b111_11111 (0xFF).
