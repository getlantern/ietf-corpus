document: rfc-8621
kind: normative-requirement
summary: Every Email MUST belong to a Thread, even if it is the only Email in the Thread, and the threadId property is immutable. If the server merges Threads, it MUST do so by deleting and reinserting Emails that change threadId.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - json
