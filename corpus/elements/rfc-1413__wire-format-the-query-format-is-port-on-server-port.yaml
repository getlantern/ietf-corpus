document: rfc-1413
kind: wire-format
summary: 'The query format is ''<port-on-server> , <port-on-client>'' where each port is a decimal integer (1–5 digits). The client must reverse the local/remote port perspective: a locally observed connection of 23, 6191 must be queried as ''6191, 23'' when sent to the server.'
