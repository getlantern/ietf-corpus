document: rfc-5751
kind: normative-requirement
summary: multipart/signed entities that will be transmitted over 7-bit SMTP infrastructure MUST have transfer encoding applied to represent all content as 7-bit text. S/MIME implementations MUST be able to handle binary MIME objects in non-multipart/signed contexts.
