document: rfc-2910
kind: normative-requirement
summary: For out-of-band value-tag fields (such as 'unsupported'), the value-length MUST be 0 and the value MUST be empty. For binary signed integer attribute types, the sender MUST encode the value in exactly four octets. For character-string types, the sender MUST encode without padding characters.
section: "3.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
