document: rfc-8323
kind: normative-requirement
summary: A CoAP client observing resources over a reliable transport MUST explicitly deregister by issuing a GET request with the Observe Option set to 1 (deregister), rather than relying on a Reset message as with CoAP over UDP.
section: "7.4"
rfc2119_level: MUST
topics:
    - tcp
