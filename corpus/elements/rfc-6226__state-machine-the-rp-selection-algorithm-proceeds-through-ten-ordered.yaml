document: rfc-6226
kind: state-machine
summary: 'The RP selection algorithm proceeds through ten ordered steps: (1) Embedded-RP extraction, (2) SSM/Dense Mode termination with no mapping, (3) subset selection by matching group prefix, (4) termination if no entries, (5) longest prefix match, (6) BIDIR preferred over PIM-SM, (7) dynamic preferred over static with BSR preferred over Auto-RP, (8) lowest BSR Candidate-RP-Advertisement priority value wins, (9) BSR hash function for PIM-SM tiebreak, (10) highest RP IP address as final tiebreaker.'
section: "6"
topics:
