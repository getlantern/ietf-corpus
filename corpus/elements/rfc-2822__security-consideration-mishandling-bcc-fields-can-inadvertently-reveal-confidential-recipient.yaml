document: rfc-2822
kind: security-consideration
summary: Mishandling 'Bcc:' fields can inadvertently reveal confidential recipient addresses. When the field is removed entirely, blind recipients may accidentally expose their inclusion by replying to all. When a 'Bcc:' copy is sent, if all blind addresses are listed together, each blind recipient sees the others. Implementations must process replies carefully to avoid leaking Bcc recipients.
section: "5"
topics:
    - email
    - security
    - privacy
