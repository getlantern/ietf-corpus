document: rfc-5025
kind: design-rationale
summary: The <sphere> condition is noted as primarily useful for matching transformation rules rather than subscription handling actions, because its value changes dynamically and a change could suddenly terminate a subscription with no way for the watcher to know when it would be reinstated.
