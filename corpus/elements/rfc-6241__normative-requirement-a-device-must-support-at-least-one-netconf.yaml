document: rfc-6241
kind: normative-requirement
summary: A device MUST support at least one NETCONF session and SHOULD support multiple concurrent sessions. Global configuration changes made in any authorized session are visible across all sessions.
section: "1.2"
rfc2119_level: MUST
topics:
