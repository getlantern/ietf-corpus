document: rfc-6478
kind: normative-requirement
summary: When the PW status code is cleared to zero, the PW OAM message is sent normally but transmission ceases after 3 messages at one-second intervals. If acknowledged, a timer value of zero MUST be used, which SHOULD cause the sender to stop sending and resume normal operation.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
