document: rfc-5348
kind: interoperability-note
summary: DCCP Congestion Control ID profiles CCID-3 (RFC 4342) and CCID-4 SHOULD use RFC 5348 instead of RFC 3448 for the TFRC specification. RFC 5348 obsoletes RFC 3448 and updates RFC 4342; the main change is adding mechanisms to handle data-limited senders and incorporating RFC 3390's higher initial sending rates.
section: "1"
topics:
    - congestion
    - tcp
