document: rfc-2821
kind: protocol-element
summary: EHLO command identifies the SMTP client to the server and requests a list of supported service extensions. The server responds with a multiline 250 reply listing extension keywords and optional parameters. HELO is the legacy fallback that MUST be supported but does not return extension information.
section: 4.1.1.1
