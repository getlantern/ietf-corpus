document: rfc-7395
kind: normative-requirement
summary: During the WebSocket handshake, the client MUST include 'xmpp' in the 'Sec-WebSocket-Protocol' header, and the server's reply MUST also contain 'xmpp' in its own 'Sec-WebSocket-Protocol' header for an XMPP subprotocol connection to be established.
section: "3.1"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
