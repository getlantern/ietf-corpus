document: rfc-3748
kind: wire-format
summary: Request (Code=1) and Response (Code=2) packets extend the base EAP header with a 1-octet Type field and variable-length Type-Data field. The Type field of a Response MUST either match the Request Type or be a Legacy Nak (Type 3) or Expanded Nak (Type 254).
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
