document: rfc-7564
kind: security-consideration
summary: False positives and false negatives in string comparison can compromise authentication and authorization. If strings that appear identical to users are programmatically distinct across systems, or vice versa, security vulnerabilities arise. Profile proliferation exacerbates this risk.
section: "12.1"
topics:
    - security
