document: rfc-4822
kind: normative-requirement
summary: A router that has forgotten its current sequence number but remembers its Security Association MUST send its first packet with a sequence number of zero; implementers SHOULD provide non-volatile storage for all Security Association components and last received sequence numbers.
section: 2.3.2
rfc2119_level: MUST
topics:
    - routing
    - security
