document: rfc-8919
kind: security-consideration
summary: Tampering with the application-specific link attribute advertisements defined in this document may impact traffic engineering applications. Because the advertisements are scoped to specific applications, the impact of tampering is similarly limited in scope. Stronger IS-IS authentication mechanisms from RFC 5304 and RFC 5310 SHOULD be used in deployments where potential attackers have access to the IS-IS routing domain.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
