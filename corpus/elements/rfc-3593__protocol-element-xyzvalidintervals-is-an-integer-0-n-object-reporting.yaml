document: rfc-3593
kind: protocol-element
summary: xyzValidIntervals is an INTEGER (0..n) object reporting the number of previous near-end intervals for which data was collected, where 1 ≤ n ≤ 96. In proxy situations, it is the maximum interval number for which data is available.
