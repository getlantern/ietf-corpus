document: rfc-1629
kind: protocol-element
summary: 'NSAP addresses are hierarchically structured into the Initial Domain Part (IDP: AFI + IDI) and Domain Specific Part (DSP: HO-DSP + ID + SEL). For IS-IS routing, the area address is the concatenation of IDP and HO-DSP; the ID field (1–8 octets, fixed per domain) identifies the system; the SEL field (always 1 octet) identifies the transport entity within the system.'
section: "3.2"
topics:
    - routing
