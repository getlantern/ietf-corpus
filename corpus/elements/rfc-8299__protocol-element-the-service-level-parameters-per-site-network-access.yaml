summary: The service-level parameters per site-network-access include `svc-input-bandwidth` (uint64, ingress committed bandwidth in bps), `svc-output-bandwidth` (uint64, egress committed bandwidth in bps), and `svc-mtu` (uint16, Layer 3 MTU in bytes). These are mandatory fields within the `service` container.
