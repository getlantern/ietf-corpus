document: rfc-5541
kind: protocol-element
summary: The OF-List TLV (type 4) is an optional TLV carried within the PCEP OPEN object, allowing a PCE to advertise the list of objective functions it supports during session setup. The value field contains a list of 2-byte objective function code points; length is N*2 where N is the number of objective functions.
section: "2.1"
topics:
    - routing
    - registry
