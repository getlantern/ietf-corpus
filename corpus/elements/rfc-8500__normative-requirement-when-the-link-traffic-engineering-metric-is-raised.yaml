document: rfc-8500
kind: normative-requirement
summary: When the link Traffic Engineering metric is raised to (2^24 - 1), this SHOULD immediately trigger CSPF recalculation to move TE traffic away from that link. It is RECOMMENDED that CSPF also immediately recalculate when TE metric is raised to (2^24 - 2) as a last resort link.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
