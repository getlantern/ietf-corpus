document: rfc-3484
kind: design-rationale
summary: Public addresses are preferred over temporary addresses by default (Rule 7) to avoid application failures caused by the short lifetime of temporary addresses or reverse-lookup failures. Implementations where privacy outweighs compatibility MAY reverse this default.
