document: rfc-2366
kind: protocol-element
summary: Multicast group address blocks are represented throughout the MIB as (MinGrpAddr, MaxGrpAddr) IpAddress pairs forming consecutive ranges; equal min and max values denote a single-group block. The marsMcGrpTable entries must be created before being referenced as indices by the host map or server map tables.
