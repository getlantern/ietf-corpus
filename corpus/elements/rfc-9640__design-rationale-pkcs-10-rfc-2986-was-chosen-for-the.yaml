document: rfc-9640
kind: design-rationale
summary: 'PKCS #10 (RFC 2986) was chosen for the generate-csr action over Certificate Request Message Format (CRMF, RFC 4211) because it was unclear whether there was market demand for CRMF. A backwards-compatible CRMF-supporting solution can be defined in the future if desired.'
