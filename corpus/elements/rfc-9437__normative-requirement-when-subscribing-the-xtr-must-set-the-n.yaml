document: rfc-9437
kind: normative-requirement
summary: When subscribing, the xTR MUST set the N-bit to 1 on each EID-Record for which it wants to receive notifications. If the xTR has an existing nonce for that EID-Prefix it MUST use that nonce incremented by one; otherwise it generates a fresh nonce per RFC 9301.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
