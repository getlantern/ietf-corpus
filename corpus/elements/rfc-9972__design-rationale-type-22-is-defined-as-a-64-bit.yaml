document: rfc-9972
kind: design-rationale
summary: Type 22 is defined as a 64-bit Gauge (not a counter like Stat Type 0) to reflect the current number of routes rejected by an inbound policy, because this number can decrease as policy configurations change — making a monotonically increasing counter semantically incorrect for this use case.
section: "3.2"
