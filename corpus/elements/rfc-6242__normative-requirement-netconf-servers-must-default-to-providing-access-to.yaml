document: rfc-6242
kind: normative-requirement
summary: NETCONF servers MUST default to providing access to the 'netconf' SSH subsystem only when the SSH session is established using TCP port 830. Servers SHOULD be configurable to allow access over other ports.
section: "3"
rfc2119_level: MUST
