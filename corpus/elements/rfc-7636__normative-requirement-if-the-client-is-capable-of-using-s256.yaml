document: rfc-7636
kind: normative-requirement
summary: If the client is capable of using 'S256', it MUST use 'S256', as 'S256' is Mandatory To Implement (MTI) on the server. Clients are permitted to use 'plain' only if they cannot support 'S256' for some technical reason and know via out-of-band configuration that the server supports 'plain'.
section: "4.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
