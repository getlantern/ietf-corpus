document: rfc-8012
kind: interoperability-note
summary: Deployments of RFC 6790 typically have a mixture of nodes that support ELI/EL and nodes that do not, and a mixture of areas that use ELI/EL and areas that do not. The existing RFC 4379 and RFC 6424 mechanisms are insufficient in these mixed environments, which motivated this extension.
section: "1.2"
topics:
    - mpls
    - routing
