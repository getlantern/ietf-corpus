document: rfc-9619
kind: normative-requirement
summary: A DNS message with OPCODE = 0 and QDCOUNT > 1 MUST be treated as an incorrectly formatted message. The RCODE in the response MUST be set to 1 (FORMERR).
section: "4"
rfc2119_level: MUST
