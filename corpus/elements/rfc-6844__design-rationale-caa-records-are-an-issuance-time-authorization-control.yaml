document: rfc-6844
kind: design-rationale
summary: CAA records are an issuance-time authorization control checked by the CA before issuance, whereas DANE TLSA records are a post-issuance verification control checked by relying parties. The two mechanisms are complementary and address different points in the certificate lifecycle.
