document: rfc-4975
kind: normative-requirement
summary: MSRP MUST be used only in the context of a rendezvous mechanism that provides both MSRP URIs to participating endpoints and protects their confidentiality; the URIs MUST NOT be made available to untrusted third parties or be easily discoverable.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
    - security
