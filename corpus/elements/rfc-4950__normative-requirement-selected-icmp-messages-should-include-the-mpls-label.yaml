document: rfc-4950
kind: normative-requirement
summary: Selected ICMP messages SHOULD include the MPLS label stack as it arrived at the router sending the ICMP message. The ICMP message MUST also include the IP header and leading payload octets of the original datagram.
section: "1"
rfc2119_level: SHOULD
topics:
    - mpls
    - ip
    - security
