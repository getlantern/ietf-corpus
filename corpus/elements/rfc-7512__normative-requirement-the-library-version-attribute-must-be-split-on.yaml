document: rfc-7512
kind: normative-requirement
summary: The 'library-version' attribute MUST be split on '.' into major and minor, treating bare 'M' as minor=0, then major and minor MUST be compared numerically separately, as a scheme-based normalization per RFC 3986 Section 6.2.3.
section: "2.6"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
