document: rfc-8543
kind: normative-requirement
summary: 'Parent identifier loops MUST be prohibited: if organization A has organization B as its parent identifier, organization B cannot have organization A as its parent identifier, and this extends to larger loops involving three or more organizations.'
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
