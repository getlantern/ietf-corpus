document: rfc-8189
kind: normative-requirement
summary: The Client MUST specify either 'cost-type' or 'multi-cost-types' but MUST NOT specify both. When placing a single cost request as in RFC 7285, a Client MUST use 'cost-type'.
section: 4.1.2
rfc2119_level: MUST
