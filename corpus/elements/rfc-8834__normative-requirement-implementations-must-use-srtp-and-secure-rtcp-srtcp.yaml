document: rfc-8834
kind: normative-requirement
summary: Implementations MUST use SRTP and Secure RTCP (SRTCP). The RTP/SAVPF profile MUST be configured using the cipher suites, DTLS-SRTP protection profiles, keying mechanisms, and other parameters described in RFC 8827.
section: "4.2"
rfc2119_level: MUST
topics:
