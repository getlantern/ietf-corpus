document: rfc-6407
kind: wire-format
summary: 'The Key Download (KD) payload contains: Next Payload (1 octet), RESERVED (1 octet), Payload Length (2 octets), Number of Key Packets (2 octets), RESERVED2 (2 octets), and variable Key Packets. Each Key Packet has: KD Type (1 octet), RESERVED (1 octet), KD Length (2 octets), SPI Size (1 octet), SPI (variable), and Key Packet Attributes (variable). KD Types: TEK=1, KEK=2, LKH=3, SID=4.'
