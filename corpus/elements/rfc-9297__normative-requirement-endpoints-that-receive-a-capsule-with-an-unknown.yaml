document: rfc-9297
kind: normative-requirement
summary: Endpoints that receive a Capsule with an unknown Capsule Type MUST silently drop that Capsule and skip over it to parse the next Capsule. Intermediaries SHOULD forward unknown Capsule Types without modification.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
