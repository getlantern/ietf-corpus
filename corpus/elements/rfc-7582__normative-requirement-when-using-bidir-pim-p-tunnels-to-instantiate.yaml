document: rfc-7582
kind: normative-requirement
summary: When using BIDIR-PIM P-tunnels to instantiate an I-PMSI or S-PMSI, it is RECOMMENDED that the path from each PE to the RPA consist entirely of point-to-point links to avoid complexity from BIDIR-PIM Designated Forwarder Election on multiaccess links.
section: 3.1.1
rfc2119_level: RECOMMENDED
topics:
    - routing
    - mpls
    - multicast
