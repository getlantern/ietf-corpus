document: rfc-5182
kind: protocol-element
summary: The SAVE result option instructs the server to store the result of a SEARCH or UID SEARCH command in an internal "search result variable". The client subsequently references this variable using the "$" marker in place of a message sequence set or UID sequence set.
section: "2.1"
