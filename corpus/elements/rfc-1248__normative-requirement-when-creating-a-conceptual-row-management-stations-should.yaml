document: rfc-1248
kind: normative-requirement
summary: When creating a conceptual row, management stations should include as many columnar objects as possible (especially all read-write objects) in the Set-Request; agents should accept a Set-Request with as few objects as needed, per the Internet Robustness Principle.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - snmp
    - routing
