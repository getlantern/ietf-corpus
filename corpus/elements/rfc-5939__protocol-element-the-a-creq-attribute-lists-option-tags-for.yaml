document: rfc-5939
kind: protocol-element
summary: The 'a=creq' attribute lists option tags for SDP Capability Negotiation extensions that MUST be supported by the recipient in order to properly process the capability negotiation. A recipient lacking support for a listed extension MUST ignore capability negotiation attributes and fall back to standard RFC 3264 procedures.
section: 3.3.2
topics:
    - realtime
    - sip
