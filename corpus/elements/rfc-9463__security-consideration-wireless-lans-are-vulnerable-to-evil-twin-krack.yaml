document: rfc-9463
kind: security-consideration
summary: Wireless LANs are vulnerable to evil-twin, KRACK, and Dragonblood attacks. Because DHCP and RA messages are unauthenticated, information provided over WLANs using shared PSK (WPA-PSK) is untrusted. Using per-device credentials (802.1x / EAP-pwd or unique PSKs) provides mutual authentication and is the recommended mitigation.
section: "7.4"
topics:
    - dns
    - security
