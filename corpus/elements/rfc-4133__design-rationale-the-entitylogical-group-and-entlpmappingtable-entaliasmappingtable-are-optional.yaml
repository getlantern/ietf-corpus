document: rfc-4133
kind: design-rationale
summary: The entityLogical group and entLPMappingTable/entAliasMappingTable are optional for agents that represent all MIB objects within a single naming scope. This conscious scoping decision limits the MIB's complexity; most objects have read-only MAX-ACCESS to keep the scope narrow.
section: "2.10"
topics:
