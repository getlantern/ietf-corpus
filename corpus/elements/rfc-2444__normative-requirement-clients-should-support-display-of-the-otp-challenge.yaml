document: rfc-2444
kind: normative-requirement
summary: Clients SHOULD support display of the OTP challenge to the user and entry of an OTP in multi-word format. Clients MAY also support direct entry of the pass phrase and compute the 'hex' or 'word' response.
section: "3"
rfc2119_level: SHOULD
