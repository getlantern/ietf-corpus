document: rfc-1065
kind: protocol-element
summary: The ObjectSyntax CHOICE encompasses SimpleSyntax (INTEGER, OCTET STRING, OBJECT IDENTIFIER, NULL) and ApplicationSyntax (NetworkAddress, Counter, Gauge, TimeTicks, Opaque). Application-wide types must resolve IMPLICITly to a primitive, list, table, or other application-wide type.
section: "3.2"
