document: rfc-2835
kind: normative-requirement
summary: A HARP server SHOULD use PIBES to send HARP_REPLYs to all hardware addresses in its table when mappings change, reducing stale entries in clients. The HARP server MUST update a HARP table entry's timeout for each HARP_REQUEST received.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - ip
