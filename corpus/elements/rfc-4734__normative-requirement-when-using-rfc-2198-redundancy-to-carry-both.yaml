document: rfc-4734
kind: normative-requirement
summary: When using RFC 2198 redundancy to carry both telephone-event and data payload simultaneously, the data payload and events MUST cover exactly the same content over the same time period; otherwise spurious events will be detected downstream.
section: "3"
rfc2119_level: MUST
topics:
