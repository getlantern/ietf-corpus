document: rfc-4250
kind: normative-requirement
summary: All IANA-registered SSH names MUST be printable US-ASCII strings and MUST NOT contain '@', ',', whitespace, control characters (ASCII ≤ 32), or DEL (127). Names are case-sensitive and MUST NOT be longer than 64 characters.
section: 4.6.1
rfc2119_level: MUST
topics:
    - registry
    - security
