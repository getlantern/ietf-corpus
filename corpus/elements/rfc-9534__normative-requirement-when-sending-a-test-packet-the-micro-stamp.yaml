document: rfc-9534
kind: normative-requirement
summary: When sending a test packet, the micro STAMP Session-Sender MUST set the Sender Micro-session ID field with the member link identifier. If the Reflector member link identifier is known, the Reflector Micro-session ID MUST be set; otherwise it MUST be zero.
section: "3.2"
rfc2119_level: MUST
topics:
