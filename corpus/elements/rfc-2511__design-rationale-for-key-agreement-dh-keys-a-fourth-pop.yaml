document: rfc-2511
kind: design-rationale
summary: 'For key agreement (DH) keys, a fourth POP option (dhMAC) is provided: the entity MACs the certReq using a key derived from a DH computation with the CA''s public key. This proves possession without revealing the private key, and ensures only the intended CA can verify the request.'
