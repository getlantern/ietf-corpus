document: rfc-1985
kind: security-consideration
summary: 'Insufficient sanity-checking on the ''@'' subdomain option could cause severe congestion: a client requesting ETRN @com would trigger release of mail for every address ending in ''com''. Servers must restrict which combinations of option characters and node names each client is permitted to use.'
section: "8"
topics:
    - email
    - security
