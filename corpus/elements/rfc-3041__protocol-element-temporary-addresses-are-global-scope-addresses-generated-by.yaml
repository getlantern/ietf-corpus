document: rfc-3041
kind: protocol-element
summary: Temporary addresses are global-scope addresses generated by appending a randomized (pseudo-random) interface identifier to a prefix, used for outgoing connections for a short period. They coexist with public addresses (derived from IEEE identifiers) that remain stable for use as server addresses registered in DNS.
