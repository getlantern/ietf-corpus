document: rfc-3307
kind: registry
summary: 'IANA rules for permanent IPv6 multicast addresses define four ranges: group IDs 1–0x3FFFFFFF for addresses with IPv4 counterparts; 0x100–0x3FFFFFFF for IPv6-only permanent addresses; 0x40000000–0x7FFFFFFF for permanent group IDs; and 0x80000000–0xFFFFFFFF reserved for dynamic allocation mechanisms.'
