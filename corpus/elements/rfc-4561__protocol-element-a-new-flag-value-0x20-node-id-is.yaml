document: rfc-4561
kind: protocol-element
summary: A new flag value 0x20 (Node-id) is defined for use in existing RRO IPv4 and IPv6 sub-objects. When set, it indicates the address in the sub-object is a node-id — specifically the 'Router Address' per OSPF-TE or 'Traffic Engineering Router ID' per ISIS-TE — rather than an interface address.
section: "3"
topics:
    - mpls
    - routing
