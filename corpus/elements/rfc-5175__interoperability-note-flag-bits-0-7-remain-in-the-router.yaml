document: rfc-5175
kind: interoperability-note
summary: Flag bits 0–7 remain in the Router Advertisement message header as defined in RFC4861; bits 8–55 are carried in the EFO. Implementations that do not support the EFO will simply ignore the option, maintaining backward compatibility with RFC4861 NDP.
