document: rfc-4191
kind: normative-requirement
summary: If the Reserved (10) preference value is received in the RA header, the receiver MUST treat it as Medium (00). If received in a Route Information Option, the option MUST be ignored.
section: "2.2"
rfc2119_level: MUST
