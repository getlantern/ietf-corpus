document: rfc-2746
kind: wire-format
summary: The NODE_CHAR object (proposed class 128, in the 10bbbbbb range, c-type 0, length 8) carries a single T bit indicating that the sending node supports RSVP-over-tunnels; all other bits are reserved. If an RSVP node does not understand this object, it drops it without error.
section: 2.3.2
