document: rfc-6351
kind: normative-requirement
summary: When converting from vCard to xCard, any property lacking a VALUE parameter whose default value type is unknown MUST be converted using the <unknown> XML element containing the unprocessed value text. Any unrecognized property parameter MUST also be converted using <unknown>.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
