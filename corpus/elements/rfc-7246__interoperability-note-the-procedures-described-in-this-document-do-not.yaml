document: rfc-7246
kind: interoperability-note
summary: The procedures described in this document do not support non-bidirectional PIM ASM groups, multicast trees other than mLDP multipoint LSPs in the core, or aggregation of multiple PIM trees onto a single multipoint LSP. RFC 6513 and RFC 6514 procedures should be used if those features are needed.
section: "1"
topics:
