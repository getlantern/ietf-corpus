document: rfc-3182
kind: normative-requirement
summary: A policy-unaware router receiving RSVP messages ignores policy data objects and continues processing; a policy-aware router SHOULD forward the message to the PDP and await its response, rejecting the message if the PDP response is negative.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
