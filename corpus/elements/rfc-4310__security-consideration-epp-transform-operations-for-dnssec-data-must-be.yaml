document: rfc-4310
kind: security-consideration
summary: EPP transform operations for DNSSEC data MUST be restricted to the sponsoring client as authenticated per RFC 3730; any attempt by a non-sponsoring client to perform a transform operation MUST be rejected with an appropriate EPP authorization error.
