document: rfc-3492
kind: design-rationale
summary: 'Bootstring is designed to achieve six properties: completeness (every extended string representable), uniqueness (at most one basic string per extended string), reversibility, efficient encoding (small ratio of basic to extended length), simplicity, and readability (basic code points represented as themselves).'
