document: rfc-6920
kind: protocol-element
summary: An ni URI maps to an HTTP(S) .well-known URL of the form 'http://h-authority/.well-known/ni/alg/val?query-string'. If the ni name specifies a non-empty authority, the h-authority MUST have the same value; if the authority is empty, h-authority MAY be derived from application context such as the web page origin.
section: "4"
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
