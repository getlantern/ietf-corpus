document: rfc-7931
kind: normative-requirement
summary: When the server gets a SETCLIENTID for a client ID string whose existing lease has no state or whose lease has expired, even under an apparent change of principal, the server MUST allow the SETCLIENTID rather than returning NFS4ERR_CLID_INUSE, and MUST confirm the new client ID if followed by the appropriate SETCLIENTID_CONFIRM.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
