document: rfc-2630
kind: normative-requirement
summary: When the signedAttributes field is present in SignerInfo it must contain at minimum a content-type attribute and a message-digest attribute. The signedAttributes field must be present if the encapsulated content type is not id-data.
section: "5.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
