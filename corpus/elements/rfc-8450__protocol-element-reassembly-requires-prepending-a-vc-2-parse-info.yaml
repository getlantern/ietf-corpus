document: rfc-8450
kind: protocol-element
summary: Reassembly requires prepending a VC-2 Parse Info Header (Figure 8) to each reconstructed Data Unit. Receivers MAY combine all Fragment Data Units (PC=0xEC) with the same picture number into a single Picture Data Unit (PC=0xE8); this conversion MUST be done if compliance with VC-2 major versions 1 or 2 is required.
section: 4.5.1
topics:
