document: rfc-7939
kind: normative-requirement
summary: To avoid unnecessary notification floods during NHDP initialization, a router SHOULD NOT originate expected notifications until a predefined, administratively configured time interval has elapsed. It is RECOMMENDED that this interval be at least 3 times nhdpHelloInterval so that symmetric neighbors are discovered before notifications begin.
section: 5.1.3.1
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
