document: rfc-2401
kind: protocol-element
summary: 'The Security Policy Database (SPD) specifies what security services are to be offered to IP datagrams. For any datagram, three processing choices are possible: discard, bypass IPsec, or apply IPsec. The SPD contains an ordered list of policy entries keyed by selectors, and must be consulted for all inbound and outbound traffic.'
section: 4.4.1
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
