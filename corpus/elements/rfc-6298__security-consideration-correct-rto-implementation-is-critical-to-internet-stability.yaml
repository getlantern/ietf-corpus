document: rfc-6298
kind: security-consideration
summary: Correct RTO implementation is critical to Internet stability. Overly aggressive TCP behavior induced by manipulated RTO values could contribute to congestion collapse. The security considerations of RFC 5681 (TCP Congestion Control) also apply.
section: "6"
topics:
    - tcp
    - security
    - congestion
