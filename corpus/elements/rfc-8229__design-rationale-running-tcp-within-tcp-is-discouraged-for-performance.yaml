document: rfc-8229
kind: design-rationale
summary: 'Running TCP within TCP is discouraged for performance reasons: outer TCP packet loss is hidden from inner TCP connections (interpreted as delay, not loss), causing spurious retransmissions, degraded RTT estimation, reduced sending rates, and potential bufferbloat.'
section: "12.1"
topics:
