document: rfc-6902
kind: interoperability-note
summary: When used with the HTTP PATCH method, JSON Patch inherits HTTP PATCH's atomicity requirement (RFC 5789 Section 2.2). A failed "test" operation causes the entire patch — including prior operations in the sequence — to be rolled back.
