document: rfc-9194
kind: protocol-element
summary: The module augments each IS-IS interface with a reverse-metric container for announcing reverse metrics to neighbors, including metric (wide-metric type), flags (whole-lan and allow-unreachable booleans), and exclude-te-metric leaf. Level-specific sub-containers (level-1, level-2) are available only for broadcast interface types.
