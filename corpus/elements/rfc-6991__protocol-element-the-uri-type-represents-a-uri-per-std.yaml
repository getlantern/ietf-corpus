document: rfc-6991
kind: protocol-element
summary: The uri type represents a URI per STD 66 (RFC 3986) in US-ASCII encoding, normalized per RFC 3986 Sections 6.2.1, 6.2.2.1, and 6.2.2.2 (unnecessary percent-encoding removed, case-insensitive characters lowercased except hex digits which are uppercased). A zero-length URI is explicitly invalid and may express 'URI absent'.
