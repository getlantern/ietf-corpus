document: rfc-4220
kind: interoperability-note
summary: Traffic counters (ifInOctets, ifOutOctets, ifInErrors, ifInUnknownProtos, ifOutErrors, ifHCInOctets, ifHCOutOctets) on a TE link are cumulative across all subinterfaces it binds. Support for these counters is not required if the encoding type is clear-channel.
section: "8.1"
topics:
    - mpls
    - routing
    - snmp
