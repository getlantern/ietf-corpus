document: rfc-2396
kind: design-rationale
summary: The URI character set was restricted to digits, basic Latin letters, and a small set of graphic symbols to enable global transcribability across different media (paper, radio, computer input) and keyboard layouts. The ability to transcribe identifiers was considered more important than using maximally meaningful component names.
section: "1.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
