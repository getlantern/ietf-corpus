document: rfc-6409
kind: design-rationale
summary: Message modifications that complete or correct submitted messages (adding Date, Message-ID, qualifying domains) are appropriate at the MSA (first-hop submission) but have been shown to cause harm when performed by downstream MTAs. Concentrating these actions at the MSA is a key motivation for the submission/relay split.
