document: rfc-9926
kind: protocol-element
summary: The 6CIO F flag (bit 16 in the 48-bit capability array) is a new 1-bit field indicating that the 6LR accepts IPv6 prefix registrations, will route traffic for matching addresses to registering 6LNs, and will redistribute the prefix if the R flag is set. The 6LN uses this capability bit to determine whether the 6LR supports prefix registration before attempting it.
section: "5"
topics:
