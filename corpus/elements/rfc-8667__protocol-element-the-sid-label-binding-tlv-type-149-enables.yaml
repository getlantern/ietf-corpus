document: rfc-8667
kind: protocol-element
summary: The SID/Label Binding TLV (Type 149) enables the Segment Routing Mapping Server (SRMS) to advertise prefix-to-SID/Label mappings and also supports Mirror SID advertisements. It carries a Flags octet (F, M, S, D, A bits), a 2-octet Range, Prefix Length, variable Prefix, and sub-TLVs.
section: "2.4"
topics:
