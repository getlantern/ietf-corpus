document: rfc-9926
kind: design-rationale
summary: 'In case of overlapping prefix registrations, the longest prefix match wins: if network policy allows overlapping registrations, routes are installed towards the node that registered with the longest matching prefix, all the way to /128. This allows a host and an aggregating router to both register their respective pieces without conflict.'
section: "7.4"
topics:
    - ip
    - routing
