document: rfc-7057
kind: design-rationale
summary: 'Re-authentication value depends on session characteristics: short-lived sessions or easily replaced sessions likely do not benefit (e.g., HTTP, SMTP where a new connection suffices), while long-lived or costly-to-disrupt connections, or protocols where only one party can initiate reconnection, are prime candidates for re-authentication support.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
