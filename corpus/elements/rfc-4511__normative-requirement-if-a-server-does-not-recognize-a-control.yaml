document: rfc-4511
kind: normative-requirement
summary: If a server does not recognize a control type or is unwilling to apply it, and criticality is TRUE, the server MUST NOT perform the operation and MUST return unavailableCriticalExtension. If criticality is FALSE, the server MUST ignore the unrecognized control and proceed.
section: 4.1.11
rfc2119_level: MUST
topics:
    - ldap
