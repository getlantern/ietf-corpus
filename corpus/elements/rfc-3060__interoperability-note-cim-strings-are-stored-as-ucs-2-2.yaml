document: rfc-3060
kind: interoperability-note
summary: CIM strings are stored as UCS-2 (2 octets per character), while LDAP DirectoryString attributes use UTF-8. Implementations moving string values between CIM and LDAP environments must convert between these encodings per RFC 2279.
section: "5.4"
topics:
    - ldap
