document: rfc-7140
kind: normative-requirement
summary: To set up the upstream path of an HSMP LSP, ordered mode MUST be used. Ordered mode guarantees that a leaf will start sending packets to the root immediately after the upstream path is installed, without packets being dropped due to an incomplete LSP.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
