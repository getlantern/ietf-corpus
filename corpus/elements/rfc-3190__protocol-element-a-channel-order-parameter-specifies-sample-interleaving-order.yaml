summary: A 'channel-order' parameter specifies sample interleaving order for multi-channel audio streams using syntax 'channel-order=<convention>.<order>'. This document defines only the 'DV' convention with specific channel order strings (e.g., LRLsRs, LRCS, LRCWo for 4-channel).
