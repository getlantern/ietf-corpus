document: rfc-4236
kind: protocol-element
summary: The Pause-At-Body parameter allows a callout server to request a pause in original application message body transmission before dataflow starts. Its value is an offset into the non-auxiliary message body, equivalent to receiving a Want Data Paused (DWP) message.
section: 3.2.4
topics:
    - http
