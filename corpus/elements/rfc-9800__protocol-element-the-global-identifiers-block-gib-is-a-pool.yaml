document: rfc-9800
kind: protocol-element
summary: The Global Identifiers Block (GIB) is a pool of CSID values with global semantic within the Locator-Block, shared across all SR segment endpoint nodes; used primarily for node-identifying segments like End. The Local Identifiers Block (LIB) is a per-node pool with local semantic, suitable for adjacency and service segments like End.X, End.DT*, and End.DX*.
section: "5"
