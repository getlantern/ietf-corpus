document: rfc-5874
kind: security-consideration
summary: XCAP diff documents convey document content changes; if the underlying XCAP document requires confidentiality, integrity, or authentication, the same requirements apply to the diff format and its transport. Confidential XCAP documents are typically protected by TLS per RFC 4825.
