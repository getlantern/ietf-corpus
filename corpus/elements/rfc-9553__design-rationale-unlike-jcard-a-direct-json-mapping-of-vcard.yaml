document: rfc-9553
kind: design-rationale
summary: Unlike jCard (a direct JSON mapping of vCard), JSContact defines its own data model and expands semantics where appropriate. This allows it to address missing vCard features (social media, pronouns, structured address components) without being constrained by vCard's structure.
section: "1.1"
