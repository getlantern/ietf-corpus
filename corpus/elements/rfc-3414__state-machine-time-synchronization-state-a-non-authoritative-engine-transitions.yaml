document: rfc-3414
kind: state-machine
summary: 'Time synchronization state: a non-authoritative engine transitions from unsynchronized to synchronized upon receiving an authentic message from the authoritative engine (step 7b of incoming message processing), updating its local snmpEngineBoots, snmpEngineTime, and latestReceivedEngineTime. Resynchronization is triggered whenever the local snmpEngineID changes or when snmpEngineBoots of the remote engine advances beyond the local notion.'
section: "2.3"
topics:
    - snmp
    - security
