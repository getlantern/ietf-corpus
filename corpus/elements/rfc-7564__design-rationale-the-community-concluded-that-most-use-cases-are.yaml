document: rfc-7564
kind: design-rationale
summary: The community concluded that most use cases are addressed by exactly two string classes—IdentifierClass (safety over expressiveness) and FreeformClass (expressiveness over safety)—rather than one per application protocol, in order to enable code sharing and consistent user expectations.
section: "4.1"
