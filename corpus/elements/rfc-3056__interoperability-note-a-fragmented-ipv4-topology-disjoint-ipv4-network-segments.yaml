document: rfc-3056
kind: interoperability-note
summary: 'A fragmented IPv4 topology (disjoint IPv4 network segments each served by separate relay routers with no cross-visibility) breaks 6to4 connectivity: sites on one segment cannot reach sites on the other because the 2002::/16 advertisements are mutually invisible. This scenario must be avoided.'
section: "5.5"
topics:
