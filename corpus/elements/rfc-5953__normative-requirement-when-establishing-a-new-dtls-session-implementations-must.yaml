document: rfc-5953
kind: normative-requirement
summary: When establishing a new DTLS session, implementations MUST use a different UDP source port number for each active connection to a remote destination IP-address/port-number combination to ensure the remote entity can disambiguate between multiple connections.
section: 5.1.1
rfc2119_level: MUST
topics:
    - snmp
    - tls
    - udp
