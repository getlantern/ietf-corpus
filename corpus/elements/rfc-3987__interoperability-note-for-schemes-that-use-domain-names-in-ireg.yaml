document: rfc-3987
kind: interoperability-note
summary: For schemes that use domain names in ireg-name and do not allow percent-encoding there, systems MAY apply the ToASCII operation (RFC 3490) to ireg-name before step 2 of IRI-to-URI mapping; this SHOULD be done when maximizing interoperability with legacy URI resolvers.
section: "3.1"
topics:
    - ip
    - dns
