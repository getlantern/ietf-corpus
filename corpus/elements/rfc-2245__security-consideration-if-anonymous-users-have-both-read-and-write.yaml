document: rfc-2245
kind: security-consideration
summary: If anonymous users have both read and write access to the same area, the server can be used as an anonymous communication channel. Servers accepting anonymous submissions should implement the 'drop box' model forbidding anonymous read access to submission areas.
section: "4"
