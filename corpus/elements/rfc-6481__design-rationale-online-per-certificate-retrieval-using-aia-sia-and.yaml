document: rfc-6481
kind: design-rationale
summary: Online per-certificate retrieval using AIA, SIA, and CRLDP fields is explicitly NOT recommended; instead, each RP should maintain a local repository cache with a synchronized copy of all valid certificates, CRLs, and signed objects to support efficient validation.
