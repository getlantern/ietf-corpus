document: rfc-9728
kind: normative-requirement
summary: The recipient MUST validate that any signed metadata was signed by a key belonging to the issuer and that the signature is valid. If the signature does not validate or the issuer is not trusted, the recipient SHOULD treat this as an error condition.
section: "3.3"
rfc2119_level: MUST
topics:
