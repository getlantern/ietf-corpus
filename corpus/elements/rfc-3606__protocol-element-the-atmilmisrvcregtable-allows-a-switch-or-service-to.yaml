document: rfc-3606
kind: protocol-element
summary: The atmIlmiSrvcRegTable allows a switch or service to advertise ATM network services (LECS, ANS, ATMARP, MARS, NHRP) to adjacent hosts via ILMI. Each entry associates a service OID (atmIlmiSrvcRegServiceID) with an ATM address and optionally restricts it to a specific interface (value 0 means any interface).
section: 3.1.14
topics:
    - realtime
