document: rfc-7705
kind: protocol-element
summary: '''Replace Old AS'' is an outbound mechanism that prevents a router from appending the globally configured ASN in outbound BGP UPDATEs toward eBGP neighbors using the ''Local AS'' mechanism. Instead, only the old (legacy) AS is prepended, preserving the pre-migration AS_PATH length from the customer''s perspective.'
section: "3.2"
topics:
    - bgp
    - routing
