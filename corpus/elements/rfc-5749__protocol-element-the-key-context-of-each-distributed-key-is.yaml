document: rfc-5749
kind: protocol-element
summary: The key context of each distributed key is determined by the sequence of key types (KTs) in the key hierarchy. The key scope is determined by the sequence of (PID, KT, KL)-tuples in the hierarchy plus the KRS identifier. The KDF binds both context and scope into the derived key.
section: "4.1"
topics:
