document: rfc-8599
kind: normative-requirement
summary: If a UA is able to send binding-refresh REGISTER requests using a non-push mechanism (e.g., an internal timer), the UA MUST insert a 'sip.pnsreg' media feature tag in the Contact header field of each REGISTER request to inform the proxy.
section: 4.1.4
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
