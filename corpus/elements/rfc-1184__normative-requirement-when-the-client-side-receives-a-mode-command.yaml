document: rfc-1184
kind: normative-requirement
summary: When the client side receives a MODE command, it MUST agree with at least the state of the EDIT and TRAPSIG bits. If the server receives a MODE with EDIT or TRAPSIG bits not set, it may set them in the response; if the client receives a MODE with them set, it may not clear them in the response.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
