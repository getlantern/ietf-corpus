document: rfc-9462
kind: normative-requirement
summary: A client MUST NOT reuse a designation discovered from one Unencrypted DNS Resolver IP address in place of any other Unencrypted DNS Resolver; designations are per-resolver and MUST NOT configure the client's universal DNS behavior.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
