document: rfc-4650
kind: wire-format
summary: 'The KEMAC payload in DHHMAC context carries: MAC alg = 0 (HMAC-SHA-1, mandatory), Encr alg = 2 (NULL), Encr data len = 0, empty Encr data field, and a 160-bit HMAC-SHA-1 MAC field. No encrypted key data is carried; KEMAC is used solely to convey the HMAC result.'
section: "4.2"
