document: rfc-4390
kind: normative-requirement
summary: A DHCP client on IPoIB MUST set the BROADCAST flag in DHCPDISCOVER and DHCPREQUEST messages and set 'ciaddr' to zero, to ensure the server or relay agent broadcasts its reply when the client does not yet have an IP address.
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
