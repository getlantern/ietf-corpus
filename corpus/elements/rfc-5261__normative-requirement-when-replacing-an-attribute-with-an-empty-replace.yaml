document: rfc-5261
kind: normative-requirement
summary: When replacing an attribute with an empty <replace> element, the attribute MUST remain in the patched document with an empty value. When replacing a text node with an empty <replace>, the text node MUST be removed because a text node must always have at least one character of data.
section: 4.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
