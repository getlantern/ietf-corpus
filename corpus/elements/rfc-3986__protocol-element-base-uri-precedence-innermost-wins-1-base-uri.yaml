document: rfc-3986
kind: protocol-element
summary: 'Base URI precedence (innermost wins): (1) base URI embedded in content, (2) base URI from the encapsulating entity, (3) URI used to retrieve the entity, (4) application-defined default base URI. A sender of content with relative references is responsible for ensuring a base URI can be established.'
section: "5.1"
topics:
    - http
