document: rfc-4868
kind: protocol-element
summary: For PRF usage with IKE/IKEv2, keys shorter than the block size are right-padded with zero bits to exactly the block size; keys longer than the block size are hashed down using the corresponding hash algorithm, then zero-padded to block size.
