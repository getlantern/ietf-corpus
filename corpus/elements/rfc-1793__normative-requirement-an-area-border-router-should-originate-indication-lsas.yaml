document: rfc-1793
kind: normative-requirement
summary: An area border router SHOULD originate indication-LSAs into all directly-connected regular areas (including backbone) if its connected regular non-backbone area has LSAs with DC-bit clear (other than indication-LSAs), or if the backbone has non-indication-LSAs with DC-bit clear from other routers.
section: 2.5.1
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
