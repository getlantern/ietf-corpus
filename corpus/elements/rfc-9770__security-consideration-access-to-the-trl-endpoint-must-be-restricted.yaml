document: rfc-9770
kind: security-consideration
summary: Access to the TRL endpoint must be restricted to registered devices and authorized administrators. Registered devices see only their own pertaining token hashes (filtered by authenticated identity), while administrators see the full TRL. The AS may use an access control list of trusted administrator credentials.
section: "14.1"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
