document: rfc-4896
kind: normative-requirement
summary: Where NACK is not supported or for NACK-averse compressors, only one piece of minimum-priority state (65535) SHOULD be present in a compartment at any one time. If both endpoints support NACK, this restriction MAY be relaxed but implementers must consider the consequences carefully.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - realtime
