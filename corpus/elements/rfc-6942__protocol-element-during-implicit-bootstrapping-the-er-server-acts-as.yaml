document: rfc-6942
kind: protocol-element
summary: During implicit bootstrapping, the ER server acts as a Diameter EAP Proxy; Diameter routing MUST be configured to route Diameter EAP application messages through this proxy so it can intercept DEA messages carrying the rRK and add ERP-RK-Request to outbound DER messages.
section: "5.1"
topics:
    - diameter
    - crypto
