summary: 'A new registry ''IPv6 Prefix Reply Extension Codes'' was created: values 0 and 1 are accept codes (tunnel to HoA and CoA respectively), values 2-7 are reserved accept codes, values 8-9 are defined reject codes, and values 10-255 are reserved reject codes. Future allocations require Expert Review.'
