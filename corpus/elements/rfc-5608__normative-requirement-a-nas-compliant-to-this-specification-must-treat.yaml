document: rfc-5608
kind: normative-requirement
summary: A NAS compliant to this specification MUST treat any RADIUS Access-Accept message that provisions a level of transport protection or application service that cannot be provided as if an Access-Reject message had been received instead.
section: "2.2"
rfc2119_level: MUST
