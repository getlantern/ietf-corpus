document: rfc-4505
kind: security-consideration
summary: Protocols that do not require explicit anonymous login are more susceptible to break-ins. Protocols offering restricted data access should not allow anonymous access without an explicit login step, enabling protective measures such as Unix chroot.
section: "5"
topics:
