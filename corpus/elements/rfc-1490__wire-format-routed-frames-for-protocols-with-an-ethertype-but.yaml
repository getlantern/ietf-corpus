document: rfc-1490
kind: wire-format
summary: 'Routed frames for protocols with an Ethertype but no NLPID use: Q.922 Address, Control 0x03, pad 0x00, NLPID 0x80 (SNAP), OUI 0x00-00-00, Ethertype (2 octets), Protocol Data, FCS. Protocols with an assigned NLPID omit the SNAP header and pad, saving 48 bits.'
section: "4.1"
