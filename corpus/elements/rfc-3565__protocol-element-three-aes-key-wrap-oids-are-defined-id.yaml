document: rfc-3565
kind: protocol-element
summary: 'Three AES key wrap OIDs are defined: id-aes128-wrap ({ aes 5 }), id-aes192-wrap ({ aes 25 }), and id-aes256-wrap ({ aes 45 }). In all cases the parameters field MUST be absent; the OID conveys the KEK size but not the wrapped CEK size.'
section: 2.3.2
topics:
    - crypto
    - registry
