document: rfc-4993
kind: normative-requirement
summary: When the DS flag is 0 in a request (sender does not support DEFLATE), the server's response payload MUST NOT be compressed with DEFLATE. Servers MUST send 'no-inflation-support-error' when they receive a DEFLATE-compressed request they cannot decompress.
section: 3.1.3
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
