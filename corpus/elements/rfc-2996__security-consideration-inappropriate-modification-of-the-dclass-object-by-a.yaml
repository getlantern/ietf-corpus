document: rfc-2996
kind: security-consideration
summary: Inappropriate modification of the DCLASS object by a third party between the DS network ingress node and the upstream marker constitutes a possible denial-of-service attack, as it can reduce QoS to an unacceptably low level without completely cutting off data flow, making the attack harder to detect.
section: "4"
topics:
