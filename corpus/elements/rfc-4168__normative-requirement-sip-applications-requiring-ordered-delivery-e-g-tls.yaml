document: rfc-4168
kind: normative-requirement
summary: SIP applications requiring ordered delivery (e.g., TLS) SHOULD send SIP messages belonging to the same SIP transaction over the same SCTP stream, and SHOULD send messages from different transactions over different streams when enough streams are available.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - sip
    - sctp
    - tls
