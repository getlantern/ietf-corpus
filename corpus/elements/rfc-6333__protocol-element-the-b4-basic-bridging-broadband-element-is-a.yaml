document: rfc-6333
kind: protocol-element
summary: The B4 (Basic Bridging BroadBand) element is a function implemented on a dual-stack-capable node, either a directly connected device or a CPE, that creates a multipoint-to-point IPv4-in-IPv6 tunnel to an AFTR. It encapsulates outbound IPv4 traffic in IPv6 and decapsulates inbound IPv6-tunneled IPv4 traffic.
section: "5.1"
topics:
