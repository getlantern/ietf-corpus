document: rfc-8010
kind: wire-format
summary: 'Attribute value encodings by syntax type: textWithLanguage and nameWithLanguage are OCTET-STRINGs with two SIGNED-SHORT length prefixes and embedded natural-language and text values. The resolution type is 9 octets: two SIGNED-INTEGERs (cross-feed and feed direction) followed by a SIGNED-BYTE (units). rangeOfInteger is 8 octets: two SIGNED-INTEGERs for lower and upper bound.'
section: "3.9"
