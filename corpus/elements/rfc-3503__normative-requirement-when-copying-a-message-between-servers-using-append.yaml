document: rfc-3503
kind: normative-requirement
summary: When copying a message between servers using APPEND, the client MUST set the $MDNSent keyword correctly. The client SHOULD also verify that $MDNSent is preserved on a COPY operation within the same server.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
