document: rfc-2574
kind: normative-requirement
summary: There is no provision for data confidentiality without both data integrity and data origin authentication; if the securityLevel requests privacy but the user lacks both authentication and privacy protocols, the message MUST NOT be sent and an unsupportedSecurityLevel error is returned.
section: "1.3"
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
