document: rfc-9459
kind: security-consideration
summary: Precomputation meet-in-the-middle attacks against block cipher modes reduce the effective strength of AES-CTR and AES-CBC to 2^(n/2) bits where n is the key length. Using long keys (256-bit) is the best countermeasure.
