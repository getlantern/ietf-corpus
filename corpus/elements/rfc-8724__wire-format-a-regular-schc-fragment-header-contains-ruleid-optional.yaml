document: rfc-8724
kind: wire-format
summary: 'A Regular SCHC Fragment header contains: RuleID, optional DTag (T bits), optional W field (M bits), and FCN (N bits). The FCN field MUST NOT contain all bits set to 1 in regular fragments. All regular fragments except the last are intrinsically L2-Word-aligned without padding.'
section: 8.3.1.1
