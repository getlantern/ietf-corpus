document: rfc-2735
kind: interoperability-note
summary: When a VPN-capable NHRP entity receives an NHRP message from a VPN-aware device without any VPN indication (neither VPN encapsulation nor VPN signalling), the message is treated as applying to the default routing instance, which may be the public Internet or a configured default VPN.
section: "3.1"
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
