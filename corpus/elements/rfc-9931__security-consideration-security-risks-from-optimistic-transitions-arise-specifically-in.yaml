document: rfc-9931
kind: security-consideration
summary: Security risks from optimistic transitions arise specifically in multi-party connections where third-party data is attacker-controlled. In a purely two-party connection, protocol transitions introduce no new security issues because each party must already be prepared for arbitrary data.
section: "4"
topics:
