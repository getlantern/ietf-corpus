document: rfc-2688
kind: normative-requirement
summary: In dynamic class mapping, packets with the tightest delay constraints should not be assigned to classes for which relatively large packets are currently being transmitted. The link-level scheduler SHOULD control how much link bandwidth is assigned to each class at any instant.
section: "4.5"
rfc2119_level: SHOULD
topics:
