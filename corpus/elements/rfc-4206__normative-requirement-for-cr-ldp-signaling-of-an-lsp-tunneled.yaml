document: rfc-4206
kind: normative-requirement
summary: For CR-LDP signaling of an LSP tunneled over an FA-LSP, the Request message MUST contain an IF_ID TLV object and the data interface identification MUST identify the FA-LSP. The head-end LSR must create a targeted LDP session with the tail-end LSR.
section: 6.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
