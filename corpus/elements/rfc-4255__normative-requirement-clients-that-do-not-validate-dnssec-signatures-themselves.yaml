document: rfc-4255
kind: normative-requirement
summary: Clients that do not validate DNSSEC signatures themselves MUST use a secure transport (e.g., TSIG, SIG(0), or IPsec) between themselves and the entity performing the signature validation.
section: "2.4"
rfc2119_level: MUST
