document: rfc-4342
kind: normative-requirement
summary: A loss interval's lossy part MUST be less than or equal to 1 RTT in length. CCID 3 uses window counter values (not receive times) to determine whether multiple packets occurred in the same RTT and thus belong to the same loss event.
section: "6.1"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
