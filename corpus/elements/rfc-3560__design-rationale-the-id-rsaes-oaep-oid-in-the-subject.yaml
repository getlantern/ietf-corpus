document: rfc-3560
kind: design-rationale
summary: The id-RSAES-OAEP OID in the subject public key information allows certificate users to determine that the RSA private key owner intends the public key exclusively for RSAES-OAEP, enabling enforcement of the security recommendation to use RSA key pairs for only one scheme.
