document: rfc-4769
kind: normative-requirement
summary: Implementations receiving URIs from the 'pstn:tel' Enumservice must be prepared to accept TEL URI parameters defined in RFC 4694, which include number portability parameters such as the routing number (rn) and number portability dip indicator (npdi).
section: "1"
rfc2119_level: MUST
topics:
    - dns
