document: rfc-8680
kind: design-rationale
summary: 'Block size in block FEC codes is an inherent tradeoff: smaller blocks reduce maximum FEC decoding latency (better for real-time constraints) but reduce robustness against long loss bursts, while larger blocks improve robustness but increase recovery delay. Sliding window codes avoid this tradeoff entirely.'
section: "1"
