document: rfc-7285
kind: normative-requirement
summary: When requesting an ALTO information resource that requires input parameters, the ALTO client MUST use the HTTP POST method and MUST set the Content-Type header to the appropriate media type. An ALTO client MUST NOT assume GET and POST are interchangeable.
section: 8.3.2
rfc2119_level: MUST
topics:
    - http
