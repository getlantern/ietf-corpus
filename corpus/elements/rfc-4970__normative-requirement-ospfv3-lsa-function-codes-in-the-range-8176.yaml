document: rfc-4970
kind: normative-requirement
summary: OSPFv3 LSA function codes in the range 8176-8181 are for experimental use and MUST NOT be mentioned by RFCs. LSAs with function codes in the Vendor Private Use range 8184-8191 MUST include the Vendor Enterprise Code as the first 4 octets following the 20-octet LSA header.
section: "5"
rfc2119_level: MUST NOT
