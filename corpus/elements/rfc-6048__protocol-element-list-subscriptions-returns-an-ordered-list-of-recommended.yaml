document: rfc-6048
kind: protocol-element
summary: LIST SUBSCRIPTIONS returns an ordered list of recommended newsgroup names, one per line, with the most important group first. An optional wildmat argument filters the results. It is intended to replace hard-coded default subscription lists in news clients.
section: "2.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
