document: rfc-5292
kind: protocol-element
summary: 'The Address Prefix ORF entry consists of six fields: <Sequence, Match, Length, Prefix, Minlen, Maxlen>. Sequence specifies relative ordering; Match indicates PERMIT (0) or DENY (1); Length is the prefix length in bits; Prefix is the address prefix; Minlen and Maxlen define the minimum and maximum prefix lengths for matching (value 0 means unspecified).'
section: "2"
topics:
