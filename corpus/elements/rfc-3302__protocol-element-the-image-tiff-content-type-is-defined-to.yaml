document: rfc-3302
kind: protocol-element
summary: The image/tiff content-type is defined to carry TIFF 6.0 encoded image data. It redefines the earlier RFC 1528 definition which had referenced TIFF Class F specifically, broadening it to all of TIFF 6.0.
section: "5.1"
