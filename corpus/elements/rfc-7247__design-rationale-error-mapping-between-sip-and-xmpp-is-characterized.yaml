document: rfc-7247
kind: design-rationale
summary: Error mapping between SIP and XMPP is characterized as 'more of an art than a science' because XMPP defines only 22 error conditions while SIP defines over 71 response codes, many SIP codes are more specific than their XMPP counterparts, and SIP distinguishes endpoint-level (4xx) from user-level (6xx) failures while XMPP does not.
