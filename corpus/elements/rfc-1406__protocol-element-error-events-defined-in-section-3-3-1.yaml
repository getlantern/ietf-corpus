summary: 'Error events defined in section 3.3.1: BPV (same-polarity pulse in AMI, or same-polarity pulse outside zero substitution for B8ZS/HDB3), EXZ (more than 15 contiguous zeros for AMI; more than 7 for B8ZS), LCV (either BPV or EXZ), PCV (framing bit error for D4/E1-noCRC or CRC error for ESF/E1-CRC), CS (controlled slip — replication or deletion of DS1 frame payload bits).'
