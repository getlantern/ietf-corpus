document: rfc-6275
kind: wire-format
summary: The Home Test Init message (MH Type 1) carries a 16-bit Reserved field followed by a 64-bit Home Init Cookie (random value). The Care-of Test Init (MH Type 2) has the same structure with a 64-bit Care-of Init Cookie. Header Len is set to 1 when no options are present.
