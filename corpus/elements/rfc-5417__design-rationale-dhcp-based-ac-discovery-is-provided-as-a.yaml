document: rfc-5417
kind: design-rationale
summary: DHCP-based AC discovery is provided as a pre-CAPWAP-Discovery method to bootstrap WTP-to-AC connectivity, complementing other discovery mechanisms defined in RFC 5415. The ordering of AC addresses in the option encodes server-configured preference, allowing operators to influence which AC a WTP attempts first.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
