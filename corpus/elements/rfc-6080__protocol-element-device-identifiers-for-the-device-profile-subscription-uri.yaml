document: rfc-6080
kind: protocol-element
summary: Device identifiers for the device profile Subscription URI MUST use UUID-based URN representation per RFC 4122. Devices with a non-alterable MAC address SHOULD use version 1 UUID with timestamp and clock sequence bits set to 0. The URN MUST be URL-escaped when used in the user part of the Request-URI since the colon is not legal in an addr-spec user part.
section: 5.1.4.2
topics:
    - sip
