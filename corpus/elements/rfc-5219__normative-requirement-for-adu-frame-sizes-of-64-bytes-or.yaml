document: rfc-5219
kind: normative-requirement
summary: For ADU frame sizes of 64 bytes or more, senders MUST use a 2-byte ADU descriptor; for smaller sizes, senders MAY use a 1-byte ADU descriptor. Receivers MUST be able to accept an ADU descriptor of either size.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
