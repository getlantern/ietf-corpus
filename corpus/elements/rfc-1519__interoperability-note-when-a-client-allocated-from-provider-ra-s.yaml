document: rfc-1519
kind: interoperability-note
summary: 'When a client allocated from provider RA''s space moves to provider RB without renumbering, RA''s aggregate still attracts traffic for the client. Under Rule #2, RA discards that traffic (no routing loop), but diagnostic tools such as traceroute will falsely suggest a problem inside RA''s network.'
section: "5.2"
topics:
    - ip
    - routing
