document: rfc-8166
kind: normative-requirement
summary: For RPC-over-RDMA version 1, the rdma_vers field MUST contain the value one (1). When a Responder detects an unsupported version, it MUST reply with an RDMA_ERROR using ERR_VERS and include the low and high supported version numbers.
section: 4.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
