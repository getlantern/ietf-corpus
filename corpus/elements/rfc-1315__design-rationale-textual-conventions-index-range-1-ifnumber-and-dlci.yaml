document: rfc-1315
kind: design-rationale
summary: Textual conventions Index (range 1..ifNumber) and DLCI (range 0..DLCINumber) are introduced purely for readability and have no effect on syntax or semantics of managed objects. Objects defined using these types are always encoded as their underlying primitive types, requiring no changes to SMI or SNMP.
