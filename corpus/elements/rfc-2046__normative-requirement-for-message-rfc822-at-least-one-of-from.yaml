document: rfc-2046
kind: normative-requirement
summary: For 'message/rfc822', at least one of 'From', 'Subject', or 'Date' must be present (relaxing RFC 822's requirement for From, Date, and a destination header). No encoding other than '7bit', '8bit', or 'binary' is permitted for the body.
section: 5.2.1
rfc2119_level: MUST
topics:
    - email
