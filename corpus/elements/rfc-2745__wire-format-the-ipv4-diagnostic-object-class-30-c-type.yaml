document: rfc-2745
kind: wire-format
summary: 'The IPv4 DIAGNOSTIC object (Class=30, C-Type=1) encodes: Max-RSVP-hops (8 bits), RSVP-hop-count (8 bits), MF flag (1 bit), Request-ID (32 bits), Path MTU (16 bits), Fragment Offset (16 bits), LAST-HOP Address (32 bits), an embedded SENDER_TEMPLATE object, and an embedded Requester FILTER_SPEC object. IPv6 uses C-Type=2 with 128-bit addresses.'
