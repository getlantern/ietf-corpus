document: rfc-9830
kind: protocol-element
summary: SR Policy Candidate Path content is encoded in the BGP Tunnel Encapsulation Attribute (RFC 9012) using Tunnel Type 15 ('SR Policy'). The attribute carries sub-TLVs for Binding SID, Preference, Priority, Names, ENLP, and one or more Segment Lists, each containing Weight and Segment sub-TLVs.
