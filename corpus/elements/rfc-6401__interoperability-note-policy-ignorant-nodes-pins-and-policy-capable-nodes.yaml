document: rfc-6401
kind: interoperability-note
summary: Policy Ignorant Nodes (PINs) and policy-capable nodes that do not recognize the ADMISSION_PRI or APP_RESOURCE_PRI policy elements apply the default POLICY_DATA handling defined in RFC 2750 Section 4.2, allowing these elements to transit such nodes transparently.
