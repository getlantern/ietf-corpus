document: rfc-8341
kind: interoperability-note
summary: 'RESTCONF HTTP methods are mapped to NETCONF operations for NACM purposes: GET/HEAD map to <get>/<get-config> (read), POST on data maps to <edit-config> (create), PUT on data maps to <edit-config> (create+update), PUT on datastore maps to <copy-config> (update), PATCH maps to <edit-config> (update), DELETE maps to <edit-config> (delete), POST on operation resource maps to the specified operation (execute), and OPTIONS maps to none (not subject to NACM).'
section: 3.2.3
topics:
    - netconf
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
