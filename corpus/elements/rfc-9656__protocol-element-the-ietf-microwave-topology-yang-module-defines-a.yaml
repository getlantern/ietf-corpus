document: rfc-9656
kind: protocol-element
summary: The ietf-microwave-topology YANG module defines a topology model for microwave and millimeter-wave radio links, augmenting the TE Topology model (RFC 8795) which is based on the Network Topologies model (RFC 8345). It introduces the mw-topology network type, mw-node, mw-tp, mw-link, and mw-bandwidth augmentations.
