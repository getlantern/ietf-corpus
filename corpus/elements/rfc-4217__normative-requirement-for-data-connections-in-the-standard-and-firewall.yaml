document: rfc-4217
kind: normative-requirement
summary: For data connections in the standard and firewall-friendly modes, the FTP client MUST be the TLS client and the FTP server MUST be the TLS server, regardless of which side initiates the TCP connection via connect() or accept().
section: "7"
rfc2119_level: MUST
topics:
