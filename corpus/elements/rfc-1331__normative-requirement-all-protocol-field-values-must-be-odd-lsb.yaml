document: rfc-1331
kind: normative-requirement
summary: All Protocol field values MUST be odd (LSB of least significant octet = 1), and the LSB of the most significant octet MUST equal 0. Frames received which do not comply MUST be treated as having an unrecognized Protocol and handled by LCP.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
