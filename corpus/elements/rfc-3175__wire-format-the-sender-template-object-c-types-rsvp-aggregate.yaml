summary: The SENDER_TEMPLATE object (C-Types RSVP-AGGREGATE-IP4 = 9 and RSVP-AGGREGATE-IP6 = 10) contains only the IPv4 (4-byte) or IPv6 (16-byte) address of the aggregating router. The FILTER_SPEC object is syntactically identical to SENDER_TEMPLATE.
