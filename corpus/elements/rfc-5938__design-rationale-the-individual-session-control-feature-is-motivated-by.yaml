document: rfc-5938
kind: design-rationale
summary: The Individual Session Control feature is motivated by the need to start/stop individual test sessions at will using a single TWAMP-Control connection. This permits short-duration tests during longer ones, or conditional diagnostic tests triggered by intermediate results.
