document: rfc-9183
kind: normative-requirement
summary: When an area border RBridge (RB2) learns a source MAC-to-nickname binding during L1-to-L2 transition, it SHOULD synchronize this attachment information with peer border RBridges in the same area using the ESADI protocol (RFC 7357).
section: "3.1"
rfc2119_level: SHOULD
topics:
    - routing
