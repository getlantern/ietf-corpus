document: rfc-9370
kind: normative-requirement
summary: In simultaneous rekeying, if additional key exchanges are negotiated in the CREATE_CHILD_SA exchange in which the smallest nonce is used (the one to be abandoned per RFC 7296), the initiator MUST NOT initiate the IKE_FOLLOWUP_KE exchange.
section: 2.2.4
rfc2119_level: MUST NOT
topics:
    - ipsec
    - crypto
