document: rfc-4420
kind: security-consideration
summary: The new objects do not introduce new direct security vulnerabilities beyond those in RFC 2205, RFC 3209, and RFC 3473. However, LSP attribute signaling may expose information about LSP functional preferences to unauthorized observers; this can only be satisfactorily addressed by encrypting signaling message content. Similarly, RRO attribute recording may reveal LSR capabilities and LSP status that operators wish to keep confidential.
section: "12"
topics:
    - security
    - mpls
