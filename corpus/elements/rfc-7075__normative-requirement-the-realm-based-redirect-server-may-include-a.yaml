document: rfc-7075
kind: normative-requirement
summary: The Realm-based Redirect Server MAY include a Redirect-Host-Usage AVP (which SHOULD be set to REALM_AND_APPLICATION); if this AVP is added, the Redirect-Max-Cache-Time AVP MUST also be included. This extends the normal usage of these AVPs as defined in RFC 6733 Sections 6.13 and 6.14.
section: 3.2.1
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
