document: rfc-3323
kind: design-rationale
summary: 'Two complementary principles guided the design: users are empowered to hide their identity and related personal information when issuing requests, but intermediaries and designated recipients are entitled to reject requests whose originator cannot be identified. This prevents anonymous privacy from being an unconditional right.'
section: "1"
topics:
