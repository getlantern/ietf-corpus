document: rfc-2630
kind: security-consideration
summary: No requirement is imposed on the correctness of the signing time; acceptance of a purported signing time is at the recipient's discretion. Only implicitly trusted signers such as time-stamp servers should be relied upon for accurate signing time.
section: "11.3"
topics:
    - crypto
    - security
