document: rfc-3630
kind: interoperability-note
summary: Routers that do not implement these TE extensions will silently ignore Opaque LSAs, so there are no interoperability issues. The result is that the traffic engineering topology will be incomplete, but if the topology is connected, TE paths can still be computed.
section: "4"
