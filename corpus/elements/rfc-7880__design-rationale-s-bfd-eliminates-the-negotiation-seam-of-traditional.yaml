document: rfc-7880
kind: design-rationale
summary: S-BFD eliminates the negotiation 'seam' of traditional BFD by removing the DOWN-to-UP transition delay, enabling any node that knows a remote S-BFD Discriminator to immediately perform a continuity test without session setup. This is the core motivation for the 'Seamless' designation.
section: "1"
topics:
