document: rfc-6030
kind: normative-requirement
summary: The 'Version' attribute MUST be included in the <KeyContainer> element. Version major and minor numbers MUST be treated as separate integers; leading zeros MUST be ignored by recipients and MUST NOT be sent.
section: "4"
rfc2119_level: MUST
