document: rfc-6734
kind: protocol-element
summary: 'The Key-Type AVP (AVP Code 582) is of type Enumerated and identifies the type of the key being sent. Defined values are: DSRK (0) for Domain-Specific Root Key, rRK (1) for re-authentication Root Key, and rMSK (2) for re-authentication Master Session Key.'
