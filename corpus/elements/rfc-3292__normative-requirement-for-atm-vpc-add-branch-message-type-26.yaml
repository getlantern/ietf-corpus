document: rfc-3292
kind: normative-requirement
summary: 'For ATM VPC Add Branch (Message Type=26), if either specified port is not an ATM port a failure MUST be returned (''28: ATM Virtual path switching is not supported on non-ATM ports''); if a virtual channel connection already exists on any channel within the virtual path a failure MUST be returned (''26: Attempt to add an ATM virtual path connection branch to an existing virtual channel connection'').'
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
