document: rfc-5755
kind: normative-requirement
summary: 'To be valid, an AC must satisfy seven checks: (1) holder''s PKC certification path verified per RFC 5280; (2) AC signature cryptographically valid and AC issuer''s PKC path verified; (3) AC issuer''s PKC conforms to Section 4.5; (4) AC issuer directly trusted by configuration; (5) evaluation time within AC validity; (6) targeting check passes; (7) no unsupported critical extensions.'
section: "5"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
