summary: 'For IEEE 802.3 (10BASE5): MAC header+trailer totals 18 octets (6+6 destination/source addresses, 2-octet length field, 4-octet FCS). Maximum packet size is 1518 octets, yielding an IP MTU of 1492 octets (1518 - 18 MAC - 8 LLC+SNAP).'
