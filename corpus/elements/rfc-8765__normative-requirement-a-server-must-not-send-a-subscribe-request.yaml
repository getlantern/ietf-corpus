document: rfc-8765
kind: normative-requirement
summary: A server MUST NOT send a SUBSCRIBE request over an existing session from a client. If a server does send a SUBSCRIBE request, this is a fatal error and the client MUST forcibly abort the connection immediately.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - dns
