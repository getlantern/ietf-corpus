document: rfc-9144
kind: security-consideration
summary: The <compare> operation requires processing resources; an attacker could mount a denial-of-service attack by making a high volume of comparison requests. Implementations SHOULD use NACM (RFC 8341) to enforce authorization and SHOULD rate-limit requests, rejecting those exceeding a sustainable frequency.
section: "8"
topics:
    - security
    - netconf
    - yang
