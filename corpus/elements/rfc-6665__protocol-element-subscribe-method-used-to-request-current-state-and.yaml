document: rfc-6665
kind: protocol-element
summary: 'SUBSCRIBE method: used to request current state and state updates from a remote node. It is a target refresh request and a dialog-creating method. The Expires header field indicates subscription duration; an Expires of 0 constitutes an unsubscription and also triggers a state fetch.'
section: "3.1"
topics:
    - sip
    - realtime
