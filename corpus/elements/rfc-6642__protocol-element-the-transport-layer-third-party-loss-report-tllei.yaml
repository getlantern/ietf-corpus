document: rfc-6642
kind: protocol-element
summary: The Transport-Layer Third-Party Loss Report (TLLEI) is identified by RTCP packet type PT=RTPFB and FMT=7. The 'SSRC of packet sender' indicates the source of the request and 'SSRC of media source' identifies the flow for which losses are suppressed.
