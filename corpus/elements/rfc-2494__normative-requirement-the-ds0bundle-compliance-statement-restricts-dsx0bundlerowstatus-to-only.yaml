document: rfc-2494
kind: normative-requirement
summary: 'The DS0Bundle compliance statement restricts dsx0BundleRowStatus to only three RowStatus values: active(1), createAndGo(4), and destroy(6). Only createAndGo is supported for creation, preventing managers from creating inactive rows since inactive ds0Bundle rows are semantically invalid.'
section: "5"
rfc2119_level: MUST
topics:
