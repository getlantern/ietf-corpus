document: rfc-3107
kind: design-rationale
summary: When BGP label distribution peers are not directly adjacent (e.g., A--B--C--D topology), an LSP must exist between them before labels can be used. RFC 3107 does not specify any real-time mechanism to ensure this; ensuring proper infrastructure is left to network management and operations.
section: "6"
topics:
