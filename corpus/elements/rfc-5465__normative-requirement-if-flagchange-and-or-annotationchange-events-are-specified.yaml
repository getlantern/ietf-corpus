document: rfc-5465
kind: normative-requirement
summary: If FlagChange and/or AnnotationChange events are specified, MessageNew and MessageExpunge MUST also be specified by the client; otherwise the server MUST respond with a tagged BAD. Similarly, if one of MessageNew or MessageExpunge is specified, both MUST be specified.
section: "5"
rfc2119_level: MUST
topics:
    - email
