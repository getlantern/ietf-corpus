document: rfc-2017
kind: interoperability-note
summary: Some URLs (e.g., HTTP with content negotiation) can return objects in multiple formats. Applications may have already made irrevocable decisions based on the declared content-type in the inner message/external-body header, so retrieved objects whose content-type does not match must not be used.
section: "3.1"
topics:
    - email
    - http
