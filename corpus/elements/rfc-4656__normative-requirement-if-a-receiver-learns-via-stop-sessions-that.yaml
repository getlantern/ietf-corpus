document: rfc-4656
kind: normative-requirement
summary: If a receiver learns via Stop-Sessions that the sender's last sequence number is lower than any sequence number actually received, the entire OWAMP-Test session results MUST be invalidated. Upon Stop-Sessions, the receiver MUST discard packet records with computed send times between (current time − Timeout) and current time to ensure statistical consistency.
section: "3.8"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
