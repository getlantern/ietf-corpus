document: rfc-4572
kind: normative-requirement
summary: 'When the SDP is not integrity-protected, the certificate provided for a TLS connection MUST certify an appropriate identity: either the SDP connection address (IP or FQDN via subjectAltName) or the identity URI of the SDP creator. Wildcard patterns MUST NOT be used in certificate identity matching.'
section: "6.1"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
