document: rfc-4741
kind: protocol-element
summary: 'NETCONF is conceptually partitioned into four layers: (1) Transport Protocol, (2) RPC, (3) Operations (e.g., <get-config>, <edit-config>), and (4) Content. The content layer is outside the scope of this document.'
