document: rfc-9495
kind: normative-requirement
summary: Any "issuemail" Property whose issuemail-value does not conform to the ABNF syntax defined in Section 3 SHALL be treated as if the issuer-domain-name in the issuemail-value is the empty string, effectively prohibiting issuance unless another conformant matching record exists.
section: "4"
rfc2119_level: REQUIRED
