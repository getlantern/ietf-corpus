document: rfc-4535
kind: wire-format
summary: 'The GSAKMP Header contains a version field, GroupID Type (1 octet) and variable-length GroupID, Exchange Type (1 octet identifying the message type), a Next Payload field, and a Sequence-ID. GroupID variants are: UTF-8 string, Octet String, IPv4 (4-octet), and IPv6 (16-octet).'
section: 7.1.1
