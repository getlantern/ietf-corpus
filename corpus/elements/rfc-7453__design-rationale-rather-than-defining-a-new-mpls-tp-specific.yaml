document: rfc-7453
kind: design-rationale
summary: Rather than defining a new MPLS-TP-specific MIB module, the authors chose to extend existing MPLS TE MIB modules (RFC 3812, RFC 3813) because most attributes of MPLS TE tunnels are also applicable to MPLS-TP tunnels. This reuse avoids duplication and keeps MPLS-TP management aligned with existing MPLS management frameworks.
section: "4"
topics:
