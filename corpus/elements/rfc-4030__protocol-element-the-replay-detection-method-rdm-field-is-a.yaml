document: rfc-4030
kind: protocol-element
summary: The Replay Detection Method (RDM) field is a 4-bit value. RDM value 0 is reserved; RDM value 1 (default) specifies that the Replay Detection field contains a monotonically increasing counter. Receivers associate a replay counter with each sender and reject messages with a counter value less than or equal to the last valid value.
section: "5"
topics:
