document: rfc-8011
kind: interoperability-note
summary: Clients SHOULD use 'printer-uri' together with 'job-id' to target Job operations rather than relying on 'job-uri' alone, whose use is DEPRECATED. Job numeric IDs are unique only within the context of the creating Printer, not globally, so the 'job-printer-uri' attribute is needed to resolve a Job's creating Printer when only 'job-uri' is available.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
