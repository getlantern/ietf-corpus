document: rfc-9483
kind: normative-requirement
summary: Messages without protection MUST be rejected except for error messages. Messages with invalid protection MUST be rejected. If signature-based protection is used, the CMP protection certificate MUST be successfully validated via path validation using a trust anchor.
section: "3.5"
rfc2119_level: MUST
topics:
    - pkix
    - security
