document: rfc-1123
kind: normative-requirement
summary: Implementors MUST NOT assume any correspondence between READ boundaries on the FTP control connection and Telnet EOL sequences (CR LF); a server or client must continue reading until a complete CR LF is found before processing a command. A single READ may include more than one FTP command.
section: 4.1.2.10
rfc2119_level: MUST NOT
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
