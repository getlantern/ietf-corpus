document: rfc-9643
kind: security-consideration
summary: Implementations are RECOMMENDED to implement the 'local-binding-supported' feature for cryptographically secure protocols to enable more granular ingress/egress firewall rule bases. It is NOT RECOMMENDED to implement this feature for insecure protocols, per RFC 6056.
