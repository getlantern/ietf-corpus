document: rfc-4468
kind: wire-format
summary: 'The BURL command syntax is: ''BURL'' SP absolute-URI [SP end-marker] CRLF, where end-marker is the literal string ''LAST''. The burl-param EHLO argument is either ''imap'' or ''imap://'' followed by an authority.'
