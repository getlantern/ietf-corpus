document: rfc-4860
kind: normative-requirement
summary: The Deaggregator MUST include the SESSION-OF-INTEREST object in E2E Resv messages to indicate to the Aggregator which generic aggregate session to map the E2E reservation onto. The Aggregator MUST NOT include the SOI object when forwarding E2E Resv upstream towards the sender.
section: "4"
rfc2119_level: MUST
topics:
    - qos
    - diffserv
