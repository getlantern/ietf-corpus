document: rfc-8012
kind: normative-requirement
summary: A label-based load balancer that does not push ELI/EL MUST set {L=1, E=0} in DS Flags, MUST reply with Type {0} for received Types {2,4,8}, and MUST reply with Type {10} omitting IP and Associated Label sections when it receives Type {10}.
section: "8.3"
rfc2119_level: MUST
topics:
