document: rfc-9719
kind: protocol-element
summary: 'The overload container supports two timeout modalities: on-startup (node enters overload until a timer expires at startup) and immediate (overload set and cleared after a configurable timer). The overload bit being set causes the node''s TIEs to carry the overload indication.'
