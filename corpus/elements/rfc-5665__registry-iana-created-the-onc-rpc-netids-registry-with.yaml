document: rfc-5665
kind: registry
summary: 'IANA created the ''ONC RPC Netids'' registry with two subregistries: one for Standards Action assignments (netids 1–8 octets) and one for First Come First Served assignments (netids 9–128 octets). Each entry contains the netid string, a constant name, a description/reference, a point of contact, and a cross-reference to the uaddr format registry.'
