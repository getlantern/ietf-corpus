document: rfc-7466
kind: normative-requirement
summary: When a Link Tuple transitions from SYMMETRIC to LOST (L_lost set to true) while L_SYM_time has not expired, corresponding 2-Hop Tuples MUST have their N2_lost flag set to true rather than being removed.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
