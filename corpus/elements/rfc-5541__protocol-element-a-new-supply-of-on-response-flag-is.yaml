document: rfc-5541
kind: protocol-element
summary: A new 'Supply OF on response' flag is defined at bit 24 of the RP object. When set in a PCReq, it instructs the PCE to include the applied objective function in the PCRep. When set in a PCRep, it indicates the OF used during computation is included.
section: "3.3"
topics:
    - routing
    - registry
