document: rfc-4615
kind: protocol-element
summary: 'The algorithm operates in two steps: (1) derive a 128-bit key K from VK — if VKlen equals 16 octets, K := VK; otherwise K := AES-CMAC(0^128, VK, VKlen); (2) compute PRV := AES-CMAC(K, M, len) and return PRV.'
