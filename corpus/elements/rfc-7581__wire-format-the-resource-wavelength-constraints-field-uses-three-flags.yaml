document: rfc-7581
kind: wire-format
summary: The Resource Wavelength Constraints Field uses three flags (I, O, B) to indicate the presence of Input and/or Output Wavelength Constraints sub-fields, followed by an RB Set Field and optional wavelength constraints encoded via the Label Set Field of RFC 7579. Valid flag combinations are (1,0,0), (0,1,0), (1,1,0), and (0,0,1) only.
section: "3.2"
