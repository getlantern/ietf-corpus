document: rfc-9297
kind: protocol-element
summary: The SETTINGS_H3_DATAGRAM (0x33) HTTP/3 setting allows an endpoint to indicate willingness to receive HTTP/3 Datagrams. Its value MUST be 0 or 1; any other value causes the receiver to terminate the connection with H3_SETTINGS_ERROR.
section: 2.1.1
topics:
