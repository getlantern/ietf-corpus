document: rfc-4650
kind: normative-requirement
summary: The General Extension Payload for DHHMAC SHALL list all key management protocol identifiers of the surrounding encapsulation protocol (e.g., SDP) to prevent bidding-down attacks, and SHALL be integrity protected with the HMAC using the shared secret.
section: "4.4"
rfc2119_level: MUST
