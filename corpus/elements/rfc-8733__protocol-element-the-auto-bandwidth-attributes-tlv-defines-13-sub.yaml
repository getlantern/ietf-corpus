document: rfc-8733
kind: protocol-element
summary: The AUTO-BANDWIDTH-ATTRIBUTES TLV defines 13 sub-TLVs (types 1–13) covering Sample-Interval, Adjustment-Interval, Down-Adjustment-Interval, Adjustment-Threshold (absolute and percentage), Down-Adjustment-Threshold variants, Minimum-Bandwidth, Maximum-Bandwidth, Overflow-Threshold variants, and Underflow-Threshold variants. All sub-TLVs are optional; unrecognized ones MUST be ignored; duplicate types keep only the first occurrence.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
