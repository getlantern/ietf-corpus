document: rfc-2740
kind: wire-format
summary: IPv6 prefixes in LSAs are encoded as [PrefixLength (8 bits), PrefixOptions (8 bits), Address Prefix (variable, padded to the next 32-bit boundary)] instead of the IPv4 [address, mask] encoding. The default route is expressed as a prefix with PrefixLength 0.
section: A.4.1
topics:
    - routing
    - ip
