document: rfc-726
kind: normative-requirement
summary: A transmission character recommends that the using host transmit all text accumulated up to and including its occurrence. Using hosts are discouraged (but not prohibited) from sending before a transmission character, in the interest of network efficiency.
section: "5"
rfc2119_level: RECOMMENDED
