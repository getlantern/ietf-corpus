document: rfc-7866
kind: normative-requirement
summary: A recording-aware UA MUST indicate recording awareness by including the 'record-aware' option tag in the Supported header of the initial INVITE or response. It MUST also provide a recording indication to the end user showing whether recording is on, off, or paused for each medium.
section: "6.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
