document: rfc-8572
kind: normative-requirement
summary: Removable storage is an untrusted source; information stored on it MUST be signed or MUST be information processable provisionally (e.g., unsigned redirect information). Onboarding information from removable storage must therefore always be signed.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - netconf
