document: rfc-6680
kind: protocol-element
summary: GSS_Set_name_attribute() sets one or more values for a named attribute on a GSS name object. In the C-binding, one call per value is required; to replace all values, GSS_Delete_name_attribute() must be called first.
section: "7.6"
