document: rfc-4622
kind: normative-requirement
summary: If an XMPP protocol extension defines methods for information retrieval, it MUST define appropriate access controls. XMPP servers SHOULD NOT natively parse XMPP IRIs/URIs but SHOULD accept only the XML wire protocol from XMPP-CORE.
section: "5.3"
rfc2119_level: SHOULD NOT
topics:
    - security
