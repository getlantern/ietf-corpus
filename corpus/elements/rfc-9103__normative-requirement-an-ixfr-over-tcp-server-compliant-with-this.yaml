document: rfc-9103
kind: normative-requirement
summary: An IXFR-over-TCP server compliant with this specification MUST be able to handle multiple concurrent IXFR requests on a single TCP connection for the same and different zones, and SHOULD send responses as soon as available, which may be out of order relative to the requests.
section: "6.1"
rfc2119_level: MUST
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
