document: rfc-3220
kind: normative-requirement
summary: The foreign agent MUST NOT increase the Lifetime selected by the mobile node in the Registration Request, and the home agent MUST NOT increase the Lifetime from the Registration Request either. If the Lifetime in the Reply is greater than in the Request, the Request's Lifetime MUST be used.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
