document: rfc-5553
kind: normative-requirement
summary: When PKS expansion fails because the identified PCE cannot be reached, the LSR MUST send a PathErr with 'Routing Problem' / 'Unreachable PCE for PKS expansion' (value 32); if the PCE cannot decode the key (e.g., expired), 'Unknown Path Key for PKS expansion' (value 33) is used.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
