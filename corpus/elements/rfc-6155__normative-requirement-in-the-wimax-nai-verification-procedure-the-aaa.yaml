document: rfc-6155
kind: normative-requirement
summary: In the WiMAX NAI verification procedure, the AAA server MUST be authenticated as a trusted entity for linking NAI to IP address, and the AAA protocol (Diameter or RADIUS) MUST provide protection against modification and replay attacks so that attacker-altered responses cannot authorize a request.
section: 3.4.1
rfc2119_level: MUST
topics:
    - security
    - realtime
    - diameter
    - radius
