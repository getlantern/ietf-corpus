document: rfc-7294
kind: protocol-element
summary: The Concealed Seconds metrics are based on successive one-second intervals per an unsynchronized RTP clock. Partial periods at tail-end exceeding 500 ms are counted; those under 500 ms are disregarded. The same loss pattern may yield slightly different counts depending on one-second boundary alignment.
