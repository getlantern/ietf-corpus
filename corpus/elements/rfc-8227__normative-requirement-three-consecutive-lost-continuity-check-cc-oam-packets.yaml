document: rfc-8227
kind: normative-requirement
summary: Three consecutive lost Continuity Check (CC) OAM packets MUST be interpreted as a link failure. A node failure is treated as simultaneous failure of both links attached to the failed node.
section: "4.2"
rfc2119_level: MUST
topics:
