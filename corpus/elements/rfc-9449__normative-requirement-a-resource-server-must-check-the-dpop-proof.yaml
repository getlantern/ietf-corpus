document: rfc-9449
kind: normative-requirement
summary: A resource server MUST check the DPoP proof according to Section 4.3 and verify the public key match to the access token. The resource server MUST NOT grant access unless all checks are successful.
section: "7.1"
rfc2119_level: MUST NOT
