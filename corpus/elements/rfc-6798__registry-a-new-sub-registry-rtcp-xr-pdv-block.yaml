document: rfc-6798
kind: registry
summary: A new sub-registry 'RTCP XR PDV block - PDV type' is created under the RTCP XR Block Type Registry. It uses 4-bit unsigned integers (0–15), requires 'Specification Required' review, and initially registers 0=MAPDV2 (G.1020) and 1=2-point PDV (Y.1540), with 2–15 reserved.
