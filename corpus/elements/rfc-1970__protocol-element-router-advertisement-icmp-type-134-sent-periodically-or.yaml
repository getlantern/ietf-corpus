kind: protocol-element
summary: 'Router Advertisement (ICMP Type 134): sent periodically or in response to a Router Solicitation. Contains Cur Hop Limit (8-bit), M and O flags (1-bit each), Router Lifetime (16-bit, seconds), Reachable Time (32-bit, ms), and Retrans Timer (32-bit, ms), plus optional Prefix Information and MTU options.'
