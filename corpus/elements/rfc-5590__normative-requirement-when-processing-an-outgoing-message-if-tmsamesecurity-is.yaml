document: rfc-5590
kind: normative-requirement
summary: When processing an outgoing message, if tmSameSecurity is true, then the tmSessionID MUST match the current transport session; otherwise, the message MUST be discarded and the Dispatcher notified that sending the message failed.
section: 5.2.4
rfc2119_level: MUST
topics:
