document: rfc-4855
kind: security-consideration
summary: Media types containing 'active content' impose risk of malicious side-effects unless execution is adequately constrained. Several audio/video encodings are suitable for steganographic data hiding. RTP itself (RFC 3550) specifies security considerations including encryption for confidentiality.
