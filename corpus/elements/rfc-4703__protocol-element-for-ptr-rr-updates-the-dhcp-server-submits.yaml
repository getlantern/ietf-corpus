document: rfc-4703
kind: protocol-element
summary: For PTR RR updates, the DHCP server submits a DNS UPDATE that deletes all PTR RRs for the client's assigned IP address and adds a PTR RR pointing to the client's FQDN. The server MAY also add a DHCID RR for the PTR entry.
section: "5.4"
topics:
    - dns
