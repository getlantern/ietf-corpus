summary: 'The base identifier is encoded as four octets [f, op1, op2, m]: the first octet (''f'') is the special function code, the next two (''op1'', ''op2'') are operands (set to zero if unused), and the last octet (''m'') is the enumerated base layer encapsulation value from Table 4.2.'
