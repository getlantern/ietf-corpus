document: rfc-8302
kind: protocol-element
summary: ARP native frames are detected by Ethertype 0x0806; ND frames are detected as one of five specific ICMPv6 packet types. ARP/ND is used to query MAC addresses, detect duplicate IP addresses, and announce new or updated IP/MAC/attachment-point information.
