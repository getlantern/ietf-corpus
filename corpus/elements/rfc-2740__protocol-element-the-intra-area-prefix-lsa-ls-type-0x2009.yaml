document: rfc-2740
kind: protocol-element
summary: The Intra-Area-Prefix-LSA (LS type 0x2009, area scope) carries all IPv6 prefix information that OSPFv2 embedded in Router-LSAs and Network-LSAs. It references either a Network-LSA (to associate prefixes with a transit link) or a Router-LSA (to associate prefixes with a router). Multiple instances per router are distinguished by Link State ID.
section: 3.4.3.7
topics:
    - routing
    - ip
