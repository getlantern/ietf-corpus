document: rfc-7712
kind: normative-requirement
summary: POSH well-known URIs for XMPP are '/.well-known/posh/xmpp-client.json' for client-to-server connections and '/.well-known/posh/xmpp-server.json' for server-to-server connections. If no verification material is found via POSH, fallback methods from RFC 6120 must be pursued.
section: "5.2"
rfc2119_level: REQUIRED
