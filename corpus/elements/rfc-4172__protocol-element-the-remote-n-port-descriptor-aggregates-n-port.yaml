document: rfc-4172
kind: protocol-element
summary: 'The Remote N_PORT Descriptor aggregates: N_PORT worldwide unique name (64-bit), iFCP Portal Address (IP+TCP port), N_PORT ID assigned by the remote gateway, and N_PORT alias assigned locally. A gateway SHALL have exactly one descriptor per remote N_PORT, populated from iSNS query results.'
