document: rfc-8322
kind: normative-requirement
summary: TLS version 1.2 MUST be supported. TLS 1.2 SHOULD be implemented according to all recommendations and best practices in RFC 7525. It is RECOMMENDED that the most recent published version of TLS be supported.
