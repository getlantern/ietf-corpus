document: rfc-1583
kind: protocol-element
summary: The Designated Router is elected on each multi-access network and originates the network links advertisement for that network. A Backup Designated Router is also elected to allow fast failover. Only the DR and BDR form adjacencies with all other routers on the segment.
section: "7.3"
topics:
