document: rfc-5870
kind: normative-requirement
summary: The comma (',') delimiter used to separate coordinate sub-components in the <coordinates> path component MUST NOT be percent-encoded. It is RECOMMENDED that coordinate values, <crslabel>, and <uval> contents are never percent-encoded.
section: "3.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
