document: rfc-7946
kind: security-consideration
summary: Providing details about locations of sensitive persons, animals, habitats, and facilities can expose them to unauthorized tracking or injury. Anonymized datasets with inadequate location skewing or fuzzing risk inadvertent individual identification; location obscuration is unlikely to be effective against determined attacks.
