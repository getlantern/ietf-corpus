document: rfc-2227
kind: security-consideration
summary: A malicious proxy could report inflated hit counts, potentially causing large payments from advertisers to content providers. To mitigate this, proxies SHOULD only relay usage counts from outbound proxies that have authenticated via Proxy-Authorization or are on an approved list.
section: "10"
topics:
    - security
    - http
