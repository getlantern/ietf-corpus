document: rfc-3017
kind: normative-requirement
summary: The phoneBook 'version' attribute is a monotonically increasing integer that SHOULD be incremented each time the phone book is modified. It can be used by a server to determine what actions are required to bring a client's phone book up to date.
section: 5.1.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
