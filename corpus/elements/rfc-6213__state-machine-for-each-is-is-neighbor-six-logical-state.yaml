document: rfc-6213
kind: state-machine
summary: 'For each IS-IS neighbor, six logical state variables are defined: ISIS_TOPO_NLPID_BFD_REQUIRED (TRUE if both sides support BFD for that MTID/NLPID), ISIS_TOPO_BFD_REQUIRED (OR over all NLPIDs for an MTID), ISIS_BFD_REQUIRED (AND over all MTIDs), ISIS_TOPO_NLPID_STATE (tracks BFD session state when required, else TRUE), ISIS_TOPO_USEABLE (AND of NLPID states for an MTID), and ISIS_NEIGHBOR_USEABLE (OR over all MTIDs).'
section: "3.1"
