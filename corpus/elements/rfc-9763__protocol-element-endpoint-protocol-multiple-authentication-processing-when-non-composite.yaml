document: rfc-9763
kind: protocol-element
summary: 'Endpoint protocol multiple authentication processing: when non-composite hybrid authentication is in use, an endpoint that receives Cert A and Cert B should check Cert B for the RelatedCertificate extension, compute the appropriate hash of Cert A, and confirm the hash matches the hashValue in the extension. Policy on how to proceed (e.g., require both or one authentication to succeed) is outside the scope of this document.'
section: "4.2"
topics:
    - pkix
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
