document: rfc-4439
kind: protocol-element
summary: t11FamTable (indexed by fcmInstanceIndex, fcmSwitchIndex, t11FamFabricIndex) is the main per-Fabric configuration and status table. It holds Domain_ID configuration, priority, FAM state, WWNs of the principal and local switch, counters for granted/recovered/free/assigned/available FC address identifiers, and fabric reconfiguration event counters.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
