document: rfc-5285
kind: normative-requirement
summary: The indication of the presence of this extension and the mapping of local identifiers to a larger namespace MUST be performed out-of-band (e.g., via SDP). A usable mapping MUST use IDs in the valid range, and each ID MUST be used only once per media (or per session for session-level mappings).
section: "5"
rfc2119_level: MUST
topics:
