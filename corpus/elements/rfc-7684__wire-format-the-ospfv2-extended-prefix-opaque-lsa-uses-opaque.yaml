document: rfc-7684
kind: wire-format
summary: The OSPFv2 Extended Prefix Opaque LSA uses Opaque Type 7 and LS Type 10 (area-local) or 11 (AS-wide). The LSA header fields include LS age, Options, LS Type, Opaque Type (1 octet), Opaque ID (3 octets), Advertising Router, LS sequence number, LS checksum, and Length, followed by a variable TLV section.
section: "2"
