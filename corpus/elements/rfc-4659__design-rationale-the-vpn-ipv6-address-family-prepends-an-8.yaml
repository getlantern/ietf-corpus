document: rfc-4659
kind: design-rationale
summary: The VPN-IPv6 address family prepends an 8-octet Route Distinguisher to IPv6 addresses to allow distinct routes to common IPv6 prefixes across VPNs, mirroring the VPN-IPv4 approach. This ensures that the same address used in two different VPNs results in two completely different routes.
section: "2"
topics:
