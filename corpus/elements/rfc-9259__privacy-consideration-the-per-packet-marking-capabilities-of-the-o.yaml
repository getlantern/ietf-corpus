document: rfc-9259
kind: privacy-consideration
summary: The per-packet marking capabilities of the O-flag provide a granular mechanism for telemetry collection. When deployed without user knowledge or consent, this mechanism provides an explicit protocol-level tool for surveillance and pervasive monitoring contrary to users' interests.
section: "4"
topics:
