document: rfc-5641
kind: design-rationale
summary: The Standby (S) bit was introduced to support session-level redundancy scenarios, enabling a pseudowire to be fully established by signaling and available for OAM and data-plane liveness checks (e.g., via VCCV/BFD) without forwarding user traffic—mirroring functionality already present in MPLS/LDP pseudowires.
section: "1"
topics:
