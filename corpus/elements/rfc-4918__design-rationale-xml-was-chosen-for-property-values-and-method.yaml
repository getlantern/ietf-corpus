document: rfc-4918
kind: design-rationale
summary: XML was chosen for property values and method marshalling because it is self-describing, extensible (clients MUST ignore unknown elements), and supports ISO 10646 character sets and xml:lang for internationalization — advantages that HTTP headers cannot provide at scale.
section: "8.2"
topics:
