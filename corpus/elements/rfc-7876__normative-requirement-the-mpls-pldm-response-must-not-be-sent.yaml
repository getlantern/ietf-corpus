document: rfc-7876
kind: normative-requirement
summary: The MPLS-PLDM Response MUST NOT be sent other than in response to an MPLS-PLDM Query message. When sending over IP, the destination address and UDP port are copied from the URO; the source IP and source UDP port are at the responder's discretion.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - udp
