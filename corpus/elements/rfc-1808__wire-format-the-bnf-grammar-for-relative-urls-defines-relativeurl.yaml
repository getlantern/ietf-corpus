document: rfc-1808
kind: wire-format
summary: The BNF grammar for relative URLs defines relativeURL as net_path | abs_path | rel_path, where net_path begins with '//', abs_path begins with '/', and rel_path may include optional params (';'-delimited) and query ('?'-delimited). The scheme is 1*(alpha | digit | '+' | '-' | '.') and escape sequences use '%' hex hex encoding.
section: "2.2"
topics:
    - http
