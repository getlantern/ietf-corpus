document: rfc-6223
kind: normative-requirement
summary: When the SIP entity receives the associated response and the topmost Via header field contains a "keep" parameter value, it MUST start sending keep-alives towards the same destination used for subsequent requests associated with the registration or dialog.
section: "4.3"
rfc2119_level: MUST
topics:
