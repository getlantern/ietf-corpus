document: rfc-6019
kind: security-consideration
summary: Use of the binary-signing-time attribute does not necessarily provide confidence in when the signature value was produced; acceptance of a purported signing time is a matter of the recipient's discretion. RFC 3161 TSP is cited for obtaining trusted timestamps.
section: "4"
topics:
    - crypto
    - pkix
    - security
