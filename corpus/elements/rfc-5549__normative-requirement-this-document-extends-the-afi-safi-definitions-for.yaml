document: rfc-5549
kind: normative-requirement
summary: This document extends the AFI/SAFI definitions for <1/1>, <1/2>, <1/4>, and <1/128> to allow the Next Hop address to belong to IPv6 in addition to IPv4, using an MP_REACH_NLRI with AFI=1, SAFI=1/2/4/128, and Length of Next Hop Address=16 or 32.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
