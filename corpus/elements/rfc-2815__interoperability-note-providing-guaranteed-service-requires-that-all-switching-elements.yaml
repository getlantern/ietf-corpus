document: rfc-2815
kind: interoperability-note
summary: Providing Guaranteed Service requires that *all* switching elements along the path participate in special treatment for the flow's packets. Even a single switch transmitting onto a shared or half-duplex LAN segment breaks Guaranteed Service guarantees entirely.
section: "6"
topics:
