document: rfc-8214
kind: design-rationale
summary: The VLAN-Aware Bundle Service Interface is explicitly not used in EVPN-VPWS because it would map identically to the VLAN-based service interface (Section 2.1); defining separate data-plane and control-plane behavior for it would yield no distinction from the VLAN-based service.
