document: rfc-7171
kind: normative-requirement
summary: If the version sent by the NEA Client is not acceptable to the NEA Server, the NEA Server MUST terminate the PT-EAP session immediately. Otherwise, both the NEA Client and NEA Server MUST use the chosen version in all subsequent PT-EAP messages.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
