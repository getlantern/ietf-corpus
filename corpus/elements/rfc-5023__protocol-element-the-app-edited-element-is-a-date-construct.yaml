document: rfc-5023
kind: protocol-element
summary: The app:edited element is a Date construct (per RFC 4287) indicating the last time an Entry was edited or, if never edited, when it was created. Collection Feed Entries SHOULD contain exactly one app:edited element; MUST NOT contain more than one.
section: "10.2"
