document: rfc-8783
kind: protocol-element
summary: The 'flags-bitmask' grouping for TCP matching uses a uint16 'bitmask' field that matches the last 4 bits of byte 12 and byte 13 of the TCP header (the 4 TCP data-offset bits in byte 12 are excluded). An 'operator' field (not/match/any) governs interpretation.
section: "4.3"
