document: rfc-2225
kind: design-rationale
summary: The LIS model requires inter-subnet traffic to flow through an IP router even if a direct ATM VC could be established, because administrators rely on IP gateways for security, access control, routing, and filtering. ATM must not 'back-door' around these mechanisms.
