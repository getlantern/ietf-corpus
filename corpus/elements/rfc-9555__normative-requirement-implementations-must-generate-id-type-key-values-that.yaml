document: rfc-9555
kind: normative-requirement
summary: Implementations MUST generate Id-type key values that are valid according to the definition of the Id type in RFC 9553. Multivalued vCard properties map to JSContact JSON objects keyed by Id-typed strings; any valid generation scheme (e.g., incrementing counter) is permitted.
section: 2.1.2
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
