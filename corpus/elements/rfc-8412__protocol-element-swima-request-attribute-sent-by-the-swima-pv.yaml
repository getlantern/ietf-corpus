document: rfc-8412
kind: protocol-element
summary: 'SWIMA Request attribute: sent by the SWIMA-PV to request inventory or event data. Includes a Request ID (echoed in responses for matching), an EID field (0 for inventory, non-zero for events starting from that EID), and an optional list of Software Identifiers for targeted requests.'
section: "5.6"
