document: rfc-5751
kind: normative-requirement
summary: Before sending a message, the sending agent MUST decide whether weak encryption is acceptable for the particular data. If weak encryption is unacceptable, the agent MUST NOT use a weak algorithm regardless of other decision rules. When recipient capabilities are unknown, agents SHOULD use AES-128 as the default.
section: 2.7.1
rfc2119_level: MUST
topics:
    - email
    - security
    - crypto
