document: rfc-1548
kind: design-rationale
summary: The Stopped state in the automaton combines what could be separate states for link termination, configuration failure, and other failure modes. This consolidation avoids complexity while handling a race condition between a Down event response and an incoming Configure-Request.
section: "4.4"
