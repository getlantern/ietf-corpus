document: rfc-6647
kind: normative-requirement
summary: Greylisting servers MAY track CIDR blocks (e.g., /24) rather than full IPv4 addresses to accommodate clusters of outgoing mail servers. A similar grouping MAY be established based on the mail server's domain name.
section: "5"
rfc2119_level: MAY
topics:
    - email
