document: rfc-8660
kind: design-rationale
summary: The SR architecture permits multiple SIDs for the same prefix, enabling different forwarding behaviors (distinct paths, ECMP, UCMP) per destination. An operator assigns multiple MPLS labels or indices to the same prefix, each with a distinct forwarding behavior installed in the FIB.
