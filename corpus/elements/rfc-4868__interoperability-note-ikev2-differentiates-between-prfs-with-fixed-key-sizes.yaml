document: rfc-4868
kind: interoperability-note
summary: IKEv2 differentiates between PRFs with fixed key sizes and those with variable key sizes; the PRF variants defined here (PRF-HMAC-SHA-256, PRF-HMAC-SHA-384, PRF-HMAC-SHA-512) are considered to have variable key length when used with IKE or IKEv2.
