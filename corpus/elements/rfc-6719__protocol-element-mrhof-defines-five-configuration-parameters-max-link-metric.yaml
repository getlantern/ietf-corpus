document: rfc-6719
kind: protocol-element
summary: 'MRHOF defines five configuration parameters: MAX_LINK_METRIC (maximum per-link metric), MAX_PATH_COST (maximum end-to-end path metric), PARENT_SWITCH_THRESHOLD (hysteresis threshold for parent switching), PARENT_SET_SIZE (maximum number of parents), and ALLOW_FLOATING_ROOT (permits becoming a floating root).'
