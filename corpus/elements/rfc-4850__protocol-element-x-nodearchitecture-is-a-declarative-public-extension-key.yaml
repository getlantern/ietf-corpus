document: rfc-4850
kind: protocol-element
summary: X#NodeArchitecture is a declarative Public Extension Key with use 'LO' (Leading Only) and scope 'SW', sent by both initiator and target during operational parameter negotiation of the iSCSI login phase. It communicates architecture details such as iSCSI vendor software, firmware, hardware versions, OS version, or hardware architecture.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
