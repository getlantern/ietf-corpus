document: rfc-4683
kind: security-consideration
summary: Because SIIs (e.g., Social Security Numbers) are short and partially predictable from demographic data, a weak user password significantly lowers the attacker's work factor. Users must select strong passwords to prevent guessing attacks on SIMs.
