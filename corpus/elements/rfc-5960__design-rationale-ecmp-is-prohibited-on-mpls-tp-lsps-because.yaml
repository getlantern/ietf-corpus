document: rfc-5960
kind: design-rationale
summary: ECMP is prohibited on MPLS-TP LSPs because MPLS-TP transport paths require deterministic, stable routing for OAM correlation and protection/restoration to function correctly; load-balancing in the server layer is permitted only if transparent to MPLS-TP.
section: 3.1.1
topics:
    - mpls
    - routing
