document: rfc-5177
kind: normative-requirement
summary: For deregistration, the Home Agent MUST delete entries from its Registration Table, tear down the bi-directional tunnel, stop forwarding packets to/from the Mobile Router, and MUST ignore any Mobile Network Request extension included in the deregistration request.
section: "6.7"
rfc2119_level: MUST
topics:
