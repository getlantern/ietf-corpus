document: rfc-7303
kind: normative-requirement
summary: XML-aware MIME producers SHOULD supply a charset parameter and/or an appropriate BOM with non-UTF-8-encoded XML MIME entities that lack an encoding declaration, and SHOULD remove or correct an incorrect encoding declaration.
section: "3.1"
rfc2119_level: SHOULD
