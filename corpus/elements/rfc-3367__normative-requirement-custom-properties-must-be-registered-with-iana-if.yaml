document: rfc-3367
kind: normative-requirement
summary: Custom properties MUST be registered with IANA. If a property or type is not registered with IANA, it must start with 'x-'. Types are scoped to a given property; if a new property is defined, a new type MUST be defined even if the value set is identical to an existing type.
section: 4.1.2
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
