document: rfc-2264
kind: protocol-element
summary: 'The non-authoritative SNMP engine maintains per-authoritative-engine state: a local notion of snmpEngineBoots, snmpEngineTime, and latestReceivedEngineTime. The latestReceivedEngineTime prevents replay attacks that would cause the local time notion to regress.'
