document: rfc-8791
kind: interoperability-note
summary: Within a 'structure' or 'augment-structure' extension statement, the list-stmt is not required to have a key-stmt defined, and the config-stmt is ignored if present. These are constrained behaviors that differ from standard YANG list and config semantics.
