document: rfc-5958
kind: interoperability-note
summary: The .pvk (Microsoft proprietary) and .p12/.pfx formats are not interchangeable with the OneAsymmetricKey format defined here, though conversion tools exist. The .pvk extension is used for local storage of Microsoft's private-key proprietary transfer syntax.
