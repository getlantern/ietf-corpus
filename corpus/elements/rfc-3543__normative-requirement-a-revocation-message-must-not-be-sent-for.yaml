document: rfc-3543
kind: normative-requirement
summary: A revocation message MUST NOT be sent for any registration that has expired; it MAY only be sent prior to the expiration of a mobile node's registration. An agent MUST NOT send more than one revocation message or registration message per second for the same binding.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - mobility
