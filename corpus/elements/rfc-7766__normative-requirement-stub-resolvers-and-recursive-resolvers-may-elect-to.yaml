document: rfc-7766
kind: normative-requirement
summary: Stub resolvers and recursive resolvers MAY elect to send either TCP or UDP queries; TCP MAY be used before sending any UDP queries. If the resolver already has an open TCP connection to the server, it SHOULD reuse this connection.
section: "5"
rfc2119_level: MAY
topics:
    - dns
    - tcp
