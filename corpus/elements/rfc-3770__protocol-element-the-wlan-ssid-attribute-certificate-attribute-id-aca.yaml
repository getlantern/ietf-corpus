document: rfc-3770
kind: protocol-element
summary: 'The WLAN SSID attribute certificate attribute (id-aca-wlanSSID, id-aca 6) allows associating a list of SSIDs with a public key certificate when the certificate itself does not include the WLAN SSID extension. The syntax is identical to the certificate extension: SSIDList of SSID OCTET STRINGs.'
section: "4"
topics:
