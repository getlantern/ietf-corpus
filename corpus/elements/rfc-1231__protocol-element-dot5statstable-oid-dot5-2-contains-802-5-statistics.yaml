kind: protocol-element
summary: dot5StatsTable (OID dot5 2) contains 802.5 statistics and error counters with one mandatory entry per interface. All statistics use Counter (32-bit wrap-around) syntax; nineteen error counters are defined including line errors, burst errors, AC errors, lost frame errors, soft errors, hard errors, signal loss, transmit beacons, recoveries, lobe wire faults, and removes.
