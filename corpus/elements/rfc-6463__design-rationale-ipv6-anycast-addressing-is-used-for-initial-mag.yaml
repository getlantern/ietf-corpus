document: rfc-6463
kind: design-rationale
summary: IPv6 anycast addressing is used for initial MAG-to-rfLMA contact so that a blade-architecture LMA can present a single address to the MAG; after the PBU/PBA exchange the MAG learns the unicast address of the assigned r2LMA blade and all subsequent communication uses that unicast address.
section: "1"
topics:
