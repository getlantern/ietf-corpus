document: rfc-6597
kind: security-consideration
summary: Because SMPTE ST 336 encoded data item lengths are essentially unbounded, receivers must take care when allocating resources during processing. Pathological data can cause naive decoders to allocate large amounts of resources, resulting in denial-of-service threats.
