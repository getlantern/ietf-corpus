document: rfc-6285
kind: interoperability-note
summary: Burst stream synchronization with primary multicast streams is achieved via RTP header extensions carrying NTP-based timing information per RFC 6051, piggybacked on retransmission packets per RFC 4588's requirement to propagate original header extensions. RECOMMENDED that multicast sources emit synchronization header extensions frequently.
section: "6.3"
topics:
    - rtp
    - realtime
    - ntp
