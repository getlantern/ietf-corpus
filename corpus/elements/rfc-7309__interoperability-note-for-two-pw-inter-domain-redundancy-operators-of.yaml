document: rfc-7309
kind: interoperability-note
summary: For two-PW inter-domain redundancy, operators of both domains must negotiate and configure the same PW high/low priority at the two PW endpoints prior to deployment. If PE3 and PE5 do not both have higher (or lower) priority than PE4 and PE6, both PW1 and PW2 may enter standby state simultaneously.
section: "5.2"
topics:
    - mpls
