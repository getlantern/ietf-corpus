document: rfc-6936
kind: interoperability-note
summary: A middlebox MUST NOT maintain separate state for a UDP flow based on the checksum field value; doing so would break bidirectional flows where one direction uses a calculated checksum and the other uses a zero checksum.
section: "5"
topics:
    - udp
    - ip
    - nat
