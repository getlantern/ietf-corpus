document: rfc-3329
kind: normative-requirement
summary: If 'digest' is chosen, the client MUST use the algorithm and qop parameters from the Security-Server header to replace the same parameters in the HTTP Digest challenge, and MUST use the digest-verify parameter in the Security-Verify header to protect the Security-Server header field as specified in Section 2.2.
section: "2.4"
rfc2119_level: MUST
topics:
    - sip
    - security
