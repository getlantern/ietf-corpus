document: rfc-5027
kind: normative-requirement
summary: When all mandatory preconditions are met during a re-INVITE or UPDATE, user agents MUST start using the new session parameters for media packets being sent, and SHOULD be prepared to process media received with either old or new session parameters for a short transition period.
section: "3"
rfc2119_level: MUST
topics:
