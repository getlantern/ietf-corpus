document: rfc-5219
kind: normative-requirement
summary: Each receiving implementation MUST recognize the ISN and be able to perform deinterleaving of incoming ADU frames. A sending implementation MAY choose not to perform interleaving, in which case the high-order 11 bits remain at 0xFFE.
section: "7"
rfc2119_level: MUST
topics:
