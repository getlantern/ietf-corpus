document: rfc-7220
kind: normative-requirement
summary: The Description field MUST carry UTF-8 encoded (RFC 3629) description text. The description text MUST NOT be null terminated, and implementations MUST NOT rely on the presence of a NUL character in the wire data to identify the end of the text.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
