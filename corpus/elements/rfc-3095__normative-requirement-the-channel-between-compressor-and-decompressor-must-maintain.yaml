document: rfc-3095
kind: normative-requirement
summary: The channel between compressor and decompressor MUST maintain packet ordering and MUST NOT duplicate packets. Reordering and duplication before the compression point are tolerated and handled.
section: "4.1"
rfc2119_level: MUST
