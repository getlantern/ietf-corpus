document: rfc-7377
kind: protocol-element
summary: The search-correlator item is extended to include a MAILBOX (astring), UIDVALIDITY (nz-number), and TAG (tag-string) field; each correlator MUST appear exactly once per ESEARCH response. These fields allow a client to match responses to commands when pipelining multiple ESEARCH commands.
