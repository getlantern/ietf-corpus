document: rfc-9014
kind: protocol-element
summary: 'In the VPLS Interconnect model, each GW MAC-VRF uses two split-horizon groups: a WAN split-horizon group (VPLS PWs) and a DC split-horizon group (EVPN-Overlay bindings). Traffic received from a binding in one group is never forwarded to any member of the same group, preventing loops.'
section: 4.2.1
topics:
    - routing
    - bgp
    - mpls
