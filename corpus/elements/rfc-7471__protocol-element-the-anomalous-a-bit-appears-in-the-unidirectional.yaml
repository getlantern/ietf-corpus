document: rfc-7471
kind: protocol-element
summary: The Anomalous (A) bit appears in the Unidirectional Link Delay, Min/Max Unidirectional Link Delay, and Unidirectional Link Loss sub-TLVs. It is set when a measured value exceeds a configured maximum threshold and cleared when the value falls below a configured reuse threshold, enabling receivers to trigger traffic re-routing or failover actions.
section: "3"
topics:
    - routing
