document: rfc-9864
kind: protocol-element
summary: 'This specification formally defines ''Deprecated'' (a preferred replacement exists; new deployments SHOULD use it unless operational/regulatory requirements prevent migration) and ''Prohibited'' (the identifier and its functionality MUST NOT be used) for use in JOSE and COSE IANA registries. For COSE, the complete set of ''Recommended'' column values is now: Yes, No, Filter Only, Prohibited, and Deprecated.'
section: "4.4"
rfc2119_level: SHOULD
topics:
    - jose
    - registry
