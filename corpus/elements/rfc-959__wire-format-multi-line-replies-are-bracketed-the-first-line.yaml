document: rfc-959
kind: wire-format
summary: 'Multi-line replies are bracketed: the first line begins with the 3-digit reply code immediately followed by a hyphen ''-''; the last line begins with the same code immediately followed by a space. Intermediate lines that begin with a 3-digit number must be padded to avoid misidentification as the final line.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
