document: rfc-7358
kind: design-rationale
summary: The negotiated label advertisement mode in LDP (carried in the Initialization message) is only indicative, not a strict rule. For some FEC types, the advertising behavior is governed by the FEC type itself rather than the negotiated session-level mode. This document clarifies that fact to remove ambiguity.
