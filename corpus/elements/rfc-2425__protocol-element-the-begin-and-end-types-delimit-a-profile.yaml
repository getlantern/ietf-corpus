document: rfc-2425
kind: protocol-element
summary: The BEGIN and END types delimit a profile block within a text/directory body, enabling multiple entities within one body part and identifiability outside a MIME environment. Their value is the profile name (e.g., BEGIN:VCARD / END:VCARD).
