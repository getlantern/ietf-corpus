document: rfc-7434
kind: security-consideration
summary: SIP/PSTN gateways implementing the ISDN User-to-User service should not blindly trust ISUP received from the PSTN, following the general SIP-to-ISUP interworking security principles of RFC 3398. Information revealing private data or requiring authenticity guarantees may not be suitable for this package given the lower ISDN security baseline.
section: "14"
topics:
    - sip
    - security
    - realtime
    - voip
