document: rfc-4866
kind: normative-requirement
summary: If the Binding Update is early (no valid care-of keygen token), the mobile node MUST include a Care-of Test Init option requesting the correspondent node to return a fresh care-of keygen token in the Binding Acknowledgment. Upon receipt, the mobile node MUST then send a complete Binding Update using that token.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
