document: rfc-4552
kind: security-consideration
summary: Using the same key on all OSPF routers connected to a link leaves all routers insecure against impersonating attacks if any one router is compromised, malfunctioning, or misconfigured, because any router with the shared key can masquerade as any other.
section: "14"
topics:
    - ipsec
    - security
    - routing
