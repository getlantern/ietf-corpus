document: rfc-5278
kind: design-rationale
summary: The existing SIP Enumservice type (RFC 3764) was considered but rejected because it cannot distinguish voice messaging, video messaging, or unified messaging endpoints from regular SIP endpoints. Without the vmsg type, a UAC or UAS presented with multiple SIP URIs has no standards-based way to identify which URI targets a messaging service.
section: "1.2"
topics:
    - sip
    - dns
    - voip
