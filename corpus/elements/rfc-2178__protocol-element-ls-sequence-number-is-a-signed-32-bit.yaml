document: rfc-2178
kind: protocol-element
summary: LS Sequence Number is a signed 32-bit integer in the range [InitialSequenceNumber (0x80000001), MaxSequenceNumber (0x7fffffff)]. When an LSA's sequence number reaches MaxSequenceNumber, the originating router must flush it and re-originate at InitialSequenceNumber.
section: 12.1.6
topics:
    - routing
