document: rfc-9326
kind: wire-format
summary: Flow ID is an optional 32-bit field representing the flow identifier, zero-padded in most significant bits if the actual Flow ID is shorter. It is set at the encapsulating node and used to correlate exported data of the same flow across multiple nodes and packets.
