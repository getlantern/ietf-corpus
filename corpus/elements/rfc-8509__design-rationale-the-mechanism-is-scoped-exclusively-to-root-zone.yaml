document: rfc-8509
kind: design-rationale
summary: The mechanism is scoped exclusively to root zone KSK trust anchors. This limitation simplifies the label namespace and the resolver logic, since only root-zone keys require cross-resolver rollover readiness measurements at Internet scale.
