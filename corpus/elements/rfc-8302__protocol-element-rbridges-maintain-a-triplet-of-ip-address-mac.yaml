document: rfc-8302
kind: protocol-element
summary: RBridges maintain a triplet of {IP address, MAC address, ingress nickname} per Data Label (VLAN or FGL) for each known end station. This triplet is the core data structure for ARP/ND optimization and can be locally learned or received via ESADI or directory.
