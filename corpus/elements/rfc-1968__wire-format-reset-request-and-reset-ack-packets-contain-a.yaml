document: rfc-1968
kind: wire-format
summary: Reset-Request and Reset-Ack packets contain a 1-octet Code field (14 or 15), a 1-octet Identifier, a 2-octet Length, and a variable-length Data field of zero or more octets up to the peer's MRU minus four.
