document: rfc-1996
kind: protocol-element
summary: A NOTIFY request uses the DNS message format with opcode NOTIFY (4), QR=0, AA flag set, QDCOUNT>0, and optionally ANCOUNT>=0. The QNAME is the zone name, QCLASS is the zone class, and QTYPE is T_SOA for the only currently defined NOTIFY event.
