summary: 'SPIRITS defines 5 non-call related cellular events: LUSV (location update same VLR), LUDV (location update different VLR), REG (IMSI attach), UNREGMS (MS-initiated IMSI detach), and UNREGNTWK (network-initiated IMSI detach), each with CalledPartyNumber and optionally Cell-ID.'
