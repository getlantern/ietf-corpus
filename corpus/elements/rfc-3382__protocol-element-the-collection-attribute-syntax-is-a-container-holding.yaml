document: rfc-3382
kind: protocol-element
summary: The 'collection' attribute syntax is a container holding one or more named values called member attributes. Each collection value is a value of an attribute whose attribute syntax type is defined to be 'collection'. The name of the collection attribute identifies the collection value in an operation request or response.
section: "1.2"
topics:
    - registry
