document: rfc-9636
kind: normative-requirement
summary: When truncating the end of a TZif file, the service MUST supply a last version 2+ transition at the truncation end point with an empty TZ string, and the time type of that last transition MUST be a placeholder for unspecified local time.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
