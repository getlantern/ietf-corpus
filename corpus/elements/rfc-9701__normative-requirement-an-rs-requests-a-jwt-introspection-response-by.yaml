document: rfc-9701
kind: normative-requirement
summary: An RS requests a JWT introspection response by sending an introspection request with an Accept HTTP header field set to 'application/token-introspection+jwt'. The AS MUST authenticate the caller at the token introspection endpoint.
section: "4"
rfc2119_level: MUST
