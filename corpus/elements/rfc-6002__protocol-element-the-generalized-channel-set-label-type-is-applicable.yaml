document: rfc-6002
kind: protocol-element
summary: The Generalized Channel_Set LABEL type is applicable to all other label-related objects and subobjects defined in RFC 3473, including SUGGESTED_LABEL, LABEL_SET, ACCEPTABLE_LABEL_SET, UPSTREAM_LABEL, RECOVERY_LABEL, Label ERO subobject, and Label RRO subobject. No new definitions are needed as these objects are label-type agnostic.
section: "3.3"
topics:
