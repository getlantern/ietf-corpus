document: rfc-5031
kind: protocol-element
summary: 'The ''service'' URN namespace uses a hierarchical identifier with dot-separated labels, where the leftmost label is the top-level service and labels to the right are sub-services. The ABNF syntax is: service-URN = ''URN:service:'' service; service = top-level *(''.'' sub-service). Labels are case-insensitive but MUST be specified in all lower-case.'
section: "3"
topics:
