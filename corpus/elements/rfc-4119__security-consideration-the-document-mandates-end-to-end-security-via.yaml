document: rfc-4119
kind: security-consideration
summary: The document mandates end-to-end security via S/MIME applied to the PIDF document as a whole rather than per-element, because any partial protection configuration introduces potential for privacy leakage. S/MIME provides confidentiality, integrity, and authentication across the object's lifetime.
