document: rfc-8853
kind: design-rationale
summary: Alternative simulcast formats (comma-separated rid-ids) within a simulcast stream override normal codec preference ordering on the 'm=' line to allow separation of general codec preferences from simulcast-stream configuration preferences. However, no mechanism forces the answerer to choose the same alternative for multiple simulcast streams.
section: "5.2"
topics:
    - realtime
    - rtp
