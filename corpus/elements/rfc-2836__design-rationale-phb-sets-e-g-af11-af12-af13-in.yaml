document: rfc-2836
kind: design-rationale
summary: PHB sets (e.g., AF11, AF12, AF13 in a single AF class) must be identifiable as a group because traffic within a set may need to follow the same physical path to prevent reordering; a single-bit flag (bit 14) indicates set membership without requiring a separate encoding scheme.
