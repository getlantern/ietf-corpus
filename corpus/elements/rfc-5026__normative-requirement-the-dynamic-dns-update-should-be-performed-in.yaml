document: rfc-5026
kind: normative-requirement
summary: The dynamic DNS update SHOULD be performed in a secure way; usage of TKEY and TSIG or DNSSEC is recommended. The Home Agent MUST have a security association with the DNS server, and that SA MUST be separate from SAs used for other purposes such as AAA.
section: "9.5"
rfc2119_level: MUST
topics:
    - mobility
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
