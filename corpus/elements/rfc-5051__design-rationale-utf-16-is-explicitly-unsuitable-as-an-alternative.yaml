document: rfc-5051
kind: design-rationale
summary: UTF-16 is explicitly unsuitable as an alternative to UTF-8 in step (3) because UTF-16 surrogates cause i;octet to collate codepoints U+E0000 through U+FFFF after non-BMP codepoints, producing incorrect ordering.
section: "2"
