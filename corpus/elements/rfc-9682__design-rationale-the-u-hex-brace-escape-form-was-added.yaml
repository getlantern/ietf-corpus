document: rfc-9682
kind: design-rationale
summary: 'The \u{hex} brace escape form was added as a backward-compatible extension (existing CDDL files remain valid) but is not forward compatible: CDDL files using this syntax may not be processable by implementations not yet updated to RFC 9682, which is why updating implementations is recommended.'
