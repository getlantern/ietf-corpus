document: rfc-9462
kind: normative-requirement
summary: A client MAY use SVCB information from _dns.resolver.arpa. with an opportunistic privacy profile only when the Encrypted DNS Resolver's IP address does not differ from the Unencrypted DNS Resolver's IP address; this mode SHOULD be used only for private or local IP addresses.
section: "4.3"
rfc2119_level: MAY
topics:
    - dns
    - tls
    - privacy
