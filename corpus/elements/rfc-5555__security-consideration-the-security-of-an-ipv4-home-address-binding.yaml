document: rfc-5555
kind: security-consideration
summary: The security of an IPv4 home address binding relies entirely on the IPsec SA established for the IPv6 home address. The home agent authorizes the IPv4 binding by verifying that the IPv6 binding update is authentic and that the IPv4 address is pre-associated with that IPv6 home address, rather than establishing a separate SA for IPv4.
section: "5"
topics:
    - mobility
    - security
    - ipsec
    - ip
