document: rfc-8777
kind: interoperability-note
summary: For DNS servers that do not natively support the AMTRELAY RRType, the unknown RRType format from RFC 3597 (TYPE260 with \# encoding) can be used to publish AMTRELAY records. Appendix A provides a Python script to convert wire-encoded domain names for this purpose.
