document: rfc-3472
kind: wire-format
summary: IPv4 Interface ID TLV (type 0x082d) carries IPv4 Next/Previous Hop Address (32 bits), Logical Interface ID (32 bits), and Interface ID sub-TLVs. IPv6 Interface ID TLV (type 0x082e) uses a 128-bit IPv6 address in place of the IPv4 address. Both are used in REQUEST and MAPPING messages to identify data channels when control and data channels are separated.
section: 8.1.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
