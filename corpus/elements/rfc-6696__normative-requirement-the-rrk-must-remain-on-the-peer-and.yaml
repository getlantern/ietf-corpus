document: rfc-6696
kind: normative-requirement
summary: The rRK MUST remain on the peer and the server that derived it and MUST NOT be transported to any other entity. The rRK MUST be removed from use when its parent key expires, and its lifetime MUST NOT exceed that of the parent key.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
