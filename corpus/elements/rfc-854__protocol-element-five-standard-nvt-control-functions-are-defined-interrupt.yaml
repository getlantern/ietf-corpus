document: rfc-854
kind: protocol-element
summary: 'Five standard NVT control functions are defined: Interrupt Process (IP, code 244) — suspend/abort a user process; Abort Output (AO, code 245) — run process to completion but discard output; Are You There (AYT, code 246) — elicit visible evidence the system is alive; Erase Character (EC, code 247) — delete last character; Erase Line (EL, code 248) — delete current input line.'
section: THE NETWORK VIRTUAL TERMINAL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
