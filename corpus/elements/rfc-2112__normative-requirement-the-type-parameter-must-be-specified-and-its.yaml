document: rfc-2112
kind: normative-requirement
summary: The type parameter must be specified and its value is the MIME media type of the root body part. If the value of the type parameter and the root body part's content-type differ, the User Agent's behavior is undefined.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
