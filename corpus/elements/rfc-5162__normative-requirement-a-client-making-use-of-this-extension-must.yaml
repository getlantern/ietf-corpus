document: rfc-5162
kind: normative-requirement
summary: A client making use of this extension MUST issue 'ENABLE QRESYNC' once it is authenticated. A server MUST respond with a tagged BAD response if the QRESYNC parameter to SELECT/EXAMINE or the VANISHED UID FETCH modifier is specified and the client hasn't issued 'ENABLE QRESYNC' in the current connection.
section: "1"
rfc2119_level: MUST
topics:
    - email
