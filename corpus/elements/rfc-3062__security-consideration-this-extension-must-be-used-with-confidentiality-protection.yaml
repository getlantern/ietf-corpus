document: rfc-3062
kind: security-consideration
summary: This extension MUST be used with confidentiality protection such as Start TLS (RFC 2830). The NULL cipher suite MUST NOT be used. The operation itself provides no integrity or confidentiality protection and use without privacy protections may disclose passwords to unauthorized parties.
section: "4"
rfc2119_level: MUST
topics:
    - ldap
    - tls
    - security
    - crypto
