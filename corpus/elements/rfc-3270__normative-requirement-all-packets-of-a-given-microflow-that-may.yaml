document: rfc-3270
kind: normative-requirement
summary: All packets of a given microflow that may span multiple Behavior Aggregates of an Ordered Aggregate MUST be transported over the same LSP to respect ordering constraints. Conversely, each LSP MUST be capable of supporting all active BAs of a given OA.
section: "1.4"
rfc2119_level: MUST
topics:
    - mpls
    - diffserv
    - qos
