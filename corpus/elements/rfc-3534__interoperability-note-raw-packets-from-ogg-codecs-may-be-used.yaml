document: rfc-3534
kind: interoperability-note
summary: Raw packets from Ogg codecs may be used directly by transport mechanisms that provide their own framing and packet-separation (such as UDP datagrams). For RTP streaming, a separate RTP wrapping mechanism should be used rather than application/ogg.
section: "1"
topics:
    - rtp
    - udp
