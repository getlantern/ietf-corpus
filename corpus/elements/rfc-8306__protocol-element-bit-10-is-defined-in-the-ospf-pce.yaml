document: rfc-8306
kind: protocol-element
summary: Bit 10 is defined in the OSPF PCE Capability Flags sub-TLV (shared with IS-IS) to indicate P2MP computation capability. PCEs supporting P2MP set the bit; PCEs that do not support P2MP leave it clear; PCCs that do not understand the bit ignore it.
section: 3.1.1
topics:
