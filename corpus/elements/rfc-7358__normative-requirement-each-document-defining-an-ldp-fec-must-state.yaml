document: rfc-7358
kind: normative-requirement
summary: Each document defining an LDP FEC MUST state the applicability of the negotiated label advertisement discipline for label binding advertisements for that FEC. If the negotiated discipline does not apply, the document MUST also explicitly state the discipline to be used.
section: "2.1"
rfc2119_level: MUST
topics:
