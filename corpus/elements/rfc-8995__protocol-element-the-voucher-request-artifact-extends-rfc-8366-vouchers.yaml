document: rfc-8995
kind: protocol-element
summary: 'The voucher-request artifact extends RFC 8366 vouchers with two new YANG leaves: ''proximity-registrar-cert'' (the end-entity TLS certificate of the registrar, used in pledge requests to assert proximity) and ''prior-signed-voucher-request'' (the pledge''s signed request forwarded by the registrar to the MASA). Fields created-on, pinned-domain-cert, last-renewal-date, and domain-cert-revocation-checks are not valid in a voucher-request and MUST be ignored.'
section: "3"
topics:
