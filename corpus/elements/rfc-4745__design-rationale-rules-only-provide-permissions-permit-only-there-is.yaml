document: rfc-4745
kind: design-rationale
summary: Rules only provide permissions (permit-only); there is no deny functionality. This eliminates rule-ordering dependencies, simplifies update operations, avoids complications in distributed rule sets, and results in more efficient processing. The consequence is that to make a policy decision all rules must be processed.
section: "4"
topics:
    - privacy
    - security
