document: rfc-3949
kind: normative-requirement
summary: Profile F readers must support both FillOrder=1 (MSB first) and FillOrder=2 (LSB first). Profile S requires only FillOrder=2. Uncompressed data (Compression=1 or 2) is not allowed in TIFF-F.
section: 4.2.1
rfc2119_level: REQUIRED
