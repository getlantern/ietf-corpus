document: rfc-9173
kind: security-consideration
summary: 'Bundle fragmentation can prevent BPSec security services from being processed: a security block and its target may end up in different fragments; security blocks cryptographically bound to the primary block cannot be processed in fragments (fragments have different primary blocks); and the same operation may verify in one fragment but fail in another.'
section: "6.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
