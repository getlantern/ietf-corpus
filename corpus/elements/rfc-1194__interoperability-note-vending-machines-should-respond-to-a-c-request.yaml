document: rfc-1194
kind: interoperability-note
summary: Vending machines SHOULD respond to a {C} request with a list of all items currently available for purchase, and to a {U}{C} request with a detailed count or list of a particular product or product slot, illustrating the protocol's extension beyond traditional user information.
section: 2.5.5
