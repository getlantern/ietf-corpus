document: rfc-3709
kind: security-consideration
summary: Logotype data is fetched from a server when needed, enabling network observers to determine which clients are using certificates containing particular logotype data, introducing privacy concerns. Caching mitigates frequency of exposure but cannot eliminate it entirely.
section: "7"
topics:
