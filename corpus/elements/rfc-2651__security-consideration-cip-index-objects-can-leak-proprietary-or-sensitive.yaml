document: rfc-2651
kind: security-consideration
summary: CIP index objects can leak proprietary or sensitive data if not carefully designed. The risk of reverse-engineering a database from its exported index must be kept consistent with the value of the data; security must be a prime consideration when designing new index object types.
section: "5.1"
topics:
    - security
