document: rfc-9181
kind: protocol-element
summary: The 'ietf-vpn-common' YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-vpn-common) defines a reusable set of identities, types, and groupings shared across L2 and L3 VPN models including L3NM (RFC 9182) and L2NM. It does not expose any standalone data nodes; it is a library module meant to be imported by other VPN YANG modules.
