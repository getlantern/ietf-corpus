document: rfc-9892
kind: wire-format
summary: The Ethernet Traffic Classification Sub-Data Item (type 2) contains a 16-bit FID, a 4-bit NumPCPs, a 12-bit VLAN Identifier (VID), and a list of 4-bit Priority Fields (PCP values). An optional 4-bit Pad field is added when NumPCPs is odd. Maximum length is 8 octets.
section: "2.3"
