document: rfc-9070
kind: protocol-element
summary: 'Three RPC actions are defined: ''mpls-ldp-clear-peer'' (reset LDP peer by lsr-id/label-space-id), ''mpls-ldp-clear-hello-adjacency'' (clear link or targeted adjacency), and ''mpls-ldp-clear-peer-statistics'' (reset per-peer counters). All are identified by protocol-name leafref.'
