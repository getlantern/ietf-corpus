document: rfc-3417
kind: design-rationale
summary: SNMP over DDP uses NBP names rather than DDP addresses to identify nodes because AppleTalk network-level addresses are dynamically assigned and can change at every reboot, unlike the relatively stable IP addresses used in TCP/IP.
