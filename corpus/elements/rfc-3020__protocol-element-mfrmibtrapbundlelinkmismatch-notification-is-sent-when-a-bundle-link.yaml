document: rfc-3020
kind: protocol-element
summary: mfrMibTrapBundleLinkMismatch notification is sent when a bundle link mismatch is detected, reporting the near-end bundle name, far-end bundle name (previously known), near-end link name, far-end link name, and currently reported far-end bundle name. The mfrBundleLinkMismatch counter is incremented concurrently.
section: 2.5.2.3
