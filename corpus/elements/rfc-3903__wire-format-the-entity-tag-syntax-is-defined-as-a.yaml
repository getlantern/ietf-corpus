document: rfc-3903
kind: wire-format
summary: The entity-tag syntax is defined as a token (not a quoted-string as in HTTP/1.1). SIP-ETag = 'SIP-ETag' HCOLON entity-tag; SIP-If-Match = 'SIP-If-Match' HCOLON entity-tag; entity-tag = token. No weak entity-tag prefix or wildcard '*' is defined.
