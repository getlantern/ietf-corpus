document: rfc-5840
kind: security-consideration
summary: WESP allows intermediate device visibility into ESP-encapsulated frames. Care should be taken not to send sensitive data over WESP connections in network domains where this visibility is not appropriate. A strong key agreement protocol (e.g., IKEv2) and a strong policy engine should govern where WESP is employed.
section: "3"
topics:
    - ipsec
    - security
