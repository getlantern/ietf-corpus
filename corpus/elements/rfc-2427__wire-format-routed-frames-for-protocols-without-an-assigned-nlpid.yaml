document: rfc-2427
kind: wire-format
summary: Routed frames for protocols without an assigned NLPID use NLPID 0x80 (SNAP), a pad octet 0x00, OUI 0x00-00-00, and the Ethertype as PID. Protocols with an assigned NLPID omit SNAP and pad, saving 48 bits.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
