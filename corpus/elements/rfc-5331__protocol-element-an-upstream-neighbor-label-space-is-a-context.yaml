document: rfc-5331
kind: protocol-element
summary: An Upstream Neighbor Label Space is a context-specific label space that a downstream LSR Rd maintains for each upstream LSR Ru, used to look up upstream-assigned labels assigned by Ru. A separate space is maintained for each unique tunnel root IP address.
