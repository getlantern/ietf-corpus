document: rfc-3547
kind: normative-requirement
summary: The Responder MUST NOT compute the shared Diffie-Hellman number or install new SAs until it receives a message with the initiator's nonce Nr included properly in the HASH payload, ensuring liveliness is proven before state is committed.
section: "3.2"
rfc2119_level: MUST NOT
topics:
