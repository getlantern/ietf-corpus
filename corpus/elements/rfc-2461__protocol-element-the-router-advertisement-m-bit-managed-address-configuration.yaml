document: rfc-2461
kind: protocol-element
summary: The Router Advertisement M-bit (Managed address configuration) instructs hosts to use a stateful protocol (e.g., DHCPv6) in addition to stateless autoconfiguration. The O-bit (Other stateful configuration) instructs hosts to use a stateful protocol for non-address configuration. A Router Lifetime of zero means the router SHOULD NOT appear on the default router list.
section: "4.2"
topics:
    - ip
    - v6ops
