document: rfc-9109
kind: design-rationale
summary: The choice of whether to randomize the ephemeral port on a per-request or per-association basis is left to the implementation; per-request randomization better mitigates blind/off-path attacks but may negatively affect time measurement stability due to ECMP path variation.
