document: rfc-4006
kind: protocol-element
summary: 'The Credit-Control-Failure-Handling AVP (Code 427) instructs the client on behavior when credit-control messages cannot reach the server: TERMINATE (0) stops the service, CONTINUE (1) allows service to continue, and RETRY_AND_TERMINATE (2) retries and then terminates.'
section: "8.14"
