document: rfc-2250
kind: protocol-element
summary: 'The AN and N bits support MPEG-2 error resilience: AN=1 activates the N bit; N=1 signals that picture header parameters changed and cannot be reconstructed from a previously transmitted header of the same picture type. N must be constant across all packets of a given picture.'
section: "3.4"
topics:
