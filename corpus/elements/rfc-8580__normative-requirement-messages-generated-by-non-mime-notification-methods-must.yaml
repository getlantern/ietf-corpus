document: rfc-8580
kind: normative-requirement
summary: Messages generated by non-MIME notification methods MUST be encapsulated per Section 4 before being filed. The body of the filed message MUST include the :message tagged argument and MAY include :from, :importance, or :options arguments.
section: "6"
rfc2119_level: MUST
