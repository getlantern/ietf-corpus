document: rfc-3275
kind: design-rationale
summary: 'The Manifest element exists to allow applications to reserve reference validation logic for themselves: a single SignedInfo can reference one Manifest containing many References, avoiding expensive repeated public-key signature operations over large SignedInfo elements when multiple signatures on the same document set are required.'
section: "2.3"
topics:
    - security
    - crypto
