document: rfc-8431
kind: normative-requirement
summary: Before calling the route-add RPC, it is required to call the nh-add RPC to create the nexthop and obtain a nexthop identifier; an exception applies when the nexthop already exists and its nexthop-id is already known.
section: "2.5"
rfc2119_level: REQUIRED
topics:
