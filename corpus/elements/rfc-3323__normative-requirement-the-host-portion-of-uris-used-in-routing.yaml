document: rfc-3323
kind: normative-requirement
summary: The host portion of URIs used in routing subsequent requests (e.g., Contact header) SHOULD NOT be altered by the user agent for privacy reasons. If these headers require anonymization, the user should request that service from a privacy service intermediary.
section: 4.1.1.3
rfc2119_level: SHOULD NOT
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
