document: rfc-3268
kind: design-rationale
summary: Only 128-bit and 256-bit AES key lengths are defined, deliberately omitting 192-bit, to avoid unnecessary proliferation of ciphersuites. All ciphersuites use 128-bit AES block size as mandated by the AES process.
section: Cipher Usage
topics:
