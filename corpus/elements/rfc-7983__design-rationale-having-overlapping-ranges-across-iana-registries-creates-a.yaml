document: rfc-7983
kind: design-rationale
summary: Having overlapping ranges across IANA registries creates a hidden inter-registry coordination requirement whenever a new codepoint is allocated. The document argues this is organizationally undesirable, and proposes that IANA registry experts raise a flag when an allocation would irrevocably prevent multiplexing, even if multiplexing is not the immediate motivation.
section: "1"
topics:
