document: rfc-9335
kind: normative-requirement
summary: If the RTP packet contains CSRCs but no header extensions, an empty extension block with the 0xC0DE tag and a 16-bit length field set to zero MUST be appended and the X bit MUST be set to 1, to signal to the receiver that the CSRCs are encrypted.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
