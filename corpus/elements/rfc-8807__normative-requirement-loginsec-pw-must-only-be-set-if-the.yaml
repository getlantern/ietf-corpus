document: rfc-8807
kind: normative-requirement
summary: <loginSec:pw> MUST only be set if the RFC 5730 <pw> element is set to the "[LOGIN-SECURITY]" value; similarly, <loginSec:newPW> MUST only be set if the RFC 5730 <newPW> element is set to "[LOGIN-SECURITY]".
section: "4.1"
rfc2119_level: MUST
topics:
    - security
