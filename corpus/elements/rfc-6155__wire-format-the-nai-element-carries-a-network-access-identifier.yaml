document: rfc-6155
kind: wire-format
summary: The 'nai' element carries a Network Access Identifier per RFC 4282. Because NAI grammar permits non-UTF-8 octet sequences that are not valid in XML, non-UTF-8 octets MUST be escaped as a backslash ('\') followed by two case-insensitive hexadecimal digits; the resulting canonical octet sequence must still conform to RFC 4282 constraints.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - diameter
