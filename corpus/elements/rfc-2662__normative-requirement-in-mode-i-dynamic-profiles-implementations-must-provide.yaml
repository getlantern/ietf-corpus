document: rfc-2662
kind: normative-requirement
summary: In MODE-I (dynamic profiles), implementations must provide a default profile named 'DEFVAL' for each profile type (Configuration and Alarm). Lines not yet explicitly configured are automatically assigned this profile via adslLineConfProfile and adslLineAlarmConfProfile.
section: 5.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
