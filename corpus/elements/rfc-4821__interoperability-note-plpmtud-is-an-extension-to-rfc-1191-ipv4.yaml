document: rfc-4821
kind: interoperability-note
summary: PLPMTUD is an extension to RFC 1191 (IPv4 PMTUD) and RFC 1981 (IPv6 PMTUD); it does not update those RFCs but implicitly relaxes their requirements by supporting correct operation without ICMP. Since PLPMTUD applies only to senders, implementation variants will not cause interoperability problems with peers.
section: "1"
topics:
    - ip
    - congestion
