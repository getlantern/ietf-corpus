document: rfc-8106
kind: normative-requirement
summary: When multiple DNS sources exist (RAs and DHCP), DNS options from DHCP SHOULD appear first in the DNS Repository and Resolver Repository, giving DHCP-sourced DNS information precedence over RA-sourced information.
section: 5.3.1
rfc2119_level: SHOULD
topics:
