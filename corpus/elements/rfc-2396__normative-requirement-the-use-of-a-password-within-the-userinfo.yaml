document: rfc-2396
kind: normative-requirement
summary: The use of a password within the userinfo component of a URL is NOT RECOMMENDED because passing authentication information in clear text has proven to be a security risk in almost every case where it has been used.
section: 3.2.2
rfc2119_level: RECOMMENDED
