summary: 'The 32-bit RTP payload header consists of: T (Transmission mode, 1 bit), K (packetization mode, 1 bit), L (Last packet of unit, 1 bit), I (Interlaced info, 2 bits), F counter (Frame counter mod 32, 5 bits), SEP counter (Slice/Extended Packet counter, 11 bits), P counter (Packet counter mod 2048 within unit, 11 bits).'
