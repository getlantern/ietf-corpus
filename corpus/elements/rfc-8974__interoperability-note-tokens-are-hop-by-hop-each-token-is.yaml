document: rfc-8974
kind: interoperability-note
summary: 'Tokens are hop-by-hop: each token is scoped to one client–server exchange. An intermediary is not required to forward the client''s token to an upstream server, and extended-token-length discovery must be performed independently for each hop.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
