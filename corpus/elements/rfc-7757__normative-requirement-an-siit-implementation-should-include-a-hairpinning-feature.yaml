document: rfc-7757
kind: normative-requirement
summary: 'An SIIT implementation SHOULD include a hairpinning feature, and the feature SHOULD be enabled by default. Two approaches are defined: simple hairpinning (modifies IPv4-to-IPv6 pass) and intrinsic hairpinning (loops packet through a second translation).'
section: "4.2"
rfc2119_level: SHOULD
topics:
    - v6ops
    - ip
