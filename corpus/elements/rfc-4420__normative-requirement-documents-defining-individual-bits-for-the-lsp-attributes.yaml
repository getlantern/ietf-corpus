document: rfc-4420
kind: normative-requirement
summary: Documents defining individual bits for the LSP Attributes Flags TLV MUST specify whether or not those bits MAY be inherited by FA-LSPs at LSP region boundaries, including the conditions under which inheritance occurs. By default, none of the incoming LSP Attributes TLVs are considered inheritable.
section: "6"
rfc2119_level: MUST
topics:
