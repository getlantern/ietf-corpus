document: rfc-7787
kind: normative-requirement
summary: A DNCP node MUST send a Node Endpoint TLV to enable bidirectional peer relationship formation. On a stream transport it MUST be sent at least once per connection (SHOULD NOT more than once); on a datagram transport it MUST appear in every datagram that contains a Network State TLV and MUST be positioned before any such TLV.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
