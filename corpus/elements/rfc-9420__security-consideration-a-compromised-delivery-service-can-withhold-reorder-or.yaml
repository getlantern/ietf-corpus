document: rfc-9420
kind: security-consideration
summary: A compromised Delivery Service can withhold, reorder, or replay messages, but cannot forge messages or learn group secrets. However, DS compromise can cause group fragmentation by selectively delivering Commits, and can observe group metadata such as GroupID and message frequency.
section: "16.9"
topics:
    - security
