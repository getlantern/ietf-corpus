document: rfc-9793
kind: security-consideration
summary: Leaking the BIER attribute across AD boundaries can incorrectly merge two independent BIER domains that may have conflicting configurations, creating security risks and operational trouble. The document addresses this by requiring boundary routers to suppress the BIER attribute on EBGP sessions by default.
section: "7"
topics:
    - bgp
    - multicast
    - routing
    - security
