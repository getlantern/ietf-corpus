document: rfc-4862
kind: normative-requirement
summary: Duplicate Address Detection MUST be performed on all unicast addresses prior to assigning them to an interface, regardless of whether obtained via stateless autoconfiguration, DHCPv6, or manual configuration. DAD MUST NOT be performed on anycast addresses.
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
