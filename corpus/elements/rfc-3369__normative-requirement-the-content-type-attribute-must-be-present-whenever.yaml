document: rfc-3369
kind: normative-requirement
summary: The content-type attribute MUST be present whenever signed attributes are present in signed-data or authenticated attributes are present in authenticated-data. It MUST be a signed or authenticated attribute and MUST NOT appear as an unsigned, unauthenticated, or unprotected attribute.
section: "11.1"
rfc2119_level: MUST
topics:
    - crypto
