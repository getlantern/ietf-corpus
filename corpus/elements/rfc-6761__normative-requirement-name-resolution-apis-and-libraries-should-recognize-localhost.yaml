document: rfc-6761
kind: normative-requirement
summary: Name resolution APIs and libraries SHOULD recognize 'localhost.' names as special and SHOULD always return the IP loopback address for address queries and negative responses for all other query types. They SHOULD NOT send queries for localhost names to configured caching DNS servers.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - dns
