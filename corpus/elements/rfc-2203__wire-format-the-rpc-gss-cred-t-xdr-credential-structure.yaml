summary: 'The rpc_gss_cred_t XDR credential structure (version 1) contains: version (unsigned int), gss_proc (rpc_gss_proc_t: DATA=0, INIT=1, CONTINUE_INIT=2, DESTROY=3), seq_num (unsigned int), service (rpc_gss_service_t: none=1, integrity=2, privacy=3), and handle (variable-length opaque). MAXSEQ is defined as 0x80000000.'
