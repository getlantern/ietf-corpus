document: rfc-3101
kind: wire-format
summary: 'The OSPF Options field (present in Hello, DD packets, and all LSAs) is extended with the N/P bit. In Hello packets this is the N-bit (NSSA capability indicator); in Type-7 LSA headers this is the P-bit (propagate/translate flag). The E-bit and N-bit are mutually exclusive: N-bit set requires E-bit clear.'
section: Appendix A
topics:
    - routing
