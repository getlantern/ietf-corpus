document: rfc-2883
kind: design-rationale
summary: D-SACK does not change when a TCP receiver sends an ACK or how the cumulative ACK field is used; it only specifies the SACK option contents when an ACK is sent. This minimal scope limits the change required in existing TCP implementations.
section: "2"
topics:
