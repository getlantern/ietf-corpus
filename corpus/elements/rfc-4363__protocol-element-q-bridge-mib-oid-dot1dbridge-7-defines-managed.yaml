document: rfc-4363
kind: protocol-element
summary: Q-BRIDGE-MIB (OID dot1dBridge 7) defines managed objects for port-based VLANs as specified in IEEE 802.1Q-2003, P802.1u (Restricted VLAN Registration), and P802.1v (VLAN Classification by Protocol and Port). It includes filtering databases, static and dynamic VLAN tables, and VLAN learning constraints.
