document: rfc-5321
kind: design-rationale
summary: DNS MX records make the use of explicit source routes in SMTP largely unnecessary and their use undesirable due to many historical problems with interpretation. SMTP clients SHOULD NOT generate explicit source routes except under unusual circumstances.
section: 3.6.1
topics:
    - email
    - dns
