document: rfc-2765
kind: security-consideration
summary: SIIT does not introduce new security issues beyond those already present in IPv4, IPv6, and the routing protocols used to deliver packets to the translator. The security posture depends on the integrity of the routing that directs packets to the translator.
section: "6"
