document: rfc-7056
kind: normative-requirement
summary: A service MUST make a policy decision about whether the IdP is permitted to assert a particular attribute and whether the asserted value is acceptable. This policy can be implemented as local configuration, AAA proxy rules, or other deployment-specific mechanisms.
