document: rfc-8331
kind: normative-requirement
summary: If the S bit (Data Stream Flag) is '1', the StreamNum field MUST carry identification of the source data stream number; numbered streams use stream number minus one, while unnumbered multi-stream interfaces use '0' for link A and '1' for link B.
section: "2.1"
rfc2119_level: MUST
topics:
