document: rfc-6854
kind: protocol-element
summary: 'The ''Sender:'' field is redefined to accept either ''mailbox'' or ''address'' syntax: ''sender = "Sender:" (mailbox / address) CRLF''. This allows a group as the sender, but the group MUST NOT contain more than one mailbox.'
section: "2.1"
