document: rfc-6925
kind: design-rationale
summary: Administrators may use UUIDs (RFC 4122) or provisioning-system role assignments to achieve Relay-ID uniqueness. DHCP servers with configurable duplicate-ID event notification can help detect unintended duplication; network management systems can also collect all relay agent Relay-IDs and alert on conflicts.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
