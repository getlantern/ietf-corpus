document: rfc-5641
kind: normative-requirement
summary: If any of the fault status bits (R, T, I, E) are set, then the (A) bit MUST be cleared. The fault bits are a more granular definition of (A), such that ORing them provides an inverted (A).
section: "3"
rfc2119_level: MUST
topics:
    - routing
