document: rfc-8688
kind: security-consideration
summary: A malicious actor could spoof 608 responses with a victim's contact address to many UACs simultaneously, causing a denial-of-service flood against the victim. The JWS signature allows UACs to verify the blocking intermediary's identity before contacting the redress address, guarding against this spoofing attack.
section: "6"
topics:
    - sip
    - security
