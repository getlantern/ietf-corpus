document: rfc-3472
kind: normative-requirement
summary: Intermediate or egress nodes triggering administrative status changes via Notification messages MUST include the Admin Status TLV with appropriate bits set; the Reflect (R) bit MUST NOT be set in such notifications. A node receiving a Notification with the Delete (D) bit set SHOULD initiate the deletion procedure.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
