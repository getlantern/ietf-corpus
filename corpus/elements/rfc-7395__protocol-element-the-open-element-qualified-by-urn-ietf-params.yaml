document: rfc-7395
kind: protocol-element
summary: The <open/> element, qualified by 'urn:ietf:params:xml:ns:xmpp-framing', serves as the stream opening header replacing the TCP binding's <stream:stream/> element. It carries the same attributes (from, id, to, version, xml:lang) as defined in RFC 6120.
