document: rfc-9420
kind: privacy-consideration
summary: PrivateMessage hides content and sender identity from the Delivery Service, but GroupID, epoch number, and message frequency are visible in the PrivateMessage header. Group extensions in the GroupContext are distributed to all members and may be visible to the DS if sent as PublicMessage. Group membership can be inferred by observing who processes Welcome messages.
section: "16.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
