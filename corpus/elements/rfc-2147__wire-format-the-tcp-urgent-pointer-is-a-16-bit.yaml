document: rfc-2147
kind: wire-format
summary: The TCP Urgent Pointer is a 16-bit field in the TCP header; the value 65535 is used as a sentinel to indicate that the actual urgent data offset is beyond the end of the current segment, requiring the receiver to use the TCP data length as the effective offset.
section: "3.2"
topics:
    - tcp
    - ip
