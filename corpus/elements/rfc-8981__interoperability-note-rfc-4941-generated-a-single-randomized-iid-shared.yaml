document: rfc-8981
kind: interoperability-note
summary: RFC 4941 generated a single randomized IID shared across all prefixes in a temporary address set; RFC 8981 requires that IIDs of all temporary addresses be statistically different from each other. This means hosts on networks with multiple SLAAC prefixes must join more solicited-node multicast groups under RFC 8981 than under RFC 4941.
section: "4"
topics:
