document: rfc-5864
kind: interoperability-note
summary: AFSDB RRs do not support priority, weighting, or port information, meaning all servers listed in AFSDB RRs are treated as equal and assumed to operate on standard ports. Cells using DNS SRV RRs should provide AFSDB RRs listing only servers that provide both VLDB and PTS on standard UDP ports for backward compatibility.
section: "5"
topics:
    - dns
