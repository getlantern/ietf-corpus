document: rfc-6923
kind: normative-requirement
summary: The UMC (Unique MEG ID Code) MUST start with the '/' character, which is not permitted in the ICC itself, ensuring unambiguous decomposition of the MEG_ID and preventing non-uniqueness when the ICC is shorter than six characters.
section: "7.1"
rfc2119_level: MUST
