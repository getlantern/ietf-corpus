document: rfc-9071
kind: normative-requirement
summary: A multiparty-aware receiving endpoint MUST separate text from different sources and present them in separate presentation fields. When multiple sources are active, the presentation SHALL provide a view where text is added in multiple presentation fields.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
