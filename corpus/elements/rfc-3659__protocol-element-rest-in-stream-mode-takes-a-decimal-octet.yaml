document: rfc-3659
kind: protocol-element
summary: REST in STREAM mode takes a decimal octet count parameter specifying how many octets of the immediately-following transfer to skip, effectively restarting at that offset. A value of zero disables restart. The server responds with a 350 reply, and a subsequent RETR or STOR command completes the restart.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
