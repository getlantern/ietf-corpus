document: rfc-9084
kind: normative-requirement
summary: A received Prefix Source OSPF Router-ID Sub-TLV with the OSPF Router ID field set to 0 MUST be considered invalid and ignored; reception of such sub-TLVs SHOULD be logged as an error subject to rate limiting.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
