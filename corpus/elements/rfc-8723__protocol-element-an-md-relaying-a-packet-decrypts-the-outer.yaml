document: rfc-8723
kind: protocol-element
summary: An MD relaying a packet decrypts the outer layer, optionally modifies PT, SEQ, or marker bit, updates the OHB to record original values of any newly changed fields (and MAY drop OHB entries for fields restored to original), then re-encrypts with the outer key. Header extensions may be modified without OHB reflection.
section: "5.2"
topics:
    - rtp
    - crypto
