document: rfc-8951
kind: protocol-element
summary: The /cacerts (CA Certificates) response MUST be a certs-only CMC Simple PKI Response (RFC 5272) with content-type application/pkcs7-mime, encoded in base64 per RFC 4648. The previous requirement to use a Content-Transfer-Encoding of 'base64' is removed.
section: 3.2.1
topics:
