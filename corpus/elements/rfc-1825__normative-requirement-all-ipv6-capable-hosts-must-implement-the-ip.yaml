document: rfc-1825
kind: normative-requirement
summary: All IPv6-capable hosts MUST implement the IP Authentication Header with at least the MD5 algorithm using a 128-bit key. IPv4 systems claiming to implement AH MUST also implement AH with at least the MD5 algorithm using a 128-bit key.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - ip
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
