document: rfc-9639
kind: protocol-element
summary: 'FLAC defines four subframe types: Constant (single value for DC/silence), Verbatim (raw samples, no predictor), Fixed predictor (one of 5 predefined LPC predictors, no stored coefficients), and Linear predictor (general LPC with stored coefficients, precision bits, and a right-shift value). Each subframe has its own header identifying the type and predictor order.'
section: "9.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
