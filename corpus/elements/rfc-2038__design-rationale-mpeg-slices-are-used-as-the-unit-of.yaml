document: rfc-2038
kind: design-rationale
summary: 'MPEG slices are used as the unit of recovery from data loss or corruption: an MPEG-compliant decoder advances to the beginning of the next slice on error. The B (Beginning-of-slice) and E (End-of-slice) bits in the encapsulation header are provided specifically to facilitate this slice-based recovery.'
section: "3.1"
topics:
    - rtp
    - realtime
