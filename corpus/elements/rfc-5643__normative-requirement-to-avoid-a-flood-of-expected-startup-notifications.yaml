document: rfc-5643
kind: normative-requirement
summary: To avoid a flood of expected startup notifications, a router should not originate ospfv3IfStateChange, ospfv3VirtIfStateChange, ospfv3NbrStateChange, or ospfv3VirtNbrStateChange notifications until two dead timer intervals have elapsed after OSPFv3 is enabled on an interface.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
