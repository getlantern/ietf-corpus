document: rfc-1567
kind: design-rationale
summary: Static DSA information (e.g., DSA name, configuration) is not replicated into the MIB; instead, references in the form of Directory Distinguished Names are used so that DSA management applications can query the Directory itself for further related information, keeping the MIB focused on dynamic operational data.
section: "4"
topics:
