document: rfc-9574
kind: interoperability-note
summary: When EVPNs use MPLSoGRE or MPLSoUDP encapsulation, the ESI-label-based split-horizon procedure per RFC 7432 does not work for multihomed ESs on AR-LEAF nodes. Local bias combined with tunnel source IP address preservation is the recommended mechanism for split-horizon in non-selective and selective AR.
section: "9.1"
topics:
    - mpls
    - routing
