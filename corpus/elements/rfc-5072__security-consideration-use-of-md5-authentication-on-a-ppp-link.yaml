document: rfc-5072
kind: security-consideration
summary: Use of MD5 authentication on a PPP link exposes it to replay attacks, where an attacker intercepts and replays a station's identity and password hash to gain network access. Implementors are referred to RFC 3748 (EAP) for a generic threat model and authentication selection framework.
section: "6"
topics:
    - security
    - ip
    - crypto
