kind: wire-format
summary: 'The Response Block (RSB) layout is: 1-octet header followed by one or more variable-length chunks. The Connection Response Block (CRB) uses the same format but is constrained to a single chunk containing either version information (KO=1) or a system-error (KO=0).'
