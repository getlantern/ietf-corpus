document: rfc-7462
kind: normative-requirement
summary: If subsequent provisional responses within the same dialog contain different Alert-Info header field values, the UA SHOULD render, at any time, the last received Alert-Info header field value. Values from different provisional responses are treated independently.
section: "13"
rfc2119_level: SHOULD
