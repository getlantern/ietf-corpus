document: rfc-8954
kind: design-rationale
summary: RFC 6960 did not specify minimum or maximum nonce lengths, leaving OCSP responders vulnerable to Denial-of-Service attacks, chosen-prefix attacks, and possible evasions. This document introduces a 1-to-32 octet range to address these vulnerabilities.
section: "1"
topics:
    - pkix
    - security
