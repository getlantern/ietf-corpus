document: rfc-4880
kind: protocol-element
summary: 'Key flags (signature subpacket type 27) are N-octet flag fields indicating key capabilities: 0x01 certify, 0x02 sign data, 0x04 encrypt communications, 0x08 encrypt storage, 0x10 split key, 0x20 authentication, 0x80 group key. Implementations MUST NOT assume a fixed size.'
section: 5.2.3.21
topics:
    - crypto
    - security
