document: rfc-3118
kind: registry
summary: 'IANA creates three new name spaces for the DHCP Authentication Option (code 90): Protocol, Algorithm (per-protocol), and RDM. Initial Protocol values are 0 (configuration token) and 1 (delayed authentication). Initial RDM value is 0 (monotonically increasing counter). New values require IETF Consensus per RFC 2434.'
