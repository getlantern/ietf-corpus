document: rfc-6674
kind: design-rationale
summary: The IPv6 Flow Label (20 bits) is offered as a CID alternative for IPv4-in-IPv6 deployments but is shorter than the recommended 32-bit CID. Implementers must ensure sufficient randomization to avoid interference with other Flow Label uses such as ECMP, and must account for scaling limits in large deployments.
section: "6"
