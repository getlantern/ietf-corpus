document: rfc-9270
kind: normative-requirement
summary: When a lower-priority protecting LSP is preempted, the intermediate node MUST send a Notify message with error code 25 ('Notify Error') and error sub-code 17 ('Shared resources unavailable') to the end nodes of that protecting LSP.
section: "5.5"
rfc2119_level: MUST
topics:
