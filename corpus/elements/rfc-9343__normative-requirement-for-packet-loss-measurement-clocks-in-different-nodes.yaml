document: rfc-9343
kind: normative-requirement
summary: For packet loss measurement, clocks in different nodes MUST be synchronized to the same clock reference with an accuracy of +/- B/2 time units (where B is the fixed batch duration), and batch lengths MUST be chosen large enough to avoid clock-skew and network-delay artifacts.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - measurement
    - ntp
