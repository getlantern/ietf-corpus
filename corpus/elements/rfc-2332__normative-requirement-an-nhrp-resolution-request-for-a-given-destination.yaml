document: rfc-2332
kind: normative-requirement
summary: An NHRP Resolution Request for a given destination MUST NOT be triggered on every data packet. Resolution should be initiated only when address information is absent from the station's cache.
section: "2.2"
rfc2119_level: MUST NOT
