document: rfc-2915
kind: protocol-element
summary: 'The Service field uses the ABNF grammar: service_field = [[protocol] *(''+'' rs)], where protocol and rs are each limited to 32 characters and must start with an alphabetic character. Service and protocol labels are drawn from [A-Z0-9] and are case-insensitive. An empty string is also a valid Service field value.'
