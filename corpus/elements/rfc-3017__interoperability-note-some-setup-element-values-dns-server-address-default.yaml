document: rfc-3017
kind: interoperability-note
summary: Some setup element values (DNS server address, default gateway) may be available by other means such as DHCP, but others (NNTP, SMTP, proxy server names, username prefix/suffix) may not. The setup element provides these statically when dynamic assignment is unavailable.
section: "5.3"
topics:
