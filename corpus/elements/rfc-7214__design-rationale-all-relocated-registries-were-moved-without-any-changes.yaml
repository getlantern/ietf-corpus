document: rfc-7214
kind: design-rationale
summary: All relocated registries were moved without any changes to their content — the sole purpose of the move was to create a single place where all G-ACh parameters can be found. The "Associated Channel Types" sub-registry was placed as the parent because all other G-ACh registries depend upon the Associated Channel Header Type.
