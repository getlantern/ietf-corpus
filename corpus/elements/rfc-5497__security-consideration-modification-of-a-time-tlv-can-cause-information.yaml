document: rfc-5497
kind: security-consideration
summary: Modification of a Time TLV can cause information to carry an invalid validity or interval time, leading to incorrect protocol performance. Maliciously setting a short validity time inflates protocol workload; a long validity time inflates storage requirements. Authentication and encryption as recommended by RFC 5444 are the appropriate countermeasures.
section: "10"
topics:
    - routing
    - security
