document: rfc-7483
kind: normative-requirement
summary: Servers that insert unspecified members into JSON responses SHOULD have member names prefixed with a short identifier followed by an underscore followed by a meaningful name. This allowance does not apply to jCard objects.
section: "2.1"
rfc2119_level: SHOULD
