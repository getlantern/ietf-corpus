document: rfc-6286
kind: protocol-element
summary: The BGP Identifier under this specification is a 4-octet, unsigned, non-zero integer required to be unique only within an AS (AS-wide uniqueness), rather than globally unique as previously required. It is set at startup and is consistent across all interfaces and peers.
section: "2.1"
topics:
    - bgp
    - routing
