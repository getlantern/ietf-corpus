document: rfc-3326
kind: security-consideration
summary: Spoofing or removing the Reason header field in a HERFP scenario can prevent a client from properly updating its previous request, making session establishment impossible. It is RECOMMENDED that the Reason header field be protected by a suitable integrity mechanism.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - security
    - realtime
