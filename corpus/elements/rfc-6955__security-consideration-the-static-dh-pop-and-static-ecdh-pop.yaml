document: rfc-6955
kind: security-consideration
summary: The Static DH POP and Static ECDH POP algorithms provide only integrity checking, not origination service, because an appropriate MAC value can be produced by either party to the key agreement. Only the Discrete Logarithm Signature provides both integrity and origination assurance.
