document: rfc-5225
kind: wire-format
summary: 'The control_crc3_encoding method produces a 3-bit CRC (polynomial 0x06, initial value 0x07) over a concatenated list of control fields: reorder_ratio (2 bits, 6-bit padded), ts_stride (32 bits, RTP profiles only), time_stride (32 bits, RTP profiles only), msn (16 bits, non-RTP/ESP profiles), coverage_behavior (2 bits, UDP-Lite profiles), and ip_id_behavior (one padded octet per IP header).'
section: 6.6.11
topics:
    - realtime
    - rtp
