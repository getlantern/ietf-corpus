document: rfc-8703
kind: wire-format
summary: The Link Identifier Data Item (Type 27) carries a variable-length Link Identifier field — default 4 octets, but may differ if announced via the Link Identifier Length Data Item. It may be used wherever a MAC Address Data Item is defined as usable in core DLEP.
