document: rfc-7512
kind: wire-format
summary: 'The PKCS #11 URI ABNF defines pk11-URI as ''pkcs11:'' followed by pk11-path and optional ''?'' pk11-query. Path attributes include token, manufacturer, serial, model, library-manufacturer, library-description, library-version, object, type, id, slot-description, slot-manufacturer, and slot-id. Query attributes include pin-source, pin-value, module-name, and module-path.'
