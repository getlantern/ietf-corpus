document: rfc-2284
kind: protocol-element
summary: The MD5-Challenge type (4) is analogous to PPP CHAP with MD5. The Request contains a challenge; the Response MUST be either Type 4 (MD5-Challenge) or Type 3 (Nak). All EAP implementations MUST support MD5-Challenge. Type-Data contains Value-Size (1 octet), Value, and Name.
section: "3.4"
topics:
    - security
    - crypto
