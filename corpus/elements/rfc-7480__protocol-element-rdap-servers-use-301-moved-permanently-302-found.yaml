document: rfc-7480
kind: protocol-element
summary: RDAP servers use 301 (Moved Permanently), 302 (Found), 303 (See Other), or 307 (Temporary Redirect) response codes with a Location header containing a complete HTTP(S) URL when redirecting clients to another authoritative source. The server must provide the full URL; clients follow it without transformation.
section: "5.2"
topics:
    - http
