document: rfc-3611
kind: wire-format
summary: The Statistics Summary Report Block (BT=6, block length=9) includes flag bits L, D, J, ToH in the header, then SSRC, begin_seq, end_seq, lost_packets (32 bits), dup_packets (32 bits), min/max/mean/dev jitter (each 32 bits), and min/max/mean/dev TTL or Hop Limit (each 8 bits).
