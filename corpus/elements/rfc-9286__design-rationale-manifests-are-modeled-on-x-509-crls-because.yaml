document: rfc-9286
kind: design-rationale
summary: Manifests are modeled on X.509 CRLs because the issues involved in detecting stale manifests and potential replay attacks are analogous to those for CRLs. The manifestNumber field is analogous to the CRLNumber field, and RFC 5280 guidance on CRLNumber values applies.
section: "1"
topics:
    - pkix
    - security
