document: rfc-1825
kind: protocol-element
summary: ESP Tunnel mode encapsulates an entire IP datagram within the ESP header, while Transport mode encapsulates only the upper-layer protocol (e.g., TCP or UDP). Transport mode reduces bandwidth overhead and processing cost when full IP header confidentiality is not required.
section: 3.2.1
topics:
