document: rfc-4783
kind: wire-format
summary: The ERROR_STRING TLV (Type 516, variable length) carries a US-ASCII display string representing the alarm/error type, padded to the next 4-byte boundary with null characters. Multiple ERROR_STRING TLVs may be included in a single object.
section: 3.1.1
