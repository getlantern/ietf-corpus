document: rfc-3448
kind: protocol-element
summary: The optional oscillation prevention mechanism (Section 4.5) maintains R_sqmean as an EWMA of sqrt(RTT). The instantaneous transmit rate is modified to X_inst = X * R_sqmean / sqrt(R_sample), reducing rate when RTT is growing. Recommended when statistical multiplexing is low.
section: "4.5"
topics:
