document: rfc-6311
kind: normative-requirement
summary: During IKE_AUTH exchange, the responder MUST NOT assert support of a synchronization capability (IKEV2_MESSAGE_ID_SYNC_SUPPORTED or IPSEC_REPLAY_COUNTER_SYNC_SUPPORTED) unless such support was also asserted by the initiator. Only mutually negotiated capabilities may be used.
section: "5"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
