document: rfc-5142
kind: design-rationale
summary: A sender of the Home Agent Switch message need not be the current home agent (e.g., for reliability protocols), but it MUST have a security association with the mobile node. In this case, the message SHOULD only contain the sender's own address, implying the mobile node should switch to the sender as its new home agent.
section: "5.1"
topics:
    - mobility
    - security
