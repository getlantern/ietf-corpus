summary: For 'establish-subscription' and 'modify-subscription' errors, an optional 'error-info' node may contain XML-encoded hints. For event stream targets these are establish-subscription-stream-error-info or modify-subscription-stream-error-info; for datastore targets, the corresponding datastore error-info structures.
