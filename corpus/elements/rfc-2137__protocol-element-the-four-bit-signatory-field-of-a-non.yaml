document: rfc-2137
kind: protocol-element
summary: 'The four-bit signatory field of a non-zone update KEY RR encodes: bit 0 (zone control — authorizes NS, glue A, and zone KEY RR changes), bit 1 (strong update — may add/delete RRs authenticated by different update keys), bit 2 (unique name update — may only update a single owner name if wildcard), and bit 3 (general — must be one if all other bits are zero).'
section: 3.1.3
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
