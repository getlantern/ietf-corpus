document: rfc-7770
kind: design-rationale
summary: Support for multiple RI LSA instances was added (vs. RFC 4970's single instance) to allow advertisement of information that doesn't fit within a single LSA instance, while preserving the convention that Instance 0 carries the primary capability TLVs.
