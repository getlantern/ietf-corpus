document: rfc-6148
kind: normative-requirement
summary: When multiple IP addresses have been accessed by the client identified by the Remote ID, the DHCP server MUST return the IP address from the most recent transaction in the ciaddr field, unless the administrator has configured a different preference mechanism.
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
