document: rfc-3727
kind: protocol-element
summary: 'ComponentFilter is a CHOICE type supporting four alternatives: item [0] ComponentAssertion (a leaf assertion), and [1] SEQUENCE OF ComponentFilter (conjunction), or [2] SEQUENCE OF ComponentFilter (disjunction), and not [3] ComponentFilter (negation). This enables Boolean combinations of component assertions.'
