document: rfc-9571
kind: interoperability-note
summary: The Time Bucket Jitter Measurement message uses a variable-length format, which is explicitly noted as a departure from the normal fixed format used in RFC 6374. Implementations must handle this variable structure rather than assuming a fixed message size.
