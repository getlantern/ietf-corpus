document: rfc-6425
kind: interoperability-note
summary: The Downstream Mapping TLV from RFC 4379 is deprecated for P2MP use. When responding to a P2MP FEC type, a node MUST ignore any Downstream Mapping TLV it receives in the echo request and MUST continue processing as if it were absent.
section: "3.5"
topics:
    - mpls
    - routing
