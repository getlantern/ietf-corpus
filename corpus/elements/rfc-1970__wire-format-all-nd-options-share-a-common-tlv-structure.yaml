document: rfc-1970
kind: wire-format
summary: 'All ND options share a common TLV structure: Type (8-bit), Length (8-bit, value in units of 8 octets; value 0 is invalid), followed by type-specific data. Defined option types are: 1=Source Link-Layer Address, 2=Target Link-Layer Address, 3=Prefix Information, 4=Redirected Header, 5=MTU.'
