document: rfc-9254
kind: wire-format
summary: The empty type MUST be encoded using the CBOR null value (major type 7, additional information 22). The binary type MUST be encoded as a CBOR byte string (major type 2). The string type MUST be encoded as a CBOR text string (major type 3). The boolean type MUST be encoded as CBOR simple value true (major type 7, additional information 21) or false (major type 7, additional information 20).
section: "6.4"
topics:
    - yang
    - cbor
