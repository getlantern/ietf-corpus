document: rfc-4867
kind: normative-requirement
summary: The RTP header marker bit (M) SHALL be set to 1 if the first frame-block in the packet contains a speech frame that is the first in a talkspurt; otherwise M SHALL be set to 0.
section: "4.1"
rfc2119_level: SHALL
