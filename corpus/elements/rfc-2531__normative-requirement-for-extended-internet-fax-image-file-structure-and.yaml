document: rfc-2531
kind: normative-requirement
summary: For extended Internet fax, image-file-structure and image-coding should always be specified together, along with additional values needed to clearly indicate which feature tag values are supported and which are not. Specifying image-file-structure alone is not normally sufficient to describe recipient capabilities.
section: "3.7"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
