document: rfc-3986
kind: protocol-element
summary: 'The remove_dot_segments algorithm iterates over an input buffer: prefixes "../" and "./" are removed; "/./ " and "/." are replaced with "/"; "/../" and "/.." cause removal of the last output segment; remaining segments are moved to the output buffer.'
section: 5.2.4
