document: rfc-8416
kind: normative-requirement
summary: Relying Parties MUST add any 'bgpsecAssertions' entries to the set of Router Key PDUs, excluding duplicates, when using the RPKI-Router protocol. The bgpsecAssertions syntax matches the Router Key PDU described in Section 5.10 of RFC 8210.
section: 3.4.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
