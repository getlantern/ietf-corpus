document: rfc-7065
kind: security-consideration
summary: Although a "turns" URI does not itself carry credentials, in WebRTC environments username and password will typically be provisioned remotely at the same time as the URI. If those credentials are received in the clear, using a "turns" URI provides little or no security benefit.
section: "4"
topics:
    - nat
    - webrtc
    - security
