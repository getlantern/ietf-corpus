document: rfc-9260
kind: security-consideration
summary: The CRC32c checksum in the SCTP common header provides protection against data corruption in the network. A receiver of an SCTP packet with an invalid CRC32c value MUST silently discard the packet.
section: 1.5.6
topics:
    - sctp
    - security
