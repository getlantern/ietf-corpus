document: rfc-5374
kind: protocol-element
summary: 'The Group Security Policy Database (GSPD) extends the RFC 4301 SPD with multicast-specific semantics: it adds an address preservation (AP) flag with AP-L and AP-R attributes for local and remote tunnel addresses, and a directionality attribute (symmetric, sender only, or receiver only) to GSPD entries.'
section: 4.1.1
topics:
