document: rfc-4975
kind: normative-requirement
summary: An MSRP endpoint MUST NOT send content of a type not signaled by the peer in the accept-types or accept-wrapped-types SDP attributes, and MUST NOT send a top-level MIME document of a type absent from accept-types.
section: "8.6"
rfc2119_level: MUST NOT
