document: rfc-8657
kind: normative-requirement
summary: A CA MUST ensure that its support for "accounturi" and "validationmethods" is fully consistent across all issuance systems for a given CA domain name. A CA unable to ensure consistency MUST NOT implement support for these parameters.
section: "5.3"
rfc2119_level: MUST
topics:
    - acme
    - pkix
    - security
