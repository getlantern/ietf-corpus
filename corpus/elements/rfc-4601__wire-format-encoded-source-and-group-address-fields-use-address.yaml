document: rfc-4601
kind: wire-format
summary: 'Encoded Source and Group Address fields use: Address Family (1 octet), Encoding Type (1 octet), then family-specific flags and address. Source addresses include a Sparse-mode bit (S), WC-bit (W, wildcards source), RPT-bit (R, RPT join), and mask length before the source address. Group addresses include a bidirectional (B) bit and Zone (Z) bit.'
section: 4.9.1
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
