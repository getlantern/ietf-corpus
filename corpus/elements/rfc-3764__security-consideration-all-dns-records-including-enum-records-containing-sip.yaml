document: rfc-3764
kind: security-consideration
summary: All DNS records, including ENUM records containing SIP addresses-of-record, must be assumed publicly available to all inquirers at all times. Placing a SIP address-of-record in ENUM is comparable to placing an email address in DNS, with attendant privacy implications.
section: "6"
topics:
    - security
    - privacy
    - dns
    - sip
