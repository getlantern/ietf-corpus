document: rfc-1123
kind: normative-requirement
summary: An FTP program MUST support TYPE I (IMAGE/binary) and TYPE L 8 (LOCAL type with logical byte size 8). Implementation of page structure is NOT RECOMMENDED; if a host requires it for 'holey' files, it MUST use the defined page structure format.
section: 4.1.2.1
rfc2119_level: MUST
topics:
    - tcp
