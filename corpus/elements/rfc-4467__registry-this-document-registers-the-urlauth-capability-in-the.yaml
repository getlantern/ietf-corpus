document: rfc-4467
kind: registry
summary: This document registers the 'URLAUTH' capability in the IANA imap4-capabilities registry and establishes the IMAP URLAUTH Authorization Mechanism Registry. New mechanisms must be registered via a standards-track or IESG-approved experimental RFC. The INTERNAL mechanism is the initial registered entry.
