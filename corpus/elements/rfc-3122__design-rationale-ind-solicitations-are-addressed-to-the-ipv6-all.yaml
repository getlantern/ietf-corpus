document: rfc-3122
kind: design-rationale
summary: IND Solicitations are addressed to the IPv6 all-node multicast address (FF02::1) at the IP layer because the remote node's IPv6 addresses are not yet known, but they are sent directly to the target node at the link-layer level using the known link-layer address.
