document: rfc-8020
kind: protocol-element
summary: The 'denied name' is defined as the domain name whose existence has been denied by a response RCODE of NXDOMAIN. In most cases this is the QNAME, but due to RFC 6604, it may be the last name in a CNAME/DNAME chain.
section: "1.1"
topics:
