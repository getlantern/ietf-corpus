document: rfc-4362
kind: wire-format
summary: The Context Check Packet (CCP) has a 1-octet packet type identifier (11111011), followed by a second octet containing a C bit (bit 0) and a 7-bit CRC field. C=0 means CRC unused; C=1 means a valid 7-bit CRC is present.
