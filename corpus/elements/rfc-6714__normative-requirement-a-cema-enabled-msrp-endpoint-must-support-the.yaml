document: rfc-6714
kind: normative-requirement
summary: A CEMA-enabled MSRP endpoint MUST support the alternative connection model defined in RFC 6135, which extends the scenarios where CEMA can be used (e.g., allowing a relay-using endpoint to be 'passive' instead of falling back).
