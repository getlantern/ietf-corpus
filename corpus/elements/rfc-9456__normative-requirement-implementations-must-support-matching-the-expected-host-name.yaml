document: rfc-9456
kind: normative-requirement
summary: Implementations MUST support matching the expected host name against a dNSName in the subjectAltName extension and MUST support wildcards limited to the leftmost DNS label (e.g., *.example.com matches a.example.com but not example.com or a.b.example.com).
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - snmp
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
