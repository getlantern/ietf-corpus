document: rfc-5454
kind: normative-requirement
summary: When IPv6 tunneling mode extension is absent, all IPv6 packets destined to registered prefixes MUST be tunneled by the home agent to the mobile node's registered IPv4 home address, requiring double encapsulation to keep IPv6 routing transparent to foreign agents.
section: 3.3.2
rfc2119_level: MUST
topics:
    - ip
    - mobility
    - v6ops
