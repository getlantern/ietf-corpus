document: rfc-9101
kind: normative-requirement
summary: If the Request Object is encrypted, the authorization server MUST decrypt it per RFC 7516. If decryption fails, the server MUST return an 'invalid_request_object' error.
section: "6.1"
rfc2119_level: MUST
