document: rfc-4113
kind: design-rationale
summary: The IPv4-only udpTable was deprecated because it only supports IPv4 and does not permit describing 'connected' UDP endpoints. The new udpEndpointTable is IP-version-neutral and supports both listening and connected endpoints, following the IETF approach of writing IP-version-neutral MIBs.
section: 2.1.1
topics:
    - udp
    - snmp
