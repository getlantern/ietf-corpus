document: rfc-9802
kind: security-consideration
summary: The security requirements of NIST SP 800-208 MUST be taken into account. If an attacker obtains signatures for two different messages created with the same OTS key, it becomes computationally feasible to forge signatures. OTS key reuse is the critical threat unique to stateful HBS schemes and is a new requirement most developers will not be familiar with.
section: "10"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
