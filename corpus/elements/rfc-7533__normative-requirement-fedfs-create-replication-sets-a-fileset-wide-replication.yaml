document: rfc-7533
kind: normative-requirement
summary: FEDFS_CREATE_REPLICATION sets a fileset-wide replication FSN used to satisfy NFSv4 fs_locations or fs_locations_info requests when no junction is being accessed. The same FSN value SHOULD be associated with all replicas of a file system, requiring FEDFS_CREATE_REPLICATION to be applied to all replicas.
section: 5.5.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
