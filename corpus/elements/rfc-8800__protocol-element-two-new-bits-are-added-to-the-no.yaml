summary: 'Two new bits are added to the NO-PATH-VECTOR TLV Flags field: bit 11 (Disjoint path not found) indicates the PCE could not find a disjoint path for the LSP, and bit 10 (Requested disjoint computation not supported) indicates the PCE does not support the requested disjointness computation type.'
