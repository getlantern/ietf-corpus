document: rfc-5380
kind: security-consideration
summary: The security relationship between the mobile node and the MAP MUST involve mutual authentication, integrity protection, and protection against replay attacks. Without these, malicious nodes could impersonate legitimate mobile nodes or impersonate a MAP, disrupting communication with all correspondent nodes knowing the mobile node's RCoA.
section: "12"
topics:
