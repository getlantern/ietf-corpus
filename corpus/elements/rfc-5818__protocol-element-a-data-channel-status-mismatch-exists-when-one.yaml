document: rfc-5818
kind: protocol-element
summary: A data channel status mismatch exists when one LSR endpoint of a TE link believes the channel is assigned to carry data while the other does not. Such stranded resources cannot be detected by routing protocol TE advertisements alone, and cannot be assigned to new LSPs because they appear to be in use.
section: "1"
topics:
