document: rfc-7550
kind: normative-requirement
summary: 'Clients MUST handle all three Advertise message formats for NoAddrsAvail: (1) IA_NA with encapsulated NoAddrsAvail and no top-level status, (2) top-level NoAddrsAvail with no IA_NA/IA_TA, and (3) both top-level and IA-encapsulated NoAddrsAvail. The latter two formats exist for backward compatibility with servers not updated to this specification.'
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
