document: rfc-7266
kind: interoperability-note
summary: An answerer that has no desire to receive a segment extension or does not understand it SHOULD NOT include it in the SDP answer. Similarly, an answerer unable to send a 'recvonly' extension SHOULD NOT include it in the answer.
section: "4.2"
topics:
    - rtp
    - realtime
