document: rfc-2782
kind: protocol-element
summary: The Weight field (16-bit unsigned integer, 0–65535) provides proportional server selection among targets of equal priority. A weight of 0 should be used when no selection preference exists; records with weight 0 have a very small selection probability when higher-weight records are present.
section: The format of the SRV RR
