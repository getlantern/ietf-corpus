document: rfc-9600
kind: design-rationale
summary: NCCE (codepoint 11) is named differently from IP's CE to reflect that it is placed in the non-critical (NCHbH) flags range, meaning an ECN-ignorant transit RBridge will not be forced to drop the packet, while an ECN-aware egress can still propagate it as CE.
