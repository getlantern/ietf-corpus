document: rfc-4293
kind: normative-requirement
summary: ipv6InterfaceForwarding is constrained by ipv6IpForwarding and is ignored if ipv6IpForwarding is set to notForwarding. Systems without per-interface forwarding control should set this object to forwarding on all interfaces and use ipv6IpForwarding as the sole control.
section: "5"
rfc2119_level: SHOULD
topics:
    - ip
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
