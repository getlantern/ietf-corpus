document: rfc-2472
kind: protocol-element
summary: IPV6CP uses only Codes 1 through 7 (Configure-Request, Configure-Ack, Configure-Nak, Configure-Reject, Terminate-Request, Terminate-Ack, Code-Reject). Other codes should be treated as unrecognized and result in Code-Rejects.
