document: rfc-9143
kind: normative-requirement
summary: When selecting the offerer-tagged 'm=' section, the answerer MUST verify the section will not be moved out, will not be rejected, and does not contain a zero port value. If no suitable section is found among all identification-tags, the answerer MUST NOT create the BUNDLE group.
section: 7.3.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
