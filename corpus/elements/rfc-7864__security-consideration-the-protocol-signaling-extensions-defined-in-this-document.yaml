document: rfc-7864
kind: security-consideration
summary: The protocol signaling extensions defined in this document share the same security concerns as PMIPv6 (RFC 5213) and RFC 7077 and do not introduce additional security threats beyond those already identified in those specifications; IPsec is mandated for all FMI/FMA signaling.
