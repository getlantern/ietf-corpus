document: rfc-5462
kind: protocol-element
summary: E-LSP is redefined from 'EXP-Inferred-PSC LSP' to 'Explicitly TC-encoded-PSC LSP'. The TC field of the MPLS Shim Header is used by the LSR to determine the PHB (Per Hop Behavior) to be applied to the packet, including both the PSC and the drop preference.
section: "2.2"
topics:
