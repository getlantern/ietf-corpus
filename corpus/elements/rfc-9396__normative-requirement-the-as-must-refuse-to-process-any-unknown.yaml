document: rfc-9396
kind: normative-requirement
summary: The AS MUST refuse to process any unknown authorization details type or any authorization details object that contains unknown fields, fields of the wrong type, fields with invalid values, or missing required fields. It MUST abort and respond with the error `invalid_authorization_details`.
section: "5"
rfc2119_level: MUST
topics:
    - oauth
    - security
