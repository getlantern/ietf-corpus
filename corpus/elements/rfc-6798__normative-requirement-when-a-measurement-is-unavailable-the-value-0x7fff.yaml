document: rfc-6798
kind: normative-requirement
summary: When a measurement is unavailable, the value 0x7FFF MUST be reported in the Threshold/Peak fields and 0xFFFF MUST be reported in the Percentile fields to signal unavailability to the receiver.
section: "3.2"
rfc2119_level: MUST
