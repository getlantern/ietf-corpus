document: rfc-4328
kind: interoperability-note
summary: The G.709 Optical Channel label encoding is applicable to both OTN Optical Channel layer and pre-OTN Optical Channel layer. OChr (reduced functionality optical channel) is explicitly excluded because its Connection Function between OTM-nr.m/OTM-0r.m is not defined in ITU-T G.798.
