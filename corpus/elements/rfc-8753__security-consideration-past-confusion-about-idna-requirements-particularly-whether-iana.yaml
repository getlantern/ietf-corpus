document: rfc-8753
kind: security-consideration
summary: Past confusion about IDNA requirements — particularly whether IANA tables being out of date rendered IDNA unusable — created opportunities for bad behavior. The clarifications in this document are expected to reduce such confusion and improve Internet security to at least some small extent.
