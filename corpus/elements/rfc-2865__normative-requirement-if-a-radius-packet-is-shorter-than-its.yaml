document: rfc-2865
kind: normative-requirement
summary: If a RADIUS packet is shorter than its Length field indicates, it MUST be silently discarded. Octets outside the range of the Length field MUST be treated as padding and ignored.
section: "3"
rfc2119_level: MUST
topics:
    - radius
    - security
