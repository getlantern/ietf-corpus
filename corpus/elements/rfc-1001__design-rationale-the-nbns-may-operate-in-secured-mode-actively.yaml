document: rfc-1001
kind: design-rationale
summary: The NBNS may operate in 'secured' mode (actively challenging and validating name ownership) or 'non-secured' mode (a passive bulletin board delegating consistency to end-nodes). This tradeoff lets administrators balance NBNS implementation simplicity, security guarantees, and name registration latency.
section: 15.1.6
topics:
    - security
