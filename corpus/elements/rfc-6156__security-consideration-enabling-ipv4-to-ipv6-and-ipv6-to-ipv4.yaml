document: rfc-6156
kind: security-consideration
summary: Enabling IPv4-to-IPv6 and IPv6-to-IPv4 translation via TURN creates new paths for clients to reach address families they would not otherwise access (e.g., an IPv4-only client gaining IPv6 Internet access). Security and monitoring policies must account for this new capability.
section: "9"
topics:
    - security
    - nat
    - ip
    - v6ops
