document: rfc-4488
kind: design-rationale
summary: When the REFER-Issuer already has an explicit subscription to the dialog event package at the REFER-Recipient, the implicit subscription and resulting NOTIFY traffic from REFER creates unnecessary network overhead, motivating this suppression mechanism.
