document: rfc-8200
kind: normative-requirement
summary: It is strongly recommended that IPv6 nodes implement Path MTU Discovery (RFC 8201) to discover path MTUs greater than 1280 octets. A minimal implementation may restrict itself to sending packets no larger than 1280 octets and omit Path MTU Discovery.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - ip
