document: rfc-2853
kind: normative-requirement
summary: Applications using inter-process tokens to transfer security contexts MUST take appropriate steps to protect these tokens in transit. Interprocess tokens may contain sensitive data including cryptographic keys from the original security context.
section: "3.6"
rfc2119_level: MUST
topics:
    - security
