document: rfc-1521
kind: wire-format
summary: Quoted-Printable encodes octets as '=' followed by two uppercase hexadecimal digits (Rule 1). Printable ASCII chars 33–60 and 62–126 may appear literally (Rule 2). Trailing TAB or SPACE MUST NOT appear at the end of an encoded line (Rule 3). Line breaks must be CRLF (Rule 4). Encoded lines must be no more than 76 characters; a trailing '=' indicates a soft line break (Rule 5).
section: "5.1"
topics:
    - email
