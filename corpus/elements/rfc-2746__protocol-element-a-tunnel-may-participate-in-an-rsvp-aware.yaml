document: rfc-2746
kind: protocol-element
summary: 'A tunnel may participate in an RSVP-aware network in one of three ways: type 1 (best-effort, no QoS support), type 2 (aggregate reservation configured statically), or type 3 (dynamic per-flow reservations created and torn down as end-to-end sessions come and go).'
