document: rfc-4932
kind: design-rationale
summary: Transfer semantics do not directly apply to host objects, and no EPP <transfer> command mapping is defined for hosts. Instead, internal host objects transfer implicitly alongside their superordinate domain object, preserving the DNS namespace hierarchy.
section: 3.2.4
topics:
    - dns
    - registry
