document: rfc-7774
kind: design-rationale
summary: RFC 7731 requires all MPL Forwarders in a domain to share identical parameters but does not define a configuration distribution mechanism. This document fills that gap by piggybacking on DHCPv6, which is already used in many managed wireless mesh networks (e.g., ZigBee IP) for network parameter distribution.
section: "1"
topics:
