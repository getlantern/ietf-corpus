document: rfc-2331
kind: protocol-element
summary: 'The Broadband Bearer Capability IE in SIG 4.0 includes the new ''ATM Transfer Capability'' (ATC) field that explicitly specifies the desired ATM service category: CBR, rt-VBR, nrt-VBR, or ABR. Bearer class may be BCOB-A, BCOB-X, BCOB-C, or VP.'
