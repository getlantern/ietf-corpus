document: rfc-4528
kind: normative-requirement
summary: When the Assertion Control is attached to an LDAP request, if the Filter evaluates to TRUE the request is processed normally; if the Filter evaluates to FALSE or Undefined, the assertionFailed (122) result code MUST be returned and no further processing is performed.
section: "3"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
