document: rfc-8341
kind: normative-requirement
summary: A server MUST NOT vary its responses to RESTCONF OPTIONS and PATCH methods based on the existence of the underlying resource, which would indicate the presence or absence of resource instances; servers must always return 'access-denied' when the client lacks read permission.
section: "5"
rfc2119_level: MUST NOT
topics:
    - netconf
    - security
    - privacy
