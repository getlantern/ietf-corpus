document: rfc-4721
kind: interoperability-note
summary: Since the Challenge extension type (24) falls in the range 128-255 for the Mobile-Foreign Challenge extension (132, skippable), a home agent that does not recognize the Challenge extension MUST still process the Registration Request per RFC 3344 and will send a Registration Reply without the Challenge extension.
section: "3.4"
