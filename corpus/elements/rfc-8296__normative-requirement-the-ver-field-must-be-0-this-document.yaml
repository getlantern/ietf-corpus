document: rfc-8296
kind: normative-requirement
summary: The Ver field MUST be 0 (this document specifies version 0). If a BFR receives a BIER packet with an unsupported version, it MUST discard the packet and log an error. The value 0xF is reserved for experimental use and MUST NOT be assigned by IETF or IANA.
section: 2.1.2
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
