document: rfc-8697
kind: design-rationale
summary: A distinct Operator-configured Association Range per Association Type is needed because some Association Types allow both dynamic and operator-configured associations sharing the same Association Source, creating a risk of Association ID collision; the range partitions the ID space to prevent this.
section: "3.4"
topics:
    - routing
    - mpls
