document: rfc-3492
kind: protocol-element
summary: 'Generalized variable-length integers use per-position thresholds t(j) to make integers self-delimiting: exactly one digit (the most significant) satisfies digit_j < t(j), enabling unambiguous concatenation. Each nonnegative integer has exactly one such representation. Bootstring uses little-endian ordering so deltas can be separated starting with the first.'
section: "3.3"
