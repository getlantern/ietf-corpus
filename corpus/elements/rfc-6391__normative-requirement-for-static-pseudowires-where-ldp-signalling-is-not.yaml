document: rfc-6391
kind: normative-requirement
summary: For static pseudowires (where LDP signalling is not in use), whether the flow label is used MUST be identically provisioned in both PEs at the PW endpoints. The default behaviour when no provisioning support exists is not to include the flow label.
section: "5"
rfc2119_level: MUST
