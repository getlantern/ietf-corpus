document: rfc-3723
kind: normative-requirement
summary: Receipt of an IKE Phase 2 delete message MUST NOT be interpreted as a reason for tearing down an IP block storage connection. It is preferable to leave the connection up and bring up another IKE Phase 2 SA if additional traffic is sent.
section: 2.3.3
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
    - tcp
