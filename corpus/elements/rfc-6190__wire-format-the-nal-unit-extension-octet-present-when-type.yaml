document: rfc-6190
kind: wire-format
summary: The NAL unit extension octet, present when Type=31, carries a 5-bit Subtype field and three 1-bit flags J, K, L. Subtype=1 denotes an empty NAL unit; Subtype=2 denotes an NI-MTAP; all other Subtype values are reserved.
