document: rfc-5796
kind: security-consideration
summary: Using the same key on all PIM routers connected to a link leaves them all vulnerable to impersonation attacks if any single router is compromised, malfunctioning, or misconfigured. This is an inherent limitation of the shared-key approach used in the two-SA method.
section: "15"
topics:
    - security
    - multicast
    - routing
