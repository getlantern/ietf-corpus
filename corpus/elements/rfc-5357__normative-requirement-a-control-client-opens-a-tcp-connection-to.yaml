document: rfc-5357
kind: normative-requirement
summary: A Control-Client opens a TCP connection to the Server on well-known port 862 to initiate TWAMP-Control. The host initiating the TCP connection takes the roles of Control-Client and Session-Sender; the host acknowledging takes the roles of Server and Session-Reflector.
section: "3.1"
rfc2119_level: MUST
topics:
    - measurement
    - registry
