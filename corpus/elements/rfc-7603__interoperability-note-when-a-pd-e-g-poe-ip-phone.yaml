document: rfc-7603
kind: interoperability-note
summary: 'When a PD (e.g., PoE IP phone) supports EMAN, two power usage reporting mechanisms coexist: one performed by the PD itself and one performed by the supplying PSE. Device-specific implementations must determine which reporting source to use.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
