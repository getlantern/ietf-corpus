document: rfc-9572
kind: protocol-element
summary: 'The Region ID in the per-region I-PMSI route NLRI is encoded as an Extended Community: a two-octet AS uses Transitive Two-Octet AS-specific EC (sub-type 0x09), a four-octet AS uses Transitive Four-Octet AS-specific EC (sub-type 0x09), and an area ID uses a Transitive IPv4-Address-specific EC.'
section: "6.2"
topics:
    - mpls
    - routing
