document: rfc-2290
kind: interoperability-note
summary: Wireless links may employ handoff and proxying mechanisms that do not require tearing down the PPP link but still require registration with a new foreign agent. Mobile nodes MUST employ move detection algorithms regardless of PPP link continuity.
section: "3.2"
