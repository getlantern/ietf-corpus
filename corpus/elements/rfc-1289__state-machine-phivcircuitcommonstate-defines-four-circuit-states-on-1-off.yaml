summary: 'phivCircuitCommonState defines four circuit states: ON (1), OFF (2), SERVICE (3), and CLEARED (4). phivCircuitCommonSubState provides thirteen operational substates including starting, reflecting, looping, loading, dumping, triggering, autoservice, autoloading, autodumping, autotriggering, synchronizing, failed, and running.'
