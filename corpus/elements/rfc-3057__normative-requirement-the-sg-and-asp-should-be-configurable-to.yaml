document: rfc-3057
kind: normative-requirement
summary: The SG and ASP SHOULD be configurable to support both client and server roles. By default, the SG acts as server and ASPs SHOULD initiate the SCTP association to the SG. The SCTP/UDP/TCP registered port number for IUA is 9900.
section: 1.3.5
rfc2119_level: SHOULD
topics:
    - sctp
