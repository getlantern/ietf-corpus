document: rfc-7274
kind: normative-requirement
summary: Values 0-6 and 8-15 MUST NOT appear in the data plane immediately following an XL. An LSR receiving a packet whose label stack has XL at the top followed by a label with value 0-6 or 8-15 MUST drop the packet.
section: "3.1"
rfc2119_level: MUST NOT
topics:
