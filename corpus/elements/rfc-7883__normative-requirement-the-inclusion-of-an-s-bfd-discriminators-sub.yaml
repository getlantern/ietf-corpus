document: rfc-7883
kind: normative-requirement
summary: The inclusion of an S-BFD Discriminators sub-TLV in a Router CAPABILITY TLV is optional. S-BFD Discriminator advertisements MAY be flooded within an area or throughout the domain using the procedures specified in RFC 4971.
section: "2"
rfc2119_level: MAY
topics:
    - routing
