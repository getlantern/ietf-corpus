document: rfc-9733
kind: protocol-element
summary: 'BRSKI-AE defines a certificate enrollment message flow with eight steps: (1) CA Certs Request, (2) CA Certs Response, (3) Attribute Request, (4) Attribute Response, (5) Certification Request, (6) Certification Response, (7) Certificate Confirm, (8) PKI/Registrar Confirm. Only steps 5 and 6 are REQUIRED; all others are OPTIONAL.'
section: 4.2.4
