document: rfc-2451
kind: protocol-element
summary: All CBC-mode cipher algorithms used with ESP require an Initialization Vector (IV) the same size as the cipher block size. The IV is XOR'd with the first plaintext block before encryption; for successive blocks, the previous ciphertext block is XOR'd with the current plaintext.
section: "2.1"
topics:
