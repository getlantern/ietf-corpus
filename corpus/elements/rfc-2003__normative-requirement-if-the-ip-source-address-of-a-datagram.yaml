document: rfc-2003
kind: normative-requirement
summary: If the IP Source Address of a datagram to be tunneled matches the IP address of the tunnel destination (exit point), the router MUST NOT tunnel the datagram and SHOULD discard it, preventing routing loops.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
