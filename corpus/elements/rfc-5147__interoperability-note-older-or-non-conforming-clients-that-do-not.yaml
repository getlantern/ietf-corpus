document: rfc-5147
kind: interoperability-note
summary: Older or non-conforming clients that do not support text/plain fragment identifiers will still retrieve the full resource but will fail to locate the sub-resource; this is an acceptable fallback since fragment evaluation is local to the client.
section: "1.4"
