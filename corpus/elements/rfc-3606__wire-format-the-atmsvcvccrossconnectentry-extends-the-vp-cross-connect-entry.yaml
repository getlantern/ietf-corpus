summary: 'The atmSvcVcCrossConnectEntry extends the VP cross-connect entry by adding two VCI index fields: atmSvcVcCrossConnectLowVci (AtmVcIdentifier) and atmSvcVcCrossConnectHighVci (AtmVcIdentifier), making a seven-field compound index. The VCI value cannot exceed atmInterfaceMaxVciBits at the respective port.'
