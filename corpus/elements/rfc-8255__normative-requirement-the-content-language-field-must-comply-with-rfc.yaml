document: rfc-8255
kind: normative-requirement
summary: The Content-Language field MUST comply with RFC 3282 (Content Language Headers) and BCP 47 / RFC 5646 (Tags for Identifying Languages). Valid examples include 'en-GB', 'de', 'es-MX, fr', and 'sr-Cyrl'.
