document: rfc-7766
kind: protocol-element
summary: 'An idle DNS-over-TCP session is defined differently for clients and servers: a client considers a session idle when it has no pending queries and no outstanding responses; a server considers it idle when it has sent responses to all queries received on that connection.'
section: "3"
topics:
