document: rfc-5070
kind: design-rationale
summary: The IODEF data model is explicitly a transport format, not an optimal representation for on-disk storage, long-term archiving, or in-memory processing. XML was chosen for extensibility and multi-character-encoding support, though it is acknowledged as inherently inefficient for binary data or high-volume exchange.
section: "1.3"
