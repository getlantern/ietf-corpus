document: rfc-6086
kind: normative-requirement
summary: If the receiver of a request containing a Recv-Info header field rejects the request, both sender and receiver MUST roll back to the set of Info Packages that was used before the request was sent. This applies even when the receiver has included a Recv-Info in a provisional response but later rejects the request.
section: 5.2.4
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
