document: rfc-4553
kind: normative-requirement
summary: 'The following parameters MUST be agreed upon during PW setup: AC type (E1/T1/E3/T3), use of octet-aligned T1 mode, payload size (same for both directions, immutable), use of RTP header, and if RTP is used — timestamping mode, clock frequency, PT value, and SSRC value.'
section: Appendix B
rfc2119_level: MUST
topics:
