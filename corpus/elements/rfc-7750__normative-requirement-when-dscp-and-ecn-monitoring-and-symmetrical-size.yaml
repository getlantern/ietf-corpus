document: rfc-7750
kind: normative-requirement
summary: When DSCP and ECN Monitoring and Symmetrical Size and/or Reflects Octets modes are negotiated in unauthenticated mode, the Padding Length value SHOULD be greater than or equal to 28 octets to allow for the truncation process recommended in RFC 5357.
section: 2.2.2
rfc2119_level: SHOULD
