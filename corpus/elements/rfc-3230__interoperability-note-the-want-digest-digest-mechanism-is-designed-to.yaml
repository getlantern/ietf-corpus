document: rfc-3230
kind: interoperability-note
summary: The Want-Digest/Digest mechanism is designed to coexist with the existing HTTP/1.1 Content-MD5 header. The 'contentMD5' pseudo-algorithm in Want-Digest provides a backward-compatible way to request or suppress Content-MD5 without changing existing server behavior.
section: "5"
topics:
