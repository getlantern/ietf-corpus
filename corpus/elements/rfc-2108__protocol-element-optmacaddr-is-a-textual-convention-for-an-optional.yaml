document: rfc-2108
kind: protocol-element
summary: 'OptMacAddr is a textual convention for an optional MAC address: either a 6-octet canonical IEEE 802.1a MAC address (OCTET STRING SIZE 6) or a zero-length string when no value is available. Unlike the SNMPv2-TC MacAddress type, a zero-length value is explicitly permitted.'
