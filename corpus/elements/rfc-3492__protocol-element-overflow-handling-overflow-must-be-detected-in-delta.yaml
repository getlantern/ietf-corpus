document: rfc-3492
kind: protocol-element
summary: 'Overflow handling: overflow must be detected in delta computations during both encoding and decoding. For valid IDNA labels, 26-bit unsigned integers are sufficient (a 27-bit delta would exceed the Unicode code point limit 0..10FFFF or the 63-character label length limit), but inputs are not necessarily valid IDNA labels.'
section: "6.4"
