document: rfc-8685
kind: normative-requirement
summary: If a PCE understands an H-PCE PCReq but did not advertise its H-PCE capability, it MUST send a PCErr with Error-Type=28 (H-PCE Error) and Error-Value=1 (H-PCE Capability not advertised).
section: 3.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
