document: rfc-6884
kind: protocol-element
summary: 'EVRC-NW operates on 20 ms frames and produces output at one of four sizes: 171 bits (Rate 1), 80 bits (Rate 1/2), 40 bits (Rate 1/4), or 16 bits (Rate 1/8). Two zero-bit frame types also exist: blank (null, value 0) and erasure (value 5). The default sampling rate is 16 kHz, with optional 8 kHz input/output.'
