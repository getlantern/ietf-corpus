document: rfc-8655
kind: interoperability-note
summary: DetNet can deliver service over lower-layer sub-network technologies including MPLS TE, IEEE 802.1 TSN, and OTN. Multilayer DetNet is also possible, where one DetNet instance appears as a sub-network providing service to a higher-layer DetNet system. TSN-specific terms (Talker, Listener, Stream, Relay system) map directly to DetNet source, destination, flow, and intermediate node.
section: 4.1.2
topics:
