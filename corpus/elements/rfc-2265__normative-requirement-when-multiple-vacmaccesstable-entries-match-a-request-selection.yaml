document: rfc-2265
kind: normative-requirement
summary: 'When multiple vacmAccessTable entries match a request, selection proceeds by: (a) prefer entries with an identical securityModel over ''any''; (b) prefer entries with an exact contextPrefix match; (c) prefer the longest matching contextPrefix; (d) select the entry with the highest securityLevel.'
section: "4"
rfc2119_level: MUST
topics:
