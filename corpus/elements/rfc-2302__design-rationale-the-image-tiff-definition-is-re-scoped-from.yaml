document: rfc-2302
kind: design-rationale
summary: The image/tiff definition is re-scoped from RFC 1528's narrow reference to TIFF Class F to encompass all TIFF 6.0 profiles and extensions, consistent with existing practice for TIFF-aware Internet applications. This broadening reflects the reality that many deployed applications use TIFF beyond Class F.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
