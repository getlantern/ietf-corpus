document: rfc-4301
kind: normative-requirement
summary: IPsec implementations MUST support ESP and MAY support AH. AH support was downgraded to MAY because ESP can provide integrity without confidentiality, making it functionally comparable to AH in most contexts.
section: "3.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
