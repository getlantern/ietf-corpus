document: rfc-4916
kind: normative-requirement
summary: When sending a mid-dialog request, a UA MUST populate the To header field URI with the current value of the remote URI for that dialog, which is subject to update per Section 4.4.2 rather than being fixed at the beginning of the dialog per RFC 3261.
section: 4.4.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
