document: rfc-9859
kind: security-consideration
summary: Because signing NOTIFY messages was deemed significantly more expensive without tangible benefit, the protocol does not require it. Access control mechanisms are an option but not a requirement, since a spoofed or misdirected notification can only affect timing.
section: "5"
topics:
