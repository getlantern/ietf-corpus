document: rfc-8954
kind: security-consideration
summary: If the nonce value is predictable, an attacker may prefetch responses with the predicted nonce and replay them. If the nonce is too small (e.g., 1 octet), an attacker can prefetch responses for all possible nonce values.
section: "3.2"
topics:
