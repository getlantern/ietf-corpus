document: rfc-2440
kind: normative-requirement
summary: V2 key packets MUST NOT be generated. An implementation MUST NOT create a V3 key with a public key algorithm other than RSA. Implementations SHOULD create version 4 keys, which correct security deficiencies present in V3 keys.
section: 5.5.2
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
