document: rfc-5416
kind: normative-requirement
summary: The WTP and AC MUST support 802.11 encryption/decryption at the WTP for both Split and Local MAC modes. The WTP and AC MAY additionally support 802.11 encryption/decryption at the AC.
section: "2.2"
rfc2119_level: MUST
