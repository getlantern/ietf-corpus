document: rfc-2396
kind: design-rationale
summary: Section 4 (URI References) was added specifically to resolve confusion about whether fragment identifiers are part of a URI. Fragments are syntactically associated with URI references but are not part of the URI itself; their semantics depend on the retrieved media type.
section: G.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
