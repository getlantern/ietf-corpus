document: rfc-2370
kind: protocol-element
summary: Opaque LSAs are link-state advertisement types 9, 10, and 11. Type 9 has link-local flooding scope, type 10 has area-local flooding scope, and type 11 is flooded throughout the entire Autonomous System (equivalent to type-5 AS-external LSAs).
section: "3.0"
topics:
