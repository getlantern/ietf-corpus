document: rfc-3852
kind: normative-requirement
summary: The recipient MUST NOT rely on any message digest values computed by the originator. The recipient must independently calculate the message digest and verify it matches the messageDigest attribute in signedAttributes; the content-type attribute value must also match the encapContentInfo eContentType.
section: "5.6"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
