document: rfc-8563
kind: normative-requirement
summary: In no-head-notification mode (Section 5.1), bfd.SilentTail MUST be set to 1 on MultipointTail sessions, and bfd.ReportTailDown MUST be set to zero on MultipointHead or MultipointClient sessions.
section: "5.1"
rfc2119_level: MUST
topics:
