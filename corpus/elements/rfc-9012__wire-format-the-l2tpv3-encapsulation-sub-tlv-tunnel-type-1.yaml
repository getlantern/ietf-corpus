kind: wire-format
summary: The L2TPv3 Encapsulation sub-TLV (tunnel type 1) contains a 4-octet non-zero Session ID followed by a 0–8 octet optional Cookie. Total length is 4–12 octets; cookie length is derived as (sub-TLV length − 4).
