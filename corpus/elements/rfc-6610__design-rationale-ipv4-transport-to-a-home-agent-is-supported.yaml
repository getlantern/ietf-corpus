document: rfc-6610
kind: design-rationale
summary: IPv4 transport to a home agent is supported by encoding the IPv4 address as an IPv4-Embedded IPv6 address using the Well-Known Prefix (RFC 6052), rather than defining separate IPv4-specific options. This keeps the option set consistent while enabling dual-stack operation per RFC 5555.
section: "3"
topics:
