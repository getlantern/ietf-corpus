document: rfc-4043
kind: protocol-element
summary: 'The PermanentIdentifier is defined as an otherName form within the GeneralName structure of the subjectAltName extension. It is an ASN.1 SEQUENCE with two optional fields: identifierValue (UTF8String) and assigner (OBJECT IDENTIFIER). The OID is id-on-permanentIdentifier ::= { id-on 3 }.'
