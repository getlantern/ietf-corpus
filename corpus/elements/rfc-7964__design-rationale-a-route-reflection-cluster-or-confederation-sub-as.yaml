document: rfc-7964
kind: design-rationale
summary: A route reflection cluster or confederation sub-AS should be designed so that IGP metrics for intra-cluster links are much smaller than for inter-cluster links. This practice ensures consistent routing within a cluster and is a prerequisite for Group Best Paths to be sufficient to eliminate MED-induced oscillations.
section: "4"
topics:
    - bgp
    - routing
