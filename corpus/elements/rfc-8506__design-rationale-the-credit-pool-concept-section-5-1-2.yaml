document: rfc-8506
kind: design-rationale
summary: The credit pool concept (Section 5.1.2) was introduced to avoid credit fragmentation (many small parallel reservations on the same account) and to fix the over-reservation problem of the basic single-quota tariff time change mechanism; multipliers translate per-service units into a shared abstract pool, allowing a single reservation to cover multiple services.
