document: rfc-6677
kind: protocol-element
summary: 'The channel-binding protocol uses two information streams: i1, the unauthenticated network information presented by the authenticator to the peer (e.g., SSID, network identity, offered services), and i2, the AAA attributes provided by the authenticator to the AAA server. The EAP server checks i1 from the peer against i2 and a local database to detect inconsistencies.'
section: "5.1"
topics:
    - security
