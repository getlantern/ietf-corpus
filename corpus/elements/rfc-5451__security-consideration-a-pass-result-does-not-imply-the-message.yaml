document: rfc-5451
kind: security-consideration
summary: A 'pass' result does not imply the message is trustworthy. Spam or malicious mail can legitimately pass authentication checks (e.g., spam signed with DKIM by its sender). MUAs and filters SHOULD NOT render authentication results to users without associated reputation data about the authenticated identity.
section: "7.2"
topics:
    - email
    - security
