document: rfc-7386
kind: protocol-element
summary: 'The MergePatch(Target, Patch) algorithm is the normative processing core: if Patch is an Object, iterate its Name/Value pairs — null values remove the named member from Target, non-null values recursively MergePatch into Target[Name]; if Patch is not an Object, return Patch (wholesale replacement).'
section: "2"
