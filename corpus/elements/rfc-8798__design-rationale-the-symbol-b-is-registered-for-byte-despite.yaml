document: rfc-8798
kind: design-rationale
summary: The symbol B is registered for Byte despite B being taken in SI for bel, because RFC 8428 already registered dB for logarithmic relative power, leaving B free. The octet symbol 'o' is in wide use only in French-speaking countries, while B is globally dominant in engineering circles.
section: "2.1"
