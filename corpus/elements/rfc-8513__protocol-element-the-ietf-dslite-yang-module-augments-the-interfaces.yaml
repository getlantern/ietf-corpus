document: rfc-8513
kind: protocol-element
summary: The 'ietf-dslite' YANG module augments the Interfaces YANG module (RFC 8343) and the NAT YANG module (RFC 8512) with DS-Lite-specific parameters for both AFTR and B4 elements. It uses YANG 'feature' statements ('aftr' and 'b4') to distinguish which data nodes apply to each element type.
