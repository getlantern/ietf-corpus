document: rfc-9788
kind: normative-requirement
summary: When rendering a message with Header Protection, an MUA SHOULD render the protected Header Field value from the Cryptographic Payload and ignore unprotected counterparts, with a special exception for the From Header Field when a mismatch with no valid signature is detected.
section: "4"
rfc2119_level: SHOULD
topics:
