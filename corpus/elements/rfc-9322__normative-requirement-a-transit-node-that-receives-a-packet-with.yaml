document: rfc-9322
kind: normative-requirement
summary: A transit node that receives a packet with the Loopback flag set but with an IOAM-Trace-Type that is not '1' in the most significant bit and '0' in the rest MUST NOT loop back a copy of the packet.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - measurement
