document: rfc-2347
kind: state-machine
summary: 'For a Read Request with options, three server responses are possible: OACK (options accepted), DATA (options ignored, normal transfer begins), or ERROR (request denied). For a Write Request with options, the three responses are: OACK (options accepted), ACK (options ignored, normal transfer begins), or ERROR.'
section: Negotiation Protocol
