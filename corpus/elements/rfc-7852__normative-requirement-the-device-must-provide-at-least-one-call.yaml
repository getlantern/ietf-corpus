document: rfc-7852
kind: normative-requirement
summary: The device MUST provide at least one Call-Info header field with a 'purpose' value starting with 'EmergencyCallData' unless it knows a service provider is in the call path. Each service provider in the path of an emergency call MUST insert its own Call-Info.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
