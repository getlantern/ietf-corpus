document: rfc-7817
kind: design-rationale
summary: CN-ID support is retained as a MAY for clients and a MUST for CAs purely for backward compatibility with the large deployed base of email clients; it is not the preferred mechanism and new deployments should use DNS-ID or SRV-ID.
