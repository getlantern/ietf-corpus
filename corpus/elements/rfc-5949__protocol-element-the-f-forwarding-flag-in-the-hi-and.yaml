document: rfc-5949
kind: protocol-element
summary: The 'F' (Forwarding) flag in the HI and HAck messages requests establishment of the inter-MAG tunnel for packet forwarding. HI Code value 2 signals completion of forwarding, allowing both ends to tear down the forwarding tunnel synchronously.
