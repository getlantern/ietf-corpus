document: rfc-5718
kind: design-rationale
summary: Two separate channels (MCC and SCC) are provided rather than a single channel to facilitate easy demultiplexing of control and management traffic, enable separate rate limiters and traffic-shaping functions, and allow separate or overlapping address spaces in management and control planes.
