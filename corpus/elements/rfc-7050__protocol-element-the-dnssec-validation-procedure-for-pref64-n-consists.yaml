document: rfc-7050
kind: protocol-element
summary: 'The DNSSEC validation procedure for Pref64::/n consists of five steps: (1) heuristic AAAA query for ''ipv4only.arpa.'', (2) PTR query for Pref64::WKA to obtain NAT64 FQDNs, (3) comparison of FQDNs against a trusted domain list, (4) AAAA query for the NAT64 FQDN, and (5) DNSSEC validation of the AAAA response.'
section: 3.1.2
topics:
    - dns
    - ip
    - v6ops
    - security
