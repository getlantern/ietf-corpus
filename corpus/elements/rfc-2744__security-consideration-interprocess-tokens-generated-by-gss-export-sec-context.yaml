document: rfc-2744
kind: security-consideration
summary: Interprocess tokens generated by gss_export_sec_context() may contain sensitive data from the security context, including cryptographic keys. Applications must protect these tokens in transit and transfer them only to processes that are trustworthy.
section: "4.6"
topics:
    - security
