document: rfc-8028
kind: normative-requirement
summary: A host SHOULD select default routers for each prefix it is assigned an address in. Routers that have advertised the prefix in their RA SHOULD be preferred over routers that do not advertise the prefix, regardless of Default Router Preference. This extends Section 6.3.6 of RFC 4861.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
