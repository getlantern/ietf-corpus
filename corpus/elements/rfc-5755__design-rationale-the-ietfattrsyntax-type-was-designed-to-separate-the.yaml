document: rfc-5755
kind: design-rationale
summary: The IetfAttrSyntax type was designed to separate the AC issuer from the attribute policy authority (useful when multiple ACs issuers serve one policy authority) and to restrict value syntaxes to OCTET STRING, OID, and UTF8String, reducing matching complexity.
