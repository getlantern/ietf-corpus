document: rfc-6283
kind: protocol-element
summary: The <CryptographicInformationList> element stores validation data (certificates, CRLs, OCSP responses, SCVP responses) needed to verify the Time-Stamp Token. Each item goes in a separate <CryptographicInformation> element with required Order and Type attributes. Type values (CRL, OCSP, SCVP, CERT) are IANA-registered and content is DER-encoded and base64-encoded.
section: 3.1.3
topics:
    - crypto
    - pkix
    - security
