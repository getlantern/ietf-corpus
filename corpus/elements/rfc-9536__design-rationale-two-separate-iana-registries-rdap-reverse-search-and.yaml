document: rfc-9536
kind: design-rationale
summary: Two separate IANA registries ("RDAP Reverse Search" and "RDAP Reverse Search Mapping") are used because a single type of reverse search may rely on different members depending on the server's configuration, allowing multiple mappings for the same reverse search property.
