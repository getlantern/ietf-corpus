document: rfc-1427
kind: interoperability-note
summary: A server is permitted but not required to accept a message actually larger than the size declared in the extended MAIL command, such as when a client's size-estimation heuristic underestimates. A client declaring a smaller-than-actual size receives no assurance of acceptance.
section: "6.1"
topics:
    - email
