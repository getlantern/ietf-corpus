document: rfc-8939
kind: interoperability-note
summary: Non-DetNet and DetNet IP packets have identical protocol header formats on the wire; the only difference is the presence of flow-associated DetNet state on each DetNet node. Standard DSCP field modification per RFC 2474 is not precluded.
