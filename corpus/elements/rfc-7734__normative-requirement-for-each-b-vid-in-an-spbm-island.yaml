document: rfc-7734
kind: normative-requirement
summary: For each B-VID in an SPBM island, a single SPBM-PE MUST be elected the Designated Forwarder (DF) for that B-VID. An SPBM-PE can be DF for more than one B-VID.
section: "3"
rfc2119_level: MUST
topics:
    - routing
