document: rfc-2131
kind: normative-requirement
summary: If the client detects that the address in the DHCPACK message is already in use (e.g., via ARP), the client MUST send a DHCPDECLINE message to the server and restart the configuration process, waiting a minimum of ten seconds before restarting to avoid excessive traffic.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
