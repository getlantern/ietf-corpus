document: rfc-6942
kind: protocol-element
summary: The Diameter ERP application transports ERP messages between an ER authenticator and the ER server using Application Id 13. It reuses the Diameter-EAP-Request (DER) and Diameter-EAP-Answer (DEA) commands with the new Application Id, referred to as ERP/DER and ERP/DEA.
