document: rfc-9431
kind: normative-requirement
summary: The Broker MUST check for token expiration on receiving a CONNECT, PUBLISH, or SUBSCRIBE packet. The Broker SHOULD also check on receiving a PINGREQ and MAY check periodically to enable early detection.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
    - security
