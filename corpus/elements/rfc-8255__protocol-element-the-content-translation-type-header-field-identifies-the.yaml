document: rfc-8255
kind: protocol-element
summary: 'The Content-Translation-Type header field identifies the translation provenance of a language message part. It takes one of three initial values: ''original'' (source language), ''human'' (human-translated or human-corrected), or ''automated'' (machine-translated without correction). Additional values may be registered via the ''Specification Required'' procedure.'
