document: rfc-7455
kind: design-rationale
summary: The hop-count-expiry (traceroute-like) approach is used for path tracing rather than explicit MIP addressing because any MIP within an ingress interface may reply without loss of functionality; the responding RBridge is identified from the Sender ID TLV (Chassis ID sub-type 16396) combined with the Reply Ingress TLV.
section: "6.1"
