document: rfc-6625
kind: normative-requirement
summary: When PIM is used as the PE-PE control protocol and a PE has (C-*,C-G) and/or (C-S,C-G) state matching an S-PMSI A-D route, the PE MUST join the P-tunnel specified in the PMSI Tunnel Attribute of that route.
section: "4.2"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
