document: rfc-1654
kind: interoperability-note
summary: BGP speakers negotiate protocol version by attempting connections starting with the highest supported version. If the peer responds with NOTIFICATION Error Code OPEN Message Error / Unsupported Version Number, the data field contains the highest version the peer supports, enabling rapid convergence to the highest common version.
