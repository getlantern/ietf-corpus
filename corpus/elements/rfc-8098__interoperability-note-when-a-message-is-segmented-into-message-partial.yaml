document: rfc-8098
kind: interoperability-note
summary: When a message is segmented into message/partial fragments, the Disposition-Notification-To, Disposition-Notification-Options, and Original-Recipient header fields SHOULD be placed in the inner (enclosed) message; occurrences in fragment headers are ignored and MUST NOT be copied to the reassembled message.
section: "2.4"
topics:
    - email
