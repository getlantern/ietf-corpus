document: rfc-8402
kind: protocol-element
summary: An IGP-Adjacency Segment (Adj-SID) is attached to a unidirectional adjacency or set of adjacencies and enforces switching of the packet toward a specific interface or set of interfaces, overriding SPF routing decisions. Its flags convey eligibility for protection, local/global scope, and persistence across restarts.
section: "3.4"
topics:
    - routing
