document: rfc-9060
kind: normative-requirement
summary: Each delegate certificate MUST have a TNAuthList scope that is equal to or a subset of its parent certificate's scope — it must be 'encompassed'. This mirrors RPKI 'encompassing' semantics.
section: "4"
rfc2119_level: MUST
topics:
