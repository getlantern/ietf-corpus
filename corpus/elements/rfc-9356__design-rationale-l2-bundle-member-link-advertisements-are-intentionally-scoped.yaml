document: rfc-9356
kind: design-rationale
summary: L2 bundle member link advertisements are intentionally scoped to serve external entities (e.g., PCEs) that wish to control traffic on individual physical links; they do not alter OSPF route computation. The document explicitly excludes defining what attributes are advertised, a minimum set, how they are configured, how they are used, or how they are passed to external entities.
section: "1"
topics:
    - routing
