document: rfc-8931
kind: normative-requirement
summary: Window_Size MUST be at least 1 and less than 33 (maximum 32). MaxFragmentSize MUST be less than 512 bytes when the PHY-layer unit is the byte. The management system SHOULD be capable of providing all protocol parameters, and an implementation MUST abide by configured minimum and maximum boundaries.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
