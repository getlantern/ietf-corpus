document: rfc-9731
kind: protocol-element
summary: The VN Access Point (VNAP) list within each AP is keyed by 'ap-id' and carries references to the associated VN ('vn'), abstract node ('abstract-node'), and Link Termination Point ('ltp') in the abstract TE topology layer. A 'must' constraint enforces that the referenced abstract-node is TE enabled.
