document: rfc-9347
kind: wire-format
summary: 'A Data Block begins with a 4-bit Type field: 0x0 indicates a Pad Data Block, 0x4 indicates an IPv4 data block (the start of the IPv4 packet), and 0x6 indicates an IPv6 data block. The type values were intentionally chosen to match IPv4/IPv6 version field values, eliminating per-block type overhead.'
section: 6.1.3
topics:
    - ipsec
    - vpn
    - ip
