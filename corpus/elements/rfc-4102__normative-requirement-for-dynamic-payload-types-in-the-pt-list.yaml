document: rfc-4102
kind: normative-requirement
summary: For dynamic payload types in the 'pt' list, if the content-type string includes a comma, then the content-type string MUST be a quoted-string. Quotation marks within the list MUST be quoted with backslash quoting as specified in RFC 2045.
section: "3"
rfc2119_level: MUST
