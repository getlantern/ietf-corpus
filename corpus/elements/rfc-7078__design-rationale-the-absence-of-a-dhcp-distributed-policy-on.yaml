document: rfc-7078
kind: design-rationale
summary: The absence of a DHCP-distributed policy on a given interface should not be interpreted as the administrator being indifferent to address selection; it may instead indicate a preference for the default RFC 6724 policy, so the default SHOULD be applied where no override is provided.
section: "3.3"
topics:
