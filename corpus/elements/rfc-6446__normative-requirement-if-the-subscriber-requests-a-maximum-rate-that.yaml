document: rfc-6446
kind: normative-requirement
summary: If the subscriber requests a maximum rate that would result in no notification before the subscription expiration, the notifier MUST increase the maximum rate and set it to the reciprocal value of the remaining subscription expiration time.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
