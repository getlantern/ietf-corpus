document: rfc-4356
kind: protocol-element
summary: The MM3 reference point is the interface between an MMS Relay/Server and external (non-MMS) systems such as Internet mail. This specification defines message exchange over MM3 using native SMTP and RFC 2822 message format, mapping MMS X-Mms-* headers to standard Internet message headers and SMTP envelope values.
section: "1.1"
topics:
    - email
