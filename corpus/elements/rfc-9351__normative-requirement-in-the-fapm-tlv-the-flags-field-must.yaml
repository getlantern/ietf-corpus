document: rfc-9351
kind: normative-requirement
summary: In the FAPM TLV, the Flags field MUST be set to 0 for IS-IS (it is only applicable for OSPF). The Reserved field MUST be set to 0 by the originator and MUST be ignored by the receiver.
section: "4"
rfc2119_level: MUST
topics:
