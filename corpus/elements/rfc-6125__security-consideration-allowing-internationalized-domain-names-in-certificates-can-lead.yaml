document: rfc-6125
kind: security-consideration
summary: Allowing internationalized domain names in certificates can lead to inclusion of visually similar ('confusable') characters, creating homograph attack opportunities. Implementations are strongly discouraged from including or checking wildcard characters embedded within A-labels or U-labels of internationalized domain names.
section: "7.3"
topics:
    - tls
    - pkix
    - security
    - dns
