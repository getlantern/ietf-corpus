document: rfc-7579
kind: protocol-element
summary: The Port Label Restrictions Field encodes what labels may or may not be used on a link. It carries a MatrixID (either the corresponding connectivity matrix ID or 0xFF for port-wide restrictions), a Restriction Type (RstType), Switching Capability, and LSP Encoding Type, plus restriction-type-specific parameters.
