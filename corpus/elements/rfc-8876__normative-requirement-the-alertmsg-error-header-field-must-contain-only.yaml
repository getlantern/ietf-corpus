document: rfc-8876
kind: normative-requirement
summary: The AlertMsg-Error header field MUST contain only one ErrorValue. The error code text string is OPTIONAL but RECOMMENDED for human readability; operators MUST NOT change the meaning of the error code.
section: "5.2"
rfc2119_level: MUST
topics:
