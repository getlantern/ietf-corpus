summary: AuthorizationData is a sequence of (ad-type, ad-data) pairs carried in tickets and authenticators. Container types include AD-IF-RELEVANT (1, elements are optional), AD-KDC-ISSUED (4, KDC-signed), AD-AND-OR (5), and AD-MANDATORY-FOR-KDC (8).
