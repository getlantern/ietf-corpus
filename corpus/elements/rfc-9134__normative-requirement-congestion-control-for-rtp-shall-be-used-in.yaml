document: rfc-9134
kind: normative-requirement
summary: Congestion control for RTP SHALL be used in accordance with RFC 3550 and any applicable RTP profile. In best-effort network environments, users SHALL monitor packet loss to ensure it is within acceptable parameters and SHALL comply with RFC 8083 circuit breaker criteria.
section: "6"
rfc2119_level: SHALL
topics:
    - rtp
    - congestion
    - realtime
