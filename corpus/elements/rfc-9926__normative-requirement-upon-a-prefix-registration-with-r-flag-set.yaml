document: rfc-9926
kind: normative-requirement
summary: Upon a prefix registration with R flag set to 1 and P-Field set to 3 in the EARO, the 6LR MUST inject the prefix in RPL using a prefix RPL Target Option (RTO), and the P-Field in the RTO MUST be set to 3.
