document: rfc-8310
kind: design-rationale
summary: Both Strict and Opportunistic Privacy profiles permit an initial meta-query (performed using Opportunistic Privacy) to obtain the IP address for the privacy-enabling DNS server. Requiring meta-queries to also use Strict Privacy would introduce significant deployment obstacles, though this leaves the meta-query subject to active attack.
section: "5"
topics:
