document: rfc-3263
kind: normative-requirement
summary: For NAPTR records with SIPS protocol fields, the domain name in the query and the domain name in the replacement field MUST both be valid based on the site certificate handed out by the server in the TLS exchange. The same applies to SRV query and target domain names.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
