document: rfc-7231
kind: design-rationale
summary: Safe methods (GET, HEAD, OPTIONS, TRACE) are defined as essentially read-only so automated retrieval processes (spiders) and cache prefetching can operate without fear of causing harm, and user agents can warn users before invoking unsafe methods.
