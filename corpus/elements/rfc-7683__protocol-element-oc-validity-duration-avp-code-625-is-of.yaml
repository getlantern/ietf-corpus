document: rfc-7683
kind: protocol-element
summary: OC-Validity-Duration AVP (code 625) is of type Unsigned32, expressing validity in seconds from receipt of the first OLR with a given sequence number. Default is 30 seconds; maximum is 86,400 seconds (24 hours); values exceeding the maximum cause the default to apply.
