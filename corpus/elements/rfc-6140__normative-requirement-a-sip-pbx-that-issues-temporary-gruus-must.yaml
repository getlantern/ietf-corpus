document: rfc-6140
kind: normative-requirement
summary: A SIP-PBX that issues temporary GRUUs MUST generate a new temp-gruu for every registration or registration refresh from GRUU-supporting UAs. The random distinguisher D MUST be at least 80 bits (RECOMMENDED) to prevent collisions among all temp-GRUUs issued by the SIP-PBX.
section: 7.1.2.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
