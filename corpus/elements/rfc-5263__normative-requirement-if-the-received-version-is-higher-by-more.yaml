document: rfc-5263
kind: normative-requirement
summary: If the received version is higher by more than one compared to the locally stored value, the watcher assumes one or more NOTIFYs were lost and SHOULD either refresh the subscription to receive a full presence document or terminate the subscription.
section: "4.5"
rfc2119_level: SHOULD
