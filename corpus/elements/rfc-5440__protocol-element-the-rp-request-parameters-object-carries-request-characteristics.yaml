document: rfc-5440
kind: protocol-element
summary: 'The RP (Request Parameters) object carries request characteristics: Pri (3-bit priority 1–7), R (reoptimization bit), B (bidirectional bit), O (strict/loose path bit), and a 32-bit Request-ID-number. The Request-ID-number combined with PCC and PCE addresses uniquely identifies the path computation request context.'
section: "7.4"
