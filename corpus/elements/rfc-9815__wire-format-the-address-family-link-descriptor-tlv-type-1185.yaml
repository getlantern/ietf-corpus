document: rfc-9815
kind: wire-format
summary: The Address Family Link Descriptor TLV (type 1185) is a 1-octet field used with unnumbered links to indicate the address family (1 = IPv4, 2 = IPv6) for which the link should be included in SPF. Values 0 and 255 are reserved; 3–254 are undefined.
section: 5.2.2.1
