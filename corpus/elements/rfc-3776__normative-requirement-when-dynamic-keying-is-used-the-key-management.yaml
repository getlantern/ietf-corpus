document: rfc-3776
kind: normative-requirement
summary: When dynamic keying is used, the key management protocol MUST use the care-of address as the source address in IKE exchanges with the home agent, but the IPsec security associations MUST be requested using the mobile node's home address as the client identity.
section: "4.4"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - security
