document: rfc-1035
kind: normative-requirement
summary: All DNS label comparisons must be done case-insensitively (A=a), assuming ASCII with zero parity. Non-alphabetic codes must match exactly. Original case should be preserved whenever possible when data enters the system.
section: 2.3.3
rfc2119_level: MUST
topics:
    - dns
