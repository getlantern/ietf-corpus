document: rfc-5432
kind: security-consideration
summary: An attacker may add, modify, or remove 'qos-mech-send'/'qos-mech-recv' attributes, potentially preventing endpoints from finding a common QoS mechanism. End-to-end integrity protection (e.g., S/MIME for SIP) is strongly recommended.
