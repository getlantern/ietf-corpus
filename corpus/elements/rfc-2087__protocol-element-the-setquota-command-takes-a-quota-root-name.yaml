document: rfc-2087
kind: protocol-element
summary: The SETQUOTA command takes a quota root name and a list of resource limits; it replaces any previous limits for that quota root. If the quota root did not previously exist, an implementation may optionally create it and reassign quota roots for existing mailboxes.
section: "4.1"
