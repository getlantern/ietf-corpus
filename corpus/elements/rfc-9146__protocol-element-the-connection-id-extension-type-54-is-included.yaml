document: rfc-9146
kind: protocol-element
summary: The 'connection_id' extension (type 54) is included in ClientHello and ServerHello messages. Each party sends the CID value it wishes to receive; a zero-length CID indicates willingness to send with CID but unwillingness to receive one.
