document: rfc-5019
kind: normative-requirement
summary: When access to authoritative records for a particular certificate is not available, the responder MUST return an OCSPResponseStatus of 'unauthorized'. This profile extends RFC 2560's definition to include cases where the server is not capable of responding authoritatively.
section: 2.2.3
rfc2119_level: MUST
topics:
    - pkix
    - security
