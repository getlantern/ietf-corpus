document: rfc-8141
kind: protocol-element
summary: The q-component is an optional URN component introduced by '?=' used to pass parameters to the named resource or a system supplying a service. It has the same syntax as the URI query component. For URNs resolving to locator URIs, resolvers copy the q-component to the URI's query component.
section: 2.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
