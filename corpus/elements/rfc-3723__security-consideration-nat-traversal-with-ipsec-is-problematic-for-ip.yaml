document: rfc-3723
kind: security-consideration
summary: 'NAT traversal with IPsec is problematic for IP block storage protocols: AH is incompatible with NAT since it authenticates IP addresses, and ESP transport mode is similarly incompatible with NAT. IPsec ESP tunnel mode with IKE NAT traversal (UDP encapsulation) is the only viable option where NAT is present.'
section: "5.2"
topics:
    - ipsec
    - security
    - nat
