document: rfc-7117
kind: normative-requirement
summary: If an Inclusive P-multicast tree is used to instantiate the provider tunnel, the advertising PE MUST include the PMSI Tunnel attribute in its BGP Intra-AS VPLS A-D route, carrying the tunnel type and the P-multicast tree identity.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
