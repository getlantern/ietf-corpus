summary: The SDP 'fmtp' attribute for the 'red' payload type carries a slash-separated list of RTP payload types specifying the recommended encoding order for primary and secondary (and tertiary, etc.) encodings (e.g., 'a=fmtp:121 0/5'). Only codecs listed on the 'm=' line may appear in fmtp.
