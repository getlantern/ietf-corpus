document: rfc-3597
kind: design-rationale
summary: The generic '\#' text encoding was introduced so that unknown RR types could be represented in master files portably. The same encoding is optionally available for known types, useful when a type's text format depends on a version field for which no text format exists (e.g., a LOC RR with VERSION != 0).
section: "5"
