document: rfc-9243
kind: protocol-element
summary: The duid-unstructured typedef represents DUIDs not matching types 1–4. Its pattern constraint inverts the match on '000[1-4].*' to ensure the first 2 octets do not collide with defined DUID types, allowing arbitrary proprietary formats.
