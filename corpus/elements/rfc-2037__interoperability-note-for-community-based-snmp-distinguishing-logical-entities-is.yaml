document: rfc-2037
kind: interoperability-note
summary: For community-based SNMP, distinguishing logical entities is one purpose of the community string. Different logical entities may share the same naming scope (entLogicalCommunity value) provided they have no need for the same MIB object instance to represent different managed information.
section: "3.2"
topics:
