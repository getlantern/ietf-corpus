document: rfc-4021
kind: design-rationale
summary: Several RFC 1327 header fields (Content-Return, Content-Identifier, Expiry-Date, Obsoletes) were subsequently renamed in RFC 2156 to avoid confusion with MIME-defined fields. The old names carry 'obsolete' status while the renamed versions remain standards-track.
