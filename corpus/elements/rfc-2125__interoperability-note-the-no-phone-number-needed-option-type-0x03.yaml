document: rfc-2125
kind: interoperability-note
summary: The No-Phone-Number-Needed option (type 0x03, Length=2) in a Call-Request signals that the caller already has the peer's phone number; the responder MUST NOT include a Phone-Delta option in the Call-Response. This may be used for security or configuration reasons.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
