document: rfc-6787
kind: design-rationale
summary: 'The channel identifier is designed to be ''difficult-to-guess'' in addition to being unambiguous. This provides a modest security property: an attacker who does not know the identifier cannot inject or hijack control messages on an active channel, even if they can reach the TCP port.'
section: "4.2"
topics:
    - security
    - realtime
