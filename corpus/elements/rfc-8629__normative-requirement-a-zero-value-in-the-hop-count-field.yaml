document: rfc-8629
kind: normative-requirement
summary: A zero value in the Hop Count field (indicating a destination is no longer reachable after Hop Control processing) MUST NOT be used in any message other than a Link Characteristics Response Message.
section: "3.1"
rfc2119_level: MUST NOT
