document: rfc-3301
kind: interoperability-note
summary: If the LAC only supports ATM-based (B bit) bearer and the LNS does not recognize it, no outgoing calls are possible; however implementations are encouraged to allow graceful fallback to digital bearer types for seamless interworking with non-ATM peers.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
