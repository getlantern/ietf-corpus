document: rfc-8762
kind: protocol-element
summary: STAMP uses HMAC-SHA-256 truncated to 128 bits (16-octet HMAC field) for authenticated mode integrity protection. HMAC covers the first 96 octets (six 16-octet blocks) of the packet. Key management and distribution are out of scope.
