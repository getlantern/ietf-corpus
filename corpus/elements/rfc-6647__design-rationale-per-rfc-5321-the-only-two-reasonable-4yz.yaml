document: rfc-6647
kind: design-rationale
summary: Per RFC 5321, the only two reasonable 4yz reply choices for a greylisting implementation are 421 (to terminate the connection immediately) and 450 (for all other cases). No specific recommendation is made between these, as no data indicates one is particularly advantageous over the other.
