document: rfc-8224
kind: normative-requirement
summary: The authentication service MUST authenticate the originator of the request before adding an Identity header. Authentication may be performed via Digest authentication at a proxy, or by UA-specific means such as physical access.
section: "6.1"
rfc2119_level: MUST
topics:
