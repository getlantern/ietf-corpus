document: rfc-5244
kind: normative-requirement
summary: 'Implementations using event codes for ABCD signalling MUST map them to/from ABCD information by: (1) deriving state numbers from ABCD bits as a binary number with A as high-order bit, and (2) mapping state numbers to event codes in order of increasing value (state 0 → code 144, state 15 → code 159).'
section: "2.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
