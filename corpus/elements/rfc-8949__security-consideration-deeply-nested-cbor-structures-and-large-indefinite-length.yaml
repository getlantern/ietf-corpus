document: rfc-8949
kind: security-consideration
summary: Deeply nested CBOR structures and large indefinite-length items can cause resource exhaustion (stack overflow, excessive memory allocation) in decoders. Implementations should impose limits on nesting depth and item sizes, and streaming applications must account for the unbounded memory potentially required to buffer indefinite-length items.
section: "10"
topics:
    - cbor
    - security
