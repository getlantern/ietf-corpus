document: rfc-7596
kind: normative-requirement
summary: Unless an lwB4 is allocated a full IPv4 address, it is RECOMMENDED that PSIDs containing the system ports (0-1023) not be allocated to lwB4s, as these ports are more likely to be reserved by middleware.
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
