document: rfc-8845
kind: interoperability-note
summary: A CLUE-capable device interoperates with a device that does not support CLUE. The CLUE-capable device determines support by the result of the initial SIP offer/answer exchange; if the other device does not use CLUE, the CLUE-capable device falls back to behavior that does not require CLUE.
section: "5"
topics:
