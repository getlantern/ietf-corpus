document: rfc-2640
kind: design-rationale
summary: The LANG command is issued before authentication to give the full benefit of localized error messages from the earliest server interaction. Issuance of HOST or REIN negates the effect of a prior LANG command, so re-negotiation may be needed.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
