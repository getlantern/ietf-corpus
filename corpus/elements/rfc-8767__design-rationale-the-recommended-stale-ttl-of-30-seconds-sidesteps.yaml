document: rfc-8767
kind: design-rationale
summary: The recommended stale TTL of 30 seconds sidesteps historical implementation problems with 0-second TTLs and avoids congestive collapse from clients rapidly re-querying on very short TTLs, while also rate-limiting forwarding resolvers that honor the TTL.
