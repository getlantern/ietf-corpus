document: rfc-4932
kind: interoperability-note
summary: RFC 4932 changes the deletion prohibition from RFC 3732's 'MUST NOT be deleted' to 'SHOULD NOT be deleted' when a host object has associations with other objects, providing implementers flexibility while noting the DNS resolution failure risk.
