document: rfc-7175
kind: normative-requirement
summary: Within an RBridge campus, there is no more than one TRILL BFD Control session from RB1 to RB2 per RB1 TRILL port. Both sides of a session MUST take the Active role (sending initial BFD Control packets with a zero Your Discriminator), and any BFD packet from the remote machine with a zero Your Discriminator MUST be associated with the session bound to that remote system and interface.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
