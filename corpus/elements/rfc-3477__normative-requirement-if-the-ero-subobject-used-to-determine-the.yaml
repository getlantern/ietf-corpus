document: rfc-3477
kind: normative-requirement
summary: If the ERO subobject used to determine the next hop is of type Unnumbered Interface ID and an RRO object was received (or is desired), an RRO subobject of type Unnumbered Interface ID MUST be appended to the RRO when sending the Path message downstream.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
