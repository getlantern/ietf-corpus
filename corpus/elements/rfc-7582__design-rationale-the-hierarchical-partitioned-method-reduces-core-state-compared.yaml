summary: The Hierarchical Partitioned Method reduces core state compared to Flat Partitioning by multiplexing multiple inner MP2MP LSPs over a single outer MP2MP LSP using upstream-assigned PE Distinguisher Labels, but requires hardware support for upstream-assigned labels not universally available; hence both methods are specified.
