document: rfc-9132
kind: normative-requirement
summary: A DOTS client MUST NOT include multiple entries in the 'scope' array of a single PUT request; at least one of 'target-prefix', 'target-fqdn', 'target-uri', or 'alias-name' MUST be present in each PUT request.
section: 4.4.1.1
rfc2119_level: MUST NOT
topics:
    - security
