document: rfc-9915
kind: normative-requirement
summary: A server MUST NOT assign an address that is reserved for another purpose, including addresses using a reserved IPv6 Interface Identifier. By default, server implementations SHOULD NOT generate predictable addresses.
section: "13.1"
rfc2119_level: MUST NOT
