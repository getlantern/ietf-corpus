document: rfc-3108
kind: design-rationale
summary: The 'X-' prefix is omitted from the extension SDP attributes defined in this document (though it is retained for non-IANA-registered codec names) in order to enhance legibility. Parsers are suggested to accept attribute names with or without the 'X-' prefix.
section: "2.1"
