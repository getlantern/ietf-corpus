document: rfc-7711
kind: normative-requirement
summary: The POSH client MUST NOT cache results indefinitely. When a reference is returned, the client MUST use the lower of the two 'expires' values (reference vs. fingerprints) when determining cache lifetime.
section: "6"
rfc2119_level: MUST
