document: rfc-7613
kind: normative-requirement
summary: In the UsernameCaseMapped profile, an entity preparing a string MUST first map fullwidth and halfwidth characters to their decomposition mappings and MUST ensure the string consists only of PRECIS IdentifierClass code points, then MUST encode as UTF-8.
