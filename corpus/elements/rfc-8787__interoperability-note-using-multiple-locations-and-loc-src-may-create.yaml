document: rfc-8787
kind: interoperability-note
summary: Using multiple locations and loc-src may create compatibility issues. RFC 6442 already addresses the issue of multiple locations, and this extension must be used carefully to avoid corruption of location information in deployments spanning multiple trust domains.
