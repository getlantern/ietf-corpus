document: rfc-9007
kind: normative-requirement
summary: When calling MDN/send, the 'using' property of the Request object MUST contain both 'urn:ietf:params:jmap:mdn' and 'urn:ietf:params:jmap:mail' capabilities, because MDN/send implicitly calls Email/set and uses Identity objects.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
