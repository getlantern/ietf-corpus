summary: 'The Mobility Agent Advertisement Extension (Type 16) appended to ICMP Router Advertisements carries: Sequence Number (2 bytes), Registration Lifetime (2 bytes), flags byte (R,B,H,F,M,G,V bits), reserved byte, and zero or more 4-byte Care-of Addresses. Length = 6 + 4*N.'
