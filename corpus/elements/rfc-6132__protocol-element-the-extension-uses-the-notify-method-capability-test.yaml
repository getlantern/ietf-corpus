document: rfc-6132
kind: protocol-element
summary: The extension uses the notify_method_capability test from RFC 5435 to test presence information. A Sieve script presents the user's presence URI in the 'notification-uri' parameter and tests a specific notification presence item in the 'notification-capability' parameter against one or more values in the 'key-list' parameter.
