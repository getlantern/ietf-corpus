document: rfc-3513
kind: design-rationale
summary: Global anycast sets with no topological locality (null prefix P) require a separate routing entry throughout the entire internet, presenting a severe scaling limit. Therefore, support for global anycast sets is expected to be unavailable or very restricted.
section: "2.6"
topics:
