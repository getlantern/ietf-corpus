document: rfc-8124
kind: normative-requirement
summary: Endpoints MAY reuse an existing WebSocket connection when modifying a session by including 'a=connection:existing' in the SDP, provided the 'websocket-uri' value and transport parameters are unchanged. Otherwise, a new WebSocket connection MUST be negotiated.
section: "4.5"
rfc2119_level: MAY
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
