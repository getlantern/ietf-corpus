document: rfc-4866
kind: wire-format
summary: The Signature option contains the cryptographic signature computed per Section 4.5 and MUST immediately follow the last CGA Parameters option in a Binding Update or Binding Acknowledgment message. Its Signature field carries the output of the CGA signature generation algorithm.
