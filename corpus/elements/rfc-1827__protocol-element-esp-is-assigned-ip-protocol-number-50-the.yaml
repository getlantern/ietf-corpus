document: rfc-1827
kind: protocol-element
summary: ESP is assigned IP Protocol Number 50. The header immediately preceding an ESP header always contains the value 50 in its Next Header (IPv6) or Protocol (IPv4) field. ESP may appear anywhere after the IP header and before the final transport-layer protocol.
section: "3"
topics:
