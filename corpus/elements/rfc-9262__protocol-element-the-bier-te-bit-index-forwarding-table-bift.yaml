document: rfc-9262
kind: protocol-element
summary: The BIER-TE Bit Index Forwarding Table (BIFT) is indexed by BIFT-index = SI * BSL + BP - 1. Each entry may contain zero or more adjacencies of types forward_connected(), forward_routed(), local_decap(), or ECMP(). BIFT entries are populated only on the upstream BFR of each adjacency; all other BFRs leave those entries empty.
section: "4.1"
topics:
    - routing
