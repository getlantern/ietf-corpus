document: rfc-1286
kind: protocol-element
summary: 'dot1dSrPortLargestFrame specifies the maximum INFO field size (LLC and above, not including MAC framing) for source routing ports. Valid values defined by 802.5 source routing are: 516, 1500, 2052, 4472, 8144, 11407, 17800, and 65535 octets.'
