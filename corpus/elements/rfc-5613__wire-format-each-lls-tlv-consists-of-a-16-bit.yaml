document: rfc-5613
kind: wire-format
summary: Each LLS TLV consists of a 16-bit Type field (unique TLV ID), a 16-bit Length field (length of Value in bytes), and a variable-length Value field. TLVs are padded to a 32-bit boundary; padding bytes are not included in the TLV Length but are included in the LLS Data Length. Unrecognized TLV types are ignored.
section: "2.3"
topics:
    - routing
