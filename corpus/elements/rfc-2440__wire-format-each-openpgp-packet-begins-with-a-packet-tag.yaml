document: rfc-2440
kind: wire-format
summary: 'Each OpenPGP packet begins with a Packet Tag octet: bit 7 must always be 1; bit 6 selects old (0) or new (1) format. Old format encodes content tag in bits 5–2 and length-type in bits 1–0; new format encodes content tag in bits 5–0 with body length following separately.'
section: "4.2"
