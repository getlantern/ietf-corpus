document: rfc-3648
kind: design-rationale
summary: The protocol focuses on human-maintained orderings because orderings based on property values can be achieved via search protocol ordering options, but orderings not based on properties (e.g., a book's page order or a reading list) cannot be maintained automatically by the server and generally require human input.
