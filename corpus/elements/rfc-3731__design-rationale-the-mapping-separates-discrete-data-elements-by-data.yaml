document: rfc-3731
kind: design-rationale
summary: The mapping separates discrete data elements by data type to allow XML Schema processors to perform basic syntax validation, reducing ambiguity and parsing work. Provisioning methods that aggregate data into opaque strings are explicitly discouraged because they re-impose that burden on protocol processors.
section: "2.7"
