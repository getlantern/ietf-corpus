document: rfc-4430
kind: security-consideration
summary: KINK does not mandate PFS via KE payloads due to computational cost, making it a policy trade-off. Without KE, compromise of a Kerberos principal key can expose session keys. The existence of other Kerberized services that do not provide PFS further weakens the overall system security posture.
section: "10"
topics:
    - ipsec
    - security
    - crypto
