document: rfc-9326
kind: design-rationale
summary: Despite being called 'Direct Export', the DEX Option-Type does not necessarily result in the creation of another packet. Some deployments may use it solely as a trigger for local OAM data processing, making the name slightly misleading but preserved for historical reasons.
