document: rfc-2873
kind: interoperability-note
summary: 'Problem #1: In a DiffServ-capable network, intermediate nodes may modify the precedence bits of SYN and/or ACK packets during TCP synchronization. A precedence-aware TCP module will then refuse to establish the connection even when both endpoints agree on the same precedence.'
section: "3"
topics:
