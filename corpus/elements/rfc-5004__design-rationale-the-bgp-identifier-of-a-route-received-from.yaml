document: rfc-5004
kind: design-rationale
summary: The BGP identifier of a route received from an external peer is effectively a random number from the local speaker's perspective, since identifiers are allocated by the remote AS. The last two tie-breaking steps of BGP route selection therefore produce arbitrary results for external-to-external comparisons, motivating the stability extension.
section: "1"
topics:
