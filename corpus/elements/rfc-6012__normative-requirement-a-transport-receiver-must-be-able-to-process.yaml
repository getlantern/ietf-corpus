document: rfc-6012
kind: normative-requirement
summary: A transport receiver MUST be able to process messages with a length up to and including 2048 octets. Transport receivers SHOULD be able to process messages up to and including 8192 octets. Message size SHOULD NOT exceed the DTLS maximum record size of 2^14 bytes.
section: 5.4.1
rfc2119_level: MUST
topics:
    - syslog
    - tls
