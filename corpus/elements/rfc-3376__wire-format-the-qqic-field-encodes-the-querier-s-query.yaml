summary: 'The QQIC field encodes the Querier''s Query Interval in seconds using the same encoding as Max Resp Code: linear for values < 128, and floating-point 1|exp(3 bits)|mant(4 bits) for values >= 128, where QQI = (mant | 0x10) << (exp + 3).'
