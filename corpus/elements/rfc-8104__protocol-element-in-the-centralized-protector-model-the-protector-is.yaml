document: rfc-8104
kind: protocol-element
summary: In the centralized protector model, the protector is a dedicated P or PE router serving multiple primary PEs. Each primary PE may need only one protector, bounding the number of context identifiers to the number of primary PEs. For centralized protectors not directly connected to the CE, the protector performs a label swap from the primary PW label to the backup PW label before forwarding to the backup PE.
section: 4.4.2
topics:
    - mpls
    - routing
