document: rfc-8028
kind: privacy-consideration
summary: 'There is a small privacy improvement: the current practice of sending packets with the wrong source address to an upstream router can disclose one upstream prefix to a different upstream network. Correct first-hop router selection reduces the probability of this cross-ISP prefix disclosure.'
