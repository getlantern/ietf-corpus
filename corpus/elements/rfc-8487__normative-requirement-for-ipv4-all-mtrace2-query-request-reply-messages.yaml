document: rfc-8487
kind: normative-requirement
summary: For IPv4, all Mtrace2 Query/Request/Reply messages MUST NOT be fragmented; clients and LHRs/RPs MUST set the IP header DF bit. For IPv6, packet size MUST NOT exceed 1280 bytes. All Mtrace2 messages MUST have a valid UDP checksum.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
