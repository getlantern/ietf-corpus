document: rfc-3471
kind: interoperability-note
summary: Port and wavelength label values have significance only between two neighboring nodes. The receiver may need to convert the received label value into a value with local significance. Channel identifier mappings may be established by configuration or by a protocol such as LMP.
section: 3.2.1.1
topics:
    - mpls
    - routing
