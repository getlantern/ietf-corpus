summary: 'ospfMulticastExtensions is a bit mask indicating the router''s IP multicast forwarding capability: bit 0 = intra-area, bit 1 = inter-area, bit 2 = inter-AS. Only combinations 0, 1, 3, 5, and 7 are valid; default is 0 (no multicast forwarding).'
