document: rfc-6991
kind: security-consideration
summary: The common data type definitions themselves have no direct security impact on the Internet. However, the usage of these definitions in concrete YANG modules might introduce security implications, and the security considerations of the YANG specification (RFC 6020) apply to any module using these types.
section: "6"
topics:
