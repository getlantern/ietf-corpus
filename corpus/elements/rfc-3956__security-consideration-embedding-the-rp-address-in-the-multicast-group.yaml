document: rfc-3956
kind: security-consideration
summary: Embedding the RP address in the multicast group address makes RPs more visible as single points of failure and may expose them to targeted attacks beyond those affecting multicast routing itself. Operators should apply extra hardening to RP routers.
section: "10"
topics:
    - multicast
    - security
