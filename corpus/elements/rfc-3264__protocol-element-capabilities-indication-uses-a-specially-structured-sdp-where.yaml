document: rfc-3264
kind: protocol-element
summary: Capabilities indication uses a specially structured SDP where all m= lines have port set to zero, the t= line is '0 0', and dynamic payload types have rtpmap attributes. This prevents media streams from being established if the SDP is mistaken for an offer.
