document: rfc-7151
kind: design-rationale
summary: Overloading USER with 'user@hostname' syntax was rejected because it conflicts with existing network credential conventions and, when TLS is used, AUTH/ADAT must precede USER—making it impossible to route to the correct virtual host certificate before credentials are sent.
section: A.3
topics:
    - security
    - tls
