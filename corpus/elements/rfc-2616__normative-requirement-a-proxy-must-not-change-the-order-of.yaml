document: rfc-2616
kind: normative-requirement
summary: A proxy MUST NOT change the order of header field values with the same field-name when forwarding a message. Multiple header fields with the same field-name MAY be present only if the entire field-value is defined as a comma-separated list.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - http
