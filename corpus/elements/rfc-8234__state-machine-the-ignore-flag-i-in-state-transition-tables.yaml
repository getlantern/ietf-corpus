document: rfc-8234
kind: state-machine
summary: 'The ''ignore'' flag (''i'' in state transition tables) is clarified: if re-evaluation is triggered and the flag is set, the state machine transits to the supposed state (Normal or DNR per footnotes); if re-evaluation is not triggered and the flag is set, the state machine remains in the current state and continues transmitting the current PSC message.'
