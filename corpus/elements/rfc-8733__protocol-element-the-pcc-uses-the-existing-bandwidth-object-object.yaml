document: rfc-8733
kind: protocol-element
summary: The PCC uses the existing BANDWIDTH object (Object-Class 5, Object-Type 1, 'Requested Bandwidth') in PCRpt messages to report the calculated MaxAvgBw to the stateful PCE. The 'Reoptimization Bandwidth' (Object-Type 2) is not required because the stateful PCE already tracks the current LSP bandwidth.
