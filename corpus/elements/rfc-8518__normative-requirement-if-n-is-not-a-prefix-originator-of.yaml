document: rfc-8518
kind: normative-requirement
summary: If N is not a prefix originator of P, the computing router MUST evaluate one of the corresponding LFA inequalities from Section 2 once for each remote node that originated the prefix; if satisfied, router S MUST choose N as one of the valid LFAs for prefix P.
