document: rfc-2581
kind: normative-requirement
summary: A TCP receiver SHOULD send an immediate duplicate ACK when an out-of-order segment arrives, and SHOULD send an immediate ACK when an incoming segment fills in all or part of a gap in the sequence space.
section: "3.2"
rfc2119_level: SHOULD
topics:
