document: rfc-6381
kind: normative-requirement
summary: If a receiver encounters a body part whose 'codecs' parameter contains codecs not indicated by any media elements, the receiver SHOULD process the body part by discarding the information in the 'codecs' parameter. The body part itself is definitive of the actual codecs needed; the parameter is informative only.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
