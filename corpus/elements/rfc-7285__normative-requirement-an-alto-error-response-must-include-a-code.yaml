document: rfc-7285
kind: normative-requirement
summary: An ALTO error response MUST include a 'code' field in the 'meta' object with one of the defined ALTO error code strings. The ALTO server MUST also set an appropriate HTTP status code independent of whether ALTO-layer error info is included.
section: 8.5.2
rfc2119_level: MUST
topics:
    - http
    - json
