document: rfc-6285
kind: registry
summary: 'IANA RAMS TLV Space Registry: governs Type values for TLV elements in RAMS messages. Types 0–127 require IETF Review for vendor-neutral extensions; Types 128–254 are reserved for private/vendor extensions managed by individual vendors using IANA enterprise numbers; Type 255 is reserved.'
