document: rfc-7807
kind: wire-format
summary: The XML serialization uses the 'application/problem+xml' media type and the namespace 'urn:ietf:rfc:7807'. Extension arrays are expressed as elements with 'i' children; extension objects are elements with child elements. All extensions MUST use the RFC 7807 namespace only.
