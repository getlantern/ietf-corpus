document: rfc-9800
kind: protocol-element
summary: A CSID container is a 128-bit IPv6 address that functions as a container holding a list of one or more CSIDs and the Argument (if any) of the last CSID. A CSID sequence is a group of one or more consecutive SID list entries encoding the common Locator-Block and at least one CSID container.
