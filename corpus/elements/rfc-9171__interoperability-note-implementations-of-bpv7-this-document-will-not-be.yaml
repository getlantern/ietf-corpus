document: rfc-9171
kind: interoperability-note
summary: Implementations of BPv7 (this document) will not be interoperable with implementations of RFC 5050 (BPv6). Additionally, the dtn-scheme syntactic rules imposed by BPv7 are more restrictive than those in RFC 5050, potentially affecting applications conforming to the earlier specification.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
