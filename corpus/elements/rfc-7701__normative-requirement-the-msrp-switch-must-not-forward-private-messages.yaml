document: rfc-7701
kind: normative-requirement
summary: The MSRP switch MUST NOT forward private messages to a recipient that does not support private messaging. Any REPORT sent to the sender for a rejected private message MUST include a Message/CPIM wrapper with the original From and To header fields.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
