document: rfc-3296
kind: protocol-element
summary: A named subordinate reference is constructed by instantiating a referral object in the referencing server with ref attribute values pointing to the corresponding subtree in the referenced server. Typically the DN of the referral object and the referenced object are the same, and the referenced object is a context prefix.
