document: rfc-9323
kind: interoperability-note
summary: When creating plain-text digital objects (ASCII, UTF-8, HTML, JavaScript, XML), converting them to a lossless compressed form (e.g., GZIP per RFC 1952) is RECOMMENDED to avoid unexpected canonicalization at intermediate systems that would cause checksum verification errors.
