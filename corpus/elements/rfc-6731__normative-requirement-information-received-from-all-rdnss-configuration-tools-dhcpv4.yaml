document: rfc-6731
kind: normative-requirement
summary: Information received from all RDNSS configuration tools (DHCPv4, DHCPv6, RA) MUST be combined together into a single list. RDNSSes learned via tools other than the RDNSS selection options MUST be handled as default RDNSSes with medium preference.
section: "4.6"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
