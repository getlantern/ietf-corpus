document: rfc-7503
kind: normative-requirement
summary: OSPFv3 routers implementing autoconfiguration MUST originate an Autoconfiguration (AC) LSA including the Router-Hardware-Fingerprint TLV, and MUST detect received Autoconfiguration LSAs with their own Router ID in the LSA header to identify duplicate Router ID conflicts.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
