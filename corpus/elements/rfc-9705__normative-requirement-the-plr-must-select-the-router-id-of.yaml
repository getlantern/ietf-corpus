document: rfc-9705
kind: normative-requirement
summary: The PLR MUST select the router ID of the NNHOP or NHOP node from the Node-ID sub-object in the RRO carried in the most recent Resv message. If the NP-MP in a different IGP area has not included a Node-ID sub-object, the PLR MUST execute backward compatibility procedures.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
