document: rfc-2355
kind: protocol-element
summary: 'The TN3270E Message Header is a mandatory 5-byte prefix on every data message, consisting of DATA-TYPE (1 byte), REQUEST-FLAG (1 byte), RESPONSE-FLAG (1 byte), and SEQ-NUMBER (2 bytes). Every TN3270E data message has the form: <TN3270E Header><data><IAC EOR>.'
section: "8.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
