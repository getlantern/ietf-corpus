document: rfc-9573
kind: protocol-element
summary: 'Three label allocation methods are defined: (1) central entity allocates per-VPN/BD/ES labels directly from the DCB; (2) central entity allocates from a few common context-specific label spaces identified by DCB labels; (3) per-PE disjoint blocks within context-specific label spaces for segmented S-PMSIs. Multiple methods may be combined.'
section: "3.3"
topics:
