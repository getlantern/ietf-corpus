document: rfc-9610
kind: normative-requirement
summary: In ContactCard/set, the server MUST reject attempts to set a file that is not a recognised image type as the photo for a card. Photos must first be uploaded using the JMAP blob upload mechanism.
section: "3.5"
rfc2119_level: MUST
