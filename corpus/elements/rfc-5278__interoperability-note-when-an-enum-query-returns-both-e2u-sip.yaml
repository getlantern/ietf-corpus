document: rfc-5278
kind: interoperability-note
summary: When an ENUM query returns both E2U+sip and E2U+voicemsg/videomsg/unifmsg records, the network element receiving the results must contain logic to select the appropriate service type. The vmsg records are intended for routing to messaging services when a called party is unavailable, distinct from E2U+sip records for real-time end-user communication.
section: "8.1"
topics:
    - dns
    - sip
    - voip
