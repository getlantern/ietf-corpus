document: rfc-4124
kind: normative-requirement
summary: When supporting both DS-TE and other MPLS protocol extensions, an implementation MUST treat references to 'preemption priority' as encoding the corresponding TE-Class, and advertisements of Maximum Reservable Bandwidth MUST use the generalized interpretation as the aggregate bandwidth constraint across all Class-Types.
section: "7"
rfc2119_level: MUST
