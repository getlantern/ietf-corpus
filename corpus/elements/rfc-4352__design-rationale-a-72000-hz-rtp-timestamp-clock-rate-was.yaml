document: rfc-4352
kind: design-rationale
summary: A 72000 Hz RTP timestamp clock rate was mandated so that every AMR-WB+ ISF yields an integer number of timestamp ticks per transport frame (960 to 2880 ticks), avoiding fractional-tick arithmetic and providing good conversion ratios to all supported output sampling frequencies.
