summary: 'The PW-MPLS-STD-MIB module is organized into three MIB layers: a service-specific layer, the general PW MIB layer (RFC5601), and the PSN-specific layer. This document defines the PSN layer for MPLS, associating PWs to MPLS tunnels.'
