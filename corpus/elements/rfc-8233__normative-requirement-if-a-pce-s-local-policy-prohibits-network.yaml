document: rfc-8233
kind: normative-requirement
summary: If a PCE's local policy prohibits network performance constraints and the P bit is set, the PCE MUST send a PCErr with Error-Type=5 (Policy violation) and Error-value=8 (Not allowed network performance constraint), and the path computation request MUST be canceled.
section: 3.1.4
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
