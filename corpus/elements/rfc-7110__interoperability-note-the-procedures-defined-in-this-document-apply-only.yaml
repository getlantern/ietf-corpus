document: rfc-7110
kind: interoperability-note
summary: The procedures defined in this document apply only to 'ping' mode of LSP ping. The 'traceroute' mode is explicitly out of scope. If an egress LSR does not recognize the 'Reply via Specified Path' Reply Mode, it returns 'Malformed echo request received' with Subcode zero, and the operator may fall back to one of the four Reply Modes defined in RFC 4379.
section: "5"
topics:
