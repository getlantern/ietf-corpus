document: rfc-7197
kind: normative-requirement
summary: When used as a session-level attribute, 'duplication-delay' MUST be used with the 'group' attribute and 'DUP' grouping semantics as defined in RFC 7104. The relative delay values SHALL apply to every duplication grouping in the same SDP description.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
