document: rfc-4643
kind: wire-format
summary: SASL server challenges are sent as 383 responses with a single Base64-encoded argument. A zero-length challenge MUST be sent as a single equals sign ('='). Client responses are Base64-encoded lines; zero-length responses MUST also be sent as '='. Client cancellation is sent as a single '*'.
section: 2.4.2
topics:
    - security
