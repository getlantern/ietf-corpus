document: rfc-7311
kind: interoperability-note
summary: The AIGP procedures are unlikely to give sensible results when the attribute crosses multiple IGP domains using different IGP protocols (e.g., OSPF and IS-IS) or when metric semantics differ (bandwidth vs. latency) across domains. Such cross-domain use is outside the scope of this document.
section: 3.4.3
topics:
    - bgp
    - routing
