document: rfc-8050
kind: wire-format
summary: The RIB Entries record for AFI/SAFI-specific ADDPATH subtypes inserts a 4-octet Path Identifier field between the 4-octet Originated Time and the 2-octet Attribute Length fields. The Peer Index (2 octets) and BGP Attributes (variable) fields are unchanged from RFC 6396.
section: "4.1"
topics:
