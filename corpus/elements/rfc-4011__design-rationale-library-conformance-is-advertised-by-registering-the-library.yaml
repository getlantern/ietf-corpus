document: rfc-4011
kind: design-rationale
summary: Library conformance is advertised by registering the library name as a role characteristic of the system element ('0.0') in the default SNMP context. This lets policy conditions test library availability via roleMatch('libraryName', '0.0') without requiring a separate capability protocol.
section: "7"
topics:
