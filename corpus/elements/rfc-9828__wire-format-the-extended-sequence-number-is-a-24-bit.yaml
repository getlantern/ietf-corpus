document: rfc-9828
kind: wire-format
summary: 'The extended sequence number is a 24-bit value computed as: ESEQ_field × 65536 + RTP_sequence_number_field. ESEQ (8 bits) carries the high-order bits in the payload header; the standard 16-bit RTP Fixed Header sequence number carries the low-order bits.'
section: "5.2"
