document: rfc-5810
kind: normative-requirement
summary: The FE MUST echo the same correlator value from the Request message into the corresponding Response message; the correlator is handled transparently by the FE. When no response is expected, the correlator field is set to 0.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
