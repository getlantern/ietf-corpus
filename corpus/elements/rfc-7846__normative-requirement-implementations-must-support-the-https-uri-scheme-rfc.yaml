document: rfc-7846
kind: normative-requirement
summary: Implementations MUST support the 'https' URI scheme (RFC 2818) and Transport Layer Security (TLS) (RFC 5246). For scenarios where peer client authentication is desired, HTTP Digest Access Authentication (RFC 7616) MUST be supported, with TLS Client Authentication as the preferred mechanism if available.
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
