document: rfc-9129
kind: normative-requirement
summary: The 'version' field indicating the OSPF protocol version (ospfv2 or ospfv3) is mandatory in the data model. Based on the configured version, the data model varies to accommodate the differences between OSPFv2 and OSPFv3.
