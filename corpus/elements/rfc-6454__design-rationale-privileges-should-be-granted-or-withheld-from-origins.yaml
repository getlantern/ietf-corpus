document: rfc-6454
kind: design-rationale
summary: Privileges should be granted or withheld from origins as a whole rather than from individual resources within an origin, because user agents do not isolate resources within an origin and a resource without a privilege can usually obtain it from another resource in the same origin.
section: 3.4.3
topics:
    - security
