document: rfc-7741
kind: security-consideration
summary: VP8 RTP packets are subject to the security considerations of RFC 3550 and applicable RTP profiles (RTP/AVP, RTP/AVPF, RTP/SAVP, RTP/SAVPF). Applications SHOULD use one or more appropriate strong security mechanisms for confidentiality, integrity, and source authenticity.
section: "7"
rfc2119_level: SHOULD
topics:
