document: rfc-4991
kind: protocol-element
summary: The <size> element communicates to a client that a request exceeded a negotiated size (<request>) or that a response will exceed a negotiated size (<response>). It uses either an <exceedsMaximum> child (bare indication) or an <octets> child (exact count).
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
