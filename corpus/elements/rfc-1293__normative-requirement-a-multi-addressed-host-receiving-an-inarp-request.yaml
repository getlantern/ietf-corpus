document: rfc-1293
kind: normative-requirement
summary: A multi-addressed host receiving an InARP request MUST choose one address with which to respond. It must examine the protocol address of the requesting station and respond with a protocol address corresponding to the same network (e.g., same IP subnet) as the requester.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
