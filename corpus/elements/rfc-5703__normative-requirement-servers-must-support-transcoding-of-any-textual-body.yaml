document: rfc-5703
kind: normative-requirement
summary: Servers MUST support transcoding of any textual body part into UTF-8 for use with 'extracttext', including decoding transfer encodings and transcoding from the indicated character set. Unrecognized or invalid encoding results in an empty string.
