document: rfc-2806
kind: interoperability-note
summary: 'Modem capability compatibility is defined by superset/subset relationships: a local entity with V.22bis MUST NOT connect to a host requiring V.32bis (V.22bis is a subset), but MAY use V.32bis to connect to a host requiring V.32 (V.32bis is a superset of V.32). Compliance to any one listed modem-params alternative is acceptable.'
section: 2.5.9
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
