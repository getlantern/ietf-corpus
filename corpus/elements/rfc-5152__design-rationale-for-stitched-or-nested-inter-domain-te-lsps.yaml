document: rfc-5152
kind: design-rationale
summary: For stitched or nested inter-domain TE LSPs, reoptimization is treated as a local matter per domain because the inter-domain TE LSP is a different LSP (different RSVP session) from the intra-domain S-LSP or H-LSP. This makes reoptimization transparent to the Head-end LSR.
section: "6.2"
