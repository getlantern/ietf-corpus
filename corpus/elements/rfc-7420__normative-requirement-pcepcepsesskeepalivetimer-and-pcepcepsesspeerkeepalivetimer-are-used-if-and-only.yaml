document: rfc-7420
kind: normative-requirement
summary: pcePcepSessKeepaliveTimer and pcePcepSessPeerKeepaliveTimer are used if and only if pcePcepSessState is sessionUp; otherwise they MUST be set to zero. Similarly, pcePcepSessPeerDeadTimer and pcePcepSessKAHoldTimeRem MUST be zero in tcpPending or openWait states.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
