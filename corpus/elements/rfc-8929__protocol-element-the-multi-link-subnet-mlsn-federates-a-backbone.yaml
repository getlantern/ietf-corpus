document: rfc-8929
kind: protocol-element
summary: The Multi-Link Subnet (MLSN) federates a backbone with multiple LLN access links via 6BBRs acting as ND proxies. Each link is its own broadcast domain; link-local unicast, link-scope multicast, and hop-limit-1 traffic do not transit between links, which may produce unexpected behavior in software assuming a single-link subnet.
section: "4"
topics:
