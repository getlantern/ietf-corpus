document: rfc-8945
kind: protocol-element
summary: 'For second and subsequent TCP messages in a multi-message response, the MAC digest input comprises: Prior MAC (MAC from the last TSIG-bearing message), DNS Messages (all unsigned messages since the last TSIG concatenated with the current message), and TSIG Timers (Time Signed + Fudge for the current message only).'
section: 5.3.1
topics:
