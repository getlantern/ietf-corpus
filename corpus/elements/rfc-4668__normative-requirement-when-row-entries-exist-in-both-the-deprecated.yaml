document: rfc-4668
kind: normative-requirement
summary: When row entries exist in both the deprecated IPv4-only table and the new IP-version-neutral table describing the same RADIUS server, the row indexes SHOULD be the same for corresponding rows in each table to facilitate correlation by management applications.
section: "6"
rfc2119_level: SHOULD
