document: rfc-1793
kind: design-rationale
summary: The flooding algorithm change (Section 2.4, sending back a more recent database copy instead of discarding a stale received LSA) is applied to all interfaces, not just demand circuits, because it also resolves the problem of MaxAge LSAs blocking the flooding of new LSA instances with initial sequence numbers.
