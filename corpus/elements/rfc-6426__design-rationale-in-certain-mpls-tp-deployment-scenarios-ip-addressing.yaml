document: rfc-6426
kind: design-rationale
summary: In certain MPLS-TP deployment scenarios, IP addressing may not be available or non-IP encapsulation may be preferred. This motivated defining ACH-based non-IP procedures for on-demand CV and route tracing, using the new On-Demand CV channel type (0x0025) rather than requiring IP host stack support.
section: "1.3"
topics:
