document: rfc-4605
kind: normative-requirement
summary: The IP addressing scheme applied to the proxying tree topology SHOULD be configured to ensure that a proxy device can win the IGMP/MLD Querier election, requiring proxy devices to hold the lowest IP addresses on each link.
section: "1.2"
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
