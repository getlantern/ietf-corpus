document: rfc-1962
kind: normative-requirement
summary: If a CCP Configuration Option is unrecognized, a Configure-Reject MUST be sent. If an option is recognized but not acceptable due to values, a Configure-NAK MUST be sent with the option modified appropriately and MUST contain only those options that will be acceptable.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
