document: rfc-7700
kind: design-rationale
summary: NFKC is chosen over other normalization forms because it is more aggressive—performing both canonical and compatibility decomposition—thereby increasing the number of character sequences that match and reducing user confusion (e.g., Roman numeral IV matching 'IV').
