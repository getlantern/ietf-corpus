document: rfc-2814
kind: protocol-element
summary: LAN_LOOPBACK object carries the unicast IP address of the most recent non-reflecting forwarder of a PATH message. Devices detect and silently discard duplicate PATH messages by checking whether their own address appears in this object; DSBMs reflecting PATH messages back on an incoming interface leave LAN_LOOPBACK unchanged.
section: 4.2.2.6
topics:
    - qos
    - multicast
