document: rfc-9186
kind: normative-requirement
summary: When the head is no longer serving the monitored function, it MUST cease including the BFD Discriminator PIM Hello Option in its PIM Hello messages, and it SHOULD shut down the BFD session following RFC 8562 Section 5.9 procedures.
section: "2.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
