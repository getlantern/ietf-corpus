document: rfc-8250
kind: normative-requirement
summary: The two high-order bits of the PDM Option Type field MUST be set to 00, indicating that nodes that do not recognize this option should skip and continue processing. The third high-order bit MUST be 0, indicating the Option Data does not change en route.
section: 3.2.1
rfc2119_level: MUST
topics:
    - ip
