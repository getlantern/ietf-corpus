document: rfc-2236
kind: normative-requirement
summary: If a router receives a Version 1 Membership Report, it MUST set a timer (equal to [Group Membership Interval]) noting v1 hosts are present for that group. While v1 hosts are present for a group, a router MUST ignore any Leave Group messages for that group.
section: "5"
rfc2119_level: MUST
topics:
    - multicast
