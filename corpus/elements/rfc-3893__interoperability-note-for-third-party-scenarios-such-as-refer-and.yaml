document: rfc-3893
kind: interoperability-note
summary: For third-party scenarios such as REFER and 3PCC, Call-ID and CSeq from the original request do not correspond to those in the subsequent INVITE, making it difficult to correlate a supplemental AIB; further specification work is required to define which headers to include and how to differentiate primary from third-party AIBs.
