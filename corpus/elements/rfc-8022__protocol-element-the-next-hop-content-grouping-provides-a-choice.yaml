summary: 'The ''next-hop-content'' grouping provides a choice with three cases for next hops in static routes: ''simple-next-hop'' (outgoing interface, augmented with address by AF modules), ''special-next-hop'' (blackhole/unreachable/prohibit/receive), and ''next-hop-list'' (multiple next hops with index key).'
