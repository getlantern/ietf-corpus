summary: 'FC Header code points for IPv6/IPv4 encapsulation: R_CTL MUST be 0x04 (Unsolicited Data), TYPE MUST be 0x05 (IP over Fibre Channel), DF_CTL MUST be 0x20 for the first frame (0x60 with ESP_Header), and 0x00 for subsequent frames (0x40 with ESP_Header).'
