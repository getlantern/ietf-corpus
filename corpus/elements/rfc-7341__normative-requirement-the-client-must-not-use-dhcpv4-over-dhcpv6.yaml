document: rfc-7341
kind: normative-requirement
summary: The client MUST NOT use DHCPv4 over DHCPv6 if the DHCPv6 server does not include the DHCP 4o6 Server Address option; if that option subsequently expires or disappears on renewal, the client MUST stop using DHCPv4 over DHCPv6.
section: "9"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
