document: rfc-9866
kind: protocol-element
summary: Each RNFD node maintains a Locally Observed DODAG Root's State (LORS) encoding its current knowledge of root liveness. LORS takes values UP, SUSPECTED DOWN, LOCALLY DOWN, or GLOBALLY DOWN; only Sentinels may enter the middle two states.
