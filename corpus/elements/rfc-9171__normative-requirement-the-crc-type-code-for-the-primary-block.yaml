document: rfc-9171
kind: normative-requirement
summary: The CRC type code for the primary block MUST be non-zero unless the bundle contains a BPSec Block Integrity Block whose target is the primary block. The CRC SHALL be computed over the concatenation of all bytes of the primary block with the CRC field temporarily zeroed.
section: 4.3.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
