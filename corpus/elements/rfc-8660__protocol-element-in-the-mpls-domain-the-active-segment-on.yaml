document: rfc-8660
kind: protocol-element
summary: In the MPLS domain, the active segment on a packet is always the topmost label. Its value is matched against the FIB entry calculated per Section 2.4. For global SIDs this label value is derived from the SID index and the neighbor's SRGB; for local SIDs the MCC directly specifies the label value.
section: "2.9"
topics:
    - mpls
    - routing
