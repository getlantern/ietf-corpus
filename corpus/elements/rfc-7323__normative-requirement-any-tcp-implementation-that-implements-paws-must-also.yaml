document: rfc-7323
kind: normative-requirement
summary: Any TCP implementation that implements PAWS MUST also implement Path MTU Discovery (RFC 1191, RFC 1981, RFC 4821), because PAWS protection can be circumvented by IP fragmentation reassembly errors at high data rates.
section: "5.7"
rfc2119_level: MUST
topics:
    - tcp
