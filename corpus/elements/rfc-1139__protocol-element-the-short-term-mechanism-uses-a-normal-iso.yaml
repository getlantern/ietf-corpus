document: rfc-1139
kind: protocol-element
summary: The short term mechanism uses a normal ISO 8473 DT PDU as both the echo-request and echo-reply PDU, distinguished only by a special NSAP selector value. The echo-request selector identifies echo-request PDUs; the echo-reply selector identifies echo-reply PDUs. These PDUs are indistinguishable from DT PDUs except for their NSAP selector.
