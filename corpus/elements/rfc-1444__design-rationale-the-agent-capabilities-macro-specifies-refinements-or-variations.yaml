document: rfc-1444
kind: design-rationale
summary: The AGENT-CAPABILITIES macro specifies refinements or variations with respect to OBJECT-TYPE macros in MIB modules, NOT with respect to MODULE-COMPLIANCE macros in compliance statements. This distinction ensures that capabilities describe actual agent behavior relative to the MIB definition, not relative to a compliance floor.
