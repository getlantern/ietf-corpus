document: rfc-2320
kind: design-rationale
summary: Local textual conventions (IpoaAtmAddr, IpoaAtmConnKind, etc.) are defined within the IPOA-MIB with an 'Ipoa' prefix rather than being imported from ATM-TC-MIB. This was done so that the IPOA-MIB could be advanced as a standards-based MIB without waiting for the ATM-TC-MIB to be finalized.
section: "4"
extracted_by: claude-sonnet-4-6
