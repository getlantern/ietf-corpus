document: rfc-8390
kind: design-rationale
summary: 'The L-flag semantics from RFC 4874 are reused: L=0 means diversity constraints MUST be satisfied (hard constraint), L=1 means constraints SHOULD be satisfied (soft constraint). This allows operators to express best-effort diversity for single-homed endpoints where strict diversity is impossible.'
section: "2.1"
topics:
