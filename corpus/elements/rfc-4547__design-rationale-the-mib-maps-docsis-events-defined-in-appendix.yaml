document: rfc-4547
kind: design-rationale
summary: The MIB maps DOCSIS events (defined in Appendix H of DOCSIS 1.1 OSSI and Appendix D of DOCSIS 2.0 OSSI) to notification objects organized by functional category rather than individual event, so that one SNMP notification type covers an entire event category and the specific event details are carried in varbindings.
