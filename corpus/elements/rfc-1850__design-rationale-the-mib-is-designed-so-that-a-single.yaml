document: rfc-1850
kind: design-rationale
summary: 'The MIB is designed so that a single SET (ospfAdminStat := enabled) suffices to start an OSPF process with sensible defaults: RouterID from an interface address, all interfaces in area 0.0.0.0, no authentication, hello=10s, dead=40s, retransmit=5s, metrics derived from ifSpeed.'
section: "2.5"
topics:
    - routing
    - snmp
