document: rfc-2385
kind: security-consideration
summary: This mechanism is explicitly described as weak but currently practiced. MD5 has been found vulnerable to collision search attacks and is considered by some to be insufficiently strong for this application. Future work is anticipated to provide stronger mechanisms. An attacker must both guess TCP sequence numbers and obtain the shared password to spoof a segment.
section: "5.0"
topics:
    - tcp
    - bgp
    - crypto
    - security
