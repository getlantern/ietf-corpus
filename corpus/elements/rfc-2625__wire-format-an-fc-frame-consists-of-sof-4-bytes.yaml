kind: wire-format
summary: An FC frame consists of SOF (4 bytes), Frame Header (24 bytes), Optional Header (Data Field 0–2112 bytes including Frame Payload and optional headers), CRC (4 bytes), and EOF (4 bytes). The Data Field encompasses both the optional Network_Header and the Frame Payload.
