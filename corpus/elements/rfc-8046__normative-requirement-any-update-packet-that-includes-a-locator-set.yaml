document: rfc-8046
kind: normative-requirement
summary: Any UPDATE packet that includes a LOCATOR_SET parameter SHOULD include both an HMAC and a HIP_SIGNATURE parameter. If a HOST_ID parameter is also included, the receiving host MUST verify it matches the HOST_ID used to establish the association.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - ip
    - security
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
