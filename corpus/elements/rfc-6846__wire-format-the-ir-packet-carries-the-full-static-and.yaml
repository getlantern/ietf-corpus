summary: The IR packet carries the full static and dynamic chains. Its type octet is 0xFD (11111101 binary), followed by 0-2 CID octets (large CID mode), a 1-octet Profile=0x06 field, a 1-octet 8-bit CRC covering the entire IR header, a variable-length static chain, a variable-length dynamic chain, and optional payload.
