document: rfc-3555
kind: normative-requirement
summary: In audio/RED, if the content-type string within 'pt' includes a comma, then that content-type string MUST be a quoted-string; the outer list is itself a quoted-string so inner quotes MUST use backslash quoting per RFC 2045.
section: 4.1.21
rfc2119_level: MUST
topics:
    - rtp
    - realtime
