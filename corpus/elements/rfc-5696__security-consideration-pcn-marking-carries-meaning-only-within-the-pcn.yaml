document: rfc-5696
kind: security-consideration
summary: PCN-marking carries meaning only within the PCN-domain, which is assumed to be entirely under control of a single trusted operator or a set of mutually trusting operators. Inter-domain PCN extensions cannot assume such trust and must address security separately.
