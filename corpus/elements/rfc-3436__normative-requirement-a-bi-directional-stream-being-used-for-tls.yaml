document: rfc-3436
kind: normative-requirement
summary: A bi-directional stream being used for TLS-based user data transmission SHOULD NOT also be used for SCTP-based (unprotected) user data transmission, with the exception of upgrade-to-TLS protocols such as HTTP upgrade and SMTP over TLS.
section: "6.2"
rfc2119_level: SHOULD NOT
topics:
    - tls
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
