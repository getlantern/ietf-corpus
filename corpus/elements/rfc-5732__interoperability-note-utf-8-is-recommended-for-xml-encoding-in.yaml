document: rfc-5732
kind: interoperability-note
summary: UTF-8 is RECOMMENDED for XML encoding in environments where parser encoding support incompatibility exists, though conformant XML processors must also recognize UTF-16. Time zone offset identifiers must not be used; only UTC with upper case T and Z is permitted.
section: "5"
