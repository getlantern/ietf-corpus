document: rfc-7787
kind: interoperability-note
summary: TLV types that lack optional fields or variable-length content MAY carry appended sub-TLVs for extensibility; receivers MUST accept TLVs longer than their defined fixed portion and MUST silently ignore sub-TLVs with unknown or locally unsupported types, ensuring forward compatibility with future extensions.
section: "7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
