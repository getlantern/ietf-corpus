document: rfc-8591
kind: normative-requirement
summary: When sending signed and encrypted user content in a SIP MESSAGE request, sending UAs MUST sign the message first and then encrypt it (SignedData inside AuthEnvelopedData). Recipients SHOULD accept messages signed and encrypted in either order.
section: "4.3"
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
