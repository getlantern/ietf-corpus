document: rfc-6003
kind: interoperability-note
summary: The Ethernet SENDER_TSPEC/FLOWSPEC objects may also be used for signaling Ethernet LSPs beyond MEF EPL/EVPL services; when used this way, the Generalized Label Request Switching Type must be L2SC and LSP Encoding Type must be Ethernet.
