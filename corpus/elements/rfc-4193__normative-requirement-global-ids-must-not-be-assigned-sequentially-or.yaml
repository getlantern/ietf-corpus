document: rfc-4193
kind: normative-requirement
summary: Global IDs MUST NOT be assigned sequentially or with well-known numbers. They MUST be generated with a pseudo-random algorithm consistent with RFC 4086 to ensure uniqueness and prevent any implied aggregation.
section: "3.2"
rfc2119_level: MUST NOT
