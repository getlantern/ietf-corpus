document: rfc-9820
kind: protocol-element
summary: 'CoAP-EAP uses HATEOAS for ordering: each EAP exchange step creates a new CoAP resource on the EAP peer (e.g., /a/eap/N), which is indicated via Location-Path or Location-Query Options in the response. The previous resource is deleted once the new one is created, ensuring strict message ordering.'
section: "3"
topics:
