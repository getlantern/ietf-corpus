document: rfc-5374
kind: security-consideration
summary: The multicast IPsec extensions do not defend against outsider denial-of-service attacks (flooding from unauthenticated systems), compromised multicast routers that can corrupt or drop packets, or replay attacks against groups that do not enable the anti-replay service. Large-scale any-source multicast groups cannot practically maintain per-sender anti-replay state.
section: 6.2.1
topics:
    - ipsec
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
