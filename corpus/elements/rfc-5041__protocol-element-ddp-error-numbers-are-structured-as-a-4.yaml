document: rfc-5041
kind: protocol-element
summary: 'DDP Error Numbers are structured as a 4-bit Error Type and 8-bit Error Code. Types include 0x0 (Local Catastrophic), 0x1 (Tagged Buffer Errors: invalid STag, base/bounds violation, STag not associated with stream, TO wrap, invalid DDP version), and 0x2 (Untagged Buffer Errors: invalid QN/MSN/MO, message too long, invalid version).'
section: "7.2"
topics:
    - realtime
