document: rfc-9008
kind: wire-format
summary: Bit number 3 of the Flags field in the DODAG Configuration option is defined as 'RPI 0x23 enable'. When set, it signals to all DODAG members that they should originate RPL Options with the new 0x23 Option Type rather than the legacy 0x63 value.
section: 4.1.3
topics:
