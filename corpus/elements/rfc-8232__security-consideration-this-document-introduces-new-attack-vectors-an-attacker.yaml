document: rfc-8232
kind: security-consideration
summary: 'This document introduces new attack vectors: an attacker could spoof the SPEAKER-ENTITY-ID to impersonate another PCEP speaker, or flood a PCC with triggered resynchronization requests to exhaust its processing capacity. Securing the PCEP session using TLS (PCEPS) as per RFC 7525 is RECOMMENDED, and the Speaker Entity Identifier could be exposed in a certificate for peer identity verification.'
section: "10"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
