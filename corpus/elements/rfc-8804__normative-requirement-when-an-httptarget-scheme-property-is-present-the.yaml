document: rfc-8804
kind: normative-requirement
summary: When an HttpTarget 'scheme' property is present, the uCDN MUST use that scheme for HTTP redirection to the dCDN. If absent or empty, the uCDN request router MUST use the same scheme as in the original request.
section: "2.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
