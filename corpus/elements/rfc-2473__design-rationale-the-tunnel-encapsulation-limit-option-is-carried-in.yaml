document: rfc-2473
kind: design-rationale
summary: The Tunnel Encapsulation Limit option is carried in a Destination Options extension header (examined only by the tunnel entry-point, an intentional exception to IPv6 rules) rather than a Hop-by-Hop header, to avoid imposing processing overhead and latency at every IPv6 node along the tunnel path.
section: 4.1.1
topics:
    - ip
    - vpn
