document: rfc-8858
kind: design-rationale
summary: Providing only RTP ICE candidates (component ID 1) does not by itself imply exclusive RTP/RTCP multiplexing support, as RTCP candidates are also absent when RTCP is not supported at all. The 'rtcp-mux-only' SDP attribute is therefore needed to signal exclusive multiplexing intent unambiguously.
section: "6"
topics:
