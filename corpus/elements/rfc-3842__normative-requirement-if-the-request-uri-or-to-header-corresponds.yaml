document: rfc-3842
kind: normative-requirement
summary: If the Request-URI or To header corresponds to a group or collection of individual messaging accounts, the notifier MUST specify to which account the message-summary body corresponds using the Message-Account field. The account URI MUST NOT be delimited with angle brackets.
section: "3.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
