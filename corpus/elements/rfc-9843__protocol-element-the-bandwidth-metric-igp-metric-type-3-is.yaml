document: rfc-9843
kind: protocol-element
summary: The Bandwidth Metric (IGP Metric-Type 3) is a standard link metric derived from link capacity. It MAY be explicitly advertised in the Generic Metric sub-TLV or automatically computed via FAD parameters. It MUST follow Section 12 of RFC 9350 for advertisement and processing in Flex-Algorithm calculations.
