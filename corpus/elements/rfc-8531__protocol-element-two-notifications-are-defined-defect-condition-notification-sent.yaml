document: rfc-8531
kind: protocol-element
summary: 'Two notifications are defined: ''defect-condition-notification'' (sent when a defect condition is detected) and ''defect-cleared-notification'' (sent when cleared). Both carry technology, md-name-string (mandatory), ma-name-string (mandatory), mep-name, defect-type (identityref), generating-mepid (mep-id grouping), and a defect message choice (defect-null or defect-code int32).'
section: "4.5"
