document: rfc-7014
kind: registry
summary: 'The flowSelectorAlgorithm registry defines nine initial technique identifiers: systematic count-based sampling (1), systematic time-based sampling (2), random n-out-of-N sampling (3), uniform probabilistic sampling (4), property match filtering (5), hash-based filtering using BOB (6), IPSX (7), or CRC (8), and flow-state dependent IFSP (9). New assignments use First Come First Served with Expert Review; proposed algorithms must be reviewed against RFC 2804 wiretapping policy.'
section: 9.1.1
topics:
