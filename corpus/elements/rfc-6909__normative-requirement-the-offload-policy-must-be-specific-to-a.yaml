document: rfc-6909
kind: normative-requirement
summary: The offload policy MUST be specific to a mobile node's application traffic and MUST NOT match any other mobile node's IP traffic. Control-plane traffic (DHCP, Neighbor Discovery, etc.) MUST NOT be subject to offload.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - pcp
    - nat
    - mobility
    - ip
