document: rfc-5724
kind: normative-requirement
summary: If an HTML form submission via 'sms' URI is longer than the maximum SMS message size, the user agent MAY concatenate SMS messages or refuse to send, but MUST NOT send partial form submissions.
section: "2.6"
rfc2119_level: MUST NOT
