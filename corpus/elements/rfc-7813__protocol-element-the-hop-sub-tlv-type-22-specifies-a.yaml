document: rfc-7813
kind: protocol-element
summary: The Hop sub-TLV (type 22) specifies a single hop of a topology using an IS-IS System ID (48 bits). It conveys a flags byte (C, V, B, R, L, E flags), the System ID, an optional Extended Local Circuit ID (32 bits), optional VIDs with T/R flags, and an optional 48-bit Delay Constraint.
section: "6.2"
topics:
    - routing
