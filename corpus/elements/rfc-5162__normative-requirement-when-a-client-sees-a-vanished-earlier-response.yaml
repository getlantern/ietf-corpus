document: rfc-5162
kind: normative-requirement
summary: When a client sees a VANISHED EARLIER response, it MUST NOT decrement message sequence numbers for each successive message in the mailbox. A VANISHED response without EARLIER MUST cause the client to decrement message sequence numbers.
section: "3.6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
