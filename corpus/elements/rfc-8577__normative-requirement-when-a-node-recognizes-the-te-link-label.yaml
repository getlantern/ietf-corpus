document: rfc-8577
kind: normative-requirement
summary: When a node recognizes the TE Link Label flag in LSP_REQUIRED_ATTRIBUTES but cannot cater to the mandate due to local policy, it MUST send a PathErr message with error code 'Routing Problem (24)' and error value 'TE link label usage failure (70)'.
section: "9.2"
rfc2119_level: MUST
topics:
