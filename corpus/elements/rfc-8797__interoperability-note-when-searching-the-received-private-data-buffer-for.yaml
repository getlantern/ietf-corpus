document: rfc-8797
kind: interoperability-note
summary: When searching the received Private Data buffer for the Format Identifier, the offset is not restricted to any alignment. This allows coexistence with other protocols (e.g., MPAv2) that also insert data into the CM Private Data field.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
