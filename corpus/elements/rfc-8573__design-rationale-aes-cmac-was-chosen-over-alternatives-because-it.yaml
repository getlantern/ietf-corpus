document: rfc-8573
kind: design-rationale
summary: AES-CMAC was chosen over alternatives because it is immune to nonce-reuse vulnerabilities (it does not use a nonce), has good performance in latency and throughput, benefits from native hardware support (e.g., Intel AES-NI), and is widely supported in open source implementations.
