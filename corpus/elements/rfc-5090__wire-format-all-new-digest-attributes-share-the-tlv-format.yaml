document: rfc-5090
kind: wire-format
summary: 'All new Digest-* attributes share the TLV format: 1-octet Type, 1-octet Length (>=3), followed by Text. Digest-Nonce-Count (type 114) is fixed at length 10. Digest-Stale (type 120) and Digest-Domain (type 119) have length 3.'
