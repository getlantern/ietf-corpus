document: rfc-3376
kind: state-machine
summary: When the group timer expires with router filter-mode EXCLUDE, the router transitions to INCLUDE using source records with running timers (timer > 0) as the new INCLUDE source list; source records with timer = 0 are deleted. For example, EXCLUDE(X,Y) with expired group timer becomes INCLUDE(X).
section: "6.5"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
