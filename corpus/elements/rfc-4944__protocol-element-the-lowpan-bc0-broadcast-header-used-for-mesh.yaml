document: rfc-4944
kind: protocol-element
summary: The LOWPAN_BC0 broadcast header, used for mesh broadcast/multicast support, consists of the LOWPAN_BC0 dispatch value followed by an 8-bit Sequence Number that SHALL be incremented by the originator whenever it sends a new mesh broadcast or multicast packet, used to detect and suppress duplicate packets.
section: "11.1"
topics:
    - ip
    - multicast
