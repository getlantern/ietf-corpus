summary: 'LDAP search filters are defined as an ASN.1 CHOICE type with nine alternatives: and, or, not, equalityMatch, substrings, greaterOrEqual, lessOrEqual, present, and approxMatch. This type is BER-encoded for network transmission per CCITT X.209.'
