document: rfc-7317
kind: protocol-element
summary: The NTP client is configured via a presence container /system/ntp (if-feature ntp) containing an 'enabled' boolean and a 'server' list keyed by name; each server entry includes a mandatory UDP address, optional port (if-feature ntp-udp-port, default 123), association-type (server/peer/pool), iburst, and prefer flags.
section: "3.2"
topics:
