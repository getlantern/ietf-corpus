document: rfc-8839
kind: normative-requirement
summary: An agent compliant with this specification MUST include an SDP 'ice-options' attribute with an 'ice2' attribute value. If a peer does not include 'ice2', the agent can assume the peer is compliant to RFC 5245.
section: 4.2.1.5
rfc2119_level: MUST
topics:
