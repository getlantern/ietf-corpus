document: rfc-8513
kind: protocol-element
summary: The 'ipv6-address' leaf (type inet:ipv6-address) configures the IPv6 address of the local DS-Lite tunnel endpoint (AFTR or B4) used for sending and receiving IPv4-in-IPv6 packets. It is added to the Interfaces module augmentation for interfaces of type 'dslite'.
