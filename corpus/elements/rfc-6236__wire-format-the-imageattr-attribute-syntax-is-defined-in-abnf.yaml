document: rfc-6236
kind: wire-format
summary: 'The ''imageattr'' attribute syntax is defined in ABNF: ''imageattr:'' PT followed by one or two direction keywords (''send'' or ''recv'') each with an attr-list. PT is a payload type number (1*DIGIT) or wildcard ''*''. Each set is enclosed in brackets with x= and y= xyrange values and optional key-value pairs for sar, par, and q.'
section: 3.1.1
