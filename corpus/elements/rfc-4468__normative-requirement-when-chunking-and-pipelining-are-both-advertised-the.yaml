document: rfc-4468
kind: normative-requirement
summary: When CHUNKING and PIPELINING are both advertised, the client may pipeline the entire transaction in one round-trip but MUST wait for the results of the 'LAST' BDAT or BURL command prior to initiating a new transaction.
section: "3.2"
rfc2119_level: MUST
topics:
