document: rfc-6790
kind: normative-requirement
summary: Even if an egress LSR signals an implicit null label (requesting PHP), it MUST still be prepared to pop the ELI and EL upon receiving a packet with those labels from an ingress that chose to insert them. Entropy Label Capability may be asymmetric between the two directions of a tunnel.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
