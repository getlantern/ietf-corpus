document: rfc-2080
kind: normative-requirement
summary: A Response MUST be ignored if it is not sourced from the RIPng port (521). The source IPv6 address of the datagram MUST be a link-local address; datagrams from the router's own addresses MUST be ignored.
section: 2.4.2
rfc2119_level: MUST
topics:
    - routing
    - security
