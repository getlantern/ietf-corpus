document: rfc-1542
kind: normative-requirement
summary: 'Server BOOTREPLY delivery algorithm: if ''ciaddr'' is non-zero, unicast to ''ciaddr'' on BOOTPC (68); else if ''giaddr'' is non-zero, unicast to ''giaddr'' on BOOTPS (67); else if BROADCAST flag=1, broadcast to 255.255.255.255 on BOOTPC (68); else unicast to ''yiaddr''/''chaddr'' on BOOTPC (68).'
section: "5.4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
