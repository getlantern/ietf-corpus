document: rfc-7809
kind: normative-requirement
summary: Servers MUST support the HTTP 'CalDAV-Timezones' request header field. If the header has value 'T', the server MUST include all appropriate VTIMEZONE components in returned iCalendar data; if 'F', the server MUST NOT return VTIMEZONE components for time zones available from advertised distribution servers, but MUST return VTIMEZONE for time zones not available from those servers.
section: 3.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
