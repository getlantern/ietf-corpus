document: rfc-5611
kind: normative-requirement
summary: Use or non-use of the RTP header MUST match for both directions of a TDM PW. The RTP AVP MUST be included in ICRQ/OCRQ if and only if the RTP header is used.
section: "2.2"
rfc2119_level: MUST
