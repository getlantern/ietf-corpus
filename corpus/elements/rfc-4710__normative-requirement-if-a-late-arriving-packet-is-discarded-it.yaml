document: rfc-4710
kind: normative-requirement
summary: If a late-arriving packet is discarded, it MUST be counted as either lost or discarded but MUST NOT be counted as both. If an RDS cannot distinguish discards from lost packets, it MUST report only lost packets and MUST NOT report discards.
section: "5.22"
rfc2119_level: MUST NOT
topics:
    - qos
    - realtime
    - measurement
