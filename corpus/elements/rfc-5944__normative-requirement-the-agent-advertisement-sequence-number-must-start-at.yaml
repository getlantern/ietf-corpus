document: rfc-5944
kind: normative-requirement
summary: The Agent Advertisement sequence number MUST start at 0 after booting; each subsequent advertisement MUST increment by one, except that sequence number 0xffff MUST be followed by 256 (not 0), allowing mobile nodes to distinguish reboot-driven resets from normal rollover.
section: 2.3.2
rfc2119_level: MUST
topics:
    - mobility
    - ip
