document: rfc-9289
kind: normative-requirement
summary: For protected operation on UDP, DTLS record replay protection is REQUIRED. Additionally, each DTLS handshake MUST include the connection_id(54) extension with a nonzero-length ConnectionID to support multihomed peers.
section: 5.1.2
rfc2119_level: REQUIRED
topics:
