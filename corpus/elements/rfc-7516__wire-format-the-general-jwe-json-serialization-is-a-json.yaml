document: rfc-7516
kind: wire-format
summary: 'The General JWE JSON Serialization is a JSON object with members: ''protected'' (BASE64URL of JWE Protected Header), ''unprotected'' (JWE Shared Unprotected Header), ''recipients'' (array with per-recipient ''header'' and ''encrypted_key''), ''iv'', ''aad'', ''ciphertext'', and ''tag''. All base64url-encoded fields use their respective JWE component values.'
