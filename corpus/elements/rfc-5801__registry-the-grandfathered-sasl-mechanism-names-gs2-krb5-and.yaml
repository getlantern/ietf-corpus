document: rfc-5801
kind: registry
summary: The grandfathered SASL mechanism names 'GS2-KRB5' and 'GS2-KRB5-PLUS' are assigned to the Kerberos V5 GSS-API mechanism (RFC 1964, RFC 4121) for use via GS2. The names 'SPNEGO' and 'SPNEGO-PLUS' are assigned to the SPNEGO GSS-API mechanism but MUST NOT be used.
