document: rfc-5162
kind: wire-format
summary: 'The QRESYNC select-param is encoded as: ''QRESYNC'' SP ''('' uidvalidity SP mod-sequence-value [SP known-uids] [SP seq-match-data] '')''. The seq-match-data is a parenthesized pair of known-sequence-set and known-uid-set in ascending order. The expunged-resp is ''VANISHED'' [SP ''(EARLIER)''] SP known-uids.'
