document: rfc-3038
kind: normative-requirement
summary: The BLLI value of a new VC must not be assigned to other VCs during the VCID notification procedure to avoid identifier conflicts. Once the VCID/BLLI association is established, the BLLI value may be reused for a new VC.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
