document: rfc-9819
kind: normative-requirement
summary: When ESI Filtering is not in use, the AL in the Inclusive Multicast Ethernet Tag route MUST be 0. When ESI Filtering is in use, AL MUST be set to the size of the ARG supported by the advertising router, and the egress PE MUST use the same AL for all local Ethernet Segments in the same broadcast domain.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
