document: rfc-9665
kind: interoperability-note
summary: An SRP registrar is not required to implement general DNS Update prerequisite processing. When it receives a DNS Update message that is not an SRP Update, it MAY process it as a normal RFC 2136 update or MUST reject it with Refused RCODE. Operators must carefully consider the intersection of SRP Update rules and other update authorization rules to prevent one type of requester from overriding another's registrations.
section: 3.3.2
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
