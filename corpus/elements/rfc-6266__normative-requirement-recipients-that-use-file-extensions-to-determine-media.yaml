document: rfc-6266
kind: normative-requirement
summary: Recipients that use file extensions to determine media type MUST ensure that a safe file extension is used, optimally matching the media type of the received payload, to prevent privilege escalation when the saved file is later opened.
section: "4.3"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
