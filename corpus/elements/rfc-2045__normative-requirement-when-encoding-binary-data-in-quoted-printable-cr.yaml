document: rfc-2045
kind: normative-requirement
summary: When encoding binary data in Quoted-Printable, CR and LF MUST be encoded as '=0D' and '=0A' respectively; a CRLF in binary data must be encoded as '=0D=0A' to avoid incorrect decoding on platforms with different newline conventions.
section: "6.7"
rfc2119_level: MUST
topics:
    - email
