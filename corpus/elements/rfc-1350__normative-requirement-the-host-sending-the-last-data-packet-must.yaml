document: rfc-1350
kind: normative-requirement
summary: The host sending the last DATA packet must retransmit it until the packet is acknowledged or the host times out. If a timeout occurs without acknowledgment, the transfer outcome is indeterminate.
section: "6"
rfc2119_level: MUST
topics:
    - udp
