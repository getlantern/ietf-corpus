document: rfc-1034
kind: state-machine
summary: 'The name server query algorithm proceeds in six steps: (1) set RA; (2) find nearest ancestor zone; (3) match QNAME label-by-label in the zone, handling CNAME restart, referral via NS cuts, and wildcard synthesis; (4) search cache; (5) if recursive mode, invoke resolver; (6) add useful RRs to the additional section.'
