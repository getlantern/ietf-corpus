document: rfc-5583
kind: normative-requirement
summary: In a DDP group, all media streams MUST have the same type of decoding dependency as signaled by the 'depend' attribute. When using multiple codecs (e.g., for Offer/Answer), the media streams MUST have the same dependency structure regardless of which RTP payload type number is used.
section: 5.2.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
