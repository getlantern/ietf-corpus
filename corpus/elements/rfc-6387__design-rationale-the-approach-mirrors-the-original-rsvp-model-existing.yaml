document: rfc-6387
kind: design-rationale
summary: 'The approach mirrors the original RSVP model: existing SENDER_TSPEC, ADSPEC, and FLOWSPEC objects continue to describe downstream traffic, while three new parallel objects (UPSTREAM_TSPEC, UPSTREAM_ADSPEC, UPSTREAM_FLOWSPEC) describe upstream traffic and travel in the opposite message direction. This reuse avoids defining new encoding rules.'
section: "1.2"
topics:
