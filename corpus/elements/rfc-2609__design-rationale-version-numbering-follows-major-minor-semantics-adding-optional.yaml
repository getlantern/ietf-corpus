document: rfc-2609
kind: design-rationale
summary: 'Version numbering follows major.minor semantics: adding optional attributes increments only the minor version (backward compatible — a 1.x client can use 1.y where x<y by ignoring unknown attributes), while adding required attributes, removing attributes, or changing definitions increments the major version (incompatible change).'
section: 3.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
