document: rfc-9237
kind: protocol-element
summary: The REST-specific model with dynamic resource creation adds Dynamic-X permissions (e.g., Dynamic-GET, Dynamic-DELETE). A Dynamic-X permission grants the right to exercise method X on resources returned via Location-indicating mechanisms (Location header or CoAP Location-* options) in a 2.01 Created response to a request the subject made to the listed resource.
section: "2.3"
topics:
    - security
    - http
