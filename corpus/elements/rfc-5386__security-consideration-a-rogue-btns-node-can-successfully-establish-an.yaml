document: rfc-5386
kind: security-consideration
summary: 'A rogue BTNS node can successfully establish an SA by asserting a BTNS peer''s address (e.g., node C''s address in Example #1) unless additional binding of the specific BTNS ID (public key) to traffic flows is performed via connection latching, channel binding, or leap-of-faith mechanisms.'
section: "3.1"
topics:
