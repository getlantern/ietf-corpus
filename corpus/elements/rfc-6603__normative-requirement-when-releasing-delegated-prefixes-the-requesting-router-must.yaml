document: rfc-6603
kind: normative-requirement
summary: When releasing delegated prefixes, the requesting router MUST include the excluded prefix in the OPTION_PD_EXCLUDE option within the IA_PDs of the Release message, and MUST NOT use OPTION_PD_EXCLUDE to introduce any additional excluded prefix for which it did not originally receive a valid binding.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
