document: rfc-4592
kind: interoperability-note
summary: NSEC RRSets at wildcard domain names in DNSSEC-signed zones are synthesized only on an exact QNAME match for the wildcard name itself. Synthesized NSEC RRs are harmless because they are never used for negative caching or to generate NXDOMAIN responses (per RFC 2308).
section: "4.7"
topics:
    - dns
    - security
