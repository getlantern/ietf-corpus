document: rfc-7714
kind: design-rationale
summary: AES-GCM does not require data to be padded to a specific block size, reducing the need for the RTP padding mechanism. It is RECOMMENDED that RTP padding not be used unless necessary to disguise the length of the underlying plaintext.
section: "7.2"
topics:
    - rtp
    - realtime
    - crypto
