document: rfc-2665
kind: protocol-element
summary: 'dot3StatsDuplexStatus reports the current MAC operating mode: unknown(1), halfDuplex(2), or fullDuplex(3). Management control of duplex mode is accomplished through the MAU MIB using ifMauDefaultType (when no auto-negotiation) or ifMauAutoNegAdvertisedBits (when auto-negotiation is enabled).'
section: "4"
