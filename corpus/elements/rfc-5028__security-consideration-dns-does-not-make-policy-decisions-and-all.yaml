document: rfc-5028
kind: security-consideration
summary: DNS does not make policy decisions and all ENUM records must be assumed publicly available. Revealing an 'im:' URI may expose the full name or employer of the target; use of anonymous URIs mitigates this risk.
section: "3"
topics:
