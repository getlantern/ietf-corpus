document: rfc-5132
kind: protocol-element
summary: ipMcastRouteNextHopClosestMemberHops (0..256) gives the minimum hop count to any group member reachable via a given next-hop. Datagrams with TTL/Hop Count less than this value are not forwarded. A value of 0 forwards all; 256 forwards none.
section: "6"
topics:
    - multicast
    - snmp
