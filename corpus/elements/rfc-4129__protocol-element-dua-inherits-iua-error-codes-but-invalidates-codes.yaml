document: rfc-4129
kind: protocol-element
summary: 'DUA inherits IUA error codes but invalidates codes 0x0a (Unassigned TEI), 0x0b (Unrecognized SAPI), and 0x0c (Invalid TEI/SAPI combination) as they are ISDN-specific. Two new error codes are added: 0x1c (Channel Number out of range) and 0x1d (Channel Number not configured).'
section: 2.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
