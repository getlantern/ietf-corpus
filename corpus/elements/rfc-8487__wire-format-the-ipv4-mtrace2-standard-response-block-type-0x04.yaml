document: rfc-8487
kind: wire-format
summary: 'The IPv4 Mtrace2 Standard Response Block (Type 0x04) includes: 32-bit Query Arrival Time (NTP middle-32 format), 32-bit Incoming Interface Address, 32-bit Outgoing Interface Address, 32-bit Upstream Router Address, three 64-bit packet counters (input, output, source-group), 16-bit Rtg Protocol, 16-bit Multicast Rtg Protocol, 8-bit Fwd TTL, 1-bit S flag, 7-bit Src Mask, and 8-bit Forwarding Code.'
section: 3.2.4
topics:
