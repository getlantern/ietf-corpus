document: rfc-4430
kind: normative-requirement
summary: When retransmitting, a KINK peer MUST create a new Kerberos authenticator for the AP-REQ. It MUST use the same ticket within a set of retransmissions to avoid race conditions from different KEYMATs. The retransmission timer MUST implement a truncated exponential back-off mechanism.
section: "9"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
