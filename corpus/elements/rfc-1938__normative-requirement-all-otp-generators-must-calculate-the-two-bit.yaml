document: rfc-1938
kind: normative-requirement
summary: All OTP generators MUST calculate the two-bit checksum appended to the six-word encoding (parity over pairs of bits in the 64-bit key), and all OTP servers MUST verify this checksum explicitly as part of decoding.
section: "6.0"
rfc2119_level: MUST
topics:
    - security
