summary: 'Three new iCalendar property parameters are registered: SCHEDULE-AGENT, SCHEDULE-FORCE-SEND, and SCHEDULE-STATUS. Three new iTIP REQUEST-STATUS codes are registered: 1.0 (Pending), 1.1 (Sent), 1.2 (Delivered). Two new IANA registries are created: Schedule Agent Values (SERVER, CLIENT, NONE) and Schedule Force Send Values (REQUEST, REPLY).'
