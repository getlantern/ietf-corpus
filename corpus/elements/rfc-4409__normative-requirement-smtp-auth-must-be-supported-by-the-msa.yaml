document: rfc-4409
kind: normative-requirement
summary: SMTP-AUTH MUST be supported by the MSA. PIPELINING and Enhanced Status Codes SHOULD be supported. Future SMTP extensions SHOULD explicitly specify if they are valid on the submission port.
