document: rfc-4145
kind: security-consideration
summary: An attacker may attempt to modify the values of the 'connection' and 'setup' attributes to cause endpoints to reestablish connections unnecessarily or prevent connection establishment. Integrity protection (e.g., S/MIME for SDP carried in SIP) is strongly RECOMMENDED for SDP session descriptions.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - security
    - tcp
    - realtime
    - sip
