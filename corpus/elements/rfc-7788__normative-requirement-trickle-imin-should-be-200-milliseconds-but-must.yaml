document: rfc-7788
kind: normative-requirement
summary: Trickle Imin SHOULD be 200 milliseconds but MUST NOT be lower, and Imax SHOULD be 7 doublings of Imin but MUST NOT be lower. The redundancy constant k SHOULD be 1.
section: "3"
rfc2119_level: MUST NOT
