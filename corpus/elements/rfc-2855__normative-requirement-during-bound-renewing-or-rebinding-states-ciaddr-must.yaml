document: rfc-2855
kind: normative-requirement
summary: During BOUND, RENEWING, or REBINDING states, 'ciaddr' MUST be filled with the client's IP address and the BROADCAST flag MUST NOT be set; the server unicasts DHCPACK to 'ciaddr', resolving the link address via 1394 ARP.
section: "3"
rfc2119_level: MUST NOT
