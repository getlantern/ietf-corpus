document: rfc-4253
kind: normative-requirement
summary: All implementations MUST be able to process packets with an uncompressed payload length of 32768 bytes or less and a total packet size of 35000 bytes or less. Implementations SHOULD check packet length to avoid denial of service and buffer overflow attacks.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
