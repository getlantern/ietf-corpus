document: rfc-5272
kind: security-consideration
summary: Reuse of the shared-secret on certification request retries maintains consistent identity proof values, but can open the door for replay and other attacks. The protocol includes optional replay detection through nonces (SenderNonce and RecipientNonce controls, id-cmc 6–7) to mitigate this. The required identity proof tokens must be at least 16 characters with sufficient entropy.
section: "8"
topics:
