document: rfc-6545
kind: registry
summary: IANA maintains a registry of XML schemas approved for inclusion in RID messages via the ReportSchema class. Registered schemas must include schema name, version, namespace, and specification URI. The RID XML namespace 'urn:ietf:params:xml:ns:iodef-rid-2.0' is also registered with IANA per RFC 3688.
