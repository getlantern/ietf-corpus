document: rfc-1388
kind: normative-requirement
summary: If the Address Family Identifier of the first entry is 0xFFFF, that entry is treated as an authentication entry. If authentication is not in use, no entry in the packet should have an AFI of 0xFFFF.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
