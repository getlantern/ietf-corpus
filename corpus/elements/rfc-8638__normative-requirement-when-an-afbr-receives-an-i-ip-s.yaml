document: rfc-8638
kind: normative-requirement
summary: When an AFBR receives an I-IP (S',G') message, it MUST check S'. If S' starts with the unique prefix, the message is a translated E-IP (S,G) or (*,G) message, and the AFBR translates it back to a PIMv4 message and processes it.
section: "6.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
