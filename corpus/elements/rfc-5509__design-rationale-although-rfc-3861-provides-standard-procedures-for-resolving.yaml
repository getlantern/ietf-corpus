document: rfc-5509
kind: design-rationale
summary: Although RFC 3861 provides standard procedures for resolving 'im' and 'pres' URIs, no SIP protocol labels were previously registered in those procedures, leaving a gap that this document fills by registering "_sip" in both registries.
