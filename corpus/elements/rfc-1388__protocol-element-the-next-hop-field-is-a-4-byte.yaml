document: rfc-1388
kind: protocol-element
summary: The Next Hop field is a 4-byte per-entry value specifying the immediate next-hop IP address for packets to the destination. A value of 0.0.0.0 means routing should be via the originator of the RIP advertisement. The specified next hop must be directly reachable on the logical subnet over which the advertisement is made.
section: "3.5"
topics:
    - routing
    - ip
