document: rfc-7208
kind: wire-format
summary: 'An SPF record is a single DNS TXT RR whose RDATA begins with exactly ''v=spf1'' (terminated by SP or end of record) followed by space-separated terms. Multiple character-strings within one TXT record are concatenated without spaces. The record grammar is: record = version terms *SP; version = ''v=spf1''.'
section: "4.5"
