document: rfc-9885
kind: interoperability-note
summary: Sending MP-TLVs in the presence of routers that do not correctly process them can cause traffic loss, forwarding loops, and incorrect constrained path calculations. For example, an implementation that processes only some parts of a Multi-Part Extended IS Reachability TLV may miss link attributes needed for correct TE path computation.
section: "8"
topics:
    - routing
