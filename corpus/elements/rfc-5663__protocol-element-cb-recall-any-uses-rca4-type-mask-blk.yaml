document: rfc-5663
kind: protocol-element
summary: CB_RECALL_ANY uses RCA4_TYPE_MASK_BLK_LAYOUT = 4 in craa_type_mask to request a client to return block layouts. The client should immediately respond NFS4_OK and then asynchronously return complete file layouts until the number of files with cached layouts falls below craa_objects_to_keep.
section: "2.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
