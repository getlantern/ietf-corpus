document: rfc-5048
kind: normative-requirement
summary: For Named Discovery sessions, the ISID RULE MUST be enforced by targets with no changes from RFC 3720 semantics; any new iSCSI session (Discovery or Normal) with a matching 4-tuple may reinstate an existing Named Discovery session.
section: 5.2.2
rfc2119_level: MUST
