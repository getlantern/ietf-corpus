document: rfc-6470
kind: protocol-element
summary: 'The ''netconf-session-end'' notification is generated when a NETCONF session terminates. In addition to common-session-parms, it carries an optional ''killed-by'' leaf (session-id-type, present only when termination-reason=''killed'') and a mandatory ''termination-reason'' enumeration: closed, killed, dropped, timeout, bad-hello, other.'
section: "2.2"
topics:
    - netconf
    - yang
