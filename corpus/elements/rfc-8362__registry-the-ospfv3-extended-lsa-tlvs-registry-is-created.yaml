document: rfc-8362
kind: registry
summary: 'The ''OSPFv3 Extended LSA TLVs'' registry is created within the existing OSPFv3 IANA registry. Values 0–8 are assigned (Reserved, Router-Link, Attached-Routers, Inter-Area-Prefix, Inter-Area-Router, External-Prefix, Intra-Area-Prefix, IPv6 Link-Local Address, IPv4 Link-Local Address). Range 9–32767: IETF Review/IESG Approval; 32768–33023: Experimental (MUST NOT appear in RFCs); 33024–45055: FCFS; 45056–65535: unassigned pending IETF specification.'
section: "8.1"
topics:
    - routing
    - registry
