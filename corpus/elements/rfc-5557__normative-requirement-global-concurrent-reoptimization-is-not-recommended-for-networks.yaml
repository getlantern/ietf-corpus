document: rfc-5557
kind: normative-requirement
summary: Global concurrent reoptimization is NOT RECOMMENDED for networks containing a very large number of very low bandwidth or zero bandwidth TE LSPs, because the large scope of the problem relative to the small benefit makes the process unlikely to be worthwhile.
