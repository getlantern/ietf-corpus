document: rfc-5882
kind: design-rationale
summary: Running BFD inside a tunnel is recommended for OAM in tunneling and pseudowire protocols, as it exercises more aspects of the path than running BFD outside the tunnel. BFD packets should be addressed based on the tunnel endpoints if they are numbered.
