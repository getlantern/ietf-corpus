document: rfc-2380
kind: normative-requirement
summary: RSVP over ATM implementations MUST NOT send RSVP control messages on the same QoS VC as RSVP associated data packets. Implementations MAY send RSVP messages on either the best effort data path or on a separate control VC.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - qos
