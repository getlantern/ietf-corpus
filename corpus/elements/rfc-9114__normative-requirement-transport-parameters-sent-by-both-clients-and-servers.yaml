document: rfc-9114
kind: normative-requirement
summary: Transport parameters sent by both clients and servers MUST allow the peer to create at least three unidirectional streams, and SHOULD also provide at least 1,024 bytes of flow-control credit to each unidirectional stream to accommodate the control stream and QPACK encoder/decoder streams.
section: "6.2"
rfc2119_level: MUST
topics:
    - http
    - quic
