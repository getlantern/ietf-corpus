document: rfc-5691
kind: wire-format
summary: In MPS-lbr mode, the 1-octet AU-header encodes the size of each AAC frame as 6 bits and 2 bits of index information. The AU Header Section MUST be preceded by the 16-bit AU-headers-length field. The Auxiliary Section MUST be empty.
