document: rfc-2283
kind: design-rationale
summary: Two new optional non-transitive attributes (MP_REACH_NLRI and MP_UNREACH_NLRI) are used to provide backward compatibility. A BGP speaker that does not support multiprotocol capabilities will simply ignore these attributes and not pass them to other BGP speakers.
