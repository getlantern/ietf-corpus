document: rfc-5857
kind: protocol-element
summary: ROHC_INTEG (AF=1) is a mandatory attribute carrying a 2-octet integrity algorithm identifier (from the IKEv2 'Transform Type 3' registry) used to verify decompressed packet header integrity. The responder MUST select exactly one proposed algorithm, which applies in both directions.
section: 3.1.2
topics:
