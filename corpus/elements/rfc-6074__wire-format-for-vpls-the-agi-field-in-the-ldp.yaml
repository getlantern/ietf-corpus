document: rfc-6074
kind: wire-format
summary: For VPLS, the AGI field in the LDP Generalized ID FEC is encoded as Type=1, Length=8, followed by 8 bytes of VPLS-id. Each AII (SAII and TAII) is encoded as Type=1, Length=4, followed by a 4-byte PE address or VSI identifier.
