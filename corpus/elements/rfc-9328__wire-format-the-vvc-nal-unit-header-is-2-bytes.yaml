document: rfc-9328
kind: wire-format
summary: 'The VVC NAL unit header is 2 bytes: F (1 bit, forbidden_zero_bit), Z (1 bit, reserved), LayerId (6 bits, nuh_layer_id), Type (5 bits, nal_unit_type), and TID (3 bits, nuh_temporal_id_plus1). TID=0 is illegal to ensure at least one header bit is 1.'
section: 1.1.4
topics:
