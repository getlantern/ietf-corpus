document: rfc-1195
kind: interoperability-note
summary: IP-only routers omit the 'End Systems Neighbours' and 'Prefix Neighbours' entries from their LSPs; all other IS-IS packet formats remain unchanged. OSI-only routers will silently ignore any IP-specific TLVs present in packets from dual routers.
section: "3.7"
