document: rfc-4455
kind: protocol-element
summary: The scsiDscTgtTable lists all remote SCSI target ports or devices authorized to attach to each local SCSI initiator port, supporting both administrator-configured entries (scsiDscTgtConfigured=true) and auto-discovered entries (scsiDscTgtDiscovered=true, read-only). Per-target I/O statistics (commands in, megabytes written/read, high-speed command counter) are included. Rows are managed via RowStatus; scsiDscTgtName must be set before a row becomes active.
section: "9"
topics:
