document: rfc-5196
kind: protocol-element
summary: The <devcaps> element is the root element for device capabilities and SHOULD appear as a child of the PIDF data-model <device> element. It can contain <mobility> and <description> child elements plus extensions. The namespace is urn:ietf:params:xml:ns:pidf:caps.
