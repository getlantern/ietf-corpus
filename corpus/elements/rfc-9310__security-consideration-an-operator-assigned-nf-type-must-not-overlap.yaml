document: rfc-9310
kind: security-consideration
summary: An operator-assigned NF Type MUST NOT overlap with a value already defined in the commonly defined 3GPP set. Use of the same ASCII string by two different operators for different roles could lead to confusion or incorrect access control decisions.
section: "5"
rfc2119_level: MUST NOT
topics:
