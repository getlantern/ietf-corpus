document: rfc-2740
kind: protocol-element
summary: 'The OSPF version number is 3. The Options field in Hello and Database Description packets has been expanded to 24 bits. Two new option bits are defined: the R-bit (clear means the router participates in topology distribution without forwarding transit traffic) and the V6-bit (clear means the router does not forward IPv6 datagrams, even if R-bit is set).'
section: "2.7"
topics:
    - routing
