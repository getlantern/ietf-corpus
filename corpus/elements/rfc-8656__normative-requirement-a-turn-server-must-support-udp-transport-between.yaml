document: rfc-8656
kind: normative-requirement
summary: A TURN server MUST support UDP transport between the client and server, and SHOULD support TCP, TLS-over-TCP, and DTLS-over-UDP. The 'turns' URI scheme MUST be used when TURN runs over TLS-over-TCP or DTLS-over-UDP; the 'turn' scheme MUST be used otherwise. Default ports are 3478 (UDP/TCP) and 5349 (TLS/DTLS).
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - tls
    - udp
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
