document: rfc-8291
kind: normative-requirement
summary: A push message MUST include the application server ECDH public key in the 'keyid' parameter of the encrypted content coding header, encoded as a 65-octet uncompressed point form (starting with 0x04) per X9.62.
section: "4"
rfc2119_level: MUST
topics:
