document: rfc-9867
kind: protocol-element
summary: The USE_PPK_INT notification (Notify Message Type 16445) is a Status Type IKEv2 notification with Protocol ID 0 and SPI Size 0. It is included in IKE_SA_INIT by both initiator and responder to negotiate PPK use in the IKE_INTERMEDIATE exchange. Notification Data is empty; implementations MUST ignore unrecognized data.
section: "3.1"
