document: rfc-7641
kind: normative-requirement
summary: Upon successful registration the server MUST keep the resource representation updated as long as the client is on the observer list. If an entry with a matching endpoint/token pair already exists, the server MUST NOT add a new entry but MUST replace or update the existing one.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
