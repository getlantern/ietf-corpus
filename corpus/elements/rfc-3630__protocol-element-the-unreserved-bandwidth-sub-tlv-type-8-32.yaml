document: rfc-3630
kind: protocol-element
summary: The Unreserved Bandwidth sub-TLV (type 8, 32 octets) specifies available bandwidth at each of eight priority levels (0–7) in IEEE floating point format, with priority 0 at the start. Initial values equal Maximum Reservable Bandwidth; each value must not exceed Maximum Reservable Bandwidth.
section: 2.5.8
topics:
