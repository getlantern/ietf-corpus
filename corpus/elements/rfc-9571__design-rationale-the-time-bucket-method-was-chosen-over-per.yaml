document: rfc-9571
kind: design-rationale
summary: The Time Bucket method was chosen over per-packet delay recording to give operators structural insight into jitter without per-packet multiply operations on hardware. Bucket intervals are operator-programmable, avoiding the storage and bandwidth demands of per-packet delay logs.
