document: rfc-2894
kind: normative-requirement
summary: All implementations generating RR Command messages MUST support sending to the All Routers multicast address with link and site scopes, and to link-local and site-local unicast addresses. All routers MUST be capable of receiving RR Commands sent to those multicast addresses and any of their link-local and site-local unicast addresses.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
