document: rfc-9234
kind: design-rationale
summary: Strict mode (requiring the peer to also send a BGP Role Capability) is deliberately not the default; making strict mode default could cause eBGP sessions to fail after software updates against non-compliant peers. Implementations defaulting to strict mode are strongly discouraged.
section: "8"
topics:
