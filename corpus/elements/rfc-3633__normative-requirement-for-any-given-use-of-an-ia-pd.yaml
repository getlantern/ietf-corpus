document: rfc-3633
kind: normative-requirement
summary: For any given use of an IA_PD by the requesting router, the IAID for that IA_PD MUST be consistent across restarts of the requesting router. The requesting router may maintain consistency by storing the IAID in non-volatile storage or by using an algorithm that consistently produces the same IAID.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
