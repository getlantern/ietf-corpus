summary: This document registers BGPsec_PATH as a new BGP Path Attribute type code in the IANA 'BGP Path Attributes' registry, and registers capability code 7 in the 'Capability Codes' registry for the BGPsec Capability. Algorithm Suite Identifiers are maintained in a separate registry defined in RFC 8208.
