document: rfc-7433
kind: normative-requirement
summary: A sender MAY include multiple User-to-User header fields, and a receiver MUST be prepared to receive multiple User-to-User header fields. Each package defines how many UUI header fields of each package may be present.
section: "4.1"
rfc2119_level: MUST
topics:
