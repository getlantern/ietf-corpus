document: rfc-9141
kind: design-rationale
summary: HTTPS replacements were chosen rather than simply letting FTP URIs become dead links because the referenced materials (RFC copies, Internet-Draft listings, mail archives, MIB CONTACT-INFO) remain in active use by implementors. Availability and security were both motivating factors.
