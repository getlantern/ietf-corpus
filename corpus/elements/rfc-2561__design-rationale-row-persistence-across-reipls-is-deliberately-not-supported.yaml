document: rfc-2561
kind: design-rationale
summary: Row persistence across reIPLs is deliberately not supported via StorageType objects because local, implementation-dependent configuration is expected to define initial persistent TN3270E server configurations; SNMP-created rows are treated as transient operational state.
section: "3.5"
