document: rfc-5404
kind: normative-requirement
summary: When adding redundancy, a sender SHALL NOT increase the total bitrate; instead it must reduce the media bitrate to provide room for redundancy, following the congestion control algorithm in use.
section: "9"
rfc2119_level: SHALL NOT
