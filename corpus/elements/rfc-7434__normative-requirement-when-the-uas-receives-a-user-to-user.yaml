document: rfc-7434
kind: normative-requirement
summary: When the UAS receives a User-to-User header field that is not from the originating user (with purpose 'isdn-uui' or no purpose), the UAS MUST discard the header field. When multiple such headers are received from the originating user in the same request, the UAS MUST discard all of them.
section: "8"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
