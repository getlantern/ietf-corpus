document: rfc-5189
kind: normative-requirement
summary: Mandatory transactions (SE, ST, AST, PRR, PER, RLC, ARE, and monitoring transactions PRL and PRS) MUST be implemented by every middlebox offering MIDCOM service and must be offered to each authenticated agent. Optional transactions (notably GLC) need not be implemented and may be selectively offered.
section: 2.1.8
rfc2119_level: MUST
topics:
