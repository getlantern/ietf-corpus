document: rfc-5140
kind: normative-requirement
summary: 'A TGREP session MUST NOT send UPDATEs of more than one category among: (a) Prefix address families (E164, Pentadecimal, Decimal), (b) TrunkGroup address family, or (c) Carrier address family, for a given established session. Route-type specifications in the OPEN message violating this rule MUST be rejected with a NOTIFICATION message.'
section: "6.7"
rfc2119_level: MUST NOT
topics:
    - realtime
    - voip
