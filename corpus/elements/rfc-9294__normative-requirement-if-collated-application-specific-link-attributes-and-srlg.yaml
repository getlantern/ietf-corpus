document: rfc-9294
kind: normative-requirement
summary: If collated application-specific link attributes and SRLG values are common across multiple applications, they MAY be advertised in a common BGP-LS ASLA TLV instance with bits for all such applications set in the application bit mask.
section: "4"
rfc2119_level: MAY
topics:
