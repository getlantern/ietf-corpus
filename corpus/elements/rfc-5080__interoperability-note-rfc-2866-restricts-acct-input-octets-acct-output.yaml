document: rfc-5080
kind: interoperability-note
summary: RFC 2866 restricts Acct-Input-Octets, Acct-Output-Octets, Acct-Session-Time, Acct-Input-Packets, Acct-Output-Packets, and Acct-Terminate-Cause to Accounting-Stop records, but RFC 2869 Section 2.1 allows all except Acct-Terminate-Cause in Interim-Update records. RFC 5080 clarifies that the RFC 2869 interpretation is authoritative and these attributes are allowable in Interim Accounting records.
section: 2.3.1
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
