document: rfc-9134
kind: normative-requirement
summary: When the transmode parameter is not specified in the media type, a value of 1 (sequential-only) SHALL be assumed and the T bit SHALL be set to 1. If specified, its value SHALL equal the T-bit value configured in the RTP stream.
section: "7.1"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
