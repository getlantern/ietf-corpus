document: rfc-9580
kind: normative-requirement
summary: A Subkey Binding Signature (Type ID 0x18) that binds a signing subkey MUST have an Embedded Signature subpacket containing a Primary Key Binding Signature (Type ID 0x19) made by the signing subkey on the primary key and subkey.
section: 5.2.1.8
rfc2119_level: MUST
topics:
    - crypto
    - security
