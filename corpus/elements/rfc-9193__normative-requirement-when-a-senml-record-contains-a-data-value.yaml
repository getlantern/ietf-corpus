document: rfc-9193
kind: normative-requirement
summary: When a SenML Record contains a Data Value field ('vd'), the Record MAY also include a Content-Format indication field using label 'ct'. The value must be a Content-Format-Spec (a CoAP Content-Format number or a Content-Format-String).
