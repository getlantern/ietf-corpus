document: rfc-4129
kind: protocol-element
summary: 'The V-bit in the DLCI field determines scope: value 0 means the action applies to all DLCs in the carrier (channel number ignored); value 1 means the action applies to the single DLC specified by the channel number. The V-bit is used only by Establish and Release messages; Data messages ignore it.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
