document: rfc-5549
kind: normative-requirement
summary: By default, when a BGP session runs over IPvx and the speaker uses its own address as next hop, the next hop SHOULD be specified as an IPvx address using the encoding rules for the NLRI's AFI/SAFI. This default may be overridden by policy.
section: "5"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
