document: rfc-3527
kind: normative-requirement
summary: When allocating an address and the link-selection sub-option is present, the DHCP server MUST allocate the address on either the subnet specified in the sub-option or a subnet on the same link (network segment) as the specified subnet.
section: "3"
rfc2119_level: MUST
topics:
    - ip
