document: rfc-4379
kind: normative-requirement
summary: 'When sending an MPLS echo request: source IP is a routable address of the sender; destination IP is a randomly chosen address from 127/8 (IPv4) or 0:0:0:0:0:FFFF:127/104 (IPv6); IP TTL is set to 1; destination UDP port is 3503; the Router Alert option MUST be set in the IP header.'
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
