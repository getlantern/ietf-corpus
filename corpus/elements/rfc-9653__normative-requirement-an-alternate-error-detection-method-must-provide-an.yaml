document: rfc-9653
kind: normative-requirement
summary: An alternate error detection method MUST provide an equal or lower probability of false negatives than the CRC32c checksum algorithm. Additionally, using it MUST NOT result in a path failure for more than two retransmission timeouts (RTOs) due to middleboxes expecting correct CRC32c checksums.
section: "3"
rfc2119_level: MUST
topics:
    - sctp
