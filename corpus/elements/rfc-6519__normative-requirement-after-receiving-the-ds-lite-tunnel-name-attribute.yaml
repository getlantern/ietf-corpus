document: rfc-6519
kind: normative-requirement
summary: After receiving the DS-Lite-Tunnel-Name attribute in the initial Access-Accept, the NAS MUST store the received AFTR tunnel name locally so that DHCPv6 Renew responses can be served without a new Access-Request to the AAA server.
