document: rfc-6052
kind: design-rationale
summary: 'The /96 prefix length was chosen because it permits dotted decimal notation for the embedded IPv4 address per RFC 4291 without requiring an update to that specification. Additionally, the selected prefix 64:ff9b::/96 is checksum neutral: the sum of 0x0064 and 0xff9b equals 0xffff, which is zero in one''s complement arithmetic.'
section: "4.2"
topics:
    - ip
    - v6ops
    - nat
