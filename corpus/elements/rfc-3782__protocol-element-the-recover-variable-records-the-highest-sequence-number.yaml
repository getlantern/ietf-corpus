document: rfc-3782
kind: protocol-element
summary: The 'recover' variable records the highest sequence number transmitted at the time Fast Retransmit was last entered or a retransmit timeout occurred. Its initial value is the initial send sequence number. It is used to suppress spurious Fast Retransmits after a timeout.
