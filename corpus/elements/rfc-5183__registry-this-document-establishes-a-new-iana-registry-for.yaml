document: rfc-5183
kind: registry
summary: 'This document establishes a new IANA registry for Sieve environment item names. Items may be registered on a first-come, first-served basis. The registry is initialized with the eight standard items: domain, host, location, name, phase, remote-host, remote-ip, and version.'
