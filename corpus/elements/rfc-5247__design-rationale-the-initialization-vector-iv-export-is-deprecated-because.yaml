document: rfc-5247
kind: design-rationale
summary: The Initialization Vector (IV) export is deprecated because in methods like EAP-TLS the IV is a known value, making it unsuitable alone for computing quantities that must remain secret. When an IV is generated it MUST be unpredictable, but generation is OPTIONAL for EAP methods.
section: "1.4"
topics:
    - security
    - crypto
