summary: 'MAC algorithms for TCP-AO are defined by three fixed elements: KDF_Alg (name of the paired KDF), Key_Length (required Traffic_Key length in bits), and MAC_Length (final truncated output length in bits). The interface is: MAC = MAC_alg(Traffic_Key, Message).'
