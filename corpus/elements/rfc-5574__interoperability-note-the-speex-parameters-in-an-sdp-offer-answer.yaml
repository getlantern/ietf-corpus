document: rfc-5574
kind: interoperability-note
summary: The Speex parameters in an SDP Offer/Answer exchange are completely orthogonal — there is no relationship between the SDP Offer and the Answer. Multiple Speex parameters may appear on a single a=fmtp line separated by semicolons.
