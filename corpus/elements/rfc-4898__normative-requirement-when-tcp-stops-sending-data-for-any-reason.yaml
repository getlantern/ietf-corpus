document: rfc-4898
kind: normative-requirement
summary: When TCP stops sending data for any reason that cannot be classified as Receiver Limited or Congestion Limited, it MUST be treated as Sender Limited. Retransmission timeouts SHOULD be counted in tcpEStatsPerfSndLimTimeCwnd rather than any other state timer.
section: "4"
rfc2119_level: MUST
topics:
    - tcp
    - measurement
