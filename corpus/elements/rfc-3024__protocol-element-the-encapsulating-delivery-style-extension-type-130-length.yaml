document: rfc-3024
kind: protocol-element
summary: The Encapsulating Delivery Style Extension (Type 130, Length 0) MAY be included by the mobile node in Registration Requests to request encapsulating delivery. It MUST appear after the Mobile-Home Authentication Extension and before the Mobile-Foreign Authentication Extension.
section: "3.3"
topics:
