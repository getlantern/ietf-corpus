document: rfc-9100
kind: protocol-element
summary: The 'Secondary Units' feature (feature code 4) indicates that secondary unit names defined in RFC 8798 MAY be used in the 'u' field of SenML records in addition to primary unit names. Enabling this feature sets the SenML version number to 26 (10 + 2^4).
