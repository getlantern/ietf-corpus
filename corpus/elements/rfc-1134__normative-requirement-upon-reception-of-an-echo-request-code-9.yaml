document: rfc-1134
kind: normative-requirement
summary: Upon reception of an Echo-Request (Code=9), a LCP implementation MUST transmit an Echo-Reply (Code=10) with the Identifier and Data fields copied from the request. Echo-Request and Echo-Reply packets may only be sent in the LCP Open state.
section: 4.3.8
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
