document: rfc-4470
kind: protocol-element
summary: Whenever an NSEC record must prove non-existence of a name (QNAME), a new NSEC record is dynamically generated and signed. Its owner name is lexically before QNAME but after any existing name, and its 'next name' is lexically after QNAME but before any existing name.
section: "3"
topics:
    - dns
    - security
