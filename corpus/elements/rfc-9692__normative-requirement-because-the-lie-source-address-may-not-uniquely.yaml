document: rfc-9692
kind: normative-requirement
summary: Because the LIE source address may not uniquely identify the peer in unnumbered or link-local address cases, response transmission MUST occur over the same interface on which the LIEs were received. An implementation MUST be ready to accept TIEs on all addresses it used as LIE source addresses.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
