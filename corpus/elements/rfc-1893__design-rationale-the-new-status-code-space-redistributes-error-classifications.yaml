document: rfc-1893
kind: design-rationale
summary: The new status code space redistributes error classifications relative to SMTP—notably separating mailbox errors from host errors—to better distribute conditions across the number space while retaining the success/transient-failure/permanent-failure semantics of the SMTP first digit.
