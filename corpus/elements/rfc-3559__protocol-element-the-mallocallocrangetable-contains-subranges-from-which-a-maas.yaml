document: rfc-3559
kind: protocol-element
summary: The mallocAllocRangeTable contains subranges from which a MAAS may allocate addresses. It carries Gauge32 counters for currently allocated, offered, waiting, and trying addresses, plus Gauge32 totals (totalAllocatedAddrs, totalRequestedAddrs) populated by a Prefix Coordinator for advertisable ranges. All ranges must be disjoint and contained within the parent mallocScopeTable range.
section: "4"
topics:
    - multicast
