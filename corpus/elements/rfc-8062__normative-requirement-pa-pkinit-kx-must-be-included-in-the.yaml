document: rfc-8062
kind: normative-requirement
summary: PA_PKINIT_KX MUST be included in the KDC reply when anonymous PKINIT is used; it SHOULD be included when PKINIT is used with DH key exchange and the client is non-anonymous; it MUST NOT be included when PKINIT uses public key encryption as the key exchange.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - crypto
