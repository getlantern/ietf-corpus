document: rfc-5497
kind: wire-format
summary: 'A time-value is encoded in an 8-bit time-code where the least-significant 3 bits are the mantissa (a) and the most-significant 5 bits are the exponent (b), yielding: time-value = (1 + a/8) * 2^b * C, and time-code = 8*b + a. Ascending time-codes represent ascending time-values, enabling direct comparison.'
