document: rfc-7140
kind: state-machine
summary: Root node Z receiving HSMP-D Label Mapping <X,Y,L> from D installs outgoing label L. For upstream <X,Y>, Z creates forwarding state marking itself as HSMP LSP egress LER (e.g., pop label and deliver to application), then sends HSMP-U Label Map <X,Y,Lu'> to D. Root never sends HSMP-D Label Map or receives HSMP-U Label Mapping.
section: 3.4.3
topics:
    - mpls
    - routing
