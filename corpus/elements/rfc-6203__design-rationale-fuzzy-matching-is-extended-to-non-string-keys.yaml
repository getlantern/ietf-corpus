document: rfc-6203
kind: design-rationale
summary: Fuzzy matching is extended to non-string keys (dates, sizes, flags) so that a single FUZZY qualifier covers an entire search expression. For example, date ranges may return messages outside the range with lower scores to model queries like "about a week ago".
