document: rfc-9277
kind: security-consideration
summary: Clearly identifying CBOR contents in files may allow malware to identify, exfiltrate, or corrupt interesting stored objects. Protective applications (that check data) cannot rely on the applications that use the data making identical format-recognition decisions, so endpoint assessment technologies must not solely rely on these labels to decide whether to inspect a file.
section: "3"
topics:
    - cbor
    - security
