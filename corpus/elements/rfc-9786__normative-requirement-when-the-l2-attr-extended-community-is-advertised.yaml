document: rfc-9786
kind: normative-requirement
summary: When the L2-Attr Extended Community is advertised in Ethernet A-D per ES routes, it SHALL have only the P or B bits set in the Control Flags field, and all other bits and fields MUST be zero. A remote PE receiving this community SHALL consider only the P and B bits and ignore other values.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
