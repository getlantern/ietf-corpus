document: rfc-9799
kind: wire-format
summary: 'CAA records for ''.onion'' domains are embedded in the Second Layer Hidden Service Descriptor using the format: ''caa SP flags SP tag SP value NL'', which may appear any number of times. The contents of flags, tag, and value are as per RFC 8659 Section 4.1.1.'
