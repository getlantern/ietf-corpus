document: rfc-9560
kind: protocol-element
summary: The 'rdap_allowed_purposes' JWT claim is an array of case-sensitive StringOrURI values that identifies the purposes for which an end user is authorized to access a protected RDAP resource. Identity providers MUST ensure purpose values are only assigned to identities authorized to use them; unrecognized values MUST be ignored.
section: 3.1.5.1
topics:
    - oauth
    - jose
    - registry
