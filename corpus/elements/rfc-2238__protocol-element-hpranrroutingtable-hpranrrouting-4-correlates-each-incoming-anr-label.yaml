document: rfc-2238
kind: protocol-element
summary: hprAnrRoutingTable (hprAnrRouting 4) correlates each incoming ANR label assigned by this node with the outbound TG or local NCE to which packets are forwarded. Each entry carries the label type, destination TG or NCE identity, and a received-packet counter.
