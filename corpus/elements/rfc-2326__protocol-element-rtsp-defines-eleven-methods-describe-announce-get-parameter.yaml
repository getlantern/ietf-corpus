summary: 'RTSP defines eleven methods: DESCRIBE, ANNOUNCE, GET_PARAMETER, OPTIONS, PAUSE, PLAY, RECORD, REDIRECT, SETUP, SET_PARAMETER, and TEARDOWN. PLAY, SETUP, TEARDOWN, and OPTIONS are required; DESCRIBE and PAUSE are recommended; others are optional.'
