document: rfc-9012
kind: normative-requirement
summary: A TLV containing a malformed Tunnel Egress Endpoint sub-TLV MUST be ignored entirely and MUST be removed from the Tunnel Encapsulation attribute before the route is distributed. This is stricter than the general rule for malformed sub-TLVs (which are treated as unrecognized).
section: "13"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
