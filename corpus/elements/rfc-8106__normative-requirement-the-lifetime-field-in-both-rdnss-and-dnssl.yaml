document: rfc-8106
kind: normative-requirement
summary: The Lifetime field in both RDNSS and DNSSL options SHOULD by default be at least 3 * MaxRtrAdvInterval, where MaxRtrAdvInterval is defined in RFC 4861. This default allows DNS options to survive up to three consecutive lost RAs.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
