document: rfc-7346
kind: design-rationale
summary: Scop 3 was defined as 'reserved' in RFC 4291, but the Multicast Protocol for Low-power and Lossy Networks (MPL) requires a multicast scope greater than Link-Local yet automatically determined by network architecture rather than administratively configured. RFC 7346 repurposes scop 3 as 'Realm-Local' to accommodate this need.
section: "1"
topics:
    - ip
    - multicast
