document: rfc-4974
kind: design-rationale
summary: 'Calls are defined as symmetrical: either end may add LSPs or initiate teardown. This symmetry is why a numeric address comparison rule is required to resolve Call setup collisions when both ends simultaneously attempt to establish Calls with matching long Call IDs.'
section: "6.5"
topics:
