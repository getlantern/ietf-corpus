document: rfc-2067
kind: normative-requirement
summary: The IEEE 802.2 LLC header SHALL begin in the first byte of the HIPPI-FP D2_Area. SSAP and DSAP SHALL each contain 0xAA. CTL SHALL contain 0x03 (Unnumbered Information). SNAP Organization Code SHALL be zero; EtherType SHALL be set per Assigned Numbers (IP=0x0800, ARP=0x0806, RARP=0x8035).
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
