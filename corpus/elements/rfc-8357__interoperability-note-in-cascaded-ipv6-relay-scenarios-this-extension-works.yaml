document: rfc-8357
kind: interoperability-note
summary: In cascaded IPv6 relay scenarios, this extension works for any combination of relay agents as long as the relay using a non-DHCP UDP port and its immediate upstream relay device both support the extension; downstream relay agents that do not support it (e.g., Relay3 in the example) do not need to participate unless they also use a non-standard port.
