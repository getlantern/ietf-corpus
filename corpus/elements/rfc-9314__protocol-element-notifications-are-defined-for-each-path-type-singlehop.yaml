document: rfc-9314
kind: protocol-element
summary: 'Notifications are defined for each path type: ''singlehop-notification'', ''multihop-notification'', ''lag-notification'', and ''mpls-notification''. All use the common ''notification-parms'' grouping carrying local-discr, remote-discr, new-state, state-change-reason, time-of-last-state-change, dest-addr, source-addr, session-index, and path-type. Implementations may rate-limit notifications during rapid state cycling.'
section: "2.3"
topics:
    - yang
