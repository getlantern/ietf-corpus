document: rfc-2239
kind: interoperability-note
summary: An agent implementing the interface-MAU related objects must also implement the 'interfaces' group of MIB-II; the value of ifMauIfIndex must equal the ifIndex value for the connected interface. Repeater ports are not represented as MIB-II interfaces.
section: 2.3.1
topics:
    - snmp
