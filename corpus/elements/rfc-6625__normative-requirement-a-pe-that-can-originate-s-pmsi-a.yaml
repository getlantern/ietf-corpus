document: rfc-6625
kind: normative-requirement
summary: 'A PE that can originate S-PMSI A-D routes with any kind of wildcard SHOULD have the ability to interpret and correctly process all three kinds of wildcards: (C-*,C-G), (C-S,C-*), and (C-*,C-*).'
section: "4.1"
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
