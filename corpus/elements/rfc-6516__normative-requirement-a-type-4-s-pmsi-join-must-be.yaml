document: rfc-6516
kind: normative-requirement
summary: A Type 4 S-PMSI Join MUST be encapsulated in an IPv6 UDP datagram. The IPv6 source address SHOULD be the IPv4-mapped IPv6 address corresponding to the IPv4 address the originating PE uses as its PIM source address for the specified P-tunnel.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
    - vpn
    - ip
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
