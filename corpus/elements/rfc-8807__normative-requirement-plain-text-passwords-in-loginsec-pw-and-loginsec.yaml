document: rfc-8807
kind: normative-requirement
summary: 'Plain text passwords in <loginSec:pw> and <loginSec:newPW> are RECOMMENDED to use printable ASCII characters #x20–#x7E with high entropy such as 128 bits. If non-ASCII characters are supported, use of the OpaqueString PRECIS profile (RFC 8265) is recommended.'
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
