document: rfc-3015
kind: protocol-element
summary: 'Three signal types are defined in the Signals Descriptor: on/off (lasts until explicitly stopped), timeout (lasts until stopped or a configurable duration elapses; duration is an integer in hundredths of a second), and brief (self-terminating; no timeout needed). Multiple signals and sequential signal lists in the same SignalsDescriptor are played simultaneously.'
section: 7.1.11
topics:
    - realtime
    - voip
