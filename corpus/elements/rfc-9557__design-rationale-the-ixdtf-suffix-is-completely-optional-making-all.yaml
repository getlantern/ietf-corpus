document: rfc-9557
kind: design-rationale
summary: The IXDTF suffix is completely optional, making all existing RFC 3339 timestamps valid IXDTF timestamps without modification. The format was also designed to be compatible with the pre-existing java.time.ZonedDateTime (ISO_ZONED_DATE_TIME) syntax for attaching time zone names, which was already widely adopted.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
