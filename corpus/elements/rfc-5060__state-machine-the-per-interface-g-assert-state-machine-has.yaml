document: rfc-5060
kind: state-machine
summary: The per-interface (*,G) assert state machine has states noInfo(1), iAmAssertWinner(2), iAmAssertLoser(3). When iAmAssertLoser, the MIB records the winner's address and route metric/preference. For BIDIR-PIM groups, this object must always be noInfo.
