document: rfc-4391
kind: normative-requirement
summary: When a node joins an IP multicast group, the new IB multicast group's MGID MUST use the same P_Key, Q_Key, SL, MTU, and HopLimit as the broadcast-GID. Other attributes SHOULD follow the broadcast-GID values as well.
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - multicast
