summary: 'The Routing Header (Type 1, supporting SDRP) contains: Next Header (8-bit), Routing Type=1 (8-bit), MRE flag, F flag, Reserved, SrcRouteLen (8-bit, max 24), NextHopPtr (8-bit), Strict/Loose Bit Mask (24-bit), and Source Route (list of 128-bit IPv6 addresses including unicast and cluster addresses).'
