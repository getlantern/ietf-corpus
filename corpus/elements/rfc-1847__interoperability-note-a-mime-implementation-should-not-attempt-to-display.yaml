document: rfc-1847
kind: interoperability-note
summary: A MIME implementation should not attempt to display the received form of the second body part of a multipart/encrypted because encryption transforms the content in a way not described by MIME headers. Implementations must wait until encryption is removed before displaying the content.
section: "2.2"
topics:
    - email
    - security
