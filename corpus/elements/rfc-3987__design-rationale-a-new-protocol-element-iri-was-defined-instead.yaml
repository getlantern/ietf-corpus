kind: design-rationale
summary: A new protocol element (IRI) was defined instead of extending or changing the URI definition in order to allow a clear distinction and to avoid incompatibilities with existing software that processes URIs; IRIs serve as 'presentation elements' for URI 'protocol elements'.
