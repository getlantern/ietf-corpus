document: rfc-5140
kind: security-consideration
summary: The security mechanism for TGREP peering sessions is IPsec, using AH for data origin authentication, connectionless integrity, and optional anti-replay protection, or ESP for those properties plus confidentiality. Implementations using ESP SHALL comply with RFC 4835 Section 3.1.1 minimum algorithms; implementations using AH SHALL comply with RFC 4835 Section 3.2.
section: "8"
topics:
    - security
    - ipsec
    - vpn
    - realtime
