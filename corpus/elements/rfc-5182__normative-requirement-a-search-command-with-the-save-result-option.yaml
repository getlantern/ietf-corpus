document: rfc-5182
kind: normative-requirement
summary: A SEARCH command with the SAVE result option that returns a NO tagged response MUST set the search result variable to the empty sequence. A SEARCH that returns BAD, or a successful SEARCH without SAVE, MUST NOT change the search result variable.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - email
