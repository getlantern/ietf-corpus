document: rfc-7662
kind: registry
summary: 'This specification establishes the ''OAuth Token Introspection Response'' registry, using Specification Required policy with a two-week review period on oauth-ext-review@ietf.org. Initial entries include: active, username, client_id, scope, token_type, exp, iat, nbf, sub, aud, iss, and jti.'
