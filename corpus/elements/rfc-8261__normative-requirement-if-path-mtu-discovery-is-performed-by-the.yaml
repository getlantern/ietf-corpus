document: rfc-8261
kind: normative-requirement
summary: If path MTU discovery is performed by the SCTP layer over IPv4 and the DF bit cannot be controlled, a safe path MTU value MUST be used. It is RECOMMENDED that this safe value not exceed 1200 bytes, noting that RFC 1122 only requires hosts to reassemble fragments up to 576 bytes.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - sctp
    - tls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
