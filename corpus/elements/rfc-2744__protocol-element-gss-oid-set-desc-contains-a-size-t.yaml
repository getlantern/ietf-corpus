document: rfc-2744
kind: protocol-element
summary: gss_OID_set_desc contains a size_t count of OIDs and a gss_OID elements pointer to an array of gss_OID_desc objects. All OID sets returned by GSS-API are dynamically allocated (set descriptor, elements array, and each member OID) and must be fully released by the application with gss_release_oid_set().
section: "3.4"
topics:
    - security
