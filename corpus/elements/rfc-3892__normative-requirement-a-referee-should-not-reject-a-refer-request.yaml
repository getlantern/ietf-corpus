document: rfc-3892
kind: normative-requirement
summary: A referee SHOULD NOT reject a REFER request that contains a Referred-By token encrypted to a key it does not possess simply because it cannot decrypt the token, as per RFC 3893 the referee should still be able to verify the signature.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
