document: rfc-9665
kind: design-rationale
summary: KEY records use a much longer lease (typically 14 days) than service records (typically 2 hours) so that a temporarily offline device retains its name claim while not continuing to advertise unavailable services. This prevents name squatting during brief outages.
section: 3.2.5.3
topics:
    - dns
    - zeroconf
