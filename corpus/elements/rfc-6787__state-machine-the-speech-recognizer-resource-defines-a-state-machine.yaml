document: rfc-6787
kind: state-machine
summary: The Speech Recognizer resource defines a state machine (Section 9.1) driven by RECOGNIZE, STOP, START-INPUT-TIMERS, and enrollment methods, with states reflecting idle, recognizing (IN-PROGRESS), and completion via RECOGNITION-COMPLETE event. Hotword mode allows continuous recognition against a small command grammar.
