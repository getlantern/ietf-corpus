document: rfc-8928
kind: normative-requirement
summary: 'Public keys in the CIPO MUST be validated: for Ed25519, verify the point is not in the small subgroup; for ECDSA (ECDSA256 and ECDSA25519), verify the point has the same order as the base point (full public key validation).'
section: "7.8"
rfc2119_level: MUST
