document: rfc-6977
kind: security-consideration
summary: Relay agents SHOULD implement appropriate means to prevent using Reconfigure-Request messages as a denial-of-service attack on the DHCPv6 servers. DHCPv6 servers MAY be configured to reject relayed Reconfigure-Request messages or restrict relay chaining.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
