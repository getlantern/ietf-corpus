document: rfc-8518
kind: normative-requirement
summary: If an alternate neighbor N is also one of the prefix originators of prefix P, N MUST be chosen as a valid LFA for prefix P without evaluating the inequalities, as long as a downstream-paths-only LFA is not desired, since N is guaranteed not to loop back packets to S.
section: "3"
rfc2119_level: MUST
topics:
