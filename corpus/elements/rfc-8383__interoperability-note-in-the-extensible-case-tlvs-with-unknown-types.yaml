document: rfc-8383
kind: interoperability-note
summary: In the extensible case, TLVs with unknown types are ignored by the receiving RBridge, and multiple TLV instances of the same type are permitted in the same message with no required ordering. This allows forward-compatible extension of the Address Flush protocol.
section: "2.2"
topics:
    - routing
