document: rfc-8857
kind: interoperability-note
summary: The server MUST assign the SDP 'setup' attribute with a value of 'passive' when acting as SDP offerer in response to an offerless INVITE. The 'proto' field MUST be 'TCP/WSS/BFCP' if WebSocket is over TLS, else 'TCP/WS/BFCP'.
section: "7.1"
topics:
    - websocket
    - realtime
    - sip
