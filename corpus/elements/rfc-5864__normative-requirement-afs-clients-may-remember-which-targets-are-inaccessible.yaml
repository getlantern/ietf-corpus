document: rfc-5864
kind: normative-requirement
summary: AFS clients MAY remember which targets are inaccessible and ignore those targets when determining which server to contact first. Clients that do this SHOULD have a mechanism to retry previously inaccessible targets and reconsider them according to their current priority and weight if they become accessible again.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
