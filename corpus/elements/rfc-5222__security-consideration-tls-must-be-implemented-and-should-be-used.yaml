document: rfc-5222
kind: security-consideration
summary: TLS MUST be implemented and SHOULD be used for both client-to-server and server-to-server LoST queries. Server-to-server TLS is specifically recommended to prevent cache poisoning attacks in which an attacker replaces answers given to caching LoST servers.
section: "18"
topics:
    - security
    - tls
    - realtime
