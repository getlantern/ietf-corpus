document: rfc-6076
kind: protocol-element
summary: 'Registration Request Delay (RRD) measures the time interval from when the first bit of the initial REGISTER message is sent by the originating UA until the last bit of the 200 OK is received. Formula: RRD = Time of Final Response - Time of REGISTER Request. Output SHOULD be in milliseconds.'
section: "4.1"
topics:
    - realtime
    - voip
    - measurement
