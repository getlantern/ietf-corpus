document: rfc-3270
kind: wire-format
summary: The RSVP DIFFSERV object for an L-LSP (class=65, C_Type=2) is a single 32-bit word with 16 reserved bits and a 16-bit PSC (PHB Scheduling Class) field encoded as per RFC 3140. It signals the single PSC to be supported by the L-LSP.
