document: rfc-2893
kind: protocol-element
summary: In configured tunneling, the tunnel endpoint IPv4 address is stored as explicit configuration on the encapsulating node. Tunnels may be unidirectional or bidirectional; bidirectional configured tunnels behave as virtual point-to-point links. Packet selection is typically done via routing table prefix matching.
