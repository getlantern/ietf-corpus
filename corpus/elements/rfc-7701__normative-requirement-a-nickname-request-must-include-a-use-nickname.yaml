document: rfc-7701
kind: normative-requirement
summary: A NICKNAME request MUST include a Use-Nickname header containing a nickname string that is 1–1023 octets in length. NICKNAME requests MUST NOT include Success-Report or Failure-Report header fields.
section: "7.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
