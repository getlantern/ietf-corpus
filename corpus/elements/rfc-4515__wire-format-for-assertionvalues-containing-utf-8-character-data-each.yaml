document: rfc-4515
kind: wire-format
summary: For AssertionValues containing UTF-8 character data, each octet of a character to be escaped is replaced by a backslash and two hex digits representing that single octet. For example, the UTF-8 encoding of 'Lučić' (U+004C U+0075 U+010D U+0069 U+0107) is represented as 'Lu\c4\8di\c4\87'.
