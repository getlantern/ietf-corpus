document: rfc-3554
kind: normative-requirement
summary: All addresses presented in Phase 2 selectors MUST be validated. Sufficient evidence must be presented to the Responder that the Initiator is authorized to receive traffic for every address in the Phase 2 selectors, derived from Phase 1 certificates or out-of-band means.
section: "3"
rfc2119_level: MUST
topics:
    - sctp
    - ipsec
    - security
    - crypto
