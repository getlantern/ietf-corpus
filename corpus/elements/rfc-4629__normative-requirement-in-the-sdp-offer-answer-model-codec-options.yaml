document: rfc-4629
kind: normative-requirement
summary: In the SDP Offer/Answer model, codec options (F, I, J, K, N, P, T) MUST NOT appear unless the sender of the SDP parameters is able to decode those options — they designate receiver capabilities even in a 'sendonly' offer.
section: 8.2.1
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - sip
