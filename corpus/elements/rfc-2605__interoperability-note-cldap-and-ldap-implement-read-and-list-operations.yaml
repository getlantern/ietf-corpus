document: rfc-2605
kind: interoperability-note
summary: CLDAP and LDAP implement Read and List operations indirectly via Search; dsApplIfReadOps and dsApplIfListOps are inaccessible for LDAP and CLDAP interfaces. CLDAP additionally does not implement Compare, Add, Remove, Modify, or ModifyRDN, making those counters inaccessible.
