document: rfc-9767
kind: design-rationale
summary: Token chaining (Section 4) is designed so the RS uses the standard GNAP grant endpoint rather than a bespoke chaining API. Because the RS acts as its own client instance, the same request and response structure applies, limiting the scope of new protocol surface area.
section: "4"
topics:
