document: rfc-8628
kind: security-consideration
summary: Device codes are not displayed to users and have no usability length constraints, so a very high entropy code SHOULD be used to prevent an attacker who guesses the device code from obtaining the authorization code.
section: "5.2"
rfc2119_level: SHOULD
topics:
