document: rfc-4184
kind: interoperability-note
summary: The channel order used in AC-3 differs from the channel order scheme defined in RFC 3551. Implementers must use the AC-3 channel order scheme found in Table 5.8 of the ATSC standard rather than the RFC 3551 scheme.
