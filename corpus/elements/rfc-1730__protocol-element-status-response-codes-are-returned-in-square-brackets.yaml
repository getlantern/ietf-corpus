document: rfc-1730
kind: protocol-element
summary: 'Status response codes are returned in square brackets within OK/NO/BAD responses: ALERT (user-visible alert required), PERMANENTFLAGS, READ-ONLY, READ-WRITE, TRYCREATE, UIDVALIDITY, and UNSEEN. Server-specific codes SHOULD use an ''X'' prefix; clients MUST ignore unrecognized codes.'
section: "7.1"
