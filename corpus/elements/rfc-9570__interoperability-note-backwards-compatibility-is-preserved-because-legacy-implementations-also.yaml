document: rfc-9570
kind: interoperability-note
summary: Backwards compatibility is preserved because legacy implementations also use the loopback destination address and TTL=1 mechanisms. Ignoring the RAO on receipt (as now specified) does not harm interoperability since those other mechanisms remain in place.
