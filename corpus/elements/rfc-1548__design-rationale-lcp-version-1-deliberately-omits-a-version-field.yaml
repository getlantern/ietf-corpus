document: rfc-1548
kind: design-rationale
summary: LCP Version 1 deliberately omits a version field from its packet format. If a new LCP version is needed, a new PPP Protocol field value will differentiate it from Version 1. A correctly functioning Version 1 implementation will respond to unknown Protocols with a recognizable Version 1 packet, providing a deterministic fallback.
section: "5"
