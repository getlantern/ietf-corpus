document: rfc-5259
kind: security-consideration
summary: Clients SHOULD use mutual SASL authentication and the SASL/TLS integrity layer to ensure they communicate with a trusted server. Deployments using a separate transcoding server should keep it in the same trusted domain (e.g., subnet) as the IMAP server.
