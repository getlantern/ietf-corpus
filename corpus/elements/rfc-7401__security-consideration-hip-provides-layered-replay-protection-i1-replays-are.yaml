document: rfc-7401
kind: security-consideration
summary: 'HIP provides layered replay protection: I1 replays are absorbed by stateless R1 generation; R1 replays are countered by the monotonic R1 generation counter; I2 replays are defeated by the puzzle tied to the Initiator''s HIT; R2 and UPDATE replays are detected by HMAC verification before the more expensive signature check.'
section: 4.1.4
topics:
