document: rfc-2491
kind: normative-requirement
summary: Routers SHALL keep track of NHRP cache entries for which they issued Neighbor Advertisements or Redirects; upon receiving a NHRP Purge invalidating previously issued information, the router SHALL issue a Redirect identifying itself as the new best next-hop. Routers SHALL also track Neighbor cache entries used to generate NHRP Replies, and expiry of such entries SHALL trigger a NHRP Purge.
section: 3.2.3.2
rfc2119_level: SHALL
topics:
    - ip
    - v6ops
