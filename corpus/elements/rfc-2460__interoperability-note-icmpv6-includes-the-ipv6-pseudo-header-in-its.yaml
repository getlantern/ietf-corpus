document: rfc-2460
kind: interoperability-note
summary: ICMPv6 includes the IPv6 pseudo-header in its checksum computation, unlike IPv4 ICMP which does not. This change protects ICMPv6 from misdelivery or corruption of IPv6 header fields that are not covered by an internet-layer checksum.
section: "8.1"
topics:
    - ip
