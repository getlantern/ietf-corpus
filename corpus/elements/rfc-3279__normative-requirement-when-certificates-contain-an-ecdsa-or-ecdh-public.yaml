document: rfc-3279
kind: normative-requirement
summary: When certificates contain an ECDSA or ECDH public key, the id-ecPublicKey algorithm identifier MUST be used. Implementations MUST support the uncompressed form of EC points and MAY support the compressed form.
section: 2.3.5
rfc2119_level: MUST
