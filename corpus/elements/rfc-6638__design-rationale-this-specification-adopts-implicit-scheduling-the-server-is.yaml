document: rfc-6638
kind: design-rationale
summary: 'This specification adopts ''implicit scheduling'': the server is responsible for sending and processing all scheduling messages on behalf of clients. A client simply creates, modifies, or deletes a calendar component and the server derives and dispatches the appropriate iTIP operations (REQUEST, REPLY, CANCEL, ADD), removing the need for client-driven iTIP.'
section: "1"
topics:
