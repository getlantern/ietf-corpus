document: rfc-8791
kind: wire-format
summary: 'A YANG data structure is encoded in the same way as an ''anydata'' node: the structure name is encoded as a ''container'', with instantiated children encoded as child nodes. For example, a structure named ''my-error'' encodes in JSON as ''example-errors:my-error'': { ... }.'
