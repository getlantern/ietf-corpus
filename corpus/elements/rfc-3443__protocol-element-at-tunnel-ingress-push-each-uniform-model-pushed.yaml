document: rfc-3443
kind: protocol-element
summary: At tunnel ingress (Push), each Uniform Model pushed label copies its TTL from the label or IP packet immediately underneath it. Each Pipe Model or Short Pipe Model pushed label has its TTL set to a network-operator-configured value, defaulting to 255 in most implementations.
