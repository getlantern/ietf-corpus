document: rfc-5546
kind: normative-requirement
summary: For VFREEBUSY REQUEST, the sender MUST include ORGANIZER, DTSTART, DTEND, and DTSTAMP, but MUST NOT include ATTENDEE properties in the request body itself (ATTENDEE appears as the target in the outer wrapper). VFREEBUSY REPLY MUST include FREEBUSY properties reflecting the Attendee's busy periods.
section: 3.3.2, 3.3.3
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
