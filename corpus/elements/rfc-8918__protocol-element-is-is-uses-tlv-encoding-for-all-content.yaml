document: rfc-8918
kind: protocol-element
summary: IS-IS uses TLV encoding for all content in PDU bodies, and new extensions are supported by defining new TLVs. Implementations must ignore TLVs they do not understand, and this applies equally to sub-TLVs contained within TLVs.
section: "1"
topics:
    - routing
