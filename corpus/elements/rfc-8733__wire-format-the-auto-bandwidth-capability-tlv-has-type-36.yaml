document: rfc-8733
kind: wire-format
summary: The AUTO-BANDWIDTH-CAPABILITY TLV has Type=36, fixed Length=4 octets, and a single 32-bit Flag field. No flags are currently defined; unassigned bits MUST be set to 0 on transmission and MUST be ignored on receipt.
section: 5.1.1
rfc2119_level: MUST
