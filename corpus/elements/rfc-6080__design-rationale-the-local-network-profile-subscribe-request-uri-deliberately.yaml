document: rfc-6080
kind: design-rationale
summary: The local-network profile SUBSCRIBE Request-URI deliberately omits the user part to make it distinct from device profile URIs when both share the same domain, enabling routing to the appropriate PDS in domains that have separate servers per profile type.
