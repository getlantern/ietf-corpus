document: rfc-7784
kind: protocol-element
summary: trillOamFaultAlarm is a NOTIFICATION-TYPE sent to the management entity whenever a MEP loses or restores contact with a peer flow MEP. The notification carries trillOamMepDbFlowState and includes indices to identify the specific MEP and flow reporting the defect.
section: 5.3.1
topics:
