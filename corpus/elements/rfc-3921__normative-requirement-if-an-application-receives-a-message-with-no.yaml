document: rfc-3921
kind: normative-requirement
summary: If an application receives a message with no 'type' attribute or an unrecognized 'type' value, it MUST treat the message as type 'normal'. The 'error' type MUST be generated only in response to an error related to a message received from another entity.
section: 2.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
