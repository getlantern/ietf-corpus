document: rfc-2421
kind: normative-requirement
summary: When binary transport is not available, implementations MUST encode audio and/or facsimile data as Base64. Detection and decoding of Quoted-Printable, 7bit, and 8bit encodings MUST also be supported to meet MIME requirements.
section: "4.3"
rfc2119_level: MUST
