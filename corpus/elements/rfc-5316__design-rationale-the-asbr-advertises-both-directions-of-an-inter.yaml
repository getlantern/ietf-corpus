document: rfc-5316
kind: design-rationale
summary: The ASBR advertises both directions of an inter-AS TE link internally within its AS, acting as a proxy for the remote ASBR. This is necessary because CSPF requires bidirectional TE link information for path computation, but no IGP peering exists on inter-AS links.
section: "4"
topics:
