document: rfc-9303
kind: normative-requirement
summary: The ITR MUST verify the integrity of both the EID-AD and PKT-AD and MUST discard the Map-Reply if either integrity check fails. Each EID-Record is valid only if its EID-Prefix intersects with at least one EID-Prefix in the EID-AD; overclaiming records MUST be discarded.
section: "6.9"
rfc2119_level: MUST
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
