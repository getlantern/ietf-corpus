document: rfc-6827
kind: normative-requirement
summary: The Local and Remote TE Router ID sub-TLV MUST be included in a Link TLV when an OSPF router advertises ASON information on behalf of transport nodes with TE Router IDs different from the Router Address TLV value. If omitted or set to 0, the Link TLV is excluded from transport-plane path computation and the condition SHOULD be logged.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
