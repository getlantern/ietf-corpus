document: rfc-5255
kind: interoperability-note
summary: Several server implementations deployed before this specification comply with I18NLEVEL=1 but do not advertise it; others use i;ascii-casemap. There is no reliable way for a client to determine which comparator a legacy server uses, potentially forcing expensive local operations.
section: "4.5"
topics:
