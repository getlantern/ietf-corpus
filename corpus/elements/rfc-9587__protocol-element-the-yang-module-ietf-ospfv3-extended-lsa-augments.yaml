document: rfc-9587
kind: protocol-element
summary: The YANG module 'ietf-ospfv3-extended-lsa' augments RFC 9129 (IETF OSPF YANG model) to add configuration and operational state for OSPFv3 Extended LSAs as defined in RFC 8362. It provides global and area-level configuration, plus LSDB operational state for link-scope, area-scope, and AS-scope Extended LSAs.
