document: rfc-8860
kind: interoperability-note
summary: Implementing a gateway that interconnects endpoints using separate RTP sessions per media type with endpoints using a single multi-media-type session is generally not feasible, due to SSRC collision risks and the difficulty of remapping SSRCs across all possible RTCP packet types.
section: "4"
topics:
