document: rfc-8968
kind: interoperability-note
summary: When Babel over DTLS and unprotected Babel coexist on the same network, DTLS nodes will attempt connections to unprotected nodes that will not respond. Babel over DTLS implementations SHOULD rate-limit their DTLS connection attempts to avoid causing undue load.
section: "2.7"
topics:
    - routing
    - security
