document: rfc-7552
kind: normative-requirement
summary: An LSR MUST NOT advertise (via an Address message) any IPv4-mapped IPv6 addresses and MUST ignore such addresses if received. An LSR MUST NOT allocate or advertise FEC-label bindings for link-local or IPv4-mapped IPv6 addresses, and MUST ignore such bindings if received.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - ip
    - v6ops
