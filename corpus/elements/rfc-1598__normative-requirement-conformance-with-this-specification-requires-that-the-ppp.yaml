document: rfc-1598
kind: normative-requirement
summary: Conformance with this specification requires that the PPP NLPID (0xCF) be supported. Conformance with RFC 1356 additionally requires support for the IP NLPID (0xCC); other NLPID values such as Zero (0x00), SNAP (0x80), CLNP (0x81), or ES-IS (0x82) are not required.
section: "4"
rfc2119_level: REQUIRED
