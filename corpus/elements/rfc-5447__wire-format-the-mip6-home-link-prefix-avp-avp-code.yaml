document: rfc-5447
kind: wire-format
summary: The MIP6-Home-Link-Prefix AVP (AVP Code 125) is of type OctetString encoding the home network prefix as one octet of prefix length followed by 16 octets (128 bits) for the prefix value in network byte order. Trailing bits after the prefix length MUST be set to zero.
section: 4.2.4
rfc2119_level: MUST
topics:
