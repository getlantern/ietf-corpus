document: rfc-9492
kind: wire-format
summary: 'The ASLA sub-TLV format includes: 2-octet Type, 2-octet Length, 1-octet SABM Length (must be 0, 4, or 8), 1-octet UDABM Length (must be 0, 4, or 8), 2-octet Reserved, variable-length SABM, variable-length UDABM, and Link Attribute sub-TLVs. Type is 10 for OSPFv2 and 11 for OSPFv3.'
