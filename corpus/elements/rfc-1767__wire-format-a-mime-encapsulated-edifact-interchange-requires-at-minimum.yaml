document: rfc-1767
kind: wire-format
summary: 'A MIME-encapsulated EDIFACT interchange requires at minimum: MIME-Version header (1.0), Content-Type header (Application/EDIFACT), and Content-Transfer-Encoding header (e.g., QUOTED-PRINTABLE), followed by the standard EDIFACT interchange body.'
