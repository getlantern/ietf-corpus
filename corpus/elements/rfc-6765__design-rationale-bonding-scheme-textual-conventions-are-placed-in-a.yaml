document: rfc-6765
kind: design-rationale
summary: Bonding scheme textual conventions are placed in a separate IANA-maintained MIB module (IANA-GBOND-TC-MIB) rather than the GBOND-MIB itself. This allows new bonding schemes from future G.998 revisions to be added by IANA without issuing a new RFC to update the common GBOND-MIB module.
section: "4.4"
topics:
