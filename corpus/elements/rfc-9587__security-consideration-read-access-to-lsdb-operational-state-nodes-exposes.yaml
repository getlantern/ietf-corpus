document: rfc-9587
kind: security-consideration
summary: Read access to LSDB operational state nodes exposes detailed network topology, including information from other routers. This may facilitate attacks or expose sensitive topology data that operators consider confidential. NACM (RFC 8341) should be used to restrict access.
