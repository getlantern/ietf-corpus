document: rfc-9147
kind: protocol-element
summary: 'Record sequence numbers in DTLSCiphertext are encrypted using a mask derived from ciphertext bytes: AES-ECB(sn_key, Ciphertext[0..15]) for AES-based AEADs, or ChaCha20(sn_key, Ciphertext[0..3], Ciphertext[4..15]) for ChaCha20. The per-epoch sn_key is derived via HKDF-Expand-Label(Secret, "sn", "", key_length).'
section: 4.2.3
topics:
