document: rfc-6603
kind: normative-requirement
summary: Any prefix excluded from a delegated prefix MUST be contained in an OPTION_PD_EXCLUDE option within the corresponding OPTION_IAPREFIX, and the excluded prefix MUST be a sub-prefix of the delegated prefix carried in that OPTION_IAPREFIX.
