document: rfc-9370
kind: normative-requirement
summary: If the initiator receives a response with one or more duplicated algorithm choices in the ADDKE Transform Types, it MUST treat the exchange as failed and MUST NOT initiate any IKE_INTERMEDIATE (or IKE_FOLLOWUP_KE) exchanges.
section: 2.2.1
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
