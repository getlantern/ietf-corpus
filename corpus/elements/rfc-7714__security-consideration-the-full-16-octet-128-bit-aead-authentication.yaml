document: rfc-7714
kind: security-consideration
summary: The full 16-octet (128-bit) AEAD authentication tag is required to effectively eliminate the risk of an adversary successfully introducing fraudulent data. The risks associated with using truncated AES-GCM tags are deemed too high; truncated authentication tags are not permitted in SRTP/SRTCP.
section: "13.2"
topics:
