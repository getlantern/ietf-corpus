document: rfc-946
kind: wire-format
summary: 'The TTYLOC number is a 64-bit value composed of two 32-bit fields: the first 32 bits are the official ARPA Internet host address, and the second 32 bits are the terminal line number on that host. Bytes are ordered most-significant to least-significant (big-endian).'
