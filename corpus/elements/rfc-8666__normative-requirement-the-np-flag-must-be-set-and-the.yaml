document: rfc-8666
kind: normative-requirement
summary: The NP-Flag MUST be set and the E-Flag MUST be clear for Prefix-SIDs allocated to prefixes propagated between areas by an ABR, or to redistributed prefixes, unless the prefix is directly attached to the ABR or ASBR respectively.
section: "6"
rfc2119_level: MUST
