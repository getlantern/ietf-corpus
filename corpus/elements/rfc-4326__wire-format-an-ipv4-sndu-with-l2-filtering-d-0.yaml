document: rfc-4326
kind: wire-format
summary: An IPv4 SNDU with L2 filtering (D=0) carries a 16-bit Length (0|length), Type=0x0800, a 6-byte NPA destination address, the IPv4 datagram, and a 32-bit CRC-32. Without L2 filtering (D=1), the NPA address field is omitted.
section: 4.7.2
