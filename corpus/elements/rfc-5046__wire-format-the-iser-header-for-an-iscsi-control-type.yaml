document: rfc-5046
kind: wire-format
summary: The iSER Header for an iSCSI Control-Type PDU (Section 9.2, Figure 3) includes the iSER opcode for control PDUs, a read STag and write STag advertising the initiator's I/O buffers for SCSI read and write data respectively, and is followed immediately by the iSCSI PDU BHS.
