document: rfc-6929
kind: wire-format
summary: 'The TLV data type reuses the RADIUS attribute format as sub-attributes: TLV-Type (1 octet), TLV-Length (1 octet, 3–255), TLV-Value (1+ octets). TLV-Type 26 has no special meaning and MUST NOT be treated as a Vendor-Specific Attribute.'
section: "2.3"
topics:
    - radius
    - security
