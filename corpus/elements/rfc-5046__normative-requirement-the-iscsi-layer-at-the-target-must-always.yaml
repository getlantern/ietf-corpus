document: rfc-5046
kind: normative-requirement
summary: The iSCSI layer at the target MUST always return the SCSI status in a separate SCSI Response PDU for read commands; there MUST NOT be a phase collapse when concluding a SCSI read command in iSER-assisted mode.
section: "3.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
