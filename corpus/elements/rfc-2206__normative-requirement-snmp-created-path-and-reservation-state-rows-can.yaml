document: rfc-2206
kind: normative-requirement
summary: SNMP-created Path and Reservation state rows can only be deleted by writing 'destroy' to the associated RowStatus object via SNMP; receiving an RSVP teardown message will not remove them. Destruction initiates a teardown as if the state had timed out.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - snmp
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
