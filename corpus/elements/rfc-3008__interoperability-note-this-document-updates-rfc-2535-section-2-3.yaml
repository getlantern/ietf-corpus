document: rfc-3008
kind: interoperability-note
summary: This document updates RFC 2535 section 2.3.6 by restricting material DNSSEC signatures to zone keys only. Resolvers implementing RFC 2535 that accept host or user key signatures would be inconsistent with this revised model.
section: "1"
topics:
    - dns
    - security
