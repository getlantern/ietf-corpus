document: rfc-2078
kind: interoperability-note
summary: Appendix B documents compatibility between GSS-V2 (RFC 2078) and GSS-V1 (RFC 1508). GSS-V1 callers need not know about prot_ready_state and receive expected behavior via GSS_S_COMPLETE; however, GSS-V2 implementations may support GSS-V1 mechanism code that never returns TRUE prot_ready_state.
section: Appendix B
