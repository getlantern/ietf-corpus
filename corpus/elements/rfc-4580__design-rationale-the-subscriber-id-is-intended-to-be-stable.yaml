document: rfc-4580
kind: design-rationale
summary: The subscriber-id is intended to be stable as customers connect through different paths and as network changes occur, decoupling subscriber identity from physical network topology. This allows service providers to assign subscriber-specific actions (addresses, prefixes, DNS, accounting) without reconfiguration when a subscriber moves between access points.
section: "2"
topics:
