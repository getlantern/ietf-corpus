document: rfc-9465
kind: normative-requirement
summary: Before sending PIM Packed Null-Register or Packed Register-Stop messages, the DR and RP respectively MAY perform Path MTU Discovery and SHOULD limit the number of records per message to fit within the Path MTU to avoid fragmentation.
section: "7"
rfc2119_level: SHOULD
topics:
