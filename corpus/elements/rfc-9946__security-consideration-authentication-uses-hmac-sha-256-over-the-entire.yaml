document: rfc-9946
kind: security-consideration
summary: Authentication uses HMAC-SHA-256 over the entire PDU with authDigest and checkSum fields preset to zero before hashing. Replay protection is provided by a 32-bit authUnixTime with a ±5-second tolerance window. Encryption is deliberately omitted because only synthetic payload data is carried.
