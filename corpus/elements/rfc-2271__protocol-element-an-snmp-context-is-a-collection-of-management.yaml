document: rfc-2271
kind: protocol-element
summary: 'An SNMP context is a collection of management information accessible by an SNMP entity. To identify a specific managed object instance within a management domain, four pieces of information are required: contextEngineID, contextName, object type, and instance. The same item of management information may exist in multiple contexts.'
section: 3.3.1
topics:
