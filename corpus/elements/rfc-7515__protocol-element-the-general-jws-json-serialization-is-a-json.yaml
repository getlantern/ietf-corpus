document: rfc-7515
kind: protocol-element
summary: The General JWS JSON Serialization is a JSON object with a 'payload' member (BASE64URL(JWS Payload)) and a 'signatures' array. Each element of the array contains 'protected' (BASE64URL(UTF8(JWS Protected Header))), 'header' (JWS Unprotected Header), and 'signature' (BASE64URL(JWS Signature)) members. This format supports multiple signatures or MACs over the same payload.
section: 7.2.1
topics:
