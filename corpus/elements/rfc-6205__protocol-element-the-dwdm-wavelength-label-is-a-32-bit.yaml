summary: 'The DWDM wavelength label is a 32-bit field with four subfields: Grid (3 bits), Channel Spacing C.S. (4 bits), Identifier (9 bits), and n (16 bits, two''s-complement integer). The frequency is computed as: Frequency (THz) = 193.1 THz + n * channel spacing (THz).'
