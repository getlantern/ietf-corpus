kind: protocol-element
summary: The ietf-babel YANG module augments /rt:routing/rt:control-plane-protocols/rt:control-plane-protocol with a 'babel' presence container. The top-level container holds version (read-only string), enable (mandatory boolean), router-id (read-only 8-octet binary), seqno (read-only uint16), and statistics-enabled (boolean).
