document: rfc-6724
kind: normative-requirement
summary: Any rows automatically added by an implementation as a result of address acquisition MUST NOT override a row for the same prefix configured via other means; rows can be added automatically but never updated automatically.
section: "2.1"
rfc2119_level: MUST NOT
