document: rfc-2672
kind: normative-requirement
summary: If a DNAME RR is present at a node N, there MUST be no data at any descendant of N (of the same class). Other data may exist at N itself, except a CNAME or another DNAME.
section: "3"
rfc2119_level: MUST
topics:
    - dns
