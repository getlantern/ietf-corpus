document: rfc-8966
kind: registry
summary: 'RFC 8966 defines IANA registries for Babel: TLV Types (values 0–255, with 0=Pad1, 1=PadN, 2=AckRequest, 3=Ack, 4=Hello, 5=IHU, 6=Router-Id, 7=Next Hop, 8=Update, 9=Route Request, 10=Seqno Request, 11=TS/PC), Sub-TLV Types per enclosing TLV kind, and Address Encodings (AE 0–3). The well-known Babel UDP port is 6696.'
section: "5"
