document: rfc-2225
kind: normative-requirement
summary: The ATMARP client MUST refresh its ATMARP information with the server at least once every 15 minutes by re-establishing an LLC/SNAP VC and transmitting an ATMARP_Request for its own IP address.
section: "8.5"
rfc2119_level: MUST
