document: rfc-3124
kind: interoperability-note
summary: When a group of receivers are behind a NAT device, the sender sees them all as one address and may aggregate them into a single macroflow. If those hosts are on different bottleneck links, some could experience worse performance than without the CM. Detection via delay and loss estimates is possible but out of scope.
section: "3.5"
topics:
    - congestion
    - nat
