document: rfc-959
kind: normative-requirement
summary: Every FTP command MUST generate at least one reply. The server-FTP process may send at most one 1yz (positive preliminary) reply per command. A user-process sending another command before receiving a completion reply violates the protocol.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
