document: rfc-9200
kind: protocol-element
summary: 'The introspection endpoint at the AS accepts POST requests from RS or client, returning token metadata: active status, scope, ace_profile (integer), cnonce (byte string), cti (token ID, byte string, CBOR key 7), exi (extended expiry, CBOR key 40), and PoP key material via cnf. Default path SHOULD be ''/introspect''.'
section: "5.9"
