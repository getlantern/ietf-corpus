document: rfc-4252
kind: protocol-element
summary: Authentication protocol message numbers occupy the range 50–79. Message numbers 80 and higher are reserved for protocols running after authentication; receiving one before authentication is complete is an error requiring disconnection. Method-specific messages occupy the range 60–79.
section: "6"
topics:
