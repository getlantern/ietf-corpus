document: rfc-2381
kind: interoperability-note
summary: The UNI 3.x PCR CLP=0-only parameter is not recommended for interoperability reasons with TM/UNI 4.0 equipment. TM/UNI 4.0 does not support tagging for traffic in excess of PCR, which restricts CBR VCs to solutions other than tagging for handling excess traffic.
section: "3.2"
topics:
