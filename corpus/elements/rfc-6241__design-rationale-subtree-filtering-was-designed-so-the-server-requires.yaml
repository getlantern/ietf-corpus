document: rfc-6241
kind: design-rationale
summary: Subtree filtering was designed so the server requires no data-model-specific semantic knowledge during filter processing, enabling simple, centralized implementation. The filter mechanism provides inclusion, exact-match, and selection without requiring content-layer awareness.
