document: rfc-9838
kind: normative-requirement
summary: A GM intending to act as a group sender MUST include a GROUP_SENDER Notify payload in its GSA_AUTH or GSA_REGISTRATION request. This signals sender intent and enables the GM to request Sender-ID values when the group policy includes a counter-mode cipher.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
