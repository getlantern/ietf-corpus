document: rfc-8851
kind: design-rationale
summary: The 'a=rid' framework was created because the 7-bit RTP PT field is too small to enumerate all payload configurations needed by simulcast and layered codecs, and because existing mechanisms (fmtp, imageattr) are codec-specific. RID provides a codec-agnostic, complementary extension that further restricts—but never replaces—existing format parameter mechanisms.
