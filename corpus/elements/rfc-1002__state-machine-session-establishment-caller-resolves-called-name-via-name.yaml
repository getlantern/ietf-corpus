document: rfc-1002
kind: state-machine
summary: 'Session establishment: caller resolves called name via Name Service, opens TCP connection to resolved address, sends SESSION REQUEST. Callee responds with POSITIVE SESSION RESPONSE, NEGATIVE SESSION RESPONSE (with error code), or RETARGET SESSION RESPONSE. On retarget, caller must close TCP and reconnect to specified IP:port.'
section: 5.2.1
topics:
    - tcp
