document: rfc-7438
kind: interoperability-note
summary: An Egress LSR supporting RFC 6826/7246 but not this document will never generate Opaque values containing wildcards. An Ingress LSR supporting only RFC 6826/7246 has no choice but to treat received FEC elements with all-zero source or group subfields as invalid, because the prior procedures do not function with all-zero values in those subfields.
section: "3.3"
topics:
    - mpls
    - multicast
