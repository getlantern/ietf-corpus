document: rfc-1382
kind: state-machine
summary: 'x25CircuitStatus defines ten circuit states: invalid(1), closed/p1(2), calling/p2-p3-p5(3), open/p4(4), clearing/p6-p7(5), pvc(6), pvcResetting(7), startClear(8), startPvcResetting(9), other(10). Setting startClear on a calling or open circuit initiates clearing; setting startPvcResetting or invalid on a PVC resets or deletes it respectively.'
