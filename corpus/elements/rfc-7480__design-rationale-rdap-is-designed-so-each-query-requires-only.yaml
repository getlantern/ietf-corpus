document: rfc-7480
kind: design-rationale
summary: 'RDAP is designed so each query requires only one path of execution: a response is either an answer, a ''no data'' reply, or a single redirect. Clients are not expected to fork multiple execution paths. This keeps client implementation simple enough to use common scripting tools like bash and wget.'
section: "3"
topics:
