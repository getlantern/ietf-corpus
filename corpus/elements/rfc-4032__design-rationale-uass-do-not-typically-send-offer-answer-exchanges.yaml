document: rfc-4032
kind: design-rationale
summary: 'UASs do not typically send offer/answer exchanges to inform the UAC that all preconditions are met; instead, they simply send a 180 Ringing response. This asymmetry is by design: resuming session establishment does not require a separate signaling round-trip.'
