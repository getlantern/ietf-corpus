document: rfc-9784
kind: protocol-element
summary: 'DF election for vES follows RFC 7432 Section 8.5 service carving with ESI replaced by vESI: PEs advertise ES routes, wait 3 seconds for convergence, build an ordered list of PE IP addresses from the Originator Router''s IP address field, and assign DF for EVPN instance with Ethernet Tag V using the rule (V mod N) = i, where N is the redundancy group size and i is the PE''s ordinal.'
section: "4.1"
topics:
