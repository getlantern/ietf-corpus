document: rfc-6766
kind: normative-requirement
summary: Service up/down notifications (g9983SvcUp, g9983SvcDown) SHOULD be rate-limited with an implementation-specific gap between consecutive notifications of the same event to prevent notification flooding. Rate-limited notifications are dropped, not queued.
section: 5.3.2
rfc2119_level: SHOULD
topics:
    - snmp
