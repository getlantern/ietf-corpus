document: rfc-3629
kind: normative-requirement
summary: A protocol SHOULD NOT forbid use of U+FEFF as a signature for protocol elements where no encoding-identification mechanism exists, where a ban would be unenforceable, or where implementations cannot be expected to always use such mechanisms properly—as is often the case with large MIME entities obtained from file systems or FTP.
section: "6"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
