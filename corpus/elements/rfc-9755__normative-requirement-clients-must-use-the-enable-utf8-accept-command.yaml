document: rfc-9755
kind: normative-requirement
summary: Clients MUST use the 'ENABLE UTF8=ACCEPT' command (never 'ENABLE UTF8=ONLY') before using a UTF8=ONLY server. A server advertising UTF8=ONLY will include at most one of UTF8=ACCEPT or UTF8=ONLY in its capability string, never both.
section: "7"
rfc2119_level: MUST
topics:
    - email
