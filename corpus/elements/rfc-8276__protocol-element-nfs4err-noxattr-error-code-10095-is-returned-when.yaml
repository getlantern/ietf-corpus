document: rfc-8276
kind: protocol-element
summary: NFS4ERR_NOXATTR (error code 10095) is returned when the specified xattr does not exist or cannot be retrieved. NFS4ERR_XATTR2BIG (error code 10096) is returned when the xattr value or collective xattr size exceeds the file system's limit.
section: "8.3"
