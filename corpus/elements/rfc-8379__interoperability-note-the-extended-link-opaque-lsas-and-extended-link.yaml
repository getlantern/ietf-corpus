document: rfc-8379
kind: interoperability-note
summary: The Extended Link Opaque LSAs and Extended Link TLV are not scoped for multi-topology (RFC 4915); in multi-topology deployments, the Graceful-Link-Shutdown sub-TLV corresponds to all topologies including the link, and receivers SHOULD change the metric in the reverse direction for all affected topologies.
section: "5.1"
topics:
    - routing
