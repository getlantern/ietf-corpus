document: rfc-5953
kind: security-consideration
summary: Use of TLSTM with SNMPv1 or SNMPv2c messages is strongly discouraged; those message formats lack per-message security and community strings are sent in cleartext, undermining the security provided by the TLS transport layer.
section: "9.3"
topics:
    - snmp
    - tls
    - security
