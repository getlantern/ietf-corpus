document: rfc-8544
kind: normative-requirement
summary: For the <create> command, the EPP <extension> element MUST contain a child <orgext:create> element if the client wants to associate organization data to the object. The <orgext:create> element must contain one or more <orgext:id> elements.
section: 4.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
