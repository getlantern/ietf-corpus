document: rfc-4631
kind: protocol-element
summary: 'lmpLinkVerificationTable configures LMP link verification parameters per TE link: lmpLinkVerifyInterval and lmpLinkVerifyDeadInterval, lmpLinkVerifyTransportMechanism (BITS covering payload, DCC section/line overhead bytes, J0/J1/J2 traces), lmpLinkVerifyTransmissionRate (bytes/sec), lmpLinkVerifyWavelength (nm), and lmpLinkVerifyAllLinks.'
