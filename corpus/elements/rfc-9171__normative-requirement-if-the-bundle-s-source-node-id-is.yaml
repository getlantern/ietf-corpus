document: rfc-9171
kind: normative-requirement
summary: If the bundle's source node ID is the null endpoint ID (anonymous bundle), the 'Bundle must not be fragmented' flag MUST be 1 and all status report request flag values MUST be zero, because the bundle is not uniquely identifiable.
section: 4.2.3
rfc2119_level: MUST
topics:
