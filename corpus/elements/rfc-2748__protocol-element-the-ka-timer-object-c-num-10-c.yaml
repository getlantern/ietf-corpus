document: rfc-2748
kind: protocol-element
summary: The KA Timer Object (C-Num=10, C-Type=1) encodes the maximum interval between COPS messages as an unsigned 16-bit integer in seconds (range 1–65535; 0 implies infinity). The Accounting Timer Object (C-Num=15, C-Type=1) uses the same encoding to set the minimum interval between accounting reports.
section: 2.2.10
