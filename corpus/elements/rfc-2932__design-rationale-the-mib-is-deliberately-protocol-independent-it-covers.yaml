document: rfc-2932
kind: design-rationale
summary: 'The MIB is deliberately protocol-independent: it covers IP Multicast Routing state common across DVMRP, PIM-SM, PIM-DM, MOSPF, and CBT. Protocol-specific managed objects are left to separate MIBs, avoiding a monolithic document that must be revised whenever a new multicast routing protocol is standardized.'
