document: rfc-2710
kind: normative-requirement
summary: The Other Querier Present Interval MUST be ((Robustness Variable) times (Query Interval)) plus (one half of one Query Response Interval). If non-default timer values are used, they MUST be consistent among all routers on a single link.
section: "7.5"
rfc2119_level: MUST
topics:
