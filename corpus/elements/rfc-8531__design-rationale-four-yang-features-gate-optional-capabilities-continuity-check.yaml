document: rfc-8531
kind: design-rationale
summary: 'Four YANG features gate optional capabilities: ''continuity-check'', ''connectivity-verification'', ''traceroute'', and ''mip''. Servers that do not advertise a feature will not support the corresponding RPC or explicit MIP configuration. This allows implementations to limit support to only the applicable subset of OAM functions.'
section: "5"
topics:
    - yang
    - netconf
