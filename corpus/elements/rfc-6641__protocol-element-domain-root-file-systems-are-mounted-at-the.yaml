document: rfc-6641
kind: protocol-element
summary: Domain root file systems are mounted at the conventional POSIX path "/nfs4/" on NFS clients. An organization's published namespace is thus accessible as "/nfs4/{domain}/" on any conforming POSIX client.
section: "4.1"
