document: rfc-9664
kind: normative-requirement
summary: Authoritative DNS servers MUST include an Update Lease option in response to any successful DNS Update (RCODE=0) that includes an Update Lease option. Servers MAY return lease durations different from those requested.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
