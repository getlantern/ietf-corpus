document: rfc-9196
kind: normative-requirement
summary: The system SHALL order the per-node-capabilities entries according to their precedence. The order of the entries MUST NOT change unless the underlying capabilities also change. Longest-path matching is achieved by ordering more specific matches before less specific ones.
section: "4.2"
rfc2119_level: SHALL
topics:
