document: rfc-2342
kind: security-consideration
summary: A server SHOULD NOT list users in response to a LIST command on the Other Users' Namespace prefix if those users have not granted list access to their mailboxes. Doing so could disclose confidential information about who has accounts on the server or provide a starting point for targeted attacks on user accounts.
section: "7"
topics:
    - security
    - privacy
