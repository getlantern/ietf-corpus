document: rfc-1812
kind: normative-requirement
summary: Routers MUST implement source address validation (unicast reverse-path forwarding or equivalent) to prevent forwarding of datagrams with spoofed source addresses when such validation is feasible without disrupting legitimate traffic.
section: 5.3.8
rfc2119_level: MUST
topics:
