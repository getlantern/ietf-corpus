document: rfc-4548
kind: design-rationale
summary: RFC 1888 was declared Historic partly because the ITU-T specification (X.213) that originally assigned AFI '35' to IANA was not freely publicized or incorporated into an RFC, leading to errors in section 6 of RFC 1888. This document corrects those errors and formally documents the ITU-T assignment rationale.
