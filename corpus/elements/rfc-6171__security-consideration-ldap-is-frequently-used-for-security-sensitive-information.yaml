document: rfc-6171
kind: security-consideration
summary: LDAP is frequently used for security-sensitive information including access control and security policy. Failure to use the Don't Use Copy control when authoritative data is required may permit unauthorized access by allowing reliance on stale replicated data.
section: "4"
topics:
