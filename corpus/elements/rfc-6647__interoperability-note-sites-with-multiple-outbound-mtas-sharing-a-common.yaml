document: rfc-6647
kind: interoperability-note
summary: 'Sites with multiple outbound MTAs sharing a common queue may experience repeated greylisting: when a retry uses a different outbound MTA with a different IP address, the receiving server treats it as a first-time connection. DHCP-induced address changes between attempts produce the same effect.'
section: "4.1"
topics:
    - email
