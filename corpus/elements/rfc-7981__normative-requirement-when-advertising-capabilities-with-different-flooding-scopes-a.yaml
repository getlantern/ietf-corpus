document: rfc-7981
kind: normative-requirement
summary: When advertising capabilities with different flooding scopes, a router MUST originate a minimum of two IS-IS Router CAPABILITY TLVs — one per scope — each carrying only the sub-TLVs applicable to that scope.
section: "3"
rfc2119_level: MUST
