document: rfc-3111
kind: normative-requirement
summary: 'SLPv2 SAs and DAs MUST determine the scope of each service: URL address, resolving hostnames to addresses if necessary. A SA or DA MUST NOT respond to a SrvRqst with a service: URL whose address scope is less than the request''s source address scope.'
section: 4.2.3
rfc2119_level: MUST NOT
topics:
