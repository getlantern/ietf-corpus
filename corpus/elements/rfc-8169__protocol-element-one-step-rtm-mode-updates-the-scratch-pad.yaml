document: rfc-8169
kind: protocol-element
summary: One-step RTM mode updates the Scratch Pad inline while forwarding the packet; two-step RTM mode defers the Scratch Pad update to a separate follow-up message. The capability of the egress interface determines which mode applies to an ingress/egress interface pair.
section: "2.1"
topics:
