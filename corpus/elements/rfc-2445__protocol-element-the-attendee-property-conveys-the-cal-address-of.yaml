document: rfc-2445
kind: protocol-element
summary: The ATTENDEE property conveys the CAL-ADDRESS of a calendar user invited to a component. It supports CN, CUTYPE, DELEGATED-FROM, DELEGATED-TO, DIR, LANGUAGE, MEMBER, PARTSTAT, ROLE, RSVP, and SENT-BY parameters. Internet email addresses MUST be MAILTO URIs.
section: 4.8.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
