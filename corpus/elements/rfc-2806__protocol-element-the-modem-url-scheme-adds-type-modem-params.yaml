document: rfc-2806
kind: protocol-element
summary: The 'modem' URL scheme adds ';type=' (modem-params, minimum required capability) and ';rec=' (recommended-params) to the telephone-subscriber syntax. Capability tokens follow ITU-T standard naming (e.g., V32b for V.32bis) or a 'vnd.vendor.type' tree for proprietary modems.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
