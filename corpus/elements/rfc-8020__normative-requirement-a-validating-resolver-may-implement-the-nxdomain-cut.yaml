document: rfc-8020
kind: normative-requirement
summary: A validating resolver MAY implement the NXDOMAIN cut behavior only when the NXDOMAIN response has been validated with DNSSEC, as a safeguard against cache poisoning with false NXDOMAIN responses.
section: "2"
rfc2119_level: MAY
topics:
