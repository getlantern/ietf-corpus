document: rfc-2328
kind: design-rationale
summary: Type 2 external metrics are intentionally an order of magnitude larger than any intra-AS path cost, encoding the assumption that inter-AS routing cost dominates. This eliminates the need for unit conversion between external and internal metrics and simplifies tie-breaking.
section: "2.3"
