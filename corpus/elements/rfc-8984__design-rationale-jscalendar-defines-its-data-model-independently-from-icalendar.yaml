document: rfc-8984
kind: design-rationale
summary: JSCalendar defines its data model independently from iCalendar rather than providing a direct JSON mapping like jCal. This avoids inheriting iCalendar's ambiguities around time zones, recurrence rule interpretation, and parser interoperability issues, which jCal inherited wholesale.
section: "1.1"
topics:
    - json
