kind: security-consideration
summary: The protocol provides server host authentication, key exchange, encryption, and integrity protection, deriving a unique session ID for use by higher-level protocols. Full security considerations are in [SSH-ARCH] (RFC 4251). The exchange hash H SHOULD be kept secret.
