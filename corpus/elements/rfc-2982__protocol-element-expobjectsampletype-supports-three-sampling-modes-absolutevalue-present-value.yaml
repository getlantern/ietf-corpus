document: rfc-2982
kind: protocol-element
summary: 'expObjectSampleType supports three sampling modes: absoluteValue (present value), deltaValue (present minus previous value sampled expExpressionDeltaInterval seconds ago, intended for counters), and changedValue (boolean Unsigned32 indicating whether the value changed since the last sample). When an expression mixes delta and absolute objects, absolute values are obtained at the end of the delta period.'
