document: rfc-8229
kind: interoperability-note
summary: IKE_SA_INIT packets sent on a TCP connection SHOULD include NAT_DETECTION_SOURCE_IP and NAT_DETECTION_DESTINATION_IP payloads with the same content as when sending over UDP, using the applicable TCP ports when creating and checking the SHA-1 digests.
