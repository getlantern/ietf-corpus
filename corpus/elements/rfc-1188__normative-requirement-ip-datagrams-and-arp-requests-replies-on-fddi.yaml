document: rfc-1188
kind: normative-requirement
summary: IP datagrams and ARP requests/replies on FDDI shall be encapsulated within 802.2 LLC and SNAP data link layers. All frames must be transmitted in standard 802.2 LLC Type 1 Unnumbered Information format.
section: Packet Format
rfc2119_level: MUST
topics:
    - ip
