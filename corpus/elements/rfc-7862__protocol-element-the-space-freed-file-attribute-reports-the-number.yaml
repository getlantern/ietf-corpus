document: rfc-7862
kind: protocol-element
summary: The space_freed file attribute reports the number of bytes that would be freed when a file is deleted, taking block-sharing into consideration. This is distinct from space_used, which may over- or under-count shared blocks.
section: 12.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
