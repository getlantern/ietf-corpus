document: rfc-5590
kind: normative-requirement
summary: If a Transport Model defines MIB module objects to maintain session state information, the Transport Model MUST define what happens to those objects when a related session is torn down, as this impacts interoperability of the MIB module.
section: 3.3.3
rfc2119_level: MUST
topics:
    - snmp
