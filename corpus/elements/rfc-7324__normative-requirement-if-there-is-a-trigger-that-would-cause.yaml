document: rfc-7324
kind: normative-requirement
summary: If there is a trigger that would cause the protection LSP to be used (such as SF or MS) and there is an irreconcilable capability mismatch, a node MUST NOT use the protection LSP to carry traffic.
section: "4.3"
rfc2119_level: MUST NOT
