document: rfc-5709
kind: normative-requirement
summary: Key storage SHOULD persist across a system restart (warm or cold). If the last key on an interface expires, the router must not revert to unauthenticated operation but should notify the network manager and treat the key as having an infinite lifetime.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
