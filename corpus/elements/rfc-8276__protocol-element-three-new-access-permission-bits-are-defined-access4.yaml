summary: 'Three new ACCESS permission bits are defined: ACCESS4_XAREAD (0x00000040) for reading xattr values, ACCESS4_XAWRITE (0x00000080) for modifying xattr keys/values, and ACCESS4_XALIST (0x00000100) for listing xattr keys.'
