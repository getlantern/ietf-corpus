document: rfc-5560
kind: interoperability-note
summary: Type-P-one-way-packet-duplication-fraction is the IPPM equivalent of ITU-T Y.1540 IPDR (IP Packet Delay Ratio / IP Duplicate Ratio), and Type-P-one-way-replicated-packet-rate is the equivalent of Y.1540 RIPR, enabling interoperability with ITU-T measurement frameworks.
