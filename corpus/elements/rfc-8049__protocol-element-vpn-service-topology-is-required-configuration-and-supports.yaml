document: rfc-8049
kind: protocol-element
summary: 'VPN service topology is required configuration and supports three values: any-to-any (all sites communicate freely), Hub-and-Spoke (Spokes cannot communicate with each other; Hubs can), and Hub-and-Spoke Disjoint (Hubs also cannot communicate with each other). The default is any-to-any. New topologies can be added via augmentation.'
section: 6.2.1
topics:
    - yang
    - vpn
    - routing
    - bgp
