document: rfc-9729
kind: normative-requirement
summary: The frontend MUST validate that all required authentication parameters are present and parseable. If any parameter is missing or fails to parse, the frontend MUST ignore the entire Authorization (or Proxy-Authorization) header field.
section: "6.1"
rfc2119_level: MUST
topics:
    - http
    - security
