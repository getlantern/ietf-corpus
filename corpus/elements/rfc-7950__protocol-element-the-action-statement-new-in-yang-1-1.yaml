document: rfc-7950
kind: protocol-element
summary: The 'action' statement (new in YANG 1.1) defines an operation tied to a specific data node (container or list), as distinct from top-level 'rpc' operations. Actions are invoked via the NETCONF <action> element in the 'urn:ietf:params:xml:ns:yang:1' namespace.
