document: rfc-8011
kind: design-rationale
summary: The IPP Printer object deliberately abstracts all physical configurations (embedded device, hosted print server, fan-out to multiple devices) into a single logical entity, hiding implementation topology from Clients. This allows uniform Client behavior regardless of whether the Printer is a direct-attached device, a spooler, or a multi-device print farm.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
