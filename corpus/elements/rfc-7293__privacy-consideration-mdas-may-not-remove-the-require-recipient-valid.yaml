document: rfc-7293
kind: privacy-consideration
summary: MDAs may not remove the Require-Recipient-Valid-Since header field upon delivery, and user agents often do not render all header fields. As a result, the header field with its embedded timestamp and recipient relationship could be inadvertently forwarded to unintended parties. Additionally, a bad actor observing RRVS usage may infer that the message contains high-value content.
section: "14.4"
topics:
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
