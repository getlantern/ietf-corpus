document: rfc-5444
kind: security-consideration
summary: Hop-by-hop packet-level authentication and integrity MAY be implemented by including a Packet TLV carrying a cryptographic signature computed over the entire packet or appropriate parts, since packets are received as transmitted (not modified in transit).
