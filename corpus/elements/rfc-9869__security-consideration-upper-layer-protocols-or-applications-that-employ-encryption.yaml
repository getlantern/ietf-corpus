document: rfc-9869
kind: security-consideration
summary: Upper Layer protocols or applications that employ encryption ought to perform DPLPMTUD at a layer above UDP Options and not enable UDP Options support for DPLPMTUD, ensuring probe packets are encrypted and giving the application control over the additional traffic generated.
section: "8"
topics:
    - udp
    - security
    - privacy
