document: rfc-4030
kind: normative-requirement
summary: During hash computation, the 'hops' field MUST be set to zero (its value may change in transmission) and the 'giaddr' field MUST also be set to zero (it may be modified by intermediate relay agents). The Authentication Information field is set to all zeros during computation.
section: "7"
rfc2119_level: MUST
topics:
