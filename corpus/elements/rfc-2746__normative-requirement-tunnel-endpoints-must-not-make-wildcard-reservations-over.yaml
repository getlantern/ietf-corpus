document: rfc-2746
kind: normative-requirement
summary: Tunnel endpoints MUST NOT make wildcard reservations over multipoint tunnels. Each tunnel endpoint participates as both a PATH source and an FF or SE RESV source for the shared session, creating a single shared reservation for the entire logical medium.
section: "8"
rfc2119_level: MUST NOT
topics:
    - qos
    - multicast
