document: rfc-5568
kind: normative-requirement
summary: RtSolPr retransmissions MUST use exponential backoff (doubling the timeout starting from 2×RTT or 100ms), up to RTSOLPR_RETRIES. When sent more than once, RtSolPr messages MUST be rate-limited with MAX_RTSOLPR_RATE per second.
section: 6.1.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
