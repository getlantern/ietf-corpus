document: rfc-5565
kind: design-rationale
summary: Multipoint-to-point tunnels are sufficient for layer-3 transit services; the egress AFBR need not know which ingress router encapsulated a given packet, mirroring native IP forwarding semantics. Point-to-point tunnels are allowed but not required.
