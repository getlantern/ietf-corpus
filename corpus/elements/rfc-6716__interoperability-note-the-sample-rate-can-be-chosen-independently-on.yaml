document: rfc-6716
kind: interoperability-note
summary: The sample rate can be chosen independently on the encoder and decoder side; e.g., a fullband signal may be decoded as wideband or vice versa. This ensures sender and receiver can always interoperate regardless of actual audio hardware capabilities.
