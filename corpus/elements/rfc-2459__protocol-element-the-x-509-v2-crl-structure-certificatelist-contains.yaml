document: rfc-2459
kind: protocol-element
summary: The X.509 v2 CRL structure (CertificateList) contains a signed tbsCertList with issuer name, thisUpdate, optional nextUpdate, and a list of revoked certificate entries each identified by serial number, revocation date, and optional entry extensions (reasonCode, invalidityDate, certificateIssuer). CRL extensions include Authority Key Identifier, CRL Number, Delta CRL Indicator, and Issuing Distribution Point.
section: "5"
