summary: 'The direct export profile (''direct-export-profile'') extends the tracing profile with two additional encapsulation-node-only leaves: ''flow-id'' (uint32, for correlating exported data across nodes and packets) and ''enable-sequence-number'' (boolean, default false, controls use of sequence number in the Direct Export Option).'
