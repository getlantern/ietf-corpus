document: rfc-2933
kind: protocol-element
summary: 'igmpInterfaceProxyIfIndex (InterfaceIndexOrZero, default 0) supports IGMP proxying: a non-zero value indicates that memberships learned on this interface cause IGMP Host Membership Reports to be sent on the identified upstream interface. Proxy devices implement igmpV2RouterMIBGroup only on router (non-zero) interfaces.'
section: "4"
topics:
