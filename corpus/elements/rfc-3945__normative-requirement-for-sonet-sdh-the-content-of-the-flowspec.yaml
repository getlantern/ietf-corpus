document: rfc-3945
kind: normative-requirement
summary: For SONET/SDH, the content of the FLOWSPEC object in a Resv message should be identical to the SENDER_TSPEC in the corresponding Path message. The receiver is normally not permitted to change traffic parameter values, though limited negotiation is defined in RFC 3946.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
