document: rfc-1638
kind: wire-format
summary: Bridged 802.3 frames on PPP use PPP Protocol 0x0031, followed by a flags byte (F=LAN FCS present, I=LAN ID present, Z=zero-pad to minimum size), a Pads nibble, MAC Type byte, optional 32-bit LAN ID, Destination MAC, Source MAC, Length/Type, LLC data, optional LAN FCS, optional pad, and Frame FCS.
section: "4.2"
