summary: The iscsiDescriptors subtree defines extensible OID-based identifiers for header and data integrity types (iscsiHdrIntegrityNone, iscsiHdrIntegrityCrc32c, iscsiDataIntegrityNone, iscsiDataIntegrityCrc32c). Attributes referencing digest methods carry OID values rather than enumerated integers, allowing enterprise MIB extensions.
