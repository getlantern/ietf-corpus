document: rfc-6665
kind: state-machine
summary: 'Subscriber subscription state machine defines states: init, notify_wait, pending, active, terminated. Transitions are triggered by sending SUBSCRIBE, receiving NOTIFY with state values (active/pending/terminated), Timer N expiry, or specific error responses to SUBSCRIBE refresh. Multiple independent state machines may run from a single forked SUBSCRIBE request.'
section: 4.1.2
topics:
    - sip
    - realtime
