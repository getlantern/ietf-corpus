document: rfc-9513
kind: normative-requirement
summary: The SRv6 SID Structure sub-TLV MUST NOT appear more than once in its parent sub-TLV; if it does, the parent sub-TLV MUST be ignored. If the sum of the four length fields exceeds 128 bits, the parent TLV/sub-TLV MUST be ignored.
section: "10"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
