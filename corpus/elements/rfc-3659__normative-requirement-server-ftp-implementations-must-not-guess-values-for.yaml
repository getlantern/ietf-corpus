document: rfc-3659
kind: normative-requirement
summary: Server-FTP implementations MUST NOT guess values for the 'lang' fact; language must be determined unambiguously (e.g., via filesystem tagging or user configuration). Similarly, 'media-type' values MUST NOT be guessed.
section: 7.5.6
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
