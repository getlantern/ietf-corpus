document: rfc-6757
kind: security-consideration
summary: Access network information elements may be dynamically learned via DHCP or other protocols. Without proper security on the path between the MAG and access points, a compromised MAG could send incorrect network parameters to the LMA, causing incorrect policy enforcement. Mitigation requires IPsec, TLS, or equivalent security on the MAG-to-access-point path.
section: "7"
topics:
    - security
    - ip
    - mobility
    - ipsec
