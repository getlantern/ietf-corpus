document: rfc-6140
kind: protocol-element
summary: The 'sg' SIP URI parameter is added by a SIP-PBX to the public GRUU it received from the SSP when constructing a per-UA public GRUU. The SSP copies the 'sg' parameter from an inbound GRUU-addressed request to the re-targeted contact, allowing the SIP-PBX to route the request to the correct UA.
section: 7.1.1
topics:
    - sip
    - realtime
