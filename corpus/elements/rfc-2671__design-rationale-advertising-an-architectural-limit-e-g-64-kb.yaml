document: rfc-2671
kind: design-rationale
summary: Advertising an architectural limit (e.g., 64 KB) as a maximum UDP payload size is unwise due to transaction state overhead. A practical ceiling of around 4 KB per ongoing transaction is suggested. Choosing 1280 on Ethernet-connected requestors is given as a reasonable example.
section: 4.5.1
topics:
