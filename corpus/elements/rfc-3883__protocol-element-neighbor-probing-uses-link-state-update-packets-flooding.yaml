document: rfc-3883
kind: protocol-element
summary: Neighbor probing uses link-state update packets (flooding an LSA already in the LSDB) to verify that the OSPF process is operational on a neighbor reachable over a demand circuit. An explicit or implicit acknowledgement (link state acknowledgement or link state update) confirms the neighbor is alive.
section: "2.1"
topics:
    - routing
