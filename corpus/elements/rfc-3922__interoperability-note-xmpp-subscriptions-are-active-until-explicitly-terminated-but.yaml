document: rfc-3922
kind: interoperability-note
summary: XMPP subscriptions are active until explicitly terminated, but non-XMPP services may implement subscriptions of limited duration requiring periodic refresh. An XMPP-to-CPIM gateway may need to send such refreshes on behalf of the XMPP entity to prevent subscription expiry.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
