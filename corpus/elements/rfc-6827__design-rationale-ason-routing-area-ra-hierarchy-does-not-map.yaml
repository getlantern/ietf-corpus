document: rfc-6827
kind: design-rationale
summary: ASON Routing Area (RA) hierarchy does not map to OSPF area hierarchy. Instead, successive hierarchical levels of RAs MUST be represented by separate instances of the OSPFv2 protocol, with routing information exchanged between levels via import/export between protocol instances.
section: "2"
topics:
    - routing
