document: rfc-9803
kind: normative-requirement
summary: EPP servers implementing this extension SHOULD use TTL values provided by clients for DNS records published for domain and host objects. Servers using the host attribute model SHOULD use NS, A, and/or AAAA TTL values specified for the domain object when publishing those records derived from host attributes.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
