document: rfc-4969
kind: design-rationale
summary: The ENUM record itself does not need to contain personal information; it only points to a location where access to personal information could be granted. This separation allows the record to be privacy-neutral (e.g., pointing to an anonymous hosting provider) while still enabling vCard retrieval.
section: "5.1"
topics:
    - privacy
    - dns
