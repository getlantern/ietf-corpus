document: rfc-2608
kind: normative-requirement
summary: String comparison for order and equality in SLP MUST be case insensitive inside the 0x00-0x7F subrange of UTF-8 (ASCII). Case insensitivity SHOULD be supported throughout the full UTF-8 Unicode character set. URL string comparisons are case sensitive.
section: "6.4"
rfc2119_level: MUST
topics:
    - ldap
