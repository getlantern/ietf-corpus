document: rfc-3672
kind: interoperability-note
summary: This specification adapts X.500 (X.501) subentry mechanisms for use with LDAP. The SubtreeSpecification ASN.1 type is taken directly from X.501 Section 11.3. Because X.501 may extend SubtreeSpecification in future editions, the ABNF in Appendix A is a snapshot; RFC 3641 (GSER) governs encoding of any future extensions.
section: "1"
topics:
