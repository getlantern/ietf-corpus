document: rfc-854
kind: design-rationale
summary: The DO/DON'T/WILL/WON'T option negotiation syntax was deliberately kept simple so that hosts which do not understand an option can trivially refuse it by returning WON'T or DON'T. Richer negotiation (e.g., sub-negotiation of line length) must be preceded by a standard DO/WILL exchange that establishes mutual understanding before exotic syntax is used.
section: GENERAL CONSIDERATIONS
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
