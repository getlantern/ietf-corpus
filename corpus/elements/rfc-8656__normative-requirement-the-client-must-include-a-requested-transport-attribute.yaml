document: rfc-8656
kind: normative-requirement
summary: The client MUST include a REQUESTED-TRANSPORT attribute in every Allocate request. If absent or malformed, the server MUST reject with 400 (Bad Request); if the specified protocol is unsupported, the server MUST reject with 442 (Unsupported Transport Protocol). In this specification, the only valid transport is UDP (protocol number 17).
section: "7.1"
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
