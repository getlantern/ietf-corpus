document: rfc-8098
kind: state-machine
summary: 'MDN generation follows a defined timeline: message delivery → MUA discovers message → MUA decides if MDN can be generated → automatic processing MDN (dispatched/processed/deleted, automatic-action/MDN-sent-automatically) → user action MDN (any disposition type, manual-action or automatic, with user permission) → no further MDNs after first one is issued.'
