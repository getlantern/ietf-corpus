document: rfc-3021
kind: interoperability-note
summary: 31-bit prefixes have no impact on current routing protocols. OSPF, IS-IS, BGP, and EIGRP all use multicast, limited broadcast, or unicast for peer communication, none of which are affected by 31-bit subnet masks.
section: "2.3"
topics:
