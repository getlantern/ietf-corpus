document: rfc-5032
kind: design-rationale
summary: WITHIN (OLDER/YOUNGER) differs from BEFORE/SINCE in that the client specifies a relative interval in seconds rather than an absolute date. This is useful for persistent searches on devices with limited capacity or on bandwidth-constrained networks, reducing repeated requests and redundant responses.
