document: rfc-2462
kind: design-rationale
summary: Address lifetimes are divided into preferred and deprecated phases to give upper layers advance warning that an address will become invalid, allowing applications to migrate to new addresses gracefully before the valid lifetime expires—specifically designed to support site renumbering.
