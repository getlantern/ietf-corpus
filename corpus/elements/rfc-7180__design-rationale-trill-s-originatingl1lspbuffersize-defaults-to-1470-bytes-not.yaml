summary: TRILL's originatingL1LSPBufferSize defaults to 1470 bytes (not IS-IS's 1492) to provide a 27-byte safety margin accommodating legacy devices with the classic Ethernet maximum MTU despite headers such as an Outer.VLAN tag.
