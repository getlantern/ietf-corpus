document: rfc-9323
kind: security-consideration
summary: 'RSC objects use EE certificates but are not published in public CA repositories, creating a covert-channel risk: observers may infer the existence of RSCs from gaps in EE certificate serial numbers or from unknown serial numbers appearing on a CRL. However, such gaps do not conclusively prove RSC existence.'
section: "8"
topics:
