summary: The MESSAGE_ID LIST object (Class 25, C_Type 1) contains Flags (8 bits, MUST be zero), Epoch (24 bits), and one or more Message_Identifier fields (32 bits each) identifying state to be refreshed. Used in Srefresh messages to refresh Resv state and unicast Path state.
