document: rfc-8196
kind: state-machine
summary: 'DD-LSP procedure for detecting dual System ID and Router-Fingerprint duplication: DD-state (boolean), DD-count (occurrence counter), DD-timer (recommended 60 seconds), and DD-max (recommended 3). When DD-count reaches DD-max within the timer window, the local router MUST generate a new System ID and Router-Fingerprint and restart the protocol; DD-state is reset and the timer cancelled.'
section: 3.4.6
topics:
    - routing
