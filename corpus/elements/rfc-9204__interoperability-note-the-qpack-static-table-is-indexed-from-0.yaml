document: rfc-9204
kind: interoperability-note
summary: The QPACK static table is indexed from 0, whereas the HPACK static table is indexed from 1. Static and dynamic table entries in QPACK are addressed in separate namespaces (distinguished by the T bit), unlike HPACK's unified index space.
