document: rfc-6374
kind: protocol-element
summary: 'The Control Code field specifies query mode (0x0: In-band Response, 0x1: Out-of-band Response, 0x2: No Response) or response outcome: 0x1 Success; 0x2–0x5 transient Notifications (Data Format Invalid, Initialization in Progress, Data Reset, Resource Temporarily Unavailable); 0x10–0x1D fatal Errors (Unspecified, Unsupported Version, Authentication Failure, Connection Mismatch, Invalid Message, Protocol Error, etc.).'
section: "3.1"
topics:
