document: rfc-6848
kind: errata
summary: The RelaxNG schema in RFC 5222 requires namespace-qualified element names in <locationValidation> lists, making the example in Figure 6 of RFC 5222 erroneous. RFC 6848 provides the corrected example with proper namespace prefixes on all civic element names.
section: "6"
