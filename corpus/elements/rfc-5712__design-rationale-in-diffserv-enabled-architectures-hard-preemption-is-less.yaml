document: rfc-5712
kind: design-rationale
summary: In Diffserv-enabled architectures, hard preemption is less necessary to protect high-priority traffic because marking and queuing disciplines already enforce preference. Soft preemption is therefore especially attractive in MPLS networks with both Diffserv and TE capabilities.
