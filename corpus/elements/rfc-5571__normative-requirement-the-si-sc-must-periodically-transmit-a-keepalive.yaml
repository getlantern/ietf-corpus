document: rfc-5571
kind: normative-requirement
summary: The SI/SC MUST periodically transmit a keepalive message to detect tunnel or peer failure and maintain NAT/NAPT contexts. L2TPv2 HELLO messages provide this mechanism; implementations SHOULD use L2TPv2 Hello keepalives and MAY additionally use PPP LCP Echo messages.
section: 5.1.2
rfc2119_level: MUST
topics:
    - vpn
    - nat
    - v6ops
