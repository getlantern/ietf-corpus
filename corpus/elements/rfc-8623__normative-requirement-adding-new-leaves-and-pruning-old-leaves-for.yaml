document: rfc-8623
kind: normative-requirement
summary: Adding new leaves and pruning old leaves for PCE-initiated P2MP TE LSPs MUST be carried in a PCUpd message. Leaf type=1 is used for adding new leaves and leaf type=2 for pruning old leaves of P2MP END-POINTS objects.
