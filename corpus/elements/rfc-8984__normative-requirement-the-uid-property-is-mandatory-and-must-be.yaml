document: rfc-8984
kind: normative-requirement
summary: The uid property is mandatory and MUST be globally unique; UUID version 4 (RFC 4122) is RECOMMENDED. Implementations MUST be able to receive and persist uid values of at least 255 octets and MUST NOT truncate values in the middle of a UTF-8 multi-octet sequence.
section: 4.1.2
rfc2119_level: MUST
topics:
    - json
