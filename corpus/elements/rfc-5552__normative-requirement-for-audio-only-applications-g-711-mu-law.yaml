document: rfc-5552
kind: normative-requirement
summary: For audio-only applications, G.711 mu-law (RTP payload type 0) and A-law (payload type 8, RFC 3551) MUST be supported. The VoiceXML Media Server MUST support SRTP (RFC 3711) for RTP media streams including RTCP. DTMF events (RFC 4733) MUST be supported; when the UA does not indicate RFC 4733 support, the server MAY use audio stream DTMF detection instead.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
