document: rfc-2068
kind: interoperability-note
summary: 'HTTP/1.1 persistent connections differ from HTTP/1.0 Keep-Alive: connections are persistent by default in HTTP/1.1. To interoperate with HTTP/1.0 proxies that may not support persistent connections, HTTP/1.1 proxies MUST NOT establish persistent connections with HTTP/1.0 clients unless Keep-Alive is explicitly negotiated.'
section: 19.7.1
topics:
    - http
    - tcp
