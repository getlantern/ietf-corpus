document: rfc-9695
kind: design-rationale
summary: 'The ''application'' top-level type is explicitly rejected for haptics because: (1) haptics connects directly to a sensory system; (2) ''application'' is historically associated with executable code and carries heightened security scrutiny not applicable to haptic data; (3) haptics is a property of a media stream, not an application.'
section: "2.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
