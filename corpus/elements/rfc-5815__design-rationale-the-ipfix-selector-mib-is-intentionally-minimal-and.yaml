document: rfc-5815
kind: design-rationale
summary: 'The IPFIX SELECTOR MIB is intentionally minimal and IANA-controlled: since IPFIX itself (RFC 5101) defines no packet selection functions beyond ''select all'', the MIB provides only a structural template and a placeholder subtree so that PSAMP and enterprise-specific sampling methods can be added later without changing the base MIB.'
