document: rfc-8213
kind: design-rationale
summary: This specification was motivated by concerns about pervasive monitoring (RFC 7258) and other attacks. Sensitive data in relay messages — such as the DHCPv4 Relay Agent Information option (82), vendor-specific information, and Access-Network-Identifier options — must be protected.
section: "1"
topics:
    - privacy
    - security
    - ipsec
