document: rfc-6073
kind: state-machine
summary: For dynamic LDP/MPLS to L2TPv3 switching, the S-PE always starts in passive role. On receiving an L2TPv3 ICRQ it maps AVPs to FEC identifiers and sends an LDP Label Mapping; on receiving an LDP Label Mapping it either sends an ICRP or initiates a new L2TPv3 session via ICRQ.
section: 8.4.1
