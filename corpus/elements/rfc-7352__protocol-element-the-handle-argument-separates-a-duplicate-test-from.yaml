document: rfc-7352
kind: protocol-element
summary: The ':handle' argument separates a 'duplicate' test from other 'duplicate' tests with a different or omitted ':handle' argument, preventing unrelated tests from interfering with each other. A message is recognized as a duplicate only when the tracked unique ID was seen before by a 'duplicate' test with the same ':handle' argument.
section: "3.2"
topics:
