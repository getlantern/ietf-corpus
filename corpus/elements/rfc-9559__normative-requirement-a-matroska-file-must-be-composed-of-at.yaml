document: rfc-9559
kind: normative-requirement
summary: A Matroska file MUST be composed of at least one EBML Document using the Matroska Document Type. Each EBML Document MUST start with an EBML Header and MUST be followed by the Segment Root Element.
section: "4.5"
rfc2119_level: MUST
