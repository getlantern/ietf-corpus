document: rfc-6184
kind: normative-requirement
summary: An H.264 encoder MUST set NRI according to H.264 Subclause 7.4.1 for nal_unit_type 1–12; NRI SHALL equal 0 for types 6, 9, 10, 11, and 12. Encoders SHOULD set NRI to 11 for sequence/picture parameter sets (types 7/8) and IDR coded slice NAL units (type 5).
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
