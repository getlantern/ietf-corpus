document: rfc-2165
kind: normative-requirement
summary: If a service registration includes authentication blocks that the DA can validate, the DA MUST validate any subsequent service deregistrations (and attribute registrations) to prevent unauthorized entities from invalidating registered services.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
