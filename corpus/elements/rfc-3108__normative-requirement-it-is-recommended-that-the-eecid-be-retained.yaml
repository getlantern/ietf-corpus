document: rfc-3108
kind: normative-requirement
summary: It is RECOMMENDED that the eecid be retained until the connection terminates rather than released as soon as the bearer setup message is received. Because the eecid space (32 bits) is large enough, early release is not necessary.
section: 5.6.1.1
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
