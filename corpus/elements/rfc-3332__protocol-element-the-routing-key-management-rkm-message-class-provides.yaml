document: rfc-3332
kind: protocol-element
summary: 'The Routing Key Management (RKM) message class provides dynamic Routing Key provisioning: Registration Request (REG REQ, type 1), Registration Response (REG RSP, type 2), Deregistration Request (DEREG REQ, type 3), and Deregistration Response (DEREG RSP, type 4). This is an alternative to static configuration via a management interface.'
