document: rfc-3262
kind: interoperability-note
summary: A proxy acting as a UAS MAY send reliable provisional responses, but MUST NOT do so for requests that contain a tag in the To field (i.e., within an existing dialog). If a PRACK arrives at a proxy that doesn't match any outstanding reliable provisional response, the PRACK MUST be proxied.
section: "3"
topics:
    - sip
    - realtime
