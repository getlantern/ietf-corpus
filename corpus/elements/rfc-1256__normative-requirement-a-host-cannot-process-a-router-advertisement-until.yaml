document: rfc-1256
kind: normative-requirement
summary: A host cannot process a Router Advertisement until it has determined its own IP address(es) and subnet mask(s) for the arrival interface. It MAY save valid advertisements for later processing to allow router discovery and address/mask discovery to proceed in parallel.
section: "5.3"
rfc2119_level: MAY
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
