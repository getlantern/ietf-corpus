document: rfc-9780
kind: normative-requirement
summary: A MultipointTail that receives an LSP Ping containing the BFD Discriminator TLV MUST validate the LSP Ping, associate the BFD Discriminator with the P2MP LSP, create a P2MP BFD session with bfd.SessionType = MultipointTail, and use the source IP, BFD Discriminator value, and P2MP LSP identity to demultiplex BFD sessions.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
