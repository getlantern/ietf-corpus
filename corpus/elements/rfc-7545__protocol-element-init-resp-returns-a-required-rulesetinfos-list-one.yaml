document: rfc-7545
kind: protocol-element
summary: INIT_RESP returns a required rulesetInfos list (one RulesetInfo per supported ruleset applicable to the device's location) and an optional databaseChange (DbUpdateSpec). If the Database supports none of the rulesets specified by the device, it MUST return an UNSUPPORTED error instead.
section: 4.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
