document: rfc-5460
kind: protocol-element
summary: QUERY_BY_LINK_ADDRESS asks the server to return bindings on a network segment identified by a link-address value from a relay's Relay-Forward message. The server locates bindings on the same network segment as the specified link-address.
section: 5.3.2
topics:
