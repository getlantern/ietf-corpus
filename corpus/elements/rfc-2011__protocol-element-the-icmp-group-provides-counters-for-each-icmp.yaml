summary: 'The ICMP Group provides counters for each ICMP message type received and sent: icmpInMsgs and icmpOutMsgs give totals including errors; per-type counters cover DestUnreach, TimeExcd, ParmProb, SrcQuench, Redirect, Echo, EchoRep, Timestamp, TimestampRep, AddrMask, and AddrMaskRep.'
