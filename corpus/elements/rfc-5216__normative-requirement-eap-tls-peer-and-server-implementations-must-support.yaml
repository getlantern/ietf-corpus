document: rfc-5216
kind: normative-requirement
summary: EAP-TLS peer and server implementations MUST support the use of Certificate Revocation Lists (CRLs). They SHOULD also support OCSP. Peers MUST support post-authentication revocation checking when network connectivity is unavailable prior to authentication completion.
section: "5.4"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
