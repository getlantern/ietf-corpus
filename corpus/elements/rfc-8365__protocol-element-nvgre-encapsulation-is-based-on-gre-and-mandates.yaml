document: rfc-8365
kind: protocol-element
summary: NVGRE encapsulation is based on GRE and mandates inclusion of the optional GRE Key field carrying the VSID. There is a one-to-one mapping between VSID and tenant VID, and inclusion of an inner VLAN tag is prohibited.
section: "5.1"
topics:
