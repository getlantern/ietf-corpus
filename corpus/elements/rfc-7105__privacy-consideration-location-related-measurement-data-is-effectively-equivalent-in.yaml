document: rfc-7105
kind: privacy-consideration
summary: Location-related measurement data is effectively equivalent in privacy sensitivity to location information when the contextual knowledge to convert between them is readily accessible. Measurement data MUST therefore be protected with the same confidentiality and authentication mechanisms as location information itself.
section: "6"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - tls
