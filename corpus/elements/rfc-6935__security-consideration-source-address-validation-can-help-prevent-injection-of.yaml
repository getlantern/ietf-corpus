document: rfc-6935
kind: security-consideration
summary: Source address validation can help prevent injection of traffic into tunnel contexts by an attacker, but will not protect against an intentional attacker who forges correct source information. Zero-checksum users should apply all available context verification checks to minimize misdelivery risk.
