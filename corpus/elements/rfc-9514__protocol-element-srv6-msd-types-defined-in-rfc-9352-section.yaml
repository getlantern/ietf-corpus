document: rfc-9514
kind: protocol-element
summary: SRv6 MSD types defined in RFC 9352 Section 4 are reused with the BGP-LS Node MSD TLV (RFC 8814) to advertise SRH operation limits at the node level. Each MSD type is encoded as a 1-octet type followed by a 1-octet value.
