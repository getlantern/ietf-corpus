document: rfc-2814
kind: interoperability-note
summary: RSVP nodes that support only UDP encapsulation cannot interoperate with a DSBM unless the DSBM is extended to accept UDP-encapsulated RSVP messages, because SBM mandates raw IP encapsulation for all messages forwarded onto a managed L2 domain.
section: "6.5"
topics:
    - qos
