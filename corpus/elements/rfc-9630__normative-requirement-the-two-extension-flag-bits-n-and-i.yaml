document: rfc-9630
kind: normative-requirement
summary: The two Extension-Flag bits N and I for the Multicast Branch ID MUST be both set or both cleared; if they differ, the header is considered malformed and the packet MUST be dropped.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - measurement
