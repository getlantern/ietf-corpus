document: rfc-1604
kind: design-rationale
summary: The Frame Relay Service MIB is scoped exclusively to Customer Network Management (CNM) of a single provider's Frame Relay network. Internal switching elements, line cards, and routing tables are explicitly excluded; the customer accesses an SNMP proxy-agent that proxies for all FR equipment within one network.
section: "3.1"
topics:
    - snmp
