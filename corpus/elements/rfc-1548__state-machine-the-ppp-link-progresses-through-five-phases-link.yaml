document: rfc-1548
kind: state-machine
summary: 'The PPP link progresses through five phases: Link Dead (physical layer not ready), Link Establishment (LCP negotiation), Authentication (optional peer authentication), Network-Layer Protocol (NCP configuration), and Link Termination. The transition from Dead to Establish is triggered by physical-layer readiness; transitions back to Dead occur on failure or termination.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
