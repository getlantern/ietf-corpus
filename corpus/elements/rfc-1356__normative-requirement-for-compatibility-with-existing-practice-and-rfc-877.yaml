document: rfc-1356
kind: normative-requirement
summary: For compatibility with existing practice and RFC 877, IP datagrams MUST by default be encapsulated on a virtual circuit opened with the CC CUD. Implementations MAY also support IP within Null, SNAP, and Null+SNAP encapsulations, each configurable per-peer.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
