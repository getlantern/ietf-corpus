document: rfc-5072
kind: protocol-element
summary: To derive an IPv6 interface identifier from an IEEE EUI-64, the only transformation is inverting the 'u' (universal/local) bit. For EUI-48, the identifier is first expanded to EUI-64 by inserting 0xFF and 0xFE between the company_id and extension identifier fields.
section: "4.1"
topics:
