document: rfc-793
kind: normative-requirement
summary: 'Connection establishment must use a three-way handshake: the initiator sends SYN, the responder replies with SYN-ACK, and the initiator completes with ACK. Simultaneous active OPENs from both sides are also handled correctly through this mechanism.'
section: "3.4"
rfc2119_level: MUST
topics:
    - tcp
