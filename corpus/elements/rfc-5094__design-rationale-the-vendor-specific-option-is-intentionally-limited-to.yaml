document: rfc-5094
kind: design-rationale
summary: The vendor-specific option is intentionally limited to simple use cases where including vendor data in standardized MIPv6 exchanges is sufficient; it is not suitable for more complex extensions that modify Mobile IPv6 itself, because RFC 3775 requires that unrecognized options be ignored.
section: "1"
