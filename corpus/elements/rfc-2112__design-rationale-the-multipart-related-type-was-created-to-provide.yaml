document: rfc-2112
kind: design-rationale
summary: The Multipart/Related type was created to provide a single, unified mechanism for compound objects rather than defining specific multipart subtypes for each new object type (as had been done for MIME-PEM, MIME-Macintosh, etc.), in keeping with the MIME philosophy of one mechanism for the same goal.
