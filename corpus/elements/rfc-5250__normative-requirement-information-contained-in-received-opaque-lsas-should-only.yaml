document: rfc-5250
kind: normative-requirement
summary: Information contained in received Opaque LSAs SHOULD only be used when the router originating the LSA is reachable. Reachability validation MAY be done less frequently than every SPF calculation. Routers MAY give priority to processing base OSPF LSA types over Opaque LSA types.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
