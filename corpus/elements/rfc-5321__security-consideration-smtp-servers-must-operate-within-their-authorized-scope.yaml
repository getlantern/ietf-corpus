document: rfc-5321
kind: security-consideration
summary: SMTP servers MUST operate within their authorized scope and SHOULD NOT relay mail for arbitrary third-party senders (open relay). Acting as an open relay enables spam and abuse; policy-based rejection of unauthorized relay attempts SHOULD return a 550 response.
section: "7.9"
topics:
    - email
    - security
