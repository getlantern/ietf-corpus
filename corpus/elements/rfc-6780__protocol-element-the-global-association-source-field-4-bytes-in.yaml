document: rfc-6780
kind: protocol-element
summary: The Global Association Source field (4 bytes) in Extended ASSOCIATION objects contains the RFC 6370 Global_ID (operator's ASN-based identifier) or the special value zero (indicating no global identifier). Zero SHOULD be limited to entities within a single operator. For 2-octet ASNs, the two high-order octets MUST be set to zero.
section: "4.1"
topics:
    - mpls
    - routing
