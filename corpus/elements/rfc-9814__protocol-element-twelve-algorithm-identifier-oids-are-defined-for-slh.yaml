document: rfc-9814
kind: protocol-element
summary: Twelve algorithm identifier OIDs are defined for SLH-DSA, covering three security levels (128, 192, 256 bits), two performance variants (small 's' and fast 'f'), and two hash families (SHA-2 and SHAKE). OIDs range from id-slh-dsa-sha2-128s ({ sigAlgs 20 }) through id-slh-dsa-shake-256f ({ sigAlgs 31 }) under the NIST sigAlgs arc.
