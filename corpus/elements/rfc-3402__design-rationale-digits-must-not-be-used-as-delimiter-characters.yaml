document: rfc-3402
kind: design-rationale
summary: Digits MUST NOT be used as delimiter characters in substitution expressions because they would be confused with backref literals (\1–\9). Similarly, if flags are specified, the delimiter must not also be a flag character.
section: "3.2"
topics:
    - dns
