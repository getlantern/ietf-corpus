document: rfc-5121
kind: normative-requirement
summary: When the MS and BS indicate IPv6 protocol support over both IP CS and Ethernet CS, the MS and BS MUST use IP CS for sending and receiving IPv6 packets, making IP CS the default and preferred mode.
section: "4"
rfc2119_level: MUST
