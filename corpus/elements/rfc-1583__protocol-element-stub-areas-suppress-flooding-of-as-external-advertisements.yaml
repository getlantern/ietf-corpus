document: rfc-1583
kind: protocol-element
summary: Stub areas suppress flooding of AS external advertisements; routing to external destinations is based solely on a per-area default route advertised by area border routers via summary link advertisements. This reduces database size and memory requirements for stub area routers.
section: "3.6"
topics:
    - routing
