document: rfc-6975
kind: design-rationale
summary: The DAU, DHU, and N3U options are intended to let zone administrators measure client adoption of new algorithms so they can determine when it is safe to complete a DNSSEC algorithm rollover. The survey may span years before a tipping point is reached.
