document: rfc-7199
kind: design-rationale
summary: Setting no policy (no HTTP request to policy URI) is explicitly distinct from setting an empty policy (PUT with a ruleset containing no rules). An empty policy is default-deny; no policy tacitly accepts whatever default the server applies, which may include open access.
section: "3.3"
topics:
    - privacy
    - security
