document: rfc-8441
kind: protocol-element
summary: SETTINGS_ENABLE_CONNECT_PROTOCOL is a new HTTP/2 SETTINGS parameter (code 0x8) added by this document. When sent by a server with value 1, it signals that the client may use the Extended CONNECT method defined here. The initial value is 0.
