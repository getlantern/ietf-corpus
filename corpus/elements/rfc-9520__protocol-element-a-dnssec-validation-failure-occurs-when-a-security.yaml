document: rfc-9520
kind: protocol-element
summary: A DNSSEC validation failure occurs when a security-aware resolver cannot establish a chain of trust for an RRset after trying multiple authoritative servers; causes include signature mismatch, missing DNSKEY RRs, denial-of-existence issues, and clock skew.
