document: rfc-8804
kind: normative-requirement
summary: The HttpTarget 'path-prefix' MUST end with a trailing slash. If absent or empty, the uCDN MUST NOT prepend a path-prefix; the original path MUST appear in the Location URI right after the authority component.
section: "2.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
