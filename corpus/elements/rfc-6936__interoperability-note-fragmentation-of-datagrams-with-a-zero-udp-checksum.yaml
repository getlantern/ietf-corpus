document: rfc-6936
kind: interoperability-note
summary: Fragmentation of datagrams with a zero UDP checksum does not worsen corruption detection compared to commonly used IP-in-IP tunnels, but recursive tunneling that applies fragmentation at multiple layers without per-layer verification significantly raises the probability of undetected errors.
section: 3.1.5
topics:
    - udp
    - ip
