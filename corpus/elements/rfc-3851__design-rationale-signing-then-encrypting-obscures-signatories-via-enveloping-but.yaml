document: rfc-3851
kind: design-rationale
summary: Signing-then-encrypting obscures signatories via enveloping but prevents signature verification without decryption. Encrypting-then-signing exposes signatories but allows signature verification without the private key, which is useful for automated gateway verification environments.
section: "3.6"
topics:
    - email
    - crypto
    - security
