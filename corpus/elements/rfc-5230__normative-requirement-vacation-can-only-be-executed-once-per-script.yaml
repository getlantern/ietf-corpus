document: rfc-5230
kind: normative-requirement
summary: Vacation can only be executed once per script; a script MUST fail with an appropriate error if it attempts to execute two or more vacation actions. Vacation MUST NOT be considered an error when used with discard, keep, fileinto, or redirect.
section: "4.7"
rfc2119_level: MUST
topics:
    - email
