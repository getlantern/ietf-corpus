document: rfc-6364
kind: protocol-element
summary: 'The ''fec-source-flow'' SDP attribute (media-level) identifies a source flow within the FEC Framework. Its ABNF syntax is: "a=fec-source-flow:" SP "id=" src-id [";" SP "tag-len=" tlen], where src-id is a 32-bit non-negative integer and tlen is the Explicit Source FEC Payload ID length in octets.'
section: "4.4"
topics:
    - realtime
