document: rfc-6241
kind: protocol-element
summary: 'The <edit-config> ''operation'' attribute supports five values: merge (default — merge into existing), replace (overwrite at that level), create (error if already exists with data-exists tag), delete (error if not exists with data-missing tag), and remove (silent no-op if not exists).'
