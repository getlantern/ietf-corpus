document: rfc-6840
kind: normative-requirement
summary: Validators supporting algorithm identifiers DSA-NSEC3-SHA1, RSASHA1-NSEC3-SHA1, RSASHA256, or RSASHA512 MUST support both NSEC3 and NSEC responses, as these algorithm identifiers signal only that a zone might use NSEC3 rather than NSEC.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
