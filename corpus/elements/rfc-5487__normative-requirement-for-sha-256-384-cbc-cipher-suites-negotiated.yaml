document: rfc-5487
kind: normative-requirement
summary: For SHA-256/384 CBC cipher suites negotiated in TLS prior to version 1.2, the PRF from that version is used; when negotiated in TLS 1.2 or higher, the TLS PRF (RFC 5246) with SHA-256 or SHA-384 (matching the suite name) is used.
section: "3.1"
rfc2119_level: MUST
topics:
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
