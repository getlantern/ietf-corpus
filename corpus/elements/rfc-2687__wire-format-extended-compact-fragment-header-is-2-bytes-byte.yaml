summary: 'Extended compact fragment header is 2 bytes: byte 1 has R(1 bit), seq LSB(3 bits), class(3 bits), bit0=0; byte 2 has seq MSB(7 bits), bit0=1. The 10-bit sequence number (3 LSBs from byte 1, 7 MSBs from byte 2) supports multi-link operation.'
