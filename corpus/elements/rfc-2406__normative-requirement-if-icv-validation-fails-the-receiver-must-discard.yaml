document: rfc-2406
kind: normative-requirement
summary: If ICV validation fails, the receiver MUST discard the received IP datagram as invalid; this is an auditable event. The receiver MUST authenticate a packet before updating the Sequence Number window data when the packet is either inside the window and new, or outside the window on the right side.
section: 3.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
