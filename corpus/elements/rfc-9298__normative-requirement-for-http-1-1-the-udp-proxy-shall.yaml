document: rfc-9298
kind: normative-requirement
summary: 'For HTTP/1.1, the UDP proxy SHALL indicate success with status 101 (Switching Protocols), Connection: Upgrade, Upgrade: connect-udp, and the Capsule Protocol requirements. If any requirement is not met, the client MUST treat the attempt as failed and abort the connection.'
section: "3.3"
rfc2119_level: MUST
topics:
    - http
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
