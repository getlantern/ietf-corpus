document: rfc-2930
kind: protocol-element
summary: In GSS-API mode, resolver and server exchange TKEY queries and responses with GSS-API tokens in the key data field. GSS-API handles its own encryption and authentication, so TSIG/SIG(0) authentication of the TKEY exchange is optional. Inception and expiry times in GSS-API TKEY RRs are ignored.
section: "4.3"
topics:
