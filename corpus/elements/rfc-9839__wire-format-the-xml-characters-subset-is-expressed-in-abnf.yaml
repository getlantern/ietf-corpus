document: rfc-9839
kind: wire-format
summary: The 'XML Characters' subset is expressed in ABNF as %x9 / %xA / %xD / %x20-D7FF / %xE000-FFFD / %x10000-10FFFF. It excludes surrogates, legacy C0 controls, and the noncharacters U+FFFE and U+FFFF, but retains C1 controls and noncharacters above U+FFFF.
