document: rfc-8145
kind: normative-requirement
summary: When a validating recursive resolver receives a query with an edns-key-tag option whose Key Tag list differs from its own, it SHOULD forward both lists using separate instances of the edns-key-tag option code in the OPT RR.
section: 4.2.2.1
rfc2119_level: SHOULD
topics:
    - dns
    - security
