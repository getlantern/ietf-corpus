document: rfc-4480
kind: interoperability-note
summary: Due to XML Schema limitations, the RPID schema allows each element to appear anywhere within PIDF or data-model elements; Table 1 in Section 3.1 defines the semantically valid placement constraints (which elements may appear under <person>, <tuple>, or <device>) that the schema cannot enforce alone.
