document: rfc-2847
kind: interoperability-note
summary: When the LIPKEY caller sets anon_req_flag=TRUE, LIPKEY passes through all SPKM-3 outputs unchanged (including mech_type=SPKM-3), effectively bypassing LIPKEY entirely, because LIPKEY context tokens have no provision for anonymous initiators and SPKM-3 alone suffices.
section: 3.2.3.1
topics:
    - crypto
    - security
