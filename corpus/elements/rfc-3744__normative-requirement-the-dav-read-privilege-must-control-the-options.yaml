document: rfc-3744
kind: normative-requirement
summary: The DAV:read privilege MUST control the OPTIONS method in addition to GET and PROPFIND. Implementation-defined privileges controlling GET and PROPFIND MUST be aggregated under DAV:read.
section: "3.1"
rfc2119_level: MUST
