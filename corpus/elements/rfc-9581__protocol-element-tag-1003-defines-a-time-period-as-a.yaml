document: rfc-9581
kind: protocol-element
summary: Tag 1003 defines a time period as a CBOR array tagged with 1003, containing either two unwrapped Etime elements (start and end), or three elements where one of start/end is null and the third is an unwrapped Duration. Exactly two out of the three elements must be present and non-null.
