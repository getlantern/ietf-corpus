document: rfc-8397
kind: normative-requirement
summary: Usage of nickname space MUST be planned so that nicknames used in any one unique nickname area and Level 2 are never used in any other areas, including both unique nickname areas and aggregated nickname areas; nickname reuse is only allowed among aggregated nickname areas.
section: "5"
rfc2119_level: MUST
