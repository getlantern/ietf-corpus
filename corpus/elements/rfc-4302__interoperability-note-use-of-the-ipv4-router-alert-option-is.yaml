document: rfc-4302
kind: interoperability-note
summary: 'Use of the IPv4 Router Alert option is potentially incompatible with IPsec AH: although the option is classified as immutable, its use implies hop-by-hop packet processing by routers, which may modify the packet, and would require every router to be a member of a multicast SA.'
section: A1
topics:
    - ipsec
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
