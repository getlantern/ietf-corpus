document: rfc-9862
kind: design-rationale
summary: RFC 8231 Section 5.8.2's mandatory PCReq/PCRep exchange is made inapplicable to SR Policy LSPs because SR Policies are often provisioned via local config or BGP rather than computed on demand, so the request/reply round-trip adds unnecessary message exchanges and implementation complexity.
section: "5.3"
topics:
    - routing
    - mpls
