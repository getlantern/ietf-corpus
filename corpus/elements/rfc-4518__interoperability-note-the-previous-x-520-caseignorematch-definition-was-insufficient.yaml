document: rfc-4518
kind: interoperability-note
summary: 'The previous X.520 caseIgnoreMatch definition was insufficient for Unicode strings: different implementations could yield different results depending on whether they folded lowercase to uppercase or vice versa, and on how they defined ''space'' (only U+0020, any Zs character, or any WS category character).'
