document: rfc-6130
kind: normative-requirement
summary: If HELLO_INTERVAL increases, the next HELLO message on that interface MUST still be generated according to the previous shorter HELLO_INTERVAL to honor previously advertised timing promises until they expire.
section: "5.5"
rfc2119_level: MUST
