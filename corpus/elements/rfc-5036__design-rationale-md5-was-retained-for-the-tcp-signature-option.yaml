document: rfc-5036
kind: design-rationale
summary: MD5 was retained for the TCP signature option despite known collision vulnerabilities because the option was already deployed operationally and no algorithm-type field was defined in the original spec; the type field was omitted to avoid wasting scarce TCP option space.
section: 2.9.1
topics:
