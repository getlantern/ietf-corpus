document: rfc-4217
kind: normative-requirement
summary: A client MUST allow a user to override the timing of the AUTH, PBSZ, and PROT commands to suit a specific server. Clients SHOULD NOT insist on sending AUTH as the first command, nor insist on issuing PBSZ/PROT directly after AUTH.
section: "10.3"
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
