document: rfc-8139
kind: state-machine
summary: On becoming DRB, a TRILL switch sets its DRB inhibition timer to its port Holding Time; on losing DRB status, it sets the timer to expired. When receiving a Hello asserting Appointed Forwarder status on VLAN-x, the VLAN-x inhibition timer is set to the maximum of its current value and the received Holding Time. On enabling VLAN-x for the first time on a link, the VLAN-x inhibition timer is set to the port's Holding Time.
section: "3"
