document: rfc-4130
kind: security-consideration
summary: 40-bit encryption is considered weak and offers little security over plaintext; using weak cryptography is never recommended unless the only alternative is none. Processing software MUST take immediate, noticeable action to inform end users of certificate validation failures, including expired certs, revoked certs, invalid CRLs, or broken certificate chains.
section: "9"
topics:
