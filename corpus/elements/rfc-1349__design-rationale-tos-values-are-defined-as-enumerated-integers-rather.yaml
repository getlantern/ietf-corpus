document: rfc-1349
kind: design-rationale
summary: TOS values are defined as enumerated integers rather than independently settable bits to reclaim the many bit-combination values (which have no useful semantics) for future TOS definitions. This provides 11 additional values for future standardization while remaining compatible with RFC-791 single-bit semantics.
section: B.2
topics:
