document: rfc-7400
kind: security-consideration
summary: An attacker may forge a packet causing a node to believe a victim node is GHC capable when it is not, preventing packets from reaching the victim until NUD failure triggers fallback to basic 6LoWPAN-HC. With secured ND, the 6CIO is also secured, mitigating this attack.
