document: rfc-9410
kind: protocol-element
summary: The "ppi" parameter is defined for the Reason header field to carry a PASSporT object (either full form or compact form) that identifies which specific Identity header field is associated with a STIR verification error. The compact form consists of only the PASSporT signature prefixed by two periods.
