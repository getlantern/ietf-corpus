document: rfc-6330
kind: protocol-element
summary: 'The tuple generator Tuple[K'',X] derives (d,a,b,d1,a1,b1) from the systematic index J(K'') and ISI X using: A=53591+J*997 (forced odd), B=10267*(J+1), y=(B+X*A) mod 2^32, then Rand[] and Deg[] calls. This deterministically maps each ISI to its encoding coefficients.'
section: 5.3.5.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
