document: rfc-9127
kind: protocol-element
summary: BFD authentication configuration uses the 'auth-parms' grouping with a 'key-chain' leaf (reference to RFC 8177 key-chain model) and a 'meticulous' boolean leaf. The authentication container is guarded by the 'authentication' feature and uses presence semantics to enable authentication.
