document: rfc-6705
kind: normative-requirement
summary: LREs MUST override the Binding Update List (BUL) entries for the specific HNPs identified in the LRI message so that all matching traffic is forwarded locally. If the MAG is unable to deliver packets using LREs, it MUST fall back to using the BUL entry.
section: "5"
rfc2119_level: MUST
topics:
    - mobility
