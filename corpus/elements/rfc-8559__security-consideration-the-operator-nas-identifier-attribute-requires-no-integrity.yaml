document: rfc-8559
kind: security-consideration
summary: The Operator-NAS-Identifier attribute requires no integrity protection or replay detection. Modification or replay of this attribute will either have no effect or cause the erroneous transaction to be rejected. Security of the overall system is bounded by the underlying RADIUS protocol's security properties.
section: "6.2"
topics:
    - radius
    - security
    - privacy
