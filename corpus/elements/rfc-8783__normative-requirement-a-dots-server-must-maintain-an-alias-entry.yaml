document: rfc-8783
kind: normative-requirement
summary: A DOTS server MUST maintain an alias entry for at least 10080 minutes (1 week). If no refresh request is received from the DOTS client before expiry, the DOTS server removes the expired entry.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
