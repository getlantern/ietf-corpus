document: rfc-8076
kind: protocol-element
summary: The AccessControlListItem structure contains an optional ResourceNameExtension, a 'to_user' field (opaque, up to 2^16-1 octets) identifying the authorized user, a 'kind' field (KindId) for the shared resource, and a Boolean 'allow_delegation' flag indicating whether the authorized peer may further delegate access.
