document: rfc-9909
kind: design-rationale
summary: NIST defined separate OIDs for each combination of security level, fast vs. small, SHA-2 vs. SHAKE256, and pure vs. pre-hash mode rather than using parameters to distinguish them. This means 24 distinct OIDs total, consistent with the approach taken for other PQC algorithms like ML-DSA (RFC 9881).
