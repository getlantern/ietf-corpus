summary: 'The Configuration Option Format (RFC 3544) for IPHC/CRTP/ECRTP contains: Type (1 octet, value 2), Length (>=14), IP-Compression-Protocol (0x0061), TCP_SPACE (2 octets, max CID for TCP, suggested 15), NON_TCP_SPACE (2 octets, max CID for non-TCP, suggested 15), F_MAX_PERIOD (2 octets, suggested 256), F_MAX_TIME (2 octets, suggested 5 seconds), MAX_HEADER (2 octets, suggested 168 octets), followed by suboptions.'
