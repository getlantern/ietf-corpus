document: rfc-6630
kind: protocol-element
summary: CAP-Identifier TLV (Type 11) carries the Fully Qualified Domain Name (FQDN) of a Candidate Attachment Point encoded as specified in Section 8 of RFC 3315 (DHCPv6). It appears in EAP-Initiate/Re-auth, as a sub-TLV of ERP/AAK-Key in EAP-Finish/Re-auth, and optionally in EAP-Initiate/Re-auth-Start.
section: "5.2"
topics:
    - security
