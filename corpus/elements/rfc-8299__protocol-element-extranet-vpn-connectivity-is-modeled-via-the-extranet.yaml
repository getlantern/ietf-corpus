document: rfc-8299
kind: protocol-element
summary: Extranet VPN connectivity is modeled via the `extranet-vpns` container under a customer VPN. Configuring VPN A to list VPN B as an extranet grants VPN A's sites access to VPN B's resources; as a side-effect, all VPN B sites also gain access to all VPN A sites. No configuration is required on VPN B itself. More selective cross-VPN access requires a VPN policy.
section: 6.2.4
topics:
    - yang
    - vpn
