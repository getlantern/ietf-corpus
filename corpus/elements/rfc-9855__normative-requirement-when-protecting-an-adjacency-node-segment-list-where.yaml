document: rfc-9855
kind: normative-requirement
summary: When protecting an [Adjacency, Node] segment list where the next segment is node(T), S MUST apply a NEXT operation on the Adjacency segment for S-F, followed by a PUSH of an RL redirecting traffic to a node Q whose path to node(T) is unaffected by the failure.
section: 6.2.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
