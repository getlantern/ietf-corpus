document: rfc-2273
kind: design-rationale
summary: A proxy forwarder application has no need of a detailed MIB view definition because it forwards requests based solely on contextEngineID/contextName, irrespective of individual managed object types. In contrast, a command responder must have the MIB view to process objects correctly.
section: "1.5"
topics:
    - snmp
