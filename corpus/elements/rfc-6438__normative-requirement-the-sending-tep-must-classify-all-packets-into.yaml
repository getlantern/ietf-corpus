document: rfc-6438
kind: normative-requirement
summary: The sending TEP MUST classify all packets into flows once it has determined they should enter a given tunnel, then write the relevant flow label into the outer IPv6 header. The choice of 2-tuple, 5-tuple, or 3-tuple for flow identification is an implementation choice.
section: "3"
rfc2119_level: MUST
topics:
    - ip
