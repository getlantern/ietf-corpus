document: rfc-8533
kind: protocol-element
summary: The `continuity-check` RPC output `response-info` container holds mandatory `protocol-id` and `status-code` leaves (both identityref), a mandatory `status-sub-code` leaf, and an optional `protocol-id-meta-data` leaf. It also reuses the `continuity-check-data` grouping from RFC 8532 for session statistics.
