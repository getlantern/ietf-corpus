document: rfc-5905
kind: normative-requirement
summary: All fully NTPv4-compliant servers and clients MUST implement the entire suite of algorithms described in the specification. Secondary servers SHOULD be fully NTPv4-compliant to maintain stability in large NTP subnets. Alternative algorithms MAY be used only if their output is identical to those specified.
section: "2"
rfc2119_level: MUST
topics:
    - ntp
