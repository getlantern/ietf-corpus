document: rfc-4033
kind: protocol-element
summary: A Trust Anchor is a configured DNSKEY RR or DS RR hash of a DNSKEY RR that a validating resolver uses as the starting point for building an authentication chain. Trust anchors must be obtained via secure means outside the DNS protocol.
