summary: 'IANA administers the NHRP extension Type space: 0x0000–0x0FFF (Reserved for NHRP), 0x1000–0x11FF (ATM Forum), 0x1200–0x37FF (IETF reserved, IANA-administered), 0x3800–0x3FFF (Experimental, local significance only). NHRP packet type values 128–255 in ar$op.type are also IANA-administered for research use.'
