document: rfc-8508
kind: normative-requirement
summary: Servers implementing both REPLACE and OBJECTID (RFC 8474) MUST return different EMAILIDs for the replaced and replacing messages, unless the server detects that both messages' immutable content is identical per Section 5.1 of RFC 8474.
section: "4.6"
rfc2119_level: MUST
topics:
    - email
