document: rfc-8315
kind: normative-requirement
summary: The hash algorithm "sha256" is mandatory to implement. Implementations SHOULD NOT use "sha224" or "sha384" to generate <scheme> values, as these are truncated variants registered only because existing implementations support them.
section: "2"
rfc2119_level: SHOULD NOT
