document: rfc-6228
kind: design-rationale
summary: The 199 response is explicitly an optimization, not a reliability mechanism. Because it is normally sent unreliably (and cannot be sent reliably when generated by a proxy), some or all 199 responses may be lost. Applications MUST ensure an acceptable user experience if every 199 response is lost.
section: "3"
topics:
