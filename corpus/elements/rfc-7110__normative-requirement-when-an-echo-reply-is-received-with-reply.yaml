document: rfc-7110
kind: normative-requirement
summary: When an echo reply is received with Reply Mode 'Reply via Specified Path', return code 'successfully sent via specified path', and the return path is an MPLS LSP, the ingress LSR MUST perform FEC validation based on the FEC Stack information in the Reply Path TLV, following the ping-mode FEC validation process of RFC 4379.
section: "5.4"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
