document: rfc-9234
kind: normative-requirement
summary: Customer and Peer roles MUST NOT propagate routes learned from Providers, Peers, or RSes to other Providers, Peers, or RSes. Only routes from Customers or locally originated routes MAY be propagated upward or laterally.
section: "3.1"
rfc2119_level: MUST NOT
topics:
