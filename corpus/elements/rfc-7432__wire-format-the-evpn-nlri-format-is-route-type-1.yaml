document: rfc-7432
kind: wire-format
summary: 'The EVPN NLRI format is: Route Type (1 octet), Length (1 octet), Route Type specific field (variable). It is carried in MP-BGP with AFI 25 (L2VPN) and SAFI 70 (EVPN). Four route types are defined: Ethernet A-D (1), MAC/IP Advertisement (2), Inclusive Multicast Ethernet Tag (3), Ethernet Segment (4).'
