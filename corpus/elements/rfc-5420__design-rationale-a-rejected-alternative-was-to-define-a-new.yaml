document: rfc-5420
kind: design-rationale
summary: A rejected alternative was to define a new C-Type for the SESSION_ATTRIBUTE object with a larger Flags field. This was rejected because a new C-Type is not backward compatible with deployed implementations expecting C-Type 1 or 7, and because adding TLV-based arbitrary attribute parameters would have constituted a significant change to the existing object.
section: "1.2"
topics:
