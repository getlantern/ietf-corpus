document: rfc-8870
kind: normative-requirement
summary: Outbound packets SHOULD continue to use the old SRTP master key for 250 ms after sending any new key in a FullEKTField. This gives receivers time to obtain the new key before it is used for encryption.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
