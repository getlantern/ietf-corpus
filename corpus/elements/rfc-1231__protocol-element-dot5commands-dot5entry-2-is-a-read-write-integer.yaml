document: rfc-1231
kind: protocol-element
summary: 'dot5Commands (dot5Entry 2) is a read-write INTEGER supporting four values: no-op(1), open(2), reset(3), and close(4). Setting open causes the station to enter the open state; reset retains MIB counter values if possible; close removes the station from the ring. When read, always returns no-op(1).'
section: "5"
