document: rfc-1413
kind: normative-requirement
summary: A server SHOULD NOT send more than 512 octets of user ID; a client MUST accept at least 512 octets. When the identifier exceeds 512 octets, the server MUST return the most significant portion in the first 512 octets.
section: "5"
rfc2119_level: SHOULD
topics:
    - tcp
