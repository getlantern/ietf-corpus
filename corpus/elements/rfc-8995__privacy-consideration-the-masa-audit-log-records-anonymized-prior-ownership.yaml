document: rfc-8995
kind: privacy-consideration
summary: The MASA audit-log records anonymized prior ownership history per device and is accessible by the registrar (Section 5.8). It reveals that a device exists and has been bootstrapped, allowing the manufacturer to infer deployment patterns. The log uses a hashed domainID rather than the raw registrar certificate to limit direct identification of domain owners.
section: "10.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
