document: rfc-8999
kind: wire-format
summary: The QUIC short header begins with a Header Form bit set to 0, followed by 7 version-specific bits, a Destination Connection ID of length not encoded in the packet (version-specific), and version-specific data. The short header carries no Source Connection ID, no DCID Length field, and no Version field.
section: "5.2"
