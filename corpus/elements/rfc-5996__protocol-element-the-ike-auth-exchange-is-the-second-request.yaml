document: rfc-5996
kind: protocol-element
summary: The IKE_AUTH exchange is the second request/response pair, transmitting identities (IDi, IDr), proving knowledge of secrets via AUTH payloads, and establishing the first Child SA using SA, TSi, TSr payloads. All payloads after the header are encrypted and integrity-protected with keys derived in IKE_SA_INIT.
