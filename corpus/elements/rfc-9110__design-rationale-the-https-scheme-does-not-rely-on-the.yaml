document: rfc-9110
kind: design-rationale
summary: The 'https' scheme does not rely on the TCP port number to associate authority because the port is outside the secured communication channel and cannot be trusted as definitive. Authority is established solely by TLS certificate verification, allowing HTTPS to operate over any secured transport, not just TCP.
section: 4.3.3
topics:
    - http
    - tls
    - security
