document: rfc-1808
kind: normative-requirement
summary: If retrieval of the base document was the result of a redirected request, the last URL used (i.e., that which resulted in actual retrieval) SHALL be considered the base URL, not the original request URL.
section: "3.3"
rfc2119_level: MUST
topics:
