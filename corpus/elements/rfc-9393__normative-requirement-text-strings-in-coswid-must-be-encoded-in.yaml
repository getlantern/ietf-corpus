document: rfc-9393
kind: normative-requirement
summary: Text strings in CoSWID MUST be encoded in UTF-8 consistent with the Net-Unicode definition in RFC 5198. All names registered with IANA for CoSWID MUST also be valid XML Schema NMTOKEN values to ensure compatibility with the SWID specification.
section: "2.1"
rfc2119_level: MUST
topics:
    - cbor
