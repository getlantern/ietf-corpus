document: rfc-9339
kind: normative-requirement
summary: When using multi-topology OSPF, a router MUST NOT include more than one instance of the Reverse Metric TLV per MTID. If more than one instance per MTID is present, the receiving router MUST only use the value from the first instance and ignore the others.
section: "6"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
