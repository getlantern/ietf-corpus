document: rfc-1516
kind: design-rationale
summary: The group/port numbering scheme follows the IEEE 802.3 Repeater Management draft, allowing implementors to represent field-replaceable modules as groups so that port numbering matches modular hardware. This mapping is recommended but optional; an implementor may put all ports in a single group.
section: 2.1.3
