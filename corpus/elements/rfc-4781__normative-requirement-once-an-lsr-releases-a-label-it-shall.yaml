document: rfc-4781
kind: normative-requirement
summary: Once an LSR releases a label, it SHALL NOT re-use that label for advertising a <label, FEC> binding to a neighbor that supports graceful restart for at least the Restart Time advertised by that neighbor. This rule applies to any label release at any time.
section: "6"
rfc2119_level: MUST NOT
topics:
    - bgp
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
