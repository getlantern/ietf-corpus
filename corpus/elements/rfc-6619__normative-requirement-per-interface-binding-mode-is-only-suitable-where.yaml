document: rfc-6619
kind: normative-requirement
summary: Per-interface binding mode is only suitable where user devices connect over point-to-point links. If supported, this mode SHOULD be configurable and SHOULD be disabled by default in general-purpose NAT devices.
section: "4"
rfc2119_level: SHOULD
