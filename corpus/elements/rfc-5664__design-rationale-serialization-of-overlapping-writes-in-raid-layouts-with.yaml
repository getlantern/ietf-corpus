document: rfc-5664
kind: design-rationale
summary: Serialization of overlapping writes in RAID layouts with parity (RAID-4, RAID-5, RAID-PQ) or mirroring is the responsibility of the metadata server rather than the clients. For example, the server enforces this by not granting overlapping write layouts within mirrored objects to different clients.
section: 5.4.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
