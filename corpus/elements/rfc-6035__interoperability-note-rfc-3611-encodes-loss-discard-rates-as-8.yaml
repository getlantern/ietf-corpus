document: rfc-6035
kind: interoperability-note
summary: RFC 3611 encodes loss/discard rates as 8-bit fixed-point numbers (value = (losses/expected) * 256). To map these to vq-rtcpxr percentage parameters, divide the RFC 3611 value by 256 and take the integer part.
section: 4.6.2.1
