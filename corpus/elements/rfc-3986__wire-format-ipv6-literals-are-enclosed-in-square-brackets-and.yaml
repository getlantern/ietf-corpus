document: rfc-3986
kind: wire-format
summary: IPv6 literals are enclosed in square brackets and encoded as eight colon-separated 16-bit hex pieces; consecutive zero groups may be elided with "::". IPv4 address in dotted-decimal notation (four dec-octets 0–255 separated by ".") is the only allowed dotted form.
