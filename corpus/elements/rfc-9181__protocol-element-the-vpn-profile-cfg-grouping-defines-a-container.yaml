document: rfc-9181
kind: protocol-element
summary: 'The ''vpn-profile-cfg'' grouping defines a container ''valid-provider-identifiers'' holding lists of profile identifier references: external-connectivity-identifier, encryption-profile-identifier, qos-profile-identifier, bfd-profile-identifier, forwarding-profile-identifier, and routing-profile-identifier. The grouping applies nacm:default-deny-write to protect profile bindings.'
