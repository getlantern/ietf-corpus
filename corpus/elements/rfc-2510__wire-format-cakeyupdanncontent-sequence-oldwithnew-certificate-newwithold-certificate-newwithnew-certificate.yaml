kind: wire-format
summary: 'CAKeyUpdAnnContent ::= SEQUENCE { oldWithNew Certificate, newWithOld Certificate, newWithNew Certificate } carries the three transitional certificates needed when a CA updates its key pair: old public key signed with new private key, new public key signed with old private key, and new public key signed with new private key.'
