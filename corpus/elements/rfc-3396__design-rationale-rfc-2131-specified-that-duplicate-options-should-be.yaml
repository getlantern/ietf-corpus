document: rfc-3396
kind: design-rationale
summary: RFC 2131 specified that duplicate options should be concatenated but did not define the ordering. RFC 3396 fills this gap by mandating sequential ordering so that implementations produce deterministic, interoperable results when reassembling long options.
section: "1"
