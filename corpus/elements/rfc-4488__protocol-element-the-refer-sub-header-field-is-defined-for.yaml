document: rfc-4488
kind: protocol-element
summary: The 'Refer-Sub' header field is defined for use within a REFER transaction only. When set to 'false', it signals that the REFER-Issuer requests that the REFER-Recipient not establish an implicit subscription and the resultant dialog.
