document: rfc-9114
kind: interoperability-note
summary: HTTP/3 does not support the HTTP Upgrade mechanism or the 101 (Switching Protocols) status code. The CONNECT method is supported but operates over a single QUIC stream rather than converting an entire connection into a tunnel as in HTTP/1.x.
section: "4.5"
topics:
    - http
