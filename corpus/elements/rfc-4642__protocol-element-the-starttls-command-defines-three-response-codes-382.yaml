document: rfc-4642
kind: protocol-element
summary: 'The STARTTLS command defines three response codes: 382 (continue with TLS negotiation), 502 (command unavailable, e.g., TLS already active or authentication has occurred), and 580 (cannot initiate TLS negotiation). The server MUST NOT return 480 or 483 in response to STARTTLS.'
section: 2.2.1
topics:
