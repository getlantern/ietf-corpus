document: rfc-9445
kind: security-consideration
summary: The Value fields of the DHCP*-Options Attributes are encoded in the clear and not encrypted (unlike, for example, the Tunnel-Password Attribute). Sensitive DHCP option data transmitted in these attributes is not protected at the RADIUS attribute level.
section: "3"
topics:
    - radius
    - security
