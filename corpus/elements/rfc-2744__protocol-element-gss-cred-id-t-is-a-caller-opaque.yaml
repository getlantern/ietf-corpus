document: rfc-2744
kind: protocol-element
summary: gss_cred_id_t is a caller-opaque credential handle implemented as a pointer or arithmetic type. A credential may contain at most one credential-element per supported mechanism; each element holds two credential-references—one for initiating and one for accepting contexts.
section: "3.5"
topics:
    - security
