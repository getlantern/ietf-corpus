document: rfc-6910
kind: security-consideration
summary: CC may enhance SPIT by allowing attackers to use CC callbacks (more likely to connect) as a high-yield follow-up to mass calling attempts. To prevent DoS via unauthorized SUBSCRIBE/PUBLISH suspending other callers' CC entries, SIP Identity (RFC 4474) is RECOMMENDED; P-Asserted-Identity (RFC 3325) is an alternative within trusted domains.
section: "11"
topics:
    - sip
    - security
    - voip
