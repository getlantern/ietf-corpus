document: rfc-9555
kind: protocol-element
summary: JSPTR is a new vCard parameter used exclusively on JSPROP. Its value is a JSON pointer (RFC 6901) that identifies the JSContact property within the Card object corresponding to the JSPROP value. The pointer MUST NOT reference into an array.
section: 3.3.2
topics:
