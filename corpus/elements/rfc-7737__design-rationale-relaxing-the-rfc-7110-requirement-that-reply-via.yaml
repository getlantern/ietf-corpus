document: rfc-7737
kind: design-rationale
summary: 'Relaxing the RFC 7110 requirement that ''Reply via Specified Path'' (value=5) must always carry a Reply Path TLV creates a simple shorthand: value=5 alone means ''use the reverse LSP'', avoiding the overhead of constructing a Reply Path TLV with the B bit set for the common bidirectional-LSP case.'
section: "3.1"
topics:
    - mpls
