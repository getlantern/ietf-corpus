document: rfc-1542
kind: interoperability-note
summary: On IEEE 802.5 Token Ring networks, BOOTP clients SHOULD send BOOTREQUEST with an All Routes Explorer RIF to enable servers/relay agents to cache the return route. BOOTREPLY messages SHOULD be sent to the client's hardware address using a Spanning Tree Rooted RIF when the return route cannot be cached.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
