document: rfc-3214
kind: normative-requirement
summary: At LSRs between route divergence points Rj and Rk during reroute modification, the LSPID TLV must still be updated and passed on to the next LSR as the Label Release message is propagated, even where only original-route labels exist.
section: "3.2"
rfc2119_level: MUST
topics:
