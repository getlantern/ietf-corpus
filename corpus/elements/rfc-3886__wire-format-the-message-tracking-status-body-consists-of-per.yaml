document: rfc-3886
kind: wire-format
summary: 'The message/tracking-status body consists of per-message fields followed by a blank line, then one or more groups of per-recipient fields each preceded by a blank line. Formally: tracking-status-content = per-message-fields 1*( CRLF per-recipient-fields ).'
