document: rfc-5015
kind: normative-requirement
summary: A BIDIR-PIM capable router MUST include the Bidirectional Capable PIM-Hello option (OptionType 22) in all Hello messages. If a neighbor's Hello lacks this option, the error MUST be logged to the router administrator in a rate-limited manner.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
