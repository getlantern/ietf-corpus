document: rfc-8308
kind: normative-requirement
summary: Implementations MUST accept well-formed SSH_MSG_EXT_INFO messages up to the maximum packet length they accept, as the cumulative size of the message is bounded only by the implementation's maximum packet length per RFC 4253.
section: "2.5"
rfc2119_level: MUST
topics:
