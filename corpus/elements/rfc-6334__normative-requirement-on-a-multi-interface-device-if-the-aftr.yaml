document: rfc-6334
kind: normative-requirement
summary: On a multi-interface device, if the AFTR-Name option is received on multiple interfaces, the B4 system MUST configure a separate DS-Lite tunnel for each interface, since each tunnel provides IPv4 connectivity for a distinct interface.
section: "5"
rfc2119_level: MUST
topics:
