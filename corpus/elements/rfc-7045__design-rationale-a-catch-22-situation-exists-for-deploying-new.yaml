document: rfc-7045
kind: design-rationale
summary: 'A ''Catch-22'' situation exists for deploying new extension headers: they cannot be widely deployed because middleboxes will drop them, but middleboxes will not be updated until the header is proved safe and useful, which is impossible until middleboxes are updated. This document addresses the problem by clarifying forwarding requirements and establishing a registry.'
