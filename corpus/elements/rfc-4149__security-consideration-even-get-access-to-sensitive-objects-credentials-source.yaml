document: rfc-4149
kind: security-consideration
summary: Even GET access to sensitive objects (credentials, source/destination addresses, routing options) should be controlled and the values encrypted in transit. Not all SNMP versions provide this capability, reinforcing the recommendation to use SNMPv3 with authentication and privacy.
section: "8"
topics:
