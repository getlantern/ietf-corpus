document: rfc-2911
kind: normative-requirement
summary: An IPP implementation MUST support at least one document per Job object and MAY support multiple documents. If multiple documents are supported, the 'multiple-document-jobs-supported' boolean Printer attribute MUST be set accordingly.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
