document: rfc-9171
kind: design-rationale
summary: BP is designed as a store-carry-forward overlay network sitting at the application layer of constituent networks, rather than as a conventional internet protocol. This enables operation under intermittent connectivity, large variable delays, and high bit error rates by allowing physical motility to carry data and decoupling sender/receiver concurrent presence.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
