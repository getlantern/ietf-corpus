document: rfc-8724
kind: design-rationale
summary: 'Multiple F/R modes (No-ACK, ACK-Always, ACK-on-Error) are provided to accommodate the range of LPWAN link characteristics: No-ACK suits unidirectional or variable-MTU links with no feedback; ACK-Always suits reliable bidirectional links; ACK-on-Error suits out-of-order variable-MTU links requiring error recovery.'
section: "8.4"
