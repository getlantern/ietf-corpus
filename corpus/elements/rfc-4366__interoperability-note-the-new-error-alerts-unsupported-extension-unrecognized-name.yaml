document: rfc-4366
kind: interoperability-note
summary: The new error alerts (unsupported_extension, unrecognized_name, certificate_unobtainable, bad_certificate_status_response, bad_certificate_hash_value) MUST NOT be sent unless the sending party has received an extended hello message from the peer, to avoid breaking non-extension-aware implementations.
