document: rfc-4556
kind: normative-requirement
summary: If a revoked certificate is detected, the KDC MUST return KDC_ERR_REVOKED_CERTIFICATE; if revocation status cannot be determined, it SHOULD return KDC_ERR_REVOCATION_STATUS_UNKNOWN. The invalid/revoked certificates are identified using TD_INVALID_CERTIFICATES typed data.
section: 3.2.2
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
