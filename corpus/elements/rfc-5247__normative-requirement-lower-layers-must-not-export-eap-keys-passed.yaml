document: rfc-5247
kind: normative-requirement
summary: Lower layers MUST NOT export EAP keys passed down by EAP methods; EAP keying material passed to a lower layer MUST NOT be used within another lower layer or transported to another entity. The EAP layer and peer/authenticator layers MUST NOT modify or cache keying material (including channel bindings) passing between the method layer and the lower or AAA layer in either direction.
section: "2"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
