document: rfc-2907
kind: normative-requirement
summary: 'Each MADCAP server SHOULD define two independent pieces of state for each scope pair: whether X nests inside Y, and whether Y nests inside X. The fourth nesting case (mutual nesting) SHOULD be interpreted as the two scopes sharing the same border.'
section: "2"
rfc2119_level: SHOULD
