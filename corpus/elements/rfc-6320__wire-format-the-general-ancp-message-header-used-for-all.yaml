document: rfc-6320
kind: wire-format
summary: 'The general ANCP message header (used for all non-adjacency messages) contains: Version (8 bits), Message Type (8 bits), Result (4 bits), Result Code (12 bits), Partition ID (8 bits), Transaction Identifier (24 bits), I flag + SubMessage Number (1 + 15 bits), and Length (16 bits), followed by the message payload.'
