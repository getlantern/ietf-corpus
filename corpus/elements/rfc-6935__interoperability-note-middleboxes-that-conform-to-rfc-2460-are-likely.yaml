document: rfc-6935
kind: interoperability-note
summary: Middleboxes that conform to RFC 2460 are likely to discard datagrams with a zero UDP checksum. Tunnel protocols intending to use zero UDP checksum MUST define a method for handling cases when a middlebox prevents the path from supporting such datagrams.
section: "4.3"
topics:
    - ip
    - udp
