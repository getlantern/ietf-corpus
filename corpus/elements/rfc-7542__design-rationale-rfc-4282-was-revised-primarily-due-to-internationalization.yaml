document: rfc-7542
kind: design-rationale
summary: 'RFC 4282 was revised primarily due to internationalization failures: its ABNF restricted realms to ASCII conflicting with EAP and RADIUS (both 8-bit clean and UTF-8 recommending); it required language-specific mappings impossible for intermediate nodes; its normalization requirements conflicted with local system requirements; and no AAA client, proxy, or server had implemented its Section 2.4 requirements.'
section: "1.4"
