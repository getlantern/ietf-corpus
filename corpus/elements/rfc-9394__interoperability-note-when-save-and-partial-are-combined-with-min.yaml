document: rfc-9394
kind: interoperability-note
summary: When SAVE and PARTIAL are combined with MIN or MAX (without COUNT), the PARTIAL and MIN/MAX results are returned, and the "$" marker contains references to all PARTIAL messages plus the MIN/MAX message. When combined with both MIN and MAX (without COUNT), all three result options are returned and "$" includes PARTIAL, MIN, and MAX messages.
section: "3.2"
topics:
    - email
