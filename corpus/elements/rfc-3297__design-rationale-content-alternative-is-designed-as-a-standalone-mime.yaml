document: rfc-3297
kind: design-rationale
summary: Content-alternative is designed as a standalone MIME header, independent of the MDN Alternative-available option, so that it can be used with other protocols having nothing to do with email or MDN. It indicates that alternatives exist without specifying how to obtain them.
section: 3.1.3
topics:
    - email
