document: rfc-4643
kind: normative-requirement
summary: After successful authentication, the client MUST NOT issue a MODE READER command, and the server MUST NOT advertise the MODE-READER capability. The server MUST continue to advertise the SASL capability with the same list of mechanisms as before authentication.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - security
