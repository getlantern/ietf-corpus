document: rfc-6157
kind: normative-requirement
summary: An IPv6 node SHOULD be able to send and receive media using IPv4 addresses; if it cannot, it SHOULD support STUN relay usage (TURN for IPv6, RFC 6156) to indirectly exchange media over IPv4.
section: "4"
rfc2119_level: SHOULD
