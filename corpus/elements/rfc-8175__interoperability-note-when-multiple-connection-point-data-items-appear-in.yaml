document: rfc-8175
kind: interoperability-note
summary: When multiple Connection Point Data Items appear in a Peer Offer Signal, routers SHOULD prioritize IPv6 connection points over IPv4. DLEP RECOMMENDED that implementations use IPv6 link-local addresses to reduce address-assignment administrative burden. Peer Discovery Signals SHOULD also prefer IPv6 when the router supports both.
section: "7.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
