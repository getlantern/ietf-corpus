document: rfc-4588
kind: normative-requirement
summary: If the original RTP header carried profile-specific extensions or an RTP header extension, the retransmission packet SHOULD include the same extensions immediately after the fixed RTP header. The retransmission payload header MUST be placed after any such extensions.
section: "4"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
