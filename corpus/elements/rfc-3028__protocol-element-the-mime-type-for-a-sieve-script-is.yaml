document: rfc-3028
kind: protocol-element
summary: The MIME type for a Sieve script is 'application/sieve'. Scripts are UTF-8 encoded; quoted-printable is appropriate for transport systems requiring 7-bit encoding. The conventional file extension is '.siv'.
