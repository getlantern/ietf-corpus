document: rfc-4206
kind: protocol-element
summary: FAs may be represented as either unnumbered or numbered links. If numbered with IPv4 addresses, the local and remote addresses come from a /31 allocated by the LSR originating the FA-LSP; the head-end address is the IPv4 tunnel sender address.
