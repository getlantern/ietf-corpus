document: rfc-3729
kind: interoperability-note
summary: When HTTP filtering is active, some HTTP transactions may be counted twice—once under a filter-defined virtual application and again under the generic HTTP application. If filter entries overlap, transactions may be counted additional times. Implementors and operators must account for this double-counting in analysis.
section: "3"
topics:
    - snmp
    - http
    - measurement
