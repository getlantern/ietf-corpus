document: rfc-5028
kind: design-rationale
summary: Unlike a traditional telephone number, an 'im:' URI resource may require cryptographic credentials for authentication and authorization before messages are exchanged. ENUM with IM protocols can therefore provide greater protection from unwanted callers than the PSTN, despite ENUM records being publicly available.
section: "3"
topics:
    - security
    - realtime
    - dns
