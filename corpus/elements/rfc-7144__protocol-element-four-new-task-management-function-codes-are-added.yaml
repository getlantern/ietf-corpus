document: rfc-7144
kind: protocol-element
summary: 'Four new task management function codes are added: QUERY TASK (9) — checks if a specific task is in the task set; QUERY TASK SET (10) — checks if any command is present in the task set; I_T NEXUS RESET (11) — performs an I_T nexus loss function; QUERY ASYNCHRONOUS EVENT (12) — checks for pending unit attention or deferred error.'
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
