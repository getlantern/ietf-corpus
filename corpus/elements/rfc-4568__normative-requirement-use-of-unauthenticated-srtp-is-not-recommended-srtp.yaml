document: rfc-4568
kind: normative-requirement
summary: Use of UNAUTHENTICATED_SRTP is NOT RECOMMENDED. SRTP requires authentication for SRTCP but not for SRTP; unauthenticated SRTP combined with late binding exposes sessions to easy denial-of-service attacks.
section: 6.3.3
rfc2119_level: SHOULD NOT
topics:
    - security
    - realtime
    - rtp
