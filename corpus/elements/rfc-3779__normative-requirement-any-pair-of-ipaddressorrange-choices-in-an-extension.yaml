document: rfc-3779
kind: normative-requirement
summary: Any pair of IPAddressOrRange choices in an extension MUST NOT overlap. Any contiguous address prefixes or ranges MUST be combined into a single range or, whenever possible, a single prefix. The addressesOrRanges SEQUENCE MUST be sorted by the binary representation of the lowest IP address concatenated with the prefix length.
section: 2.2.3.6
rfc2119_level: MUST NOT
topics:
    - pkix
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
