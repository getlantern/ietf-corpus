document: rfc-5797
kind: design-rationale
summary: The FEAT String registration item is optional because in many cases the FEAT string consists solely of the FEAT Code itself, making the field redundant. It should only be specified when the FEAT string contains mandatory elements beyond the FEAT Code (e.g., REST STREAM for REST+, or AUTH TLS for AUTH+).
section: "2.2"
topics:
    - registry
