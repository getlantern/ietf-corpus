document: rfc-3585
kind: protocol-element
summary: 'IPsecAction is the abstract base for IPsecTransportAction and IPsecTunnelAction. Key properties: UsePFS (boolean), UseIKEGroup (reuse phase 1 DH group for phase 2 PFS), GroupId (16-bit; vendor range 32768–65535 requires VendorID), and Granularity (1=subnet, 2=address, 3=protocol, 4=port) controlling how the SA selector is derived from the triggering packet.'
