summary: 'The operationType extends operationEnum (token-restricted enumeration) with an optional ''op'' attribute of type token for sub-operations. The caseIdType extends token with a required ''type'' attribute (caseTypeEnum: udrp, urs, custom) and optional ''name'' attribute of type token.'
