document: rfc-5506
kind: interoperability-note
summary: Middle boxes may discard RTCP that does not begin with payload type 200 or 201 (SR or RR). When Reduced-Size RTCP starts with a different payload type, such boxes may treat it as unknown and drop it while passing compound RTCP through.
section: 3.4.1
topics:
    - rtp
    - realtime
