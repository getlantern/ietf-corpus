document: rfc-2515
kind: design-rationale
summary: atmTrafficQoSClass (RFC 1695) was deprecated and replaced by atmServiceCategory because new insights in ATM traffic management rendered the four QoS class model (A/B/C/D) insufficient; service categories provide a richer and more standards-aligned characterization of VPL/VCL traffic.
