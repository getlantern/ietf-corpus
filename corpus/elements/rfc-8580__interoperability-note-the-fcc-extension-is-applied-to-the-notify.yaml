document: rfc-8580
kind: interoperability-note
summary: The FCC extension is applied to the Notify action (RFC 5435). Messages generated using the mailto notification method are MIME-compliant and can be filed without modification, but messages from other methods (e.g., xmpp) MUST be encapsulated per Section 4.
