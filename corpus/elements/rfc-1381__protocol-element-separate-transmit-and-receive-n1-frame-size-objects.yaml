kind: protocol-element
summary: Separate transmit and receive N1 frame-size objects (lapbAdmnTransmitN1FrameSize, lapbAdmnReceiveN1FrameSize) specify the maximum frame size in bits, excluding flags and zero-bit fill for transparency. Default is 36000 bits (4500 octets, matching the 802.5 frame size).
