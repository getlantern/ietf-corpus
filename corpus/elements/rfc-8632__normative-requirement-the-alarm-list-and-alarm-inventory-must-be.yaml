document: rfc-8632
kind: normative-requirement
summary: The alarm-list and alarm-inventory MUST be implemented by any system supporting this module. All other data model features (operator-actions, alarm-shelving, alarm-history, alarm-summary, alarm-profile, severity-assignment) are conditional YANG features.
