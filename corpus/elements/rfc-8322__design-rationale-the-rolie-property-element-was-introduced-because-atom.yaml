document: rfc-8322
kind: design-rationale
summary: The rolie:property element was introduced because atom:category, which uses scheme/term/label to represent categorical name/value pairs with a finite set of label values, is unsuitable for properties with unbounded values such as content-specific identifiers. A distinct element supporting arbitrary text values was necessary to represent such metadata.
section: 6.2.4
topics:
    - http
