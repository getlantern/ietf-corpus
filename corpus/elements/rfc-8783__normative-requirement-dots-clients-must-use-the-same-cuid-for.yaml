document: rfc-8783
kind: normative-requirement
summary: DOTS clients MUST use the same 'cuid' for both the signal channel and the data channel. The 'cuid' is a globally unique identifier that prevents request collisions, with the same syntax and processing rules as defined in RFC 8782.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
