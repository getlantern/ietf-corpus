document: rfc-6040
kind: normative-requirement
summary: If an ingress claims compliance with this specification, it MUST NOT permanently disable ECN processing across the tunnel (i.e., use only compatibility mode exclusively). It SHOULD use normal mode whenever it knows the egress supports ECN propagation.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - ecn
    - ip
