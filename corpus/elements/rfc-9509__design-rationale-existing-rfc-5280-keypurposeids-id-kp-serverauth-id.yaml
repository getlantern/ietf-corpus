document: rfc-9509
kind: design-rationale
summary: Existing RFC 5280 KeyPurposeIds (id-kp-serverAuth, id-kp-clientAuth) cover server and client authentication for 5G NFs, but no standard KeyPurposeIds existed for JWT signing, HTTP JSON object encryption (JWE), or OAuth 2.0 access token signing. This gap necessitated defining new purpose-specific identifiers rather than relying on anyExtendedKeyUsage.
section: "1"
topics:
