document: rfc-4447
kind: design-rationale
summary: The PW Grouping TLV is separate from the Attachment Group Identifier (AGI) and has no relation to it. The Group ID / PW Grouping TLV is purely an operational convenience for wildcard withdrawals or status notifications, while the AGI is part of the pseudowire identity used for forwarding.
section: 5.3.2.2
topics:
    - mpls
