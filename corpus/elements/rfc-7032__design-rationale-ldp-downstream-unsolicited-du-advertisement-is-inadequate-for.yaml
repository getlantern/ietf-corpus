document: rfc-7032
kind: design-rationale
summary: LDP Downstream Unsolicited (DU) advertisement is inadequate for access nodes because it floods labels for all valid RIB routes, exceeding the constrained memory on devices that only need labels for a small subset of routes tied to provisioned services. LDP DoD enables an AN-driven subscription model where only required labels are requested and installed.
section: "1"
topics:
