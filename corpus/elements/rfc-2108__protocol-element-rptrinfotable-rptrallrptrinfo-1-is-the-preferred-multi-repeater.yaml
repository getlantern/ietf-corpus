summary: rptrInfoTable (rptrAllRptrInfo.1) is the preferred multi-repeater table replacing deprecated scalar rptrRptrInfo objects. Each entry contains rptrInfoRptrType (other/tenMb/onehundredMbClassI/onehundredMbClassII), rptrInfoOperStatus (other/ok/failure), rptrInfoReset, rptrInfoPartitionedPorts (Gauge32), and rptrInfoLastChange (TimeStamp for discontinuity detection).
