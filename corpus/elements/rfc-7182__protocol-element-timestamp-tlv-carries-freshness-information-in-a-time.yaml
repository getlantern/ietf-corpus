document: rfc-7182
kind: protocol-element
summary: TIMESTAMP TLV carries freshness information in a <time-value> field of <length> octets (or single-length in multivalue Address Block TLV). The timestamp interpretation (POSIX, NTP, sequence number, etc.) is determined by the type extension and the using protocol.
