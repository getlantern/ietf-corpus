document: rfc-9905
kind: interoperability-note
summary: Support for validating SHA-1-based DNSSEC signatures has been removed from some systems, meaning SHA-1 as part of a DNSSEC signature algorithm is no longer fully interoperable. Implementations must continue to support validation for backward compatibility during the transition period.
section: "1"
topics:
    - dns
    - security
