document: rfc-5282
kind: interoperability-note
summary: AES GCM usage in IKEv2 uses the same 12-octet nonce format as specified for AES GCM with ESP in RFC 4106, providing compatibility between IKEv2 and ESP usage. Similarly, AES CCM in IKEv2 uses the same 11-octet nonce format as specified for AES CCM with ESP in RFC 4309.
section: "4"
topics:
