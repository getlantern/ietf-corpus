document: rfc-4740
kind: protocol-element
summary: The Server-Assignment-Answer (SAA) command uses Command-Code 284 with the R bit cleared. It may include zero or more SIP-User-Data AVPs carrying the user profile and one SIP-Accounting-Information AVP; the Diameter server MUST clear the 'authentication pending' flag and SHOULD store the SIP server URI permanently upon success.
section: "8.4"
topics:
    - sip
    - diameter
