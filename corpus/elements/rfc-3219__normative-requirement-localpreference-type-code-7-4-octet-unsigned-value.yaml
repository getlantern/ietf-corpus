document: rfc-3219
kind: normative-requirement
summary: LocalPreference (Type Code 7, 4-octet unsigned value) MUST NOT be included when communicating with an LS in another domain, and MUST be included over intra-domain links. LocalPreference received from inter-domain peers MUST be ignored.
section: "5.7"
rfc2119_level: MUST NOT
topics:
