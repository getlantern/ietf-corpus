document: rfc-8824
kind: interoperability-note
summary: CoAP Block-level fragmentation (RFC 7959) and SCHC fragmentation are complementary mechanisms; a node may use both for the same packet as needed, and Block option content must always be sent as a Compression Residue.
section: "6.1"
