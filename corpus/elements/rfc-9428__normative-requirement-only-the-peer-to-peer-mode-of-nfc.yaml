document: rfc-9428
kind: normative-requirement
summary: Only the peer-to-peer mode of NFC allows bidirectional communication between two NFC-enabled devices. Therefore, the peer-to-peer mode MUST be used for IPv6 over NFC.
section: "3.1"
rfc2119_level: MUST
