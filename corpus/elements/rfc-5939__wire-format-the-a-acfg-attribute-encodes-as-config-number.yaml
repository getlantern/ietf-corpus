document: rfc-5939
kind: wire-format
summary: 'The ''a=acfg'' attribute encodes as: config-number (1–10 DIGIT) optionally followed by a space-separated sel-cfg-list. Selected attribute configs use ''a=[delete-attributes:]mo-att-cap-list''; selected transport configs use ''t=trpr-cap-num''; selected extension configs use ''ext-cap-name=1*VCHAR''. No whitespace before config-number.'
section: 3.5.2
topics:
    - realtime
