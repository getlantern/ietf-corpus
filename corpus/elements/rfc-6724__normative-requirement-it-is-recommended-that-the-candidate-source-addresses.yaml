document: rfc-6724
kind: normative-requirement
summary: It is RECOMMENDED that the candidate source addresses be the set of unicast addresses assigned to the interface that will be used to send to the destination (the 'outgoing' interface). On routers, the candidate set MAY include unicast addresses assigned to any forwarding interface.
section: "4"
rfc2119_level: RECOMMENDED
topics:
