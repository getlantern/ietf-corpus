document: rfc-5605
kind: protocol-element
summary: The pwAtmInboundTable configures ATM PW in the inbound (CE-bound) direction for 1:1 service modes. It mirrors the outbound table structure, indexed by pwIndex, and covers the same set of pwType values. For atmTransparent mode, pwAtmInboundVpi is set to zero; for atmTransparent, atmCell1to1Vpc, or atmCellNto1Vpc, pwAtmInboundVci is also set to zero.
section: "9"
