document: rfc-6242
kind: security-consideration
summary: The identity of the SSH server MUST be verified and authenticated by the SSH client according to local policy before any password-based authentication data or configuration/state data is exchanged. Likewise, the SSH server MUST verify and authenticate the SSH client before sending any data.
section: "6"
rfc2119_level: MUST
topics:
    - netconf
    - security
