document: rfc-6428
kind: normative-requirement
summary: Traffic blocking as a consequent action upon defect entry MUST be driven only by a defect's consequent action as specified in Section 5.1.1.2 of RFC 6371. When a mis-connectivity defect occurs, all non-OAM traffic received MUST be silently discarded.
section: 3.7.3
rfc2119_level: MUST
topics:
    - mpls
