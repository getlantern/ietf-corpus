document: rfc-7105
kind: protocol-element
summary: The 'measurementRequest' element allows a protocol peer (e.g., a LIS in a HELD error response) to describe measurement types it desires. It contains one or more 'measurement' child elements bearing a 'type' attribute (XML qualified name) and optional 'samples' count and type-specific refinement elements.
section: "4.3"
