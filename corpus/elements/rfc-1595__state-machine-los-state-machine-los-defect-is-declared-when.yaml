document: rfc-1595
kind: state-machine
summary: 'LOS state machine: LOS defect is declared when no transitions are detected for 2.3–100 µs and cleared after a 125 µs interval with no LOS. LOS failure is declared when the defect persists 2.5±0.5 s and cleared when absent for 10±0.5 s; LOS failure declaration clears any existing LOF failure.'
