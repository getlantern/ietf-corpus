document: rfc-5235
kind: normative-requirement
summary: If the ':percent' argument is used with any spamtest test, then the 'spamtestplus' capability identifier MUST be present. Sieve implementations MUST return an error if ':percent' is used and 'spamtestplus' is not specified.
section: "3.2"
rfc2119_level: MUST
topics:
