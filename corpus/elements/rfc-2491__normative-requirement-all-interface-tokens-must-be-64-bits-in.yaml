document: rfc-2491
kind: normative-requirement
summary: All interface tokens MUST be 64 bits in length and formatted as EUI-64 identifiers. Where two nodes on the same LL produce the same interface token, one MUST choose another token. All implementations MUST support manual configuration of interface tokens.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
