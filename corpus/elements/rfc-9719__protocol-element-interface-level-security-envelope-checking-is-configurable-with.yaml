document: rfc-9719
kind: protocol-element
summary: 'Interface-level security envelope checking is configurable with four modes: no-checking, permissive, loose, and strict (per RFC 9692 Section 6.9). Only one mode may be active at a time. Separate tie-security (feature-gated) and link-security (feature-gated) lists apply PKI security to TIE exchange and per-link traffic respectively.'
section: "3"
topics:
