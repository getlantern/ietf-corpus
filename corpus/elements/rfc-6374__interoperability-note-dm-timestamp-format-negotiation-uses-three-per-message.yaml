document: rfc-6374
kind: interoperability-note
summary: 'DM timestamp format negotiation uses three per-message fields: QTF (querier''s format), RTF (responder''s actual format used), and RPTF (responder''s preferred format). An implementation supporting only a single timestamp format sets RTF and RPTF to that format, trivially resolving negotiation without additional logic.'
section: 4.3.5
topics:
    - mpls
    - measurement
