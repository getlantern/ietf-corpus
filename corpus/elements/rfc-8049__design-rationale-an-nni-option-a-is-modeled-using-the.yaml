document: rfc-8049
kind: design-rationale
summary: An NNI option A is modeled using the existing 'sites' container with 'site-vpn-flavor-nni' rather than a dedicated NNI construct. This allows the SP to recognize and apply NNI-specific default device parameters (ACLs, routing policies) while reusing the site abstraction. Options B and C are modeled separately in Section 6.15.
section: 6.5.1.4
topics:
