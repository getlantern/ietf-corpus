document: rfc-1651
kind: wire-format
summary: A successful EHLO response is a multiline 250 reply. Each line carries an ehlo-keyword optionally followed by space-separated ehlo-params. Keywords consist of ALPHA/DIGIT and hyphens; params exclude SP and control characters (US-ASCII 0-31).
