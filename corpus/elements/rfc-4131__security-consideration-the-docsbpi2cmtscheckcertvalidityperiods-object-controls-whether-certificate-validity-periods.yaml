document: rfc-4131
kind: security-consideration
summary: The docsBpi2CmtsCheckCertValidityPeriods object controls whether certificate validity periods are checked against current time during CM authorization; setting it to false disables temporal certificate validation for the entire CMTS MAC interface, potentially allowing expired certificates to authenticate.
section: "3"
topics:
    - pkix
    - security
