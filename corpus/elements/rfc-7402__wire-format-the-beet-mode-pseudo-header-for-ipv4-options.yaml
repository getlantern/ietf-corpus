document: rfc-7402
kind: wire-format
summary: The BEET mode pseudo header for IPv4 options (Next Header 94) consists of a 1-octet Next Header, 1-octet Header Len, 1-octet Pad Len, 1-octet Reserved, followed by optional padding (0 or 4 octets of NOP) and the original IPv4 options, padded to an 8-octet boundary.
section: B.1.7
