document: rfc-8445
kind: security-consideration
summary: An attacker can spoof STUN Binding requests to induce an agent to perform triggered checks toward a victim (off-path amplification), or to falsely declare a candidate pair valid. The STUN short-term credential mechanism keyed to the per-session username fragment and password provides integrity and authenticity protection for all connectivity checks.
section: "19.2"
topics:
    - security
    - nat
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
