document: rfc-3370
kind: normative-requirement
summary: 'When using RSA key transport (PKCS #1 v1.5) with a Triple-DES content-encryption key, implementations MUST adjust the parity bits for each DES key comprising the Triple-DES key prior to RSA encryption.'
section: 4.2.1
rfc2119_level: MUST
