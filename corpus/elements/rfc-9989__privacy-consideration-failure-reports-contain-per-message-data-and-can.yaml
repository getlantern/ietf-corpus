document: rfc-9989
kind: privacy-consideration
summary: Failure reports contain per-message data and can expose the contents of email headers and message metadata about individual users. Mail Receivers concerned about user privacy may heavily redact or suppress failure reports entirely; RFC 9991 discusses these considerations in detail.
section: "10.2"
topics:
    - email
    - privacy
