document: rfc-8490
kind: protocol-element
summary: 'The Keepalive TLV carries two 32-bit unsigned millisecond values: the Inactivity Timeout (maximum idle time before a client must close the session) and the Keepalive Interval (maximum time between any DNS messages before the client must send a keepalive). The default value for both on a new DSO session is 15 seconds. The special value 0xFFFFFFFF represents infinity.'
section: "7.1"
topics:
    - dns
