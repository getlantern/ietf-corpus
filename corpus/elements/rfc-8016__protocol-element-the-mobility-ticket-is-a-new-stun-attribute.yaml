document: rfc-8016
kind: protocol-element
summary: The MOBILITY-TICKET is a new STUN attribute used to retain a TURN allocation across client IP address changes. Its value is encrypted, of variable length, and opaque to the client. It is carried in Allocate requests (length=0 to request a ticket), Allocate success responses (server-issued ticket), and Refresh requests/responses (ticket presentation and renewal).
section: "3.3"
topics:
    - nat
    - security
