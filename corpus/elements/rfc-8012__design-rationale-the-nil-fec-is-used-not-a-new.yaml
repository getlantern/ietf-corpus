document: rfc-8012
kind: design-rationale
summary: The Nil FEC is used (not a new sub-TLV) to account for ELI in the Target FEC Stack because ELI is a reserved label with no associated explicit FEC. A new EL-FEC sub-TLV is defined only for the EL itself, since the EL carries a discretionary (non-reserved) label value that must be explicitly described for LSP verification.
section: "4"
topics:
