document: rfc-907
kind: protocol-element
summary: 'HAP defines two data message types: datagram messages (two satellite hop delay, ~0.6s) for bursty traffic, and stream messages (one satellite hop delay, ~0.3s) for volatile traffic such as speech requiring guaranteed bandwidth. Each message type can carry up to approximately 16K bits of user data.'
