document: rfc-1256
kind: design-rationale
summary: The default advertising rate (every 7-10 minutes) and default lifetime (30 minutes) were chosen to impose negligible load on links and hosts, not to serve as a black-hole detection mechanism. Network administrators who want advertisement-based black-hole detection must configure smaller values; hosts must have independent black-hole detection mechanisms.
