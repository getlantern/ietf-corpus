document: rfc-2907
kind: interoperability-note
summary: When MZAP is used for dynamic scope discovery, MADCAP servers passively eavesdrop on MZAP messages (Zone Announcement Messages and Not Inside Messages) transmitted by Zone Border Routers during normal administrative scope boundary maintenance to learn which scopes exist and which do not nest. This state must be cached within the MADCAP server.
section: "4.1"
topics:
    - multicast
