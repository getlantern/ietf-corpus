document: rfc-5132
kind: protocol-element
summary: ipMcastBoundaryAddress constrains IPv4 scoped ranges to the 239.0.0.0/8 prefix and IPv6 scoped ranges to FF0x::/16. A boundary for FF0x::/16 implies identical boundaries for FF1x::/16 and FF3x::/16; no separate entries for those prefixes exist in this table.
