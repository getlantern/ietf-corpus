document: rfc-7176
kind: interoperability-note
summary: The IS-IS Neighbor TLV (type 6) is not used in TRILL IIH PDUs and MUST be ignored if present; TRILL LAN IIH PDUs use the TRILL Neighbor TLV (type 145) instead. TRILL IIH PDUs use the same common header and fixed PDU header as Level 1 IIH PDUs.
section: "4.1"
topics:
    - routing
