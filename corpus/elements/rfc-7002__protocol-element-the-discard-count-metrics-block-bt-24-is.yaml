document: rfc-7002
kind: protocol-element
summary: The Discard Count Metrics Block (BT=24) is a 3-word (96-bit) RTCP XR block reporting the number of RTP packets received but discarded (due to duplication, early arrival, or late arrival) over a measurement interval. It references the Measurement Information Block via SSRC for the measurement period.
