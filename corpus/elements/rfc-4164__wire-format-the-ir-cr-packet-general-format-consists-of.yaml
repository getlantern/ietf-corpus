document: rfc-4164
kind: wire-format
summary: 'The IR-CR packet general format consists of: an optional Add-CID octet for small CIDs (if CID != 0), an IR type octet (1111110x), 0–2 octets of CID for large CIDs, a 1-octet Profile field (8 LSBs of profile identifier), a 1-octet 8-bit CRC field, variable-length profile-specific information (which MUST include a 7-bit CRC), and variable-length payload.'
section: 3.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
