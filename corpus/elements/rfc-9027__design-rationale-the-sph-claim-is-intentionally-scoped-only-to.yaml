document: rfc-9027
kind: design-rationale
summary: The 'sph' claim is intentionally scoped only to emergency services (not a general SIP Priority header protection mechanism) because the signer of the 'rph' PASSporT can authoritatively represent both 'Resource-Priority' and 'Priority' header fields in the emergency callback context. General protection would require a new PASSporT extension.
section: "4"
topics:
    - sip
    - security
