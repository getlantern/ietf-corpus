document: rfc-8973
kind: protocol-element
summary: 'DOTS server discovery follows a strict priority order: (1) explicit local/manual configuration or automatic configuration via DHCP, (2) service resolution using S-NAPTR DNS records, (3) DNS-based Service Discovery (DNS-SD). Discovery is re-run on timer expiry, certificate expiry, or attachment to a new network.'
section: "4"
topics:
