summary: 'StorageType describes the memory realization of a conceptual row: other(1), volatile(2, lost on reboot), nonVolatile(3), permanent(4, can be changed but not deleted), readOnly(5, cannot be changed or deleted). Objects with permanent or readOnly StorageType cannot be modified.'
