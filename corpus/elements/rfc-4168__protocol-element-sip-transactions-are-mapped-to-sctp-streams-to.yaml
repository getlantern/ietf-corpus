document: rfc-4168
kind: protocol-element
summary: SIP transactions are mapped to SCTP streams to avoid HOL blocking. The chosen mapping sends all SIP messages over stream zero with the unordered flag; each side manages its sending streams independently, allowing responses to arrive on different streams than requests.
section: "5.1"
