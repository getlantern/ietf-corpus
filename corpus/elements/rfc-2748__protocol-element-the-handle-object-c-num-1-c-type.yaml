document: rfc-2748
kind: protocol-element
summary: The Handle Object (C-Num=1, C-Type=1) is a variable-length opaque value chosen by the PEP to uniquely identify an installed request state per client-type per TCP connection. The PDP performs only byte-wise comparison; it is always initiated and deleted by the PEP.
