document: rfc-1990
kind: normative-requirement
summary: A system MUST include the LCP MRRU option in every LCP negotiation intended to instantiate or join an existing bundle. When joining an existing bundle, the system MUST offer the same MRRU value previously negotiated for that bundle.
section: 5.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
