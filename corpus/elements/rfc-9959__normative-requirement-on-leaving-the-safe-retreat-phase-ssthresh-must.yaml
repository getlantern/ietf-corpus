document: rfc-9959
kind: normative-requirement
summary: On leaving the Safe Retreat Phase, ssthresh MUST be set to no larger than the most recently measured PipeSize multiplied by Beta (default Beta=0.5). Saved CC parameters are deleted on Safe Retreat entry to prevent reuse.
section: "3.5"
rfc2119_level: MUST
