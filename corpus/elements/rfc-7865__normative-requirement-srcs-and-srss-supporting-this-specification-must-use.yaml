document: rfc-7865
kind: normative-requirement
summary: SRCs and SRSs supporting this specification MUST use version 1 in the namespace (urn:ietf:params:xml:ns:recording:1) in all XML documents. Implementations may not interoperate if the sender's version is unknown to the receiver; no version negotiation is provided.
section: "6.11"
rfc2119_level: MUST
topics:
