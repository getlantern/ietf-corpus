document: rfc-4388
kind: wire-format
summary: The client-last-transaction-time option (code 91, length 4 octets) encodes the number of seconds in the past from message-send time when the client last transacted with the server about this IP address. It MUST NOT be an absolute time or seconds-since-epoch value.
section: "6.1"
topics:
    - ip
