document: rfc-2165
kind: protocol-element
summary: The 'service:' URL scheme is used by SLP to specify service locations. Service Types are named by appending a scheme after 'service:' (e.g., service:lpr://host:port/queue). Well-known Service Types are registered with IANA as RFC templates.
section: 3.2.1
topics:
