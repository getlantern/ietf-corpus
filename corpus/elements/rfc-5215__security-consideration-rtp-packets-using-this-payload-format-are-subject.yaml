document: rfc-5215
kind: security-consideration
summary: RTP packets using this payload format are subject to the security considerations of RFC 3550, RFC 4648, and RFC 3986. Confidentiality of the media stream is achieved using encryption, which may be applied to the compressed data end-to-end since compression is applied end-to-end.
section: "10"
topics:
