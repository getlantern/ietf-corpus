document: rfc-8668
kind: security-consideration
summary: The advertisements defined in this document are identical in nature to existing IS-IS link attribute advertisements (RFC 4202, RFC 5305, RFC 8570, RFC 8667), applied to L2 bundle member links. No new security issues are introduced beyond those already present in IS-IS link attribute advertising.
