document: rfc-7117
kind: interoperability-note
summary: Non-segmented inter-AS P2MP tunnels using mLDP (without RFC 6512) require that P-routers in one AS have IP reachability to the loopback addresses of PE routers in another AS, meaning those loopback addresses must be present in the IGP of the transit ASes.
section: "7.3"
topics:
    - mpls
    - multicast
    - routing
