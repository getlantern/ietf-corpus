document: rfc-7543
kind: protocol-element
summary: In EVPN hub-and-spoke, a Default MAC Gateway (DMG) advertises an Unknown MAC Route (UMR) — a MAC/IP Advertisement Route with MAC Address Length 48 and MAC address 00:00:00:00:00:00 — to signal its role. Spokes use CP-ORF to pull specific MAC/IP routes when they determine a more direct path is beneficial.
