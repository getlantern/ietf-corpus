document: rfc-6389
kind: protocol-element
summary: The LDP Upstream Label Assignment Capability Parameter (type 0x0507, length 1) is a new Capability Parameter that allows an LDP peer to advertise support for both distributing and receiving upstream-assigned label bindings. It follows the format and procedures of RFC 5561.
