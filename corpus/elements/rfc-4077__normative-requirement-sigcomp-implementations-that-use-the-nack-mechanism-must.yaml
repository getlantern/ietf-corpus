document: rfc-4077
kind: normative-requirement
summary: SigComp implementations that use the NACK mechanism must calculate and store a SHA-1 hash for each SigComp message they send, stored in a way that allows the implementation to locate the compartment associated with that sent message given the hash.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
