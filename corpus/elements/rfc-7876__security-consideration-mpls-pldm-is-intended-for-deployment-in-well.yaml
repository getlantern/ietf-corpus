document: rfc-7876
kind: security-consideration
summary: MPLS-PLDM is intended for deployment in well-managed private and service provider networks, not the public Internet. To prevent use as a reflection attack vector, operators must ensure the IP address in the URO identifies a system that is legitimately expecting to receive PLDM Responses.
section: "7"
topics:
    - mpls
    - udp
    - security
