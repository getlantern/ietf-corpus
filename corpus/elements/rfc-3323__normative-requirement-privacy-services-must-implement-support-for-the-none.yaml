document: rfc-3323
kind: normative-requirement
summary: Privacy services MUST implement support for the 'none' and 'critical' privacy tokens. If the 'critical' privacy level is present and the privacy service cannot fulfill all requested privacy levels, it MUST fail the request with a 500 (Server Error) response.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - privacy
