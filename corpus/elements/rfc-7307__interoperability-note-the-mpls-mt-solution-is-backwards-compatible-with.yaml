document: rfc-7307
kind: interoperability-note
summary: The MPLS-MT solution is backwards compatible with existing LDP enhancements defined in RFC 5036, including message authenticity, integrity, and topology loop detection. Legacy nodes that do not support MT should not receive any MT-related LDP messages.
