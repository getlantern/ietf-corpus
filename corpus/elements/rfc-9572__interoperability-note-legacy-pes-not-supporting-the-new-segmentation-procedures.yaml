document: rfc-9572
kind: interoperability-note
summary: 'Legacy PEs not supporting the new segmentation procedures will fail: a legacy ingress PE tries to send traffic directly to all PEs including remote ASes (bypassing segmentation), and a legacy egress PE won''t send Leaf A-D routes so ASBRs won''t know to forward external traffic to them.'
section: "5.3"
topics:
    - mpls
    - routing
