document: rfc-9428
kind: normative-requirement
summary: The LLCP MUST provide related information such as link-layer addresses to its upper layer for IPv6 addressing or address configuration. IPv6-LLCP Binding MUST transfer the SSAP and DSAP values to the IPv6-over-NFC Adaptation Layer.
section: "3.2"
rfc2119_level: MUST
