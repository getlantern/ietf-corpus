document: rfc-6454
kind: wire-format
summary: 'The Origin HTTP header field has the syntax: ''Origin: OWS origin-list-or-null OWS'', where origin-list-or-null is either the literal string ''null'' or a space-separated list of serialized-origin values, each of the form ''scheme://host[:port]''.'
