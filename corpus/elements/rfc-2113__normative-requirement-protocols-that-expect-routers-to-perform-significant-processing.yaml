document: rfc-2113
kind: normative-requirement
summary: Protocols that expect routers to perform significant processing on packets not directly addressed to them must mandate use of the Router Alert option. RSVP and IGMPv2 are cited as current examples.
section: "3.0"
rfc2119_level: MUST
topics:
    - ip
