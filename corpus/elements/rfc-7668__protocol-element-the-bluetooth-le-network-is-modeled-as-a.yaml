document: rfc-7668
kind: protocol-element
summary: 'The Bluetooth LE network is modeled as a multilink subnet: all peripheral-to-central point-to-point links share a single /64 IPv6 prefix, with the 6LBR acting as router. Link-local multicast is confined to individual Bluetooth LE connections, so 6LN-to-6LN link-local communication is not possible.'
section: 3.2.1
topics:
    - ip
    - v6ops
