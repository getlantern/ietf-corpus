document: rfc-2373
kind: normative-requirement
summary: An anycast address must not be used as the source address of an IPv6 packet, and must not be assigned to an IPv6 host — it may only be assigned to an IPv6 router.
section: "2.6"
rfc2119_level: MUST NOT
