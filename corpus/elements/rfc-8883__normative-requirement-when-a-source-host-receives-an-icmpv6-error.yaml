document: rfc-8883
kind: normative-requirement
summary: When a source host receives an ICMPv6 error for a processing limit, it SHOULD validate the error (including matching the packet in the ICMP data to the originating connection), log it with sufficient detail, and report it to the application if the application enabled extension headers.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
