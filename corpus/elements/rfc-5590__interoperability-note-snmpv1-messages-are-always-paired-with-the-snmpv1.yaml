document: rfc-5590
kind: interoperability-note
summary: SNMPv1 messages are always paired with the SNMPv1 Security Model (per RFC 3584) regardless of the Transport Model; access control is based on the unauthenticated community name. Similarly, SNMPv2c messages always use the SNMPv2c Security Model. SNMPv3 messages use the Security Model specified in msgSecurityParameters. Transport Models cannot override this binding.
section: "7.1"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
