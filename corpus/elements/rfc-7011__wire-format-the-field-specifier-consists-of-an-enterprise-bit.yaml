document: rfc-7011
kind: wire-format
summary: The Field Specifier consists of an Enterprise bit (E, 1 bit), Information Element identifier (15 bits), Field Length (16 bits), and an optional 32-bit Enterprise Number present only when E=1. When E=0, the Enterprise Number MUST NOT be present; when E=1, the Enterprise Number MUST be present.
section: "3.2"
topics:
