document: rfc-4915
kind: interoperability-note
summary: When an area's DefaultExclusionCapability changes, Hello suppression for demand circuit neighbors must be disabled for RouterDeadInterval seconds with the DC-bit cleared, after which either the adjacency is taken down due to MT-bit conflicts or Hello suppression is renegotiated.
section: "5.1"
topics:
    - routing
