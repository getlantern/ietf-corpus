document: rfc-2263
kind: design-rationale
summary: 'A proxy forwarder forwarding Inform requests acts as a true intermediary: it does not generate a response to the original Inform immediately upon receipt, but waits until a response is received from the downstream target before forwarding the acknowledgment back. This preserves end-to-end Inform reliability semantics.'
section: "1.5"
topics:
    - snmp
