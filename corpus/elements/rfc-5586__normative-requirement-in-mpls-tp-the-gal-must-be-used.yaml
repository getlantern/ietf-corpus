document: rfc-5586
kind: normative-requirement
summary: In MPLS-TP, the GAL MUST be used with G-ACh packets on LSPs, Concatenated Segments of LSPs, and Sections, and MUST NOT be used with PWs. It MUST always be at the bottom of the label stack (S bit set to 1).
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
