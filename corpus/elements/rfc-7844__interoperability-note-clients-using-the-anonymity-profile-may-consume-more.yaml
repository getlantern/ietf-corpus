document: rfc-7844
kind: interoperability-note
summary: Clients using the anonymity profile may consume more server resources because old IP addresses remain leased after a link-layer address change and a new address is requested. Some DHCP servers only give addresses to pre-registered MAC addresses, forcing clients to choose between anonymity and connectivity.
section: "5"
topics:
