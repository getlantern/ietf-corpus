document: rfc-5139
kind: interoperability-note
summary: The DHCP civic address format (RFC 4776) permits an element multiple times with different languages or scripts, but this XML form permits only a single instance of each element. Multiple 'civicAddress' elements are required if any element is duplicated with different languages when converting from DHCP format.
section: 3.5.1
topics:
    - realtime
