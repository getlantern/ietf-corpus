document: rfc-3315
kind: registry
summary: 'IANA maintains registries for DHCPv6 Status Codes and DUID types. Three DUID types are initially assigned: DUID-LLT (1), DUID-EN (2), DUID-LL (3). Status codes defined include Success (0), UnspecFail (1), NoAddrsAvail (2), NoBinding (3), NotOnLink (4), UseMulticast (5).'
