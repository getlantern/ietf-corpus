document: rfc-3380
kind: protocol-element
summary: The 'printer-xri-supported' (1setOf collection) OPTIONAL Printer Description attribute provides a settable collection equivalent of the three READ-ONLY IPP/1.1 attributes 'printer-uri-supported', 'uri-authentication-supported', and 'uri-security-supported'. Setting it via Set-Printer-Attributes atomically updates all three READ-ONLY attributes as a defined side effect.
section: "6.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
