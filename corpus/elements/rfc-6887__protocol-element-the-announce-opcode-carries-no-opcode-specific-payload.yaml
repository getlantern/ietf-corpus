document: rfc-6887
kind: protocol-element
summary: The ANNOUNCE Opcode carries no opcode-specific payload. A PCP client sends a solicited ANNOUNCE to trigger the server to immediately respond with its current Epoch Time, enabling rapid detection of server state loss. The server also sends unsolicited ANNOUNCE responses to all clients with active mappings after a reconfiguration event.
section: "14.1"
topics:
