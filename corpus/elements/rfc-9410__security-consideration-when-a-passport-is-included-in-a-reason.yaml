document: rfc-9410
kind: security-consideration
summary: When a PASSporT is included in a Reason header field, there is a risk that PASSporT information could be passed upstream beyond the authentication service that originally signed it. For diversion-based call flows, the signer may not be the first-hop initiator, increasing the exposure risk.
section: "9"
topics:
    - sip
    - security
    - privacy
