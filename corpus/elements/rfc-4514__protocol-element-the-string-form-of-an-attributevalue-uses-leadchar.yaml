document: rfc-4514
kind: protocol-element
summary: The string form of an attributeValue uses leadchar/trailchar rules where leading SHARP and SPACE, and trailing SPACE, are restricted; interior characters (SUTF1 or UTFMB) allow a broader range. Escape sequences use ESC followed by ESC, a special character, or a hexpair.
