document: rfc-8066
kind: registry
summary: 'This document creates the ''ESC Extension Types'' IANA registry with policy ''Specification Required''. Initial values: 0 (Reserved), 1-31 (ITU-T G.9903 and G.9905 Command IDs), 32-254 (Unassigned), 255 (Reserved). Each registered EET must have a specification defining the corresponding Extended Dispatch Payload frame octets.'
