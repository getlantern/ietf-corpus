document: rfc-5041
kind: interoperability-note
summary: DDP is designed to be LLP-independent but was specifically created for the iWARP protocol suite layered over MPA/TCP or SCTP. When used with MPA over TCP, DDP Segments are framed by MPA; when used with SCTP, each DDP Stream maps directly to one SCTP stream.
section: "1.3"
topics:
