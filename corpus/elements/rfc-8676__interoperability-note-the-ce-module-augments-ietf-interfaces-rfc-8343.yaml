document: rfc-8676
kind: interoperability-note
summary: The CE module augments ietf-interfaces (RFC 8343) only when the interface type is derived from 'iana-tunnel-type:aplusp'. Full CE provisioning requires coordinating with separate YANG modules for routing (RFC 8349) and NAT (RFC 8512); these are not embedded in the softwire modules.
