document: rfc-5729
kind: design-rationale
summary: Decorated NAIs replicate NAI-based routing enforcement from RADIUS-based roaming networks (RFC 2486) into Diameter. Publicly available 3GPP and WiMAX specifications already assumed this functionality was fully supported by RFC 3588, necessitating this clarification.
