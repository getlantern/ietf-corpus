document: rfc-9682
kind: design-rationale
summary: Empty CDDL files are allowed to support the upcoming CDDL modules feature, where a file may consist entirely of directives that resolve to rules only after processing. The at-least-one-rule constraint becomes a semantic check post-directives rather than a syntactic requirement.
section: "3.1"
topics:
    - cbor
