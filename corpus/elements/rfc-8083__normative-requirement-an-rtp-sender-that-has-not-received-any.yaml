document: rfc-8083
kind: normative-requirement
summary: An RTP sender that has not received any RTCP SR or RTCP RR packets reporting on the SSRC it is using for a time period of at least three times its deterministic RTCP reporting interval Td SHOULD cease transmission.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
    - realtime
