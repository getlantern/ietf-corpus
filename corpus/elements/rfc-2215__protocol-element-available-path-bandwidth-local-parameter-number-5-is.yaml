summary: 'AVAILABLE_PATH_BANDWIDTH: local parameter_number 5 is an estimate of bandwidth available to the path; composed parameter_number 6 uses the MIN rule to yield the bottleneck bandwidth. Measured in bytes per second; range 1 B/s to 40 TB/s. A local value of zero means ''unknown''. XDR type: float (non-negative only).'
