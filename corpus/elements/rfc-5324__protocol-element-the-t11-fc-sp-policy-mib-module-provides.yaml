document: rfc-5324
kind: protocol-element
summary: 'The T11-FC-SP-POLICY-MIB module provides five functional parts: read-only active Policy Objects per Fabric, read-write Activate/Deactivate Operations (with operation status), read-create Non-Active Policy Objects (for staging changes before activation), statistics for Security Policy Servers, and notifications for policy activation/deactivation success or failure.'
