document: rfc-9135
kind: normative-requirement
summary: 'For symmetric IRB, the MAC/IP Advertisement route (RT-2) Length field MUST be either 40 (IPv4) or 52 (IPv6), and the route MUST be advertised with two Route Targets: one for the MAC-VRF and one for the IP-VRF.'
