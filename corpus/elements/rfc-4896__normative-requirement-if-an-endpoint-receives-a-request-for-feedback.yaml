document: rfc-4896
kind: normative-requirement
summary: If an endpoint receives a request for feedback, it SHOULD return the feedback even if its SMS is zero. The storage overhead of requested feedback is explicitly not part of the SMS.
section: "9.1"
rfc2119_level: SHOULD
topics:
