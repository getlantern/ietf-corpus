document: rfc-6368
kind: interoperability-note
summary: When interconnecting VRFs across a multi-AS VPN backbone using Inter-AS option b) or c) (RFC 4364 Section 10), provider networks can influence route attributes while presenting a transparent service to the customer AS. Option a) does not support full transparency because ASBR VRFs communicate via eBGP in the provider AS.
section: "8"
topics:
