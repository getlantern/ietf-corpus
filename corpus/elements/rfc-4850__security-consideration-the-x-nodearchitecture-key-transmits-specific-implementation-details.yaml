document: rfc-4850
kind: security-consideration
summary: The X#NodeArchitecture key transmits specific implementation details that may be sensitive; if a software or firmware version is known to contain security weaknesses, announcing it may be undesirable. Countermeasures include sending less detailed information, not sending the key at all, or using IPsec to provide confidentiality for the iSCSI connection.
section: "4"
topics:
    - security
