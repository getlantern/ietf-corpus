document: rfc-7339
kind: normative-requirement
summary: A SIP client MUST add an "oc" parameter (without a value) and an "oc-algo" parameter (with at least the token "loss") to the topmost Via header it inserts in every SIP request, signaling support for overload control.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
