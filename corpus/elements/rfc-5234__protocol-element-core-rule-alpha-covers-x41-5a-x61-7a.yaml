document: rfc-5234
kind: protocol-element
summary: Core rule ALPHA covers %x41-5A / %x61-7A (A-Z and a-z); DIGIT covers %x30-39 (0-9); HEXDIG covers DIGIT plus 'A' through 'F'; BIT is '0' or '1'; CHAR is %x01-7F (any 7-bit US-ASCII excluding NUL).
