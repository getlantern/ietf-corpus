document: rfc-3344
kind: wire-format
summary: 'Registration Reply (Type=3): 8-bit Type, 8-bit Code, 16-bit Lifetime, 32-bit Home Address, 32-bit Home Agent, 64-bit Identification, followed by extensions. The Code field signals registration success (0–1) or denial by foreign agent (64–88) or home agent (128–136).'
