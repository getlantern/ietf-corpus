document: rfc-7216
kind: design-rationale
summary: The reverse DNS approach is designed as a transitional UNSAF mechanism because DHCP-based LIS discovery (RFC 5986) cannot work with legacy residential gateways — replacing or updating millions of deployed gateways solely to support LIS discovery is not economically viable. This method lets Devices discover their LIS without any gateway assistance.
section: "1"
