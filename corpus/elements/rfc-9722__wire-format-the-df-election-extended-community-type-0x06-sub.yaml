document: rfc-9722
kind: wire-format
summary: The DF Election Extended Community (Type 0x06, Sub-Type 0x06) from RFC 8584 includes a 2-octet Bitmap field for capabilities. This document adds Bit 3 (Bit 27 of the Extended Community) as the Time Synchronization (T) capability flag; when set to 1, it signals willingness to use clock-synchronized carving.
section: "2.1"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
