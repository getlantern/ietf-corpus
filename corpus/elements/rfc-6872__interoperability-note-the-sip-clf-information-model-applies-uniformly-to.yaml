document: rfc-6872
kind: interoperability-note
summary: The SIP CLF information model applies uniformly to UAC, UAS, proxy, B2BUA, registrar, and redirect server; fields prescribed for a proxy are equally applicable to a B2BUA, and fields for a UAS are equally applicable to registrars and redirect servers.
