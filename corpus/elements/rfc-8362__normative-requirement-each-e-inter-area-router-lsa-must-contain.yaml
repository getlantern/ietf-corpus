document: rfc-8362
kind: normative-requirement
summary: Each E-Inter-Area-Router-LSA MUST contain exactly one Inter-Area-Router TLV; each E-AS-External-LSA MUST contain exactly one External-Prefix TLV. Instances subsequent to the first MUST be ignored, and absence of the required TLV renders the LSA malformed.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
