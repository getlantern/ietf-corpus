document: rfc-6991
kind: protocol-element
summary: The ipv4-prefix and ipv6-prefix types represent CIDR prefixes as address/length strings (e.g., 192.0.2.0/24 or 2001:db8::/32). Canonical format requires all host bits not in the prefix to be zero; IPv6 canonical form additionally follows RFC 5952.
