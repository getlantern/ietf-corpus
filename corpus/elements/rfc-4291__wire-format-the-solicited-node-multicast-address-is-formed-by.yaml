document: rfc-4291
kind: wire-format
summary: The Solicited-Node multicast address is formed by appending the low-order 24 bits of a unicast or anycast address to the prefix FF02:0:0:0:0:1:FF00::/104, yielding an address in the range FF02::1:FF00:0000 to FF02::1:FFFF:FFFF.
