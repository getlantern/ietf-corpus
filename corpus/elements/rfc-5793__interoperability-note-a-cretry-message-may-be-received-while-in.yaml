document: rfc-5793
kind: interoperability-note
summary: A CRETRY message may be received while in the Server Working or Client Working state if the client sent CRETRY simultaneously with the server's decision. Similarly, SRETRY may be received in the Server Working state. These concurrent messages are redundant and MUST be ignored without causing a state change.
section: "3.2"
topics:
    - security
