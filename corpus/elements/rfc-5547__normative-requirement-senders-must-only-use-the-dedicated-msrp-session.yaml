document: rfc-5547
kind: normative-requirement
summary: Senders MUST only use the dedicated MSRP session to send the file described in the SDP offer or answer and MUST NOT send additional files over the same MSRP session. Implementations MUST include a single file in a single MSRP message.
section: "8.7"
rfc2119_level: MUST
topics:
    - realtime
