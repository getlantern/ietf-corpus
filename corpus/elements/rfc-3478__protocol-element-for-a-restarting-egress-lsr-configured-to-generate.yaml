document: rfc-3478
kind: protocol-element
summary: For a restarting egress LSR configured to generate a non-NULL label, the LSR searches for a Label-pop forwarding entry with a next hop matching the FEC's next hop. If found, the entry is un-marked as stale and the incoming label is re-advertised. If the LSR generates a NULL label for a FEC, it simply re-advertises that NULL label via LDP.
section: 3.1.2
topics:
    - mpls
    - routing
