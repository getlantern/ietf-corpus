document: rfc-4209
kind: design-rationale
summary: Peer node-to-OLS LMP sessions are maintained independently from peer node-to-peer node LMP sessions. It MUST be possible for LMP sessions to come up in any order, including a peer node-to-peer node session without any peer node-to-OLS sessions.
section: "1"
topics:
