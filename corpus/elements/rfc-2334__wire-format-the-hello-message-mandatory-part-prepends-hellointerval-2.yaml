document: rfc-2334
kind: wire-format
summary: The Hello message mandatory part prepends HelloInterval (2 bytes), DeadFactor (2 bytes), unused (2 bytes), and Family ID (2 bytes) before the Mandatory Common Part, followed by zero or more Additional Receiver ID Records each consisting of Rec ID Len (1 byte) and variable-length Receiver ID.
section: B.2.5
