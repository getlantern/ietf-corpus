document: rfc-5438
kind: design-rationale
summary: Routing information (IMDN-Route, IMDN-Record-Route) was placed in the IMDN application-layer payload rather than the transport layer to make the IMDN mechanism independent of the transport protocol. The acknowledged consequence is that this eliminates the possibility of end-to-end encryption.
