document: rfc-7635
kind: interoperability-note
summary: If a STUN client does not support or is not capable of performing third-party authorization (e.g., it cannot comprehend the THIRD-PARTY-AUTHORIZATION comprehension-optional attribute), it defaults to first-party authentication as defined in RFC 5389.
section: "6.1"
topics:
