document: rfc-8505
kind: security-consideration
summary: A trust model MUST be put in place to ensure that only authorized devices act as 6LBR or Routing Registrar, to prevent black-holing or bombing attacks where an impersonated 6LBR destroys registration state using the 'Removed' status code. At a minimum this may be based on Layer 2 access control.
section: "7"
topics:
    - security
    - ip
    - v6ops
