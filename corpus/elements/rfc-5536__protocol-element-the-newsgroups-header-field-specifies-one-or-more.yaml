document: rfc-5536
kind: protocol-element
summary: The Newsgroups header field specifies one or more newsgroups to which the article is posted, as a comma-separated list of dot-separated components. Components consist of alphanumeric characters plus '+', '-', '_'; all-digit and uppercase components SHOULD NOT be used.
section: 3.1.4
