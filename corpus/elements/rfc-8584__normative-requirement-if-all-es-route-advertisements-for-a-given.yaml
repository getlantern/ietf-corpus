document: rfc-8584
kind: normative-requirement
summary: If all ES route advertisements for a given ES carry the same DF Alg and Bitmap, each PE MUST follow those procedures. If even a single ES route lacks the locally configured DF Alg or capability, the default DF election algorithm (DF Alg 0) MUST be used as per RFC 7432.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
