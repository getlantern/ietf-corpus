document: rfc-5888
kind: normative-requirement
summary: An application that receives a session description with 'm' lines grouped using LS semantics MUST synchronize the playout of the corresponding media streams. If non-RTP streams are involved, the application MUST recover the original timing relationship using whatever mechanism is available.
section: "7"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
