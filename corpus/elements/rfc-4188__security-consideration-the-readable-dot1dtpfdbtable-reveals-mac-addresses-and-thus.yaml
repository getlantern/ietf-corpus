document: rfc-4188
kind: security-consideration
summary: The readable dot1dTpFdbTable reveals MAC addresses and thus hardware manufacturer information, enabling targeted attacks. Forged newRoot or topologyChange notifications may trigger unnecessary management computations and generate additional SNMP traffic, constituting a denial-of-service vector.
section: "6"
topics:
