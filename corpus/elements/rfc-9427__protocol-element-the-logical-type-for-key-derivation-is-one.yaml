document: rfc-9427
kind: protocol-element
summary: 'The logical Type for key derivation is one octet for values less than 254. For Expanded EAP Types, it is the concatenation: Type (0xFE) || Vendor-Id (network byte order) || Vendor-Type (network byte order), as defined in RFC 3748 Section 5.7.'
