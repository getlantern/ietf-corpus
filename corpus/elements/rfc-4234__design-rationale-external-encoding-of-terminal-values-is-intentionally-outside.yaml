document: rfc-4234
kind: design-rationale
summary: External encoding of terminal values is intentionally outside ABNF's scope, so the same grammar can be used in multiple encoding environments (7-bit ASCII, binary octet, 16-bit Unicode). Appendix B provides definitions for the common 7-bit US-ASCII case as a convenience.
