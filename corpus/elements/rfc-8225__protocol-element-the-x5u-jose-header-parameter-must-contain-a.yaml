document: rfc-8225
kind: protocol-element
summary: The "x5u" JOSE Header Parameter MUST contain a URI referencing the X.509 public key certificate or certificate chain corresponding to the key used to sign the PASSporT. This is typically an HTTPS or DNSSEC resource with integrity protection.
