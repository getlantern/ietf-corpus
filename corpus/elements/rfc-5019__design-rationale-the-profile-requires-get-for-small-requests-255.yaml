document: rfc-5019
kind: design-rationale
summary: The profile requires GET for small requests (≤255 bytes) to enable HTTP proxy caching of OCSP responses throughout the network. Pre-produced responses distributed via caching infrastructure reduce load on OCSP responders and lower infrastructure costs for high-volume PKI environments.
section: "5"
topics:
