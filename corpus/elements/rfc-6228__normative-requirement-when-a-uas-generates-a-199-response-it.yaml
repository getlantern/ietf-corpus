document: rfc-6228
kind: normative-requirement
summary: When a UAS generates a 199 response it MUST contain a To header field tag parameter (to identify the terminated early dialog) and MUST include a Reason header field with a response code describing why the early dialog was terminated. The UAS MUST NOT insert a '199' option-tag in the Supported, Require, or Proxy-Require field of the 199 response itself.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
