document: rfc-1740
kind: protocol-element
summary: 'AppleSingle defines 15 predefined entry IDs: Data Fork (1), Resource Fork (2), Real Name (3), Comment (4), B&W Icon (5), Color Icon (6), File Dates Info (8), Finder Info (9), Macintosh File Info (10), ProDOS File Info (11), MS-DOS File Info (12), AFP Short Name (13), AFP File Info (14), AFP Directory ID (15). Entry ID 7 is not used.'
