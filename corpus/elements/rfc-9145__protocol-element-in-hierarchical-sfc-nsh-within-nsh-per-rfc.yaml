document: rfc-9145
kind: protocol-element
summary: In hierarchical SFC (NSH-within-NSH per RFC 8459), a Lower-NSH is pushed in front of the Upper-NSH by the lower-level domain Classifier. SFC data plane elements of the lower-level domain include the Upper-NSH in the MAC computation, providing integrity protection over the entire nested structure.
section: "4.6"
topics:
    - security
