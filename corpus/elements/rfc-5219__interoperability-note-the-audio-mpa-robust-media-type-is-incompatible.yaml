document: rfc-5219
kind: interoperability-note
summary: The 'audio/mpa-robust' media type is incompatible with both the 'audio/mpa' and 'audio/mpeg' media types defined for RFC 2250. Implementations cannot mix this payload format with those defined in RFC 2250 on the same payload type.
