document: rfc-1035
kind: normative-requirement
summary: Zone loading from a master file should be suppressed entirely if any errors are encountered, since a single syntax error (e.g., in delegation RRs) can cause a server to return authoritative errors for an entire subzone.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - dns
