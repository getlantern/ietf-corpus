document: rfc-4806
kind: normative-requirement
summary: Upon receipt of an OCSP request CERTREQ payload, the recipient SHOULD acquire the related OCSP-based assertion and produce and transmit an OCSP response CERT payload corresponding to the certificate needed to verify its IKEv2 signature payloads.
