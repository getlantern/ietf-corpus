document: rfc-9833
kind: protocol-element
summary: Bandwidth groupings define CIR, CBS, EIR, EBS, PIR, PBS (all uint64, units bps or bytes). The 'bandwidth-per-type' grouping supports per-CoS breakdown (keyed by cos-id uint8, using DSCP or 802.1p value) or aggregate bandwidth, selectable per bw-type identityref from vpn-common.
