document: rfc-9908
kind: normative-requirement
summary: When the server requires an RSA key of a specific size, the 'subjectPublicKey' field in SubjectPublicKeyInfoTemplate MUST be present and contain a placeholder public key value of the desired RSA modulus length; otherwise the 'subjectPublicKey' MUST be absent.
section: "3.4"
rfc2119_level: MUST
topics:
