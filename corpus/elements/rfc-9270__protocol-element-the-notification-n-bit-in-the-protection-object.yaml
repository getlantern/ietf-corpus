document: rfc-9270
kind: protocol-element
summary: 'The Notification (N) bit in the PROTECTION object is updated: when set to 1, it indicates control plane message exchange is only used for notification during protection switching (not for actual switching). When the LSP Protection Type is 0x20 (SMP), the N bit MUST be set to 1; otherwise it MUST be set to 0 for types other than 0x04, 0x08, 0x10, or 0x20.'
section: "6.2"
topics:
    - mpls
    - routing
