document: rfc-5552
kind: protocol-element
summary: 'Bridge transfer creates a small multi-party session: the VoiceXML Media Server sends an INVITE to the Callee and mixes Callee RTP with Caller RTP. The server can perform hotword detection on the Caller stream; a match causes near-end disconnect (BYE to Callee). If Callee issues BYE, the transfer item variable is set to far_end_disconnect; if Caller issues BYE, connection.disconnect.transfer is thrown.'
section: "6.2"
topics:
    - sip
    - voip
    - rtp
