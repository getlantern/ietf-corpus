document: rfc-5170
kind: normative-requirement
summary: 'The right side of the LDPC-Staircase parity check matrix MUST be generated using the specified right_matrix_staircase_init() function, which creates a staircase structure: the first row has a single entry at column k, and each subsequent row i has entries at k+i (identity) and k+i-1 (staircase).'
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
