document: rfc-3851
kind: normative-requirement
summary: Receiving agents MUST support id-dsa-with-sha1 and rsaEncryption for signature verification. Algorithm parameters for id-dsa-with-sha1 MUST be absent (not encoded as NULL). Sending agents MUST support either id-dsa-with-sha1 or rsaEncryption.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
