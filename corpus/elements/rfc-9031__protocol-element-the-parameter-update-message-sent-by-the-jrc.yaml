document: rfc-9031
kind: protocol-element
summary: The Parameter Update message, sent by the JRC to a joined node, is a CoAP POST CON request to Uri-Host '6tisch.arpa', Uri-Path 'j', secured with OSCORE. The joined node acts as CoAP server and exposes the '/j' resource, reversing the client/server roles from the join exchange.
