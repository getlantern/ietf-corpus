document: rfc-5709
kind: protocol-element
summary: The Apad constant is defined as the hexadecimal value 0x878FE1F3 repeated (L/4) times, where L is the hash output length in octets, making Apad always the same length as the hash output. It is placed in the Authentication Trailer before computing the HMAC.
section: "3.3"
topics:
