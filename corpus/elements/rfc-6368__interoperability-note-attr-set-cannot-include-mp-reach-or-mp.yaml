document: rfc-6368
kind: interoperability-note
summary: ATTR_SET cannot include MP_REACH or MP_UNREACH attributes, limiting its use to IPv4 unicast path attributes that fit within a standard BGP UPDATE message. This constraint ensures compatibility with existing BGP UPDATE processing.
