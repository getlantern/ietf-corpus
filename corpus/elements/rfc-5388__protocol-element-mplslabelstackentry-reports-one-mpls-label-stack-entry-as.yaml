summary: '''MPLSLabelStackEntry'' reports one MPLS label stack entry as a 32-bit unsignedInt encoding the MPLS label, Exp field, S flag, and MPLS TTL as defined in RFC 3032. Multiple entries must appear in top-to-bottom stack order.'
