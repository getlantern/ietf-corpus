document: rfc-7352
kind: normative-requirement
summary: When ':last' is omitted, the expiration time MUST be measured from when the entry was first created. When ':last' is specified, the expiration time MUST be measured relative to the last script execution that checked that unique ID value, effectively keeping the entry alive while duplicates keep arriving.
section: "3.3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
