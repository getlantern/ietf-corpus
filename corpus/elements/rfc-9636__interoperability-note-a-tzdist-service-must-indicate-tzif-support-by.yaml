document: rfc-9636
kind: interoperability-note
summary: A TZDIST service MUST indicate TZif support by including 'application/tzif' in its capabilities response and MUST NOT advertise 'application/tzif-leap' without also advertising 'application/tzif'. TZDIST clients MUST use the HTTP Accept header to express their format preference.
section: "6"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
