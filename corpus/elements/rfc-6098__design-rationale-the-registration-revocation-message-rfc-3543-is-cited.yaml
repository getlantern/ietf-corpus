document: rfc-6098
kind: design-rationale
summary: The Registration Revocation Message (RFC 3543) is cited as a motivating example of a notification that should have been defined as a GNM extension rather than a standalone message type. Future notifications such as HA switchover, NEMO prefix changes, and load balancing are better served as GNM extensions than as separate messages.
section: "5.1"
topics:
    - mobility
    - ip
