document: rfc-7343
kind: protocol-element
summary: The Context Identifier is a randomly generated 128-bit value defining the usage context and the hash function for ORCHID generation. It is allocated from the CGA Type Tags namespace (RFC 3972) on a First Come, First Served basis and is not encoded in the ORCHID itself.
