document: rfc-9524
kind: protocol-element
summary: For SR-MPLS, the active Replication-SID triggers a POP of that label and RS lookup. For each downstream branch, the node PUSHes the downstream Replication-SID plus an optional segment list. At a leaf or bud node, the Replication-SID is processed with a NEXT operation and the payload is delivered per local configuration.
section: "2.1"
topics:
    - mpls
    - routing
