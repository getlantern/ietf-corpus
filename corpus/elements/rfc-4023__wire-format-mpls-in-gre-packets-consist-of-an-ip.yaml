document: rfc-4023
kind: wire-format
summary: MPLS-in-GRE packets consist of an IP header (IPv4 or IPv6), followed by a GRE header, followed by an MPLS label stack. The GRE protocol type field MUST be set to Ethertype 0x8847 (MPLS Unicast) or 0x8848 (MPLS Multicast).
section: "4"
topics:
