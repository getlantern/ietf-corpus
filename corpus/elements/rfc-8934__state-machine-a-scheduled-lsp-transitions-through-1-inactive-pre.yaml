document: rfc-8934
kind: state-machine
summary: 'A scheduled LSP transitions through: (1) inactive/pre-signaled state before start time — path computed but not signaled on LSRs; (2) active state at start time — LSP signaled and carrying traffic; (3) deleted state at expiry of duration — LSP torn down. The A flag in the scheduled TLV signals activation; the C flag determines whether the PCC or PCE is responsible for triggering transitions.'
section: "4.5"
topics:
    - routing
    - mpls
