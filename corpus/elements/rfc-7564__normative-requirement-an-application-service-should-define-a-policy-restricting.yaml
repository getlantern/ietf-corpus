document: rfc-7564
kind: normative-requirement
summary: An application service SHOULD define a policy restricting which scripts or character blocks may be registered or stored, and SHOULD forbid strings that mix characters from more than one script, to reduce confusable-character attacks.
section: "12.5"
rfc2119_level: SHOULD
topics:
    - security
