document: rfc-2675
kind: normative-requirement
summary: For TCP input, when a packet is received with the URG bit set and Urgent field of 65,535, the Urgent Pointer must be calculated using an offset equal to the length of the TCP data rather than the value in the Urgent field.
section: "5.2"
rfc2119_level: MUST
topics:
    - tcp
