document: rfc-8936
kind: normative-requirement
summary: If the poll needs to return immediately in an Acknowledge-Only request, then 'returnImmediately' MUST also be present with the value 'true'; if 'false', a long poll will still occur until an event is ready to be returned.
section: 2.4.2
rfc2119_level: MUST
topics:
    - http
