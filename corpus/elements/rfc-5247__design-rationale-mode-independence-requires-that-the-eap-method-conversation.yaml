document: rfc-5247
kind: design-rationale
summary: Mode independence requires that the EAP method conversation between peer and server is identical regardless of whether the authenticator operates in pass-through mode. All key derivation and parameter export are unaffected by authenticator mode; the authenticator identity is treated as opaque channel binding data within EAP.
section: 1.6.1
topics:
    - security
