document: rfc-9460
kind: normative-requirement
summary: Clients using a proxy that does not provide SVCB query capability SHOULD arrange a separate SVCB resolution procedure with appropriate privacy. If that is not possible, SVCB-optional clients MUST disable SVCB resolution entirely, and SVCB-reliant clients MUST treat the configuration as invalid.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
