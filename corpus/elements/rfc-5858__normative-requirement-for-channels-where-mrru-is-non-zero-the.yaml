document: rfc-5858
kind: normative-requirement
summary: For channels where MRRU is non-zero, the ROHCoIPsec decompressor MUST reassemble ROHC segments. The AH/ESP sequence number SHOULD be used to identify reordered segments. If reconstruction fails, the packet MUST be discarded.
section: "4.3"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
