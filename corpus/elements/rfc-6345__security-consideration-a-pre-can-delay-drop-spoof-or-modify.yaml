document: rfc-6345
kind: security-consideration
summary: A PRE can delay, drop, spoof, or modify PANA messages in transit, posing threats analogous to an on-path MitM against non-relayed PANA. However, EAP and PANA are designed to operate over unsecured links where such threats already exist, and these threats cannot be leveraged to gain unauthorized access or compromise cryptographic keys.
section: "6"
topics:
