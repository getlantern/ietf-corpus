document: rfc-4920
kind: normative-requirement
summary: If End-to-end Re-routing is indicated, or if Segment-based or Boundary Re-routing is allowed and the detecting node chooses not to make re-routing attempts (or has exhausted all possible attempts), the detecting node MUST return a protocol error indication and SHOULD include full crankback information.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
