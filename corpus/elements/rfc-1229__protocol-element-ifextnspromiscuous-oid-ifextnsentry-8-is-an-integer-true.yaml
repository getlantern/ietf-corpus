document: rfc-1229
kind: protocol-element
summary: ifExtnsPromiscuous (OID ifExtnsEntry.8) is an INTEGER {true(1), false(2)} indicating whether the interface accepts all frames on the medium. Setting it to true(1) may require an interface reset and is only legal on certain media types.
