document: rfc-9148
kind: security-consideration
summary: Constrained IoT devices lack traditional entropy sources (mouse movement, keystroke timing, disk turbulence) for random number generation. Selecting hardware capable of producing high-quality random numbers is critical, as weak randomness can lead to digital identity theft through predictable private keys.
section: "9.1"
topics:
    - security
    - crypto
