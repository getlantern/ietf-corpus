document: rfc-6076
kind: protocol-element
summary: 'Ineffective Registration Attempts (IRA) measures the percentage of REGISTER requests that result in failure (4XX excluding 401/402/407, 5XX, 6XX, or Timer F expiration). Formula: IRA% = (# of IRAs / Total # of REGISTER Requests) x 100.'
