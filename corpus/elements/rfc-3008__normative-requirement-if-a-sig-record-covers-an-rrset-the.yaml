document: rfc-3008
kind: normative-requirement
summary: If a SIG record covers an RRset, the name type of the associated KEY MUST be 01 (zone). This updates RFC 2535 section 2.3.6. A DNSSEC resolver MUST ignore all keys that are not zone keys unless local policy dictates otherwise.
section: 3.2.1
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
