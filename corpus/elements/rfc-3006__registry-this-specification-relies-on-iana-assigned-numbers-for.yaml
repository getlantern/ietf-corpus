document: rfc-3006
kind: registry
summary: This specification relies on IANA-assigned numbers for the compression scheme hint. Where possible, existing PPP compression algorithm identification numbers (from RFC 1332 and RFC 2509) are reused as the high-order 16 bits of the hint value; IANA may need to assign additional hint numbers specifically for int-serv purposes.
