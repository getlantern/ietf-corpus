document: rfc-9113
kind: protocol-element
summary: HTTP/2 flow control is credit-based using WINDOW_UPDATE frames. The initial flow-control window is 65,535 octets for both new streams and the overall connection. Only DATA frames consume flow-control window space; control frames are not subject to flow control.
section: 5.2.1
topics:
    - http
    - congestion
