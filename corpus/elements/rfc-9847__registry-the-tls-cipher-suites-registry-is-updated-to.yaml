summary: The 'TLS Cipher Suites' registry is updated to mark a large set of cipher suites as 'D' (discouraged), including all KRB5-based suites, PSK suites with NULL or RC4, ECDHE suites with NULL or RC4, and experimental TLS_SHA256_SHA256 / TLS_SHA384_SHA384 suites. A 'Comment' column is added.
