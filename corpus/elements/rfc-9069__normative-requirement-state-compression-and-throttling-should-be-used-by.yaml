document: rfc-9069
kind: normative-requirement
summary: State compression and throttling SHOULD be used by a BMP sender to reduce the number of Route Monitoring messages transmitted; only the final resultant update for a given prefix within a compression interval need be sent, suppressing intermediate changes.
section: 5.4.2
rfc2119_level: SHOULD
topics:
