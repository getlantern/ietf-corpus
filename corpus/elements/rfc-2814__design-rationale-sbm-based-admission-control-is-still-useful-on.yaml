document: rfc-2814
kind: design-rationale
summary: SBM-based admission control is still useful on shared LANs without IEEE 802.1p traffic control because it bounds the total IntServ traffic load, and TCP/IP sources use rate-adaptive congestion avoidance (slow-start, RTP/RTCP feedback) that prevents persistent congestion in the remaining best-effort capacity.
