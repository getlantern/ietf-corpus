document: rfc-6531
kind: security-consideration
summary: Internationalized email addresses will appear in SMTP transaction logs, trouble ticket systems, and monitoring tools. Systems must be extended to support full UTF-8 or provide adequate ASCII-mapping mechanisms to avoid data loss and to allow security teams to quickly identify and read internationalized addresses during incident response.
section: "5"
topics:
    - email
    - security
