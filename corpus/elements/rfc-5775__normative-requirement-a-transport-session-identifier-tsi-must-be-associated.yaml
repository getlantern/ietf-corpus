document: rfc-5775
kind: normative-requirement
summary: A Transport Session Identifier (TSI) MUST be associated with each ALC session and MUST be carried in the LCT header of each ALC packet. The (sender IP address, TSI) pair MUST uniquely identify the session, and the TSI field length is REQUIRED to be non-zero.
section: "2.1"
rfc2119_level: MUST
topics:
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
