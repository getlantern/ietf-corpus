summary: The ietf-snmp-ssh submodule augments /snmp/target and /snmp/engine/listen with an 'ssh' transport case carrying ip, port, and username fields. It is gated by the 'sshtm' YANG feature and corresponds to SNMP-SSH-TM-MIB.
