document: rfc-9259
kind: protocol-element
summary: The O-flag (OAM flag) is defined as bit 2 in the 8-bit Flags field of the Segment Routing Header (SRH). It is used as a marking bit in user packets to trigger telemetry data collection and export at segment endpoints.
