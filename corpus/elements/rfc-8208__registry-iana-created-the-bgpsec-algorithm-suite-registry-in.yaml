document: rfc-8208
kind: registry
summary: IANA created the 'BGPsec Algorithm Suite Registry' in the RPKI group. The one-octet identifier maps to a digest algorithm and signature algorithm pair. Value 0x1 is assigned to SHA-256/ECDSA P-256; 0x0 and 0xFF are reserved; 0x2-0xEF are unassigned. Future assignments require Standards Action.
