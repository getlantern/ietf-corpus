document: rfc-8990
kind: state-machine
summary: 'Synchronization flow: Initiator sends M_REQ_SYN to a discovered counterpart. Counterpart replies with M_SYNCH containing the current objective value; transport SHOULD be closed afterwards. Alternatively, any node may send unsolicited M_FLOOD to multicast synchronization data; recipients cache flooded objectives tagged with the accompanying locator option.'
section: 2.5.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
