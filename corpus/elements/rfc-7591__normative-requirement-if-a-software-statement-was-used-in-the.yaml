document: rfc-7591
kind: normative-requirement
summary: If a software statement was used in the registration, its value MUST be returned unmodified in the response using the 'software_statement' member name. Client metadata elements from the software statement MUST also be returned as top-level values in the registration response.
section: 3.2.1
rfc2119_level: MUST
