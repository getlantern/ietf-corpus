document: rfc-5272
kind: design-rationale
summary: When encrypting a Full PKI Request, a second signature layer placed outside the EnvelopedData is recommended (Option 2) so that the recipient can authenticate the source even before decryption. Option 1 (EnvelopedData wrapping SignedData) and plain SignedData are also supported; servers MUST support all three options.
section: "5"
