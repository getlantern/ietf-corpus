document: rfc-4430
kind: normative-requirement
summary: The KINK_AP_REQ payload MUST request mutual authentication. If the peer's principal name is generated from an FQDN, the principal name MUST take the form 'kink/fqdn@REALM' with the 'fqdn' part in lowercase.
section: 4.2.1
rfc2119_level: MUST
topics:
