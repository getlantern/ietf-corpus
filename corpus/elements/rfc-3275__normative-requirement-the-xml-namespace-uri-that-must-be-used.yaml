document: rfc-3275
kind: normative-requirement
summary: The XML namespace URI that MUST be used by implementations of this specification is 'http://www.w3.org/2000/09/xmldsig#'. While applications MUST support XML and XML namespaces, use of internal entities or the 'dsig' prefix and defaulting/scoping conventions are OPTIONAL.
section: "1.3"
rfc2119_level: MUST
topics:
