document: rfc-8338
kind: protocol-element
summary: The optional P2P PW Downstream FEC Element (FEC type 0x84) is sent by the R-PE to individual L-PEs to signal an optional unidirectional P2P PW allowing L-PEs to send traffic back to the R-PE; it uses a downstream-assigned label.
