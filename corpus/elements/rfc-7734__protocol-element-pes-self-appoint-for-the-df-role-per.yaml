document: rfc-7734
kind: protocol-element
summary: PEs self-appoint for the DF role per B-VID using the procedure in RFC 7432 Section 8.5. A PE becoming DF must originate information into BGP from ISIS-SPB; a PE ceasing to be DF must withdraw the associated information from both BGP and ISIS-SPB.
section: "4.2"
topics:
    - routing
    - bgp
