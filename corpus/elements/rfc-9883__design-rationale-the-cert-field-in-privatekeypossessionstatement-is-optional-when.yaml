document: rfc-9883
kind: design-rationale
summary: 'The `cert` field in `PrivateKeyPossessionStatement` is OPTIONAL: when the issuer of the key establishment certificate is the same as the issuer of the signature certificate, including the full certificate is unnecessary because the CA is assumed to have access to all valid certificates it has issued.'
