document: rfc-3211
kind: security-consideration
summary: The security of PasswordRecipientInfo when used with a password rests critically on the entropy of the user-selected password, which is typically low. Pass phrases are STRONGLY RECOMMENDED, though even pass phrases may be insufficient to protect 128-bit or higher CEKs.
section: "4"
rfc2119_level: RECOMMENDED
topics:
