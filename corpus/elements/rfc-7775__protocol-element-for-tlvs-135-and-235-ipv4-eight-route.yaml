document: rfc-7775
kind: protocol-element
summary: 'For TLVs 135 and 235 (IPv4), eight route types are defined: L1 intra-area (up/down=0, X-Flag=0, R-Flag=0), L1 external (up/down=0, X-Flag=1), L2 intra-area (up/down=0, X-Flag=0, R-Flag=0), L1->L2 inter-area (up/down=0, R-Flag=1), L2->L2 inter-area (up/down=1 ignored, X-Flag=1), L2 external (up/down=0, X-Flag=1), L2->L1 inter-area (up/down=1, R-Flag=1), and L1->L1 inter-area (up/down=1, X-Flag=1).'
section: "3.1"
topics:
    - routing
    - ip
