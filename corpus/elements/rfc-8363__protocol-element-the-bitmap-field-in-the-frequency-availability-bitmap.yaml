document: rfc-8363
kind: protocol-element
summary: 'The Bitmap field in the Frequency Availability Bitmap sub-TLV represents basic frequency slot availability: a bit set to 1 means the corresponding nominal central frequency is available for a flexi-grid LSP with m=1; a bit set to 0 means it is unavailable.'
