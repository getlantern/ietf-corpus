document: rfc-5196
kind: protocol-element
summary: The <class> element indicates the setting (business or personal) in which a communications service is used. It contains <supported> and <notsupported> child elements, each of which can contain <business> and <personal> elements, plus extensions registered with IANA as sip.class feature tags.
