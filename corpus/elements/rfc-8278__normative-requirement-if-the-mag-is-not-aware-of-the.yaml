document: rfc-8278
kind: normative-requirement
summary: If the MAG is not aware of the LMA's multipath capability, it SHOULD first discover that capability by sending PBU packets with multipath on only one path, to prevent the LMA from overwriting a binding from one path with another.
section: "4.4"
rfc2119_level: SHOULD
topics:
