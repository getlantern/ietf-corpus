document: rfc-9012
kind: interoperability-note
summary: The Encapsulation Extended Community defined in RFC 5512 provides a backwards-compatible subset of the Tunnel Encapsulation attribute's functionality. RFC 9012 mandates that both encodings (barebones TLV and Extended Community) must be understood by compliant implementations, and they may coexist in the same BGP UPDATE.
section: "4.1"
topics:
    - bgp
    - routing
