document: rfc-6657
kind: security-consideration
summary: Guessing the 'charset' parameter can lead to security issues such as content buffer overflows, denial of service, or bypass of filtering mechanisms. This document discourages guessing and encourages using charset information explicitly specified by the sender.
section: "5"
topics:
    - security
    - email
