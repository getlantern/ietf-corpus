document: rfc-2328
kind: security-consideration
summary: Cryptographic authentication (Appendix D.3) uses a per-interface Key ID, authentication data length, and a non-decreasing cryptographic sequence number appended to each packet. MD5 is the default hash; the digest is appended after the OSPF packet, not in the authentication field.
section: D.3
topics:
