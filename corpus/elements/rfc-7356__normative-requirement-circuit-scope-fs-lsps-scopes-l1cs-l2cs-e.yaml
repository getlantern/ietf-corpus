document: rfc-7356
kind: normative-requirement
summary: Circuit scope FS-LSPs (scopes L1CS, L2CS, E-L1CS, E-L2CS) MUST NOT be flooded on any circuit other than the one on which they were received or locally generated; their FS-LSDB is circuit-specific and contains only FS-LSPs with matching scope on that circuit.
section: "8"
rfc2119_level: MUST NOT
topics:
    - routing
