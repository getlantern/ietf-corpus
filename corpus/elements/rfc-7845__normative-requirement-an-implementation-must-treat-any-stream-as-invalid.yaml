document: rfc-7845
kind: normative-requirement
summary: An implementation MUST treat any stream as invalid if the granule position of the first audio data page with a completed packet is smaller than the number of samples contained in packets that complete on that page, unless that page has the 'end of stream' flag set.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
