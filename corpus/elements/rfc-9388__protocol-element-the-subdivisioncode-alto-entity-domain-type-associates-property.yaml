document: rfc-9388
kind: protocol-element
summary: The SUBDIVISIONCODE ALTO entity domain type associates property values for ISO 3166-2 country subdivision codes. The entity identifier is encoded as an ISO 3166-1 alpha-2 country code followed by a separator and up to three alphanumeric characters. There is no hierarchy or inheritance for this domain.
