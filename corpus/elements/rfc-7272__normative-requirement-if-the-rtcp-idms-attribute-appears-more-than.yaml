document: rfc-7272
kind: normative-requirement
summary: If the rtcp-idms attribute appears more than once for a media session (to couple multiple synchronization groups), each SyncGroupId SHALL only be inserted once, ensuring uniqueness of group identifiers within a session.
section: "11.1"
rfc2119_level: SHALL
topics:
