document: rfc-9727
kind: design-rationale
summary: Nesting API catalog links (using the api-catalog relation in a catalog document) is supported to allow Publishers with large API portfolios to group APIs into smaller sub-catalogs by business or technology category, reducing catalog size and maintenance overhead.
