document: rfc-8203
kind: protocol-element
summary: The Shutdown Communication is an optional UTF-8 encoded freeform string, up to 128 octets, carried in the Data portion of a BGP Cease NOTIFICATION message with subcode 'Administrative Shutdown' (2) or 'Administrative Reset' (4). Its contents are at the operator's discretion.
