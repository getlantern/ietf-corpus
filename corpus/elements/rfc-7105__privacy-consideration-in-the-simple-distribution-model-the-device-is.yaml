document: rfc-7105
kind: privacy-consideration
summary: In the simple distribution model, the Device is the sole entity authorized to distribute measurement data; no entity (including the LIS) may redistribute it. The LIS may use measurement data only to serve the specific request that contained it, unless the Device explicitly permits other uses such as serving location URIs.
section: "6.1"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
