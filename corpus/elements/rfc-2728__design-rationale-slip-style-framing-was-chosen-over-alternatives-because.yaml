document: rfc-2728
kind: design-rationale
summary: SLIP-style framing was chosen over alternatives because SLIP implementations are widely available (RFC 1055) and provide simple, well-understood packet delimiting for a serial data stream. The framing is explicitly identical to SLIP rather than a new protocol.
