document: rfc-9080
kind: normative-requirement
summary: If an HNCP node assigns a prefix P to an attached link and announces P in an Assigned-Prefix TLV, it MUST announce a route towards P over Babel to ensure the prefix is routable within the Homenet.
section: "3.1"
rfc2119_level: MUST
topics:
