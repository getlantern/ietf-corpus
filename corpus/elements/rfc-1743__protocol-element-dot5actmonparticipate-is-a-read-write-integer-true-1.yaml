document: rfc-1743
kind: protocol-element
summary: dot5ActMonParticipate is a read-write INTEGER (true(1)/false(2)) controlling whether the interface participates in active monitor selection. Write access is not required per the compliance statement. A change does not take effect until the next Active Monitor election, and might not take effect until the next interface open.
