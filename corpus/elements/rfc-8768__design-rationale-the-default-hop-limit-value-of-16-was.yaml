document: rfc-8768
kind: design-rationale
summary: The default Hop-Limit value of 16 was chosen to be large enough to avoid dropping legitimate requests in loop-free networks in the majority of cases, while not consuming excessive proxy resources when a loop does occur. The value remains configurable for unusual topologies.
