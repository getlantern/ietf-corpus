document: rfc-8591
kind: normative-requirement
summary: Sending and receiving UAs MUST support AES-128-GCM for content encryption and MUST support AES-128-WRAP for key encryption. If key agreement is supported, UAs MUST support ECDH with NIST P-256 and ANSI-X9.63-KDF/SHA-256, and SHOULD support ECDH with X25519.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
