document: rfc-5007
kind: security-consideration
summary: Relay agents SHOULD prevent untrusted sources from relaying LEASEQUERY messages, at minimum at perimeter relay agents. DHCPv6 servers MAY discard relayed LEASEQUERY messages or restrict relay chaining to limit exposure.
