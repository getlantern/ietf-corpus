document: rfc-2425
kind: interoperability-note
summary: 'The line-folding convention in text/directory differs from RFC 822: any CRLF immediately followed by whitespace anywhere in the content indicates a continued line and must be removed, not just at the start of a header.'
section: 5.8.2
