document: rfc-8132
kind: protocol-element
summary: The FETCH method requests that a server produce a representation as described by the request parameters (including options and payload) based on the resource specified by the effective request URI. Unlike GET, the FETCH payload is part of the cache key and the response cannot be assumed to be a complete representation of the resource.
