document: rfc-5891
kind: protocol-element
summary: IDNA applies only to domain names in the NAME and RDATA fields of DNS resource records whose CLASS is IN, regardless of the record TYPE (unless a new TYPE defines TYPE-specific rules). Special underscore labels (e.g., SRV) are incompatible with IDNA coding.
section: 3.2.1
topics:
    - dns
