document: rfc-5440
kind: protocol-element
summary: The SVEC (Synchronization VECtor) object allows a PCC to request synchronized computation of a set of TE LSPs, specifying dependency relationships (link-diverse, node-diverse, SRLG-diverse) that the PCE must honor across the bundled requests. A PCReq may include an svec-list preceding the request-list.
