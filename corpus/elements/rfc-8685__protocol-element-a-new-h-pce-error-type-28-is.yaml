document: rfc-8685
kind: protocol-element
summary: 'A new H-PCE Error-Type 28 is defined with two Error-Values: Error-Value=1 (H-PCE Capability not advertised) and Error-Value=2 (Parent PCE Capability cannot be provided). Error-Value=23 is added to existing Error-Type=10 for incompatible OF codes in H-PCE.'
