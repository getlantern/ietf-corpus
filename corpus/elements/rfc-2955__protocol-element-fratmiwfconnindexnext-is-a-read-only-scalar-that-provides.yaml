document: rfc-2955
kind: protocol-element
summary: frAtmIwfConnIndexNext is a read-only scalar that provides the next available index value for creating frAtmIwfConnectionTable rows. A value of 0 indicates no unassigned entries are available; the agent SHOULD advance the value after each retrieval.
