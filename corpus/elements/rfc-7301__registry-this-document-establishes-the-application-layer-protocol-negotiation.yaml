document: rfc-7301
kind: registry
summary: This document establishes the 'Application-Layer Protocol Negotiation (ALPN) Protocol IDs' registry under the 'Transport Layer Security (TLS) Extensions' heading, operating under the Expert Review policy. Each entry requires a Protocol name, Identification Sequence (opaque byte string), and a Reference. Initial entries include HTTP/1.1, SPDY/1, SPDY/2, and SPDY/3.
