document: rfc-9242
kind: design-rationale
summary: TCP encapsulation of IKE (RFC 8229) was considered as an alternative to handle large messages but was rejected as it has significant drawbacks and is intended only as a last resort when UDP is completely blocked. IKE_INTERMEDIATE over UDP with IKE fragmentation is the preferred approach.
section: "1"
topics:
