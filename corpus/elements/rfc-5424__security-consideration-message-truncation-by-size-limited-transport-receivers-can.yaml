document: rfc-5424
kind: security-consideration
summary: Message truncation by size-limited transport receivers can be exploited to hide critical log information. Vital information should be placed as early in the message as possible, and originators should limit user-supplied data size to prevent deliberate overflow.
section: "8.3"
topics:
    - security
