document: rfc-7839
kind: security-consideration
summary: DHCP messages have no inherent privacy protection; an eavesdropper monitoring the link between the DHCP server and relay agent can discover access-network information. Link-layer confidentiality and integrity protection SHOULD be employed to reduce the risk of disclosure and tampering.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
