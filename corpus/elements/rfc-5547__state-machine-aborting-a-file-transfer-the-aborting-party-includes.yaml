document: rfc-5547
kind: state-machine
summary: 'Aborting a file transfer: the aborting party includes ''#'' in the MSRP SEND end-line continuation field to abort the MSRP message, then sends a new SDP offer setting the ''m='' port to zero while preserving the same ''file-transfer-id''. The receiving party mirrors the abort in its SDP answer.'
