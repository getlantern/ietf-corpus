document: rfc-4055
kind: protocol-element
summary: RSASSA-PSS-params is encoded as SEQUENCE { hashAlgorithm [0] DEFAULT sha1Identifier, maskGenAlgorithm [1] DEFAULT mgf1SHA1Identifier, saltLength [2] INTEGER DEFAULT 20, trailerField [3] INTEGER DEFAULT 1 } with explicit tags. The trailerField MUST be 1 (representing hex 0xBC).
section: "3.1"
