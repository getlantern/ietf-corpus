document: rfc-8786
kind: protocol-element
summary: The Stateful PCE Request Parameters (SRP) object includes a Flags field that is a set of 32 bits. RFC 8231 originally described it as 'None defined yet'; this document updates the description to require unassigned flags be zeroed on transmission and ignored on receipt.
section: "3.2"
topics:
    - mpls
    - routing
