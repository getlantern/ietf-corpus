document: rfc-5555
kind: interoperability-note
summary: All binding update and binding acknowledgement extensions defined in this specification also apply when the mobile node communicates with a Mobility Anchor Point (MAP) as defined in RFC 5380; however, NAT traversal is unlikely to be needed with a MAP since it is expected to be in the same address domain.
