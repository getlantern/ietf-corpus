document: rfc-9186
kind: normative-requirement
summary: The OptionLength field of the BFD Discriminator PIM Hello Option MUST be set to 4. If it is not equal to 4, the option is malformed and the receiver MUST stop processing PIM Hello Options.
section: "2"
rfc2119_level: MUST
topics:
    - multicast
    - routing
