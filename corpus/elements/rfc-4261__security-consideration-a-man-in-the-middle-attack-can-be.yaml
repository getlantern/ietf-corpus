document: rfc-4261
kind: security-consideration
summary: A man-in-the-middle attack can be launched by deleting the Integrity-TLS object or altering the Client-Open or Client-Accept messages. If security is required, bootstrap policy must mandate it and implementations should reject messages that fail to include the Integrity-TLS object.
section: "11"
topics:
    - tls
    - security
