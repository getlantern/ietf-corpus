document: rfc-1533
kind: protocol-element
summary: Pad option (code 0, 1 octet, no length or data field) is used to align subsequent fields on word boundaries. End option (code 255, 1 octet) marks the end of valid information in the vendor field; subsequent octets should be filled with pad options.
