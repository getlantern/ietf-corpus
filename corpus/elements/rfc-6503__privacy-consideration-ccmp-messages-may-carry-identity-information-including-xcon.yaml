document: rfc-6503
kind: privacy-consideration
summary: CCMP messages may carry identity information including XCON-USERIDs, signaling URIs, display names, and role information. To protect the privacy of conference participants, CCMP traffic SHOULD be protected with TLS, and conference servers SHOULD NOT include sensitive data such as passwords in blueprint responses accessible to unauthorized users.
section: "10.3"
rfc2119_level: SHOULD
topics:
    - privacy
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
