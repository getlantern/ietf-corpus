document: rfc-1647
kind: normative-requirement
summary: It is strongly recommended that Telnet commands (other than IAC IAC) be sent between TN3270E data messages, without a header and without a trailing IAC EOR. Placing Telnet commands inside a data message (between the header and trailing IAC EOR) is explicitly discouraged because processing order is implementation-dependent.
section: "8"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
