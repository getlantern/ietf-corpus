document: rfc-7616
kind: security-consideration
summary: The server password file typically stores H(A1) = H(username ":" realm ":" password). A compromised file gives an attacker immediate access to the protected realm without decryption; the password file must therefore be protected as if it contained cleartext passwords.
section: "5.2"
topics:
    - security
    - http
