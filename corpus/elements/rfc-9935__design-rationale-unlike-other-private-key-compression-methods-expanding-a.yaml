document: rfc-9935
kind: design-rationale
summary: 'Unlike other private key compression methods, expanding a private key from a seed is a one-way function: once the full key is expanded and the seed discarded, the seed cannot be recreated. For this reason, implementations are RECOMMENDED to retain and export the seed even when also exporting the expanded private key.'
section: "7"
