summary: The <person> element (namespace urn:ietf:params:xml:ns:pidf:data-model) is a child of <presence> with a required 'id' attribute (xs:ID) carrying the occurrence identifier. It contains zero or more extensible status/characteristic elements, optional <note> elements (each optionally bearing xml:lang), and an optional <timestamp>.
