document: rfc-4238
kind: design-rationale
summary: 'Two routing mechanisms are defined: a complete service using ENUM to find a VPIM LDAP directory and retrieve a verified email address, and a basic ''send-and-pray'' service using only ENUM NAPTR rewrite rules and DNS MX records. The basic service exists because LDAP queries may be unavailable for disconnected mobile terminals or due to firewall policies.'
