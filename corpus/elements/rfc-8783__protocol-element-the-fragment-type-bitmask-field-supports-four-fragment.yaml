document: rfc-8783
kind: protocol-element
summary: 'The ''fragment-type'' bitmask field supports four fragment states: ''df'' (Don''t Fragment, IPv4 only), ''isf'' (Is a Fragment), ''ff'' (First Fragment), and ''lf'' (Last Fragment). An ''operator'' field (not/match/any) governs how the bitmask is applied.'
section: "4.3"
