document: rfc-6030
kind: protocol-element
summary: 'The <EncryptionKey> element, a child of <KeyContainer>, specifies the key protection method for all enclosed <KeyPackage> elements: pre-shared keys (via <ds:KeyName>), passphrase-derived keys (via <xenc11:DerivedKey> with PBKDF2), or asymmetric keys (via <ds:X509Data>). The same encryption algorithm MUST be applied to all encrypted elements.'
section: "6"
topics:
    - crypto
    - security
    - pkix
