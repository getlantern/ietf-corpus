document: rfc-5891
kind: protocol-element
summary: 'The IDNA registration protocol (Section 4) defines a sequential process: accept NFC Unicode input, reject disallowed/unassigned characters, perform label validation (hyphen, combining mark, contextual rules, Bidi), apply registry restrictions, convert to A-label via Punycode, then insert in the DNS zone.'
