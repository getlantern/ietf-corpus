document: rfc-4724
kind: normative-requirement
summary: When restarting, the Restarting Speaker MUST retain, if possible, forwarding state for BGP routes in the Loc-RIB and MUST mark them as stale. It MUST NOT differentiate between stale and other information during forwarding.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
