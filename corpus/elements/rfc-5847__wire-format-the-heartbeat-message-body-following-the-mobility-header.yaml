summary: 'The Heartbeat message body (following the Mobility Header Checksum field) consists of: 14-bit Reserved + U flag (1 bit) + R flag (1 bit) = 16 bits total for the first word, followed by a 32-bit Sequence Number, then variable-length Mobility Options padded to a multiple of 8 octets.'
