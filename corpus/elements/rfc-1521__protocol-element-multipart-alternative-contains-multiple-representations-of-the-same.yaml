document: rfc-1521
kind: protocol-element
summary: Multipart/alternative contains multiple representations of the same information ordered from least to most preferred. A receiving system should display the best version it can handle, chosen based on local environment and preferences. All parts share the same Content-ID when representing the same data.
section: 7.2.3
