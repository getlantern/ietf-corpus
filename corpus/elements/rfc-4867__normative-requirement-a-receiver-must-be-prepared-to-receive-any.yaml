document: rfc-4867
kind: normative-requirement
summary: A receiver MUST be prepared to receive any speech frame multiple times (exact duplicates, different AMR rate modes, or data present vs. absent). If multiple versions of the same speech frame are received, it is RECOMMENDED that the mode with the highest rate be used by the speech decoder.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
