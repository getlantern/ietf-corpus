document: rfc-4662
kind: normative-requirement
summary: The 'cid' attribute MUST be present in an <instance> element if the 'state' attribute is 'active'. It identifies the section within the multipart/related body containing the actual resource state, and MUST refer only to top-level parts of the multipart/related document for which the RLMI document is the root.
section: "5.5"
rfc2119_level: MUST
topics:
