document: rfc-9252
kind: protocol-element
summary: For EVPN Route Type 2 (MAC/IP Advertisement) over SRv6 core, MPLS Label1 (24-bit) carries the Function part of the SRv6 L2 Service SID and MPLS Label2 (24-bit, optional) carries the Function part of an SRv6 L3 Service SID when the Transposition Scheme is used (Transposition Length ≤ 24). When not using transposition, both labels are set to Implicit NULL in the higher-order 20 bits (0x000030).
section: "6.2"
topics:
    - bgp
    - routing
