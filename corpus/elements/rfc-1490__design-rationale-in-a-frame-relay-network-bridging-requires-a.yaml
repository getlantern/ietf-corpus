document: rfc-1490
kind: design-rationale
summary: In a Frame Relay network, bridging requires a full mesh of virtual circuits between all bridges in a remote bridge group. If the Frame Relay network is not a full mesh, the bridge network must be divided into multiple remote bridge groups, each of which is internally fully meshed.
section: "10"
