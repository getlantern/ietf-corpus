document: rfc-1334
kind: normative-requirement
summary: The CHAP authenticator MUST transmit a Challenge packet (Code 1) and MUST send additional Challenges until a valid Response is received or a retry counter expires. Whenever a Challenge is received, the peer MUST respond with a Response packet (Code 2).
section: 3.2.1
rfc2119_level: MUST
topics:
    - security
    - crypto
