document: rfc-4304
kind: design-rationale
summary: The ESN option exists to permit transmission of very large volumes of data at high speeds over an IPsec Security Association without rekeying to avoid sequence number space exhaustion, addressing the limitations of traditional 32-bit sequence numbers.
