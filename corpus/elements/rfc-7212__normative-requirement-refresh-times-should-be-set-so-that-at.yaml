document: rfc-7212
kind: normative-requirement
summary: Refresh times SHOULD be set so that at least three updates are sent prior to Lifetime expiration. For example, a Lifetime of 210 seconds requires updates at least once every 60 seconds.
section: "5.1"
rfc2119_level: SHOULD
topics:
