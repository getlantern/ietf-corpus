document: rfc-6389
kind: normative-requirement
summary: For LDP P2MP on a LAN, if Ru receives a Label Request for an upstream-assigned label for the same P2MP FEC from multiple downstream LSRs <Rd1...Rdn>, it MUST send the same upstream-assigned label to each of them.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - multicast
