kind: protocol-element
summary: 'The preferred format for the Content Type field follows RFC 9110 Section 8.3.1: (1) case-insensitive elements use lowercase, (2) parameter values are quoted only if required by RFC 9110 Section 5.6.6, and (3) a single semicolon without adjacent whitespace separates the Media Type from parameters.'
