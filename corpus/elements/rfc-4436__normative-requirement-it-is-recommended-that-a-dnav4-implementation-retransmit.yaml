document: rfc-4436
kind: normative-requirement
summary: It is RECOMMENDED that a DNAv4 implementation retransmit no more than twice, and it is RECOMMENDED that the DNAv4 procedure be carried out no more than once a second to provide damping against spurious 'Link Up' indications.
section: "2.1"
rfc2119_level: RECOMMENDED
