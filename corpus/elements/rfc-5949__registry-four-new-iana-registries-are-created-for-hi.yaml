kind: registry
summary: Four new IANA registries are created for HI Flags (S=0x80, U=0x40, P=0x20, F=0x10), HAck Flags (U=0x80, P=0x40, F=0x20), HI Status Codes (0–3 defined, 4–255 unassigned), and HAck Status Codes (0–6 and 128–132 defined). All require Standards Action or IESG approval for new values.
