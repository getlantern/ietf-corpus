document: rfc-8008
kind: normative-requirement
summary: CDNs SHOULD NOT advertise support for mandatory-to-implement CDNI Logging record-types, as doing so would be redundant. For a given record-type, CDNs SHOULD NOT advertise support for mandatory-to-implement CDNI Logging fields either.
section: "4"
rfc2119_level: SHOULD NOT
