summary: 'The Connectionless Data Transfer (CLDT) message transfers data between SUA peers. Mandatory parameters: Routing Context, Protocol Class, Source Address, Destination Address, Sequence Control, Data. Optional: SS7 Hop Count, Importance, Message Priority, Correlation ID, Segmentation. Covers SCCP UDT, XUDT, and LUDT messages.'
