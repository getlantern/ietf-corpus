document: rfc-6231
kind: protocol-element
summary: The <dialog> element is the IVR dialog execution container supporting child elements <prompt>, <control>, <collect>, and <record>. The 'repeatCount' (default 1), 'repeatDur', and 'repeatUntilComplete' (default false) attributes govern iteration behavior; repeatDur takes priority over repeatCount.
