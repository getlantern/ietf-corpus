document: rfc-4447
kind: wire-format
summary: 'The PWid FEC Element (type 0x80) encodes: a 1-bit C (control word) flag, a 15-bit PW type, an 8-bit PW info length, a 32-bit Group ID, a 32-bit PW ID, and variable-length Interface Parameter Sub-TLVs. The PW ID is a non-zero value that together with the PW type identifies a particular PW.'
section: "5.2"
topics:
