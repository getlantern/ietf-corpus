document: rfc-3597
kind: normative-requirement
summary: Specifications for new RR types MUST NOT specify type-specific comparison rules. Two RRs of the same unknown type are considered equal when their RDATA is bitwise equal, ensuring comparison outcome is identical whether or not the server knows the type.
section: "6"
rfc2119_level: MUST NOT
topics:
    - dns
