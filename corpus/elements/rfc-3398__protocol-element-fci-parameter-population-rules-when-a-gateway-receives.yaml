document: rfc-3398
kind: protocol-element
summary: 'FCI parameter population rules: when a gateway receives comprehensible encapsulated ISUP, the generated IAM''s FCI interworking-related bits MUST match the encapsulated ISUP. Without encapsulated ISUP, it is STRONGLY RECOMMENDED to set the Interworking Indicator to ''no interworking'' and ISUP User Part Indicator to ''ISUP used all the way.'''
section: 7.2.1.1
topics:
    - voip
    - realtime
