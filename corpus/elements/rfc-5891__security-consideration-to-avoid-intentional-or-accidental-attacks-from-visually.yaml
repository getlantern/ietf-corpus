document: rfc-5891
kind: security-consideration
summary: To avoid intentional or accidental attacks from visually confusable labels and rendering problems, the IDNA model requires that registries exercise care and thoughtfulness about what labels they permit. Security considerations for IDNA2008 also reference RFC 5890 (definitions) and RFC 5893 (Bidi/RTL scripts).
section: "6"
topics:
