kind: protocol-element
summary: 'The EFM-CU-MIB module (OID mib-2 167) manages EFMCu 2BASE-TL and 10PASS-TS interfaces defined in IEEE 802.3ah-2004. It is split into two object groups: efmCuPort (PCS-level configuration, capability, status, and notifications) and efmCuPme (PME-level configuration, capability, and status).'
