document: rfc-9103
kind: normative-requirement
summary: XFR-over-TCP clients SHOULD reuse any existing open TCP connection when starting a new XFR request to the same primary or issuing SOA queries, rather than opening a new connection. The number of TCP connections between a secondary and primary SHOULD be minimized.
section: 6.3.1
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
