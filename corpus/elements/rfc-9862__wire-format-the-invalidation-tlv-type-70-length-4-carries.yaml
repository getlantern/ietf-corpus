document: rfc-9862
kind: wire-format
summary: 'The INVALIDATION TLV (Type 70, Length 4) carries two 8-bit flag fields: Oper (operational state, set to 0 by PCE, D-bit=Dropping) and Config (configuration, D-bit=Drop-enabled), followed by 16 Reserved bits. The PCE sets Oper=0; the PCC reports both Oper and Config states.'
section: 5.2.3
topics:
