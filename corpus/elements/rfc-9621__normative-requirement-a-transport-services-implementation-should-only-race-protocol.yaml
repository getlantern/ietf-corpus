document: rfc-9621
kind: normative-requirement
summary: A Transport Services Implementation SHOULD only race Protocol Stacks where the transport security protocols within the stacks are identical. It MUST only select Protocol Stacks that meet application requirements per RFC 8922.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - tls
