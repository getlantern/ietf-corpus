document: rfc-2982
kind: protocol-element
summary: 'The Expression MIB is organized into three sections: Resource (manages system resource usage), Definition (defines expressions via expExpressionTable and expObjectTable), and Value (holds evaluated expression results in expValueTable). Evaluated expression results are MIB objects usable anywhere other MIB objects can be used, including as event triggers.'
