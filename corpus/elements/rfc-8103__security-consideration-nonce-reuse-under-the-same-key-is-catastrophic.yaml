document: rfc-8103
kind: security-consideration
summary: 'Nonce reuse under the same key is catastrophic: it reveals both the one-time Poly1305 key and the keystream, exposing the XOR of the plaintexts (since XOR of ciphertexts equals XOR of plaintexts). CMS AuthEnvelopedData''s key management mechanisms are designed to avoid this by providing a fresh key per message.'
section: "6"
topics:
