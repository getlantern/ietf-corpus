document: rfc-7959
kind: security-consideration
summary: To mitigate amplification attacks, a CoAP server can limit the size of individual blocks returned (e.g., a 10-byte request returning a 64-byte block instead of a 1016-byte full representation), significantly reducing the amplification factor provided to attackers.
section: "7.2"
rfc2119_level: SHOULD
