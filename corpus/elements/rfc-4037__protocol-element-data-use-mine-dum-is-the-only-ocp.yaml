document: rfc-4037
kind: protocol-element
summary: Data Use Mine (DUM) is the only OCP Core message with a payload; it carries application data with a mandatory offset and optional 'Kept' (preservation commitment), 'As-is' (pass-through hint), and 'Modp' (modification probability) parameters. Data Use Yours (DUY) references a previously preserved chunk without retransmitting it.
section: "11.9"
