document: rfc-1738
kind: security-consideration
summary: Embedded encoded protocol delimiters (e.g., CR and LF for Telnet) MUST NOT be decoded before transmission. Premature decoding could allow an attacker to inject extra commands or parameters into a protocol session.
section: "6"
topics:
    - security
