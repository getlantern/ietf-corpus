document: rfc-9135
kind: protocol-element
summary: Upon a TS move in symmetric IRB, the source NVE removes the (IP, MAC) entry from its local ARP table after updating its MAC-VRF and IP-VRF tables. In asymmetric IRB, the source NVE instead updates its ARP table with the new target NVE adjacency information.
section: "7.1"
topics:
    - routing
    - mpls
