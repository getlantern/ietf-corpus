summary: 'The TUNNEL profile defines a set of reply codes for error conditions, including: 421 (service unavailable), 450 (destination unreachable/DNS failure), 530 (authentication required), 537 (action not authorized), 538 (encryption already enabled), 550 (destination reachable but TUNNEL not supported), and 554 (policy violation).'
