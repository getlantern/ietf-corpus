document: rfc-9442
kind: normative-requirement
summary: For reliable Downlink fragment transmission, the ACK-Always mode SHOULD be used. The fragment receiver MUST send an Uplink transmission and request a Downlink every 24 hours when no SCHC session is started.
section: 3.5.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
