document: rfc-6776
kind: protocol-element
summary: The APSI (Application-Specific Identifier) SDES item (type value 10) carries a variable-length application-specific identifier in an RTCP SDES packet. It enables correlation of XR block data within an RTP session with data from a non-RTP session.
