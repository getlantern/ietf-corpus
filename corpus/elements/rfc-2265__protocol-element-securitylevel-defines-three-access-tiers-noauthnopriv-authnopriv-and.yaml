document: rfc-2265
kind: protocol-element
summary: 'securityLevel defines three access tiers: noAuthNoPriv, authNoPriv, and authPriv. VACM uses securityLevel as an input to the access-control check and as an index in the vacmAccessTable, with higher levels granting more privileged access.'
