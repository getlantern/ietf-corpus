document: rfc-8842
kind: design-rationale
summary: The combination of both the offerer's and answerer's 'tls-id' values is required to uniquely identify a DTLS association because the offerer's value alone may be reused across associations (e.g., in SIP forking, or when an answerer initiates a new association in response to an unchanged offer).
section: "5.1"
topics:
    - realtime
    - sip
