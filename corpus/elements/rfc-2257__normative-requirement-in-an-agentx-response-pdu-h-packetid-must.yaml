document: rfc-2257
kind: normative-requirement
summary: In an agentx-Response-PDU, h.packetID must equal the packetID of the PDU to which it responds. All AgentX PDUs sent by the master agent with the same sessionID for a single SNMP management request must carry the same h.transactionID; PDUs from distinct requests must have distinct transactionIDs.
section: "6.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
