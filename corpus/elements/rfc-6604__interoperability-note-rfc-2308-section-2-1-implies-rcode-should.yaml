document: rfc-6604
kind: interoperability-note
summary: RFC 2308 Section 2.1 implies RCODE should be set from the last query cycle in an xNAME chain, but RFC 2308 Section 2.2.1 acknowledges that some servers do not follow this behavior. RFC 6604 resolves this ambiguity by mandating the final-cycle RCODE rule.
section: "3"
topics:
