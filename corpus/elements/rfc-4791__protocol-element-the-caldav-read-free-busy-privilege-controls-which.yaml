document: rfc-4791
kind: protocol-element
summary: The CALDAV:read-free-busy privilege controls which resources are examined during a free-busy-query REPORT. It MUST be aggregated in the DAV:read privilege, and servers MUST allow it to be granted independently of DAV:read.
