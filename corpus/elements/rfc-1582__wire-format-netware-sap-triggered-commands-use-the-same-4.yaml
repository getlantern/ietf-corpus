summary: 'Netware SAP triggered commands use the same 4-octet extension (sequence number 2, fragment 1, fragment-count 1). Up to 8 service entries of 66 octets each follow: service type (4), service name (48), network address (4), node address (6), socket address (2), hops to server (2). Maximum datagram is 534 octets excluding the 30-octet IPX header.'
