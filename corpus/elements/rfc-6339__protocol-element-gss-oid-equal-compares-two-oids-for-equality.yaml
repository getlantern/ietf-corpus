document: rfc-6339
kind: protocol-element
summary: GSS_OID_equal() compares two OIDs for equality, returning non-zero when neither OID is GSS_C_NO_OID and the two OIDs are equal, and zero otherwise. GSS_C_NO_OID does not match any OID, including itself.
section: "5"
