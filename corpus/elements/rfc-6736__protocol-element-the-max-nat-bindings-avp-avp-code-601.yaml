document: rfc-6736
kind: protocol-element
summary: The Max-NAT-Bindings AVP (AVP Code 601, Unsigned32) defines the maximum number of NAT bindings permitted for the endpoint associated with the session. When present alongside a NAT-Control-Binding-Template, it overrides the template's binding limit.
section: 8.7.7
topics:
