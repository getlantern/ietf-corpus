document: rfc-8883
kind: interoperability-note
summary: Code 5 (Unrecognized Next Header by intermediate node) is distinct from RFC 8200's existing code 1 (Unrecognized Next Header by final destination). Final destinations encountering an unrecognized Next Header SHOULD use code 1, not code 5, to preserve semantic distinction between intermediate and destination processing.
section: "2.2"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
