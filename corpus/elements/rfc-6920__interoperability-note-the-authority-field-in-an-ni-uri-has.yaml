document: rfc-6920
kind: interoperability-note
summary: 'The authority field in an ni URI has different semantics from HTTP URL authorities: ni URIs with different authorities (or no authority) that have matching digest algorithm, length, and value all refer to the same object. The authority assists applications in accessing the object but does not affect identity.'
section: "3"
topics:
