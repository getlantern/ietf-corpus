document: rfc-5059
kind: interoperability-note
summary: Routers that implement only RFC 2362 (the original BSR) or non-scoped BSR cannot participate within admin-scope zones, because they only support one BSR per domain and cannot store RP-Sets for multiple scope zones simultaneously.
section: "1.3"
topics:
    - multicast
    - routing
