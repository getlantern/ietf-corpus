document: rfc-2511
kind: normative-requirement
summary: When CA policy requires POP verification by the CA, the RA MUST forward the end entity's CertRequest and ProofOfPossession fields unaltered to the CA. If the RA performs out-of-band POP verification instead, it MAY attest to the CA that the required proof has been validated.
section: "4"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
