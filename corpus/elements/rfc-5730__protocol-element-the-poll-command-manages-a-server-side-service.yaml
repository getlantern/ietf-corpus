document: rfc-5730
kind: protocol-element
summary: The <poll> command manages a server-side service message queue. With op="req" it retrieves the head message; with op="ack" and a msgID attribute it acknowledges receipt and dequeues the message. The response includes a <msgQ> element with 'count' and 'id' attributes, plus optional <qDate> and <msg> child elements.
section: 2.9.2.3
