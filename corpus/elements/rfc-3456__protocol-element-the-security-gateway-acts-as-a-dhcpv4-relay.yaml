document: rfc-3456
kind: protocol-element
summary: The security gateway acts as a DHCPv4 relay, inserting its address in the giaddr field and relaying packets between the client and the DHCP server. It does not request or renew addresses on the client's behalf. It snoops the yiaddr field in DHCPACK to learn the client's assigned address and plumb routes.
section: "4.2"
topics:
    - ipsec
    - vpn
