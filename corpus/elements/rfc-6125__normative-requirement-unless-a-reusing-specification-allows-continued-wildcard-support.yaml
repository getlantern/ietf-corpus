document: rfc-6125
kind: normative-requirement
summary: Unless a reusing specification allows continued wildcard support, the DNS domain name portion of a presented identifier SHOULD NOT contain the wildcard character '*', whether as the complete left-most label (e.g., *.example.com) or as a fragment (e.g., *oo.example.com).
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - tls
    - pkix
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
