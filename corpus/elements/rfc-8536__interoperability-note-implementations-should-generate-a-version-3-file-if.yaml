document: rfc-8536
kind: interoperability-note
summary: Implementations SHOULD generate a version 3 file if TZ string extensions are necessary to accurately model transitions; otherwise version 2 SHOULD be generated. The version 1 data SHOULD be a contiguous sub-sequence of version 2+ data to help old readers agree on timestamps within the overlap.
