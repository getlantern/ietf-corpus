document: rfc-2518
kind: wire-format
summary: The opaquelocktoken URI scheme uses the format 'opaquelocktoken:UUID[Extension]' where UUID is the ISO 11578 string representation of a UUID. No whitespace (LWS) is allowed between production elements. Extension is an optional path segment as defined in RFC 2068 section 3.2.1.
section: "6.4"
topics:
