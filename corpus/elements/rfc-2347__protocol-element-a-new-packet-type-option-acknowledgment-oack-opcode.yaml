document: rfc-2347
kind: protocol-element
summary: 'A new packet type, Option Acknowledgment (OACK), opcode 6, is defined. The OACK contains the options and values the server accepts, copied from the original request: |6|opt1|0|value1|0|...|optN|0|valueN|0|. Acknowledged values may differ from requested values if the option specification permits.'
section: Packet Formats
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
