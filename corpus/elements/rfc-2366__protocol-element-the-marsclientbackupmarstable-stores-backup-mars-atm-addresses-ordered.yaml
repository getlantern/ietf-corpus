document: rfc-2366
kind: protocol-element
summary: The marsClientBackupMarsTable stores backup MARS ATM addresses ordered by marsClientBackupMarsPriority (Unsigned32 0..65535, lower value = higher preference); addresses received via MARS_REDIRECT_MAP are inserted at the top of the list and take precedence over manually configured entries.
