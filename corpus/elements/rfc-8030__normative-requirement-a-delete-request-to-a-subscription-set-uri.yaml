document: rfc-8030
kind: normative-requirement
summary: A DELETE request to a subscription set URI MUST also remove all push message subscriptions in the set. If a specific push message subscription in a set is expired or removed, it MUST also be removed from its subscription set.
section: 7.3.1
rfc2119_level: MUST
topics:
    - http
