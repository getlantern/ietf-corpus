document: rfc-5925
kind: normative-requirement
summary: An endpoint MUST NOT use TCP-AO for the same connection in which TCP MD5 is used. When both options appear on a segment, TCP MUST silently discard that segment.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - tcp
    - security
