document: rfc-3376
kind: interoperability-note
summary: IGMPv3 hosts MUST operate in IGMPv1 and IGMPv2 compatibility modes when older-version queriers are present. An IGMPv1 router's Max Resp Code of 0 MUST be interpreted as 100 (10 seconds). When in IGMPv2 compatibility mode, a host uses only the IGMPv2 protocol on that interface.
section: 7.2.1
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
