document: rfc-8007
kind: normative-requirement
summary: When a CI/T Trigger Command is accepted, the dCDN MUST create a new Trigger Status Resource, respond with HTTP 201, and convey the resource URI in the Location header. The URI of a Trigger Status Resource MUST NOT be reused after the resource is removed.
section: "4.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
