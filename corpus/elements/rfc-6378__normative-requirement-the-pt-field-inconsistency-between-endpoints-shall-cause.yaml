document: rfc-6378
kind: normative-requirement
summary: The PT field inconsistency between endpoints SHALL cause an alarm to be sent to the management system. If the Revertive (R) field is inconsistent between endpoints (one revertive, one non-revertive), the management system SHOULD be notified.
section: 4.2.3
rfc2119_level: MUST
