document: rfc-6572
kind: normative-requirement
summary: The Chargeable-User-Identity (CUI, Type 89) MUST be present in the Access-Accept if it was present in the Access-Request. Once supported, the MAG and/or LMA commits to include the CUI in all subsequent RADIUS Accounting packets for that user.
section: "4.19"
rfc2119_level: MUST
topics:
    - mobility
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
