document: rfc-9893
kind: security-consideration
summary: A malicious actor masquerading as a DLEP peer could inject a Credit Window Initialization Data Item that resizes a credit window to cause a denial of service. Transport-layer security per RFC 8175 and BCP 195, as well as Layer 2 security (IEEE 802.1AE, IEEE 8802-1X), should be applied to mitigate such threats.
section: "4"
topics:
