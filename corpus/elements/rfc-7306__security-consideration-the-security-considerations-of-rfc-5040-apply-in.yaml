document: rfc-7306
kind: security-consideration
summary: The Security Considerations of RFC 5040 apply in full. Atomic Operations use the same ULP Buffer address-based remote buffer addressing as defined in RFC 5040 and are subject to the security model in RFC 5042, which requires that Tagged Buffer access be authorized through the STag mechanism.
section: "9"
