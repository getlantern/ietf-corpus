document: rfc-7172
kind: normative-requirement
summary: An FGL TRILL switch MUST NOT egress an FGL packet with label (X.Y) to any port not configured with that FGL, even if the port is configured to egress VL packets in VLAN X.
section: "4.3"
rfc2119_level: MUST NOT
topics:
