document: rfc-8618
kind: protocol-element
summary: QueryResponseSignature captures fields common across multiple Q/R data items, including server address/port, transport flags, QR type (Stub/Client/Resolver/Authoritative/Forwarder/Tool), QR signature flags, query OPCODE, DNS header flags, RCODEs, section counts, and EDNS parameters. These are stored once in a block table and indexed.
