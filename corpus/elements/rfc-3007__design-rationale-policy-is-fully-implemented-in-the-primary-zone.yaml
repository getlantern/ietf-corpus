document: rfc-3007
kind: design-rationale
summary: Policy is fully implemented in the primary zone server's configuration rather than encoded in KEY RR bits to remove fixed-bit limitations, avoid exposing policy in DNS data, and prevent policy changes from causing interoperability failures or requiring protocol changes.
section: "3"
topics:
    - dns
    - security
