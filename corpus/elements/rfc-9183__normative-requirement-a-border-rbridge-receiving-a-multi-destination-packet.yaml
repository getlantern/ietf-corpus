document: rfc-9183
kind: normative-requirement
summary: A border RBridge receiving a multi-destination packet whose ingress nickname is a border RBridge nickname of its own area MUST NOT transition that packet back into its own area, preventing forwarding loops.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
