document: rfc-9182
kind: protocol-element
summary: OSPF CE-PE configuration includes 'area-id' (dotted-quad), 'metric', 'sham-links' (for sites sharing an OSPF area with a backdoor link), 'max-lsa', and authentication options (IPsec for OSPFv3, Authentication Trailer for OSPFv2/v3). The implementation chooses OSPFv2 or OSPFv3 when IPv4 or dual-stack is requested.
section: 7.6.3.3
