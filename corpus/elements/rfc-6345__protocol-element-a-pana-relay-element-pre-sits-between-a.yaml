document: rfc-6345
kind: protocol-element
summary: A PANA Relay Element (PRE) sits between a PaC and a PAA, relaying PANA messages between them. The PRE does not maintain per-PaC state; from the PaC's perspective it appears as the PAA. A PRE can serve multiple PAAs and will select one PAA per PaC.
section: "2"
