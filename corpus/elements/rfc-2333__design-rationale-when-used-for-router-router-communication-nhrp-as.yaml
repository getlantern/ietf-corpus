document: rfc-2333
kind: design-rationale
summary: When used for router-router communication, NHRP (as defined in RFC 2332) can produce persistent routing loops if the underlying routing protocol loses information critical to loop suppression, such as when router metrics change across autonomous system boundaries. Work to address this is noted as in progress.
