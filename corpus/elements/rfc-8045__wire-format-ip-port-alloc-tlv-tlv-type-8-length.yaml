summary: 'IP-Port-Alloc TLV (TLV-Type 8, Length 6 octets) carries IPFIX natEvent (IE 230) as unsigned8 right-justified in 32 bits: value 1 = allocation, value 2 = deallocation, value 0 is reserved. It MUST be present in IP-Port-Range (241.6.8).'
