document: rfc-3946
kind: protocol-element
summary: For RSVP-TE, SONET/SDH traffic parameters are carried in SENDER_TSPEC (Class=12, C-Type=4) and FLOWSPEC (Class=9, C-Type=4) objects using identical format. There is no Adspec associated with the SONET/SDH SENDER_TSPEC; either the Adspec is omitted or an int-serv Adspec with Default General Characterization Parameters is used per RFC 2210.
section: "2.2"
topics:
    - mpls
    - routing
