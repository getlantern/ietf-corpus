document: rfc-1332
kind: normative-requirement
summary: The IP-Addresses option SHOULD NOT be sent in a Configure-Request if a Configure-Request has been received which includes either an IP-Addresses or IP-Address option. It MAY be sent if a Configure-Reject is received for the IP-Address option.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
