document: rfc-9428
kind: normative-requirement
summary: Because NFC does not support multicast, the 6LBR MUST keep track of multicast listeners at NFC link-level granularity and MUST NOT forward multicast packets to 6LNs that have not registered as listeners for the relevant multicast groups.
section: "4.8"
rfc2119_level: MUST
topics:
    - ip
    - multicast
