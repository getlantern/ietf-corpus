document: rfc-7070
kind: privacy-consideration
summary: Input data submitted to a reputation service (one party's assessment of another) is often meant to be kept in confidence. Both the collection of raw input data and the storage and output of aggregated results require protection against inadvertent or unauthorized exposure.
section: "8.2"
