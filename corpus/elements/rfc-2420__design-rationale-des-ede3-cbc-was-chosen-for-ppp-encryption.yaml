document: rfc-2420
kind: design-rationale
summary: DES-EDE3-CBC was chosen for PPP encryption because it is a well-studied, widely implemented algorithm that was also selected for the security section of IP (IPsec ESP). When all three keys are identical, DES-EDE3-CBC is equivalent to DES-CBC, providing backwards compatibility.
