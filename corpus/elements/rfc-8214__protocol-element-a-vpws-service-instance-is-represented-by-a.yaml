document: rfc-8214
kind: protocol-element
summary: A VPWS service instance is represented by a pair of EVPN service labels associated with a pair of endpoints; each label is downstream-assigned and advertised by the disposition PE via a per-EVI Ethernet A-D route, and a VPWS service instance can be associated with only one VPWS service identifier.
