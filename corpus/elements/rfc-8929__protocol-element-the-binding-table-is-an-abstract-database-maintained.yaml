document: rfc-8929
kind: protocol-element
summary: The Binding Table is an abstract database maintained by each 6BBR to store registration state. Each Binding holds the Registered Address, Registering Node anchor info (connecting interface, link-local address, LLA), the EARO including ROVR and TID, a state (Tentative, Reachable, or Stale), and optional trust level. The combined Binding Tables of all 6BBRs on a backbone form a distributed database.
section: "3.4"
