document: rfc-4338
kind: normative-requirement
summary: For IPv4 address mapping, a source Nx_Port MUST consult its local mapping tables; if no mapping or valid Port Login exists, it MUST send a broadcast FC ARP Request. Upon receiving a broadcast FC ARP Request, the matching Nx_Port MUST perform a Port Login (if none exists) before sending the unicast ARP Reply.
section: "9.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
