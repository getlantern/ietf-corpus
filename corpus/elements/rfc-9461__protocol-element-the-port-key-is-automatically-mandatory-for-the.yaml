document: rfc-9461
kind: protocol-element
summary: The "port" key is automatically mandatory for the "dns" SVCB binding. A client that does not respect the "port" key MUST ignore any SVCB record containing this key, as defined by the SVCB "automatically mandatory" semantics.
section: "4.2"
topics:
