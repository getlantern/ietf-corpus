document: rfc-7233
kind: protocol-element
summary: 'The If-Range header field allows a client to short-circuit a two-request resume sequence: if the representation is unchanged (validator matches), send only the requested range; otherwise send the entire representation. Its value is an entity-tag or HTTP-date.'
section: "3.2"
