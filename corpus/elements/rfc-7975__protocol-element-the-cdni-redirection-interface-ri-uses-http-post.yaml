kind: protocol-element
summary: The CDNI Redirection Interface (RI) uses HTTP POST from uCDN to dCDN's RI URI, encapsulating User Agent request attributes in a JSON body. The dCDN responds with HTTP 200 and a JSON body containing Redirection Target attributes and caching policy.
