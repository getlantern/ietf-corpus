document: rfc-9115
kind: interoperability-note
summary: 'The ''allow-certificate-get'' elements defined here for non-STAR certificates have the same names and semantics as those in RFC 8739 Section 3.4 for STAR, but differ in position: they appear at the top level of the directory meta and order objects rather than inside an ''auto-renewal'' subobject.'
