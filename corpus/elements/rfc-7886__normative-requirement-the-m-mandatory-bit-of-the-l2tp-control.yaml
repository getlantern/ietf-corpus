document: rfc-7886
kind: normative-requirement
summary: The M (Mandatory) bit of the L2TP control message MUST NOT be set inside the S-BFD Target Discriminator ID AVP. This ensures that peers that do not understand the AVP can safely ignore it without tearing down the session.
section: "2.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
