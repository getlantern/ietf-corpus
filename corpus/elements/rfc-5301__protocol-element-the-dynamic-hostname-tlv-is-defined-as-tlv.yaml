document: rfc-5301
kind: protocol-element
summary: The Dynamic Hostname TLV is defined as TLV type 137, carrying a variable-length value field of 1 to 255 bytes representing the symbolic hostname of the router originating the LSP. The system ID of the router can be derived from the LSP identifier.
