document: rfc-3010
kind: protocol-element
summary: 'File locking uses a lease-based model: the server defines a single lease period for all state held by an NFS client, and if the client does not renew its lease within the period via RENEW or other operations, all lock state associated with the client may be released.'
section: 1.1.5
