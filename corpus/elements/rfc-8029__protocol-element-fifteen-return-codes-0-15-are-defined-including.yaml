document: rfc-8029
kind: protocol-element
summary: 'Fifteen Return Codes (0–15) are defined, including: 0 (No Return Code), 3 (Egress for FEC at stack-depth <RSC>), 4 (No mapping for FEC), 8 (Label switched at stack-depth <RSC>), 10 (Mapping mismatch), 11 (No label entry), 13 (Premature termination), 14 (See DDMAP TLV), and 15 (Label switched with FEC change). Return Code 14 MUST only appear in echo reply messages.'
section: "3.1"
topics:
    - mpls
