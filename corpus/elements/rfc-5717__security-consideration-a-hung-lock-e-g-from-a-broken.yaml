document: rfc-5717
kind: security-consideration
summary: A hung lock (e.g., from a broken TCP connection) can be released by killing the owning session via <kill-session> from another NETCONF session. The NETCONF server MAY log partial lock requests in an audit trail.
section: "3"
topics:
    - netconf
    - security
