document: rfc-8925
kind: design-rationale
summary: The option is restricted to networks providing NAT64 because that is the only transition technology widely supported by end hosts at the time of writing. Adding support for hypothetical future transition technologies is deferred; if a future mechanism is incompatible with NAT64, a new DHCPv4 option would be needed.
section: "4"
topics:
