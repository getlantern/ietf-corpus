document: rfc-9432
kind: normative-requirement
summary: A catalog zone MUST follow the usual rules for DNS zones; SOA and NS record sets MUST be present. A single NS RR with NSDNAME 'invalid.' is RECOMMENDED to satisfy syntactic correctness without implying recursive accessibility.
section: "4"
rfc2119_level: MUST
topics:
