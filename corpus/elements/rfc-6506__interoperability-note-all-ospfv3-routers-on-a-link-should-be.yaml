document: rfc-6506
kind: interoperability-note
summary: All OSPFv3 routers on a link SHOULD be migrated to OSPFv3 Authentication simultaneously, since a mismatch in SA ID, Authentication Type, or message digest prevents adjacency formation. A transition mode is defined where a router MAY include the Authentication Trailer in transmitted packets without verifying it in received packets to ease incremental deployment.
section: "5"
topics:
    - routing
    - security
