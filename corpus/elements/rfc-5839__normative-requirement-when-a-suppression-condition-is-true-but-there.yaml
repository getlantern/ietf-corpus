document: rfc-5839
kind: normative-requirement
summary: When a suppression condition is true but there are reportable changes in the NOTIFY header (e.g., Subscription-State changed), the notifier MUST suppress the body of the NOTIFY request, setting Content-Length to zero and omitting Content-Type.
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
