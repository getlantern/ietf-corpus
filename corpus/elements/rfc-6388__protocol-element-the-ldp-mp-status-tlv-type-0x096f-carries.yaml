document: rfc-6388
kind: protocol-element
summary: The LDP MP Status TLV (type 0x096F) carries additional status for an MP LSP to remote peers. It may appear in a Label Mapping message or an LDP Notification message and contains one or more LDP MP Status Value Elements, each with a 1-octet type, 2-octet length, and variable value.
section: "5"
topics:
