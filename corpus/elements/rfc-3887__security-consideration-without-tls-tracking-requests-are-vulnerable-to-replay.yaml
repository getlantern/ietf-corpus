document: rfc-3887
kind: security-consideration
summary: Without TLS, tracking requests are vulnerable to replay attacks where a snooper can replay the same handshake to gain information about a message's status. The security of tracking information depends on the randomness and exposure level of the per-message secret.
section: "11"
