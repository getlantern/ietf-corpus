document: rfc-4639
kind: protocol-element
summary: docsDevRole identifies the device as cm(1), cmtsActive(2), or cmtsBackup(3). For a CM, the role does not change during operation; for a CMTS, it may transition between cmtsActive and cmtsBackup. cmtsBackup is defined for completeness despite lacking current DOCSIS standard support.
