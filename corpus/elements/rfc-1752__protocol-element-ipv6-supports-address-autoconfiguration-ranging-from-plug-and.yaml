document: rfc-1752
kind: protocol-element
summary: IPv6 supports address autoconfiguration ranging from plug-and-play serverless configuration (using IEEE 802 address as the low-order node ID part of the 128-bit address) to full DHCP-style allocation. A host must be able to acquire an address dynamically when first attaching or when readdressed.
