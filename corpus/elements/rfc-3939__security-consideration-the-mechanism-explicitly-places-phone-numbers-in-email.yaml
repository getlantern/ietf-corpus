document: rfc-3939
kind: security-consideration
summary: The mechanism explicitly places phone numbers in email headers used to store voice messages. Recipients may be unaware this information is present unless their client surfaces it. The intent is informational use analogous to caller ID display on a telephone screen.
section: "7"
topics:
    - security
    - privacy
    - email
