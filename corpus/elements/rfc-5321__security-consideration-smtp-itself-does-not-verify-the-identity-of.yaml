document: rfc-5321
kind: security-consideration
summary: SMTP itself does not verify the identity of a message originator; envelope information (MAIL FROM) can be falsified. Mechanisms such as SPF and DKIM have been developed to provide ways to ascertain address validity, but SMTP servers are not required to use them.
section: "7.1"
topics:
    - email
    - security
