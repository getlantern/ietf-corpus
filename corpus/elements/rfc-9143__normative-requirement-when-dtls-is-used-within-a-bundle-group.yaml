document: rfc-9143
kind: normative-requirement
summary: When DTLS is used within a BUNDLE group, there MUST be only one DTLS association. If the DTLS client supports DTLS-SRTP, it MUST include the 'use_srtp' extension in the DTLS ClientHello message, even if DTLS-SRTP is not currently negotiated as part of the multimedia session.
section: "11"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
