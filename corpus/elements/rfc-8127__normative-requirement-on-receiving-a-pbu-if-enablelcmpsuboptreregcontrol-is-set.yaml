document: rfc-8127
kind: normative-requirement
summary: On receiving a PBU, if EnableLCMPSubOptReregControl is set and all three re-registration timer variables are NON_ZERO, the LMA MUST include the Binding Re-registration Control Sub-Option in the PBA. If any of the three variables is ZERO, the LMA MUST reject the binding with status code '128 - Reason Unspecified'.
section: "5.1"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
