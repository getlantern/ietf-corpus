document: rfc-9516
kind: normative-requirement
summary: When the Reply Mode is set to 'Reply via an IPv4/IPv6 UDP Packet' (2) or its integrity-protected variant (5), and the SFC Echo Request is not encapsulated in IP/UDP, the sender MUST include the Source ID TLV so the responder can determine the destination IP address and UDP port for the Echo Reply.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
