document: rfc-2446
kind: protocol-element
summary: The PUBLISH method is an unsolicited posting of a calendar component. For VEVENT PUBLISH, ORGANIZER MUST be present, ATTENDEE MUST NOT be present, and DTSTAMP, DTSTART, SUMMARY, and UID are required. The Organizer may subsequently update (PUBLISH), add instances (ADD), or cancel (CANCEL) the published component.
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
