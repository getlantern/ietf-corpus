document: rfc-4749
kind: design-rationale
summary: The RTP clock rate is fixed at 16 kHz regardless of the actual encoder/decoder sampling configuration (8 or 16 kHz) because the bitstream itself is unaffected by the I/O sampling rate and the decoder needs no a priori knowledge about the encoder's input sample rate.
