document: rfc-4724
kind: protocol-element
summary: The Restart State (R) bit in the Restart Flags field indicates that the BGP speaker has restarted. When set, the peer MUST NOT wait for the End-of-RIB marker from this speaker before advertising routing information to it, preventing deadlock among multiple simultaneously restarting speakers.
section: "3"
topics:
    - bgp
    - routing
