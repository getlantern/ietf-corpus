document: rfc-8740
kind: design-rationale
summary: HTTP/2 multiplexes multiple requests over a single connection, making it impossible for clients to correlate a TLS CertificateRequest with the HTTP request that triggered it — the same problem that motivated forbidding TLS 1.2 renegotiation in RFC 7540 Section 9.2.1, now extended to TLS 1.3 post-handshake authentication.
section: "1"
topics:
    - http
    - tls
