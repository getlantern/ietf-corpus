document: rfc-2814
kind: design-rationale
summary: Admission control efficiency improves as managed-segment granularity increases. In the ideal limit each physical segment is its own managed segment with a DSBM configured with an accurate capacity estimate; a single DSBM managing a complex multi-segment topology must approximate capacity and consequently may over- or under-admit.
section: "7.2"
topics:
