document: rfc-6910
kind: design-rationale
summary: Unlike SS7/PSTN where intermediate media gateway controllers must implement CC, in SIP only the caller's UA and callee's UA (or their associated service systems) need CC support. Intermediate proxies and B2BUAs need only be transparent to ordinary SIP messages, simplifying deployment.
section: "4.4"
topics:
    - sip
    - voip
