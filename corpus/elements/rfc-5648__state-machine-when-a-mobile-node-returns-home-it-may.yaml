document: rfc-5648
kind: state-machine
summary: 'When a mobile node returns home, it may enter one of three states: (1) full de-registration via the home interface (RFC 3775 behavior), (2) continued foreign-link-only operation with the home interface shut down, or (3) simultaneous home and foreign link operation requiring home binding registration with the H flag. Transition to state 3 is triggered by sending a BU with H flag set and non-zero lifetime.'
section: "5.5"
topics:
    - mobility
    - ip
