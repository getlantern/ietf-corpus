document: rfc-4666
kind: normative-requirement
summary: Routing Keys SHOULD be unique such that each received SS7 signalling message SHOULD have a full or partial match to a single routing result. In the n+k redundancy model, traffic SHOULD be sent only after 'n' ASPs are active.
section: 1.4.2.2
rfc2119_level: SHOULD
