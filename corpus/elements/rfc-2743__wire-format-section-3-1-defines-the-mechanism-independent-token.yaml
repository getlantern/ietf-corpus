document: rfc-2743
kind: wire-format
summary: 'Section 3.1 defines the Mechanism-Independent Token Format for the initial context-level token: a DER-encoded ASN.1 Application tag (0x60) and length field, followed by a DER-encoded OID identifying the mechanism (mech_type), followed by mechanism-specific token data. Only the initial token carries this header; all subsequent tokens are entirely mechanism-specific.'
section: "3.1"
topics:
