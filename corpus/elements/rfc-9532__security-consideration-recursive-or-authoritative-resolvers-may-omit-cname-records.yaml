document: rfc-9532
kind: security-consideration
summary: Recursive or authoritative resolvers may omit CNAME records to hide cloaking of trackers or malicious hosts, and a malicious proxy may also suppress CNAME chain reporting. The absence of next-hop-aliases data is therefore not a reliable indicator that no CNAME records exist.
section: "4"
topics:
    - security
    - dns
    - http
    - privacy
