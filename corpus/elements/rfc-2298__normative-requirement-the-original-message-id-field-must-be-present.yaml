document: rfc-2298
kind: normative-requirement
summary: The Original-Message-ID field MUST be present if the original message contained a Message-ID header. The MDN-Gateway field MUST appear in any MDN translated by a gateway from a foreign system and MUST NOT appear otherwise.
section: 3.2.2
rfc2119_level: MUST
