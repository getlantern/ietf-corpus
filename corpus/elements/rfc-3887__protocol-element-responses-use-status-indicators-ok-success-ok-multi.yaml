document: rfc-3887
kind: protocol-element
summary: 'Responses use status indicators: +OK (success), +OK+ (multi-line success), -TEMP (temporary failure), -ERR (permanent failure), -BAD (protocol error). A status indicator MAY be followed by slash-delimited machine-parsable response codes and optional human-readable text.'
