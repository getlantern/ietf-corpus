document: rfc-9234
kind: interoperability-note
summary: Use of BGP Roles and OTC Attributes in networks with private AS numbers behind an Internet-facing ASN (e.g., data-center BGP per RFC 7938) is permitted, but on egress from the Internet-facing AS the OTC Attribute MUST NOT contain any value other than the Internet-facing ASN.
section: "5"
topics:
    - bgp
    - routing
