document: rfc-7428
kind: security-consideration
summary: IID derivation from 8-bit NodeIDs preserves intra-network uniqueness but offers no protection against forgery. Neighbor Discovery is susceptible to threats per RFC 3756, and mesh routing introduces additional ad hoc routing threats per [KW03]. Mandatory link-layer security with a shared key mitigates the majority of these threats.
section: "6"
topics:
    - security
    - ip
