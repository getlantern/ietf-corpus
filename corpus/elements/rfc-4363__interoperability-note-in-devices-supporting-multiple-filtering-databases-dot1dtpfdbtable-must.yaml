document: rfc-4363
kind: interoperability-note
summary: In devices supporting multiple Filtering Databases, dot1dTpFdbTable must report each MAC address only once per port even if learned in multiple FDBs; if learned on multiple ports across multiple FDBs, it may be reported on any one valid port. dot1dTpLearnedEntryDiscards counts overflow of any FDB, and dot1dTpAgingTime applies to all FDBs.
section: 3.4.3.3
topics:
    - snmp
