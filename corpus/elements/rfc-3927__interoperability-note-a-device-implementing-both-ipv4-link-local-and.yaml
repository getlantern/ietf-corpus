document: rfc-3927
kind: interoperability-note
summary: A device implementing both IPv4 Link-Local and a DHCPv4 client MUST NOT alter DHCPv4 client behavior to accommodate Link-Local configuration. Configuring a Link-Local address is not sufficient reason to unconfigure a valid DHCP lease, stop DHCP acquisition, or change DHCP timeouts or state machine behavior.
section: "2.11"
topics:
    - ip
    - zeroconf
