document: rfc-5601
kind: interoperability-note
summary: When a PW is represented as an ifIndex, it SHOULD NOT be stacked above the respective PSN tunnel ifIndex, attachment circuit ifIndex, or the interface carrying the attachment circuit. Additionally, PW notifications SHOULD be turned off to avoid duplication with ifIndex status change notifications.
section: "8"
rfc2119_level: SHOULD NOT
