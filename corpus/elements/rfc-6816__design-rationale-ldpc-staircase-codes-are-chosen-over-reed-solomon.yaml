document: rfc-6816
kind: design-rationale
summary: LDPC-Staircase codes are chosen over Reed-Solomon codes because they provide one or more orders of magnitude higher encoding/decoding throughput (e.g., Gbps range in software versus much lower for Reed-Solomon), at the cost of not being MDS — a small overhead (typically under 2%) beyond k symbols is needed for reliable recovery.
section: "1"
