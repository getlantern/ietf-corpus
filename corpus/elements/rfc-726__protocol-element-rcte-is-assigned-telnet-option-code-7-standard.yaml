document: rfc-726
kind: protocol-element
summary: 'RCTE is assigned Telnet option code 7. Standard Telnet negotiation commands WILL/WON''T/DO/DON''T RCTE are defined: WILL RCTE requests or agrees to send terminal printer control instructions; DO RCTE requests or agrees to accept such instructions. The default state is WON''T RCTE / DON''T RCTE.'
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
