document: rfc-6363
kind: wire-format
summary: 'An FEC Repair Packet consists of: IP Header, Transport Header, Repair FEC Payload ID field, and Repair Symbols. When RTP is used for repair packets, an RTP Header precedes the Repair FEC Payload ID, followed by the Repair Symbols.'
