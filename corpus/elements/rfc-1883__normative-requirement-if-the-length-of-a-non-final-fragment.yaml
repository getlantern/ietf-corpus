document: rfc-1883
kind: normative-requirement
summary: If the length of a non-final fragment (M flag = 1), as derived from the fragment packet's Payload Length, is not a multiple of 8 octets, that fragment must be discarded and an ICMP Parameter Problem, Code 0, should be sent to the source pointing to the Payload Length field.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
