document: rfc-6904
kind: interoperability-note
summary: An SDP endpoint that does not understand the 'urn:ietf:params:rtp-hdrext:encrypt' URI will, per RFC 5285 procedures, ignore the extension and negotiate not to use it during offer/answer. This provides backward compatibility with non-implementing endpoints.
section: "4.1"
topics:
