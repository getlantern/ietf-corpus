document: rfc-8325
kind: normative-requirement
summary: Broadcast Video traffic marked CS3 is RECOMMENDED to be mapped to UP 4 (AC_VI) via a non-default mapping, since the default MSB mapping places CS3 in UP 3 (AC_BE), which is contrary to the video service intent.
section: 4.2.6
rfc2119_level: RECOMMENDED
topics:
