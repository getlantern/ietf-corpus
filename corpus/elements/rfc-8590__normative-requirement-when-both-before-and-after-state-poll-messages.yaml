document: rfc-8590
kind: normative-requirement
summary: When both 'before' and 'after' state poll messages are generated for an operation, the 'before' state poll message MUST be inserted into the message queue prior to the 'after' state poll message.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
