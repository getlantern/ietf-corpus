document: rfc-1034
kind: protocol-element
summary: The TTL field specifies in seconds how long a resolver may cache an RR before discarding it. A zero TTL prohibits caching. The TTL does not apply to authoritative data in zones, which is governed by zone refresh policy. Typical values should be on the order of days.
section: "3.6"
topics:
    - dns
