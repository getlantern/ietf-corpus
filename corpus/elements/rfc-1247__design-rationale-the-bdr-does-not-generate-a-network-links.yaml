document: rfc-1247
kind: design-rationale
summary: 'The BDR does not generate a network links advertisement even though it could speed failover. This is an explicit tradeoff: omitting the pre-generated advertisement keeps database size smaller at the cost of slightly slower convergence when the DR fails.'
