document: rfc-8531
kind: security-consideration
summary: 'The sensitive writable subtrees are: /co-oam:domains/domain/, /co-oam:domains/domain/mas/ma, /co-oam:domains/domain/mas/ma/mep, and /co-oam:domains/domain/mas/ma/mep/session. Unauthorized access to these nodes adversely affects end-to-end OAM management and inter-layer OAM coordination.'
