document: rfc-6737
kind: protocol-element
summary: The Capabilities-Update-Request (CUR) is a new Diameter command with Command Code 328 and the 'R' bit set. It carries the sender's updated capabilities including Origin-Host, Origin-Realm, one or more Host-IP-Address AVPs, Vendor-Id, Product-Name, and optional application support AVPs.
section: 4.1.1
topics:
