document: rfc-9463
kind: design-rationale
summary: Service parameters are encoded using the existing RFC 9460 SvcParams wire format rather than a new encoding. While this may increase option size, it reuses an existing IANA registry and accommodates future encrypted DNS protocols and parameters without requiring new option definitions.
section: 3.1.5
topics:
    - dns
    - registry
