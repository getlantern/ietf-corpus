document: rfc-2930
kind: normative-requirement
summary: In server-assigned keying mode, the resolver KEY RR MUST be authenticated via TSIG, SIG(0), or a SIG(KEY); otherwise an attacker can forge a resolver KEY and obtain a valid shared secret from the server.
section: "4.4"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
