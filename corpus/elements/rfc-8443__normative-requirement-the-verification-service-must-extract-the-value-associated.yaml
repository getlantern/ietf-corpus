document: rfc-8443
kind: normative-requirement
summary: The verification service MUST extract the value associated with the 'auth' key in a full-form PASSporT with a 'ppt' value of 'rph' and use it to validate that the calling party is authorized for the SIP 'Resource-Priority' header fields indicated in the claim.
section: "4.2"
rfc2119_level: MUST
