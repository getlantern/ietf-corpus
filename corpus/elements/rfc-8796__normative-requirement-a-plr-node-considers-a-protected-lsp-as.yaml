document: rfc-8796
kind: normative-requirement
summary: A PLR node considers a protected LSP as Summary FRR capable only if all fields in the B-SFRR-Ready Extended Association ID sent in the RSVP Path message match those received in the RSVP Resv message (except MESSAGE_ID). If fields do not match or the object is absent in a subsequent refresh, the PLR MUST consider the LSP as not Summary FRR capable.
section: 3.1.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
