document: rfc-2046
kind: normative-requirement
summary: Implementations must ignore anything that appears before the first boundary delimiter line (preamble) or after the last one (epilogue). No encoding other than '7bit', '8bit', or 'binary' is permitted for entities of type 'multipart'.
section: 5.1.1
rfc2119_level: MUST
topics:
    - email
