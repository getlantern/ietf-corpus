document: rfc-8004
kind: normative-requirement
summary: Because ingress filtering may be present on the path from RVS to client, a HIP RVS SHOULD replace the source IP address of the I1 with one of its own IP addresses, and MUST then append a FROM parameter containing the original source IP address.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - nat
