document: rfc-9246
kind: protocol-element
summary: 'The Signed Token Renewal mechanism uses three CDNI-specific claims: cdniets (Expiration Time Setting, a JSON numeric seconds offset for the next JWT''s exp), cdnistt (Signed Token Transport, a JSON integer indicating cookie=1 or query-string=2), and cdnistd (Signed Token Depth, a non-negative JSON integer scoping the token to a URI path prefix).'
section: 2.1.12
