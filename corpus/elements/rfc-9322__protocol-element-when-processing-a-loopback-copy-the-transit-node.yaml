document: rfc-9322
kind: protocol-element
summary: When processing a loopback copy, the transit node uses the source address of the original packet as the destination address of the copy, truncates any payload after the IOAM option(s), and clears the L-bit before sending the copy back. The original packet continues toward its destination unchanged.
section: "4.2"
topics:
    - measurement
