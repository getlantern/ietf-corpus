document: rfc-3032
kind: security-consideration
summary: An MPLS label has meaning only by agreement between the label writer (the LSR that pushes the label) and the label reader (the LSR that interprets it). The label stack provides no means to authenticate the identity of the label writer. If labeled packets are accepted from untrusted sources, packets may be routed in an illegitimate manner.
section: "7"
topics:
    - mpls
    - security
