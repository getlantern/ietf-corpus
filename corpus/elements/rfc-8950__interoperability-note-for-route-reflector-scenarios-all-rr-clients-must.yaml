document: rfc-8950
kind: interoperability-note
summary: For Route Reflector scenarios, all RR clients must be capable of handling whatever next-hop encodings any of them may generate; if a client cannot handle a given encoding (as determined by Capability Advertisement), the corresponding NLRI cannot be distributed to that client.
