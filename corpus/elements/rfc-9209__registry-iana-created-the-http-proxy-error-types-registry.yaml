summary: IANA created the 'HTTP Proxy Error Types' registry at https://www.iana.org/assignments/http-proxy-status, initially populated with the 32 error types defined in Section 2.3. New entries require Expert Review per RFC 8126 §4.5; each entry includes Name, Description, Extra Parameters, Recommended HTTP Status Code, Response Only Generated by Intermediaries flag, Reference, and optional Notes.
