document: rfc-9159
kind: wire-format
summary: 'Non-link-local destination address compression toward a 6LN: if the first 48 bits of the IID match those of the latest registered address but it is not the latest, the last 16 bits SHALL be carried inline (DAC=1, DAM=10); if the first 48 bits do not match, the 64-bit IID SHALL be fully carried inline (DAC=1, DAM=01).'
section: 3.3.3
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
