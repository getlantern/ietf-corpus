document: rfc-2747
kind: security-consideration
summary: The mechanism provides no confidentiality; messages are transmitted in the clear. If confidentiality is required, IPsec ESP may be used, but it is subject to the same deployment concerns as IPsec Authentication. Protection against traffic analysis is also not provided.
section: "10"
topics:
    - security
    - privacy
