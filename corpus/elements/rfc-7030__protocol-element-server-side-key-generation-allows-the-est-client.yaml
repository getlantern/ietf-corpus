document: rfc-7030
kind: protocol-element
summary: Server-side key generation allows the EST client to receive a server-generated private key and certificate via /serverkeygen. The private key may optionally be protected with CMS EnvelopedData encryption (symmetric via DecryptKeyIdentifier or asymmetric via AsymmetricDecryptKeyIdentifier) in addition to TLS transport security.
section: "4.4"
