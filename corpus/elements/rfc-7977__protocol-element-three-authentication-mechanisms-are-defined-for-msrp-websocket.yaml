document: rfc-7977
kind: protocol-element
summary: 'Three authentication mechanisms are defined for MSRP WebSocket Clients connecting to a relay: (1) HTTP Digest authentication in AUTH per RFC 4976, (2) cookie-based or HTTP Digest in the WebSocket handshake, and (3) mutual TLS between the WebSocket client and server.'
