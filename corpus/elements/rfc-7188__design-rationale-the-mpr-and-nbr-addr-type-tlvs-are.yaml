summary: The MPR and NBR_ADDR_TYPE TLVs are respecified as bit fields rather than enumerated values because values 1, 2, and 3 already behaved as bit fields (1, 2, and 'both 1 and 2'), making the conversion natural and backward-compatible with existing implementations.
