document: rfc-9514
kind: design-rationale
summary: For SRv6 EPE, BGP PeerNode and PeerSet SIDs are advertised using the SRv6 SID NLRI (associated with the BGP Speaker Node) rather than additional Link NLRIs as done for SR-MPLS. This avoids the SR-MPLS model's non-conventional 'peering session' Link NLRIs and allows all peers in a PeerSet to be expressed as attributes of a single NLRI.
section: A
topics:
