document: rfc-8621
kind: normative-requirement
summary: When 'maxBodyValueBytes' is non-zero, the server MUST truncate body values to that many octets and MUST ensure truncation results in valid UTF-8 and does not occur mid-codepoint. For text/html, the server SHOULD NOT truncate inside an HTML tag.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
    - json
