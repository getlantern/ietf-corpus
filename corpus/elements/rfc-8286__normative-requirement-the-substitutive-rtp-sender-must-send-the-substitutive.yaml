document: rfc-8286
kind: normative-requirement
summary: The substitutive RTP sender MUST send the substitutive RTP packet ahead of the splicing-in point, allowing the splicer to find the timestamp of the first substitutive packet (e.g., via a prior RTCP SR).
section: "2.2"
rfc2119_level: MUST
topics:
