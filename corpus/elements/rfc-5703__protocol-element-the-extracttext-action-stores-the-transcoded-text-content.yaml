document: rfc-5703
kind: protocol-element
summary: The 'extracttext' action stores the transcoded text content of the current MIME body part into a Sieve variable. Optional ':first N' limits extraction to the first N characters. It must be used within a 'foreverypart' loop; outside a loop, it sets the variable to empty string.
