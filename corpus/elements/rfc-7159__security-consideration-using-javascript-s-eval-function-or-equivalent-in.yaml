document: rfc-7159
kind: security-consideration
summary: Using JavaScript's eval() function (or equivalent in other languages) to parse JSON texts constitutes an unacceptable security risk, since the text could contain executable code alongside data declarations. JSON is a subset of JavaScript but excludes assignment and invocation.
section: "12"
topics:
    - json
    - security
