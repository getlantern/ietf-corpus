document: rfc-8641
kind: normative-requirement
summary: The publisher MUST notify receivers immediately and reliably whenever it is unable to keep the terms of a subscription, including flagging incomplete updates and optionally suspending the subscription. A publisher SHOULD reject a subscription request if it is unlikely to be fulfilled, rather than accepting it and delivering degraded service.
section: "3.4"
rfc2119_level: MUST
topics:
    - yang
    - netconf
