document: rfc-3189
kind: normative-requirement
summary: The choice to transmit audio and video as one bundled or as separate (unbundled) RTP streams MUST be indicated as part of the dynamic payload type assignment and MUST remain unchanged for the duration of the RTP session to avoid sequence number synchronization complications.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
