document: rfc-4312
kind: interoperability-note
summary: The 16-octet block size of Camellia guarantees that the ESP Pad Length and Next Header fields will be right-aligned within a 4-octet word, so no additional padding beyond the 16-octet alignment requirement is needed for ESP framing.
section: "2.4"
topics:
