document: rfc-8345
kind: design-rationale
summary: Identifiers are typed as `inet:uri` rather than plain strings because URIs make structure explicit, can be fed into a URI resolver for additional resources, and facilitate correlation of identifiers across systems. Free-form strings tend to embed implicit structure that must be communicated out-of-band.
section: 4.4.11
topics:
    - yang
    - routing
