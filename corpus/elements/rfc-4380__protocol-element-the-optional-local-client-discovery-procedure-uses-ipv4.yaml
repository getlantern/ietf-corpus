document: rfc-4380
kind: protocol-element
summary: The optional local client discovery procedure uses IPv4 multicast (224.0.0.253, TTL=1) to detect Teredo peers on the same link. Discovery bubbles are sent at random intervals between 200 and 300 seconds; link-scope multicast ensures they are not forwarded across routers.
