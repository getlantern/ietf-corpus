document: rfc-2617
kind: protocol-element
summary: The protection space is defined by the realm value combined with the canonical root URL of the server. Credentials may be automatically reused for all URIs within the same protection space. A single protection space cannot extend outside the scope of its server unless explicitly defined by the domain directive.
section: "1.2"
topics:
    - http
    - security
