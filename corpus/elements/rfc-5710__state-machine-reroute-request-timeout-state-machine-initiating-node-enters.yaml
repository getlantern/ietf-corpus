document: rfc-5710
kind: state-machine
summary: 'Reroute request timeout state machine: initiating node enters ''awaiting response'' state after sending PathErr; transitions to ''complete'' on receiving PathTear or a trigger Path message with conforming ERO; transitions to ''LSP removal'' on timeout expiry, triggering PathTear downstream and PathErr (''Service preempted'') upstream.'
