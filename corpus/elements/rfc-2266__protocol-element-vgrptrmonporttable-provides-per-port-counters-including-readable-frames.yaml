document: rfc-2266
kind: protocol-element
summary: vgRptrMonPortTable provides per-port counters including readable frames/octets, unreadable octets, high-priority frames/octets, normal-priority frames/octets, broadcast frames, multicast frames, null-addressed frames, IPM frames, oversize frames, data error frames, priority promotions, and transitions into training. Each counter is available as Counter32 plus rollover and as Counter64.
