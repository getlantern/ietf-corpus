document: rfc-4997
kind: protocol-element
summary: The lsb(num_lsbs_param, offset_param) encoding method transmits the least significant bits of a field. The decompressor selects the value within the interpretation interval [ref_value - offset_param, ref_value + 2^num_lsbs_param - 1 - offset_param] whose LSBs match CVALUE. The CLENGTH is bound to num_lsbs_param.
section: 4.11.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
