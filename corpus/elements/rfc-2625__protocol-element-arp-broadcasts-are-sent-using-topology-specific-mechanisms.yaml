document: rfc-2625
kind: protocol-element
summary: 'ARP Broadcasts are sent using topology-specific mechanisms: OPN(fr) primitive on private loops, broadcast to FL_Port at AL_PA=0x00 on public loops (OPN(fr) MUST NOT be used directly), and direct broadcast on fabric topologies. In all cases, D_ID=0xFF-FF-FF with Class 3 and Network_Header destination MAC=0xFF-FF-FF-FF-FF-FF.'
section: "4.4"
