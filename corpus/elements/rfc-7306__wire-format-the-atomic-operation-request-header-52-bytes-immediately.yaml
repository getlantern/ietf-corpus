document: rfc-7306
kind: wire-format
summary: 'The Atomic Operation Request Header (52 bytes, immediately following the DDP header) contains: Reserved/Not Used (28 bits), AOpCode (4 bits), Request Identifier (32 bits), Remote STag (32 bits), Remote Tagged Offset (64 bits), Add or Swap Data (64 bits), Add or Swap Mask (64 bits), Compare Data (64 bits), and Compare Mask (64 bits). All fields are big-endian on the wire.'
section: 5.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
