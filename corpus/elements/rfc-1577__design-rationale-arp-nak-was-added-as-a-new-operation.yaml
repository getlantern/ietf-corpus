document: rfc-1577
kind: design-rationale
summary: ARP_NAK was added as a new operation code extension so that a client can distinguish between a catastrophic ATMARP server failure (no response) and an ATMARP table lookup failure (explicit negative reply), improving robustness of the address resolution mechanism.
