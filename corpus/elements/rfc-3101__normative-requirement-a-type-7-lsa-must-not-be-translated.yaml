document: rfc-3101
kind: normative-requirement
summary: A Type-7 LSA MUST NOT be translated into a Type-5 LSA if its P-bit is clear, its forwarding address is 0.0.0.0, or the most specific Type-7 address range that subsumes its network has DoNotAdvertise status.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
