document: rfc-6565
kind: protocol-element
summary: A PE considers an IPv6 route to be external (advertised as AS-External-LSA 0x4005 or NSSA-LSA 0x2007) when the Domain ID differs from the local instance, when the source LSA was AS-External or NSSA, or when the route was not learned from OSPFv3.
section: 4.3.2.3
topics:
