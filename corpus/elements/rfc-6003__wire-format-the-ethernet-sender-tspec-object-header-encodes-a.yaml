document: rfc-6003
kind: wire-format
summary: The Ethernet SENDER_TSPEC object header encodes a 16-bit Length, Class-Num (12), C-Type (6), 16-bit Switching Granularity, 16-bit MTU, followed by variable-length TLVs. Each TLV has a 16-bit Type, 16-bit Length, and variable Value field zero-padded to four-octet alignment.
