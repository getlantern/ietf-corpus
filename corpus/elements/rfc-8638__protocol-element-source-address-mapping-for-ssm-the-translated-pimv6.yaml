document: rfc-8638
kind: protocol-element
summary: 'Source address mapping for SSM: the translated PIMv6 message''s source S'' is set to a virtual IPv6 address derived via RFC 6052 unicast address translation that routes to the upstream AFBR. For ASM, (*,G) source list entries are translated to (S'',G'') by clearing the WildCard and RPT bits at downstream AFBRs, with reverse translation at upstream AFBRs.'
