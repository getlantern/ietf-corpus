document: rfc-954
kind: privacy-consideration
summary: The NIC WHOIS database publicly exposes full names, U.S. mailing addresses (including mail stop), telephone numbers (including Autovon and FTS), and network mailboxes for all registered DDN/ARPANET users. No authentication is required to query any record or enumerate entire organizations.
section: INTRODUCTION
