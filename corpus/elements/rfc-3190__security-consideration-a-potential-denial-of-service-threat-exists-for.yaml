document: rfc-3190
kind: security-consideration
summary: A potential denial-of-service threat exists for encodings using compression with non-uniform receiver-end computational load, where an attacker injects pathological datagrams to overload the decoder. This encoding does not exhibit significant non-uniformity, mitigating that threat.
