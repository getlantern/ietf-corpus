document: rfc-1158
kind: protocol-element
summary: ipAddrTable (IpAddrEntry) adds ipAdEntReasmMaxSize (INTEGER 0..65535) in MIB-II, recording the largest IP datagram that can be reassembled from fragments received on a particular interface. The table also carries ipAdEntAddr, ipAdEntIfIndex, ipAdEntNetMask, and ipAdEntBcastAddr.
section: 5.4.1
topics:
