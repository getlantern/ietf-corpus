document: rfc-3578
kind: normative-requirement
summary: A new INVITE sent in overlap signalling mode must not contain a To tag nor a Route header field derived from earlier responses, so that the new INVITE can be routed dynamically by the network for services.
section: "3.2"
rfc2119_level: MUST NOT
topics:
