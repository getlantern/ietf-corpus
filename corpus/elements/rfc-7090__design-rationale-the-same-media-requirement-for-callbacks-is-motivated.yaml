document: rfc-7090
kind: design-rationale
summary: 'The same media requirement for callbacks is motivated by two concerns: the emergency caller may have disabilities requiring a specific medium, and a caller seeking help covertly (e.g., via IM to avoid noise) could be endangered if the callback switches to a voice call with a ringtone.'
section: "5.3"
topics:
    - sip
    - realtime
