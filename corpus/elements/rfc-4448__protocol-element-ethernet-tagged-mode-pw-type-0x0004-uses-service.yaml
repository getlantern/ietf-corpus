document: rfc-4448
kind: protocol-element
summary: Ethernet Tagged Mode (PW type 0x0004) uses service-delimiting tags to map input Ethernet frames to respective PWs. Ethernet Raw Mode (PW type 0x0005) transmits all Ethernet frames received on the attachment circuit of PE1 to PE2 on a single PW.
