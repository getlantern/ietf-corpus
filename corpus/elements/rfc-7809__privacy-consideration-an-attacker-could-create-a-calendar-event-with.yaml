document: rfc-7809
kind: privacy-consideration
summary: An attacker could create a calendar event with a fake or rarely-used time zone identifier to monitor a calendar user's activity and interactions. The privacy mitigations in RFC7808 Section 9 SHOULD be applied; this specification increases the importance of those mitigations because it introduces additional time zone service interactions.
section: "9"
rfc2119_level: SHOULD
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
