document: rfc-2058
kind: normative-requirement
summary: If an Attribute is received in an Access-Request with an invalid Length, an Access-Reject SHOULD be transmitted. If received in an Access-Accept, Access-Reject, or Access-Challenge with an invalid length, the packet MUST either be treated as an Access-Reject or silently discarded.
section: "5"
rfc2119_level: MUST
topics:
    - radius
    - security
