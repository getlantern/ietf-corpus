document: rfc-7275
kind: security-consideration
summary: ICCP inherits TCP-based security from LDP and requires that connections not be accepted from arbitrary devices and that source address spoofing be prevented. These controls are critical in geo-redundant deployments where RG members communicate over a shared network, where a compromised ICCP session could disrupt client application state machines.
section: "10"
topics:
