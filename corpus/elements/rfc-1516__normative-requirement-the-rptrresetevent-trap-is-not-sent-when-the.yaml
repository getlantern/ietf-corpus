document: rfc-1516
kind: normative-requirement
summary: The rptrResetEvent trap is not sent when the agent restarts and sends an SNMP coldStart or warmStart trap. However, it is RECOMMENDED that the repeater agent include rptrOperStatus as an optional object with its coldStart and warmStart trap PDUs.
section: "3.5"
rfc2119_level: RECOMMENDED
topics:
    - snmp
