document: rfc-8638
kind: normative-requirement
summary: If there is at least one outgoing interface whose IP address family differs from the incoming interface, the AFBR MUST encapsulate the packet with mPrefix64-derived and uPrefix64-derived IPv6 addresses to form an IPv6 multicast packet.
section: "7.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - v6ops
