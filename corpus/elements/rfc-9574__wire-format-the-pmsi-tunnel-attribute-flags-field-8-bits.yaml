document: rfc-9574
kind: wire-format
summary: 'The PMSI Tunnel Attribute Flags field (8 bits) is extended with four new bits: bits 3–4 form the Assisted Replication Type (T) field (00=RNVE, 01=AR-REPLICATOR, 10=AR-LEAF, 11=RESERVED), bit 5 is the Broadcast and Multicast (BM) flag (''prune me from the BM flooding list'' when set), and bit 6 is the Unknown (U) flag (''prune me from the Unknown flooding list'' when set). Bits 5 and 6 together are called the PFLs flags.'
section: "4"
