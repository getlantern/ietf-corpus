document: rfc-1990
kind: normative-requirement
summary: If reliable multilink operation is desired, PPP Reliable Transmission (ISO LAPB) MUST be negotiated prior to the use of the Multilink Protocol on each member link. An implementation MUST present a signal to NCPs over the multilink arrangement when a loss has occurred, whether or not reliable delivery is employed.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
