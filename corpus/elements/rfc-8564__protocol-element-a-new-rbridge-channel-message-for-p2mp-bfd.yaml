document: rfc-8564
kind: protocol-element
summary: A new RBridge Channel message for P2MP BFD Control is defined with protocol code point 0x007. This is distinct from the existing point-to-point BFD Control message (0x002) because P2MP BFD requires the M bit to be set to 1 in the TRILL Header.
