document: rfc-5905
kind: protocol-element
summary: The manycast dynamic server discovery mechanism sends client (mode 3) packets to an IPv4 broadcast/multicast or IPv6 multicast group address with TTL starting at 1 and incrementing until the minimum number of associations is reached or TTL reaches 255 (maximum). Suitable servers respond via unicast mode-4 packets; the client mobilizes ephemeral associations that compete via the mitigation algorithms.
section: "3.1"
topics:
    - ntp
