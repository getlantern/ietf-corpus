document: rfc-3380
kind: normative-requirement
summary: 'For Set-Printer-Attributes, an attribute validates only if: the Printer supports it, it is not READ-ONLY by definition, it is settable in the implementation, its values are supported per the corresponding ''xxx-supported'' attribute rules, and its values do not conflict with other Printer attributes.'
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
