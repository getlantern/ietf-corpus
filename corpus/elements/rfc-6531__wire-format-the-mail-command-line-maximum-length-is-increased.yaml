document: rfc-6531
kind: wire-format
summary: The MAIL command line maximum length is increased by 10 characters to accommodate the optional SMTPUTF8 parameter. The SMTPUTF8 parameter takes no value. VRFY and EXPN commands are extended with an optional 'SMTPUTF8' parameter (no value) to signal UTF-8 reply acceptance.
section: "3.1"
topics:
