document: rfc-7509
kind: protocol-element
summary: 'Two usage modes are defined: cumulative (begin_seq fixed at session start, counts grow monotonically) and interval (begin_seq/end_seq aligned to RTCP intervals, though not recommended). Cumulative mode enables calculation of ''Still-to-be-repaired lost packets'' = cumulative packets lost - cumulative post-repair loss count - cumulative repaired loss count.'
section: "3.2"
topics:
    - rtp
    - realtime
