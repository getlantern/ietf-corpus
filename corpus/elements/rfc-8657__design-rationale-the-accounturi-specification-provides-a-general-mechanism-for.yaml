document: rfc-8657
kind: design-rationale
summary: The "accounturi" specification provides a general mechanism for identifying certificate-requesting entities via URIs, not limited to ACME. CAs not implementing ACME MAY assign and recognize their own URIs arbitrarily, allowing future RFCs to specify use of other URI kinds.
section: "3.2"
topics:
    - acme
    - pkix
    - dns
