document: rfc-2819
kind: interoperability-note
summary: RMON's jabber definition (packets >1518 octets with bad FCS) differs from IEEE 802.3 sections 8.2.1.5 and 10.3.1.4, which define jabber as any packet exceeding 20 ms duration (detection range 20–150 ms). Implementations must be aware of this definitional discrepancy.
section: "5"
topics:
