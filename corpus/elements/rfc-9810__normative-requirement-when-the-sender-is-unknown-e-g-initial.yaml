document: rfc-9810
kind: normative-requirement
summary: When the sender is unknown (e.g., initial request with no DN), the sender field MUST contain a NULL-DN (SEQUENCE OF zero-length RDNs, encoded 0x3000), and senderKID MUST hold a reference number identifying the shared secret.
