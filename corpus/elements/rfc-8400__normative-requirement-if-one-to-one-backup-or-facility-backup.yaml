document: rfc-8400
kind: normative-requirement
summary: If one-to-one backup or facility backup is desired to protect a primary egress node, the ingress node MUST include a FAST_REROUTE object and set the corresponding flag ('one-to-one backup desired' or 'facility backup desired').
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
