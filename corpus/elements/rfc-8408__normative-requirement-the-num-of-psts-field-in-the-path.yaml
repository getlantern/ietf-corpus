document: rfc-8408
kind: normative-requirement
summary: The Num of PSTs field in the PATH-SETUP-TYPE-CAPABILITY TLV MUST be greater than zero. If the TLV violates formatting rules, the receiver MUST send a PCErr with Error-Type=10, Error-value=11 (Malformed object) and MUST close the PCEP session.
section: "3"
rfc2119_level: MUST
topics:
    - routing
