document: rfc-2091
kind: wire-format
summary: 'The 4-octet Update Header is prepended to all three triggered packet types. For Update Request: Version (1 octet, must be 1) and 3 zero octets. For Update Response and Update Acknowledge: Version (1 octet), Flush (1 octet), and Sequence Number (2 octets). All fields are big-endian.'
section: "5.1"
topics:
    - routing
