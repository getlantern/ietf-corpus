document: rfc-6122
kind: normative-requirement
summary: XMPP servers MUST, and XMPP clients SHOULD, support IDNA2003 for domainparts (including the Nameprep profile of stringprep), the Nodeprep profile for localparts, and the Resourceprep profile for resourceparts, enabling addresses to include characters outside US-ASCII.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
