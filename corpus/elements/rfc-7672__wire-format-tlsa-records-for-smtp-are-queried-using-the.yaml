document: rfc-7672
kind: wire-format
summary: TLSA records for SMTP are queried using the service label '_25._tcp' prefixed to the SMTP server's candidate base hostname, e.g., '_25._tcp.mx.example.com. IN TLSA ?'. Custom MTA routes using a non-standard port MUST use the actual port number in place of '25'.
section: 2.2.3
topics:
    - dns
    - tls
    - email
