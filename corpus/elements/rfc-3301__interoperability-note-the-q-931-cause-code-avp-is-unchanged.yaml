document: rfc-3301
kind: interoperability-note
summary: The Q.931 Cause Code AVP is unchanged from RFC 2661 in encoding, but its cause codes SHOULD now be interpreted relative to the Bearer Type in use; ATM-specific cause codes per ATM Forum UNI 4.0 are permitted.
