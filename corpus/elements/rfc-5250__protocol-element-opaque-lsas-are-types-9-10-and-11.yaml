document: rfc-5250
kind: protocol-element
summary: Opaque LSAs are types 9, 10, and 11 link state advertisements. Type-9 has link-local scope, type-10 has area-local scope, and type-11 is flooded throughout the AS with the same scope as AS-External (type-5) LSAs. Type-11 LSAs are not flooded into stub areas or NSSAs.
section: "3"
topics:
