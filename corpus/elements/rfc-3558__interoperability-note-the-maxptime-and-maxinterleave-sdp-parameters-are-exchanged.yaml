summary: The maxptime and maxinterleave SDP parameters are exchanged at session setup. maxptime maps to SDP 'a=maxptime'; maxinterleave maps to SDP 'a=fmtp' as 'maxinterleave=value'. Payload format names are case-insensitive in both MIME types and SDP.
