document: rfc-7641
kind: design-rationale
summary: The 24-bit sequence number was chosen to allow up to 32768 notifications per second after halving the theoretical maximum of 65536 to tolerate combined clock inaccuracies of up to −50/+100% on constrained nodes. The 128-second reordering threshold is a round number larger than MAX_LATENCY (RFC 7252 Section 4.8.2).
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
