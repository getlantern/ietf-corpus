document: rfc-3118
kind: interoperability-note
summary: The authenticated DHCPREQUEST from a client in INIT-REBOOT state can only be validated by servers that used the same secret in their DHCPOFFER. Servers that cannot validate the DHCPREQUEST will eventually reclaim their offered addresses per the standard DHCP timeout mechanism.
section: 5.6.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
