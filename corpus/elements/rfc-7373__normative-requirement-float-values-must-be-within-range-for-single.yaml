document: rfc-7373
kind: normative-requirement
summary: Float values MUST be within range for single- or double-precision as defined in IEEE 754-2008; finite values outside range are clamped. Decoders MUST NOT assume represented float values are exactly comparable for equality, as writers MAY sacrifice precision for readability.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
