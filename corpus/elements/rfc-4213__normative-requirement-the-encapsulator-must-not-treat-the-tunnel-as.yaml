document: rfc-4213
kind: normative-requirement
summary: The encapsulator MUST NOT treat the tunnel as an interface with an MTU of 64 kilobytes. It must instead use either the fixed static MTU or optional dynamic MTU determination based on the IPv4 path MTU to the tunnel endpoint.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
