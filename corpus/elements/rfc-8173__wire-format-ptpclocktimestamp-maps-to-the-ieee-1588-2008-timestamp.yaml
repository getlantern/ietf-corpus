summary: PtpClockTimestamp maps to the IEEE-1588-2008 Timestamp structure (Section 5.3.3) as an OCTET STRING of exactly 6 octets. PtpClockIntervalBase2 maps message intervals (Announce, Sync, Delay_Req, Pdelay_Req) as Integer32 in the range -128..127 (log base 2 of seconds).
