document: rfc-4425
kind: interoperability-note
summary: In the SDP Offer/Answer model, the answerer MUST NOT specify a numerically higher level than offered. The 'profile' parameter MUST be used symmetrically; if the offered profile is not supported the answerer must remove the media format completely. For multicast, parameter values MUST NOT be changed by the answerer.
section: "6.3"
topics:
    - rtp
    - realtime
    - sip
