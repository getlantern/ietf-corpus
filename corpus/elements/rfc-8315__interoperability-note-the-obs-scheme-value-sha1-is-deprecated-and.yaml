document: rfc-8315
kind: interoperability-note
summary: The obs-scheme value "sha1" is deprecated and SHOULD NOT be generated. Serving agents SHOULD still accept it during a transition period as long as SHA1 is not considered unsafe or already marked OBSOLETE in the IANA registry. The obs-c-key-string syntax (unpadded Base64) SHOULD NOT be generated but MUST be accepted.
section: "6"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
