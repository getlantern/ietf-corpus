document: rfc-8505
kind: normative-requirement
summary: The ROVR MUST NOT be used to correlate registrations of different IPv6 Addresses; its scope is solely to verify that the node updating a registration for a specific address is the same node that made the original registration. When the ROVR is not an EUI-64 address, it MUST NOT be used as the Interface Identifier of the Registered Address.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
