document: rfc-4710
kind: normative-requirement
summary: An RDS MUST send a RAQMON NULL PDU (containing ALL NULL values) to signal the end of a reporting session, since RDSs and RRCs are otherwise stateless across the entire reporting session.
section: 2.3.2
rfc2119_level: MUST
topics:
    - qos
    - realtime
