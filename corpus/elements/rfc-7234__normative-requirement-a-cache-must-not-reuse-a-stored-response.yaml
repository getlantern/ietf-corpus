document: rfc-7234
kind: normative-requirement
summary: A cache MUST NOT reuse a stored response unless the effective request URI matches, the request method is compatible, all Vary-nominated selecting header fields match, no no-cache pragma or directive is present without successful validation, the stored response lacks no-cache without validation, and the stored response is fresh, allowed stale, or successfully validated.
section: "4"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
