document: rfc-3046
kind: security-consideration
summary: Automatic reforwarding of IP or ARP broadcast packets back downstream by the circuit access unit exposes serious IP security risks; for example, a rebroadcast DHCP-DISCOVER or DHCP-REQUEST could allow any public host to spoof the desired DHCP server.
section: "5.0"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
