document: rfc-5296
kind: normative-requirement
summary: When the SEQ sequence number rotates (reaches its maximum), the peer MUST run full EAP authentication. The peer MUST increment the sequence number after each ERP exchange, even when retransmitting.
section: "5.4"
rfc2119_level: MUST
topics:
    - security
