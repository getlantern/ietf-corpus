document: rfc-1509
kind: protocol-element
summary: 'The GSS status code supplementary-info field defines four bits: GSS_S_CONTINUE_NEEDED (bit 0) signals the routine must be called again; GSS_S_DUPLICATE_TOKEN (bit 1), GSS_S_OLD_TOKEN (bit 2), and GSS_S_UNSEQ_TOKEN (bit 3) report replay and sequencing anomalies without necessarily failing the call.'
section: 2.1.9.1
topics:
