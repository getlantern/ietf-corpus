document: rfc-8473
kind: normative-requirement
summary: When performing Token Binding over HTTP/1.1 with TLS renegotiation, renegotiation MUST only occur between a client HTTP request and the server response, the client MUST NOT send pipelined requests, and the client MUST NOT initiate renegotiation.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - http
