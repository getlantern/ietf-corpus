document: rfc-5670
kind: design-rationale
summary: Having competing-non-PCN-traffic in a PCN-domain is not advised because its unpredictable volume reduces the accuracy of PCN mechanisms and their ability to protect QoS. Where it exists, PCN-nodes should either include it in the meters or reduce the PCN reference rates to provide headroom.
section: B.1
topics:
    - qos
    - diffserv
