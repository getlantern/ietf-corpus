document: rfc-2273
kind: normative-requirement
summary: A command responder application MUST always call the returnResponsePdu abstract service interface, even in the event of a resource allocation error. In such cases the PDU passed to returnResponsePdu must contain appropriate errorStatus and errorIndex values.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
