document: rfc-5105
kind: security-consideration
summary: 'A valid XML-DSIG signature is necessary but not sufficient for a valid Token. The Registry must additionally verify: (1) the signature uses approved transforms and cryptographic algorithms, (2) the signature references the <token> element (not a sub-element), and (3) the signing key belongs to an accredited VE.'
section: "9"
topics:
    - security
    - crypto
