document: rfc-5796
kind: normative-requirement
summary: Implementations MUST support ESP-NULL and MUST NOT allow the user to choose a stream cipher or block mode cipher in counter mode for use with manual keys. IP encapsulation of ESP packets MUST be supported; UDP encapsulation SHOULD NOT be used.
section: "6"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - crypto
    - multicast
