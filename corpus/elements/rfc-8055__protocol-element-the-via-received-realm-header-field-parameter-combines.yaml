document: rfc-8055
kind: protocol-element
summary: The Via 'received-realm' header field parameter combines an operator identifier (representing the adjacent network) and a serialized JSON Web Signature (JWS). The JWS Payload consists of the operator identifier and selected SIP information element values; the payload is detached from the serialized JWS and replaced by an empty string.
