document: rfc-3986
kind: protocol-element
summary: 'IPv6 and future-format IP literals are enclosed in square brackets: IP-literal = "[" ( IPv6address / IPvFuture ) "]". Square brackets are not allowed anywhere else in the URI syntax. IPvFuture format uses a version flag: "v" 1*HEXDIG "." 1*( unreserved / sub-delims / ":" ).'
section: 3.2.2
