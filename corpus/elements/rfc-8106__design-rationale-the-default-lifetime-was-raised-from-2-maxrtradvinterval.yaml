document: rfc-8106
kind: design-rationale
summary: The default Lifetime was raised from 2 * MaxRtrAdvInterval (RFC 6106) to 3 * MaxRtrAdvInterval to match the Router Lifetime default (AdvDefaultLifetime) and to allow DNS options to survive up to three consecutive lost RAs on lossy links.
section: "5.1"
topics:
