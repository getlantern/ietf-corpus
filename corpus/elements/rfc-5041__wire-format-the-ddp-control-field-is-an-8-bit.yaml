document: rfc-5041
kind: wire-format
summary: 'The DDP Control Field is an 8-bit field at the start of every DDP Header containing: T (Tagged flag, 1 bit), L (Last flag, 1 bit), Rsvd (4 bits, must be zero on transmit), and DV (DDP version, 2 bits, must be set to 1).'
