document: rfc-5666
kind: interoperability-note
summary: RPC-over-RDMA framing replaces all other RPC framing (e.g., TCP record marking) when operating over an RPC/RDMA association, even when the underlying RDMA protocol is itself layered on TCP. The framing transition MUST occur between distinct RPC messages and in concert with the transport.
section: "3"
topics:
    - tcp
