document: rfc-8664
kind: normative-requirement
summary: 'A PCC MUST validate SR-ERO subobject consistency: for each NT value (0–6), specific constraints apply to the F bit, S bit, and Length field. Inconsistency MUST trigger PCErr Error-Type=10, Error-value=11 (''Malformed object'') and the entire ERO is considered invalid.'
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
