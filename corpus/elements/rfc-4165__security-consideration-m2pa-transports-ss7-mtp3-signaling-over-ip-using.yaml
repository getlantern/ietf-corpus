document: rfc-4165
kind: security-consideration
summary: M2PA transports SS7 MTP3 signaling over IP using SCTP, exposing it to IP-layer threats absent in traditional SS7 networks. Security mechanisms at the IP layer (such as IPsec) should be applied to protect M2PA associations, as unauthorized access to or manipulation of SS7 signaling messages could compromise telephony network integrity and availability.
section: "6"
topics:
    - security
    - sctp
