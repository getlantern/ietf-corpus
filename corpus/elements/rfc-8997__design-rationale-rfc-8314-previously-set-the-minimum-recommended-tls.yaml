document: rfc-8997
kind: design-rationale
summary: RFC 8314 previously set the minimum recommended TLS version at 1.1. Because TLS 1.1 has been deprecated by RFC 8996, the minimum is raised to TLS 1.2 to align email submission and access guidance with the broader TLS deprecation.
section: "1"
topics:
