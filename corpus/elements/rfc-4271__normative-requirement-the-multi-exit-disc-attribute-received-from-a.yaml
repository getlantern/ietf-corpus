kind: normative-requirement
summary: The MULTI_EXIT_DISC attribute received from a neighboring AS MUST NOT be propagated to other neighboring ASes. A BGP speaker MUST implement a mechanism to remove MED from a route before the Decision Process phases 1 and 2.
