document: rfc-4210
kind: protocol-element
summary: 'Root CA key update produces four certificate values: OldWithOld (self-signed with old keys), OldWithNew (old public key signed with new private key), NewWithOld (new public key signed with old private key), and NewWithNew (self-signed with new keys). These enable end entities holding either key to verify certificates during the transition period.'
section: 4.4.1
topics:
    - pkix
    - security
