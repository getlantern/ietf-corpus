document: rfc-6186
kind: normative-requirement
summary: Upon connection failure or authentication failure, MUAs MUST NOT switch from IMAP to POP3 (or vice versa) due to changes in SRV priorities without explicit user interaction; the re-try must be for the same protocol the client had already chosen.
section: "4"
rfc2119_level: MUST NOT
topics:
