document: rfc-6081
kind: design-rationale
summary: The Sequential Port-Symmetric NAT Extension defaults to assuming a symmetric NAT is sequential (rather than requiring explicit detection) because there is no perfect discovery method and these NATs are known to change behavior. This is described as a 'last resort' for symmetric NAT traversal.
section: "3.4"
