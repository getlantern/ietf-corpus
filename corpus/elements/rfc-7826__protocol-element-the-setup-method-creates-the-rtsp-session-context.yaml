document: rfc-7826
kind: protocol-element
summary: The SETUP method creates the RTSP session context. The Transport header in the SETUP request carries transport parameters and may contain a prioritized list of alternatives. The server selects one and includes it in the SETUP response along with the Session header carrying the new session identifier.
section: "13.3"
topics:
    - realtime
