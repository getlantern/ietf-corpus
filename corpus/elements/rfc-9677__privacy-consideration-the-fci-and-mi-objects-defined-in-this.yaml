document: rfc-9677
kind: privacy-consideration
summary: The FCI and MI objects defined in this document do not contain personally identifiable information (PII). However, systematic retrieval of delegated credentials and private keys would allow an attacker to decrypt end-user data intended for the end service, which may include PII.
