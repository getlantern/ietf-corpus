summary: 'Resource Record RDATA NB_FLAGS field (16 bits): G bit (0) indicates GROUP vs UNIQUE name; ONT bits (1-2) encode Owner Node Type (00=B, 01=P, 10=M, 11=reserved); bits 3-15 are reserved and must be zero. NB_ADDRESS (32 bits) contains the IP address of the name owner.'
