document: rfc-6485
kind: design-rationale
summary: The RPKI is anticipated to require updated key sizes and different signature/hash algorithms over time to maintain acceptable cryptographic security. This profile is explicitly designed to be replaced by a successor document when such updates are needed, rather than being amended in place.
