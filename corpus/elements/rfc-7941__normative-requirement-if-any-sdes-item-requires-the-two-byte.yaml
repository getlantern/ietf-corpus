document: rfc-7941
kind: normative-requirement
summary: If any SDES item requires the two-byte header format, then all other header extensions for the same RTP stream (SSRC) MUST also use the two-byte header format, since RFC 5285 does not permit mixing one-byte and two-byte headers for the same SSRC.
section: 4.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
