document: rfc-8077
kind: security-consideration
summary: The LDP MD5 authentication key option MUST be implemented and SHOULD be used to provide integrity and authentication for LDP messages, preventing source address spoofing. It does not provide privacy or strong replay protection.
section: "9.2"
topics:
