document: rfc-7343
kind: design-rationale
summary: ORCHIDs are designed to be used at existing IPv6 APIs without requiring application changes. A dedicated prefix distinguishes them from regular IPv6 addresses at upper layers while making it trivial to block them at the IP layer, enabling incremental deployment of overlay protocols like HIP.
section: "1.1"
topics:
    - ip
