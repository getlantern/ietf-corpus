document: rfc-9733
kind: interoperability-note
summary: The standard BRSKI discovery mechanism does not allow pledges to discover which enrollment protocols a registrar supports. A minimalist CMP-specific fallback is to use the DNS service name 'brski-reg-cmp' instead of 'brski-registrar'; this approach does not support join proxies.
section: 4.2.1
topics:
    - pkix
    - registry
