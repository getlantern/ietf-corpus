document: rfc-1982
kind: protocol-element
summary: Serial number addition is defined as s' = (s + n) modulo (2^SERIAL_BITS), where n must be in the range [0 .. 2^(SERIAL_BITS-1) - 1]. Addition of a value outside this range is explicitly undefined.
section: "3.1"
