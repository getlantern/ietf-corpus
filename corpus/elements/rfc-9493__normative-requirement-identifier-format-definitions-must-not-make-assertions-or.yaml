document: rfc-9493
kind: normative-requirement
summary: Identifier Format definitions MUST NOT make assertions or declarations regarding the type or nature of the subject being identified (e.g., cannot declare that a format specifically identifies human end users), as such statements are outside the scope of Identifier Formats.
section: "5"
rfc2119_level: MUST NOT
topics:
    - security
