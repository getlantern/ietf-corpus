document: rfc-7265
kind: protocol-element
summary: jCal introduces an 'unknown' property value type to allow preserving unknown property values during round-tripping between jCal and iCalendar. When a converter does not know the default value type of a property, it uses 'unknown' and stores the raw unprocessed value as a JSON string.
section: "5"
topics:
    - json
