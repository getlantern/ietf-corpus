document: rfc-1532
kind: normative-requirement
summary: It is RECOMMENDED that a BOOTP client always fill the first four octets of the 'vend' field with a magic cookie; if no special vendor-specific cookie is used, the standard value 99.130.83.99 SHOULD be placed there, followed by an 'End' tag (255) and zeros if the client has no additional vendor information.
section: "3.5"
rfc2119_level: RECOMMENDED
topics:
    - ip
