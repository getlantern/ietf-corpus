document: rfc-8779
kind: wire-format
summary: The XRO Label subobject (Type 10) encodes a 1-bit X field, 7-bit Type=10, 8-bit Length, 1-bit U field, reserved bits, 8-bit C-Type (as per RFC 3473), and a variable-length Label field. The X bit indicates mandatory (0) or desired (1) exclusion.
section: "2.7"
