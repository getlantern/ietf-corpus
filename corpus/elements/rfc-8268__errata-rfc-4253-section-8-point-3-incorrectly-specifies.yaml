document: rfc-8268
kind: errata
summary: RFC 4253 Section 8, point 3 incorrectly specifies the valid range for DH Public Key values as the closed interval [1, p-1]; the correct range is the open interval (1, p-1), i.e., strictly greater than 1 and strictly less than p-1.
section: "4"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
