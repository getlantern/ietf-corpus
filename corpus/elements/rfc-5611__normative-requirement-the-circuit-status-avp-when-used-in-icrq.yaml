document: rfc-5611
kind: normative-requirement
summary: The Circuit Status AVP, when used in ICRQ/ICRP messages for TDM PWs, MUST always have both the N bit and the A bit set, even if the specific attachment circuit cannot convey a 'new AC' indication.
