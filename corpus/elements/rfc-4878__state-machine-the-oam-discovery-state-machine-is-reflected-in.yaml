document: rfc-4878
kind: state-machine
summary: 'The OAM discovery state machine is reflected in dot3OamOperStatus with ten states: disabled, linkFault, passiveWait, activeSendLocal, sendLocalAndRemote, sendLocalAndRemoteOk, oamPeeringLocallyRejected, oamPeeringRemotelyRejected, operational, and nonOperHalfDuplex. Transitions are driven by peer capability exchange via OAMPDUs and the acceptance or rejection of OAM peering by either end. The terminal operational(9) state corresponds to the SEND_ANY state of the IEEE 802.3ah Discovery state diagram.'
section: "6"
topics:
