document: rfc-9562
kind: design-rationale
summary: UUIDv6 is a field-compatible rearrangement of UUIDv1 intended only for contexts already using UUIDv1. Systems not involving legacy UUIDv1 SHOULD use UUIDv7 instead, which offers better entropy characteristics and a more widely supported Unix Epoch timestamp.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
