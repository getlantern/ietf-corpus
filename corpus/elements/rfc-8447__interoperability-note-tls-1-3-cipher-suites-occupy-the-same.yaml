document: rfc-8447
kind: interoperability-note
summary: TLS 1.3 cipher suites occupy the same code space as prior TLS versions but are defined differently, specifying only symmetric ciphers and hash function. TLS 1.3 cipher suites cannot be used with TLS 1.2, and TLS 1.2 and lower cipher suites cannot be used with TLS 1.3.
section: "8"
