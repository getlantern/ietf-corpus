document: rfc-2215
kind: interoperability-note
summary: The NON_IS_HOP parameter's data representation used by setup and management protocols must allow the parameter value to be read and set even if the network element cannot otherwise parse the protocol message. In RSVP (RFC 2210), this parameter is carried as a single-bit flag called the 'break bit'.
section: "3.1"
topics:
