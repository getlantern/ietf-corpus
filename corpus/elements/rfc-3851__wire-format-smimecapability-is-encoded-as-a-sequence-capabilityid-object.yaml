document: rfc-3851
kind: wire-format
summary: SMIMECapability is encoded as a SEQUENCE { capabilityID OBJECT IDENTIFIER, parameters ANY DEFINED BY capabilityID OPTIONAL }. SMIMECapabilities is SEQUENCE OF SMIMECapability. Parameters MUST be omitted (not encoded as NULL) when there are no differentiating parameters for a given OID.
