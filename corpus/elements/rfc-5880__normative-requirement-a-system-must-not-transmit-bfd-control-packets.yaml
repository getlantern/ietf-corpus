document: rfc-5880
kind: normative-requirement
summary: A system MUST NOT transmit BFD Control packets at an interval less than the larger of bfd.DesiredMinTxInterval and bfd.RemoteMinRxInterval (minus jitter). The transmit interval MUST be recalculated whenever either of these values changes.
section: 6.8.7
rfc2119_level: MUST
topics:
    - routing
