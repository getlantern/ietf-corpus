document: rfc-9134
kind: normative-requirement
summary: In SDP offer/answer, the 'a=fmtp' attribute SHALL be present specifying the required 'packetmode' parameter. The answerer is required to support all parameters offered; otherwise the answerer SHALL reject the session. If accepted, the answerer SHALL reply with the exact same parameter values.
section: "8.2"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
