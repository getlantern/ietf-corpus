document: rfc-4033
kind: security-consideration
summary: DNSSEC introduces significant additional complexity and many new opportunities for implementation bugs and misconfiguration. Enabling DNSSEC signature validation in a resolver may cause entire legitimate zones to become unreachable due to configuration errors.
section: "12"
topics:
    - dns
    - security
