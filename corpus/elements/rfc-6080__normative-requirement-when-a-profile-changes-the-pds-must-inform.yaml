document: rfc-6080
kind: normative-requirement
summary: When a profile changes, the PDS MUST inform all devices currently enrolled for that profile via SIP NOTIFY. A device receiving a profile change notification MUST act upon the changes prior to expiration of the 'effective-by' parameter.
section: 5.1.3
rfc2119_level: MUST
topics:
    - sip
