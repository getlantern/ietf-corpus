document: rfc-8215
kind: protocol-element
summary: The IPv6 prefix 64:ff9b:1::/48 is reserved for local use within network domains that enable IPv4/IPv6 translation mechanisms. It is technology-agnostic and may be used with any kind of IPv4/IPv6 translation mechanism deployed within the operator's network.
section: "1"
topics:
