document: rfc-5216
kind: state-machine
summary: 'TLS session resumption shortens the handshake: after client_hello, the server echoes the sessionId and sends only server_hello/change_cipher_spec/finished; the peer responds with change_cipher_spec/finished; then EAP-Success. The ciphersuite MUST match the one negotiated during the original session.'
section: 2.1.2
topics:
    - tls
    - security
