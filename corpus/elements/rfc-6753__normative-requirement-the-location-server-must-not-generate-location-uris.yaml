document: rfc-6753
kind: normative-requirement
summary: The Location Server MUST NOT generate location URIs or provide a 'locationUriSet' in response to a dereference request. If 'locationType' includes 'locationURI', the parameter is either ignored or rejected based on the 'exact' attribute.
section: "3.1"
rfc2119_level: MUST NOT
topics:
