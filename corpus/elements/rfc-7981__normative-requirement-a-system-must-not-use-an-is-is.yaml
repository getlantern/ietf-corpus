document: rfc-7981
kind: normative-requirement
summary: A system MUST NOT use an IS-IS Router CAPABILITY TLV present in an LSP of a system that is not currently reachable via Level x paths, where x is the level in which the sending system advertised the TLV. This prevents use of stale capability information.
section: "3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
