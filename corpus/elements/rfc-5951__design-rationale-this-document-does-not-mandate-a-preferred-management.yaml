document: rfc-5951
kind: design-rationale
summary: This document does not mandate a preferred management interface protocol; operators may use NETCONF, SNMP, CORBA, or other protocols across different domains and even mix protocols for configuration versus monitoring within the same domain. The choice of protocol is at the operator's discretion.
