document: rfc-9248
kind: normative-requirement
summary: The SIP credentials used for registration (user-name/sip-password) SHOULD NOT be the same as those used for other purposes. If registration fails due to invalid credentials, the RUE MUST retrieve a fresh configuration; if freshly retrieved credentials are also invalid, the RUE MUST cease registration attempts and inform the user.
section: "5.1"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
