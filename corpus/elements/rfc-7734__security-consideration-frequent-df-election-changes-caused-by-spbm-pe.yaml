document: rfc-7734
kind: security-consideration
summary: Frequent DF election changes caused by SPBM-PE links repeatedly going up and down generate significant control-plane traffic as DF-associated information is advertised and withdrawn from both SPBM and BGP. Dual-homing SPBM-PEs on both networks minimizes this risk.
section: "6"
topics:
    - security
    - routing
    - bgp
