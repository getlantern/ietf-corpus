document: rfc-5021
kind: normative-requirement
summary: If a KDC receives a PROBE or does not support all requested extensions, it MUST return 4 octets with the high bit set and the remaining bitmask indicating which extensions it supports, then MUST wait for the client to send a second 4-octet value.
section: "3"
rfc2119_level: MUST
topics:
    - tcp
    - security
