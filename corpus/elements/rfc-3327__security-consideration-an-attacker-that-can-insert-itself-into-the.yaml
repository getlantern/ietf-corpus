document: rfc-3327
kind: security-consideration
summary: An attacker that can insert itself into the Path chain during REGISTER processing can intercept all future calls intended for the UA. Node insertion attacks may be accomplished by altering data on the wire or through proxy impersonation; TLS or IPsec mitigates wire-level attacks while mutual authentication at the proxy layer addresses proxy insertion.
section: "6.1"
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
