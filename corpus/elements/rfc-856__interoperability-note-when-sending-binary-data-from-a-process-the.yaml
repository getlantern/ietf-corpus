document: rfc-856
kind: interoperability-note
summary: When sending binary data from a process, the OS may silently convert certain non-printing characters (e.g., TOPS-20 converts some to a Circumflex followed by a printable character), which violates transparent binary transmission; implementers must account for this.
section: "6"
