document: rfc-6437
kind: normative-requirement
summary: The algorithm used to generate flow label values SHOULD ensure that resulting values are unique with high probability. Sequential assignment of flow labels is NOT RECOMMENDED because it allows on-path observers to guess the next value.
section: "3"
rfc2119_level: SHOULD
topics:
    - ip
