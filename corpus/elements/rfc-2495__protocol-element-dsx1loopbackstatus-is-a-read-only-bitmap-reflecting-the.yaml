document: rfc-2495
kind: protocol-element
summary: dsx1LoopbackStatus is a read-only bitmap reflecting the actual current loopback state, distinguishing near-end (payload, line, other, inward) and far-end (payload, line) loopbacks, as well as the source (manager vs. remote). This is separate from dsx1LoopbackConfig, which represents desired state.
section: 3.1.1
topics:
