document: rfc-1661
kind: normative-requirement
summary: All Protocol field values MUST be odd (least significant bit of least significant octet MUST equal 1), and the least significant bit of the most significant octet MUST equal 0. Frames not complying with these rules MUST be treated as having an unrecognized Protocol.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
