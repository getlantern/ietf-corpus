document: rfc-8255
kind: normative-requirement
summary: All language message parts MUST have both a Content-Language field and a Content-Type field; they MAY additionally carry a Content-Translation-Type field. Language parts SHOULD be ordered so the first part after the preface is the language most likely recognizable by the recipient, serving as the fallback.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
