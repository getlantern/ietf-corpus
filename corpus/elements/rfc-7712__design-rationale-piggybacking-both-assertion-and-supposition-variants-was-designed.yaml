document: rfc-7712
kind: design-rationale
summary: Piggybacking (both assertion and supposition variants) was designed to allow multi-tenanted servers to establish additional domain name associations on an existing TCP connection rather than opening one connection per domain pair, which would be wasteful when a server hosts a large number of domains.
section: "4.4"
topics:
