summary: 'IANA created the ULE Next-Header Type field registry allocating values 0–511 decimal: values 0–255 are for Mandatory Extension Headers (requiring IETF RFC), with Type 0 (Test-SNDU) and Type 1 (Bridged-SNDU) already assigned; values 256–511 are for Optional Extension Headers (requiring IETF RFC), with Type 256 (Extension-Padding, H-LEN 1–5) already assigned.'
