document: rfc-6609
kind: protocol-element
summary: 'The ''return'' command (usage: ''return'') stops processing of the immediately included script only and returns control to the including script. If used in the main (non-included) script, it behaves identically to ''stop'', including implicit ''keep'' if no actions have executed.'
section: "3.3"
