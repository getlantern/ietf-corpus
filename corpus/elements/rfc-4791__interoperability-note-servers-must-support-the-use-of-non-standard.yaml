document: rfc-4791
kind: interoperability-note
summary: Servers MUST support the use of non-standard iCalendar components, properties, and parameters (those with "X-" prefix) in calendar object resources stored via PUT and in CALDAV:calendar-data elements of REPORT requests. Servers MAY reject such names in filter elements and MUST return a CALDAV:supported-filter precondition error if they cannot query on them.
section: 5.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
