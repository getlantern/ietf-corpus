document: rfc-6408
kind: state-machine
summary: 'The extended NAPTR-based Diameter peer discovery procedure defines six steps: (a) query NAPTR for target realm; (b) if ''aaa+apX:Y'' returned and X matches application and Y matches transport, resolve replacement; (c) if ''aaa+apX'' returned and X matches, resolve and try all transports per RFC 3588 order; (d) if ''aaa:X'' returned, resolve if transport matches; (e) if ''aaa'' returned, resolve and try all transports; (f) if no NAPTR support, fall back to RFC 3588 Section 5.2 next mechanism.'
section: "5"
topics:
    - diameter
    - dns
