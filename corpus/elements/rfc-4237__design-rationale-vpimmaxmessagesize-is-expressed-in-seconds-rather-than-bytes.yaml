document: rfc-4237
kind: design-rationale
summary: vPIMMaxMessageSize is expressed in seconds rather than bytes because ESMTP's byte-based mechanism is an unreliable guide for the composer when multiple encodings, multiple media, or variable bit-rate encodings are supported.
