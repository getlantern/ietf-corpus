document: rfc-7349
kind: interoperability-note
summary: The HMAC output size of the Authentication Data field SHOULD NOT be used by implementers as an implicit hint for the algorithm in use, because future algorithms may share the same output size. The SA ID is the authoritative indicator of the algorithm.
section: "2.3"
topics:
    - mpls
    - crypto
