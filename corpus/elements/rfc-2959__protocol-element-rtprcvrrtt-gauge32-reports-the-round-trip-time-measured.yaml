document: rfc-2959
kind: protocol-element
summary: rtpRcvrRTT (Gauge32) reports the round-trip time measured using the RFC 1889 sec. 6 algorithm; it is meaningful only when the RTP agent shares a clock with the stream sender (i.e., the monitor is also the sending host). Otherwise, the entity must return 'noSuchInstance'.
