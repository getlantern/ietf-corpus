document: rfc-7267
kind: normative-requirement
summary: A PSN tunnel MUST be selected that can support at least the required class of service and has sufficient bandwidth. When an S/T-PE receives a PW Bandwidth TLV, once the PW next hop is selected, it MUST request the appropriate resources from the PSN.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - qos
    - routing
