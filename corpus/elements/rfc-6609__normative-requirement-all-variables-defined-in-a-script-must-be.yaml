document: rfc-6609
kind: normative-requirement
summary: All variables defined in a script MUST be kept private to the immediate script by default and are not visible to other scripts. Implementations MUST allow a non-global variable to have the same name as a global variable with no interaction between them.
section: "3.4"
rfc2119_level: MUST
topics:
    - email
