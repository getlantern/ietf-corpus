document: rfc-8185
kind: normative-requirement
summary: The default interval of the first three rapid DHC messages is RECOMMENDED to be 3.3 ms (similar to RFC 6378), and the default interval of subsequent periodic messages is 1 second. Both intervals SHALL be configurable by the operator.
