document: rfc-7032
kind: protocol-element
summary: An upstream access LSR/ABR sends a Label Release when it receives a Label Withdraw, when a /32 static route with DoD policy is deleted, when a service is decommissioned with no corresponding static route, when a next-hop change makes the label invalid, or when an unsolicited label mapping is received on a DoD session.
section: "4.5"
topics:
