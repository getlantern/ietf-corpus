document: rfc-8086
kind: security-consideration
summary: DTLS SHOULD be used to secure GRE-in-UDP tunnel traffic. When entropy-based UDP source port usage is disabled, a random ephemeral port SHOULD be selected to minimize vulnerability to off-path attacks, and MAY be periodically changed to mitigate DoS attacks.
section: "11"
topics:
