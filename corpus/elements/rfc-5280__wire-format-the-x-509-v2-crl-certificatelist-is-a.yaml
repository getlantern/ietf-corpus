kind: wire-format
summary: The X.509 v2 CRL (CertificateList) is a SEQUENCE of tbsCertList (TBSCertList), signatureAlgorithm (AlgorithmIdentifier), and signatureValue (BIT STRING). TBSCertList includes version, signature, issuer, thisUpdate, optional nextUpdate, optional revokedCertificates list, and optional extensions.
