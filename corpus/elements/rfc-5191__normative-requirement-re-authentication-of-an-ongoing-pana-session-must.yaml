document: rfc-5191
kind: normative-requirement
summary: Re-authentication of an ongoing PANA session MUST NOT reset the sequence numbers. The first PAR and PAN in the re-authentication phase MUST have the 'S' bit cleared and carry a Nonce AVP.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
