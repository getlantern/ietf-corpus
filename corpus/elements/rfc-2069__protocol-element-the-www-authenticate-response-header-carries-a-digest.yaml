document: rfc-2069
kind: protocol-element
summary: The WWW-Authenticate response header carries a digest-challenge with required realm and nonce fields and optional domain, opaque, stale, and algorithm fields. The server sends this alongside a 401 Unauthorized response when no acceptable Authorization header is present.
