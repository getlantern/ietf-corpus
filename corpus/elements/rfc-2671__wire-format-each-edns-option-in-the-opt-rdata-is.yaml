document: rfc-2671
kind: wire-format
summary: Each EDNS option in the OPT RDATA is encoded as a 2-octet OPTION-CODE (assigned by IANA), followed by a 2-octet OPTION-LENGTH giving the size of OPTION-DATA in octets, followed by OPTION-DATA of that length. Multiple options are concatenated.
