document: rfc-1521
kind: normative-requirement
summary: In Quoted-Printable, uppercase letters MUST be used when sending hexadecimal data. When decoding, any trailing white space on a line MUST be deleted, as it will necessarily have been added by intermediate transport agents.
section: "5.1"
rfc2119_level: MUST
