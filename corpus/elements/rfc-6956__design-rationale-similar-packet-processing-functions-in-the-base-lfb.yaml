document: rfc-6956
kind: design-rationale
summary: Similar packet processing functions in the base LFB library MUST NOT be simultaneously defined as two different LFBs (e.g., two different LFBs for the same next-hop processing), as redundant definitions add implementation burden and impede interoperability between CEs and FEs.
section: 3.2.1
topics:
    - routing
