document: rfc-4251
kind: protocol-element
summary: 'Two trust models are defined for host key verification: (1) a client-local database associating host names to public keys, requiring no infrastructure; and (2) certification by a trusted CA where the client only stores the CA root key. The protocol also permits skipping verification on first connect.'
section: "4.1"
topics:
