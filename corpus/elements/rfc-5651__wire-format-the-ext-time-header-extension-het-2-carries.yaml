document: rfc-5651
kind: wire-format
summary: The EXT_TIME Header Extension (HET=2) carries a 16-bit 'Use' bit field followed by one or more 32-bit time values. The Use field has 8 bits for general-purpose timing (SCT-High, SCT-Low, ERT, SLC flags plus 4 reserved bits) and 8 bits for PI-specific use. Time values MUST appear in Use-field flag order.
section: 5.2.2
topics:
    - multicast
    - ntp
