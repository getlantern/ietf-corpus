document: rfc-5662
kind: normative-requirement
summary: When a session is persistent, GUARDED4 MUST be used for exclusive file creation; EXCLUSIVE4_1 is used instead of EXCLUSIVE4 only for non-persistent sessions. EXCLUSIVE4 itself is deprecated in NFSv4.1.
section: "2"
rfc2119_level: MUST
topics:
    - realtime
