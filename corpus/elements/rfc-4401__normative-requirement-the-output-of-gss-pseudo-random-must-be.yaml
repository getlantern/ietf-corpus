document: rfc-4401
kind: normative-requirement
summary: The output of GSS_Pseudo_random() MUST be a pseudo-random function of the input keyed with key material from the given security context; the chances of getting the same output given different input parameters should be exponentially small.
section: "2"
rfc2119_level: MUST
