document: rfc-6797
kind: normative-requirement
summary: All directives in an STS header field MUST appear only once; unrecognized directives MUST be ignored; if the STS header otherwise satisfies the requirements, the UA MUST process the recognized directives.
section: "6.1"
rfc2119_level: MUST
