document: rfc-6926
kind: normative-requirement
summary: If ciaddr, yiaddr, or siaddr is non-zero in a DHCPBULKLEASEQUERY request, the server MUST terminate the request immediately with DHCPLEASEQUERYDONE carrying a MalformedQuery status code.
section: "8.2"
rfc2119_level: MUST
