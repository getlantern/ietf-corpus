document: rfc-7015
kind: design-rationale
summary: Aggregate combination is idempotent, meaning any number of Intermediate Aggregation Processes operating in series can be modeled as a single process. This allows aggregation operations to be flexibly distributed across multiple processes without altering the semantics of the result.
