document: rfc-2381
kind: normative-requirement
summary: For IP over ATM, Frame Discard MUST always be indicated if available. This TM/UNI 4.0 feature enables partial packet discard (dropped cell causes remaining cells of the same AAL-5 PDU to be dropped), improving end-to-end TCP/IP efficiency.
section: "2.7"
rfc2119_level: MUST
topics:
    - ip
    - qos
    - tcp
