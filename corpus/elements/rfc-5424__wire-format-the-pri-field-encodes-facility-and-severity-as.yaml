document: rfc-5424
kind: wire-format
summary: The PRI field encodes facility and severity as '<' PRIVAL '>', where PRIVAL = Facility * 8 + Severity. PRIVAL is 1-3 decimal digits (range 0-191); leading zeros MUST NOT be used except for the value '0' itself. Facility must be 0-23 and Severity 0-7.
section: 6.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
