document: rfc-1139
kind: normative-requirement
summary: The lifetime field of echo-request and echo-reply PDUs should be set to the value normally used for a DT PDU. The memo does not define a mechanism for varying the lifetime on the echo-reply and recommends using the normal DT lifetime value.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - ip
