document: rfc-6840
kind: normative-requirement
summary: When validating a response to QTYPE=*, all received RRsets matching QNAME and QCLASS MUST be validated; if any fail, the answer is Bogus. If there are no matching RRsets, that fact MUST be validated per RFC 4035 Section 5.4 nonexistence rules.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
