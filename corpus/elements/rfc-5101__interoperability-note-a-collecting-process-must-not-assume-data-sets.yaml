document: rfc-5101
kind: interoperability-note
summary: A Collecting Process MUST NOT assume Data Sets and their associated Template Sets are exported in the same IPFIX Message. If Template Records have not yet arrived, the Collector MAY store Data Records temporarily and decode them once the Template is received.
section: "9"
topics:
    - measurement
