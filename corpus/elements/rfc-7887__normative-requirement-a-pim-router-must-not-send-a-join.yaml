document: rfc-7887
kind: normative-requirement
summary: A PIM router MUST NOT send a Join/Prune message with Join/Prune attributes encoded in the Upstream Neighbor Address or any group addresses out of any interface on which there is a PIM neighbor that has not included the Hierarchical Join/Prune Attribute Hello Option in its Hellos.
section: "5"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
