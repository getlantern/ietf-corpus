document: rfc-7045
kind: registry
summary: 'IANA closed the existing empty ''Next Header Types'' registry and created a new ''IPv6 Extension Header Types'' registry containing protocol numbers also marked as extension header types. Initial entries include: 0 (Hop-by-Hop Option), 43 (Routing), 44 (Fragment), 50 (ESP), 51 (AH), 60 (Destination Options), 135 (Mobility), 139 (HIP, experimental), 140 (Shim6), 253 and 254 (experimental).'
