document: rfc-2273
kind: protocol-element
summary: 'Five SNMP application types are defined: Command Generators (initiate Get/GetNext/GetBulk/Set), Command Responders (process incoming requests), Notification Originators (generate Trap/Inform), Notification Receivers (receive notifications), and Proxy Forwarders (forward requests or notifications). Multiple application types may coexist on a single SNMP engine.'
section: "1"
topics:
