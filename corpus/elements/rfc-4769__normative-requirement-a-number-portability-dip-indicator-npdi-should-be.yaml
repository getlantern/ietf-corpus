document: rfc-4769
kind: normative-requirement
summary: A Number Portability Dip Indicator (npdi) should be used in practice with both the 'pstn:tel' and 'pstn:sip' Enumservice subtypes. The npdi field is included to prevent subsequent lookups in legacy-style PSTN databases.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
