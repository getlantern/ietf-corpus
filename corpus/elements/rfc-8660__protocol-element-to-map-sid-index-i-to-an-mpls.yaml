document: rfc-8660
kind: protocol-element
summary: To map SID index I to an MPLS label within a multi-range SRGB, the total SRGB size is computed as the sum of all range sizes. The label is found by walking the ranges until the cumulative size exceeds I, then computing label = I - temp + Ll(j). The index must satisfy 0 <= I < size.
section: "2.4"
topics:
    - mpls
    - routing
