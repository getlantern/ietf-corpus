document: rfc-2743
kind: protocol-element
summary: 'GSS-API defines four call groups: credential management (GSS_Acquire_cred, GSS_Release_cred, GSS_Inquire_cred, GSS_Add_cred, GSS_Inquire_cred_by_mech), context-level calls (GSS_Init_sec_context, GSS_Accept_sec_context, GSS_Delete_sec_context, etc.), per-message calls (GSS_GetMIC, GSS_VerifyMIC, GSS_Wrap, GSS_Unwrap), and support calls (GSS_Display_status, GSS_Indicate_mechs, name manipulation routines).'
section: "2"
topics:
