document: rfc-5424
kind: security-consideration
summary: UTF-8 non-shortest-form encoding can be exploited to bypass security filters by encoding ASCII characters in multi-byte sequences. RFC 5424 requires 'shortest form' encoding and prohibits interpretation of non-shortest-form sequences throughout the protocol to mitigate this risk.
section: "8.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
