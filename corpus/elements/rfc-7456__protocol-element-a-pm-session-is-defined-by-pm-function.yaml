summary: A PM Session is defined by PM function, Start Time, Stop Time, Message Period, Measurement Interval, and Repetition Time. Loss Measurement sessions measure Frame Loss Ratio, availability, and resiliency; Delay Measurement sessions measure Frame Delay, Inter-Frame Delay Variation, Frame Delay Range, and Mean Frame Delay.
