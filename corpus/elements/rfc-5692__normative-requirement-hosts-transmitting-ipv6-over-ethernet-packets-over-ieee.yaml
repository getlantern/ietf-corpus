document: rfc-5692
kind: normative-requirement
summary: Hosts transmitting IPv6-over-Ethernet packets over IEEE 802.16 MUST follow the operations specified in RFC 2464. NDP (RFC 4861) MUST be used for determining the destination Ethernet MAC address.
section: 6.2.2
rfc2119_level: MUST
