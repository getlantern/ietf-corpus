document: rfc-4974
kind: interoperability-note
summary: Transit nodes that do not support Call management may zero the previously-reserved Call_ID field before forwarding SESSION objects, which will prevent LSP setup for Calls. Use of Explicit Routes may help by avoiding such nodes, but ultimately offending nodes may need to be upgraded.
section: "8.2"
topics:
    - mpls
