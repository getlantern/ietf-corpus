document: rfc-4401
kind: protocol-element
summary: The prf_key parameter takes values GSS_C_PRF_KEY_FULL (0), GSS_C_PRF_KEY_PARTIAL (1), or mechanism-specific values. GSS_C_PRF_KEY_FULL corresponds to the best key for fully-established contexts; GSS_C_PRF_KEY_PARTIAL corresponds to a key available during partial establishment.
