document: rfc-8512
kind: design-rationale
summary: Dynamic explicit mappings (PCP, RFC 6887; Diameter, RFC 6736; RFC 8045) are out of scope; the module covers only static explicit mappings (CLI-configured) and dynamic implicit mappings (packet-triggered). This separation cleanly decouples the signaling protocol from the NAT data model.
section: "2.1"
topics:
    - nat
    - yang
