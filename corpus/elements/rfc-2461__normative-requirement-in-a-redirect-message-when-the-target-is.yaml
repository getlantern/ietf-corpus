document: rfc-2461
kind: normative-requirement
summary: In a Redirect message, when the target is the actual communication endpoint (i.e., the destination is an on-link neighbor), the Target Address MUST contain the same value as the Destination Address. Otherwise the target is a better first-hop router and the Target Address MUST be the router's link-local address.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
