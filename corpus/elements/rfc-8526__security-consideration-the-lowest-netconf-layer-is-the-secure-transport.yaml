document: rfc-8526
kind: security-consideration
summary: The lowest NETCONF layer is the secure transport layer; the mandatory-to-implement secure transport is SSH (RFC 6242). The Network Configuration Access Control Model (NACM, RFC 8341) restricts access for NETCONF users to authorized protocol operations and content. Security considerations from RFC 6241 Section 9 apply to the new <get-data> and <edit-data> operations.
section: "6"
topics:
    - security
    - netconf
