document: rfc-9562
kind: design-rationale
summary: The fixed bit-length dedicated counter (Method 1) for UUIDv7 monotonicity SHOULD be at least 12 bits but no longer than 42 bits. The counter must be initialized to a random value on each new timestamp tick, not sequentially from zero, to preserve unguessability of the batch while still guaranteeing sort order.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
