document: rfc-8012
kind: design-rationale
summary: Multipath Type {9} is defined to apply to the first label in the stack that corresponds to an EL-FEC; if no such label is found, it applies to the bottom-of-stack label. This clarification addresses the incompleteness identified in RFC 6790 regarding the specific EL location, particularly for flow-aware pseudowires where EL appears without ELI.
section: "2"
topics:
    - mpls
    - routing
