document: rfc-4033
kind: design-rationale
summary: Authentication of DNS keys and data is ultimately a matter of local policy, which may extend or override the DNSSEC protocol extensions. A validating resolver must always be guided by local policy when deciding whether to authenticate a new public key.
section: "3.1"
topics:
    - dns
    - security
