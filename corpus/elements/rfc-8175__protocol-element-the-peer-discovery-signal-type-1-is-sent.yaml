document: rfc-8175
kind: protocol-element
summary: The Peer Discovery Signal (type 1) is sent by routers to the DLEP well-known IPv4 or IPv6 link-local multicast address/port. The modem responds with a Peer Offer Signal (type 2) containing IPv4/IPv6 Connection Point Data Items specifying the TCP address/port. If no Connection Point Data Items are included, the router uses the UDP source address and the DLEP well-known port.
section: "12.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
