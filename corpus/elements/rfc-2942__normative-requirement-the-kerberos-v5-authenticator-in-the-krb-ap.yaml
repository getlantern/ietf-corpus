document: rfc-2942
kind: normative-requirement
summary: The Kerberos V5 authenticator in the KRB_AP_REQ message must contain a Kerberos V5 checksum of the two-byte authentication type pair, and this checksum must be verified by the server to assure the authentication type pair was correctly negotiated.
section: "2"
rfc2119_level: MUST
topics:
