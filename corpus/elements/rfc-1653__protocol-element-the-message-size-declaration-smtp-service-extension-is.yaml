document: rfc-1653
kind: protocol-element
summary: The 'Message Size Declaration' SMTP service extension is identified by the EHLO keyword 'SIZE'. An optional decimal numeric parameter on the SIZE keyword indicates the server's fixed maximum message size in bytes; a value of 0 means no fixed maximum; omission means no information is conveyed.
section: "2"
