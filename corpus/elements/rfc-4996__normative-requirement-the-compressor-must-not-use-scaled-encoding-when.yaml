document: rfc-4996
kind: normative-requirement
summary: The compressor MUST NOT use scaled encoding when scaling_factor is zero. If the residue or scaling_factor changes, the compressor MUST NOT use scaled encoding until it is confident the decompressor has received the new value(s).
section: 6.4.8
rfc2119_level: MUST NOT
topics:
