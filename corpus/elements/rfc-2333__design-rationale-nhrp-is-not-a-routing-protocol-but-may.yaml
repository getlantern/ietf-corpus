document: rfc-2333
kind: design-rationale
summary: NHRP is not a routing protocol but may use routing information. When NHRP uses dynamic routing to identify an egress router, the exit router selected reflects the dynamic routing protocol's choice, typically the one inducing the fewest hops on the original routed path.
section: "3"
