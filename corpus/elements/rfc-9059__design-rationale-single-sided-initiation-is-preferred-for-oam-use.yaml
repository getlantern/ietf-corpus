document: rfc-9059
kind: design-rationale
summary: Single-sided initiation is preferred for OAM use cases where an endpoint needs to know both forward and reverse paths. It also allows the originating PCC to dynamically compute co-routed forward and reverse paths and can be deployed where PCEP is only enabled on originating endpoint nodes, since remote nodes create reverse tunnels via RSVP-TE.
section: "3.5"
topics:
    - mpls
    - routing
