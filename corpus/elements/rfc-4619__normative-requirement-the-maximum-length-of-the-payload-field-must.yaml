document: rfc-4619
kind: normative-requirement
summary: The maximum length of the payload field MUST be agreed upon by the two PEs, achievable by using the MTU interface parameter when the PW is established via RFC4447. It is RECOMMENDED to support a frame size of at least 1600 bytes.
section: "7.2"
rfc2119_level: MUST
topics:
    - mpls
