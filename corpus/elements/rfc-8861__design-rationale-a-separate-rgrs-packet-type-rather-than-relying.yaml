document: rfc-8861
kind: design-rationale
summary: A separate RGRS packet type (rather than relying solely on the RGRP SDES item) allows observers to distinguish a non-reporting source that is legitimately suppressing reports from an SSRC that is not receiving any traffic, and also allows detection of lost reporting source RTCP packets.
section: 3.2.2
topics:
    - rtp
    - realtime
