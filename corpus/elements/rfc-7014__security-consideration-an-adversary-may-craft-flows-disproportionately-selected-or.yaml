document: rfc-7014
kind: security-consideration
summary: An adversary may craft flows disproportionately selected or excluded by hash-based or time-based systematic sampling to circumvent accounting or evade attack detection; hash function security considerations from RFC 5475 Section 6.2.3 apply equally to Hash-based Flow Selection.
