document: rfc-7428
kind: normative-requirement
summary: The RA Router Lifetime value 0xFFFF MUST be interpreted as infinite lifetime. This value MUST NOT be used by ABRs; it is reserved for sleeping island-mode network controllers such as battery-powered remote controls.
section: 4.4.2.3
rfc2119_level: MUST
topics:
