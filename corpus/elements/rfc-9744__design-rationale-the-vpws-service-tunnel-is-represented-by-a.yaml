document: rfc-9744
kind: design-rationale
summary: The VPWS Service Tunnel is represented by a pair of downstream-assigned EVPN service labels advertised via Ethernet A-D per-EVI routes. A single tunnel can be associated with many VPWS service identifiers (normalized VIDs), enabling AC multiplexing while retaining the existing EVPN label distribution and fast convergence mechanisms of RFC 7432.
section: "1.1"
topics:
    - vpn
    - bgp
    - routing
