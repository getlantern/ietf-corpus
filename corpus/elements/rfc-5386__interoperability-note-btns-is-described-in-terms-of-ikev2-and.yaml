document: rfc-5386
kind: interoperability-note
summary: BTNS is described in terms of IKEv2 and RFC 4301 concepts. IKEv1 (RFC 2408, RFC 2409) can in principle use the same methods, but those specifications do not include PAD concepts, making BTNS implementation on RFC 2401-compliant systems potentially infeasible.
section: "1"
topics:
    - ipsec
    - security
