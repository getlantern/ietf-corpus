document: rfc-4202
kind: protocol-element
summary: 'TDM (Time-Division Multiplex Capable) interfaces carry additional ISCD fields: Maximum LSP Bandwidth per priority, Minimum LSP Bandwidth, and a flag indicating Standard or Arbitrary SDH multiplexing. Standard SDH constrains LSP bandwidth to a branch of the SDH hierarchy; Arbitrary SDH allows any bandwidth that is a multiple of Minimum LSP Bandwidth.'
section: 2.4.3
topics:
    - routing
extracted_by: claude-sonnet-4-6
