document: rfc-5026
kind: normative-requirement
summary: The authorization of the Mobile Node to update a FQDN MUST be checked prior to the DNS update. The Mobile Node MUST use a FQDN as the IDi in the IKE_AUTH step, and that FQDN MUST be the same as the one provided in the DNS Update Option.
section: "9.5"
rfc2119_level: MUST
topics:
    - mobility
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
