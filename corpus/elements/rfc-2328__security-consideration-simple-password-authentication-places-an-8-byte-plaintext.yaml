document: rfc-2328
kind: security-consideration
summary: Simple password authentication places an 8-byte plaintext password in the authentication field of every OSPF packet. This provides minimal security and is vulnerable to passive eavesdropping; cryptographic authentication is strongly preferred.
section: D.2
topics:
    - security
    - routing
