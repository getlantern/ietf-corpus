document: rfc-3670
kind: design-rationale
summary: QoS attributes are expressed as absolute numbers rather than relative or proportional values. Multiple-property synchronization was rejected as error-prone, and multi-modal properties are unrepresentable in LDAP; absolute values allow the policy schema's arithmetic operators to derive percentages (e.g., AF2 gets 0.05 * total link bandwidth).
section: "3.7"
topics:
    - qos
