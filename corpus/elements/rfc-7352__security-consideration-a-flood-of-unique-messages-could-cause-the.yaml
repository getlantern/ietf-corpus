document: rfc-7352
kind: security-consideration
summary: A flood of unique messages could cause the duplicate-tracking list to grow indefinitely. Implementations SHOULD limit the number of entries in the list and SHOULD discard the oldest entries first when the limit is reached.
section: "6"
rfc2119_level: SHOULD
topics:
