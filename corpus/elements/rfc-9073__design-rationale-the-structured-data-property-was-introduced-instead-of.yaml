document: rfc-9073
kind: design-rationale
summary: The STRUCTURED-DATA property was introduced instead of extending the existing ATTACH property, because ATTACH does not allow TEXT value types, attachments are often treated as opaque data, and extending ATTACH to support a new value type would likely cause interoperability problems. Some implementations also strip attachments and replace them with links.
section: "6.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
