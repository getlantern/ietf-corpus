document: rfc-5282
kind: wire-format
summary: The Associated Data (A) MUST consist of the IKEv2 message starting from the first octet of the Fixed IKE Header through the last octet of the Encrypted Payload's Payload Header (the fourth octet of the Encrypted Payload), including any payloads between the IKE Header and the Encrypted Payload. The IV and Ciphertext fields MUST NOT be included.
section: "5.1"
topics:
    - ipsec
    - crypto
