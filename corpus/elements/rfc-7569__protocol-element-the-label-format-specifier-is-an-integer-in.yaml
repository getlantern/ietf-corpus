document: rfc-7569
kind: protocol-element
summary: The Label Format Specifier is an integer in the range 0..65535. Values 0 is Reserved, 1-127 are Private Use, 128-255 are Experimental Use, 256-259 are assigned to CIPSO, CALIPSO, FLASK, and IPSO respectively, and 260-65535 are available for IANA assignment.
