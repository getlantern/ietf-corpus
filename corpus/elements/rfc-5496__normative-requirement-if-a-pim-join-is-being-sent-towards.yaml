document: rfc-5496
kind: normative-requirement
summary: If a PIM Join is being sent towards a Vector rather than towards the source, the Assert message MUST carry the metric to the Vector instead of the metric to the source. Assert messages do not contain an attribute field and do not mention the Vector.
section: 3.3.3
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
