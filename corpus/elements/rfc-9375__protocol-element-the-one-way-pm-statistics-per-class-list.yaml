summary: The 'one-way-pm-statistics-per-class' list, keyed by 'class-id' (string), provides per-class-of-service loss, delay, and jitter statistics on each link. This is separate from the generic 'one-way-pm-statistics' container which covers traffic with unspecified class-id.
