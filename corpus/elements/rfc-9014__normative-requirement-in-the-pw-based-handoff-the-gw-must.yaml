document: rfc-9014
kind: normative-requirement
summary: In the PW-based handoff, the GW MUST support an interworking function in each MAC-VRF requiring WAN extension. If a FEC128-based PW is used, the VCID MUST be provisioned on the MAC-VRF and MUST match the VCID used at the peer WAN Edge VSI.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
