document: rfc-9828
kind: normative-requirement
summary: When C=1, a receiver MUST replace each empty code-block in the codestream with a matching code-block from its cache (if one exists), and MUST update the cache by replacing any matching cached code-block with a non-empty code-block received from the codestream.
section: "8.7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
