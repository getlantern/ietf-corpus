document: rfc-9760
kind: normative-requirement
summary: TimeReceiver Clocks MUST be able to operate properly in the presence of a rogue timeTransmitter and MUST be able to function even if they use time from only one domain. If a timeTransmitter is not an Acceptable timeTransmitter, the timeReceiver MUST NOT synchronize to it.
section: "9"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
