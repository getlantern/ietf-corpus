document: rfc-2406
kind: normative-requirement
summary: All ESP implementations MUST support the anti-replay service, though its use may be enabled or disabled by the receiver on a per-SA basis. The anti-replay service MUST NOT be enabled unless the authentication service is also enabled for the SA, since otherwise the Sequence Number field is not integrity-protected.
section: 3.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
