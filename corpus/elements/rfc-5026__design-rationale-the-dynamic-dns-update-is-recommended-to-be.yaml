document: rfc-5026
kind: design-rationale
summary: 'The dynamic DNS update is recommended to be performed by the Home Agent rather than the Mobile Node, for security and administrative reasons: requiring all Mobile Nodes to share security associations with MSP DNS servers is operationally cumbersome and introduces address authorization complexity.'
