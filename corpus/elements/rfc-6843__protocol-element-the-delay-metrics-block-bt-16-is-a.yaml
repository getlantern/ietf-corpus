document: rfc-6843
kind: protocol-element
summary: The Delay Metrics Block (BT=16) is a new RTCP XR block type that reports mean, minimum, and maximum network round-trip delay and end system delay for RTP streams. It references the Measurement Information block via SSRC and has a fixed block length of 6 (32-bit words minus one).
