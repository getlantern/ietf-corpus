document: rfc-4976
kind: normative-requirement
summary: Before forwarding any request, a relay MUST verify that the first URI in the To-Path header corresponds to a URI it issued in a Use-Path response, and that the message is coming from or going to the authorized client that obtained that URI.
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
