document: rfc-7753
kind: protocol-element
summary: The PORT_SET option (option code 130) is a new PCP MAP option that allows a client to request a set of ports in a single request. It is valid only for the MAP opcode, has a length of 5 bytes, and may appear at most once per request or response.
