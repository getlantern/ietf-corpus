document: rfc-3339
kind: normative-requirement
summary: The time-second field MAY have the value "60" only at the end of months in which a leap second occurs. Applications SHOULD NOT generate timestamps involving inserted leap seconds until after the leap seconds are announced by IERS.
section: "5.7"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
