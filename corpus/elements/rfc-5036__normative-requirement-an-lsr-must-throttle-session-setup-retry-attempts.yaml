document: rfc-5036
kind: normative-requirement
summary: An LSR MUST throttle session setup retry attempts with exponential backoff when Initialization messages are NAK'd; the first retry MUST be delayed no less than 15 seconds and subsequent delays MUST grow to a maximum of no less than 2 minutes.
section: 2.5.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
