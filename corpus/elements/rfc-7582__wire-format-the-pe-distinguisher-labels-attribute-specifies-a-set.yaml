document: rfc-7582
kind: wire-format
summary: The PE Distinguisher Labels attribute specifies a set of <MPLS label, IP address> bindings. Within a single attribute, each IP address MUST appear at most once and each MPLS label MUST appear only once; otherwise the attribute is malformed.
section: 3.2.2.1
topics:
    - routing
    - mpls
    - multicast
    - bgp
