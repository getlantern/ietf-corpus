document: rfc-3865
kind: normative-requirement
summary: An implementation SHOULD include a Mail-From-Solicit-Parameter on any 550 or other reply that rejects message delivery, including the matching solicitation class keyword(s). Additional in-effect keywords MAY also be included.
section: "2.4"
rfc2119_level: SHOULD
