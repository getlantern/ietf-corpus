document: rfc-3108
kind: wire-format
summary: An NSAP address is encoded as a string of 40 hex digits with dots after the 2nd, 6th, 10th, 14th, 18th, 22nd, 26th, 30th, 34th and 38th digits; no '0x' prefix is used. An E164 address is a decimal number of up to 15 digits. A GWID/ALIAS address is a variable-length alphanumeric string of up to 32 characters.
section: "5.3"
