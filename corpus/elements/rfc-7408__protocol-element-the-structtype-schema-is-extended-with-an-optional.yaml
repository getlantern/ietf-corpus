document: rfc-7408
kind: protocol-element
summary: 'The structType schema is extended with an optional access attribute (default ''read-write'') on each component element, allowing per-component fine-grained access control within structs using accessModeType values: read-only, read-write, write-only, read-reset, trigger-only.'
section: "2.3"
