document: rfc-1519
kind: protocol-element
summary: For sub-allocated class A space, IN-ADDR.ARPA delegation also proceeds on octet boundaries. A provider holding 10.8.0.0/255.248.0.0 requires eight second-level delegations (8.10 through 15.10 IN-ADDR.ARPA); a client holding 10.10.64.0/255.255.192.0 requires 64 third-level delegations (64.10.10 through 127.10.10 IN-ADDR.ARPA).
section: "7.2"
