document: rfc-9176
kind: protocol-element
summary: The registration update interface is a POST to the registration resource location returned at initial registration. It resets the registration timeout and may update lt, base URI, or extra-attrs query parameters; parameters not being changed should be omitted.
section: 5.3.1
