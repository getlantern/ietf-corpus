document: rfc-9668
kind: protocol-element
summary: 'Server processing of an EDHOC + OSCORE request follows nine steps: verify OSCORE option and COMB_PAYLOAD format, extract EDHOC_MSG_3, derive C_R from the OSCORE ''kid'' field, retrieve the EDHOC session and process message_3, establish the OSCORE Security Context, extract OSCORE_PAYLOAD, rebuild the OSCORE request, decrypt and verify it, and deliver to the application.'
section: 3.3.1
topics:
    - security
    - crypto
