document: rfc-7866
kind: normative-requirement
summary: The SRC MUST only treat an incoming SIP session as a Recording Session when both the '+sip.srs' feature tag and the 'siprec' option tag are present in the INVITE request. The SRS applies the symmetric rule requiring both '+sip.src' and 'siprec'.
section: 6.1.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
