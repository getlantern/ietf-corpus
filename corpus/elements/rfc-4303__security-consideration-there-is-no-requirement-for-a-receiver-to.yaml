document: rfc-4303
kind: security-consideration
summary: There is no requirement for a receiver to transmit any message to the purported sender in response to detection of an auditable event (e.g., integrity failure, anti-replay failure), because doing so could induce denial-of-service via forged packets triggering responses.
section: "4"
topics:
