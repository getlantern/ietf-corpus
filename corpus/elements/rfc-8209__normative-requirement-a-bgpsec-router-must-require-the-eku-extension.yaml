document: rfc-8209
kind: normative-requirement
summary: A BGPsec router MUST require the EKU extension be present in a received BGPsec Router Certificate and MUST reject certificates that do not contain the BGPsec Router EKU, even if they include the anyExtendedKeyUsage OID.
section: 3.1.3.2
rfc2119_level: MUST
topics:
    - bgp
    - pkix
    - routing
    - security
