document: rfc-6501
kind: protocol-element
summary: 'The <user-admission-policy> element defines the conference authentication policy with three values: ''closedAuthenticated'' (only allowed-list members, fully authenticated), ''openAuthenticated'' (any authenticated user, supports deny list), and ''anonymous'' (no restriction, no user lists apply).'
