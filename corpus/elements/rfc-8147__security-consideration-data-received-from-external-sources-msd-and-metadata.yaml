document: rfc-8147
kind: security-consideration
summary: Data received from external sources (MSD and metadata/control objects) may be malformed, contain unexpected characters, or have excessively long attribute values. Implementations must apply defense-in-depth including fuzz testing, component isolation, and avoidance of unsafe coding techniques to mitigate risks such as buffer overflows and XML parsing vulnerabilities.
section: "11"
topics:
    - security
