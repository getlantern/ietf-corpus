document: rfc-6130
kind: security-consideration
summary: NHDP is vulnerable to attacks via forged or replayed HELLO messages, including topology poisoning (advertising false links or neighbors), black-hole and wormhole attacks, and resource exhaustion DoS. Without additional security mechanisms, routers cannot distinguish forged from authentic HELLO messages.
section: "17"
topics:
