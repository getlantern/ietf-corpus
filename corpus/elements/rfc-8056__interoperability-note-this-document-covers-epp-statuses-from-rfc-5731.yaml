document: rfc-8056
kind: interoperability-note
summary: This document covers EPP statuses from RFC 5731 (Domain Name Mapping), RFC 5732 (Host Mapping), RFC 5733 (Contact Mapping), and RFC 3915 (Domain Registry Grace Period Mapping). Not all EPP statuses apply to all object types (e.g., 'client hold' and 'server hold' apply only to domains).
