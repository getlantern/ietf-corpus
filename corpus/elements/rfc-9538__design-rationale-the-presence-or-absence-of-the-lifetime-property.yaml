document: rfc-9538
kind: design-rationale
summary: The presence or absence of the 'lifetime' property in ACMEDelegationMethod distinguishes STAR from non-STAR delegation. A non-STAR delegation will not have the 'lifetime' property, allowing the dCDN to determine delegation type without an explicit type field.
