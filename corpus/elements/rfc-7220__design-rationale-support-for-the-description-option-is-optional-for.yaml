document: rfc-7220
kind: design-rationale
summary: Support for the DESCRIPTION option is optional for both servers and clients to allow flexible deployment without mandating storage or processing overhead. Servers signal non-support or non-acceptance simply by omitting the option from the response rather than returning an error code.
section: "3"
