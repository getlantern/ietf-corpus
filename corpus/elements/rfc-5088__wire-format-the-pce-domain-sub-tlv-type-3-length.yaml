summary: The PCE-DOMAIN sub-TLV (type=3, length=8) specifies a PCE-Domain where the PCE has topology visibility. It contains a 2-octet domain-type (1=OSPF Area ID, 2=AS Number), 2-octet reserved, and a 32-bit Domain ID.
