document: rfc-1626
kind: normative-requirement
summary: PVC-only implementations shall use the default IP MTU of 9180 octets unless both parties have agreed in advance to use some other value via an unspecified out-of-band mechanism.
section: Permanent Virtual Circuits
rfc2119_level: MUST
