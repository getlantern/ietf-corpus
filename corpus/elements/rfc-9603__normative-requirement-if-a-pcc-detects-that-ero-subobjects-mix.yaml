document: rfc-9603
kind: normative-requirement
summary: If a PCC detects that ERO subobjects mix SRv6-ERO subobjects with other subobject types, it MUST send a PCErr with Error-Type=10 and Error-Value=43. Similarly for RRO mixing, Error-Value=36.
section: 5.2.1
rfc2119_level: MUST
topics:
    - routing
