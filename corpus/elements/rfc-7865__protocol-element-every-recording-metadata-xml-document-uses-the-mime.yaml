document: rfc-7865
kind: protocol-element
summary: Every recording metadata XML document uses the MIME type 'application/rs-metadata+xml' and is rooted in a 'recording' element acting as a container. The document represents either a complete metadata snapshot or a partial update, indicated by the optional 'dataMode' child element ('complete' is the default).
