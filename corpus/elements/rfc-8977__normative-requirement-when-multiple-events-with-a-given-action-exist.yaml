document: rfc-8977
kind: normative-requirement
summary: When multiple events with a given action exist on an object, sorting MUST be applied to the most recent event. When a nameserver has multiple addresses per IP version, sorting MUST be applied to the first value.
section: 2.3.1
rfc2119_level: MUST
