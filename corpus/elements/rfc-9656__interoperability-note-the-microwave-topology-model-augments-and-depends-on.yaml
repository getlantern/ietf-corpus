document: rfc-9656
kind: interoperability-note
summary: The microwave topology model augments and depends on ietf-network and ietf-network-topology (RFC 8345), ietf-te-topology (RFC 8795), and ietf-microwave-types (RFC 8561). All augmentation when-conditions require the presence of mwt:mw-topology under tet:te-topology, ensuring model elements are only active in microwave-typed networks.
section: "2.5"
topics:
