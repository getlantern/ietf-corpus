document: rfc-9113
kind: wire-format
summary: 'The DATA frame (type=0x00) carries variable-length application data on a stream. Fields beyond the 9-octet header: optional Pad Length (8-bit, present if PADDED flag set), Data (variable), and optional Padding (up to 2040 octets). DATA frames are subject to flow control.'
section: "6.1"
topics:
