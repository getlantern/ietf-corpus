document: rfc-3880
kind: design-rationale
summary: The set of call destinations is stored as an implicit global variable (the 'location set') rather than as explicit language parameters. This allows locations to be retrieved from external sources, filtered, and manipulated without requiring general language features that would harm simplicity and tractability.
section: "2.3"
