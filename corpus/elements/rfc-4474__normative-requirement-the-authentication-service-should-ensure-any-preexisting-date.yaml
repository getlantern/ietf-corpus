document: rfc-4474
kind: normative-requirement
summary: The authentication service SHOULD ensure any preexisting Date header is accurate within a RECOMMENDED maximum discrepancy of ten minutes; if the Date differs by more than ten minutes it SHOULD reject the request. The authentication service MUST verify the Date falls within the validity period of its certificate.
section: "5"
rfc2119_level: SHOULD
topics:
    - sip
    - security
