document: rfc-8436
kind: registry
summary: 'IANA maintains the ''Differentiated Services Field Codepoints (DSCP)'' registry, divided into three pools: Pool 1 (xxxxx0, 32 codepoints, Standards Action), Pool 2 (xxxx11, 16 codepoints, EXP/LU), and Pool 3 (xxxx01, 16 codepoints, now Standards Action per this document). IANA has created a ''DSCP Pool 3 Codepoints'' subregistry, initially empty, with a format identical to Pool 1.'
