document: rfc-8417
kind: privacy-consideration
summary: A SET recipient may correlate different events to gain unintended information about a subject — for example, using 'iat' or precise 'toe' values to determine that two events relate to the same real-world event. SET issuers SHOULD minimize event correlation risk by using approximate 'toe' values or arbitrarily delaying SET issuance where tolerable.
section: "6"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
