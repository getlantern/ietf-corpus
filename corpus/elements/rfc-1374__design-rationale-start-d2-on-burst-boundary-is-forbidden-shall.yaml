document: rfc-1374
kind: design-rationale
summary: Start_D2_on_Burst_Boundary is forbidden (shall be zero) so that HIPPI packets can traverse intermediate media (e.g. other LAN types between HIPPI LANs) that may alter burst boundaries; this flag is reserved for device-control protocols that need burst boundaries to separate command and data areas.
section: Protocol/Packet Format
topics:
    - ip
