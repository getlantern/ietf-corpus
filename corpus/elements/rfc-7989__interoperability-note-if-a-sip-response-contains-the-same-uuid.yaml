document: rfc-7989
kind: interoperability-note
summary: If a SIP response contains the same UUID values in the same order as was sent, this indicates a pre-standard RFC 7329 implementation. Such a response MUST NOT be discarded, and all subsequent transactions in that dialog MUST preserve the UUID order until the dialog terminates.
section: "11"
topics:
