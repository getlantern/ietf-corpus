document: rfc-4412
kind: registry
summary: 'A new IANA registry ''Resource-Priority Namespaces'' in sip-parameters records namespace label, number of priority levels, intended algorithm (preemption or queue), new warn-codes, new response codes, and RFC reference. This document registers five initial namespaces: dsn (5 levels, preemption), drsn (6 levels, preemption), q735 (5 levels, preemption), ets (5 levels, queue), wps (5 levels, queue).'
section: "12.5"
