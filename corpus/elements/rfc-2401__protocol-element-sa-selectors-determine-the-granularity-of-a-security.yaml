document: rfc-2401
kind: protocol-element
summary: 'SA selectors determine the granularity of a security association. Required selector types for all implementations include: Destination IP Address, Source IP Address, Transport Layer Protocol, and Source/Destination Ports. Name (user ID or system name) is required for host and gateway implementations. Selectors may be single values, ranges, wildcards, or ''OPAQUE'' when fields are inaccessible due to encryption or fragmentation.'
section: 4.4.2
topics:
    - ipsec
    - security
