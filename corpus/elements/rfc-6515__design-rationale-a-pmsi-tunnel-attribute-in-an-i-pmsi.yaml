document: rfc-6515
kind: design-rationale
summary: A PMSI Tunnel Attribute in an I-PMSI A-D route identifies the default tunnel for a particular customer MVPN. The AFI of the enclosing MP_REACH_NLRI determines whether that tunnel carries IPv4 or IPv6 MVPN traffic, not whether the tunnel endpoint addresses are IPv4 or IPv6 (which is determined by the next hop address family).
section: "4"
topics:
