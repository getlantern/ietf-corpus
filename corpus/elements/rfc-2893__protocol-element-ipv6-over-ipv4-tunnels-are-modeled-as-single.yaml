document: rfc-2893
kind: protocol-element
summary: 'IPv6-over-IPv4 tunnels are modeled as single-hop: the IPv6 hop limit is decremented by exactly 1 when an IPv6 packet traverses the entire tunnel. This hides the tunnel from traceroute and other network diagnostic tools, making it opaque to users.'
section: "3.3"
topics:
