document: rfc-2227
kind: normative-requirement
summary: Usage reports MUST always be transmitted as part of a conditional request (GET or HEAD), since the conditional header is required for the origin server to know which response instance is being counted. Proxies forwarding usage reports MUST NOT change the contents of the conditional header.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
