document: rfc-6005
kind: normative-requirement
summary: When an edge node (UNI-C) initiates an LSP and has the egress Ethernet endpoint identifier but not its IP address, the edge node MUST create a Notify message including the CALL_ATTRIBUTES object with the Endpoint ID TLV, with the tunnel endpoint address field of the SESSION object set to zero, addressed to the first core node.
section: 2.2.1
rfc2119_level: MUST
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
