summary: 'Q-Space for link S-E: the set of nodes that can reach primary next-hop E without traversing the S-E link on any shortest path, excluding any node with at least one ECMP path to E traversing S-E. Cost condition: D_opt(Y,E) < D_opt(S,E) + D_opt(Y,S).'
