document: rfc-3478
kind: protocol-element
summary: For a restarting LSR acting as penultimate hop (Implicit NULL received), the LSR searches for a forwarding entry indicating Label pop with matching next hop. If found, the entry is un-marked as stale, the incoming label is associated with the FEC, and advertised to neighbors.
section: 3.1.1
topics:
    - mpls
    - routing
