document: rfc-8445
kind: normative-requirement
summary: Server-reflexive and relayed candidates MUST be kept alive until ICE processing completes. For server-reflexive candidates learned via Binding requests, bindings MUST be refreshed by additional Binding requests; relayed candidates are refreshed using the TURN Refresh transaction.
section: 5.1.1.4
rfc2119_level: MUST
