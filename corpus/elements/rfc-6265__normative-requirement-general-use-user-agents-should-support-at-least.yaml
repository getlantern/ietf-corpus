document: rfc-6265
kind: normative-requirement
summary: General-use user agents SHOULD support at least 4096 bytes per cookie (name + value + attributes combined), at least 50 cookies per domain, and at least 3000 cookies total. Servers SHOULD use as few and as small cookies as possible.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - http
