document: rfc-8414
kind: normative-requirement
summary: Authorization servers supporting metadata MUST make a JSON document available at a path formed by inserting the well-known URI string '/.well-known/oauth-authorization-server' into the issuer identifier between the host component and the path component. This path MUST use the 'https' scheme.
section: "3"
rfc2119_level: MUST
topics:
    - oauth
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
