document: rfc-8665
kind: wire-format
summary: The SID/Label Range TLV (Type 9) contains a 3-octet Range Size field (number of SIDs in the range, MUST be > 0) followed by sub-TLVs; the mandatory SID/Label Sub-TLV identifies the first SID/label in the range. Multiple instances MAY be advertised for multiple ranges.
section: "3.2"
topics:
    - routing
    - mpls
