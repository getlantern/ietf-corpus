document: rfc-9658
kind: design-rationale
summary: The {MT-ID, IPA} tuple is encoded as part of the mLDP FEC rather than as a separate signaling mechanism. This ensures that different MT-ID and IPA values result in unique MP-LSP FEC elements, avoiding conflicting MTR policies for the same mLDP FEC.
section: "3"
topics:
