document: rfc-5482
kind: security-consideration
summary: 'Mitigations for resource exhaustion via long UTOs include: requiring prior peer authentication (IPsec, TCP-MD5/TCP-AO, or in-band TLS); per-peer limits on the number of high-UTO connections; and dynamically reducing accepted user timeouts as system resource utilization increases.'
