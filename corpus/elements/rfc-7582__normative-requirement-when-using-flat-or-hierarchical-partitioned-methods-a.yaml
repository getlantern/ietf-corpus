document: rfc-7582
kind: normative-requirement
summary: When using Flat or Hierarchical Partitioned Methods, a C-BIDIR flow MUST be carried only on an I-PMSI or on a (C-*,C-G-BIDIR), (C-*,C-*-BIDIR), or (C-*,C-*) S-PMSI. A PE MUST NOT originate (C-S,C-G-BIDIR) S-PMSI A-D routes, and C-BIDIR packets MUST NOT be carried on (C-S,C-*) S-PMSIs.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
