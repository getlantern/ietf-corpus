document: rfc-8618
kind: design-rationale
summary: CBOR was chosen as the encoding format because it is a binary IETF specification that is economical in storage, simple enough to implement from scratch, easily converted to JSON for debugging, and supports schema description via CDDL. No other binary format investigated had a significant advantage over CBOR.
