document: rfc-4235
kind: protocol-element
summary: 'The ''local'' and ''remote'' participant elements each contain optional sub-elements: identity (URI with optional display name), target (Contact URI with param sub-elements for feature tags), session-description (MIME-typed SDP), and cseq. If no identity or target element appears in a notification, the subscriber assumes it is unchanged from the previous notification.'
section: 4.1.6
topics:
