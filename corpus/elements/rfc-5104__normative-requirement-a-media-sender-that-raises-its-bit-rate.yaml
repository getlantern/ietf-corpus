document: rfc-5104
kind: normative-requirement
summary: A media sender that raises its bit rate after issuing a TMMBN must delay increases by at least 2×RTT plus the AVPF-calculated minimum TMMBR wait time, to allow other participants to report lower limits before the sender actually increases throughput.
section: 3.5.4
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
