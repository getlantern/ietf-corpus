document: rfc-9559
kind: wire-format
summary: 'Block lacing packs multiple frames into one Block using four modes: no lacing (single frame), Xiph lacing (Xiph-encoded frame sizes), EBML lacing (EBML-encoded sizes with delta encoding after the first), and fixed-size lacing (all frames equal, no per-frame size field).'
section: "10.3"
