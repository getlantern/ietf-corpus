document: rfc-3931
kind: wire-format
summary: 'The Default L2-Specific Sublayer is a 32-bit field containing: 1-bit S (Sequence) flag, 7 reserved bits, and a 24-bit Sequence Number. The S bit MUST be 1 when the sequence number is valid; if S is 0, the Sequence Number contents MUST be ignored.'
section: "4.6"
