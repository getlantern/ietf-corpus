document: rfc-8595
kind: design-rationale
summary: This document provides a mechanism to represent NSH semantics in MPLS label stacks for brownfield networks where NSH is not ubiquitously deployed. It does not deprecate or replace the NSH but acknowledges the need for interim SFC deployment in existing MPLS infrastructure.
