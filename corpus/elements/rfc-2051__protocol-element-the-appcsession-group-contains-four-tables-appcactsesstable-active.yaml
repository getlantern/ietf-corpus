document: rfc-2051
kind: protocol-element
summary: 'The appcSession group contains four tables: appcActSessTable (active sessions with PCID and pacing counts), appcSessStatsTable (byte and RU send/receive counters, present only when stats collection is active), appcHistSessTable (abnormally terminated sessions with unbind type and sense data), and appcSessRtpTable (sessions transported by APPN High Performance Routing, with NCEID and TCID).'
