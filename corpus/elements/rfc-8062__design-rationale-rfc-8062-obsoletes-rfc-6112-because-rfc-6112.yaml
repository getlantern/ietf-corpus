document: rfc-8062
kind: design-rationale
summary: RFC 8062 obsoletes RFC 6112 because RFC 6112 contained errors—most notably, the pepper2 string was incorrectly cased as 'KeyExchange' rather than 'KEYEXCHANGE', making the protocol non-interoperable with all known implementations. The requirement to use the anonymous KDC option when an anonymous ticket is used in a TGS request was also reduced from MUST to SHOULD.
section: "1.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
