document: rfc-5723
kind: state-machine
summary: 'Session resumption proceeds through three states: (1) IKE_SESSION_RESUME exchange where the client presents the ticket and both peers derive crypto material; (2) IKE_AUTH exchange where peers authenticate using prf(SK_px, message octets) and IDi/IDr are verified against the ticket; (3) completion where a new IKE SA and Child SA are established.'
section: "4.3"
