document: rfc-9876
kind: normative-requirement
summary: For the 256-9999 range, all assignments under 'IETF Review with Expert Review' require both IETF Review per BCP26 Section 4.8 and Expert Review per BCP26 Section 4.5; the early IANA allocation procedure of RFC 7120 also applies, and IANA must ask designated experts to approve early allocations before registration.
section: "4.1"
rfc2119_level: MUST
topics:
    - registry
