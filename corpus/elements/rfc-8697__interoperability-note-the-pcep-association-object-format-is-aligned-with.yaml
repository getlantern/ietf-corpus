document: rfc-8697
kind: interoperability-note
summary: The PCEP ASSOCIATION object format is aligned with the RSVP ASSOCIATION object defined in RFC 6780, and Association Types related to RSVP associations are defined in RFC 4872, RFC 4873, and RFC 7551. PCEP extensions defining new Association Types should clarify how PCEP and RSVP associations interact.
section: "6.2"
topics:
