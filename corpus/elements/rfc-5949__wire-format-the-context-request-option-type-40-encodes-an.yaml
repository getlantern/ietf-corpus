document: rfc-5949
kind: wire-format
summary: The Context Request Option (type 40) encodes an ordered list of (Req-type-n, Req-length-n, Req-option-n) tuples. When Req-length-n is zero, no additional qualifier data follows; otherwise, the qualifier (e.g., Vendor-ID and Sub-Type for vendor-specific options) immediately follows Req-length-n.
section: 6.2.1
topics:
