document: rfc-7866
kind: protocol-element
summary: Persistent recording allows an RS to be established in the absence of a CS, with the SRC continuously sending media and updating metadata as new CSs are created. When no CS is active, the SRC and SRS SHOULD follow RFC 6263 keepalive procedures to maintain NAT bindings on the allocated RTP/RTCP ports.
section: "10"
topics:
    - rtp
    - realtime
    - nat
