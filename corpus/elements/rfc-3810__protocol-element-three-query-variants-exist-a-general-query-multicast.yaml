document: rfc-3810
kind: protocol-element
summary: 'Three Query variants exist: a General Query (Multicast Address field = 0, N = 0) sent to FF02::1 to discover all multicast listeners; a Multicast Address Specific Query (specific address, N = 0); and a Multicast Address and Source Specific Query (specific address, N > 0 source addresses), both sent to the queried multicast address.'
section: 5.1.13
topics:
