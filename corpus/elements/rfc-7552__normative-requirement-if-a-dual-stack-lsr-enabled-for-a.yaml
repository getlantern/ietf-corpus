document: rfc-7552
kind: normative-requirement
summary: If a Dual-stack LSR enabled for a peer does not find the Dual-Stack capability TLV in incoming IPv4 LDP Hello messages, it MUST NOT advertise its local IPv6 addresses or IPv6 FEC-label bindings to that peer, preventing session disruption on legacy IPv4-only LSRs.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
