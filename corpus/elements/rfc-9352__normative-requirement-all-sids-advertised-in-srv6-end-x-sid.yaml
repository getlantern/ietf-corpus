document: rfc-9352
kind: normative-requirement
summary: All SIDs advertised in SRv6 End.X SID and SRv6 LAN End.X SID sub-TLVs MUST be a subnet of a Locator with matching topology and algorithm advertised by the same node. SIDs that do not meet this requirement MUST be ignored.
section: "8"
rfc2119_level: MUST
topics:
    - routing
    - ip
