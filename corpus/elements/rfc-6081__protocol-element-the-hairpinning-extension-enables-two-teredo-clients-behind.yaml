document: rfc-6081
kind: protocol-element
summary: The Hairpinning Extension enables two Teredo clients behind the same non-hairpinning NAT to communicate by including the sender's local address/port (and optionally UPnP-mapped address/port) in the Alternate Address Trailer of an indirect bubble. The receiver then attempts direct bubbles to all advertised addresses.
section: "3.5"
topics:
    - nat
    - v6ops
