document: rfc-4164
kind: normative-requirement
summary: The static part of the base context to be replicated MUST have been acknowledged by the decompressor using the CRC option, and the base context MUST be valid at replication time. This implies a feedback channel is required; context replication cannot be used without one.
section: 3.3.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
