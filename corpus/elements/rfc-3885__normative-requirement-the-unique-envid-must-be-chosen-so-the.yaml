document: rfc-3885
kind: normative-requirement
summary: The unique-envid MUST be chosen so the same ENVID is never used by any other message from any system. Any resubmission of a message into the transmission system MUST assign a new ENVID.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
