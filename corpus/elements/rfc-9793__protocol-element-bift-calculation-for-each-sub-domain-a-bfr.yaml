document: rfc-9793
kind: protocol-element
summary: 'BIFT calculation: for each sub-domain, a BFR creates BIFT entries by iterating BIER prefixes with a matching BIER TLV. The BFR-NBR is taken from the BIER Nexthop sub-TLV (in the encapsulation sub-TLV, then the top-level BIER TLV, or defaults to the BIER prefix itself). The BIER label or BIFT-id is derived from the encapsulation sub-TLV''s range.'
section: "5"
