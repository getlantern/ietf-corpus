document: rfc-7482
kind: design-rationale
summary: The bootstrap registry (RFC 7484) does not contain information for query objects outside a global namespace (such as entities and help), because a base URL for an associated service is required to construct a meaningful query for these objects. Clients must derive the base URL from a related service lookup.
section: "3"
topics:
