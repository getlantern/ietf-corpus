document: rfc-6425
kind: normative-requirement
summary: For P2MP LSP ping and traceroute, the responding LSR MUST determine whether it is part of the P2MP LSP in question by checking with the control plane, then apply the appropriate reply rules based on presence of a P2MP Responder Identifier TLV.
section: "4.2"
rfc2119_level: MUST
topics:
