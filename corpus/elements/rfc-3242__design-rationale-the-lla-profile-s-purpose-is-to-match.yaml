document: rfc-3242
kind: design-rationale
summary: The LLA profile's purpose is to match specific existing applications (e.g., speech vocoders) to specific existing link technologies (e.g., GERAN, CDMA2000) with minimal spectral efficiency loss—not to improve overall compression efficiency. Its additional complexity is justified only for these targeted use cases.
