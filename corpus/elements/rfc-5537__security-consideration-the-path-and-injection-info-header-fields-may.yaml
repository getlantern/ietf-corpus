document: rfc-5537
kind: security-consideration
summary: The Path and Injection-Info header fields may expose internal network topology, IP addresses of dialup or internal hosts, and server configurations to all readers of an article. Injecting agents should carefully consider what trace information they disclose.
section: "6.3"
topics:
