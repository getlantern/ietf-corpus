document: rfc-3518
kind: protocol-element
summary: The Management-Inline configuration option (Type=9, Length=2) indicates willingness to receive IEEE-defined inter-bridge protocols (BPDUs, GARP PDUs) in the standard frame format. Its rejection signals an old RFC 1638-compatible peer, requiring fallback to the old Spanning-Tree-Protocol option.
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
