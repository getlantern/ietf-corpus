document: rfc-9820
kind: normative-requirement
summary: On EAP authentication failure (EAP Failure sent in Step 7), the EAP peer MUST send a '4.01 Unauthorized' response in Step 8. Steps 7 and 8 are unprotected in this case because no MSK is exported and no OSCORE context is established.
section: 3.5.1
rfc2119_level: MUST
topics:
    - security
