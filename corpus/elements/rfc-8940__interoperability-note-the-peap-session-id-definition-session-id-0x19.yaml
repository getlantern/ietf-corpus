document: rfc-8940
kind: interoperability-note
summary: The PEAP Session-Id definition (Session-Id = 0x19 || client.random || server.random) only applies when TLS 1.2 or earlier is used. A different derivation is defined for TLS 1.3 in draft-ietf-emu-tls-eap-types.
