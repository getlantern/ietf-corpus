document: rfc-7858
kind: design-rationale
summary: Alternative ports for DNS over TLS MUST NOT be port 53, specifically to avoid complication in selecting use or non-use of TLS and to reduce the risk of downgrade attacks. Using port 853 as the well-known dedicated port clearly signals TLS intent.
section: "3.1"
topics:
    - dns
    - tls
    - security
