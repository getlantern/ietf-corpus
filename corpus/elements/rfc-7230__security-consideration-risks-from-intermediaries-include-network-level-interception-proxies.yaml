document: rfc-7230
kind: security-consideration
summary: Risks from intermediaries include network-level interception proxies that violate HTTP semantics and act indistinguishably from man-in-the-middle attacks, introducing security flaws or interoperability problems. Interception proxies differ from HTTP proxies in not being selected by the client.
section: "9.2"
topics:
