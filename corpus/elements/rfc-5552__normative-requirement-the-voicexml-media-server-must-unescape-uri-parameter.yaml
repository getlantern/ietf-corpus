document: rfc-5552
kind: normative-requirement
summary: The VoiceXML Media Server MUST unescape URI parameter values exactly once before using them or exposing them to VoiceXML applications. Double-unescaping would corrupt values that are themselves URL-encoded (e.g., a VoiceXML URI that contains encoded characters).
section: "2.1"
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
