document: rfc-8076
kind: normative-requirement
summary: A storing peer MUST perform the ACL access validation procedure on any incoming store request for every Kind that uses the USER-CHAIN-ACL policy, and SHALL ensure that only the Resource Owner stores new ACL root items for Shared Resources.
section: "6.4"
rfc2119_level: MUST
