document: rfc-3220
kind: security-consideration
summary: Mobile IP does not itself provide payload encryption; datagrams routed to/from a mobile node may be intercepted or analyzed, exposing location information and traffic patterns. IPsec or other mechanisms must be applied separately if confidentiality is required.
section: "5.5"
topics:
    - mobility
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
