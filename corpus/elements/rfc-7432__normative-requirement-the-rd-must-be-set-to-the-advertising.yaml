document: rfc-7432
kind: normative-requirement
summary: The RD MUST be set to the advertising MAC-VRF's RD, MUST be unique across all MAC-VRFs on a PE, and it is RECOMMENDED to use Type 1 RD comprising the PE's IP address (typically loopback) followed by a PE-unique number.
section: "7.9"
rfc2119_level: MUST
topics:
