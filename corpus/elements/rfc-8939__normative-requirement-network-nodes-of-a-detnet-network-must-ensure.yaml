document: rfc-8939
kind: normative-requirement
summary: Network nodes of a DetNet network MUST ensure that no DetNet-allocated resource (e.g., queue or shaper) is used by flows associated with an incomplete reservation. Methods include treating such packets as non-DetNet, discarding them, or re-marking the DSCP field.
section: 4.3.2
rfc2119_level: MUST
topics:
    - ip
    - qos
    - congestion
