kind: protocol-element
summary: 'The expValueTable, indexed by expExpressionOwner, expExpressionName, and IMPLIED expValueInstance (an OID fragment prefixed with 0.0), holds a discriminated union of result types: Counter32, Unsigned32, TimeTicks, Integer32, IpAddress, OCTET STRING, OBJECT IDENTIFIER, and Counter64. Only one column per row is instantiated based on expExpressionValueType.'
