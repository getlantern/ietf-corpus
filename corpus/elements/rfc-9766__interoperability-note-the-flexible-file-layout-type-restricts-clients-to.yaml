document: rfc-9766
kind: interoperability-note
summary: The flexible file layout type restricts clients to only three NFSv3 operations on data server filehandles (READ, WRITE, COMMIT), while the metadata server may use CREATE, GETATTR, and SETATTR on the data server to manage metadata; LAYOUT_WCC allows the client to proxy WCC data from these operations back to the MDS.
section: "2"
extracted_by: claude-sonnet-4-6
