document: rfc-9651
kind: protocol-element
summary: Strings consist of zero or more printable ASCII characters (range %x20 to %x7E) delimited by double quotes, with backslash escaping for '"' and '\'. Non-ASCII characters are not supported; use Display Strings for Unicode content. Parsers MUST support at least 1024 characters after decoding.
section: 3.3.3
topics:
