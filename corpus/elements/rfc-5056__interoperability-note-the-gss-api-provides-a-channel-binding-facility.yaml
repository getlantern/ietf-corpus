document: rfc-5056
kind: interoperability-note
summary: The GSS-API provides a channel binding facility during security context initialization, but GSS-API mechanisms are not required to support it. GSS-API mechanisms must fail security context establishment when channel binding fails, and the GSS-API provides no negotiation mechanism for channel binding; applications must agree a priori on its use.
section: "3.1"
topics:
    - security
    - crypto
