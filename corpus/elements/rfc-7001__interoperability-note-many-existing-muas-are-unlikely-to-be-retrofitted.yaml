document: rfc-7001
kind: interoperability-note
summary: Many existing MUAs are unlikely to be retrofitted to consume Authentication-Results. Delivery MTAs may wish to add complementary signals understood by legacy MUAs (e.g., a Priority header field reflecting authentication strength) alongside the Authentication-Results header field to aid adoption during the transition period.
section: B
