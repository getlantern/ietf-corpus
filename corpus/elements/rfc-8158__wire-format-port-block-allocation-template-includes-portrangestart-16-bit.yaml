summary: Port Block Allocation template includes portRangeStart (16-bit, IPFIX ID 361) and portRangeEnd (16-bit, IPFIX ID 362) to represent the allocated block. sourceIPv4Address (32-bit) is mandatory for NAT44; sourceIPv6Address (128-bit) is mandatory for NAT64.
