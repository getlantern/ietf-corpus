document: rfc-6570
kind: security-consideration
summary: In client-side implementations, care ought to be taken to ensure that potentially dangerous URI reference strings such as those beginning with "javascript:" do not appear in the expansion unless both the template and the values are provided by a trusted source. URI Templates in this context have properties similar to HTML forms.
