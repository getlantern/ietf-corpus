document: rfc-9475
kind: security-consideration
summary: This specification inherits the security considerations of RFC 8224 (authenticated SIP identity) and RFC 3428 (SIP MESSAGE), expanded in RFC 8591. Replay attacks on store-and-forward messages are largely mitigated by the PASSporT timestamp.
