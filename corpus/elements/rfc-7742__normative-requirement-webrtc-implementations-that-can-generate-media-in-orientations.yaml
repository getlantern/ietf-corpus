document: rfc-7742
kind: normative-requirement
summary: WebRTC implementations that can generate media in orientations other than the default MUST support generating the R0 and R1 bits of the Coordination of Video Orientation (CVO) mechanism and MUST send them for all orientations when the peer indicates support.
