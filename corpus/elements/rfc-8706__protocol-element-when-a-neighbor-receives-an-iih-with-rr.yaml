document: rfc-8706
kind: protocol-element
summary: 'When a neighbor receives an IIH with RR set and has an existing UP adjacency to that system, it: (a) preserves adjacency state and marks it ''Restart mode'' on first receipt; (b) immediately transmits an IIH with RA set and Remaining Time set to the actual remaining holding time; (c) if on P2P or highest-priority router on LAN, sends a complete CSNP set and sets SRMflags for all LSPs.'
section: 3.2.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
