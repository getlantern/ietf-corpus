document: rfc-5627
kind: normative-requirement
summary: The contact URI in a REGISTER request MUST NOT be equivalent (based on RFC 3261 URI equality rules) to the AOR in the To header field, and if the contact URI is a GRUU, it MUST NOT be a GRUU for that AOR, to prevent routing loops.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
