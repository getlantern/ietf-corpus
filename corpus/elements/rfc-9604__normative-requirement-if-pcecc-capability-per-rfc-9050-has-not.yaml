document: rfc-9604
kind: normative-requirement
summary: If PCECC capability per RFC 9050 has not been mutually advertised and a peer receives P=1 in the LSP object, it MUST send PCErr with Error-Type=19, Error-value=16 ('Attempted PCECC operations when PCECC capability was not advertised') and terminate the PCEP session.
section: "8"
rfc2119_level: MUST
topics:
    - routing
