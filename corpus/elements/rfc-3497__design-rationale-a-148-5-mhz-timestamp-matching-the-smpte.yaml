document: rfc-3497
kind: design-rationale
summary: A 148.5 MHz timestamp (matching the SMPTE 292M word clock) was chosen so that receivers can reconstruct stream timing without needing to know the specific source format. This provides a unique timestamp per 10-bit word and is format-agnostic across SMPTE 260M, 274M, 295M, and 296M sources.
