document: rfc-9200
kind: design-rationale
summary: CBOR replaces JSON and CWT replaces JWT because IoT devices are constrained in processing, memory, and bandwidth. CBOR's binary encoding produces significantly smaller messages and requires less processing than text-based JSON, making it suitable for low-power and low-bandwidth devices.
