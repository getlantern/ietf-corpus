document: rfc-5332
kind: normative-requirement
summary: When transmitting a multicast MPLS packet in a multicast ethernet frame, an LSR MUST set the MAC Destination Address to 01-00-5e-8v-wx-yz, where vwxyz is a 20-bit value set to either 0 or the value of one of the MPLS labels on the packet's label stack.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
