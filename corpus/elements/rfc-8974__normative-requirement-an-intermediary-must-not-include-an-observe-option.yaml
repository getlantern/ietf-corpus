document: rfc-8974
kind: normative-requirement
summary: An intermediary MUST NOT include an Observe Option in requests it sends unless it keeps both per-request state for its outgoing requests and client information for the incoming requests, because aggregating observations is required by RFC 7641 and impossible without state.
section: "4.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
