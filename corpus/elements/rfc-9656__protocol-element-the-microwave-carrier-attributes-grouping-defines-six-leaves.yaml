document: rfc-9656
kind: protocol-element
summary: 'The microwave-carrier-attributes grouping defines six leaves for a carrier link: tx-frequency (uint32, kHz, configurable), actual-rx-frequency (uint32, kHz, read-only), channel-separation (uint32, kHz, configurable), actual-tx-cm (identityref to mw-types:coding-modulation, read-only), actual-snir (decimal64 in dB with 0.1 resolution, read-only), and actual-transmitted-level (decimal64 in dBm with 0.1 resolution, read-only).'
section: "2.5"
topics:
