document: rfc-2327
kind: interoperability-note
summary: For email and WWW distribution of SDP session descriptions, the MIME content type 'application/sdp' should be used to enable automatic launching of multimedia client applications. SAP announcements do not suffer the scoping mismatch that email/WWW announcements have for restricted-scope multicast sessions.
section: "4.2"
topics:
    - realtime
    - email
    - http
