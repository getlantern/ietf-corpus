document: rfc-5648
kind: normative-requirement
summary: After receiving a Binding Update with a Binding Identifier mobility option, the home agent MUST copy the BID to the corresponding binding cache entry. If the BID does not match any existing entry, the home agent MUST create a new binding cache entry for the new care-of address and BID.
section: "3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
