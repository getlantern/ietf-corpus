document: rfc-9865
kind: design-rationale
summary: A service provider MAY require cursor-based pagination to retrieve all results even when the client did not include the cursor parameter, by including a nextCursor in the response to an unpaginated query. This allows service providers to enforce pagination on large result sets regardless of client intent.
section: "2.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
