document: rfc-7428
kind: normative-requirement
summary: When a CID is obsoleted (lifetime set to zero), the CID MUST NOT be reused immediately; the next vacant CID should be assigned instead. Header compression based on CIDs MUST NOT be used for RA messages carrying context information.
section: 4.4.2.2
rfc2119_level: MUST NOT
topics:
    - ip
