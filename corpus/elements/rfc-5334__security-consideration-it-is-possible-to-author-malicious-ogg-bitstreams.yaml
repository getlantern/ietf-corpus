document: rfc-5334
kind: security-consideration
summary: It is possible to author malicious Ogg bitstreams that request excessively large picture sizes or high sampling-rate audio. Implementations SHOULD protect themselves against this kind of resource exhaustion attack.
section: "7"
rfc2119_level: SHOULD
