document: rfc-3011
kind: normative-requirement
summary: In all DHCP packets that contain the subnet selection option, the giaddr field in the BOOTP header MUST be set to an IPv4 address on which the DHCP client will accept DHCP packets (e.g., the address on the internal network subnet).
section: "2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
