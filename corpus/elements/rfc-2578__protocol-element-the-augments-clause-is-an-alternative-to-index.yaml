document: rfc-2578
kind: protocol-element
summary: The AUGMENTS clause is an alternative to INDEX for conceptual rows with a strict one-to-one correspondence to a base row. An augmentation row cannot itself be augmented, and creation of the base row implies creation of all its augmentations.
