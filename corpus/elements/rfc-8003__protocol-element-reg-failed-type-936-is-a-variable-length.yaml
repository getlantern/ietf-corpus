document: rfc-8003
kind: protocol-element
summary: REG_FAILED (Type 936) is a variable-length HIP parameter sent by the registrar in R2 or UPDATE packets to communicate which registration types failed and the reason, encoded as an 8-bit Failure Type field followed by the affected registration type identifiers.
