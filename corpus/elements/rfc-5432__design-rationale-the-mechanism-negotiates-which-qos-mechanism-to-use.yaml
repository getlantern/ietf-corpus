document: rfc-5432
kind: design-rationale
summary: The mechanism negotiates which QoS mechanism to use at the endpoint level but explicitly does not address whether the network supports that mechanism; discovering network-layer QoS support is out of scope. This scoping keeps the protocol focused on endpoint agreement and debugging misconfiguration.
section: "1"
topics:
