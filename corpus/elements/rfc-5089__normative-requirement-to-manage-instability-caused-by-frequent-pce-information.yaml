document: rfc-5089
kind: normative-requirement
summary: To manage instability caused by frequent PCE information changes, it MUST be possible to apply configurable rate limits on announcement of changed parameters at a PCE, rate-limiting of PCED sub-TLV processing at PCCs, and configurable control of triggers that cause a PCC to swap to another PCE.
section: "9.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
