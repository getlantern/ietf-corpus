document: rfc-3041
kind: security-consideration
summary: 'The document does not introduce security issues beyond those already associated with stateless address autoconfiguration. The motivation is entirely privacy-driven: preventing correlation of a node''s activities across time and topological locations by ensuring IP addresses in packet headers do not reveal a persistent, globally unique identifier.'
