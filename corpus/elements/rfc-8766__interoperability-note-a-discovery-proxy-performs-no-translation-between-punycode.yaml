document: rfc-8766
kind: interoperability-note
summary: A Discovery Proxy performs no translation between Punycode encoding and UTF-8 encoding, in either owner names or RDATA. All bytes are treated as-is. DNS-SD clients use UTF-8 for unicast queries, which the proxy passes through without modification.
section: 5.5.4
topics:
    - dns
    - zeroconf
