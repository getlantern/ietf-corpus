document: rfc-3986
kind: protocol-element
summary: 'The query component is indicated by the first "?" character and terminated by "#" or end of URI: query = *( pchar / "/" / "?" ). The query carries non-hierarchical identifying data alongside the path. The characters "/" and "?" may represent data within the query.'
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
