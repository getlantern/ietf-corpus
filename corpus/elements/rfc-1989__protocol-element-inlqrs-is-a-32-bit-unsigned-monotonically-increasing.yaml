document: rfc-1989
kind: protocol-element
summary: InLQRs is a 32-bit unsigned monotonically increasing counter incremented by one for each received LQR packet. It MUST be set to zero when LCP enters Establishment phase and MUST NOT be reset until LCP leaves Termination phase.
section: "2.2"
rfc2119_level: MUST
