document: rfc-8798
kind: normative-requirement
summary: Where the benefits of directly using a secondary unit in a SenML pack outweigh the above considerations, the use of secondary units in 'u' fields MAY be enabled by indicating a new SenML version that specifically allows this and/or by using a must-understand field (label ending in '_') whose definition specifically allows this.
section: "3"
rfc2119_level: MAY
