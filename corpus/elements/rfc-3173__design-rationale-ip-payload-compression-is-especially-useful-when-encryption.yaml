document: rfc-3173
kind: design-rationale
summary: IP payload compression is especially useful when encryption is applied, because encryption renders compression at lower protocol layers (e.g., PPP CCP) ineffective. If both compression and encryption are required, compression must be applied before encryption.
section: "1"
topics:
