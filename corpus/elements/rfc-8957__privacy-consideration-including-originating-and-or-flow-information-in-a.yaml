document: rfc-8957
kind: privacy-consideration
summary: Including originating and/or flow information in a packet via SFLs provides additional identity information, potentially degrading communication privacy for an attacker able to observe the identifier. Mitigations include encrypting control protocol packets, regularly rotating synonymous labels, or concurrently using multiple such labels.
section: "6"
topics:
    - mpls
    - privacy
