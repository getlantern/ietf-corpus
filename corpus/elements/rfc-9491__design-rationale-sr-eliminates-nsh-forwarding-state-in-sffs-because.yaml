document: rfc-9491
kind: design-rationale
summary: SR eliminates NSH forwarding state in SFFs because the SR segment list encodes the full service path, removing the need for per-SFP state on intermediate SFFs. This applies when strict or loose SFPs are in use and simplifies SFF operation.
