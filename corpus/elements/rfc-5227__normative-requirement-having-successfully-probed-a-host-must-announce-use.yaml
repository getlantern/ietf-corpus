document: rfc-5227
kind: normative-requirement
summary: Having successfully probed, a host MUST announce use of the address by broadcasting ANNOUNCE_NUM ARP Announcements spaced ANNOUNCE_INTERVAL seconds apart. The host may begin using the address immediately after sending the first announcement.
