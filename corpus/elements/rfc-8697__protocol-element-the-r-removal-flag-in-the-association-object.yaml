document: rfc-8697
kind: protocol-element
summary: The R (Removal) flag in the ASSOCIATION object Flags field, when set, requests removal of an LSP from the association group. It is applicable in PCRpt and PCUpd messages and is ignored in other PCEP messages. The special Association ID value 0xffff can be combined with R=1 to remove an LSP from all associations within the scope of a given Association Type and Association Source.
section: "6.1"
topics:
    - routing
    - mpls
