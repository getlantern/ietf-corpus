document: rfc-9847
kind: design-rationale
summary: The 'D' (discouraged) value was introduced to allow IANA registries to actively signal that an algorithm or mechanism is problematic — such as a weak cipher or an interoperability hazard — without removing it. The 'N' value only means 'not evaluated', not 'avoid', so a third value was needed to distinguish actively discouraged items.
section: "3"
