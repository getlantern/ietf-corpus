document: rfc-2444
kind: interoperability-note
summary: If a client encounters an unknown hash algorithm name in the server challenge, it may prompt for the six-word format, issue the SASL cancel sequence and try a different mechanism, or close the connection. A server is consequently restricted to one OTP hash algorithm per user.
