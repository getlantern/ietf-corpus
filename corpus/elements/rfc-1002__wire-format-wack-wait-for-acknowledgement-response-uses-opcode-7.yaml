document: rfc-1002
kind: wire-format
summary: WACK (Wait for Acknowledgement) response uses OPCODE=7; TTL field holds the new time-to-wait in seconds. RDATA (2 bytes) contains the OPCODE and NM_FLAGS from the original request. A TTL of 0 means the NBNS cannot estimate the completion time.
section: 4.2.16
extracted_by: claude-sonnet-4-6
