document: rfc-4388
kind: normative-requirement
summary: The client-last-transaction-time option MUST NOT be an absolute time and MUST NOT be seconds since January 1, 1970; it MUST be an integer number of seconds into the past from when the DHCPLEASEACTIVE message is sent.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
