document: rfc-2933
kind: protocol-element
summary: igmpInterfaceWrongVersionQueries (Counter32) counts queries received whose IGMP version does not match igmpInterfaceVersion over the lifetime of the row. A non-zero value indicates a configuration error since all routers on a LAN must run the same IGMP version.
section: "4"
topics:
