document: rfc-8045
kind: wire-format
summary: IP-Port-Limit TLV (TLV-Type 2, Length 6 octets) carries IPFIX Information Element 458 (sourceTransportPortsLimit) as unsigned16 right-justified in 32 bits. It MUST be present in IP-Port-Limit-Info (identifier 241.5.2) and encodes the maximum port count for the user.
section: 3.2.2
