document: rfc-6638
kind: normative-requirement
summary: 'Servers MUST allow Attendees to make exactly eleven categories of iCalendar changes including: their own PARTSTAT, TRANSP, PERCENT-COMPLETE, COMPLETED, VALARM, CALSCALE, PRODID, EXDATE (removing instances), DTSTAMP/CREATED/LAST-MODIFIED, SCHEDULE-STATUS on CLIENT-agent attendees, and adding overridden recurrence components. All other modifications MUST be rejected with CALDAV:allowed-attendee-scheduling-object-change (403).'
section: 3.2.2.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
