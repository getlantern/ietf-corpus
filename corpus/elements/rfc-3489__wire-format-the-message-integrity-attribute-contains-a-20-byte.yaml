document: rfc-3489
kind: wire-format
summary: The MESSAGE-INTEGRITY attribute contains a 20-byte HMAC-SHA1 computed over the STUN message (including header) up to but not including the MESSAGE-INTEGRITY attribute itself, zero-padded to a multiple of 64 bytes; it MUST be the last attribute in any message.
section: 11.2.8
topics:
