document: rfc-3267
kind: normative-requirement
summary: The frame CRC MUST be calculated only over all class A bits of the frame; class B and C bits MUST NOT be included in the CRC calculation and SHOULD NOT be covered by the transport-layer checksum.
section: 4.4.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
