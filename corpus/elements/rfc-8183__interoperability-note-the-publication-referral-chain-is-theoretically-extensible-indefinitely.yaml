document: rfc-8183
kind: interoperability-note
summary: The publication referral chain is theoretically extensible indefinitely (a child can refer its own child to an ancestor's repository), but this has not been implemented or tested. The protocol deliberately ignores perverse cases such as restricting re-referral.
