document: rfc-857
kind: normative-requirement
summary: When the echoing option is in effect, the echoing party MUST transmit (echo) data characters it receives back to the sender. The echoed characters need not be identical to what was received (e.g., ESC may be echoed differently).
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
