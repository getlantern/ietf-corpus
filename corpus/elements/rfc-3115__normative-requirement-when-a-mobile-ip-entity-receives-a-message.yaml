document: rfc-3115
kind: normative-requirement
summary: When a Mobile IP entity receives a message with an unrecognized NVSE extension (unknown Vendor-ID or Vendor-NVSE-Type), the entire NVSE extension is skipped, but the rest of the extensions and message data MUST still be processed.
section: "2.3"
rfc2119_level: MUST
topics:
    - mobility
