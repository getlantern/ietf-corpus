document: rfc-6512
kind: wire-format
summary: The Recursive Opaque Value is a basic type identified by Type=7 (1-octet), followed by a 2-octet Length field, and a value field that is itself a complete P2MP or MP2MP FEC element (type, length, value) as defined in mLDP. The length includes the type, length, and value fields of the embedded FEC element.
section: "2.1"
