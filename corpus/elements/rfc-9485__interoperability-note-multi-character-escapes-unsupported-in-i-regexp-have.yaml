document: rfc-9485
kind: interoperability-note
summary: 'Multi-character escapes unsupported in I-Regexp have direct substitutes: \S → [^ \t\n\r], \d → [0-9], and \p{IsBasicLatin} → [\u0000-\u007f]. Note that XSD''s \d means \p{Nd} (all Unicode digits), not just [0-9].'
section: "5.1"
topics:
