document: rfc-9350
kind: normative-requirement
summary: 'If a node is configured to participate in a Flex-Algorithm but there is no valid FAD, or the winning FAD includes an unsupported calculation-type, metric-type, constraint, flag, or sub-TLV, it MUST stop participating: it MUST NOT announce participation and MUST remove any forwarding state associated with that Flex-Algorithm.'
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
