document: rfc-8004
kind: normative-requirement
summary: An RVS MUST add a FROM parameter when it rewrites the source IP address. If one or more FROM parameters are already present, the new FROM parameter MUST be appended after the existing ones, and an RVS_HMAC MUST be inserted to protect the packet.
section: 4.2.2
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
