document: rfc-4412
kind: interoperability-note
summary: 'The mechanism is fully backwards compatible with RFC 3261 implementations: UASes and proxies that do not understand Resource-Priority will ignore it per RFC 3261 Section 8.2.2 and deliver standard (non-elevated) service priority. The mechanism is invisible to existing implementations unless Require: resource-priority is included.'
