document: rfc-9959
kind: interoperability-note
summary: QUIC includes flow control and anti-amplification mechanisms that can constrain sending rate independently of CWND. A QUIC receiver may need to issue proactive MAX_DATA frames to increase flow control limits before or during Careful Resume to realise the expected throughput benefit.
section: "4.7"
topics:
    - quic
    - congestion
