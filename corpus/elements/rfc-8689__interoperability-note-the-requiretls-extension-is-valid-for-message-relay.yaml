document: rfc-8689
kind: interoperability-note
summary: The REQUIRETLS extension is valid for message relay (RFC 5321), submission (RFC 6409), and the Local Mail Transfer Protocol (LMTP, RFC 2033). Mail delivery agents supporting REQUIRETLS SHOULD observe RFC 8314 guidelines for end-user retrieval protocols (IMAP, POP).
