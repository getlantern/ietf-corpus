document: rfc-8655
kind: normative-requirement
summary: Filters and policers should be used in a DetNet network to detect if DetNet packets are received on the wrong interface, at the wrong time, or in too great a volume, and can take action to discard offending packets, shut down the offending flow, or shut down the offending interface.
section: 3.3.2
rfc2119_level: SHOULD
topics:
    - routing
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
