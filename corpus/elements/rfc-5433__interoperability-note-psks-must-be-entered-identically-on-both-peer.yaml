document: rfc-5433
kind: interoperability-note
summary: PSKs must be entered identically on both peer and server for interoperability. Validation of ID_Peer and ID_Server is by octet-wise comparison. PSKs must be cryptographically separated from keys used by other protocols, and must not be shared among multiple peers connecting to the same server.
section: "5"
topics:
    - security
