document: rfc-5565
kind: protocol-element
summary: For E-IP multicast over an I-IP core using PIM, an AFBR translates E-IP PIM Join/Prune messages to I-IP and inserts an RPF Vector (RFC 5496) identifying the egress AFBR as an I-IP address, since core routers hold no E-IP routes.
section: 11.1.1
topics:
    - multicast
    - routing
    - ip
