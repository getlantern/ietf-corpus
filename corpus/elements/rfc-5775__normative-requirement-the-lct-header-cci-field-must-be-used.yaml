document: rfc-5775
kind: normative-requirement
summary: The LCT header CCI field MUST be used to carry the Congestion Control Information from the specified multiple rate congestion control protocol. The CCI format and length MUST be consistent across all packets sent to a session.
section: "2.1"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
