summary: IANA assigned protocol identifiers are enumerated under the ianaAssigned base-layer (value 5). The first assigned protocol is ipxOverRaw8023=1, for IPX encapsulated directly in 802.3 without a type field. A centrally maintained list is required for interoperability.
