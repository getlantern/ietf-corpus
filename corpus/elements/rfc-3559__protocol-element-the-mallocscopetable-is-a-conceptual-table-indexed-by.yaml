document: rfc-3559
kind: protocol-element
summary: The mallocScopeTable is a conceptual table indexed by mallocScopeAddressType and mallocScopeFirstAddress. Each row describes a multicast scope with fields for first/last address, hop limit, status (RowStatus), source (IANAscopeSource), divisibility, server address, SSM indicator, and storage type. Ranges for different rows must be disjoint.
