document: rfc-3402
kind: normative-requirement
summary: A Database specification MUST be clear about what allowed character sets exist so that keys and rules can be properly encoded. It must also define the lookup procedure, key format, rule format, rule insertion procedure, and rule collision avoidance mechanisms.
section: "5"
rfc2119_level: MUST
topics:
    - dns
