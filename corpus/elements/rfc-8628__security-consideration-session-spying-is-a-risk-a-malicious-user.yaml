document: rfc-8628
kind: security-consideration
summary: 'Session spying is a risk: a malicious user could observe the displayed user code and complete the authorization before the legitimate user. Devices SHOULD take into account the operating environment when communicating the code to reduce the chance of observation.'
section: "5.5"
rfc2119_level: SHOULD
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
