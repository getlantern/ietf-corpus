summary: 'The fee extension XML namespace is ''urn:ietf:params:xml:ns:epp:fee-1.0''. The currencyType is restricted to exactly three uppercase letters ([A-Z]{3}). The feeType is a nonNegativeDecimal with optional attributes: description (string), lang (language, default ''en''), refundable (boolean), grace-period (duration), and applied (''immediate'' or ''delayed'').'
