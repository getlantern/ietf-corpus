document: rfc-9670
kind: design-rationale
summary: The server MAY limit the maximum number of ShareNotifications stored per user and coalesce multiple changes to the same object into a single notification, because automatic deletion upon reaching a limit can itself be a security issue by hiding sharing changes from the user.
