document: rfc-3987
kind: wire-format
summary: 'The ''ucschar'' production defines the Unicode code point ranges permitted in IRI unreserved characters: %xA0-D7FF, %xF900-FDCF, %xFDF0-FFEF, and the ranges %x10000-1FFFD through %xE1000-EFFFD (successive 0x10000-wide planes). The ''iprivate'' production covers %xE000-F8FF, %xF0000-FFFFD, and %x100000-10FFFD (private-use areas), allowed only in iquery.'
section: "2.2"
topics:
    - ip
