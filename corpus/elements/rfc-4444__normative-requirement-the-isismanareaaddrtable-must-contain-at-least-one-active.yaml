document: rfc-4444
kind: normative-requirement
summary: The isisManAreaAddrTable MUST contain at least one active row at all times. An attempt to create more than 3 active rows, or to destroy the last active row while isisSysAdminState is 'on', MUST return inconsistentValue.
section: "4"
rfc2119_level: MUST
topics:
