document: rfc-8613
kind: normative-requirement
summary: The CoAP Code SHALL be Class E (encrypted and integrity protected) to prevent intermediaries from eavesdropping or changing the method (e.g., GET to DELETE). The Outer Code is set to 0.02 (POST) for requests and 2.04 (Changed) for responses, masking the true method from proxies.
section: "4.2"
rfc2119_level: SHALL
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
