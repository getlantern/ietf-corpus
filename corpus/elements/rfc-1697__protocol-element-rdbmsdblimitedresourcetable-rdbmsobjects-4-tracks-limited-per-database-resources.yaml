document: rfc-1697
kind: protocol-element
summary: rdbmsDbLimitedResourceTable (rdbmsObjects 4) tracks limited per-database resources (e.g., locks, disk space) with fields for current value, maximum limit, highwater mark since applUpTime reset, and failure count. Resources shared across databases should use rdbmsSrvLimitedResourceTable instead.
section: "4"
