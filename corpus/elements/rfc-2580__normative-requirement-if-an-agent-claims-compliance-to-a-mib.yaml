document: rfc-2580
kind: normative-requirement
summary: If an agent claims compliance to a MIB module, it must implement each and every object and notification within each conformance group listed in the MANDATORY-GROUPS clause. Returning noSuchObject for any object in a mandatory group, or failing to generate any listed notification, means the agent is not conformant.
section: 5.4.1
rfc2119_level: MUST
topics:
    - snmp
