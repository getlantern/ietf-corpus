document: rfc-8528
kind: design-rationale
summary: 'Multiple levels of schema mount are explicitly allowed: YANG modules in a mounted schema MAY themselves contain mount points. This is supported by implementing ''ietf-yang-library'' and ''ietf-yang-schema-mount'' within the mounted schema and specifying nested schemas identically to the top-level schema.'
section: "3.4"
topics:
    - yang
    - netconf
