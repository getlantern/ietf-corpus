document: rfc-9348
kind: design-rationale
summary: Rather than defining a standalone IPsec YANG module, this document augments the existing RFC 9061 IPsec YANG modules (ietf-i2nsf-ike and ietf-i2nsf-ikeless). This approach reuses the established IPsec management framework and adds only the small set of IP-TFS-specific parameters, minimizing redundancy.
