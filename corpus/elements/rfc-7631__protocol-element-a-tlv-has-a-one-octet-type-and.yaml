document: rfc-7631
kind: protocol-element
summary: A TLV has a one-octet type and a one-octet type extension that together form a two-octet full type. A TLV may omit the type extension in its representation when it is zero, but conceptually it still has type extension 0. Each TLV type defines an IANA registry of type extensions.
section: "1"
topics:
    - registry
