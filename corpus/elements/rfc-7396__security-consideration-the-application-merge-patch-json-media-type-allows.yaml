document: rfc-7396
kind: security-consideration
summary: The application/merge-patch+json media type allows user agents to indicate their intention for the server to determine the specific set of change operations to apply to a target resource. It is the server's responsibility to determine the appropriateness of any given change and the user agent's authorization to request such changes.
section: "5"
topics:
