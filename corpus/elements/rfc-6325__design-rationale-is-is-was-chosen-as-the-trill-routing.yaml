document: rfc-6325
kind: design-rationale
summary: IS-IS was chosen as the TRILL routing protocol because it runs directly over Layer 2 without requiring IP address configuration, and because it is easily extended by defining new TLV/sub-TLV data elements to carry TRILL-specific information such as nicknames, appointed forwarders, and distribution tree roots.
