document: rfc-6714
kind: security-consideration
summary: It is RECOMMENDED that CEMA-enabled endpoints support self-signed certificates together with the SIP Certificate Management Service (RFC 6072), publishing their own certificate and fetching peers' certificates on demand, as an alternative to relying on PKI availability or SDP signaling integrity.
section: "7.5"
rfc2119_level: RECOMMENDED
