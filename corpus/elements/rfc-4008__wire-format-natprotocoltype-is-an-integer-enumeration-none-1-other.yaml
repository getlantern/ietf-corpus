document: rfc-4008
kind: wire-format
summary: NatProtocolType is an INTEGER enumeration (none=1, other=2, icmp=3, udp=4, tcp=5) used in session and bind entries. NatProtocolMap is a parallel BITS representation (other=0, icmp=1, udp=2, tcp=3) used in address map entries to express a bitmap of applicable protocols.
