document: rfc-2388
kind: security-consideration
summary: The introduction of form-data that can send back file contents from a user's file system creates risk from automated scripts that fill out forms and transmit local files to a remote address. Additional caution is required when executing automated scripting involving multipart/form-data.
section: "6"
topics:
