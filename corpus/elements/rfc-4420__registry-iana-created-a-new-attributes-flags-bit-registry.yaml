document: rfc-4420
kind: registry
summary: 'IANA created a new Attributes Flags bit registry numbering bits from zero through at least 31. Each entry tracks: bit number, defining RFC, bit name, and whether the bit has meaning in the Attributes Flags TLV on Path, on Resv, and in the RRO Attributes Subobject. New bit allocations require IETF Consensus.'
