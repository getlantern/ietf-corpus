document: rfc-4019
kind: protocol-element
summary: CCE(OFF) updates CFP to zero, updates CFI based on whether the Checksum Coverage equals packet length (with packet-length match taking precedence over context match), and updates context(UDP-Lite Checksum Coverage). It is used when the checksum coverage seldom deviates from the compressed pattern.
section: 5.3.2.3
topics:
    - udp
