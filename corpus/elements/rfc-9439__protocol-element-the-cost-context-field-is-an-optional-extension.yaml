document: rfc-9439
kind: protocol-element
summary: The 'cost-context' field is an optional extension to the ALTO 'cost-type' object, containing a 'cost-source' string and optional 'parameters' value. It conveys the source of a performance metric (nominal, sla, or estimation) and cannot be used as a key to distinguish cost metrics within the same information resource.
section: "3.1"
