document: rfc-8667
kind: normative-requirement
summary: When the SR-Algorithm sub-TLV is advertised, algorithm 0 MUST always be present. The SR-Algorithm sub-TLV MUST NOT be advertised more than once at a given level and MUST NOT be flooded across level boundaries (S-Flag MUST be unset).
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
