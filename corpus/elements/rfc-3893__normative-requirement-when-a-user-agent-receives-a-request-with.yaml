document: rfc-3893
kind: normative-requirement
summary: When a user agent receives a request with an AIB, it MUST verify the signature and certificate of the signer, compare the signer's subjectAltName with the domain portion of the From header URI, and MUST report any discrepancy to the user before proceeding.
section: "7"
rfc2119_level: MUST
topics:
