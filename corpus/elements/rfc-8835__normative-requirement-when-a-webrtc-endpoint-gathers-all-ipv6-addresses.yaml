document: rfc-8835
kind: normative-requirement
summary: When a WebRTC endpoint gathers all IPv6 addresses and both nondeprecated temporary addresses and permanent addresses of the same scope are present, it SHOULD discard the permanent addresses before exposing them to the application or using them in ICE.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - webrtc
    - privacy
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
