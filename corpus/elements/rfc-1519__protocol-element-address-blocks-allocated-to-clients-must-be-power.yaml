document: rfc-1519
kind: protocol-element
summary: Address blocks allocated to clients must be power-of-two aligned contiguous ranges, expressible as a single (network, mask) pair. For example, 8 class-C networks starting at 192.24.0.0 are described as 192.24.0.0/255.255.248.0.
section: "5.1"
