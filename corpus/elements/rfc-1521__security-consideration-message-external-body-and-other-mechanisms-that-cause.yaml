document: rfc-1521
kind: security-consideration
summary: Message/External-Body and other mechanisms that cause a mail reader to automatically fetch external content can be exploited to cause unintended network connections or reveal user information to third-party servers. Implementations should alert users before fetching externally-referenced content.
section: "9"
topics:
    - email
    - security
    - privacy
