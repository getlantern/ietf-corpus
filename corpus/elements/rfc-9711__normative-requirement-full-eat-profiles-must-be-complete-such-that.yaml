document: rfc-9711
kind: normative-requirement
summary: Full EAT profiles MUST be complete such that a complying receiver can decode, verify, and check freshness for every EAT created by a complying sender. The 'eat_profile' claim MUST NOT be used to identify partial profiles.
section: "6.2"
rfc2119_level: MUST
topics:
    - security
