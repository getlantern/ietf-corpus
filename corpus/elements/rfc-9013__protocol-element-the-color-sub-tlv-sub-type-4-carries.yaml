document: rfc-9013
kind: protocol-element
summary: The Color Sub-TLV (sub-type 4) carries a 4-octet opaque unsigned integer that is user-defined and locally configured. It may appear zero or more times in a Tunnel Sub-TLV and is used to control tunnel selection policy, correlating with the BGP Color Extended Community from RFC 9012.
section: "5.4"
topics:
    - routing
    - bgp
