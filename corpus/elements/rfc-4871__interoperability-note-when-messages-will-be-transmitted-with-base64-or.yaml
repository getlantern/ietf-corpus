document: rfc-4871
kind: interoperability-note
summary: When messages will be transmitted with base64 or quoted-printable content transfer encoding, signers MUST compute hashes after encoding and verifiers MUST incorporate values before decoding. Hashes MUST be computed before SMTP dot-stuffing is applied.
section: "3.7"
topics:
