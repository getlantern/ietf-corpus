document: rfc-2326
kind: registry
summary: IANA maintains a registry of RTSP option tags used in Require and Proxy-Require headers. Registrants must provide the option name (no spaces, control characters, or periods; SHOULD be ≤20 characters), change control information, a reference to a description, and contact info for proprietary options.
section: 3.8.1
topics:
    - realtime
    - registry
