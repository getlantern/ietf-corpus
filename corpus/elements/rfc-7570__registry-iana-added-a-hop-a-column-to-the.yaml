summary: IANA added a 'HOP_A' column to the 'Attributes TLV Space' registry in the RSVP-TE Parameters registry, indicating whether each TLV is allowed on the LSP Hop Attributes ERO subobject. Attribute Flags TLV (T=1) is marked Yes; Service ID TLV (T=2) and OAM Configuration TLV (T=3) are marked No.
