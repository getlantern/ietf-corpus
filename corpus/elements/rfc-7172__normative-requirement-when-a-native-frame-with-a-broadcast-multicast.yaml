document: rfc-7172
kind: normative-requirement
summary: When a native frame with a broadcast, multicast, or unknown MAC destination is FGL-ingressed as a multi-destination TRILL packet, it MUST NOT be sent on a distribution tree rooted at a nickname held by a VL TRILL switch or a VL link pseudonode.
section: 4.1.1
rfc2119_level: MUST NOT
topics:
    - routing
