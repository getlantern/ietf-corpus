document: rfc-726
kind: normative-requirement
summary: When the RCTE option is first initiated, no break classes and no transmission classes are in effect. No character is treated as a break or transmission character until the first break reset command is received from the server.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
