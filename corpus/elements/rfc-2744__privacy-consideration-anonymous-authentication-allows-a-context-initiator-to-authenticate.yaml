document: rfc-2744
kind: privacy-consideration
summary: Anonymous authentication allows a context initiator to authenticate a peer without revealing its own identity. The anonymous name returned by gss_accept_sec_context() must be syntactically distinguishable from any valid principal name and associated with GSS_C_NT_ANONYMOUS, since it may appear in audit logs.
section: "4.4"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
