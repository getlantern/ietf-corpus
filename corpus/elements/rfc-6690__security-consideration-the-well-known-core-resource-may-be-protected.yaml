document: rfc-6690
kind: security-consideration
summary: The '/.well-known/core' resource MAY be protected using DTLS when hosted on a CoAP server. Servers with authentication and authorization features SHOULD support the authentication features of underlying transport protocols and MAY return different link lists based on client identity. Not providing a link does not by itself control access to the resource.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
