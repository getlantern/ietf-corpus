document: rfc-9252
kind: interoperability-note
summary: EVPN Route Type 4 (Ethernet Segment route) does not carry any SRv6 Service TLVs; its processing remains unchanged from RFC 7432. Similarly, EVPN Route Types 6, 7, and 8 do not require SRv6 Service TLV advertisement, and their BGP next hop equals the IPv6 address of the egress PE.
section: "6.4"
topics:
    - bgp
    - routing
