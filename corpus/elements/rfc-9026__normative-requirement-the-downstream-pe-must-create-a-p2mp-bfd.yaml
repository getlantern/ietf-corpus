document: rfc-9026
kind: normative-requirement
summary: The downstream PE MUST create a P2MP BFD session as MultipointTail and MUST demultiplex it using the Source IP Address TLV, the BFD Discriminator field value, and the x-PMSI Tunnel Identifier on which the BFD Control packet was received.
