document: rfc-3458
kind: normative-requirement
summary: A receiving user agent MUST NOT depend on the indicated message-context value in a way that prevents proper presentation of the message. If the value is incorrect or does not match the message content, the receiving UA MUST still be capable of displaying the message content at least as meaningfully as it would if no Message-Context value were present.
section: "6"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
