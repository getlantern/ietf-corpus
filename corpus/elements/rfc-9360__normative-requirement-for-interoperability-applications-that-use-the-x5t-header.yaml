document: rfc-9360
kind: normative-requirement
summary: For interoperability, applications that use the 'x5t' header parameter MUST support the hash algorithm 'SHA-256' but can use other hash algorithms. This ensures different implementations can be configured to use an interoperable algorithm.
section: "2"
rfc2119_level: MUST
