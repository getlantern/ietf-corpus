document: rfc-9568
kind: normative-requirement
summary: While in the Backup state, a VRRP Router MUST NOT respond to ARP requests (IPv4) or ND Neighbor Solicitation messages (IPv6) for the Virtual Router's addresses, MUST NOT send ND Router Advertisements, MUST discard packets with the Virtual Router MAC address as destination, and MUST NOT accept packets addressed to the Virtual Router's IPvX addresses.
section: 6.4.2
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
