document: rfc-3519
kind: wire-format
summary: MIP IP-in-UDP encapsulation adds an outer IP header, UDP header, and MIP Tunnel Data Message header before the original (inner) IP header. The outer IP and UDP endpoints identify the tunnel; the inner IP header is not changed except for TTL decrement when forwarding.
section: "4.2"
topics:
    - nat
    - mobility
    - udp
    - ip
