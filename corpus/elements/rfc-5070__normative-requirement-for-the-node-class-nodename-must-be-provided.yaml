document: rfc-5070
kind: normative-requirement
summary: For the Node class, NodeName MUST be provided if no Address information is given; if no NodeName is provided, at least one Address MUST be specified. If both are specified, DateTime SHOULD also be provided to record when the name-to-address resolution was performed.
section: "3.16"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
