document: rfc-1341
kind: interoperability-note
summary: The creation of new Content-Transfer-Encoding values is explicitly and strongly discouraged as likely to hinder interoperability with little benefit. Their use is allowed only by agreement between cooperating user agents and must use the 'X-' prefix convention.
section: "5"
