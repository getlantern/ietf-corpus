document: rfc-7867
kind: protocol-element
summary: 'Four video loss concealment method types are defined: (a) frame freeze — previously displayed frame held for duration of loss; (b) interframe extrapolation — reuse pixels from previous frame(s); (c) interpolation — use undamaged pixels in current frame to estimate missing blocks; (d) error-resilient encoding — sender embeds redundant data (including FEC).'
section: "3"
