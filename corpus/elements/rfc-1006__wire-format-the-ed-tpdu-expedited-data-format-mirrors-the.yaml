document: rfc-1006
kind: wire-format
summary: 'The ED TPDU (expedited data) format mirrors the DT TPDU but uses the ED opcode. It contains: header length (8 bits), code|credit, TPDU-NR and EOT (8 bits), and user data. The credit field is always zero on output and ignored on input.'
