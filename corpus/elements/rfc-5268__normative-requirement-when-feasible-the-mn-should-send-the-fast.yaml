document: rfc-5268
kind: normative-requirement
summary: When feasible, the MN SHOULD send the Fast Binding Update (FBU) from the PAR's link prior to disconnecting. If not feasible, the MN MUST send the FBU immediately after attaching to the NAR and sending the UNA message.
section: "3.1"
rfc2119_level: SHOULD
topics:
