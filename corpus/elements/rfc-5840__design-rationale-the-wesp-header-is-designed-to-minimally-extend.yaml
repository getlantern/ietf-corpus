document: rfc-5840
kind: design-rationale
summary: The WESP header is designed to minimally extend ESP by prepending only 4 octets (IPv4) or 8 octets (IPv6), preserving the ESP body unchanged so compliant implementations only need to add the new header without restructuring the existing ESP packet.
