document: rfc-4915
kind: normative-requirement
summary: MT-ID metrics in LSAs SHOULD be in ascending order of MT-ID. If an MT-ID exists in an LSA or router link multiple times, the metric in the first MT-ID instance MUST be used.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
