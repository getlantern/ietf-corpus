document: rfc-6353
kind: state-machine
summary: 'Client session establishment: increment snmpTlstmSessionOpens → select certificate and cipher_suite → initiate (D)TLS handshake → verify server certificate → assign tlstmSessionID. Unknown/invalid server certificate triggers snmpTlstmSessionUnknownServerCertificate or snmpTlstmSessionInvalidServerCertificates increment and a corresponding notification.'
