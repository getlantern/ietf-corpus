document: rfc-1356
kind: interoperability-note
summary: To interoperate with RFC 877 implementations, systems must be able to send IP with an MTU of 576 octets and receive IP datagrams up to 1600 octets. The default transmit MTU of 1500 and the CC CUD requirement preserve backward compatibility.
section: "3.6"
topics:
