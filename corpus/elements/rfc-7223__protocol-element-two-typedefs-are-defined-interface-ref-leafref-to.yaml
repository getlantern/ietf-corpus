summary: 'Two typedefs are defined: ''interface-ref'' (leafref to /interfaces/interface/name) for referencing configured interfaces, and ''interface-state-ref'' (leafref to /interfaces-state/interface/name) for referencing operationally present interfaces. Other YANG modules should use these when referencing interfaces.'
