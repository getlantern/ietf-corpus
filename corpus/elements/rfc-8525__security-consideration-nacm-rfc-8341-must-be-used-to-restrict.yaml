document: rfc-8525
kind: security-consideration
summary: NACM (RFC 8341) MUST be used to restrict read access to the YANG library data nodes. NETCONF is secured via SSH (RFC 6242) as the mandatory-to-implement transport; RESTCONF is secured via TLS (RFC 8446).
