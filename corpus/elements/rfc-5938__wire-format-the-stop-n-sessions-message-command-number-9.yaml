document: rfc-5938
kind: wire-format
summary: 'The Stop-N-Sessions message (Command Number 9) contains: 1-octet command number, 11 octets MBZ, 4-octet Number of Sessions, one or more 16-octet SID fields, and a 16-octet HMAC terminator. The command MUST contain at least one SID and can only be issued by the Control-Client.'
section: "3.4"
