document: rfc-5227
kind: normative-requirement
summary: From the time a host sends its first ARP Announcement until it ceases using the address, the host MUST answer ARP Requests as required by RFC 826, including Probe Requests with all-zero sender IP addresses.
section: "2.5"
rfc2119_level: MUST
