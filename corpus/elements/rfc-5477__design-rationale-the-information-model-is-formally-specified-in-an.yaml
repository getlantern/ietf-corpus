summary: The information model is formally specified in an XML document (Appendix A) to enable automated syntactical checking and code generation. Although XML-aware tools may benefit collectors, the use of XML is not mandatory in exporters or collectors for PSAMP deployment; the normative specification is the text in Section 8, not the appendix.
