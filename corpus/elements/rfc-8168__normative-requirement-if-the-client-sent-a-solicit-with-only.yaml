document: rfc-8168
kind: normative-requirement
summary: If the client sent a Solicit with only IA_PDs and cannot use the prefixes in the Advertise messages, it MUST ignore those Advertise messages and continue sending Solicit messages until it obtains the preferred prefix.
section: "3.3"
rfc2119_level: MUST
topics:
