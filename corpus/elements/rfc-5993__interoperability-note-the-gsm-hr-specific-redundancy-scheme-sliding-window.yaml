document: rfc-5993
kind: interoperability-note
summary: The GSM-HR-specific redundancy scheme (sliding window of frames) works only when both original and redundant representations are GSM-HR frames. When other media coding schemes are needed for redundancy, RFC 2198 audio redundancy coding must be used instead.
section: "4.1"
topics:
