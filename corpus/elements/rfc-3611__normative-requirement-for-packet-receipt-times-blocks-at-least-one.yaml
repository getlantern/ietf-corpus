document: rfc-3611
kind: normative-requirement
summary: For Packet Receipt Times blocks, at least one packet MUST have been received for each reported sequence number; if duplicate packets with differing receipt times exist, any time other than the earliest MUST NOT be reported.
section: "4.3"
rfc2119_level: MUST
