document: rfc-4414
kind: design-rationale
summary: Privacy label attributes (private, denied, doNotRedistribute, specialAccess) are attached to individual result fields rather than the entire response, allowing fine-grained control over which data elements may be published or redistributed based on the requestor's access level.
