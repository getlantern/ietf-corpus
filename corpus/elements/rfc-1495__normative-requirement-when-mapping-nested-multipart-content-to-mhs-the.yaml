document: rfc-1495
kind: normative-requirement
summary: When mapping nested multipart content to MHS, the IPMS.this-IPM field must always be generated by the gateway. An IPMS.subject field should also be generated where there is no 'real' heading, to present useful information to non-MIME X.400 UAs.
section: 3.2.1.3
rfc2119_level: MUST
topics:
    - email
