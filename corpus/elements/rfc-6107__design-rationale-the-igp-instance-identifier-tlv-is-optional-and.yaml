document: rfc-6107
kind: design-rationale
summary: The IGP Instance Identifier TLV is optional and defaults to the same IGP instance (value 0xffffffff) to preserve backward compatibility with RFC 3477 and RFC 4206 for the FA use case, while enabling multi-layer networks (MLNs) to target a different IGP instance in the client network without requiring address space coordination across layers.
section: "2.3"
topics:
    - mpls
    - routing
