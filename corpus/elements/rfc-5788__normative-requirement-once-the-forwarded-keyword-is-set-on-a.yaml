document: rfc-5788
kind: normative-requirement
summary: Once the $Forwarded keyword is set on a message, the flag SHOULD NOT be cleared. There is no mechanism to detect whether a message was forwarded more than once.
section: 3.4.2
rfc2119_level: SHOULD NOT
