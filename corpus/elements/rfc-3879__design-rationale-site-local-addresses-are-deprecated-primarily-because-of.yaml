document: rfc-3879
kind: design-rationale
summary: 'Site-local addresses are deprecated primarily because of address ambiguity: FEC0::1 can exist in multiple sites simultaneously with no indication of which site it belongs to, causing developer, router, and management pain. The concept of ''site'' itself is ill-defined with no consensus definition.'
