document: rfc-4323
kind: protocol-element
summary: The docsIetfQosServiceClassPolicyTable (read-create on both CM and CMTS) provides the linkage between SNMP-managed IP packet filter policies and named DOCSIS Service Classes. Entries supply a Service Class Name and classification rule priority, enabling administrative classification of packets to a Service Class rather than a specific SFID.
section: 2.2.9
topics:
