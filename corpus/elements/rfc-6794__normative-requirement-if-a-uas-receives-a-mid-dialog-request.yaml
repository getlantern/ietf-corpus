document: rfc-6794
kind: normative-requirement
summary: If a UAS receives a mid-dialog request with a changed Policy-Contact list, the UAS MUST set up a policy channel to all new policy servers and contact them, and SHOULD close channels to servers no longer listed to avoid receiving inapplicable policies.
section: 4.5.1
rfc2119_level: MUST
topics:
    - sip
