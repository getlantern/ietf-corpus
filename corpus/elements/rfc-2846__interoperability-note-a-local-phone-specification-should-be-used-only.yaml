document: rfc-2846
kind: interoperability-note
summary: A local-phone specification should be used only by the destination MTA specified by mta-I-pstn. Per RFC 1123, other intermediate MTAs should transfer the message without modifying the local-part (LHS), preserving the local-phone encoding intact.
section: "2.1"
