document: rfc-4825
kind: design-rationale
summary: XCAP maps XML document sub-trees directly to HTTP URIs rather than defining a new protocol, so existing HTTP infrastructure (proxies, caches, conditional requests, authentication) can be reused. The canonical form with comments of XML determines logical equivalence, ensuring consistent semantics regardless of physical serialization differences such as attribute ordering.
section: "2"
topics:
