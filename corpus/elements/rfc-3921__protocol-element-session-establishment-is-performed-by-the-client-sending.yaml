document: rfc-3921
kind: protocol-element
summary: Session establishment is performed by the client sending an IQ stanza of type 'set' containing an empty <session/> element qualified by 'urn:ietf:params:xml:ns:xmpp-session'. The server advertises session support as a stream feature after authentication, and a connected resource that completes this step becomes an 'active resource'.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
