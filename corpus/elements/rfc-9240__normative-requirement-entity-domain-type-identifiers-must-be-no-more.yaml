document: rfc-9240
kind: normative-requirement
summary: Entity domain type identifiers MUST be no more than 64 characters, using only US-ASCII alphanumeric, hyphen-minus, colon, or low line characters. The colon MUST NOT appear more than once and MUST only appear within the 'priv:' prefix. All non-private entity domain types MUST be registered with IANA in the 'ALTO Entity Domain Types' registry.
section: 5.1.1
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
