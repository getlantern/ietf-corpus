document: rfc-4590
kind: protocol-element
summary: 'Digest-Nonce (type 105): transports the nonce value. In Access-Requests, it holds the client-received nonce; in Access-Challenge, it holds the server-chosen nonce. Presence of Digest-Response without Digest-Nonce triggers a nonce-request flow.'
