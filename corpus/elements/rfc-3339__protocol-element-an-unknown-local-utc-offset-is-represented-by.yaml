document: rfc-3339
kind: protocol-element
summary: 'An unknown local UTC offset is represented by the special value "-00:00", which is semantically distinct from "+00:00" or "Z": the latter two imply UTC is the preferred reference point, while "-00:00" means UTC is known but the local offset is not.'
