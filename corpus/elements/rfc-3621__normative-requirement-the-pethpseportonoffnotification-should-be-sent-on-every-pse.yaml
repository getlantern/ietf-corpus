document: rfc-3621
kind: normative-requirement
summary: The pethPsePortOnOffNotification SHOULD be sent on every PSE port detection status change except transitions into the searching state. At least 500 milliseconds must elapse between successive notifications from the same object instance.
section: "5"
rfc2119_level: SHOULD
