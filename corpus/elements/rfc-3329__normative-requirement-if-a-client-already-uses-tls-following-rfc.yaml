document: rfc-3329
kind: normative-requirement
summary: If a client already uses TLS following RFC 3263 rules, it MUST NOT use the security agreement procedure of this specification. If a client uses non-TLS connections per RFC 3263, it MAY use this security agreement to detect DNS spoofing or negotiate other security.
section: 2.3.1
rfc2119_level: MUST NOT
topics:
    - sip
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
