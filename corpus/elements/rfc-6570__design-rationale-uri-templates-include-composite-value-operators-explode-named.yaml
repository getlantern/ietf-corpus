document: rfc-6570
kind: design-rationale
summary: URI Templates include composite-value operators (explode, named parameters) to describe how resource identifiers are commonly allocated, not merely to generate URIs from changed values. This allows templates to serve as machine-readable structural descriptions of URI spaces.
section: "1.3"
topics:
    - http
