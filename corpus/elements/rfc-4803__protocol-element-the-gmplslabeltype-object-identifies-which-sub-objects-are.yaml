summary: 'The gmplsLabelType object identifies which sub-objects are valid in a gmplsLabelEntry: gmplsMplsLabel(1) uses gmplsLabelMplsLabel; gmplsPortWavelengthLabel(2) uses gmplsLabelPortWavelength; gmplsFreeformLabel(3) uses gmplsLabelFreeform; gmplsSonetLabel(4) and gmplsSdhLabel(5) use SONET/SDH signal index fields; gmplsWavebandLabel(6) uses waveband ID, start, and end.'
