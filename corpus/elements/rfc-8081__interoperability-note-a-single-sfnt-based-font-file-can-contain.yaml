document: rfc-8081
kind: interoperability-note
summary: A single SFNT-based font file can contain glyph encodings in multiple outline formats (e.g., both TrueType and PostScript/CFF outlines simultaneously). Rendering engines may not support all formats, so the optional 'outlines' parameter allows clients to determine format compatibility before downloading.
section: 4.4.1
topics:
    - registry
