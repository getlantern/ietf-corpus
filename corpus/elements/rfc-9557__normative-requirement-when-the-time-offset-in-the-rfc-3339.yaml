document: rfc-9557
kind: normative-requirement
summary: When the time-offset in the RFC 3339 part is inconsistent with the time zone suffix and the critical flag is set on the time zone suffix, an application MUST act on the inconsistency (reject or resolve). Without the critical flag, the application MAY act on the inconsistency.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
