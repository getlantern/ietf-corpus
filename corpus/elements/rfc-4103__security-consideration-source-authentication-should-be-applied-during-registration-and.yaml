document: rfc-4103
kind: security-consideration
summary: Source authentication SHOULD be applied during registration and session establishment procedures to reliably associate the sender identity with the session. Once established, SRTP mechanisms MAY be used to verify the source remains the same during the session.
section: "8.3"
rfc2119_level: SHOULD
topics:
    - security
    - rtp
    - realtime
