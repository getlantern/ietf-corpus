document: rfc-5689
kind: protocol-element
summary: Capability discovery for extended MKCOL is performed via an OPTIONS request. A supporting server advertises 'extended-mkcol' in the DAV response header alongside other DAV compliance classes (e.g., '1, 2, 3, access-control, extended-mkcol').
