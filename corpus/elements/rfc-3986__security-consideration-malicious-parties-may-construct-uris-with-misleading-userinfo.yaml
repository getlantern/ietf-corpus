document: rfc-3986
kind: security-consideration
summary: Malicious parties may construct URIs with misleading userinfo that appears to be a trusted host name (e.g., "http://good.example.com@bad.example.com/"). Applications rendering URIs for user feedback should distinguish the userinfo visually from the host component.
section: "7.2"
topics:
    - security
