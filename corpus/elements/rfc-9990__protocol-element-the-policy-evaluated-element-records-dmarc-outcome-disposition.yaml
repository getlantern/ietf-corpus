document: rfc-9990
kind: protocol-element
summary: 'The ''policy_evaluated'' element records DMARC outcome: ''disposition'' (none/pass/quarantine/reject), ''dkim'' and ''spf'' alignment results (pass/fail), and zero or more ''reason'' elements for policy overrides. Elements must appear in this order.'
