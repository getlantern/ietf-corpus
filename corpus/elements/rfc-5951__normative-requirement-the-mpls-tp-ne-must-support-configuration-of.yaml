document: rfc-5951
kind: normative-requirement
summary: The MPLS-TP NE MUST support configuration of OAM entities and functions per RFC 5860, including the ability to choose which OAM functions are enabled, associate OAM functions with specific maintenance entities, and configure maintenance entity identifiers (MEP ID and MIP ID) for connectivity checking.
section: "6.5"
rfc2119_level: MUST
topics:
