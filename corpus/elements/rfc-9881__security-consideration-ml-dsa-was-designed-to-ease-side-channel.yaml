document: rfc-9881
kind: security-consideration
summary: ML-DSA was designed to ease side-channel resilience (e.g., it avoids Gaussian sampling), but implementations must still guard against side-channel leakage. Key recovery has been demonstrated from the bit-unpacking function in the signing algorithm over large signature samples; masking countermeasures exist but carry performance overhead.
section: "9"
topics:
    - crypto
    - security
