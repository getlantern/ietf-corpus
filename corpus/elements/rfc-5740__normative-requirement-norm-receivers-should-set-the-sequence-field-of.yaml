document: rfc-5740
kind: normative-requirement
summary: NORM receivers SHOULD set the 'sequence' field of NORM_NACK and NORM_ACK messages to enable replay-attack protection. A separate, monotonically increasing sequence number space MUST be maintained for each distinct destination address (session multicast address or sender unicast address) to which feedback is sent.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
