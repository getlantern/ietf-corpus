document: rfc-2741
kind: design-rationale
summary: The master agent is MIB-ignorant and SNMP-omniscient while subagents are SNMP-ignorant and MIB-omniscient. This division of labor allows independently developed subagents to integrate without knowledge of each other or of SNMP protocol internals.
