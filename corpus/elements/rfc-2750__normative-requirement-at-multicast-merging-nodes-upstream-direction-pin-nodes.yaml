document: rfc-2750
kind: normative-requirement
summary: At multicast merging nodes (upstream direction), PIN nodes must concatenate all POLICY_DATA objects arriving from downstream and forward the combined list upstream. In the downstream direction, a single upstream POLICY_DATA object must be copied to all downstream multicast branches.
section: "4.2"
rfc2119_level: MUST
topics:
    - qos
    - multicast
