document: rfc-4409
kind: normative-requirement
summary: The MSA MAY issue an error response (reply code 550 with enhanced status code 5.7.1) to a MAIL command if the MAIL FROM address appears to have insufficient submission rights or is not authorized with the authentication used.
section: "6.1"
rfc2119_level: MAY
