document: rfc-4474
kind: normative-requirement
summary: 'All implementations MUST support the ''rsa-sha1'' algorithm: sign the digest-string with sha1WithRSAEncryption (RFC 3370) and base64-encode the result (RFC 3548). A 1024-bit or longer RSA key MUST be used. New algorithm values MUST be defined in Standards Track RFCs.'
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
