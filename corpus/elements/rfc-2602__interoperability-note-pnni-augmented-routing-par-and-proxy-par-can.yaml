document: rfc-2602
kind: interoperability-note
summary: PNNI Augmented Routing (PAR) and Proxy PAR can distribute MARS server addresses and manage service registry tables across ATM switches, but would not require changes to the ILMI-based discovery mechanism defined in this memo. Hosts can continue using ILMI-based or Proxy PAR-based discovery interchangeably.
section: "6"
