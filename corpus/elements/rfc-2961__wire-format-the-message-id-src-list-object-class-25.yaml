document: rfc-2961
kind: wire-format
summary: The MESSAGE_ID SRC_LIST object (Class 25, C_Type 2 IPv4 / C_Type 3 IPv6) carries tuples of Message_Identifier (32 bits) paired with Source_IP_Address (4 or 16 bytes). Sent to the multicast session's destination address to refresh multicast Path state; each identifier must be followed by the corresponding path sender's source address.
section: "5.1"
topics:
