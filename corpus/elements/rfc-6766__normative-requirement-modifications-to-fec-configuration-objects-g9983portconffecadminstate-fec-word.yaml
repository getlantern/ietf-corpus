document: rfc-6766
kind: normative-requirement
summary: Modifications to FEC configuration objects (g9983PortConfFecAdminState, FEC word size, redundancy size, interleaver type, and depth) MUST be performed when the link is 'down'. Attempts to change these objects MUST be rejected if the link is 'up' or initializing, or if the port is a GBS-R.
section: "6"
rfc2119_level: MUST
topics:
    - snmp
