document: rfc-1286
kind: security-consideration
summary: Security issues are not discussed in this memo. The document provides no guidance on access control for read-write MIB objects such as STP timers, port enable/disable, aging time, or static filtering entries, all of which could be used to disrupt bridging if modified by unauthorized parties.
