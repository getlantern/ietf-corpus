document: rfc-8434
kind: normative-requirement
summary: For the file layout type, the stateid and principal used for I/O MUST have the same effect and be subject to the same validation on a data server as they would if the I/O were performed on the metadata server itself. Storage devices MUST make all required access checks on each READ or WRITE as determined by NFSv4.1.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
