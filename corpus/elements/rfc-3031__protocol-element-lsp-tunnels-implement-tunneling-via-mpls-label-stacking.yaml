document: rfc-3031
kind: protocol-element
summary: LSP Tunnels implement tunneling via MPLS label stacking rather than network layer encapsulation. The label stack supports arbitrary nesting depth, allowing Level 2 LSPs to carry Level 1 LSPs transparently. At each hierarchy boundary the outer label is pushed at the tunnel ingress and popped (via PHP) at the penultimate hop of the inner tunnel.
section: "3.27"
topics:
    - routing
