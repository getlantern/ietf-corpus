document: rfc-9849
kind: security-consideration
summary: 'ECH''s three primary security goals are: (1) security preservation—ECH does not weaken TLS; (2) handshake privacy—connections to any server name in an anonymity set are indistinguishable from connections to any other name in that set; and (3) downgrade resistance—attackers cannot force a non-ECH connection. These properties were formally proven in the ECH-Analysis paper.'
section: "10.1"
topics:
