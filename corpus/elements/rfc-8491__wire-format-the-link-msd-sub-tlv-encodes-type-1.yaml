document: rfc-8491
kind: wire-format
summary: The Link MSD sub-TLV encodes Type (1 octet, value 15), Length (1 octet, variable, multiple of 2), and a Value field of one or more 1-octet MSD-Type / 1-octet MSD-Value pairs. MSD-Value 0 indicates inability to support any SID stack depth on that link.
