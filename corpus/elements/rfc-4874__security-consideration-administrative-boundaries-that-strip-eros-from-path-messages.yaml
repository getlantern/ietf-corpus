document: rfc-4874
kind: security-consideration
summary: Administrative boundaries that strip EROs from Path messages for security reasons SHOULD also strip the XRO, since the XRO reveals topology and routing constraints that may be equally sensitive. The same security considerations from RFC 3209 and RFC 3473 continue to apply.
section: "7"
topics:
