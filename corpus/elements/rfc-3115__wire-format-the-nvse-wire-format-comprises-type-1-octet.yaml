document: rfc-3115
kind: wire-format
summary: 'The NVSE wire format comprises: Type (1 octet, value 134), Length (1 octet, excludes Type and Length bytes), Reserved (2 octets, set to 0), Vendor/Org-ID (4 octets, high-order octet 0 followed by SMI Private Enterprise Code in network byte order), Vendor-NVSE-Type (2 octets), and variable-length Vendor-NVSE-Value.'
section: "2.2"
topics:
    - mobility
