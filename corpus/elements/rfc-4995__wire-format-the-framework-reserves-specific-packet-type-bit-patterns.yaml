document: rfc-4995
kind: wire-format
summary: 'The framework reserves specific packet type bit patterns: 11100000 (Padding), 1110nnnn (Add-CID), 11110 (Feedback), 11111000 (IR-DYN), 1111110 (IR), 1111111 (Segment); bit patterns starting with 0, 10, 110, 1111101, and 11111001 are available for profiles.'
