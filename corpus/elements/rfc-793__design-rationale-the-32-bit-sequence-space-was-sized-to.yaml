document: rfc-793
kind: design-rationale
summary: 'The 32-bit sequence space was sized to make wandering duplicate segments harmless: at 2 Mbps the cycle time is 4.5 hours, vastly exceeding the expected maximum segment lifetime of tens of seconds. Even at 100 Mbps the cycle is 5.4 minutes, deemed acceptable for foreseeable networks.'
section: "3.3"
topics:
