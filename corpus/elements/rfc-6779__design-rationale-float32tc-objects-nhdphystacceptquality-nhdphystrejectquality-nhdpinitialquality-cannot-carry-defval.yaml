document: rfc-6779
kind: design-rationale
summary: Float32TC objects (nhdpHystAcceptQuality, nhdpHystRejectQuality, nhdpInitialQuality) cannot carry DEFVAL clauses because SMIv2 range constraint mechanisms are unavailable for OCTET STRING-based textual conventions as defined in RFC 6340. Default values are specified only in DESCRIPTION clauses.
