document: rfc-9869
kind: normative-requirement
summary: UDP datagrams used as DPLPMTUD probe packets MUST NOT be fragmented at the UDP or IP layer. In IPv4, a probe packet MUST be sent with the Don't Fragment (DF) bit set and without network layer endpoint fragmentation.
section: "3.2"
rfc2119_level: MUST
topics:
    - udp
    - ip
