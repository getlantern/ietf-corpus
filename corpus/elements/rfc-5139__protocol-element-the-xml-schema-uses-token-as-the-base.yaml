document: rfc-5139
kind: protocol-element
summary: The XML schema uses 'token' as the base type for civic address fields instead of 'string' (as used in RFC 4119). This causes XML processors to normalize and collapse whitespace before processing, making fragments with different whitespace formatting equivalent.
