document: rfc-2575
kind: design-rationale
summary: The ViewTreeFamily mask mechanism was introduced because specifying all columns of a single conceptual MIB row would otherwise require one separate view subtree per column. By allowing wildcard sub-identifiers via a bit mask, many structurally similar subtrees can be aggregated into a single vacmViewTreeFamilyTable entry.
section: "2.4"
topics:
