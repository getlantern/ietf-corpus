document: rfc-7175
kind: protocol-element
summary: A TRILL BFD Echo frame is a unicast RBridge Channel frame with both ingress and egress nicknames set to a nickname of the originating RBridge, causing normal TRILL forwarding to return it via the immediate neighbor. The RBridge Channel OAM protocol number for BFD Echo is 0x003.
