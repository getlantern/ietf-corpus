document: rfc-6851
kind: interoperability-note
summary: For QRESYNC-enabled servers, MOVE must follow the same VANISHED-instead-of-EXPUNGE requirement as UID EXPUNGE; a QRESYNC-enabled client must handle both VANISHED and EXPUNGE responses to a UID MOVE command.
