document: rfc-5733
kind: design-rationale
summary: 'Contact postal information supports two simultaneous representations via a ''type'' attribute on <contact:postalInfo>: type=''int'' (internationalized, constrained to 7-bit ASCII-representable UTF-8 for broad readability) and type=''loc'' (localized, unrestricted UTF-8 for local optimization). This dual-form approach accommodates registries that must serve both international and local audiences without forcing a single encoding.'
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
