document: rfc-9349
kind: protocol-element
summary: The sendImmediately object (TruthValue) controls whether the IP-TFS receiver delivers inner packets as soon as possible without waiting for lost or misordered outer packets. Enabling this reduces inner-packet delay but can amplify out-of-order delivery when aggregation or reordering is present.
section: "4.2"
topics:
    - ipsec
