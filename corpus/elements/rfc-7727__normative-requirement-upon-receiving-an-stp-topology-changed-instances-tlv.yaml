document: rfc-7727
kind: normative-requirement
summary: Upon receiving an STP Topology Changed Instances TLV, the receiving RG member MUST initiate the Topology Change event, send BPDUs with the Topology Change flag set to 1 out of designated ports, and flush MAC addresses relevant to the listed instances.
section: 3.4.1
rfc2119_level: MUST
topics:
    - routing
