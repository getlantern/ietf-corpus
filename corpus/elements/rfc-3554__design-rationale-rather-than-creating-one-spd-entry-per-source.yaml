document: rfc-3554
kind: design-rationale
summary: Rather than creating one SPD entry per source/destination address pair (which is straightforward but expensive), the preferred approach associates sets of addresses with source and destination selectors in each SPD entry. This accommodates SCTP's multi-homing without combinatorial SA explosion.
section: "2"
topics:
