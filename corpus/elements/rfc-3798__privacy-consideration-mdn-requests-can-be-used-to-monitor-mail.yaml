document: rfc-3798
kind: privacy-consideration
summary: MDN requests can be used to monitor mail-reading habits. Propagating Disposition-Notification-To to mailing list members reveals subscriber addresses to the original sender. Headers returned in part 3 of the MDN may expose internal hostnames or network topology behind a firewall.
section: "6.2"
topics:
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
