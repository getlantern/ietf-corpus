document: rfc-6505
kind: design-rationale
summary: Automatic mixing of streams joining a common input is RECOMMENDED because it is conceptually straightforward, increases transport efficiency, and reduces coordination complexity and latency for the AS — eliminating the need for the AS to create intermediate conference mixers for common whisper-announcement and call-coaching scenarios.
