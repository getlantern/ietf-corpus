document: rfc-6110
kind: normative-requirement
summary: If a YANG grouping is used both in RPC input/output parameters and elsewhere, it MUST be mapped to two different named pattern definitions — one with fixed element order (for RPC) and one with arbitrary order (for other contexts). The fixed-order version MUST have the suffix '__rpc' appended to its mangled name.
section: "9.2"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
