document: rfc-4006
kind: protocol-element
summary: 'The CC-Request-Type AVP (Code 416) identifies the type of credit-control operation: INITIAL_REQUEST (1), UPDATE_REQUEST (2), TERMINATION_REQUEST (3), or EVENT_REQUEST (4). This AVP is mandatory in both CCR and CCA and drives the state machine.'
