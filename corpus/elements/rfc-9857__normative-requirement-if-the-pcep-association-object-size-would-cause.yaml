document: rfc-9857
kind: normative-requirement
summary: If the PCEP ASSOCIATION Object size would cause a single SR Policy Candidate Path NLRI update to exceed the supported BGP message size, the PCEP ASSOCIATION Object MUST NOT be encoded and the sub-TLV MUST be skipped along with an error log.
section: 5.6.4
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
