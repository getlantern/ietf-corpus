document: rfc-5225
kind: protocol-element
summary: 'The Master Sequence Number (MSN) is a per-context control field that either reuses an existing protocol field (e.g., RTP SN) or is created by the compressor. It is present in every ROHCv2 header: sent in full in IR headers and LSB-encoded in CO headers. It is used to differentiate reference headers in feedback and to infer incrementing fields such as the IPv4 Identifier.'
section: 6.3.1
topics:
    - realtime
    - rtp
