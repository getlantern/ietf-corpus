document: rfc-7851
kind: design-rationale
summary: PathTrack was chosen over a RouteQuery-then-Fetch approach because in high-churn environments, the path can change between the two separate operations, making results inconsistent. A single message per step is more likely to traverse the same path and provide coherent diagnostics.
