document: rfc-4976
kind: normative-requirement
summary: Relays MUST include rspauth, cnonce, nc, and qop parameters in an Authentication-Info header for all 200 OK responses to an AUTH request. The request-URI used in calculating H(A2) is the rightmost URI in the To-Path header.
section: "9.1"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
