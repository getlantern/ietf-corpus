document: rfc-8879
kind: protocol-element
summary: A new TLS extension compress_certificate(27) signals the compression algorithms the sender is willing to use for decompressing Certificate messages. Sent in ClientHello to indicate support for compressed server certificates, or in CertificateRequest to indicate support for compressed client certificates.
