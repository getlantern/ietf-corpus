document: rfc-1220
kind: normative-requirement
summary: A system which does not announce MAC Types may be assumed to support all MAC Types; a system that does announce MAC Types is advising its neighbor that all unspecified MAC Types will be discarded.
section: "6.6"
rfc2119_level: MAY
