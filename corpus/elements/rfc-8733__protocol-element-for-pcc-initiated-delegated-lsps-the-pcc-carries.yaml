document: rfc-8733
kind: protocol-element
summary: For PCC-initiated delegated LSPs, the PCC carries the AUTO-BANDWIDTH-ATTRIBUTES TLV in the LSPA object of the PCRpt message to pass adjustment parameters to the PCE at the time of delegation. The TLV is included in all PCEP messages for the LSP while auto-bandwidth is active; its absence disables the feature.
section: "5.6"
topics:
    - mpls
