document: rfc-9042
kind: normative-requirement
summary: If the optional :mailboxid argument is specified and a matching mailbox is found by MAILBOXID in the user's personal namespace, that mailbox is used for delivery. If no such mailbox is found, fileinto proceeds as it would without the :mailboxid argument.
section: "4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
