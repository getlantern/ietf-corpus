document: rfc-3805
kind: design-rationale
summary: Read-write access is granted to objects describing resources that some printers cannot sense (e.g., paper size in a tray). The criterion is that the printer must actually act on the written value — these objects drive printer behavior and are not merely informational annotations.
section: "2.3"
topics:
    - snmp
