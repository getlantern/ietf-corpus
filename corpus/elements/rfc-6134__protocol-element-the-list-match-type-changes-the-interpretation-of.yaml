document: rfc-6134
kind: protocol-element
summary: The ":list" match type changes the interpretation of the key-list parameter in supported tests so that it becomes a list of names of externally stored lists. The test evaluates to "true" if any specified value matches any member of one or more of the named lists.
section: "2.2"
topics:
    - email
    - ldap
