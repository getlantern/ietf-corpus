document: rfc-6396
kind: wire-format
summary: The PEER_INDEX_TABLE subtype header contains a 4-octet Collector BGP ID, 2-octet View Name Length, optional variable View Name (UTF-8 encoded), 2-octet Peer Count, and repeated Peer Entries. Each Peer Entry has a 1-octet Peer Type, 4-octet Peer BGP ID, variable Peer IP Address, and variable Peer AS.
section: 4.3.1
topics:
