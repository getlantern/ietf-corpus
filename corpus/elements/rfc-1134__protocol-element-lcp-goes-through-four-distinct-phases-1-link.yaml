document: rfc-1134
kind: protocol-element
summary: 'LCP goes through four distinct phases: (1) Link Establishment and Configuration Negotiation (LCP Configure exchange), (2) optional Link Quality Determination, (3) Network-Layer Protocol Configuration via NCP, and (4) Link Termination. No network-layer datagrams may be exchanged until LCP reaches the Open state.'
section: "4"
