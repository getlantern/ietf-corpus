document: rfc-8139
kind: normative-requirement
summary: The DRB inhibition timer and root bridge change inhibition timer MUST be implemented. At least two VLAN inhibition timers MUST be implemented. Per-VLAN inhibition timers SHOULD be logically implemented for each VLAN offering end-station service. An RBridge MUST NOT merge VLAN inhibition timers for two VLANs if it is Appointed Forwarder for one but not the other.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
