kind: protocol-element
summary: 'SED Records are defined in three concrete types extending abstract SedRecType: NAPTRType (NAPTR with order, flags, svcs, regx, repl fields), NSType (DNS name server with hostName and ipAddr), and URIType (URI with ere POSIX Extended Regular Expression and uri fields). All include isInSvc boolean and optional ttl in seconds.'
