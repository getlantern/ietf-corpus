document: rfc-5463
kind: protocol-element
summary: The 'ihave' test accepts a list of capability names as a string-list argument and succeeds if and only if all of those capabilities are present and available to the script. Unlike most Sieve tests, it accepts no match or comparator arguments; the match type is always ':is' and the comparator is always 'i;octet'.
