document: rfc-4120
kind: normative-requirement
summary: Unless the application server provides its own replay protection, the server MUST use a replay cache storing at least server name, client name, time, and microsecond fields from authenticators seen within the allowable clock skew window.
section: 3.2.3
rfc2119_level: MUST
topics:
    - security
