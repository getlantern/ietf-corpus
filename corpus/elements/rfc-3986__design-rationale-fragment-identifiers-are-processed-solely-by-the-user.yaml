document: rfc-3986
kind: design-rationale
summary: Fragment identifiers are processed solely by the user agent, separated from the rest of the URI before any scheme-specific dereference. This client-side handling prevents information providers from denying reference authors the right to refer to information within a resource selectively.
section: "3.5"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
