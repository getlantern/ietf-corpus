document: rfc-3432
kind: normative-requirement
summary: T0, the start time for generating packets, MUST be selected at random from the interval [T, T+dT]. This randomization prevents predictability and mitigates synchronization with other periodic network behavior.
section: "3"
rfc2119_level: MUST
