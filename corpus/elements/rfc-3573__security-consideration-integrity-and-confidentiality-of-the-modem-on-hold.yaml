document: rfc-3573
kind: security-consideration
summary: Integrity and confidentiality of the modem on-hold signaling relies entirely on the underlying L2TP security mechanisms. The extension is believed not to provide information useful to an attacker. New AVPs MAY be hidden using L2TP's AVP hiding mechanism (RFC 2661 section 4.3).
section: "7"
topics:
