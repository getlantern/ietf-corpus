document: rfc-5681
kind: normative-requirement
summary: An ACK SHOULD be generated for at least every second full-sized segment, and MUST be generated within 500 ms of the arrival of the first unacknowledged packet. An ACK MUST NOT be delayed more than 500 ms waiting on a second full-sized segment.
section: "4.2"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
