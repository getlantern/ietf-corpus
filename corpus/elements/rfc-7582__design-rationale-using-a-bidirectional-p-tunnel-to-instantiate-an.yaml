document: rfc-7582
kind: design-rationale
summary: Using a bidirectional P-tunnel to instantiate an I-PMSI for an MVPN with n PE routers requires only a single multicast distribution tree rather than n separate P2MP trees (one per source PE), thereby saving significant state in the network's transit nodes.
