document: rfc-6633
kind: normative-requirement
summary: 'Hosts, security gateways, and firewalls MUST silently discard received ICMP Source Quench packets and SHOULD log such drops as a security fault with at least minimal details: IP Source Address, IP Destination Address, ICMP message type, and date/time the packet was seen.'
section: "8"
rfc2119_level: MUST
topics:
    - security
    - ip
