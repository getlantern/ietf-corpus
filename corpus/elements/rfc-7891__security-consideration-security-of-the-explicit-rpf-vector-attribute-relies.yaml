document: rfc-7891
kind: security-consideration
summary: Security of the Explicit RPF Vector Attribute relies entirely on the security of the PIM packet itself (per PIM-SM RFC 7761). To minimize denial-of-service risk from forged PIM Joins with Explicit RPF Vector stacks, the feature should be used only within a single trusted management domain.
section: "12"
topics:
    - security
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
