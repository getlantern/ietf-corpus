document: rfc-9685
kind: wire-format
summary: The RPL Target Option (RTO) gains a 2-bit P-Field at bit positions 2–3 in the flags byte (based on Figure 4 of RFC 9010), with Type=0x05, followed by Target Prefix and ROVR fields. The F and X flags at positions 0–1 are unchanged.
