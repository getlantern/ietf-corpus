document: rfc-4818
kind: design-rationale
summary: The Framed-IPv6-Prefix attribute is not designed to support delegation of IPv6 prefixes for use in the user's network; therefore a separate Delegated-IPv6-Prefix attribute is defined, and both attributes may appear in the same RADIUS packet without conflict.
section: "1"
