document: rfc-8072
kind: design-rationale
summary: 'YANG Patch was created because the ''plain patch'' mechanism in RESTCONF (RFC 8040) does not provide sufficient client control: it cannot edit multiple sub-resources in one request, lacks precise per-operation semantics, and does not guarantee processing order or per-edit error reporting.'
