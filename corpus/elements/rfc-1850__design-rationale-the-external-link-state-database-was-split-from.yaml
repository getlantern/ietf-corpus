document: rfc-1850
kind: design-rationale
summary: The External Link State Database was split from the main ospfLsdbTable because AS External LSAs are typically very numerous and are replicated identically across all non-stub areas; keeping them separate prevents the main LSDB view from being dominated by external entries and simplifies management queries.
