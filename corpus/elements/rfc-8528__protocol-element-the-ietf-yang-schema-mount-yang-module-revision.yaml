document: rfc-8528
kind: protocol-element
summary: 'The ''ietf-yang-schema-mount'' YANG module (revision 2019-01-14) defines: one extension (''mount-point'' with a label argument), and one read-only container (''schema-mounts'') with a ''namespace'' list and a ''mount-point'' list. The ''mount-point'' list entries include ''module'', ''label'', ''config'' (boolean, default true), and a mandatory ''schema-ref'' choice between ''inline'' and ''shared-schema''.'
