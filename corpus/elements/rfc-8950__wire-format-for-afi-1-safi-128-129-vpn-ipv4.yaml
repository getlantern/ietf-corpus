summary: 'For AFI=1, SAFI=128/129 (VPN-IPv4) with an IPv6 next hop: the MP_REACH_NLRI Length of Next Hop Address field is 24 or 48, encoding a VPN-IPv6 address with an 8-octet Route Distinguisher set to zero, optionally followed by a second VPN-IPv6 link-local address also with zero RD.'
