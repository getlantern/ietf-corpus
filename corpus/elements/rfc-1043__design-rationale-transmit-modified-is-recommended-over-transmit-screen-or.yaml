document: rfc-1043
kind: design-rationale
summary: TRANSMIT-MODIFIED is recommended over TRANSMIT-SCREEN or TRANSMIT-UNPROTECTED whenever possible in order to minimize data volume between user and server hosts by returning only fields that were pre-marked Modified or actually edited by the user.
