document: rfc-5653
kind: protocol-element
summary: Oid is an immutable utility class representing ASN.1 OIDs identifying security mechanisms and name types. It may be constructed from dot-notation strings (e.g., '1.3.6.1.5.6.2') or DER encoding; getDER() returns the DER-encoded form for wire use.
section: "6.7"
topics:
