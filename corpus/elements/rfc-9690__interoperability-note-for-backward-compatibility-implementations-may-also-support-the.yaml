document: rfc-9690
kind: interoperability-note
summary: For backward compatibility, implementations MAY also support the RSA-KEM Key Transport algorithm (id-rsa-kem-spki with KeyTransRecipientInfo) as specified in RFC 5990. The same RSA key pair may be used with both the RFC 5990 key transport algorithm and this specification, because the RSA public/private key operations are identical in both.
section: "2.2"
topics:
    - crypto
extracted_by: claude-sonnet-4-6
