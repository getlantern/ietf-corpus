document: rfc-7711
kind: security-consideration
summary: POSH does not enable a hosted domain to transfer private keys to a hosting service via HTTPS, nor does it enable certificate enrollment with a CA (as distinct from EST/RFC 7030). POSH only conveys public-key fingerprints for server identity verification.
