document: rfc-9656
kind: security-consideration
summary: 'The YANG module is accessed via NETCONF (mandatory secure transport: SSH per RFC 6242) or RESTCONF (mandatory secure transport: TLS per RFC 8446). The NETCONF access control model (RFC 8341) must be used to restrict access to authorized users.'
section: "3"
topics:
