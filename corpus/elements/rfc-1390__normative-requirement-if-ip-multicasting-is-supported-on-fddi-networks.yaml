document: rfc-1390
kind: normative-requirement
summary: If IP multicasting is supported on FDDI networks, the method specified in RFC 1112 shall be used. Implementation may require the ability to copy frames addressed to an arbitrary number of multicast group addresses.
section: Multicast Support
rfc2119_level: MUST
topics:
    - ip
    - multicast
