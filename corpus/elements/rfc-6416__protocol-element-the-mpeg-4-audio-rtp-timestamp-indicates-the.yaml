document: rfc-6416
kind: protocol-element
summary: The MPEG-4 Audio RTP timestamp indicates the sampling instance of the first audio frame in the packet. Timestamps are RECOMMENDED to start at a random value for security. Default clock rate is 90 kHz unless overridden out-of-band.
section: "6.2"
topics:
