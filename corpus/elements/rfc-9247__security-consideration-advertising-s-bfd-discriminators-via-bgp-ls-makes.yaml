document: rfc-9247
kind: security-consideration
summary: Advertising S-BFD Discriminators via BGP-LS makes it possible for attackers to initiate S-BFD sessions using the advertised information. The BGP-LS security model requires limiting topology information sharing to trusted entities within an administrative domain, as discussed in RFC 7752 Section 8. Vulnerabilities from exposed discriminators and mitigations are addressed in RFC 7880.
section: "6"
topics:
    - security
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
