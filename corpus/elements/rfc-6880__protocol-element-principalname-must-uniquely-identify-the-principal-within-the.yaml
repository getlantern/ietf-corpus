document: rfc-6880
kind: protocol-element
summary: principalName MUST uniquely identify the principal within the KDC's administrative context and MUST be equivalent to the string representation of the principal name per RFC 1964 Section 2.1.1, including the realm when applicable. The attribute MAY be multivalued to support aliases or enterprise names, with at most one canonical value and one canonical salting value.
section: 4.1.1.1
topics:
    - security
