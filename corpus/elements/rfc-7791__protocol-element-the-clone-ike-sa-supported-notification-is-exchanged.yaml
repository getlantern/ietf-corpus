document: rfc-7791
kind: protocol-element
summary: The CLONE_IKE_SA_SUPPORTED notification is exchanged in IKE_AUTH to advertise capability. The CLONE_IKE_SA notification is included by the initiator in a CREATE_CHILD_SA request for IKE SA rekey to signal that the old SA should not be deleted after the new one is created.
section: "5"
topics:
