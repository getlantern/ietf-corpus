document: rfc-6391
kind: interoperability-note
summary: When VCCV out-of-band OAM (Type 2) is used, an MPLS Router Alert label is inserted above the PW LSE in the label stack. Depending on how many labels the LSR hashes, the Router Alert label may cause the OAM packet to be load-balanced to a different path than data packets with identical flow and PW labels.
section: "7"
topics:
