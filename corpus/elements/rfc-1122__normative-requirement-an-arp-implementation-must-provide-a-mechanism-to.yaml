document: rfc-1122
kind: normative-requirement
summary: An ARP implementation MUST provide a mechanism to flush out-of-date cache entries; if timeout-based, the timeout SHOULD be configurable. ARP flooding MUST be prevented, with a recommended maximum rate of one ARP Request per second per destination.
section: 2.3.2.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
