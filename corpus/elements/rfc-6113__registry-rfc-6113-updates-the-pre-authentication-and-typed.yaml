document: rfc-6113
kind: registry
summary: RFC 6113 updates the Pre-Authentication and Typed Data IANA registry adding PA-FX-COOKIE (133), PA-AUTHENTICATION-SET (134), PA-AUTH-SET-SELECTED (135), PA-FX-FAST (136), PA-FX-ERROR (137); and new error codes KDC_ERR_PREAUTH_EXPIRED (90), KDC_ERR_MORE_PREAUTH_DATA_REQUIRED (91), KDC_ERR_PREAUTH_BAD_AUTHENTICATION_SET (92), KDC_ERR_UNKNOWN_CRITICAL_FAST_OPTIONS (93); and key usage numbers 50-53.
section: "7.1"
