document: rfc-5225
kind: normative-requirement
summary: The decompressor MUST always validate the IR header using the 8-bit CRC it carries. If validation fails, the context MUST NOT be updated and the IR header MUST NOT be delivered to upper layers.
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
