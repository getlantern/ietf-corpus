document: rfc-9293
kind: normative-requirement
summary: 'A TCP implementation MUST support the three mandatory options: End of Option List (Kind=0), No-Operation (Kind=1), and Maximum Segment Size (Kind=2) (MUST-4). It MUST be able to receive any option in any segment (MUST-5), MUST ignore unknown options that have a length field (MUST-6), and MUST handle illegal option lengths such as zero by resetting the connection (MUST-7).'
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
