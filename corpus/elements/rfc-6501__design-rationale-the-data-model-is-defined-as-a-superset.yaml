document: rfc-6501
kind: design-rationale
summary: The data model is defined as a superset of RFC 4575 (SIP event package for conference state) because RFC 4575 was SIP-specific and lacked floor control and other XCON framework elements. Extending RFC 4575 allows this model to support multiple call signaling protocols while covering all XCON framework functionality.
