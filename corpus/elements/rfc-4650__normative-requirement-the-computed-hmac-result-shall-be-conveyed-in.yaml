document: rfc-4650
kind: normative-requirement
summary: The computed HMAC result SHALL be conveyed in the KEMAC payload MAC field. The HMAC SHALL be computed over the entire MIKEY message excluding the MAC field, using auth_key derived from the pre-shared secret s via the MIKEY PRF.
