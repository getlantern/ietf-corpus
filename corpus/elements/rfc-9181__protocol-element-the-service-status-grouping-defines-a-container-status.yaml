document: rfc-9181
kind: protocol-element
summary: 'The ''service-status'' grouping defines a container ''status'' with two sub-containers: ''admin-status'' (writable, identityref based on administrative-status, with last-change timestamp) and ''oper-status'' (read-only config false, identityref based on operational-status with last-change). Administrative status values include admin-up, admin-down, admin-testing, and admin-pre-deployment.'
