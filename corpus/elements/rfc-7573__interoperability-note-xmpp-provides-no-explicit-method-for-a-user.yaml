document: rfc-7573
kind: interoperability-note
summary: XMPP provides no explicit method for a user to formally terminate a chat session; gateways must listen for a 'gone' chat state from the XMPP user or implement a timer (XEP-0085 suggests 10 minutes of inactivity) to trigger SIP BYE.
section: "4"
topics:
