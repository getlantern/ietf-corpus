document: rfc-7311
kind: normative-requirement
summary: Implementations MUST support a per-session configuration item AIGP_SESSION (enabled/disabled). For IBGP sessions and EBGP sessions within a BGP Confederation, the default SHOULD be 'enabled'. For all other EBGP sessions, the default MUST be 'disabled'.
section: "3.3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
