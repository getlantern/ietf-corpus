document: rfc-6764
kind: normative-requirement
summary: Servers MUST redirect HTTP requests for the well-known URI to the actual context path using HTTP redirect mechanisms (e.g., 301, 303, or 307). Clients MUST handle HTTP redirects on well-known URIs. Servers MUST NOT locate the actual service endpoint at the well-known URI.
section: "5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
