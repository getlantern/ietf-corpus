document: rfc-3851
kind: normative-requirement
summary: Sending and receiving agents MUST support SHA-1 for DigestAlgorithmIdentifier. Receiving agents SHOULD support MD5 for backward compatibility with MD5-digested S/MIME v2 SignedData objects.
section: "2.1"
rfc2119_level: MUST
