document: rfc-2609
kind: wire-format
summary: String values in templates are sequences of non-whitespace tokens potentially with embedded whitespace; interior runs of whitespace are collapsed to a single space and leading/trailing whitespace is removed. Value lists are comma-separated; a line ending with a comma continues onto the next line.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
