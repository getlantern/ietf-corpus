document: rfc-9936
kind: design-rationale
summary: 'NIST defines PQC security levels by reference scheme rather than abstract bits of security: a KEM achieving Level 1 must require computational resources comparable to AES-128 key search; Levels 3 and 5 correspond to AES-192 and AES-256 key search respectively. Levels 2 and 4 use SHA-256 and SHA-384 collision search.'
