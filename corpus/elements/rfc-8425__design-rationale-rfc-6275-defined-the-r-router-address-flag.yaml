document: rfc-8425
kind: design-rationale
summary: RFC 6275 defined the R (Router Address) flag in the PIO field without creating an IANA registry or updating RFC 4861, leaving flag allocation ungoverned. RFC 8425 remedies this gap by establishing a formal registry to manage future flag assignments.
section: "1"
topics:
