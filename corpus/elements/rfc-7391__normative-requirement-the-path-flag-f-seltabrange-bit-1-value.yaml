document: rfc-7391
kind: normative-requirement
summary: The path flag F_SELTABRANGE (bit 1, value 0x2) MUST be set to indicate the presence of the TABLERANGE-TLV. F_SELTABRANGE can only be used in GET or DEL and is mutually exclusive with F_SELKEY.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
