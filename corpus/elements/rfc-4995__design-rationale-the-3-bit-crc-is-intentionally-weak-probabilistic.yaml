document: rfc-4995
kind: design-rationale
summary: The 3-bit CRC is intentionally weak (probabilistic over multiple packets) and is unsuitable for single-packet context repair validation, while the 7-bit CRC is strong enough to validate a context repair from a single header; profiles should restrict which CRC sizes trigger context repair.
section: 5.3.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
