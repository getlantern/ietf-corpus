document: rfc-9080
kind: security-consideration
summary: 'Homenet security depends on interface classification: Internal, Ad Hoc, and Hybrid interfaces are trusted and accept HNCP/Babel traffic; External and Guest interfaces are untrusted and HNCP/Babel packets received on them are ignored. Overall security therefore depends on the reliability of the border discovery procedure in RFC 7788 Section 5.3.'
section: "4"
topics:
    - routing
    - security
