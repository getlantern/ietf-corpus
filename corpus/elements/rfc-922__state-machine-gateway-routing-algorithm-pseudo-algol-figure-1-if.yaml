document: rfc-922
kind: state-machine
summary: 'Gateway routing algorithm (Pseudo-Algol, Figure 1): If the destination IP network is locally connected, check subnetting. For all-subnets broadcast, apply Reverse Path Forwarding — forward on all links except incoming if the datagram arrived on the best return path to source, else discard. For subnet-specific or unicast, forward to the appropriate outgoing link. If the destination is non-local, forward via normal routing.'
section: "6.3"
