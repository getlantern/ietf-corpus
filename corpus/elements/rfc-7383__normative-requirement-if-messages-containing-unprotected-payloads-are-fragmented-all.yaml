document: rfc-7383
kind: normative-requirement
summary: If messages containing unprotected payloads are fragmented, all unprotected payloads MUST be placed in the first fragment (Fragment Number = 1), and the Encrypted Fragment payload MUST be present in every IKE Fragment message as its last payload.
section: 2.5.3
rfc2119_level: MUST
topics:
    - ipsec
