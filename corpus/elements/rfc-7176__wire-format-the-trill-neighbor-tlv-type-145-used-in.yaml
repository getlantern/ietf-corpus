document: rfc-7176
kind: wire-format
summary: The TRILL Neighbor TLV (type 145), used in broadcast IIH PDUs, encodes S/L/R flags and a SIZE field (5 bits, with 6-byte SNPA encoded as zero) followed by neighbor records each containing F/O flags, 2-byte MTU, and SIZE-byte SNPA. S=1 means smallest MAC is included; L=1 means largest MAC is included.
section: "2.5"
topics:
    - routing
