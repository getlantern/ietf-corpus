document: rfc-4182
kind: normative-requirement
summary: IPv4 Explicit NULL (label value 0) and IPv6 Explicit NULL (label value 2) MAY now occur at any position in the MPLS label stack, not only at the bottom. This removes the restriction previously stated in RFC 3032.
section: "2"
rfc2119_level: MAY
topics:
    - mpls
