document: rfc-9345
kind: normative-requirement
summary: If the delegated_credential extension is not present in the ClientHello, the server MUST NOT send a delegated credential. When a (D)TLS version negotiated is less than 1.3, the server MUST ignore this extension.
section: 4.1.1
rfc2119_level: MUST NOT
topics:
