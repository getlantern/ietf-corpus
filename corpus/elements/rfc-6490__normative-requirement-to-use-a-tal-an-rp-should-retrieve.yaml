document: rfc-6490
kind: normative-requirement
summary: 'To use a TAL, an RP SHOULD: retrieve the object at the TAL URI; confirm it is a current self-signed RPKI CA certificate conforming to RFC 6487; confirm the public key in the TAL matches the retrieved object; and perform any additional locally-appropriate checks.'
section: "3"
rfc2119_level: SHOULD
topics:
