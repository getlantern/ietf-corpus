document: rfc-5961
kind: security-consideration
summary: Forged ICMP messages provide off-path attackers an opportunity to disrupt or degrade TCP connections independently of the TCP-level mitigations described here. Unless implementations also address spoofed ICMP (see RFC 5927), the protection level may be lower than desired, particularly for path-MTU-related ICMP messages.
section: "10"
topics:
