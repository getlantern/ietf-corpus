document: rfc-8707
kind: normative-requirement
summary: The client SHOULD provide the most specific URI it can for the complete API or set of resources it intends to access, and SHOULD use the base URI of the API as the 'resource' parameter value unless specific knowledge of the resource dictates otherwise.
