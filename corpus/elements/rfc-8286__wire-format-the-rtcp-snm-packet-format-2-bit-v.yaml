document: rfc-8286
kind: wire-format
summary: 'The RTCP SNM packet format: 2-bit V=2, 1-bit P, 5-bit reserved, 8-bit PT=213, 16-bit length; followed by 32-bit SSRC, then IN NTP timestamp (two 32-bit words, most/least significant), then OUT NTP timestamp (two 32-bit words). Total fixed size is 6 32-bit words (24 octets) plus header word.'
