document: rfc-8311
kind: normative-requirement
summary: A network node MUST NOT originate traffic marked with ECT(1) unless the network node is participating in a Congestion Marking Differences experiment that uses ECT(1). This prevents spurious ECT(1) injection outside of sanctioned experiments.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - ecn
    - congestion
