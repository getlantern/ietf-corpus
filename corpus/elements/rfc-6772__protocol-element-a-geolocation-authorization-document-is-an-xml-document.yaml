document: rfc-6772
kind: protocol-element
summary: 'A geolocation authorization document is an XML document formatted according to the Common Policy schema (RFC 4745), using the media type application/auth-policy+xml. Each rule contains three parts: conditions, actions, and transformations. Permissions are positive grants of information, so the absence of any permission results in less information being disclosed.'
section: "3.1"
topics:
    - privacy
    - security
