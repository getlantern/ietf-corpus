document: rfc-2370
kind: normative-requirement
summary: If a type-10 (area-local scope) Opaque LSA's associated area does not match the target interface's area, the Opaque LSA must not be flooded out that interface. An implementation should track the OSPF area associated with each area-local Opaque LSA.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
