summary: 'TAMPApexUpdate contains: version, terse, msgRef (TAMPMsgRef), clearTrustAnchors (BOOLEAN), clearCommunities (BOOLEAN), seqNumber (SeqNumber OPTIONAL), and apexTA (TrustAnchorChoice). The contingency-public-key-decrypt-key is carried as an unsigned attribute (PlaintextSymmetricKey OCTET STRING) in the SignerInfo of the Apex Trust Anchor Update.'
