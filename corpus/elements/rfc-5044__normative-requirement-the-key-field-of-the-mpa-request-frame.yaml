document: rfc-5044
kind: normative-requirement
summary: The Key field of the MPA Request Frame MUST be validated by the Responder; if the value does not match 'MPA ID Req Frame', the connection MUST be closed and an error reported locally. Likewise, the Initiator MUST validate the Key in the MPA Reply Frame against 'MPA ID Rep Frame'.
section: 7.1.1
rfc2119_level: MUST
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
