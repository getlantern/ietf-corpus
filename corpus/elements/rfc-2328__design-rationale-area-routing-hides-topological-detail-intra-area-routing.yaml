document: rfc-2328
kind: design-rationale
summary: 'Area routing hides topological detail: intra-area routing is determined solely by the area''s own topology, protecting it from injection of bad routing data from outside. This also enables a marked reduction in routing traffic compared to running the entire AS as a single link-state domain.'
