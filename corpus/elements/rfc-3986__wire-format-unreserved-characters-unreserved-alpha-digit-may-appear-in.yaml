document: rfc-3986
kind: wire-format
summary: Unreserved characters — unreserved = ALPHA / DIGIT / "-" / "." / "_" / "~" — may appear in a URI without encoding. URIs that differ only in whether an unreserved character is percent-encoded or literal are equivalent and identify the same resource.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
