document: rfc-8638
kind: wire-format
summary: PIM packet format follows RFC 7761 Section 4.9 unchanged except that group address and source address fields MUST be translated when traversing an AFBR. The Register-Stop message carries an IPv4 or IPv6 Group Address in Encoded-Group format and Source Address in Encoded-Unicast format, with the address family determined by which side of the AFBR the message is on.
section: "8"
topics:
