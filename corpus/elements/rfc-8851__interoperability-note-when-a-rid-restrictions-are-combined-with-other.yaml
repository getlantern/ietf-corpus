document: rfc-8851
kind: interoperability-note
summary: When 'a=rid' restrictions are combined with other restricting mechanisms such as 'a=fmtp' or 'a=imageattr', the combined result must produce a non-empty intersection. The 'a=rid' restrictions only further restrict parameters established by other mechanisms and can never relax them.
