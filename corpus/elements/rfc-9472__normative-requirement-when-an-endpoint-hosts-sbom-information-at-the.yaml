document: rfc-9472
kind: normative-requirement
summary: When an endpoint hosts SBOM information at the well-known URI, the endpoint SHOULD NOT provide unrestricted access to that URL by default, since SBOM data reveals the software inventory and can aid attackers in identifying exploits.
section: "6"
rfc2119_level: SHOULD NOT
