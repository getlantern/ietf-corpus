document: rfc-2508
kind: interoperability-note
summary: This IP/UDP/RTP compression is designed to fit within the general header compression framework of RFC 2507, which defines TCP and non-TCP as two classes. This specification creates IP/UDP/RTP as a third class extracted from the non-TCP class, and the FULL_HEADER format is intended to be consistent with RFC 2507's definition.
