document: rfc-9370
kind: protocol-element
summary: IKE_FOLLOWUP_KE is a new IKEv2 exchange type (value 44) introduced to carry additional key exchange payloads following a CREATE_CHILD_SA exchange. It is used when rekeying an IKE SA or creating/rekeying Child SAs with multiple key exchanges.
section: 2.2.4
topics:
