document: rfc-4442
kind: security-consideration
summary: 'Replay attack: replayed MIKEY messages carrying TESLA parameters can cause DoS, downgrading, or MITM. Countermeasure: freshness guarantee and unique session key bound to the full protocol exchange, including TESLA parameters.'
