document: rfc-3520
kind: interoperability-note
summary: The AUTH_SESSION policy element MUST conform to the POLICY_DATA object format defined in RFC 2750 and is inserted into RSVP PATH messages. It relies on RFC 2750's P-type registry for the AUTH_SESSION type value (0x04).
section: "3.1"
topics:
