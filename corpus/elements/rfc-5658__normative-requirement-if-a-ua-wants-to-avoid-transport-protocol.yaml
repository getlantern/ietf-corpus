document: rfc-5658
kind: normative-requirement
summary: If a UA wants to avoid transport protocol switching between initial and subsequent requests, it SHOULD rely on DNS records for transport selection and SHOULD avoid statically configuring the outbound proxy with a numeric IP address; a logical name with no transport parameter SHOULD be used instead.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - sip
    - dns
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
