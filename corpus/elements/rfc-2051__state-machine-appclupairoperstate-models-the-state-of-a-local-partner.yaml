summary: 'appcLuPairOperState models the state of a local/partner LU pair: ''inactive'' (no active or pending session exists) and ''active'' (an active or pending session exists between the LUs). A row in appcLuPairOperTable is created as soon as there is an active session; two entries are present when both LUs in a pair are local.'
