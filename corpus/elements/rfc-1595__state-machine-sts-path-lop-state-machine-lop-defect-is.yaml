document: rfc-1595
kind: state-machine
summary: 'STS-Path LOP state machine: LOP defect is declared when a valid pointer is not found in eight consecutive frames or NDF=''1001'' appears for eight consecutive frames without concatenation. LOP defect is terminated on three contiguous frames with a valid pointer (NDF=''0110'') or concatenation indicator. LOP failure is declared at 2.5±0.5 s persistence and cleared when absent for 10±0.5 s.'
section: "3.5"
