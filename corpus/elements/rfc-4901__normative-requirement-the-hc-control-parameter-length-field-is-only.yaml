document: rfc-4901
kind: normative-requirement
summary: The HC control parameter length field is ONLY used for short packets because Ethernet padding may be appended. If the packet length is >= 64 octets, the length field MUST be set to zero. If the MPLS payload is less than 64 bytes, the length field MUST be set to the length of the PW payload plus the length of the HC control parameter.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
