document: rfc-8814
kind: wire-format
summary: The Link MSD TLV (Type 267) is a Link Attribute TLV with variable length (multiple of 2 octets). Its value field consists of one or more pairs of a 1-octet MSD-Type and 1-octet MSD-Value, where MSD-Value 0 means no ability to impose any MSD stack.
