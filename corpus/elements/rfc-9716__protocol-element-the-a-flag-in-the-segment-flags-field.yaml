document: rfc-9716
kind: protocol-element
summary: The A-Flag in the Segment Flags field indicates the presence of an SR Algorithm ID in the SR Algorithm field, applicable to Type-C and Type-D segment types. If the A-Flag appears with Type-A, it MUST be ignored. Unused flag bits MUST be set to zero on transmission and MUST be ignored on receipt.
section: "4.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
