document: rfc-2363
kind: security-consideration
summary: ATM PVC security relies on the network provider's administration; for SVCs the protocol is analogous to dial-up, leveraging PAP/CHAP authentication. Applications requiring stronger security are encouraged to use authentication headers, encrypted payloads, and/or ATM-layer security services.
section: "10"
topics:
