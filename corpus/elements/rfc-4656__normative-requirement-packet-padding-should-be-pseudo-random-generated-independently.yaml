document: rfc-4656
kind: normative-requirement
summary: Packet Padding SHOULD be pseudo-random (generated independently of other pseudo-random values in the protocol). However, implementations MUST provide a configuration parameter or option allowing Packet Padding to consist of all zeros.
section: 4.1.2
rfc2119_level: MUST
