document: rfc-1368
kind: protocol-element
summary: rptrMonitorPortShortEvents counts CarrierEvents with ActivityDuration less than ShortEventMaxTime (greater than 74 bit times, less than 82 bit times). Short events may indicate external noise hits causing the repeater to transmit runts or propagate late collisions.
