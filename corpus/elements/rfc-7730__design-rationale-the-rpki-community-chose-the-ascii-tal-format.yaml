document: rfc-7730
kind: design-rationale
summary: The RPKI community chose the ASCII TAL format over the binary ASN.1-encoded TrustAnchorInfo structure (RFC 5914) because TAL was adopted by implementors prior to the PKIX trust anchor work, and the community prefers its simplicity. Adopting TrustAnchorInfo would require defining an rsync URI extension.
section: "2.1"
topics:
    - pkix
    - routing
