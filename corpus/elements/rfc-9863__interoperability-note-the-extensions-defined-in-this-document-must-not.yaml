document: rfc-9863
kind: interoperability-note
summary: The extensions defined in this document MUST NOT be used to carry the color attribute for SR paths established using RFC 9862 (SR Policy Candidate Paths), because the color is already included as part of the SR Policy identifier encoding in that specification.
section: "1"
topics:
    - routing
