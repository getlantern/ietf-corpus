document: rfc-4995
kind: design-rationale
summary: RFC 4995 explicitly separates the ROHC framework from profiles (previously intermingled in RFC 3095) to simplify specification and profile development. Both documents remain independently usable and compatible, but RFC 4995 is intended as the base for all future profiles.
section: "1"
