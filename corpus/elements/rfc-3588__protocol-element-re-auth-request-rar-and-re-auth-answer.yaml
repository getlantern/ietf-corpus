document: rfc-3588
kind: protocol-element
summary: Re-Auth-Request (RAR) and Re-Auth-Answer (RAA) messages (Command Code 258) allow a server to initiate re-authentication or re-authorization of an active session. The Re-Auth-Request-Type AVP specifies AUTHORIZE_ONLY or AUTHORIZE_AUTHENTICATE. Server-initiated re-auth support is mandatory in Diameter.
section: "8.3"
topics:
    - security
