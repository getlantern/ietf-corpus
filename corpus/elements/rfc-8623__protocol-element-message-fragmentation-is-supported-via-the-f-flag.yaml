document: rfc-8623
kind: protocol-element
summary: Message fragmentation is supported via the F flag in the LSP object when P2MP report, update, or initiate requests exceed the maximum PCEP message length of (2^16)-1 bytes. Fragmented messages use the same PLSP-ID to identify the series; PCInitiate fragments also share the same SRP-ID-number.
section: "8"
topics:
