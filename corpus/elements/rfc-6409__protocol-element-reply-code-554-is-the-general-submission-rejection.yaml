document: rfc-6409
kind: protocol-element
summary: Reply code 554 is the general submission rejection code for MAIL, RCPT, or DATA commands containing something improper. Reply code 530 is used when authentication is required. Reply code 550 with enhanced status code 5.7.1 is used to reject based on insufficient submission rights or user permissions.
section: "4.1"
topics:
