document: rfc-3046
kind: normative-requirement
summary: Servers SHOULD be prepared to handle relay agent options in unicast messages, but MUST NOT expect them to always be present, since relay agents are not required to monitor unicast DHCP messages sent directly between client and server.
section: "2.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
