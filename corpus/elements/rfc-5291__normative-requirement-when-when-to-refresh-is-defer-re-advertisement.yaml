document: rfc-5291
kind: normative-requirement
summary: When When-to-refresh is DEFER, re-advertisement is deferred until the speaker receives a subsequent ROUTE-REFRESH for the same AFI/SAFI either without ORF entries or with When-to-refresh=IMMEDIATE. ORF entries with REMOVE or REMOVE-ALL cannot remove locally configured outbound route filters.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - bgp
    - routing
