document: rfc-7614
kind: design-rationale
summary: The id parameter in NOTIFY Event header fields is preserved in subscriptions using this extension even though the Refer-Events-At URI already uniquely identifies the state, making the id parameter redundant. This is done to reduce implementation changes and maintain compatibility with existing diagnostic tools.
section: "4.4"
topics:
    - sip
    - realtime
