document: rfc-8178
kind: design-rationale
summary: Optional features may now be added as extensions within an existing minor version, and protocol corrections can be proposed and implemented without creating a new minor version. This provides more implementation flexibility while preserving interoperability on protocol upgrade, because a client and server may each choose a subset of available extensions and successfully use a common subset.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
