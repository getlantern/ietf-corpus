document: rfc-3868
kind: protocol-element
summary: 'The Connection Acknowledge (COAK) message confirms a CORE. Mandatory parameters: Routing Context, Protocol Class, Destination Reference Number, Source Reference Number, Sequence Control, and Credit (class 3 only). Destination Address is included when the received CORE conveyed a Source Address. Covers SCCP CC.'
section: 3.3.4
