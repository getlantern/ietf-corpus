document: rfc-8844
kind: security-consideration
summary: An unknown key-share (UKS) attack allows an attacker to bind their own identity to the certificate fingerprint of another entity, causing a victim to incorrectly believe it is communicating with the attacker when it is actually communicating with a second innocent party. The attack does not expose confidential media but breaks mutual authentication, enabling misrepresentation of context.
section: "2"
topics:
