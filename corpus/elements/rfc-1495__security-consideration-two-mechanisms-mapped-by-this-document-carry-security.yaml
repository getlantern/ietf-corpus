document: rfc-1495
kind: security-consideration
summary: 'Two mechanisms mapped by this document carry security risk: (1) binary file transfer carries inherent risks of malicious content, and (2) strong content typing can be used to automatically launch applications against received content, leaving the invoker vulnerable to application-specific viruses such as spreadsheet macros or PostScript commands that delete files.'
