document: rfc-3813
kind: normative-requirement
summary: If the ifTable entry corresponding to an mplsInterfaceEntry is operationally disabled, the corresponding entry in mplsInterfaceTable MUST be deleted shortly thereafter. An mplsInterfaceEntry exists if and only if a corresponding ifTable entry with ifType=mpls(166) exists.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
