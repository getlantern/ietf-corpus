document: rfc-6396
kind: wire-format
summary: 'The TABLE_DUMP Type encodes RIB entries with fields: 2-octet View Number, 2-octet Sequence Number, variable Prefix (4 octets for IPv4, 16 for IPv6), 1-octet Prefix Length, 1-octet Status (SHOULD be 1), 4-octet Originated Time, variable Peer IP Address, 2-octet Peer AS, 2-octet Attribute Length, and variable BGP Attribute.'
