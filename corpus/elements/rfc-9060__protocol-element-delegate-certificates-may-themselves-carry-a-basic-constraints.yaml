document: rfc-9060
kind: protocol-element
summary: Delegate certificates MAY themselves carry a basic constraints cA boolean of 'true', enabling further subdelegation. A CA-capable delegate that wants to sign PASSporTs must create a separate end-entity certificate with a TNAuthList equal to or a subset of its own.
