document: rfc-5035
kind: normative-requirement
summary: SigningCertificateV2 MUST be a signed attribute; it MUST NOT be an unsigned attribute. A SignerInfo MUST NOT include multiple instances of the SigningCertificateV2 attribute, and the attribute MUST include only a single instance of AttributeValue.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
