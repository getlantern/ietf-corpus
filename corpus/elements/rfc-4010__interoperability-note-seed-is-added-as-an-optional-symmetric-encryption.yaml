document: rfc-4010
kind: interoperability-note
summary: SEED is added as an optional symmetric encryption algorithm in CMS alongside existing algorithms defined in RFC 3370 (CMSALG). A CMS agent selects SEED by using the corresponding OID; it is not mandatory unless local policy requires it, and both sender and receiver must support it for SEED-encrypted messages to be exchanged.
