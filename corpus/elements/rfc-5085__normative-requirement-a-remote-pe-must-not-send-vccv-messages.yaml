document: rfc-5085
kind: normative-requirement
summary: A remote PE MUST NOT send VCCV messages before the capability for the control channel and connectivity verification type to be used has been signaled. If VCCV messages are received prior to advertising capability, they MUST be discarded.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - security
