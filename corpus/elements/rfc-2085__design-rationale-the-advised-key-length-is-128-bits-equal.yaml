document: rfc-2085
kind: design-rationale
summary: The advised key length is 128 bits, equal to the MD5 hash output length. Keys shorter than 128 bits are strongly discouraged as they decrease security strength; keys longer than 128 bits are acceptable but extra length may not significantly increase strength unless key randomness is suspect.
section: "1.2"
topics:
