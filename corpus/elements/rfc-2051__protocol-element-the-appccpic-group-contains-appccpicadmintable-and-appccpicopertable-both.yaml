document: rfc-2051
kind: protocol-element
summary: The appcCPIC group contains appcCpicAdminTable and appcCpicOperTable, both indexed by (LocalLuName, SymbolicDestinationName). They hold CPI-C side information including the symbolic destination name and partner LU name. '*ALL' may be used for LocalLuName to indicate that the CPI-C definition applies to all local LUs.
section: 3.1.6
