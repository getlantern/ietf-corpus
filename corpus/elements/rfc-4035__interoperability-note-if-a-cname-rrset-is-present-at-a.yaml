document: rfc-4035
kind: interoperability-note
summary: If a CNAME RRset is present at a name in a signed zone, appropriate RRSIG and NSEC RRsets are REQUIRED at that name. This modifies the original CNAME definition in RFC 1034, which prohibited any other RR types from coexisting with a CNAME record.
section: "2.5"
topics:
    - dns
