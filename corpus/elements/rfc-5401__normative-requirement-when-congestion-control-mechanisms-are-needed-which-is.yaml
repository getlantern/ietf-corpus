document: rfc-5401
kind: normative-requirement
summary: When congestion control mechanisms are needed, which is REQUIRED for general Internet operation, the sender transmission rate SHALL be controlled by the congestion control mechanism. All data transmissions from multicast senders are RECOMMENDED to be subject to rate limitations determined by the application or congestion control algorithm.
section: "3.1"
rfc2119_level: REQUIRED
topics:
    - multicast
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
