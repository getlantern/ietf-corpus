document: rfc-7659
kind: protocol-element
summary: Resource limits are configurable via read-write objects per NAT instance (natv2InstanceLimitAddressMapEntries, natv2InstanceLimitPortMapEntries, natv2InstanceLimitPendingFragments, natv2InstanceLimitSubscriberActives) and per subscriber (natv2SubscriberLimitPortMapEntries). Packets exceeding a limit are dropped and counted in dedicated drop counters.
section: 3.1.1
topics:
