document: rfc-1293
kind: design-rationale
summary: InARP was created because Frame Relay stations learn of new virtual circuits via signalling but receive no protocol address for the remote side, leaving the circuit unusable without a discovery mechanism. RARP was rejected because it returns the protocol address of the requesting station, not the remote station, and IP-specific mechanisms were too limiting for a multi-protocol solution.
section: "5"
topics:
