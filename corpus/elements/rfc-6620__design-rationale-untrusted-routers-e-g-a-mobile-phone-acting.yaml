document: rfc-6620
kind: design-rationale
summary: 'Untrusted routers (e.g., a mobile phone acting as a router on a Validating Port) are not supported by the default FCFS SAVI specification: their transit traffic carries off-link source addresses that would be dropped by Validating Port checks. Supporting such scenarios would require a new port type or manual configuration.'
section: "2.6"
topics:
    - ip
    - security
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
