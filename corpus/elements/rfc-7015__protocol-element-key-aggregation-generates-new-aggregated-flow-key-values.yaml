document: rfc-7015
kind: protocol-element
summary: Key aggregation generates new Aggregated Flow Key values by reduction (dropping fields or precision, e.g., masking an IP address to a /24) or replacement (substituting derived values, e.g., IP-to-ASN lookup). Both operations may be applied any number of times in any order and may also add new non-key fields such as Original Flow counters or distinct key counters.
section: "5.2"
topics:
    - measurement
    - ip
