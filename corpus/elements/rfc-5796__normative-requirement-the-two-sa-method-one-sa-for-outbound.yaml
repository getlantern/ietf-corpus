document: rfc-5796
kind: normative-requirement
summary: The two-SA method (one SA for outbound SAo, one for inbound SAi, with identical parameters shared among all routers in an administrative region) MUST be supported by every implementation. This document RECOMMENDS this method for manual key configuration.
