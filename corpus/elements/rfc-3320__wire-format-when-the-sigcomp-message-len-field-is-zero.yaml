document: rfc-3320
kind: wire-format
summary: When the SigComp message len field is zero, a 12-bit code_len field specifies the uploaded UDVM bytecode size (0–4095 bytes), and a 4-bit destination field encodes the load address as destination × 64 (valid values 0001–1111; 0000 is reserved and causes decompression failure).
