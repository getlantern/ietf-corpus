document: rfc-9965
kind: normative-requirement
summary: Implementations MUST treat peers using an EPI as untrusted and untrustworthy; once authenticated, such a peer MUST be placed into a limited network such as a captive portal. The limited network MUST NOT permit unrestricted network access.
section: 3.4.2
rfc2119_level: MUST
topics:
    - security
