document: rfc-3966
kind: design-rationale
summary: Parameters in tel URIs use semicolons as delimiters (matching SIP URI conventions) rather than slashes, because the forward slash in URIs indicates path hierarchy and would conflict with the URI generic syntax defined in RFC 2396.
