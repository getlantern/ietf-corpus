document: rfc-2875
kind: design-rationale
summary: 'Diffie-Hellman is a key agreement algorithm and cannot be used directly for signing or encryption. PKCS #10 certification requests require an integrity check value, so two POP algorithms are defined that use the DH key agreement process to produce a shared secret as the basis of an HMAC or discrete-log signature.'
section: "1"
topics:
