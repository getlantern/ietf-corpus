document: rfc-8658
kind: normative-requirement
summary: PSID-Len MUST be set to zero to indicate the PSID field is to be ignored. When non-zero (k bits), the address-sharing ratio is 2^k. After the first 'a' offset bits in the port number, the next k bits represent the PSID value.
section: 3.1.6.2
rfc2119_level: MUST
topics:
    - radius
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
