document: rfc-4951
kind: wire-format
summary: The Suggested Control Sequence AVP (Attribute Type 78) carries a 16-bit Suggested Ns and 16-bit Suggested Nr field. It is optional (M-bit = 0) and MAY be hidden. When present in an SCCRP during recovery tunnel establishment, the recovery endpoint MUST adopt these Ns/Nr values for the recovered tunnel.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
