document: rfc-2131
kind: interoperability-note
summary: If a DHCP server has no record of a client sending DHCPREQUEST in INIT-REBOOT state, the server MUST remain silent (rather than sending DHCPNAK) to allow peaceful coexistence of multiple non-communicating DHCP servers on the same network segment.
section: 4.3.2
topics:
    - ip
