document: rfc-7275
kind: wire-format
summary: The ICC Header consists of a 1-bit U-bit, 15-bit Message Type (range 0x0700–0x070F), 16-bit Message Length (excluding U-bit/Type/Length), 32-bit Message ID, and a mandatory ICC RG ID TLV (Type=0x0005, Length=4, 32-bit RG ID value; 0x00000000 is reserved), followed by Mandatory and Optional ICC Parameters.
