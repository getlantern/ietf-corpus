document: rfc-3620
kind: normative-requirement
summary: The TUNNEL profile MUST NOT be advertised in any greetings after transport security (such as TLS) has been negotiated over the session, because the semantics for the TUNNEL profile are ill-defined in that context.
section: "5"
rfc2119_level: MUST NOT
topics:
