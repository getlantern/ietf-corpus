kind: protocol-element
summary: PolicyQualifierInfo objects may optionally appear within the PolicyInformation sequence of the certificate policies extension, as defined in RFC 5280 Section 4.2.1.4. RFC 7318 explicitly permits at most one such object in RPKI certificates.
