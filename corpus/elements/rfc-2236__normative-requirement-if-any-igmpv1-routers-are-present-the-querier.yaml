document: rfc-2236
kind: normative-requirement
summary: If any IGMPv1 routers are present, the querier MUST use IGMPv1 mode. This must be administratively configured; there is no reliable way to dynamically detect IGMPv1 routers. In the absence of explicit configuration, the default MUST be IGMPv2.
section: "4"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
