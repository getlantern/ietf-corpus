document: rfc-6188
kind: security-consideration
summary: AES-256 SHOULD be used whenever the highest possible security is desired. AES-192 MAY be used when security higher than AES-128 is desired. Related-key attacks from the theoretical literature are not applicable because keys are generated from a strong pseudo-random source.
section: "6"
rfc2119_level: SHOULD
