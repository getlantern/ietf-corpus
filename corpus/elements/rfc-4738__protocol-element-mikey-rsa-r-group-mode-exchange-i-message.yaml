document: rfc-4738
kind: protocol-element
summary: 'MIKEY-RSA-R group mode exchange: I_MESSAGE = HDR, T, [RAND], [IDi|CERTi], [IDr], SIGNi (no SP payload). R_MESSAGE = HDR, GenExt(CSB_ID), T, RAND, [IDr|CERTr], SP, KEMAC, PKE, SIGNr. In group mode, CSB_ID, RAND, and SP in R_MESSAGE are mandatory.'
