document: rfc-9355
kind: design-rationale
summary: Strict-mode is designed so that adjacency blocking applies only when both neighbors advertise BFD strict-mode, allowing OSPF operation in environments where not all routers support or have BFD enabled. This bilateral signaling approach preserves interoperability.
