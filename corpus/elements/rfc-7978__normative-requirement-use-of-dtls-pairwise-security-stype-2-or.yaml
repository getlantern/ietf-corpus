document: rfc-7978
kind: normative-requirement
summary: Use of DTLS Pairwise Security (SType = 2) or Composite Security (SType = 3) is RECOMMENDED. IS-IS CRYPTO_AUTH-Based Authentication (SType = 1) is NOT RECOMMENDED because it provides only authentication without key negotiation and does not meet current security standards.
