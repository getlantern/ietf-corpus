document: rfc-7372
kind: security-consideration
summary: Use of these authentication failure status codes reveals local policy with respect to email authentication, which can be exploited by actors attempting to deliver undesired mail. Operators who wish to conceal this aspect of local policy may continue using generic codes such as 5.7.7, 5.7.1, or 5.7.0.
section: "5"
topics:
    - email
    - security
