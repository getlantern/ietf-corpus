document: rfc-2207
kind: registry
summary: 'IANA is directed to manage a vDstPort registry analogous to UDP/TCP ports: value 0 is illegal, 1–10 are reserved (contact authors), 11–8191 are assigned by IANA upon request (requiring point of contact, intended use description, and short name), and 8192–65535 are dynamic.'
