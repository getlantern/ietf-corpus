document: rfc-7470
kind: design-rationale
summary: 'RFC 7470 was created to obsolete RFC 7150 for two reasons: to clarify that the VENDOR-INFORMATION-TLV is available in any PCEP object (existing or future) that supports TLVs, and to allocate a different Object-Class code point (34 instead of 32) due to an inadvertent clash with codepoints used in a deployed Internet-Draft without IANA allocation.'
section: "1"
