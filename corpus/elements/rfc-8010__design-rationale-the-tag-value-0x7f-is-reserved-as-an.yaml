document: rfc-8010
kind: design-rationale
summary: 'The tag value 0x7f is reserved as an extension mechanism: when this tag appears, the first four bytes of the value field are interpreted as the actual tag value, enabling type definitions beyond the 255 values available with a single byte without breaking parsers unaware of this extension.'
section: 3.5.2
topics:
