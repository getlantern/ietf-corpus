document: rfc-8249
kind: interoperability-note
summary: Mixed deployments of Lz-ignorant and Lz-aware RBridges are supported. Lz-ignorant RBridges format PDUs no greater than Sz (always valid since Lz >= Sz); Lz-aware RBridges can send larger link-local PDUs that Lz-ignorant receivers can handle because those receivers' originatingL1LSPBufferSize was tested at or above Lz.
section: "8"
topics:
    - routing
