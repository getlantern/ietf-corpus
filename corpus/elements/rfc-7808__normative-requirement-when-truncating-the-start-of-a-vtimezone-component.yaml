document: rfc-7808
kind: normative-requirement
summary: When truncating the start of a VTIMEZONE component, the server MUST include exactly one STANDARD or DAYLIGHT subcomponent whose DTSTART matches the truncation range start point, with appropriate TZOFFSETFROM and TZOFFSETTO values.
section: "3.9"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
