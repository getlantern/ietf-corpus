document: rfc-8654
kind: normative-requirement
summary: It is RECOMMENDED that BGP protocol developers and implementers are conservative in their application and use of BGP Extended Messages. Future protocol specifications MUST describe how to handle peers that can only accommodate 4,096-octet messages.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - bgp
    - routing
