document: rfc-3301
kind: protocol-element
summary: The Bearer Type AVP is extended with a B bit indicating broadband (ATM) access is requested; in OCRQ all three bits (B, A, D) may be set together, permitting any bearer type. The B bit SHOULD only be set if broadband capability was indicated at tunnel establishment.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
