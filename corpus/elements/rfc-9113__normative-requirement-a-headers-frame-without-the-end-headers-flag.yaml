document: rfc-9113
kind: normative-requirement
summary: A HEADERS frame without the END_HEADERS flag set MUST be followed by CONTINUATION frames for the same stream with no interleaved frames of any other type or from any other stream. The last CONTINUATION frame has the END_HEADERS flag set.
section: "4.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
