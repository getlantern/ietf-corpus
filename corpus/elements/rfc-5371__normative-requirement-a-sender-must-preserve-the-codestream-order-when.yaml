document: rfc-5371
kind: normative-requirement
summary: A sender MUST preserve the codestream order when packing packetization units into RTP packets. A fragmented packetization unit MUST NOT be packed with the succeeding packetization unit within the same RTP packet.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
