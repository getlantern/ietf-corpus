document: rfc-8471
kind: design-rationale
summary: The Token Binding protocol intentionally does not define how security tokens are bound to the TLS layer (e.g., embedding Token Binding ID in the token vs. maintaining a mapping database), leaving this application-specific. This keeps the core protocol narrowly scoped while allowing flexibility for diverse application contexts.
section: "5"
topics:
