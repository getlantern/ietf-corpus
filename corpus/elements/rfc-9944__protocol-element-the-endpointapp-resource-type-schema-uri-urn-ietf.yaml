document: rfc-9944
kind: protocol-element
summary: The EndpointApp resource type (schema URI urn:ietf:params:scim:schemas:core:2.0:EndpointApp) represents client applications that control or receive telemetry from devices. Key attributes include applicationType (deviceControl or telemetry, required, immutable), applicationName (required), clientToken (up to 500 characters, read-only, generated if no certificateInfo), and the complex certificateInfo attribute.
