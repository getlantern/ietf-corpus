document: rfc-6415
kind: protocol-element
summary: A 'Link' element with an 'href' attribute conveys a host-wide link relation between the host and a fixed target URI. A 'Link' element with a 'template' attribute conveys a resource-specific relation whose target is constructed by applying the context resource URI to the template.
section: 3.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
