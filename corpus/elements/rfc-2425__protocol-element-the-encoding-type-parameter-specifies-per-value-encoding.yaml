document: rfc-2425
kind: protocol-element
summary: The 'encoding' type parameter specifies per-value encoding. Currently only the 'b' encoding (base 64 from RFC 2047) is supported. Content-Transfer-Encoding (body-level) and the 'encoding' parameter (value-level) are independent; individual type encodings are performed first, then the whole body part is encoded.
section: 5.8.3
topics:
    - email
