document: rfc-5568
kind: normative-requirement
summary: The protocol SHOULD only be used in deployments where the probability of address collisions is extremely low, because DAD adds handover delays. DAD delay can be eliminated by setting DupAddrDetectTransmits to zero on the NAR.
section: "5.5"
rfc2119_level: SHOULD
