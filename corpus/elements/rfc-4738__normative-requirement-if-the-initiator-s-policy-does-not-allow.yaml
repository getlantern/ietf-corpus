document: rfc-4738
kind: normative-requirement
summary: If the Initiator's policy does not allow acceptance of an R_MESSAGE from any entity other than one that can assert a specific identity, the Initiator MUST include that specific identity in an IDr payload in the I_MESSAGE.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
    - security
