document: rfc-6766
kind: normative-requirement
summary: Attempts to change g9983PortConfAdminServices on a GBS-R port MUST be rejected, and a zero-length octet string SHALL be returned on read. Attempts to set this object to a list with a member value not indexing an active g9983SvcTable entry MUST also be rejected.
section: "6"
rfc2119_level: MUST
