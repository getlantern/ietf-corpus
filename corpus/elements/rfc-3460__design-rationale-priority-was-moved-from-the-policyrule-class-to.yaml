document: rfc-3460
kind: design-rationale
summary: 'Priority was moved from the PolicyRule class to the PolicySetComponent aggregation for two reasons: it generalizes priority to apply to both groups and rules, and it places priority on the relationship between parent and subordinate, making value assignment easier since the value need only be unique within the containing set.'
