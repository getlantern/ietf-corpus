summary: 'The manifest content is ASN.1 DER-encoded as a SEQUENCE containing: version [0] INTEGER DEFAULT 0, manifestNumber INTEGER (0..MAX), thisUpdate GeneralizedTime, nextUpdate GeneralizedTime, fileHashAlg OBJECT IDENTIFIER, and fileList SEQUENCE OF FileAndHash. Each FileAndHash is a SEQUENCE of file IA5String and hash BIT STRING.'
