document: rfc-854
kind: normative-requirement
summary: To prevent infinite acknowledgment loops in option negotiation, a party MUST NOT send a request to enter a mode it is already in, and MUST NOT acknowledge (respond to) an apparent request to enter a mode it is already in. A response is required only when a mode change is actually requested.
section: GENERAL CONSIDERATIONS
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
