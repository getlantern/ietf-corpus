document: rfc-4039
kind: protocol-element
summary: In the rapid commit 2-message exchange, a server responds to DHCPDISCOVER (with Rapid Commit) with a DHCPACK that includes a Rapid Commit option and fully committed address and configuration information, bypassing the DHCPOFFER/DHCPREQUEST steps.
