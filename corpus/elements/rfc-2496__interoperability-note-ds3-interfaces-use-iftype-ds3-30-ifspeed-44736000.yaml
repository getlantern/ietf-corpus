document: rfc-2496
kind: interoperability-note
summary: DS3 interfaces use ifType ds3(30), ifSpeed 44736000 (DS3) or 34368000 (E3), and ifHighSpeed 45 or 34 Mbps. ifPhysAddress should carry the Circuit Identifier string, or a zero-length octet string if none assigned.
