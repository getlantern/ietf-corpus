document: rfc-1752
kind: design-rationale
summary: The IPv6 header is simplified by dropping or making optional a number of IPv4 header fields (including the header checksum), relocating functions to extension headers, and aligning all fields. Although addresses are four times longer, the IPv6 header is only twice the size of the IPv4 header, and header checksum elimination improves router performance.
section: "12"
