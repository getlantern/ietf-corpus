document: rfc-5177
kind: security-consideration
summary: The Home Agent must verify that the source address of the outer IP header of packets arriving through the bi-directional tunnel is the Mobile Router's Care-of Address, and that the inner header source is topologically correct on the Mobile Network. This prevents nodes from using the Home Agent to launch attacks inside the protected network.
section: "10"
topics:
    - mobility
    - security
    - ip
