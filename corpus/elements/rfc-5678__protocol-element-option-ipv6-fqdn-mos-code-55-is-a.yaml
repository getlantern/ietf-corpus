document: rfc-5678
kind: protocol-element
summary: OPTION-IPv6_FQDN-MoS (code 55) is a DHCPv6 option carrying FQDNs of IEEE 802.21 Mobility Servers, with a 2-byte option code and 2-byte length; its sub-option encoding is identical to the DHCPv4 FQDN option except for the wider code and length fields.
