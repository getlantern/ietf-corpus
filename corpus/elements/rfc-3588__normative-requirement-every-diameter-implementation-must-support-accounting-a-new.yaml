document: rfc-3588
kind: normative-requirement
summary: Every Diameter implementation MUST support accounting. A new accounting application MUST NOT be created unless it defines a new command or adds new mandatory AVPs. Within an accounting command, the M bit MUST NOT be set on AVPs irrelevant to billing, even if M is set when the same AVP appears in auth commands.
section: 1.2.4
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
