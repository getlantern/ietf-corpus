document: rfc-8667
kind: protocol-element
summary: The Multi-Topology SID/Label Binding TLV (Type 150) extends the SID/Label Binding TLV to support Multi-Topology IS-IS (M-ISIS) by prepending a 2-octet MT ID field. The TLV MUST be ignored if the MT ID is zero to preserve consistent view of the standard unicast topology.
section: "2.5"
topics:
    - routing
    - mpls
