document: rfc-5568
kind: normative-requirement
summary: Routers implementing this specification MUST implement at least the default buffered-packet forwarding algorithm based on original arrival rates. A maximum of 5 packets MAY be sent consecutively; all subsequent packets SHOULD use a rate metered by the buffer's arrival rate, potentially with smoothing techniques.
section: "5.4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
