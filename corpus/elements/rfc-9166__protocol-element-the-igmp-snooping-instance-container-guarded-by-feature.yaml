document: rfc-9166
kind: protocol-element
summary: The igmp-snooping-instance container (guarded by feature igmp-snooping) augments /rt:routing/rt:control-plane-protocols/rt:control-plane-protocol and holds all IGMP snooping configuration and state for IPv4. One instance corresponds to one bridge instance and is referenced by bridge or VLAN nodes.
