document: rfc-4893
kind: normative-requirement
summary: When communicating with an OLD BGP speaker, a NEW speaker MUST send AS path information in AS_PATH encoded with 2-octet AS numbers, and MUST also send AS4_PATH (encoded with 4-octet AS numbers) except when the entire AS path is composed of 2-octet AS numbers only.
section: 4.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
