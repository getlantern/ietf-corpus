document: rfc-5790
kind: state-machine
summary: 'On receiving Current-State Records, an LW-IGMPv3 router applies: IS_IN(B) → new source list is A+B with (B)=GMI; IS_EX({}) → source list unchanged at A, G_Timer reset to GMI. These rules apply uniformly regardless of the current G_Timer value, simplifying processing compared to the full version.'
section: "5.3"
topics:
