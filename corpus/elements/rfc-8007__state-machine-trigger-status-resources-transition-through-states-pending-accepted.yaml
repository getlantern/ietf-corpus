document: rfc-8007
kind: state-machine
summary: 'Trigger Status Resources transition through states: pending (accepted, not yet acted upon) → active (currently being processed) → complete (successfully finished) or failed (could not complete). Additional states include processed (accepted, no further status updates), cancelling (cancellation requested but not yet complete), and cancelled (successfully cancelled).'
