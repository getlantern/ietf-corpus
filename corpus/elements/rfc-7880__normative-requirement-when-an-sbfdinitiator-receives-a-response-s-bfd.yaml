document: rfc-7880
kind: normative-requirement
summary: When an SBFDInitiator receives a response S-BFD Control packet with State=AdminDown, it MUST NOT conclude that the remote entity is unreachable, and MUST back off its packet transmission interval to no faster than 1 second.
section: 7.3.3
rfc2119_level: MUST
topics:
    - realtime
