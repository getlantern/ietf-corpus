document: rfc-3768
kind: design-rationale
summary: The protocol is optimized for two-router topologies with distinct path preferences (the common case), resulting in minimal runtime state, a single message type, and a single sender. When more than two equal-priority routers exist, brief duplicate forwarding during Master election is an accepted trade-off for protocol simplicity.
