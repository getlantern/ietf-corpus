document: rfc-2147
kind: normative-requirement
summary: When an MSS value of 65535 is received, it is to be treated as infinity, and MTU discovery starting with the MTU of the outgoing interface is used to determine the actual MSS.
section: "3.1"
rfc2119_level: MUST
