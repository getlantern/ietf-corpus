document: rfc-4412
kind: normative-requirement
summary: 'If a SIP request contains Require: resource-priority, a UAS that does not support this extension MUST respond with 420 (Bad Extension) and list ''resource-priority'' in the Unsupported header field. Use of resource-priority in Proxy-Require is NOT RECOMMENDED.'
section: "4.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
