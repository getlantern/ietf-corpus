document: rfc-2842
kind: interoperability-note
summary: A BGP speaker detects that its peer doesn't support capabilities advertisement when it receives a NOTIFICATION with Error Subcode 'Unsupported Optional Parameter' in response to an OPEN carrying the Capabilities Optional Parameter, and should fall back to a connection without the Capabilities parameter.
