document: rfc-2634
kind: normative-requirement
summary: A signerInfo MUST NOT include multiple instances of any ESS-defined attribute type. Furthermore, if an ESS attribute type is present in a signerInfo, its attrValues SET MUST contain exactly one AttributeValue — zero or multiple instances are not permitted.
section: 1.3.4
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
