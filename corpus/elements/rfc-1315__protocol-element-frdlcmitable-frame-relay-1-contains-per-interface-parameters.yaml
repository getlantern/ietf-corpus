document: rfc-1315
kind: protocol-element
summary: frDlcmiTable (frame-relay 1) contains per-interface parameters for the Data Link Connection Management Interface, indexed by frDlcmiIfIndex. It configures LMI scheme, address format, polling timers, error thresholds, maximum VCs, and multicast capability.
