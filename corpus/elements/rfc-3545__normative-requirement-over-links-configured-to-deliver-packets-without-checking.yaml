document: rfc-3545
kind: normative-requirement
summary: Over links configured to deliver packets without checking for errors, the compressor SHOULD add HDRCKSUM if a UDP checksum is not present, and the decompressor SHOULD validate each reconstructed packet to ensure at least the headers are correct.
section: "2.2"
rfc2119_level: SHOULD
