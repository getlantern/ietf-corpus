document: rfc-4235
kind: design-rationale
summary: The FSM is extended to include states before a full dialog exists (Trying, Proceeding) so that 'half-dialogs'—where only call-id and local-tag are known—can be represented. This allows dialog state to be reported from the moment an INVITE is sent, not just after a tagged response.
section: 3.7.1
topics:
    - sip
    - realtime
