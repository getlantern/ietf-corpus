document: rfc-4203
kind: protocol-element
summary: The Interface Switching Capability Descriptor sub-TLV may occur more than once within the Link TLV to support interfaces with multiple switching capability descriptors. By contrast, the Link Protection Type and SRLG sub-TLVs may each occur at most once.
section: "1.4"
topics:
