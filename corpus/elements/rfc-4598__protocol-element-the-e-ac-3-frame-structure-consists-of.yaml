document: rfc-4598
kind: protocol-element
summary: The E-AC-3 frame structure consists of a Sync Information (SI) field, Bit Stream Information (BSI) field, Audio Frame (AF) field, up to six Audio Blocks (AB), an optional auxiliary data field (AUX), and a CRC field. Each AB represents 256 PCM samples per channel.
