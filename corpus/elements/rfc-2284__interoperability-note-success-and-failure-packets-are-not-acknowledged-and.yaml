document: rfc-2284
kind: interoperability-note
summary: Success and Failure packets are not acknowledged and may be lost. A peer MUST allow for this circumstance. The peer can use receipt of a Network Protocol packet as an alternative indication of Success, and a LCP Terminate-Request as an indication of Failure.
section: 2.2.2
topics:
    - security
