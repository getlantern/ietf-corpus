document: rfc-5848
kind: normative-requirement
summary: Syslog-sign messages (Signature Block messages and Certificate Block messages) MUST NOT themselves be signed by a Signature Block. Collectors know to process these differently from normal messages.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - syslog
    - security
