document: rfc-8587
kind: protocol-element
summary: Trunking is defined as a situation in which multiple distinct network addresses are connected to the same NFS server instance. Two such addresses are described as 'server-trunkable'. NFSv4.0 recognizes only a single type of trunking relationship between addresses, unlike later minor versions.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
