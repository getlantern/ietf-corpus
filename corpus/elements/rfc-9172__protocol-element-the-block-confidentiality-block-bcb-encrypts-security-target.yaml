document: rfc-9172
kind: protocol-element
summary: The Block Confidentiality Block (BCB) encrypts security target block-type-specific data in-place so the target contains ciphertext after processing. BCBs MUST use an AEAD cipher and MUST NOT target another BCB or the primary block.
