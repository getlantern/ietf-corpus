document: rfc-5283
kind: design-rationale
summary: This procedure reduces IGP LSDB size and FIB entries (improving IP router scaling) but does not reduce LFIB entries, so it is insufficient alone to solve MPLS router scaling. Additional MPLS hierarchy in LDP would be needed for that, which is out of scope.
