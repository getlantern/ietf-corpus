document: rfc-2658
kind: design-rationale
summary: The restriction that senders may never increase bundling or interleave values (only decrease them) guarantees that a receiver can allocate a fixed, sufficient buffer after the first packet, preventing situations where the receiver needs more buffer space mid-session (possibly unavailable) or must pause playback.
