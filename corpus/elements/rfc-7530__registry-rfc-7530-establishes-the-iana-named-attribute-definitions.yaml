document: rfc-7530
kind: registry
summary: RFC 7530 establishes the IANA 'Named Attribute Definitions' registry for NFSv4 named attributes. The initial registry is empty; new entries require IETF Review. Updating existing registrations also requires IETF Review per Section 20.1.2.
