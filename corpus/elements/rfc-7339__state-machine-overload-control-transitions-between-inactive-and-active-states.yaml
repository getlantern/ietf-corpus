document: rfc-7339
kind: state-machine
summary: 'Overload control transitions between inactive and active states per downstream server: inactive when no valid "oc" context exists or "oc-validity" has expired; active when a non-expired "oc" value is held. The transition to inactive is triggered by expiry of the validity period or receipt of "oc-validity=0".'
section: "5"
topics:
