document: rfc-3412
kind: normative-requirement
summary: Values for msgID SHOULD be generated in a manner that avoids re-use of any outstanding values to provide protection against replay attacks. A new msgID value SHOULD be used for each retransmission of a request.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
