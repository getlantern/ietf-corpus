document: rfc-8534
kind: protocol-element
summary: The 'Leaf Information Required per Flow' (LIR-pF) flag is a new flag defined in the Flags field of the PMSI Tunnel attribute (PTA). It may be set in the PTA of a (C-*,C-*), (C-*,C-G), or (C-S,C-*) S-PMSI A-D route, or in a Leaf A-D route, to enable per-flow explicit tracking via a single wildcard route.
section: "2"
topics:
