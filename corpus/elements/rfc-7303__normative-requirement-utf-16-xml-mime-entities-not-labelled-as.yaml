document: rfc-7303
kind: normative-requirement
summary: UTF-16 XML MIME entities not labelled as 'utf-16le' or 'utf-16be' MUST begin with a BOM (U+FEFF). When encoded as utf-16le or utf-16be, the entity MUST NOT begin with a BOM but SHOULD contain an in-band XML encoding declaration.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
