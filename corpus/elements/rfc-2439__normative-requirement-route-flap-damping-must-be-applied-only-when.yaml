document: rfc-2439
kind: normative-requirement
summary: Route flap damping MUST be applied only when receiving updates from external peers (EBGP). Applying this technique to IBGP learned routes or to advertisements to IBGP or EBGP peers after route selection can result in routing loops.
section: "4"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
