document: rfc-9780
kind: interoperability-note
summary: For active tail head notification over P2MP MPLS LSP, BFD Control packets MAY be IP/UDP encapsulated with the ingress LSR's destination address and UDP port 4784 (per RFC 5883), or non-IP encapsulated using PW-ACH with Channel Type 0x0007 (per RFC 5885).
