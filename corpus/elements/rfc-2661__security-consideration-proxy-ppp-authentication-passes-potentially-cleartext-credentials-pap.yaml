document: rfc-2661
kind: security-consideration
summary: Proxy PPP authentication passes potentially cleartext credentials (PAP passwords, MSCHAPv1 responses) from the LAC to the LNS inside AVPs. AVP hiding is recommended for these fields, but the underlying shared-secret-based hiding is not cryptographically strong; IPsec is recommended for environments requiring stronger protection.
section: "9.5"
topics:
    - vpn
    - security
