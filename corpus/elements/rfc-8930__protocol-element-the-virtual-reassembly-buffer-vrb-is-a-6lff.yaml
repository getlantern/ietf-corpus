document: rfc-8930
kind: protocol-element
summary: 'The Virtual Reassembly Buffer (VRB) is a 6LFF implementation that stores per-flow state containing: predecessor and successor link-layer addresses, the incoming Datagram_Tag, the locally assigned outgoing Datagram_Tag, an optional buffer for fragment remainder bytes, and a timeout timer. It can be implemented without changes to RFC 4944.'
section: "6"
topics:
