document: rfc-6283
kind: security-consideration
summary: Cryptographic algorithms used within Archive Time-Stamps must always be secure at the time of generation. Publications on security suitability of cryptographic algorithms (e.g., NIST SP 800-57, ETSI TS 102-176) must be considered during verification.
