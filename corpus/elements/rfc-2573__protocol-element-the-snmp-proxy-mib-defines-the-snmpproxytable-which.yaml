document: rfc-2573
kind: protocol-element
summary: The SNMP-PROXY-MIB defines the snmpProxyTable, which maps incoming management target parameters (contextEngineID, contextName, target address, SNMP version) to outgoing management target parameters for forwarding. The table uses snmpProxyType to distinguish request forwarding from notification forwarding entries.
