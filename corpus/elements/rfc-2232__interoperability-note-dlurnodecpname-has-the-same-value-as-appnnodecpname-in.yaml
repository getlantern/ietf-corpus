document: rfc-2232
kind: interoperability-note
summary: dlurNodeCpName has the same value as appnNodeCpName in the APPN MIB when both refer to the same APPN node. Similarly, dlurPuLsName equals appnLsName in the APPN MIB when identifying the same link station, and dlurPuDefBackupDlusPuName equals dlurPuName when identifying the same PU.
section: "4.1"
