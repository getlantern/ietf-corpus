document: rfc-5216
kind: interoperability-note
summary: A privacy-configured EAP-TLS peer typically cannot authenticate with a server that does not support privacy, as non-privacy servers treat an empty certificate list as a terminal error. EAP-TLS peers SHOULD therefore only be configured for privacy on networks known to support it.
section: 2.1.4
topics:
    - tls
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
