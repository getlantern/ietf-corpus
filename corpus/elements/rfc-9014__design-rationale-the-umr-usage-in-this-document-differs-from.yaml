document: rfc-9014
kind: design-rationale
summary: 'The UMR usage in this document differs from RFC 7543: RFC 7543 uses UMR to route V-spoke-to-V-spoke traffic through a Default MAC Gateway until direct MAC addresses are learned. Here, leaf-to-leaf communication within the same DC is always direct; the UMR only directs unknown unicast destined for remote DCs toward the GW.'
section: 3.5.1
topics:
    - routing
    - bgp
