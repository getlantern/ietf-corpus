document: rfc-4861
kind: protocol-element
summary: Neighbor Advertisement (ICMPv6 Type 136) is sent in response to Neighbor Solicitations or unsolicited to announce link-layer address changes. It carries R (router), S (solicited), and O (override) flag bits plus a 128-bit Target Address.
