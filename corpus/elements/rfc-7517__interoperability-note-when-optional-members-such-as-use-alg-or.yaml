document: rfc-7517
kind: interoperability-note
summary: When optional members such as "use", "alg", or "key_ops" are present alongside X.509 certificate parameters ("x5u", "x5c", "x5t", "x5t#S256"), including them may improve interoperability for applications that do not handle PKIX certificates, though doing so is not required.
