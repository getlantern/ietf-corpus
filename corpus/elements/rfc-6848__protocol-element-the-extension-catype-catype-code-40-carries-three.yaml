document: rfc-6848
kind: protocol-element
summary: 'The extension CAtype (CAtype code 40) carries three whitespace-separated values: a namespace URI, the local name of the XML element, and the text content of that element. This allows unsupported XML civic address extensions to be conveyed in DHCP without requiring the translating entity to understand the extension.'
section: "3.2"
topics:
    - registry
