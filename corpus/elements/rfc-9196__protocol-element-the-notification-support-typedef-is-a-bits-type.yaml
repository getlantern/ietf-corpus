kind: protocol-element
summary: 'The notification-support typedef is a bits type with two bits: config-changes (publisher can send notifications for ''config true'' nodes) and state-changes (publisher can send notifications for ''config false'' nodes). It is used by periodic-notifications-supported and on-change-supported leaves.'
