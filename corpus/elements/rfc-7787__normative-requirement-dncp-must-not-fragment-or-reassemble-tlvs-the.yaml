document: rfc-7787
kind: normative-requirement
summary: DNCP MUST NOT fragment or reassemble TLVs; the underlying transport MUST perform fragmentation/reassembly if necessary. TLVs SHOULD be sent together where MTU permits.
section: "4.2"
rfc2119_level: MUST
