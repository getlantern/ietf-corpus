document: rfc-7159
kind: design-rationale
summary: RFC 7159 generalizes the definition of a JSON text from 'must be an object or array' (RFC 4627) to 'any JSON value'. This change reflects real-world usage and removes an inconsistency with other JSON specifications, while noting that generators producing only objects or arrays remain interoperable.
section: "1.3"
topics:
    - json
