document: rfc-7180
kind: normative-requirement
summary: TRILL Switches SHOULD support the IS-IS graceful restart features specified in RFC 5306, allowing a restarting IS-IS router to signal neighbors and reestablish adjacencies without cycling through the down state while correctly initiating link-state database synchronization.
section: "8"
rfc2119_level: SHOULD
