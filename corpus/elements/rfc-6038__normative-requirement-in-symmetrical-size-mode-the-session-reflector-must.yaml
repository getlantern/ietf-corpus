document: rfc-6038
kind: normative-requirement
summary: In Symmetrical Size mode, the Session-Reflector MUST construct its test packet using information from the Session-Sender's test packet, and the length of the Session-Reflector's test packet SHALL equal the length of the Session-Sender's test packet.
