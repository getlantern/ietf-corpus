document: rfc-2347
kind: design-rationale
summary: 'The option negotiation mechanism is backward-compatible: options are appended to existing RRQ/WRQ packet formats so legacy servers silently ignore them and fall back to standard TFTP behavior. The request-respond-acknowledge sequence mirrors TFTP''s own lock-step design to keep the mechanism simple.'
section: Introduction
