document: rfc-3807
kind: wire-format
summary: 'The Interface Identifier integer format encodes a 27-bit Link Identifier (identifying an E1 link on the SG, must be unique on the SG) in the high bits and a 5-bit Channel ID (time slot number: 15, 16, or 31 for C-channels) in the low bits. For Link Management Messages, Chnl ID MUST be set to 0.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
