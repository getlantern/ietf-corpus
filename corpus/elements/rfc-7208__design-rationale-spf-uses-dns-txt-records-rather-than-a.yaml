document: rfc-7208
kind: design-rationale
summary: 'SPF uses DNS TXT records rather than a dedicated SPF RR type because the SPFbis working group found that the RFC 4408 dual-RR model was fundamentally flawed: no RR type was simultaneously required to serve and to check, leading to negligible SPF RR adoption and interoperability problems.'
section: "3.1"
topics:
