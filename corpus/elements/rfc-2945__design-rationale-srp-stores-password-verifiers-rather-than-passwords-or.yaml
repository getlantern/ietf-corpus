document: rfc-2945
kind: design-rationale
summary: SRP stores password verifiers rather than passwords or simple hashes, so even if the host's password database is publicly revealed, an attacker still requires an expensive dictionary search using exponentiation (much more costly than the hash-based checks used by most UNIX systems).
