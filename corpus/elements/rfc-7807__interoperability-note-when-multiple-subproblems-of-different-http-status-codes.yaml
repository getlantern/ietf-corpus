document: rfc-7807
kind: interoperability-note
summary: When multiple subproblems of different HTTP status codes must be conveyed in one response, the 207 (Multi-Status) code can be used to encapsulate multiple status messages, since all subproblems in a single problem details object share the same HTTP status code.
