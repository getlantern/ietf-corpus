document: rfc-2533
kind: protocol-element
summary: 'The canonical (disjunctive normal) form of a feature predicate has at most three levels: an outermost ''(|...)'' disjunction of ''(&...)'' conjunctions of possibly negated simple feature comparisons. This form is required for the matching algorithm to work reliably.'
