document: rfc-6395
kind: design-rationale
summary: The Interface Identifier option need only be included in PIM Hello messages if the router supports protocols that require it, but an implementation MAY always include it. Uniqueness requirements are delegated to the specifications of PIM protocols that use the option.
section: "2"
topics:
    - multicast
    - routing
