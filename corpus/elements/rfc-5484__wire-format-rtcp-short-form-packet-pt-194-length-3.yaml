document: rfc-5484
kind: wire-format
summary: 'RTCP short-form packet (PT=194, length=3): four 32-bit words — common header, SSRC of packet sender, RTP timestamp, and compact time-code fields (S/hours/minutes/seconds/frames) with 8 reserved bits. Long form (length=4): five 32-bit words with the compact time-code word replaced by two words carrying the full 8-byte SMPTE 12M time-code.'
