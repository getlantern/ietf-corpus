document: rfc-4983
kind: design-rationale
summary: Notifications in this MIB are generated by control-plane events (SCR/RSCN/SW_RSCN rejections) that cannot start a chain reaction, so the extra complexity of flow-controlling these notifications is not warranted; no suppression counters or end-of-interval notifications are defined.
section: 5.5.1
topics:
