document: rfc-9074
kind: normative-requirement
summary: When a snooze alarm is triggered, the client MUST update the ACKNOWLEDGED property on the original related alarm. If the snooze alarm is itself snoozed, the client MUST remove the snooze alarm component and repeat the snooze procedure.
section: "7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
