document: rfc-5251
kind: normative-requirement
summary: A PE is REQUIRED to maintain a PIT for each L1VPN for which it has member CEs locally attached. A PE does not need to maintain PITs for other L1VPNs, though the full set of PITs for multiple VPNs MAY be available to all PEs.
section: "4.1"
rfc2119_level: REQUIRED
topics:
    - vpn
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
