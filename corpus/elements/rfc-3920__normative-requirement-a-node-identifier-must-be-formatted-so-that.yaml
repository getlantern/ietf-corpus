document: rfc-3920
kind: normative-requirement
summary: A node identifier MUST be formatted so that the Nodeprep profile of STRINGPREP can be applied without failing. A server MUST (and a client SHOULD) apply Nodeprep before comparing two node identifiers.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
