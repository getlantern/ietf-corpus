document: rfc-6570
kind: protocol-element
summary: Path-style parameter expansion (";" operator) appends ";varname" and omits "=" when the variable value is empty. Form-style query expansion ("?" operator) always appends "=" even when the value is empty, following HTML form conventions.
section: 3.2.7
topics:
