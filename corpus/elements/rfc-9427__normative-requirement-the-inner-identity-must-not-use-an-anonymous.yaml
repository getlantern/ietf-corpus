document: rfc-9427
kind: normative-requirement
summary: The inner identity MUST NOT use an anonymous NAI realm. EAP servers MUST cause authentication to fail if an EAP peer uses an anonymous inner identity. Implementations SHOULD NOT use inner identities that contain an NAI realm when a single-realm organization is sufficient.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
