document: rfc-8450
kind: normative-requirement
summary: Each RTP packet MUST carry data corresponding to a single Parse Info Header and its Data Unit. A single packet MAY NOT contain data from more than one Parse Info Header or Data Unit, and a single Parse Info Header/Data Unit pair MUST NOT be split across more than one packet. The sole exception is Auxiliary Data, which MAY be split across multiple packets using B and E flags.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
