summary: Eleven SR Segment Types (A through K) are defined covering SR-MPLS labels, SRv6 SIDs, IPv4/IPv6 prefix SIDs, and adjacency SIDs with descriptors ranging from a simple algorithm byte (Types A and B) to pairs of 16-octet IPv6 addresses plus interface IDs (Types G, J, K).
