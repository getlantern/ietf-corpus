document: rfc-7532
kind: protocol-element
summary: An NFS URI extends the NFS URL scheme (RFC 2224) to capture the location of an NFSv4 fileset. It encodes the rootpath as a URI path component and the server hostname as the authority component. NFSv4 pathnames are evaluated relative to the fileserver's pseudoroot, not a public filehandle.
section: 2.8.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
