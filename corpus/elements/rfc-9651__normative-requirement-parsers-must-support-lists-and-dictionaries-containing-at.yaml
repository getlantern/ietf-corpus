document: rfc-9651
kind: normative-requirement
summary: Parsers MUST support Lists and Dictionaries containing at least 1024 members/key-value pairs, Inner Lists with at least 256 members, at least 256 Parameters on an Item or Inner List, and Parameter/Dictionary keys with at least 64 characters.
