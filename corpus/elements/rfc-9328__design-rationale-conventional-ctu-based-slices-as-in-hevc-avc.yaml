document: rfc-9328
kind: design-rationale
summary: Conventional CTU-based slices (as in HEVC/AVC) were removed from VVC because slice-based error concealment became practically impossible with modern prediction tools, network conditions have greatly improved, and transport-level error resilience (retransmission, FEC, IRAP insertion) is now the standard approach for low-delay error resilience applications.
section: 1.1.3
topics:
