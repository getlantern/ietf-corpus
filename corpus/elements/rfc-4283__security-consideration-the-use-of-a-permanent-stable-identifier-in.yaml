document: rfc-4283
kind: security-consideration
summary: The use of a permanent, stable identifier in the Mobile Node Identifier option may compromise user privacy by making it possible to track a particular device or user across different locations. The vulnerabilities are similar to those already present in Mobile IPv6's Home Address option.
section: "4.1"
topics:
    - security
    - privacy
    - ip
    - mobility
