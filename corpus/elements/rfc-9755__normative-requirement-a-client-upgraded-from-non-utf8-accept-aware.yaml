document: rfc-9755
kind: normative-requirement
summary: A client upgraded from non-UTF8=ACCEPT-aware status MUST discard its cache of messages downloaded from the server, to cope with the case where a server returns the same UIDVALIDITY to both legacy and UTF8=ACCEPT-aware clients.
section: "8"
rfc2119_level: MUST
