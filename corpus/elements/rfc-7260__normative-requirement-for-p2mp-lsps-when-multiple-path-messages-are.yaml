document: rfc-7260
kind: normative-requirement
summary: For P2MP LSPs, when multiple Path messages are used, the root node MUST include the same OAM configuration information in all Path messages. Each branching node MUST copy the OAM configuration unchanged (Admin_Status bits, LSP attribute flags, OAM Configuration TLV) into downstream Path messages.
section: "4.5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
