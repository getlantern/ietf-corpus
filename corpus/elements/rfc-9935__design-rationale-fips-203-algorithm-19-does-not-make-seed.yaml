document: rfc-9935
kind: design-rationale
summary: FIPS 203 Algorithm 19 does not make seed values available to callers for serialization. This document proposes Algorithm 19b as an extension that returns (ek, dk, d, z), and promotes Algorithm 16 (ML-KEM.KeyGen_internal) to a 'main algorithm' for external use in expanding keys from seeds.
