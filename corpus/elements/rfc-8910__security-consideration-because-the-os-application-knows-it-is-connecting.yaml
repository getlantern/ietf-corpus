document: rfc-8910
kind: security-consideration
summary: Because the OS/application knows it is connecting to a captive portal (as opposed to an intercepted connection), it can render the captive portal page in a sandboxed environment and clearly label the page as untrusted, mitigating risks from attacker-injected portal URIs.
