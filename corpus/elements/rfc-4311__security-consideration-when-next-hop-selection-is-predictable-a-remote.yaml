document: rfc-4311
kind: security-consideration
summary: When next-hop selection is predictable, a remote application can synthesize traffic that hashes identically, enabling a denial-of-service attack against the load-sharing algorithm and overloading a particular router. Using unpredictable hashing makes such attacks harder.
section: "3"
topics:
    - security
    - ip
    - v6ops
