document: rfc-6038
kind: protocol-element
summary: The Reflect Octets feature allows the Server/Session-Reflector to return designated padding octets back to the Control-Client/Session-Sender in both TWAMP-Control and TWAMP-Test protocols, enabling the sender to embed index or identification octets with assurance they will be echoed.
