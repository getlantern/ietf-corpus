document: rfc-6031
kind: design-rationale
summary: 'A straightforward type-mapping from XML Schema (RFC 6030) to ASN.1 is employed: xs:string maps to UTF8String, xs:dateTime maps to GeneralizedTime, and XML integer types map to INTEGER or BinaryTime (RFC 6019), minimizing implementation divergence between XML-based PSKC and ASN.1-based symmetric key packages.'
