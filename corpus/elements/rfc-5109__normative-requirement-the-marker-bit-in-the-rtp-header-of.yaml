document: rfc-5109
kind: normative-requirement
summary: The Marker bit in the RTP header of FEC packets SHALL be set to 0. The SSRC value SHALL be the same as the SSRC of the media stream the FEC packet protects.
section: "7.2"
rfc2119_level: SHALL
