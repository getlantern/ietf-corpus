document: rfc-2910
kind: wire-format
summary: 'An attribute-with-one-value is encoded as: value-tag (1 byte specifying attribute syntax), name-length (2-byte SIGNED-SHORT), name (u bytes), value-length (2-byte SIGNED-SHORT), and value (v bytes). A name-length of zero signals an additional-value for the preceding attribute rather than a new attribute.'
section: 3.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
