document: rfc-4574
kind: design-rationale
summary: The existing 'i' attribute was unsuitable because it is intended for human users rather than automata. The 'mid' attribute was unsuitable because its scope is limited to a single SDP session and cannot identify streams across multiple SDP sessions in a broader application context.
