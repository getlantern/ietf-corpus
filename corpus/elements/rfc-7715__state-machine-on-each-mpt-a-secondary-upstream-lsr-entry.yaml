document: rfc-7715
kind: state-machine
summary: On each MPT, a secondary upstream LSR entry is maintained per FEC with label Lpx assigned to the PLR. The secondary upstream is inactive while the protected node N is reachable; upon N becoming unreachable (node failure trigger), the MPT switches to the secondary upstream LSR binding and deactivates the primary binding to N.
section: 4.1.1
topics:
    - mpls
    - routing
