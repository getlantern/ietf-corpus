document: rfc-4607
kind: normative-requirement
summary: When allocating SSM addresses dynamically, a host or host operating system MUST NOT allocate sequentially starting at the first allowed address; random allocation is RECOMMENDED to avoid link-layer address collisions on shared-medium networks.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - multicast
