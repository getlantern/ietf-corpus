document: rfc-5531
kind: registry
summary: 'The RPC Program Number registry (transferred from Sun to IANA) partitions the 32-bit space: 0x00000001–0x1fffffff assigned by IANA (starting at 400000), 0x20000000–0x3fffffff for local administrators, 0x40000000–0x5fffffff transient, remainder reserved.'
section: "13.3"
