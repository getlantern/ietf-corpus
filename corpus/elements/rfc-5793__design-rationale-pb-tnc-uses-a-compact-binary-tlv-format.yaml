document: rfc-5793
kind: design-rationale
summary: PB-TNC uses a compact binary TLV format rather than XML or text encoding to support low-bandwidth transports and low-power devices. The TLV structure also allows recipients to skip unrecognized messages by length without understanding their content.
section: "2.3"
topics:
