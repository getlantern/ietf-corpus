document: rfc-5187
kind: protocol-element
summary: A grace-LSA in OSPFv3 is defined as an LSA with LS type equal to 0x000b, LSA function code 11, with S2-bit and S1-bit set to 0 to indicate link-local flooding scope, and U-bit set to 0.
