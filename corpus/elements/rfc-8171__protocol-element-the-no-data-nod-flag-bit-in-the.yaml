document: rfc-8171
kind: protocol-element
summary: The 'No Data' (NOD) flag bit in the Interested VLANs or Interested Labels sub-TLV allows a Push Directory server to announce interest in a Data Label (to participate in ESADI) without requesting multi-destination TRILL Data packets for that label, avoiding unwanted data-plane traffic.
section: "3.8"
topics:
    - routing
