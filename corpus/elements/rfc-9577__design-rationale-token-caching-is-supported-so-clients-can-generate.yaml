document: rfc-9577
kind: design-rationale
summary: Token caching is supported so Clients can generate multiple tokens from a single TokenChallenge and store them for future use. This improves privacy by decoupling the time of issuance from the time of redemption, reducing correlation between the two events.
section: 2.1.4
topics:
    - privacy
    - http
