document: rfc-6352
kind: normative-requirement
summary: An address book collection MUST report both DAV:collection and CARDDAV:addressbook in the DAV:resourcetype property. Address book collections MUST only contain address object resources and non-address-book collections; nesting of address book collections is prohibited at any depth.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
