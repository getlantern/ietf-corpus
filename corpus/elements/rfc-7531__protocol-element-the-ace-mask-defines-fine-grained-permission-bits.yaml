summary: The ACE mask defines fine-grained permission bits including ACE4_READ_DATA/LIST_DIRECTORY (0x1), ACE4_WRITE_DATA/ADD_FILE (0x2), ACE4_EXECUTE (0x20), ACE4_DELETE (0x10000), ACE4_WRITE_ACL (0x40000), and generic composites ACE4_GENERIC_READ (0x120081), WRITE (0x160106), EXECUTE (0x1200A0).
