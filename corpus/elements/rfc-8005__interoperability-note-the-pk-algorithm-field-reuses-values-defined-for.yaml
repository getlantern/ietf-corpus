document: rfc-8005
kind: interoperability-note
summary: 'The PK algorithm field reuses values defined for the IPSECKEY RR Algorithm Type (RFC 4025): DSA (1) and RSA (2) key formats also follow IPSECKEY RR definitions. This document adds ECDSA (3) with a format based on the DNSKEY RR RDATA for ECDSA per RFC 6605.'
section: "5.2"
topics:
    - dns
    - crypto
    - pkix
    - ipsec
