document: rfc-9350
kind: normative-requirement
summary: LFA paths for a Flex-Algorithm MUST be computed using the same constraints as the primary paths for that Flex-Algorithm. LFA paths MUST only use Prefix-SIDs (SR-MPLS) or SIDs (SRv6) advertised specifically for the given Flex-Algorithm and MUST NOT use Adjacency SIDs on links pruned from the Flex-Algorithm computation.
section: "14.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
