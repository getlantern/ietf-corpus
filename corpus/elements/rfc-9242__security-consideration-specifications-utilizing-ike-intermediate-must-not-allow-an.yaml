document: rfc-9242
kind: security-consideration
summary: Specifications utilizing IKE_INTERMEDIATE MUST NOT allow an unlimited number of exchanges at the initiator's discretion. It is recommended that both peers know the exact number of IKE_INTERMEDIATE exchanges after IKE_SA_INIT; if optional use is defined, a hard cap on the maximum number MUST be specified by the corresponding specification.
section: "5"
topics:
    - ipsec
    - security
