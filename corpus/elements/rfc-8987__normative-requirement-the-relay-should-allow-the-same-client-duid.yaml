document: rfc-8987
kind: normative-requirement
summary: The relay SHOULD allow the same client DUID to have active delegated prefix leases on more than one interface simultaneously, unless DUID uniqueness is required for network functioning or security, to permit duplicate-DUID devices on separate broadcast domains.
section: "4.1"
rfc2119_level: SHOULD
