document: rfc-5954
kind: design-rationale
summary: 'URI equality for IP-address hosts is determined by binary equivalence rather than textual identity because IPv6 compressed notation and hybrid (IPv4-mapped) address forms admit multiple valid textual representations of the same address. Examples: sip:bob@[2001:db8::9:1] equals sip:bob@[2001:db8::9:01].'
section: "4.2"
topics:
    - sip
    - ip
