document: rfc-8595
kind: normative-requirement
summary: When a classifier places a packet onto an SFP, it MUST set the TTL to a value between 1 and 255. It SHOULD set this according to the expected length of the SFP but MAY set it to a larger value. The maximum TTL supported in an NSH is 63, so the practical limit may also be 63.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
