document: rfc-959
kind: wire-format
summary: 'Page structure page headers contain at minimum four one-logical-byte fields: Header Length (minimum 4), Page Index (logical page number, not transmission sequence), Data Length (minimum 0), and Page Type (0=last page, 1=simple, 2=descriptor, 3=access controlled requiring header length 5). Optional per-page control fields may follow.'
section: 3.1.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
