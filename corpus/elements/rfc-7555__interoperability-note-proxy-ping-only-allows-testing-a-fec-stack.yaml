document: rfc-7555
kind: interoperability-note
summary: Proxy Ping only allows testing a FEC stack consisting of a single FEC; the initiator cannot specify the label assigned to that FEC, nor cause additional labels to be pushed onto the label stack of the actual MPLS Echo Request.
