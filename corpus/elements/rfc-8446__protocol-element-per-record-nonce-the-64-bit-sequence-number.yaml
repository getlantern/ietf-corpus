document: rfc-8446
kind: protocol-element
summary: 'Per-record nonce: the 64-bit sequence number is left-padded with zeros to the IV length, then XORed with the static per-direction IV derived from traffic key material. The sequence number is incremented by 1 after each record is processed.'
