document: rfc-3301
kind: normative-requirement
summary: Within the ICRQ, the LAC MUST indicate a broadband bearer in the Bearer Type AVP (B bit set to 1). If the LNS does not support the B Bearer bit, it returns an error; the implementation MAY fall back to digital bearer and SHOULD refrain from using ATM extensions.
section: 3.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
