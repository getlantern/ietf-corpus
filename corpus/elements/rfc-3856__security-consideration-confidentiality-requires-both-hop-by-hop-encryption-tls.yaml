document: rfc-3856
kind: security-consideration
summary: Confidentiality requires both hop-by-hop encryption (TLS is RECOMMENDED between elements) and end-to-end encryption (S/MIME MAY be used). TLS provides scalable confidentiality and traffic analysis protection but requires transitivity of trust; S/MIME provides end-to-end protection without transitivity of trust but cannot hide all metadata.
section: "9.1"
topics:
    - sip
    - security
    - tls
    - realtime
