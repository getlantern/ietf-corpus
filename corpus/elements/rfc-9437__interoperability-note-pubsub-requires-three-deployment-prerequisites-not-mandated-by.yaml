document: rfc-9437
kind: interoperability-note
summary: 'PubSub requires three deployment prerequisites not mandated by baseline RFC 9301: (1) unique 128-bit xTR-ID plus 64-bit Site-ID per xTR, (2) Map-Servers configured for proxy Map-Replying, and (3) a security association between ITRs and Map-Servers. If any prerequisite is unmet, the network continues operating per RFC 9301 without PubSub.'
section: "3"
topics:
    - routing
