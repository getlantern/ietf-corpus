document: rfc-3744
kind: protocol-element
summary: DAV:principal-collection-set is a protected property on each resource identifying the root collections containing principals available on the server. Its scope defines where the DAV:principal-property-search REPORT operates. Servers MAY report only a subset of known collections.
section: "5.8"
topics:
    - security
