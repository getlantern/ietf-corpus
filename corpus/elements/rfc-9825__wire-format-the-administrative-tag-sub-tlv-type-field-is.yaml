document: rfc-9825
kind: wire-format
summary: The Administrative Tag Sub-TLV Type field is 16 bits set to 13 for the OSPFv2 Extended Prefix TLV Sub-TLVs registry, 39 for the OSPFv3 Extended-LSA Sub-TLVs registry, or 6 for the OSPFv3 SRv6 Locator LSA Sub-TLVs registry. The Length field is 16 bits indicating the value portion length in octets and must be a multiple of 4.
