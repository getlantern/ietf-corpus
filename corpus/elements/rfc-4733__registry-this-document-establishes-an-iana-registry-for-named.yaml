document: rfc-4733
kind: registry
summary: This document establishes an IANA registry for named telephone event codes (0–255) associated with the 'audio/telephone-event' payload type. Initial entries are DTMF events 0–15 defined in Section 3.2; remaining codes from RFC 2833 are conditionally reserved pending revival by other documents.
