document: rfc-4643
kind: normative-requirement
summary: The USER argument MUST NOT be advertised, and AUTHINFO USER/PASS commands SHOULD NOT be provided, unless a strong encryption layer (e.g., TLS) is in use or backward compatibility dictates otherwise.
section: "2.1"
rfc2119_level: MUST NOT
