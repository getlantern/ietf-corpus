document: rfc-9061
kind: normative-requirement
summary: Before an NSF can operate in the system, it MUST be registered in the I2NSF Controller. Additionally, the I2NSF Controller MUST discover certain capabilities of the NSF (supported cryptographic suites, authentication method, IKE/IKE-less support) either during registration or when the NSF first connects.
section: "4.4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
