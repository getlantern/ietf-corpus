document: rfc-6012
kind: protocol-element
summary: The syslog transport sender is always the DTLS client and the transport receiver is always the DTLS server. Session demultiplexing in UDP or DCCP is achieved by the application mapping a unique (remote address, remote port, local address, local port) tuple to a session.
section: "5.1"
