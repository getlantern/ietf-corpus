document: rfc-7285
kind: design-rationale
summary: The ALTO Protocol uses a RESTful design with JSON encoding specifically to leverage existing HTTP infrastructure, caching intermediaries, and deployment experience at scale. Using specific 'application/alto-*+json' media types (rather than generic application/json) allows easy versioning and extensibility of individual components.
section: "1.2"
topics:
    - http
    - json
