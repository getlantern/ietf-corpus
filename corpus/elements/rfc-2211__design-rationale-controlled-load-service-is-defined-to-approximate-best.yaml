document: rfc-2211
kind: design-rationale
summary: Controlled-load service is defined to approximate best-effort service under unloaded conditions rather than specifying explicit delay or loss bounds. This targets adaptive real-time applications that work well on unloaded nets but degrade quickly under overload, and deliberately avoids isochronous guarantees.
