document: rfc-3895
kind: normative-requirement
summary: Performance parameters MUST be accumulated in 15-minute intervals; up to 96 intervals (24 hours) MUST be retained. A rolling 24-hour total MUST also be maintained. Performance collection continues even when the interface is operationally down.
section: 2.4.3
rfc2119_level: MUST
topics:
    - snmp
    - measurement
