document: rfc-4340
kind: protocol-element
summary: 'Partial checksum coverage is controlled by CsCov: CsCov=0 means the full packet is covered; CsCov=1–15 means the header plus the first (CsCov−1)×4 bytes of application data are covered. This can improve performance on noisy links for applications that tolerate data corruption.'
section: "9.2"
topics:
    - udp
    - congestion
