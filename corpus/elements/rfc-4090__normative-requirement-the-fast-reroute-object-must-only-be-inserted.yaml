document: rfc-4090
kind: normative-requirement
summary: The FAST_REROUTE object MUST only be inserted into a PATH message by the head-end LER and MUST NOT be changed by downstream LSRs. If a head-end LSR signals a FAST_REROUTE object, it MUST be stored for Path refreshes.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
