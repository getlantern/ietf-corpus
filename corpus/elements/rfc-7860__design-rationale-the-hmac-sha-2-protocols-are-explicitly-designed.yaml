document: rfc-7860
kind: design-rationale
summary: The HMAC-SHA-2 protocols are explicitly designed as straightforward adaptations of HMAC-MD5-96 and HMAC-SHA-96, differing only in hash function, MAC truncation length, and key length. This minimizes implementation complexity and leverages the existing USM framework.
