document: rfc-1938
kind: normative-requirement
summary: All server implementations MUST accept case-insensitive hexadecimal as well as six-word format. Servers are REQUIRED to ignore all white space in hexadecimal representations; leading zeros must be retained in partitioned representations.
section: "6.0"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
