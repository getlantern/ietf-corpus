document: rfc-1869
kind: design-rationale
summary: 'The extension framework is deliberately minimal: protocols with few options tend toward ubiquity, while protocols with many options tend toward obscurity. Each extension must be carefully scrutinized because the cost of extending SMTP will often outweigh the benefit.'
