document: rfc-7138
kind: protocol-element
summary: G.709 OTUk physical links are represented as TE-Links in GMPLS TE topology. TE-Links may be single-hop (one OTUk link) or multi-hop (spanning multiple OTUk links via forwarding adjacencies). Both types advertise ODU Switching Capability.
