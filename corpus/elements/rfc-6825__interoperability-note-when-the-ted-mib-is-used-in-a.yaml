document: rfc-6825
kind: interoperability-note
summary: When the TED MIB is used in a pure MPLS network (not GMPLS), GMPLS-specific tables (tedLocalIfAddrTable, tedRemoteIfAddrTable, tedSwCapTable, tedSrlgTable) are not supported. The module is intended for use alongside OSPFv2 MIB, OSPFv3 MIB, IS-IS MIB, RFC 3812, RFC 3813, RFC 4802, and RFC 4803 MIBs.
section: "6"
topics:
