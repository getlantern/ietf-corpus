document: rfc-791
kind: normative-requirement
summary: Every module that processes a datagram must decrease the TTL by at least one, even if it processes the datagram in less than a second. If TTL reaches zero, the datagram must be destroyed.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
