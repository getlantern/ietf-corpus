document: rfc-6788
kind: normative-requirement
summary: If the source address of the received outer IPv6 datagram is the unspecified address, the Edge Router MUST set the destination of the tunneled RA outer header to the All-BBF-Access-Nodes multicast address (ff02::10) and set the link-layer destination to the unicast link-layer address of the AN.
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
