document: rfc-3033
kind: registry
summary: IANA assignment registry for the Identifier type field in the Q.2941.2 Generic Identifier IE when the Identifier related standard/application field is IPv4, ST2+, IPv6, or MPLS. Values 0x10-0xFD are reserved for IANA assignment via IETF Consensus action per BCP 26.
