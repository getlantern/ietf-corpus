document: rfc-5552
kind: state-machine
summary: 'VoiceXML Session lifecycle: on INVITE receipt, server sends 100 Trying and fetches the VoiceXML document; 200 OK indicates document fetched and parsed; application execution commences on ACK receipt. For session preparation, a media-less INVITE (empty SDP or ports set to 0) defers execution until a subsequent re-INVITE establishes media.'
section: "2.2"
topics:
