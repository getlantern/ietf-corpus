document: rfc-7904
kind: normative-requirement
summary: A user wishing to call another user with a given AOR SHALL proceed by checking if it is a GRUU, if the AOR domain is hosted in the overlay, and if not, querying DNS or using standard SIP procedures. If all contact attempts fail, the call fails.
section: "4.1"
rfc2119_level: SHALL
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
