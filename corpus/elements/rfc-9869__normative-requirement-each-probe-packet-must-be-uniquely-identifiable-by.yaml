document: rfc-9869
kind: normative-requirement
summary: Each probe packet MUST be uniquely identifiable by the UDP Options sender within the Maximum Segment Lifetime (MSL). The UDP Options sender MUST NOT reuse a token value within the MSL.
section: "3.1"
rfc2119_level: MUST
