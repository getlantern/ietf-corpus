document: rfc-7828
kind: protocol-element
summary: The idle timeout begins when the idle condition is met per RFC 7766's definition of an idle DNS-over-TCP session and must be reset when that condition is lifted, i.e., when a client sends a message or a server receives a message on an idle connection.
section: "3"
topics:
