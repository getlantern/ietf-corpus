document: rfc-6245
kind: normative-requirement
summary: If the FA does not support GRE encapsulation, it MUST reset the 'G' bit in the Agent Advertisement and, if the MN requests GRE encapsulation, return an RRP with code 72 ('requested encapsulation unavailable').
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
