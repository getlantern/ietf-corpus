document: rfc-4356
kind: registry
summary: IANA added "MMS" as a new value under the "WITH protocol types" in its "MAIL Parameters" registry, with the description "Multimedia Messaging Service" and a reference to RFC 4356. This allows the MMS gateway to be identified in SMTP 'Received:' header "with" clauses.
