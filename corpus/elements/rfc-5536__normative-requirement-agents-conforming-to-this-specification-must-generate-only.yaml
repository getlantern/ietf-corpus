document: rfc-5536
kind: normative-requirement
summary: 'Agents conforming to this specification MUST generate only conformant articles. Articles using RFC 5322 obsolete syntax are non-conformant, with two narrow exceptions: obs-phrase constructs (which MUST NOT be generated but may appear) and the ''GMT'' timezone zone.'
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
