document: rfc-9203
kind: normative-requirement
summary: The client MUST wrap the access token, N1, and ID1 in a CBOR map when posting to the authz-info endpoint, using Content-Format application/ace+cbor. The nonce1 and ace_client_recipientid parameters carry N1 and ID1 respectively.
section: "4.1"
rfc2119_level: MUST
topics:
    - cbor
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
