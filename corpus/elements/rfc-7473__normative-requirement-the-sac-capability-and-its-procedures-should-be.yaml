document: rfc-7473
kind: normative-requirement
summary: The SAC capability and its procedures SHOULD be enabled on an LSR only via a configuration knob (global or per-neighbor), and an operator SHOULD enable this capability only when it is known that state advertisement with that neighbor is unnecessary and wasteful.
section: "5"
rfc2119_level: SHOULD
topics:
