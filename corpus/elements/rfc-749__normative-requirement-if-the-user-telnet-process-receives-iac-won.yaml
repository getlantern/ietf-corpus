document: rfc-749
kind: normative-requirement
summary: If the user TELNET process receives IAC WON'T SUPDUP-OUTPUT, it should respond with IAC DON'T SUPDUP-OUTPUT. Receipt of WON'T should only trigger a diagnostic if SUPDUP-OUTPUT subnegotiation blocks are subsequently received.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
