document: rfc-9744
kind: normative-requirement
summary: When a single normalized VID is used, the lower 12 bits of the Ethernet Tag ID field in EVPN routes MUST be set to that VID. When a double normalized VID is used, the lower 12 bits MUST be set to the inner VID and the higher 12 bits to the outer VID.
section: "3"
rfc2119_level: MUST
topics:
    - vpn
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
