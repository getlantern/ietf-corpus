document: rfc-9254
kind: wire-format
summary: Unsigned integer types (uint8, uint16, uint32, uint64) MUST be encoded as a CBOR unsigned integer data item (major type 0). Signed integer types (int8, int16, int32, int64) MUST be encoded as CBOR unsigned integer (major type 0) or CBOR negative integer (major type 1) depending on the actual value.
section: "6.1"
topics:
    - yang
    - cbor
