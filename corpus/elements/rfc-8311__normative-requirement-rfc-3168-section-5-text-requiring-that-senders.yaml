document: rfc-8311
kind: normative-requirement
summary: RFC 3168 Section 5 text requiring that senders respond identically to dropped packets and ECN CE marks is updated to allow different congestion control responses, provided the changes are documented in an Experimental RFC in the IETF document stream. The specific change inserts 'unless otherwise specified by an Experimental RFC in the IETF document stream' into the relevant sentences.
section: "4.1"
rfc2119_level: MUST
topics:
    - ecn
    - congestion
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
