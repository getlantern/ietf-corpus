document: rfc-2925
kind: interoperability-note
summary: The pingCtlType and traceRouteCtlType objects allow a management application to report or select the probe implementation method. The compliance statement requires that pingIcmpEcho be the only mandatory supported pingCtlType value, and write access to this object is optional.
