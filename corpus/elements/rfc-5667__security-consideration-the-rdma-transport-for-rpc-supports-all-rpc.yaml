document: rfc-5667
kind: security-consideration
summary: The RDMA transport for RPC supports all RPC security models including RPCSEC_GSS and link-level security. The use of RDMA Read and Write for argument and result transfer does not introduce new vulnerabilities, as RFC 5666 ensures security requirements are maintained regardless of data transfer method.
section: "7"
topics:
    - security
    - crypto
