document: rfc-6020
kind: interoperability-note
summary: YANG maintains compatibility with SMIv2 to the extent possible; SMIv2-based MIB modules can be automatically translated into YANG modules for read-only access. However, reverse translation from YANG to SMIv2 is out of scope and not supported.
section: "4.1"
topics:
