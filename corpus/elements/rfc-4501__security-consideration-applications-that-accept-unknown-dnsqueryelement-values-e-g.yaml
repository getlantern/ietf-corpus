document: rfc-4501
kind: security-consideration
summary: Applications that accept unknown dnsqueryelement values (e.g., 'dns:www.example.org?secret=value') without understanding their meaning may enable a covert channel for information leakage. Applications should understand the implications of accepting unknown query elements.
section: "6"
topics:
