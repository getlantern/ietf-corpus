document: rfc-9784
kind: normative-requirement
summary: Each EVC SHOULD be independently monitored for its operational health (R5a). A failure in a single EVC, among many aggregated on a single physical port or ENNI, MUST trigger a DF election for its associated vES (R5b).
section: "3.5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
