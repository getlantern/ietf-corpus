document: rfc-2662
kind: security-consideration
summary: The ADSL LINE MIB contains read-write objects (adslLineConfProfile, adslLineAlarmConfProfile, and profile table entries) whose unauthorized modification could disrupt ADSL line operation or suppress alarms. The security considerations section recommends restricting write access using SNMPv3 with authentication and privacy, as the MIB was designed for SNMPv2c/v3 environments.
section: "10"
topics:
    - security
