document: rfc-1657
kind: protocol-element
summary: bgpVersion ({ bgp 1 }) is a read-only OCTET STRING (1..255 octets) encoding a bit vector of supported BGP protocol versions. Bit i set means version i+1 is supported; the MSB of the first octet refers to bit 0.
