document: rfc-4572
kind: interoperability-note
summary: When offer/answer is not used (e.g., sessions announced via SAP), there is no secure channel for clients to communicate certificate fingerprints to servers. In this case, servers MAY request client certificates (which SHOULD be CA-signed) or MAY allow clients to connect without a certificate.
section: "6.2"
rfc2119_level: MAY
topics:
    - tls
    - pkix
    - realtime
