document: rfc-1903
kind: protocol-element
summary: TestAndIncr represents an integer used for atomic compare-and-increment operations. A SET must match the current value exactly or fail with 'inconsistentValue'; on success the value is incremented by one, wrapping from 2^31-1 to zero.
