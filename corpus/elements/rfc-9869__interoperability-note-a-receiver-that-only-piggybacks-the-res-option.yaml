document: rfc-9869
kind: interoperability-note
summary: A receiver that only piggybacks the RES Option onto application datagrams (rather than sending dedicated responses) can cause probe timeouts when traffic in the return direction is sparse, potentially resulting in a smaller PLPMTU than the path actually supports.
section: "6"
