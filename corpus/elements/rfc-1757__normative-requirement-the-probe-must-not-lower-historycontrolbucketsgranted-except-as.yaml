document: rfc-1757
kind: normative-requirement
summary: The probe must not lower historyControlBucketsGranted except as a result of a modification to the associated historyControlBucketsRequested object. When bucket count decreases, enough of the oldest media-specific entries must be deleted so the count satisfies the new value.
