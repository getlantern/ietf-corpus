document: rfc-8632
kind: security-consideration
summary: The ietf-alarms module contains writable nodes (alarm shelving, alarm profiles, control parameters, set-operator-state) that could be misused to suppress or reclassify alarms, hiding network faults. Implementations must enforce access control per RFC 8341 (NACM) or equivalent.
section: "9"
topics:
    - yang
    - security
    - netconf
