document: rfc-1755
kind: normative-requirement
summary: RFC 1483 specifies IP encapsulation over AAL 5; therefore AAL 5 MUST be indicated in the 'AAL type' field of the AAL Parameters IE. The SSCS type field SHOULD be absent or coded to Null SSCS for multiprotocol interconnect over AAL5.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
