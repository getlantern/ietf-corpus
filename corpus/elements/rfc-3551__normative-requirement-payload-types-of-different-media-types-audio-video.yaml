document: rfc-3551
kind: normative-requirement
summary: Payload types of different media types (audio, video, audio/video) SHALL NOT be interleaved or multiplexed within a single RTP session, but multiple RTP sessions MAY be used in parallel. An RTP source MAY change payload types within the same media type.
section: "6"
rfc2119_level: MUST NOT
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
