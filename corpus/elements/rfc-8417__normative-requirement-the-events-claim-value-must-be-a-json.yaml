document: rfc-8417
kind: normative-requirement
summary: The 'events' claim value MUST be a JSON object that contains at least one member. Multiple event identifiers with the same URI value MUST NOT be used. The 'events' claim MUST NOT be used to express multiple independent logical events.
section: "2.2"
rfc2119_level: MUST
topics:
