document: rfc-8007
kind: security-consideration
summary: A CI/T implementation MUST support TLS for HTTPS transport and TLS MUST be used by both dCDN and uCDN sides including mutual authentication of the remote end, unless alternate security mechanisms (e.g., IPsec tunnel, physically secured internal network) are used. General TLS usage guidance from RFC 7525 MUST be followed.
section: "8.1"
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
