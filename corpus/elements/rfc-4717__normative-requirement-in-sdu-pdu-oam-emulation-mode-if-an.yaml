document: rfc-4717
kind: normative-requirement
summary: In SDU/PDU OAM emulation mode, if an F5 end-to-end loopback OAM cell with loopback indication value of 1 is received and the PE has a label mapping for the ATM VC, the PE MUST decrement the loopback indication and loop back the cell; otherwise it MUST discard the cell.
section: "7.3"
rfc2119_level: MUST
topics:
    - mpls
