document: rfc-5450
kind: design-rationale
summary: Negative offset values are permitted because the sign depends on the choice of initial RTP-to-NTP mapping. Without scanning an entire stream, it is not possible to guarantee a mapping that keeps all offsets positive, so the specification allows both positive and negative values.
section: "3"
topics:
