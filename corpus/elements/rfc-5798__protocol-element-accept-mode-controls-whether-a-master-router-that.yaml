document: rfc-5798
kind: protocol-element
summary: Accept_Mode controls whether a Master router (that is not the address owner) accepts packets addressed to the address owner's IPvX address. Default is False. When False, IPv6 Neighbor Solicitations and Neighbor Advertisements MUST NOT be dropped.
section: "6.1"
topics:
