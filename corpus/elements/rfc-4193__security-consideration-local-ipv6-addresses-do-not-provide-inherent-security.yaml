document: rfc-4193
kind: security-consideration
summary: Local IPv6 addresses do not provide inherent security to nodes that use them. Filtering at site boundaries is no more or less secure than filtering other global unicast addresses. However, they do allow address-based security mechanisms including IPsec across end-to-end VPN connections.
section: "7"
topics:
