document: rfc-2848
kind: interoperability-note
summary: PINT is specified as a strict superset of SIP 2.0 and SDP; the extensions are not intended to alter the behaviour of baseline SIP or SDP. Standard SIP proxy, redirect, and location servers can forward PINT requests without modification.
section: "3.1"
topics:
    - realtime
    - sip
