document: rfc-9524
kind: interoperability-note
summary: When H.Encaps.Red is used to steer a replicated packet on a traffic-engineered path to a downstream node, the operator must ensure the MTU on the path is sufficient to account for the additional SRv6 encapsulation. This also applies when the root node's upstream placed the Replication-SID in the header.
section: "2.2"
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
