document: rfc-8624
kind: design-rationale
summary: Algorithm deprecation is performed gradually through incremental updates rather than abrupt removal. An algorithm is expected to be downgraded from MUST to NOT RECOMMENDED or MAY (not MUST NOT) unless there are strong security reasons, allowing implementations time to adapt while maintaining interoperability.
section: "1.2"
topics:
    - dns
    - crypto
    - security
