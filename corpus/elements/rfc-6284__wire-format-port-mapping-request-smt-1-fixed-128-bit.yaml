document: rfc-6284
kind: wire-format
summary: 'Port Mapping Request (SMT=1): fixed 128-bit packet containing V=2/P/SMT/PT=TOKEN(210)/Length=3 header word, 32-bit SSRC of packet sender, and a 64-bit Random Nonce generated per RFC 4086. The same nonce MUST be used in duplicate transmissions but a new nonce MUST be generated for each new request.'
