document: rfc-5755
kind: protocol-element
summary: The AAControls extension (id-pe-aaControls, { id-pe 6 }) is placed in CA or AC issuer PKCs to constrain which attribute types a downstream AC issuer may assert. It contains pathLenConstraint, permittedAttrs, excludedAttrs, and permitUnSpecified (default TRUE). When used, all PKCs from the AA CA to the AC issuer MUST contain this extension.
section: "7.4"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
