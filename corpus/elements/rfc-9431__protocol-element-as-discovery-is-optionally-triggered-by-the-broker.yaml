document: rfc-9431
kind: protocol-element
summary: AS discovery is optionally triggered by the Broker on connection failure by including a User Property (type 0x26) named "ace_as_hint" in the CONNACK packet; its value is a UTF-8-encoded JSON object with the mandatory "AS" parameter and optional "audience", "kid", "cnonce", and "scope" parameters.
section: 2.4.1
topics:
    - oauth
    - json
    - security
