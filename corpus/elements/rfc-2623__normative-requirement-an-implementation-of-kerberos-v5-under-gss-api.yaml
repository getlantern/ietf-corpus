document: rfc-2623
kind: normative-requirement
summary: An implementation of Kerberos V5 under GSS-API for use under NFS MUST NOT return a QOP of zero from GSS_Unwrap() and GSS_VerifyMIC() regardless of the actual integrity algorithm encoded in the token.
section: "4.1"
rfc2119_level: MUST NOT
topics:
