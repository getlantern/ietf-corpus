document: rfc-9552
kind: wire-format
summary: 'The IP Reachability Information TLV (code 265, mandatory for IPv4/IPv6 Prefix NLRIs) encodes: 1-octet Prefix Length (bits), followed by the minimum octets needed for the prefix. Trailing bits MUST be set to 0. The TLV length is variable.'
