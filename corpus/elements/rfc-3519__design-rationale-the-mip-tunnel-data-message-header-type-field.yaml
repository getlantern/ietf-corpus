document: rfc-3519
kind: design-rationale
summary: The MIP Tunnel Data Message header (Type field) is introduced to disambiguate tunnelled data packets from MIP Registration Requests/Replies when both arrive on the same UDP port 434; without this header, a receiver cannot distinguish data from control messages.
section: "3.3"
