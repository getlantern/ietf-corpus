document: rfc-4251
kind: security-consideration
summary: Traffic analysis of SSH sessions can reveal information such as password length. Implementers should use SSH_MSG_IGNORE packets combined with random-length padding to thwart traffic analysis attacks.
section: 9.3.9
topics:
    - security
    - privacy
