document: rfc-7761
kind: protocol-element
summary: The Register Tunnel is a virtual interface representing the DR-to-RP encapsulation path for a given group. It is treated as a normal interface in the (S,G) olist; DownstreamJPState on the tunnel interface is set to Join or NoInfo to add or remove it from forwarding. MTU is smaller than the underlying IP interface due to encapsulation overhead.
section: 4.4.1
topics:
    - multicast
    - routing
