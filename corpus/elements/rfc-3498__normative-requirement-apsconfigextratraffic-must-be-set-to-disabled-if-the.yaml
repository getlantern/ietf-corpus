document: rfc-3498
kind: normative-requirement
summary: apsConfigExtraTraffic MUST be set to disabled if the architecture is 1+1. This object controls whether extra traffic is transferred on the protection channel in a 1:n architecture and may need to be disabled to interwork with network elements that do not support extra traffic.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
