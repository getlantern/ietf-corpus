document: rfc-5026
kind: normative-requirement
summary: Home agents MUST authorize each home address allocation and use, linked to the mobile node identity used in IKEv2 authentication. Home agents MUST implement at least configured home address(es) per mobile node and first-come-first-served (FCFS) authorization modes.
section: "9.2"
rfc2119_level: MUST
topics:
