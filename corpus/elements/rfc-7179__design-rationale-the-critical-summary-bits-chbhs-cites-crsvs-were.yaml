document: rfc-7179
kind: design-rationale
summary: 'The critical summary bits (CHbHS, CItES, CRSVS) were designed to enable simple and efficient hardware processing: an RBridge that supports no critical extensions need only check Op-Length and the top one, two, or three bits of the extensions area to decide whether to discard or forward/process a frame, without parsing all extension flags.'
section: 2.3.1
topics:
    - routing
