document: rfc-9521
kind: design-rationale
summary: BFD for Geneve defines two encapsulation formats — one with an inner Ethernet/IP/UDP header and one with an inner IP/UDP header — because the Geneve payload may be either an Ethernet frame or an IP packet, and the BFD encapsulation selection mirrors how the VAP encapsulates data packets.
