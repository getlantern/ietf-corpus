document: rfc-7589
kind: protocol-element
summary: 'Six map types are defined for deriving a NETCONF username from a certificate: ''specified'' (explicit auxiliary data), ''san-rfc822-name'' (subjectAltName rfc822Name), ''san-dns-name'' (subjectAltName dNSName), ''san-ip-address'' (subjectAltName iPAddress), ''san-any'' (first matching SAN), and ''common-name'' (certificate CommonName, deprecated).'
