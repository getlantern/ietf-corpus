document: rfc-7048
kind: normative-requirement
summary: If an implementation transmits more than MAX_UNICAST_SOLICIT/MAX_MULTICAST_SOLICIT packets, it SHOULD use exponential backoff of the retransmit timer to avoid significant background load from implementations retransmitting large numbers of Neighbor Solicitations.
section: "3"
rfc2119_level: SHOULD
