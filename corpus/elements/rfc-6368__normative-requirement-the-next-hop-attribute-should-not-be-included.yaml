document: rfc-6368
kind: normative-requirement
summary: The NEXT_HOP attribute SHOULD NOT be included in an ATTR_SET. When present, it SHOULD be ignored by the receiving PE. Future applications MAY define meaningful semantics for an included NEXT_HOP.
section: "5"
rfc2119_level: SHOULD NOT
