document: rfc-8628
kind: interoperability-note
summary: The device authorization grant is not intended to replace browser-based OAuth in native apps on capable devices; those apps should follow RFC 8252 (OAuth 2.0 for Native Apps). The device flow targets devices that lack a suitable browser or have constrained input capabilities.
section: "1"
topics:
    - oauth
