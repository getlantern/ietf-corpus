document: rfc-8341
kind: design-rationale
summary: The write-default is 'deny' while read-default and exec-default are 'permit' by default, reflecting that unrestricted read and safe-operation execution is a common initial deployment posture, while inadvertent or malicious write access to configuration poses a higher security risk.
section: 3.3.4
topics:
    - netconf
    - security
