document: rfc-6332
kind: interoperability-note
summary: For the RAMS method, 4xx- and 5xx-level response codes from RFC 6285 Section 11.6 take higher priority than 1xxx-level MA status codes, so a receiver MUST use the response code directly as its status code when a 4xx or 5xx is received.
section: 4.1.2
topics:
    - rtp
    - multicast
    - realtime
