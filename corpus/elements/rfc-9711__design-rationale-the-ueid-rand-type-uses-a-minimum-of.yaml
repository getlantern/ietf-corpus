document: rfc-9711
kind: design-rationale
summary: The UEID RAND type uses a minimum of 128 random bits rather than a UUID to avoid the UUID registry and central administration requirements, while still providing sufficient entropy for probabilistic global uniqueness even across ten billion manufacturers.
