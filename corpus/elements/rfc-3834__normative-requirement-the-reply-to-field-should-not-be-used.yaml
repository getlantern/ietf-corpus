document: rfc-3834
kind: normative-requirement
summary: The Reply-To field SHOULD NOT be used as the destination for automatic responses from Personal or Group Responders, because it may target mailing lists or multiple recipients and the responder lacks context to interpret sender intent.
section: "4"
rfc2119_level: SHOULD NOT
