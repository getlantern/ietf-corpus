document: rfc-8974
kind: normative-requirement
summary: Discovery of extended-token-length support MUST be performed in a stateful way (i.e., the client keeps state for the discovery request). A stateless discovery cannot work because a Reset response carries only the Message ID, so there is no token to recover state from.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
