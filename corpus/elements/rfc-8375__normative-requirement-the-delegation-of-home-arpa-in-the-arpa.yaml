document: rfc-8375
kind: normative-requirement
summary: The delegation of 'home.arpa.' in the '.arpa.' zone MUST NOT include a DS record and MUST point to black hole servers (e.g., 'blackhole-1.iana.org.'), breaking the DNSSEC chain of trust intentionally to allow validating resolvers to accept locally-signed names.
section: "7"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
