document: rfc-5506
kind: protocol-element
summary: A Reduced-Size RTCP packet contains one or more RTCP packets, allows any RTCP packet type, MUST NOT be used for Regular RTCP report purposes, and MUST NOT be used with RTP/AVP or RTP/SAVP profiles. It does not follow the compound RTCP rules from RFC 3550 Section 6.1.
section: "4.1"
topics:
    - rtp
    - realtime
