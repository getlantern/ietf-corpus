document: rfc-8870
kind: normative-requirement
summary: Senders SHOULD periodically transmit the FullEKTField to accommodate new receivers joining a session. If sending audio and video, the RECOMMENDED frequency is the same as the intra-coded video frame rate. If only sending audio, the RECOMMENDED frequency is every 100 ms.
section: "4.6"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
