document: rfc-3023
kind: security-consideration
summary: XML, like plain text, can contain escape sequences that alter the display processor environment (e.g., locking the keyboard, changing display parameters, or reprogramming keys). Display processors SHOULD filter such material or reset all settings after display; the ability to program keys SHOULD be blocked by filtering or disabling.
section: "10"
topics:
