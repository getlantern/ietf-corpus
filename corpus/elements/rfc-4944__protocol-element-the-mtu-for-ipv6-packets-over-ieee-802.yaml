document: rfc-4944
kind: protocol-element
summary: The MTU for IPv6 packets over IEEE 802.15.4 is 1280 octets. The maximum 802.15.4 physical frame is 127 octets; after MAC overhead (25 bytes) and maximum AES-CCM-128 link-layer security overhead (21 bytes), only 81 octets remain, far below the IPv6 minimum, necessitating a fragmentation and reassembly adaptation layer.
section: "4"
