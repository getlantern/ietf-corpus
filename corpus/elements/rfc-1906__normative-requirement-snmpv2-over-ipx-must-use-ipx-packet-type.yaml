document: rfc-1906
kind: normative-requirement
summary: SNMPv2 over IPX MUST use IPX packet type 4 (Packet Exchange Protocol). It is suggested that agents listen on IPX socket 36879 (0x900f) and notification sinks on IPX socket 36880 (0x9010).
section: "6.2"
rfc2119_level: MUST
