document: rfc-4005
kind: normative-requirement
summary: A NAS MUST treat unknown or unsupported Service-Types received in a response as a failure and end the session with a DIAMETER_INVALID_AVP_VALUE Result-Code; if service type is supported but incompatible with the current access mode, the NAS MUST fail to start the session.
section: "6.1"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
