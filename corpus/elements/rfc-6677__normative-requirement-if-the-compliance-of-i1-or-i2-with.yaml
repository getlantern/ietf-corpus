document: rfc-6677
kind: normative-requirement
summary: If the compliance of i1 or i2 with the authoritative policy source is mandatory and a consistency check failed, then after sending a protected indication of failed consistency, the EAP server MUST send an EAP-Failure message to terminate the session.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
