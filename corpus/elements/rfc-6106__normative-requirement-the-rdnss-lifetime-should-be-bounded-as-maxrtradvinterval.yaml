document: rfc-6106
kind: normative-requirement
summary: The RDNSS Lifetime SHOULD be bounded as MaxRtrAdvInterval <= Lifetime <= 2*MaxRtrAdvInterval, providing stable DNS service to fixed hosts while allowing mobile hosts to prefer local RDNSSes. A value of 0xffffffff represents infinity; a value of zero means the RDNSS address MUST no longer be used.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - dns
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
