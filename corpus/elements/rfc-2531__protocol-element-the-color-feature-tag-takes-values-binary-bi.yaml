document: rfc-2531
kind: protocol-element
summary: The color feature tag takes values Binary (bi-level), Limited (small fixed palette), Mapped (palettized), Grey (continuous grey-scale), or Full (continuous tone color). It provides a broad indication of color handling capability and guides use of additional color feature tags.
