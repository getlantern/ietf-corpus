kind: protocol-element
summary: docsBpi2CmtsAuthCmReset is a read-write management action object with values invalidateAuth(2), sendAuthInvalid(3), and invalidateTeks(4), allowing operators to progressively invalidate CM authorization keys, trigger an Authorization Invalid message to the CM, and invalidate the primary SAID's TEKs.
