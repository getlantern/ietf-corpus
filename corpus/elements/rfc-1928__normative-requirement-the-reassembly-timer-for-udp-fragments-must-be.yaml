document: rfc-1928
kind: normative-requirement
summary: The reassembly timer for UDP fragments MUST be no less than 5 seconds. The reassembly queue must be reinitialized and fragments abandoned when the timer expires or a datagram arrives with a FRAG value less than the highest processed.
section: "7"
rfc2119_level: MUST
topics:
    - udp
