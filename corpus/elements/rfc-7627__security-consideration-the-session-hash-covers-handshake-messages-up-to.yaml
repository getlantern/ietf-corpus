document: rfc-7627
kind: security-consideration
summary: The session hash covers handshake messages up to and including ClientKeyExchange. New ciphersuites or extensions that add significant session context between ClientKeyExchange and Finished (e.g., session tickets sent by the server) may not be covered, potentially re-opening man-in-the-middle vectors; such applications require careful analysis.
section: "6.3"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
