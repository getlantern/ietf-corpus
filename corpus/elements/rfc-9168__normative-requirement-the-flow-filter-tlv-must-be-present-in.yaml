document: rfc-9168
kind: normative-requirement
summary: The Flow Filter TLV MUST be present in the FLOWSPEC object when the R (Remove) bit is clear. If absent with R=0, the peer MUST respond with PCErr Error-Type 30, Error-value 2 (Malformed FlowSpec).
section: "5"
rfc2119_level: MUST
topics:
