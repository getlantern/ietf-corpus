document: rfc-7729
kind: design-rationale
summary: The SM LFB models the FEM (FE Manager) as an LFB so that a CE can perform FEM-equivalent management via the standard Fp (CE-FE) interface, without replacing or moving away from the Ff (FEM-FE) interface defined in RFC 3746; the SM LFB is a subset of Ff operations.
