document: rfc-7874
kind: normative-requirement
summary: Endpoints SHOULD suppress in-band DTMF tones when sending 'audio/telephone-event' events. Endpoints receiving RFC 4733 tones are only required to gracefully drop them; there is no API to inform JavaScript of received DTMF.
section: "3"
rfc2119_level: SHOULD
topics:
