document: rfc-3851
kind: normative-requirement
summary: S/MIME v3.1 implementations MUST support both issuerAndSerialNumber and subjectKeyIdentifier for SignerIdentifier. Implementations MUST be prepared for multiple certificates sharing the same subjectKeyIdentifier and MUST try each during verification before indicating an error.
section: "2.6"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - pkix
