document: rfc-8141
kind: normative-requirement
summary: When URNs are transported and exchanged, they MUST be represented in the canonical format defined in RFC 8141. Applications SHOULD display the complete URI (including the 'urn' scheme and all components) to avoid confusion between URN NIDs and URI scheme identifiers.
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
