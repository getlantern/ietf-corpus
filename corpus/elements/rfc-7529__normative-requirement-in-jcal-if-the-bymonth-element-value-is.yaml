document: rfc-7529
kind: normative-requirement
summary: In jCal, if the BYMONTH element value is an integer, a numeric JSON value MUST be used. If the BYMONTH value includes the 'L' suffix (leap month), a JSON string value MUST be used.
section: "9"
rfc2119_level: MUST
topics:
    - json
