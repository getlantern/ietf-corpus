document: rfc-6620
kind: protocol-element
summary: 'FCFS SAVI devices have two port types: Validating Ports (VPs), where FCFS SAVI processing and filtering are applied, and Trusted Ports (TPs), where packets are forwarded without SAVI validation. Routers and inter-SAVI links use TPs; hosts use VPs.'
