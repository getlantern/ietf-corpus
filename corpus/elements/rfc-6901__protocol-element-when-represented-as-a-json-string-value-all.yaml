document: rfc-6901
kind: protocol-element
summary: When represented as a JSON string value, all quotation marks, reverse solidus characters, and control characters (%x00-1F) MUST be escaped per RFC 4627 Section 2.5. Backslash escape sequences must be unescaped before the string is processed as a JSON Pointer.
section: "5"
topics:
    - json
