document: rfc-5428
kind: normative-requirement
summary: SNMPv1 traps are disallowed for event notification; only SNMPv2-Trap-PDU (snmpTrap) and SNMP INFORMs (snmpInform) are permitted. This is specified in the pktcEventNotifications sub-tree description.
section: "4.7"
rfc2119_level: MUST NOT
topics:
    - snmp
