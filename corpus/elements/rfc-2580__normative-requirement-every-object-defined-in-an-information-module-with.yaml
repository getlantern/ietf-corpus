document: rfc-2580
kind: normative-requirement
summary: Every object defined in an information module with a MAX-ACCESS clause other than 'not-accessible' must be contained in at least one object group, to avoid the error of adding a new object and forgetting to include it in a group.
section: "3.1"
rfc2119_level: REQUIRED
