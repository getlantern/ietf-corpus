document: rfc-5251
kind: wire-format
summary: The L1VPN globally unique identifier used to associate <PPI, CPI> tuples with a specific VPN is encoded as a fixed 8-octet field. It may encode a VPN-ID, a route target, or any other globally unique identifier under control of network providers.
