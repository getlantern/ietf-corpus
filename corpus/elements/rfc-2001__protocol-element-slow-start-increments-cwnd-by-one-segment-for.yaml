document: rfc-2001
kind: protocol-element
summary: Slow start increments cwnd by one segment for every ACK received, producing exponential growth. Congestion avoidance increments cwnd by segsize*segsize/cwnd per ACK received, yielding at most one segment of growth per round-trip time (linear growth).
section: "2"
topics:
    - tcp
    - congestion
