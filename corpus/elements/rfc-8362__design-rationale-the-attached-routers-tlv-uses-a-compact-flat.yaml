document: rfc-8362
kind: design-rationale
summary: The Attached-Routers TLV uses a compact flat list of Router IDs rather than individual per-neighbor TLVs to discourage using the E-Network-LSA for anything beyond advertising attached routers, and to reduce the likelihood that the single E-Network-LSA per multi-access link will exceed the IPv6 MTU and require fragmentation.
section: "3.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
