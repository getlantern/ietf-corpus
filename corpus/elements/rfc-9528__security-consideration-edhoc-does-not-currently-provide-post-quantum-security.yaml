document: rfc-9528
kind: security-consideration
summary: EDHOC does not currently provide post-quantum security for static DH authentication methods (1–3). A post-quantum KEM can replace ECDH in method 0, but supporting PQC for static DH authentication would require new method specifications extending EDHOC.
section: "9.4"
topics:
    - security
    - crypto
