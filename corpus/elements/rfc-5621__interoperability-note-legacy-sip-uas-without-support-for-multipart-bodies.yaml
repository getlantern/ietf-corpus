document: rfc-5621
kind: interoperability-note
summary: Legacy SIP UAs without support for 'multipart' bodies generate a 415 (Unsupported Media Type) response when they receive a multipart body in a request. Some legacy UAs have been observed to silently ignore multipart bodies, causing serious interoperability problems.
section: "4.2"
topics:
    - sip
    - realtime
