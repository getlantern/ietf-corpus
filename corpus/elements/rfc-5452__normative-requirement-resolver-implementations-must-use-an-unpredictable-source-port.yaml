document: rfc-5452
kind: normative-requirement
summary: Resolver implementations MUST use an unpredictable source port for outgoing queries from the largest practicable range of available ports (53, or 1024 and above), MUST use multiple different source ports simultaneously when multiple queries are outstanding, and MUST use an unpredictable query ID utilizing the full 0-65535 range.
section: "9.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
