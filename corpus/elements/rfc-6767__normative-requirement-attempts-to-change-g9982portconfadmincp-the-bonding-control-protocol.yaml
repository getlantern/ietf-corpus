document: rfc-6767
kind: normative-requirement
summary: Attempts to change g9982PortConfAdminCp (the bonding control protocol) SHALL be rejected with inconsistentValue if the link is 'up' or initializing. Attempts to set a non-supported protocol (e.g., BACP when g9982PortCapBacpSupported is false) SHALL also be rejected.
