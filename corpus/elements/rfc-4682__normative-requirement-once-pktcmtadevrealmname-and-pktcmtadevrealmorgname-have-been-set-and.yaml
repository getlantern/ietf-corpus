document: rfc-4682
kind: normative-requirement
summary: Once pktcMtaDevRealmName and pktcMtaDevRealmOrgName have been SET and the row status is 'active(1)', the MTA MUST NOT allow any modification of these two object values. A realm row is not qualified for activation until both objects are explicitly SET.
section: "4"
rfc2119_level: MUST NOT
