document: rfc-9001
kind: normative-requirement
summary: The server MUST send a HANDSHAKE_DONE frame as soon as the TLS handshake is complete. At the client, the handshake is considered confirmed when a HANDSHAKE_DONE frame is received.
section: 4.1.2
rfc2119_level: MUST
