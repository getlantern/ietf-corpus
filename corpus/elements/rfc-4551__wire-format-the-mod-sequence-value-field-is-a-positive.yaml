document: rfc-4551
kind: wire-format
summary: 'The mod-sequence-value field is a positive unsigned 64-bit integer encoded as 1 or more decimal digits (ABNF: `1*DIGIT`), with a valid range of 1 to 18,446,744,073,709,551,614. The special form mod-sequence-valzer also permits the value 0 to represent "no mod-sequence support".'
