document: rfc-9685
kind: wire-format
summary: 'The Consistent Uptime Option (CUO, ND Option Type 42) is a new 8-byte IPv6 ND option encoding: Type (8-bit), Length=1 (8-bit), Uptime Exponent (6-bit), Uptime Mantissa (10-bit), S flag (1-bit sleep indicator), U flag (1-bit Peer NSSI validity), 6-bit Reserved flags, NSSI (12-bit), and Peer NSSI (12-bit).'
