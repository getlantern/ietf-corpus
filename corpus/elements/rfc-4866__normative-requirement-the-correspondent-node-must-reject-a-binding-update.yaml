document: rfc-4866
kind: normative-requirement
summary: The correspondent node MUST reject a Binding Update authenticated through reachability at the home address if it already holds a permanent home keygen token for that mobile node, returning status code 149 ('Permanent home keygen token exists'). This prevents downgrade attacks by on-path adversaries.
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
