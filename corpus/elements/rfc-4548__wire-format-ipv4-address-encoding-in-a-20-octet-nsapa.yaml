document: rfc-4548
kind: wire-format
summary: IPv4 address encoding in a 20-octet NSAPA uses AFI=0x35, ICP=0001 (BCD) in the first 3 octets, followed by the 4-octet IPv4 address at octets 3-6 of the DSP, and 13 unspecified trailing octets (default zero) in the remainder of the DSP.
