document: rfc-8383
kind: normative-requirement
summary: RBridges that implement the Address Flush message and implement FGL ingress/egress MUST implement TLV types 3, 4, and 5 (the FGL types). An RBridge that is merely FGL-safe but cannot egress FGL TRILL Data packets SHOULD ignore the FGL types.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
