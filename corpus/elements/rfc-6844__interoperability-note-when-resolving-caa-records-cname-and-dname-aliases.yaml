document: rfc-6844
kind: interoperability-note
summary: When resolving CAA records, CNAME and DNAME aliases at the queried label are followed before climbing to the parent domain. This alias-following step occurs at each level of the hierarchy before the parent lookup, ensuring aliases are consistently honored.
