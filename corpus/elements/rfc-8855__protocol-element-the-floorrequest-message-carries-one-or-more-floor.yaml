document: rfc-8855
kind: protocol-element
summary: The FloorRequest message carries one or more FLOOR-ID attributes, an optional BENEFICIARY-ID for third-party requests, optional PARTICIPANT-PROVIDED-INFO, and optional PRIORITY. When multiple FLOOR-IDs are present, the server treats them as an atomic package and either grants or denies all floors together.
section: 5.3.1
topics:
    - realtime
