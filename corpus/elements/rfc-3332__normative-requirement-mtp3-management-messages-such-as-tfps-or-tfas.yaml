document: rfc-3332
kind: normative-requirement
summary: MTP3 management messages (such as TFPs or TFAs received from the SS7 network) MUST NOT be encapsulated as Data message Payload Data and sent from SG to ASP or from ASP to SG. The SG MUST terminate these messages and generate appropriate M3UA SSNM messages.
section: 1.4.3.2
rfc2119_level: MUST NOT
topics:
    - realtime
    - voip
