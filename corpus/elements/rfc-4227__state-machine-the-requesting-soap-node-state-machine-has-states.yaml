document: rfc-4227
kind: state-machine
summary: 'The requesting SOAP node state machine has states: Init (formulate BEEP message, begin transmission) → Requesting (transmit request, await response; on ERR → Fail, otherwise → Sending+Receiving) → Sending+Receiving (complete request/response; on completion → Success). Success and Fail are terminal states.'
section: 5.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
