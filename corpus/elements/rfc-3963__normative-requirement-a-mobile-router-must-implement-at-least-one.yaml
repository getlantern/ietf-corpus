document: rfc-3963
kind: normative-requirement
summary: A Mobile Router MUST implement at least one of the two prefix registration modes (implicit or explicit) and MAY implement both. In explicit mode, the Mobile Router MUST include prefix information in all Binding Updates, including refreshes, to keep forwarding enabled for Mobile Network Prefixes.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
