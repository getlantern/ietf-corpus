document: rfc-7243
kind: normative-requirement
summary: If the receiver sends the Bytes Discarded Report Block without the Measurement Information Block, the Bytes Discarded Report Block MUST be sent in conjunction with an RTCP Receiver Report (RR) as a compound RTCP packet.
