document: rfc-6330
kind: protocol-element
summary: The encoding symbol generator Enc[K', C, (d,a,b,d1,a1,b1)] produces one encoding symbol as the XOR of d LT-selected intermediate symbols (walking C[b], C[(b+a)%W], ...) and d1 PI-selected intermediate symbols (walking C[W+b1] with stride a1 modulo P1, skipping indices >= P).
section: 5.3.5.3
