document: rfc-9261
kind: protocol-element
summary: 'Authenticator keys are derived from the (D)TLS connection via TLS exporters using four distinct labels: ''EXPORTER-client authenticator handshake context'', ''EXPORTER-server authenticator handshake context'', ''EXPORTER-client authenticator finished key'', and ''EXPORTER-server authenticator finished key''. The exported length equals the output of the ciphersuite''s associated hash function (the ''authenticator hash'').'
section: "5.1"
topics:
    - tls
    - crypto
