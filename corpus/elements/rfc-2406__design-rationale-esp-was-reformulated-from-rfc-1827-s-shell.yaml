document: rfc-2406
kind: design-rationale
summary: ESP was reformulated from RFC 1827's 'shell' approach (completed via transform documents) into a complete specification with integrated options for security services. The combinatorial growth of transforms motivated this change; fields for authentication, anti-replay, padding, and next-protocol identification are now defined in the base ESP specification.
section: "7"
topics:
