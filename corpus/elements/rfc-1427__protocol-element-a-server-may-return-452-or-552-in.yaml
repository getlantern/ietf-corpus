document: rfc-1427
kind: protocol-element
summary: A server may return 452 or 552 in response to a RCPT command based on unwillingness to accept the declared message size for a particular recipient. A 452 permits the client to requeue for later delivery; a 552 prohibits requeuing to the same recipient.
section: "6.4"
topics:
    - email
