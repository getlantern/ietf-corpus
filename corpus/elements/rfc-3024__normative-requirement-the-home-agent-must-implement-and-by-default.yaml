document: rfc-3024
kind: normative-requirement
summary: 'The home agent MUST implement and by default SHOULD enable a check on reverse-tunneled packets: it searches for a mobility binding whose care-of address matches the outer IP source and whose mobile node address matches the inner IP source. Packets failing this check MUST be silently discarded and SHOULD be logged as security exceptions.'
section: 4.3.2
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
