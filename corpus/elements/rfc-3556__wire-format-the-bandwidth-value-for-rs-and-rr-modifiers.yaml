document: rfc-3556
kind: wire-format
summary: The bandwidth-value for RS and RR modifiers is specified in units of bits per second (not kilobits per second as with other SDP bandwidth modifiers), expressed as an integer value. This differs from the general SDP convention to allow RTCP bandwidths below 1 kb/s.
