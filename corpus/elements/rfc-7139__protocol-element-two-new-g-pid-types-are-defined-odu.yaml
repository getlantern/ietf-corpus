summary: 'Two new G-PID types are defined: ODU-1.25G (value 66) for transport of digital paths at 1.25–100 Gbps via 1.25 Gbps TS granularity, and ODU-any (value 67) for transport via either 1.25 Gbps or 2.5 Gbps TS granularity using a fallback procedure.'
