document: rfc-5840
kind: protocol-element
summary: For UDP encapsulation (NAT-T), a Protocol Identifier field with value 0x00000002 immediately follows the UDP header to demultiplex between IKE, standard ESP (RFC 3948), and WESP. This reuses the reserved SPI value range (1–255) from RFC 4303 Section 2.1.
section: "2.1"
topics:
    - ipsec
    - nat
    - udp
