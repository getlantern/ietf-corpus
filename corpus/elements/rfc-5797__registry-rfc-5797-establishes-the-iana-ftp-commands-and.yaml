document: rfc-5797
kind: registry
summary: RFC 5797 establishes the IANA 'FTP Commands and Extensions' registry to reduce likelihood of conflicting extension names and command keywords. The registry records FTP commands, their FEAT codes, descriptions, types, conformance requirements, and references.
