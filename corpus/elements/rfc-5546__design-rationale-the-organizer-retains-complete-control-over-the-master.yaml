document: rfc-5546
kind: design-rationale
summary: The Organizer retains complete control over the master iCalendar object; Attendees cannot directly modify it but may suggest changes via COUNTER. This asymmetric authority model avoids conflicting simultaneous edits and mirrors common real-world meeting organization practices.
