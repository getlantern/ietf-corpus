document: rfc-6714
kind: interoperability-note
summary: Middleboxes are assumed to implement MSRP B2BUA functionality as a fallback for endpoints that do not support CEMA. If a middlebox lacks B2BUA capability and the SDP offer contains no 'msrp-cema', CEMA-enabled endpoints may be unable to interoperate with non-CEMA endpoints across that middlebox.
section: "6.2"
topics:
    - realtime
    - sip
