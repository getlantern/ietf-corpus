kind: protocol-element
summary: Channel Mapping Family 2 encodes Ambisonic components in Ambisonic Channel Number (ACN) order, optionally followed by two non-diegetic stereo channels (left, right). ACN is defined as n*(n+1)+m for Ambisonic order n and degree m.
