document: rfc-9621
kind: normative-requirement
summary: Any functionality common across multiple transport protocols SHOULD be made accessible through a unified set of calls using the Transport Services API. As a baseline, any Transport Services API SHOULD allow access to the minimal set of features offered by transport protocols defined in RFC 8923.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
    - tcp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
