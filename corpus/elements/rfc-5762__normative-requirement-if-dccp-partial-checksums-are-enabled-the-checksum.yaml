document: rfc-5762
kind: normative-requirement
summary: If DCCP partial checksums are enabled, the checksum MUST cover at least the DCCP and RTP headers to ensure correct delivery. Partial checksums MUST NOT be used unless supported by mechanisms in the RTP payload format.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
