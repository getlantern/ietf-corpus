document: rfc-8781
kind: normative-requirement
summary: The receiver MUST ignore the PREF64 option if the Prefix Length Code (PLC) field is not set to one of the valid values (0–5, encoding prefix lengths 96, 64, 56, 48, 40, and 32 bits respectively).
