document: rfc-2069
kind: normative-requirement
summary: Proxies MUST be completely transparent in Digest authentication, forwarding WWW-Authenticate, Authentication-info, and Authorization headers untouched. Proxy-level authentication uses separate Proxy-Authenticate and Proxy-Authorization headers.
section: "2.2"
rfc2119_level: MUST
topics:
    - http
    - security
