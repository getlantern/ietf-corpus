document: rfc-9246
kind: normative-requirement
summary: Both path-style parameters (per RFC 6570 Section 3.2.7) and form-style parameters (per RFC 6570 Sections 3.2.8 and 3.2.9) MUST be supported when locating the URI Signing Package Attribute. The first matching parameter SHOULD be taken as the signed JWT.
section: "2"
rfc2119_level: MUST
topics:
    - jose
    - http
