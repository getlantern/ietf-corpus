document: rfc-1209
kind: wire-format
summary: 'SMDS addresses use the publicly administered 60-bit address plus a 4-bit Address Type field. The Address Type subfield occupies the 4 most significant bits of the destination and source address fields in the SIP L3 PDU: 0b1100 for individual address, 0b1110 for group address.'
