document: rfc-6190
kind: wire-format
summary: 'Each non-interleaved multi-time aggregation unit in an NI-MTAP consists of: 16-bit NAL unit size (network byte order), 16-bit TS offset (NALU-time minus RTP timestamp, with modular wraparound), optional 16-bit DON, and the NAL unit bytes. The earliest aggregation unit''s TS offset MUST be zero.'
section: 4.7.1
topics:
