document: rfc-9664
kind: normative-requirement
summary: A Requester that intends for its RRs to remain active MUST send a Refresh Request before the lease expires. After a successful Lease Update, the requester computes a refresh time at 80% of the lease duration plus a random offset of 0–5% of the lease duration.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
