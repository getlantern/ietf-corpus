document: rfc-9203
kind: normative-requirement
summary: The RS MUST NOT use the security context after the related token has expired and MUST respond with an unprotected 4.01 (Unauthorized) error to requests corresponding to a security context with an expired token.
section: "4.3"
rfc2119_level: MUST NOT
topics:
