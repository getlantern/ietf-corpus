document: rfc-6223
kind: normative-requirement
summary: When a SIP entity wants to negotiate the sending of keep-alives associated with a registration or dialog, it MUST insert a "keep" parameter in the topmost Via header field that it adds to the request.
section: "4.3"
rfc2119_level: MUST
topics:
