document: rfc-2058
kind: protocol-element
summary: The Request Authenticator in an Access-Request is a 16-octet random number that SHOULD be globally and temporally unique over the lifetime of the shared secret. It serves as an anti-replay nonce and as input to the User-Password encryption algorithm.
section: "3"
topics:
