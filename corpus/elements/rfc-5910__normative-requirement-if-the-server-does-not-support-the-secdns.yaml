document: rfc-5910
kind: normative-requirement
summary: If the server does not support the <secDNS:maxSigLife> element, it MUST return EPP error result code 2102 when a client includes this element in a <secDNS:create> or <secDNS:chg> element. A server MUST also return 2102 if the 'urgent' attribute is specified as true but the server does not support it.
section: 5.2.1
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
