document: rfc-2531
kind: protocol-element
summary: color-levels (Integer >2) indicates the number of distinct pixel color values. color-space takes token values Device-RGB, Device-CMY, Device-CMYK, or CIELAB (per ITU T.42). CIELAB depth tags (CIELAB-L-depth, CIELAB-a-depth, CIELAB-b-depth) indicate distinct values per color component; gamut tags (CIELAB-[L,a,b]-[min,max]) indicate the supported range of CIELAB component values.
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
