document: rfc-8913
kind: protocol-element
summary: The count grouping specifies an iteration count for key derivation, configured as a power-of-2 exponent (range 10..31, default 15, meaning 2^15 = 32768). The Server communicates the resulting count to the Control-Client in the Server Greeting message.
