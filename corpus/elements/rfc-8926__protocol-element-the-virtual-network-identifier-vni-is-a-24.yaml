document: rfc-8926
kind: protocol-element
summary: The Virtual Network Identifier (VNI) is a 24-bit field in the Geneve tunnel header that identifies a unique element of a virtual network (often an L2 segment). The control plane defines forwarding semantics; the VNI MAY be used in ECMP decisions or to distinguish overlapping address spaces when load balancing across CPUs.
section: "3.4"
topics:
