document: rfc-5066
kind: normative-requirement
summary: All entries in efmCuPortConfTable and efmCuPortCapabilityTable MUST be maintained in a persistent manner across management system re-initializations. The profile index value for each profile MUST remain constant at least from one re-initialization to the next.
section: "6"
rfc2119_level: MUST
