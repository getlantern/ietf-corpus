document: rfc-5048
kind: normative-requirement
summary: If a FastAbort-capable target has a third-party affected session with TaskReporting=RFC3720 and the issuing session is a FastAbort session, Asynchronous Message PDUs MUST NOT be sent on the third-party session to prompt FastAbort behavior.
section: 4.1.4
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
