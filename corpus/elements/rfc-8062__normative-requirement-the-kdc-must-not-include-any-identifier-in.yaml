document: rfc-8062
kind: normative-requirement
summary: The KDC MUST NOT include any identifier in the returned anonymous ticket's authorization data that could reveal the client's identity. The AD_INITIAL_VERIFIED_CAS authorization data MUST NOT be present when anonymous PKINIT is used.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
    - privacy
