document: rfc-4920
kind: normative-requirement
summary: When a node gives up re-routing attempts after accumulating multiple failures, it MUST propagate the failure message further upstream and include crankback information when it does so, using TLVs 26 and 27 for compression of accumulated failure lists.
section: 6.4.5
rfc2119_level: MUST
topics:
    - mpls
    - routing
