document: rfc-4338
kind: security-consideration
summary: Soft zoning techniques based on FC Name Server masking do not work with IPv6 and IPv4 over Fibre Channel because IP over FC does not use the FC Name Server. The FC ESP_Header may be used to secure FC frames carrying IPv6, IPv4, and ARP packets; all IP-layer security techniques remain applicable.
section: "14"
topics:
