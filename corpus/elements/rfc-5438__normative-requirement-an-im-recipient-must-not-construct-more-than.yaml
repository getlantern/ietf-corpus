document: rfc-5438
kind: normative-requirement
summary: An IM Recipient MUST NOT construct more than one IMDN per disposition type. It MUST NOT generate 'processing' notifications. A Disposition-Notification header field MUST NOT appear in an IMDN, and an IM Sender MUST NOT send an IMDN for an IMDN.
section: 7.2.1
rfc2119_level: MUST NOT
topics:
    - realtime
    - sip
