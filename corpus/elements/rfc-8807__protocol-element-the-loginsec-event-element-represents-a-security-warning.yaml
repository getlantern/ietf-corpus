document: rfc-8807
kind: protocol-element
summary: 'The <loginSec:event> element represents a security warning or error identified by the server after the client submits the login command. Required attributes are "type" (enumerated: password, certificate, cipher, tlsProtocol, newPW, stat, custom) and "level" (warning or error). Optional attributes include "name", "exDate", "value", "duration", and "lang".'
section: "3.1"
topics:
    - security
    - tls
