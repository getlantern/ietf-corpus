summary: 't11FcsStatsTable provides seven Counter32 objects per (switch, Fabric) pair: t11FcsInGetReqs, t11FcsOutGetReqs, t11FcsInRegReqs, t11FcsOutRegReqs, t11FcsInDeregReqs, t11FcsOutDeregReqs, and t11FcsRejects. All counters have no discontinuities other than sysUpTime=0 resets.'
