document: rfc-2613
kind: design-rationale
summary: The dataSourceCapsTable is required because RMON mandates that every dataSource be associated with an ifEntry; this table allows agents to map VLANs and physical entities to propVirtual(53) ifEntries, enabling RMON functions to be applied to these non-traditional data sources.
section: "3.4"
topics:
