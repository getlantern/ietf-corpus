document: rfc-7670
kind: design-rationale
summary: When using raw public keys in IKEv2, the authenticated identity is typically the public key itself rather than the ID payload contents. The ID payload may still be used for policy lookup, or ID_NULL (RFC 7619) may be used to signal it is not relevant to authentication.
section: "1"
topics:
