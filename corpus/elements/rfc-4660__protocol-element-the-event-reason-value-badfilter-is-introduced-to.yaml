document: rfc-4660
kind: protocol-element
summary: The event-reason-value 'badfilter' is introduced to indicate subscription termination due to a filter that is not well formed and/or not accepted. It may be included in the subexp-params of a NOTIFY with subscription-state 'terminated'.
