document: rfc-5692
kind: design-rationale
summary: Multicast CIDs are inefficient for small multicast groups and for link-layer broadcast control messages (such as ARP Requests) because all associated SSs must wake from dormant mode to receive and process each message, wasting battery power. Unicast replication by the network-side bridging function is preferred.
section: Appendix A
topics:
