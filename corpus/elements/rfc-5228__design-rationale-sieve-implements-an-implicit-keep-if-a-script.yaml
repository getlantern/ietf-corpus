document: rfc-5228
kind: design-rationale
summary: 'Sieve implements an ''implicit keep'': if a script completes without any action that cancels the implicit keep (fileinto, keep, redirect, or discard), the message is automatically filed to the user''s default mailbox. This prevents message loss from scripts that miss certain cases.'
section: 2.10.2
topics:
    - email
