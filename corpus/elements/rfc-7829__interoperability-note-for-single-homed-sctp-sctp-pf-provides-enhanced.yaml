summary: For single-homed SCTP, SCTP-PF provides enhanced failure detection and faster idle-association endpoint failure detection via aggressive HEARTBEAT transmission in PF state, but failover and switchback aspects are not activated. Adequate dormant state operation is required to avoid harm.
