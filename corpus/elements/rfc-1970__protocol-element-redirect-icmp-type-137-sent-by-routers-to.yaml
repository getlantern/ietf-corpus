summary: 'Redirect (ICMP Type 137): sent by routers to inform a host of a better first-hop for a destination. Contains a 128-bit Target Address (better next-hop or the neighbor itself) and a 128-bit Destination Address, with an optional Target Link-Layer Address and Redirected Header.'
