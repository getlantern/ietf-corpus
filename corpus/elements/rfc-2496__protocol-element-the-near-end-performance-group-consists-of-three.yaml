document: rfc-2496
kind: protocol-element
summary: 'The Near End performance group consists of three tables: dsx3CurrentTable (current 15-minute interval), dsx3IntervalTable (up to 96 previous 15-minute intervals), and dsx3TotalTable (rolling 24-hour cumulative). All use PerfCurrentCount, PerfIntervalCount, or PerfTotalCount (all Gauge32) for counters including PESs, PSESs, SEFSs, UASs, LCVs, PCVs, LESs, CCVs, CESs, and CSESs.'
section: 3.1.2
