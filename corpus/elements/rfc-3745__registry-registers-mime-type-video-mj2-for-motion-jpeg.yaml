document: rfc-3745
kind: registry
summary: Registers MIME type video/mj2 for Motion JPEG 2000 sequences as defined in ISO/IEC 15444-3. The format is derived from the ISO Base Media File Format and may carry audio in addition to video. Preferred file extension is 'mj2'; 'mjp2' is also declared.
