document: rfc-9335
kind: protocol-element
summary: Cryptex is signaled via the new SDP property attribute 'a=cryptex', which takes no value and may appear at the session or media level. Its presence indicates the endpoint is capable of receiving Cryptex-encrypted RTP packets.
