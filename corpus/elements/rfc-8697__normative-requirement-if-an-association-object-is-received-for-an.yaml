document: rfc-8697
kind: normative-requirement
summary: If an ASSOCIATION object is received for an Operator-configured Association whose Association ID falls outside the Operator-configured Association Range for that Association Type and Association Source, the receiver MUST return PCErr Error-Type 26, Error-value 8 ('Association ID not in range').
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
