document: rfc-7512
kind: protocol-element
summary: The 'id' path attribute maps to CKA_ID and can contain arbitrary binary data. The 'object' attribute maps to CKA_LABEL (a UTF-8 string). The 'token' attribute maps to the 'label' member of CK_TOKEN_INFO. The 'slot-id' attribute is a decimal number of CK_SLOT_ID type.
