document: rfc-2301
kind: normative-requirement
summary: TIFF-F (Profile F) readers MUST be able to read data in both FillOrder=1 (MSB-first) and FillOrder=2 (LSB-first) bit orderings. Writers typically use FillOrder=2 since fax data arrives on the telephone line in LSB-first order.
section: 4.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
