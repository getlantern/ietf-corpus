document: rfc-8417
kind: design-rationale
summary: Multiple event identifiers within a single SET are intended to represent multiple aspects of the same state transition (e.g., classification or linkage information), not to aggregate distinct independent events. Allowing a SET to carry multiple aspects simplifies delivery while the restriction to a single state transition preserves semantic clarity.
section: "2"
topics:
