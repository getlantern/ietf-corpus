document: rfc-9777
kind: protocol-element
summary: 'Three Query variants are defined: (1) General Query — Multicast Address and N both zero, sent to ff02::1 to discover all listeners; (2) Multicast Address Specific Query — N=0 with a specific multicast address; (3) Multicast Address and Source Specific Query — non-zero N with specific multicast address and source list.'
section: 5.1.13
topics:
