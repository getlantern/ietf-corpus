document: rfc-5059
kind: normative-requirement
summary: Routers that support only PIM-SM or only BIDIR-PIM MUST NOT ignore RP-Set ranges designated for the unsupported protocol, and MUST NOT treat those ranges as being for the protocol they support.
section: "3.6"
rfc2119_level: MUST NOT
