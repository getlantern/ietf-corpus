document: rfc-5750
kind: normative-requirement
summary: Receiving agents MUST support chaining based on the distinguished name fields. Agents SHOULD NOT simply trust any self-signed certificates as valid CAs, but SHOULD use some other mechanism to determine if this is a CA that should be trusted.
section: "2.3"
rfc2119_level: MUST
topics:
