document: rfc-3640
kind: normative-requirement
summary: The RTP timestamp MUST carry the sampling instant of the first AU (fragment) in the RTP packet. The sender SHALL ensure that RTP timestamps are identical only when referring to fragments of the same Access Unit.
section: "2.6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
