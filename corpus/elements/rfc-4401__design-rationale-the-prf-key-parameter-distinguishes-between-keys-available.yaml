document: rfc-4401
kind: design-rationale
summary: The prf_key parameter distinguishes between keys available only after full context establishment (GSS_C_PRF_KEY_FULL) and keys available during partial establishment (GSS_C_PRF_KEY_PARTIAL), accommodating mechanisms like Kerberos V where one peer may assert a key considered better than others.
