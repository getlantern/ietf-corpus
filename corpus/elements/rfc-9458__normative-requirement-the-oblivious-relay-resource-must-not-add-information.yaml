document: rfc-9458
kind: normative-requirement
summary: The Oblivious Relay Resource MUST NOT add information when forwarding requests that might be used to identify Clients, except for information that the Client is aware of. Generic implementations that augment requests with Via or Forwarded fields violate this requirement.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - http
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
