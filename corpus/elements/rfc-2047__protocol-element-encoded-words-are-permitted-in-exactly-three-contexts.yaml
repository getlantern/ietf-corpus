document: rfc-2047
kind: protocol-element
summary: 'Encoded-words are permitted in exactly three contexts: (1) replacing ''text'' tokens in Subject, Comments, extension, or MIME body part header fields; (2) within ''comment'' delimiters wherever ''ctext'' is allowed; (3) as a ''word'' within a ''phrase'' preceding an address in From, To, or Cc headers.'
