document: rfc-9930
kind: interoperability-note
summary: Multiple implementations of RFC 7170 interpreted the cryptographic-binding text differently. These implementations are interoperable only for a subset of RFC 7170 functionality. RFC 9930 both corrects the specification and documents in Section 5 which subset of TEAPv1 is currently interoperable across implementations.
section: "1.1"
topics:
