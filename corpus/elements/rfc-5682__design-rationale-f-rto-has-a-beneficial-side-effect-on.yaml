summary: 'F-RTO has a beneficial side effect on RTT measurement: by avoiding unnecessary retransmissions it can take RTT samples on delayed segments without retransmission ambiguity, yielding more accurate and larger RTO estimates — an advantage in networks prone to delay spikes.'
