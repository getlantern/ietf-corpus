document: rfc-5510
kind: protocol-element
summary: 'The ''n-algorithm'' determines max_n and n: at the sender, max_n = ceil(B / CR); if max_n > 2^^m - 1, return error; n = floor(k * max_n / B). At the receiver, n = floor(k * max_n / B) using B and max_n from the FEC OTI.'
section: "6.2"
topics:
