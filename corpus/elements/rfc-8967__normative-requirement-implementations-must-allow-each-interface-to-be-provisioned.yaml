document: rfc-8967
kind: normative-requirement
summary: Implementations MUST allow each interface to be provisioned with one or more MAC keys and associated algorithms. Implementations SHOULD allow an interface to be configured to accept unauthenticated packets for incremental deployment.
section: "3.1"
rfc2119_level: MUST
topics:
