document: rfc-9495
kind: interoperability-note
summary: When a single CAA RRSet is processed by multiple CAs for different certificate types, a critical "issue" Property Tag not understood by a CA will prevent that CA from issuing any certificate for the domain, including S/MIME certificates, even if a matching "issuemail" Property is present.
section: "6"
topics:
