document: rfc-5733
kind: protocol-element
summary: The EPP <update> command's <contact:update> element contains the target id plus optional <contact:add>, <contact:rem>, and <contact:chg> elements. At least one of these MUST be provided unless an update extension is present. Add/rem elements carry status values; chg carries postalInfo, voice, fax, email, authInfo, and disclose.
section: 3.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
