document: rfc-6391
kind: interoperability-note
summary: The FL Sub-TLV mechanism is backwards compatible with existing PW implementations because RFC 4447 requires that unknown interface parameter Sub-TLVs be silently ignored. A PE that does not understand the FL Sub-TLV will not send one, causing the ingress PE to omit the flow label.
section: "4"
