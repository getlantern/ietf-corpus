document: rfc-2226
kind: interoperability-note
summary: A MARS MUST serve only one LIS to ensure that the 255.255.255.255 broadcast group is joined only by hosts from one LIS, keeping its scope bound to conventional broadcast interpretation; RFC 2022 permits relaxing this restriction after future research.
section: "4"
topics:
