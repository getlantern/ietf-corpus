document: rfc-9502
kind: normative-requirement
summary: When the OSPFv3 IP Algorithm Prefix Reachability Sub-TLV is present, the NU-bit in the PrefixOptions field of the parent TLV MUST be set to prevent the advertisement from contributing to base algorithm reachability. If the NU-bit is not set, the sub-TLV MUST be ignored by the receiver.
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
