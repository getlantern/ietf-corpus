document: rfc-9014
kind: protocol-element
summary: The Interconnect Ethernet Segment (I-ES) and its identifier (I-ESI) are defined on GWs for multihoming to/from the WAN. Unlike a standard ES per RFC 7432 (associated with physical Ethernet links), the I-ES is associated with a set of virtual tunnels such as PWs, referred to as a vES.
section: "3.4"
topics:
    - routing
    - bgp
    - mpls
