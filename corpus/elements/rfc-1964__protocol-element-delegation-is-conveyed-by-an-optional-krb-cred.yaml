document: rfc-1964
kind: protocol-element
summary: 'Delegation is conveyed by an optional KRB_CRED message in the authenticator checksum (bytes 24+: DlgOpt=1, Dlgth, Deleg). Delegation is active only when a TGT with its FORWARDABLE flag set is transferred within the KRB_CRED message.'
section: 1.1.1
topics:
