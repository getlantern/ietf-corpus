document: rfc-9256
kind: design-rationale
summary: The BSID SHOULD NOT be used as an identifier for an SR Policy because the association of an SR Policy with a BSID may change over the life of the SR Policy (e.g., upon active path change when a new active path does not have a specified or available BSID).
section: "6.2"
topics:
    - routing
    - mpls
