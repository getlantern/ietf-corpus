document: rfc-5592
kind: normative-requirement
summary: SSH MUST NOT be configured using the 'none' MAC algorithm for use with the SSH Transport Model; disabling data integrity while maintaining confidentiality allows an attacker to modify data in flight, effectively eliminating authentication.
section: "9.5"
rfc2119_level: MUST NOT
