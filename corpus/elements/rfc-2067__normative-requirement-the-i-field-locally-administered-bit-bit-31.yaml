document: rfc-2067
kind: normative-requirement
summary: The I-field Locally Administered bit (bit 31) SHALL be zero. The Double_Wide (W) bit SHALL be set when Source Cable B is connected and a 64-bit connection is desired. Path Selection SHALL be 00, 01, or 11 (binary); source route mode uses bits 23–00 as a 24-bit route, logical address mode uses 12-bit addresses.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
