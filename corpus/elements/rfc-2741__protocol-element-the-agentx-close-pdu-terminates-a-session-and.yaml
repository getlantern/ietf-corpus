document: rfc-2741
kind: protocol-element
summary: 'The agentx-Close-PDU terminates a session and carries a c.reason code: reasonOther(1), reasonParseError(2), reasonProtocolError(3), reasonTimeouts(4), reasonShutdown(5), reasonByManager(6). Both master agent and subagent may initiate closure; the receiver must send an agentx-Response-PDU.'
