document: rfc-4566
kind: normative-requirement
summary: Internationalised domain names (IDNs) used in SDP MUST be represented in ASCII Compatible Encoding (ACE) form and MUST NOT be directly represented in UTF-8 or any other encoding, for compatibility with RFC 2327 and other SDP-related standards.
