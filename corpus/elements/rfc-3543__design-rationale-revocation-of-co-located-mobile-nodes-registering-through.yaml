document: rfc-3543
kind: design-rationale
summary: Revocation of co-located mobile nodes registering through a foreign agent (with the 'D' bit set and relayed by the foreign agent) is not supported because there is no reliable way to verify the source IP of the registration request is the foreign agent, opening a DoS attack vector via man-in-the-middle.
section: 4.3.2
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
