document: rfc-8223
kind: registry
summary: IANA created a new 'LDP Targeted Application Identifier' registry (range 0x0001-0xFFFE) under 'LDP Parameters'. IETF Review governs 0x0001-0x1FFF; First Come First Served governs 0x2000-0xF7FF. Initial values include LDPv4/v6 Tunneling (0x0001-0x0002), mLDP Tunneling (0x0003), Remote LFA (0x0004-0x0005), FEC 128/129 PW (0x0006-0x0007), and others through 0x000D.
section: "7"
topics:
