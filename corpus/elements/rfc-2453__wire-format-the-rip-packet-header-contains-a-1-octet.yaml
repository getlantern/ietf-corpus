document: rfc-2453
kind: wire-format
summary: The RIP packet header contains a 1-octet command field, a 1-octet version field, and a 2-octet must-be-zero field, followed by between 1 and 25 Route Entries of 20 octets each. All multi-octet integers are in network byte order (big-endian).
