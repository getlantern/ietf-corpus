document: rfc-8995
kind: privacy-consideration
summary: The BRSKI-MASA channel reveals the pledge's serial number (and thus device type and manufacturing batch), the registrar's certificate (identifying the domain owner/operator), and timestamps of bootstrapping events to the manufacturer. This gives the manufacturer persistent visibility into where and when devices are deployed, which may be undesirable for competitive or operational-security reasons.
section: "10.3"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
