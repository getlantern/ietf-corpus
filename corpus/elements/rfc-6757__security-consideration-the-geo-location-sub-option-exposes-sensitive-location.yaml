document: rfc-6757
kind: security-consideration
summary: The Geo-Location sub-option exposes sensitive location information. Operators MUST secure PMIPv6 signaling using IPsec Encapsulating Security Payload (ESP) with confidentiality and integrity protection when carrying this sub-option, leveraging the IPsec mechanisms already specified in RFC 5213.
section: "7"
topics:
    - security
    - ip
    - mobility
    - ipsec
    - privacy
