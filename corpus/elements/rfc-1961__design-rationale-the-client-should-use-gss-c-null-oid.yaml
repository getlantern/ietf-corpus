document: rfc-1961
kind: design-rationale
summary: The client should use GSS_C_NULL_OID as the default name_type when importing the server name for maximal portability, since different mechanisms (e.g. Kerberos V5 vs. others) use different name forms and the client should not assume name syntax.
section: "3.1"
topics:
    - security
