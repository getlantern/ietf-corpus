document: rfc-2688
kind: design-rationale
summary: The v.42 protocol used in most POTS modems provides link-layer reliability via retransmission, which can cause frames to experience significant variable delays and implicitly steal link bandwidth. This makes it extremely difficult to honor Guaranteed Service reservations on such links, and even Controlled Load service becomes difficult at high utilization when retransmissions occur.
section: A
topics:
    - qos
    - realtime
