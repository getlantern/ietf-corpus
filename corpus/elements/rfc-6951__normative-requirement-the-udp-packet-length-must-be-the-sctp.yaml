document: rfc-6951
kind: normative-requirement
summary: The UDP packet length MUST be the SCTP packet length plus the size of the UDP header. The SCTP checksum MUST be computed for both IPv4 and IPv6; the UDP checksum SHOULD be computed for both IPv4 and IPv6.
section: "5.3"
rfc2119_level: MUST
topics:
    - sctp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
