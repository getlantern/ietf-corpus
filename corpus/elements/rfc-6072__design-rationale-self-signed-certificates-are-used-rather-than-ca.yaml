document: rfc-6072
kind: design-rationale
summary: Self-signed certificates are used rather than CA-issued ones because commercial certification authorities have rarely supported SIP URIs in SubjectAltName. SIP Identity (RFC 4474) provides the equivalent trust binding by having the proxy domain vouch for the AOR-to-certificate relationship.
section: "1"
