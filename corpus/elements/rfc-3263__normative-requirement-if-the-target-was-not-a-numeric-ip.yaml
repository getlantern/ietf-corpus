document: rfc-3263
kind: normative-requirement
summary: If the TARGET was not a numeric IP address but an explicit port is present in the URI, the client performs an A or AAAA lookup and SHOULD try each IP address in order, trying the next if the current attempt fails.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - sip
    - dns
