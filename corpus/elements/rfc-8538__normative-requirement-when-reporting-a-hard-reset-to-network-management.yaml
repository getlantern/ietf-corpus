document: rfc-8538
kind: normative-requirement
summary: When reporting a Hard Reset to network management, the error code and subcode reported MUST be Cease and Hard Reset, respectively. If the management layer permits it, the Data portion SHOULD be reported as well.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
