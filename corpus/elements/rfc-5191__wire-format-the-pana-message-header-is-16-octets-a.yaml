document: rfc-5191
kind: wire-format
summary: 'The PANA message header is 16 octets: a 16-bit Reserved field (must be zero), a 16-bit Message Length (total message including header), a 16-bit Flags field (R/S/C/A/P/I bits), a 16-bit Message Type, a 32-bit Session Identifier, and a 32-bit Sequence Number, followed by AVPs. All fields are in network byte order.'
section: "6.2"
topics:
    - security
