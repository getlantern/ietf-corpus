document: rfc-7392
kind: wire-format
summary: The L2 PW Address ER-Hop TLV (Type 0x0805) is 18 bytes in length. It contains U/F bits, a 14-bit Type field, a Length field (=18), an L bit indicating loose (set) or strict (cleared) hop, Reserved bits, a PreLen field (prefix length 1–96), and AII Type 2 fields (AII Type, Length, Global ID, Prefix, AC ID) as defined in RFC 5003.
section: 3.4.3
topics:
    - mpls
