document: rfc-4704
kind: normative-requirement
summary: The data in the Domain Name field MUST be encoded as described in Section 8 of RFC 3315 (DHCPv6). The client and server MUST NOT alter the Domain Name field contents unless the FQDN has actually changed.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
