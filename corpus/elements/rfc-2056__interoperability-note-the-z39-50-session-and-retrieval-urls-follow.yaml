document: rfc-2056
kind: interoperability-note
summary: The Z39.50 Session and Retrieval URLs follow the Common Internet Scheme Syntax as defined in RFC 1738. The BNF character classes (uchar, xchar, escape, reserved, etc.) are taken directly from RFC 1738, including its final definition where '=' was moved from extra to reserved and national was removed from unreserved.
section: "5"
