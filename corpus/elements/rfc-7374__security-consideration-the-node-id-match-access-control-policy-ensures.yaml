document: rfc-7374
kind: security-consideration
summary: The NODE-ID-MATCH access control policy ensures only a service provider itself can insert a pointer to itself in the ReDiR tree, preventing a malicious node from inserting pointers to arbitrary other nodes. It also limits a node to one RedirServiceProvider record per tree level, blocking pointer-flooding attacks.
section: "9"
topics:
    - security
    - routing
