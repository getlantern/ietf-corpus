document: rfc-4548
kind: protocol-element
summary: An NSAP address (NSAPA) is a 20-octet structure consisting of an Initial Domain Part (IDP) and Domain Specific Part (DSP). The IDP contains a 1-octet AFI and a 2-octet IDI encoded in BCD format. Under AFI '35', the IDI holds the ICP value; the remaining 17 octets form the DSP.
