document: rfc-9746
kind: normative-requirement
summary: In case of an inconsistency in the SHT value advertised by NVEs attached to the same ES for a given EVI, all NVEs MUST revert to the behavior in RFC 8365 and use the default SHT in Table 1, irrespective of the advertised SHT.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - routing
