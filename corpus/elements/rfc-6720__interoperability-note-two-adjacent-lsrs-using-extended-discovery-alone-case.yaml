document: rfc-6720
kind: interoperability-note
summary: Two adjacent LSRs using Extended Discovery alone (case a, e.g., for Pseudowire signaling) will not have GTSM enabled by default for their LDP session, even though they are single-hop neighbors, leaving them unprotected by GTSM.
