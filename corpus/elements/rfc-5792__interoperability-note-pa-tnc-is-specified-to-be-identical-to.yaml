document: rfc-5792
kind: interoperability-note
summary: PA-TNC is specified to be identical to TCG's IF-M 1.0 protocol, enabling interoperability between IETF NEA deployments and Trusted Network Connect (TNC) implementations. PA subtype and attribute type values carry completely different meanings when used with different Vendor IDs; the IETF standard namespace requires Vendor ID = 0.
section: "1"
topics:
