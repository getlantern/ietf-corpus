document: rfc-7650
kind: normative-requirement
summary: In the URI-MATCH access control policy, a given value MUST be written and overwritten if and only if the signer's certificate contains a uniformResourceIdentifier entry in the subjectAltName Extension that in canonicalized form hashes to the Resource-ID for the resource.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - pkix
