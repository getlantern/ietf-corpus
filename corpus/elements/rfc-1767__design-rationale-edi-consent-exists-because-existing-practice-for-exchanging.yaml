document: rfc-1767
kind: design-rationale
summary: EDI-consent exists because 'existing practice for exchanging EDI includes a very wide range of specifications which are not part of the usual, accredited standards world. Nevertheless, this traffic is substantial and well-established.' It provides a standard delimiting mechanism without endorsing any specific non-standard EDI format.
