document: rfc-5798
kind: wire-format
summary: 'The VRRP packet header contains: Version (4 bits), Type (4 bits), Virtual Rtr ID (8 bits), Priority (8 bits), Count IPvX Addr (8 bits), Rsvd (4 bits), Max Adver Int (12 bits), Checksum (16 bits), followed by one or more IPvX addresses. The packet is encapsulated in IPv4 or IPv6 with protocol/Next Header 112.'
