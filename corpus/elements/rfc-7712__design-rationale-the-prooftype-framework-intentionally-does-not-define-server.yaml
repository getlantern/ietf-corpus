document: rfc-7712
kind: design-rationale
summary: The prooftype framework intentionally does not define Server Dialback keys (XEP-0220) as a DNA prooftype, because XEP-0220 reuses dialback protocol syntax for inter-server signaling rather than defining it as a formal proof mechanism. Nothing prevents continued use of dialback for signaling; a future specification could define a Dialback DNA prooftype consistent with this framework.
section: "7"
topics:
    - security
