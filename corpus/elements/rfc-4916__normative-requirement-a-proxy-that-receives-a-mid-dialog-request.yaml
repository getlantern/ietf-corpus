document: rfc-4916
kind: normative-requirement
summary: 'A proxy that receives a mid-dialog request MUST be prepared for the To and/or From header field URIs to differ from those in the dialog-forming request and response. A proxy that can provide an Authentication Service for mid-dialog requests MUST record route if Supported: from-change is indicated in the dialog-forming request received from the UAC.'
section: "4.7"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
