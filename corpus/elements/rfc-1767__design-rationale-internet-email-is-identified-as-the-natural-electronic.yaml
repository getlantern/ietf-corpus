document: rfc-1767
kind: design-rationale
summary: Internet email is identified as the natural electronic delivery mechanism for EDI transactions because EDI historically replaced paper-based postal interchange. MIME encapsulation adds to the EDI repertoire without changing the primary EDI syntax/semantics specifications.
