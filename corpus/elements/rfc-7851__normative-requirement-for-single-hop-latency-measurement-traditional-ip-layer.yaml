document: rfc-7851
kind: normative-requirement
summary: For single-hop latency measurement, traditional IP-layer ping MUST be used instead of overlay diagnostics methods, since overlay timestamps require time synchronization and are unsuitable for single-hop precision.
section: "6.4"
rfc2119_level: MUST
topics:
