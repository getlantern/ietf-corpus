document: rfc-6675
kind: security-consideration
summary: SACK-based loss recovery is more robust than standard TCP against attackers forging duplicate ACKs to force cwnd reduction, because SACK provides an additional check on ACK legitimacy. While not fool-proof, SACK offers meaningful protection against this attack vector.
