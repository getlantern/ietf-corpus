document: rfc-9219
kind: protocol-element
summary: The Email/query FilterCondition is extended with "hasSmime" (Boolean) matching messages where "smimeStatus" is non-null (true) or null (false), "hasVerifiedSmime" (Boolean) matching messages with "smimeStatus" equal to "signed/verified" or "encrypted+signed/verified", and "hasVerifiedSmimeAtDelivery" (Boolean) using "smimeStatusAtDelivery" instead.
section: "4.2"
topics:
