document: rfc-6430
kind: security-consideration
summary: All security considerations from RFC 5965 are inherited. Additionally, not-spam reports are likely to be used in attacks on filtering systems by reporting true spam as not-spam. Operators must be careful in trusting such reports beyond their applicability to the specific reporting user.
section: "4"
topics:
