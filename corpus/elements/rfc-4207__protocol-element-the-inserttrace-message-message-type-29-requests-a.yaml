document: rfc-4207
kind: protocol-element
summary: 'The InsertTrace message (Message Type 29) requests a remote node to send a specific trace message over a data link. Its format is: Common Header, MESSAGE_ID, LOCAL_INTERFACE_ID, TRACE. The remote node MUST respond with InsertTraceAck or InsertTraceNack.'
section: 4.1.9
topics:
    - routing
