document: rfc-4750
kind: design-rationale
summary: Trap throttling guidance in Section 4 recommends that implementations suppress excessive traps (e.g., from flapping interfaces) and optionally ignore initial activity at startup. The MIB separates the trap definitions into their own optional module to allow deployments that do not require trap support to omit it entirely.
section: "4"
topics:
    - routing
    - snmp
    - measurement
