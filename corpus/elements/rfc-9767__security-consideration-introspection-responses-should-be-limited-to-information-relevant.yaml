document: rfc-9767
kind: security-consideration
summary: Introspection responses should be limited to information relevant to the requesting RS, following the principle of least disclosure. A compromised RS could otherwise learn about the broader system by receiving the full token contents intended for other RSs.
section: "6.8"
topics:
    - security
    - privacy
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
