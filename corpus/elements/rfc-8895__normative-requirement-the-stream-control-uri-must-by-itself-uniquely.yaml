document: rfc-8895
kind: normative-requirement
summary: The stream control URI MUST by itself uniquely identify the update stream instance; the server MUST NOT use cookies or client IP to determine the stream, and MUST NOT reuse a control URI after the associated stream is closed.
section: "7.1"
rfc2119_level: MUST
topics:
    - http
    - security
