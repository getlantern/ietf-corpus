document: rfc-8416
kind: security-consideration
summary: SLURM can be used to locally manipulate assertions about non-private INRs such as globally routed address space, for example to override RPKI data believed to be corrupted by adverse actions. Network operators who elect to use SLURM in this fashion should use extreme caution.
section: "6"
topics:
    - security
    - bgp
    - routing
