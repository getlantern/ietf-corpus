document: rfc-3434
kind: protocol-element
summary: hcRisingAlarm and hcFallingAlarm are SNMP NOTIFICATION-TYPEs generated when a high capacity alarm entry crosses its rising or falling threshold respectively. Each notification carries the alarm variable OID, sample type, current absolute value, value status, threshold values, and event index.
