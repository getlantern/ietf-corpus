document: rfc-4721
kind: normative-requirement
summary: If the Mobile-AAA Authentication extension is present in the Registration Request, the foreign agent MUST NOT remove the Mobile-AAA Authentication extension and the Mobile-Foreign Challenge extension from the Registration Request before forwarding to the home agent.
section: "3.2"
rfc2119_level: MUST NOT
topics:
