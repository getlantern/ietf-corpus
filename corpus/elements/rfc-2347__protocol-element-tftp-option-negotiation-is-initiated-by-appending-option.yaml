document: rfc-2347
kind: protocol-element
summary: TFTP option negotiation is initiated by appending option/value pairs to Read Request (opcode 1) or Write Request (opcode 2) packets. Options are NULL-terminated, case-insensitive ASCII strings; the order is not significant. The maximum size of a request packet is 512 octets.
section: Packet Formats
