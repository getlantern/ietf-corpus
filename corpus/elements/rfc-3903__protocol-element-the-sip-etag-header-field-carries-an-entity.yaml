document: rfc-3903
kind: protocol-element
summary: The SIP-ETag header field carries an entity-tag assigned by the ESC to identify a specific publication. It is returned in the 2xx response to every successful PUBLISH request and must be unique among all currently active entity-tags for that Request-URI.
section: 11.3.1
topics:
    - sip
    - realtime
