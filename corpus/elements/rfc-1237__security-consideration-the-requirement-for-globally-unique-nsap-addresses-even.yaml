document: rfc-1237
kind: security-consideration
summary: 'The requirement for globally unique NSAP addresses (even for zero-homed and private routing domains) is a foundational security property: without global uniqueness, a routing domain cannot reliably distinguish packets addressed to it from those addressed to another domain with a colliding address, undermining correct packet delivery and routing isolation.'
section: "7"
topics:
    - security
    - routing
