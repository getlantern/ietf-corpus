document: rfc-6505
kind: normative-requirement
summary: If the MS receives a <join> or <modifyjoin> request with a <stream> element specifying a region while the conference video-switching policy is <vas/>, the MS ignores the specified region — conference VAS switching policy takes precedence over per-stream region assignments.
section: 4.2.1.4.3
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
