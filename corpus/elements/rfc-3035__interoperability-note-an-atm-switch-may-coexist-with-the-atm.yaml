document: rfc-3035
kind: interoperability-note
summary: An ATM switch may coexist with the ATM Forum/ITU control component (UNI, PNNI) alongside the label switching control component (ships in the night). The two control components operate independently, sharing only information such as the partitioning of the VPI/VCI space.
