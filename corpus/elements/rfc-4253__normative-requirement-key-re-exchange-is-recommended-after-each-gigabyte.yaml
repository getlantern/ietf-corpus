document: rfc-4253
kind: normative-requirement
summary: Key re-exchange is RECOMMENDED after each gigabyte of transmitted data or each hour of connection time, whichever comes sooner. Either party MAY initiate re-exchange, but roles MUST NOT change.
section: "9"
rfc2119_level: RECOMMENDED
