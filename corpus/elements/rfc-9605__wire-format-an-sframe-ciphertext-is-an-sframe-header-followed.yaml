document: rfc-9605
kind: wire-format
summary: An SFrame ciphertext is an SFrame header followed by the output of an AEAD encryption (per RFC 5116), with the header provided as additional authenticated data (AAD). The authentication tag is considered part of the ciphertext, not a separate field.
