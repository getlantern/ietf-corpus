document: rfc-4034
kind: normative-requirement
summary: A DNSSEC-aware resolver or name server MUST implement all MANDATORY algorithms. At the time of this document, RSA/SHA-1 (algorithm 5) is MANDATORY for zone signing, and SHA-1 (digest type 1) is MANDATORY for DS records.
section: A.1, A.2
rfc2119_level: MUST
topics:
    - dns
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
