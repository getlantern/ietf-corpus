document: rfc-2794
kind: protocol-element
summary: When the IPCP IP Address Configuration Option has IP address zero, the PPP peer allocates and assigns a co-located care-of address to the mobile node. If the option carries a nonzero address, that address is assigned as the co-located care-of address.
