document: rfc-1549
kind: interoperability-note
summary: Synchronous-to-asynchronous converters (sometimes built into modems) may be present on point-to-point links, creating a hybrid where one end is bit-synchronous and the other is asynchronous. The converter is responsible for all ACCM mapping; bit-synchronous PPP must still acknowledge the ACCM Configuration Option to enable this.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
