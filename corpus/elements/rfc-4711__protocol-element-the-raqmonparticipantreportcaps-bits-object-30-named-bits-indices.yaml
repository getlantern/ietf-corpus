document: rfc-4711
kind: protocol-element
summary: The raqmonParticipantReportCaps BITS object (30 named bits, indices 0–29) indicates which RAQMON metrics the data source is capable of reporting, as perceived by the collector. Capability to report a metric does not mandate that the metric is always sent.
