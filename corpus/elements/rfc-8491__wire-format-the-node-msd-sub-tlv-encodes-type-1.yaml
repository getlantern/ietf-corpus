document: rfc-8491
kind: wire-format
summary: The Node MSD sub-TLV encodes Type (1 octet, value 23), Length (1 octet, variable, multiple of 2), and a Value field consisting of one or more pairs of 1-octet MSD-Type and 1-octet MSD-Value. MSD-Value is in the range 0-255, where 0 indicates inability to support any SID stack depth.
section: "2"
topics:
