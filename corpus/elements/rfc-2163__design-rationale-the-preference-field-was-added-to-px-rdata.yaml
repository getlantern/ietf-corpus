document: rfc-2163
kind: design-rationale
summary: The PREFERENCE field was added to PX RDATA (mirroring MX record semantics) to address the practical problem that some X.400 ADMD providers do not accept messages with a blank ADMD, requiring a way to specify multiple mappings with priority ordering for domains with multiple connectivity.
section: "4.1"
topics:
