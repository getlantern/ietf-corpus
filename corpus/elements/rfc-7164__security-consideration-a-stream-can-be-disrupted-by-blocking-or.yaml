document: rfc-7164
kind: security-consideration
summary: A stream can be disrupted by blocking or delaying leap-second notification to one participant, or by tricking a participant into believing a leap second has been scheduled when it has not. These vulnerabilities are inherited from RFC 3550 and are not introduced or worsened by this document.
section: "6"
topics:
    - rtp
    - security
    - realtime
