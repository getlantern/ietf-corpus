document: rfc-7026
kind: design-rationale
summary: Of the 18 ACH Channel Types defined at the time of writing, none allows the use of ACH TLVs, and there were no unexpired Internet-Drafts utilizing ACH TLVs. This absence of adoption confirms the feature is not useful.
