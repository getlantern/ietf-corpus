document: rfc-5798
kind: normative-requirement
summary: Routers MUST NOT forward a datagram destined to the VRRP IPv4 multicast address 224.0.0.18 regardless of its TTL, and likewise MUST NOT forward datagrams to the IPv6 VRRP multicast address FF02:0:0:0:0:0:0:12.
section: 5.1.1.2
rfc2119_level: MUST NOT
topics:
