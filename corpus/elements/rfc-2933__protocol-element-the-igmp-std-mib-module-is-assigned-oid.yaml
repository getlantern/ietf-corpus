document: rfc-2933
kind: protocol-element
summary: 'The IGMP-STD-MIB module is assigned OID { mib-2 85 } and contains two conceptual tables: igmpInterfaceTable (one row per IGMP-enabled interface) and igmpCacheTable (one row per multicast group per interface). Both tables are intended for implementation by hosts and routers, though some objects apply only to routers.'
