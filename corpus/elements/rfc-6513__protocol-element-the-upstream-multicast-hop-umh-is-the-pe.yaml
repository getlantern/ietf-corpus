document: rfc-6513
kind: protocol-element
summary: The Upstream Multicast Hop (UMH) is the PE or ASBR at which C-multicast data packets enter the VPN backbone for a given C-root (source address or RP). UMH selection builds a candidate set of eligible VPN-IP routes matching the C-root and selects one deterministically to ensure all egress PEs converge on the same ingress PE.
section: "5.1"
topics:
    - bgp
    - mpls
    - multicast
    - routing
