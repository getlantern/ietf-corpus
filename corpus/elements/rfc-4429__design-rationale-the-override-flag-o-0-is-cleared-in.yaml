document: rfc-4429
kind: design-rationale
summary: The Override flag (O=0) is cleared in all Neighbor Advertisements sent from an Optimistic Address. This prevents neighbors from overriding existing NC entries with the Optimistic Node's link-layer address; the mechanism reuses the existing Override flag already defined in RFC 2461 for Proxy Neighbor Advertisement.
section: "2.2"
topics:
    - ip
    - v6ops
