document: rfc-5844
kind: interoperability-note
summary: In Proxy Mobile IPv6, IPsec SAs are specific to the MAG (not the mobile node), use Proxy-CoA/IPv4-Proxy-CoA as traffic selectors, and are not updated when the mobile node moves. This differs fundamentally from Mobile IPv6 and Dual-Stack Mobile IPv6 where SAs are per-mobile-node and use HoA/IPv4-HoA as selectors.
section: "1.2"
topics:
    - mobility
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
