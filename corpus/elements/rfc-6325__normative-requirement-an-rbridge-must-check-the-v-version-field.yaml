document: rfc-6325
kind: normative-requirement
summary: An RBridge MUST check the V (Version) field in a received TRILL-encapsulated frame. If the value is not recognized, the RBridge MUST silently discard the frame. New TRILL Version numbers require an IETF Standards Action.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
