document: rfc-4516
kind: normative-requirement
summary: An octet MUST be percent-encoded if it is not in the RFC 3986 reserved or unreserved sets, if it is the single reserved character '?' occurring inside a `<dn>`, `<filter>`, or other LDAP URL element, or if it is a comma ',' occurring inside an `<exvalue>`.
section: "2.1"
rfc2119_level: MUST
topics:
    - ldap
