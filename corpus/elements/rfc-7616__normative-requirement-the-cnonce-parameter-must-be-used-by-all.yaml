document: rfc-7616
kind: normative-requirement
summary: The cnonce parameter MUST be used by all implementations. It is an opaque ASCII-only string chosen by the client to prevent chosen plaintext attacks, provide mutual authentication, and provide limited message integrity protection.
section: "3.4"
rfc2119_level: MUST
topics:
