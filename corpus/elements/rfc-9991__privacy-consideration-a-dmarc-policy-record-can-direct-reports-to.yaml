document: rfc-9991
kind: privacy-consideration
summary: A DMARC Policy Record can direct reports to a third-party Report Consumer, enabling traffic analysis and metadata collection about the Mail Receiver's traffic. Mail Receivers must consider their privacy policies before sending reports to third parties; a Domain Owner may also publish an apparently internal address that actually forwards reports elsewhere.
section: "7.2"
topics:
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
