document: rfc-9174
kind: protocol-element
summary: Session Extension Items are carried in the SESS_INIT message as a variable-length list (prefixed by a U32 length). Each item uses a consistent container encoding defined in Section 4.8. Extension items apply for the full duration of the TCPCL session; their order and multiplicity are significant per their type specification.
section: "4.8"
