document: rfc-9530
kind: interoperability-note
summary: Repr-Digest is designed to be independent of transfer codings (e.g., chunked transfer encoding for HTTP/1.1). Its value is computed over the selected representation data, so a Repr-Digest sent in a trailer section has the same value it would have in a header section, as demonstrated in Appendix B.11.
section: "3"
