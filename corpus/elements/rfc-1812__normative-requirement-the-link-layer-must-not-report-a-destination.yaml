document: rfc-1812
kind: normative-requirement
summary: The link layer MUST NOT report a Destination Unreachable error to IP solely because there is no ARP cache entry; it SHOULD queue a small number of datagrams while performing ARP and only report unreachable after ARP fails. A router MUST NOT believe any ARP reply claiming a broadcast or multicast address as a host's link-layer address.
section: 3.3.2
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
