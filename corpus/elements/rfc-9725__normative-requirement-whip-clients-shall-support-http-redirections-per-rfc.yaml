document: rfc-9725
kind: normative-requirement
summary: WHIP clients SHALL support HTTP redirections per RFC 9110. Status codes '301 Moved Permanently' and '302 Found' MUST NOT be used for load balancing POST requests; '307 Temporary Redirect' is the preferred method to avoid POST-to-GET conversion.
section: "4.5"
rfc2119_level: MUST NOT
topics:
