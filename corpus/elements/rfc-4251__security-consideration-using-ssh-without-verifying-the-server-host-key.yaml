document: rfc-4251
kind: security-consideration
summary: 'Using SSH without verifying the server host key–hostname binding is inherently insecure and NOT RECOMMENDED because it is vulnerable to man-in-the-middle attacks. Three attack scenarios are described: pre-session device interposition, social-engineering key distribution, and in-session packet manipulation.'
section: 9.3.4
topics:
    - security
