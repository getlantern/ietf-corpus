document: rfc-5607
kind: protocol-element
summary: 'The Management-Transport-Protection (134) Attribute specifies the minimum level of protection required for the management transport. Values are: 1=No-Protection, 2=Integrity-Protection, 3=Integrity-Confidentiality-Protection. The protected transport MAY provide greater but MUST NOT provide lower protection than specified.'
section: "6.2"
topics:
    - radius
    - security
