document: rfc-8093
kind: design-rationale
summary: Certain BGP Path Attribute values were used in deployed BGP implementations without being assigned by IANA, a practice called "squatting". Unregistered usage of BGP Path Attribute values can lead to deployment problems for new technologies that later receive formal IANA assignment of those same values.
section: "1"
topics:
    - bgp
    - registry
