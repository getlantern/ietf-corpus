document: rfc-3311
kind: design-rationale
summary: For the caller, UPDATE can contain an offer before INVITE completion only if the callee generated an answer in a reliable provisional response and the caller has sent/received answers to all prior offers in PRACK or UPDATE. This preserves a consistent offer/answer state per RFC 3261 Section 13.2.1.
section: "5.1"
topics:
    - sip
    - realtime
