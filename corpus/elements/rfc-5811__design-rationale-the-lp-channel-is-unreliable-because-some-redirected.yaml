document: rfc-5811
kind: design-rationale
summary: The LP channel is unreliable because some redirected control protocols are themselves reliable (adding TML reliability would be harmful) or desire message obsolescence over retransmission. ForCES heartbeats are also traffic-sensitive and tolerate loss if the peer is busy.
