document: rfc-9244
kind: security-consideration
summary: The vendor attack mapping data exchanged over the DOTS data channel (RESTCONF/HTTPS) carries Enterprise Numbers (vendor-id) and attack taxonomies. Implementations must validate that vendor-id values correspond to legitimate enterprise numbers to prevent spoofed attack classifications from influencing mitigation decisions.
section: "14.2"
topics:
    - security
