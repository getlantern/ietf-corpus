document: rfc-3620
kind: protocol-element
summary: The TUNNEL profile allows BEEP peers to act as application-layer proxies by exchanging nested 'tunnel' elements that specify a source route. Each proxy strips the outermost element and uses it to determine the next hop; the innermost empty 'tunnel' element signals the final destination.
section: "1"
topics:
