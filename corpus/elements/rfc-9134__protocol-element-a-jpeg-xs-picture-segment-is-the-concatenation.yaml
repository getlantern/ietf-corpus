document: rfc-9134
kind: protocol-element
summary: A JPEG XS picture segment is the concatenation of a Video Support (VS) box, a Color Specification (CS) box, and a JPEG XS codestream. For progressive video each frame is one picture segment; for interlaced video each frame is two concatenated picture segments.
