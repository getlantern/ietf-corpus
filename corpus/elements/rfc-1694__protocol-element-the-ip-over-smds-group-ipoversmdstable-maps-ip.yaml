document: rfc-1694
kind: protocol-element
summary: 'The IP-over-SMDS group (ipOverSMDSTable) maps IP addresses to SMDS addressing for Logical IP Subnetwork (LIS) support per RFC 1209: ipOverSMDSHA holds the SMDS individual address, ipOverSMDSLISGA the LIS group address for all SNI members, and ipOverSMDSARPReq the SMDS address for ARP requests.'
section: 4.4.1
topics:
