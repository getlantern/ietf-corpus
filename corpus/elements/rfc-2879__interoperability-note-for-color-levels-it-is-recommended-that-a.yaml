document: rfc-2879
kind: interoperability-note
summary: For 'color-levels', it is recommended that a recipient declares its supported number of color values as an inequality (<=) and a data resource declares the number of colors it uses with an equality, to achieve a feature match between systems with differing capacities.
section: A.3
