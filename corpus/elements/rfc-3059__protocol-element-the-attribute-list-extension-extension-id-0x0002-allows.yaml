document: rfc-3059
kind: protocol-element
summary: The Attribute List Extension (Extension ID 0x0002) allows a UA to request that a service's attributes be included in Service Reply messages, eliminating the need for separate Attribute Request round trips. The UA sends an empty extension in the Service Request; the SA/DA returns one Attribute List Extension per URL Entry in the Service Reply.
section: "2"
topics:
    - registry
    - security
