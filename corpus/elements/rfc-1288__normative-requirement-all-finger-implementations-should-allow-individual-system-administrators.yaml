document: rfc-1288
kind: normative-requirement
summary: All Finger implementations SHOULD allow individual system administrators to tailor which atoms of information (e.g., office location, phone number, home phone, login/logout time) are returned in response to a query, down to the minimum of the person's full name.
section: 3.2.3
rfc2119_level: SHOULD
topics:
    - security
    - privacy
