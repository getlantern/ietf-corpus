document: rfc-3856
kind: protocol-element
summary: PA migration allows the PA function to move from one server to another, e.g., from a presence server to a PUA when it connects. A PUA wishing to indicate PA support SHOULD use callee capabilities (RFC 3840) to indicate support for SUBSCRIBE and the presence event package. After a failed migration (405 or 489 response), the server SHOULD NOT attempt further migrations to that PUA for the duration of its registration.
section: 6.11.2
topics:
    - sip
    - realtime
