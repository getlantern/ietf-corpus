document: rfc-4306
kind: normative-requirement
summary: All IKEv2 implementations MUST be able to send, receive, and process IKE messages up to 1280 bytes long, and SHOULD be able to handle messages up to 3000 bytes long. Implementations SHOULD be aware of the maximum UDP message size supported and MAY shorten messages by omitting certificates or cryptographic suite proposals.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
