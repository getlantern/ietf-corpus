document: rfc-4064
kind: normative-requirement
summary: Foreign Agents and Home Agents SHOULD include an experimental error code in a reply message only if they have a general indication the receiving entity can parse it, such as when the request was of type EXP-MSG-TYPE or contained at least one experimental extension.
section: "9"
rfc2119_level: SHOULD
topics:
    - mobility
