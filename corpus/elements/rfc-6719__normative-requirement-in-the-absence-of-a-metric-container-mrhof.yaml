document: rfc-6719
kind: normative-requirement
summary: In the absence of a Metric Container, MRHOF uses ETX as its metric. The node computes ETX locally for links to neighbors, adds to their advertised Rank, and MUST NOT include a metric container in its DIO messages. ETX Rank is assigned as ETX * 128.
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
