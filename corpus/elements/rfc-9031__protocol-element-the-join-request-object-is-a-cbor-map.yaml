kind: protocol-element
summary: 'The Join_Request object is a CBOR map with labels: role (1, optional uint indicating ''6TiSCH Node''=0 or ''6LBR''=1), network identifier (5, required byte string), and unsupported configuration (8, optional Unsupported_Configuration array). The network identifier MUST always be included.'
