document: rfc-9181
kind: protocol-element
summary: 'The ''placement-constraints'' grouping defines a list of constraints keyed by constraint-type (identityref based on placement-diversity, covering bearer-diverse, pe-diverse, pop-diverse, linecard-diverse, same-pe, same-bearer). Each constraint specifies a target via a choice: specific group IDs, all-other-accesses, or all-other-groups.'
