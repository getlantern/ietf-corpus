document: rfc-3611
kind: normative-requirement
summary: A terminating null chunk MUST appear at the end of a Loss RLE Report Block if the number of run-length plus bit-vector chunks is odd; bits in a bit-vector chunk that extend beyond the last reported sequence number MUST be set to zero and MUST be ignored.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
