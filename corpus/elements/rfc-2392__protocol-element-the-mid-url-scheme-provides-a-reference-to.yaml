document: rfc-2392
kind: protocol-element
summary: 'The ''mid:'' URL scheme provides a reference to an email message or a specific body part within a message by its Message-ID. The syntax is: mid-url = "mid" ":" message-id [ "/" content-id ], where the optional content-id portion identifies a specific body part within the named message.'
section: "2"
topics:
    - email
