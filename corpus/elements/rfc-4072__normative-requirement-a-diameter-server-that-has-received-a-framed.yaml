document: rfc-4072
kind: normative-requirement
summary: A Diameter server that has received a Framed-MTU AVP in a Diameter-EAP-Request MUST NOT send any subsequent EAP-Payload AVP in that conversation whose length exceeds the specified Framed-MTU value, accounting for link-type overhead.
section: "2.6"
rfc2119_level: MUST NOT
topics:
    - diameter
