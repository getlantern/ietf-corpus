document: rfc-9012
kind: security-consideration
summary: The Tunnel Encapsulation attribute is transitive and MUST be scoped to a well-defined administrative domain. Distribution beyond that scope can cause packets to traverse unintended tunnels. EBGP filtering of the attribute MUST be enabled by default to prevent leakage.
section: "11"
topics:
    - bgp
    - routing
    - security
