document: rfc-4448
kind: design-rationale
summary: 'Mode #4 (Tag on A, No Tag on C) is not recommended when operating with PW since it may not preserve the user''s PRI bits. The recommended alternative is to use mode #2 with tag2=0 (NULL VLAN) on the PW and mode #3 at the other end, which preserves PRI bits.'
section: A.1
topics:
