document: rfc-6931
kind: protocol-element
summary: Camellia key wrap algorithms ('xmldsig-more#kw-camellia128/192/256') are identical to AES key wrap (RFC 3394) with 'AES' replaced by 'Camellia'. The check value is 0xA6A6A6A6A6A6A6A6. Wrapping 128-bit keys with 128-bit KEK and 256-bit keys with 256-bit KEK is particularly suggested.
section: 2.6.3
topics:
    - crypto
    - security
