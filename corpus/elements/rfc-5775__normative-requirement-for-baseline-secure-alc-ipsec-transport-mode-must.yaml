document: rfc-5775
kind: normative-requirement
summary: For baseline secure ALC, IPsec transport mode MUST be supported, and the use of IPsec processing for secure ALC traffic SHOULD also be REQUIRED such that unauthenticated packets are not received by the ALC protocol implementation.
section: 5.1.2.2
rfc2119_level: MUST
topics:
