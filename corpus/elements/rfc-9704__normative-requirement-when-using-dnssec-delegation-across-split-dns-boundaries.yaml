document: rfc-9704
kind: normative-requirement
summary: When using DNSSEC delegation across split DNS boundaries, at least one DNSKEY RR returned by the local encrypted resolver for 'resolver.arpa.' MUST match the DS RDATA from the Verification Record, and all local resolution results MUST offer RRSIGs chaining to an approved DNSKEY.
section: "7"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
