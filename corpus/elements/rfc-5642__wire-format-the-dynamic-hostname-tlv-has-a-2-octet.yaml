document: rfc-5642
kind: wire-format
summary: The Dynamic Hostname TLV has a 2-octet Type field (value 7), a 2-octet Length field indicating the hostname length in octets (excluding optional padding), and a Value field of 1–255 octets containing the hostname in US-ASCII, zero-padded to 4-octet alignment.
