document: rfc-4090
kind: normative-requirement
summary: To indicate that an LSP should be locally protected, the head-end LSR MUST either set the 'local protection desired' flag in SESSION_ATTRIBUTE or include a FAST_REROUTE object (or both). The head-end LSR of a protected LSP MUST set the 'label recording desired' flag in the SESSION_ATTRIBUTE object.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
