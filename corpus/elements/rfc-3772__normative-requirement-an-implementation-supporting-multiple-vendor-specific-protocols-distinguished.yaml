document: rfc-3772
kind: normative-requirement
summary: An implementation supporting multiple vendor-specific protocols distinguished by OUI MUST treat LCP Protocol-Reject specially by examining the OUI field and disabling only the protocol to which it refers, rather than all use of the vendor-specific protocol number.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
