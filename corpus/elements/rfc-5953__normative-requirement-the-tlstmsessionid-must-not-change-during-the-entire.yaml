document: rfc-5953
kind: normative-requirement
summary: The tlstmSessionID MUST NOT change during the entire duration of the session and MUST uniquely identify a single session. The (D)TLS internal SessionID does not meet these requirements, as it can change during renegotiation.
section: 3.1.3
rfc2119_level: MUST NOT
topics:
