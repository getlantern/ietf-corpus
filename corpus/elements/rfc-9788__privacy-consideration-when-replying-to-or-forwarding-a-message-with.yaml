document: rfc-9788
kind: privacy-consideration
summary: When replying to or forwarding a message with confidential Header Fields, MUAs must prevent leaking those fields in cleartext. The HP-Outer mechanism provides a cryptographically protected record of which fields were exposed, enabling safe replies without inadvertently revealing the original message's Subject or recipients.
section: "11.1"
topics:
    - email
    - privacy
