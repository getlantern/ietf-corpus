document: rfc-3056
kind: interoperability-note
summary: IPv4 ICMP 'unreachable' messages returned to the 6to4 router for encapsulated packets cannot generally be translated into ICMPv6 messages for the originating IPv6 node, making the IPv4 cloud appear as an undiagnosable link layer for IPv6 operational purposes.
