document: rfc-8866
kind: wire-format
summary: 'The ''o='' line encodes originator and session identifier as: username, sess-id (numeric string), sess-version (numeric), nettype (e.g. ''IN''), addrtype (e.g. ''IP4''/''IP6''), and unicast-address, all space-delimited. The tuple (username, sess-id, nettype, addrtype, unicast-address) forms a globally unique session identifier.'
section: "5.2"
topics:
    - realtime
