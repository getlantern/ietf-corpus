document: rfc-3812
kind: interoperability-note
summary: When mplsTunnelIsIf is true, ifName of the resulting interface SHOULD equal mplsTunnelName, and the tunnel description in mplsTunnelDescr MAY be absent or auto-generated at transit and egress LSRs because it is not signaled by MPLS protocols.
section: "8.1"
topics:
