document: rfc-5552
kind: security-consideration
summary: 'For data confidentiality, the VoiceXML Media Server MUST implement sips: and https: schemes in addition to S/MIME message body encoding as described in RFC 3261. SRTP (RFC 3711) MUST be supported to provide confidentiality, authentication, and replay protection for RTP media streams including RTCP traffic.'
