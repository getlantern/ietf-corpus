document: rfc-4933
kind: protocol-element
summary: 'The <contact:disclose> element allows a client to specify disclosure preferences for contact data elements. It MUST contain a ''flag'' boolean attribute and at least one child element from: name (int/loc), org (int/loc), addr (int/loc), voice, fax, or email.'
section: "2.9"
topics:
    - privacy
