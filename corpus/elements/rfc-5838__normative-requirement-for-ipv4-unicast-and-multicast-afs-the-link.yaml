document: rfc-5838
kind: normative-requirement
summary: For IPv4 unicast and multicast AFs, the link's IPv4 address MUST be advertised in the 'link local address' field of the IPv4 instance's Link-LSA, placed in the first 32 bits. The remaining bits MUST be set to zero.
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
