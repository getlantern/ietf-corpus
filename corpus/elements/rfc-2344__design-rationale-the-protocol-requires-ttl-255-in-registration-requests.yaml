document: rfc-2344
kind: design-rationale
summary: The protocol requires TTL=255 in Registration Requests as a lightweight mechanism to limit reverse-tunnel hijacking to attackers within one hop, without introducing denial-of-service risks from unauthenticated state. The Mobile IP Working Group rejected stronger unauthenticated mechanisms because they introduced DoS exposure.
section: "6.1"
topics:
    - mobility
    - security
