document: rfc-6140
kind: design-rationale
summary: The mechanism focuses specifically on E.164 phone numbers because SIP URIs with an E.164 user portion are globally unique regardless of the domain, satisfying the requirement that each AOR map to a unique contact set without coordination between SSPs.
