document: rfc-3209
kind: design-rationale
summary: The LABEL_REQUEST includes an L3PID field because the network layer protocol over an LSP cannot be inferred from the L2 header (which only identifies MPLS). This allows non-IP protocols to be carried and aids allocation of protocol-specific reserved MPLS labels.
section: "2.2"
topics:
    - mpls
    - routing
