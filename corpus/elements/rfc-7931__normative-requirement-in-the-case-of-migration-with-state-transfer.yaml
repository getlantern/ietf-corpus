document: rfc-7931
kind: normative-requirement
summary: In the case of migration with state transfer, the transfer MUST be done in a way that is transparent to the client. The new server must recognize stateids from the original server as valid and treat them as representing the same locks — same file, same lock type (open, delegation, advisory byte-range, mandatory byte-range), same particulars (access/deny modes, byte ranges), and same owner strings.
section: 6.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
