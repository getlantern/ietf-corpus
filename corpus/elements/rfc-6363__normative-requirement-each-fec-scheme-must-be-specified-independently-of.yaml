document: rfc-6363
kind: normative-requirement
summary: Each FEC scheme MUST be specified independently of all other FEC schemes, either in a separate specification or a completely independent section of a larger document. The encoding format of any protocol element MUST have fixed length or length derivable from the encoded bytes themselves.
