document: rfc-1331
kind: normative-requirement
summary: Any non-LCP packets received during the Link Establishment phase MUST be silently discarded. All Configuration Options are assumed to be at default values unless altered by the LCP configuration exchange.
section: "4.4"
rfc2119_level: MUST
