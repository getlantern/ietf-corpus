document: rfc-6076
kind: protocol-element
summary: t1 (start time) is defined as the instant the first bit of a request packet is sent by the UA or proxy at an externally observable interface. t4 (end time) is when the last bit of the designated response is received by the requesting device. t1 also serves as the time-of-day stamp for a measurement; t2 and t3 are reserved for future use.
section: "3"
topics:
    - realtime
    - measurement
