document: rfc-2728
kind: interoperability-note
summary: On 525-line systems, Line 21 is reserved for closed captioning in some countries, reducing available VBI lines from 12 to 11. Certain lines on both 525-line and 625-line systems may be occupied by existing proprietary data or testing services, requiring IP to share or use only a subset of lines.
section: 3.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
