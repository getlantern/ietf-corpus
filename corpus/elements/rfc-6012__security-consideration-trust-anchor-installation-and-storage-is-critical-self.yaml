document: rfc-6012
kind: security-consideration
summary: Trust anchor installation and storage is critical. Self-signed certificates used as trust anchors must be transmitted via out-of-band steps and verified (e.g., via certificate fingerprint per Section 5.3.1). Changes to trust anchor information can cause acceptance of certificates that should be rejected.
section: "9.4"
topics:
    - pkix
    - security
    - syslog
