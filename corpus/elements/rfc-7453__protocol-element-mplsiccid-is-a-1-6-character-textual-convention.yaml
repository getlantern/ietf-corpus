document: rfc-7453
kind: protocol-element
summary: MplsIccId is a 1–6 character TEXTUAL-CONVENTION for the ITU-T Carrier Code, encoded in uppercase alphanumeric characters (A–Z, 0–9) per ITU-T T.50. A zero-length string indicates an invalid ICC identifier.
