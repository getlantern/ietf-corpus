document: rfc-5252
kind: normative-requirement
summary: A single L1VPN Info TLV MUST be present in the L1VPN LSA. If more than one L1VPN Info TLV is present, only the first TLV is processed and the others MUST be ignored on receipt.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - vpn
