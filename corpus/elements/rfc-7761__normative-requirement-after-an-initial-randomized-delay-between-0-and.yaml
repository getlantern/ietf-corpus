document: rfc-7761
kind: normative-requirement
summary: After an initial randomized delay between 0 and Triggered_Hello_Delay (to prevent synchronization), Hello messages MUST be sent every Hello_Period seconds. The Hello Timer SHOULD NOT be reset except when it expires.
section: 4.3.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
