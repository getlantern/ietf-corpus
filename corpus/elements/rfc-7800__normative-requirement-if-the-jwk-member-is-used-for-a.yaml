document: rfc-7800
kind: normative-requirement
summary: If the "jwk" member is used for a symmetric key, the JWT MUST be encrypted so the key is not revealed to unintended parties; if the JWT is not encrypted, the symmetric key MUST be encrypted as a JWE.
section: "3.2"
rfc2119_level: MUST
