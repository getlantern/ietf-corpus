kind: protocol-element
summary: The 'recurrence-with-time-zone' grouping is structurally similar to recurrence-utc but uses a duration type (ISO 8601-like string) instead of uint32 seconds for duration, and includes a time-zone-identifier. It is designed for human readability rather than machine readability.
