document: rfc-6679
kind: normative-requirement
summary: No matter how ECN usage is initiated, the sender MUST continually monitor the ability of the network and all its receivers to support ECN, as path changes or receiver population changes may invalidate ECN usability.
section: "7.2"
rfc2119_level: MUST
topics:
