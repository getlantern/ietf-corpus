document: rfc-6810
kind: protocol-element
summary: Session ID is generated when a cache server starts, uniquely identifying the cache instance and binding it to the sequence of Serial Numbers that instance will generate. It allows a router to restart a failed session knowing its Serial Numbers remain commensurate with the cache.
