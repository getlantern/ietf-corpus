document: rfc-8114
kind: normative-requirement
summary: 'The mAFTR MUST interwork PIM Join/Prune messages: (*,G6) and (S6,G6) on the IPv6 side are mapped to corresponding (*,G4) and (S4,G4) on the IPv4 side. The mAFTR MUST process received PIMv6 Join messages by updating both TIB6 and TIB4 accordingly.'
section: "7.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
