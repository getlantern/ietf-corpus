document: rfc-8955
kind: wire-format
summary: 'The Numeric Operator (numeric_op) is a 1-octet field with bits: e (end-of-list), a (AND), len (2 bits encoding value length as 1<<len bytes), one reserved zero bit, and comparison bits lt, gt, eq. Combinations of lt/gt/eq encode all standard relational operators.'
section: 4.2.1.1
