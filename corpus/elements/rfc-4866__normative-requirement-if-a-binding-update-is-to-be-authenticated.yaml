document: rfc-4866
kind: normative-requirement
summary: If a Binding Update is to be authenticated using a permanent home keygen token but the correspondent node has no such token in its Binding Cache entry, it MUST reject the message with status code 147 ('Permanent home keygen token unavailable').
section: "4.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
