document: rfc-7105
kind: security-consideration
summary: The 'lying by proxy' attack uses easily falsified measurement data (e.g., GNSS, whose contextual data is broadcast publicly) to coerce the LIS into producing falsified location information bearing the LIS's credibility, which is then conveyed to third-party location recipients. Digitally signed location information or location URIs served directly by the LIS are the primary attack vectors.
section: 7.1.4
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
