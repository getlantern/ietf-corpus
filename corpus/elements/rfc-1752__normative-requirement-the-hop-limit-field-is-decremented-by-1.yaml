document: rfc-1752
kind: normative-requirement
summary: The Hop Limit field is decremented by 1 by each forwarding node; the packet MUST be discarded if Hop Limit is decremented to zero. This replaces IPv4's TTL and limits the impact of routing loops.
section: "12.1"
rfc2119_level: MUST
topics:
    - ip
