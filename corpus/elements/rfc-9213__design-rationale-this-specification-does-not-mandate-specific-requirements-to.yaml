document: rfc-9213
kind: design-rationale
summary: This specification does not mandate specific requirements to mitigate the age-penalty interaction with HTTP freshness, but definitions of targeted fields can impose such requirements. Deployment techniques include removing the Age header, updating Date, or updating Expires.
section: "2.3"
