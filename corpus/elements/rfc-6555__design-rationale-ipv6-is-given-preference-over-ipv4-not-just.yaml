document: rfc-6555
kind: design-rationale
summary: IPv6 is given preference over IPv4 (not just equal treatment) to reduce load on IPv4 infrastructure such as NAT devices and load-balancers, enabling ISPs and content providers to reduce IPv4 investment. Treating both address families equally based solely on connection speed would sustain IPv4 load and make IPv6 transition more expensive.
section: "4.1"
topics:
    - ip
    - v6ops
    - nat
