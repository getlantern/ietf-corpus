document: rfc-8178
kind: normative-requirement
summary: 'The following feature types are not allowed as extensions to an existing minor version and require creation of a new minor version: features incorporating non-XDR-based changes (field interpretation changes or behavioral changes), features whose XDR changes violate the extension rules, addition of REQUIRED new features, and changes to the status of existing features such as converting them to mandatory to not implement.'
section: "7.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
