document: rfc-5130
kind: interoperability-note
summary: Implementations that support only a single tag and those that support multiple tags may coexist in the same IS-IS domain. An implementation supporting multiple tags SHOULD therefore assign any tag required to be interpreted by all systems as the first tag in any set of multiple tags.
section: "6"
topics:
    - routing
