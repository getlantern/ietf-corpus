document: rfc-3758
kind: normative-requirement
summary: Under the timed reliability service, before assigning a TSN to any message, the SCTP sender MUST evaluate the lifetime of that message; if expired, it MUST NOT assign a TSN and SHOULD issue a notification to the upper layer.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - sctp
