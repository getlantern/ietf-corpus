document: rfc-1427
kind: normative-requirement
summary: Once a server has agreed to accept a message of a declared size, it should not return a 552 reply after the DATA transfer phase unless the actual size transferred is greater than the declared message size.
section: "6.3"
rfc2119_level: SHOULD NOT
