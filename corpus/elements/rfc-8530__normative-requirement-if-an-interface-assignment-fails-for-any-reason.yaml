document: rfc-8530
kind: normative-requirement
summary: If an interface assignment fails for any reason other than a missing leafref, the operation SHALL fail with error-tag 'operation-failed' and error-app-tag 'lne-assignment-failed'; a meaningful error-info SHOULD also be provided.
