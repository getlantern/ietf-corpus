document: rfc-5389
kind: protocol-element
summary: The ALTERNATE-SERVER mechanism lets a server redirect a client by responding with error 300 (Try Alternate) and an ALTERNATE-SERVER attribute. If the client has already tried the redirected server within the last five minutes, it MUST ignore the redirection to prevent infinite redirect loops.
section: "11"
