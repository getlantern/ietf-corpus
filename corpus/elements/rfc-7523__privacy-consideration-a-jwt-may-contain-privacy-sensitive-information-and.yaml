document: rfc-7523
kind: privacy-consideration
summary: A JWT may contain privacy-sensitive information and should only be transmitted over encrypted channels such as TLS to prevent disclosure to unintended parties. Where it is desirable to prevent disclosure to the client itself, the JWT should be encrypted to the authorization server.
section: "7"
topics:
    - oauth
    - jose
    - privacy
    - tls
