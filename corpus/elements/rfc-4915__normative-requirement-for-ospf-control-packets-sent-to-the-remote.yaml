document: rfc-4915
kind: normative-requirement
summary: For OSPF control packets sent to the remote end of a virtual link, the transit area path MUST be composed of links participating in the default topology and the OSPF control packets MUST be forwarded using the default topology.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
