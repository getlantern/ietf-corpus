document: rfc-8200
kind: wire-format
summary: 'The TCP/UDP pseudo-header for IPv6 checksum computation includes: Source Address (128 bits), Destination Address (128 bits), Upper-Layer Packet Length (32 bits), zero padding (24 bits), and Next Header (8 bits). The final destination address must be used when a Routing header is present.'
section: "8.1"
