document: rfc-4695
kind: normative-requirement
summary: The recovery journal mandate requires that the MIDI performance rendered from an RTP MIDI stream sent over unreliable transport MUST NOT contain indefinite artifacts (e.g., stuck notes, wrong volume level). The recovery journal achieves this without packet retransmission by coding stream history back to a checkpoint packet.
section: "4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
