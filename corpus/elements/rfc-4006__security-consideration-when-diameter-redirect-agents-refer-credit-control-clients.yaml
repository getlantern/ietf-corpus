document: rfc-4006
kind: security-consideration
summary: When Diameter Redirect agents refer credit-control clients to credit-control servers for direct connection, the client must ensure the redirected connection uses appropriate security. A malicious redirect could divert credit-control traffic to an unauthorized server, enabling fraudulent service grants or account manipulation.
section: "14.1"
topics:
    - diameter
    - security
