document: rfc-7468
kind: interoperability-note
summary: Files MAY contain multiple textual encoding instances, for example when a file contains several certificates. Whether the instances are ordered or unordered depends on the context. Many tools emit explanatory text before BEGIN and after END lines for PKIX certificates.
