document: rfc-7852
kind: privacy-consideration
summary: The scope of these data structures is explicitly limited to emergency calls. Use in non-emergency calls is undefined and would unnecessarily expose confidential subscriber, device, and service information. The Call-Info 'EmergencyCallData' purpose value SHOULD NOT appear outside emergency call contexts.
section: "10"
topics:
    - privacy
    - sip
