document: rfc-3977
kind: normative-requirement
summary: Where UTF-8 characters outside U+0000–U+007F are permitted, implementations MUST NOT use the Byte Order Mark (U+FEFF, %xEF.BB.BF) and MUST use the Word Joiner (U+2060) for the meaning Zero Width No-Break Space in command lines and initial response lines.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
