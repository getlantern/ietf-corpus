document: rfc-9946
kind: protocol-element
summary: The server assigns a unique ephemeral UDP port per test connection (returned in the testPort field of the Setup Response). The server immediately sends a Null Request from that port to open firewall pinholes; Status messages during the Data phase also keep NAT/firewall mappings active.
