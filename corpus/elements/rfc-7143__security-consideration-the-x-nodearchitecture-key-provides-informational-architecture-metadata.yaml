document: rfc-7143
kind: security-consideration
summary: The X#NodeArchitecture key provides informational architecture metadata and MUST NOT be used to make security-relevant decisions because its content is neither authenticated nor integrity-protected. It MUST NOT influence access control, trust level, or any security-critical processing.
section: "9.4"
