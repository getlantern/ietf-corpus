document: rfc-4568
kind: normative-requirement
summary: When generating the initial answer, the answerer MUST accept exactly one of the offered crypto attributes or MUST reject the offered stream. The selected crypto attribute in the answer MUST contain the tag and crypto-suite from the accepted offer, plus the answerer's own keying material.
section: 5.1.2
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
