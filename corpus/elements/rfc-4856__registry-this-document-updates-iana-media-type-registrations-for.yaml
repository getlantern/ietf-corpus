document: rfc-4856
kind: registry
summary: 'This document updates IANA media type registrations for 19 RTP payload formats: audio/DVI4, audio/G722, audio/G723, audio/G726-16, audio/G726-24, audio/G726-32, audio/G726-40, audio/G728, audio/G729, audio/G729D, audio/G729E, audio/GSM, audio/GSM-EFR, audio/L8, audio/L16, audio/LPC, audio/PCMA, audio/PCMU, audio/VDVI, and video/nv. References for these types are changed from RFC 3555 to RFC 4856.'
section: "1.1"
topics:
