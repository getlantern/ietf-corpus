document: rfc-7769
kind: protocol-element
summary: The MAC Address Withdraw OAM Message is a PW OAM message sent over the in-band PW Associated Channel (ACH) to signal MAC address withdrawal for statically provisioned pseudowires. It uses channel type 0x0028 and follows the message structure defined in RFC 6478.
