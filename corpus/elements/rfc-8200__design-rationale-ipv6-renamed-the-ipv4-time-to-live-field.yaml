document: rfc-8200
kind: design-rationale
summary: IPv6 renamed the IPv4 'Time-to-Live' field to 'Hop Limit' because IPv6 nodes are not required to enforce maximum packet lifetime. In practice, very few IPv4 implementations actually limited packet lifetime, so this is not a change in practice.
section: "8.2"
topics:
    - ip
