document: rfc-8261
kind: normative-requirement
summary: A DTLS connection MUST be established before an SCTP association can be set up. Multiple SCTP associations MAY be multiplexed over a single DTLS connection using SCTP port numbers for demultiplexing.
section: "6.1"
rfc2119_level: MUST
topics:
    - sctp
    - tls
