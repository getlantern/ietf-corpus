document: rfc-8390
kind: protocol-element
summary: 'Two new Diversity XRO subobjects are defined: IPv4 Diversity (XRO Type 38) and IPv6 Diversity (XRO Type 39). Both contain an L flag, XRO Type, Length, DI Type (4 bits), A-Flags (4 bits), E-Flags (4 bits), Reserved (4 bits), a Diversity Identifier Source Address, and a variable-length Diversity Identifier Value.'
