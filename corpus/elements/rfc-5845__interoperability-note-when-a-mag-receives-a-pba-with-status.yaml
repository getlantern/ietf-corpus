document: rfc-5845
kind: interoperability-note
summary: When a MAG receives a PBA with status GRE_TUNNELING_BUT_TLV_HEADER_NOT_SUPPORTED in response to a PBU with GRE Key option and T flag set, the MAG MUST use GRE encapsulation without UDP encapsulation, or may alternatively resend the PBU to negotiate different tunneling options or de-register the session.
section: "7.3"
topics:
    - routing
    - ip
    - udp
