document: rfc-7515
kind: normative-requirement
summary: Any JSON inputs not conforming to the JSON-text syntax defined in RFC 7159 MUST be rejected in their entirety by JSON parsers. JWSs with trailing extra characters after a valid JSON object MUST be considered invalid.
section: "10.12"
rfc2119_level: MUST
