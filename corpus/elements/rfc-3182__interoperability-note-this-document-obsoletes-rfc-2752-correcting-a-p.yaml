document: rfc-3182
kind: interoperability-note
summary: This document obsoletes RFC 2752, correcting a P-Type codepoint assignment error and a field size definition error in ErrorValue. Implementations based on RFC 2752 must update their P-Type and ErrorValue handling to align with RFC 3182.
