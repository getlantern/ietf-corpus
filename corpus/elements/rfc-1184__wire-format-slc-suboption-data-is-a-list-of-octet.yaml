document: rfc-1184
kind: wire-format
summary: 'SLC suboption data is a list of octet triplets: first octet is the function code (1-30), second octet encodes level bits (SLC_LEVELBITS=3) in the low two bits and flags SLC_ACK (128), SLC_FLUSHIN (64), SLC_FLUSHOUT (32) in the upper bits, and third octet is the ASCII character value. Any octet equal to IAC must be sent doubled.'
section: "2.4"
