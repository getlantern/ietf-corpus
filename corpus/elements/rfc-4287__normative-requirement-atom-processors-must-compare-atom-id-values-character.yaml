document: rfc-4287
kind: normative-requirement
summary: Atom Processors MUST compare atom:id values character-by-character in a case-sensitive fashion. Comparison MUST NOT rely on dereferencing the IRI. Two IRIs that resolve to the same resource but differ in any character (including case or percent-encoding) are considered distinct identifiers.
section: 4.2.6.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
