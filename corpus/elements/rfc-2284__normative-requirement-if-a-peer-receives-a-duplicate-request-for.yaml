document: rfc-2284
kind: normative-requirement
summary: If a peer receives a duplicate Request for which it has already sent a Response, it MUST resend its Response. If a peer receives a duplicate Request before sending a Response (i.e., waiting for user input), it MUST silently discard the duplicate Request.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
