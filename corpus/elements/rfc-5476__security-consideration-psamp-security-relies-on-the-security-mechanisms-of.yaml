document: rfc-5476
kind: security-consideration
summary: PSAMP security relies on the security mechanisms of the underlying IPFIX protocol [RFC5101]. The hashInitialiserValue is designated optional (MAY be omitted) so that implementations are not forced to expose hash state that could enable an adversary to predict or reverse-engineer packet selection decisions.
