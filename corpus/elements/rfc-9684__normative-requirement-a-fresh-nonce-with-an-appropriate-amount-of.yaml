document: rfc-9684
kind: normative-requirement
summary: A fresh nonce with an appropriate amount of entropy MUST be supplied by the YANG client to enable proof-of-freshness with respect to attestation Evidence. This nonce is also used to prevent replay attacks.
section: "2"
rfc2119_level: MUST
