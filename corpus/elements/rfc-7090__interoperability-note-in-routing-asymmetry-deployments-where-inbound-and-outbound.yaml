document: rfc-7090
kind: interoperability-note
summary: In routing-asymmetry deployments where inbound and outbound SIP proxies are different entities, the domain-comparison approach from RFC 6443 fails because callback state is stored only at the outbound proxy while the callback arrives at the inbound proxy.
