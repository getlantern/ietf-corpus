document: rfc-3404
kind: normative-requirement
summary: If a record at a particular order matches the URI but the client doesn't know the specified protocol and service, the client SHOULD continue examining records at the same order. The client MUST NOT consider records with a higher order value.
section: "6"
rfc2119_level: MUST NOT
topics:
