document: rfc-6762
kind: normative-requirement
summary: A compliant Multicast DNS querier MUST send its queries from UDP source port 5353 and MUST listen for replies sent to UDP destination port 5353 at the mDNS link-local multicast address (224.0.0.251 and/or FF02::FB).
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - udp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
