document: rfc-6003
kind: design-rationale
summary: CIR, CBS, EIR, and EBS are encoded as 32-bit IEEE single-precision floating-point numbers (per RFC4506/XDR) to accommodate the wide range of Ethernet bandwidth values (from low-rate services to high-speed ports) within a fixed-size field.
