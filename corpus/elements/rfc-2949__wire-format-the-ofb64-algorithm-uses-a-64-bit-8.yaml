document: rfc-2949
kind: wire-format
summary: The OFB64 algorithm uses a 64-bit (8-byte) IV and processes data in 64-bit chunks. The keystream is computed as V0 = CAST(iV, key), V(n+1) = CAST(Vn, key), and ciphertext On = Dn XOR Vn.
