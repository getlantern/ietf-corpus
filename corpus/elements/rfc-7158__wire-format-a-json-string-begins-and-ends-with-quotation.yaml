document: rfc-7158
kind: wire-format
summary: A JSON string begins and ends with quotation marks (%x22). Control characters U+0000–U+001F, quotation mark, and reverse solidus must be escaped. Characters in the BMP may be escaped as \uXXXX (six characters); characters outside the BMP are encoded as a 12-character UTF-16 surrogate pair escape sequence.
section: "7"
topics:
