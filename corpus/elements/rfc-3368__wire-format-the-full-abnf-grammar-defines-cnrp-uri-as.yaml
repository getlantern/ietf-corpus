document: rfc-3368
kind: wire-format
summary: The full ABNF grammar defines cnrp-uri as 'go:' followed by form1 or form2. form1 uses '//' with an optional server and optional query; form2 is a bare common-name with optional attribute-value pairs. The avpair production is ';' attribute '=' [type ','] value.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
