document: rfc-7671
kind: normative-requirement
summary: It is RECOMMENDED that TLSA records published for DANE servers be 'DANE-EE(3) SPKI(1) SHA2-256(1)' records, as SPKI(1) is compatible with raw public keys and the record need not change across certificate renewals with the same key.
section: "5.1"
rfc2119_level: RECOMMENDED
