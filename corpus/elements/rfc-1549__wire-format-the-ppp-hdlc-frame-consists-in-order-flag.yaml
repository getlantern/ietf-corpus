document: rfc-1549
kind: wire-format
summary: 'The PPP HDLC frame consists, in order: Flag (0x7e, 1 octet), Address (0xff, 1 octet), Control (0x03, 1 octet), Protocol (16 bits), Information (variable), Padding (variable), FCS (16 bits), Flag (0x7e). Start/stop bits and transparency octets are not shown in this layout.'
