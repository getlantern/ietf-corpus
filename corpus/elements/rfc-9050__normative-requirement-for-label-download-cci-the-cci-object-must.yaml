document: rfc-9050
kind: normative-requirement
summary: For label download CCI, the CCI object MUST be included along with the LSP object in the PCInitiate message. If a PCC receives a label out of the PCE's reserved range, it MUST send PCErr Error-Type=31, Error-value=1 (Label out of range).
section: 5.5.3.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
