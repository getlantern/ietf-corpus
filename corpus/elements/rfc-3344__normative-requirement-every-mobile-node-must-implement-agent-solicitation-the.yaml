document: rfc-3344
kind: normative-requirement
summary: Every mobile node MUST implement Agent Solicitation. The rate at which a mobile node sends solicitations MUST be limited; after three initial solicitations at up to one per second, subsequent solicitations MUST use binary exponential backoff with a maximum interval of at least one minute.
section: "2.4"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
