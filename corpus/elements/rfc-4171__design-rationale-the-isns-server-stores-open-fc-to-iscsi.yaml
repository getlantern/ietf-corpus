document: rfc-4171
kind: design-rationale
summary: The iSNS server stores open FC-to-iSCSI device mappings (Proxy iSCSI Name tag 101, WWNN Token tag 37) rather than keeping them internal to gateways, so any authorized iSNS client can retrieve and use the mapping without relying on proprietary gateway mechanisms.
section: 2.2.4
