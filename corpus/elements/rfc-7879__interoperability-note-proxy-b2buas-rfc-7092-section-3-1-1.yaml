document: rfc-7879
kind: interoperability-note
summary: Proxy-B2BUAs (RFC 7092 Section 3.1.1) modify only Via and Record-Route headers and do not touch any field covered by the RFC 4474 or SIP-ID identity signature, so they are fully compatible with end-to-end DTLS-SRTP without any additional constraints.
section: "4.1"
topics:
