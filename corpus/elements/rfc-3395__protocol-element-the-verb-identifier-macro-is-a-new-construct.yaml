document: rfc-3395
kind: protocol-element
summary: The VERB-IDENTIFIER macro is a new construct in the PI language for associating string verb names with integer enumerations for a specific parent application. It extends the Protocol Identifier Reference (RFC 2895) grammar with a new keyword VERB-IDENTIFIER and an associated <piVerbDefinition> production.
