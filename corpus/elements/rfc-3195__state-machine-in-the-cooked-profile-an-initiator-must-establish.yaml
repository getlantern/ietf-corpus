document: rfc-3195
kind: state-machine
summary: In the COOKED profile, an initiator MUST establish identity via 'iam' before 'entry' elements will be accepted; an 'entry' is rejected with error code 530 if no 'iam' has been accepted. After a successful 'iam' exchange, the initiator may send 'entry' and 'path' elements, each acknowledged with 'ok' or 'error'.
section: "4.4"
