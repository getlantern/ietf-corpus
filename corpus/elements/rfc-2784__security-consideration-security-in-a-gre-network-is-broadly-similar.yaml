document: rfc-2784
kind: security-consideration
summary: Security in a GRE network is broadly similar to a normal IPv4 network since GRE follows the same routing. However, packet filtering requires either inspecting inside the GRE packet or filtering at tunnel endpoints; terminating the tunnel at a firewall may be desirable in security-sensitive environments.
section: "6"
topics:
