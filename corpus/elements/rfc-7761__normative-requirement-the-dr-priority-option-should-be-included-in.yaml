document: rfc-7761
kind: normative-requirement
summary: The DR Priority option SHOULD be included in every Hello message, even if no DR Priority is explicitly configured on the interface. Priority-based DR election is only enabled when all neighbors on an interface advertise the DR Priority option; the default priority is 1.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
