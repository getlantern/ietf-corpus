document: rfc-7522
kind: normative-requirement
summary: The Assertion's <Issuer> element MUST contain a unique identifier for the issuing entity. Compliant applications MUST compare Issuer values using Simple String Comparison (RFC 3986 Section 6.2.1) absent an application profile specifying otherwise.
section: "3"
rfc2119_level: MUST
topics:
