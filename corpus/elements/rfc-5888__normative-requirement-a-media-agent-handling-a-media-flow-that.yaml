document: rfc-5888
kind: normative-requirement
summary: A media agent handling a media flow that comprises several 'm' lines MUST send a copy of the media to every 'm' line that is part of the flow, as long as the codecs and the direction attribute present in a particular 'm' line allow it.
section: "8.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
