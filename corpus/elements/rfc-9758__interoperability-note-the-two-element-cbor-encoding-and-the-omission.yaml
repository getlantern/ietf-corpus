document: rfc-9758
kind: interoperability-note
summary: The two-element CBOR encoding and the omission of non-default Allocator Identifiers maintain full backwards compatibility back to RFC 6260. However, the three-element encoding and non-default Allocator Identifiers are not forwards compatible with RFC 9171; existing implementations MUST be updated to process them.
section: "7.1"
rfc2119_level: MUST
topics:
    - cbor
