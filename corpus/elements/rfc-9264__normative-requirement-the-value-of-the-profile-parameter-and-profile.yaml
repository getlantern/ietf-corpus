document: rfc-9264
kind: normative-requirement
summary: The value of the 'profile' parameter (and 'profile' attribute on a 'linkset' link) MUST be a non-empty list of space-separated URIs identifying constraints or conventions. Profile URIs MAY be registered in the IANA 'Profile URIs' registry.
section: "5"
rfc2119_level: MUST
topics:
