document: rfc-4380
kind: normative-requirement
summary: The default link MTU assumed by Teredo hosts and the MTU supplied by a Teredo server in Router Advertisements SHOULD normally be set to the minimum IPv6 MTU of 1280 bytes to minimize IPv4 fragmentation on unpredictable Internet paths.
section: 5.1.2
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - nat
