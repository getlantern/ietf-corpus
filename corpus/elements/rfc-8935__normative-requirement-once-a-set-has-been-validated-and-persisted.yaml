document: rfc-8935
kind: normative-requirement
summary: Once a SET has been validated and persisted, the SET Recipient SHOULD immediately return a success response and SHOULD NOT perform further processing of the SET prior to sending this response; additional steps SHOULD be executed asynchronously.
