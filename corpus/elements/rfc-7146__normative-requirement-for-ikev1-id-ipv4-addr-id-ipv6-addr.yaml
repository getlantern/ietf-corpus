document: rfc-7146
kind: normative-requirement
summary: For IKEv1, ID_IPV4_ADDR, ID_IPV6_ADDR (if IPv6 supported), and ID_FQDN identification types MUST be supported; ID_KEY_ID MUST NOT be used. For IKEv2, the same address/FQDN types MUST be supported; ID_RFC822_ADDR SHOULD be supported; ID_KEY_ID MUST NOT be used.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
