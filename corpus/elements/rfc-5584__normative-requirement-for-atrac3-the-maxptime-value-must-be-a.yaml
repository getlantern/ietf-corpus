document: rfc-5584
kind: normative-requirement
summary: For ATRAC3, the maxptime value MUST be a multiple of 24 ms. For ATRAC-X, it MUST be a multiple of 47 ms or 43 ms depending on sample rate. For ATRAC Advanced Lossless, it MUST be 12, 24, or 47 ms.
