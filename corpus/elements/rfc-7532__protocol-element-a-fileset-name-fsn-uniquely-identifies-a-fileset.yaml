document: rfc-7532
kind: protocol-element
summary: 'A Fileset Name (FSN) uniquely identifies a fileset across a federation and consists of three components: NsdbName (the NSDB node''s network location), FsnUuid (a UUID per RFC 4122), and FsnTTL (time-to-live in seconds for cached FSL records). The FsnUuid and NsdbName never change during the FSN''s lifetime.'
section: "2.7"
topics:
    - registry
