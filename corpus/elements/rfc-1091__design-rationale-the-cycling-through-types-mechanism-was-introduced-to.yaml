document: rfc-1091
kind: design-rationale
summary: The cycling-through-types mechanism was introduced to allow a server to present a list of preferred terminal types and select among them, addressing the limitation in prior Telnet mechanisms where multiple names were assumed to be synonyms and the list could only be scanned once.
