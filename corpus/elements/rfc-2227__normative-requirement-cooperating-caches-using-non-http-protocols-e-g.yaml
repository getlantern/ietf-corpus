document: rfc-2227
kind: normative-requirement
summary: Cooperating caches using non-HTTP protocols (e.g., ICP) to exchange cached responses MUST ensure the origin server receives reports that account for all uses or reuses by all cooperating members, and that usage limits apply to the group as a whole.
section: "5.6"
rfc2119_level: MUST
topics:
    - http
