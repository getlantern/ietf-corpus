document: rfc-9457
kind: security-consideration
summary: When defining a new problem type or generating a problem response, information included must be carefully vetted to avoid leaking details that could expose attack vectors, compromise the system, or violate user privacy. Generators providing links to occurrence information should avoid exposing implementation details such as stack dumps through the HTTP interface.
section: "5"
topics:
