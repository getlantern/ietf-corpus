document: rfc-4087
kind: interoperability-note
summary: If the combined octet count of tunnelInetConfigLocalAddress and tunnelInetConfigRemoteAddress exceeds 110, OIDs of column instances will exceed the 128 sub-identifier maximum and will be inaccessible via SNMPv1, SNMPv2c, or SNMPv3. In practice, IPv4 and IPv6 addresses do not reach this limit.
section: "4"
topics:
