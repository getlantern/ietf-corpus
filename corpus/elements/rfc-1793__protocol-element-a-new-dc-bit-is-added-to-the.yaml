document: rfc-1793
kind: protocol-element
summary: A new DC-bit is added to the OSPF Options field to indicate demand circuit capability. A router sets the DC-bit in all self-originated LSAs if it can correctly process DoNotAge LSAs, and sets it in Hello and Database Description packets if it wants to treat the attached point-to-point link as a demand circuit.
section: "2.1"
topics:
    - routing
