document: rfc-6822
kind: protocol-element
summary: On broadcast (multi-access) circuits, MI-RTRs establish adjacencies and elect a DIS per IS-IS instance. Different IS-IS instances may elect different DIS routers on the same LAN, since each MI-RTR only forms adjacencies with routers that advertise support for the configured instances.
section: 2.4.2
topics:
    - routing
