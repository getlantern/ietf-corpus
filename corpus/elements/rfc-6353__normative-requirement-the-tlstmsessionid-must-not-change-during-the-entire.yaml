document: rfc-6353
kind: normative-requirement
summary: The tlstmSessionID MUST NOT change during the entire duration of the session and MUST uniquely identify a single session. A session identifier MUST NOT be reused until all references to it are no longer in use.
section: 3.1.3
rfc2119_level: MUST NOT
topics:
