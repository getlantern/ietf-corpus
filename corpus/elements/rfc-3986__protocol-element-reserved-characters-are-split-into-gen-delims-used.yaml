document: rfc-3986
kind: protocol-element
summary: Reserved characters are split into gen-delims (":", "/", "?", "#", "[", "]", "@") used to delimit URI components, and sub-delims ("!", "$", "&", "'", "(", ")", "*", "+", ",", ";", "=") reserved for subcomponent delimiters. URIs differing by replacement of a reserved character with its percent-encoded equivalent are not equivalent.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
