document: rfc-3581
kind: normative-requirement
summary: A client MAY include an 'rport' parameter in the top Via header field value of requests it generates. This parameter MUST have no value when sent by the client; it serves as a flag indicating the extension is supported and requested.
section: "3"
rfc2119_level: MAY
