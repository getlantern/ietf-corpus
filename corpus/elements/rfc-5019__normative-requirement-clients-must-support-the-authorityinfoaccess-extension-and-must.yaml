document: rfc-5019
kind: normative-requirement
summary: Clients MUST support the authorityInfoAccess extension and MUST recognize the id-ad-ocsp access method. Where both an AIA pointing to an OCSP responder and a cRLDistributionPoints extension are present, the client SHOULD attempt to contact the OCSP responder first.
section: "3.1"
rfc2119_level: MUST
topics:
    - pkix
    - security
