document: rfc-6880
kind: normative-requirement
summary: Each principal MAY be associated with zero or more KeySets. Implementations MUST NOT assume a principal has exactly one KeySet; they MUST support the general case of multiple KeySets per principal (e.g., to support key rollover).
section: 4.1.2
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
