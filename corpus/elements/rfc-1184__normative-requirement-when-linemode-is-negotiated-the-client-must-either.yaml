document: rfc-1184
kind: normative-requirement
summary: When LINEMODE is negotiated, the client MUST either export its local special character settings to the server or send 'SLC 0 SLC_DEFAULT 0' to import the server's defaults. Failure to do so leaves the connection in an undefined character state.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
