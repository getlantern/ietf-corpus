document: rfc-8048
kind: protocol-element
summary: 'XMPP presence authorizations are managed using <presence/> stanzas of type ''subscribe'', ''subscribed'', ''unsubscribe'', and ''unsubscribed'', with four main states: ''none'', ''from'', ''to'', and ''both''. SIP presence authorizations are implicitly triggered by subscription activity rather than explicit authorization stanzas.'
