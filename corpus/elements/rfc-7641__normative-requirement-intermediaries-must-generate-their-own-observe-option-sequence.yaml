document: rfc-7641
kind: normative-requirement
summary: Intermediaries MUST generate their own Observe Option sequence number values for notifications and MUST set Max-Age according to the age of their local current representation. If multiple clients observe the same resource via an intermediary, the intermediary MUST register itself only once with the next hop and fan out received notifications.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
