document: rfc-5404
kind: protocol-element
summary: The 'interleaving' media type parameter indicates that interleaved mode SHALL be used and specifies the number of frame-block slots in the de-interleaving buffer (including the frame ready to be consumed); its value MUST be greater than zero. If absent, interleaved mode SHALL NOT be used.
section: "7.1"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
