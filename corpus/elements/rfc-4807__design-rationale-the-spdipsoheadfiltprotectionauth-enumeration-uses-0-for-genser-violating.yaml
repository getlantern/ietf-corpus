document: rfc-4807
kind: design-rationale
summary: The spdIpsoHeadFiltProtectionAuth enumeration uses 0 for genser, violating the SMIv2 convention of avoiding 0 in enumerated lists. This is intentional to preserve consistency with the authoritative RFC 1108 enumeration values.
