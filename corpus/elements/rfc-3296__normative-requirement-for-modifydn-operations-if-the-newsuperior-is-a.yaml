document: rfc-3296
kind: normative-requirement
summary: For modifyDN operations, if the newSuperior is a referral object or subordinate to one, the server SHOULD return affectsMultipleDSAs. If the newRDN already exists as a referral object, the server SHOULD return affectsMultipleDSAs instead of entryAlreadyExists.
