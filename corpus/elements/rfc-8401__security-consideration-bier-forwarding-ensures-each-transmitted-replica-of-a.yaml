document: rfc-8401
kind: security-consideration
summary: BIER forwarding ensures each transmitted replica of a received packet has fewer bits set than the received packet (each bit appears in only one copy), preventing packet amplification via the IS-IS control plane. A failure of this property cannot be caused by IS-IS control plane attacks.
section: "7"
topics:
    - security
    - routing
    - multicast
