document: rfc-2613
kind: security-consideration
summary: The objects smonCapabilities, dataSourceCapsTable, and portCopyTable are considered sensitive; even GET access should be controlled and values encrypted in transit. SNMPv1 alone is insufficient — use of SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) is RECOMMENDED.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
