document: rfc-9209
kind: normative-requirement
summary: When adding a value to the Proxy-Status field, intermediaries SHOULD preserve the existing members of the field to allow debugging of the entire chain of intermediaries, unless explicitly configured to remove them (e.g., to prevent internal network details from leaking).
section: "2"
rfc2119_level: SHOULD
topics:
    - http
    - security
