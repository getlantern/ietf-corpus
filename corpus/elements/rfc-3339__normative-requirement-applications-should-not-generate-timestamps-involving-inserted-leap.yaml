document: rfc-3339
kind: normative-requirement
summary: Applications should not generate timestamps involving inserted leap seconds until after the leap seconds are announced by the International Earth Rotation Service (IERS), since leap seconds cannot be predicted far in advance.
section: "5.7"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
