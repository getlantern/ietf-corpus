document: rfc-5893
kind: design-rationale
summary: Yiddish (Hebrew script) uses combining points (NSM characters) in word-final position. The IDNA2003 requirement that RTL strings end with an R/AL character rejected valid Yiddish words such as the YIVO acronym ending in HEBREW POINT QAMATS (NSM).
section: "4.2"
topics:
