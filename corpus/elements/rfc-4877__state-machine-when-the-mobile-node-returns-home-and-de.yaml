document: rfc-4877
kind: state-machine
summary: When the mobile node returns home and de-registers, the tunnel between HA and care-of address is torn down. SPD entries for tunneled traffic SHOULD be made inactive; SAs for BU/BAck/MPD SHOULD NOT be deleted. Manually-configured SAs MUST be retained for reuse when the MN moves away again.
section: "4.2"
topics:
    - ipsec
    - mobility
