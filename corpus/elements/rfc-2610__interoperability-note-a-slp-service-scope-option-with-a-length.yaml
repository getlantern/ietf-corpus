document: rfc-2610
kind: interoperability-note
summary: A SLP Service Scope Option with a Length of 1 (omitting the Scope List string entirely) validly configures the SLP User Agent to use 'User Selectable Scopes,' where the UA aggregates scopes from all known DAs or uses SA discovery.
