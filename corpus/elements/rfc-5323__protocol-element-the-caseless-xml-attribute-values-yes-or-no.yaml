document: rfc-5323
kind: protocol-element
summary: The 'caseless' XML attribute (values 'yes' or 'no', default server-specified) allows clients to specify case-insensitive matching for comparison and ordering operators in DAV:basicsearch. Caseless matching SHOULD follow Unicode Standard Section 5.18. Support is optional; a server should respond with 422 if it cannot support the attribute.
section: "5.18"
topics:
    - http
