document: rfc-4931
kind: protocol-element
summary: The <domain:infData> response contains domain name, ROID, status values, registrant and contact identifiers, name servers, subordinate host names, sponsoring client ID, creation/update/expiry/transfer dates, and optionally the authInfo—but authInfo MUST only be returned to the sponsoring client or a client supplying valid authorization information.
