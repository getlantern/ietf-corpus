document: rfc-4425
kind: protocol-element
summary: 'The ''mode'' parameter (Advanced profile only) specifies whether sequence and entry-point headers may change: 0=both may change and will be included in RTP; 1=sequence layer header never changes; 3=both headers never change and may be omitted from RTP packets. Default is 0.'
