document: rfc-3492
kind: interoperability-note
summary: Because the Punycode delimiter is hyphen-minus and IDNA prepends an ACE prefix while forbidding pure-ASCII labels from being encoded, IDNA using Punycode conforms to the RFC 952 rule that host name labels neither begin nor end with a hyphen-minus.
