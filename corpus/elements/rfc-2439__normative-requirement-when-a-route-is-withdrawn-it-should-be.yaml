document: rfc-2439
kind: normative-requirement
summary: When a route is withdrawn, it should be treated as if an unreachable were received. A route path replacement by a peer should be treated as an unreachable followed by a route advertisement, since both AS paths may be flapping.
section: 4.8.4
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
