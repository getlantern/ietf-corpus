document: rfc-2740
kind: protocol-element
summary: 'Three flooding scopes are encoded in the upper bits of the 16-bit LS type field: link-local scope (flooded only on the originating link, used for Link-LSAs), area scope (flooded throughout a single OSPF area, used for Router-, Network-, Inter-Area-Prefix-, Inter-Area-Router-, and Intra-Area-Prefix-LSAs), and AS scope (flooded throughout the routing domain, used for AS-external-LSAs).'
section: "2.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
