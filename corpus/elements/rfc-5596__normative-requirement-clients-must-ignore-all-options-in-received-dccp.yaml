document: rfc-5596
kind: normative-requirement
summary: Clients MUST ignore all options in received DCCP-Listen packets and endpoints MUST ignore any payload data in DCCP-Listen packets, since feature negotiation and data transfer are not possible before connection establishment.
section: 2.2.1
rfc2119_level: MUST
