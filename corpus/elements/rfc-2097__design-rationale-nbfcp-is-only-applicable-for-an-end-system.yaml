document: rfc-2097
kind: design-rationale
summary: NBFCP is only applicable for an end system connecting to a peer system or the LAN that peer system is connected to. It is not applicable for connecting two LANs together due to NetBIOS name limitations and NetBIOS name defense mechanisms.
section: "1"
