document: rfc-3557
kind: normative-requirement
summary: The mel-cepstral frame format defined in ES 201 108 MUST be used. Pairs of quantized 10ms mel-cepstral frames MUST be grouped together and protected with a 4-bit CRC, forming a 92-bit FP.
