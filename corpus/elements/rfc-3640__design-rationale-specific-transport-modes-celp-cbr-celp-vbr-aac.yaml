document: rfc-3640
kind: design-rationale
summary: Specific transport modes (CELP-cbr, CELP-vbr, AAC-lbr, AAC-hbr, generic) are required to allow the design of simplified, dedicated receivers that need only implement one mode, rather than requiring all receivers to be fully configurable for any MPEG-4 stream.
