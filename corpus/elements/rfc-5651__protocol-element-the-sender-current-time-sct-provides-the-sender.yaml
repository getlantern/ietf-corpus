document: rfc-5651
kind: protocol-element
summary: The Sender Current Time (SCT) provides the sender's wall clock at packet transmission time. SCT-High carries seconds as an unsigned 32-bit integer; SCT-Low carries sub-second precision as a multiple of 1/2^32 of a second. When SCT-Low is set, SCT-High MUST also be set.
section: 5.2.2
topics:
    - multicast
    - ntp
