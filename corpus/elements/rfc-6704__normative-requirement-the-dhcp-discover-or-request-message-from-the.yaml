document: rfc-6704
kind: normative-requirement
summary: The DHCP Discover or Request message from the client MUST contain the FORCERENEW_NONCE_CAPABLE (145) option if the Forcerenew Nonce Protocol is to be used by the server; the absence of this option means the server MUST NOT include a Forcerenew Nonce Protocol Authentication option in the DHCP ACK.
section: 3.1.3
rfc2119_level: MUST
topics:
    - security
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
