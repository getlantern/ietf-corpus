document: rfc-2207
kind: normative-requirement
summary: When a RESV message contains a GPI FILTER_SPEC, the session must be defined using the GPI SESSION object; otherwise this is a message formatting error. The GPI in the FILTER_SPEC must also match the GPI in the corresponding SENDER_TEMPLATE.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
