kind: protocol-element
summary: The LT encoding symbol generator LTEnc[K, C, (d, a, b)] produces a single encoding symbol as the XOR of min(d, L) intermediate symbols selected by stepping b by a modulo the smallest prime L' >= L, skipping indices >= L.
