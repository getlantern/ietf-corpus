document: rfc-7658
kind: design-rationale
summary: NAT-MIB exposed many configuration parameters (e.g., timeouts) even in read-only mode, but since NAT implementations vary wildly in which parameters they support, few devices could claim even basic compliance. The lesson is that a NAT MIB's purpose is not to expose configuration parameters.
section: "3.1"
topics:
    - nat
    - snmp
