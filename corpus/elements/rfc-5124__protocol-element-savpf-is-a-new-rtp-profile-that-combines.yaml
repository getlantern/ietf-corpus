document: rfc-5124
kind: protocol-element
summary: SAVPF is a new RTP profile that combines SAVP (Secure RTP, RFC 3711) and AVPF (Extended RTP Profile for RTCP-Based Feedback, RFC 4585), enabling secure RTP communications with timely RTCP feedback. SAVP forms an intermediate layer between AVPF and the transport layer, with AVPF replacing the upper AVP layer.
section: "2"
topics:
