document: rfc-3894
kind: design-rationale
summary: Without ":copy", users who want to file or forward an extra copy of a message while preserving normal delivery must use an explicit "keep" command. However, an explicit "keep" is a poor substitute for the implicit keep when more processing follows, because subsequent "discard" commands cannot cancel an explicit "keep", leading to unintended inbox delivery.
section: "1"
topics:
