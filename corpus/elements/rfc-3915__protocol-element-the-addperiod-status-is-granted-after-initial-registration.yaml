document: rfc-3915
kind: protocol-element
summary: The addPeriod status is granted after initial registration; autoRenewPeriod after automatic renewal; renewPeriod after explicit renewal; and transferPeriod after a successful sponsorship transfer. In each case, if the registrar deletes the domain during the grace period, the registry provides a credit for the cost of the operation.
section: "3.1"
topics:
    - dns
    - registry
