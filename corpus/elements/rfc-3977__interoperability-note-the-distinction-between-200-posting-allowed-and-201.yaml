document: rfc-3977
kind: interoperability-note
summary: 'The distinction between 200 (posting allowed) and 201 (posting prohibited) initial greeting codes has proved insufficient in practice: some servers require authentication before allowing posting, and some clients incorrectly treat 201 as a permanent prohibition. Clients SHOULD use the CAPABILITIES command instead of relying on the greeting code.'
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
