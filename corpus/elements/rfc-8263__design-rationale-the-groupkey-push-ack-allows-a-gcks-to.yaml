document: rfc-8263
kind: design-rationale
summary: The GROUPKEY-PUSH ACK allows a GCKS to determine which GMs are receiving the current group policy and which are no longer participating, enabling policy-driven actions such as retransmission or removal of unresponsive GMs. Without ACKs, the GCKS has no positive confirmation that policy was delivered.
section: "1"
