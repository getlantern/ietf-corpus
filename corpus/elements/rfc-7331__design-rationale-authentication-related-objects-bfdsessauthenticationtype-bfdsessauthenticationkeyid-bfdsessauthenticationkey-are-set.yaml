document: rfc-7331
kind: design-rationale
summary: Authentication-related objects (bfdSessAuthenticationType, bfdSessAuthenticationKeyID, bfdSessAuthenticationKey) are set to read-create rather than a higher restriction to support management of a single key ID at a time; the MIB explicitly notes that key rotation is not handled.
