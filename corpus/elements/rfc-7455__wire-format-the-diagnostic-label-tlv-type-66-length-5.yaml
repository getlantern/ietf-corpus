document: rfc-7455
kind: wire-format
summary: 'The Diagnostic Label TLV (Type 66, Length 5) specifies the data label with: L-Type (1 octet: 0=12-bit 802.1Q VLAN, 1=24-bit fine-grained label), Reserved (1 octet), Label (24 bits). Receiving RBridges MUST compare the Flow Entropy data label to this TLV and set the C (Cross-Connect Error) flag on mismatch.'
section: 8.4.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
