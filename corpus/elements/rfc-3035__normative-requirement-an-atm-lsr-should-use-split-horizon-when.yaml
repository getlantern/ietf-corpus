document: rfc-3035
kind: normative-requirement
summary: 'An ATM-LSR SHOULD use split-horizon when satisfying binding requests: if the LSR making a request for a particular FEC is, according to this ATM-LSR, the next hop for that FEC, it should not return a binding for that route.'
section: "8.2"
rfc2119_level: SHOULD
topics:
