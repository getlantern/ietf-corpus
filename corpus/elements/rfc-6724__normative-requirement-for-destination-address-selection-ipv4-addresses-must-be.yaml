document: rfc-6724
kind: normative-requirement
summary: For destination address selection, IPv4 addresses MUST be represented as IPv4-mapped addresses. IPv4 addresses MUST be treated as having 'preferred' (RFC 4862) configuration status. IPv4 auto-configuration (169.254/16) and loopback (127/8) addresses are assigned link-local scope; all other IPv4 addresses are assigned global scope.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
