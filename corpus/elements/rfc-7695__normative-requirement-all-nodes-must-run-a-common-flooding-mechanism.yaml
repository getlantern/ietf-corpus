document: rfc-7695
kind: normative-requirement
summary: All Nodes MUST run a common Flooding Mechanism to share published Assigned Prefixes. The Flooding Mechanism MUST carry the Assigned Prefix, its Advertised Prefix Priority, and the Node ID of the advertising Node.
