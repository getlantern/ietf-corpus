document: rfc-1331
kind: wire-format
summary: 'The standard PPP frame consists of: Flag (0x7E, 1 octet), Address (0xFF, 1 octet), Control (0x03, 1 octet), Protocol (16 bits), Information (variable, default max 1500 octets), FCS (16 bits), and closing Flag (0x7E). Fields are transmitted left to right.'
