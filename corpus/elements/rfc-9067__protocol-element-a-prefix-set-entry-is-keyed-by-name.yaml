document: rfc-9067
kind: protocol-element
summary: A prefix-set entry is keyed by (name, mode) where mode is an enumeration of 'ipv4' or 'ipv6', and individual prefixes are identified by (ip-prefix, mask-length-lower, mask-length-upper). The mode enforces address family homogeneity within a set.
