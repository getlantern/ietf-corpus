document: rfc-6010
kind: normative-requirement
summary: The CMS content constraints extension MAY be marked critical and MUST appear at most one time in a trust anchor or certificate. Absence of the extension in a certificate (with absenceEqualsUnconstrained=false) means the subject is not authorized for any content type.
section: "2"
rfc2119_level: MUST
topics:
