document: rfc-4482
kind: protocol-element
summary: The <sound> element provides a URI pointing to a sound object (e.g., MIDI or MP3) related to the tuple or person. Support for MPEG-2 Layer 3 (MP3) is RECOMMENDED; it may also be used to indicate name pronunciation.
section: "3.6"
extracted_by: claude-sonnet-4-6
