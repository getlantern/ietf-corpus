document: rfc-8370
kind: normative-requirement
summary: A Per-Peer Flow Control implementation SHOULD prioritize Hello messages and ACKs over other RSVP messages, and SHOULD prioritize Tear/Error messages over trigger Path/Resv messages when peer congestion is detected.
