document: rfc-8828
kind: privacy-consideration
summary: If a client is behind a proxy but has direct Internet access, WebRTC STUN checks can bypass the proxy and reveal the client's public IP address. This also applies to enterprise TURN server scenarios where direct Internet access is permitted.
section: "3"
topics:
    - webrtc
    - privacy
    - nat
