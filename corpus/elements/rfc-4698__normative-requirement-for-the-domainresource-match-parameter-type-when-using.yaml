document: rfc-4698
kind: normative-requirement
summary: For the 'domainResource' match parameter type, when using an <inDomain> child element, the element MUST contain only a valid domain name (no '@' symbol), and matching SHOULD take place only on the given domain without partial matches on substrings or parent domains.
section: 3.1.11
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
