document: rfc-9341
kind: privacy-consideration
summary: Privacy concerns are limited because the method only uses information in the packet header or encapsulation and does not release user data. The limited marking technique is unlikely to substantially increase existing privacy risks from header metadata, though covert-channel modulation of the marking is a theoretical concern.
