document: rfc-7024
kind: normative-requirement
summary: A PE receiving an I-PMSI A-D route with Leaf Information Required=1 MUST respond with a Leaf A-D route whose PMSI Tunnel attribute carries Tunnel Type = Ingress Replication, a routable PE address as Tunnel Identifier, and a downstream-assigned MPLS label that enables the receiving PE to identify both the VRF and the sending PE.
section: "7.9"
rfc2119_level: MUST
topics:
    - mpls
    - bgp
    - vpn
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
