document: rfc-8826
kind: normative-requirement
summary: WebRTC SHOULD use an automatic, public key-based key exchange mechanism providing Forward Secrecy. Using SDES-style key exchange where the calling service has access to traffic keying material is particularly dangerous because standard Web service logging practice makes it likely the key will be captured and subject to subsequent compromise.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - webrtc
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
