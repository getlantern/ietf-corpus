document: rfc-8707
kind: normative-requirement
summary: To the extent possible, when issuing access tokens, the authorization server should downscope the scope value to what the respective resource is able to process and needs to know. As specified in RFC 6749 Section 5.1, the authorization server must indicate the access token's effective scope when it differs from the scope requested.
section: "2.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
