document: rfc-3697
kind: normative-requirement
summary: Flow state establishment methods MUST provide the means for flow state clean-up from the IPv6 nodes providing flow-specific treatment. Signaling-based methods involving the source node may specify flow state lifetimes longer than the default 120 seconds.
section: "4"
rfc2119_level: MUST
