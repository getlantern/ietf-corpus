document: rfc-5664
kind: protocol-element
summary: 'pnfs_osd_raid_algorithm4 is an enum of four data redundancy algorithms: PNFS_OSD_RAID_0 (no parity), PNFS_OSD_RAID_4 (fixed parity device with XOR), PNFS_OSD_RAID_5 (rotating parity with XOR), and PNFS_OSD_RAID_PQ (Reed-Solomon double-parity P+Q).'
section: "3.4"
