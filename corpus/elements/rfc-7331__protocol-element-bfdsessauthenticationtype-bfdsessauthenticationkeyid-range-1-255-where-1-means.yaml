document: rfc-7331
kind: protocol-element
summary: bfdSessAuthenticationType, bfdSessAuthenticationKeyID (range -1..255, where -1 means no key ID), and bfdSessAuthenticationKey together define BFD session authentication. Key update must be done atomically using a SET containing all affected objects in the same varBindList to avoid session drops.
