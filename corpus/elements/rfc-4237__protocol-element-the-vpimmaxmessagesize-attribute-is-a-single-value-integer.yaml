document: rfc-4237
kind: protocol-element
summary: The vPIMMaxMessageSize attribute is a single-value integer indicating the maximum message length in seconds that the receiving mailbox may accept. This is preferred over ESMTP byte-based size checking because multiple encodings and variable bit-rates make byte counts unreliable guides for composers.
section: "2.9"
