document: rfc-6638
kind: protocol-element
summary: CALDAV:calendar-user-type is an optional WebDAV property on principal resources that carries the same values as the iCalendar CUTYPE parameter (e.g., INDIVIDUAL, ROOM, GROUP). Clients use it to filter principal-property-search results by user type.
section: 2.4.2
topics:
