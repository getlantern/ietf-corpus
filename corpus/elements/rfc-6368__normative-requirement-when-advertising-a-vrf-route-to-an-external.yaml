document: rfc-6368
kind: normative-requirement
summary: When advertising a VRF route to an External BGP peer, a PE SHALL apply the AS mismatch attribute construction steps (discard iBGP attributes, prepend Origin AS, prepend VPN AS_PATH segment) and subsequently prepend its own AS number to AS_PATH.
