document: rfc-3788
kind: security-consideration
summary: Because TLS only protects the SCTP payload, the SCTP header and all control chunks are not encrypted or protected by TLS. This can be exploited for DoS attacks and is a general limitation of transport-layer security.
section: "6"
topics:
    - tls
    - sctp
    - security
