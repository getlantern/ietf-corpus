document: rfc-7676
kind: security-consideration
summary: Threats identified in RFC 4023 for MPLS-over-GRE apply to any GRE payload and can be mitigated via IPsec authentication and/or encryption of either the delivery packet or (when payload is IPv6) the payload itself. Additional IPv6 security considerations are discussed in RFC 4942 and RFC 6169.
section: "5"
topics:
    - ip
    - v6ops
    - security
    - ipsec
