document: rfc-5854
kind: normative-requirement
summary: Metalink Processors MUST filter out invalid files obtained from metalink:url elements by using information in the metalink:size and metalink:hash elements. The metalink:size element MUST override the actual content length as reported by the underlying protocol, and downloads that do not match MUST be discarded.
section: 4.2.14
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
