document: rfc-4842
kind: normative-requirement
summary: The CEP header L bit MUST be set to 1 to signal to the downstream PE that a failure condition (AIS-P/V) has been detected on the attachment circuit. The R bit MUST be set to 1 to signal loss of packet synchronization to the upstream PE, and MUST be cleared once packet synchronization is acquired.
section: "5.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
