document: rfc-8048
kind: normative-requirement
summary: If the XMPP <priority/> element value is negative, an XMPP-to-SIP gateway MUST NOT map the value to PIDF priority. For positive values, the gateway SHOULD map XMPP priority 0 to PIDF priority 0 and XMPP priority 127 to PIDF priority 1 with appropriately unique intermediate values.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
