document: rfc-5550
kind: normative-requirement
summary: Lemonade Message Stores MUST support a comprehensive set of IMAP extensions including BINARY, CATENATE, COMPRESS=DEFLATE, CONDSTORE, CONTEXT=SEARCH, CONTEXT=SORT, CONVERT, ENABLE, ESEARCH, ESORT, I18NLEVEL=1, IDLE, LITERAL+, NAMESPACE, NOTIFY, QRESYNC, SASL-IR, SORT, UIDPLUS, URLAUTH, URL-PARTIAL, and the $Forwarded, $SubmitPending, $Submitted IMAP keywords.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
