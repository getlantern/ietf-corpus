summary: 'Two new fields are added to the ''ACME Order Object Fields'' registry: ''auto-renewal'' (object, configurable) and ''star-certificate'' (string, not configurable). Two new HTTP header fields are registered: ''Cert-Not-Before'' and ''Cert-Not-After'' (both standard, http protocol).'
