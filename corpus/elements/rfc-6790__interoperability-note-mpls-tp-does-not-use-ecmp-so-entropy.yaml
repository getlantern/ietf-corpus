document: rfc-6790
kind: interoperability-note
summary: MPLS-TP does not use ECMP, so entropy labels are not applicable to MPLS-TP deployments. Multicast LSPs do not use ECMP either but may traverse LAGs and bundled links where ELs provide benefit; signaling and processing details for multicast ELs are deferred to a future document.
