document: rfc-5870
kind: normative-requirement
summary: Consumers of 'geo' URIs MUST NOT ignore the 'crs' parameter if present, and MUST NOT interpret coordinate sub-components without considering and understanding the 'crs' parameter value, because using the wrong CRS produces entirely invalid location information.
section: 3.4.1
rfc2119_level: MUST NOT
topics:
    - security
