document: rfc-9112
kind: wire-format
summary: 'A request-line = method SP request-target SP HTTP-version. The request-target has four forms: origin-form (absolute-path ["?" query]), absolute-form (absolute-URI), authority-form (uri-host ":" port, CONNECT only), and asterisk-form ("*", OPTIONS only).'
