document: rfc-5429
kind: interoperability-note
summary: SMTP does not allow non-US-ASCII characters in response text. Non-ASCII 'reason' strings can only be sent at the protocol level if both client and server negotiate a UTF-8 SMTP extension (e.g., as described in [UTF8-RESP]); otherwise the reason must be replaced with ASCII.
section: 2.1.1
topics:
    - email
