document: rfc-9653
kind: protocol-element
summary: The SCTP_ACCEPT_ZERO_CHECKSUM socket option (IPPROTO_SCTP-level, write-only) controls acceptance of zero checksums for future associations. Values are SCTP_EDMID_NONE (disable; require correct CRC32c) and SCTP_EDMID_LOWER_LAYER_DTLS (use DTLS-based alternate error detection). Default is disabled.
section: "7.1"
topics:
