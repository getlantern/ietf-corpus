document: rfc-7200
kind: security-consideration
summary: If notifiers can be spoofed, attackers can send fake notifications instructing subscribers to throttle all traffic, causing denial-of-service. Therefore, the load-filtering mechanism MUST be used within a Trust Domain. If a legitimate notifier within the domain is itself compromised, additional detection mechanisms are needed.
section: "7"
topics:
