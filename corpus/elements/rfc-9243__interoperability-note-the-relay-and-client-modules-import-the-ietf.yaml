document: rfc-9243
kind: interoperability-note
summary: The relay and client modules import the ietf-interfaces YANG module (RFC 8343) and use interface-refs to associate DHCPv6 functions with specific network interfaces, ensuring consistency with the standard interface management model. All four modules adopt NMDA (RFC 8342), requiring an NMDA-capable NETCONF/RESTCONF server.
