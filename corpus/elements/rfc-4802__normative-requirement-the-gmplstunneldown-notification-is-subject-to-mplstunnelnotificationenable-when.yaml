document: rfc-4802
kind: normative-requirement
summary: The gmplsTunnelDown notification is subject to mplsTunnelNotificationEnable; when that object is false(2), the notification must not be issued. It is also subject to mplsTunnelNotificationMaxRate, which limits notifications per second across both MPLS-TE-STD-MIB and GMPLS-TE-STD-MIB.
section: "8"
rfc2119_level: MUST NOT
