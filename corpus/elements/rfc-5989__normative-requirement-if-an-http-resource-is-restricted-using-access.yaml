document: rfc-5989
kind: normative-requirement
summary: If an HTTP resource is restricted using access control, special care MUST be taken to ensure that the SIP means of subscribing to the resource state is also restricted in the same way, to prevent unauthorized information disclosure.
section: "6"
rfc2119_level: MUST
topics:
