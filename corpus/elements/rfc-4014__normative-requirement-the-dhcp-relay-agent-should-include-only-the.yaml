document: rfc-4014
kind: normative-requirement
summary: The DHCP relay agent SHOULD include only the attributes listed in Section 4 (User-Name, Service-Type, Vendor-Specific, Session-Timeout, Framed-Pool, Framed-IPv6-Pool) to avoid dependencies between address allocation and other state between the RADIUS and DHCP servers.
section: "4"
rfc2119_level: SHOULD
topics:
    - radius
    - dhcp
