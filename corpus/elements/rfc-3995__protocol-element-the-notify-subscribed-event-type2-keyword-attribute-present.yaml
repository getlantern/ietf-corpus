document: rfc-3995
kind: protocol-element
summary: The 'notify-subscribed-event' (type2 keyword) attribute, present only in Event Notifications, identifies the Subscribed Event keyword that caused the Notification to be generated. The 'notify-text' (text(MAX)) attribute provides a human-readable description of the event for Human Consumable Event Notifications.
section: "8"
extracted_by: claude-sonnet-4-6
