document: rfc-4570
kind: interoperability-note
summary: Defining a list of legitimate sources departs from the Any-Source Multicast (ASM) model (RFC 1112); however, source-filters do not corrupt ASM semantics and can coexist with ASM on the same network using the same protocols. Use of source-filters is better suited to one-to-many or few-to-few multicast applications than to anonymous many-to-many sessions.
section: "4"
topics:
    - multicast
