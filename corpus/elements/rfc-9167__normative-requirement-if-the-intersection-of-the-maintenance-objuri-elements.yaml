document: rfc-9167
kind: normative-requirement
summary: If the intersection of the maintenance objURI elements of the server greeting and client login command results in an empty set, the server MUST return the newest version of the Registry Maintenance Notification poll message supported by the server per RFC 9038.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
