document: rfc-7879
kind: interoperability-note
summary: If endpoints use RFC 4474 for identity assurance, a B2BUA cannot function as a media relay without violating the identity signature. If SIP-ID is used instead, the B2BUA may modify the c= line IP address and m= line port in the SDP without breaking the identity guarantee.
section: 5.1.1
topics:
    - sip
    - tls
    - security
