document: rfc-9422
kind: protocol-element
summary: MAILMAX specifies the maximum number of MAIL FROM transactions the server will accept in a single session. The count includes all MAIL FROM commands regardless of success or failure. Value syntax is a non-zero integer up to six digits.
section: "4.1"
