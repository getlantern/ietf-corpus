document: rfc-6520
kind: interoperability-note
summary: The Heartbeat Extension applies to TLS and DTLS and their adaptations over SCTP (RFC 3436, RFC 6083) and DCCP (RFC 5238). The retransmission behavior differs between reliable transports (send once; transport retransmits) and unreliable transports (application-level retransmit using DTLS flight timers).
section: "1.1"
topics:
    - tls
    - sctp
