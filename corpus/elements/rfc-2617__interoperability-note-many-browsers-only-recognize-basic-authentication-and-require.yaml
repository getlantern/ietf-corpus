document: rfc-2617
kind: interoperability-note
summary: Many browsers only recognize Basic authentication and require it to be listed first in a multi-scheme WWW-Authenticate response. Servers should include Basic only if it is minimally acceptable, because offering it alongside Digest reduces overall security to that of the weaker scheme.
section: "1.2"
topics:
    - http
    - security
