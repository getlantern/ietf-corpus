document: rfc-4388
kind: design-rationale
summary: The protocol is deliberately restricted to DHCPv4 only. At the time of writing, DHCPv6 was not widely deployed and the needs of access concentrators in DHCPv6 scenarios were too speculative to design for; designing protocol capabilities for an imagined consumer was considered inadvisable.
section: "1"
topics:
