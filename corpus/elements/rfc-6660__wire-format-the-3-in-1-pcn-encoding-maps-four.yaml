document: rfc-6660
kind: wire-format
summary: 'The 3-in-1 PCN encoding maps four states onto the ECN field of an IP header bearing a PCN-compatible DSCP: ''00'' (Not-ECT) = not-PCN, ''10'' (ECT(0)) = NM (not-marked), ''01'' (ECT(1)) = ThM (threshold-marked), ''11'' (CE) = ETM (excess-traffic-marked). This reuses all four ECN codepoints within a PCN-domain.'
section: "3"
topics:
