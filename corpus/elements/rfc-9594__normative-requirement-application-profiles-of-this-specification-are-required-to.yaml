document: rfc-9594
kind: normative-requirement
summary: 'Application profiles of this specification are REQUIRED to address a set of mandatory compliance points (REQ1–REQ18) including: defining the scope format and encoding (REQ1), registering AIF instances if used (REQ2), specifying acceptable signature algorithms and key types (REQ3–REQ5), defining acceptable authentication credential formats (REQ6), specifying PoP evidence computation and verification (REQ14), and defining the initial keying material version number (REQ16).'
section: Appendix A.1
rfc2119_level: REQUIRED
