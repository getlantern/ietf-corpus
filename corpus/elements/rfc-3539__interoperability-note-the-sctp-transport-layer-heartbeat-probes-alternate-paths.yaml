document: rfc-3539
kind: interoperability-note
summary: The SCTP transport-layer heartbeat probes alternate paths to reach the same server, while the AAA application layer watchdog detects failures of the server application itself. Both mechanisms MAY be used together; if AAA implementations have access to SCTP heartbeat parameters, they MAY ensure the SCTP heartbeat interval is longer than Tw.
section: "3.4"
topics:
    - sctp
    - diameter
    - radius
