document: rfc-5660
kind: normative-requirement
summary: If an IPsec channel is desired, packets for a given connection MUST NOT be sent and inbound packets MUST NOT be accepted until the channel is established; inbound packets arriving before channel establishment must be dropped or channel establishment must fail.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
