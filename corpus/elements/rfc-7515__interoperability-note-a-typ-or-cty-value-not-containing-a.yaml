document: rfc-7515
kind: interoperability-note
summary: A 'typ' or 'cty' value not containing a '/' character MUST be treated by recipients as if 'application/' were prepended (e.g., 'JWT' means 'application/JWT'). This shorthand SHOULD be used by producers to keep messages compact, but only when the media type value itself contains no '/'.
section: 4.1.9
topics:
    - jose
    - json
