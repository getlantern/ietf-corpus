document: rfc-4051
kind: interoperability-note
summary: Although cryptographic suspicions have been cast on MD5 for use in signatures such as RSA-MD5, this does not affect the security of HMAC-MD5. These are distinct uses and should be treated differently in security evaluations.
section: 2.2.1
topics:
