document: rfc-2155
kind: protocol-element
summary: 'The appnCos group defines four tables: appnCosModeTable (mode-to-COS mapping), appnCosNameTable (transmission priority per COS), appnCosNodeRowTable (node weight per COS used in route calculation), and appnCosTGRowTable (TG weight per COS). Together these represent the complete COS database used for session routing.'
section: 3.1.5
topics:
