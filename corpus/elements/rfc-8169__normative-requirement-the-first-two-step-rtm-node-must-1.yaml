document: rfc-8169
kind: normative-requirement
summary: The first two-step RTM node MUST (1) mark the original event message to indicate a follow-up is forthcoming and (2) create a follow-up message with the initial correctionField value. The S bit MUST NOT be unset until the original and follow-up messages are combined by an endpoint boundary clock.
section: "2.1"
rfc2119_level: MUST
topics:
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
