document: rfc-9833
kind: protocol-element
summary: 'The ''address-allocation-type'' identity hierarchy covers: provider-dhcp, provider-dhcp-relay, provider-dhcp-slaac (IPv6 only), static-address, slaac (IPv6 only), and dynamic-infra. SLAAC-based identities are conditioned on the ''vpn-common:ipv6'' feature, and a YANG ''must'' constraint prevents SLAAC from being set for IPv4 allocation.'
section: "4.2"
topics:
    - yang
    - ip
