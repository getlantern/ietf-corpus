document: rfc-3776
kind: normative-requirement
summary: When securing Binding Updates, Acknowledgements, and prefix discovery, both nodes MUST support and SHOULD use ESP in transport mode, and MUST use a non-null payload authentication algorithm to provide data origin authentication, connectionless integrity, and optional anti-replay protection.
section: "4.3"
rfc2119_level: MUST
