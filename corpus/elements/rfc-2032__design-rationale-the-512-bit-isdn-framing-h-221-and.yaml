document: rfc-2032
kind: design-rationale
summary: The 512-bit ISDN framing (H.221) and audio/video multiplexing are deliberately omitted from the Internet packetization. UDP/RTP provides more efficient multiplexing, and error protection can be achieved by other means, so the raw Huffman-encoded output is transported directly.
section: "3.2"
topics:
