document: rfc-6762
kind: normative-requirement
summary: When retransmitting queries for continuous monitoring, the interval between the first two queries MUST be at least one second, intervals between successive queries MUST increase by at least a factor of two, and the querier MUST implement Known-Answer Suppression. The interval MAY be capped at 60 minutes.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
