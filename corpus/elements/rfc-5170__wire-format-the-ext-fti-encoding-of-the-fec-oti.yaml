summary: 'The EXT_FTI encoding of the FEC OTI spans five 32-bit words (HET=64, HEL=5): Transfer-Length L (48-bit), Encoding Symbol Length E (16-bit), N1m3 (3-bit), G (5-bit), B split across two words (20-bit total: 8 MSB + 12 LSB), max_n (20-bit), and PRNG seed (32-bit).'
