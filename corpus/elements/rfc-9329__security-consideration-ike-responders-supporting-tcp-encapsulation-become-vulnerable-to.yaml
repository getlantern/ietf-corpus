document: rfc-9329
kind: security-consideration
summary: IKE Responders supporting TCP encapsulation become vulnerable to TCP-specific DoS attacks including SYN flooding. TCP connections are also susceptible to RST and spoofing attacks; if an attacker can tear down TCP connections, IPsec connection performance can suffer, creating an effective DoS attack.
section: "10"
topics:
    - ipsec
    - vpn
    - tcp
    - security
