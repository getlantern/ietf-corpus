document: rfc-4003
kind: normative-requirement
summary: Any errors encountered while processing the ERO, including if the listed label(s) are not acceptable or cannot be supported in forwarding, SHOULD result in the generation of a PathErr message with error code 'Routing Error' and error value of 'Bad Explicit Route Object'.
section: "2.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
