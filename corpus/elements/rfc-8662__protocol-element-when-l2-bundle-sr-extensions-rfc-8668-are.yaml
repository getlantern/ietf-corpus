document: rfc-8662
kind: protocol-element
summary: When L2 bundle SR extensions (RFC 8668) are used, an adjacency segment representing the entire bundle signals expected load-balancing (MAY insert ELI/EL), while adjacency segments for individual bundle members signal no load-balancing expected (MAY NOT insert ELI/EL).
