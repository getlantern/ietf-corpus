document: rfc-5626
kind: design-rationale
summary: 'Multiple flows to different servers reduce the avalanche restart problem: when a server fails, UAs with only that flow reconnect simultaneously causing load spikes, but UAs with a surviving secondary flow delay reconnection by a backoff period, spreading reconnect load across time.'
section: "3.3"
topics:
