document: rfc-6796
kind: protocol-element
summary: 'The <media-types-allowed> element defines the set of permitted media types; all types not listed are forbidden. It MUST NOT coexist with <media-types-excluded> in the same container. Absence of both indicates no media type restrictions. Merging: containers are set-intersected as described in Section 5.1.2.'
section: "5.3"
topics:
    - sip
    - realtime
