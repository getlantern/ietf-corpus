document: rfc-6437
kind: security-consideration
summary: The flow label is not protected by IPsec authentication (RFC 4302); it can be forged by an on-path attacker without causing any IPsec integrity check to fail. Any en-route modification of the flow label is undetectable.
section: "6"
topics:
    - ip
    - ipsec
    - security
