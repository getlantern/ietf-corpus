document: rfc-2051
kind: protocol-element
summary: The appcCntrlAdminGroup and appcCntrlOperGroup objects allow management stations to activate and deactivate APPC session statistics collection (appcCntrlAdminStat/OperStat), RSCV collection (appcCntrlAdminRscv/OperRscv), and tracing (appcCntrlAdminTrace/OperTrace). Admin objects hold desired state; Oper objects reflect actual current state. These objects are conditionally mandatory.
section: 3.1.1
topics:
    - snmp
