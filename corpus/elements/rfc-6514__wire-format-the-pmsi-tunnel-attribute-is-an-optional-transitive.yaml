document: rfc-6514
kind: wire-format
summary: 'The PMSI Tunnel attribute is an optional transitive BGP attribute encoding: 1-octet Flags (bit 7 = Leaf Information Required), 1-octet Tunnel Type, 3-octet MPLS Label (high-order 20 bits = label value; zero means no label), and variable Tunnel Identifier. Tunnel Types 0–7 are defined: No tunnel, RSVP-TE P2MP LSP, mLDP P2MP LSP, PIM-SSM Tree, PIM-SM Tree, BIDIR-PIM Tree, Ingress Replication, mLDP MP2MP LSP.'
