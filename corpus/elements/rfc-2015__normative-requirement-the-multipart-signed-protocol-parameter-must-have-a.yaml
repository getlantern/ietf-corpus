document: rfc-2015
kind: normative-requirement
summary: The multipart/signed 'protocol' parameter MUST have a value of "application/pgp-signature" (MUST be quoted), and the 'micalg' parameter MUST have a value of "pgp-<hash-symbol>" where defined values are "pgp-md5" and "pgp-sha1".
