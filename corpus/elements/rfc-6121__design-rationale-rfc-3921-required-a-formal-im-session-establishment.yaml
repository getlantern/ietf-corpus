document: rfc-6121
kind: design-rationale
summary: RFC 3921 required a formal IM session establishment step after stream negotiation; RFC 6121 removes this as implementation experience showed it is unnecessary, but implementations MAY still offer it for backward compatibility, saving a round trip for newer software while allowing older clients to connect.
section: "1.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
