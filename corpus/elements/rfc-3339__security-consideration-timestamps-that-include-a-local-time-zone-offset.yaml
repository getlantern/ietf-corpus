document: rfc-3339
kind: security-consideration
summary: Timestamps that include a local time zone offset may reveal the geographic location of a site and indicate times when systems are less likely to be monitored, potentially aiding adversaries in selecting opportune windows for security probes. Sites may choose to emit times in UTC only to mitigate this.
section: "7"
topics:
    - security
    - privacy
