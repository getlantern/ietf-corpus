document: rfc-2249
kind: design-rationale
summary: The term 'channel' (common in MTA implementations) is deliberately avoided in this MIB because there is no requirement that an MTA's channel abstraction maps one-to-one onto the MIB's group abstraction. The more general 'group' concept was chosen to accommodate diverse MTA architectures.
