document: rfc-8614
kind: normative-requirement
summary: If the PEs at both ends of the PW do not agree on the S-bit setting, the PW SHOULD NOT come up, to avoid out-of-sequence ordering issues in multihoming scenarios as described in RFC 4385 Section 4.2.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
    - mpls
    - bgp
    - routing
