document: rfc-5663
kind: design-rationale
summary: Volume identification uses content-based opaque byte-sequence matching rather than network addresses because the same storage volume may be simultaneously accessible via multiple network technologies (e.g., both iSCSI and Fibre Channel through different ports on different networks), making network addresses unreliable for unique identification across multipath environments.
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
