document: rfc-2108
kind: normative-requirement
summary: If rptrMonitorPortUpper32Octets or rptrMonitorPortHCReadableOctets is implemented, the value MUST be a valid count as defined (upper 32 bits and full 64-bit count respectively). Implementation is not required in systems that do not support 100Mb/s.
