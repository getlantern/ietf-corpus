document: rfc-3038
kind: protocol-element
summary: For point-to-multipoint VCs, VCID notification is defined for future use (current LDP does not support multicast). When adding a new leaf, the existing VCID already assigned to the VC is reused; downstream nodes that have already received the LDP REQUEST must discard any new VCID PROPOSE.
section: 3.1.2
topics:
