document: rfc-8688
kind: normative-requirement
summary: An intermediary MAY issue the 608 response code in a failure response for an INVITE, MESSAGE, SUBSCRIBE, or other out-of-dialog SIP request to indicate that an intermediary rejected the offered communication as unwanted by the user.
section: "3.1"
rfc2119_level: MAY
topics:
    - sip
