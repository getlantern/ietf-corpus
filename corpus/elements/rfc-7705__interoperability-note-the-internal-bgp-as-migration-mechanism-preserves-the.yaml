document: rfc-7705
kind: interoperability-note
summary: The 'Internal BGP AS Migration' mechanism preserves the semantics of a regular iBGP session (identical ASNs). BGP attributes transmitted and acceptable operations on attributes received are no different than standard iBGP as defined by RFC 4271 and RFC 4456.
