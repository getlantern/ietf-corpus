document: rfc-5219
kind: security-consideration
summary: When a session using this payload format is encrypted and interleaving is in use, the sender SHOULD ensure that any change of encryption key coincides with the start of a new interleave cycle. Otherwise, security considerations are identical to those in RFC 2250.
section: "10"
rfc2119_level: SHOULD
topics:
