document: rfc-5415
kind: protocol-element
summary: The Join operation is the first CAPWAP exchange after DTLS establishment. The WTP sends a Join Request containing its descriptor, name, board data, and location; the AC responds with a Join Response including the Image Identifier, which determines whether the WTP transitions to Configure state (image matches) or Image Data state (firmware download needed).
section: "6"
