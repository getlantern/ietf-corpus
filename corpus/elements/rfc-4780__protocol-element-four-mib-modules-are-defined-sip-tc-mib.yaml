summary: 'Four MIB modules are defined: SIP-TC-MIB (textual conventions), SIP-COMMON-MIB (objects common to all SIP entities), SIP-UA-MIB (user agent-specific objects), and SIP-SERVER-MIB (proxy, redirect, and registrar server objects). All are indexed via applIndex from the NETWORK-SERVICES-MIB.'
