document: rfc-4150
kind: interoperability-note
summary: The tpmCurReportTable index order is (application, transaction-metric, network-layer, server-address, client-ID), placing application before network layer—opposite to the RMON2-MIB convention. This means report entries sort by application first, server second, and client third.
