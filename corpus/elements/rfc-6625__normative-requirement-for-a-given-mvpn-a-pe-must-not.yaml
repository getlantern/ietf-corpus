document: rfc-6625
kind: normative-requirement
summary: For a given MVPN, a PE MUST NOT originate S-PMSI A-D routes with a particular kind of wildcard unless it is known a priori that all PEs attached to that MVPN have the ability to interpret and correctly process that kind of wildcard.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
