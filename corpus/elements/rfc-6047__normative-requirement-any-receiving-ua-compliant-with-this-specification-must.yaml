document: rfc-6047
kind: normative-requirement
summary: Any receiving UA compliant with this specification MUST be able to process 'text/calendar' body parts enclosed within 'multipart/*', and MUST be able to process all such parts when a 'multipart/mixed' message contains multiple 'text/calendar' components.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
