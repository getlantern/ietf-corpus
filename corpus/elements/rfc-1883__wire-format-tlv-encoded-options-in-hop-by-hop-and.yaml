document: rfc-1883
kind: wire-format
summary: 'TLV-encoded options in Hop-by-Hop and Destination Options headers have three fields: Option Type (8-bit; highest two bits encode unrecognized-action, third-highest bit indicates mutability en-route), Opt Data Len (8-bit, length of Option Data in octets), and Option Data (variable-length). Pad1 (type 0) is a special single-octet exception with no length or value fields.'
section: "4.2"
topics:
    - ip
