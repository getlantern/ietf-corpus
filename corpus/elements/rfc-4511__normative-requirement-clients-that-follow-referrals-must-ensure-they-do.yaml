document: rfc-4511
kind: normative-requirement
summary: Clients that follow referrals MUST ensure they do not loop between servers and MUST NOT repeatedly contact the same server for the same request with the same parameters. Counter-based clients MUST be able to handle at least ten nested referrals while progressing the operation.
section: 4.1.10
rfc2119_level: MUST
topics:
    - ldap
