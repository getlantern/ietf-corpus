document: rfc-9179
kind: registry
summary: IANA created the 'Geodetic System Values' registry under the 'YANG Geographic Location Parameters' registry group. Allocation policy is First Come First Served. Initial entries include 'wgs-84', 'wgs-84-96', 'wgs-84-08' (WGS-84 variants), and 'me' (Mean Earth/Polar Axis for the Moon).
