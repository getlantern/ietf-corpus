document: rfc-4815
kind: normative-requirement
summary: The CRC coverage for the ESP NULL header (RFC 3095 Section 5.8.7) must be interpreted as covering only the initial SPI and sequence number fields, not the trailer part at the end of the payload—identical to the coverage for the regular ESP header profile.
section: "2.4"
rfc2119_level: MUST
topics:
    - ipsec
    - ip
