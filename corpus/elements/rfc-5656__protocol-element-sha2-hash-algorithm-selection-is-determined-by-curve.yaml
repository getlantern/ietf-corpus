document: rfc-5656
kind: protocol-element
summary: 'SHA2 hash algorithm selection is determined by curve size: curves with b <= 256 bits use SHA-256, 256 < b <= 384 use SHA-384, and b > 384 use SHA-512. This applies to both ECDSA and ECDH/ECMQV method names.'
