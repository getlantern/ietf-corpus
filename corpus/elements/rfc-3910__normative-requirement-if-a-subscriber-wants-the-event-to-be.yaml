document: rfc-3910
kind: normative-requirement
summary: If a subscriber wants the event to be monitored again after a 'terminated;reason=fired' notification, it MUST issue a new SUBSCRIBE request establishing a new dialog; the existing terminated dialog cannot be reused.
section: 5.3.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
