document: rfc-4335
kind: normative-requirement
summary: If the want_reply boolean is set, the server MUST reply using SSH_MSG_CHANNEL_SUCCESS or SSH_MSG_CHANNEL_FAILURE. If a BREAK of any kind was performed, SSH_MSG_CHANNEL_SUCCESS MUST be sent; if no BREAK was performed, SSH_MSG_CHANNEL_FAILURE MUST be sent.
section: "3"
rfc2119_level: MUST
topics:
    - security
