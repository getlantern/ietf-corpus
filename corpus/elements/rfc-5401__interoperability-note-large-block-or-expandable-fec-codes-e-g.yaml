document: rfc-5401
kind: interoperability-note
summary: Large block or expandable FEC codes (e.g., RFC 3453) may be less deterministic than Reed-Solomon for specifying optimal repair requests. For such codes, receivers may NACK with an erasure count estimate rather than explicit symbol identifiers, and senders respond accordingly. The reduced determinism may be offset by lower computational requirements or larger coding block support.
section: 3.2.3.1
topics:
    - multicast
