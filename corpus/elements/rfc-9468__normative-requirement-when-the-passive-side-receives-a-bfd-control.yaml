document: rfc-9468
kind: normative-requirement
summary: When the passive side receives a BFD Control packet with 'Your Discriminator' set to 0 and finds no existing session, it SHOULD create a matching BFD session toward the active side, unless prohibited by local configuration or policy.
section: "2"
rfc2119_level: SHOULD
