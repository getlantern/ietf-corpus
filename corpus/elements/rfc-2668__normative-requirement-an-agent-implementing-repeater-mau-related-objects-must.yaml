document: rfc-2668
kind: normative-requirement
summary: An agent implementing repeater-MAU related objects MUST also implement the 802.3 Repeater MIB (RFC 2108). The values of rpMauGroupIndex and rpMauPortIndex SHALL be the same as rptrPortGroupIndex and rptrPortIndex for the connected port.
section: 3.4.2
rfc2119_level: MUST
topics:
    - snmp
