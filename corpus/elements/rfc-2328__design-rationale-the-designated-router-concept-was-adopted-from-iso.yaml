document: rfc-2328
kind: design-rationale
summary: 'The Designated Router concept was adopted from ISO IS-IS but greatly enhanced in OSPF: on a broadcast or NBMA network with N routers, only N adjacencies are required (each router to the DR) rather than N*(N-1)/2. This sharply reduces routing protocol traffic and link-state database size.'
section: "1.2"
topics:
    - routing
