document: rfc-5838
kind: protocol-element
summary: 'The OSPFv3 Instance ID number space is partitioned by address family: 0-31 for IPv6 unicast, 32-63 for IPv6 multicast, 64-95 for IPv4 unicast, 96-127 for IPv4 multicast, and 128-255 unassigned. The first value in each range is the default for that AF.'
