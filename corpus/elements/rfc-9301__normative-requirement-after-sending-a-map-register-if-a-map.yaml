document: rfc-9301
kind: normative-requirement
summary: After sending a Map-Register, if a Map-Notify is not received within 1 second, the transmitter MUST retransmit with exponential backoff (base 2), up to a maximum backoff interval of 1 minute.
section: "5.7"
rfc2119_level: MUST
topics:
