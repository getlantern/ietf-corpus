document: rfc-6849
kind: wire-format
summary: The direct loopback RTP payload format defines no payload-specific headers. The loopback mirror copies only the RTP payload data from the received packet into a new RTP packet; all original RTP header information is discarded.
section: 7.2.2
topics:
