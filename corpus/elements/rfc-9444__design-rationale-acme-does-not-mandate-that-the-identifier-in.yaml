document: rfc-9444
kind: design-rationale
summary: ACME does not mandate that the identifier in a newOrder request matches the identifier in authorization objects. This existing flexibility in RFC 8555 is the foundation that allows subdomain certificate issuance via ancestor domain authorization without protocol changes to the core order/authorization relationship.
section: "4"
topics:
