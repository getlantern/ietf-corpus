document: rfc-7232
kind: normative-requirement
summary: An origin server SHOULD change a weak entity-tag whenever it considers prior representations to be unacceptable as a substitute for the current representation; i.e., a weak entity-tag ought to change whenever the origin server wants caches to invalidate old responses.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - http
