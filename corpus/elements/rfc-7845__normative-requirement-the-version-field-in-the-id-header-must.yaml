document: rfc-7845
kind: normative-requirement
summary: The Version field in the ID header MUST always be '1' for this version of the encapsulation specification. Implementations SHOULD treat streams with the same upper four bits as backwards compatible, accepting version numbers 15 or less and rejecting 16 or greater.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
