document: rfc-8827
kind: normative-requirement
summary: The 'identity' attribute MUST be bound to all 'fingerprint' attributes in the session description. Implementations SHOULD only include a single 'identity' attribute in an offer or answer. If identity verification fails, the answerer MUST discard the offer or answer as malformed.
section: "5.1"
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
