document: rfc-7959
kind: interoperability-note
summary: For multicast GET, a client or server may use Block2 with NUM=0 to limit response size. Retrieval of further blocks always uses unicast exchanges, and the client SHOULD heed block size preferences indicated by the server in the multicast response.
section: "2.8"
topics:
    - multicast
