document: rfc-4702
kind: normative-requirement
summary: When a lease expires, the server SHOULD delete any PTR RR it added via DNS update. If the server also added an A RR on the client's behalf, the server SHOULD delete that A RR as well.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - dns
