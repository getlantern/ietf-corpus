document: rfc-6155
kind: interoperability-note
summary: A LIS that supports the identity extension echoes the 'device' element back in a successful location response, listing identifiers that were actually used for location determination. If the 'device' element is absent from the response, the LIS used the source IP address rather than any provided identifier.
section: "2.2"
topics:
    - realtime
