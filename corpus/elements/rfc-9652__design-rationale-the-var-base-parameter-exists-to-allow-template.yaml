document: rfc-9652
kind: design-rationale
summary: The 'var-base' Parameter exists to allow template variables to be globally identified via URIs, enabling dereferencing to discover the syntax or semantics of a variable. The specification intentionally leaves the format of such information out of scope.
section: "2.1"
topics:
    - http
