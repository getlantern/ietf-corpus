document: rfc-9059
kind: normative-requirement
summary: During state synchronization, a PCC MUST report all existing Bidirectional LSP Associations to the stateful PCE. After synchronization, the PCE MUST remove all previous Bidirectional LSP Associations absent in the report.
section: "5.6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
