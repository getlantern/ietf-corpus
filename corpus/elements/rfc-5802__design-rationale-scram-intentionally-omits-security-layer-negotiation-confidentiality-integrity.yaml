document: rfc-5802
kind: design-rationale
summary: SCRAM intentionally omits security layer negotiation (confidentiality/integrity). It is designed to be used with an external security layer such as TLS or SSH, with optional channel binding to that layer, rather than providing its own.
section: "1"
