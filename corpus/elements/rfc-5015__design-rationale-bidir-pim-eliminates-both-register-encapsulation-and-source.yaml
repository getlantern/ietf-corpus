document: rfc-5015
kind: design-rationale
summary: BIDIR-PIM eliminates both Register encapsulation and source-specific (S,G) state by allowing packets to be natively forwarded from a source to the RP using shared tree state alone. This removes data-driven protocol events entirely, a key advantage over PIM-SM.
section: "1"
topics:
    - multicast
    - routing
