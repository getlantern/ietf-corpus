document: rfc-5596
kind: normative-requirement
summary: A client in any state MUST silently discard any received DCCP-Listen packet unless it implements the optional triggered-retransmission procedure. An RFC 4340 client that receives a DCCP-Listen packet ignores it per step 1 of Section 8.1 of RFC 4340, which is also compliant with this document.
section: 2.2.3
rfc2119_level: MUST
topics:
    - nat
    - congestion
