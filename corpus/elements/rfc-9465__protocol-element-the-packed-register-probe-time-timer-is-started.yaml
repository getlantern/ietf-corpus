document: rfc-9465
kind: protocol-element
summary: The Packed_Register_Probe_Time timer is started by the DR when it switches from Null-Registers back to Data Registers. If no PIM Packed Register-Stop or Register-Stop with P-bit set is received within this interval, the DR concludes the RP no longer supports packing. The default value is 60 seconds.
section: "6.3"
topics:
    - multicast
    - routing
