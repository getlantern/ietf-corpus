document: rfc-7507
kind: protocol-element
summary: TLS_FALLBACK_SCSV is a new cipher suite value with code point {0x56, 0x00}. It is a Signaling Cipher Suite Value (SCSV) and cannot be selected by the server; its presence in ClientHello.cipher_suites signals to the server that the client is performing a fallback retry.
section: "2"
topics:
