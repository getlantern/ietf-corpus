document: rfc-8514
kind: interoperability-note
summary: Unlike the internal date attribute, the save date is not copied during IMAP COPY (RFC 3501) or MOVE (RFC 6851) operations; each copy of a message in a different mailbox receives an independent save date reflecting its own delivery time to that mailbox.
