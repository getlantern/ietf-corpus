document: rfc-5890
kind: interoperability-note
summary: IDNA-unaware applications treat all LDH labels as valid and some may permit additional label types. IDNA-aware applications permit only A-labels and NR-LDH labels in DNS zone files and queries; U-labels may appear in user interface and presentation forms and in protocols that use IDNA but do not directly involve the DNS.
section: 2.3.2.1
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
