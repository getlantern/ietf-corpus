document: rfc-6855
kind: protocol-element
summary: The "UTF8=ONLY" capability indicates that the server requires UTF-8 support from clients, will send UTF-8 in quoted-strings, and will not accept the older modified UTF-7 mailbox name convention. It implies "UTF8=ACCEPT", so at most one of these appears in the capability string.
section: "6"
topics:
