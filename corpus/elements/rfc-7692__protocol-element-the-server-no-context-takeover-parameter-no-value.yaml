document: rfc-7692
kind: protocol-element
summary: The 'server_no_context_takeover' parameter (no value) prevents the server from reusing the LZ77 sliding window across messages; the 'client_no_context_takeover' parameter prevents the client from doing so. Both can appear in offers and responses to limit decompressor memory requirements.
section: 7.1.1
topics:
    - websocket
