document: rfc-2422
kind: design-rationale
summary: The choice of little endian ordering for the 4-bit code words is derived from ITU-T Recommendation X.420, which defines the equivalent ordering for the X.400 body part carrying this audio encoding. This alignment with X.400 facilitates interoperability with existing voice messaging infrastructure.
