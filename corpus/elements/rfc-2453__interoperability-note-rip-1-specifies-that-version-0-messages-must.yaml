document: rfc-2453
kind: interoperability-note
summary: RIP-1 specifies that version-0 messages must be discarded, version-1 messages must be discarded if any Must-Be-Zero field is non-zero, and messages of version greater than 1 must not be discarded solely because an MBZ field is non-zero. RIP-2 is fully backward-compatible with RIP-1 implementations that respect this versioning rule.
section: "5"
topics:
    - routing
