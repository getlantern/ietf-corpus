document: rfc-2255
kind: normative-requirement
summary: 'URL processing SHOULD proceed as follows: obtain a connection to the LDAP server (reusing an existing one MAY be acceptable), optionally authenticate, then perform the LDAP search. Additional fields such as sizelimit, timelimit, and deref MAY be set at the client''s discretion.'
section: "5"
rfc2119_level: SHOULD
topics:
