document: rfc-3344
kind: wire-format
summary: 'Long Extension Format: 8-bit Type, 8-bit Sub-Type, 16-bit Length (excludes Type/Sub-Type/Length bytes), variable Data. The 16-bit Length field allows extension data exceeding 256 bytes, solving the 8-bit limit of the simple TLV format.'
