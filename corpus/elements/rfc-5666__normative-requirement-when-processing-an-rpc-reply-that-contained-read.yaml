document: rfc-5666
kind: normative-requirement
summary: When processing an RPC reply that contained read chunks, the RPC client MUST issue an RDMA_DONE message to notify the server (peer) that the source buffers can be freed.
section: "3.5"
rfc2119_level: MUST
