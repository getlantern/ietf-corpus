document: rfc-9421
kind: protocol-element
summary: 'An HTTP message component identifier consists of a component name (lowercased HTTP field name or a ''@''-prefixed derived component name) plus optional parameters: sf (strict Structured Field serialization), key (Dictionary member selector), bs (binary-wrapped encoding), req (pull from request in response context), and tr (use trailer fields). Each component identifier MUST appear only once in a covered components list.'
section: "2"
topics:
