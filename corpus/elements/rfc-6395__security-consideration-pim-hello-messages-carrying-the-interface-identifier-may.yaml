document: rfc-6395
kind: security-consideration
summary: PIM Hello messages carrying the Interface Identifier may be forged to include an arbitrary Interface Identifier, or the option may be intentionally omitted. The impact depends on how downstream PIM protocols use the identifier. Security considerations from RFC 4601 for PIM Hello messages apply.
section: "4"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
