document: rfc-7166
kind: interoperability-note
summary: A transition mode is defined where a router includes the Authentication Trailer in transmitted packets (and sets AT-bit) but does not verify it in received packets. In transition mode, the OSPFv3 header checksum and LLS data block checksum are also calculated and set so that non-authenticating routers do not drop packets.
section: "5"
topics:
    - routing
    - security
