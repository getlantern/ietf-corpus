document: rfc-6580
kind: wire-format
summary: 'MPA error codes are 16-bit fields subdivided into: a 4-bit Layer (fixed at 0x2), a 4-bit Error Type, and an 8-bit Error Code. Every MPA registry entry must contain a numeric Error Code and Error Code Name; ''ALL'' is not used in this registry.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
