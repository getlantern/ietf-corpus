document: rfc-5424
kind: registry
summary: RFC 5424 creates the IANA registry 'syslog Version Values' for the VERSION field. New VERSION numbers require Standards Action per RFC 5226 and must be incremented for any change to the HEADER format. VERSION value '1' is the initial registered entry.
section: "9.1"
topics:
