document: rfc-3633
kind: wire-format
summary: 'The OPTION_IAPREFIX option (option-code 26) specifies an IPv6 address prefix associated with an IA_PD. Its format includes: 4-octet preferred-lifetime, 4-octet valid-lifetime, 1-octet prefix-length, 16-octet IPv6-prefix, and variable-length IAprefix-options. Option-length is 25 + length of IAprefix-options. A value of 0xFFFFFFFF for lifetimes represents infinity.'
section: "10"
topics:
