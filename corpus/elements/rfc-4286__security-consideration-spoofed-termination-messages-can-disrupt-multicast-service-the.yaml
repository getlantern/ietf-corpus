document: rfc-4286
kind: security-consideration
summary: Spoofed Termination messages can disrupt multicast service. The protocol mitigates this by requiring receivers to send a Solicitation upon receiving a Termination, forcing any active router to respond with an Advertisement before the router is removed from the active list.
section: "7"
topics:
    - multicast
    - security
