document: rfc-5121
kind: protocol-element
summary: In WiMAX, the IPv6 link is formed by combining (1) a CID-identified transport connection over the 802.16 air interface between MS and BS, and (2) a GRE tunnel between BS and AR/ASN-GW. From IPv6's perspective, MS and AR are connected by a single point-to-point link.
section: Appendix B
