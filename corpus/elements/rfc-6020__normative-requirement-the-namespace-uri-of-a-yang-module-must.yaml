document: rfc-6020
kind: normative-requirement
summary: 'The namespace URI of a YANG module MUST be advertised as a capability in the NETCONF <hello> message. The capability URI MUST follow the form: namespace-uri with optional query parameters for revision, module name, features, and deviations; each named parameter MUST occur at most once.'
section: 5.6.4
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
