document: rfc-6552
kind: normative-requirement
summary: It is RECOMMENDED to base the computation of step_of_rank on dynamic link properties such as the Expected Transmission Count (ETX) metric rather than static administrative cost, because static cost favors paths with fewer but longer hops of poorer connectivity.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - routing
