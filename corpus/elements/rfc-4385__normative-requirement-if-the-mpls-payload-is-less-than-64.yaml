document: rfc-4385
kind: normative-requirement
summary: If the MPLS payload is less than 64 bytes, the Length field in the PWMCW MUST be set to the length of the PW payload plus the length of the PWMCW; otherwise the Length field MUST be set to zero.
section: "3"
rfc2119_level: MUST
