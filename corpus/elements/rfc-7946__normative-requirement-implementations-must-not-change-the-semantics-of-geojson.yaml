document: rfc-7946
kind: normative-requirement
summary: Implementations MUST NOT change the semantics of GeoJSON members and types. FeatureCollection and Feature objects MUST NOT contain "coordinates" or "geometries" members; FeatureCollection and Geometry objects MUST NOT contain "geometry" or "properties" members; Feature and Geometry objects MUST NOT contain a "features" member.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
