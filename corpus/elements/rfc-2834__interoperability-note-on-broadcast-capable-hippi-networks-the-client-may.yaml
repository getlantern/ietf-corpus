document: rfc-2834
kind: interoperability-note
summary: On broadcast-capable HIPPI networks, the client MAY also support Type 1 and 6 (Ethernet and IEEE 802 ARP) packet formats in addition to HIPARP type 28. HARP messages SHALL always be accepted with hardware type codes 28, 1, or 6 to enable interoperability.
section: "6"
topics:
