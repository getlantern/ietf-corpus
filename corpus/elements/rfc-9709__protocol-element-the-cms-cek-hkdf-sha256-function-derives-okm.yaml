document: rfc-9709
kind: protocol-element
summary: The CMS_CEK_HKDF_SHA256 function derives OKM from IKM using HKDF-Extract with a fixed salt ('The Cryptographic Message Syntax') and HKDF-Expand with the DER-encoded AlgorithmIdentifier as the info input. The output OKM is the same size as the IKM and must not exceed 8160 octets.
