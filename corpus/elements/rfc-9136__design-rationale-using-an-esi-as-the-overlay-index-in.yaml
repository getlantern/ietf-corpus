document: rfc-9136
kind: design-rationale
summary: Using an ESI as the Overlay Index in the Bump-in-the-Wire use case is preferred over a MAC address because it allows EVPN multihoming redundancy mechanisms (including mass withdrawal for fast failure detection from RFC 7432) to be directly reused for convergence.
section: "4.3"
topics:
