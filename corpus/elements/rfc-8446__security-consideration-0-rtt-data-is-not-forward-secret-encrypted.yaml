document: rfc-8446
kind: security-consideration
summary: 0-RTT data is not forward secret (encrypted solely under PSK-derived keys) and provides no non-replay guarantees between connections. Servers MUST implement anti-replay mechanisms from Section 8 (single-use tickets, ClientHello recording, or freshness checks) to limit replay impact.
section: "2.3"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
