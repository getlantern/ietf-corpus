document: rfc-2865
kind: security-consideration
summary: Forwarding servers should carefully consider which Service-Type values they are willing to pass in a proxied Access-Accept. Passing Service-Types of NAS-Prompt or Administrative in a proxied accept could grant elevated privileges unintentionally; implementers should consider blocking those service types at proxy boundaries.
section: "2.3"
topics:
    - radius
    - security
