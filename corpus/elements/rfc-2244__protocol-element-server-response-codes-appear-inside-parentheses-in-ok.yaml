document: rfc-2244
kind: protocol-element
summary: 'Server response codes appear inside parentheses in OK/NO/BAD/ALERT/BYE responses as a slash-separated hierarchy atom with optional arguments. Defined codes include: AUTH-TOO-WEAK, ENCRYPT-NEEDED, INVALID, MODIFIED, NOEXIST, PERMISSION, QUOTA, REFER, SASL, TOOMANY, TOOOLD, TRANSITION-NEEDED, TRYLATER, TRYFREECONTEXT, WAYTOOMANY.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
