document: rfc-9929
kind: normative-requirement
summary: The originating node MUST NOT set the UP-Flag without also setting the U-Flag in IS-IS. The receiving node MUST ignore the UP-Flag if the U-Flag is not set.
section: "3.2"
rfc2119_level: MUST NOT
topics:
