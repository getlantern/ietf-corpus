document: rfc-4676
kind: security-consideration
summary: There is no privacy protection for DHCP messages; an eavesdropper monitoring the link between the DHCP server and client can discover civic location information. Usage of this option on networks without access restrictions or link/network-layer privacy mechanisms is NOT RECOMMENDED.
section: "6"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
