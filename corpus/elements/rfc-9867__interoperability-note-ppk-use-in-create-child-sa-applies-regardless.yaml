document: rfc-9867
kind: interoperability-note
summary: PPK use in CREATE_CHILD_SA applies regardless of how the current IKE SA was established — whether via IKE_AUTH (RFC 8784), IKE_INTERMEDIATE (this spec), CREATE_CHILD_SA (this spec), or without any PPK. The fresh PPK does not require a specific prior SA history.
section: "3.2"
topics:
