document: rfc-3862
kind: design-rationale
summary: The message format is intentionally agnostic about specific security mechanisms, providing a canonical format as a basis for signature calculation while leaving the choice of security protocols (S/MIME, OpenPGP, etc.) to application-level specifications such as the CPIM IM and CPIM presence specs.
