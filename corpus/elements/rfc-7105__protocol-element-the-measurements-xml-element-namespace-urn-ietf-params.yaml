document: rfc-7105
kind: protocol-element
summary: The 'measurements' XML element (namespace urn:ietf:params:xml:ns:geopriv:lm) is the standard container for conveying location-related measurement data in Location Configuration Protocols. It carries 'time' and optional 'expires' attributes common to all measurement types and permits inclusion of arbitrary typed measurement child elements.
