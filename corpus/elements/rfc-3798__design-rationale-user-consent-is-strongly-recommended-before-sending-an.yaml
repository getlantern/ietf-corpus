document: rfc-3798
kind: design-rationale
summary: User consent is strongly recommended before sending an MDN because privacy concerns have historically been raised about read-receipt mechanisms. The user may grant consent per-message via a dialog, globally via a preference, or globally refuse MDNs. This balances the utility of delivery confirmation against recipient privacy.
section: "2.1"
topics:
    - email
    - privacy
