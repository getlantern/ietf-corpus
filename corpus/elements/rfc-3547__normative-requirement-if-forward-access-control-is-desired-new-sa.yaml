document: rfc-3547
kind: normative-requirement
summary: If forward access control is desired, new SA_TEKs and associated key packets in the KD payload MUST NOT be included in a GROUPKEY-PUSH message that changes group membership; they must be delivered in a subsequent GROUPKEY-PUSH protected by the new KEK.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
    - multicast
