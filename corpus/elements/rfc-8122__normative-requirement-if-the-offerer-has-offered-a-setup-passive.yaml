document: rfc-8122
kind: normative-requirement
summary: If the offerer has offered a 'setup:passive' or 'setup:actpass' role, it MUST begin listening for an incoming connection as soon as it sends its offer. However, it MUST NOT assume data transmitted over TLS is valid until it has received a matching fingerprint in an SDP answer.
section: "6.2"
rfc2119_level: MUST
topics:
    - tls
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
