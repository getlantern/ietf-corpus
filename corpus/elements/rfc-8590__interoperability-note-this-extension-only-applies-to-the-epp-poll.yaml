document: rfc-8590
kind: interoperability-note
summary: This extension only applies to the EPP <poll> response and does not add elements to any EPP command (<check>, <info>, <transfer>, <create>, <delete>, <renew>, <update>). Clients need not modify their command handling to support this extension.
