document: rfc-2142
kind: design-rationale
summary: The document aggregates previously scattered per-protocol mailbox name requirements (POSTMASTER from RFC 822, USENET from RFC 977, WEBMASTER from HTTP) together with defacto standards (ABUSE, TROUBLE) into a single specification, so organizations have one normative reference for the full required set.
section: "1"
topics:
