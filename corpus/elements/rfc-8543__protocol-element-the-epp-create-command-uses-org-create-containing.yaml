document: rfc-8543
kind: protocol-element
summary: The EPP <create> command uses <org:create> containing id, one or more roles, optional status values, optional parentId, zero to two <org:postalInfo> elements (type 'int' or 'loc'), optional voice/fax/email/url, and zero or more contact elements. The response returns <org:creData> with id and crDate.
section: 4.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
