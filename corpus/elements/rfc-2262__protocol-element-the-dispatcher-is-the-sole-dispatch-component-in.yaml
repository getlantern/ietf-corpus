document: rfc-2262
kind: protocol-element
summary: The Dispatcher is the sole dispatch component in an SNMP engine. It routes outgoing PDUs to version-specific Message Processing Models for message preparation, and routes incoming messages to the appropriate MP Model for extraction, then forwards extracted PDUs to registered applications.
