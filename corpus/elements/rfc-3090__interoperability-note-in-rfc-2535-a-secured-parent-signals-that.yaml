document: rfc-3090
kind: interoperability-note
summary: In RFC 2535, a secured parent signals that a child is secured by silence—the absence of a KEY RR declaring the child unsecured. While counter-intuitive operationally, this mechanism is retained as it functions correctly and no sufficient need for a change has been demonstrated.
section: "1.3"
topics:
    - dns
    - security
