document: rfc-3909
kind: design-rationale
summary: The LDAP Cancel operation is modeled after the X.511 DAP Abandon operation, which unlike LDAP Abandon provides a response and requires the abandoned operation to return a response indicating it was canceled. This design was chosen to give clients a clear indication of the outcome of the cancel request.
section: "1"
