document: rfc-8621
kind: wire-format
summary: Individual header fields are requested as properties named 'header:{field-name}[:as{Form}][:all]'. Valid parsed forms are Raw (default), Text, Addresses, GroupedAddresses, MessageIds, Date, and URLs. When both suffixes are used, they must appear in that order. Field names are matched case-insensitively.
