document: rfc-3472
kind: normative-requirement
summary: If a node cannot select a label from the Label Set or cannot parse the Label Set TLVs, the request MUST be terminated and a NOTIFICATION with 'Routing problem/Label Set' MUST be generated. When processing a MAPPING message at an intermediate node, the label propagated upstream MUST fall within the Label Set.
section: 2.5.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
