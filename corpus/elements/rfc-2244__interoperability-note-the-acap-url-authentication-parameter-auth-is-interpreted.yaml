document: rfc-2244
kind: interoperability-note
summary: The ACAP URL authentication parameter ';AUTH=' is interpreted as described in the IMAP URL Scheme specification. The '<aauth>' grammar element is treated as part of the user name for relative URL resolution, providing compatibility with IMAP URL conventions.
section: 3.2.1
extracted_by: claude-sonnet-4-6
