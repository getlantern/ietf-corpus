document: rfc-5795
kind: protocol-element
summary: 'The ROHC channel is parameterized by: LARGE_CIDS (boolean, selects small CID 0–15 vs. large CID 0–16383), MAX_CID (highest CID the compressor may use), PROFILES (set of mutually-negotiated 16-bit profile identifiers), FEEDBACK_FOR (optional reference to reverse channel), and MRRU (maximum reconstructed unit size for segmentation). These MUST be established before the first packet.'
section: 5.1.2
topics:
    - routing
