document: rfc-5440
kind: security-consideration
summary: PCEP SHOULD use TCP authentication (TCP MD5 per RFC 2385, noting its known weaknesses, or TCP-AO per RFC 5925) or IPsec to protect session integrity and authenticity. Key configuration and distribution are deployment concerns; static pre-shared keys or out-of-band key exchange are discussed.
section: "10.2"
topics:
    - security
    - tcp
    - routing
    - crypto
