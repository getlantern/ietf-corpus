document: rfc-5961
kind: normative-requirement
summary: Implementations that regularly maintain long-lived TCP connections (e.g., BGP) where endpoints are predictable and no auxiliary anti-spoofing like TCP MD5 is available SHOULD implement the mitigations specified in this document. These mitigations MAY be implemented in other cases.
section: "1.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - security
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
