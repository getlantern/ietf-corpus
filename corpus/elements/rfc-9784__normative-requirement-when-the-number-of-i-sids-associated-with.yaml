document: rfc-9784
kind: normative-requirement
summary: When the number of I-SIDs associated with a failed EVC is large, it is RECOMMENDED to assign a B-MAC per vES; upon EVC failure, the affected PE withdraws this B-MAC route to signal remote PEs to flush all associated C-MACs.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
