document: rfc-4867
kind: normative-requirement
summary: Non-received speech frames or frame-blocks between SID updates during non-speech periods MUST be stored as NO_DATA frames (FT=15) in the storage format. Frames lost in transmission MUST be stored as NO_DATA or SPEECH_LOST frames to maintain synchronization.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
