document: rfc-9146
kind: wire-format
summary: DTLSCiphertext adds an opaque cid[cid_length] field after the sequence_number and before the length field. outer_type is always tls12_cid(25); enc_content is the encrypted DTLSInnerPlaintext. All other fields match RFC 6347.
