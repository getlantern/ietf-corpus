document: rfc-3729
kind: normative-requirement
summary: Conformance to the APM MIB specification requires that collected data match the semantic definitions herein—response time, throughput, streaming responsiveness, and availability—regardless of the measurement methodology (probe-based, client-based, synthetic-transaction, etc.) used. No specific methodology is mandated.
section: "2.3"
rfc2119_level: REQUIRED
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
