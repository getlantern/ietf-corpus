document: rfc-2829
kind: protocol-element
summary: 'DIGEST-MD5 authentication is a multi-stage bind procedure: the client sends a bind with sasl mechanism ''DIGEST-MD5'' and absent credentials; the server responds with saslBindInProgress and a digest-challenge in serverSaslCreds; the client responds with a digest-response; the server returns success or error, optionally with response-auth for subsequent authentication.'
section: "6.1"
topics:
    - ldap
    - security
