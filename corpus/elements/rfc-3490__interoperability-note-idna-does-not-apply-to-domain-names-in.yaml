document: rfc-3490
kind: interoperability-note
summary: IDNA does not apply to domain names in the NAME and RDATA fields of DNS resource records whose CLASS is not IN. This exclusion covers every non-IN class, present and future, unless a future standard explicitly invites IDNA use.
section: 3.2.1
topics:
    - dns
