document: rfc-6604
kind: design-rationale
summary: When following an xNAME chain, all but the last query cycle necessarily had no error—otherwise the chain would have terminated earlier. Therefore, setting RCODE based on the final cycle is logically correct and fully describes the outcome of the complete resolution process.
