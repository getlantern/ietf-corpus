document: rfc-9074
kind: normative-requirement
summary: Clients SHOULD set the ACKNOWLEDGED property to the current UTC date-time when a calendar user acknowledges a pending alarm. For alarms like email alerts where acknowledgement feedback is unavailable, the client SHOULD set it when the alarm is triggered and the action is successfully carried out.
section: "6.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
