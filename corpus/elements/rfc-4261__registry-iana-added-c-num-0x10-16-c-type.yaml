summary: IANA added C-Num=0x10 (16), C-Type=0x02 (2) — 'Message Integrity, Integrity-TLS' — to the COPS Parameters registry. For Client-Type 0, the flag value 0x01=StartTLS was registered for the Integrity-TLS object, and error sub-code values for Error Code 15 (octet 2=16, octet 3=0 for no security; octet 3=2 for Integrity-TLS preferred) were also added.
