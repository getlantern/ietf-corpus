document: rfc-9552
kind: protocol-element
summary: 'The Protocol-ID field identifies the IGP source: IS-IS Level 1 (1), IS-IS Level 2 (2), OSPFv2 (3), Direct (4), Static configuration (5), OSPFv3 (6). ''Direct'' and ''Static configuration'' SHOULD be used for locally-sourced BGP-LS information.'
