document: rfc-5557
kind: normative-requirement
summary: If a PCE receives a GCO request and cannot process it due to insufficient memory, the PCE MUST send a PCErr message with PCEP-ERROR Object Error-Type=15, Error-value=1, and MUST stop processing the request. The PCC MUST cancel the corresponding GCO request.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
