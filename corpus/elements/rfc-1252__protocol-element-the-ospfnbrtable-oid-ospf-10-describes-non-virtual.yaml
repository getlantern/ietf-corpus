document: rfc-1252
kind: protocol-element
summary: The ospfNbrTable (OID ospf 10) describes non-virtual OSPF neighbors, indexed by ospfNbrIpAddr and ospfNbrAddressLessIndex. Fields include ospfNbrRtrId, ospfNbrOptions (bit 0=external LSA support, bit 1=TOS metric support), ospfNbrPriority, ospfNbrState, ospfNbrEvents, ospfNbrLSRetransQLen, and ospfNBMANbrStatus.
section: "5.10"
