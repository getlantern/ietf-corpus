document: rfc-2302
kind: protocol-element
summary: 'An optional ''application'' parameter is introduced for the image/tiff content-type to identify the specific TIFF subset or extension profile applicable to the encoded image data. Example: ''Content-type: image/tiff; application=foo''. No values are defined in this document.'
section: "3.2"
