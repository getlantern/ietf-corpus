document: rfc-8250
kind: design-rationale
summary: This specification recommends having PDM off by default to minimize unintended exposure of timing metadata. PDM activation should be explicit and configurable per protocol, port, or IP address, giving operators fine-grained control over measurement scope.
section: 3.5.1
topics:
    - ip
    - measurement
    - security
