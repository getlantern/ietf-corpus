document: rfc-8981
kind: design-rationale
summary: DESYNC_FACTOR is computed per-address (rather than globally) so that each temporary address has a statistically different preferred lifetime, preventing all hosts from regenerating addresses at exactly the same time and making it harder to infer when a new address is generated.
section: "3.8"
topics:
    - ip
    - privacy
