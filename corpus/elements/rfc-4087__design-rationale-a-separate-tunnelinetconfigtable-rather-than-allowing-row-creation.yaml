document: rfc-4087
kind: design-rationale
summary: A separate tunnelInetConfigTable (rather than allowing row creation directly in tunnelIfTable indexed by ifIndex) was chosen because ifIndex values are agent-chosen and may change across restarts. Indexing by manager-controlled values (endpoint addresses, encapsulation method, and a manager-chosen ID) avoids interoperability problems and simplifies row creation.
section: 3.1.3
topics:
    - snmp
    - ip
