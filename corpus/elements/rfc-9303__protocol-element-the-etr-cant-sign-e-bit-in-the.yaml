document: rfc-9303
kind: protocol-element
summary: The ETR-Cant-Sign E-bit in the EID Authentication Data, when set to 1 by the Map-Server, signals to the ITR that at least one authoritative ETR for the requested EID-Prefix has not enabled LISP-SEC. This allows the ITR to decide whether to downgrade to a non-LISP-SEC Map-Request.
section: "6.1"
topics:
    - security
    - routing
    - interoperability-note
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
