summary: The T11-FC-SP-AUTHENTICATION-MIB module (mib-2 176) defines t11FcSpAuEntityTable (FC-SP-capable entities indexed by fcmInstanceIndex, entity WWN, and FabricIndex), t11FcSpAuIfStatTable (per-interface authentication statistics), t11FcSpAuRejectTable (volatile log of recently rejected AUTH transactions), and two notifications for sent and received AUTH rejections.
