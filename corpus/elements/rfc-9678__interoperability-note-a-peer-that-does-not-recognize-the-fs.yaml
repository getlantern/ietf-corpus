document: rfc-9678
kind: interoperability-note
summary: A Peer that does not recognize the FS extension ignores AT_KDF_FS and AT_PUB_ECDHE and proceeds with base EAP-AKA' as specified in RFC 9048. The Server makes a policy decision on whether to allow such fallback; allowing it maintains backward compatibility with legacy equipment.
section: "6.2"
topics:
