document: rfc-5555
kind: protocol-element
summary: The NAT Detection Option (Type 31) is sent by the home agent in the binding acknowledgement to indicate whether a NAT was detected. It includes an F flag (forces UDP encapsulation even without NAT) and a Refresh Time field (in seconds) suggesting how often the mobile node should send keepalives; all-1s means no keepalives needed.
section: 3.2.2
topics:
    - mobility
    - nat
    - ip
