document: rfc-1495
kind: interoperability-note
summary: 'The mapping is symmetric for three cases: (1) any atomic body part, (2) multipart/digest and multipart/mixed subtypes, and (3) message/rfc822. For other content-types (message/external-body, message/partial, nested multipart), asymmetric mappings apply.'
