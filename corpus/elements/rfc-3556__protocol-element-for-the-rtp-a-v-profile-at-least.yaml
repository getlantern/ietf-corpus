document: rfc-3556
kind: protocol-element
summary: For the RTP A/V Profile, at least RS/(RS+RR) of the RTCP bandwidth is dedicated to active data senders. When the proportion of senders exceeds RS/(RS+RR), senders get their proportion of the sum of RS and RR, meaning a sender and non-sender each get the same allocation.
section: "2"
