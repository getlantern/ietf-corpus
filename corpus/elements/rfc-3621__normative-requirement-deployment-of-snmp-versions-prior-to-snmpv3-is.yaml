document: rfc-3621
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementers are RECOMMENDED to deploy SNMPv3 with full cryptographic mechanisms (authentication and privacy) and to restrict GET/SET access to only those principals with legitimate rights.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
