document: rfc-3588
kind: normative-requirement
summary: Diameter clients MUST support IPsec and MAY support TLS. Diameter servers MUST support both TLS and IPsec. The Diameter protocol MUST NOT be used without a security mechanism (TLS or IPsec). IPsec is recommended for intra-domain traffic; TLS for inter-domain.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
