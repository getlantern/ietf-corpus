document: rfc-7961
kind: normative-requirement
summary: If the Length of the AFN Size sub-sub-TLV is not a multiple of 3, the sub-sub-TLV MUST be ignored. Additionally, if a known AFN's declared size differs from the size known to the receiving switch, the enclosing IA APPsub-TLV MUST be ignored as corrupt.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
