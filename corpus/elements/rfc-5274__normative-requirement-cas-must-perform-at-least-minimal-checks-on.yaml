document: rfc-5274
kind: normative-requirement
summary: CAs MUST perform at least minimal checks on all public keys before issuing a certificate, including a syntax check via the POP operation. CAs SHOULD perform simple checks for known bad keys such as small subgroups for DSA-SHA1/DH keys or known bad exponents for RSA keys.
section: "8"
rfc2119_level: MUST
topics:
    - pkix
    - security
    - crypto
