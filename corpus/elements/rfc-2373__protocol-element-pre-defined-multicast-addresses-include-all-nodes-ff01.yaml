kind: protocol-element
summary: 'Pre-defined multicast addresses include: All Nodes (FF01::1, FF02::1), All Routers (FF01::2, FF02::2, FF05::2), and Solicited-Node (FF02::1:FFxx:xxxx). Reserved multicast addresses FF00:: through FF0F:: must never be assigned to any multicast group.'
