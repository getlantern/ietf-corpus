document: rfc-9174
kind: security-consideration
summary: TLS 1.3 (RFC 8446) with mutual certificate authentication is mandatory to implement for TCPCLv4. All TCPCL entities must support TLS regardless of whether authentication is enforced by local policy, ensuring that opportunistic encryption is always available even when full authentication is not required.
section: "7.11"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
