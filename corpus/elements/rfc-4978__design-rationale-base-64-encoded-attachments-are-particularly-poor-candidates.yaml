document: rfc-4978
kind: design-rationale
summary: 'Base-64 encoded attachments are particularly poor candidates for DEFLATE compression: 8-bit compression algorithms work poorly on base-64''s effectively 6-bit byte structure, hiding most of the underlying 8-bit file format from the compressor.'
