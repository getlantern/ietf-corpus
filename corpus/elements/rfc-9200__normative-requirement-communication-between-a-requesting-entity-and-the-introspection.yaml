document: rfc-9200
kind: normative-requirement
summary: Communication between a requesting entity and the introspection endpoint MUST be integrity protected, encrypted, and request-response bound, with mutual authentication. For an invalid or inactive token query, the AS MUST respond with an introspection response with active set to false rather than an error.
section: "5.9"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
