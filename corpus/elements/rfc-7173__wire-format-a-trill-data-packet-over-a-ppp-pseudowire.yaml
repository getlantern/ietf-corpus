document: rfc-7173
kind: wire-format
summary: 'A TRILL Data packet over a PPP pseudowire in MPLS consists of: Server MPLS Tunnel Label(s) (n*4 octets), PW Label (4 octets), Control Word (4 octets), PPP Header 0x005d (2 octets), TRILL Header (6 octets), Destination MAC (6 octets), Source MAC (6 octets), Data Label (4 or 8 octets), and variable Payload Body.'
