document: rfc-9103
kind: normative-requirement
summary: The connection for XoT SHOULD be established using port 853, as specified in RFC 7858, unless there is mutual agreement between primary and secondary to use a different port. Different ports MAY be used for AXoT and IXoT or for different zones.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - tls
    - dns
