document: rfc-9432
kind: state-machine
summary: When a member node's label (<unique-N>) changes, consumers MUST treat this as a member zone removal (including removal of all associated state per Section 5.3), immediately followed by addition of the zone as a newly configured member. This is also the mechanism for an explicit zone-associated state reset.
section: "5.4"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
