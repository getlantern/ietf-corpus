document: rfc-4972
kind: wire-format
summary: 'The OSPF TE-MESH-GROUP TLV for IPv6 (Type 4) encodes one or more entries each containing: a 32-bit mesh-group-number, a 128-bit tail-end IPv6 address, a 1-octet name-length field, and a variable-length tail-end name. Format otherwise mirrors the IPv4 variant.'
section: "4.1"
