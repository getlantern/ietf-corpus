document: rfc-2747
kind: normative-requirement
summary: During message generation, the unused flags and reserved field in the INTEGRITY object MUST be set to 0, the Sequence Number MUST be updated to a unique monotonically increasing value, and the Keyed Message Digest field MUST be set to zero before computing the authenticating digest.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
