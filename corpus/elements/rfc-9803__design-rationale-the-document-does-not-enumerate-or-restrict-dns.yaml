document: rfc-9803
kind: design-rationale
summary: The document does not enumerate or restrict DNS record types allowable in the 'custom' attribute in order to facilitate forward compatibility with future DNS protocol changes, eliminating the need to update this document when new above-zone-cut record types are specified.
