document: rfc-5035
kind: design-rationale
summary: The default hash algorithm in ESSCertIDv2 is SHA-256 (not SHA-1), reflecting the intent to move away from SHA-1. The structure allows any AlgorithmIdentifier, providing full algorithm agility for future hash function transitions.
