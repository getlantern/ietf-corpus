document: rfc-6536
kind: protocol-element
summary: The nacm:default-deny-all YANG extension marks a node as controlling a very sensitive security parameter; when NACM is enabled, only a recovery session has any access (read, write, or execute) by default. It may appear in data definition, rpc, or notification statements.
section: 3.5.2
topics:
