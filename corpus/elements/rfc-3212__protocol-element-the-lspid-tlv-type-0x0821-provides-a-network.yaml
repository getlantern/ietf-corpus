document: rfc-3212
kind: protocol-element
summary: The LSPID TLV (type 0x0821) provides a network-unique identifier for a CR-LSP, composed of the ingress LSR Router ID and a locally unique CR-LSP ID. It also carries an Action Indicator Flag (0000=initial setup, 0001=modify) enabling in-service bandwidth modification.
section: "4.5"
topics:
    - mpls
