document: rfc-6409
kind: security-consideration
summary: IP address restriction for submission authorization does not support travelers and can be spoofed unless all transport paths between MUA and MSA are trustworthy. POP-before-SMTP has a vulnerability window and coordination difficulties. SMTP-AUTH is the preferred authentication mechanism.
section: "3.3"
topics:
    - email
    - security
