document: rfc-8514
kind: protocol-element
summary: The FETCH response includes a "SAVEDATE" data item containing a date-time string representing the save date of the message. If the underlying mailbox storage does not support the save date attribute, the value returned is always NIL rather than a string.
section: "4.2"
topics:
    - email
