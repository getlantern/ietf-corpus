document: rfc-3246
kind: normative-requirement
summary: In the event that packet loss occurs, those packets not lost MUST conform to the equations of Section 2.2. Conformance is tested off-line by removing lost packets from the input stream and verifying the remaining arrival/departure sequences satisfy eq_1 through eq_4.
section: "2.5"
rfc2119_level: MUST
