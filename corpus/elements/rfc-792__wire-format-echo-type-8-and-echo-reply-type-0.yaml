document: rfc-792
kind: wire-format
summary: 'Echo (Type=8) and Echo Reply (Type=0) messages: 16-bit Checksum, 16-bit Identifier, 16-bit Sequence Number, followed by variable-length Data. To form a reply, source and destination addresses are reversed, type code changed to 0, and checksum recomputed.'
