document: rfc-5444
kind: interoperability-note
summary: All addresses within a single message must be of the same length. When a message must carry both IPv4 and IPv6 addresses, IPv4 addresses SHOULD be represented as IPv4-mapped IPv6 addresses as defined in RFC 4291, so that all addresses share a uniform 16-octet length.
section: "3"
topics:
    - routing
    - ip
