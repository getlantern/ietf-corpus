document: rfc-9113
kind: protocol-element
summary: The client connection preface is 24 octets (the ASCII string "PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n") followed immediately by a SETTINGS frame (which MAY be empty). The server connection preface is a potentially empty SETTINGS frame that MUST be the first frame sent by the server.
section: "3.4"
topics:
    - http
