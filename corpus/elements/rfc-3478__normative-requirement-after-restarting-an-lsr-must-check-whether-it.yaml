document: rfc-3478
kind: normative-requirement
summary: After restarting, an LSR MUST check whether it was able to preserve its MPLS forwarding state. If not, the LSR sets Recovery Time to 0 in the FT Session TLV sent to neighbors.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
