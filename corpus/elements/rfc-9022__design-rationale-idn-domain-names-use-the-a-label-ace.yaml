document: rfc-9022
kind: design-rationale
summary: IDN domain names use the A-label (ACE-encoded) form in the primary <name> field per RFC 5891 Section 4.4, with the Unicode representation carried in the optional <uName> element, keeping the primary key compatible with ASCII-only systems.
