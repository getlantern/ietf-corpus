document: rfc-7286
kind: design-rationale
summary: Only HTTP and HTTPS URI schemes are defined for ALTO server discovery because the ALTO protocol specification (RFC 7285) defines access only over HTTP/HTTPS and no other scheme. The U-NAPTR result can nonetheless be any valid HTTP(S) URI.
section: "3.2"
topics:
