document: rfc-6909
kind: protocol-element
summary: The IPv4 Traffic Offload Selector option (type 53) is a new PMIPv6 mobility option carried in Proxy Binding Update and Proxy Binding Acknowledgement messages. It contains an Offload Mode (M) flag and an optional Traffic Selector sub-option, with 4n alignment requirement.
section: "3.1"
topics:
