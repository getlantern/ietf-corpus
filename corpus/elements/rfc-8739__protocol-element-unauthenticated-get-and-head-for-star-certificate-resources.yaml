document: rfc-8739
kind: protocol-element
summary: 'Unauthenticated GET (and HEAD) for star-certificate resources is an optional negotiated feature: the server advertises support via allow-certificate-get=true in the directory meta auto-renewal object, and the client requests it per-Order in the newOrder payload. If accepted, the server MUST reflect the attribute in the resulting order object and MUST also continue to allow POST-as-GET.'
section: "3.4"
topics:
    - acme
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
