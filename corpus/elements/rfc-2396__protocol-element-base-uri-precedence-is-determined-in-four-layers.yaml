document: rfc-2396
kind: protocol-element
summary: 'Base URI precedence is determined in four layers (innermost wins): (1) base URI embedded in document content; (2) base URI of the encapsulating entity; (3) URI used to retrieve the entity (using the last URI after redirects); (4) application-defined default base URI.'
section: "5.1"
