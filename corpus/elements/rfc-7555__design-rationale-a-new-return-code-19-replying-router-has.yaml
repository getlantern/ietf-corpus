document: rfc-7555
kind: design-rationale
summary: 'A new Return Code 19 (''Replying router has FEC mapping for topmost FEC'') was introduced because existing RFC 4379 Return Codes do not cover a transit Proxy LSR: the standard transit codes describe how a packet would transit, which is inappropriate since the Proxy Ping Request carries no information about the input interface.'
section: "3.2"
topics:
    - mpls
    - routing
