document: rfc-9125
kind: interoperability-note
summary: The Prefix-SID sub-TLV (RFC 9012) is only defined for IPv4/IPv6 Labeled Unicast routes, so the site interconnection solution described in this document only applies to routes of those types. Future use with other route types would require additional documents.
