document: rfc-9728
kind: normative-requirement
summary: A protected resource metadata document MUST be queried using an HTTP GET request. If the resource identifier contains a path or query component, any terminating slash following the host component MUST be removed before inserting /.well-known/ and the well-known URI path suffix.
section: "3.1"
rfc2119_level: MUST
topics:
    - oauth
    - http
