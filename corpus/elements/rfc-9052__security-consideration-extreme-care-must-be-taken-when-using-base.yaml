document: rfc-9052
kind: security-consideration
summary: Extreme care must be taken when using Base IV in a COSE_Key, as many encryption algorithms lose security if the same IV is used twice. When the same key is shared among multiple senders, the application must partition the IV space between senders or provide different base points.
section: "7.1"
topics:
    - security
    - crypto
