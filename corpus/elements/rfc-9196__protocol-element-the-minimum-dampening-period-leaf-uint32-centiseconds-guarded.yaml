document: rfc-9196
kind: protocol-element
summary: The minimum-dampening-period leaf (uint32, centiseconds, guarded by yp:on-change) specifies the minimum dampening period for on-change subscriptions. If present and greater than zero, dampening is mandatory for the selected data nodes.
