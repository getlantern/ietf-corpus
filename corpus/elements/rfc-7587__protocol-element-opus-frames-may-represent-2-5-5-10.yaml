summary: 'Opus frames may represent 2.5, 5, 10, 20, 40, or 60 ms of audio. Multiple frames can be combined into a single packet up to 120 ms total. Timestamp increments per frame size are: 120 (2.5 ms), 240 (5 ms), 480 (10 ms), 960 (20 ms), 1920 (40 ms), 2880 (60 ms).'
