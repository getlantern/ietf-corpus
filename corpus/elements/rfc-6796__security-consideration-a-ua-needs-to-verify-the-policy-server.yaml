document: rfc-6796
kind: security-consideration
summary: A UA needs to verify the policy server's certificate and MUST only accept policies from servers it is configured to trust, as described in RFC 6794 Section 5. Session info and session policy information can be sensitive; the distribution protocol SHOULD ensure authentication, confidentiality, and message integrity.
section: "9"
topics:
