document: rfc-4301
kind: normative-requirement
summary: Every IPsec implementation MUST have a management interface for the SPD that allows ordering of entries and creation of entries consistent with the defined selectors. The system administrator MUST be able to control whether users or applications can override system policies.
section: 4.4.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
