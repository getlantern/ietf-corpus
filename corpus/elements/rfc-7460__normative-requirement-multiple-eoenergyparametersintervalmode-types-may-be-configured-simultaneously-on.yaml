document: rfc-7460
kind: normative-requirement
summary: Multiple eoEnergyParametersIntervalMode types MAY be configured simultaneously on the same Energy Object using distinct eoEnergyParametersIndex values, subject to device capability. This allows parallel periodic, sliding, and total collection from a single Energy Object.
section: "5.6"
rfc2119_level: MAY
