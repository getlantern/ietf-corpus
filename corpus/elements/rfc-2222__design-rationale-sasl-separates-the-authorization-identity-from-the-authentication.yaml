document: rfc-2222
kind: design-rationale
summary: SASL separates the authorization identity from the authentication credentials identity, enabling proxy servers to authenticate with their own credentials while requesting privileges for a different identity. This feature is not always provided by transport security services such as TLS or IPsec.
section: A
topics:
    - security
