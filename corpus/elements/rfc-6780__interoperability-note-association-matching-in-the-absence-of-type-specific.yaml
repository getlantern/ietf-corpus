document: rfc-6780
kind: interoperability-note
summary: Association matching, in the absence of type-specific comparison rules, is based on comparison of all fields in an ASSOCIATION object. This applies equally to standard and Extended ASSOCIATION objects. No associations are made across Path state and Resv state.
