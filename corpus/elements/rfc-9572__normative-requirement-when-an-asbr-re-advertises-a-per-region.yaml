document: rfc-9572
kind: normative-requirement
summary: When an ASBR re-advertises a per-region I-PMSI A-D route into an AS where a designated ASBR is needed for legacy PEs, it MUST include a Designated Forwarder (DF) Election EC with the AC-DF bit cleared. If no legacy PEs exist in the AS, the ASBR MUST NOT include the EC.
section: 5.3.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
