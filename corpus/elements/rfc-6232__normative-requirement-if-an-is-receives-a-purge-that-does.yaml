document: rfc-6232
kind: normative-requirement
summary: If an IS receives a purge that does not include the POI TLV, it SHOULD add this TLV with both its own system ID and the system ID of the IS from which it received the purge, thereby recording the upstream source.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
