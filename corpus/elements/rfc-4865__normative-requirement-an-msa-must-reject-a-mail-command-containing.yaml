document: rfc-4865
kind: normative-requirement
summary: An MSA MUST reject a MAIL command containing a HOLDFOR value exceeding max-future-release-interval, a HOLDUNTIL value later than max-future-release-date-time, or more than one hold-param; SHOULD reply with code 501 and enhanced status code 5.5.4.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
