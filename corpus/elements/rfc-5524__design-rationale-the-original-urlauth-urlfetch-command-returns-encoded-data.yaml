document: rfc-5524
kind: design-rationale
summary: The original URLAUTH URLFETCH command returns encoded data without sufficient metadata to decode, which is suitable for mail relay use cases (e.g., BURL) but not for non-mail applications (e.g., streaming) that require access to the actual decoded content and media type.
section: "1"
