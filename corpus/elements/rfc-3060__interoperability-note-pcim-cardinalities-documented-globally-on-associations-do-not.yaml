document: rfc-3060
kind: interoperability-note
summary: PCIM cardinalities documented globally on associations do not capture the full constraints that differ between rule-specific and reusable conditions/actions. Implementations must apply additional semantic constraints textually described in Section 5.1, as no formal mechanism for complex multi-association constraints exists in CIM.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
