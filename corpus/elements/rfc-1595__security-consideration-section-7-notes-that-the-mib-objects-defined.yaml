document: rfc-1595
kind: security-consideration
summary: Section 7 notes that the MIB objects defined are read-only (MAX-ACCESS read-only or not-accessible) with the exception of sonetPathCurrentWidth, which is read-write. The security model relies on the underlying SNMP administrative framework (RFC 1445/RFC 1448) for access control; no SONET-specific security mechanisms are defined.
section: "7"
topics:
    - snmp
    - security
