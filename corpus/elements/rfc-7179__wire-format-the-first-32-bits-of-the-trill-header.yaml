document: rfc-7179
kind: wire-format
summary: 'The first 32 bits of the TRILL Header extensions area form the extended header flags word, structured as: bits 0-2 (Crit., critical summary bits), bits 3-7 (CHbH, critical hop-by-hop flags), bits 8-13 (NCHbH, non-critical hop-by-hop flags), bits 14-16 (CRSV, critical reserved flags), bits 17-20 (NCRSV, non-critical reserved flags), bits 21-26 (CItE, critical ingress-to-egress flags), and bits 27-31 (NCItE, non-critical ingress-to-egress flags). This 32-bit aligned word is present whenever the TRILL Header Op-Length field is non-zero.'
section: "2.3"
topics:
