document: rfc-4976
kind: normative-requirement
summary: Relay-to-relay connections MUST use TLS with mutual authentication. Client-to-relay communications MUST use TLS for AUTH requests and responses. A relay MUST present a certificate with its identity in the SubjectAltName as a dnsName.
section: "9.2"
rfc2119_level: MUST
topics:
    - realtime
    - tls
    - security
