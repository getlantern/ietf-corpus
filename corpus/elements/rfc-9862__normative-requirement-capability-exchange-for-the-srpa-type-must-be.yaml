document: rfc-9862
kind: normative-requirement
summary: Capability exchange for the SRPA Type MUST be done before using the SRPA. A PCEP speaker MUST include the SRPA Type (6) in the ASSOC-Type-List TLV and MUST receive the same from the PCEP peer before using the SRPA.
section: "4"
rfc2119_level: MUST
topics:
