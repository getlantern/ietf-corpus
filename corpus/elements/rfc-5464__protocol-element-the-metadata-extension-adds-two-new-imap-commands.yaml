document: rfc-5464
kind: protocol-element
summary: The METADATA extension adds two new IMAP commands (SETMETADATA and GETMETADATA), one new untagged response (METADATA), and a new METADATA response code. A server supporting both server and mailbox annotations advertises 'METADATA'; a server supporting only server annotations advertises 'METADATA-SERVER'.
