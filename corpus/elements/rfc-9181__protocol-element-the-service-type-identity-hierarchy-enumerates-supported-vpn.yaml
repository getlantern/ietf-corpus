summary: 'The ''service-type'' identity hierarchy enumerates supported VPN service types: l3vpn (RFC 4364), vpls (RFC 4761/4762), vpws (RFC 4664), vpws-evpn (RFC 8214), pbb-evpn (RFC 7623), mpls-evpn (RFC 7432), and vxlan-evpn (RFC 8365). Used to identify the VPN service type in consuming models.'
