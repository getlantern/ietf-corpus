document: rfc-7671
kind: security-consideration
summary: 'DNS TTLs for TLSA records must be chosen carefully: TTLs that are too long limit the ability to respond to compromised or lost keys by forcing clients to cache stale TLSA records, potentially causing authentication failures after an emergency key rotation.'
section: "13"
topics:
