document: rfc-8957
kind: interoperability-note
summary: When the LSP label has been penultimate hop popped, the receiving LSR may treat the exposed SFL either as an LSP label that was not PHPed (executing the SFL action on label processing) or as an MPLS Explicit NULL with associated SFL actions. Both behaviors are indistinguishable from the measurement system's perspective, so either may be implemented.
section: "4.2"
topics:
    - mpls
