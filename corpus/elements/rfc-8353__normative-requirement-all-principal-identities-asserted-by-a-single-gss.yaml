document: rfc-8353
kind: normative-requirement
summary: All principal identities asserted by a single GSS-API credential SHOULD belong to the same entity. A GSSName object MAY contain multiple names from different namespaces, but all names SHOULD refer to the same entity.
section: "5.8"
rfc2119_level: SHOULD
topics:
    - security
