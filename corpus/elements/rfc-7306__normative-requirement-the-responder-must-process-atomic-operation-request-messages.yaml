document: rfc-7306
kind: normative-requirement
summary: The Responder MUST process Atomic Operation Request Messages in the order they were sent, and MUST submit Atomic Operation Response Messages to the DDP layer in the same order. The Requester MUST pass Atomic Operation Request Messages to DDP in the order submitted by the ULP.
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
