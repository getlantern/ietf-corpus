document: rfc-3275
kind: normative-requirement
summary: The canonical form of the SignatureMethod URI MUST be used during signature validation because canonicalization of SignedInfo may alter relative URIs (e.g., absolutization). However, the required Canonical XML algorithm does not change URIs.
section: 3.2.2
rfc2119_level: MUST
topics:
    - security
    - crypto
