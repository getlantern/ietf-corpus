document: rfc-3276
kind: normative-requirement
summary: When interval data is suspect or known to be invalid, the agent MUST NOT report the interval. If the current 15-minute event bucket is determined to be invalid, notifications based on its value MUST NOT be generated.
section: "4.4"
rfc2119_level: MUST NOT
