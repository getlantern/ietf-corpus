document: rfc-7199
kind: normative-requirement
summary: Clients implementing this specification MUST verify that a policy URI received from HELD uses either the 'http:' or 'https:' scheme; if not, the client MUST discard the URI and behave as if no policy URI was provided.
section: "4.2"
rfc2119_level: MUST
topics:
