document: rfc-8435
kind: normative-requirement
summary: If ffdv_version equals 3, the server MUST set ffdv_minorversion to 0 and ffdv_tightly_coupled to false, and the client MUST access the storage device using NFSv3. If ffdv_version equals 4, the server MUST set ffdv_minorversion to one of the NFSv4 minor version numbers, and the client MUST access the storage device using NFSv4 with the specified minor version.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
