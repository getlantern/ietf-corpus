document: rfc-8282
kind: security-consideration
summary: Inter-layer traffic engineering with PCE may raise new security issues when PCE-PCE communication is done between different layer networks, and when a single PCE is granted full visibility of TE information across multiple layers. The Path-Key-based mechanism defined in RFC 5520 MAY be applied to address topology confidentiality between different layers.
section: "8"
topics:
    - security
    - routing
    - mpls
