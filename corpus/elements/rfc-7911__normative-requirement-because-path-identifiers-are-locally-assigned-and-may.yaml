document: rfc-7911
kind: normative-requirement
summary: Because Path Identifiers are locally assigned and may not persist across a control plane restart, an implementation SHOULD take special care so that the forwarding plane of a Receiving Speaker (RFC 4724) is not affected during graceful restart of a BGP session.
section: "5"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
