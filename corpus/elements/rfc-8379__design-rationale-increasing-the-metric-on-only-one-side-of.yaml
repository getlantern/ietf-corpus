document: rfc-8379
kind: design-rationale
summary: Increasing the metric on only one side of a link is insufficient to divert traffic in both directions; the Graceful-Link-Shutdown sub-TLV allows the remote node to also raise its metric, providing bidirectional traffic diversion while still permitting last-resort use of the link.
section: "1"
topics:
    - routing
