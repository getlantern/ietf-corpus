document: rfc-9574
kind: normative-requirement
summary: 'For BUM traffic received on an AR-REPLICATOR overlay tunnel with AR-IP as the IP DA, local bias MUST be followed: traffic is treated as if received on a local AC that is part of the Ethernet Segment and is forwarded to all local ESs regardless of DF/NDF state.'
section: "9.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
