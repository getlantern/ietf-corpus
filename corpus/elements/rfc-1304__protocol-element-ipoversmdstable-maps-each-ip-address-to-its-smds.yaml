summary: 'ipOverSMDSTable maps each IP address to its SMDS addressing: ipOverSMDSHA (individual SMDS address), ipOverSMDSLISGA (group address for the Logical IP Subnetwork), and ipOverSMDSARPReq (SMDS address to which ARP Requests are sent). Indexed by interface and IP address.'
