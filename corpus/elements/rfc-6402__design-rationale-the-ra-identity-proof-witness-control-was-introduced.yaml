document: rfc-6402
kind: design-rationale
summary: The RA Identity Proof Witness control was introduced to allow identity verification to be delegated to an RA closer to the end-entity, enabling the CA to operate company-wide without needing access to the shared secret. This also allows the RA to assert out-of-band identity proofs to the CA.
section: "2.5"
topics:
    - pkix
    - security
