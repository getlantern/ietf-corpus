document: rfc-7504
kind: protocol-element
summary: Reply code 521 indicates that the SMTP server host does not accept mail under any circumstances. It is used at connection-opening time in place of the usual 220 greeting, with an accompanying message such as 'Server does not accept mail'.
section: "3"
topics:
