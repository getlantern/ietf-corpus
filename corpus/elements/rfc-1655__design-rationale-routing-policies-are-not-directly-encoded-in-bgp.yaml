document: rfc-1655
kind: design-rationale
summary: Routing policies are not directly encoded in BGP; they are provided via configuration information. BGP enforces policies by affecting path selection from alternatives and controlling redistribution of routing information based on political, security, or economic considerations.
section: "5"
topics:
