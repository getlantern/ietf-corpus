document: rfc-2003
kind: normative-requirement
summary: If the 'Don't Fragment' bit is set in the inner IP header, it MUST be set in the outer IP header as well, to support Path MTU Discovery by the original sender.
section: "3.1"
rfc2119_level: MUST
