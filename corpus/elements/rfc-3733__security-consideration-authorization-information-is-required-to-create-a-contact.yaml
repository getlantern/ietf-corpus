document: rfc-3733
kind: security-consideration
summary: Authorization information is REQUIRED to create a contact object and is used in query and transfer operations to verify client authorization. Both client and server MUST ensure authorization information is stored and exchanged with high-grade encryption to prevent unauthorized transfer operations and unauthorized information disclosure.
