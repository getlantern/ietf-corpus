document: rfc-9110
kind: normative-requirement
summary: A server MUST NOT assume that two requests on the same connection are from the same user agent unless the connection is secured and specific to that agent, since HTTP is defined as a stateless protocol.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - http
    - security
