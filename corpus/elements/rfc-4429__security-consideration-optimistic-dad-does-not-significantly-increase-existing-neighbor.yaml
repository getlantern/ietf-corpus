document: rfc-4429
kind: security-consideration
summary: Optimistic DAD does not significantly increase existing Neighbor Discovery or SLAAC security concerns. Secure Neighbor Discovery (SEND, RFC 3971) provides protection against ND threats and introduces no additional attack surface when combined with Optimistic DAD.
