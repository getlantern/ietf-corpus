document: rfc-1237
kind: protocol-element
summary: Level 1 ISs forward packets for destinations outside their area to the nearest level 2 IS that indicates it is attached to the level 2 backbone. Level 1 ISs refuse to become neighbors with ISs whose area addresses do not overlap their own.
section: "3.2"
topics:
    - routing
