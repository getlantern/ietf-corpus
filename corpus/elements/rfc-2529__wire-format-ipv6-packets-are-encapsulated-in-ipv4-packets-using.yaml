document: rfc-2529
kind: wire-format
summary: IPv6 packets are encapsulated in IPv4 packets using IPv4 protocol type 41. The IPv4 header carries source and destination IPv4 addresses; the IPv4 body contains the IPv6 header followed immediately by the payload, with no additional headers between them.
