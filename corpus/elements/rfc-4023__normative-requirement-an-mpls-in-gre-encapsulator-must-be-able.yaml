document: rfc-4023
kind: normative-requirement
summary: An MPLS-in-GRE encapsulator MUST be able to generate packets without the optional GRE fields, and the default state MUST be that packets are generated without these fields. The encapsulator MUST NOT include optional fields unless it is known the decapsulator can process them.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
