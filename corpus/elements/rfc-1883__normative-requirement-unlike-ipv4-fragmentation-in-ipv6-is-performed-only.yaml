document: rfc-1883
kind: normative-requirement
summary: Unlike IPv4, fragmentation in IPv6 is performed only by source nodes, not by routers along a packet's delivery path. Sources use the Fragment header to fragment packets that exceed the path MTU.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
