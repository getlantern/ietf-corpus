document: rfc-7232
kind: normative-requirement
summary: If an origin server provides an entity-tag for a representation and the generation of that entity-tag does not satisfy all characteristics of a strong validator, then the origin server MUST mark the entity-tag as weak by prefixing its opaque value with 'W/' (case-sensitive).
section: "2.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
