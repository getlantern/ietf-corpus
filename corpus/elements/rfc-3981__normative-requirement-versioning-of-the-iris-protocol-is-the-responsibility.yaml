document: rfc-3981
kind: normative-requirement
summary: Versioning of the IRIS protocol is the responsibility of the application-transport layer but MUST be associated with the XML namespace URI representing IRIS. A change in this URI indicates a new version of the protocol.
section: "3"
rfc2119_level: MUST
