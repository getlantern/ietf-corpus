document: rfc-6486
kind: design-rationale
summary: The manifest does not include a self-reference (its own filename and hash) because it is impossible to compute the hash of the manifest before it is signed. This is an inherent limitation acknowledged in the generation procedure.
section: "5.1"
topics:
