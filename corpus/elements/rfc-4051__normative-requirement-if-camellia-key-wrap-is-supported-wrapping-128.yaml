document: rfc-4051
kind: normative-requirement
summary: If Camellia key wrap is supported, wrapping 128-bit keys with a 128-bit KEK and wrapping 256-bit keys with a 256-bit KEK are REQUIRED; all other key size combinations are OPTIONAL. The implementation of Camellia itself is OPTIONAL.
section: 2.6.3
rfc2119_level: REQUIRED
topics:
    - crypto
