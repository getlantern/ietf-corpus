document: rfc-9408
kind: design-rationale
summary: 'SAPs differ from Termination Points (TPs) defined in RFC 8345: a link is terminated by a single TP, but an AC can be terminated by multiple SAPs. SAPs are also distinct from tunnel termination points (TTPs) and links. This distinction justifies augmenting the ietf-network model rather than reusing existing TP constructs.'
