document: rfc-3420
kind: protocol-element
summary: A message/sipfrag part is a subset of a valid SIP message, obtained by starting with a well-formed SIP message and optionally deleting the entire start line, one or more entire header fields, and/or the body. All remaining elements must conform to SIP grammar.
