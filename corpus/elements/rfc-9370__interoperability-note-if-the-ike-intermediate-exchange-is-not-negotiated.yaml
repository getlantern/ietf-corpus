document: rfc-9370
kind: interoperability-note
summary: If the IKE_INTERMEDIATE exchange is not negotiated, peers MUST treat any ADDKE Transform Types in IKE_SA_INIT messages as unknown transform types and skip proposals containing them, falling back to NO_PROPOSAL_CHOSEN if no other proposals exist.
