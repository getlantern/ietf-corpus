document: rfc-4915
kind: protocol-element
summary: The unused T-bit in the OSPF Options field is redefined as the MT-bit. When DefaultExclusionCapability is enabled, the MT-bit MUST be set in Hello packets and SHOULD be set in Database Description packets.
section: "4.1"
topics:
