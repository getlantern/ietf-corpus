document: rfc-8058
kind: design-rationale
summary: Mailers currently require a confirmation landing page to guard against accidental GET-triggered unsubscriptions, making the process require more than one click. This specification enables automated unsubscription (e.g., combined with junk reporting or for closed mailboxes) without manual intervention.
section: "1"
topics:
    - email
