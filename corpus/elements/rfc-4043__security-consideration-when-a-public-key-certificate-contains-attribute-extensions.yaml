document: rfc-4043
kind: security-consideration
summary: When a public key certificate contains attribute extensions, the permanent identifier should not be used for access control but only for audit purposes, because certificate attributes may change and access could be granted on attributes no longer present in the current certificate.
section: "4"
topics:
