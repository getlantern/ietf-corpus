document: rfc-8049
kind: protocol-element
summary: VPN attachment at the site-network-access level is expressed via the mandatory 'vpn-attachment' container, either by referencing a 'vpn-id' directly (with a 'site-role' leaf) for simple cases, or by referencing a 'vpn-policy-id' for multi-VPN scenarios with optional per-LAN-tag or per-prefix filtering.
