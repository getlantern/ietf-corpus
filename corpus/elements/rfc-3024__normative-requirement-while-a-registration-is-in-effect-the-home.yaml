document: rfc-3024
kind: normative-requirement
summary: While a registration is in effect, the home agent MUST process each valid reverse-tunneled packet by decapsulating it, recovering the original packet, and forwarding it on behalf of the mobile node to the correspondent host's destination address.
section: 4.3.2
rfc2119_level: MUST
topics:
