summary: 'The CGA interface identifier (rightmost 64 bits) encodes the security parameter Sec in the three leftmost bits (bits 0–2): Sec = (interface identifier & 0xe000000000000000) >> 61. Bits 6 and 7 are the standard IPv6 ''u'' and ''g'' bits and are set to zero.'
