document: rfc-6555
kind: interoperability-note
summary: Happy Eyeballs applies only to connection-oriented transports (TCP, SCTP). For connectionless protocols such as UDP, a similar mechanism can be used only if the application has request/response semantics, as done by ICE for media path selection.
