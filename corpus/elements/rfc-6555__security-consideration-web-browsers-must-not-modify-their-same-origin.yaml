document: rfc-6555
kind: security-consideration
summary: Web browsers MUST NOT modify their same-origin policy to accommodate Happy Eyeballs behavior, because allowing connections to different IP addresses for the same origin would create additional security vulnerabilities beyond the connectivity benefits gained.
