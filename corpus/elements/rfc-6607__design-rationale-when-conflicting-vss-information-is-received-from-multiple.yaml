document: rfc-6607
kind: design-rationale
summary: When conflicting VSS information is received from multiple sources, the VSS information from the relay agent closest to the DHCP server takes precedence (VSS sub-option over VSS option in DHCPv4; outermost Relay-forward VSS option in DHCPv6). The rationale is that relay agents closer to the server are more trusted than the client or more distant relay agents.
section: "7.3"
topics:
    - dns
