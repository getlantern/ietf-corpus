document: rfc-5450
kind: design-rationale
summary: The specification only communicates the relationship between relative transmission times and relative RTP timestamps; it does not define an absolute transmission timestamp. This avoids requiring synchronization to absolute wall-clock time at the sender.
section: "1"
topics:
    - rtp
    - realtime
