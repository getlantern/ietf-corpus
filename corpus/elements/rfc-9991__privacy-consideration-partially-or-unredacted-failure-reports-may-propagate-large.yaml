document: rfc-9991
kind: privacy-consideration
summary: Partially or unredacted failure reports may propagate large amounts of spam, phishing, or malware content to Report Consumers. Mitigations include substituting 'hxxp' for 'http' in URIs, removing attachments, isolating report mail streams, using sandboxes, and limiting access to authorized individuals.
section: "7.3"
topics:
