document: rfc-4842
kind: normative-requirement
summary: The CEP packetizer MUST declare a circuit unequipped only if the Signal Label, Trace (J1/J2), and Tandem Connection (N1/N2/Z6) bytes all have zero value. During SPE/VT Unequipped, the SPE/VT MUST be transmitted into the packet network along with the appropriate headers, with N and P bits interpreted as usual.
section: 7.1.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
