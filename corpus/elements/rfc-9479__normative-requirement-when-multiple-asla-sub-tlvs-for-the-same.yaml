document: rfc-9479
kind: normative-requirement
summary: When multiple ASLA sub-TLVs for the same link advertise conflicting values for the same application/attribute pair, the first advertisement received in the lowest-numbered LSP MUST be used and subsequent conflicting advertisements MUST be ignored.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
