document: rfc-5762
kind: interoperability-note
summary: The RTP/SAVP integrity protection (message authentication) cannot be used in conjunction with DCCP partial checksums, since any bit error in the payload will cause authentication to fail. These two features are mutually exclusive.
section: "4.5"
topics:
