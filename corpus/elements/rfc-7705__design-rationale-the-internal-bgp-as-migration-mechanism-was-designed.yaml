document: rfc-7705
kind: design-rationale
summary: The 'Internal BGP AS Migration' mechanism was designed because traditional iBGP migration — requiring simultaneous reconfiguration of global ASN and all iBGP neighbor remote-ASN values — is too risky and disruptive in large networks. The new mechanism allows migration over days or weeks with reduced customer disruption, with the only observable disruptions occurring at individual PE maintenance windows.
section: "4.1"
topics:
    - bgp
    - routing
