document: rfc-9342
kind: protocol-element
summary: Network packet loss for a multipoint flow is computed as PL = (PI1 + PI2 + ... + PIn) - (PO1 + PO2 + ... + POm), where PIi is the packet count at the i-th input node and POj is the count at the j-th output node, applied per Alternate-Marking period and per flow.
section: "4.2"
topics:
