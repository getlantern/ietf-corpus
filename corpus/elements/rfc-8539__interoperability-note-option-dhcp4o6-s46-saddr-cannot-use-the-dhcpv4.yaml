document: rfc-8539
kind: interoperability-note
summary: OPTION_DHCP4O6_S46_SADDR cannot use the DHCPv4 'chaddr' field or Client Identifier (option 61) as a substitute because those fields must remain constant throughout the lease lifetime, whereas the softwire source address may only be known after the first DHCPV4-RESPONSE is received.
section: "6.2"
topics:
