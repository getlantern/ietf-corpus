document: rfc-9234
kind: normative-requirement
summary: Roles MUST NOT be configured on an eBGP session with a Complex peering relationship. If multiple eBGP sessions can segregate the Complex relationship into normal peering relationships, BGP Roles SHOULD be used on each resulting session.
section: "6"
rfc2119_level: MUST NOT
topics:
