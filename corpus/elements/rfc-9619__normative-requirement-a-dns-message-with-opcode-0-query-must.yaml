document: rfc-9619
kind: normative-requirement
summary: A DNS message with OPCODE = 0 (QUERY) MUST NOT include a QDCOUNT parameter whose value is greater than 1. It follows that the Question section of such a message MUST NOT contain more than one question.
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
