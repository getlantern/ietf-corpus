document: rfc-4363
kind: protocol-element
summary: 'dot1dPortRestrictedGroupRegistration (TruthValue, default false) controls Restricted Group Registration on a per-port basis: when true, creation of a new dynamic GMRP entry is permitted only if a Static Filtering Entry with Normal Registration exists for that VLAN. Defined per IEEE 802.1t clause 10.3.2.3.'
