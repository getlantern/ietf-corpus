document: rfc-7453
kind: normative-requirement
summary: A Global_ID of zero is limited to entities within a single operator and MUST NOT be used across a Network-to-Network Interface (NNI). A non-zero Global_ID MUST be derived from an ASN owned by the operator.
section: "10"
rfc2119_level: MUST NOT
topics:
