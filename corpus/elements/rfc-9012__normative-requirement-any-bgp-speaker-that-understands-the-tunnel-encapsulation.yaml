document: rfc-9012
kind: normative-requirement
summary: Any BGP speaker that understands the Tunnel Encapsulation attribute MUST be able to filter it from both incoming and outgoing BGP UPDATE messages. For each EBGP session, filtering of the attribute on both incoming and outgoing UPDATEs MUST be enabled by default.
section: "11"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
