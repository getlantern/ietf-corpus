document: rfc-7564
kind: design-rationale
summary: Stringprep (RFC 3454) was tied to Unicode version 3.2, making it impossible to be agile with respect to new Unicode versions. PRECIS replaces Stringprep by defining string classes in terms of Unicode code point properties and a derivation algorithm, allowing it to apply to any future Unicode version without republication.
section: "1"
topics:
