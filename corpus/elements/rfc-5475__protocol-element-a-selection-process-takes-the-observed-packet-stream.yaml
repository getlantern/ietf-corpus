document: rfc-5475
kind: protocol-element
summary: A Selection Process takes the Observed Packet Stream as input and selects a subset as output. A Selector defines what kind of action a Selection Process performs on a single packet. A Composite Selector is an ordered composition of Selectors where the output of one forms the input to the next.
section: "3.2"
