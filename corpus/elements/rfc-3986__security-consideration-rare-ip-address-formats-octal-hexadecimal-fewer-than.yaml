document: rfc-3986
kind: security-consideration
summary: Rare IP address formats (octal, hexadecimal, fewer than four dotted-decimal octets) are accepted by some platforms but are outside the URI grammar. Implementations should reject them to prevent spoofing of IP addresses.
section: "7.4"
topics:
