document: rfc-7427
kind: registry
summary: 'This document creates a new IANA registry ''IKEv2 Hash Algorithms'' with Expert Review policy. Initial values: RESERVED=0, SHA1=1, SHA2-256=2, SHA2-384=3, SHA2-512=4. Values 5-1023 are Unassigned; 1024-65535 are reserved for Private Use. MD5 is intentionally excluded as it is not safe for signature hash use.'
section: "7"
