document: rfc-9244
kind: normative-requirement
summary: 'A DOTS telemetry setup message MUST include only one of: telemetry configuration parameters, pipe capacity information, or traffic baseline information. Requests mixing these three types MUST be rejected by DOTS servers with a 4.00 (Bad Request) Response Code.'
section: "7"
rfc2119_level: MUST
topics:
    - security
