document: rfc-2068
kind: protocol-element
summary: The Via header records the protocol version and host of each proxy or gateway through which a message passes. Proxies MUST add a Via field to both forwarded requests and responses, and MAY combine multiple entries for the same host into one.
section: "14.44"
