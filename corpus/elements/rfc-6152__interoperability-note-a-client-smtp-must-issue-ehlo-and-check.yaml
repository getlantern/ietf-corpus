document: rfc-6152
kind: interoperability-note
summary: A client SMTP must issue EHLO and check for the 8BITMIME keyword in the server's 250 response before using BODY=8BITMIME. If the server does not advertise the capability, 8-bit content must not be sent.
section: "3"
