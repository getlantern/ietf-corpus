document: rfc-3547
kind: interoperability-note
summary: The GDOI PROTO_IPSEC_ESP TEK excludes the Group Description SA attribute from RFC 2407; a GDOI implementation MUST NOT send it and MUST ignore it if received, since multicast group description is conveyed through the GDOI ID payload instead.
section: 5.4.1
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
