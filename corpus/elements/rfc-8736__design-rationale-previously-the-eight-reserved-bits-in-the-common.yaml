document: rfc-8736
kind: design-rationale
summary: Previously, the eight reserved bits in the common PIM header were not formally assigned on a per-message-type basis. This document formalizes per-type flag bit assignment to allow different message types to use the bits independently without conflicting interpretations.
section: "1"
topics:
