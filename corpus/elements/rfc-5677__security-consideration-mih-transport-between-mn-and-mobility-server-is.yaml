document: rfc-5677
kind: security-consideration
summary: 'MIH transport between MN and Mobility Server is exposed to four threats: (1) Mobility Server identity spoofing causing wrong handover decisions, (2) tampering with Mobility Server data, (3) replay attacks exploiting the PUSH model to send stale handover data, and (4) eavesdropping to trace or predict user movement.'
section: "8.2"
topics:
