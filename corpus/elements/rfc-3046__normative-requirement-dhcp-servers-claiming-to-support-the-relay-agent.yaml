document: rfc-3046
kind: normative-requirement
summary: DHCP servers claiming to support the Relay Agent Information option SHALL echo the entire contents of the option in all replies, SHOULD copy it as the last DHCP option in the response, and SHALL NOT place the echoed option in the overloaded sname or file fields.
section: "2.2"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
