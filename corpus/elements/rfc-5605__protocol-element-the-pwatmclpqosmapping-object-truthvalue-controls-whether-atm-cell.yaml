document: rfc-5605
kind: protocol-element
summary: 'The pwAtmClpQosMapping object (TruthValue) controls whether ATM Cell Loss Priority (CLP) bits are mapped to PSN QoS fields such as the MPLS EXP bits in the label stack, allowing drop precedence to be preserved across the PSN. Reference: section 12 of RFC 4717 (ATM encapsulation over MPLS).'
