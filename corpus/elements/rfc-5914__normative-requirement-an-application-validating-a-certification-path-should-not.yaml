document: rfc-5914
kind: normative-requirement
summary: An application validating a certification path SHOULD NOT ignore the limitations provided in CertPathControls, though it MAY impose additional restrictions. An application MAY supply a subset of policies, a TRUE flag value where appropriate, a subset of permitted names, additional excluded names, or a smaller pathLenConstraint.
section: "2.5"
rfc2119_level: SHOULD NOT
topics:
