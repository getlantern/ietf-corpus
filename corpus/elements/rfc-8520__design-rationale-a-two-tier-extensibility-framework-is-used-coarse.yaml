document: rfc-8520
kind: design-rationale
summary: 'A two-tier extensibility framework is used: coarse-grained versioning via the mud-version integer in the MUD URL (this memo specifies version 1), and fine-grained extensions that add nodes to the mud container, which must be IETF-standardized, declared in the ''extensions'' list, and ignored by unaware implementations. This avoids negotiation complexity while enabling evolution.'
section: "14"
