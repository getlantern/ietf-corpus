document: rfc-6004
kind: interoperability-note
summary: This document covers only point-to-point (E-Line/EPL/EVPL) Ethernet services mappable to GMPLS P2P TE LSPs. Support for multipoint-to-multipoint (E-LAN/MP2MP) services is explicitly deferred for future study, as no clear correspondence exists with GMPLS TE LSPs.
