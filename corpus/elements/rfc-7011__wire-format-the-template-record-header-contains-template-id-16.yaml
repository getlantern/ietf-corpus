document: rfc-7011
kind: wire-format
summary: The Template Record Header contains Template ID (16-bit, range 256–65535) and Field Count (16-bit). Template IDs are unique per Transport Session and Observation Domain. The Options Template Record Header additionally includes a Scope Field Count (16-bit), which MUST NOT be zero.
