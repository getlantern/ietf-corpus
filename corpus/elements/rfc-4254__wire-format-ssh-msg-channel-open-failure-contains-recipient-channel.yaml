document: rfc-4254
kind: wire-format
summary: 'SSH_MSG_CHANNEL_OPEN_FAILURE contains: recipient channel (uint32), reason code (uint32), description (string in UTF-8/RFC3629), and language tag (string per RFC3066). Four reason codes are defined: SSH_OPEN_ADMINISTRATIVELY_PROHIBITED (1), SSH_OPEN_CONNECT_FAILED (2), SSH_OPEN_UNKNOWN_CHANNEL_TYPE (3), SSH_OPEN_RESOURCE_SHORTAGE (4).'
section: "5.1"
