document: rfc-6353
kind: normative-requirement
summary: When establishing DTLS/UDP connections, implementations MUST use a different UDP source port number for each active connection to a remote destination IP-address/port-number combination so the remote entity can disambiguate between multiple connections.
section: 5.1.1
rfc2119_level: MUST
topics:
    - snmp
    - tls
    - udp
