document: rfc-3339
kind: protocol-element
summary: Leap seconds are represented as a time-second value of "60", occurring as an extra second at the end of a day in UTC in the form YYYY-MM-DDT23:59:60Z. A leap second occurs simultaneously in all time zones; in non-UTC zones the leap second point is shifted by the zone offset.
section: "5.7"
