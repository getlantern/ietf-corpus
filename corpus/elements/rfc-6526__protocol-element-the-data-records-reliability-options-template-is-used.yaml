document: rfc-6526
kind: protocol-element
summary: The Data Records Reliability Options Template is used to notify the Collecting Process which Templates are active on each SCTP stream and whether their Data Records will be sent reliably or unreliably. It MUST contain Template ID as scope and dataRecordsReliability as a non-scope Information Element.
section: "4.2"
topics:
    - sctp
