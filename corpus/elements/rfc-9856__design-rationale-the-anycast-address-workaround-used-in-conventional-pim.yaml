document: rfc-9856
kind: design-rationale
summary: The anycast address workaround used in conventional PIM/MVPN networks is unsuitable for Hot Standby redundancy and introduces challenges when sources must be reachable via IP unicast or when multiple sources with the same IP address share a Broadcast Domain. RFC 9856 avoids these problems by using ESI labels instead.
section: "1"
topics:
    - routing
    - multicast
