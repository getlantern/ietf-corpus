document: rfc-5284
kind: normative-requirement
summary: Implementations capable of interpreting USER_ERROR_SPEC SHOULD take further action based on the reported error; at minimum, implementations SHOULD log the Enterprise Number, Sub-organization, User Error Value, and Error Description.
