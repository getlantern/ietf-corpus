document: rfc-9026
kind: normative-requirement
summary: A Standby BGP C-multicast route MUST carry the 'Standby PE' BGP Community (0xFFFF0009), and its LOCAL_PREF attribute MUST be set lower than the LOCAL_PREF of the corresponding non-standby C-multicast route; a value of zero is RECOMMENDED.
section: "4.1"
rfc2119_level: MUST
topics:
    - vpn
    - multicast
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
