document: rfc-9691
kind: normative-requirement
summary: IP and AS resources on all current CA certificates for maintained TA key pairs MUST be the same, and any updates in delegations MUST be reflected under each key pair. A TA SHOULD NOT publish any objects besides CRL, manifest, a single TAK, and CA certificates.
section: "5"
rfc2119_level: MUST
