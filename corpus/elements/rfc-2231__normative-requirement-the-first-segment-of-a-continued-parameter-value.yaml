document: rfc-2231
kind: normative-requirement
summary: The first segment of a continued parameter value MUST be encoded (using the extended-value format with percent encoding) if language and character set information are present. Furthermore, the language and character set field delimiters MUST be present in the first segment even when those fields are left blank.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
