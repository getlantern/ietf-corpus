document: rfc-7286
kind: interoperability-note
summary: VPN connections typically lack DHCP, so users must enter the DNS domain name manually. For good optimization, the domain name should correspond to the VPN concentrator's network location, not the user's physical location; similar considerations apply to Mobile IP.
section: "4.2"
topics:
