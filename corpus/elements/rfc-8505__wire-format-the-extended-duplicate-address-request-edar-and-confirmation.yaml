document: rfc-8505
kind: wire-format
summary: The Extended Duplicate Address Request (EDAR) and Confirmation (EDAC) messages split the ICMP Code into a 4-bit Code Prefix (MUST be 0) and 4-bit Code Suffix; Code Suffix values 1–4 indicate 64-, 128-, 192-, or 256-bit ROVR sizes, respectively. A TID field replaces the Reserved field, and a variable-length ROVR and Registered Address follow.
