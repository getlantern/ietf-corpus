document: rfc-2652
kind: normative-requirement
summary: Implementors must use the exact response codes defined in Appendix B; undefined codes should be interpreted as fatal protocol errors. Instead of defining new codes for unforeseen situations, implementors must adapt one of the given codes and attach an alternative comment.
section: Appendix B
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
