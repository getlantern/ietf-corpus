document: rfc-6791
kind: normative-requirement
summary: If a pool of public IPv4 addresses is configured on the translator, it is RECOMMENDED to randomly select the IPv4 source address from the pool to reduce the probability of erroneously presenting the appearance of a routing loop in traceroute.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - v6ops
    - nat
