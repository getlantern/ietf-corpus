document: rfc-3270
kind: normative-requirement
summary: The Uniform Model for Diff-Serv over MPLS MAY be supported. In this model each packet carries exactly one meaningful piece of Diff-Serv information, always encoded in the outermost label entry, making MPLS entirely transparent to Diff-Serv operations and allowing LSPs to cross domain boundaries without additional treatment.
section: 2.6.3
rfc2119_level: MAY
topics:
    - mpls
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
