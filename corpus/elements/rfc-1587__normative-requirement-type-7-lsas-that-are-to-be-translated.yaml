document: rfc-1587
kind: normative-requirement
summary: Type-7 LSAs that are to be translated into type-5 LSAs must have their forwarding address set to a non-zero value. The forwarding address should be the next-hop address if the intervening network is advertised into OSPF as an internal route; otherwise it should be any active OSPF interface address of the originating router.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
