document: rfc-8489
kind: protocol-element
summary: The short-term credential mechanism uses a pre-exchanged username/password (obtained out-of-band, e.g., via ICE signaling). The HMAC key is OpaqueString(password). Requests and responses MUST include USERNAME and MESSAGE-INTEGRITY-SHA256 (plus MESSAGE-INTEGRITY) unless an external mechanism restricts the choice to one integrity attribute.
section: "9.1"
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
