document: rfc-4875
kind: normative-requirement
summary: All LSRs MUST process the ERO for the first S2L sub-LSP if present; if any SEROs are present an ERO MUST also be present. A branch LSR MUST only propagate the relevant S2L sub-LSP descriptors to each downstream hop, and MUST NOT include descriptors routed via other outgoing interfaces.
section: 5.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
