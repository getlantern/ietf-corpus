document: rfc-8342
kind: interoperability-note
summary: This document updates RFC 7950 (YANG 1.1) by refining the accessible tree for XPath contexts (Section 6.1) and the invocation context of actions/RPCs (Section 6.2). XPath expressions on system state nodes now have access to all operational state, not just the configuration tree.
section: "6.1"
topics:
    - netconf
    - yang
