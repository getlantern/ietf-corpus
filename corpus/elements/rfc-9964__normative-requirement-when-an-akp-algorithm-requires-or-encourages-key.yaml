document: rfc-9964
kind: normative-requirement
summary: When an AKP algorithm requires or encourages key validation, all algorithm-related key parameters MUST be validated. For ML-DSA, the seed length check MUST be performed (256 bits / 32 bytes).
section: "7.3"
