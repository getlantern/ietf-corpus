document: rfc-1889
kind: protocol-element
summary: The CSRC (contributing source) list, inserted by RTP mixers, contains up to 15 SSRC identifiers (32 bits each) of sources that contributed to the packet payload, enabling correct talker indication at receivers even though all packets carry the mixer's own SSRC.
