document: rfc-6826
kind: protocol-element
summary: Each IP multicast tree is mapped one-to-one to a P2MP or MP2MP LSP in the MPLS network. Operators should expect as many LSPs as there are IP multicast trees, and must monitor scalability of both PIM and mLDP state.
section: "1"
topics:
    - mpls
    - multicast
    - routing
