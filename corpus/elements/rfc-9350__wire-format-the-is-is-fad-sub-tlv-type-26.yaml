document: rfc-9350
kind: wire-format
summary: The IS-IS FAD sub-TLV (Type 26) is a sub-TLV of IS-IS Router CAPABILITY TLV-242. Its fixed portion encodes Flex-Algorithm (1 octet, 128-255), Metric-Type (1 octet), Calc-Type (1 octet, 0-127), and Priority (1 octet), followed by optional sub-TLVs. The Router Capability TLV carrying it MUST have the S bit clear to prevent flooding outside the originating level.
section: "5.1"
topics:
    - routing
