document: rfc-3659
kind: protocol-element
summary: 'MLSx standard facts are: size (octets), modify (last modification time-val), create (creation time-val), type (file/cdir/pdir/dir/OS-specific), unique (opaque identifier stable for the control connection lifetime), perm (access rights), lang, media-type, and charset. Fact names are case-insensitive.'
