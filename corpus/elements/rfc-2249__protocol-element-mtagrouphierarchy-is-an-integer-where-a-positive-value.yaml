document: rfc-2249
kind: protocol-element
summary: mtaGroupHierarchy is an INTEGER where a positive value names a parent group's mtaGroupIndex (this group's variables are a subset of that group), a negative value indicates a group-collection code (groups sharing a negative value form one breakdown of MTA activity), and zero means hierarchy is not implemented.
