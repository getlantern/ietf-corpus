document: rfc-2935
kind: normative-requirement
summary: Subsequent IOTP messages (XML documents) MUST be sent using the HTTP POST method. The HTTP client MUST perform full HTTP POST requests to the URIs specified in the Net Locations of IOTP messages.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
