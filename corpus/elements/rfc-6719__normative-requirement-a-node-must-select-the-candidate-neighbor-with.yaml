document: rfc-6719
kind: normative-requirement
summary: 'A node MUST select the candidate neighbor with the lowest path cost as its preferred parent, except: it MAY continue using the current preferred parent if the minimum available path cost is not smaller than cur_min_path_cost by at least PARENT_SWITCH_THRESHOLD (the hysteresis condition).'
section: 3.2.2
rfc2119_level: MUST
topics:
    - routing
