document: rfc-9301
kind: wire-format
summary: The Map-Register message (Type=3) includes flags P, S, I, E, T, a, M; an 8-octet incrementing Nonce; Key ID (8-bit); Algorithm ID (8-bit); variable-length Authentication Data; and one or more EID Records. When the I-bit is set, a 128-bit xTR-ID and 64-bit Site-ID are appended after the final Record.
section: "5.6"
topics:
