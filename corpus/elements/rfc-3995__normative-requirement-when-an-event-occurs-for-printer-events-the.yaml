document: rfc-3995
kind: normative-requirement
summary: When an Event occurs, for Printer Events the Printer MUST generate an Event Notification for every Per-Printer and Per-Job Subscription Object whose 'notify-events' attribute matches (by equality or super-value). For Job Events, the Printer MUST generate notifications for Per-Printer subscriptions and Per-Job subscriptions associated with the triggering Job, but MUST NOT notify Per-Job subscriptions associated with other Jobs.
section: 5.3.3.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
