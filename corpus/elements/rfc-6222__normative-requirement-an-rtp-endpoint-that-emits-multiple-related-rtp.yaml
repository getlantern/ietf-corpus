document: rfc-6222
kind: normative-requirement
summary: An RTP endpoint that emits multiple related RTP streams requiring synchronization MUST use the same RTCP CNAME for all streams to be synchronized. This applies, for example, to lip-sync of audio and video streams in a multimedia session.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
