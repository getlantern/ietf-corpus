document: rfc-9835
kind: protocol-element
summary: OSPF support includes 'area-id' (dotted-quad), 'address-family', 'sham-links' (for backdoor link scenarios per RFC 4577/RFC 6565), 'max-lsa', 'passive' mode, and authentication. Authentication covers both OSPFv2 (RFC 5709, RFC 7474) and OSPFv3 (RFC 7166); RFC 4552 IPsec-based authentication is explicitly not supported.
section: 5.6.3
topics:
