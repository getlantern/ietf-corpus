document: rfc-9580
kind: security-consideration
summary: Implementations must avoid leaking information from PKCS#1 decoding errors during RSA session key decryption. Timing or error-type side channels create a Bleichenbacher-style oracle that enables plaintext recovery of the session key.
section: "13.5"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
