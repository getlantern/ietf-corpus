document: rfc-2925
kind: protocol-element
summary: 'DISMAN-NSLOOKUP-MIB provides remote DNS resolution: setting lookupCtlTargetAddressType to dns(16) invokes gethostbyname() to resolve a symbolic name to addresses; ipv4(1) or ipv6(2) invokes gethostbyaddr() to resolve a numeric address to symbolic names. Multiple results per query are stored in lookupResultsTable with sequential index values.'
section: "3.3"
topics:
    - snmp
    - dns
