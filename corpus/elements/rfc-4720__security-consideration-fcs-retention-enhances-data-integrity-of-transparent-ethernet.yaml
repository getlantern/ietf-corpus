document: rfc-4720
kind: security-consideration
summary: FCS retention enhances data integrity of transparent Ethernet, Frame Relay, and HDLC pseudowires by including the original CE-generated FCS in the encapsulation. When the payload passes FCS checking at the destination CE, it confirms the payload was not altered during network transit. The cost is two to four additional octets per payload packet.
section: "5"
topics:
