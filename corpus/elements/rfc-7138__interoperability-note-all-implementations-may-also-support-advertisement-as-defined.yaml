document: rfc-7138
kind: interoperability-note
summary: All implementations MAY also support advertisement as defined in RFC 4203. When nodes support both methods, implementations MUST support configuration of which advertisement method is followed, enabling nodes following each method to identify compatible peers for path computation.
section: "7"
rfc2119_level: MUST
