document: rfc-5365
kind: security-consideration
summary: If the instant message content must remain private, the UAC SHOULD use S/MIME (RFC 3851) to encrypt the message body with a content encryption key, and SHOULD encrypt that key with each receiver's public key and attach it to the MESSAGE request.
