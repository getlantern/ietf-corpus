document: rfc-3670
kind: protocol-element
summary: PacketSchedulingService and NonWorkConservingSchedulingService model packet scheduling. Successor schedulers are chained via NextScheduler (work-conserving) or FailNextScheduler (invoked only on a declined scheduling opportunity). SchedulingElement subclasses—AllocationSchedulingElement, WRRSchedulingElement, PrioritySchedulingElement, BoundedPrioritySchedulingElement—carry per-queue or per-scheduler parameters.
section: 4.3.21
topics:
