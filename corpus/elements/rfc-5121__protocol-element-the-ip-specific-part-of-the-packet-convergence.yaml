document: rfc-5121
kind: protocol-element
summary: The IP-specific part of the Packet Convergence Sublayer (IP CS) is the mechanism by which IPv6 packets are transported directly over the IEEE 802.16 MAC. The Packet CS classifiers differentiate IPv4 and IPv6 packets and map them to specific transport connections identified by a Connection Identifier (CID).
