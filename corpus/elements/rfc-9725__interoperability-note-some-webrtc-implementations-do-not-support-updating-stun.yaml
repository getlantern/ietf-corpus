document: rfc-9725
kind: interoperability-note
summary: Some WebRTC implementations do not support updating STUN/TURN configuration after the local offer is created. To accommodate these clients, the WHIP endpoint MAY include STUN/TURN configuration in OPTIONS responses before the POST, though this is NOT RECOMMENDED for WHIP clients to rely upon.
section: "4.6"
topics:
    - webrtc
    - realtime
