document: rfc-8512
kind: protocol-element
summary: 'Two YANG notifications are defined: nat-pool-event (carries instance id, policy-id, pool-id, notify-pool-threshold percent) triggers on per-pool address utilization crossing high- or low-threshold; nat-instance-event (carries instance id, notify-subscribers-threshold uint32, notify-addresses-threshold percent, notify-ports-threshold percent) triggers on instance-wide resource thresholds. Both support rate-limiting via notify-interval (minimum seconds between successive notifications).'
section: "2.9"
topics:
    - nat
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
