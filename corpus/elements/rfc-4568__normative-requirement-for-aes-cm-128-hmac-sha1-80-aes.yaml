document: rfc-4568
kind: normative-requirement
summary: For AES_CM_128_HMAC_SHA1_80, AES_CM_128_HMAC_SHA1_32, and F8_128_HMAC_SHA1_80, the length of the base64-decoded key and salt value MUST be 30 octets (240 bits); otherwise the crypto attribute is considered invalid.
section: 6.2.1
rfc2119_level: MUST
