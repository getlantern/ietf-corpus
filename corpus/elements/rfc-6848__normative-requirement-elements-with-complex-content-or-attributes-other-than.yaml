document: rfc-6848
kind: normative-requirement
summary: Elements with complex content or attributes other than namespace bindings and 'xml:lang' MUST be ignored if they are not understood during XML-to-DHCP conversion. Only elements with textual content and an optional xml:lang attribute can be carried in CAtype 40.
section: "3.2"
rfc2119_level: MUST
topics:
    - registry
