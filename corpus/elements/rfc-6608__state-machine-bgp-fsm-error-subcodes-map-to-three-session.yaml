document: rfc-6608
kind: state-machine
summary: 'BGP FSM error subcodes map to three session states where unexpected messages may be received: OpenSent (subcode 1), OpenConfirm (subcode 2), and Established (subcode 3). Receipt of an unexpected message in any of these states triggers a NOTIFICATION and session teardown.'
