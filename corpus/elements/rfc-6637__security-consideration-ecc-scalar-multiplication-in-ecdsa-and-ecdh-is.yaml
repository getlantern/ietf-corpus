document: rfc-6637
kind: security-consideration
summary: ECC scalar multiplication in ECDSA and ECDH is vulnerable to side channel attacks when the application can be modeled as a decryption or signing oracle (e.g., a network service). Countermeasures include limiting failure counts, time-blinding operations, and eliminating measurable distinctions between EC point addition and doubling.
section: "13"
topics:
    - security
    - crypto
