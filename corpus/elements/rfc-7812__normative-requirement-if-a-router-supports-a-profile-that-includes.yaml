document: rfc-7812
kind: normative-requirement
summary: If a router supports a profile that includes MRT LDP Label Option 1A for MRT transit forwarding, it MUST support Option 1A (topology-scoped FECs using a single label). The router MAY also support Option 1B.
section: 6.1.1.4
rfc2119_level: MUST
topics:
