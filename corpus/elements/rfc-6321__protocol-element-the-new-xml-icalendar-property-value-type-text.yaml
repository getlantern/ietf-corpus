document: rfc-6321
kind: protocol-element
summary: The new XML iCalendar property (value type TEXT or BINARY) embeds a single XML 1.0 element from a foreign namespace into iCalendar. The XML property MUST NOT contain elements already defined in iCalendar or in the urn:ietf:params:xml:ns:icalendar-2.0 namespace. The embedded XML element MUST have an XML namespace declaration.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
