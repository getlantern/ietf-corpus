document: rfc-7153
kind: design-rationale
summary: IPv6-Address-Specific Extended Community sub-type codepoints were historically suggested to match IPv4-Address-Specific sub-types, but actual IANA allocations did not always match. RFC 7153 resolves this by creating independent IPv6-specific registries decoupled from the IPv4 registries.
section: "3"
topics:
    - bgp
    - routing
    - registry
