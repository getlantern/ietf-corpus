summary: 'All typedefs in the module extend the ''binary'' YANG base type and encode ASN.1 structures using DER (ITU-T X.690). Specific typedefs include: x509 (RFC 5280 Certificate), crl (RFC 5280 CertificateList), p10-csr (RFC 2986 CertificationRequest), csr-info (RFC 2986 CertificationRequestInfo), and CMS content types (cms, signed-data-cms, enveloped-data-cms, encrypted-data-cms, authenticated-data-cms).'
