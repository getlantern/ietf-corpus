document: rfc-3033
kind: registry
summary: IANA assignment registry for the Internet protocol/application identifier field in the Q.2957 User-user IE when the Protocol discriminator is Internet protocol/application (0x06). Values 0x03-0xFD are reserved for IANA assignment via IETF Consensus action per BCP 26.
