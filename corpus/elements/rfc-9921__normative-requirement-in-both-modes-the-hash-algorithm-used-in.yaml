document: rfc-9921
kind: normative-requirement
summary: In both modes, the hash algorithm used in the MessageImprint SHOULD be the same as the algorithm used for signing the COSE message, to minimize dependencies. An exception is permitted when the TST is obtained outside the COSE assembly context or when the timestamp requester and COSE signer are different entities.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - crypto
    - cbor
