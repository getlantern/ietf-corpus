summary: The 'sensor-value' typedef is int32 in the range -1000000000 to +1000000000. The extreme values -1000000000 and +1000000000 indicate underflow and overflow errors, respectively; interpretation depends on the associated sensor-value-type, sensor-value-scale, and sensor-value-precision nodes.
