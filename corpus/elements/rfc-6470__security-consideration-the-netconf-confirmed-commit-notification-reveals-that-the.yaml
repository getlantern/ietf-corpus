document: rfc-6470
kind: security-consideration
summary: The netconf-confirmed-commit notification reveals that the <running> datastore may be changing or has changed; the 'timeout' leaf discloses when a future automatic revert to an older configuration will occur, which could be exploited by an attacker timing an attack to coincide with that revert.
section: "4"
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
