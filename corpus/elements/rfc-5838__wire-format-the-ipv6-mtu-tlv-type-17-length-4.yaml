document: rfc-5838
kind: wire-format
summary: The IPv6 MTU TLV (type 17, length 4 bytes) is carried optionally in the LLS block. It conveys the interface's IPv6 MTU as a 32-bit value and is used when the M6-bit is set. Only one instance of this TLV MAY appear in the LLS block.
section: "2.7"
topics:
    - routing
