document: rfc-3893
kind: security-consideration
summary: Encryption of AIBs relies on secure distribution of a shared decryption key; the security of the AIB is therefore predicated on key distribution integrity, and widespread key sharing may only be appropriate in federated trust environments such as telephone networks.
