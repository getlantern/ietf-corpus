document: rfc-9520
kind: normative-requirement
summary: A resolver MUST NOT retry a given query to a server address over a given DNS transport more than twice (three queries total) before considering the server address unresponsive over that transport for that query.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - dns
