document: rfc-8306
kind: registry
summary: 'This document updates nine IANA PCEP registries (originally allocated by RFC 6006): PCEP TLV Type Indicators (value 6, P2MP capable), RP Object Flag Field (bits 18-20), Objective Function codes (7 SPT, 8 MCT), METRIC Object T Field (8-10), PCEP Objects (END-POINTS types 3-4; Object-Classes 28 UNREACH-DESTINATION, 29 SERO, 30 SRRO, 31 BNC), PCEP-ERROR types (5/7, 16, 17, 18), NO-PATH-VECTOR TLV Flag Field (bit 24), SVEC Object Flag Field (bits 19-20), and OSPF PCE Capability Flags (bit 10).'
