document: rfc-9843
kind: design-rationale
summary: Bandwidth constraints for Flex-Algorithm are preferred over administrative groups for bandwidth-variable links (e.g., LAGs) because LAG bandwidth changes dynamically with Layer 2 link failures. A direct FAEMB constraint provides a single centralized control point instead of requiring implementations to automatically vary admin groups based on bandwidth.
