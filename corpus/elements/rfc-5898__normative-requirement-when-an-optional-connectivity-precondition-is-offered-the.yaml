document: rfc-5898
kind: normative-requirement
summary: When an optional connectivity precondition is offered, the answerer MUST generate its answer SDP as soon as possible. If the answerer wants to delay session progress until connectivity is verified, it MUST upgrade the strength to "mandatory" in the answer.
section: "3.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
