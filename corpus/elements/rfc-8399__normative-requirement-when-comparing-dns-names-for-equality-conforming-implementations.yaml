document: rfc-8399
kind: normative-requirement
summary: When comparing DNS names for equality, conforming implementations MUST perform a case-insensitive exact match on the entire DNS name. When evaluating name constraints, conforming implementations MUST perform a case-insensitive exact match on a label-by-label basis.
section: "2.3"
rfc2119_level: MUST
topics:
    - pkix
    - dns
    - security
