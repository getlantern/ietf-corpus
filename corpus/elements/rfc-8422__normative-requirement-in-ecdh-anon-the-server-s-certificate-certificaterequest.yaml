document: rfc-8422
kind: normative-requirement
summary: In ECDH_anon, the server's Certificate, CertificateRequest, client's Certificate, and CertificateVerify messages MUST NOT be sent. The server MUST send an ephemeral ECDH public key in ServerKeyExchange, and these parameters MUST NOT be signed.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - tls
    - crypto
