document: rfc-2878
kind: protocol-element
summary: The Management-Inline Configuration Option (Type 9, Length 2) signals willingness to receive IEEE-defined inter-bridge protocols (BPDUs, GARP PDUs) inline in the normal bridged frame format (sections 4.2/4.3), replacing the old RFC 1638 out-of-band BPDU mechanism. Its rejection by a peer indicates an RFC 1638-only implementation.
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
