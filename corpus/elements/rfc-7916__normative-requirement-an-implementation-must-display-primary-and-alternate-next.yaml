document: rfc-7916
kind: normative-requirement
summary: An implementation MUST display primary and alternate next-hop information for every prefix, MUST provide coverage information per LFA activation domain, and MUST provide counts of protected and non-protected prefixes globally. It SHOULD also provide per-link counts and reasons for alternate selection or exclusion.
section: "7.3"
rfc2119_level: MUST
topics:
    - routing
