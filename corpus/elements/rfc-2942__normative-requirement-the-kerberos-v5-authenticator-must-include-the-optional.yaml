document: rfc-2942
kind: normative-requirement
summary: The Kerberos V5 authenticator must include the optional subkey field filled in with a randomly chosen key. This key shall be used for encryption if encryption is negotiated, and shall serve as the negotiated session key (keyid 0) for the telnet encryption option.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
