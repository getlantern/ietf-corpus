document: rfc-1647
kind: normative-requirement
summary: TN3270E clients that support the SYSREQ function MUST map a key or key combination to the 3270 SYSREQ key and transmit a Telnet AO command upon that keypress. Servers that agreed to SYSREQ MUST enter 'suspended mode' on receipt of AO, responding to host data with SNA sense code 0x082D ('LU Busy') and restricting DATA-TYPE to SSCP-LU-DATA.
section: 10.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
