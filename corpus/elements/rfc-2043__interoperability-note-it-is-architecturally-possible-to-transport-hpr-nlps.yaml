document: rfc-2043
kind: interoperability-note
summary: It is architecturally possible to transport HPR NLPs over LLC over PPP using PPP Protocol field type hex 004B (SNA over LLC 802.2) if the optional HPR link-level error recovery tower is included in the implementation. This is an alternative to using the dedicated 0x004D type.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
