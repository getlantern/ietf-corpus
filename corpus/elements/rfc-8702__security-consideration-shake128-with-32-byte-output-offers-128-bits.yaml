document: rfc-8702
kind: security-consideration
summary: SHAKE128 with 32-byte output offers 128 bits of collision and preimage resistance; its OIDs are RECOMMENDED with 2048-bit (112-bit security) or 3072-bit (128-bit security) RSA moduli or 256-bit group order curves. SHAKE256 with 64-byte output offers 256 bits of resistance; its OIDs are RECOMMENDED with 4096-bit RSA or curves with at least 512-bit group order (e.g., NIST P-521).
section: "5"
topics:
    - crypto
    - security
