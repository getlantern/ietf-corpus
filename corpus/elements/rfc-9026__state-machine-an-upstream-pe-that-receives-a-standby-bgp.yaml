document: rfc-9026
kind: state-machine
summary: 'An Upstream PE that receives a Standby BGP C-multicast route operates in one of three modes: ''cold root standby'' (takes no preemptive action), ''warm root standby'' (installs VRF PIM state but does not forward on P-tunnel), or ''hot root standby'' (installs state and forwards traffic on P-tunnel regardless of primary PE reachability).'
section: "4.2"
topics:
    - vpn
    - multicast
    - routing
