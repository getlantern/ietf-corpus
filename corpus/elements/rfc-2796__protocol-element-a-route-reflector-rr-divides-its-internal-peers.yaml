document: rfc-2796
kind: protocol-element
summary: 'A Route Reflector (RR) divides its internal peers into two groups: Client Peers and Non-Client Peers. A RR along with its client peers forms a Cluster. Non-Client peers must be fully meshed, but Client peers need not be.'
