document: rfc-7112
kind: protocol-element
summary: The IPv6 Header Chain contains an initial IPv6 header, zero or more IPv6 Extension Headers, and optionally a single Upper-Layer Header. It is terminated by the Upper-Layer Header or by the 'No Next Header' value (Next Header = 59). A second IPv6 header or an ESP header encountered in the chain is treated as an Upper-Layer Header and terminates the chain.
section: "3"
topics:
