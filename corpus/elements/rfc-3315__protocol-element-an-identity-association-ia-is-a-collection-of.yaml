document: rfc-3315
kind: protocol-element
summary: An Identity Association (IA) is a collection of addresses grouped under an IAID chosen by the client. IA_NA holds non-temporary addresses and IA_TA holds temporary addresses. Each IA must be associated with exactly one interface, and a binding is indexed by the tuple <DUID, IA-type, IAID>.
