document: rfc-5288
kind: normative-requirement
summary: These cipher suites MUST NOT be negotiated in older versions of TLS; clients MUST NOT offer them if they do not offer TLS 1.2 or later, and servers that select an earlier version MUST NOT select one of these cipher suites.
section: "4"
rfc2119_level: MUST NOT
