document: rfc-9354
kind: normative-requirement
summary: If DHCPv6 is used to assign addresses or the IPv6 address is derived from a unique long or short link-layer address, Duplicate Address Detection (DAD) SHOULD NOT be utilized. Otherwise, DAD MUST be performed at the 6LBR or proxied by the routing registrar.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
