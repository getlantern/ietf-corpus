document: rfc-3031
kind: interoperability-note
summary: ATM switches participating in MPLS may perform VC merge (buffer cells until AAL5 EOF), VP merge (using SVP Multipoint Encoding to distinguish cell sources by VCI within a VP), or no merge. Adjacent ATM-LSRs on the same level-m LSP segment MUST use the same encoding technique because ATM switches cannot translate between encoding schemes.
section: 3.26.3
topics:
    - routing
