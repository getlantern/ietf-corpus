document: rfc-3731
kind: normative-requirement
summary: Transform commands (other than a transfer approve/reject/cancel) MUST be rejected when a pendingCreate, pendingDelete, pendingRenew, pendingTransfer, or pendingUpdate status is set. When the action completes, the pending status MUST be removed and all involved clients MUST be notified via a service message.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
