document: rfc-9866
kind: state-machine
summary: 'RNFD defines four node states: UP (root alive), SUSPECTED DOWN (Sentinel suspects crash, Sentinel-only), LOCALLY DOWN (Sentinel has confirmed suspicion, Sentinel-only), and GLOBALLY DOWN (consensus reached, all nodes). GLOBALLY DOWN is terminal until the node joins a new DODAG Version, at which point transition 5 fires.'
section: "3.1"
topics:
