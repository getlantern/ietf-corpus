document: rfc-6173
kind: interoperability-note
summary: Shortly after an iFCP session entry is created, it corresponds to an entry in the TCP-MIB tcpConnectionTable (RFC 4022), and optionally to RFC 2012's tcpConnTable for IPv4. The address type fields in both tables must match to simplify cross-table lookups.
