document: rfc-2830
kind: normative-requirement
summary: When a Start TLS extended request is made, the server MUST return an LDAP PDU containing a Start TLS extended response, and that response MUST contain a responseName set to the same OID as in the request.
section: "2.1"
rfc2119_level: MUST
topics:
