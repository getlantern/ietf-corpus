document: rfc-8795
kind: design-rationale
summary: Attributes directly under the 'connectivity-matrices' container serve as defaults for all connectivity matrix entries when per-entry attributes are not specified; per-entry attributes override container-level defaults. The same rule applies to 'local-link-connectivities'. This reduces redundant configuration for topologies with mostly uniform attributes.
section: "5.6"
topics:
    - yang
    - netconf
