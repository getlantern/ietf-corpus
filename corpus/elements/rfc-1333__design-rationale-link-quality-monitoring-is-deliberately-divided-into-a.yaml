document: rfc-1333
kind: design-rationale
summary: Link Quality Monitoring is deliberately divided into a 'mechanism' (fully specified by PPP via LQR packets and procedures) and a 'policy' (how to judge quality and react, left to each implementation). This separation allows two implementations with different policies to interoperate.
