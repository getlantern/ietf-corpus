document: rfc-9459
kind: security-consideration
summary: 'Data forgery is trivial with AES-CTR: an attacker who knows a plaintext block can XOR the corresponding ciphertext block with any desired replacement plaintext, and decryption will yield the attacker''s chosen plaintext. This makes a companion authentication mechanism mandatory.'
