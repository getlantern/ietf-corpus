document: rfc-1928
kind: normative-requirement
summary: A UDP association terminates when the TCP connection on which the UDP ASSOCIATE request arrived terminates. The lifetime of UDP associations is tied to the control TCP connection.
section: "6"
rfc2119_level: MUST
topics:
