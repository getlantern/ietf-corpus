document: rfc-6006
kind: interoperability-note
summary: If a PCE does not understand the P2MP N-bit in the RP object (back-level implementation), it MUST send a PCErr with Error-Value=2 (capability not supported) and SHOULD reject the request. The request message format preserves backward compatibility with RFC 5440.
section: "3.8"
topics:
    - mpls
    - routing
