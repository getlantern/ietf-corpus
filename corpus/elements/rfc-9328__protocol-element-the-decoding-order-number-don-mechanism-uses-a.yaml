document: rfc-9328
kind: protocol-element
summary: The Decoding Order Number (DON) mechanism uses a 16-bit DONL field and derives an absolute decoding order number AbsDon per NAL unit using modular arithmetic on the 16-bit DON values. AbsDon enables receivers to reorder NAL units from transmission order to decoding order when sprop-max-don-diff > 0.
section: "4.4"
topics:
    - rtp
    - realtime
