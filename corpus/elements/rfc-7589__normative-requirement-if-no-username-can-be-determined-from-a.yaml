document: rfc-7589
kind: normative-requirement
summary: If no username can be determined from a list entry or the derived username does not comply with NETCONF username requirements, additional list entries MUST be searched. If no further entries exist, the TLS session MUST be terminated.
section: "7"
rfc2119_level: MUST
topics:
