document: rfc-6014
kind: security-consideration
summary: An algorithm described in a non-Standards-Track RFC may have weaker security than one on the Standards Track—that may be why it was excluded from Standards Track. However, not being on the Standards Track does not necessarily mean an algorithm is weak; intellectual property concerns can keep strong algorithms off Standards Track.
section: "5"
topics:
    - dns
    - crypto
    - security
