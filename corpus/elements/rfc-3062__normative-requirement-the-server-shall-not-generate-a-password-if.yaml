document: rfc-3062
kind: normative-requirement
summary: The server SHALL NOT generate a password if the client has provided a newPasswd. Without a client-provided newPasswd, the server SHALL either generate a password or return a non-success result code, and MUST provide the generated password as genPasswd upon success.
section: "3"
rfc2119_level: SHALL NOT
topics:
    - ldap
