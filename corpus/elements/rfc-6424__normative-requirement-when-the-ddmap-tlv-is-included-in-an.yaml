document: rfc-6424
kind: normative-requirement
summary: When the DDMAP TLV is included in an echo reply, the Label Stack sub-TLV MUST be included. The label value MUST be the value used to switch data traffic, and MUST NOT reflect a hidden tunnel if the data-plane trace would not expire inside it.
section: 3.3.1.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
