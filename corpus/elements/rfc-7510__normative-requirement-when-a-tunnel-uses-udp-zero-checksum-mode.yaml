document: rfc-7510
kind: normative-requirement
summary: When a tunnel uses UDP zero-checksum mode with IPv6, the tunnel decapsulator MUST verify that the source and destination IPv6 addresses are valid for that tunnel and MUST discard any packet failing this check.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - ip
    - security
