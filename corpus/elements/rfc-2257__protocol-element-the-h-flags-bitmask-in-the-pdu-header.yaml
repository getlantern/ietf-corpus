document: rfc-2257
kind: protocol-element
summary: 'The h.flags bitmask in the PDU header defines: INSTANCE_REGISTRATION (bit 0), NEW_INDEX (bit 1), ANY_INDEX (bit 2), NON_DEFAULT_CONTEXT (bit 3), NETWORK_BYTE_ORDER (bit 4). The NETWORK_BYTE_ORDER bit applies to all multi-byte integer values in the entire AgentX packet including remaining header fields.'
section: "6.1"
topics:
