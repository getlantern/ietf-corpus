document: rfc-4951
kind: normative-requirement
summary: If the recovery endpoint did not receive the Suggested Control Sequence (SCS) AVP in the SCCRP, it MUST reset Ns and Nr values to zero. If the remote endpoint chose not to send the SCS AVP, it MUST also reset its Ns and Nr values to zero on the recovered tunnel.
section: 3.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
