document: rfc-6675
kind: normative-requirement
summary: 'When entering fast retransmit and loss recovery: ssthresh = cwnd = FlightSize / 2, per RFC 5681. Segments sent via Limited Transmit MUST NOT be counted in FlightSize for this calculation.'
section: "5"
rfc2119_level: MUST
