document: rfc-9231
kind: security-consideration
summary: MD5 (as DigestMethod) and HMAC-MD5 and RSA-MD5 are defined with URI identifiers but RFC 6151 documents MD5 security considerations that implementers must consult. The document specifies URIs without endorsing the algorithms for any particular purpose.
section: 2.1.1
topics:
    - crypto
    - security
