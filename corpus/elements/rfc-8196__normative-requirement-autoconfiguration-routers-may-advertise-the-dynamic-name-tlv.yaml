document: rfc-8196
kind: normative-requirement
summary: Autoconfiguration routers MAY advertise the Dynamic Name TLV (TLV 137). To help guarantee hostname uniqueness, the System ID SHOULD be appended as a suffix to the advertised hostname.
section: 3.5.3
