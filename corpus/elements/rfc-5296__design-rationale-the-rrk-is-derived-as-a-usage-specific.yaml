document: rfc-5296
kind: design-rationale
summary: The rRK is derived as a Usage-Specific Root Key (USRK) from the EMSK, or as a Domain-Specific USRK (DSUSRK) from a DSRK for local ER servers. This dual derivation path allows a single prior EAP exchange to bootstrap both home-domain and visited-domain re-authentication while keeping each domain's keys cryptographically isolated.
section: "4.1"
topics:
