summary: 'Characters commonly mapped to nothing (deleted from input) include: SOFT HYPHEN (00AD), ZERO WIDTH SPACE (200B), WORD JOINER (2060), ZERO WIDTH NO-BREAK SPACE (FEFF), COMBINING GRAPHEME JOINER (034F), ZERO WIDTH NON-JOINER (200C), ZERO WIDTH JOINER (200D), and Variation Selectors FE00–FE0F. These are listed in Table B.1.'
