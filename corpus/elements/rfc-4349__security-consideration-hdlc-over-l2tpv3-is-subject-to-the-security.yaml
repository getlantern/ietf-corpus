document: rfc-4349
kind: security-consideration
summary: HDLC over L2TPv3 is subject to the security considerations defined in RFC 3931. There are no additional considerations specific to carrying HDLC beyond those for other data link types. IPsec (per Section 4.1.3 of RFC 3931) can be used for payload integrity checking transparency.
section: "6"
topics:
    - vpn
    - security
    - ipsec
