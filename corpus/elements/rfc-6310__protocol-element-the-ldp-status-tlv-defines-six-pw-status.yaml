document: rfc-6310
kind: protocol-element
summary: 'The LDP Status TLV defines six PW status code points: 0x00000000 (clear all failures), 0x00000001 (PW Not Forwarding), 0x00000002 (AC ingress Receive Fault), 0x00000004 (AC egress Transmit Fault), 0x00000008 (PSN-facing PW ingress Receive Fault), 0x00000010 (PSN-facing PW egress Transmit Fault). Forward defect indication maps to the logical OR of codes 0x00000002, 0x00000010, and 0x00000001; reverse defect indication maps to the logical OR of 0x00000004 and 0x00000008.'
section: 6.1.1
topics:
    - mpls
