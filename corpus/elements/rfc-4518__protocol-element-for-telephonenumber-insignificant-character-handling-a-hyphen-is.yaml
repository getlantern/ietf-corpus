document: rfc-4518
kind: protocol-element
summary: For telephoneNumber insignificant character handling, a hyphen is defined as one of HYPHEN-MINUS (U+002D), ARMENIAN HYPHEN (U+058A), HYPHEN (U+2010), NON-BREAKING HYPHEN (U+2011), MINUS SIGN (U+2212), SMALL HYPHEN-MINUS (U+FE63), or FULLWIDTH HYPHEN-MINUS (U+FF0D) followed by no combining marks. All hyphens and spaces are considered insignificant and removed.
section: 2.6.3
topics:
