document: rfc-7578
kind: normative-requirement
summary: The RFC 5987 'filename*' parameter encoding MUST NOT be used in the Content-Disposition header field of multipart/form-data parts. File names MAY instead be percent-encoded following the method described in Section 2.
section: "4.2"
rfc2119_level: MUST NOT
