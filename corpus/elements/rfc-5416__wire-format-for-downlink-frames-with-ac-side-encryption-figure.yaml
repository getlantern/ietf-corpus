document: rfc-5416
kind: wire-format
summary: 'For downlink frames with AC-side encryption (Figure 3), MAC header field responsibilities are: AC populates Frame Control (Version, ToDS, FromDS, Type, SubType, Order), Address 1–4, QoS Control, and Frame Body; WTP populates Duration, Sequence Control, and FCS. The FCS field is not transmitted between WTP and AC; the WTP strips it on uplink and computes it on downlink.'
section: 2.2.1
