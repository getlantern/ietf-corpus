document: rfc-9571
kind: wire-format
summary: 'The SFL TLV (RFC 6374 TLV type 4) encodes: Type (8-bit), Length (8-bit per RFC 6374), MBZ (2-bit), SFL Batch (6-bit), SFL Index (8-bit), SFL (20-bit MPLS label + 12-bit Reserved), and FEC encoded per RFC 5036 Section 3.4.1. MBZ and Reserved MUST be sent as zero and ignored on receipt.'
section: "9.1"
