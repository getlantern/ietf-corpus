document: rfc-5663
kind: normative-requirement
summary: A pNFS client MUST NOT perform direct I/O operations on storage that are not permitted by a layout extent currently held by the client. Layout extents are the sole authorization mechanism for client direct storage I/O; this places the pNFS server in control of potentially conflicting storage operations.
section: 2.3.5
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
