document: rfc-5213
kind: normative-requirement
summary: When the sequence-number-based scheme is used, the serving MAG MUST have the ability to obtain the last sequence number sent for that mobility session. The sequence number MUST be maintained on a per-mobility-session basis and MUST be available to the serving MAG.
section: "5.5"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
