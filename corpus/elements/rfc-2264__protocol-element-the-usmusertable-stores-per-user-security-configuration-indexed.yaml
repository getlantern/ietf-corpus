summary: The usmUserTable stores per-user security configuration indexed by (usmUserEngineID, usmUserName), with columns for securityName, cloneFrom pointer, authProtocol, authKeyChange, ownAuthKeyChange, privProtocol, privKeyChange, ownPrivKeyChange, storageType, and rowStatus. authKey and privKey are not accessible via SNMP.
