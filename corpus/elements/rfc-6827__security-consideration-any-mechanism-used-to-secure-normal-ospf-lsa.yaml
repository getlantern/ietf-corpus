document: rfc-6827
kind: security-consideration
summary: Any mechanism used to secure normal OSPF LSA exchanges applies equally to TE LSAs in the ASON context. OSPFv2 cryptographic authentication using HMAC-SHA (RFC 5709) can provide significant protection against active attacks on TE LSA exchanges.
section: "9"
topics:
