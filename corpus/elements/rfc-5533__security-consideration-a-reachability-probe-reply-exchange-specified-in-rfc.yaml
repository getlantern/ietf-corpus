document: rfc-5533
kind: security-consideration
summary: A Reachability Probe+Reply exchange (specified in RFC 5534) MUST be completed before any new locator is used as a destination. This prevents third-party flooding attacks in which an attacker causes a victim's traffic stream to be redirected to an arbitrary address.
section: "4.4"
topics:
    - ip
    - v6ops
    - security
