document: rfc-5296
kind: protocol-element
summary: 'The ER key hierarchy consists of three derived keys: the re-authentication Root Key (rRK) derived from the EMSK or DSRK; the re-authentication Integrity Key (rIK) derived from the rRK for integrity-protecting ERP messages; and per-authenticator re-authentication MSKs (rMSK) derived from the rRK using the sequence number as input.'
section: "4"
