document: rfc-5061
kind: wire-format
summary: The Supported Extensions Parameter (type 0x8008) contains a variable-length list of 1-byte SCTP chunk type codes, padded to a 4-byte boundary. An implementation supporting this extension MUST list ASCONF (0xC1), ASCONF-ACK (0x80), and AUTH chunk types in its INIT and INIT-ACK.
section: 4.2.7
topics:
    - sctp
