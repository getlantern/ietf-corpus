document: rfc-1509
kind: design-rationale
summary: Name comparison is performed on internal-form names via gss_compare_name rather than requiring applications to parse printable name syntax. This decouples applications from the multiple namespace syntaxes a GSSAPI implementation may support and provides a canonical equivalence check.
section: 2.1.10
topics:
    - security
