document: rfc-4710
kind: design-rationale
summary: Static or pseudo-static metrics that do not change during a session (e.g., DA, RA, DN, payload type) are RECOMMENDED to be sent only at session initiation and then at large intervals, rather than in every PDU, to minimize bandwidth consumption on constrained devices.
section: 2.3.2
topics:
