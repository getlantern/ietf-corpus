document: rfc-8081
kind: protocol-element
summary: The font/collection subtype covers font collection files containing multiple fonts, with an optional 'outlines' parameter (TTF, CFF, SVG). File extension is .ttc; the @font-face format identifier is 'collection'. Fragment identifiers (Section 4.2) MUST be used to select individual fonts within the collection.
section: 4.4.4
topics:
    - registry
