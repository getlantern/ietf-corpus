document: rfc-4425
kind: normative-requirement
summary: If 'mode=1' is signaled and a sequence layer header is present in the coded bit stream, then it MUST be identical to the sequence layer header specified by the 'config' media type parameter. If the RTP sender removes the sequence layer header, it MUST ensure the resulting bit stream remains compliant with the VC-1 specification.
section: "4.8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
