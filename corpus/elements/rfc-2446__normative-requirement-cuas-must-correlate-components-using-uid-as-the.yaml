document: rfc-2446
kind: normative-requirement
summary: CUAs must correlate components using UID as the primary key (with RECURRENCE-ID for recurring instances), SEQUENCE as the secondary key (highest numeric value obsoletes lower), and DTSTAMP as the tie-breaker when UID and SEQUENCE match. CUAs MUST persist the UID, RECURRENCE-ID, SEQUENCE, and DTSTAMP properties for each component and for each Attendee's response.
section: 2.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
