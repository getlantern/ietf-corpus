document: rfc-9074
kind: security-consideration
summary: An improperly monitored VALARM can be used to disturb users or leak personal information (e.g., audio alerts causing embarrassment, display alerts as annoyances, or email alerts leaking location or sending unsolicited email). CalDAV clients and servers accepting iCalendar data from third parties SHOULD remove each VALARM before storing it in their calendar system.
section: "9"
topics:
    - security
    - privacy
