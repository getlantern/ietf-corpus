document: rfc-6184
kind: state-machine
summary: 'The de-interleaving receiver operates in two states: initial buffering (entered at RTP session start) and buffering-while-playing (entered after decoding/playback begins). In both states NAL units are stored in reception order with computed DON values; transition to buffering-while-playing is triggered when sufficient initial data is accumulated.'
section: 7.2.2
topics:
    - rtp
    - realtime
