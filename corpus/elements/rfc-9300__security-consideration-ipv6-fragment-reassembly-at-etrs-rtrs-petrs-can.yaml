document: rfc-9300
kind: security-consideration
summary: IPv6 fragment reassembly at ETRs/RTRs/PETRs can be a DoS vector. Implementations should limit the number of fragments awaiting reassembly and the rate at which such fragments are admitted to mitigate this attack.
section: "16"
topics:
