document: rfc-2222
kind: normative-requirement
summary: A protocol profile SHOULD include an optional initial response parameter in the command that initiates authentication, allowing the client to avoid a round trip with mechanisms where the client sends data first. If an initial response is sent but the selected mechanism requires the server to start, the command fails.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
