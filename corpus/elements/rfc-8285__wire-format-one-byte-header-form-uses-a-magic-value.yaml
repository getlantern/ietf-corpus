document: rfc-8285
kind: wire-format
summary: One-byte header form uses a magic value of 0xBEDE in the RTP 'defined by profile' 16-bit field. Each extension element starts with a 1-byte header containing a 4-bit ID (range 1-14) and a 4-bit length field (value is length-minus-one, so 0 means 1 byte of data, 15 means 16 bytes).
section: "4.2"
topics:
