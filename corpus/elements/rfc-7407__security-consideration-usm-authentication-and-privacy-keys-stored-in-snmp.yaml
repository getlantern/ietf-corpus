document: rfc-7407
kind: security-consideration
summary: USM authentication and privacy keys stored in /snmp/usm/local/user and /snmp/usm/remote are sensitive credentials. Implementations must ensure these values are protected by appropriate NETCONF access control (NACM) rules to prevent unauthorized disclosure or modification.
section: "4.10"
topics:
