document: rfc-6422
kind: normative-requirement
summary: Relay agents that implement the RSOO and are configured to disable forwarding of Relay-Forward messages containing RSOOs MUST silently discard any such message, and MUST examine all Relay-Forward encapsulations, not just the outer encapsulation.
section: "5"
rfc2119_level: MUST
topics:
    - security
