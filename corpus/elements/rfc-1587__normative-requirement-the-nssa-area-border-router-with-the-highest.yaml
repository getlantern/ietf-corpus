document: rfc-1587
kind: normative-requirement
summary: The NSSA area border router with the highest router ID among all reachable area border routers in the NSSA is designated as the sole translator of type-7 LSAs into type-5 LSAs. Other area border routers must skip the translation algorithm.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
