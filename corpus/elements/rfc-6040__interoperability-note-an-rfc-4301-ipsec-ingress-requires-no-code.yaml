document: rfc-6040
kind: interoperability-note
summary: An RFC 4301 IPsec ingress requires no code change to comply with this specification — its copy-ECN encapsulation is identical to normal mode. Only the RFC 4301 egress needs updating, and only for previously unused inner/outer combinations; all existing combinations produce identical output, making the update fully backward compatible.
section: "5.1"
topics:
