document: rfc-792
kind: protocol-element
summary: ICMP checksum is the 16-bit one's complement of the one's complement sum of the ICMP message starting with the ICMP Type field. The checksum field is set to zero during computation. For Echo messages with odd total length, the data is padded with one zero octet for checksum computation.
section: Message Formats
