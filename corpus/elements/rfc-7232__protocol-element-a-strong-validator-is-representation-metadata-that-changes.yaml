document: rfc-7232
kind: protocol-element
summary: A 'strong validator' is representation metadata that changes value whenever a change occurs to the representation data that would be observable in the payload body of a 200 (OK) response to GET. Strong validators are unique across all versions of all representations associated with a particular resource over time.
section: "2.1"
topics:
