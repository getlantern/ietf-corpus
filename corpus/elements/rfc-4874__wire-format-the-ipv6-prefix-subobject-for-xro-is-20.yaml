document: rfc-4874
kind: wire-format
summary: 'The IPv6 Prefix subobject for XRO is 20 bytes: 1-bit L flag, 7-bit Type (2), 1-byte Length, 16-byte IPv6 address, 1-byte Prefix Length, and 1-byte Attribute (0=interface, 1=node, 2=SRLG), mirroring the IPv4 subobject semantics.'
