document: rfc-7894
kind: design-rationale
summary: Conveying authentication values as CSR attributes may be preferable to HTTP or TLS-level authentication in environments where the certificate request processing component is separated from the HTTP/TLS termination point (e.g., when a web application firewall is present), motivating inclusion of OTP values in the CSR itself.
