document: rfc-2584
kind: interoperability-note
summary: Deleting an entry from hprIpLsTable (RowStatus destroy(6)) causes the link station to revert to the default TOS Precedence mapping inherited from its port. Similarly, deleting from hprIpCnTable reverts the connection network to per-port defaults.
