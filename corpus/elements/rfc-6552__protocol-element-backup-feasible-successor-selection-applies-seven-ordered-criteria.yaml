document: rfc-6552
kind: protocol-element
summary: 'Backup feasible successor selection applies seven ordered criteria: not the preferred parent, same or subsequent DODAG Version, no higher-Rank same-version router, lesser Rank preferred, implementation-dependent validation preferred, higher-order interface preferred, and currently-in-use successor preferred. These rules MAY be varied by configured policy.'
