document: rfc-3339
kind: interoperability-note
summary: Unqualified local time is deemed unacceptable for the Internet because interpretation fails in approximately 23 out of 24 time zones globally. Any system dependent on time synchronization with Internet systems must qualify its times with a UTC offset.
section: "4.4"
topics:
