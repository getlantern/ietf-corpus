document: rfc-9270
kind: normative-requirement
summary: Resources for the secondary LSP MUST be pre-reserved but not committed at the data plane level, meaning switch internals need not be established until explicit activation. Activation is performed by the APS protocol in the data plane.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
