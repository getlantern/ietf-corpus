kind: design-rationale
summary: Serial number arithmetic is defined generically (parameterised by SERIAL_BITS) so it can be reused by protocols other than DNS. Any document referencing 'Serial Number Arithmetic from RFC 1982' with a stated SERIAL_BITS value inherits the rules of sections 2–5.
