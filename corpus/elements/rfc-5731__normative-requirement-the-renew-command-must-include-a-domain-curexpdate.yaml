document: rfc-5731
kind: normative-requirement
summary: The <renew> command MUST include a <domain:curExpDate> element containing the current expiration date. This value ensures that repeated <renew> commands do not result in multiple unanticipated successful renewals.
section: 3.2.3
rfc2119_level: MUST
topics:
    - dns
