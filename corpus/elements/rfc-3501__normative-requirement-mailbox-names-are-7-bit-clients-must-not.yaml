document: rfc-3501
kind: normative-requirement
summary: Mailbox names are 7-bit. Clients MUST NOT attempt to create 8-bit mailbox names; the name INBOX is case-insensitive and reserved as the primary mailbox for the user. Servers SHOULD prohibit creation of 8-bit mailbox names.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - email
