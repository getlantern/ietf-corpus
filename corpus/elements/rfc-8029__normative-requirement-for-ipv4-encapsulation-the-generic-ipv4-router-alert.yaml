document: rfc-8029
kind: normative-requirement
summary: For IPv4 encapsulation, the generic IPv4 Router Alert Option (value 0x0, RFC 2113) SHOULD be used. For IPv6 encapsulation, the MPLS OAM IPv6 Router Alert Option value 69 (RFC 7506) MUST be used so transit routers examine the packet for MPLS OAM purposes.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
