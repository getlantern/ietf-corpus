document: rfc-8858
kind: normative-requirement
summary: If the offerer sent 'rtcp-mux-only' and the answer contains 'rtcp-mux', the offerer MUST apply RTP/RTCP multiplexing procedures. If the answer does not contain 'rtcp-mux', the offerer MUST either disable the RTP-based media or send a new offer without 'rtcp-mux-only'.
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
