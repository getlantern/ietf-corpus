document: rfc-9616
kind: wire-format
summary: 'Timestamp sub-TLV in a Hello TLV: Type=3 (1 octet), Length (1 octet), Transmit Timestamp (32-bit unsigned integer, microseconds from arbitrary origin). Body length is 4 octets. If Length < 4, the sub-TLV MUST be ignored; if Length > 4, extra data MUST be silently ignored.'
