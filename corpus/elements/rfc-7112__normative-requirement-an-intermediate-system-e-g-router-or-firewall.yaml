document: rfc-7112
kind: normative-requirement
summary: An intermediate system (e.g., router or firewall) that receives a non-compliant IPv6 First Fragment MAY discard that packet and MAY send an ICMPv6 error message to the source. Intermediate systems with this capability SHOULD support configuration of whether such packets are dropped.
section: "5"
rfc2119_level: MAY
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
