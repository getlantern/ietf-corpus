document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords must not be included in URIs, as URIs are frequently logged, cached, and transmitted in headers. The "user:password" userinfo format is deprecated precisely because passing authentication in clear text has proven a security risk.
section: "7.5"
topics:
    - security
    - privacy
