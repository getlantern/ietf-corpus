document: rfc-7195
kind: normative-requirement
summary: When using the 'E164' address type with the 'PSTN' network type, implementations MUST use the 'global-number-digits' construction from RFC 3966 (requiring a leading '+') for international E.164 numbers. The connection address MUST NOT be omitted when unknown; it MUST be set to '-'.
section: 5.2.1
rfc2119_level: MUST
topics:
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
