document: rfc-7095
kind: wire-format
summary: jCard time values use the type identifier "time" and use ISO 8601 extended format with colons separating hour, minute, and second (e.g., "23:20:50"). UTC offsets are permitted within time values in jCard, unlike jCal where they are not permitted.
section: 3.5.4
