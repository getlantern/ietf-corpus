document: rfc-3596
kind: security-consideration
summary: Any information obtained from the DNS must be regarded as unsafe unless DNSSEC (RFC 2535) or TSIG (RFC 2845) techniques are used. The AAAA record type and IP6.ARPA domain do not change the security model; this specification introduces no new security problems and solves none.
section: "4"
topics:
    - dns
    - security
