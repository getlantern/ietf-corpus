document: rfc-9176
kind: normative-requirement
summary: An RD SHOULD determine a request's freshness and MUST use the Echo option if it requires request freshness and cannot determine it in any other way. An endpoint MUST support the use of the Echo option.
section: 5.3.4
rfc2119_level: MUST
topics:
    - security
