document: rfc-9572
kind: normative-requirement
summary: With inter-AS segmentation, an ingress PE MUST determine the leaves in its AS from the BGP next hops in all received IMET A-D routes rather than from the Originating Router's IP Address field, so it does not need to set the L flag.
section: "5.2"
rfc2119_level: MUST
topics:
