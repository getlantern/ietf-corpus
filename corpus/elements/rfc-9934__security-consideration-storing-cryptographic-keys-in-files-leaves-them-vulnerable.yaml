document: rfc-9934
kind: security-consideration
summary: Storing cryptographic keys in files leaves them vulnerable should anyone gain read access to the filesystem. The same protection mechanisms used for a server's PEM-encoded HTTPS certificate private key MUST be applied to the PEM ECH configuration.
section: "4"
topics:
