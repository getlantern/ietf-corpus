document: rfc-4561
kind: protocol-element
summary: The node-id sub-object is an existing RRO IPv4 or IPv6 sub-object (as defined in RFC 3209) with the new 0x20 (Node-id) flag set, inserted in the RRO carried in RSVP Resv messages to convey the node-id of each LSR along the TE LSP path.
