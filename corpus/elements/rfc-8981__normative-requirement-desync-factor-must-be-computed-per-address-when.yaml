document: rfc-8981
kind: normative-requirement
summary: DESYNC_FACTOR MUST be computed per-address when a temporary address is created, and the address's valid and preferred lifetimes MUST be derived from the prefix lifetimes capped by TEMP_VALID_LIFETIME and (TEMP_PREFERRED_LIFETIME - DESYNC_FACTOR), respectively.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
