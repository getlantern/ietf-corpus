document: rfc-2487
kind: security-consideration
summary: SMTP is not an end-to-end mechanism; TLS between one client/server pair does not secure the entire delivery chain. Authentication of an SMTP client does not imply the client authenticated the mail it received from upstream.
section: "7"
topics:
    - email
    - tls
    - security
