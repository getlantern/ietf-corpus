document: rfc-3995
kind: protocol-element
summary: '''notify-sequence-number'' (integer(0:MAX)) counts the number of Event Notifications the Printer has generated and attempted to deliver for this Subscription Object. Initialized to 0 at creation; incremented by 1 for each delivered notification. Allows recipients to detect missed or duplicate notifications. Wraps from MAX back to 0.'
section: 5.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
