document: rfc-9176
kind: protocol-element
summary: The registration interface accepts a POST to the RD URI with query parameters ep (endpoint name), d (sector), lt (lifetime, default 90000 seconds), base (base URI), and extra-attrs. The body carries the list of links in CoRE Link Format or equivalent.
