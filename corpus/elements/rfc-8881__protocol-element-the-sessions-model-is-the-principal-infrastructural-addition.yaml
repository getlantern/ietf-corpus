document: rfc-8881
kind: protocol-element
summary: The sessions model is the principal infrastructural addition in NFSv4.1. Sessions provide a client context for every request and supply robust replay protection for non-idempotent operations. All requests except session-creation operations are performed within a session.
section: "2.10"
