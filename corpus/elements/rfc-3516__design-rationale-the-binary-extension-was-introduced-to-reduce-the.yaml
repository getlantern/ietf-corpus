document: rfc-3516
kind: design-rationale
summary: The Binary extension was introduced to reduce the overhead of MIME content-transfer-encoding (particularly base64) in contexts such as slow radio links and streaming multimedia, allowing the server to perform CTE decoding before transmitting data to the client.
