document: rfc-9925
kind: wire-format
summary: For an unsigned certificate, the AlgorithmIdentifier for id-alg-unsigned MUST omit parameters, and the Certificate's signatureValue field MUST be a BIT STRING of length zero. This represents the entire on-wire encoding of the placeholder signature.
