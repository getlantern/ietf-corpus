document: rfc-6935
kind: interoperability-note
summary: Tunnel protocols carrying non-IP inner packets require further analysis before using zero UDP checksums; IP inner packets are generally safe because all IPv4 and IPv6 packets include at least one checksum at the network or transport layer.
section: "4.2"
topics:
    - ip
    - udp
