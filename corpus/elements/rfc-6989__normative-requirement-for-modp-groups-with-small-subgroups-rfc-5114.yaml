document: rfc-6989
kind: normative-requirement
summary: 'For MODP groups with small subgroups (RFC 5114 groups 22, 23, 24), an IKE implementation MUST choose one of two options: either check that the peer''s public value is in range (1 < r < p-1) AND that r^q = 1 mod p (permitting DH key reuse), or MUST NOT reuse DH private values and MUST check that the public value is in range.'
section: "2.2"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
