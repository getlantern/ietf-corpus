document: rfc-792
kind: interoperability-note
summary: Destination Unreachable codes 0, 1, 4, and 5 may only be received from a gateway, while codes 2 and 3 may only be received from a host. Time Exceeded code 0 comes from a gateway; code 1 comes from a host.
