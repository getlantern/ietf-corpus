document: rfc-9487
kind: security-consideration
summary: The IEs described in this document export provider-plane data metrics revealing how packets are forwarded within an SRv6 network, which may be sensitive. Applications and operators must evaluate the sensitivity of this information in their implementation context and apply the data-at-rest storage guidance in RFC 7011 Section 11.8 as appropriate.
section: "7"
topics:
    - ip
    - routing
    - security
    - privacy
