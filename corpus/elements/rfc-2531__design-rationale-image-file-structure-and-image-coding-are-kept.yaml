document: rfc-2531
kind: design-rationale
summary: image-file-structure and image-coding are kept as separate feature tags because an image file structure (e.g. a TIFF-FX profile) imposes file-format constraints independently of the raw compression technique. An image file structure may contain image data coded in a variety of ways, and these concerns are orthogonal.
section: "3.7"
