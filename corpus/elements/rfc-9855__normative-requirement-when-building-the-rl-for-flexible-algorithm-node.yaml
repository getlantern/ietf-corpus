document: rfc-9855
kind: normative-requirement
summary: When building the RL for Flexible Algorithm Node-SIDs, an implementation SHOULD use only Node-SIDs/Adj-SIDs bound to that Flexible Algorithm and/or unprotected Adj-SIDs of the regular SPF. Using other SIDs does not ensure traffic honors the Flexible Algorithm constraints during the FRR period.
section: "8"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
