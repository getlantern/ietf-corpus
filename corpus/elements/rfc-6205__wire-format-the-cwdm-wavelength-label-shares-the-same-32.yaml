summary: 'The CWDM wavelength label shares the same 32-bit structure as DWDM: Grid (3 bits), C.S. (4 bits), Identifier (9 bits), n (16-bit two''s-complement). Grid=2 for ITU-T CWDM; C.S.=1 encodes 20 nm channel spacing. Wavelength (nm) = 1471 nm + n * 20 nm.'
