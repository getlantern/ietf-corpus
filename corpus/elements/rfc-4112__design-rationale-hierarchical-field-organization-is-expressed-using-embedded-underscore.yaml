document: rfc-4112
kind: design-rationale
summary: Hierarchical field organization is expressed using embedded underscore characters in flat field names (e.g., Ecom_ShipTo_Postal_City) so that both flat key-value encodings and XML aggregates can represent the same structure, enabling use across HTML forms, XML, and proprietary protocols.
section: "2.1"
