document: rfc-7699
kind: wire-format
summary: A compound label for virtual concatenation is a LABEL object formed by concatenating r 64-bit Flexi-Grid Labels, with object length (4 + 8r) bytes. The component labels are ordered by increasing n value, and Grid must be 3 and C.S. must be identical in each component.
