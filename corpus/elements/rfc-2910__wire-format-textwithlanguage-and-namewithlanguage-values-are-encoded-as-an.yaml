document: rfc-2910
kind: wire-format
summary: 'textWithLanguage and nameWithLanguage values are encoded as an OCTET-STRING of four sub-fields: (a) SIGNED-SHORT giving the octet count of the natural-language value, (b) the natural-language value, (c) SIGNED-SHORT giving the octet count of the text/name value, (d) the text/name value. Total length MUST equal 4 + field-a + field-c.'
section: "3.9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
