document: rfc-9803
kind: normative-requirement
summary: Registry operators SHOULD implement limits on maximum and minimum accepted TTL values that are narrower than those permitted by the XML schema (0 to 2147483647), to prevent excessively high or low TTLs from causing operational issues on either side of the zone cut.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - dns
