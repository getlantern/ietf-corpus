document: rfc-4004
kind: normative-requirement
summary: The home agent MUST send the same Acct-Multi-Session-Id AVP value in all HAAs for a mobile node's session. Both the foreign and home agents MUST include the Acct-Multi-Session-Id in accounting messages to enable billing correlation across handoffs.
section: 4.1.2
rfc2119_level: MUST
topics:
    - diameter
    - mobility
