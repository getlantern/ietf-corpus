document: rfc-4639
kind: normative-requirement
summary: If docsDevSwServerAddressType is set to dns(16), attempting to set docsDevSwServerTransportProtocol to tftp(1) MUST result in an error. Conversely, if the transport protocol is tftp(1), attempting to set the address type to dns(16) MUST result in an error.
section: "4"
rfc2119_level: MUST
