document: rfc-2445
kind: security-consideration
summary: 'Spoofing: Only the Organizer is authorized to modify and redistribute updates to an existing VEVENT, VTODO, or VJOURNAL component. A malicious actor may construct an iCalendar object that cancels or alters a component and send it to Attendees. Only an Attendee is authorized to update their own ATTENDEE parameters and send the result to the Organizer.'
section: "3.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
