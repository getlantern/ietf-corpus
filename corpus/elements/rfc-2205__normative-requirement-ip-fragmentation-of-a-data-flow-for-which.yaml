document: rfc-2205
kind: normative-requirement
summary: IP fragmentation of a data flow for which a resource reservation is desired must be avoided, because intermediate routers must be able to inspect UDP/TCP port fields for packet classification. RFC 2210 specifies a procedure for RSVP applications to compute the minimum MTU across the multicast tree and return it to senders.
section: "1.2"
rfc2119_level: MUST
topics:
    - qos
    - realtime
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
