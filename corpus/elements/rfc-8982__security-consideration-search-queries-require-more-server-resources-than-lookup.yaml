document: rfc-8982
kind: security-consideration
summary: Search queries require more server resources than lookup queries, increasing the risk of resource exhaustion and denial of service. Partial responses can mitigate this risk when combined with strategies such as restricting search functionality, rate limiting, and result truncation/paging.
