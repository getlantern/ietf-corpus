document: rfc-8260
kind: normative-requirement
summary: An endpoint implementing the RFC 6458 socket API MUST NOT indicate user message interleaving support unless the user has explicitly requested it, because the application must be capable of handling interleaved messages upon reception.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
