summary: 'bgpPeerState models the BGP finite state machine with six states: idle(1), connect(2), active(3), opensent(4), openconfirm(5), established(6). The bgpEstablished trap fires on entry to established; bgpBackwardTransition fires on any move to a lower-numbered state.'
