document: rfc-9535
kind: security-consideration
summary: Crafted JSONPath queries can cause resource exhaustion; deeply nested descendant segments or pathological filter expressions may require exponential time or memory. Implementations should impose limits on query complexity and execution resources.
section: "4.1"
topics:
    - security
    - json
