document: rfc-3023
kind: normative-requirement
summary: When a new XML-based MIME media type is introduced, its name SHOULD end with '+xml' to allow generic XML processors to detect and process the entity. Media subtypes that do not represent XML MIME entities MUST NOT be registered with a '+xml' suffix.
section: "7"
rfc2119_level: SHOULD
topics:
    - registry
