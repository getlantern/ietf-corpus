document: rfc-9135
kind: security-consideration
summary: The VPN scheme does not provide confidentiality, source authentication, integrity, or replay protection; these must be provided by out-of-scope mechanisms. A security advantage is that dynamic routing protocols can be blocked on NVE/PE ACs, preventing tenants from interacting with the infrastructure's routing protocols.
section: "10"
topics:
