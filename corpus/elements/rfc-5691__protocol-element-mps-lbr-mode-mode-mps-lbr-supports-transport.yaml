document: rfc-5691
kind: protocol-element
summary: MPS-lbr mode (mode=MPS-lbr) supports transport of one or more complete Access Units each consisting of a single MPEG Surround SpatialFrame(). Maximum SpatialFrame() size is 63 bytes. Fragmentation MUST NOT be used; receivers MUST support de-interleaving.
section: 4.2.1
topics:
    - rtp
    - realtime
