document: rfc-5764
kind: normative-requirement
summary: When the maximum_lifetime packet count for an SRTP profile is reached, a new DTLS session SHOULD be established for replacement keys, and implementations MUST NOT use the exhausted keys for processing any outbound or inbound traffic.
section: "4.4"
rfc2119_level: MUST NOT
topics:
