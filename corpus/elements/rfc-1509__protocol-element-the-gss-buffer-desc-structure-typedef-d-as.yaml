document: rfc-1509
kind: protocol-element
summary: The gss_buffer_desc structure (typedef'd as gss_buffer_t) is the universal carrier for multi-byte data in the C bindings. It contains a size_t length field and a void* value pointer. Storage returned to the application by GSSAPI routines must be freed via gss_release_buffer.
section: 2.1.3
topics:
