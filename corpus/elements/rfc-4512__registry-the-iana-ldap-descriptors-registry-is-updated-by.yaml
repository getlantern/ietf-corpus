document: rfc-4512
kind: registry
summary: The IANA LDAP Descriptors registry is updated by RFC 4512 to register short names (descriptors) for the attribute types and object classes defined herein (including 'objectClass', 'aliasedObjectName', 'creatorsName', 'createTimestamp', 'modifiersName', 'modifyTimestamp', 'subschemaSubentry', 'subschema', 'extensibleObject', and root DSE attributes). Registration procedures are specified in BCP 64, RFC 4520.
