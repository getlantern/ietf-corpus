document: rfc-7117
kind: normative-requirement
summary: An egress PE MUST NOT advertise IMPLICIT NULL or EXPLICIT NULL for a P2MP LSP that is carrying traffic for one or more VPLS instances, since the non-null label is required for LSP identification and VPLS demultiplexing.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
