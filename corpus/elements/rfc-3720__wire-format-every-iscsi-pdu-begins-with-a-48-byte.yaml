document: rfc-3720
kind: wire-format
summary: Every iSCSI PDU begins with a 48-byte Basic Header Segment (BHS), optionally followed by Additional Header Segments (AHS), an optional Header Digest (CRC32C, 4 bytes), a Data Segment, and an optional Data Digest (CRC32C, 4 bytes). PDUs are padded to a 4-byte boundary.
