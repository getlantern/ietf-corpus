document: rfc-7512
kind: design-rationale
summary: 'The PKCS #11 URI scheme does not use the hierarchical naming authority component in the path because the authority part could not be mapped to PKCS #11 API elements. It also does not use the fragment component. The scheme, path, and query components from RFC 3986 are used.'
section: "1"
