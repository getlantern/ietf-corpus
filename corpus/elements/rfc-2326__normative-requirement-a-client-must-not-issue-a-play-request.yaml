document: rfc-2326
kind: normative-requirement
summary: A client MUST NOT issue a PLAY request until any outstanding SETUP requests have been acknowledged as successful. The server MUST queue PLAY requests to be executed in order, delaying any PLAY request that arrives while a previous one is still active.
section: "10.5"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
