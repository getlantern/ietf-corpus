document: rfc-2228
kind: protocol-element
summary: The CCC (Clear Command Channel) command takes no argument and allows reverting the control channel to unprotected mode after a security association is established. It must itself be transmitted with integrity protection, and its reply must also be integrity protected.
section: "3"
