document: rfc-8260
kind: design-rationale
summary: Stream scheduler selection is exclusively a sender-side decision; no mechanism is provided for signaling the chosen scheduler to the receiver or for allowing the receiver to influence the sender's choice. This keeps the protocol simple and avoids additional negotiation overhead.
