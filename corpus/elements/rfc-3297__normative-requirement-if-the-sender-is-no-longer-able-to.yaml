document: rfc-3297
kind: normative-requirement
summary: If the sender is no longer able to send message data, it MUST send a message to the receiver indicating a failed transfer, and SHOULD generate a report with an MDN request including an Alternative-not-available modifier.
section: "3.3"
rfc2119_level: MUST
topics:
