document: rfc-8325
kind: protocol-element
summary: The IEEE 802.11u QoS Map Set element, transmitted from AP to non-AP station in association/re-association Response frames, communicates DSCP-to-UP mappings so wireless endpoints can align upstream markings with the AP's downstream configuration. It supports up to 21 explicit DSCP exceptions from eight UP-range associations.
section: "6.3"
topics:
