document: rfc-5925
kind: normative-requirement
summary: Components of an MKT MUST NOT change during a connection. The set of MKTs MAY change during a connection (new MKTs can be installed and a connection can switch which MKT it uses).
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - tcp
    - security
