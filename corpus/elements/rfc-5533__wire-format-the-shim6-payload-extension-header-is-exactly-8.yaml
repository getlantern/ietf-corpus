kind: wire-format
summary: 'The Shim6 Payload Extension Header is exactly 8 octets: Next Header (8 bits), Hdr Ext Len=0 (8 bits), P=1 (1 bit), and Receiver Context Tag (47-bit unsigned integer). It is included only when the current locator pair differs from the ULID pair.'
