document: rfc-9575
kind: normative-requirement
summary: DRIP Wrappers MUST be sent in addition to any required ASTM Messages in a given jurisdiction. An implementation MUST NOT send DRIP Wrappers in place of any required ASTM Messages it may encapsulate, resulting in wrapped messages being transmitted twice.
section: 6.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
