document: rfc-3219
kind: state-machine
summary: The TRIP FSM (Section 9, Appendix A1) is modeled after BGP-4's FSM. States govern peer connection lifecycle from initial Idle through connection establishment (Connect, Active), OPEN exchange (OpenSent, OpenConfirm), and normal operation (Established). Triggers include transport events, message receipt, and Hold Timer expiry.
