document: rfc-7811
kind: protocol-element
summary: The localroot of a node x is the cut-vertex (or GADAG root) in the same block that is closest to the GADAG root. Two nodes X and Y share a common block if and only if they share the same localroot, or one is the localroot of the other.
section: "4.5"
topics:
    - routing
