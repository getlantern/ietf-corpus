document: rfc-7939
kind: protocol-element
summary: NeighborRouterIndex is an arbitrary locally unique Unsigned32 (1..2147483647) identifying a discovered neighbor router (one or two hops). Its value MUST remain constant across agent re-initializations unless the application is deleted and re-created, and MUST NOT be reused until the next agent restart.
section: "7"
topics:
    - routing
