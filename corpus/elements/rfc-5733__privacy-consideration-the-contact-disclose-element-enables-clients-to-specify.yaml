document: rfc-5733
kind: privacy-consideration
summary: The <contact:disclose> element enables clients to specify elements (name, org, addr, voice, fax, email in int/loc variants) that require exceptional server handling to allow or restrict third-party disclosure, overriding the server's default announced data-collection policy on a per-object basis.
section: "2.9"
topics:
