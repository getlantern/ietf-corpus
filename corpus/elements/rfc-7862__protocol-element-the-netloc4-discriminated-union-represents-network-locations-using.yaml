document: rfc-7862
kind: protocol-element
summary: 'The netloc4 discriminated union represents network locations using netloc_type4: NL4_NAME (1) carries a UTF-8 hostname string, NL4_URL (2) carries a UTF-8 server URL, and NL4_NETADDR (3) carries a netaddr4 structure as defined in RFC 5661 Section 3.3.9.'
