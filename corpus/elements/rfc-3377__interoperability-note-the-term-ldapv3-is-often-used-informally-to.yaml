document: rfc-3377
kind: interoperability-note
summary: The term 'LDAPv3' is often used informally to refer to subsets of the nine-RFC suite. For formal interoperability and protocol identification purposes, documents must reference the complete suite as defined in RFC 3377 rather than relying on informal usage.
