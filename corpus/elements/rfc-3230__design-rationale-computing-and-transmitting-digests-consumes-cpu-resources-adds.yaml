document: rfc-3230
kind: design-rationale
summary: Computing and transmitting digests consumes CPU resources, adds latency, and uses HTTP header space. The Want-Digest negotiation mechanism allows recipients to signal whether and which digest is useful, avoiding unnecessary cost when the recipient will not use the digest.
section: "1.1"
topics:
    - http
