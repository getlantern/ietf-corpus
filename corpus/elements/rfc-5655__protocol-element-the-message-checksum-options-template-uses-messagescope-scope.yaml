document: rfc-5655
kind: protocol-element
summary: The Message Checksum Options Template uses messageScope (scope field, value written as 0 and ignored on read) and messageMD5Checksum (16-byte MD5 of the Message with this field zeroed). The checksum Data Record MUST appear at most once per IPFIX Message.
section: 8.1.1
topics:
