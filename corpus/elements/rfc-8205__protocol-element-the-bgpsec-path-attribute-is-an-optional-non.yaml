document: rfc-8205
kind: protocol-element
summary: The BGPsec_PATH attribute is an optional non-transitive BGP path attribute that replaces AS_PATH in BGPsec UPDATE messages. It consists of one Secure_Path (carrying AS path information) and one or two Signature_Blocks (each corresponding to a different algorithm suite).
