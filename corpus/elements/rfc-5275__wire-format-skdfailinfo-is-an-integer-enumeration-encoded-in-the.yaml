document: rfc-5275
kind: wire-format
summary: SKDFailInfo is an INTEGER enumeration encoded in the ExtendedFailInfo field of cMCStatusInfoExt under OID id-cet-skdFailInfo. Values include unspecified(0), closedGL(1), unsupportedDuration(2), noGLACertificate(3), invalidCert(4), unsupportedAlgorithm(5), noGLONameMatch(6), invalidGLName(7), nameAlreadyInUse(8), noSpam(9), alreadyAMember(11), notAMember(12), alreadyAnOwner(13), notAnOwner(14).
