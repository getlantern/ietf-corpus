document: rfc-9342
kind: protocol-element
summary: Mean delay for multipoint paths is measured as the difference between the weighted averages of mean timestamps at output and input nodes, with timestamps weighted by the number of packets at each endpoint. Two-way delay of a multipoint path can be computed by summing one-way delays of both directions.
section: 7.1.1
topics:
    - measurement
