document: rfc-8046
kind: normative-requirement
summary: Hosts MUST NOT announce broadcast or multicast addresses in LOCATOR_SETs; each received address MUST be checked to be a legal unicast or anycast address before being added to the locator data structure.
section: "5.2"
rfc2119_level: MUST NOT
topics:
