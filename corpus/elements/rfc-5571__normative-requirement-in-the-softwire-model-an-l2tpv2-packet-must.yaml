document: rfc-5571
kind: normative-requirement
summary: In the Softwire model, an L2TPv2 packet MUST be carried over UDP. The underlying IP version may be IPv4 or IPv6 depending on the scenario; UDP bypass is not supported because L2TPv2 does not autodetect NAT/NAPT.
section: "5.1"
rfc2119_level: MUST
topics:
    - vpn
    - nat
    - udp
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
