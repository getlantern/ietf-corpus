document: rfc-7170
kind: protocol-element
summary: The Result TLV (type 3, mandatory) carries acknowledged success or failure for protected termination. Status values are 1 (Success) and 2 (Failure). A failure Result TLV MUST NOT be accompanied by a NAK TLV, EAP-Payload TLV, or Crypto-Binding TLV.
section: 4.2.4
topics:
    - security
