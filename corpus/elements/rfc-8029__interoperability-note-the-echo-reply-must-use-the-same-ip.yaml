document: rfc-8029
kind: interoperability-note
summary: The echo reply MUST use the same IP version as the received echo request (IPv4 in response to IPv4, IPv6 in response to IPv6). Reply Mode 3 (UDP with Router Alert) requires all intermediate routers to understand and correctly forward MPLS echo reply packets.
section: "3"
topics:
    - mpls
    - ip
