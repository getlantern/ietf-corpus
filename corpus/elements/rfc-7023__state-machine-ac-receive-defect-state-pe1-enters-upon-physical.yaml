document: rfc-7023
kind: state-machine
summary: 'AC Receive Defect State: PE1 enters upon physical-layer fault (LoS, Link OAM Dying Gasp/Critical Event, client Signal Fail), receipt of Ethernet AIS from CE1, absence of CCM frames for 3.5× the CCM transmission period, or a CCM with Interface Status TLV indicating interface down. PE1 exits when all triggering conditions are cleared (e.g., LoS cleared, AIS period expired, consecutive CCMs resumed, CCM Interface Status TLV up).'
section: "5.1"
topics:
    - mpls
