document: rfc-7459
kind: design-rationale
summary: 'A fixed default confidence (95%) is preferred for PIDF-LO because it ensures consistency across implementations. Without a fixed value, location servers faced a dilemma: either scale uncertainty without sufficient information (degrading quality) or silently ignore confidence (creating false impressions). The optional confidence element is added to handle legacy systems that cannot meet 95%.'
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
