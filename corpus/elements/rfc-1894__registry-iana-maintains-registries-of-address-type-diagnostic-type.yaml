document: rfc-1894
kind: registry
summary: IANA maintains registries of address-type, diagnostic-type, and MTA-name-type values. Initial values include "rfc822" address-type, "smtp" diagnostic-type, and "dns" MTA-name-type. Names beginning with "X-" are reserved for experimental use and will not be accepted for registration.
