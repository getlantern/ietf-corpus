document: rfc-8828
kind: design-rationale
summary: Mode 2 (default route plus associated local addresses) is the recommended default rather than Mode 3 because there is no currently defined mechanism that can both avoid disclosing private local IP addresses and also allow direct peer-to-peer connections. The spec explicitly notes this tension.
section: "5.1"
topics:
