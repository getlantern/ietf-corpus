document: rfc-3416
kind: protocol-element
summary: 'SetRequest-PDU processing is a two-phase operation: Phase 1 validates all variable bindings (checking access, writability, type, length, encoding, value, and resource availability); Phase 2 assigns all values simultaneously only if all validations succeed. Assignments occur as if simultaneous with respect to each other.'
