document: rfc-5304
kind: normative-requirement
summary: When computing HMAC-MD5 for LSPs, the Checksum and Remaining Lifetime fields MUST be set to zero before authentication is computed. The Authentication Value field is also set to zero before computation, with the Authentication Type set to 54 and TLV length set to 17.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
