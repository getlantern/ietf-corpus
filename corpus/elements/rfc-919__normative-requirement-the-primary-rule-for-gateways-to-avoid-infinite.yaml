document: rfc-919
kind: normative-requirement
summary: 'The primary rule for gateways to avoid infinite broadcast loops: a gateway must never retransmit a broadcast datagram on the same hardware network from which it was received. Simply avoiding repeating one''s own prior transmissions is insufficient when multiple gateways share a hardware network.'
section: "6"
rfc2119_level: MUST NOT
topics:
    - ip
