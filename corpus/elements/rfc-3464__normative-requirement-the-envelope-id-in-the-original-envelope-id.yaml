document: rfc-3464
kind: normative-requirement
summary: The envelope-id in the Original-Envelope-Id field is CASE-SENSITIVE; the DSN MUST preserve the original case and spelling. An MTA MUST NOT supply this field unless an envelope-identifier was present in the incoming envelope.
section: 2.2.1
rfc2119_level: MUST
topics:
    - email
