document: rfc-8509
kind: normative-requirement
summary: When the sentinel logic instructs 'return SERVFAIL', the resolver MUST set RCODE=2 and the Answer Section of the DNS response MUST be empty, overriding any other specification about answer content.
section: "2.2"
