document: rfc-9530
kind: design-rationale
summary: Structured Fields (RFC 8941) Dictionary encoding was chosen for all four new fields to eliminate the mixed base64/hex/decimal encoding formats allowed by RFC 3230. Digest values are uniformly serialized as Byte Sequences, and multiple algorithm/digest pairs can appear in a single field to support algorithm agility and negotiation.
section: "1.3"
