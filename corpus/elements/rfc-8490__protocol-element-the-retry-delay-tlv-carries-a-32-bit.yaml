document: rfc-8490
kind: protocol-element
summary: The Retry Delay TLV carries a 32-bit reconnect delay value (in milliseconds) and is used by the server to initiate graceful termination of a DSO session. The RCODE in the accompanying DNS header indicates the reason for termination. It may also appear as a Response Additional TLV alongside another DSO response. Clients MUST NOT initiate this TLV.
section: "7.2"
topics:
    - dns
