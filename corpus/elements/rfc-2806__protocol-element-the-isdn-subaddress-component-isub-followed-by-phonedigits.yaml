document: rfc-2806
kind: protocol-element
summary: The ISDN subaddress component (';isub=' followed by phonedigits) identifies a sub-endpoint under a shared phone number and is sent to the network via call-setup signalling. The T.33 subaddress (';tsub=') serves an analogous role for fax routing per ITU-T T.33.
section: 2.5.7
