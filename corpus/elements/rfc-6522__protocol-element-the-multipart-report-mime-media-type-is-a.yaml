document: rfc-6522
kind: protocol-element
summary: The multipart/report MIME media type is a general container type for electronic mail reports. Required parameters are 'boundary' and 'report-type'; the report-type parameter identifies the MIME subtype of the second body part. Syntax is identical to multipart/mixed.
