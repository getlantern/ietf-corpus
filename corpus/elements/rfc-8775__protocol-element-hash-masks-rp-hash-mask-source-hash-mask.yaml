document: rfc-8775
kind: protocol-element
summary: Hash masks (RP Hash Mask, Source Hash Mask, Group Hash Mask) are used to extract bits from IP address fields for hash computation. A zero mask means no bits are set; an all-bits-set mask means all bits participate in hashing.
section: "5.1"
