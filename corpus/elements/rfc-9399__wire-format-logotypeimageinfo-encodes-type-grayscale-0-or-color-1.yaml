document: rfc-9399
kind: wire-format
summary: LogotypeImageInfo encodes type (grayScale=0 or color=1, DEFAULT color), fileSize in octets, xSize and ySize in pixels, optional resolution (bits per pixel or color table size), and optional RFC 5646 language tag. LogotypeAudioInfo encodes fileSize, playTime in milliseconds, channels (0=unspecified, 1=mono, 2=stereo, 4=quad), optional sampleRate, and optional language tag.
