document: rfc-5814
kind: protocol-element
summary: Multiple Unidirectional LSPs Setup Delay is defined as the elapsed time from the first Path message sent to the last Resv received, where X Path messages are sent according to a Poisson process with arrival rate Lambda_m. The metric is undefined if any corresponding Resv is not received within the timeout.
