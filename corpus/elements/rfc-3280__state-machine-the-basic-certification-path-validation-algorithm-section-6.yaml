document: rfc-3280
kind: state-machine
summary: The basic certification path validation algorithm (Section 6.1) processes an ordered sequence of n certificates. For each certificate i (1 to n), it verifies signature, validity period, revocation status, and enforces name and policy constraints using state variables including valid_policy_tree, working_public_key, working_issuer_name, and path length counters. The wrap-up procedure at n produces final policy set and public key outputs.
section: "6.1"
topics:
