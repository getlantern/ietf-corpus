summary: The 'meta' SD-ID provides message meta-information via 'sequenceId' (integer starting at 1, incrementing per message up to 2147483647 then wrapping to 1), 'sysUpTime' (SNMP sysUpTime in hundredths of a second), and 'language' (BCP 47 language tag for MSG content).
