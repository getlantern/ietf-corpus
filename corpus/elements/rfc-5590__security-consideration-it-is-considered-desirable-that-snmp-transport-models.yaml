document: rfc-5590
kind: security-consideration
summary: It is considered desirable that SNMP Transport Models utilize transport-layer security that addresses perfect forward secrecy at least for encryption keys, guaranteeing that compromise of long-term keys does not result in disclosure of past session keys. Each proposed Transport Model should discuss whether PFS is appropriate.
section: "7"
topics:
