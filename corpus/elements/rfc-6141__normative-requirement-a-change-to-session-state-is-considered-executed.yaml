document: rfc-6141
kind: normative-requirement
summary: A change to session state is considered executed when an offer/answer exchange without preconditions has completed successfully, or when the UA has sent or received media using the new parameters. TCP SYN messages, ICE connectivity checks, and precondition signaling are not considered media.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
