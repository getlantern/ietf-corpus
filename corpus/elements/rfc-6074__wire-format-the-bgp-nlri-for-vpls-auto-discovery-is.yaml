document: rfc-6074
kind: wire-format
summary: 'The BGP NLRI for VPLS auto-discovery is encoded as: Length (2 octets) | Route Distinguisher (8 octets) | PE_addr (4 octets), giving a payload length of 12 bytes. Each PE advertises one such NLRI per VSI, with BGP next hop set to its own loopback address.'
section: 3.2.2.1
