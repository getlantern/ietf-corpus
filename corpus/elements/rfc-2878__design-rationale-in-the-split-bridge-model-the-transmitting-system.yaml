document: rfc-2878
kind: design-rationale
summary: In the split-bridge model, the transmitting system MUST update the RIF rather than the receiving system, so that the receiver can forward the frame without processing the RIF. If the receiving system had to determine whether the transmitter had updated the RIF, it would have to scan and conditionally update it on every frame.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
