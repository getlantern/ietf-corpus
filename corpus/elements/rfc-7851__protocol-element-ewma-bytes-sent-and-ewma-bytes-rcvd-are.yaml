document: rfc-7851
kind: protocol-element
summary: 'EWMA_BYTES_SENT and EWMA_BYTES_RCVD are 32-bit unsigned integers representing exponential weighted moving averages of bytes sent/received per second, computed as: value = alpha * present + (1 - alpha) * last, with a suggested alpha of 0.8 recalculated every five seconds.'
