document: rfc-3195
kind: normative-requirement
summary: The 'fromIP' and 'toIP' attributes of a 'path' element MUST be the IP addresses of the respective interfaces over which the element was sent and received. The 'fromFQDN' and 'toFQDN' SHOULD be the corresponding fully qualified domain names and may be omitted if no DNS entry exists.
section: 4.4.3
rfc2119_level: MUST
topics:
    - syslog
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
