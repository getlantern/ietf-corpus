document: rfc-7863
kind: interoperability-note
summary: The NFSv4.2 XDR is fully compatible with NFSv4.0 (RFC 7531) except for the clientaddr4-to-netaddr4 aliasing, which also reconverges with the NFSv4.1 (RFC 5662) XDR strand; a single .x file can be used to implement all three NFSv4 minor versions.
section: "2"
