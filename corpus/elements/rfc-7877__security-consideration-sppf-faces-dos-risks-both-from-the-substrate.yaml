document: rfc-7877
kind: security-consideration
summary: SPPF faces DoS risks both from the substrate layer (e.g., TCP-level attacks on the SOAP transport) and SPPF-specific attacks such as flooding the Registry with large provisioning requests. The 'Request too large' response code provides a mechanism to reject oversized requests.
section: "9.3"
topics:
    - security
