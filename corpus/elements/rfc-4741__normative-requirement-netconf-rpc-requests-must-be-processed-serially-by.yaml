document: rfc-4741
kind: normative-requirement
summary: NETCONF <rpc> requests MUST be processed serially by the managed device, and the device MUST send responses only in the order the requests were received, even if additional requests are pipelined before previous ones complete.
section: "4.5"
rfc2119_level: MUST
topics:
    - netconf
