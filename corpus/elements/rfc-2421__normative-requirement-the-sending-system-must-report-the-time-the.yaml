document: rfc-2421
kind: normative-requirement
summary: The sending system MUST report the time the message was sent in the Date header. If the VPIM sender is relaying from a system without a timestamp, the time of arrival at the VPIM system SHOULD be used.
section: 4.2.4
rfc2119_level: MUST
topics:
    - email
