document: rfc-5482
kind: protocol-element
summary: 'The recommended formula for computing the local USER_TIMEOUT when CHANGEABLE is true is: USER_TIMEOUT = min(U_LIMIT, max(ADV_UTO, REMOTE_UTO, L_LIMIT)), taking the maximum of the two advertised values clamped to configured upper and lower limits.'
