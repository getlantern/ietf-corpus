document: rfc-7672
kind: design-rationale
summary: TLSA certificate usages PKIX-TA(0) and PKIX-EE(1) SHOULD NOT be used for port 25 SMTP because MTAs have no agreed-upon comprehensive CA list, there is no user to 'click OK' when CA verification fails, and a DNSSEC breach allows an attacker to substitute DANE-EE(3) records, making PKIX usages provide no additional security.
section: 3.1.3
topics:
    - email
    - tls
    - pkix
    - security
