document: rfc-8703
kind: normative-requirement
summary: All DLEP Destination Up Messages containing a Link Identifier Data Item MUST contain Layer 3 information — one or more IPv4 or IPv6 Address Data Items or Attached Subnet Data Items — since the MAC address is that of the Gateway Node, not the final destination.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - ip
