document: rfc-2210
kind: normative-requirement
summary: The [M] field in a receiver's FLOWSPEC should be set to the smallest PATH_MTU value learned from arriving ADSPEC objects; requesting [M] larger than the service modules along the path can support will cause the reservation to fail.
section: 3.2.1
rfc2119_level: SHOULD
