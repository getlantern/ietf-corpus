document: rfc-3984
kind: protocol-element
summary: The Decoding Order Number (DON) is a 16-bit field in the range 0-65535 (wrapping around) used in interleaved mode to convey NAL unit decoding order when it differs from transmission order. The function don_diff(m,n) uses modular arithmetic with 32768 as the half-period to determine relative ordering between two DON values.
section: "5.5"
topics:
