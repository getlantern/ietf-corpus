document: rfc-4970
kind: protocol-element
summary: The OSPFv3 RI LSA uses function code 12; the U bit is set to indicate the LSA should be flooded even if not understood. The S1/S2 bits determine flooding scope, and the Link State ID is always 0 since only one RI LSA per flooding scope is advertised.
section: "2.2"
topics:
    - routing
