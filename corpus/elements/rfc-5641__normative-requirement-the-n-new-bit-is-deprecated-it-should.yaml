document: rfc-5641
kind: normative-requirement
summary: The (N) New bit is deprecated. It SHOULD be ignored on receipt and is OPTIONAL to set on sending. Prior implementations MUST set bits 0–13 to zero per RFC 3931 Section 5.4.5, enabling legacy interworking.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
