document: rfc-9190
kind: normative-requirement
summary: The EAP-TLS peer and server MUST cache data during the initial full handshake sufficient to allow authorization decisions during resumption. If cached data cannot be retrieved securely, resumption MUST NOT be done.
section: "5.7"
rfc2119_level: MUST
topics:
    - tls
    - security
