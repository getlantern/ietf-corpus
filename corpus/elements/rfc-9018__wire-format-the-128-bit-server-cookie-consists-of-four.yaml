document: rfc-9018
kind: wire-format
summary: 'The 128-bit Server Cookie consists of four Sub-Fields: a 1-octet Version, a 3-octet Reserved, a 4-octet Timestamp (Unix epoch, unsigned, network byte order), and an 8-octet Hash. The total COOKIE option for version 1 is exactly 24 bytes (8-byte Client Cookie plus 16-byte Server Cookie).'
section: "4"
