document: rfc-8797
kind: normative-requirement
summary: If a peer does not receive a conforming CM Private Data message, it MUST behave as if it received a message with the R bit cleared and both Size fields set to zero (i.e., default 1024-byte inline thresholds, no remote invalidation).
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
