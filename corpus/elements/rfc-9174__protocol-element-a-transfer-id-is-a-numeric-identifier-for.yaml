document: rfc-9174
kind: protocol-element
summary: A Transfer ID is a numeric identifier for each bundle transfer, guaranteed unique only within a single direction of a single TCPCL session. The Transfer ID appears in XFER_SEGMENT, XFER_ACK, and XFER_REFUSE messages to correlate segments, acknowledgments, and refusals to their bundle transfer.
section: 5.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
