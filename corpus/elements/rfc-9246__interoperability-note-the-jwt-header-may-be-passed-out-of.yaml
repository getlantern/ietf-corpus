document: rfc-9246
kind: interoperability-note
summary: The JWT header MAY be passed out-of-band via the CDNI Metadata interface (the 'jwt-header' property) rather than included in the URISigningPackage token in the URI. This reduces the size of the signed JWT token embedded in the URI.
section: "2.2"
topics:
