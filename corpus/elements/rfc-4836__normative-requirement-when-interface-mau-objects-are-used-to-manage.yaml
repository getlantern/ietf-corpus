document: rfc-4836
kind: normative-requirement
summary: When interface-MAU objects are used to manage a 10GBASE-W PHY (ifMauType equal to dot3MauType10GigBaseW or any 10GBASE-W variant), the agent MUST also support the Ethernet WAN Interface Sublayer (WIS) MIB (RFC 3637) and follow its interface layering model.
