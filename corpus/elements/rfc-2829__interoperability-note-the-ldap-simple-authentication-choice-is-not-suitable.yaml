document: rfc-2829
kind: interoperability-note
summary: The LDAP 'simple' authentication choice is not suitable for authentication on the Internet where there is no network or transport layer confidentiality. If a non-DN authorization identity is requested, a mechanism that protects the password in transit SHOULD be used.
section: "8"
topics:
