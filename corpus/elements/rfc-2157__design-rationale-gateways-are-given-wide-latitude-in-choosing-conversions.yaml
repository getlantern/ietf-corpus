document: rfc-2157
kind: design-rationale
summary: Gateways are given wide latitude in choosing conversions because both the MIME and X.400 worlds are in a 'stable state of flux' with non-text content. The specification acknowledges that SMTP->X.400->SMTP round-trips may lose information and that different gateways may apply different translations, which is considered unavoidable.
