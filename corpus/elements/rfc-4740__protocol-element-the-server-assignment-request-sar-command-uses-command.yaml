document: rfc-4740
kind: protocol-element
summary: The Server-Assignment-Request (SAR) command uses Command-Code 284 with the R bit set. It informs the Diameter server of the SIP server URI now serving the user (via SIP-Server-URI), requests user-profile download, and identifies the reason for the request via SIP-Server-Assignment-Type.
section: "8.3"
