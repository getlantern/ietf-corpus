document: rfc-7564
kind: protocol-element
summary: IdentifierClass allows LetterDigits (A), printable ASCII7 U+0021–U+007E (K), and Exceptions/JoinControl under contextual rules; it disallows OldHangulJamo, Controls, PrecisIgnorableProperties, Spaces, Symbols, Punctuation, HasCompat, and OtherLetterDigits. Unassigned code points are treated as disallowed.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
