document: rfc-5676
kind: protocol-element
summary: syslogMsgIndex is a monotonically increasing Unsigned32 (1..4294967295) identifying entries in syslogMsgTable. When it reaches 4294967295, the value wraps back to 1; pollers must account for full rollovers.
