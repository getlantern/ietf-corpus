document: rfc-3834
kind: normative-requirement
summary: Responders MUST NOT generate any response for which the destination would be a null address (e.g., SMTP MAIL FROM or Return-Path is <>), since such a response would not be delivered to a useful destination.
section: "2"
rfc2119_level: MUST NOT
