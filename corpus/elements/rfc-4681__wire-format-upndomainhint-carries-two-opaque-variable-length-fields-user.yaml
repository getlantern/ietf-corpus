document: rfc-4681
kind: wire-format
summary: 'UpnDomainHint carries two opaque variable-length fields: user_principal_name<0..2^16-1> and domain_name<0..2^16-1>. The user_principal_name, when present, MUST be of the form ''user@domain'' with a UTF-8 encoded Unicode user part.'
