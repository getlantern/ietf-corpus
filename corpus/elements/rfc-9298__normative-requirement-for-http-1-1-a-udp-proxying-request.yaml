document: rfc-9298
kind: normative-requirement
summary: 'For HTTP/1.1, a UDP proxying request SHALL use the GET method, include Connection: Upgrade, and include Upgrade: connect-udp. A malformed request MUST be answered with an error; the 400 (Bad Request) status code SHOULD be used.'
section: "3.2"
rfc2119_level: MUST
topics:
    - http
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
