document: rfc-5552
kind: design-rationale
summary: For outbound calling, Flow IV from RFC 3725 (third-party call control) is recommended in conjunction with the VoiceXML Session preparation mechanism. This avoids callee-experienced delay, sidesteps timing difficulties from VoiceXML document fetch time, and is IPv6 compatible.
section: "5"
topics:
