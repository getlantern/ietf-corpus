document: rfc-9668
kind: protocol-element
summary: 'This document defines eight web linking target attributes for EDHOC resource discovery: ''ed-i'' (Initiator role supported), ''ed-r'' (Responder role supported), ''ed-method'' (authentication method), ''ed-csuite'' (cipher suite), ''ed-cred-t'' (credential type), ''ed-idcred-t'' (credential identifier type), ''ed-ead'' (EAD item), and ''ed-comb-req'' (EDHOC + OSCORE request supported). The target attribute rt="core.edhoc" MUST be included when specifying these parameters.'
section: "6"
topics:
    - security
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
