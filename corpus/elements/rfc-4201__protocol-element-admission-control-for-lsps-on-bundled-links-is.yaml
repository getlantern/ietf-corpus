document: rfc-4201
kind: protocol-element
summary: Admission control for LSPs on bundled links is performed per-component link. An LSP with bandwidth requirement b and setup priority p fits if at least one component link has maximum LSP bandwidth >= b at priority p. The Traffic Control module must track unreserved bandwidth per component link.
section: "4"
topics:
    - mpls
    - routing
