document: rfc-9082
kind: design-rationale
summary: The IP lookup semantics target the 'most-specific' or smallest IP network that completely encompasses the queried address or CIDR. A single address is treated as a /32 (IPv4) or /128 (IPv6) CIDR block for consistency.
