document: rfc-7741
kind: wire-format
summary: The VP8 payload header (uncompressed data chunk from RFC 6386 Section 9.1) appears only in the first packet of a frame (S=1, PID=0). It is 3 octets for interframes and 10 octets for key frames; the P bit (bit 0) is the inverse key frame flag (0=key frame, 1=interframe).
section: "4.3"
topics:
