document: rfc-9633
kind: protocol-element
summary: 'The ''app-status'' identity hierarchy defines five operational states: ''none'' (configuration incomplete), ''ready'' (ingress/egress ready), ''failed'' (ingress/egress failed), ''out-of-service'' (administratively blocked), and ''partial-failed'' (one or more egress instances ready, one or more failed; usable if ingress is ready).'
