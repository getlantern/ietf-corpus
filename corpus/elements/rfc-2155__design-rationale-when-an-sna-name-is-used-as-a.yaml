document: rfc-2155
kind: design-rationale
summary: When an SNA name is used as a table index, trailing blanks are treated as significant by the agent, enabling management stations to use blank-padded index values as GetNext starting points without accidentally matching shorter names. Since agents never store nonsignificant trailing blanks, a management station adding them must intend this navigation use.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
