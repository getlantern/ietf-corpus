document: rfc-9303
kind: normative-requirement
summary: The Key Derivation Function HKDF-SHA256 MUST be supported in LISP-SEC implementations. Deployments SHOULD use HKDF-SHA256 unless older implementations using HKDF-SHA1-128 are present.
