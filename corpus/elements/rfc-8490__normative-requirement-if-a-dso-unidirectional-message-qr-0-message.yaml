document: rfc-8490
kind: normative-requirement
summary: If a DSO unidirectional message (QR=0, MESSAGE ID=0) is received containing an unrecognized Primary TLV, this is a fatal error and the recipient MUST forcibly abort the connection immediately. A DSOTYPENI error MUST NOT be returned in this case.
section: 5.4.5
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
