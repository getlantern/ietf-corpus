document: rfc-8419
kind: security-consideration
summary: Implementations must protect the EdDSA private key; compromise may allow signature forgery. Private key generation relies on quality random numbers, and inadequate PRNGs can result in little or no security — RFC 4086 provides guidance.
section: "5"
topics:
