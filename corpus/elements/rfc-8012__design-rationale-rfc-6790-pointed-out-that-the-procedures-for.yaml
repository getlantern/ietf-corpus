document: rfc-8012
kind: design-rationale
summary: RFC 6790 pointed out that the procedures for Multipath Information Type {9} in RFC 4379 are incomplete because the specific location of the label being varied was not defined. It was incorrectly assumed that Multipath Type {9} implied variation of the bottom-of-stack label. This document clarifies that Type {9} applies to the first label corresponding to an EL-FEC, falling back to the bottom-of-stack label if none is found.
section: "2"
topics:
    - mpls
    - routing
