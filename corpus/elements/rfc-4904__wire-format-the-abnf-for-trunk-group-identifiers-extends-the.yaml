document: rfc-4904
kind: wire-format
summary: 'The ABNF for trunk group identifiers extends the ''par'' production of the tel URI: ''trunk-group = ";tgrp=" trunk-group-label'' and ''trunk-context = ";trunk-context=" descriptor''. The trunk-group-label allows unreserved, escaped, and trunk-group-unreserved characters (''/'', ''&'', ''+'', ''$'').'
