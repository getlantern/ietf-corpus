document: rfc-5417
kind: normative-requirement
summary: In security-sensitive environments, the DHCP-based AC discovery options defined in this document SHOULD NOT be the only methods used to determine which AC a WTP should connect to, because the DHCP exchange is typically neither integrity-protected nor origin-authenticated.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - security
