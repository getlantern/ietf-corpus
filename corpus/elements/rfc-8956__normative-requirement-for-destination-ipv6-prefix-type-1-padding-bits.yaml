document: rfc-8956
kind: normative-requirement
summary: For Destination IPv6 Prefix (Type 1), padding bits MUST be set to 0 on NLRI encoding and MUST be ignored during decoding. If length=0 and offset=0 the component matches every address; otherwise length MUST be in the range offset < length < 129 or the component is malformed.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
