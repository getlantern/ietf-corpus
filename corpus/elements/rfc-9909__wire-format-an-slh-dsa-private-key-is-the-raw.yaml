summary: 'An SLH-DSA private key is the raw concatenation of four n-byte elements: SK.seed || SK.prf || PK.seed || PK.root, yielding 4*n bytes total. In OneAsymmetricKey the privateKey OCTET STRING contains this raw encoding without ASN.1 wrapping.'
