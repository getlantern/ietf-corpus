document: rfc-6602
kind: protocol-element
summary: A Bulk Binding Update Group is a set of mobility sessions sharing a common group identifier maintained independently by both the MAG and LMA. Each peer assigns its own local group identifier, which is exchanged during initial session establishment via the Mobile Node Group Identifier option.
