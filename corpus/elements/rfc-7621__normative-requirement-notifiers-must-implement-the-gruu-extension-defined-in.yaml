document: rfc-7621
kind: normative-requirement
summary: Notifiers MUST implement the GRUU extension defined in RFC 5627. Notifiers MUST use a GRUU as their local target for all dialog-forming methods and all target-refresh methods, except for dialogs where they will reject all subscription requests (implicit or explicit).
section: "2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
