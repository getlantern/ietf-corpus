document: rfc-3220
kind: normative-requirement
summary: A mobile node registering a foreign agent care-of address MUST register via that foreign agent. If using a co-located care-of address without an 'R' bit requirement, the mobile node MUST register directly with its home agent. When returning home, the mobile node MUST register (deregister) directly with the home agent.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
