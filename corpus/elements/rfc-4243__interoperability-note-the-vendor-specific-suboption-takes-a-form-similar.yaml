document: rfc-4243
kind: interoperability-note
summary: The Vendor-Specific suboption takes a form similar to the Vendor-Identifying Vendor-Specific Option (RFC 3925), using the same IANA Enterprise Number registry. Vendors using this suboption are encouraged to document their usage to enable interoperability.
