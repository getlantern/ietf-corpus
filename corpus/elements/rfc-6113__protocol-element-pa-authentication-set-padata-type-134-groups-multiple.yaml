document: rfc-6113
kind: protocol-element
summary: PA-AUTHENTICATION-SET (padata type 134) groups multiple pre-authentication mechanisms that must all complete successfully to authenticate a client. Each PA-AUTHENTICATION-SET-ELEM contains pa-type (Int32), optional pa-hint (OCTET STRING giving mechanism guidance), and optional pa-value (OCTET STRING, present only for the first element, carrying the first KDC-to-client padata-value).
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
