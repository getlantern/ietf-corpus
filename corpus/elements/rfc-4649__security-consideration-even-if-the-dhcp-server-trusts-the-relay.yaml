document: rfc-4649
kind: security-consideration
summary: Even if the DHCP server trusts the relay agent, confidence in the remote-id information is no higher than the relay agent's own confidence in it. Clients may be able to spoof port identifiers, caller ID, or other data carried in this option, so sites should evaluate spoofing risk before relying on it.
section: "6"
topics:
    - security
    - ip
