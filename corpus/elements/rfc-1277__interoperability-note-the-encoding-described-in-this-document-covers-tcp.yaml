document: rfc-1277
kind: interoperability-note
summary: The encoding described in this document covers TCP/IP networks using RFC 1006 and X.25(80) mappings of COTS where X.25 carries only DTE (not Network Address). It is not applicable where CONS or CLNS provides COTS or CLTS.
