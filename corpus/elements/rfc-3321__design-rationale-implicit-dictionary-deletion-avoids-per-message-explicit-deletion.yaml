document: rfc-3321
kind: design-rationale
summary: Implicit dictionary deletion avoids per-message explicit deletion signaling by agreeing on a well-defined deletion algorithm (e.g., part of predefined UDVM bytecode) applied identically at both endpoints. This reduces signaling overhead and increases robustness by eliminating bits on the wire subject to transmission errors.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
