document: rfc-4488
kind: wire-format
summary: 'The Refer-Sub header field syntax is: ''Refer-Sub = "Refer-Sub" HCOLON refer-sub-value *(SEMI exten)'' where refer-sub-value is ''true'' or ''false'', and exten is a generic-param. It is valid only in REFER requests and corresponding 2xx responses.'
