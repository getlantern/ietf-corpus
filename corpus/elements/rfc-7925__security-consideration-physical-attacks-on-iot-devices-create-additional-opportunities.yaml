document: rfc-7925
kind: security-consideration
summary: Physical attacks on IoT devices create additional opportunities to compromise long-term cryptographic material. PFS ciphersuites prevent an attacker from decrypting past communications after a key compromise, but this property is undermined if ephemeral DH keys are reused across sessions.
section: "9"
topics:
