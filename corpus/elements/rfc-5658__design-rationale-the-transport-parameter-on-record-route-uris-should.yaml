document: rfc-5658
kind: design-rationale
summary: The transport parameter on Record-Route URIs SHOULD NOT be included unless the proxy knows all downstream elements support that transport. If an intermediate proxy (P2) is not Record-Routing, a downstream SIP element may be forced to use a transport it does not support to reach the upstream proxy.
section: "6.2"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
