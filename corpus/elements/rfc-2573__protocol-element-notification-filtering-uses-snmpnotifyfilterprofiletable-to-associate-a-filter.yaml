document: rfc-2573
kind: protocol-element
summary: Notification filtering uses snmpNotifyFilterProfileTable to associate a filter profile name with a snmpTargetParamsEntry, and snmpNotifyFilterTable to define subtree-based inclusion/exclusion rules. A notification is sent to a target only if the notification's OID and variable-binding OIDs are permitted by the filter profile associated with that target's parameter entry.
section: "6"
topics:
    - snmp
