document: rfc-5760
kind: design-rationale
summary: The RTCP Bandwidth sub-report block (SRBT=11) was designed to allow the Distribution Source to mask the actual receiver group size from receivers while still preventing feedback implosion. This enables the Distribution Source to independently control feedback rates without revealing potentially sensitive membership information.
section: 7.1.12
topics:
    - rtp
    - realtime
    - privacy
