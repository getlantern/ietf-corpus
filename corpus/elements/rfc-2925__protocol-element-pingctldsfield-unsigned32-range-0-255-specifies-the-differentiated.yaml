document: rfc-2925
kind: protocol-element
summary: pingCtlDSField (Unsigned32, range 0–255) specifies the Differentiated Services field (TOS in IPv4, Traffic Class in IPv6) to set in probe packets; a value of 0 indicates the feature is unsupported. An equivalent traceRouteCtlDSField object exists in the traceroute MIB.
section: "4.1"
topics:
    - snmp
    - diffserv
    - measurement
