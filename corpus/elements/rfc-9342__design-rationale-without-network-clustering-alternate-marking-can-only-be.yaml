document: rfc-9342
kind: design-rationale
summary: Without network clustering, Alternate Marking can only be applied to the entire network or per single flow. Network clustering allows partitioning the network into clusters at different levels, enabling flexible and optimized performance measurement. This reduces the order of magnitude of packet counters from n*m*2 (for n measurement points and m flows) to a much smaller set.
section: "1"
topics:
    - measurement
