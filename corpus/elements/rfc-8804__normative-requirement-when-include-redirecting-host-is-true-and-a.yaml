document: rfc-8804
kind: normative-requirement
summary: When 'include-redirecting-host' is true and a path-prefix is used, the uCDN redirecting host MUST be added as a separate path segment after the path-prefix and before the original URL path. If true with no path-prefix, the uCDN redirecting host MUST be prepended as the first path segment.
section: "2.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
