document: rfc-2320
kind: design-rationale
summary: InATMARP retransmission timeout and retry count are not controlled by ipoaLisTable objects and are considered implementation-dependent; a timeout of 60 seconds with retry count of 3 is suggested for SVCs, while PVC retry limits may need to be infinite to ensure eventual processing.
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
