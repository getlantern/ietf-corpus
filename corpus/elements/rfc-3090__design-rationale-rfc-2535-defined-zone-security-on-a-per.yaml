document: rfc-3090
kind: design-rationale
summary: RFC 2535 defined zone security on a per-algorithm basis (e.g., secured with RSA but not DSA). RFC 3090 changes this so a zone is either secured or unsecured regardless of which key algorithms are used, simplifying zone status determination.
section: "1"
topics:
    - dns
    - security
