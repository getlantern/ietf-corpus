document: rfc-7293
kind: protocol-element
summary: The RRVS SMTP extension adds an EHLO keyword 'RRVS' and a new parameter to the RCPT command. The parameter value is a date-time timestamp indicating when the sender last confirmed the recipient mailbox was under continuous ownership. An optional no-support action ('R' for reject, 'C' for continue) may follow a semicolon.
section: "3.1"
topics:
    - email
