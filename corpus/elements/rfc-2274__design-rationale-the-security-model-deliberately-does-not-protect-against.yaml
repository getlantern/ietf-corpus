document: rfc-2274
kind: design-rationale
summary: The security model deliberately does not protect against denial-of-service or traffic analysis. DoS attacks are largely indistinguishable from normal network failures that management protocols must tolerate anyway, and traffic patterns in SNMP are predictable and regular, making traffic analysis protection of low value.
section: "1.1"
topics:
    - snmp
    - security
