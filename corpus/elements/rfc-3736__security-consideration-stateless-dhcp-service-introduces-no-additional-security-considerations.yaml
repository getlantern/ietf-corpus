document: rfc-3736
kind: security-consideration
summary: Stateless DHCP service introduces no additional security considerations beyond those discussed in sections 21, 22.11, and 23 of RFC 3315. Configuration information provided through stateless DHCP may be used to mount spoofing, man-in-the-middle, denial-of-service, and other attacks.
section: "7"
topics:
