document: rfc-8706
kind: normative-requirement
summary: All flag combinations in the Restart TLV where multiple flags are set are invalid except the combination of RR and SA as described in Section 3.3.2. Such invalid combinations MUST NOT be transmitted; received TLVs with invalid flag combinations MUST be ignored.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
