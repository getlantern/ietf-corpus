document: rfc-3413
kind: normative-requirement
summary: A row in snmpTargetAddrTable cannot be made active until snmpTargetAddrTDomain, snmpTargetAddrTAddress, and snmpTargetAddrParams are all configured. While active(1), snmpTargetAddrTDomain and snmpTargetAddrTAddress may not be modified (attempt returns inconsistentValue).
section: 4.1.2
rfc2119_level: MUST NOT
topics:
    - snmp
