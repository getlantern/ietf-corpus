document: rfc-8531
kind: interoperability-note
summary: MPLS-TP MEP-ID can be a variable-length label (G-ACH encapsulation) or a 2-octet unsigned integer (IP/UDP encapsulation). The base model's choice/case int32 definition for MEP-ID accommodates the MPLS-TP case without modification, but MPLS-TP-specific session and interface extensions are added via augmentation.
section: 7.2.3
topics:
