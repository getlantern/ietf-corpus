document: rfc-7453
kind: protocol-element
summary: MplsNodeId is an Unsigned32 TEXTUAL-CONVENTION for the MPLS-TP Node_ID, scoped within a Global_ID or ICC_Operator_ID. It may be derived from an IPv4 loopback address or be an arbitrary 32-bit value; the value 0 indicates an invalid Node_ID.
