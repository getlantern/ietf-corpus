document: rfc-3231
kind: design-rationale
summary: Calendar bit-fields use an OR within each object and AND across objects. This design allows compact expression of complex schedules (e.g., every Monday and Friday in June and July) without requiring enumeration of each individual date-time combination.
section: "3.2"
