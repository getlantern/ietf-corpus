document: rfc-1519
kind: protocol-element
summary: A 'sink route' is installed by a border router for each of its aggregated address blocks. By longest-match, traffic destined to components of the aggregation that are not explicitly reachable is forwarded to the sink and discarded, preventing routing loops.
section: "4.2"
topics:
