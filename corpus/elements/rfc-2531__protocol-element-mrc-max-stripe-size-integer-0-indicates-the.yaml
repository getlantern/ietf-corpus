document: rfc-2531
kind: protocol-element
summary: MRC-max-stripe-size (Integer >0) indicates the maximum scan lines per MRC stripe when MRC-mode>=1. Legal constraints are MRC-max-stripe-size=[0..256] or MRC-max-stripe-size>=0; actual stripe size may vary per stripe and is indicated in the image data.
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
