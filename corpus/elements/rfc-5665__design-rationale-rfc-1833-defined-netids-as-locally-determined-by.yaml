document: rfc-5665
kind: design-rationale
summary: RFC 1833 defined netids as locally determined by system administrators with no guarantee of cross-system consistency. Protocols such as NFSv4.0 and RPC/RDMA were subsequently found to depend on consistent netid values and uaddr representations across systems, motivating the creation of IANA registries to formalize and standardize these values.
section: "1"
topics:
    - registry
