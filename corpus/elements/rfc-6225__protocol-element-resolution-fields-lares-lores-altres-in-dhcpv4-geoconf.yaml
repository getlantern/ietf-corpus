document: rfc-6225
kind: protocol-element
summary: Resolution fields (LaRes, LoRes, AltRes) in DHCPv4 GeoConf Option 123 are 6-bit unsigned integers indicating the number of high-order bits that are valid. Bits beyond the resolution limit MUST NOT be considered valid and may be zeroed or purposely false.
section: 2.3.1
topics:
