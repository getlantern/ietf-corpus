document: rfc-5261
kind: normative-requirement
summary: The agent parsing the diff document MUST resolve namespace prefixes separately in both the diff and target documents in order to match the resulting QNames. The XML diff document MUST contain declarations for all namespaces used within it.
section: "4.2"
rfc2119_level: MUST
