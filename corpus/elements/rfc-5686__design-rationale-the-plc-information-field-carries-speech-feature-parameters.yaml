document: rfc-5686
kind: design-rationale
summary: The PLC information field carries speech feature parameters (pitch, VAD, power) for a past frame identified by offset K, rather than for the current frame. This design choice maintains speech quality by allowing the decoder to use PLC parameters associated with a prior frame during packet loss recovery.
