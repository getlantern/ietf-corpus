document: rfc-4821
kind: normative-requirement
summary: 'All links MUST enforce their MTU: links that might non-deterministically deliver packets larger than their rated MTU MUST consistently discard such packets. This is the only requirement PLPMTUD places on lower layers.'
section: "4"
rfc2119_level: MUST
topics:
