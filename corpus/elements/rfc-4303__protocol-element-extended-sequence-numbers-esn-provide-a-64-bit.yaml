document: rfc-4303
kind: protocol-element
summary: Extended Sequence Numbers (ESN) provide a 64-bit sequence number for high-speed implementations. Only the low-order 32 bits are transmitted in the ESP header; the high-order 32 bits are maintained locally and included in the ICV computation but not transmitted (for separate integrity algorithms).
section: 2.2.1
topics:
    - ipsec
    - security
