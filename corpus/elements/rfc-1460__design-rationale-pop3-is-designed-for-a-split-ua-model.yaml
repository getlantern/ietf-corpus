document: rfc-1460
kind: design-rationale
summary: 'POP3 is designed for a split-UA model: the client host acts as a user agent for mail retrieval (POP3) while using SMTP to post mail, with both UA functions split across two hosts. The client should NOT be regarded as a ''trusted'' MTS entity.'
