document: rfc-4204
kind: normative-requirement
summary: Implementations MUST use exponential back-off procedures or their equivalent for retransmission of unacknowledged messages. Suggested defaults are Ri=500ms, Delta=1 (power-of-2 back-off), and retry limit Rl=3.
section: "10"
rfc2119_level: MUST
topics:
    - routing
