document: rfc-9716
kind: normative-requirement
summary: When an ASBR is configured to build the return path dynamically, it MUST set the Reply Path Return Code to 0x0006 in the echo reply. If the ASBR's local policy prohibits dynamic return path building, it MUST set the Return Code to 0x0007.
section: 5.5.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
