document: rfc-9777
kind: normative-requirement
summary: MLDv2 implementations MUST NOT include any auxiliary data (Aux Data Len MUST be set to zero) in transmitted Multicast Address Records, and MUST ignore any auxiliary data present in received records. Auxiliary data semantics are reserved for future MLD extensions.
section: 5.2.11
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
