document: rfc-5989
kind: normative-requirement
summary: NOTIFY message bodies for the http-monitor event package SHOULD contain at least one of an ETag or Content-MD5 header field (unless returning null state), and including a Last-Modified header field is RECOMMENDED. The message/http body MUST contain a Content-Location field identifying the monitored resource.
section: 4.5.1
rfc2119_level: MUST
topics:
    - sip
    - http
