document: rfc-7159
kind: interoperability-note
summary: String comparison SHOULD be performed by converting to Unicode code unit sequences and comparing numerically. Implementations that compare escaped and unescaped forms without normalization may incorrectly find 'a\\b' and 'a\u005Cb' unequal.
section: "8.3"
topics:
