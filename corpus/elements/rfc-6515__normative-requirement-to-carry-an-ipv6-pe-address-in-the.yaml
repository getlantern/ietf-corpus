document: rfc-6515
kind: normative-requirement
summary: To carry an IPv6 PE address in the VRF Route Import Extended Community, an 'IPv6 Address Specific Extended Community' of type 'VRF Route Import' MUST be used rather than the IPv4 Address Specific form. This applies regardless of whether the extended community is attached to a VPN-IPv4 or VPN-IPv6 unicast route.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
