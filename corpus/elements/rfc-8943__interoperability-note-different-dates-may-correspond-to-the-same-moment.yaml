document: rfc-8943
kind: interoperability-note
summary: Different dates may correspond to the same moment in time depending on the time zone in which the date was determined (e.g., Japan's Friday may simultaneously be Hawaii's Thursday). Comparing dates with date/time values is out of scope for this specification.
