document: rfc-3056
kind: security-consideration
summary: By default, 6to4 traffic is accepted from any IPv4 source that is otherwise permitted. If IPv6 spoofing is considered a greater risk than IPv4 spoofing, additional source-address filtering may be applied at the 6to4 router.
