document: rfc-1657
kind: protocol-element
summary: 'bgp4PathAttrCalcLocalPref (INTEGER -1..2147483647) is the locally calculated degree of preference for an advertised route as determined by the receiving BGP-4 speaker; -1 indicates absence. bgp4PathAttrBest indicates whether this route was chosen as the best BGP-4 route: false(1) or true(2).'
