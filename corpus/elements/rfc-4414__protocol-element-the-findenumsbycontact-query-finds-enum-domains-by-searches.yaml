document: rfc-4414
kind: protocol-element
summary: The <findEnumsByContact> query finds ENUM domains by searches on contact fields, supporting search by contactHandle or contactSearchGroup fields, with an optional <role> element to constrain by the contact's role (registrant, billingContact, technicalContact, etc.) and optional <language> hints.
