document: rfc-1990
kind: protocol-element
summary: A bundle is the virtual PPP link-layer entity combining multiple physical links between a fixed pair of systems, named by the pair of system identifiers. All fragments received on any member link are presented to a single network-layer protocol processing machine whether or not they carry multilink headers.
