document: rfc-3367
kind: normative-requirement
summary: All URIs used within the CNRP protocol MUST adhere to the 'absoluteURI' production found in the ABNF of RFC 2396. CNRP does not define the semantics of a Base and is not capable of expressing the 'URI-Reference' production.
section: "2.3"
rfc2119_level: MUST
topics:
    - dns
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
