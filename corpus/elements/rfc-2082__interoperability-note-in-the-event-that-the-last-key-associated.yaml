document: rfc-2082
kind: interoperability-note
summary: In the event that the last key associated with an interface expires, it is unacceptable to revert to an unauthenticated condition. The router should notify the network manager and treat the key as having an infinite lifetime until a new key is configured, to avoid disrupting routing.
section: "4.3"
topics:
    - routing
    - security
