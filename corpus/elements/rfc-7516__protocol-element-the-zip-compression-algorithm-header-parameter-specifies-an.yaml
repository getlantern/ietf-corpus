document: rfc-7516
kind: protocol-element
summary: The 'zip' (Compression Algorithm) Header Parameter specifies an algorithm applied to the plaintext before encryption. The value 'DEF' denotes DEFLATE compression. When used, 'zip' MUST occur only within the JWE Protected Header so it is integrity protected. Use is OPTIONAL but MUST be understood and processed.
section: 4.1.3
topics:
    - jose
    - crypto
