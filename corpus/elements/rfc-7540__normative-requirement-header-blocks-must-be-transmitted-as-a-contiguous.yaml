document: rfc-7540
kind: normative-requirement
summary: Header blocks MUST be transmitted as a contiguous sequence of frames with no intervening frames of any other type or from any other stream. Extension frames appearing inside a header block MUST be treated as a connection error of type PROTOCOL_ERROR. A HEADERS frame without END_HEADERS MUST be immediately followed by a CONTINUATION frame on the same stream.
section: "4.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
