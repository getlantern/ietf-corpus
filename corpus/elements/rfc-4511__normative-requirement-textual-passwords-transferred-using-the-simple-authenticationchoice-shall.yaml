document: rfc-4511
kind: normative-requirement
summary: Textual passwords transferred using the simple AuthenticationChoice SHALL be transferred as UTF-8 encoded Unicode. Prior to transfer, clients SHOULD prepare text passwords as 'query' strings by applying the SASLprep (RFC 4013) profile of the stringprep (RFC 3454) algorithm.
section: "4.2"
rfc2119_level: SHALL
topics:
    - ldap
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
