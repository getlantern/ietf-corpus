summary: 'The Join/Prune message encodes multiple groups per packet: PIM header, unicast upstream neighbor address (variable), 1 reserved octet, Number of Groups (1 octet), Hold Time (2 octets), then per-group records each with encoded group address, joined source count (2 octets), pruned source count (2 octets), and source lists.'
