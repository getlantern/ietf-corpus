document: rfc-6030
kind: wire-format
summary: Key values in <PlainValue> and <EncryptedValue> are encoded as xs:base64Binary (OCTET STRING). For AES keys, the first octet of the OCTET STRING maps to AES key byte index 0 (MSB-first per FIPS 197 Section 5.2). This encoding is the default for all algorithms unless the algorithm specification states otherwise.
section: 4.2.1
topics:
    - crypto
    - security
