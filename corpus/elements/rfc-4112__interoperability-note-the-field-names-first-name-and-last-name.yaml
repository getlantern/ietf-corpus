document: rfc-4112
kind: interoperability-note
summary: The field names 'first_name' and 'last_name' are retained from ECML v1.x for compatibility, but 'last_name' should be understood as family/inherited name(s) and 'first_name' as the first given name, diverging from the literal English interpretation.
section: 2.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
