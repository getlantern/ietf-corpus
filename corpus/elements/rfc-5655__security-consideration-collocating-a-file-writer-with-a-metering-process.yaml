document: rfc-5655
kind: security-consideration
summary: Collocating a File Writer with a Metering Process is the only way to provide positive cryptographic authentication of a Metering Process through CMS signatures. When the File Writer is collocated only with a Collecting Process, the chain of custody from the Metering Process cannot be cryptographically verified.
section: 7.3.2
topics:
    - security
    - measurement
