document: rfc-2402
kind: normative-requirement
summary: If ICV validation fails, the receiver MUST discard the received IP datagram as invalid; this is an auditable event. The receive window is updated only if ICV verification succeeds.
section: 3.4.4
rfc2119_level: MUST
