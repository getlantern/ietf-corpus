document: rfc-9528
kind: design-rationale
summary: EDHOC uses the MAC-then-Sign variant of SIGMA-I (the same construction as IKEv2 and TLS 1.3) to provide identity protection for the Initiator against active attacks. SIGMA-I specifically protects the protocol initiator's identity, as the Responder authenticates first in the exchange.
section: "2"
topics:
