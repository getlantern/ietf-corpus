document: rfc-4434
kind: interoperability-note
summary: When used with IKEv2, AES-XCBC-PRF-128 is treated as fixed-length for generating keying material (half bits from Ni, half from Nr per IKEv2 section 2.14) but variable-length for authentication with shared secrets (IKEv2 section 2.16), allowing interoperability between RFC 3664 fixed-length-key implementations and RFC 4434 variable-length-key implementations.
section: "1.1"
topics:
    - ipsec
    - crypto
    - vpn
