document: rfc-6533
kind: interoperability-note
summary: RFC 6533 obsoletes RFC 5337 (Experimental) by removing the embedded alternative ASCII address syntax within utf-8-address (the '<addr <addr>>' form is no longer permitted) and aligning ABNF with RFC 6531; media type names from RFC 5337 are preserved unchanged.
