document: rfc-9358
kind: normative-requirement
summary: An LSP MUST NOT belong to more than one VNAG. If an implementation encounters more than one VNAG object in a PCEP message, it MUST process the first occurrence and MUST ignore the others.
section: "3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
