document: rfc-1196
kind: security-consideration
summary: Allowing an RUIP to execute a user program in response to a Finger query is potentially dangerous. The RUIP MUST NOT allow system security to be compromised by such a program. Operating system bugs could be exploited via this mechanism, and the feature may not be worth the risk.
section: 3.2.5
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
