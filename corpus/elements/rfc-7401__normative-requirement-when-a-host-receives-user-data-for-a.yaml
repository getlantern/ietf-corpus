document: rfc-7401
kind: normative-requirement
summary: When a host receives user data for a non-existing HIP association it MUST discard the packet. Any ICMP responses sent to inform the sender MUST be rate-limited to prevent abuse.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - ip
