document: rfc-4790
kind: normative-requirement
summary: The protocol MUST specify whether it allows wildcards in collation identifiers. If wildcards are allowed, the protocol MUST specify how comparisons behave in the absence of explicit collation negotiation or when 'default' is requested.
section: "5.3"
rfc2119_level: MUST
