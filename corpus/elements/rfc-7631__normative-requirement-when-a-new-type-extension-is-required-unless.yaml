document: rfc-7631
kind: normative-requirement
summary: When a new type extension is required, unless there are reasons to the contrary, the next consecutive type extension SHOULD be allocated and given a name. Reasons to deviate MAY include maintaining correspondence between Packet, Message, and Address Block TLVs, or reserving type extension zero if not yet allocated.
section: "3.1"
rfc2119_level: RECOMMENDED
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
