document: rfc-2790
kind: security-consideration
summary: SNMPv1 is not a secure environment; even with network-layer security such as IPsec, SNMPv1 provides no access control over who may GET or SET MIB objects. Implementors should use SNMPv3.
section: "7"
topics:
