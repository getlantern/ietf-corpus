document: rfc-7104
kind: design-rationale
summary: The 'ssrc-group' attribute (RFC 5576) is used instead of 'group' for SSRC-multiplexed streams because SSRC-multiplexed streams are defined within the same 'm' line, and the session-level 'group' attribute cannot reference streams within a single media description.
