document: rfc-3456
kind: state-machine
summary: 'Configuration proceeds through five steps: (a) establish IKE Phase 1 SA; (b) establish DHCP tunnel mode SA via quick mode; (c) exchange DHCP messages over the DHCP SA to obtain virtual address; (d) optionally delete DHCP SA or retain it; (e) establish new tunnel mode SA using the assigned address. The remote host is ready to communicate with the intranet after step (e).'
section: "3.1"
topics:
    - ipsec
    - vpn
