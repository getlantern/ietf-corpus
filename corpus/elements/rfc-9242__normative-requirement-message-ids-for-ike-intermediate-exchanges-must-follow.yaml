document: rfc-9242
kind: normative-requirement
summary: 'Message IDs for IKE_INTERMEDIATE exchanges MUST follow the standard IKEv2 rule: 1 for the first exchange, 2 for the next, etc. Implementations MUST verify received Message IDs follow this rule. The first IKE_AUTH pair uses a Message ID one greater than the last IKE_INTERMEDIATE exchange.'
section: "3.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
