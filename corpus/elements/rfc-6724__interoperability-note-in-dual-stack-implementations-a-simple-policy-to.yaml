document: rfc-6724
kind: interoperability-note
summary: In dual-stack implementations, a simple policy to always prefer IPv6 or always prefer IPv4 produces poor behavior. The destination address selection algorithm provides a unified procedure that selects IPv6 or IPv4 based on available source addresses — e.g., preferring IPv4 when only a link-local IPv6 source but a global IPv4 source is available.
section: "1"
topics:
