document: rfc-7199
kind: security-consideration
summary: Policy URIs function as shared secrets; clients SHOULD protect them as passwords. Policy URIs SHOULD NOT be transmitted to other hosts or stored in plaintext, as any holder of the URI is authorized to access and modify the referenced policy.
section: "7.4"
topics:
    - security
    - privacy
