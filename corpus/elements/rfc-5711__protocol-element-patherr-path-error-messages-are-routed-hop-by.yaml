document: rfc-5711
kind: protocol-element
summary: PathErr (Path Error) messages are routed hop-by-hop upstream toward the head-end of the TE LSP using the path state established when the Path message was routed. They carry an ERROR_SPEC object that includes the IP address of the detecting node, an Error Code field, and an Error Value field.
section: "2"
topics:
    - mpls
    - routing
