document: rfc-4433
kind: normative-requirement
summary: While requesting dynamic HA assignment and registering directly with an HA using co-located CoA, the Requested HA Extension MUST be included and MUST contain the address of the HA to which the Registration Request is sent. The HA address in the extension MUST match the destination IP of the Request.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
