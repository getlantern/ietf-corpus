document: rfc-8482
kind: design-rationale
summary: Returning a subset of available RRsets in response to ANY is legitimate and consistent with RFC 1035, which can be read as meaning ANY does not always mean ALL (Section 3.2.3 of RFC 1035). The TC bit SHOULD NOT be set in such responses to indicate this is not a complete answer.
section: "7"
topics:
