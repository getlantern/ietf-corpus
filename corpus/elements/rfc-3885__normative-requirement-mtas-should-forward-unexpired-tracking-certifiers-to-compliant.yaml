document: rfc-3885
kind: normative-requirement
summary: MTAs SHOULD forward unexpired tracking certifiers to compliant mailers during hop-to-hop transfers. If the downstream MTA is not MTRK-compliant, the MTRK= parameter MUST be deleted.
