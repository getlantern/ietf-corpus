document: rfc-3023
kind: design-rationale
summary: 'New XML-specific MIME types were created rather than reusing text/sgml or application/sgml for three reasons: many XML processors cannot handle SGML''s larger feature set; SGML processors may not handle XML''s technical corrigenda; and the SGML type definitions include SGML-bctf and SGML-boot parameters that are irrelevant and ambiguous for XML.'
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
