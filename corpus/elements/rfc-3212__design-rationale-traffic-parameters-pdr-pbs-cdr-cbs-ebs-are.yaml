document: rfc-3212
kind: design-rationale
summary: Traffic parameters (PDR, PBS, CDR, CBS, EBS) are encoded as 32-bit IEEE single-precision floating-point numbers; positive infinity (exponent all-ones, sign and mantissa all-zeros) represents an unlimited/unconstrained value, simplifying the encoding of best-effort and unconstrained parameters.
