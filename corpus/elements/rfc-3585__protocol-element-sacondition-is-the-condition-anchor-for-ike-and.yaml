document: rfc-3585
kind: protocol-element
summary: SACondition is the condition anchor for IKE and IPsec rules. Condition components that lack a corresponding runtime value are evaluated as TRUE, unless the protocol completed without providing the required information. Each SACondition MUST be associated with exactly one FilterList via FilterOfSACondition.
section: "5.1"
topics:
    - ipsec
    - security
