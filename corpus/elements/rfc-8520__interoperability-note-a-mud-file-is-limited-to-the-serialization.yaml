document: rfc-8520
kind: interoperability-note
summary: A MUD file is limited to the serialization of only ietf-access-control-list (RFC 8519), ietf-mud, and ietf-acldns schemas; only match-on-ipv4, match-on-ipv6, match-on-tcp, match-on-udp, match-on-icmp ACL features are assumed, and only 'accept' or 'drop' forwarding actions SHOULD be included. MUD managers MAY interpret 'reject' as 'drop' and SHOULD ignore other actions.
section: "2"
topics:
    - yang
    - interoperability
