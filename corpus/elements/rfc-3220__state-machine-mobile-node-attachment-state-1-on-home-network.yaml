document: rfc-3220
kind: state-machine
summary: 'Mobile node attachment state: (1) On home network — operates without mobility services; if returning from away, deregisters with home agent. (2) On foreign network — obtains care-of address, registers with home agent (via FA or directly). Transition triggers: receiving Agent Advertisement from home agent (return home), receiving advertisement from different subnet (move detection via Lifetime expiry or Prefix-Lengths mismatch).'
section: "2.4"
topics:
