document: rfc-9431
kind: normative-requirement
summary: Unless a Client publishes/subscribes only to public topics, the Client and Broker MUST perform mutual authentication. The Client MUST authenticate to the Broker (over MQTT or TLS) before performing any other action.
section: 2.2.1
rfc2119_level: MUST
topics:
    - tls
    - oauth
    - security
