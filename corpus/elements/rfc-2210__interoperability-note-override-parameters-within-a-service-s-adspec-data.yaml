document: rfc-2210
kind: interoperability-note
summary: Override parameters within a service's ADSPEC data fragment carry parameter numbers from the general parameter number space (1-127) but appear inside service-specific data blocks (service_numbers 2-254), allowing quick detection by checking whether the fragment length exceeds the standard length for that service.
section: 3.3.5
