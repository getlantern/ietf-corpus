document: rfc-698
kind: design-rationale
summary: Extended ASCII is needed because sites such as SU-AI and MIT-AI use keyboards with nearly all 128 characters as printable, plus one or more additional 'control' bits for command modifiers or to distinguish textual from command input. Without this, characters like the Greek letter beta (which maps to CONTROL-C) cannot be sent as text.
section: "4"
