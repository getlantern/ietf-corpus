document: rfc-4004
kind: design-rationale
summary: All session keys (MN-HA, MN-FA, FA-HA) are generated by the AAAH even when the home agent is dynamically allocated in the foreign network. This centralizes key generation in the home administrative domain regardless of where the HA resides.
