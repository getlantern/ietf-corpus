document: rfc-4209
kind: protocol-element
summary: The Link Group ID sub-object (Type = 3, Length = 8) assigns a 32-bit local ID to a group of data links. Link Group ID 0xFFFFFFFF is reserved and indicates all data links in a TE link; all data links are members of this group by default.
section: 2.3.1
topics:
