kind: wire-format
summary: The Extension-Flags field is 8 bits; each bit set to 1 indicates the presence of a corresponding 4-octet optional field. Optional fields appear after the Reserved field in order from most significant to least significant enabled bit. Every optional field MUST be exactly 4 octets long.
