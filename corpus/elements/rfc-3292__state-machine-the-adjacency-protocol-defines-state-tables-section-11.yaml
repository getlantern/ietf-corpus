summary: The Adjacency Protocol defines state tables (section 11.2.1) for the adjacency state machine, including states for partition information (section 11.3) and loss-of-synchronisation (section 11.4). Multiple controllers per partition are handled by a dedicated Multiple Controller Adjacency Process (section 11.5.1).
