summary: The URI Hash Container is prefixed with 'hash:' followed by a URL Segment form (RFC 6920 Section 5) of the URI. The URI Regular Expression Container is prefixed with 'regex:' followed by a POSIX Extended Regular Expression; the backslash character MUST be escaped as '\\' due to JSON string encoding.
