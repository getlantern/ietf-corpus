document: rfc-3828
kind: normative-requirement
summary: The UDP-Lite header MUST always be covered by the checksum. The Checksum Coverage field MUST be either 0 or at least 8; packets with a value of 1 to 7 MUST be discarded by the receiver.
section: "3.1"
rfc2119_level: MUST
topics:
    - udp
