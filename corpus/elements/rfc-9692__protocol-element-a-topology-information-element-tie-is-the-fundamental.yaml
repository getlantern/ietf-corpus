document: rfc-9692
kind: protocol-element
summary: A Topology Information Element (TIE) is the fundamental unit of topology exchange in RIFT. Every TIE has a direction (North or South) and a type (Node or Prefix); North TIEs carry link-state descriptions of lower levels while South TIEs carry default routes and node descriptions from higher levels.
section: 6.3.1
topics:
