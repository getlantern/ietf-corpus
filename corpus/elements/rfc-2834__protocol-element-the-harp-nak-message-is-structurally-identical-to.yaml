document: rfc-2834
kind: protocol-element
summary: The HARP_NAK message is structurally identical to the received HARP_REQUEST message, with only the operation code changed from HARP_REQUEST (1) to HARP_NAK (10); the message data is copied byte-for-byte. HARP_NAK MUST be implemented.
section: 6.3.2
topics:
