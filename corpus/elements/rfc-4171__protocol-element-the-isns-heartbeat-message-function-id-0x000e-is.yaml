document: rfc-4171
kind: protocol-element
summary: The iSNS Heartbeat message (Function ID 0x000E) is originated by the active iSNS server and sent via IP multicast or broadcast; it carries the active server IP/port, an incrementing counter, and an ordered list of backup server IP addresses and TCP/UDP ports.
section: 2.5.3
topics:
