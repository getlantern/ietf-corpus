document: rfc-2734
kind: normative-requirement
summary: Unicast IP datagrams requiring best-effort delivery SHALL be contained within block write transactions addressed to the source_ID and sender_unicast_FIFO obtained from a 1394 ARP response; asynchronous stream packets SHOULD NOT be used for unicast as they consume channel numbers.
section: "7"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
