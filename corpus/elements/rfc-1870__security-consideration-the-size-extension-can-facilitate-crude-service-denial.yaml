document: rfc-1870
kind: security-consideration
summary: The SIZE extension can facilitate crude service-denial attacks by making it quicker to determine effective attack parameters (server limits) and by streamlining the setup of large-message flood attempts. However, the extension does not introduce vulnerabilities beyond those already present in SMTP.
