document: rfc-2613
kind: protocol-element
summary: 'dataSourceCopyCaps BITS field encodes eight port-copy-specific capabilities: copySourcePort(0), copyDestPort(1), copySrcTxTraffic(2), copySrcRxTraffic(3), countDestDropEvents(4), copyErrFrames(5), copyUnalteredFrames(6), and copyAllGoodFrames(7). Bits conditional on copySourcePort or copyDestPort SHOULD be cleared when the corresponding base capability is absent.'
