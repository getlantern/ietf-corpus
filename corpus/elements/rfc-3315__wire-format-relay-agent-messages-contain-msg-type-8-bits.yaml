summary: 'Relay agent messages contain: msg-type (8 bits), hop-count (8 bits), link-address (128 bits, used by server to identify the client''s link), peer-address (128 bits, address of client or prior relay), and variable-length options. Both Relay-forward and Relay-reply share this format.'
