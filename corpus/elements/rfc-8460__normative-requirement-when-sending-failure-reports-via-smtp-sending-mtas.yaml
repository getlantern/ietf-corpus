document: rfc-8460
kind: normative-requirement
summary: When sending failure reports via SMTP, Sending MTAs MUST NOT honor MTA-STS or DANE TLSA failures for the report delivery session itself, ensuring reports reach their destination even when the normal policy would block the connection.
section: 5.3.1
rfc2119_level: MUST NOT
topics:
