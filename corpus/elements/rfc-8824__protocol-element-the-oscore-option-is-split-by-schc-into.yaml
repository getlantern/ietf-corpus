document: rfc-8824
kind: protocol-element
summary: 'The OSCORE option is split by SCHC into four distinct Field Descriptors for compression: CoAP OSCORE_flags (the flag byte), CoAP OSCORE_piv (Partial Initialization Vector), CoAP OSCORE_kidctx (kid context, including size octet s), and CoAP OSCORE_kid (the key identifier).'
