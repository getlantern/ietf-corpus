document: rfc-9744
kind: normative-requirement
summary: VID normalization MUST be completed prior to MPLS encapsulation on the ingress PE because the VID lookup must be performed at the disposition PE. This requires both imposition and disposition PEs to support VLAN tag manipulation (rewriting, adding, or deleting single or double tags).
section: "3"
rfc2119_level: MUST
topics:
    - vpn
    - routing
