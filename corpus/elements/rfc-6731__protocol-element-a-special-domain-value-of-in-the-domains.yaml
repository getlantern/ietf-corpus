document: rfc-6731
kind: protocol-element
summary: A special domain value of '.' in the 'Domains and networks' field indicates the RDNSS has capability to resolve global names and acts as a default RDNSS. Absence of '.' means the RDNSS only has information for the explicitly listed domains and networks.
section: "4.2"
topics:
