document: rfc-4326
kind: normative-requirement
summary: Each SNDU MUST carry a 32-bit CRC-32 field in its last four bytes. Receivers MUST calculate and verify the CRC; SNDUs with an invalid CRC MUST be discarded and the Receiver MUST enter the Idle State.
section: "4.6"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
