document: rfc-2358
kind: interoperability-note
summary: The ifRcvAddressTable contains all IEEE 802.3 addresses (unicast, multicast, broadcast) for which the interface will receive and forward frames up to higher layers. For MAC bridge ports, it does not include unicast addresses accepted only for forwarding and is not intended as a bridge address filtering mechanism.
