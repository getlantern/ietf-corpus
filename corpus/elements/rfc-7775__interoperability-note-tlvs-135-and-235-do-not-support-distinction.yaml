document: rfc-7775
kind: interoperability-note
summary: TLVs 135 and 235 do not support distinction between internal and external metrics (unlike TLVs 128 and 130). The Prefix Attribute Flags sub-TLV (from draft-ietf-isis-prefix-attributes) reintroduces internal/external route type distinction via X-Flag and R-Flag bits.
