document: rfc-5775
kind: protocol-element
summary: 'An ALC packet consists of: IP Header, UDP Header, LCT Header, FEC Payload ID, and Encoding Symbols. The LCT header carries the Congestion Control Information (CCI) field and the FEC Payload ID uniquely identifies the encoding symbols in the payload.'
