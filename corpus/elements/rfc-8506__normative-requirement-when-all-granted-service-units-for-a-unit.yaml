document: rfc-8506
kind: normative-requirement
summary: When all granted service units for a unit type are spent or the Validity-Time expires, the Diameter Credit-Control client MUST send a new Credit-Control-Request (CC-Request-Type=UPDATE_REQUEST) to the credit-control server.
