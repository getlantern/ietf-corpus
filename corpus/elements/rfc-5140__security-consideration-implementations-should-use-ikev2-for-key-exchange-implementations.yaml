document: rfc-5140
kind: security-consideration
summary: Implementations SHOULD use IKEv2 for key exchange. Implementations employing IKEv2 SHOULD support 3DES-CBC for confidentiality and HMAC-SHA1 for integrity. A transport mode SA is appropriate for protecting the TRIP session between two peer LSs.
