document: rfc-2634
kind: normative-requirement
summary: If a gateway or processor adds a signerInfo to an existing signedData block, it MUST copy the mlExpansionHistory and eSSSecurityLabel attributes from the other signerInfos, to ensure recipients can process those attributes from a verified signerInfo.
section: "1.4"
rfc2119_level: MUST
topics:
    - email
    - security
