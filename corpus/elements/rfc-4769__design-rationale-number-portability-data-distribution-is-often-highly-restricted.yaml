document: rfc-4769
kind: design-rationale
summary: Number portability data distribution is often highly restricted by contract or National Regulatory Authority regulation. Records may be distributed privately within service providers, openly, or on a national basis subject to regulatory policy, and may not be part of the e164.arpa public DNS tree.
section: "2"
topics:
