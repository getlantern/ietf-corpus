document: rfc-4704
kind: wire-format
summary: The Flags field is 1 octet with bits S (bit 0), O (bit 1), and N (bit 2); remaining bits (MBZ) are reserved. S indicates whether server SHOULD perform AAAA RR updates; O indicates server overrode client's S-bit preference; N indicates whether server SHOULD NOT perform any DNS updates.
section: "4.1"
topics:
