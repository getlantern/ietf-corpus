document: rfc-9084
kind: design-rationale
summary: For inter-area prefixes, the Advertising Router field in an ABR's area-scoped LSA is set to the ABR itself, causing the original prefix originator information to be lost during propagation across OSPF areas. These extensions explicitly carry originator identity to survive area boundary crossings.
section: "1"
topics:
    - routing
