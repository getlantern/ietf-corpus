document: rfc-9959
kind: normative-requirement
summary: If congestion (packet loss or ECN-CE) is detected in the Reconnaissance Phase, the sender MUST continue using normal CC to react to the detected congestion and MUST NOT proceed with Careful Resume.
section: "3.2"
rfc2119_level: MUST
topics:
    - congestion
    - ecn
