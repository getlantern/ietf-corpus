document: rfc-9000
kind: registry
summary: 'RFC 9000 establishes four IANA registries: QUIC Versions (4-byte values), QUIC Transport Parameters (variable-length integer codepoints), QUIC Frame Types (variable-length integer codepoints), and QUIC Transport Error Codes (variable-length integer codepoints). Provisional registrations require only a specification; permanent registrations require Standards Action or Expert Review depending on the codepoint range.'
