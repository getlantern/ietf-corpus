document: rfc-2332
kind: protocol-element
summary: 'Client Information Entries (CIEs) are the variable-length records appearing in most NHRP message types and carry: Code (1 byte), Prefix Length (1 byte), Maximum Transmission Unit (2 bytes), Holding Time (2 bytes), Cli Addr T/L (1 byte), Cli SAddr T/L (1 byte), Cli Proto Len (1 byte), Preference (1 byte), followed by variable-length Client NBMA Address, Client NBMA SubAddress, and Client Protocol Address fields.'
