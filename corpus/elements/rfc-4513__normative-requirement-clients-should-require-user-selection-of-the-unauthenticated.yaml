document: rfc-4513
kind: normative-requirement
summary: Clients SHOULD require user selection of the Unauthenticated Authentication Mechanism by means other than empty password input, and SHOULD disallow empty password input in Name/Password Authentication UIs. Servers SHOULD by default fail unauthenticated Bind requests with unwillingToPerform.
section: 5.1.2
rfc2119_level: SHOULD
topics:
    - ldap
    - security
