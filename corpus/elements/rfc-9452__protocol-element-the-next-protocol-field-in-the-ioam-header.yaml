document: rfc-9452
kind: protocol-element
summary: The Next Protocol field in the IOAM header is an 8-bit unsigned integer that determines the type of header following IOAM, with semantics identical to the Next Protocol field in RFC 8300. When multiple IOAM Option-Types are chained, the first uses NP=0x06 to point to the second.
