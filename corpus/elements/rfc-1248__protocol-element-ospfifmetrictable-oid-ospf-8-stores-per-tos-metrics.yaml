document: rfc-1248
kind: protocol-element
summary: ospfIfMetricTable (OID ospf 8) stores per-TOS metrics for non-virtual interfaces; indexed by ospfIfMetricIpAddress, ospfIfMetricAddressLessIf, and ospfIfMetricTOS; the default TOS 0 metric is computed as 10^8 / ifSpeed; metric value 0xFFFF means 'no route via this TOS'.
section: "5.8"
topics:
    - snmp
    - routing
