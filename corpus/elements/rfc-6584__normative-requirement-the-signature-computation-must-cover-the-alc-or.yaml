document: rfc-6584
kind: normative-requirement
summary: The signature computation MUST cover the ALC or NORM header (including all header extensions) and the payload when applicable. The UDP/IP/MAC headers MUST NOT be included. During computation, the Signature field MUST be set to 0.
section: 3.3.1
rfc2119_level: MUST
topics:
    - security
    - crypto
    - multicast
