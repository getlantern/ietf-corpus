document: rfc-3852
kind: protocol-element
summary: PasswordRecipientInfo (specified in RFC 3211) carries the content-encryption key encrypted under a key derived from a password. It contains version (always 0), optional keyDerivationAlgorithm, keyEncryptionAlgorithm, and encryptedKey OCTET STRING.
