document: rfc-9908
kind: normative-requirement
summary: The OID used in the 'type' field of a CSR Attributes element carrying X.509 extensions MUST be id-ExtensionReq (1.2.840.113549.1.9.14), which is the same as pkcs-9-at-extensionRequest from PKCS#9 (RFC 2985). There MUST be only one such attribute in the CsrAttrs structure.
section: "3.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
