document: rfc-8748
kind: normative-requirement
summary: In the <check> command, the <fee:check> element MUST contain one or more <fee:command> elements. The server response MUST contain a <fee:chkData> element with a <fee:currency> element and a <fee:cd> element for each object referenced in the client <check> command.
section: 5.1.1
rfc2119_level: MUST
topics:
    - registry
