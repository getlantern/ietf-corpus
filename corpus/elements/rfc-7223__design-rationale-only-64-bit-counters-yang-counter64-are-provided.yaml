document: rfc-7223
kind: design-rationale
summary: Only 64-bit counters (yang:counter64) are provided in this data model, unlike the IF-MIB which provides both 32-bit and 64-bit versions. This is because today's implementations generally support high-speed interfaces (>20 Mbps) for which 32-bit counters were insufficient.
