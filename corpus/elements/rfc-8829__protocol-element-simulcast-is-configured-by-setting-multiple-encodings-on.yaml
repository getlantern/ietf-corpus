document: rfc-8829
kind: protocol-element
summary: Simulcast is configured by setting multiple encodings on an RtpSender. This is expressed in SDP via an 'a=simulcast' attribute (RFC 8853) with a 'send' simulcast stream description and 'a=rid' attributes (RFC 8851) for each encoding. JSEP currently supports sending simulcast but not receiving it.
section: "3.7"
topics:
