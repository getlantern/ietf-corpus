document: rfc-6425
kind: normative-requirement
summary: 'To identify a P2MP MPLS TE LSP under test, the echo request message MUST carry a Target FEC Stack TLV, and this MUST carry exactly one of two new sub-TLVs: either an RSVP P2MP IPv4 Session sub-TLV or an RSVP P2MP IPv6 Session sub-TLV.'
section: 3.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
