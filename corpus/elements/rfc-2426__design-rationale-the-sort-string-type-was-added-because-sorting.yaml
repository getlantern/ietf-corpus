document: rfc-2426
kind: design-rationale
summary: The SORT-STRING type was added because sorting algorithms would incorrectly order vCards with compound, prefixed, or culturally non-obvious names (e.g., Dutch patronymics, Chinese compound surnames) without an explicit sort key distinct from the display name.
section: 3.6.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
