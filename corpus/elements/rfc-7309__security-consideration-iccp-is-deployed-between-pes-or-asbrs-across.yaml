document: rfc-7309
kind: security-consideration
summary: ICCP is deployed between PEs or ASBRs across domains. The interconnecting network must be well-managed with highly monitored service levels and availability, as ICCP carries control-plane state that governs failover behavior. This must be ensured by the operator.
