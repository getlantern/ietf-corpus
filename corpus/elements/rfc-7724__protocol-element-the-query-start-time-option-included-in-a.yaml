document: rfc-7724
kind: protocol-element
summary: The query-start-time option included in a DHCPACTIVELEASEQUERY request instructs the server to send binding changes that occurred since the specified time (catch-up information), in addition to real-time updates. The requestor SHOULD track the highest base-time received and place it in query-start-time upon reconnection.
section: "7.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
