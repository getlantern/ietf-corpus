document: rfc-9010
kind: state-machine
summary: 'First RUL registration: 6LN sends NS(EARO) → 6LR sends EDAR to 6LBR → 6LBR returns EDAC → 6LR sends DAO(X=0) to root → root sends DAO-ACK → 6LR returns NA(EARO) to 6LN. On refresh: NS(EARO) → DAO(X=1) to root → root proxies EDAR/EDAC to 6LBR → DAO-ACK → NA(EARO).'
section: "9.1"
topics:
    - routing
