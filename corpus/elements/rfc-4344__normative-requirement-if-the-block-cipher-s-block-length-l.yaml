document: rfc-4344
kind: normative-requirement
summary: 'If the block cipher''s block length L is less than 128 bits (e.g., 3DES, Blowfish, CAST-128, IDEA), SSH implementations should follow the original RFC 4253 recommendation: rekey at least once for every gigabyte of transmitted data.'
