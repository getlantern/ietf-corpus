document: rfc-7400
kind: security-consideration
summary: 'Deployments relying solely on MAC-layer security may be vulnerable to compression side-channel attacks: an attacker in radio range who can inject a known value into the same packet as a secret value may recover information about the secret through compression ratio observation. Mitigation: do not expose secret values at the adaptation layer, or use transport/application/IP-layer security instead.'
section: "5"
topics:
    - ip
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
