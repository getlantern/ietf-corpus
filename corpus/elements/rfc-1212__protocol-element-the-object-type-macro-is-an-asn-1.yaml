document: rfc-1212
kind: protocol-element
summary: The OBJECT-TYPE macro is an ASN.1 macro extension defining managed objects. Its TYPE NOTATION consists of mandatory SYNTAX, ACCESS, and STATUS clauses, plus optional DESCRIPTION, REFERENCE, INDEX, and DEFVAL clauses. The VALUE NOTATION yields an ObjectName (object identifier).
