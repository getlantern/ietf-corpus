document: rfc-2428
kind: interoperability-note
summary: EPSV is preferred over PORT/EPRT for firewall traversal because firewalls generally do not allow incoming connections required by the active (PORT/EPRT) mode; passive mode (EPSV) uses only outgoing connections from the client.
