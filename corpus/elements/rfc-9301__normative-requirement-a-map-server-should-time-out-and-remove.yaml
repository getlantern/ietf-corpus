document: rfc-9301
kind: normative-requirement
summary: A Map-Server SHOULD time out and remove an ETR's registration if it has not received a valid Map-Register within the past three minutes. The suggested Map-Register interval is one minute; during 'quick registration' (after restart), up to one message every 20 seconds is allowed for up to five minutes.
section: "8.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
