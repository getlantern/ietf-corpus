document: rfc-1652
kind: protocol-element
summary: An optional BODY parameter is added to the MAIL FROM command. Its value is either '7BIT' (strict RFC 821 compliance) or '8BITMIME' (MIME with arbitrary octet content). Only one BODY parameter may appear in a single MAIL command.
