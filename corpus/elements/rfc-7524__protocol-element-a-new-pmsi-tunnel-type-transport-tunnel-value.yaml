document: rfc-7524
kind: protocol-element
summary: 'A new PMSI Tunnel Type ''Transport Tunnel'' (value 8) is defined, with Tunnel Identifier encoded as a tuple <Source PE Address, Local Number>. The Source PE Address is the address of the PE originating the service A-D route; the Local Number is unique to that PE. Both fields have equal length: 4 octets for IPv4 or 16 octets for IPv6.'
section: "14.1"
topics:
    - mpls
    - bgp
    - registry
