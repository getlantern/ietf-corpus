document: rfc-3518
kind: normative-requirement
summary: Bridge protocols and GARP protocols data units MUST be recognized by checking the destination addresses assigned by IEEE (e.g., 01-80-c2-00-00-00 for STP, 01-80-c2-00-00-20 for GMRP, 01-80-c2-00-00-21 for GVRP).
section: "4.4"
rfc2119_level: MUST
