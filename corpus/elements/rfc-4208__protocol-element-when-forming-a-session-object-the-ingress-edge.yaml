document: rfc-4208
kind: protocol-element
summary: When forming a SESSION_OBJECT, the ingress edge-node includes either the Node-ID of the egress edge-device or the address of one of the egress' numbered TE links. The Extended_Tunnel_ID of the SESSION Object is set to either zero or an address of the ingress edge-device.
