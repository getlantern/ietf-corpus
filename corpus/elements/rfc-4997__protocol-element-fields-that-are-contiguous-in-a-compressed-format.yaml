document: rfc-4997
kind: protocol-element
summary: Fields that are contiguous in a compressed format but non-contiguous in the uncompressed format can be grouped using a colon-separated list to the left of '=:='. The group is presented to the encoding method as a concatenated bit string; the combined length attributes equal the sum of the individual length attributes.
section: "4.5"
