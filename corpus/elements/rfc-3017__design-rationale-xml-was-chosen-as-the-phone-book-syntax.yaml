document: rfc-3017
kind: design-rationale
summary: XML was chosen as the phone book syntax for extensibility (new attributes can be defined as business needs evolve), flexibility (arbitrary data types can be represented cleanly), and potential directory integration (an XML DTD leaves open the option of storing phone books in an LDAP/X.500 directory with minimal incremental effort).
