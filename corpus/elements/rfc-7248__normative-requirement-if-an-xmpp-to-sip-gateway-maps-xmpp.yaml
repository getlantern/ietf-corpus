document: rfc-7248
kind: normative-requirement
summary: If an XMPP-to-SIP gateway maps XMPP <priority/> values, it MUST NOT map negative values to PIDF priority; for positive values it SHOULD treat XMPP priority 0 as PIDF priority 0 and XMPP priority 127 as PIDF priority 1.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
