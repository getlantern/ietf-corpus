document: rfc-4518
kind: normative-requirement
summary: The Prohibit step rejects all Unassigned code points (Table A.1 of RFC 3454), characters that change display properties or are deprecated (Table C.8), Private Use code points (Table C.3), non-character code points (Table C.4), surrogate codes (Table C.5), and REPLACEMENT CHARACTER (U+FFFD). The step fails if any prohibited code point is present.
section: "2.4"
rfc2119_level: REQUIRED
topics:
    - ldap
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
