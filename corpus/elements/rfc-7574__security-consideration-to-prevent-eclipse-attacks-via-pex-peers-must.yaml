document: rfc-7574
kind: security-consideration
summary: To prevent eclipse attacks via PEX, peers MUST ensure that part of their connections are to peers whose addresses came from a trusted and secured tracker. A peer must not obtain all its peer addresses through PEX alone.
section: 12.2.3
topics:
    - security
    - realtime
