document: rfc-3321
kind: design-rationale
summary: Dynamic compression reuses information from previously sent messages. For reliable transports (TCP), reception is guaranteed; for unreliable transports, SigComp's explicit acknowledgement mechanism is needed to confirm state establishment before a compressor can safely reference a state.
