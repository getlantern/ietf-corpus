document: rfc-9221
kind: protocol-element
summary: The Length field in a DATAGRAM frame is a variable-length integer specifying the length of the Datagram Data field in bytes, present only when the LEN bit is set to 1. When LEN=0, Datagram Data extends to the end of the QUIC packet. Zero-length datagrams are allowed.
section: "4"
