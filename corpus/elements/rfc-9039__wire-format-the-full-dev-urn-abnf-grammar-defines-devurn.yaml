summary: The full DEV URN ABNF grammar defines devurn = 'urn:dev:' body componentpart, with body variants for mac, ow, org, os, ops, and other subtypes. Hexstrings use only lowercase hex digits; componentpart uses underscore-separated identifiers for device sub-components.
