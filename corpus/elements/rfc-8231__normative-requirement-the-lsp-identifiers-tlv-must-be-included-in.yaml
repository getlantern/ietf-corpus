document: rfc-8231
kind: normative-requirement
summary: The LSP-IDENTIFIERS TLV MUST be included in the LSP object in PCRpt messages for RSVP-signaled LSPs. If missing, the PCE generates Error-type=6, error-value=11 and closes the session.
section: 7.3.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
