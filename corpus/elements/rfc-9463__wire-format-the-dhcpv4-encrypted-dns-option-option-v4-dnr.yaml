document: rfc-9463
kind: wire-format
summary: The DHCPv4 Encrypted DNS option (OPTION_V4_DNR, code 162) contains one or more DNR Instance Data entries, each with a 16-bit DNR Instance Data Length, 16-bit Service Priority, 8-bit ADN Length, variable-length authentication-domain-name, optional 8-bit Addr Length followed by 4-byte IPv4 addresses, and optional SvcParams. Multiple resolvers are encoded by repeating the DNR Instance Data field.
section: "5.1"
topics:
    - dns
    - ip
