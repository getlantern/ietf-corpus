document: rfc-4585
kind: normative-requirement
summary: After transmitting an Early RTCP packet, a receiver MUST set allow_early=FALSE, MUST update tn=tp+2*T_rr (effectively skipping one regular interval to preserve average RTCP bandwidth), and MUST set tp to the previous tn. allow_early MUST be reset to TRUE when the new tn is reached.
section: 3.5.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
