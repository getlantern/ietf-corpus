document: rfc-5428
kind: security-consideration
summary: The pktcEventLogTable and pktcEventTransmissionStatus objects may expose sensitive operational information. Even read (GET) and notification (NOTIFY) access should be controlled, and SNMP values should be encrypted in transit. SNMPv3 with cryptographic authentication and privacy is explicitly recommended over earlier SNMP versions.
section: "8"
topics:
    - snmp
    - security
    - privacy
