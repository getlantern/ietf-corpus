document: rfc-7783
kind: design-rationale
summary: All RBridges outside the edge group assume that multi-destination packets with Ingress Nickname set to RBv might use any distribution tree advertised by any member of the edge group. This conservative assumption avoids black-holing while permitting flexible tree use across the active-active group.
section: "4.2"
topics:
    - routing
    - multicast
