document: rfc-3291
kind: normative-requirement
summary: MIB modules of the first type (version-neutral management information) SHOULD provide object definitions (e.g., tables) that work with all versions of IP. When revising IPv4-specific MIB modules, old version-specific tables SHOULD be deprecated while new version-neutral tables are defined as 'current'. Multiple parallel tables for different IP versions are strongly discouraged.
section: "1"
rfc2119_level: SHOULD
topics:
    - snmp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
