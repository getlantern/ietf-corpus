document: rfc-7952
kind: design-rationale
summary: Defining annotations in YANG modules was chosen so each annotation is bound to a namespace URI (enabling consistent XML/JSON encoding), annotations are discoverable via YANG module advertisement (e.g., NETCONF hello), and semantics are formally specified via 'description' and 'reference' statements.
