document: rfc-7212
kind: normative-requirement
summary: On multipoint channels, a Source Address TLV is REQUIRED. In IP networks, a Source Address SHOULD be included and set to an IP address of the sending device (interface address when the channel is a link). In non-IP MPLS-TP networks, it SHOULD be set to the channel endpoint identifier.
section: "4.1"
rfc2119_level: REQUIRED
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
