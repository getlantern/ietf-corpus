document: rfc-8485
kind: protocol-element
summary: Primary Credential Usage (C) captures how strongly the user's credential can be verified and how easily it could be spoofed or stolen (e.g., password, biometric, cryptographic hardware). Multiple values may be asserted simultaneously (e.g., for multi-factor authentication), using letters (Ca, Cb, ...) due to lack of natural ordering.
section: "2.2"
topics:
    - oauth
    - security
    - crypto
