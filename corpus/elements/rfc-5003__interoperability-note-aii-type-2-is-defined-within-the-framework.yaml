document: rfc-5003
kind: interoperability-note
summary: AII Type 2 is defined within the framework of the GID FEC element (type 129) from RFC 4447, which also defines AGI semantics. The SAI is <AGI, SAII> and TAI is <AGI, TAII>; the SAI and TAI can be distinct values.
