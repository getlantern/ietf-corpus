document: rfc-7470
kind: normative-requirement
summary: It is NOT RECOMMENDED that standard MIB modules be extended to include detailed information about the content of the Vendor Information object or TLV; the MIB module MAY be extended to report the use of the object or TLV and the Enterprise Numbers they contain.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - routing
