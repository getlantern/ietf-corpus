document: rfc-4733
kind: normative-requirement
summary: SDP descriptions using the telephone-event payload MUST contain an fmtp format attribute listing the event values the receiver can process. The receiver MUST calculate jitter for RTCP receiver reports based on all packets sharing a given timestamp.
section: 2.5.2.1
rfc2119_level: MUST
topics:
