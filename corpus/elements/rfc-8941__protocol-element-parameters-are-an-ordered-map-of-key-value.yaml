document: rfc-8941
kind: protocol-element
summary: Parameters are an ordered map of key/value pairs associated with an Item or Inner List; keys are unique, lowercase-only strings, and values are bare items (non-parameterizable). Implementations MUST provide access to Parameters by both index and key. Parsers MUST support at least 256 parameters and keys of at least 64 characters.
section: 3.1.2
topics:
    - http
