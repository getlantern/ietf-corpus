document: rfc-5891
kind: normative-requirement
summary: Applications resolving DNS names MUST rely on the presence or absence of labels in the DNS to determine validity for strings that pass the explicit lookup checks; applications that decline to process a conforming string are not in conformance with this protocol.
section: "5.4"
rfc2119_level: MUST
topics:
    - dns
