document: rfc-3820
kind: design-rationale
summary: Placing authorization information in Proxy Certificates (rather than purely in Attribute Certificates) is justified because PCs have a lifetime independent of and shorter than the signing EEC, mitigating the 'shortening of PKC useful lifetime' objection raised in RFC 3281 Section 1 against embedding authorization in public key certificates.
section: 5.1.3
topics:
    - pkix
    - security
