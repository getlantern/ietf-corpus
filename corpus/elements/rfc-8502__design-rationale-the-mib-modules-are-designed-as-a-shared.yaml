document: rfc-8502
kind: design-rationale
summary: The MIB modules are designed as a shared foundation to be used by other MIB modules rather than as standalone monitoring tools. This avoids duplication of P-tunnel type and identifier definitions across per-technology MIBs for L2 VPN (RFC 7117) and L3 VPN (RFC 6513) multicast.
section: "1"
topics:
