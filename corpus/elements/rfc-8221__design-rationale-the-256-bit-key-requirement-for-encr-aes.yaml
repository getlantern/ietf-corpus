document: rfc-8221
kind: design-rationale
summary: The 256-bit key requirement for ENCR_AES_CBC and ENCR_AES_GCM_16 was raised from MAY (RFC 7321) to MUST because IPsec sessions may have very long lifetimes carrying multiple packets, necessitating longer keys for sustained security.
