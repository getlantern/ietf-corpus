document: rfc-7671
kind: normative-requirement
summary: TLS clients using DANE MUST support the SNI extension of TLS (RFC 6698). Servers MAY support SNI but are not required to; when a server supports SNI but lacks an exact certificate match, it SHOULD respond with another certificate chain.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
