document: rfc-5760
kind: wire-format
summary: The Collision sub-report block (SRBT=8) carries a list of 32-bit SSRCs that the Distribution Source has identified as duplicated within the group. If more SSRCs than fit in an MTU must be reported, they are reported round-robin across successive packets.
section: 7.1.9
topics:
