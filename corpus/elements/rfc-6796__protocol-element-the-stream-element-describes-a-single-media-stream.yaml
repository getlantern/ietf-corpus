document: rfc-6796
kind: protocol-element
summary: The <stream> element describes a single media stream and MUST contain one <media-type> element, one or more <codec> elements, and one <local-host-port> element. It MUST contain zero or one <remote-host-port> elements and MAY have 'direction', 'label', and 'enabled' attributes.
section: 4.3.1
