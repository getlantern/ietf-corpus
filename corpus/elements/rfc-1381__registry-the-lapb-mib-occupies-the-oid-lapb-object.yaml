summary: 'The LAPB MIB occupies the OID lapb OBJECT IDENTIFIER ::= { transmission 16 }, with LAPB interfaces identified in MIB-II by ifType lapb(16). This document defines four tables under that arc: lapbAdmnTable, lapbOperTable, lapbFlowTable, and lapbXidTable, plus a lapbProtocolVersion sub-tree.'
