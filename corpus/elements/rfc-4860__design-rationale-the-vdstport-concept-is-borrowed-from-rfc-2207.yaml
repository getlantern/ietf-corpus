document: rfc-4860
kind: design-rationale
summary: The VDstPort concept is borrowed from RFC 2207 (RSVP Extensions for IPsec) and Extended VDstPort is borrowed from the Extended Tunnel ID in RFC 3209 (RSVP-TE). Together they allow multiple generic aggregate reservations for the same PHB between the same source-destination pair, which RFC 3175 aggregate reservations cannot support.
