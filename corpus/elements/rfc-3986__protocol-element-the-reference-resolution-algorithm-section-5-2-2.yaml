document: rfc-3986
kind: protocol-element
summary: 'The reference resolution algorithm (Section 5.2.2) transforms a URI reference R against a base URI into a target URI T by: if R has a scheme, use R''s components; if R has authority, use R''s authority and path (with dot-segment removal); otherwise merge paths from base and R, removing dot-segments, and inherit base''s authority and scheme.'
section: 5.2.2
topics:
    - http
