document: rfc-9737
kind: normative-requirement
summary: During the grace period, if the client sends an lrf_stateid in LAYOUTRETURN with any value other than the anonymous stateid of all zeros, the MDS MUST respond with NFS4ERR_GRACE.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
