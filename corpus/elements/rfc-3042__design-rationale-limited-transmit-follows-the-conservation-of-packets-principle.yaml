document: rfc-3042
kind: design-rationale
summary: 'Limited Transmit follows the ''conservation of packets'' principle: each of the first two duplicate ACKs indicates a segment has left the network, so transmitting new segments does not deviate from TCP''s congestion control principles and the sender has no reason to assume the current congestion state is inaccurate.'
