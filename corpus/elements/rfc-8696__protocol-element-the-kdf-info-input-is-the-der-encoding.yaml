summary: 'The KDF ''info'' input is the DER encoding of CMSORIforPSKOtherInfo, a SEQUENCE containing: psk (OCTET STRING with the actual PSK value), keyMgmtAlgType (ENUMERATED: keyTrans=5, keyAgree=10), keyEncryptionAlgorithm (KeyEncryptionAlgorithmIdentifier), pskLength (INTEGER, length of PSK in octets), and kdkLength (INTEGER, length of the key-derivation key in octets). EXPLICIT tagging is used.'
