document: rfc-4133
kind: protocol-element
summary: The entAliasMappingTable maps (entPhysicalIndex, entAliasLogicalIndexOrZero) pairs to external MIB identifiers (RowPointer). Only physical port entries (entPhysicalClass = 'port(10)') are permitted. A zero value for entAliasLogicalIndexOrZero acts as a wildcard for all unspecified logical entities; non-zero entries take precedence.
