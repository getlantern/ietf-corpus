document: rfc-3344
kind: normative-requirement
summary: All messages used to update another node as to the location of a mobile node MUST be authenticated in order to protect against remote redirection attacks. Registration messages between a mobile node and its home agent MUST be authenticated with an authorization-enabling extension (e.g., the Mobile-Home Authentication Extension).
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
