document: rfc-9438
kind: normative-requirement
summary: A QUIC sender that uses a cwnd value (rather than flight_size) to calculate new cwnd and ssthresh after detecting a congestion event is REQUIRED to apply similar mechanisms as defined in RFC 9002.
section: "4.6"
rfc2119_level: REQUIRED
topics:
