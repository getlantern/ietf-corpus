document: rfc-2108
kind: normative-requirement
summary: When rptrInfoReset (or deprecated rptrReset) is set to reset(2), the agent may delay the reset to allow the SNMP response to be transmitted, but the SNMP response MUST be transmitted. The reset action does not reset management counters and does not affect portAdminStatus parameters.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
