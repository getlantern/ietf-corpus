document: rfc-7235
kind: normative-requirement
summary: 'HTTP authentication is presumed to be stateless: all information necessary to authenticate a request MUST be provided in the request itself, rather than depending on the server remembering prior requests. Authentication bound to the underlying connection is outside this specification''s scope.'
section: 5.1.2
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
