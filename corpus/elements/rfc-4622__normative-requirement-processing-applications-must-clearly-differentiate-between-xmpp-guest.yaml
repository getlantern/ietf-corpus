document: rfc-4622
kind: normative-requirement
summary: Processing applications MUST clearly differentiate between xmpp://guest@example.com (authenticate as guest@example.com) and xmpp:guest@example.com (identify node guest@example.com without authentication signaling). User agents SHOULD discourage users from including "//" characters in XMPP IRIs/URIs.
section: "5.5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
