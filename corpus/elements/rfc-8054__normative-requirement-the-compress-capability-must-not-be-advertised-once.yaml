document: rfc-8054
kind: normative-requirement
summary: The COMPRESS capability MUST NOT be advertised once a compression layer is active. The capability MAY be advertised both before and after any use of the MODE READER command with the same semantics.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - security
