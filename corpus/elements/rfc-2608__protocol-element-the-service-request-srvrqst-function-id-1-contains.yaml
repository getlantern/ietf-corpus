summary: 'The Service Request (SrvRqst, Function-ID=1) contains: PRList (previous responder list of IPv4 addresses), service-type string, scope-list, optional LDAPv3 predicate, and optional SLP SPI string. Services match if they belong to a requested scope, support the service type, and satisfy the predicate.'
