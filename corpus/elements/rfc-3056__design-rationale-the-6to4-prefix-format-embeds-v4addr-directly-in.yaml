document: rfc-3056
kind: design-rationale
summary: The 6to4 prefix format embeds V4ADDR directly in the NLA field of the IPv6 address, allowing the IPv4 destination to be derived mechanically from the IPv6 next-hop address with no routing table lookup or tunnel configuration in the IPv4 network.
