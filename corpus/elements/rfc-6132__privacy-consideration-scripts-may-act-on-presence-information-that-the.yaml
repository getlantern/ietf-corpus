document: rfc-6132
kind: privacy-consideration
summary: Scripts may act on presence information that the message sender is not permitted to see. A sender can potentially use messages to probe the recipient's presence state (e.g., by observing whether an auto-reply is generated). Script authors should carefully consider this aspect of presence-triggered actions.
section: "4"
topics:
    - privacy
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
