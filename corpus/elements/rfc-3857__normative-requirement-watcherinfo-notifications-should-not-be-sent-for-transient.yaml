document: rfc-3857
kind: normative-requirement
summary: Watcherinfo notifications SHOULD NOT be sent for transient subscription states. For example, a fetch by an authorized watcher that creates the FSM and moves it immediately from init→active→terminated should generate no notifications.
section: 4.7.2
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
