summary: 'IANA maintains the DHCPv6 Option Codes registry. Options assigned in this document include: Client Identifier (1), Server Identifier (2), IA_NA (3), IA_TA (4), IA Address (5), Option Request (6), Preference (7), Elapsed Time (8), Relay Message (9), Authentication (11), Server Unicast (12), Status Code (13), Rapid Commit (14), User Class (15), Vendor Class (16), Vendor-specific Information (17), Interface-Id (18), Reconfigure Message (19), Reconfigure Accept (20).'
