document: rfc-2893
kind: design-rationale
summary: Automatic tunneling was designed to eliminate explicit tunnel configuration by embedding the IPv4 tunnel endpoint address in the IPv6 destination address itself (IPv4-compatible format). This is only applicable for host-to-host and router-to-host tunnels where destination and tunnel endpoint are identical; configured tunneling is required when tunneling to an intermediate router.
section: "3"
topics:
