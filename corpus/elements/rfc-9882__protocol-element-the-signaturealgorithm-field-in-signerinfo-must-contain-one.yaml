document: rfc-9882
kind: protocol-element
summary: The signatureAlgorithm field in SignerInfo MUST contain one of the three ML-DSA OIDs (id-ml-dsa-44, id-ml-dsa-65, id-ml-dsa-87) and the parameters field MUST be absent. The signature field contains the raw ML-DSA signature value per FIPS 204 Sections 5.2 and 5.3.
section: "3.3"
topics:
    - crypto
    - security
