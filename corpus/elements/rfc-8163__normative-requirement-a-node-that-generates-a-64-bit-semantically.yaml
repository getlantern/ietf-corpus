document: rfc-8163
kind: normative-requirement
summary: A node that generates a 64-bit semantically opaque IID MUST register it with its local router(s) by sending a Neighbor Solicitation (NS) message with the Address Registration Option (ARO) and process Neighbor Advertisements (NAs) according to RFC 6775.
section: "6"
rfc2119_level: MUST
topics:
