document: rfc-2073
kind: wire-format
summary: The recommended Intra-Subscriber layout uses 16 bits for Subnet ID and 48 bits for Interface ID (e.g., IEEE-802 MAC address), within the 64-bit Intra-Subscriber field. This yields up to 65,535 subnets per subscriber prefix.
