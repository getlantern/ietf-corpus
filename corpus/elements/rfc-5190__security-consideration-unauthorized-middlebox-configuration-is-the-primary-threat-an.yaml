document: rfc-5190
kind: security-consideration
summary: 'Unauthorized middlebox configuration is the primary threat: an attacker who can write to the MIDCOM-MIB could open unintended pinholes in firewalls or create unauthorized NAT bindings. SNMPv3 with authPriv security level and VACM-based access control restricted to rule owners are the required mitigations.'
section: "10.2"
topics:
    - snmp
    - security
    - nat
