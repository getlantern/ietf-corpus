document: rfc-8801
kind: registry
summary: IANA created the 'PvD Option Flags' registry reserving bit positions 0–11 in the PvD Option bitmask. Bits 0 (H-flag), 1 (L-flag), and 2 (R-flag) are assigned by RFC 8801; bits 3–11 are unassigned. Future assignments require Standards Action. The registry is placed under 'ICMPv6 Parameters'.
section: "8.4"
topics:
