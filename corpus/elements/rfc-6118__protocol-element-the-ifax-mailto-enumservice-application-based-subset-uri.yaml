kind: protocol-element
summary: The 'ifax:mailto' Enumservice (Application-Based, Subset, URI scheme 'mailto') supports Internet Fax. The mailto URI scheme is chosen because IFAX is a profile of standard Internet mail and uses standard Internet mail addressing.
