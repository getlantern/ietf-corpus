summary: 'SMIv2 IMPORT clause items MUST be processed using seven specific rules: ignore SNMPv2-SMI and SNMPv2-CONF entirely, ignore well-known textual conventions covered in Appendix A, and generate YANG import statements only for items used in SYNTAX, OBJECTS, or INDEX/AUGMENTS clauses.'
