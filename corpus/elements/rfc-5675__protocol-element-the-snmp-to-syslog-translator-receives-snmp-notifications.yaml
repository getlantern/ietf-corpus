document: rfc-5675
kind: protocol-element
summary: The SNMP-to-SYSLOG translator receives SNMP notifications and generates SYSLOG messages, containing an SNMP notification receiver application and a SYSLOG originator. Every SNMP notification maps to exactly one SYSLOG message.
