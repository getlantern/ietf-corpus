document: rfc-3729
kind: protocol-element
summary: RmonClientID is a textual convention (Unsigned32, 0..4294967295) providing a long-lived stable identifier for an end-system that persists across address changes. Agents assign it via an implementation-specific algorithm; if address-to-client tracking is not possible, the ID may map to a client address rather than a distinct machine.
section: "3"
topics:
