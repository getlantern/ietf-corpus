document: rfc-5103
kind: normative-requirement
summary: When using IPFIX Options to apply biflowDirection to all flows within an Observation Domain or from an Exporting Process, the Option SHOULD be sent reliably. If reliable transport is not available (e.g., when using UDP), biflowDirection SHOULD appear in each Flow Record.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - measurement
    - udp
