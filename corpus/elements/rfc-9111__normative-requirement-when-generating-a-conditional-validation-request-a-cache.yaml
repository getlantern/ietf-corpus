document: rfc-9111
kind: normative-requirement
summary: When generating a conditional validation request, a cache MUST send the relevant entity tags using If-Match, If-None-Match, or If-Range if entity tags were provided in the stored response(s) being validated, and SHOULD send Last-Modified via If-Modified-Since for single non-subrange validations.
section: 4.3.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
