document: rfc-2531
kind: protocol-element
summary: JBIG-stripe-size (Integer >0) indicates the number of scan lines per JBIG stripe except the last. Legal constraints are JBIG-stripe-size=128 (fixed stripe) or JBIG-stripe-size>=0 (no restriction, meaning the entire page is one stripe, placing heavy memory demands on the receiver).
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
