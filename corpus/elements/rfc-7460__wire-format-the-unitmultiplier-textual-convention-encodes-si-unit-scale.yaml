document: rfc-7460
kind: wire-format
summary: The UnitMultiplier Textual Convention encodes SI unit scale factors as integers from yocto(-24) to yotta(24), following IEEE 61850 Annex A. All power and energy measurements in the MIB use the pattern BaseValue * 10^UnitMultiplier, with UnitMultiplier held in a companion object (e.g., eoPowerUnitMultiplier, eoEnergyUnitMultiplier).
section: "9.2"
