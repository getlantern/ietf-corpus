document: rfc-8365
kind: protocol-element
summary: Fast Convergence and Mass Withdrawal uses Ethernet A-D routes per ES. Upon a failure in connectivity to an attached segment, the NVE withdraws the corresponding Ethernet A-D per ES route, triggering all receiving NVEs to update next-hop adjacencies for all MAC addresses associated with that ES.
section: 8.1.2
topics:
    - routing
    - bgp
