document: rfc-4462
kind: normative-requirement
summary: When the server receives SSH_MSG_USERAUTH_GSSAPI_MIC before the GSS-API context is fully established, or when the negotiated context does not support per-message integrity, the server MUST fail the authentication.
section: "3.5"
rfc2119_level: MUST
