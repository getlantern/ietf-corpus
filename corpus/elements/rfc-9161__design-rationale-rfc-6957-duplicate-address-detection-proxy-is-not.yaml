document: rfc-9161
kind: design-rationale
summary: RFC 6957 (Duplicate Address Detection Proxy) is not suitable for EVPN BDs because it is defined for point-to-multipoint topologies with split-horizon forwarding where CEs have no direct L2 communication, which does not match EVPN Broadcast Domain topology.
