document: rfc-4396
kind: protocol-element
summary: 'Five unit types are defined: TYPE 1 (whole text sample), TYPE 2 (text string fragment), TYPE 3 (whole modifiers or first modifier fragment), TYPE 4 (subsequent modifier fragment), TYPE 5 (sample description). TYPE values 0, 6, and 7 are reserved for future extensions. Receivers SHALL ignore unrecognized TYPE values without invalidating timestamp calculation.'
