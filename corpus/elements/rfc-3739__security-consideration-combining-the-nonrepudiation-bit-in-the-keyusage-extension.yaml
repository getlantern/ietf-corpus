document: rfc-3739
kind: security-consideration
summary: Combining the nonRepudiation bit in the keyUsage extension with other keyUsage bits may have security implications depending on the usage context. Applications validating electronic signatures based on such certificates should determine whether the key usage combination is appropriate.
section: "4"
topics:
