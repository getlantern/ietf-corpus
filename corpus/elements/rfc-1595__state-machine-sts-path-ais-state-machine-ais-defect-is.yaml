document: rfc-1595
kind: state-machine
summary: 'STS-Path AIS state machine: AIS defect is detected as all-ones in H1 and H2 bytes for three contiguous frames, terminated when a valid STS Pointer is detected (NDF=''1001'' for one frame or ''0110'' for three). STS-Path AIS failure is declared at 2.5±0.5 s and cleared when absent for 10±0.5 s.'
section: "3.5"
