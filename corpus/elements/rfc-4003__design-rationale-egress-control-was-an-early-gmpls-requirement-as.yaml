document: rfc-4003
kind: design-rationale
summary: Egress Control was an early GMPLS requirement. As GMPLS evolved, the ability to control a label on an egress interface was generalized to support any interface (RFC 3471 Section 6, RFC 3473 Section 5.1), but the original egress-specific intent became unclear, motivating this clarification document.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
