summary: The IANAPowerStateSet-MIB module is assigned OID mib-2 228 and is maintained by IANA. It defines the PowerStateSet Textual Convention and the registry of Power State Sets and individual Power States. New values are requested via email to iana@iana.org; the authoritative list is at http://www.iana.org/assignments/power-state-sets.
