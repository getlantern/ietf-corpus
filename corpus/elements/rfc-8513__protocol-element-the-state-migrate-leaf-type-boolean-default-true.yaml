kind: protocol-element
summary: The 'state-migrate' leaf (type boolean, default true, feature 'aftr') instructs the AFTR to migrate existing NAT state to a new IPv6 address when a B4's IPv6 address changes, using subscriber-mask-v6 to determine if two addresses belong to the same CPE.
