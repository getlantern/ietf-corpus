document: rfc-6470
kind: protocol-element
summary: 'The ''netconf-config-change'' notification is generated when the <running> or <startup> datastore is changed by a management session. It carries changed-by-parms, a ''datastore'' leaf (enumeration: running/startup, default running), and a repeating ''edit'' list with ''target'' (instance-identifier) and ''operation'' (nc:edit-operation-type) leaves.'
section: "2.2"
topics:
    - netconf
    - yang
