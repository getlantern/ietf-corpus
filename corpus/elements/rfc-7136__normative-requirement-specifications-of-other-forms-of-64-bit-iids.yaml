document: rfc-7136
kind: normative-requirement
summary: Specifications of other forms of 64-bit IIDs MUST specify how all 64 bits are set, but a generic semantic meaning for the 'u' and 'g' bits MUST NOT be defined. The method of generating IIDs for specific link types MAY define some local significance for certain bits.
section: "5"
rfc2119_level: MUST NOT
topics:
