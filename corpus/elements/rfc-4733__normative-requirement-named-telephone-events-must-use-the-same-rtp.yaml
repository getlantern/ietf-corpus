document: rfc-4733
kind: normative-requirement
summary: Named telephone events MUST use the same RTP sequence number and timestamp base as the regular audio channel. For a multi-packet event, all update packets carry the same RTP timestamp (the time the event began); only the duration field increases.
section: 2.5.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
