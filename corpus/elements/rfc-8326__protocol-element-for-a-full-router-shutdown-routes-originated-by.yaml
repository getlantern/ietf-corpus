document: rfc-8326
kind: protocol-element
summary: For a full router shutdown, routes originated by the router (BGP aggregates, redistributed routes, static routes) must also be tagged with GRACEFUL_SHUTDOWN and set to a low LOCAL_PREF, in addition to gracefully shutting down all EBGP sessions.
section: "4.2"
