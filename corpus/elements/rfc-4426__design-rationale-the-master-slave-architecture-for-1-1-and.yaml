document: rfc-4426
kind: design-rationale
summary: The master/slave architecture for 1:1 and M:N span protection is used so that exactly one node initiates protection switching. The determination of master vs. slave may be based on configured information, protocol-specific requirements, or neighbor discovery, providing deployment flexibility.
