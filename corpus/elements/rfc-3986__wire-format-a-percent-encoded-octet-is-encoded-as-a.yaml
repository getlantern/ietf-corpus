document: rfc-3986
kind: wire-format
summary: 'A percent-encoded octet is encoded as a character triplet: the percent character "%" followed by two hexadecimal digits representing the octet''s numeric value (e.g., "%20" for SP). Uppercase hex digits A-F are equivalent to lowercase a-f.'
section: "2.1"
