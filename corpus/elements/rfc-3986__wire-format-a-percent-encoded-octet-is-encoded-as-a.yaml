document: rfc-3986
kind: wire-format
summary: 'A percent-encoded octet is encoded as a three-character triplet: the percent character "%" followed by exactly two hexadecimal digits representing the octet''s numeric value (e.g., "%20" for the space character SP). Uppercase A–F and lowercase a–f are equivalent.'
section: "2.1"
