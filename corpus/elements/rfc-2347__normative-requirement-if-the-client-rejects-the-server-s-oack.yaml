document: rfc-2347
kind: normative-requirement
summary: If the client rejects the server's OACK, it must send an ERROR packet with error code 8 to terminate the transfer. Similarly, if the client receives an OACK containing an unrequested option, it should respond with ERROR code 8 and terminate.
section: Negotiation Protocol
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
