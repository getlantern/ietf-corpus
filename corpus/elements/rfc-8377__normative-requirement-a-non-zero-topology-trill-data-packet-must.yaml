document: rfc-8377
kind: normative-requirement
summary: A non-zero topology TRILL Data packet MUST NOT be forwarded onto a link unless the link meets the topology support requirements of Section 2.2, even if there are MT TRILL switch ports on the link. This prevents topology boundary violations on multi-access links.
section: 3.4.2
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
