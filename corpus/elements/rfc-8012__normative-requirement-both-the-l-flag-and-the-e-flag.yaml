document: rfc-8012
kind: normative-requirement
summary: Both the L flag and the E flag MUST NOT be set in MPLS echo request packets. Zero, one, or both flags MUST be set in echo reply packets to indicate the responder's load-balancing behavior.
section: "5"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
