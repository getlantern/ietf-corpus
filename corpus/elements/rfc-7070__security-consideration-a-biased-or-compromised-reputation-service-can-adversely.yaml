document: rfc-7070
kind: security-consideration
summary: A biased or compromised reputation service can adversely affect clients by rating subjects more or less favorably than warranted, leading to admission of spam/malware or wrongful rejection of legitimate content. Clients should prefer services that disclose their computation methods, and protocols must be designed to resist man-in-the-middle attacks on reputation data.
section: "9.1"
topics:
    - security
    - email
