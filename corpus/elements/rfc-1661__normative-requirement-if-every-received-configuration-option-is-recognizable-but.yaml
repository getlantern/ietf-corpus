document: rfc-1661
kind: normative-requirement
summary: If every received Configuration Option is recognizable but some values are not acceptable, the implementation MUST transmit a Configure-Nak containing only the unacceptable options. If some options are not recognizable or not acceptable for negotiation, the implementation MUST transmit a Configure-Reject.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
