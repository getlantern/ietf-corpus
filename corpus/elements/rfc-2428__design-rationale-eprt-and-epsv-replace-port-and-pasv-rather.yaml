document: rfc-2428
kind: design-rationale
summary: EPRT and EPSV replace PORT and PASV rather than extending them because the original commands assume 32-bit IPv4 addresses and cannot accommodate variable-length addresses required by IPv6 or future network protocols. RFC 1639 (FOOBAR) was found to fail in multi-protocol environments.
section: "1"
topics:
    - ip
    - v6ops
