document: rfc-7143
kind: security-consideration
summary: IPsec ESP with AES-CBC or 3DES-CBC MUST be used to provide data confidentiality when iSCSI traffic transits open networks. IKE is REQUIRED for automated key management and security association negotiation; manual keying is permitted only in constrained closed-network deployments.
section: 9.3.2
topics:
    - security
    - ipsec
    - crypto
