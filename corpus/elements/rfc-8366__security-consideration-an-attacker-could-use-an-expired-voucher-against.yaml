document: rfc-8366
kind: security-consideration
summary: 'An attacker could use an expired voucher against a device without a reliable clock. Defenses include: requiring pledges to verify ''expires-on'', allowing devices without clocks to use nonces for ephemeral vouchers, and using nonceless vouchers that appear in audit logs to inform security decisions.'
section: "7.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
