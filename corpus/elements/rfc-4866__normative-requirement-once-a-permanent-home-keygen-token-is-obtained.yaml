document: rfc-4866
kind: normative-requirement
summary: Once a permanent home keygen token is obtained, the mobile node MUST authenticate all subsequent Binding Updates to the same correspondent node using that token, until the binding expires, the token is renewed, or the binding is deregistered. This prevents an on-path attacker from downgrading authentication to reachability-based proof.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
