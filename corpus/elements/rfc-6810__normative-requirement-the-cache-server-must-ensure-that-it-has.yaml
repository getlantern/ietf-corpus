document: rfc-6810
kind: normative-requirement
summary: The cache server MUST ensure that it has told the router client to have one and only one IPvX PDU for a unique {Prefix, Len, Max-Len, ASN} at any one point in time. Should the router receive a duplicate, it SHOULD raise a Duplicate Announcement Received error.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
