document: rfc-5995
kind: interoperability-note
summary: CalDAV (RFC 4791) and CardDAV require clients to pick unique member URIs, creating collision and locking complexity. This specification provides a mechanism those protocols (and similar WebDAV-based protocols) can adopt so that the server assigns URIs instead.
section: "1"
topics:
