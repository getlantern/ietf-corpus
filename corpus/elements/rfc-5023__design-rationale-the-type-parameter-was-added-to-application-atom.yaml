document: rfc-5023
kind: design-rationale
summary: The 'type' parameter was added to application/atom+xml because implementation experience demonstrated that Atom Feed and Entry Documents have different processing models and need to be differentiated without examining document content. Producers of Entry Documents SHOULD use the parameter regardless of whether it is required.
section: "12"
topics:
