document: rfc-3003
kind: design-rationale
summary: MPEG audio was not designed as a file format but as a streaming transmission format, and therefore has no well-defined way of including metadata. Some products embed metadata using zero-amplitude frames, transmission-error disguises, or by wrapping MPEG data in WAV format.
section: "1"
