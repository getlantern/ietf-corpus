document: rfc-8692
kind: normative-requirement
summary: 'When id-RSASSA-PSS-SHAKE128 or id-RSASSA-PSS-SHAKE256 is used, the encoding MUST omit the parameters field. The hash algorithm used to hash the message and the hash algorithm used as the MGF in RSASSA-PSS MUST be the same: both SHAKE128 or both SHAKE256.'
section: 4.1.1
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
