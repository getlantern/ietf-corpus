document: rfc-3811
kind: protocol-element
summary: MplsExtendedTunnelId is a Unsigned32 (0..4294967295) unique identifier for an MPLS tunnel, derived from the Extended Tunnel Id in RSVP-TE or the Ingress Router ID for CR-LDP, and may represent an IPv4 address of the ingress or egress LSR.
