document: rfc-7524
kind: normative-requirement
summary: When ingress replication is used for the egress area segment, the Leaf A-D route MUST carry a downstream-assigned label in the PMSI Tunnel attribute with Tunnel Type set to ingress replication. A PE MUST assign a distinct MPLS label for each Leaf A-D route it originates.
section: 6.2.3
rfc2119_level: MUST
topics:
    - mpls
    - bgp
