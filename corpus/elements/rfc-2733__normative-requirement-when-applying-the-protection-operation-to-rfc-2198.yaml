document: rfc-2733
kind: normative-requirement
summary: When applying the protection operation to RFC 2198-encapsulated streams, RTP extension, padding, and CSRC list MUST be removed from the protected packets (with CC, Padding, Extension fields set to zero) before the FEC operation; the sender MUST still transmit the original unmodified packets as the primary encoding.
section: "10"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
