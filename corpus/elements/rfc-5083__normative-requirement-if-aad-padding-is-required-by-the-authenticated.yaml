document: rfc-5083
kind: normative-requirement
summary: If AAD padding is required by the authenticated encryption algorithm, the padding MUST be added as described in Section 6.3 of CMS, and is well defined only if the block size is less than 256 octets.
section: "2.2"
rfc2119_level: MUST
