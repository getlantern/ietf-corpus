document: rfc-4684
kind: normative-requirement
summary: Implementations SHOULD generate an End-of-RIB marker for the Route Target membership (AFI, SAFI) upon completing initial RT membership exchange, regardless of whether graceful-restart is enabled, allowing the receiver to know when it has received the full RT membership contents before exchanging VPN NLRI.
section: "6"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
