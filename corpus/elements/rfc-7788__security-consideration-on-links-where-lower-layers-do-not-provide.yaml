document: rfc-7788
kind: security-consideration
summary: On links where lower layers do not provide adequate protection, DTLS-based secure unicast transport MUST be used. Without it, attackers may perform traffic redirection, eavesdropping, spoofing, or denial-of-service on HNCP services including address assignment, service discovery, and HNCP-derived protocol keys.
section: "12.2"
topics:
    - security
    - tls
