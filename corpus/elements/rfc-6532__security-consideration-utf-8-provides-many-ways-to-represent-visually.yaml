document: rfc-6532
kind: security-consideration
summary: UTF-8 provides many ways to represent visually equivalent characters or sequences; the normalization process in Section 3.1 (NFC) is recommended to minimize spoofing and equivalence attacks. Implementers are directed to the security considerations in RFC 3629 for details.
