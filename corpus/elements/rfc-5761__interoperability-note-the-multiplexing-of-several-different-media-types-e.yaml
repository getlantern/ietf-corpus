document: rfc-5761
kind: interoperability-note
summary: The multiplexing of several different media types (e.g., audio and video) onto a single port is explicitly out of scope for this memo; RFC 5761 addresses only multiplexing RTP data and RTCP control packets for a single media type onto one port.
