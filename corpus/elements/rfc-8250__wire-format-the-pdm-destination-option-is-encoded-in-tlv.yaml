document: rfc-8250
kind: wire-format
summary: 'The PDM destination option is encoded in TLV format as a 12-byte structure: 1-byte Option Type (0x0F), 1-byte Option Length (must be 10), 1-byte ScaleDTLR, 1-byte ScaleDTLS, 2-byte PSNTP, 2-byte PSNLR, 2-byte DELTATLR, and 2-byte DELTATLS. Multi-octet values are aligned on natural boundaries per RFC 8200.'
section: 3.2.1
topics:
    - ip
    - measurement
