document: rfc-9905
kind: design-rationale
summary: SHA-1's cryptographic security has been diminishing over time as various attacks have weakened its underpinnings; multiple stronger algorithms are now widely available, and some implementations have already removed SHA-1 support, making it no longer fully interoperable in DNSSEC.
