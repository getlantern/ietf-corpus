document: rfc-9925
kind: protocol-element
summary: id-alg-unsigned is an OID (1.3.6.1.5.5.7.6.36) used as a placeholder signature algorithm in X.509 certificates where signature verification is not expected. It is placed in both the Certificate's signatureAlgorithm and TBSCertificate's signature fields.
