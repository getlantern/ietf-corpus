document: rfc-6660
kind: state-machine
summary: 'PCN-interior-node codepoint transition rules: NM may be upgraded to ThM (threshold-marking trigger) or ETM (excess-traffic trigger); ThM may be upgraded to ETM (excess-traffic trigger); ETM MUST NOT be changed to any other codepoint; NM MUST NOT be changed to not-PCN; not-PCN MUST NOT be changed to any other codepoint. Excess-traffic-marking rules take precedence when both meters fire simultaneously.'
section: 5.2.1
