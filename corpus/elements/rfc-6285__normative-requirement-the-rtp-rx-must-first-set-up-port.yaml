document: rfc-6285
kind: normative-requirement
summary: The RTP_Rx MUST first set up port mappings between the unicast burst RTP session and the primary multicast RTP session and include this mapping in the RAMS-R message before the BRS can respond. This is a prerequisite step before any RAMS signaling can proceed.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - multicast
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
