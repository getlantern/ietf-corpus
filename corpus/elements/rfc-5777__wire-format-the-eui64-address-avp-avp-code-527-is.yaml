summary: The EUI64-Address AVP (AVP Code 527) is of type OctetString encoded as an 8-octet EUI-64 address as it appears in the frame header. The EUI64-Address-Mask-Pattern AVP (AVP Code 529) is also 8 octets specifying matching bit positions.
