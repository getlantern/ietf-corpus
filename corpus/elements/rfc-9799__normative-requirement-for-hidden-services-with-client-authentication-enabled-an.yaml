document: rfc-9799
kind: normative-requirement
summary: For Hidden Services with client authentication enabled, an ACME server MUST wait until the client responds to an authorization before checking CAA, treating the response as confirmation that the server's public key has been added and the Second Layer Hidden Service Descriptor can be decrypted.
section: "6.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
