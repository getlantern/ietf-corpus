document: rfc-3416
kind: security-consideration
summary: The SNMPv2 protocol operations defined in this document do not themselves provide a secure environment. Even on a network secured with IPsec, there is no inherent control over which principals on that network can access management information. Implementors are recommended to use the User-based Security Model (RFC 3414) and the View-based Access Control Model (RFC 3415).
section: "7"
topics:
    - snmp
    - security
