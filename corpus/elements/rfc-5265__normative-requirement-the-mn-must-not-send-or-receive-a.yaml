document: rfc-5265
kind: normative-requirement
summary: The MN MUST NOT send or receive a user data packet if more than T_MONITOR seconds have elapsed since the last successful re-registration with the i-HA; any such packets MUST be dropped or queued, and queues MUST NOT be processed until re-registration succeeds without a connection status change.
section: 3.2.4
rfc2119_level: MUST NOT
topics:
    - security
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
