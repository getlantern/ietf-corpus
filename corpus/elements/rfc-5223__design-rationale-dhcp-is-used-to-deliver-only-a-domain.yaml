document: rfc-5223
kind: design-rationale
summary: DHCP is used to deliver only a domain name (not a direct IP address) to the LoST client; the domain name is then fed into the DNS-based U-NAPTR resolution mechanism from RFC 5222/RFC 4848. This indirection allows the access network to point clients toward a local LoST server without hardcoding addresses.
section: "1"
topics:
    - dns
    - realtime
