document: rfc-8171
kind: protocol-element
summary: 'For frame-based query types (QTYPE 2 and 5), the Pull Directory server can forward or reply on behalf of the querying RBridge: for ARP it synthesizes an ARP reply; for ND Neighbor Solicitation it returns an ND Neighbor Advertisement (or for SEND, forwards to the address holder or multicasts); for RARP it synthesizes a RARP reply; for unknown-unicast-MAC it forwards the frame unicast to the resolved switch.'
section: 3.2.2.2
topics:
    - routing
