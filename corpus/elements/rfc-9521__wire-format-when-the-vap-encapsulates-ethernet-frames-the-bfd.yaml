summary: 'When the VAP encapsulates Ethernet frames, the BFD Control packet is carried inside an inner Ethernet frame within the Geneve packet, structured as: Outer Ethernet Header / Outer IPvX Header / Outer UDP Header / Geneve Header / Inner Ethernet Header / Inner IPvX Header / Inner UDP Header / BFD Control Packet / Outer Ethernet FCS.'
