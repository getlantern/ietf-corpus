document: rfc-4776
kind: wire-format
summary: 'The DHCPv4 GEOCONF_CIVIC option wire format is: option code 99 (1 octet), length N (1 octet, minimum 3), ''what'' (1 octet), country code (2 octets ASCII), followed by civic address elements. The DHCPv6 OPTION_GEOCONF_CIVIC uses a 2-octet option-code of 36 and 2-octet option-len.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
