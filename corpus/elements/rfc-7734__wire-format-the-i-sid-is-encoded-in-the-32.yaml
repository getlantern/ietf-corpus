document: rfc-7734
kind: wire-format
summary: 'The I-SID is encoded in the 32-bit Ethernet Tag ID field of the MAC/IP advertisement NLRI as follows: bit 31 = T (Transmit), bit 30 = R (Receive), bits 29-24 = Reserved, bits 23-0 = I-SID (24-bit Backbone Service Instance Identifier).'
section: "4.3"
topics:
