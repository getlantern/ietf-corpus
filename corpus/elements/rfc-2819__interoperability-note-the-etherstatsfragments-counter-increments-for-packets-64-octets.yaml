document: rfc-2819
kind: interoperability-note
summary: The etherStatsFragments counter increments for packets <64 octets with bad FCS. This is entirely normal because it counts both collision runts (normal Ethernet occurrences) and noise hits; a non-zero value does not indicate a problem.
