document: rfc-3095
kind: normative-requirement
summary: Lower layers are RECOMMENDED to deploy error detection for ROHC headers and not deliver ROHC headers with high residual error rates. For residual BER at most 1E-5, ROHC is designed not to increase the number of damaged headers beyond those caught by its own CRC detection.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
