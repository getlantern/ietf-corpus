document: rfc-6772
kind: normative-requirement
summary: 'If <keep-rule-reference> is FALSE, the <external-ruleset> element in the PIDF-LO MUST NOT contain a reference to an external rule set, and references are removed including any MIME body cid: URIs. If absent and the PIDF-LO is created for the first time, the <external-ruleset> element MUST NOT be included.'
section: "6.4"
rfc2119_level: MUST
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
