document: rfc-5083
kind: design-rationale
summary: Version numbers are included in AuthEnvelopedData to avoid ASN.1 decode errors. The lowest version number supporting the generated syntax is used to maximize interoperability; higher versions are only used when new syntax features are actually employed.
section: "1.2"
