document: rfc-891
kind: normative-requirement
summary: The Net Table must be terminated by a special entry with all Net fields set to zero. If this entry's Hops field is less than 255, its Gateway ID is used for all nets not explicitly listed. If Hops is 255, all unlisted nets appear unreachable.
section: "2.1"
rfc2119_level: REQUIRED
topics:
    - routing
    - ip
