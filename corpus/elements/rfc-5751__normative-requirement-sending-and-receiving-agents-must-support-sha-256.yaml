document: rfc-5751
kind: normative-requirement
summary: Sending and receiving agents MUST support SHA-256 for digest algorithms. SHA-1 and MD5 are SHOULD- (expected to be demoted to MAY in a future version), with MD5 supported only for backward compatibility with S/MIME v2 SignedData objects.
section: "2.1"
rfc2119_level: MUST
topics:
    - crypto
    - email
    - security
