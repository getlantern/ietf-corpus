document: rfc-8621
kind: normative-requirement
summary: Servers MUST support JMAP push mechanisms (RFC 8620 Section 7) for all types defined in this spec. Servers implementing 'urn:ietf:params:jmap:mail' MUST support pushing state changes for the 'EmailDelivery' type; that state MUST change whenever a new Email is added to the store but SHOULD NOT change on other Email mutations.
section: "1.5"
rfc2119_level: MUST
topics:
    - email
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
