document: rfc-7545
kind: protocol-element
summary: DeviceDescriptor identifies a device by optional serialNumber, manufacturerId, and modelId (each max 64 octets) and an optional rulesetIds list. The Database MUST ignore unrecognized parameters. Rulesets typically require serialNumber; if no supported ruleset is found in rulesetIds, the Database MAY refuse service.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
