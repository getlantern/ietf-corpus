document: rfc-4007
kind: normative-requirement
summary: The '<address>%<zone_id>' textual format MUST be used only within a single node and MUST NOT be sent on the wire unless every node that will interpret the format agrees on the semantics. Zone indices are strictly local, so the same index value may refer to different zones on different nodes.
section: "11.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
