document: rfc-5049
kind: normative-requirement
summary: The minimum decompression_memory_size (DMS) for SIP/SigComp is 8192 bytes, increased from the ANY/SigComp minimum of 2048 bytes, because 2048 bytes is too small for SIP message compression and severely limits compression ratio.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
