document: rfc-7826
kind: normative-requirement
summary: If the recipient of a new RTSP method does not understand the request, it MUST respond with error code 501 (Not Implemented). A server MUST list the methods it supports using the Public response-header.
section: "2.7"
rfc2119_level: MUST
