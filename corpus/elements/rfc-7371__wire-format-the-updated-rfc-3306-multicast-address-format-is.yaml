document: rfc-7371
kind: wire-format
summary: 'The updated RFC 3306 multicast address format is: 8 bits (0xFF prefix) | ff1 (4 bits) | scop (4 bits) | ff2 (4 bits) | rsvd (4 bits) | plen (8 bits) | network prefix (64 bits) | group ID (32 bits). The ''reserved'' field from RFC 3306 is split into ff2 (4 bits) and rsvd (4 bits).'
