document: rfc-9829
kind: protocol-element
summary: 'In the RPKI, exactly one CRL is appropriate and relevant for determining the revocation status of a given resource certificate: the unique CRL object that is simultaneously the target of the certificate''s CRL Distribution Points extension AND listed in the issuing CA''s current manifest fileList with a matching hash.'
