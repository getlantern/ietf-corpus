document: rfc-9352
kind: normative-requirement
summary: Locators MUST be advertised in the SRv6 Locator TLV. Forwarding entries for these locators MUST be installed in the forwarding plane of receiving SRv6-capable routers when the associated topology/algorithm is supported.
section: "5"
rfc2119_level: MUST
