document: rfc-5097
kind: design-rationale
summary: The udpliteEndpointProcess value should use the system's native process identifier and correspond to sysApplElmtRunIndex (SYSAPPL-MIB) or hrSWRunIndex (HOST-RESOURCES-MIB) for interoperability, with zero as a fallback when unique identification is impossible.
