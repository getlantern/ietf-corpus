document: rfc-4448
kind: normative-requirement
summary: The Ethernet PW MUST NOT be enabled unless it is known that the MTUs of the CE-PE links are the same at both ends of the PW. If an egress router receives an encapsulated PDU whose payload length exceeds the MTU of the destination layer 2 interface, the PDU MUST be dropped.
section: 4.4.2
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
