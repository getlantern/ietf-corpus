document: rfc-6503
kind: security-consideration
summary: CCMP requests carry username/password credentials in the <subject> parameter and the XCON-USERID in <confUserID>. Implementations MUST use TLS or equivalent transport security to protect these credentials. The conference server is responsible for authentication and authorization of all CCMP requests before executing operations.
section: "10.2"
rfc2119_level: MUST
topics:
    - security
    - tls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
