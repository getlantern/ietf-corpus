document: rfc-4120
kind: protocol-element
summary: PA-DATA is a typed extensibility mechanism used in KDC requests and replies, consisting of a padata-type integer and a padata-value octet string. Key registered types include PA-TGS-REQ (1), PA-ENC-TIMESTAMP (2), PA-ETYPE-INFO (11), and PA-ETYPE-INFO2 (19).
