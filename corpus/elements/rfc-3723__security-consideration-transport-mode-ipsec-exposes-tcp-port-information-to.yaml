document: rfc-3723
kind: security-consideration
summary: Transport mode IPsec exposes TCP port information to network middleboxes (enabling firewall filtering) but also to attackers who can use port information to mount targeted attacks. Tunnel mode hides port information but prevents per-connection firewall filtering. The document analyzes trade-offs and notes that transport mode is appropriate within a trusted administrative domain while tunnel mode is preferred across untrusted networks.
section: "5.1"
topics:
    - ipsec
    - security
    - vpn
