document: rfc-9678
kind: normative-requirement
summary: In EAP-Request/AKA'-Challenge, AT_KDF_FS and AT_PUB_ECDHE MUST be included when the Server wishes to use the extension. If either is missing on reception, the Peer MUST treat it as if neither was sent and fall back to base EAP-AKA'.
section: 6.5.3
rfc2119_level: MUST
topics:
    - security
    - crypto
