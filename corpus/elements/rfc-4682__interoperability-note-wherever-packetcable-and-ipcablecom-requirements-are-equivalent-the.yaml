document: rfc-4682
kind: interoperability-note
summary: Wherever PacketCable and IPCablecom requirements are equivalent, the PacketCable reference is used in MIB object REFERENCE clauses. However, IPCablecom-compliant MTA devices MUST use the equivalent IPCablecom references (e.g., ITU-T J.168 and ETSI TS 101 909-8) instead.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
    - diameter
