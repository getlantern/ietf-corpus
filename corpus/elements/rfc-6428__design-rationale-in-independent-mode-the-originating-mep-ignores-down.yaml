document: rfc-6428
kind: design-rationale
summary: In independent mode, the originating MEP ignores DOWN state received from a zero-interval peer, causing the zero-interval peer to continue sending DOWN+RDI messages indefinitely until confirmed. This design adds robustness for RDI exchange on unidirectional failures.
section: "3.7"
topics:
