document: rfc-4178
kind: protocol-element
summary: 'Two additional GSS-API calls are defined: GSS_Set_neg_mechs() lets a caller restrict the set of negotiable mechanisms for a given credential handle, and GSS_Get_neg_mechs() retrieves the currently available negotiable mechanisms for a credential handle. Mechanism order in GSS_Set_neg_mechs() implies relative preference.'
section: Appendix B
