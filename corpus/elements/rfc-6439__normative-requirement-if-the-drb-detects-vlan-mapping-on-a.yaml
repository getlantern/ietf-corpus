document: rfc-6439
kind: normative-requirement
summary: If the DRB detects VLAN mapping on a link (a TRILL Hello arrives on VLAN-x but was sent on VLAN-y), the DRB MUST make or revoke appointments to ensure that the same RBridge is the Appointed Forwarder for both VLAN-x and VLAN-y on that link.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
