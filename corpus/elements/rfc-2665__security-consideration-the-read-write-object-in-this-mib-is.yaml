document: rfc-2665
kind: security-consideration
summary: The read-write object in this MIB is dot3PauseAdminMode, which can be used to configure the PAUSE mode of an interface. Unauthorized modification could disrupt flow control and affect network performance. SNMPv3 with authentication and privacy is recommended to protect management access.
section: "8"
topics:
