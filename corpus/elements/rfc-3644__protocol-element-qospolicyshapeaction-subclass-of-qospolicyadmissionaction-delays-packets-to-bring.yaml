document: rfc-3644
kind: protocol-element
summary: QoSPolicyShapeAction (subclass of QoSPolicyAdmissionAction) delays packets to bring a traffic stream into compliance with a traffic profile. Its only required association is a traffic profile specifying rate and burst parameters.
