document: rfc-2096
kind: normative-requirement
summary: Any assignment of ipCidrRouteMask to value x must be rejected if the bitwise logical-AND of x with the corresponding ipCidrRouteDest is not equal to ipCidrRouteDest. This prevents masks inconsistent with the route destination.
section: "4"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
