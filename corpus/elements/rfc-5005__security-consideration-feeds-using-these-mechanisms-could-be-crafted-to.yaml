document: rfc-5005
kind: security-consideration
summary: Feeds using these mechanisms could be crafted to cause a client to initiate excessive or unending network requests, causing denial of service to the client, target server, or intervening networks. Clients should mitigate by requiring user intervention or limiting requests; servers by denying abusive requests.
section: "6"
