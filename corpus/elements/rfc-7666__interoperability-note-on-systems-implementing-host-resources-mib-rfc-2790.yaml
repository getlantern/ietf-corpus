document: rfc-7666
kind: interoperability-note
summary: On systems implementing HOST-RESOURCES-MIB (RFC 2790), vmStorageParent points to the hrStorageIndex of the parent physical storage in hrStorageTable, and vmCpuPhysIndex matches hrDeviceIndex in hrProcessorTable. If no corresponding HOST-RESOURCES-MIB entry exists, vmStorageParent is zero.
