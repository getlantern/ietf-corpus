document: rfc-5384
kind: normative-requirement
summary: If the F-bit (transitive bit) is set in a Join Attribute, a router that does not understand the attribute type MUST forward it; if the F-bit is clear, the router MUST discard it.
section: 3.3.2
rfc2119_level: MUST
topics:
    - multicast
