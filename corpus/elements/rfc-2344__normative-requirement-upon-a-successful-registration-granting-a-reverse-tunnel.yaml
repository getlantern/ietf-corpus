document: rfc-2344
kind: normative-requirement
summary: Upon a successful registration granting a reverse tunnel, the foreign agent MUST update its visitor list to record that the mobile node has been granted a reverse tunnel and the expected delivery style, and MUST process incoming traffic accordingly (encapsulate and tunnel to home agent).
