document: rfc-8855
kind: design-rationale
summary: UDP transport was added (producing BFCP version 2) to address NAT traversal problems that make TCP impractical in many WebRTC and peer-to-peer deployments. ICE TCP, Teredo, GUT, UPnP IGD, NAT-PMP, SCTP, and prior BFCP-over-UDP proposals were evaluated and found insufficient before this approach was chosen.
section: B.1.1
topics:
    - realtime
    - nat
    - udp
