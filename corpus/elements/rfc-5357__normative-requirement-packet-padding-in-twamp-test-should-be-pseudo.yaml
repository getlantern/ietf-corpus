document: rfc-5357
kind: normative-requirement
summary: Packet Padding in TWAMP-Test SHOULD be pseudo-random and generated independently of other pseudo-random numbers in the document. Implementations MUST provide a configuration option to make Packet Padding consist of all zeros. Packet Padding MUST NOT be covered by HMAC and MUST NOT be encrypted.
section: 4.2.1
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
