document: rfc-7005
kind: design-rationale
summary: For fixed de-jitter buffers, both the high-water mark and low-water mark are defined to equal DJB maximum (not DJB nominal), because a fixed buffer's delay does not vary over the reporting interval — reporting the buffer size is the most informative stationary value.
