document: rfc-3629
kind: normative-requirement
summary: A protocol SHOULD forbid use of U+FEFF as a signature for textual protocol elements that are mandated to always be UTF-8 (since the signature function is useless there), and SHOULD also forbid it when the protocol already provides character-encoding identification mechanisms used consistently by implementations.
section: "6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
