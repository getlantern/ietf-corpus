document: rfc-6283
kind: normative-requirement
summary: Canonicalization MUST be applied over XML structured archive data and MUST be applied over elements of the Evidence Record (ATS and ATSC) in the renewing process. Algorithm identifiers (URIs) MUST be used as defined in RFC 3275 and RFC 4051.
