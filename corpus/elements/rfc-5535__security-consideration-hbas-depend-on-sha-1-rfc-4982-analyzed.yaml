document: rfc-5535
kind: security-consideration
summary: HBAs depend on SHA-1. RFC 4982 analyzed the impact of hash function attacks on CGAs and their extensions, concluding that known attacks do not affect the security of CGA/HBA-based protocols. RFC 4982 also updated the CGA specification to support alternative hash algorithms via the CGA SEC registry.
section: "11.3"
topics:
    - security
    - crypto
    - ip
