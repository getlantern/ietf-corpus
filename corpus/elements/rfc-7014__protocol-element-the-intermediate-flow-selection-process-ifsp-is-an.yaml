summary: The Intermediate Flow Selection Process (IFSP) is an Intermediate Process that takes Flow Records as input and selects a subset as output, using criteria that may include Flow Selection State, resource constraints (e.g., Flow Cache occupancy, export link capacity), and counters—not just Flow Record field values.
