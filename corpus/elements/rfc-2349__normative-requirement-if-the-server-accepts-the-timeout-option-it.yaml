document: rfc-2349
kind: normative-requirement
summary: If the server accepts the timeout option, it sends an OACK to the client. The timeout value in the OACK must match the value specified by the client.
section: Timeout Interval Option Specification
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
