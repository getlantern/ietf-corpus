document: rfc-4077
kind: normative-requirement
summary: When an unreliable transport is used, the original failed message must not be retransmitted by the SigComp layer upon receipt of a NACK; instead the next application-initiated transmission will use the adjusted compressor state.
section: 2.3.1
rfc2119_level: MUST NOT
topics:
