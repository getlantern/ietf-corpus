document: rfc-9876
kind: protocol-element
summary: CoAP lacks a separate mechanism to convey Content Coding information; therefore, Content Coding is specified per Content-Format identifier. If multiple Content Codings are used with a Media Type, a separate Content-Format identifier must be registered for each.
section: "4.1"
topics:
