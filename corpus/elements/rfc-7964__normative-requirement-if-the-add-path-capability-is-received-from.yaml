document: rfc-7964
kind: normative-requirement
summary: If the ADD-PATH Capability is received from an IBGP peer with 'Send/Receive' set to 1 or 3 for the same <AFI, SAFI>, and the peer is a route reflection client, the route reflector MUST advertise to that client the Group Best Paths (or Available Paths) received from its non-client IBGP peers.
section: "5.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
