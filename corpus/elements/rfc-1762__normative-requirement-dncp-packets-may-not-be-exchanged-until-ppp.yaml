document: rfc-1762
kind: normative-requirement
summary: DNCP packets may not be exchanged until PPP has reached the Network-Layer Protocol phase. DNCP packets received before this phase is reached SHOULD be silently discarded.
section: "3"
rfc2119_level: SHOULD
