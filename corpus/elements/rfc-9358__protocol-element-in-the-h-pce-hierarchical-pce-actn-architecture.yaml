document: rfc-9358
kind: protocol-element
summary: In the H-PCE (Hierarchical PCE) / ACTN architecture, the parent PCE (MDSC) sends a PCInitiate message with the VNAG object to bind a new LSP at the child PCE (PNC) to a VN. Subsequent changes to the LSP are reported via PCRpt with the VNAG object, and VN updates trigger PCUpd messages to affected child PCEs.
section: "3"
topics:
