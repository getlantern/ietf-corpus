document: rfc-4837
kind: design-rationale
summary: Point-to-Point Emulation (P2PE) partitions the shared downstream broadcast medium into per-ONU virtual private paths using LLID tags. This solves both subscriber privacy (dedicated traffic is not shared) and IEEE 802.1D bridge rule compliance (peer-to-peer ONU traffic would otherwise have the same source and destination port, requiring discard).
section: 2.2.5
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
