document: rfc-9452
kind: wire-format
summary: 'The IOAM header encapsulated in NSH consists of: IOAM-Type (8 bits), IOAM HDR Len (8 bits), Reserved (8 bits, set to 0x0), Next Protocol (8 bits), followed by variable-length IOAM Option and Optional Data Space, all 4-octet aligned. The NSH NP field is set to 0x06 to indicate IOAM follows.'
