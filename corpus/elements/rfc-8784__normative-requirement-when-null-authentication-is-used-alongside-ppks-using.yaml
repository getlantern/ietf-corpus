document: rfc-8784
kind: normative-requirement
summary: When NULL Authentication is used alongside PPKs, using PPKs MUST be mandatory for the peers that advertise PPK support in IKE_SA_INIT; additionally, the ID Type in IDi/IDr SHOULD NOT be ID_NULL.
section: 5.2.3
rfc2119_level: MUST
