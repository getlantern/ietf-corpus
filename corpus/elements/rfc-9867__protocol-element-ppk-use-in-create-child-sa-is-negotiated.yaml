document: rfc-9867
kind: protocol-element
summary: PPK use in CREATE_CHILD_SA is negotiated by including one or more PPK_IDENTITY_KEY notifications in the CREATE_CHILD_SA request; the PPK Confirmation in this context uses prf(PPK, Ni | SPIi | SPIr) where Ni is the nonce from the CREATE_CHILD_SA request and SPIi/SPIr are the current IKE SA SPIs.
section: "3.2"
topics:
