document: rfc-5234
kind: design-rationale
summary: ABNF deliberately omits implicit linear white space, unlike some earlier Internet specifications that permitted space and horizontal tab to be freely interspersed around major constructs. Grammars that need such flexibility must make it explicit.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
