document: rfc-4721
kind: normative-requirement
summary: If both Mobile-Foreign Authentication and Mobile-AAA Authentication extensions are present, the Mobile-Foreign Challenge extension MUST precede the Mobile-AAA Authentication extension, and the Mobile-AAA Authentication extension MUST precede the Mobile-Foreign Authentication extension.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
