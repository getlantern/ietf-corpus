document: rfc-5380
kind: normative-requirement
summary: If the mobile node receives a MAP option with a valid lifetime of zero, it MUST NOT select that MAP. The mobile node MUST choose another MAP and create new bindings. If no other MAP is available, the mobile node MUST NOT attempt to use HMIPv6.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
