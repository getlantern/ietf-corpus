document: rfc-3958
kind: interoperability-note
summary: Although S-NAPTR uses only a subset of NAPTR record features, this does not imply DNS resolvers should fail to implement all aspects of the NAPTR RR standard. S-NAPTR is a client-use convention (a DDDS application), not a restriction on the DNS infrastructure.
section: "3.1"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
