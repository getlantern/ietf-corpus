document: rfc-6857
kind: protocol-element
summary: 'Mailbox downgrading: if <local-part> is ASCII-only, non-ASCII domains are converted to A-labels. If <local-part> contains non-ASCII characters (which have no ASCII equivalent), the entire <addr-spec> is encoded as encoded-words and rewritten as ''ENCODED-WORD :;''.'
