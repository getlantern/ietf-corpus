document: rfc-9472
kind: security-consideration
summary: A skew can exist between the SBOM listing on a manufacturer's server and the actual software on a device that has not yet been upgraded. A unique mapping of device software version to its SBOM minimizes this risk.
section: "6"
topics:
    - security
