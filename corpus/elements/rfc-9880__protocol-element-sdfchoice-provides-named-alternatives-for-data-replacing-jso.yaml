kind: protocol-element
summary: sdfChoice provides named alternatives for data, replacing JSO's enum (for string or typed alternatives with metadata) and anyOf (for anonymous type unions). The enum keyword is syntactic sugar for string-valued sdfChoice and cannot be used simultaneously with sdfChoice.
