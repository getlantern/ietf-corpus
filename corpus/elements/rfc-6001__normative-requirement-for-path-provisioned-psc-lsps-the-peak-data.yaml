document: rfc-6001
kind: normative-requirement
summary: For path-provisioned PSC LSPs, the Peak Data Rate in SENDER_TSPEC/FLOWSPEC MUST be set to 0. For L2SC LSPs, CIR, EIR, CBS, and EBS MUST be set to 0 in the Ethernet Bandwidth Profile TLV. For TDM and LSC LSPs, a NULL Label value is used to prevent data-plane resource allocation since labels are tightly coupled with resource allocation in those technologies.
section: 5.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
