document: rfc-9640
kind: protocol-element
summary: The 'generate-csr-grouping' defines a 'generate-csr' action (guarded by csr-generation feature, protected by NACM 'default-deny-all') that takes 'csr-format' (identityref) and 'csr-info' (DER-encoded CertificationRequestInfo) as inputs and returns the CSR in the requested format. Only available when the associated public key uses subject-public-key-info-format.
section: 2.1.4.10
