document: rfc-8804
kind: normative-requirement
summary: A uCDN implementation SHOULD prefer routing DNS requests based on client IP subnet when the EDNS0 Client Subnet (ECS) option is present. A dCDN using ECS MUST be aware of the privacy drawbacks in RFC 7871 Section 2 and SHOULD follow the guidelines in Section 11.1 of RFC 7871.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
