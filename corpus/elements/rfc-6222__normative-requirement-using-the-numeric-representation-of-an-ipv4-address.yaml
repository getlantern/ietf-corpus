document: rfc-6222
kind: normative-requirement
summary: Using the numeric representation of an IPv4 address as the 'host' part of an RTCP CNAME is NOT RECOMMENDED, because it is difficult or impossible for a host to determine if it is behind NAT, and public IPv4 addresses can also be shared by multiple hosts.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - nat
    - ip
