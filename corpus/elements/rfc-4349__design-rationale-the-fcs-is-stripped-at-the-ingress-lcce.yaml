document: rfc-4349
kind: design-rationale
summary: The FCS is stripped at the ingress LCCE and regenerated at the egress LCCE rather than transported end-to-end. This means corruption introduced during PSN transit may not be detected. IPsec can be used to provide payload integrity when needed.
