document: rfc-8250
kind: protocol-element
summary: 'SCALEDTLR and SCALEDTLS are 8-bit unsigned integers (range 0–255) that store the number of low-order bits truncated from the respective 64-bit attosecond time-differential value to fit it into the 16-bit delta field. The actual time differential is: delta_value * 2^scale attoseconds.'
