document: rfc-4193
kind: wire-format
summary: 'Local IPv6 addresses use the format: 7-bit prefix (FC00::/7), 1-bit L flag, 40-bit Global ID, 16-bit Subnet ID, and 64-bit Interface ID. The L bit is set to 1 for locally assigned prefixes; L=0 is reserved for future use.'
