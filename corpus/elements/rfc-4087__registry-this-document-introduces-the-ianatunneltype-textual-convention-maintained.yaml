summary: This document introduces the IANAtunnelType textual convention, maintained in the IANAifType-MIB. Initial values include other(1), direct(2), gre(3), minimal(4), l2tp(5), pptp(6), l2f(7), udp(8), atmp(9), msdp(10), sixToFour(11), sixOverFour(12), isatap(13), and teredo(14). Assignment policy mirrors that of IANAifType.
