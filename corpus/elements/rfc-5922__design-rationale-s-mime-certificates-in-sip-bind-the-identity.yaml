document: rfc-5922
kind: design-rationale
summary: S/MIME certificates in SIP bind the identity of an individual user (end-to-end), while TLS certificates bind per-hop domain identities. This distinction motivated separate, more specific guidance for TLS certificate use that RFC 3261 did not provide.
section: "3"
topics:
