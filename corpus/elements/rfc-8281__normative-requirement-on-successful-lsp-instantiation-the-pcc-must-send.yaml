document: rfc-8281
kind: normative-requirement
summary: On successful LSP instantiation, the PCC MUST send a PCRpt with a non-zero PLSP-ID uniquely identifying the LSP, the Create flag set, and the Delegate flag set. The SRP object MUST echo the SRP-ID-number from the triggering PCInitiate.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
