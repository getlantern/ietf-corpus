document: rfc-8657
kind: privacy-consideration
summary: Because CAA records are publicly accessible, the "accounturi" parameter reveals authorized account URIs for a domain to any third party. This may allow correlation of domains that share the same account URIs. CAs are encouraged to select and process account URIs assuming untrusted third parties may learn of them.
section: "5.9"
topics:
    - acme
    - pkix
    - privacy
    - dns
