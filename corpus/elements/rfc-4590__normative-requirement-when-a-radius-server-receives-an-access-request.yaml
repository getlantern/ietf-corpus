document: rfc-4590
kind: normative-requirement
summary: When a RADIUS server receives an Access-Request with Digest-Method and Digest-URI but no Digest-Nonce, it MUST place a chosen nonce in a Digest-Nonce attribute and return it in an Access-Challenge. The Access-Challenge MUST also include Digest-Realm and Message-Authenticator.
section: "2.2"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
