document: rfc-8062
kind: normative-requirement
summary: If the client in an AS request is anonymous, the anonymous KDC option MUST be set in the request; otherwise, the KDC MUST return a KRB-ERROR with code KDC_ERR_BADOPTION.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - privacy
