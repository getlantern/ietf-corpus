document: rfc-5839
kind: normative-requirement
summary: When a subscriber receives a NOTIFY request containing a SIP-ETag header field, it MUST store the entity-tag if it wishes to make use of conditional notification. The subscriber MUST be prepared to receive a NOTIFY with any entity-tag value, including previously seen values.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
