document: rfc-6450
kind: design-rationale
summary: The Client Timestamp and Server Timestamp options use a 32-bit seconds-since-epoch format rather than the NTPv4 timestamp format. The document explicitly acknowledges this was the wrong choice and recommends the NTPv4 format be considered for future protocol extensions.
section: "3.2"
topics:
