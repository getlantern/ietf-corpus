document: rfc-4636
kind: normative-requirement
summary: A mobile node that cannot correctly interpret the contents of the FA Error Extension MUST NOT use the care-of address provided in the Registration Reply message until another Registration Request has been sent and a successful Registration Reply received.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mobility
