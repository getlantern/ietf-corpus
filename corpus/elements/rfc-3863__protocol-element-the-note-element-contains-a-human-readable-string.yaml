document: rfc-3863
kind: protocol-element
summary: The <note> element contains a human-readable string comment and may appear as a child of <presence> (describing the presentity) or of <tuple> (describing that tuple). It SHOULD carry an 'xml:lang' attribute per RFC 3066 and SHOULD NOT be used as a non-interoperable substitute for status.
section: 4.1.6
topics:
    - realtime
    - sip
