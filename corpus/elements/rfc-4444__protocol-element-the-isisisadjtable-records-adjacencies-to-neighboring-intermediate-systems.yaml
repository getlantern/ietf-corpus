document: rfc-4444
kind: protocol-element
summary: The isisISAdjTable records adjacencies to neighboring Intermediate Systems, indexed by circuit and adjacency index. Each entry includes 2-way and 3-way adjacency state, neighbor SNPA address, system type, system ID, extended circuit ID, usage level, hold timer, neighbor priority, and last-up timestamp.
