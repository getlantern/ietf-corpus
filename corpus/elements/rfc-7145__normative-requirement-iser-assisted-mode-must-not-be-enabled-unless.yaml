document: rfc-7145
kind: normative-requirement
summary: iSER-assisted mode MUST NOT be enabled unless negotiated on the leading connection during the LoginOperationalNegotiation stage via RDMAExtensions='Yes'. If both peers fail to negotiate this key to 'Yes', the connection MUST continue with standard iSCSI login semantics.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
