document: rfc-8046
kind: protocol-element
summary: Credit-Based Authorization allows a host to send data to a peer's newly announced but UNVERIFIED locator, bounded by a credit counter that is incremented by inbound packet sizes and decremented by outbound packet sizes sent to the UNVERIFIED address. Credit aging periodically multiplies counters by CreditAgingFactor (7/8) every CreditAgingInterval (5 seconds) to prevent slow credit buildup for time-shifting attacks.
section: "5.6"
topics:
    - ip
    - mobility
    - security
