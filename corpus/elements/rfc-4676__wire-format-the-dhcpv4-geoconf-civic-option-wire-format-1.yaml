document: rfc-4676
kind: wire-format
summary: 'The DHCPv4 GEOCONF_CIVIC option wire format: 1-octet code (99), 1-octet length N, 1-octet ''what'' (0=server, 1=nearest network element, 2=client), 2-octet ASCII country code, followed by zero or more TLV civic address elements.'
section: "3.1"
