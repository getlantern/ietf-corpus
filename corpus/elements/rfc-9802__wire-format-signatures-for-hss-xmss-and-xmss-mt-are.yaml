document: rfc-9802
kind: wire-format
summary: Signatures for HSS, XMSS, and XMSS^MT are encoded directly as a BIT STRING in the signatureValue field of Certificate and CertificateList structures, with no additional ASN.1 wrapping. The AlgorithmIdentifier for the signature SHALL be a SEQUENCE of one component (the OID), with the parameters field omitted.
section: "7"
