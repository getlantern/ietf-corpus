document: rfc-2982
kind: design-rationale
summary: The Expression MIB exists because users frequently need custom MIB objects that MIB designers have not provided, and such needs vary by management philosophy. Rather than proliferating more standardized MIBs, the Expression MIB allows externally defined expressions of existing objects, making results usable anywhere a MIB object can be used.
