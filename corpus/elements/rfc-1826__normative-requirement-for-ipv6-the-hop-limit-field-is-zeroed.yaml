document: rfc-1826
kind: normative-requirement
summary: For IPv6, the HOP LIMIT field is zeroed for Authentication Data calculation. Each IPv6 OPTION TYPE's third-highest-order bit MUST be used to determine whether the option is included (bit=0) or replaced by zeros (bit=1) in the calculation.
section: "4"
rfc2119_level: MUST
topics:
