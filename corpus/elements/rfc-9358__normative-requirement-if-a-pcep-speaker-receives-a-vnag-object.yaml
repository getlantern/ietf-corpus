document: rfc-9358
kind: normative-requirement
summary: If a PCEP speaker receives a VNAG object with a TLV that violates the rules of this document, the speaker MUST send a PCErr with Error-Type=10 (Reception of an invalid object) and Error-value=11 (Malformed object) and MUST close the PCEP session.
section: "4"
rfc2119_level: MUST
topics:
