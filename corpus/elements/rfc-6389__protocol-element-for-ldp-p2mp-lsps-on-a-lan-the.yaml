document: rfc-6389
kind: protocol-element
summary: 'For LDP P2MP LSPs on a LAN, the MPLS packet transmitted by Ru carries a two-label stack: the top label is the context label assigned by Ru on LAN interface Li; the bottom label is the upstream-assigned label for the LDP P2MP LSP. The top label is looked up in the context of Li to determine the context-specific label space for the inner label.'
section: "6"
topics:
