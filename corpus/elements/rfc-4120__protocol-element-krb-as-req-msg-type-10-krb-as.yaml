document: rfc-4120
kind: protocol-element
summary: KRB_AS_REQ (msg-type 10) / KRB_AS_REP (msg-type 11) form the Authentication Service exchange. The request carries client/server names, encryption types, nonce, and requested times in cleartext; the reply contains a ticket and session key encrypted in the client's secret key.
section: "5.4"
