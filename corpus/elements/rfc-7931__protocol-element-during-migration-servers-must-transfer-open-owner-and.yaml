document: rfc-7931
kind: protocol-element
summary: 'During migration, servers must transfer open-owner and lock-owner state including: the sequence number of the last operation per owner and sufficient result information to correctly respond to reissued operations. When an owner''s state spans multiple file systems, the owner sequence value is propagated to the destination while retained on the source; both servers advance the sequence independently thereafter, potentially requiring support for multiple ''last reply'' data items per owner.'
section: 6.1.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
