document: rfc-8143
kind: normative-requirement
summary: NNTP servers MUST discard any NNTP command received between the use of the STARTTLS command and the end of TLS negotiation, to prevent STARTTLS command injection attacks (RFC 7457 Section 2.2).
section: "4"
rfc2119_level: MUST
topics:
