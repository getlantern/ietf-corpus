document: rfc-8564
kind: state-machine
summary: The head maintains a MultipointHead session per multipoint path; each tail dynamically creates a MultipointTail session per multipoint path. For tracking active tails, the head maintains a MultipointClient session per receiver of interest (per RFC 8563).
