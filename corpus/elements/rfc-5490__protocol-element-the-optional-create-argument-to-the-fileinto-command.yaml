document: rfc-5490
kind: protocol-element
summary: The optional ":create" argument to the "fileinto" command instructs the Sieve interpreter to create the specified mailbox before attempting delivery if it does not already exist. Failure to create the mailbox is treated as an error. Capability string is "mailbox".
section: "3.2"
topics:
    - email
