document: rfc-8158
kind: protocol-element
summary: 'The natEvent Information Element (IPFIX ID 230, unsigned8) identifies the type of NAT event. RFC 8158 defines 19 event values including: Reserved (0), NAT44/NAT64 session create/delete (4-7), NAT44/NAT64 BIB create/delete (8-11), NAT ports exhausted (12), Quota Exceeded (13), Address binding create/delete (14-15), Port block allocation/de-allocation (16-17), and Threshold Reached (18).'
section: "4.3"
topics:
    - nat
    - registry
