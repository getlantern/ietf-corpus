document: rfc-5844
kind: normative-requirement
summary: The MAG MUST include exactly one IPv4 Home Address Request option in the initial Proxy Binding Update when IPv4 home address mobility support is needed. The option MAY request a specific address or MAY set the address field to ALL_ZERO for dynamic allocation.
section: 3.2.3.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
