document: rfc-5891
kind: protocol-element
summary: A U-label is a Unicode string that contains at least one non-ASCII character, passes all label validation tests in Section 4.2.3, and is 63 or fewer characters long in ACE form. It is the canonical human-readable form of an internationalized label.
