document: rfc-1460
kind: protocol-element
summary: The optional APOP command provides challenge-response authentication in the AUTHORIZATION state. The server includes a unique timestamp (RFC 822 msg-id format) in its greeting banner; the client sends APOP with a username and an MD5 digest of the concatenation of the timestamp (with angle-brackets) and the shared secret. The digest is 16 octets in lowercase hexadecimal.
section: "7"
