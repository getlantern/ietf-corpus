document: rfc-4676
kind: normative-requirement
summary: The 'what' field value of 2 (location of the client) SHOULD be used. Values 0 (DHCP server) and 1 (nearest network element) SHOULD NOT be used unless it is known that the client is in close physical proximity to that device.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
