document: rfc-3497
kind: protocol-element
summary: 'A SMPTE 292M television line comprises interleaved luminance (Y) and chrominance (CrCb) streams using 4:2:2 coding. Each stream is divided into four parts: SAV (start of active video), digital active line, EAV (end of active video), and digital line blanking. Ancillary data (H-ANC or V-ANC) may substitute for blanking or active line content.'
section: "2"
