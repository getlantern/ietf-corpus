document: rfc-9662
kind: normative-requirement
summary: Implementations of RFC 5425 MUST continue to use TLS 1.2 as the mandatory-to-implement transport protocol, SHOULD support TLS 1.3, and if TLS 1.3 is implemented, MUST prefer to negotiate TLS 1.3 over earlier versions.
