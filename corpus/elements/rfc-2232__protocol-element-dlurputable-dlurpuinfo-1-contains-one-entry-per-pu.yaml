document: rfc-2232
kind: protocol-element
summary: dlurPuTable (dlurPuInfo 1) contains one entry per PU supported via DLUR, indexed by dlurPuName (DisplayString SIZE 1..17). Each entry includes SSCP-supplied name, PU status, ANS support, location, link station name, DLUS session status, active DLUS name, and defined primary DLUS name.
