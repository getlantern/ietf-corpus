document: rfc-2514
kind: protocol-element
summary: AtmVpIdentifier encodes the VPI for a VPL or VCL. VPI=0 is only allowed for a VCL. UNI VPI ranges 0-255; NNI VPI ranges 0-4095. The maximum is further constrained by atmInterfaceMaxVpiBits defined in ATM-MIB.
