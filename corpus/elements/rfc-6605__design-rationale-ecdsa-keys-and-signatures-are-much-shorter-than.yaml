document: rfc-6605
kind: design-rationale
summary: ECDSA keys and signatures are much shorter than RSA equivalents at comparable security levels (256 vs 3072 bits for keys at ~128-bit security), making ECDSA advantageous for DNSSEC which must store and transmit both keys and signatures in DNS records.
section: "1"
topics:
