document: rfc-6772
kind: protocol-element
summary: 'The geodetic location condition profile (token: ''geodetic-condition'') uses a GML <Circle> element within <location>. The condition evaluates to TRUE if the Target''s current location is completely within the described location. If the Target''s geodetic location is unknown, the condition evaluates to FALSE.'
section: "4.1"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
