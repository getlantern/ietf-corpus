document: rfc-5048
kind: normative-requirement
summary: When an initiator discards an Asynchronous Message or Reject PDU due to a payload digest error, the entire PDU including the header MUST be discarded and the initiator MUST treat the exception like a loss of any other solicited response PDU, using SNACK, connection logout for recovery, or connection close.
section: "7.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
