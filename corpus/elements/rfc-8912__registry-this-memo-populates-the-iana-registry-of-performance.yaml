document: rfc-8912
kind: registry
summary: This memo populates the IANA Registry of Performance Metrics with 17 initial entries (IDs 1–17) covering UDP Round-Trip Latency/Loss (IDs 1–2), Packet Delay Variation (ID 3), DNS Response Latency/Loss (IDs 4–5), UDP Poisson One-Way Delay/Loss (IDs 6–11), and UDP Periodic One-Way Delay/Loss (IDs 12–17), plus additional entries in Sections 9–10 for ICMP and TCP. Each entry is administered by IANA under the Specification Required policy per RFC 8911.
