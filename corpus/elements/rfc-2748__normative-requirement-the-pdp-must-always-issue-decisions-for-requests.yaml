document: rfc-2748
kind: normative-requirement
summary: The PDP MUST always issue decisions for requests on a particular handle in the order they arrive, and all requests MUST have a corresponding decision. The first decision for a new or updated request MUST have the Solicited Message flag set in the COPS header.
section: "3.2"
rfc2119_level: MUST
topics:
    - qos
