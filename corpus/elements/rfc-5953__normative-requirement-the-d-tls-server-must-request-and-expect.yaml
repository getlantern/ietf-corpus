document: rfc-5953
kind: normative-requirement
summary: The (D)TLS server MUST request and expect a certificate from the client and MUST NOT accept SNMP messages over the (D)TLS connection until the client has sent a certificate and it has been authenticated. Any verification failure MUST cause session establishment to fail.
section: 5.3.2
rfc2119_level: MUST
topics:
    - snmp
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
