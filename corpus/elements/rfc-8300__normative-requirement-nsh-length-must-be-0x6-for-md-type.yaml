document: rfc-8300
kind: normative-requirement
summary: NSH Length MUST be 0x6 for MD Type 0x1 and MUST be 0x2 or greater for MD Type 0x2. The NSH length MUST be an integer multiple of 4 bytes; variable-length metadata is always padded to a 4-byte boundary.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
