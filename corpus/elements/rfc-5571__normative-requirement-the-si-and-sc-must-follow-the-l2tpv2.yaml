document: rfc-5571
kind: normative-requirement
summary: The SI and SC MUST follow the L2TPv2 operations described in RFC 2661 when performing Softwire establishment, teardown, and OAM. The L2TPv2 compulsory tunneling model does not apply to Softwires and SHOULD NOT be requested or honored.
section: "1"
rfc2119_level: MUST
topics:
    - vpn
    - v6ops
    - ip
