document: rfc-7545
kind: normative-requirement
summary: If the location in an Available Spectrum Query is outside the regulatory domain supported by the Database, the Database MUST respond with an OUTSIDE_COVERAGE error. In a batch request, if only some locations are outside coverage, the Database MUST return an OK response with spectrum for valid locations only.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
