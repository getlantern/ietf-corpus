document: rfc-7532
kind: wire-format
summary: The fedfsUuid attribute (OID 1.3.6.1.4.1.31103.1.1) is a single-valued LDAP attribute using UUID syntax (1.3.6.1.1.16.1, RFC 4530) with uuidMatch equality and uuidOrderingMatch ordering. It is the base type for all UUIDs used in the federated file system protocols.
section: 4.2.1.1
topics:
    - ldap
