document: rfc-9218
kind: wire-format
summary: 'The HTTP/3 PRIORITY_UPDATE frame uses type 0xF0700 for request streams and 0xF0701 for push streams. Its payload contains: a variable-length integer Prioritized Element ID (stream ID or push ID) and a variable-length Priority Field Value in ASCII Structured Fields encoding.'
