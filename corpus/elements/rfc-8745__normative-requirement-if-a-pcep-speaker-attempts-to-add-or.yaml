document: rfc-8745
kind: normative-requirement
summary: If a PCEP speaker attempts to add or update an LSP to a PPAG and the Tunnel ID, source, or destination differs from existing LSPs in the PPAG, the PCEP speaker MUST send PCErr with Error-Type 26 and Error-Value 9 (Tunnel ID or endpoints mismatch for Path Protection Association).
section: "4.5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
