document: rfc-2156
kind: normative-requirement
summary: When mapping time values, the timezone shall be preserved as specified and the date shall not be normalized to any other timezone. When mapping to X.400, the UTCTime format specifying the timezone offset shall be used. When mapping to RFC 822, a numeric timezone offset (e.g., -0500) shall be included in 822.date-time.
section: 3.3.5
rfc2119_level: MUST
topics:
    - email
