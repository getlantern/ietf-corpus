document: rfc-6898
kind: normative-requirement
summary: A maximum of a single CONFIG object of any particular C-type SHALL be included in a message. A receiver that receives multiple CONFIG objects of the same C-type SHALL process only the first and ignore any subsequent ones.
section: "2.2"
rfc2119_level: SHALL
topics:
