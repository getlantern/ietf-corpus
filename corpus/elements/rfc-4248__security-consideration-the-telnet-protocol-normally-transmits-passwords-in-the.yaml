document: rfc-4248
kind: security-consideration
summary: The Telnet protocol normally transmits passwords in the clear and offers no privacy; both the user's identity and password are exposed without protection, as is the entire session content. Users cannot rely on more-secure Telnet extensions being invoked unless explicitly enabled and the results of security negotiation are verified.
section: "3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
