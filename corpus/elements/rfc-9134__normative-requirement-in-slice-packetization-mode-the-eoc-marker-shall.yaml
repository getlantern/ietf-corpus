document: rfc-9134
kind: normative-requirement
summary: In slice packetization mode, the EOC marker SHALL immediately follow the last slice data in the final packetization unit of a JPEG XS codestream. For interlaced frames the header segment of the second field SHALL be in its own packetization unit.
section: "4.1"
rfc2119_level: SHALL
topics:
