document: rfc-6909
kind: wire-format
summary: The IPv4 Traffic Offload Selector option has a Type field (8-bit, value 53), a Length field (8-bit, octets excluding type and length), a 1-bit Offload Mode (M) flag, a 31-bit Reserved field (must be zero), and a variable-length Traffic Selector sub-option.
