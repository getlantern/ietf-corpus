document: rfc-6630
kind: wire-format
summary: EAP-Initiate/Re-auth-Start extension adds a 1-bit 'E' flag (early authentication indicator) in the flags byte after the Type field, with the remaining 7 bits reserved and set to 0. It may carry a CAP-Identifier TLV (at most one) advertising the SAP-adjacent CAP.
section: "5.1"
topics:
    - security
