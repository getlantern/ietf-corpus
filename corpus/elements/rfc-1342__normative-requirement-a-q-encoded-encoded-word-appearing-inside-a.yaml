document: rfc-1342
kind: normative-requirement
summary: A 'Q'-encoded encoded-word appearing inside a comment (delimited by parentheses) MUST NOT contain the characters '(', ')' or '\', since these are special within RFC 822 comments.
section: Use of encoded-words in message headers
rfc2119_level: MUST NOT
topics:
    - email
