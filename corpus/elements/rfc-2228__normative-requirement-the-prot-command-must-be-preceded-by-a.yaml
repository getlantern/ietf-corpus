document: rfc-2228
kind: normative-requirement
summary: The PROT command MUST be preceded by a successful PBSZ negotiation; the server MUST reject PROT with a 503 reply if no previous PBSZ command was issued. A successful PROT command yields a 200 reply.
section: "3"
rfc2119_level: MUST
topics:
    - security
