document: rfc-8550
kind: design-rationale
summary: DSA was dropped in S/MIME v4.0 as part of a general movement from finite-field to elliptic-curve cryptography. Additionally, issues related to non-deterministic generation of the parameter 'k' in DSA created security risks. ECDSA and EdDSA are the preferred replacements.
section: A.1
topics:
    - email
    - pkix
    - crypto
