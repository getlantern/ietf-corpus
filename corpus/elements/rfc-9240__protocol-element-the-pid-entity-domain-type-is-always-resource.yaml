document: rfc-9240
kind: protocol-element
summary: 'The ''pid'' entity domain type is always resource-specific; it depends on a network map (defining information resource media type: application/alto-networkmap+json). Entity identifiers are the PID names of the associated network map. There is no hierarchy or inheritance for PID entities; PID properties are independent of properties on the IP prefixes within that PID.'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
