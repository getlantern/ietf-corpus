document: rfc-6130
kind: normative-requirement
summary: A received HELLO message is invalid and MUST be discarded if it lacks exactly one VALIDITY_TIME Message TLV, contains conflicting TLV values on the same address object, contains an address matching the receiver's own current or recently used addresses, or has out-of-range LOCAL_IF / LINK_STATUS / OTHER_NEIGHB values.
section: "12.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
