document: rfc-3289
kind: security-consideration
summary: The DIFFSERV-MIB provides read-write access to objects that control traffic classification, metering, marking, dropping, and queuing. Unauthorized write access could allow an adversary to alter QoS policies, disrupt service guarantees, or redirect traffic, making SNMPv3 with authentication and privacy strongly advisable for any write-capable access.
section: "8"
topics:
    - diffserv
    - snmp
    - security
