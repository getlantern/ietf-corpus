document: rfc-1332
kind: wire-format
summary: Exactly one IP packet is encapsulated in the Information field of PPP Data Link Layer frames where the Protocol field indicates type hex 0021 (Internet Protocol). Larger IP datagrams must be fragmented as necessary.
