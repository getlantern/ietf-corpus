document: rfc-4291
kind: protocol-element
summary: 'Address type is identified by high-order bits: Unspecified is ::/128, Loopback is ::1/128, Multicast is FF00::/8, Link-Local unicast is FE80::/10, and all other addresses are Global Unicast. Anycast addresses are syntactically indistinguishable from unicast.'
