document: rfc-8414
kind: security-consideration
summary: If an inappropriate protected resource is used by the client, an attacker may be able to act as a man-in-the-middle proxy to a valid protected resource undetected. Determining appropriate authorization server / protected resource associations is application-dependent and out of scope.
section: "6.4"
topics:
