document: rfc-9650
kind: design-rationale
summary: The original 'Standards Action' registration procedure was unnecessarily restrictive because it prevented allocation of bits to experimental protocols, increasing the risk of 'code point squatting' (use of unregistered code points that may later conflict with standardized assignments). Relaxing to 'Expert Review' mitigates this risk.
