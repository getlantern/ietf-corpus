document: rfc-6871
kind: protocol-element
summary: The latent configuration attribute 'a=lcfg:<config-number> <lcfg-cfg-list>' declares media stream configurations that are supportable in a future offer/answer exchange but are not offered for immediate use. It is always a media-level attribute and combines properties of a media line and a potential configuration.
section: 3.3.5
topics:
    - realtime
