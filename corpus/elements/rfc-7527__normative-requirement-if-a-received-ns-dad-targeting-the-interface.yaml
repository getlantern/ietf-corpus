document: rfc-7527
kind: normative-requirement
summary: If a received NS(DAD) targeting the interface's tentative/optimistic address includes a nonce but no match is found with any stored nonce, the node SHOULD log a system management message for a DAD-failed state and SHOULD update statistics counters.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
