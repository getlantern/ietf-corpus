document: rfc-8760
kind: normative-requirement
summary: When the UAC receives a response with multiple WWW-Authenticate/Proxy-Authenticate header fields with the same realm, it SHOULD use the topmost header field that it supports unless a local policy dictates otherwise. The client MUST ignore any challenge it does not understand.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
