document: rfc-4582
kind: security-consideration
summary: BFCP requires TLS-based mutual authentication between clients and floor control servers as the RECOMMENDED mechanism. It relies on an integrity-protected channel (e.g., SIP/SDP offer-answer) to exchange self-signed certificates or their fingerprints used at TLS establishment.
section: "9.1"
topics:
    - tls
    - security
    - realtime
