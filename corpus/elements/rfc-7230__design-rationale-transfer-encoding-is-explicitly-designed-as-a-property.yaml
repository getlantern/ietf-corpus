document: rfc-7230
kind: design-rationale
summary: Transfer-Encoding is explicitly designed as a property of the message rather than the representation (unlike Content-Encoding) so that it can be safely stripped or added by any recipient along the chain; it serves message framing rather than payload characterization.
section: 3.3.1
