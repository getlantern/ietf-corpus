document: rfc-6731
kind: normative-requirement
summary: The RDNSS selection option SHOULD NOT be enabled by default; it may only be used when delivered over a trusted channel, when DNSSEC validation is performed by the client or a trusted resolver, or when the RDNSS is already trusted by the client.
section: "4.5"
rfc2119_level: SHOULD NOT
topics:
    - dns
    - security
