document: rfc-2609
kind: security-consideration
summary: 'If service type templates are modified or false templates are distributed, services may register incorrectly or clients may misinterpret service information. Service: URLs could be distributed to redirect clients to incorrect services; SLPv2 provides an authentication mechanism allowing registered service: URLs to be signed and verified.'
