document: rfc-4006
kind: state-machine
summary: Section 7 defines the Credit-Control Application state machine. States include Idle, PendingI (initial CCR sent, awaiting CCA), Open (session active, quota granted), PendingU (update CCR sent, awaiting CCA), PendingT (termination CCR sent), and PendingE (event CCR sent). Transitions are triggered by sending CCR, receiving CCA, Validity-Time expiry, Final-Unit-Indication consumption, and RAR receipt.
