document: rfc-9538
kind: interoperability-note
summary: The delegation object defined in RFC 9115 Section 2.3.1.3 only allows DNS mappings via CNAME RRs. A future document updating RFC 9115 could expand the delegation object to also include SVCB/HTTPS-based mappings (RFC 9460), but this is not currently supported.
section: "3"
topics:
