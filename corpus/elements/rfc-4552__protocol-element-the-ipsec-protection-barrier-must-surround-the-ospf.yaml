document: rfc-4552
kind: protocol-element
summary: The IPsec protection barrier MUST surround the OSPF protocol so all inbound and outbound OSPF traffic goes through IPsec processing. For interfaces with OSPFv3 security disabled, an SPD rule bypasses OSPF traffic; for enabled interfaces, rules protect link-local (fe80::/10) and virtual-link (src/128, dst/128) OSPF traffic.
section: "11"
topics:
    - ipsec
    - security
    - routing
