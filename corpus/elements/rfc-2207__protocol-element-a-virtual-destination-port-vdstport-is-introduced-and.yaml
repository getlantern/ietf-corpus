document: rfc-2207
kind: protocol-element
summary: A virtual destination port (vDstPort) is introduced and carried in the new GPI SESSION object but not in the IPSEC transport header. It allows differentiation of multiple IPSEC sessions destined to the same IP address and serves as the session demultiplexing value that replaces the DstPort in the (DestAddress, protocol ID, DstPort) session triple.
section: "2"
topics:
    - ipsec
    - qos
