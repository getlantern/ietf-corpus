document: rfc-6006
kind: protocol-element
summary: P2MP capability is advertised via a new flag (bit 10) in the OSPF PCE Capability Flags sub-TLV defined in RFC 5088, shared with IS-IS PCE discovery. PCEs supporting P2MP computation set this bit; PCCs that do not understand it ignore it.
