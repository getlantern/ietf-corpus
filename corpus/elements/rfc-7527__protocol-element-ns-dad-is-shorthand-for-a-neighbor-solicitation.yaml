document: rfc-7527
kind: protocol-element
summary: NS(DAD) is shorthand for a Neighbor Solicitation (RFC 4861) with an unspecified IPv6 source address (::) issued during Duplicate Address Detection. Enhanced DAD augments NS(DAD) by adding the Nonce option from SEND (RFC 3971) to enable loopback detection.
section: "1.2"
topics:
