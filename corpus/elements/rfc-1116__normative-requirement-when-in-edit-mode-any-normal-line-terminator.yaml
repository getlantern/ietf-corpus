document: rfc-1116
kind: normative-requirement
summary: When in EDIT mode, any normal line terminator MUST be transmitted with CR LF as the line terminator. When EDIT mode is off, a carriage return is sent as CR NUL, a line feed as LF, and other line-completion keys (ENTER/DOIT) as CR LF.
section: "5.2"
rfc2119_level: MUST
topics:
    - tcp
