document: rfc-6122
kind: design-rationale
summary: The term 'resourcepart' replaces 'resource identifier' from RFC 3920 to avoid confusion with the meanings of 'resource' and 'identifier' in the URI specification (RFC 3986). Similarly, 'localpart' replaces 'node identifier' to avoid confusion with 'node' as used in XEP-0030 and XEP-0060, while the profile name 'Nodeprep' is retained for backward compatibility.
section: C
