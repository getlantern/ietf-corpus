document: rfc-8638
kind: normative-requirement
summary: When an AFBR wishes to propagate a Join/Prune(S,G,rpt) message to an I-IP upstream router, the AFBR MUST operate as specified in Sections 6.5 and 6.6, because the I-IP core does not process (S,G,rpt) messages.
section: "6.3"
rfc2119_level: MUST
topics:
    - multicast
    - ip
