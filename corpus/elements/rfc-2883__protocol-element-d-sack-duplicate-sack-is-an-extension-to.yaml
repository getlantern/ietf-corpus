document: rfc-2883
kind: protocol-element
summary: D-SACK (duplicate-SACK) is an extension to the SACK option where the first SACK block reports the sequence numbers of the duplicate segment that triggered the acknowledgement. This allows the TCP sender to infer when it has unnecessarily retransmitted a packet due to reordering, ACK loss, packet replication, or early retransmit timeout.
section: "2"
topics:
