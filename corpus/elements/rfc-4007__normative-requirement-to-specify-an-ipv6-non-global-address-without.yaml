document: rfc-4007
kind: normative-requirement
summary: To specify an IPv6 non-global address without ambiguity, an implementation SHOULD support the textual format '<address>%<zone_id>' where '%' is the delimiter, <address> is the literal IPv6 address, and <zone_id> is a string identifying the zone. This format applies to all unicast and multicast addresses of non-global scope except the unspecified address.
section: "11"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
