document: rfc-8832
kind: design-rationale
summary: To avoid collisions when both sides simultaneously open a data channel, the DTLS client MUST use even stream identifiers and the DTLS server MUST use odd stream identifiers. This leverages the existing DTLS role negotiation to assign disjoint identifier spaces without additional signaling.
