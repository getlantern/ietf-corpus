document: rfc-7571
kind: normative-requirement
summary: When requesting loopback, the ingress MUST send a Path message with the Loopback Attribute Flag set, and MUST ensure the loopback entity is explicitly identified by the immediately preceding subobject of the ERO Hop Attributes subobject (per RFC7570). The A bit MUST remain set.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
