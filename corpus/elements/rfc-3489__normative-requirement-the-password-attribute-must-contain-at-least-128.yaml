document: rfc-3489
kind: normative-requirement
summary: The PASSWORD attribute MUST contain at least 128 bits of randomness, MUST be unguessable, and MUST be a cryptographically random function of the username; the probability of assigning the same password to two different usernames MUST be vanishingly small.
section: "8.2"
rfc2119_level: MUST
topics:
    - nat
    - security
    - crypto
