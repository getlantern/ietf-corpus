document: rfc-2491
kind: security-consideration
summary: This architecture introduces no new protocols and therefore no additional security threats beyond those inherent in NHRP, IPv6, ND, and MARS. It should not be deployed where any of the base protocols are considered unacceptably insecure. All IPv6 security mechanisms (authentication, encryption for ND and data) work without modification over NBMA.
section: "7"
