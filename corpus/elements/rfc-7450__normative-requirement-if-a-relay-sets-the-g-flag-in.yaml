document: rfc-7450
kind: normative-requirement
summary: If a relay sets the G flag in the Membership Query message, it MUST also include the Gateway Port Number and Gateway IP Address fields. This allows gateways to detect address changes caused by NAT remapping or interface roaming.
section: 5.1.4.5
rfc2119_level: MUST
topics:
    - multicast
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
