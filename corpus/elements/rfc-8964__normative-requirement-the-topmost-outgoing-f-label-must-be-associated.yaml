document: rfc-8964
kind: normative-requirement
summary: The topmost (outgoing) F-Label MUST be associated with a provisioned outgoing interface and, for non-point-to-point interfaces, a next-hop LSR. Implementations MUST ensure traffic carried over each LSP represented by F-Labels receives the provisioned traffic treatment.
section: 4.2.3.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
