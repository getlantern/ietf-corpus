document: rfc-6130
kind: normative-requirement
summary: A HELLO message MUST contain exactly one VALIDITY_TIME Message TLV (per RFC 5497) representing H_HOLD_TIME for the transmitting MANET interface. The zero and infinite time representations defined in RFC 5497 MUST NOT be used.
section: "10.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
