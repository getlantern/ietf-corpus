document: rfc-4695
kind: normative-requirement
summary: Unpaired 0xF7 octets MUST NOT appear in the MIDI list of the MIDI Command section, to avoid interference with the command segmentation coding. A sender MAY cancel a segmented SysEx transmission in progress but MUST NOT send a cancel after a 'last' sublist.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
