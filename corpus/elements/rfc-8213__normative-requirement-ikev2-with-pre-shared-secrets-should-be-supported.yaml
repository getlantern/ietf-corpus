document: rfc-8213
kind: normative-requirement
summary: IKEv2 with pre-shared secrets SHOULD be supported for key management, as manually configured keys do not provide defense against replayed messages. IKEv2 with public keys MAY be supported.
section: "3"
rfc2119_level: SHOULD
