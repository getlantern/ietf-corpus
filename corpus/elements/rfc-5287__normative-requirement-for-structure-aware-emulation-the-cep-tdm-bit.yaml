document: rfc-5287
kind: normative-requirement
summary: For structure-aware emulation, the CEP/TDM Bit-Rate parameter MUST be set to N, where N is the number of DS0 channels in the attachment circuit. For structure-agnostic T1 basic emulation mode, it MUST be set to 24; for Octet-aligned T1, it MUST be set to 25.
section: "3.3"
rfc2119_level: MUST
topics:
    - mpls
