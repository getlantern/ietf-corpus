document: rfc-1730
kind: normative-requirement
summary: A client MUST be prepared to accept any server response at all times, including unilateral server data not explicitly requested. Certain server data MUST be recorded by the client because it affects interpretation of subsequent commands and responses.
section: 2.2.2
rfc2119_level: MUST
