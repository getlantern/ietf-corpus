document: rfc-8264
kind: design-rationale
summary: Profile proliferation is explicitly discouraged because too many profiles cause inconsistent behavior across applications, violating the 'Principle of Least Astonishment'. The document recommends using existing profiles and only defining new ones with strong justification, to enable shared code and consistent user expectations.
section: "5.1"
topics:
