document: rfc-3641
kind: interoperability-note
summary: For DirectoryString, if the quoted string contains only PrintableString-permitted characters, the printableString alternative is assumed; otherwise the uTF8String alternative is assumed. IdentifiedChoiceValue MAY be used to explicitly indicate a different alternative, but it is a syntax error if the UTF-8 content cannot be represented in the chosen string type.
section: "3.12"
topics:
