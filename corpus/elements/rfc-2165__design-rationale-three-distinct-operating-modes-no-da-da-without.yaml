document: rfc-2165
kind: design-rationale
summary: Three distinct operating modes (no DA, DA without scopes, DA with scopes) are defined so that small LANs require zero administration, mid-size networks need only a DA, and large campus networks can partition services into scopes. Each mode requires progressively more administrative effort.
section: "3.7"
