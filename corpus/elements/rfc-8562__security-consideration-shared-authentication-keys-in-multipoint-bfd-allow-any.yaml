document: rfc-8562
kind: security-consideration
summary: Shared authentication keys in multipoint BFD allow any tail to spoof the head from the viewpoint of any other tail. Shared-key authentication is a significant security exposure unless all tails are trusted; asymmetric authentication (e.g., TESLA per RFC 4082) would be needed otherwise, but its applicability is left for further study.
section: "8"
topics:
    - security
    - crypto
    - routing
    - multicast
