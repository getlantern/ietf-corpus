document: rfc-4006
kind: registry
summary: IANA assigned Diameter Credit-Control Application-Id value 4, Command-Code 272 for CCR/CCA, and AVP codes for all credit-control-specific AVPs (e.g., CC-Request-Type, Granted-Service-Unit, Multiple-Services-Credit-Control). New Result-Code values include DIAMETER_CREDIT_LIMIT_REACHED (4012) and DIAMETER_RATING_FAILED (5031). Enumerated AVP registries are created for CC-Request-Type, CC-Unit-Type, Final-Unit-Action, and others.
