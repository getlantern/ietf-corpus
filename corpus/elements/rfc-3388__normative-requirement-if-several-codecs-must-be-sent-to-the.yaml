document: rfc-3388
kind: normative-requirement
summary: If several codecs must be sent to the same IP address and port, the traditional SDP syntax of listing multiple codecs in a single 'm' line MUST be used. FID MUST NOT be used to group 'm' lines with the same IP address and port; FID-grouped 'm' lines MUST differ in their transport addresses.
section: 7.5.3
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
