document: rfc-3711
kind: protocol-element
summary: The SRTP cryptographic context is the per-stream state maintained by sender and receiver, identified by the triplet <SSRC, destination network address, destination transport port number>. It holds the master key(s), session keys, ROC, s_l, replay list, algorithm identifiers, and associated parameters. If no valid context can be found for a packet, that packet MUST be discarded.
section: "3.2"
topics:
