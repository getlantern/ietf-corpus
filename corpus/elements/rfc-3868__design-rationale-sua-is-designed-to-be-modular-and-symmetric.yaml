document: rfc-3868
kind: design-rationale
summary: SUA is designed to be modular and symmetric to support both an SG-to-ASP architecture (interworking SS7 and IP) and a peer-to-peer IPSP architecture (all-IP, no SG required). This symmetry avoids duplicating protocol machinery for the two deployment modes.
section: "1"
