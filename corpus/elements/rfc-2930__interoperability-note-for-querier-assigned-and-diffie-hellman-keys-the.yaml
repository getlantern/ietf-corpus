document: rfc-2930
kind: interoperability-note
summary: For querier-assigned and Diffie-Hellman keys, the server MUST truly discard all active state on deletion. For server-assigned keys, the server MAY simply mark the key as no longer retained and may re-send it in response to a future query.
section: "4.2"
topics:
    - dns
