document: rfc-6012
kind: security-consideration
summary: The DTLS transports described are unreliable; messages may be lost or removed by an attacker without the receiver's knowledge. Implementers requiring a lossless stream should use TLS/TCP, and signed syslog messages (RFC 5848) can provide indication of message loss.
section: "9.2"
topics:
    - syslog
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
