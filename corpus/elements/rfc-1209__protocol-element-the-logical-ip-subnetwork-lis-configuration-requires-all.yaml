document: rfc-1209
kind: protocol-element
summary: 'The Logical IP Subnetwork (LIS) configuration requires: all members share the same IP network/subnet number; all stations in the LIS are accessed directly over SMDS; all stations outside the LIS are accessed via a router; and a single SMDS group address (smds$lis-ga) identifies all LIS members.'
section: Logical IP Subnetwork Configuration
topics:
    - ip
