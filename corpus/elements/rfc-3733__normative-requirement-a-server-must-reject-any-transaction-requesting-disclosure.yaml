document: rfc-3733
kind: normative-requirement
summary: A server MUST reject any transaction requesting disclosure practices that do not conform to the announced data collection policy with a 2308 error response code. The <contact:disclose> element MUST contain a required boolean 'flag' attribute and at least one child element.
section: "2.9"
rfc2119_level: MUST
topics:
    - privacy
