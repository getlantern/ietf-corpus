document: rfc-3403
kind: interoperability-note
summary: Backslashes in REGEXP master file entries must be doubled (entered twice in a zone file to appear once in a query response). This double-backslash requirement may not have been tested by all DNS server implementors, creating a potential interoperability hazard.
section: "7"
topics:
