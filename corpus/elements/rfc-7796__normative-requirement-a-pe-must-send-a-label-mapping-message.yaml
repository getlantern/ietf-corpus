document: rfc-7796
kind: normative-requirement
summary: A PE MUST send a Label Mapping message with an updated E-Tree sub-TLV to all other PEs when its role changes from leaf-only to not leaf-only (i.e., when a root node is added), ensuring peers can update their Optimized-Mode state.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
