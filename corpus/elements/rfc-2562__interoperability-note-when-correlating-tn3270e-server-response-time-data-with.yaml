document: rfc-2562
kind: interoperability-note
summary: When correlating TN3270E server response time data with SNA host monitoring, management applications must use tn3270eResMapTable or tn3270eTcpConnTable for resource-to-client address mappings. tn3270eClientGroupTable, tn3270eResPoolTable, and tn3270eClientResMapTable cannot be used for correlation because their mappings may overlap and are not one-to-one.
section: "3.3"
topics:
    - snmp
    - measurement
