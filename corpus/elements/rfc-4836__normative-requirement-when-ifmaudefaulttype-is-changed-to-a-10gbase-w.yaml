document: rfc-4836
kind: normative-requirement
summary: When ifMauDefaultType is changed to a 10GBASE-W variant, the agent SHALL create ifTable, ifStackTable, and ifInvStackTable entries pertaining to the WIS; when changed to a non-10GBASE-W type, the agent shall destroy those WIS-related entries and update ifConnectorPresent and ifHighSpeed accordingly, but SHALL NOT otherwise alter the ifTable entry.
section: 3.2.1
rfc2119_level: SHALL
topics:
    - snmp
