document: rfc-6225
kind: design-rationale
summary: Conversion from PIDF-LO to DHCPv4 GeoConf Option 123 (resolution encoding) is not specified because it is not possible to translate an arbitrary PIDF-LO to that format with a bounded increase in uncertainty; only conversion to/from the GeoLoc uncertainty format is specified.
