document: rfc-6277
kind: normative-requirement
summary: A client MUST accept any signing algorithm in a response that it specified as a preferred signing algorithm in the request. Therefore, a client MUST NOT specify a preferred signing algorithm that is not supported or not considered acceptably secure.
section: "7.1"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
    - security
