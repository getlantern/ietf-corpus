document: rfc-4034
kind: normative-requirement
summary: If an implementation detects duplicate RRs when putting an RRset into canonical form, it MUST treat this as a protocol error. If choosing to handle it robustly, it MUST remove all but one of the duplicate RRs for canonical form calculation purposes.
section: "6.3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
