document: rfc-8410
kind: interoperability-note
summary: Early implementations may have incorrectly used OCTET STRING instead of BIT STRING for the public key field (a copy error from a prior draft). Additionally, the OneAsymmetricKey version field must be 0 when publicKey is absent and 1 when publicKey is present.
