document: rfc-2156
kind: wire-format
summary: The standard OR Address textual representation (EBNF.std-or-address) encodes MTS.ORAddress as a sequence of attribute=value pairs delimited by '/' (e.g., /C=GB/ADMD=Gold 400/O=UCL/CN=Steve Kille/). A '$' quoting mechanism allows '/' and '=' characters within values. The output delimiter is always '/', while input accepts '/', ';', or mixed.
section: 4.1.3
topics:
