document: rfc-2303
kind: security-consideration
summary: Mail routing based on DNS is vulnerable to attacks including DNS server compromise, counterfeit DNS query responses, and incorrect additional information in unrelated query responses. Clients SHOULD ensure mail routing is based only on authoritative DNS answers.
section: "6"
rfc2119_level: SHOULD
topics:
    - email
    - dns
    - security
