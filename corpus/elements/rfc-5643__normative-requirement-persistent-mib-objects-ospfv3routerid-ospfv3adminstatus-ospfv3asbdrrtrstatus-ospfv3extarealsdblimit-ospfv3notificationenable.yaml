document: rfc-5643
kind: normative-requirement
summary: Persistent MIB objects (ospfv3RouterId, ospfv3AdminStatus, ospfv3ASBdrRtrStatus, ospfv3ExtAreaLsdbLimit, ospfv3NotificationEnable, and others) SHOULD be saved to non-volatile storage when written, so that configuration survives a restart.
section: "5"
rfc2119_level: SHOULD
