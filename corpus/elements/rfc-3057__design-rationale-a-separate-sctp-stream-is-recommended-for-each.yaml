document: rfc-3057
kind: design-rationale
summary: A separate SCTP stream is recommended for each D channel to minimize transmission and buffering delay. Because SCTP streams are unidirectional, the Interface Identifier is placed in the IUA message header rather than relying on stream-to-interface mapping.
section: 1.5.3
topics:
    - sctp
