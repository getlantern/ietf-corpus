document: rfc-1139
kind: design-rationale
summary: Two implementation mechanisms are defined because backward compatibility is a major concern when changing a protocol. The short term approach produces packets compatible with existing ISO 8473 routers; the long term approach defines new PDU types that may be standardized by ISO as an addendum, at which point the short term approach would become obsolete.
