document: rfc-8286
kind: interoperability-note
summary: The SPLICE SDP grouping semantic is applicable in BUNDLE scenarios; substitutive RTP applies only to RTP packets whose 'm=' line is in the same SPLICE group with the substitutive stream and carries the splicing 'extmap' attribute, ensuring correct behavior when audio and video use separate SPLICE groups within a BUNDLE.
