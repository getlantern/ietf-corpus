document: rfc-7694
kind: normative-requirement
summary: Servers that fail a request with a 415 (Unsupported Media Type) status for reasons unrelated to content codings MUST NOT include the 'Accept-Encoding' header field in the response, to avoid confusion with media type issues.
section: "3"
rfc2119_level: MUST NOT
topics:
