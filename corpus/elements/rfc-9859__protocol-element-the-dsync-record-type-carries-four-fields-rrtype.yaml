document: rfc-9859
kind: protocol-element
summary: 'The DSYNC record type carries four fields: RRtype (the notification type, currently CDS or CSYNC), Scheme (the contact method, currently only value 1 = NOTIFY), Port (the transport port), and Target (the hostname listening for notifications). Scheme 1 (NOTIFY) instructs child operators to send a DNS NOTIFY message upon publishing new CDS/CDNSKEY/CSYNC RRsets.'
section: "2.3"
topics:
    - dns
