document: rfc-2815
kind: normative-requirement
summary: A merged RSVP reservation MUST receive at least as good a service as the best of its component reservations. Merging reservations that would demote or promote a flow into a different traffic class is declared illegal; an RSVP/SBM ResvErr is returned instead.
section: "5"
rfc2119_level: MUST
topics:
    - qos
