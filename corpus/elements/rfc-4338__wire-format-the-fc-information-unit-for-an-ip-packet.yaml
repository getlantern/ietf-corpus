document: rfc-4338
kind: wire-format
summary: 'The FC Information Unit for an IP packet consists of: FC Network_Header (16 octets), LLC/SNAP header (8 octets), followed by the IPv6 or IPv4 packet. The FC Network_Header and LLC/SNAP header appear only in the first frame of a multi-frame Sequence.'
