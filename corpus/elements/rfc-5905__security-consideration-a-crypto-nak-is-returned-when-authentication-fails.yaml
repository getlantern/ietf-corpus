document: rfc-5905
kind: security-consideration
summary: A crypto-NAK is returned when authentication fails on a received packet; it consists of a normal NTP header with a MAC of four zero octets. The receiving client MAY accept or reject the data in the message, and must decide whether to continue using the unauthenticated time values.
section: "9.2"
topics:
    - ntp
    - security
