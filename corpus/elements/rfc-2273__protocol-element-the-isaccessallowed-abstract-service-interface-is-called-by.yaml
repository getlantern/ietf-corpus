document: rfc-2273
kind: protocol-element
summary: The isAccessAllowed abstract service interface is called by command responders and notification originators to check MIB view access. Parameters include securityModel, securityName, securityLevel, viewType (read/write/notify), contextName, and variableName (OID). Errors noSuchView/noAccessEntry/noGroupName yield authorizationError; noSuchContext increments snmpUnknownContexts.
section: "3.2"
topics:
    - snmp
    - security
