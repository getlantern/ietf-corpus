document: rfc-5914
kind: interoperability-note
summary: 'Correspondence between certificate extensions and TrustAnchorInfo fields is explicitly defined: id-ce-certificatePolicies maps to policySet; id-ce-policyConstraints maps to inhibitPolicyMapping and requireExplicitPolicy flags; id-ce-inhibitAnyPolicy maps to inhibitAnyPolicy; id-ce-nameConstraints maps to nameConstr; and id-ce-basicConstraints pathLenConstraint maps to CertPathControls.pathLenConstraint.'
section: "2.5"
topics:
