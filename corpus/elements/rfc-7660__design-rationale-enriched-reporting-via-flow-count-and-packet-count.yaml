document: rfc-7660
kind: design-rationale
summary: Enriched reporting via Flow-Count and Packet-Count provides relief from Deep Packet Inspection load and loss of information as traffic becomes increasingly encrypted; for example, low byte counts per packet indicate web traffic while high byte counts with few flows indicate video traffic.
