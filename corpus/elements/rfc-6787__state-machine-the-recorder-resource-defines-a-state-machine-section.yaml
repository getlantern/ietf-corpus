document: rfc-6787
kind: state-machine
summary: The Recorder resource defines a state machine (Section 10.1) driven by RECORD and STOP methods, with RECORD-COMPLETE as the terminal event. The recorder MUST provide endpointing for silence suppression at the beginning and end of recordings and MUST maintain timing metadata when silence is suppressed mid-recording.
section: "10.1"
topics:
    - realtime
