document: rfc-5492
kind: design-rationale
summary: Multiple instances of a capability with different Capability Values under the same Capability Code are explicitly allowed to support capabilities that require advertising multiple parameter sets (e.g., multiple address families). The semantics of aggregating such instances are defined per-capability by the document introducing that capability.
