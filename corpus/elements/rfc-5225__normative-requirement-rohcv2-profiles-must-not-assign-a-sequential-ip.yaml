document: rfc-5225
kind: normative-requirement
summary: ROHCv2 profiles MUST NOT assign a sequential IP-ID behavior (network byte order or byte-swapped) to any IP-ID except the one in the innermost IP header when compressing more than one level of IP headers. A compressor MUST assign either constant-zero or random IP-ID behavior to tunneling (outer) headers.
section: 6.3.3
rfc2119_level: MUST NOT
topics:
    - realtime
    - ip
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
