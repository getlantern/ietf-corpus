document: rfc-9114
kind: normative-requirement
summary: Malformed requests or responses detected by intermediaries MUST NOT be forwarded; they MUST be treated as a stream error of type H3_MESSAGE_ERROR. Clients MUST NOT accept a malformed response.
section: 4.1.2
rfc2119_level: MUST NOT
