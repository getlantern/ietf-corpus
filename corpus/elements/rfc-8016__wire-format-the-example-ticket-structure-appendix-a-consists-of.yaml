summary: 'The example ticket structure (Appendix A) consists of: key_name (16 octets), iv (16 octets), encrypted_state (variable, up to 2^16-1 octets), and mac (16 octets). Encryption uses AES_128_CBC; integrity uses HMAC-SHA-256-128 over key_name, IV, and encrypted_state length and contents.'
