document: rfc-4124
kind: normative-requirement
summary: If the LSP is associated with Class-Type 0, the sender LSR MUST NOT include the CLASSTYPE object in the Path message, enabling backward compatibility with non-DS-TE LSRs. For Class-Type N (1–7), the sender MUST include the CLASSTYPE object with CT field set to N.
section: "6.3"
rfc2119_level: MUST
topics:
    - mpls
    - diffserv
    - qos
