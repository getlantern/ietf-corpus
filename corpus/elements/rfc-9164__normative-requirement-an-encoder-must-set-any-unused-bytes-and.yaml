document: rfc-9164
kind: normative-requirement
summary: An encoder MUST set any unused bytes and any unused bits in the final byte of a prefix byte string to zero. Unused bits are those not covered by the declared prefix length.
section: "4.2"
rfc2119_level: MUST
topics:
